<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Festival Lights Show</title>
<style>
  :root {
    --bg-0: #05030f;
    --bg-1: #0b0820;
    --panel: rgba(18, 14, 40, 0.72);
    --panel-border: rgba(255, 255, 255, 0.08);
    --text: #f4f1ff;
    --text-dim: #a59ec9;
    --accent: #ff2d95;
    --accent-2: #00e5ff;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
    background: var(--bg-0);
    color: var(--text);
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    user-select: none;
  }

  #stage {
    position: fixed;
    inset: 0;
    display: block;
    background:
      radial-gradient(ellipse at 50% 120%, rgba(40, 20, 80, 0.55), transparent 60%),
      linear-gradient(180deg, var(--bg-0), var(--bg-1) 70%, #02010a);
  }

  /* ---------- App chrome ---------- */
  #title {
    position: fixed;
    top: 18px; left: 50%;
    transform: translateX(-50%);
    text-align: center;
    pointer-events: none;
    z-index: 5;
  }
  #title h1 {
    margin: 0;
    font-size: clamp(20px, 4.5vw, 40px);
    font-weight: 800;
    letter-spacing: 2px;
    background: linear-gradient(90deg, #ff2d95, #ffd84d, #00e5ff, #b14dff, #ff2d95);
    background-size: 300% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: hue 6s linear infinite;
    text-shadow: 0 0 40px rgba(255, 45, 149, 0.25);
  }
  #title p {
    margin: 4px 0 0;
    font-size: 12px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  @keyframes hue { to { background-position: 300% 0; } }

  /* ---------- Beat indicator ---------- */
  #beatRing {
    position: fixed;
    top: 22px; right: 22px;
    width: 46px; height: 46px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.15);
    display: flex; align-items: center; justify-content: center;
    z-index: 6;
    transition: box-shadow .08s, border-color .08s, transform .08s;
  }
  #beatRing .dot {
    width: 14px; height: 14px; border-radius: 50%;
    background: #ff2d95;
    box-shadow: 0 0 18px #ff2d95;
  }

  /* ---------- Control panel ---------- */
  #panel {
    position: fixed;
    left: 50%;
    bottom: 16px;
    transform: translateX(-50%);
    width: min(960px, calc(100% - 24px));
    background: var(--panel);
    backdrop-filter: blur(18px) saturate(140%);
    -webkit-backdrop-filter: blur(18px) saturate(140%);
    border: 1px solid var(--panel-border);
    border-radius: 20px;
    padding: 14px 16px 16px;
    z-index: 10;
    box-shadow: 0 20px 60px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.06);
    transition: transform .35s cubic-bezier(.2,.9,.3,1);
  }
  #panel.collapsed { transform: translate(-50%, calc(100% - 50px)); }

  .panel-head {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 12px;
  }
  .panel-head .label {
    font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--text-dim);
    flex: 1;
  }
  #collapseBtn {
    background: none; border: none; color: var(--text-dim);
    cursor: pointer; font-size: 18px; padding: 4px 8px;
    transition: transform .35s, color .2s;
  }
  #collapseBtn:hover { color: var(--text); }
  #panel.collapsed #collapseBtn { transform: rotate(180deg); }

  .row { display: flex; gap: 18px; flex-wrap: wrap; }
  .group { flex: 1; min-width: 200px; }
  .group > .sub {
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--text-dim); margin-bottom: 8px;
  }

  /* pattern buttons */
  .patterns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; }
  .pat-btn {
    appearance: none; border: 1px solid var(--panel-border);
    background: rgba(255,255,255,0.04);
    color: var(--text-dim);
    border-radius: 11px;
    padding: 9px 4px;
    font-size: 11px; font-weight: 600; letter-spacing: .5px;
    cursor: pointer;
    transition: all .18s;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
  }
  .pat-btn .ico { font-size: 16px; line-height: 1; }
  .pat-btn:hover { background: rgba(255,255,255,0.09); color: var(--text); transform: translateY(-1px); }
  .pat-btn.active {
    color: #fff;
    border-color: transparent;
    background: linear-gradient(135deg, var(--accent), #b14dff);
    box-shadow: 0 6px 20px rgba(177,77,255,0.4);
  }

  /* swatches */
  .palettes { display: flex; flex-wrap: wrap; gap: 8px; }
  .swatch {
    width: 40px; height: 28px; border-radius: 8px;
    cursor: pointer; border: 2px solid transparent;
    transition: transform .15s, border-color .15s;
    position: relative;
  }
  .swatch:hover { transform: scale(1.08); }
  .swatch.active { border-color: #fff; box-shadow: 0 0 0 2px rgba(255,255,255,0.25); }

  /* sliders */
  .slider-block { margin-bottom: 12px; }
  .slider-block:last-child { margin-bottom: 0; }
  .slider-block label {
    display: flex; justify-content: space-between;
    font-size: 11px; color: var(--text-dim); margin-bottom: 5px;
  }
  .slider-block label b { color: var(--text); font-weight: 600; }
  input[type=range] {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 6px; border-radius: 6px;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    outline: none; cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 18px; height: 18px; border-radius: 50%;
    background: #fff; cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5), 0 0 0 4px rgba(255,255,255,0.12);
  }
  input[type=range]::-moz-range-thumb {
    width: 18px; height: 18px; border-radius: 50%;
    background: #fff; border: none; cursor: pointer;
  }

  /* main actions */
  .actions { display: flex; gap: 8px; margin-top: 4px; }
  .btn {
    flex: 1;
    appearance: none; border: 1px solid var(--panel-border);
    background: rgba(255,255,255,0.05); color: var(--text);
    border-radius: 12px; padding: 11px 8px;
    font-size: 12px; font-weight: 700; letter-spacing: .5px;
    cursor: pointer; transition: all .18s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .btn:hover { background: rgba(255,255,255,0.1); transform: translateY(-1px); }
  .btn.primary {
    background: linear-gradient(135deg, var(--accent-2), #2d7dff);
    border-color: transparent;
    box-shadow: 0 6px 20px rgba(0,160,255,0.35);
  }
  .btn.primary.on {
    background: linear-gradient(135deg, #ff2d95, #ff7a4d);
    box-shadow: 0 6px 22px rgba(255,45,149,0.45);
  }
  .btn.tiny { flex: 0 0 auto; padding: 11px 14px; }

  /* mic hint */
  #hint {
    position: fixed; bottom: 0; left: 0; right: 0;
    text-align: center; font-size: 11px; color: var(--text-dim);
    padding-bottom: 4px; pointer-events: none; opacity: .0;
    transition: opacity .4s; z-index: 4;
  }

  /* toast */
  #toast {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%,-50%) scale(.9);
    background: rgba(10,8,24,0.92); border: 1px solid var(--panel-border);
    color: var(--text); padding: 14px 22px; border-radius: 14px;
    font-size: 13px; z-index: 50; opacity: 0; pointer-events: none;
    transition: opacity .3s, transform .3s;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
  }
  #toast.show { opacity: 1; transform: translate(-50%,-50%) scale(1); }

  /* divider */
  .vdiv { width: 1px; background: var(--panel-border); align-self: stretch; }

  @media (max-width: 640px) {
    .vdiv { display: none; }
    .group { min-width: 100%; }
    #title p { letter-spacing: 2px; }
  }
</style>
</head>
<body>
  <canvas id="stage"></canvas>

  <div id="title">
    <h1>FESTIVAL LIGHTS SHOW</h1>
    <p>Live Visual Controller</p>
  </div>

  <div id="beatRing"><div class="dot"></div></div>

  <div id="panel">
    <div class="panel-head">
      <span class="label">Light Console</span>
      <button id="collapseBtn" title="Collapse">⌄</button>
    </div>

    <div class="row">
      <!-- Patterns -->
      <div class="group">
        <div class="sub">Pattern</div>
        <div class="patterns" id="patterns"></div>
      </div>

      <div class="vdiv"></div>

      <!-- Palette + sliders -->
      <div class="group">
        <div class="sub">Color Palette</div>
        <div class="palettes" id="palettes"></div>
        <div style="height:12px"></div>
        <div class="slider-block">
          <label>Speed <b id="speedVal">1.0×</b></label>
          <input type="range" id="speed" min="0.1" max="3" step="0.05" value="1">
        </div>
        <div class="slider-block">
          <label>Intensity <b id="intVal">80%</b></label>
          <input type="range" id="intensity" min="20" max="100" step="1" value="80">
        </div>
      </div>

      <div class="vdiv"></div>

      <!-- Music + actions -->
      <div class="group">
        <div class="sub">Music Sync</div>
        <div class="actions">
          <button class="btn primary" id="musicBtn">♫ Start Demo Beat</button>
        </div>
        <div class="actions">
          <button class="btn" id="micBtn">🎤 Use Mic</button>
        </div>
        <div class="slider-block" style="margin-top:12px">
          <label>Beat Reactivity <b id="reactVal">70%</b></label>
          <input type="range" id="react" min="0" max="100" step="1" value="70">
        </div>
        <div class="actions">
          <button class="btn" id="autoBtn">✨ Auto-DJ</button>
          <button class="btn tiny" id="fsBtn" title="Fullscreen">⛶</button>
        </div>
      </div>
    </div>
  </div>

  <div id="hint">Tap anywhere to add a burst of light</div>
  <div id="toast"></div>

<script>
"use strict";

/* =========================================================================
   Festival Lights Show
   A canvas-driven light visualizer with patterns, palettes, and music sync.
   ========================================================================= */

const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d', { alpha: false });

let W = 0, H = 0, DPR = 1;
function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = Math.floor(W * DPR);
  canvas.height = Math.floor(H * DPR);
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize);
resize();

/* ---------------------------------------------------------------------------
   Palettes — each is a list of vibrant hues used by every pattern.
--------------------------------------------------------------------------- */
const PALETTES = [
  { name: 'Neon', colors: ['#ff2d95', '#00e5ff', '#b14dff', '#ffd84d', '#39ff88'] },
  { name: 'Sunset', colors: ['#ff5e3a', '#ff2d55', '#ff9500', '#ffcc00', '#ff375f'] },
  { name: 'Ocean', colors: ['#00e5ff', '#2d7dff', '#39ffd0', '#5e8bff', '#a0f0ff'] },
  { name: 'Aurora', colors: ['#39ff88', '#00e5ff', '#b14dff', '#39ffd0', '#7dffb0'] },
  { name: 'Candy', colors: ['#ff7eb3', '#ff65a3', '#7afcff', '#feff9c', '#fff740'] },
  { name: 'Fire', colors: ['#ffd000', '#ff8a00', '#ff3c00', '#ff0066', '#ffae42'] },
  { name: 'Rainbow', colors: ['#ff0040', '#ff8800', '#ffe600', '#00d647', '#00b3ff', '#a030ff'] },
];

/* ---------------------------------------------------------------------------
   Central state.
--------------------------------------------------------------------------- */
const state = {
  pattern: 'wave',
  palette: 0,
  speed: 1,
  intensity: 0.8,
  reactivity: 0.7,
  // beat engine
  beat: 0,          // decays from 1 -> 0 on each beat
  beatPulse: 0,     // smoothed pulse for sizing
  energy: 0,        // 0..1 audio energy (or simulated)
  bass: 0,
  treble: 0,
  // auto dj
  autoDJ: false,
  autoTimer: 0,
  // misc
  time: 0,
};

function palette() { return PALETTES[state.palette].colors; }

function hexToRgb(hex) {
  const n = parseInt(hex.slice(1), 16);
  return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
}
// Smooth color across palette using a continuous 0..1 position
function paletteColor(t) {
  const c = palette();
  const f = ((t % 1) + 1) % 1 * c.length;
  const i = Math.floor(f);
  const frac = f - i;
  const a = hexToRgb(c[i % c.length]);
  const b = hexToRgb(c[(i + 1) % c.length]);
  return [
    Math.round(a[0] + (b[0] - a[0]) * frac),
    Math.round(a[1] + (b[1] - a[1]) * frac),
    Math.round(a[2] + (b[2] - a[2]) * frac),
  ];
}
function rgba(c, a) { return `rgba(${c[0]},${c[1]},${c[2]},${a})`; }

/* =========================================================================
   AUDIO ENGINE — drives the beat/energy used by all patterns.
   Two sources: (1) a synthesized demo beat, (2) microphone input.
   When neither runs, a gentle simulated beat keeps things alive.
   ========================================================================= */
const Audio = {
  ctx: null,
  analyser: null,
  freqData: null,
  source: null,      // mic stream source
  micStream: null,
  demoOn: false,
  micOn: false,
  demoTimer: 0,
  nextBeatAt: 0,
  bpm: 124,
  step: 0,
  master: null,

  ensure() {
    if (!this.ctx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      this.ctx = new AC();
      this.master = this.ctx.createGain();
      this.master.gain.value = 0.5;
      this.master.connect(this.ctx.destination);
      this.analyser = this.ctx.createAnalyser();
      this.analyser.fftSize = 256;
      this.analyser.smoothingTimeConstant = 0.7;
      this.freqData = new Uint8Array(this.analyser.frequencyBinCount);
      this.analyser.connect(this.master); // analyser taps synth output
    }
    if (this.ctx.state === 'suspended') this.ctx.resume();
  },

  /* ---- Synthesized demo track: kick + bass + hats + chord stabs ---- */
  startDemo() {
    this.ensure();
    this.demoOn = true;
    this.nextBeatAt = this.ctx.currentTime + 0.06;
    this.step = 0;
    this._scheduleLoop();
  },
  stopDemo() {
    this.demoOn = false;
    if (this._raf) cancelAnimationFrame(this._raf);
  },
  _scheduleLoop() {
    if (!this.demoOn) return;
    const spb = 60 / this.bpm;          // seconds per beat
    const sixteenth = spb / 4;
    while (this.nextBeatAt < this.ctx.currentTime + 0.12) {
      this._playStep(this.step, this.nextBeatAt);
      this.nextBeatAt += sixteenth;
      this.step = (this.step + 1) % 16;
    }
    this._raf = requestAnimationFrame(() => this._scheduleLoop());
  },
  _playStep(step, t) {
    const c = this.ctx;
    // Kick on every quarter
    if (step % 4 === 0) {
      this._kick(t, step === 0 ? 1 : 0.85);
      triggerBeat(step === 0 ? 1 : 0.8);
    }
    // Snare/clap on 4 & 12
    if (step === 4 || step === 12) { this._noise(t, 0.18, 1800); }
    // Hi-hats on offbeats
    if (step % 2 === 1) this._noise(t, 0.04, 9000, 0.25);
    // Bassline
    const bassPat = [0, null, 7, null, 0, null, 5, null, 0, null, 7, null, 3, null, 5, null];
    if (bassPat[step] !== null) this._bass(t, bassPat[step]);
    // Chord stab on 0 and 8
    if (step === 0 || step === 8) this._chord(t);
  },
  _kick(t, g) {
    const c = this.ctx;
    const o = c.createOscillator(), gain = c.createGain();
    o.frequency.setValueAtTime(150, t);
    o.frequency.exponentialRampToValueAtTime(45, t + 0.12);
    gain.gain.setValueAtTime(g, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.28);
    o.connect(gain); gain.connect(this.analyser);
    o.start(t); o.stop(t + 0.3);
  },
  _bass(t, semi) {
    const c = this.ctx;
    const f = 55 * Math.pow(2, semi / 12);
    const o = c.createOscillator(), gain = c.createGain();
    o.type = 'sawtooth'; o.frequency.value = f;
    const filt = c.createBiquadFilter();
    filt.type = 'lowpass'; filt.frequency.value = 600;
    gain.gain.setValueAtTime(0.0, t);
    gain.gain.linearRampToValueAtTime(0.22, t + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.16);
    o.connect(filt); filt.connect(gain); gain.connect(this.analyser);
    o.start(t); o.stop(t + 0.18);
  },
  _chord(t) {
    const c = this.ctx;
    const root = 220;
    [0, 4, 7, 11].forEach(semi => {
      const o = c.createOscillator(), gain = c.createGain();
      o.type = 'triangle';
      o.frequency.value = root * Math.pow(2, semi / 12);
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.05, t + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
      o.connect(gain); gain.connect(this.analyser);
      o.start(t); o.stop(t + 0.55);
    });
  },
  _noise(t, dur, hz, g = 0.4) {
    const c = this.ctx;
    const n = Math.floor(c.sampleRate * dur);
    const buf = c.createBuffer(1, n, c.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / n, 2);
    const src = c.createBufferSource(); src.buffer = buf;
    const filt = c.createBiquadFilter();
    filt.type = 'highpass'; filt.frequency.value = hz;
    const gain = c.createGain(); gain.gain.value = g;
    src.connect(filt); filt.connect(gain); gain.connect(this.analyser);
    src.start(t);
  },

  /* ---- Microphone ---- */
  async startMic() {
    this.ensure();
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } });
      this.micStream = stream;
      this.source = this.ctx.createMediaStreamSource(stream);
      this.source.connect(this.analyser);  // mic -> analyser only (not to speakers)
      this.micOn = true;
      return true;
    } catch (e) {
      return false;
    }
  },
  stopMic() {
    if (this.source) { try { this.source.disconnect(); } catch (e) {} this.source = null; }
    if (this.micStream) { this.micStream.getTracks().forEach(t => t.stop()); this.micStream = null; }
    this.micOn = false;
  },

  /* ---- Per-frame analysis: returns {energy, bass, treble} 0..1 ---- */
  analyse() {
    if (!this.analyser || (!this.demoOn && !this.micOn)) return null;
    this.analyser.getByteFrequencyData(this.freqData);
    const d = this.freqData, n = d.length;
    let bass = 0, mid = 0, treble = 0;
    const bEnd = Math.floor(n * 0.12), mEnd = Math.floor(n * 0.5);
    for (let i = 0; i < n; i++) {
      if (i < bEnd) bass += d[i];
      else if (i < mEnd) mid += d[i];
      else treble += d[i];
    }
    bass /= (bEnd * 255);
    mid /= ((mEnd - bEnd) * 255);
    treble /= ((n - mEnd) * 255);
    const energy = Math.min(1, bass * 0.6 + mid * 0.3 + treble * 0.1);

    // Mic beat detection (demo uses scheduled triggerBeat instead)
    if (this.micOn) {
      this._micBeatDetect(bass);
    }
    return { energy, bass: Math.min(1, bass), treble: Math.min(1, treble * 1.4) };
  },
  _avg: 0,
  _micBeatDetect(bass) {
    this._avg = this._avg * 0.92 + bass * 0.08;
    if (bass > this._avg * 1.45 && bass > 0.25) {
      const now = performance.now();
      if (!this._lastBeat || now - this._lastBeat > 180) {
        this._lastBeat = now;
        triggerBeat(Math.min(1, bass * 1.2));
      }
    }
  },
};

/* Beat trigger — flashes the beat ring and feeds reactive patterns. */
let beatCount = 0;
function triggerBeat(strength) {
  state.beat = Math.max(state.beat, strength);
  beatCount++;
  flashBeatRing(strength);
  // On strong beats, emit a celebratory burst from a random position.
  if (strength > 0.7 && Math.random() < 0.5) {
    spawnFirework(W * (0.2 + Math.random() * 0.6), H * (0.25 + Math.random() * 0.35));
  }
}

const beatRing = document.getElementById('beatRing');
function flashBeatRing(s) {
  const c = paletteColor(beatCount * 0.12);
  beatRing.style.boxShadow = `0 0 ${20 + s * 30}px ${rgba(c, 0.9)}`;
  beatRing.style.borderColor = rgba(c, 0.9);
  beatRing.style.transform = `scale(${1 + s * 0.25})`;
  const dot = beatRing.querySelector('.dot');
  dot.style.background = rgba(c, 1);
  dot.style.boxShadow = `0 0 18px ${rgba(c, 1)}`;
  clearTimeout(beatRing._t);
  beatRing._t = setTimeout(() => {
    beatRing.style.transform = 'scale(1)';
    beatRing.style.boxShadow = 'none';
  }, 90);
}

/* =========================================================================
   PARTICLE SYSTEMS — fireworks + tap bursts shared by patterns.
   ========================================================================= */
const particles = [];
function spawnFirework(x, y) {
  const count = 36 + Math.floor(Math.random() * 24);
  const baseHue = Math.random();
  for (let i = 0; i < count; i++) {
    const ang = (i / count) * Math.PI * 2 + Math.random() * 0.2;
    const sp = 1.5 + Math.random() * 4.5;
    particles.push({
      x, y,
      vx: Math.cos(ang) * sp,
      vy: Math.sin(ang) * sp,
      life: 1, decay: 0.008 + Math.random() * 0.012,
      size: 1.5 + Math.random() * 2.5,
      color: paletteColor(baseHue + Math.random() * 0.15),
    });
  }
}
function spawnBurst(x, y) {
  spawnFirework(x, y);
  state.beat = Math.max(state.beat, 0.9);
}
function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt * 60 * 0.016 * 60 / 60;
    p.vy += 0.04;          // gravity
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.985; p.vy *= 0.985;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}
function drawParticles() {
  ctx.globalCompositeOperation = 'lighter';
  for (const p of particles) {
    const a = Math.max(0, p.life) * state.intensity;
    const r = p.size * (0.6 + p.life * 0.8);
    const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, r * 4);
    g.addColorStop(0, rgba(p.color, a));
    g.addColorStop(1, rgba(p.color, 0));
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(p.x, p.y, r * 4, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalCompositeOperation = 'source-over';
}

/* =========================================================================
   PATTERNS — each renders one frame. `b` = beat-scaled boost, `e` = energy.
   ========================================================================= */
const PatternFns = {
  /* Flowing horizontal light bars / equalizer waves. */
  wave(t, b, e) {
    const bars = 40;
    const bw = W / bars;
    for (let i = 0; i < bars; i++) {
      const phase = t * 1.2 + i * 0.28;
      const base = (Math.sin(phase) * 0.5 + 0.5);
      const h = (base * 0.45 + e * 0.5 + b * 0.25) * H;
      const c = paletteColor(i / bars + t * 0.05);
      const x = i * bw;
      const grad = ctx.createLinearGradient(0, H, 0, H - h);
      grad.addColorStop(0, rgba(c, 0.0));
      grad.addColorStop(0.5, rgba(c, 0.5 * state.intensity));
      grad.addColorStop(1, rgba(c, 0.95 * state.intensity));
      ctx.fillStyle = grad;
      ctx.fillRect(x + bw * 0.12, H - h, bw * 0.76, h);
      // glowing cap
      ctx.globalCompositeOperation = 'lighter';
      ctx.fillStyle = rgba(c, 0.9 * state.intensity);
      ctx.beginPath();
      ctx.arc(x + bw / 2, H - h, bw * 0.32 * (1 + b * 0.6), 0, Math.PI * 2);
      ctx.fill();
      ctx.globalCompositeOperation = 'source-over';
    }
  },

  /* Concentric expanding rings pulsing with the beat. */
  pulse(t, b, e) {
    const cx = W / 2, cy = H / 2;
    const rings = 7;
    ctx.globalCompositeOperation = 'lighter';
    for (let i = 0; i < rings; i++) {
      const prog = ((t * 0.35 + i / rings) % 1);
      const r = prog * Math.max(W, H) * 0.7 * (1 + b * 0.25);
      const c = paletteColor(i / rings + t * 0.08);
      const a = (1 - prog) * (0.5 + e * 0.5) * state.intensity;
      ctx.strokeStyle = rgba(c, a);
      ctx.lineWidth = 4 + b * 14 + (1 - prog) * 10;
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.stroke();
    }
    // center orb
    const oc = paletteColor(t * 0.2);
    const orb = ctx.createRadialGradient(cx, cy, 0, cx, cy, 90 * (1 + b));
    orb.addColorStop(0, rgba(oc, 0.95 * state.intensity));
    orb.addColorStop(1, rgba(oc, 0));
    ctx.fillStyle = orb;
    ctx.beginPath(); ctx.arc(cx, cy, 90 * (1 + b), 0, Math.PI * 2); ctx.fill();
    ctx.globalCompositeOperation = 'source-over';
  },

  /* Rotating laser fan from the top of the stage. */
  lasers(t, b, e) {
    const cx = W / 2, cy = -40;
    const beams = 12;
    ctx.globalCompositeOperation = 'lighter';
    for (let i = 0; i < beams; i++) {
      const spread = (i / (beams - 1) - 0.5) * (1.6 + Math.sin(t * 0.7) * 0.5);
      const sway = Math.sin(t * 1.5 + i * 0.5) * 0.25;
      const ang = Math.PI / 2 + spread + sway;
      const len = H * 1.4;
      const ex = cx + Math.cos(ang) * len;
      const ey = cy + Math.sin(ang) * len;
      const c = paletteColor(i / beams + t * 0.1);
      const grad = ctx.createLinearGradient(cx, cy, ex, ey);
      grad.addColorStop(0, rgba(c, (0.55 + e * 0.4 + b * 0.3) * state.intensity));
      grad.addColorStop(1, rgba(c, 0));
      ctx.strokeStyle = grad;
      ctx.lineWidth = 3 + b * 8 + e * 6;
      ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(ex, ey); ctx.stroke();
    }
    // source flare
    const fc = paletteColor(t * 0.15);
    const fl = ctx.createRadialGradient(cx, cy, 0, cx, cy, 120);
    fl.addColorStop(0, rgba(fc, 0.8 * state.intensity));
    fl.addColorStop(1, rgba(fc, 0));
    ctx.fillStyle = fl;
    ctx.beginPath(); ctx.arc(cx, cy, 120, 0, Math.PI * 2); ctx.fill();
    ctx.globalCompositeOperation = 'source-over';
  },

  /* Strobing color-block grid. */
  strobe(t, b, e) {
    const cols = 8, rows = 5;
    const cw = W / cols, ch = H / rows;
    for (let y = 0; y < rows; y++) {
      for (let x = 0; x < cols; x++) {
        const seed = Math.sin((x * 13.1 + y * 7.7) + Math.floor(t * (3 + e * 6)));
        const on = seed > 0.3 - b * 0.6;
        const c = paletteColor((x + y) / (cols + rows) + Math.floor(t * 2) * 0.07);
        const a = on ? (0.55 + b * 0.4) * state.intensity : 0.05;
        ctx.fillStyle = rgba(c, a);
        ctx.fillRect(x * cw + 2, y * ch + 2, cw - 4, ch - 4);
        if (on) {
          ctx.globalCompositeOperation = 'lighter';
          ctx.fillStyle = rgba(c, 0.15 * state.intensity);
          ctx.fillRect(x * cw, y * ch, cw, ch);
          ctx.globalCompositeOperation = 'source-over';
        }
      }
    }
  },

  /* Spiraling galaxy of orbiting light points. */
  spiral(t, b, e) {
    const cx = W / 2, cy = H / 2;
    const arms = 4, perArm = 60;
    ctx.globalCompositeOperation = 'lighter';
    for (let a = 0; a < arms; a++) {
      for (let i = 0; i < perArm; i++) {
        const f = i / perArm;
        const ang = a * (Math.PI * 2 / arms) + f * 8 + t * (0.6 + e);
        const rad = f * Math.min(W, H) * 0.5 * (1 + b * 0.2);
        const x = cx + Math.cos(ang) * rad;
        const y = cy + Math.sin(ang) * rad;
        const c = paletteColor(f + a / arms + t * 0.05);
        const sz = (1 - f) * 6 * (1 + b * 0.8) + 1;
        const alpha = (1 - f * 0.7) * state.intensity;
        const g = ctx.createRadialGradient(x, y, 0, x, y, sz * 3);
        g.addColorStop(0, rgba(c, alpha));
        g.addColorStop(1, rgba(c, 0));
        ctx.fillStyle = g;
        ctx.beginPath(); ctx.arc(x, y, sz * 3, 0, Math.PI * 2); ctx.fill();
      }
    }
    ctx.globalCompositeOperation = 'source-over';
  },

  /* Plasma — smooth flowing color field. */
  plasma(t, b, e) {
    const cells = 22;
    const cw = W / cells, ch = H / cells;
    const scale = 0.45;
    for (let y = 0; y < cells; y++) {
      for (let x = 0; x < cells; x++) {
        const v =
          Math.sin(x * scale + t) +
          Math.sin(y * scale + t * 1.3) +
          Math.sin((x + y) * scale * 0.6 + t * 0.8) +
          Math.sin(Math.hypot(x - cells / 2, y - cells / 2) * scale - t);
        const c = paletteColor(v * 0.12 + t * 0.04);
        const a = (0.35 + (v + 4) / 8 * 0.5 + b * 0.2 + e * 0.2) * state.intensity;
        ctx.fillStyle = rgba(c, Math.min(1, a));
        ctx.fillRect(x * cw, y * ch, cw + 1, ch + 1);
      }
    }
  },
};

/* On every frame, before pattern draw, fade the canvas slightly for trails. */
function fadeCanvas(amount) {
  ctx.fillStyle = `rgba(5,3,15,${amount})`;
  ctx.fillRect(0, 0, W, H);
}

/* =========================================================================
   MAIN LOOP
   ========================================================================= */
let last = performance.now();
function loop(now) {
  const dt = Math.min(0.05, (now - last) / 1000);
  last = now;
  state.time += dt * state.speed;

  // ---- audio / beat update ----
  const a = Audio.analyse();
  if (a) {
    state.energy += (a.energy - state.energy) * 0.25;
    state.bass += (a.bass - state.bass) * 0.3;
    state.treble += (a.treble - state.treble) * 0.3;
  } else {
    // Idle simulated heartbeat so the stage is always lively.
    state.simPhase = (state.simPhase || 0) + dt;
    const bpm = 110, beatEvery = 60 / bpm;
    if (state.simPhase >= beatEvery) {
      state.simPhase -= beatEvery;
      triggerBeat(0.55 + Math.random() * 0.25);
    }
    const target = 0.3 + Math.sin(state.time * 1.5) * 0.15;
    state.energy += (target - state.energy) * 0.05;
    state.bass += (state.beat - state.bass) * 0.2;
  }

  // beat decay
  state.beat *= 0.90;
  state.beatPulse += (state.beat - state.beatPulse) * 0.3;

  // reactivity-scaled boost applied to patterns
  const b = state.beat * state.reactivity;
  const e = state.energy * (0.4 + state.reactivity * 0.6);

  // ---- auto DJ ----
  if (state.autoDJ) {
    state.autoTimer += dt;
    if (state.autoTimer > 7) {
      state.autoTimer = 0;
      cyclePattern();
      if (Math.random() < 0.6) cyclePalette();
    }
  }

  // ---- render ----
  // Trail fade — more aggressive for "flashy" patterns, gentle for flowing ones.
  const trailMap = { wave: 0.28, pulse: 0.16, lasers: 0.22, strobe: 0.55, spiral: 0.12, plasma: 1 };
  if (state.pattern === 'plasma') {
    // plasma fully repaints
  } else {
    fadeCanvas(trailMap[state.pattern] ?? 0.25);
  }

  (PatternFns[state.pattern] || PatternFns.wave)(state.time, b, e);

  updateParticles(dt);
  drawParticles();

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

/* =========================================================================
   UI WIRING
   ========================================================================= */
const PATTERN_LIST = [
  { id: 'wave',   name: 'Wave',   ico: '〜' },
  { id: 'pulse',  name: 'Pulse',  ico: '◎' },
  { id: 'lasers', name: 'Lasers', ico: '✦' },
  { id: 'strobe', name: 'Strobe', ico: '▦' },
  { id: 'spiral', name: 'Spiral', ico: '✺' },
  { id: 'plasma', name: 'Plasma', ico: '≋' },
];

const patternsEl = document.getElementById('patterns');
PATTERN_LIST.forEach(p => {
  const btn = document.createElement('button');
  btn.className = 'pat-btn' + (p.id === state.pattern ? ' active' : '');
  btn.dataset.id = p.id;
  btn.innerHTML = `<span class="ico">${p.ico}</span>${p.name}`;
  btn.addEventListener('click', () => setPattern(p.id));
  patternsEl.appendChild(btn);
});
function setPattern(id) {
  state.pattern = id;
  document.querySelectorAll('.pat-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.id === id));
}
function cyclePattern() {
  const idx = PATTERN_LIST.findIndex(p => p.id === state.pattern);
  setPattern(PATTERN_LIST[(idx + 1) % PATTERN_LIST.length].id);
}

const palettesEl = document.getElementById('palettes');
PALETTES.forEach((p, i) => {
  const sw = document.createElement('div');
  sw.className = 'swatch' + (i === state.palette ? ' active' : '');
  sw.title = p.name;
  sw.style.background = `linear-gradient(135deg, ${p.colors.join(',')})`;
  sw.dataset.i = i;
  sw.addEventListener('click', () => setPalette(i));
  palettesEl.appendChild(sw);
});
function setPalette(i) {
  state.palette = i;
  document.querySelectorAll('.swatch').forEach((s, idx) =>
    s.classList.toggle('active', idx === i));
}
function cyclePalette() { setPalette((state.palette + 1) % PALETTES.length); }

// sliders
const speedEl = document.getElementById('speed');
const speedVal = document.getElementById('speedVal');
speedEl.addEventListener('input', () => {
  state.speed = parseFloat(speedEl.value);
  speedVal.textContent = state.speed.toFixed(1) + '×';
});
const intEl = document.getElementById('intensity');
const intVal = document.getElementById('intVal');
intEl.addEventListener('input', () => {
  state.intensity = parseInt(intEl.value) / 100;
  intVal.textContent = intEl.value + '%';
});
const reactEl = document.getElementById('react');
const reactVal = document.getElementById('reactVal');
reactEl.addEventListener('input', () => {
  state.reactivity = parseInt(reactEl.value) / 100;
  reactVal.textContent = reactEl.value + '%';
});

// music demo
const musicBtn = document.getElementById('musicBtn');
musicBtn.addEventListener('click', () => {
  if (Audio.demoOn) {
    Audio.stopDemo();
    musicBtn.classList.remove('on');
    musicBtn.textContent = '♫ Start Demo Beat';
    toast('Demo beat stopped');
  } else {
    if (Audio.micOn) { Audio.stopMic(); micBtn.classList.remove('on'); micBtn.textContent = '🎤 Use Mic'; }
    Audio.startDemo();
    musicBtn.classList.add('on');
    musicBtn.textContent = '■ Stop Demo Beat';
    toast('▶ Demo track playing — lights synced');
  }
});

// mic
const micBtn = document.getElementById('micBtn');
micBtn.addEventListener('click', async () => {
  if (Audio.micOn) {
    Audio.stopMic();
    micBtn.classList.remove('on');
    micBtn.textContent = '🎤 Use Mic';
    toast('Microphone off');
  } else {
    toast('Requesting microphone…');
    const ok = await Audio.startMic();
    if (ok) {
      if (Audio.demoOn) { Audio.stopDemo(); musicBtn.classList.remove('on'); musicBtn.textContent = '♫ Start Demo Beat'; }
      micBtn.classList.add('on');
      micBtn.textContent = '■ Stop Mic';
      micBtn.classList.add('primary');
      toast('🎤 Listening — play music near your device!');
    } else {
      toast('Microphone unavailable');
    }
  }
});

// auto DJ
const autoBtn = document.getElementById('autoBtn');
autoBtn.addEventListener('click', () => {
  state.autoDJ = !state.autoDJ;
  state.autoTimer = 0;
  autoBtn.classList.toggle('on', state.autoDJ);
  autoBtn.classList.toggle('primary', state.autoDJ);
  toast(state.autoDJ ? '✨ Auto-DJ on — cycling the show' : 'Auto-DJ off');
});

// fullscreen
const fsBtn = document.getElementById('fsBtn');
fsBtn.addEventListener('click', () => {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
  else document.exitFullscreen?.();
});

// collapse panel
const panel = document.getElementById('panel');
document.getElementById('collapseBtn').addEventListener('click', () => {
  panel.classList.toggle('collapsed');
});

// tap to burst
function pointerBurst(e) {
  if (e.target.closest('#panel') || e.target.closest('#beatRing')) return;
  const x = (e.touches ? e.touches[0].clientX : e.clientX);
  const y = (e.touches ? e.touches[0].clientY : e.clientY);
  spawnBurst(x, y);
}
canvas.addEventListener('pointerdown', pointerBurst);

// keyboard shortcuts
window.addEventListener('keydown', (e) => {
  if (e.key === ' ') { e.preventDefault(); cyclePattern(); }
  else if (e.key >= '1' && e.key <= '6') setPattern(PATTERN_LIST[+e.key - 1].id);
  else if (e.key.toLowerCase() === 'c') cyclePalette();
  else if (e.key.toLowerCase() === 'h') panel.classList.toggle('collapsed');
});

// toast helper
const toastEl = document.getElementById('toast');
let toastTimer;
function toast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2200);
}

// show hint briefly
const hintEl = document.getElementById('hint');
setTimeout(() => { hintEl.style.opacity = '0.8'; }, 1200);
setTimeout(() => { hintEl.style.opacity = '0'; }, 6000);

// welcome
setTimeout(() => toast('Welcome! Tap ♫ for music · click anywhere for bursts'), 600);
</script>
</body>
