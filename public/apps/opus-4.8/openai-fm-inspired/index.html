<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Voice.fm — Text-to-Speech Playground</title>
<style>
  :root {
    --bg: #f4f1ea;
    --bg-card: #ffffff;
    --ink: #11110f;
    --ink-soft: #6b6860;
    --line: #e3dfd4;
    --line-strong: #d3cdbf;
    --accent: #11110f;
    --radius: 18px;
    --shadow: 0 1px 2px rgba(0,0,0,.04), 0 8px 28px -12px rgba(0,0,0,.12);
    --mono: "SF Mono", ui-monospace, "Cascadia Code", Menlo, Consolas, monospace;
    --sans: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    min-height: 100vh;
    background-image:
      radial-gradient(circle at 18% 12%, rgba(255,180,90,.10), transparent 42%),
      radial-gradient(circle at 84% 8%, rgba(120,150,255,.10), transparent 40%),
      radial-gradient(circle at 50% 100%, rgba(255,120,170,.08), transparent 55%);
  }

  /* ---------- Layout ---------- */
  .wrap { max-width: 1120px; margin: 0 auto; padding: 26px 22px 80px; }

  header.top {
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; margin-bottom: 26px;
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .logo {
    width: 38px; height: 38px; border-radius: 11px;
    background: var(--ink); color: #fff;
    display: grid; place-items: center; flex: none;
    box-shadow: var(--shadow);
  }
  .logo svg { width: 20px; height: 20px; }
  .brand h1 { font-size: 18px; margin: 0; letter-spacing: -.02em; font-weight: 650; }
  .brand .tag { font-size: 12px; color: var(--ink-soft); margin-top: 1px; }

  .top-actions { display: flex; gap: 9px; align-items: center; }
  .ghost-btn {
    font-family: var(--sans); font-size: 13px; font-weight: 550;
    border: 1px solid var(--line-strong); background: var(--bg-card);
    color: var(--ink); padding: 9px 14px; border-radius: 11px; cursor: pointer;
    display: inline-flex; align-items: center; gap: 7px;
    transition: transform .12s ease, box-shadow .15s ease, background .15s;
  }
  .ghost-btn:hover { transform: translateY(-1px); box-shadow: var(--shadow); }
  .ghost-btn:active { transform: translateY(0); }
  .ghost-btn svg { width: 15px; height: 15px; }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1.18fr;
    gap: 20px;
    align-items: start;
  }
  @media (max-width: 880px) { .grid { grid-template-columns: 1fr; } }

  .card {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
  }
  .card-pad { padding: 20px; }

  .sect-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: .14em;
    color: var(--ink-soft); font-weight: 650; margin: 0 0 13px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .sect-label .hint { text-transform: none; letter-spacing: 0; font-weight: 500; font-size: 11px; }

  /* ---------- Voice picker ---------- */
  .voices { display: grid; grid-template-columns: repeat(2, 1fr); gap: 9px; }
  .voice {
    position: relative; text-align: left; cursor: pointer;
    border: 1px solid var(--line); background: #fbfaf6; border-radius: 13px;
    padding: 12px 13px; display: flex; align-items: center; gap: 11px;
    transition: border-color .15s, background .15s, transform .12s;
  }
  .voice:hover { transform: translateY(-1px); border-color: var(--line-strong); }
  .voice.active { border-color: var(--ink); background: #fff; box-shadow: 0 0 0 1px var(--ink); }
  .voice .swatch {
    width: 30px; height: 30px; border-radius: 9px; flex: none;
    display: grid; place-items: center; font-size: 15px;
    background: var(--vc, #ddd);
  }
  .voice .vmeta { min-width: 0; }
  .voice .vname { font-size: 13.5px; font-weight: 600; letter-spacing: -.01em; }
  .voice .vdesc { font-size: 11px; color: var(--ink-soft); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .voice .check {
    position: absolute; top: 8px; right: 9px; width: 14px; height: 14px;
    opacity: 0; transition: opacity .15s; color: var(--ink);
  }
  .voice.active .check { opacity: 1; }

  /* ---------- Vibe chips ---------- */
  .chips { display: flex; flex-wrap: wrap; gap: 7px; }
  .chip {
    font-family: var(--sans); font-size: 12.5px; font-weight: 550;
    border: 1px solid var(--line-strong); background: #fbfaf6; color: var(--ink);
    padding: 7px 12px; border-radius: 999px; cursor: pointer;
    transition: background .14s, border-color .14s, transform .1s, color .14s;
  }
  .chip:hover { transform: translateY(-1px); }
  .chip.active { background: var(--ink); color: #fff; border-color: var(--ink); }

  /* ---------- Sliders ---------- */
  .controls { display: grid; gap: 16px; }
  .ctl-row { display: grid; gap: 7px; }
  .ctl-head { display: flex; justify-content: space-between; align-items: baseline; }
  .ctl-name { font-size: 12.5px; font-weight: 600; }
  .ctl-val { font-size: 12px; color: var(--ink-soft); font-family: var(--mono); }
  input[type=range] {
    -webkit-appearance: none; appearance: none; width: 100%; height: 4px;
    background: var(--line-strong); border-radius: 999px; outline: none; cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none; width: 17px; height: 17px;
    border-radius: 50%; background: #fff; border: 1px solid var(--line-strong);
    box-shadow: 0 1px 3px rgba(0,0,0,.18); cursor: grab;
    transition: transform .1s;
  }
  input[type=range]::-webkit-slider-thumb:active { transform: scale(1.12); cursor: grabbing; }
  input[type=range]::-moz-range-thumb {
    width: 17px; height: 17px; border-radius: 50%; background: #fff;
    border: 1px solid var(--line-strong); box-shadow: 0 1px 3px rgba(0,0,0,.18); cursor: grab;
  }

  /* ---------- Script editor ---------- */
  .script-card { display: flex; flex-direction: column; min-height: 460px; }
  .editor-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px; border-bottom: 1px solid var(--line);
  }
  .editor-head .lbl { font-size: 11px; text-transform: uppercase; letter-spacing: .14em; color: var(--ink-soft); font-weight: 650; }
  .editor-head .count { font-size: 11px; color: var(--ink-soft); font-family: var(--mono); }
  .vibe-note {
    margin: 0; padding: 11px 18px; background: #faf7ef;
    border-bottom: 1px solid var(--line);
    font-size: 12.5px; color: var(--ink-soft); line-height: 1.5;
  }
  .vibe-note b { color: var(--ink); font-weight: 600; }
  textarea.script {
    flex: 1; resize: none; border: 0; outline: none; width: 100%;
    padding: 18px; font-family: var(--sans); font-size: 16px; line-height: 1.62;
    color: var(--ink); background: transparent; letter-spacing: -.005em;
  }
  textarea.script::placeholder { color: #b8b3a6; }

  /* ---------- Waveform + transport ---------- */
  .transport {
    border-top: 1px solid var(--line);
    padding: 16px 18px;
    display: flex; align-items: center; gap: 14px;
  }
  .play-btn {
    flex: none; width: 52px; height: 52px; border-radius: 50%;
    border: 0; background: var(--ink); color: #fff; cursor: pointer;
    display: grid; place-items: center;
    box-shadow: 0 6px 18px -6px rgba(0,0,0,.5);
    transition: transform .14s ease, box-shadow .14s;
  }
  .play-btn:hover { transform: scale(1.05); }
  .play-btn:active { transform: scale(.96); }
  .play-btn svg { width: 22px; height: 22px; }
  .wave-host { flex: 1; height: 52px; position: relative; }
  canvas.wave { width: 100%; height: 100%; display: block; }
  .timecode { font-family: var(--mono); font-size: 12px; color: var(--ink-soft); flex: none; min-width: 42px; text-align: right; }

  .footer-actions { display: flex; gap: 9px; padding: 0 18px 16px; }
  .footer-actions .ghost-btn { flex: 1; justify-content: center; }
  .footer-actions .primary { background: var(--ink); color: #fff; border-color: var(--ink); }

  /* toast */
  .toast {
    position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--ink); color: #fff; padding: 11px 18px; border-radius: 12px;
    font-size: 13px; font-weight: 500; box-shadow: var(--shadow);
    opacity: 0; pointer-events: none; transition: opacity .25s, transform .25s; z-index: 50;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .speaking-dot {
    display: inline-block; width: 7px; height: 7px; border-radius: 50%;
    background: #d33; margin-left: 8px; vertical-align: middle;
    animation: pulse 1.1s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:.35; transform: scale(.85);} 50%{opacity:1; transform: scale(1.15);} }

  .kbd { font-family: var(--mono); font-size: 10.5px; background: var(--line); padding: 1px 5px; border-radius: 5px; color: var(--ink-soft); }

  a.fineprint { color: var(--ink-soft); text-decoration: none; border-bottom: 1px solid var(--line-strong); }
  .credit { text-align: center; margin-top: 34px; font-size: 12px; color: var(--ink-soft); }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="brand">
      <div class="logo" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M3 12h2l2-5 3 12 3-16 3 12 2-3h3"/>
        </svg>
      </div>
      <div>
        <h1>Voice<span style="opacity:.45">.fm</span></h1>
        <div class="tag">A text-to-speech playground</div>
      </div>
    </div>
    <div class="top-actions">
      <button class="ghost-btn" id="randomBtn" title="Randomize everything">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3h5v5"/><path d="M4 20 21 3"/><path d="M21 16v5h-5"/><path d="m15 15 6 6"/><path d="M4 4l5 5"/></svg>
        Randomize
      </button>
      <button class="ghost-btn" id="shareBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="m8.6 13.5 6.8 4M15.4 6.5 8.6 10.5"/></svg>
        Share
      </button>
    </div>
  </header>

  <div class="grid">
    <!-- LEFT COLUMN -->
    <div style="display:grid; gap:20px;">
      <section class="card card-pad">
        <p class="sect-label">Voice <span class="hint">choose a speaker</span></p>
        <div class="voices" id="voiceList"></div>
      </section>

      <section class="card card-pad">
        <p class="sect-label">Vibe <span class="hint">shapes tone &amp; delivery</span></p>
        <div class="chips" id="vibeChips"></div>
      </section>

      <section class="card card-pad">
        <p class="sect-label">Delivery</p>
        <div class="controls">
          <div class="ctl-row">
            <div class="ctl-head"><span class="ctl-name">Speed</span><span class="ctl-val" id="rateVal">1.00×</span></div>
            <input type="range" id="rate" min="0.5" max="1.8" step="0.05" value="1">
          </div>
          <div class="ctl-row">
            <div class="ctl-head"><span class="ctl-name">Pitch</span><span class="ctl-val" id="pitchVal">+0</span></div>
            <input type="range" id="pitch" min="0.4" max="1.8" step="0.05" value="1">
          </div>
          <div class="ctl-row">
            <div class="ctl-head"><span class="ctl-name">Volume</span><span class="ctl-val" id="volVal">100%</span></div>
            <input type="range" id="vol" min="0" max="1" step="0.05" value="1">
          </div>
        </div>
      </section>
    </div>

    <!-- RIGHT COLUMN -->
    <section class="card script-card">
      <div class="editor-head">
        <span class="lbl">Script <span id="liveDot"></span></span>
        <span class="count" id="charCount">0 chars</span>
      </div>
      <p class="vibe-note" id="vibeNote"></p>
      <textarea class="script" id="script" spellcheck="false" placeholder="Type something for the voice to say…"></textarea>

      <div class="transport">
        <button class="play-btn" id="playBtn" aria-label="Play">
          <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <div class="wave-host"><canvas class="wave" id="wave"></canvas></div>
        <span class="timecode" id="timecode">0:00</span>
      </div>

      <div class="footer-actions">
        <button class="ghost-btn primary" id="downloadBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12m0 0 4-4m-4 4-4-4"/><path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>
          Download script
        </button>
        <button class="ghost-btn" id="copyBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>
          Copy
        </button>
      </div>
    </section>
  </div>

  <p class="credit">
    Built with the Web Speech API · press <span class="kbd">⌘ / Ctrl + ⏎</span> to play ·
    inspired by <a class="fineprint" href="https://openai.fm" target="_blank" rel="noopener">openai.fm</a>
  </p>
</div>

<div class="toast" id="toast"></div>

<script>
(() => {
  "use strict";

  // ---------- Data ----------
  const VOICES = [
    { id: "alloy",   name: "Alloy",   desc: "Balanced & neutral",  emoji: "◐", color: "#cfe3ff", match: ["alex","daniel","male"] },
    { id: "aria",    name: "Aria",    desc: "Warm & expressive",   emoji: "✿", color: "#ffd9e6", match: ["samantha","victoria","female","aria"] },
    { id: "sage",    name: "Sage",    desc: "Calm & grounded",     emoji: "▲", color: "#d6f0d8", match: ["fred","daniel","tom"] },
    { id: "ember",   name: "Ember",   desc: "Bright & energetic",  emoji: "✦", color: "#ffe3b8", match: ["karen","moira","tessa","female"] },
    { id: "onyx",    name: "Onyx",    desc: "Deep & authoritative",emoji: "●", color: "#d8d4e8", match: ["daniel","oliver","rishi","male"] },
    { id: "lumen",   name: "Lumen",   desc: "Crisp & articulate",  emoji: "◇", color: "#cdeef0", match: ["serena","kate","female"] },
  ];

  const VIBES = [
    { id: "neutral",   label: "Neutral",       note: "Speak in a clear, natural, conversational tone.", rate: 1.0, pitch: 1.0 },
    { id: "calm",      label: "Calm",          note: "Speak slowly and gently, with a soothing, reassuring presence.", rate: 0.88, pitch: 0.95 },
    { id: "cheerful",  label: "Cheerful",      note: "Speak with bright energy and a warm, upbeat smile.", rate: 1.1, pitch: 1.18 },
    { id: "narrator",  label: "Storyteller",   note: "Speak like a documentary narrator — measured, vivid, drawing the listener in.", rate: 0.95, pitch: 0.9 },
    { id: "news",      label: "Newscaster",    note: "Speak with crisp, professional authority, as if reading the evening news.", rate: 1.05, pitch: 1.0 },
    { id: "whisper",   label: "Whisper",       note: "Speak softly and intimately, almost in a hush.", rate: 0.9, pitch: 1.05 },
    { id: "epic",      label: "Epic Trailer",  note: "Speak with dramatic, cinematic gravity. In a world… where every word lands.", rate: 0.82, pitch: 0.82 },
    { id: "robot",     label: "Robotic",       note: "Speak in a flat, mechanical, monotone cadence. Beep boop.", rate: 1.0, pitch: 0.7 },
  ];

  const SAMPLE_SCRIPTS = [
    "Hey there! Welcome to Voice dot fm — a little playground for turning text into speech. Pick a voice, choose a vibe, and press play to hear it come alive.",
    "In a world where words wait silently on the page… one playground dares to give them a voice. This summer.",
    "Good evening. Our top story tonight: a remarkably simple web app has been quietly delighting everyone who tries it. More after the break.",
    "Take a slow breath in… and gently let it go. You're doing just fine. There's nothing you need to do right now but listen.",
    "Once upon a time, in a quiet town tucked between two hills, there lived a clockmaker who could hear the future in the ticking of his gears."
  ];

  // ---------- State ----------
  let state = {
    voice: "alloy",
    vibe: "neutral",
    rate: 1.0,
    pitch: 1.0,
    vol: 1.0,
    text: SAMPLE_SCRIPTS[0],
  };
  let systemVoices = [];

  // ---------- DOM ----------
  const $ = (s) => document.querySelector(s);
  const voiceList = $("#voiceList");
  const vibeChips = $("#vibeChips");
  const scriptEl = $("#script");
  const vibeNote = $("#vibeNote");
  const charCount = $("#charCount");
  const rateEl = $("#rate"), pitchEl = $("#pitch"), volEl = $("#vol");
  const rateVal = $("#rateVal"), pitchVal = $("#pitchVal"), volVal = $("#volVal");
  const playBtn = $("#playBtn"), playIcon = $("#playIcon");
  const timecode = $("#timecode"), liveDot = $("#liveDot");
  const toastEl = $("#toast");

  // ---------- Render voices ----------
  function renderVoices() {
    voiceList.innerHTML = "";
    VOICES.forEach(v => {
      const el = document.createElement("button");
      el.className = "voice" + (v.id === state.voice ? " active" : "");
      el.style.setProperty("--vc", v.color);
      el.innerHTML = `
        <span class="swatch">${v.emoji}</span>
        <span class="vmeta">
          <span class="vname">${v.name}</span>
          <span class="vdesc">${v.desc}</span>
        </span>
        <svg class="check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>`;
      el.addEventListener("click", () => {
        state.voice = v.id;
        renderVoices();
        previewBlip();
      });
      voiceList.appendChild(el);
    });
  }

  // ---------- Render vibes ----------
  function renderVibes() {
    vibeChips.innerHTML = "";
    VIBES.forEach(vb => {
      const el = document.createElement("button");
      el.className = "chip" + (vb.id === state.vibe ? " active" : "");
      el.textContent = vb.label;
      el.addEventListener("click", () => {
        state.vibe = vb.id;
        state.rate = vb.rate; state.pitch = vb.pitch;
        syncSliders();
        renderVibes();
        updateVibeNote();
      });
      vibeChips.appendChild(el);
    });
  }

  function updateVibeNote() {
    const vb = VIBES.find(v => v.id === state.vibe);
    vibeNote.innerHTML = `<b>${vb.label}.</b> ${vb.note}`;
  }

  // ---------- Sliders ----------
  function syncSliders() {
    rateEl.value = state.rate; pitchEl.value = state.pitch; volEl.value = state.vol;
    rateVal.textContent = state.rate.toFixed(2) + "×";
    const semis = Math.round((state.pitch - 1) * 12);
    pitchVal.textContent = (semis >= 0 ? "+" : "") + semis;
    volVal.textContent = Math.round(state.vol * 100) + "%";
  }
  rateEl.addEventListener("input", e => { state.rate = +e.target.value; syncSliders(); });
  pitchEl.addEventListener("input", e => { state.pitch = +e.target.value; syncSliders(); });
  volEl.addEventListener("input", e => { state.vol = +e.target.value; syncSliders(); });

  // ---------- Script ----------
  scriptEl.value = state.text;
  function updateCount() {
    state.text = scriptEl.value;
    charCount.textContent = scriptEl.value.length + " chars";
  }
  scriptEl.addEventListener("input", updateCount);

  // ---------- Speech ----------
  const synth = window.speechSynthesis;
  let utter = null, speaking = false, startTime = 0, timerId = null;

  function loadSystemVoices() {
    systemVoices = synth ? synth.getVoices() : [];
  }
  if (synth) {
    loadSystemVoices();
    synth.onvoiceschanged = loadSystemVoices;
  }

  function pickSystemVoice(voiceDef) {
    if (!systemVoices.length) return null;
    const en = systemVoices.filter(v => /en[-_]/i.test(v.lang) || /^en/i.test(v.lang));
    const pool = en.length ? en : systemVoices;
    for (const key of voiceDef.match) {
      const hit = pool.find(v => v.name.toLowerCase().includes(key));
      if (hit) return hit;
    }
    // deterministic spread across available voices
    const idx = VOICES.findIndex(v => v.id === voiceDef.id);
    return pool[idx % pool.length] || pool[0];
  }

  function setPlaying(p) {
    speaking = p;
    playIcon.innerHTML = p
      ? '<rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/>'
      : '<path d="M8 5v14l11-7z"/>';
    liveDot.innerHTML = p ? '<span class="speaking-dot"></span>' : "";
  }

  function speak() {
    if (!synth) { toast("Speech synthesis isn't supported in this browser."); return; }
    if (speaking) { stopSpeak(); return; }
    const text = scriptEl.value.trim();
    if (!text) { toast("Write a script first ✍️"); pulseEditor(); return; }

    synth.cancel();
    utter = new SpeechSynthesisUtterance(text);
    const vdef = VOICES.find(v => v.id === state.voice);
    const sysVoice = pickSystemVoice(vdef);
    if (sysVoice) { utter.voice = sysVoice; utter.lang = sysVoice.lang; }
    utter.rate = clamp(state.rate, 0.1, 10);
    utter.pitch = clamp(state.pitch, 0, 2);
    utter.volume = state.vol;

    utter.onstart = () => { setPlaying(true); startTimer(); startWave(); };
    utter.onend = () => { finishSpeak(); };
    utter.onerror = () => { finishSpeak(); };
    utter.onboundary = () => { wave.energy = 1; }; // kick the waveform on each word

    synth.speak(utter);
  }

  function stopSpeak() { if (synth) synth.cancel(); finishSpeak(); }
  function finishSpeak() {
    setPlaying(false); stopTimer(); stopWave();
    timecode.textContent = "0:00";
  }

  function startTimer() {
    startTime = performance.now();
    stopTimer();
    timerId = setInterval(() => {
      const s = (performance.now() - startTime) / 1000;
      timecode.textContent = fmtTime(s);
    }, 200);
  }
  function stopTimer() { if (timerId) clearInterval(timerId); timerId = null; }

  playBtn.addEventListener("click", speak);

  // ---------- Waveform (canvas) ----------
  const canvas = $("#wave");
  const ctx = canvas.getContext("2d");
  let bars = [], dpr = Math.min(window.devicePixelRatio || 1, 2);
  const wave = { running: false, energy: 0, t: 0 };

  function resizeCanvas() {
    const r = canvas.getBoundingClientRect();
    canvas.width = Math.max(1, r.width * dpr);
    canvas.height = Math.max(1, r.height * dpr);
    const n = Math.max(24, Math.floor(r.width / 7));
    bars = new Array(n).fill(0).map(() => 0.12 + Math.random() * 0.08);
  }
  window.addEventListener("resize", resizeCanvas);

  function startWave() { wave.running = true; wave.energy = 1; if (!rafId) loop(); }
  function stopWave() { wave.running = false; }

  let rafId = null;
  function loop() {
    rafId = requestAnimationFrame(loop);
    wave.t += 0.05;
    wave.energy *= 0.92;
    drawWave();
    // keep idling a bit then stop the RAF to save cycles
    if (!wave.running && wave.energy < 0.02) {
      cancelAnimationFrame(rafId); rafId = null;
      drawIdle();
    }
  }

  function drawWave() {
    const W = canvas.width, H = canvas.height;
    ctx.clearRect(0, 0, W, H);
    const mid = H / 2;
    const n = bars.length;
    const gap = 3 * dpr;
    const bw = (W - gap * (n - 1)) / n;

    for (let i = 0; i < n; i++) {
      // synthesize a lively, voice-like envelope
      const wob = Math.sin(wave.t * 2.1 + i * 0.55) * 0.5 + 0.5;
      const wob2 = Math.sin(wave.t * 0.9 - i * 0.27) * 0.5 + 0.5;
      const envelope = Math.sin((i / n) * Math.PI); // taper at edges
      let target = wave.running
        ? (0.12 + (wob * 0.6 + wob2 * 0.4) * wave.energy * envelope * 0.9 + Math.random() * 0.08 * wave.energy)
        : 0.12 + Math.sin(wave.t + i * 0.4) * 0.02;
      bars[i] += (target - bars[i]) * 0.35;

      const h = Math.max(2 * dpr, bars[i] * (H * 0.92));
      const x = i * (bw + gap);
      const y = mid - h / 2;
      const lit = wave.running && bars[i] > 0.22;
      ctx.fillStyle = lit ? "#11110f" : "#cfc9bb";
      roundRect(ctx, x, y, bw, h, Math.min(bw / 2, 3 * dpr));
      ctx.fill();
    }
  }

  function drawIdle() {
    const W = canvas.width, H = canvas.height, mid = H / 2;
    ctx.clearRect(0, 0, W, H);
    const n = bars.length, gap = 3 * dpr, bw = (W - gap * (n - 1)) / n;
    for (let i = 0; i < n; i++) {
      const h = 2.4 * dpr;
      ctx.fillStyle = "#d6d0c2";
      roundRect(ctx, i * (bw + gap), mid - h / 2, bw, h, h / 2);
      ctx.fill();
    }
  }

  function roundRect(c, x, y, w, h, r) {
    r = Math.min(r, w / 2, h / 2);
    c.beginPath();
    c.moveTo(x + r, y);
    c.arcTo(x + w, y, x + w, y + h, r);
    c.arcTo(x + w, y + h, x, y + h, r);
    c.arcTo(x, y + h, x, y, r);
    c.arcTo(x, y, x + w, y, r);
    c.closePath();
  }

  // tiny visual blip when selecting a voice
  function previewBlip() { wave.energy = 0.7; if (!rafId) loop(); setTimeout(() => { if (!wave.running) wave.energy = 0.4; }, 60); }

  // ---------- Buttons ----------
  $("#randomBtn").addEventListener("click", () => {
    state.voice = VOICES[Math.floor(Math.random() * VOICES.length)].id;
    const vb = VIBES[Math.floor(Math.random() * VIBES.length)];
    state.vibe = vb.id; state.rate = vb.rate; state.pitch = vb.pitch;
    scriptEl.value = SAMPLE_SCRIPTS[Math.floor(Math.random() * SAMPLE_SCRIPTS.length)];
    updateCount(); renderVoices(); renderVibes(); updateVibeNote(); syncSliders();
    previewBlip();
    toast("🎲 Randomized");
  });

  $("#copyBtn").addEventListener("click", async () => {
    try { await navigator.clipboard.writeText(scriptEl.value); toast("Copied to clipboard ✓"); }
    catch { toast("Couldn't copy"); }
  });

  $("#downloadBtn").addEventListener("click", () => {
    const vdef = VOICES.find(v => v.id === state.voice);
    const vb = VIBES.find(v => v.id === state.vibe);
    const content =
`Voice.fm script
================
Voice : ${vdef.name} (${vdef.desc})
Vibe  : ${vb.label} — ${vb.note}
Speed : ${state.rate.toFixed(2)}x   Pitch: ${state.pitch.toFixed(2)}   Volume: ${Math.round(state.vol*100)}%

---
${scriptEl.value}
`;
    const blob = new Blob([content], { type: "text/plain" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "voicefm-script.txt";
    a.click();
    URL.revokeObjectURL(a.href);
    toast("Downloaded ⬇");
  });

  $("#shareBtn").addEventListener("click", async () => {
    const params = new URLSearchParams({
      v: state.voice, vibe: state.vibe,
      r: state.rate, p: state.pitch, vol: state.vol,
      t: scriptEl.value
    });
    const url = location.origin + location.pathname + "#" + params.toString();
    try {
      if (navigator.share && location.protocol.startsWith("http")) {
        await navigator.share({ title: "Voice.fm", text: "Listen to this on Voice.fm", url });
      } else {
        await navigator.clipboard.writeText(url);
        toast("Share link copied 🔗");
      }
    } catch {
      try { await navigator.clipboard.writeText(url); toast("Share link copied 🔗"); }
      catch { toast("Share link: " + url.slice(0, 40) + "…"); }
    }
  });

  // ---------- Restore from hash ----------
  function restoreFromHash() {
    if (!location.hash || location.hash.length < 2) return;
    try {
      const p = new URLSearchParams(location.hash.slice(1));
      if (p.get("v") && VOICES.some(v => v.id === p.get("v"))) state.voice = p.get("v");
      if (p.get("vibe") && VIBES.some(v => v.id === p.get("vibe"))) state.vibe = p.get("vibe");
      if (p.get("r")) state.rate = clamp(+p.get("r"), 0.5, 1.8);
      if (p.get("p")) state.pitch = clamp(+p.get("p"), 0.4, 1.8);
      if (p.get("vol")) state.vol = clamp(+p.get("vol"), 0, 1);
      if (p.get("t")) { state.text = p.get("t"); scriptEl.value = p.get("t"); }
    } catch (e) {}
  }

  // ---------- Helpers ----------
  function clamp(v, a, b) { v = +v; if (isNaN(v)) return a; return Math.max(a, Math.min(b, v)); }
  function fmtTime(s) { const m = Math.floor(s / 60); const r = Math.floor(s % 60); return m + ":" + String(r).padStart(2, "0"); }
  let toastTimer = null;
  function toast(msg) {
    toastEl.textContent = msg; toastEl.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove("show"), 2000);
  }
  function pulseEditor() {
    scriptEl.style.transition = "background .2s";
    scriptEl.style.background = "rgba(255,120,120,.12)";
    setTimeout(() => scriptEl.style.background = "transparent", 260);
    scriptEl.focus();
  }

  // ---------- Keyboard ----------
  document.addEventListener("keydown", (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === "Enter") { e.preventDefault(); speak(); }
    if (e.key === " " && document.activeElement !== scriptEl &&
        document.activeElement.tagName !== "INPUT" && document.activeElement.tagName !== "TEXTAREA") {
      e.preventDefault(); speak();
    }
  });

  // stop speech if the page is hidden / unloaded
  window.addEventListener("beforeunload", () => synth && synth.cancel());

  // ---------- Init ----------
  restoreFromHash();
  renderVoices();
  renderVibes();
  updateVibeNote();
  syncSliders();
  updateCount();
  resizeCanvas();
  drawIdle();
})();
</script>
</body>
</html>
