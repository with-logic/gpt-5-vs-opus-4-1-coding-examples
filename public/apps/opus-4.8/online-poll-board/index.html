<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pollboard — Vote on what matters</title>
<style>
  :root {
    --bg: #fef6ff;
    --bg-2: #f3f0ff;
    --bg-3: #eafcff;
    --ink: #2b2342;
    --ink-soft: #6c6585;
    --card: #ffffff;
    --line: #efe9f6;
    --brand: #7c5cff;
    --brand-2: #ff5c98;
    --brand-3: #2dd4bf;
    --shadow: 0 18px 40px -22px rgba(80, 50, 160, 0.45);
    --shadow-soft: 0 8px 24px -16px rgba(80, 50, 160, 0.4);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  body {
    font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
    color: var(--ink);
    min-height: 100vh;
    background:
      radial-gradient(1200px 700px at 12% -8%, #ffe9f6 0%, rgba(255,233,246,0) 55%),
      radial-gradient(1000px 650px at 92% 0%, #e3f5ff 0%, rgba(227,245,255,0) 50%),
      radial-gradient(900px 700px at 50% 110%, #eaf7e9 0%, rgba(234,247,233,0) 55%),
      linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
    background-attachment: fixed;
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
  }

  /* floating decorative blobs */
  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(8px);
    opacity: 0.5;
    pointer-events: none;
    z-index: 0;
    animation: float 16s ease-in-out infinite;
  }
  .blob.b1 { width: 120px; height: 120px; top: 14%; left: 6%; background: radial-gradient(circle at 30% 30%, #ffd1e8, #ffb3d9); }
  .blob.b2 { width: 80px; height: 80px; top: 70%; left: 10%; background: radial-gradient(circle at 30% 30%, #c9f7ef, #8fe9da); animation-delay: -4s; }
  .blob.b3 { width: 100px; height: 100px; top: 22%; right: 7%; background: radial-gradient(circle at 30% 30%, #d6ccff, #bda7ff); animation-delay: -8s; }
  .blob.b4 { width: 60px; height: 60px; top: 80%; right: 12%; background: radial-gradient(circle at 30% 30%, #ffe7bd, #ffd28a); animation-delay: -2s; }
  @keyframes float {
    0%, 100% { transform: translateY(0) translateX(0); }
    50% { transform: translateY(-26px) translateX(10px); }
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 880px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  /* Header */
  header.hero { text-align: center; margin-bottom: 30px; }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: rgba(255,255,255,0.7);
    border: 1px solid var(--line);
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    color: var(--brand);
    box-shadow: var(--shadow-soft);
    backdrop-filter: blur(6px);
  }
  .badge .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--brand-3);
    box-shadow: 0 0 0 0 rgba(45,212,191,0.6);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(45,212,191,0.55); }
    70% { box-shadow: 0 0 0 10px rgba(45,212,191,0); }
    100% { box-shadow: 0 0 0 0 rgba(45,212,191,0); }
  }
  h1 {
    font-size: clamp(34px, 6vw, 52px);
    margin: 16px 0 8px;
    letter-spacing: -1.4px;
    line-height: 1.05;
    background: linear-gradient(110deg, var(--brand) 0%, var(--brand-2) 55%, #ff9d5c 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    font-weight: 800;
  }
  .sub { color: var(--ink-soft); font-size: 17px; max-width: 520px; margin: 0 auto; }

  .stats-row {
    display: flex;
    justify-content: center;
    gap: 28px;
    margin-top: 22px;
    flex-wrap: wrap;
  }
  .stat { text-align: center; }
  .stat .num { font-size: 24px; font-weight: 800; color: var(--ink); }
  .stat .lab { font-size: 12px; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.6px; }

  /* Filter pills */
  .filters {
    display: flex;
    gap: 9px;
    justify-content: center;
    flex-wrap: wrap;
    margin: 28px 0 24px;
  }
  .pill {
    border: 1px solid var(--line);
    background: rgba(255,255,255,0.7);
    color: var(--ink-soft);
    padding: 8px 16px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    backdrop-filter: blur(6px);
  }
  .pill:hover { transform: translateY(-1px); color: var(--ink); }
  .pill.active {
    background: linear-gradient(120deg, var(--brand), var(--brand-2));
    color: #fff;
    border-color: transparent;
    box-shadow: var(--shadow-soft);
  }

  /* Poll cards */
  .polls { display: grid; gap: 22px; }

  .poll {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 22px;
    padding: 24px 24px 20px;
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
    animation: rise 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) both;
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .poll::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--brand), var(--brand-2), var(--brand-3));
    opacity: 0.9;
  }

  .poll-head { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 6px; }
  .emoji {
    font-size: 30px;
    width: 54px; height: 54px;
    display: grid; place-items: center;
    background: var(--bg-2);
    border-radius: 16px;
    flex-shrink: 0;
  }
  .poll-title-group { flex: 1; min-width: 0; }
  .poll h2 { font-size: 20px; margin: 2px 0 4px; letter-spacing: -0.4px; }
  .poll .tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--brand);
    background: var(--bg-2);
    padding: 3px 9px;
    border-radius: 999px;
  }
  .poll .meta { font-size: 13px; color: var(--ink-soft); margin-top: 6px; }

  .options { margin-top: 18px; display: grid; gap: 11px; }

  .option {
    position: relative;
    border: 1.5px solid var(--line);
    border-radius: 14px;
    padding: 13px 16px;
    cursor: pointer;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.12s, box-shadow 0.2s;
    background: #fff;
    user-select: none;
  }
  .option:hover { border-color: #d9ccff; transform: translateY(-1px); box-shadow: var(--shadow-soft); }
  .option:active { transform: translateY(0); }

  /* the animated fill bar (hidden until voted) */
  .fill {
    position: absolute;
    inset: 0;
    width: 0%;
    background: linear-gradient(90deg, rgba(124,92,255,0.16), rgba(255,92,152,0.14));
    transition: width 1.1s cubic-bezier(0.22, 1, 0.36, 1);
    z-index: 0;
  }
  .option.leader .fill {
    background: linear-gradient(90deg, rgba(124,92,255,0.26), rgba(45,212,191,0.20));
  }
  .opt-row {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .opt-left { display: flex; align-items: center; gap: 11px; min-width: 0; }
  .opt-dot {
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 2px solid #cfc4e8;
    flex-shrink: 0;
    display: grid; place-items: center;
    transition: all 0.2s;
  }
  .option.chosen .opt-dot {
    border-color: var(--brand);
    background: var(--brand);
  }
  .opt-dot svg { opacity: 0; transform: scale(0.4); transition: all 0.2s; }
  .option.chosen .opt-dot svg { opacity: 1; transform: scale(1); }
  .opt-label { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .opt-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

  .pct {
    font-weight: 800;
    font-size: 15px;
    font-variant-numeric: tabular-nums;
    color: var(--ink);
    opacity: 0;
    transform: translateX(6px);
    transition: opacity 0.4s, transform 0.4s;
    min-width: 42px;
    text-align: right;
  }
  .votes-count {
    font-size: 12px;
    color: var(--ink-soft);
    font-variant-numeric: tabular-nums;
    opacity: 0;
    transition: opacity 0.4s;
  }
  .poll.voted .pct,
  .poll.voted .votes-count { opacity: 1; transform: none; }

  .leader-badge {
    display: none;
    font-size: 11px;
    font-weight: 700;
    color: var(--brand-3);
  }
  .poll.voted .option.leader .leader-badge { display: inline; }

  .poll-foot {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 16px;
    padding-top: 14px;
    border-top: 1px dashed var(--line);
    font-size: 13px;
    color: var(--ink-soft);
  }
  .total-votes { display: flex; align-items: center; gap: 6px; font-weight: 600; }
  .total-votes b { color: var(--ink); font-variant-numeric: tabular-nums; }
  .reset-btn {
    background: none;
    border: none;
    color: var(--brand);
    font-weight: 600;
    cursor: pointer;
    font-size: 13px;
    padding: 4px 8px;
    border-radius: 8px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s, background 0.2s;
  }
  .poll.voted .reset-btn { opacity: 1; pointer-events: auto; }
  .reset-btn:hover { background: var(--bg-2); }

  .voted-tag {
    display: none;
    align-items: center;
    gap: 5px;
    color: var(--brand-3);
    font-weight: 700;
  }
  .poll.voted .voted-tag { display: inline-flex; }
  .poll.voted .live-hint { display: none; }

  footer {
    text-align: center;
    margin-top: 50px;
    color: var(--ink-soft);
    font-size: 13px;
  }
  footer .heart { color: var(--brand-2); }

  /* tiny confetti */
  .confetti-piece {
    position: fixed;
    width: 9px; height: 14px;
    z-index: 50;
    pointer-events: none;
    will-change: transform, opacity;
  }

  @media (max-width: 520px) {
    .stats-row { gap: 18px; }
    .poll { padding: 20px 16px 16px; }
    .emoji { width: 46px; height: 46px; font-size: 26px; }
  }
</style>
</head>
<body>
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>
  <div class="blob b4"></div>

  <div class="wrap">
    <header class="hero">
      <span class="badge"><span class="dot"></span> Live community voting</span>
      <h1>Pollboard</h1>
      <p class="sub">Cast your vote on the topics everyone's talking about. Watch the results bloom in real time.</p>
      <div class="stats-row">
        <div class="stat"><div class="num" id="totalPolls">0</div><div class="lab">Polls</div></div>
        <div class="stat"><div class="num" id="totalVotes">0</div><div class="lab">Total votes</div></div>
        <div class="stat"><div class="num" id="yourVotes">0</div><div class="lab">Your votes</div></div>
      </div>
    </header>

    <div class="filters" id="filters"></div>
    <div class="polls" id="polls"></div>

    <footer>Made with <span class="heart">♥</span> for people who love a good debate · <span id="liveStamp"></span></footer>
  </div>

<script>
  const POLLS = [
    {
      id: "lang", emoji: "💻", tag: "Tech", title: "Best language to learn in 2026?",
      options: [
        { label: "Python", votes: 4821 },
        { label: "Rust", votes: 3960 },
        { label: "TypeScript", votes: 4503 },
        { label: "Go", votes: 2740 },
      ],
    },
    {
      id: "coffee", emoji: "☕", tag: "Lifestyle", title: "How do you take your coffee?",
      options: [
        { label: "Black, no sugar", votes: 2210 },
        { label: "Latte / cappuccino", votes: 3890 },
        { label: "Cold brew", votes: 1670 },
        { label: "I'm a tea person", votes: 1430 },
      ],
    },
    {
      id: "work", emoji: "🏠", tag: "Work", title: "Where do you do your best work?",
      options: [
        { label: "Fully remote", votes: 5120 },
        { label: "Hybrid", votes: 4380 },
        { label: "In the office", votes: 1290 },
      ],
    },
    {
      id: "weekend", emoji: "🌄", tag: "Fun", title: "Ideal weekend escape?",
      options: [
        { label: "Beach & sunshine", votes: 3340 },
        { label: "Mountains & trails", votes: 3110 },
        { label: "City adventure", votes: 2480 },
        { label: "Cozy at home", votes: 2890 },
      ],
    },
    {
      id: "ai", emoji: "🤖", tag: "Tech", title: "AI in daily life: how do you feel?",
      options: [
        { label: "Excited — bring it on", votes: 4670 },
        { label: "Cautiously optimistic", votes: 5230 },
        { label: "A little nervous", votes: 1980 },
      ],
    },
    {
      id: "pizza", emoji: "🍕", tag: "Fun", title: "Pineapple on pizza?",
      options: [
        { label: "Absolutely yes", votes: 3420 },
        { label: "Never in a million years", votes: 3380 },
      ],
    },
  ];

  const CATEGORIES = ["All", "Tech", "Lifestyle", "Work", "Fun"];

  const STORE_KEY = "pollboard_votes_v1";
  let myVotes = {};
  try { myVotes = JSON.parse(localStorage.getItem(STORE_KEY)) || {}; } catch (e) { myVotes = {}; }

  let activeFilter = "All";

  const $polls = document.getElementById("polls");
  const $filters = document.getElementById("filters");
  const checkSvg = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#fff" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/></svg>';

  function pollTotal(p) { return p.options.reduce((s, o) => s + o.votes, 0); }
  function fmt(n) { return n.toLocaleString("en-US"); }

  function buildFilters() {
    CATEGORIES.forEach(cat => {
      const b = document.createElement("button");
      b.className = "pill" + (cat === activeFilter ? " active" : "");
      b.textContent = cat;
      b.onclick = () => {
        activeFilter = cat;
        [...$filters.children].forEach(c => c.classList.toggle("active", c.textContent === cat));
        renderPolls();
      };
      $filters.appendChild(b);
    });
  }

  function renderPolls() {
    $polls.innerHTML = "";
    const list = POLLS.filter(p => activeFilter === "All" || p.tag === activeFilter);
    list.forEach((p, i) => {
      const el = buildPoll(p);
      el.style.animationDelay = (i * 0.06) + "s";
      $polls.appendChild(el);
    });
  }

  function buildPoll(p) {
    const voted = myVotes[p.id] !== undefined;
    const total = pollTotal(p);
    const maxVotes = Math.max(...p.options.map(o => o.votes));

    const card = document.createElement("div");
    card.className = "poll" + (voted ? " voted" : "");
    card.dataset.id = p.id;

    card.innerHTML = `
      <div class="poll-head">
        <div class="emoji">${p.emoji}</div>
        <div class="poll-title-group">
          <span class="tag">${p.tag}</span>
          <h2>${p.title}</h2>
          <div class="meta"><span class="live-hint">👆 Tap an option to vote</span>
            <span class="voted-tag">✓ Thanks — your vote is counted</span></div>
        </div>
      </div>
      <div class="options"></div>
      <div class="poll-foot">
        <span class="total-votes">📊 <b class="tv">${fmt(total)}</b> votes</span>
        <button class="reset-btn">↺ Change my vote</button>
      </div>
    `;

    const optWrap = card.querySelector(".options");
    p.options.forEach((o, idx) => {
      const chosen = myVotes[p.id] === idx;
      const isLeader = voted && o.votes === maxVotes;
      const pct = total ? Math.round((o.votes / total) * 100) : 0;

      const opt = document.createElement("div");
      opt.className = "option" + (chosen ? " chosen" : "") + (isLeader ? " leader" : "");
      opt.dataset.idx = idx;
      opt.innerHTML = `
        <div class="fill" style="width:${voted ? pct : 0}%"></div>
        <div class="opt-row">
          <div class="opt-left">
            <span class="opt-dot">${checkSvg}</span>
            <span class="opt-label">${o.label}</span>
          </div>
          <div class="opt-right">
            <span class="leader-badge">🏆 Leading</span>
            <span class="votes-count">${fmt(o.votes)}</span>
            <span class="pct" data-pct="${pct}">${pct}%</span>
          </div>
        </div>
      `;
      opt.addEventListener("click", () => onVote(p, idx, card));
      optWrap.appendChild(opt);
    });

    card.querySelector(".reset-btn").addEventListener("click", (e) => {
      e.stopPropagation();
      resetVote(p, card);
    });

    return card;
  }

  function onVote(p, idx, card) {
    const prev = myVotes[p.id];
    if (prev === idx) return; // already chose this one

    // remove previous vote count if switching
    if (prev !== undefined) p.options[prev].votes -= 1;
    p.options[idx].votes += 1;
    myVotes[p.id] = idx;
    persist();

    const firstTime = prev === undefined;
    animateResults(p, card);

    if (firstTime) {
      const opt = card.querySelector(`.option[data-idx="${idx}"]`);
      burstConfetti(opt);
    }
    updateStats();
  }

  function resetVote(p, card) {
    const prev = myVotes[p.id];
    if (prev !== undefined) {
      p.options[prev].votes -= 1;
      delete myVotes[p.id];
      persist();
    }
    // rebuild this card in unvoted state
    const fresh = buildPoll(p);
    card.replaceWith(fresh);
    updateStats();
  }

  function animateResults(p, card) {
    card.classList.add("voted");
    const total = pollTotal(p);
    const maxVotes = Math.max(...p.options.map(o => o.votes));

    card.querySelectorAll(".option").forEach((opt) => {
      const idx = +opt.dataset.idx;
      const o = p.options[idx];
      const pct = total ? Math.round((o.votes / total) * 100) : 0;
      const isLeader = o.votes === maxVotes;

      opt.classList.toggle("chosen", myVotes[p.id] === idx);
      opt.classList.toggle("leader", isLeader);
      opt.querySelector(".fill").style.width = pct + "%";

      const pctEl = opt.querySelector(".pct");
      animateNumber(pctEl, +pctEl.dataset.pct || 0, pct, v => v + "%");
      pctEl.dataset.pct = pct;

      const vc = opt.querySelector(".votes-count");
      const start = parseInt(vc.textContent.replace(/[^0-9]/g, "")) || 0;
      animateNumber(vc, start, o.votes, v => fmt(v));
    });

    // total
    const tv = card.querySelector(".tv");
    const start = parseInt(tv.textContent.replace(/[^0-9]/g, "")) || 0;
    animateNumber(tv, start, total, v => fmt(v));
  }

  function animateNumber(el, from, to, fmtFn) {
    const dur = 900;
    let startT = null;
    const ease = t => 1 - Math.pow(1 - t, 3);
    function step(ts) {
      if (startT === null) startT = ts;
      const prog = Math.min((ts - startT) / dur, 1);
      const val = Math.round(from + (to - from) * ease(prog));
      el.textContent = fmtFn(val);
      if (prog < 1) requestAnimationFrame(step);
      else el.textContent = fmtFn(to);
    }
    requestAnimationFrame(step);
  }

  function burstConfetti(anchor) {
    const rect = anchor.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const colors = ["#7c5cff", "#ff5c98", "#2dd4bf", "#ffb648", "#5ca8ff"];
    for (let i = 0; i < 26; i++) {
      const piece = document.createElement("div");
      piece.className = "confetti-piece";
      const color = colors[i % colors.length];
      piece.style.background = color;
      piece.style.left = cx + "px";
      piece.style.top = cy + "px";
      piece.style.borderRadius = Math.random() > 0.5 ? "2px" : "50%";
      document.body.appendChild(piece);

      const angle = (Math.PI * 2 * i) / 26 + (Math.random() - 0.5);
      const velocity = 90 + Math.random() * 140;
      const dx = Math.cos(angle) * velocity;
      const dy = Math.sin(angle) * velocity - 60;
      const rot = (Math.random() - 0.5) * 720;

      piece.animate([
        { transform: "translate(0,0) rotate(0deg)", opacity: 1 },
        { transform: `translate(${dx}px, ${dy + 220}px) rotate(${rot}deg)`, opacity: 0 }
      ], { duration: 900 + Math.random() * 500, easing: "cubic-bezier(0.2,0.7,0.3,1)" })
        .onfinish = () => piece.remove();
    }
  }

  function persist() {
    try { localStorage.setItem(STORE_KEY, JSON.stringify(myVotes)); } catch (e) {}
  }

  function updateStats() {
    let totalVotes = 0;
    POLLS.forEach(p => totalVotes += pollTotal(p));
    document.getElementById("totalPolls").textContent = POLLS.length;
    animateNumber(document.getElementById("totalVotes"),
      parseInt(document.getElementById("totalVotes").textContent.replace(/[^0-9]/g,"")) || 0,
      totalVotes, v => fmt(v));
    document.getElementById("yourVotes").textContent = Object.keys(myVotes).length;
  }

  // Simulate live community activity — random polls tick up over time
  function liveTick() {
    const p = POLLS[Math.floor(Math.random() * POLLS.length)];
    const idx = Math.floor(Math.random() * p.options.length);
    const bump = 1 + Math.floor(Math.random() * 3);
    p.options[idx].votes += bump;

    const card = $polls.querySelector(`.poll[data-id="${p.id}"]`);
    if (card && card.classList.contains("voted")) {
      animateResults(p, card);
    } else if (card) {
      const tv = card.querySelector(".tv");
      const start = parseInt(tv.textContent.replace(/[^0-9]/g, "")) || 0;
      animateNumber(tv, start, pollTotal(p), v => fmt(v));
    }
    updateStats();
  }

  function stamp() {
    const t = new Date();
    document.getElementById("liveStamp").textContent =
      "updated " + t.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  }

  // init
  buildFilters();
  renderPolls();
  updateStats();
  stamp();
  setInterval(liveTick, 3200);
  setInterval(stamp, 30000);
</script>
</body>
</html>
