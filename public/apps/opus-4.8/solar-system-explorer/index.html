<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solar System Explorer</title>
<style>
  :root {
    --bg: #05060d;
    --panel: rgba(14, 18, 34, 0.82);
    --panel-border: rgba(120, 160, 255, 0.18);
    --accent: #6ea8ff;
    --accent-soft: #9bc0ff;
    --text: #e6ecff;
    --text-dim: #8a96bf;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  #app { position: fixed; inset: 0; }
  canvas { display: block; }

  /* ---- Loading ---- */
  #loader {
    position: fixed; inset: 0; z-index: 100;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: radial-gradient(circle at 50% 40%, #0b1024 0%, #05060d 70%);
    transition: opacity 0.8s ease;
    gap: 22px;
  }
  #loader.hidden { opacity: 0; pointer-events: none; }
  .loader-ring {
    width: 64px; height: 64px;
    border: 2px solid rgba(110, 168, 255, 0.15);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loader .label { color: var(--text-dim); font-size: 13px; letter-spacing: 0.18em; text-transform: uppercase; }

  /* ---- Title ---- */
  #title {
    position: fixed; top: 26px; left: 28px; z-index: 10;
    pointer-events: none;
    text-shadow: 0 2px 30px rgba(0,0,0,0.6);
  }
  #title h1 {
    font-size: 20px; font-weight: 600; letter-spacing: 0.02em;
    background: linear-gradient(90deg, #fff 0%, var(--accent-soft) 100%);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
  }
  #title p { font-size: 11.5px; color: var(--text-dim); letter-spacing: 0.16em; text-transform: uppercase; margin-top: 4px; }

  /* ---- Control panel ---- */
  #controls {
    position: fixed; top: 24px; right: 24px; z-index: 10;
    width: 250px;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 16px;
    padding: 18px;
    backdrop-filter: blur(18px) saturate(140%);
    -webkit-backdrop-filter: blur(18px) saturate(140%);
    box-shadow: 0 20px 60px rgba(0,0,0,0.45);
  }
  .ctrl-section { margin-bottom: 16px; }
  .ctrl-section:last-child { margin-bottom: 0; }
  .ctrl-label {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-dim);
    margin-bottom: 9px;
  }
  .ctrl-label .val { color: var(--accent-soft); font-variant-numeric: tabular-nums; font-weight: 500; }

  input[type="range"] {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 4px; border-radius: 4px;
    background: linear-gradient(90deg, var(--accent) var(--pct, 50%), rgba(120,150,220,0.18) var(--pct, 50%));
    outline: none; cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 15px; height: 15px; border-radius: 50%;
    background: #fff; border: 3px solid var(--accent);
    box-shadow: 0 0 10px rgba(110,168,255,0.6);
    transition: transform 0.12s ease;
  }
  input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }
  input[type="range"]::-moz-range-thumb {
    width: 15px; height: 15px; border-radius: 50%;
    background: #fff; border: 3px solid var(--accent); cursor: pointer;
  }

  .toggle-row { display: flex; gap: 8px; }
  .toggle-btn {
    flex: 1;
    background: rgba(120,150,220,0.08);
    border: 1px solid rgba(120,150,220,0.16);
    color: var(--text-dim);
    border-radius: 10px;
    padding: 8px 0;
    font-size: 11px; letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.18s ease;
    font-family: inherit;
  }
  .toggle-btn:hover { border-color: rgba(120,150,220,0.4); color: var(--text); }
  .toggle-btn.active {
    background: rgba(110,168,255,0.16);
    border-color: var(--accent);
    color: var(--accent-soft);
  }

  .preset-btn {
    width: 100%;
    background: rgba(110,168,255,0.1);
    border: 1px solid rgba(110,168,255,0.25);
    color: var(--accent-soft);
    border-radius: 10px;
    padding: 9px 0;
    font-size: 11.5px; letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.18s ease;
    font-family: inherit;
  }
  .preset-btn:hover { background: rgba(110,168,255,0.2); }

  /* ---- Info card ---- */
  #info {
    position: fixed; bottom: 24px; left: 24px; z-index: 10;
    width: 320px;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 16px;
    padding: 22px;
    backdrop-filter: blur(18px) saturate(140%);
    -webkit-backdrop-filter: blur(18px) saturate(140%);
    box-shadow: 0 20px 60px rgba(0,0,0,0.45);
    transform: translateY(140%) scale(0.96);
    opacity: 0;
    transition: transform 0.45s cubic-bezier(0.22,1,0.36,1), opacity 0.4s ease;
  }
  #info.show { transform: translateY(0) scale(1); opacity: 1; }
  #info .close {
    position: absolute; top: 16px; right: 16px;
    width: 26px; height: 26px; border-radius: 8px;
    background: rgba(120,150,220,0.1); border: none;
    color: var(--text-dim); cursor: pointer; font-size: 15px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.18s ease;
  }
  #info .close:hover { background: rgba(255,90,90,0.18); color: #ff8a8a; }
  #info .planet-name {
    font-size: 23px; font-weight: 600; margin-bottom: 2px;
    display: flex; align-items: center; gap: 10px;
  }
  #info .planet-dot { width: 13px; height: 13px; border-radius: 50%; box-shadow: 0 0 14px currentColor; }
  #info .planet-tag { font-size: 11px; color: var(--text-dim); letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 14px; }
  #info .planet-desc { font-size: 13.5px; line-height: 1.6; color: #c6cfee; margin-bottom: 16px; }
  #info .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  #info .stat {
    background: rgba(120,150,220,0.07);
    border: 1px solid rgba(120,150,220,0.12);
    border-radius: 10px; padding: 9px 11px;
  }
  #info .stat .k { font-size: 10px; color: var(--text-dim); letter-spacing: 0.08em; text-transform: uppercase; }
  #info .stat .v { font-size: 14px; color: var(--text); margin-top: 3px; font-weight: 500; }

  /* ---- Hint ---- */
  #hint {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 9;
    font-size: 12px; color: var(--text-dim); letter-spacing: 0.05em;
    background: var(--panel); border: 1px solid var(--panel-border);
    padding: 9px 18px; border-radius: 999px;
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    transition: opacity 0.5s ease;
    display: flex; gap: 16px; align-items: center;
  }
  #hint span { display: flex; align-items: center; gap: 6px; }
  #hint .kbd {
    display: inline-block; padding: 1px 6px; border-radius: 5px;
    background: rgba(120,150,220,0.14); color: var(--accent-soft); font-size: 11px;
  }
  #hint.fade { opacity: 0; pointer-events: none; }

  /* ---- Tooltip ---- */
  #tooltip {
    position: fixed; z-index: 8; pointer-events: none;
    background: rgba(10,14,28,0.92); border: 1px solid var(--panel-border);
    padding: 5px 11px; border-radius: 8px; font-size: 12px; font-weight: 500;
    transform: translate(-50%, -150%); opacity: 0;
    transition: opacity 0.15s ease;
    white-space: nowrap;
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  }
  #tooltip.show { opacity: 1; }

  @media (max-width: 720px) {
    #controls { width: 210px; top: 16px; right: 12px; padding: 14px; }
    #info { width: calc(100% - 32px); left: 16px; bottom: 16px; }
    #title { top: 16px; left: 16px; }
    #hint { display: none; }
  }
</style>
</head>
<body>
<div id="app"></div>

<div id="loader">
  <div class="loader-ring"></div>
  <div class="label">Charting the Solar System</div>
</div>

<div id="title">
  <h1>Solar System Explorer</h1>
  <p>Interactive Orrery</p>
</div>

<div id="controls">
  <div class="ctrl-section">
    <div class="ctrl-label"><span>Orbit Speed</span><span class="val" id="speedVal">1.0×</span></div>
    <input type="range" id="speed" min="0" max="500" value="100">
  </div>
  <div class="ctrl-section">
    <div class="ctrl-label"><span>View</span></div>
    <div class="toggle-row">
      <button class="toggle-btn active" id="orbitsBtn">Orbits</button>
      <button class="toggle-btn active" id="labelsBtn">Labels</button>
    </div>
  </div>
  <div class="ctrl-section">
    <button class="preset-btn" id="resetBtn">Reset View</button>
  </div>
</div>

<div id="info">
  <button class="close" id="infoClose">✕</button>
  <div class="planet-name"><span class="planet-dot" id="infoDot"></span><span id="infoName"></span></div>
  <div class="planet-tag" id="infoTag"></div>
  <div class="planet-desc" id="infoDesc"></div>
  <div class="stats" id="infoStats"></div>
</div>

<div id="hint">
  <span><span class="kbd">Drag</span> rotate</span>
  <span><span class="kbd">Scroll</span> zoom</span>
  <span><span class="kbd">Click</span> a planet</span>
</div>

<div id="tooltip"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" integrity="sha384-CI3ELBVUz9XQO+97x6nwMDPosPR5XvsxW2ua7N1Xeygeh1IxtgqtCkGfQY9WWdHu" crossorigin="anonymous"></script>
<script>
(function () {
  'use strict';

  // ---------------------------------------------------------------------------
  // Data
  // ---------------------------------------------------------------------------
  const PLANETS = [
    { name: 'Mercury', color: 0x9c8a7a, size: 0.38, dist: 9,  speed: 4.15, tilt: 0.03,
      tag: 'Terrestrial · Innermost', desc: 'The smallest planet and closest to the Sun, Mercury races around its orbit in just 88 days while enduring extreme temperature swings.',
      stats: { Diameter: '4,879 km', 'Day Length': '1,408 h', Moons: '0', Distance: '57.9M km' } },
    { name: 'Venus', color: 0xe3b778, size: 0.62, dist: 13, speed: 1.62, tilt: 177.4,
      tag: 'Terrestrial · Morning Star', desc: 'Wrapped in a thick toxic atmosphere, Venus is the hottest planet, with a runaway greenhouse effect baking its surface to 465°C.',
      stats: { Diameter: '12,104 km', 'Day Length': '5,832 h', Moons: '0', Distance: '108.2M km' } },
    { name: 'Earth', color: 0x4f8fe0, size: 0.66, dist: 18, speed: 1.0, tilt: 23.4,
      tag: 'Terrestrial · Our Home', desc: 'The only known world to harbor life, Earth balances liquid water, a protective magnetic field, and a breathable atmosphere.',
      stats: { Diameter: '12,742 km', 'Day Length': '24 h', Moons: '1', Distance: '149.6M km' }, hasMoon: true },
    { name: 'Mars', color: 0xd6603f, size: 0.5, dist: 23, speed: 0.53, tilt: 25.2,
      tag: 'Terrestrial · Red Planet', desc: 'Rust-colored Mars hosts the tallest volcano and deepest canyon in the solar system, and remains the prime target in the search for past life.',
      stats: { Diameter: '6,779 km', 'Day Length': '24.7 h', Moons: '2', Distance: '227.9M km' } },
    { name: 'Jupiter', color: 0xd8a878, size: 1.7, dist: 32, speed: 0.084, tilt: 3.1,
      tag: 'Gas Giant · Largest', desc: 'A colossal ball of hydrogen and helium, Jupiter could swallow over 1,300 Earths. Its Great Red Spot is a storm larger than our planet.',
      stats: { Diameter: '139,820 km', 'Day Length': '9.9 h', Moons: '95', Distance: '778.5M km' } },
    { name: 'Saturn', color: 0xe8d4a0, size: 1.45, dist: 43, speed: 0.034, tilt: 26.7,
      tag: 'Gas Giant · Ringed Jewel', desc: 'Famous for its dazzling ring system of ice and rock, Saturn is so light it would float in water — if you could find an ocean big enough.',
      stats: { Diameter: '116,460 km', 'Day Length': '10.7 h', Moons: '146', Distance: '1.43B km' }, ring: true },
    { name: 'Uranus', color: 0x8fd4d8, size: 1.0, dist: 53, speed: 0.012, tilt: 97.8,
      tag: 'Ice Giant · Sideways', desc: 'Uranus rolls around the Sun on its side, likely knocked over by an ancient collision. Methane gives it a serene blue-green hue.',
      stats: { Diameter: '50,724 km', 'Day Length': '17.2 h', Moons: '28', Distance: '2.87B km' }, ring: true, ringFaint: true },
    { name: 'Neptune', color: 0x4063d8, size: 0.97, dist: 62, speed: 0.006, tilt: 28.3,
      tag: 'Ice Giant · Windiest', desc: 'The farthest planet, deep-blue Neptune whips up supersonic winds over 2,000 km/h — the fiercest in the solar system.',
      stats: { Diameter: '49,244 km', 'Day Length': '16.1 h', Moons: '16', Distance: '4.50B km' } },
  ];

  // ---------------------------------------------------------------------------
  // Scene setup
  // ---------------------------------------------------------------------------
  const app = document.getElementById('app');
  const scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x05060d, 0.0018);

  const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 2000);
  const HOME = new THREE.Vector3(0, 48, 92);
  camera.position.copy(HOME);

  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.15;
  app.appendChild(renderer.domElement);

  // ---------------------------------------------------------------------------
  // Starfield
  // ---------------------------------------------------------------------------
  function makeStars(count, radius, sizeRange, brightness) {
    const geo = new THREE.BufferGeometry();
    const pos = new Float32Array(count * 3);
    const col = new Float32Array(count * 3);
    const sizes = new Float32Array(count);
    const palette = [
      [1.0, 1.0, 1.0], [0.75, 0.82, 1.0], [1.0, 0.9, 0.78], [0.85, 0.9, 1.0], [1.0, 0.96, 0.9],
    ];
    for (let i = 0; i < count; i++) {
      const r = radius * (0.55 + Math.random() * 0.45);
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      pos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
      pos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
      pos[i*3+2] = r * Math.cos(phi);
      const c = palette[(Math.random() * palette.length) | 0];
      const b = brightness * (0.4 + Math.random() * 0.6);
      col[i*3] = c[0]*b; col[i*3+1] = c[1]*b; col[i*3+2] = c[2]*b;
      sizes[i] = sizeRange[0] + Math.random() * (sizeRange[1] - sizeRange[0]);
    }
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
    geo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
    const mat = new THREE.PointsMaterial({ size: 1, vertexColors: true, transparent: true,
      sizeAttenuation: true, depthWrite: false, blending: THREE.AdditiveBlending });
    const pts = new THREE.Points(geo, mat);
    return pts;
  }
  scene.add(makeStars(2600, 700, [0.6, 2.2], 1.0));
  scene.add(makeStars(900, 1100, [1.0, 3.0], 0.7));

  // ---------------------------------------------------------------------------
  // Lighting
  // ---------------------------------------------------------------------------
  const sunLight = new THREE.PointLight(0xfff0d8, 3.2, 0, 1.4);
  scene.add(sunLight);
  scene.add(new THREE.AmbientLight(0x3a4570, 0.55));

  // ---------------------------------------------------------------------------
  // Sun
  // ---------------------------------------------------------------------------
  const sunGroup = new THREE.Group();
  scene.add(sunGroup);

  const sunGeo = new THREE.SphereGeometry(4, 64, 64);
  const sunMat = new THREE.MeshBasicMaterial({ color: 0xffd27a });
  const sun = new THREE.Mesh(sunGeo, sunMat);
  sunGroup.add(sun);

  // Glow sprite
  function radialTexture(stops) {
    const c = document.createElement('canvas'); c.width = c.height = 256;
    const ctx = c.getContext('2d');
    const g = ctx.createRadialGradient(128,128,0,128,128,128);
    stops.forEach(s => g.addColorStop(s[0], s[1]));
    ctx.fillStyle = g; ctx.fillRect(0,0,256,256);
    return new THREE.CanvasTexture(c);
  }
  const glowTex = radialTexture([
    [0, 'rgba(255,228,160,0.9)'], [0.25, 'rgba(255,180,90,0.5)'],
    [0.55, 'rgba(255,130,40,0.12)'], [1, 'rgba(255,120,40,0)'],
  ]);
  const glowMat = new THREE.SpriteMaterial({ map: glowTex, color: 0xffffff,
    transparent: true, blending: THREE.AdditiveBlending, depthWrite: false });
  const glow = new THREE.Sprite(glowMat);
  glow.scale.set(28, 28, 1);
  sunGroup.add(glow);

  const corona = new THREE.Sprite(glowMat.clone());
  corona.scale.set(16, 16, 1);
  corona.material.opacity = 0.6;
  sunGroup.add(corona);

  // ---------------------------------------------------------------------------
  // Procedural planet textures
  // ---------------------------------------------------------------------------
  function planetTexture(baseColor, opts) {
    opts = opts || {};
    const size = 256;
    const c = document.createElement('canvas'); c.width = size; c.height = size;
    const ctx = c.getContext('2d');
    const base = new THREE.Color(baseColor);
    ctx.fillStyle = '#' + base.getHexString();
    ctx.fillRect(0, 0, size, size);

    function shade(amt) {
      const cc = base.clone();
      cc.r = Math.min(1, Math.max(0, cc.r + amt));
      cc.g = Math.min(1, Math.max(0, cc.g + amt));
      cc.b = Math.min(1, Math.max(0, cc.b + amt));
      return '#' + cc.getHexString();
    }

    if (opts.bands) {
      // gas giant horizontal bands
      let y = 0;
      while (y < size) {
        const h = 6 + Math.random() * 22;
        ctx.fillStyle = shade((Math.random() - 0.5) * 0.28);
        ctx.fillRect(0, y, size, h);
        y += h;
      }
      // soft horizontal blur via overlay streaks
      for (let i = 0; i < 60; i++) {
        ctx.globalAlpha = 0.05 + Math.random() * 0.08;
        ctx.fillStyle = shade((Math.random() - 0.5) * 0.4);
        ctx.fillRect(0, Math.random() * size, size, 1 + Math.random() * 3);
      }
      ctx.globalAlpha = 1;
      if (opts.spot) {
        ctx.fillStyle = 'rgba(190,70,40,0.6)';
        ctx.beginPath();
        ctx.ellipse(size * 0.65, size * 0.55, 22, 13, 0, 0, Math.PI * 2);
        ctx.fill();
      }
    } else {
      // rocky / icy splotches
      const blobs = opts.blobs || 240;
      for (let i = 0; i < blobs; i++) {
        const x = Math.random() * size, yy = Math.random() * size;
        const r = 2 + Math.random() * (opts.blobSize || 16);
        ctx.globalAlpha = 0.12 + Math.random() * 0.25;
        ctx.fillStyle = shade((Math.random() - 0.5) * (opts.contrast || 0.4));
        ctx.beginPath(); ctx.arc(x, yy, r, 0, Math.PI * 2); ctx.fill();
      }
      ctx.globalAlpha = 1;
      if (opts.ocean) {
        // Earth: green/brown continents over blue
        for (let i = 0; i < 26; i++) {
          ctx.globalAlpha = 0.55;
          ctx.fillStyle = Math.random() > 0.5 ? '#3a7d3a' : '#7a6a44';
          ctx.beginPath();
          const x = Math.random() * size, yy = Math.random() * size;
          ctx.ellipse(x, yy, 8 + Math.random() * 26, 6 + Math.random() * 18, Math.random() * Math.PI, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 0.35;
        ctx.fillStyle = '#ffffff';
        for (let i = 0; i < 18; i++) {
          ctx.beginPath();
          ctx.arc(Math.random()*size, Math.random()*size, 5 + Math.random()*16, 0, Math.PI*2);
          ctx.fill();
        }
        // poles
        ctx.globalAlpha = 0.6; ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, size, 14); ctx.fillRect(0, size-14, size, 14);
      }
      ctx.globalAlpha = 1;
    }

    const tex = new THREE.CanvasTexture(c);
    tex.anisotropy = 4;
    return tex;
  }

  // ---------------------------------------------------------------------------
  // Build planets
  // ---------------------------------------------------------------------------
  const orbitGroup = new THREE.Group();
  scene.add(orbitGroup);
  const planetObjs = [];
  const clickTargets = [];
  const orbitLines = [];
  const beltRef = {};

  function makeOrbitLine(dist) {
    const seg = 160;
    const pts = [];
    for (let i = 0; i <= seg; i++) {
      const a = (i / seg) * Math.PI * 2;
      pts.push(new THREE.Vector3(Math.cos(a) * dist, 0, Math.sin(a) * dist));
    }
    const geo = new THREE.BufferGeometry().setFromPoints(pts);
    const mat = new THREE.LineBasicMaterial({ color: 0x4a6aa8, transparent: true, opacity: 0.32 });
    return new THREE.Line(geo, mat);
  }

  PLANETS.forEach((p, idx) => {
    const orbit = makeOrbitLine(p.dist);
    orbitGroup.add(orbit);
    orbitLines.push(orbit);

    const pivot = new THREE.Group();
    orbitGroup.add(pivot);

    const tilt = new THREE.Group();
    tilt.rotation.z = THREE.MathUtils.degToRad(p.tilt);
    pivot.add(tilt);

    let texOpts = { contrast: 0.4 };
    if (p.name === 'Earth') texOpts = { ocean: true, blobs: 0 };
    else if (p.name === 'Jupiter') texOpts = { bands: true, spot: true };
    else if (p.name === 'Saturn') texOpts = { bands: true };
    else if (p.name === 'Uranus' || p.name === 'Neptune') texOpts = { bands: true };
    else if (p.name === 'Mars') texOpts = { contrast: 0.45, blobSize: 12 };
    else if (p.name === 'Mercury') texOpts = { contrast: 0.5, blobSize: 14 };
    else if (p.name === 'Venus') texOpts = { contrast: 0.3, blobSize: 22 };

    const tex = planetTexture(p.color, texOpts);
    const geo = new THREE.SphereGeometry(p.size, 48, 48);
    const mat = new THREE.MeshStandardMaterial({
      map: tex, color: 0xffffff,
      roughness: 0.85, metalness: 0.05,
      emissive: new THREE.Color(p.color).multiplyScalar(0.04),
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.userData = { planet: p, index: idx };
    tilt.add(mesh);
    clickTargets.push(mesh);

    // Atmosphere halo
    const haloMat = new THREE.SpriteMaterial({
      map: glowTex, color: p.color, transparent: true,
      opacity: 0.35, blending: THREE.AdditiveBlending, depthWrite: false,
    });
    const halo = new THREE.Sprite(haloMat);
    const hs = p.size * 3.4;
    halo.scale.set(hs, hs, 1);
    tilt.add(halo);

    // Rings
    if (p.ring) {
      const inner = p.size * 1.4, outer = p.size * (p.name === 'Saturn' ? 2.4 : 2.0);
      const ringGeo = new THREE.RingGeometry(inner, outer, 96);
      // tilt ring UVs for radial gradient
      const ringTex = (function () {
        const cw = 256, ch = 16;
        const cv = document.createElement('canvas'); cv.width = cw; cv.height = ch;
        const cx = cv.getContext('2d');
        for (let x = 0; x < cw; x++) {
          const t = x / cw;
          const a = (0.15 + 0.85 * Math.abs(Math.sin(t * Math.PI * 7))) * (0.4 + 0.6 * t);
          cx.fillStyle = 'rgba(255,255,255,' + (a * (p.ringFaint ? 0.4 : 0.85)) + ')';
          cx.fillRect(x, 0, 1, ch);
        }
        const t = new THREE.CanvasTexture(cv);
        return t;
      })();
      const pos2 = ringGeo.attributes.position;
      const uv = ringGeo.attributes.uv;
      const v3 = new THREE.Vector3();
      for (let i = 0; i < pos2.count; i++) {
        v3.fromBufferAttribute(pos2, i);
        const r = v3.length();
        const t = (r - inner) / (outer - inner);
        uv.setXY(i, t, (i % 2));
      }
      const ringMat = new THREE.MeshBasicMaterial({
        map: ringTex, color: new THREE.Color(p.color).lerp(new THREE.Color(0xffffff), 0.5),
        side: THREE.DoubleSide, transparent: true, opacity: p.ringFaint ? 0.5 : 0.9,
        depthWrite: false,
      });
      const ring = new THREE.Mesh(ringGeo, ringMat);
      ring.rotation.x = Math.PI / 2;
      tilt.add(ring);
    }

    // Earth's moon
    let moonPivot = null;
    if (p.hasMoon) {
      moonPivot = new THREE.Group();
      tilt.add(moonPivot);
      const moonGeo = new THREE.SphereGeometry(p.size * 0.27, 24, 24);
      const moonMat = new THREE.MeshStandardMaterial({ map: planetTexture(0xbfbfbf, { contrast: 0.4, blobSize: 8 }), roughness: 1 });
      const moon = new THREE.Mesh(moonGeo, moonMat);
      moon.position.x = p.size * 2.2;
      moonPivot.add(moon);
    }

    const phase = Math.random() * Math.PI * 2;
    pivot.rotation.y = phase;
    planetObjs.push({ data: p, pivot, mesh, tilt, halo, moonPivot, angle: phase });
  });

  // Asteroid belt between Mars and Jupiter
  (function asteroidBelt() {
    const count = 1400;
    const geo = new THREE.BufferGeometry();
    const pos = new Float32Array(count * 3);
    for (let i = 0; i < count; i++) {
      const r = 26 + Math.random() * 4;
      const a = Math.random() * Math.PI * 2;
      pos[i*3] = Math.cos(a) * r;
      pos[i*3+1] = (Math.random() - 0.5) * 1.2;
      pos[i*3+2] = Math.sin(a) * r;
    }
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    const mat = new THREE.PointsMaterial({ color: 0x8a8270, size: 0.18, sizeAttenuation: true,
      transparent: true, opacity: 0.7, depthWrite: false });
    const belt = new THREE.Points(geo, mat);
    belt.userData.belt = true;
    orbitGroup.add(belt);
    beltRef.belt = belt;
  })();

  // ---------------------------------------------------------------------------
  // Labels (CSS-free sprite labels)
  // ---------------------------------------------------------------------------
  function makeLabel(text) {
    const c = document.createElement('canvas');
    const ctx = c.getContext('2d');
    const fontSize = 44;
    ctx.font = '600 ' + fontSize + 'px Inter, sans-serif';
    const w = ctx.measureText(text).width;
    c.width = w + 40; c.height = fontSize + 30;
    ctx.font = '600 ' + fontSize + 'px Inter, sans-serif';
    ctx.fillStyle = 'rgba(230,236,255,0.95)';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(0,0,0,0.8)'; ctx.shadowBlur = 8;
    ctx.fillText(text, 20, c.height / 2);
    const tex = new THREE.CanvasTexture(c);
    tex.minFilter = THREE.LinearFilter;
    const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false, depthWrite: false });
    const sprite = new THREE.Sprite(mat);
    sprite.scale.set(c.width / 28, c.height / 28, 1);
    sprite.userData.aspect = c.width / c.height;
    return sprite;
  }
  const labelSprites = [];
  planetObjs.forEach(po => {
    const label = makeLabel(po.data.name);
    label.center.set(0.5, -0.4);
    po.tilt.add(label);
    label.position.y = po.data.size + 0.6;
    labelSprites.push(label);
  });

  // ---------------------------------------------------------------------------
  // Selection ring
  // ---------------------------------------------------------------------------
  const selRingGeo = new THREE.RingGeometry(1, 1.06, 64);
  const selRingMat = new THREE.MeshBasicMaterial({ color: 0x6ea8ff, side: THREE.DoubleSide, transparent: true, opacity: 0.9 });
  const selRing = new THREE.Mesh(selRingGeo, selRingMat);
  selRing.visible = false;
  scene.add(selRing);

  // ---------------------------------------------------------------------------
  // Custom orbit controls (drag rotate, scroll zoom)
  // ---------------------------------------------------------------------------
  const controls = {
    target: new THREE.Vector3(0, 0, 0),
    azimuth: Math.atan2(HOME.x, HOME.z),
    polar: Math.acos(HOME.y / HOME.length()),
    radius: HOME.length(),
    minRadius: 8, maxRadius: 320,
    minPolar: 0.15, maxPolar: Math.PI - 0.15,
    autoRotate: false,
    // smoothed
    tAzimuth: 0, tPolar: 0, tRadius: 0, tTarget: new THREE.Vector3(),
  };
  controls.tAzimuth = controls.azimuth;
  controls.tPolar = controls.polar;
  controls.tRadius = controls.radius;
  controls.tTarget.copy(controls.target);

  function applyCamera() {
    const sp = controls.polar, sa = controls.azimuth, r = controls.radius;
    const x = r * Math.sin(sp) * Math.sin(sa);
    const y = r * Math.cos(sp);
    const z = r * Math.sin(sp) * Math.cos(sa);
    camera.position.set(x, y, z).add(controls.target);
    camera.lookAt(controls.target);
  }

  let dragging = false, lastX = 0, lastY = 0, moved = 0;
  const dom = renderer.domElement;

  function onDown(x, y) { dragging = true; lastX = x; lastY = y; moved = 0; controls.autoRotate = false; dom.style.cursor = 'grabbing'; }
  function onMove(x, y) {
    if (!dragging) return;
    const dx = x - lastX, dy = y - lastY;
    lastX = x; lastY = y; moved += Math.abs(dx) + Math.abs(dy);
    controls.tAzimuth -= dx * 0.005;
    controls.tPolar -= dy * 0.005;
    controls.tPolar = Math.max(controls.minPolar, Math.min(controls.maxPolar, controls.tPolar));
  }
  function onUp() { dragging = false; dom.style.cursor = 'grab'; }

  dom.addEventListener('mousedown', e => onDown(e.clientX, e.clientY));
  window.addEventListener('mousemove', e => { onMove(e.clientX, e.clientY); updateTooltip(e.clientX, e.clientY); });
  window.addEventListener('mouseup', onUp);
  dom.style.cursor = 'grab';

  dom.addEventListener('touchstart', e => { if (e.touches.length === 1) onDown(e.touches[0].clientX, e.touches[0].clientY); }, { passive: true });
  dom.addEventListener('touchmove', e => { if (e.touches.length === 1) onMove(e.touches[0].clientX, e.touches[0].clientY); }, { passive: true });
  dom.addEventListener('touchend', onUp);

  // pinch zoom
  let pinchDist = 0;
  dom.addEventListener('touchstart', e => { if (e.touches.length === 2) pinchDist = touchDist(e); }, { passive: true });
  dom.addEventListener('touchmove', e => {
    if (e.touches.length === 2) {
      const d = touchDist(e);
      controls.tRadius *= pinchDist / d;
      controls.tRadius = Math.max(controls.minRadius, Math.min(controls.maxRadius, controls.tRadius));
      pinchDist = d;
    }
  }, { passive: true });
  function touchDist(e) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    return Math.hypot(dx, dy);
  }

  dom.addEventListener('wheel', e => {
    e.preventDefault();
    const factor = Math.pow(0.999, -e.deltaY * (e.deltaMode === 1 ? 24 : 1));
    controls.tRadius *= factor;
    controls.tRadius = Math.max(controls.minRadius, Math.min(controls.maxRadius, controls.tRadius));
  }, { passive: false });

  // ---------------------------------------------------------------------------
  // Raycasting / interaction
  // ---------------------------------------------------------------------------
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();
  let hovered = null;
  let selected = null;
  let followTarget = null;

  function pick(clientX, clientY) {
    mouse.x = (clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(clickTargets, false);
    return hits.length ? hits[0].object : null;
  }

  const tooltip = document.getElementById('tooltip');
  function updateTooltip(x, y) {
    if (dragging) { tooltip.classList.remove('show'); return; }
    const obj = pick(x, y);
    if (obj && obj !== selected) {
      hovered = obj;
      tooltip.textContent = obj.userData.planet.name;
      tooltip.style.left = x + 'px';
      tooltip.style.top = y + 'px';
      tooltip.classList.add('show');
      dom.style.cursor = 'pointer';
    } else {
      hovered = null;
      tooltip.classList.remove('show');
      if (!dragging) dom.style.cursor = 'grab';
    }
  }

  dom.addEventListener('click', e => {
    if (moved > 6) return; // was a drag
    const obj = pick(e.clientX, e.clientY);
    if (obj) selectPlanet(obj.userData.index);
    else deselect();
  });

  // ---------------------------------------------------------------------------
  // Info panel
  // ---------------------------------------------------------------------------
  const infoEl = document.getElementById('info');
  const hintEl = document.getElementById('hint');

  function selectPlanet(index) {
    const po = planetObjs[index];
    selected = po.mesh;
    followTarget = po;

    const p = po.data;
    document.getElementById('infoName').textContent = p.name;
    document.getElementById('infoTag').textContent = p.tag;
    document.getElementById('infoDesc').textContent = p.desc;
    const dot = document.getElementById('infoDot');
    dot.style.background = '#' + new THREE.Color(p.color).getHexString();
    dot.style.color = '#' + new THREE.Color(p.color).getHexString();
    const statsEl = document.getElementById('infoStats');
    statsEl.innerHTML = '';
    Object.entries(p.stats).forEach(([k, v]) => {
      const d = document.createElement('div'); d.className = 'stat';
      d.innerHTML = '<div class="k">' + k + '</div><div class="v">' + v + '</div>';
      statsEl.appendChild(d);
    });
    infoEl.classList.add('show');
    hintEl.classList.add('fade');
    selRing.visible = true;

    // ease camera toward a nice viewing distance for this planet
    controls.tRadius = Math.max(controls.minRadius, p.size * 6 + p.dist * 0.18 + 6);
  }

  function deselect() {
    selected = null;
    followTarget = null;
    infoEl.classList.remove('show');
    selRing.visible = false;
    controls.tTarget.set(0, 0, 0);
  }
  document.getElementById('infoClose').addEventListener('click', deselect);

  // ---------------------------------------------------------------------------
  // UI controls
  // ---------------------------------------------------------------------------
  let speedMul = 1.0;
  const speedEl = document.getElementById('speed');
  const speedVal = document.getElementById('speedVal');
  function updateSpeedUI() {
    const v = parseInt(speedEl.value, 10);
    speedMul = v / 100;
    speedVal.textContent = speedMul.toFixed(1) + '×';
    speedEl.style.setProperty('--pct', (v / 500 * 100) + '%');
  }
  speedEl.addEventListener('input', updateSpeedUI);
  updateSpeedUI();

  const orbitsBtn = document.getElementById('orbitsBtn');
  const labelsBtn = document.getElementById('labelsBtn');
  let showOrbits = true, showLabels = true;
  orbitsBtn.addEventListener('click', () => {
    showOrbits = !showOrbits;
    orbitsBtn.classList.toggle('active', showOrbits);
    orbitLines.forEach(o => o.visible = showOrbits);
    if (beltRef.belt) beltRef.belt.visible = showOrbits;
  });
  labelsBtn.addEventListener('click', () => {
    showLabels = !showLabels;
    labelsBtn.classList.toggle('active', showLabels);
    labelSprites.forEach(l => l.visible = showLabels);
  });

  document.getElementById('resetBtn').addEventListener('click', () => {
    deselect();
    controls.tAzimuth = Math.atan2(HOME.x, HOME.z);
    controls.tPolar = Math.acos(HOME.y / HOME.length());
    controls.tRadius = HOME.length();
    controls.autoRotate = true;
  });

  // ---------------------------------------------------------------------------
  // Render loop
  // ---------------------------------------------------------------------------
  let lastTime = performance.now();
  let idleTimer = 0;

  function animate(now) {
    requestAnimationFrame(animate);
    const dt = Math.min(0.05, (now - lastTime) / 1000);
    lastTime = now;

    // gentle auto-rotate when idle
    if (!dragging && !followTarget) {
      idleTimer += dt;
      if (idleTimer > 4) controls.autoRotate = true;
    } else { idleTimer = 0; }
    if (controls.autoRotate) controls.tAzimuth += dt * 0.04;

    // orbital motion
    planetObjs.forEach(po => {
      po.angle += po.data.speed * speedMul * dt * 0.35;
      po.pivot.rotation.y = po.angle;
      po.mesh.rotation.y += dt * (0.4 + po.data.speed * 0.1) * (speedMul > 0 ? 1 : 0);
      if (po.moonPivot) po.moonPivot.rotation.y += dt * 1.2 * Math.max(speedMul, 0.0);
    });

    // sun pulse
    const pulse = 1 + Math.sin(now * 0.0008) * 0.03;
    glow.scale.set(28 * pulse, 28 * pulse, 1);
    sun.rotation.y += dt * 0.05;
    sunLight.intensity = 3.2 + Math.sin(now * 0.0012) * 0.15;

    // follow selected planet
    if (followTarget) {
      const wp = new THREE.Vector3();
      followTarget.mesh.getWorldPosition(wp);
      controls.tTarget.lerp(wp, 0.08);
      // position selection ring
      selRing.position.copy(wp);
      const s = followTarget.data.size * 1.5;
      selRing.scale.set(s, s, s);
      selRing.lookAt(camera.position);
      selRingMat.opacity = 0.6 + Math.sin(now * 0.004) * 0.3;
    }

    // labels face camera + scale with distance for legibility
    const _lwp = new THREE.Vector3();
    labelSprites.forEach((l) => {
      if (!l.visible) return;
      l.getWorldPosition(_lwp);
      const d = camera.position.distanceTo(_lwp);
      const h = Math.max(1.2, Math.min(7, d * 0.045));
      l.scale.set(l.userData.aspect * h, h, 1);
    });

    // smooth controls
    controls.azimuth += (controls.tAzimuth - controls.azimuth) * Math.min(1, dt * 8);
    controls.polar += (controls.tPolar - controls.polar) * Math.min(1, dt * 8);
    controls.radius += (controls.tRadius - controls.radius) * Math.min(1, dt * 6);
    controls.target.lerp(controls.tTarget, Math.min(1, dt * 5));
    applyCamera();

    renderer.render(scene, camera);
  }

  // ---------------------------------------------------------------------------
  // Resize
  // ---------------------------------------------------------------------------
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // keyboard
  window.addEventListener('keydown', e => {
    if (e.key === 'Escape') deselect();
  });

  // ---------------------------------------------------------------------------
  // Boot
  // ---------------------------------------------------------------------------
  requestAnimationFrame(animate);
  setTimeout(() => {
    document.getElementById('loader').classList.add('hidden');
  }, 900);

})();
</script>
</body>
</html>
