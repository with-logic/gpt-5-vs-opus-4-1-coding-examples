<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#0f0e1a" />
<title>Micro Habit Tracker</title>
<style>
  :root {
    --bg: #0d0c16;
    --bg-soft: #15131f;
    --panel: #1b1828;
    --panel-2: #221e33;
    --line: #2c2740;
    --text: #f4f2fb;
    --muted: #9a93b8;
    --faint: #6c6588;
    --accent: #ff6b9d;
    --accent-2: #c084fc;
    --gold: #ffcb6b;
    --green: #4ade80;
    --blue: #38bdf8;
    --skip: #f0a868;
    --shadow: 0 18px 50px -18px rgba(0,0,0,.7);
    --radius: 20px;
    --radius-sm: 13px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, system-ui, sans-serif;
    background:
      radial-gradient(1100px 600px at 12% -8%, rgba(192,132,252,.16), transparent 60%),
      radial-gradient(900px 600px at 105% 0%, rgba(255,107,157,.14), transparent 55%),
      radial-gradient(800px 700px at 50% 120%, rgba(56,189,248,.10), transparent 60%),
      var(--bg);
    color: var(--text);
    min-height: 100%;
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .wrap { max-width: 720px; margin: 0 auto; padding: 22px 18px 60px; }

  /* Header */
  header { display: flex; align-items: center; gap: 14px; margin-bottom: 6px; }
  .logo {
    width: 46px; height: 46px; flex: none; border-radius: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    display: grid; place-items: center; font-size: 24px;
    box-shadow: 0 8px 22px -6px rgba(255,107,157,.6);
  }
  .title h1 { font-size: 1.42rem; letter-spacing: -.4px; font-weight: 800; }
  .title p { color: var(--muted); font-size: .82rem; font-weight: 500; }
  .header-actions { margin-left: auto; display: flex; gap: 8px; }
  .icon-btn {
    width: 40px; height: 40px; border-radius: 12px; border: 1px solid var(--line);
    background: var(--panel); color: var(--muted); cursor: pointer; font-size: 17px;
    display: grid; place-items: center; transition: .18s; flex: none;
  }
  .icon-btn:hover { color: var(--text); border-color: var(--accent-2); transform: translateY(-1px); }
  .icon-btn:active { transform: scale(.94); }

  /* Hero / overview */
  .hero {
    margin: 18px 0 22px; padding: 18px 20px; border-radius: var(--radius);
    background: linear-gradient(135deg, rgba(192,132,252,.14), rgba(255,107,157,.08));
    border: 1px solid var(--line); position: relative; overflow: hidden;
  }
  .hero-row { display: flex; align-items: flex-end; gap: 18px; flex-wrap: wrap; }
  .hero-greet { font-size: 1.05rem; font-weight: 700; letter-spacing: -.2px; }
  .hero-sub { color: var(--muted); font-size: .85rem; margin-top: 2px; }
  .hero-stats { margin-left: auto; display: flex; gap: 22px; }
  .stat { text-align: center; }
  .stat b { display: block; font-size: 1.5rem; font-weight: 800; letter-spacing: -1px;
    background: linear-gradient(135deg, var(--gold), var(--accent)); -webkit-background-clip: text;
    background-clip: text; -webkit-text-fill-color: transparent; line-height: 1.1; }
  .stat span { font-size: .68rem; color: var(--faint); text-transform: uppercase; letter-spacing: .8px; font-weight: 700; }

  .progress-track { margin-top: 16px; height: 9px; border-radius: 99px; background: rgba(0,0,0,.35); overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 99px; width: 0;
    background: linear-gradient(90deg, var(--accent), var(--accent-2), var(--gold));
    transition: width .6s cubic-bezier(.2,.8,.2,1); box-shadow: 0 0 14px rgba(255,107,157,.5); }
  .progress-label { margin-top: 8px; font-size: .78rem; color: var(--muted); display: flex; justify-content: space-between; }
  .progress-label b { color: var(--text); }

  /* Day strip */
  .section-head { display: flex; align-items: center; margin: 26px 4px 12px; }
  .section-head h2 { font-size: .78rem; text-transform: uppercase; letter-spacing: 1.4px; color: var(--faint); font-weight: 800; }
  .section-head .right { margin-left: auto; font-size: .78rem; color: var(--muted); }

  /* Habit list */
  .habits { display: flex; flex-direction: column; gap: 12px; }
  .habit {
    background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 15px 16px; box-shadow: var(--shadow); transition: .2s; position: relative; overflow: hidden;
  }
  .habit::before { content:""; position:absolute; left:0; top:0; bottom:0; width:4px; background: var(--hc, var(--accent)); opacity:.9; }
  .habit:hover { border-color: var(--panel-2); transform: translateY(-2px); }
  .habit-top { display: flex; align-items: center; gap: 13px; }
  .h-emoji {
    width: 44px; height: 44px; flex: none; border-radius: 13px; display: grid; place-items: center;
    font-size: 22px; background: color-mix(in srgb, var(--hc) 20%, var(--panel-2));
    border: 1px solid color-mix(in srgb, var(--hc) 35%, transparent);
  }
  .h-info { min-width: 0; flex: 1; }
  .h-name { font-weight: 700; font-size: 1rem; letter-spacing: -.2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .h-meta { display: flex; align-items: center; gap: 10px; font-size: .76rem; color: var(--muted); margin-top: 3px; flex-wrap: wrap; }
  .streak-badge {
    display: inline-flex; align-items: center; gap: 4px; font-weight: 700; color: var(--gold);
    background: rgba(255,203,107,.12); padding: 2px 8px; border-radius: 99px; font-size: .74rem;
  }
  .streak-badge.cold { color: var(--faint); background: rgba(108,101,136,.14); }
  .best-badge { color: var(--faint); }

  .check {
    width: 46px; height: 46px; flex: none; border-radius: 14px; cursor: pointer; border: 2px solid var(--line);
    background: var(--panel-2); display: grid; place-items: center; font-size: 20px; color: transparent;
    transition: transform .15s cubic-bezier(.2,1.4,.4,1), background .2s, border-color .2s; position: relative;
  }
  .check:hover { border-color: var(--hc); }
  .check:active { transform: scale(.9); }
  .check.done {
    background: linear-gradient(135deg, var(--hc), color-mix(in srgb, var(--hc) 60%, #fff 12%));
    border-color: transparent; color: #14121d;
    box-shadow: 0 6px 18px -4px color-mix(in srgb, var(--hc) 70%, transparent);
  }
  .check.skip {
    background: repeating-linear-gradient(45deg, rgba(240,168,104,.22), rgba(240,168,104,.22) 6px, transparent 6px, transparent 12px);
    border-color: var(--skip); color: var(--skip);
  }
  .check.pop { animation: pop .4s; }
  @keyframes pop { 0%{transform:scale(.85)} 45%{transform:scale(1.18)} 100%{transform:scale(1)} }

  /* mini week chart */
  .week { display: flex; gap: 6px; margin-top: 13px; }
  .day {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer;
    border-radius: 9px; padding: 5px 0 6px; transition: background .15s;
  }
  .day:hover { background: rgba(255,255,255,.04); }
  .day .lbl { font-size: .6rem; color: var(--faint); font-weight: 700; letter-spacing: .3px; }
  .day .dot {
    width: 100%; max-width: 30px; aspect-ratio: 1; border-radius: 8px; background: var(--panel-2);
    border: 1px solid var(--line); display: grid; place-items: center; font-size: 11px; transition: .15s;
  }
  .day.is-today .lbl { color: var(--accent); }
  .day.is-today .dot { box-shadow: 0 0 0 2px var(--accent) inset; }
  .day .dot.d-done { background: var(--hc); border-color: transparent; color: #14121d; }
  .day .dot.d-skip { background: rgba(240,168,104,.25); border-color: var(--skip); color: var(--skip); }
  .day .dot.d-future { opacity: .3; }

  .h-actions { position: absolute; top: 13px; right: 70px; display: flex; gap: 5px; opacity: 0; transition: .2s; }
  .habit:hover .h-actions, .touch .h-actions { opacity: 1; }
  .mini-btn {
    width: 30px; height: 30px; border-radius: 9px; border: 1px solid var(--line); background: var(--panel-2);
    color: var(--muted); cursor: pointer; font-size: 13px; display: grid; place-items: center; transition: .15s;
  }
  .mini-btn:hover { color: var(--text); border-color: var(--accent-2); }
  .mini-btn.del:hover { color: var(--accent); border-color: var(--accent); }

  /* Add button */
  .add-habit {
    width: 100%; margin-top: 14px; padding: 16px; border-radius: var(--radius); cursor: pointer;
    border: 2px dashed var(--line); background: transparent; color: var(--muted); font-weight: 700;
    font-size: .92rem; transition: .2s; display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .add-habit:hover { border-color: var(--accent-2); color: var(--text); background: rgba(192,132,252,.06); }
  .add-habit:disabled { opacity: .4; cursor: not-allowed; }

  .empty { text-align: center; padding: 50px 20px; color: var(--muted); }
  .empty .big { font-size: 44px; margin-bottom: 10px; }

  /* Modal */
  .overlay {
    position: fixed; inset: 0; background: rgba(8,7,14,.66); backdrop-filter: blur(6px);
    display: none; align-items: flex-end; justify-content: center; z-index: 50; padding: 0;
  }
  .overlay.open { display: flex; animation: fade .2s; }
  @keyframes fade { from{opacity:0} to{opacity:1} }
  .modal {
    width: 100%; max-width: 480px; background: var(--bg-soft); border: 1px solid var(--line);
    border-radius: 24px 24px 0 0; padding: 22px 20px calc(24px + env(safe-area-inset-bottom));
    box-shadow: 0 -20px 60px rgba(0,0,0,.6); animation: slideUp .28s cubic-bezier(.2,.9,.3,1);
  }
  @keyframes slideUp { from{transform:translateY(40px); opacity:.6} to{transform:translateY(0); opacity:1} }
  @media(min-width:560px){
    .overlay{ align-items:center; padding:20px; }
    .modal{ border-radius:24px; }
  }
  .modal h3 { font-size: 1.15rem; font-weight: 800; margin-bottom: 4px; letter-spacing: -.3px; }
  .modal .hint { color: var(--muted); font-size: .82rem; margin-bottom: 18px; }
  label.fld { display: block; font-size: .72rem; text-transform: uppercase; letter-spacing: 1px;
    color: var(--faint); font-weight: 700; margin: 14px 0 7px; }
  input[type=text] {
    width: 100%; padding: 13px 14px; border-radius: 13px; border: 1px solid var(--line);
    background: var(--panel); color: var(--text); font-size: 1rem; font-family: inherit; transition: .15s;
  }
  input[type=text]:focus { outline: none; border-color: var(--accent-2); box-shadow: 0 0 0 3px rgba(192,132,252,.18); }
  .emoji-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; }
  .emoji-grid button {
    aspect-ratio: 1; border-radius: 11px; border: 1px solid var(--line); background: var(--panel);
    font-size: 20px; cursor: pointer; transition: .12s; display: grid; place-items: center;
  }
  .emoji-grid button:hover { transform: scale(1.12); border-color: var(--accent-2); }
  .emoji-grid button.sel { border-color: var(--accent); background: rgba(255,107,157,.18); box-shadow: 0 0 0 2px var(--accent) inset; }
  .color-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .color-row button {
    width: 34px; height: 34px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: .12s; position: relative;
  }
  .color-row button:hover { transform: scale(1.12); }
  .color-row button.sel { box-shadow: 0 0 0 3px var(--bg-soft), 0 0 0 5px currentColor; }
  .modal-actions { display: flex; gap: 10px; margin-top: 24px; }
  .btn {
    flex: 1; padding: 14px; border-radius: 14px; border: none; cursor: pointer; font-weight: 800;
    font-size: .95rem; font-family: inherit; transition: .15s;
  }
  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #fff;
    box-shadow: 0 8px 22px -8px rgba(255,107,157,.7); }
  .btn-primary:hover { transform: translateY(-1px); filter: brightness(1.06); }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; transform: none; }
  .btn-ghost { background: var(--panel); color: var(--muted); border: 1px solid var(--line); flex: 0 0 auto; padding: 14px 20px; }
  .btn-ghost:hover { color: var(--text); }
  .btn-danger-text { background: none; border: none; color: var(--accent); font-weight: 700; cursor: pointer;
    font-size: .85rem; margin-top: 16px; width: 100%; padding: 6px; }
  .btn-danger-text:hover { text-decoration: underline; }

  /* Toast */
  #toast {
    position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%) translateY(120px);
    background: var(--panel-2); color: var(--text); padding: 12px 20px; border-radius: 14px;
    border: 1px solid var(--line); font-weight: 600; font-size: .88rem; box-shadow: var(--shadow);
    z-index: 100; transition: transform .3s cubic-bezier(.2,1.2,.3,1); display: flex; align-items: center; gap: 8px;
    max-width: 90vw;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* Confetti */
  #confetti { position: fixed; inset: 0; pointer-events: none; z-index: 90; }

  footer { text-align: center; color: var(--faint); font-size: .74rem; margin-top: 34px; }
  .hidden-file { display: none; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">✦</div>
    <div class="title">
      <h1>Micro Habits</h1>
      <p id="dateLine">—</p>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="btnExport" title="Export JSON">⭳</button>
      <button class="icon-btn" id="btnImport" title="Import JSON">⭱</button>
      <input type="file" id="fileInput" class="hidden-file" accept="application/json,.json" />
    </div>
  </header>

  <section class="hero">
    <div class="hero-row">
      <div>
        <div class="hero-greet" id="greeting">Let's build momentum ✨</div>
        <div class="hero-sub" id="motivate">Small steps, every day.</div>
      </div>
      <div class="hero-stats">
        <div class="stat"><b id="statToday">0/0</b><span>Today</span></div>
        <div class="stat"><b id="statStreak">0</b><span>Top streak</span></div>
        <div class="stat"><b id="statRate">0%</b><span>7‑day</span></div>
      </div>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progFill"></div></div>
    <div class="progress-label"><span>Today's progress</span><span><b id="progPct">0%</b></span></div>
  </section>

  <div class="section-head">
    <h2>Your Habits</h2>
    <span class="right" id="habitCount">0 / 7</span>
  </div>

  <div class="habits" id="habitList"></div>
  <button class="add-habit" id="btnAdd">＋ Add a habit</button>

  <footer>Tap a box to check off · tap again to skip · long‑held streaks light up 🔥</footer>
</div>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal" role="dialog" aria-modal="true">
    <h3 id="modalTitle">New Habit</h3>
    <p class="hint" id="modalHint">What small thing will you do every day?</p>

    <label class="fld">Name</label>
    <input type="text" id="inpName" maxlength="32" placeholder="e.g. Drink water" autocomplete="off" />

    <label class="fld">Icon</label>
    <div class="emoji-grid" id="emojiGrid"></div>

    <label class="fld">Color</label>
    <div class="color-row" id="colorRow"></div>

    <div class="modal-actions">
      <button class="btn btn-ghost" id="btnCancel">Cancel</button>
      <button class="btn btn-primary" id="btnSave">Add Habit</button>
    </div>
    <button class="btn-danger-text" id="btnDelete" style="display:none">Delete this habit</button>
  </div>
</div>

<canvas id="confetti"></canvas>
<div id="toast"></div>

<script>
(function(){
  "use strict";
  const STORE_KEY = "micro-habits-v1";
  const MAX = 7;
  const EMOJIS = ["💧","🏃","📚","🧘","💪","🥗","😴","✍️","🎯","🌱","☀️","🎸","💊","🦷","🧹","📵","🙏","🚭","💻","🎨","🍎","🚶","🧠","⏰"];
  const COLORS = ["#ff6b9d","#c084fc","#38bdf8","#4ade80","#ffcb6b","#fb7185","#34d399","#60a5fa"];
  const STATES = { NONE:0, DONE:1, SKIP:2 };

  // ---------- date helpers ----------
  const DAY = 86400000;
  function keyOf(d){ const x=new Date(d); x.setHours(0,0,0,0);
    return x.getFullYear()+"-"+String(x.getMonth()+1).padStart(2,"0")+"-"+String(x.getDate()).padStart(2,"0"); }
  function today(){ const x=new Date(); x.setHours(0,0,0,0); return x; }
  function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); x.setHours(0,0,0,0); return x; }

  // ---------- state ----------
  let state = load();

  function load(){
    try {
      const raw = localStorage.getItem(STORE_KEY);
      if (raw){ const p = JSON.parse(raw); if (p && Array.isArray(p.habits)) return p; }
    } catch(e){}
    return seed();
  }
  function save(){ try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); } catch(e){} }

  function uid(){ return "h"+Math.random().toString(36).slice(2,9); }

  // Seed demo data: build log relative to today so it always looks "live"
  function seed(){
    const t = today();
    function log(pattern){ // pattern from oldest(6 days ago) -> today
      const o = {};
      for (let i=0;i<pattern.length;i++){
        const v = pattern[i];
        if (v) o[keyOf(addDays(t,-(pattern.length-1-i)))] = v;
      }
      return o;
    }
    return {
      habits: [
        { id:uid(), name:"Drink water", emoji:"💧", color:"#38bdf8",
          log: log([1,1,1,1,1,1,1]) },
        { id:uid(), name:"Read 10 pages", emoji:"📚", color:"#c084fc",
          log: log([1,1,2,1,1,1,0]) },
        { id:uid(), name:"Move your body", emoji:"🏃", color:"#ff6b9d",
          log: log([1,0,1,1,1,1,0]) },
        { id:uid(), name:"Meditate", emoji:"🧘", color:"#4ade80",
          log: log([0,1,1,1,2,1,1]) },
        { id:uid(), name:"Sleep by 11", emoji:"😴", color:"#ffcb6b",
          log: log([1,1,0,1,1,0,0]) }
      ]
    };
  }

  // ---------- streak logic ----------
  // current streak: consecutive days up to today where DONE (SKIP keeps streak alive but doesn't add),
  // counting back from today (or yesterday if today not yet marked).
  function currentStreak(h){
    let streak = 0;
    let d = today();
    // if today not marked done/skip, start from yesterday so an unmarked "today" doesn't break a streak
    const tk = keyOf(d);
    if (h.log[tk] !== STATES.DONE && h.log[tk] !== STATES.SKIP) d = addDays(d,-1);
    for (let i=0;i<3650;i++){
      const v = h.log[keyOf(d)];
      if (v === STATES.DONE){ streak++; d = addDays(d,-1); }
      else if (v === STATES.SKIP){ d = addDays(d,-1); } // freeze: skip preserves but doesn't count
      else break;
    }
    return streak;
  }
  function bestStreak(h){
    const keys = Object.keys(h.log).filter(k=>h.log[k]===STATES.DONE||h.log[k]===STATES.SKIP).sort();
    if (!keys.length) return 0;
    let best=0, cur=0, prev=null;
    for (const k of keys){
      const dd = new Date(k+"T00:00:00");
      if (prev && Math.round((dd-prev)/DAY)===1){ /* continuous */ }
      else if (prev){ cur=0; }
      if (h.log[k]===STATES.DONE) cur++;
      // skip days keep continuity but already handled by date adjacency
      if (h.log[k]===STATES.SKIP){ /* keep cur, continuity via date */ }
      best=Math.max(best,cur);
      prev=dd;
    }
    return best;
  }

  function sevenDayRate(){
    if (!state.habits.length) return 0;
    let done=0, total=0;
    for (let i=0;i<7;i++){
      const k = keyOf(addDays(today(),-i));
      for (const h of state.habits){
        if (h.log[k]===STATES.SKIP) continue; // skipped days excluded from denominator
        total++;
        if (h.log[k]===STATES.DONE) done++;
      }
    }
    return total ? Math.round(done/total*100) : 0;
  }

  // ---------- render ----------
  const $ = s => document.querySelector(s);
  const listEl = $("#habitList");
  const WD = ["S","M","T","W","T","F","S"];

  function fmtDate(){
    return new Date().toLocaleDateString(undefined,{weekday:"long",month:"long",day:"numeric"});
  }

  function render(){
    $("#dateLine").textContent = fmtDate();
    // hero stats
    const tk = keyOf(today());
    let doneToday=0, totalToday=state.habits.length, top=0;
    for (const h of state.habits){
      if (h.log[tk]===STATES.DONE) doneToday++;
      top = Math.max(top, currentStreak(h));
    }
    const pct = totalToday ? Math.round(doneToday/totalToday*100) : 0;
    $("#statToday").textContent = doneToday+"/"+totalToday;
    $("#statStreak").textContent = top;
    $("#statRate").textContent = sevenDayRate()+"%";
    $("#progFill").style.width = pct+"%";
    $("#progPct").textContent = pct+"%";
    $("#habitCount").textContent = state.habits.length+" / "+MAX;
    $("#btnAdd").disabled = state.habits.length>=MAX;
    $("#btnAdd").textContent = state.habits.length>=MAX ? "Maximum 7 habits reached" : "＋ Add a habit";

    // greeting + motivation
    const hr = new Date().getHours();
    const greet = hr<12?"Good morning":hr<18?"Good afternoon":"Good evening";
    $("#greeting").textContent = greet + " 👋";
    let msg;
    if (!totalToday) msg = "Add your first habit to begin.";
    else if (doneToday===0) msg = "A fresh day. Pick one small win to start.";
    else if (doneToday===totalToday) msg = "Perfect day! Every habit done. 🎉";
    else if (pct>=60) msg = "You're on a roll — finish strong!";
    else msg = doneToday+" down, "+(totalToday-doneToday)+" to go. Keep stacking wins.";
    $("#motivate").textContent = msg;

    // list
    listEl.innerHTML = "";
    if (!state.habits.length){
      listEl.innerHTML = '<div class="empty"><div class="big">🌱</div><div>No habits yet.<br>Plant your first one below.</div></div>';
      return;
    }
    state.habits.forEach(h => listEl.appendChild(habitCard(h)));
  }

  function habitCard(h){
    const cur = currentStreak(h), best = bestStreak(h);
    const tk = keyOf(today());
    const st = h.log[tk]||STATES.NONE;

    const card = document.createElement("div");
    card.className = "habit";
    card.style.setProperty("--hc", h.color);

    const top = document.createElement("div");
    top.className = "habit-top";
    top.innerHTML =
      '<div class="h-emoji">'+h.emoji+'</div>'+
      '<div class="h-info">'+
        '<div class="h-name">'+esc(h.name)+'</div>'+
        '<div class="h-meta">'+
          '<span class="streak-badge'+(cur>0?'':' cold')+'">'+(cur>0?'🔥':'❄️')+' '+cur+' day'+(cur===1?'':'s')+'</span>'+
          '<span class="best-badge">Best '+best+'</span>'+
        '</div>'+
      '</div>';

    // actions
    const acts = document.createElement("div");
    acts.className = "h-actions";
    const eb = mini("✎","edit"); eb.onclick = e=>{ e.stopPropagation(); openEdit(h); };
    acts.appendChild(eb);
    card.appendChild(acts);

    // check toggle (today)
    const chk = document.createElement("button");
    chk.className = "check"+(st===STATES.DONE?" done":st===STATES.SKIP?" skip":"");
    chk.innerHTML = st===STATES.DONE?"✓":st===STATES.SKIP?"⤳":"";
    chk.title = "Tap: done · tap again: skip · again: clear";
    chk.onclick = ()=> cycle(h, chk);
    top.appendChild(chk);
    card.appendChild(top);

    // week strip
    const week = document.createElement("div");
    week.className = "week";
    for (let i=6;i>=0;i--){
      const d = addDays(today(),-i);
      const k = keyOf(d);
      const v = h.log[k]||STATES.NONE;
      const isToday = i===0;
      const day = document.createElement("div");
      day.className = "day"+(isToday?" is-today":"");
      const dotCls = v===STATES.DONE?"d-done":v===STATES.SKIP?"d-skip":"";
      day.innerHTML = '<div class="lbl">'+WD[d.getDay()]+'</div>'+
        '<div class="dot '+dotCls+'">'+(v===STATES.DONE?'✓':v===STATES.SKIP?'·':'')+'</div>';
      day.onclick = ()=> { cycleDay(h,k); };
      week.appendChild(day);
    }
    card.appendChild(week);

    return card;
  }

  function mini(txt,cls){ const b=document.createElement("button"); b.className="mini-btn"+(cls==="del"?" del":""); b.innerHTML=txt; return b; }
  function esc(s){ return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

  // ---------- interactions ----------
  function nextState(v){ return v===STATES.NONE?STATES.DONE : v===STATES.DONE?STATES.SKIP : STATES.NONE; }

  function cycle(h, chkEl){
    const k = keyOf(today());
    const prev = h.log[k]||STATES.NONE;
    const nxt = nextState(prev);
    if (nxt===STATES.NONE) delete h.log[k]; else h.log[k]=nxt;
    save();
    if (nxt===STATES.DONE){
      if (chkEl){ chkEl.classList.remove("pop"); void chkEl.offsetWidth; chkEl.classList.add("pop"); }
      checkAllDone();
    }
    render();
    if (nxt===STATES.DONE) toast("Nice! "+h.emoji+" "+h.name);
    else if (nxt===STATES.SKIP) toast("Day skipped — streak protected ⤳");
  }
  function cycleDay(h,k){
    const prev = h.log[k]||STATES.NONE;
    const nxt = nextState(prev);
    if (nxt===STATES.NONE) delete h.log[k]; else h.log[k]=nxt;
    save();
    if (nxt===STATES.DONE && k===keyOf(today())) checkAllDone();
    render();
  }

  function checkAllDone(){
    const tk = keyOf(today());
    if (state.habits.length>=2 && state.habits.every(h=>h.log[tk]===STATES.DONE)){
      setTimeout(()=>{ burst(); toast("🎉 Perfect day! All habits complete!"); }, 120);
    }
  }

  // ---------- modal ----------
  let editing = null;
  let pickEmoji = EMOJIS[0], pickColor = COLORS[0];

  function buildPickers(){
    const eg = $("#emojiGrid"); eg.innerHTML="";
    EMOJIS.forEach(e=>{ const b=document.createElement("button"); b.textContent=e;
      b.onclick=()=>{ pickEmoji=e; refreshPickers(); }; eg.appendChild(b); });
    const cr = $("#colorRow"); cr.innerHTML="";
    COLORS.forEach(c=>{ const b=document.createElement("button"); b.style.background=c; b.style.color=c;
      b.onclick=()=>{ pickColor=c; refreshPickers(); }; cr.appendChild(b); });
  }
  function markColor(){
    [...$("#colorRow").children].forEach((b,i)=> b.classList.toggle("sel", COLORS[i]===pickColor));
    [...$("#emojiGrid").children].forEach((b)=> b.classList.toggle("sel", b.textContent===pickEmoji));
  }

  function openAdd(){
    if (state.habits.length>=MAX) return;
    editing=null; pickEmoji=EMOJIS[Math.floor(state.habits.length)%EMOJIS.length]; pickColor=COLORS[state.habits.length%COLORS.length];
    $("#modalTitle").textContent="New Habit";
    $("#modalHint").textContent="What small thing will you do every day?";
    $("#inpName").value="";
    $("#btnSave").textContent="Add Habit";
    $("#btnDelete").style.display="none";
    markColor();
    showModal();
    setTimeout(()=>$("#inpName").focus(),250);
  }
  function openEdit(h){
    editing=h; pickEmoji=h.emoji; pickColor=h.color;
    $("#modalTitle").textContent="Edit Habit";
    $("#modalHint").textContent="Update the details for this habit.";
    $("#inpName").value=h.name;
    $("#btnSave").textContent="Save Changes";
    $("#btnDelete").style.display="block";
    markColor();
    showModal();
  }
  function showModal(){ $("#overlay").classList.add("open"); }
  function closeModal(){ $("#overlay").classList.remove("open"); }

  function saveModal(){
    const name = $("#inpName").value.trim() || "Untitled";
    if (editing){
      editing.name=name; editing.emoji=pickEmoji; editing.color=pickColor;
      toast("Habit updated ✓");
    } else {
      if (state.habits.length>=MAX) return;
      state.habits.push({ id:uid(), name, emoji:pickEmoji, color:pickColor, log:{} });
      toast("Habit added — let's go! "+pickEmoji);
    }
    save(); render(); closeModal();
  }
  function deleteHabit(){
    if (!editing) return;
    state.habits = state.habits.filter(x=>x.id!==editing.id);
    save(); render(); closeModal(); toast("Habit deleted");
  }

  // ---------- export / import ----------
  function exportJSON(){
    const data = JSON.stringify(state,null,2);
    const blob = new Blob([data],{type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href=url; a.download="micro-habits-"+keyOf(today())+".json";
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),500);
    toast("Exported your data ⭳");
  }
  function importJSON(file){
    const r = new FileReader();
    r.onload = e=>{
      try {
        const p = JSON.parse(e.target.result);
        if (!p || !Array.isArray(p.habits)) throw 0;
        // sanitize
        const clean = p.habits.slice(0,MAX).map(h=>({
          id: h.id||uid(),
          name: String(h.name||"Habit").slice(0,40),
          emoji: String(h.emoji||"✨").slice(0,4),
          color: /^#[0-9a-f]{6}$/i.test(h.color)?h.color:COLORS[0],
          log: sanitizeLog(h.log)
        }));
        state = { habits: clean };
        save(); render(); toast("Imported "+clean.length+" habit"+(clean.length===1?"":"s")+" ✓");
      } catch(err){ toast("⚠️ Could not read that file"); }
    };
    r.readAsText(file);
  }
  function sanitizeLog(log){
    const o={}; if (log && typeof log==="object"){
      for (const k in log){
        if (/^\d{4}-\d{2}-\d{2}$/.test(k)){ const v=+log[k]; if (v===1||v===2) o[k]=v; }
      }
    } return o;
  }

  // ---------- toast ----------
  let toastT;
  function toast(msg){
    const el = $("#toast"); el.textContent=msg; el.classList.add("show");
    clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove("show"),2400);
  }

  // ---------- confetti ----------
  const cv = $("#confetti"); const ctx = cv.getContext("2d");
  let parts=[], raf=null;
  function size(){ cv.width=innerWidth*devicePixelRatio; cv.height=innerHeight*devicePixelRatio; }
  size(); addEventListener("resize",size);
  function burst(){
    const cols=["#ff6b9d","#c084fc","#38bdf8","#4ade80","#ffcb6b"];
    for (let i=0;i<140;i++){
      parts.push({
        x: cv.width/2 + (Math.random()-.5)*120*devicePixelRatio,
        y: cv.height*0.32,
        vx:(Math.random()-.5)*16*devicePixelRatio,
        vy:(Math.random()*-14-4)*devicePixelRatio,
        g:0.5*devicePixelRatio,
        s:(Math.random()*7+4)*devicePixelRatio,
        c:cols[i%cols.length],
        rot:Math.random()*6.28, vr:(Math.random()-.5)*.4, life:1
      });
    }
    if (!raf) animate();
  }
  function animate(){
    ctx.clearRect(0,0,cv.width,cv.height);
    parts.forEach(p=>{
      p.vy+=p.g; p.x+=p.vx; p.y+=p.vy; p.vx*=.99; p.rot+=p.vr; p.life-=0.008;
      ctx.save(); ctx.globalAlpha=Math.max(0,p.life); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      ctx.fillStyle=p.c; ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*0.6); ctx.restore();
    });
    parts = parts.filter(p=>p.life>0 && p.y<cv.height+40);
    if (parts.length) raf=requestAnimationFrame(animate);
    else { ctx.clearRect(0,0,cv.width,cv.height); raf=null; }
  }

  // ---------- wire up ----------
  $("#btnAdd").onclick = openAdd;
  $("#btnCancel").onclick = closeModal;
  $("#btnSave").onclick = saveModal;
  $("#btnDelete").onclick = deleteHabit;
  $("#overlay").onclick = e=>{ if (e.target===$("#overlay")) closeModal(); };
  $("#inpName").addEventListener("keydown", e=>{ if (e.key==="Enter") saveModal(); });
  document.addEventListener("keydown", e=>{ if (e.key==="Escape") closeModal(); });
  $("#btnExport").onclick = exportJSON;
  $("#btnImport").onclick = ()=> $("#fileInput").click();
  $("#fileInput").onchange = e=>{ if (e.target.files[0]) importJSON(e.target.files[0]); e.target.value=""; };

  // touch hint: reveal edit buttons on touch devices
  if (matchMedia("(pointer: coarse)").matches) document.body.classList.add("touch");

  buildPickers();
  render();

  // re-render at midnight rollover so "today" stays correct
  setInterval(()=>{ if (keyOf(today())!== window.__lastKey){ window.__lastKey=keyOf(today()); render(); } }, 60000);
  window.__lastKey = keyOf(today());
})();
</script>
</body>
</html>
