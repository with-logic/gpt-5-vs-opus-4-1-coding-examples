<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEBULA · Step Sequencer</title>
<style>
  :root{
    --bg:#05060d;
    --panel:#0c1022;
    --panel-2:#11162e;
    --line:#1e2748;
    --txt:#cfe0ff;
    --dim:#6c7aa8;
    --cyan:#22e7ff;
    --mag:#ff3ec9;
    --lime:#9dff5b;
    --amber:#ffb347;
    --glow:0 0 14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:
      radial-gradient(1200px 700px at 15% -10%, #14193a 0%, transparent 55%),
      radial-gradient(900px 600px at 110% 10%, #25103a 0%, transparent 50%),
      var(--bg);
    color:var(--txt);
    font-family:"Segoe UI",-apple-system,Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100%;
    overflow-x:hidden;
  }
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background:linear-gradient(transparent 50%, rgba(0,0,0,.18) 50%);
    background-size:100% 3px;mix-blend-mode:overlay;opacity:.4;
  }
  .wrap{position:relative;z-index:1;max-width:1180px;margin:0 auto;padding:22px 18px 60px}

  /* ===== Header ===== */
  header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:18px}
  .brand{display:flex;align-items:center;gap:14px}
  .logo{
    width:46px;height:46px;border-radius:12px;position:relative;
    background:linear-gradient(135deg,var(--cyan),var(--mag));
    box-shadow:var(--glow) rgba(34,231,255,.5);
    display:grid;place-items:center;flex:none;
  }
  .logo span{
    width:18px;height:18px;border-radius:50%;
    background:var(--bg);box-shadow:inset 0 0 0 3px rgba(255,255,255,.85);
    animation:pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{transform:scale(1);opacity:.9}50%{transform:scale(.72);opacity:1}}
  .title h1{font-size:23px;letter-spacing:.32em;font-weight:800;
    background:linear-gradient(90deg,var(--cyan),#fff 55%,var(--mag));
    -webkit-background-clip:text;background-clip:text;color:transparent;}
  .title p{font-size:11px;letter-spacing:.42em;color:var(--dim);margin-top:3px}
  .meta{display:flex;gap:10px;align-items:center}
  .badge{font-size:10.5px;letter-spacing:.18em;color:var(--dim);
    border:1px solid var(--line);border-radius:999px;padding:6px 12px;background:rgba(255,255,255,.02)}

  /* ===== Panels ===== */
  .panel{
    background:linear-gradient(180deg,var(--panel),var(--panel-2));
    border:1px solid var(--line);border-radius:18px;
    box-shadow:0 18px 50px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.04);
  }

  /* ===== Transport ===== */
  .transport{display:flex;align-items:center;gap:18px;flex-wrap:wrap;padding:16px 18px;margin-bottom:16px}
  .play-btn{
    width:62px;height:62px;border-radius:16px;border:none;cursor:pointer;flex:none;
    background:linear-gradient(135deg,var(--lime),#3ad17a);
    color:#04210f;display:grid;place-items:center;
    box-shadow:var(--glow) rgba(157,255,91,.45),inset 0 2px 0 rgba(255,255,255,.35);
    transition:transform .12s, box-shadow .2s;
  }
  .play-btn:hover{transform:translateY(-2px)}
  .play-btn:active{transform:translateY(0)}
  .play-btn.playing{background:linear-gradient(135deg,var(--mag),#c5168f);color:#fff;box-shadow:var(--glow) rgba(255,62,201,.5)}
  .play-btn svg{width:26px;height:26px}
  .ctrl{display:flex;flex-direction:column;gap:7px;min-width:150px}
  .ctrl .row{display:flex;justify-content:space-between;align-items:baseline}
  .ctrl label{font-size:10.5px;letter-spacing:.2em;color:var(--dim);text-transform:uppercase}
  .ctrl .val{font-size:14px;font-weight:700;color:var(--cyan);font-variant-numeric:tabular-nums}
  input[type=range]{-webkit-appearance:none;appearance:none;height:6px;border-radius:6px;outline:none;
    background:linear-gradient(90deg,var(--cyan),var(--mag));cursor:pointer}
  input[type=range].swing{background:linear-gradient(90deg,#2a3358,var(--amber))}
  input[type=range].vol{background:linear-gradient(90deg,#2a3358,var(--lime))}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;
    background:#fff;box-shadow:0 0 0 3px rgba(34,231,255,.35),0 2px 6px rgba(0,0,0,.5);cursor:pointer}
  input[type=range]::-moz-range-thumb{width:18px;height:18px;border:none;border-radius:50%;background:#fff;
    box-shadow:0 0 0 3px rgba(34,231,255,.35)}
  .spacer{flex:1}
  .btn{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--txt);cursor:pointer;
    border:1px solid var(--line);border-radius:10px;padding:9px 14px;background:rgba(255,255,255,.03);
    transition:.18s;white-space:nowrap}
  .btn:hover{border-color:var(--cyan);color:var(--cyan);box-shadow:var(--glow) rgba(34,231,255,.18)}
  .btn.warn:hover{border-color:var(--mag);color:var(--mag);box-shadow:var(--glow) rgba(255,62,201,.18)}
  .btn:disabled{opacity:.4;cursor:not-allowed;box-shadow:none;border-color:var(--line);color:var(--dim)}

  /* ===== Grid ===== */
  .grid-panel{padding:16px 18px 20px;margin-bottom:16px;overflow-x:auto}
  .step-head{display:grid;grid-template-columns:128px repeat(16,1fr);gap:7px;margin:0 0 9px 0;min-width:760px}
  .step-head .lab{font-size:9.5px;letter-spacing:.1em;color:var(--dim);text-align:center;padding-top:2px}
  .step-head .lab.beat{color:var(--cyan)}
  .step-head .spacer{}
  .track{display:grid;grid-template-columns:128px repeat(16,1fr);gap:7px;align-items:center;margin-bottom:7px;min-width:760px}
  .tname{display:flex;align-items:center;gap:9px}
  .tdot{width:11px;height:11px;border-radius:50%;flex:none;box-shadow:0 0 8px currentColor}
  .tlabel{font-size:11.5px;letter-spacing:.1em;font-weight:600;color:var(--txt)}
  .tmute{margin-left:auto;font-size:8.5px;letter-spacing:.1em;border:1px solid var(--line);border-radius:6px;
    padding:3px 6px;cursor:pointer;color:var(--dim);background:transparent;transition:.15s}
  .tmute.on{color:var(--amber);border-color:var(--amber);box-shadow:0 0 8px rgba(255,179,71,.3)}
  .cell{
    position:relative;aspect-ratio:1/1;min-height:30px;border-radius:9px;cursor:pointer;
    background:rgba(255,255,255,.025);border:1px solid var(--line);
    transition:transform .08s, background .12s, box-shadow .12s;
  }
  .cell:hover{background:rgba(255,255,255,.07)}
  .cell.q{background:rgba(255,255,255,.04)} /* every 4th subtle highlight */
  .cell.on{
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    border-color:transparent;
    box-shadow:0 0 12px var(--accent), inset 0 1px 0 rgba(255,255,255,.4);
  }
  .cell.on::after{content:"";position:absolute;inset:30%;border-radius:50%;background:rgba(255,255,255,.55)}
  .cell.cursor{box-shadow:0 0 0 2px var(--cyan), 0 0 16px rgba(34,231,255,.6)!important}
  .cell.flash{animation:flash .25s ease-out}
  @keyframes flash{0%{transform:scale(1.18);filter:brightness(1.6)}100%{transform:scale(1)}}

  /* ===== Patterns ===== */
  .bottom{display:grid;grid-template-columns:1.6fr 1fr;gap:16px}
  @media(max-width:820px){.bottom{grid-template-columns:1fr}}
  .sec-title{font-size:11px;letter-spacing:.24em;color:var(--dim);text-transform:uppercase;
    padding:14px 18px 6px;display:flex;align-items:center;gap:9px}
  .sec-title::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--cyan);box-shadow:var(--glow) var(--cyan)}
  .pat-body{padding:8px 18px 18px}
  .pat-list{display:flex;flex-direction:column;gap:8px;max-height:230px;overflow-y:auto}
  .pat-item{display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:11px;
    padding:10px 12px;background:rgba(255,255,255,.02);transition:.15s}
  .pat-item:hover{border-color:rgba(34,231,255,.5)}
  .pat-item .nm{font-size:12.5px;font-weight:600;flex:1;letter-spacing:.04em}
  .pat-item .sub{font-size:10px;color:var(--dim);letter-spacing:.06em}
  .mini{font-size:9.5px;letter-spacing:.1em;border:1px solid var(--line);border-radius:7px;padding:6px 9px;
    cursor:pointer;background:transparent;color:var(--dim);transition:.15s;text-transform:uppercase}
  .mini:hover{color:var(--cyan);border-color:var(--cyan)}
  .mini.del:hover{color:var(--mag);border-color:var(--mag)}
  .empty{font-size:11.5px;color:var(--dim);text-align:center;padding:24px;letter-spacing:.06em}
  .save-row{display:flex;gap:9px;margin-bottom:14px}
  .save-row input{flex:1;background:rgba(0,0,0,.3);border:1px solid var(--line);border-radius:10px;
    padding:10px 12px;color:var(--txt);font-size:12.5px;outline:none}
  .save-row input:focus{border-color:var(--cyan)}

  .tools{display:flex;flex-direction:column;gap:9px;padding:8px 18px 18px}
  .tools .btn{width:100%;text-align:left;padding:11px 14px;display:flex;align-items:center;gap:10px}
  .tools .btn .ic{font-size:14px}
  .hint{font-size:10px;color:var(--dim);letter-spacing:.04em;line-height:1.6;padding:4px 0 0}

  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--panel-2);border:1px solid var(--cyan);color:var(--cyan);
    padding:11px 20px;border-radius:12px;font-size:12px;letter-spacing:.1em;
    box-shadow:var(--glow) rgba(34,231,255,.3);opacity:0;pointer-events:none;transition:.3s;z-index:50}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  .footer{text-align:center;color:var(--dim);font-size:10px;letter-spacing:.2em;margin-top:24px}
  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-thumb{background:#1f2950;border-radius:9px}
  ::-webkit-scrollbar-track{background:transparent}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="logo"><span></span></div>
      <div class="title">
        <h1>N E B U L A</h1>
        <p>STEP&nbsp;&nbsp;SEQUENCER</p>
      </div>
    </div>
    <div class="meta">
      <div class="badge" id="statusBadge">◌ STOPPED</div>
      <div class="badge">16 · STEPS</div>
      <div class="badge">WEBAUDIO</div>
    </div>
  </header>

  <!-- Transport -->
  <div class="panel transport">
    <button class="play-btn" id="playBtn" title="Play / Stop (Space)">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
    </button>

    <div class="ctrl">
      <div class="row"><label>Tempo</label><span class="val"><span id="bpmVal">120</span> BPM</span></div>
      <input type="range" id="bpm" min="60" max="200" value="120">
    </div>
    <div class="ctrl">
      <div class="row"><label>Swing</label><span class="val"><span id="swingVal">0</span> %</span></div>
      <input type="range" id="swing" class="swing" min="0" max="60" value="0">
    </div>
    <div class="ctrl">
      <div class="row"><label>Master</label><span class="val"><span id="volVal">80</span> %</span></div>
      <input type="range" id="vol" class="vol" min="0" max="100" value="80">
    </div>

    <div class="spacer"></div>
    <button class="btn warn" id="clearBtn">✕ Clear</button>
    <button class="btn" id="randBtn">⚄ Random</button>
  </div>

  <!-- Grid -->
  <div class="panel grid-panel">
    <div class="step-head" id="stepHead"></div>
    <div id="grid"></div>
  </div>

  <!-- Bottom -->
  <div class="bottom">
    <div class="panel">
      <div class="sec-title">Pattern Bank</div>
      <div class="pat-body">
        <div class="save-row">
          <input type="text" id="patName" placeholder="Name this pattern…" maxlength="22">
          <button class="btn" id="saveBtn">⬇ Save</button>
        </div>
        <div class="pat-list" id="patList"></div>
      </div>
    </div>

    <div class="panel">
      <div class="sec-title">Tools</div>
      <div class="tools">
        <button class="btn" id="exportBtn"><span class="ic">🎙</span> Export Loop as WAV</button>
        <button class="btn" id="copyBtn"><span class="ic">⧉</span> Copy Pattern Code</button>
        <button class="btn" id="pasteBtn"><span class="ic">⌥</span> Load From Code</button>
        <div class="hint">
          ▸ <b>Space</b> play/stop &nbsp; · &nbsp; <b>C</b> clear &nbsp; · &nbsp; <b>R</b> random<br>
          ▸ Click cells to toggle hits. Patterns &amp; bank persist in your browser.
        </div>
      </div>
    </div>
  </div>

  <div class="footer">NEBULA SEQUENCER · CRAFTED WITH THE WEB AUDIO API</div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   NEBULA STEP SEQUENCER
   - Pure Web Audio synthesis (no samples)
   - 16-step grid, tempo, swing, persistence, WAV export
============================================================ */
(() => {
  "use strict";

  const STEPS = 16;

  // ---- Track definitions: each synthesized procedurally ----
  const TRACKS = [
    { id:"kick",  name:"KICK",  color:"#22e7ff", accent:"#22e7ff", accent2:"#1597d6" },
    { id:"snare", name:"SNARE", color:"#ff3ec9", accent:"#ff3ec9", accent2:"#c5168f" },
    { id:"clap",  name:"CLAP",  color:"#ffb347", accent:"#ffb347", accent2:"#e08820" },
    { id:"chat",  name:"HAT C", color:"#9dff5b", accent:"#9dff5b", accent2:"#5fcf2f" },
    { id:"ohat",  name:"HAT O", color:"#7affe0", accent:"#7affe0", accent2:"#3bbfa3" },
    { id:"tom",   name:"TOM",   color:"#b78bff", accent:"#b78bff", accent2:"#7d4fe0" },
    { id:"perc",  name:"PERC",  color:"#ff7a7a", accent:"#ff7a7a", accent2:"#d64242" },
    { id:"cow",   name:"COWBL", color:"#ffe45b", accent:"#ffe45b", accent2:"#d6bb20" },
  ];

  // ---- State ----
  let pattern = TRACKS.map(() => new Array(STEPS).fill(false));
  let mutes   = TRACKS.map(() => false);
  let isPlaying = false;
  let bpm = 120, swing = 0, master = 0.8;
  let currentStep = 0;

  // ---- Audio ----
  let ac = null;
  let masterGain = null;
  let lookahead = null;
  let nextNoteTime = 0;
  let schedStep = 0;
  const SCHEDULE_AHEAD = 0.1; // seconds

  function ensureAudio(){
    if(ac) return;
    ac = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = ac.createGain();
    masterGain.gain.value = master;
    // gentle limiter-ish compressor for punch
    const comp = ac.createDynamicsCompressor();
    comp.threshold.value = -10; comp.knee.value = 20;
    comp.ratio.value = 6; comp.attack.value = 0.003; comp.release.value = 0.2;
    masterGain.connect(comp); comp.connect(ac.destination);
  }

  /* ====================================================
     SYNTHESIS — each voice renders into a destination node
     at time t. Used both live and for offline WAV render.
  ==================================================== */
  function noiseBuffer(ctx, dur){
    const len = Math.max(1, Math.floor(ctx.sampleRate * dur));
    const buf = ctx.createBuffer(1, len, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for(let i=0;i<len;i++) d[i] = Math.random()*2-1;
    return buf;
  }

  const VOICES = {
    kick(ctx, dest, t){
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.frequency.setValueAtTime(150, t);
      o.frequency.exponentialRampToValueAtTime(45, t+0.12);
      g.gain.setValueAtTime(1.0, t);
      g.gain.exponentialRampToValueAtTime(0.001, t+0.42);
      o.connect(g); g.connect(dest);
      o.start(t); o.stop(t+0.45);
      // click transient
      const c = ctx.createOscillator(), cg = ctx.createGain();
      c.type="square"; c.frequency.setValueAtTime(900,t);
      cg.gain.setValueAtTime(0.4,t); cg.gain.exponentialRampToValueAtTime(0.001,t+0.03);
      c.connect(cg); cg.connect(dest); c.start(t); c.stop(t+0.04);
    },
    snare(ctx, dest, t){
      const n = ctx.createBufferSource(); n.buffer = noiseBuffer(ctx,0.25);
      const nf = ctx.createBiquadFilter(); nf.type="highpass"; nf.frequency.value=1400;
      const ng = ctx.createGain();
      ng.gain.setValueAtTime(0.8,t); ng.gain.exponentialRampToValueAtTime(0.001,t+0.2);
      n.connect(nf); nf.connect(ng); ng.connect(dest); n.start(t); n.stop(t+0.25);
      const o = ctx.createOscillator(), og=ctx.createGain();
      o.type="triangle"; o.frequency.setValueAtTime(190,t);
      og.gain.setValueAtTime(0.5,t); og.gain.exponentialRampToValueAtTime(0.001,t+0.12);
      o.connect(og); og.connect(dest); o.start(t); o.stop(t+0.13);
    },
    clap(ctx, dest, t){
      const nf = ctx.createBiquadFilter(); nf.type="bandpass"; nf.frequency.value=1100; nf.Q.value=1.2;
      nf.connect(dest);
      const offs=[0,0.012,0.024,0.05];
      offs.forEach((o,i)=>{
        const n=ctx.createBufferSource(); n.buffer=noiseBuffer(ctx,0.12);
        const g=ctx.createGain();
        const amp = i===offs.length-1?0.7:0.45;
        g.gain.setValueAtTime(amp,t+o);
        g.gain.exponentialRampToValueAtTime(0.001, t+o+(i===offs.length-1?0.15:0.04));
        n.connect(g); g.connect(nf); n.start(t+o); n.stop(t+o+0.16);
      });
    },
    chat(ctx, dest, t){
      const n=ctx.createBufferSource(); n.buffer=noiseBuffer(ctx,0.06);
      const f=ctx.createBiquadFilter(); f.type="highpass"; f.frequency.value=7000;
      const g=ctx.createGain();
      g.gain.setValueAtTime(0.45,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.045);
      n.connect(f); f.connect(g); g.connect(dest); n.start(t); n.stop(t+0.06);
    },
    ohat(ctx, dest, t){
      const n=ctx.createBufferSource(); n.buffer=noiseBuffer(ctx,0.35);
      const f=ctx.createBiquadFilter(); f.type="highpass"; f.frequency.value=6000;
      const g=ctx.createGain();
      g.gain.setValueAtTime(0.4,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.32);
      n.connect(f); f.connect(g); g.connect(dest); n.start(t); n.stop(t+0.35);
    },
    tom(ctx, dest, t){
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.type="sine";
      o.frequency.setValueAtTime(220,t); o.frequency.exponentialRampToValueAtTime(90,t+0.2);
      g.gain.setValueAtTime(0.8,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.3);
      o.connect(g); g.connect(dest); o.start(t); o.stop(t+0.32);
    },
    perc(ctx, dest, t){
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.type="sawtooth"; o.frequency.setValueAtTime(420,t);
      o.frequency.exponentialRampToValueAtTime(180,t+0.08);
      const f=ctx.createBiquadFilter(); f.type="bandpass"; f.frequency.value=900; f.Q.value=3;
      g.gain.setValueAtTime(0.5,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.13);
      o.connect(f); f.connect(g); g.connect(dest); o.start(t); o.stop(t+0.14);
    },
    cow(ctx, dest, t){
      // two detuned squares = cowbell-ish
      const mk=(freq)=>{const o=ctx.createOscillator();o.type="square";o.frequency.value=freq;return o;};
      const o1=mk(540), o2=mk(800), g=ctx.createGain();
      const f=ctx.createBiquadFilter(); f.type="bandpass"; f.frequency.value=2700; f.Q.value=1.5;
      g.gain.setValueAtTime(0.4,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.25);
      o1.connect(f); o2.connect(f); f.connect(g); g.connect(dest);
      o1.start(t); o2.start(t); o1.stop(t+0.26); o2.stop(t+0.26);
    },
  };

  /* ====================================================
     SCHEDULER (live playback)
  ==================================================== */
  function stepDuration(){ return 60.0 / bpm / 4; } // 16th note

  function swingOffset(stepIndex){
    // delay odd 16ths
    if(stepIndex % 2 === 1){
      return (swing/100) * stepDuration() * 0.6;
    }
    return 0;
  }

  function scheduleStep(step, time){
    for(let tr=0; tr<TRACKS.length; tr++){
      if(mutes[tr]) continue;
      if(pattern[tr][step]){
        VOICES[TRACKS[tr].id](ac, masterGain, time);
      }
    }
    // visual flash
    const visTime = (time - ac.currentTime) * 1000;
    setTimeout(()=>uiStep(step), Math.max(0,visTime));
  }

  function scheduler(){
    while(nextNoteTime < ac.currentTime + SCHEDULE_AHEAD){
      scheduleStep(schedStep, nextNoteTime + swingOffset(schedStep));
      nextNoteTime += stepDuration();
      schedStep = (schedStep + 1) % STEPS;
    }
  }

  function startPlay(){
    ensureAudio();
    if(ac.state === "suspended") ac.resume();
    isPlaying = true;
    schedStep = 0;
    nextNoteTime = ac.currentTime + 0.05;
    lookahead = setInterval(scheduler, 25);
    const b = document.getElementById("playBtn");
    b.classList.add("playing");
    b.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>';
    setStatus(true);
  }
  function stopPlay(){
    isPlaying = false;
    clearInterval(lookahead);
    const b = document.getElementById("playBtn");
    b.classList.remove("playing");
    b.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
    document.querySelectorAll(".cell.cursor").forEach(c=>c.classList.remove("cursor"));
    setStatus(false);
  }
  function togglePlay(){ isPlaying ? stopPlay() : startPlay(); }

  function setStatus(on){
    const el=document.getElementById("statusBadge");
    el.textContent = on ? "▶ PLAYING" : "◌ STOPPED";
    el.style.color = on ? "var(--lime)" : "var(--dim)";
    el.style.borderColor = on ? "rgba(157,255,91,.5)" : "var(--line)";
  }

  /* ====================================================
     UI rendering
  ==================================================== */
  const gridEl = document.getElementById("grid");
  const cells = []; // cells[track][step]

  function buildHead(){
    const head = document.getElementById("stepHead");
    const spacer = document.createElement("div"); spacer.className="spacer";
    head.appendChild(spacer);
    for(let s=0;s<STEPS;s++){
      const d=document.createElement("div");
      d.className = "lab" + (s%4===0?" beat":"");
      d.textContent = s+1;
      head.appendChild(d);
    }
  }

  function buildGrid(){
    TRACKS.forEach((tr, ti) => {
      const row = document.createElement("div");
      row.className="track";
      const name=document.createElement("div");
      name.className="tname";
      name.innerHTML = `<span class="tdot" style="color:${tr.color}"></span>
                        <span class="tlabel">${tr.name}</span>
                        <button class="tmute" data-tr="${ti}" title="Mute">M</button>`;
      row.appendChild(name);
      cells[ti]=[];
      for(let s=0;s<STEPS;s++){
        const c=document.createElement("div");
        c.className="cell"+(s%4===0?" q":"");
        c.style.setProperty("--accent", tr.accent);
        c.style.setProperty("--accent2", tr.accent2);
        c.addEventListener("click", ()=>toggleCell(ti,s));
        row.appendChild(c);
        cells[ti][s]=c;
      }
      gridEl.appendChild(row);
    });
    gridEl.querySelectorAll(".tmute").forEach(b=>{
      b.addEventListener("click",()=>{
        const i=+b.dataset.tr; mutes[i]=!mutes[i];
        b.classList.toggle("on",mutes[i]);
      });
    });
  }

  function toggleCell(t,s){
    pattern[t][s]=!pattern[t][s];
    cells[t][s].classList.toggle("on",pattern[t][s]);
    if(pattern[t][s]){
      // audition the hit
      ensureAudio(); if(ac.state==="suspended") ac.resume();
      if(!mutes[t]) VOICES[TRACKS[t].id](ac, masterGain, ac.currentTime+0.001);
    }
  }

  function refreshGrid(){
    for(let t=0;t<TRACKS.length;t++)
      for(let s=0;s<STEPS;s++)
        cells[t][s].classList.toggle("on", pattern[t][s]);
  }

  let lastCursor = -1;
  function uiStep(step){
    if(lastCursor>=0){
      for(let t=0;t<TRACKS.length;t++) cells[t][lastCursor].classList.remove("cursor");
    }
    for(let t=0;t<TRACKS.length;t++){
      const c=cells[t][step];
      c.classList.add("cursor");
      if(pattern[t][step] && !mutes[t]){
        c.classList.remove("flash"); void c.offsetWidth; c.classList.add("flash");
      }
    }
    lastCursor = step;
    currentStep = step;
  }

  /* ====================================================
     Controls wiring
  ==================================================== */
  const bpmIn=document.getElementById("bpm"), bpmVal=document.getElementById("bpmVal");
  const swIn=document.getElementById("swing"), swVal=document.getElementById("swingVal");
  const volIn=document.getElementById("vol"), volVal=document.getElementById("volVal");

  bpmIn.addEventListener("input",()=>{bpm=+bpmIn.value; bpmVal.textContent=bpm;});
  swIn.addEventListener("input",()=>{swing=+swIn.value; swVal.textContent=swing;});
  volIn.addEventListener("input",()=>{
    master=+volIn.value/100; volVal.textContent=volIn.value;
    if(masterGain) masterGain.gain.setTargetAtTime(master, ac.currentTime, 0.01);
  });

  document.getElementById("playBtn").addEventListener("click",togglePlay);
  document.getElementById("clearBtn").addEventListener("click",()=>{
    pattern = TRACKS.map(()=>new Array(STEPS).fill(false)); refreshGrid(); toast("Grid cleared");
  });
  document.getElementById("randBtn").addEventListener("click",()=>{
    randomize(); refreshGrid(); toast("Randomized ⚄");
  });

  // Density-aware random generation per track for musical results
  function randomize(){
    const dens=[0.55,0.32,0.18,0.7,0.22,0.12,0.18,0.15];
    pattern = TRACKS.map((tr,i)=>{
      const arr=new Array(STEPS).fill(false);
      for(let s=0;s<STEPS;s++){
        let p=dens[i];
        if(i===0 && s%4===0) p=0.9;            // kick on beats
        if(i===1 && (s===4||s===12)) p=0.85;   // snare backbeat
        if(i===3) p = s%2===0?0.85:0.4;        // closed hat groove
        arr[s]=Math.random()<p;
      }
      return arr;
    });
  }

  // keyboard
  document.addEventListener("keydown",(e)=>{
    if(e.target.tagName==="INPUT") return;
    if(e.code==="Space"){e.preventDefault();togglePlay();}
    else if(e.key==="c"||e.key==="C"){pattern=TRACKS.map(()=>new Array(STEPS).fill(false));refreshGrid();toast("Grid cleared");}
    else if(e.key==="r"||e.key==="R"){randomize();refreshGrid();toast("Randomized ⚄");}
  });

  /* ====================================================
     Persistence (localStorage)
  ==================================================== */
  const LS_KEY="nebula.patterns.v1";
  function loadBank(){ try{return JSON.parse(localStorage.getItem(LS_KEY))||[];}catch(e){return [];} }
  function saveBank(b){ localStorage.setItem(LS_KEY, JSON.stringify(b)); }

  function encodePattern(){
    // bitmask per track (16 bits) -> hex
    return pattern.map(row=>{
      let m=0; for(let s=0;s<STEPS;s++) if(row[s]) m|=(1<<s);
      return m.toString(16).padStart(4,"0");
    }).join("");
  }
  function decodePattern(code){
    code=code.trim().toLowerCase().replace(/[^0-9a-f]/g,"");
    if(code.length < TRACKS.length*4) return false;
    const np=[];
    for(let t=0;t<TRACKS.length;t++){
      const m=parseInt(code.substr(t*4,4),16)||0;
      np.push(Array.from({length:STEPS},(_,s)=>!!(m&(1<<s))));
    }
    pattern=np; return true;
  }

  function renderBank(){
    const list=document.getElementById("patList");
    const bank=loadBank();
    list.innerHTML="";
    if(!bank.length){ list.innerHTML='<div class="empty">No saved patterns yet. Build a beat and hit Save.</div>'; return; }
    bank.forEach((p,idx)=>{
      const hits = p.code.match(/.{4}/g).reduce((a,h)=>a+countBits(parseInt(h,16)),0);
      const item=document.createElement("div");
      item.className="pat-item";
      item.innerHTML=`<div style="flex:1">
            <div class="nm">${escapeHtml(p.name)}</div>
            <div class="sub">${p.bpm} BPM · ${p.swing}% SW · ${hits} HITS</div>
          </div>
          <button class="mini" data-act="load" data-i="${idx}">Load</button>
          <button class="mini del" data-act="del" data-i="${idx}">Del</button>`;
      list.appendChild(item);
    });
    list.querySelectorAll(".mini").forEach(b=>{
      b.addEventListener("click",()=>{
        const i=+b.dataset.i, bank=loadBank();
        if(b.dataset.act==="load"){
          const p=bank[i]; decodePattern(p.code);
          bpm=p.bpm; swing=p.swing;
          bpmIn.value=bpm; bpmVal.textContent=bpm;
          swIn.value=swing; swVal.textContent=swing;
          refreshGrid(); toast("Loaded · "+p.name);
        } else {
          bank.splice(i,1); saveBank(bank); renderBank(); toast("Deleted");
        }
      });
    });
  }
  function countBits(n){let c=0;while(n){c+=n&1;n>>=1;}return c;}
  function escapeHtml(s){return s.replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));}

  document.getElementById("saveBtn").addEventListener("click",()=>{
    const nameEl=document.getElementById("patName");
    let name=nameEl.value.trim();
    if(!name){ name="Pattern "+(loadBank().length+1); }
    const bank=loadBank();
    bank.unshift({name, code:encodePattern(), bpm, swing});
    saveBank(bank); nameEl.value=""; renderBank(); toast("Saved · "+name);
  });

  document.getElementById("copyBtn").addEventListener("click",()=>{
    const code=`NBL-${bpm}-${swing}-${encodePattern()}`;
    navigator.clipboard?.writeText(code).then(
      ()=>toast("Code copied to clipboard"),
      ()=>prompt("Copy this pattern code:",code)
    );
  });
  document.getElementById("pasteBtn").addEventListener("click",()=>{
    const v=prompt("Paste a NEBULA pattern code:");
    if(!v) return;
    const m=v.trim().match(/^NBL-(\d+)-(\d+)-([0-9a-fA-F]+)$/);
    if(m){
      bpm=Math.min(200,Math.max(60,+m[1])); swing=Math.min(60,Math.max(0,+m[2]));
      bpmIn.value=bpm; bpmVal.textContent=bpm; swIn.value=swing; swVal.textContent=swing;
      decodePattern(m[3]); refreshGrid(); toast("Pattern loaded from code");
    } else if(decodePattern(v)){ refreshGrid(); toast("Pattern loaded"); }
    else toast("✕ Invalid code");
  });

  /* ====================================================
     WAV EXPORT — render one loop with OfflineAudioContext
  ==================================================== */
  const exportBtn=document.getElementById("exportBtn");
  exportBtn.addEventListener("click", async ()=>{
    exportBtn.disabled=true; const orig=exportBtn.innerHTML;
    exportBtn.innerHTML='<span class="ic">⏳</span> Rendering…';
    try{
      const sr=44100;
      const sd=60.0/bpm/4;                 // step duration
      const loopLen=sd*STEPS;
      const tail=0.5;                       // let last hits ring out
      const total=loopLen+tail;
      const off=new OfflineAudioContext(2, Math.ceil(sr*total), sr);
      const og=off.createGain(); og.gain.value=master;
      const comp=off.createDynamicsCompressor();
      comp.threshold.value=-10; comp.ratio.value=6; comp.attack.value=0.003; comp.release.value=0.2;
      og.connect(comp); comp.connect(off.destination);

      for(let s=0;s<STEPS;s++){
        let t=s*sd;
        if(s%2===1) t += (swing/100)*sd*0.6;
        for(let tr=0;tr<TRACKS.length;tr++){
          if(mutes[tr]||!pattern[tr][s]) continue;
          VOICES[TRACKS[tr].id](off, og, t);
        }
      }
      const buf=await off.startRendering();
      const wav=encodeWAV(buf);
      const blob=new Blob([wav],{type:"audio/wav"});
      const url=URL.createObjectURL(blob);
      const a=document.createElement("a");
      a.href=url; a.download=`nebula-${bpm}bpm.wav`; a.click();
      URL.revokeObjectURL(url);
      toast("WAV exported ⬇");
    }catch(err){ console.error(err); toast("✕ Export failed"); }
    finally{ exportBtn.disabled=false; exportBtn.innerHTML=orig; }
  });

  function encodeWAV(buffer){
    const numCh=buffer.numberOfChannels, sr=buffer.sampleRate;
    const len=buffer.length;
    const chans=[];
    for(let c=0;c<numCh;c++) chans.push(buffer.getChannelData(c));
    const bytesPerSample=2;
    const blockAlign=numCh*bytesPerSample;
    const dataLen=len*blockAlign;
    const ab=new ArrayBuffer(44+dataLen);
    const dv=new DataView(ab);
    let o=0;
    const wstr=s=>{for(let i=0;i<s.length;i++)dv.setUint8(o++,s.charCodeAt(i));};
    const w32=v=>{dv.setUint32(o,v,true);o+=4;};
    const w16=v=>{dv.setUint16(o,v,true);o+=2;};
    wstr("RIFF"); w32(36+dataLen); wstr("WAVE");
    wstr("fmt "); w32(16); w16(1); w16(numCh); w32(sr);
    w32(sr*blockAlign); w16(blockAlign); w16(16);
    wstr("data"); w32(dataLen);
    for(let i=0;i<len;i++){
      for(let c=0;c<numCh;c++){
        let s=Math.max(-1,Math.min(1,chans[c][i]));
        dv.setInt16(o, s<0?s*0x8000:s*0x7fff, true); o+=2;
      }
    }
    return ab;
  }

  /* ====================================================
     Init
  ==================================================== */
  function defaultBeat(){
    // a punchy starter groove
    const set=(t,arr)=>arr.forEach(s=>pattern[t][s]=true);
    set(0,[0,4,8,10,12]);          // kick
    set(1,[4,12]);                 // snare
    set(3,[0,2,4,6,8,10,12,14]);   // closed hats
    set(4,[14]);                   // open hat
    set(7,[7]);                    // cowbell accent
  }

  buildHead();
  buildGrid();
  defaultBeat();
  refreshGrid();
  renderBank();

  // toast helper
  let toastTimer=null;
  function toast(msg){
    const el=document.getElementById("toast");
    el.textContent=msg; el.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer=setTimeout(()=>el.classList.remove("show"),1800);
  }
  window.__toast=toast;
})();
</script>
</body>
</html>
