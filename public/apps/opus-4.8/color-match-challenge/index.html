<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Color Match Challenge</title>
<style>
  :root {
    --bg-0: #0a0a14;
    --bg-1: #12121f;
    --bg-2: #1b1b2e;
    --ink: #f4f4fb;
    --muted: #8b8ba7;
    --ring: rgba(255, 255, 255, 0.08);

    --c-red:    #ff4757;
    --c-blue:   #3a86ff;
    --c-green:  #2ed573;
    --c-yellow: #ffd23f;
    --c-purple: #a55eea;
    --c-orange: #ff9f1c;
    --c-pink:   #ff6bcb;
    --c-cyan:   #18dcff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body { height: 100%; }

  body {
    font-family: "Segoe UI", system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif;
    background:
      radial-gradient(1200px 800px at 15% -10%, #1c1838 0%, transparent 55%),
      radial-gradient(1000px 700px at 110% 110%, #07243a 0%, transparent 50%),
      var(--bg-0);
    color: var(--ink);
    min-height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    padding: 16px;
    user-select: none;
  }

  .stage {
    width: min(560px, 100%);
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  /* ---------- Header / HUD ---------- */
  .hud {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 12px;
  }

  .brand {
    font-weight: 800;
    letter-spacing: 0.5px;
    font-size: clamp(15px, 4.5vw, 19px);
    background: linear-gradient(90deg, var(--c-pink), var(--c-cyan), var(--c-yellow));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    white-space: nowrap;
  }

  .stat {
    background: linear-gradient(180deg, var(--bg-2), var(--bg-1));
    border: 1px solid var(--ring);
    border-radius: 16px;
    padding: 10px 14px;
    text-align: center;
    min-width: 92px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.04);
  }
  .stat .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.4px;
    color: var(--muted);
    margin-bottom: 2px;
  }
  .stat .value {
    font-size: clamp(22px, 7vw, 30px);
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .stat.score { justify-self: start; }
  .stat.timer { justify-self: end; }
  .stat.timer.low .value { color: var(--c-red); animation: pulse 0.7s ease-in-out infinite; }
  @keyframes pulse { 50% { transform: scale(1.12); } }

  /* ---------- Time bar ---------- */
  .timebar {
    height: 8px;
    border-radius: 999px;
    background: rgba(255,255,255,0.07);
    overflow: hidden;
    border: 1px solid var(--ring);
  }
  .timebar > i {
    display: block;
    height: 100%;
    width: 100%;
    border-radius: 999px;
    background: linear-gradient(90deg, var(--c-green), var(--c-yellow), var(--c-red));
    transform-origin: left center;
    transition: transform 0.1s linear;
  }

  /* ---------- Word card ---------- */
  .card {
    position: relative;
    background: linear-gradient(180deg, var(--bg-2), var(--bg-1));
    border: 1px solid var(--ring);
    border-radius: 26px;
    padding: 40px 20px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.05);
    overflow: hidden;
  }
  .prompt {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 14px;
  }
  .word {
    font-size: clamp(52px, 18vw, 104px);
    font-weight: 900;
    letter-spacing: 1px;
    line-height: 1;
    text-shadow: 0 6px 30px rgba(0,0,0,0.5);
    transition: color 0.05s;
  }
  .word.swap { animation: swap 0.32s cubic-bezier(.2,.9,.25,1.2); }
  @keyframes swap {
    0%   { transform: scale(0.6) rotate(-6deg); opacity: 0; filter: blur(6px); }
    60%  { transform: scale(1.08) rotate(2deg); opacity: 1; filter: blur(0); }
    100% { transform: scale(1) rotate(0); }
  }

  .feedback {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(60px, 22vw, 120px);
    font-weight: 900;
    pointer-events: none;
    opacity: 0;
  }
  .feedback.go { animation: fb 0.5s ease-out; }
  .feedback.good { color: var(--c-green); }
  .feedback.bad  { color: var(--c-red); }
  @keyframes fb {
    0%   { opacity: 0; transform: scale(0.3); }
    40%  { opacity: 1; transform: scale(1.15); }
    100% { opacity: 0; transform: scale(1.4); }
  }

  /* combo chip */
  .combo {
    position: absolute;
    top: 14px;
    right: 16px;
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.5px;
    padding: 5px 11px;
    border-radius: 999px;
    background: linear-gradient(90deg, var(--c-orange), var(--c-pink));
    color: #1a0d18;
    box-shadow: 0 6px 16px rgba(255,107,203,0.35);
    opacity: 0;
    transform: scale(0.7);
    transition: opacity 0.2s, transform 0.2s;
  }
  .combo.show { opacity: 1; transform: scale(1); }
  .combo.bump { animation: bump 0.3s ease; }
  @keyframes bump { 50% { transform: scale(1.25); } }

  /* ---------- Buttons grid ---------- */
  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }
  .btn {
    --col: #888;
    position: relative;
    border: none;
    cursor: pointer;
    border-radius: 18px;
    padding: 22px 10px;
    font-size: clamp(17px, 5vw, 22px);
    font-weight: 800;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #0c0c14;
    background: var(--col);
    box-shadow: 0 8px 0 rgba(0,0,0,0.45), 0 10px 24px rgba(0,0,0,0.4), inset 0 2px 0 rgba(255,255,255,0.35);
    transition: transform 0.08s ease, box-shadow 0.08s ease, filter 0.15s;
    overflow: hidden;
    text-shadow: 0 1px 0 rgba(255,255,255,0.25);
  }
  .btn::after {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.55), transparent 60%);
    opacity: 0;
    transform: scale(0.2);
  }
  .btn:active {
    transform: translateY(6px) scale(0.98);
    box-shadow: 0 2px 0 rgba(0,0,0,0.45), 0 4px 12px rgba(0,0,0,0.4), inset 0 2px 0 rgba(255,255,255,0.35);
  }
  .btn.press::after { animation: ripple 0.4s ease-out; }
  @keyframes ripple { 0% { opacity: 0.8; transform: scale(0.2);} 100% { opacity: 0; transform: scale(2.2);} }

  .btn.correct { animation: flashGood 0.4s ease; }
  .btn.wrong { animation: shake 0.4s ease; }
  @keyframes flashGood { 0%,100%{ filter: brightness(1);} 40%{ filter: brightness(1.6);} }
  @keyframes shake { 0%,100%{transform:translateX(0);} 20%{transform:translateX(-7px);} 40%{transform:translateX(7px);} 60%{transform:translateX(-5px);} 80%{transform:translateX(5px);} }

  /* ---------- Overlay (start / end) ---------- */
  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(8,8,18,0.78);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 20;
    padding: 20px;
    transition: opacity 0.3s;
  }
  .overlay.hidden { opacity: 0; pointer-events: none; }

  .panel {
    width: min(440px, 100%);
    background: linear-gradient(180deg, var(--bg-2), var(--bg-1));
    border: 1px solid var(--ring);
    border-radius: 26px;
    padding: 34px 28px;
    text-align: center;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
    animation: rise 0.4s cubic-bezier(.2,.9,.3,1.2);
  }
  @keyframes rise { from { transform: translateY(24px) scale(0.96); opacity: 0; } }

  .title {
    font-size: clamp(30px, 9vw, 44px);
    font-weight: 900;
    line-height: 1.05;
    margin-bottom: 8px;
    background: linear-gradient(90deg, var(--c-red), var(--c-orange), var(--c-yellow), var(--c-green), var(--c-cyan), var(--c-purple), var(--c-pink));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    background-size: 200% auto;
    animation: shimmer 6s linear infinite;
  }
  @keyframes shimmer { to { background-position: 200% center; } }

  .desc {
    color: var(--muted);
    font-size: 15px;
    line-height: 1.55;
    margin-bottom: 22px;
  }
  .desc b { color: var(--ink); }

  .bigscore {
    font-size: clamp(56px, 18vw, 84px);
    font-weight: 900;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .bigscore .pts { font-size: 0.3em; color: var(--muted); display:block; letter-spacing: 3px; text-transform: uppercase; margin-top: 6px; font-weight: 700;}

  .endstats {
    display: flex;
    justify-content: center;
    gap: 26px;
    margin: 20px 0 24px;
  }
  .endstats div { color: var(--muted); font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
  .endstats b { display: block; color: var(--ink); font-size: 26px; font-weight: 800; margin-top: 4px; font-variant-numeric: tabular-nums;}

  .best { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .best.new { color: var(--c-yellow); font-weight: 800; }

  .play {
    margin-top: 8px;
    border: none;
    cursor: pointer;
    width: 100%;
    padding: 18px;
    border-radius: 16px;
    font-size: 19px;
    font-weight: 800;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #08121a;
    background: linear-gradient(135deg, var(--c-cyan), var(--c-green));
    box-shadow: 0 10px 28px rgba(24,220,255,0.3), inset 0 2px 0 rgba(255,255,255,0.4);
    transition: transform 0.1s, filter 0.15s;
  }
  .play:active { transform: scale(0.97); }
  .play:hover { filter: brightness(1.08); }

  .hint {
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    letter-spacing: 0.4px;
  }
  .hint kbd {
    background: var(--bg-2);
    border: 1px solid var(--ring);
    border-radius: 6px;
    padding: 1px 6px;
    font-family: inherit;
    font-size: 11px;
  }
</style>
</head>
<body>
  <main class="stage" id="stage">
    <div class="hud">
      <div class="stat score">
        <div class="label">Score</div>
        <div class="value" id="score">0</div>
      </div>
      <div class="brand">Color&nbsp;Match</div>
      <div class="stat timer" id="timerBox">
        <div class="label">Time</div>
        <div class="value" id="time">30</div>
      </div>
    </div>

    <div class="timebar"><i id="timebar"></i></div>

    <section class="card">
      <div class="combo" id="combo">🔥 x2</div>
      <div class="prompt">Click the button matching the TEXT COLOR</div>
      <div class="word" id="word">READY</div>
      <div class="feedback" id="feedback"></div>
    </section>

    <div class="grid" id="grid"></div>

    <p class="hint">Tip: ignore what the word <i>says</i> — match its <b>color</b>. Use number keys <kbd>1</kbd>–<kbd>6</kbd>.</p>
  </main>

  <!-- Overlay -->
  <div class="overlay" id="overlay">
    <div class="panel" id="panel"><!-- filled by JS --></div>
  </div>

<script>
(function () {
  "use strict";

  const COLORS = [
    { name: "RED",    var: "--c-red" },
    { name: "BLUE",   var: "--c-blue" },
    { name: "GREEN",  var: "--c-green" },
    { name: "YELLOW", var: "--c-yellow" },
    { name: "PURPLE", var: "--c-purple" },
    { name: "ORANGE", var: "--c-orange" },
    { name: "PINK",   var: "--c-pink" },
    { name: "CYAN",   var: "--c-cyan" },
  ];

  const ROUND_TIME = 30; // seconds
  const root = getComputedStyle(document.documentElement);
  const css = (v) => root.getPropertyValue(v).trim();

  // DOM
  const el = {
    score: document.getElementById("score"),
    time: document.getElementById("time"),
    timerBox: document.getElementById("timerBox"),
    timebar: document.getElementById("timebar"),
    word: document.getElementById("word"),
    feedback: document.getElementById("feedback"),
    grid: document.getElementById("grid"),
    combo: document.getElementById("combo"),
    overlay: document.getElementById("overlay"),
    panel: document.getElementById("panel"),
  };

  // State
  let state = {
    running: false,
    score: 0,
    correct: 0,
    wrong: 0,
    best: 0,
    bestStreak: 0,
    streak: 0,
    current: null,     // {textColor, options:[...]}
    options: [],       // currently rendered color objs
    endTime: 0,
    rafId: 0,
  };

  try { state.best = parseInt(localStorage.getItem("cmc_best") || "0", 10) || 0; } catch (e) {}

  // ---- Audio (WebAudio, no assets) ----
  let actx = null;
  function beep(freq, dur, type, vol) {
    try {
      if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
      const t = actx.currentTime;
      const o = actx.createOscillator();
      const g = actx.createGain();
      o.type = type || "sine";
      o.frequency.setValueAtTime(freq, t);
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(vol || 0.18, t + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, t + (dur || 0.12));
      o.connect(g); g.connect(actx.destination);
      o.start(t); o.stop(t + (dur || 0.12) + 0.02);
    } catch (e) {}
  }
  const sndGood = (streak) => { beep(523 + Math.min(streak, 8) * 40, 0.1, "triangle", 0.16); };
  const sndBad = () => { beep(150, 0.22, "sawtooth", 0.16); };
  const sndEnd = () => { beep(440, 0.15, "triangle", 0.15); setTimeout(()=>beep(660,0.2,"triangle",0.15),120); };

  // ---- Helpers ----
  const rnd = (n) => Math.floor(Math.random() * n);
  function shuffle(a) {
    const arr = a.slice();
    for (let i = arr.length - 1; i > 0; i--) {
      const j = rnd(i + 1);
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  // ---- Round generation ----
  function newRound() {
    // pick how many buttons: 4 then ramp to 6 for difficulty
    const elapsed = ROUND_TIME - timeLeft();
    const optionCount = elapsed > 18 ? 6 : elapsed > 8 ? 5 : 4;

    const pool = shuffle(COLORS);
    const options = pool.slice(0, optionCount);

    // the true font color is one of the options
    const textColor = options[rnd(options.length)];

    // the word text is usually a DIFFERENT color name (Stroop effect)
    let wordName;
    if (Math.random() < 0.78) {
      const others = COLORS.filter((c) => c.name !== textColor.name);
      wordName = others[rnd(others.length)].name;
    } else {
      wordName = textColor.name; // occasional matching to keep honest
    }

    state.current = { textColor, options };
    state.options = options;

    // render word
    el.word.textContent = wordName;
    el.word.style.color = css(textColor.var);
    el.word.classList.remove("swap");
    void el.word.offsetWidth; // reflow
    el.word.classList.add("swap");

    renderButtons(options);
  }

  function renderButtons(options) {
    el.grid.innerHTML = "";
    el.grid.style.gridTemplateColumns =
      "repeat(" + (options.length >= 5 ? 3 : 2) + ", 1fr)";
    options.forEach((c, i) => {
      const b = document.createElement("button");
      b.className = "btn";
      b.style.setProperty("--col", css(c.var));
      b.textContent = c.name;
      b.dataset.name = c.name;
      b.addEventListener("click", () => choose(c, b));
      el.grid.appendChild(b);
    });
  }

  // ---- Answer handling ----
  function choose(color, btn) {
    if (!state.running) return;
    btn.classList.remove("press"); void btn.offsetWidth; btn.classList.add("press");

    const isRight = color.name === state.current.textColor.name;

    if (isRight) {
      state.streak += 1;
      state.bestStreak = Math.max(state.bestStreak, state.streak);
      const bonus = state.streak >= 3 ? Math.min(Math.floor(state.streak / 3) + 1, 4) : 1;
      state.score += bonus;
      state.correct += 1;
      el.score.textContent = state.score;
      bumpScore();
      btn.classList.add("correct");
      setTimeout(() => btn.classList.remove("correct"), 400);
      showFeedback(true);
      sndGood(state.streak);
      updateCombo();
      setTimeout(newRound, 90);
    } else {
      state.streak = 0;
      state.wrong += 1;
      state.score = Math.max(0, state.score - 1);
      el.score.textContent = state.score;
      btn.classList.add("wrong");
      setTimeout(() => btn.classList.remove("wrong"), 400);
      // flash the correct one
      const right = el.grid.querySelector('[data-name="' + state.current.textColor.name + '"]');
      if (right) { right.classList.add("correct"); setTimeout(() => right.classList.remove("correct"), 400); }
      showFeedback(false);
      sndBad();
      updateCombo();
      if (navigator.vibrate) navigator.vibrate(40);
    }
  }

  function showFeedback(good) {
    el.feedback.textContent = good ? "✓" : "✕";
    el.feedback.className = "feedback " + (good ? "good" : "bad");
    void el.feedback.offsetWidth;
    el.feedback.classList.add("go");
  }

  function bumpScore() {
    el.score.style.transform = "scale(1.3)";
    el.score.style.color = css("--c-green");
    setTimeout(() => { el.score.style.transform = ""; el.score.style.color = ""; }, 150);
  }

  function updateCombo() {
    if (state.streak >= 3) {
      el.combo.textContent = "🔥 x" + state.streak;
      el.combo.classList.add("show", "bump");
      setTimeout(() => el.combo.classList.remove("bump"), 300);
    } else {
      el.combo.classList.remove("show");
    }
  }

  // ---- Timer ----
  function timeLeft() {
    return Math.max(0, (state.endTime - performance.now()) / 1000);
  }

  function tick() {
    if (!state.running) return;
    const left = timeLeft();
    const secs = Math.ceil(left);
    el.time.textContent = secs;
    el.timebar.style.transform = "scaleX(" + (left / ROUND_TIME) + ")";

    if (secs <= 5) el.timerBox.classList.add("low");
    else el.timerBox.classList.remove("low");

    if (left <= 0) { endGame(); return; }
    state.rafId = requestAnimationFrame(tick);
  }

  // ---- Game flow ----
  function startGame() {
    if (actx && actx.state === "suspended") actx.resume();
    state.running = true;
    state.score = 0;
    state.correct = 0;
    state.wrong = 0;
    state.streak = 0;
    state.bestStreak = 0;
    state.endTime = performance.now() + ROUND_TIME * 1000;

    el.score.textContent = "0";
    el.time.textContent = ROUND_TIME;
    el.timerBox.classList.remove("low");
    el.combo.classList.remove("show");
    el.overlay.classList.add("hidden");

    newRound();
    cancelAnimationFrame(state.rafId);
    state.rafId = requestAnimationFrame(tick);
  }

  function endGame() {
    state.running = false;
    cancelAnimationFrame(state.rafId);
    el.timebar.style.transform = "scaleX(0)";
    el.time.textContent = "0";
    el.timerBox.classList.remove("low");
    sndEnd();

    const total = state.correct + state.wrong;
    const acc = total ? Math.round((state.correct / total) * 100) : 0;

    const isNewBest = state.score > state.best;
    if (isNewBest) {
      state.best = state.score;
      try { localStorage.setItem("cmc_best", String(state.best)); } catch (e) {}
    }

    el.panel.innerHTML =
      '<div class="title">Time’s Up!</div>' +
      '<div class="bigscore">' + state.score + '<span class="pts">points</span></div>' +
      '<div class="endstats">' +
        '<div>Correct<b>' + state.correct + '</b></div>' +
        '<div>Accuracy<b>' + acc + '%</b></div>' +
        '<div>Best Streak<b>' + state.bestStreak + '</b></div>' +
      '</div>' +
      '<div class="best ' + (isNewBest ? "new" : "") + '">' +
        (isNewBest ? "🏆 New personal best!" : "Best: " + state.best) +
      '</div>' +
      '<button class="play" id="again">Play Again</button>';

    el.overlay.classList.remove("hidden");
    document.getElementById("again").addEventListener("click", startGame);
  }

  function showStart() {
    el.panel.innerHTML =
      '<div class="title">Color Match<br>Challenge</div>' +
      '<div class="desc">A word will flash in a <b>colored</b> font.<br>' +
      'Tap the button matching its <b>color</b> — <b>not</b> what the word says!<br><br>' +
      'Score as many as you can in <b>30 seconds</b>.<br>Streaks earn bonus points.</div>' +
      '<div class="best">' + (state.best ? "Best: " + state.best : "&nbsp;") + '</div>' +
      '<button class="play" id="start">Start Game</button>';
    el.overlay.classList.remove("hidden");
    document.getElementById("start").addEventListener("click", startGame);
  }

  // ---- Keyboard ----
  document.addEventListener("keydown", (e) => {
    if (!state.running) {
      if (e.key === "Enter" || e.key === " ") {
        const btn = el.panel.querySelector(".play");
        if (btn) { e.preventDefault(); btn.click(); }
      }
      return;
    }
    const n = parseInt(e.key, 10);
    if (n >= 1 && n <= state.options.length) {
      const btn = el.grid.children[n - 1];
      if (btn) btn.click();
    }
  });

  // boot
  el.timebar.style.transform = "scaleX(1)";
  showStart();
})();
</script>
</body>
</html>
