<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Acronymo · Company Acronym List</title>
<style>
  :root {
    --bg: #f6f7fb;
    --surface: #ffffff;
    --surface-2: #f9fafc;
    --border: #e7e9f0;
    --text: #1a1d29;
    --text-soft: #5b6172;
    --text-faint: #9499a8;
    --brand: #4f46e5;
    --brand-soft: #eef0fe;
    --brand-strong: #4338ca;
    --green: #0f9d58;
    --green-soft: #e6f6ec;
    --red: #dc2626;
    --red-soft: #fdeaea;
    --amber: #d97706;
    --shadow-sm: 0 1px 2px rgba(20, 24, 40, 0.06), 0 1px 3px rgba(20, 24, 40, 0.05);
    --shadow-md: 0 6px 20px rgba(20, 24, 40, 0.08), 0 2px 6px rgba(20, 24, 40, 0.04);
    --shadow-lg: 0 18px 50px rgba(20, 24, 40, 0.14);
    --radius: 14px;
    --radius-sm: 10px;
    --maxw: 980px;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0e1018;
      --surface: #171a24;
      --surface-2: #1d212e;
      --border: #2a2f3e;
      --text: #eef0f6;
      --text-soft: #aab0c0;
      --text-faint: #767d90;
      --brand: #818cf8;
      --brand-soft: #232a45;
      --brand-strong: #a5b0ff;
      --green: #34d399;
      --green-soft: #14322a;
      --red: #f87171;
      --red-soft: #3a1f22;
      --amber: #fbbf24;
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
      --shadow-md: 0 6px 20px rgba(0, 0, 0, 0.5);
      --shadow-lg: 0 18px 50px rgba(0, 0, 0, 0.6);
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { -webkit-text-size-adjust: 100%; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    min-height: 100vh;
  }

  .wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 20px; }

  /* ---------- Header ---------- */
  header.app-header {
    position: sticky;
    top: 0;
    z-index: 50;
    background: color-mix(in srgb, var(--surface) 88%, transparent);
    backdrop-filter: saturate(180%) blur(14px);
    -webkit-backdrop-filter: saturate(180%) blur(14px);
    border-bottom: 1px solid var(--border);
  }
  .header-inner {
    display: flex;
    align-items: center;
    gap: 14px;
    height: 64px;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 11px;
    font-weight: 700;
    font-size: 1.12rem;
    letter-spacing: -0.02em;
    color: var(--text);
    flex-shrink: 0;
  }
  .logo .mark {
    width: 34px; height: 34px;
    border-radius: 9px;
    background: linear-gradient(135deg, var(--brand), #7c3aed);
    display: grid; place-items: center;
    color: #fff; font-weight: 800; font-size: 0.95rem;
    box-shadow: 0 4px 12px color-mix(in srgb, var(--brand) 45%, transparent);
  }
  .logo small {
    display: block;
    font-size: 0.66rem;
    font-weight: 500;
    color: var(--text-faint);
    letter-spacing: 0.02em;
  }
  .header-spacer { flex: 1; }

  .tabs {
    display: flex;
    gap: 4px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    padding: 4px;
    border-radius: 11px;
  }
  .tab {
    appearance: none;
    border: none;
    background: transparent;
    color: var(--text-soft);
    font-family: inherit;
    font-size: 0.86rem;
    font-weight: 600;
    padding: 7px 15px;
    border-radius: 8px;
    cursor: pointer;
    transition: background .18s, color .18s, box-shadow .18s;
    display: flex; align-items: center; gap: 7px;
  }
  .tab svg { width: 16px; height: 16px; }
  .tab:hover { color: var(--text); }
  .tab.active {
    background: var(--surface);
    color: var(--brand-strong);
    box-shadow: var(--shadow-sm);
  }
  .tab .badge {
    font-size: 0.7rem;
    background: var(--brand-soft);
    color: var(--brand-strong);
    padding: 1px 7px;
    border-radius: 20px;
    font-weight: 700;
  }
  .tab.active .badge { background: var(--brand); color: #fff; }

  /* ---------- View transitions ---------- */
  main { padding: 30px 0 80px; }
  .view { animation: fade .3s ease; }
  @keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  .hidden { display: none !important; }

  /* ---------- Hero / search ---------- */
  .hero { margin-bottom: 24px; }
  .hero h1 {
    font-size: 1.7rem;
    letter-spacing: -0.03em;
    font-weight: 800;
    margin-bottom: 4px;
  }
  .hero p { color: var(--text-soft); font-size: 0.96rem; }

  .search-row {
    display: flex;
    gap: 12px;
    margin: 22px 0 18px;
    flex-wrap: wrap;
  }
  .search-box {
    position: relative;
    flex: 1;
    min-width: 240px;
  }
  .search-box svg {
    position: absolute;
    left: 16px; top: 50%;
    transform: translateY(-50%);
    width: 19px; height: 19px;
    color: var(--text-faint);
    pointer-events: none;
  }
  #search {
    width: 100%;
    font-family: inherit;
    font-size: 1rem;
    color: var(--text);
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px 44px 14px 46px;
    transition: border-color .18s, box-shadow .18s;
    box-shadow: var(--shadow-sm);
  }
  #search::placeholder { color: var(--text-faint); }
  #search:focus {
    outline: none;
    border-color: var(--brand);
    box-shadow: 0 0 0 4px color-mix(in srgb, var(--brand) 16%, transparent);
  }
  .clear-btn {
    position: absolute;
    right: 10px; top: 50%;
    transform: translateY(-50%);
    border: none; background: var(--surface-2);
    color: var(--text-soft);
    width: 26px; height: 26px;
    border-radius: 50%;
    cursor: pointer; display: none;
    align-items: center; justify-content: center;
    font-size: 16px; line-height: 1;
  }
  .clear-btn:hover { background: var(--border); color: var(--text); }

  .sort-select {
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--text-soft);
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 0 16px;
    cursor: pointer;
    box-shadow: var(--shadow-sm);
  }
  .sort-select:focus { outline: none; border-color: var(--brand); }

  /* ---------- Filter chips ---------- */
  .filters {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 22px;
  }
  .chip {
    appearance: none;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--text-soft);
    font-family: inherit;
    font-size: 0.82rem;
    font-weight: 600;
    padding: 6px 13px;
    border-radius: 30px;
    cursor: pointer;
    transition: all .16s;
    display: flex; align-items: center; gap: 6px;
  }
  .chip:hover { border-color: var(--brand); color: var(--text); }
  .chip .dot { width: 8px; height: 8px; border-radius: 50%; }
  .chip.active {
    background: var(--brand);
    border-color: var(--brand);
    color: #fff;
  }
  .chip.active .dot { background: rgba(255,255,255,.85) !important; }
  .chip .count { opacity: .6; font-weight: 600; }

  /* ---------- Stats bar ---------- */
  .result-meta {
    color: var(--text-faint);
    font-size: 0.84rem;
    margin-bottom: 14px;
    font-weight: 500;
  }
  .result-meta b { color: var(--text-soft); font-weight: 700; }

  /* ---------- Acronym cards ---------- */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 14px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 18px 16px;
    box-shadow: var(--shadow-sm);
    transition: transform .16s, box-shadow .16s, border-color .16s;
    position: relative;
    cursor: default;
    display: flex;
    flex-direction: column;
  }
  .card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
    border-color: color-mix(in srgb, var(--brand) 35%, var(--border));
  }
  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 7px;
  }
  .card .acro {
    font-size: 1.3rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--brand-strong);
  }
  .card .full {
    font-size: 0.96rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 8px;
  }
  .card .def {
    font-size: 0.88rem;
    color: var(--text-soft);
    line-height: 1.55;
    flex: 1;
  }
  .card .tag {
    font-size: 0.72rem;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
    white-space: nowrap;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .card .tag .dot { width: 7px; height: 7px; border-radius: 50%; }
  .fav-btn {
    background: none; border: none; cursor: pointer;
    padding: 4px; border-radius: 8px;
    color: var(--text-faint);
    transition: color .16s, transform .16s, background .16s;
    line-height: 0;
    margin-top: 2px;
  }
  .fav-btn svg { width: 18px; height: 18px; }
  .fav-btn:hover { background: var(--surface-2); transform: scale(1.12); }
  .fav-btn.on { color: var(--amber); }
  .fav-btn.on svg { fill: var(--amber); }

  mark {
    background: color-mix(in srgb, var(--brand) 28%, transparent);
    color: inherit;
    border-radius: 3px;
    padding: 0 1px;
  }

  .empty {
    text-align: center;
    padding: 64px 20px;
    color: var(--text-faint);
  }
  .empty svg { width: 48px; height: 48px; opacity: .4; margin-bottom: 14px; }
  .empty h3 { color: var(--text-soft); font-weight: 700; margin-bottom: 4px; }

  /* ---------- Quiz ---------- */
  .quiz-wrap { max-width: 640px; margin: 0 auto; }
  .quiz-start {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    box-shadow: var(--shadow-md);
    padding: 40px 34px;
    text-align: center;
  }
  .quiz-start .icon {
    width: 66px; height: 66px;
    border-radius: 18px;
    margin: 0 auto 18px;
    background: linear-gradient(135deg, var(--brand), #7c3aed);
    display: grid; place-items: center;
    box-shadow: 0 10px 24px color-mix(in srgb, var(--brand) 40%, transparent);
  }
  .quiz-start .icon svg { width: 32px; height: 32px; color: #fff; }
  .quiz-start h2 { font-size: 1.5rem; letter-spacing: -0.03em; margin-bottom: 8px; }
  .quiz-start p { color: var(--text-soft); margin-bottom: 26px; max-width: 420px; margin-inline: auto; }

  .quiz-config {
    display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
    margin-bottom: 26px;
  }
  .config-group { text-align: left; }
  .config-group label {
    display: block; font-size: 0.74rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: .04em;
    color: var(--text-faint); margin-bottom: 6px;
  }
  .seg {
    display: inline-flex; background: var(--surface-2);
    border: 1px solid var(--border); border-radius: 10px; padding: 3px;
  }
  .seg button {
    border: none; background: none; font-family: inherit;
    font-size: 0.85rem; font-weight: 600; color: var(--text-soft);
    padding: 6px 14px; border-radius: 7px; cursor: pointer;
    transition: all .15s;
  }
  .seg button.active { background: var(--surface); color: var(--brand-strong); box-shadow: var(--shadow-sm); }

  .btn {
    appearance: none; border: none; cursor: pointer;
    font-family: inherit; font-weight: 700; font-size: 0.95rem;
    padding: 13px 26px; border-radius: 11px;
    background: var(--brand); color: #fff;
    transition: background .16s, transform .12s, box-shadow .16s;
    box-shadow: 0 6px 16px color-mix(in srgb, var(--brand) 38%, transparent);
    display: inline-flex; align-items: center; gap: 9px;
  }
  .btn:hover { background: var(--brand-strong); transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn.ghost {
    background: var(--surface); color: var(--text-soft);
    border: 1.5px solid var(--border); box-shadow: var(--shadow-sm);
  }
  .btn.ghost:hover { background: var(--surface-2); color: var(--text); }
  .btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

  .quiz-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    box-shadow: var(--shadow-md);
    padding: 30px;
  }
  .quiz-progress {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 6px;
  }
  .quiz-progress .q-count { font-size: 0.82rem; font-weight: 700; color: var(--text-faint); }
  .quiz-progress .q-score { font-size: 0.82rem; font-weight: 700; color: var(--green); }
  .pbar { height: 7px; background: var(--surface-2); border-radius: 10px; overflow: hidden; margin-bottom: 26px; }
  .pbar > span { display: block; height: 100%; background: linear-gradient(90deg, var(--brand), #7c3aed); border-radius: 10px; transition: width .4s ease; }

  .q-prompt-label { font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--text-faint); margin-bottom: 8px; }
  .q-prompt {
    font-size: 1.9rem; font-weight: 800; letter-spacing: -0.03em;
    color: var(--text); margin-bottom: 4px; line-height: 1.15;
  }
  .q-sub { color: var(--text-soft); font-size: 0.9rem; margin-bottom: 24px; }

  .options { display: grid; gap: 11px; }
  .opt {
    text-align: left; font-family: inherit; font-size: 0.95rem;
    background: var(--surface-2); border: 1.5px solid var(--border);
    color: var(--text); padding: 15px 17px; border-radius: 12px;
    cursor: pointer; transition: all .14s; font-weight: 600;
    display: flex; align-items: center; gap: 13px;
    line-height: 1.4;
  }
  .opt .key {
    flex-shrink: 0; width: 26px; height: 26px; border-radius: 7px;
    background: var(--surface); border: 1px solid var(--border);
    display: grid; place-items: center; font-size: 0.8rem; font-weight: 800;
    color: var(--text-faint);
  }
  .opt:not(:disabled):hover { border-color: var(--brand); background: var(--brand-soft); }
  .opt:disabled { cursor: default; }
  .opt.correct { border-color: var(--green); background: var(--green-soft); color: var(--text); }
  .opt.correct .key { background: var(--green); color: #fff; border-color: var(--green); }
  .opt.wrong { border-color: var(--red); background: var(--red-soft); }
  .opt.wrong .key { background: var(--red); color: #fff; border-color: var(--red); }
  .opt .res-ico { margin-left: auto; font-weight: 800; }

  .quiz-foot { margin-top: 24px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .feedback { font-weight: 700; font-size: 0.92rem; }
  .feedback.ok { color: var(--green); }
  .feedback.no { color: var(--red); }

  /* Results screen */
  .result-screen { text-align: center; }
  .result-ring { width: 150px; height: 150px; margin: 6px auto 18px; position: relative; }
  .result-ring svg { transform: rotate(-90deg); }
  .result-ring .pct {
    position: absolute; inset: 0; display: grid; place-items: center;
    font-size: 2.1rem; font-weight: 800; letter-spacing: -0.03em;
  }
  .result-screen h2 { font-size: 1.6rem; letter-spacing: -0.03em; margin-bottom: 6px; }
  .result-screen .summary { color: var(--text-soft); margin-bottom: 8px; }
  .result-msg { font-weight: 700; margin-bottom: 24px; font-size: 1.05rem; }
  .result-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

  .review-list { margin-top: 30px; text-align: left; border-top: 1px solid var(--border); padding-top: 22px; }
  .review-list h4 { font-size: 0.78rem; text-transform: uppercase; letter-spacing: .05em; color: var(--text-faint); margin-bottom: 14px; }
  .review-item { display: flex; gap: 11px; padding: 9px 0; font-size: 0.9rem; align-items: baseline; border-bottom: 1px solid var(--border); }
  .review-item:last-child { border-bottom: none; }
  .review-item .ri-ico { flex-shrink: 0; font-weight: 800; width: 18px; }
  .review-item .ri-ico.ok { color: var(--green); }
  .review-item .ri-ico.no { color: var(--red); }
  .review-item b { color: var(--text); }
  .review-item span { color: var(--text-soft); }

  footer.app-footer {
    text-align: center;
    color: var(--text-faint);
    font-size: 0.8rem;
    padding: 30px 0 40px;
  }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--text); color: var(--bg);
    padding: 11px 20px; border-radius: 30px; font-size: 0.85rem; font-weight: 600;
    box-shadow: var(--shadow-lg); opacity: 0; pointer-events: none;
    transition: opacity .25s, transform .25s; z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 720px) {
    .header-inner { height: 58px; gap: 10px; }
    .logo small { display: none; }
    .tab span.lbl { display: none; }
    .tab { padding: 8px 11px; }
    .hero h1 { font-size: 1.42rem; }
    .grid { grid-template-columns: 1fr; }
    .q-prompt { font-size: 1.55rem; }
    .quiz-card, .quiz-start { padding: 24px 20px; }
    main { padding: 22px 0 60px; }
  }
</style>
</head>
<body>
  <header class="app-header">
    <div class="wrap header-inner">
      <div class="logo">
        <span class="mark">AL</span>
        <span>Acronymo<small>Company Acronym List</small></span>
      </div>
      <div class="header-spacer"></div>
      <nav class="tabs" role="tablist">
        <button class="tab active" data-view="browse" role="tab">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          <span class="lbl">Browse</span>
        </button>
        <button class="tab" data-view="quiz" role="tab">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/><circle cx="12" cy="12" r="10"/></svg>
          <span class="lbl">Quiz</span>
        </button>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <!-- ============ BROWSE VIEW ============ -->
    <section id="view-browse" class="view">
      <div class="hero">
        <h1>Company glossary</h1>
        <p>Search, filter, and learn the internal acronyms used across the company.</p>
      </div>

      <div class="search-row">
        <div class="search-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input id="search" type="text" placeholder="Search acronyms, terms, or definitions…" autocomplete="off" spellcheck="false" />
          <button class="clear-btn" id="clearSearch" aria-label="Clear search">×</button>
        </div>
        <select class="sort-select" id="sort" aria-label="Sort">
          <option value="az">A → Z</option>
          <option value="za">Z → A</option>
          <option value="cat">By category</option>
          <option value="fav">Favorites first</option>
        </select>
      </div>

      <div class="filters" id="filters"></div>
      <div class="result-meta" id="resultMeta"></div>
      <div class="grid" id="grid"></div>
      <div class="empty hidden" id="emptyState">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/></svg>
        <h3>No matches found</h3>
        <p>Try a different term or clear your filters.</p>
      </div>
    </section>

    <!-- ============ QUIZ VIEW ============ -->
    <section id="view-quiz" class="view hidden">
      <div class="quiz-wrap" id="quizWrap"></div>
    </section>
  </main>

  <footer class="app-footer">
    Acronymo · An internal tool to help the team speak the same language.
  </footer>

  <div class="toast" id="toast"></div>

<script>
/* ---------------------------------------------------------------
   DATA
--------------------------------------------------------------- */
const CATEGORIES = {
  team:     { label: "Teams",     color: "#4f46e5" },
  project:  { label: "Projects",  color: "#0891b2" },
  process:  { label: "Processes", color: "#d97706" },

/* ---------------------------------------------------------------
   STATE & PERSISTENCE
--------------------------------------------------------------- */
const STORE_KEY = "acronymo.favs.v1";
let favorites = loadFavs();
let activeCat = "all";
let sortMode = "az";
let query = "";

function loadFavs() {
  try { return new Set(JSON.parse(localStorage.getItem(STORE_KEY) || "[]")); }
  catch { return new Set(); }
}
function saveFavs() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify([...favorites])); } catch {}
}

/* ---------------------------------------------------------------
   UTIL
--------------------------------------------------------------- */
const $ = (s, r = document) => r.querySelector(s);
const $$ = (s, r = document) => [...r.querySelectorAll(s)];
const esc = (s) => s.replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

function highlight(text, q) {
  const safe = esc(text);
  if (!q) return safe;
  const terms = q.trim().split(/\s+/).filter(Boolean).map(t => t.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"));
  if (!terms.length) return safe;
  const re = new RegExp("(" + terms.join("|") + ")", "gi");
  return safe.replace(re, "<mark>$1</mark>");
}

let toastTimer;
function toast(msg) {
  const t = $("#toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 1800);
}

/* ---------------------------------------------------------------
   BROWSE: FILTERS
--------------------------------------------------------------- */
function buildFilters() {
  const counts = { all: ACRONYMS.length };
  ACRONYMS.forEach(x => counts[x.cat] = (counts[x.cat] || 0) + 1);

  const wrap = $("#filters");
  const items = [
    { key: "all", label: "All", color: "var(--text-soft)" },
    ...Object.entries(CATEGORIES).map(([key, v]) => ({ key, label: v.label, color: v.color })),
    { key: "fav", label: "★ Favorites", color: "var(--amber)" },
  ];
  wrap.innerHTML = items.map(it => {
    const count = it.key === "fav" ? favorites.size : counts[it.key];
    return `<button class="chip ${it.key === activeCat ? "active" : ""}" data-cat="${it.key}">
      ${it.key !== "all" && it.key !== "fav" ? `<span class="dot" style="background:${it.color}"></span>` : ""}
      ${it.label} <span class="count">${count}</span>
    </button>`;
  }).join("");

  $$(".chip", wrap).forEach(c => c.addEventListener("click", () => {
    activeCat = c.dataset.cat;
    buildFilters();
    render();
  }));
}

/* ---------------------------------------------------------------
   BROWSE: RENDER
--------------------------------------------------------------- */
function getFiltered() {
  const q = query.trim().toLowerCase();
  let list = ACRONYMS.filter(x => {
    if (activeCat === "fav" && !favorites.has(x.a)) return false;
    if (activeCat !== "all" && activeCat !== "fav" && x.cat !== activeCat) return false;
    if (!q) return true;
    return (x.a + " " + x.full + " " + x.def).toLowerCase().includes(q);
  });

  const collator = new Intl.Collator(undefined, { sensitivity: "base" });
  if (sortMode === "az") list.sort((a, b) => collator.compare(a.a, b.a));
  else if (sortMode === "za") list.sort((a, b) => collator.compare(b.a, a.a));
  else if (sortMode === "cat") list.sort((a, b) => collator.compare(CATEGORIES[a.cat].label, CATEGORIES[b.cat].label) || collator.compare(a.a, b.a));
  else if (sortMode === "fav") list.sort((a, b) => (favorites.has(b.a) - favorites.has(a.a)) || collator.compare(a.a, b.a));
  return list;
}

function render() {
  const list = getFiltered();
  const grid = $("#grid");
  const empty = $("#emptyState");
  const meta = $("#resultMeta");

  meta.innerHTML = `Showing <b>${list.length}</b> of <b>${ACRONYMS.length}</b> acronyms`
    + (activeCat !== "all" ? ` · <b>${activeCat === "fav" ? "Favorites" : CATEGORIES[activeCat].label}</b>` : "")
    + (query.trim() ? ` matching “<b>${esc(query.trim())}</b>”` : "");

  if (!list.length) {
    grid.innerHTML = "";
    empty.classList.remove("hidden");
    return;
  }
  empty.classList.add("hidden");

  grid.innerHTML = list.map(x => {
    const c = CATEGORIES[x.cat];
    const fav = favorites.has(x.a);
    return `<article class="card">
      <div class="card-top">
        <div>
          <div class="acro">${highlight(x.a, query)}</div>
        </div>
        <div style="display:flex;align-items:flex-start;gap:6px">
          <span class="tag" style="background:${c.color}1a;color:${c.color}"><span class="dot" style="background:${c.color}"></span>${c.label}</span>
          <button class="fav-btn ${fav ? "on" : ""}" data-fav="${esc(x.a)}" aria-label="Toggle favorite" title="${fav ? "Remove from favorites" : "Add to favorites"}">
            <svg viewBox="0 0 24 24" fill="${fav ? "currentColor" : "none"}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          </button>
        </div>
      </div>
      <div class="full">${highlight(x.full, query)}</div>
      <div class="def">${highlight(x.def, query)}</div>
    </article>`;
  }).join("");

  $$(".fav-btn", grid).forEach(b => b.addEventListener("click", () => {
    const key = b.dataset.fav;
    if (favorites.has(key)) { favorites.delete(key); toast(`Removed ${key} from favorites`); }
    else { favorites.add(key); toast(`Saved ${key} to favorites ★`); }
    saveFavs();
    buildFilters();
    if (activeCat === "fav" || sortMode === "fav") render();
    else {
      const nb = grid.querySelector(`.fav-btn[data-fav="${CSS.escape(key)}"]`);
      if (nb) {
        const on = favorites.has(key);
        nb.classList.toggle("on", on);
        nb.querySelector("svg").setAttribute("fill", on ? "currentColor" : "none");
      }
    }
  }));
}

/* ---------------------------------------------------------------
   QUIZ ENGINE
--------------------------------------------------------------- */
const quiz = {
  len: 10, dir: "a2d", pool: "all",
  questions: [], idx: 0, score: 0, answered: false, results: [],
};

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function renderQuizStart() {
  const w = $("#quizWrap");
  const lenOpts = [5, 10, 15];
  const cats = [{ k: "all", label: "All categories" }, ...Object.entries(CATEGORIES).map(([k, v]) => ({ k, label: v.label }))];
  w.innerHTML = `
    <div class="quiz-start">
      <div class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      </div>
      <h2>Test your knowledge</h2>
      <p>Multiple-choice questions drawn from the glossary. Pick your settings and see how many you can get right.</p>
      <div class="quiz-config">
        <div class="config-group">
          <label>Questions</label>
          <div class="seg" id="segLen">
            ${lenOpts.map(n => `<button data-len="${n}" class="${n === quiz.len ? "active" : ""}">${n}</button>`).join("")}
          </div>
        </div>
        <div class="config-group">
          <label>Mode</label>
          <div class="seg" id="segDir">
            <button data-dir="a2d" class="${quiz.dir === "a2d" ? "active" : ""}">Acronym → Meaning</button>
            <button data-dir="d2a" class="${quiz.dir === "d2a" ? "active" : ""}">Meaning → Acronym</button>
          </div>
        </div>
      </div>
      <div class="config-group" style="text-align:center;margin-bottom:26px">
        <label style="text-align:center">Category</label>
        <div class="seg" id="segPool" style="flex-wrap:wrap;justify-content:center;max-width:480px;margin:0 auto">
          ${cats.map(c => `<button data-pool="${c.k}" class="${quiz.pool === c.k ? "active" : ""}">${c.label}</button>`).join("")}
        </div>
      </div>
      <button class="btn" id="startQuiz">
        Start quiz
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </button>
    </div>`;

  $$("#segLen button").forEach(b => b.onclick = () => { quiz.len = +b.dataset.len; setSeg("#segLen", b); });
  $$("#segDir button").forEach(b => b.onclick = () => { quiz.dir = b.dataset.dir; setSeg("#segDir", b); });
  $$("#segPool button").forEach(b => b.onclick = () => { quiz.pool = b.dataset.pool; setSeg("#segPool", b); });
  $("#startQuiz").onclick = startQuiz;
}

function setSeg(sel, btn) {
  $$(sel + " button").forEach(x => x.classList.remove("active"));
  btn.classList.add("active");
}

function startQuiz() {
  let pool = quiz.pool === "all" ? ACRONYMS.slice() : ACRONYMS.filter(x => x.cat === quiz.pool);
  if (pool.length < 4) { toast("Need at least 4 acronyms in this category"); return; }

  const n = Math.min(quiz.len, pool.length);
  const picks = shuffle(pool).slice(0, n);

  quiz.questions = picks.map(item => {
    const distractors = shuffle(ACRONYMS.filter(x => x.a !== item.a))
      .filter(x => quiz.dir === "a2d" ? x.full !== item.full : x.a !== item.a)
      .slice(0, 3);
    const opts = shuffle([item, ...distractors]);
    return { item, options: opts };
  });
  quiz.idx = 0; quiz.score = 0; quiz.answered = false; quiz.results = [];
  renderQuestion();
}

function renderQuestion() {
  const q = quiz.questions[quiz.idx];
  const w = $("#quizWrap");
  const total = quiz.questions.length;
  const pct = Math.round((quiz.idx / total) * 100);
  const a2d = quiz.dir === "a2d";
  const promptText = a2d ? q.item.a : q.item.full;
  const promptLabel = a2d ? "What does this stand for?" : "Which acronym means…";
  const subText = a2d ? "Select the correct definition" : "Pick the matching acronym";

  w.innerHTML = `
    <div class="quiz-card">
      <div class="quiz-progress">
        <span class="q-count">Question ${quiz.idx + 1} of ${total}</span>
        <span class="q-score">Score: ${quiz.score}</span>
      </div>
      <div class="pbar"><span style="width:${pct}%"></span></div>

      <div class="q-prompt-label">${promptLabel}</div>
      <div class="q-prompt">${esc(promptText)}</div>
      <div class="q-sub">${subText}</div>

      <div class="options" id="options">
        ${q.options.map((o, i) => {
          const text = a2d ? o.full : o.a;
          return `<button class="opt" data-i="${i}">
            <span class="key">${String.fromCharCode(65 + i)}</span>
            <span class="otext">${esc(text)}</span>
          </button>`;
        }).join("")}
      </div>

      <div class="quiz-foot">
        <span class="feedback" id="feedback"></span>
        <button class="btn ghost" id="quitQuiz" style="padding:9px 16px;font-size:.85rem">Quit</button>
      </div>
    </div>`;

  $("#quitQuiz").onclick = () => { renderQuizStart(); };
  $$("#options .opt").forEach(btn => btn.onclick = () => answer(+btn.dataset.i));
}

function answer(i) {
  if (quiz.answered) return;
  quiz.answered = true;
  const q = quiz.questions[quiz.idx];
  const a2d = quiz.dir === "a2d";
  const chosen = q.options[i];
  const correct = chosen.a === q.item.a;
  const correctIdx = q.options.findIndex(o => o.a === q.item.a);

  const btns = $$("#options .opt");
  btns.forEach((b, bi) => {
    b.disabled = true;
    if (bi === correctIdx) {
      b.classList.add("correct");
      b.insertAdjacentHTML("beforeend", `<span class="res-ico">✓</span>`);
    }
    if (bi === i && !correct) {
      b.classList.add("wrong");
      b.insertAdjacentHTML("beforeend", `<span class="res-ico">✕</span>`);
    }
  });

  const fb = $("#feedback");
  if (correct) {
    quiz.score++;
    fb.textContent = "Correct!";
    fb.className = "feedback ok";
  } else {
    fb.textContent = `Answer: ${a2d ? q.item.full : q.item.a}`;
    fb.className = "feedback no";
  }

  quiz.results.push({ item: q.item, correct, chosen });

  const isLast = quiz.idx === quiz.questions.length - 1;
  const quit = $("#quitQuiz");
  quit.outerHTML = `<button class="btn" id="nextQ">${isLast ? "See results" : "Next"}
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" style="width:17px;height:17px"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></button>`;
  $("#nextQ").onclick = () => {
    if (isLast) { renderResults(); }
    else { quiz.idx++; quiz.answered = false; renderQuestion(); }
  };
  $("#nextQ").focus();
}

function renderResults() {
  const total = quiz.questions.length;
  const pct = Math.round((quiz.score / total) * 100);
  const a2d = quiz.dir === "a2d";

  let msg, msgColor;
  if (pct === 100) { msg = "Flawless — you know your acronyms!"; msgColor = "var(--green)"; }
  else if (pct >= 80) { msg = "Great work, nearly there."; msgColor = "var(--green)"; }
  else if (pct >= 50) { msg = "Solid start — a few more to learn."; msgColor = "var(--amber)"; }
  else { msg = "Worth another round through the glossary."; msgColor = "var(--red)"; }

  const R = 65, C = 2 * Math.PI * R;
  const dash = C * (pct / 100);

  const w = $("#quizWrap");
  w.innerHTML = `
    <div class="quiz-card result-screen">
      <div class="result-ring">
        <svg width="150" height="150">
          <circle cx="75" cy="75" r="${R}" fill="none" stroke="var(--surface-2)" stroke-width="12"/>
          <circle cx="75" cy="75" r="${R}" fill="none" stroke="url(#g)" stroke-width="12" stroke-linecap="round"
            stroke-dasharray="${dash} ${C}" />
          <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="var(--brand)"/><stop offset="100%" stop-color="#7c3aed"/>
          </linearGradient></defs>
        </svg>
        <div class="pct">${pct}%</div>
      </div>
      <h2>You scored ${quiz.score} / ${total}</h2>
      <p class="summary">${quiz.answered ? "" : ""}Quiz complete.</p>
      <div class="result-msg" style="color:${msgColor}">${msg}</div>
      <div class="result-actions">
        <button class="btn" id="again">Try again</button>
        <button class="btn ghost" id="toBrowse">Back to glossary</button>
      </div>

      <div class="review-list">
        <h4>Review</h4>
        ${quiz.results.map(r => `
          <div class="review-item">
            <span class="ri-ico ${r.correct ? "ok" : "no"}">${r.correct ? "✓" : "✕"}</span>
            <span><b>${esc(r.item.a)}</b> — ${esc(r.item.full)}${r.correct ? "" : ` <span style="color:var(--red)">(your answer: ${esc(a2d ? r.chosen.full : r.chosen.a)})</span>`}</span>
          </div>`).join("")}
      </div>
    </div>`;

  $("#again").onclick = startQuiz;
  $("#toBrowse").onclick = () => $('.tab[data-view="browse"]').click();
}

/* ---------------------------------------------------------------
   KEYBOARD SHORTCUTS
--------------------------------------------------------------- */
document.addEventListener("keydown", e => {
  const inBrowse = !$("#view-browse").classList.contains("hidden");
  // "/" focuses search
  if (e.key === "/" && inBrowse && document.activeElement.id !== "search") {
    e.preventDefault();
    $("#search").focus();
  }
  // quiz answer keys
  if (!$("#view-quiz").classList.contains("hidden")) {
    if (!quiz.answered && /^[1-4a-dA-D]$/.test(e.key)) {
      const map = { "1": 0, "2": 1, "3": 2, "4": 3, a: 0, b: 1, c: 2, d: 3 };
      const i = map[e.key.toLowerCase()];
      const btn = $(`#options .opt[data-i="${i}"]`);
      if (btn) btn.click();
    }
    if ((e.key === "Enter" || e.key === " ") && quiz.answered) {
      const n = $("#nextQ"); if (n) { e.preventDefault(); n.click(); }
    }
  }
});

/* ---------------------------------------------------------------
   INIT
--------------------------------------------------------------- */
buildFilters();
render();
</script>
</body>
