<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Math Practice Drills</title>
<style>
  :root {
    --bg: #0e1117;
    --bg-soft: #161b26;
    --bg-card: #1b2230;
    --border: #2a3346;
    --text: #eef2f8;
    --muted: #8b96ab;
    --accent: #5b8cff;
    --accent-soft: #2d3f6b;
    --good: #3ddc84;
    --bad: #ff5c6c;
    --warn: #ffc14d;
    --radius: 18px;
    --shadow: 0 10px 40px rgba(0,0,0,0.45);
    --font: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
  }

  body {
    font-family: var(--font);
    background: radial-gradient(1200px 800px at 50% -10%, #1a2336 0%, var(--bg) 55%);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  .app {
    width: 100%;
    max-width: 620px;
  }

  header.brand {
    text-align: center;
    margin-bottom: 22px;
  }
  header.brand h1 {
    font-size: clamp(1.6rem, 5vw, 2.2rem);
    font-weight: 800;
    letter-spacing: -0.02em;
    background: linear-gradient(90deg, #7aa2ff, #b78cff);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  header.brand p {
    color: var(--muted);
    font-size: 0.95rem;
    margin-top: 6px;
  }

  .card {
    background: linear-gradient(180deg, var(--bg-card), var(--bg-soft));
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 28px;
  }

  .screen { display: none; }
  .screen.active { display: block; animation: fade 0.35s ease; }
  @keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  /* ---------- Setup ---------- */
  .group { margin-bottom: 24px; }
  .group > label.title {
    display: block;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 12px;
    font-weight: 600;
  }

  .options {
    display: grid;
    gap: 10px;
  }
  .options.cols-2 { grid-template-columns: repeat(2, 1fr); }
  .options.cols-3 { grid-template-columns: repeat(3, 1fr); }
  .options.cols-4 { grid-template-columns: repeat(4, 1fr); }

  .opt {
    position: relative;
    border: 1.5px solid var(--border);
    background: var(--bg-soft);
    color: var(--text);
    border-radius: 14px;
    padding: 14px 10px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.18s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    text-align: center;
  }
  .opt .sub {
    font-size: 0.72rem;
    font-weight: 500;
    color: var(--muted);
  }
  .opt:hover { border-color: var(--accent-soft); transform: translateY(-1px); }
  .opt.sel {
    border-color: var(--accent);
    background: linear-gradient(180deg, var(--accent-soft), var(--bg-soft));
    box-shadow: 0 0 0 3px rgba(91,140,255,0.15);
  }
  .opt .icon { font-size: 1.3rem; }

  .btn {
    width: 100%;
    border: none;
    border-radius: 14px;
    padding: 16px;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.12s ease, box-shadow 0.18s ease, opacity 0.18s;
    font-family: var(--font);
  }
  .btn-primary {
    background: linear-gradient(90deg, #5b8cff, #7a6bff);
    color: white;
    box-shadow: 0 8px 24px rgba(91,140,255,0.35);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(91,140,255,0.45); }
  .btn-primary:active { transform: translateY(0); }
  .btn-ghost {
    background: var(--bg-soft);
    color: var(--text);
    border: 1.5px solid var(--border);
  }
  .btn-ghost:hover { border-color: var(--accent-soft); }

  /* ---------- Quiz ---------- */
  .quiz-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
    gap: 12px;
  }
  .stat {
    text-align: center;
    flex: 1;
  }
  .stat .v {
    font-size: 1.5rem;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
  }
  .stat .k {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--muted);
    margin-top: 2px;
  }
  .stat .v.timer.low { color: var(--bad); }

  .progress-track {
    height: 8px;
    background: var(--bg-soft);
    border-radius: 99px;
    overflow: hidden;
    margin-bottom: 26px;
    border: 1px solid var(--border);
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #7a6bff);
    width: 0%;
    transition: width 0.3s ease;
  }
  /* timer bar variant */
  .progress-fill.timer-fill { background: linear-gradient(90deg, var(--good), var(--warn)); }
  .progress-fill.timer-fill.low { background: linear-gradient(90deg, var(--warn), var(--bad)); }

  .problem {
    text-align: center;
    font-size: clamp(2.8rem, 12vw, 4.5rem);
    font-weight: 800;
    letter-spacing: -0.01em;
    font-variant-numeric: tabular-nums;
    margin: 14px 0 28px;
    min-height: 1.1em;
  }
  .problem.shake { animation: shake 0.4s; }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-10px); }
    40% { transform: translateX(10px); }
    60% { transform: translateX(-6px); }
    80% { transform: translateX(6px); }
  }
  .problem.pop { animation: pop 0.3s; }
  @keyframes pop {
    0% { transform: scale(1); }
    45% { transform: scale(1.08); color: var(--good); }
    100% { transform: scale(1); }
  }

  .answer-row {
    display: flex;
    gap: 12px;
    margin-bottom: 8px;
  }
  input.answer {
    flex: 1;
    background: var(--bg-soft);
    border: 2px solid var(--border);
    border-radius: 14px;
    color: var(--text);
    font-size: 2rem;
    font-weight: 700;
    text-align: center;
    padding: 14px;
    outline: none;
    font-family: var(--font);
    font-variant-numeric: tabular-nums;
    transition: border-color 0.18s;
    min-width: 0;
  }
  input.answer:focus { border-color: var(--accent); }
  input.answer.correct { border-color: var(--good); }
  input.answer.wrong { border-color: var(--bad); }

  .btn-submit {
    flex: 0 0 auto;
    width: 120px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(90deg, #5b8cff, #7a6bff);
    color: #fff;
    font-size: 1.05rem;
    font-weight: 700;
    cursor: pointer;
    font-family: var(--font);
  }
  .btn-submit:active { transform: scale(0.97); }

  .feedback-line {
    text-align: center;
    height: 22px;
    font-weight: 600;
    font-size: 0.95rem;
    margin-top: 6px;
  }
  .feedback-line.good { color: var(--good); }
  .feedback-line.bad { color: var(--bad); }

  .streak-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: rgba(255,193,77,0.12);
    border: 1px solid rgba(255,193,77,0.3);
    color: var(--warn);
    padding: 2px 10px;
    border-radius: 99px;
    font-size: 0.8rem;
    font-weight: 700;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .streak-pill.show { opacity: 1; }

  /* ---------- Results ---------- */
  .results-head { text-align: center; margin-bottom: 8px; }
  .results-head .emoji { font-size: 3.4rem; line-height: 1; }
  .results-head h2 {
    font-size: 1.8rem;
    font-weight: 800;
    margin-top: 8px;
  }
  .results-head p { color: var(--muted); margin-top: 4px; }

  .score-big {
    text-align: center;
    margin: 18px 0;
  }
  .score-big .num {
    font-size: 4rem;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    background: linear-gradient(90deg, #7aa2ff, #b78cff);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .score-big .lbl { color: var(--muted); font-size: 0.9rem; }

  .stat-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin: 22px 0;
  }
  .stat-box {
    background: var(--bg-soft);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 8px;
    text-align: center;
  }
  .stat-box .v { font-size: 1.5rem; font-weight: 800; font-variant-numeric: tabular-nums; }
  .stat-box .k { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 4px; }
  .stat-box .v.green { color: var(--good); }
  .stat-box .v.red { color: var(--bad); }

  .best-banner {
    text-align: center;
    background: linear-gradient(90deg, rgba(61,220,132,0.12), rgba(91,140,255,0.12));
    border: 1px solid rgba(61,220,132,0.35);
    color: var(--good);
    padding: 10px;
    border-radius: 12px;
    font-weight: 700;
    margin-bottom: 18px;
    font-size: 0.95rem;
  }

  .review {
    margin: 20px 0;
    max-height: 230px;
    overflow-y: auto;
    border: 1px solid var(--border);
    border-radius: 14px;
    background: var(--bg-soft);
  }
  .review h3 {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--muted);
    padding: 12px 14px 8px;
    position: sticky;
    top: 0;
    background: var(--bg-soft);
  }
  .review-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 9px 14px;
    border-top: 1px solid var(--border);
    font-size: 0.98rem;
    font-variant-numeric: tabular-nums;
  }
  .review-item .q { font-weight: 600; }
  .review-item .mark { font-weight: 800; }
  .review-item.ok .mark { color: var(--good); }
  .review-item.no .mark { color: var(--bad); }
  .review-item .yours { color: var(--muted); font-size: 0.85rem; }
  .review-item .yours .x { color: var(--bad); text-decoration: line-through; }
  .review-item .yours .c { color: var(--good); margin-left: 6px; }

  .actions { display: flex; flex-direction: column; gap: 12px; }

  /* High score footer on setup */
  .hs-footer {
    margin-top: 16px;
    text-align: center;
    color: var(--muted);
    font-size: 0.85rem;
  }
  .hs-footer b { color: var(--warn); }

  /* scrollbar */
  .review::-webkit-scrollbar { width: 8px; }
  .review::-webkit-scrollbar-thumb { background: var(--border); border-radius: 8px; }

  @media (max-width: 480px) {
    .card { padding: 20px; }
    .btn-submit { width: 90px; font-size: 0.95rem; }
    input.answer { font-size: 1.6rem; }
  }
</style>
</head>
<body>
<div class="app">
  <header class="brand">
    <h1>Math Practice Drills</h1>
    <p>Sharpen your speed and accuracy, one drill at a time.</p>
  </header>

  <!-- ============ SETUP ============ -->
  <section id="setup" class="screen active card">
    <div class="group">
      <label class="title">Operations</label>
      <div class="options cols-4" id="op-options">
        <button class="opt sel" data-op="add"><span class="icon">➕</span>Add</button>
        <button class="opt sel" data-op="sub"><span class="icon">➖</span>Subtract</button>
        <button class="opt" data-op="mul"><span class="icon">✖️</span>Multiply</button>
        <button class="opt" data-op="div"><span class="icon">➗</span>Divide</button>
      </div>
    </div>

    <div class="group">
      <label class="title">Difficulty</label>
      <div class="options cols-3" id="diff-options">
        <button class="opt sel" data-diff="easy">Easy<span class="sub">1–12</span></button>
        <button class="opt" data-diff="medium">Medium<span class="sub">1–25</span></button>
        <button class="opt" data-diff="hard">Hard<span class="sub">1–99</span></button>
      </div>
    </div>

    <div class="group">
      <label class="title">Timer</label>
      <div class="options cols-4" id="time-options">
        <button class="opt" data-time="30">30s</button>
        <button class="opt sel" data-time="60">60s</button>
        <button class="opt" data-time="120">2 min</button>
        <button class="opt" data-time="0">No&nbsp;limit<span class="sub">20 Qs</span></button>
      </div>
    </div>

    <button class="btn btn-primary" id="start-btn">Start Drill →</button>
    <div class="hs-footer" id="hs-footer"></div>
  </section>

  <!-- ============ QUIZ ============ -->
  <section id="quiz" class="screen card">
    <div class="quiz-top">
      <div class="stat"><div class="v" id="q-score">0</div><div class="k">Score</div></div>
      <div class="stat"><div class="v" id="q-count">0</div><div class="k">Solved</div></div>
      <div class="stat"><div class="v timer" id="q-timer">60</div><div class="k" id="q-timer-lbl">Seconds</div></div>
    </div>

    <div class="progress-track"><div class="progress-fill" id="q-progress"></div></div>

    <div style="text-align:center;margin-bottom:6px;">
      <span class="streak-pill" id="streak-pill">🔥 <span id="streak-n">0</span> streak</span>
    </div>

    <div class="problem" id="q-problem">7 + 5</div>

    <div class="answer-row">
      <input class="answer" id="q-input" type="text" inputmode="numeric" autocomplete="off"
             placeholder="?" aria-label="Your answer" />
      <button class="btn-submit" id="q-submit">Enter</button>
    </div>
    <div class="feedback-line" id="q-feedback">&nbsp;</div>

    <button class="btn btn-ghost" id="q-quit" style="margin-top:10px;">End Drill</button>
  </section>

  <!-- ============ RESULTS ============ -->
  <section id="results" class="screen card">
    <div class="results-head">
      <div class="emoji" id="r-emoji">🎉</div>
      <h2 id="r-title">Drill Complete!</h2>
      <p id="r-subtitle">Here's how you did.</p>
    </div>

    <div id="r-best" class="best-banner" style="display:none;">🏆 New High Score!</div>

    <div class="score-big">
      <div class="num" id="r-score">0</div>
      <div class="lbl">points</div>
    </div>

    <div class="stat-grid">
      <div class="stat-box"><div class="v green" id="r-correct">0</div><div class="k">Correct</div></div>
      <div class="stat-box"><div class="v red" id="r-wrong">0</div><div class="k">Missed</div></div>
      <div class="stat-box"><div class="v" id="r-acc">0%</div><div class="k">Accuracy</div></div>
    </div>
    <div class="stat-grid" style="margin-top:-8px;">
      <div class="stat-box"><div class="v" id="r-speed">0.0s</div><div class="k">Avg / Q</div></div>
      <div class="stat-box"><div class="v" id="r-streak">0</div><div class="k">Best Streak</div></div>
      <div class="stat-box"><div class="v" id="r-total">0</div><div class="k">Answered</div></div>
    </div>

    <div class="review" id="r-review">
      <h3>Review</h3>
    </div>

    <div class="actions">
      <button class="btn btn-primary" id="r-again">Play Again</button>
      <button class="btn btn-ghost" id="r-home">Change Settings</button>
    </div>
  </section>
</div>

<script>
(function () {
  "use strict";

  // ---------- Config / State ----------
  const OPS = {
    add: { sym: "+", fn: (a, b) => a + b },
    sub: { sym: "−", fn: (a, b) => a - b },
    mul: { sym: "×", fn: (a, b) => a * b },
    div: { sym: "÷", fn: (a, b) => a / b },
  };
  const DIFF = {
    easy:   { max: 12, mulMax: 12, label: "Easy" },
    medium: { max: 25, mulMax: 15, label: "Medium" },
    hard:   { max: 99, mulMax: 20, label: "Hard" },
  };
  const NO_LIMIT_QUESTIONS = 20;
  const HS_KEY = "mathDrills.highscores.v1";

  const config = { ops: ["add", "sub"], diff: "easy", time: 60 };

  let state = null;
  let tickHandle = null;

  // ---------- Elements ----------
  const $ = (id) => document.getElementById(id);
  const screens = { setup: $("setup"), quiz: $("quiz"), results: $("results") };

  function show(name) {
    Object.values(screens).forEach((s) => s.classList.remove("active"));
    screens[name].classList.add("active");
  }

  // ---------- Setup interactions ----------
  function bindToggles(containerId, attr, onChange, multi) {
    const buttons = $(containerId).querySelectorAll(".opt");
    buttons.forEach((btn) => {
      btn.addEventListener("click", () => {
        if (multi) {
          btn.classList.toggle("sel");
          // ensure at least one stays selected
          const anySel = $(containerId).querySelectorAll(".opt.sel").length > 0;
          if (!anySel) btn.classList.add("sel");
        } else {
          buttons.forEach((b) => b.classList.remove("sel"));
          btn.classList.add("sel");
        }
        onChange();
      });
    });
  }

  function readConfig() {
    config.ops = Array.from($("op-options").querySelectorAll(".opt.sel")).map((b) => b.dataset.op);
    const d = $("diff-options").querySelector(".opt.sel");
    config.diff = d ? d.dataset.diff : "easy";
    const t = $("time-options").querySelector(".opt.sel");
    config.time = t ? parseInt(t.dataset.time, 10) : 60;
    updateHsFooter();
  }

  bindToggles("op-options", "op", readConfig, true);
  bindToggles("diff-options", "diff", readConfig, false);
  bindToggles("time-options", "time", readConfig, false);

  // ---------- High scores ----------
  function hsId() {
    const ops = [...config.ops].sort().join("");
    return ops + "|" + config.diff + "|" + config.time;
  }
  function loadHs() {
    try { return JSON.parse(localStorage.getItem(HS_KEY)) || {}; }
    catch (e) { return {}; }
  }
  function getHs() { return loadHs()[hsId()] || 0; }
  function saveHs(score) {
    const all = loadHs();
    if (score > (all[hsId()] || 0)) { all[hsId()] = score; }
    try { localStorage.setItem(HS_KEY, JSON.stringify(all)); } catch (e) {}
  }
  function updateHsFooter() {
    const hs = getHs();
    const f = $("hs-footer");
    if (hs > 0) f.innerHTML = "Best for this mode: <b>" + hs + " pts</b>";
    else f.textContent = "Set a high score to beat!";
  }

  // ---------- Problem generation ----------
  function rnd(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

  function makeProblem() {
    const op = config.ops[rnd(0, config.ops.length - 1)];
    const cfg = DIFF[config.diff];
    let a, b, answer;

    if (op === "add") {
      a = rnd(1, cfg.max); b = rnd(1, cfg.max); answer = a + b;
    } else if (op === "sub") {
      a = rnd(1, cfg.max); b = rnd(1, cfg.max);
      if (b > a) { const t = a; a = b; b = t; } // keep non-negative
      answer = a - b;
    } else if (op === "mul") {
      a = rnd(2, cfg.mulMax); b = rnd(2, cfg.mulMax); answer = a * b;
    } else { // div — build from a clean product
      b = rnd(2, cfg.mulMax);
      answer = rnd(2, cfg.mulMax);
      a = b * answer;
    }
    return { op, a, b, answer, text: a + " " + OPS[op].sym + " " + b };
  }

  // ---------- Quiz flow ----------
  function startQuiz() {
    readConfig();
    if (config.ops.length === 0) return;

    state = {
      score: 0,
      correct: 0,
      wrong: 0,
      answered: 0,
      streak: 0,
      bestStreak: 0,
      remaining: config.time, // seconds (0 = none)
      timed: config.time > 0,
      startTime: Date.now(),
      current: null,
      log: [],
    };

    // Timer label / display
    if (state.timed) {
      $("q-timer-lbl").textContent = "Seconds";
      $("q-timer").textContent = state.remaining;
    } else {
      $("q-timer-lbl").textContent = "Remaining";
      $("q-timer").textContent = NO_LIMIT_QUESTIONS;
    }
    $("q-progress").parentElement.style.display = "block";

    $("q-score").textContent = "0";
    $("q-count").textContent = "0";
    $("q-feedback").innerHTML = "&nbsp;";
    $("streak-pill").classList.remove("show");

    show("quiz");
    nextProblem();
    startTimer();
    setTimeout(() => $("q-input").focus(), 50);
  }

  function startTimer() {
    clearInterval(tickHandle);
    if (!state.timed) { updateProgress(); return; }
    tickHandle = setInterval(() => {
      state.remaining--;
      const tEl = $("q-timer");
      tEl.textContent = Math.max(0, state.remaining);
      const low = state.remaining <= 10;
      tEl.classList.toggle("low", low);
      updateProgress();
      if (state.remaining <= 0) { clearInterval(tickHandle); finishQuiz("time"); }
    }, 1000);
  }

  function updateProgress() {
    const fill = $("q-progress");
    if (state.timed) {
      fill.classList.add("timer-fill");
      const pct = Math.max(0, (state.remaining / config.time) * 100);
      fill.style.width = pct + "%";
      fill.classList.toggle("low", state.remaining <= 10);
    } else {
      fill.classList.remove("timer-fill");
      const pct = (state.answered / NO_LIMIT_QUESTIONS) * 100;
      fill.style.width = pct + "%";
    }
  }

  function nextProblem() {
    state.current = makeProblem();
    state.questionStart = Date.now();
    $("q-problem").textContent = state.current.text;
    const inp = $("q-input");
    inp.value = "";
    inp.className = "answer";
    inp.disabled = false;
    inp.focus();
    updateProgress();
  }

  function flashStreak() {
    const pill = $("streak-pill");
    if (state.streak >= 2) {
      $("streak-n").textContent = state.streak;
      pill.classList.add("show");
    } else {
      pill.classList.remove("show");
    }
  }

  function submitAnswer() {
    if (!state || !state.current) return;
    const raw = $("q-input").value.trim();
    if (raw === "" || raw === "-") return; // ignore empty
    const val = Number(raw);
    if (!Number.isFinite(val)) return;

    const cur = state.current;
    const correct = val === cur.answer;
    const inp = $("q-input");
    const fb = $("q-feedback");
    const prob = $("q-problem");

    state.answered++;
    state.log.push({ text: cur.text, answer: cur.answer, yours: val, correct: correct });

    if (correct) {
      state.correct++;
      state.streak++;
      state.bestStreak = Math.max(state.bestStreak, state.streak);
      // scoring: base 10 + speed bonus + streak bonus
      const secs = (Date.now() - state.questionStart) / 1000;
      const speedBonus = secs < 2 ? 5 : secs < 4 ? 3 : secs < 6 ? 1 : 0;
      const streakBonus = Math.min(state.streak, 10);
      const pts = 10 + speedBonus + streakBonus;
      state.score += pts;
      inp.classList.add("correct");
      prob.classList.remove("shake"); void prob.offsetWidth; prob.classList.add("pop");
      fb.className = "feedback-line good";
      fb.innerHTML = "Correct! <b>+" + pts + "</b>";
    } else {
      state.wrong++;
      state.streak = 0;
      inp.classList.add("wrong");
      prob.classList.remove("pop"); void prob.offsetWidth; prob.classList.add("shake");
      fb.className = "feedback-line bad";
      fb.textContent = "Answer: " + cur.answer;
    }

    $("q-score").textContent = state.score;
    $("q-count").textContent = state.correct;
    flashStreak();

    // check end condition for no-limit mode
    if (!state.timed && state.answered >= NO_LIMIT_QUESTIONS) {
      $("q-timer").textContent = "0";
      setTimeout(() => finishQuiz("done"), 450);
      return;
    }
    if (!state.timed) {
      $("q-timer").textContent = NO_LIMIT_QUESTIONS - state.answered;
    }

    // brief pause so feedback registers, then next
    inp.disabled = true;
    setTimeout(() => {
      if (state) { nextProblem(); fb.innerHTML = "&nbsp;"; fb.className = "feedback-line"; }
    }, correct ? 250 : 650);
  }

  function finishQuiz(reason) {
    clearInterval(tickHandle);
    const finished = state;
    state = null;
    renderResults(finished, reason);
  }

  // ---------- Results ----------
  function renderResults(s, reason) {
    const total = s.answered;
    const acc = total > 0 ? Math.round((s.correct / total) * 100) : 0;
    const elapsed = s.timed ? config.time : (Date.now() - s.startTime) / 1000;
    const avg = s.correct > 0 ? (elapsed / s.correct) : 0;

    const prevBest = getHs();
    const isBest = s.score > prevBest && s.score > 0;
    saveHs(s.score);

    $("r-score").textContent = s.score;
    $("r-correct").textContent = s.correct;
    $("r-wrong").textContent = s.wrong;
    $("r-acc").textContent = acc + "%";
    $("r-speed").textContent = (s.correct > 0 ? avg.toFixed(1) : "—") + (s.correct > 0 ? "s" : "");
    $("r-streak").textContent = s.bestStreak;
    $("r-total").textContent = total;

    $("r-best").style.display = isBest ? "block" : "none";

    // headline
    let emoji = "🎯", title = "Drill Complete!", sub = "";
    if (total === 0) {
      emoji = "🤔"; title = "No answers yet"; sub = "Give it a try next time!";
    } else if (acc === 100) {
      emoji = "🏆"; title = "Flawless!"; sub = "Perfect accuracy — incredible.";
    } else if (acc >= 80) {
      emoji = "🔥"; title = "Great job!"; sub = "Sharp and fast. Keep it up.";
    } else if (acc >= 50) {
      emoji = "💪"; title = "Nice work"; sub = "Solid effort — review the misses below.";
    } else {
      emoji = "📚"; title = "Keep practicing"; sub = "Every drill makes you faster.";
    }
    $("r-emoji").textContent = emoji;
    $("r-title").textContent = title;
    $("r-subtitle").textContent = isBest ? "A new personal best — well done!" : sub;

    // review list
    const rev = $("r-review");
    rev.innerHTML = "<h3>Review (" + total + " answered)</h3>";
    if (total === 0) {
      const empty = document.createElement("div");
      empty.className = "review-item";
      empty.innerHTML = '<span class="yours">No questions answered.</span>';
      rev.appendChild(empty);
    } else {
      s.log.forEach((item) => {
        const row = document.createElement("div");
        row.className = "review-item " + (item.correct ? "ok" : "no");
        let right;
        if (item.correct) {
          right = '<span class="yours">' + item.yours + "</span>";
        } else {
          right = '<span class="yours"><span class="x">' + item.yours +
                  '</span><span class="c">' + item.answer + "</span></span>";
        }
        row.innerHTML = '<span class="q">' + item.text + ' =</span>' +
                        '<span style="display:flex;align-items:center;gap:10px;">' + right +
                        '<span class="mark">' + (item.correct ? "✓" : "✗") + "</span></span>";
        rev.appendChild(row);
      });
    }

    show("results");
  }

  // ---------- Events ----------
  $("start-btn").addEventListener("click", startQuiz);
  $("q-submit").addEventListener("click", submitAnswer);
  $("q-input").addEventListener("keydown", (e) => {
    if (e.key === "Enter") { e.preventDefault(); submitAnswer(); }
  });
  $("q-quit").addEventListener("click", () => { if (state) finishQuiz("quit"); });
  $("r-again").addEventListener("click", startQuiz);
  $("r-home").addEventListener("click", () => { updateHsFooter(); show("setup"); });

  // init
  readConfig();
})();
</script>
</body>
</html>
