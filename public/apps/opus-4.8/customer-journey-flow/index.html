<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Customer Journey Flow</title>
<style>
  :root {
    --bg: #0f1117;
    --bg-grid: #1a1d28;
    --surface: #1c2030;
    --surface-2: #242a3d;
    --border: #313a52;
    --text: #e8ecf5;
    --text-dim: #8b93a8;
    --accent: #6d8bff;
    --accent-soft: rgba(109, 139, 255, 0.15);
    --shadow: 0 10px 30px rgba(0, 0, 0, 0.45);
    --radius: 14px;
    --awareness: #6d8bff;
    --interest: #00c2a8;
    --consideration: #f5a623;
    --intent: #c879ff;
    --purchase: #ff6b8b;
    --retention: #4ad295;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  #app { display: flex; flex-direction: column; height: 100vh; }

  /* ───── Toolbar ───── */
  header.toolbar {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 20px;
    background: linear-gradient(180deg, #161a26, #12151f);
    border-bottom: 1px solid var(--border);
    z-index: 50;
    flex-wrap: wrap;
  }
  .brand { display: flex; align-items: center; gap: 11px; margin-right: 6px; }
  .brand .logo {
    width: 34px; height: 34px; border-radius: 9px;
    background: linear-gradient(135deg, var(--accent), #a07bff);
    display: grid; place-items: center;
    box-shadow: 0 4px 14px rgba(109,139,255,0.4);
  }
  .brand .logo svg { width: 20px; height: 20px; }
  .brand h1 { font-size: 16px; font-weight: 700; letter-spacing: -0.2px; }
  .brand p { font-size: 11.5px; color: var(--text-dim); margin-top: 1px; }

  .toolbar .spacer { flex: 1; }

  .btn {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 8px 14px; border-radius: 9px;
    background: var(--surface-2); color: var(--text);
    border: 1px solid var(--border); cursor: pointer;
    font-size: 13px; font-weight: 500; transition: all 0.15s ease;
    white-space: nowrap;
  }
  .btn:hover { background: #2c3450; border-color: #3f4a6b; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn svg { width: 15px; height: 15px; }
  .btn.primary { background: linear-gradient(135deg, var(--accent), #8369ff); border-color: transparent; box-shadow: 0 4px 14px rgba(109,139,255,0.35); }
  .btn.primary:hover { filter: brightness(1.08); }
  .btn.ghost { background: transparent; }
  .btn.ghost:hover { background: var(--surface-2); }

  .zoom-group { display: flex; align-items: center; gap: 2px; background: var(--surface); border:1px solid var(--border); border-radius:9px; padding: 3px; }
  .zoom-group button { width: 30px; height: 28px; border:none; background:transparent; color:var(--text); border-radius:6px; cursor:pointer; font-size:16px; display:grid; place-items:center; }
  .zoom-group button:hover { background: var(--surface-2); }
  .zoom-group .zlabel { font-size: 12px; color: var(--text-dim); min-width: 42px; text-align:center; font-variant-numeric: tabular-nums; }

  /* ───── Canvas ───── */
  .stage-wrap { position: relative; flex: 1; overflow: hidden; }
  #canvas {
    position: absolute; inset: 0;
    background-color: var(--bg);
    background-image:
      radial-gradient(circle, rgba(255,255,255,0.035) 1px, transparent 1px);
    background-size: 26px 26px;
    cursor: grab;
  }
  #canvas.panning { cursor: grabbing; }
  #world { position: absolute; top:0; left:0; transform-origin: 0 0; will-change: transform; }

  svg.edges { position: absolute; top:0; left:0; overflow: visible; pointer-events: none; }
  svg.edges path.edge { fill: none; stroke-width: 2.5; cursor: pointer; pointer-events: stroke; transition: stroke 0.15s; }
  svg.edges path.edge-hit { fill: none; stroke: transparent; stroke-width: 18px; pointer-events: stroke; cursor: pointer; }
  svg.edges path.edge.selected { stroke: #fff !important; }
  .edge-label {
    position: absolute; transform: translate(-50%,-50%);
    background: var(--surface-2); border: 1px solid var(--border);
    color: var(--text-dim); font-size: 11px; padding: 2px 8px;
    border-radius: 20px; white-space: nowrap; pointer-events: auto; cursor: pointer;
  }
  .edge-label:hover { color: var(--text); border-color: var(--accent); }

  /* ───── Node ───── */
  .node {
    position: absolute; width: 210px;
    background: linear-gradient(180deg, var(--surface), #181c2a);
    border: 1px solid var(--border); border-radius: var(--radius);
    box-shadow: var(--shadow); cursor: grab; user-select: none;
    transition: box-shadow 0.18s, border-color 0.18s;
    --c: var(--accent);
  }
  .node:hover { border-color: #4a567a; }
  .node.selected { border-color: var(--c); box-shadow: 0 0 0 2px var(--c), var(--shadow); }
  .node.dragging { cursor: grabbing; z-index: 30 !important; box-shadow: 0 18px 44px rgba(0,0,0,0.6); }
  .node .accent { height: 5px; border-radius: var(--radius) var(--radius) 0 0; background: var(--c); }
  .node .body { padding: 13px 15px 15px; }
  .node .row1 { display:flex; align-items:center; gap:9px; margin-bottom: 8px; }
  .node .badge {
    width: 30px; height: 30px; border-radius: 8px; flex-shrink:0;
    display:grid; place-items:center; font-size: 15px;
    background: color-mix(in srgb, var(--c) 22%, transparent);
    border: 1px solid color-mix(in srgb, var(--c) 45%, transparent);
  }
  .node .title {
    font-size: 14.5px; font-weight: 650; flex:1; outline: none;
    border-radius: 4px; line-height: 1.25; letter-spacing: -0.2px;
  }
  .node .title:focus { background: rgba(255,255,255,0.06); box-shadow: 0 0 0 2px var(--accent-soft); }
  .node .desc {
    font-size: 12px; color: var(--text-dim); line-height: 1.45;
    outline: none; border-radius: 4px; min-height: 16px; word-break: break-word;
  }
  .node .desc:empty::before { content: "Add a description…"; color: #5a6178; }
  .node .desc:focus { background: rgba(255,255,255,0.06); box-shadow: 0 0 0 2px var(--accent-soft); color: var(--text); }
  .node .meta { margin-top: 10px; display:flex; gap:6px; flex-wrap:wrap; }
  .node .chip {
    font-size: 10.5px; color: var(--text-dim);
    background: rgba(255,255,255,0.04); border:1px solid var(--border);
    padding: 2px 8px; border-radius: 20px; display:flex; align-items:center; gap:4px;
  }
  .node .chip b { color: var(--text); font-weight:600; }

  .node .tools {
    position:absolute; top:-13px; right:10px; display:flex; gap:5px;
    opacity:0; transition: opacity 0.15s; z-index: 5;
  }
  .node:hover .tools, .node.selected .tools { opacity:1; }
  .node .tools button {
    width:25px; height:25px; border-radius:7px; border:1px solid var(--border);
    background: var(--surface-2); color: var(--text-dim); cursor:pointer;
    display:grid; place-items:center; box-shadow: 0 3px 8px rgba(0,0,0,0.4);
  }
  .node .tools button:hover { color:#fff; background:#2c3450; border-color: var(--accent); }
  .node .tools button svg { width:13px; height:13px; }
  .node .tools button.del:hover { background:#ff6b8b; border-color:#ff6b8b; color:#fff; }

  /* connection ports */
  .port {
    position:absolute; width:16px; height:16px; border-radius:50%;
    background: var(--surface); border:2.5px solid var(--c);
    cursor: crosshair; z-index: 6; transition: transform 0.12s, background 0.12s;
  }
  .port:hover { transform: scale(1.45); background: var(--c); }
  .port.out { right:-9px; top:50%; margin-top:-8px; }
  .port.in { left:-9px; top:50%; margin-top:-8px; }
  .node.linking-target .port.in { transform: scale(1.5); background: var(--c); box-shadow: 0 0 0 4px color-mix(in srgb, var(--c) 30%, transparent); }

  /* ───── Side palette / inspector ───── */
  .hint {
    position: absolute; bottom: 18px; left: 50%; transform: translateX(-50%);
    background: rgba(28,32,48,0.92); backdrop-filter: blur(8px);
    border:1px solid var(--border); border-radius: 24px;
    padding: 8px 18px; font-size: 12px; color: var(--text-dim);
    display:flex; gap:18px; box-shadow: var(--shadow); pointer-events:none;
    z-index: 20;
  }
  .hint span { display:flex; align-items:center; gap:6px; }
  .hint kbd {
    background: var(--surface-2); border:1px solid var(--border); border-radius:5px;
    padding: 1px 6px; font-size:10.5px; font-family: inherit; color: var(--text);
  }

  .stat-bar {
    position:absolute; top:16px; left:16px; z-index:20;
    display:flex; gap:10px;
  }
  .stat-card {
    background: rgba(28,32,48,0.9); backdrop-filter: blur(8px);
    border:1px solid var(--border); border-radius:11px; padding:9px 14px;
    box-shadow: var(--shadow);
  }
  .stat-card .v { font-size:18px; font-weight:700; letter-spacing:-0.4px; }
  .stat-card .l { font-size:10.5px; color: var(--text-dim); text-transform:uppercase; letter-spacing:0.5px; margin-top:1px; }

  /* color picker popover */
  .color-pop {
    position:absolute; z-index:200; background:var(--surface-2);
    border:1px solid var(--border); border-radius:12px; padding:10px;
    box-shadow: var(--shadow); display:grid; grid-template-columns: repeat(4,1fr); gap:8px;
  }
  .color-pop .sw { width:26px; height:26px; border-radius:7px; cursor:pointer; border:2px solid transparent; }
  .color-pop .sw:hover { transform: scale(1.12); }
  .color-pop .sw.active { border-color:#fff; }

  /* temp linking line */
  svg.edges path.temp { stroke: var(--accent); stroke-width:2.5; stroke-dasharray: 6 5; fill:none; opacity:0.8; }

  .empty-note { position:absolute; inset:0; display:grid; place-items:center; pointer-events:none; color:var(--text-dim); font-size:14px; }

  ::-webkit-scrollbar { width: 0; height: 0; }
  @media (max-width: 640px) {
    .brand p { display:none; }
    .hint { display:none; }
    .btn span.lbl { display:none; }
  }
</style>
</head>
<body>
<div id="app">
  <header class="toolbar">
    <div class="brand">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="5" cy="6" r="2.5"/><circle cx="19" cy="18" r="2.5"/><path d="M7.5 6h6a3 3 0 0 1 3 3v6"/>
        </svg>
      </div>
      <div>
        <h1>Customer Journey Flow</h1>
        <p>Map every step from awareness to purchase</p>
      </div>
    </div>

    <div class="spacer"></div>

    <button class="btn" id="btnAdd"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg><span class="lbl">Add Stage</span></button>
    <button class="btn ghost" id="btnFit" title="Fit to screen"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3m13-5v3a2 2 0 0 1-2 2h-3"/></svg><span class="lbl">Fit</span></button>

    <div class="zoom-group">
      <button id="zoomOut">−</button>
      <span class="zlabel" id="zoomLabel">100%</span>
      <button id="zoomIn">+</button>
    </div>

    <button class="btn ghost" id="btnReset" title="Reset to template"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg></button>
    <button class="btn primary" id="btnExport"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg><span class="lbl">Export</span></button>
  </header>

  <div class="stage-wrap">
    <div id="canvas">
      <svg class="edges" id="edges"></svg>
      <div id="world"></div>
    </div>

    <div class="stat-bar">
      <div class="stat-card"><div class="v" id="statStages">0</div><div class="l">Stages</div></div>
      <div class="stat-card"><div class="v" id="statLinks">0</div><div class="l">Connections</div></div>
    </div>

    <div class="hint">
      <span><kbd>Drag</kbd> move stage</span>
      <span><kbd>●</kbd> drag port to connect</span>
      <span><kbd>Dbl-click</kbd> edit text</span>
      <span><kbd>Del</kbd> remove selected</span>
    </div>
  </div>
</div>

<script>
(function () {
  "use strict";

  const PALETTE = [
    { name: "Awareness",     color: "#6d8bff" },
    { name: "Interest",      color: "#00c2a8" },
    { name: "Consideration", color: "#f5a623" },
    { name: "Intent",        color: "#c879ff" },
    { name: "Purchase",      color: "#ff6b8b" },
    { name: "Retention",     color: "#4ad295" },
  ];
  const ICONS = ["👀","💡","🔍","🛒","✅","💬","📣","⭐","🎯","📦","💳","🤝"];

  const TEMPLATE = {
    nodes: [
      { id: "n1", x: 60,  y: 200, title: "Awareness",     desc: "Customer discovers your brand via ads, social or search.", color: "#6d8bff", icon: "📣", chips: ["Channel: Social", "~50k reach"] },
      { id: "n2", x: 340, y: 90,  title: "Interest",       desc: "They click through and explore your landing page.",       color: "#00c2a8", icon: "💡", chips: ["CTR 4.2%"] },
      { id: "n3", x: 340, y: 320, title: "Consideration",  desc: "Compares features, reads reviews, signs up for trial.",    color: "#f5a623", icon: "🔍", chips: ["Trial signups"] },
      { id: "n4", x: 640, y: 200, title: "Intent",         desc: "Adds product to cart, requests a demo or quote.",          color: "#c879ff", icon: "🎯", chips: ["Add to cart"] },
      { id: "n5", x: 930, y: 200, title: "Purchase",       desc: "Completes checkout and becomes a paying customer.",        color: "#ff6b8b", icon: "💳", chips: ["Conversion 2.8%"] },
    ],
    edges: [
      { id: "e1", from: "n1", to: "n2", label: "engages" },
      { id: "e2", from: "n1", to: "n3", label: "explores" },
      { id: "e3", from: "n2", to: "n4", label: "" },
      { id: "e4", from: "n3", to: "n4", label: "qualifies" },
      { id: "e5", from: "n4", to: "n5", label: "converts" },
    ],
  };

  const NODE_W = 210;

  // ───── State ─────
  let state = load() || clone(TEMPLATE);
  let view = { x: 60, y: 40, scale: 1 };
  let selected = { type: null, id: null };
  let idSeq = computeSeq();

  const world = document.getElementById("world");
  const canvas = document.getElementById("canvas");
  const edgesSvg = document.getElementById("edges");

  // ───── Helpers ─────
  function clone(o) { return JSON.parse(JSON.stringify(o)); }
  function computeSeq() {
    let max = 0;
    state.nodes.forEach(n => { const m = /\d+/.exec(n.id); if (m) max = Math.max(max, +m[0]); });
    state.edges.forEach(e => { const m = /\d+/.exec(e.id); if (m) max = Math.max(max, +m[0]); });
    return max + 1;
  }
  function uid(p) { return p + (idSeq++); }
  function nodeById(id) { return state.nodes.find(n => n.id === id); }
  function nodeEl(id) { return world.querySelector('.node[data-id="' + id + '"]'); }

  function save() {
    try { localStorage.setItem("cjf_state_v1", JSON.stringify(state)); } catch (e) {}
  }
  function load() {
    try { const s = localStorage.getItem("cjf_state_v1"); return s ? JSON.parse(s) : null; } catch (e) { return null; }
  }

  // estimate node height (depends on description length / chips)
  function nodeHeight(n) {
    const el = nodeEl(n.id);
    if (el) return el.offsetHeight;
    return 120;
  }

  // ───── Rendering ─────
  function applyView() {
    world.style.transform = "translate(" + view.x + "px," + view.y + "px) scale(" + view.scale + ")";
    edgesSvg.style.transform = world.style.transform;
    document.getElementById("zoomLabel").textContent = Math.round(view.scale * 100) + "%";
  }

  function renderNodes() {
    // remove deleted
    Array.from(world.children).forEach(c => {
      if (!state.nodes.some(n => n.id === c.dataset.id)) c.remove();
    });
    state.nodes.forEach(n => {
      let el = nodeEl(n.id);
      if (!el) { el = createNode(n); world.appendChild(el); }
      updateNode(el, n);
    });
  }

  function createNode(n) {
    const el = document.createElement("div");
    el.className = "node";
    el.dataset.id = n.id;
    el.innerHTML =
      '<div class="accent"></div>' +
      '<div class="tools">' +
        '<button class="color" title="Change color"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3" fill="currentColor"/></svg></button>' +
        '<button class="dup" title="Duplicate"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg></button>' +
        '<button class="del" title="Delete"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg></button>' +
      '</div>' +
      '<div class="body">' +
        '<div class="row1">' +
          '<div class="badge"></div>' +
          '<div class="title" contenteditable="false" spellcheck="false"></div>' +
        '</div>' +
        '<div class="desc" contenteditable="false" spellcheck="false"></div>' +
        '<div class="meta"></div>' +
      '</div>' +
      '<div class="port in" data-port="in"></div>' +
      '<div class="port out" data-port="out"></div>';
    wireNode(el, n);
    return el;
  }

  function updateNode(el, n) {
    el.style.left = n.x + "px";
    el.style.top = n.y + "px";
    el.style.setProperty("--c", n.color);
    el.querySelector(".badge").textContent = n.icon || "•";
    const titleEl = el.querySelector(".title");
    if (titleEl.textContent !== n.title) titleEl.textContent = n.title;
    const descEl = el.querySelector(".desc");
    if (descEl.textContent !== (n.desc || "")) descEl.textContent = n.desc || "";
    const meta = el.querySelector(".meta");
    meta.innerHTML = "";
    (n.chips || []).forEach(c => {
      const chip = document.createElement("div");
      chip.className = "chip";
      chip.textContent = c;
      meta.appendChild(chip);
    });
    el.classList.toggle("selected", selected.type === "node" && selected.id === n.id);
  }

  function curve(x1, y1, x2, y2) {
    const dx = Math.max(40, Math.abs(x2 - x1) * 0.5);
    return "M " + x1 + " " + y1 + " C " + (x1 + dx) + " " + y1 + ", " + (x2 - dx) + " " + y2 + ", " + x2 + " " + y2;
  }

  function portPos(n, side) {
    const h = nodeHeight(n);
    return side === "out"
      ? { x: n.x + NODE_W, y: n.y + h / 2 }
      : { x: n.x, y: n.y + h / 2 };
  }

  function renderEdges() {
    edgesSvg.innerHTML = "";
    // existing labels removed by re-creating
    document.querySelectorAll(".edge-label").forEach(e => e.remove());

    state.edges.forEach(e => {
      const a = nodeById(e.from), b = nodeById(e.to);
      if (!a || !b) return;
      const p1 = portPos(a, "out"), p2 = portPos(b, "in");
      const d = curve(p1.x, p1.y, p2.x, p2.y);

      const hit = document.createElementNS("http://www.w3.org/2000/svg", "path");
      hit.setAttribute("d", d); hit.setAttribute("class", "edge-hit");
      hit.addEventListener("mousedown", ev => { ev.stopPropagation(); selectEdge(e.id); });

      const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
      path.setAttribute("d", d);
      path.setAttribute("class", "edge" + (selected.type === "edge" && selected.id === e.id ? " selected" : ""));
      path.setAttribute("stroke", a.color);
      path.setAttribute("marker-end", "url(#arrow-" + a.color.replace("#", "") + ")");
      ensureMarker(a.color);

      edgesSvg.appendChild(hit);
      edgesSvg.appendChild(path);

      // label
      const mx = (p1.x + p2.x) / 2, my = (p1.y + p2.y) / 2;
      const lbl = document.createElement("div");
      lbl.className = "edge-label";
      lbl.textContent = e.label || "+ label";
      lbl.style.left = (view.x + mx * view.scale) + "px";
      lbl.style.top = (view.y + my * view.scale) + "px";
      lbl.addEventListener("mousedown", ev => ev.stopPropagation());
      lbl.addEventListener("dblclick", ev => { ev.stopPropagation(); editEdgeLabel(e, lbl); });
      lbl.addEventListener("click", ev => { ev.stopPropagation(); selectEdge(e.id); });
      canvas.appendChild(lbl);
    });
  }

  const markersDone = new Set();
  function ensureMarker(color) {
    const id = "arrow-" + color.replace("#", "");
    if (markersDone.has(id)) return;
    let defs = edgesSvg.querySelector("defs");
    if (!defs) { defs = document.createElementNS("http://www.w3.org/2000/svg", "defs"); edgesSvg.appendChild(defs); }
    const m = document.createElementNS("http://www.w3.org/2000/svg", "marker");
    m.setAttribute("id", id); m.setAttribute("viewBox", "0 0 10 10");
    m.setAttribute("refX", "8"); m.setAttribute("refY", "5");
    m.setAttribute("markerWidth", "7"); m.setAttribute("markerHeight", "7");
    m.setAttribute("orient", "auto-start-reverse");
    const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
    p.setAttribute("d", "M 0 0 L 10 5 L 0 10 z"); p.setAttribute("fill", color);
    m.appendChild(p); defs.appendChild(m);
    markersDone.add(id);
  }

  function renderStats() {
    document.getElementById("statStages").textContent = state.nodes.length;
    document.getElementById("statLinks").textContent = state.edges.length;
  }

  function renderAll() {
    renderNodes();
    renderEdges();
    renderStats();
    applyView();
    save();
  }

  // re-position only edges (during drag — cheap)
  function refreshEdgesOnly() { renderEdges(); }

  // ───── Selection ─────
  function clearSelection() {
    selected = { type: null, id: null };
    world.querySelectorAll(".node.selected").forEach(n => n.classList.remove("selected"));
    edgesSvg.querySelectorAll(".edge.selected").forEach(n => n.classList.remove("selected"));
    closeColorPop();
  }
  function selectNode(id) {
    clearSelection();
    selected = { type: "node", id };
    const el = nodeEl(id); if (el) el.classList.add("selected");
  }
  function selectEdge(id) {
    clearSelection();
    selected = { type: "edge", id };
    renderEdges();
  }

  // ───── Node interactions ─────
  function wireNode(el, n) {
    const titleEl = el.querySelector(".title");
    const descEl = el.querySelector(".desc");

    // drag to move
    el.addEventListener("mousedown", ev => {
      if (ev.target.closest(".port") || ev.target.closest(".tools") || ev.target.isContentEditable) return;
      ev.stopPropagation();
      selectNode(n.id);
      const start = { mx: ev.clientX, my: ev.clientY, nx: n.x, ny: n.y };
      el.classList.add("dragging");
      function move(e) {
        n.x = start.nx + (e.clientX - start.mx) / view.scale;
        n.y = start.ny + (e.clientY - start.my) / view.scale;
        el.style.left = n.x + "px"; el.style.top = n.y + "px";
        refreshEdgesOnly();
      }
      function up() {
        el.classList.remove("dragging");
        document.removeEventListener("mousemove", move);
        document.removeEventListener("mouseup", up);
        save();
      }
      document.addEventListener("mousemove", move);
      document.addEventListener("mouseup", up);
    });

    // editing text
    function makeEditable(node, key) {
      node.addEventListener("dblclick", ev => {
        ev.stopPropagation();
        node.contentEditable = "true";
        node.focus();
        document.execCommand && document.getSelection().selectAllChildren(node);
      });
      node.addEventListener("blur", () => {
        node.contentEditable = "false";
        n[key] = node.textContent.trim();
        if (key === "title" && !n[key]) { n[key] = "Untitled"; node.textContent = n[key]; }
        save();
      });
      node.addEventListener("keydown", ev => {
        if (ev.key === "Enter" && key === "title") { ev.preventDefault(); node.blur(); }
        if (ev.key === "Escape") { node.blur(); }
        ev.stopPropagation();
      });
    }
    makeEditable(titleEl, "title");
    makeEditable(descEl, "desc");

    // tools
    el.querySelector(".del").addEventListener("click", ev => { ev.stopPropagation(); deleteNode(n.id); });
    el.querySelector(".dup").addEventListener("click", ev => { ev.stopPropagation(); duplicateNode(n.id); });
    el.querySelector(".color").addEventListener("click", ev => { ev.stopPropagation(); openColorPop(n, el.querySelector(".color")); });

    // ports → start connection
    el.querySelector(".port.out").addEventListener("mousedown", ev => { ev.stopPropagation(); startLink(n, ev); });
  }

  function deleteNode(id) {
    state.nodes = state.nodes.filter(n => n.id !== id);
    state.edges = state.edges.filter(e => e.from !== id && e.to !== id);
    clearSelection();
    renderAll();
  }
  function duplicateNode(id) {
    const src = nodeById(id);
    const copy = clone(src);
    copy.id = uid("n");
    copy.x += 40; copy.y += 40;
    state.nodes.push(copy);
    renderAll();
    selectNode(copy.id);
  }

  // ───── Linking ─────
  function startLink(fromNode, ev) {
    const p1 = portPos(fromNode, "out");
    const tempPath = document.createElementNS("http://www.w3.org/2000/svg", "path");
    tempPath.setAttribute("class", "temp");
    edgesSvg.appendChild(tempPath);
    let targetId = null;

    function toWorld(e) {
      const r = canvas.getBoundingClientRect();
      return { x: (e.clientX - r.left - view.x) / view.scale, y: (e.clientY - r.top - view.y) / view.scale };
    }
    function move(e) {
      const w = toWorld(e);
      tempPath.setAttribute("d", curve(p1.x, p1.y, w.x, w.y));
      // highlight potential target
      const overEl = document.elementFromPoint(e.clientX, e.clientY);
      const nodeDom = overEl && overEl.closest(".node");
      world.querySelectorAll(".linking-target").forEach(x => x.classList.remove("linking-target"));
      targetId = null;
      if (nodeDom && nodeDom.dataset.id !== fromNode.id) {
        nodeDom.classList.add("linking-target");
        targetId = nodeDom.dataset.id;
      }
    }
    function up(e) {
      document.removeEventListener("mousemove", move);
      document.removeEventListener("mouseup", up);
      tempPath.remove();
      world.querySelectorAll(".linking-target").forEach(x => x.classList.remove("linking-target"));
      if (targetId && targetId !== fromNode.id) {
        const exists = state.edges.some(ed => ed.from === fromNode.id && ed.to === targetId);
        if (!exists) {
          state.edges.push({ id: uid("e"), from: fromNode.id, to: targetId, label: "" });
          renderAll();
        }
      }
    }
    document.addEventListener("mousemove", move);
    document.addEventListener("mouseup", up);
  }

  function editEdgeLabel(e, lbl) {
    const cur = e.label || "";
    const val = prompt("Connection label:", cur);
    if (val !== null) { e.label = val.trim(); renderEdges(); save(); }
  }

  // ───── Color popover ─────
  let colorPop = null;
  function closeColorPop() { if (colorPop) { colorPop.remove(); colorPop = null; } }
  function openColorPop(n, anchor) {
    closeColorPop();
    colorPop = document.createElement("div");
    colorPop.className = "color-pop";
    const colors = PALETTE.map(p => p.color).concat(["#ff8a3d", "#2dd4bf"]);
    colors.forEach(c => {
      const sw = document.createElement("div");
      sw.className = "sw" + (c === n.color ? " active" : "");
      sw.style.background = c;
      sw.addEventListener("click", () => {
        n.color = c;
        markersDone.clear();
        renderAll();
        closeColorPop();
      });
      colorPop.appendChild(sw);
    });
    document.body.appendChild(colorPop);
    const r = anchor.getBoundingClientRect();
    colorPop.style.left = Math.min(r.left, window.innerWidth - 150) + "px";
    colorPop.style.top = (r.bottom + 8) + "px";
    setTimeout(() => document.addEventListener("mousedown", outside), 0);
    function outside(ev) {
      if (colorPop && !colorPop.contains(ev.target)) { closeColorPop(); document.removeEventListener("mousedown", outside); }
    }
  }

  // ───── Add stage ─────
  function addStage() {
    const idx = state.nodes.length % PALETTE.length;
    const p = PALETTE[idx];
    // place near center of current view
    const r = canvas.getBoundingClientRect();
    const cx = (r.width / 2 - view.x) / view.scale - NODE_W / 2;
    const cy = (r.height / 2 - view.y) / view.scale - 60;
    const n = {
      id: uid("n"), x: cx, y: cy,
      title: p.name, desc: "Describe what happens at this stage.",
      color: p.color, icon: ICONS[idx % ICONS.length], chips: [],
    };
    state.nodes.push(n);
    renderAll();
    selectNode(n.id);
  }

  // ───── Pan & Zoom ─────
  canvas.addEventListener("mousedown", ev => {
    if (ev.target.closest(".node") || ev.target.closest(".edge-label") || ev.target.closest(".edge-hit")) return;
    clearSelection();
    renderEdges();
    canvas.classList.add("panning");
    const start = { mx: ev.clientX, my: ev.clientY, vx: view.x, vy: view.y };
    function move(e) {
      view.x = start.vx + (e.clientX - start.mx);
      view.y = start.vy + (e.clientY - start.my);
      applyView();
      // labels are positioned in screen space → update
      positionLabels();
    }
    function up() {
      canvas.classList.remove("panning");
      document.removeEventListener("mousemove", move);
      document.removeEventListener("mouseup", up);
    }
    document.addEventListener("mousemove", move);
    document.addEventListener("mouseup", up);
  });

  function positionLabels() {
    const labels = document.querySelectorAll(".edge-label");
    let i = 0;
    state.edges.forEach(e => {
      const a = nodeById(e.from), b = nodeById(e.to);
      if (!a || !b) return;
      const p1 = portPos(a, "out"), p2 = portPos(b, "in");
      const mx = (p1.x + p2.x) / 2, my = (p1.y + p2.y) / 2;
      const lbl = labels[i++];
      if (lbl) {
        lbl.style.left = (view.x + mx * view.scale) + "px";
        lbl.style.top = (view.y + my * view.scale) + "px";
      }
    });
  }

  canvas.addEventListener("wheel", ev => {
    ev.preventDefault();
    const r = canvas.getBoundingClientRect();
    const mx = ev.clientX - r.left, my = ev.clientY - r.top;
    const factor = ev.deltaY < 0 ? 1.12 : 1 / 1.12;
    zoomAt(mx, my, factor);
  }, { passive: false });

  function zoomAt(px, py, factor) {
    const newScale = Math.min(2.2, Math.max(0.3, view.scale * factor));
    const realFactor = newScale / view.scale;
    view.x = px - (px - view.x) * realFactor;
    view.y = py - (py - view.y) * realFactor;
    view.scale = newScale;
    applyView();
    positionLabels();
  }
  function zoomCenter(factor) {
    const r = canvas.getBoundingClientRect();
    zoomAt(r.width / 2, r.height / 2, factor);
  }

  function fitToScreen() {
    if (!state.nodes.length) return;
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    state.nodes.forEach(n => {
      const h = nodeHeight(n);
      minX = Math.min(minX, n.x); minY = Math.min(minY, n.y);
      maxX = Math.max(maxX, n.x + NODE_W); maxY = Math.max(maxY, n.y + h);
    });
    const pad = 80;
    const r = canvas.getBoundingClientRect();
    const w = maxX - minX + pad * 2, h = maxY - minY + pad * 2;
    const scale = Math.min(2, Math.min(r.width / w, r.height / h));
    view.scale = Math.max(0.3, scale);
    view.x = (r.width - (maxX + minX) * view.scale) / 2;
    view.y = (r.height - (maxY + minY) * view.scale) / 2;
    applyView();
    positionLabels();
  }

  // ───── Export ─────
  function exportJSON() {
    const data = { exportedAt: new Date().toISOString(), nodes: state.nodes, edges: state.edges };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "customer-journey.json";
    a.click();
    URL.revokeObjectURL(url);
  }

  // ───── Keyboard ─────
  document.addEventListener("keydown", ev => {
    if (document.activeElement && document.activeElement.isContentEditable) return;
    if (ev.key === "Delete" || ev.key === "Backspace") {
      if (selected.type === "node") { ev.preventDefault(); deleteNode(selected.id); }
      else if (selected.type === "edge") { ev.preventDefault(); state.edges = state.edges.filter(e => e.id !== selected.id); clearSelection(); renderAll(); }
    }
    if (ev.key === "Escape") clearSelection();
    if ((ev.key === "n" || ev.key === "N") && !ev.metaKey && !ev.ctrlKey) addStage();
  });

  // ───── Buttons ─────
  document.getElementById("btnAdd").addEventListener("click", addStage);
  document.getElementById("btnFit").addEventListener("click", fitToScreen);
  document.getElementById("btnExport").addEventListener("click", exportJSON);
  document.getElementById("zoomIn").addEventListener("click", () => zoomCenter(1.15));
  document.getElementById("zoomOut").addEventListener("click", () => zoomCenter(1 / 1.15));
  document.getElementById("btnReset").addEventListener("click", () => {
    if (confirm("Reset the diagram to the default template? Your current changes will be lost.")) {
      state = clone(TEMPLATE);
      idSeq = computeSeq();
      markersDone.clear();
      clearSelection();
      renderAll();
      setTimeout(fitToScreen, 30);
    }
  });

  // ───── Init ─────
  renderAll();
  // run fit after layout settles so heights are measured
  requestAnimationFrame(() => { renderEdges(); setTimeout(fitToScreen, 20); });
  window.addEventListener("resize", positionLabels);
})();
</script>
</body>
</html>
