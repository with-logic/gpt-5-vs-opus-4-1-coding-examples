<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Weather Theatre</title>
<style>
  :root {
    --bg: #0a0710;
    --panel: rgba(20, 14, 30, 0.72);
    --gold: #e8c87a;
    --gold-soft: #c9a85a;
    --ink: #f3ecdd;
    --ink-dim: #b9ad97;
    --rail: rgba(232, 200, 122, 0.22);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: "Cormorant Garamond", "Hoefler Text", Georgia, serif;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  #root { height: 100vh; width: 100vw; }

  .theatre {
    position: relative;
    height: 100vh;
    width: 100vw;
    display: grid;
    grid-template-rows: 1fr auto;
    overflow: hidden;
  }

  .stage-wrap {
    position: relative;
    overflow: hidden;
    background: #000;
  }
  canvas.stage {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  /* Proscenium arch frame */
  .proscenium {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 30;
    box-shadow:
      inset 0 0 120px 30px rgba(0,0,0,0.75),
      inset 0 0 30px 4px rgba(0,0,0,0.6);
  }
  .arch-top {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 64px;
    background:
      radial-gradient(120% 140% at 50% -40%, rgba(232,200,122,0.18), transparent 60%),
      linear-gradient(180deg, #1c1220 0%, #120b18 70%, transparent 100%);
    border-bottom: 1px solid rgba(232,200,122,0.12);
    z-index: 31;
  }
  .arch-top::after {
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: -1px; height: 18px;
    background: repeating-linear-gradient(90deg,
      rgba(232,200,122,0.0) 0px,
      rgba(232,200,122,0.10) 18px,
      rgba(0,0,0,0.18) 36px);
    -webkit-mask: radial-gradient(14px 18px at 18px 0, #000 70%, transparent 72%) repeat-x;
    mask: radial-gradient(14px 18px at 18px 0, #000 70%, transparent 72%) repeat-x;
    -webkit-mask-size: 36px 18px;
    mask-size: 36px 18px;
  }
  .side-pillar {
    position: absolute;
    top: 0; bottom: 0; width: 46px;
    background: linear-gradient(90deg, #160d1e 0%, rgba(22,13,30,0.0) 100%);
    z-index: 31;
  }
  .side-pillar.right { right: 0; transform: scaleX(-1); }
  .side-pillar.left { left: 0; }

  /* Curtains */
  .curtain {
    position: absolute;
    top: 0; bottom: 0;
    width: 52%;
    z-index: 40;
    pointer-events: none;
    transition: transform 2.1s cubic-bezier(.7,.02,.27,1);
    background:
      linear-gradient(90deg,
        #4a0d18 0%, #6e1322 8%, #8a1a2c 14%, #5e1020 22%,
        #7d1727 30%, #58101e 38%, #84182a 46%, #5a1020 54%,
        #7a1626 62%, #530f1d 70%, #80172a 78%, #5c1120 86%, #4a0d18 100%);
    box-shadow: inset -40px 0 80px rgba(0,0,0,0.6), 0 0 60px rgba(0,0,0,0.5);
  }
  .curtain::after {
    content: "";
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(255,210,160,0.10), transparent 14%);
  }
  .curtain.left { left: 0; transform-origin: left center; }
  .curtain.right { right: 0; transform-origin: right center;
    background:
      linear-gradient(270deg,
        #4a0d18 0%, #6e1322 8%, #8a1a2c 14%, #5e1020 22%,
        #7d1727 30%, #58101e 38%, #84182a 46%, #5a1020 54%,
        #7a1626 62%, #530f1d 70%, #80172a 78%, #5c1120 86%, #4a0d18 100%);
  }
  .curtain .scallop {
    position: absolute; left: 0; right: 0; bottom: -2px; height: 40px;
    background: inherit;
    -webkit-mask: radial-gradient(28px 40px at 28px 0, transparent 70%, #000 72%) repeat-x;
    mask: radial-gradient(28px 40px at 28px 0, transparent 70%, #000 72%) repeat-x;
    -webkit-mask-size: 56px 40px;
    mask-size: 56px 40px;
  }
  .theatre.open .curtain.left { transform: translateX(-101%); }
  .theatre.open .curtain.right { transform: translateX(101%); }
  .curtain-tie {
    position: absolute; top: 0; bottom: 0; width: 8px;
    background: linear-gradient(180deg, rgba(0,0,0,0.0), rgba(0,0,0,0.35));
    opacity: 0.5;
  }

  /* Valance (top curtain border) */
  .valance {
    position: absolute; top: 0; left: 0; right: 0; height: 78px;
    z-index: 41; pointer-events: none;
    background: linear-gradient(180deg, #5d0f1d, #7c1626 60%, #4a0c18);
    box-shadow: 0 8px 24px rgba(0,0,0,0.6), inset 0 -4px 10px rgba(0,0,0,0.4);
    transition: transform 1.4s ease;
  }
  .valance::after {
    content: ""; position: absolute; left: 0; right: 0; bottom: -22px; height: 26px;
    background: linear-gradient(180deg, #7c1626, #4a0c18);
    -webkit-mask: radial-gradient(34px 26px at 34px 0, #000 72%, transparent 74%) repeat-x;
    mask: radial-gradient(34px 26px at 34px 0, #000 72%, transparent 74%) repeat-x;
    -webkit-mask-size: 68px 26px;
    mask-size: 68px 26px;
  }
  .valance .gold-trim {
    position: absolute; left: 0; right: 0; bottom: -34px; height: 12px;
    background: repeating-linear-gradient(90deg, var(--gold-soft) 0 10px, #8a6f2e 10px 20px);
    opacity: 0.85;
    -webkit-mask: radial-gradient(34px 26px at 34px 0, #000 72%, transparent 74%) repeat-x;
    mask: radial-gradient(34px 26px at 34px 0, #000 72%, transparent 74%) repeat-x;
    -webkit-mask-size: 68px 26px;
    mask-size: 68px 26px;
  }

  /* Subtitle */
  .subtitle-bar {
    position: absolute;
    left: 0; right: 0; bottom: 26px;
    display: flex; justify-content: center;
    z-index: 35;
    pointer-events: none;
    padding: 0 12%;
  }
  .subtitle {
    max-width: 760px;
    text-align: center;
    font-size: clamp(18px, 2.4vw, 30px);
    letter-spacing: 0.3px;
    line-height: 1.35;
    color: var(--ink);
    text-shadow: 0 2px 14px rgba(0,0,0,0.9), 0 0 30px rgba(0,0,0,0.7);
    font-style: italic;
    min-height: 2.6em;
  }
  .subtitle .caret {
    display: inline-block;
    width: 2px; height: 1em;
    margin-left: 2px;
    background: var(--gold);
    transform: translateY(3px);
    animation: blink 1s steps(1) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* Title plate */
  .marquee {
    position: absolute; top: 16px; left: 0; right: 0;
    z-index: 36; text-align: center; pointer-events: none;
  }
  .marquee h1 {
    margin: 0; font-size: clamp(20px, 3vw, 34px);
    letter-spacing: 0.42em;
    text-transform: uppercase;
    font-weight: 600;
    color: var(--gold);
    text-shadow: 0 0 18px rgba(232,200,122,0.45), 0 2px 4px rgba(0,0,0,0.8);
  }
  .marquee .scene-name {
    font-size: clamp(11px, 1.2vw, 14px);
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: var(--ink-dim);
    margin-top: 6px;
  }

  /* Control panel */
  .console {
    position: relative;
    z-index: 50;
    background:
      linear-gradient(180deg, rgba(28,18,38,0.96), rgba(12,8,18,0.99));
    border-top: 1px solid rgba(232,200,122,0.18);
    padding: 16px 26px 20px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 18px 34px;
    align-items: center;
    box-shadow: 0 -20px 40px rgba(0,0,0,0.6);
  }
  .sliders {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 22px;
  }
  .slider-block { display: flex; flex-direction: column; gap: 8px; }
  .slider-head {
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .slider-head .label {
    font-size: 14px; letter-spacing: 0.28em; text-transform: uppercase;
    color: var(--ink); font-weight: 600;
  }
  .slider-head .val {
    font-size: 12px; color: var(--gold); letter-spacing: 0.15em;
    font-variant-numeric: tabular-nums;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
  }
  .mood-cosy .accent { color: #f0a868; }
  .mood-eerie .accent { color: #7fd6c2; }
  .mood-heroic .accent { color: #ffd45e; }

  input[type=range] {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 6px; border-radius: 6px;
    background: linear-gradient(90deg, var(--track-fill, var(--gold)) var(--pct,50%), rgba(255,255,255,0.10) var(--pct,50%));
    outline: none; cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 18px; height: 18px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #fff7e6, var(--thumb,#e8c87a));
    border: 1px solid rgba(0,0,0,0.4);
    box-shadow: 0 0 10px var(--thumb-glow, rgba(232,200,122,0.6)), 0 2px 4px rgba(0,0,0,0.5);
    cursor: pointer;
    transition: transform .1s;
  }
  input[type=range]::-webkit-slider-thumb:active { transform: scale(1.18); }
  input[type=range]::-moz-range-thumb {
    width: 18px; height: 18px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.4);
    background: radial-gradient(circle at 35% 30%, #fff7e6, var(--thumb,#e8c87a));
    box-shadow: 0 0 10px var(--thumb-glow, rgba(232,200,122,0.6));
    cursor: pointer;
  }

  .right-controls {
    display: flex; flex-direction: column; gap: 14px; align-items: flex-end;
    min-width: 230px;
  }
  .forecast {
    display: flex; gap: 12px; align-items: center;
  }
  .fc-chip {
    text-align: center; padding: 6px 12px; border-radius: 10px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(232,200,122,0.14);
    min-width: 66px;
  }
  .fc-chip .t { font-size: 20px; color: var(--gold); font-weight: 600; line-height: 1; }
  .fc-chip .l {
    font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--ink-dim); margin-top: 4px;
  }
  .fc-chip .ico { font-size: 18px; line-height: 1; margin-bottom: 4px; }

  .toggle-row { display: flex; gap: 10px; align-items: center; }
  .daynight {
    position: relative; display: inline-flex; cursor: pointer;
    border: 1px solid rgba(232,200,122,0.3);
    border-radius: 999px; overflow: hidden;
    background: rgba(0,0,0,0.35);
    font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
  }
  .daynight button {
    background: transparent; border: none; color: var(--ink-dim);
    padding: 7px 16px; cursor: pointer; font: inherit; letter-spacing: inherit;
    transition: color .3s;
  }
  .daynight button.active { color: #1a1208; }
  .daynight .knob {
    position: absolute; top: 2px; bottom: 2px; left: 2px; width: calc(50% - 2px);
    border-radius: 999px;
    background: linear-gradient(180deg, var(--gold), var(--gold-soft));
    transition: transform .4s cubic-bezier(.6,.1,.2,1);
    z-index: 0;
  }
  .daynight.night .knob { transform: translateX(100%); }
  .daynight button { position: relative; z-index: 1; }

  .replay {
    background: transparent;
    border: 1px solid rgba(232,200,122,0.3);
    color: var(--gold); font: inherit;
    letter-spacing: 0.18em; text-transform: uppercase; font-size: 11px;
    padding: 7px 16px; border-radius: 999px; cursor: pointer;
    transition: background .25s, color .25s;
  }
  .replay:hover { background: rgba(232,200,122,0.14); }

  .preset-row { display: flex; gap: 8px; }
  .preset {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(232,200,122,0.14);
    color: var(--ink-dim); font: inherit; font-size: 10px;
    letter-spacing: 0.16em; text-transform: uppercase;
    padding: 5px 11px; border-radius: 8px; cursor: pointer;
    transition: all .2s;
  }
  .preset:hover { color: var(--gold); border-color: rgba(232,200,122,0.4); }

  @media (max-width: 880px) {
    .console { grid-template-columns: 1fr; }
    .right-controls { align-items: stretch; min-width: 0; }
    .forecast { justify-content: center; flex-wrap: wrap; }
    .sliders { grid-template-columns: 1fr; gap: 14px; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js" integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z" crossorigin="anonymous"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" integrity="sha384-gTGxhz21lVGYNMcdJOyq01Edg0jhn/c22nsx0kyqP0TxaV5WVdsSH1fSDUf5YJj1" crossorigin="anonymous"></script>

<script>
const { useState, useEffect, useRef, useMemo, useCallback } = React;
const h = React.createElement;

/* ------------------------------------------------------------------ */
/*  Mock forecast — the same data, remixed by mood                     */
/* ------------------------------------------------------------------ */
const FORECAST = {
  tempC: 14,
  windKph: 22,
  humidity: 68,
  cloud: 0.55,        // 0..1
  precip: 0.30,       // 0..1 chance
  condition: "Broken cloud, freshening breeze",
};

/* ------------------------------------------------------------------ */
/*  Scene description writer — produces typewriter subtitle text       */
/* ------------------------------------------------------------------ */
function describeScene(moods, isNight) {
  const { cosy, eerie, heroic } = moods;
  const dominant = ["cosy", "eerie", "heroic"].reduce((a, b) =>
    moods[b] > moods[a] ? b : a, "cosy");
  const t = FORECAST.tempC;
  const tod = isNight ? "night" : "afternoon";

  const lines = {
    cosy: [
      `A hush of ${t}° settles over the valley; lamplight pools on wet cobbles this ${tod}.`,
      `Woodsmoke drifts low and golden — the storm stays politely beyond the hills.`,
      `Soft rain taps the panes like distant applause; nothing here means you harm.`,
    ],
    eerie: [
      `The fog comes in on cat's feet, swallowing the lamps one by one.`,
      `Something stirs beyond the treeline; the ${t}° air holds its breath.`,
      `Pale mist coils where the road should be — and the wind whispers your name.`,
    ],
    heroic: [
      `Storm-light splits the heavens — the wind rises to ${FORECAST.windKph} and the world holds its breath.`,
      `Banners of cloud unfurl over the ridge; this is the hour of bright resolve.`,
      `Lightning crowns the peaks — stand fast, for the tempest answers only to the brave.`,
    ],
  };
  // pick a line index influenced by intensity
  const pool = lines[dominant];
  const idx = Math.min(pool.length - 1, Math.floor(moods[dominant] * pool.length));
  return pool[idx];
}

function sceneName(moods) {
  const dominant = ["cosy", "eerie", "heroic"].reduce((a, b) =>
    moods[b] > moods[a] ? b : a, "cosy");
  const names = {
    cosy: "Act I — The Lantern Hour",
    eerie: "Act II — The Veiled Moor",
    heroic: "Act III — The Tempest's Crown",
  };
  return names[dominant];
}

/* ------------------------------------------------------------------ */
/*  Color palette interpolation per mood                               */
/* ------------------------------------------------------------------ */
function lerp(a, b, t) { return a + (b - a) * t; }
function mix(c1, c2, t) {
  return [lerp(c1[0], c2[0], t), lerp(c1[1], c2[1], t), lerp(c1[2], c2[2], t)];
}
function rgba(c, a) { return `rgba(${c[0]|0},${c[1]|0},${c[2]|0},${a})`; }

// Each mood contributes a sky gradient (top/bottom), accent, fog tint.
const PALETTES = {
  day: {
    cosy:   { skyTop:[244,196,142], skyBot:[250,228,196], hill:[120,96,68], accent:[240,168,104], fog:[255,228,190] },
    eerie:  { skyTop:[150,168,170], skyBot:[206,214,206], hill:[78,92,92],  accent:[127,214,194], fog:[210,224,220] },
    heroic: { skyTop:[110,142,184], skyBot:[214,206,176], hill:[64,74,98],  accent:[255,212,94],  fog:[224,222,214] },
  },
  night: {
    cosy:   { skyTop:[40,26,46],  skyBot:[86,52,52],   hill:[30,20,28], accent:[240,168,104], fog:[120,80,70] },
    eerie:  { skyTop:[16,28,34],  skyBot:[30,52,54],   hill:[12,22,26], accent:[127,214,194], fog:[70,110,108] },
    heroic: { skyTop:[20,26,52],  skyBot:[44,42,78],   hill:[16,20,40], accent:[255,212,94],  fog:[80,86,128] },
  },
};

function blendPalette(moods, isNight) {
  const set = PALETTES[isNight ? "night" : "day"];
  const wSum = moods.cosy + moods.eerie + moods.heroic + 0.0001;
  const w = { cosy: moods.cosy / wSum, eerie: moods.eerie / wSum, heroic: moods.heroic / wSum };
  const keys = ["skyTop", "skyBot", "hill", "accent", "fog"];
  const out = {};
  keys.forEach(k => {
    out[k] = [0,0,0];
    ["cosy","eerie","heroic"].forEach(m => {
      out[k][0] += set[m][k][0] * w[m];
      out[k][1] += set[m][k][1] * w[m];
      out[k][2] += set[m][k][2] * w[m];
    });
  });
  return out;
}

/* ------------------------------------------------------------------ */
/*  Canvas Stage — parallax backdrops + spotlight + weather            */
/* ------------------------------------------------------------------ */
function Stage({ moods, isNight }) {
  const canvasRef = useRef(null);
  const stateRef = useRef({ moods, isNight });
  const animRef = useRef(null);
  const dropsRef = useRef([]);
  const starsRef = useRef([]);
  const birdsRef = useRef([]);
  const boltRef = useRef({ t: -1, path: [], next: 2 });
  const pointerRef = useRef({ x: 0.5, y: 0.4, tx: 0.5, ty: 0.4 });

  useEffect(() => { stateRef.current = { moods, isNight }; }, [moods, isNight]);

  // seed stars + birds once
  useEffect(() => {
    starsRef.current = Array.from({ length: 90 }, (_, i) => ({
      x: Math.random(), y: Math.random() * 0.55,
      r: Math.random() * 1.4 + 0.3, tw: Math.random() * Math.PI * 2,
      sp: Math.random() * 0.5 + 0.2,
    }));
    birdsRef.current = Array.from({ length: 7 }, () => ({
      x: Math.random(), y: 0.18 + Math.random() * 0.22,
      sp: 0.012 + Math.random() * 0.02, flap: Math.random() * Math.PI * 2,
      scale: 0.6 + Math.random() * 0.7,
    }));
  }, []);

  const onPointer = useCallback((e) => {
    const c = canvasRef.current; if (!c) return;
    const r = c.getBoundingClientRect();
    const cx = (e.touches ? e.touches[0].clientX : e.clientX);
    const cy = (e.touches ? e.touches[0].clientY : e.clientY);
    pointerRef.current.tx = Math.max(0, Math.min(1, (cx - r.left) / r.width));
    pointerRef.current.ty = Math.max(0, Math.min(1, (cy - r.top) / r.height));
  }, []);

  useEffect(() => {
    const canvas = canvasRef.current;
    const ctx = canvas.getContext("2d");
    let W = 0, Hh = 0, DPR = Math.min(window.devicePixelRatio || 1, 2);

    function resize() {
      const r = canvas.getBoundingClientRect();
      W = r.width; Hh = r.height;
      canvas.width = W * DPR; canvas.height = Hh * DPR;
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    }
    resize();
    const ro = new ResizeObserver(resize);
    ro.observe(canvas);

    let last = performance.now();
    let time = 0;

    // smoothed mood values for buttery transitions
    let sm = { cosy: moods.cosy, eerie: moods.eerie, heroic: moods.heroic };
    let smNight = isNight ? 1 : 0;

    // layered mountain ridge generator (deterministic per seed)
    function ridge(seed, amp, baseY, jag) {
      const pts = [];
      let r = seed;
      const rand = () => { r = (r * 9301 + 49297) % 233280; return r / 233280; };
      const steps = 14;
      for (let i = 0; i <= steps; i++) {
        const x = i / steps;
        const yy = baseY + (rand() - 0.5) * amp + Math.sin(x * jag + seed) * amp * 0.3;
        pts.push([x, yy]);
      }
      return pts;
    }
    const ridgeFar = ridge(7, 0.10, 0.62, 5);
    const ridgeMid = ridge(31, 0.16, 0.74, 7);
    const ridgeNear = ridge(53, 0.22, 0.88, 9);

    function drawRidge(pts, color, offset, scaleY) {
      ctx.beginPath();
      ctx.moveTo(-40, Hh + 40);
      pts.forEach((p, i) => {
        const x = p[0] * (W + 80) - 40 + offset;
        const y = p[1] * Hh;
        if (i === 0) ctx.lineTo(x, y);
        else {
          const prev = pts[i - 1];
          const px = prev[0] * (W + 80) - 40 + offset;
          const py = prev[1] * Hh;
          const cx = (px + x) / 2;
          ctx.quadraticCurveTo(px, py, cx, (py + y) / 2);
        }
      });
      ctx.lineTo(W + 40, Hh + 40);
      ctx.closePath();
      ctx.fillStyle = color;
      ctx.fill();
    }

    function frame(now) {
      const dt = Math.min(0.05, (now - last) / 1000);
      last = now; time += dt;
      const st = stateRef.current;

      // smooth toward targets
      const k = 1 - Math.pow(0.0001, dt);
      sm.cosy   += (st.moods.cosy   - sm.cosy)   * k;
      sm.eerie  += (st.moods.eerie  - sm.eerie)  * k;
      sm.heroic += (st.moods.heroic - sm.heroic) * k;
      smNight   += ((st.isNight ? 1 : 0) - smNight) * (1 - Math.pow(0.0005, dt));

      const p = pointerRef.current;
      p.x += (p.tx - p.x) * Math.min(1, dt * 4);
      p.y += (p.ty - p.y) * Math.min(1, dt * 4);
      const par = (p.x - 0.5); // parallax driver -1..1

      // palette blend (manual night lerp for smoothness)
      const dayPal = blendPalette(sm, false);
      const nightPal = blendPalette(sm, true);
      const pal = {};
      ["skyTop","skyBot","hill","accent","fog"].forEach(key => {
        pal[key] = mix(dayPal[key], nightPal[key], smNight);
      });

      const intensity = sm.heroic;     // drives wind/lightning
      const spook = sm.eerie;          // drives fog
      const warmth = sm.cosy;          // drives lamps/glow

      ctx.clearRect(0, 0, W, Hh);

      /* ---- Sky gradient ---- */
      const sky = ctx.createLinearGradient(0, 0, 0, Hh);
      sky.addColorStop(0, rgba(pal.skyTop, 1));
      sky.addColorStop(1, rgba(pal.skyBot, 1));
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, W, Hh);

      /* ---- Stars (night) ---- */
      if (smNight > 0.05) {
        starsRef.current.forEach(s => {
          s.tw += dt * s.sp * 4;
          const a = (0.4 + 0.6 * (0.5 + 0.5 * Math.sin(s.tw))) * smNight * (1 - spook * 0.3);
          ctx.beginPath();
          ctx.arc(s.x * W + par * 8 * s.sp, s.y * Hh, s.r, 0, Math.PI * 2);
          ctx.fillStyle = rgba([255, 248, 224], a);
          ctx.fill();
        });
      }

      /* ---- Sun / Moon disc ---- */
      const discX = W * (0.74 - par * 0.04);
      const discY = Hh * (0.22 + Math.sin(time * 0.1) * 0.006);
      const discR = Math.min(W, Hh) * 0.07;
      const isMoon = smNight > 0.5;
      const glow = ctx.createRadialGradient(discX, discY, discR * 0.3, discX, discY, discR * 3.2);
      const discCol = isMoon ? [225, 230, 245] : mix([255, 240, 200], pal.accent, 0.4);
      glow.addColorStop(0, rgba(discCol, 0.55 * (1 - spook * 0.4)));
      glow.addColorStop(1, rgba(discCol, 0));
      ctx.fillStyle = glow;
      ctx.fillRect(0, 0, W, Hh);
      ctx.beginPath();
      ctx.arc(discX, discY, discR, 0, Math.PI * 2);
      ctx.fillStyle = rgba(discCol, 0.92);
      ctx.fill();
      if (isMoon) {
        // craters
        ctx.fillStyle = rgba([190, 196, 214], 0.5);
        [[0.3,-0.2,0.22],[-0.25,0.15,0.3],[0.1,0.35,0.18]].forEach(c=>{
          ctx.beginPath();
          ctx.arc(discX + c[0]*discR, discY + c[1]*discR, discR*c[2], 0, Math.PI*2);
          ctx.fill();
        });
      }

      /* ---- Far ridge (parallax slow) ---- */
      drawRidge(ridgeFar, rgba(mix(pal.hill, pal.skyBot, 0.55), 1), par * 10);
      /* ---- Mid ridge ---- */
      drawRidge(ridgeMid, rgba(mix(pal.hill, pal.skyBot, 0.28), 1), par * 26);

      /* ---- Birds (cosy/day) drifting ---- */
      if (smNight < 0.6) {
        const birdA = (1 - smNight) * (0.4 + warmth * 0.6) * (1 - intensity * 0.5);
        birdsRef.current.forEach(b => {
          b.x += b.sp * dt * (1 + intensity * 2);
          if (b.x > 1.1) { b.x = -0.1; b.y = 0.16 + Math.random() * 0.24; }
          b.flap += dt * 8;
          const bx = b.x * W + par * 18;
          const by = b.y * Hh;
          const w = 9 * b.scale;
          const flp = Math.sin(b.flap) * 0.5;
          ctx.strokeStyle = rgba([40, 36, 44], birdA);
          ctx.lineWidth = 1.4 * b.scale;
          ctx.beginPath();
          ctx.moveTo(bx - w, by + flp * w);
          ctx.quadraticCurveTo(bx, by - flp * w * 0.6, bx, by);
          ctx.quadraticCurveTo(bx, by - flp * w * 0.6, bx + w, by + flp * w);
          ctx.stroke();
        });
      }

      /* ---- Near ridge w/ trees + lamp (parallax fast) ---- */
      drawRidge(ridgeNear, rgba(pal.hill, 1), par * 48);

      /* ---- Cosy lamp posts glow on near ridge ---- */
      if (warmth > 0.08 && smNight > 0.15) {
        const lamps = [0.2, 0.5, 0.82];
        lamps.forEach((lx, i) => {
          const x = lx * W + par * 48;
          const y = Hh * (0.84 + (i % 2) * 0.02);
          const lg = ctx.createRadialGradient(x, y, 2, x, y, 70 + warmth * 40);
          const lampCol = [255, 196, 120];
          lg.addColorStop(0, rgba(lampCol, 0.6 * warmth * smNight));
          lg.addColorStop(1, rgba(lampCol, 0));
          ctx.fillStyle = lg;
          ctx.fillRect(x - 110, y - 110, 220, 220);
          ctx.fillStyle = rgba([255, 214, 150], 0.95 * warmth);
          ctx.beginPath();
          ctx.arc(x, y, 2.4, 0, Math.PI * 2); ctx.fill();
        });
      }

      /* ---- Spotlight sweep (theatrical light beams) ---- */
      const beams = 2;
      for (let bI = 0; bI < beams; bI++) {
        const phase = time * (0.22 + bI * 0.07) + bI * 2.1;
        const sweep = Math.sin(phase) * 0.32;
        const originX = W * (0.32 + bI * 0.36);
        const originY = -20;
        const aimX = originX + sweep * W * 0.6 + (bI === 0 ? p.x - 0.5 : 0) * W * 0.2;
        const spread = W * (0.10 + 0.04 * Math.sin(phase * 1.3));
        const beamCol = mix(pal.accent, [255, 250, 235], 0.4);
        const baseAlpha = (0.05 + warmth * 0.05 + intensity * 0.10) * (0.6 + 0.4 * smNight);
        const g = ctx.createLinearGradient(originX, originY, aimX, Hh * 0.95);
        g.addColorStop(0, rgba(beamCol, baseAlpha * 1.6));
        g.addColorStop(1, rgba(beamCol, 0));
        ctx.beginPath();
        ctx.moveTo(originX - 14, originY);
        ctx.lineTo(originX + 14, originY);
        ctx.lineTo(aimX + spread, Hh * 0.95);
        ctx.lineTo(aimX - spread, Hh * 0.95);
        ctx.closePath();
        ctx.fillStyle = g;
        ctx.globalCompositeOperation = "screen";
        ctx.fill();
        ctx.globalCompositeOperation = "source-over";
        // bright source
        ctx.beginPath();
        ctx.arc(originX, originY + 6, 7, 0, Math.PI * 2);
        ctx.fillStyle = rgba(beamCol, 0.5 + 0.3 * intensity);
        ctx.fill();
      }

      /* ---- Fog banks (eerie) ---- */
      if (spook > 0.04) {
        ctx.globalCompositeOperation = "screen";
        for (let i = 0; i < 3; i++) {
          const yy = Hh * (0.55 + i * 0.13);
          const drift = (time * (8 + i * 5) + i * 200) % (W + 400) - 200;
          const fg = ctx.createRadialGradient(drift + par * 30, yy, 10, drift + par * 30, yy, 260);
          fg.addColorStop(0, rgba(pal.fog, 0.16 * spook));
          fg.addColorStop(1, rgba(pal.fog, 0));
          ctx.fillStyle = fg;
          ctx.fillRect(0, yy - 200, W, 400);
          const fg2 = ctx.createRadialGradient(drift + W*0.5 + par*30, yy + 30, 10, drift + W*0.5 + par*30, yy + 30, 300);
          fg2.addColorStop(0, rgba(pal.fog, 0.13 * spook));
          fg2.addColorStop(1, rgba(pal.fog, 0));
          ctx.fillStyle = fg2;
          ctx.fillRect(0, yy - 200, W, 400);
        }
        ctx.globalCompositeOperation = "source-over";
        // low ground mist
        const gm = ctx.createLinearGradient(0, Hh * 0.75, 0, Hh);
        gm.addColorStop(0, rgba(pal.fog, 0));
        gm.addColorStop(1, rgba(pal.fog, 0.3 * spook));
        ctx.fillStyle = gm;
        ctx.fillRect(0, Hh * 0.7, W, Hh * 0.3);
      }

      /* ---- Rain / weather particles (heroic + base precip) ---- */
      const rainCount = Math.floor(FORECAST.precip * 60 + intensity * 240);
      const drops = dropsRef.current;
      while (drops.length < rainCount) {
        drops.push({ x: Math.random() * W, y: Math.random() * Hh,
          len: 8 + Math.random() * 14, sp: 1 });
      }
      while (drops.length > rainCount) drops.pop();
      const windAng = 0.12 + intensity * 0.5;
      const rainSpeed = 600 + intensity * 1000;
      if (drops.length) {
        ctx.strokeStyle = rgba(mix([200,214,230], pal.accent, 0.15), 0.35 + intensity * 0.25);
        ctx.lineWidth = 1;
        ctx.beginPath();
        drops.forEach(d => {
          d.y += rainSpeed * dt;
          d.x += rainSpeed * dt * windAng;
          if (d.y > Hh) { d.y = -20; d.x = Math.random() * W * 1.3 - W * 0.15; }
          ctx.moveTo(d.x, d.y);
          ctx.lineTo(d.x - d.len * windAng, d.y - d.len);
        });
        ctx.stroke();
      }

      /* ---- Lightning (heroic) ---- */
      const bolt = boltRef.current;
      bolt.next -= dt;
      if (bolt.next <= 0 && intensity > 0.45) {
        bolt.t = 1;
        bolt.next = 1.2 + Math.random() * 3.5 * (1.2 - intensity);
        // build jagged path
        const sx = W * (0.2 + Math.random() * 0.6);
        let y = 0, x = sx;
        bolt.path = [[x, y]];
        while (y < Hh * 0.7) {
          y += Hh * (0.05 + Math.random() * 0.06);
          x += (Math.random() - 0.5) * W * 0.12;
          bolt.path.push([x, y]);
        }
      }
      if (bolt.t > 0) {
        bolt.t -= dt * 3.2;
        const a = Math.max(0, bolt.t);
        // flash
        ctx.fillStyle = rgba([220, 226, 255], a * 0.22 * intensity);
        ctx.fillRect(0, 0, W, Hh);
        // bolt
        ctx.strokeStyle = rgba([240, 244, 255], a);
        ctx.lineWidth = 2.2;
        ctx.shadowColor = rgba([180, 200, 255], a);
        ctx.shadowBlur = 18;
        ctx.beginPath();
        bolt.path.forEach((pt, i) => i ? ctx.lineTo(pt[0], pt[1]) : ctx.moveTo(pt[0], pt[1]));
        ctx.stroke();
        ctx.shadowBlur = 0;
      }

      /* ---- Heroic banner / atmospheric god-rays ---- */
      if (intensity > 0.2) {
        ctx.globalCompositeOperation = "screen";
        const rays = 4;
        for (let i = 0; i < rays; i++) {
          const rx = discX + (i - rays/2) * 40;
          const g = ctx.createLinearGradient(discX, discY, rx, Hh);
          g.addColorStop(0, rgba(mix(pal.accent,[255,255,240],0.5), 0.05 * intensity));
          g.addColorStop(1, rgba(pal.accent, 0));
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.moveTo(discX, discY);
          ctx.lineTo(rx - 30, Hh);
          ctx.lineTo(rx + 30, Hh);
          ctx.closePath();
          ctx.fill();
        }
        ctx.globalCompositeOperation = "source-over";
      }

      /* ---- Floating warm motes (cosy) ---- */
      if (warmth > 0.15) {
        ctx.globalCompositeOperation = "screen";
        for (let i = 0; i < 24; i++) {
          const mx = ((i * 137.5 + time * (6 + i % 5)) % (W + 40)) - 20;
          const my = Hh * (0.4 + 0.5 * (0.5 + 0.5 * Math.sin(time * 0.4 + i)));
          const mr = 1 + (i % 3);
          ctx.beginPath();
          ctx.arc(mx + par * 14, my, mr, 0, Math.PI * 2);
          ctx.fillStyle = rgba([255, 200, 140], 0.08 * warmth);
          ctx.fill();
        }
        ctx.globalCompositeOperation = "source-over";
      }

      /* ---- Vignette / floor reflection ---- */
      const vg = ctx.createRadialGradient(W/2, Hh*0.5, Hh*0.2, W/2, Hh*0.5, Hh*0.85);
      vg.addColorStop(0, "rgba(0,0,0,0)");
      vg.addColorStop(1, "rgba(0,0,0,0.45)");
      ctx.fillStyle = vg;
      ctx.fillRect(0, 0, W, Hh);

      animRef.current = requestAnimationFrame(frame);
    }
    animRef.current = requestAnimationFrame(frame);

    return () => {
      cancelAnimationFrame(animRef.current);
      ro.disconnect();
    };
  }, []);

  return h("canvas", {
    className: "stage",
    ref: canvasRef,
    onMouseMove: onPointer,
    onTouchMove: onPointer,
  });
}

/* ------------------------------------------------------------------ */
/*  Typewriter subtitle                                                */
/* ------------------------------------------------------------------ */
function Typewriter({ text }) {
  const [shown, setShown] = useState("");
  // refs hold the live animation state so the rAF loop never reads stale values
  const shownRef = useRef("");
  const targetRef = useRef(text);
  const erasingRef = useRef(false);

  // keep the target in sync without restarting the loop
  useEffect(() => { targetRef.current = text; }, [text]);

  useEffect(() => {
    let raf, lastChar = performance.now();
    function tick(now) {
      const target = targetRef.current;
      const cur = shownRef.current;
      const erasing = !target.startsWith(cur) && cur.length > 0;
      if (now - lastChar > (erasing ? 14 : 30)) {
        lastChar = now;
        if (erasing) {
          erasingRef.current = true;
          shownRef.current = cur.slice(0, -1);
          setShown(shownRef.current);
        } else if (cur.length < target.length) {
          erasingRef.current = false;
          shownRef.current = target.slice(0, cur.length + 1);
          setShown(shownRef.current);
        }
      }
      raf = requestAnimationFrame(tick);
    }
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, []);

  return h("div", { className: "subtitle" },
    shown,
    h("span", { className: "caret" })
  );
}

/* ------------------------------------------------------------------ */
/*  Slider control                                                     */
/* ------------------------------------------------------------------ */
const SLIDER_META = {
  cosy:   { label: "Cosy",   thumb: "#f0a868", glow: "rgba(240,168,104,.7)", fill: "#f0a868", icon: "\u{1F56F}️" },
  eerie:  { label: "Eerie",  thumb: "#7fd6c2", glow: "rgba(127,214,194,.7)", fill: "#7fd6c2", icon: "\u{1F319}" },
  heroic: { label: "Heroic", thumb: "#ffd45e", glow: "rgba(255,212,94,.7)",  fill: "#ffd45e", icon: "⚡" },
};

function Slider({ id, value, onChange }) {
  const m = SLIDER_META[id];
  const pct = Math.round(value * 100);
  return h("div", { className: `slider-block mood-${id}` },
    h("div", { className: "slider-head" },
      h("span", { className: "label" }, m.icon + "  " + m.label),
      h("span", { className: "val" }, pct + "%")
    ),
    h("input", {
      type: "range", min: 0, max: 100, value: pct,
      onChange: (e) => onChange(id, +e.target.value / 100),
      style: {
        "--pct": pct + "%",
        "--thumb": m.thumb,
        "--thumb-glow": m.glow,
        "--track-fill": m.fill,
      },
    })
  );
}

/* ------------------------------------------------------------------ */
/*  Forecast chips                                                     */
/* ------------------------------------------------------------------ */
function ForecastStrip({ isNight }) {
  const chips = [
    { ico: "\u{1F321}️", t: FORECAST.tempC + "°", l: "Temp" },
    { ico: "\u{1F4A8}", t: FORECAST.windKph, l: "km/h" },
    { ico: "\u{1F4A7}", t: Math.round(FORECAST.precip * 100) + "%", l: "Rain" },
    { ico: isNight ? "\u{1F319}" : "⛅", t: Math.round(FORECAST.cloud * 100) + "%", l: "Cloud" },
  ];
  return h("div", { className: "forecast" },
    chips.map((c, i) => h("div", { className: "fc-chip", key: i },
      h("div", { className: "ico" }, c.ico),
      h("div", { className: "t" }, c.t),
      h("div", { className: "l" }, c.l)
    ))
  );
}

/* ------------------------------------------------------------------ */
/*  Presets                                                            */
/* ------------------------------------------------------------------ */
const PRESETS = {
  "Hearth":   { cosy: 0.85, eerie: 0.10, heroic: 0.05 },
  "Haunting": { cosy: 0.10, eerie: 0.90, heroic: 0.15 },
  "Valiant":  { cosy: 0.05, eerie: 0.20, heroic: 0.92 },
  "Twilight": { cosy: 0.45, eerie: 0.50, heroic: 0.30 },
};

/* ------------------------------------------------------------------ */
/*  Root App                                                           */
/* ------------------------------------------------------------------ */
function App() {
  const [moods, setMoods] = useState({ cosy: 0.7, eerie: 0.2, heroic: 0.25 });
  const [isNight, setIsNight] = useState(true);
  const [open, setOpen] = useState(false);

  // curtain reveal on mount
  useEffect(() => {
    const t = setTimeout(() => setOpen(true), 700);
    return () => clearTimeout(t);
  }, []);

  const setMood = useCallback((id, v) => {
    setMoods(m => ({ ...m, [id]: v }));
  }, []);

  const replay = useCallback(() => {
    setOpen(false);
    setTimeout(() => setOpen(true), 900);
  }, []);

  const applyPreset = useCallback((name) => {
    setMoods({ ...PRESETS[name] });
  }, []);

  const subtitle = useMemo(() => describeScene(moods, isNight), [moods, isNight]);
  const scene = useMemo(() => sceneName(moods), [moods]);

  return h("div", { className: "theatre" + (open ? " open" : "") },
    h("div", { className: "stage-wrap" },
      h(Stage, { moods, isNight }),

      // proscenium framing
      h("div", { className: "proscenium" }),
      h("div", { className: "side-pillar left" }),
      h("div", { className: "side-pillar right" }),
      h("div", { className: "arch-top" }),

      // valance + curtains
      h("div", { className: "valance" },
        h("div", { className: "gold-trim" })
      ),
      h("div", { className: "curtain left" },
        h("div", { className: "scallop" }),
        h("div", { className: "curtain-tie", style: { right: 0 } })
      ),
      h("div", { className: "curtain right" },
        h("div", { className: "scallop" }),
        h("div", { className: "curtain-tie", style: { left: 0 } })
      ),

      // marquee title
      h("div", { className: "marquee" },
        h("h1", null, "Weather Theatre"),
        h("div", { className: "scene-name" }, scene)
      ),

      // subtitle
      h("div", { className: "subtitle-bar" },
        h(Typewriter, { text: subtitle })
      )
    ),

    // console
    h("div", { className: "console" },
      h("div", { className: "sliders" },
        h(Slider, { id: "cosy",   value: moods.cosy,   onChange: setMood }),
        h(Slider, { id: "eerie",  value: moods.eerie,  onChange: setMood }),
        h(Slider, { id: "heroic", value: moods.heroic, onChange: setMood })
      ),
      h("div", { className: "right-controls" },
        h(ForecastStrip, { isNight }),
        h("div", { className: "toggle-row" },
          h("div", { className: "preset-row" },
            Object.keys(PRESETS).map(name =>
              h("button", { key: name, className: "preset", onClick: () => applyPreset(name) }, name)
            )
          )
        ),
        h("div", { className: "toggle-row" },
          h("button", { className: "replay", onClick: replay }, "↻ Replay"),
          h("div", { className: "daynight" + (isNight ? " night" : ""), role: "group" },
            h("div", { className: "knob" }),
            h("button", {
              className: !isNight ? "active" : "",
              onClick: () => setIsNight(false),
            }, "Matinée"),
            h("button", {
              className: isNight ? "active" : "",
              onClick: () => setIsNight(true),
            }, "Night")
          )
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
