<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tea Dunkability Simulator</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.7/babel.min.js"></script>
<style>
  :root {
    --bg-0: #0a0e14;
    --bg-1: #0f1620;
    --bg-2: #141d2b;
    --glass: rgba(28, 39, 56, 0.45);
    --glass-brd: rgba(255, 255, 255, 0.08);
    --glass-hi: rgba(255, 255, 255, 0.04);
    --text-0: #e9eef6;
    --text-1: #9fb0c6;
    --text-2: #647189;
    --tea: #b56a32;
    --tea-lt: #d98a4a;
    --amber: #f4b860;
    --good: #4ade80;
    --warn: #fbbf24;
    --bad: #f87171;
    --accent: #5e9bd6;
    --shadow: 0 18px 50px -12px rgba(0,0,0,0.7);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif;
    background:
      radial-gradient(1200px 700px at 15% -10%, rgba(94,155,214,0.10), transparent 60%),
      radial-gradient(1000px 800px at 100% 10%, rgba(181,106,50,0.12), transparent 55%),
      linear-gradient(160deg, var(--bg-0), var(--bg-1) 60%, #070a0f);
    color: var(--text-0);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  #root { min-height: 100vh; }

  .wrap { max-width: 1180px; margin: 0 auto; padding: 30px 22px 70px; }

  /* Header */
  header.app {
    display: flex; align-items: flex-end; justify-content: space-between;
    gap: 20px; margin-bottom: 26px; flex-wrap: wrap;
  }
  .brand { display: flex; align-items: center; gap: 16px; }
  .brand .cup-ico {
    width: 52px; height: 52px; flex: 0 0 auto;
    filter: drop-shadow(0 4px 10px rgba(0,0,0,0.5));
  }
  .brand h1 {
    font-size: 27px; font-weight: 760; letter-spacing: -0.02em;
    background: linear-gradient(92deg, #fff, var(--amber) 90%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    line-height: 1.05;
  }
  .brand .sub { font-size: 12.5px; color: var(--text-1); margin-top: 3px; letter-spacing: 0.01em; }

  .kbd-hint {
    font-size: 11.5px; color: var(--text-2);
    display: flex; gap: 14px; align-items: center; flex-wrap: wrap;
  }
  kbd {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    background: var(--glass); border: 1px solid var(--glass-brd);
    border-bottom-color: rgba(0,0,0,0.4);
    padding: 2px 7px; border-radius: 6px; font-size: 11px; color: var(--text-0);
    box-shadow: 0 1px 0 rgba(255,255,255,0.05) inset;
  }

  /* Layout */
  .grid {
    display: grid;
    grid-template-columns: 1.15fr 1fr;
    gap: 20px;
    align-items: start;
  }
  @media (max-width: 880px) { .grid { grid-template-columns: 1fr; } }

  .card {
    background: var(--glass);
    backdrop-filter: blur(22px) saturate(140%);
    -webkit-backdrop-filter: blur(22px) saturate(140%);
    border: 1px solid var(--glass-brd);
    border-radius: 20px;
    box-shadow: var(--shadow), 0 1px 0 var(--glass-hi) inset;
    padding: 22px;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: ""; position: absolute; inset: 0; border-radius: 20px;
    background: linear-gradient(180deg, rgba(255,255,255,0.05), transparent 30%);
    pointer-events: none;
  }
  .card h2 {
    font-size: 12px; text-transform: uppercase; letter-spacing: 0.13em;
    color: var(--text-1); font-weight: 700; margin-bottom: 18px;
    display: flex; align-items: center; gap: 8px;
  }
  .card h2 .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 10px var(--accent); }

  /* Stage / canvas */
  .stage-card { padding: 0; }
  .stage {
    position: relative; width: 100%; aspect-ratio: 16/13;
    background:
      radial-gradient(120% 90% at 50% 18%, rgba(94,155,214,0.10), transparent 55%),
      linear-gradient(180deg, #0c121c, #0a0e15);
    border-radius: 20px 20px 0 0;
    overflow: hidden;
  }
  .stage canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
  .verdict-pill {
    position: absolute; top: 16px; left: 16px; z-index: 5;
    display: flex; align-items: center; gap: 9px;
    padding: 8px 14px 8px 11px; border-radius: 999px;
    background: rgba(10,15,22,0.6); border: 1px solid var(--glass-brd);
    backdrop-filter: blur(10px); font-size: 13px; font-weight: 650;
    transition: color .3s, border-color .3s;
  }
  .verdict-pill .swatch { width: 11px; height: 11px; border-radius: 50%; box-shadow: 0 0 12px currentColor; }
  .dunk-readout {
    position: absolute; top: 16px; right: 16px; z-index: 5; text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .dunk-readout .big { font-size: 30px; font-weight: 780; letter-spacing: -0.02em; line-height: 1; }
  .dunk-readout .lbl { font-size: 10.5px; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 4px; }

  .stage-foot {
    display: flex; gap: 10px; padding: 14px 18px; border-top: 1px solid var(--glass-brd);
    background: rgba(8,12,18,0.4); flex-wrap: wrap;
  }
  .btn {
    border: 1px solid var(--glass-brd); background: var(--glass-hi); color: var(--text-0);
    padding: 9px 15px; border-radius: 11px; font-size: 13px; font-weight: 600; cursor: pointer;
    display: inline-flex; align-items: center; gap: 8px; transition: all .16s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:hover { background: rgba(255,255,255,0.09); transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn.primary {
    background: linear-gradient(180deg, var(--tea-lt), var(--tea));
    border-color: rgba(0,0,0,0.2); color: #1a0f06; font-weight: 700;
    box-shadow: 0 8px 22px -8px rgba(217,138,74,0.6);
  }
  .btn.primary:hover { box-shadow: 0 10px 26px -7px rgba(217,138,74,0.75); }
  .btn .k { font-size: 10px; opacity: .65; border:1px solid currentColor; border-radius:4px; padding:0 4px; }

  /* Controls */
  .ctrl { margin-bottom: 21px; }
  .ctrl:last-child { margin-bottom: 4px; }
  .ctrl-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 11px; }
  .ctrl-top .name { font-size: 13.5px; font-weight: 620; color: var(--text-0); display:flex; align-items:center; gap:7px;}
  .ctrl-top .name .em { font-size: 15px; }
  .ctrl-top .val { font-size: 13px; font-weight: 700; color: var(--amber); font-variant-numeric: tabular-nums; }
  .ctrl-top .val small { color: var(--text-2); font-weight: 500; }

  input[type=range] {
    -webkit-appearance: none; appearance: none; width: 100%; height: 6px;
    border-radius: 999px; outline: none; cursor: pointer;
    background: linear-gradient(90deg, var(--fill, var(--accent)) var(--pct,50%), rgba(255,255,255,0.09) var(--pct,50%));
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none; width: 19px; height: 19px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #fff, #d8e2ee 60%);
    border: 2px solid var(--fill, var(--accent));
    box-shadow: 0 3px 10px rgba(0,0,0,0.5), 0 0 0 4px rgba(255,255,255,0.04);
    transition: transform .12s;
  }
  input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.18); }
  input[type=range]::-moz-range-thumb {
    width: 17px; height: 17px; border-radius: 50%;
    background: #fff; border: 2px solid var(--fill, var(--accent)); cursor: pointer;
  }
  .ticklabels { display: flex; justify-content: space-between; margin-top: 6px; font-size: 10.5px; color: var(--text-2); }

  /* Biscuit selector */
  .biscuit-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 9px; }
  .biscuit {
    border: 1px solid var(--glass-brd); background: var(--glass-hi); border-radius: 13px;
    padding: 11px 8px 9px; cursor: pointer; text-align: center; transition: all .16s ease;
    position: relative;
  }
  .biscuit:hover { background: rgba(255,255,255,0.07); transform: translateY(-2px); }
  .biscuit.active {
    border-color: var(--amber); background: rgba(244,184,96,0.10);
    box-shadow: 0 0 0 1px var(--amber) inset, 0 8px 20px -10px rgba(244,184,96,0.5);
  }
  .biscuit .em { font-size: 24px; line-height: 1; display:block; }
  .biscuit .bn { font-size: 11.5px; font-weight: 620; margin-top: 6px; color: var(--text-0); }
  .biscuit .br { font-size: 9.5px; color: var(--text-2); margin-top: 2px; }
  .biscuit .idx { position:absolute; top:5px; left:7px; font-size:9px; color:var(--text-2); font-family: ui-monospace, monospace;}

  /* Crumble-o-meter */
  .meter-card .chart-wrap { position: relative; }
  .chart-wrap canvas { width: 100%; display: block; border-radius: 12px; }
  .chart-legend { display: flex; gap: 16px; margin-top: 12px; font-size: 11.5px; color: var(--text-1); flex-wrap: wrap; }
  .chart-legend span { display: inline-flex; align-items: center; gap: 6px; }
  .chart-legend i { width: 11px; height: 3px; border-radius: 2px; display: inline-block; }

  .stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 11px; margin-top: 16px; }
  .stat {
    background: var(--glass-hi); border: 1px solid var(--glass-brd); border-radius: 12px;
    padding: 11px 12px;
  }
  .stat .v { font-size: 20px; font-weight: 760; font-variant-numeric: tabular-nums; line-height: 1; }
  .stat .l { font-size: 10px; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.07em; margin-top: 6px; }

  .advice {
    margin-top: 16px; padding: 13px 15px; border-radius: 13px; font-size: 13px; line-height: 1.5;
    border: 1px solid var(--glass-brd); background: var(--glass-hi); color: var(--text-1);
  }
  .advice b { color: var(--text-0); }

  footer.app { text-align: center; color: var(--text-2); font-size: 11.5px; margin-top: 34px; }
  footer.app b { color: var(--text-1); }

  .flash { animation: flash .5s ease; }
  @keyframes flash { 0%{ box-shadow: 0 0 0 0 rgba(248,113,113,0.5);} 100%{ box-shadow: 0 0 0 14px rgba(248,113,113,0);} }

  ::-webkit-scrollbar { width: 0; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useEffect, useMemo, useCallback } = React;

/* ----------------------------- Biscuit data ----------------------------- */
// porosity: how fast tea soaks in. cohesion: structural resistance to collapse.
// sweetSpot: ideal dunk seconds at reference conditions.
const BISCUITS = [
  { id: 'digestive',  name: 'Digestive',     emoji: '🍪', rating: 'The Classic',   porosity: 0.62, cohesion: 0.70, sweet: 2.6, color: '#c79a5b' },
  { id: 'rich-tea',   name: 'Rich Tea',      emoji: '🟤', rating: 'The Daredevil',  porosity: 0.82, cohesion: 0.42, sweet: 1.4, color: '#d9b377' },
  { id: 'hobnob',     name: 'Hobnob',        emoji: '🌾', rating: 'The Champion',   porosity: 0.50, cohesion: 0.86, sweet: 3.8, color: '#b9823f' },
  { id: 'bourbon',    name: 'Bourbon',       emoji: '🟫', rating: 'The Tank',       porosity: 0.40, cohesion: 0.80, sweet: 4.2, color: '#6e4426' },
  { id: 'shortbread', name: 'Shortbread',    emoji: '🧈', rating: 'The Crumbler',   porosity: 0.55, cohesion: 0.50, sweet: 2.0, color: '#e6c98a' },
  { id: 'ginger',     name: 'Ginger Nut',    emoji: '🟠', rating: 'The Veteran',    porosity: 0.34, cohesion: 0.90, sweet: 5.0, color: '#b06a30' },
];

/* ------------------------- Dunkability physics -------------------------- */
// Returns 0..1 saturation given dunk params. Higher temp & porosity soak faster;
// higher integrity (structure) resists. We model an exponential soak curve.
function computeModel({ temp, time, biscuit, integrity }) {
  const b = biscuit;
  // structural multiplier from integrity slider (0..100 -> 0.5..1.5 resistance)
  const structure = 0.5 + (integrity / 100) * 1.0;
  const effCohesion = b.cohesion * structure;
  // temperature factor: hotter tea penetrates faster (40C..100C)
  const tempF = 0.45 + (temp - 40) / 60 * 0.9; // ~0.45..1.35
  // soak rate constant
  const k = (b.porosity * tempF) / Math.max(0.35, effCohesion) * 0.42;
  const saturation = 1 - Math.exp(-k * time); // 0..1
  // failure threshold: when saturation exceeds cohesion-derived limit, it breaks
  const failPoint = 0.55 + effCohesion * 0.4; // 0.55..1.0
  const margin = failPoint - saturation; // positive = safe
  // ideal dunk time for these conditions (where saturation hits ~0.78*failPoint)
  const target = 0.78 * failPoint;
  const ideal = -Math.log(1 - Math.min(0.98, target)) / k;
  // score: 100 at ideal, drops as you deviate (esp. over-dunk)
  let score;
  if (saturation <= failPoint) {
    // reward getting close to ideal sweet zone
    const closeness = 1 - Math.min(1, Math.abs(time - ideal) / Math.max(1.2, ideal));
    score = 55 + closeness * 45;
  } else {
    const over = (saturation - failPoint) / (1 - failPoint);
    score = Math.max(0, 55 - over * 70);
  }
  const failed = saturation > failPoint;
  // crumble level 0..1 (how much it's falling apart)
  const crumble = Math.max(0, (saturation - failPoint * 0.82)) / (1 - failPoint * 0.82);
  return {
    saturation, failPoint, margin, ideal, score: Math.round(score),
    failed, crumble: Math.min(1, crumble), k, effCohesion, structure
  };
}

function verdictFor(m) {
  if (m.failed) return { label: 'CATASTROPHIC COLLAPSE', color: 'var(--bad)', raw:'#f87171' };
  if (m.score >= 88) return { label: 'PERFECT DUNK', color: 'var(--good)', raw:'#4ade80' };
  if (m.score >= 70) return { label: 'SOLID DUNK', color: '#a3e635', raw:'#a3e635' };
  if (m.margin < 0.08) return { label: 'LIVING DANGEROUSLY', color: 'var(--warn)', raw:'#fbbf24' };
  return { label: 'UNDER-DUNKED', color: 'var(--accent)', raw:'#5e9bd6' };
}

/* ----------------------------- Slider ----------------------------------- */
function Slider({ label, emoji, value, min, max, step, onChange, fmt, fill, ticks }) {
  const pct = ((value - min) / (max - min)) * 100;
  return (
    <div className="ctrl">
      <div className="ctrl-top">
        <span className="name"><span className="em">{emoji}</span>{label}</span>
        <span className="val">{fmt(value)}</span>
      </div>
      <input type="range" min={min} max={max} step={step} value={value}
        onChange={e => onChange(parseFloat(e.target.value))}
        style={{ '--pct': pct + '%', '--fill': fill }} />
      {ticks && <div className="ticklabels">{ticks.map((t,i)=><span key={i}>{t}</span>)}</div>}
    </div>
  );
}

/* --------------------------- Teacup Canvas ------------------------------ */
function TeacupStage({ model, biscuit, params, dunkSignal }) {
  const canvasRef = useRef(null);
  const stateRef = useRef({ crumbs: [], splashes: [], t: 0, lastFail: false, dunkPhase: 0, bob: 0 });
  const modelRef = useRef(model);
  const biscRef = useRef(biscuit);
  modelRef.current = model; biscRef.current = biscuit;

  // spawn crumbs on over-dunk / dunk action
  const spawnCrumbs = useCallback((n, intensity) => {
    const s = stateRef.current;
    const c = canvasRef.current; if (!c) return;
    const w = c.clientWidth, h = c.clientHeight;
    const cx = w * 0.5, cupTop = h * 0.5;
    for (let i = 0; i < n; i++) {
      s.crumbs.push({
        x: cx + (Math.random() - 0.5) * w * 0.28,
        y: cupTop + (Math.random() - 0.3) * 30,
        vx: (Math.random() - 0.5) * 2.2 * intensity,
        vy: -Math.random() * 2.5 * intensity - 0.5,
        r: 1.5 + Math.random() * 3.2,
        life: 1, rot: Math.random()*6.28, vr: (Math.random()-0.5)*0.3,
        col: biscRef.current.color, soggy: Math.random() < 0.4
      });
    }
  }, []);

  useEffect(() => {
    if (dunkSignal === 0) return;
    const m = modelRef.current;
    const intensity = m.failed ? 1.6 : (m.crumble > 0.3 ? 0.9 : 0.5);
    spawnCrumbs(m.failed ? 34 : Math.round(8 + m.crumble * 22), intensity);
    // splash
    const s = stateRef.current;
    const c = canvasRef.current; if (c) {
      const w = c.clientWidth, h = c.clientHeight;
      for (let i=0;i<10;i++) s.splashes.push({ x:w*0.5+(Math.random()-0.5)*w*0.22, y:h*0.5, vx:(Math.random()-0.5)*2.5, vy:-Math.random()*3-1, life:1, r:1+Math.random()*2 });
    }
  }, [dunkSignal, spawnCrumbs]);

  useEffect(() => {
    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');
    let raf, running = true;
    let lastCrumbleSpawn = 0;

    function resize() {
      const dpr = Math.min(2, window.devicePixelRatio || 1);
      const w = canvas.clientWidth, h = canvas.clientHeight;
      canvas.width = w * dpr; canvas.height = h * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    resize();
    const ro = new ResizeObserver(resize); ro.observe(canvas);

    // steam particles
    const steam = Array.from({ length: 26 }, () => ({
      x: 0, y: 0, off: Math.random()*100, speed: 0.18 + Math.random()*0.22,
      sway: Math.random()*6.28, swaySp: 0.01 + Math.random()*0.02, size: 8 + Math.random()*14
    }));

    function loop() {
      if (!running) return;
      const s = stateRef.current; s.t += 1;
      const m = modelRef.current, b = biscRef.current, p = params;
      const w = canvas.clientWidth, h = canvas.clientHeight;
      ctx.clearRect(0, 0, w, h);

      const cx = w * 0.5;
      const cupW = Math.min(w * 0.46, 250);
      const cupH = cupW * 0.78;
      const cupTop = h * 0.46;
      const teaLevel = cupTop + cupH * 0.16;

      // ---- ambient glow under cup ----
      const glow = ctx.createRadialGradient(cx, cupTop + cupH*0.6, 10, cx, cupTop + cupH*0.6, cupW*0.95);
      const heat = (p.temp - 40) / 60;
      glow.addColorStop(0, `rgba(${180+heat*40},${110+heat*30},${50},${0.10+heat*0.10})`);
      glow.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = glow;
      ctx.fillRect(0, 0, w, h);

      // ---- steam (intensity from temp) ----
      const steamAmt = Math.max(0, (p.temp - 48) / 52);
      steam.forEach(pt => {
        pt.off += pt.speed * (0.5 + steamAmt);
        if (pt.off > 100) pt.off = 0;
        const prog = pt.off / 100;
        pt.sway += pt.swaySp;
        const baseX = cx + (pt.size - 11) * 2.2;
        const x = baseX + Math.sin(pt.sway + prog * 4) * (16 + prog * 30);
        const y = teaLevel - prog * (cupH * 1.5 + 40);
        const alpha = Math.sin(prog * Math.PI) * 0.16 * steamAmt;
        if (alpha <= 0.002) return;
        const r = pt.size * (0.6 + prog * 1.4);
        const g = ctx.createRadialGradient(x, y, 0, x, y, r);
        g.addColorStop(0, `rgba(225,238,250,${alpha})`);
        g.addColorStop(1, 'rgba(225,238,250,0)');
        ctx.fillStyle = g;
        ctx.beginPath(); ctx.arc(x, y, r, 0, 6.2832); ctx.fill();
      });

      // ---- saucer ----
      ctx.save();
      ctx.translate(cx, cupTop + cupH + 14);
      ctx.scale(1, 0.28);
      const sg = ctx.createRadialGradient(0,0,4,0,0,cupW*0.92);
      sg.addColorStop(0, 'rgba(60,75,96,0.9)'); sg.addColorStop(0.7,'rgba(40,52,70,0.85)'); sg.addColorStop(1,'rgba(20,28,40,0.2)');
      ctx.fillStyle = sg;
      ctx.beginPath(); ctx.arc(0,0,cupW*0.9,0,6.2832); ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(0,0,cupW*0.62,0,6.2832); ctx.stroke();
      ctx.restore();

      // ---- cup body (glass) ----
      const cupL = cx - cupW/2, cupR = cx + cupW/2;
      const bodyGrad = ctx.createLinearGradient(cupL, 0, cupR, 0);
      bodyGrad.addColorStop(0, 'rgba(70,88,112,0.55)');
      bodyGrad.addColorStop(0.5, 'rgba(46,60,80,0.40)');
      bodyGrad.addColorStop(1, 'rgba(34,46,64,0.55)');
      ctx.beginPath();
      ctx.moveTo(cupL, cupTop);
      ctx.lineTo(cupL + cupW*0.10, cupTop + cupH);
      ctx.quadraticCurveTo(cx, cupTop + cupH + cupH*0.12, cupR - cupW*0.10, cupTop + cupH);
      ctx.lineTo(cupR, cupTop);
      ctx.closePath();
      ctx.fillStyle = bodyGrad; ctx.fill();

      // handle
      ctx.beginPath();
      ctx.strokeStyle = 'rgba(70,88,112,0.6)'; ctx.lineWidth = 11;
      ctx.arc(cupR + 4, cupTop + cupH*0.42, cupH*0.34, -1.1, 1.1);
      ctx.stroke();
      ctx.strokeStyle = 'rgba(255,255,255,0.12)'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(cupR + 4, cupTop + cupH*0.42, cupH*0.34, -1.1, 1.1); ctx.stroke();

      // ---- tea liquid (clip to cup) ----
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(cupL, teaLevel);
      ctx.lineTo(cupL + cupW*0.10 + (cupTop+cupH-teaLevel)/cupH*0, cupTop + cupH);
      // approximate inner trapezoid for liquid
      ctx.lineTo(cupL + cupW*0.105, cupTop + cupH - 2);
      ctx.quadraticCurveTo(cx, cupTop + cupH + cupH*0.10, cupR - cupW*0.105, cupTop + cupH - 2);
      ctx.lineTo(cupR, teaLevel);
      ctx.closePath();
      ctx.clip();

      // tea color by temp (hotter = brighter)
      const teaR = 150 + heat*60, teaG = 90 + heat*35, teaB = 40 + heat*15;
      const teaGrad = ctx.createLinearGradient(0, teaLevel, 0, cupTop+cupH);
      teaGrad.addColorStop(0, `rgb(${teaR},${teaG},${teaB})`);
      teaGrad.addColorStop(1, `rgb(${teaR*0.6},${teaG*0.55},${teaB*0.5})`);
      ctx.fillStyle = teaGrad;
      ctx.fillRect(cupL, teaLevel - 8, cupW, cupH);

      // ripple surface
      ctx.strokeStyle = `rgba(${teaR+40},${teaG+40},${teaB+30},0.5)`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      for (let x = cupL; x <= cupR; x += 4) {
        const yy = teaLevel + Math.sin(x*0.08 + s.t*0.06) * 1.6 + Math.sin(x*0.03 - s.t*0.03)*1.2;
        x === cupL ? ctx.moveTo(x, yy) : ctx.lineTo(x, yy);
      }
      ctx.stroke();

      // dissolved-biscuit murkiness when soggy
      if (m.saturation > 0.4) {
        ctx.fillStyle = `rgba(${b.color==='#6e4426'?90:120},80,40,${(m.saturation-0.4)*0.4})`;
        ctx.fillRect(cupL, teaLevel, cupW, cupH);
      }

      // ---- the biscuit (bobbing & dunking) ----
      // bob animation: gentle sine; depth grows with model immersion proxy
      s.bob += 0.04;
      const targetDepth = 0.18 + m.saturation * 0.42; // how deep it sits
      s.dunkPhase += (targetDepth - s.dunkPhase) * 0.05;
      const bobY = Math.sin(s.bob) * 4;
      const biscW = cupW * 0.30, biscH = biscW * 1.05;
      const biscX = cx - cupW*0.12;
      const biscTopY = teaLevel - biscH*(1 - s.dunkPhase) + bobY;

      ctx.save();
      ctx.translate(biscX, biscTopY + biscH/2);
      const tilt = Math.sin(s.bob*0.6) * 0.05 + m.crumble*0.12;
      ctx.rotate(tilt);
      // crumble: shrink slightly & jitter when failing
      const decay = 1 - m.crumble * 0.22;
      const jitter = m.crumble > 0.5 ? (Math.random()-0.5)*m.crumble*3 : 0;
      drawBiscuit(ctx, b, biscW*decay, biscH*decay, m, s.t, jitter);
      ctx.restore();

      // continuous crumb shedding when actively crumbling
      if (m.crumble > 0.35 && s.t - lastCrumbleSpawn > (m.failed?3:9)) {
        lastCrumbleSpawn = s.t;
        s.crumbs.push({
          x: biscX + (Math.random()-0.5)*biscW, y: teaLevel + Math.random()*8,
          vx: (Math.random()-0.5)*1, vy: Math.random()*0.5, r: 1.2+Math.random()*2.4,
          life: 1, rot: Math.random()*6.28, vr:(Math.random()-0.5)*0.2, col: b.color, soggy: true, sink: true
        });
      }
      ctx.restore(); // end clip

      // ---- glass highlight on cup ----
      ctx.beginPath();
      ctx.moveTo(cupL + cupW*0.16, cupTop + 6);
      ctx.lineTo(cupL + cupW*0.22, cupTop + cupH*0.86);
      ctx.lineWidth = 6; ctx.lineCap='round';
      ctx.strokeStyle = 'rgba(255,255,255,0.10)'; ctx.stroke();
      ctx.strokeStyle = 'rgba(255,255,255,0.16)';
      ctx.lineWidth = 1.6; ctx.beginPath();
      ctx.moveTo(cupL, cupTop); ctx.lineTo(cupR, cupTop); ctx.stroke();

      // ---- splashes ----
      for (let i = s.splashes.length-1; i>=0; i--) {
        const sp = s.splashes[i];
        sp.x += sp.vx; sp.y += sp.vy; sp.vy += 0.22; sp.life -= 0.03;
        if (sp.life <= 0) { s.splashes.splice(i,1); continue; }
        ctx.fillStyle = `rgba(${teaR},${teaG},${teaB},${sp.life})`;
        ctx.beginPath(); ctx.arc(sp.x, sp.y, sp.r, 0, 6.2832); ctx.fill();
      }

      // ---- crumbs ----
      for (let i = s.crumbs.length-1; i>=0; i--) {
        const cr = s.crumbs[i];
        cr.x += cr.vx; cr.y += cr.vy;
        cr.vy += cr.sink ? 0.04 : 0.12;
        cr.vx *= 0.99; cr.rot += cr.vr;
        cr.life -= cr.sink ? 0.006 : 0.012;
        if (cr.life <= 0 || cr.y > h + 20) { s.crumbs.splice(i,1); continue; }
        ctx.save();
        ctx.translate(cr.x, cr.y); ctx.rotate(cr.rot);
        ctx.globalAlpha = Math.min(1, cr.life*1.3);
        ctx.fillStyle = cr.soggy ? shade(cr.col,-30) : cr.col;
        ctx.beginPath();
        ctx.moveTo(-cr.r, 0); ctx.lineTo(0,-cr.r*0.8); ctx.lineTo(cr.r,0.2); ctx.lineTo(0.3,cr.r*0.7);
        ctx.closePath(); ctx.fill();
        ctx.restore();
      }
      ctx.globalAlpha = 1;

      raf = requestAnimationFrame(loop);
    }
    loop();
    return () => { running = false; cancelAnimationFrame(raf); ro.disconnect(); };
  }, [params]);

  const verdict = verdictFor(model);
  return (
    <div className="stage">
      <canvas ref={canvasRef}></canvas>
      <div className="verdict-pill" style={{ color: verdict.color, borderColor: verdict.color+'55' }}>
        <span className="swatch" style={{ background: verdict.color }}></span>
        {verdict.label}
      </div>
      <div className="dunk-readout">
        <div className="big" style={{ color: verdict.color }}>{model.score}</div>
        <div className="lbl">Dunk Score</div>
      </div>
    </div>
  );
}

function drawBiscuit(ctx, b, w, h, m, t, jitter) {
  // saturated portion = darker, wet sheen at bottom
  const sat = m.saturation;
  ctx.save();
  ctx.translate(jitter, 0);
  // shadow
  ctx.shadowColor = 'rgba(0,0,0,0.4)'; ctx.shadowBlur = 8; ctx.shadowOffsetY = 3;
  // base round-rect biscuit
  const grad = ctx.createLinearGradient(0, -h/2, 0, h/2);
  grad.addColorStop(0, shade(b.color, 18));
  grad.addColorStop(1 - sat*0.5, b.color);
  grad.addColorStop(1, shade(b.color, -45 - sat*30)); // soggy bottom
  ctx.fillStyle = grad;
  roundRect(ctx, -w/2, -h/2, w, h, w*0.16);
  ctx.fill();
  ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;

  // texture: dotted pricks (digestive-style)
  ctx.fillStyle = shade(b.color, -28);
  for (let r=0;r<4;r++) for (let c=0;c<3;c++){
    const dx = -w*0.28 + c*w*0.28, dy = -h*0.3 + r*h*0.2;
    ctx.beginPath(); ctx.arc(dx, dy, w*0.025, 0, 6.2832); ctx.fill();
  }
  // wet sheen line at tea contact
  ctx.strokeStyle = 'rgba(255,255,255,0.18)'; ctx.lineWidth = 1.4;
  ctx.beginPath(); ctx.moveTo(-w/2, h/2 - h*sat*0.5); ctx.lineTo(w/2, h/2 - h*sat*0.5); ctx.stroke();

  // cracks when crumbling
  if (m.crumble > 0.25) {
    ctx.strokeStyle = shade(b.color, -60); ctx.lineWidth = 1.2 + m.crumble;
    ctx.globalAlpha = m.crumble;
    for (let i=0;i<3;i++){
      ctx.beginPath();
      const sx = (Math.random()-0.5)*w*0.6;
      ctx.moveTo(sx, -h*0.2);
      ctx.lineTo(sx + (Math.random()-0.5)*w*0.3, h*0.4);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }
  ctx.restore();
}

function roundRect(ctx, x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y, x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r);
  ctx.arcTo(x, y, x+w, y, r);
  ctx.closePath();
}
function shade(hex, amt){
  const n = parseInt(hex.slice(1),16);
  let r=(n>>16)+amt, g=((n>>8)&255)+amt, b=(n&255)+amt;
  r=Math.max(0,Math.min(255,r)); g=Math.max(0,Math.min(255,g)); b=Math.max(0,Math.min(255,b));
  return `rgb(${r},${g},${b})`;
}

/* ------------------------ Crumble-o-meter chart ------------------------- */
function CrumbleMeter({ params, biscuit, model }) {
  const ref = useRef(null);
  useEffect(() => {
    const canvas = ref.current;
    const ctx = canvas.getContext('2d');
    const dpr = Math.min(2, window.devicePixelRatio||1);
    const W = canvas.clientWidth, H = 190;
    canvas.width = W*dpr; canvas.height = H*dpr; canvas.style.height = H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.clearRect(0,0,W,H);

    const padL = 8, padR = 8, padT = 14, padB = 26;
    const plotW = W - padL - padR, plotH = H - padT - padB;
    const maxT = 12; // seconds shown

    // grid
    ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.lineWidth = 1;
    for (let i=0;i<=4;i++){ const y = padT + plotH*i/4; ctx.beginPath(); ctx.moveTo(padL,y); ctx.lineTo(W-padR,y); ctx.stroke(); }
    for (let i=0;i<=6;i++){ const x = padL + plotW*i/6; ctx.beginPath(); ctx.moveTo(x,padT); ctx.lineTo(x,H-padB); ctx.stroke(); }

    const X = tt => padL + (tt/maxT)*plotW;
    const Y = v => padT + (1-v)*plotH;

    // sample curves over time
    const sat = [], crm = [];
    for (let i=0;i<=120;i++){
      const tt = (i/120)*maxT;
      const mm = computeModel({ temp: params.temp, time: tt, biscuit, integrity: params.integrity });
      sat.push([tt, mm.saturation]);
      crm.push([tt, mm.crumble]);
    }
    const failPoint = model.failPoint;

    // failure zone fill (above failPoint)
    ctx.fillStyle = 'rgba(248,113,113,0.10)';
    ctx.fillRect(padL, padT, plotW, (1-failPoint)*plotH);
    // failPoint line
    ctx.strokeStyle = 'rgba(248,113,113,0.55)'; ctx.setLineDash([5,4]); ctx.lineWidth=1.4;
    ctx.beginPath(); ctx.moveTo(padL, Y(failPoint)); ctx.lineTo(W-padR, Y(failPoint)); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(248,113,113,0.8)'; ctx.font='10px system-ui';
    ctx.fillText('FAILURE THRESHOLD', padL+4, Y(failPoint)-5);

    // ideal-time marker
    if (model.ideal < maxT) {
      ctx.strokeStyle = 'rgba(74,222,128,0.5)'; ctx.setLineDash([3,3]);
      ctx.beginPath(); ctx.moveTo(X(model.ideal),padT); ctx.lineTo(X(model.ideal),H-padB); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle='rgba(74,222,128,0.9)'; ctx.fillText('IDEAL', X(model.ideal)+3, padT+11);
    }

    function plot(data, stroke, fillGrad){
      ctx.beginPath();
      data.forEach(([tt,v],i)=>{ const x=X(tt),y=Y(v); i?ctx.lineTo(x,y):ctx.moveTo(x,y); });
      if (fillGrad){
        ctx.lineTo(X(maxT), Y(0)); ctx.lineTo(X(0), Y(0)); ctx.closePath();
        const g = ctx.createLinearGradient(0,padT,0,H-padB);
        g.addColorStop(0, fillGrad); g.addColorStop(1,'transparent');
        ctx.fillStyle = g; ctx.fill();
        ctx.beginPath();
        data.forEach(([tt,v],i)=>{ const x=X(tt),y=Y(v); i?ctx.lineTo(x,y):ctx.moveTo(x,y); });
      }
      ctx.strokeStyle = stroke; ctx.lineWidth = 2.4; ctx.lineJoin='round'; ctx.stroke();
    }
    plot(sat, '#5e9bd6', 'rgba(94,155,214,0.22)');
    plot(crm, '#f4b860', null);

    // current-time marker dot
    const ct = Math.min(params.time, maxT);
    const cx = X(ct), cyS = Y(model.saturation), cyC = Y(model.crumble);
    ctx.strokeStyle = 'rgba(255,255,255,0.35)'; ctx.lineWidth=1.4; ctx.setLineDash([2,3]);
    ctx.beginPath(); ctx.moveTo(cx,padT); ctx.lineTo(cx,H-padB); ctx.stroke(); ctx.setLineDash([]);
    [[cyS,'#5e9bd6'],[cyC,'#f4b860']].forEach(([y,col])=>{
      ctx.fillStyle = col; ctx.beginPath(); ctx.arc(cx,y,4.5,0,6.2832); ctx.fill();
      ctx.strokeStyle='#0a0e14'; ctx.lineWidth=2; ctx.stroke();
    });

    // x axis labels
    ctx.fillStyle='rgba(150,165,185,0.7)'; ctx.font='10px system-ui'; ctx.textAlign='center';
    for(let i=0;i<=6;i++){ ctx.fillText(((maxT*i/6)|0)+'s', X(maxT*i/6), H-8); }
    ctx.textAlign='left';
  }, [params, biscuit, model]);

  return <canvas ref={ref} style={{ width:'100%' }}></canvas>;
}

/* -------------------------------- App ----------------------------------- */
function App() {
  const [temp, setTemp] = useState(85);
  const [time, setTime] = useState(2.5);
  const [biscuitIdx, setBiscuitIdx] = useState(0);
  const [integrity, setIntegrity] = useState(60);
  const [dunkSignal, setDunkSignal] = useState(0);
  const [flash, setFlash] = useState(false);
  const rootRef = useRef(null);

  const biscuit = BISCUITS[biscuitIdx];
  const params = { temp, time, integrity };
  const model = useMemo(() => computeModel({ temp, time, biscuit, integrity }), [temp, time, biscuit, integrity]);
  const verdict = verdictFor(model);

  const doDunk = useCallback(() => {
    setDunkSignal(s => s + 1);
    if (computeModel({ temp, time, biscuit, integrity }).failed) {
      setFlash(true); setTimeout(()=>setFlash(false), 500);
    }
  }, [temp, time, biscuit, integrity]);

  const optimize = useCallback(() => {
    // set time to ideal for current conditions
    const m = computeModel({ temp, time: 5, biscuit, integrity });
    setTime(Math.max(0.5, Math.min(10, +m.ideal.toFixed(1))));
  }, [temp, biscuit, integrity]);

  const randomize = useCallback(() => {
    setTemp(Math.round(40 + Math.random()*60));
    setTime(+(Math.random()*9 + 0.5).toFixed(1));
    setIntegrity(Math.round(Math.random()*100));
    setBiscuitIdx(Math.floor(Math.random()*BISCUITS.length));
  }, []);

  // keyboard shortcuts
  useEffect(() => {
    const onKey = (e) => {
      if (e.target.tagName === 'INPUT' && e.target.type === 'range') {/* allow native */}
      const k = e.key.toLowerCase();
      if (k === ' ' || k === 'd') { e.preventDefault(); doDunk(); }
      else if (k === 'arrowright') { e.preventDefault(); setTime(t=>Math.min(10, +(t+0.5).toFixed(1))); }
      else if (k === 'arrowleft') { e.preventDefault(); setTime(t=>Math.max(0.5, +(t-0.5).toFixed(1))); }
      else if (k === 'arrowup') { e.preventDefault(); setTemp(t=>Math.min(100, t+5)); }
      else if (k === 'arrowdown') { e.preventDefault(); setTemp(t=>Math.max(40, t-5)); }
      else if (k >= '1' && k <= '6') { setBiscuitIdx(Math.min(BISCUITS.length-1, +k-1)); }
      else if (k === 'o') { optimize(); }
      else if (k === 'r') { randomize(); }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [doDunk, optimize, randomize]);

  const advice = useMemo(() => {
    if (model.failed) return <span><b>Disaster.</b> The {biscuit.name.toLowerCase()} surpassed its failure threshold and surrendered to the tea. Reduce dunk time below <b>{model.ideal.toFixed(1)}s</b> or crank up structural integrity.</span>;
    if (model.score >= 88) return <span><b>Textbook.</b> You've nailed the {biscuit.name.toLowerCase()}'s sweet spot — maximum tea absorption, zero structural failure. This is the dunk poets write about.</span>;
    if (model.margin < 0.08) return <span><b>On a knife's edge.</b> You're {Math.round(model.margin*100)}% from collapse. Thrilling, but one more half-second of greed and it's gone.</span>;
    if (model.saturation < 0.35) return <span><b>Timid.</b> Barely wet. The {biscuit.name.toLowerCase()} can take far more — push toward <b>{model.ideal.toFixed(1)}s</b> for the full experience.</span>;
    return <span>A respectable dunk. For peak flavour-to-survival ratio, aim for <b>{model.ideal.toFixed(1)}s</b> at this temperature.</span>;
  }, [model, biscuit]);

  return (
    <div className="wrap" ref={rootRef}>
      <header className="app">
        <div className="brand">
          <svg className="cup-ico" viewBox="0 0 64 64" fill="none">
            <path d="M12 26h34v14a16 16 0 0 1-16 16h-2a16 16 0 0 1-16-16V26z" fill="#b56a32"/>
            <path d="M12 26h34v6a16 16 0 0 1-16 16h-2A16 16 0 0 1 12 32v-6z" fill="#d98a4a"/>
            <path d="M46 30h4a7 7 0 0 1 0 14h-4" stroke="#b56a32" strokeWidth="5" fill="none"/>
            <path d="M20 8c-2 4 2 6 0 10M30 6c-2 4 2 6 0 10M40 8c-2 4 2 6 0 10" stroke="#9fb0c6" strokeWidth="2.4" strokeLinecap="round" opacity="0.7"/>
          </svg>
          <div>
            <h1>Tea Dunkability Simulator</h1>
            <div className="sub">Precision biscuit-immersion engineering · est. 2026</div>
          </div>
        </div>
        <div className="kbd-hint">
          <span><kbd>Space</kbd> Dunk</span>
          <span><kbd>←</kbd><kbd>→</kbd> Time</span>
          <span><kbd>↑</kbd><kbd>↓</kbd> Temp</span>
          <span><kbd>1-6</kbd> Biscuit</span>
          <span><kbd>O</kbd> Optimize</span>
          <span><kbd>R</kbd> Random</span>
        </div>
      </header>

      <div className="grid">
        {/* LEFT: stage */}
        <div className={"card stage-card" + (flash ? ' flash' : '')} style={{ padding: 0 }}>
          <TeacupStage model={model} biscuit={biscuit} params={params} dunkSignal={dunkSignal} />
          <div className="stage-foot">
            <button className="btn primary" onClick={doDunk}>🫖 Dunk! <span className="k">SPACE</span></button>
            <button className="btn" onClick={optimize}>🎯 Optimize <span className="k">O</span></button>
            <button className="btn" onClick={randomize}>🎲 Random <span className="k">R</span></button>
          </div>
        </div>

        {/* RIGHT: controls */}
        <div className="card">
          <h2><span className="dot"></span>Dunk Parameters</h2>

          <Slider label="Tea Temperature" emoji="🌡️" value={temp} min={40} max={100} step={1}
            onChange={setTemp} fill="linear-gradient(90deg,#5e9bd6,#f87171)"
            fmt={v => <>{v}<small>°C</small></>}
            ticks={['40° tepid','70°','100° scalding']} />

          <Slider label="Dunk Time" emoji="⏱️" value={time} min={0.5} max={10} step={0.1}
            onChange={setTime} fill="linear-gradient(90deg,#4ade80,#fbbf24,#f87171)"
            fmt={v => <>{v.toFixed(1)}<small>s</small></>}
            ticks={['0.5s','5s','10s']} />

          <Slider label="Structural Integrity" emoji="🏗️" value={integrity} min={0} max={100} step={1}
            onChange={setIntegrity} fill="linear-gradient(90deg,#f87171,#4ade80)"
            fmt={v => <>{v}<small>%</small></>}
            ticks={['flimsy','sturdy','reinforced']} />

          <div className="ctrl">
            <div className="ctrl-top">
              <span className="name"><span className="em">🍪</span>Biscuit Type</span>
              <span className="val" style={{color:'var(--text-2)',fontWeight:500}}>{biscuit.rating}</span>
            </div>
            <div className="biscuit-grid">
              {BISCUITS.map((b, i) => (
                <div key={b.id} className={"biscuit" + (i===biscuitIdx?' active':'')} onClick={()=>setBiscuitIdx(i)}>
                  <span className="idx">{i+1}</span>
                  <span className="em">{b.emoji}</span>
                  <div className="bn">{b.name}</div>
                  <div className="br">{b.rating}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>

      {/* Crumble-o-meter full width */}
      <div className="card meter-card" style={{ marginTop: 20 }}>
        <h2><span className="dot" style={{background:'var(--amber)',boxShadow:'0 0 10px var(--amber)'}}></span>Crumble-o-Meter</h2>
        <div className="chart-wrap">
          <CrumbleMeter params={params} biscuit={biscuit} model={model} />
        </div>
        <div className="chart-legend">
          <span><i style={{background:'#5e9bd6'}}></i>Tea Saturation</span>
          <span><i style={{background:'#f4b860'}}></i>Crumble Risk</span>
          <span><i style={{background:'#f87171'}}></i>Failure Threshold</span>
          <span><i style={{background:'#4ade80'}}></i>Ideal Dunk Time</span>
        </div>

        <div className="stats-row">
          <div className="stat">
            <div className="v" style={{color:'#5e9bd6'}}>{Math.round(model.saturation*100)}%</div>
            <div className="l">Saturation</div>
          </div>
          <div className="stat">
            <div className="v" style={{color: model.margin>0.08?'#4ade80':(model.margin>0?'#fbbf24':'#f87171')}}>
              {model.margin>0 ? '+' : ''}{Math.round(model.margin*100)}%
            </div>
            <div className="l">Safety Margin</div>
          </div>
          <div className="stat">
            <div className="v" style={{color:'var(--amber)'}}>{model.ideal.toFixed(1)}s</div>
            <div className="l">Ideal Dunk</div>
          </div>
        </div>

        <div className="advice" style={{ borderColor: verdict.color+'40' }}>{advice}</div>
      </div>

      <footer className="app">
        Built with deeply unscientific tea physics · <b>Saturation</b> = 1 − e<sup>−kt</sup> ·
        Adjust sliders, hit <b>Dunk</b>, and chase the perfect 100.
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
