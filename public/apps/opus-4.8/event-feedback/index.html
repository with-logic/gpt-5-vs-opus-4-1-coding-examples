<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Event Feedback Dashboard</title>
<style>
  :root {
    --bg: #f4f5f7;
    --surface: #ffffff;
    --ink: #1a1d24;
    --ink-soft: #5b6270;
    --ink-faint: #8a91a0;
    --line: #e6e8ed;
    --line-strong: #d4d7df;
    --accent: #4f46e5;
    --accent-soft: #eef0fe;
    --accent-deep: #3730a3;
    --shadow-sm: 0 1px 2px rgba(16, 24, 40, 0.06);
    --shadow-md: 0 4px 16px rgba(16, 24, 40, 0.08);
    --shadow-lg: 0 12px 40px rgba(16, 24, 40, 0.12);
    --radius: 14px;
    --radius-sm: 9px;
    --gold: #d9a441;
    --green: #2f9e6f;
    --amber: #d98e2b;
    --red: #d9534f;
    --slate: #64748b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background:
      radial-gradient(1200px 600px at 110% -10%, #e9ebfb 0%, transparent 55%),
      radial-gradient(900px 500px at -10% 110%, #eaf3f0 0%, transparent 50%),
      var(--bg);
    color: var(--ink);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  .shell {
    max-width: 1240px;
    margin: 0 auto;
    padding: 32px 28px 64px;
  }

  /* ---------- Header ---------- */
  header.top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    margin-bottom: 26px;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .brand .logo {
    width: 46px; height: 46px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--accent) 0%, #7c75f0 100%);
    display: grid; place-items: center;
    color: #fff;
    box-shadow: var(--shadow-md);
    flex-shrink: 0;
  }
  .brand .logo svg { width: 24px; height: 24px; }
  .brand h1 {
    font-size: 21px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .brand p {
    font-size: 13px;
    color: var(--ink-soft);
    margin-top: 1px;
  }
  .header-meta {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: var(--surface);
    border: 1px solid var(--line);
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-soft);
    box-shadow: var(--shadow-sm);
  }
  .pill .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 0 3px rgba(47,158,111,.18);
  }

  /* ---------- Stats row ---------- */
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 22px;
  }
  .stat {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 16px 18px;
    box-shadow: var(--shadow-sm);
    position: relative;
    overflow: hidden;
  }
  .stat .label {
    font-size: 12px;
    color: var(--ink-faint);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .05em;
  }
  .stat .value {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-top: 6px;
    display: flex;
    align-items: baseline;
    gap: 6px;
  }
  .stat .value small { font-size: 13px; font-weight: 500; color: var(--ink-faint); }
  .stat .trend {
    font-size: 12px;
    margin-top: 4px;
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .trend.up { color: var(--green); }
  .trend.down { color: var(--red); }
  .stat .spark {
    position: absolute;
    right: 14px; top: 16px;
    width: 38px; height: 38px;
    border-radius: 10px;
    display: grid; place-items: center;
    background: var(--accent-soft);
    color: var(--accent);
  }
  .stat .spark svg { width: 20px; height: 20px; }

  /* ---------- AI Summary ---------- */
  .ai-summary {
    position: relative;
    background: linear-gradient(120deg, #1f1b4d 0%, #312a78 48%, #463cab 100%);
    color: #f4f3ff;
    border-radius: var(--radius);
    padding: 22px 26px;
    margin-bottom: 22px;
    box-shadow: var(--shadow-lg);
    overflow: hidden;
  }
  .ai-summary::after {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(420px 200px at 90% -40%, rgba(255,255,255,.18), transparent 60%),
      radial-gradient(300px 160px at 10% 130%, rgba(124,200,255,.22), transparent 60%);
    pointer-events: none;
  }
  .ai-summary .ai-head {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
    position: relative; z-index: 1;
  }
  .ai-badge {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: rgba(255,255,255,.14);
    border: 1px solid rgba(255,255,255,.22);
    padding: 5px 12px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: .03em;
    backdrop-filter: blur(6px);
  }
  .ai-badge svg { width: 15px; height: 15px; }
  .ai-summary h2 {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .ai-summary .ai-body {
    position: relative; z-index: 1;
    font-size: 14.5px;
    line-height: 1.65;
    color: #e4e2fb;
    max-width: 980px;
  }
  .ai-summary .ai-body strong { color: #fff; font-weight: 600; }
  .ai-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 14px;
    position: relative; z-index: 1;
  }
  .ai-chip {
    font-size: 12px;
    font-weight: 500;
    padding: 5px 11px;
    border-radius: 8px;
    background: rgba(255,255,255,.1);
    border: 1px solid rgba(255,255,255,.16);
  }
  .ai-chip b { font-weight: 700; }
  .ai-close {
    position: absolute;
    top: 16px; right: 16px;
    z-index: 2;
    width: 32px; height: 32px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,.2);
    background: rgba(255,255,255,.1);
    color: #fff;
    cursor: pointer;
    display: grid; place-items: center;
    transition: background .18s, transform .18s;
  }
  .ai-close:hover { background: rgba(255,255,255,.22); transform: rotate(90deg); }
  .ai-close svg { width: 16px; height: 16px; }

  .ai-restore {
    display: none;
    margin-bottom: 22px;
  }
  .ai-restore.show { display: block; }
  .ai-restore button {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--accent-soft);
    color: var(--accent-deep);
    border: 1px solid #d9d6fb;
    padding: 9px 15px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s;
  }
  .ai-restore button:hover { background: #e3e1fc; }
  .ai-restore svg { width: 16px; height: 16px; }

  /* ---------- Table card ---------- */
  .card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow-md);
    overflow: hidden;
  }
  .toolbar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 18px 20px;
    border-bottom: 1px solid var(--line);
    flex-wrap: wrap;
  }
  .toolbar .title {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin-right: auto;
    display: flex;
    align-items: center;
    gap: 9px;
  }
  .toolbar .title .count {
    font-size: 12px;
    font-weight: 600;
    color: var(--accent-deep);
    background: var(--accent-soft);
    padding: 2px 9px;
    border-radius: 999px;
  }
  .search {
    position: relative;
    flex: 1 1 320px;
    max-width: 420px;
  }
  .search svg {
    position: absolute;
    left: 13px; top: 50%;
    transform: translateY(-50%);
    width: 17px; height: 17px;
    color: var(--ink-faint);
    pointer-events: none;
  }
  .search input {
    width: 100%;
    padding: 10px 38px 10px 38px;
    border: 1px solid var(--line-strong);
    border-radius: 10px;
    font-size: 14px;
    font-family: inherit;
    color: var(--ink);
    background: #fbfbfd;
    transition: border-color .15s, box-shadow .15s, background .15s;
  }
  .search input::placeholder { color: var(--ink-faint); }
  .search input:focus {
    outline: none;
    border-color: var(--accent);
    background: #fff;
    box-shadow: 0 0 0 3px rgba(79,70,229,.14);
  }
  .search .clear {
    position: absolute;
    right: 8px; top: 50%;
    transform: translateY(-50%);
    width: 22px; height: 22px;
    border: none;
    background: var(--line);
    color: var(--ink-soft);
    border-radius: 6px;
    cursor: pointer;
    display: none;
    place-items: center;
  }
  .search .clear.show { display: grid; }
  .search .clear svg { position: static; transform: none; width: 13px; height: 13px; color: inherit; }

  .seg {
    display: inline-flex;
    background: #f0f1f5;
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 3px;
    gap: 2px;
  }
  .seg button {
    border: none;
    background: transparent;
    font-family: inherit;
    font-size: 12.5px;
    font-weight: 600;
    color: var(--ink-soft);
    padding: 6px 12px;
    border-radius: 7px;
    cursor: pointer;
    transition: background .15s, color .15s;
    white-space: nowrap;
  }
  .seg button.active {
    background: var(--surface);
    color: var(--accent-deep);
    box-shadow: var(--shadow-sm);
  }

  .table-scroll { overflow-x: auto; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13.5px;
  }
  thead th {
    text-align: left;
    font-size: 11.5px;
    font-weight: 700;
    letter-spacing: .045em;
    text-transform: uppercase;
    color: var(--ink-faint);
    padding: 13px 16px;
    background: #fafafb;
    border-bottom: 1px solid var(--line);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
    position: sticky;
    top: 0;
    transition: color .15s, background .15s;
  }
  thead th:hover { color: var(--ink); background: #f4f4f7; }
  thead th .th-inner {
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .sort-icon {
    display: inline-flex;
    flex-direction: column;
    line-height: 0;
    color: var(--line-strong);
  }
  .sort-icon svg { width: 9px; height: 9px; display: block; }
  th.sorted .sort-icon .active-arrow { color: var(--accent); }
  th.sorted { color: var(--ink); }

  tbody td {
    padding: 14px 16px;
    border-bottom: 1px solid var(--line);
    vertical-align: top;
    color: var(--ink);
  }
  tbody tr { transition: background .12s; }
  tbody tr:hover { background: #faf9ff; }
  tbody tr:last-child td { border-bottom: none; }

  .col-date { white-space: nowrap; color: var(--ink-soft); font-variant-numeric: tabular-nums; font-weight: 500; width: 1%; }
  .col-event { font-weight: 600; min-width: 150px; }
  .col-event .event-tag {
    display: inline-block;
    margin-top: 4px;
    font-size: 11px;
    font-weight: 600;
    color: var(--slate);
    background: #f1f3f6;
    padding: 1px 7px;
    border-radius: 6px;
  }
  .participant {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 150px;
  }
  .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    flex-shrink: 0;
    display: grid; place-items: center;
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: .02em;
  }
  .participant .pname { font-weight: 600; }
  .participant .prole { font-size: 11.5px; color: var(--ink-faint); }

  .col-rating { white-space: nowrap; width: 1%; }
  .rating { display: inline-flex; align-items: center; gap: 8px; }
  .stars { display: inline-flex; gap: 1px; color: var(--gold); }
  .stars svg { width: 14px; height: 14px; }
  .stars .empty { color: #e2e4ea; }
  .rating .num {
    font-weight: 700;
    font-size: 12.5px;
    font-variant-numeric: tabular-nums;
  }

  .col-feedback { min-width: 300px; max-width: 460px; }
  .feedback-text {
    color: var(--ink-soft);
    line-height: 1.55;
    font-size: 13px;
  }
  .feedback-text.clamped {
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .feedback-toggle {
    margin-top: 5px;
    border: none;
    background: none;
    color: var(--accent);
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    padding: 0;
  }
  .feedback-toggle:hover { text-decoration: underline; }
  mark {
    background: #fff1b8;
    color: inherit;
    border-radius: 3px;
    padding: 0 1px;
  }

  .empty-state {
    padding: 60px 20px;
    text-align: center;
    color: var(--ink-faint);
  }
  .empty-state svg { width: 42px; height: 42px; color: var(--line-strong); margin-bottom: 12px; }
  .empty-state h3 { font-size: 15px; color: var(--ink-soft); font-weight: 600; }
  .empty-state p { font-size: 13px; margin-top: 4px; }

  .table-foot {
    padding: 13px 20px;
    border-top: 1px solid var(--line);
    font-size: 12.5px;
    color: var(--ink-faint);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
  }
  .table-foot b { color: var(--ink-soft); font-weight: 600; }

  @media (max-width: 860px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .toolbar .title { width: 100%; }
  }
  @media (max-width: 560px) {
    .shell { padding: 22px 14px 48px; }
    .stats { grid-template-columns: 1fr 1fr; gap: 10px; }
    .header-meta { display: none; }
  }
</style>
</head>
<body>
<div class="shell">
  <header class="top">
    <div class="brand">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 3v18h18"/><path d="M7 16l4-5 3 3 5-7"/>
        </svg>
      </div>
      <div>
        <h1>Event Feedback Dashboard</h1>
        <p>Participant sentiment across recent events &middot; Q2 2026</p>
      </div>
    </div>
    <div class="header-meta">
      <span class="pill"><span class="dot"></span> Live data</span>
      <span class="pill">Last sync &middot; today</span>
    </div>
  </header>

  <!-- Stats -->
  <div class="stats" id="stats"></div>

  <!-- AI Summary -->
  <section class="ai-summary" id="aiSummary">
    <button class="ai-close" id="aiClose" aria-label="Dismiss AI summary" title="Dismiss">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
    <div class="ai-head">
      <span class="ai-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.9 4.8L18.7 9l-4.8 1.9L12 15.7l-1.9-4.8L5.3 9l4.8-1.2z"/><path d="M19 14l.8 2 2 .8-2 .8-.8 2-.8-2-2-.8 2-.8z"/></svg>
        AI Summary
      </span>
      <h2>What participants are telling you</h2>
    </div>
    <p class="ai-body" id="aiBody"></p>
    <div class="ai-chips" id="aiChips"></div>
  </section>

  <div class="ai-restore" id="aiRestore">
    <button id="aiRestoreBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.9 4.8L18.7 9l-4.8 1.9L12 15.7l-1.9-4.8L5.3 9l4.8-1.2z"/></svg>
      Show AI summary
    </button>
  </div>

  <!-- Table -->
  <div class="card">
    <div class="toolbar">
      <div class="title">Feedback submissions <span class="count" id="rowCount">30</span></div>
      <div class="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" id="search" placeholder="Search events, participants, feedback…" autocomplete="off" />
        <button class="clear" id="clearSearch" aria-label="Clear search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
      </div>
      <div class="seg" id="ratingFilter">
        <button data-min="0" class="active">All</button>
        <button data-min="4">4★ &amp; up</button>
        <button data-min="2" data-max="3">2–3★</button>
        <button data-min="1" data-max="1">1★</button>
      </div>
    </div>

    <div class="table-scroll">
      <table>
        <thead>
          <tr id="headRow"></tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
      <div class="empty-state" id="emptyState" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <h3>No matching feedback</h3>
        <p>Try a different keyword or clear the filters.</p>
      </div>
    </div>

    <div class="table-foot">
      <span>Showing <b id="footShown">30</b> of <b id="footTotal">30</b> submissions</span>
      <span id="footAvg"></span>
    </div>
  </div>
</div>

<script>
(function () {
  "use strict";

  // ---------- Data generation ----------
  const events = [
    ["Annual Sales Kickoff 2026", "Conference"],
    ["Cloud Innovation Summit", "Summit"],
    ["Leadership Bootcamp", "Workshop"],
    ["Product Design Forum", "Forum"],
    ["Women in Tech Meetup", "Meetup"],
    ["Quarterly All-Hands", "Town Hall"],
    ["DevOps Masterclass", "Workshop"],
    ["Customer Success Roadshow", "Roadshow"],
    ["Data & AI Symposium", "Symposium"],
    ["Marketing Growth Lab", "Workshop"]
  ];

  const first = ["Olivia","Liam","Emma","Noah","Ava","Ethan","Sophia","Mason","Isabella","James",
    "Mia","Lucas","Amelia","Benjamin","Harper","Elijah","Charlotte","Aiden","Priya","Diego",
    "Yuki","Omar","Nina","Marcus","Leila","Carlos","Sofia","Hiroshi","Fatima","Daniel"];
  const last = ["Carter","Reyes","Nguyen","Patel","Kim","Johnson","Silva","Okafor","Müller","Rossi",
    "Andersson","Hassan","Chen","Murphy","Schmidt","Costa","Tanaka","Ivanova","Lopez","Ali"];
  const roles = ["Product Manager","Engineer","Sales Lead","Designer","Analyst","Director","Marketer","Consultant","Account Exec","Researcher"];

  const positives = [
    "The keynote was genuinely inspiring and the breakout sessions struck a great balance between strategy and hands-on practice. I left with three concrete ideas I can apply next quarter.",
    "Fantastic event overall. The networking lounge was well organized and I made several meaningful connections. The catering was a pleasant surprise — thoughtful and high quality.",
    "Exceptional speakers and tight scheduling meant we never felt rushed. The interactive workshops were the highlight; I'd happily attend again and bring my whole team along.",
    "Loved the energy in the room. Content was relevant to my role, the facilitators were knowledgeable, and the Q&A sessions left plenty of space for real questions.",
    "Best internal event I've attended in years. Clear takeaways, polished production, and a real sense that leadership was listening to what people on the ground actually need."
  ];
  const mixed = [
    "Strong content, but the morning sessions ran significantly over time which compressed the afternoon. A tighter schedule would make this near perfect next year.",
    "Good speakers and useful material, though the venue's audio kept cutting out during the panel. The breakout rooms were also a bit too small for the crowd.",
    "I appreciated the depth of the technical track, however the beginner sessions felt rushed. Splitting attendees by experience level earlier would help a lot.",
    "Solid event with helpful takeaways. The mobile app for the agenda was buggy and registration in the morning took far longer than it should have.",
    "Enjoyed most of it. Some sessions overlapped with topics I wanted to attend, and the lunch line was chaotic. More signage and a clearer map would go a long way."
  ];
  const negatives = [
    "Honestly underwhelming this time. The agenda was vague, two speakers cancelled last minute with no replacement, and there was little practical value for my team.",
    "Disorganized from the start. Check-in was a mess, the Wi-Fi never worked, and the closing session ended abruptly without any clear next steps or summary.",
    "Expected more for the time investment. The sessions repeated content from last year and the so-called 'workshops' were really just extended sales pitches.",
    "Not a great experience. The room was overcrowded and uncomfortably warm, slides were hard to read from the back, and follow-up materials were never sent."
  ];

  function picker(seed) {
    let s = seed >>> 0;
    return function () {
      s = (s * 1664525 + 1013904223) >>> 0;
      return s / 4294967296;
    };
  }
  const rnd = picker(20260604);
  const pick = (arr) => arr[Math.floor(rnd() * arr.length)];
  const pad = (n) => String(n).padStart(2, "0");

  const palette = ["#4f46e5","#0ea5a4","#db6b4f","#7c5cd6","#2f9e6f","#c2790f","#3b7dd8","#b8456b","#5a7d2a","#8a5cf6"];

  function feedbackFor(rating) {
    if (rating >= 4) return pick(positives);
    if (rating === 3) return pick(mixed);
    if (rating === 2) return rnd() > 0.5 ? pick(mixed) : pick(negatives);
    return pick(negatives);
  }

  const months = [
    [2026, 3], [2026, 4], [2026, 5]
  ];
  const monthNames = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

  // Skew ratings toward the positive but with a realistic spread.
  function genRating() {
    const r = rnd();
    if (r < 0.40) return 5;
    if (r < 0.66) return 4;
    if (r < 0.82) return 3;
    if (r < 0.93) return 2;
    return 1;
  }

  const data = [];
  for (let i = 0; i < 30; i++) {
    const ev = pick(events);
    const fn = pick(first), ln = pick(last);
    const rating = genRating();
    const m = pick(months);
    const day = 1 + Math.floor(rnd() * 27);
    data.push({
      id: i + 1,
      ts: new Date(m[0], m[1], day).getTime(),
      dateLabel: monthNames[m[1]] + " " + day + ", " + m[0],
      event: ev[0],
      eventType: ev[1],
      name: fn + " " + ln,
      initials: (fn[0] + ln[0]).toUpperCase(),
      color: palette[(fn.charCodeAt(0) + ln.charCodeAt(0)) % palette.length],
      role: pick(roles),
      rating: rating,
      feedback: feedbackFor(rating)
    });
  }

  // ---------- State ----------
  let state = {
    query: "",
    sortKey: "ts",
    sortDir: "desc",
    minRating: 0,
    maxRating: 5
  };
  const expanded = new Set();

  const columns = [
    { key: "ts", label: "Date", sortable: true },
    { key: "event", label: "Event", sortable: true },
    { key: "name", label: "Participant", sortable: true },
    { key: "rating", label: "Rating", sortable: true },
    { key: "feedback", label: "Feedback", sortable: true }
  ];

  // ---------- Helpers ----------
  const $ = (id) => document.getElementById(id);
  function esc(s) {
    return String(s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
  }
  function highlight(text, q) {
    const safe = esc(text);
    if (!q) return safe;
    const terms = q.trim().split(/\s+/).filter(Boolean).map((t) => t.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"));
    if (!terms.length) return safe;
    const re = new RegExp("(" + terms.join("|") + ")", "gi");
    return safe.replace(re, "<mark>$1</mark>");
  }

  const starSvg = (filled) =>
    '<svg class="' + (filled ? "" : "empty") + '" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.5l2.9 6 6.6.9-4.8 4.6 1.2 6.5L12 18.9 6.1 21l1.2-6.5L2.5 9.9l6.6-.9z"/></svg>';

  function starsHtml(n) {
    let h = '<span class="stars">';
    for (let i = 1; i <= 5; i++) h += starSvg(i <= n);
    h += "</span>";
    return h;
  }

  // ---------- Filtering / sorting ----------
  function computeRows() {
    const q = state.query.trim().toLowerCase();
    let rows = data.filter((r) => {
      if (r.rating < state.minRating || r.rating > state.maxRating) return false;
      if (!q) return true;
      const hay = (r.dateLabel + " " + r.event + " " + r.eventType + " " + r.name + " " + r.role + " " + r.rating + " stars " + r.feedback).toLowerCase();
      return q.split(/\s+/).every((t) => hay.indexOf(t) !== -1);
    });
    const dir = state.sortDir === "asc" ? 1 : -1;
    const key = state.sortKey;
    rows.sort((a, b) => {
      let av = a[key], bv = b[key];
      if (typeof av === "string") { av = av.toLowerCase(); bv = bv.toLowerCase(); }
      if (av < bv) return -1 * dir;
      if (av > bv) return 1 * dir;
      return a.ts < b.ts ? 1 : -1; // stable-ish tiebreak by recency
    });
    return rows;
  }

  // ---------- Renderers ----------
  function renderStats() {
    const total = data.length;
    const avg = (data.reduce((s, r) => s + r.rating, 0) / total).toFixed(2);
    const promoters = data.filter((r) => r.rating >= 4).length;
    const promoterPct = Math.round((promoters / total) * 100);
    const lowCount = data.filter((r) => r.rating <= 2).length;

    const cards = [
      { label: "Total Submissions", value: total, sub: "", trend: "+12% vs Q1", up: true,
        icon: '<path d="M3 3v18h18"/><path d="M18 9l-5 5-3-3-4 4"/>' },
      { label: "Average Rating", value: avg, sub: "/ 5.0", trend: "+0.3", up: true,
        icon: '<path d="M12 2.5l2.9 6 6.6.9-4.8 4.6 1.2 6.5L12 18.9 6.1 21l1.2-6.5L2.5 9.9l6.6-.9z"/>' },
      { label: "Promoters (4★+)", value: promoterPct + "%", sub: "", trend: promoters + " people", up: true,
        icon: '<path d="M7 10v12"/><path d="M15 5.88L14 10h5.83a2 2 0 0 1 1.92 2.56l-2.33 8A2 2 0 0 1 17.5 22H4a2 2 0 0 1-2-2v-8a2 2 0 0 1 2-2h2.76a2 2 0 0 0 1.79-1.11L12 2a3.13 3.13 0 0 1 3 3.88z"/>' },
      { label: "Needs Attention", value: lowCount, sub: "≤ 2★", trend: lowCount > 4 ? "review" : "low risk", up: false,
        icon: '<path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><path d="M12 9v4"/><path d="M12 17h.01"/>' }
    ];

    $("stats").innerHTML = cards.map((c) => `
      <div class="stat">
        <div class="spark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${c.icon}</svg></div>
        <div class="label">${c.label}</div>
        <div class="value">${c.value}${c.sub ? "<small>" + c.sub + "</small>" : ""}</div>
        <div class="trend ${c.up ? "up" : "down"}">
          <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">${c.up ? '<path d="M7 17 17 7"/><path d="M8 7h9v9"/>' : '<path d="M7 7l10 10"/><path d="M16 17H7V8"/>'}</svg>
          ${c.trend}
        </div>
      </div>`).join("");
  }

  function renderAI() {
    const total = data.length;
    const avg = (data.reduce((s, r) => s + r.rating, 0) / total).toFixed(2);
    const promoters = data.filter((r) => r.rating >= 4).length;
    const promoterPct = Math.round((promoters / total) * 100);
    // Find best & worst event by average rating
    const byEvent = {};
    data.forEach((r) => {
      (byEvent[r.event] = byEvent[r.event] || []).push(r.rating);
    });
    let best = null, worst = null;
    Object.keys(byEvent).forEach((ev) => {
      const a = byEvent[ev].reduce((s, x) => s + x, 0) / byEvent[ev].length;
      if (best === null || a > best.avg) best = { ev, avg: a };
      if (worst === null || a < worst.avg) worst = { ev, avg: a };
    });

    $("aiBody").innerHTML =
      `Across <strong>${total} submissions</strong>, sentiment is broadly positive with an average rating of ` +
      `<strong>${avg} / 5.0</strong> and <strong>${promoterPct}% promoters</strong>. Attendees consistently praised ` +
      `<strong>${esc(best.ev)}</strong> (${best.avg.toFixed(1)}★), highlighting strong keynotes, networking, and hands-on workshops. ` +
      `The most common friction points are <strong>schedule overruns</strong> and <strong>logistics</strong> — audio issues, ` +
      `crowded rooms, and slow check-in. <strong>${esc(worst.ev)}</strong> (${worst.avg.toFixed(1)}★) is the clearest opportunity ` +
      `to improve next quarter.`;

    const chips = [
      ["Top driver", "Hands-on workshops"],
      ["Watch-out", "Schedule overruns"],
      ["Highest rated", best.ev],
      ["Focus area", worst.ev]
    ];
    $("aiChips").innerHTML = chips.map((c) => `<span class="ai-chip">${esc(c[0])}: <b>${esc(c[1])}</b></span>`).join("");
  }

  function renderHead() {
    const head = $("headRow");
    head.innerHTML = columns.map((c) => {
      const sorted = state.sortKey === c.key;
      const upActive = sorted && state.sortDir === "asc";
      const downActive = sorted && state.sortDir === "desc";
      return `<th data-key="${c.key}" class="${sorted ? "sorted" : ""}">
        <span class="th-inner">${c.label}
          <span class="sort-icon">
            <svg class="${upActive ? "active-arrow" : ""}" viewBox="0 0 24 24" fill="currentColor"><path d="M12 6l6 8H6z"/></svg>
            <svg class="${downActive ? "active-arrow" : ""}" viewBox="0 0 24 24" fill="currentColor"><path d="M12 18l-6-8h12z"/></svg>
          </span>
        </span>
      </th>`;
    }).join("");
    head.querySelectorAll("th").forEach((th) => {
      th.addEventListener("click", () => {
        const key = th.getAttribute("data-key");
        if (state.sortKey === key) {
          state.sortDir = state.sortDir === "asc" ? "desc" : "asc";
        } else {
          state.sortKey = key;
          state.sortDir = key === "ts" || key === "rating" ? "desc" : "asc";
        }
        render();
      });
    });
  }

  function renderBody() {
    const rows = computeRows();
    const q = state.query.trim();
    const tbody = $("tbody");

    $("rowCount").textContent = rows.length;
    $("footShown").textContent = rows.length;
    $("footTotal").textContent = data.length;

    if (rows.length) {
      const avg = (rows.reduce((s, r) => s + r.rating, 0) / rows.length).toFixed(2);
      $("footAvg").innerHTML = "Avg. rating of shown · <b>" + avg + " ★</b>";
    } else {
      $("footAvg").innerHTML = "";
    }

    $("emptyState").style.display = rows.length ? "none" : "block";

    tbody.innerHTML = rows.map((r) => {
      const isExp = expanded.has(r.id);
      const long = r.feedback.length > 110;
      return `<tr>
        <td class="col-date">${highlight(r.dateLabel, q)}</td>
        <td class="col-event">
          <div>${highlight(r.event, q)}</div>
          <span class="event-tag">${highlight(r.eventType, q)}</span>
        </td>
        <td>
          <div class="participant">
            <span class="avatar" style="background:${r.color}">${r.initials}</span>
            <span>
              <span class="pname">${highlight(r.name, q)}</span><br>
              <span class="prole">${highlight(r.role, q)}</span>
            </span>
          </div>
        </td>
        <td class="col-rating">
          <span class="rating">${starsHtml(r.rating)}<span class="num">${r.rating}.0</span></span>
        </td>
        <td class="col-feedback">
          <div class="feedback-text ${long && !isExp ? "clamped" : ""}">${highlight(r.feedback, q)}</div>
          ${long ? `<button class="feedback-toggle" data-id="${r.id}">${isExp ? "Show less" : "Read more"}</button>` : ""}
        </td>
      </tr>`;
    }).join("");

    tbody.querySelectorAll(".feedback-toggle").forEach((btn) => {
      btn.addEventListener("click", () => {
        const id = +btn.getAttribute("data-id");
        if (expanded.has(id)) expanded.delete(id); else expanded.add(id);
        renderBody();
      });
    });
  }

  function render() {
    renderHead();
    renderBody();
  }

  // ---------- Events ----------
  const searchEl = $("search");
  const clearEl = $("clearSearch");
  searchEl.addEventListener("input", () => {
    state.query = searchEl.value;
    clearEl.classList.toggle("show", searchEl.value.length > 0);
    renderBody();
  });
  clearEl.addEventListener("click", () => {
    searchEl.value = "";
    state.query = "";
    clearEl.classList.remove("show");
    searchEl.focus();
    renderBody();
  });

  $("ratingFilter").querySelectorAll("button").forEach((btn) => {
    btn.addEventListener("click", () => {
      $("ratingFilter").querySelectorAll("button").forEach((b) => b.classList.remove("active"));
      btn.classList.add("active");
      state.minRating = +btn.getAttribute("data-min") || 0;
      state.maxRating = btn.hasAttribute("data-max") ? +btn.getAttribute("data-max") : 5;
      renderBody();
    });
  });

  $("aiClose").addEventListener("click", () => {
    $("aiSummary").style.display = "none";
    $("aiRestore").classList.add("show");
  });
  $("aiRestoreBtn").addEventListener("click", () => {
    $("aiSummary").style.display = "";
    $("aiRestore").classList.remove("show");
  });

  // ---------- Init ----------
  renderStats();
  renderAI();
  render();
})();
</script>
</body>
</html>
