<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Virtual Drum Kit — Studio</title>
<style>
  :root {
    --bg-0: #0a0a0f;
    --bg-1: #12121b;
    --bg-2: #1a1a26;
    --panel: #16161f;
    --line: #2a2a3a;
    --txt: #e8e8f0;
    --txt-dim: #8a8aa0;
    --accent: #ff3d6e;
    --accent-2: #00e5d4;
    --gold: #f5b942;
    --glow: 0 0 24px rgba(255,61,110,0.45);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body { height: 100%; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background:
      radial-gradient(1200px 700px at 50% -10%, #1d1d2e 0%, transparent 60%),
      radial-gradient(900px 600px at 100% 100%, #1a1224 0%, transparent 55%),
      linear-gradient(180deg, var(--bg-0), #08080c);
    color: var(--txt);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    padding: 18px 14px 40px;
    user-select: none;
  }

  /* ===== Header ===== */
  .topbar {
    width: 100%;
    max-width: 1080px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 18px;
  }
  .brand { display: flex; align-items: center; gap: 14px; }
  .logo {
    width: 46px; height: 46px; border-radius: 12px;
    display: grid; place-items: center;
    background: linear-gradient(145deg, var(--accent), #b81d4a);
    box-shadow: var(--glow), inset 0 1px 0 rgba(255,255,255,0.25);
    position: relative;
  }
  .logo::after {
    content: ""; position: absolute; inset: 8px; border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.85);
    box-shadow: inset 0 0 8px rgba(0,0,0,0.4);
  }
  .title h1 {
    font-size: 22px; font-weight: 800; letter-spacing: 0.5px;
    background: linear-gradient(90deg, #fff, var(--accent-2));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .title p { font-size: 11px; color: var(--txt-dim); letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }

  .kit-select {
    display: flex; gap: 6px; background: var(--bg-1);
    padding: 5px; border-radius: 12px; border: 1px solid var(--line);
  }
  .kit-select button {
    background: transparent; border: none; color: var(--txt-dim);
    font-size: 12px; font-weight: 700; padding: 8px 14px; border-radius: 8px;
    cursor: pointer; transition: all 0.2s; letter-spacing: 0.5px;
  }
  .kit-select button.active {
    background: linear-gradient(145deg, var(--accent-2), #009e92);
    color: #04201d; box-shadow: 0 0 14px rgba(0,229,212,0.4);
  }

  /* ===== Transport ===== */
  .transport {
    width: 100%; max-width: 1080px;
    background: linear-gradient(180deg, var(--panel), var(--bg-1));
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 14px 18px;
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    margin-bottom: 18px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.04);
  }
  .t-btn {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg-2); border: 1px solid var(--line);
    color: var(--txt); font-weight: 700; font-size: 13px;
    padding: 11px 18px; border-radius: 11px; cursor: pointer;
    transition: all 0.18s; position: relative; min-height: 44px;
  }
  .t-btn:hover { border-color: var(--accent-2); transform: translateY(-1px); }
  .t-btn:active { transform: translateY(0); }
  .t-btn .dot { width: 11px; height: 11px; border-radius: 50%; background: var(--txt-dim); transition: all 0.2s; }
  .t-btn.rec .dot { background: var(--accent); }
  .t-btn.rec.armed { background: linear-gradient(145deg, #ff3d6e, #c01045); border-color: #ff3d6e; box-shadow: var(--glow); }
  .t-btn.rec.armed .dot { background: #fff; animation: blink 1s infinite; }
  .t-btn.play.playing { background: linear-gradient(145deg, var(--accent-2), #009e92); color: #04201d; border-color: var(--accent-2); }
  .t-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
  @keyframes blink { 50% { opacity: 0.3; } }

  .meta { display: flex; align-items: center; gap: 18px; margin-left: auto; flex-wrap: wrap; }
  .meta-item { display: flex; flex-direction: column; align-items: center; min-width: 64px; }
  .meta-item .val { font-size: 18px; font-weight: 800; font-variant-numeric: tabular-nums; color: var(--accent-2); }
  .meta-item .lbl { font-size: 9px; color: var(--txt-dim); text-transform: uppercase; letter-spacing: 1.5px; margin-top: 2px; }

  .vol-wrap { display: flex; align-items: center; gap: 10px; }
  .vol-wrap label { font-size: 10px; color: var(--txt-dim); text-transform: uppercase; letter-spacing: 1px; }
  input[type=range] {
    -webkit-appearance: none; appearance: none; width: 110px; height: 6px;
    border-radius: 6px; background: var(--bg-2); outline: none; cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none; width: 18px; height: 18px; border-radius: 50%;
    background: linear-gradient(145deg, #fff, var(--accent-2)); box-shadow: 0 0 8px rgba(0,229,212,0.6);
  }
  input[type=range]::-moz-range-thumb {
    width: 18px; height: 18px; border-radius: 50%; border: none;
    background: linear-gradient(145deg, #fff, var(--accent-2)); box-shadow: 0 0 8px rgba(0,229,212,0.6);
  }

  /* ===== Stage / Drum Kit ===== */
  .stage {
    width: 100%; max-width: 1080px;
    background:
      radial-gradient(600px 280px at 50% 0%, rgba(255,61,110,0.10), transparent 70%),
      linear-gradient(180deg, #0e0e16, #0a0a10);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 26px 22px 30px;
    box-shadow: 0 18px 50px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.04);
    position: relative;
    overflow: hidden;
  }
  .stage::before {
    content: ""; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), var(--accent-2), transparent);
    opacity: 0.6;
  }

  .pad-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
  }

  .pad {
    position: relative;
    aspect-ratio: 1 / 1;
    border-radius: 18px;
    border: 1px solid var(--line);
    background: linear-gradient(160deg, var(--bg-2), #0e0e15);
    cursor: pointer;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 6px;
    transition: transform 0.06s ease, box-shadow 0.18s ease, border-color 0.18s;
    overflow: hidden;
    min-height: 96px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), 0 6px 16px rgba(0,0,0,0.4);
  }
  .pad .ring {
    position: absolute; inset: 14%;
    border-radius: 50%;
    border: 2px solid var(--pad-color, var(--accent));
    opacity: 0.25;
    transition: all 0.18s;
  }
  .pad .ring::after {
    content: ""; position: absolute; inset: 10%; border-radius: 50%;
    border: 1px dashed rgba(255,255,255,0.12);
  }
  .pad .icon { font-size: 30px; z-index: 2; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
  .pad .name { z-index: 2; font-size: 12px; font-weight: 800; letter-spacing: 0.5px; }
  .pad .key {
    position: absolute; top: 8px; right: 8px; z-index: 2;
    font-size: 10px; font-weight: 800; color: var(--txt-dim);
    background: rgba(0,0,0,0.4); border: 1px solid var(--line);
    padding: 3px 7px; border-radius: 6px; min-width: 22px; text-align: center;
  }
  .pad:hover { border-color: var(--pad-color, var(--accent)); }
  .pad.hit {
    transform: scale(0.95) translateY(2px);
    border-color: var(--pad-color, var(--accent));
    box-shadow: 0 0 30px -2px var(--pad-color, var(--accent)), inset 0 0 20px rgba(255,255,255,0.06);
  }
  .pad.hit .ring { opacity: 0.9; inset: 11%; box-shadow: 0 0 20px var(--pad-color, var(--accent)); }
  .pad.hit .icon { transform: scale(1.12); }

  .pad .flash {
    position: absolute; inset: 0; border-radius: 18px;
    background: radial-gradient(circle at center, var(--pad-color, var(--accent)) 0%, transparent 60%);
    opacity: 0; pointer-events: none;
  }
  .pad.hit .flash { animation: flash 0.4s ease-out; }
  @keyframes flash { 0% { opacity: 0.5; } 100% { opacity: 0; } }

  /* ===== Footer / hint ===== */
  .hint {
    margin-top: 18px; font-size: 12px; color: var(--txt-dim);
    text-align: center; line-height: 1.7; max-width: 1080px;
  }
  .hint kbd {
    background: var(--bg-2); border: 1px solid var(--line); border-radius: 5px;
    padding: 1px 7px; font-size: 11px; color: var(--txt); font-family: inherit; font-weight: 700;
  }
  .hint .live { color: var(--accent); font-weight: 800; }

  .toast {
    position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--bg-2); border: 1px solid var(--accent-2);
    color: var(--txt); padding: 12px 22px; border-radius: 12px;
    font-size: 13px; font-weight: 600; box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    transition: transform 0.35s cubic-bezier(.2,.9,.3,1.3); z-index: 50; pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 720px) {
    .pad-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .pad { min-height: 120px; }
    .pad .icon { font-size: 36px; }
    .meta { width: 100%; justify-content: space-between; margin-left: 0; }
    .title h1 { font-size: 18px; }
    .transport { gap: 10px; }
    .t-btn { flex: 1; justify-content: center; }
  }
</style>
</head>
<body>

  <div class="topbar">
    <div class="brand">
      <div class="logo"></div>
      <div class="title">
        <h1>Virtual Drum Kit</h1>
        <p>Studio Session</p>
      </div>
    </div>
    <div class="kit-select" id="kitSelect">
      <button class="active" data-kit="acoustic">Acoustic</button>
      <button data-kit="electro">Electro</button>
      <button data-kit="lofi">Lo-Fi</button>
    </div>
  </div>

  <div class="transport">
    <button class="t-btn rec" id="recBtn"><span class="dot"></span> Record</button>
    <button class="t-btn play" id="playBtn" disabled><span class="dot"></span> Play</button>
    <button class="t-btn" id="loopBtn"><span class="dot"></span> Loop</button>
    <button class="t-btn" id="clearBtn">Clear</button>

    <div class="meta">
      <div class="vol-wrap">
        <label>Vol</label>
        <input type="range" id="vol" min="0" max="100" value="80" />
      </div>
      <div class="meta-item">
        <span class="val" id="timeVal">0.0s</span>
        <span class="lbl">Time</span>
      </div>
      <div class="meta-item">
        <span class="val" id="hitVal">0</span>
        <span class="lbl">Hits</span>
      </div>
    </div>
  </div>

  <div class="stage">
    <div class="pad-grid" id="padGrid"></div>
  </div>

  <div class="hint">
    Tap a pad or press its key to play. Hit <kbd>Record</kbd>, lay down a groove, then <kbd>Play</kbd> it back.
    <br />
    <span id="statusLine">Ready — click anywhere to wake the audio engine.</span>
  </div>

  <div class="toast" id="toast"></div>

<script>
(() => {
  "use strict";

  /* ============================================================
     Audio Engine — fully synthesized drum sounds (no samples).
     Each kit re-flavors parameters of the same synthesis graph.
     ============================================================ */
  let AC = null;
  let master = null;
  let comp = null;

  function ensureAudio() {
    if (AC) {
      if (AC.state === "suspended") AC.resume();
      return;
    }
    AC = new (window.AudioContext || window.webkitAudioContext)();
    comp = AC.createDynamicsCompressor();
    comp.threshold.value = -14; comp.knee.value = 24; comp.ratio.value = 4;
    comp.attack.value = 0.003; comp.release.value = 0.18;
    master = AC.createGain();
    master.gain.value = parseInt(volEl.value, 10) / 100 * 0.9;
    comp.connect(master).connect(AC.destination);
    setStatus("Audio engine live. Play something.");
  }

  const now = () => AC.currentTime;

  function noiseBuffer(dur) {
    const len = Math.floor(AC.sampleRate * dur);
    const buf = AC.createBuffer(1, len, AC.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    return buf;
  }

  function env(node, t, peak, attack, decay) {
    node.gain.cancelScheduledValues(t);
    node.gain.setValueAtTime(0.0001, t);
    node.gain.exponentialRampToValueAtTime(peak, t + attack);
    node.gain.exponentialRampToValueAtTime(0.0001, t + attack + decay);
  }

  // ---- Drum voice synthesizers. flavor tweaks per kit. ----
  const Voices = {
    kick(t, f) {
      const o = AC.createOscillator(), g = AC.createGain();
      o.type = f.kickType;
      const f0 = f.kickPitch, f1 = f0 * 0.18;
      o.frequency.setValueAtTime(f0, t);
      o.frequency.exponentialRampToValueAtTime(Math.max(30, f1), t + 0.12);
      env(g, t, 1.0, 0.004, f.kickDecay);
      o.connect(g).connect(comp);
      o.start(t); o.stop(t + f.kickDecay + 0.05);
      if (f.kickClick) {
        const c = AC.createBufferSource(), cg = AC.createGain();
        c.buffer = noiseBuffer(0.03);
        cg.gain.setValueAtTime(0.4, t); cg.gain.exponentialRampToValueAtTime(0.001, t + 0.03);
        c.connect(cg).connect(comp); c.start(t); c.stop(t + 0.04);
      }
    },
    snare(t, f) {
      const n = AC.createBufferSource(), ng = AC.createGain(), hp = AC.createBiquadFilter();
      n.buffer = noiseBuffer(0.3);
      hp.type = "highpass"; hp.frequency.value = f.snareHP;
      env(ng, t, 0.75, 0.002, f.snareDecay);
      n.connect(hp).connect(ng).connect(comp);
      n.start(t); n.stop(t + f.snareDecay + 0.05);
      const o = AC.createOscillator(), og = AC.createGain();
      o.type = "triangle"; o.frequency.setValueAtTime(f.snareTone, t);
      o.frequency.exponentialRampToValueAtTime(f.snareTone * 0.6, t + 0.1);
      env(og, t, 0.5, 0.002, 0.1);
      o.connect(og).connect(comp); o.start(t); o.stop(t + 0.16);
    },
    hat(t, f, open) {
      const dur = open ? f.hatOpen : f.hatClosed;
      const n = AC.createBufferSource(), ng = AC.createGain(), hp = AC.createBiquadFilter();
      n.buffer = noiseBuffer(dur + 0.05);
      hp.type = "highpass"; hp.frequency.value = f.hatHP;
      env(ng, t, 0.4, 0.001, dur);
      n.connect(hp).connect(ng).connect(comp);
      n.start(t); n.stop(t + dur + 0.05);
    },
    tom(t, f, pitch) {
      const o = AC.createOscillator(), g = AC.createGain();
      o.type = "sine";
      o.frequency.setValueAtTime(pitch, t);
      o.frequency.exponentialRampToValueAtTime(pitch * 0.55, t + 0.25);
      env(g, t, 0.85, 0.004, f.tomDecay);
      o.connect(g).connect(comp);
      o.start(t); o.stop(t + f.tomDecay + 0.05);
    },
    clap(t, f) {
      const hp = AC.createBiquadFilter();
      hp.type = "bandpass"; hp.frequency.value = 1400; hp.Q.value = 1.2;
      hp.connect(comp);
      const offsets = [0, 0.012, 0.024, 0.04];
      offsets.forEach((off, i) => {
        const n = AC.createBufferSource(), g = AC.createGain();
        n.buffer = noiseBuffer(0.12);
        const peak = i === offsets.length - 1 ? 0.6 : 0.4;
        g.gain.setValueAtTime(0.0001, t + off);
        g.gain.exponentialRampToValueAtTime(peak, t + off + 0.002);
        g.gain.exponentialRampToValueAtTime(0.0001, t + off + (i === offsets.length - 1 ? 0.18 : 0.04));
        n.connect(g).connect(hp); n.start(t + off); n.stop(t + off + 0.2);
      });
    },
    crash(t, f) {
      const n = AC.createBufferSource(), ng = AC.createGain(), hp = AC.createBiquadFilter();
      n.buffer = noiseBuffer(1.6);
      hp.type = "highpass"; hp.frequency.value = 5000;
      env(ng, t, 0.5, 0.002, f.crashDecay);
      n.connect(hp).connect(ng).connect(comp);
      n.start(t); n.stop(t + f.crashDecay + 0.1);
    }
  };

  // ---- Kit flavor presets ----
  const KITS = {
    acoustic: {
      kickType: "sine", kickPitch: 150, kickDecay: 0.45, kickClick: true,
      snareHP: 1800, snareDecay: 0.2, snareTone: 190,
      hatHP: 8000, hatClosed: 0.05, hatOpen: 0.4,
      tomDecay: 0.4, crashDecay: 1.4
    },
    electro: {
      kickType: "sine", kickPitch: 180, kickDecay: 0.55, kickClick: false,
      snareHP: 2400, snareDecay: 0.16, snareTone: 240,
      hatHP: 9500, hatClosed: 0.04, hatOpen: 0.3,
      tomDecay: 0.45, crashDecay: 1.2
    },
    lofi: {
      kickType: "triangle", kickPitch: 120, kickDecay: 0.4, kickClick: true,
      snareHP: 1400, snareDecay: 0.22, snareTone: 160,
      hatHP: 6500, hatClosed: 0.06, hatOpen: 0.45,
      tomDecay: 0.5, crashDecay: 1.5
    }
  };
  let currentKit = "acoustic";

  /* ============================================================
     Pad definitions
     ============================================================ */
  const PADS = [
    { id: "kick",  name: "Kick",     key: "A", icon: "🥁", color: "#ff3d6e", play: f => Voices.kick(now(), f) },
    { id: "snare", name: "Snare",    key: "S", icon: "🪘", color: "#00e5d4", play: f => Voices.snare(now(), f) },
    { id: "hatc",  name: "Hat",      key: "D", icon: "🎩", color: "#f5b942", play: f => Voices.hat(now(), f, false) },
    { id: "hato",  name: "Open Hat", key: "F", icon: "👒", color: "#ffd166", play: f => Voices.hat(now(), f, true) },
    { id: "tom1",  name: "Tom Hi",   key: "G", icon: "🛢️", color: "#9d7bff", play: f => Voices.tom(now(), f, 220) },
    { id: "tom2",  name: "Tom Lo",   key: "H", icon: "🛢️", color: "#7b9dff", play: f => Voices.tom(now(), f, 140) },
    { id: "clap",  name: "Clap",     key: "J", icon: "👏", color: "#ff8a3d", play: f => Voices.clap(now(), f) },
    { id: "crash", name: "Crash",    key: "K", icon: "💥", color: "#46e36b", play: f => Voices.crash(now(), f) },
  ];
  const byKey = {};
  PADS.forEach(p => byKey[p.key] = p);

  /* ============================================================
     DOM build
     ============================================================ */
  const padGrid = document.getElementById("padGrid");
  const volEl = document.getElementById("vol");
  const toastEl = document.getElementById("toast");
  const statusLine = document.getElementById("statusLine");
  const padEls = {};

  PADS.forEach(p => {
    const el = document.createElement("div");
    el.className = "pad";
    el.style.setProperty("--pad-color", p.color);
    el.dataset.id = p.id;
    el.innerHTML = `
      <div class="flash"></div>
      <div class="ring"></div>
      <span class="key">${p.key}</span>
      <span class="icon">${p.icon}</span>
      <span class="name">${p.name}</span>`;
    el.addEventListener("pointerdown", (e) => { e.preventDefault(); trigger(p.id, true); });
    padGrid.appendChild(el);
    padEls[p.id] = el;
  });

  function flashPad(id) {
    const el = padEls[id];
    if (!el) return;
    el.classList.remove("hit");
    // force reflow to restart animation
    void el.offsetWidth;
    el.classList.add("hit");
    setTimeout(() => el.classList.remove("hit"), 130);
  }

  /* ============================================================
     Trigger + recording
     ============================================================ */
  let hitCount = 0;
  const hitVal = document.getElementById("hitVal");

  function trigger(id, userInitiated) {
    ensureAudio();
    const pad = PADS.find(p => p.id === id);
    if (!pad) return;
    pad.play(KITS[currentKit]);
    flashPad(id);
    hitCount++;
    hitVal.textContent = hitCount;
    if (recording && userInitiated) {
      recEvents.push({ id, t: now() - recStart });
    }
  }

  /* ============================================================
     Transport: record / play / loop / clear
     ============================================================ */
  const recBtn = document.getElementById("recBtn");
  const playBtn = document.getElementById("playBtn");
  const loopBtn = document.getElementById("loopBtn");
  const clearBtn = document.getElementById("clearBtn");
  const timeVal = document.getElementById("timeVal");

  let recording = false;
  let recEvents = [];
  let recStart = 0;
  let recDuration = 0;
  let playing = false;
  let loopMode = false;
  let playTimers = [];
  let timeRaf = null;
  let playClockStart = 0;

  function setStatus(msg) { statusLine.textContent = msg; }

  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    clearTimeout(toast._t);
    toast._t = setTimeout(() => toastEl.classList.remove("show"), 1800);
  }

  function startRecording() {
    ensureAudio();
    stopPlayback();
    recording = true;
    recEvents = [];
    recStart = now();
    recBtn.classList.add("armed");
    recBtn.innerHTML = '<span class="dot"></span> Recording…';
    playBtn.disabled = true;
    setStatus("Recording… play your groove. Hit Record again to stop.");
    startTimer(() => now() - recStart);
    toast("● Recording started");
  }

  function stopRecording() {
    recording = false;
    recDuration = now() - recStart;
    recBtn.classList.remove("armed");
    recBtn.innerHTML = '<span class="dot"></span> Record';
    stopTimer();
    timeVal.textContent = recDuration.toFixed(1) + "s";
    if (recEvents.length) {
      playBtn.disabled = false;
      setStatus(`Captured ${recEvents.length} hits over ${recDuration.toFixed(1)}s. Press Play.`);
      toast("■ Recorded " + recEvents.length + " hits");
    } else {
      setStatus("Nothing recorded — give it another go.");
      toast("Empty take");
    }
  }

  recBtn.addEventListener("click", () => {
    if (recording) stopRecording(); else startRecording();
  });

  function startPlayback() {
    if (!recEvents.length) return;
    ensureAudio();
    if (recording) stopRecording();
    playing = true;
    playBtn.classList.add("playing");
    playBtn.innerHTML = '<span class="dot"></span> Stop';
    setStatus(loopMode ? "Playing back (looping)…" : "Playing back…");
    runLoopPass();
  }

  function runLoopPass() {
    playClockStart = now();
    startTimer(() => Math.min(now() - playClockStart, recDuration));
    playTimers = [];
    recEvents.forEach(ev => {
      const id = setTimeout(() => { trigger(ev.id, false); }, ev.t * 1000);
      playTimers.push(id);
    });
    const endId = setTimeout(() => {
      if (loopMode && playing) {
        runLoopPass();
      } else {
        stopPlayback();
      }
    }, recDuration * 1000 + 120);
    playTimers.push(endId);
  }

  function stopPlayback() {
    playing = false;
    playTimers.forEach(clearTimeout);
    playTimers = [];
    playBtn.classList.remove("playing");
    playBtn.innerHTML = '<span class="dot"></span> Play';
    stopTimer();
    if (recDuration) timeVal.textContent = recDuration.toFixed(1) + "s";
    setStatus("Ready.");
  }

  playBtn.addEventListener("click", () => {
    if (playing) stopPlayback(); else startPlayback();
  });

  loopBtn.addEventListener("click", () => {
    loopMode = !loopMode;
    loopBtn.classList.toggle("playing", loopMode);
    loopBtn.querySelector(".dot").style.background = loopMode ? "#00e5d4" : "";
    toast(loopMode ? "Loop on" : "Loop off");
  });

  clearBtn.addEventListener("click", () => {
    stopPlayback();
    if (recording) stopRecording();
    recEvents = [];
    recDuration = 0;
    playBtn.disabled = true;
    hitCount = 0;
    hitVal.textContent = "0";
    timeVal.textContent = "0.0s";
    setStatus("Cleared. Fresh canvas.");
    toast("Cleared");
  });

  /* ============================================================
     Timer display
     ============================================================ */
  function startTimer(getter) {
    stopTimer();
    const tick = () => {
      timeVal.textContent = getter().toFixed(1) + "s";
      timeRaf = requestAnimationFrame(tick);
    };
    tick();
  }
  function stopTimer() {
    if (timeRaf) cancelAnimationFrame(timeRaf);
    timeRaf = null;
  }

  /* ============================================================
     Volume + kit selection
     ============================================================ */
  volEl.addEventListener("input", () => {
    if (master) master.gain.value = parseInt(volEl.value, 10) / 100 * 0.9;
  });

  document.getElementById("kitSelect").addEventListener("click", (e) => {
    const btn = e.target.closest("button");
    if (!btn) return;
    document.querySelectorAll("#kitSelect button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentKit = btn.dataset.kit;
    ensureAudio();
    toast(btn.textContent + " kit");
    // preview
    Voices.snare(now(), KITS[currentKit]);
  });

  /* ============================================================
     Keyboard
     ============================================================ */
  const pressed = new Set();
  window.addEventListener("keydown", (e) => {
    if (e.repeat) return;
    const k = e.key.toUpperCase();
    if (k === " " || e.code === "Space") {
      e.preventDefault();
      if (playing) stopPlayback(); else if (recEvents.length) startPlayback();
      return;
    }
    if (k === "R") { e.preventDefault(); recBtn.click(); return; }
    if (byKey[k]) {
      e.preventDefault();
      pressed.add(k);
      trigger(byKey[k].id, true);
    }
  });
  window.addEventListener("keyup", (e) => pressed.delete(e.key.toUpperCase()));

  // Wake audio on first interaction anywhere
  ["pointerdown", "keydown"].forEach(ev =>
    window.addEventListener(ev, ensureAudio, { once: true })
  );

})();
</script>
</body>
</html>
