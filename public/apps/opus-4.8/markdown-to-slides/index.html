<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Markdown → Slides</title>
<style>
  :root {
    --bg: #0b0d12;
    --bg-soft: #11141b;
    --panel: #151922;
    --panel-2: #1b2029;
    --border: #262c38;
    --border-soft: #1f2530;
    --text: #e7eaf0;
    --text-dim: #9aa3b2;
    --text-faint: #6b7384;
    --accent: #6366f1;
    --accent-2: #8b5cf6;
    --accent-glow: rgba(99, 102, 241, 0.35);
    --good: #34d399;
    --shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.7);
    --mono: "SF Mono", "JetBrains Mono", "Fira Code", ui-monospace, Menlo, Consolas, monospace;
    --sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;

    /* slide theme (business / dark default) */
    --slide-bg: #0f1117;
    --slide-bg-2: #161a24;
    --slide-text: #f4f6fb;
    --slide-text-dim: #aab2c2;
    --slide-heading: #ffffff;
    --slide-accent: #818cf8;
    --slide-rule: rgba(255, 255, 255, 0.1);
    --slide-code-bg: rgba(255, 255, 255, 0.05);
  }

  [data-slide-theme="light"] {
    --slide-bg: #fbfbfd;
    --slide-bg-2: #f1f2f6;
    --slide-text: #1d2330;
    --slide-text-dim: #5b6577;
    --slide-heading: #0d1018;
    --slide-accent: #5b50e0;
    --slide-rule: rgba(0, 0, 0, 0.1);
    --slide-code-bg: rgba(0, 0, 0, 0.045);
  }

  [data-slide-theme="midnight"] {
    --slide-bg: #06070d;
    --slide-bg-2: #0d1530;
    --slide-text: #e9ecff;
    --slide-text-dim: #9fa8d4;
    --slide-heading: #ffffff;
    --slide-accent: #38bdf8;
    --slide-rule: rgba(120, 160, 255, 0.16);
    --slide-code-bg: rgba(120, 160, 255, 0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    font-family: var(--sans);
    background:
      radial-gradient(1200px 600px at 12% -10%, rgba(99, 102, 241, 0.1), transparent 60%),
      radial-gradient(1000px 500px at 100% 0%, rgba(139, 92, 246, 0.08), transparent 55%),
      var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ---------- Top bar ---------- */
  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 20px;
    height: 60px;
    border-bottom: 1px solid var(--border);
    background: rgba(13, 16, 22, 0.7);
    backdrop-filter: blur(12px);
    position: relative;
    z-index: 20;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 11px;
    font-weight: 650;
    font-size: 15px;
    letter-spacing: -0.01em;
  }
  .brand .logo {
    width: 30px; height: 30px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    display: grid; place-items: center;
    box-shadow: 0 4px 14px var(--accent-glow);
    flex-shrink: 0;
  }
  .brand .logo svg { width: 17px; height: 17px; }
  .brand .arrow { color: var(--text-faint); font-weight: 400; }
  .brand .sub { color: var(--text-dim); font-weight: 500; }

  .spacer { flex: 1; }

  .toolbar { display: flex; align-items: center; gap: 8px; }

  button.btn, .btn {
    appearance: none;
    border: 1px solid var(--border);
    background: var(--panel-2);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 550;
    padding: 8px 13px;
    border-radius: 9px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    transition: all 0.15s ease;
    white-space: nowrap;
    user-select: none;
  }
  button.btn:hover, .btn:hover {
    background: #232a36;
    border-color: #333c4c;
    transform: translateY(-1px);
  }
  button.btn:active { transform: translateY(0); }
  button.btn svg { width: 15px; height: 15px; opacity: 0.9; }

  .btn.primary {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    border-color: transparent;
    box-shadow: 0 4px 14px var(--accent-glow);
  }
  .btn.primary:hover { box-shadow: 0 6px 20px var(--accent-glow); }

  .btn.ghost { background: transparent; }

  .seg {
    display: flex;
    border: 1px solid var(--border);
    border-radius: 9px;
    overflow: hidden;
    background: var(--panel-2);
  }
  .seg button {
    appearance: none;
    border: none;
    background: transparent;
    color: var(--text-dim);
    font-family: var(--sans);
    font-size: 12.5px;
    font-weight: 550;
    padding: 7px 12px;
    cursor: pointer;
    transition: all 0.15s ease;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .seg button svg { width: 14px; height: 14px; }
  .seg button.active { background: var(--accent); color: #fff; }
  .seg button:not(.active):hover { color: var(--text); background: #232a36; }

  /* ---------- Layout ---------- */
  main {
    display: grid;
    grid-template-columns: minmax(320px, 0.85fr) 1.15fr;
    height: calc(100vh - 60px);
  }

  /* Editor pane */
  .editor-pane {
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    background: var(--bg-soft);
    min-width: 0;
  }
  .pane-head {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 16px;
    border-bottom: 1px solid var(--border-soft);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-faint);
    font-weight: 600;
  }
  .pane-head .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
  .pane-head .meta { margin-left: auto; text-transform: none; letter-spacing: 0; font-weight: 500; color: var(--text-dim); }

  .editor-wrap { position: relative; flex: 1; min-height: 0; }
  textarea#md {
    width: 100%; height: 100%;
    resize: none;
    border: none;
    outline: none;
    background: transparent;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13.5px;
    line-height: 1.7;
    padding: 18px 20px;
    tab-size: 2;
  }
  textarea#md::placeholder { color: var(--text-faint); }
  textarea#md::-webkit-scrollbar { width: 10px; }
  textarea#md::-webkit-scrollbar-thumb { background: #2a313d; border-radius: 6px; border: 3px solid var(--bg-soft); }

  /* Preview pane */
  .preview-pane {
    display: flex;
    flex-direction: column;
    min-width: 0;
    background:
      radial-gradient(900px 500px at 80% 110%, rgba(139, 92, 246, 0.06), transparent 60%),
      var(--bg);
  }
  .preview-head {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 16px;
    border-bottom: 1px solid var(--border-soft);
    font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--text-faint); font-weight: 600;
  }

  .stage-wrap {
    flex: 1;
    display: grid;
    place-items: center;
    padding: 28px 32px 12px;
    min-height: 0;
    position: relative;
  }

  /* The slide itself */
  .stage {
    width: 100%;
    max-width: 980px;
    aspect-ratio: 16 / 9;
    border-radius: 16px;
    overflow: hidden;
    position: relative;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    background: var(--slide-bg);
  }

  .slide {
    position: absolute; inset: 0;
    padding: clamp(28px, 5.5%, 64px) clamp(34px, 7%, 80px);
    display: flex;
    flex-direction: column;
    justify-content: center;
    background:
      radial-gradient(120% 120% at 0% 0%, var(--slide-bg-2), var(--slide-bg) 55%);
    color: var(--slide-text);
    overflow: hidden;
    opacity: 0;
    transform: translateX(24px) scale(0.99);
    transition: opacity 0.42s cubic-bezier(0.4, 0, 0.2, 1), transform 0.42s cubic-bezier(0.4, 0, 0.2, 1);
    pointer-events: none;
  }
  .slide.current { opacity: 1; transform: none; pointer-events: auto; }
  .slide.leaving { opacity: 0; transform: translateX(-24px) scale(0.99); }

  /* accent bar */
  .slide::before {
    content: "";
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 6px;
    background: linear-gradient(180deg, var(--slide-accent), transparent 85%);
    opacity: 0.85;
  }

  /* Slide typography (uses cqw so it scales with slide size) */
  .slide-content { container-type: inline-size; }
  .slide h1, .slide h2, .slide h3, .slide p, .slide ul, .slide ol, .slide blockquote, .slide pre, .slide table, .slide img {
    max-width: 100%;
  }
  .slide h1 {
    font-size: clamp(28px, 6.4cqw, 60px);
    font-weight: 750;
    letter-spacing: -0.025em;
    line-height: 1.08;
    color: var(--slide-heading);
    margin-bottom: 0.35em;
    background: linear-gradient(120deg, var(--slide-heading), var(--slide-accent));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .slide h2 {
    font-size: clamp(22px, 4.4cqw, 40px);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.15;
    color: var(--slide-heading);
    margin-bottom: 0.5em;
  }
  .slide h3 {
    font-size: clamp(17px, 2.8cqw, 26px);
    font-weight: 650;
    color: var(--slide-accent);
    margin-bottom: 0.4em;
    letter-spacing: -0.01em;
  }
  .slide p {
    font-size: clamp(15px, 2.3cqw, 23px);
    line-height: 1.55;
    color: var(--slide-text-dim);
    margin-bottom: 0.65em;
  }
  .slide strong { color: var(--slide-text); font-weight: 680; }
  .slide em { color: var(--slide-text); }
  .slide a { color: var(--slide-accent); text-decoration: none; border-bottom: 1px solid color-mix(in srgb, var(--slide-accent) 40%, transparent); }
  .slide ul, .slide ol { margin: 0.2em 0 0.6em 0; padding-left: 1.4em; }
  .slide li {
    font-size: clamp(15px, 2.25cqw, 22px);
    line-height: 1.5;
    color: var(--slide-text-dim);
    margin-bottom: 0.5em;
    padding-left: 0.2em;
  }
  .slide li::marker { color: var(--slide-accent); }
  .slide ul li { list-style: none; position: relative; padding-left: 1.5em; }
  .slide ul li::before {
    content: "";
    position: absolute; left: 0; top: 0.62em;
    width: 0.5em; height: 0.5em;
    border-radius: 2px;
    background: var(--slide-accent);
    transform: rotate(45deg);
  }
  .slide blockquote {
    border-left: 3px solid var(--slide-accent);
    padding: 0.2em 0 0.2em 1em;
    margin: 0.4em 0 0.7em;
    font-style: italic;
    font-size: clamp(17px, 2.7cqw, 28px);
    color: var(--slide-text);
    line-height: 1.4;
  }
  .slide code {
    font-family: var(--mono);
    font-size: 0.88em;
    background: var(--slide-code-bg);
    padding: 0.12em 0.4em;
    border-radius: 5px;
    color: var(--slide-accent);
  }
  .slide pre {
    background: var(--slide-code-bg);
    border: 1px solid var(--slide-rule);
    border-radius: 10px;
    padding: 0.9em 1.1em;
    overflow: auto;
    margin: 0.4em 0 0.7em;
  }
  .slide pre code {
    background: none; padding: 0; color: var(--slide-text);
    font-size: clamp(12px, 1.7cqw, 16px); line-height: 1.55;
  }
  .slide hr { border: none; border-top: 1px solid var(--slide-rule); margin: 0.8em 0; }
  .slide table { border-collapse: collapse; font-size: clamp(13px, 1.9cqw, 18px); margin: 0.4em 0; }
  .slide th, .slide td { border: 1px solid var(--slide-rule); padding: 0.45em 0.8em; text-align: left; color: var(--slide-text-dim); }
  .slide th { color: var(--slide-heading); font-weight: 650; background: var(--slide-code-bg); }
  .slide img { border-radius: 10px; max-height: 60cqh; object-fit: contain; }

  /* Title-only slide centering */
  .slide.title-slide { align-items: flex-start; }
  .slide.title-slide .slide-content { max-width: 90%; }

  /* slide footer / page number */
  .slide-footer {
    position: absolute;
    bottom: clamp(14px, 2.6%, 26px);
    right: clamp(20px, 4%, 40px);
    font-size: clamp(10px, 1.3cqw, 13px);
    color: var(--slide-text-dim);
    opacity: 0.55;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.04em;
  }
  .slide-brand {
    position: absolute;
    bottom: clamp(14px, 2.6%, 26px);
    left: clamp(34px, 7%, 80px);
    font-size: clamp(10px, 1.3cqw, 13px);
    color: var(--slide-text-dim);
    opacity: 0.5;
    letter-spacing: 0.03em;
    font-weight: 600;
  }

  /* ---------- Controls bar under stage ---------- */
  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 14px 24px 22px;
  }
  .nav-btn {
    width: 40px; height: 40px;
    border-radius: 11px;
    border: 1px solid var(--border);
    background: var(--panel-2);
    color: var(--text);
    cursor: pointer;
    display: grid; place-items: center;
    transition: all 0.15s ease;
  }
  .nav-btn:hover { background: #232a36; border-color: #333c4c; }
  .nav-btn:disabled { opacity: 0.32; cursor: not-allowed; }
  .nav-btn svg { width: 18px; height: 18px; }

  .counter {
    font-variant-numeric: tabular-nums;
    font-size: 13px;
    color: var(--text-dim);
    min-width: 64px;
    text-align: center;
    font-weight: 550;
  }
  .counter b { color: var(--text); }

  .progress {
    height: 4px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
    width: 200px;
    margin: 0 6px;
  }
  .progress > div {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    border-radius: 4px;
    transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* Thumbnail strip */
  .thumbs {
    display: flex;
    gap: 8px;
    padding: 0 16px 12px;
    overflow-x: auto;
    scrollbar-width: thin;
  }
  .thumbs::-webkit-scrollbar { height: 8px; }
  .thumbs::-webkit-scrollbar-thumb { background: #2a313d; border-radius: 6px; }
  .thumb {
    flex-shrink: 0;
    width: 96px;
    aspect-ratio: 16/9;
    border-radius: 7px;
    border: 1.5px solid var(--border);
    background: var(--slide-bg);
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.15s ease;
    padding: 7px 8px;
  }
  .thumb:hover { border-color: #3a4456; transform: translateY(-2px); }
  .thumb.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent), 0 4px 12px var(--accent-glow); }
  .thumb .tnum {
    position: absolute; top: 3px; left: 5px;
    font-size: 8px; color: var(--text-faint); font-weight: 700;
  }
  .thumb .ttitle {
    font-size: 8.5px;
    line-height: 1.25;
    color: var(--slide-text);
    font-weight: 650;
    margin-top: 9px;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
  }
  .thumb::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 2.5px; background: var(--slide-accent); opacity: 0.7; }

  /* ---------- Fullscreen presentation ---------- */
  .fs-stage {
    position: fixed;
    inset: 0;
    z-index: 1000;
    background: var(--slide-bg);
    display: none;
  }
  .fs-stage.on { display: block; }
  .fs-stage .slide { border-radius: 0; }
  .fs-stage .slide::before { width: 8px; }

  .fs-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 1010;
    display: none;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 14px;
    background: linear-gradient(0deg, rgba(0,0,0,0.55), transparent);
    opacity: 0;
    transition: opacity 0.25s ease;
  }
  .fs-stage.on .fs-bar { display: flex; }
  .fs-bar:hover, .fs-bar.show { opacity: 1; }
  .fs-bar .nav-btn { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.2); color:#fff; backdrop-filter: blur(8px); }
  .fs-bar .nav-btn:hover { background: rgba(255,255,255,0.22); }
  .fs-bar .counter { color: rgba(255,255,255,0.85); }
  .fs-bar .progress { width: 280px; }
  .fs-hint {
    position: fixed; top: 22px; right: 26px; z-index: 1011;
    display: none;
    font-size: 12px; color: rgba(255,255,255,0.6);
    background: rgba(0,0,0,0.35); padding: 7px 12px; border-radius: 8px;
    backdrop-filter: blur(8px);
  }
  .fs-stage.on .fs-hint { display: block; animation: fadeOutHint 4s ease forwards; }
  @keyframes fadeOutHint { 0%, 60% { opacity: 1; } 100% { opacity: 0; } }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 26px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 11px 18px;
    border-radius: 11px;
    font-size: 13px; font-weight: 550;
    box-shadow: var(--shadow);
    z-index: 2000;
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
    display: flex; align-items: center; gap: 9px;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast svg { width: 16px; height: 16px; color: var(--good); }

  /* Dropdown menu (theme) */
  .menu-wrap { position: relative; }
  .menu {
    position: absolute;
    top: calc(100% + 8px);
    right: 0;
    min-width: 170px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 6px;
    box-shadow: var(--shadow);
    z-index: 50;
    display: none;
  }
  .menu.open { display: block; animation: menuIn 0.16s ease; }
  @keyframes menuIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: none; } }
  .menu button {
    width: 100%;
    text-align: left;
    border: none;
    background: transparent;
    color: var(--text);
    padding: 9px 11px;
    border-radius: 8px;
    font-size: 13px; font-weight: 500;
    cursor: pointer;
    display: flex; align-items: center; gap: 10px;
    font-family: var(--sans);
  }
  .menu button:hover { background: var(--panel-2); }
  .menu button.sel { color: var(--accent); }
  .menu button .swatch { width: 16px; height: 16px; border-radius: 5px; border: 1px solid rgba(255,255,255,0.15); }
  .menu button .check { margin-left: auto; opacity: 0; }
  .menu button.sel .check { opacity: 1; }
  .menu .menu-label { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-faint); padding: 7px 11px 4px; font-weight: 600; }

  kbd {
    font-family: var(--mono);
    font-size: 10.5px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-bottom-width: 2px;
    border-radius: 5px;
    padding: 1px 5px;
    color: var(--text-dim);
  }

  @media (max-width: 900px) {
    main { grid-template-columns: 1fr; grid-template-rows: 0.8fr 1.2fr; }
    .editor-pane { border-right: none; border-bottom: 1px solid var(--border); }
    .brand .sub { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <span class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="14" rx="2"/><path d="M3 18l18 0"/><path d="M9 22l6 0"/><path d="M7 9l3 3-3 3"/>
      </svg>
    </span>
    <span>Markdown</span>
    <span class="arrow">→</span>
    <span class="sub">Slides</span>
  </div>

  <div class="spacer"></div>

  <div class="toolbar">
    <button class="btn ghost" id="sampleBtn" title="Load sample deck">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M8 13h8M8 17h5"/></svg>
      Sample
    </button>

    <div class="menu-wrap">
      <button class="btn ghost" id="themeBtn" title="Slide theme">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="13.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="10.5" r="2.5"/><circle cx="8.5" cy="7.5" r="2.5"/><circle cx="6.5" cy="12.5" r="2.5"/><path d="M12 2a10 10 0 0 0 0 20 1.25 1.25 0 0 0 1-2 1.25 1.25 0 0 1 1-2h2a4 4 0 0 0 4-4 10 10 0 0 0-8-12z"/></svg>
        Theme
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" style="width:11px;height:11px;margin-left:-2px"><path d="M6 9l6 6 6-6"/></svg>
      </button>
      <div class="menu" id="themeMenu">
        <div class="menu-label">Slide Theme</div>

<script>
/* ============================================================
   Minimal, dependency-free Markdown parser (slide-grade subset)
   Supports: headings, bold/italic, inline code, links, images,
   blockquotes, fenced code, hr, ordered/unordered lists, tables.
   ============================================================ */
const Md = (() => {
  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  function inline(text) {
    let t = esc(text);
    // images ![alt](src)
    t = t.replace(/!\[([^\]]*)\]\(([^)\s]+)(?:\s+"[^"]*")?\)/g, '<img src="$2" alt="$1">');
    // links [text](href)
    t = t.replace(/\[([^\]]+)\]\(([^)\s]+)(?:\s+"[^"]*")?\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
    // inline code
    t = t.replace(/`([^`]+)`/g, (m, c) => '<code>' + c + '</code>');
    // bold
    t = t.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    t = t.replace(/__([^_]+)__/g, '<strong>$1</strong>');
    // italic
    t = t.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
    t = t.replace(/(^|[^_])_([^_\n]+)_/g, '$1<em>$2</em>');
    return t;
  }

  function parse(src) {
    const lines = src.replace(/\r\n/g, '\n').split('\n');
    let html = '';
    let i = 0;

    const flushList = (type, items) => {
      if (!items.length) return '';
      const tag = type;
      return `<${tag}>` + items.map(li => `<li>${inline(li)}</li>`).join('') + `</${tag}>`;
    };

    while (i < lines.length) {
      let line = lines[i];

      // fenced code
      if (/^```/.test(line)) {
        const lang = line.replace(/^```/, '').trim();
        let code = [];
        i++;
        while (i < lines.length && !/^```/.test(lines[i])) { code.push(lines[i]); i++; }
        i++; // closing fence
        html += `<pre><code data-lang="${esc(lang)}">${esc(code.join('\n'))}</code></pre>`;
        continue;
      }

      // hr
      if (/^\s*(\*\s*){3,}$|^\s*(-\s*){3,}$|^\s*(_\s*){3,}$/.test(line) && line.trim() !== '') {
        html += '<hr>'; i++; continue;
      }

      // headings
      const h = line.match(/^(#{1,6})\s+(.*)$/);
      if (h) {
        const lvl = Math.min(h[1].length, 3);
        html += `<h${lvl}>${inline(h[2].trim())}</h${lvl}>`;
        i++; continue;
      }

      // blockquote (group consecutive)
      if (/^\s*>\s?/.test(line)) {
        let quote = [];
        while (i < lines.length && /^\s*>\s?/.test(lines[i])) {
          quote.push(lines[i].replace(/^\s*>\s?/, '')); i++;
        }
        html += `<blockquote>${inline(quote.join(' '))}</blockquote>`;
        continue;
      }

      // table
      if (/\|/.test(line) && i + 1 < lines.length && /^\s*\|?\s*:?-{2,}/.test(lines[i+1].replace(/[^|:\-\s]/g,''))) {
        const splitRow = r => r.replace(/^\s*\|/, '').replace(/\|\s*$/, '').split('|').map(c => c.trim());
        const header = splitRow(line);
        i += 2; // skip header + separator
        let body = '';
        while (i < lines.length && /\|/.test(lines[i]) && lines[i].trim() !== '') {
          const cells = splitRow(lines[i]);
          body += '<tr>' + cells.map(c => `<td>${inline(c)}</td>`).join('') + '</tr>';
          i++;
        }
        html += `<table><thead><tr>${header.map(c=>`<th>${inline(c)}</th>`).join('')}</tr></thead><tbody>${body}</tbody></table>`;
        continue;
      }

      // unordered list
      if (/^\s*[-*+]\s+/.test(line)) {
        let items = [];
        while (i < lines.length && /^\s*[-*+]\s+/.test(lines[i])) {
          items.push(lines[i].replace(/^\s*[-*+]\s+/, '')); i++;
        }
        html += flushList('ul', items);
        continue;
      }

      // ordered list
      if (/^\s*\d+\.\s+/.test(line)) {
        let items = [];
        while (i < lines.length && /^\s*\d+\.\s+/.test(lines[i])) {
          items.push(lines[i].replace(/^\s*\d+\.\s+/, '')); i++;
        }
        html += flushList('ol', items);
        continue;
      }

      // blank
      if (line.trim() === '') { i++; continue; }

      // paragraph (gather until blank / block)
      let para = [line];
      i++;
      while (i < lines.length && lines[i].trim() !== '' &&
             !/^(#{1,6})\s/.test(lines[i]) && !/^\s*[-*+]\s/.test(lines[i]) &&
             !/^\s*\d+\.\s/.test(lines[i]) && !/^\s*>/.test(lines[i]) &&
             !/^```/.test(lines[i]) && !/\|/.test(lines[i])) {
        para.push(lines[i]); i++;
      }
      html += `<p>${inline(para.join(' '))}</p>`;
    }
    return html;
  }

  // detect a "title slide": only a single h1 (+ maybe paragraphs), short
  function isTitle(src) {
    const headings = (src.match(/^#{1}\s/gm) || []).length;
    const h2 = (src.match(/^#{2,}\s/gm) || []).length;
    const hasList = /^\s*[-*+\d]/m.test(src);
    return headings === 1 && h2 === 0 && !hasList;
  }

  return { parse, isTitle, esc };
})();

/* ============================================================
   App state & rendering
   ============================================================ */
const SAMPLE = `# Quarterly Business Review

const ta = document.getElementById('md');
const stage = document.getElementById('stage');
const thumbsEl = document.getElementById('thumbs');
const fsStage = document.getElementById('fsStage');

let slides = [];      // array of {raw, html, isTitle, title}
let idx = 0;
let inFullscreen = false;

function splitSlides(src) {
  // split on lines that are exactly --- (slide breaks), but not the table separators or hr inside content.
  // We treat a line of only --- (3+) surrounded by blank-ish context as a break.
  const parts = src.split(/\n[ \t]*-{3,}[ \t]*\n/);
  return parts.map(p => p.trim()).filter((p, i, arr) => p.length || arr.length === 1);
}

function deriveTitle(raw) {
  const m = raw.match(/^#{1,6}\s+(.*)$/m);
  if (m) return m[1].replace(/[*_`]/g, '').trim();
  const first = raw.split('\n').find(l => l.trim());
  return first ? first.replace(/[#>*_`-]/g, '').trim().slice(0, 40) : 'Slide';
}

function build() {
  const src = ta.value;
  const parts = splitSlides(src);
  slides = parts.map(raw => ({
    raw,
    html: Md.parse(raw),
    isTitle: Md.isTitle(raw),
    title: deriveTitle(raw),
  }));
  if (!slides.length) slides = [{ raw: '', html: '<p>Empty slide</p>', isTitle: false, title: 'Slide' }];
  if (idx >= slides.length) idx = slides.length - 1;
  if (idx < 0) idx = 0;
  renderThumbs();
  render();
  document.getElementById('editorMeta').textContent = `— ${slides.length} slide${slides.length>1?'s':''}`;
}

function slideMarkup(s, n) {
  return `
    <div class="slide ${s.isTitle ? 'title-slide' : ''}">
      <div class="slide-content">${s.html}</div>
      <div class="slide-brand">Helios Analytics</div>
      <div class="slide-footer">${String(n).padStart(2,'0')} / ${String(slides.length).padStart(2,'0')}</div>
    </div>`;
}

let prevIdx = 0;
function render() {
  const total = slides.length;
  // Build/refresh slide DOM in active stage
  const target = inFullscreen ? fsStage : stage;
  // Render only current + neighbors for the active stage for transitions
  const existing = target.querySelectorAll('.slide');
  // Simpler: rebuild current slide element each time with transition
  // Keep prior slide for leaving animation
  const cur = target.querySelector('.slide.current');
  const newHtml = slideMarkup(slides[idx], idx + 1);

  // create new node
  const tmp = document.createElement('div');
  tmp.innerHTML = newHtml;
  const newSlide = tmp.firstElementChild;

  // direction
  const goingBack = idx < prevIdx;
  if (goingBack) {
    newSlide.style.transform = 'translateX(-24px) scale(0.99)';
  }

  // remove old leaving slides
  target.querySelectorAll('.slide').forEach(el => {
    el.classList.remove('current');
    el.classList.add('leaving');
    setTimeout(() => el.remove(), 460);
  });

  target.appendChild(newSlide);
  // force reflow then animate in
  void newSlide.offsetWidth;
  newSlide.classList.add('current');

  prevIdx = idx;

  // counters & progress
  const pct = total <= 1 ? 100 : ((idx) / (total - 1)) * 100;
  document.getElementById('cur').textContent = idx + 1;
  document.getElementById('total').textContent = total;
  document.getElementById('progBar').style.width = (total <= 1 ? 100 : ((idx+1)/total)*100) + '%';

  document.getElementById('fsCur').textContent = idx + 1;
  document.getElementById('fsTotal').textContent = total;
  document.getElementById('fsProg').style.width = (total <= 1 ? 100 : ((idx+1)/total)*100) + '%';

  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('firstBtn').disabled = idx === 0;
  document.getElementById('nextBtn').disabled = idx === total - 1;
  document.getElementById('lastBtn').disabled = idx === total - 1;

  // active thumb
  thumbsEl.querySelectorAll('.thumb').forEach((t, i) => {
    t.classList.toggle('active', i === idx);
    if (i === idx) t.scrollIntoView({ block: 'nearest', inline: 'nearest', behavior: 'smooth' });
  });
}

function renderThumbs() {
  thumbsEl.innerHTML = slides.map((s, i) => `
    <div class="thumb ${i===idx?'active':''}" data-i="${i}">
      <span class="tnum">${i+1}</span>
      <div class="ttitle">${Md.esc(s.title)}</div>
    </div>`).join('');
  thumbsEl.querySelectorAll('.thumb').forEach(t => {
    t.addEventListener('click', () => go(parseInt(t.dataset.i)));
  });
}

function go(n) {
  const total = slides.length;
  idx = Math.max(0, Math.min(total - 1, n));
  render();
}
function next() { if (idx < slides.length - 1) go(idx + 1); }
function prev() { if (idx > 0) go(idx - 1); }

/* ---------- Fullscreen ---------- */
function enterPresent() {
  inFullscreen = true;
  fsStage.classList.add('on');
  // sync theme
  fsStage.setAttribute('data-slide-theme', stage.getAttribute('data-slide-theme'));
  render();
  if (fsStage.requestFullscreen) fsStage.requestFullscreen().catch(()=>{});
}
function exitPresent() {
  inFullscreen = false;
  fsStage.classList.remove('on');
  if (document.fullscreenElement) document.exitFullscreen().catch(()=>{});
  render(); // re-render into the inline stage
}
document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement && inFullscreen) exitPresent();
});

/* ---------- Wiring ---------- */
document.getElementById('nextBtn').onclick = next;
document.getElementById('prevBtn').onclick = prev;
document.getElementById('firstBtn').onclick = () => go(0);
document.getElementById('lastBtn').onclick = () => go(slides.length - 1);
document.getElementById('fsNext').onclick = next;
document.getElementById('fsPrev').onclick = prev;
document.getElementById('presentBtn').onclick = enterPresent;

let typeTimer;
ta.addEventListener('input', () => {
  clearTimeout(typeTimer);
  typeTimer = setTimeout(build, 120);
});

/* sample */
document.getElementById('sampleBtn').onclick = () => {
  ta.value = SAMPLE;
  idx = 0;
  build();
  toast('Sample deck loaded');
};

/* theme menu */
const themeBtn = document.getElementById('themeBtn');
const themeMenu = document.getElementById('themeMenu');
themeBtn.onclick = (e) => { e.stopPropagation(); themeMenu.classList.toggle('open'); };
document.addEventListener('click', () => themeMenu.classList.remove('open'));
themeMenu.addEventListener('click', e => e.stopPropagation());
themeMenu.querySelectorAll('button').forEach(b => {
  b.onclick = () => {
    const t = b.dataset.theme;
    stage.setAttribute('data-slide-theme', t);
    fsStage.setAttribute('data-slide-theme', t);
    thumbsEl.setAttribute('data-slide-theme', t); // thumbs read slide vars from closest; set on body fallback
    document.documentElement.setAttribute('data-slide-theme', t);
    themeMenu.querySelectorAll('button').forEach(x => x.classList.remove('sel'));
    b.classList.add('sel');
    themeMenu.classList.remove('open');
    toast('Theme: ' + b.textContent.trim());
  };
});

/* toast */
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 1900);
}

/* keyboard navigation */
document.addEventListener('keydown', e => {
  const typing = document.activeElement === ta;
  // global present toggle even while typing? only when not typing for letters
  if (e.key === 'ArrowRight' || e.key === 'PageDown' || (e.key === ' ' && !typing)) {
    if (typing && e.key === 'ArrowRight') return; // let caret move
    e.preventDefault(); next();
  } else if (e.key === 'ArrowLeft' || e.key === 'PageUp') {
    if (typing && e.key === 'ArrowLeft') return;
    e.preventDefault(); prev();
  } else if (e.key === 'Home' && !typing) {
    e.preventDefault(); go(0);
  } else if (e.key === 'End' && !typing) {
    e.preventDefault(); go(slides.length - 1);
  } else if ((e.key === 'f' || e.key === 'F') && !typing) {
    e.preventDefault();
    inFullscreen ? exitPresent() : enterPresent();
  } else if (e.key === 'Escape' && inFullscreen) {
    exitPresent();
  }
});

/* show fs bar briefly on mouse move */
let barTimer;
fsStage.addEventListener('mousemove', () => {
  const bar = document.getElementById('fsBar');
  bar.classList.add('show');
  clearTimeout(barTimer);
  barTimer = setTimeout(() => bar.classList.remove('show'), 2000);
});

/* init */
ta.value = SAMPLE;
build();
</script>
