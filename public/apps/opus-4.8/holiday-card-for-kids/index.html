<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>✨ Holiday Card Maker ✨</title>
<style>
  :root {
    --sky-top: #0b1d4d;
    --sky-mid: #1b3a7a;
    --sky-bot: #2e5fae;
    --snow: #f4f8ff;
    --gold: #ffd86b;
    --warm: #ff8a5c;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    font-family: 'Comic Sans MS', 'Baloo 2', 'Trebuchet MS', system-ui, sans-serif;
    background: #07122e;
    user-select: none;
  }

  /* ----------------- Layout ----------------- */
  #app {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  /* ----------------- Toolbar ----------------- */
  #toolbar {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    background: linear-gradient(180deg, #d8233f 0%, #b01730 100%);
    box-shadow: 0 4px 14px rgba(0,0,0,0.35), inset 0 -3px 0 rgba(0,0,0,0.15), inset 0 2px 0 rgba(255,255,255,0.2);
    z-index: 50;
    position: relative;
  }
  /* candy-cane stripe top accent */
  #toolbar::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    background: repeating-linear-gradient(45deg, #ffffff 0 14px, #d8233f 14px 28px);
    opacity: 0.85;
  }

  .brand {
    color: #fff;
    font-size: clamp(16px, 4.4vw, 26px);
    font-weight: 800;
    text-shadow: 0 2px 0 #7d0f22, 0 3px 6px rgba(0,0,0,0.4);
    letter-spacing: 0.5px;
    white-space: nowrap;
    margin-right: 4px;
  }
  .brand .holly { filter: drop-shadow(0 1px 1px rgba(0,0,0,.3)); }

  .spacer { flex: 1; }

  .btn {
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-weight: 800;
    color: #5a2a00;
    background: linear-gradient(180deg, #ffe49a, #ffc94d);
    border-radius: 999px;
    padding: 9px 14px;
    font-size: clamp(12px, 3.2vw, 15px);
    box-shadow: 0 3px 0 #c9952b, 0 5px 10px rgba(0,0,0,0.25);
    transition: transform .08s ease, box-shadow .08s ease, filter .15s;
    white-space: nowrap;
  }
  .btn:active { transform: translateY(3px); box-shadow: 0 0 0 #c9952b, 0 2px 6px rgba(0,0,0,0.3); }
  .btn.green { background: linear-gradient(180deg, #9be89b, #4cc94c); color: #0c4a0c; box-shadow: 0 3px 0 #2f8f2f, 0 5px 10px rgba(0,0,0,0.25); }
  .btn.green:active { box-shadow: 0 0 0 #2f8f2f, 0 2px 6px rgba(0,0,0,0.3); }
  .btn.blue { background: linear-gradient(180deg, #aee0ff, #5ab6ff); color: #06375f; box-shadow: 0 3px 0 #2c83c2, 0 5px 10px rgba(0,0,0,0.25); }
  .btn.blue:active { box-shadow: 0 0 0 #2c83c2, 0 2px 6px rgba(0,0,0,0.3); }
  .btn .ic { font-size: 1.05em; }

  .iconbtn {
    width: 42px; height: 42px;
    display: grid; place-items: center;
    border-radius: 50%;
    font-size: 20px;
    padding: 0;
  }

  /* ----------------- Stage ----------------- */
  #stage-wrap {
    flex: 1 1 auto;
    position: relative;
    min-height: 0;
  }

  #stage {
    position: absolute;
    inset: 0;
    overflow: hidden;
    background:
      radial-gradient(120% 80% at 78% -10%, rgba(255,236,150,0.20), transparent 45%),
      linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 45%, var(--sky-bot) 100%);
    transition: background 0.8s ease;
  }
  /* twinkle stars layer */
  #stars { position:absolute; inset:0; pointer-events:none; }
  .star {
    position:absolute;
    width:3px; height:3px;
    background:#fff;
    border-radius:50%;
    box-shadow:0 0 4px #fff;
    animation: tw var(--d,3s) ease-in-out infinite alternate;
    opacity:.8;
  }
  @keyframes tw { from{opacity:.15; transform:scale(.6);} to{opacity:1; transform:scale(1.3);} }

  /* aurora glow */
  #aurora {
    position:absolute; inset:0; pointer-events:none; opacity:.45;
    background: radial-gradient(60% 40% at 30% 8%, rgba(120,255,200,0.25), transparent 60%),
                radial-gradient(50% 35% at 70% 4%, rgba(160,140,255,0.22), transparent 60%);
    mix-blend-mode: screen;
    animation: auroraShift 14s ease-in-out infinite alternate;
  }
  @keyframes auroraShift { from{transform:translateX(-4%) scaleY(1);} to{transform:translateX(4%) scaleY(1.15);} }

  /* moon */
  #moon {
    position:absolute; top:6%; right:9%;
    width:70px; height:70px; border-radius:50%;
    background: radial-gradient(circle at 35% 35%, #fffde6, #ffe9a8 60%, #f4cf72);
    box-shadow: 0 0 30px 8px rgba(255,233,168,0.55), inset -8px -8px 0 rgba(0,0,0,0.05);
    pointer-events:none;
  }

  /* ground / snow hills */
  #ground {
    position:absolute; bottom:0; left:0; right:0; height:34%;
    pointer-events:none;
  }
  .hill {
    position:absolute; bottom:-30%; border-radius:50% 50% 0 0 / 100% 100% 0 0;
    background:#eef5ff;
  }
  .hill.back  { left:-10%; width:70%; height:120%; background:#dbe7fb; }
  .hill.front { right:-15%; width:80%; height:150%; background:#f4f9ff; box-shadow:0 -4px 18px rgba(120,150,220,.2); }
  .snowline {
    position:absolute; bottom:0; left:0; right:0; height:14%;
    background:#fbfdff;
    border-radius:50% 50% 0 0 / 30px 30px 0 0;
  }

  /* falling snow */
  #snow { position:absolute; inset:0; pointer-events:none; z-index:30; overflow:hidden; }
  .flake {
    position:absolute;
    top:-20px;
    color:#fff;
    will-change: transform;
    pointer-events:none;
    text-shadow:0 0 6px rgba(255,255,255,.6);
  }

  /* sparkle bursts */
  .sparkle {
    position:absolute; pointer-events:none; z-index:60;
    font-size:22px;
    animation: pop .7s ease-out forwards;
  }
  @keyframes pop {
    0% { transform: translate(-50%,-50%) scale(.2) rotate(0deg); opacity:1; }
    100% { transform: translate(-50%,-50%) scale(1.6) rotate(40deg); opacity:0; }
  }

  /* ----------------- Card frame ----------------- */
  #card {
    position:absolute;
    z-index:20;
    pointer-events:none;
    inset: clamp(10px, 3vw, 28px);
    border:6px dashed rgba(255,255,255,0.5);
    border-radius:26px;
    box-shadow: inset 0 0 60px rgba(0,0,0,0.18);
  }
  #greeting {
    position:absolute;
    z-index:21;
    left:50%; top:18px;
    transform:translateX(-50%);
    pointer-events:auto;
    cursor:text;
    text-align:center;
    color:#fff;
    font-size:clamp(22px, 6.5vw, 46px);
    font-weight:900;
    padding:4px 16px;
    text-shadow: 0 2px 0 #b01730, 0 4px 0 #7d0f22, 0 6px 12px rgba(0,0,0,0.45);
    outline:none;
    max-width:90%;
    line-height:1.05;
    animation: bob 4s ease-in-out infinite;
  }
  @keyframes bob { 0%,100%{transform:translateX(-50%) translateY(0);} 50%{transform:translateX(-50%) translateY(-6px);} }
  #greeting:focus { background: rgba(0,0,0,0.18); border-radius:12px; }

  /* placed stickers */
  .sticker {
    position:absolute;
    z-index:25;
    font-size:54px;
    cursor:grab;
    touch-action:none;
    line-height:1;
    transform-origin:center;
    filter: drop-shadow(0 4px 5px rgba(0,0,0,0.35));
    transition: filter .12s;
    will-change: transform;
  }
  .sticker:active { cursor:grabbing; }
  .sticker.dragging { z-index:80 !important; filter: drop-shadow(0 12px 14px rgba(0,0,0,0.45)); }
  .sticker.plop { animation: plop .4s cubic-bezier(.2,1.6,.4,1); }
  @keyframes plop { 0%{transform:scale(0) rotate(-30deg);} 70%{transform:scale(1.25);} 100%{transform:scale(1);} }
  .sticker.wiggle { animation: wig 2.6s ease-in-out infinite; }
  @keyframes wig { 0%,100%{transform:rotate(-4deg);} 50%{transform:rotate(4deg);} }

  /* selection halo + delete badge */
  .sticker.selected { outline: 3px dashed rgba(255,255,255,.85); outline-offset:6px; border-radius:14px; }
  .del-badge {
    position:absolute; z-index:81;
    width:28px; height:28px; border-radius:50%;
    background:#ff3b53; color:#fff;
    display:grid; place-items:center;
    font-size:16px; font-weight:900;
    box-shadow:0 2px 6px rgba(0,0,0,.4);
    cursor:pointer; border:2px solid #fff;
    pointer-events:auto;
  }

  /* ----------------- Tray ----------------- */
  #tray {
    flex:0 0 auto;
    background: linear-gradient(180deg, #14306b, #0d1f47);
    padding:8px 6px 10px;
    box-shadow: 0 -6px 16px rgba(0,0,0,0.4);
    position:relative;
    z-index:40;
  }
  #tray::before {
    content:"";
    position:absolute; top:0; left:0; right:0; height:5px;
    background: repeating-linear-gradient(45deg, #ffd86b 0 12px, #2e5fae 12px 24px);
    opacity:.7;
  }
  .tray-title {
    color:#cfe0ff; font-size:12px; font-weight:800; letter-spacing:.5px;
    text-align:center; margin:2px 0 6px; opacity:.9;
  }
  .tray-title b { color:#ffd86b; }
  #palette {
    display:flex; gap:6px; overflow-x:auto; padding:2px 6px 6px;
    scrollbar-width:thin; -webkit-overflow-scrolling:touch;
  }
  #palette::-webkit-scrollbar { height:6px; }
  #palette::-webkit-scrollbar-thumb { background:#3d63b0; border-radius:6px; }
  .tile {
    flex:0 0 auto;
    width:58px; height:58px;
    display:grid; place-items:center;
    font-size:30px;
    background: radial-gradient(circle at 50% 35%, rgba(255,255,255,0.14), rgba(255,255,255,0.04));
    border:2px solid rgba(255,255,255,0.15);
    border-radius:16px;
    cursor:grab;
    touch-action:none;
    transition: transform .1s, background .15s, border-color .15s;
  }
  .tile:hover { background: rgba(255,255,255,0.18); border-color: var(--gold); }
  .tile:active { cursor:grabbing; transform:scale(.9); }
  .tile.ghost { opacity:.4; }

  /* drag preview that follows finger/cursor */
  #drag-ghost {
    position:fixed; z-index:200; pointer-events:none;
    font-size:54px; transform:translate(-50%,-50%) scale(1.1);
    filter: drop-shadow(0 6px 8px rgba(0,0,0,0.4));
    display:none; line-height:1;
  }

  /* ----------------- Toast / hint ----------------- */
  #hint {
    position:absolute; z-index:70;
    left:50%; bottom:14px; transform:translateX(-50%);
    background:rgba(0,0,0,0.55); color:#fff;
    padding:8px 16px; border-radius:999px;
    font-size:13px; font-weight:700;
    pointer-events:none;
    animation: fadeHint 6s ease forwards;
    backdrop-filter: blur(3px);
  }
  @keyframes fadeHint { 0%,70%{opacity:1;} 100%{opacity:0; visibility:hidden;} }

  /* confetti canvas */
  #fx { position:absolute; inset:0; z-index:90; pointer-events:none; }

  /* sound toggle visual state */
  .iconbtn.muted { filter: grayscale(0.6) brightness(0.85); }

  /* tooltip-ish label on tiles */
  .tile { position:relative; }

  @media (max-width:420px) {
    .btn span.lbl { display:none; }
    .btn { padding:9px 11px; }
    .brand { font-size:18px; }
  }
</style>
</head>
<body>
<div id="app">

  <!-- Toolbar -->
  <div id="toolbar">
    <div class="brand">🎄 <span>Holiday Card Maker</span> <span class="holly">🎁</span></div>
    <div class="spacer"></div>
    <button class="btn blue" id="themeBtn" title="Change the sky"><span class="ic">🌈</span> <span class="lbl">Theme</span></button>
    <button class="btn" id="snowBtn" title="More or less snow"><span class="ic">❄️</span> <span class="lbl">Snow</span></button>
    <button class="btn" id="surpriseBtn" title="Surprise me!"><span class="ic">🎲</span> <span class="lbl">Surprise</span></button>
    <button class="btn green" id="confettiBtn" title="Party!"><span class="ic">🎉</span> <span class="lbl">Party</span></button>
    <button class="btn iconbtn" id="soundBtn" title="Sound on/off">🔊</button>
    <button class="btn iconbtn" id="clearBtn" title="Clear the card">🧹</button>
  </div>

  <!-- Stage -->
  <div id="stage-wrap">
    <div id="stage">
      <div id="aurora"></div>
      <div id="stars"></div>
      <div id="moon"></div>

      <div id="ground">
        <div class="hill back"></div>
        <div class="hill front"></div>
        <div class="snowline"></div>
      </div>

      <div id="snow"></div>

      <!-- Card overlay -->
      <div id="card"></div>
      <div id="greeting" contenteditable="true" spellcheck="false">Happy Holidays!</div>

      <!-- stickers get appended here (inside #stage) -->

      <canvas id="fx"></canvas>
      <div id="hint">👆 Tap a sticker below, then tap the card — or drag it up! Tap a sticker to spin it.</div>
    </div>
  </div>

  <!-- Tray -->
  <div id="tray">
    <div class="tray-title">🎨 <b>Drag</b> or <b>tap</b> these onto your card!</div>
    <div id="palette"></div>
  </div>

  <div id="drag-ghost"></div>
</div>

<script>
(() => {
  "use strict";

  /* ============================================================
     Sticker palette
     ============================================================ */
  const ITEMS = [
    "🎅","🤶","🦌","⛄","🎄","🎁","🔔","⭐","🌟","❄️","☃️","🧦","🍪","🥛",
    "🍭","🍬","🧸","🐧","🐻‍❄️","🦊","🕯️","🎀","🛷","✨","🌲","🏔️","🦉","🥧",
    "🎶","💝","🧣","🧤","🍫","🦢","🌠","🪅","🍩","🎈","🪄","👼","🎻","🤍"
  ];

  const THEMES = [
    { name:"Midnight",  top:"#0b1d4d", mid:"#1b3a7a", bot:"#2e5fae", aurora:.45 },
    { name:"Sunset",    top:"#3a1d5e", mid:"#9b3b6e", bot:"#ff8a5c", aurora:.25 },
    { name:"Frosty",    top:"#1d4e63", mid:"#3a8fb0", bot:"#bfe9ff", aurora:.3 },
    { name:"Candy",     top:"#5e1d3a", mid:"#c2456e", bot:"#ffc1d6", aurora:.2 },
    { name:"Forest",    top:"#0d2e1d", mid:"#1d6e45", bot:"#7fd1a0", aurora:.4 },
    { name:"Cocoa",     top:"#2e1a12", mid:"#6e4326", bot:"#d9a066", aurora:.2 }
  ];

  const stage   = document.getElementById("stage");
  const snowBox = document.getElementById("snow");
  const palette = document.getElementById("palette");
  const ghost   = document.getElementById("drag-ghost");
  const greeting= document.getElementById("greeting");
  const fx      = document.getElementById("fx");
  const ctx     = fx.getContext("2d");

  /* ============================================================
     Audio — WebAudio, no files needed
     ============================================================ */
  let audioCtx = null;
  let soundOn = true;
  function ac() {
    if (!audioCtx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (AC) audioCtx = new AC();
    }
    if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
    return audioCtx;
  }
  function tone(freq, dur=0.18, type="sine", vol=0.18, when=0, glideTo=null) {
    if (!soundOn) return;
    const a = ac(); if (!a) return;
    const t0 = a.currentTime + when;
    const osc = a.createOscillator();
    const g = a.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t0);
    if (glideTo) osc.frequency.exponentialRampToValueAtTime(glideTo, t0 + dur);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(vol, t0 + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(g).connect(a.destination);
    osc.start(t0); osc.stop(t0 + dur + 0.02);
  }
  // little bell shimmer (two detuned tones)
  function bell(base=880) {
    tone(base, 0.5, "triangle", 0.16);
    tone(base*1.5, 0.4, "sine", 0.08, 0.0);
    tone(base*2.0, 0.6, "sine", 0.05, 0.02);
  }
  function plopSound() {
    tone(420, 0.12, "sine", 0.2, 0, 720);
  }
  function popSound() {
    tone(1100, 0.08, "square", 0.08, 0, 600);
  }
  function jingle() {
    const notes = [659, 659, 659, 0, 659, 659, 659, 0, 659, 784, 523, 587, 659];
    notes.forEach((n, i) => { if (n) tone(n, 0.16, "triangle", 0.14, i*0.16); });
  }
  function whoosh() {
    if (!soundOn) return;
    const a = ac(); if(!a) return;
    const t0=a.currentTime;
    const o=a.createOscillator(), g=a.createGain();
    o.type="sawtooth"; o.frequency.setValueAtTime(200,t0);
    o.frequency.exponentialRampToValueAtTime(900,t0+0.3);
    g.gain.setValueAtTime(0.0001,t0);
    g.gain.exponentialRampToValueAtTime(0.1,t0+0.05);
    g.gain.exponentialRampToValueAtTime(0.0001,t0+0.35);
    o.connect(g).connect(a.destination); o.start(t0); o.stop(t0+0.4);
  }
  function sparkleSound() {
    [1200,1500,1900,2400].forEach((f,i)=>tone(f,0.12,"sine",0.06,i*0.05));
  }

  /* ============================================================
     Stars
     ============================================================ */
  (function makeStars(){
    const box = document.getElementById("stars");
    const n = 70;
    for (let i=0;i<n;i++){
      const s=document.createElement("div");
      s.className="star";
      s.style.left = Math.random()*100 + "%";
      s.style.top  = Math.random()*62 + "%";
      const sz = Math.random()*2+1.5;
      s.style.width = sz+"px"; s.style.height = sz+"px";
      s.style.setProperty("--d", (2+Math.random()*3)+"s");
      s.style.animationDelay = (Math.random()*3)+"s";
      box.appendChild(s);
    }
  })();

  /* ============================================================
     Falling snow
     ============================================================ */
  const SNOW_LEVELS = [0, 28, 60, 110];
  let snowLevel = 1; // index into SNOW_LEVELS
  let flakes = [];

  function buildSnow(count){
    snowBox.innerHTML = "";
    flakes = [];
    const glyphs = ["❄","❅","❆","•","*"];
    for (let i=0;i<count;i++){
      const f = document.createElement("div");
      f.className="flake";
      f.textContent = glyphs[(Math.random()*glyphs.length)|0];
      const size = 8 + Math.random()*20;
      f.style.fontSize = size+"px";
      f.style.opacity = 0.4 + Math.random()*0.6;
      snowBox.appendChild(f);
      flakes.push({
        el:f,
        x: Math.random(),                 // 0..1 fraction of width
        y: Math.random(),                 // 0..1 fraction of height (start anywhere)
        speed: 0.00006 + Math.random()*0.00018,
        drift: (Math.random()-0.5)*0.0004,
        sway: Math.random()*Math.PI*2,
        swaySpeed: 0.5+Math.random()*1.5,
        swayAmp: 6+Math.random()*22,
        size
      });
    }
  }

  let lastT = performance.now();
  function snowTick(now){
    const dt = Math.min(50, now - lastT);
    lastT = now;
    const W = stage.clientWidth, H = stage.clientHeight;
    for (const f of flakes){
      f.y += f.speed * dt;
      f.x += f.drift * dt;
      f.sway += f.swaySpeed * dt/1000;
      if (f.y > 1.05) { f.y = -0.05; f.x = Math.random(); }
      if (f.x > 1.05) f.x = -0.03;
      if (f.x < -0.05) f.x = 1.03;
      const px = f.x*W + Math.sin(f.sway)*f.swayAmp;
      const py = f.y*H;
      f.el.style.transform = `translate(${px}px, ${py}px)`;
    }
    requestAnimationFrame(snowTick);
  }
  requestAnimationFrame(snowTick);
  buildSnow(SNOW_LEVELS[snowLevel]);

  /* ============================================================
     Build palette tiles
     ============================================================ */
  ITEMS.forEach(emoji => {
    const t = document.createElement("div");
    t.className = "tile";
    t.textContent = emoji;
    t.dataset.emoji = emoji;
    palette.appendChild(t);
    attachTrayHandlers(t, emoji);
  });

  /* ============================================================
     Sticker creation + placement
     ============================================================ */
  let selected = null;
  let delBadge = null;

  function clearSelection(){
    if (selected) selected.classList.remove("selected");
    selected = null;
    if (delBadge){ delBadge.remove(); delBadge=null; }
  }

  function selectSticker(el){
    clearSelection();
    selected = el;
    el.classList.add("selected");
    el.classList.remove("wiggle");
    // delete badge
    delBadge = document.createElement("div");
    delBadge.className = "del-badge";
    delBadge.textContent = "✕";
    stage.appendChild(delBadge);
    positionBadge();
    delBadge.addEventListener("pointerdown", (e)=>{
      e.stopPropagation();
      removeSticker(el);
    });
  }
  function positionBadge(){
    if (!selected || !delBadge) return;
    const r = selected.getBoundingClientRect();
    const sr = stage.getBoundingClientRect();
    delBadge.style.left = (r.right - sr.left - 6) + "px";
    delBadge.style.top  = (r.top - sr.top - 6) + "px";
  }
  function removeSticker(el){
    popSound();
    burst(el.getBoundingClientRect().left + el.offsetWidth/2,
          el.getBoundingClientRect().top + el.offsetHeight/2, "💨");
    el.style.transition="transform .25s, opacity .25s";
    el.style.transform += " scale(0)";
    el.style.opacity="0";
    setTimeout(()=>el.remove(),250);
    clearSelection();
  }

  function addSticker(emoji, clientX, clientY, opts={}){
    const el = document.createElement("div");
    el.className = "sticker plop";
    el.textContent = emoji;
    const size = opts.size || (44 + Math.random()*26);
    el.style.fontSize = size + "px";
    const rot = opts.rot != null ? opts.rot : (Math.random()*30-15);
    let scale = opts.scale || 1;
    const state = { rot, scale, el };
    el._state = state;

    stage.appendChild(el);

    // position centered on the drop point, in stage coords
    const sr = stage.getBoundingClientRect();
    let x = (clientX - sr.left);
    let y = (clientY - sr.top);
    x = Math.max(10, Math.min(sr.width-10, x));
    y = Math.max(10, Math.min(sr.height-10, y));
    el.style.left = x + "px";
    el.style.top  = y + "px";
    applyTransform(el, -50, -50);

    el.addEventListener("animationend", ()=> el.classList.remove("plop"), {once:true});

    makeDraggable(el);
    plopSound();
    return el;
  }

  // store transform: we use left/top for position, translate(-50,-50) to center, plus rot/scale
  function applyTransform(el){
    const s = el._state;
    el.style.transform = `translate(-50%,-50%) rotate(${s.rot}deg) scale(${s.scale})`;
  }

  /* ============================================================
     Dragging placed stickers (pointer events)
     ============================================================ */
  function makeDraggable(el){
    let dragging=false, moved=false;
    let startX=0, startY=0, originLeft=0, originTop=0;
    let downTime=0;

    el.addEventListener("pointerdown", (e)=>{
      e.preventDefault();
      ac();
      dragging=true; moved=false;
      downTime = performance.now();
      startX = e.clientX; startY = e.clientY;
      originLeft = parseFloat(el.style.left);
      originTop  = parseFloat(el.style.top);
      el.classList.add("dragging");
      el.classList.remove("wiggle");
      el.setPointerCapture(e.pointerId);
    });

    el.addEventListener("pointermove", (e)=>{
      if(!dragging) return;
      const dx = e.clientX - startX;
      const dy = e.clientY - startY;
      if (Math.abs(dx)>3 || Math.abs(dy)>3) moved=true;
      let nx = originLeft + dx;
      let ny = originTop + dy;
      const sr = stage.getBoundingClientRect();
      nx = Math.max(6, Math.min(sr.width-6, nx));
      ny = Math.max(6, Math.min(sr.height-6, ny));
      el.style.left = nx+"px";
      el.style.top  = ny+"px";
      if (selected===el) positionBadge();
    });

    function endDrag(e){
      if(!dragging) return;
      dragging=false;
      el.classList.remove("dragging");
      const heldShort = (performance.now()-downTime) < 350;
      if (!moved && heldShort){
        // tap = select + spin a little
        if (selected===el){
          // second tap: spin & grow toggle fun
          el._state.rot += 45;
          el._state.scale = el._state.scale >= 1.6 ? 0.8 : el._state.scale + 0.2;
          applyTransform(el);
          tone(660,0.12,"triangle",0.12,0,990);
          sparkle(el);
        } else {
          selectSticker(el);
          tone(540,0.1,"sine",0.1);
        }
      } else if (moved) {
        plopSound();
      }
    }
    el.addEventListener("pointerup", endDrag);
    el.addEventListener("pointercancel", endDrag);
  }

  function sparkle(el){
    const r = el.getBoundingClientRect();
    burst(r.left + r.width/2, r.top + r.height/2, "✨");
    sparkleSound();
  }

  /* ============================================================
     Tray interactions: tap-to-arm + drag-to-place
     ============================================================ */
  let armedEmoji = null;     // tap selected from tray
  let armedTile = null;

  function attachTrayHandlers(tile, emoji){
    let dragging=false, moved=false;
    let pid=null;

    tile.addEventListener("pointerdown",(e)=>{
      e.preventDefault();
      ac();
      dragging=true; moved=false; pid=e.pointerId;
      ghost.textContent = emoji;
      tile.setPointerCapture(e.pointerId);
    });

    tile.addEventListener("pointermove",(e)=>{
      if(!dragging) return;
      if (!moved){
        moved=true;
        ghost.style.display="block";
        tile.classList.add("ghost");
        whoosh();
      }
      ghost.style.left = e.clientX+"px";
      ghost.style.top  = e.clientY+"px";
    });

    function end(e){
      if(!dragging) return;
      dragging=false;
      tile.classList.remove("ghost");
      ghost.style.display="none";
      const sr = stage.getBoundingClientRect();
      const inStage = e.clientX>=sr.left && e.clientX<=sr.right && e.clientY>=sr.top && e.clientY<=sr.bottom;
      if (moved){
        if (inStage){
          addSticker(emoji, e.clientX, e.clientY);
        }
        armedEmoji=null; if(armedTile) armedTile.style.borderColor=""; armedTile=null;
      } else {
        // tap on tile: arm it (and place a copy near center as instant gratification? -> just arm)
        if (armedTile) armedTile.style.borderColor="";
        if (armedEmoji===emoji){
          armedEmoji=null; armedTile=null; // toggle off
          tone(400,0.08,"sine",0.08);
        } else {
          armedEmoji=emoji; armedTile=tile;
          tile.style.borderColor="var(--gold)";
          tone(720,0.1,"triangle",0.1);
        }
      }
    }
    tile.addEventListener("pointerup",end);
    tile.addEventListener("pointercancel",end);
  }

  // Click on stage: if armed, place sticker there; else clear selection
  stage.addEventListener("pointerdown",(e)=>{
    // ignore if clicking a sticker / badge / greeting (handled separately)
    if (e.target.classList.contains("sticker") ||
        e.target.classList.contains("del-badge") ||
        e.target===greeting) return;
    ac();
    if (armedEmoji){
      addSticker(armedEmoji, e.clientX, e.clientY);
      // keep armed so kids can stamp many — fun!
    } else {
      clearSelection();
    }
  });

  /* keep badge aligned on resize/scroll */
  window.addEventListener("resize", ()=>{ positionBadge(); resizeFx(); });

  /* ============================================================
     Confetti / sparkle FX canvas
     ============================================================ */
  function resizeFx(){
    fx.width = stage.clientWidth;
    fx.height = stage.clientHeight;
  }
  resizeFx();

  let particles = [];
  const COLORS = ["#ffd86b","#ff5c7c","#5ab6ff","#4cc94c","#ff8a5c","#c89bff","#ffffff"];
  function confetti(n=140, originX=null, originY=null){
    const W=fx.width, H=fx.height;
    for(let i=0;i<n;i++){
      particles.push({
        x: originX!=null?originX:Math.random()*W,
        y: originY!=null?originY:-10,
        vx:(Math.random()-0.5)*7,
        vy: originY!=null? (Math.random()*-9-3) : (Math.random()*3+2),
        g: 0.18 + Math.random()*0.12,
        size: 5+Math.random()*7,
        rot: Math.random()*Math.PI,
        vr:(Math.random()-0.5)*0.4,
        color: COLORS[(Math.random()*COLORS.length)|0],
        life: 0,
        max: 120+Math.random()*80,
        shape: Math.random()<0.3?"circle":"rect"
      });
    }
    if(!fxRunning) runFx();
  }
  let fxRunning=false;
  function runFx(){
    fxRunning=true;
    function frame(){
      ctx.clearRect(0,0,fx.width,fx.height);
      for(let i=particles.length-1;i>=0;i--){
        const p=particles[i];
        p.vy+=p.g; p.x+=p.vx; p.y+=p.vy; p.vx*=0.99; p.rot+=p.vr; p.life++;
        const alpha = Math.max(0, 1 - p.life/p.max);
        ctx.save();
        ctx.globalAlpha=alpha;
        ctx.translate(p.x,p.y);
        ctx.rotate(p.rot);
        ctx.fillStyle=p.color;
        if(p.shape==="circle"){ ctx.beginPath(); ctx.arc(0,0,p.size/2,0,7); ctx.fill(); }
        else ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size*0.6);
        ctx.restore();
        if(p.life>=p.max || p.y>fx.height+20) particles.splice(i,1);
      }
      if(particles.length){ requestAnimationFrame(frame); }
      else { fxRunning=false; ctx.clearRect(0,0,fx.width,fx.height); }
    }
    requestAnimationFrame(frame);
  }

  // emoji burst (DOM-based, cheap)
  function burst(clientX, clientY, glyph){
    const sr = stage.getBoundingClientRect();
    const n = 6;
    for(let i=0;i<n;i++){
      const s=document.createElement("div");
      s.className="sparkle";
      s.textContent = glyph || ["✨","⭐","❄️","💫"][(Math.random()*4)|0];
      const ang = (Math.PI*2*i)/n + Math.random();
      const dist = 30+Math.random()*40;
      const x = clientX - sr.left;
      const y = clientY - sr.top;
      s.style.left = x+"px"; s.style.top=y+"px";
      s.style.setProperty("--x", Math.cos(ang)*dist+"px");
      stage.appendChild(s);
      // animate outward manually with transition
      requestAnimationFrame(()=>{
        s.style.transition="transform .7s ease-out, opacity .7s ease-out";
        s.style.transform=`translate(calc(-50% + ${Math.cos(ang)*dist}px), calc(-50% + ${Math.sin(ang)*dist}px)) scale(1.5) rotate(${Math.random()*90}deg)`;
        s.style.opacity="0";
      });
      setTimeout(()=>s.remove(),750);
    }
  }

  /* ============================================================
     Toolbar buttons
     ============================================================ */
  let themeIdx = 0;
  function applyTheme(i){
    const t = THEMES[i];
    stage.style.background =
      `radial-gradient(120% 80% at 78% -10%, rgba(255,236,150,0.20), transparent 45%),
       linear-gradient(180deg, ${t.top} 0%, ${t.mid} 45%, ${t.bot} 100%)`;
    document.getElementById("aurora").style.opacity = t.aurora;
    showHint("🌈 Theme: " + t.name);
  }
  document.getElementById("themeBtn").addEventListener("click",()=>{
    ac();
    themeIdx = (themeIdx+1)%THEMES.length;
    applyTheme(themeIdx);
    whoosh();
  });

  document.getElementById("snowBtn").addEventListener("click",()=>{
    ac();
    snowLevel = (snowLevel+1)%SNOW_LEVELS.length;
    buildSnow(SNOW_LEVELS[snowLevel]);
    const labels=["Snow: Off ☀️","Snow: Light ❄️","Snow: Medium 🌨️","Snow: Blizzard! ⛄"];
    showHint(labels[snowLevel]);
    if(snowLevel>0) sparkleSound(); else tone(300,0.15,"sine",0.1);
  });

  document.getElementById("confettiBtn").addEventListener("click",()=>{
    ac();
    confetti(160);
    jingle();
    showHint("🎉 Hooray! Happy Holidays! 🎉");
  });

  document.getElementById("soundBtn").addEventListener("click",(e)=>{
    soundOn = !soundOn;
    e.currentTarget.textContent = soundOn ? "🔊" : "🔇";
    e.currentTarget.classList.toggle("muted", !soundOn);
    if(soundOn){ ac(); bell(880); showHint("🔊 Sound on"); }
    else showHint("🔇 Sound off");
  });

  document.getElementById("clearBtn").addEventListener("click",()=>{
    ac();
    clearSelection();
    const stickers = [...stage.querySelectorAll(".sticker")];
    if(!stickers.length){ showHint("Card is already empty 🤍"); return; }
    stickers.forEach((s,i)=>{
      setTimeout(()=>{
        s.style.transition="transform .3s, opacity .3s";
        s.style.transform += " translateY(40px) scale(0)";
        s.style.opacity="0";
        setTimeout(()=>s.remove(),300);
      }, i*40);
    });
    whoosh();
    showHint("🧹 Fresh card! Start decorating!");
  });

  /* Surprise: scatter a random festive scene */
  const SCENES = [
    ["🎅","🦌","🛷","🎁","🎁","⛄","🌲","🌲","⭐","✨","❄️","🔔"],
    ["⛄","🐧","🐻‍❄️","🦊","❄️","❄️","🌲","🌟","🧦","🍪","🥛"],
    ["🎄","🎁","🎀","🔔","⭐","🕯️","🧦","🍬","🍭","✨","👼","🎶"]
  ];
  let sceneIdx=0;
  document.getElementById("surpriseBtn").addEventListener("click",()=>{
    ac();
    // clear quickly
    stage.querySelectorAll(".sticker").forEach(s=>s.remove());
    clearSelection();
    const scene = SCENES[sceneIdx % SCENES.length]; sceneIdx++;
    const sr = stage.getBoundingClientRect();
    scene.forEach((emoji,i)=>{
      setTimeout(()=>{
        const x = sr.left + sr.width*(0.12 + Math.random()*0.76);
        const y = sr.top  + sr.height*(0.28 + Math.random()*0.55);
        addSticker(emoji, x, y, {size: 40+Math.random()*30});
      }, i*90);
    });
    confetti(70);
    jingle();
    const phrases=["✨ Ta-da! ✨","🎲 Surprise scene!","🎁 A little holiday magic!"];
    showHint(phrases[(Math.random()*phrases.length)|0]);
  });

  /* ============================================================
     Greeting interactions
     ============================================================ */
  greeting.addEventListener("focus", ()=>{ tone(640,0.1,"sine",0.08); });
  greeting.addEventListener("input", ()=>{
    if (Math.random()<0.5) popSound();
  });
  greeting.addEventListener("keydown",(e)=>{ if(e.key==="Enter"){ e.preventDefault(); greeting.blur(); confetti(50); }});

  /* ============================================================
     Hint toast
     ============================================================ */
  let hintTimer=null;
  function showHint(msg){
    let h=document.getElementById("hint");
    if(h) h.remove();
    h=document.createElement("div");
    h.id="hint"; h.textContent=msg;
    stage.appendChild(h);
    clearTimeout(hintTimer);
    hintTimer=setTimeout(()=>{ if(h) h.remove(); }, 2600);
  }

  /* ============================================================
     Default decorations
     ============================================================ */
  function placeDefaults(){
    // Use stage fractions so it looks good on any screen
    const sr = stage.getBoundingClientRect();
    const P = (fx,fy,emoji,size,rot,scale)=>{
      const el = addSticker(emoji, sr.left+sr.width*fx, sr.top+sr.height*fy,
                            {size, rot, scale});
      el.classList.add("wiggle");
      el.classList.remove("plop");
      return el;
    };
    // a cozy default scene
    P(0.16, 0.74, "🎄", 76, -3, 1);
    P(0.83, 0.78, "⛄", 70,  2, 1);
    P(0.50, 0.80, "🎁", 50,  6, 1);
    P(0.40, 0.84, "🎁", 42, -10, 1);
    P(0.72, 0.45, "🦌", 52, 0, 1);
    P(0.24, 0.40, "⭐", 40, 0, 1);
    P(0.62, 0.32, "🔔", 38, -8, 1);
    P(0.88, 0.30, "🌟", 34, 0, 1);
  }
  // place after layout settled
  requestAnimationFrame(()=>requestAnimationFrame(placeDefaults));

  /* gentle welcome jingle on first interaction */
  let welcomed=false;
  function welcome(){
    if(welcomed) return; welcomed=true;
    ac(); bell(660);
  }
  document.addEventListener("pointerdown", welcome, {once:true});

})();
</script>
</body>
