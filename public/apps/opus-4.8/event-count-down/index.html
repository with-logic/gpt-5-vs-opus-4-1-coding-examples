<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Countdown · Live Event Timer</title>
<style>
  :root{
    --bg:#0a0a0f;
    --ink:#f5f5f7;
    --muted:rgba(245,245,247,.62);
    --faint:rgba(245,245,247,.40);
    --accent:#7c5cff;
    --accent2:#ff5c9d;
    --glass:rgba(255,255,255,.06);
    --glass-strong:rgba(255,255,255,.10);
    --stroke:rgba(255,255,255,.14);
    --radius:22px;
    --shadow:0 30px 80px -20px rgba(0,0,0,.7);
    --ease:cubic-bezier(.22,1,.36,1);
  }

  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);
    color:var(--ink);
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    position:relative;
    height:100dvh;
  }

  /* ---------- Background layers ---------- */
  #stage{position:fixed;inset:0;overflow:hidden;z-index:0;}

  .bg-layer{
    position:absolute;
    inset:-8%;               /* overscan for parallax */
    background-size:cover;
    background-position:center;
    transition:opacity 1.1s var(--ease);
    will-change:transform;
  }
  #bgImage{
    opacity:0;
    transform:scale(1.08);
  }
  #bgImage.show{opacity:1;}

  /* Animated gradient fallback / ambient */
  #bgGradient{
    background:
      radial-gradient(120% 90% at 18% 12%, rgba(124,92,255,.55), transparent 55%),
      radial-gradient(110% 100% at 85% 18%, rgba(255,92,157,.42), transparent 50%),
      radial-gradient(130% 120% at 50% 110%, rgba(40,180,255,.40), transparent 55%),
      linear-gradient(140deg,#11071f,#06060e 60%);
    animation:drift 26s ease-in-out infinite alternate;
    transition:opacity 1.1s var(--ease);
  }
  #bgGradient.dim{opacity:.32;}
  @keyframes drift{
    0%{transform:scale(1.05) translate(0,0);}
    50%{transform:scale(1.12) translate(-1.5%,1.5%);}
    100%{transform:scale(1.06) translate(1.5%,-1%);}
  }

  /* Floating particles */
  #particles{position:absolute;inset:0;pointer-events:none;}
  .p{
    position:absolute;border-radius:50%;
    background:rgba(255,255,255,.7);
    filter:blur(.4px);
    animation:float linear infinite;
    opacity:0;
  }
  @keyframes float{
    0%{transform:translateY(20px);opacity:0;}
    12%{opacity:var(--o);}
    88%{opacity:var(--o);}
    100%{transform:translateY(-120px);opacity:0;}
  }

  /* Vignette + scrim for legibility */
  #scrim{
    position:absolute;inset:0;pointer-events:none;
    background:
      radial-gradient(120% 120% at 50% 40%, transparent 35%, rgba(0,0,0,.55) 100%),
      linear-gradient(180deg, rgba(0,0,0,.35), rgba(0,0,0,.15) 40%, rgba(0,0,0,.55));
  }

  /* ---------- Main layout ---------- */
  #app{
    position:relative;z-index:2;
    height:100dvh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }

  #hero{
    text-align:center;
    width:100%;
    max-width:1080px;
    transform:translateZ(0);
    will-change:transform;
  }

  .eyebrow{
    display:inline-flex;align-items:center;gap:8px;
    font-size:12px;letter-spacing:.28em;text-transform:uppercase;
    color:var(--muted);
    padding:8px 16px;border-radius:999px;
    background:var(--glass);border:1px solid var(--stroke);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    margin-bottom:22px;
  }
  .eyebrow .dot{
    width:7px;height:7px;border-radius:50%;
    background:#3ddc84;box-shadow:0 0 0 0 rgba(61,220,132,.6);
    animation:pulse 2.4s infinite;
  }
  .eyebrow.past .dot{background:var(--accent2);animation:none;}
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(61,220,132,.55);}
    70%{box-shadow:0 0 0 9px rgba(61,220,132,0);}
    100%{box-shadow:0 0 0 0 rgba(61,220,132,0);}
  }

  #eventName{
    font-size:clamp(30px,6vw,72px);
    font-weight:800;
    line-height:1.02;
    letter-spacing:-.02em;
    margin-bottom:10px;
    text-shadow:0 4px 30px rgba(0,0,0,.45);
    background:linear-gradient(180deg,#fff,rgba(255,255,255,.78));
    -webkit-background-clip:text;background-clip:text;
    -webkit-text-fill-color:transparent;
    word-break:break-word;
  }
  #eventMeta{
    font-size:clamp(13px,1.6vw,17px);
    color:var(--muted);
    margin-bottom:clamp(28px,5vw,52px);
    display:flex;gap:18px;justify-content:center;flex-wrap:wrap;
  }
  #eventMeta span{display:inline-flex;align-items:center;gap:7px;}
  #eventMeta svg{width:16px;height:16px;opacity:.8;}

  /* ---------- Countdown ---------- */
  #countdown{
    display:flex;
    gap:clamp(10px,2.2vw,26px);
    justify-content:center;
    align-items:stretch;
    flex-wrap:wrap;
  }
  .unit{
    position:relative;
    min-width:clamp(74px,15vw,160px);
    padding:clamp(16px,2.4vw,30px) clamp(8px,1.6vw,18px);
    border-radius:var(--radius);
    background:var(--glass);
    border:1px solid var(--stroke);
    box-shadow:var(--shadow), inset 0 1px 0 rgba(255,255,255,.12);
    backdrop-filter:blur(22px) saturate(160%);
    -webkit-backdrop-filter:blur(22px) saturate(160%);
    overflow:hidden;
  }
  .unit::before{
    content:"";position:absolute;inset:0;
    background:linear-gradient(180deg,rgba(255,255,255,.10),transparent 40%);
    pointer-events:none;
  }
  .unit::after{
    content:"";position:absolute;left:0;right:0;top:50%;height:1px;
    background:rgba(0,0,0,.28);
  }
  .digits{
    font-variant-numeric:tabular-nums;
    font-feature-settings:"tnum";
    font-weight:800;
    font-size:clamp(40px,8.4vw,98px);
    line-height:1;
    letter-spacing:-.03em;
    display:flex;justify-content:center;
    text-shadow:0 6px 26px rgba(0,0,0,.4);
  }
  .digit{
    position:relative;
    display:inline-block;
    width:.62em;
    height:1em;
    overflow:hidden;
    text-align:center;
  }
  .digit .col{
    position:absolute;left:0;right:0;top:0;
    transition:transform .62s var(--ease);
    will-change:transform;
  }
  .digit .col span{display:block;height:1em;line-height:1;}
  .label{
    margin-top:14px;
    font-size:clamp(9px,1.1vw,12px);
    letter-spacing:.22em;text-transform:uppercase;
    color:var(--faint);
  }

  #doneMsg{
    display:none;
    font-size:clamp(22px,4vw,40px);
    font-weight:800;
    letter-spacing:-.01em;
    padding:clamp(24px,4vw,40px);
    border-radius:var(--radius);
    background:linear-gradient(135deg,rgba(124,92,255,.30),rgba(255,92,157,.22));
    border:1px solid var(--stroke);
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    box-shadow:var(--shadow);
  }

  /* ---------- Actions ---------- */
  #actions{
    margin-top:clamp(30px,5vw,52px);
    display:flex;gap:14px;justify-content:center;flex-wrap:wrap;
  }
  .btn{
    appearance:none;border:none;cursor:pointer;
    font:inherit;font-weight:600;font-size:15px;
    padding:14px 24px;border-radius:14px;
    display:inline-flex;align-items:center;gap:9px;
    transition:transform .25s var(--ease),box-shadow .25s var(--ease),background .25s;
    color:#fff;
  }
  .btn svg{width:18px;height:18px;}
  .btn:active{transform:scale(.96);}
  .btn-primary{
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    box-shadow:0 14px 34px -10px rgba(124,92,255,.7);
  }
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 20px 44px -10px rgba(124,92,255,.85);}
  .btn-ghost{
    background:var(--glass);border:1px solid var(--stroke);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  }
  .btn-ghost:hover{background:var(--glass-strong);transform:translateY(-2px);}

  /* ---------- Settings panel ---------- */
  #editToggle{
    position:fixed;top:20px;right:20px;z-index:30;
    width:46px;height:46px;border-radius:50%;
    display:grid;place-items:center;
    background:var(--glass);border:1px solid var(--stroke);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    color:var(--ink);cursor:pointer;
    transition:transform .3s var(--ease),background .3s;
  }
  #editToggle:hover{transform:rotate(45deg);background:var(--glass-strong);}
  #editToggle svg{width:22px;height:22px;}

  #panel{
    position:fixed;top:0;right:0;bottom:0;z-index:40;
    width:min(420px,100%);
    background:rgba(14,14,22,.82);
    border-left:1px solid var(--stroke);
    backdrop-filter:blur(34px) saturate(160%);
    -webkit-backdrop-filter:blur(34px) saturate(160%);
    box-shadow:-30px 0 90px -30px rgba(0,0,0,.8);
    transform:translateX(105%);
    transition:transform .55s var(--ease);
    display:flex;flex-direction:column;
    overflow-y:auto;
  }
  #panel.open{transform:translateX(0);}
  .panel-head{
    display:flex;align-items:center;justify-content:space-between;
    padding:24px 26px 6px;
  }
  .panel-head h2{font-size:19px;font-weight:700;letter-spacing:-.01em;}
  #closePanel{
    width:34px;height:34px;border-radius:10px;border:1px solid var(--stroke);
    background:var(--glass);color:var(--ink);cursor:pointer;display:grid;place-items:center;
    transition:background .2s;
  }
  #closePanel:hover{background:var(--glass-strong);}
  .panel-body{padding:14px 26px 30px;display:flex;flex-direction:column;gap:20px;}

  .field label{
    display:block;font-size:12px;letter-spacing:.04em;
    color:var(--muted);margin-bottom:8px;font-weight:600;
    text-transform:uppercase;
  }
  .field input[type=text],
  .field input[type=datetime-local]{
    width:100%;padding:13px 14px;border-radius:12px;
    background:rgba(255,255,255,.05);
    border:1px solid var(--stroke);
    color:var(--ink);font:inherit;font-size:15px;
    transition:border .2s,background .2s,box-shadow .2s;
  }
  .field input::placeholder{color:var(--faint);}
  .field input:focus{
    outline:none;border-color:var(--accent);
    background:rgba(124,92,255,.08);
    box-shadow:0 0 0 4px rgba(124,92,255,.16);
  }
  /* style native datetime icon for dark bg */
  input[type=datetime-local]::-webkit-calendar-picker-indicator{
    filter:invert(1);opacity:.6;cursor:pointer;
  }

  .drop{
    border:1.5px dashed var(--stroke);
    border-radius:14px;
    padding:20px;text-align:center;
    cursor:pointer;color:var(--muted);font-size:13px;
    transition:border .25s,background .25s,color .25s;
    position:relative;overflow:hidden;
  }
  .drop:hover,.drop.drag{border-color:var(--accent);background:rgba(124,92,255,.08);color:var(--ink);}
  .drop svg{width:26px;height:26px;margin-bottom:8px;opacity:.7;}
  .drop strong{color:var(--ink);font-weight:600;}
  #thumb{
    margin-top:12px;height:88px;border-radius:12px;
    background-size:cover;background-position:center;
    border:1px solid var(--stroke);display:none;position:relative;
  }
  #thumb.show{display:block;}
  #clearImg{
    position:absolute;top:6px;right:6px;
    background:rgba(0,0,0,.6);border:none;color:#fff;
    width:26px;height:26px;border-radius:8px;cursor:pointer;font-size:14px;
    display:grid;place-items:center;backdrop-filter:blur(6px);
  }

  .presets{display:flex;gap:8px;flex-wrap:wrap;}
  .preset{
    font-size:12px;padding:7px 12px;border-radius:999px;
    background:var(--glass);border:1px solid var(--stroke);
    color:var(--muted);cursor:pointer;transition:.2s;
  }
  .preset:hover{background:var(--glass-strong);color:var(--ink);border-color:var(--accent);}

  .hint{font-size:11.5px;color:var(--faint);line-height:1.5;}

  /* overlay behind panel */
  #overlay{
    position:fixed;inset:0;z-index:35;background:rgba(0,0,0,.4);
    opacity:0;pointer-events:none;transition:opacity .4s;
  }
  #overlay.show{opacity:1;pointer-events:auto;}

  /* toast */
  #toast{
    position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);
    z-index:60;background:rgba(20,20,30,.92);border:1px solid var(--stroke);
    color:var(--ink);padding:12px 20px;border-radius:12px;font-size:14px;
    backdrop-filter:blur(14px);box-shadow:var(--shadow);
    opacity:0;pointer-events:none;transition:.4s var(--ease);
    display:flex;align-items:center;gap:9px;
  }
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  #toast svg{width:17px;height:17px;color:#3ddc84;}

  @media (max-width:520px){
    .panel-body{padding:14px 18px 28px;}
    #eventMeta{gap:12px;}
  }
  @media (prefers-reduced-motion:reduce){
    *{animation-duration:.001ms!important;}
    .digit .col{transition:none;}
    .bg-layer{transition:none;}
  }
</style>
</head>
<body>
  <div id="stage">
    <div id="bgGradient" class="bg-layer"></div>
    <div id="bgImage" class="bg-layer"></div>
    <div id="particles"></div>
    <div id="scrim"></div>
  </div>

  <button id="editToggle" title="Edit event" aria-label="Edit event">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
  </button>

  <main id="app">
    <div id="hero">
      <div class="eyebrow" id="status"><span class="dot"></span><span id="statusText">Counting down</span></div>
      <h1 id="eventName">Your Event</h1>
      <div id="eventMeta">
        <span id="metaDate"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg><em></em></span>
        <span id="metaLoc" style="display:none"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 12-9 12s-9-5-9-12a9 9 0 0 1 18 0Z"/><circle cx="12" cy="10" r="3"/></svg><em></em></span>
      </div>

      <div id="countdown" aria-live="polite">
        <div class="unit"><div class="digits" data-unit="days"></div><div class="label">Days</div></div>
        <div class="unit"><div class="digits" data-unit="hours"></div><div class="label">Hours</div></div>
        <div class="unit"><div class="digits" data-unit="minutes"></div><div class="label">Minutes</div></div>
        <div class="unit"><div class="digits" data-unit="seconds"></div><div class="label">Seconds</div></div>
      </div>

      <div id="doneMsg">🎉 The moment has arrived</div>

      <div id="actions">
        <button class="btn btn-primary" id="calBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18M12 14v4M10 16h4"/></svg>
          Save to Calendar
        </button>
        <button class="btn btn-ghost" id="shareBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><path d="M16 6l-4-4-4 4M12 2v14"/></svg>
          Share
        </button>
      </div>
    </div>
  </main>

  <div id="overlay"></div>

  <aside id="panel" aria-label="Event settings">
    <div class="panel-head">
      <h2>Event details</h2>
      <button id="closePanel" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="panel-body">
      <div class="field">
        <label for="inName">Event name</label>
        <input type="text" id="inName" placeholder="New Year's Eve Party" autocomplete="off" />
      </div>
      <div class="field">
        <label for="inDate">Date &amp; time</label>
        <input type="datetime-local" id="inDate" />
        <div class="presets" style="margin-top:10px">
          <span class="preset" data-add="3600000">+1 hour</span>
          <span class="preset" data-add="86400000">+1 day</span>
          <span class="preset" data-add="604800000">+1 week</span>
          <span class="preset" data-newyear>New Year</span>
        </div>
      </div>
      <div class="field">
        <label for="inLoc">Location <span style="text-transform:none;color:var(--faint)">(optional)</span></label>
        <input type="text" id="inLoc" placeholder="Brooklyn, NY" autocomplete="off" />
      </div>
      <div class="field">
        <label>Background image</label>
        <div class="drop" id="drop">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M17 8l-5-5-5 5M12 3v12"/></svg>
          <div>Drop an image or <strong>browse</strong></div>
          <input type="file" id="file" accept="image/*" hidden />
        </div>
        <div id="thumb"><button id="clearImg" title="Remove">✕</button></div>
        <p class="hint" style="margin-top:8px">Tip: a high-contrast photo keeps the numbers readable.</p>
      </div>
    </div>
  </aside>

  <div id="toast"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg><span id="toastText"></span></div>

<script>
(() => {
  "use strict";
  const $ = s => document.querySelector(s);
  const reduceMotion = matchMedia("(prefers-reduced-motion: reduce)").matches;

  /* ---------------- State ---------------- */
  const KEY = "countdown.state.v1";
  const defaults = () => {
    const d = new Date(Date.now() + 1000 * 60 * 60 * 24 * 30); // 30 days out
    d.setHours(20, 0, 0, 0);
    return { name: "New Year's Eve", date: d.getTime(), loc: "Times Square, NYC", img: null };
  };
  let state = load();
  function load(){
    try{ const s = JSON.parse(localStorage.getItem(KEY)); if(s && s.date) return s; }catch(e){}
    return defaults();
  }
  function save(){ try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(e){} }

  /* ---------------- Flip digit renderer ---------------- */
  // For each unit we keep an array of digit columns; each column scrolls 0-9 vertically.
  const digitCache = new Map(); // unitEl -> {len, cols:[el...], vals:[n...]}

  function renderUnit(unitEl, value, minLen){
    let str = String(Math.max(0, value));
    if(str.length < minLen) str = str.padStart(minLen, "0");
    let cache = digitCache.get(unitEl);

    if(!cache || cache.len !== str.length){
      unitEl.innerHTML = "";
      const cols = [], vals = [];
      for(let i=0;i<str.length;i++){
        const digit = document.createElement("span");
        digit.className = "digit";
        const col = document.createElement("span");
        col.className = "col";
        for(let n=0;n<10;n++){
          const s = document.createElement("span");
          s.textContent = n;
          col.appendChild(s);
        }
        digit.appendChild(col);
        unitEl.appendChild(digit);
        cols.push(col); vals.push(-1);
      }
      cache = { len: str.length, cols, vals };
      digitCache.set(unitEl, cache);
    }

    for(let i=0;i<str.length;i++){
      const n = +str[i];
      if(cache.vals[i] !== n){
        cache.vals[i] = n;
        cache.cols[i].style.transform = `translateY(${-n}em)`;
      }
    }
  }

  /* ---------------- Countdown loop ---------------- */
  let lastSecond = -1, finished = false, confettiFired = false;
  function tick(){
    const now = Date.now();
    const diff = state.date - now;

    if(diff <= 0){
      if(!finished){ enterFinished(); }
      // still update to all zeros once
      if(!confettiFired){ confettiFired = true; }
      return;
    }
    if(finished){ exitFinished(); }

    const totalSec = Math.floor(diff / 1000);
    const days = Math.floor(totalSec / 86400);
    const hours = Math.floor((totalSec % 86400) / 3600);
    const mins = Math.floor((totalSec % 3600) / 60);
    const secs = totalSec % 60;

    if(secs !== lastSecond || days >= 0){
      renderUnit($('[data-unit=days]'), days, 2);
      renderUnit($('[data-unit=hours]'), hours, 2);
      renderUnit($('[data-unit=minutes]'), mins, 2);
      renderUnit($('[data-unit=seconds]'), secs, 2);
      lastSecond = secs;
    }
  }

  function enterFinished(){
    finished = true;
    $('#countdown').style.display = "none";
    $('#doneMsg').style.display = "inline-block";
    $('#status').classList.add("past");
    $('#statusText').textContent = "Event started";
    if(!reduceMotion) confetti();
  }
  function exitFinished(){
    finished = false; confettiFired = false;
    $('#countdown').style.display = "flex";
    $('#doneMsg').style.display = "none";
    $('#status').classList.remove("past");
    $('#statusText').textContent = "Counting down";
  }

  /* ---------------- Header / meta ---------------- */
  const fmt = new Intl.DateTimeFormat(undefined, {
    weekday:'short', month:'short', day:'numeric', year:'numeric',
    hour:'numeric', minute:'2-digit'
  });
  function renderMeta(){
    $('#eventName').textContent = state.name || "Your Event";
    $('#metaDate em').textContent = fmt.format(new Date(state.date));
    const locWrap = $('#metaLoc');
    if(state.loc && state.loc.trim()){
      locWrap.style.display = "inline-flex";
      locWrap.querySelector('em').textContent = state.loc;
    } else locWrap.style.display = "none";
    document.title = (state.name ? state.name + " · " : "") + "Countdown";
  }

  function renderBg(){
    const img = $('#bgImage'), grad = $('#bgGradient');
    if(state.img){
      img.style.backgroundImage = `url("${state.img}")`;
      img.classList.add("show");
      grad.classList.add("dim");
    } else {
      img.classList.remove("show");
      grad.classList.remove("dim");
      img.style.backgroundImage = "";
    }
  }

  function renderAll(){ renderMeta(); renderBg(); finished=false; confettiFired=false;
    $('#countdown').style.display="flex"; $('#doneMsg').style.display="none";
    $('#status').classList.remove("past"); $('#statusText').textContent="Counting down";
    lastSecond=-1; tick();
  }

  /* ---------------- Parallax ---------------- */
  let px = 0, py = 0, tx = 0, ty = 0;
  function onMove(cx, cy){
    const w = innerWidth, h = innerHeight;
    tx = (cx / w - .5) * 2;  // -1..1
    ty = (cy / h - .5) * 2;
  }
  window.addEventListener("mousemove", e => onMove(e.clientX, e.clientY));
  window.addEventListener("deviceorientation", e => {
    if(e.gamma==null) return;
    tx = Math.max(-1, Math.min(1, e.gamma/35));
    ty = Math.max(-1, Math.min(1, (e.beta-45)/35));
  });
  const img = $('#bgImage'), grad = $('#bgGradient'), hero = $('#hero');
  function parallaxLoop(){
    px += (tx - px) * 0.06;
    py += (ty - py) * 0.06;
    if(!reduceMotion){
      img.style.transform  = `scale(1.12) translate(${px*-22}px, ${py*-22}px)`;
      grad.style.transform = `translate(${px*-12}px, ${py*-12}px)`;
      hero.style.transform = `translate(${px*8}px, ${py*8}px)`;
    }
    requestAnimationFrame(parallaxLoop);
  }

  /* ---------------- Particles ---------------- */
  function buildParticles(){
    const box = $('#particles');
    const n = innerWidth < 600 ? 16 : 30;
    for(let i=0;i<n;i++){
      const p = document.createElement("div");
      p.className = "p";
      const size = 1 + Math.random()*3;
      p.style.width = p.style.height = size+"px";
      p.style.left = Math.random()*100 + "%";
      p.style.bottom = "-10px";
      const dur = 9 + Math.random()*14;
      p.style.animationDuration = dur+"s";
      p.style.animationDelay = (-Math.random()*dur)+"s";
      p.style.setProperty("--o", (0.15 + Math.random()*0.45).toFixed(2));
      box.appendChild(p);
    }
  }

  /* ---------------- Confetti ---------------- */
  function confetti(){
    const cv = document.createElement("canvas");
    Object.assign(cv.style,{position:"fixed",inset:0,zIndex:50,pointerEvents:"none"});
    document.body.appendChild(cv);
    const ctx = cv.getContext("2d");
    const dpr = Math.min(2, devicePixelRatio||1);
    function size(){ cv.width=innerWidth*dpr; cv.height=innerHeight*dpr; }
    size();
    const colors=["#7c5cff","#ff5c9d","#3ddc84","#ffd84d","#3fbaff","#ffffff"];
    const N=180, parts=[];
    for(let i=0;i<N;i++){
      parts.push({
        x:Math.random()*cv.width, y:-20*dpr - Math.random()*cv.height*0.5,
        r:(4+Math.random()*6)*dpr,
        vx:(Math.random()-.5)*6*dpr, vy:(2+Math.random()*4)*dpr,
        rot:Math.random()*Math.PI, vr:(Math.random()-.5)*0.3,
        c:colors[i%colors.length], w:(6+Math.random()*6)*dpr
      });
    }
    let frame=0;
    (function run(){
      frame++;
      ctx.clearRect(0,0,cv.width,cv.height);
      parts.forEach(p=>{
        p.vy+=0.08*dpr; p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr;
        p.vx*=0.995;
        ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
        ctx.fillStyle=p.c; ctx.globalAlpha=Math.max(0,1-frame/320);
        ctx.fillRect(-p.w/2,-p.r/2,p.w,p.r);
        ctx.restore();
      });
      if(frame<340) requestAnimationFrame(run);
      else cv.remove();
    })();
  }

  /* ---------------- Calendar (.ics) ---------------- */
  function pad(n){ return String(n).padStart(2,"0"); }
  function toICSDate(ms){
    const d=new Date(ms);
    return d.getUTCFullYear()+pad(d.getUTCMonth()+1)+pad(d.getUTCDate())+"T"
      +pad(d.getUTCHours())+pad(d.getUTCMinutes())+pad(d.getUTCSeconds())+"Z";
  }
  function esc(s){ return String(s||"").replace(/([,;\\])/g,"\\$1").replace(/\n/g,"\\n"); }
  function saveToCalendar(){
    const start=state.date, end=start+1000*60*60; // 1h default
    const uid="cd-"+start+"@countdown.app";
    const ics=[
      "BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//Countdown//EN","CALSCALE:GREGORIAN",
      "BEGIN:VEVENT","UID:"+uid,
      "DTSTAMP:"+toICSDate(start),
      "DTSTART:"+toICSDate(start),
      "DTEND:"+toICSDate(end),
      "SUMMARY:"+esc(state.name||"Event"),
      state.loc?"LOCATION:"+esc(state.loc):"",
      "DESCRIPTION:"+esc("Countdown event"),
      "END:VEVENT","END:VCALENDAR"
    ].filter(Boolean).join("\r\n");
    const blob=new Blob([ics],{type:"text/calendar"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url; a.download=(state.name||"event").replace(/[^a-z0-9]+/gi,"-").toLowerCase()+".ics";
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),2000);
    toast("Calendar event downloaded");
  }

  /* ---------------- Share ---------------- */
  async function share(){
    const when = fmt.format(new Date(state.date));
    const text = `${state.name} — ${when}${state.loc?" · "+state.loc:""}`;
    if(navigator.share){
      try{ await navigator.share({title:state.name, text}); return; }catch(e){ if(e.name==="AbortError") return; }
    }
    try{ await navigator.clipboard.writeText(text); toast("Event details copied"); }
    catch(e){ toast("Could not share"); }
  }

  /* ---------------- Toast ---------------- */
  let toastT;
  function toast(msg){
    $('#toastText').textContent=msg;
    const t=$('#toast'); t.classList.add("show");
    clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),2600);
  }

  /* ---------------- Panel ---------------- */
  const panel=$('#panel'), overlay=$('#overlay');
  function openPanel(){
    syncInputs();
    panel.classList.add("open"); overlay.classList.add("show");
  }
  function closePanel(){ panel.classList.remove("open"); overlay.classList.remove("show"); }
  function syncInputs(){
    $('#inName').value = state.name || "";
    $('#inLoc').value = state.loc || "";
    // datetime-local needs local-time string
    const d=new Date(state.date);
    const local=new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,16);
    $('#inDate').value=local;
    const thumb=$('#thumb');
    if(state.img){ thumb.classList.add("show"); thumb.style.backgroundImage=`url("${state.img}")`; }
    else { thumb.classList.remove("show"); thumb.style.backgroundImage=""; }
  }

  $('#editToggle').addEventListener("click", openPanel);
  $('#closePanel').addEventListener("click", closePanel);
  overlay.addEventListener("click", closePanel);
  document.addEventListener("keydown", e=>{ if(e.key==="Escape") closePanel(); });

  // Live binding
  $('#inName').addEventListener("input", e=>{ state.name=e.target.value; renderMeta(); save(); });
  $('#inLoc').addEventListener("input", e=>{ state.loc=e.target.value; renderMeta(); save(); });
  $('#inDate').addEventListener("input", e=>{
    const v=e.target.value; if(!v) return;
    const t=new Date(v).getTime(); if(!isNaN(t)){ state.date=t; renderAll(); save(); }
  });

  // presets
  document.querySelectorAll(".preset").forEach(p=>{
    p.addEventListener("click",()=>{
      if(p.dataset.newyear){
        const now=new Date();
        const ny=new Date(now.getFullYear()+1,0,1,0,0,0);
        state.date=ny.getTime();
      } else {
        const base=Math.max(Date.now(), state.date);
        state.date=base + (+p.dataset.add);
      }
      renderAll(); syncInputs(); save();
    });
  });

  // image upload
  const fileInput=$('#file'), drop=$('#drop');
  function handleFile(file){
    if(!file || !file.type.startsWith("image/")){ toast("Please choose an image"); return; }
    if(file.size > 8*1024*1024){ toast("Image too large (max 8MB)"); return; }
    const reader=new FileReader();
    reader.onload=()=>{ state.img=reader.result; renderBg(); syncInputs(); save(); toast("Background updated"); };
    reader.readAsDataURL(file);
  }
  drop.addEventListener("click",()=>fileInput.click());
  fileInput.addEventListener("change",e=>handleFile(e.target.files[0]));
  ["dragenter","dragover"].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add("drag");}));
  ["dragleave","drop"].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove("drag");}));
  drop.addEventListener("drop",e=>{ if(e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); });
  $('#clearImg').addEventListener("click",e=>{ e.stopPropagation(); state.img=null; renderBg(); syncInputs(); save(); });

  // paste image anywhere
  window.addEventListener("paste",e=>{
    const item=[...(e.clipboardData?.items||[])].find(i=>i.type.startsWith("image/"));
    if(item) handleFile(item.getAsFile());
  });

  $('#calBtn').addEventListener("click", saveToCalendar);
  $('#shareBtn').addEventListener("click", share);

  /* ---------------- Boot ---------------- */
  buildParticles();
  renderAll();
  parallaxLoop();
  // drive countdown with rAF but only re-render on second change handled inside tick
  setInterval(tick, 200);
  tick();

  // Open panel automatically on first visit (no saved state)
  if(!localStorage.getItem(KEY)){ setTimeout(openPanel, 600); }
})();
</script>
</body>
</html>
