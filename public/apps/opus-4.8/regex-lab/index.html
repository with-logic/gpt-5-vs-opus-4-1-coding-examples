<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Regex Lab</title>
<style>
  :root {
    --bg: #0d1117;
    --bg-elev: #161b22;
    --bg-elev2: #1c232c;
    --border: #2d333b;
    --border-soft: #21262d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --text-faint: #6e7681;
    --accent: #58a6ff;
    --accent-2: #bc8cff;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d29922;
    --mono: "SF Mono", "JetBrains Mono", "Fira Code", "Cascadia Code", Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --shadow: 0 16px 50px -12px rgba(0,0,0,0.7);
    --radius: 12px;

    /* group highlight colors (dark) */
    --g0: rgba(88,166,255,0.30);
    --g1: rgba(63,185,80,0.30);
    --g2: rgba(188,140,255,0.32);
    --g3: rgba(210,153,34,0.34);
    --g4: rgba(248,81,73,0.30);
    --g5: rgba(57,211,200,0.32);
    --g6: rgba(255,123,200,0.30);
    --gb0: #58a6ff; --gb1: #3fb950; --gb2: #bc8cff; --gb3: #d29922;
    --gb4: #f85149; --gb5: #39d3c8; --gb6: #ff7bc8;
  }
  [data-theme="light"] {
    --bg: #eef1f5;
    --bg-elev: #ffffff;
    --bg-elev2: #f3f6fa;
    --border: #d4dae2;
    --border-soft: #e3e8ee;
    --text: #1f2328;
    --text-dim: #57606a;
    --text-faint: #8c959f;
    --accent: #0969da;
    --accent-2: #8250df;
    --green: #1a7f37;
    --red: #cf222e;
    --yellow: #9a6700;
    --shadow: 0 16px 50px -16px rgba(31,35,40,0.28);

    --g0: rgba(9,105,218,0.20);
    --g1: rgba(26,127,55,0.20);
    --g2: rgba(130,80,223,0.20);
    --g3: rgba(154,103,0,0.22);
    --g4: rgba(207,34,46,0.18);
    --g5: rgba(17,148,140,0.20);
    --g6: rgba(214,57,148,0.18);
    --gb0: #0969da; --gb1: #1a7f37; --gb2: #8250df; --gb3: #9a6700;
    --gb4: #cf222e; --gb5: #11948c; --gb6: #d63994;
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: var(--sans);
    background:
      radial-gradient(1100px 600px at 12% -8%, color-mix(in srgb, var(--accent) 14%, transparent), transparent 60%),
      radial-gradient(900px 600px at 100% 0%, color-mix(in srgb, var(--accent-2) 12%, transparent), transparent 55%),
      var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
    transition: background-color .25s ease, color .25s ease;
  }

  .shell {
    max-width: 1240px;
    margin: 0 auto;
    padding: 28px 22px 64px;
  }

  /* ---------- terminal window ---------- */
  .window {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .titlebar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 16px;
    background: linear-gradient(180deg, var(--bg-elev2), var(--bg-elev));
    border-bottom: 1px solid var(--border);
    user-select: none;
  }
  .lights { display: flex; gap: 8px; }
  .light { width: 12px; height: 12px; border-radius: 50%; }
  .light.r { background: #ff5f57; }
  .light.y { background: #febc2e; }
  .light.g { background: #28c840; }
  .titlebar .title {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text-dim);
    letter-spacing: .3px;
    flex: 1;
    text-align: center;
  }
  .titlebar .title b { color: var(--text); }
  .titlebar .tools { display: flex; gap: 8px; }
  .icon-btn {
    background: var(--bg-elev2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 7px;
    padding: 5px 10px;
    font-size: 12px;
    font-family: var(--mono);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: all .15s ease;
    white-space: nowrap;
  }
  .icon-btn:hover { border-color: var(--accent); color: var(--text); }
  .icon-btn:active { transform: translateY(1px); }
  .icon-btn.copied { border-color: var(--green); color: var(--green); }

  .body { padding: 20px; }

  /* ---------- pattern row ---------- */
  .pattern-row {
    display: flex;
    align-items: stretch;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-family: var(--mono);
    font-size: 15px;
    overflow: hidden;
    transition: border-color .15s ease, box-shadow .15s ease;
  }
  .pattern-row:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 22%, transparent);
  }
  .pattern-row.invalid { border-color: var(--red); }
  .pattern-row.invalid:focus-within { box-shadow: 0 0 0 3px color-mix(in srgb, var(--red) 22%, transparent); }
  .slash {
    display: flex; align-items: center; padding: 0 8px;
    color: var(--text-faint); background: var(--bg-elev2);
    font-size: 18px; user-select: none;
  }
  #pattern {
    flex: 1; min-width: 0; border: none; outline: none; background: transparent;
    color: var(--text); font-family: var(--mono); font-size: 15px;
    padding: 13px 6px;
  }
  #pattern::placeholder { color: var(--text-faint); }
  .flags-box {
    display: flex; align-items: center; gap: 1px; padding: 4px 6px;
    background: var(--bg-elev2); border-left: 1px solid var(--border);
  }
  .flag {
    width: 26px; height: 26px; display: grid; place-items: center;
    font-family: var(--mono); font-size: 13px; cursor: pointer;
    border-radius: 6px; color: var(--text-faint); user-select: none;
    transition: all .12s ease; position: relative;
  }
  .flag:hover { background: var(--bg); color: var(--text-dim); }
  .flag.on { color: var(--bg); background: var(--accent); font-weight: 600; }
  [data-theme="light"] .flag.on { color: #fff; }
  .flag .tip {
    position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%);
    background: var(--bg-elev2); border: 1px solid var(--border);
    color: var(--text); font-size: 11px; font-family: var(--sans);
    padding: 4px 8px; border-radius: 6px; white-space: nowrap;
    opacity: 0; pointer-events: none; transition: opacity .12s ease; z-index: 30;
    box-shadow: var(--shadow);
  }
  .flag:hover .tip { opacity: 1; }

  /* status line */
  .status {
    margin-top: 9px; min-height: 20px; font-family: var(--mono); font-size: 12.5px;
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .status .ok { color: var(--green); }
  .status .err { color: var(--red); }
  .badge {
    font-family: var(--mono); font-size: 11px; padding: 2px 7px; border-radius: 20px;
    background: var(--bg-elev2); border: 1px solid var(--border); color: var(--text-dim);
  }
  .badge.hl { border-color: var(--accent); color: var(--accent); }
  .err-caret {
    margin-top: 6px; font-family: var(--mono); font-size: 12.5px;
    background: color-mix(in srgb, var(--red) 12%, transparent);
    border: 1px solid color-mix(in srgb, var(--red) 40%, transparent);
    border-radius: 8px; padding: 9px 12px; color: var(--text);
    white-space: pre; overflow-x: auto;
  }
  .err-caret .pt { color: var(--red); }

  /* ---------- quick inserts ---------- */
  .inserts { margin-top: 18px; }
  .inserts h3, .pane h3, .panel h3 {
    margin: 0 0 9px; font-size: 11px; letter-spacing: 1.4px; text-transform: uppercase;
    color: var(--text-faint); font-weight: 600;
  }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    font-family: var(--mono); font-size: 12px; padding: 5px 9px;
    background: var(--bg); border: 1px solid var(--border); color: var(--text-dim);
    border-radius: 7px; cursor: pointer; transition: all .13s ease;
  }
  .chip:hover { border-color: var(--accent-2); color: var(--text); transform: translateY(-1px); }
  .chip:active { transform: translateY(0); }
  .chip b { color: var(--accent); }

  /* ---------- layout ---------- */
  .grid {
    margin-top: 20px; display: grid; gap: 20px;
    grid-template-columns: 1fr 1fr;
  }
  @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }

  .panel {
    background: var(--bg-elev); border: 1px solid var(--border-soft);
    border-radius: 10px; padding: 14px; min-width: 0;
  }
  .panel.full { grid-column: 1 / -1; }

  .ta-wrap { position: relative; }
  #text {
    width: 100%; min-height: 200px; resize: vertical;
    background: var(--bg); border: 1px solid var(--border); border-radius: 9px;
    color: var(--text); font-family: var(--mono); font-size: 14px; line-height: 1.65;
    padding: 12px 13px; outline: none; transition: border-color .15s ease;
    tab-size: 2;
  }
  #text:focus { border-color: var(--accent); }

  /* highlight pane */
  .highlight {
    background: var(--bg); border: 1px solid var(--border); border-radius: 9px;
    padding: 12px 13px; font-family: var(--mono); font-size: 14px; line-height: 1.65;
    white-space: pre-wrap; word-break: break-word; min-height: 120px;
    max-height: 420px; overflow: auto;
  }
  .highlight mark {
    border-radius: 4px; padding: 1px 0; color: inherit;
    box-shadow: inset 0 0 0 1px color-mix(in srgb, currentColor 28%, transparent);
    transition: background .15s ease;
  }
  mark.m { background: var(--g0); }
  mark.g0 { background: var(--g0); } mark.g1 { background: var(--g1); }
  mark.g2 { background: var(--g2); } mark.g3 { background: var(--g3); }
  mark.g4 { background: var(--g4); } mark.g5 { background: var(--g5); }
  mark.g6 { background: var(--g6); }
  .empty-note { color: var(--text-faint); font-style: italic; }

  /* matches table */
  .table-scroll { max-height: 420px; overflow: auto; border-radius: 9px; border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; font-family: var(--mono); font-size: 12.5px; }
  thead th {
    position: sticky; top: 0; background: var(--bg-elev2); color: var(--text-dim);
    text-align: left; padding: 8px 10px; font-weight: 600; border-bottom: 1px solid var(--border);
    font-size: 11px; letter-spacing: .5px; z-index: 2;
  }
  tbody td { padding: 7px 10px; border-bottom: 1px solid var(--border-soft); vertical-align: top; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: var(--bg-elev2); }
  td.idx { color: var(--text-faint); }
  td .val {
    background: var(--g0); border-radius: 4px; padding: 1px 5px;
    box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--accent) 28%, transparent);
  }
  td .gname { color: var(--text-faint); font-size: 11px; }
  .group-row td { padding: 4px 10px 4px 22px; font-size: 11.5px; color: var(--text-dim); }
  .swatch { display: inline-block; width: 9px; height: 9px; border-radius: 2px; margin-right: 6px; vertical-align: middle; }
  .nomatch { padding: 20px; text-align: center; color: var(--text-faint); font-family: var(--mono); font-size: 13px; }

  /* explanation */
  .explain { font-family: var(--mono); font-size: 13px; }
  .explain ul { list-style: none; margin: 0; padding: 0; }
  .explain li {
    display: flex; gap: 12px; padding: 7px 0; border-bottom: 1px solid var(--border-soft);
    align-items: baseline;
  }
  .explain li:last-child { border-bottom: none; }
  .explain .tok {
    color: var(--accent); background: var(--bg); padding: 2px 7px; border-radius: 5px;
    border: 1px solid var(--border); white-space: nowrap; flex-shrink: 0; min-width: 54px;
    text-align: center;
  }
  .explain .desc { color: var(--text-dim); font-family: var(--sans); font-size: 13px; }
  .explain .desc em { color: var(--accent-2); font-style: normal; }

  .footer-note {
    margin-top: 22px; text-align: center; color: var(--text-faint);
    font-size: 12px; font-family: var(--mono);
  }
  .footer-note a { color: var(--text-dim); }

  /* toast */
  .toast {
    position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--bg-elev2); border: 1px solid var(--green); color: var(--text);
    padding: 10px 18px; border-radius: 10px; font-family: var(--mono); font-size: 13px;
    box-shadow: var(--shadow); opacity: 0; pointer-events: none;
    transition: opacity .2s ease, transform .2s ease; z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast .dot { color: var(--green); }

  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 6px; border: 2px solid var(--bg-elev); }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-faint); }
</style>
</head>
<body>
<div class="shell">
  <div class="window">
    <div class="titlebar">
      <div class="lights"><span class="light r"></span><span class="light y"></span><span class="light g"></span></div>
      <div class="title"><b>regex-lab</b> &nbsp;—&nbsp; /usr/bin/play</div>
      <div class="tools">
        <button class="icon-btn" id="shareBtn" title="Copy a shareable link with your pattern encoded">
          <span>🔗</span><span class="lbl">Share</span>
        </button>
        <button class="icon-btn" id="clearBtn" title="Clear pattern, flags & text">
          <span>✕</span><span>Clear</span>
        </button>
        <button class="icon-btn" id="themeBtn" title="Toggle light / dark">
          <span id="themeIcon">☀</span><span id="themeLbl">Light</span>
        </button>
      </div>
    </div>

    <div class="body">
      <!-- pattern -->
      <div class="pattern-row" id="patternRow">
        <span class="slash">/</span>
        <input id="pattern" spellcheck="false" autocomplete="off" autocapitalize="off"
               placeholder="enter a regular expression…" />
        <span class="slash">/</span>
        <div class="flags-box" id="flags"></div>
      </div>

      <div class="status" id="status"></div>
      <div class="err-caret" id="errCaret" style="display:none"></div>

      <!-- quick inserts -->
      <div class="inserts">
        <h3>Quick Insert</h3>
        <div class="chips" id="chips"></div>
      </div>

      <!-- main grid -->
      <div class="grid">
        <div class="panel">
          <h3>Test String</h3>
          <div class="ta-wrap">
            <textarea id="text" spellcheck="false"></textarea>
          </div>
        </div>

        <div class="panel">
          <h3>Highlighted Matches</h3>
          <div class="highlight" id="highlight"></div>
        </div>

        <div class="panel">
          <h3>Matches <span class="badge hl" id="matchCount" style="margin-left:6px"></span></h3>
          <div class="table-scroll" id="tableWrap"></div>
        </div>

        <div class="panel">
          <h3>Explanation</h3>
          <div class="explain" id="explain"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="footer-note">
    Regex Lab · runs entirely in your browser · powered by the native <code>RegExp</code> engine
  </div>
</div>

<div class="toast" id="toast"><span class="dot">●</span> <span id="toastMsg"></span></div>

<script>
"use strict";
(function () {
  // ---------- element refs ----------
  const $ = (id) => document.getElementById(id);
  const patternEl = $("pattern");
  const flagsEl = $("flags");
  const textEl = $("text");
  const statusEl = $("status");
  const errCaretEl = $("errCaret");
  const highlightEl = $("highlight");
  const tableWrap = $("tableWrap");
  const explainEl = $("explain");
  const matchCountEl = $("matchCount");
  const patternRow = $("patternRow");
  const chipsEl = $("chips");

  const FLAGS = [
    ["g", "global — find all matches"],
    ["i", "ignore case"],
    ["m", "multiline — ^ $ match line breaks"],
    ["s", "dotAll — . matches newlines"],
    ["u", "unicode"],
    ["y", "sticky — match from lastIndex"],
  ];
  const GROUP_COUNT = 7;

  // ---------- state ----------
  let state = {
    pattern: "(\\w+)@(\\w+)\\.(\\w{2,})",
    flags: "gim",
    text:
`Contact our team for help:
  alice@example.com  — support
  BOB@Work.io        — sales
  carol_dev@mail.co.uk

Phone numbers: (415) 555-0132, 212-555-9981
Dates: 2026-06-04, 1999-12-31
Hex colors: #ff5f57 #28C840 #58a6ff`,
  };

  // ---------- quick inserts ----------
  const INSERTS = [
    { ins: "\\d", lbl: "\\d", title: "digit" },
    { ins: "\\w", lbl: "\\w", title: "word char" },
    { ins: "\\s", lbl: "\\s", title: "whitespace" },
    { ins: ".", lbl: ".", title: "any char" },
    { ins: "[A-Z]", lbl: "[A-Z]", title: "uppercase range" },
    { ins: "[a-z0-9]", lbl: "[a-z0-9]", title: "char class" },
    { ins: "+", lbl: "+", title: "one or more" },
    { ins: "*", lbl: "*", title: "zero or more" },
    { ins: "?", lbl: "?", title: "optional" },
    { ins: "{2,4}", lbl: "{m,n}", title: "quantifier" },
    { ins: "(group)", lbl: "( )", title: "capture group", sel: [1, 6] },
    { ins: "(?:group)", lbl: "(?: )", title: "non-capturing", sel: [3, 8] },
    { ins: "(?<name>x)", lbl: "(?<n>)", title: "named group", sel: [3, 7] },
    { ins: "(?=ahead)", lbl: "(?=)", title: "lookahead", sel: [3, 8] },
    { ins: "(?!ahead)", lbl: "(?!)", title: "negative lookahead", sel: [3, 8] },
    { ins: "(?<=behind)", lbl: "(?<=)", title: "lookbehind", sel: [4, 10] },
    { ins: "\\b", lbl: "\\b", title: "word boundary" },
    { ins: "^", lbl: "^", title: "start" },
    { ins: "$", lbl: "$", title: "end" },
    { ins: "a|b", lbl: "a|b", title: "alternation", sel: [0, 3] },
  ];

  function buildChips() {
    INSERTS.forEach((it) => {
      const c = document.createElement("button");
      c.className = "chip";
      c.innerHTML = `<b>${escapeHtml(it.lbl)}</b>`;
      c.title = it.title;
      c.addEventListener("click", () => insertAtCursor(it.ins, it.sel));
      chipsEl.appendChild(c);
    });
  }

  function insertAtCursor(textToInsert, sel) {
    patternEl.focus();
    const start = patternEl.selectionStart ?? patternEl.value.length;
    const end = patternEl.selectionEnd ?? patternEl.value.length;
    const v = patternEl.value;
    patternEl.value = v.slice(0, start) + textToInsert + v.slice(end);
    if (sel) {
      patternEl.setSelectionRange(start + sel[0], start + sel[1]);
    } else {
      const pos = start + textToInsert.length;
      patternEl.setSelectionRange(pos, pos);
    }
    state.pattern = patternEl.value;
    run();
    writeHash();
  }

  // ---------- flags UI ----------
  function buildFlags() {
    FLAGS.forEach(([f, desc]) => {
      const el = document.createElement("div");
      el.className = "flag";
      el.dataset.flag = f;
      el.innerHTML = `${f}<span class="tip">${escapeHtml(desc)}</span>`;
      el.addEventListener("click", () => {
        if (state.flags.includes(f)) {
          state.flags = state.flags.replace(f, "");
        } else {
          state.flags += f;
        }
        syncFlags();
        run();
        writeHash();
      });
      flagsEl.appendChild(el);
    });
  }
  function syncFlags() {
    [...flagsEl.children].forEach((el) => {
      el.classList.toggle("on", state.flags.includes(el.dataset.flag));
    });
  }

  // ---------- helpers ----------
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, (c) =>
      ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }
  function showToast(msg) {
    const t = $("toast");
    $("toastMsg").textContent = msg;
    t.classList.add("show");
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => t.classList.remove("show"), 2200);
  }

  // ---------- core: build regex & gather matches ----------
  function buildRegex() {
    const flags = state.flags;
    // de-dupe / validate flag chars happens naturally; RegExp throws on dup
    const re = new RegExp(state.pattern, flags);
    return re;
  }

  function gatherMatches(re) {
    const text = state.text;
    const matches = [];
    if (state.pattern === "") return matches;
    const global = re.flags.includes("g") || re.flags.includes("y");

    if (!global) {
      const m = re.exec(text);
      if (m) matches.push(toMatch(m));
      return matches;
    }
    let guard = 0;
    re.lastIndex = 0;
    let m;
    while ((m = re.exec(text)) !== null) {
      matches.push(toMatch(m));
      if (m.index === re.lastIndex) re.lastIndex++; // avoid zero-width infinite loop
      if (++guard > 50000) break;
    }
    return matches;
  }

  function toMatch(m) {
    return {
      full: m[0],
      index: m.index,
      groups: m.slice(1),
      named: m.groups ? { ...m.groups } : null,
    };
  }

  // ---------- rendering ----------
  function renderHighlight(matches) {
    const text = state.text;
    if (!text) {
      highlightEl.innerHTML = `<span class="empty-note">— test string is empty —</span>`;
      return;
    }
    if (matches.length === 0) {
      highlightEl.innerHTML = escapeHtml(text) || `<span class="empty-note">—</span>`;
      return;
    }
    // Build segment list. For each match we color the whole match (g0-ish neutral),
    // and overlay capture-group ranges with their group color when locatable.
    let html = "";
    let cursor = 0;
    matches.forEach((mt) => {
      if (mt.index < cursor) return; // overlapping safety
      html += escapeHtml(text.slice(cursor, mt.index));
      html += renderMatchSpan(mt);
      cursor = mt.index + mt.full.length;
      if (mt.full.length === 0) {
        // zero-width: show a marker
        cursor = mt.index;
      }
    });
    html += escapeHtml(text.slice(cursor));
    highlightEl.innerHTML = html;
  }

  function renderMatchSpan(mt) {
    const full = mt.full;
    if (full.length === 0) {
      return `<mark class="m" title="zero-width match @ ${mt.index}">∅</mark>`;
    }
    // Try to locate each capture group inside the full match (first occurrence after previous group).
    const ranges = []; // {start,end,group}
    let searchFrom = 0;
    mt.groups.forEach((g, i) => {
      if (g == null || g === "") return;
      const at = full.indexOf(g, searchFrom);
      if (at !== -1) {
        ranges.push({ start: at, end: at + g.length, group: i % GROUP_COUNT });
        searchFrom = at; // allow nested but progress
      }
    });
    if (ranges.length === 0) {
      return `<mark class="m" title="match @ ${mt.index}">${escapeHtml(full)}</mark>`;
    }
    // Render full match wrapper, with inner group marks (non-overlapping, take first that fits)
    ranges.sort((a, b) => a.start - b.start || b.end - a.end);
    let inner = "";
    let pos = 0;
    let lastEnd = 0;
    ranges.forEach((r) => {
      if (r.start < lastEnd) return; // skip overlap
      inner += escapeHtml(full.slice(pos, r.start));
      inner += `<mark class="g${r.group}">${escapeHtml(full.slice(r.start, r.end))}</mark>`;
      pos = r.end;
      lastEnd = r.end;
    });
    inner += escapeHtml(full.slice(pos));
    return `<mark class="m" title="match @ ${mt.index}">${inner}</mark>`;
  }

  function renderTable(matches, re) {
    matchCountEl.textContent =
      matches.length + (matches.length === 1 ? " match" : " matches");
    if (state.pattern === "") {
      tableWrap.innerHTML = `<div class="nomatch">enter a pattern to see matches</div>`;
      return;
    }
    if (matches.length === 0) {
      tableWrap.innerHTML = `<div class="nomatch">no matches found</div>`;
      return;
    }
    let rows = "";
    matches.forEach((mt, mi) => {
      const groupCount = mt.groups.length;
      rows += `<tr>
        <td class="idx">#${mi + 1}</td>
        <td class="idx">${mt.index}</td>
        <td><span class="val">${escapeHtml(mt.full) || "<em>∅</em>"}</span></td>
        <td class="idx">${groupCount || "—"}</td>
      </tr>`;
      mt.groups.forEach((g, gi) => {
        const gc = gi % GROUP_COUNT;
        const named = mt.named
          ? Object.keys(mt.named).find((k) => mt.named[k] === g && g != null)
          : null;
        const label = named ? `$${gi + 1} <span class="gname">&lt;${escapeHtml(named)}&gt;</span>` : `$${gi + 1}`;
        const valHtml = g == null
          ? `<span style="color:var(--text-faint)">undefined</span>`
          : g === ""
            ? `<span style="color:var(--text-faint)">(empty)</span>`
            : escapeHtml(g);
        rows += `<tr class="group-row">
          <td colspan="4"><span class="swatch" style="background:var(--gb${gc})"></span>${label} = <span style="color:var(--text)">${valHtml}</span></td>
        </tr>`;
      });
    });
    tableWrap.innerHTML = `<table>
      <thead><tr><th>#</th><th>Index</th><th>Match</th><th>Groups</th></tr></thead>
      <tbody>${rows}</tbody></table>`;
  }

  // ---------- pattern explanation ----------
  // A lightweight tokenizer that walks the pattern and emits human-readable lines.
  function explainPattern(pattern) {
    if (!pattern) return [{ tok: "", desc: "<em>Empty pattern</em> — type a regex to see it explained token by token." }];
    const out = [];
    let i = 0;
    const n = pattern.length;
    const peek = (k = 0) => pattern[i + k];

    while (i < n) {
      const c = pattern[i];
      let tok, desc, len = 1;

      if (c === "\\") {
        const next = pattern[i + 1] || "";
        len = 2;
        const map = {
          d: "Any <em>digit</em> (0–9)",
          D: "Any <em>non-digit</em>",
          w: "Any <em>word char</em> (a–z, A–Z, 0–9, _)",
          W: "Any <em>non-word</em> char",
          s: "Any <em>whitespace</em> (space, tab, newline)",
          S: "Any <em>non-whitespace</em>",
          b: "<em>Word boundary</em>",
          B: "<em>Non-word</em> boundary",
          n: "Newline", r: "Carriage return", t: "Tab", f: "Form feed", v: "Vertical tab", "0": "Null char",
        };
        if (map[next]) { desc = map[next]; }
        else if (/[1-9]/.test(next)) { desc = `<em>Backreference</em> to group ${next}`; }
        else { desc = `Literal <em>${escapeHtml(next)}</em> (escaped)`; }
        tok = "\\" + next;
      }
      else if (c === "(") {
        if (pattern.startsWith("(?:", i)) { tok = "(?:"; len = 3; desc = "Start <em>non-capturing</em> group"; }
        else if (pattern.startsWith("(?=", i)) { tok = "(?="; len = 3; desc = "<em>Lookahead</em> — followed by"; }
        else if (pattern.startsWith("(?!", i)) { tok = "(?!"; len = 3; desc = "<em>Negative lookahead</em> — not followed by"; }
        else if (pattern.startsWith("(?<=", i)) { tok = "(?<="; len = 4; desc = "<em>Lookbehind</em> — preceded by"; }
        else if (pattern.startsWith("(?<!", i)) { tok = "(?<!"; len = 4; desc = "<em>Negative lookbehind</em> — not preceded by"; }
        else if (pattern.startsWith("(?<", i)) {
          const close = pattern.indexOf(">", i);
          const name = close > -1 ? pattern.slice(i + 3, close) : "";
          tok = `(?<${name}>`; len = (close > -1 ? close - i + 1 : 3);
          desc = `Start <em>named</em> capture group &lt;${escapeHtml(name)}&gt;`;
        }
        else { tok = "("; desc = "Start <em>capture group</em>"; }
      }
      else if (c === ")") { tok = ")"; desc = "End group"; }
      else if (c === "[") {
        // consume to matching ]
        let j = i + 1, neg = false;
        if (pattern[j] === "^") { neg = true; j++; }
        while (j < n && pattern[j] !== "]") { if (pattern[j] === "\\") j++; j++; }
        const body = pattern.slice(i, j + 1);
        len = body.length;
        tok = body.length > 14 ? body.slice(0, 13) + "…" : body;
        desc = neg ? "Any char <em>NOT</em> in the set" : "Any <em>one char</em> in the set";
      }
      else if (c === "{") {
        const close = pattern.indexOf("}", i);
        if (close > -1 && /^\{\d*,?\d*\}$/.test(pattern.slice(i, close + 1))) {
          const body = pattern.slice(i + 1, close);
          len = close - i + 1; tok = "{" + body + "}";
          const parts = body.split(",");
          if (parts.length === 1) desc = `Exactly <em>${parts[0]}</em> times`;
          else if (parts[1] === "") desc = `<em>${parts[0]}</em> or more times`;
          else desc = `Between <em>${parts[0]}</em> and <em>${parts[1]}</em> times`;
        } else { tok = "{"; desc = "Literal <em>{</em>"; }
      }
      else if (c === "*") { tok = peek(1) === "?" ? "*?" : "*"; len = tok.length; desc = "<em>Zero or more</em>" + (tok === "*?" ? " (lazy)" : ""); }
      else if (c === "+") { tok = peek(1) === "?" ? "+?" : "+"; len = tok.length; desc = "<em>One or more</em>" + (tok === "+?" ? " (lazy)" : ""); }
      else if (c === "?") { tok = peek(1) === "?" ? "??" : "?"; len = tok.length; desc = "<em>Optional</em> — zero or one" + (tok === "??" ? " (lazy)" : ""); }
      else if (c === "^") { tok = "^"; desc = "<em>Start</em> of string / line"; }
      else if (c === "$") { tok = "$"; desc = "<em>End</em> of string / line"; }
      else if (c === ".") { tok = "."; desc = "<em>Any char</em> (except newline)"; }
      else if (c === "|") { tok = "|"; desc = "<em>OR</em> / alternation"; }
      else {
        // collect a run of literals
        let j = i;
        while (j < n && !"\\()[]{}*+?^$.|".includes(pattern[j])) j++;
        const lit = pattern.slice(i, j);
        len = lit.length;
        tok = lit.length > 16 ? lit.slice(0, 15) + "…" : lit;
        desc = lit.length === 1 ? `Literal <em>${escapeHtml(lit)}</em>` : `Literal text <em>${escapeHtml(lit)}</em>`;
      }

      out.push({ tok, desc });
      i += len;
      if (len <= 0) i++; // safety
    }
    return out;
  }

  function renderExplain() {
    const items = explainPattern(state.pattern);
    let html = "<ul>";
    items.forEach((it) => {
      html += `<li><span class="tok">${it.tok ? escapeHtml(it.tok) : "&nbsp;"}</span><span class="desc">${it.desc}</span></li>`;
    });
    html += "</ul>";
    explainEl.innerHTML = html;
  }

  // ---------- error caret ----------
  function showError(err) {
    patternRow.classList.add("invalid");
    statusEl.innerHTML = `<span class="err">✗ ${escapeHtml(err.message)}</span>`;
    // Try to locate position from common V8 message: "... at position N"
    const m = /position (\d+)/.exec(err.message);
    if (m) {
      const pos = parseInt(m[1], 10);
      const padded = " ".repeat(Math.max(0, pos)) + "^";
      errCaretEl.innerHTML =
        `/${escapeHtml(state.pattern)}/\n<span class="pt"> ${escapeHtml(" ".repeat(pos))}^ here</span>`;
      errCaretEl.style.display = "block";
    } else {
      errCaretEl.style.display = "none";
    }
    // still render explanation & clear match panes
    renderExplain();
    highlightEl.innerHTML = escapeHtml(state.text) || `<span class="empty-note">—</span>`;
    matchCountEl.textContent = "invalid";
    tableWrap.innerHTML = `<div class="nomatch">pattern is invalid</div>`;
  }

  // ---------- main run ----------
  function run() {
    patternRow.classList.remove("invalid");
    errCaretEl.style.display = "none";

    if (state.pattern === "") {
      statusEl.innerHTML = `<span class="badge">idle</span> waiting for a pattern…`;
      renderExplain();
      highlightEl.innerHTML = escapeHtml(state.text) || `<span class="empty-note">—</span>`;
      matchCountEl.textContent = "";
      tableWrap.innerHTML = `<div class="nomatch">enter a pattern to see matches</div>`;
      return;
    }

    let re;
    try {
      re = buildRegex();
    } catch (err) {
      showError(err);
      return;
    }

    let matches;
    try {
      matches = gatherMatches(re);
    } catch (err) {
      showError(err);
      return;
    }

    const flagStr = re.flags ? `/${re.flags}` : "";
    statusEl.innerHTML =
      `<span class="ok">✓ valid</span>` +
      `<span class="badge hl">${matches.length} match${matches.length === 1 ? "" : "es"}</span>` +
      `<span class="badge">/${escapeHtml(state.pattern.length > 40 ? state.pattern.slice(0,40)+"…" : state.pattern)}/${escapeHtml(state.flags)}</span>`;

    renderHighlight(matches);
    renderTable(matches, re);
    renderExplain();
  }

  // ---------- URL hash (permalink) ----------
  function writeHash() {
    try {
      const payload = { p: state.pattern, f: state.flags, t: state.text };
      const encoded = encodeURIComponent(btoa(unescape(encodeURIComponent(JSON.stringify(payload)))));
      history.replaceState(null, "", "#" + encoded);
    } catch (e) { /* ignore */ }
  }
  function readHash() {
    const h = location.hash.replace(/^#/, "");
    if (!h) return false;
    try {
      const json = decodeURIComponent(escape(atob(decodeURIComponent(h))));
      const payload = JSON.parse(json);
      if (typeof payload.p === "string") state.pattern = payload.p;
      if (typeof payload.f === "string") state.flags = payload.f.replace(/[^gimsuy]/g, "");
      if (typeof payload.t === "string") state.text = payload.t;
      return true;
    } catch (e) { return false; }
  }

  // ---------- theme ----------
  function applyTheme(theme) {
    document.documentElement.setAttribute("data-theme", theme);
    const dark = theme === "dark";
    $("themeIcon").textContent = dark ? "☀" : "☾";
    $("themeLbl").textContent = dark ? "Light" : "Dark";
    try { localStorage.setItem("regexlab-theme", theme); } catch (e) {}
  }

  // ---------- wiring ----------
  function debounce(fn, ms) {
    let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); };
  }
  const onInput = debounce(() => { run(); writeHash(); }, 120);

  patternEl.addEventListener("input", () => { state.pattern = patternEl.value; onInput(); });
  textEl.addEventListener("input", () => { state.text = textEl.value; onInput(); });

  $("themeBtn").addEventListener("click", () => {
    const cur = document.documentElement.getAttribute("data-theme");
    applyTheme(cur === "dark" ? "light" : "dark");
  });

  $("clearBtn").addEventListener("click", () => {
    state.pattern = ""; state.flags = ""; state.text = "";
    patternEl.value = ""; textEl.value = "";
    syncFlags(); run(); writeHash();
    patternEl.focus();
  });

  $("shareBtn").addEventListener("click", async () => {
    writeHash();
    const url = location.href;
    const btn = $("shareBtn");
    try {
      await navigator.clipboard.writeText(url);
    } catch (e) {
      // fallback
      const ta = document.createElement("textarea");
      ta.value = url; document.body.appendChild(ta); ta.select();
      try { document.execCommand("copy"); } catch (_) {}
      document.body.removeChild(ta);
    }
    btn.classList.add("copied");
    btn.querySelector(".lbl").textContent = "Copied!";
    showToast("Permalink copied to clipboard");
    setTimeout(() => {
      btn.classList.remove("copied");
      btn.querySelector(".lbl").textContent = "Share";
    }, 1600);
  });

  // keyboard: Esc clears pattern focus quick? keep simple.

  // ---------- init ----------
  function init() {
    buildFlags();
    buildChips();

    // theme: stored pref, else default dark
    let theme = "dark";
    try { theme = localStorage.getItem("regexlab-theme") || "dark"; } catch (e) {}
    applyTheme(theme);

    readHash(); // may override state from permalink

    patternEl.value = state.pattern;
    textEl.value = state.text;
    syncFlags();
    run();

    window.addEventListener("hashchange", () => {
      if (readHash()) {
        patternEl.value = state.pattern;
        textEl.value = state.text;
        syncFlags();
        run();
      }
    });
  }

  init();
})();
</script>
</body>
</html>
