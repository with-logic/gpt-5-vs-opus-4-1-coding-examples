<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Fruit Catcher 🍎</title>
<style>
  :root {
    --sky-top: #7ed3ff;
    --sky-bottom: #c7f0ff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Baloo 2', 'Comic Sans MS', 'Trebuchet MS', system-ui, sans-serif;
    background: #2c5f8a;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    touch-action: none;
  }

  #game-wrap {
    position: relative;
    width: 100%;
    height: 100%;
    max-width: 540px;
    max-height: 900px;
    margin: auto;
    background: linear-gradient(to bottom, var(--sky-top) 0%, var(--sky-bottom) 65%, #b6e89a 65%, #8fd66a 100%);
    overflow: hidden;
    box-shadow: 0 0 60px rgba(0,0,0,0.4);
  }

  /* Decorative clouds */
  .cloud {
    position: absolute;
    background: #fff;
    border-radius: 50px;
    opacity: 0.9;
    filter: blur(0.3px);
  }
  .cloud::before, .cloud::after {
    content: '';
    position: absolute;
    background: #fff;
    border-radius: 50%;
  }
  .cloud1 { width: 90px; height: 28px; top: 12%; left: -100px; animation: drift1 38s linear infinite; }
  .cloud1::before { width: 44px; height: 44px; top: -20px; left: 14px; }
  .cloud1::after { width: 34px; height: 34px; top: -14px; left: 46px; }
  .cloud2 { width: 70px; height: 22px; top: 26%; left: -100px; animation: drift2 52s linear infinite; }
  .cloud2::before { width: 36px; height: 36px; top: -16px; left: 10px; }
  .cloud2::after { width: 28px; height: 28px; top: -10px; left: 38px; }
  .cloud3 { width: 110px; height: 32px; top: 6%; left: -140px; animation: drift3 64s linear infinite; }
  .cloud3::before { width: 52px; height: 52px; top: -24px; left: 18px; }
  .cloud3::after { width: 40px; height: 40px; top: -16px; left: 56px; }
  @keyframes drift1 { from { transform: translateX(0); } to { transform: translateX(680px); } }
  @keyframes drift2 { from { transform: translateX(0); } to { transform: translateX(680px); } }
  @keyframes drift3 { from { transform: translateX(0); } to { transform: translateX(720px); } }

  .sun {
    position: absolute;
    top: 24px; right: 30px;
    width: 80px; height: 80px;
    background: radial-gradient(circle at 35% 35%, #fff3a0, #ffd23f 60%, #ffb700);
    border-radius: 50%;
    box-shadow: 0 0 50px rgba(255, 200, 40, 0.65);
    animation: sunpulse 4s ease-in-out infinite;
  }
  @keyframes sunpulse { 0%,100% { transform: scale(1);} 50% { transform: scale(1.06);} }

  canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }

  /* HUD */
  #hud {
    position: absolute; top: 0; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 14px 16px;
    pointer-events: none; z-index: 5;
  }
  .panel {
    background: rgba(255,255,255,0.82);
    border-radius: 18px;
    padding: 8px 16px;
    box-shadow: 0 4px 0 rgba(0,0,0,0.12), 0 6px 14px rgba(0,0,0,0.15);
    backdrop-filter: blur(4px);
  }
  #score-panel { display: flex; flex-direction: column; align-items: flex-start; }
  #score-label { font-size: 13px; font-weight: 800; color: #e8743b; letter-spacing: 1px; text-transform: uppercase; }
  #score { font-size: 38px; font-weight: 800; color: #ff6a3d; line-height: 1; }
  #score.pop { animation: scorepop 0.28s ease; }
  @keyframes scorepop { 0%{transform:scale(1);} 40%{transform:scale(1.35);} 100%{transform:scale(1);} }

  #lives { display: flex; gap: 4px; font-size: 30px; }
  .heart { transition: transform 0.3s ease, opacity 0.3s ease; }
  .heart.lost { transform: scale(0); opacity: 0; }

  /* combo flash */
  #combo {
    position: absolute; top: 92px; left: 50%; transform: translateX(-50%);
    font-size: 26px; font-weight: 800; color: #ff3da6;
    text-shadow: 0 2px 0 #fff, 0 0 12px rgba(255,61,166,0.5);
    opacity: 0; pointer-events: none; z-index: 6;
  }
  #combo.show { animation: comborise 0.9s ease forwards; }
  @keyframes comborise {
    0% { opacity: 0; transform: translateX(-50%) translateY(10px) scale(0.6); }
    25% { opacity: 1; transform: translateX(-50%) translateY(-6px) scale(1.1); }
    100% { opacity: 0; transform: translateX(-50%) translateY(-40px) scale(1); }
  }

  /* Overlays */
  .overlay {
    position: absolute; inset: 0; z-index: 10;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 24px;
    background: rgba(40, 70, 110, 0.55);
    backdrop-filter: blur(6px);
  }
  .overlay.hidden { display: none; }
  .card {
    background: linear-gradient(180deg, #ffffff, #fff4ec);
    border-radius: 28px;
    padding: 32px 30px 30px;
    box-shadow: 0 12px 0 rgba(0,0,0,0.12), 0 20px 40px rgba(0,0,0,0.3);
    max-width: 380px; width: 100%;
    border: 4px solid #fff;
    animation: cardin 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes cardin { from { transform: scale(0.8) translateY(20px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
  .title {
    font-size: 40px; font-weight: 800; line-height: 1.05;
    background: linear-gradient(90deg, #ff6a3d, #ff3da6, #ffb700);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 6px;
  }
  .fruit-row { font-size: 44px; margin: 6px 0 14px; letter-spacing: 4px; animation: wiggle 2.5s ease-in-out infinite; }
  @keyframes wiggle { 0%,100%{transform:rotate(-3deg);} 50%{transform:rotate(3deg);} }
  .subtitle { font-size: 17px; color: #5a6b7a; margin-bottom: 20px; line-height: 1.45; font-weight: 600; }
  .subtitle b { color: #ff6a3d; }
  .big-num { font-size: 64px; font-weight: 800; color: #ff6a3d; line-height: 1; }
  .stat-line { font-size: 16px; color: #5a6b7a; font-weight: 700; margin-top: 4px; }
  .best { font-size: 15px; color: #b07a3d; font-weight: 800; margin-top: 10px; }

  .btn {
    cursor: pointer; border: none; outline: none;
    font-family: inherit; font-weight: 800; font-size: 22px; color: #fff;
    padding: 14px 38px; border-radius: 50px; margin-top: 14px;
    background: linear-gradient(180deg, #ff8a4d, #ff5a2d);
    box-shadow: 0 6px 0 #d8431f, 0 8px 16px rgba(255,90,45,0.4);
    transition: transform 0.08s ease, box-shadow 0.08s ease;
  }
  .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #d8431f, 0 4px 8px rgba(255,90,45,0.4); }
  .btn.green { background: linear-gradient(180deg, #6fd86a, #45b840); box-shadow: 0 6px 0 #2f8a2b, 0 8px 16px rgba(69,184,64,0.4); }
  .btn.green:active { box-shadow: 0 2px 0 #2f8a2b, 0 4px 8px rgba(69,184,64,0.4); }

  .hint { font-size: 14px; color: #93a3b2; margin-top: 16px; font-weight: 600; }

  #pause-btn {
    position: absolute; bottom: 14px; right: 14px; z-index: 6;
    width: 48px; height: 48px; border-radius: 50%;
    background: rgba(255,255,255,0.85); border: none; cursor: pointer;
    font-size: 20px; color: #ff6a3d;
    box-shadow: 0 4px 0 rgba(0,0,0,0.12);
    display: flex; align-items: center; justify-content: center;
  }
  #pause-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,0.12); }
</style>
</head>
<body>
<div id="game-wrap">
  <div class="sun"></div>
  <div class="cloud cloud1"></div>
  <div class="cloud cloud2"></div>
  <div class="cloud cloud3"></div>

  <canvas id="game"></canvas>

  <div id="hud">
    <div class="panel" id="score-panel">
      <span id="score-label">Score</span>
      <span id="score">0</span>
    </div>
    <div class="panel">
      <div id="lives"></div>
    </div>
  </div>

  <div id="combo"></div>

  <button id="pause-btn" aria-label="Pause">⏸</button>

  <!-- Start screen -->
  <div class="overlay" id="start-screen">
    <div class="card">
      <div class="title">Fruit Catcher</div>
      <div class="fruit-row">🍎🍊🍓🍇🍌</div>
      <div class="subtitle">Move your basket to catch the falling fruit!<br>Don't drop <b>3</b> or the game ends. 🧺</div>
      <button class="btn green" id="start-btn">▶ Play</button>
      <div class="hint">Drag / move mouse &nbsp;•&nbsp; or use ← →</div>
    </div>
  </div>

  <!-- Game over screen -->
  <div class="overlay hidden" id="over-screen">
    <div class="card">
      <div class="title" id="over-title">Game Over!</div>
      <div class="fruit-row" id="over-emoji">🧺</div>
      <div class="big-num" id="final-score">0</div>
      <div class="stat-line" id="final-caught">Caught 0 fruit</div>
      <div class="best" id="best-line">🏆 Best: 0</div>
      <button class="btn" id="again-btn">↻ Play Again</button>
    </div>
  </div>

  <!-- Pause screen -->
  <div class="overlay hidden" id="pause-screen">
    <div class="card">
      <div class="title">Paused</div>
      <div class="fruit-row">⏸️</div>
      <button class="btn green" id="resume-btn">▶ Resume</button>
    </div>
  </div>
</div>

<script>
(() => {
  "use strict";

  const wrap = document.getElementById('game-wrap');
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  const scoreEl = document.getElementById('score');
  const livesEl = document.getElementById('lives');
  const comboEl = document.getElementById('combo');

  const startScreen = document.getElementById('start-screen');
  const overScreen = document.getElementById('over-screen');
  const pauseScreen = document.getElementById('pause-screen');
  const startBtn = document.getElementById('start-btn');
  const againBtn = document.getElementById('again-btn');
  const resumeBtn = document.getElementById('resume-btn');
  const pauseBtn = document.getElementById('pause-btn');

  const finalScoreEl = document.getElementById('final-score');
  const finalCaughtEl = document.getElementById('final-caught');
  const bestLineEl = document.getElementById('best-line');
  const overTitleEl = document.getElementById('over-title');
  const overEmojiEl = document.getElementById('over-emoji');

  const MAX_MISSES = 3;

  // Fruit definitions: emoji + accent color for splash particles
  const FRUITS = [
    { e: '🍎', c: '#ff5a4d' },
    { e: '🍊', c: '#ff9b3d' },
    { e: '🍓', c: '#ff4d7d' },
    { e: '🍇', c: '#a05ad6' },
    { e: '🍌', c: '#ffd23f' },
    { e: '🍉', c: '#ff5a7a' },
    { e: '🍐', c: '#a8d24d' },
    { e: '🍑', c: '#ffab6b' },
    { e: '🍍', c: '#ffcb3d' },
    { e: '🥝', c: '#8fbf3d' },
    { e: '🍒', c: '#e8395a' },
  ];
  const BOMB = { e: '💣', c: '#555' };

  // World state (logical units = CSS pixels)
  let W = 0, H = 0, dpr = 1;
  let state = 'start'; // start | playing | paused | over
  let score = 0, caught = 0, misses = 0, best = 0;
  let combo = 0, comboTimer = 0;
  let spawnTimer = 0, spawnInterval = 1.0, elapsed = 0;
  let fallSpeed = 170; // base px/s
  let items = [];
  let particles = [];
  let floaters = []; // floating "+1" text
  let shake = 0;
  let lastTime = 0;
  let rafId = null;

  // Basket
  const basket = { x: 0, y: 0, w: 120, h: 70, targetX: 0, vx: 0, tilt: 0 };
  let keyLeft = false, keyRight = false;
  let pointerActive = false;

  try { best = parseInt(localStorage.getItem('fruitcatcher_best') || '0', 10) || 0; } catch (e) { best = 0; }

  function resize() {
    const r = wrap.getBoundingClientRect();
    W = r.width; H = r.height;
    dpr = Math.min(window.devicePixelRatio || 1, 2.5);
    canvas.width = Math.round(W * dpr);
    canvas.height = Math.round(H * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    basket.w = Math.max(96, Math.min(150, W * 0.26));
    basket.h = basket.w * 0.58;
    basket.y = H - basket.h - 28;
    if (state === 'start') basket.x = W / 2;
    basket.x = clamp(basket.x, basket.w / 2, W - basket.w / 2);
    basket.targetX = basket.x;
  }
  window.addEventListener('resize', resize);

  function clamp(v, a, b) { return v < a ? a : v > b ? b : v; }
  function rand(a, b) { return a + Math.random() * (b - a); }

  function renderLives() {
    livesEl.innerHTML = '';
    const remaining = MAX_MISSES - misses;
    for (let i = 0; i < MAX_MISSES; i++) {
      const span = document.createElement('span');
      span.className = 'heart' + (i >= remaining ? ' lost' : '');
      span.textContent = '❤️';
      livesEl.appendChild(span);
    }
  }

  function reset() {
    score = 0; caught = 0; misses = 0; combo = 0; comboTimer = 0;
    elapsed = 0; spawnTimer = 0; spawnInterval = 1.0; fallSpeed = 170;
    items = []; particles = []; floaters = []; shake = 0;
    scoreEl.textContent = '0';
    renderLives();
    basket.x = W / 2; basket.targetX = W / 2; basket.vx = 0; basket.tilt = 0;
  }

  function startGame() {
    reset();
    state = 'playing';
    startScreen.classList.add('hidden');
    overScreen.classList.add('hidden');
    pauseScreen.classList.add('hidden');
    lastTime = 0;
    if (rafId) cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(loop);
  }

  function gameOver() {
    state = 'over';
    finalScoreEl.textContent = score;
    finalCaughtEl.textContent = 'Caught ' + caught + (caught === 1 ? ' fruit' : ' fruit');
    let newBest = false;
    if (score > best) { best = score; newBest = true; try { localStorage.setItem('fruitcatcher_best', String(best)); } catch (e) {} }
    if (newBest && score > 0) {
      overTitleEl.textContent = 'New Best! 🎉';
      overEmojiEl.textContent = '🏆✨';
      bestLineEl.textContent = '🏆 Best: ' + best + ' (New!)';
    } else {
      overTitleEl.textContent = 'Game Over!';
      overEmojiEl.textContent = score >= 30 ? '🌟🧺🌟' : '🧺';
      bestLineEl.textContent = '🏆 Best: ' + best;
    }
    overScreen.classList.remove('hidden');
  }

  function togglePause() {
    if (state === 'playing') {
      state = 'paused';
      pauseScreen.classList.remove('hidden');
    } else if (state === 'paused') {
      state = 'playing';
      pauseScreen.classList.add('hidden');
      lastTime = 0;
      rafId = requestAnimationFrame(loop);
    }
  }

  function spawnItem() {
    // small chance of a bomb once the game has warmed up
    const isBomb = elapsed > 8 && Math.random() < 0.12;
    const def = isBomb ? BOMB : FRUITS[(Math.random() * FRUITS.length) | 0];
    const size = isBomb ? rand(48, 56) : rand(54, 68);
    const x = rand(size, W - size);
    items.push({
      x, y: -size,
      size,
      def,
      bomb: isBomb,
      vy: fallSpeed * rand(0.85, 1.15),
      spin: rand(-1.4, 1.4),
      rot: rand(-0.3, 0.3),
      wobble: rand(0, Math.PI * 2),
      wobbleAmp: isBomb ? 0 : rand(0, 14),
    });
  }

  function burst(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      const a = rand(0, Math.PI * 2);
      const sp = rand(60, 260);
      particles.push({
        x, y,
        vx: Math.cos(a) * sp,
        vy: Math.sin(a) * sp - rand(20, 120),
        life: 1, decay: rand(1.6, 2.6),
        size: rand(4, 9),
        color,
        g: 620,
      });
    }
  }

  function addFloater(x, y, text, color) {
    floaters.push({ x, y, text, color, life: 1, vy: -46 });
  }

  function showCombo(n) {
    comboEl.textContent = '🔥 Combo x' + n + '!';
    comboEl.classList.remove('show');
    void comboEl.offsetWidth;
    comboEl.classList.add('show');
  }

  function popScore() {
    scoreEl.classList.remove('pop');
    void scoreEl.offsetWidth;
    scoreEl.classList.add('pop');
  }

  function catchItem(it) {
    if (it.bomb) {
      // bomb caught: lose a life, big shake
      misses++;
      combo = 0;
      renderLives();
      shake = 16;
      burst(it.x, it.y, '#444', 26);
      burst(it.x, it.y, '#ff7a2d', 14);
      addFloater(it.x, basket.y - 10, '💥', '#ff3d3d');
      if (misses >= MAX_MISSES) gameOver();
      return;
    }
    caught++;
    combo++;
    comboTimer = 1.6;
    let gain = 1;
    if (combo >= 3) { gain = 2; }
    if (combo >= 6) { gain = 3; }
    score += gain;
    scoreEl.textContent = score;
    popScore();
    burst(it.x, it.y, it.def.c, 16);
    addFloater(it.x, basket.y - 6, '+' + gain, it.def.c);
    if (combo >= 3 && combo % 3 === 0) showCombo(combo);

    // difficulty creep
    if (caught % 5 === 0) {
      fallSpeed = Math.min(fallSpeed + 16, 420);
      spawnInterval = Math.max(spawnInterval - 0.06, 0.45);
    }
  }

  function missItem(it) {
    misses++;
    combo = 0;
    renderLives();
    shake = 10;
    // squash splat on ground
    burst(it.x, H - 18, it.def.c, 12);
    addFloater(it.x, H - 60, '✗', '#e8553b');
    if (misses >= MAX_MISSES) gameOver();
  }

  function update(dt) {
    elapsed += dt;

    // combo decay
    if (comboTimer > 0) { comboTimer -= dt; if (comboTimer <= 0) combo = 0; }

    // spawn
    spawnTimer -= dt;
    if (spawnTimer <= 0) {
      spawnItem();
      spawnTimer = spawnInterval * rand(0.8, 1.2);
    }

    // basket movement: keyboard target
    const kbSpeed = W * 1.4;
    if (keyLeft && !keyRight) basket.targetX -= kbSpeed * dt;
    if (keyRight && !keyLeft) basket.targetX += kbSpeed * dt;
    basket.targetX = clamp(basket.targetX, basket.w / 2, W - basket.w / 2);

    const prevX = basket.x;
    // smooth follow
    basket.x += (basket.targetX - basket.x) * Math.min(1, dt * 14);
    basket.x = clamp(basket.x, basket.w / 2, W - basket.w / 2);
    basket.vx = (basket.x - prevX) / Math.max(dt, 0.0001);
    basket.tilt += ((clamp(-basket.vx / 1600, -0.28, 0.28)) - basket.tilt) * Math.min(1, dt * 10);

    // catch zone (rim near top of basket)
    const rimY = basket.y + 14;
    const halfW = basket.w / 2 * 0.92;

    for (let i = items.length - 1; i >= 0; i--) {
      const it = items[i];
      it.y += it.vy * dt;
      it.rot += it.spin * dt;
      it.wobble += dt * 3;

      const drawX = it.x + Math.sin(it.wobble) * it.wobbleAmp;

      // catch check
      if (it.y + it.size * 0.35 >= rimY && it.y - it.size * 0.2 <= rimY + 36) {
        if (Math.abs(drawX - basket.x) <= halfW + it.size * 0.3) {
          catchItem(it);
          items.splice(i, 1);
          continue;
        }
      }
      // missed (off bottom)
      if (it.y - it.size > H) {
        items.splice(i, 1);
        if (!it.bomb) missItem(it);
        continue;
      }
    }

    // particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.vy += p.g * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.life -= p.decay * dt;
      if (p.life <= 0) particles.splice(i, 1);
    }

    // floaters
    for (let i = floaters.length - 1; i >= 0; i--) {
      const f = floaters[i];
      f.y += f.vy * dt;
      f.life -= dt * 1.3;
      if (f.life <= 0) floaters.splice(i, 1);
    }

    if (shake > 0) { shake -= dt * 60; if (shake < 0) shake = 0; }
  }

  function drawBasket() {
    ctx.save();
    ctx.translate(basket.x, basket.y + basket.h / 2);
    ctx.rotate(basket.tilt);

    const bw = basket.w, bh = basket.h;
    const topW = bw, botW = bw * 0.74;

    // soft shadow under basket
    ctx.save();
    ctx.globalAlpha = 0.18;
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.ellipse(0, bh / 2 + 8, bw * 0.45, 10, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // basket body (trapezoid)
    const grad = ctx.createLinearGradient(0, -bh / 2, 0, bh / 2);
    grad.addColorStop(0, '#e8a64f');
    grad.addColorStop(1, '#b06f2c');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(-topW / 2, -bh / 2);
    ctx.lineTo(topW / 2, -bh / 2);
    ctx.lineTo(botW / 2, bh / 2);
    ctx.lineTo(-botW / 2, bh / 2);
    ctx.closePath();
    ctx.fill();

    // weave lines
    ctx.strokeStyle = 'rgba(120,70,20,0.5)';
    ctx.lineWidth = 3;
    for (let i = 1; i < 4; i++) {
      const ty = -bh / 2 + (bh) * (i / 4);
      const wf = topW / 2 + (botW / 2 - topW / 2) * (i / 4);
      ctx.beginPath();
      ctx.moveTo(-wf, ty);
      ctx.lineTo(wf, ty);
      ctx.stroke();
    }
    // vertical weave
    ctx.lineWidth = 2.5;
    for (let i = -2; i <= 2; i++) {
      const fx = i / 2.4;
      ctx.beginPath();
      ctx.moveTo(fx * topW / 2, -bh / 2);
      ctx.lineTo(fx * botW / 2, bh / 2);
      ctx.stroke();
    }

    // rim
    ctx.fillStyle = '#d98b3a';
    ctx.strokeStyle = '#9c5e22';
    ctx.lineWidth = 2;
    const rimH = 14;
    roundRect(-topW / 2 - 4, -bh / 2 - rimH, topW + 8, rimH + 6, 8);
    ctx.fill();
    ctx.stroke();
    // rim highlight
    ctx.fillStyle = 'rgba(255,240,200,0.5)';
    roundRect(-topW / 2 - 2, -bh / 2 - rimH + 2, topW + 4, 5, 4);
    ctx.fill();

    ctx.restore();
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    ctx.save();
    if (shake > 0) {
      ctx.translate(rand(-shake, shake) * 0.5, rand(-shake, shake) * 0.5);
    }

    // ground texture grass blades hint (subtle)
    // falling items
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (const it of items) {
      const drawX = it.x + Math.sin(it.wobble) * it.wobbleAmp;
      ctx.save();
      ctx.translate(drawX, it.y);
      ctx.rotate(it.rot);
      // shadow glow
      ctx.font = it.size + 'px serif';
      ctx.shadowColor = 'rgba(0,0,0,0.18)';
      ctx.shadowBlur = 6;
      ctx.shadowOffsetY = 4;
      ctx.fillText(it.def.e, 0, 0);
      ctx.restore();
    }

    // particles
    for (const p of particles) {
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * Math.max(0.2, p.life), 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    drawBasket();

    // floaters
    for (const f of floaters) {
      ctx.globalAlpha = Math.max(0, Math.min(1, f.life));
      ctx.fillStyle = f.color;
      ctx.font = '800 28px Baloo, system-ui, sans-serif';
      ctx.textAlign = 'center';
      ctx.lineWidth = 4;
      ctx.strokeStyle = 'rgba(255,255,255,0.9)';
      ctx.strokeText(f.text, f.x, f.y);
      ctx.fillText(f.text, f.x, f.y);
    }
    ctx.globalAlpha = 1;

    ctx.restore();
  }

  function loop(t) {
    if (state !== 'playing') return;
    if (!lastTime) lastTime = t;
    let dt = (t - lastTime) / 1000;
    lastTime = t;
    if (dt > 0.05) dt = 0.05; // clamp big gaps
    update(dt);
    draw();
    rafId = requestAnimationFrame(loop);
  }

  // ---- Input ----
  function setTargetFromClientX(clientX) {
    const r = wrap.getBoundingClientRect();
    basket.targetX = clamp(clientX - r.left, basket.w / 2, W - basket.w / 2);
  }

  wrap.addEventListener('mousemove', (e) => {
    if (state === 'playing') setTargetFromClientX(e.clientX);
  });
  wrap.addEventListener('mousedown', (e) => {
    if (state === 'playing') setTargetFromClientX(e.clientX);
  });

  wrap.addEventListener('touchstart', (e) => {
    if (state === 'playing' && e.touches[0]) { setTargetFromClientX(e.touches[0].clientX); e.preventDefault(); }
  }, { passive: false });
  wrap.addEventListener('touchmove', (e) => {
    if (state === 'playing' && e.touches[0]) { setTargetFromClientX(e.touches[0].clientX); e.preventDefault(); }
  }, { passive: false });

  window.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keyLeft = true;
    else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keyRight = true;
    else if (e.key === ' ' || e.key === 'p' || e.key === 'P') {
      if (state === 'playing' || state === 'paused') { togglePause(); e.preventDefault(); }
      else if (state === 'start' || state === 'over') startGame();
    } else if (e.key === 'Enter') {
      if (state === 'start' || state === 'over') startGame();
    }
    if (e.key.startsWith('Arrow')) e.preventDefault();
  });
  window.addEventListener('keyup', (e) => {
    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keyLeft = false;
    else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keyRight = false;
  });

  startBtn.addEventListener('click', startGame);
  againBtn.addEventListener('click', startGame);
  resumeBtn.addEventListener('click', togglePause);
  pauseBtn.addEventListener('click', () => { if (state === 'playing' || state === 'paused') togglePause(); });

  document.addEventListener('visibilitychange', () => {
    if (document.hidden && state === 'playing') togglePause();
  });

  // init
  resize();
  renderLives();
  // idle background render so the basket shows on start screen
  draw();
})();
</script>
</body>
</html>
