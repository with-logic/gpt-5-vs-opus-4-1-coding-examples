<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Civics Trivia — U.S. Basics Quiz</title>
<style>
  :root {
    --bg-1: #0a0e27;
    --bg-2: #1a1f4d;
    --accent: #5b8cff;
    --accent-2: #7c5cff;
    --gold: #f5c451;
    --green: #2bd47d;
    --green-soft: rgba(43, 212, 125, 0.15);
    --red: #ff5b6e;
    --red-soft: rgba(255, 91, 110, 0.15);
    --card: rgba(255, 255, 255, 0.06);
    --card-border: rgba(255, 255, 255, 0.12);
    --text: #eef1ff;
    --text-dim: #a4abd6;
    --radius: 20px;
    --shadow: 0 24px 60px -16px rgba(0, 0, 0, 0.6);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    font-family: "Segoe UI", system-ui, -apple-system, "Helvetica Neue", sans-serif;
    color: var(--text);
    background:
      radial-gradient(1200px 800px at 15% -10%, rgba(124, 92, 255, 0.35), transparent 55%),
      radial-gradient(1000px 700px at 110% 10%, rgba(91, 140, 255, 0.30), transparent 50%),
      radial-gradient(900px 900px at 50% 120%, rgba(245, 196, 81, 0.12), transparent 55%),
      linear-gradient(160deg, var(--bg-1), var(--bg-2));
    background-attachment: fixed;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow-x: hidden;
  }

  /* subtle floating stars */
  .stars {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      radial-gradient(1.5px 1.5px at 20% 30%, rgba(255,255,255,.6), transparent),
      radial-gradient(1.5px 1.5px at 80% 20%, rgba(255,255,255,.5), transparent),
      radial-gradient(1px 1px at 60% 70%, rgba(255,255,255,.4), transparent),
      radial-gradient(1px 1px at 35% 80%, rgba(255,255,255,.45), transparent),
      radial-gradient(1.5px 1.5px at 90% 60%, rgba(255,255,255,.5), transparent),
      radial-gradient(1px 1px at 10% 60%, rgba(255,255,255,.35), transparent);
    opacity: .5;
    animation: drift 30s linear infinite alternate;
  }
  @keyframes drift { from { transform: translateY(0); } to { transform: translateY(-20px); } }

  .app {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 680px;
  }

  .stage {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    overflow: hidden;
  }

  /* ---------- Top bar / progress ---------- */
  .topbar {
    padding: 22px 28px 18px;
    border-bottom: 1px solid var(--card-border);
  }
  .topbar-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 14px;
  }
  .brand {
    display: flex; align-items: center; gap: 10px;
    font-weight: 700; letter-spacing: .3px; font-size: 15px;
  }
  .brand .flag {
    width: 26px; height: 18px; border-radius: 3px;
    background:
      repeating-linear-gradient(180deg, #d23b4e 0 2px, #fff 2px 4px);
    position: relative; overflow: hidden;
    box-shadow: 0 0 0 1px rgba(255,255,255,.2);
  }
  .brand .flag::before {
    content: ""; position: absolute; top: 0; left: 0;
    width: 11px; height: 10px; background: #2342a8;
  }
  .pill {
    font-size: 13px; color: var(--text-dim);
    background: rgba(255,255,255,.06);
    border: 1px solid var(--card-border);
    padding: 5px 12px; border-radius: 999px;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }
  .progress-track {
    position: relative;
    height: 10px;
    background: rgba(255,255,255,.08);
    border-radius: 999px;
    overflow: hidden;
  }
  .progress-fill {
    position: absolute; inset: 0 auto 0 0;
    width: 0%;
    border-radius: 999px;
    background: linear-gradient(90deg, var(--accent), var(--accent-2), var(--gold));
    background-size: 200% 100%;
    transition: width .5s cubic-bezier(.4,0,.2,1);
    animation: shimmer 3s linear infinite;
  }
  @keyframes shimmer { to { background-position: 200% 0; } }

  /* ---------- Question card ---------- */
  .body { padding: 30px 28px 32px; }

  .qmeta {
    font-size: 13px; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 1.5px;
    margin-bottom: 14px; font-weight: 600;
  }
  .category-chip {
    display: inline-block;
    color: var(--gold);
    background: rgba(245, 196, 81, .12);
    border: 1px solid rgba(245, 196, 81, .3);
    padding: 3px 10px; border-radius: 999px;
    font-size: 11px; letter-spacing: 1px; margin-left: 8px;
    vertical-align: middle;
  }

  .question {
    font-size: clamp(22px, 3.6vw, 30px);
    line-height: 1.3;
    font-weight: 700;
    margin-bottom: 26px;
    min-height: 2.6em;
  }

  .answers { display: grid; gap: 13px; }

  .answer {
    position: relative;
    display: flex; align-items: center; gap: 14px;
    text-align: left;
    width: 100%;
    padding: 17px 18px;
    font-size: 17px;
    font-weight: 500;
    color: var(--text);
    background: rgba(255,255,255,.04);
    border: 1.5px solid var(--card-border);
    border-radius: 14px;
    cursor: pointer;
    transition: transform .15s ease, background .2s ease, border-color .2s ease, box-shadow .2s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .answer:hover:not(:disabled) {
    transform: translateY(-2px);
    background: rgba(91,140,255,.12);
    border-color: var(--accent);
    box-shadow: 0 8px 20px -8px rgba(91,140,255,.5);
  }
  .answer:disabled { cursor: default; }

  .answer .key {
    flex: 0 0 32px;
    height: 32px;
    display: grid; place-items: center;
    border-radius: 9px;
    background: rgba(255,255,255,.08);
    border: 1px solid var(--card-border);
    font-weight: 700; font-size: 15px;
    transition: all .2s ease;
  }
  .answer .label { flex: 1; }

  .answer .mark {
    flex: 0 0 auto;
    width: 26px; height: 26px;
    opacity: 0; transform: scale(.4);
    transition: opacity .25s ease, transform .35s cubic-bezier(.2,1.5,.4,1);
  }

  .answer.correct {
    background: var(--green-soft);
    border-color: var(--green);
    animation: pop .45s cubic-bezier(.2,1.4,.4,1);
  }
  .answer.correct .key { background: var(--green); border-color: var(--green); color: #06351f; }
  .answer.correct .mark { opacity: 1; transform: scale(1); }

  .answer.wrong {
    background: var(--red-soft);
    border-color: var(--red);
    animation: shake .45s ease;
  }
  .answer.wrong .key { background: var(--red); border-color: var(--red); color: #3a0008; }
  .answer.wrong .mark { opacity: 1; transform: scale(1); }

  .answer.dim { opacity: .45; }

  @keyframes pop {
    0% { transform: scale(1); }
    40% { transform: scale(1.025); }
    100% { transform: scale(1); }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-7px); }
    40% { transform: translateX(7px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
  }

  /* ---------- Footer / feedback ---------- */
  .feedback {
    margin-top: 22px;
    min-height: 30px;
    display: flex; align-items: center; gap: 10px;
    font-size: 15px;
    opacity: 0; transform: translateY(8px);
    transition: opacity .3s ease, transform .3s ease;
  }
  .feedback.show { opacity: 1; transform: translateY(0); }
  .feedback.good { color: var(--green); }
  .feedback.bad { color: var(--red); }
  .feedback .explain { color: var(--text-dim); font-weight: 400; }

  .next-row {
    margin-top: 22px;
    display: flex; justify-content: flex-end;
    min-height: 0;
  }
  .btn {
    appearance: none; border: none; cursor: pointer;
    font-size: 16px; font-weight: 700;
    color: #0a0e27;
    background: linear-gradient(135deg, var(--gold), #ffd97a);
    padding: 13px 26px;
    border-radius: 12px;
    box-shadow: 0 10px 24px -8px rgba(245,196,81,.6);
    transition: transform .15s ease, box-shadow .2s ease, opacity .2s ease;
    opacity: 0; pointer-events: none;
  }
  .btn.show { opacity: 1; pointer-events: auto; }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 14px 30px -8px rgba(245,196,81,.7); }
  .btn:active { transform: translateY(0); }
  .btn.secondary {
    color: var(--text);
    background: rgba(255,255,255,.08);
    border: 1px solid var(--card-border);
    box-shadow: none;
  }

  /* ---------- Screen transitions ---------- */
  .screen { animation: fadeUp .45s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }

  /* ---------- Start & Result ---------- */
  .center { text-align: center; padding: 46px 30px 44px; }
  .title {
    font-size: clamp(30px, 6vw, 46px);
    font-weight: 800;
    line-height: 1.1;
    margin-bottom: 14px;
    background: linear-gradient(120deg, #fff, var(--gold) 60%, var(--accent));
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle { color: var(--text-dim); font-size: 16px; max-width: 440px; margin: 0 auto 28px; line-height: 1.5; }
  .start-meta { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; margin-bottom: 30px; }
  .start-meta .chip {
    font-size: 13px; color: var(--text-dim);
    background: rgba(255,255,255,.05);
    border: 1px solid var(--card-border);
    padding: 8px 16px; border-radius: 999px;
  }
  .start-meta .chip b { color: var(--text); }

  .score-ring {
    width: 180px; height: 180px; margin: 6px auto 18px;
    position: relative;
  }
  .score-ring svg { transform: rotate(-90deg); }
  .score-ring .num {
    position: absolute; inset: 0;
    display: grid; place-items: center;
    flex-direction: column;
  }
  .score-ring .num .big { font-size: 46px; font-weight: 800; line-height: 1; }
  .score-ring .num .small { font-size: 14px; color: var(--text-dim); margin-top: 4px; }

  .verdict { font-size: 24px; font-weight: 800; margin-bottom: 6px; }
  .verdict-sub { color: var(--text-dim); margin-bottom: 26px; font-size: 15px; }

  .result-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

  .hidden { display: none !important; }

  /* confetti canvas */
  #confetti { position: fixed; inset: 0; pointer-events: none; z-index: 5; }

  @media (max-width: 480px) {
    .body { padding: 24px 20px 26px; }
    .topbar { padding: 18px 20px 16px; }
    .answer { padding: 15px 14px; font-size: 16px; }
  }
</style>
</head>
<body>
  <div class="stars"></div>
  <canvas id="confetti"></canvas>

  <main class="app">
    <section class="stage" id="stage">
      <!-- START SCREEN -->
      <div id="startScreen" class="screen center">
        <div class="title">Civics Trivia</div>
        <p class="subtitle">Ten basic questions every U.S. citizen should know — history, government, and geography. How well do you know your country?</p>
        <div class="start-meta">
          <span class="chip"><b>10</b> questions</span>
          <span class="chip"><b>Basic</b> level</span>
          <span class="chip">Randomized order</span>
        </div>
        <button class="btn show" id="startBtn">Start Quiz →</button>
      </div>

      <!-- QUIZ SCREEN -->
      <div id="quizScreen" class="hidden">
        <div class="topbar">
          <div class="topbar-row">
            <div class="brand"><span class="flag"></span> Civics Trivia</div>
            <div class="pill"><span id="qIndex">1</span> / <span id="qTotal">10</span></div>
          </div>
          <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
        </div>
        <div class="body">
          <div class="qmeta">Question <span id="qNum">1</span><span class="category-chip" id="qCategory">CIVICS</span></div>
          <div class="question" id="questionText">…</div>
          <div class="answers" id="answers"></div>
          <div class="feedback" id="feedback"></div>
          <div class="next-row">
            <button class="btn" id="nextBtn">Next →</button>
          </div>
        </div>
      </div>

      <!-- RESULT SCREEN -->
      <div id="resultScreen" class="hidden screen center">
        <div class="score-ring">
          <svg width="180" height="180" viewBox="0 0 180 180">
            <circle cx="90" cy="90" r="80" fill="none" stroke="rgba(255,255,255,.1)" stroke-width="14"></circle>
            <circle id="ringProgress" cx="90" cy="90" r="80" fill="none" stroke="url(#grad)" stroke-width="14"
              stroke-linecap="round" stroke-dasharray="502.4" stroke-dashoffset="502.4"></circle>
            <defs>
              <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#5b8cff"></stop>
                <stop offset="60%" stop-color="#7c5cff"></stop>
                <stop offset="100%" stop-color="#f5c451"></stop>
              </linearGradient>
            </defs>
          </svg>
          <div class="num">
            <div class="big"><span id="finalScore">0</span>/<span id="finalTotal">10</span></div>
            <div class="small"><span id="finalPct">0</span>% correct</div>
          </div>
        </div>
        <div class="verdict" id="verdict">Nice work!</div>
        <div class="verdict-sub" id="verdictSub"></div>
        <div class="result-actions">
          <button class="btn show" id="restartBtn">Play Again ↺</button>
        </div>
      </div>
    </section>
  </main>

<script>
/* ---------------- Quiz data: 10 basic U.S. citizenship questions ---------------- */
const QUESTIONS = [
  {
    category: "Government",
    q: "How many branches does the U.S. federal government have?",
    answers: ["Two", "Three", "Four", "Five"],
    correct: 1,
    explain: "Legislative, Executive, and Judicial."
  },
  {
    category: "History",
    q: "Who was the first President of the United States?",
    answers: ["Thomas Jefferson", "Abraham Lincoln", "George Washington", "John Adams"],
    correct: 2,
    explain: "Washington served from 1789 to 1797."
  },
  {
    category: "Holidays",
    q: "On what date does the United States celebrate Independence Day?",
    answers: ["July 4th", "June 14th", "September 11th", "November 11th"],
    correct: 0,
    explain: "The Declaration of Independence was adopted on July 4, 1776."
  },
  {
    category: "Government",
    q: "How many U.S. Senators are there in total?",
    answers: ["50", "100", "435", "538"],
    correct: 1,
    explain: "Two Senators from each of the 50 states."
  },
  {
    category: "Symbols",
    q: "How many stars are on the current U.S. flag?",
    answers: ["13", "48", "50", "52"],
    correct: 2,
    explain: "One star for each state; the 13 stripes mark the original colonies."
  },
  {
    category: "Geography",
    q: "What is the capital city of the United States?",
    answers: ["New York City", "Washington, D.C.", "Philadelphia", "Boston"],
    correct: 1,
    explain: "Washington, D.C. has been the capital since 1800."
  },
  {
    category: "Government",
    q: "Who is in charge of the Executive Branch?",
    answers: ["The Chief Justice", "The Speaker of the House", "The President", "The Senate"],
    correct: 2,
    explain: "The President leads the Executive Branch."
  },
  {
    category: "Rights",
    q: "What do we call the first ten amendments to the Constitution?",
    answers: ["The Articles", "The Bill of Rights", "The Federalist Papers", "The Preamble"],
    correct: 1,
    explain: "The Bill of Rights protects fundamental freedoms."
  },
  {
    category: "History",
    q: "Which document begins with the words 'We the People'?",
    answers: ["The Declaration of Independence", "The U.S. Constitution", "The Gettysburg Address", "The Mayflower Compact"],
    correct: 1,
    explain: "'We the People' opens the Preamble to the Constitution."
  },
  {
    category: "Civics",
    q: "What is the supreme law of the land?",
    answers: ["The President's orders", "Federal statutes", "The Constitution", "Supreme Court rulings"],
    correct: 2,
    explain: "The Constitution is the highest law in the United States."
  }
];

const LETTERS = ["A", "B", "C", "D"];
const CHECK = '<svg class="mark" viewBox="0 0 24 24" fill="none" stroke="#2bd47d" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>';
const CROSS = '<svg class="mark" viewBox="0 0 24 24" fill="none" stroke="#ff5b6e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>';

/* ---------------- State ---------------- */
let order = [];
let current = 0;
let score = 0;
let answered = false;

/* ---------------- Elements ---------------- */
const el = (id) => document.getElementById(id);
const startScreen = el("startScreen");
const quizScreen = el("quizScreen");
const resultScreen = el("resultScreen");

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  order = shuffle(QUESTIONS.map((_, i) => i));
  current = 0;
  score = 0;
  startScreen.classList.add("hidden");
  resultScreen.classList.add("hidden");
  quizScreen.classList.remove("hidden");
  el("qTotal").textContent = QUESTIONS.length;
  renderQuestion();
}

function renderQuestion() {
  answered = false;
  const q = QUESTIONS[order[current]];

  // shuffle answer order while tracking the correct one
  const idxOrder = shuffle(q.answers.map((_, i) => i));

  el("qIndex").textContent = current + 1;
  el("qNum").textContent = current + 1;
  el("qCategory").textContent = q.category.toUpperCase();
  el("questionText").textContent = q.q;

  // progress reflects questions started
  const pct = (current / QUESTIONS.length) * 100;
  el("progressFill").style.width = pct + "%";

  // re-trigger entrance animation
  const body = quizScreen.querySelector(".body");
  body.classList.remove("screen"); void body.offsetWidth; body.classList.add("screen");

  const answersEl = el("answers");
  answersEl.innerHTML = "";
  idxOrder.forEach((origIdx, displayIdx) => {
    const btn = document.createElement("button");
    btn.className = "answer";
    btn.innerHTML =
      '<span class="key">' + LETTERS[displayIdx] + '</span>' +
      '<span class="label">' + q.answers[origIdx] + '</span>' +
      (origIdx === q.correct ? CHECK : CROSS);
    btn.addEventListener("click", () => selectAnswer(btn, origIdx === q.correct, answersEl, q));
    answersEl.appendChild(btn);
  });

  const fb = el("feedback");
  fb.className = "feedback";
  fb.innerHTML = "";
  el("nextBtn").classList.remove("show");
}

function selectAnswer(btn, isCorrect, answersEl, q) {
  if (answered) return;
  answered = true;

  const buttons = answersEl.querySelectorAll(".answer");
  buttons.forEach((b) => { b.disabled = true; });

  if (isCorrect) {
    score++;
    btn.classList.add("correct");
  } else {
    btn.classList.add("wrong");
    // reveal the correct one
    buttons.forEach((b) => {
      if (b.querySelector(".label").textContent === q.answers[q.correct]) {
        b.classList.add("correct");
      }
    });
  }
  // dim the rest
  buttons.forEach((b) => {
    if (!b.classList.contains("correct") && !b.classList.contains("wrong")) b.classList.add("dim");
  });

  const fb = el("feedback");
  fb.classList.add("show", isCorrect ? "good" : "bad");
  fb.innerHTML = (isCorrect ? "✓ Correct! " : "✗ Not quite. ") +
    '<span class="explain">' + q.explain + "</span>";

  const nextBtn = el("nextBtn");
  nextBtn.textContent = (current === QUESTIONS.length - 1) ? "See Results →" : "Next →";
  nextBtn.classList.add("show");

  // bump progress to include the answered question
  el("progressFill").style.width = ((current + 1) / QUESTIONS.length) * 100 + "%";
}

function nextQuestion() {
  if (!answered) return;
  if (current < QUESTIONS.length - 1) {
    current++;
    renderQuestion();
  } else {
    showResults();
  }
}

function showResults() {
  quizScreen.classList.add("hidden");
  resultScreen.classList.remove("hidden");
  resultScreen.classList.remove("screen"); void resultScreen.offsetWidth; resultScreen.classList.add("screen");

  const total = QUESTIONS.length;
  const pct = Math.round((score / total) * 100);
  el("finalScore").textContent = score;
  el("finalTotal").textContent = total;
  el("finalPct").textContent = pct;

  // animate ring
  const ring = el("ringProgress");
  const circ = 2 * Math.PI * 80; // 502.4
  ring.style.transition = "none";
  ring.style.strokeDashoffset = circ;
  requestAnimationFrame(() => {
    ring.style.transition = "stroke-dashoffset 1.1s cubic-bezier(.4,0,.2,1)";
    ring.style.strokeDashoffset = circ * (1 - score / total);
  });

  let verdict, sub;
  if (pct === 100) { verdict = "Perfect Score! 🏆"; sub = "You're a model citizen — flawless run!"; }
  else if (pct >= 80) { verdict = "Excellent! 🇺🇸"; sub = "Strong command of the basics."; }
  else if (pct >= 60) { verdict = "Good job! 👍"; sub = "Solid — a little brushing up and you'll ace it."; }
  else if (pct >= 40) { verdict = "Getting there 📚"; sub = "Worth another round to lock these in."; }
  else { verdict = "Keep studying ✍️"; sub = "Every citizen starts somewhere — try again!"; }
  el("verdict").textContent = verdict;
  el("verdictSub").textContent = sub;

  if (pct >= 80) fireConfetti();
}

/* ---------------- Confetti ---------------- */
const canvas = el("confetti");
const ctx = canvas.getContext("2d");
let pieces = [];
let confettiRunning = false;

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

function fireConfetti() {
  const colors = ["#5b8cff", "#7c5cff", "#f5c451", "#2bd47d", "#ff5b6e", "#ffffff"];
  pieces = [];
  for (let i = 0; i < 160; i++) {
    pieces.push({
      x: Math.random() * canvas.width,
      y: -20 - Math.random() * canvas.height * 0.5,
      w: 6 + Math.random() * 8,
      h: 8 + Math.random() * 8,
      color: colors[Math.floor(Math.random() * colors.length)],
      vx: -2 + Math.random() * 4,
      vy: 2 + Math.random() * 4,
      rot: Math.random() * Math.PI,
      vrot: -0.2 + Math.random() * 0.4,
      life: 1
    });
  }
  if (!confettiRunning) { confettiRunning = true; requestAnimationFrame(animateConfetti); }
}

function animateConfetti() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  let alive = false;
  pieces.forEach((p) => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.06;
    p.rot += p.vrot;
    if (p.y < canvas.height + 30) alive = true;
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.fillStyle = p.color;
    ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
    ctx.restore();
  });
  if (alive) {
    requestAnimationFrame(animateConfetti);
  } else {
    confettiRunning = false;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
}

/* ---------------- Wiring ---------------- */
el("startBtn").addEventListener("click", startQuiz);
el("nextBtn").addEventListener("click", nextQuestion);
el("restartBtn").addEventListener("click", startQuiz);

// keyboard support: 1-4 to answer, Enter to advance
document.addEventListener("keydown", (e) => {
  if (!quizScreen.classList.contains("hidden")) {
    if (!answered && /^[1-4]$/.test(e.key)) {
      const buttons = el("answers").querySelectorAll(".answer");
      const b = buttons[parseInt(e.key, 10) - 1];
      if (b) b.click();
    } else if (answered && (e.key === "Enter" || e.key === " ")) {
      e.preventDefault();
      nextQuestion();
    }
  } else if (!startScreen.classList.contains("hidden") && e.key === "Enter") {
    startQuiz();
  } else if (!resultScreen.classList.contains("hidden") && e.key === "Enter") {
    startQuiz();
  }
});
