  <!-- Custom CSS for Premium Visual Accents and Animations -->
  <style type="text/css">
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      transition: background-color 0.3s ease, color 0.3s ease;
    }
    
    /* Custom Scrollbar Styles */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    .dark ::-webkit-scrollbar-thumb {
      background: rgba(156, 163, 175, 0.25);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(156, 163, 175, 0.4);
      border-radius: 4px;
    }
    .dark ::-webkit-scrollbar-thumb:hover {
      background: rgba(156, 163, 175, 0.45);
    }
    ::-webkit-scrollbar-thumb:hover {

    /* Column Red Flash when WIP limit exceeded */
    @keyframes redPulse {
      0%, 100% { border-color: rgba(239, 68, 68, 0.2); background-color: rgba(239, 68, 68, 0.01); }
      50% { border-color: rgba(239, 68, 68, 0.7); background-color: rgba(239, 68, 68, 0.05); }

    /* Active Dropping Highlight for Columns */
    .drop-column-highlight {

    }
    .dark .drop-column-highlight {
      background-color: rgba(14, 165, 233, 0.12) !important;
      border: 2px dashed rgba(14, 165, 233, 0.5) !important;
    }

    /* Keyframes for sliding modal/toasts */
    @keyframes slideUp {
      from { transform: translateY(16px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }

    }

    @keyframes fadeIn {

      animation: fadeIn 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;

    /* Standup Highlight/Dimming effect */
    .dimmed-card {
      opacity: 0.15;
      filter: blur(0.5px);
      transform: scale(0.97);
      pointer-events: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .highlighted-card {
      transform: scale(1.02);
      box-shadow: 0 10px 25px -5px rgba(14, 165, 233, 0.3), 0 8px 10px -6px rgba(14, 165, 233, 0.3);
      border: 2px solid #0ea5e9;
      z-index: 10;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);

    }

    }

    /* Sparkles animation */
    @keyframes bounce-gentle {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }
  </style>
</head>
<body class="h-full bg-slate-50 dark:bg-zinc-950 text-slate-900 dark:text-zinc-100 flex flex-col antialiased select-none">

  <div id="root" class="h-full flex flex-col">

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    // --- Audio Synthesis Engine ---
    const playSound = (type) => {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        if (type === 'success') {
          // Play a delightful multi-tone success chime
          const now = ctx.currentTime;
          const osc1 = ctx.createOscillator();
          const osc2 = ctx.createOscillator();
          const gain = ctx.createGain();
          
          osc1.type = 'sine';
          osc2.type = 'sine';
          
          osc1.frequency.setValueAtTime(523.25, now); // C5
          osc1.frequency.setValueAtTime(659.25, now + 0.12); // E5
          osc2.frequency.setValueAtTime(783.99, now); // G5
          osc2.frequency.setValueAtTime(1046.50, now + 0.12); // C6
          
          gain.gain.setValueAtTime(0.0, now);
          gain.gain.linearRampToValueAtTime(0.12, now + 0.05);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
          
          osc1.connect(gain);
          osc2.connect(gain);
          gain.connect(ctx.destination);
          
          osc1.start(now);
          osc2.start(now);
          osc1.stop(now + 0.8);
          osc2.stop(now + 0.8);
        } else if (type === 'timer_alarm') {
          // Speak / Speaker Timer Done warning chime (two pulses)
          const now = ctx.currentTime;
          const playBeep = (timeOffset) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(587.33, now + timeOffset); // D5
            gain.gain.setValueAtTime(0.0, now + timeOffset);
            gain.gain.linearRampToValueAtTime(0.1, now + timeOffset + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.001, now + timeOffset + 0.4);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start(now + timeOffset);
            osc.stop(now + timeOffset + 0.4);
          };
          playBeep(0);
          playBeep(0.3);
        } else if (type === 'tick') {
          // Soft timing tick sound
          const now = ctx.currentTime;
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(1000, now);
          gain.gain.setValueAtTime(0.01, now);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.05);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start(now);
          osc.stop(now + 0.05);
        }
      } catch (err) {
        console.warn('Web Audio API not supported or user action required.', err);
      }
    };

    // --- High Quality Static Mock Data ---
    const DEFAULT_TEAM = [
      { id: 't1', name: 'Sarah Lopez', initials: 'SL', color: 'bg-rose-500', text: 'text-white' },
      { id: 't2', name: 'Alex Mercer', initials: 'AM', color: 'bg-teal-500', text: 'text-white' },
      { id: 't3', name: 'Ken Tanaka', initials: 'KT', color: 'bg-indigo-500', text: 'text-white' },
      { id: 't4', name: 'Dave Kroll', initials: 'DK', color: 'bg-amber-500', text: 'text-zinc-950' },
      { id: 't5', name: 'Elena Rostova', initials: 'ER', color: 'bg-purple-500', text: 'text-white' },
    ];

    const DEFAULT_CARDS = [
      {
        id: 'card-1',
        title: 'Optimize API Gateway DB Query Latency',
        description: 'The analytical reports query takes over 4.5 seconds for users with massive log records. We need to implement query caching and a composite index on user_id + processed_at.',
        column: 'doing',
        priority: 'urgent', // urgent, high, medium, low
        assignee: 'SL',
        points: 8,
        subtasks: [
          { id: 'sub-1-1', text: 'Audit query execution plan in staging environment', done: true },
          { id: 'sub-1-2', text: 'Write database migration file for index additions', done: true },
          { id: 'sub-1-3', text: 'Deploy to beta env and measure latency improvements', done: false }
        ]
      },
      {
        id: 'card-2',
        title: 'Design Landing Page Hero Interactions',
        description: 'Create ultra-smooth CSS animations and scroll-triggered transforms for the main landing page hero. Keep bundles lightweight without heavy libraries.',
        column: 'todo',
        priority: 'high',
        assignee: 'AM',
        points: 3,
        subtasks: [
          { id: 'sub-2-1', text: 'Design vector assets / SVG elements', done: false },
          { id: 'sub-2-2', text: 'Implement vanilla CSS transitions', done: false }
        ]
      },
      {
        id: 'card-3',
        title: 'Implement OAuth2 / MFA Authentication Flow',
        description: 'Set up multi-factor authenticator support (Google Authenticator / Authy API). Ensure strict recovery key flow and high-contrast styling for the authentication screens.',
        column: 'doing',
        priority: 'urgent',
        assignee: 'KT',
        points: 13,
        subtasks: [
          { id: 'sub-3-1', text: 'Register TOTP library validator', done: true },
          { id: 'sub-3-2', text: 'Draft backup code generator algorithm', done: true },
          { id: 'sub-3-3', text: 'Verify accessible screen reader states for input pads', done: false }
        ]
      },
      {
        id: 'card-4',
        title: 'Review PR feedback on Billing Page Integration',
        description: 'Resolve minor layout shifts on mobile viewports and edge-case currency formatting bugs reported by Dave. Add Stripe invoice webhook logs.',
        column: 'todo',
        priority: 'medium',
        assignee: 'DK',
        points: 5,
        subtasks: [
          { id: 'sub-4-1', text: 'Fix viewport overflow on iPhone SE', done: true },
          { id: 'sub-4-2', text: 'Unit test currency symbol rendering', done: false }
        ]
      },
      {
        id: 'card-5',
        title: 'Setup End-to-End Playwright Regression Tests',
        description: 'Establish nightly CI pipelines to test critical user flows (Sign Up -> Checkout -> Workspace Provision). Run on chromium, WebKit, and firefox.',
        column: 'todo',
        priority: 'high',
        assignee: 'ER',
        points: 8,
        subtasks: []
      },
      {
        id: 'card-6',
        title: 'Upgrade React 19 Upgrade Guide & Audit Dependencies',
        description: 'Update dependency trees and resolve deprecated peer warning locks in node_modules. Standard security audit scan green light.',
        column: 'done',
        priority: 'low',
        assignee: 'DK',
        points: 2,
        subtasks: [
          { id: 'sub-6-1', text: 'Run npm audit fix', done: true },
          { id: 'sub-6-2', text: 'Verify sandbox application builds correctly', done: true }
        ]
      },
      {
        id: 'card-7',
        title: 'Refactor Navigation Bar Responsive State Hooks',
        description: 'Simplify toggle state handling in global context. Replace excessive triggers with state machine selectors to speed up execution.',
        column: 'done',
        priority: 'low',
        assignee: 'AM',
        points: 1,
        subtasks: [
          { id: 'sub-7-1', text: 'Refactor navbar.tsx logic', done: true }
        ]
      }
    ];

    function TinyKanbanApp() {
      // --- Core States ---
      const [cards, setCards] = useState(() => {
        const local = localStorage.getItem('tiny_kanban_cards');
        return local ? JSON.parse(local) : DEFAULT_CARDS;
      });

      const [wipLimits, setWipLimits] = useState(() => {
        const local = localStorage.getItem('tiny_kanban_wip');
        return local ? JSON.parse(local) : { todo: 8, doing: 3, done: 99 };
      });

      const [team, setTeam] = useState(() => {
        const local = localStorage.getItem('tiny_kanban_team');
        return local ? JSON.parse(local) : DEFAULT_TEAM;
      });

      const [darkMode, setDarkMode] = useState(() => {
        const local = localStorage.getItem('tiny_kanban_dark');
        return local ? JSON.parse(local) === 'true' : true;
      });

      const [zoomScale, setZoomScale] = useState(() => {
        return localStorage.getItem('tiny_kanban_zoom') || 'normal'; // normal, large, standup
      });

      // --- Filter/Search States ---
      const [searchQuery, setSearchQuery] = useState('');
      const [priorityFilter, setPriorityFilter] = useState('all');
      const [assigneeFilter, setAssigneeFilter] = useState('all');

      // --- Drag-and-Drop UX States ---
      const [draggedCardId, setDraggedCardId] = useState(null);
      const [activeDropCol, setActiveDropCol] = useState(null);

      // --- Standup Meeting Tools States ---
      const [timerMode, setTimerMode] = useState('countdown'); // countdown or countup
      const [secondsLeft, setSecondsLeft] = useState(900); // 15 mins default
      const [timerIsRunning, setTimerIsRunning] = useState(false);
      const [initialTimerSetting, setInitialTimerSetting] = useState(900);
      const [speakerQueue, setSpeakerQueue] = useState([]); // List of team speaker details
      const [currentSpeakerIdx, setCurrentSpeakerIdx] = useState(-1);
      const [speakerTimes, setSpeakerTimes] = useState({}); // key: initials, value: seconds spoken
      const [showStandupSequence, setShowStandupSequence] = useState(true);

      // --- Standup Focus/Spotlight States ---
      const [spotlitCard, setSpotlitCard] = useState(null); // Full Screen zoomed card for meeting focus
      const [activeStandupSpeakerFilter, setActiveStandupSpeakerFilter] = useState(null); // Highlight selected user's cards

      // --- Modals and Toast UI States ---
      const [showCardModal, setShowCardModal] = useState(false);
      const [modalMode, setModalMode] = useState('create'); // 'create' or 'edit'
      const [editingCardId, setEditingCardId] = useState(null);
      const [formData, setFormData] = useState({
        title: '',
        description: '',
        priority: 'medium',
        assignee: 'SL',
        points: 3,
        subtasks: []
      });
      const [newSubtaskText, setNewSubtaskText] = useState('');

      const [showConfigModal, setShowConfigModal] = useState(false);
      const [toasts, setToasts] = useState([]);
      const [deletedCardHistory, setDeletedCardHistory] = useState(null); // Keep last deleted card for Undo

      // --- DOM and Interval Refs ---
      const timerIntervalRef = useRef(null);
      const speakerIntervalRef = useRef(null);

      // --- Sync to Local Storage ---
      useEffect(() => {
        localStorage.setItem('tiny_kanban_cards', JSON.stringify(cards));
      }, [cards]);

      useEffect(() => {
        localStorage.setItem('tiny_kanban_wip', JSON.stringify(wipLimits));
      }, [wipLimits]);

      useEffect(() => {
        localStorage.setItem('tiny_kanban_team', JSON.stringify(team));
      }, [team]);

      useEffect(() => {
        localStorage.setItem('tiny_kanban_dark', darkMode);
        if (darkMode) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      }, [darkMode]);

      useEffect(() => {
        localStorage.setItem('tiny_kanban_zoom', zoomScale);
      }, [zoomScale]);

      // --- Global Event Listener (Escape key to exit Spotlight) ---
      useEffect(() => {
        const handleKeyDown = (e) => {
          if (e.key === 'Escape') {
            setSpotlitCard(null);
            setShowCardModal(false);
            setShowConfigModal(false);
          }
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, []);

      // --- Meeting Timer Trigger Controls ---
      useEffect(() => {
        if (timerIsRunning) {
          timerIntervalRef.current = setInterval(() => {
            if (timerMode === 'countdown') {
              setSecondsLeft((prev) => {
                if (prev <= 1) {
                  playSound('timer_alarm');
                  setTimerIsRunning(false);
                  return 0;
                }
                if (prev === 31 || prev === 11) {
                  playSound('tick'); // Gentle warning tick
                }
                return prev - 1;
              });
            } else {
              setSecondsLeft((prev) => prev + 1);
            }

            // Also increment active speaker timer if someone is currently presenting
            if (currentSpeakerIdx !== -1 && speakerQueue[currentSpeakerIdx]) {
              const speakerInitials = speakerQueue[currentSpeakerIdx].initials;
              setSpeakerTimes((prev) => ({
                ...prev,
                [speakerInitials]: (prev[speakerInitials] || 0) + 1
              }));
            }
          }, 1000);
        } else {
          clearInterval(timerIntervalRef.current);
        }

        return () => clearInterval(timerIntervalRef.current);
      }, [timerIsRunning, timerMode, currentSpeakerIdx, speakerQueue]);

      // --- Speaker Sequence Initializer ---
      const startSpeakerSequence = () => {
        const queue = team.map(member => ({
          ...member,
          status: 'pending' // pending, speaking, completed
        }));
        setSpeakerQueue(queue);
        setCurrentSpeakerIdx(0);
        // Reset individual speech counters
        const initialTimes = {};
        team.forEach(m => { initialTimes[m.initials] = 0; });
        setSpeakerTimes(initialTimes);
        
        // Auto filter board to the first speaker's cards to assist presenter!
        setActiveStandupSpeakerFilter(queue[0].initials);
        setTimerIsRunning(true);
        addToast('Daily Standup sequence started! Board focused on first presenter.', 'info');
      };

      const selectNextSpeaker = () => {
        if (currentSpeakerIdx === -1) return;
        
        const nextIdx = currentSpeakerIdx + 1;
        const updatedQueue = [...speakerQueue];
        updatedQueue[currentSpeakerIdx].status = 'completed';

        if (nextIdx < speakerQueue.length) {
          updatedQueue[nextIdx].status = 'speaking';
          setSpeakerQueue(updatedQueue);
          setCurrentSpeakerIdx(nextIdx);
          setActiveStandupSpeakerFilter(speakerQueue[nextIdx].initials);
          playSound('success');
        } else {
          // All Speakers Completed
          setSpeakerQueue(updatedQueue);
          setCurrentSpeakerIdx(-1);
          setActiveStandupSpeakerFilter(null); // Clear filtering focus
          playSound('success');
          addToast('Standup complete! Awesome work team! 🎉', 'success');
          // Confetti celebration
          if (window.confetti) {
            window.confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } });
          }
        }
      };

      const skipCurrentSpeaker = () => {
        if (currentSpeakerIdx === -1) return;
        const updatedQueue = [...speakerQueue];
        updatedQueue[currentSpeakerIdx].status = 'completed';
        
        const nextIdx = currentSpeakerIdx + 1;
        if (nextIdx < speakerQueue.length) {
          updatedQueue[nextIdx].status = 'speaking';
          setSpeakerQueue(updatedQueue);
          setCurrentSpeakerIdx(nextIdx);
          setActiveStandupSpeakerFilter(speakerQueue[nextIdx].initials);
        } else {
          setSpeakerQueue(updatedQueue);
          setCurrentSpeakerIdx(-1);
          setActiveStandupSpeakerFilter(null);
        }
      };

      const resetSpeakerSequence = () => {
        setSpeakerQueue([]);
        setCurrentSpeakerIdx(-1);
        setActiveStandupSpeakerFilter(null);
        setSpeakerTimes({});
      };

      // --- Speaker Time Formatter ---
      const formatTime = (totalSeconds) => {
        const mins = Math.floor(totalSeconds / 60);
        const secs = totalSeconds % 60;
        return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
      };

      // --- Toast Notification Mechanics ---
      const addToast = (message, type = 'info') => {
        const id = Date.now();
        setToasts((prev) => [...prev, { id, message, type }]);
        setTimeout(() => {
          setToasts((prev) => prev.filter((t) => t.id !== id));
        }, 5000);
      };

      const removeToast = (id) => {
        setToasts((prev) => prev.filter((t) => t.id !== id));
      };

      // --- Card Manipulations ---
      const handleOpenCreateModal = (col = 'todo') => {
        setModalMode('create');
        setFormData({
          title: '',
          description: '',
          priority: 'medium',
          assignee: team[0]?.initials || 'SL',
          points: 3,
          column: col,
          subtasks: []
        });
        setNewSubtaskText('');
        setShowCardModal(true);
      };

      const handleOpenEditModal = (card) => {
        setModalMode('edit');
        setEditingCardId(card.id);
        setFormData({
          title: card.title,
          description: card.description,
          priority: card.priority,
          assignee: card.assignee,
          points: card.points,
          column: card.column,
          subtasks: card.subtasks ? [...card.subtasks] : []
        });
        setNewSubtaskText('');
        setShowCardModal(true);
      };

      const saveCard = (e) => {
        e.preventDefault();
        if (!formData.title.trim()) {
          addToast('Card title is required!', 'error');
          return;
        }

        if (modalMode === 'create') {
          // Create new card
          const newCard = {
            id: 'card-' + Date.now(),
            title: formData.title,
            description: formData.description,
            priority: formData.priority,
            assignee: formData.assignee,
            points: parseInt(formData.points) || 0,
            column: formData.column || 'todo',
            subtasks: formData.subtasks
          };

          // Check WIP Limit warnings on target column
          const colCardsCount = cards.filter(c => c.column === newCard.column).length;
          const limit = wipLimits[newCard.column];
          if (limit && colCardsCount >= limit) {
            addToast(`Warning: WIP Limit exceeded for ${newCard.column.toUpperCase()}!`, 'warning');
          }

          setCards(prev => [...prev, newCard]);
          addToast('Card created successfully!', 'success');
        } else {
          // Update card
          setCards(prev => prev.map(c => {
            if (c.id === editingCardId) {
              return {
                ...c,
                title: formData.title,
                description: formData.description,
                priority: formData.priority,
                assignee: formData.assignee,
                points: parseInt(formData.points) || 0,
                column: formData.column,
                subtasks: formData.subtasks
              };
            }
            return c;
          }));
          addToast('Card updated successfully!', 'success');
        }

        setShowCardModal(false);
      };

      const deleteCard = (cardId) => {
        const cardToDelete = cards.find(c => c.id === cardId);
        if (!cardToDelete) return;

        setDeletedCardHistory(cardToDelete);
        setCards(prev => prev.filter(c => c.id !== cardId));
        
        // Show Undo toast
        const undoToastId = Date.now();
        setToasts(prev => [
          ...prev, 
          { 
            id: undoToastId, 
            message: `Deleted "${cardToDelete.title.substring(0, 20)}..."`, 
            type: 'delete_undo' 
          }
        ]);
        
        // Spotlit card clean up
        if (spotlitCard && spotlitCard.id === cardId) {
          setSpotlitCard(null);
        }
      };

      const triggerUndoDelete = () => {
        if (!deletedCardHistory) return;
        setCards(prev => [...prev, deletedCardHistory]);
        addToast(`Restored: ${deletedCardHistory.title.substring(0, 20)}...`, 'success');
        setDeletedCardHistory(null);
        // Find and clear the specific undo toast
        setToasts(prev => prev.filter(t => t.type !== 'delete_undo'));
      };

      // Quick move card left/right (accessible buttons)
      const shiftCardColumn = (cardId, direction) => {
        const colOrder = ['todo', 'doing', 'done'];
        setCards(prev => prev.map(c => {
          if (c.id === cardId) {
            const curIdx = colOrder.indexOf(c.column);
            let nextIdx = curIdx + direction;
            if (nextIdx >= 0 && nextIdx < colOrder.length) {
              const targetCol = colOrder[nextIdx];
              
              // Canvas confetti trigger
              if (targetCol === 'done') {
                playSound('success');
                if (window.confetti) {
                  window.confetti({ particleCount: 70, spread: 50, origin: { y: 0.85 } });
                }
              }
              return { ...c, column: targetCol };
            }
          }
          return c;
        }));
      };

      // Add Subtask directly inside modal input
      const handleAddSubtask = () => {
        if (!newSubtaskText.trim()) return;
        const newSub = {
          id: 'sub-' + Date.now(),
          text: newSubtaskText.trim(),
          done: false
        };
        setFormData(prev => ({
          ...prev,
          subtasks: [...prev.subtasks, newSub]
        }));
        setNewSubtaskText('');
      };

      const handleToggleSubtaskInModal = (subId) => {
        setFormData(prev => ({
          ...prev,
          subtasks: prev.subtasks.map(s => s.id === subId ? { ...s, done: !s.done } : s)
        }));
      };

      const handleRemoveSubtaskInModal = (subId) => {
        setFormData(prev => ({
          ...prev,
          subtasks: prev.subtasks.filter(s => s.id !== subId)
        }));
      };

      // Inline card subtask toggle (quick action on main board)
      const handleToggleInlineSubtask = (cardId, subtaskId) => {
        setCards(prev => prev.map(card => {
          if (card.id === cardId) {
            const updatedSubs = card.subtasks.map(sub => {
              if (sub.id === subtaskId) {
                return { ...sub, done: !sub.done };
              }
              return sub;
            });
            return { ...card, subtasks: updatedSubs };
          }
          return card;
        }));
        // Audio tick feedback
        playSound('tick');
      };

      // --- Drag & Drop Core Mechanics ---
      const handleDragStart = (e, cardId) => {
        e.dataTransfer.setData('text/plain', cardId);
        setDraggedCardId(cardId);
      };

      const handleDragEnd = () => {
        setDraggedCardId(null);
        setActiveDropCol(null);
      };

      const handleDragOverColumn = (e, columnId) => {
        e.preventDefault();
        if (activeDropCol !== columnId) {
          setActiveDropCol(columnId);
        }
      };

      const handleDrop = (e, targetColumnId) => {
        e.preventDefault();
        const cardId = e.dataTransfer.getData('text/plain') || draggedCardId;
        if (!cardId) return;

        const card = cards.find(c => c.id === cardId);
        if (card && card.column !== targetColumnId) {
          // Check WIP warnings
          const colCardsCount = cards.filter(c => c.column === targetColumnId).length;
          const limit = wipLimits[targetColumnId];
          if (limit && colCardsCount >= limit) {
            addToast(`WIP limit exceeded on ${targetColumnId.toUpperCase()}!`, 'warning');
          }

          setCards(prev => prev.map(c => {
            if (c.id === cardId) {
              return { ...c, column: targetColumnId };
            }
            return c;
          }));

          if (targetColumnId === 'done') {
            playSound('success');
            if (window.confetti) {
              window.confetti({ particleCount: 80, spread: 60, origin: { y: 0.8 } });
            }
          }
        }
        setDraggedCardId(null);
        setActiveDropCol(null);
      };

      // --- Search, Priority and Assignee Filters ---
      const filteredCards = useMemo(() => {
        return cards.filter(card => {
          const matchSearch = card.title.toLowerCase().includes(searchQuery.toLowerCase()) || 
                              card.description.toLowerCase().includes(searchQuery.toLowerCase());
          const matchPriority = priorityFilter === 'all' || card.priority === priorityFilter;
          const matchAssignee = assigneeFilter === 'all' || card.assignee === assigneeFilter;
          return matchSearch && matchPriority && matchAssignee;
        });
      }, [cards, searchQuery, priorityFilter, assigneeFilter]);

      // --- Total Velocity and Stats Estimations ---
      const stats = useMemo(() => {
        const columns = { todo: 0, doing: 0, done: 0 };
        const points = { todo: 0, doing: 0, done: 0 };
        
        cards.forEach(c => {
          if (columns[c.column] !== undefined) {
            columns[c.column]++;
            points[c.column] += (c.points || 0);
          }
        });

        const totalCards = cards.length;
        const totalPoints = Object.values(points).reduce((a, b) => a + b, 0);
        const completionRate = totalCards ? Math.round((columns.done / totalCards) * 100) : 0;

        return { columns, points, totalCards, totalPoints, completionRate };
      }, [cards]);

      // JSON Board backup utilities
      const exportBoardData = () => {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify({ cards, wipLimits, team }));
        const downloadAnchor = document.createElement('a');

                      Modify Card
                    </button>
                  </div>

                  <div className="flex gap-2 w-full sm:w-auto">
                    {spotlitCard.column !== 'todo' && (
                      <button 
                        onClick={() => {
                          shiftCardColumn(spotlitCard.id, -1);
                          setSpotlitCard(cards.find(c => c.id === spotlitCard.id)); // Re-sync
                        }}
                        className="flex-1 sm:flex-initial bg-slate-100 hover:bg-slate-200 dark:bg-zinc-850 dark:hover:bg-zinc-800 text-slate-700 dark:text-zinc-300 font-bold py-2.5 px-4 rounded-xl text-sm"
                      >
                        <i className="fa-solid fa-arrow-left mr-1"></i> Move Back
                      </button>
                    )}
                    {spotlitCard.column !== 'done' && (
                      <button 
                        onClick={() => {
                          shiftCardColumn(spotlitCard.id, 1);
                          setSpotlitCard(cards.find(c => c.id === spotlitCard.id)); // Re-sync
                        }}
                        className="flex-1 sm:flex-initial bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-black py-2.5 px-5 rounded-xl text-sm flex items-center justify-center gap-1 shadow-lg"
                      >
                        Advance State <i className="fa-solid fa-arrow-right ml-1"></i>
                      </button>
                    )}
                  </div>

                </div>

              </div>
            </div>
          )}

        </div>
      );
    }

    // --- SUB-COMPONENT: KANBAN COLUMN WRAPPER ---
    function KanbanColumn({ 
      id, title, icon, colorClass, columnColor, cards, allCardsCount, points, wipLimit,
      draggedCardId, activeDropCol, onDragOver, onDrop, onAddCard, onOpenEdit, onDeleteCard, 
      onShift, activeSpeaker, onSpotlightCard, onToggleSubtask, onDragStart, onDragEnd 
    }) {
      
      const isExceeded = wipLimit && allCardsCount > wipLimit;
      const isDraggingOverThis = activeDropCol === id;

      return (
        <div 
          onDragOver={(e) => onDragOver(e, id)}
          onDrop={(e) => onDrop(e, id)}
          className={`flex flex-col h-full bg-white dark:bg-zinc-900 rounded-2xl border transition-all shadow-sm ${
            isExceeded 
              ? 'wip-exceeded-pulse border-red-500' 
              : isDraggingOverThis 
              ? 'drop-column-highlight' 
              : 'border-slate-200/80 dark:border-zinc-800/80'
          }`}
        >
          
          {/* Column Header Metadata */}
          <div className="p-4 border-b border-slate-100 dark:border-zinc-800 flex items-center justify-between select-none shrink-0">
            <div className="flex items-center gap-2">
              <span className={`h-8 w-8 rounded-xl ${
                columnColor === 'sky' ? 'bg-sky-500/10 text-sky-500' :
                columnColor === 'amber' ? 'bg-amber-500/10 text-amber-500' : 'bg-emerald-500/10 text-emerald-500'
              } flex items-center justify-center text-sm shadow-sm`}>
                <i className={icon}></i>
              </span>
              <div>
                <h3 className="font-extrabold text-sm md:text-base tracking-tight text-slate-800 dark:text-zinc-100 flex items-center gap-1.5 column-header">
                  {title}
                  <span className="bg-slate-100 dark:bg-zinc-800 text-slate-600 dark:text-zinc-400 text-xs font-bold px-2 py-0.5 rounded-full border border-slate-200/50 dark:border-zinc-700/50 font-mono">
                    {allCardsCount}
                  </span>
                </h3>
                {wipLimit && wipLimit < 90 && (
                  <span className={`text-[10px] font-bold ${isExceeded ? 'text-rose-500' : 'text-slate-400 dark:text-zinc-500'}`}>
                    WIP Limit: {wipLimit} {isExceeded && '— Exceeded!'}
                  </span>
                )}
              </div>
            </div>

            <div className="flex items-center gap-2">
              <span className="text-[10px] bg-slate-100 dark:bg-zinc-800 border border-slate-200/60 dark:border-zinc-700 text-slate-500 dark:text-zinc-400 font-extrabold font-mono px-2 py-1 rounded-lg" title="Accumulated Story Points">
                {points} pts
              </span>
              <button 
                onClick={onAddCard}
                className="h-7 w-7 bg-slate-100 dark:bg-zinc-800 text-slate-500 hover:text-sky-500 dark:text-zinc-400 dark:hover:text-sky-400 rounded-lg flex items-center justify-center transition-colors shadow-sm"
                title="Add task to this column"
              >
                <i className="fa-solid fa-plus text-xs"></i>
              </button>
            </div>
          </div>

          {/* Cards Area */}
          <div className="flex-1 overflow-y-auto p-3.5 space-y-3.5">
            {cards.length === 0 ? (
              <div className="h-28 border-2 border-dashed border-slate-100 dark:border-zinc-800/80 rounded-xl flex flex-col items-center justify-center text-slate-400 dark:text-zinc-600 text-xs">
                <i className="fa-regular fa-clipboard text-xl mb-1 opacity-50"></i>
                <span>Empty state queue</span>
              </div>
            ) : (
              cards.map((card) => {
                const isDimmed = activeSpeaker && card.assignee !== activeSpeaker;
                const isHighlighted = activeSpeaker && card.assignee === activeSpeaker;
                
                return (
                  <KanbanCard 
                    key={card.id}
                    card={card}
                    isDimmed={isDimmed}
                    isHighlighted={isHighlighted}
                    onDragStart={onDragStart}
                    onDragEnd={onDragEnd}
                    onOpenEdit={onOpenEdit}
                    onDeleteCard={onDeleteCard}
                    onShift={onShift}
                    onSpotlight={onSpotlightCard}
                    onToggleSubtask={onToggleSubtask}
                  />
                );
              })
            )}
          </div>

        </div>
      );
    }

    // --- SUB-COMPONENT: KANBAN CARD CONTAINER ---
    function KanbanCard({ 
      card, isDimmed, isHighlighted, onDragStart, onDragEnd, onOpenEdit, onDeleteCard, 
      onShift, onSpotlight, onToggleSubtask 
    }) {
      
      const subtaskCount = card.subtasks ? card.subtasks.length : 0;
      const doneSubtasks = card.subtasks ? card.subtasks.filter(s => s.done).length : 0;
      const pct = subtaskCount ? Math.round((doneSubtasks / subtaskCount) * 100) : 0;

      return (
        <div 
          draggable="true"
          onDragStart={(e) => onDragStart(e, card.id)}
          onDragEnd={onDragEnd}
          onClick={() => onSpotlight(card)}
          className={`bg-white dark:bg-zinc-800/90 rounded-xl border border-slate-200/70 dark:border-zinc-750 p-4 shadow-sm hover:shadow-md transition-all duration-300 cursor-pointer flex flex-col gap-3 relative select-none ${
            isDimmed 
              ? 'dimmed-card' 
              : isHighlighted 
              ? 'highlighted-card' 
              : 'hover:-translate-y-0.5 hover:border-sky-500/50 dark:hover:border-sky-500/50'
          }`}
        >
          
          {/* Top Line Card Accents */}
          <div className="flex items-start justify-between gap-2">
            
            {/* Priority Accents Indicator */}
            <span className={`text-[9px] font-black uppercase tracking-widest px-2 py-0.5 rounded-full leading-none ${
              card.priority === 'urgent' ? 'bg-rose-500 text-white animate-pulse' :
              card.priority === 'high' ? 'bg-amber-500 text-white' :
              card.priority === 'medium' ? 'bg-yellow-400 text-slate-900' :
              'bg-emerald-500 text-white'
            }`}>
              {card.priority}
            </span>

            {/* Sub-action menu buttons (edit, delete) */}
            <div className="flex items-center gap-1 opacity-0 hover:opacity-100 focus-within:opacity-100 transition-opacity absolute top-2 right-2 bg-white dark:bg-zinc-800 pl-2 rounded-bl-lg">
              <button 
                onClick={(e) => {
                  e.stopPropagation();
                  onOpenEdit(card);
                }}
                className="h-6 w-6 text-slate-400 hover:text-sky-500 dark:hover:text-sky-400 hover:bg-slate-100 dark:hover:bg-zinc-700 rounded transition-colors"
                title="Edit Task Details"
              >
                <i className="fa-solid fa-pen text-[10px]"></i>
              </button>
              <button 
                onClick={(e) => {
                  e.stopPropagation();
                  onDeleteCard(card.id);
                }}
                className="h-6 w-6 text-slate-400 hover:text-rose-500 hover:bg-slate-100 dark:hover:bg-zinc-700 rounded transition-colors"
                title="Delete card"
              >
                <i className="fa-solid fa-trash-can text-[10px]"></i>
              </button>
            </div>
          </div>

          {/* Card Main Header & Title */}
          <div>
            <h4 className="font-bold text-sm text-slate-800 dark:text-zinc-100 leading-snug card-title line-clamp-2">
              {card.title}
            </h4>
            {card.description && (
              <p className="text-[11px] text-slate-400 dark:text-zinc-400 line-clamp-2 mt-1 card-desc font-normal">
                {card.description}
              </p>
            )}
          </div>

          {/* Mini checklist progress bar if subtasks exist */}
          {subtaskCount > 0 && (
            <div className="mt-1" onClick={(e) => e.stopPropagation()}>
              <div className="flex justify-between text-[9px] text-slate-400 dark:text-zinc-500 font-bold mb-1">
                <span>Checklist Checklist ({doneSubtasks}/{subtaskCount})</span>
                <span>{pct}%</span>
              </div>
              <div className="w-full bg-slate-100 dark:bg-zinc-900 h-1.5 rounded-full overflow-hidden border border-slate-200/20 dark:border-zinc-800">
                <div 
                  className={`h-full transition-all duration-300 ${pct === 100 ? 'bg-emerald-500' : 'bg-indigo-500'}`} 
                  style={{ width: `${pct}%` }}
                ></div>
              </div>
            </div>
          )}

          {/* Footer controls: Assignee & points badge & Touch move triggers */}
          <div className="flex items-center justify-between border-t border-slate-100/80 dark:border-zinc-700/60 pt-3 mt-1 text-xs shrink-0 select-none">
            
            <div className="flex items-center gap-2">
              {/* Assignee Tag Avatar */}
              {(() => {
                const colorMap = {
                  'SL': 'bg-rose-500 text-white',
                  'AM': 'bg-teal-500 text-white',
                  'KT': 'bg-indigo-500 text-white',
                  'DK': 'bg-amber-500 text-zinc-950',
                  'ER': 'bg-purple-500 text-white',
                };
                const userColor = colorMap[card.assignee] || 'bg-slate-500 text-white';
                
                return (
                  <span 
                    className={`h-6 w-6 rounded-full ${userColor} flex items-center justify-center text-[10px] font-extrabold shadow-sm`}
                    title={`Assigned to ${card.assignee}`}
                  >
                    {card.assignee}
                  </span>
                );
              })()}

              {card.points ? (
                <span className="bg-slate-50 dark:bg-zinc-900 text-slate-500 dark:text-zinc-400 text-[10px] font-black font-mono border border-slate-200/40 dark:border-zinc-750 px-2 py-0.5 rounded">
                  {card.points} pts
                </span>
              ) : null}
            </div>

            {/* Quick Accessible shift buttons */}
            <div className="flex items-center gap-1" onClick={(e) => e.stopPropagation()}>
              {card.column !== 'todo' && (
                <button 
                  onClick={() => onShift(card.id, -1)}
                  className="h-6 w-6 bg-slate-100 dark:bg-zinc-900 hover:bg-slate-200 dark:hover:bg-zinc-750 text-slate-500 dark:text-zinc-400 rounded-md flex items-center justify-center active:scale-90 transition-transform"
                  title="Move Left"
                >
                  <i className="fa-solid fa-angle-left"></i>
                </button>
              )}
              {card.column !== 'done' && (
                <button 
                  onClick={() => onShift(card.id, 1)}
                  className="h-6 w-6 bg-slate-100 dark:bg-zinc-900 hover:bg-slate-200 dark:hover:bg-zinc-750 text-slate-500 dark:text-zinc-400 rounded-md flex items-center justify-center active:scale-90 transition-transform"
                  title="Move Right"
                >
                  <i className="fa-solid fa-angle-right"></i>
                </button>
              )}
            </div>

          </div>

        </div>
      );
    }

    // --- Render to Screen DOM ---
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<TinyKanbanApp />);

  </script>
</body>
</html>
