    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // ----------------- SYNTHESIZED WEB AUDIO API SOUND ENGINE -----------------
        const SoundEngine = {
            audioCtx: null,
            muted: false,

            init() {
                if (!this.audioCtx) {
                    this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (this.audioCtx.state === 'suspended') {
                    this.audioCtx.resume();
                }
            },

            setMuted(m) {
                this.muted = m;
            },

            playPlop() {
                if (this.muted) return;
                try {
                    this.init();
                    const ctx = this.audioCtx;
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    
                    osc.frequency.setValueAtTime(140, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(70, ctx.currentTime + 0.12);
                    
                    gain.gain.setValueAtTime(0.2, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.12);
                    
                    osc.start();
                    osc.stop(ctx.currentTime + 0.12);
                } catch (e) { console.error(e); }
            },

            playSizzle(duration = 0.08, volume = 0.02) {
                if (this.muted) return;
                try {
                    this.init();
                    const ctx = this.audioCtx;
                    const bufferSize = ctx.sampleRate * duration;
                    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) {
                        data[i] = Math.random() * 2 - 1;
                    }
                    
                    const noise = ctx.createBufferSource();
                    noise.buffer = buffer;
                    
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.setValueAtTime(1600, ctx.currentTime);
                    
                    const gain = ctx.createGain();
                    gain.gain.setValueAtTime(volume, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
                    
                    noise.connect(filter);
                    filter.connect(gain);
                    gain.connect(ctx.destination);
                    
                    noise.start();
                } catch (e) {}
            },

            playSplash() {
                if (this.muted) return;
                try {
                    this.init();
                    const ctx = this.audioCtx;
                    
                    // High-frequency splash spray
                    const bufferSize = ctx.sampleRate * 0.45;
                    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) {
                        data[i] = Math.random() * 2 - 1;
                    }
                    
                    const noise = ctx.createBufferSource();
                    noise.buffer = buffer;
                    
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'bandpass';
                    filter.frequency.setValueAtTime(900, ctx.currentTime);
                    filter.frequency.exponentialRampToValueAtTime(250, ctx.currentTime + 0.45);
                    filter.Q.value = 4.0;
                    
                    const gain = ctx.createGain();
                    gain.gain.setValueAtTime(0.25, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.45);
                    
                    noise.connect(filter);
                    filter.connect(gain);
                    gain.connect(ctx.destination);
                    noise.start();
                    noise.stop(ctx.currentTime + 0.45);
                    
                    // Low rumble of water splash
                    const osc = ctx.createOscillator();
                    const oscGain = ctx.createGain();
                    osc.frequency.setValueAtTime(110, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(35, ctx.currentTime + 0.25);
                    
                    oscGain.gain.setValueAtTime(0.35, ctx.currentTime);
                    oscGain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.25);
                    
                    osc.connect(oscGain);
                    oscGain.connect(ctx.destination);
                    
                    osc.start();
                    osc.stop(ctx.currentTime + 0.25);
                } catch (e) {}
            },

            playCrunch() {
                if (this.muted) return;
                try {
                    this.init();
                    const ctx = this.audioCtx;
                    
                    const playBurst = (delay, dur, freq, vol) => {
                        const bufferSize = ctx.sampleRate * dur;
                        const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                        const data = buffer.getChannelData(0);
                        for (let i = 0; i < bufferSize; i++) {
                            data[i] = Math.random() * 2 - 1;
                        }
                        
                        const noise = ctx.createBufferSource();
                        noise.buffer = buffer;
                        
                        const filter = ctx.createBiquadFilter();
                        filter.type = 'bandpass';
                        filter.frequency.value = freq;
                        filter.Q.value = 6.0;
                        
                        const gain = ctx.createGain();
                        gain.gain.setValueAtTime(vol, ctx.currentTime + delay);
                        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + dur);
                        
                        noise.connect(filter);
                        filter.connect(gain);
                        gain.connect(ctx.destination);
                        noise.start(ctx.currentTime + delay);
                    };
                    
                    // Double crusty bite sound
                    playBurst(0, 0.04, 750, 0.15);
                    playBurst(0.03, 0.05, 1100, 0.12);
                    playBurst(0.06, 0.03, 500, 0.08);
                } catch (e) {}
            },

            playChime() {
                if (this.muted) return;
                try {
                    this.init();
                    const ctx = this.audioCtx;
                    const osc1 = ctx.createOscillator();
                    const osc2 = ctx.createOscillator();
                    const gain = ctx.createGain();
                    
                    osc1.type = 'triangle';
                    osc1.frequency.setValueAtTime(523.25, ctx.currentTime); // C5
                    osc1.frequency.exponentialRampToValueAtTime(783.99, ctx.currentTime + 0.25); // G5
                    
                    osc2.type = 'triangle';
                    osc2.frequency.setValueAtTime(659.25, ctx.currentTime); // E5
                    osc2.frequency.exponentialRampToValueAtTime(1046.50, ctx.currentTime + 0.25); // C6
                    
                    gain.gain.setValueAtTime(0.12, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
                    
                    osc1.connect(gain);
                    osc2.connect(gain);
                    gain.connect(ctx.destination);
                    
                    osc1.start();
                    osc2.start();
                    osc1.stop(ctx.currentTime + 0.35);
                    osc2.stop(ctx.currentTime + 0.35);
                } catch (e) {}
            }
        };

                    rating: 'PERFECT DUNK',
                    ratingColor: 'text-amber-500 bg-amber-500/10 border-amber-500/20',
                    review: 'Perfect soggy equilibrium. Absolute mouth-watering texture, sweetening the tea wonderfully.'
                }
            ]);

            // Audio mute syncer
            useEffect(() => {
                SoundEngine.setMuted(isMuted);
            }, [isMuted]);

            // Memoized values for current selections
            const activeBiscuit = useMemo(() => {
                return BISCUITS.find(b => b.id === selectedBiscuitId) || BISCUITS[0];
            }, [selectedBiscuitId]);

            const activeTea = useMemo(() => {
                return TEA_BLENDS.find(t => t.id === selectedTeaId) || TEA_BLENDS[0];
            }, [selectedTeaId]);

            // Sogginess progression math
            // Wetness growth speed matches a capillary function scaled by temp and base material porosity
            const sogMultiplier = useMemo(() => {
                const tempFactor = Math.pow((teaTemp - 35) / 45, 1.8); // exponential decay at higher temperatures
                const absorptionFactor = activeBiscuit.absorption / 50;
                const integrityFactor = 100 / biscuitIntegrity; // poorer integrity means faster crumble
                const teaBlendFactor = activeTea.absorbMult;
                
                // standard rate scale: 100% sogginess after target survival seconds
                return 0.22 * tempFactor * absorptionFactor * integrityFactor * teaBlendFactor;
            }, [teaTemp, activeBiscuit, biscuitIntegrity, activeTea]);

            // Optimal target range scaled for display
            const optimalRange = useMemo(() => {
                // Adjust bounds based on biscuit integrity and tea temperature
                const scale = 1 / (sogMultiplier / 0.22); // base scaling relative to standard builders at 80C
                const min = activeBiscuit.perfectMin * scale;
                const max = activeBiscuit.perfectMax * scale;
                return { min, max };
            }, [activeBiscuit, sogMultiplier]);

            // References
            const canvasRef = useRef(null);
            const requestRef = useRef(null);
            const lastTimeRef = useRef(null);

            // Simulation state pointers to keep Canvas draw loop perfectly updated without React delay
            const stateRef = useRef({
                isDunking: false,
                dunkTime: 0,
                sogginess: 0,
                status: 'fresh',
                activeBiscuit: activeBiscuit,
                activeTea: activeTea,
                teaTemp: teaTemp,
                particles: [],
                crumbsInTea: [],
                drips: [],
                bubbles: [],
                steams: [],
                biscuitY: 100, // starting held height
                crumbleTriggered: false,
                pieces: [], // crumbling large pieces
                rippleVal: 0,
                rippleSpeed: 0
            });

            // Keep reference state updated when React states change
            useEffect(() => {
                stateRef.current.isDunking = isDunking;
                stateRef.current.dunkTime = dunkTime;
                stateRef.current.sogginess = sogginess;
                stateRef.current.status = biscuitStatus;
                stateRef.current.activeBiscuit = activeBiscuit;
                stateRef.current.activeTea = activeTea;
                stateRef.current.teaTemp = teaTemp;
            }, [isDunking, dunkTime, sogginess, biscuitStatus, activeBiscuit, activeTea, teaTemp]);

            // Sound feedback for status adjustments
            const grabFreshBiscuit = () => {
                setDunkTime(0);
                setSogginess(0);
                setBiscuitStatus('fresh');
                setIsDunking(false);
                
                const s = stateRef.current;
                s.biscuitY = 100;
                s.crumbleTriggered = false;
                s.pieces = [];
                s.crumbsInTea = [];
                s.drips = [];
                s.bubbles = [];
                s.sogginess = 0;
                s.dunkTime = 0;
                s.status = 'fresh';
                
                SoundEngine.playCrunch();
            };

            const eatBiscuit = () => {
                if (biscuitStatus !== 'pulled_out') return;
                
                SoundEngine.playCrunch();
                setTimeout(() => SoundEngine.playChime(), 200);

                const finalTime = (dunkTime / 1000).toFixed(1);
                let scoreText = "";
                let rating = "DELICIOUS";
                let colorClasses = "text-green-500 bg-green-500/10 border-green-500/20";
                
                if (sogginess < 20) {
                    rating = "CRUNCHY & DRY";
                    colorClasses = "text-blue-400 bg-blue-500/10 border-blue-500/20";
                    scoreText = `A bit dry! Pulled out after ${finalTime}s. Barely absorbed any tea flavour. Play it bolder!`;
                } else if (sogginess >= 20 && sogginess < 50) {
                    rating = "MOIST DUNK";
                    colorClasses = "text-teal-400 bg-teal-500/10 border-teal-500/20";
                    scoreText = `Decent effort. Moistened exterior but retains a firm inner crunch. A reliable afternoon dunk.`;
                } else if (sogginess >= 50 && sogginess <= 85) {
                    rating = "PERFECT DUNK";
                    colorClasses = "text-amber-500 bg-amber-500/10 border-amber-500/20";
                    scoreText = `Incredible! Total biscuit-tea harmony achieved at ${finalTime}s. Highly aromatic, soft, and warm.`;
                    setStats(prev => ({ ...prev, perfectDunks: prev.perfectDunks + 1 }));
                } else {
                    rating = "HIGHLY HAZARDOUS";
                    colorClasses = "text-red-400 bg-red-500/10 border-red-500/20";
                    scoreText = `Incredibly risky maneuver! Pulled out at ${finalTime}s with ${Math.round(sogginess)}% sogginess. One foot in the grave.`;
                }

                setHistoryLog(prev => [
                    {
                        id: Date.now(),
                        biscuitName: activeBiscuit.name,
                        biscuitNickname: activeBiscuit.nickname,
                        duration: `${finalTime}s`,
                        temp: `${teaTemp}°C`,
                        rating: rating,
                        ratingColor: colorClasses,
                        review: scoreText
                    },
                    ...prev
                ]);

                setStats(prev => ({ ...prev, biscuitsDunked: prev.biscuitsDunked + 1 }));
                setBiscuitStatus('eaten');
            };

            // Keyboard Shortcuts Support
            useEffect(() => {
                const handleKeyDown = (e) => {
                    const key = e.key.toLowerCase();
                    if (e.code === 'Space') {
                        e.preventDefault();
                        if (biscuitStatus === 'fresh' || biscuitStatus === 'dunking') {
                            if (dunkMode === 'hold') {
                                if (!isDunking) {
                                    setIsDunking(true);
                                    if (biscuitStatus === 'fresh') setBiscuitStatus('dunking');
                                }
                            } else {
                                // Toggle Mode
                                setIsDunking(prev => !prev);
                                if (biscuitStatus === 'fresh') setBiscuitStatus('dunking');
                            }
                        }
                    } else if (key === 'r') {
                        grabFreshBiscuit();
                    } else if (key === 'b') {
                        // Cycle biscuits
                        setSelectedBiscuitId(currentId => {
                            const index = BISCUITS.findIndex(b => b.id === currentId);
                            const nextIndex = (index + 1) % BISCUITS.length;
                            return BISCUITS[nextIndex].id;
                        });
                    } else if (key === 't') {
                        setDarkMode(d => !d);
                    } else if (key === 'm') {
                        setIsMuted(m => !m);
                    }
                };

                const handleKeyUp = (e) => {
                    if (e.code === 'Space' && dunkMode === 'hold') {
                        e.preventDefault();
                        if (isDunking && (biscuitStatus === 'dunking' || biscuitStatus === 'fresh')) {
                            setIsDunking(false);
                            setBiscuitStatus('pulled_out');
                        }
                    }
                };

                window.addEventListener('keydown', handleKeyDown);
                window.addEventListener('keyup', handleKeyUp);
                return () => {
                    window.removeEventListener('keydown', handleKeyDown);
                    window.removeEventListener('keyup', handleKeyUp);
                };
            }, [isDunking, biscuitStatus, dunkMode, selectedBiscuitId]);

            // Dark Mode Class Sync
            useEffect(() => {
                const html = document.documentElement;
                if (darkMode) {
                    html.classList.add('dark');
                    html.style.backgroundColor = "#0c0a09";
                } else {
                    html.classList.remove('dark');
                    html.style.backgroundColor = "#f5f5f4";
                }
            }, [darkMode]);

            // ----------------- HIGH SMOOTH CANVAS PHYSICAL RENDERER -----------------
            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                
                // Set canvas resolution for crisp screens
                canvas.width = 420;
                canvas.height = 420;

                const draw = (timestamp) => {
                    if (!lastTimeRef.current) lastTimeRef.current = timestamp;
                    const dt = (timestamp - lastTimeRef.current) / 1000;
                    lastTimeRef.current = timestamp;

                    const state = stateRef.current;

                    // 1. CLEAR CANVAS
                    ctx.clearRect(0, 0, canvas.width, canvas.height);

                    // Constants for graphics layout
                    const mugX = canvas.width / 2;
                    const mugY = 270;
                    const mugWidth = 160;
                    const mugHeight = 130;
                    const teaY = mugY - mugHeight / 2 + 15; // Water line height in canvas coordinate space

                    // 2. GENERATE AND UPDATE STEAM PARTICLES
                    // Amount and velocity of steam scales with temperature
                    const tempIntensity = Math.max(0, (state.teaTemp - 40) / 60); // 0 at 40C, 1.0 at 100C
                    if (tempIntensity > 0.05 && Math.random() < 0.15 * tempIntensity) {
                        state.steams.push({
                            x: mugX - mugWidth/2.5 + Math.random() * (mugWidth/1.25),
                            y: teaY - 5,
                            vx: (Math.random() - 0.5) * 15,
                            vy: -20 - Math.random() * 40 * tempIntensity,
                            alpha: 0.4 + Math.random() * 0.4,
                            size: 8 + Math.random() * 12,
                            decay: 0.35 + Math.random() * 0.25
                        });
                    }

                    // Draw & Update Steams
                    state.steams.forEach((steam, idx) => {
                        steam.y += steam.vy * dt;
                        steam.x += steam.vx * dt;
                        steam.alpha -= steam.decay * dt;
                        steam.size += 5 * dt;

                        if (steam.alpha <= 0) {
                            state.steams.splice(idx, 1);
                            return;
                        }

                        ctx.save();
                        // Steam color blends based on chosen tea
                        let sColor = "255, 255, 255";
                        if (state.activeTea.id === 'matcha') sColor = "195, 225, 160";
                        else if (state.activeTea.id === 'builders') sColor = "240, 210, 190";
                        else if (state.activeTea.id === 'chamomile') sColor = "250, 235, 190";

                        ctx.fillStyle = `rgba(${sColor}, ${steam.alpha})`;
                        ctx.filter = 'blur(6px)';
                        ctx.beginPath();
                        ctx.arc(steam.x, steam.y, steam.size, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.restore();
                    });

                    // 3. PHYSICAL BISCUIT INTERACTION CALCULATIONS
                    const targetClampY = state.isDunking ? 200 : 100;
                    // Ease current position smoothly
                    state.biscuitY += (targetClampY - state.biscuitY) * 6 * dt;

                    const bisWidth = 100;
                    const bisHeight = 100;
                    const bisX = mugX - bisWidth / 2;
                    const bisY = state.biscuitY;

                    // Submerged calculation
                    // Tea liquid is horizontal at teaY.
                    const bisBottom = bisY + bisHeight;
                    let submergedHeight = 0;
                    if (bisBottom > teaY) {
                        submergedHeight = Math.min(bisHeight, bisBottom - teaY);
                    }
                    const subPercent = submergedHeight / bisHeight;

                    // Play sound when entering tea
                    if (subPercent > 0.05 && !canvas.wasSubmerged) {
                        SoundEngine.playPlop();
                        state.rippleSpeed = 15;
                        canvas.wasSubmerged = true;
                    } else if (subPercent < 0.05) {
                        canvas.wasSubmerged = false;
                    }

                    // Increment dunk timer and sogginess if submerged and status is actively dunking
                    if (state.isDunking && subPercent > 0 && state.status === 'dunking') {
                        const newDunk = state.dunkTime + (dt * 1000);
                        const newSog = Math.min(100, state.sogginess + (sogMultiplier * dt * 100));

                        state.dunkTime = newDunk;
                        state.sogginess = newSog;

                        // Synchronize to React state at moderate throttle
                        if (Math.random() < 0.3) {
                            setDunkTime(Math.round(newDunk));
                            setSogginess(newSog);
                        }

                        // Bubbling sound and sizzle
                        if (Math.random() < 0.4) {
                            SoundEngine.playSizzle(0.08, 0.015);
                        }

                        // Spawn bubbles escaping the porous biscuit
                        if (Math.random() < 0.3) {
                            state.bubbles.push({
                                x: bisX + Math.random() * bisWidth,
                                y: teaY + Math.random() * submergedHeight,
                                vy: -30 - Math.random() * 40,
                                vx: (Math.random() - 0.5) * 10,
                                radius: 1 + Math.random() * 3,
                                alpha: 0.8
                            });
                        }

                        // Soft crumb shedding during high sogginess
                        if (state.sogginess > 35 && Math.random() < (state.sogginess / 100) * 0.4) {
                            state.crumbsInTea.push({
                                x: bisX + Math.random() * bisWidth,
                                y: teaY + 2,
                                vx: (Math.random() - 0.5) * 20,
                                vy: 40 + Math.random() * 50,
                                size: 1.5 + Math.random() * 2.5,
                                color: state.activeBiscuit.darkColor,
                                alpha: 1.0,
                                angle: Math.random() * Math.PI,
                                rotSpeed: (Math.random() - 0.5) * 4
                            });
                        }

                        // CATASTROPHE CRUMBLE CHECK
                        if (newSog >= 100 && !state.crumbleTriggered) {
                            state.crumbleTriggered = true;
                            state.status = 'crumbled';
                            setBiscuitStatus('crumbled');
                            setIsDunking(false);
                            SoundEngine.playSplash();

                            // Create large physical chunks falling into the depth of the tea
                            const numChunks = 5 + Math.floor(Math.random() * 4);
                            for (let i = 0; i < numChunks; i++) {
                                state.pieces.push({
                                    x: bisX + (bisWidth / numChunks) * i + (Math.random() - 0.5) * 15,
                                    y: teaY + Math.random() * submergedHeight,
                                    vx: (Math.random() - 0.5) * 60,
                                    vy: 50 + Math.random() * 100,
                                    angle: Math.random() * Math.PI * 2,
                                    rotSpeed: (Math.random() - 0.5) * 6,
                                    size: 14 + Math.random() * 14,
                                    color: state.activeBiscuit.darkColor
                                });
                            }

                            // Splatter crumbs on screen overlay
                            for (let j = 0; j < 30; j++) {
                                state.crumbsInTea.push({
                                    x: bisX + Math.random() * bisWidth,
                                    y: teaY,
                                    vx: (Math.random() - 0.5) * 160,
                                    vy: -100 - Math.random() * 120, // splash upwards
                                    size: 2 + Math.random() * 4,
                                    color: state.activeBiscuit.color,
                                    alpha: 1.0,
                                    angle: Math.random() * Math.PI * 2,
                                    rotSpeed: (Math.random() - 0.5) * 8
                                });
                            }

                            // Add to tea sludge density
                            setStats(prev => ({
                                ...prev,
                                catastrophes: prev.catastrophes + 1,
                                teaMurkiness: Math.min(100, prev.teaMurkiness + 15)
                            }));

                            // Log catastrophe in records
                            setHistoryLog(prev => [
                                {
                                    id: Date.now(),
                                    biscuitName: state.activeBiscuit.name,
                                    biscuitNickname: state.activeBiscuit.nickname,
                                    duration: `${(newDunk/1000).toFixed(1)}s`,
                                    temp: `${state.teaTemp}°C`,
                                    rating: 'CATASTROPHE',
                                    ratingColor: 'text-red-500 bg-red-500/10 border-red-500/20',
                                    review: `Total collapse! The structural base gave way completely, dropping your delicious biscuit into the murky abyss.`
                                },
                                ...prev
                            ]);
                        }
                    }

                    // Drips falling from wet biscuit held above water
                    if (!state.isDunking && state.status === 'pulled_out' && state.sogginess > 5) {
                        if (Math.random() < (state.sogginess / 100) * 0.15) {
                            state.drips.push({
                                x: bisX + 15 + Math.random() * (bisWidth - 30),
                                y: bisY + bisHeight - (1 - subPercent) * 20,
                                vy: 150,
                                size: 2.5 + Math.random() * 2
                            });
                        }
                    }

                    // 4. DRAW COZY TEA MUG
                    // Background Mug Back (Semi-transparent inner brew)
                    ctx.save();
                    const mugGrad = ctx.createLinearGradient(mugX - mugWidth/2, mugY, mugX + mugWidth/2, mugY);
                    mugGrad.addColorStop(0, 'rgba(255, 255, 255, 0.08)');
                    mugGrad.addColorStop(0.5, 'rgba(255, 255, 255, 0.03)');
                    mugGrad.addColorStop(1, 'rgba(255, 255, 255, 0.08)');
                    if (darkMode) {
                        ctx.fillStyle = 'rgba(28, 25, 23, 0.7)';
                    } else {
                        ctx.fillStyle = 'rgba(245, 245, 244, 0.8)';
                    }
                    ctx.beginPath();
                    ctx.roundRect(mugX - mugWidth/2, mugY - mugHeight/2, mugWidth, mugHeight, [0, 0, 30, 30]);
                    ctx.fill();
                    ctx.restore();

                    // MUG HANDLE
                    ctx.save();
                    ctx.strokeStyle = darkMode ? '#e7e5e4' : '#57534e';
                    ctx.lineWidth = 14;
                    ctx.lineCap = 'round';
                    ctx.beginPath();
                    ctx.arc(mugX + mugWidth/2 + 5, mugY, 30, -Math.PI / 2.2, Math.PI / 2.2);
                    ctx.stroke();
                    ctx.restore();

                    // 5. DRAW TEA LIQUID (With dynamic murky color and surface ripples)
                    ctx.save();
                    // Get base tea color
                    const baseTeaHex = state.activeTea.color;
                    // Blend based on murkiness (lost crumbs darken/sludge the water)
                    const teaColorRgb = hexToRgb(baseTeaHex);
                    const sludgeColor = { r: 65, g: 35, b: 20 };
                    const murkRatio = stats.teaMurkiness / 100;
                    const finalTeaColor = {
                        r: Math.round(teaColorRgb.r * (1 - murkRatio) + sludgeColor.r * murkRatio),
                        g: Math.round(teaColorRgb.g * (1 - murkRatio) + sludgeColor.g * murkRatio),
                        b: Math.round(teaColorRgb.b * (1 - murkRatio) + sludgeColor.b * murkRatio)
                    };

                    const teaFill = `rgba(${finalTeaColor.r}, ${finalTeaColor.g}, ${finalTeaColor.b}, 0.9)`;
                    ctx.fillStyle = teaFill;

                    // Draw tea volume inside the glass mug
                    ctx.beginPath();
                    ctx.roundRect(mugX - mugWidth/2 + 6, teaY, mugWidth - 12, mugY + mugHeight/2 - teaY - 6, [0, 0, 24, 24]);
                    ctx.fill();

                    // Liquid surface ripples
                    if (state.rippleSpeed > 0) {
                        state.rippleVal += state.rippleSpeed * dt;
                        state.rippleSpeed -= 12 * dt; // slow down ripple over time
                    } else {
                        state.rippleVal += 1 * dt; // idle slow wave
                    }

                    // Render ripples
                    ctx.strokeStyle = `rgba(255, 255, 255, ${Math.min(0.4, state.rippleSpeed / 15 + 0.08)})`;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    for (let x = mugX - mugWidth/2 + 8; x <= mugX + mugWidth/2 - 8; x += 2) {
                        const distFromCenter = Math.abs(x - mugX);
                        const wave = Math.sin((x - mugX) * 0.15 - state.rippleVal * 12) * Math.min(6, state.rippleSpeed * 0.4 + 1.5) * (1 - distFromCenter / (mugWidth/2));
                        if (x === mugX - mugWidth/2 + 8) {
                            ctx.moveTo(x, teaY + wave);
                        } else {
                            ctx.lineTo(x, teaY + wave);
                        }
                    }
                    ctx.stroke();
                    ctx.restore();

                    // 6. DRAW CLAMP MOUNTING HOLDER
                    ctx.save();
                    ctx.strokeStyle = darkMode ? '#a8a29e' : '#78716c';
                    ctx.lineWidth = 4;
                    ctx.lineCap = 'round';
                    // Main stand line descending from sky
                    ctx.beginPath();
                    ctx.moveTo(mugX, 0);
                    ctx.lineTo(mugX, bisY - 20);
                    ctx.stroke();

                    // Mechanical clamp jaws holding top of biscuit
                    if (state.status !== 'eaten') {
                        ctx.fillStyle = darkMode ? '#78716c' : '#a8a29e';
                        ctx.beginPath();
                        ctx.arc(mugX, bisY - 15, 8, 0, Math.PI * 2);
                        ctx.fill();
                        
                        ctx.strokeStyle = darkMode ? '#78716c' : '#a8a29e';
                        ctx.lineWidth = 6;
                        ctx.beginPath();
                        ctx.moveTo(mugX - 25, bisY + 5);
                        ctx.quadraticCurveTo(mugX - 15, bisY - 15, mugX, bisY - 15);
                        ctx.quadraticCurveTo(mugX + 15, bisY - 15, mugX + 25, bisY + 5);
                        ctx.stroke();
                    }
                    ctx.restore();

                    // 7. DRAW THE ACTIVE BISCUIT
                    if (state.status !== 'eaten') {
                        ctx.save();
                        
                        // Clip the biscuit to NOT render crumbled bottom if it disintegrated
                        ctx.save();
                        if (state.status === 'crumbled') {
                            // Only draw the dry top portion held above water line
                            ctx.beginPath();
                            ctx.rect(bisX - 20, 0, bisWidth + 40, teaY);
                            ctx.clip();
                        }

                        // BISCUIT BASE SHAPE DRAW
                        const shapeColor = state.activeBiscuit.color;
                        const darkSogColor = state.activeBiscuit.darkColor;

                        // Biscuit is round or rectangular
                        const isRound = state.activeBiscuit.id !== 'bourbon' && state.activeBiscuit.id !== 'shortbread';
                        
                        if (isRound) {
                            // Render circular biscuits
                            ctx.fillStyle = shapeColor;
                            ctx.beginPath();
                            ctx.arc(mugX, bisY + bisHeight/2, bisWidth/2, 0, Math.PI * 2);
                            ctx.fill();

                            // SOGGY GRADIENT OVERLAY (Darkened, wet bottom texture)
                            if (subPercent > 0 || state.sogginess > 0) {
                                const wetGrad = ctx.createLinearGradient(mugX, bisY, mugX, bisBottom);
                                wetGrad.addColorStop(Math.max(0, 1 - state.sogginess/100 - 0.15), 'rgba(0,0,0,0)');
                                wetGrad.addColorStop(Math.min(1, 1 - state.sogginess/100 + 0.15), hexToRgbaStr(darkSogColor, 0.92));
                                wetGrad.addColorStop(1, hexToRgbaStr(darkSogColor, 0.98));

                                ctx.fillStyle = wetGrad;
                                ctx.beginPath();
                                ctx.arc(mugX, bisY + bisHeight/2, bisWidth/2, 0, Math.PI * 2);
                                ctx.fill();
                            }

                            // Detail Biscuit Textures
                            drawCircularTexture(ctx, mugX, bisY + bisHeight/2, bisWidth/2, state.activeBiscuit, state.sogginess);

                        } else {
                            // Render rectangular biscuits (Bourbon / Shortbread)
                            const rectX = bisX;
                            const rectY = bisY + 5;
                            const rectW = bisWidth;
                            const rectH = bisHeight - 10;
                            const bRadius = 10;

                            ctx.fillStyle = shapeColor;
                            ctx.beginPath();
                            ctx.roundRect(rectX, rectY, rectW, rectH, bRadius);
                            ctx.fill();

                            // SOGGY REC OVERLAY
                            if (subPercent > 0 || state.sogginess > 0) {
                                const wetGrad = ctx.createLinearGradient(mugX, rectY, mugX, rectY + rectH);
                                wetGrad.addColorStop(Math.max(0, 1 - state.sogginess/100 - 0.15), 'rgba(0,0,0,0)');
                                wetGrad.addColorStop(Math.min(1, 1 - state.sogginess/100 + 0.15), hexToRgbaStr(darkSogColor, 0.94));
                                wetGrad.addColorStop(1, hexToRgbaStr(darkSogColor, 0.98));

                                ctx.fillStyle = wetGrad;
                                ctx.beginPath();
                                ctx.roundRect(rectX, rectY, rectW, rectH, bRadius);
                                ctx.fill();
                            }

                            // Rectangular specific texture details
                            drawRectangularTexture(ctx, rectX, rectY, rectW, rectH, state.activeBiscuit, state.sogginess);
                        }

                        ctx.restore(); // end crumble clipping
                        ctx.restore(); // end general biscuit save
                    }

                    // 8. UPDATE AND DRAW DISINTEGRATING PHYSICAL PIECES
                    state.pieces.forEach((piece, idx) => {
                        piece.y += piece.vy * dt;
                        piece.x += piece.vx * dt;
                        piece.vy += 220 * dt; // gravity drag inside cup
                        piece.vx *= 0.95; // liquid resistance deceleration
                        piece.angle += piece.rotSpeed * dt;

                        // Chunks slowly melt/shrink in size
                        piece.size -= 1.8 * dt;

                        if (piece.y > mugY + mugHeight/2 || piece.size <= 2) {
                            state.pieces.splice(idx, 1);
                            return;
                        }

                        ctx.save();
                        ctx.fillStyle = piece.color;
                        ctx.translate(piece.x, piece.y);
                        ctx.rotate(piece.angle);
                        
                        // Draw irregular physical crumb polygon
                        ctx.beginPath();
                        ctx.moveTo(-piece.size/2, -piece.size/2);
                        ctx.lineTo(piece.size/2, -piece.size/3);
                        ctx.lineTo(piece.size/3, piece.size/2);
                        ctx.lineTo(-piece.size/2, piece.size/2);
                        ctx.closePath();
                        ctx.fill();
                        ctx.restore();
                    });

                    // 9. DRAW FLOATING WATER BUBBLES
                    state.bubbles.forEach((bubble, idx) => {
                        bubble.y += bubble.vy * dt;
                        bubble.x += bubble.vx * dt;
                        bubble.alpha -= 0.6 * dt;

                        if (bubble.y < teaY || bubble.alpha <= 0) {
                            state.bubbles.splice(idx, 1);
                            // Splash ripple on surface popped bubble
                            if (Math.random() < 0.2) state.rippleSpeed = Math.max(state.rippleSpeed, 2);
                            return;
                        }

                        ctx.save();
                        ctx.strokeStyle = `rgba(255, 255, 255, ${bubble.alpha})`;
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.arc(bubble.x, bubble.y, bubble.radius, 0, Math.PI * 2);
                        ctx.stroke();
                        ctx.restore();
                    });

                    // 10. DRAW CRUMBLE PARTICLES SYSTEM
                    state.crumbsInTea.forEach((crumb, idx) => {
                        crumb.y += crumb.vy * dt;
                        crumb.x += crumb.vx * dt;
                        crumb.vy += (crumb.y > teaY ? 120 : 350) * dt; // much faster falling in air than viscous tea
                        crumb.angle += crumb.rotSpeed * dt;

                        // Fade air crumbs, dissolve water crumbs slowly
                        if (crumb.y > teaY) {
                            crumb.vx *= 0.94; // tea drag
                            crumb.alpha -= 0.15 * dt;
                        } else {
                            crumb.alpha -= 0.05 * dt;
                        }

                        if (crumb.y > mugY + mugHeight/2 || crumb.alpha <= 0) {
                            state.crumbsInTea.splice(idx, 1);
                            return;
                        }

                        ctx.save();
                        ctx.fillStyle = hexToRgbaStr(crumb.color, crumb.alpha);
                        ctx.translate(crumb.x, crumb.y);
                        ctx.rotate(crumb.angle);
                        ctx.fillRect(-crumb.size/2, -crumb.size/2, crumb.size, crumb.size);
                        ctx.restore();
                    });

                    // 11. DRAW DRIPPING TEA DROPLETS
                    state.drips.forEach((drip, idx) => {
                        drip.y += drip.vy * dt;
                        drip.vy += 450 * dt; // air gravity speed

                        if (drip.y >= teaY) {
                            state.drips.splice(idx, 1);
                            // Spawn sound and splash wave
                            SoundEngine.playSizzle(0.04, 0.012);
                            state.rippleSpeed = Math.max(state.rippleSpeed, 4);
                            return;
                        }

                        ctx.save();
                        // Drip matches the active tea blend color
                        ctx.fillStyle = state.activeTea.color;
                        ctx.beginPath();
                        ctx.arc(drip.x, drip.y, drip.size, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.restore();
                    });

                    // 12. DRAW GLASS FOREGROUND OF COZY MUG
                    ctx.save();
                    ctx.strokeStyle = darkMode ? 'rgba(255, 255, 255, 0.15)' : 'rgba(0,0,0,0.12)';
                    ctx.lineWidth = 5;
                    ctx.beginPath();
                    ctx.roundRect(mugX - mugWidth/2, mugY - mugHeight/2, mugWidth, mugHeight, [0, 0, 30, 30]);
                    ctx.stroke();

                    // Mug glass light shine reflection overlay
                    const shineGrad = ctx.createLinearGradient(mugX - mugWidth/2, 0, mugX + mugWidth/2, 0);
                    shineGrad.addColorStop(0, 'rgba(255,255,255, 0.08)');
                    shineGrad.addColorStop(0.25, 'rgba(255,255,255, 0.25)');
                    shineGrad.addColorStop(0.3, 'rgba(255,255,255, 0)');
                    shineGrad.addColorStop(0.8, 'rgba(255,255,255, 0)');
                    shineGrad.addColorStop(0.85, 'rgba(255,255,255, 0.05)');

                    ctx.fillStyle = shineGrad;
                    ctx.beginPath();
                    ctx.roundRect(mugX - mugWidth/2 + 5, mugY - mugHeight/2 + 5, mugWidth - 10, mugHeight - 10, [0, 0, 25, 25]);
                    ctx.fill();
                    ctx.restore();

                    // Loop frame
                    requestRef.current = requestAnimationFrame(draw);
                };

                requestRef.current = requestAnimationFrame(draw);
                return () => cancelAnimationFrame(requestRef.current);
            }, [darkMode, stats.teaMurkiness]);

            // Hex Helper for Sound/Canvas integration
            function hexToRgb(hex) {
                const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
                return result ? {
                    r: parseInt(result[1], 16),
                    g: parseInt(result[2], 16),
                    b: parseInt(result[3], 16)
                } : { r: 130, g: 60, b: 30 };
            }

            function hexToRgbaStr(hex, alpha) {
                const rgb = hexToRgb(hex);
                return `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${alpha})`;
            }

            // Texture Drawer: Circle
            function drawCircularTexture(ctx, cx, cy, radius, config, sog) {
                ctx.save();
                ctx.strokeStyle = 'rgba(0,0,0,0.14)';
                ctx.lineWidth = 1.5;

                // Submerged soggy cookie texture looks cracked/melted
                if (sog > 40) {
                    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
                }

                // Inner circle ring border
                ctx.beginPath();
                ctx.arc(cx, cy, radius * 0.75, 0, Math.PI * 2);
                ctx.stroke();

                // Specific brand details
                if (config.texture === 'dots_with_text') {
                    // Biscuit text stamp
                    ctx.fillStyle = sog > 50 ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.18)';
                    ctx.font = 'bold 11px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(config.text, cx, cy);

                    // Array of punched holes
                    ctx.fillStyle = sog > 50 ? 'rgba(0,0,0,0.3)' : 'rgba(0,0,0,0.15)';
                    for (let i = 0; i < 12; i++) {
                        const angle = (i * Math.PI) / 6;
                        const hx = cx + Math.cos(angle) * (radius * 0.5);
                        const hy = cy + Math.sin(angle) * (radius * 0.5);
                        ctx.beginPath();
                        ctx.arc(hx, hy, 2, 0, Math.PI * 2);
                        ctx.fill();
                    }
                } else if (config.texture === 'smooth_ring') {
                    ctx.fillStyle = sog > 50 ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.14)';
                    ctx.font = 'bold 9px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText(config.text, cx, cy);

                    // Tiny dense dot circle
                    ctx.fillStyle = 'rgba(0,0,0,0.1)';
                    for (let i = 0; i < 18; i++) {
                        const angle = (i * Math.PI) / 9;
                        const hx = cx + Math.cos(angle) * (radius * 0.85);
                        const hy = cy + Math.sin(angle) * (radius * 0.85);
                        ctx.beginPath();
                        ctx.arc(hx, hy, 1.5, 0, Math.PI * 2);
                        ctx.fill();
                    }
                } else if (config.texture === 'cracked_gloss') {
                    // Dark rustic cracked lines
                    ctx.strokeStyle = 'rgba(0,0,0,0.22)';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    // draw random jagged lines
                    ctx.moveTo(cx - radius * 0.4, cy - radius * 0.3);
                    ctx.lineTo(cx - radius * 0.1, cy - radius * 0.2);
                    ctx.lineTo(cx + radius * 0.2, cy - radius * 0.5);

                    ctx.moveTo(cx - radius * 0.5, cy + radius * 0.1);
                    ctx.lineTo(cx + radius * 0.4, cy + radius * 0.3);
                    ctx.stroke();

                    // Sugar sparkle reflection overlay
                    ctx.fillStyle = 'rgba(255,255,255,0.25)';
                    for (let i = 0; i < 5; i++) {
                        ctx.fillRect(cx - radius * 0.5 + Math.random() * radius, cy - radius * 0.5 + Math.random() * radius, 3, 3);
                    }
                } else if (config.texture === 'oat_chunks') {
                    // Textured oatmeal chunks
                    ctx.fillStyle = 'rgba(0,0,0,0.15)';
                    for (let i = 0; i < 15; i++) {
                        const rx = cx + (Math.random() - 0.5) * radius * 1.3;
                        const ry = cy + (Math.random() - 0.5) * radius * 1.3;
                        const distance = Math.sqrt((rx-cx)*(rx-cx) + (ry-cy)*(ry-cy));
                        if (distance < radius - 6) {
                            ctx.beginPath();
                            ctx.arc(rx, ry, 3 + Math.random() * 4, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    }
                }

                ctx.restore();
            }

            // Texture Drawer: Rectangle
            function drawRectangularTexture(ctx, rx, ry, rw, rh, config, sog) {
                ctx.save();
                ctx.strokeStyle = 'rgba(0,0,0,0.18)';
                ctx.lineWidth = 1.5;

                // Outer border inlay
                ctx.strokeRect(rx + 6, ry + 6, rw - 12, rh - 12);

                if (config.texture === 'sandwich_holes') {
                    // Cream middle layer line
                    ctx.fillStyle = 'rgba(0,0,0,0.22)';
                    ctx.fillRect(rx, ry + rh/2 - 3, rw, 6);

                    ctx.fillStyle = sog > 50 ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.22)';
                    ctx.font = 'bold 11px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText(config.text, rx + rw/2, ry + rh/2 - 10);
                    ctx.fillText("CHOCO", rx + rw/2, ry + rh/2 + 15);

                    // Small grid pins
                    ctx.fillStyle = 'rgba(0,0,0,0.15)';
                    const colX = [rx + 15, rx + rw/2, rx + rw - 15];
                    const rowY = [ry + 15, ry + rh - 15];
                    colX.forEach(cx => {
                        rowY.forEach(cy => {
                            ctx.beginPath();
                            ctx.arc(cx, cy, 2, 0, Math.PI * 2);
                            ctx.fill();
                        });
                    });
                } else if (config.texture === 'sugar_sprinkled') {
                    // Shortbread row separator line
                    ctx.beginPath();
                    ctx.moveTo(rx + rw/2, ry + 8);
                    ctx.lineTo(rx + rw/2, ry + rh - 8);
                    ctx.stroke();

                    // Tiny baking dots
                    ctx.fillStyle = 'rgba(0,0,0,0.15)';
                    for (let i = 0; i < 6; i++) {
                        ctx.beginPath();
                        ctx.arc(rx + rw/4, ry + 15 + i * 12, 1.8, 0, Math.PI * 2);
                        ctx.arc(rx + (3 * rw)/4, ry + 15 + i * 12, 1.8, 0, Math.PI * 2);
                        ctx.fill();
                    }

                    // Sugar crystal dusting
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.45)';
                    for (let i = 0; i < 16; i++) {
                        const sx = rx + 8 + Math.random() * (rw - 16);
                        const sy = ry + 8 + Math.random() * (rh - 16);
                        ctx.fillRect(sx, sy, 2, 2);
                    }
                }

                ctx.restore();
            }

            // ----------------- SVG LIVE GRAPH COEFF CALC -----------------
            const graphPathData = useMemo(() => {
                const width = 300;

                    const py = height - (integrityRemaining / 100) * height;
                    points.push(`${px},${py}`);
                }
                return `M ${points.join(' L ')}`;
            }, [activeBiscuit, sogMultiplier]);

                return { text: 'CRITICAL ZONE', color: 'bg-red-500/15 text-red-500 border-red-500/30 danger-pulse font-bold' };
            }, [sogginess, biscuitStatus]);

            return (
                <div className="flex-grow flex flex-col justify-start">
                    {/* TOP NAVBAR HEADER */}

                                <Icons.Cup className="w-8 h-8" />
                            </div>
                            <div>
                                <h1 className="text-2xl font-serif font-black tracking-wide text-tea-800 dark:text-tea-400 flex items-center gap-2">
                                    Tea Dunkability Simulator
                                </h1>
                                <p className="text-xs text-slate-500 dark:text-slate-400 font-sans tracking-wide">
                                    The definitive physics-based biscuit hydration laboratory
                                </p>
                            </div>
                        </div>

                        {/* Top Stats Display */}
                        <div className="flex items-center gap-4 md:gap-6 text-sm flex-wrap justify-center">

                                <span className="text-lg">🍪</span>

                                    <span className="text-xs text-slate-400 block">Dunked</span>

                                    <div className="flex justify-between bg-slate-500/5 p-1 px-2 rounded-lg"><span className="font-extrabold text-slate-300">B</span> <span>Cycle Biscuit</span></div>
                                    <div className="flex justify-between bg-slate-500/5 p-1 px-2 rounded-lg"><span className="font-extrabold text-slate-300">T</span> <span>Toggle Light</span></div>
                                    <div className="flex justify-between bg-slate-500/5 p-1 px-2 rounded-lg"><span className="font-extrabold text-slate-300">M</span> <span>Mute Audio</span></div>
                                </div>
                            </div>

                        </div>

                        {/* CENTER COLUMN: SIMULATION CANVAS CHAMBER (5 COLS) */}
                        <div className="lg:col-span-5 flex flex-col items-center gap-6">
                            
                            {/* Interactive Physics View Frame */}
                            <div className="glass-card p-5 rounded-[40px] w-full flex flex-col items-center relative overflow-hidden">
                                
                                {/* Status overlay badge */}
                                <div className="absolute top-5 left-5 flex gap-2">
                                    <span className={`text-[11px] font-black border tracking-wider px-3 py-1 rounded-full ${statusBadge.color}`}>
                                        {statusBadge.text}
                                    </span>
                                </div>

                                {/* Live stats readings overlay */}
                                <div className="absolute top-5 right-5 text-right font-mono text-xs text-slate-400 space-y-0.5 bg-slate-900/40 p-1.5 px-3 rounded-xl border border-white/5 backdrop-blur-sm">
                                    <div>Time: <span className="font-bold text-white">{(dunkTime/1000).toFixed(2)}s</span></div>
                                    <div>Sogginess: <span className="font-bold text-white">{Math.round(sogginess)}%</span></div>
                                </div>

                                {/* CANVAS ELEMENT */}
                                <div className="relative w-[340px] h-[340px] rounded-3xl overflow-hidden mt-6 mb-2 bg-gradient-to-b from-transparent to-tea-500/5 border border-slate-500/10">
                                    <canvas
                                        ref={canvasRef}
                                        className="w-full h-full block"
                                    />
                                </div>

                                {/* Custom Soggy Progress bar overlay */}
                                <div className="w-full px-4 mb-4">
                                    <div className="flex justify-between text-xs mb-1 font-bold">
                                        <span className="text-slate-400">Total Structural Soggy Index</span>
                                        <span className={`${sogginess > 80 ? 'text-red-500' : sogginess > 50 ? 'text-amber-500' : 'text-slate-400'}`}>
                                            {Math.round(sogginess)}%
                                        </span>
                                    </div>
                                    <div className="w-full bg-slate-200 dark:bg-neutral-800 h-2.5 rounded-full overflow-hidden p-0.5 border border-neutral-700">
                                        <div 
                                            className={`h-full rounded-full transition-all duration-75 ${
                                                sogginess > 80 ? 'bg-gradient-to-r from-red-500 to-rose-600 animate-pulse' : sogginess > 50 ? 'bg-amber-500' : 'bg-teal-500'
                                            }`} 
                                            style={{ width: `${sogginess}%` }}
                                        ></div>
                                    </div>
                                </div>

                                {/* Tactical Action Buttons Panel */}
                                <div className="flex flex-col gap-3 w-full px-4">
                                    
                                    {/* Large interactive tactile Dunk Button */}
                                    <div className="flex gap-2 w-full justify-center">
                                        
                                        {/* Hold mode button vs Toggle mode */}
                                        {dunkMode === 'hold' ? (
                                            <button
                                                onMouseDown={() => {
                                                    if (biscuitStatus === 'fresh' || biscuitStatus === 'dunking') {
                                                        setIsDunking(true);
                                                        setBiscuitStatus('dunking');
                                                    }
                                                }}
                                                onMouseUp={() => {
                                                    if (isDunking) {
                                                        setIsDunking(false);
                                                        setBiscuitStatus('pulled_out');
                                                    }
                                                }}
                                                onMouseLeave={() => {
                                                    if (isDunking) {
                                                        setIsDunking(false);
                                                        setBiscuitStatus('pulled_out');
                                                    }
                                                }}
                                                onTouchStart={() => {
                                                    if (biscuitStatus === 'fresh' || biscuitStatus === 'dunking') {
                                                        setIsDunking(true);
                                                        setBiscuitStatus('dunking');
                                                    }
                                                }}
                                                onTouchEnd={() => {
                                                    if (isDunking) {
                                                        setIsDunking(false);
                                                        setBiscuitStatus('pulled_out');
                                                    }
                                                }}
                                                disabled={biscuitStatus === 'crumbled' || biscuitStatus === 'eaten'}
                                                className="btn-pushable w-full disabled:opacity-40 disabled:pointer-events-none"
                                            >
                                                <div className="btn-shadow"></div>
                                                <div className="btn-edge"></div>
                                                <div className="btn-front py-4 tracking-wider uppercase font-fun">
                                                    {isDunking ? '💧 DUNK WATER ACTIVE 💧' : '👇 HOLD DOWN TO DUNK 👇'}
                                                </div>
                                            </button>
                                        ) : (
                                            <button
                                                onClick={() => {
                                                    if (biscuitStatus === 'fresh' || biscuitStatus === 'dunking') {
                                                        if (!isDunking) {
                                                            setIsDunking(true);
                                                            setBiscuitStatus('dunking');
                                                        } else {
                                                            setIsDunking(false);
                                                            setBiscuitStatus('pulled_out');
                                                        }
                                                    }
                                                }}
                                                disabled={biscuitStatus === 'crumbled' || biscuitStatus === 'eaten'}
                                                className="btn-pushable w-full disabled:opacity-40 disabled:pointer-events-none"
                                            >
                                                <div className="btn-shadow"></div>
                                                <div className="btn-edge"></div>
                                                <div className="btn-front py-4 tracking-wider uppercase font-fun">
                                                    {isDunking ? '🛑 STOP DUNK 🛑' : '👇 TAP TO START DUNK 👇'}
                                                </div>
                                            </button>
                                        )}
                                    </div>

                                    {/* Secondary Action controls */}
                                    <div className="grid grid-cols-2 gap-2 mt-1">
                                        <button
                                            onClick={grabFreshBiscuit}
                                            className="py-2.5 px-4 bg-slate-500/10 hover:bg-slate-500/20 active:scale-95 border border-slate-500/10 text-xs font-black rounded-xl flex items-center justify-center transition-all duration-150"
                                        >
                                            <Icons.Refresh />
                                            FRESH BISCUIT
                                        </button>

                                        <button
                                            onClick={eatBiscuit}
                                            disabled={biscuitStatus !== 'pulled_out'}
                                            className="py-2.5 px-4 bg-teal-500 hover:bg-teal-600 disabled:opacity-40 text-white disabled:pointer-events-none active:scale-95 text-xs font-black rounded-xl flex items-center justify-center transition-all duration-150"
                                        >
                                            😋 CHEW & EAT
                                        </button>
                                    </div>

                                    {/* Dunk Button Hold/Toggle configuration selector */}
                                    <div className="flex justify-center gap-6 mt-1 text-[11px] text-slate-400">
                                        <label className="flex items-center gap-1.5 cursor-pointer">
                                            <input 
                                                type="radio" 
                                                name="dunkMode" 
                                                checked={dunkMode === 'hold'} 
                                                onChange={() => setDunkMode('hold')}
                                                className="accent-tea-500" 
                                            />
                                            Press & Hold Mouse Mode
                                        </label>
                                        <label className="flex items-center gap-1.5 cursor-pointer">
                                            <input 
                                                type="radio" 
                                                name="dunkMode" 
                                                checked={dunkMode === 'toggle'} 
                                                onChange={() => setDunkMode('toggle')}
                                                className="accent-tea-500" 
                                            />
                                            Click Toggle Mode
                                        </label>
                                    </div>

                                </div>

                            </div>

                        </div>

                        {/* RIGHT COLUMN: GRAPHS & HISTORY LOGS (3 COLS) */}
                        <div className="lg:col-span-3 space-y-6">
                            
                            {/* LIVE GRAPH CRUMBLE-O-METER */}
                            <div className="glass-card p-5 rounded-3xl space-y-3">
                                <div className="flex items-center gap-2 border-b border-slate-500/10 pb-2">
                                    <Icons.Activity />
                                    <h3 className="font-serif font-black text-sm text-tea-950 dark:text-tea-200">
                                        Crumble-O-Meter Graph
                                    </h3>
                                </div>

                                <div className="text-[10px] text-slate-400 leading-normal">
                                    Plots <span className="text-red-400 font-bold">Structural Sogginess</span> over <span className="font-bold">Dunking Seconds</span>.
                                </div>

                                {/* Interactive Graph Frame with gradient lines */}
                                <div className="relative border border-slate-500/10 rounded-xl p-2 bg-slate-950/30 overflow-hidden">
                                    <svg viewBox="0 0 300 150" className="w-full h-auto block overflow-visible">
                                        {/* Golden perfect dunk target vertical zone shading */}
                                        {optimalRange.min < activeBiscuit.perfectMax * 2 && (
                                            <rect
                                                x={(optimalRange.min / (activeBiscuit.perfectMax * 2)) * 300}
                                                y="0"
                                                width={Math.max(5, ((optimalRange.max - optimalRange.min) / (activeBiscuit.perfectMax * 2)) * 300)}
                                                height="150"
                                                fill="rgba(217, 119, 6, 0.12)"
                                            />
                                        )}

                                        {/* Horizontal Guideline indicators */}
                                        <line x1="0" y1="120" x2="300" y2="120" stroke="rgba(239, 68, 68, 0.15)" strokeDasharray="3,3" />
                                        <line x1="0" y1="75" x2="300" y2="75" stroke="rgba(255, 255, 255, 0.05)" strokeDasharray="3,3" />
                                        <line x1="0" y1="30" x2="300" y2="30" stroke="rgba(255, 255, 255, 0.05)" strokeDasharray="3,3" />

                                        {/* Dynamic survival curve line */}
                                        <path
                                            d={graphPathData}
                                            fill="none"
                                            stroke="url(#gradient-survival)"
                                            strokeWidth="3.5"
                                            strokeLinecap="round"
                                        />

                                        {/* Real-time moving pulse tracer marker */}
                                        {biscuitStatus !== 'fresh' && biscuitStatus !== 'eaten' && (
                                            <g>
                                                <circle
                                                    cx={graphTracerPos.x}
                                                    cy={graphTracerPos.y}
                                                    r="7"
                                                    fill="#d37d44"
                                                    className="animate-pulse"
                                                />
                                                <circle
                                                    cx={graphTracerPos.x}
                                                    cy={graphTracerPos.y}
                                                    r="3"
                                                    fill="#fff"
                                                />
                                            </g>
                                        )}

                                        {/* Linear SVG Gradients definitions */}
                                        <defs>
                                            <linearGradient id="gradient-survival" x1="0%" y1="0%" x2="100%" y2="100%">
                                                <stop offset="0%" stopColor="#10b981" />
                                                <stop offset="50%" stopColor="#fbbf24" />
                                                <stop offset="100%" stopColor="#ef4444" />
                                            </linearGradient>
                                        </defs>
                                    </svg>

                                    {/* Dynamic Overlay Legends */}
                                    <div className="absolute top-2.5 left-2.5 bg-amber-500/20 text-[9px] font-bold text-amber-500 px-1.5 py-0.5 rounded border border-amber-500/30">
                                        Golden Flavor Range
                                    </div>
                                    <div className="absolute bottom-2.5 right-2.5 bg-red-500/20 text-[9px] font-bold text-red-500 px-1.5 py-0.5 rounded border border-red-500/30">
                                        Danger Zone
                                    </div>
                                </div>

                                <div className="flex justify-between items-center text-[10px] text-slate-400">
                                    <span>0s (Crunchy)</span>
                                    <span>Target Survival: {(activeBiscuit.perfectMax * 1.5).toFixed(1)}s</span>
                                </div>
                            </div>

                            {/* DUNK RECORDS HISTORY TIMELINE LOG */}
                            <div className="glass-card p-5 rounded-3xl space-y-3">
                                <div className="flex items-center gap-2 border-b border-slate-500/10 pb-2">
                                    <Icons.Trophy />
                                    <h3 className="font-serif font-black text-sm text-tea-950 dark:text-tea-200">
                                        Laboratory Dunk Log
                                    </h3>
                                </div>

                                {/* Map timeline points scrollable container */}
                                <div className="space-y-3 max-h-[220px] overflow-y-auto pr-1">
                                    {historyLog.length === 0 ? (
                                        <div className="text-center py-6 text-xs text-slate-500 italic">
                                            No dunks recorded yet in this laboratory session.
                                        </div>
                                    ) : (
                                        historyLog.map(item => (
                                            <div key={item.id} className="bg-slate-500/5 p-3 rounded-2xl border border-slate-500/10 space-y-1.5 text-xs transition-all duration-300">
                                                <div className="flex justify-between items-start gap-1">
                                                    <div>
                                                        <span className="font-bold text-slate-800 dark:text-slate-200">{item.biscuitName}</span>
                                                        <span className="text-[10px] text-slate-400 block">{item.biscuitNickname}</span>
                                                    </div>
                                                    <span className={`text-[10px] font-black tracking-wider px-2 py-0.5 rounded border ${item.ratingColor}`}>
                                                        {item.rating}
                                                    </span>
                                                </div>
                                                <div className="flex justify-between text-[10px] text-slate-500 border-t border-b border-slate-500/5 py-1">
                                                    <span>Dunk Duration: <strong className="text-slate-400">{item.duration}</strong></span>
                                                    <span>Temp: <strong className="text-slate-400">{item.temp}</strong></span>
                                                </div>
                                                <p className="text-[11px] text-slate-500 dark:text-slate-400 italic leading-relaxed">
                                                    "{item.review}"
                                                </p>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>

                        </div>

                    </div>

                    {/* ENCYCLOPEDIA & PHYSICS THEORY BANNER */}
                    <footer className="w-full max-w-7xl mx-auto px-4 md:px-8 pb-12 mt-4">
                        <div className="glass-card p-6 rounded-[32px] space-y-4">
                            <div className="flex items-center gap-2 border-b border-slate-500/10 pb-3">
                                <Icons.BookOpen />
                                <h3 className="font-serif font-black text-lg text-tea-950 dark:text-tea-200">
                                    Theoretical Dunking Physics
                                </h3>
                            </div>
                            
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 text-xs leading-relaxed text-slate-500 dark:text-slate-400">
                                <div>
                                    <h4 className="font-bold text-slate-800 dark:text-slate-200 mb-1.5">The Washburn Capillary Equation</h4>
                                    <p className="mb-2">
                                        Hydration follows porous material capillary flow:
                                    </p>
                                    <div className="font-mono bg-slate-950/40 p-2.5 rounded-xl text-center text-amber-500 font-bold border border-white/5 text-sm">
                                        L² = (γ·D·t) / (4·η)
                                    </div>
                                    <p className="mt-2 text-[11px]">
                                        Where <strong className="text-slate-300">L</strong> is penetration distance, <strong className="text-slate-300">γ</strong> is surface tension, <strong className="text-slate-300">D</strong> is pore diameter, <strong className="text-slate-300">t</strong> is time, and <strong className="text-slate-300">η</strong> is liquid viscosity.
                                    </p>
                                </div>

                                <div>
                                    <h4 className="font-bold text-slate-800 dark:text-slate-200 mb-1.5">Dunk Master Guidelines</h4>
                                    <ul className="list-disc pl-4 space-y-1">
                                        <li>High sugar biscuits (like Bourbons) melt but have viscous cream centers that support structural shear.</li>
                                        <li>Earl Grey tea decreases capillary surface tension, accelerating hydration faster than milked Builders tea.</li>
                                        <li>Over-dunking deposits tiny sugary starches, making the liquid murkier but increasing tea sweetness.</li>
                                    </ul>
                                </div>

                                <div>
                                    <h4 className="font-bold text-slate-800 dark:text-slate-200 mb-1.5">Biscuit Material Chemistry</h4>
                                    <p>
                                        When hot tea penetrates the baked starch matrix, gluten threads holding biscuit grains collapse. Ginger Nuts contain highly dense crystalline sugar bonds that refuse structural solubility, while Rich Teas feature airy pocket voids that facilitate instanstaneous hydraulic failure.
                                    </p>
                                </div>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        // Render React Application
        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<TeaDunkabilitySimulator />);
    </script>
</body>
</html>
