                try {

                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    
                    if (type === 'water') {
                        // High-pitched droplet sound
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(550, ctx.currentTime);
                        osc.frequency.exponentialRampToValueAtTime(1300, ctx.currentTime + 0.12);
                        gain.gain.setValueAtTime(0.12, ctx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.12);
                        osc.start();
                        osc.stop(ctx.currentTime + 0.13);
                    } else if (type === 'success') {
                        // Arpeggio sound indicating goal hit
                        osc.type = 'triangle';
                        osc.frequency.setValueAtTime(523.25, ctx.currentTime); // C5
                        osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.08); // E5
                        osc.frequency.setValueAtTime(783.99, ctx.currentTime + 0.16); // G5
                        osc.frequency.setValueAtTime(1046.50, ctx.currentTime + 0.24); // C6

                        osc.stop(ctx.currentTime + 0.38);

                        osc.frequency.setValueAtTime(700, ctx.currentTime);
                        gain.gain.setValueAtTime(0.05, ctx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.04);
                        osc.start();
                        osc.stop(ctx.currentTime + 0.05);

                        // Low bass feedback for deletion
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(140, ctx.currentTime);
                        osc.frequency.linearRampToValueAtTime(45, ctx.currentTime + 0.14);

                        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);

                let bmr = 0;

                if (gender === 'Male') {

                const multipliers = {
                    sedentary: 1.2,
                    lightly_active: 1.375,
                    moderately_active: 1.55,
                    very_active: 1.725

                const tdee = bmr * (multipliers[activityLevel] || 1.2);

                                                    step="5"
                                                    value={foodPortion}
                                                    onChange={(e) => setFoodPortion(Number(e.target.value))}
                                                    className="flex-grow accent-emerald-500 cursor-pointer h-1.5 bg-slate-200 dark:bg-slate-800 rounded-lg appearance-none"
                                                />
                                                <input 
                                                    type="number" 
                                                    value={foodPortion}
                                                    onChange={(e) => setFoodPortion(Number(e.target.value))}
                                                    className="w-16 px-2 py-1 bg-white dark:bg-slate-850 border rounded-lg text-xs font-extrabold text-center text-slate-700 dark:text-slate-100 focus:outline-none"
                                                />
                                            </div>

                                            {/* Preview calculations totals */}
                                            <div className="grid grid-cols-4 gap-2 bg-white dark:bg-slate-800 p-3 rounded-xl border text-center text-xxs font-bold">
                                                <div>
                                                    <span className="text-slate-400 block mb-0.5">Calories</span>
                                                    <span className="text-slate-700 dark:text-slate-200 font-extrabold">
                                                        {Math.round(selectedFood.calories * (foodPortion / selectedFood.servingSize))} kcal
                                                    </span>
                                                </div>
                                                <div>
                                                    <span className="text-slate-400 block mb-0.5">Protein</span>
                                                    <span className="text-indigo-500 font-extrabold">
                                                        {(selectedFood.protein * (foodPortion / selectedFood.servingSize)).toFixed(1)}g
                                                    </span>
                                                </div>
                                                <div>
                                                    <span className="text-slate-400 block mb-0.5">Carbs</span>
                                                    <span className="text-amber-500 font-extrabold">
                                                        {(selectedFood.carbs * (foodPortion / selectedFood.servingSize)).toFixed(1)}g
                                                    </span>
                                                </div>
                                                <div>
                                                    <span className="text-slate-400 block mb-0.5">Fat</span>
                                                    <span className="text-rose-500 font-extrabold">
                                                        {(selectedFood.fat * (foodPortion / selectedFood.servingSize)).toFixed(1)}g
                                                    </span>
                                                </div>
                                            </div>

                                            <button 
                                                onClick={() => addFoodToMeal(selectedFood, foodPortion)}
                                                className="w-full py-2.5 bg-emerald-500 hover:bg-emerald-600 text-white text-xs font-extrabold rounded-xl shadow-xs hover:shadow-md transition active:scale-95"
                                            >
                                                Confirm Portions Log Food
                                            </button>
                                        </div>
                                    )}

                                </div>
                            </div>
                        )}

                    {/* App Footer Info bar */}
                    <footer className="mt-auto border-t border-slate-100 dark:border-slate-800/80 bg-white dark:bg-slate-900 py-4 px-4 text-center">
                        <div className="max-w-7xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-4 text-xxs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest">
                            <p>© 2026 Healthy Meal Tracker - Premium Wellness Suite</p>
                            <p className="flex items-center gap-1">
                                Crafted dynamically with <span className="text-rose-500 animate-pulse">❤️</span> for physical wellness
                            </p>
                        </div>
                    </footer>

                </div>
            );
        }

        // Mount React application into entry DOM element
        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
