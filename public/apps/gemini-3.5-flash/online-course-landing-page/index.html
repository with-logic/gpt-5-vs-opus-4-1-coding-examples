                                                        <span className="text-gray-700 dark:text-gray-300">${enrollingCourse.price}.00</span>
                                                    </div>
                                                    {couponApplied && (
                                                        <div className="flex items-center justify-between text-[11px] font-extrabold text-emerald-500">
                                                            <span>VIP Coupon Discount (20%):</span>
                                                            <span>-${Math.round(enrollingCourse.price * 0.2)}.00</span>
                                                        </div>
                                                    )}
                                                    <div className="h-[1px] bg-gray-200 dark:bg-academy-darkBorder my-1"></div>
                                                    <div className="flex items-center justify-between text-xs font-black">
                                                        <span className="text-gray-900 dark:text-white">Amount Charged:</span>
                                                        <span className="text-indigo-500">
                                                            ${couponApplied ? Math.round(enrollingCourse.price * 0.8) : enrollingCourse.price}.00
                                                        </span>
                                                    </div>
                                                </div>

                                                <div className="flex gap-2">
                                                    <button 
                                                        type="button"
                                                        onClick={() => setEnrollStep(2)}
                                                        className="flex-1 bg-gray-200 hover:bg-gray-300 dark:bg-gray-800 dark:hover:bg-gray-700 text-gray-600 dark:text-gray-300 text-xs font-extrabold py-3 rounded-2xl transition-all"
                                                    >
                                                        Go Back
                                                    </button>
                                                    <button 
                                                        type="submit"
                                                        disabled={isPayingSpinner}
                                                        className="flex-1 bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 text-white font-extrabold text-xs py-3 rounded-2xl shadow-lg shadow-indigo-600/25 transition-all text-center"
                                                    >
                                                        {isPayingSpinner ? (
                                                            <span className="flex items-center justify-center gap-1.5">
                                                                <i className="fa-solid fa-spinner animate-spin"></i> Authenticating...
                                                            </span>
                                                        ) : (
                                                            <span>Confirm & Register Securely</span>
                                                        )}
                                                    </button>
                                                </div>
                                            </form>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Footer Section */}
                    <footer className="bg-white dark:bg-academy-darkBg border-t border-gray-100 dark:border-academy-darkBorder text-gray-400 py-10 transition-colors duration-200 no-print">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 grid grid-cols-1 md:grid-cols-3 gap-8 text-xs font-semibold">
                            {/* Academic Bio */}
                            <div className="space-y-3">
                                <div className="flex items-center space-x-2">
                                    <div className="bg-gradient-to-tr from-indigo-500 to-pink-500 p-2 rounded-lg text-white">
                                        <i className="fa-solid fa-graduation-cap"></i>
                                    </div>
                                    <span className="text-md font-bold text-gray-900 dark:text-white tracking-wider">EduSphere Academy</span>
                                </div>
                                <p className="text-gray-500 dark:text-gray-400 leading-relaxed font-medium">
                                    The leading decentralized platform for industry-ready, project-centric education across code architectures, UX visual paradigms, digital product strategy, and scientific model implementations.
                                </p>
                            </div>

                            {/* Resource navigation */}
                            <div className="space-y-2">
                                <h4 className="text-gray-900 dark:text-white font-black uppercase tracking-widest mb-1.5">Explore Track Assets</h4>
                                <ul className="space-y-1.5 font-medium">
                                    <li><a href="#catalog-section" className="hover:text-indigo-500 transition-colors">Coding & Software Systems</a></li>
                                    <li><a href="#catalog-section" className="hover:text-indigo-500 transition-colors">Visual Design & Product Psychology</a></li>
                                    <li><a href="#catalog-section" className="hover:text-indigo-500 transition-colors">Digital Growth funnel Optimization</a></li>
                                    <li><a href="#catalog-section" className="hover:text-indigo-500 transition-colors">Product Strategy & Framework roadmaps</a></li>
                                </ul>
                            </div>

                            {/* Contact & credentials */}
                            <div className="space-y-3">
                                <h4 className="text-gray-900 dark:text-white font-black uppercase tracking-widest mb-1">Stay Tuned</h4>
                                <p className="text-gray-500 dark:text-gray-400 font-medium">Secure curriculum updates, discount coupons, and new expert listings.</p>
                                <form onSubmit={(e) => { e.preventDefault(); showToast("📬 Subscription success! Check inbox shortly.", "success"); e.target.reset(); }} className="flex gap-2">
                                    <input 
                                        type="email" 
                                        required
                                        placeholder="jane@example.com"
                                        className="bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-academy-darkBorder px-3.5 py-2.5 rounded-xl text-[10px] flex-1 focus:outline-none focus:ring-2 focus:ring-indigo-500" 
                                    />
                                    <button 
                                        type="submit"
                                        className="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-xl font-bold tracking-wide"
                                    >
                                        Subscribe
                                    </button>
                                </form>
                            </div>
                        </div>

                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 border-t border-gray-100 dark:border-academy-darkBorder mt-8 pt-6 flex flex-col sm:flex-row items-center justify-between gap-4 text-[10px] font-bold text-gray-500">
                            <p>© 2026 EduSphere Academy Inc. All credentials and syllabus copyrights verified globally.</p>
                            <div className="flex space-x-4">
                                <span className="hover:text-indigo-500 cursor-pointer">Security Protocol</span>
                                <span className="hover:text-indigo-500 cursor-pointer">Terms of License</span>
                                <span className="hover:text-indigo-500 cursor-pointer">Transcript Verification</span>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        // Render React App inside HTML element
        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
