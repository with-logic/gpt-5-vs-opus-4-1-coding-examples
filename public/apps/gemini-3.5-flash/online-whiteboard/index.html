        optionsDropdown.classList.toggle('hidden');
        if (!optionsDropdown.classList.contains('hidden')) {
          optionsDropdown.classList.remove('scale-95', 'opacity-0');
          optionsDropdown.classList.add('scale-100', 'opacity-100');
        }
      });

      // Hide dropdowns on screen click
      window.addEventListener('click', () => {
        optionsDropdown.classList.add('hidden', 'scale-95', 'opacity-0');
        gridDrop.classList.add('hidden');
      });

      // Clear Canvas modal trigger
      document.getElementById('clear-board-btn').addEventListener('click', () => {
        showConfirmationModal("Clear Current Board?", "This will delete all shapes drawn on the active board page.", () => {
          getCurrentPage().shapes = [];
          clearSelection();
          saveState();
          draw();
          showNotification("Board cleared successfully!", "success");
        });
      });

      // Multi page additions
      document.getElementById('add-page-btn').addEventListener('click', createNewPage);

      // JSON Board Save and Load
      document.getElementById('export-png-btn').addEventListener('click', exportBoardToPNG);
      document.getElementById('save-json-btn').addEventListener('click', saveBoardToJSON);
      
      const fileInput = document.getElementById('load-json-file');
      document.getElementById('load-json-trigger-btn').addEventListener('click', () => {
        fileInput.click();
      });
      fileInput.addEventListener('change', loadBoardFromJSON);

      // Realtime collab toggle
      document.getElementById('collab-toggle').addEventListener('click', toggleCollaborationSimulation);

      // Collab Chat toggler
      document.getElementById('chat-toggle-btn').addEventListener('click', toggleChatSidebar);
      document.getElementById('chat-close-btn').addEventListener('click', toggleChatSidebar);

      document.getElementById('chat-form').addEventListener('submit', handleUserChatSubmit);
    }

    // --- SELECTION INTERSECTION CALCULATOR ---
    function selectShapesInMarquee(start, current) {
      const page = getCurrentPage();
      
      const x1 = Math.min(start.x, current.x);
      const y1 = Math.min(start.y, current.y);
      const x2 = Math.max(start.x, current.x);
      const y2 = Math.max(start.y, current.y);
      
      const cBox1 = screenToCanvas(x1, y1);
      const cBox2 = screenToCanvas(x2, y2);
      
      selectedShapeIds.clear();
      
      page.shapes.forEach(s => {
        const box = getShapeCanvasBoundingBox(s);
        // If bounding box overlaps selection marquee
        const overlaps = !(box.x2 < cBox1.x || box.x1 > cBox2.x || box.y2 < cBox1.y || box.y1 > cBox2.y);
        if (overlaps) {
          selectedShapeIds.add(s.id);
        }
      });
      
      draw();
    }

    // --- SMOOTH ERASER INTERSECT CALCULATOR ---
    function eraseShapesAt(cx, cy) {
      const page = getCurrentPage();
      const initialCount = page.shapes.length;
      
      // Filter out shapes that overlap eraser cursor point
      page.shapes = page.shapes.filter(s => !hitTestShape(cx, cy, s));
      
      if (page.shapes.length !== initialCount) {
        saveState();
        draw();
      }
    }

    // --- UI VIEW UPDATE HELPERS ---
    function setTool(tool) {
      activeTool = tool;
      clearSelection();
      updateToolUI();
      
      canvas.style.cursor = tool === 'hand' ? 'grab' : 'crosshair';
      
      // Filter out or adapt styles panel default values depending on tool selection
      updateStylePanelUI();
      
      showNotification(`Tool: ${tool.toUpperCase()}`, "info");
    }

    function updateToolUI() {
      const buttons = document.querySelectorAll('.tool-btn');
      buttons.forEach(btn => {
        const btnTool = btn.getAttribute('data-tool');
        if (btnTool === activeTool) {
          btn.className = "tool-btn w-9 h-9 flex items-center justify-center rounded-xl bg-indigo-600 text-white shadow-md shadow-indigo-500/30 scale-105 transition-all duration-200";
        } else {
          btn.className = "tool-btn w-9 h-9 flex items-center justify-center rounded-xl text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition-all duration-200 active:scale-95";
        }
      });
    }

    function updateStylePanelUI() {
      const page = getCurrentPage();
      const hasSelection = selectedShapeIds.size > 0;
      
      // Update Context Indicator label
      const indicator = document.getElementById('context-indicator');
      const actionPanel = document.getElementById('selected-actions-panel');
      
      if (hasSelection) {
        indicator.innerText = "Selection";
        indicator.className = "text-[10px] bg-indigo-500 text-white px-1.5 py-0.5 rounded font-bold";
        actionPanel.classList.remove('hidden');
        
        // Populate sidebar defaults from first selected shape
        const firstId = Array.from(selectedShapeIds)[0];
        const s = page.shapes.find(shape => shape.id === firstId);
        if (s) {
          activeStrokeColor = s.strokeColor;
          activeFillColor = s.fillColor;
          activeStrokeWidth = s.strokeWidth;
          activeStrokeStyle = s.strokeStyle;
          activeOpacity = s.opacity;
          activeFontSize = s.fontSize;
          
          // Apply properties to sliding selectors
          document.getElementById('stroke-thickness-slider').value = activeStrokeWidth;
          document.getElementById('stroke-thickness-val').innerText = `${activeStrokeWidth} px`;
          
          document.getElementById('opacity-slider').value = Math.round(activeOpacity * 100);
          document.getElementById('opacity-val').innerText = `${Math.round(activeOpacity * 100)}%`;
          
          document.getElementById('text-size-slider').value = activeFontSize;
          document.getElementById('text-size-val').innerText = `${activeFontSize} px`;
          
          updateStrokeColorSelectionUI(activeStrokeColor);
          updateFillColorSelectionUI(activeFillColor);
          updateStrokeStyleSelectionUI(activeStrokeStyle);
        }
      } else {
        indicator.innerText = "Tool Defaults";
        indicator.className = "text-[10px] bg-slate-100 dark:bg-slate-800 text-slate-500 px-1.5 py-0.5 rounded font-bold";
        actionPanel.classList.add('hidden');
        
        // Show tool defaults
        document.getElementById('stroke-thickness-slider').value = activeStrokeWidth;
        document.getElementById('stroke-thickness-val').innerText = `${activeStrokeWidth} px`;
        
        document.getElementById('opacity-slider').value = Math.round(activeOpacity * 100);
        document.getElementById('opacity-val').innerText = `${Math.round(activeOpacity * 100)}%`;
        
        document.getElementById('text-size-slider').value = activeFontSize;
        document.getElementById('text-size-val').innerText = `${activeFontSize} px`;
        
        updateStrokeColorSelectionUI(activeStrokeColor);
        updateFillColorSelectionUI(activeFillColor);
        updateStrokeStyleSelectionUI(activeStrokeStyle);
      }
      
      // Show or hide text options if appropriate
      const textContainer = document.getElementById('text-size-container');
      const isTextTool = activeTool === 'text' || activeTool === 'sticky' || 
                        (hasSelection && Array.from(selectedShapeIds).some(id => {
                          const s = page.shapes.find(shape => shape.id === id);
                          return s && (s.type === 'text' || s.type === 'sticky');
                        }));
                        
      if (isTextTool) {
        textContainer.classList.remove('hidden');
      } else {
        textContainer.classList.add('hidden');
      }
    }

    function updateStrokeStyleSelectionUI(style) {
      const btns = document.querySelectorAll('.stroke-style-btn');
      btns.forEach(btn => {
        if (btn.getAttribute('data-val') === style) {
          btn.className = "stroke-style-btn py-1 px-2.5 text-xs font-bold rounded-lg bg-indigo-600 text-white border-transparent transition";
        } else {
          btn.className = "stroke-style-btn py-1 px-2.5 text-xs font-semibold rounded-lg border border-slate-200 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-850 text-slate-600 dark:text-slate-400 transition";
        }
      });
    }

    function updateGridStyleSelectionUI() {
      const btns = document.querySelectorAll('.grid-style-btn');
      btns.forEach(btn => {
        if (btn.getAttribute('data-grid') === gridStyle) {
          btn.className = "grid-style-btn px-2 py-1 text-[10px] font-black uppercase rounded bg-indigo-600 text-white";
        } else {
          btn.className = "grid-style-btn px-2 py-1 text-[10px] font-bold uppercase rounded text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800";
        }
      });
    }

    function updateZoomDisplay() {
      document.getElementById('zoom-percentage-text').innerText = `${Math.round(zoom * 100)}%`;
    }

    // --- MULTIPLAYER REALTIME CURSORS DOM RENDERING ---
    function updateRemoteCursorsDOM() {
      const container = document.getElementById('remote-cursors-container');
      
      collabUsers.forEach(user => {
        if (!user.active) {
          const el = document.getElementById(user.id);
          if (el) container.removeChild(el);
          return;
        }
        
        let cursorEl = document.getElementById(user.id);
        if (!cursorEl) {
          cursorEl = document.createElement('div');
          cursorEl.id = user.id;
          cursorEl.className = 'remote-cursor flex flex-col items-start';
          cursorEl.innerHTML = `
            <svg class="w-6 h-6 transform -rotate-45" viewBox="0 0 24 24" fill="${user.color}" stroke="white" stroke-width="2">
              <path d="M5.65 19.65l3.54-3.54-3.54-3.54a1 1 0 011.42-1.42l3.54 3.54 3.54-3.54a1 1 0 011.42 1.42L12.5 16.1l3.54 3.54a1 1 0 01-1.42 1.42l-3.54-3.54-3.54 3.54a1 1 0 01-1.42-1.42z" class="hidden"></path>
              <polygon points="4,4 4,21 10,15 19,15"></polygon>
            </svg>
            <div class="px-2 py-0.5 rounded-md text-[10px] font-bold text-white shadow-lg whitespace-nowrap mt-1 leading-none transition" style="background-color: ${user.color}">
              ${user.name}
            </div>
          `;
          container.appendChild(cursorEl);
        }
        
        // Convert canvas positions to screen positions dynamically
        const scrPt = canvasToScreen(user.x, user.y);
        cursorEl.style.left = `${scrPt.x}px`;
        cursorEl.style.top = `${scrPt.y}px`;
      });
    }

    function removeAllRemoteCursorsDOM() {
      document.getElementById('remote-cursors-container').innerHTML = '';
      document.getElementById('speech-bubbles-container').innerHTML = '';
    }

    // Speech bubble UI popups
    function showSpeechBubble(user, text) {
      const container = document.getElementById('speech-bubbles-container');
      const bubbleId = `bubble-${user.id}`;
      
      let el = document.getElementById(bubbleId);
      if (el) {
        if (el.parentNode) container.removeChild(el);
      }
      
      el = document.createElement('div');
      el.id = bubbleId;
      el.className = "speech-bubble px-3 py-2 rounded-xl text-xs font-semibold text-slate-800 bg-white border shadow-2xl z-40 max-w-xs break-words";
      el.style.borderLeftColor = user.color;
      el.style.borderLeftWidth = '4px';
      el.innerText = text;
      
      container.appendChild(el);
      
      // Keep track of bubble movements over cursor frames
      function positionBubble() {
        if (!collabActive) {
          if (el.parentNode) container.removeChild(el);
          return;
        }
        const scr = canvasToScreen(user.x, user.y);
        el.style.left = `${scr.x}px`;
        el.style.top = `${scr.y - 12}px`;
        
        if (document.getElementById(bubbleId)) {
          requestAnimationFrame(positionBubble);
        }
      }
      
      requestAnimationFrame(positionBubble);
      
      if (user.speechTimeout) clearTimeout(user.speechTimeout);
      user.speechTimeout = setTimeout(() => {
        if (el.parentNode) container.removeChild(el);
      }, 4000);
    }

    // --- EXPORT TO PNG WORKFLOW ---
    function exportBoardToPNG() {
      const page = getCurrentPage();
      if (page.shapes.length === 0) {
        showNotification("Cannot export empty board", "error");
        return;
      }
      
      showNotification("Generating PNG render... please wait", "info");
      
      // Calculate export bounding box covering all elements
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      page.shapes.forEach(s => {
        const b = getShapeCanvasBoundingBox(s);
        if (b.x1 < minX) minX = b.x1;
        if (b.y1 < minY) minY = b.y1;
        if (b.x2 > maxX) maxX = b.x2;
        if (b.y2 > maxY) maxY = b.y2;
      });
      
      // Add padding
      const pad = 40;
      minX -= pad;
      minY -= pad;
      maxX += pad;
      maxY += pad;
      
      const exportW = maxX - minX;
      const exportH = maxY - minY;
      
      // Create off-screen canvas for rendering
      const offCanvas = document.createElement('canvas');
      const offCtx = offCanvas.getContext('2d');
      
      const dpr = window.devicePixelRatio || 2;
      offCanvas.width = exportW * dpr;
      offCanvas.height = exportH * dpr;
      offCtx.scale(dpr, dpr);
      
      // Paint background
      offCtx.fillStyle = currentTheme === 'dark' ? '#0f172a' : '#ffffff'; // Use pure white for clean light exports
      offCtx.fillRect(0, 0, exportW, exportH);
      
      // Optional background Grid drawn in off-screen
      if (gridStyle !== 'none') {
        offCtx.save();
        offCtx.strokeStyle = currentTheme === 'dark' ? '#1e293b' : '#f1f5f9';
        offCtx.lineWidth = 1;
        
        const step = 50;
        const gridStartX = Math.floor(minX / step) * step;
        const gridStartY = Math.floor(minY / step) * step;
        
        for (let gx = gridStartX; gx <= maxX; gx += step) {
          offCtx.beginPath();
          offCtx.moveTo(gx - minX, 0);
          offCtx.lineTo(gx - minX, exportH);
          offCtx.stroke();
        }
        for (let gy = gridStartY; gy <= maxY; gy += step) {
          offCtx.beginPath();
          offCtx.moveTo(0, gy - minY);
          offCtx.lineTo(exportW, gy - minY);
          offCtx.stroke();
        }
        offCtx.restore();
      }
      
      // Draw all shapes translated to export box origin
      offCtx.save();
      offCtx.translate(-minX, -minY);
      
      page.shapes.forEach(s => {
        if (!s.isEditing) {
          drawShape(s, offCtx);
        }
      });
      
      // Create download anchor trigger
      const link = document.createElement('a');
      link.download = `${page.name.toLowerCase().replace(/\s+/g, '-')}-export.png`;
      link.href = offCanvas.toDataURL('image/png');
      link.click();
      
      showNotification("Board exported successfully!", "success");
    }

    // --- LOCAL BOARD STATE EXPORTS (JSON) ---
    function saveBoardToJSON() {
      const payload = {
        app: "Online Whiteboard",
        version: "2.0",
        pages: pages,
        currentPageId: currentPageId,
        theme: currentTheme,
        gridStyle: gridStyle
      };
      
      const serialized = JSON.stringify(payload, null, 2);
      const dataUri = 'data:application/json;charset=utf-8,' + encodeURIComponent(serialized);
      
      const file = `whiteboard-board-${new Date().toISOString().slice(0, 10)}.json`;
      const anchor = document.createElement('a');
      anchor.setAttribute('href', dataUri);
      anchor.setAttribute('download', file);
      anchor.click();
      
      showNotification("Board saved as JSON", "success");
    }

    function loadBoardFromJSON(e) {
      const file = e.target.files[0];
      if (!file) return;
      
      const reader = new FileReader();
      reader.onload = (event) => {
        try {
          const payload = JSON.parse(event.target.result);
          if (payload.pages && Array.isArray(payload.pages)) {
            pages = payload.pages;
            currentPageId = payload.currentPageId || payload.pages[0].id;
            
            // Re-initialize undo lists
            pages.forEach(p => {
              historyManager[p.id] = { undo: [JSON.parse(JSON.stringify(p.shapes))], redo: [] };
            });
            
            if (payload.theme) setTheme(payload.theme);
            if (payload.gridStyle) {
              gridStyle = payload.gridStyle;
              updateGridStyleSelectionUI();
            }
            
            clearSelection();
            renderPageList();
            draw();
            showNotification("Whiteboard loaded successfully!", "success");
          } else {
            showNotification("Invalid whiteboard JSON schema", "error");
          }
        } catch (err) {
          showNotification("Error parsing backup JSON file", "error");
        }
      };
      reader.readAsText(file);
    }

    // --- DYNAMIC COLLABORATION SIMULATION ACTIONS ---
    function toggleCollaborationSimulation() {
      collabActive = !collabActive;
      
      const collabToggle = document.getElementById('collab-toggle');
      const collabPing = document.getElementById('collab-ping');
      const collabDot = document.getElementById('collab-dot');
      const collabStatus = document.getElementById('collab-status-text');
      const chatSidebar = document.getElementById('chat-sidebar');
      const collabAvatars = document.getElementById('collab-avatars');
      
      if (collabActive) {
        collabToggle.classList.remove('bg-white', 'text-slate-700', 'border-slate-200');
        collabToggle.classList.add('bg-indigo-50', 'text-indigo-600', 'border-indigo-200', 'dark:bg-indigo-950/40', 'dark:border-indigo-900', 'dark:text-indigo-400');
        collabPing.classList.add('animate-ping', 'bg-emerald-400');
        collabDot.className = "relative inline-flex rounded-full h-2 w-2 bg-emerald-500";
        collabStatus.innerText = "Simulation Active";
        
        // Show active avatars in headers
        collabAvatars.classList.remove('hidden');
        renderAvatarsDOM();
        
        // Trigger simulated actions loop
        collabTimer = setInterval(tickCollaborationSimulation, 4500);
        
        // Injected greetings
        setTimeout(() => {
          triggerBotInteraction(collabUsers[0], "Hey team! Beautiful day to design some layouts!");
        }, 800);
        
        showNotification("Collaboration Simulator Enabled! Check chat panel.", "success");
      } else {
        collabToggle.classList.add('bg-white', 'text-slate-700', 'border-slate-200');
        collabToggle.classList.remove('bg-indigo-50', 'text-indigo-600', 'border-indigo-200', 'dark:bg-indigo-950/40', 'dark:border-indigo-900', 'dark:text-indigo-400');
        collabPing.classList.remove('animate-ping', 'bg-emerald-400');
        collabDot.className = "relative inline-flex rounded-full h-2 w-2 bg-slate-400";
        collabStatus.innerText = "Simulate Team";
        
        collabAvatars.classList.add('hidden');
        clearInterval(collabTimer);
        collabTimer = null;
        
        removeAllRemoteCursorsDOM();
        draw();
        
        showNotification("Collaboration Simulator Disabled", "info");
      }
    }

    function renderAvatarsDOM() {
      const container = document.getElementById('collab-avatars');
      container.innerHTML = '';
      collabUsers.forEach(u => {
        const el = document.createElement('div');
        el.className = `w-7 h-7 rounded-full border-2 border-white dark:border-slate-900 flex items-center justify-center text-[10px] font-black text-white shadow shadow-black/20`;
        el.style.backgroundColor = u.color;
        el.innerText = u.initials;
        el.title = u.name;
        container.appendChild(el);
      });
    }

    function tickCollaborationSimulation() {
      // Pick random bot user to perform action
      const user = collabUsers[Math.floor(Math.random() * collabUsers.length)];
      if (user.isDrawing) return;
      
      const actions = ['move', 'rect', 'circle', 'sticky', 'text', 'line', 'arrow', 'chat'];
      const action = actions[Math.floor(Math.random() * actions.length)];
      
      // Target random coordinate closer to board centers
      const scrollCenter = screenToCanvas(width/2, height/2);
      const targetPt = {
        x: scrollCenter.x + (Math.random() * 450 - 225),
        y: scrollCenter.y + (Math.random() * 350 - 175)
      };
      
      user.targetX = targetPt.x;
      user.targetY = targetPt.y;
      
      if (action === 'move') {
        // Just move cursors around
        return;
      }
      
      // Delay action drawing until cursor smoothly reaches position
      setTimeout(() => {
        if (!collabActive) return;
        
        if (action === 'chat') {
          const texts = {
            'user-aria': [
              "Let's look at the layout on Board 1",
              "Maybe we can add another sticky card",
              "This color theme feels incredibly modern!",
              "Does the alignment look proper to you?"
            ],
            'user-leo': [
              "Drawing components using vector layers is so quick.",
              "The speed of this canvas zoom engine is impressive.",
              "I am checking standard database models.",
              "Let's export this canvas as high resolution PNG to slack."
            ],
            'user-marcus': [
              "I'm scheduling user testing sessions this Friday.",
              "Let's place our core priorities in pastel boxes.",
              "Amazing canvas drawing controls!",
              "Could we change the grid background style to Dot grids?"
            ]
          };
          const textList = texts[user.id];
          const text = textList[Math.floor(Math.random() * textList.length)];
          triggerBotInteraction(user, text);
        } else {
          // Trigger drawing shapes on canvas
          drawShapeSimulated(user, action);
        }
      }, 1000);
    }

    function drawShapeSimulated(user, type) {
      user.isDrawing = true;
      const page = getCurrentPage();
      
      const strokeClr = user.color;
      const fillClr = type === 'rect' || type === 'circle' ? user.color + '1a' : 'transparent';
      
      const s = new Shape(type, user.x, user.y, {
        strokeColor: strokeClr,
        fillColor: fillClr,
        strokeWidth: 2
      });
      
      page.shapes.push(s);
      
      let stepCount = 0;
      const totalSteps = 15;
      
      let targetW = Math.random() * 120 + 60;
      let targetH = Math.random() * 100 + 60;
      
      if (type === 'sticky') {
        const botComments = {
          'user-aria': [
            "Review UI Flows\n- Add User Profile\n- Fix sidebar alignments",
            "Design feedback:\n- Margins look crisp\n- Increase hero sizing",
            "Color ideas:\n- Pastel gradients\n- Slate border shadows"
          ],
          'user-leo': [
            "Tech Specs\n- Client-side storage\n- Export PNG high DPI\n- Clean imports",
            "Database Schema\n- Whiteboard table\n- Shape layers array\n- Page collections"
          ],
          'user-marcus': [
            "MVP Priorities\n- High fidelity drawing\n- Drag and resize shapes\n- Save backups"
          ]
        };
        const commentList = botComments[user.id] || ["Mock task"];
        s.text = commentList[Math.floor(Math.random() * commentList.length)];
        s.fontSize = 12;
        s.fillColor = user.id === 'user-aria' ? '#fbcfe8' : user.id === 'user-leo' ? '#bfdbfe' : '#fed7aa'; // Pastel colors
        targetW = 150;
        targetH = 150;
      } else if (type === 'text') {
        s.text = user.id === 'user-aria' ? "Aria's Layout Sketches" : user.id === 'user-leo' ? "Leo's Component Blocks" : "Marcus's Priorities";
        s.fontSize = 15;
        targetW = 200;
        targetH = 40;
      }
      
      const drawTimer = setInterval(() => {
        if (!collabActive) {
          clearInterval(drawTimer);
          return;
        }
        
        stepCount++;
        const factor = stepCount / totalSteps;
        
        s.x2 = s.x1 + targetW * factor;
        s.y2 = s.y1 + targetH * factor;
        
        // Move remote cursor following shape bounds
        user.x = s.x2;
        user.y = s.y2;
        user.targetX = s.x2;
        user.targetY = s.y2;
        
        draw();
        
        if (stepCount >= totalSteps) {
          clearInterval(drawTimer);
          user.isDrawing = false;
          saveState();
          
          if (type === 'sticky') {
            triggerBotInteraction(user, `I dropped a sticky card on the workspace: "${s.text.split('\n')[0]}..."`);
          }
        }
      }, 45);
    }

    // Append speech and append messages into chat Side panel
    function triggerBotInteraction(user, text) {
      showSpeechBubble(user, text);
      appendChatMessage(user.name, text, user.color);
    }

    // --- CHAT DOM APPENDS ---
    function appendChatMessage(sender, text, color) {
      const feed = document.getElementById('chat-messages');
      const el = document.createElement('div');
      el.className = "flex flex-col bg-slate-50 dark:bg-slate-950 p-2.5 rounded-xl border border-slate-100 dark:border-slate-850 transform translate-y-2 opacity-0 transition-all duration-300";
      
      const initials = sender.split(' ').map(n => n[0]).join('').substr(0, 2);
      
      el.innerHTML = `
        <div class="flex items-center gap-1.5 mb-1">
          <div class="w-5 h-5 rounded-full flex items-center justify-center text-[8px] font-black text-white shadow-sm" style="background-color: ${color}">
            ${initials}
          </div>
          <span class="font-bold text-[10px] text-slate-500">${sender}</span>
        </div>
        <p class="text-slate-700 dark:text-slate-300 font-medium leading-relaxed pl-1">${text}</p>
      `;
      
      feed.appendChild(el);
      
      // Trigger animations
      setTimeout(() => {
        el.classList.remove('translate-y-2', 'opacity-0');
      }, 10);
      
      // Scroll to bottom
      feed.scrollTop = feed.scrollHeight;
      
      // Glow/Unread indicators
      if (document.getElementById('chat-sidebar').classList.contains('hidden')) {
        const badge = document.getElementById('chat-badge');
        badge.classList.remove('hidden');
      }
    }

    function toggleChatSidebar() {
      const sidebar = document.getElementById('chat-sidebar');
      const badge = document.getElementById('chat-badge');
      
      sidebar.classList.toggle('hidden');
      if (!sidebar.classList.contains('hidden')) {
        badge.classList.add('hidden');
        sidebar.classList.remove('opacity-0', 'translate-y-4');
        sidebar.classList.add('opacity-100', 'translate-y-0');
      }
    }

    function handleUserChatSubmit(e) {
      e.preventDefault();
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text) return;
      
      appendChatMessage("You", text, "#6366f1");
      input.value = '';
      
      // Auto reply trigger based on text query parsing
      if (collabActive) {
        setTimeout(() => {
          triggerBotReactionToUser(text);
        }, 1500);
      }
    }

    function triggerBotReactionToUser(msg) {
      const bot = collabUsers[Math.floor(Math.random() * collabUsers.length)];
      const query = msg.toLowerCase();
      
      let reply = "That sounds super clean! Let's build a concept diagram right here.";
      
      if (query.includes('circle') || query.includes('round')) {
        reply = "I agree! Let me draw a quick circle element.";
        triggerBotInteraction(bot, reply);
        setTimeout(() => drawShapeSimulated(bot, 'circle'), 1200);
      } else if (query.includes('rect') || query.includes('square') || query.includes('box')) {
        reply = "Perfect. Dragging out a nice rectangular block block now.";
        triggerBotInteraction(bot, reply);
        setTimeout(() => drawShapeSimulated(bot, 'rect'), 1200);
      } else if (query.includes('sticky') || query.includes('card') || query.includes('note')) {
        reply = "Good thinking! Let's drop a yellow sticky note here.";
        triggerBotInteraction(bot, reply);
        setTimeout(() => drawShapeSimulated(bot, 'sticky'), 1200);
      } else if (query.includes('clear') || query.includes('delete') || query.includes('trash')) {
        reply = "Wait, let's keep the core ideas on the board first!";
        triggerBotInteraction(bot, reply);
      } else if (query.includes('zoom') || query.includes('pan') || query.includes('scale')) {
        reply = "The zoom makes panning on high resolutions so easy.";
        triggerBotInteraction(bot, reply);
      } else {
        const genericReplies = [
          "I think that fits our design constraints perfectly.",
          "Good catch! Let's check Board page 1 to verify.",
          "Awesome. Marcus, what's your priority on this checklist?",
          "Sketching that out would make it much easier to discuss.",
          "Agreed! I will add a sticky block later to verify that model."
        ];
        reply = genericReplies[Math.floor(Math.random() * genericReplies.length)];
        triggerBotInteraction(bot, reply);
      }
    }

    // --- INTERACTION HELPER UTILITIES ---
    function getPointersDistance() {
      const pts = Array.from(activePointers.values());
      if (pts.length < 2) return 0;
      return Math.hypot(pts[0].current.x - pts[1].current.x, pts[0].current.y - pts[1].current.y);
    }

    function getPointersCenter() {
      const pts = Array.from(activePointers.values());
      if (pts.length < 2) return { x: 0, y: 0 };
      return {
        x: (pts[0].current.x + pts[1].current.x) / 2,
        y: (pts[0].current.y + pts[1].current.y) / 2
      };
    }

    // System Alert modal drawer
    let modalActionCallback = null;
    function showConfirmationModal(title, desc, onConfirm) {
      document.getElementById('modal-title').innerText = title;
      document.getElementById('modal-desc').innerText = desc;
      modalActionCallback = onConfirm;
      
      const overlay = document.getElementById('modal-overlay');
      overlay.classList.remove('hidden');
    }

    document.getElementById('modal-cancel-btn').addEventListener('click', () => {
      document.getElementById('modal-overlay').classList.add('hidden');
      modalActionCallback = null;
    });

    document.getElementById('modal-confirm-btn').addEventListener('click', () => {
      if (modalActionCallback) modalActionCallback();
      document.getElementById('modal-overlay').classList.add('hidden');
      modalActionCallback = null;
    });

    // Elegant custom notification banner triggers
    function showNotification(msg, type = 'info') {
      const container = document.getElementById('notification-container');
      const notification = document.createElement('div');
      
      let baseStyle = "flex items-center gap-2 px-3 py-2 rounded-xl text-xs font-bold border shadow-xl backdrop-blur-md transform translate-y-4 opacity-0 transition duration-300 pointer-events-auto ";
      
      if (type === 'success') {
        baseStyle += "bg-emerald-500/90 border-emerald-400 text-white";
      } else if (type === 'error') {
        baseStyle += "bg-rose-500/90 border-rose-400 text-white";
      } else {
        baseStyle += "bg-slate-800/95 border-slate-700 text-slate-100 dark:bg-slate-900/95";
      }
      
      notification.className = baseStyle;
      
      let icon = '<i data-lucide="info" class="w-3.5 h-3.5"></i>';
      if (type === 'success') icon = '<i data-lucide="check" class="w-3.5 h-3.5"></i>';
      if (type === 'error') icon = '<i data-lucide="alert-circle" class="w-3.5 h-3.5"></i>';
      
      notification.innerHTML = `${icon}<span>${msg}</span>`;
      container.appendChild(notification);
      lucide.createIcons();
      
      setTimeout(() => {
        notification.classList.remove('translate-y-4', 'opacity-0');
      }, 10);
      
      setTimeout(() => {
        notification.classList.add('opacity-0', '-translate-y-2');
        setTimeout(() => {
          if (notification.parentNode) container.removeChild(notification);
        }, 300);
      }, 3500);
    }
  </script>
