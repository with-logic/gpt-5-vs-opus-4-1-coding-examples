    // --- PROCEDURAL WEB AUDIO SYNTHESIZER ENGINE ---
    class GenerativeSynth {
      constructor() {
        this.ctx = null;
        this.masterGain = null;
        this.filter = null;
        this.activeNodes = [];
        this.isPlaying = false;
        this.timerId = null;
        this.track = 0; // 0: Cozy Guitar, 1: Lofi Chords, 2: Celestial Pads
        this.tempo = 4500;
      }

      init() {
        if (this.ctx) return;
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        this.ctx = new AudioContextClass();
        
        this.filter = this.ctx.createBiquadFilter();
        this.filter.type = 'lowpass';
        this.filter.frequency.value = 750; // Dreamy lowpass cut
        
        this.masterGain = this.ctx.createGain();
        this.masterGain.gain.value = 0.04; // Gentle background level
        
        this.filter.connect(this.masterGain);
        this.masterGain.connect(this.ctx.destination);
      }

      setVolume(vol) {
        if (this.masterGain && this.ctx) {
          this.masterGain.gain.linearRampToValueAtTime(vol * 0.08, this.ctx.currentTime + 0.15);
        }
      }

      setTrack(index) {
        this.track = index;
        if (this.track === 0) {
          this.tempo = 4500;
          if (this.filter) this.filter.frequency.setValueAtTime(800, this.ctx.currentTime);
        } else if (this.track === 1) {
          this.tempo = 4000;
          if (this.filter) this.filter.frequency.setValueAtTime(550, this.ctx.currentTime);
        } else {
          this.tempo = 6000;
          if (this.filter) this.filter.frequency.setValueAtTime(1050, this.ctx.currentTime);
        }
      }

      start() {
        this.init();
        if (this.isPlaying) return;
        this.isPlaying = true;
        if (this.ctx.state === 'suspended') {
          this.ctx.resume();
        }
        this.playLoop();
      }

      stop() {
        this.isPlaying = false;
        if (this.timerId) {
          clearTimeout(this.timerId);
          this.timerId = null;
        }
        this.activeNodes.forEach(n => {
          try { n.stop(); } catch(e){}
        });
        this.activeNodes = [];
      }

      playLoop() {
        if (!this.isPlaying) return;

        // Custom Sound Progressions
        const progressions = [
          // Track 0: Cozy Acoustic Sunset (Warm acoustic-like sine plucks)
          [
            [261.63, 329.63, 392.00, 493.88, 587.33], // Cmaj9
            [349.23, 440.00, 523.25, 659.25, 783.99], // Fmaj7
            [392.00, 493.88, 587.33, 659.25, 880.00], // G6/A
            [440.00, 523.25, 587.33, 659.25, 783.99]  // Am7
          ],
          // Track 1: Midnight Lofi Coffee (Soft, deep filter-swept chords with low bass notes)
          [
            [293.66, 349.23, 440.00, 493.88, 587.33], // Dm9
            [392.00, 440.00, 493.88, 659.25, 783.99], // G13
            [261.63, 329.63, 392.00, 493.88, 587.33], // Cmaj9
            [440.00, 554.37, 659.25, 783.99, 932.33]  // A7alt
          ],
          // Track 2: Celestial Space Pads (Sustained, slow-swelling ethereal drone sound)
          [
            [349.23, 440.00, 523.25, 659.25, 880.00], // Fmaj9
            [329.63, 392.00, 493.88, 587.33, 739.99], // Em7
            [293.66, 349.23, 440.00, 587.33, 698.46], // Dm9
            [392.00, 440.00, 523.25, 587.33, 698.46]  // G7sus4
          ]
        ];

        const prog = progressions[this.track];
        const chordIndex = Math.floor((Date.now() / this.tempo) % prog.length);
        const chord = prog[chordIndex];

        const playNode = (freq, delay, duration, isPad) => {
          if (!this.ctx || !this.isPlaying) return;
          
          const osc = this.ctx.createOscillator();
          const gainNode = this.ctx.createGain();
          
          osc.type = isPad ? 'triangle' : 'sine';
          osc.frequency.value = freq;
          
          gainNode.gain.setValueAtTime(0, this.ctx.currentTime + delay);
          if (isPad) {
            // Ethereal slow volume swell and long fade
            gainNode.gain.linearRampToValueAtTime(0.035, this.ctx.currentTime + delay + duration * 0.45);
            gainNode.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + delay + duration);
          } else {
            // Smooth bell pluck
            gainNode.gain.linearRampToValueAtTime(0.065, this.ctx.currentTime + delay + 0.08);
            gainNode.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + delay + duration);
          }
          
          osc.connect(gainNode);
          gainNode.connect(this.filter);
          
          osc.start(this.ctx.currentTime + delay);
          osc.stop(this.ctx.currentTime + delay + duration);
          
          this.activeNodes.push(osc);
          
          setTimeout(() => {
            this.activeNodes = this.activeNodes.filter(n => n !== osc);
          }, (delay + duration + 1) * 1000);
        };

        if (this.track === 2) {
          // Play all chord tones at once with lush slow envelopes
          chord.forEach((freq, idx) => {
            playNode(freq, idx * 0.05, 5.5, true);
          });
          // Sparkle tone occasionally
          if (Math.random() > 0.3) {
            playNode(chord[Math.floor(Math.random() * chord.length)] * 2, 2.5, 3.0, false);
          }
        } else if (this.track === 1) {
          // Play notes with soft lofi offset delays
          chord.forEach((freq, idx) => {
            const offset = idx * 0.35 + (Math.random() * 0.03);
            playNode(freq, offset, 3.2, false);
          });
          // Deep cozy bass root
          playNode(chord[0] / 2, 0.1, 3.8, true);
        } else {
          // Classic beautiful guitar plucking
          chord.forEach((freq, idx) => {
            const offset = idx * 0.22;
            playNode(freq, offset, 2.8, false);
          });
          // Play an accidental high bell note
          if (Math.random() > 0.5) {
            const highNote = chord[Math.floor(Math.random() * chord.length)] * 2;
            playNode(highNote, 1.2, 1.8, false);
          }
        }

        this.timerId = setTimeout(() => this.playLoop(), this.tempo);
      }
    }

        }
      };

      const handleTrackChange = (trackIdx) => {
        setActiveTrack(trackIdx);
        audioSynth.setTrack(trackIdx);
        if (!isMusicPlaying) {
          audioSynth.start();
          setIsMusicPlaying(true);
        }
      };

      const handleVolumeChange = (e) => {
        const vol = parseFloat(e.target.value);
        setMusicVolume(vol);
        audioSynth.setVolume(vol);
      };

      // Sparkle Confetti (Using library Canvas-confetti)
      const fireCelebration = () => {
        confetti({
          particleCount: 120,
          spread: 80,
          origin: { y: 0.6 },
          colors: ['#e1b382', '#d29153', '#bf7437', '#9f5629', '#f5e6d3']
        });
      };

      // Custom Floating Reaction Particles on element click
      const spawnReactionParticle = (e, emoji) => {
        const buttonRect = e.currentTarget.getBoundingClientRect();
        const bodyRect = document.body.getBoundingClientRect();
        
        // Calculate absolute position on page
        const x = buttonRect.left - bodyRect.left + (buttonRect.width / 2) + (Math.random() * 20 - 10);
        const y = buttonRect.top - bodyRect.top + (Math.random() * 10 - 5);
        
        const particle = document.createElement('div');
        particle.className = 'particle-emoji text-2xl';
        particle.style.left = `${x}px`;
        particle.style.top = `${y}px`;
        particle.innerText = emoji;
        
        document.body.appendChild(particle);
        
        // Cleanup particle after animation
        setTimeout(() => {
          particle.remove();
        }, 1000);
      };

      // Filter and Sort Messages
      const filteredAndSortedMessages = useMemo(() => {
        let result = [...messages];

        // 1. Text Search
        if (searchQuery.trim()) {
          const query = searchQuery.toLowerCase();
          result = result.filter(m => 
            m.author.toLowerCase().includes(query) ||
            m.role.toLowerCase().includes(query) ||
            m.message.toLowerCase().includes(query) ||
            m.category.toLowerCase().includes(query)
          );
        }

        // 2. Category Filter
        if (activeFilter !== "All") {
          result = result.filter(m => m.category === activeFilter);
        }

        // 3. Sorting Options
        if (sortOption === "newest") {
          result.sort((a, b) => b.id - a.id);
        } else if (sortOption === "oldest") {
          result.sort((a, b) => a.id - b.id);
        } else if (sortOption === "reactions") {
          const sumReactions = (m) => Object.values(m.reactions).reduce((sum, val) => sum + val, 0);
          result.sort((a, b) => sumReactions(b) - sumReactions(a));
        }

        return result;
      }, [messages, activeFilter, searchQuery, sortOption]);

      // Calculate Board Stats
      const boardStats = useMemo(() => {
        const total = messages.length;
        let totalReacts = 0;
        const categories = { Gratitude: 0, Memories: 0, Wishes: 0, Humor: 0 };
        
        messages.forEach(m => {
          totalReacts += Object.values(m.reactions).reduce((sum, val) => sum + val, 0);
          if (categories[m.category] !== undefined) {
            categories[m.category]++;
          }
        });

        return { total, totalReacts, categories };
      }, [messages]);

      // Handle Adding Reaction to Card
      const handleReaction = (cardId, type, e) => {
        // Find reaction emoji
        let emoji = "❤️";
        if (type === 'hug') emoji = "🤗";
        if (type === 'sparkle') emoji = "✨";
        if (type === 'coffee') emoji = "☕";

        spawnReactionParticle(e, emoji);

        setMessages(prev => prev.map(m => {
          if (m.id === cardId) {
            return {
              ...m,
              reactions: {
                ...m.reactions,
                [type]: m.reactions[type] + 1
              }
            };
          }
          return m;
        }));

        // If card is opened in modal, update that as well
        if (selectedCard && selectedCard.id === cardId) {
          setSelectedCard(prev => ({
            ...prev,
            reactions: {
              ...prev.reactions,
              [type]: prev.reactions[type] + 1
            }
          }));
        }
      };

      // Form submission
      const handleSubmitMessage = (e) => {
        e.preventDefault();
        
        if (!formName.trim() || !formText.trim()) {
          alert("Please fill out your name and write a message!");
          return;
        }

        const newMessage = {
          id: Date.now(),
          author: formName,
          role: formRole.trim() || "Teammate",
          avatar: currentUser.id !== "guest" ? currentUser.avatar : "📝",
          category: formCategory,
          date: new Date().toLocaleDateString("en-US", { month: 'short', day: 'numeric', year: 'numeric' }),
          image: formImageUrl,
          message: formText,
          reactions: { heart: 0, hug: 0, sparkle: 0, coffee: 0 },
          rotation: (Math.random() * 3 - 1.5), // Tilt angle between -1.5 and 1.5 deg
          comments: []
        };

        setMessages(prev => [newMessage, ...prev]);
        setIsWriteModalOpen(false);
        
        // Reset inputs
        setFormText("");
        if (currentUser.id === "guest") {
          setFormName("");
          setFormRole("");
        }

        // Celebrate!
        fireCelebration();
        // Soft synth chime trigger on success
        if (isMusicPlaying) {
          audioSynth.setVolume(musicVolume);
          // Play ascending notes
          setTimeout(() => { if(audioSynth.ctx) {
            const osc = audioSynth.ctx.createOscillator();
            const gain = audioSynth.ctx.createGain();
            osc.frequency.value = 523.25; // C5
            gain.gain.setValueAtTime(0.04, audioSynth.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioSynth.ctx.currentTime + 0.8);
            osc.connect(gain); gain.connect(audioSynth.filter);
            osc.start(); osc.stop(audioSynth.ctx.currentTime + 0.8);
          }}, 100);
          setTimeout(() => { if(audioSynth.ctx) {
            const osc = audioSynth.ctx.createOscillator();
            const gain = audioSynth.ctx.createGain();
            osc.frequency.value = 659.25; // E5
            gain.gain.setValueAtTime(0.04, audioSynth.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioSynth.ctx.currentTime + 0.8);
            osc.connect(gain); gain.connect(audioSynth.filter);
            osc.start(); osc.stop(audioSynth.ctx.currentTime + 0.8);
          }}, 250);
          setTimeout(() => { if(audioSynth.ctx) {
            const osc = audioSynth.ctx.createOscillator();
            const gain = audioSynth.ctx.createGain();
            osc.frequency.value = 783.99; // G5
            gain.gain.setValueAtTime(0.05, audioSynth.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioSynth.ctx.currentTime + 1.2);
            osc.connect(gain); gain.connect(audioSynth.filter);
            osc.start(); osc.stop(audioSynth.ctx.currentTime + 1.2);
          }}, 400);
        }
      };

      // Handle Adding Comment in Modal Detail Drawer
      const handleAddComment = (e) => {
        e.preventDefault();
        if (!commentText.trim()) return;

        const commenterName = currentUser.id === "guest" ? "Guest User" : currentUser.name;
        const commenterAvatar = currentUser.avatar;
        const commenterRole = currentUser.role;

        const newComment = {
          author: commenterName,
          avatar: commenterAvatar,
          role: commenterRole,
          text: commentText,
          date: new Date().toLocaleDateString("en-US", { month: 'short', day: 'numeric', year: 'numeric' })
        };

        const updatedMessages = messages.map(m => {
          if (m.id === selectedCard.id) {
            return {
              ...m,
              comments: [...m.comments, newComment]
            };
          }
          return m;
        });

        setMessages(updatedMessages);
        setSelectedCard(prev => ({
          ...prev,
          comments: [...prev.comments, newComment]
        }));
        setCommentText("");

        // Scroll comment list to bottom
        setTimeout(() => {
          if (commentEndRef.current) {
            commentEndRef.current.scrollIntoView({ behavior: 'smooth' });
          }
        }, 100);
      };

      // Open detail modal helper
      const openDetailModal = (card) => {
        setSelectedCard(card);
        setIsDetailModalOpen(true);
      };

      // Select active user and close profile switcher
      const handleSelectProfile = (profile) => {
        setCurrentUser(profile);
        setIsProfileDropdownOpen(false);
        fireCelebration();
      };

      return (
        <div className="min-h-screen flex flex-col justify-between">
          
          {/* HEADER BAR */}
          <header className="sticky top-0 z-40 bg-white/70 backdrop-blur-md border-b border-warm-200 shadow-sm px-4 sm:px-8 py-3.5 flex flex-wrap items-center justify-between gap-4">
            
            {/* Logo/Title */}
            <div className="flex items-center gap-2">
              <span className="text-3xl">💝</span>
              <div>
                <h1 className="font-serif text-xl sm:text-2xl font-bold tracking-tight text-warm-900 flex items-center gap-2">
                  Farewell, Steve!
                </h1>
                <p className="text-xs text-warm-600 font-medium">Team Legacy Memory Board • 2026</p>
              </div>
            </div>

            {/* AUDIO MUSIC CONTROLLER */}
            <div className="flex items-center bg-warm-100 rounded-2xl border border-warm-200 p-1.5 shadow-inner gap-2 sm:gap-4 flex-wrap max-w-full">
              <div className="flex items-center gap-1.5 px-2">
                {/* Cassette Tape Rotating Graphic */}
                <div className={`w-8 h-8 rounded-full border-2 border-warm-300 bg-neutral-800 flex items-center justify-center relative ${isMusicPlaying ? 'animate-spin-slow' : ''}`}>
                  <div className="w-2.5 h-2.5 bg-warm-200 rounded-full"></div>
                  <div className="absolute w-5 h-1 bg-white/30 top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2"></div>
                </div>
                <div className="hidden sm:block">
                  <span className="text-[10px] uppercase tracking-wider text-warm-500 font-bold block">Ambient Synth</span>
                  <span className="text-xs font-semibold text-warm-800 block -mt-1 truncate max-w-[110px]">
                    {activeTrack === 0 && "Cozy Guitar"}
                    {activeTrack === 1 && "Lofi Chords"}
                    {activeTrack === 2 && "Ethereal Pad"}
                  </span>
                </div>
              </div>

              {/* Controls */}
              <div className="flex items-center gap-1">
                <button 
                  onClick={() => handleTrackChange((activeTrack + 1) % 3)}
                  className="p-1.5 hover:bg-warm-200 rounded-lg text-warm-700 active:scale-95 transition-all text-xs"
                  title="Next Soundscape"
                >
                  🔄
                </button>
                <button 
                  onClick={toggleMusic}
                  className={`px-3 py-1 rounded-lg text-xs font-bold transition-all shadow-sm active:scale-95 flex items-center gap-1 ${isMusicPlaying ? 'bg-orange-600 hover:bg-orange-700 text-white' : 'bg-warm-300 hover:bg-warm-400 text-warm-900'}`}
                >
                  {isMusicPlaying ? "Pause ⏸" : "Play Music 🎵"}
                </button>
                <div className="flex items-center gap-1 pl-1">
                  <span className="text-xs">🔈</span>
                  <input 
                    type="range" 
                    min="0" 
                    max="1" 
                    step="0.1" 
                    value={musicVolume} 
                    onChange={handleVolumeChange} 
                    className="w-14 h-1 bg-warm-300 rounded-lg appearance-none cursor-pointer accent-orange-600"
                    title="Volume"
                  />
                </div>
              </div>
            </div>

            {/* PSEUDO LOGIN PROFILE SELECTOR */}
            <div className="relative" ref={profileButtonRef}>
              <button 
                onClick={() => setIsProfileDropdownOpen(!isProfileDropdownOpen)}
                className="flex items-center gap-2 px-3.5 py-2 bg-white hover:bg-warm-50 border border-warm-200 hover:border-warm-300 rounded-xl shadow-sm text-sm font-semibold text-warm-900 transition-all duration-200 active:scale-95 focus:outline-none focus:ring-2 focus:ring-orange-500/30"
              >
                <span className="text-lg bg-warm-100 w-7 h-7 rounded-full flex items-center justify-center border border-warm-200">
                  {currentUser.avatar}
                </span>
                <span className="max-w-[120px] truncate">{currentUser.name}</span>
                <span className="text-xs text-warm-400">▼</span>
              </button>

              {isProfileDropdownOpen && (
                <div className="absolute right-0 mt-2 w-72 bg-white border border-warm-200 rounded-2xl shadow-xl overflow-hidden z-50 animate-float-slow duration-100">
                  <div className="bg-gradient-to-r from-warm-100 to-warm-50 px-4 py-3.5 border-b border-warm-200">
                    <span className="text-xs uppercase tracking-wider text-warm-500 font-extrabold block">Switch Active Profile</span>
                    <p className="text-xs text-warm-600 mt-0.5">Test how different roles interact with the guestbook.</p>
                  </div>
                  <div className="py-1 max-h-80 overflow-y-auto">
                    {PROFILES.map(prof => (
                      <button 
                        key={prof.id}
                        onClick={() => handleSelectProfile(prof)}
                        className={`w-full flex items-start gap-3 px-4 py-3 text-left hover:bg-warm-50 transition-colors ${currentUser.id === prof.id ? 'bg-warm-100/60 font-medium' : ''}`}
                      >
                        <span className="text-2xl bg-warm-100 p-1.5 rounded-xl border border-warm-200 flex items-center justify-center">
                          {prof.avatar}
                        </span>
                        <div className="flex-1 min-w-0">
                          <div className="flex items-center justify-between">
                            <span className="text-sm font-bold text-neutral-800 truncate">{prof.name}</span>
                            {currentUser.id === prof.id && (
                              <span className="text-[10px] bg-orange-600 text-white font-extrabold px-1.5 py-0.5 rounded-full">Active</span>
                            )}
                          </div>
                          <span className="text-xs text-warm-600 block">{prof.role}</span>
                          <span className="text-[10px] text-neutral-400 block mt-0.5 italic truncate">{prof.bio}</span>
                        </div>
                      </button>
                    ))}
                  </div>
                </div>
              )}
            </div>

          </header>

          {/* DYNAMIC WELCOME BANNER (GREETING CHANGES BY PROFILE MODE) */}
          <div className="px-4 sm:px-8 pt-6">
            <div className="max-w-7xl mx-auto bg-gradient-to-r from-warm-100 via-white to-warm-50 border border-warm-200 rounded-3xl p-6 sm:p-8 shadow-sm relative overflow-hidden flex flex-col md:flex-row items-center gap-6">
              
              {/* Abs decorative light effects */}
              <div className="absolute top-0 right-0 w-64 h-64 bg-amber-200/20 rounded-full blur-3xl pointer-events-none"></div>
              <div className="absolute -bottom-10 -left-10 w-48 h-48 bg-orange-200/20 rounded-full blur-2xl pointer-events-none"></div>

              <div className="text-center md:text-left flex-1 relative z-10">
                <span className="text-xs uppercase tracking-widest text-orange-700 font-extrabold bg-orange-100 border border-orange-200 px-3 py-1 rounded-full">
                  🌟 Legacy Signature Board
                </span>
                
                {currentUser.id === "steve" ? (
                  <div className="mt-3.5">
                    <h2 className="font-serif text-3xl sm:text-4xl lg:text-5xl font-extrabold text-neutral-900 leading-tight">
                      Hey Steve, Today is All About You!
                    </h2>
                    <p className="text-neutral-600 mt-2 text-sm sm:text-base max-w-2xl">
                      Your team built this interactive message board just for you. Grab a cup of coffee, scroll through these beautiful polaroids, read their private notes, and see the reactions. Thank you for being such an extraordinary Lead Architect!
                    </p>
                  </div>
                ) : (
                  <div className="mt-3.5">
                    <h2 className="font-serif text-3xl sm:text-4xl lg:text-5xl font-extrabold text-neutral-900 leading-tight">
                      To Steve: Architect, Mentor & Friend
                    </h2>
                    <p className="text-neutral-600 mt-2 text-sm sm:text-base max-w-2xl">
                      Leave a heartfelt note, vote on funny inside jokes, and write about your favorite memories before Steve begins his next major engineering adventure. Let's send him off with infinite warmth!
                    </p>
                  </div>
                )}

                {/* BOARD SUMMARY METRICS */}
                <div className="flex flex-wrap items-center justify-center md:justify-start gap-4 sm:gap-6 mt-6 pt-5 border-t border-warm-200/60 text-xs text-neutral-500 font-medium">
                  <div className="flex items-center gap-2 bg-white border border-warm-200 px-3 py-1.5 rounded-xl shadow-sm">
                    <span className="text-base">📝</span>
                    <span>Total Messages: <strong className="text-neutral-800">{boardStats.total}</strong></span>
                  </div>
                  <div className="flex items-center gap-2 bg-white border border-warm-200 px-3 py-1.5 rounded-xl shadow-sm">
                    <span className="text-base">💖</span>
                    <span>Total Reactions Sent: <strong className="text-neutral-800">{boardStats.totalReacts}</strong></span>
                  </div>
                  <div className="flex items-center gap-2 bg-white border border-warm-200 px-3 py-1.5 rounded-xl shadow-sm">
                    <span className="text-base">📅</span>
                    <span>Closing Date: <strong className="text-neutral-800">May 19, 2026</strong></span>
                  </div>
                </div>
              </div>

              {/* WRITE MESSAGE TRIGGER SECTION */}
              <div className="flex flex-col items-center gap-3 relative z-10 text-center bg-white border border-warm-200 p-5 rounded-2xl shadow-md min-w-[260px]">
                <span className="text-xs text-warm-600 font-bold block">Have a story or memories to share?</span>
                <button 
                  onClick={() => setIsWriteModalOpen(true)}
                  className="w-full px-6 py-3.5 bg-gradient-to-r from-amber-500 to-orange-600 hover:from-amber-600 hover:to-orange-700 text-white rounded-xl font-bold shadow-md shadow-orange-500/10 hover:shadow-lg hover:shadow-orange-500/20 active:scale-95 transition-all text-sm flex items-center justify-center gap-2"
                >
                  <span className="text-base">✍️</span> Write Farewell Note
                </button>
                <div className="text-[10px] text-neutral-400 mt-1 italic">
                  Posting as: <strong>{currentUser.name}</strong>
                </div>
              </div>

            </div>
          </div>

          {/* MAIN FILTER AND UTILITY BAR */}
          <main className="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-8 py-8">
            <div className="flex flex-wrap items-center justify-between gap-4 mb-8 bg-white border border-warm-200 p-4 rounded-2xl shadow-sm">
              
              {/* Categories Navigation */}
              <div className="flex items-center gap-1.5 overflow-x-auto pb-1 sm:pb-0 scrollbar-none max-w-full">
                {["All", "Gratitude", "Memories", "Wishes", "Humor"].map(category => (
                  <button
                    key={category}
                    onClick={() => setActiveFilter(category)}
                    className={`px-4 py-2 rounded-xl text-xs font-bold whitespace-nowrap tracking-wide transition-all ${
                      activeFilter === category 
                        ? 'bg-warm-950 text-white shadow-sm' 
                        : 'bg-warm-50 hover:bg-warm-100 text-warm-800 border border-warm-200/50'
                    }`}
                  >
                    {category === "All" && "🌈 All Messages"}
                    {category === "Gratitude" && "❤️ Gratitude"}
                    {category === "Memories" && "📸 Memories"}
                    {category === "Wishes" && "🌟 Wishes"}
                    {category === "Humor" && "⚡ Humor"}
                    <span className={`ml-1.5 px-1.5 py-0.5 rounded-full text-[10px] ${activeFilter === category ? 'bg-white/20 text-white' : 'bg-warm-200 text-warm-800'}`}>
                      {category === "All" ? messages.length : boardStats.categories[category]}
                    </span>
                  </button>
                ))}
              </div>

              {/* Search and Sort Utilities */}
              <div className="flex flex-wrap items-center gap-3 w-full lg:w-auto">
                {/* Search */}
                <div className="relative flex-1 sm:flex-initial min-w-[200px]">
                  <span className="absolute left-3.5 top-1/2 -translate-y-1/2 text-neutral-400 text-sm">🔍</span>
                  <input 
                    type="text" 
                    placeholder="Search messages..."
                    value={searchQuery}
                    onChange={(e) => setSearchQuery(e.target.value)}
                    className="w-full pl-9 pr-4 py-2 bg-warm-50 border border-warm-200 focus:border-warm-400 rounded-xl text-xs font-semibold focus:outline-none focus:ring-2 focus:ring-warm-500/20 transition-all text-neutral-800 placeholder-neutral-400"
                  />

                      ✕

                {/* Sort */}
                <select

                >
                  <option value="newest">📅 Newest First</option>
                  <option value="oldest">⏳ Oldest First</option>

                  <button 
                    onClick={() => setViewMode("grid")}
                    className={`px-2.5 py-1.5 rounded-lg text-xs font-bold transition-all flex items-center gap-1 ${viewMode === 'grid' ? 'bg-white text-orange-800 shadow-sm border border-warm-200' : 'text-neutral-400 hover:text-warm-800'}`}
                    title="Classic Grid View"
                  >
                    🔲 Grid
                  </button>
                  <button 
                    onClick={() => setViewMode("corkboard")}
                    className={`px-2.5 py-1.5 rounded-lg text-xs font-bold transition-all flex items-center gap-1 ${viewMode === 'corkboard' ? 'bg-white text-orange-800 shadow-sm border border-warm-200' : 'text-neutral-400 hover:text-warm-800'}`}
                    title="Playful Scattered Scrapbook"
                  >
                    📌 Corkboard
                  </button>
                </div>
              </div>

            </div>

            {/* MESSAGE BOARD GRID RENDER */}
            {filteredAndSortedMessages.length === 0 ? (

                <p className="text-neutral-500 mt-2 text-sm">No matches found for "{searchQuery}" under "{activeFilter}". Try refining your search, or be the first to post a new message with that category!</p>
                <button

                  className="mt-6 px-4 py-2 bg-warm-100 hover:bg-warm-200 text-warm-800 rounded-xl text-xs font-bold transition-all border border-warm-200"

              >
                {filteredAndSortedMessages.map((card, idx) => {

                  return (

                      className={`group bg-white border border-warm-200 rounded-3xl p-5 shadow-sm hover:shadow-2xl transition-all duration-300 relative hover:-translate-y-2 flex flex-col justify-between max-w-sm w-full ${viewMode === 'corkboard' ? 'animate-float-slow hover:z-20' : ''}`}
                    >
                      {/* Sticky Tape Decorator on Board View */}

                      <div className="flex-1 cursor-pointer" onClick={() => openDetailModal(card)}>
                        
                        {/* Image Header */}

                              alt={`${card.author} farewell photo`} 
                              className="w-full h-full object-cover opacity-90 group-hover:opacity-100 transition-opacity duration-300 group-hover:scale-105"
                              loading="lazy"
                            />
                            {/* Category Badge overlayed */}
                            <span className={`absolute top-3.5 left-3.5 px-3 py-1 rounded-full text-[10px] font-extrabold shadow-sm tracking-wide ${
                              card.category === 'Gratitude' ? 'bg-red-50 text-red-700 border border-red-200' :
                              card.category === 'Memories' ? 'bg-sky-50 text-sky-700 border border-sky-200' :
                              card.category === 'Wishes' ? 'bg-amber-50 text-amber-700 border border-amber-200' :
                              'bg-purple-50 text-purple-700 border border-purple-200'
                            }`}>
                              {card.category}
                            </span>
                          </div>
                        )}

                        {/* Text Content */}
                        <div className="relative mt-2">
                          <span className="text-neutral-400 font-serif text-3xl absolute -top-3 -left-2 select-none pointer-events-none opacity-40">“</span>
                          <p className="text-neutral-700 text-sm leading-relaxed font-sans line-clamp-5 px-1 pt-1">
                            {card.message}
                          </p>
                        </div>
                      </div>

                      {/* Sign-off & Footer */}
                      <div className="border-t border-warm-100/80 pt-4 mt-4 flex flex-col gap-3">
                        {/* Author info */}
                        <div className="flex items-center justify-between">
                          <div className="flex items-center gap-2">
                            <span className="text-2xl bg-warm-50 w-8 h-8 rounded-full flex items-center justify-center border border-warm-200/40">
                              {card.avatar || "👤"}
                            </span>
                            <div className="leading-tight">
                              <span className="text-xs font-bold text-neutral-800 block group-hover:text-orange-700 transition-colors">{card.author}</span>
                              <span className="text-[10px] text-neutral-500 block truncate max-w-[150px]">{card.role}</span>
                            </div>
                          </div>
                          <span className="text-[10px] text-neutral-400 font-medium">{card.date}</span>
                        </div>

                        {/* Interactive Reaction Stats & Comments */}
                        <div className="flex items-center justify-between gap-1 pt-1.5 border-t border-neutral-100/60 flex-wrap">
                          
                          {/* Reactions Actions */}
                          <div className="flex items-center gap-1.5 flex-wrap">
                            <button 
                              onClick={(e) => handleReaction(card.id, 'heart', e)}
                              className="px-2 py-1 bg-neutral-50 hover:bg-red-50 hover:border-red-200 border border-neutral-200 rounded-lg text-xs font-medium text-neutral-600 hover:text-red-600 transition-all flex items-center gap-1 active:scale-95"
                              title="Send Heart"
                            >
                              <span>❤️</span> 
                              <span>{card.reactions.heart}</span>
                            </button>
                            <button 
                              onClick={(e) => handleReaction(card.id, 'hug', e)}
                              className="px-2 py-1 bg-neutral-50 hover:bg-sky-50 hover:border-sky-200 border border-neutral-200 rounded-lg text-xs font-medium text-neutral-600 hover:text-sky-600 transition-all flex items-center gap-1 active:scale-95"
                              title="Send Warm Hug"
                            >
                              <span>🤗</span> 
                              <span>{card.reactions.hug}</span>
                            </button>
                            <button 
                              onClick={(e) => handleReaction(card.id, 'sparkle', e)}
                              className="px-2 py-1 bg-neutral-50 hover:bg-amber-50 hover:border-amber-200 border border-neutral-200 rounded-lg text-xs font-medium text-neutral-600 hover:text-amber-600 transition-all flex items-center gap-1 active:scale-95"
                              title="Send Cheer/Sparkle"
                            >
                              <span>✨</span> 
                              <span>{card.reactions.sparkle}</span>
                            </button>
                            <button 
                              onClick={(e) => handleReaction(card.id, 'coffee', e)}
                              className="px-2 py-1 bg-neutral-50 hover:bg-warm-100 hover:border-warm-300 border border-neutral-200 rounded-lg text-xs font-medium text-neutral-600 hover:text-warm-800 transition-all flex items-center gap-1 active:scale-95"
                              title="Cheers Coffee"
                            >
                              <span>☕</span> 
                              <span>{card.reactions.coffee}</span>
                            </button>
                          </div>

                          {/* Comments Count Indicator */}
                          <button 
                            onClick={() => openDetailModal(card)}
                            className="text-[10px] font-bold text-orange-600 bg-orange-50 hover:bg-orange-100 border border-orange-200 px-2.5 py-1 rounded-lg transition-colors flex items-center gap-1.5 mt-1 sm:mt-0"
                          >
                            💬 {card.comments.length} {card.comments.length === 1 ? 'Comment' : 'Comments'}
                          </button>
                        </div>

                      </div>
                    </article>
                  );
                })}
              </div>
            )}
          </main>

          {/* FOOTER */}
          <footer className="bg-white border-t border-warm-200 py-6 text-center text-xs text-warm-600 relative z-10">
            <div className="max-w-7xl mx-auto px-4 sm:px-8 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div>
                <p className="font-bold text-warm-900">Developed with love by Steve's engineering peers.</p>
                <p className="text-[10px] text-neutral-400 mt-0.5">Custom procedural Web Audio synthesis • No database dependencies.</p>
              </div>
              <div className="flex items-center gap-4 text-orange-700 font-semibold">
                <a href="#" className="hover:underline">Steve's Wiki Page</a>
                <span>•</span>
                <a href="#" className="hover:underline">Board Guidelines</a>
                <span>•</span>
                <button onClick={fireCelebration} className="hover:scale-110 active:scale-95 transition-all">✨ Fire Confetti!</button>
              </div>
            </div>
          </footer>

          {/* --- MODAL 1: WRITE FAREWELL MESSAGE --- */}
          {isWriteModalOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
              {/* Backdrop */}
              <div 
                className="absolute inset-0 bg-neutral-900/60 backdrop-blur-sm transition-opacity"
                onClick={() => setIsWriteModalOpen(false)}
              ></div>
              
              {/* Form Window */}
              <div className="bg-white border border-warm-200 rounded-3xl w-full max-w-2xl overflow-hidden shadow-2xl relative z-10 flex flex-col max-h-[90vh] animate-float-slow duration-200">
                
                {/* Modal Header */}
                <div className="bg-gradient-to-r from-warm-100 to-warm-50 px-6 py-4 border-b border-warm-200 flex items-center justify-between">
                  <div>
                    <h3 className="font-serif text-xl font-bold text-neutral-900 flex items-center gap-2">
                      <span>✍️</span> Compose Your Farewell Note
                    </h3>
                    <p className="text-xs text-neutral-500">Your note will immediately pin to the live workspace board.</p>
                  </div>
                  <button 
                    onClick={() => setIsWriteModalOpen(false)}
                    className="w-8 h-8 flex items-center justify-center hover:bg-warm-100 border border-warm-200 rounded-full text-neutral-500 hover:text-neutral-800 transition-colors"
                  >
                    ✕
                  </button>
                </div>

                {/* Form Inputs Scrollable Panel */}
                <form onSubmit={handleSubmitMessage} className="flex-1 overflow-y-auto p-6 space-y-5">
                  
                  {/* Info Warning based on profile */}
                  {currentUser.id !== "guest" ? (
                    <div className="bg-orange-50 border border-orange-200/50 p-3 rounded-xl flex items-center gap-2 text-xs text-orange-800">
                      <span>🔒</span>
                      <span>You are posting as your logged-in profile: <strong>{currentUser.name}</strong> ({currentUser.role}).</span>
                    </div>
                  ) : (
                    <div className="bg-amber-50 border border-amber-200/50 p-3 rounded-xl flex items-center gap-2 text-xs text-amber-800">
                      <span>👥</span>
                      <span>You are writing as a <strong>Guest User</strong>. Switch profile at the top bar to post as specific team members!</span>
                    </div>
                  )}

                  {/* Two Column Layout Name / Role */}
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                      <label className="block text-xs font-bold uppercase tracking-wider text-warm-700 mb-1.5">Your Name *</label>
                      <input 
                        type="text" 
                        required
                        disabled={currentUser.id !== "guest"}
                        placeholder="e.g. Rachel Adams"
                        value={formName}
                        onChange={(e) => setFormName(e.target.value)}
                        className="w-full px-4 py-2.5 bg-warm-50 border border-warm-200 disabled:opacity-60 disabled:cursor-not-allowed focus:border-warm-500 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-warm-500/20 text-neutral-800 transition-all font-medium"
                      />
                    </div>
                    <div>
                      <label className="block text-xs font-bold uppercase tracking-wider text-warm-700 mb-1.5">Your Corporate Role</label>
                      <input 
                        type="text" 
                        disabled={currentUser.id !== "guest"}
                        placeholder="e.g. Cloud Engineer"
                        value={formRole}
                        onChange={(e) => setFormRole(e.target.value)}
                        className="w-full px-4 py-2.5 bg-warm-50 border border-warm-200 disabled:opacity-60 disabled:cursor-not-allowed focus:border-warm-500 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-warm-500/20 text-neutral-800 transition-all font-medium"
                      />
                    </div>
                  </div>

                  {/* Category Pill Selection */}
                  <div>
                    <label className="block text-xs font-bold uppercase tracking-wider text-warm-700 mb-1.5">Emotion / Category Label</label>
                    <div className="flex flex-wrap items-center gap-2">
                      {["Gratitude", "Memories", "Wishes", "Humor"].map(cat => (
                        <button
                          key={cat}
                          type="button"
                          onClick={() => setFormCategory(cat)}
                          className={`px-4 py-2 rounded-xl text-xs font-bold transition-all border ${
                            formCategory === cat 
                              ? 'bg-warm-900 border-warm-900 text-white' 
                              : 'bg-warm-50 border-warm-200 hover:bg-warm-100 text-warm-800'
                          }`}
                        >
                          {cat === "Gratitude" && "❤️ Gratitude"}
                          {cat === "Memories" && "📸 Memories"}
                          {cat === "Wishes" && "🌟 Wishes"}
                          {cat === "Humor" && "⚡ Humor"}
                        </button>
                      ))}
                    </div>
                  </div>

                  {/* Cover Photo Choice */}
                  <div className="space-y-2">
                    <label className="block text-xs font-bold uppercase tracking-wider text-warm-700">Choose Card Cover Image</label>
                    
                    {/* Pre-curated thumbnails list */}
                    <div className="grid grid-cols-3 sm:grid-cols-6 gap-2">
                      {PRESET_IMAGES.map(img => (
                        <button
                          key={img.id}
                          type="button"
                          onClick={() => {
                            setFormImageUrl(img.url);
                            setCustomImageSelected(false);
                          }}
                          className={`h-14 rounded-lg overflow-hidden relative border-2 transition-all ${!customImageSelected && formImageUrl === img.url ? 'border-orange-600 scale-95 shadow-md' : 'border-transparent'}`}
                        >
                          <img src={img.url} className="w-full h-full object-cover" alt={img.name} />
                          <div className="absolute inset-0 bg-neutral-900/10 hover:bg-transparent"></div>
                        </button>
                      ))}
                    </div>

                    {/* Custom URL Option */}
                    <div className="pt-1.5">
                      <button 
                        type="button"
                        onClick={() => {
                          setFormImageUrl("");
                          setCustomImageSelected(true);
                        }}
                        className={`text-xs font-bold flex items-center gap-1 mb-1.5 ${customImageSelected ? 'text-orange-700' : 'text-neutral-500 hover:text-neutral-800'}`}
                      >
                        🔗 Input Custom Image URL Instead
                      </button>
                      
                      {customImageSelected && (
                        <input 
                          type="url" 
                          placeholder="Paste a custom Unsplash or Web image URL here..."
                          value={formImageUrl}
                          onChange={(e) => setFormImageUrl(e.target.value)}
                          className="w-full px-4 py-2 bg-warm-50 border border-warm-200 focus:border-warm-500 rounded-xl text-xs focus:outline-none focus:ring-2 focus:ring-warm-500/20 text-neutral-800 transition-all font-medium"
                        />
                      )}
                    </div>
                  </div>

                  {/* Message Input with Live Character Counter */}
                  <div>
                    <div className="flex justify-between items-center mb-1.5">
                      <label className="block text-xs font-bold uppercase tracking-wider text-warm-700">Your Personal Note *</label>
                      <span className={`text-[10px] font-semibold ${formText.length > 450 ? 'text-red-500 font-extrabold' : 'text-neutral-400'}`}>
                        {formText.length} / 500 characters
                      </span>
                    </div>
                    <textarea 
                      required
                      rows="4"
                      maxLength="500"
                      placeholder="Steve, thank you for always being such a supportive teammate. I'll never forget the lessons from working together... wishing you incredible success!"
                      value={formText}
                      onChange={(e) => setFormText(e.target.value)}
                      className="w-full px-4 py-3 bg-warm-50 border border-warm-200 focus:border-warm-500 rounded-2xl text-sm focus:outline-none focus:ring-2 focus:ring-warm-500/20 text-neutral-800 transition-all placeholder-neutral-400 leading-relaxed font-sans"
                    ></textarea>
                  </div>

                  {/* Submit Button Sizing Consistency Policy */}
                  <div className="flex items-center justify-end gap-3 pt-4 border-t border-neutral-100">
                    <button 
                      type="button"
                      onClick={() => setIsWriteModalOpen(false)}
                      className="px-6 py-2.5 bg-white hover:bg-neutral-50 border border-neutral-200 text-neutral-700 rounded-xl font-semibold shadow-sm active:scale-95 transition-all text-sm"
                    >
                      Cancel
                    </button>
                    <button 
                      type="submit"
                      className="px-6 py-2.5 bg-gradient-to-r from-amber-500 to-orange-600 hover:from-amber-600 hover:to-orange-700 text-white rounded-xl font-bold shadow-md shadow-orange-500/10 hover:shadow-lg hover:shadow-orange-500/20 active:scale-95 transition-all text-sm flex items-center gap-2"
                    >
                      🚀 Post Message
                    </button>
                  </div>

                </form>

              </div>
            </div>
          )}

          {/* --- MODAL 2: CARDS INSPECTOR DETAIL VIEW & GUESTBOOK COMMENTS --- */}
          {isDetailModalOpen && selectedCard && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
              {/* Backdrop */}
              <div 
                className="absolute inset-0 bg-neutral-900/60 backdrop-blur-sm transition-opacity"
                onClick={() => setIsDetailModalOpen(false)}
              ></div>

              {/* Inspector Panel */}
              <div className="bg-[#fcfbf7] border border-warm-200 rounded-3xl w-full max-w-4xl overflow-hidden shadow-2xl relative z-10 flex flex-col md:flex-row max-h-[90vh] animate-float-slow duration-200">
                
                {/* Left Side: Polaroid Cover Photo Panel */}
                <div className="w-full md:w-1/2 bg-white p-6 flex flex-col justify-center border-b md:border-b-0 md:border-r border-warm-200/60 relative">
                  
                  {/* Category Tag overlay on Photo */}
                  <span className={`absolute top-10 left-10 z-20 px-3 py-1 rounded-full text-xs font-extrabold shadow-sm tracking-wide ${
                    selectedCard.category === 'Gratitude' ? 'bg-red-50 text-red-700 border border-red-200' :
                    selectedCard.category === 'Memories' ? 'bg-sky-50 text-sky-700 border border-sky-200' :
                    selectedCard.category === 'Wishes' ? 'bg-amber-50 text-amber-700 border border-amber-200' :
                    'bg-purple-50 text-purple-700 border border-purple-200'
                  }`}>
                    {selectedCard.category}
                  </span>

                  {/* Polaroid Frame styling */}
                  <div className="bg-white border border-warm-200 rounded-lg p-4 shadow-lg flex flex-col gap-4 relative">
                    {/* Semi transparent tape */}
                    <div className="absolute -top-3 left-1/2 -translate-x-1/2 w-24 h-6 sticky-tape rotate-[1deg] shadow-sm pointer-events-none"></div>

                    <div className="w-full aspect-video md:aspect-[4/3] rounded-lg overflow-hidden border border-warm-100/40">
                      <img src={selectedCard.image} className="w-full h-full object-cover" alt="Memory Photo" />
                    </div>
                    
                    {/* Handwritten signature inside polaroid frame */}
                    <div className="pt-2 text-center">
                      <p className="font-cursive text-4xl text-neutral-800 leading-none">
                        - {selectedCard.author}
                      </p>
                      <p className="text-[10px] text-neutral-400 font-bold tracking-widest uppercase mt-1">
                        {selectedCard.role} • {selectedCard.date}
                      </p>
                    </div>
                  </div>

                  {/* Reaction panel below polaroid */}
                  <div className="mt-6 flex justify-center gap-3">
                    <button 
                      onClick={(e) => handleReaction(selectedCard.id, 'heart', e)}
                      className="px-3.5 py-1.5 bg-neutral-50 hover:bg-red-50 hover:border-red-200 border border-neutral-200 rounded-xl text-xs font-bold text-neutral-600 hover:text-red-600 transition-all flex items-center gap-2 active:scale-95"
                    >
                      <span>❤️ Heart</span> 
                      <span>{selectedCard.reactions.heart}</span>
                    </button>
                    <button 
                      onClick={(e) => handleReaction(selectedCard.id, 'hug', e)}
                      className="px-3.5 py-1.5 bg-neutral-50 hover:bg-sky-50 hover:border-sky-200 border border-neutral-200 rounded-xl text-xs font-bold text-neutral-600 hover:text-sky-600 transition-all flex items-center gap-2 active:scale-95"
                    >
                      <span>🤗 Hug</span> 
                      <span>{selectedCard.reactions.hug}</span>
                    </button>
                    <button 
                      onClick={(e) => handleReaction(selectedCard.id, 'sparkle', e)}
                      className="px-3.5 py-1.5 bg-neutral-50 hover:bg-amber-50 hover:border-amber-200 border border-neutral-200 rounded-xl text-xs font-bold text-neutral-600 hover:text-amber-600 transition-all flex items-center gap-2 active:scale-95"
                    >
                      <span>✨ Glow</span> 
                      <span>{selectedCard.reactions.sparkle}</span>
                    </button>
                    <button 
                      onClick={(e) => handleReaction(selectedCard.id, 'coffee', e)}
                      className="px-3.5 py-1.5 bg-neutral-50 hover:bg-warm-100 hover:border-warm-300 border border-neutral-200 rounded-xl text-xs font-bold text-neutral-600 hover:text-warm-800 transition-all flex items-center gap-2 active:scale-95"
                    >
                      <span>☕ Cheers</span> 
                      <span>{selectedCard.reactions.coffee}</span>
                    </button>
                  </div>

                </div>

                {/* Right Side: Message content & Threaded comments */}
                <div className="w-full md:w-1/2 flex flex-col justify-between max-h-[80vh] md:max-h-[90vh] bg-[#fcfbf7]">
                  
                  {/* Text Header */}
                  <div className="p-6 pb-4 border-b border-warm-200/60 bg-gradient-to-b from-warm-50 to-[#fcfbf7] flex justify-between items-start gap-3">
                    <div className="flex items-center gap-3">
                      <span className="text-3xl bg-white w-10 h-10 rounded-2xl flex items-center justify-center border border-warm-200 shadow-sm">
                        {selectedCard.avatar}
                      </span>
                      <div>
                        <h4 className="font-bold text-neutral-950 text-base leading-tight">{selectedCard.author}</h4>
                        <span className="text-xs text-neutral-500">{selectedCard.role}</span>
                      </div>
                    </div>
                    <button 
                      onClick={() => setIsDetailModalOpen(false)}
                      className="w-8 h-8 flex items-center justify-center hover:bg-warm-100 border border-warm-200 rounded-full text-neutral-500 hover:text-neutral-800 transition-colors"
                    >
                      ✕
                    </button>
                  </div>

                  {/* Core Note Body Text & Thread Comments */}
                  <div className="flex-1 overflow-y-auto p-6 space-y-6">
                    
                    {/* The Full Note */}
                    <div className="relative">
                      <span className="text-neutral-200 font-serif text-6xl absolute -top-6 -left-4 select-none pointer-events-none">“</span>
                      <p className="text-neutral-800 text-base leading-relaxed font-sans font-medium px-2 relative z-10 whitespace-pre-line pt-2">
                        {selectedCard.message}
                      </p>
                    </div>

                    {/* Guest Comments Section */}
                    <div className="border-t border-warm-200/60 pt-5 space-y-4">
                      <h5 className="text-xs font-extrabold uppercase tracking-widest text-warm-700 flex items-center gap-1.5">
                        💬 Conversational Thread ({selectedCard.comments.length})
                      </h5>

                      {selectedCard.comments.length === 0 ? (
                        <div className="text-center py-6 bg-warm-50/50 border border-warm-200/30 rounded-2xl text-xs text-neutral-400 italic">
                          No replies posted yet. Be the first to start the thread conversation!
                        </div>
                      ) : (
                        <div className="space-y-3">
                          {selectedCard.comments.map((comment, cIdx) => (
                            <div key={cIdx} className="bg-white border border-warm-100 rounded-2xl p-3.5 shadow-sm space-y-1">
                              <div className="flex items-center justify-between">
                                <div className="flex items-center gap-2">
                                  <span className="text-lg bg-warm-50 w-6 h-6 rounded-full flex items-center justify-center border border-warm-200/30">
                                    {comment.avatar || "👤"}
                                  </span>
                                  <span className="text-xs font-bold text-neutral-800">{comment.author}</span>
                                  <span className="text-[9px] text-neutral-400 bg-warm-100 px-1.5 py-0.5 rounded-full">{comment.role}</span>
                                </div>
                                <span className="text-[9px] text-neutral-400">{comment.date}</span>
                              </div>
                              <p className="text-xs text-neutral-700 font-sans leading-relaxed pl-1 pt-1">
                                {comment.text}
                              </p>
                            </div>
                          ))}
                          <div ref={commentEndRef}></div>
                        </div>
                      )}
                    </div>

                  </div>

                  {/* Reply Write Form Bar */}
                  <form onSubmit={handleAddComment} className="p-4 bg-white border-t border-warm-200 flex items-center gap-2">
                    <span className="text-xl pl-1">{currentUser.avatar}</span>
                    <input 
                      type="text" 
                      placeholder={`Reply to ${selectedCard.author} as ${currentUser.name}...`}
                      value={commentText}
                      onChange={(e) => setCommentText(e.target.value)}
                      className="flex-1 px-3.5 py-2.5 bg-warm-50 border border-warm-200 focus:border-warm-500 rounded-xl text-xs focus:outline-none focus:ring-2 focus:ring-warm-500/20 text-neutral-800 transition-all font-medium"
                    />
                    <button 
                      type="submit"
                      disabled={!commentText.trim()}
                      className="px-4 py-2.5 bg-orange-600 disabled:bg-neutral-300 hover:bg-orange-700 text-white font-bold rounded-xl text-xs transition-colors shadow-sm active:scale-95 whitespace-nowrap"
                    >
                      Reply
                    </button>
                  </form>

                </div>

              </div>
            </div>
          )}

        </div>
      );
    }

    // Render App
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
