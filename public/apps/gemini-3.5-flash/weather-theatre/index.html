                      max="1" 
                      step="0.05" 
                      value={masterVolume}
                      onChange={handleVolumeChange}
                      className="w-full accent-brass"
                    />
                  </div>
                )}
              </div>
            </div>

            {/* CENTER COLUMN: THE MAIN STAGE AND PULL CORD */}
            <div className="lg:col-span-6 flex flex-col gap-5">
              
              {/* STAGE CONTAINER WITH PROSCENIUM BORDERS */}
              <div className="relative">
                
                {/* VELVET FRAME AND CAST SHADOW */}
                <div className="relative overflow-hidden rounded-xl border-[16px] border-velvet shadow-gilded bg-black aspect-[5/3] md:aspect-[5/3] w-full flex items-center justify-center">
                  
                  {/* CANVAS LAYERS */}
                  <canvas 
                    ref={canvasRef} 
                    onMouseMove={handleMouseMove}
                    onMouseLeave={handleMouseLeave}
                    className="w-full h-full cursor-crosshair relative block"
                  />

                  {/* LARGE CENTER CLOSED CURTAIN ENTER PROMPT */}
                  {curtainTarget === 0 && (
                    <div className="absolute inset-0 flex flex-col items-center justify-center bg-black/40 pointer-events-none text-center px-6">
                      <div className="bg-wood-dark/95 border-2 border-brass px-6 py-4 rounded-lg shadow-2xl animate-bounce max-w-xs pointer-events-auto cursor-pointer" onClick={toggleCurtains}>
                        <h3 className="font-cinzel text-brass font-black text-lg tracking-wider mb-1">
                          WEATHER MATINÉE
                        </h3>
                        <p className="font-sans text-xs text-stone-300">
                          Click to Pull Drawstring and Open Curtains
                        </p>
                      </div>
                    </div>
                  )}
                </div>

                {/* STAGE CORDS / DRAWSTRING PULL ROPE */}
                {/* Clickable cord hanging on the right outside proscenium */}
                <div 
                  onClick={toggleCurtains}
                  className="absolute right-[-4px] top-[15px] bottom-[25px] w-6 flex flex-col items-center cursor-pointer group pointer-events-auto"
                  title="Pull Stage Cord"
                >
                  {/* Drawstring rope */}
                  <div className="w-1 bg-amber-800/80 group-hover:bg-amber-600 h-full shadow-md rope-sway transition-colors duration-300"></div>
                  
                  {/* Hanging Tassel */}
                  <div className="w-4 h-9 bg-gradient-to-b from-brass-light via-brass to-brass-dark border border-wood-dark rounded shadow-lg group-hover:scale-125 transition-transform duration-300 flex items-center justify-center text-[8px] font-bold text-wood-dark font-cinzel">
                    🔔
                  </div>
                </div>

              </div>

              {/* SCENE TYPEWRITER TICKER */}
              <TypewriterSubtitle text={sceneData.subtitle} />

            </div>

            {/* RIGHT COLUMN: THE THEATRE PLAYBILL */}
            <div className="lg:col-span-3 flex flex-col gap-5">
              <div className={`p-5 rounded-lg border shadow-lg transition-colors duration-500 h-full flex flex-col ${
                isNight ? 'bg-stone-900 border-stone-800' : 'bg-parchment border-parchment-dark'
              }`}>
                <h2 className="font-cinzel font-black text-sm md:text-base border-b pb-2 mb-4 tracking-wider flex items-center gap-2">
                  <span className="text-brass">📜</span> DAILY PLAYBILL
                </h2>

                <div className="flex-grow flex flex-col gap-5">
                  
                  {/* PLAY DETAILS */}
                  <div className="border border-stone-300 dark:border-stone-800 p-3 rounded bg-black/10">
                    <span className="font-cinzel text-[10px] text-brass-dark dark:text-brass uppercase font-bold tracking-wider">Now Performing:</span>
                    <h3 className="font-playfair font-bold text-lg leading-tight mt-1 text-velvet-light dark:text-brass-light">
                      {sceneData.title}
                    </h3>
                  </div>

                  {/* FORECAST baseline selector (Remixes scenery types) */}
                  <div className="flex flex-col gap-1.5">
                    <span className="font-cinzel text-xs font-bold tracking-wider">Meteorological Script:</span>
                    <div className="grid grid-cols-2 gap-2 text-xs">
                      
                      {/* TEMPEST */}
                      <button 
                        onClick={() => setForecast('tempest')}
                        className={`py-2 px-1 text-center font-cinzel font-bold border rounded transition-all ${
                          forecast === 'tempest' 
                            ? 'bg-velvet border-velvet text-stone-100 ring-2 ring-brass/30' 
                            : 'bg-black/10 border-stone-300 dark:border-stone-800 hover:border-brass'
                        }`}
                      >
                        ⛈ Tempest
                      </button>

                      {/* MIST */}
                      <button 
                        onClick={() => setForecast('mist')}
                        className={`py-2 px-1 text-center font-cinzel font-bold border rounded transition-all ${
                          forecast === 'mist' 
                            ? 'bg-velvet border-velvet text-stone-100 ring-2 ring-brass/30' 
                            : 'bg-black/10 border-stone-300 dark:border-stone-800 hover:border-brass'
                        }`}
                      >
                        🌫 Mist
                      </button>

                      {/* SUN */}
                      <button 
                        onClick={() => setForecast('sun')}
                        className={`py-2 px-1 text-center font-cinzel font-bold border rounded transition-all ${
                          forecast === 'sun' 
                            ? 'bg-velvet border-velvet text-stone-100 ring-2 ring-brass/30' 
                            : 'bg-black/10 border-stone-300 dark:border-stone-800 hover:border-brass'
                        }`}
                      >
                        ☀️ Sunburst
                      </button>

                      {/* SNOW */}
                      <button 
                        onClick={() => setForecast('snow')}
                        className={`py-2 px-1 text-center font-cinzel font-bold border rounded transition-all ${
                          forecast === 'snow' 
                            ? 'bg-velvet border-velvet text-stone-100 ring-2 ring-brass/30' 
                            : 'bg-black/10 border-stone-300 dark:border-stone-800 hover:border-brass'
                        }`}
                      >
                        ❄️ Winter
                      </button>

                    </div>
                  </div>

                  {/* SPECIAL STAGE TRIGGER COMMANDS */}
                  <div className="flex flex-col gap-2 pt-2 border-t border-stone-300 dark:border-stone-800">
                    <span className="font-cinzel text-xs font-bold tracking-wider">Special Stage Trigger:</span>
                    
                    {/* Lightning Strike Button */}
                    <button
                      onClick={triggerLightning}
                      disabled={curtainTarget === 0}
                      className={`py-2 px-4 rounded font-cinzel text-xs font-black shadow transition-all flex items-center justify-center gap-2 ${
                        curtainTarget === 0
                          ? 'bg-stone-400 dark:bg-stone-800 text-stone-500 cursor-not-allowed border border-transparent'
                          : 'bg-gradient-to-r from-brass to-brass-dark hover:from-brass-light hover:to-brass text-wood-dark border-b-4 border-brass-dark hover:border-b-2 hover:translate-y-[2px]'
                      }`}
                    >
                      ⚡️ CAST JAGGED LIGHTNING
                    </button>

                    {/* Spotlight toggler */}
                    <button
                      onClick={() => setVolumetricLight(prev => !prev)}
                      className={`py-2 px-4 rounded font-cinzel text-xs border tracking-wider transition-all ${
                        volumetricLight 
                          ? 'bg-brass/10 border-brass text-brass font-bold' 
                          : 'bg-black/10 border-stone-300 dark:border-stone-800 text-stone-400'
                      }`}
                    >
                      💡 {volumetricLight ? "Disable Atmospheric Volumetrics" : "Enable Atmospheric Volumetrics"}
                    </button>
                  </div>

                </div>

                {/* THEATRE CREDITS */}
                <div className="mt-6 border-t border-dashed border-stone-400 dark:border-stone-800 pt-3 text-center">
                  <span className="font-cinzel text-[9px] uppercase tracking-widest text-stone-400 block">
                    Scenic Production Block
                  </span>
                  <span className="font-cinzel text-[10px] text-brass block font-bold mt-1">
                    No External API Dependents
                  </span>
                </div>
              </div>
            </div>

          </main>

          {/* FOOTER BAR */}
          <footer className={`py-4 px-6 border-t text-center font-cinzel text-[10px] tracking-wider transition-colors duration-500 mt-auto ${
            isNight ? 'bg-stone-900 border-stone-800 text-stone-400' : 'bg-parchment-light border-parchment-dark text-stone-500'
          }`}>
            <p>© 2026 Weather Theatre Corp. Handcrafted with HTML5, React, Canvas, and Web Audio API.</p>
          </footer>

        </div>
      );
    }

    // Render App into DOM
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<WeatherTheatreApp />);
  </script>

</body>
</html>
