            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes fade-in {
            from { opacity: 0; }

        }

        const THEME_PRESETS = [
            { name: "Classic Mono", fg: "#000000", fgEnd: "#000000", fgType: "solid", bg: "#FFFFFF", bgEnd: "#FFFFFF", bgType: "solid", dark: false },
            { name: "Midnight Glow", fg: "#06b6d4", fgEnd: "#3b82f6", fgType: "linear", bg: "#0f172a", bgEnd: "#1e293b", bgType: "solid", dark: true },

            { name: "Sakura Breeze", fg: "#ec4899", fgEnd: "#f43f5e", fgType: "linear", bg: "#ffffff", bgEnd: "#fdf2f8", bgType: "linear", dark: false },
        ];

        // Color helper functions
        function hexToRgb(hex) {
            const shorthandRegex = /^#?([a-f\d])([a-f\d])([a-f\d])$/i;
            const fullHex = hex.replace(shorthandRegex, (m, r, g, b) => r + r + g + g + b + b);
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(fullHex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : { r: 0, g: 0, b: 0 };
        }

        function getRelativeLuminance(rgb) {
            const rs = rgb.r / 255;
            const gs = rgb.g / 255;
            const bs = rgb.b / 255;

            const R = rs <= 0.03928 ? rs / 12.92 : Math.pow((rs + 0.055) / 1.055, 2.4);
            const G = gs <= 0.03928 ? gs / 12.92 : Math.pow((gs + 0.055) / 1.055, 2.4);
            const B = bs <= 0.03928 ? bs / 12.92 : Math.pow((bs + 0.055) / 1.055, 2.4);

            return 0.2126 * R + 0.7152 * G + 0.0722 * B;
        }

        function getContrastRatio(fgHex, bgHex, bgType) {
            if (bgType === 'transparent') {
                bgHex = '#ffffff'; // assume white bg for contrast calculations
            }
            const fgRgb = hexToRgb(fgHex);
            const bgRgb = hexToRgb(bgHex);

            const fgL = getRelativeLuminance(fgRgb);
            const bgL = getRelativeLuminance(bgRgb);

            const L1 = Math.max(fgL, bgL);
            const L2 = Math.min(fgL, bgL);

            return (L1 + 0.05) / (L2 + 0.05);
        }

        function App() {
            // App settings state
            const [theme, setTheme] = useState('dark');
            const [activeTab, setActiveTab] = useState('content');
            
            // Content fields state
            const [contentType, setContentType] = useState('url');
            const [rawText, setRawText] = useState('https://github.com');
            const [wifiSSID, setWifiSSID] = useState('MyHomeWiFi');
            const [wifiPassword, setWifiPassword] = useState('SuperSecretPass');
            const [wifiSecurity, setWifiSecurity] = useState('WPA');
            const [wifiHidden, setWifiHidden] = useState(false);
            const [emailTo, setEmailTo] = useState('hello@domain.com');
            const [emailSubject, setEmailSubject] = useState('Inquiry');
            const [emailBody, setEmailBody] = useState('Hello, I am interested in...');
            const [phoneNum, setPhoneNum] = useState('+1234567890');
            const [smsBody, setSmsBody] = useState('Prefilled SMS text');
            const [vcardFirst, setVcardFirst] = useState('John');
            const [vcardLast, setVcardLast] = useState('Doe');
            const [vcardOrg, setVcardOrg] = useState('Innovate Corp');
            const [vcardTitle, setVcardTitle] = useState('Lead Architect');
            const [vcardPhone, setVcardPhone] = useState('+1555123456');
            const [vcardEmail, setVcardEmail] = useState('john.doe@innovate.com');
            const [vcardUrl, setVcardUrl] = useState('https://innovate.com');
            const [vcardAddress, setVcardAddress] = useState('123 Tech Way, SF, CA');

            // Style configuration states
            const [dotsStyle, setDotsStyle] = useState('rounded'); // 'square', 'dots', 'rounded', 'extra-rounded', 'classy-lines'
            const [cornerOuterStyle, setCornerOuterStyle] = useState('rounded'); // 'square', 'rounded', 'circle', 'leaf', 'shield'
            const [cornerInnerStyle, setCornerInnerStyle] = useState('rounded'); // 'square', 'rounded', 'circle', 'leaf', 'star'
            const [ecl, setEcl] = useState('H'); // L, M, Q, H

            // Colors state
            const [bgColorType, setBgColorType] = useState('solid'); // 'solid', 'linear', 'radial', 'transparent'
            const [bgColor, setBgColor] = useState('#0f172a');
            const [bgColorEnd, setBgColorEnd] = useState('#1e293b');
            const [bgAngle, setBgAngle] = useState(135);

            const [fgColorType, setFgColorType] = useState('linear'); // 'solid', 'linear', 'radial'
            const [fgColor, setFgColor] = useState('#06b6d4');
            const [fgColorEnd, setFgColorEnd] = useState('#3b82f6');
            const [fgAngle, setFgAngle] = useState(135);

            const [customCornerColors, setCustomCornerColors] = useState(false);
            const [cornerOuterColor, setCornerOuterColor] = useState('#06b6d4');
            const [cornerInnerColor, setCornerInnerColor] = useState('#3b82f6');

            // Logo Branding state
            const [logoType, setLogoType] = useState('preset'); // 'none', 'preset', 'upload'
            const [logoPreset, setLogoPreset] = useState('github');
            const [logoUploadDataUrl, setLogoUploadDataUrl] = useState('');
            const [logoScale, setLogoScale] = useState(0.18);
            const [logoClearSpace, setLogoClearSpace] = useState(true);

            // Export options state
            const [exportSize, setExportSize] = useState(1024); // 1024, 2048, 4096

            // UI helper state
            const [toast, setToast] = useState({ show: false, message: '', type: 'success' });
            
            const canvasRef = useRef(null);

            // Trigger Toast notifications
            const showToast = (message, type = 'success') => {
                setToast({ show: true, message, type });
                setTimeout(() => setToast({ show: false, message: '', type: 'success' }), 3000);
            };

            // Dynamic Dark Theme Handler
            useEffect(() => {
                if (theme === 'dark') {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            }, [theme]);

            // Compose raw QR content based on selection
            const generatedQRContent = useMemo(() => {
                switch (contentType) {
                    case 'wifi':
                        const hiddenPart = wifiHidden ? 'H:true;' : '';
                        const passwordPart = wifiSecurity !== 'nopass' ? `P:${wifiPassword};` : '';
                        return `WIFI:S:${wifiSSID};T:${wifiSecurity};${passwordPart}${hiddenPart};`;
                    case 'email':
                        return `mailto:${emailTo}?subject=${encodeURIComponent(emailSubject)}&body=${encodeURIComponent(emailBody)}`;
                    case 'phone':
                        if (smsBody) {
                            return `SMSTO:${phoneNum}:${smsBody}`;
                        }
                        return `tel:${phoneNum}`;
                    case 'vcard':
                        return `BEGIN:VCARD\nVERSION:3.0\nN:${vcardLast};${vcardFirst};;;\nFN:${vcardFirst} ${vcardLast}\nORG:${vcardOrg}\nTITLE:${vcardTitle}\nTEL;TYPE=CELL:${vcardPhone}\nEMAIL;TYPE=PREF,INTERNET:${vcardEmail}\nURL:${vcardUrl}\nADR;TYPE=WORK:;;${vcardAddress};;;;\nEND:VCARD`;
                    case 'url':
                    default:
                        return rawText;
                }
            }, [contentType, rawText, wifiSSID, wifiPassword, wifiSecurity, wifiHidden, emailTo, emailSubject, emailBody, phoneNum, smsBody, vcardFirst, vcardLast, vcardOrg, vcardTitle, vcardPhone, vcardEmail, vcardUrl, vcardAddress]);

            // Calculate WCAG contrast score & live scan safety feedback
            const contrastMetrics = useMemo(() => {
                const ratio = getContrastRatio(fgColor, bgColor, bgColorType);
                let score = "Excellent";
                let colorClass = "text-emerald-500 dark:text-emerald-400";
                let bgClass = "bg-emerald-500/15 border-emerald-500/30";

                if (ratio < 3.0) {
                    score = "Poor Scan Risk";
                    colorClass = "text-rose-500 dark:text-rose-400";
                    bgClass = "bg-rose-500/15 border-rose-500/30";
                } else if (ratio < 4.5) {
                    score = "Good (Medium Contrast)";
                    colorClass = "text-amber-500 dark:text-amber-400";
                    bgClass = "bg-amber-500/15 border-amber-500/30";
                }

                const warnings = [];
                if (ratio < 4.5 && bgColorType !== 'transparent') {
                    warnings.push("Contrast ratio is low. Consider darkening foreground or lightening background for reliable outdoor scanning.");
                }
                if (logoType !== 'none' && ecl !== 'H') {
                    warnings.push("You are using a center logo. Set Error Correction to 'High (30%)' in the Style tab to ensure perfect scannability!");
                }
                if ((dotsStyle === 'dots' || dotsStyle === 'classy-lines') && ecl === 'L') {
                    warnings.push("Rounded module styles reduce scanning density tolerance. Recommend raising Error Correction level.");
                }

                return { ratio, score, colorClass, bgClass, warnings };
            }, [fgColor, bgColor, bgColorType, logoType, ecl, dotsStyle]);

            // Apply Theme Preset helper
            const applyPreset = (preset) => {
                setBgColor(preset.bg);
                setBgColorEnd(preset.bgEnd);
                setBgColorType(preset.bgType);
                setFgColor(preset.fg);
                setFgColorEnd(preset.fgEnd);
                setFgColorType(preset.fgType);
                setTheme(preset.dark ? 'dark' : 'light');
                showToast(`Applied preset: ${preset.name}`);
            };

            // Custom local image file uploader
            const handleLogoUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        setLogoUploadDataUrl(event.target.result);
                        setLogoType('upload');
                        showToast("Logo uploaded successfully!");
                    };
                    reader.readAsDataURL(file);
                }
            };

            // Live high-fidelity rendering pipeline using canvas API
            useEffect(() => {
                if (!canvasRef.current) return;

                // Load appropriate logo image if configured
                let logoImage = null;
                const renderWithLogo = () => {
                    try {
                        const qr = QRCode.create(generatedQRContent, { errorCorrectionLevel: ecl });
                        drawQRCodeOnCanvas(canvasRef.current, qr, logoImage);
                    } catch (err) {
                        console.error("QR drawing failure: ", err);
                    }
                };

                if (logoType === 'preset' && PRESET_LOGOS[logoPreset]) {
                    logoImage = new Image();
                    logoImage.onload = renderWithLogo;
                    logoImage.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(PRESET_LOGOS[logoPreset]);
                } else if (logoType === 'upload' && logoUploadDataUrl) {
                    logoImage = new Image();
                    logoImage.onload = renderWithLogo;
                    logoImage.src = logoUploadDataUrl;
                } else {
                    renderWithLogo();
                }
            }, [
                generatedQRContent, dotsStyle, cornerOuterStyle, cornerInnerStyle, ecl,
                bgColorType, bgColor, bgColorEnd, bgAngle,
                fgColorType, fgColor, fgColorEnd, fgAngle,
                customCornerColors, cornerOuterColor, cornerInnerColor,
                logoType, logoPreset, logoUploadDataUrl, logoScale, logoClearSpace, exportSize
            ]);

            // The main high-fidelity drawing logic
            const drawQRCodeOnCanvas = (canvas, qr, logoImg) => {
                const ctx = canvas.getContext('2d');
                const size = qr.modules.size;
                
                // Set high internal dimensions for crisp exports and display
                canvas.width = exportSize;
                canvas.height = exportSize;

                // Clear entire canvas
                ctx.clearRect(0, 0, exportSize, exportSize);

                // 1. Render Background
                if (bgColorType !== 'transparent') {
                    ctx.fillStyle = bgColor;
                    ctx.fillRect(0, 0, exportSize, exportSize);

                    if (bgColorType === 'linear') {
                        const angleRad = (bgAngle * Math.PI) / 180;
                        const x1 = exportSize / 2 - (Math.cos(angleRad) * exportSize) / 2;
                        const y1 = exportSize / 2 - (Math.sin(angleRad) * exportSize) / 2;
                        const x2 = exportSize / 2 + (Math.cos(angleRad) * exportSize) / 2;
                        const y2 = exportSize / 2 + (Math.sin(angleRad) * exportSize) / 2;
                        const grad = ctx.createLinearGradient(x1, y1, x2, y2);
                        grad.addColorStop(0, bgColor);
                        grad.addColorStop(1, bgColorEnd);
                        ctx.fillStyle = grad;
                        ctx.fillRect(0, 0, exportSize, exportSize);
                    } else if (bgColorType === 'radial') {
                        const grad = ctx.createRadialGradient(
                            exportSize / 2, exportSize / 2, 0,
                            exportSize / 2, exportSize / 2, exportSize * 0.7
                        );
                        grad.addColorStop(0, bgColor);
                        grad.addColorStop(1, bgColorEnd);
                        ctx.fillStyle = grad;
                        ctx.fillRect(0, 0, exportSize, exportSize);
                    }
                }

                // 2. Setup Foreground/Module Brush
                const padding = exportSize * 0.08; // dynamic padding
                const qrSize = exportSize - padding * 2;
                const cellSize = qrSize / size;

                let fgBrush = fgColor;
                if (fgColorType === 'linear') {
                    const angleRad = (fgAngle * Math.PI) / 180;
                    const x1 = padding + qrSize / 2 - (Math.cos(angleRad) * qrSize) / 2;
                    const y1 = padding + qrSize / 2 - (Math.sin(angleRad) * qrSize) / 2;
                    const x2 = padding + qrSize / 2 + (Math.cos(angleRad) * qrSize) / 2;
                    const y2 = padding + qrSize / 2 + (Math.sin(angleRad) * qrSize) / 2;
                    const grad = ctx.createLinearGradient(x1, y1, x2, y2);
                    grad.addColorStop(0, fgColor);
                    grad.addColorStop(1, fgColorEnd);
                    fgBrush = grad;
                } else if (fgColorType === 'radial') {
                    const grad = ctx.createRadialGradient(
                        padding + qrSize / 2, padding + qrSize / 2, 0,
                        padding + qrSize / 2, padding + qrSize / 2, qrSize * 0.7
                    );
                    grad.addColorStop(0, fgColor);
                    grad.addColorStop(1, fgColorEnd);
                    fgBrush = grad;
                }

                // Utility: Draw Round Rect path
                const drawRoundRect = (cPath, rx, ry, w, h, r) => {
                    let rObj = typeof r === 'number' ? { tl: r, tr: r, br: r, bl: r } : r;
                    cPath.moveTo(rx + rObj.tl, ry);
                    cPath.lineTo(rx + w - rObj.tr, ry);
                    cPath.arcTo(rx + w, ry, rx + w, ry + rObj.tr, rObj.tr);
                    cPath.lineTo(rx + w, ry + h - rObj.br);
                    cPath.arcTo(rx + w, ry + h, rx + w - rObj.br, ry + h, rObj.br);
                    cPath.lineTo(rx + rObj.bl, ry + h);
                    cPath.arcTo(rx, ry + h, rx, ry + h - rObj.bl, rObj.bl);
                    cPath.lineTo(rx, ry + rObj.tl);
                    cPath.arcTo(rx, ry, rx + rObj.tl, ry, rObj.tl);
                    cPath.closePath();
                };

                // 3. Draw Data Grid
                for (let r = 0; r < size; r++) {
                    for (let c = 0; c < size; c++) {
                        // Skip Finder Patterns - we style and render them separately
                        const isTopLeft = r < 7 && c < 7;
                        const isTopRight = r < 7 && c >= size - 7;
                        const isBottomLeft = r >= size - 7 && c < 7;
                        if (isTopLeft || isTopRight || isBottomLeft) continue;

                        // Check module state (active / inactive)
                        const isActive = typeof qr.modules.get === 'function' 
                            ? qr.modules.get(r, c) 
                            : qr.modules.data[r * size + c];
                        if (!isActive) continue;

                        // Background subtraction zone for center logo
                        if (logoClearSpace && logoImg) {
                            const centerMin = (size * (1 - logoScale)) / 2 - 0.7;
                            const centerMax = (size * (1 + logoScale)) / 2 - 0.3;
                            if (r >= centerMin && r <= centerMax && c >= centerMin && c <= centerMax) {
                                continue;
                            }
                        }

                        // Coordinates on canvas
                        const x = padding + c * cellSize;
                        const y = padding + r * cellSize;

                        ctx.fillStyle = fgBrush;
                        ctx.beginPath();

                        if (dotsStyle === 'dots') {
                            ctx.arc(x + cellSize / 2, y + cellSize / 2, cellSize * 0.42, 0, Math.PI * 2);
                            ctx.fill();
                        } else if (dotsStyle === 'rounded') {
                            drawRoundRect(ctx, x + cellSize * 0.05, y + cellSize * 0.05, cellSize * 0.9, cellSize * 0.9, cellSize * 0.25);
                            ctx.fill();
                        } else if (dotsStyle === 'extra-rounded') {
                            drawRoundRect(ctx, x + cellSize * 0.05, y + cellSize * 0.05, cellSize * 0.9, cellSize * 0.9, cellSize * 0.45);
                            ctx.fill();
                        } else if (dotsStyle === 'classy-lines') {
                            // Connected neighbors drawing pipeline
                            const checkCell = (row, col) => {
                                if (row < 0 || row >= size || col < 0 || col >= size) return false;
                                if (row < 7 && col < 7) return false;
                                if (row < 7 && col >= size - 7) return false;
                                if (row >= size - 7 && col < 7) return false;
                                return typeof qr.modules.get === 'function' 
                                    ? qr.modules.get(row, col) 
                                    : qr.modules.data[row * size + col];
                            };

                            const hasTop = checkCell(r - 1, c);
                            const hasBottom = checkCell(r + 1, c);
                            const hasLeft = checkCell(r, c - 1);
                            const hasRight = checkCell(r, c + 1);

                            const radius = cellSize * 0.45;
                            const rTopLeft = (hasTop || hasLeft) ? 0 : radius;
                            const rTopRight = (hasTop || hasRight) ? 0 : radius;
                            const rBottomLeft = (hasBottom || hasLeft) ? 0 : radius;
                            const rBottomRight = (hasBottom || hasRight) ? 0 : radius;

                            drawRoundRect(ctx, x, y, cellSize, cellSize, {
                                tl: rTopLeft, tr: rTopRight, bl: rBottomLeft, br: rBottomRight
                            });
                            ctx.fill();
                        } else {
                            // Classic crisp block
                            ctx.fillRect(x, y, cellSize, cellSize);
                        }
                    }
                }

                // 4. Draw Customized Corners Finder
                const drawCornerFinder = (colOffset, rowOffset) => {
                    const cx = padding + colOffset * cellSize;
                    const cy = padding + rowOffset * cellSize;
                    const fWidth = cellSize * 7;
                    const strokeWidth = cellSize;
                    
                    ctx.save();
                    
                    // Outer frame style
                    ctx.strokeStyle = customCornerColors ? cornerOuterColor : fgBrush;
                    ctx.lineWidth = strokeWidth;

                    const rx = cx + strokeWidth / 2;
                    const ry = cy + strokeWidth / 2;
                    const rw = fWidth - strokeWidth;
                    const rh = fWidth - strokeWidth;

                    ctx.beginPath();
                    if (cornerOuterStyle === 'rounded') {
                        drawRoundRect(ctx, rx, ry, rw, rh, cellSize * 1.5);
                    } else if (cornerOuterStyle === 'circle') {
                        ctx.arc(cx + fWidth / 2, cy + fWidth / 2, (fWidth - strokeWidth) / 2, 0, Math.PI * 2);
                    } else if (cornerOuterStyle === 'leaf') {
                        const r = rw / 2;
                        ctx.moveTo(rx, ry); // Sharp top-left
                        ctx.lineTo(rx + rw - r, ry);
                        ctx.arcTo(rx + rw, ry, rx + rw, ry + r, r);
                        ctx.lineTo(rx + rw, ry + rh); // Sharp bottom-right
                        ctx.lineTo(rx + r, ry + rh);
                        ctx.arcTo(rx, ry + rh, rx, ry + rh - r, r);
                        ctx.lineTo(rx, ry);
                        ctx.closePath();
                    } else if (cornerOuterStyle === 'shield') {
                        const rSmall = rw * 0.15;
                        const rLarge = rw * 0.45;
                        ctx.moveTo(rx + rSmall, ry);
                        ctx.lineTo(rx + rw - rSmall, ry);
                        ctx.arcTo(rx + rw, ry, rx + rw, ry + rSmall, rSmall);
                        ctx.lineTo(rx + rw, ry + rh - rLarge);
                        ctx.arcTo(rx + rw, ry + rh, rx + rw - rLarge, ry + rh, rLarge);
                        ctx.lineTo(rx + rLarge, ry + rh);
                        ctx.arcTo(rx, ry + rh, rx, ry + rh - rLarge, rLarge);
                        ctx.lineTo(rx, ry + rSmall);
                        ctx.arcTo(rx, ry, rx + rSmall, ry, rSmall);
                        ctx.closePath();
                    } else {
                        // Standard Square Frame
                        ctx.rect(rx, ry, rw, rh);
                    }
                    ctx.stroke();

                    // Inner Dot style
                    ctx.fillStyle = customCornerColors ? cornerInnerColor : fgBrush;
                    const ix = cx + cellSize * 2;
                    const iy = cy + cellSize * 2;
                    const iw = cellSize * 3;

                    ctx.beginPath();
                    if (cornerInnerStyle === 'rounded') {
                        drawRoundRect(ctx, ix, iy, iw, iw, cellSize * 0.8);
                        ctx.fill();
                    } else if (cornerInnerStyle === 'circle') {
                        ctx.arc(ix + iw / 2, iy + iw / 2, iw / 2, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (cornerInnerStyle === 'leaf') {
                        const r = iw / 2;
                        ctx.moveTo(ix, iy); // Sharp top-left
                        ctx.lineTo(ix + iw - r, iy);
                        ctx.arcTo(ix + iw, iy, ix + iw, iy + r, r);
                        ctx.lineTo(ix + iw, iy + iw); // Sharp bottom-right
                        ctx.lineTo(ix + r, iy + iw);
                        ctx.arcTo(ix, iy + iw, ix, iy + iw - r, r);
                        ctx.lineTo(ix, iy);
                        ctx.closePath();
                        ctx.fill();
                    } else if (cornerInnerStyle === 'star') {
                        // Diamond cut
                        ctx.moveTo(ix + iw / 2, iy);
                        ctx.lineTo(ix + iw, iy + iw / 2);
                        ctx.lineTo(ix + iw / 2, iy + iw);
                        ctx.lineTo(ix, iy + iw / 2);
                        ctx.closePath();
                        ctx.fill();
                    } else {
                        // Square Inner Dot
                        ctx.fillRect(ix, iy, iw, iw);
                    }

                    ctx.restore();
                };

                drawCornerFinder(0, 0); // Top-Left
                drawCornerFinder(size - 7, 0); // Top-Right
                drawCornerFinder(0, size - 7); // Bottom-Left

                // 5. Draw Branding Logo overlay
                if (logoImg) {
                    const lSize = qrSize * logoScale;
                    const lx = padding + (qrSize - lSize) / 2;
                    const ly = padding + (qrSize - lSize) / 2;

                    if (logoClearSpace) {
                        ctx.fillStyle = bgColorType === 'transparent' ? '#ffffff' : bgColor;
                        if (bgColorType === 'linear' || bgColorType === 'radial') {
                            // Draw background matching gradient or just use BgColor for simplicity
                            ctx.fillStyle = bgColor;
                        }

                        const borderPadding = cellSize * 0.75;
                        const bx = lx - borderPadding;
                        const by = ly - borderPadding;
                        const bw = lSize + borderPadding * 2;
                        
                        ctx.beginPath();
                        drawRoundRect(ctx, bx, by, bw, bw, bw * 0.22);
                        ctx.fill();

                        // Aesthetic thin border around logo container
                        ctx.lineWidth = cellSize * 0.2;
                        ctx.strokeStyle = customCornerColors ? cornerOuterColor : fgBrush;
                        ctx.beginPath();
                        drawRoundRect(ctx, bx, by, bw, bw, bw * 0.22);
                        ctx.stroke();
                    }

                    try {
                        ctx.drawImage(logoImg, lx, ly, lSize, lSize);
                    } catch (err) {
                        console.error("Image render crash: ", err);
                    }
                }
            };

            // Download Trigger
            const downloadPNG = () => {
                if (!canvasRef.current) return;
                const url = canvasRef.current.toDataURL("image/png");
                const link = document.createElement('a');
                link.download = `custom_qr_${contentType}_${exportSize}px.png`;

            // Copy PNG to Clipboard
            const copyToClipboard = () => {

                        if (blob) {
                            navigator.clipboard.write([
                                new ClipboardItem({ 'image/png': blob })

                                showToast("QR Code copied to clipboard!");

                                console.error("Clipboard blocked: ", err);
                                showToast("Clipboard write error. Please try downloading.", "error");
                            });
                        }

            // Settings reset
            const handleReset = () => {

                setCornerInnerStyle('rounded');
                setEcl('H');
                setBgColorType('solid');
                setBgColor('#0f172a');
                setFgColorType('linear');
                setFgColor('#06b6d4');
                setFgColorEnd('#3b82f6');
                setCustomCornerColors(false);
                setLogoType('none');
                showToast("Configuration reset to default.");
            };

            return (
                <div className="flex-grow flex flex-col bg-slate-900 text-slate-100 transition-colors duration-200">
                    
                    {/* Header */}
                    <header className="border-b border-slate-800 bg-slate-900/80 backdrop-blur-md sticky top-0 z-50 px-6 py-4 flex items-center justify-between">

                            <div className="w-10 h-10 bg-gradient-to-tr from-brand-600 to-indigo-500 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/20">
                                <svg className="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h2M4 8h16M4 16h16" />
                                </svg>
                            </div>
                            <div>
                                <h1 className="text-xl font-bold tracking-tight text-white flex items-center gap-2">
                                    QRCraft <span className="text-xs bg-indigo-500/15 text-indigo-400 font-semibold px-2 py-0.5 rounded-full border border-indigo-500/30">PRO</span>
                                </h1>
                                <p className="text-xs text-slate-400 hidden sm:block">Custom Designer QR Code Platform</p>
                            </div>
                        </div>

                        {/* Top controls */}
                        <div className="flex items-center space-x-4">

                                onClick={() => applyPreset(THEME_PRESETS[Math.floor(Math.random() * THEME_PRESETS.length)])}
                                className="text-xs bg-slate-800 hover:bg-slate-700 text-slate-300 font-medium px-3 py-2 rounded-lg transition border border-slate-700 flex items-center space-x-1.5"
                            >
                                <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" />

                                        >
                                            <span 
                                                className="w-3.5 h-3.5 rounded-full inline-block shadow-sm"

                                                            </svg>
                                                            <p className="text-xs font-medium text-slate-300">Click to upload, or drag logo image here</p>
                                                            <p className="text-[10px] text-slate-500 mt-0.5">PNG, JPG or SVG formats (Square ratio works best)</p>
                                                        </div>
                                                        <input type="file" accept="image/*" className="hidden" onChange={handleLogoUpload} />
                                                    </label>
                                                </div>
                                                {logoUploadDataUrl && (
                                                    <div className="flex items-center space-x-2 bg-slate-950/80 p-2 rounded-lg border border-slate-800 max-w-xs">
                                                        <img src={logoUploadDataUrl} className="w-8 h-8 rounded object-cover" alt="Custom upload thumbnail" />
                                                        <span className="text-[11px] text-slate-400 truncate flex-grow">custom_logo_loaded.png</span>
                                                        <button onClick={() => setLogoUploadDataUrl('')} className="text-rose-400 hover:text-rose-300 text-xs px-2 py-1">Clear</button>
                                                    </div>
                                                )}
                                            </div>
                                        )}

                                        {/* Logo Dimension Controls */}
                                        {logoType !== 'none' && (
                                            <div className="border-t border-slate-800/80 pt-4 space-y-3.5">
                                                <div className="space-y-1">
                                                    <div className="flex justify-between text-xs font-semibold">
                                                        <span className="text-slate-400 uppercase tracking-wider">Logo Scale (Center Size)</span>
                                                        <span className="text-indigo-400">{Math.round(logoScale * 100)}%</span>
                                                    </div>
                                                    <input type="range" min="0.08" max="0.26" step="0.01" value={logoScale} onChange={(e) => setLogoScale(parseFloat(e.target.value))} className="w-full" />
                                                    <p className="text-[11px] text-slate-500">Keep logos below 20% size unless you use High Density (H) error correction to prevent scanning issues.</p>
                                                </div>

                                                <div className="flex items-center space-x-2.5 bg-slate-900/40 p-3 rounded-xl border border-slate-800/60">
                                                    <input 
                                                        type="checkbox" 
                                                        id="logoClear" 
                                                        checked={logoClearSpace} 
                                                        onChange={(e) => setLogoClearSpace(e.target.checked)}
                                                        className="w-4 h-4 text-indigo-600 bg-slate-950 border-slate-800 rounded focus:ring-indigo-500"
                                                    />
                                                    <div className="select-none cursor-pointer">
                                                        <label htmlFor="logoClear" className="text-xs font-bold text-slate-300 select-none cursor-pointer">Subtract Blocks Behind Logo</label>
                                                        <p className="text-[10px] text-slate-500">Clears grid squares under the logo container to make it pop and scan flawlessly.</p>
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                )}

                                {/* TAB 5: Export Settings */}
                                {activeTab === 'export' && (
                                    <div className="space-y-5 animate-fade-in">
                                        <div>
                                            <label className="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2.5">Resolution / Size Selection</label>
                                            <div className="grid grid-cols-3 gap-3">
                                                {[
                                                    { size: 1024, label: 'Standard', desc: '1024 x 1024 px' },
                                                    { size: 2048, label: 'High-Def', desc: '2048 x 2048 px' },
                                                    { size: 4096, label: 'Print Quality', desc: '4096 x 4096 px' }
                                                ].map((opt) => (
                                                    <button
                                                        key={opt.size}
                                                        onClick={() => setExportSize(opt.size)}
                                                        className={`py-3 px-3 rounded-xl font-semibold border flex flex-col items-center justify-center space-y-1 transition ${exportSize === opt.size ? 'bg-indigo-600 border-indigo-500 text-white shadow-md' : 'bg-slate-900 border-slate-800 text-slate-300 hover:bg-slate-800'}`}
                                                    >
                                                        <span className="text-xs">{opt.label}</span>
                                                        <span className="text-[9px] font-normal text-slate-400 truncate">{opt.desc}</span>
                                                    </button>
                                                ))}
                                            </div>
                                        </div>

                                        <div className="border-t border-slate-800/80 pt-4 space-y-3">
                                            <h4 className="text-xs font-semibold text-slate-400 uppercase tracking-wider">Export Recommendations</h4>
                                            <ul className="text-[11px] text-slate-400 space-y-2 list-disc pl-4 leading-relaxed">
                                                <li><strong>Standard (1024px)</strong> is optimal for emails, social media posts, and websites.</li>
                                                <li><strong>High-Def (2048px)</strong> is highly recommended for high-res presentations, billboards, or menu boards.</li>
                                                <li><strong>Print Quality (4096px)</strong> provides pixel-perfect high-dpi density, perfect for printing on business cards, clothing, flyers, or merchandise with zero pixelation.</li>
                                                <li>Transparent backgrounds work beautifully but require sufficient contrast on whichever surface they are placed.</li>
                                            </ul>
                                        </div>
                                    </div>
                                )}

                                {/* Help & Footer within Tab box */}
                                <div className="border-t border-slate-800 pt-4 mt-6 flex items-center justify-between text-[11px] text-slate-500">
                                    <span>Built fully self-contained offline</span>
                                    <span>v1.2 Premium</span>
                                </div>
                            </div>
                        </div>

                        {/* RIGHT COLUMN: Sticky Live Preview Panel */}
                        <div className="lg:col-span-5 flex flex-col items-center space-y-6 lg:sticky lg:top-[92px] lg:self-start">
                            
                            {/* The Floating Glass Phone Frame */}
                            <div className="w-full max-w-xs sm:max-w-sm bg-gradient-to-b from-slate-900 to-slate-950 p-6 rounded-[36px] shadow-2xl shadow-indigo-500/10 border border-slate-800 relative overflow-hidden group">
                                
                                {/* Top mobile camera notch design element */}
                                <div className="absolute top-2 left-1/2 transform -translate-x-1/2 w-28 h-4 bg-slate-950 rounded-full flex items-center justify-center border border-slate-800">
                                    <div className="w-3 h-3 rounded-full bg-indigo-900/60 mr-1.5" />
                                    <div className="w-1.5 h-1.5 rounded-full bg-slate-900" />
                                </div>

                                {/* Blinking Live scanning badge */}
                                <div className="flex justify-between items-center mt-2.5 mb-5 px-1 text-[11px] font-semibold text-slate-400">
                                    <span className="flex items-center gap-1.5 bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 px-2.5 py-1 rounded-full">
                                        <span className="w-2 h-2 rounded-full bg-indigo-400 animate-pulse inline-block" />
                                        LIVE PREVIEW
                                    </span>
                                    <span>{exportSize}px Export ready</span>
                                </div>

                                {/* Main Canvas Wrapper */}
                                <div className="aspect-square w-full bg-slate-900 rounded-[28px] p-4 border border-slate-800 flex items-center justify-center shadow-inner relative overflow-hidden">
                                    <canvas 
                                        ref={canvasRef}
                                        className="w-full h-full object-contain rounded-2xl shadow-xl transition-all duration-300 hover:scale-[1.01]"
                                        style={{ maxWidth: '100%', maxHeight: '100%' }}
                                    />
                                </div>

                                {/* Content quick stats summary */}
                                <div className="mt-4 px-1 text-center space-y-0.5 border-b border-slate-800 pb-3">
                                    <h4 className="text-xs font-semibold text-slate-300 uppercase tracking-wide truncate">
                                        {contentType === 'url' ? 'Link Content' : contentType === 'wifi' ? 'WiFi Settings' : contentType === 'email' ? 'Email Prompt' : contentType === 'phone' ? 'Phone / SMS' : 'vCard File'}
                                    </h4>
                                    <p className="text-[10px] text-slate-500 truncate max-w-[240px] mx-auto font-mono">
                                        {generatedQRContent}
                                    </p>
                                </div>

                                {/* SCANNABILITY & CONTRAST SCORE BOARD */}
                                <div className={`mt-3 p-3 rounded-xl border text-[11px] space-y-1 transition ${contrastMetrics.bgClass}`}>
                                    <div className="flex items-center justify-between">
                                        <span className="font-bold uppercase tracking-wider text-slate-300">Scannability Rating:</span>
                                        <span className={`font-black uppercase tracking-widest ${contrastMetrics.colorClass}`}>{contrastMetrics.score}</span>
                                    </div>
                                    <div className="flex justify-between text-slate-400">
                                        <span>WCAG Luminance Contrast:</span>
                                        <span className="font-bold">{contrastMetrics.ratio.toFixed(2)} : 1</span>
                                    </div>
                                    {contrastMetrics.warnings.length > 0 && (
                                        <div className="border-t border-slate-800 pt-1.5 mt-1 text-[10px] text-slate-400 space-y-1 leading-relaxed list-none pl-0">
                                            {contrastMetrics.warnings.map((warn, i) => (
                                                <li key={i} className="flex items-start gap-1">
                                                    <span className="text-amber-500">⚠️</span>
                                                    <span>{warn}</span>
                                                </li>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>

                            {/* EXPORT CALL TO ACTIONS */}
                            <div className="w-full max-w-xs sm:max-w-sm space-y-3">
                                <button 
                                    onClick={downloadPNG}
                                    className="w-full bg-gradient-to-r from-brand-600 to-indigo-500 hover:from-brand-700 hover:to-indigo-600 active:scale-[0.99] text-white font-bold py-3 px-4 rounded-xl shadow-lg shadow-indigo-600/10 hover:shadow-indigo-600/25 transition-all duration-150 flex items-center justify-center space-x-2 text-sm"
                                >
                                    <svg className="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                                    </svg>
                                    <span>Download high-quality PNG</span>
                                </button>

                                <div className="grid grid-cols-2 gap-3">
                                    <button 
                                        onClick={copyToClipboard}
                                        className="bg-slate-800 hover:bg-slate-700 active:scale-[0.99] text-slate-200 font-bold py-2.5 px-4 rounded-xl border border-slate-700 transition flex items-center justify-center space-x-1.5 text-xs"
                                    >
                                        <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                                            <path stroke-linecap="round" stroke-linejoin="round" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" />
                                        </svg>
                                        <span>Copy Image</span>
                                    </button>
                                    <button 
                                        onClick={() => {
                                            if (navigator.share) {
                                                canvasRef.current.toBlob((blob) => {
                                                    const file = new File([blob], `qr_code.png`, { type: 'image/png' });
                                                    navigator.share({
                                                        title: 'Custom QR Code',
                                                        text: 'Generated on QRCraft Pro',
                                                        files: [file]
                                                    }).catch(console.error);
                                                });
                                            } else {
                                                // fallback copy URL
                                                navigator.clipboard.writeText(generatedQRContent);
                                                showToast("Copied QR Raw value to clipboard!");
                                            }
                                        }}
                                        className="bg-slate-800 hover:bg-slate-700 active:scale-[0.99] text-slate-200 font-bold py-2.5 px-4 rounded-xl border border-slate-700 transition flex items-center justify-center space-x-1.5 text-xs"
                                    >
                                        <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                                            <path stroke-linecap="round" stroke-linejoin="round" d="M8.684 10.742l4.022-2.012m0 0A3.001 3.001 0 1112 13.25a3.001 3.001 0 01-3.316-2.508zM12 2.25A3.001 3.001 0 118.684 4.258l4.022 2.012m0 0A3.001 3.001 0 1112 2.25zm0 13.5a3.001 3.001 0 11-3.316 2.508l4.022-2.012" />
                                        </svg>
                                        <span>Quick Share</span>
                                    </button>
                                </div>
                            </div>
                        </div>

                        </main>

                    {/* Toast Notification popup widget */}
                    {toast.show && (
                        <div className="fixed bottom-6 right-6 z-50 bg-slate-900/95 border border-indigo-500/25 text-white py-3.5 px-5 rounded-2xl shadow-xl shadow-brand-500/10 flex items-center space-x-3 animate-slide-up duration-200 backdrop-blur-md">
                            <span className="w-2.5 h-2.5 rounded-full bg-indigo-400 animate-ping" />
                            <p className="text-xs font-semibold">{toast.message}</p>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
