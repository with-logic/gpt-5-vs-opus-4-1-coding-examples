        function getSentiment(rating) {
            if (rating >= 4) return "positive";
            if (rating === 3) return "neutral";
            return "negative";
        }

        // Play high-quality sound notification with Web Audio API (to delight the user)
        function playNotificationChime() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc1 = audioCtx.createOscillator();
                const osc2 = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                osc1.connect(gainNode);
                osc2.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                osc1.type = 'sine';
                osc1.frequency.setValueAtTime(587.33, audioCtx.currentTime); // D5
                osc1.frequency.setValueAtTime(880, audioCtx.currentTime + 0.08); // A5
                
                osc2.type = 'triangle';
                osc2.frequency.setValueAtTime(293.66, audioCtx.currentTime); // D4
                osc2.frequency.setValueAtTime(440, audioCtx.currentTime + 0.08); // A4
                
                gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.12, audioCtx.currentTime + 0.02);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);
                
                osc1.start();
                osc2.start();
                osc1.stop(audioCtx.currentTime + 0.35);
                osc2.stop(audioCtx.currentTime + 0.35);
            } catch (e) {
                console.warn("Audio Context blocked or not supported by browser security settings.", e);
            }
        }

        // Smart, responsive text highlights for search queries
        function HighlightText({ text, keyword }) {
            if (!keyword || !text) return <span>{text}</span>;
            const parts = text.split(new RegExp(`(${keyword.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&')})`, 'gi'));
            return (
                <span>
                    {parts.map((part, i) => 
                        part.toLowerCase() === keyword.toLowerCase() ? 
                        <mark key={i} class="highlight text-slate-900 font-medium dark:text-slate-900">{part}</mark> : 
                        part
                    )}
                </span>
            );
        }

        // Simple customized parser to render dynamic AI summaries with proper titles, lists, and bold text
        function parseMarkdownToHtml(text) {
            if (!text) return "";
            let html = text;
            html = html.replace(/^### (.*$)/gim, '<h4 class="text-xs font-bold uppercase tracking-wider text-violet-600 dark:text-violet-400 mt-4 mb-2">$1</h4>');
            html = html.replace(/\*\*(.*?)\*\*/g, '<strong class="font-bold text-slate-950 dark:text-white">$1</strong>');
            html = html.replace(/^\s*-\s*(.*$)/gim, '<li class="ml-4 list-disc text-sm text-slate-700 dark:text-slate-300 my-1">$1</li>');
            
            const lines = html.split('\n');
            let inList = false;
            const processedLines = lines.map(line => {
                const isLi = line.trim().startsWith('<li');
                let result = '';
                if (isLi && !inList) {
                    inList = true;
                    result = '<ul class="space-y-1 my-2">' + line;
                } else if (!isLi && inList) {
                    inList = false;
                    result = '</ul>' + line;
                } else {
                    result = line;
                }
                return result;
            });
            if (inList) processedLines.push('</ul>');
            
            return processedLines.join('\n').replace(/\n/g, '<br/>');
        }

        function App() {

                    document.documentElement.classList.remove('light');
                } else {
                    document.documentElement.classList.add('light');
                    document.documentElement.classList.remove('dark');
                }
            }, [darkMode]);

            // Simulator streaming scheduler
            useEffect(() => {
                let timer = null;
                if (isSimulationActive) {
                    timer = setInterval(() => {
                        const randomIndex = Math.floor(Math.random() * SIMULATION_POOL.length);
                        const randomSource = SIMULATION_POOL[randomIndex];
                        
                        const dateToday = new Date();
                        const dateStr = dateToday.toISOString().split('T')[0];

                        const newFeedbackItem = {

                            date: dateStr,
                            eventName: randomSource.eventName,
                            attendeeName: randomSource.attendeeName,
                            rating: randomSource.rating,
                            feedback: randomSource.feedback
                        };
                        
                        setFeedbackList(prev => [newFeedbackItem, ...prev]);
                        playNotificationChime();
                        
                        // Push toast alert
                        const toastId = Date.now();
                        setNotifications(prev => [{
                            id: toastId,
                            text: `New 5★ review from ${randomSource.attendeeName} at ${randomSource.eventName}!`,
                            type: 'info'
                        }, ...prev]);
                        
                        // Auto-dismiss toast
                        setTimeout(() => {
                            setNotifications(prev => prev.filter(n => n.id !== toastId));
                        }, 4000);

                    }, 6500); // New arrivals every 6.5s
                }
                return () => {
                    if (timer) clearInterval(timer);
                };
            }, [isSimulationActive, feedbackList]);

            // Retrieve unique events
            const uniqueEventsList = useMemo(() => {
                return ["All", ...new Set(feedbackList.map(f => f.eventName))];
            }, [feedbackList]);

            // Metrics computations
            const metrics = useMemo(() => {
                const total = feedbackList.length;
                if (total === 0) return { total: 0, average: 0, positiveRatio: 0, nps: 0 };
                
                const sum = feedbackList.reduce((acc, curr) => acc + curr.rating, 0);
                const average = (sum / total).toFixed(2);
                
                const positiveCount = feedbackList.filter(d => d.rating >= 4).length;
                const positiveRatio = ((positiveCount / total) * 100).toFixed(1);
                
                const promoters = feedbackList.filter(d => d.rating === 5).length;
                const detractors = feedbackList.filter(d => d.rating <= 3).length;
                const nps = Math.round(((promoters - detractors) / total) * 100);
                
                return { total, average, positiveRatio, nps };
            }, [feedbackList]);

            // Filter logic
            const filteredFeedback = useMemo(() => {
                let result = [...feedbackList];

                // 1. Text Search filtering (broad search across name, event, feedback)
                if (searchTerm.trim() !== "") {
                    const searchLower = searchTerm.toLowerCase();
                    result = result.filter(f => 
                        f.attendeeName.toLowerCase().includes(searchLower) ||
                        f.eventName.toLowerCase().includes(searchLower) ||
                        f.feedback.toLowerCase().includes(searchLower)
                    );
                }

                // 2. Event filtering
                if (selectedEvent !== "All") {
                    result = result.filter(f => f.eventName === selectedEvent);
                }

                // 3. Rating filtering
                if (selectedRating !== "All") {
                    const stars = parseInt(selectedRating);
                    result = result.filter(f => f.rating === stars);
                }

                // 4. Sentiment filtering
                if (selectedSentiment !== "All") {
                    result = result.filter(f => getSentiment(f.rating) === selectedSentiment.toLowerCase());
                }

                // 5. Apply Column Sorting
                if (sortConfig.key) {
                    result.sort((a, b) => {
                        let aVal = a[sortConfig.key];
                        let bVal = b[sortConfig.key];
                        
                        if (typeof aVal === 'string') {
                            aVal = aVal.toLowerCase();
                            bVal = bVal.toLowerCase();
                        }

                        if (aVal < bVal) {
                            return sortConfig.direction === 'asc' ? -1 : 1;
                        }
                        if (aVal > bVal) {
                            return sortConfig.direction === 'asc' ? 1 : -1;
                        }
                        return 0;
                    });
                }

                return result;
            }, [feedbackList, searchTerm, selectedEvent, selectedRating, selectedSentiment, sortConfig]);

            // Total statistics of current filtered rows
            const filteredMetrics = useMemo(() => {
                return {
                    total: filteredFeedback.length,
                    average: filteredFeedback.length === 0 ? "0.00" : (filteredFeedback.reduce((acc, c) => acc + c.rating, 0) / filteredFeedback.length).toFixed(2),
                    positive: filteredFeedback.filter(d => d.rating >= 4).length,
                    neutral: filteredFeedback.filter(d => d.rating === 3).length,
                    negative: filteredFeedback.filter(d => d.rating <= 2).length
                };
            }, [filteredFeedback]);

            // Dynamic AI Summary Insights calculated over currently filtered data
            const aiSummary = useMemo(() => {
                const total = filteredFeedback.length;
                const events = [...new Set(filteredFeedback.map(d => d.eventName))];
                
                let wifiCount = 0;
                let foodCount = 0;
                let speakerCount = 0;
                let venueCount = 0;
                let scheduleCount = 0;
                
                filteredFeedback.forEach(d => {
                    const text = d.feedback.toLowerCase();
                    if (text.includes("wifi") || text.includes("internet")) wifiCount++;
                    if (text.includes("food") || text.includes("catering") || text.includes("lunch") || text.includes("coffee") || text.includes("desserts") || text.includes("vegetarian")) foodCount++;
                    if (text.includes("speaker") || text.includes("panel") || text.includes("keynote") || text.includes("presentation")) speakerCount++;
                    if (text.includes("venue") || text.includes("room") || text.includes("hall") || text.includes("signage")) venueCount++;
                    if (text.includes("schedule") || text.includes("time") || text.includes("duration") || text.includes("clash")) scheduleCount++;
                });
                
                const eventRatings = events.map(ev => {
                    const evData = filteredFeedback.filter(d => d.eventName === ev);
                    const avg = evData.reduce((acc, c) => acc + c.rating, 0) / evData.length;
                    return { eventName: ev, avg, count: evData.length };
                });
                
                eventRatings.sort((a, b) => b.avg - a.avg);
                const topEvent = eventRatings[0];
                const lowestEvent = eventRatings[eventRatings.length - 1];
                
                let paragraph = "";
                let strengths = [];
                let improvements = [];
                
                if (total === 0) {
                    paragraph = "No feedback matches your current selection filters. Try resetting search fields to generate insights.";
                    strengths = ["No active data segment to analyze."];
                    improvements = ["No active data segment to analyze."];
                } else {
                    const avgScore = (filteredFeedback.reduce((acc, c) => acc + c.rating, 0) / total).toFixed(2);
                    paragraph = `Based on analyzing ${total} matching feedback entries across ${events.length} event tracks, current attendee sentiment is highly encouraging, scoring ${avgScore}/5.0 average. `;
                    
                    if (topEvent && topEvent.avg >= 4) {
                        paragraph += `"${topEvent.eventName}" leads as the top-rated experience segment with an average score of ${topEvent.avg.toFixed(1)}/5.0. `;
                    }
                    
                    if (speakerCount > total * 0.15 || speakerCount >= 2) {
                        paragraph += "Attendees praised high-value presentations and technical competence of workshop speakers. ";
                        strengths.push("Exceptional speaker engagement and scientific depth.");
                    } else {
                        strengths.push("High caliber keynote presentations and instructional designs.");
                    }
                    
                    if (foodCount > total * 0.1 || foodCount >= 2) {
                        strengths.push("Excellent premium catering, specialty coffee bars, and vegetarian selections.");
                    } else {
                        strengths.push("Highly praised evening mixers and trust-building social activities.");
                    }
                    
                    if (wifiCount > 1) {
                        improvements.push("Address major WiFi drops and connection dropouts in Hall B.");
                    }
                    if (scheduleCount > 1) {
                        improvements.push("Create 15-minute transition windows between key sessions to ease rush.");
                    }
                    if (venueCount > 1) {
                        improvements.push("Enforce session capacity caps or relocate hot topics to larger auditoriums.");

                    } else if (improvements.length === 1) {
                        improvements.push("Enhance local directional signage and indoor routing guidelines.");

                return { paragraph, strengths, improvements };

                filteredFeedback.forEach(row => {
                    const rowData = [

                        row.date,
                        `"${row.eventName.replace(/"/g, '""')}"`,
                        `"${row.attendeeName.replace(/"/g, '""')}"`,
                        row.rating,
                        getSentiment(row.rating).toUpperCase(),
                        `"${row.feedback.replace(/"/g, '""')}"`
                    ].join(",");
                    csvContent += rowData + "\n";
                });

                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `event_feedback_export_${Date.now()}.csv`);
                document.body.appendChild(link);

                document.body.removeChild(link);

                        ans = `### 📶 WiFi Connectivity Diagnostics\nI analyzed feedback mentioning WiFi and discovered critical issues.\n\n- **Primary Culprit:** TechInnovate Summit 2026 (Hall B) WiFi was called *"completely unusable"*.\n- **Secondary Culprit:** Agile Leadership Retreat reported patchy hotel bedroom connections.\n- **Recommendations:** Install dedicated cellular routers for coding workshops and enforce local bandwidth SLAs with the venue.`;
                    } else if (q.includes("food") || q.includes("catering") || q.includes("lunch") || q.includes("coffee") || q.includes("dessert")) {
                        ans = `### 🍱 Catering & Beverage Assessment\nHere is what our attendees reported about food and beverage offerings:\n\n- **Superb Highs:** High praises for the vegetarian spreads and desserts at the UX/UI Design Camp. The coffee bar at TechInnovate kept energy high.\n- **Friction Points:** Attendees in Hall B (TechInnovate) received cold lunches.\n- **Recommendations:** Ensure caterers provide dynamic food warmer tables for remote conference halls.`;
                    } else if (q.includes("speaker") || q.includes("panel") || q.includes("keynote") || q.includes("presentation")) {

                    } else if (q.includes("venue") || q.includes("room") || q.includes("hall") || q.includes("signage") || q.includes("crowd")) {
                        ans = `### 📍 Venue and Crowd Management Audit\nLogistics and space configurations are a key driver of ratings:\n\n- **Crowd Jam:** UX/UI Design Camp workshop rooms were reported as over-capacity and cramped.\n- **A/C Temperature:** Multiple columns report lecture halls were freezing.\n- **Recommendations:** Audit workshop pre-registrations to map crowded sessions into main halls, and raise venue temperature by 2°C in the morning.`;
                    } else if (q.includes("schedule") || q.includes("timing") || q.includes("duration")) {
                        ans = `### ⏱️ Event Schedule and Pacing Summary\nAnalyzing pacing notes across the conference series:\n\n- **Agile Leadership Retreat:** The agenda was too crowded; attendees felt rushed between segments.\n- **Recommendations:** Mandate 15-minute intervals between sessions and consider duplicate afternoon streams for hot-seat workshops.`;
                    } else {
                        // Dynamic general response
                        const total = filteredFeedback.length;
                        const avg = (filteredFeedback.reduce((acc, c) => acc + c.rating, 0) / (total || 1)).toFixed(2);
                        const positiveP = ((filteredFeedback.filter(d => d.rating >= 4).length / (total || 1)) * 100).toFixed(0);

                    }

                    setAiChatHistory(prev => [...prev, { sender: 'assistant', text: ans }]);
                    setIsAiThinking(false);
                }, 7500 / 10); // Swift but human-like response

            const activeDetailItemActions = useMemo(() => {

                const actions = [];
                
                if (text.includes("wifi") || text.includes("internet")) {
                    actions.push("Log network ticket with venue logistics team");

                if (text.includes("speaker") || text.includes("panel") || text.includes("keynote")) {

                                    <h3 class="text-sm font-extrabold text-slate-950 dark:text-white flex items-center gap-1.5">
                                        <svg class="h-5 w-5 text-brand-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                                            <path stroke-linecap="round" stroke-linejoin="round" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.907c.969 0 1.371 1.24.588 1.81l-3.97 2.883a1 1 0 00-.364 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.971-2.883a1 1 0 00-1.175 0l-3.97 2.883c-.783.57-1.838-.197-1.539-1.118l1.518-4.674a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h4.906a1 1 0 00.95-.69l1.519-4.674z" />
                                        </svg>
                                        Log New Feedback Entry
                                    </h3>
                                    <button 
                                        onClick={() => setIsAddModalOpen(false)}
                                        class="rounded-lg p-1 text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
                                    >
                                        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                                            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                                        </svg>
                                    </button>
                                </div>

                                {/* Form body */}
                                <form onSubmit={handleAddFeedbackSubmit} class="space-y-4 text-xs">
                                    
                                    {/* Event Picker */}
                                    <div>
                                        <label class="block text-slate-500 font-semibold mb-1">Select Event Track</label>
                                        <select
                                            value={newForm.eventName}
                                            onChange={(e) => setNewForm({ ...newForm, eventName: e.target.value })}
                                            class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg p-2.5 font-medium text-slate-800 dark:text-white"
                                        >
                                            <option value="TechInnovate Summit 2026">TechInnovate Summit 2026</option>
                                            <option value="Global Marketing Forum">Global Marketing Forum</option>
                                            <option value="UX/UI Design Camp">UX/UI Design Camp</option>
                                            <option value="Agile Leadership Retreat">Agile Leadership Retreat</option>
                                            <option value="NextGen AI Roundtable">NextGen AI Roundtable</option>
                                        </select>
                                    </div>

                                    {/* Attendee Name */}
                                    <div>
                                        <label class="block text-slate-500 font-semibold mb-1">Attendee Name</label>
                                        <input 
                                            type="text"
                                            required
                                            value={newForm.attendeeName}
                                            onChange={(e) => setNewForm({ ...newForm, attendeeName: e.target.value })}
                                            placeholder="e.g. Alexis Carter"
                                            class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg p-2.5 text-slate-800 dark:text-white"
                                        />
                                    </div>

                                    {/* Rating level star button bars */}
                                    <div>
                                        <label class="block text-slate-500 font-semibold mb-1">Attendee Rating ({newForm.rating} Stars)</label>
                                        <div class="flex items-center space-x-2 mt-1">
                                            {[1, 2, 3, 4, 5].map((star) => (
                                                <button
                                                    key={star}
                                                    type="button"
                                                    onClick={() => setNewForm({ ...newForm, rating: star })}
                                                    class="text-yellow-500 hover:scale-110 transition-transform"
                                                >
                                                    <svg class={`h-8 w-8 ${newForm.rating >= star ? 'fill-current' : 'text-slate-200 dark:text-slate-800'}`} viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                                        <path stroke-linecap="round" stroke-linejoin="round" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.907c.969 0 1.371 1.24.588 1.81l-3.97 2.883a1 1 0 00-.364 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.971-2.883a1 1 0 00-1.175 0l-3.97 2.883c-.783.57-1.838-.197-1.539-1.118l1.518-4.674a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h4.906a1 1 0 00.95-.69l1.519-4.674z" />
                                                    </svg>
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    {/* Feedback detailed */}
                                    <div>
                                        <label class="block text-slate-500 font-semibold mb-1">Feedback Comments</label>
                                        <textarea 
                                            required
                                            value={newForm.feedback}
                                            onChange={(e) => setNewForm({ ...newForm, feedback: e.target.value })}
                                            rows="4"
                                            placeholder="Write detailed event feedback... (e.g., WiFi, food catering, speaker, Q&A timing notes)"
                                            class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg p-2.5 text-slate-800 dark:text-white resize-none"
                                        />
                                    </div>

                                    {/* Submit actions buttons */}
                                    <div class="flex items-center justify-end space-x-2 pt-3 border-t border-slate-100 dark:border-slate-800">
                                        <button 
                                            type="button"
                                            onClick={() => setIsAddModalOpen(false)}
                                            class="rounded-lg border border-slate-200 dark:border-slate-800 px-4 py-2.5 font-bold text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors"
                                        >
                                            Cancel
                                        </button>
                                        <button 
                                            type="submit"
                                            class="rounded-lg bg-gradient-to-r from-brand-600 to-indigo-600 px-5 py-2.5 font-bold text-white shadow-md shadow-brand-500/20 hover:from-brand-700 hover:to-indigo-700 transform active:scale-95 transition-all"
                                        >
                                            Submit Entry
                                        </button>
                                    </div>

                                </form>

                            </div>
                        </div>
                    )}

                    {/* FOOTER */}
                    <footer class="mt-auto border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 py-6 text-center text-[10px] text-slate-400 dark:text-slate-500 transition-colors duration-200">
                        <div class="max-w-7xl mx-auto px-6 flex flex-col sm:flex-row items-center justify-between gap-3">
                            <div>
                                © 2026 AURA Inc. Event Ops Network and AI Copilot Services.
                            </div>
                            <div class="flex items-center space-x-4">
                                <span>Design System: Monotone Slate & Violet Accent</span>
                                <span class="h-1.5 w-1.5 rounded-full bg-emerald-500"></span>
                                <span>Platform Health: Excellent</span>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        // Render React Application
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
