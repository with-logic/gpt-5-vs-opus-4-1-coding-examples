<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown → Slides</title>
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a24;
    --surface2: #22223a;
    --border: #2e2e4a;
    --accent: #6c63ff;
    --accent2: #a78bfa;
    --text: #e8e8f0;
    --text-muted: #888899;
    --slide-bg: #ffffff;
    --slide-text: #1a1a2e;
    --slide-accent: #6c63ff;
    --slide-surface: #f5f5ff;
    --header-h: 60px;
  }

  .light-mode {
    --bg: #f0f0f8;
    --surface: #ffffff;
    --surface2: #e8e8f5;
    --border: #d0d0e8;
    --text: #1a1a2e;
    --text-muted: #666680;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  header {
    height: var(--header-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 16px;
    flex-shrink: 0;
    z-index: 100;
  }

  .logo {
    font-size: 18px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    white-space: nowrap;
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: auto;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--border); border-color: var(--accent); }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #8b5cf6);
    border-color: transparent;
    color: white;
  }
  .btn-primary:hover { opacity: 0.9; background: linear-gradient(135deg, var(--accent), #8b5cf6); }
  .btn svg { flex-shrink: 0; }

  /* Main layout */
  .main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    overflow: hidden;
  }

  /* Editor panel */
  .editor-panel {
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    overflow: hidden;
  }

  .panel-header {
    height: 44px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 10px;
    flex-shrink: 0;
  }

  .panel-label {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
  }

  .slide-count-badge {
    margin-left: auto;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2px 10px;
    font-size: 12px;
    color: var(--text-muted);
  }

  textarea {
    flex: 1;
    background: var(--bg);
    color: var(--text);
    border: none;
    outline: none;
    padding: 20px;
    font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 13px;
    line-height: 1.7;
    resize: none;
    tab-size: 2;
  }

  textarea::placeholder { color: var(--text-muted); }

  /* Preview panel */
  .preview-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }

  .preview-header {
    height: 44px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 10px;
    flex-shrink: 0;
  }

  .nav-controls {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: auto;
  }

  .nav-btn {
    width: 30px;
    height: 30px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    font-size: 14px;
  }
  .nav-btn:hover { background: var(--border); border-color: var(--accent); }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .slide-indicator {
    font-size: 13px;
    color: var(--text-muted);
    min-width: 60px;
    text-align: center;
  }

  /* Slide viewer */
  .slide-viewport {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow: hidden;
  }

  .slide-container {
    width: 100%;
    max-width: 720px;
    aspect-ratio: 16/9;
    position: relative;
  }

  .slide {
    width: 100%;
    height: 100%;
    background: var(--slide-bg);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 0 0 1px rgba(108,99,255,0.15);
    display: none;
    flex-direction: column;
    position: relative;
  }

  .slide.active { display: flex; }

  /* Slide themes */
  .slide[data-theme="default"] {
    background: linear-gradient(135deg, #ffffff 0%, #f8f8ff 100%);
  }

  .slide[data-theme="dark"] {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    --slide-text: #e8e8f0;
    --slide-accent: #a78bfa;
    --slide-surface: #22223a;
  }

  .slide[data-theme="gradient"] {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    --slide-text: #ffffff;
    --slide-accent: #ffd700;
    --slide-surface: rgba(255,255,255,0.15);
  }

  .slide[data-theme="ocean"] {
    background: linear-gradient(135deg, #0f3460 0%, #16213e 50%, #0f3460 100%);
    --slide-text: #e8f4f8;
    --slide-accent: #00d4ff;
    --slide-surface: rgba(0,212,255,0.1);
  }

  .slide[data-theme="forest"] {
    background: linear-gradient(135deg, #1a2f1a 0%, #2d5a2d 100%);
    --slide-text: #d4f4d4;
    --slide-accent: #7fff7f;
    --slide-surface: rgba(127,255,127,0.1);
  }

  /* Accent bar on slides */
  .slide::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--slide-accent), color-mix(in srgb, var(--slide-accent) 50%, transparent));
    z-index: 10;
  }

  .slide-inner {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 40px 52px;
    color: var(--slide-text);
    overflow: hidden;
  }

  /* Slide layout types */
  .slide-inner.layout-title {
    align-items: center;
    justify-content: center;
    text-align: center;
  }

  .slide-inner.layout-content {
    justify-content: flex-start;
  }

  /* Slide typography */
  .slide-inner h1 {
    font-size: clamp(22px, 3.5vw, 38px);
    font-weight: 800;
    line-height: 1.2;
    color: var(--slide-text);
    margin-bottom: 12px;
    letter-spacing: -0.02em;
  }

  .slide-inner h2 {
    font-size: clamp(18px, 2.8vw, 30px);
    font-weight: 700;
    color: var(--slide-text);
    margin-bottom: 10px;
    margin-top: 16px;
    letter-spacing: -0.01em;
  }

  .slide-inner h3 {
    font-size: clamp(14px, 2vw, 20px);
    font-weight: 600;
    color: var(--slide-accent);
    margin-bottom: 8px;
    margin-top: 12px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .slide-inner p {
    font-size: clamp(11px, 1.5vw, 16px);
    line-height: 1.65;
    color: var(--slide-text);
    opacity: 0.85;
    margin-bottom: 8px;
  }

  .slide-inner ul, .slide-inner ol {
    margin: 8px 0;
    padding-left: 0;
    list-style: none;
  }

  .slide-inner li {
    font-size: clamp(11px, 1.4vw, 15px);
    line-height: 1.5;
    color: var(--slide-text);
    opacity: 0.9;
    padding: 5px 0 5px 22px;
    position: relative;
  }

  .slide-inner li::before {
    content: '';
    position: absolute;
    left: 0;
    top: 12px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--slide-accent);
    opacity: 0.8;
  }

  .slide-inner ol { counter-reset: item; }
  .slide-inner ol li { counter-increment: item; }
  .slide-inner ol li::before {
    content: counter(item);
    font-size: 10px;
    font-weight: 700;
    color: var(--slide-accent);
    background: none;
    top: 6px;
    width: auto;
    border-radius: 0;
  }

  .slide-inner code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85em;
    background: var(--slide-surface);
    color: var(--slide-accent);
    padding: 2px 6px;
    border-radius: 4px;
  }

  .slide-inner pre {
    background: var(--slide-surface);
    border-radius: 8px;
    padding: 14px 18px;
    overflow: hidden;
    margin: 10px 0;
  }

  .slide-inner pre code {
    background: none;
    padding: 0;
    font-size: clamp(9px, 1.1vw, 12px);
    color: var(--slide-text);
    opacity: 0.9;
  }

  .slide-inner strong {
    font-weight: 700;
    color: var(--slide-accent);
  }

  .slide-inner em {
    font-style: italic;
    opacity: 0.9;
  }

  .slide-inner blockquote {
    border-left: 3px solid var(--slide-accent);
    margin: 10px 0;
    padding: 8px 16px;
    background: var(--slide-surface);
    border-radius: 0 8px 8px 0;
    font-style: italic;
    opacity: 0.9;
  }

  .slide-inner hr {
    border: none;
    border-top: 1px solid var(--slide-surface);
    margin: 12px 0;
    opacity: 0.5;
  }

  /* Subtitle styling */
  .slide-subtitle {
    font-size: clamp(11px, 1.6vw, 17px);
    color: var(--slide-accent);
    font-weight: 500;
    margin-top: 8px;
    opacity: 0.9;
  }

  .slide-divider {
    width: 60px;
    height: 3px;
    background: linear-gradient(90deg, var(--slide-accent), transparent);
    border-radius: 2px;
    margin: 16px auto;
  }

  /* Slide number */
  .slide-number {
    position: absolute;
    bottom: 14px;
    right: 18px;
    font-size: 11px;
    color: var(--slide-text);
    opacity: 0.3;
    font-weight: 500;
  }

  /* Progress bar */
  .progress-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--slide-accent), color-mix(in srgb, var(--slide-accent) 60%, transparent));
    transition: width 0.3s ease;
    border-radius: 0 3px 3px 0;
  }

  /* Thumbnail strip */
  .thumbnail-strip {
    height: 90px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    overflow-x: auto;
    flex-shrink: 0;
  }

  .thumbnail-strip::-webkit-scrollbar { height: 4px; }
  .thumbnail-strip::-webkit-scrollbar-track { background: var(--bg); }
  .thumbnail-strip::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .thumb {
    flex-shrink: 0;
    width: calc(74px * 16/9);
    height: 74px;
    border-radius: 6px;
    cursor: pointer;
    position: relative;
    border: 2px solid transparent;
    transition: all 0.2s;
    overflow: hidden;
  }

  .thumb.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .thumb:hover:not(.active) { border-color: var(--border); transform: translateY(-2px); }

  .thumb-inner {
    width: 100%;
    height: 100%;
    transform-origin: top left;
  }

  .thumb-number {
    position: absolute;
    bottom: 3px;
    right: 5px;
    font-size: 9px;
    color: rgba(255,255,255,0.7);
    font-weight: 600;
    text-shadow: 0 1px 2px rgba(0,0,0,0.5);
  }

  /* Fullscreen overlay */
  .fullscreen-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 1000;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .fullscreen-overlay.active { display: flex; }

  .fs-slide {
    width: 100vw;
    height: 100vh;
    max-width: calc(100vh * 16/9);
    position: relative;
  }

  .fs-slide .slide {
    width: 100%;
    height: 100%;
    border-radius: 0;
    display: flex;
    box-shadow: none;
  }

  .fs-slide .slide-inner {
    padding: 60px 80px;
  }

  .fs-slide .slide-inner h1 { font-size: clamp(28px, 5vw, 56px); }
  .fs-slide .slide-inner h2 { font-size: clamp(22px, 3.5vw, 40px); }
  .fs-slide .slide-inner h3 { font-size: clamp(16px, 2.5vw, 28px); }
  .fs-slide .slide-inner p { font-size: clamp(14px, 1.8vw, 22px); }
  .fs-slide .slide-inner li { font-size: clamp(14px, 1.7vw, 20px); }

  .fs-controls {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(12px);
    border-radius: 40px;
    padding: 10px 20px;
    border: 1px solid rgba(255,255,255,0.1);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .fullscreen-overlay:hover .fs-controls { opacity: 1; }

  .fs-nav-btn {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    font-size: 16px;
  }
  .fs-nav-btn:hover { background: rgba(255,255,255,0.2); }
  .fs-nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .fs-indicator {
    color: rgba(255,255,255,0.8);
    font-size: 14px;
    min-width: 70px;
    text-align: center;
  }

  .fs-exit {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    color: white;
    padding: 8px 14px;
    cursor: pointer;
    font-size: 13px;
    opacity: 0;
    transition: opacity 0.3s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .fullscreen-overlay:hover .fs-exit { opacity: 1; }
  .fs-exit:hover { background: rgba(255,255,255,0.1); }

  /* Theme selector */
  .theme-selector {
    display: flex;
    align-items: center;
    gap: 4px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 3px;
  }

  .theme-dot {
    width: 22px;
    height: 22px;
    border-radius: 5px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: all 0.2s;
    position: relative;
  }
  .theme-dot.active { border-color: var(--accent); }
  .theme-dot:hover { transform: scale(1.15); }
  .theme-dot[data-t="default"] { background: linear-gradient(135deg, #fff, #e8e8ff); }
  .theme-dot[data-t="dark"] { background: linear-gradient(135deg, #1a1a2e, #16213e); }
  .theme-dot[data-t="gradient"] { background: linear-gradient(135deg, #667eea, #764ba2); }
  .theme-dot[data-t="ocean"] { background: linear-gradient(135deg, #0f3460, #00d4ff); }
  .theme-dot[data-t="forest"] { background: linear-gradient(135deg, #1a2f1a, #2d5a2d); }

  /* Animations */
  .slide-enter {
    animation: slideIn 0.3s ease forwards;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
  }

  /* Responsive */
  @media (max-width: 768px) {
    .main { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
    .editor-panel { border-right: none; border-bottom: 1px solid var(--border); }
  }

  /* Scrollbar styling */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo">⟨ Markdown → Slides ⟩</div>
  <div class="header-actions">
    <div class="theme-selector" title="Slide theme">
      <div class="theme-dot active" data-t="default" title="Light"></div>
      <div class="theme-dot" data-t="dark" title="Dark"></div>
      <div class="theme-dot" data-t="gradient" title="Gradient"></div>
      <div class="theme-dot" data-t="ocean" title="Ocean"></div>
      <div class="theme-dot" data-t="forest" title="Forest"></div>
    </div>
    <button class="btn" id="loadSampleBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      Sample Deck
    </button>
    <button class="btn" id="uiToggleBtn" title="Toggle UI theme">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      Theme
    </button>
    <button class="btn btn-primary" id="fullscreenBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
      Present
    </button>
  </div>
</header>

<div class="main">
  <div class="editor-panel">
    <div class="panel-header">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--text-muted)"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
      <span class="panel-label">Markdown Editor</span>
      <span class="slide-count-badge" id="slideCountBadge">0 slides</span>
    </div>
    <textarea id="mdEditor" placeholder="Type your markdown here. Use --- to separate slides.&#10;&#10;# Slide Title&#10;&#10;- Bullet point&#10;- Another point&#10;&#10;---&#10;&#10;# Next Slide"></textarea>
  </div>

  <div class="preview-panel">
    <div class="preview-header">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--text-muted)"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      <span class="panel-label">Live Preview</span>
      <div class="nav-controls">
        <button class="nav-btn" id="prevBtn" disabled title="Previous (←)">‹</button>
        <span class="slide-indicator" id="slideIndicator">0 / 0</span>
        <button class="nav-btn" id="nextBtn" disabled title="Next (→)">›</button>
      </div>
    </div>
    <div class="slide-viewport">
      <div class="slide-container" id="slideContainer">
        <div class="slide active" data-theme="default" style="align-items:center; justify-content:center; text-align:center;">
          <div style="color:#888; font-size:14px; display:flex; flex-direction:column; align-items:center; gap:12px;">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity:0.3"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
            <span style="opacity:0.4">Start typing or load a sample deck</span>
          </div>
        </div>
      </div>
    </div>
    <div class="thumbnail-strip" id="thumbnailStrip"></div>
  </div>
</div>

<!-- Fullscreen overlay -->
<div class="fullscreen-overlay" id="fullscreenOverlay">
  <div class="fs-slide" id="fsSlideContainer"></div>
  <div class="fs-controls">
    <button class="fs-nav-btn" id="fsPrevBtn" disabled>‹</button>
    <span class="fs-indicator" id="fsIndicator">1 / 1</span>
    <button class="fs-nav-btn" id="fsNextBtn" disabled>›</button>
  </div>
  <button class="fs-exit" id="fsExitBtn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/></svg>
    Exit (Esc)
  </button>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
let slides = [];
let currentSlide = 0;
let slideTheme = 'default';

// ─── Sample Deck ──────────────────────────────────────────────────────────────
const SAMPLE_DECK = `# Q4 2025 Business Review

// ─── Markdown Parser ──────────────────────────────────────────────────────────
function parseMarkdown(md) {
  // Escape HTML
  const esc = s => s
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');

  // Inline formatting
  const inline = s => s
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g, '<em>$1</em>')
    .replace(/__([^_]+)__/g, '<strong>$1</strong>')
    .replace(/_([^_]+)_/g, '<em>$1</em>')
    .replace(/~~([^~]+)~~/g, '<del>$1</del>');

  const lines = md.split('\n');
  let html = '';
  let i = 0;

  while (i < lines.length) {
    const line = lines[i];

    // Headings
    const h1m = line.match(/^# (.+)/);
    const h2m = line.match(/^## (.+)/);
    const h3m = line.match(/^### (.+)/);
    if (h1m) { html += `<h1>${inline(esc(h1m[1]))}</h1>`; i++; continue; }
    if (h2m) { html += `<h2>${inline(esc(h2m[1]))}</h2>`; i++; continue; }
    if (h3m) { html += `<h3>${inline(esc(h3m[1]))}</h3>`; i++; continue; }

    // Blockquote
    if (line.startsWith('> ')) {
      html += `<blockquote>${inline(esc(line.slice(2)))}</blockquote>`;
      i++; continue;
    }

    // Code block
    if (line.startsWith('```')) {
      let code = '';
      i++;
      while (i < lines.length && !lines[i].startsWith('```')) {
        code += esc(lines[i]) + '\n';
        i++;
      }
      html += `<pre><code>${code.trimEnd()}</code></pre>`;
      i++; continue;
    }

    // HR
    if (/^[-*_]{3,}$/.test(line.trim()) && line.trim() !== '---') {
      html += '<hr>';
      i++; continue;
    }

    // Unordered list
    if (/^[-*+] /.test(line)) {
      html += '<ul>';
      while (i < lines.length && /^[-*+] /.test(lines[i])) {
        html += `<li>${inline(esc(lines[i].replace(/^[-*+] /, '')))}</li>`;
        i++;
      }
      html += '</ul>';
      continue;
    }

    // Ordered list
    if (/^\d+\. /.test(line)) {
      html += '<ol>';
      while (i < lines.length && /^\d+\. /.test(lines[i])) {
        html += `<li>${inline(esc(lines[i].replace(/^\d+\. /, '')))}</li>`;
        i++;
      }
      html += '</ol>';
      continue;
    }

    // Simple table (skip header row styling, just rows)
    if (line.includes('|') && lines[i+1] && /^\|[-| :]+\|?$/.test(lines[i+1])) {
      // Skip — render as a simple list instead for slide aesthetics
      i += 2; continue;
    }

    // Paragraph
    if (line.trim()) {
      html += `<p>${inline(esc(line))}</p>`;
    }
    i++;
  }

  return html;
}

function isFirstSlide(content) {
  return /^#\s/.test(content.trim()) && content.split('\n').filter(l => l.trim()).length <= 6;
}

function renderSlide(content, index, total) {
  const html = parseMarkdown(content);
  const isTitle = isFirstSlide(content);
  const layoutClass = isTitle ? 'layout-title' : 'layout-content';

  if (isTitle) {
    // Add a decorative divider after the h1 for title slides
    const modified = html.replace('</h1>', '</h1><div class="slide-divider"></div>');
    return `<div class="slide-inner ${layoutClass}">${modified}</div>
            <div class="slide-number">${index} / ${total}</div>
            <div class="progress-bar" style="width:${(index/total*100).toFixed(1)}%"></div>`;
  }

  return `<div class="slide-inner ${layoutClass}">${html}</div>
          <div class="slide-number">${index} / ${total}</div>
          <div class="progress-bar" style="width:${(index/total*100).toFixed(1)}%"></div>`;
}

// ─── Core rendering ───────────────────────────────────────────────────────────
function buildSlides(md) {
  return md.split(/\n---\n/).map(s => s.trim()).filter(Boolean);
}

function renderAll() {
  const md = document.getElementById('mdEditor').value;
  slides = buildSlides(md);

  const count = slides.length;
  document.getElementById('slideCountBadge').textContent = `${count} slide${count !== 1 ? 's' : ''}`;

  if (count === 0) {
    document.getElementById('slideContainer').innerHTML = `
      <div class="slide active" data-theme="${slideTheme}" style="align-items:center;justify-content:center;">
        <div style="color:#888;font-size:14px;text-align:center;opacity:0.4;">
          Start typing to create slides
        </div>
      </div>`;
    document.getElementById('thumbnailStrip').innerHTML = '';
    document.getElementById('slideIndicator').textContent = '0 / 0';
    document.getElementById('prevBtn').disabled = true;
    document.getElementById('nextBtn').disabled = true;
    return;
  }

  if (currentSlide >= count) currentSlide = count - 1;
  if (currentSlide < 0) currentSlide = 0;

  renderCurrentSlide();
  renderThumbnails();
  updateNav();
}

function renderCurrentSlide() {
  const count = slides.length;
  if (count === 0) return;

  const content = slides[currentSlide];
  const inner = renderSlide(content, currentSlide + 1, count);

  const container = document.getElementById('slideContainer');
  container.innerHTML = `<div class="slide active slide-enter" data-theme="${slideTheme}">${inner}</div>`;
}

function renderThumbnails() {
  const strip = document.getElementById('thumbnailStrip');
  const count = slides.length;

  strip.innerHTML = slides.map((content, i) => {
    const inner = renderSlide(content, i + 1, count);
    const isActive = i === currentSlide;
    return `<div class="thumb${isActive ? ' active' : ''}" data-idx="${i}">
      <div class="thumb-inner" style="transform:scale(0.133);transform-origin:top left;width:750%;height:750%;pointer-events:none;">
        <div class="slide active" data-theme="${slideTheme}" style="width:100%;height:100%;border-radius:0;">${inner}</div>
      </div>
      <div class="thumb-number">${i + 1}</div>
    </div>`;
  }).join('');

  strip.querySelectorAll('.thumb').forEach(t => {
    t.addEventListener('click', () => {
      currentSlide = parseInt(t.dataset.idx);
      renderCurrentSlide();
      renderThumbnails();
      updateNav();
    });
  });

  // Scroll active thumb into view
  const activeThumb = strip.querySelector('.thumb.active');
  if (activeThumb) {
    activeThumb.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  }
}

function updateNav() {
  const count = slides.length;
  document.getElementById('slideIndicator').textContent = count > 0 ? `${currentSlide + 1} / ${count}` : '0 / 0';
  document.getElementById('prevBtn').disabled = currentSlide === 0 || count === 0;
  document.getElementById('nextBtn').disabled = currentSlide >= count - 1 || count === 0;
}

// ─── Fullscreen ───────────────────────────────────────────────────────────────
function renderFsSlide() {
  const count = slides.length;
  if (count === 0) return;
  const content = slides[currentSlide];
  const inner = renderSlide(content, currentSlide + 1, count);
  document.getElementById('fsSlideContainer').innerHTML =
    `<div class="slide active" data-theme="${slideTheme}" style="width:100%;height:100%;border-radius:0;">${inner}</div>`;
  document.getElementById('fsIndicator').textContent = `${currentSlide + 1} / ${count}`;
  document.getElementById('fsPrevBtn').disabled = currentSlide === 0;
  document.getElementById('fsNextBtn').disabled = currentSlide >= count - 1;
}

function openFullscreen() {
  if (slides.length === 0) return;
  renderFsSlide();
  document.getElementById('fullscreenOverlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeFullscreen() {
  document.getElementById('fullscreenOverlay').classList.remove('active');
  document.body.style.overflow = '';
}

// ─── Event listeners ──────────────────────────────────────────────────────────
let renderTimeout;
document.getElementById('mdEditor').addEventListener('input', () => {
  clearTimeout(renderTimeout);
  renderTimeout = setTimeout(renderAll, 150);
});

document.getElementById('prevBtn').addEventListener('click', () => {
  if (currentSlide > 0) { currentSlide--; renderCurrentSlide(); renderThumbnails(); updateNav(); }
});

document.getElementById('nextBtn').addEventListener('click', () => {
  if (currentSlide < slides.length - 1) { currentSlide++; renderCurrentSlide(); renderThumbnails(); updateNav(); }
});

document.getElementById('fullscreenBtn').addEventListener('click', openFullscreen);
document.getElementById('fsExitBtn').addEventListener('click', closeFullscreen);

document.getElementById('fsPrevBtn').addEventListener('click', () => {
  if (currentSlide > 0) { currentSlide--; renderFsSlide(); renderCurrentSlide(); renderThumbnails(); updateNav(); }
});

document.getElementById('fsNextBtn').addEventListener('click', () => {
  if (currentSlide < slides.length - 1) { currentSlide++; renderFsSlide(); renderCurrentSlide(); renderThumbnails(); updateNav(); }
});

document.getElementById('loadSampleBtn').addEventListener('click', () => {
  document.getElementById('mdEditor').value = SAMPLE_DECK;
  currentSlide = 0;
  renderAll();
});

document.getElementById('uiToggleBtn').addEventListener('click', () => {
  document.body.classList.toggle('light-mode');
});

// Theme dots
document.querySelectorAll('.theme-dot').forEach(dot => {
  dot.addEventListener('click', () => {
    document.querySelectorAll('.theme-dot').forEach(d => d.classList.remove('active'));
    dot.classList.add('active');
    slideTheme = dot.dataset.t;
    renderCurrentSlide();
    renderThumbnails();
    renderFsSlide();
  });
});

// Keyboard navigation
document.addEventListener('keydown', e => {
  const fsActive = document.getElementById('fullscreenOverlay').classList.contains('active');

  if (e.key === 'Escape' && fsActive) { closeFullscreen(); return; }
  if (e.key === 'f' || e.key === 'F5') { if (!fsActive) { e.preventDefault(); openFullscreen(); } return; }

  if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') {
    if (slides.length === 0) return;
    if (currentSlide < slides.length - 1) {
      currentSlide++;
      if (fsActive) { renderFsSlide(); }
      renderCurrentSlide();
      renderThumbnails();
      updateNav();
    }
    e.preventDefault();
  } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    if (slides.length === 0) return;
    if (currentSlide > 0) {
      currentSlide--;
      if (fsActive) { renderFsSlide(); }
      renderCurrentSlide();
      renderThumbnails();
      updateNav();
    }
    e.preventDefault();
  }
});

// ─── Init ─────────────────────────────────────────────────────────────────────
document.getElementById('mdEditor').value = SAMPLE_DECK;
currentSlide = 0;
renderAll();
</script>
