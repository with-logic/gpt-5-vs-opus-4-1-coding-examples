<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPQR Tic Tac Toe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #f0d060;
    --gold-dark: #8b6914;
    --marble-bg: #f5f0e8;
    --marble-mid: #e8e0d0;
    --marble-dark: #d4c8b0;
    --text-dark: #2c1e0a;
    --text-mid: #5c4020;
    --shadow: rgba(44,30,10,0.18);
    --cell-bg: rgba(245,240,232,0.85);
    --cell-hover: rgba(201,168,76,0.18);
    --cell-win: rgba(201,168,76,0.38);
    --border: rgba(139,105,20,0.38);
    --x-color: #8b1a1a;
    --o-color: #1a3a8b;
    --banner-bg: rgba(44,30,10,0.92);
  }
  .theme-night {
    --gold: #d4af37;
    --gold-light: #f5d060;
    --gold-dark: #a07810;
    --marble-bg: #18140a;
    --marble-mid: #221c0e;
    --marble-dark: #2c2414;
    --text-dark: #f0e8cc;
    --text-mid: #c8b87a;
    --shadow: rgba(0,0,0,0.5);
    --cell-bg: rgba(30,24,12,0.92);
    --cell-hover: rgba(212,175,55,0.18);
    --cell-win: rgba(212,175,55,0.32);
    --border: rgba(212,175,55,0.28);
    --x-color: #e05050;
    --o-color: #5080e0;
    --banner-bg: rgba(0,0,0,0.95);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%; width: 100%;
    font-family: 'Cinzel', serif;
    background: var(--marble-bg);
    color: var(--text-dark);
    overflow: hidden;
    transition: background 0.4s, color 0.4s;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    position: relative;
  }

  /* Marble texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      repeating-linear-gradient(105deg, transparent 0px, transparent 40px, rgba(255,255,255,0.04) 40px, rgba(255,255,255,0.04) 41px),
      repeating-linear-gradient(75deg, transparent 0px, transparent 60px, rgba(139,105,20,0.04) 60px, rgba(139,105,20,0.04) 61px),
      repeating-linear-gradient(15deg, transparent 0px, transparent 80px, rgba(255,255,255,0.03) 80px, rgba(255,255,255,0.03) 81px);
    pointer-events: none;
    z-index: 0;
  }

  /* Header */
  #app-header {
    position: relative;
    z-index: 10;
    width: 100%;
    padding: clamp(6px,1.5vmin,14px) clamp(10px,3vmin,28px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(135deg, var(--marble-mid) 0%, var(--marble-dark) 100%);
    border-bottom: 2px solid var(--gold);
    box-shadow: 0 2px 16px var(--shadow);
    flex-shrink: 0;
  }
  #header-title {
    display: flex;
    align-items: center;
    gap: clamp(6px,1.5vmin,14px);
  }
  .spqr-crest {
    width: clamp(32px,6vmin,52px);
    height: clamp(32px,6vmin,52px);
    flex-shrink: 0;
  }
  #title-text h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(13px,2.8vmin,26px);
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.04em;
    line-height: 1;
    text-shadow: 0 1px 4px var(--shadow);
  }
  #title-text p {
    font-size: clamp(8px,1.4vmin,13px);
    color: var(--text-mid);
    letter-spacing: 0.12em;
    line-height: 1.2;
  }
  #header-buttons {
    display: flex;
    gap: clamp(5px,1.2vmin,12px);
  }
  .btn {
    font-family: 'Cinzel', serif;
    font-size: clamp(9px,1.6vmin,14px);
    font-weight: 600;
    letter-spacing: 0.06em;
    padding: clamp(5px,1.1vmin,10px) clamp(8px,2vmin,18px);
    border-radius: 6px;
    border: 1.5px solid var(--gold);
    cursor: pointer;
    transition: all 0.2s;
    background: linear-gradient(135deg, var(--marble-bg) 0%, var(--marble-mid) 100%);
    color: var(--gold-dark);
    box-shadow: 0 2px 8px var(--shadow);
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .btn:hover { background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%); color: var(--marble-bg); transform: translateY(-1px); box-shadow: 0 4px 12px var(--shadow); }
  .btn:active { transform: translateY(0); box-shadow: 0 1px 4px var(--shadow); }
  .btn-primary { background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%); color: var(--marble-bg); }
  .btn-primary:hover { background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 100%); color: var(--text-dark); }

  /* Confetti canvas */
  #confetti-canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 200;
  }

  /* Victory banner */
  #victory-banner {
    position: relative;
    z-index: 10;
    width: 100%;
    padding: clamp(6px,1.2vmin,12px) clamp(12px,3vmin,28px);
    text-align: center;
    background: var(--banner-bg);
    color: var(--gold-light);
    font-size: clamp(13px,2.4vmin,22px);
    font-weight: 700;
    letter-spacing: 0.08em;
    border-bottom: 2px solid var(--gold);
    transform: scaleY(0);
    transform-origin: top;
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    overflow: hidden;
    flex-shrink: 0;
  }
  #victory-banner.show { transform: scaleY(1); }

  /* Status line */
  #status-line {
    position: relative;
    z-index: 10;
    width: 100%;
    text-align: center;
    padding: clamp(4px,0.9vmin,9px) clamp(10px,2vmin,20px);
    font-size: clamp(10px,1.8vmin,16px);
    color: var(--text-mid);
    letter-spacing: 0.08em;
    flex-shrink: 0;
    background: linear-gradient(90deg, transparent, rgba(201,168,76,0.08), transparent);
  }

  /* Main game area */
  #game-area {
    position: relative;
    z-index: 10;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    padding: clamp(6px,1.5vmin,16px);
    gap: clamp(8px,2vmin,18px);
    min-height: 0;
  }

  /* Scoreboard */
  #scoreboard {
    display: flex;
    gap: clamp(8px,2vmin,20px);
    align-items: center;
  }
  .score-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: linear-gradient(135deg, var(--marble-mid) 0%, var(--marble-dark) 100%);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: clamp(4px,1vmin,10px) clamp(10px,2.5vmin,24px);
    box-shadow: 0 2px 10px var(--shadow);
    min-width: clamp(52px,11vmin,100px);
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .score-card.active {
    border-color: var(--gold);
    box-shadow: 0 0 0 2px var(--gold), 0 2px 14px var(--shadow);
  }
  .score-label {
    font-size: clamp(8px,1.5vmin,13px);
    color: var(--text-mid);
    letter-spacing: 0.1em;
    font-weight: 600;
  }
  .score-glyph {
    font-size: clamp(16px,3.5vmin,32px);
    font-weight: 900;
    line-height: 1.1;
  }
  .score-x { color: var(--x-color); }
  .score-o { color: var(--o-color); }
  .score-d { color: var(--gold); }
  .score-num {
    font-size: clamp(18px,4vmin,38px);
    font-weight: 700;
    color: var(--text-dark);
    line-height: 1;
  }
  .score-sep {
    font-size: clamp(18px,4vmin,34px);
    color: var(--gold);
    font-weight: 700;
    line-height: 1;
  }

  /* Board container */
  #board-container {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: clamp(5px,1.2vmin,12px);
    width: min(65vmin, 90vw, 420px);
    height: min(65vmin, 90vw, 420px);
    padding: clamp(6px,1.3vmin,14px);
    background: linear-gradient(135deg, var(--marble-mid) 0%, var(--marble-dark) 100%);
    border: 2px solid var(--gold);
    border-radius: 16px;
    box-shadow:
      0 0 0 4px var(--marble-bg),
      0 0 0 6px var(--gold-dark),
      0 8px 32px var(--shadow);
    position: relative;
  }
  /* Decorative corner emblems */
  #board::before, #board::after {
    content: '✦';
    position: absolute;
    font-size: clamp(10px,2vmin,18px);
    color: var(--gold);
    opacity: 0.5;
    pointer-events: none;
  }
  #board::before { top: 4px; left: 7px; }
  #board::after { bottom: 4px; right: 7px; }

  .cell {
    background: var(--cell-bg);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.18s, box-shadow 0.18s, transform 0.12s;
    box-shadow: inset 0 2px 8px rgba(255,255,255,0.4), 0 2px 6px var(--shadow);
    position: relative;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    outline: none;
  }
  .cell:hover:not(.taken):not(.disabled) {
    background: var(--cell-hover);
    transform: scale(1.04);
    box-shadow: 0 0 0 2px var(--gold), inset 0 2px 8px rgba(255,255,255,0.4), 0 4px 14px var(--shadow);
  }
  .cell:active:not(.taken):not(.disabled) { transform: scale(0.97); }
  .cell:focus-visible {
    outline: 2.5px solid var(--gold);
    outline-offset: 2px;
  }
  .cell.win-cell {
    background: var(--cell-win);
    border-color: var(--gold);
    box-shadow: 0 0 0 2.5px var(--gold), inset 0 2px 8px rgba(255,255,255,0.3), 0 4px 16px var(--shadow);
    animation: winPulse 0.7s ease-out;
  }
  @keyframes winPulse {
    0% { transform: scale(1); }
    40% { transform: scale(1.08); }
    100% { transform: scale(1); }
  }
  .cell.disabled { cursor: default; }
  .cell svg {
    width: 55%;
    height: 55%;
    pointer-events: none;
    transition: opacity 0.15s;
  }
  .cell-mark {
    width: 55%;
    height: 55%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(18px, 6vmin, 58px);
    font-weight: 900;
    line-height: 1;
    animation: markIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
    pointer-events: none;
  }
  .cell-mark.mark-x { color: var(--x-color); }
  .cell-mark.mark-o { color: var(--o-color); }
  @keyframes markIn {
    from { transform: scale(0.3) rotate(-10deg); opacity: 0; }
    to { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  /* Hover ghost mark */
  .cell:not(.taken):not(.disabled):hover .hover-ghost {
    opacity: 0.18;
  }
  .hover-ghost {
    position: absolute;
    opacity: 0;
    pointer-events: none;
    font-size: clamp(18px,6vmin,58px);
    font-weight: 900;
    transition: opacity 0.15s;
  }
  .hover-x { color: var(--x-color); }
  .hover-o { color: var(--o-color); }

  /* Win line overlay SVG */
  #win-line-svg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 5;
    overflow: visible;
  }
  #win-line-path {
    stroke: var(--gold);
    stroke-width: 4;
    stroke-linecap: round;
    fill: none;
    opacity: 0;
    stroke-dasharray: 400;
    stroke-dashoffset: 400;
    filter: drop-shadow(0 0 6px var(--gold));
    transition: opacity 0.2s;
  }
  #win-line-path.animate {
    opacity: 1;
    animation: drawLine 0.45s ease-out forwards;
  }
  @keyframes drawLine {
    to { stroke-dashoffset: 0; }
  }

  /* Modal / Dialog */
  #modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 300;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
    backdrop-filter: blur(3px);
  }
  #modal-overlay.open { opacity: 1; pointer-events: all; }
  #modal-dialog {
    background: linear-gradient(160deg, var(--marble-bg) 0%, var(--marble-mid) 100%);
    border: 2px solid var(--gold);
    border-radius: 18px;
    box-shadow: 0 8px 48px rgba(0,0,0,0.45), 0 0 0 4px var(--marble-dark), 0 0 0 6px var(--gold-dark);
    padding: clamp(18px,4vmin,36px);
    width: min(480px, 92vw);
    max-height: 88vh;
    overflow-y: auto;
    transform: scale(0.92) translateY(-16px);
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
    position: relative;
  }
  #modal-overlay.open #modal-dialog { transform: scale(1) translateY(0); }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: clamp(14px,3vmin,28px);
    padding-bottom: clamp(8px,1.5vmin,14px);
    border-bottom: 1.5px solid var(--gold);
  }
  .modal-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(14px,2.8vmin,24px);
    color: var(--gold);
    font-weight: 700;
  }
  .modal-close {
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    width: clamp(28px,5vmin,40px);
    height: clamp(28px,5vmin,40px);
    cursor: pointer;
    color: var(--text-mid);
    font-size: clamp(14px,2.5vmin,20px);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    font-family: 'Cinzel', serif;
  }
  .modal-close:hover { background: var(--gold); color: var(--marble-bg); border-color: var(--gold); }

  .opt-section {
    margin-bottom: clamp(14px,2.5vmin,24px);
  }
  .opt-label {
    font-size: clamp(9px,1.6vmin,14px);
    color: var(--text-mid);
    letter-spacing: 0.12em;
    font-weight: 700;
    margin-bottom: clamp(6px,1.2vmin,12px);
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .opt-label::before {
    content: '';
    display: inline-block;
    width: 14px;
    height: 2px;
    background: var(--gold);
    border-radius: 2px;
  }
  .opt-group {
    display: flex;
    gap: clamp(6px,1.5vmin,14px);
    flex-wrap: wrap;
  }
  .opt-btn {
    font-family: 'Cinzel', serif;
    font-size: clamp(10px,1.7vmin,14px);
    font-weight: 600;
    padding: clamp(6px,1.2vmin,11px) clamp(10px,2.2vmin,20px);
    border-radius: 8px;
    border: 1.5px solid var(--border);
    cursor: pointer;
    background: var(--cell-bg);
    color: var(--text-dark);
    transition: all 0.18s;
    user-select: none;
  }
  .opt-btn:hover { border-color: var(--gold); color: var(--gold-dark); }
  .opt-btn.selected {
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
    color: var(--marble-bg);
    border-color: var(--gold);
    box-shadow: 0 2px 8px var(--shadow);
  }
  .opt-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .modal-footer {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: clamp(14px,2.5vmin,22px);
    padding-top: clamp(10px,1.8vmin,16px);
    border-top: 1.5px solid var(--border);
  }

  /* Responsive tweaks */
  @media (max-height: 500px) {
    #app-header { padding: 4px 10px; }
    #victory-banner { padding: 4px 12px; }
    #game-area { gap: 5px; padding: 4px; }
  }
  @media (max-width: 380px) {
    #header-buttons .btn { padding: 5px 8px; font-size: 10px; }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--marble-mid); }
  ::-webkit-scrollbar-thumb { background: var(--gold-dark); border-radius: 3px; }

  /* AI thinking indicator */
  #ai-thinking {
    display: none;
    position: absolute;
    inset: 0;
    border-radius: 16px;
    background: rgba(0,0,0,0.04);
    z-index: 3;
    pointer-events: all;
    align-items: center;
    justify-content: center;
  }
  #ai-thinking.visible { display: flex; }
  .thinking-dots {
    display: flex;
    gap: 7px;
  }
  .thinking-dots span {
    width: clamp(7px,1.5vmin,12px);
    height: clamp(7px,1.5vmin,12px);
    background: var(--gold);
    border-radius: 50%;
    animation: dotBounce 0.9s ease-in-out infinite;
  }
  .thinking-dots span:nth-child(2) { animation-delay: 0.18s; }
  .thinking-dots span:nth-child(3) { animation-delay: 0.36s; }
  @keyframes dotBounce {
    0%,100% { transform: translateY(0); opacity: 0.5; }
    50% { transform: translateY(-8px); opacity: 1; }
  }
</style>
</head>
<body>
<!-- Confetti canvas -->
<canvas id="confetti-canvas" aria-hidden="true"></canvas>

<!-- Header -->
<header id="app-header" role="banner">
  <div id="header-title">
    <svg class="spqr-crest" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="SPQR Eagle Crest">
      <!-- Eagle body -->
      <ellipse cx="30" cy="35" rx="10" ry="13" fill="var(--gold-dark)" opacity="0.85"/>
      <!-- Wings -->
      <path d="M20 32 Q10 22 4 28 Q10 35 20 36Z" fill="var(--gold)" opacity="0.9"/>
      <path d="M40 32 Q50 22 56 28 Q50 35 40 36Z" fill="var(--gold)" opacity="0.9"/>
      <!-- Head -->
      <ellipse cx="30" cy="22" rx="7" ry="7" fill="var(--gold)" opacity="0.95"/>
      <!-- Beak -->
      <path d="M30 26 L33 29 L30 28Z" fill="var(--gold-dark)"/>
      <!-- Eye -->
      <circle cx="28" cy="21" r="1.5" fill="var(--marble-dark)"/>
      <!-- Crown/laurel wreath above -->
      <path d="M22 15 Q25 9 30 8 Q35 9 38 15" stroke="var(--gold)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <circle cx="24" cy="14" r="2" fill="var(--gold)" opacity="0.7"/>
      <circle cx="30" cy="11" r="2" fill="var(--gold)" opacity="0.7"/>
      <circle cx="36" cy="14" r="2" fill="var(--gold)" opacity="0.7"/>
      <!-- Tail feathers -->
      <path d="M25 47 Q28 52 30 50 Q32 52 35 47" fill="var(--gold)" opacity="0.75"/>
      <!-- SPQR banner below eagle -->
      <rect x="18" y="52" width="24" height="6" rx="1.5" fill="var(--gold-dark)" opacity="0.7"/>
      <text x="30" y="57" text-anchor="middle" font-family="serif" font-weight="bold" font-size="5" fill="var(--gold-light)" opacity="0.95">SPQR</text>
    </svg>
    <div id="title-text">
      <h1>SPQR</h1>
      <p>LUDUS TRIGEMINUS</p>
    </div>
  </div>
  <div id="header-buttons">
    <button class="btn btn-primary" id="btn-new" onclick="newRound()">New Round</button>
    <button class="btn" id="btn-customize" onclick="openCustomize()">Customize</button>
    <button class="btn" id="btn-reset" onclick="resetScores()">Reset Scores</button>
  </div>
</header>

<!-- Victory Banner (below header, no overlap) -->
<div id="victory-banner" role="status" aria-live="assertive" aria-atomic="true"></div>

<!-- Status line -->
<div id="status-line" role="status" aria-live="polite" aria-atomic="true">Awaiting your move, Legionnaire...</div>

<!-- Game area -->
<main id="game-area" role="main">
  <!-- Scoreboard -->
  <div id="scoreboard" role="region" aria-label="Scoreboard">
    <div class="score-card" id="score-x" aria-label="X score">
      <div class="score-label">X</div>
      <div class="score-glyph score-x" id="glyph-x-score">✕</div>
      <div class="score-num" id="num-x">0</div>
    </div>
    <div class="score-sep">—</div>
    <div class="score-card" id="score-d" aria-label="Draws">
      <div class="score-label">DRAW</div>
      <div class="score-glyph score-d">⚖</div>
      <div class="score-num" id="num-d">0</div>
    </div>
    <div class="score-sep">—</div>
    <div class="score-card" id="score-o" aria-label="O score">
      <div class="score-label">O</div>
      <div class="score-glyph score-o" id="glyph-o-score">○</div>
      <div class="score-num" id="num-o">0</div>
    </div>
  </div>

  <!-- Board -->
  <div id="board-container">
    <div id="board" role="grid" aria-label="Tic Tac Toe Board">
      <!-- Cells generated by JS -->
    </div>
    <!-- Win line SVG -->
    <svg id="win-line-svg" aria-hidden="true">
      <path id="win-line-path"/>
    </svg>
    <!-- AI thinking overlay -->
    <div id="ai-thinking" aria-hidden="true">
      <div class="thinking-dots">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>
</main>

<!-- Customize Modal -->
<div id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title" aria-hidden="true">
  <div id="modal-dialog">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">⚙ Customize</span>
      <button class="modal-close" onclick="closeCustomize()" aria-label="Close">✕</button>
    </div>

    <div class="opt-section">
      <div class="opt-label">THEME</div>
      <div class="opt-group" id="opt-theme">
        <button class="opt-btn selected" data-val="day" onclick="selectOpt('theme',this)">☀ Marble Day</button>
        <button class="opt-btn" data-val="night" onclick="selectOpt('theme',this)">🌙 Night Legion</button>
      </div>
    </div>

    <div class="opt-section">
      <div class="opt-label">GLYPHS</div>
      <div class="opt-group" id="opt-glyphs">
        <button class="opt-btn selected" data-val="standard" onclick="selectOpt('glyphs',this)">Standard X / O</button>
        <button class="opt-btn" data-val="roman" onclick="selectOpt('glyphs',this)">⚔ Gladius / 🏅 Laurel</button>
      </div>
    </div>

    <div class="opt-section">
      <div class="opt-label">MODE</div>
      <div class="opt-group" id="opt-mode">
        <button class="opt-btn selected" data-val="2p" onclick="selectOpt('mode',this)">2 Players</button>
        <button class="opt-btn" data-val="ai" onclick="selectOpt('mode',this)">vs AI</button>
      </div>
    </div>

    <div class="opt-section">
      <div class="opt-label">FIRST MOVE</div>
      <div class="opt-group" id="opt-first">
        <button class="opt-btn selected" data-val="X" onclick="selectOpt('first',this)">X Goes First</button>
        <button class="opt-btn" data-val="O" onclick="selectOpt('first',this)">O Goes First</button>
      </div>
    </div>

    <div class="opt-section" id="ai-difficulty-section">
      <div class="opt-label">AI DISCIPLINE</div>
      <div class="opt-group" id="opt-ai">
        <button class="opt-btn selected" data-val="perfect" onclick="selectOpt('ai',this)">Perfect</button>
        <button class="opt-btn" data-val="pragmatic" onclick="selectOpt('ai',this)">Pragmatic</button>
        <button class="opt-btn" data-val="reckless" onclick="selectOpt('ai',this)">Reckless</button>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn" onclick="closeCustomize()">Cancel</button>
      <button class="btn btn-primary" onclick="applyCustomize()">Apply</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// STATE
// ============================================================
const state = {
  board: Array(9).fill(null),   // null | 'X' | 'O'
  current: 'X',
  gameOver: false,
  winner: null,                 // null | 'X' | 'O' | 'D'
  winLine: null,                // [i,j,k] or null
  scores: { X: 0, O: 0, D: 0 },
  // Settings
  theme: 'day',
  glyphs: 'standard',
  mode: '2p',
  first: 'X',
  aiDifficulty: 'perfect',
  aiPlayer: 'O',
  pendingSettings: {}
};

// Glyph maps
const GLYPHS = {
  standard: { X: '✕', O: '○' },
  roman:    { X: '⚔', O: '🏅' }
};

// Win combos
const WIN_COMBOS = [
  [0,1,2],[3,4,5],[6,7,8],
  [0,3,6],[1,4,7],[2,5,8],
  [0,4,8],[2,4,6]
];

// ============================================================
// DOM helpers
// ============================================================
const $ = id => document.getElementById(id);

function glyph(player) {
  return GLYPHS[state.glyphs][player];
}

// ============================================================
// BOARD INIT
// ============================================================
function initBoard() {
  const board = $('board');
  board.innerHTML = '';
  for (let i = 0; i < 9; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.setAttribute('role', 'gridcell');
    cell.setAttribute('tabindex', '0');
    cell.setAttribute('aria-label', `Cell ${i+1}, empty`);
    cell.dataset.idx = i;

    // Hover ghost
    const ghost = document.createElement('span');
    ghost.className = `hover-ghost hover-${state.current.toLowerCase()}`;
    ghost.setAttribute('aria-hidden', 'true');
    ghost.textContent = glyph(state.current);
    cell.appendChild(ghost);

    cell.addEventListener('click', () => handleCellClick(i));
    cell.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handleCellClick(i); }
    });
    board.appendChild(cell);
  }
  updateWinLineSVG(null);
}

function renderBoard() {
  const cells = $('board').children;
  for (let i = 0; i < 9; i++) {
    const cell = cells[i];
    const val = state.board[i];
    // Remove old mark
    const oldMark = cell.querySelector('.cell-mark');
    if (oldMark) oldMark.remove();
    // Update ghost
    const ghost = cell.querySelector('.hover-ghost');
    if (ghost) {
      ghost.className = `hover-ghost hover-${state.current.toLowerCase()}`;
      ghost.textContent = glyph(state.current);
    }

    cell.className = 'cell';
    cell.setAttribute('aria-label', `Cell ${i+1}, ${val ? (val === 'X' ? 'X' : 'O') : 'empty'}`);

    if (val) {
      cell.classList.add('taken', 'disabled');
      const mark = document.createElement('span');
      mark.className = `cell-mark mark-${val.toLowerCase()}`;
      mark.setAttribute('aria-hidden', 'true');
      mark.textContent = glyph(val);
      cell.appendChild(mark);
      cell.setAttribute('aria-label', `Cell ${i+1}, ${val}`);
    }
    if (state.gameOver) cell.classList.add('disabled');
    if (state.winLine && state.winLine.includes(i)) cell.classList.add('win-cell');
  }
}

// ============================================================
// GAME LOGIC
// ============================================================
function checkWinner(board) {
  for (const [a,b,c] of WIN_COMBOS) {
    if (board[a] && board[a] === board[b] && board[a] === board[c]) {
      return { winner: board[a], line: [a,b,c] };
    }
  }
  if (board.every(c => c !== null)) return { winner: 'D', line: null };
  return null;
}

function handleCellClick(idx) {
  if (state.gameOver) return;
  if (state.board[idx]) return;
  if (state.mode === 'ai' && state.current === state.aiPlayer) return;

  playCell(idx);
}

function playCell(idx) {
  state.board[idx] = state.current;
  const result = checkWinner(state.board);

  renderBoard();

  if (result) {
    endGame(result);
  } else {
    state.current = state.current === 'X' ? 'O' : 'X';
    updateStatus();
    updateScoreHighlight();
    // Trigger AI if needed
    if (state.mode === 'ai' && state.current === state.aiPlayer && !state.gameOver) {
      scheduleAI();
    }
  }
}

function endGame(result) {
  state.gameOver = true;
  state.winner = result.winner;
  state.winLine = result.line;

  if (result.winner !== 'D') {
    state.scores[result.winner]++;
  } else {
    state.scores.D++;
  }

  updateScores();
  renderBoard();
  updateWinLineSVG(result.line);
  showBanner(result);
  updateStatus();
  updateScoreHighlight();

  // Confetti for win (not draw)
  const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (result.winner !== 'D' && !prefersReducedMotion) {
    launchConfetti();
  }
}

function newRound() {
  state.board = Array(9).fill(null);
  state.gameOver = false;
  state.winner = null;
  state.winLine = null;
  state.current = state.first;
  hideBanner();
  stopConfetti();
  initBoard();
  renderBoard();
  updateStatus();
  updateScoreHighlight();
  updateWinLineSVG(null);

  if (state.mode === 'ai' && state.current === state.aiPlayer) {
    scheduleAI();
  }
}

function resetScores() {
  state.scores = { X: 0, O: 0, D: 0 };
  updateScores();
  newRound();
}

// ============================================================
// STATUS & BANNER
// ============================================================
function updateStatus() {
  const sl = $('status-line');
  if (state.gameOver) {
    if (state.winner === 'D') {
      sl.textContent = 'A stalemate! The senate deliberates...';
    } else {
      sl.textContent = `${glyph(state.winner)} ${state.winner} claims victory for Rome!`;
    }
  } else {
    const who = (state.mode === 'ai' && state.current === state.aiPlayer)
      ? `The AI Legion (${glyph(state.current)} ${state.current}) contemplates...`
      : `${glyph(state.current)} ${state.current}'s turn — advance, Legionnaire!`;
    sl.textContent = who;
  }
}

function showBanner(result) {
  const b = $('victory-banner');
  if (result.winner === 'D') {
    b.textContent = '⚖ A Draw — The Gods Are Undecided ⚖';
  } else {
    const msgs = [
      `${glyph(result.winner)} ${result.winner} Triumphs! Glory to Rome!`,
      `Ave, ${result.winner}! Victor of the Arena!`,
      `${result.winner} Conquers! Veni, Vidi, Vici!`
    ];
    b.textContent = msgs[Math.floor(Math.random()*msgs.length)];
  }
  b.classList.add('show');
}
function hideBanner() { $('victory-banner').classList.remove('show'); }

function updateScoreHighlight() {
  $('score-x').classList.toggle('active', !state.gameOver && state.current === 'X');
  $('score-o').classList.toggle('active', !state.gameOver && state.current === 'O');
}

function updateScores() {
  $('num-x').textContent = state.scores.X;
  $('num-o').textContent = state.scores.O;
  $('num-d').textContent = state.scores.D;
}

function updateGlyphDisplay() {
  $('glyph-x-score').textContent = glyph('X');
  $('glyph-o-score').textContent = glyph('O');
}

// ============================================================
// WIN LINE SVG
// ============================================================
function updateWinLineSVG(line) {
  const path = $('win-line-path');
  path.className = '';
  path.style.opacity = '0';
  if (!line) return;

  const board = $('board');
  const cells = board.children;
  const br = board.getBoundingClientRect();

  function cellCenter(idx) {
    const cr = cells[idx].getBoundingClientRect();
    return {
      x: ((cr.left + cr.width/2) - br.left) / br.width * 100,
      y: ((cr.top + cr.height/2) - br.top) / br.height * 100
    };
  }
  const p1 = cellCenter(line[0]);
  const p2 = cellCenter(line[2]);

  // Extend slightly beyond cells
  const dx = p2.x - p1.x, dy = p2.y - p1.y;
  const len = Math.sqrt(dx*dx+dy*dy);
  const ex = dx/len*5, ey = dy/len*5;

  const d = `M ${p1.x-ex}% ${p1.y-ey}% L ${p2.x+ex}% ${p2.y+ey}%`;
  path.setAttribute('d', d);

  // Compute dasharray
  const svgEl = $('win-line-svg');
  const svgW = svgEl.clientWidth;
  const svgH = svgEl.clientHeight;
  const lineLen = Math.sqrt(Math.pow((p2.x+ex - p1.x+ex)/100*svgW,2) + Math.pow((p2.y+ey - p1.y+ey)/100*svgH,2)) + 50;
  path.style.strokeDasharray = lineLen;
  path.style.strokeDashoffset = lineLen;

  requestAnimationFrame(() => {
    path.style.opacity = '1';
    path.classList.add('animate');
  });
}

// ============================================================
// AI
// ============================================================
function scheduleAI() {
  $('ai-thinking').classList.add('visible');
  // Small delay for UX
  const delay = 300 + Math.random()*400;
  setTimeout(() => {
    $('ai-thinking').classList.remove('visible');
    const move = getAIMove(state.board, state.aiPlayer, state.aiDifficulty);
    if (move !== null) playCell(move);
  }, delay);
}

function getAIMove(board, player, difficulty) {
  const empty = board.map((v,i)=>v===null?i:null).filter(i=>i!==null);
  if (empty.length === 0) return null;

  if (difficulty === 'reckless') {
    // 60% random, 40% smart
    if (Math.random() < 0.6) return empty[Math.floor(Math.random()*empty.length)];
  }
  if (difficulty === 'pragmatic') {
    // 25% random
    if (Math.random() < 0.25) return empty[Math.floor(Math.random()*empty.length)];
    // Check immediate win or block
    const win = findImmediate(board, player);
    if (win !== null) return win;
    const opp = player === 'X' ? 'O' : 'X';
    const block = findImmediate(board, opp);
    if (block !== null) return block;
    return empty[Math.floor(Math.random()*empty.length)];
  }
  // Perfect: minimax
  const result = minimax(board, player, player, true, -Infinity, Infinity);
  return result.move;
}

function findImmediate(board, player) {
  for (const [a,b,c] of WIN_COMBOS) {
    const vals = [board[a],board[b],board[c]];
    const pCount = vals.filter(v=>v===player).length;
    const nCount = vals.filter(v=>v===null).length;
    if (pCount===2 && nCount===1) {
      if (!board[a]) return a;
      if (!board[b]) return b;
      return c;
    }
  }
  return null;
}

function minimax(board, aiPlayer, currentPlayer, isMax, alpha, beta) {
  const result = checkWinner(board);
  if (result) {
    if (result.winner === aiPlayer) return { score: 10, move: null };
    if (result.winner === 'D') return { score: 0, move: null };
    return { score: -10, move: null };
  }

  const empty = board.map((v,i)=>v===null?i:null).filter(i=>i!==null);
  let best = isMax ? { score: -Infinity, move: null } : { score: Infinity, move: null };

  for (const idx of empty) {
    const nb = [...board];
    nb[idx] = currentPlayer;
    const res = minimax(nb, aiPlayer, currentPlayer==='X'?'O':'X', !isMax, alpha, beta);
    const cand = { score: res.score, move: idx };
    if (isMax) {
      if (cand.score > best.score) best = cand;
      alpha = Math.max(alpha, best.score);
    } else {
      if (cand.score < best.score) best = cand;
      beta = Math.min(beta, best.score);
    }
    if (beta <= alpha) break;
  }
  return best;
}

// ============================================================
// CONFETTI
// ============================================================
const confettiState = { active: false, particles: [], animId: null };
const confettiColors = ['#c9a84c','#f0d060','#8b1a1a','#1a3a8b','#fff8e8','#e8c87c','#d4af37'];

function launchConfetti() {
  const canvas = $('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const count = Math.min(120, Math.floor(window.innerWidth / 8));
  confettiState.particles = [];
  for (let i = 0; i < count; i++) {
    confettiState.particles.push({
      x: Math.random() * canvas.width,
      y: -10 - Math.random() * 100,
      w: 6 + Math.random() * 8,
      h: 3 + Math.random() * 4,
      color: confettiColors[Math.floor(Math.random()*confettiColors.length)],
      angle: Math.random() * Math.PI * 2,
      spin: (Math.random() - 0.5) * 0.18,
      vx: (Math.random() - 0.5) * 2.5,
      vy: 2 + Math.random() * 3,
      opacity: 0.8 + Math.random() * 0.2,
      life: 1
    });
  }

  confettiState.active = true;
  let startTime = null;
  const duration = 4500;

  function draw(ts) {
    if (!startTime) startTime = ts;
    const elapsed = ts - startTime;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const surviving = [];
    for (const p of confettiState.particles) {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.04;
      p.angle += p.spin;
      if (elapsed > duration * 0.7) p.opacity -= 0.015;
      if (p.opacity > 0 && p.y < canvas.height + 20) surviving.push(p);

      ctx.save();
      ctx.globalAlpha = Math.max(0, p.opacity);
      ctx.translate(p.x, p.y);
      ctx.rotate(p.angle);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
    }

    confettiState.particles = surviving;
    if (confettiState.active && elapsed < duration && surviving.length > 0) {
      confettiState.animId = requestAnimationFrame(draw);
    } else {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      confettiState.active = false;
    }
  }
  if (confettiState.animId) cancelAnimationFrame(confettiState.animId);
  confettiState.animId = requestAnimationFrame(draw);
}

function stopConfetti() {
  confettiState.active = false;
  if (confettiState.animId) {
    cancelAnimationFrame(confettiState.animId);
    confettiState.animId = null;
  }
  const canvas = $('confetti-canvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

// ============================================================
// CUSTOMIZE MODAL
// ============================================================
function openCustomize() {
  // Copy current settings to pending
  state.pendingSettings = {
    theme: state.theme,
    glyphs: state.glyphs,
    mode: state.mode,
    first: state.first,
    ai: state.aiDifficulty
  };
  syncOptButtons();
  const overlay = $('modal-overlay');
  overlay.classList.add('open');
  overlay.setAttribute('aria-hidden', 'false');
  // Focus first button
  setTimeout(() => overlay.querySelector('.opt-btn')?.focus(), 80);
}

function closeCustomize() {
  const overlay = $('modal-overlay');
  overlay.classList.remove('open');
  overlay.setAttribute('aria-hidden', 'true');
}

function syncOptButtons() {
  selectOptVal('opt-theme', state.pendingSettings.theme);
  selectOptVal('opt-glyphs', state.pendingSettings.glyphs);
  selectOptVal('opt-mode', state.pendingSettings.mode);
  selectOptVal('opt-first', state.pendingSettings.first);
  selectOptVal('opt-ai', state.pendingSettings.ai);
}

function selectOptVal(groupId, val) {
  const group = $(groupId);
  group.querySelectorAll('.opt-btn').forEach(btn => {
    btn.classList.toggle('selected', btn.dataset.val === val);
  });
}

function selectOpt(type, btn) {
  const val = btn.dataset.val;
  state.pendingSettings[type] = val;
  const groupMap = { theme:'opt-theme', glyphs:'opt-glyphs', mode:'opt-mode', first:'opt-first', ai:'opt-ai' };
  selectOptVal(groupMap[type], val);
}

function applyCustomize() {
  const ps = state.pendingSettings;
  let needsNewRound = false;

  if (ps.theme !== state.theme) {
    state.theme = ps.theme;
    applyTheme();
  }
  if (ps.glyphs !== state.glyphs) {
    state.glyphs = ps.glyphs;
    updateGlyphDisplay();
    needsNewRound = true;
  }
  if (ps.mode !== state.mode) {
    state.mode = ps.mode;
    needsNewRound = true;
  }
  if (ps.first !== state.first) {
    state.first = ps.first;
    needsNewRound = true;
  }
  if (ps.ai !== state.aiDifficulty) {
    state.aiDifficulty = ps.ai;
  }

  closeCustomize();
  if (needsNewRound) newRound();
  else renderBoard();
}

function applyTheme() {
  document.body.classList.toggle('theme-night', state.theme === 'night');
}

// ============================================================
// KEYBOARD CLOSE MODAL
// ============================================================
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeCustomize();
});
$('modal-overlay').addEventListener('click', e => {
  if (e.target === $('modal-overlay')) closeCustomize();
});

// ============================================================
// RESPONSIVE
// ============================================================
window.addEventListener('resize', () => {
  if (confettiState.active) {
    const canvas = $('confetti-canvas');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  // Redraw win line after resize
  if (state.winLine) {
    setTimeout(() => updateWinLineSVG(state.winLine), 50);
  }
});

// ============================================================
// INIT
// ============================================================
function init() {
  applyTheme();
  updateGlyphDisplay();
  updateScores();
  initBoard();
  updateStatus();
  updateScoreHighlight();
}

init();
</script>
</body>
</html>
