<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Company Acronym List</title>
  <style>
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --surface2: #f1f5f9;
      --border: #e2e8f0;
      --primary: #4f46e5;
      --primary-light: #eef2ff;
      --primary-dark: #3730a3;
      --text: #0f172a;
      --text-muted: #64748b;
      --text-light: #94a3b8;
      --success: #10b981;
      --success-light: #d1fae5;
      --danger: #ef4444;
      --danger-light: #fee2e2;
      --warning: #f59e0b;
      --warning-light: #fef3c7;
      --radius: 10px;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
      --shadow-md: 0 4px 12px rgba(0,0,0,.1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────── */
    header {
      background: var(--primary);
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(79,70,229,.35);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #fff;
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: -.3px;
    }
    .logo svg { opacity: .9; }
    nav { display: flex; gap: 6px; }
    .nav-btn {
      padding: 6px 16px;
      border: none;
      border-radius: 8px;
      font-size: .875rem;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s, color .15s;
      color: rgba(255,255,255,.8);
      background: transparent;
    }
    .nav-btn:hover { background: rgba(255,255,255,.15); color: #fff; }
    .nav-btn.active { background: rgba(255,255,255,.2); color: #fff; }

    /* ── Layout ──────────────────────────────────── */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 20px;
    }

    /* ── Pages ───────────────────────────────────── */
    .page { display: none; }
    .page.active { display: block; }

    /* ── Search Bar ──────────────────────────────── */
    .search-wrap {
      position: relative;
      margin-bottom: 20px;
    }
    .search-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-light);
      pointer-events: none;
    }
    #searchInput {
      width: 100%;
      padding: 12px 14px 12px 42px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-size: 1rem;
      background: var(--surface);
      color: var(--text);
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      box-shadow: var(--shadow);
    }
    #searchInput:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79,70,229,.12);
    }
    #searchInput::placeholder { color: var(--text-light); }

    /* ── Filter Tags ─────────────────────────────── */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
      align-items: center;
    }
    .filter-label {
      font-size: .8rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-right: 4px;
    }
    .tag-btn {
      padding: 5px 14px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      font-size: .8rem;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
      color: var(--text-muted);
    }
    .tag-btn:hover { border-color: var(--primary); color: var(--primary); }
    .tag-btn.active {
      border-color: transparent;
      background: var(--primary);
      color: #fff;
    }

    /* ── Stats Bar ───────────────────────────────── */
    .stats-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .result-count {
      font-size: .85rem;
      color: var(--text-muted);
    }
    .sort-select {
      padding: 5px 10px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: .8rem;
      color: var(--text-muted);
      background: var(--surface);
      cursor: pointer;
      outline: none;
    }

    /* ── Acronym Cards ───────────────────────────── */
    #acronymList { display: flex; flex-direction: column; gap: 10px; }
    .acronym-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      display: flex;
      align-items: flex-start;
      gap: 16px;
      box-shadow: var(--shadow);
      transition: border-color .15s, box-shadow .15s, transform .1s;
      cursor: default;
    }
    .acronym-card:hover {
      border-color: var(--primary);
      box-shadow: var(--shadow-md);
      transform: translateY(-1px);
    }
    .acronym-badge {
      min-width: 72px;
      text-align: center;
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--primary);
      background: var(--primary-light);
      border-radius: 8px;
      padding: 8px 10px;
      letter-spacing: .5px;
      line-height: 1;
      flex-shrink: 0;
    }
    .acronym-body { flex: 1; min-width: 0; }
    .acronym-full {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }
    .acronym-def {
      font-size: .875rem;
      color: var(--text-muted);
      line-height: 1.5;
      margin-bottom: 8px;
    }
    .acronym-tags { display: flex; flex-wrap: wrap; gap: 5px; }
    .tag {
      font-size: .72rem;
      font-weight: 600;
      padding: 2px 9px;
      border-radius: 12px;
      text-transform: uppercase;
      letter-spacing: .4px;
    }

    /* Tag color palette */
    .tag-teams    { background: #ede9fe; color: #7c3aed; }
    .tag-projects { background: #dbeafe; color: #1d4ed8; }
    .tag-processes{ background: #d1fae5; color: #065f46; }
    .tag-finance  { background: #fef3c7; color: #92400e; }
    .tag-hr       { background: #fce7f3; color: #9d174d; }
    .tag-tech     { background: #e0f2fe; color: #0369a1; }
    .tag-general  { background: #f1f5f9; color: #475569; }

    .no-results {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .no-results svg { margin-bottom: 12px; opacity: .4; }
    .no-results p { font-size: .95rem; }

    /* ── Quiz Page ───────────────────────────────── */
    .quiz-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .quiz-header h2 { font-size: 1.25rem; font-weight: 700; }
    .quiz-controls { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn {
      padding: 8px 18px;
      border: none;
      border-radius: 8px;
      font-size: .875rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-outline {
      background: transparent;
      border: 1.5px solid var(--border);
      color: var(--text-muted);
    }
    .btn-outline:hover { border-color: var(--primary); color: var(--primary); }

    .quiz-progress {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 20px;
      margin-bottom: 20px;
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
    }
    .progress-stat { text-align: center; flex: 1; min-width: 80px; }
    .progress-stat .num { font-size: 1.5rem; font-weight: 800; }
    .progress-stat .lbl { font-size: .75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; }
    .progress-stat .num.green { color: var(--success); }
    .progress-stat .num.red   { color: var(--danger); }
    .progress-stat .num.blue  { color: var(--primary); }

    .progress-bar-wrap {
      height: 6px;
      background: var(--surface2);
      border-radius: 3px;
      margin-top: 8px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), #818cf8);
      border-radius: 3px;
      transition: width .4s ease;
    }

    /* Quiz card */
    .quiz-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 32px 28px;
      box-shadow: var(--shadow-md);
      max-width: 680px;
      margin: 0 auto;
      text-align: center;
    }
    .quiz-q-type {
      font-size: .75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--primary);
      margin-bottom: 12px;
    }
    .quiz-question {
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--primary);
      letter-spacing: 2px;
      margin-bottom: 8px;
    }
    .quiz-hint {
      font-size: .85rem;
      color: var(--text-light);
      margin-bottom: 28px;
    }
    .quiz-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .quiz-option {
      padding: 14px 16px;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      font-size: .9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
      text-align: left;
      color: var(--text);
    }
    .quiz-option:hover:not(:disabled) {
      border-color: var(--primary);
      background: var(--primary-light);
      color: var(--primary);
    }
    .quiz-option.correct {
      border-color: var(--success);
      background: var(--success-light);
      color: #065f46;
    }
    .quiz-option.wrong {
      border-color: var(--danger);
      background: var(--danger-light);
      color: #991b1b;
    }
    .quiz-option:disabled { cursor: default; }
    .quiz-feedback {
      margin-top: 20px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: .875rem;
      font-weight: 600;
      display: none;
    }
    .quiz-feedback.show { display: block; }
    .quiz-feedback.correct { background: var(--success-light); color: #065f46; }
    .quiz-feedback.wrong   { background: var(--danger-light);  color: #991b1b; }
    .quiz-next {
      margin-top: 18px;
      display: none;
    }
    .quiz-next.show { display: block; }

    /* Quiz complete */
    .quiz-complete {
      text-align: center;
      padding: 40px 20px;
      display: none;
    }
    .quiz-complete.show { display: block; }
    .quiz-complete .score-ring {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: conic-gradient(var(--success) 0% var(--pct), var(--surface2) var(--pct) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--text);
      position: relative;
    }
    .score-ring::before {
      content: '';
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: var(--surface);
      position: absolute;
    }
    .score-ring span { position: relative; z-index: 1; }
    .quiz-complete h3 { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
    .quiz-complete p  { color: var(--text-muted); margin-bottom: 24px; }

    /* Category filter for quiz */
    .quiz-category-select {
      padding: 7px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: .85rem;
      color: var(--text);
      background: var(--surface);
      cursor: pointer;
      outline: none;
    }

    /* ── Responsive ──────────────────────────────── */
    @media (max-width: 600px) {
      header { padding: 0 14px; }
      .logo span { display: none; }
      .nav-btn { padding: 6px 10px; font-size: .8rem; }
      .quiz-question { font-size: 1.6rem; }
      .quiz-options { grid-template-columns: 1fr; }
      .quiz-card { padding: 24px 16px; }
      .acronym-badge { min-width: 58px; font-size: .95rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="3"/>
      <path d="M8 12h8M12 8v8"/>
    </svg>
    <span>AcronymBase</span>
  </div>
  <nav>
    <button class="nav-btn active" id="navBrowse" onclick="showPage('browse')">Browse</button>
    <button class="nav-btn" id="navQuiz" onclick="showPage('quiz')">Quiz Mode</button>
  </nav>
</header>

<main>
  <!-- ───────── BROWSE PAGE ───────── -->
  <div class="page active" id="pageBrowse">
    <div class="search-wrap">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input id="searchInput" type="search" placeholder="Search acronyms or definitions…" oninput="filterList()" autocomplete="off" />
    </div>

    <div class="filter-bar" id="filterBar">
      <span class="filter-label">Filter:</span>
      <!-- populated by JS -->
    </div>

    <div class="stats-bar">
      <span class="result-count" id="resultCount"></span>
      <select class="sort-select" onchange="filterList()" id="sortSelect">
        <option value="alpha">A → Z</option>
        <option value="category">By Category</option>
      </select>
    </div>

    <div id="acronymList"></div>
  </div>

  <!-- ───────── QUIZ PAGE ───────── -->
  <div class="page" id="pageQuiz">
    <div class="quiz-header">
      <h2>Quiz Mode</h2>
      <div class="quiz-controls">
        <select class="quiz-category-select" id="quizCategory" onchange="resetQuiz()">
          <option value="all">All Categories</option>
        </select>
        <button class="btn btn-outline" onclick="resetQuiz()">Restart</button>
        <button class="btn btn-primary" onclick="startQuiz()" id="startQuizBtn">Start Quiz</button>
      </div>
    </div>

    <div class="quiz-progress" id="quizProgress" style="display:none">
      <div class="progress-stat">
        <div class="num blue" id="qCurrent">0</div>
        <div class="lbl">Question</div>
      </div>
      <div class="progress-stat">
        <div class="num green" id="qCorrect">0</div>
        <div class="lbl">Correct</div>
      </div>
      <div class="progress-stat">
        <div class="num red" id="qWrong">0</div>
        <div class="lbl">Wrong</div>
      </div>
      <div class="progress-stat" style="flex:3; display:flex; flex-direction:column; justify-content:center;">
        <div class="progress-bar-wrap">
          <div class="progress-bar-fill" id="qProgressBar" style="width:0%"></div>
        </div>
      </div>
    </div>

    <div id="quizCardWrap"></div>
    <div class="quiz-complete" id="quizComplete"></div>
  </div>
</main>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// DATA
// ─────────────────────────────────────────────────────────────────────────────
const acronyms = [
  // Teams
  { a:"PM",  full:"Product Management",           def:"Team responsible for product strategy, roadmap, and requirements.",                     tags:["teams"] },
  { a:"UX",  full:"User Experience",              def:"Design discipline focused on how users interact with and experience a product.",         tags:["teams","processes"] },
  { a:"QA",  full:"Quality Assurance",            def:"Team that tests software to identify defects before release.",                          tags:["teams","processes"] },
  { a:"SRE", full:"Site Reliability Engineering", def:"Team that applies software engineering to infrastructure and operations problems.",      tags:["teams","tech"] },
  { a:"CX",  full:"Customer Experience",          def:"Team managing post-sale customer satisfaction, support, and retention.",                 tags:["teams"] },
  { a:"BD",  full:"Business Development",         def:"Team focused on growth through partnerships, deals, and new market opportunities.",      tags:["teams"] },
  { a:"HR",  full:"Human Resources",              def:"Department managing hiring, benefits, culture, and employee relations.",                 tags:["teams","hr"] },
  { a:"L&D", full:"Learning & Development",       def:"HR sub-team responsible for employee training and professional growth programs.",        tags:["teams","hr"] },
  { a:"BI",  full:"Business Intelligence",        def:"Team that analyzes business data to provide actionable insights and reporting.",         tags:["teams","tech"] },

  // Projects
  { a:"MVP", full:"Minimum Viable Product",       def:"The simplest version of a product that can be released to gather validated learning.",   tags:["projects","processes"] },
  { a:"POC", full:"Proof of Concept",             def:"A prototype demonstrating the feasibility of an idea before full-scale development.",    tags:["projects"] },
  { a:"GTM", full:"Go-To-Market",                 def:"Strategy and plan for launching a product to customers.",                               tags:["projects","processes"] },
  { a:"R&D", full:"Research & Development",       def:"Internal team or project exploring new technologies and innovations.",                  tags:["projects","teams"] },
  { a:"OKR", full:"Objectives & Key Results",     def:"Goal-setting framework linking company objectives to measurable outcomes.",              tags:["projects","processes"] },

  // Processes
  { a:"EOD", full:"End of Day",                   def:"Deadline referring to close of business, typically 5 or 6 PM local time.",              tags:["processes","general"] },
  { a:"EOM", full:"End of Month",                 def:"Deadline or reporting period closing on the last day of the current month.",            tags:["processes","finance"] },
  { a:"EOQ", full:"End of Quarter",               def:"The conclusion of a fiscal quarter, used for reporting and goal assessment.",           tags:["processes","finance"] },
  { a:"SLA", full:"Service Level Agreement",      def:"Contract defining expected service standards (uptime, response time, etc.).",           tags:["processes","tech"] },
  { a:"SOW", full:"Statement of Work",            def:"Document specifying deliverables, timelines, and costs for a project or engagement.",   tags:["processes"] },
  { a:"NDA", full:"Non-Disclosure Agreement",     def:"Legal contract preventing parties from sharing confidential information.",              tags:["processes","hr"] },
  { a:"PTO", full:"Paid Time Off",                def:"Company-approved leave days compensated at the employee's normal pay rate.",            tags:["processes","hr"] },
  { a:"RACI",full:"Responsible, Accountable, Consulted, Informed", def:"Responsibility matrix clarifying roles in a project or process.", tags:["processes","projects"] },
  { a:"WFH", full:"Work From Home",               def:"Remote work policy allowing employees to work outside the office.",                    tags:["processes","hr"] },
  { a:"KPI", full:"Key Performance Indicator",    def:"Measurable value demonstrating how effectively a company meets objectives.",           tags:["processes","finance"] },

  // Finance
  { a:"ARR", full:"Annual Recurring Revenue",     def:"Predictable revenue normalized to a one-year period, key SaaS metric.",                tags:["finance"] },
  { a:"MRR", full:"Monthly Recurring Revenue",    def:"Predictable revenue recognized in a single month from subscriptions.",                 tags:["finance"] },
  { a:"CAC", full:"Customer Acquisition Cost",    def:"Total cost of sales and marketing required to acquire one new customer.",              tags:["finance"] },
  { a:"LTV", full:"Lifetime Value",               def:"Projected total revenue a business can earn from a single customer over time.",        tags:["finance"] },
  { a:"P&L", full:"Profit & Loss",                def:"Financial statement summarizing revenues, costs, and expenses over a period.",         tags:["finance"] },
  { a:"ROI", full:"Return on Investment",         def:"Performance measure evaluating the efficiency or profitability of an investment.",      tags:["finance","processes"] },
  { a:"EBITDA",full:"Earnings Before Interest, Taxes, Depreciation, and Amortization", def:"Proxy for core operational profitability.", tags:["finance"] },
  { a:"YTD", full:"Year to Date",                 def:"Period from the start of the current year up to and including today.",                 tags:["finance","processes"] },

  // Tech
  { a:"API", full:"Application Programming Interface", def:"Set of rules allowing software applications to communicate with each other.",   tags:["tech"] },
  { a:"CI/CD",full:"Continuous Integration / Continuous Deployment", def:"Automated pipelines for building, testing, and releasing code.", tags:["tech","processes"] },
  { a:"PR",  full:"Pull Request",                 def:"Developer's request to merge code changes into a main branch for review.",             tags:["tech"] },
  { a:"LGTM",full:"Looks Good To Me",             def:"Informal approval used in code reviews to indicate the change is acceptable.",        tags:["tech","general"] },
  { a:"PII", full:"Personally Identifiable Information", def:"Data that can identify a specific individual; subject to privacy regulations.", tags:["tech","hr"] },
  { a:"SSO", full:"Single Sign-On",               def:"Authentication scheme allowing users to log in with one set of credentials across multiple systems.", tags:["tech"] },
  { a:"SDK", full:"Software Development Kit",     def:"Collection of tools, libraries, and documentation for building on a platform.",       tags:["tech"] },
  { a:"IaC", full:"Infrastructure as Code",       def:"Managing and provisioning infrastructure through machine-readable configuration files.", tags:["tech"] },
  { a:"SaaS",full:"Software as a Service",        def:"Cloud-based software licensed on a subscription basis and accessed via browser.",     tags:["tech","finance"] },
  { a:"TLS", full:"Transport Layer Security",     def:"Cryptographic protocol ensuring secure data transmission over networks.",             tags:["tech"] },

  // General
  { a:"TBD", full:"To Be Determined",             def:"Placeholder indicating a decision or detail has not yet been finalized.",             tags:["general"] },
  { a:"TBD", full:"To Be Determined",             def:"",                                                                                    tags:["general"] }, // intentional dupe for variety
  { a:"FYI", full:"For Your Information",         def:"Used to share information without requiring action from the recipient.",              tags:["general"] },
  { a:"ASAP",full:"As Soon As Possible",          def:"Request to prioritize and complete a task with urgency.",                             tags:["general"] },
  { a:"ETA", full:"Estimated Time of Arrival",    def:"Expected date/time when a deliverable or person will be ready or present.",          tags:["general","processes"] },
  { a:"COB", full:"Close of Business",            def:"End of the standard working day, used as a deadline reference.",                     tags:["general","processes"] },
  { a:"POC", full:"Point of Contact",             def:"Designated person responsible for communication about a topic or project.",          tags:["general","processes"] },
];

// De-dupe by acronym+full combination
const seen = new Set();
const data = acronyms.filter(d => {
  const key = d.a + '|' + d.full;
  if (seen.has(key)) return false;
  seen.add(key);
  return true;
});

// All unique categories
const allCategories = ['all', ...new Set(data.flatMap(d => d.tags))].sort((a,b)=>a==='all'?-1:b==='all'?1:a.localeCompare(b));

// ─────────────────────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────────────────────
let activeTag = 'all';
let quiz = { pool:[], idx:0, correct:0, wrong:0, answered:false };

// ─────────────────────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────────────────────
function init() {
  buildFilterBar();
  buildQuizCategorySelect();
  filterList();
  resetQuiz();
}

// ─────────────────────────────────────────────────────────────────────────────
// NAV
// ─────────────────────────────────────────────────────────────────────────────
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page' + name.charAt(0).toUpperCase() + name.slice(1)).classList.add('active');
  document.getElementById('nav' + name.charAt(0).toUpperCase() + name.slice(1)).classList.add('active');
}

// ─────────────────────────────────────────────────────────────────────────────
// BROWSE
// ─────────────────────────────────────────────────────────────────────────────
function buildFilterBar() {
  const bar = document.getElementById('filterBar');
  const cats = ['all', ...new Set(data.flatMap(d => d.tags))].sort((a,b)=>a==='all'?-1:b==='all'?1:a.localeCompare(b));
  bar.innerHTML = '<span class="filter-label">Filter:</span>' +
    cats.map(c => `<button class="tag-btn${c==='all'?' active':''}" data-tag="${c}" onclick="setTag('${c}')">${capitalize(c)}</button>`).join('');
}

function setTag(tag) {
  activeTag = tag;
  document.querySelectorAll('.tag-btn').forEach(b => b.classList.toggle('active', b.dataset.tag === tag));
  filterList();
}

function filterList() {
  const q     = document.getElementById('searchInput').value.trim().toLowerCase();
  const sort  = document.getElementById('sortSelect').value;
  let items   = data.filter(d => {
    const matchTag = activeTag === 'all' || d.tags.includes(activeTag);
    const matchQ   = !q || d.a.toLowerCase().includes(q) || d.full.toLowerCase().includes(q) || d.def.toLowerCase().includes(q);
    return matchTag && matchQ;
  });
  if (sort === 'alpha') items.sort((a,b) => a.a.localeCompare(b.a));
  else items.sort((a,b) => a.tags[0].localeCompare(b.tags[0]) || a.a.localeCompare(b.a));

  document.getElementById('resultCount').textContent = `${items.length} acronym${items.length!==1?'s':''}`;

  const list = document.getElementById('acronymList');
  if (!items.length) {
    list.innerHTML = `<div class="no-results">
      <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <p>No acronyms match your search.</p>
    </div>`;
    return;
  }
  list.innerHTML = items.map(d => `
    <div class="acronym-card">
      <div class="acronym-badge">${escHtml(d.a)}</div>
      <div class="acronym-body">
        <div class="acronym-full">${escHtml(d.full)}</div>
        ${d.def ? `<div class="acronym-def">${escHtml(d.def)}</div>` : ''}
        <div class="acronym-tags">${d.tags.map(t=>`<span class="tag tag-${t}">${capitalize(t)}</span>`).join('')}</div>
      </div>
    </div>
  `).join('');
}

// ─────────────────────────────────────────────────────────────────────────────
// QUIZ
// ─────────────────────────────────────────────────────────────────────────────
function buildQuizCategorySelect() {
  const sel = document.getElementById('quizCategory');
  const cats = ['all', ...new Set(data.flatMap(d => d.tags))].sort((a,b)=>a==='all'?-1:b==='all'?1:a.localeCompare(b));
  sel.innerHTML = cats.map(c => `<option value="${c}">${capitalize(c)}</option>`).join('');
}

function getQuizPool() {
  const cat = document.getElementById('quizCategory').value;
  return cat === 'all' ? [...data] : data.filter(d => d.tags.includes(cat));
}

function resetQuiz() {
  quiz = { pool:[], idx:0, correct:0, wrong:0, answered:false };
  document.getElementById('quizProgress').style.display = 'none';
  document.getElementById('quizCardWrap').innerHTML = `
    <div class="quiz-card" style="text-align:center; padding: 40px 28px;">
      <div style="font-size:2.5rem; margin-bottom:16px">📖</div>
      <h3 style="font-size:1.2rem; font-weight:700; margin-bottom:8px;">Test Your Knowledge</h3>
      <p style="color:var(--text-muted); font-size:.9rem;">Pick a category and hit <strong>Start Quiz</strong> to begin. You'll be shown acronyms and asked to identify their meaning from four choices.</p>
    </div>`;
  document.getElementById('quizComplete').classList.remove('show');
  document.getElementById('startQuizBtn').style.display = '';
}

function startQuiz() {
  const pool = shuffle(getQuizPool());
  if (pool.length < 4) {
    alert('Not enough acronyms in this category to run a quiz (need at least 4).');
    return;
  }
  quiz = { pool, idx:0, correct:0, wrong:0, answered:false };
  document.getElementById('startQuizBtn').style.display = 'none';
  document.getElementById('quizProgress').style.display = 'flex';
  document.getElementById('quizComplete').classList.remove('show');
  updateProgress();
  renderQuestion();
}

function renderQuestion() {
  const { pool, idx } = quiz;
  if (idx >= pool.length) { showQuizComplete(); return; }
  const item = pool[idx];
  // Build 4 options: 1 correct + 3 distractors
  const distractors = shuffle(data.filter(d => d.full !== item.full)).slice(0, 3);
  const options = shuffle([item, ...distractors]);

  document.getElementById('quizCardWrap').innerHTML = `
    <div class="quiz-card">
      <div class="quiz-q-type">What does this stand for?</div>
      <div class="quiz-question">${escHtml(item.a)}</div>
      <div class="quiz-hint">Select the correct definition below</div>
      <div class="quiz-options">
        ${options.map((o,i) => `
          <button class="quiz-option" id="qopt${i}" onclick="answerQuiz(${i}, ${o.full === item.full}, this)">
            ${escHtml(o.full)}
          </button>`).join('')}
      </div>
      <div class="quiz-feedback" id="quizFeedback"></div>
      <div class="quiz-next" id="quizNext">
        <button class="btn btn-primary" onclick="nextQuestion()">
          ${idx + 1 < pool.length ? 'Next Question →' : 'See Results'}
        </button>
      </div>
    </div>`;
}

function answerQuiz(idx, isCorrect, btn) {
  if (quiz.answered) return;
  quiz.answered = true;
  const item = quiz.pool[quiz.idx];

  // Style all buttons
  document.querySelectorAll('.quiz-option').forEach((b, i) => {
    b.disabled = true;
    const optionText = b.textContent.trim();
    if (optionText === item.full) b.classList.add('correct');
    else if (b === btn && !isCorrect) b.classList.add('wrong');
  });

  const fb = document.getElementById('quizFeedback');
  fb.classList.add('show');
  if (isCorrect) {
    quiz.correct++;
    fb.className = 'quiz-feedback show correct';
    fb.textContent = '✓ Correct! ' + (item.def ? item.def : '');
  } else {
    quiz.wrong++;
    fb.className = 'quiz-feedback show wrong';
    fb.textContent = `✗ Not quite. ${item.a} stands for "${item.full}". ${item.def}`;
  }
  document.getElementById('quizNext').classList.add('show');
  updateProgress();
}

function nextQuestion() {
  quiz.idx++;
  quiz.answered = false;
  updateProgress();
  renderQuestion();
}

function updateProgress() {
  const { idx, pool, correct, wrong } = quiz;
  document.getElementById('qCurrent').textContent = Math.min(idx + 1, pool.length);
  document.getElementById('qCorrect').textContent = correct;
  document.getElementById('qWrong').textContent   = wrong;
  const pct = pool.length ? Math.round((idx / pool.length) * 100) : 0;
  document.getElementById('qProgressBar').style.width = pct + '%';
}

function showQuizComplete() {
  document.getElementById('quizCardWrap').innerHTML = '';
  const { correct, pool } = quiz;
  const total = pool.length;
  const pct   = Math.round((correct / total) * 100);
  const grade = pct >= 90 ? '🏆 Outstanding!' : pct >= 70 ? '🎉 Great job!' : pct >= 50 ? '📚 Keep studying!' : '💪 Keep at it!';

  // conic gradient percent
  const conicPct = pct + '%';
  const el = document.getElementById('quizComplete');
  el.classList.add('show');
  el.innerHTML = `
    <div class="score-ring" style="--pct:${conicPct}">
      <span>${pct}%</span>
    </div>
    <h3>${grade}</h3>
    <p>You got <strong>${correct}</strong> out of <strong>${total}</strong> correct.</p>
    <div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap;">
      <button class="btn btn-primary" onclick="startQuiz()">Try Again</button>
      <button class="btn btn-outline" onclick="resetQuiz()">Change Category</button>
    </div>`;
  document.getElementById('qProgressBar').style.width = '100%';
}

// ─────────────────────────────────────────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
</body>
</html>
