<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tiny Kanban</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface2: #263349;
    --border: #334155;
    --text: #f1f5f9;
    --text-muted: #94a3b8;
    --accent: #3b82f6;
    --accent-hover: #2563eb;
    --todo-col: #1e293b;
    --doing-col: #1e2d3d;
    --done-col: #1a2d1e;
    --todo-header: #3b82f6;
    --doing-header: #f59e0b;
    --done-header: #22c55e;
    --p1: #ef4444;
    --p2: #f97316;
    --p3: #eab308;
    --p4: #94a3b8;
    --radius: 10px;
    --shadow: 0 4px 16px rgba(0,0,0,0.4);
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .logo {
    font-size: 1.4rem;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    white-space: nowrap;
  }

  .logo span {
    font-size: 1.1rem;
    font-weight: 400;
    -webkit-text-fill-color: var(--text-muted);
    background: none;
    -webkit-background-clip: unset;
    background-clip: unset;
    margin-left: 6px;
  }

  .search-wrap {
    flex: 1;
    min-width: 180px;
    max-width: 360px;
    position: relative;
  }

  .search-wrap svg {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none;
  }

  #search {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 0.9rem;
    padding: 8px 12px 8px 34px;
    outline: none;
    transition: border-color 0.2s;
  }

  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--text-muted); }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-left: auto;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 0.875rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    white-space: nowrap;
  }

  .btn:hover { background: var(--accent-hover); }
  .btn:active { transform: scale(0.97); }

  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
  }

  .btn-ghost:hover { background: var(--surface2); color: var(--text); }

  .date-badge {
    font-size: 0.8rem;
    color: var(--text-muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 10px;
    white-space: nowrap;
  }

  /* Board */
  .board {
    display: flex;
    gap: 16px;
    padding: 20px 24px;
    flex: 1;
    overflow-x: auto;
    align-items: flex-start;
  }

  .column {
    flex: 1;
    min-width: 280px;
    max-width: 380px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .col-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
  }

  .col-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .col-title {
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.02em;
    flex: 1;
  }

  .col-count {
    font-size: 0.8rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 20px;
    background: var(--surface2);
    color: var(--text-muted);
  }

  .wip-badge {
    font-size: 0.75rem;
    padding: 2px 8px;
    border-radius: 20px;
    background: rgba(239,68,68,0.15);
    color: #ef4444;
    border: 1px solid rgba(239,68,68,0.3);
    font-weight: 600;
  }

  .wip-ok {
    background: rgba(34,197,94,0.1);
    color: #22c55e;
    border-color: rgba(34,197,94,0.3);
  }

  .col-body {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    min-height: 120px;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    transition: background 0.2s;
  }

  .col-body.drag-over {
    background: var(--surface2);
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(59,130,246,0.2);
  }

  .col-add-btn {
    background: none;
    border: 1px dashed var(--border);
    border-radius: 8px;
    color: var(--text-muted);
    padding: 8px;
    font-size: 0.85rem;
    cursor: pointer;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: all 0.2s;
    margin-top: 2px;
  }

  .col-add-btn:hover {
    background: var(--surface2);
    color: var(--text);
    border-color: var(--accent);
  }

  /* Card */
  .card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    cursor: grab;
    transition: box-shadow 0.2s, transform 0.2s, opacity 0.2s;
    position: relative;
    border-left: 3px solid transparent;
    user-select: none;
  }

  .card:hover {
    box-shadow: var(--shadow);
    transform: translateY(-1px);
  }

  .card.dragging {
    opacity: 0.4;
    cursor: grabbing;
  }

  .card.ghost {
    opacity: 0.3;
    background: var(--accent);
  }

  .card[data-priority="1"] { border-left-color: var(--p1); }
  .card[data-priority="2"] { border-left-color: var(--p2); }
  .card[data-priority="3"] { border-left-color: var(--p3); }
  .card[data-priority="4"] { border-left-color: var(--p4); }

  .card-top {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 8px;
  }

  .card-title {
    font-size: 0.95rem;
    font-weight: 600;
    line-height: 1.3;
    flex: 1;
    word-break: break-word;
  }

  .card-menu-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 4px;
    font-size: 1rem;
    line-height: 1;
    flex-shrink: 0;
    transition: all 0.2s;
  }

  .card-menu-btn:hover { background: var(--border); color: var(--text); }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }

  .priority-tag {
    font-size: 0.72rem;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .p1-tag { background: rgba(239,68,68,0.15); color: #ef4444; }
  .p2-tag { background: rgba(249,115,22,0.15); color: #f97316; }
  .p3-tag { background: rgba(234,179,8,0.15); color: #eab308; }
  .p4-tag { background: rgba(148,163,184,0.15); color: #94a3b8; }

  .assignee-chip {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 0.78rem;
    color: var(--text-muted);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2px 8px;
  }

  .avatar {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 0.65rem;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
  }

  .card-desc {
    font-size: 0.82rem;
    color: var(--text-muted);
    margin-top: 6px;
    line-height: 1.4;
  }

  /* Dropdown Menu */
  .card-menu {
    position: absolute;
    top: 36px;
    right: 8px;
    background: #1e293b;
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    z-index: 100;
    min-width: 150px;
    overflow: hidden;
  }

  .card-menu-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 14px;
    font-size: 0.85rem;
    cursor: pointer;
    transition: background 0.15s;
    color: var(--text);
    border: none;
    background: none;
    width: 100%;
    text-align: left;
  }

  .card-menu-item:hover { background: var(--surface2); }
  .card-menu-item.danger { color: #ef4444; }
  .card-menu-item.danger:hover { background: rgba(239,68,68,0.1); }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(3px);
    padding: 16px;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    width: 100%;
    max-width: 440px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.6);
  }

  .modal h2 {
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 18px;
    color: var(--text);
  }

  .form-group {
    margin-bottom: 14px;
  }

  .form-group label {
    display: block;
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 5px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .form-group input,
  .form-group textarea,
  .form-group select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 0.9rem;
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
  }

  .form-group input:focus,
  .form-group textarea:focus,
  .form-group select:focus { border-color: var(--accent); }

  .form-group textarea { resize: vertical; min-height: 72px; }

  .form-group select option { background: #1e293b; }

  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 20px;
  }

  .btn-danger {
    background: rgba(239,68,68,0.15);
    color: #ef4444;
    border: 1px solid rgba(239,68,68,0.3);
  }

  .btn-danger:hover { background: rgba(239,68,68,0.25); }

  /* Toast */
  .toasts {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 999;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .toast {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 0.85rem;
    box-shadow: var(--shadow);
    animation: slideIn 0.2s ease;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  @keyframes slideIn {
    from { transform: translateX(40px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  .no-results {
    text-align: center;
    color: var(--text-muted);
    font-size: 0.9rem;
    padding: 24px 0;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Highlight search */
  .hl { background: rgba(234,179,8,0.35); border-radius: 2px; padding: 0 2px; }
</style>
</head>
<body>

<header>
  <div class="logo">Tiny Kanban</div>
  <div class="search-wrap">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="search" type="text" placeholder="Search cards…" autocomplete="off">
  </div>
  <div class="header-actions">
    <div class="date-badge" id="datebadge"></div>
    <button class="btn" onclick="openAddModal()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      Add Card
    </button>
  </div>
</header>

<div class="board" id="board">
  <!-- columns rendered by JS -->
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <h2 id="modal-title">Add Card</h2>
    <div class="form-group">
      <label>Title *</label>
      <input id="f-title" type="text" placeholder="What needs to be done?" maxlength="120">
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id="f-desc" placeholder="Optional details…"></textarea>
    </div>
    <div style="display:flex;gap:10px;">
      <div class="form-group" style="flex:1">
        <label>Column</label>
        <select id="f-col">
          <option value="todo">Todo</option>
          <option value="doing">Doing</option>
          <option value="done">Done</option>
        </select>
      </div>
      <div class="form-group" style="flex:1">
        <label>Priority</label>
        <select id="f-priority">
          <option value="1">🔴 Critical</option>
          <option value="2">🟠 High</option>
          <option value="3" selected>🟡 Medium</option>
          <option value="4">⚪ Low</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Assignee</label>
      <select id="f-assignee">
        <option value="">— Unassigned —</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" id="delete-btn" style="display:none" onclick="deleteCard()">Delete</button>
      <button class="btn" onclick="saveCard()">Save</button>
    </div>
  </div>
</div>

<div class="toasts" id="toasts"></div>

<script>
// ---- State ----
const COLS = [
  { id: 'todo',  label: 'Todo',  wip: 0, color: '#3b82f6' },
  { id: 'doing', label: 'Doing', wip: 4, color: '#f59e0b' },
  { id: 'done',  label: 'Done',  wip: 0, color: '#22c55e' },
];

const TEAM = [
  { id: 'alice',   name: 'Alice',   color: '#8b5cf6' },
  { id: 'bob',     name: 'Bob',     color: '#3b82f6' },
  { id: 'carol',   name: 'Carol',   color: '#10b981' },
  { id: 'dave',    name: 'Dave',    color: '#f59e0b' },
  { id: 'eve',     name: 'Eve',     color: '#ec4899' },
];

const PRIORITY_LABELS = { 1: 'Critical', 2: 'High', 3: 'Medium', 4: 'Low' };
const PRIORITY_TAGS   = { 1: 'p1-tag',  2: 'p2-tag', 3: 'p3-tag', 4: 'p4-tag' };

let cards = JSON.parse(localStorage.getItem('tinykanban_cards') || 'null') || [
  { id: uid(), col: 'todo',  title: 'Set up CI/CD pipeline',       desc: 'Configure GitHub Actions for automated deploys.',  priority: 1, assignee: 'alice' },
  { id: uid(), col: 'todo',  title: 'Write unit tests for auth',    desc: '',                                                 priority: 2, assignee: 'bob' },
  { id: uid(), col: 'todo',  title: 'Design onboarding flow',       desc: 'Wireframes + copy for new user walkthrough.',      priority: 3, assignee: 'carol' },
  { id: uid(), col: 'todo',  title: 'Update API documentation',     desc: '',                                                 priority: 4, assignee: '' },
  { id: uid(), col: 'doing', title: 'Fix login page regression',    desc: 'Password reset link broken on mobile Safari.',     priority: 1, assignee: 'dave' },
  { id: uid(), col: 'doing', title: 'Refactor data fetching layer', desc: 'Switch from REST to GraphQL for main dashboard.',  priority: 2, assignee: 'alice' },
  { id: uid(), col: 'doing', title: 'Accessibility audit',          desc: 'WCAG 2.1 AA compliance for core flows.',           priority: 3, assignee: 'eve' },
  { id: uid(), col: 'done',  title: 'Migrate DB to Postgres 16',    desc: 'Zero-downtime migration completed.',               priority: 2, assignee: 'bob' },
  { id: uid(), col: 'done',  title: 'Launch dark mode',             desc: '',                                                 priority: 3, assignee: 'carol' },
];

let editingId = null;
let dragCard  = null;
let searchQ   = '';

// ---- Persist ----
function save() {
  localStorage.setItem('tinykanban_cards', JSON.stringify(cards));
}

// ---- Utils ----
function uid() {
  return Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function getTeam(id) { return TEAM.find(t => t.id === id); }

function initials(name) {
  return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);
}

function hlText(text, q) {
  if (!q) return escHtml(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return escHtml(text).replace(re, '<span class="hl">$1</span>');
}

// ---- Date ----
(function setDate() {
  const d = new Date();
  const opts = { weekday: 'long', year: 'numeric', month: 'short', day: 'numeric' };
  document.getElementById('datebadge').textContent = d.toLocaleDateString(undefined, opts);
})();

// ---- Populate assignee select ----
function populateAssignees() {
  const sel = document.getElementById('f-assignee');
  // keep first option
  while (sel.options.length > 1) sel.remove(1);
  TEAM.forEach(t => {
    const o = document.createElement('option');
    o.value = t.id;
    o.textContent = t.name;
    sel.appendChild(o);
  });
}
populateAssignees();

// ---- Render ----
function render() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  const q = searchQ.toLowerCase().trim();

  COLS.forEach(col => {
    const colCards = cards.filter(c => c.col === col.id);
    const visCards = q
      ? colCards.filter(c => c.title.toLowerCase().includes(q) || (c.desc||'').toLowerCase().includes(q) || (getTeam(c.assignee)?.name||'').toLowerCase().includes(q))
      : colCards;

    const wipOver = col.wip > 0 && colCards.length > col.wip;

    const colEl = document.createElement('div');
    colEl.className = 'column';
    colEl.dataset.col = col.id;

    const wipBadge = col.wip > 0
      ? `<span class="wip-badge ${wipOver ? '' : 'wip-ok'}">WIP ${colCards.length}/${col.wip}</span>`
      : '';

    colEl.innerHTML = `
      <div class="col-header">
        <div class="col-dot" style="background:${col.color}"></div>
        <span class="col-title" style="color:${col.color}">${col.label}</span>
        <span class="col-count">${colCards.length}</span>
        ${wipBadge}
      </div>
      <div class="col-body" data-col="${col.id}" id="col-${col.id}">
        ${visCards.length === 0 && q ? '<div class="no-results">No matches</div>' : ''}
      </div>
      <button class="col-add-btn" onclick="openAddModal('${col.id}')">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
        Add card
      </button>
    `;

    board.appendChild(colEl);

    const bodyEl = colEl.querySelector('.col-body');
    visCards.forEach(card => {
      bodyEl.appendChild(makeCardEl(card, q));
    });

    // Drop zone events
    bodyEl.addEventListener('dragover', e => {
      e.preventDefault();
      bodyEl.classList.add('drag-over');
      const afterEl = getDragAfterElement(bodyEl, e.clientY);
      if (afterEl) {
        bodyEl.insertBefore(makePlaceholder(), afterEl);
      } else {
        bodyEl.appendChild(makePlaceholder());
      }
    });

    bodyEl.addEventListener('dragleave', e => {
      if (!bodyEl.contains(e.relatedTarget)) {
        bodyEl.classList.remove('drag-over');
        removePlaceholders(bodyEl);
      }
    });

    bodyEl.addEventListener('drop', e => {
      e.preventDefault();
      bodyEl.classList.remove('drag-over');
      removePlaceholders(bodyEl);
      if (!dragCard) return;
      const targetCol = bodyEl.dataset.col;
      const afterEl = getDragAfterElement(bodyEl, e.clientY);
      moveCard(dragCard, targetCol, afterEl ? afterEl.dataset.id : null);
      dragCard = null;
    });
  });
}

function makePlaceholder() {
  // remove existing first
  document.querySelectorAll('.card-placeholder').forEach(e => e.remove());
  const ph = document.createElement('div');
  ph.className = 'card-placeholder';
  ph.style.cssText = 'height:60px;border:2px dashed #3b82f6;border-radius:8px;opacity:0.5;';
  return ph;
}

function removePlaceholders(el) {
  (el || document).querySelectorAll('.card-placeholder').forEach(e => e.remove());
}

function makeCardEl(card, q) {
  const team = getTeam(card.assignee);
  const el = document.createElement('div');
  el.className = 'card';
  el.dataset.id = card.id;
  el.dataset.priority = card.priority;
  el.draggable = true;

  const priorityTag = `<span class="priority-tag ${PRIORITY_TAGS[card.priority]}">${PRIORITY_LABELS[card.priority]}</span>`;

  const assigneeHtml = team
    ? `<span class="assignee-chip">
        <span class="avatar" style="background:${team.color}">${initials(team.name)}</span>
        ${escHtml(team.name)}
       </span>`
    : '';

  const descHtml = card.desc
    ? `<div class="card-desc">${hlText(card.desc, q)}</div>`
    : '';

  el.innerHTML = `
    <div class="card-top">
      <span class="card-title">${hlText(card.title, q)}</span>
      <button class="card-menu-btn" onclick="toggleMenu(event,'${card.id}')">⋯</button>
    </div>
    <div class="card-meta">
      ${priorityTag}
      ${assigneeHtml}
    </div>
    ${descHtml}
    <div class="card-menu" id="menu-${card.id}" style="display:none">
      <button class="card-menu-item" onclick="openEditModal('${card.id}')">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        Edit
      </button>
      ${COLS.filter(c => c.id !== card.col).map(c =>
        `<button class="card-menu-item" onclick="quickMove('${card.id}','${c.id}')">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
          Move to ${c.label}
        </button>`
      ).join('')}
      <button class="card-menu-item danger" onclick="confirmDelete('${card.id}')">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        Delete
      </button>
    </div>
  `;

  // Drag events
  el.addEventListener('dragstart', e => {
    dragCard = card.id;
    el.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  });
  el.addEventListener('dragend', () => {
    el.classList.remove('dragging');
    document.querySelectorAll('.drag-over').forEach(e => e.classList.remove('drag-over'));
    removePlaceholders();
    dragCard = null;
    render();
  });

  return el;
}

function getDragAfterElement(container, y) {
  const draggableEls = [...container.querySelectorAll('.card:not(.dragging)')];
  return draggableEls.reduce((closest, child) => {
    const box = child.getBoundingClientRect();
    const offset = y - box.top - box.height / 2;
    if (offset < 0 && offset > closest.offset) {
      return { offset, element: child };
    }
    return closest;
  }, { offset: Number.NEGATIVE_INFINITY }).element;
}

function moveCard(id, toCol, beforeId) {
  const idx = cards.findIndex(c => c.id === id);
  if (idx === -1) return;
  const [moved] = cards.splice(idx, 1);
  moved.col = toCol;
  if (beforeId) {
    const targetIdx = cards.findIndex(c => c.id === beforeId);
    cards.splice(targetIdx, 0, moved);
  } else {
    cards.push(moved);
  }
  save();
  render();
  toast(`Moved to ${COLS.find(c=>c.id===toCol).label}`);
}

function quickMove(id, toCol) {
  closeAllMenus();
  moveCard(id, toCol, null);
}

// ---- Menu ----
function toggleMenu(e, id) {
  e.stopPropagation();
  const menu = document.getElementById('menu-' + id);
  const wasOpen = menu.style.display !== 'none';
  closeAllMenus();
  if (!wasOpen) menu.style.display = 'block';
}

function closeAllMenus() {
  document.querySelectorAll('.card-menu').forEach(m => m.style.display = 'none');
}

document.addEventListener('click', closeAllMenus);

// ---- Modal ----
function openAddModal(colId) {
  editingId = null;
  document.getElementById('modal-title').textContent = 'Add Card';
  document.getElementById('f-title').value = '';
  document.getElementById('f-desc').value = '';
  document.getElementById('f-col').value = colId || 'todo';
  document.getElementById('f-priority').value = '3';
  document.getElementById('f-assignee').value = '';
  document.getElementById('delete-btn').style.display = 'none';
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('f-title').focus(), 50);
}

function openEditModal(id) {
  closeAllMenus();
  const card = cards.find(c => c.id === id);
  if (!card) return;
  editingId = id;
  document.getElementById('modal-title').textContent = 'Edit Card';
  document.getElementById('f-title').value = card.title;
  document.getElementById('f-desc').value = card.desc || '';
  document.getElementById('f-col').value = card.col;
  document.getElementById('f-priority').value = card.priority;
  document.getElementById('f-assignee').value = card.assignee || '';
  document.getElementById('delete-btn').style.display = 'inline-flex';
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('f-title').focus(), 50);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  editingId = null;
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

function saveCard() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { document.getElementById('f-title').focus(); return; }
  const data = {
    title,
    desc: document.getElementById('f-desc').value.trim(),
    col: document.getElementById('f-col').value,
    priority: parseInt(document.getElementById('f-priority').value),
    assignee: document.getElementById('f-assignee').value,
  };
  if (editingId) {
    const idx = cards.findIndex(c => c.id === editingId);
    if (idx !== -1) Object.assign(cards[idx], data);
    toast('Card updated');
  } else {
    cards.push({ id: uid(), ...data });
    toast('Card added');
  }
  save();
  closeModal();
  render();
}

function deleteCard() {
  if (!editingId) return;
  cards = cards.filter(c => c.id !== editingId);
  save();
  closeModal();
  render();
  toast('Card deleted', '🗑️');
}

function confirmDelete(id) {
  closeAllMenus();
  cards = cards.filter(c => c.id !== id);
  save();
  render();
  toast('Card deleted', '🗑️');
}

// ---- Search ----
document.getElementById('search').addEventListener('input', e => {
  searchQ = e.target.value;
  render();
});

// ---- Keyboard ----
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('search').focus();
  }
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
    const overlay = document.getElementById('modal-overlay');
    if (overlay.classList.contains('open')) saveCard();
  }
});

// ---- Toast ----
function toast(msg, icon='✓') {
  const wrap = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = `<span style="color:#22c55e">${icon}</span> ${escHtml(msg)}`;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 2400);
}

// ---- Init ----
render();
</script>
</body>
</html>
