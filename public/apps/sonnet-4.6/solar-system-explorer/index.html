<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solar System Explorer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    color: #fff;
    font-family: 'Segoe UI', system-ui, sans-serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
  }
  #canvas-container {
    position: fixed;
    inset: 0;
  }
  canvas { display: block; }

  /* HUD */
  #hud {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
    pointer-events: none;
    z-index: 10;
  }
  #title {
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #a0c4ff;
    text-shadow: 0 0 20px rgba(160,196,255,0.6);
  }
  #controls-hint {
    font-size: 0.72rem;
    color: rgba(255,255,255,0.45);
    text-align: right;
    line-height: 1.7;
  }

  /* Speed control */
  #speed-panel {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(10,15,30,0.85);
    border: 1px solid rgba(100,160,255,0.25);
    border-radius: 40px;
    padding: 12px 28px;
    display: flex;
    align-items: center;
    gap: 16px;
    z-index: 10;
    backdrop-filter: blur(12px);
    box-shadow: 0 4px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
  }
  #speed-panel label {
    font-size: 0.75rem;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    white-space: nowrap;
  }
  #speed-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 180px;
    height: 4px;
    background: rgba(100,160,255,0.2);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  #speed-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #5b9cf6;
    box-shadow: 0 0 10px rgba(91,156,246,0.8);
    cursor: pointer;
  }
  #speed-value {
    font-size: 0.8rem;
    color: #5b9cf6;
    min-width: 36px;
    text-align: center;
    font-weight: 600;
  }
  #pause-btn {
    background: rgba(91,156,246,0.15);
    border: 1px solid rgba(91,156,246,0.35);
    color: #a0c4ff;
    padding: 5px 14px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 0.75rem;
    letter-spacing: 0.06em;
    transition: all 0.2s;
  }
  #pause-btn:hover { background: rgba(91,156,246,0.3); }

  /* Planet info panel */
  #info-panel {
    position: fixed;
    right: 24px;
    top: 50%;
    transform: translateY(-50%);
    width: 280px;
    background: rgba(8,12,24,0.92);
    border: 1px solid rgba(100,160,255,0.2);
    border-radius: 16px;
    padding: 24px;
    z-index: 10;
    backdrop-filter: blur(16px);
    box-shadow: 0 8px 48px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s, transform 0.3s;
    transform: translateY(-50%) translateX(20px);
  }
  #info-panel.visible {
    opacity: 1;
    pointer-events: auto;
    transform: translateY(-50%) translateX(0);
  }
  #info-close {
    position: absolute;
    top: 12px; right: 14px;
    background: none;
    border: none;
    color: rgba(255,255,255,0.4);
    font-size: 1.2rem;
    cursor: pointer;
    line-height: 1;
    transition: color 0.2s;
  }
  #info-close:hover { color: #fff; }
  #info-color-bar {
    width: 40px;
    height: 4px;
    border-radius: 2px;
    margin-bottom: 14px;
  }
  #info-name {
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    margin-bottom: 4px;
  }
  #info-subtitle {
    font-size: 0.72rem;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 16px;
  }
  #info-desc {
    font-size: 0.82rem;
    line-height: 1.65;
    color: rgba(255,255,255,0.7);
    margin-bottom: 18px;
  }
  .info-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .stat-box {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 8px;
    padding: 10px 12px;
  }
  .stat-label {
    font-size: 0.65rem;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 4px;
  }
  .stat-value {
    font-size: 0.85rem;
    font-weight: 600;
    color: #c8deff;
  }

  /* Tooltip */
  #tooltip {
    position: fixed;
    background: rgba(10,15,30,0.9);
    border: 1px solid rgba(100,160,255,0.3);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 0.78rem;
    color: #a0c4ff;
    pointer-events: none;
    z-index: 20;
    opacity: 0;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
  #tooltip.show { opacity: 1; }
</style>
</head>
<body>

<div id="canvas-container">
  <canvas id="c"></canvas>
</div>

<div id="hud">
  <div id="title">Solar System Explorer</div>
  <div id="controls-hint">
    Drag to rotate &nbsp;|&nbsp; Scroll to zoom<br>
    Click planet for details
  </div>
</div>

<div id="speed-panel">
  <label>Orbit Speed</label>
  <input type="range" id="speed-slider" min="0" max="5" step="0.1" value="1">
  <span id="speed-value">1.0x</span>
  <button id="pause-btn">Pause</button>
</div>

<div id="info-panel">
  <button id="info-close">✕</button>
  <div id="info-color-bar"></div>
  <div id="info-name"></div>
  <div id="info-subtitle"></div>
  <div id="info-desc"></div>
  <div class="info-stats" id="info-stats"></div>
</div>

<div id="tooltip"></div>

<script>
// ─── Planet Data ────────────────────────────────────────────────────────────
const PLANETS = [
  {
    name: 'Mercury',
    type: 'Terrestrial Planet',
    radius: 4,
    color: '#b5b5b5',
    glowColor: 'rgba(181,181,181,0.4)',
    orbitRadius: 72,
    speed: 4.74,
    tilt: 0.03,
    desc: 'The smallest planet in our solar system and closest to the Sun. Mercury has a very thin exosphere and experiences extreme temperature swings.',
    stats: { 'Diameter': '4,879 km', 'Day': '58.6 Earth days', 'Year': '88 Earth days', 'Moons': '0' }
  },
  {
    name: 'Venus',
    type: 'Terrestrial Planet',
    radius: 7,
    color: '#e8c97a',
    glowColor: 'rgba(232,201,122,0.4)',
    orbitRadius: 110,
    speed: 3.50,
    tilt: 2.64,
    desc: 'Often called Earth\'s twin due to similar size. Venus has a thick toxic atmosphere that traps heat, making it the hottest planet.',
    stats: { 'Diameter': '12,104 km', 'Day': '243 Earth days', 'Year': '225 Earth days', 'Moons': '0' }
  },
  {
    name: 'Earth',
    type: 'Terrestrial Planet',
    radius: 7.5,
    color: '#4fa3e0',
    glowColor: 'rgba(79,163,224,0.5)',
    orbitRadius: 152,
    speed: 2.98,
    tilt: 23.4,
    hasMoon: true,
    desc: 'Our home planet. Earth is the only known planet with liquid water on its surface and the only planet known to harbor life.',
    stats: { 'Diameter': '12,742 km', 'Day': '24 hours', 'Year': '365.25 days', 'Moons': '1' }
  },
  {
    name: 'Mars',
    type: 'Terrestrial Planet',
    radius: 5.5,
    color: '#c1440e',
    glowColor: 'rgba(193,68,14,0.4)',
    orbitRadius: 200,
    speed: 2.41,
    tilt: 25.2,
    desc: 'Known as the Red Planet due to iron oxide on its surface. Mars has the tallest volcano and the largest canyon in the solar system.',
    stats: { 'Diameter': '6,779 km', 'Day': '24.6 hours', 'Year': '687 days', 'Moons': '2' }
  },
  {
    name: 'Jupiter',
    type: 'Gas Giant',
    radius: 22,
    color: '#c88b3a',
    glowColor: 'rgba(200,139,58,0.35)',
    orbitRadius: 290,
    speed: 1.31,
    tilt: 3.1,
    hasRings: false,
    desc: 'The largest planet in the solar system. Jupiter\'s Great Red Spot is a storm that has raged for hundreds of years. It acts as a shield for inner planets.',
    stats: { 'Diameter': '139,820 km', 'Day': '9.9 hours', 'Year': '11.9 Earth years', 'Moons': '95' }
  },
  {
    name: 'Saturn',
    type: 'Gas Giant',
    radius: 18,
    color: '#e4d191',
    glowColor: 'rgba(228,209,145,0.35)',
    orbitRadius: 390,
    speed: 0.97,
    tilt: 26.7,
    hasRings: true,
    desc: 'Famous for its stunning ring system made of ice and rock. Saturn is the least dense planet and would float on water if an ocean were large enough.',
    stats: { 'Diameter': '116,460 km', 'Day': '10.7 hours', 'Year': '29.5 Earth years', 'Moons': '146' }
  },
  {
    name: 'Uranus',
    type: 'Ice Giant',
    radius: 13,
    color: '#7de8e8',
    glowColor: 'rgba(125,232,232,0.35)',
    orbitRadius: 480,
    speed: 0.68,
    tilt: 97.8,
    hasRings: true,
    desc: 'An ice giant that rotates on its side with an axial tilt of 98°. Uranus has a faint ring system and 27 known moons named after Shakespeare characters.',
    stats: { 'Diameter': '50,724 km', 'Day': '17.2 hours', 'Year': '84 Earth years', 'Moons': '27' }
  },
  {
    name: 'Neptune',
    type: 'Ice Giant',
    radius: 12,
    color: '#3f54ba',
    glowColor: 'rgba(63,84,186,0.4)',
    orbitRadius: 560,
    speed: 0.54,
    tilt: 28.3,
    desc: 'The farthest planet from the Sun. Neptune has the strongest winds in the solar system, reaching speeds of 2,100 km/h. Its largest moon, Triton, orbits backwards.',
    stats: { 'Diameter': '49,244 km', 'Day': '16.1 hours', 'Year': '165 Earth years', 'Moons': '16' }
  }
];

// ─── Canvas Setup ───────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, cx, cy;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2;
  cy = H / 2;
}
resize();
window.addEventListener('resize', resize);

// ─── State ──────────────────────────────────────────────────────────────────
let speedMult = 1.0;
let paused = false;
let time = 0;
let angles = PLANETS.map(() => Math.random() * Math.PI * 2);
let hoveredPlanet = null;
let selectedPlanet = null;

// Camera
let camX = 0, camY = 0;
let zoom = 1.0;
let isDragging = false;
let dragStart = { x: 0, y: 0 };
let camStart = { x: 0, y: 0 };

// ─── Starfield ──────────────────────────────────────────────────────────────
const STARS = [];
for (let i = 0; i < 600; i++) {
  STARS.push({
    x: Math.random() * 4000 - 2000,
    y: Math.random() * 4000 - 2000,
    r: Math.random() * 1.4 + 0.2,
    brightness: Math.random() * 0.6 + 0.2,
    twinkle: Math.random() * Math.PI * 2
  });
}

// ─── Draw Helpers ────────────────────────────────────────────────────────────
function toScreen(wx, wy) {
  return {
    x: (wx + camX) * zoom + cx,
    y: (wy + camY) * zoom + cy
  };
}

function drawStars(dt) {
  for (const s of STARS) {
    s.twinkle += dt * (0.5 + Math.random() * 0.1);
    const alpha = s.brightness * (0.7 + 0.3 * Math.sin(s.twinkle));
    const sc = toScreen(s.x, s.y);
    if (sc.x < -5 || sc.x > W + 5 || sc.y < -5 || sc.y > H + 5) continue;
    ctx.beginPath();
    ctx.arc(sc.x, sc.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.fill();
  }
}

function drawSun() {
  const sc = toScreen(0, 0);
  const r = 32 * zoom;

  // Outer corona
  const corona = ctx.createRadialGradient(sc.x, sc.y, r * 0.5, sc.x, sc.y, r * 3.5);
  corona.addColorStop(0, 'rgba(255,200,50,0.18)');
  corona.addColorStop(0.4, 'rgba(255,140,20,0.08)');
  corona.addColorStop(1, 'rgba(255,80,0,0)');
  ctx.beginPath();
  ctx.arc(sc.x, sc.y, r * 3.5, 0, Math.PI * 2);
  ctx.fillStyle = corona;
  ctx.fill();

  // Sun glow
  const sunGlow = ctx.createRadialGradient(sc.x, sc.y, 0, sc.x, sc.y, r * 1.8);
  sunGlow.addColorStop(0, 'rgba(255,255,200,0.6)');
  sunGlow.addColorStop(0.5, 'rgba(255,160,30,0.3)');
  sunGlow.addColorStop(1, 'rgba(255,80,0,0)');
  ctx.beginPath();
  ctx.arc(sc.x, sc.y, r * 1.8, 0, Math.PI * 2);
  ctx.fillStyle = sunGlow;
  ctx.fill();

  // Sun body
  const sunGrad = ctx.createRadialGradient(sc.x - r * 0.3, sc.y - r * 0.3, r * 0.1, sc.x, sc.y, r);
  sunGrad.addColorStop(0, '#fff7c0');
  sunGrad.addColorStop(0.3, '#ffe066');
  sunGrad.addColorStop(0.7, '#ff9900');
  sunGrad.addColorStop(1, '#ff5500');
  ctx.beginPath();
  ctx.arc(sc.x, sc.y, r, 0, Math.PI * 2);
  ctx.fillStyle = sunGrad;
  ctx.fill();
}

function drawOrbit(planet) {
  const sc = toScreen(0, 0);
  const r = planet.orbitRadius * zoom;
  ctx.beginPath();
  ctx.arc(sc.x, sc.y, r, 0, Math.PI * 2);
  ctx.strokeStyle = selectedPlanet === planet
    ? 'rgba(160,196,255,0.35)'
    : hoveredPlanet === planet
      ? 'rgba(160,196,255,0.22)'
      : 'rgba(255,255,255,0.07)';
  ctx.lineWidth = selectedPlanet === planet ? 1.5 : 1;
  ctx.setLineDash(selectedPlanet === planet ? [] : [3, 6]);
  ctx.stroke();
  ctx.setLineDash([]);
}

function drawRings(planet, px, py, pr) {
  if (!planet.hasRings) return;
  const rx = pr * 2.3;
  const ry = pr * 0.45;
  ctx.save();
  ctx.translate(px, py);

  // Ring gradient
  const rg = ctx.createLinearGradient(-rx, 0, rx, 0);
  if (planet.name === 'Saturn') {
    rg.addColorStop(0, 'rgba(200,180,120,0)');
    rg.addColorStop(0.15, 'rgba(200,180,120,0.5)');
    rg.addColorStop(0.35, 'rgba(220,200,140,0.7)');
    rg.addColorStop(0.5, 'rgba(180,160,100,0.4)');
    rg.addColorStop(0.65, 'rgba(220,200,140,0.7)');
    rg.addColorStop(0.85, 'rgba(200,180,120,0.5)');
    rg.addColorStop(1, 'rgba(200,180,120,0)');
  } else {
    rg.addColorStop(0, 'rgba(125,232,232,0)');
    rg.addColorStop(0.2, 'rgba(125,232,232,0.25)');
    rg.addColorStop(0.5, 'rgba(125,232,232,0.35)');
    rg.addColorStop(0.8, 'rgba(125,232,232,0.25)');
    rg.addColorStop(1, 'rgba(125,232,232,0)');
  }

  ctx.beginPath();
  ctx.ellipse(0, 0, rx, ry, 0, 0, Math.PI * 2);
  ctx.fillStyle = rg;
  ctx.fill();
  ctx.restore();
}

function drawMoon(px, py, pr, angle) {
  const mr = pr * 0.28;
  const md = pr * 2.2;
  const mx = px + Math.cos(angle * 8) * md;
  const my = py + Math.sin(angle * 8) * md * 0.5;
  ctx.beginPath();
  ctx.arc(mx, my, mr, 0, Math.PI * 2);
  ctx.fillStyle = '#ccc';
  ctx.fill();
}

function drawPlanet(planet, idx, t) {
  const angle = angles[idx];
  const worldX = Math.cos(angle) * planet.orbitRadius;
  const worldY = Math.sin(angle) * planet.orbitRadius;
  const sc = toScreen(worldX, worldY);
  const pr = planet.radius * zoom;

  // Rings behind planet (lower half)
  if (planet.hasRings) {
    ctx.save();
    ctx.beginPath();
    ctx.rect(sc.x - pr * 3, sc.y, pr * 6, pr * 2);
    ctx.clip();
    drawRings(planet, sc.x, sc.y, pr);
    ctx.restore();
  }

  // Glow
  const isHovered = hoveredPlanet === planet;
  const isSelected = selectedPlanet === planet;
  const glowR = pr * (isHovered || isSelected ? 3.5 : 2.5);
  const glow = ctx.createRadialGradient(sc.x, sc.y, pr * 0.5, sc.x, sc.y, glowR);
  glow.addColorStop(0, planet.glowColor);
  glow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.beginPath();
  ctx.arc(sc.x, sc.y, glowR, 0, Math.PI * 2);
  ctx.fillStyle = glow;
  ctx.fill();

  // Planet body gradient
  const grad = ctx.createRadialGradient(
    sc.x - pr * 0.35, sc.y - pr * 0.35, pr * 0.05,
    sc.x, sc.y, pr
  );

  if (planet.name === 'Earth') {
    grad.addColorStop(0, '#a8d8f0');
    grad.addColorStop(0.3, '#4fa3e0');
    grad.addColorStop(0.7, '#2a7bc0');
    grad.addColorStop(1, '#1a3a6b');
  } else if (planet.name === 'Jupiter') {
    grad.addColorStop(0, '#e8c08a');
    grad.addColorStop(0.3, '#c88b3a');
    grad.addColorStop(0.6, '#a06820');
    grad.addColorStop(1, '#7a4a10');
  } else if (planet.name === 'Saturn') {
    grad.addColorStop(0, '#f0e4b0');
    grad.addColorStop(0.4, '#e4d191');
    grad.addColorStop(0.8, '#c8b060');
    grad.addColorStop(1, '#a08040');
  } else {
    const c = planet.color;
    grad.addColorStop(0, lightenColor(c, 60));
    grad.addColorStop(0.4, c);
    grad.addColorStop(1, darkenColor(c, 50));
  }

  ctx.beginPath();
  ctx.arc(sc.x, sc.y, pr, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();

  // Planet surface detail
  if (planet.name === 'Jupiter' && pr > 6) {
    for (let b = 0; b < 4; b++) {
      const by = sc.y - pr + (pr * 2 / 5) * b + pr * 0.1;
      ctx.save();
      ctx.beginPath();
      ctx.ellipse(sc.x, by, pr * 0.95, pr * 0.15, 0, 0, Math.PI * 2);
      ctx.clip();
      ctx.fillStyle = `rgba(${b % 2 === 0 ? '100,50,0' : '180,120,50'},0.3)`;
      ctx.fill();
      ctx.restore();
    }
  }

  if (planet.name === 'Earth' && pr > 5) {
    // Continents hint
    ctx.save();
    ctx.beginPath();
    ctx.arc(sc.x, sc.y, pr, 0, Math.PI * 2);
    ctx.clip();
    ctx.fillStyle = 'rgba(30,140,60,0.45)';
    ctx.beginPath();
    ctx.ellipse(sc.x + pr * 0.1, sc.y - pr * 0.2, pr * 0.35, pr * 0.25, 0.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(sc.x - pr * 0.2, sc.y + pr * 0.1, pr * 0.25, pr * 0.3, -0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    // Cloud wisps
    ctx.save();
    ctx.beginPath();
    ctx.arc(sc.x, sc.y, pr, 0, Math.PI * 2);
    ctx.clip();
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.beginPath();
    ctx.ellipse(sc.x - pr * 0.1, sc.y - pr * 0.4, pr * 0.4, pr * 0.1, 0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // Atmosphere rim
  ctx.beginPath();
  ctx.arc(sc.x, sc.y, pr, 0, Math.PI * 2);
  ctx.strokeStyle = lightenColor(planet.color, 30) + '60';
  ctx.lineWidth = pr * 0.15;
  ctx.stroke();

  // Selection ring
  if (isSelected) {
    ctx.beginPath();
    ctx.arc(sc.x, sc.y, pr + 5 * zoom, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(160,196,255,0.7)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([4, 4]);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Rings in front (upper half)
  if (planet.hasRings) {
    ctx.save();
    ctx.beginPath();
    ctx.rect(sc.x - pr * 3, sc.y - pr * 2, pr * 6, pr * 2);
    ctx.clip();
    drawRings(planet, sc.x, sc.y, pr);
    ctx.restore();
  }

  // Moon
  if (planet.hasMoon) {
    drawMoon(sc.x, sc.y, pr, t);
  }

  // Label
  if (zoom > 0.5 || isHovered || isSelected) {
    const alpha = Math.min(1, (zoom - 0.3) * 3 + (isHovered ? 0.5 : 0));
    ctx.font = `${Math.max(10, 11 * zoom)}px 'Segoe UI', system-ui, sans-serif`;
    ctx.fillStyle = `rgba(200,220,255,${Math.min(1, alpha)})`;
    ctx.textAlign = 'center';
    ctx.fillText(planet.name, sc.x, sc.y + pr + 14 * zoom);
  }

  return { x: sc.x, y: sc.y };
}

// ─── Color Helpers ──────────────────────────────────────────────────────────
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return [r, g, b];
}
function lightenColor(hex, amount) {
  const [r, g, b] = hexToRgb(hex);
  return `rgb(${Math.min(255, r + amount)},${Math.min(255, g + amount)},${Math.min(255, b + amount)})`;
}
function darkenColor(hex, amount) {
  const [r, g, b] = hexToRgb(hex);
  return `rgb(${Math.max(0, r - amount)},${Math.max(0, g - amount)},${Math.max(0, b - amount)})`;
}

// ─── Hit Test ───────────────────────────────────────────────────────────────
function getPlanetAt(mx, my) {
  for (let i = 0; i < PLANETS.length; i++) {
    const p = PLANETS[i];
    const angle = angles[i];
    const worldX = Math.cos(angle) * p.orbitRadius;
    const worldY = Math.sin(angle) * p.orbitRadius;
    const sc = toScreen(worldX, worldY);
    const pr = Math.max(p.radius * zoom, 8);
    const dx = mx - sc.x, dy = my - sc.y;
    if (dx * dx + dy * dy < pr * pr * 1.8) return p;
  }
  return null;
}

// ─── Animation ──────────────────────────────────────────────────────────────
let lastTime = performance.now();

function animate(now) {
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;
  if (!paused) {
    time += dt;
    for (let i = 0; i < PLANETS.length; i++) {
      angles[i] += (PLANETS[i].speed * 0.008 * speedMult * dt);
    }
  }

  ctx.clearRect(0, 0, W, H);

  // Space background
  const bg = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(W, H) * 0.8);
  bg.addColorStop(0, '#0a0f1e');
  bg.addColorStop(0.5, '#060a14');
  bg.addColorStop(1, '#020408');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  drawStars(dt);

  // Orbits
  for (const p of PLANETS) drawOrbit(p);

  // Sun
  drawSun();

  // Planets
  for (let i = 0; i < PLANETS.length; i++) {
    drawPlanet(PLANETS[i], i, time);
  }

  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);

// ─── Mouse Interaction ──────────────────────────────────────────────────────
canvas.addEventListener('mousedown', e => {
  isDragging = false;
  dragStart = { x: e.clientX, y: e.clientY };
  camStart = { x: camX, y: camY };
  canvas.style.cursor = 'grabbing';
});

canvas.addEventListener('mousemove', e => {
  const dx = e.clientX - dragStart.x;
  const dy = e.clientY - dragStart.y;
  if (Math.abs(dx) > 3 || Math.abs(dy) > 3) {
    isDragging = true;
    camX = camStart.x + dx / zoom;
    camY = camStart.y + dy / zoom;
  }

  const hit = getPlanetAt(e.clientX, e.clientY);
  hoveredPlanet = hit;
  canvas.style.cursor = isDragging ? 'grabbing' : hit ? 'pointer' : 'grab';

  const tooltip = document.getElementById('tooltip');
  if (hit && !isDragging) {
    tooltip.textContent = hit.name;
    tooltip.style.left = (e.clientX + 14) + 'px';
    tooltip.style.top = (e.clientY - 10) + 'px';
    tooltip.classList.add('show');
  } else {
    tooltip.classList.remove('show');
  }
});

canvas.addEventListener('mouseup', e => {
  canvas.style.cursor = hoveredPlanet ? 'pointer' : 'grab';
  if (!isDragging) {
    const hit = getPlanetAt(e.clientX, e.clientY);
    if (hit) {
      showInfo(hit);
    } else {
      hideInfo();
    }
  }
  isDragging = false;
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 0.9 : 1.1;
  const newZoom = Math.max(0.25, Math.min(4, zoom * factor));
  // Zoom toward mouse
  const mx = e.clientX - cx;
  const my = e.clientY - cy;
  camX = (camX - mx / zoom) + mx / newZoom;
  camY = (camY - my / zoom) + my / newZoom;
  zoom = newZoom;
}, { passive: false });

// Touch support
let lastTouchDist = 0;
canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    isDragging = false;
    dragStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    camStart = { x: camX, y: camY };
  } else if (e.touches.length === 2) {
    lastTouchDist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
  }
}, { passive: true });

canvas.addEventListener('touchmove', e => {
  if (e.touches.length === 1) {
    const dx = e.touches[0].clientX - dragStart.x;
    const dy = e.touches[0].clientY - dragStart.y;
    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) {
      isDragging = true;
      camX = camStart.x + dx / zoom;
      camY = camStart.y + dy / zoom;
    }
  } else if (e.touches.length === 2) {
    const dist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    const factor = dist / lastTouchDist;
    zoom = Math.max(0.25, Math.min(4, zoom * factor));
    lastTouchDist = dist;
  }
  e.preventDefault();
}, { passive: false });

canvas.addEventListener('touchend', e => {
  if (!isDragging && e.changedTouches.length === 1) {
    const t = e.changedTouches[0];
    const hit = getPlanetAt(t.clientX, t.clientY);
    if (hit) showInfo(hit);
    else hideInfo();
  }
  isDragging = false;
}, { passive: true });

// ─── Info Panel ─────────────────────────────────────────────────────────────
function showInfo(planet) {
  selectedPlanet = planet;
  document.getElementById('info-color-bar').style.background = planet.color;
  document.getElementById('info-color-bar').style.boxShadow = `0 0 12px ${planet.color}`;
  document.getElementById('info-name').textContent = planet.name;
  document.getElementById('info-subtitle').textContent = planet.type;
  document.getElementById('info-desc').textContent = planet.desc;

  const statsEl = document.getElementById('info-stats');
  statsEl.innerHTML = Object.entries(planet.stats).map(([k, v]) => `
    <div class="stat-box">
      <div class="stat-label">${k}</div>
      <div class="stat-value">${v}</div>
    </div>
  `).join('');

  document.getElementById('info-panel').classList.add('visible');
}

function hideInfo() {
  selectedPlanet = null;
  document.getElementById('info-panel').classList.remove('visible');
}

document.getElementById('info-close').addEventListener('click', hideInfo);

// ─── Speed Control ──────────────────────────────────────────────────────────
const slider = document.getElementById('speed-slider');
const speedVal = document.getElementById('speed-value');
const pauseBtn = document.getElementById('pause-btn');

slider.addEventListener('input', () => {
  speedMult = parseFloat(slider.value);
  speedVal.textContent = speedMult.toFixed(1) + 'x';
});

pauseBtn.addEventListener('click', () => {
  paused = !paused;
  pauseBtn.textContent = paused ? 'Resume' : 'Pause';
});

// ─── Initial cursor ─────────────────────────────────────────────────────────
canvas.style.cursor = 'grab';
</script>
