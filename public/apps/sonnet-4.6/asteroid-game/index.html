<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASTEROID COMMAND</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    user-select: none;
  }
  canvas {
    display: block;
    background: #000;
  }
  #ui {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 10;
  }
  #hud {
    position: absolute;
    top: 16px; left: 16px;
    color: #00ffcc;
    font-size: 14px;
    text-shadow: 0 0 8px #00ffcc;
    line-height: 1.8;
  }
  #hud .label { color: #007799; font-size: 11px; letter-spacing: 2px; }
  #hud .value { color: #00ffcc; font-size: 18px; font-weight: bold; }
  .bar-container {
    width: 160px;
    height: 8px;
    background: #002233;
    border: 1px solid #004455;
    border-radius: 4px;
    overflow: hidden;
    margin-top: 2px;
  }
  .bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.1s;
  }
  #health-bar { background: linear-gradient(90deg, #ff3366, #ff6688); }
  #shield-bar { background: linear-gradient(90deg, #0099ff, #00ccff); }
  #energy-bar { background: linear-gradient(90deg, #ffaa00, #ffcc44); }

  #minimap {
    position: absolute;
    bottom: 16px; right: 16px;
    width: 150px; height: 150px;
    border: 1px solid #004455;
    background: rgba(0,20,40,0.7);
    border-radius: 4px;
  }
  #minimap canvas { width: 100%; height: 100%; }

  #score-display {
    position: absolute;
    top: 16px; right: 16px;
    text-align: right;
    color: #00ffcc;
  }
  #score-display .score-val {
    font-size: 32px;
    font-weight: bold;
    text-shadow: 0 0 12px #00ffcc;
  }
  #score-display .wave-val {
    font-size: 14px;
    color: #007799;
    letter-spacing: 3px;
  }

  #message {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: #fff;
    pointer-events: all;
  }
  #message h1 {
    font-size: 52px;
    letter-spacing: 8px;
    color: #00ffcc;
    text-shadow: 0 0 20px #00ffcc, 0 0 40px #00ffcc;
    margin-bottom: 8px;
  }
  #message .subtitle {
    font-size: 16px;
    color: #007799;
    letter-spacing: 4px;
    margin-bottom: 32px;
  }
  #message .controls {
    font-size: 13px;
    color: #005566;
    line-height: 2;
    margin-bottom: 32px;
  }
  #message .controls span { color: #00aacc; }
  #start-btn {
    background: transparent;
    border: 2px solid #00ffcc;
    color: #00ffcc;
    font-family: 'Courier New', monospace;
    font-size: 18px;
    letter-spacing: 4px;
    padding: 12px 40px;
    cursor: pointer;
    text-shadow: 0 0 8px #00ffcc;
    box-shadow: 0 0 20px rgba(0,255,204,0.3);
    transition: all 0.2s;
    pointer-events: all;
  }
  #start-btn:hover {
    background: rgba(0,255,204,0.1);
    box-shadow: 0 0 30px rgba(0,255,204,0.5);
  }
  #gameover {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: #fff;
    display: none;
    pointer-events: all;
  }
  #gameover h1 {
    font-size: 52px;
    letter-spacing: 8px;
    color: #ff3366;
    text-shadow: 0 0 20px #ff3366, 0 0 40px #ff3366;
    margin-bottom: 16px;
  }
  #gameover .final-score {
    font-size: 24px;
    color: #00ffcc;
    margin-bottom: 32px;
  }
  #restart-btn {
    background: transparent;
    border: 2px solid #ff3366;
    color: #ff3366;
    font-family: 'Courier New', monospace;
    font-size: 18px;
    letter-spacing: 4px;
    padding: 12px 40px;
    cursor: pointer;
    text-shadow: 0 0 8px #ff3366;
    transition: all 0.2s;
    pointer-events: all;
  }
  #restart-btn:hover {
    background: rgba(255,51,102,0.1);
    box-shadow: 0 0 30px rgba(255,51,102,0.5);
  }
  #kills-feed {
    position: absolute;
    bottom: 180px; right: 16px;
    width: 220px;
    font-size: 12px;
    text-align: right;
  }
  .kill-entry {
    color: #ffaa00;
    text-shadow: 0 0 6px #ffaa00;
    margin-bottom: 4px;
    opacity: 1;
    transition: opacity 2s;
  }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="ui">
  <div id="hud">
    <div class="label">HULL INTEGRITY</div>
    <div class="bar-container"><div class="bar-fill" id="health-bar" style="width:100%"></div></div>
    <div class="label" style="margin-top:8px">SHIELDS</div>
    <div class="bar-container"><div class="bar-fill" id="shield-bar" style="width:100%"></div></div>
    <div class="label" style="margin-top:8px">ENERGY</div>
    <div class="bar-container"><div class="bar-fill" id="energy-bar" style="width:100%"></div></div>
    <div style="margin-top:12px">
      <div class="label">WEAPONS</div>
      <div class="value" id="weapon-display">LASER</div>
    </div>
    <div style="margin-top:8px">
      <div class="label">AMMO / MISSILES</div>
      <div class="value" id="ammo-display">∞ / 0</div>
    </div>
  </div>
  <div id="score-display">
    <div class="wave-val" id="wave-display">SECTOR 1</div>
    <div class="score-val" id="score-val">0</div>
    <div class="label">SCORE</div>
  </div>
  <div id="kills-feed"></div>
  <canvas id="minimap-canvas" style="position:absolute;bottom:16px;right:16px;width:150px;height:150px;border:1px solid #004455;background:rgba(0,20,40,0.7);border-radius:4px;"></canvas>
  <div id="message">
    <h1>ASTEROID</h1>
    <h1 style="margin-top:-20px">COMMAND</h1>
    <div class="subtitle">DEEP SPACE COMBAT SIMULATOR</div>
    <div class="controls">
      <span>W / ↑</span> THRUST &nbsp;&nbsp; <span>A/D / ←→</span> ROTATE<br>
      <span>SPACE</span> FIRE LASER &nbsp;&nbsp; <span>X</span> FIRE MISSILE<br>
      <span>S / ↓</span> BRAKE &nbsp;&nbsp; <span>SHIFT</span> BOOST<br>
      <span>1-3</span> WEAPON SELECT
    </div>
    <button id="start-btn" onclick="startGame()">LAUNCH</button>
  </div>
  <div id="gameover">
    <h1>DESTROYED</h1>
    <div class="final-score">FINAL SCORE: <span id="final-score">0</span></div>
    <button id="restart-btn" onclick="startGame()">CONTINUE</button>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const miniCanvas = document.getElementById('minimap-canvas');
const miniCtx = miniCanvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
miniCanvas.width = 150;
miniCanvas.height = 150;

const W = canvas.width, H = canvas.height;
const WORLD = 3000;

// ── Input ──────────────────────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => { keys[e.code] = true; e.preventDefault(); });
document.addEventListener('keyup',   e => { keys[e.code] = false; });

// ── Utilities ──────────────────────────────────────────────────────────────
function rand(a, b) { return a + Math.random() * (b - a); }
function randInt(a, b) { return Math.floor(rand(a, b)); }
function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
function wrap(v, size) { return ((v % size) + size) % size; }
function dist(a, b) { let dx=a.x-b.x, dy=a.y-b.y; return Math.sqrt(dx*dx+dy*dy); }
function angle(a, b) { return Math.atan2(b.y-a.y, b.x-a.x); }
function angleDiff(a, b) {
  let d = b - a;
  while(d > Math.PI) d -= 2*Math.PI;
  while(d < -Math.PI) d += 2*Math.PI;
  return d;
}
function hsl(h,s,l,a=1) { return `hsla(${h},${s}%,${l}%,${a})`; }

// ── Particle System ────────────────────────────────────────────────────────
let particles = [];
function spawnParticle(x,y,vx,vy,life,r,color,fade=true,glow=false) {
  particles.push({x,y,vx,vy,life,maxLife:life,r,color,fade,glow});
}
function spawnExplosion(x,y,count,speed,colors,minLife,maxLife,minR,maxR) {
  for(let i=0;i<count;i++){
    let ang = rand(0,Math.PI*2), spd = rand(0,speed);
    spawnParticle(x,y, Math.cos(ang)*spd, Math.sin(ang)*spd,
      rand(minLife,maxLife), rand(minR,maxR),
      colors[randInt(0,colors.length)], true, true);
  }
}
function spawnDebris(x,y,vx,vy,count,color) {
  for(let i=0;i<count;i++){
    let ang = rand(0,Math.PI*2), spd = rand(0.5,3);
    spawnParticle(x+rand(-5,5),y+rand(-5,5),
      vx*0.3+Math.cos(ang)*spd, vy*0.3+Math.sin(ang)*spd,
      rand(30,90), rand(1.5,4), color, true);
  }
}

// ── Stars ──────────────────────────────────────────────────────────────────
const stars = [];
const STAR_LAYERS = 3;
function initStars() {
  stars.length = 0;
  for(let l=0;l<STAR_LAYERS;l++) {
    let count = l===0?300:l===1?150:60;
    for(let i=0;i<count;i++){
      stars.push({
        wx: rand(0,WORLD), wy: rand(0,WORLD),
        r: rand(0.3, l===2?2:1.2),
        brightness: rand(0.3,1),
        layer: l,
        twinkle: rand(0,Math.PI*2),
        twinkleSpeed: rand(0.01,0.04)
      });
    }
  }
}

// ── Asteroid ───────────────────────────────────────────────────────────────
class Asteroid {
  constructor(x,y,size,vx,vy,health) {
    this.x=x; this.y=y;
    this.vx=vx||rand(-1,1); this.vy=vy||rand(-1,1);
    this.size=size||rand(30,60);
    this.health=health||this.size*2;
    this.maxHealth=this.health;
    this.angle=rand(0,Math.PI*2);
    this.rotSpeed=rand(-0.01,0.01);
    this.dead=false;
    this.generateShape();
    this.hue = randInt(15,45);
    this.flash = 0;
  }
  generateShape() {
    this.verts = [];
    let n = randInt(7,12);
    for(let i=0;i<n;i++){
      let a = (i/n)*Math.PI*2;
      let r = this.size*(0.7+Math.random()*0.6);
      this.verts.push({a, r});
    }
  }
  update() {
    this.x = wrap(this.x+this.vx, WORLD);
    this.y = wrap(this.y+this.vy, WORLD);
    this.angle += this.rotSpeed;
    if(this.flash > 0) this.flash -= 0.1;
  }
  draw(cx,cy) {
    let sx = this.x-cx+W/2, sy = this.y-cy+H/2;
    if(sx<-this.size*2||sx>W+this.size*2||sy<-this.size*2||sy>H+this.size*2) return;
    ctx.save();
    ctx.translate(sx, sy);
    ctx.rotate(this.angle);
    ctx.beginPath();
    for(let i=0;i<this.verts.length;i++){
      let v=this.verts[i];
      let x=Math.cos(v.a+this.angle)*v.r, y=Math.sin(v.a+this.angle)*v.r;
      // rotate back for local space
      let lx=v.r*Math.cos(v.a), ly=v.r*Math.sin(v.a);
      if(i===0) ctx.moveTo(lx,ly); else ctx.lineTo(lx,ly);
    }
    ctx.closePath();
    let g = ctx.createRadialGradient(0,0,this.size*0.2, 0,0,this.size);
    let hp = this.health/this.maxHealth;
    if(this.flash>0){
      g.addColorStop(0, `hsl(${this.hue},60%,80%)`);
      g.addColorStop(1, `hsl(${this.hue},40%,50%)`);
    } else {
      g.addColorStop(0, `hsl(${this.hue},50%,${30+hp*20}%)`);
      g.addColorStop(1, `hsl(${this.hue},30%,${15+hp*10}%)`);
    }
    ctx.fillStyle = g;
    ctx.fill();
    ctx.strokeStyle = this.flash>0 ? '#fff' : `hsl(${this.hue},60%,40%)`;
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Crack lines for damaged asteroids
    if(hp < 0.6) {
      ctx.strokeStyle = `rgba(0,0,0,${(1-hp)*0.7})`;
      ctx.lineWidth = 1;
      for(let i=0;i<3;i++){
        let a = i*(Math.PI*2/3)+0.3;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a)*this.size*0.2, Math.sin(a)*this.size*0.2);
        ctx.lineTo(Math.cos(a)*this.size*0.8, Math.sin(a)*this.size*0.8);
        ctx.stroke();
      }
    }
    ctx.restore();
  }
  hit(dmg) {
    this.health -= dmg;
    this.flash = 1;
    if(this.health <= 0) {
      this.dead = true;
      return true;
    }
    return false;
  }
  split() {
    if(this.size < 15) return [];
    let children = [];
    let n = randInt(2,4);
    for(let i=0;i<n;i++){
      let ang = rand(0,Math.PI*2), spd = rand(1,3);
      let ns = this.size*rand(0.35,0.55);
      children.push(new Asteroid(
        this.x+rand(-10,10), this.y+rand(-10,10),
        Math.cos(ang)*spd+this.vx*0.3,
        Math.sin(ang)*spd+this.vy*0.3,
        ns, ns*2
      ));
    }
    return children;
  }
}

// ── Bullet ─────────────────────────────────────────────────────────────────
class Bullet {
  constructor(x,y,vx,vy,owner,type='laser',color='#00ffff') {
    this.x=x; this.y=y;
    this.vx=vx; this.vy=vy;
    this.owner=owner;
    this.type=type;
    this.color=color;
    this.life=type==='missile'?180:80;
    this.dead=false;
    this.trail=[];
    if(type==='missile'){
      this.target=null;
      this.turnRate=0.06;
      this.speed=6;
    }
  }
  update(targets) {
    if(this.type==='missile' && this.target) {
      let ta = angle(this, this.target);
      let ca = Math.atan2(this.vy, this.vx);
      let diff = angleDiff(ca, ta);
      ca += clamp(diff, -this.turnRate, this.turnRate);
      this.vx = Math.cos(ca)*this.speed;
      this.vy = Math.sin(ca)*this.speed;
      this.turnRate = Math.min(0.12, this.turnRate+0.001);
    }
    this.trail.push({x:this.x, y:this.y});
    if(this.trail.length > (this.type==='missile'?20:8)) this.trail.shift();
    this.x = wrap(this.x+this.vx, WORLD);
    this.y = wrap(this.y+this.vy, WORLD);
    this.life--;
    if(this.life<=0) this.dead=true;
  }
  draw(cx,cy) {
    let sx=this.x-cx+W/2, sy=this.y-cy+H/2;
    if(sx<-50||sx>W+50||sy<-50||sy>H+50) return;
    // Trail
    if(this.trail.length>1){
      ctx.beginPath();
      for(let i=0;i<this.trail.length;i++){
        let tx=this.trail[i].x-cx+W/2, ty=this.trail[i].y-cy+H/2;
        let alpha = i/this.trail.length*0.6;
        if(i===0) ctx.moveTo(tx,ty); else ctx.lineTo(tx,ty);
      }
      ctx.strokeStyle = this.type==='missile' ? 'rgba(255,150,50,0.4)' : this.color.replace(')',',0.3)').replace('rgb','rgba').replace('#','rgba(').replace('rgba(','rgba(');
      // simpler:
      ctx.strokeStyle = this.type==='missile'?'rgba(255,150,50,0.35)':'rgba(0,220,255,0.3)';
      ctx.lineWidth = this.type==='missile'?2:1;
      ctx.stroke();
    }
    if(this.type==='missile'){
      ctx.save();
      ctx.translate(sx,sy);
      let a=Math.atan2(this.vy,this.vx);
      ctx.rotate(a);
      // missile body
      ctx.beginPath();
      ctx.moveTo(8,0);
      ctx.lineTo(-5,3);
      ctx.lineTo(-3,0);
      ctx.lineTo(-5,-3);
      ctx.closePath();
      ctx.fillStyle='#ff8800';
      ctx.fill();
      // exhaust
      ctx.beginPath();
      ctx.arc(-6,0,3,0,Math.PI*2);
      ctx.fillStyle='rgba(255,200,50,0.8)';
      ctx.fill();
      ctx.restore();
    } else {
      // laser bolt
      ctx.save();
      ctx.translate(sx,sy);
      ctx.rotate(Math.atan2(this.vy,this.vx));
      let grd = ctx.createLinearGradient(-8,0,8,0);
      grd.addColorStop(0,'transparent');
      grd.addColorStop(0.5,this.color);
      grd.addColorStop(1,'transparent');
      ctx.fillStyle=grd;
      ctx.fillRect(-8,-1.5,16,3);
      ctx.shadowBlur=6; ctx.shadowColor=this.color;
      ctx.fillRect(-6,-1,12,2);
      ctx.restore();
    }
  }
}

// ── PowerUp ────────────────────────────────────────────────────────────────
class PowerUp {
  constructor(x,y,type) {
    this.x=x; this.y=y;
    this.type=type;
    this.life=600;
    this.dead=false;
    this.angle=0;
    this.pulse=0;
    this.colors={
      health:'#ff3366',
      shield:'#0099ff',
      missile:'#ff8800',
      triple:'#ffff00',
      spread:'#aa44ff',
      boost:'#00ff88'
    };
    this.labels={
      health:'♥',shield:'⬡',missile:'◆',
      triple:'3x',spread:'<<<','boost':'⚡'
    };
  }
  update(){
    this.angle+=0.03;
    this.pulse+=0.08;
    this.life--;
    if(this.life<=0) this.dead=true;
  }
  draw(cx,cy){
    let sx=this.x-cx+W/2, sy=this.y-cy+H/2;
    if(sx<-40||sx>W+40||sy<-40||sy>H+40) return;
    let c=this.colors[this.type]||'#fff';
    let fade = this.life<60?this.life/60:1;
    ctx.save();
    ctx.translate(sx,sy);
    ctx.rotate(this.angle);
    // Outer glow ring
    ctx.beginPath();
    ctx.arc(0,0,16+Math.sin(this.pulse)*3,0,Math.PI*2);
    ctx.strokeStyle=c.replace(')',`,${0.3*fade})`).replace('#',`rgba(`);
    // easier:
    ctx.globalAlpha=fade*0.5;
    ctx.strokeStyle=c;
    ctx.lineWidth=2;
    ctx.stroke();
    // Inner body
    ctx.globalAlpha=fade;
    ctx.beginPath();
    for(let i=0;i<6;i++){
      let a=i*Math.PI/3, r=12;
      if(i===0) ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r);
      else ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
    }
    ctx.closePath();
    ctx.fillStyle=c;
    ctx.shadowBlur=15; ctx.shadowColor=c;
    ctx.fill();
    // Label
    ctx.globalAlpha=fade;
    ctx.fillStyle='#000';
    ctx.font='bold 9px Courier New';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(this.labels[this.type]||'?',0,0);
    ctx.restore();
  }
}

// ── Ship ───────────────────────────────────────────────────────────────────
class Ship {
  constructor(x,y,isPlayer,design=0) {
    this.x=x; this.y=y;
    this.vx=0; this.vy=0;
    this.angle=-Math.PI/2;
    this.isPlayer=isPlayer;
    this.design=design;
    this.health=100; this.maxHealth=100;
    this.shield=100; this.maxShield=100;
    this.energy=100; this.maxEnergy=100;
    this.shieldRegen=0.08;
    this.energyRegen=0.15;
    this.dead=false;
    this.invincible=0;
    this.weapon=0; // 0=laser, 1=triple, 2=spread
    this.missiles=3;
    this.fireRate=0;
    this.thrustParticleTimer=0;
    this.boostCooldown=0;
    this.isBoosting=false;
    this.score=0;
    this.flash=0;
    this.kills=0;
    // AI state
    this.aiState='patrol';
    this.aiTarget=null;
    this.aiTimer=0;
    this.patrolAngle=rand(0,Math.PI*2);
    this.patrolRadius=rand(200,500);
    this.patrolCenter={x,y};
    this.strafeDir=1;
    this.strafTimer=0;
    // Visual
    this.engineGlow=0;
    this.shieldFlash=0;
    this.colors=this.getColors();
    this.thrustPower=0;
  }
  getColors() {
    const schemes=[
      {hull:'#cc3344',accent:'#ff6677',engine:'#ff4400',bullet:'#ff3366'},
      {hull:'#3366cc',accent:'#6699ff',engine:'#4488ff',bullet:'#66aaff'},
      {hull:'#33cc66',accent:'#66ff99',engine:'#44ff88',bullet:'#33ff77'},
      {hull:'#cc8833',accent:'#ffbb66',engine:'#ff9900',bullet:'#ffcc44'},
      {hull:'#9933cc',accent:'#cc66ff',engine:'#aa44ff',bullet:'#cc88ff'},
    ];
    if(this.isPlayer) return {hull:'#00ccff',accent:'#00ffcc',engine:'#00aaff',bullet:'#00ffff'};
    return schemes[this.design%schemes.length];
  }

  drawShip(sx,sy,ghost=false) {
    ctx.save();
    ctx.translate(sx,sy);
    ctx.rotate(this.angle + Math.PI/2);
    let alpha = ghost?0.3:1;
    if(this.invincible>0 && Math.floor(this.invincible/5)%2===0) alpha=0.4;
    ctx.globalAlpha=alpha;

    let c=this.colors;
    if(this.isPlayer) {
      this.drawPlayerShip(c);
    } else {
      this.drawAIShip(c);
    }
    // Shield bubble
    if(this.shield>0 && (this.shieldFlash>0 || (this.isPlayer && this.shield<this.maxShield))) {
      let shieldAlpha = this.shieldFlash>0 ? Math.min(0.5, this.shieldFlash*0.3) : 0.08;
      ctx.beginPath();
      ctx.arc(0,0,20+this.shieldFlash*3,0,Math.PI*2);
      ctx.strokeStyle=`rgba(100,180,255,${shieldAlpha+0.1})`;
      ctx.lineWidth=2;
      ctx.stroke();
      if(this.shieldFlash>0) {
        ctx.beginPath();
        ctx.arc(0,0,20+this.shieldFlash*3,0,Math.PI*2);
        ctx.fillStyle=`rgba(100,180,255,${shieldAlpha*0.4})`;
        ctx.fill();
      }
    }
    if(this.shieldFlash>0) this.shieldFlash=Math.max(0,this.shieldFlash-0.15);
    ctx.restore();
  }

  drawPlayerShip(c) {
    // Sleek player fighter — delta-wing design
    // Engine glow
    if(this.thrustPower>0) {
      ctx.beginPath();
      ctx.arc(0, 10, 5+this.thrustPower*3, 0, Math.PI*2);
      ctx.fillStyle=`rgba(0,150,255,${this.thrustPower*0.6})`;
      ctx.fill();
      // Engine exhaust
      let len=this.thrustPower*20+10;
      let grd=ctx.createLinearGradient(0,8,0,8+len);
      grd.addColorStop(0,`rgba(0,200,255,0.9)`);
      grd.addColorStop(0.4,`rgba(0,100,255,0.5)`);
      grd.addColorStop(1,'transparent');
      ctx.beginPath();
      ctx.moveTo(-5,8); ctx.lineTo(5,8); ctx.lineTo(2,8+len); ctx.lineTo(-2,8+len);
      ctx.closePath();
      ctx.fillStyle=grd;
      ctx.fill();
      // Secondary thrusters
      grd=ctx.createLinearGradient(0,6,0,6+len*0.6);
      grd.addColorStop(0,`rgba(0,200,255,0.6)`);
      grd.addColorStop(1,'transparent');
      ctx.beginPath();
      ctx.moveTo(-14,4); ctx.lineTo(-10,4); ctx.lineTo(-11,4+len*0.6); ctx.lineTo(-13,4+len*0.6);
      ctx.closePath(); ctx.fillStyle=grd; ctx.fill();
      ctx.beginPath();
      ctx.moveTo(14,4); ctx.lineTo(10,4); ctx.lineTo(11,4+len*0.6); ctx.lineTo(13,4+len*0.6);
      ctx.closePath(); ctx.fillStyle=grd; ctx.fill();
    }
    // Hull
    ctx.beginPath();
    ctx.moveTo(0,-22); // nose
    ctx.lineTo(16,10); // right wing tip
    ctx.lineTo(8,6);  // right indent
    ctx.lineTo(4,14); // right tail
    ctx.lineTo(0,10); // center tail
    ctx.lineTo(-4,14);// left tail
    ctx.lineTo(-8,6); // left indent
    ctx.lineTo(-16,10);// left wing tip
    ctx.closePath();
    let grd=ctx.createLinearGradient(0,-22,0,14);
    grd.addColorStop(0,'#44eeff');
    grd.addColorStop(0.5,'#00aacc');
    grd.addColorStop(1,'#005566');
    ctx.fillStyle=grd;
    ctx.fill();
    ctx.strokeStyle='#00ffcc';
    ctx.lineWidth=1.5;
    ctx.stroke();
    // Cockpit
    ctx.beginPath();
    ctx.ellipse(0,-8,4,7,0,0,Math.PI*2);
    ctx.fillStyle='rgba(0,255,200,0.6)';
    ctx.fill();
    ctx.strokeStyle='rgba(0,255,255,0.8)';
    ctx.lineWidth=1;
    ctx.stroke();
    // Wing details
    ctx.strokeStyle='rgba(0,220,255,0.5)';
    ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(0,-22); ctx.lineTo(-16,10); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,-22); ctx.lineTo(16,10); ctx.stroke();
    // Weapon pods
    ctx.fillStyle='#007788';
    ctx.fillRect(-17,2,5,5);
    ctx.fillRect(12,2,5,5);
    ctx.fillStyle='#00ffcc';
    ctx.fillRect(-16,1,2,2);
    ctx.fillRect(14,1,2,2);
  }

  drawAIShip(c) {
    // Each AI ship has a unique silhouette based on design
    let designs=[
      ()=>this.drawAIDesign0(c),
      ()=>this.drawAIDesign1(c),
      ()=>this.drawAIDesign2(c),
      ()=>this.drawAIDesign3(c),
      ()=>this.drawAIDesign4(c),
    ];
    if(this.thrustPower>0) {
      let len=this.thrustPower*16+8;
      let grd=ctx.createLinearGradient(0,8,0,8+len);
      grd.addColorStop(0,c.engine+'cc');
      grd.addColorStop(1,'transparent');
      ctx.beginPath();
      ctx.moveTo(-4,8); ctx.lineTo(4,8);
      ctx.lineTo(1,8+len); ctx.lineTo(-1,8+len);
      ctx.closePath(); ctx.fillStyle=grd; ctx.fill();
    }
    designs[this.design%designs.length]();
  }
  drawAIDesign0(c) {
    // Aggressive wedge fighter
    ctx.beginPath();
    ctx.moveTo(0,-20);
    ctx.lineTo(14,8); ctx.lineTo(6,4);
    ctx.lineTo(3,12); ctx.lineTo(0,8);
    ctx.lineTo(-3,12); ctx.lineTo(-6,4);
    ctx.lineTo(-14,8);
    ctx.closePath();
    let g=ctx.createLinearGradient(0,-20,0,12);
    g.addColorStop(0,c.accent); g.addColorStop(1,c.hull);
    ctx.fillStyle=g; ctx.fill();
    ctx.strokeStyle=c.accent; ctx.lineWidth=1.5; ctx.stroke();
    ctx.beginPath(); ctx.ellipse(0,-5,3,6,0,0,Math.PI*2);
    ctx.fillStyle='rgba(255,200,200,0.4)'; ctx.fill();
  }
  drawAIDesign1(c) {
    // Bulky cruiser
    ctx.beginPath();
    ctx.moveTo(0,-18);
    ctx.lineTo(10,0); ctx.lineTo(14,4);
    ctx.lineTo(10,12); ctx.lineTo(-10,12);
    ctx.lineTo(-14,4); ctx.lineTo(-10,0);
    ctx.closePath();
    let g=ctx.createLinearGradient(0,-18,0,12);
    g.addColorStop(0,c.accent); g.addColorStop(1,c.hull);
    ctx.fillStyle=g; ctx.fill();
    ctx.strokeStyle=c.accent; ctx.lineWidth=1.5; ctx.stroke();
    // Bridge
    ctx.beginPath(); ctx.rect(-4,-10,8,8);
    ctx.fillStyle='rgba(100,180,255,0.5)'; ctx.fill();
  }
  drawAIDesign2(c) {
    // Twin-boom interceptor
    ctx.beginPath();
    ctx.moveTo(0,-20); ctx.lineTo(4,-5);
    ctx.lineTo(18,6); ctx.lineTo(14,12);
    ctx.lineTo(4,6); ctx.lineTo(0,10);
    ctx.lineTo(-4,6); ctx.lineTo(-14,12);
    ctx.lineTo(-18,6); ctx.lineTo(-4,-5);
    ctx.closePath();
    let g=ctx.createLinearGradient(0,-20,0,12);
    g.addColorStop(0,c.accent); g.addColorStop(1,c.hull);
    ctx.fillStyle=g; ctx.fill();
    ctx.strokeStyle=c.accent; ctx.lineWidth=1.5; ctx.stroke();
    ctx.fillStyle=c.accent+'88';
    ctx.fillRect(-2,-18,4,6);
  }
  drawAIDesign3(c) {
    // Saucer raider
    ctx.beginPath();
    ctx.ellipse(0,0,18,10,0,0,Math.PI*2);
    let g=ctx.createRadialGradient(0,0,2,0,0,18);
    g.addColorStop(0,c.accent); g.addColorStop(1,c.hull);
    ctx.fillStyle=g; ctx.fill();
    ctx.strokeStyle=c.accent; ctx.lineWidth=1.5; ctx.stroke();
    ctx.beginPath(); ctx.ellipse(0,-3,6,4,0,0,Math.PI*2);
    ctx.fillStyle='rgba(200,200,255,0.4)'; ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-6,-10); ctx.lineTo(0,-18); ctx.lineTo(6,-10);
    ctx.fillStyle=c.hull; ctx.fill();
    ctx.strokeStyle=c.accent; ctx.lineWidth=1; ctx.stroke();
  }
  drawAIDesign4(c) {
    // Stealth bomber (arrowhead)
    ctx.beginPath();
    ctx.moveTo(0,-22);
    ctx.lineTo(20,8);
    ctx.lineTo(12,4);
    ctx.lineTo(8,14);
    ctx.lineTo(-8,14);
    ctx.lineTo(-12,4);
    ctx.lineTo(-20,8);
    ctx.closePath();
    let g=ctx.createLinearGradient(0,-22,0,14);
    g.addColorStop(0,c.accent+'bb'); g.addColorStop(1,c.hull+'88');
    ctx.fillStyle=g; ctx.fill();
    ctx.strokeStyle=c.accent; ctx.lineWidth=1; ctx.stroke();
    ctx.fillStyle=c.accent+'55';
    ctx.beginPath();
    ctx.moveTo(0,-22); ctx.lineTo(20,8); ctx.lineTo(0,-5);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(0,-22); ctx.lineTo(-20,8); ctx.lineTo(0,-5);
    ctx.closePath(); ctx.fill();
  }

  update(player, asteroids, bullets, allShips) {
    if(this.invincible>0) this.invincible--;
    if(this.fireRate>0) this.fireRate--;
    if(this.boostCooldown>0) this.boostCooldown--;
    // Regen
    this.shield=Math.min(this.maxShield, this.shield+this.shieldRegen);
    this.energy=Math.min(this.maxEnergy, this.energy+this.energyRegen);

    if(!this.isPlayer) {
      this.updateAI(player, asteroids, bullets, allShips);
    }

    // Physics
    let maxSpd = this.isBoosting?10:5;
    let spd = Math.sqrt(this.vx*this.vx+this.vy*this.vy);
    if(spd>maxSpd) { this.vx*=maxSpd/spd; this.vy*=maxSpd/spd; }
    this.vx*=0.97; this.vy*=0.97;
    this.x=wrap(this.x+this.vx, WORLD);
    this.y=wrap(this.y+this.vy, WORLD);
    this.thrustPower=Math.max(0,this.thrustPower-0.1);
    if(this.flash>0) this.flash=Math.max(0,this.flash-0.1);
  }

  thrust(power=1) {
    this.vx+=Math.cos(this.angle)*0.3*power;
    this.vy+=Math.sin(this.angle)*0.3*power;
    this.thrustPower=Math.min(1,this.thrustPower+0.2*power);
  }

  fire(bullets) {
    if(this.fireRate>0) return;
    let cost=5;
    if(this.energy<cost) return;
    this.energy-=cost;
    let spd=12;
    let bvx=Math.cos(this.angle)*spd+this.vx;
    let bvy=Math.sin(this.angle)*spd+this.vy;
    let c=this.colors.bullet;
    if(this.weapon===0||!this.isPlayer) {
      // single laser - offset to gun positions
      let ox=Math.cos(this.angle+Math.PI/2)*5, oy=Math.sin(this.angle+Math.PI/2)*5;
      bullets.push(new Bullet(this.x-ox,this.y-oy,bvx,bvy,this,'laser',c));
      bullets.push(new Bullet(this.x+ox,this.y+oy,bvx,bvy,this,'laser',c));
      this.fireRate=8;
    } else if(this.weapon===1) {
      // Triple shot
      for(let i=-1;i<=1;i++){
        let a=this.angle+i*0.15;
        bullets.push(new Bullet(this.x,this.y,
          Math.cos(a)*spd+this.vx, Math.sin(a)*spd+this.vy,
          this,'laser',c));
      }
      this.fireRate=10;
    } else if(this.weapon===2) {
      // Spread
      for(let i=-2;i<=2;i++){
        let a=this.angle+i*0.22;
        bullets.push(new Bullet(this.x,this.y,
          Math.cos(a)*spd*0.9+this.vx, Math.sin(a)*spd*0.9+this.vy,
          this,'laser',c));
      }
      this.fireRate=15;
    }
    // Muzzle flash
    let fx=this.x+Math.cos(this.angle)*20, fy=this.y+Math.sin(this.angle)*20;
    spawnParticle(fx,fy,Math.cos(this.angle)*2,Math.sin(this.angle)*2,
      8,6,c,true,true);
  }

  fireMissile(bullets, targets) {
    if(this.missiles<=0 || this.energy<15) return;
    this.missiles--;
    this.energy-=15;
    let spd=5;
    let b=new Bullet(this.x,this.y,
      Math.cos(this.angle)*spd+this.vx,
      Math.sin(this.angle)*spd+this.vy,
      this,'missile','#ff8800');
    // Find nearest target
    let nearest=null, nd=Infinity;
    for(let t of targets){
      if(t===this||t.dead) continue;
      let d=dist(this,t);
      if(d<nd){nd=d;nearest=t;}
    }
    b.target=nearest;
    bullets.push(b);
  }

  takeDamage(dmg) {
    if(this.invincible>0) return;
    this.flash=1;
    if(this.shield>0){
      let absorbed=Math.min(this.shield,dmg*1.5);
      this.shield-=absorbed;
      dmg-=absorbed/1.5;
      this.shieldFlash=3;
      if(dmg<=0) return;
    }
    this.health-=dmg;
    if(this.health<=0){
      this.health=0;
      this.dead=true;
    }
  }

  updateAI(player, asteroids, bullets, allShips) {
    this.aiTimer--;
    if(this.aiTimer<=0) {
      // Re-evaluate state
      let dp=dist(this,player);
      if(dp<400) this.aiState='attack';
      else if(dp<700) this.aiState='approach';
      else this.aiState='patrol';
      this.aiTimer=randInt(30,90);
      this.strafeDir*=-1;
    }

    // Avoid nearby asteroids
    for(let a of asteroids){
      let d=dist(this,a);
      if(d<a.size+60){
        let away=Math.atan2(this.y-a.y, this.x-a.x);
        this.angle=this.angle+(angleDiff(this.angle,away))*0.1;
        this.thrust(0.5);
        return;
      }
    }

    if(this.aiState==='patrol'){
      let tx=this.patrolCenter.x+Math.cos(this.patrolAngle)*this.patrolRadius;
      let ty=this.patrolCenter.y+Math.sin(this.patrolAngle)*this.patrolRadius;
      this.patrolAngle+=0.005;
      let ta=Math.atan2(ty-this.y, tx-this.x);
      this.angle+=angleDiff(this.angle,ta)*0.05;
      this.thrust(0.3);
    } else if(this.aiState==='approach'){
      let ta=angle(this,player);
      this.angle+=angleDiff(this.angle,ta)*0.06;
      this.thrust(0.6);
    } else if(this.aiState==='attack'){
      let dp=dist(this,player);
      // Lead the target
      let leadTime=dp/12;
      let tx=player.x+player.vx*leadTime;
      let ty=player.y+player.vy*leadTime;
      let ta=Math.atan2(ty-this.y, tx-this.x);
      this.angle+=angleDiff(this.angle,ta)*0.08;

      // Strafe
      let strafeAng=this.angle+Math.PI/2*this.strafeDir;
      this.vx+=Math.cos(strafeAng)*0.15;
      this.vy+=Math.sin(strafeAng)*0.15;

      // Maintain optimal range
      if(dp<200) {
        let away=Math.atan2(this.y-player.y,this.x-player.x);
        this.vx+=Math.cos(away)*0.3;
        this.vy+=Math.sin(away)*0.3;
      } else if(dp>350) {
        this.thrust(0.5);
      }

      // Fire when aimed
      let aimErr=Math.abs(angleDiff(this.angle, Math.atan2(player.y-this.y,player.x-this.x)));
      if(aimErr<0.25) {
        this.fire(bullets);
        if(this.missiles>0 && Math.random()<0.002) this.fireMissile(bullets,[player]);
      }
    }
  }
}

// ── Game State ─────────────────────────────────────────────────────────────
let gameState='menu';
let player, asteroids, bullets, aiShips, powerups;
let score=0, wave=1, waveTimer=0, waveMessage='', waveMessageTimer=0;
let camera={x:0,y:0};
let frameCount=0;
let killsFeed=[];

function startGame(){
  document.getElementById('message').style.display='none';
  document.getElementById('gameover').style.display='none';
  score=0; wave=1; waveTimer=0;
  particles=[]; killsFeed=[];
  player=new Ship(WORLD/2, WORLD/2, true);
  player.missiles=3;
  asteroids=[];
  bullets=[];
  aiShips=[];
  powerups=[];
  spawnWave();
  gameState='playing';
  initStars();
}

function spawnWave(){
  // Asteroids
  let aCnt = 5+wave*2;
  for(let i=0;i<aCnt;i++){
    let x,y;
    do {
      x=rand(0,WORLD); y=rand(0,WORLD);
    } while(dist({x,y},player)<200);
    let sz=rand(25,55+wave*3);
    asteroids.push(new Asteroid(x,y,sz,rand(-1.5,1.5),rand(-1.5,1.5),sz*2));
  }
  // AI ships
  let aiCnt = Math.min(1+Math.floor(wave/2), 5);
  for(let i=0;i<aiCnt;i++){
    let x,y;
    do {
      x=rand(0,WORLD); y=rand(0,WORLD);
    } while(dist({x,y},player)<300);
    let s=new Ship(x,y,false,i%5);
    s.missiles=1+Math.floor(wave/3);
    s.health=80+wave*10; s.maxHealth=s.health;
    aiShips.push(s);
  }
  waveMessage=`SECTOR ${wave}`;
  waveMessageTimer=180;
}

function addKillFeed(text){
  killsFeed.push({text,timer:240});
  let feed=document.getElementById('kills-feed');
  let el=document.createElement('div');
  el.className='kill-entry';
  el.textContent=text;
  feed.appendChild(el);
  setTimeout(()=>{
    el.style.opacity='0';
    setTimeout(()=>feed.removeChild(el),2000);
  },2000);
}

function spawnPowerup(x,y){
  let types=['health','shield','missile','triple','spread','boost'];
  let t=types[randInt(0,types.length)];
  powerups.push(new PowerUp(x,y,t));
}

// ── Main Update ────────────────────────────────────────────────────────────
function update(){
  if(gameState!=='playing') return;
  frameCount++;

  // Camera follows player
  camera.x=player.x; camera.y=player.y;

  // Player input
  if(!player.dead){
    let rotating=false;
    if(keys['KeyA']||keys['ArrowLeft'])  { player.angle-=0.055; rotating=true; }
    if(keys['KeyD']||keys['ArrowRight']) { player.angle+=0.055; rotating=true; }
    if(keys['KeyW']||keys['ArrowUp'])    { player.thrust(1); }
    if(keys['KeyS']||keys['ArrowDown'])  { player.vx*=0.94; player.vy*=0.94; }
    // Boost
    if(keys['ShiftLeft']||keys['ShiftRight']) {
      if(player.boostCooldown===0 && player.energy>20){
        player.isBoosting=true;
        player.energy-=0.5;
        player.thrust(2.5);
        spawnParticle(
          player.x-Math.cos(player.angle)*15,
          player.y-Math.sin(player.angle)*15,
          -Math.cos(player.angle)*rand(1,4)+rand(-1,1),
          -Math.sin(player.angle)*rand(1,4)+rand(-1,1),
          20, rand(3,7), '#00aaff', true, true
        );
      } else { player.isBoosting=false; }
    } else { player.isBoosting=false; }
    if(keys['Space']) player.fire(bullets);
    if(keys['KeyX']) { player.fireMissile(bullets, [...asteroids,...aiShips]); keys['KeyX']=false; }
    if(keys['Digit1']) { player.weapon=0; keys['Digit1']=false; }
    if(keys['Digit2']) { player.weapon=1; keys['Digit2']=false; }
    if(keys['Digit3']) { player.weapon=2; keys['Digit3']=false; }
    // Thrust particles
    if((keys['KeyW']||keys['ArrowUp']) && player.thrustPower>0.3) {
      player.thrustParticleTimer++;
      if(player.thrustParticleTimer%2===0){
        let ox=Math.cos(player.angle+Math.PI/2)*rand(-4,4);
        let oy=Math.sin(player.angle+Math.PI/2)*rand(-4,4);
        spawnParticle(
          player.x-Math.cos(player.angle)*15+ox,
          player.y-Math.sin(player.angle)*15+oy,
          -Math.cos(player.angle)*rand(2,5)+rand(-0.5,0.5),
          -Math.sin(player.angle)*rand(2,5)+rand(-0.5,0.5),
          25, rand(2,5),
          Math.random()<0.5?'#0088ff':'#00ccff',true,true
        );
      }
    }
  }

  // Update player
  player.update(null, asteroids, bullets, aiShips);

  // Update AI ships
  for(let s of aiShips){
    s.update(player, asteroids, bullets, aiShips);
    // Thrust particles for AI
    if(s.thrustPower>0.3 && Math.random()<0.3){
      spawnParticle(
        s.x-Math.cos(s.angle)*12+rand(-3,3),
        s.y-Math.sin(s.angle)*12+rand(-3,3),
        -Math.cos(s.angle)*rand(1,3), -Math.sin(s.angle)*rand(1,3),
        15, rand(1,4), s.colors.engine, true
      );
    }
  }

  // Update asteroids
  for(let a of asteroids) a.update();

  // Update bullets
  for(let b of bullets){
    let tgts=b.type==='missile'?[...asteroids,...aiShips,player]:null;
    b.update(tgts);
  }

  // Update powerups
  for(let p of powerups) p.update();

  // Update particles
  for(let p of particles){
    p.x+=p.vx; p.y+=p.vy;
    p.vx*=0.97; p.vy*=0.97;
    p.life--;
  }

  // ── Collision: Bullets vs Asteroids ──
  let newAsteroids=[];
  for(let b of bullets){
    if(b.dead||b.owner===null) continue;
    for(let a of asteroids){
      if(a.dead) continue;
      let d=dist(b,a);
      if(d<a.size){
        b.dead=true;
        let killed=a.hit(b.type==='missile'?40:10);
        a.flash=1;
        // Impact sparks
        spawnExplosion(b.x,b.y,6,3,['#ffcc44','#ff8800','#ffffff'],5,15,1,3);
        if(killed){
          spawnExplosion(a.x,a.y,25,a.size/3,
            ['#ff4400','#ff8800','#ffcc44','#ffffff','#884400'],15,50,2,6);
          spawnDebris(a.x,a.y,a.vx,a.vy,12,'#886644');
          let pts=Math.round(a.size*5);
          score+=pts;
          if(b.owner && b.owner.isPlayer) addKillFeed(`+${pts} ASTEROID`);
          if(Math.random()<0.25) spawnPowerup(a.x,a.y);
          newAsteroids.push(...a.split());
        }
        break;
      }
    }
  }
  asteroids.push(...newAsteroids);

  // ── Collision: Bullets vs Ships ──
  for(let b of bullets){
    if(b.dead) continue;
    // vs player
    if(b.owner!==player && !player.dead){
      if(dist(b,player)<18){
        b.dead=true;
        player.takeDamage(b.type==='missile'?35:12);
        spawnExplosion(b.x,b.y,8,3,['#ff0066','#ffffff','#ff88aa'],5,20,1,4);
        if(player.dead){
          triggerPlayerDeath();
        }
      }
    }
    // vs AI ships
    for(let s of aiShips){
      if(b.dead||b.owner===s||s.dead) continue;
      if(dist(b,s)<18){
        b.dead=true;
        s.takeDamage(b.type==='missile'?35:12);
        spawnExplosion(b.x,b.y,8,3,[s.colors.bullet,'#ffffff','#ffaa44'],5,20,1,4);
        if(s.dead){
          spawnExplosion(s.x,s.y,40,5,
            ['#ff4400','#ff8800','#ffcc44','#ffffff','#884400'],20,80,2,8);
          spawnDebris(s.x,s.y,s.vx,s.vy,20,s.colors.hull);
          let pts=500+wave*100;
          score+=pts;
          player.kills++;
          addKillFeed(`+${pts} ENEMY SHIP`);
          if(Math.random()<0.5) spawnPowerup(s.x,s.y);
        }
      }
    }
  }

  // ── Collision: Player vs Asteroids ──
  if(!player.dead && player.invincible===0){
    for(let a of asteroids){
      if(a.dead) continue;
      if(dist(player,a)<a.size+12){
        player.takeDamage(15);
        player.invincible=60;
        let away=Math.atan2(player.y-a.y,player.x-a.x);
        player.vx+=Math.cos(away)*3; player.vy+=Math.sin(away)*3;
        a.vx+=Math.cos(away+Math.PI)*1; a.vy+=Math.sin(away+Math.PI)*1;
        spawnExplosion(player.x,player.y,10,3,['#ff0066','#ffaa00','#ffffff'],5,20,1,5);
        if(player.dead) triggerPlayerDeath();
      }
    }
  }

  // ── Collision: Player vs PowerUps ──
  for(let p of powerups){
    if(p.dead) continue;
    if(dist(player,p)<22){
      p.dead=true;
      applyPowerup(p.type);
      spawnExplosion(p.x,p.y,12,3,[p.colors[p.type],'#ffffff'],5,20,2,5);
    }
  }

  // ── Collision: AI ships vs Asteroids ──
  for(let s of aiShips){
    if(s.dead) continue;
    for(let a of asteroids){
      if(a.dead) continue;
      if(dist(s,a)<a.size+12){
        s.takeDamage(8);
        s.invincible=30;
        let away=Math.atan2(s.y-a.y,s.x-a.x);
        s.vx+=Math.cos(away)*2; s.vy+=Math.sin(away)*2;
      }
    }
  }

  // Cleanup
  bullets=bullets.filter(b=>!b.dead);
  asteroids=asteroids.filter(a=>!a.dead);
  powerups=powerups.filter(p=>!p.dead);
  let deadAI=aiShips.filter(s=>s.dead);
  aiShips=aiShips.filter(s=>!s.dead);
  particles=particles.filter(p=>p.life>0);

  // Wave progression
  if(asteroids.length===0 && aiShips.length===0){
    waveTimer++;
    if(waveTimer>120){
      wave++;
      waveTimer=0;
      // Refill ammo
      player.missiles=Math.min(9, player.missiles+2);
      player.health=Math.min(100, player.health+30);
      player.shield=player.maxShield;
      spawnWave();
      score+=wave*200;
      addKillFeed(`SECTOR ${wave} CLEARED! +${wave*200}`);
    }
  }

  if(waveMessageTimer>0) waveMessageTimer--;

  // Update HUD
  updateHUD();
}

function triggerPlayerDeath(){
  spawnExplosion(player.x,player.y,60,8,
    ['#ff4400','#ff8800','#ffcc44','#ffffff','#0088ff'],30,120,2,10);
  spawnDebris(player.x,player.y,player.vx,player.vy,30,'#00aacc');
  setTimeout(()=>{
    gameState='gameover';
    document.getElementById('final-score').textContent=score;
    document.getElementById('gameover').style.display='block';
  }, 2000);
}

function applyPowerup(type){
  switch(type){
    case 'health': player.health=Math.min(100,player.health+40); break;
    case 'shield': player.shield=player.maxShield; break;
    case 'missile': player.missiles=Math.min(9,player.missiles+3); break;
    case 'triple': player.weapon=1; break;
    case 'spread': player.weapon=2; break;
    case 'boost': player.energy=player.maxEnergy; break;
  }
  addKillFeed(`POWERUP: ${type.toUpperCase()}`);
}

function updateHUD(){
  document.getElementById('health-bar').style.width=(player.health/player.maxHealth*100)+'%';
  document.getElementById('shield-bar').style.width=(player.shield/player.maxShield*100)+'%';
  document.getElementById('energy-bar').style.width=(player.energy/player.maxEnergy*100)+'%';
  document.getElementById('score-val').textContent=score;
  document.getElementById('wave-display').textContent=`SECTOR ${wave}`;
  let wnames=['LASER','TRIPLE','SPREAD'];
  document.getElementById('weapon-display').textContent=wnames[player.weapon]||'LASER';
  document.getElementById('ammo-display').textContent=`∞ / ${player.missiles}`;
}

// ── Draw ───────────────────────────────────────────────────────────────────
function drawBackground(){
  // Deep space gradient
  ctx.fillStyle='#000005';
  ctx.fillRect(0,0,W,H);

  // Nebula blobs
  let nebulae=[
    {x:0.3,y:0.2,r:400,hue:200,alpha:0.04},
    {x:0.7,y:0.6,r:500,hue:280,alpha:0.03},
    {x:0.5,y:0.8,r:350,hue:160,alpha:0.035},
    {x:0.15,y:0.75,r:300,hue:330,alpha:0.025},
  ];
  for(let n of nebulae){
    let sx=(n.x*WORLD-camera.x+W/2)%W;
    let sy=(n.y*WORLD-camera.y+H/2)%H;
    let g=ctx.createRadialGradient(sx,sy,0,sx,sy,n.r);
    g.addColorStop(0,`hsla(${n.hue},80%,40%,${n.alpha})`);
    g.addColorStop(1,'transparent');
    ctx.fillStyle=g;
    ctx.fillRect(0,0,W,H);
  }

  // Stars with parallax
  frameCount++;
  for(let s of stars){
    let parallax=[0.05,0.2,0.5][s.layer];
    let sx=((s.wx-camera.x*parallax+W*10)%WORLD/WORLD*W+W)%W;
    let sy=((s.wy-camera.y*parallax+H*10)%WORLD/WORLD*H+H)%H;
    let tw=Math.sin(s.twinkle+frameCount*s.twinkleSpeed);
    let alpha=s.brightness*(0.5+tw*0.5);
    let r=s.r*(0.8+tw*0.2);
    ctx.globalAlpha=alpha;
    if(s.layer===2){
      // Bright stars with glow
      ctx.shadowBlur=4; ctx.shadowColor='#aaccff';
      ctx.fillStyle=`hsl(${200+tw*20},80%,${80+tw*20}%)`;
    } else {
      ctx.shadowBlur=0;
      ctx.fillStyle=`rgba(200,220,255,${alpha})`;
    }
    ctx.beginPath();
    ctx.arc(sx,sy,r,0,Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha=1;
  ctx.shadowBlur=0;
}

function drawWorldObjects(){
  let cx=camera.x, cy=camera.y;

  // Draw particles first (behind objects)
  for(let p of particles){
    let sx=p.x-cx+W/2, sy=p.y-cy+H/2;
    let a=p.fade?p.life/p.maxLife:1;
    if(p.glow){ctx.shadowBlur=p.r*3; ctx.shadowColor=p.color;}
    ctx.globalAlpha=a;
    ctx.fillStyle=p.color;
    ctx.beginPath();
    ctx.arc(sx,sy,p.r*a,0,Math.PI*2);
    ctx.fill();
    ctx.shadowBlur=0;
  }
  ctx.globalAlpha=1;

  // Draw powerups
  for(let p of powerups) p.draw(cx,cy);

  // Draw asteroids
  for(let a of asteroids) a.draw(cx,cy);

  // Draw ships
  // Handle world wrapping for drawing
  function drawShipWrapped(ship){
    ship.drawShip(ship.x-cx+W/2, ship.y-cy+H/2);
  }
  for(let s of aiShips) if(!s.dead) drawShipWrapped(s);
  if(!player.dead) drawShipWrapped(player);

  // Draw bullets
  for(let b of bullets) b.draw(cx,cy);
}

function drawMinimap(){
  miniCtx.clearRect(0,0,150,150);
  miniCtx.fillStyle='rgba(0,10,20,0.85)';
  miniCtx.fillRect(0,0,150,150);

  let scale=150/WORLD;

  // Asteroids
  for(let a of asteroids){
    let mx=a.x*scale, my=a.y*scale;
    miniCtx.beginPath();
    miniCtx.arc(mx,my,Math.max(1,a.size*scale),0,Math.PI*2);
    miniCtx.fillStyle='rgba(180,120,60,0.6)';
    miniCtx.fill();
  }
  // AI ships
  for(let s of aiShips){
    if(s.dead) continue;
    miniCtx.beginPath();
    miniCtx.arc(s.x*scale,s.y*scale,3,0,Math.PI*2);
    miniCtx.fillStyle=s.colors.hull;
    miniCtx.fill();
  }
  // Powerups
  for(let p of powerups){
    miniCtx.beginPath();
    miniCtx.arc(p.x*scale,p.y*scale,2,0,Math.PI*2);
    miniCtx.fillStyle=p.colors[p.type]||'#fff';
    miniCtx.fill();
  }
  // Player
  miniCtx.beginPath();
  miniCtx.arc(player.x*scale,player.y*scale,4,0,Math.PI*2);
  miniCtx.fillStyle='#00ffcc';
  miniCtx.shadowBlur=6; miniCtx.shadowColor='#00ffcc';
  miniCtx.fill();
  miniCtx.shadowBlur=0;

  // Border
  miniCtx.strokeStyle='#004455';
  miniCtx.lineWidth=1;
  miniCtx.strokeRect(0,0,150,150);
}

function drawHUDOverlays(){
  // Wave message
  if(waveMessageTimer>0){
    let alpha=Math.min(1,waveMessageTimer/30)*Math.min(1,(waveMessageTimer)/30);
    if(waveMessageTimer<60) alpha=waveMessageTimer/60;
    ctx.globalAlpha=alpha;
    ctx.font='bold 40px Courier New';
    ctx.textAlign='center';
    ctx.fillStyle='#00ffcc';
    ctx.shadowBlur=20; ctx.shadowColor='#00ffcc';
    ctx.fillText(waveMessage, W/2, H/2-20);
    ctx.font='16px Courier New';
    ctx.fillStyle='#007799';
    ctx.shadowBlur=0;
    ctx.fillText('ASTEROIDS: '+(asteroids.length)+' | ENEMIES: '+aiShips.length, W/2, H/2+15);
    ctx.globalAlpha=1;
    ctx.textAlign='left';
  }

  // Crosshair / targeting reticle
  if(!player.dead){
    let cx=W/2+Math.cos(player.angle)*40, cy=H/2+Math.sin(player.angle)*40;
    ctx.strokeStyle='rgba(0,255,200,0.5)';
    ctx.lineWidth=1;
    ctx.beginPath();
    ctx.arc(cx,cy,6,0,Math.PI*2);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx-10,cy); ctx.lineTo(cx-7,cy);
    ctx.moveTo(cx+7,cy); ctx.lineTo(cx+10,cy);
    ctx.moveTo(cx,cy-10); ctx.lineTo(cx,cy-7);
    ctx.moveTo(cx,cy+7); ctx.lineTo(cx,cy+10);
    ctx.stroke();
  }

  // Speed lines (boost effect)
  if(player.isBoosting && !player.dead){
    let spd=Math.sqrt(player.vx*player.vx+player.vy*player.vy);
    if(spd>4){
      ctx.strokeStyle='rgba(0,150,255,0.15)';
      ctx.lineWidth=1;
      for(let i=0;i<20;i++){
        let sx=rand(0,W), sy=rand(0,H);
        let len=rand(20,80)*spd/10;
        let ang=Math.atan2(-player.vy,-player.vx);
        ctx.beginPath();
        ctx.moveTo(sx,sy);
        ctx.lineTo(sx+Math.cos(ang)*len, sy+Math.sin(ang)*len);
        ctx.stroke();
      }
    }
  }

  // Death screen overlay
  if(player.dead && gameState==='playing'){
    ctx.fillStyle='rgba(255,0,50,0.1)';
    ctx.fillRect(0,0,W,H);
  }
}

// ── Game Loop ──────────────────────────────────────────────────────────────
function gameLoop(){
  ctx.clearRect(0,0,W,H);
  drawBackground();
  if(gameState==='playing'||gameState==='gameover'){
    drawWorldObjects();
    drawHUDOverlays();
    drawMinimap();
    update();
  }
  requestAnimationFrame(gameLoop);
}

// ── Resize ─────────────────────────────────────────────────────────────────
window.addEventListener('resize',()=>{
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
});

// Init
initStars();
gameLoop();
</script>
