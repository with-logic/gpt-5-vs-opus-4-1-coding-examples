<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Micro Habit Tracker</title>
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a24;
    --surface2: #22222e;
    --border: #2e2e3e;
    --text: #e8e8f0;
    --text-muted: #7878a0;
    --accent: #7c6af7;
    --accent-glow: rgba(124,106,247,0.25);
    --green: #3dd68c;
    --green-glow: rgba(61,214,140,0.2);
    --orange: #f97316;
    --red: #ef4444;
    --yellow: #fbbf24;
    --radius: 14px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background animation */
  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 20% 20%, rgba(124,106,247,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(61,214,140,0.06) 0%, transparent 50%);
    animation: bgPulse 8s ease-in-out infinite alternate;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes bgPulse {
    0% { transform: scale(1); }
    100% { transform: scale(1.05); }
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 760px;
    margin: 0 auto;
    padding: 24px 16px 80px;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
    gap: 12px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), #a78bfa);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    box-shadow: 0 0 20px var(--accent-glow);
  }

  .logo-text {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .logo-sub {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .header-actions {
    display: flex;
    gap: 8px;
  }

  /* Buttons */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    border-radius: var(--radius-sm);
    border: none;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.15s ease;
    letter-spacing: 0.2px;
  }

  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: var(--accent);
    color: white;
    box-shadow: 0 4px 15px var(--accent-glow);
  }

  .btn-primary:hover {
    background: #8b7cf8;
    box-shadow: 0 6px 20px rgba(124,106,247,0.4);
  }

  .btn-ghost {
    background: var(--surface2);
    color: var(--text-muted);
    border: 1px solid var(--border);
  }

  .btn-ghost:hover { color: var(--text); background: var(--border); }

  .btn-danger {
    background: rgba(239,68,68,0.15);
    color: var(--red);
    border: 1px solid rgba(239,68,68,0.3);
  }

  .btn-danger:hover { background: rgba(239,68,68,0.25); }

  .btn-icon {
    width: 34px;
    height: 34px;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: var(--radius-sm);
    background: var(--surface2);
    color: var(--text-muted);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.15s;
    font-size: 15px;
  }

  .btn-icon:hover { color: var(--text); background: var(--border); }

  /* Date strip */
  .date-strip {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
    overflow-x: auto;
    padding-bottom: 4px;
    scrollbar-width: none;
  }

  .date-strip::-webkit-scrollbar { display: none; }

  .date-nav {
    flex-shrink: 0;
    width: 32px;
    height: 32px;
    border-radius: var(--radius-sm);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    transition: all 0.15s;
  }

  .date-nav:hover { color: var(--text); background: var(--border); }

  .dates-scroll {
    display: flex;
    gap: 6px;
    flex: 1;
    overflow-x: auto;
    scrollbar-width: none;
  }

  .dates-scroll::-webkit-scrollbar { display: none; }

  .date-chip {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 8px 10px;
    border-radius: var(--radius-sm);
    background: var(--surface);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.15s;
    min-width: 52px;
  }

  .date-chip:hover { border-color: var(--accent); background: var(--surface2); }

  .date-chip.active {
    background: var(--accent);
    border-color: var(--accent);
    box-shadow: 0 4px 15px var(--accent-glow);
  }

  .date-chip .day-name {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: inherit;
    opacity: 0.7;
  }

  .date-chip .day-num {
    font-size: 16px;
    font-weight: 700;
    line-height: 1;
  }

  .date-chip .day-dots {
    display: flex;
    gap: 2px;
    min-height: 5px;
  }

  .day-dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: rgba(255,255,255,0.4);
  }

  .day-dot.done { background: var(--green); }

  .date-chip.active .day-dot { background: rgba(255,255,255,0.4); }
  .date-chip.active .day-dot.done { background: white; }

  /* Stats bar */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    text-align: center;
  }

  .stat-value {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1;
    background: linear-gradient(135deg, var(--accent), #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .stat-value.green {
    background: linear-gradient(135deg, var(--green), #34d399);
    -webkit-background-clip: text;
    background-clip: text;
  }

  .stat-value.orange {
    background: linear-gradient(135deg, var(--orange), #fbbf24);
    -webkit-background-clip: text;
    background-clip: text;
  }

  .stat-label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    font-weight: 600;
    margin-top: 4px;
  }

  /* Habits section */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .section-title {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
  }

  /* Habit cards */
  .habits-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 24px;
  }

  .habit-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }

  .habit-card::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    border-radius: 3px 0 0 3px;
    background: var(--habit-color, var(--accent));
    opacity: 0.7;
  }

  .habit-card.completed {
    border-color: rgba(61,214,140,0.25);
    background: rgba(61,214,140,0.06);
  }

  .habit-card.completed::before {
    background: var(--green);
    opacity: 1;
  }

  .habit-card.skipped {
    opacity: 0.5;
  }

  .check-btn {
    width: 38px;
    height: 38px;
    flex-shrink: 0;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--surface2);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: all 0.2s;
    color: transparent;
  }

  .check-btn:hover {
    border-color: var(--green);
    background: rgba(61,214,140,0.1);
    color: var(--green);
  }

  .habit-card.completed .check-btn {
    background: var(--green);
    border-color: var(--green);
    color: white;
    box-shadow: 0 0 16px var(--green-glow);
  }

  .habit-card.completed .check-btn:hover {
    background: #2dc878;
  }

  .habit-card.skipped .check-btn {
    border-color: var(--text-muted);
    color: var(--text-muted);
    background: transparent;
  }

  .habit-info {
    flex: 1;
    min-width: 0;
  }

  .habit-name {
    font-size: 15px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .habit-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 3px;
  }

  .streak-badge {
    display: flex;
    align-items: center;
    gap: 3px;
    font-size: 12px;
    font-weight: 700;
    color: var(--orange);
  }

  .habit-desc {
    font-size: 12px;
    color: var(--text-muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* Mini chart */
  .mini-chart {
    display: flex;
    align-items: flex-end;
    gap: 3px;
    height: 28px;
    flex-shrink: 0;
  }

  .mini-bar {
    width: 6px;
    min-height: 3px;
    border-radius: 3px;
    background: var(--border);
    transition: all 0.3s ease;
  }

  .mini-bar.done {
    background: var(--green);
  }

  .mini-bar.skipped {
    background: var(--text-muted);
  }

  .habit-actions {
    display: flex;
    flex-direction: column;
    gap: 4px;
    opacity: 0;
    transition: opacity 0.15s;
    flex-shrink: 0;
  }

  .habit-card:hover .habit-actions { opacity: 1; }

  .habit-action-btn {
    width: 26px;
    height: 26px;
    border-radius: 6px;
    border: none;
    background: var(--surface2);
    color: var(--text-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    transition: all 0.15s;
  }

  .habit-action-btn:hover { color: var(--text); background: var(--border); }

  .habit-action-btn.skip:hover { color: var(--yellow); }
  .habit-action-btn.edit:hover { color: var(--accent); }
  .habit-action-btn.del:hover { color: var(--red); }

  .habit-card.skipped .habit-action-btn.skip {
    color: var(--yellow);
    background: rgba(251,191,36,0.1);
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--text-muted);
  }

  .empty-icon {
    font-size: 48px;
    margin-bottom: 12px;
    opacity: 0.5;
  }

  .empty-title {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 6px;
  }

  .empty-desc { font-size: 13px; line-height: 1.5; }

  /* Weekly chart */
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 24px;
  }

  .chart-title {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    margin-bottom: 14px;
  }

  .week-chart {
    display: flex;
    gap: 6px;
    align-items: flex-end;
    height: 80px;
  }

  .week-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    height: 100%;
    justify-content: flex-end;
  }

  .week-bar-wrap {
    flex: 1;
    width: 100%;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }

  .week-bar {
    width: 80%;
    min-height: 4px;
    border-radius: 4px 4px 0 0;
    background: linear-gradient(180deg, var(--accent) 0%, rgba(124,106,247,0.5) 100%);
    transition: height 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    cursor: pointer;
  }

  .week-bar:hover::after {
    content: attr(data-tip);
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 8px;
    font-size: 11px;
    white-space: nowrap;
    color: var(--text);
    z-index: 10;
    pointer-events: none;
  }

  .week-bar.today {
    background: linear-gradient(180deg, var(--green) 0%, rgba(61,214,140,0.5) 100%);
    box-shadow: 0 0 12px var(--green-glow);
  }

  .week-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  .week-label.today { color: var(--green); }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    width: 100%;
    max-width: 420px;
    transform: translateY(12px) scale(0.97);
    transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 24px 80px rgba(0,0,0,0.6);
  }

  .modal-overlay.open .modal {
    transform: translateY(0) scale(1);
  }

  .modal-title {
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 20px;
  }

  .form-group {
    margin-bottom: 14px;
  }

  .form-label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 6px;
  }

  .form-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
    font-family: inherit;
  }

  .form-input:focus { border-color: var(--accent); }
  .form-input::placeholder { color: var(--text-muted); }

  .color-picker {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .color-swatch {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    cursor: pointer;
    transition: transform 0.15s;
    border: 2px solid transparent;
  }

  .color-swatch:hover { transform: scale(1.15); }
  .color-swatch.selected { border-color: white; transform: scale(1.1); }

  .emoji-picker {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .emoji-btn {
    width: 36px;
    height: 36px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--surface2);
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .emoji-btn:hover { border-color: var(--accent); background: var(--surface); }
  .emoji-btn.selected { border-color: var(--accent); background: var(--accent-glow); }

  .modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 20px;
  }

  /* Toast */
  .toast-container {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 200;
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: center;
    pointer-events: none;
  }

  .toast {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 30px;
    padding: 10px 18px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    animation: toastIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), toastOut 0.3s ease 2.5s forwards;
    white-space: nowrap;
  }

  @keyframes toastIn {
    from { opacity: 0; transform: translateY(10px) scale(0.9); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  @keyframes toastOut {
    from { opacity: 1; transform: scale(1); }
    to { opacity: 0; transform: scale(0.9); }
  }

  /* Motivational message */
  .motivational {
    background: linear-gradient(135deg, rgba(124,106,247,0.15), rgba(61,214,140,0.1));
    border: 1px solid rgba(124,106,247,0.25);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .motivational-icon { font-size: 22px; flex-shrink: 0; }

  .motivational-text {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.4;
  }

  .motivational-text strong {
    color: var(--accent);
    font-weight: 700;
  }

  /* Progress ring */
  .progress-ring-wrap {
    position: relative;
    width: 52px;
    height: 52px;
    flex-shrink: 0;
  }

  .progress-ring {
    transform: rotate(-90deg);
  }

  .progress-ring-bg { fill: none; stroke: var(--border); stroke-width: 4; }
  .progress-ring-fill {
    fill: none;
    stroke: var(--green);
    stroke-width: 4;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    filter: drop-shadow(0 0 6px var(--green));
  }

  .progress-text {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 800;
    color: var(--green);
  }

  /* Import/export menu */
  .io-menu {
    position: relative;
  }

  .io-dropdown {
    position: absolute;
    top: calc(100% + 6px);
    right: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    overflow: hidden;
    min-width: 160px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    z-index: 50;
    display: none;
  }

  .io-dropdown.open { display: block; }

  .io-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.1s;
    color: var(--text);
    border: none;
    background: none;
    width: 100%;
    text-align: left;
  }

  .io-item:hover { background: var(--border); }

  /* Completion celebration */
  @keyframes celebrate {
    0% { transform: scale(1); }
    30% { transform: scale(1.08); }
    60% { transform: scale(0.96); }
    100% { transform: scale(1); }
  }

  .habit-card.just-completed {
    animation: celebrate 0.4s ease;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* Mobile tweaks */
  @media (max-width: 480px) {
    .stats-bar { grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .stat-card { padding: 10px 8px; }
    .stat-value { font-size: 20px; }
    .habit-actions { opacity: 1; }
    header { flex-wrap: wrap; }
    .date-chip { min-width: 44px; padding: 7px 6px; }
  }

  /* File input hidden */
  #import-file { display: none; }
</style>
</head>
<body>
<div class="app" id="app">
  <header>
    <div class="logo">
      <div class="logo-icon">✦</div>
      <div>
        <div class="logo-text">Micro Habits</div>
        <div class="logo-sub">Daily Tracker</div>
      </div>
    </div>
    <div class="header-actions">
      <div class="io-menu" id="io-menu">
        <button class="btn-icon" onclick="toggleIOMenu()" title="Import / Export">⋮</button>
        <div class="io-dropdown" id="io-dropdown">
          <button class="io-item" onclick="exportData()">📤 Export JSON</button>
          <button class="io-item" onclick="document.getElementById('import-file').click()">📥 Import JSON</button>
          <button class="io-item" onclick="resetToDefault(); closeIOMenu()">🔄 Reset demo data</button>
        </div>
      </div>
      <button class="btn btn-primary" onclick="openAddModal()">+ Add Habit</button>
    </div>
  </header>

  <!-- Date strip -->
  <div class="date-strip">
    <button class="date-nav" onclick="shiftWeek(-1)">‹</button>
    <div class="dates-scroll" id="dates-scroll"></div>
    <button class="date-nav" onclick="shiftWeek(1)">›</button>
  </div>

  <!-- Stats -->
  <div class="stats-bar" id="stats-bar"></div>

  <!-- Motivational -->
  <div class="motivational" id="motivational"></div>

  <!-- Habits -->
  <div class="section-header">
    <span class="section-title" id="habits-date-label">Today's Habits</span>
    <div style="display:flex;align-items:center;gap:8px;">
      <div class="progress-ring-wrap" id="progress-ring-wrap">
        <svg class="progress-ring" width="52" height="52" viewBox="0 0 52 52">
          <circle class="progress-ring-bg" cx="26" cy="26" r="22"/>
          <circle class="progress-ring-fill" id="progress-ring-fill" cx="26" cy="26" r="22"
            stroke-dasharray="138.2" stroke-dashoffset="138.2"/>
        </svg>
        <div class="progress-text" id="progress-text">0%</div>
      </div>
    </div>
  </div>

  <div class="habits-list" id="habits-list"></div>

  <!-- Weekly chart -->
  <div class="chart-card" id="chart-card">
    <div class="chart-title">7-Day Completion</div>
    <div class="week-chart" id="week-chart"></div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-title" id="modal-title">Add Habit</div>

    <div class="form-group">
      <label class="form-label">Name</label>
      <input class="form-input" id="habit-name-input" type="text" placeholder="e.g. Morning run" maxlength="40">
    </div>

    <div class="form-group">
      <label class="form-label">Description (optional)</label>
      <input class="form-input" id="habit-desc-input" type="text" placeholder="e.g. At least 20 minutes" maxlength="60">
    </div>

    <div class="form-group">
      <label class="form-label">Icon</label>
      <div class="emoji-picker" id="emoji-picker"></div>
    </div>

    <div class="form-group">
      <label class="form-label">Color</label>
      <div class="color-picker" id="color-picker"></div>
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveHabit()" id="save-btn">Save Habit</button>
    </div>
  </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toast-container"></div>

<!-- Import file -->
<input type="file" id="import-file" accept=".json" onchange="importData(event)">

<script>
// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════

const COLORS = [
  '#7c6af7','#a78bfa','#3dd68c','#34d399','#f97316',
  '#fbbf24','#ef4444','#ec4899','#06b6d4','#60a5fa'
];

const EMOJIS = ['🏃','💪','📖','🧘','💧','🥗','😴','✍️','🎯','🎨','🎵','🧠','💊','🌅','🚶','🏋️','🫁','🧹','💻','🌿'];

const MOTIVATIONS = [
  { icon: '🔥', msg: (streak) => streak > 0 ? `You're on a <strong>${streak}-day streak</strong>! Keep the fire burning.` : "Every journey starts with a single step. Let's go!" },
  { icon: '⚡', msg: () => "Small habits, massive results. You've got this." },
  { icon: '🌱', msg: () => "Consistency compounds. Every rep counts." },
  { icon: '🎯', msg: (_, done, total) => total > 0 ? `<strong>${done}/${total}</strong> habits done today. Momentum is building.` : "Set your intentions and make today count." },
  { icon: '🏆', msg: () => "Champions aren't born — they're built one day at a time." },
];

let state = {
  habits: [],
  logs: {}, // { 'YYYY-MM-DD': { habitId: 'done'|'skip'|null } }
  currentDate: todayStr(),
  weekOffset: 0,
  editingId: null,
  modalOpen: false,
  selectedEmoji: '🎯',
  selectedColor: COLORS[0],
};

// ═══════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════

function todayStr() {
  return new Date().toISOString().slice(0, 10);
}

function dateStr(d) {
  return d.toISOString().slice(0, 10);
}

function addDays(dateString, n) {
  const d = new Date(dateString + 'T12:00:00');
  d.setDate(d.getDate() + n);
  return dateStr(d);
}

function uid() {
  return Math.random().toString(36).slice(2, 10);
}

function getLog(date) {
  return state.logs[date] || {};
}

function setLog(date, habitId, value) {
  if (!state.logs[date]) state.logs[date] = {};
  state.logs[date][habitId] = value;
  save();
}

function getStreak(habitId) {
  let count = 0;
  let d = todayStr();
  // If today not done yet, start from yesterday for streak calc
  const todayLog = getLog(todayStr())[habitId];
  if (todayLog !== 'done') d = addDays(todayStr(), -1);
  else count = 1;

  for (let i = (todayLog === 'done' ? 1 : 0); i < 365; i++) {
    const check = addDays(todayStr(), -(todayLog === 'done' ? i+1 : i+1));
    const v = getLog(check)[habitId];
    if (v === 'done') count++;
    else if (v === 'skip') continue;
    else break;
  }
  return count;
}

function getMaxStreak() {
  if (state.habits.length === 0) return 0;
  return Math.max(...state.habits.map(h => getStreak(h.id)));
}

function getTodayCompletion() {
  const d = state.currentDate;
  const log = getLog(d);
  const done = state.habits.filter(h => log[h.id] === 'done').length;
  return { done, total: state.habits.length };
}

// ═══════════════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════════════

function save() {
  localStorage.setItem('microhabits', JSON.stringify({ habits: state.habits, logs: state.logs }));
}

function load() {
  try {
    const raw = localStorage.getItem('microhabits');
    if (raw) {
      const data = JSON.parse(raw);
      state.habits = data.habits || [];
      state.logs = data.logs || {};
      return true;
    }
  } catch(e) {}
  return false;
}

// ═══════════════════════════════════════════════
// DEFAULT DATA
// ═══════════════════════════════════════════════

function generateDemoData() {
  const today = new Date();
  const habits = [
    { id: uid(), name: 'Morning Run', desc: '20 min outside', emoji: '🏃', color: '#3dd68c' },
    { id: uid(), name: 'Read', desc: '30 pages before bed', emoji: '📖', color: '#7c6af7' },
    { id: uid(), name: 'Drink Water', desc: '8 glasses daily', emoji: '💧', color: '#06b6d4' },
    { id: uid(), name: 'Meditate', desc: '10 minutes mindfulness', emoji: '🧘', color: '#a78bfa' },
    { id: uid(), name: 'No Sugar', desc: 'Skip sweets & soda', emoji: '🥗', color: '#f97316' },
  ];

  const logs = {};
  // Fill last 14 days with realistic-ish data
  for (let i = 13; i >= 1; i--) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const key = dateStr(d);
    logs[key] = {};
    habits.forEach(h => {
      const r = Math.random();
      if (r < 0.72) logs[key][h.id] = 'done';
      else if (r < 0.82) logs[key][h.id] = 'skip';
      // else null (missed)
    });
  }
  // Force nice streaks for first 2 habits
  for (let i = 5; i >= 1; i--) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const key = dateStr(d);
    if (!logs[key]) logs[key] = {};
    logs[key][habits[0].id] = 'done';
    logs[key][habits[1].id] = 'done';
  }

  state.habits = habits;
  state.logs = logs;
  save();
}

function resetToDefault() {
  localStorage.removeItem('microhabits');
  state.habits = [];
  state.logs = {};
  generateDemoData();
  render();
  showToast('🔄 Demo data restored');
}

// ═══════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════

function render() {
  renderDates();
  renderStats();
  renderMotivational();
  renderHabits();
  renderChart();
}

function renderDates() {
  const scroll = document.getElementById('dates-scroll');
  const today = todayStr();
  const days = [];
  for (let i = -3 + state.weekOffset * 7; i <= 10 + state.weekOffset * 7; i++) {
    days.push(addDays(today, i));
  }

  const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  scroll.innerHTML = days.map(d => {
    const date = new Date(d + 'T12:00:00');
    const dn = dayNames[date.getDay()];
    const num = date.getDate();
    const isActive = d === state.currentDate;
    const log = getLog(d);
    const dots = state.habits.slice(0, 5).map(h =>
      `<div class="day-dot ${log[h.id] === 'done' ? 'done' : ''}"></div>`
    ).join('');

    return `<div class="date-chip ${isActive ? 'active' : ''}" onclick="selectDate('${d}')">
      <span class="day-name">${dn}</span>
      <span class="day-num">${num}</span>
      <div class="day-dots">${dots}</div>
    </div>`;
  }).join('');

  // Scroll active into view
  setTimeout(() => {
    const active = scroll.querySelector('.active');
    if (active) active.scrollIntoView({ block: 'nearest', inline: 'center', behavior: 'smooth' });
  }, 50);
}

function renderStats() {
  const bar = document.getElementById('stats-bar');
  const { done, total } = getTodayCompletion();
  const maxStreak = getMaxStreak();
  const pct = total > 0 ? Math.round(done / total * 100) : 0;

  // Total completions ever
  let totalEver = 0;
  Object.values(state.logs).forEach(day => {
    Object.values(day).forEach(v => { if (v === 'done') totalEver++; });
  });

  bar.innerHTML = `
    <div class="stat-card">
      <div class="stat-value">${pct}%</div>
      <div class="stat-label">Today</div>
    </div>
    <div class="stat-card">
      <div class="stat-value orange">${maxStreak}</div>
      <div class="stat-label">🔥 Best Streak</div>
    </div>
    <div class="stat-card">
      <div class="stat-value green">${totalEver}</div>
      <div class="stat-label">Total Done</div>
    </div>
  `;
}

function renderMotivational() {
  const el = document.getElementById('motivational');
  const { done, total } = getTodayCompletion();
  const maxStreak = getMaxStreak();

  let m;
  if (done === total && total > 0) {
    m = { icon: '🎉', msg: () => `<strong>Perfect day!</strong> All ${total} habits completed. You're unstoppable!` };
  } else {
    const idx = (new Date().getDay() + Math.floor(done)) % MOTIVATIONS.length;
    m = MOTIVATIONS[idx];
  }

  el.innerHTML = `
    <span class="motivational-icon">${m.icon}</span>
    <span class="motivational-text">${m.msg(maxStreak, done, total)}</span>
  `;
}

function renderHabits() {
  const list = document.getElementById('habits-list');
  const dateLabel = document.getElementById('habits-date-label');
  const today = todayStr();

  const d = new Date(state.currentDate + 'T12:00:00');
  const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  if (state.currentDate === today) {
    dateLabel.textContent = "Today's Habits";
  } else {
    dateLabel.textContent = `${dayNames[d.getDay()]}, ${monthNames[d.getMonth()]} ${d.getDate()}`;
  }

  if (state.habits.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">✦</div>
        <div class="empty-title">No habits yet</div>
        <div class="empty-desc">Add up to 7 daily habits to track your progress and build powerful streaks.</div>
      </div>`;
    updateProgressRing(0, 0);
    return;
  }

  const log = getLog(state.currentDate);

  list.innerHTML = state.habits.map(h => {
    const status = log[h.id] || null;
    const isDone = status === 'done';
    const isSkip = status === 'skip';
    const streak = getStreak(h.id);

    // Mini chart: last 7 days
    const bars = [];
    for (let i = 6; i >= 0; i--) {
      const dd = addDays(today, -i);
      const v = getLog(dd)[h.id];
      bars.push(`<div class="mini-bar ${v === 'done' ? 'done' : v === 'skip' ? 'skipped' : ''}" style="height:${v === 'done' ? '100%' : v === 'skip' ? '50%' : '20%'}"></div>`);
    }

    return `<div class="habit-card ${isDone ? 'completed' : ''} ${isSkip ? 'skipped' : ''}"
      id="hcard-${h.id}" style="--habit-color:${h.color}">
      <button class="check-btn" onclick="toggleHabit('${h.id}')" title="${isDone ? 'Uncheck' : 'Mark done'}">
        ${isDone ? '✓' : isSkip ? '—' : ''}
      </button>
      <div class="habit-info">
        <div class="habit-name">${h.emoji} ${h.name}</div>
        <div class="habit-meta">
          ${streak > 0 ? `<span class="streak-badge">🔥 ${streak} day${streak !== 1 ? 's' : ''}</span>` : ''}
          ${h.desc ? `<span class="habit-desc">${h.desc}</span>` : ''}
        </div>
      </div>
      <div class="mini-chart">${bars.join('')}</div>
      <div class="habit-actions">
        <button class="habit-action-btn skip ${isSkip ? 'active' : ''}" onclick="toggleSkip('${h.id}')" title="Skip day">↷</button>
        <button class="habit-action-btn edit" onclick="openEditModal('${h.id}')" title="Edit">✎</button>
        <button class="habit-action-btn del" onclick="deleteHabit('${h.id}')" title="Delete">✕</button>
      </div>
    </div>`;
  }).join('');

  const { done, total } = getTodayCompletion();
  updateProgressRing(done, total);
}

function updateProgressRing(done, total) {
  const fill = document.getElementById('progress-ring-fill');
  const text = document.getElementById('progress-text');
  const circumference = 138.2;
  const pct = total > 0 ? done / total : 0;
  fill.style.strokeDashoffset = circumference * (1 - pct);
  text.textContent = Math.round(pct * 100) + '%';
}

function renderChart() {
  const chart = document.getElementById('week-chart');
  const today = todayStr();
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  chart.innerHTML = Array.from({ length: 7 }, (_, i) => {
    const d = addDays(today, i - 6);
    const date = new Date(d + 'T12:00:00');
    const dayName = days[date.getDay()];
    const isToday = d === today;
    const log = getLog(d);
    const total = state.habits.length;
    const done = state.habits.filter(h => log[h.id] === 'done').length;
    const pct = total > 0 ? done / total : 0;
    const barH = Math.max(4, Math.round(pct * 100));

    return `<div class="week-col">
      <div class="week-bar-wrap" style="height:60px">
        <div class="week-bar ${isToday ? 'today' : ''}"
          style="height:${barH}%; width:100%; max-width:40px"
          data-tip="${done}/${total}"></div>
      </div>
      <div class="week-label ${isToday ? 'today' : ''}">${dayName}</div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════

function selectDate(d) {
  state.currentDate = d;
  render();
}

function shiftWeek(dir) {
  state.weekOffset += dir;
  renderDates();
}

function toggleHabit(id) {
  const log = getLog(state.currentDate);
  const cur = log[id];
  if (cur === 'done') {
    setLog(state.currentDate, id, null);
  } else {
    setLog(state.currentDate, id, 'done');
    // Celebrate
    const card = document.getElementById('hcard-' + id);
    if (card) {
      card.classList.add('just-completed');
      setTimeout(() => card.classList.remove('just-completed'), 500);
    }
  }
  render();
}

function toggleSkip(id) {
  const log = getLog(state.currentDate);
  const cur = log[id];
  if (cur === 'skip') {
    setLog(state.currentDate, id, null);
    showToast('↩ Unskipped');
  } else {
    setLog(state.currentDate, id, 'skip');
    showToast('↷ Day skipped for this habit');
  }
  render();
}

function deleteHabit(id) {
  if (!confirm('Delete this habit? All data will be lost.')) return;
  state.habits = state.habits.filter(h => h.id !== id);
  Object.keys(state.logs).forEach(d => {
    delete state.logs[d][id];
  });
  save();
  render();
  showToast('🗑 Habit deleted');
}

// ═══════════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════════

function openAddModal() {
  if (state.habits.length >= 7) {
    showToast('⚠️ Max 7 habits reached');
    return;
  }
  state.editingId = null;
  state.selectedEmoji = EMOJIS[0];
  state.selectedColor = COLORS[0];
  document.getElementById('modal-title').textContent = 'Add Habit';
  document.getElementById('save-btn').textContent = 'Add Habit';
  document.getElementById('habit-name-input').value = '';
  document.getElementById('habit-desc-input').value = '';
  renderModalPickers();
  openModal();
}

function openEditModal(id) {
  const h = state.habits.find(h => h.id === id);
  if (!h) return;
  state.editingId = id;
  state.selectedEmoji = h.emoji;
  state.selectedColor = h.color;
  document.getElementById('modal-title').textContent = 'Edit Habit';
  document.getElementById('save-btn').textContent = 'Save Changes';
  document.getElementById('habit-name-input').value = h.name;
  document.getElementById('habit-desc-input').value = h.desc || '';
  renderModalPickers();
  openModal();
}

function renderModalPickers() {
  const ep = document.getElementById('emoji-picker');
  ep.innerHTML = EMOJIS.map(e =>
    `<button class="emoji-btn ${e === state.selectedEmoji ? 'selected' : ''}" onclick="selectEmoji('${e}')">${e}</button>`
  ).join('');

  const cp = document.getElementById('color-picker');
  cp.innerHTML = COLORS.map(c =>
    `<div class="color-swatch ${c === state.selectedColor ? 'selected' : ''}" style="background:${c}" onclick="selectColor('${c}')"></div>`
  ).join('');
}

function selectEmoji(e) {
  state.selectedEmoji = e;
  renderModalPickers();
}

function selectColor(c) {
  state.selectedColor = c;
  renderModalPickers();
}

function saveHabit() {
  const name = document.getElementById('habit-name-input').value.trim();
  if (!name) {
    document.getElementById('habit-name-input').focus();
    document.getElementById('habit-name-input').style.borderColor = 'var(--red)';
    setTimeout(() => document.getElementById('habit-name-input').style.borderColor = '', 1500);
    return;
  }

  const desc = document.getElementById('habit-desc-input').value.trim();

  if (state.editingId) {
    const idx = state.habits.findIndex(h => h.id === state.editingId);
    if (idx >= 0) {
      state.habits[idx] = { ...state.habits[idx], name, desc, emoji: state.selectedEmoji, color: state.selectedColor };
    }
    showToast('✅ Habit updated');
  } else {
    state.habits.push({ id: uid(), name, desc, emoji: state.selectedEmoji, color: state.selectedColor });
    showToast('✅ Habit added');
  }

  save();
  closeModal();
  render();
}

function openModal() {
  document.getElementById('modal-overlay').classList.add('open');
  state.modalOpen = true;
  setTimeout(() => document.getElementById('habit-name-input').focus(), 150);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  state.modalOpen = false;
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

// ═══════════════════════════════════════════════
// IMPORT / EXPORT
// ═══════════════════════════════════════════════

function toggleIOMenu() {
  document.getElementById('io-dropdown').classList.toggle('open');
}

function closeIOMenu() {
  document.getElementById('io-dropdown').classList.remove('open');
}

function exportData() {
  closeIOMenu();
  const data = JSON.stringify({ habits: state.habits, logs: state.logs }, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `microhabits-${todayStr()}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('📤 Exported!');
}

function importData(e) {
  closeIOMenu();
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!data.habits || !Array.isArray(data.habits)) throw new Error('Invalid format');
      state.habits = data.habits;
      state.logs = data.logs || {};
      save();
      render();
      showToast('📥 Imported successfully!');
    } catch(err) {
      showToast('❌ Invalid JSON file');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ═══════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════

function showToast(msg) {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

// ═══════════════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════════════

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeModal();
    closeIOMenu();
  }
  if (e.key === 'Enter' && state.modalOpen) {
    if (document.activeElement !== document.getElementById('save-btn')) saveHabit();
  }
});

// Close dropdown on outside click
document.addEventListener('click', e => {
  const menu = document.getElementById('io-menu');
  if (!menu.contains(e.target)) closeIOMenu();
});

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════

(function init() {
  const loaded = load();
  if (!loaded || state.habits.length === 0) {
    generateDemoData();
  }
  render();
})();
</script>
</body>
</html>
