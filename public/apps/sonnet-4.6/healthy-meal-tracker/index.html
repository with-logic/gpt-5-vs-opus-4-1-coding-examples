<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Healthy Meal Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #22c55e;
      --green-dark: #16a34a;
      --green-light: #dcfce7;
      --orange: #f97316;
      --orange-light: #fff7ed;
      --blue: #3b82f6;
      --blue-light: #eff6ff;
      --red: #ef4444;
      --red-light: #fef2f2;
      --purple: #a855f7;
      --purple-light: #faf5ff;
      --gray-50: #f9fafb;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-300: #d1d5db;
      --gray-400: #9ca3af;
      --gray-500: #6b7280;
      --gray-600: #4b5563;
      --gray-700: #374151;
      --gray-800: #1f2937;
      --gray-900: #111827;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.10);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
      --radius: 12px;
      --radius-lg: 16px;
      --radius-xl: 24px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--gray-50);
      color: var(--gray-800);
      min-height: 100vh;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #16a34a 0%, #22c55e 50%, #4ade80 100%);
      padding: 0;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 16px rgba(22,163,74,0.3);
    }
    .header-inner {
      max-width: 900px;
      margin: 0 auto;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-icon {
      font-size: 28px;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));
    }
    .header-title {
      font-size: 20px;
      font-weight: 800;
      color: white;
      letter-spacing: -0.3px;
    }
    .header-subtitle {
      font-size: 12px;
      color: rgba(255,255,255,0.8);
      margin-top: 1px;
    }
    .date-badge {
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      font-size: 13px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.2s;
    }
    .date-badge:hover { background: rgba(255,255,255,0.3); }

    /* Main layout */
    .main {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 24px 80px;
    }

    /* Date navigation */
    .date-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 24px;
      background: white;
      border-radius: var(--radius-lg);
      padding: 12px 20px;
      box-shadow: var(--shadow);
    }
    .date-nav-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 2px solid var(--gray-200);
      background: white;
      cursor: pointer;
      font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
      color: var(--gray-600);
    }
    .date-nav-btn:hover {
      border-color: var(--green);
      color: var(--green);
      background: var(--green-light);
    }
    .date-nav-label {
      font-size: 16px;
      font-weight: 700;
      color: var(--gray-800);
      min-width: 160px;
      text-align: center;
    }
    .today-btn {
      font-size: 12px;
      font-weight: 600;
      color: var(--green-dark);
      background: var(--green-light);
      border: none;
      padding: 4px 10px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .today-btn:hover { background: var(--green); color: white; }

    /* Daily summary */
    .summary-card {
      background: white;
      border-radius: var(--radius-xl);
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: var(--shadow);
      border: 1px solid var(--gray-100);
    }
    .summary-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--gray-500);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .macro-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 20px;
    }
    .macro-item {
      text-align: center;
      padding: 16px 12px;
      border-radius: var(--radius);
      border: 2px solid transparent;
      transition: all 0.2s;
    }
    .macro-item:hover { transform: translateY(-2px); }
    .macro-cal { background: linear-gradient(135deg, #fff7ed, #fed7aa); border-color: #fed7aa; }
    .macro-protein { background: linear-gradient(135deg, #eff6ff, #bfdbfe); border-color: #bfdbfe; }
    .macro-carbs { background: linear-gradient(135deg, #faf5ff, #e9d5ff); border-color: #e9d5ff; }
    .macro-fat { background: linear-gradient(135deg, #fef9c3, #fde68a); border-color: #fde68a; }
    .macro-icon { font-size: 22px; margin-bottom: 6px; }
    .macro-value {
      font-size: 22px;
      font-weight: 800;
      color: var(--gray-800);
      line-height: 1;
      margin-bottom: 4px;
    }
    .macro-unit { font-size: 12px; color: var(--gray-500); font-weight: 500; }
    .macro-label { font-size: 11px; color: var(--gray-400); font-weight: 600; text-transform: uppercase; margin-top: 2px; }

    /* Progress bar */
    .progress-section { margin-top: 4px; }
    .progress-label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    .progress-label { font-size: 13px; font-weight: 600; color: var(--gray-700); }
    .progress-pct { font-size: 13px; font-weight: 700; color: var(--green-dark); }
    .progress-bar-track {
      height: 10px;
      background: var(--gray-100);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--green), #4ade80);
      border-radius: 99px;
      transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
    }
    .progress-bar-fill.over { background: linear-gradient(90deg, var(--red), #f87171); }
    .calorie-goal-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
    }
    .calorie-goal-label { font-size: 12px; color: var(--gray-400); }
    .calorie-remaining {
      font-size: 13px;
      font-weight: 700;
      padding: 2px 10px;
      border-radius: 20px;
    }
    .calorie-remaining.ok { background: var(--green-light); color: var(--green-dark); }
    .calorie-remaining.over { background: var(--red-light); color: var(--red); }

    /* Goal settings */
    .goal-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--gray-100);
    }
    .goal-label { font-size: 13px; color: var(--gray-500); font-weight: 600; }
    .goal-input {
      width: 80px;
      padding: 4px 8px;
      border: 2px solid var(--gray-200);
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      color: var(--gray-800);
      text-align: center;
      transition: border-color 0.2s;
    }
    .goal-input:focus { outline: none; border-color: var(--green); }

    /* Meal sections */
    .meals-container { display: flex; flex-direction: column; gap: 20px; }

    .meal-section {
      background: white;
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      border: 1px solid var(--gray-100);
      overflow: hidden;
      transition: box-shadow 0.2s;
    }
    .meal-section:hover { box-shadow: var(--shadow-md); }

    .meal-header {
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
      transition: background 0.2s;
    }
    .meal-header:hover { background: var(--gray-50); }
    .meal-header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .meal-emoji {
      font-size: 26px;
      width: 44px; height: 44px;
      background: var(--gray-50);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: var(--shadow-sm);
    }
    .meal-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--gray-800);
    }
    .meal-cal-badge {
      font-size: 12px;
      font-weight: 700;
      color: var(--gray-500);
      background: var(--gray-100);
      padding: 2px 8px;
      border-radius: 20px;
      margin-top: 2px;
      display: inline-block;
    }
    .meal-header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .add-food-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      background: var(--green-light);
      color: var(--green-dark);
      border: 2px solid transparent;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    .add-food-btn:hover {
      background: var(--green);
      color: white;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(34,197,94,0.3);
    }
    .collapse-icon {
      color: var(--gray-400);
      font-size: 18px;
      transition: transform 0.2s;
    }
    .collapse-icon.open { transform: rotate(180deg); }

    /* Food list */
    .food-list {
      border-top: 1px solid var(--gray-100);
    }
    .food-list.hidden { display: none; }

    .food-item {
      display: flex;
      align-items: center;
      padding: 12px 20px;
      border-bottom: 1px solid var(--gray-50);
      gap: 12px;
      transition: background 0.15s;
      animation: slideIn 0.2s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .food-item:hover { background: var(--gray-50); }
    .food-item:last-child { border-bottom: none; }
    .food-item-emoji {
      font-size: 20px;
      width: 36px; height: 36px;
      background: white;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid var(--gray-100);
      flex-shrink: 0;
    }
    .food-item-info { flex: 1; min-width: 0; }
    .food-item-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--gray-800);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .food-item-macros {
      display: flex;
      gap: 8px;
      margin-top: 3px;
      flex-wrap: wrap;
    }
    .macro-tag {
      font-size: 11px;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 6px;
    }
    .macro-tag-cal { background: #fff7ed; color: #c2410c; }
    .macro-tag-p { background: #eff6ff; color: #1d4ed8; }
    .macro-tag-c { background: #faf5ff; color: #7e22ce; }
    .macro-tag-f { background: #fef9c3; color: #854d0e; }
    .food-item-qty {
      font-size: 13px;
      color: var(--gray-400);
      font-weight: 500;
      white-space: nowrap;
    }
    .food-item-calories {
      font-size: 15px;
      font-weight: 800;
      color: var(--orange);
      min-width: 60px;
      text-align: right;
      white-space: nowrap;
    }
    .delete-btn {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: none;
      background: none;
      color: var(--gray-300);
      cursor: pointer;
      font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .delete-btn:hover { background: var(--red-light); color: var(--red); }

    /* Empty state */
    .meal-empty {
      padding: 24px 20px;
      text-align: center;
      color: var(--gray-400);
      font-size: 14px;
      border-top: 1px solid var(--gray-100);
    }
    .meal-empty-icon { font-size: 28px; margin-bottom: 6px; }

    /* Modal overlay */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(4px);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      animation: fadeIn 0.15s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal-overlay.hidden { display: none; }

    .modal {
      background: white;
      border-radius: var(--radius-xl) var(--radius-xl) 0 0;
      width: 100%;
      max-width: 560px;
      max-height: 92vh;
      overflow-y: auto;
      box-shadow: 0 -8px 40px rgba(0,0,0,0.2);
      animation: slideUp 0.25s cubic-bezier(0.4,0,0.2,1);
    }
    @keyframes slideUp {
      from { transform: translateY(40px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .modal-header {
      padding: 20px 24px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--gray-100);
      position: sticky;
      top: 0;
      background: white;
      z-index: 1;
    }
    .modal-title {
      font-size: 18px;
      font-weight: 800;
      color: var(--gray-800);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .modal-close {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: none;
      background: var(--gray-100);
      color: var(--gray-600);
      cursor: pointer;
      font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .modal-close:hover { background: var(--gray-200); }
    .modal-body { padding: 20px 24px 24px; }

    /* Search */
    .search-box {
      position: relative;
      margin-bottom: 16px;
    }
    .search-icon {
      position: absolute;
      left: 12px; top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      color: var(--gray-400);
    }
    .search-input {
      width: 100%;
      padding: 10px 12px 10px 38px;
      border: 2px solid var(--gray-200);
      border-radius: var(--radius);
      font-size: 14px;
      color: var(--gray-800);
      transition: border-color 0.2s;
    }
    .search-input:focus { outline: none; border-color: var(--green); }

    /* Quick-add foods grid */
    .quick-foods-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--gray-400);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 10px;
    }
    .quick-foods-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 20px;
    }
    .quick-food-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 8px;
      background: var(--gray-50);
      border: 2px solid var(--gray-100);
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }
    .quick-food-btn:hover {
      border-color: var(--green);
      background: var(--green-light);
      transform: translateY(-2px);
      box-shadow: var(--shadow-sm);
    }
    .quick-food-btn.selected {
      border-color: var(--green);
      background: var(--green-light);
    }
    .quick-food-emoji { font-size: 22px; margin-bottom: 4px; }
    .quick-food-name { font-size: 11px; font-weight: 600; color: var(--gray-700); }
    .quick-food-cal { font-size: 10px; color: var(--gray-400); margin-top: 1px; }

    /* Custom food form */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 16px 0;
      color: var(--gray-400);
      font-size: 12px;
      font-weight: 600;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--gray-200);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .form-group { display: flex; flex-direction: column; gap: 4px; }
    .form-group.full { grid-column: 1/-1; }
    .form-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--gray-600);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .form-input {
      padding: 9px 12px;
      border: 2px solid var(--gray-200);
      border-radius: var(--radius);
      font-size: 14px;
      color: var(--gray-800);
      transition: border-color 0.2s;
      background: white;
    }
    .form-input:focus { outline: none; border-color: var(--green); }
    .form-input::placeholder { color: var(--gray-300); }

    .ingredient-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 8px;
      border: 2px solid var(--gray-200);
      border-radius: var(--radius);
      min-height: 42px;
      cursor: text;
      transition: border-color 0.2s;
    }
    .ingredient-tags:focus-within { border-color: var(--green); }
    .ingredient-tag {
      display: flex;
      align-items: center;
      gap: 4px;
      background: var(--green-light);
      color: var(--green-dark);
      font-size: 12px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 20px;
      animation: tagIn 0.15s ease;
    }
    @keyframes tagIn { from { opacity: 0; scale: 0.8; } to { opacity: 1; scale: 1; } }
    .ingredient-tag-remove {
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      color: var(--green-dark);
      opacity: 0.7;
    }
    .ingredient-tag-remove:hover { opacity: 1; }
    .ingredient-input {
      border: none;
      outline: none;
      font-size: 13px;
      color: var(--gray-800);
      flex: 1;
      min-width: 80px;
      padding: 2px 4px;
    }
    .ingredient-input::placeholder { color: var(--gray-300); }

    /* Emoji selector */
    .emoji-selector {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .emoji-opt {
      font-size: 22px;
      width: 38px; height: 38px;
      border-radius: 10px;
      border: 2px solid var(--gray-200);
      background: white;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .emoji-opt:hover { border-color: var(--green); background: var(--green-light); }
    .emoji-opt.selected { border-color: var(--green); background: var(--green-light); }

    /* Submit btn */
    .submit-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--green-dark), var(--green));
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      margin-top: 20px;
      transition: all 0.2s;
      letter-spacing: 0.3px;
      box-shadow: 0 4px 16px rgba(34,197,94,0.3);
    }
    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(34,197,94,0.4);
    }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--gray-900);
      color: white;
      padding: 12px 20px;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 600;
      z-index: 300;
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: var(--shadow-lg);
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* Responsive */
    @media (max-width: 600px) {
      .macro-grid { grid-template-columns: repeat(2, 1fr); }
      .quick-foods-grid { grid-template-columns: repeat(3, 1fr); }
      .form-grid { grid-template-columns: 1fr; }
      .header-subtitle { display: none; }
      .main { padding: 16px 16px 80px; }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--gray-300); }
  </style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-inner">
    <div class="header-brand">
      <div class="header-icon">🥗</div>
      <div>
        <div class="header-title">Healthy Meal Tracker</div>
        <div class="header-subtitle">Track nutrition, feel great</div>
      </div>
    </div>
    <div class="date-badge" onclick="goToday()">
      📅 <span id="headerDate"></span>
    </div>
  </div>
</header>

<!-- Main content -->
<main class="main">

  <!-- Date navigation -->
  <div class="date-nav">
    <button class="date-nav-btn" onclick="changeDate(-1)" title="Previous day">‹</button>
    <span class="date-nav-label" id="dateLabel">Today</span>
    <button class="date-nav-btn" onclick="changeDate(1)" title="Next day">›</button>
    <button class="today-btn" onclick="goToday()">Today</button>
  </div>

  <!-- Daily summary -->
  <div class="summary-card">
    <div class="summary-title">📊 Daily Summary</div>
    <div class="macro-grid">
      <div class="macro-item macro-cal">
        <div class="macro-icon">🔥</div>
        <div class="macro-value" id="totalCal">0</div>
        <div class="macro-unit">kcal</div>
        <div class="macro-label">Calories</div>
      </div>
      <div class="macro-item macro-protein">
        <div class="macro-icon">💪</div>
        <div class="macro-value" id="totalProtein">0</div>
        <div class="macro-unit">g</div>
        <div class="macro-label">Protein</div>
      </div>
      <div class="macro-item macro-carbs">
        <div class="macro-icon">🌾</div>
        <div class="macro-value" id="totalCarbs">0</div>
        <div class="macro-unit">g</div>
        <div class="macro-label">Carbs</div>
      </div>
      <div class="macro-item macro-fat">
        <div class="macro-icon">🫒</div>
        <div class="macro-value" id="totalFat">0</div>
        <div class="macro-unit">g</div>
        <div class="macro-label">Fat</div>
      </div>
    </div>
    <div class="progress-section">
      <div class="progress-label-row">
        <span class="progress-label">Calorie Goal</span>
        <span class="progress-pct" id="progressPct">0%</span>
      </div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
      </div>
      <div class="calorie-goal-row">
        <span class="calorie-goal-label" id="calorieGoalLabel">Goal: 2000 kcal</span>
        <span class="calorie-remaining ok" id="calorieRemaining">2000 remaining</span>
      </div>
    </div>
    <div class="goal-row">
      <span class="goal-label">Daily Goal:</span>
      <input type="number" class="goal-input" id="goalInput" value="2000" min="500" max="9999" onchange="updateGoal()" />
      <span class="goal-label">kcal</span>
    </div>
  </div>

  <!-- Meals -->
  <div class="meals-container" id="mealsContainer"></div>

</main>

<!-- Add Food Modal -->
<div class="modal-overlay hidden" id="modalOverlay" onclick="closeModalOnOverlay(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">➕ Add Food</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <!-- Search -->
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" id="searchInput" placeholder="Search foods..." oninput="filterFoods()" />
      </div>

      <!-- Quick add -->
      <div class="quick-foods-title">Quick Add</div>
      <div class="quick-foods-grid" id="quickFoodsGrid"></div>

      <div class="divider">or add custom food</div>

      <!-- Custom form -->
      <div class="form-grid">
        <div class="form-group full">
          <label class="form-label">Food Name</label>
          <input type="text" class="form-input" id="foodName" placeholder="e.g. Grilled Chicken" />
        </div>
        <div class="form-group full">
          <label class="form-label">Ingredients (press Enter to add)</label>
          <div class="ingredient-tags" id="ingredientTagsBox" onclick="focusIngredientInput()">
            <input type="text" class="ingredient-input" id="ingredientInput" placeholder="Add ingredient..." onkeydown="handleIngredientKey(event)" />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Calories (kcal)</label>
          <input type="number" class="form-input" id="foodCal" placeholder="e.g. 350" min="0" />
        </div>
        <div class="form-group">
          <label class="form-label">Quantity</label>
          <input type="text" class="form-input" id="foodQty" placeholder="e.g. 1 serving" />
        </div>
        <div class="form-group">
          <label class="form-label">Protein (g)</label>
          <input type="number" class="form-input" id="foodProtein" placeholder="0" min="0" />
        </div>
        <div class="form-group">
          <label class="form-label">Carbs (g)</label>
          <input type="number" class="form-input" id="foodCarbs" placeholder="0" min="0" />
        </div>
        <div class="form-group full">
          <label class="form-label">Fat (g)</label>
          <input type="number" class="form-input" id="foodFat" placeholder="0" min="0" />
        </div>
        <div class="form-group full">
          <label class="form-label">Food Icon</label>
          <div class="emoji-selector" id="emojiSelector"></div>
        </div>
      </div>

      <button class="submit-btn" id="submitBtn" onclick="submitFood()">Add to Meal</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ============ DATA ============
const MEALS = [
  { id: 'breakfast', name: 'Breakfast', emoji: '🌅' },
  { id: 'lunch',     name: 'Lunch',     emoji: '☀️' },
  { id: 'dinner',    name: 'Dinner',    emoji: '🌙' },
  { id: 'snacks',    name: 'Snacks',    emoji: '🍎' },
];

const FOOD_EMOJIS = ['🥗','🍗','🥩','🐟','🍳','🥚','🧀','🥛','🍞','🥐','🍚','🍝','🥦','🥕','🍅','🫐','🍌','🍎','🥜','🫘'];

const QUICK_FOODS = [
  { name:'Oatmeal',        emoji:'🥣', cal:150, protein:6,  carbs:27, fat:3,  qty:'1 cup',      ingredients:['Oats','Water','Salt'] },
  { name:'Banana',         emoji:'🍌', cal:90,  protein:1,  carbs:23, fat:0,  qty:'1 medium',   ingredients:['Banana'] },
  { name:'Greek Yogurt',   emoji:'🥛', cal:100, protein:17, carbs:6,  fat:0,  qty:'1 cup',      ingredients:['Yogurt','Live cultures'] },
  { name:'Boiled Egg',     emoji:'🥚', cal:70,  protein:6,  carbs:1,  fat:5,  qty:'1 large',    ingredients:['Egg'] },
  { name:'Grilled Chicken',emoji:'🍗', cal:165, protein:31, carbs:0,  fat:4,  qty:'100g',       ingredients:['Chicken breast','Olive oil','Seasoning'] },
  { name:'Brown Rice',     emoji:'🍚', cal:215, protein:5,  carbs:45, fat:2,  qty:'1 cup',      ingredients:['Brown rice','Water','Salt'] },
  { name:'Salmon',         emoji:'🐟', cal:208, protein:20, carbs:0,  fat:13, qty:'100g',       ingredients:['Salmon fillet','Lemon','Dill'] },
  { name:'Mixed Salad',    emoji:'🥗', cal:80,  protein:2,  carbs:10, fat:4,  qty:'1 bowl',     ingredients:['Lettuce','Tomato','Cucumber','Olive oil'] },
  { name:'Almonds',        emoji:'🥜', cal:164, protein:6,  carbs:6,  fat:14, qty:'28g (1oz)',  ingredients:['Almonds'] },
  { name:'Apple',          emoji:'🍎', cal:80,  protein:0,  carbs:21, fat:0,  qty:'1 medium',   ingredients:['Apple'] },
  { name:'Avocado Toast',  emoji:'🥑', cal:220, protein:5,  carbs:22, fat:14, qty:'1 slice',    ingredients:['Bread','Avocado','Lemon','Salt','Pepper'] },
  { name:'Cottage Cheese', emoji:'🧀', cal:110, protein:14, carbs:5,  fat:5,  qty:'½ cup',      ingredients:['Cottage cheese'] },
  { name:'Quinoa Bowl',    emoji:'🌾', cal:222, protein:8,  carbs:39, fat:4,  qty:'1 cup',      ingredients:['Quinoa','Vegetables','Olive oil'] },
  { name:'Blueberries',    emoji:'🫐', cal:84,  protein:1,  carbs:21, fat:0,  qty:'1 cup',      ingredients:['Blueberries'] },
  { name:'Broccoli',       emoji:'🥦', cal:55,  protein:4,  carbs:11, fat:1,  qty:'1 cup',      ingredients:['Broccoli'] },
  { name:'Sweet Potato',   emoji:'🍠', cal:103, protein:2,  carbs:24, fat:0,  qty:'1 medium',   ingredients:['Sweet potato'] },
  { name:'Tuna Salad',     emoji:'🐟', cal:180, protein:25, carbs:3,  fat:8,  qty:'1 serving',  ingredients:['Tuna','Mayo','Celery','Onion'] },
  { name:'Protein Shake',  emoji:'💪', cal:150, protein:25, carbs:8,  fat:3,  qty:'1 scoop',    ingredients:['Whey protein','Milk'] },
];

// ============ STATE ============
let currentDate = todayKey();
let db = loadDB();
let modalMealId = null;
let selectedQuickFood = null;
let ingredientTags = [];
let selectedEmoji = '🍽️';
let collapsed = {};
let filteredFoods = [...QUICK_FOODS];

function todayKey() {
  return new Date().toISOString().slice(0,10);
}
function loadDB() {
  try { return JSON.parse(localStorage.getItem('mealtracker') || '{}'); } catch { return {}; }
}
function saveDB() {
  localStorage.setItem('mealtracker', JSON.stringify(db));
}
function getDayData() {
  if (!db[currentDate]) db[currentDate] = { meals: {}, goal: 2000 };
  MEALS.forEach(m => { if (!db[currentDate].meals[m.id]) db[currentDate].meals[m.id] = []; });
  return db[currentDate];
}
function addFoodEntry(mealId, food) {
  getDayData().meals[mealId].push(food);
  saveDB();
}
function deleteFoodEntry(mealId, index) {
  getDayData().meals[mealId].splice(index,1);
  saveDB();
}

// ============ RENDER ============
function getDateLabel(key) {
  const today = todayKey();
  const d = new Date(key + 'T12:00:00');
  if (key === today) return 'Today';
  const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
  if (key === yesterday.toISOString().slice(0,10)) return 'Yesterday';
  return d.toLocaleDateString('en-US', { weekday:'long', month:'short', day:'numeric' });
}
function formatHeaderDate(key) {
  const d = new Date(key + 'T12:00:00');
  return d.toLocaleDateString('en-US', { month:'short', day:'numeric' });
}

function render() {
  const day = getDayData();
  document.getElementById('headerDate').textContent = formatHeaderDate(currentDate);
  document.getElementById('dateLabel').textContent = getDateLabel(currentDate);
  document.getElementById('goalInput').value = day.goal || 2000;

  // Totals
  let totCal=0, totP=0, totC=0, totF=0;
  MEALS.forEach(m => {
    (day.meals[m.id]||[]).forEach(f => {
      totCal += f.cal||0; totP += f.protein||0; totC += f.carbs||0; totF += f.fat||0;
    });
  });
  document.getElementById('totalCal').textContent = totCal;
  document.getElementById('totalProtein').textContent = totP;
  document.getElementById('totalCarbs').textContent = totC;
  document.getElementById('totalFat').textContent = totF;

  const goal = day.goal || 2000;
  const pct = Math.min(100, Math.round(totCal/goal*100));
  const remaining = goal - totCal;
  document.getElementById('progressPct').textContent = pct + '%';
  const bar = document.getElementById('progressBar');
  bar.style.width = pct + '%';
  bar.classList.toggle('over', remaining < 0);
  document.getElementById('calorieGoalLabel').textContent = `Goal: ${goal} kcal`;
  const remEl = document.getElementById('calorieRemaining');
  if (remaining >= 0) {
    remEl.textContent = `${remaining} remaining`;
    remEl.className = 'calorie-remaining ok';
  } else {
    remEl.textContent = `${Math.abs(remaining)} over`;
    remEl.className = 'calorie-remaining over';
  }

  // Meals
  const container = document.getElementById('mealsContainer');
  container.innerHTML = '';
  MEALS.forEach(m => {
    const foods = day.meals[m.id] || [];
    const mealCal = foods.reduce((s,f)=>s+(f.cal||0),0);
    const isOpen = !collapsed[m.id];
    const section = document.createElement('div');
    section.className = 'meal-section';
    section.innerHTML = `
      <div class="meal-header" onclick="toggleMeal('${m.id}')">
        <div class="meal-header-left">
          <div class="meal-emoji">${m.emoji}</div>
          <div>
            <div class="meal-name">${m.name}</div>
            <span class="meal-cal-badge">${mealCal > 0 ? mealCal + ' kcal' : 'No foods logged'}</span>
          </div>
        </div>
        <div class="meal-header-right">
          <button class="add-food-btn" onclick="event.stopPropagation(); openModal('${m.id}')">
            ＋ Add Food
          </button>
          <span class="collapse-icon ${isOpen ? 'open' : ''}">⌄</span>
        </div>
      </div>
      <div class="food-list ${isOpen ? '' : 'hidden'}" id="foodList-${m.id}">
        ${foods.length === 0
          ? `<div class="meal-empty"><div class="meal-empty-icon">🍽️</div>No foods added yet</div>`
          : foods.map((f,i) => `
            <div class="food-item">
              <div class="food-item-emoji">${f.emoji || '🍽️'}</div>
              <div class="food-item-info">
                <div class="food-item-name">${escHtml(f.name)}</div>
                <div class="food-item-macros">
                  ${f.cal ? `<span class="macro-tag macro-tag-cal">🔥${f.cal} kcal</span>` : ''}
                  ${f.protein ? `<span class="macro-tag macro-tag-p">💪${f.protein}g P</span>` : ''}
                  ${f.carbs ? `<span class="macro-tag macro-tag-c">🌾${f.carbs}g C</span>` : ''}
                  ${f.fat ? `<span class="macro-tag macro-tag-f">🫒${f.fat}g F</span>` : ''}
                </div>
                ${f.ingredients && f.ingredients.length ? `<div style="font-size:11px;color:var(--gray-400);margin-top:3px;">${f.ingredients.map(x=>escHtml(x)).join(' · ')}</div>` : ''}
              </div>
              <span class="food-item-qty">${escHtml(f.qty||'')}</span>
              <span class="food-item-calories">${f.cal||0}</span>
              <button class="delete-btn" onclick="deleteFood('${m.id}',${i})" title="Remove">✕</button>
            </div>
          `).join('')
        }
      </div>
    `;
    container.appendChild(section);
  });
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toggleMeal(id) {
  collapsed[id] = !collapsed[id];
  render();
}
function deleteFood(mealId, index) {
  deleteFoodEntry(mealId, index);
  showToast('🗑️ Food removed');
  render();
}
function changeDate(delta) {
  const d = new Date(currentDate + 'T12:00:00');
  d.setDate(d.getDate() + delta);
  currentDate = d.toISOString().slice(0,10);
  render();
}
function goToday() {
  currentDate = todayKey();
  render();
}
function updateGoal() {
  const g = parseInt(document.getElementById('goalInput').value) || 2000;
  getDayData().goal = g;
  saveDB();
  render();
}

// ============ MODAL ============
function openModal(mealId) {
  modalMealId = mealId;
  selectedQuickFood = null;
  ingredientTags = [];
  selectedEmoji = '🍽️';
  filteredFoods = [...QUICK_FOODS];

  const meal = MEALS.find(m => m.id === mealId);
  document.getElementById('modalTitle').textContent = `➕ Add to ${meal.name}`;
  document.getElementById('searchInput').value = '';
  document.getElementById('foodName').value = '';
  document.getElementById('foodCal').value = '';
  document.getElementById('foodQty').value = '';
  document.getElementById('foodProtein').value = '';
  document.getElementById('foodCarbs').value = '';
  document.getElementById('foodFat').value = '';
  renderIngredientTags();
  renderQuickFoods();
  renderEmojiSelector();
  document.getElementById('modalOverlay').classList.remove('hidden');
  setTimeout(() => document.getElementById('searchInput').focus(), 100);
}
function closeModal() {
  document.getElementById('modalOverlay').classList.add('hidden');
  modalMealId = null;
}
function closeModalOnOverlay(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function renderQuickFoods() {
  const grid = document.getElementById('quickFoodsGrid');
  grid.innerHTML = filteredFoods.slice(0,12).map((f,i) => `
    <button class="quick-food-btn ${selectedQuickFood && selectedQuickFood.name===f.name ? 'selected' : ''}"
      onclick="selectQuickFood(${QUICK_FOODS.indexOf(f)})">
      <span class="quick-food-emoji">${f.emoji}</span>
      <span class="quick-food-name">${f.name}</span>
      <span class="quick-food-cal">${f.cal} kcal</span>
    </button>
  `).join('');
}

function selectQuickFood(idx) {
  const f = QUICK_FOODS[idx];
  selectedQuickFood = f;
  document.getElementById('foodName').value = f.name;
  document.getElementById('foodCal').value = f.cal;
  document.getElementById('foodQty').value = f.qty;
  document.getElementById('foodProtein').value = f.protein;
  document.getElementById('foodCarbs').value = f.carbs;
  document.getElementById('foodFat').value = f.fat;
  ingredientTags = [...f.ingredients];
  selectedEmoji = f.emoji;
  renderIngredientTags();
  renderEmojiSelector();
  renderQuickFoods();
}

function filterFoods() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  filteredFoods = q ? QUICK_FOODS.filter(f =>
    f.name.toLowerCase().includes(q) ||
    f.ingredients.some(i => i.toLowerCase().includes(q))
  ) : [...QUICK_FOODS];
  selectedQuickFood = null;
  renderQuickFoods();
}

function renderEmojiSelector() {
  const sel = document.getElementById('emojiSelector');
  sel.innerHTML = FOOD_EMOJIS.map(e => `
    <button class="emoji-opt ${e===selectedEmoji ? 'selected' : ''}" onclick="selectEmoji('${e}')">${e}</button>
  `).join('');
}
function selectEmoji(e) {
  selectedEmoji = e;
  renderEmojiSelector();
}

function renderIngredientTags() {
  const box = document.getElementById('ingredientTagsBox');
  const existingTags = box.querySelectorAll('.ingredient-tag');
  existingTags.forEach(t => t.remove());
  const input = document.getElementById('ingredientInput');
  ingredientTags.forEach((tag, i) => {
    const el = document.createElement('span');
    el.className = 'ingredient-tag';
    el.innerHTML = `${escHtml(tag)} <span class="ingredient-tag-remove" onclick="removeIngredient(${i})">×</span>`;
    box.insertBefore(el, input);
  });
}
function focusIngredientInput() {
  document.getElementById('ingredientInput').focus();
}
function handleIngredientKey(e) {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    const val = e.target.value.trim().replace(/,$/,'');
    if (val) {
      ingredientTags.push(val);
      e.target.value = '';
      renderIngredientTags();
    }
  } else if (e.key === 'Backspace' && !e.target.value && ingredientTags.length) {
    ingredientTags.pop();
    renderIngredientTags();
  }
}
function removeIngredient(i) {
  ingredientTags.splice(i,1);
  renderIngredientTags();
}

function submitFood() {
  const name = document.getElementById('foodName').value.trim();
  const cal = parseFloat(document.getElementById('foodCal').value) || 0;
  if (!name) { showToast('⚠️ Please enter a food name'); return; }
  if (!cal && !confirm('No calories entered. Add anyway?')) return;

  const food = {
    name,
    cal: cal || 0,
    qty: document.getElementById('foodQty').value.trim() || '1 serving',
    protein: parseFloat(document.getElementById('foodProtein').value) || 0,
    carbs: parseFloat(document.getElementById('foodCarbs').value) || 0,
    fat: parseFloat(document.getElementById('foodFat').value) || 0,
    ingredients: [...ingredientTags],
    emoji: selectedEmoji,
  };
  addFoodEntry(modalMealId, food);
  closeModal();
  render();
  showToast(`✅ ${name} added!`);
}

// ============ TOAST ============
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ============ INIT ============
render();
</script>
</body>
</html>
