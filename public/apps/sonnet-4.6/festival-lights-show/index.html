<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Festival Lights Show</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    color: #fff;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  #canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }

  #ui {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 10;
    padding: 16px 24px;
    background: linear-gradient(transparent, rgba(0,0,0,0.85));
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .title-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .app-title {
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    background: linear-gradient(90deg, #ff6ec7, #ffda77, #a8ff78, #78d1ff, #c77dff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    background-size: 300% 100%;
    animation: titleShift 4s linear infinite;
  }

  @keyframes titleShift {
    0% { background-position: 0% 50%; }
    100% { background-position: 300% 50%; }
  }

  .beat-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.75rem;
    letter-spacing: 1px;
    color: #aaa;
  }

  .beat-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #444;
    transition: background 0.05s, transform 0.05s;
  }

  .beat-dot.active {
    background: #ff6ec7;
    transform: scale(1.6);
    box-shadow: 0 0 8px #ff6ec7;
  }

  .controls-row {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .btn {
    padding: 8px 18px;
    border: none;
    border-radius: 50px;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    outline: none;
  }

  .btn-primary {
    background: linear-gradient(135deg, #ff6ec7, #c77dff);
    color: #fff;
    box-shadow: 0 0 14px rgba(255,110,199,0.5);
  }
  .btn-primary:hover { filter: brightness(1.2); transform: scale(1.04); }

  .btn-secondary {
    background: rgba(255,255,255,0.1);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.2);
  }
  .btn-secondary:hover { background: rgba(255,255,255,0.2); }
  .btn-secondary.active {
    background: rgba(255,255,255,0.25);
    border-color: rgba(255,255,255,0.5);
    box-shadow: 0 0 10px rgba(255,255,255,0.2);
  }

  .pattern-selector {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .pattern-btn {
    padding: 6px 14px;
    border-radius: 50px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.06);
    color: #ccc;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 1px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  .pattern-btn:hover { background: rgba(255,255,255,0.14); color: #fff; }
  .pattern-btn.active {
    color: #fff;
    border-color: transparent;
    box-shadow: 0 0 12px rgba(0,0,0,0.3);
  }

  .sliders-row {
    display: flex;
    gap: 20px;
    align-items: center;
    flex-wrap: wrap;
  }

  .slider-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 120px;
    flex: 1;
    max-width: 200px;
  }

  .slider-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #888;
  }

  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    border-radius: 2px;
    background: rgba(255,255,255,0.15);
    outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 0 6px rgba(255,255,255,0.5);
    cursor: pointer;
  }

  .music-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 20;
    padding: 10px 20px;
    border-radius: 50px;
    border: none;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 1px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
    backdrop-filter: blur(10px);
  }
  .music-btn:hover { background: rgba(255,255,255,0.18); }
  .music-btn.playing {
    background: linear-gradient(135deg, rgba(255,110,199,0.4), rgba(199,125,255,0.4));
    border-color: rgba(255,110,199,0.5);
    box-shadow: 0 0 18px rgba(255,110,199,0.4);
  }

  .visualizer-bar-wrap {
    position: fixed;
    top: 20px;
    left: 24px;
    z-index: 10;
    display: flex;
    align-items: flex-end;
    gap: 2px;
    height: 40px;
  }

  .vis-bar {
    width: 4px;
    border-radius: 2px;
    background: rgba(255,255,255,0.4);
    transition: height 0.05s;
    min-height: 2px;
  }

  .color-palette {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .color-swatch {
    width: 22px; height: 22px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: all 0.2s;
    box-shadow: 0 0 0 0 rgba(255,255,255,0);
  }
  .color-swatch:hover, .color-swatch.active {
    border-color: #fff;
    transform: scale(1.2);
    box-shadow: 0 0 10px rgba(255,255,255,0.4);
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="visualizer-bar-wrap" id="visBarWrap"></div>

<button class="music-btn" id="musicBtn">♪ Start Music</button>

<div id="ui">
  <div class="title-bar">
    <div class="app-title">Festival Lights Show</div>
    <div class="beat-indicator">
      <div class="beat-dot" id="beatDot"></div>
      <span id="bpmLabel">120 BPM</span>
    </div>
  </div>

  <div class="controls-row">
    <div class="pattern-selector" id="patternSelector">
      <button class="pattern-btn active" data-pattern="rave">Rave</button>
      <button class="pattern-btn" data-pattern="wave">Wave</button>
      <button class="pattern-btn" data-pattern="strobe">Strobe</button>
      <button class="pattern-btn" data-pattern="laser">Laser</button>
      <button class="pattern-btn" data-pattern="firework">Firework</button>
      <button class="pattern-btn" data-pattern="galaxy">Galaxy</button>
      <button class="pattern-btn" data-pattern="matrix">Matrix</button>
    </div>
  </div>

  <div class="controls-row">
    <div class="sliders-row" style="flex:1">
      <div class="slider-group">
        <div class="slider-label">Speed</div>
        <input type="range" id="speedSlider" min="0.1" max="3" step="0.05" value="1">
      </div>
      <div class="slider-group">
        <div class="slider-label">Intensity</div>
        <input type="range" id="intensitySlider" min="0.1" max="2" step="0.05" value="1">
      </div>
      <div class="slider-group">
        <div class="slider-label">BPM</div>
        <input type="range" id="bpmSlider" min="60" max="200" step="1" value="120">
      </div>
      <div class="slider-group">
        <div class="slider-label">Particles</div>
        <input type="range" id="particleSlider" min="20" max="300" step="10" value="120">
      </div>
    </div>
    <div class="color-palette" id="colorPalette">
      <div class="color-swatch active" data-palette="rainbow" style="background: conic-gradient(red, yellow, lime, cyan, blue, magenta, red); border-radius:50%;"></div>
      <div class="color-swatch" data-palette="fire" style="background: linear-gradient(135deg, #ff4e00, #ec9f05);"></div>
      <div class="color-swatch" data-palette="ocean" style="background: linear-gradient(135deg, #0575e6, #021b79);"></div>
      <div class="color-swatch" data-palette="neon" style="background: linear-gradient(135deg, #ff6ec7, #a8ff78);"></div>
      <div class="color-swatch" data-palette="cyber" style="background: linear-gradient(135deg, #00f260, #0575e6);"></div>
      <div class="color-swatch" data-palette="gold" style="background: linear-gradient(135deg, #f7971e, #ffd200);"></div>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// State
let state = {
  pattern: 'rave',
  speed: 1,
  intensity: 1,
  bpm: 120,
  particleCount: 120,
  palette: 'rainbow',
  time: 0,
  beat: 0,
  beatPhase: 0,
  musicPlaying: false,
};

// Color palettes
const palettes = {
  rainbow: (t) => `hsl(${(t * 360) % 360}, 100%, 60%)`,
  fire: (t) => {
    const r = Math.round(255);
    const g = Math.round(t < 0.5 ? t * 2 * 200 : 200 - (t - 0.5) * 2 * 200);
    return `rgb(${r},${Math.max(0,g)},0)`;
  },
  ocean: (t) => `hsl(${190 + t * 60}, 100%, ${40 + t * 30}%)`,
  neon: (t) => `hsl(${300 + t * 120}, 100%, 60%)`,
  cyber: (t) => `hsl(${120 + t * 80}, 100%, 55%)`,
  gold: (t) => `hsl(${40 + t * 20}, 100%, ${50 + t * 20}%)`,
};

function getColor(t) {
  return palettes[state.palette](((t % 1) + 1) % 1);
}

// Beat engine
let lastBeatTime = 0;
let beatCallbacks = [];
function onBeat(cb) { beatCallbacks.push(cb); }

// Audio context for music synthesis
let audioCtx = null;
let analyser = null;
let freqData = null;
let musicNodes = [];

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 128;
  freqData = new Uint8Array(analyser.frequencyBinCount);
  analyser.connect(audioCtx.destination);
}

function playBeat() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  // Kick drum
  const kick = audioCtx.createOscillator();
  const kickGain = audioCtx.createGain();
  kick.connect(kickGain);
  kickGain.connect(analyser);
  kick.frequency.setValueAtTime(150, now);
  kick.frequency.exponentialRampToValueAtTime(0.001, now + 0.4);
  kickGain.gain.setValueAtTime(1.2, now);
  kickGain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
  kick.start(now);
  kick.stop(now + 0.4);

  // Hi-hat
  const bufferSize = audioCtx.sampleRate * 0.05;
  const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const output = noiseBuffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;
  const hat = audioCtx.createBufferSource();
  hat.buffer = noiseBuffer;
  const hatFilter = audioCtx.createBiquadFilter();
  hatFilter.type = 'highpass';
  hatFilter.frequency.value = 8000;
  const hatGain = audioCtx.createGain();
  hatGain.gain.setValueAtTime(0.3, now);
  hatGain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
  hat.connect(hatFilter);
  hatFilter.connect(hatGain);
  hatGain.connect(analyser);
  hat.start(now);
  hat.stop(now + 0.05);

  // Synth note
  const notes = [261.63, 329.63, 392, 523.25, 659.25];
  const freq = notes[Math.floor(state.beat / 2) % notes.length];
  const synth = audioCtx.createOscillator();
  const synthGain = audioCtx.createGain();
  synth.type = 'sawtooth';
  synth.frequency.value = freq;
  synthGain.gain.setValueAtTime(0.15, now);
  synthGain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
  const synthFilter = audioCtx.createBiquadFilter();
  synthFilter.type = 'lowpass';
  synthFilter.frequency.setValueAtTime(2000, now);
  synthFilter.frequency.exponentialRampToValueAtTime(500, now + 0.2);
  synth.connect(synthFilter);
  synthFilter.connect(synthGain);
  synthGain.connect(analyser);
  synth.start(now);
  synth.stop(now + 0.2);
}

// Particles system
let particles = [];

class Particle {
  constructor() { this.reset(); }
  reset(x, y) {
    this.x = x ?? Math.random() * W;
    this.y = y ?? Math.random() * H;
    this.vx = (Math.random() - 0.5) * 3;
    this.vy = (Math.random() - 0.5) * 3 - 1;
    this.life = 1;
    this.decay = 0.005 + Math.random() * 0.015;
    this.size = 2 + Math.random() * 4;
    this.hue = Math.random();
    this.glow = Math.random() > 0.6;
  }
  update() {
    this.x += this.vx * state.speed;
    this.y += this.vy * state.speed;
    this.vy += 0.05;
    this.life -= this.decay * state.speed;
    if (this.life <= 0) this.reset();
  }
  draw() {
    ctx.save();
    ctx.globalAlpha = this.life * state.intensity;
    const col = getColor(this.hue + state.time * 0.1);
    if (this.glow) {
      ctx.shadowColor = col;
      ctx.shadowBlur = 12;
    }
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
    ctx.fillStyle = col;
    ctx.fill();
    ctx.restore();
  }
}

function initParticles() {
  particles = [];
  for (let i = 0; i < state.particleCount; i++) {
    particles.push(new Particle());
  }
}
initParticles();

// Pattern renderers
const patterns = {
  rave(t, beat) {
    // Radial burst beams
    const cx = W / 2, cy = H / 2;
    const numBeams = 12;
    for (let i = 0; i < numBeams; i++) {
      const angle = (i / numBeams) * Math.PI * 2 + t * 0.5;
      const len = (0.5 + 0.5 * Math.sin(t * 3 + i)) * Math.max(W, H) * 0.8;
      const color = getColor(i / numBeams + t * 0.05);
      ctx.save();
      ctx.globalAlpha = 0.12 * state.intensity * (1 + beat * 0.5);
      const grad = ctx.createLinearGradient(cx, cy, cx + Math.cos(angle) * len, cy + Math.sin(angle) * len);
      grad.addColorStop(0, color);
      grad.addColorStop(1, 'transparent');
      ctx.strokeStyle = grad;
      ctx.lineWidth = 20 + beat * 30;
      ctx.shadowColor = color;
      ctx.shadowBlur = 30;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + Math.cos(angle) * len, cy + Math.sin(angle) * len);
      ctx.stroke();
      ctx.restore();
    }
    // Pulsing ring
    ctx.save();
    ctx.globalAlpha = (0.4 + beat * 0.5) * state.intensity;
    const r = (80 + beat * 120) * state.intensity;
    const ringGrad = ctx.createRadialGradient(cx, cy, r * 0.8, cx, cy, r);
    const ringColor = getColor(t * 0.1);
    ringGrad.addColorStop(0, ringColor);
    ringGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = ringGrad;
    ctx.shadowColor = ringColor;
    ctx.shadowBlur = 40;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    // Particles
    particles.forEach(p => { p.update(); p.draw(); });
  },

  wave(t) {
    const rows = 8;
    const cols = 20;
    for (let row = 0; row < rows; row++) {
      for (let col = 0; col < cols; col++) {
        const x = (col + 0.5) * (W / cols);
        const y = (row + 0.5) * (H / rows);
        const wave = Math.sin(col * 0.5 - t * 3 + row * 0.8);
        const size = (8 + wave * 6) * state.intensity;
        const alpha = (0.3 + wave * 0.3) * state.intensity;
        const color = getColor((col / cols + row / rows * 0.3 + t * 0.05) % 1);
        ctx.save();
        ctx.globalAlpha = Math.max(0, alpha);
        ctx.shadowColor = color;
        ctx.shadowBlur = 18;
        ctx.beginPath();
        ctx.arc(x, y + Math.sin(col * 0.3 + t * 2) * 20, size, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
        ctx.restore();
      }
    }
  },

  strobe(t, beat) {
    if (beat > 0.5) {
      const h = getColor(t * 0.5);
      ctx.save();
      ctx.globalAlpha = (beat - 0.5) * 2 * 0.7 * state.intensity;
      ctx.fillStyle = h;
      ctx.shadowColor = h;
      ctx.shadowBlur = 60;
      ctx.fillRect(0, 0, W, H);
      ctx.restore();
    }
    // Grid of lights
    const cols = 10, rows = 6;
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const x = (c + 0.5) * (W / cols);
        const y = (r + 0.5) * (H / rows);
        const phase = (c + r) / (cols + rows);
        const flicker = Math.sin(t * 10 + phase * Math.PI * 4);
        const on = flicker > (0.2 - beat * 0.5);
        if (!on) continue;
        const color = getColor(phase + t * 0.1);
        const sz = (12 + beat * 20) * state.intensity;
        ctx.save();
        ctx.globalAlpha = (0.4 + flicker * 0.3) * state.intensity;
        ctx.shadowColor = color;
        ctx.shadowBlur = 30;
        ctx.beginPath();
        ctx.arc(x, y, sz, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
        // Star rays
        ctx.globalAlpha *= 0.5;
        for (let ray = 0; ray < 4; ray++) {
          const a = ray * Math.PI / 2 + t;
          ctx.beginPath();
          ctx.moveTo(x, y);
          ctx.lineTo(x + Math.cos(a) * sz * 3, y + Math.sin(a) * sz * 3);
          ctx.strokeStyle = color;
          ctx.lineWidth = 2;
          ctx.stroke();
        }
        ctx.restore();
      }
    }
  },

  laser(t, beat) {
    // Sweeping laser beams
    const beams = 6;
    for (let i = 0; i < beams; i++) {
      const sweep = Math.sin(t * (1 + i * 0.3) + i * 1.2);
      const angle = sweep * Math.PI * 0.5 + (i / beams) * Math.PI;
      const color = getColor(i / beams + t * 0.05);
      const cx = W * 0.5;
      const cy = H;
      const ex = cx + Math.cos(angle - Math.PI / 2) * Math.max(W, H) * 1.5;
      const ey = cy + Math.sin(angle - Math.PI / 2) * Math.max(W, H) * 1.5;
      ctx.save();
      ctx.globalAlpha = (0.6 + beat * 0.3) * state.intensity;
      ctx.shadowColor = color;
      ctx.shadowBlur = 30;
      const grad = ctx.createLinearGradient(cx, cy, ex, ey);
      grad.addColorStop(0, color);
      grad.addColorStop(1, 'transparent');
      ctx.strokeStyle = grad;
      ctx.lineWidth = 2 + beat * 4;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(ex, ey);
      ctx.stroke();
      // Wide glow
      ctx.globalAlpha = 0.05 * state.intensity;
      ctx.lineWidth = 40 + beat * 60;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(ex, ey);
      ctx.stroke();
      ctx.restore();
    }
    // Scan lines
    const scanY = ((t * 100 * state.speed) % (H + 20)) - 10;
    ctx.save();
    ctx.globalAlpha = 0.06 * state.intensity;
    ctx.fillStyle = getColor(t * 0.2);
    ctx.fillRect(0, scanY, W, 3);
    ctx.restore();
  },

  firework(t, beat) {
    // Firework bursts
    if (beat > 0.8 || Math.random() < 0.005 * state.speed) {
      spawnFirework();
    }
    fireworks.forEach((fw, i) => {
      fw.life -= 0.015 * state.speed;
      fw.shards.forEach(s => {
        s.x += s.vx * state.speed;
        s.y += s.vy * state.speed;
        s.vy += 0.1;
        s.vx *= 0.98;
      });
      if (fw.life <= 0) fireworks.splice(i, 1);
      ctx.save();
      fw.shards.forEach(s => {
        ctx.globalAlpha = fw.life * state.intensity;
        ctx.shadowColor = fw.color;
        ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.arc(s.x, s.y, 2 * fw.life, 0, Math.PI * 2);
        ctx.fillStyle = fw.color;
        ctx.fill();
      });
      ctx.restore();
    });
    particles.forEach(p => { p.update(); p.draw(); });
  },

  galaxy(t) {
    const cx = W / 2, cy = H / 2;
    const stars = 200;
    for (let i = 0; i < stars; i++) {
      const ang = (i / stars) * Math.PI * 6 + t * 0.3;
      const r = (i / stars) * Math.min(W, H) * 0.45 + Math.sin(ang * 3 + t) * 10;
      const x = cx + Math.cos(ang) * r;
      const y = cy + Math.sin(ang) * r * 0.5;
      const size = (0.5 + (i / stars) * 2.5) * state.intensity;
      const alpha = (0.3 + Math.sin(t * 2 + i * 0.1) * 0.2) * state.intensity;
      const color = getColor(i / stars + t * 0.05);
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.shadowColor = color;
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.arc(x, y, size, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
      ctx.restore();
    }
    // Nebula
    const nebGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.min(W, H) * 0.4);
    nebGrad.addColorStop(0, `hsla(${t * 50 % 360}, 100%, 60%, 0.04)`);
    nebGrad.addColorStop(0.5, `hsla(${(t * 50 + 120) % 360}, 100%, 50%, 0.02)`);
    nebGrad.addColorStop(1, 'transparent');
    ctx.save();
    ctx.globalAlpha = state.intensity;
    ctx.fillStyle = nebGrad;
    ctx.beginPath();
    ctx.arc(cx, cy, Math.min(W, H) * 0.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  },

  matrix(t, beat) {
    const cols = Math.floor(W / 18);
    for (let c = 0; c < cols; c++) {
      const x = c * 18 + 9;
      const speed2 = (0.5 + Math.sin(c * 1.23) * 0.5) * state.speed;
      const head = ((t * 80 * speed2 + c * 37) % (H + 100)) - 50;
      const color = getColor(c / cols + t * 0.03);
      const numChars = 12;
      for (let r = 0; r < numChars; r++) {
        const y = head - r * 16;
        if (y < -20 || y > H + 20) continue;
        const alpha = ((numChars - r) / numChars) * (r === 0 ? 1 : 0.5) * state.intensity;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle = r === 0 ? '#fff' : color;
        if (r === 0) { ctx.shadowColor = color; ctx.shadowBlur = 15; }
        ctx.font = `${12 + beat * 3}px monospace`;
        ctx.textAlign = 'center';
        const ch = String.fromCharCode(0x30A0 + Math.floor(Math.random() * 96));
        ctx.fillText(ch, x, y);
        ctx.restore();
      }
    }
  }
};

// Fireworks pool
let fireworks = [];
function spawnFirework() {
  const cx = Math.random() * W;
  const cy = Math.random() * H * 0.7;
  const color = getColor(Math.random());
  const shards = [];
  const n = 40 + Math.floor(Math.random() * 30);
  for (let i = 0; i < n; i++) {
    const a = (i / n) * Math.PI * 2;
    const sp = 2 + Math.random() * 5;
    shards.push({ x: cx, y: cy, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp });
  }
  fireworks.push({ cx, cy, color, shards, life: 1 });
}

// Visualizer bars
const numVBars = 24;
const visWrap = document.getElementById('visBarWrap');
const visBars = [];
for (let i = 0; i < numVBars; i++) {
  const bar = document.createElement('div');
  bar.className = 'vis-bar';
  visWrap.appendChild(bar);
  visBars.push(bar);
}

function updateVisualizer() {
  if (!analyser || !freqData) {
    visBars.forEach((b, i) => {
      const h = 4 + Math.abs(Math.sin(state.time * 3 + i * 0.5)) * 30 * state.intensity;
      b.style.height = h + 'px';
      b.style.background = getColor(i / numVBars + state.time * 0.05);
    });
    return;
  }
  analyser.getByteFrequencyData(freqData);
  visBars.forEach((b, i) => {
    const idx = Math.floor(i * freqData.length / numVBars);
    const h = 2 + (freqData[idx] / 255) * 36 * state.intensity;
    b.style.height = h + 'px';
    b.style.background = getColor(i / numVBars + state.time * 0.05);
  });
}

// Main loop
let lastFrame = 0;
function loop(ts) {
  const dt = Math.min((ts - lastFrame) / 1000, 0.05);
  lastFrame = ts;
  state.time += dt * state.speed;

  // Beat detection
  const beatInterval = 60 / state.bpm;
  state.beatPhase += dt / beatInterval;
  let beat = 0;
  if (state.beatPhase >= 1) {
    state.beatPhase -= 1;
    state.beat++;
    beat = 1;
    document.getElementById('beatDot').classList.add('active');
    setTimeout(() => document.getElementById('beatDot').classList.remove('active'), 80);
    if (state.musicPlaying) playBeat();
    beatCallbacks.forEach(cb => cb());
  } else {
    beat = state.beatPhase < 0.15 ? Math.exp(-state.beatPhase * 30) : 0;
  }
  beat *= state.intensity;

  // Background
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.fillRect(0, 0, W, H);

  // Pattern
  if (patterns[state.pattern]) {
    patterns[state.pattern](state.time, beat);
  }

  // Vignette
  const vig = ctx.createRadialGradient(W/2, H/2, Math.min(W,H)*0.3, W/2, H/2, Math.max(W,H)*0.8);
  vig.addColorStop(0, 'transparent');
  vig.addColorStop(1, 'rgba(0,0,0,0.5)');
  ctx.save();
  ctx.globalAlpha = 1;
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, W, H);
  ctx.restore();

  updateVisualizer();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// Controls
document.getElementById('patternSelector').addEventListener('click', e => {
  if (e.target.dataset.pattern) {
    state.pattern = e.target.dataset.pattern;
    document.querySelectorAll('.pattern-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    const colors = {
      rave: 'linear-gradient(135deg,#ff6ec7,#c77dff)',
      wave: 'linear-gradient(135deg,#00c3ff,#0575e6)',
      strobe: 'linear-gradient(135deg,#f7971e,#ffd200)',
      laser: 'linear-gradient(135deg,#11998e,#38ef7d)',
      firework: 'linear-gradient(135deg,#f7971e,#ff4e00)',
      galaxy: 'linear-gradient(135deg,#c77dff,#00c3ff)',
      matrix: 'linear-gradient(135deg,#00f260,#0575e6)',
    };
    e.target.style.background = colors[state.pattern] || '';
    e.target.style.color = '#fff';
  }
});

// Set initial active pattern style
document.querySelector('.pattern-btn.active').style.background = 'linear-gradient(135deg,#ff6ec7,#c77dff)';
document.querySelector('.pattern-btn.active').style.color = '#fff';

document.getElementById('speedSlider').addEventListener('input', e => { state.speed = parseFloat(e.target.value); });
document.getElementById('intensitySlider').addEventListener('input', e => { state.intensity = parseFloat(e.target.value); });
document.getElementById('bpmSlider').addEventListener('input', e => {
  state.bpm = parseInt(e.target.value);
  document.getElementById('bpmLabel').textContent = state.bpm + ' BPM';
});
document.getElementById('particleSlider').addEventListener('input', e => {
  state.particleCount = parseInt(e.target.value);
  initParticles();
});

document.getElementById('colorPalette').addEventListener('click', e => {
  const sw = e.target.closest('.color-swatch');
  if (!sw) return;
  state.palette = sw.dataset.palette;
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
  sw.classList.add('active');
});

document.getElementById('musicBtn').addEventListener('click', () => {
  initAudio();
  state.musicPlaying = !state.musicPlaying;
  const btn = document.getElementById('musicBtn');
  btn.textContent = state.musicPlaying ? '⏹ Stop Music' : '♪ Start Music';
  btn.classList.toggle('playing', state.musicPlaying);
});

// Keyboard shortcuts
window.addEventListener('keydown', e => {
  const keys = {'1':'rave','2':'wave','3':'strobe','4':'laser','5':'firework','6':'galaxy','7':'matrix'};
  if (keys[e.key]) {
    const btn = document.querySelector(`.pattern-btn[data-pattern="${keys[e.key]}"]`);
    if (btn) btn.click();
  }
  if (e.key === ' ') { e.preventDefault(); document.getElementById('musicBtn').click(); }
});

// Initial fireworks
for (let i = 0; i < 3; i++) setTimeout(spawnFirework, i * 400);
</script>
