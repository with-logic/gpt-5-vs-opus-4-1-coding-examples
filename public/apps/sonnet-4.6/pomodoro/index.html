<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomodoro</title>
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a24;
    --surface2: #22223a;
    --border: #2e2e4a;
    --text: #f0f0ff;
    --text2: #9090b8;
    --accent: #ff6b6b;
    --accent2: #ff9a3c;
    --green: #6bffb8;
    --blue: #6bb8ff;
    --purple: #b86bff;
    --glow: rgba(255,107,107,0.3);
    --radius: 16px;
    --shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .light {
    --bg: #f5f5f8;
    --surface: #ffffff;
    --surface2: #eeeef5;
    --border: #d0d0e8;
    --text: #1a1a2e;
    --text2: #6060a0;
    --glow: rgba(255,107,107,0.15);
    --shadow: 0 8px 32px rgba(0,0,0,0.12);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    transition: background 0.3s, color 0.3s;
  }
  header {
    width: 100%;
    max-width: 800px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 28px;
    padding: 0 4px;
  }
  .logo {
    font-size: 1.6rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.5px;
  }
  .logo span { font-size: 1.4rem; }
  .header-controls { display: flex; gap: 10px; }
  .btn-icon {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text2);
    border-radius: 10px;
    width: 40px; height: 40px;
    cursor: pointer;
    font-size: 1.1rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .btn-icon:hover { color: var(--text); border-color: var(--accent); background: var(--surface2); }
  .main { width: 100%; max-width: 800px; display: flex; flex-direction: column; gap: 20px; }
  .timer-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px 28px;
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
  }
  .timer-card::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, var(--glow) 0%, transparent 70%);
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .mode-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    background: var(--surface2);
    border-radius: 12px;
    padding: 4px;
  }
  .mode-tab {
    flex: 1;
    padding: 8px 12px;
    border: none;
    border-radius: 9px;
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 600;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .mode-tab.active {
    background: var(--accent);
    color: white;
    box-shadow: 0 2px 12px var(--glow);
  }
  .timer-display {
    text-align: center;
    margin: 8px 0 28px;
    position: relative;
  }
  .timer-ring-container {
    position: relative;
    width: 220px;
    height: 220px;
    margin: 0 auto 20px;
  }
  .timer-ring-container svg {
    transform: rotate(-90deg);
    width: 100%; height: 100%;
  }
  .ring-bg { fill: none; stroke: var(--surface2); stroke-width: 8; }
  .ring-progress {
    fill: none;
    stroke-width: 8;
    stroke-linecap: round;
    stroke: var(--accent);
    transition: stroke-dashoffset 0.5s ease, stroke 0.3s;
    filter: drop-shadow(0 0 6px var(--accent));
  }
  .timer-time {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 3.2rem;
    font-weight: 800;
    letter-spacing: -2px;
    font-variant-numeric: tabular-nums;
  }
  .timer-label {
    text-align: center;
    color: var(--text2);
    font-size: 0.9rem;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: -8px;
    margin-bottom: 4px;
  }
  .session-dots {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 24px;
  }
  .session-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--surface2);
    border: 2px solid var(--border);
    transition: all 0.3s;
  }
  .session-dot.done { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 8px var(--accent); }
  .session-dot.current { background: var(--accent2); border-color: var(--accent2); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 4px var(--accent2); } 50% { box-shadow: 0 0 12px var(--accent2); } }
  .timer-controls { display: flex; gap: 12px; justify-content: center; align-items: center; }
  .btn-main {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    border: none;
    border-radius: 50px;
    padding: 14px 48px;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 20px var(--glow);
    letter-spacing: 0.5px;
  }
  .btn-main:hover { transform: translateY(-2px); box-shadow: 0 8px 28px var(--glow); }
  .btn-main:active { transform: translateY(0); }
  .btn-secondary {
    background: var(--surface2);
    color: var(--text2);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 14px 24px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-secondary:hover { color: var(--text); border-color: var(--accent); }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px;
    box-shadow: var(--shadow);
  }
  .card h3 {
    font-size: 0.8rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text2);
    margin-bottom: 16px;
  }
  .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .setting-item label {
    display: block;
    font-size: 0.78rem;
    color: var(--text2);
    font-weight: 600;
    margin-bottom: 6px;
    letter-spacing: 0.5px;
  }
  .setting-item input[type="number"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text);
    font-size: 0.95rem;
    font-weight: 600;
    outline: none;
    transition: border-color 0.2s;
  }
  .setting-item input[type="number"]:focus { border-color: var(--accent); }
  .toggle-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .toggle-row:last-child { border-bottom: none; }
  .toggle-label { font-size: 0.88rem; font-weight: 600; }
  .toggle {
    width: 42px; height: 24px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    position: relative;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .toggle.on { background: var(--accent); border-color: var(--accent); }
  .toggle::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 18px; height: 18px;
    background: white;
    border-radius: 50%;
    transition: transform 0.2s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }
  .toggle.on::after { transform: translateX(18px); }
  .sessions-list { display: flex; flex-direction: column; gap: 8px; max-height: 200px; overflow-y: auto; }
  .session-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    background: var(--surface2);
    border-radius: 8px;
    font-size: 0.82rem;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
  .session-dot-sm {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .session-item .time { color: var(--text2); margin-left: auto; font-variant-numeric: tabular-nums; }
  .session-type-badge {
    font-size: 0.7rem;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 6px;
    margin-left: 4px;
  }
  .chart-container { width: 100%; }
  .chart-bars {
    display: flex;
    align-items: flex-end;
    gap: 6px;
    height: 100px;
    padding-bottom: 4px;
  }
  .chart-bar-group { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .chart-bar {
    width: 100%;
    border-radius: 4px 4px 0 0;
    min-height: 4px;
    transition: height 0.5s ease;
    position: relative;
    cursor: pointer;
  }
  .chart-bar:hover::after {
    content: attr(data-val);
    position: absolute;
    top: -24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 2px 7px;
    font-size: 0.72rem;
    font-weight: 700;
    white-space: nowrap;
    z-index: 10;
  }
  .chart-label { font-size: 0.68rem; color: var(--text2); font-weight: 600; }
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-top: 4px;
  }
  .stat-item {
    text-align: center;
    background: var(--surface2);
    border-radius: 10px;
    padding: 12px 8px;
  }
  .stat-value { font-size: 1.5rem; font-weight: 800; }
  .stat-label { font-size: 0.7rem; color: var(--text2); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
  .progress-ring-track { fill: none; stroke: var(--surface2); }
  .progress-ring-fill { fill: none; stroke-linecap: round; transition: stroke-dashoffset 0.5s ease; }

  /* Notification toast */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 4px solid var(--accent);
    border-radius: 12px;
    padding: 14px 20px;
    box-shadow: var(--shadow);
    font-weight: 600;
    font-size: 0.9rem;
    animation: toastIn 0.3s ease;
    z-index: 100;
  }
  @keyframes toastIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .toast.hide { animation: toastOut 0.3s ease forwards; }
  @keyframes toastOut { to { opacity: 0; transform: translateY(20px); } }
  .motivational {
    text-align: center;
    font-size: 0.9rem;
    color: var(--text2);
    font-style: italic;
    font-weight: 500;
    padding: 6px 0 2px;
    min-height: 28px;
    transition: opacity 0.4s;
  }
  .sessions-list::-webkit-scrollbar { width: 4px; }
  .sessions-list::-webkit-scrollbar-track { background: var(--surface2); border-radius: 2px; }
  .sessions-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .full-width { grid-column: 1 / -1; }
  .running .ring-progress { animation: none; }

  @media (max-width: 600px) {
    .grid-2 { grid-template-columns: 1fr; }
    .settings-grid { grid-template-columns: 1fr 1fr; }
    .timer-time { font-size: 2.6rem; }
    .timer-ring-container { width: 180px; height: 180px; }
  }
</style>
</head>
<body>
<header>
  <div class="logo"><span>🍅</span> Pomodoro</div>
  <div class="header-controls">
    <button class="btn-icon" id="soundToggle" title="Toggle sound">🔔</button>
    <button class="btn-icon" id="darkToggle" title="Toggle dark/light mode">☀️</button>
  </div>
</header>

<div class="main">
  <!-- Timer Card -->
  <div class="timer-card" id="timerCard">
    <div class="mode-tabs">
      <button class="mode-tab active" data-mode="focus">Focus</button>
      <button class="mode-tab" data-mode="shortBreak">Short Break</button>
      <button class="mode-tab" data-mode="longBreak">Long Break</button>
    </div>
    <div class="timer-display">
      <div class="timer-ring-container">
        <svg viewBox="0 0 220 220" id="timerSvg">
          <circle class="ring-bg" cx="110" cy="110" r="95"/>
          <circle class="ring-progress" id="ringProgress" cx="110" cy="110" r="95"
            stroke-dasharray="597"
            stroke-dashoffset="0"/>
        </svg>
        <div class="timer-time" id="timerDisplay">25:00</div>
      </div>
      <div class="timer-label" id="timerLabel">FOCUS TIME</div>
      <div class="motivational" id="motivational">Ready to crush it? Let's go! 💪</div>
    </div>
    <div class="session-dots" id="sessionDots"></div>
    <div class="timer-controls">
      <button class="btn-secondary" id="resetBtn">↺ Reset</button>
      <button class="btn-main" id="startBtn">▶ Start</button>
      <button class="btn-secondary" id="skipBtn">Skip ›</button>
    </div>
  </div>

  <!-- Stats + Settings Grid -->
  <div class="grid-2">
    <!-- Today's Stats -->
    <div class="card">
      <h3>Today's Stats</h3>
      <div class="stats-row">
        <div class="stat-item">
          <div class="stat-value" id="statPomodoros" style="color:var(--accent)">0</div>
          <div class="stat-label">Pomodoros</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="statFocusTime" style="color:var(--green)">0m</div>
          <div class="stat-label">Focus Time</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="statStreak" style="color:var(--accent2)">0</div>
          <div class="stat-label">Streak</div>
        </div>
      </div>
    </div>

    <!-- Settings -->
    <div class="card">
      <h3>Durations (min)</h3>
      <div class="settings-grid">
        <div class="setting-item">
          <label>Focus</label>
          <input type="number" id="focusDuration" value="25" min="1" max="99">
        </div>
        <div class="setting-item">
          <label>Short Break</label>
          <input type="number" id="shortBreakDuration" value="5" min="1" max="99">
        </div>
        <div class="setting-item">
          <label>Long Break</label>
          <input type="number" id="longBreakDuration" value="15" min="1" max="99">
        </div>
        <div class="setting-item">
          <label>Long Break Every</label>
          <input type="number" id="longBreakInterval" value="4" min="1" max="10">
        </div>
      </div>
      <div style="margin-top:14px; display:flex; flex-direction:column; gap:0">
        <div class="toggle-row">
          <span class="toggle-label">Auto-start breaks</span>
          <div class="toggle" id="autoBreakToggle"></div>
        </div>
        <div class="toggle-row">
          <span class="toggle-label">Auto-start pomodoros</span>
          <div class="toggle" id="autoPomodoroToggle"></div>
        </div>
      </div>
    </div>

    <!-- Chart -->
    <div class="card full-width">
      <h3>Weekly Focus (sessions)</h3>
      <div class="chart-bars" id="chartBars"></div>
    </div>

    <!-- Session Log -->
    <div class="card full-width">
      <h3>Session Log</h3>
      <div class="sessions-list" id="sessionsList">
        <div style="color:var(--text2); font-size:0.85rem; text-align:center; padding:16px">No sessions yet — start your first Pomodoro!</div>
      </div>
    </div>
  </div>
</div>

<script>
// === STATE ===
const state = {
  mode: 'focus',
  running: false,
  timeLeft: 25 * 60,
  totalTime: 25 * 60,
  pomodoroCount: 0,
  sessionCount: 0,
  sessions: [],
  autoBreak: false,
  autoPomodoro: false,
  soundOn: true,
  darkMode: true,
  interval: null,
  focusMinutesToday: 0,
  streak: 0,
  weekData: [0,0,0,0,0,0,0],
};

const MODES = {
  focus: { label: 'FOCUS TIME', color: 'var(--accent)', glow: 'rgba(255,107,107,0.3)', emoji: '🍅' },
  shortBreak: { label: 'SHORT BREAK', color: 'var(--green)', glow: 'rgba(107,255,184,0.3)', emoji: '☕' },
  longBreak: { label: 'LONG BREAK', color: 'var(--blue)', glow: 'rgba(107,184,255,0.3)', emoji: '🌿' },
};

const QUOTES = [
  "Ready to crush it? Let's go! 💪",
  "Deep work = deep results. 🔥",
  "Focus is a superpower. Activate it! ⚡",
  "One pomodoro at a time. 🍅",
  "You've got this. Stay locked in! 🎯",
  "The secret? Start. 🚀",
  "Small steps, big wins. ✨",
  "Distractions off, mode: beast. 🦁",
];

const BREAK_QUOTES = [
  "Great work! Recharge your brain. ☕",
  "Well earned break! Rest up. 😌",
  "Stretch, breathe, hydrate. 💧",
  "Your brain thanks you. 🧠",
  "Rest is part of the process. 🌸",
];

// Load from localStorage
function loadData() {
  try {
    const saved = localStorage.getItem('pomodoro_v2');
    if (saved) {
      const d = JSON.parse(saved);
      const today = new Date().toDateString();
      if (d.date === today) {
        state.pomodoroCount = d.pomodoroCount || 0;
        state.focusMinutesToday = d.focusMinutesToday || 0;
        state.streak = d.streak || 0;
        state.sessions = d.sessions || [];
        state.weekData = d.weekData || [0,0,0,0,0,0,0];
      } else {
        // New day — shift week data
        const prev = d.weekData || [0,0,0,0,0,0,0];
        prev.shift();
        prev.push(d.pomodoroCount || 0);
        state.weekData = prev;
        state.streak = d.streak || 0;
      }
      state.autoBreak = d.autoBreak || false;
      state.autoPomodoro = d.autoPomodoro || false;
      state.soundOn = d.soundOn !== undefined ? d.soundOn : true;
      state.darkMode = d.darkMode !== undefined ? d.darkMode : true;
      // Load settings
      if (d.focusDuration) document.getElementById('focusDuration').value = d.focusDuration;
      if (d.shortBreakDuration) document.getElementById('shortBreakDuration').value = d.shortBreakDuration;
      if (d.longBreakDuration) document.getElementById('longBreakDuration').value = d.longBreakDuration;
      if (d.longBreakInterval) document.getElementById('longBreakInterval').value = d.longBreakInterval;
    }
  } catch(e) {}
}

function saveData() {
  try {
    localStorage.setItem('pomodoro_v2', JSON.stringify({
      date: new Date().toDateString(),
      pomodoroCount: state.pomodoroCount,
      focusMinutesToday: state.focusMinutesToday,
      streak: state.streak,
      sessions: state.sessions.slice(-50),
      weekData: state.weekData,
      autoBreak: state.autoBreak,
      autoPomodoro: state.autoPomodoro,
      soundOn: state.soundOn,
      darkMode: state.darkMode,
      focusDuration: document.getElementById('focusDuration').value,
      shortBreakDuration: document.getElementById('shortBreakDuration').value,
      longBreakDuration: document.getElementById('longBreakDuration').value,
      longBreakInterval: document.getElementById('longBreakInterval').value,
    }));
  } catch(e) {}
}

// === DOM refs ===
const timerDisplay = document.getElementById('timerDisplay');
const timerLabel = document.getElementById('timerLabel');
const startBtn = document.getElementById('startBtn');
const resetBtn = document.getElementById('resetBtn');
const skipBtn = document.getElementById('skipBtn');
const ringProgress = document.getElementById('ringProgress');
const sessionDots = document.getElementById('sessionDots');
const sessionsList = document.getElementById('sessionsList');
const motivational = document.getElementById('motivational');
const chartBars = document.getElementById('chartBars');
const CIRCUMFERENCE = 597;

function getDuration(mode) {
  const map = {
    focus: +document.getElementById('focusDuration').value || 25,
    shortBreak: +document.getElementById('shortBreakDuration').value || 5,
    longBreak: +document.getElementById('longBreakDuration').value || 15,
  };
  return map[mode] * 60;
}

function setMode(mode, autoStart = false) {
  state.mode = mode;
  state.running = false;
  clearInterval(state.interval);
  state.timeLeft = getDuration(mode);
  state.totalTime = state.timeLeft;

  document.querySelectorAll('.mode-tab').forEach(t => t.classList.toggle('active', t.dataset.mode === mode));
  timerLabel.textContent = MODES[mode].label;
  const card = document.getElementById('timerCard');
  card.style.setProperty('--glow', MODES[mode].glow);
  ringProgress.style.stroke = MODES[mode].color;
  ringProgress.style.filter = `drop-shadow(0 0 6px ${MODES[mode].color})`;

  motivational.textContent = mode === 'focus'
    ? QUOTES[Math.floor(Math.random() * QUOTES.length)]
    : BREAK_QUOTES[Math.floor(Math.random() * BREAK_QUOTES.length)];

  updateDisplay();
  startBtn.textContent = '▶ Start';
  updateSessionDots();

  if (autoStart) {
    setTimeout(() => startTimer(), 1000);
  }
}

function updateDisplay() {
  const m = Math.floor(state.timeLeft / 60);
  const s = state.timeLeft % 60;
  timerDisplay.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  document.title = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')} — Pomodoro`;

  const pct = state.timeLeft / state.totalTime;
  const offset = CIRCUMFERENCE * (1 - pct);
  ringProgress.setAttribute('stroke-dashoffset', offset);
}

function updateSessionDots() {
  const interval = +document.getElementById('longBreakInterval').value || 4;
  sessionDots.innerHTML = '';
  for (let i = 0; i < interval; i++) {
    const dot = document.createElement('div');
    dot.className = 'session-dot';
    const cyclePos = state.pomodoroCount % interval;
    if (i < cyclePos) dot.classList.add('done');
    else if (i === cyclePos && state.mode === 'focus') dot.classList.add('current');
    sessionDots.appendChild(dot);
  }
}

function updateStats() {
  document.getElementById('statPomodoros').textContent = state.pomodoroCount;
  const mins = state.focusMinutesToday;
  document.getElementById('statFocusTime').textContent = mins >= 60
    ? `${(mins/60).toFixed(1)}h`
    : `${mins}m`;
  document.getElementById('statStreak').textContent = state.streak;
}

function addSessionLog(type, duration) {
  const now = new Date();
  const timeStr = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  const item = { type, duration, time: timeStr };
  state.sessions.unshift(item);

  renderSessions();
  updateChart();
  updateStats();
  saveData();
}

function renderSessions() {
  if (state.sessions.length === 0) {
    sessionsList.innerHTML = '<div style="color:var(--text2); font-size:0.85rem; text-align:center; padding:16px">No sessions yet — start your first Pomodoro!</div>';
    return;
  }
  sessionsList.innerHTML = state.sessions.slice(0, 20).map(s => {
    const colors = { focus: 'var(--accent)', shortBreak: 'var(--green)', longBreak: 'var(--blue)' };
    const labels = { focus: 'Focus', shortBreak: 'Short Break', longBreak: 'Long Break' };
    const color = colors[s.type] || 'var(--accent)';
    return `<div class="session-item">
      <div class="session-dot-sm" style="background:${color}"></div>
      <span>${labels[s.type] || s.type}</span>
      <span style="color:var(--text2); font-size:0.78rem">${s.duration}min</span>
      <span class="time">${s.time}</span>
    </div>`;
  }).join('');
}

function updateChart() {
  const days = ['S','M','T','W','T','F','S'];
  const today = new Date().getDay();
  const maxVal = Math.max(...state.weekData, state.pomodoroCount, 1);
  const colors = ['var(--accent)', 'var(--accent2)', 'var(--green)', 'var(--blue)', 'var(--purple)', 'var(--accent)', 'var(--accent2)'];

  chartBars.innerHTML = '';
  state.weekData.forEach((val, i) => {
    const dayIdx = (today - 6 + i + 7) % 7;
    const isToday = i === 6;
    const displayVal = isToday ? state.pomodoroCount : val;
    const pct = displayVal / maxVal;
    const h = Math.max(pct * 90, 4);
    const color = isToday ? 'var(--accent)' : colors[i];
    const group = document.createElement('div');
    group.className = 'chart-bar-group';
    group.innerHTML = `
      <div class="chart-bar" style="height:${h}px; background:${color}; opacity:${isToday ? 1 : 0.5}" data-val="${displayVal}"></div>
      <div class="chart-label" style="${isToday ? 'color:var(--text); font-weight:800' : ''}">${days[dayIdx]}</div>
    `;
    chartBars.appendChild(group);
  });
}

// === Audio ===
function playBeep(type = 'end') {
  if (!state.soundOn) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const patterns = {
      end: [[880, 0, 0.15], [880, 0.2, 0.15], [1100, 0.4, 0.3]],
      start: [[440, 0, 0.08], [550, 0.12, 0.08]],
      skip: [[330, 0, 0.1]],
    };
    const seq = patterns[type] || patterns.end;
    seq.forEach(([freq, delay, dur]) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0, ctx.currentTime + delay);
      gain.gain.linearRampToValueAtTime(0.3, ctx.currentTime + delay + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + dur);
      osc.start(ctx.currentTime + delay);
      osc.stop(ctx.currentTime + delay + dur + 0.05);
    });
  } catch(e) {}
}

// === Timer logic ===
function startTimer() {
  if (state.running) return;
  state.running = true;
  startBtn.textContent = '⏸ Pause';
  playBeep('start');
  state.interval = setInterval(() => {
    state.timeLeft--;
    updateDisplay();
    if (state.timeLeft <= 0) {
      clearInterval(state.interval);
      state.running = false;
      onTimerEnd();
    }
  }, 1000);
}

function pauseTimer() {
  state.running = false;
  clearInterval(state.interval);
  startBtn.textContent = '▶ Resume';
}

function onTimerEnd() {
  playBeep('end');
  const durationMins = Math.round(state.totalTime / 60);

  if (state.mode === 'focus') {
    state.pomodoroCount++;
    state.focusMinutesToday += durationMins;
    state.streak++;
    addSessionLog('focus', durationMins);
    updateSessionDots();

    const interval = +document.getElementById('longBreakInterval').value || 4;
    showToast(`🍅 Pomodoro #${state.pomodoroCount} done! Time for a break.`);

    if (state.pomodoroCount % interval === 0) {
      setMode('longBreak', state.autoBreak);
    } else {
      setMode('shortBreak', state.autoBreak);
    }
  } else {
    const durs = { shortBreak: durationMins, longBreak: durationMins };
    addSessionLog(state.mode, durationMins);
    showToast(`${state.mode === 'shortBreak' ? '☕' : '🌿'} Break done! Back to work!`);
    setMode('focus', state.autoPomodoro);
  }
  saveData();
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => {
    t.classList.add('hide');
    setTimeout(() => t.remove(), 400);
  }, 3500);
}

// === Event Listeners ===
startBtn.addEventListener('click', () => {
  if (state.running) pauseTimer(); else startTimer();
});

resetBtn.addEventListener('click', () => {
  clearInterval(state.interval);
  state.running = false;
  state.timeLeft = getDuration(state.mode);
  state.totalTime = state.timeLeft;
  updateDisplay();
  startBtn.textContent = '▶ Start';
});

skipBtn.addEventListener('click', () => {
  clearInterval(state.interval);
  state.running = false;
  playBeep('skip');
  const interval = +document.getElementById('longBreakInterval').value || 4;
  if (state.mode === 'focus') {
    if (state.pomodoroCount % interval === interval - 1) setMode('longBreak');
    else setMode('shortBreak');
  } else {
    setMode('focus');
  }
});

document.querySelectorAll('.mode-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    clearInterval(state.interval);
    state.running = false;
    setMode(tab.dataset.mode);
  });
});

['focusDuration','shortBreakDuration','longBreakDuration','longBreakInterval'].forEach(id => {
  document.getElementById(id).addEventListener('change', () => {
    if (!state.running) {
      state.timeLeft = getDuration(state.mode);
      state.totalTime = state.timeLeft;
      updateDisplay();
    }
    updateSessionDots();
    saveData();
  });
});

document.getElementById('autoBreakToggle').addEventListener('click', function() {
  state.autoBreak = !state.autoBreak;
  this.classList.toggle('on', state.autoBreak);
  saveData();
});

document.getElementById('autoPomodoroToggle').addEventListener('click', function() {
  state.autoPomodoro = !state.autoPomodoro;
  this.classList.toggle('on', state.autoPomodoro);
  saveData();
});

document.getElementById('soundToggle').addEventListener('click', function() {
  state.soundOn = !state.soundOn;
  this.textContent = state.soundOn ? '🔔' : '🔕';
  saveData();
});

document.getElementById('darkToggle').addEventListener('click', function() {
  state.darkMode = !state.darkMode;
  document.body.classList.toggle('light', !state.darkMode);
  this.textContent = state.darkMode ? '☀️' : '🌙';
  saveData();
});

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') { e.preventDefault(); startBtn.click(); }
  if (e.code === 'KeyR') resetBtn.click();
  if (e.code === 'KeyS') skipBtn.click();
});

// === Init ===
loadData();

// Apply saved settings
if (!state.darkMode) {
  document.body.classList.add('light');
  document.getElementById('darkToggle').textContent = '🌙';
}
if (!state.soundOn) document.getElementById('soundToggle').textContent = '🔕';
if (state.autoBreak) document.getElementById('autoBreakToggle').classList.add('on');
if (state.autoPomodoro) document.getElementById('autoPomodoroToggle').classList.add('on');

state.timeLeft = getDuration('focus');
state.totalTime = state.timeLeft;
updateDisplay();
updateSessionDots();
updateStats();
renderSessions();
updateChart();
</script>
</body>
</html>
