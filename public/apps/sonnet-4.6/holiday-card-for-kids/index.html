<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎄 Happy Holidays! 🎄</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
    background: linear-gradient(180deg, #0a1628 0%, #1a2a4a 40%, #2d1b5e 100%);
    min-height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  /* ===== SNOW CANVAS ===== */
  #snowCanvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1;
  }

  /* ===== STARS ===== */
  .stars {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }
  .star {
    position: absolute;
    background: #fff;
    border-radius: 50%;
    animation: twinkle var(--dur, 2s) ease-in-out infinite alternate;
  }
  @keyframes twinkle {
    from { opacity: 0.2; transform: scale(0.8); }
    to   { opacity: 1;   transform: scale(1.2); }
  }

  /* ===== MAIN CARD ===== */
  #card {
    position: relative;
    width: 820px;
    min-height: 560px;
    margin: 30px auto;
    background: linear-gradient(160deg, #1a3a2a 0%, #0d2b1a 60%, #0a1f12 100%);
    border-radius: 28px;
    border: 4px solid #2ecc71;
    box-shadow: 0 0 60px rgba(46,204,113,0.3), 0 0 120px rgba(46,204,113,0.1), inset 0 0 40px rgba(0,0,0,0.4);
    overflow: hidden;
    z-index: 10;
  }

  /* Twinkling lights string */
  .lights-string {
    display: flex;
    justify-content: space-around;
    padding: 8px 20px;
    background: rgba(0,0,0,0.2);
    position: relative;
  }
  .lights-string::before {
    content: '';
    position: absolute;
    top: 18px; left: 0; right: 0;
    height: 2px;
    background: #555;
    z-index: 0;
  }
  .bulb {
    width: 14px; height: 20px;
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    position: relative;
    z-index: 1;
    animation: glow-bulb 1.5s ease-in-out infinite alternate;
    cursor: pointer;
    filter: drop-shadow(0 0 6px currentColor);
  }
  .bulb::before {
    content: '';
    position: absolute;
    top: -5px; left: 50%;
    transform: translateX(-50%);
    width: 6px; height: 6px;
    background: #888;
    border-radius: 2px;
  }
  .b-red    { color: #ff4444; background: #ff4444; animation-delay: 0s; }
  .b-yellow { color: #ffdd00; background: #ffdd00; animation-delay: 0.3s; }
  .b-blue   { color: #44aaff; background: #44aaff; animation-delay: 0.6s; }
  .b-green  { color: #44ff88; background: #44ff88; animation-delay: 0.9s; }
  .b-pink   { color: #ff66cc; background: #ff66cc; animation-delay: 1.2s; }
  .b-orange { color: #ff8844; background: #ff8844; animation-delay: 0.15s; }
  .b-purple { color: #cc66ff; background: #cc66ff; animation-delay: 0.45s; }
  @keyframes glow-bulb {
    from { opacity: 0.3; filter: drop-shadow(0 0 2px currentColor); }
    to   { opacity: 1;   filter: drop-shadow(0 0 10px currentColor) drop-shadow(0 0 20px currentColor); }
  }

  /* ===== DROP ZONE ===== */
  #dropZone {
    position: relative;
    width: 100%;
    height: 400px;
    overflow: hidden;
  }

  /* ===== SCENE ELEMENTS ===== */
  .ground {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 80px;
    background: linear-gradient(180deg, #e8f4f8 0%, #cce8f4 50%, #b8d8e8 100%);
    border-radius: 0 0 24px 24px;
  }
  .ground::before {
    content: '';
    position: absolute;
    top: -20px; left: -10%; right: -10%;
    height: 40px;
    background: #e8f4f8;
    border-radius: 50%;
  }

  /* ===== CHRISTMAS TREE ===== */
  .tree-container {
    position: absolute;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    cursor: pointer;
    transition: transform 0.1s;
  }
  .tree-container:hover { transform: translateX(-50%) scale(1.02); }
  .tree-container:active { transform: translateX(-50%) scale(0.98); }
  .tree-star {
    position: absolute;
    top: -28px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 32px;
    animation: star-spin 3s ease-in-out infinite;
    filter: drop-shadow(0 0 10px gold);
    z-index: 5;
  }
  @keyframes star-spin {
    0%,100% { transform: translateX(-50%) rotate(-10deg) scale(1); filter: drop-shadow(0 0 10px gold); }
    50%      { transform: translateX(-50%) rotate(10deg) scale(1.2); filter: drop-shadow(0 0 20px gold) drop-shadow(0 0 40px orange); }
  }
  .tree-tier {
    position: relative;
    margin: 0 auto;
  }
  .t1 { width: 60px;  height: 50px;  clip-path: polygon(50% 0%, 0% 100%, 100% 100%); background: linear-gradient(180deg, #2ecc71, #1a7a40); }
  .t2 { width: 100px; height: 65px;  clip-path: polygon(50% 0%, 0% 100%, 100% 100%); background: linear-gradient(180deg, #27ae60, #145c30); margin-top: -20px; }
  .t3 { width: 140px; height: 80px;  clip-path: polygon(50% 0%, 0% 100%, 100% 100%); background: linear-gradient(180deg, #229954, #0d4a22); margin-top: -25px; }
  .t4 { width: 180px; height: 95px;  clip-path: polygon(50% 0%, 0% 100%, 100% 100%); background: linear-gradient(180deg, #1e8449, #0a3a1a); margin-top: -30px; }
  .tree-trunk {
    width: 30px; height: 40px;
    background: linear-gradient(180deg, #8B4513, #5a2d0c);
    margin: 0 auto;
    border-radius: 2px;
  }

  /* Ornaments on tree */
  .ornament {
    position: absolute;
    border-radius: 50%;
    animation: ornament-sway 2s ease-in-out infinite alternate;
    cursor: pointer;
    box-shadow: inset -2px -2px 4px rgba(0,0,0,0.3), inset 2px 2px 4px rgba(255,255,255,0.3);
  }
  @keyframes ornament-sway {
    from { transform: translateX(-2px); }
    to   { transform: translateX(2px); }
  }

  /* ===== DRAGGABLE ITEMS PALETTE ===== */
  #palette {
    position: relative;
    background: rgba(0,0,0,0.3);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-top: 2px solid rgba(46,204,113,0.3);
    flex-wrap: wrap;
  }
  #palette-label {
    color: #adf5d0;
    font-size: 12px;
    font-weight: bold;
    letter-spacing: 1px;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .palette-item {
    font-size: 28px;
    cursor: grab;
    transition: transform 0.2s;
    position: relative;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
    flex-shrink: 0;
  }
  .palette-item:hover {
    transform: scale(1.3) translateY(-4px);
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.6));
  }
  .palette-item:active { cursor: grabbing; transform: scale(1.1); }

  /* ===== PLACED ITEMS ===== */
  .placed-item {
    position: absolute;
    font-size: 32px;
    cursor: grab;
    transition: filter 0.2s;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5));
    z-index: 20;
    animation: pop-in 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    touch-action: none;
  }
  .placed-item:hover { filter: drop-shadow(0 4px 12px rgba(255,200,0,0.6)); transform: scale(1.1); }
  .placed-item:active { cursor: grabbing; }
  .placed-item.wiggle { animation: wiggle 0.4s ease; }
  @keyframes pop-in {
    from { transform: scale(0) rotate(-20deg); opacity: 0; }
    to   { transform: scale(1) rotate(0deg);   opacity: 1; }
  }
  @keyframes wiggle {
    0%,100% { transform: rotate(0deg); }
    25% { transform: rotate(-15deg) scale(1.2); }
    75% { transform: rotate(15deg)  scale(1.2); }
  }

  /* ===== MESSAGE BANNER ===== */
  #messageBanner {
    text-align: center;
    padding: 6px 20px;
    background: rgba(0,0,0,0.25);
    border-bottom: 2px solid rgba(255,200,0,0.3);
  }
  .banner-text {
    font-size: 26px;
    font-weight: 900;
    letter-spacing: 3px;
    background: linear-gradient(90deg, #ff6b6b, #ffd700, #51cf66, #74c0fc, #cc5de8, #ff6b6b);
    background-size: 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: rainbow-shift 3s linear infinite;
    text-shadow: none;
  }
  @keyframes rainbow-shift {
    from { background-position: 0% 50%; }
    to   { background-position: 200% 50%; }
  }
  .sub-text {
    font-size: 13px;
    color: #adf5d0;
    letter-spacing: 2px;
    margin-top: 2px;
  }

  /* ===== HOUSES ===== */
  .house {
    position: absolute;
    bottom: 60px;
    cursor: pointer;
  }
  .house-body {
    width: 60px; height: 45px;
    background: linear-gradient(180deg, #c0392b, #922b21);
    position: relative;
  }
  .house-roof {
    width: 0; height: 0;
    border-left: 38px solid transparent;
    border-right: 38px solid transparent;
    border-bottom: 30px solid #7b241c;
    position: absolute;
    top: -28px; left: -8px;
  }
  .house-door {
    width: 14px; height: 22px;
    background: #f39c12;
    position: absolute;
    bottom: 0; left: 50%; transform: translateX(-50%);
    border-radius: 7px 7px 0 0;
  }
  .house-window {
    width: 14px; height: 14px;
    background: #ffeaa7;
    position: absolute;
    top: 8px;
    border-radius: 2px;
    box-shadow: 0 0 8px #ffeaa7;
    animation: window-flicker 2s ease-in-out infinite alternate;
  }
  @keyframes window-flicker {
    from { opacity: 0.7; }
    to   { opacity: 1; box-shadow: 0 0 15px #ffd32a; }
  }
  .hw-left  { left: 5px; }
  .hw-right { right: 5px; }
  .house-snow {
    position: absolute;
    top: -8px; left: -4px; right: -4px;
    height: 12px;
    background: #e8f4f8;
    border-radius: 10px 10px 0 0;
  }
  .chimney {
    position: absolute;
    top: -45px; right: 8px;
    width: 14px; height: 28px;
    background: #7b241c;
    border-radius: 2px 2px 0 0;
  }
  .smoke {
    position: absolute;
    top: -30px; left: 50%;
    transform: translateX(-50%);
    font-size: 18px;
    animation: smoke-rise 2s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes smoke-rise {
    0%   { opacity: 0; transform: translateX(-50%) translateY(0) scale(0.5); }
    50%  { opacity: 0.7; }
    100% { opacity: 0; transform: translateX(-50%) translateY(-40px) scale(1.5); }
  }

  /* ===== SNOWMEN ===== */
  .snowman {
    position: absolute;
    bottom: 60px;
    cursor: pointer;
  }
  .snowman-head {
    width: 30px; height: 30px;
    background: radial-gradient(circle at 35% 35%, #ffffff, #d5e8ef);
    border-radius: 50%;
    position: relative;
    margin: 0 auto;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }
  .snowman-body {
    width: 44px; height: 44px;
    background: radial-gradient(circle at 35% 35%, #ffffff, #c8dde8);
    border-radius: 50%;
    position: relative;
    margin: -8px auto 0;
    box-shadow: 0 3px 8px rgba(0,0,0,0.2);
  }
  .snowman-scarf {
    position: absolute;
    top: 4px; left: -4px; right: -4px;
    height: 10px;
    background: #e74c3c;
    border-radius: 5px;
  }
  .snowman-scarf::after {
    content: '';
    position: absolute;
    right: 6px; bottom: -12px;
    width: 10px; height: 18px;
    background: #e74c3c;
    border-radius: 0 0 4px 4px;
  }
  .snowman-hat {
    position: absolute;
    top: -22px; left: 50%; transform: translateX(-50%);
    width: 24px; height: 20px;
    background: #2c3e50;
    border-radius: 2px;
  }
  .snowman-hat::before {
    content: '';
    position: absolute;
    bottom: -4px; left: -6px; right: -6px;
    height: 6px;
    background: #2c3e50;
    border-radius: 2px;
  }
  .snowman-eyes {
    position: absolute;
    top: 8px;
    display: flex;
    justify-content: space-around;
    width: 100%;
    padding: 0 8px;
  }
  .snowman-eye {
    width: 5px; height: 5px;
    background: #2c3e50;
    border-radius: 50%;
  }
  .snowman-nose {
    position: absolute;
    top: 15px; left: 50%; transform: translateX(-50%);
    width: 0; height: 0;
    border-top: 4px solid transparent;
    border-bottom: 4px solid transparent;
    border-left: 10px solid #e67e22;
  }
  .snowman-smile {
    position: absolute;
    bottom: 8px; left: 50%; transform: translateX(-50%);
    width: 14px; height: 7px;
    border-bottom: 3px solid #2c3e50;
    border-radius: 0 0 10px 10px;
  }
  .snowman-buttons {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    top: 8px; left: 50%; transform: translateX(-50%);
  }
  .snowman-button {
    width: 6px; height: 6px;
    background: #2c3e50;
    border-radius: 50%;
  }
  .snowman-arms {
    position: absolute;
    top: 14px; left: 0; right: 0;
  }
  .arm-left, .arm-right {
    position: absolute;
    width: 22px; height: 3px;
    background: #8B4513;
    border-radius: 2px;
  }
  .arm-left  { left: -18px; top: 0; transform: rotate(30deg); }
  .arm-right { right: -18px; top: 0; transform: rotate(-30deg); }
  .snowman-base {
    position: absolute;
    bottom: -6px; left: 50%; transform: translateX(-50%);
    width: 50px; height: 10px;
    background: rgba(0,0,0,0.1);
    border-radius: 50%;
  }

  /* ===== REINDEER ===== */
  .reindeer {
    position: absolute;
    bottom: 62px;
    font-size: 40px;
    animation: reindeer-bounce 1s ease-in-out infinite alternate;
    cursor: pointer;
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
  }
  @keyframes reindeer-bounce {
    from { transform: translateY(0); }
    to   { transform: translateY(-8px); }
  }

  /* ===== GIFT BOXES ===== */
  .gift {
    position: absolute;
    bottom: 60px;
    cursor: pointer;
  }
  .gift-box {
    width: 45px; height: 38px;
    position: relative;
    border-radius: 3px;
  }
  .gift-lid {
    position: absolute;
    top: -10px; left: -3px; right: -3px;
    height: 14px;
    border-radius: 3px 3px 0 0;
  }
  .gift-ribbon-v {
    position: absolute;
    top: 0; left: 50%; transform: translateX(-50%);
    width: 8px; height: 100%;
    background: rgba(255,255,255,0.5);
    border-radius: 1px;
  }
  .gift-ribbon-h {
    position: absolute;
    top: 50%; transform: translateY(-50%);
    left: 0; right: 0;
    height: 8px;
    background: rgba(255,255,255,0.5);
    border-radius: 1px;
  }
  .gift-bow {
    position: absolute;
    top: -18px; left: 50%; transform: translateX(-50%);
    font-size: 18px;
  }

  /* Sparkle effect */
  .sparkle {
    position: fixed;
    pointer-events: none;
    z-index: 1000;
    font-size: 20px;
    animation: sparkle-fly 0.8s ease-out forwards;
  }
  @keyframes sparkle-fly {
    from { opacity: 1; transform: scale(1) translateY(0); }
    to   { opacity: 0; transform: scale(0) translateY(-60px); }
  }

  /* ===== SOUND BUTTONS ===== */
  #soundPanel {
    position: fixed;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 100;
  }
  .sound-btn {
    width: 54px; height: 54px;
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.3);
    background: rgba(0,0,0,0.5);
    font-size: 24px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
    position: relative;
    overflow: hidden;
  }
  .sound-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle, rgba(255,255,255,0.3), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .sound-btn:hover { transform: scale(1.15); border-color: rgba(255,255,255,0.6); }
  .sound-btn:hover::before { opacity: 1; }
  .sound-btn:active { transform: scale(0.95); }
  .sound-btn.playing { animation: btn-pulse 0.5s ease-in-out infinite alternate; }
  @keyframes btn-pulse {
    from { box-shadow: 0 0 0 rgba(255,255,255,0); }
    to   { box-shadow: 0 0 20px rgba(255,255,255,0.5); }
  }

  /* ===== FIREWORKS ===== */
  .firework {
    position: fixed;
    pointer-events: none;
    z-index: 999;
    font-size: 16px;
    animation: fw-explode 1s ease-out forwards;
  }
  @keyframes fw-explode {
    from { opacity: 1; transform: scale(0.5); }
    to   { opacity: 0; transform: scale(2.5); }
  }

  /* ===== AURORA ===== */
  .aurora {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 40%;
    pointer-events: none;
    z-index: 0;
    opacity: 0.15;
    background: linear-gradient(180deg,
      transparent 0%,
      rgba(0,255,100,0.4) 30%,
      rgba(0,150,255,0.3) 60%,
      transparent 100%
    );
    animation: aurora-wave 8s ease-in-out infinite alternate;
  }
  @keyframes aurora-wave {
    0%   { transform: skewX(-5deg) scaleY(0.8); opacity: 0.1; }
    50%  { transform: skewX(5deg)  scaleY(1.2); opacity: 0.2; }
    100% { transform: skewX(-3deg) scaleY(0.9); opacity: 0.15; }
  }

  /* ===== TOOLTIP ===== */
  .tooltip {
    position: fixed;
    background: rgba(0,0,0,0.8);
    color: #fff;
    font-size: 12px;
    padding: 4px 8px;
    border-radius: 6px;
    pointer-events: none;
    z-index: 2000;
    white-space: nowrap;
    transition: opacity 0.2s;
  }

  /* ===== FLOATING EMOJIS (ambient) ===== */
  .float-emoji {
    position: fixed;
    font-size: 20px;
    pointer-events: none;
    z-index: 2;
    animation: float-up var(--dur, 6s) ease-in-out infinite;
    animation-delay: var(--delay, 0s);
    left: var(--x, 50%);
    bottom: -30px;
    opacity: 0;
  }
  @keyframes float-up {
    0%   { opacity: 0;   transform: translateY(0) rotate(0deg); }
    20%  { opacity: 0.6; }
    80%  { opacity: 0.4; }
    100% { opacity: 0;   transform: translateY(-100vh) rotate(360deg); }
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 860px) {
    #card { width: 98vw; margin: 10px auto; }
  }

  /* ===== COUNTER ===== */
  #counter {
    position: fixed;
    left: 20px;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.5);
    border: 2px solid rgba(255,200,0,0.4);
    border-radius: 12px;
    padding: 12px 10px;
    color: #ffd700;
    font-size: 12px;
    text-align: center;
    z-index: 100;
    backdrop-filter: blur(4px);
  }
  #counter .count-num {
    font-size: 28px;
    font-weight: 900;
    display: block;
  }

  /* trash hint */
  #trashHint {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.6);
    color: #adf5d0;
    font-size: 12px;
    padding: 6px 14px;
    border-radius: 20px;
    z-index: 100;
    backdrop-filter: blur(4px);
    border: 1px solid rgba(46,204,113,0.3);
    pointer-events: none;
  }

  .jingle-text {
    position: fixed;
    pointer-events: none;
    z-index: 1000;
    font-size: 16px;
    font-weight: bold;
    color: #ffd700;
    text-shadow: 0 0 10px #ffa500;
    animation: jingle-float 1.5s ease-out forwards;
  }
  @keyframes jingle-float {
    0%   { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-80px) scale(1.5); }
  }
</style>
</head>
<body>

<canvas id="snowCanvas"></canvas>
<div class="aurora"></div>
<div class="stars" id="stars"></div>

<!-- Floating ambient emojis -->
<div class="float-emoji" style="--x:5%;  --dur:8s;  --delay:0s">🎵</div>
<div class="float-emoji" style="--x:15%; --dur:10s; --delay:2s">⛄</div>
<div class="float-emoji" style="--x:25%; --dur:7s;  --delay:4s">🎁</div>
<div class="float-emoji" style="--x:70%; --dur:9s;  --delay:1s">🦌</div>
<div class="float-emoji" style="--x:80%; --dur:11s; --delay:3s">🎶</div>
<div class="float-emoji" style="--x:90%; --dur:8s;  --delay:5s">❄️</div>

<!-- Left counter -->
<div id="counter">
  <span class="count-num" id="itemCount">0</span>
  items<br>placed!
</div>

<!-- Sound Panel -->
<div id="soundPanel">
  <button class="sound-btn" onclick="playJingle()"     title="Jingle Bells">🔔</button>
  <button class="sound-btn" onclick="playHoHoHo()"    title="Ho Ho Ho!">🎅</button>

// =============================================
//  SNOW CANVAS
// =============================================
const canvas = document.getElementById('snowCanvas');
const ctx = canvas.getContext('2d');
let W = window.innerWidth, H = window.innerHeight;
canvas.width = W; canvas.height = H;

const FLAKES = [];
const FLAKE_COUNT = 180;

class Snowflake {
  constructor(init) {
    this.reset(init);
  }
  reset(init) {
    this.x = Math.random() * W;
    this.y = init ? Math.random() * H : -10;
    this.r = Math.random() * 3 + 1;
    this.speed = Math.random() * 1.2 + 0.4;
    this.wind = Math.random() * 0.6 - 0.3;
    this.opacity = Math.random() * 0.5 + 0.3;
    this.wobble = Math.random() * Math.PI * 2;
    this.wobbleSpeed = Math.random() * 0.04 + 0.01;
  }
  update() {
    this.y += this.speed;
    this.wobble += this.wobbleSpeed;
    this.x += this.wind + Math.sin(this.wobble) * 0.5;
    if (this.y > H + 10) this.reset(false);
    if (this.x < -10) this.x = W + 10;
    if (this.x > W + 10) this.x = -10;
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${this.opacity})`;
    ctx.fill();
  }
}

for (let i = 0; i < FLAKE_COUNT; i++) FLAKES.push(new Snowflake(true));

function animateSnow() {
  ctx.clearRect(0, 0, W, H);
  FLAKES.forEach(f => { f.update(); f.draw(); });
  requestAnimationFrame(animateSnow);
}
animateSnow();

window.addEventListener('resize', () => {
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W; canvas.height = H;
});

// =============================================
//  AUDIO ENGINE (Web Audio API)
// =============================================
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTone(freq, dur, type='sine', vol=0.3, delay=0) {
  const ac = getAudio();
  const osc = ac.createOscillator();
  const gain = ac.createGain();
  osc.connect(gain);
  gain.connect(ac.destination);
  osc.type = type;
  osc.frequency.setValueAtTime(freq, ac.currentTime + delay);
  gain.gain.setValueAtTime(0, ac.currentTime + delay);
  gain.gain.linearRampToValueAtTime(vol, ac.currentTime + delay + 0.02);
  gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + delay + dur);
  osc.start(ac.currentTime + delay);
  osc.stop(ac.currentTime + delay + dur + 0.05);
}

function playNoise(dur, vol=0.1) {
  const ac = getAudio();
  const buf = ac.createBuffer(1, ac.sampleRate * dur, ac.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
  const src = ac.createBufferSource();
  src.buffer = buf;
  const gain = ac.createGain();
  src.connect(gain);
  gain.connect(ac.destination);
  gain.gain.setValueAtTime(vol, ac.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  src.start();
  src.stop(ac.currentTime + dur);
}

// Jingle Bells melody
const jingleNotes = [
  [329,0.2],[329,0.2],[329,0.4],
  [329,0.2],[329,0.2],[329,0.4],
  [329,0.2],[392,0.2],[261,0.2],[293,0.2],[329,0.6],
  [349,0.2],[349,0.2],[349,0.2],[349,0.2],[349,0.2],[329,0.2],[329,0.2],[329,0.15],[329,0.15],
  [293,0.2],[293,0.2],[329,0.2],[293,0.3],[392,0.5]
];

function playJingle() {
  let t = 0;
  jingleNotes.forEach(([freq, dur]) => {
    playTone(freq, dur * 0.9, 'triangle', 0.25, t);
    t += dur * 0.95;
  });
  showJingleText('🎵 Jingle Bells! 🎵');
}

function playHoHoHo() {
  const ac = getAudio();
  [0, 0.35, 0.7].forEach(delay => {
    playTone(160, 0.3, 'sawtooth', 0.15, delay);
    playTone(200, 0.25, 'sine', 0.2, delay + 0.03);
  });
  showJingleText('🎅 Ho Ho Ho! 🎅');
}

function playFirework() {

  playNoise(0.5, 0.15);
  playTone(800, 0.1, 'sawtooth', 0.2, 0);

  playTone(600, 0.15, 'sawtooth', 0.1, 0.1);

// =============================================
//  BACKGROUND MUSIC (generative)
// =============================================
let musicPlaying = false;
let musicIntervals = [];
const MUSIC_NOTES = [261,293,329,349,392,440,494,523];
let musicPhase = 0;

function toggleMusic() {
  musicPlaying = !musicPlaying;
  const btn = document.getElementById('musicBtn');
  if (musicPlaying) {
    btn.classList.add('playing');
    playNextNote();
    showJingleText('🎄 Music On! 🎄');
  } else {
    btn.classList.remove('playing');
    musicIntervals.forEach(clearTimeout);
    musicIntervals = [];
    showJingleText('🔇 Music Off');
  }
}

function playNextNote() {
  if (!musicPlaying) return;
  const note = MUSIC_NOTES[musicPhase % MUSIC_NOTES.length];
  playTone(note, 0.4, 'triangle', 0.12, 0);
  if (musicPhase % 4 === 0) playTone(note / 2, 0.8, 'sine', 0.06, 0);
  musicPhase++;
  const id = setTimeout(playNextNote, 300 + Math.random() * 100);
  musicIntervals.push(id);
}

function updateCounter() {
  document.getElementById('itemCount').textContent = itemCount;

// Build palette
const palette = document.getElementById('palette');
PALETTE_ITEMS.forEach(item => {
  const el = document.createElement('div');
  el.className = 'palette-item';
  el.textContent = item.emoji;
  el.draggable = true;
  el.title = item.label;
  el.dataset.emoji = item.emoji;

  // Tooltip
  el.addEventListener('mouseenter', (e) => showTooltip(e, item.label));
  el.addEventListener('mouseleave', hideTooltip);

  el.addEventListener('dragstart', (e) => {
    e.dataTransfer.setData('text/plain', item.emoji);
    e.dataTransfer.effectAllowed = 'copy';
  });

  // Touch support
  let touchDrag = null;
  el.addEventListener('touchstart', (e) => {
    e.preventDefault();
    touchDrag = { emoji: item.emoji, el };
    const clone = el.cloneNode(true);
    clone.style.cssText = `position:fixed;z-index:9999;font-size:36px;pointer-events:none;opacity:0.8;transition:none;`;
    clone.id = 'touchClone';
    document.body.appendChild(clone);
    moveTouchClone(e.touches[0]);
  }, { passive: false });

  el.addEventListener('touchmove', (e) => {
    e.preventDefault();
    moveTouchClone(e.touches[0]);
  }, { passive: false });

  el.addEventListener('touchend', (e) => {
    e.preventDefault();
    const t = e.changedTouches[0];
    const clone = document.getElementById('touchClone');
    if (clone) clone.remove();
    if (touchDrag) {
      const zone = document.getElementById('dropZone');
      const rect = zone.getBoundingClientRect();
      if (t.clientX >= rect.left && t.clientX <= rect.right &&
          t.clientY >= rect.top  && t.clientY <= rect.bottom) {
        placeItem(touchDrag.emoji, t.clientX - rect.left - 16, t.clientY - rect.top - 16);
      }
      touchDrag = null;
    }
  });

  palette.appendChild(el);
});

function moveTouchClone(touch) {
  const clone = document.getElementById('touchClone');
  if (clone) {
    clone.style.left = (touch.clientX - 18) + 'px';
    clone.style.top  = (touch.clientY - 18) + 'px';
  }
}

// =============================================
//  DROP ZONE
// =============================================
const dropZone = document.getElementById('dropZone');

dropZone.addEventListener('dragover', (e) => {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'copy';
});

dropZone.addEventListener('drop', (e) => {
  e.preventDefault();
  const emoji = e.dataTransfer.getData('text/plain');
  if (!emoji) return;
  const rect = dropZone.getBoundingClientRect();
  placeItem(emoji, e.clientX - rect.left - 16, e.clientY - rect.top - 16);
});

function placeItem(emoji, x, y) {
  const el = document.createElement('div');
  el.className = 'placed-item';
  el.textContent = emoji;
  el.style.left = Math.max(0, Math.min(x, dropZone.offsetWidth - 40)) + 'px';
  el.style.top  = Math.max(0, Math.min(y, dropZone.offsetHeight - 40)) + 'px';

  // Double-click to remove
  el.addEventListener('dblclick', () => {
    el.style.animation = 'pop-in 0.2s reverse';
    setTimeout(() => {
      el.remove();
      itemCount = Math.max(0, itemCount - 1);
      updateCounter();
      playRemoveSound();
    }, 200);
  });

  // Drag to move
  makeDraggable(el);

  dropZone.appendChild(el);
  itemCount++;
  updateCounter();
  playPlaceSound();
  spawnSparklesAt(
    dropZone.getBoundingClientRect().left + x + 16,
    dropZone.getBoundingClientRect().top + y + 16
  );
}

function makeDraggable(el) {
  let dragging = false, startX, startY, origLeft, origTop;

  el.addEventListener('mousedown', (e) => {
    if (e.detail === 2) return; // skip double click
    dragging = true;
    startX = e.clientX;
    startY = e.clientY;
    origLeft = parseInt(el.style.left) || 0;
    origTop  = parseInt(el.style.top)  || 0;
    el.style.zIndex = 50;
    el.style.transition = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    const dx = e.clientX - startX;
    const dy = e.clientY - startY;
    el.style.left = Math.max(0, Math.min(origLeft + dx, dropZone.offsetWidth  - 40)) + 'px';
    el.style.top  = Math.max(0, Math.min(origTop  + dy, dropZone.offsetHeight - 40)) + 'px';
  });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    el.style.zIndex = 20;
    el.style.transition = '';
    el.classList.add('wiggle');
    setTimeout(() => el.classList.remove('wiggle'), 400);
  });

  // Touch
  el.addEventListener('touchstart', (e) => {
    e.stopPropagation();
    const t = e.touches[0];
    dragging = true;
    startX = t.clientX; startY = t.clientY;
    origLeft = parseInt(el.style.left) || 0;
    origTop  = parseInt(el.style.top)  || 0;
    el.style.zIndex = 50;
  }, { passive: true });

  el.addEventListener('touchmove', (e) => {
    e.stopPropagation();
    e.preventDefault();
    if (!dragging) return;
    const t = e.touches[0];
    const dx = t.clientX - startX;
    const dy = t.clientY - startY;
    el.style.left = Math.max(0, Math.min(origLeft + dx, dropZone.offsetWidth  - 40)) + 'px';
    el.style.top  = Math.max(0, Math.min(origTop  + dy, dropZone.offsetHeight - 40)) + 'px';
  }, { passive: false });

  el.addEventListener('touchend', (e) => {
    e.stopPropagation();
    dragging = false;
    el.style.zIndex = 20;
    el.classList.add('wiggle');
    setTimeout(() => el.classList.remove('wiggle'), 400);
  });
}

// =============================================
//  TOOLTIP
// =============================================
let tooltipEl = null;
function showTooltip(e, text) {
  if (!tooltipEl) {
    tooltipEl = document.createElement('div');
    tooltipEl.className = 'tooltip';
    document.body.appendChild(tooltipEl);
  }
  tooltipEl.textContent = text;
  tooltipEl.style.opacity = '1';
  tooltipEl.style.left = (e.clientX + 10) + 'px';
  tooltipEl.style.top  = (e.clientY - 30) + 'px';
}
function hideTooltip() {
  if (tooltipEl) tooltipEl.style.opacity = '0';
}

// =============================================
//  AMBIENT SPARKLES ON CARD CLICK
// =============================================
document.getElementById('card').addEventListener('click', (e) => {
  if (e.target.closest('.palette-item') || e.target.closest('.placed-item')) return;
  if (e.target.closest('#dropZone') && !e.target.closest('.house') && !e.target.closest('.snowman') && !e.target.closest('.tree-container') && !e.target.closest('.reindeer')) {
    // small sparkle on bg click
    playTone(600 + Math.random()*200, 0.15, 'sine', 0.1);
    spawnSparklesAt(e.clientX, e.clientY);
  }
});

// Shooting star
function shootingStar() {
  const star = document.createElement('div');
  star.style.cssText = `
    position:fixed; z-index:3; pointer-events:none;
    width:3px; height:3px; background:white; border-radius:50%;
    box-shadow: 0 0 6px 2px white, 20px 0 10px 1px rgba(255,255,255,0.5);
    left:-10px; top:${5 + Math.random()*30}%;
    transition: all ${0.8 + Math.random()*0.4}s linear;
    opacity:1;
  `;
  document.body.appendChild(star);
  setTimeout(() => {
    star.style.left = '110vw';
    star.style.top  = (parseInt(star.style.top) + 10) + 'vh';
    star.style.opacity = '0';
  }, 50);
  setTimeout(() => star.remove(), 1500);
}
setInterval(shootingStar, 5000 + Math.random()*5000);
