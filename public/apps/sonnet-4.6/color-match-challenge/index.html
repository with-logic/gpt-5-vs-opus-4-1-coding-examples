<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Match Challenge</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --surface2: #16213e;
      --text: #e0e0ff;
      --muted: #6060a0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      user-select: none;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(120, 40, 200, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(40, 120, 200, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 80%, rgba(200, 40, 120, 0.1) 0%, transparent 50%);
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 600px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
    }

    /* Header */
    .header {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .score-block {
      text-align: center;
    }

    .score-label {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
    }

    .score-value {
      font-size: 36px;
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      transition: transform 0.15s ease;
    }

    .score-value.bump {
      transform: scale(1.3);
    }

    /* Timer */
    .timer-ring {
      position: relative;
      width: 80px;
      height: 80px;
    }

    .timer-ring svg {
      transform: rotate(-90deg);
    }

    .timer-ring .track {
      fill: none;
      stroke: rgba(255,255,255,0.08);
      stroke-width: 6;
    }

    .timer-ring .progress {
      fill: none;
      stroke-width: 6;
      stroke-linecap: round;
      stroke: #60a5fa;
      transition: stroke-dashoffset 0.05s linear, stroke 0.5s ease;
    }

    .timer-text {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
    }

    /* Instruction */
    .instruction {
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
      text-align: center;
    }

    /* Word display */
    .word-card {
      position: relative;
      width: 100%;
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 24px;
      padding: 50px 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 160px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      overflow: hidden;
    }

    .word-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 24px;
      background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, transparent 100%);
    }

    .word-display {
      font-size: clamp(64px, 15vw, 100px);
      font-weight: 900;
      letter-spacing: -2px;
      text-transform: uppercase;
      transition: opacity 0.15s ease, transform 0.15s ease;
      text-shadow: 0 0 40px currentColor;
      filter: drop-shadow(0 0 20px currentColor);
    }

    .word-display.flash-in {
      animation: flashIn 0.25s ease forwards;
    }

    @keyframes flashIn {
      0% { opacity: 0; transform: scale(0.85) translateY(10px); }
      60% { opacity: 1; transform: scale(1.05) translateY(-2px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* Feedback overlay */
    .feedback {
      position: absolute;
      inset: 0;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      font-weight: 900;
      letter-spacing: 4px;
      pointer-events: none;
      opacity: 0;
    }

    .feedback.correct {
      animation: feedbackCorrect 0.4s ease forwards;
      color: #4ade80;
      text-shadow: 0 0 30px #4ade80;
      background: rgba(74, 222, 128, 0.08);
    }

    .feedback.wrong {
      animation: feedbackWrong 0.4s ease forwards;
      color: #f87171;
      text-shadow: 0 0 30px #f87171;
      background: rgba(248, 113, 113, 0.08);
    }

    @keyframes feedbackCorrect {
      0% { opacity: 0; transform: scale(0.8); }
      30% { opacity: 1; transform: scale(1.1); }
      70% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.05); }
    }

    @keyframes feedbackWrong {
      0% { opacity: 0; transform: scale(0.8); }
      30% { opacity: 1; transform: scale(1.1); }
      70% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.05); }
    }

    /* Combo indicator */
    .combo {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
      color: #fbbf24;
      text-shadow: 0 0 10px #fbbf24;
      min-height: 20px;
      text-align: center;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .combo.show {
      opacity: 1;
    }

    /* Color buttons */
    .buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      width: 100%;
    }

    .color-btn {
      position: relative;
      border: none;
      border-radius: 18px;
      padding: 22px 10px;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      color: white;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
      transition: transform 0.12s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.12s ease;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    .color-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 60%);
    }

    .color-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 18px;
      box-shadow: inset 0 -3px 0 rgba(0,0,0,0.25);
    }

    .color-btn:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 12px 30px rgba(0,0,0,0.4);
    }

    .color-btn:active, .color-btn.pressed {
      transform: translateY(2px) scale(0.96);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .color-btn.correct-flash {
      animation: btnCorrect 0.3s ease;
    }

    .color-btn.wrong-flash {
      animation: btnWrong 0.3s ease;
    }

    @keyframes btnCorrect {
      0% { filter: brightness(1); }
      50% { filter: brightness(1.8) saturate(1.5); }
      100% { filter: brightness(1); }
    }

    @keyframes btnWrong {
      0%, 100% { transform: translateX(0) scale(0.96); }
      25% { transform: translateX(-6px) scale(0.96); }
      75% { transform: translateX(6px) scale(0.96); }
    }

    /* Ripple effect */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      transform: scale(0);
      animation: ripple 0.5s ease-out;
      pointer-events: none;
    }

    @keyframes ripple {
      to { transform: scale(4); opacity: 0; }
    }

    /* Screens */
    .screen {
      display: none;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 24px;
    }

    .screen.active {
      display: flex;
    }

    /* Start screen */
    #start-screen {
      gap: 32px;
    }

    .game-title {
      font-size: clamp(42px, 10vw, 72px);
      font-weight: 900;
      letter-spacing: -2px;
      line-height: 1;
    }

    .title-color {
      display: block;
    }

    .title-match {
      display: block;
      background: linear-gradient(135deg, #f472b6, #fb923c, #facc15, #4ade80, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      background-size: 300%;
      animation: titleGradient 4s ease infinite;
    }

    @keyframes titleGradient {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .game-description {
      color: var(--muted);
      font-size: 16px;
      line-height: 1.6;
      max-width: 380px;
    }

    .game-description strong {
      color: var(--text);
    }

    .start-btn {
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      border: none;
      border-radius: 18px;
      padding: 18px 52px;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: white;
      cursor: pointer;
      transition: transform 0.12s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.12s ease;
      box-shadow: 0 8px 30px rgba(124, 58, 237, 0.4);
      position: relative;
      overflow: hidden;
    }

    .start-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
      border-radius: 18px;
    }

    .start-btn:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 14px 40px rgba(124, 58, 237, 0.5);
    }

    .start-btn:active {
      transform: translateY(1px) scale(0.98);
    }

    .color-preview {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .preview-dot {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      box-shadow: 0 0 12px currentColor;
    }

    /* End screen */
    #end-screen {
      gap: 28px;
    }

    .result-title {
      font-size: 48px;
      font-weight: 900;
      background: linear-gradient(135deg, #fbbf24, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .final-score-block {
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 20px;
      padding: 32px 52px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    .final-score-label {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 8px;
    }

    .final-score-value {
      font-size: 80px;
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .stats-row {
      display: flex;
      gap: 24px;
      justify-content: center;
    }

    .stat-item {
      text-align: center;
    }

    .stat-val {
      font-size: 28px;
      font-weight: 800;
      color: var(--text);
    }

    .stat-lbl {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
    }

    .rank-message {
      font-size: 16px;
      color: var(--muted);
      font-style: italic;
    }

    .rank-message span {
      color: var(--text);
      font-style: normal;
      font-weight: 700;
    }

    /* Particles */
    #particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      animation: particleFly linear forwards;
    }

    @keyframes particleFly {
      0% { transform: translate(0, 0) scale(1); opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
    }

    /* Streak bar */
    .streak-bar {
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.05);
      border-radius: 2px;
      overflow: hidden;
    }

    .streak-fill {
      height: 100%;
      background: linear-gradient(90deg, #7c3aed, #2563eb, #06b6d4);
      border-radius: 2px;
      transition: width 0.3s ease, background 0.3s ease;
      width: 0%;
    }

    /* High scores */
    .highscore {
      font-size: 13px;
      color: var(--muted);
    }

    .highscore span {
      color: #fbbf24;
      font-weight: 700;
    }

    /* Countdown */
    .countdown-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 15, 26, 0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      backdrop-filter: blur(10px);
    }

    .countdown-overlay.hide {
      display: none;
    }

    .countdown-num {
      font-size: 120px;
      font-weight: 900;
      animation: countPulse 0.8s ease;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    @keyframes countPulse {
      0% { transform: scale(1.5); opacity: 0; }
      40% { transform: scale(1); opacity: 1; }
      70% { transform: scale(1); opacity: 1; }
      100% { transform: scale(0.7); opacity: 0; }
    }

    /* Disabled state */
    .buttons.disabled .color-btn {
      pointer-events: none;
      opacity: 0.6;
    }
  </style>
</head>
<body>

<div id="particles"></div>

<!-- Countdown overlay -->
<div class="countdown-overlay hide" id="countdown-overlay">
  <div class="countdown-num" id="countdown-num">3</div>
</div>

<div class="container">

  <!-- START SCREEN -->
  <div class="screen active" id="start-screen">
    <div class="game-title">
      <span class="title-color">COLOR</span>
      <span class="title-match">MATCH</span>
    </div>

    <div class="color-preview" id="color-preview"></div>

    <p class="game-description">
      Click the button matching the <strong>ink color</strong> of the word — not what it says!<br>
      Score as many as you can in <strong>30 seconds</strong>.
    </p>

    <div class="highscore" id="start-highscore">Best: <span>—</span></div>

    <button class="start-btn" onclick="startCountdown()">PLAY NOW</button>
  </div>

  <!-- GAME SCREEN -->
  <div class="screen" id="game-screen">
    <div class="header">
      <div class="score-block">
        <div class="score-label">Score</div>
        <div class="score-value" id="score-display">0</div>
      </div>

      <div class="timer-ring">
        <svg width="80" height="80" viewBox="0 0 80 80">
          <circle class="track" cx="40" cy="40" r="34"/>
          <circle class="progress" id="timer-progress" cx="40" cy="40" r="34"
            stroke-dasharray="213.6" stroke-dashoffset="0"/>
        </svg>
        <div class="timer-text" id="timer-text">30</div>
      </div>

      <div class="score-block">
        <div class="score-label">Best</div>
        <div class="score-value" id="best-display">0</div>
      </div>
    </div>

    <div class="instruction">Click the COLOR of the ink</div>

    <div class="word-card">
      <div class="word-display flash-in" id="word-display">RED</div>
      <div class="feedback" id="feedback"></div>
    </div>

    <div class="combo" id="combo-display"></div>

    <div class="streak-bar">
      <div class="streak-fill" id="streak-fill"></div>
    </div>

    <div class="buttons" id="color-buttons"></div>
  </div>

  <!-- END SCREEN -->
  <div class="screen" id="end-screen">
    <div class="result-title" id="result-title">TIME'S UP!</div>

    <div class="final-score-block">
      <div class="final-score-label">Final Score</div>
      <div class="final-score-value" id="final-score">0</div>
    </div>

    <div class="stats-row">
      <div class="stat-item">
        <div class="stat-val" id="stat-correct">0</div>
        <div class="stat-lbl">Correct</div>
      </div>
      <div class="stat-item">
        <div class="stat-val" id="stat-wrong">0</div>
        <div class="stat-lbl">Wrong</div>
      </div>
      <div class="stat-item">
        <div class="stat-val" id="stat-accuracy">0%</div>
        <div class="stat-lbl">Accuracy</div>
      </div>
    </div>

    <div class="rank-message" id="rank-message"></div>

    <button class="start-btn" onclick="startCountdown()">PLAY AGAIN</button>
  </div>

</div>

<script>
  // ─── Color definitions ───────────────────────────────────────────────────────
  const COLORS = [
    { name: 'RED',    hex: '#ef4444', shadow: '#ef4444' },
    { name: 'BLUE',   hex: '#3b82f6', shadow: '#3b82f6' },
    { name: 'GREEN',  hex: '#22c55e', shadow: '#22c55e' },
    { name: 'YELLOW', hex: '#eab308', shadow: '#eab308' },
    { name: 'PURPLE', hex: '#a855f7', shadow: '#a855f7' },
    { name: 'ORANGE', hex: '#f97316', shadow: '#f97316' },
  ];

  const GAME_DURATION = 30;

  // ─── State ───────────────────────────────────────────────────────────────────
  let score = 0;
  let correctCount = 0;
  let wrongCount = 0;
  let streak = 0;
  let maxStreak = 0;
  let timeLeft = GAME_DURATION;
  let timerInterval = null;
  let currentColor = null; // the ink color (correct answer)
  let highScore = parseInt(localStorage.getItem('colorMatchHS') || '0');
  let gameActive = false;
  let feedbackTimeout = null;

  // ─── DOM refs ────────────────────────────────────────────────────────────────
  const wordDisplay = document.getElementById('word-display');
  const feedback = document.getElementById('feedback');
  const scoreDisplay = document.getElementById('score-display');
  const bestDisplay = document.getElementById('best-display');
  const timerText = document.getElementById('timer-text');
  const timerProgress = document.getElementById('timer-progress');
  const comboDisplay = document.getElementById('combo-display');
  const streakFill = document.getElementById('streak-fill');
  const colorButtons = document.getElementById('color-buttons');
  const particlesContainer = document.getElementById('particles');
  const countdownOverlay = document.getElementById('countdown-overlay');
  const countdownNum = document.getElementById('countdown-num');

  const CIRCUMFERENCE = 2 * Math.PI * 34; // ~213.6

  // ─── Init ────────────────────────────────────────────────────────────────────
  function init() {
    // Color preview dots
    const preview = document.getElementById('color-preview');
    COLORS.forEach(c => {
      const dot = document.createElement('div');
      dot.className = 'preview-dot';
      dot.style.background = c.hex;
      dot.style.color = c.hex;
      dot.style.boxShadow = `0 0 12px ${c.hex}`;
      preview.appendChild(dot);
    });

    updateHighscoreDisplay();
    buildButtons();
  }

  function updateHighscoreDisplay() {
    const hs = parseInt(localStorage.getItem('colorMatchHS') || '0');
    const el = document.getElementById('start-highscore');
    el.innerHTML = `Best: <span>${hs || '—'}</span>`;
    bestDisplay.textContent = hs;
    highScore = hs;
  }

  // ─── Button builder ──────────────────────────────────────────────────────────
  function buildButtons() {
    colorButtons.innerHTML = '';
    COLORS.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'color-btn';
      btn.dataset.color = c.name;
      btn.style.background = `linear-gradient(145deg, ${lighten(c.hex, 10)}, ${c.hex})`;
      btn.style.boxShadow = `0 6px 20px ${c.hex}55`;
      btn.textContent = c.name;

      btn.addEventListener('click', (e) => handleAnswer(c.name, btn, e));
      colorButtons.appendChild(btn);
    });
  }

  function lighten(hex, pct) {
    const num = parseInt(hex.slice(1), 16);
    const r = Math.min(255, (num >> 16) + pct * 2);
    const g = Math.min(255, ((num >> 8) & 0xff) + pct * 2);
    const b = Math.min(255, (num & 0xff) + pct * 2);
    return `#${[r,g,b].map(v => Math.round(v).toString(16).padStart(2,'0')).join('')}`;
  }

  // ─── Countdown ───────────────────────────────────────────────────────────────
  function startCountdown() {
    showScreen('none');
    countdownOverlay.classList.remove('hide');
    let count = 3;
    countdownNum.textContent = count;

    const tick = () => {
      count--;
      if (count <= 0) {
        countdownOverlay.classList.add('hide');
        startGame();
        return;
      }
      countdownNum.style.animation = 'none';
      void countdownNum.offsetWidth;
      countdownNum.style.animation = 'countPulse 0.8s ease';
      countdownNum.textContent = count;
      setTimeout(tick, 850);
    };

    setTimeout(tick, 850);
  }

  // ─── Game flow ───────────────────────────────────────────────────────────────
  function startGame() {
    score = 0;
    correctCount = 0;
    wrongCount = 0;
    streak = 0;
    maxStreak = 0;
    timeLeft = GAME_DURATION;
    gameActive = true;

    scoreDisplay.textContent = '0';
    timerText.textContent = GAME_DURATION;
    timerProgress.style.strokeDashoffset = 0;
    timerProgress.style.stroke = '#60a5fa';
    streakFill.style.width = '0%';
    comboDisplay.classList.remove('show');
    colorButtons.classList.remove('disabled');

    showScreen('game');
    nextWord();

    timerInterval = setInterval(() => {
      timeLeft -= 0.05;
      const t = Math.max(0, timeLeft);
      timerText.textContent = Math.ceil(t);
      const fraction = t / GAME_DURATION;
      timerProgress.style.strokeDashoffset = CIRCUMFERENCE * (1 - fraction);

      // Color the timer
      if (fraction > 0.5) {
        timerProgress.style.stroke = '#60a5fa';
      } else if (fraction > 0.25) {
        timerProgress.style.stroke = '#fbbf24';
      } else {
        timerProgress.style.stroke = '#ef4444';
      }

      if (timeLeft <= 0) {
        endGame();
      }
    }, 50);
  }

  function endGame() {
    clearInterval(timerInterval);
    gameActive = false;
    colorButtons.classList.add('disabled');

    // Save high score
    if (score > highScore) {
      highScore = score;
      localStorage.setItem('colorMatchHS', highScore);
    }

    setTimeout(() => {
      showScreen('end');

      document.getElementById('final-score').textContent = score;
      document.getElementById('stat-correct').textContent = correctCount;
      document.getElementById('stat-wrong').textContent = wrongCount;
      const total = correctCount + wrongCount;
      const acc = total ? Math.round((correctCount / total) * 100) : 0;
      document.getElementById('stat-accuracy').textContent = acc + '%';

      // Rank message
      const msg = getRankMessage(score, acc);
      document.getElementById('rank-message').innerHTML = msg;

      updateHighscoreDisplay();

      if (score > 0) spawnConfetti();
    }, 300);
  }

  function getRankMessage(s, acc) {
    if (s === 0) return '<span>Slow start?</span> Try again!';
    if (s >= 30) return 'Absolute <span>Legend!</span> Incredible reflexes!';
    if (s >= 20) return '<span>Master</span> of colors! Amazing speed!';
    if (s >= 15) return 'You\'re on <span>fire!</span> Keep it up!';
    if (s >= 10) return 'Solid run! <span>Keep practicing!</span>';
    if (s >= 5)  return 'Good start! <span>Beat your score!</span>';
    return 'Don\'t give up — <span>you\'ve got this!</span>';
  }

  // ─── Word logic ──────────────────────────────────────────────────────────────
  function nextWord() {
    if (!gameActive) return;

    // Pick a random ink color
    const inkColor = COLORS[Math.floor(Math.random() * COLORS.length)];
    // Pick a random word (different from ink color for max challenge, ~70% of the time)
    let wordColor;
    if (Math.random() < 0.7) {
      const others = COLORS.filter(c => c.name !== inkColor.name);
      wordColor = others[Math.floor(Math.random() * others.length)];
    } else {
      wordColor = inkColor;
    }

    currentColor = inkColor.name;

    wordDisplay.style.animation = 'none';
    void wordDisplay.offsetWidth;
    wordDisplay.style.animation = 'flashIn 0.25s ease forwards';
    wordDisplay.textContent = wordColor.name;
    wordDisplay.style.color = inkColor.hex;
  }

  // ─── Answer handling ─────────────────────────────────────────────────────────
  function handleAnswer(colorName, btn, event) {
    if (!gameActive) return;

    // Ripple effect
    const rect = btn.getBoundingClientRect();
    const ripple = document.createElement('div');
    ripple.className = 'ripple';
    const size = Math.max(rect.width, rect.height);
    ripple.style.width = ripple.style.height = size + 'px';
    ripple.style.left = (event.clientX - rect.left - size / 2) + 'px';
    ripple.style.top = (event.clientY - rect.top - size / 2) + 'px';
    btn.appendChild(ripple);
    setTimeout(() => ripple.remove(), 500);

    const correct = colorName === currentColor;

    if (correct) {
      streak++;
      maxStreak = Math.max(maxStreak, streak);
      correctCount++;

      const bonus = streak >= 5 ? 3 : streak >= 3 ? 2 : 1;
      score += bonus;
      scoreDisplay.textContent = score;

      // Bump animation
      scoreDisplay.classList.remove('bump');
      void scoreDisplay.offsetWidth;
      scoreDisplay.classList.add('bump');
      setTimeout(() => scoreDisplay.classList.remove('bump'), 150);

      // Update best live
      if (score > highScore) {
        bestDisplay.textContent = score;
      }

      btn.classList.add('correct-flash');
      setTimeout(() => btn.classList.remove('correct-flash'), 300);

      showFeedback(true, bonus);
      updateStreak();
      updateCombo();
      spawnParticles(event.clientX, event.clientY, COLORS.find(c => c.name === colorName)?.hex || '#4ade80');
    } else {
      streak = 0;
      wrongCount++;

      btn.classList.add('wrong-flash');
      setTimeout(() => btn.classList.remove('wrong-flash'), 300);

      showFeedback(false);
      updateStreak();
      updateCombo();
    }

    setTimeout(nextWord, correct ? 120 : 300);
  }

  function showFeedback(correct, bonus = 1) {
    clearTimeout(feedbackTimeout);
    feedback.className = 'feedback';
    void feedback.offsetWidth;

    if (correct) {
      feedback.textContent = bonus > 1 ? `+${bonus} COMBO!` : 'CORRECT!';
      feedback.classList.add('correct');
    } else {
      feedback.textContent = 'WRONG!';
      feedback.classList.add('wrong');
    }

    feedbackTimeout = setTimeout(() => {
      feedback.className = 'feedback';
    }, 400);
  }

  function updateStreak() {
    const maxShow = 8;
    const pct = Math.min((streak / maxShow) * 100, 100);
    streakFill.style.width = pct + '%';

    if (streak >= maxShow) {
      streakFill.style.background = 'linear-gradient(90deg, #f59e0b, #ef4444, #ec4899)';
    } else if (streak >= 5) {
      streakFill.style.background = 'linear-gradient(90deg, #7c3aed, #ec4899, #f59e0b)';
    } else {
      streakFill.style.background = 'linear-gradient(90deg, #7c3aed, #2563eb, #06b6d4)';
    }
  }

  function updateCombo() {
    if (streak >= 3) {
      comboDisplay.classList.add('show');
      if (streak >= 8) {
        comboDisplay.textContent = `🔥 ${streak}x INFERNO STREAK!`;
      } else if (streak >= 5) {
        comboDisplay.textContent = `⚡ ${streak}x HOT STREAK!`;
      } else {
        comboDisplay.textContent = `${streak}x COMBO`;
      }
    } else {
      comboDisplay.classList.remove('show');
    }
  }

  // ─── Particles ───────────────────────────────────────────────────────────────
  function spawnParticles(x, y, color) {
    for (let i = 0; i < 8; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = 4 + Math.random() * 6;
      p.style.cssText = `
        width: ${size}px;
        height: ${size}px;
        left: ${x}px;
        top: ${y}px;
        background: ${color};
        box-shadow: 0 0 6px ${color};
        --tx: ${(Math.random() - 0.5) * 120}px;
        --ty: ${-40 - Math.random() * 80}px;
        animation-duration: ${0.5 + Math.random() * 0.4}s;
      `;
      particlesContainer.appendChild(p);
      setTimeout(() => p.remove(), 900);
    }
  }

  function spawnConfetti() {
    const colors = COLORS.map(c => c.hex);
    for (let i = 0; i < 60; i++) {
      setTimeout(() => {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = 5 + Math.random() * 8;
        const color = colors[Math.floor(Math.random() * colors.length)];
        const x = Math.random() * window.innerWidth;
        p.style.cssText = `
          width: ${size}px;
          height: ${size}px;
          border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
          left: ${x}px;
          top: -10px;
          background: ${color};
          box-shadow: 0 0 8px ${color};
          --tx: ${(Math.random() - 0.5) * 200}px;
          --ty: ${window.innerHeight + 50}px;
          animation-duration: ${1 + Math.random() * 1.5}s;
          animation-timing-function: ease-in;
        `;
        particlesContainer.appendChild(p);
        setTimeout(() => p.remove(), 2500);
      }, i * 30);
    }
  }

  // ─── Screen management ───────────────────────────────────────────────────────
  function showScreen(name) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    if (name === 'game') document.getElementById('game-screen').classList.add('active');
    else if (name === 'end') document.getElementById('end-screen').classList.add('active');
    else if (name === 'start') document.getElementById('start-screen').classList.add('active');
  }

  // ─── Keyboard support ────────────────────────────────────────────────────────
  document.addEventListener('keydown', (e) => {
    if (!gameActive) return;
    const keys = ['1','2','3','4','5','6'];
    const idx = keys.indexOf(e.key);
    if (idx !== -1) {
      const btn = colorButtons.children[idx];
      if (btn) {
        btn.classList.add('pressed');
        btn.click();
        setTimeout(() => btn.classList.remove('pressed'), 200);
      }
    }
  });

  // ─── Boot ────────────────────────────────────────────────────────────────────
  init();
</script>
</body>
</html>
