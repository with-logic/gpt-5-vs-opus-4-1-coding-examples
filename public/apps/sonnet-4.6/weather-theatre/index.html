<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Theatre</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Special+Elite&family=Cinzel:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    font-family: 'Playfair Display', serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
  }

  #root {
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .theatre-wrapper {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* Theatre frame */
  .theatre-frame {
    position: relative;
    width: min(95vw, 1100px);
    height: min(60vh, 580px);
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 0 80px rgba(0,0,0,0.9), inset 0 0 20px rgba(0,0,0,0.5);
    border: 3px solid #4a3520;
  }

  .theatre-frame::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0.15) 0%, transparent 30%, transparent 70%, rgba(0,0,0,0.3) 100%);
    z-index: 10;
    pointer-events: none;
  }

  canvas.stage-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  /* Curtains */
  .curtain-left, .curtain-right {
    position: absolute;
    top: 0;
    height: 100%;
    z-index: 20;
    pointer-events: none;
    transition: transform 1.8s cubic-bezier(0.77, 0, 0.175, 1);
  }

  .curtain-left {
    left: 0;
    width: 52%;
    transform-origin: left center;
  }

  .curtain-right {
    right: 0;
    width: 52%;
    transform-origin: right center;
  }

  .curtain-left.open {
    transform: translateX(-88%);
  }

  .curtain-right.open {
    transform: translateX(88%);
  }

  canvas.curtain-canvas {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* Proscenium arch overlay */
  .proscenium {
    position: absolute;
    inset: 0;
    z-index: 25;
    pointer-events: none;
  }

  /* Subtitle typewriter */
  .subtitle-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 12px 24px;
    background: linear-gradient(180deg, transparent, rgba(0,0,0,0.85));
    z-index: 30;
    display: flex;
    align-items: flex-end;
    min-height: 60px;
  }

  .subtitle-text {
    font-family: 'Special Elite', cursive;
    font-size: clamp(13px, 1.8vw, 18px);
    color: #f5e6c8;
    text-shadow: 0 0 15px rgba(255, 200, 80, 0.6), 0 2px 4px rgba(0,0,0,0.9);
    letter-spacing: 0.05em;
    min-height: 1.4em;
  }

  .cursor-blink {
    display: inline-block;
    width: 2px;
    height: 1em;
    background: #f5e6c8;
    margin-left: 2px;
    vertical-align: middle;
    animation: blink 1s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* Theatre marquee header */
  .theatre-marquee {
    position: absolute;
    top: -2px;
    left: 50%;
    transform: translateX(-50%);
    background: linear-gradient(135deg, #2d1a00, #5c3a10, #2d1a00);
    border: 2px solid #8b6914;
    border-bottom: none;
    padding: 6px 40px 8px;
    z-index: 35;
    border-radius: 8px 8px 0 0;
    white-space: nowrap;
  }

  .theatre-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(14px, 2vw, 22px);
    color: #f5d060;
    text-shadow: 0 0 20px rgba(245, 208, 96, 0.8), 0 0 40px rgba(245, 208, 96, 0.3);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  .marquee-lights {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 4px;
  }

  .marquee-bulb {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #ffd700;
    animation: bulb-flicker 2s ease-in-out infinite;
  }

  .marquee-bulb:nth-child(2n) { animation-delay: 0.3s; }
  .marquee-bulb:nth-child(3n) { animation-delay: 0.6s; }
  .marquee-bulb:nth-child(4n) { animation-delay: 0.9s; }

  @keyframes bulb-flicker {
    0%, 100% { opacity: 1; box-shadow: 0 0 6px #ffd700; }
    50% { opacity: 0.6; box-shadow: 0 0 3px #ffd700; }
  }

  /* Controls panel */
  .controls-panel {
    width: min(95vw, 1100px);
    margin-top: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    z-index: 40;
  }

  .controls-row {
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .slider-group {
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(20, 15, 10, 0.8);
    border: 1px solid rgba(139, 105, 20, 0.4);
    border-radius: 8px;
    padding: 10px 16px;
    backdrop-filter: blur(10px);
  }

  .slider-label {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    width: 58px;
    text-align: right;
    flex-shrink: 0;
  }

  .slider-cosy .slider-label { color: #ff9d4d; }
  .slider-eerie .slider-label { color: #9d7fff; }
  .slider-heroic .slider-label { color: #4dddff; }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 160px;
    height: 4px;
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

  .slider-cosy input[type="range"] {
    background: linear-gradient(90deg, #ff9d4d var(--val, 50%), rgba(255,157,77,0.2) var(--val, 50%));
  }

  .slider-eerie input[type="range"] {
    background: linear-gradient(90deg, #9d7fff var(--val, 50%), rgba(157,127,255,0.2) var(--val, 50%));
  }

  .slider-heroic input[type="range"] {
    background: linear-gradient(90deg, #4dddff var(--val, 50%), rgba(77,221,255,0.2) var(--val, 50%));
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.8);
    cursor: pointer;
    box-shadow: 0 0 8px currentColor;
  }

  .slider-cosy input[type="range"]::-webkit-slider-thumb { background: #ff9d4d; color: #ff9d4d; }
  .slider-eerie input[type="range"]::-webkit-slider-thumb { background: #9d7fff; color: #9d7fff; }
  .slider-heroic input[type="range"]::-webkit-slider-thumb { background: #4dddff; color: #4dddff; }

  .slider-value {
    font-family: 'Special Elite', cursive;
    font-size: 13px;
    width: 30px;
    text-align: center;
  }

  .slider-cosy .slider-value { color: #ff9d4d; }
  .slider-eerie .slider-value { color: #9d7fff; }
  .slider-heroic .slider-value { color: #4dddff; }

  /* Toggle button */
  .toggle-group {
    background: rgba(20, 15, 10, 0.8);
    border: 1px solid rgba(139, 105, 20, 0.4);
    border-radius: 8px;
    padding: 8px;
    display: flex;
    gap: 4px;
    backdrop-filter: blur(10px);
  }

  .toggle-btn {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.12em;
    padding: 6px 16px;
    border: 1px solid transparent;
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.3s ease;
    background: transparent;
  }

  .toggle-btn.active {
    background: rgba(139, 105, 20, 0.4);
    border-color: #8b6914;
    color: #f5d060;
    box-shadow: 0 0 12px rgba(245, 208, 96, 0.3);
  }

  .toggle-btn:not(.active) {
    color: rgba(245, 208, 96, 0.4);
  }

  .toggle-btn:not(.active):hover {
    color: rgba(245, 208, 96, 0.7);
  }

  /* Forecast cards */
  .forecast-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .forecast-card {
    background: rgba(10, 8, 20, 0.85);
    border: 1px solid rgba(139, 105, 20, 0.35);
    border-radius: 8px;
    padding: 10px 14px;
    text-align: center;
    min-width: 80px;
    transition: all 0.5s ease;
    backdrop-filter: blur(8px);
    cursor: default;
  }

  .forecast-card:hover {
    border-color: rgba(245, 208, 96, 0.5);
    transform: translateY(-2px);
  }

  .forecast-day {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: #8b7040;
    margin-bottom: 4px;
    text-transform: uppercase;
  }

  .forecast-icon {
    font-size: 22px;
    margin: 2px 0;
    display: block;
  }

  .forecast-temp {
    font-family: 'Special Elite', cursive;
    font-size: 14px;
    font-weight: bold;
  }

  .forecast-desc {
    font-family: 'Special Elite', cursive;
    font-size: 10px;
    margin-top: 2px;
    opacity: 0.7;
  }

  /* Decorative theatre borders */
  .theatre-outer {
    position: relative;
    padding-top: 36px;
    width: min(95vw, 1100px);
  }

  .theatre-border-left, .theatre-border-right {
    position: absolute;
    top: 36px;
    bottom: 0;
    width: 18px;
    background: linear-gradient(180deg, #3d2810, #5c3a10, #3d2810);
    border: 1px solid #6b4c1a;
    z-index: 50;
  }

  .theatre-border-left { left: 0; border-radius: 3px 0 0 3px; }
  .theatre-border-right { right: 0; border-radius: 0 3px 3px 0; }

  .pillar-ornament {
    position: absolute;
    width: 100%;
    text-align: center;
    font-size: 11px;
    color: #8b6914;
    writing-mode: vertical-rl;
    top: 50%;
    transform: translateY(-50%);
  }

  /* Reveal button */
  .reveal-btn {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #f5d060;
    background: linear-gradient(135deg, rgba(45,26,0,0.9), rgba(92,58,16,0.9));
    border: 1px solid #8b6914;
    border-radius: 6px;
    padding: 8px 24px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 0 15px rgba(245, 208, 96, 0.2);
    backdrop-filter: blur(5px);
  }

  .reveal-btn:hover {
    box-shadow: 0 0 25px rgba(245, 208, 96, 0.5);
    transform: scale(1.03);
  }

  .scene-name {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    text-align: center;
    padding: 6px 0;
    transition: color 0.5s ease;
  }

  /* Film grain overlay */
  .grain-overlay {
    position: absolute;
    inset: 0;
    z-index: 28;
    pointer-events: none;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  }

  /* Spotlight effect on canvas */
  .spotlight-overlay {
    position: absolute;
    inset: 0;
    z-index: 15;
    pointer-events: none;
    mix-blend-mode: overlay;
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ─── MOCK FORECAST DATA ─────────────────────────────────────────────────────
const BASE_FORECAST = [
  { day: 'MON', temp: 72, high: 75, low: 65, condition: 'sunny',    icon: '☀️' },
  { day: 'TUE', temp: 68, high: 70, low: 60, condition: 'cloudy',   icon: '⛅' },
  { day: 'WED', temp: 61, high: 65, low: 55, condition: 'rainy',    icon: '🌧️' },
  { day: 'THU', temp: 58, high: 62, low: 50, condition: 'stormy',   icon: '⛈️' },
  { day: 'FRI', temp: 65, high: 70, low: 58, condition: 'foggy',    icon: '🌫️' },
  { day: 'SAT', temp: 73, high: 78, low: 66, condition: 'sunny',    icon: '🌤️' },
  { day: 'SUN', temp: 70, high: 74, low: 62, condition: 'windy',    icon: '💨' },
];

// ─── SCENE INTERPRETATIONS ──────────────────────────────────────────────────
function getSceneData(cosy, eerie, heroic, isNight) {
  const dominant = Math.max(cosy, eerie, heroic);
  const blend = { cosy: cosy/100, eerie: eerie/100, heroic: heroic/100 };

  const scenes = {
    cosy: {
      name: isNight ? 'Candlelit Hearth' : 'Golden Afternoon',
      subtitles: isNight
        ? ['The fire crackles softly as rain taps the windowpane...', 'A cup of cocoa steams beside the worn armchair.', 'Outside, the world sleeps under velvet clouds.', 'Tonight, all storms belong to other stories.']
        : ['Sunlight pours through amber curtains, warm as honey.', 'The kettle whispers its gentle afternoon song.', 'Somewhere, a garden breathes after morning rain.', 'This is the weather of Sunday mornings and old books.'],
      skyTop: isNight ? '#1a0f05' : '#ff9a3c',
      skyBottom: isNight ? '#0d0805' : '#ffcc70',
      fogColor: 'rgba(255, 180, 80, 0.06)',
      groundColor: isNight ? '#1f1208' : '#3d2a0f',
      accentColor: '#ff9d4d',
    },
    eerie: {
      name: isNight ? 'Witching Hour' : 'Uncanny Noon',
      subtitles: isNight
        ? ['The fog remembers names you have forgotten...', 'Something moves between the lampposts, deliberate and slow.', 'The barometer drops without reason. Without reason at all.', 'Tonight, even the stars seem unsure of their positions.']
        : ['The shadows fall at impossible angles for this hour.', 'A stillness before thunder that never comes.', 'The trees hold their breath. Have they always watched like this?', 'Something in the atmosphere refuses to be measured.'],
      skyTop: isNight ? '#050510' : '#1a1a2e',
      skyBottom: isNight ? '#0a0520' : '#2d1b4e',
      fogColor: 'rgba(120, 80, 200, 0.08)',
      groundColor: isNight ? '#08050f' : '#12091e',
      accentColor: '#9d7fff',
    },
    heroic: {
      name: isNight ? 'Midnight Reckoning' : 'The Grand Tempest',
      subtitles: isNight
        ? ['The storm has come. The navigator turns into the wind.', 'Lightning charts the coastline in brutal clarity.', 'This is not weather to endure — it is weather to answer.', 'The sea has no memory of those who turned back.']
        : ['The clouds break like cavalry over the ridge.', 'Wind tears the flag from its mooring — glorious, free.', 'Thunder is the drumroll before the impossible deed.', 'Step forward. The storm has been waiting for you.'],
      skyTop: isNight ? '#020812' : '#0a1520',
      skyBottom: isNight ? '#051020' : '#0d2540',
      fogColor: 'rgba(77, 160, 255, 0.08)',
      groundColor: isNight ? '#03080f' : '#050f1a',
      accentColor: '#4dddff',
    },
  };

  // Pick dominant mood scene
  let dominantKey = 'cosy';
  if (eerie >= cosy && eerie >= heroic) dominantKey = 'eerie';
  if (heroic >= cosy && heroic >= eerie) dominantKey = 'heroic';

  const scene = scenes[dominantKey];

  // Blend colors based on mix
  function blendColors(colors) {
    // simple weighted blend of hex/rgba - return dominant with slight modifications
    return colors[dominantKey];
  }

  return {
    ...scene,
    blend,
    dominantKey,
    isNight,
    // Blended forecast interpretation
    forecast: BASE_FORECAST.map((d, i) => {
      let remixed = { ...d };
      if (dominantKey === 'cosy') {
        remixed.icon = isNight ? ['🕯️','☕','🌙','🔥','🌂','🍂','🌟'][i] : ['☀️','🌤️','🌼','🍵','🌈','🌿','🌞'][i];
        remixed.desc = ['Gentle', 'Peaceful', 'Soft rain', 'Warm', 'Misty', 'Amber', 'Serene'][i];
        remixed.tempColor = '#ff9d4d';
        remixed.displayTemp = (d.temp + Math.round(blend.cosy * 5)) + '°';
      } else if (dominantKey === 'eerie') {
        remixed.icon = isNight ? ['🌑','👁️','🕸️','🦇','🌒','💀','🌫️'][i] : ['🌫️','🕯️','🌑','⚰️','🌒','👻','🌚'][i];
        remixed.desc = ['Ominous', 'Uncanny', 'Hollow', 'Strange', 'Unsettling', 'Dread', 'Void'][i];
        remixed.tempColor = '#9d7fff';
        remixed.displayTemp = (d.temp - Math.round(blend.eerie * 8)) + '°';
      } else {
        remixed.icon = isNight ? ['⚡','🌊','🔥','⚡','🌩️','💥','🌪️'][i] : ['⚡','🌪️','🔱','⚔️','🌩️','🏔️','🌊'][i];
        remixed.desc = ['Epic', 'Turbulent', 'Fierce', 'Mighty', 'Electric', 'Triumphant', 'Surging'][i];
        remixed.tempColor = '#4dddff';
        remixed.displayTemp = (d.temp + Math.round(blend.heroic * 3)) + '°';
      }
      return remixed;
    })
  };
}

// ─── CANVAS RENDERER ────────────────────────────────────────────────────────
class WeatherStage {
  constructor(canvas) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.time = 0;
    this.particles = [];
    this.stars = [];
    this.initStars();
    this.initParticles(50);
    this.spotlightAngle = 0;
    this.spotlightDir = 1;
    this.lightningTimer = 0;
    this.lightningFlash = 0;
    this.scrollX = 0;
  }

  initStars() {
    this.stars = Array.from({ length: 200 }, () => ({
      x: Math.random(),
      y: Math.random() * 0.7,
      r: Math.random() * 1.5 + 0.3,
      twinkle: Math.random() * Math.PI * 2,
      twinkleSpeed: Math.random() * 0.03 + 0.01,
    }));
  }

  initParticles(n) {
    this.particles = Array.from({ length: n }, () => this.createParticle());
  }

  createParticle() {
    return {
      x: Math.random(),
      y: Math.random(),
      vx: (Math.random() - 0.5) * 0.002,
      vy: Math.random() * 0.001 + 0.0005,
      r: Math.random() * 3 + 1,
      alpha: Math.random() * 0.5 + 0.1,
      life: 1,
    };
  }

  resize(w, h) {
    this.W = w;
    this.H = h;
    this.canvas.width = w;
    this.canvas.height = h;
  }

  render(sceneData, dt) {
    const { ctx, W, H } = this;
    if (!W || !H) return;

    this.time += dt;
    this.scrollX += 0.0003;

    const { dominantKey, isNight, blend } = sceneData;

    // ── Background gradient ──
    const skyGrad = ctx.createLinearGradient(0, 0, 0, H * 0.75);
    skyGrad.addColorStop(0, sceneData.skyTop);
    skyGrad.addColorStop(1, sceneData.skyBottom);
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, H);

    // ── Stars (night / eerie) ──
    if (isNight || dominantKey === 'eerie') {
      const starAlpha = isNight ? 1 : 0.4;
      this.stars.forEach(s => {
        s.twinkle += s.twinkleSpeed;
        const a = starAlpha * (0.5 + 0.5 * Math.sin(s.twinkle));
        ctx.beginPath();
        ctx.arc(s.x * W, s.y * H * 0.8, s.r, 0, Math.PI * 2);
        ctx.fillStyle = dominantKey === 'eerie'
          ? `rgba(160,120,255,${a})`
          : `rgba(255,255,240,${a})`;
        ctx.fill();
      });
    }

    // ── Moon / Sun ──
    if (isNight) {
      const moonX = W * 0.75 + Math.sin(this.time * 0.05) * W * 0.02;
      const moonY = H * 0.18;
      // Moon glow
      const moonGlow = ctx.createRadialGradient(moonX, moonY, 5, moonX, moonY, 60);
      if (dominantKey === 'eerie') {
        moonGlow.addColorStop(0, 'rgba(160,100,255,0.3)');
        moonGlow.addColorStop(1, 'rgba(160,100,255,0)');
      } else if (dominantKey === 'heroic') {
        moonGlow.addColorStop(0, 'rgba(100,180,255,0.25)');
        moonGlow.addColorStop(1, 'rgba(100,180,255,0)');
      } else {
        moonGlow.addColorStop(0, 'rgba(255,230,150,0.3)');
        moonGlow.addColorStop(1, 'rgba(255,230,150,0)');
      }
      ctx.beginPath();
      ctx.arc(moonX, moonY, 60, 0, Math.PI * 2);
      ctx.fillStyle = moonGlow;
      ctx.fill();
      // Moon disc
      ctx.beginPath();
      ctx.arc(moonX, moonY, 22, 0, Math.PI * 2);
      ctx.fillStyle = dominantKey === 'eerie' ? '#b090ff' : dominantKey === 'heroic' ? '#90c8ff' : '#fff8dc';
      ctx.fill();
      // Crescent shadow
      if (dominantKey !== 'heroic') {
        ctx.beginPath();
        ctx.arc(moonX + 8, moonY - 4, 18, 0, Math.PI * 2);
        ctx.fillStyle = sceneData.skyTop;
        ctx.fill();
      }
    } else {
      // Sun
      const sunX = W * 0.72 + Math.sin(this.time * 0.04) * W * 0.015;
      const sunY = H * 0.15 + Math.cos(this.time * 0.03) * H * 0.02;

      if (dominantKey === 'cosy') {
        // Warm sun
        const sunGlow = ctx.createRadialGradient(sunX, sunY, 5, sunX, sunY, 120);
        sunGlow.addColorStop(0, 'rgba(255,200,50,0.5)');
        sunGlow.addColorStop(0.4, 'rgba(255,150,30,0.2)');
        sunGlow.addColorStop(1, 'rgba(255,100,0,0)');
        ctx.beginPath();
        ctx.arc(sunX, sunY, 120, 0, Math.PI * 2);
        ctx.fillStyle = sunGlow;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(sunX, sunY, 28, 0, Math.PI * 2);
        ctx.fillStyle = '#ffe060';
        ctx.fill();
      } else if (dominantKey === 'eerie') {
        // Sickly sun
        const sunGlow = ctx.createRadialGradient(sunX, sunY, 5, sunX, sunY, 80);
        sunGlow.addColorStop(0, 'rgba(180,100,255,0.3)');
        sunGlow.addColorStop(1, 'rgba(180,100,255,0)');
        ctx.beginPath();
        ctx.arc(sunX, sunY, 80, 0, Math.PI * 2);
        ctx.fillStyle = sunGlow;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(sunX, sunY, 20, 0, Math.PI * 2);
        ctx.fillStyle = '#c0a0ff';
        ctx.fill();
      } else {
        // Heroic dramatic sun behind clouds
        const sunGlow = ctx.createRadialGradient(sunX, sunY, 5, sunX, sunY, 150);
        sunGlow.addColorStop(0, 'rgba(100,200,255,0.4)');
        sunGlow.addColorStop(1, 'rgba(100,200,255,0)');
        ctx.beginPath();
        ctx.arc(sunX, sunY, 150, 0, Math.PI * 2);
        ctx.fillStyle = sunGlow;
        ctx.fill();
      }
    }

    // ── Parallax cloud layers ──
    this.renderClouds(sceneData);

    // ── Lightning (eerie + heroic) ──
    if (dominantKey === 'eerie' || dominantKey === 'heroic') {
      this.lightningTimer -= dt;
      if (this.lightningTimer <= 0) {
        this.lightningTimer = dominantKey === 'heroic'
          ? 0.8 + Math.random() * 2
          : 2 + Math.random() * 4;
        this.lightningFlash = 1;
        this.drawLightning(dominantKey);
      }
      if (this.lightningFlash > 0) {
        this.lightningFlash -= dt * 3;
        ctx.fillStyle = `rgba(255,255,255,${this.lightningFlash * 0.06})`;
        ctx.fillRect(0, 0, W, H);
      }
    }

    // ── Rain / Snow / Embers ──
    this.renderParticles(sceneData);

    // ── Ground / Horizon ──
    this.renderGround(sceneData);

    // ── Parallax trees / silhouettes ──
    this.renderSilhouettes(sceneData);

    // ── Fog layer ──
    this.renderFog(sceneData);

    // ── Spotlight sweep ──
    this.renderSpotlight(sceneData);

    // ── Stage floor shine ──
    const floorGrad = ctx.createLinearGradient(0, H * 0.78, 0, H);
    floorGrad.addColorStop(0, 'rgba(255,255,255,0.03)');
    floorGrad.addColorStop(0.3, 'rgba(255,255,255,0.06)');
    floorGrad.addColorStop(1, 'rgba(0,0,0,0.5)');
    ctx.fillStyle = floorGrad;
    ctx.fillRect(0, H * 0.78, W, H * 0.22);
  }

  drawLightning(dominantKey) {
    const { ctx, W, H } = this;
    const x = W * (0.2 + Math.random() * 0.6);
    const color = dominantKey === 'heroic' ? '#88ddff' : '#cc88ff';

    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.shadowBlur = 20;
    ctx.shadowColor = color;
    ctx.globalAlpha = 0.9;
    ctx.beginPath();
    ctx.moveTo(x, 0);

    let cx = x, cy = 0;
    while (cy < H * 0.7) {
      cx += (Math.random() - 0.5) * 40;
      cy += 20 + Math.random() * 30;
      ctx.lineTo(cx, cy);
    }
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }

  renderClouds(sceneData) {
    const { ctx, W, H } = this;
    const { dominantKey, isNight } = sceneData;
    const t = this.scrollX;

    const cloudLayers = [
      { y: 0.08, scale: 1.8, speed: 0.8, alpha: dominantKey === 'heroic' ? 0.5 : 0.3 },
      { y: 0.15, scale: 1.2, speed: 0.5, alpha: 0.25 },
      { y: 0.22, scale: 0.8, speed: 0.3, alpha: 0.2 },
    ];

    cloudLayers.forEach((layer, li) => {
      const cloudColor = dominantKey === 'cosy'
        ? (isNight ? 'rgba(80,50,30,' : 'rgba(255,220,150,')
        : dominantKey === 'eerie'
          ? 'rgba(60,40,100,'
          : 'rgba(30,60,100,';

      const numClouds = 4;
      for (let ci = 0; ci < numClouds; ci++) {
        const baseX = ((ci / numClouds + t * layer.speed * 0.1) % 1.2) - 0.1;
        const cloudX = baseX * W;
        const cloudY = layer.y * H + Math.sin(t * 2 + li + ci) * H * 0.01;
        const s = layer.scale * (0.8 + ci * 0.1) * W * 0.08;

        ctx.globalAlpha = layer.alpha;
        ctx.fillStyle = cloudColor + '1)';

        // Puffy cloud shape
        ctx.beginPath();
        ctx.arc(cloudX, cloudY, s, 0, Math.PI * 2);
        ctx.arc(cloudX + s * 0.8, cloudY + s * 0.1, s * 0.75, 0, Math.PI * 2);
        ctx.arc(cloudX - s * 0.7, cloudY + s * 0.15, s * 0.65, 0, Math.PI * 2);
        ctx.arc(cloudX + s * 0.4, cloudY - s * 0.4, s * 0.6, 0, Math.PI * 2);
        ctx.fill();
      }
    });
    ctx.globalAlpha = 1;
  }

  renderParticles(sceneData) {
    const { ctx, W, H } = this;
    const { dominantKey, isNight } = sceneData;

    this.particles.forEach((p, i) => {
      p.x += p.vx + (dominantKey === 'heroic' ? 0.004 : 0.001);
      p.y += p.vy * (dominantKey === 'heroic' ? 3 : 1);

      if (p.y > 1 || p.x < -0.05 || p.x > 1.05) {
        this.particles[i] = this.createParticle();
        this.particles[i].y = 0;
        return;
      }

      const px = p.x * W, py = p.y * H;

      ctx.globalAlpha = p.alpha * (1 - p.y * 0.5);

      if (dominantKey === 'cosy') {
        // Embers / snowflakes
        if (isNight) {
          // Embers
          ctx.beginPath();
          ctx.arc(px, py, p.r * 0.5, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255,${100 + Math.random()*50},20,1)`;
          ctx.fill();
          // Ember glow
          const g = ctx.createRadialGradient(px, py, 0, px, py, p.r * 3);
          g.addColorStop(0, 'rgba(255,150,20,0.3)');
          g.addColorStop(1, 'rgba(255,100,0,0)');
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(px, py, p.r * 3, 0, Math.PI * 2);
          ctx.fill();
        } else {
          // Pollen/dust
          ctx.beginPath();
          ctx.arc(px, py, p.r * 0.4, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(255,220,100,1)';
          ctx.fill();
        }
      } else if (dominantKey === 'eerie') {
        // Wisps
        ctx.beginPath();
        ctx.arc(px, py, p.r, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(140,80,255,0.5)';
        ctx.fill();
        ctx.shadowBlur = 8;
        ctx.shadowColor = '#8040ff';
        ctx.fill();
        ctx.shadowBlur = 0;
      } else {
        // Rain
        ctx.beginPath();
        ctx.moveTo(px, py);
        ctx.lineTo(px + 2, py + p.r * 4);
        ctx.strokeStyle = 'rgba(130,200,255,0.6)';
        ctx.lineWidth = 1;
        ctx.stroke();
      }

      ctx.globalAlpha = 1;
    });
  }

  renderGround(sceneData) {
    const { ctx, W, H } = this;
    const { dominantKey, groundColor } = sceneData;

    const groundY = H * 0.78;
    const grad = ctx.createLinearGradient(0, groundY, 0, H);
    grad.addColorStop(0, groundColor);
    grad.addColorStop(1, '#000000');
    ctx.fillStyle = grad;
    ctx.fillRect(0, groundY, W, H - groundY);
  }

  renderSilhouettes(sceneData) {
    const { ctx, W, H } = this;
    const { dominantKey, isNight } = sceneData;
    const t = this.scrollX;

    const treeColor = dominantKey === 'cosy'
      ? 'rgba(30,15,5,0.9)'
      : dominantKey === 'eerie'
        ? 'rgba(15,5,30,0.95)'
        : 'rgba(5,15,30,0.95)';

    // Far layer (smaller, lighter)
    ctx.fillStyle = treeColor.replace('0.9', '0.5').replace('0.95', '0.5');
    for (let i = 0; i < 12; i++) {
      const treeX = (((i / 12 + t * 0.12) % 1.05) - 0.025) * W;
      const treeH = H * (0.12 + Math.sin(i * 1.7) * 0.04);
      this.drawTree(treeX, H * 0.78, treeH, dominantKey, i);
    }

    // Near layer (taller, darker)
    ctx.fillStyle = treeColor;
    for (let i = 0; i < 7; i++) {
      const treeX = (((i / 7 + t * 0.25 + 0.07) % 1.1) - 0.05) * W;
      const treeH = H * (0.18 + Math.sin(i * 2.3) * 0.06);
      this.drawTree(treeX, H * 0.78, treeH, dominantKey, i + 12);
    }
  }

  drawTree(x, baseY, h, dominantKey, seed) {
    const { ctx } = this;
    if (dominantKey === 'eerie') {
      // Dead bare tree
      ctx.save();
      ctx.translate(x, baseY);
      ctx.fillRect(-2, -h, 4, h);
      // Branches
      for (let b = 0; b < 4; b++) {
        const by = h * (0.3 + b * 0.15);
        const blen = h * (0.15 + b * 0.05) * (b % 2 === 0 ? 1 : -1);
        ctx.fillRect(b % 2 === 0 ? 0 : blen, -by, Math.abs(blen), 2);
        ctx.fillRect(b % 2 === 0 ? blen * 0.7 : blen * 0.7 - Math.abs(blen)*0.3, -by - h*0.08, Math.abs(blen)*0.3, 2);
      }
      ctx.restore();
    } else if (dominantKey === 'heroic') {
      // Dramatic pine
      ctx.beginPath();
      ctx.moveTo(x, baseY);
      ctx.lineTo(x - h * 0.35, baseY);
      ctx.lineTo(x, baseY - h);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(x - h*0.35, baseY);
      ctx.lineTo(x + h * 0.35, baseY);
      ctx.lineTo(x, baseY - h);
      ctx.closePath();
      ctx.fill();
    } else {
      // Cosy rounded tree
      ctx.beginPath();
      ctx.arc(x, baseY - h * 0.6, h * 0.35, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillRect(x - h * 0.06, baseY - h * 0.35, h * 0.12, h * 0.35);
    }
  }

  renderFog(sceneData) {
    const { ctx, W, H } = this;
    const { fogColor, dominantKey } = sceneData;
    const t = this.time;

    // Ground fog
    const fogIntensity = dominantKey === 'eerie' ? 0.18 : dominantKey === 'cosy' ? 0.1 : 0.08;

    for (let i = 0; i < 3; i++) {
      const fogY = H * (0.72 + i * 0.04) + Math.sin(t * 0.3 + i) * H * 0.01;
      const fogH = H * (0.08 + i * 0.03);
      const grad = ctx.createLinearGradient(0, fogY, 0, fogY + fogH);
      const col = sceneData.fogColor.replace('0.06', (fogIntensity * (1 - i * 0.3)).toFixed(3));
      grad.addColorStop(0, col.replace('rgba', 'rgba').replace(/,[^,]+\)$/, `,${fogIntensity * (1-i*0.3)})`));
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = col;
      ctx.globalAlpha = 0.7 - i * 0.2;

      // Wavy fog shape
      ctx.beginPath();
      ctx.moveTo(0, fogY);
      for (let x = 0; x <= W; x += 20) {
        const y = fogY + Math.sin(x * 0.01 + t * 0.5 + i * 2) * fogH * 0.3;
        ctx.lineTo(x, y);
      }
      ctx.lineTo(W, fogY + fogH);
      ctx.lineTo(0, fogY + fogH);
      ctx.closePath();
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  renderSpotlight(sceneData) {
    const { ctx, W, H } = this;
    const { dominantKey, accentColor } = sceneData;
    const t = this.time;

    // Animate spotlight sweep
    this.spotlightAngle += 0.008 * this.spotlightDir;
    if (Math.abs(this.spotlightAngle) > 0.4) this.spotlightDir *= -1;

    const spotX = W * 0.5 + Math.sin(t * 0.4) * W * 0.25;
    const spotY = 0;
    const groundX = W * 0.5 + Math.sin(t * 0.4 + 0.3) * W * 0.2;
    const groundY = H * 0.85;

    // Spotlight cone
    const spotGrad = ctx.createRadialGradient(spotX, spotY, 0, groundX, groundY, W * 0.25);

    let r, g, b;
    if (dominantKey === 'cosy') { r = 255; g = 180; b = 80; }
    else if (dominantKey === 'eerie') { r = 150; g = 80; b = 255; }
    else { r = 80; g = 160; b = 255; }

    spotGrad.addColorStop(0, `rgba(${r},${g},${b},0.12)`);
    spotGrad.addColorStop(0.5, `rgba(${r},${g},${b},0.06)`);
    spotGrad.addColorStop(1, `rgba(${r},${g},${b},0)`);

    ctx.beginPath();
    ctx.moveTo(spotX, spotY);
    const angle = Math.PI / 7;
    const dir = Math.atan2(groundY - spotY, groundX - spotX);
    ctx.arc(spotX, spotY, W * 0.8, dir - angle, dir + angle);
    ctx.closePath();
    ctx.fillStyle = spotGrad;
    ctx.fill();

    // Second crossing spotlight
    const spot2X = W - spotX;
    const ground2X = W - groundX;
    const spotGrad2 = ctx.createRadialGradient(spot2X, spotY, 0, ground2X, groundY, W * 0.25);
    spotGrad2.addColorStop(0, `rgba(${r},${g},${b},0.08)`);
    spotGrad2.addColorStop(1, `rgba(${r},${g},${b},0)`);

    ctx.beginPath();
    ctx.moveTo(spot2X, spotY);
    const dir2 = Math.atan2(groundY - spotY, ground2X - spot2X);
    ctx.arc(spot2X, spotY, W * 0.8, dir2 - angle, dir2 + angle);
    ctx.closePath();
    ctx.fillStyle = spotGrad2;
    ctx.fill();
  }
}

// ─── CURTAIN RENDERER ───────────────────────────────────────────────────────
function drawCurtain(canvas, side, dominantKey) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width = canvas.offsetWidth || 520;
  const H = canvas.height = canvas.offsetHeight || 580;

  const foldCount = 7;
  const colors = {
    cosy:   { base: '#8b1a1a', mid: '#a52020', shadow: '#4a0a0a', highlight: '#c43030', valance: '#6b1010', fringe: '#d4a010' },
    eerie:  { base: '#1a0a3a', mid: '#251050', shadow: '#0d0520', highlight: '#3a1870', valance: '#15082a', fringe: '#6a30c0' },
    heroic: { base: '#0a1a3a', mid: '#102050', shadow: '#050d20', highlight: '#1a3870', valance: '#081528', fringe: '#1a60a0' },
  };

  const c = colors[dominantKey] || colors.cosy;

  // Main curtain with folds
  for (let f = 0; f < foldCount; f++) {
    const frac = f / foldCount;
    const nextFrac = (f + 1) / foldCount;

    const x0 = side === 'left' ? frac * W : (1 - nextFrac) * W;
    const x1 = side === 'left' ? nextFrac * W : (1 - frac) * W;
    const midX = (x0 + x1) / 2;

    // Fold gradient
    const grad = ctx.createLinearGradient(x0, 0, x1, 0);
    const isLight = (f % 2 === 0) === (side === 'left');
    grad.addColorStop(0, isLight ? c.highlight : c.shadow);
    grad.addColorStop(0.4, c.base);
    grad.addColorStop(0.6, c.mid);
    grad.addColorStop(1, isLight ? c.shadow : c.highlight);

    // Curtain fold shape with slight wave
    ctx.beginPath();
    ctx.moveTo(x0, 0);
    ctx.bezierCurveTo(
      x0 + (side === 'left' ? 15 : -15), H * 0.25,
      x0 + (side === 'left' ? -10 : 10), H * 0.5,
      x0 + (side === 'left' ? 8 : -8), H * 0.75
    );
    ctx.lineTo(x0, H);
    ctx.lineTo(x1, H);
    ctx.bezierCurveTo(
      x1 + (side === 'left' ? -8 : 8), H * 0.75,
      x1 + (side === 'left' ? 10 : -10), H * 0.5,
      x1 + (side === 'left' ? -15 : 15), H * 0.25
    );
    ctx.lineTo(x1, 0);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();

    // Fold shadow line
    ctx.beginPath();
    ctx.moveTo(midX, 0);
    ctx.bezierCurveTo(
      midX + (side === 'left' ? 5 : -5), H * 0.33,
      midX + (side === 'left' ? -5 : 5), H * 0.66,
      midX, H
    );
    ctx.strokeStyle = `rgba(0,0,0,0.25)`;
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // Valance (top decorative band)
  const valanceH = H * 0.08;
  const valGrad = ctx.createLinearGradient(0, 0, 0, valanceH);
  valGrad.addColorStop(0, c.valance);
  valGrad.addColorStop(1, c.base);
  ctx.fillStyle = valGrad;
  ctx.fillRect(0, 0, W, valanceH);

  // Valance swag decoration
  ctx.strokeStyle = c.fringe;
  ctx.lineWidth = 3;
  ctx.beginPath();
  const swagCount = 5;
  for (let s = 0; s < swagCount; s++) {
    const sx = (s / swagCount) * W;
    const ex = ((s + 1) / swagCount) * W;
    const midSx = (sx + ex) / 2;
    ctx.moveTo(sx, valanceH * 0.1);
    ctx.quadraticCurveTo(midSx, valanceH * 0.9, ex, valanceH * 0.1);
  }
  ctx.stroke();

  // Gold trim rope
  ctx.strokeStyle = c.fringe;
  ctx.lineWidth = 5;
  ctx.shadowBlur = 8;
  ctx.shadowColor = c.fringe;
  ctx.beginPath();
  ctx.moveTo(0, valanceH * 0.15);
  ctx.lineTo(W, valanceH * 0.15);
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Fringe tassels
  ctx.strokeStyle = c.fringe;
  ctx.lineWidth = 1.5;
  const tasselCount = Math.floor(W / 8);
  for (let t = 0; t < tasselCount; t++) {
    const tx = (t / tasselCount) * W + 4;
    const len = valanceH * (0.5 + (t % 3) * 0.15);
    ctx.beginPath();
    ctx.moveTo(tx, valanceH * 0.15);
    ctx.lineTo(tx, valanceH * 0.15 + len);
    ctx.stroke();
  }

  // Edge rope/tieback
  const tieY = H * 0.55;
  const tieX = side === 'left' ? W * 0.15 : W * 0.85;
  const tieRad = H * 0.04;
  ctx.strokeStyle = c.fringe;
  ctx.lineWidth = 6;
  ctx.shadowBlur = 10;
  ctx.shadowColor = c.fringe;
  ctx.beginPath();
  ctx.arc(tieX, tieY, tieRad, 0, Math.PI * 2);
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Dark edge shadow for depth
  const edgeGrad = ctx.createLinearGradient(
    side === 'left' ? W : 0, 0,
    side === 'left' ? W * 0.85 : W * 0.15, 0
  );
  edgeGrad.addColorStop(0, 'rgba(0,0,0,0.5)');
  edgeGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = edgeGrad;
  ctx.fillRect(0, 0, W, H);
}

// ─── TYPEWRITER HOOK ────────────────────────────────────────────────────────
function useTypewriter(text, speed = 45) {
  const [displayed, setDisplayed] = useState('');
  const [done, setDone] = useState(false);
  const timerRef = useRef(null);
  const indexRef = useRef(0);

  useEffect(() => {
    setDisplayed('');
    setDone(false);
    indexRef.current = 0;

    if (timerRef.current) clearInterval(timerRef.current);

    if (!text) { setDone(true); return; }

    timerRef.current = setInterval(() => {
      indexRef.current++;
      setDisplayed(text.slice(0, indexRef.current));
      if (indexRef.current >= text.length) {
        clearInterval(timerRef.current);
        setDone(true);
      }
    }, speed);

    return () => clearInterval(timerRef.current);
  }, [text, speed]);

  return { displayed, done };
}

// ─── MAIN APP ───────────────────────────────────────────────────────────────
function WeatherTheatre() {
  const [cosy, setCosy] = useState(70);
  const [eerie, setEerie] = useState(20);
  const [heroic, setHeroic] = useState(30);
  const [isNight, setIsNight] = useState(false);
  const [curtainOpen, setCurtainOpen] = useState(false);
  const [subtitleIndex, setSubtitleIndex] = useState(0);
  const [prevScene, setPrevScene] = useState(null);

  const stageCanvasRef = useRef(null);
  const curtainLeftRef = useRef(null);
  const curtainRightRef = useRef(null);
  const stageRef = useRef(null);
  const animFrameRef = useRef(null);
  const lastTimeRef = useRef(0);

  const sceneData = useMemo(
    () => getSceneData(cosy, eerie, heroic, isNight),
    [cosy, eerie, heroic, isNight]
  );

  // Cycle subtitle when scene changes
  useEffect(() => {
    if (prevScene && prevScene !== sceneData.name) {
      setSubtitleIndex(i => (i + 1) % sceneData.subtitles.length);
    }
    setPrevScene(sceneData.name);
  }, [sceneData.name]);

  // Auto-advance subtitles
  useEffect(() => {
    const timer = setInterval(() => {
      setSubtitleIndex(i => (i + 1) % sceneData.subtitles.length);
    }, 8000);
    return () => clearInterval(timer);
  }, [sceneData.subtitles.length]);

  const currentSubtitle = sceneData.subtitles[subtitleIndex % sceneData.subtitles.length];
  const { displayed, done } = useTypewriter(currentSubtitle, 40);

  // Draw curtains
  useEffect(() => {
    if (curtainLeftRef.current) {
      drawCurtain(curtainLeftRef.current, 'left', sceneData.dominantKey);
    }
    if (curtainRightRef.current) {
      drawCurtain(curtainRightRef.current, 'right', sceneData.dominantKey);
    }
  }, [sceneData.dominantKey]);

  // Canvas animation loop
  useEffect(() => {
    const canvas = stageCanvasRef.current;
    if (!canvas) return;

    if (!stageRef.current) {
      stageRef.current = new WeatherStage(canvas);
    }
    const stage = stageRef.current;

    const resizeObserver = new ResizeObserver(entries => {
      for (const entry of entries) {
        const { width, height } = entry.contentRect;
        stage.resize(width, height);
      }
    });

    const frameEl = canvas.parentElement;
    if (frameEl) resizeObserver.observe(frameEl);

    const w = canvas.parentElement?.clientWidth || 900;
    const h = canvas.parentElement?.clientHeight || 500;
    stage.resize(w, h);

    function animate(timestamp) {
      const dt = Math.min((timestamp - (lastTimeRef.current || timestamp)) / 1000, 0.05);
      lastTimeRef.current = timestamp;
      stage.render(sceneData, dt);
      animFrameRef.current = requestAnimationFrame(animate);
    }

    animFrameRef.current = requestAnimationFrame(animate);

    return () => {
      if (animFrameRef.current) cancelAnimationFrame(animFrameRef.current);
      resizeObserver.disconnect();
    };
  }, [sceneData]);

  // Update slider CSS variable for track fill
  function sliderStyle(val) {
    return { '--val': `${val}%` };
  }

  const accentColors = {
    cosy: '#ff9d4d',
    eerie: '#9d7fff',
    heroic: '#4dddff',
  };
  const sceneColor = accentColors[sceneData.dominantKey];

  return (
    <div className="theatre-wrapper">
      <div className="theatre-outer">
        {/* Header marquee */}
        <div className="theatre-marquee">
          <div className="theatre-title">The Weather Theatre</div>
          <div className="marquee-lights">
            {Array.from({length: 16}).map((_, i) => (
              <div key={i} className="marquee-bulb" style={{ animationDelay: `${i * 0.12}s` }} />
            ))}
          </div>
        </div>

        {/* Side pillars */}
        <div className="theatre-border-left">
          <div className="pillar-ornament">✦ ✦ ✦</div>
        </div>
        <div className="theatre-border-right">
          <div className="pillar-ornament">✦ ✦ ✦</div>
        </div>

        {/* Stage frame */}
        <div className="theatre-frame" style={{ marginLeft: 18, marginRight: 18 }}>
          {/* Stage canvas */}
          <canvas ref={stageCanvasRef} className="stage-canvas" />

          {/* Grain overlay */}
          <div className="grain-overlay" />

          {/* Proscenium arch SVG */}
          <svg className="proscenium" viewBox="0 0 1000 580" preserveAspectRatio="none">
            <defs>
              <linearGradient id="archGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor="#2d1a00" />
                <stop offset="100%" stopColor="#1a0f00" />
              </linearGradient>
              <linearGradient id="archShine" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0%" stopColor="rgba(139,105,20,0.8)" />
                <stop offset="30%" stopColor="rgba(200,160,40,0.4)" />
                <stop offset="70%" stopColor="rgba(200,160,40,0.4)" />
                <stop offset="100%" stopColor="rgba(139,105,20,0.8)" />
              </linearGradient>
            </defs>
            {/* Top beam */}
            <rect x="0" y="0" width="1000" height="24" fill="url(#archGrad)" />
            <rect x="0" y="22" width="1000" height="3" fill="url(#archShine)" />
            {/* Bottom beam */}
            <rect x="0" y="556" width="1000" height="24" fill="url(#archGrad)" />
            <rect x="0" y="554" width="1000" height="3" fill="url(#archShine)" />
          </svg>

          {/* Curtains */}
          <div className={`curtain-left ${curtainOpen ? 'open' : ''}`}>
            <canvas ref={curtainLeftRef} className="curtain-canvas" />
          </div>
          <div className={`curtain-right ${curtainOpen ? 'open' : ''}`}>
            <canvas ref={curtainRightRef} className="curtain-canvas" />
          </div>

          {/* Subtitle */}
          <div className="subtitle-bar">
            <div className="subtitle-text">
              {displayed}
              {!done && <span className="cursor-blink" />}
            </div>
          </div>
        </div>
      </div>

      {/* Controls */}
      <div className="controls-panel">
        <div className="controls-row">
          {/* Scene name */}
          <div className="scene-name" style={{ color: sceneColor, textShadow: `0 0 20px ${sceneColor}60` }}>
            ★ {sceneData.name} ★
          </div>

          {/* Matinée / Night toggle */}
          <div className="toggle-group">
            <button
              className={`toggle-btn ${!isNight ? 'active' : ''}`}
              onClick={() => setIsNight(false)}
            >
              ☀ Matinée
            </button>
            <button
              className={`toggle-btn ${isNight ? 'active' : ''}`}
              onClick={() => setIsNight(true)}
            >
              ☽ Night
            </button>
          </div>

          {/* Curtain reveal button */}
          <button
            className="reveal-btn"
            onClick={() => setCurtainOpen(o => !o)}
          >
            {curtainOpen ? '▐ Close Curtain ▌' : '▶ Raise Curtain ◀'}
          </button>
        </div>

        {/* Sliders row */}
        <div className="controls-row">
          <div className="slider-group slider-cosy">
            <label className="slider-label">Cosy</label>
            <input
              type="range" min="0" max="100" value={cosy}
              style={sliderStyle(cosy)}
              onChange={e => setCosy(+e.target.value)}
            />
            <span className="slider-value">{cosy}</span>
          </div>

          <div className="slider-group slider-eerie">
            <label className="slider-label">Eerie</label>
            <input
              type="range" min="0" max="100" value={eerie}
              style={sliderStyle(eerie)}
              onChange={e => setEerie(+e.target.value)}
            />
            <span className="slider-value">{eerie}</span>
          </div>

          <div className="slider-group slider-heroic">
            <label className="slider-label">Heroic</label>
            <input
              type="range" min="0" max="100" value={heroic}
              style={sliderStyle(heroic)}
              onChange={e => setHeroic(+e.target.value)}
            />
            <span className="slider-value">{heroic}</span>
          </div>
        </div>

        {/* Forecast cards */}
        <div className="forecast-row">
          {sceneData.forecast.map((day, i) => (
            <div
              key={day.day}
              className="forecast-card"
              style={{
                borderColor: `${sceneColor}40`,
                animationDelay: `${i * 0.1}s`,
              }}
            >
              <div className="forecast-day">{day.day}</div>
              <span className="forecast-icon">{day.icon}</span>
              <div className="forecast-temp" style={{ color: day.tempColor }}>
                {day.displayTemp}
              </div>
              <div className="forecast-desc" style={{ color: day.tempColor + 'aa' }}>
                {day.desc}
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<WeatherTheatre />);
</script>
</body>
</html>
