<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS — Audio Step Sequencer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  :root {
    --bg: #030610;
    --panel: #080f1e;
    --panel2: #0c1628;
    --border: #1a3060;
    --accent: #00f0ff;
    --accent2: #ff2d78;
    --accent3: #7b2fff;
    --green: #00ff88;
    --yellow: #ffcc00;
    --glow: 0 0 10px rgba(0,240,255,0.6), 0 0 30px rgba(0,240,255,0.2);
    --glow2: 0 0 10px rgba(255,45,120,0.6), 0 0 30px rgba(255,45,120,0.2);
    --glow3: 0 0 10px rgba(123,47,255,0.6), 0 0 30px rgba(123,47,255,0.2);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: #c0d8ff;
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(0,80,200,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(100,0,200,0.08) 0%, transparent 60%),
      linear-gradient(180deg, #030610 0%, #060c1a 100%);
  }

  /* Scanlines overlay */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  #app {
    max-width: 1100px;
    margin: 0 auto;
    padding: 20px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 0 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
    position: relative;
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0;
    width: 60%;
    height: 1px;
    background: linear-gradient(90deg, var(--accent), transparent);
    box-shadow: var(--glow);
  }
  .logo {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 28px;
    letter-spacing: 6px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent3) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 10px rgba(0,240,255,0.4));
  }
  .logo span {
    font-size: 11px;
    letter-spacing: 4px;
    display: block;
    background: linear-gradient(135deg, #6080ff, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-top: 2px;
  }
  .header-status {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 11px;
    letter-spacing: 2px;
    color: #4060a0;
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Transport */
  .transport {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 18px 20px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }
  .transport::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.6;
  }

  .btn {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 10px 20px;
    border: 1px solid;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s ease;
    text-transform: uppercase;
    background: transparent;
    position: relative;
    overflow: hidden;
  }
  .btn::before {
    content: '';
    position: absolute;
    top: 0; left: -100%; right: 0; bottom: 0;
    background: currentColor;
    opacity: 0;
    transition: all 0.3s ease;
  }
  .btn:hover::before { left: 0; opacity: 0.1; }
  .btn:active { transform: scale(0.96); }

  .btn-play {
    color: var(--green);
    border-color: var(--green);
    box-shadow: 0 0 8px rgba(0,255,136,0.2);
    padding: 10px 28px;
    font-size: 13px;
  }
  .btn-play:hover, .btn-play.active {
    box-shadow: 0 0 20px rgba(0,255,136,0.5), 0 0 40px rgba(0,255,136,0.2);
    background: rgba(0,255,136,0.08);
  }
  .btn-stop {
    color: var(--accent2);
    border-color: var(--accent2);
  }
  .btn-stop:hover {
    box-shadow: var(--glow2);
    background: rgba(255,45,120,0.08);
  }
  .btn-clear {
    color: #6080a0;
    border-color: #304060;
    font-size: 10px;
  }
  .btn-clear:hover {
    color: var(--accent2);
    border-color: var(--accent2);
  }
  .btn-export {
    color: var(--accent3);
    border-color: var(--accent3);
    font-size: 10px;
    margin-left: auto;
  }
  .btn-export:hover {
    box-shadow: var(--glow3);
    background: rgba(123,47,255,0.08);
  }

  /* BPM / Swing */
  .control-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    min-width: 80px;
  }
  .control-label {
    font-size: 9px;
    letter-spacing: 2px;
    color: #4060a0;
    text-transform: uppercase;
  }
  .control-value {
    font-family: 'Orbitron', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    text-shadow: var(--glow);
    min-width: 60px;
    text-align: center;
  }
  .control-value.small { font-size: 14px; }
  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: var(--glow);
    cursor: pointer;
    transition: all 0.15s;
  }
  input[type=range]::-webkit-slider-thumb:hover {
    width: 18px; height: 18px;
    box-shadow: 0 0 20px var(--accent);
  }
  .bpm-range { width: 100px; }
  .swing-range { width: 80px; }

  /* Visualizer */
  #visualizer {
    width: 100%;
    height: 60px;
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 16px;
    background: var(--panel);
  }

  /* Step Grid */
  .grid-container {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }
  .grid-container::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent3), transparent);
    opacity: 0.5;
  }

  .track-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .track-row:last-child { margin-bottom: 0; }

  .track-info {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 3px;
    min-width: 90px;
  }
  .track-name {
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--accent);
  }
  .track-controls {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .vol-knob {
    width: 50px;
    height: 3px;
    -webkit-appearance: none;
    background: var(--border);
    border-radius: 2px;
    outline: none;
  }
  .vol-knob::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 10px; height: 10px;
    border-radius: 50%;
    cursor: pointer;
    transition: all 0.15s;
  }

  .steps {
    display: flex;
    gap: 4px;
    flex: 1;
  }

  .step {
    flex: 1;
    height: 38px;
    border-radius: 5px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: all 0.1s ease;
    position: relative;
    overflow: hidden;
  }
  /* Every 4th step group separator */
  .step:nth-child(4n+1) { margin-left: 6px; }
  .step:first-child { margin-left: 0; }

  .step::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    opacity: 0;
    transition: opacity 0.1s;
  }

  .step.off {
    background: var(--panel2);
    border-color: #1a2840;
  }
  .step.off:hover {
    border-color: #3060a0;
    background: #0f1f38;
  }
  .step.on {
    border-color: var(--accent);
  }
  .step.on::before {
    opacity: 1;
  }
  .step.active {
    transform: scaleY(1.08);
    box-shadow: 0 0 15px currentColor !important;
  }
  .step.playing-indicator {
    outline: 2px solid rgba(255,255,255,0.8);
    outline-offset: 1px;
  }

  /* Track color themes */
  .track-0 .step.on { background: #003840; border-color: #00f0ff; box-shadow: 0 0 8px rgba(0,240,255,0.4); }
  .track-0 .step.on::before { background: radial-gradient(ellipse at 50% 0%, rgba(0,240,255,0.3), transparent); }
  .track-0 .track-name { color: #00f0ff; }
  .track-0 .vol-knob::-webkit-slider-thumb { background: #00f0ff; box-shadow: 0 0 6px #00f0ff; }

  .track-1 .step.on { background: #380018; border-color: #ff2d78; box-shadow: 0 0 8px rgba(255,45,120,0.4); }
  .track-1 .step.on::before { background: radial-gradient(ellipse at 50% 0%, rgba(255,45,120,0.3), transparent); }
  .track-1 .track-name { color: #ff2d78; }
  .track-1 .vol-knob::-webkit-slider-thumb { background: #ff2d78; box-shadow: 0 0 6px #ff2d78; }

  .track-2 .step.on { background: #1a0038; border-color: #7b2fff; box-shadow: 0 0 8px rgba(123,47,255,0.4); }
  .track-2 .step.on::before { background: radial-gradient(ellipse at 50% 0%, rgba(123,47,255,0.3), transparent); }
  .track-2 .track-name { color: #7b2fff; }
  .track-2 .vol-knob::-webkit-slider-thumb { background: #7b2fff; box-shadow: 0 0 6px #7b2fff; }

  .track-3 .step.on { background: #1a2a00; border-color: #88ff00; box-shadow: 0 0 8px rgba(136,255,0,0.4); }
  .track-3 .step.on::before { background: radial-gradient(ellipse at 50% 0%, rgba(136,255,0,0.3), transparent); }
  .track-3 .track-name { color: #88ff00; }
  .track-3 .vol-knob::-webkit-slider-thumb { background: #88ff00; box-shadow: 0 0 6px #88ff00; }

  .track-4 .step.on { background: #2a1800; border-color: #ff8c00; box-shadow: 0 0 8px rgba(255,140,0,0.4); }
  .track-4 .step.on::before { background: radial-gradient(ellipse at 50% 0%, rgba(255,140,0,0.3), transparent); }
  .track-4 .track-name { color: #ff8c00; }
  .track-4 .vol-knob::-webkit-slider-thumb { background: #ff8c00; box-shadow: 0 0 6px #ff8c00; }

  .track-5 .step.on { background: #001a2a; border-color: #00aaff; box-shadow: 0 0 8px rgba(0,170,255,0.4); }
  .track-5 .step.on::before { background: radial-gradient(ellipse at 50% 0%, rgba(0,170,255,0.3), transparent); }
  .track-5 .track-name { color: #00aaff; }
  .track-5 .vol-knob::-webkit-slider-thumb { background: #00aaff; box-shadow: 0 0 6px #00aaff; }

  .track-6 .step.on { background: #2a0028; border-color: #ff00cc; box-shadow: 0 0 8px rgba(255,0,204,0.4); }
  .track-6 .step.on::before { background: radial-gradient(ellipse at 50% 0%, rgba(255,0,204,0.3), transparent); }
  .track-6 .track-name { color: #ff00cc; }
  .track-6 .vol-knob::-webkit-slider-thumb { background: #ff00cc; box-shadow: 0 0 6px #ff00cc; }

  .track-7 .step.on { background: #1a1000; border-color: #ffcc00; box-shadow: 0 0 8px rgba(255,204,0,0.4); }
  .track-7 .step.on::before { background: radial-gradient(ellipse at 50% 0%, rgba(255,204,0,0.3), transparent); }
  .track-7 .track-name { color: #ffcc00; }
  .track-7 .vol-knob::-webkit-slider-thumb { background: #ffcc00; box-shadow: 0 0 6px #ffcc00; }

  /* Step number labels */
  .step-numbers {
    display: flex;
    gap: 4px;
    margin-left: 100px;
    margin-bottom: 6px;
    flex: 1;
  }
  .step-num {
    flex: 1;
    text-align: center;
    font-size: 8px;
    color: #304060;
    letter-spacing: 0;
    user-select: none;
  }
  .step-num:nth-child(4n+1) { margin-left: 6px; color: #4060a0; }
  .step-num:first-child { margin-left: 0; }

  /* Playhead indicator */
  .playhead-row {
    display: flex;
    gap: 4px;
    margin-left: 100px;
    margin-bottom: 8px;
  }
  .playhead-cell {
    flex: 1;
    height: 3px;
    border-radius: 2px;
    background: transparent;
    transition: all 0.05s;
  }
  .playhead-cell:nth-child(4n+1) { margin-left: 6px; }
  .playhead-cell:first-child { margin-left: 0; }
  .playhead-cell.active {
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }

  /* Patterns */
  .patterns-section {
    display: flex;
    gap: 16px;
    margin-bottom: 20px;
    align-items: center;
  }
  .section-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 9px;
    letter-spacing: 3px;
    color: #4060a0;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .pattern-slots {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .pattern-btn {
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    font-weight: 700;
    width: 40px; height: 36px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--panel);
    color: #4060a0;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 2px;
    position: relative;
    overflow: hidden;
  }
  .pattern-btn .slot-num { font-size: 11px; }
  .pattern-btn .slot-dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: transparent;
  }
  .pattern-btn.has-data .slot-dot { background: var(--accent3); box-shadow: 0 0 4px var(--accent3); }
  .pattern-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 10px rgba(0,240,255,0.2);
  }
  .pattern-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,240,255,0.06);
    box-shadow: 0 0 15px rgba(0,240,255,0.3);
  }
  .pattern-actions {
    display: flex;
    gap: 8px;
  }
  .btn-sm {
    font-family: 'Orbitron', sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 7px 14px;
    border: 1px solid;
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
    background: transparent;
  }
  .btn-save { color: var(--green); border-color: var(--green); }
  .btn-save:hover { box-shadow: 0 0 10px rgba(0,255,136,0.4); background: rgba(0,255,136,0.06); }
  .btn-load { color: var(--accent); border-color: var(--accent); }
  .btn-load:hover { box-shadow: var(--glow); background: rgba(0,240,255,0.06); }

  /* Drum pads (visual feedback) */
  .pads-row {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
  }
  .pad {
    flex: 1;
    height: 46px;
    border-radius: 8px;
    cursor: pointer;
    border: 1px solid #1a2840;
    background: var(--panel2);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 6px;
    font-size: 8px;
    letter-spacing: 1px;
    color: #3a5080;
    transition: all 0.08s ease;
    position: relative;
    overflow: hidden;
    user-select: none;
  }
  .pad::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    opacity: 0;
    transition: opacity 0.08s;
  }
  .pad.hit {
    transform: scale(0.94);
  }
  .pad.hit::before { opacity: 1; }

  /* Each pad color */
  .pad-0 { border-color: rgba(0,240,255,0.2); }
  .pad-0.hit, .pad-0:hover { box-shadow: 0 0 20px rgba(0,240,255,0.5); border-color: #00f0ff; background: rgba(0,240,255,0.08); }
  .pad-0::before { background: radial-gradient(ellipse at 50% 100%, rgba(0,240,255,0.2), transparent); }
  .pad-0 { color: rgba(0,240,255,0.5); }
  .pad-0.lit { color: #00f0ff; }

  .pad-1 { border-color: rgba(255,45,120,0.2); }
  .pad-1.hit, .pad-1:hover { box-shadow: 0 0 20px rgba(255,45,120,0.5); border-color: #ff2d78; background: rgba(255,45,120,0.08); }
  .pad-1::before { background: radial-gradient(ellipse at 50% 100%, rgba(255,45,120,0.2), transparent); }
  .pad-1 { color: rgba(255,45,120,0.5); }
  .pad-1.lit { color: #ff2d78; }

  .pad-2 { border-color: rgba(123,47,255,0.2); }
  .pad-2.hit, .pad-2:hover { box-shadow: 0 0 20px rgba(123,47,255,0.5); border-color: #7b2fff; background: rgba(123,47,255,0.08); }
  .pad-2::before { background: radial-gradient(ellipse at 50% 100%, rgba(123,47,255,0.2), transparent); }
  .pad-2 { color: rgba(123,47,255,0.5); }
  .pad-2.lit { color: #7b2fff; }

  .pad-3 { border-color: rgba(136,255,0,0.2); }
  .pad-3.hit, .pad-3:hover { box-shadow: 0 0 20px rgba(136,255,0,0.5); border-color: #88ff00; background: rgba(136,255,0,0.08); }
  .pad-3::before { background: radial-gradient(ellipse at 50% 100%, rgba(136,255,0,0.2), transparent); }
  .pad-3 { color: rgba(136,255,0,0.5); }
  .pad-3.lit { color: #88ff00; }

  .pad-4 { border-color: rgba(255,140,0,0.2); }
  .pad-4.hit, .pad-4:hover { box-shadow: 0 0 20px rgba(255,140,0,0.5); border-color: #ff8c00; background: rgba(255,140,0,0.08); }
  .pad-4::before { background: radial-gradient(ellipse at 50% 100%, rgba(255,140,0,0.2), transparent); }
  .pad-4 { color: rgba(255,140,0,0.5); }
  .pad-4.lit { color: #ff8c00; }

  .pad-5 { border-color: rgba(0,170,255,0.2); }
  .pad-5.hit, .pad-5:hover { box-shadow: 0 0 20px rgba(0,170,255,0.5); border-color: #00aaff; background: rgba(0,170,255,0.08); }
  .pad-5::before { background: radial-gradient(ellipse at 50% 100%, rgba(0,170,255,0.2), transparent); }
  .pad-5 { color: rgba(0,170,255,0.5); }
  .pad-5.lit { color: #00aaff; }

  .pad-6 { border-color: rgba(255,0,204,0.2); }
  .pad-6.hit, .pad-6:hover { box-shadow: 0 0 20px rgba(255,0,204,0.5); border-color: #ff00cc; background: rgba(255,0,204,0.08); }
  .pad-6::before { background: radial-gradient(ellipse at 50% 100%, rgba(255,0,204,0.2), transparent); }
  .pad-6 { color: rgba(255,0,204,0.5); }
  .pad-6.lit { color: #ff00cc; }

  .pad-7 { border-color: rgba(255,204,0,0.2); }
  .pad-7.hit, .pad-7:hover { box-shadow: 0 0 20px rgba(255,204,0,0.5); border-color: #ffcc00; background: rgba(255,204,0,0.08); }
  .pad-7::before { background: radial-gradient(ellipse at 50% 100%, rgba(255,204,0,0.2), transparent); }
  .pad-7 { color: rgba(255,204,0,0.5); }
  .pad-7.lit { color: #ffcc00; }

  /* Step number bar */
  .bar-markers {
    display: flex;
    gap: 4px;
    margin-left: 100px;
    margin-bottom: 4px;
  }
  .bar-m { flex: 1; font-size: 7px; text-align: center; color: #3050a0; }
  .bar-m:nth-child(4n+1) { margin-left: 6px; color: #4070d0; font-weight: bold; }
  .bar-m:first-child { margin-left: 0; }

  /* Footer */
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    font-size: 9px;
    color: #304060;
    letter-spacing: 2px;
  }

  /* Notification */
  #notification {
    position: fixed;
    top: 20px; right: 20px;
    padding: 12px 20px;
    background: var(--panel);
    border: 1px solid var(--accent);
    border-radius: 8px;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--accent);
    box-shadow: var(--glow);
    opacity: 0;
    transform: translateY(-10px);
    transition: all 0.3s ease;
    pointer-events: none;
    z-index: 9000;
  }
  #notification.show {
    opacity: 1;
    transform: translateY(0);
  }

  /* Active step glow flash */
  @keyframes stepFlash {
    0% { opacity: 1; }
    100% { opacity: 0; }
  }

  /* Mute btn */
  .mute-btn {
    width: 18px; height: 18px;
    border-radius: 3px;
    border: 1px solid #304060;
    background: transparent;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 7px;
    color: #4060a0;
    transition: all 0.15s;
    flex-shrink: 0;
    padding: 0;
  }
  .mute-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .mute-btn.muted { background: rgba(255,45,120,0.15); border-color: var(--accent2); color: var(--accent2); }

  /* Waveform for vis */
  #vis-canvas { display: block; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>
<div id="app">
  <!-- Header -->
  <div class="header">
    <div class="logo">NEXUS<span>STEP SEQUENCER v2.0</span></div>
    <div class="header-status">
      <div class="status-dot"></div>
      <span>SYSTEM ONLINE</span>
      <span id="cpu-display">CPU: 0%</span>
    </div>
  </div>

  <!-- Visualizer -->
  <canvas id="vis-canvas" height="60" style="width:100%;border:1px solid #1a3060;border-radius:8px;margin-bottom:16px;background:#080f1e;"></canvas>

  <!-- Transport -->
  <div class="transport">
    <button class="btn btn-play" id="btn-play" onclick="togglePlay()">▶ PLAY</button>
    <button class="btn btn-stop" onclick="stopSequencer()">■ STOP</button>

    <div style="width:1px;height:40px;background:var(--border);margin:0 4px;"></div>

    <div class="control-group">
      <div class="control-label">BPM</div>
      <div class="control-value" id="bpm-display">120</div>
      <input type="range" class="bpm-range" id="bpm-slider" min="40" max="240" value="120" oninput="updateBPM(this.value)">
    </div>

    <div class="control-group">
      <div class="control-label">SWING</div>
      <div class="control-value small" id="swing-display">0%</div>
      <input type="range" class="swing-range" id="swing-slider" min="0" max="66" value="0" oninput="updateSwing(this.value)">
    </div>

    <div class="control-group">
      <div class="control-label">STEPS</div>
      <div class="control-value small" id="steps-display">16</div>
      <input type="range" class="swing-range" min="8" max="16" step="8" value="16" oninput="updateSteps(this.value)">
    </div>

    <div class="control-group">
      <div class="control-label">MASTER VOL</div>
      <div class="control-value small" id="vol-display">80%</div>
      <input type="range" class="swing-range" min="0" max="100" value="80" oninput="updateMasterVol(this.value)">
    </div>

    <div style="margin-left:auto;display:flex;gap:8px;align-items:center;">
      <button class="btn btn-clear" onclick="clearAll()">CLR</button>
      <button class="btn btn-clear" onclick="randomize()" style="color:#7b2fff;border-color:#7b2fff;">RND</button>
      <button class="btn btn-export" onclick="exportWAV()">⬇ EXPORT WAV</button>
    </div>
  </div>

  <!-- Pattern save/load -->
  <div class="patterns-section">
    <div class="section-label">PATTERNS</div>
    <div class="pattern-slots" id="pattern-slots"></div>
    <div class="pattern-actions">
      <button class="btn-sm btn-save" onclick="savePattern()">SAVE</button>
      <button class="btn-sm btn-load" onclick="loadPattern()">LOAD</button>
    </div>
  </div>

  <!-- Pads row -->
  <div class="pads-row" id="pads-row"></div>

  <!-- Step grid -->
  <div class="grid-container">
    <div style="display:flex;">
      <div style="width:100px;"></div>
      <div class="bar-markers" style="margin-left:0;flex:1;" id="bar-markers"></div>
    </div>
    <div style="display:flex;">
      <div style="width:100px;"></div>
      <div class="playhead-row" style="margin-left:0;flex:1;" id="playhead-row"></div>
    </div>
    <div id="track-grid"></div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <span>NEXUS AUDIO ENGINE v2.0</span>
    <span id="step-counter">STEP: --</span>
    <span>16-STEP DRUM SEQUENCER</span>
  </div>
</div>

<div id="notification">PATTERN SAVED</div>

<script>
// ═══════════════════════════════════════════════════
// AUDIO ENGINE
// ═══════════════════════════════════════════════════
let audioCtx = null;
let masterGain = null;
let analyser = null;
let isPlaying = false;
let currentStep = -1;
let nextNoteTime = 0;
let schedulerTimer = null;
let lookahead = 25.0;
let scheduleAhead = 0.1;
let bpm = 120;
let swing = 0;
let numSteps = 16;

// Track definitions
const TRACKS = [
  { name: 'KICK',   color: '#00f0ff', freq: 60,  type: 'kick' },
  { name: 'SNARE',  color: '#ff2d78', freq: 200, type: 'snare' },
  { name: 'HIHAT',  color: '#7b2fff', freq: 800, type: 'hihat' },
  { name: 'CLAP',   color: '#88ff00', freq: 1200,type: 'clap' },
  { name: 'TOM-H',  color: '#ff8c00', freq: 120, type: 'tom_h' },
  { name: 'TOM-L',  color: '#00aaff', freq: 80,  type: 'tom_l' },
  { name: 'PERC',   color: '#ff00cc', freq: 400, type: 'perc' },
  { name: 'CYMBAL', color: '#ffcc00', freq: 2000, type: 'cymbal' },
];

// Grid state: [track][step] = {on, velocity}
let grid = Array.from({length: 8}, () => Array.from({length: 16}, () => ({on: false, velocity: 0.8})));
let trackVolumes = Array(8).fill(0.8);
let trackMuted = Array(8).fill(false);
let patterns = Array(8).fill(null).map(() => null);
let currentPattern = 0;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.8;
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 1024;
  analyser.smoothingTimeConstant = 0.8;
  masterGain.connect(analyser);
  analyser.connect(audioCtx.destination);
}

function synthDrum(type, time, velocity, gainNode) {
  const g = gainNode;
  const v = velocity || 0.8;

  switch(type) {
    case 'kick': {
      const osc = audioCtx.createOscillator();
      const env = audioCtx.createGain();
      osc.connect(env); env.connect(g);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(160, time);
      osc.frequency.exponentialRampToValueAtTime(40, time + 0.08);
      env.gain.setValueAtTime(v * 1.2, time);
      env.gain.exponentialRampToValueAtTime(0.001, time + 0.4);
      osc.start(time); osc.stop(time + 0.45);

      // Click
      const click = audioCtx.createOscillator();
      const clickEnv = audioCtx.createGain();
      click.connect(clickEnv); clickEnv.connect(g);
      click.frequency.value = 1800;
      clickEnv.gain.setValueAtTime(v * 0.5, time);
      clickEnv.gain.exponentialRampToValueAtTime(0.001, time + 0.02);
      click.start(time); click.stop(time + 0.025);
      break;
    }
    case 'snare': {
      // Tone
      const osc = audioCtx.createOscillator();
      const env = audioCtx.createGain();
      osc.connect(env); env.connect(g);
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(200, time);
      osc.frequency.exponentialRampToValueAtTime(120, time + 0.1);
      env.gain.setValueAtTime(v * 0.7, time);
      env.gain.exponentialRampToValueAtTime(0.001, time + 0.15);
      osc.start(time); osc.stop(time + 0.2);

      // Noise
      const noiseLen = audioCtx.sampleRate * 0.2;
      const noiseBuffer = audioCtx.createBuffer(1, noiseLen, audioCtx.sampleRate);
      const d = noiseBuffer.getChannelData(0);
      for (let i=0;i<noiseLen;i++) d[i] = Math.random()*2-1;
      const noise = audioCtx.createBufferSource();
      noise.buffer = noiseBuffer;
      const noiseFilter = audioCtx.createBiquadFilter();
      noiseFilter.type = 'bandpass';
      noiseFilter.frequency.value = 3000;
      noiseFilter.Q.value = 0.5;
      const noiseEnv = audioCtx.createGain();
      noise.connect(noiseFilter); noiseFilter.connect(noiseEnv); noiseEnv.connect(g);
      noiseEnv.gain.setValueAtTime(v * 0.9, time);
      noiseEnv.gain.exponentialRampToValueAtTime(0.001, time + 0.2);
      noise.start(time); noise.stop(time + 0.25);
      break;
    }
    case 'hihat': {
      const noiseLen = audioCtx.sampleRate * 0.08;
      const noiseBuffer = audioCtx.createBuffer(1, noiseLen, audioCtx.sampleRate);
      const d = noiseBuffer.getChannelData(0);
      for (let i=0;i<noiseLen;i++) d[i] = Math.random()*2-1;
      const noise = audioCtx.createBufferSource();
      noise.buffer = noiseBuffer;
      const hipass = audioCtx.createBiquadFilter();
      hipass.type = 'highpass';
      hipass.frequency.value = 8000;
      const env = audioCtx.createGain();
      noise.connect(hipass); hipass.connect(env); env.connect(g);
      env.gain.setValueAtTime(v * 0.8, time);
      env.gain.exponentialRampToValueAtTime(0.001, time + 0.06);
      noise.start(time); noise.stop(time + 0.1);
      break;
    }
    case 'clap': {
      for (let i=0;i<3;i++) {
        const noiseLen = audioCtx.sampleRate * 0.04;
        const noiseBuffer = audioCtx.createBuffer(1, noiseLen, audioCtx.sampleRate);
        const d = noiseBuffer.getChannelData(0);
        for (let j=0;j<noiseLen;j++) d[j] = Math.random()*2-1;
        const noise = audioCtx.createBufferSource();
        noise.buffer = noiseBuffer;
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'bandpass';
        filter.frequency.value = 1200 + i*400;
        filter.Q.value = 0.8;
        const env = audioCtx.createGain();
        noise.connect(filter); filter.connect(env); env.connect(g);
        const t = time + i * 0.008;
        env.gain.setValueAtTime(v * 0.8, t);
        env.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
        noise.start(t); noise.stop(t + 0.1);
      }
      break;
    }
    case 'tom_h': {
      const osc = audioCtx.createOscillator();
      const env = audioCtx.createGain();
      osc.connect(env); env.connect(g);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(200, time);
      osc.frequency.exponentialRampToValueAtTime(100, time + 0.15);
      env.gain.setValueAtTime(v, time);
      env.gain.exponentialRampToValueAtTime(0.001, time + 0.2);
      osc.start(time); osc.stop(time + 0.25);
      break;
    }
    case 'tom_l': {
      const osc = audioCtx.createOscillator();
      const env = audioCtx.createGain();
      osc.connect(env); env.connect(g);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(100, time);
      osc.frequency.exponentialRampToValueAtTime(50, time + 0.2);
      env.gain.setValueAtTime(v, time);
      env.gain.exponentialRampToValueAtTime(0.001, time + 0.3);
      osc.start(time); osc.stop(time + 0.35);
      break;
    }
    case 'perc': {
      const osc = audioCtx.createOscillator();
      const env = audioCtx.createGain();
      osc.connect(env); env.connect(g);
      osc.type = 'square';
      osc.frequency.setValueAtTime(800, time);
      osc.frequency.exponentialRampToValueAtTime(200, time + 0.05);
      env.gain.setValueAtTime(v * 0.6, time);
      env.gain.exponentialRampToValueAtTime(0.001, time + 0.08);
      osc.start(time); osc.stop(time + 0.1);
      break;
    }
    case 'cymbal': {
      const noiseLen = audioCtx.sampleRate * 0.5;
      const noiseBuffer = audioCtx.createBuffer(1, noiseLen, audioCtx.sampleRate);
      const d = noiseBuffer.getChannelData(0);
      for (let i=0;i<noiseLen;i++) d[i] = Math.random()*2-1;
      const noise = audioCtx.createBufferSource();
      noise.buffer = noiseBuffer;
      const hipass = audioCtx.createBiquadFilter();
      hipass.type = 'highpass';
      hipass.frequency.value = 10000;
      const env = audioCtx.createGain();
      noise.connect(hipass); hipass.connect(env); env.connect(g);
      env.gain.setValueAtTime(v * 0.5, time);
      env.gain.exponentialRampToValueAtTime(0.001, time + 0.6);
      noise.start(time); noise.stop(time + 0.65);
      break;
    }
  }
}

function getStepTime(stepIndex) {
  const secPerBeat = 60.0 / bpm;
  const secPerStep = secPerBeat / 4;
  const isOdd = stepIndex % 2 === 1;
  const swingOffset = isOdd ? (swing / 100) * secPerStep * 0.5 : 0;
  return secPerStep + swingOffset;
}

function scheduleStep(step, time) {
  for (let t = 0; t < 8; t++) {
    if (!trackMuted[t] && grid[t][step].on) {
      const trackGain = audioCtx.createGain();
      trackGain.gain.value = trackVolumes[t];
      trackGain.connect(masterGain);
      synthDrum(TRACKS[t].type, time, grid[t][step].velocity, trackGain);
    }
  }
}

function scheduler() {
  while (nextNoteTime < audioCtx.currentTime + scheduleAhead) {
    scheduleStep(currentStep === -1 ? 0 : (currentStep + 1) % numSteps, nextNoteTime);
    currentStep = currentStep === -1 ? 0 : (currentStep + 1) % numSteps;
    const stepDur = getStepTime(currentStep);
    nextNoteTime += stepDur;
  }
  updatePlayhead();
}

function updatePlayhead() {
  // Update playhead visually
  const cells = document.querySelectorAll('.playhead-cell');
  cells.forEach((c, i) => c.classList.toggle('active', i === currentStep));
  document.getElementById('step-counter').textContent = `STEP: ${currentStep + 1}/${numSteps}`;

  // Flash active step pads
  for (let t = 0; t < 8; t++) {
    if (currentStep >= 0 && grid[t][currentStep] && grid[t][currentStep].on) {
      flashPad(t);
    }
  }
}

let padFlashTimers = Array(8).fill(null);
function flashPad(trackIdx) {
  const pad = document.getElementById(`pad-${trackIdx}`);
  if (!pad) return;
  pad.classList.add('hit', 'lit');
  if (padFlashTimers[trackIdx]) clearTimeout(padFlashTimers[trackIdx]);
  padFlashTimers[trackIdx] = setTimeout(() => {
    pad.classList.remove('hit', 'lit');
  }, 120);
}

function togglePlay() {
  initAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();

  if (isPlaying) {
    isPlaying = false;
    clearInterval(schedulerTimer);
    document.getElementById('btn-play').textContent = '▶ PLAY';
    document.getElementById('btn-play').classList.remove('active');
  } else {
    isPlaying = true;
    currentStep = -1;
    nextNoteTime = audioCtx.currentTime + 0.05;
    schedulerTimer = setInterval(scheduler, lookahead);
    document.getElementById('btn-play').textContent = '⏸ PAUSE';
    document.getElementById('btn-play').classList.add('active');
  }
}

function stopSequencer() {
  isPlaying = false;
  clearInterval(schedulerTimer);
  currentStep = -1;
  document.getElementById('btn-play').textContent = '▶ PLAY';
  document.getElementById('btn-play').classList.remove('active');
  document.querySelectorAll('.playhead-cell').forEach(c => c.classList.remove('active'));
  document.getElementById('step-counter').textContent = 'STEP: --';
}

function updateBPM(v) {
  bpm = parseInt(v);
  document.getElementById('bpm-display').textContent = bpm;
}

function updateSwing(v) {
  swing = parseInt(v);
  document.getElementById('swing-display').textContent = swing + '%';
}

function updateSteps(v) {
  numSteps = parseInt(v);
  document.getElementById('steps-display').textContent = numSteps;
  buildGrid();
}

function updateMasterVol(v) {
  if (masterGain) masterGain.gain.value = v / 100;
  document.getElementById('vol-display').textContent = v + '%';
}

// ═══════════════════════════════════════════════════
// UI BUILDER
// ═══════════════════════════════════════════════════
function buildGrid() {
  const container = document.getElementById('track-grid');
  container.innerHTML = '';

  // Bar markers
  const bm = document.getElementById('bar-markers');
  bm.innerHTML = '';
  for (let s = 0; s < numSteps; s++) {
    const el = document.createElement('div');
    el.className = 'bar-m';
    el.textContent = (s % 4 === 0) ? (s/4+1) : '·';
    bm.appendChild(el);
  }

  // Playhead
  const ph = document.getElementById('playhead-row');
  ph.innerHTML = '';
  for (let s = 0; s < numSteps; s++) {
    const el = document.createElement('div');
    el.className = 'playhead-cell';
    el.id = `ph-${s}`;
    ph.appendChild(el);
  }

  // Fix playhead reference
  document.querySelectorAll('.playhead-cell').forEach((c, i) => {
    c.id = `ph-${i}`;
  });

  // Tracks
  for (let t = 0; t < 8; t++) {
    const row = document.createElement('div');
    row.className = `track-row track-${t}`;

    const info = document.createElement('div');
    info.className = 'track-info';
    info.innerHTML = `
      <div class="track-name">${TRACKS[t].name}</div>
      <div class="track-controls">
        <button class="mute-btn" id="mute-${t}" onclick="toggleMute(${t})" title="Mute">M</button>
        <input type="range" class="vol-knob" min="0" max="100" value="${Math.round(trackVolumes[t]*100)}"
          oninput="setTrackVol(${t}, this.value)" title="Volume">
      </div>
    `;

    const steps = document.createElement('div');
    steps.className = 'steps';

    for (let s = 0; s < numSteps; s++) {
      const step = document.createElement('div');
      step.className = 'step ' + (grid[t][s].on ? 'on' : 'off');
      step.id = `step-${t}-${s}`;
      step.dataset.track = t;
      step.dataset.step = s;

      let mouseDown = false;
      let initialState = false;

      step.addEventListener('mousedown', (e) => {
        mouseDown = true;
        initialState = !grid[t][s].on;
        setStep(t, s, initialState);
        e.preventDefault();
      });
      step.addEventListener('mouseenter', () => {
        if (mouseDown) setStep(t, s, initialState);
      });
      step.addEventListener('mouseup', () => { mouseDown = false; });

      steps.appendChild(step);
    }

    row.appendChild(info);
    row.appendChild(steps);
    container.appendChild(row);
  }

  // Global mouse up
  document.addEventListener('mouseup', () => {
    document.querySelectorAll('.step').forEach(s => {
      s._mousedown = false;
    });
  });
}

function setStep(t, s, on) {
  grid[t][s].on = on;
  const el = document.getElementById(`step-${t}-${s}`);
  if (el) {
    el.className = `step ${on ? 'on' : 'off'}`;
    if (on) {
      // Brief flash animation
      el.style.transform = 'scale(1.05)';
      setTimeout(() => el.style.transform = '', 100);
    }
  }
}

function toggleMute(t) {
  trackMuted[t] = !trackMuted[t];
  const btn = document.getElementById(`mute-${t}`);
  btn.classList.toggle('muted', trackMuted[t]);
}

function setTrackVol(t, v) {
  trackVolumes[t] = v / 100;
}

function buildPads() {
  const row = document.getElementById('pads-row');
  row.innerHTML = '';
  for (let t = 0; t < 8; t++) {
    const pad = document.createElement('div');
    pad.className = `pad pad-${t}`;
    pad.id = `pad-${t}`;
    pad.innerHTML = `<span>${TRACKS[t].name}</span>`;
    pad.addEventListener('mousedown', () => {
      initAudio();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const g = audioCtx.createGain();
      g.gain.value = trackVolumes[t];
      g.connect(masterGain);
      synthDrum(TRACKS[t].type, audioCtx.currentTime, 0.9, g);
      flashPad(t);
    });
    row.appendChild(pad);
  }
}

function buildPatternSlots() {
  const container = document.getElementById('pattern-slots');
  container.innerHTML = '';
  for (let i = 0; i < 8; i++) {
    const btn = document.createElement('button');
    btn.className = `pattern-btn ${i === currentPattern ? 'active' : ''} ${patterns[i] ? 'has-data' : ''}`;
    btn.id = `pattern-btn-${i}`;
    btn.innerHTML = `<span class="slot-num">${i+1}</span><span class="slot-dot"></span>`;
    btn.onclick = () => selectPattern(i);
    container.appendChild(btn);
  }
}

function selectPattern(i) {
  currentPattern = i;
  document.querySelectorAll('.pattern-btn').forEach((b, idx) => {
    b.classList.toggle('active', idx === i);
  });
}

function savePattern() {
  patterns[currentPattern] = JSON.parse(JSON.stringify(grid));
  const btn = document.getElementById(`pattern-btn-${currentPattern}`);
  if (btn) {
    btn.classList.add('has-data');
  }
  showNotification('PATTERN ' + (currentPattern+1) + ' SAVED');
  // Also save to localStorage
  try {
    localStorage.setItem('nexus_patterns', JSON.stringify(patterns));
  } catch(e) {}
}

function loadPattern() {
  if (patterns[currentPattern]) {
    grid = JSON.parse(JSON.stringify(patterns[currentPattern]));
    buildGrid();
    showNotification('PATTERN ' + (currentPattern+1) + ' LOADED');
  } else {
    showNotification('NO PATTERN IN SLOT ' + (currentPattern+1));
  }
}

function clearAll() {
  grid = Array.from({length: 8}, () => Array.from({length: 16}, () => ({on: false, velocity: 0.8})));
  buildGrid();
  showNotification('GRID CLEARED');
}

function randomize() {
  const densities = [0.3, 0.25, 0.4, 0.2, 0.15, 0.15, 0.2, 0.1];
  for (let t = 0; t < 8; t++) {
    for (let s = 0; s < numSteps; s++) {
      grid[t][s].on = Math.random() < densities[t];
    }
  }
  // Kick on 1 and 9 usually
  grid[0][0].on = true;
  if (numSteps >= 9) grid[0][8].on = Math.random() > 0.3;
  // Snare on 4 and 12
  grid[1][4].on = true;
  if (numSteps >= 13) grid[1][12].on = true;
  buildGrid();
  showNotification('RANDOMIZED');
}

function showNotification(msg) {
  const el = document.getElementById('notification');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

// ═══════════════════════════════════════════════════
// EXPORT WAV
// ═══════════════════════════════════════════════════
async function exportWAV() {
  showNotification('RENDERING...');
  initAudio();

  const bars = 2; // 2 bars
  const secPerBeat = 60.0 / bpm;
  const secPerStep = secPerBeat / 4;
  const totalSteps = numSteps * bars;
  const duration = totalSteps * secPerStep * 1.2; // a bit extra

  const offlineCtx = new OfflineAudioContext(2, Math.ceil(audioCtx.sampleRate * duration), audioCtx.sampleRate);
  const offMaster = offlineCtx.createGain();
  offMaster.gain.value = 0.8;
  offMaster.connect(offlineCtx.destination);

  let t = 0.05;
  for (let bar = 0; bar < bars; bar++) {
    for (let s = 0; s < numSteps; s++) {
      const stepIdx = s;
      const isOdd = stepIdx % 2 === 1;
      const stepDur = secPerStep + (isOdd ? (swing/100) * secPerStep * 0.5 : 0);

      for (let tr = 0; tr < 8; tr++) {
        if (!trackMuted[tr] && grid[tr][stepIdx].on) {
          const tg = offlineCtx.createGain();
          tg.gain.value = trackVolumes[tr];
          tg.connect(offMaster);
          // Synthesize into offline context
          synthDrumOffline(offlineCtx, TRACKS[tr].type, t, grid[tr][stepIdx].velocity, tg);
        }
      }
      t += stepDur;
    }
  }

  const renderedBuffer = await offlineCtx.startRendering();
  const wav = bufferToWav(renderedBuffer);
  const blob = new Blob([wav], {type: 'audio/wav'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `nexus_${bpm}bpm_${Date.now()}.wav`;
  a.click();
  URL.revokeObjectURL(url);
  showNotification('WAV EXPORTED!');
}

function synthDrumOffline(ctx, type, time, velocity, gainNode) {
  const g = gainNode;
  const v = velocity || 0.8;

  switch(type) {
    case 'kick': {
      const osc = ctx.createOscillator();
      const env = ctx.createGain();
      osc.connect(env); env.connect(g);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(160, time);
      osc.frequency.exponentialRampToValueAtTime(40, time + 0.08);
      env.gain.setValueAtTime(v * 1.2, time);
      env.gain.exponentialRampToValueAtTime(0.001, time + 0.4);
      osc.start(time); osc.stop(time + 0.45);
      const click = ctx.createOscillator();
      const clickEnv = ctx.createGain();
      click.connect(clickEnv); clickEnv.connect(g);
      click.frequency.value = 1800;
      clickEnv.gain.setValueAtTime(v * 0.5, time);
      clickEnv.gain.exponentialRampToValueAtTime(0.001, time + 0.02);
      click.start(time); click.stop(time + 0.025);
      break;
    }
    case 'snare': {
      const osc = ctx.createOscillator();
      const env = ctx.createGain();
      osc.connect(env); env.connect(g);
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(200, time);
      osc.frequency.exponentialRampToValueAtTime(120, time + 0.1);
      env.gain.setValueAtTime(v * 0.7, time);
      env.gain.exponentialRampToValueAtTime(0.001, time + 0.15);
      osc.start(time); osc.stop(time + 0.2);
      const noiseLen = ctx.sampleRate * 0.2;
      const noiseBuffer = ctx.createBuffer(1, noiseLen, ctx.sampleRate);
      const d = noiseBuffer.getChannelData(0);
      for (let i=0;i<noiseLen;i++) d[i] = Math.random()*2-1;
      const noise = ctx.createBufferSource();
      noise.buffer = noiseBuffer;
      const noiseFilter = ctx.createBiquadFilter();
      noiseFilter.type = 'bandpass'; noiseFilter.frequency.value = 3000; noiseFilter.Q.value = 0.5;
      const noiseEnv = ctx.createGain();
      noise.connect(noiseFilter); noiseFilter.connect(noiseEnv); noiseEnv.connect(g);
      noiseEnv.gain.setValueAtTime(v * 0.9, time);
      noiseEnv.gain.exponentialRampToValueAtTime(0.001, time + 0.2);
      noise.start(time); noise.stop(time + 0.25);
      break;
    }
    case 'hihat': {
      const noiseLen = ctx.sampleRate * 0.08;
      const noiseBuffer = ctx.createBuffer(1, noiseLen, ctx.sampleRate);
      const d = noiseBuffer.getChannelData(0);
      for (let i=0;i<noiseLen;i++) d[i] = Math.random()*2-1;
      const noise = ctx.createBufferSource();
      noise.buffer = noiseBuffer;
      const hipass = ctx.createBiquadFilter();
      hipass.type = 'highpass'; hipass.frequency.value = 8000;
      const env = ctx.createGain();
      noise.connect(hipass); hipass.connect(env); env.connect(g);
      env.gain.setValueAtTime(v * 0.8, time);
      env.gain.exponentialRampToValueAtTime(0.001, time + 0.06);
      noise.start(time); noise.stop(time + 0.1);
      break;
    }
    case 'clap': {
      for (let i=0;i<3;i++) {
        const noiseLen = ctx.sampleRate * 0.04;
        const nb = ctx.createBuffer(1, noiseLen, ctx.sampleRate);
        const d = nb.getChannelData(0);
        for (let j=0;j<noiseLen;j++) d[j] = Math.random()*2-1;
        const noise = ctx.createBufferSource();
        noise.buffer = nb;
        const filter = ctx.createBiquadFilter();
        filter.type = 'bandpass'; filter.frequency.value = 1200+i*400; filter.Q.value = 0.8;
        const env = ctx.createGain();
        noise.connect(filter); filter.connect(env); env.connect(g);
        const tt = time + i * 0.008;
        env.gain.setValueAtTime(v * 0.8, tt);
        env.gain.exponentialRampToValueAtTime(0.001, tt + 0.08);
        noise.start(tt); noise.stop(tt + 0.1);
      }
      break;
    }
    case 'tom_h': {
      const osc = ctx.createOscillator(); const env = ctx.createGain();
      osc.connect(env); env.connect(g); osc.type = 'sine';
      osc.frequency.setValueAtTime(200, time); osc.frequency.exponentialRampToValueAtTime(100, time+0.15);
      env.gain.setValueAtTime(v, time); env.gain.exponentialRampToValueAtTime(0.001, time+0.2);
      osc.start(time); osc.stop(time+0.25); break;
    }
    case 'tom_l': {
      const osc = ctx.createOscillator(); const env = ctx.createGain();
      osc.connect(env); env.connect(g); osc.type = 'sine';
      osc.frequency.setValueAtTime(100, time); osc.frequency.exponentialRampToValueAtTime(50, time+0.2);
      env.gain.setValueAtTime(v, time); env.gain.exponentialRampToValueAtTime(0.001, time+0.3);
      osc.start(time); osc.stop(time+0.35); break;
    }
    case 'perc': {
      const osc = ctx.createOscillator(); const env = ctx.createGain();
      osc.connect(env); env.connect(g); osc.type = 'square';
      osc.frequency.setValueAtTime(800, time); osc.frequency.exponentialRampToValueAtTime(200, time+0.05);
      env.gain.setValueAtTime(v*0.6, time); env.gain.exponentialRampToValueAtTime(0.001, time+0.08);
      osc.start(time); osc.stop(time+0.1); break;
    }
    case 'cymbal': {
      const noiseLen = ctx.sampleRate * 0.5;
      const nb = ctx.createBuffer(1, noiseLen, ctx.sampleRate);
      const d = nb.getChannelData(0);
      for (let i=0;i<noiseLen;i++) d[i] = Math.random()*2-1;
      const noise = ctx.createBufferSource();
      noise.buffer = nb;
      const hipass = ctx.createBiquadFilter();
      hipass.type = 'highpass'; hipass.frequency.value = 10000;
      const env = ctx.createGain();
      noise.connect(hipass); hipass.connect(env); env.connect(g);
      env.gain.setValueAtTime(v*0.5, time); env.gain.exponentialRampToValueAtTime(0.001, time+0.6);
      noise.start(time); noise.stop(time+0.65); break;
    }
  }
}

function bufferToWav(buffer) {
  const numChannels = buffer.numberOfChannels;
  const sampleRate = buffer.sampleRate;
  const numSamples = buffer.length;
  const bitsPerSample = 16;
  const byteRate = sampleRate * numChannels * bitsPerSample / 8;
  const blockAlign = numChannels * bitsPerSample / 8;
  const dataSize = numSamples * numChannels * bitsPerSample / 8;
  const bufSize = 44 + dataSize;

  const out = new ArrayBuffer(bufSize);
  const view = new DataView(out);

  function writeStr(offset, str) {
    for (let i=0;i<str.length;i++) view.setUint8(offset+i, str.charCodeAt(i));
  }

  writeStr(0, 'RIFF');
  view.setUint32(4, bufSize - 8, true);
  writeStr(8, 'WAVE');
  writeStr(12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true); // PCM
  view.setUint16(22, numChannels, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, byteRate, true);
  view.setUint16(32, blockAlign, true);
  view.setUint16(34, bitsPerSample, true);
  writeStr(36, 'data');
  view.setUint32(40, dataSize, true);

  let offset = 44;
  for (let i=0;i<numSamples;i++) {
    for (let c=0;c<numChannels;c++) {
      const s = Math.max(-1, Math.min(1, buffer.getChannelData(c)[i]));
      view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
      offset += 2;
    }
  }
  return out;
}

// VISUALIZER
// ═══════════════════════════════════════════════════
const canvas = document.getElementById('vis-canvas');
const ctx2d = canvas.getContext('2d');
let animFrameId = null;

function drawVis() {
  animFrameId = requestAnimationFrame(drawVis);
  canvas.width = canvas.offsetWidth;
  const W = canvas.width, H = canvas.height;
  ctx2d.fillStyle = '#080f1e';
  ctx2d.fillRect(0, 0, W, H);

  if (!analyser) {
    // Draw idle wave
    const t = Date.now() / 1000;
    ctx2d.beginPath();
    ctx2d.strokeStyle = 'rgba(0,240,255,0.3)';
    ctx2d.lineWidth = 1.5;
    for (let x=0; x<W; x++) {
      const y = H/2 + Math.sin(x * 0.02 + t * 2) * 5 + Math.sin(x * 0.05 + t) * 3;
      x === 0 ? ctx2d.moveTo(x, y) : ctx2d.lineTo(x, y);
    }
    ctx2d.stroke();
    return;
  }

  const dataArray = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteTimeDomainData(dataArray);

  // Waveform
  ctx2d.beginPath();
  ctx2d.lineWidth = 2;
  const grad = ctx2d.createLinearGradient(0, 0, W, 0);
  grad.addColorStop(0, '#00f0ff');
  grad.addColorStop(0.5, '#7b2fff');
  grad.addColorStop(1, '#ff2d78');
  ctx2d.strokeStyle = grad;

  const sliceWidth = W / dataArray.length;
  let x = 0;
  for (let i=0;i<dataArray.length;i++) {
    const v = dataArray[i] / 128.0;
    const y = v * H / 2;
    i === 0 ? ctx2d.moveTo(x, y) : ctx2d.lineTo(x, y);
    x += sliceWidth;
  }
  ctx2d.stroke();

  // Frequency bars at bottom
  analyser.getByteFrequencyData(dataArray);
  const barW = Math.ceil(W / 64);
  for (let i=0; i<64; i++) {
    const val = dataArray[i * 8] / 255;
    const bh = val * H * 0.4;
    const hue = (i / 64) * 280;
    ctx2d.fillStyle = `hsla(${hue + 180}, 100%, 60%, 0.5)`;
    ctx2d.fillRect(i * (W/64), H - bh, W/64 - 1, bh);
  }

  // Center line
  ctx2d.strokeStyle = 'rgba(0,240,255,0.15)';
  ctx2d.lineWidth = 1;
  ctx2d.beginPath();
  ctx2d.moveTo(0, H/2);
  ctx2d.lineTo(W, H/2);
  ctx2d.stroke();
}

  if (!isPlaying) {
    document.getElementById('cpu-display').textContent = 'CPU: ' + Math.floor(Math.random()*3+1) + '%';
  } else {
    document.getElementById('cpu-display').textContent = 'CPU: ' + Math.floor(Math.random()*15+8) + '%';
  }
}, 1000);

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
  if (e.code === 'Escape') stopSequencer();
  if (e.code === 'KeyR') randomize();
  if (e.code === 'KeyC' && e.shiftKey) clearAll();
});

// Grid mouse drag fix

document.addEventListener('mousedown', () => isDragging = false);
document.addEventListener('mousemove', () => isDragging = true);
