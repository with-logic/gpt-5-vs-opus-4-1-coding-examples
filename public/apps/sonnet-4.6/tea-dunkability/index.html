<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tea Dunkability Simulator</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    --bg: #0f0f1a;
    --surface: rgba(255,255,255,0.05);
    --surface2: rgba(255,255,255,0.08);
    --border: rgba(255,255,255,0.12);
    --text: #e8e0d5;
    --text2: #a09080;
    --accent: #c8935a;
    --accent2: #8bb4c8;
    --danger: #e05555;
    --success: #55c875;
    --warning: #e0b055;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow-x: hidden; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Georgia', serif;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(200,147,90,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(139,180,200,0.06) 0%, transparent 50%);
  }
  .app {
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px 16px;
  }
  h1 {
    text-align: center;
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    color: var(--accent);
    letter-spacing: 0.02em;
    text-shadow: 0 0 30px rgba(200,147,90,0.4);
    margin-bottom: 4px;
  }
  .subtitle {
    text-align: center;
    color: var(--text2);
    font-style: italic;
    font-size: 0.95rem;
    margin-bottom: 28px;
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  @media (max-width: 700px) {
    .grid { grid-template-columns: 1fr; }
  }
  .card {
    background: var(--surface);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.08);
    transition: box-shadow 0.3s;
  }
  .card:hover {
    box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
  }
  .card-title {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text2);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title::before {
    content: '';
    display: inline-block;
    width: 3px;
    height: 14px;
    background: var(--accent);
    border-radius: 2px;
  }

  /* Teacup animation area */
  .teacup-area {
    grid-column: 1 / -1;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 10px 20px 20px;
    min-height: 220px;
    position: relative;
    overflow: hidden;
  }
  .teacup-scene {
    position: relative;
    width: 220px;
    height: 180px;
  }
  /* Steam */
  .steam {
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
  }
  .steam-line {
    position: absolute;
    bottom: 0;
    width: 4px;
    border-radius: 4px;
    background: rgba(255,255,255,0.25);
    animation: steamRise 2s ease-out infinite;
    transform-origin: bottom center;
  }
  @keyframes steamRise {
    0% { height: 0; opacity: 0; transform: scaleX(1) translateY(0); }
    20% { opacity: 0.6; }
    100% { height: 50px; opacity: 0; transform: scaleX(1.5) translateY(-10px); }
  }
  /* Biscuit dunk animation */
  .biscuit-wrapper {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    transition: bottom 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .biscuit-svg {
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
  }
  /* Crumbs */
  .crumb {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    animation: crumbFall 1.5s ease-in forwards;
  }
  @keyframes crumbFall {
    0% { transform: translate(0,0) rotate(0deg); opacity: 1; }
    100% { transform: translate(var(--dx), 80px) rotate(360deg); opacity: 0; }
  }

  /* Sliders */
  .slider-group {
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  .slider-row {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .slider-label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.9rem;
  }
  .slider-name { color: var(--text); }
  .slider-val {
    font-size: 0.85rem;
    color: var(--accent);
    font-weight: bold;
    min-width: 60px;
    text-align: right;
  }
  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 6px;
    border-radius: 3px;
    background: var(--surface2);
    outline: none;
    cursor: pointer;
    position: relative;
  }
  input[type=range]::-webkit-slider-track {
    height: 6px;
    border-radius: 3px;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    box-shadow: 0 0 8px rgba(200,147,90,0.6);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  input[type=range]::-webkit-slider-thumb:hover {
    transform: scale(1.2);
    box-shadow: 0 0 14px rgba(200,147,90,0.8);
  }
  input[type=range]:focus::-webkit-slider-thumb {
    box-shadow: 0 0 0 3px rgba(200,147,90,0.3);
  }

  /* Biscuit selector */
  .biscuit-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-top: 4px;
  }
  .biscuit-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 6px;
    cursor: pointer;
    color: var(--text);
    font-size: 0.78rem;
    text-align: center;
    transition: all 0.2s;
    font-family: inherit;
  }
  .biscuit-btn:hover {
    background: rgba(200,147,90,0.15);
    border-color: var(--accent);
  }
  .biscuit-btn.selected {
    background: rgba(200,147,90,0.2);
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 10px rgba(200,147,90,0.2);
  }
  .biscuit-btn .biscuit-icon {
    font-size: 1.5rem;
    display: block;
    margin-bottom: 4px;
  }

  /* Result display */
  .result-card {
    grid-column: 1 / -1;
  }
  .dunk-result {
    text-align: center;
    padding: 10px 0;
  }
  .result-badge {
    display: inline-block;
    padding: 8px 24px;
    border-radius: 30px;
    font-size: 1.2rem;
    font-weight: bold;
    letter-spacing: 0.04em;
    margin-bottom: 8px;
    transition: all 0.3s;
  }
  .result-desc {
    color: var(--text2);
    font-size: 0.9rem;
    font-style: italic;
  }

  /* Crumble-o-meter */
  .crumble-meter {
    width: 100%;
  }
  .meter-bar-track {
    width: 100%;
    height: 28px;
    background: var(--surface2);
    border-radius: 14px;
    overflow: hidden;
    position: relative;
    margin-bottom: 12px;
    border: 1px solid var(--border);
  }
  .meter-bar-fill {
    height: 100%;
    border-radius: 14px;
    transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.5s;
    position: relative;
    overflow: hidden;
  }
  .meter-bar-fill::after {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 60%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
    animation: shimmer 2s infinite;
  }
  @keyframes shimmer {
    0% { left: -60%; }
    100% { left: 140%; }
  }
  .meter-labels {
    display: flex;
    justify-content: space-between;
    font-size: 0.72rem;
    color: var(--text2);
    margin-top: 4px;
  }
  .meter-value {
    text-align: center;
    font-size: 1.8rem;
    font-weight: bold;
    color: var(--text);
    margin: 8px 0 4px;
  }
  .meter-label {
    text-align: center;
    font-size: 0.85rem;
    color: var(--text2);
  }

  /* Sparkline graph */
  .sparkline-wrap {
    width: 100%;
    height: 100px;
    margin-top: 8px;
    position: relative;
  }
  .sparkline-wrap canvas {
    width: 100%;
    height: 100%;
    border-radius: 8px;
  }

  /* Keyboard shortcuts panel */
  .shortcuts {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 4px;
  }
  .shortcut {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.78rem;
    color: var(--text2);
  }
  kbd {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 7px;
    font-family: monospace;
    font-size: 0.8rem;
    color: var(--text);
    box-shadow: 0 2px 0 rgba(0,0,0,0.3);
  }

  /* Dunk button */
  .dunk-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent), #a0723a);
    border: none;
    border-radius: 12px;
    color: white;
    font-size: 1.1rem;
    font-family: inherit;
    font-weight: bold;
    cursor: pointer;
    letter-spacing: 0.06em;
    transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(200,147,90,0.3);
    margin-top: 8px;
  }
  .dunk-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 24px rgba(200,147,90,0.5);
  }
  .dunk-btn:active {
    transform: translateY(0);
  }
  .dunk-btn.dunking {
    animation: dunkPulse 0.5s ease-in-out infinite alternate;
  }
  @keyframes dunkPulse {
    from { box-shadow: 0 4px 20px rgba(200,147,90,0.3); }
    to { box-shadow: 0 4px 30px rgba(200,147,90,0.7); }
  }

  /* Toast notification */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--surface2);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 24px;
    font-size: 0.95rem;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 100;
    text-align: center;
    max-width: 300px;
  }
  .toast.show {
    transform: translateX(-50%) translateY(0);
  }

  /* Stats row */
  .stats-row {
    display: flex;
    gap: 12px;
    margin-top: 12px;
  }
  .stat-box {
    flex: 1;
    background: var(--surface2);
    border-radius: 10px;
    padding: 10px;
    text-align: center;
    border: 1px solid var(--border);
  }
  .stat-val {
    font-size: 1.2rem;
    font-weight: bold;
    color: var(--accent);
  }
  .stat-label {
    font-size: 0.7rem;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 2px;
  }

  .full-width { grid-column: 1 / -1; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const BISCUITS = [
  { id: 'digestive', name: 'Digestive', icon: '🍪', integrity: 65, absorbRate: 0.7, flavor: 'Classic wheaten goodness' },
  { id: 'hobnob', name: 'HobNob', icon: '🫓', integrity: 75, absorbRate: 0.6, flavor: 'Oaty and robust' },
  { id: 'custard', name: 'Custard Cream', icon: '🏵️', integrity: 55, absorbRate: 0.8, flavor: 'Vanilla sandwich delight' },
  { id: 'rich_tea', name: 'Rich Tea', icon: '🔵', integrity: 45, absorbRate: 0.9, flavor: 'Dangerously brittle' },
  { id: 'bourbon', name: 'Bourbon', icon: '🟫', integrity: 70, absorbRate: 0.65, flavor: 'Chocolatey fortitude' },
  { id: 'ginger', name: 'Ginger Nut', icon: '🌟', integrity: 85, absorbRate: 0.5, flavor: 'Iron-willed and spicy' },
  { id: 'oreo', name: 'Oreo', icon: '⚫', integrity: 60, absorbRate: 0.75, flavor: 'Twist, lick, dunk' },
  { id: 'shortbread', name: 'Shortbread', icon: '🟡', integrity: 50, absorbRate: 0.85, flavor: 'Buttery but fragile' },
  { id: 'jaffa', name: 'Jaffa Cake', icon: '🍊', integrity: 40, absorbRate: 1.0, flavor: 'Cake not biscuit!' },
];

function computeDunkability(temp, dunkTime, biscuitId, structuralIntegrity) {
  const biscuit = BISCUITS.find(b => b.id === biscuitId);
  if (!biscuit) return { score: 0, status: 'Unknown', color: '#888' };

  // Temp factor: optimal around 85°C, degrades at extremes
  const tempOptimal = 85;
  const tempFactor = Math.max(0, 1 - Math.abs(temp - tempOptimal) / 60);

  // Dunk time: each biscuit has optimal range
  const optimalTime = (biscuit.integrity / 10) * 2; // 4-17 seconds
  const timeFactor = Math.max(0, 1 - Math.pow((dunkTime - optimalTime) / (optimalTime * 1.5), 2));

  // Structural integrity
  const intFactor = structuralIntegrity / 100;

  // Absorption at current temp/time
  const absorbed = biscuit.absorbRate * (temp / 100) * (dunkTime / 10);

  // Combined score
  const rawScore = (
    tempFactor * 0.3 +
    timeFactor * 0.35 +
    intFactor * 0.2 +
    (1 - Math.min(1, absorbed / 1.5)) * 0.15
  ) * 100;

  const score = Math.max(0, Math.min(100, rawScore));

  // Crumble risk (higher = more crumble)
  const crumbleRisk = Math.max(0, Math.min(100,
    (absorbed / 1.2) * 50 +
    (1 - timeFactor) * 30 +
    ((100 - biscuit.integrity) / 100) * 20
  ));

  let status, color, desc;
  if (score >= 85) {
    status = 'PERFECT DUNK'; color = '#55c875';
    desc = `A flawless ${biscuit.name}. Tea-to-biscuit harmony achieved.`;
  } else if (score >= 70) {
    status = 'GREAT DUNK'; color = '#8bc855';
    desc = `Solid technique. The ${biscuit.flavor}.`;
  } else if (score >= 55) {
    status = 'DECENT DUNK'; color = '#e0b055';
    desc = `Passable. Could be worse. Could be a Rich Tea.`;
  } else if (score >= 35) {
    status = 'RISKY DUNK'; color = '#e07855';
    desc = `Structural integrity compromised. Proceed with caution.`;
  } else {
    status = 'CATASTROPHIC'; color = '#e05555';
    desc = `The ${biscuit.name} has surrendered to the void of your mug.`;
  }

  return { score: Math.round(score), crumbleRisk: Math.round(crumbleRisk), status, color, desc, optimalTime };
}

// SVG Teacup
function Teacup({ dunking, biscuitId, dunkDepth, temp }) {
  const steamOpacity = Math.min(1, (temp - 40) / 60);
  const biscuit = BISCUITS.find(b => b.id === biscuitId);
  const teaColor = temp > 80 ? '#8B5E3C' : temp > 60 ? '#A67B5B' : '#C4956A';

  return (
    <svg width="220" height="180" viewBox="0 0 220 180" style={{overflow:'visible'}}>
      {/* Steam lines */}
      {steamOpacity > 0.1 && [0,1,2].map(i => (
        <g key={i} style={{opacity: steamOpacity}}>
          <line
            x1={80 + i * 20} y1={55}
            x2={80 + i * 20 + (i%2===0?-5:5)} y2={20}
            stroke="rgba(255,255,255,0.3)"
            strokeWidth="3"
            strokeLinecap="round"
            style={{
              animation: `steamRise ${1.5 + i*0.3}s ease-out infinite`,
              animationDelay: `${i * 0.5}s`
            }}
          />
        </g>
      ))}

      {/* Saucer */}
      <ellipse cx="110" cy="165" rx="80" ry="10" fill="#4a3525" opacity="0.6"/>
      <ellipse cx="110" cy="163" rx="75" ry="8" fill="#5a4030"/>
      <ellipse cx="110" cy="163" rx="65" ry="6" fill="#6a4a38"/>

      {/* Cup body */}
      <path d="M 45 60 Q 40 130 55 145 L 165 145 Q 180 130 175 60 Z"
        fill="#3a2518" stroke="#6a4a38" strokeWidth="2"/>

      {/* Tea liquid */}
      <clipPath id="cupClip">
        <path d="M 45 60 Q 40 130 55 145 L 165 145 Q 180 130 175 60 Z"/>
      </clipPath>
      <rect x="40" y="90" width="140" height="60" fill={teaColor} clipPath="url(#cupClip)" opacity="0.9"/>
      <ellipse cx="110" cy="90" rx="65" ry="8" fill={teaColor} opacity="0.7"/>
      {/* Tea surface highlight */}
      <ellipse cx="110" cy="90" rx="55" ry="5" fill="rgba(255,220,180,0.15)"/>

      {/* Cup rim */}
      <ellipse cx="110" cy="60" rx="65" ry="10" fill="#4a3525" stroke="#6a4a38" strokeWidth="2"/>
      <ellipse cx="110" cy="60" rx="60" ry="7" fill="#3a2518"/>

      {/* Cup handle */}
      <path d="M 175 80 Q 210 90 210 110 Q 210 130 175 130"
        fill="none" stroke="#4a3525" strokeWidth="14" strokeLinecap="round"/>
      <path d="M 175 80 Q 205 90 205 110 Q 205 128 175 130"
        fill="none" stroke="#5a3528" strokeWidth="8" strokeLinecap="round"/>

      {/* Cup shine */}
      <path d="M 55 70 Q 70 65 80 80" stroke="rgba(255,255,255,0.15)" strokeWidth="3" fill="none" strokeLinecap="round"/>

      {/* Biscuit */}
      {biscuit && (
        <BiscuitSVG
          biscuitId={biscuitId}
          dunking={dunking}
          dunkDepth={dunkDepth}
          teaY={90}
        />
      )}
    </svg>
  );
}

function BiscuitSVG({ biscuitId, dunking, dunkDepth, teaY }) {
  // dunkDepth: 0 = above cup, 1 = fully submerged
  const biscuitY = dunking ? 50 + dunkDepth * 55 : 20;
  const biscuit = BISCUITS.find(b => b.id === biscuitId);

  const colors = {
    digestive: ['#c8955a', '#b07840'],
    hobnob: ['#d4a86a', '#b88040'],
    custard: ['#e8d890', '#c8b060', '#f0e8a0'],
    rich_tea: ['#d4c890', '#b8a860'],
    bourbon: ['#3a1a0a', '#5a2a10'],
    ginger: ['#d4782a', '#b85810'],
    oreo: ['#1a1a1a', '#2a2a2a', '#f0f0f0'],
    shortbread: ['#f0d880', '#d4b840'],
    jaffa: ['#e87030', '#f09050', '#c84820'],
  };

  const c = colors[biscuitId] || ['#c8955a', '#b07840'];

  return (
    <g transform={`translate(110, ${biscuitY})`} style={{transition: 'transform 0.5s cubic-bezier(0.34,1.56,0.64,1)'}}>
      {biscuitId === 'digestive' && (
        <g>
          <ellipse cx="0" cy="0" rx="35" ry="8" fill={c[0]}/>
          <ellipse cx="0" cy="-2" rx="35" ry="8" fill={c[0]}/>
          <ellipse cx="0" cy="-3" rx="34" ry="7" fill={c[1]}/>
          {[...Array(5)].map((_,i) => <circle key={i} cx={(i-2)*12} cy="-3" r="1.5" fill="rgba(0,0,0,0.2)"/>)}
        </g>
      )}
      {biscuitId === 'hobnob' && (
        <g>
          <ellipse cx="0" cy="0" rx="35" ry="8" fill={c[1]}/>
          <ellipse cx="0" cy="-2" rx="35" ry="8" fill={c[0]}/>
          {[...Array(12)].map((_,i) => {
            const a = (i/12)*Math.PI*2;
            return <circle key={i} cx={Math.cos(a)*22} cy={Math.sin(a)*5-2} r="2.5" fill={c[1]}/>;
          })}
          <ellipse cx="0" cy="-2" rx="15" ry="4" fill={c[1]} opacity="0.5"/>
        </g>
      )}
      {biscuitId === 'custard' && (
        <g>
          <rect x="-38" y="-9" width="76" height="12" rx="3" fill={c[1]}/>
          <rect x="-38" y="-11" width="76" height="12" rx="3" fill={c[0]}/>
          <rect x="-36" y="-12" width="72" height="8" rx="2" fill={c[2] || '#f0e890'}/>
          <rect x="-38" y="-4" width="76" height="4" rx="1" fill={c[1]}/>
          <rect x="-38" y="0" width="76" height="8" rx="2" fill={c[0]}/>
        </g>
      )}
      {biscuitId === 'rich_tea' && (
        <g>
          <ellipse cx="0" cy="0" rx="38" ry="7" fill={c[1]}/>
          <ellipse cx="0" cy="-2" rx="38" ry="7" fill={c[0]}/>
          <ellipse cx="0" cy="-3" rx="36" ry="6" fill={c[0]} opacity="0.8"/>
          {[...Array(7)].map((_,i) => <rect key={i} x={(i-3)*10-3} y="-5" width="6" height="3" rx="1" fill="rgba(0,0,0,0.1)"/>)}
        </g>
      )}
      {biscuitId === 'bourbon' && (
        <g>
          <rect x="-38" y="-6" width="76" height="10" rx="3" fill={c[1]}/>
          <rect x="-38" y="-8" width="76" height="10" rx="3" fill={c[0]}/>
          <rect x="-36" y="-10" width="72" height="9" rx="2" fill={c[0]} opacity="0.8"/>
          <rect x="-20" y="-4" width="40" height="3" rx="1" fill={c[1]} opacity="0.6"/>
          {[...Array(5)].map((_,i) => <circle key={i} cx={(i-2)*14} cy="-8" r="1.5" fill="rgba(255,255,255,0.15)"/>)}
        </g>
      )}
      {biscuitId === 'ginger' && (
        <g>
          <circle cx="0" cy="0" r="5" fill={c[1]}/>
          <ellipse cx="0" cy="-1" rx="36" ry="9" fill={c[1]}/>
          <ellipse cx="0" cy="-3" rx="35" ry="8" fill={c[0]}/>
          {[...Array(6)].map((_,i) => <circle key={i} cx={(i-2.5)*12} cy="-3" r="1.5" fill="rgba(0,0,0,0.15)"/>)}
          <ellipse cx="0" cy="-5" rx="20" ry="3" fill="rgba(255,255,255,0.08)"/>
        </g>
      )}
      {biscuitId === 'oreo' && (
        <g>
          <ellipse cx="0" cy="1" rx="34" ry="7" fill={c[1]}/>
          <ellipse cx="0" cy="-1" rx="34" ry="7" fill={c[0]}/>
          <ellipse cx="0" cy="-3" rx="32" ry="5" fill={c[2] || '#fff'} opacity="0.9"/>
          <ellipse cx="0" cy="-7" rx="34" ry="7" fill={c[0]}/>
          {[...Array(8)].map((_,i) => {
            const a = (i/8)*Math.PI*2;
            return <circle key={i} cx={Math.cos(a)*20} cy={Math.sin(a)*5-7} r="1.5" fill="rgba(255,255,255,0.2)"/>;
          })}
        </g>
      )}
      {biscuitId === 'shortbread' && (
        <g>
          <rect x="-40" y="-7" width="80" height="12" rx="4" fill={c[1]}/>
          <rect x="-40" y="-9" width="80" height="12" rx="4" fill={c[0]}/>
          {[...Array(4)].map((_,i) => <circle key={i} cx={(i-1.5)*22} cy="-5" r="2" fill="rgba(0,0,0,0.1)"/>)}
          <rect x="-38" y="-9" width="76" height="3" rx="2" fill="rgba(255,255,255,0.15)"/>
        </g>
      )}
      {biscuitId === 'jaffa' && (
        <g>
          <ellipse cx="0" cy="0" rx="36" ry="8" fill={c[0]}/>
          <ellipse cx="0" cy="-2" rx="34" ry="7" fill={c[1]}/>
          <ellipse cx="0" cy="-4" rx="20" ry="5" fill={c[2] || '#c84820'}/>
          <ellipse cx="0" cy="-6" rx="18" ry="4" fill={c[0]} opacity="0.4"/>
          <ellipse cx="0" cy="-2" rx="14" ry="3" fill={c[2] || '#c84820'} opacity="0.6"/>
        </g>
      )}
    </g>
  );
}

function CrumbleMeter({ score, crumbleRisk }) {
  const canvasRef = useRef(null);
  const historyRef = useRef([]);

  useEffect(() => {
    historyRef.current = [...historyRef.current, crumbleRisk].slice(-40);
    drawGraph();
  }, [crumbleRisk, score]);

  function drawGraph() {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const w = canvas.width;
    const h = canvas.height;
    ctx.clearRect(0, 0, w, h);

    const hist = historyRef.current;
    if (hist.length < 2) return;

    // Grid lines
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.lineWidth = 1;
    for (let i = 0; i <= 4; i++) {
      const y = (h / 4) * i;
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
    }
    for (let i = 0; i < 8; i++) {
      const x = (w / 8) * i;
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
    }

    // Area fill
    const gradient = ctx.createLinearGradient(0, 0, 0, h);
    gradient.addColorStop(0, 'rgba(224,85,85,0.4)');
    gradient.addColorStop(1, 'rgba(224,85,85,0.0)');

    ctx.beginPath();
    const step = w / (hist.length - 1);
    ctx.moveTo(0, h - (hist[0] / 100) * h);
    hist.forEach((v, i) => {
      const x = i * step;
      const y = h - (v / 100) * h;
      if (i === 0) ctx.moveTo(x, y);
      else {
        const prevX = (i-1) * step;
        const prevY = h - (hist[i-1] / 100) * h;
        const cpx = (prevX + x) / 2;
        ctx.bezierCurveTo(cpx, prevY, cpx, y, x, y);
      }
    });
    ctx.lineTo(w, h); ctx.lineTo(0, h); ctx.closePath();
    ctx.fillStyle = gradient;
    ctx.fill();

    // Line
    const lineGrad = ctx.createLinearGradient(0, 0, w, 0);
    lineGrad.addColorStop(0, 'rgba(200,147,90,0.5)');
    lineGrad.addColorStop(1, '#e05555');

    ctx.beginPath();
    hist.forEach((v, i) => {
      const x = i * step;
      const y = h - (v / 100) * h;
      if (i === 0) ctx.moveTo(x, y);
      else {
        const prevX = (i-1) * step;
        const prevY = h - (hist[i-1] / 100) * h;
        const cpx = (prevX + x) / 2;
        ctx.bezierCurveTo(cpx, prevY, cpx, y, x, y);
      }
    });
    ctx.strokeStyle = lineGrad;
    ctx.lineWidth = 2.5;
    ctx.stroke();

    // Current point
    const lastX = (hist.length - 1) * step;
    const lastY = h - (hist[hist.length-1] / 100) * h;
    ctx.beginPath();
    ctx.arc(lastX, lastY, 5, 0, Math.PI * 2);
    ctx.fillStyle = '#e05555';
    ctx.fill();
    ctx.strokeStyle = 'white';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Y-axis labels
    ctx.fillStyle = 'rgba(160,144,128,0.7)';
    ctx.font = '9px monospace';
    ctx.textAlign = 'right';
    ['100', '75', '50', '25', '0'].forEach((label, i) => {
      ctx.fillText(label, w - 2, (h / 4) * i + 3);
    });
  }

  return (
    <div className="crumble-meter">
      <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom: 8}}>
        <span style={{fontSize:'0.8rem', color:'var(--text2)'}}>Crumble Risk History</span>
        <span style={{fontSize:'0.75rem', color:'var(--text2)'}}>Current: <span style={{color:'#e05555', fontWeight:'bold'}}>{crumbleRisk}%</span></span>
      </div>
      <div className="sparkline-wrap">
        <canvas ref={canvasRef} width="400" height="100" style={{width:'100%', height:'100px'}}/>
      </div>
      <div className="meter-labels">
        <span>← History</span>
        <span>Now →</span>
      </div>
    </div>
  );
}

function Crumbs({ crumbs }) {
  return (
    <div style={{position:'absolute', inset:0, pointerEvents:'none', overflow:'hidden'}}>
      {crumbs.map((c) => (
        <div
          key={c.id}
          className="crumb"
          style={{
            left: c.x,
            top: c.y,
            width: c.size,
            height: c.size,
            background: c.color,
            '--dx': `${c.dx}px`,
          }}
        />
      ))}
    </div>
  );
}

function App() {
  const [temp, setTemp] = useState(85);
  const [dunkTime, setDunkTime] = useState(4);
  const [biscuitId, setBiscuitId] = useState('digestive');
  const [structuralIntegrity, setStructuralIntegrity] = useState(80);
  const [dunking, setDunking] = useState(false);
  const [dunkDepth, setDunkDepth] = useState(0);
  const [crumbs, setCrumbs] = useState([]);
  const [dunkCount, setDunkCount] = useState(0);
  const [bestScore, setBestScore] = useState(0);
  const [toast, setToast] = useState({ show: false, msg: '' });
  const [sessionDunks, setSessionDunks] = useState([]);
  const teacupRef = useRef(null);
  const dunkAnimRef = useRef(null);
  const crumbIdRef = useRef(0);

  const result = computeDunkability(temp, dunkTime, biscuitId, structuralIntegrity);

  const showToast = useCallback((msg) => {
    setToast({ show: true, msg });
    setTimeout(() => setToast({ show: false, msg }), 2500);
  }, []);

  const spawnCrumbs = useCallback(() => {
    const biscuit = BISCUITS.find(b => b.id === biscuitId);
    const brown = biscuitId === 'bourbon' || biscuitId === 'oreo';
    const count = Math.floor(5 + Math.random() * 10);
    const newCrumbs = Array.from({length: count}, () => {
      crumbIdRef.current++;
      return {
        id: crumbIdRef.current,
        x: `${40 + Math.random() * 140}px`,
        y: `${80 + Math.random() * 60}px`,
        size: 3 + Math.random() * 5,
        color: brown ? `hsl(${20 + Math.random()*10}, 40%, ${20+Math.random()*15}%)` : `hsl(${30 + Math.random()*20}, 50%, ${50+Math.random()*20}%)`,
        dx: (Math.random() - 0.5) * 60,
      };
    });
    setCrumbs(prev => [...prev.slice(-30), ...newCrumbs]);
    setTimeout(() => {
      setCrumbs(prev => prev.filter(c => !newCrumbs.find(n => n.id === c.id)));
    }, 1600);
  }, [biscuitId]);

  const doDunk = useCallback(() => {
    if (dunking) return;
    setDunking(true);
    setDunkDepth(0);

    // Animate dunk
    let progress = 0;
    const targetDepth = 0.6 + Math.random() * 0.3;
    const step = () => {
      progress += 0.05;
      if (progress <= 1) {
        setDunkDepth(Math.sin(progress * Math.PI) * targetDepth);
        dunkAnimRef.current = requestAnimationFrame(step);
      } else {
        setDunkDepth(0);
        setDunking(false);

        const r = computeDunkability(temp, dunkTime, biscuitId, structuralIntegrity);
        if (r.crumbleRisk > 65) spawnCrumbs();

        setDunkCount(prev => prev + 1);
        if (r.score > bestScore) {
          setBestScore(r.score);
          if (r.score >= 85) showToast('🎉 New best! Perfect dunk achieved!');
        }
        setSessionDunks(prev => [...prev.slice(-9), r.score]);
        if (r.crumbleRisk > 80) showToast(`💀 ${r.status}: Structural collapse!`);
        else if (r.score >= 85) showToast(`✨ ${r.status}`);
      }
    };
    dunkAnimRef.current = requestAnimationFrame(step);
  }, [dunking, temp, dunkTime, biscuitId, structuralIntegrity, bestScore, spawnCrumbs, showToast]);

  // Keyboard shortcuts
  useEffect(() => {
    const handler = (e) => {
      if (e.target.tagName === 'INPUT') return;
      switch(e.key) {
        case ' ': case 'Enter': e.preventDefault(); doDunk(); break;
        case 'ArrowUp': setTemp(t => Math.min(100, t + 5)); break;
        case 'ArrowDown': setTemp(t => Math.max(40, t - 5)); break;
        case 'ArrowRight': setDunkTime(t => Math.min(20, t + 1)); break;
        case 'ArrowLeft': setDunkTime(t => Math.max(1, t - 1)); break;
        case '+': case '=': setStructuralIntegrity(v => Math.min(100, v + 5)); break;
        case '-': setStructuralIntegrity(v => Math.max(10, v - 5)); break;
        case '1': case '2': case '3': case '4': case '5': case '6': case '7': case '8': case '9':
          const idx = parseInt(e.key) - 1;
          if (BISCUITS[idx]) setBiscuitId(BISCUITS[idx].id);
          break;
      }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [doDunk]);

  useEffect(() => {
    return () => { if (dunkAnimRef.current) cancelAnimationFrame(dunkAnimRef.current); };
  }, []);

  const meterColor = result.crumbleRisk > 70 ? '#e05555' : result.crumbleRisk > 45 ? '#e0b055' : '#55c875';

  const sliderBackground = (val, min, max, color) => {
    const pct = ((val - min) / (max - min)) * 100;
    return `linear-gradient(to right, ${color} ${pct}%, rgba(255,255,255,0.1) ${pct}%)`;
  };

  return (
    <div className="app">
      <h1>☕ Tea Dunkability Simulator</h1>
      <p className="subtitle">The science of the perfect biscuit dunk — measured, quantified, perfected.</p>

      <div className="grid">
        {/* Teacup Animation */}
        <div className="card teacup-area" ref={teacupRef} style={{position:'relative'}}>
          <Crumbs crumbs={crumbs}/>
          <div style={{display:'flex', flexDirection:'column', alignItems:'center', gap:16}}>
            <Teacup dunking={dunking} biscuitId={biscuitId} dunkDepth={dunkDepth} temp={temp}/>
            <button
              className={`dunk-btn${dunking ? ' dunking' : ''}`}
              onClick={doDunk}
              disabled={dunking}
              style={{maxWidth: 200}}
            >
              {dunking ? '⏳ Dunking...' : '🫖 DUNK! [Space]'}
            </button>
          </div>
        </div>

        {/* Controls */}
        <div className="card">
          <div className="card-title">Dunk Parameters</div>
          <div className="slider-group">
            <div className="slider-row">
              <div className="slider-label">
                <span className="slider-name">🌡️ Tea Temperature</span>
                <span className="slider-val">{temp}°C</span>
              </div>
              <input type="range" min="40" max="100" value={temp}
                onChange={e => setTemp(+e.target.value)}
                style={{background: sliderBackground(temp, 40, 100, '#e05555')}}/>
              <div style={{display:'flex', justifyContent:'space-between', fontSize:'0.7rem', color:'var(--text2)'}}>
                <span>Lukewarm</span><span>Optimal 85°</span><span>Scalding</span>
              </div>
            </div>
            <div className="slider-row">
              <div className="slider-label">
                <span className="slider-name">⏱️ Dunk Duration</span>
                <span className="slider-val">{dunkTime}s</span>
              </div>
              <input type="range" min="1" max="20" value={dunkTime}
                onChange={e => setDunkTime(+e.target.value)}
                style={{background: sliderBackground(dunkTime, 1, 20, '#c8935a')}}/>
              <div style={{display:'flex', justifyContent:'space-between', fontSize:'0.7rem', color:'var(--text2)'}}>
                <span>Timid</span><span>Optimal</span><span>Reckless</span>
              </div>
            </div>
            <div className="slider-row">
              <div className="slider-label">
                <span className="slider-name">🏗️ Structural Integrity</span>
                <span className="slider-val">{structuralIntegrity}%</span>
              </div>
              <input type="range" min="10" max="100" value={structuralIntegrity}
                onChange={e => setStructuralIntegrity(+e.target.value)}
                style={{background: sliderBackground(structuralIntegrity, 10, 100, '#55c875')}}/>
              <div style={{display:'flex', justifyContent:'space-between', fontSize:'0.7rem', color:'var(--text2)'}}>
                <span>Crumbly</span><span>Firm</span><span>Ironclad</span>
              </div>
            </div>
          </div>
        </div>

        {/* Biscuit Selector */}
        <div className="card">
          <div className="card-title">Biscuit Selection</div>
          <div className="biscuit-grid">
            {BISCUITS.map((b, i) => (
              <button
                key={b.id}
                className={`biscuit-btn${biscuitId === b.id ? ' selected' : ''}`}
                onClick={() => setBiscuitId(b.id)}
                title={`[${i+1}] ${b.name}`}
              >
                <span className="biscuit-icon">{b.icon}</span>
                {b.name}
              </button>
            ))}
          </div>
        </div>

        {/* Dunk Result */}
        <div className="card result-card" style={{gridColumn:'1/-1'}}>
          <div className="card-title">Dunkability Analysis</div>
          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:20}}>
            <div>
              <div className="dunk-result">
                <div className="result-badge" style={{background: result.color + '22', color: result.color, border: `1px solid ${result.color}55`}}>
                  {result.status}
                </div>
                <div className="result-desc">{result.desc}</div>
              </div>

              {/* Score bar */}
              <div style={{marginTop:16}}>
                <div style={{display:'flex', justifyContent:'space-between', marginBottom:6}}>
                  <span style={{fontSize:'0.8rem', color:'var(--text2)'}}>Dunkability Score</span>
                  <span style={{fontSize:'0.85rem', fontWeight:'bold', color:result.color}}>{result.score}/100</span>
                </div>
                <div className="meter-bar-track">
                  <div className="meter-bar-fill"
                    style={{width:`${result.score}%`, background:`linear-gradient(90deg, ${result.color}88, ${result.color})`}}/>
                </div>
              </div>

              {/* Crumble risk bar */}
              <div style={{marginTop:12}}>
                <div style={{display:'flex', justifyContent:'space-between', marginBottom:6}}>
                  <span style={{fontSize:'0.8rem', color:'var(--text2)'}}>Crumble Risk</span>
                  <span style={{fontSize:'0.85rem', fontWeight:'bold', color:meterColor}}>{result.crumbleRisk}%</span>
                </div>
                <div className="meter-bar-track">
                  <div className="meter-bar-fill"
                    style={{width:`${result.crumbleRisk}%`, background:`linear-gradient(90deg, #55c875, #e0b055, ${meterColor})`}}/>
                </div>
              </div>

              <div className="stats-row">
                <div className="stat-box">
                  <div className="stat-val">{dunkCount}</div>
                  <div className="stat-label">Total Dunks</div>
                </div>
                <div className="stat-box">
                  <div className="stat-val">{bestScore}</div>
                  <div className="stat-label">Best Score</div>
                </div>
                <div className="stat-box">
                  <div className="stat-val">{result.optimalTime?.toFixed(1)}s</div>
                  <div className="stat-label">Optimal Time</div>
                </div>
              </div>
            </div>

            <div>
              <CrumbleMeter score={result.score} crumbleRisk={result.crumbleRisk}/>
              {sessionDunks.length > 1 && (
                <div style={{marginTop:12}}>
                  <div style={{fontSize:'0.75rem', color:'var(--text2)', marginBottom:6}}>Session scores:</div>
                  <div style={{display:'flex', gap:4, alignItems:'flex-end', height:36}}>
                    {sessionDunks.map((s, i) => (
                      <div key={i} style={{
                        flex:1,
                        height: `${s}%`,
                        minHeight:4,
                        background: s >= 85 ? '#55c875' : s >= 55 ? '#e0b055' : '#e05555',
                        borderRadius:'3px 3px 0 0',
                        opacity: 0.4 + (i / sessionDunks.length) * 0.6,
                        transition:'height 0.3s'
                      }}/>
                    ))}
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>

        {/* Keyboard shortcuts */}
        <div className="card full-width">
          <div className="card-title">Keyboard Shortcuts</div>
          <div className="shortcuts">
            <div className="shortcut"><kbd>Space</kbd> Dunk!</div>
            <div className="shortcut"><kbd>↑</kbd><kbd>↓</kbd> Temperature</div>
            <div className="shortcut"><kbd>←</kbd><kbd>→</kbd> Dunk time</div>
            <div className="shortcut"><kbd>+</kbd><kbd>-</kbd> Integrity</div>
            <div className="shortcut"><kbd>1–9</kbd> Select biscuit</div>
          </div>
        </div>
      </div>

      {/* Toast */}
      <div className={`toast${toast.show ? ' show' : ''}`}>{toast.msg}</div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
