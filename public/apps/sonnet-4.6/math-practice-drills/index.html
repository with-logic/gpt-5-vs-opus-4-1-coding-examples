<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Math Practice Drills</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --accent: #6c63ff;
      --accent2: #ff6584;
      --green: #43e97b;
      --red: #ff4d6d;
      --yellow: #ffd166;
      --text: #e8eaf6;
      --muted: #8890b5;
      --radius: 16px;
      --shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-x: hidden;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 20% 20%, rgba(108,99,255,0.12) 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 80%, rgba(255,101,132,0.08) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 600px;
    }

    /* --- Screens --- */
    .screen { display: none; }
    .screen.active { display: flex; flex-direction: column; align-items: center; gap: 24px; }

    /* --- Header --- */
    .app-title {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #6c63ff, #ff6584);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
    }
    .app-subtitle {
      color: var(--muted);
      font-size: 1rem;
      text-align: center;
      margin-top: -16px;
    }

    /* --- Cards --- */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 28px;
      width: 100%;
      box-shadow: var(--shadow);
      border: 1px solid rgba(108,99,255,0.12);
    }

    /* --- Settings Grid --- */
    .settings-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      width: 100%;
    }
    .setting-block {
      background: var(--surface2);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .setting-block label {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* --- Toggle group --- */
    .toggle-group {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .toggle-btn {
      flex: 1;
      min-width: 40px;
      padding: 8px 10px;
      border: none;
      border-radius: 8px;
      background: var(--surface);
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.18s;
      text-align: center;
    }
    .toggle-btn.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 0 12px rgba(108,99,255,0.4);
    }
    .toggle-btn:hover:not(.active) {
      background: var(--surface);
      color: var(--text);
    }

    /* --- Op buttons --- */
    .op-group {
      display: flex;
      gap: 6px;
    }
    .op-btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: var(--surface);
      color: var(--muted);
      font-size: 1.3rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.18s;
    }
    .op-btn.active {
      color: #fff;
      box-shadow: 0 0 12px rgba(108,99,255,0.4);
    }
    .op-btn[data-op="+"].active  { background: #6c63ff; }
    .op-btn[data-op="-"].active  { background: #ff6584; }
    .op-btn[data-op="×"].active  { background: #43e97b; color: #0f1117; }
    .op-btn[data-op="÷"].active  { background: #ffd166; color: #0f1117; }
    .op-btn:hover:not(.active)   { background: var(--surface2); color: var(--text); }

    /* --- Buttons --- */
    .btn {
      padding: 16px 32px;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.18s;
      letter-spacing: 0.02em;
    }
    .btn-primary {
      background: linear-gradient(135deg, #6c63ff, #9b59ff);
      color: #fff;
      box-shadow: 0 4px 20px rgba(108,99,255,0.4);
      width: 100%;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(108,99,255,0.5); }
    .btn-primary:active { transform: translateY(0); }
    .btn-secondary {
      background: var(--surface2);
      color: var(--text);
    }
    .btn-secondary:hover { background: #2d3250; }

    /* --- Quiz Screen --- */
    .quiz-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      gap: 12px;
    }

    .stat-pill {
      background: var(--surface2);
      border-radius: 50px;
      padding: 8px 16px;
      font-size: 0.85rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
    }
    .stat-pill span.val {
      color: var(--text);
      font-size: 1rem;
      font-weight: 700;
    }

    /* Timer bar */
    .timer-bar-wrap {
      width: 100%;
      height: 6px;
      background: var(--surface2);
      border-radius: 99px;
      overflow: hidden;
    }
    .timer-bar {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, #6c63ff, #ff6584);
      transition: width 1s linear, background 0.5s;
    }
    .timer-bar.warning { background: linear-gradient(90deg, #ffd166, #ff4d6d); }

    /* Problem display */
    .problem-wrap {
      text-align: center;
      padding: 20px 0 8px;
    }
    .problem-expr {
      font-size: clamp(2.5rem, 10vw, 4rem);
      font-weight: 900;
      letter-spacing: -2px;
      color: var(--text);
    }
    .problem-expr .op {
      color: var(--accent);
      margin: 0 12px;
    }

    /* Answer input */
    .answer-row {
      display: flex;
      gap: 10px;
      width: 100%;
      align-items: center;
    }
    .answer-input {
      flex: 1;
      background: var(--surface2);
      border: 2px solid transparent;
      border-radius: 12px;
      padding: 18px 20px;
      font-size: 2rem;
      font-weight: 700;
      color: var(--text);
      text-align: center;
      outline: none;
      transition: border-color 0.18s, background 0.18s;
    }
    .answer-input:focus { border-color: var(--accent); }
    .answer-input.correct { border-color: var(--green); background: rgba(67,233,123,0.08); }
    .answer-input.wrong   { border-color: var(--red);   background: rgba(255,77,109,0.08); }

    .submit-btn {
      padding: 18px 24px;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 1.4rem;
      cursor: pointer;
      transition: all 0.18s;
      box-shadow: 0 4px 16px rgba(108,99,255,0.3);
    }
    .submit-btn:hover { transform: scale(1.05); }
    .submit-btn:active { transform: scale(0.97); }

    /* Feedback flash */
    .feedback {
      font-size: 1.2rem;
      font-weight: 700;
      height: 28px;
      text-align: center;
      transition: opacity 0.3s;
    }
    .feedback.correct { color: var(--green); }
    .feedback.wrong   { color: var(--red); }

    /* Progress bar */
    .progress-wrap {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .progress-bar-bg {
      flex: 1;
      height: 8px;
      background: var(--surface2);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, #43e97b, #6c63ff);
      transition: width 0.4s ease;
    }
    .progress-label {
      font-size: 0.8rem;
      color: var(--muted);
      white-space: nowrap;
    }

    /* --- Results Screen --- */
    .score-ring-wrap {
      position: relative;
      width: 160px;
      height: 160px;
    }
    .score-ring {
      transform: rotate(-90deg);
    }
    .score-ring-track { fill: none; stroke: var(--surface2); stroke-width: 12; }
    .score-ring-fill {
      fill: none;
      stroke-width: 12;
      stroke-linecap: round;
      stroke: url(#ringGrad);
      transition: stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1);
    }
    .score-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .score-pct {
      font-size: 2.4rem;
      font-weight: 900;
      background: linear-gradient(135deg, #6c63ff, #ff6584);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .score-label { font-size: 0.75rem; color: var(--muted); font-weight: 600; }

    .results-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      width: 100%;
    }
    .result-stat {
      background: var(--surface2);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }
    .result-stat .rs-val {
      font-size: 1.8rem;
      font-weight: 800;
      line-height: 1;
    }
    .result-stat .rs-lbl {
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-top: 4px;
      font-weight: 600;
    }

    .grade-badge {
      padding: 6px 18px;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    /* --- History --- */
    .history-list {
      width: 100%;
      max-height: 200px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .history-list::-webkit-scrollbar { width: 4px; }
    .history-list::-webkit-scrollbar-track { background: transparent; }
    .history-list::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 99px; }

    .history-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--surface2);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.85rem;
    }
    .history-row .hr-expr { font-weight: 600; }
    .history-row .hr-answer { color: var(--muted); }
    .history-row .hr-correct { color: var(--green); font-size: 1rem; }
    .history-row .hr-wrong   { color: var(--red); font-size: 1rem; }

    /* Num pad */
    .numpad {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      width: 100%;
    }
    .np-btn {
      padding: 16px;
      border: none;
      border-radius: 10px;
      background: var(--surface2);
      color: var(--text);
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.12s;
      touch-action: manipulation;
    }
    .np-btn:hover { background: #2d3250; }
    .np-btn:active { transform: scale(0.94); background: var(--accent); color: #fff; }
    .np-btn.np-enter { background: var(--accent); color: #fff; grid-column: span 2; }
    .np-btn.np-clear { background: var(--surface2); color: var(--red); }

    /* --- Transitions --- */
    .problem-wrap { animation: popIn 0.25s cubic-bezier(.34,1.56,.64,1); }
    @keyframes popIn {
      from { transform: scale(0.85); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }

    .shake { animation: shake 0.35s; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%     { transform: translateX(-8px); }
      40%     { transform: translateX(8px); }
      60%     { transform: translateX(-6px); }
      80%     { transform: translateX(4px); }
    }

    /* --- Responsive --- */
    @media (max-width: 480px) {
      .settings-grid { grid-template-columns: 1fr; }
      .results-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<div class="container">

  <!-- ======= HOME SCREEN ======= -->
  <div id="screen-home" class="screen active">
    <div>
      <div class="app-title">Math Practice Drills</div>
      <div class="app-subtitle">Sharpen your skills, beat your best</div>
    </div>

    <div class="card" style="display:flex;flex-direction:column;gap:16px;">
      <div class="settings-grid">

        <!-- Operation -->
        <div class="setting-block" style="grid-column:span 2;">
          <label>Operations</label>
          <div class="op-group">
            <button class="op-btn active" data-op="+" onclick="toggleOp(this)">+</button>
            <button class="op-btn active" data-op="-" onclick="toggleOp(this)">−</button>
            <button class="op-btn active" data-op="×" onclick="toggleOp(this)">×</button>
            <button class="op-btn active" data-op="÷" onclick="toggleOp(this)">÷</button>
          </div>
        </div>

        <!-- Difficulty -->
        <div class="setting-block">
          <label>Difficulty</label>
          <div class="toggle-group" id="diff-group">
            <button class="toggle-btn" data-val="easy" onclick="selectToggle('diff-group',this)">Easy</button>
            <button class="toggle-btn active" data-val="medium" onclick="selectToggle('diff-group',this)">Med</button>
            <button class="toggle-btn" data-val="hard" onclick="selectToggle('diff-group',this)">Hard</button>
          </div>
        </div>

        <!-- Time Limit -->
        <div class="setting-block">
          <label>Time / Question</label>
          <div class="toggle-group" id="time-group">
            <button class="toggle-btn" data-val="5" onclick="selectToggle('time-group',this)">5s</button>
            <button class="toggle-btn active" data-val="10" onclick="selectToggle('time-group',this)">10s</button>
            <button class="toggle-btn" data-val="20" onclick="selectToggle('time-group',this)">20s</button>
            <button class="toggle-btn" data-val="0" onclick="selectToggle('time-group',this)">∞</button>
          </div>
        </div>

        <!-- Questions -->
        <div class="setting-block">
          <label>Questions</label>
          <div class="toggle-group" id="count-group">
            <button class="toggle-btn" data-val="5" onclick="selectToggle('count-group',this)">5</button>
            <button class="toggle-btn active" data-val="10" onclick="selectToggle('count-group',this)">10</button>
            <button class="toggle-btn" data-val="20" onclick="selectToggle('count-group',this)">20</button>
          </div>
        </div>

        <!-- Input Mode -->
        <div class="setting-block">
          <label>Input</label>
          <div class="toggle-group" id="input-group">
            <button class="toggle-btn active" data-val="keyboard" onclick="selectToggle('input-group',this)">Keys</button>
            <button class="toggle-btn" data-val="numpad" onclick="selectToggle('input-group',this)">Pad</button>
          </div>
        </div>

      </div>

      <button class="btn btn-primary" onclick="startQuiz()">Start Drill</button>
    </div>

    <!-- Best scores -->
    <div id="best-scores-card" class="card" style="display:none;">
      <div style="font-size:0.75rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;">Personal Bests</div>
      <div id="best-scores-list" style="display:flex;flex-direction:column;gap:8px;"></div>
    </div>
  </div>

  <!-- ======= QUIZ SCREEN ======= -->
  <div id="screen-quiz" class="screen">
    <div class="quiz-header">
      <div class="stat-pill">Q <span class="val" id="q-current">1</span>/<span id="q-total">10</span></div>
      <div class="stat-pill" id="timer-pill" style="min-width:80px;justify-content:center;">
        ⏱ <span class="val" id="timer-val">10</span>s
      </div>
      <div class="stat-pill">✓ <span class="val" id="score-live">0</span></div>
    </div>

    <div class="timer-bar-wrap">
      <div class="timer-bar" id="timer-bar"></div>
    </div>

    <div class="progress-wrap">
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
      <div class="progress-label" id="progress-label">0 / 10</div>
    </div>

    <div class="card" style="padding:32px 28px;">
      <div class="problem-wrap" id="problem-wrap">
        <div class="problem-expr" id="problem-display"></div>
      </div>
      <div class="feedback" id="feedback-msg"></div>
      <div class="answer-row" id="answer-row-keyboard">
        <input class="answer-input" id="answer-input" type="number" inputmode="numeric"
               placeholder="?" autocomplete="off" onkeydown="handleKey(event)" />
        <button class="submit-btn" onclick="submitAnswer()">→</button>
      </div>
      <div id="answer-row-numpad" style="display:none;">
        <div class="answer-input" id="numpad-display" style="margin-bottom:12px;cursor:default;">?</div>
        <div class="numpad" id="numpad"></div>
      </div>
    </div>

    <button class="btn btn-secondary" onclick="endQuiz(true)" style="width:100%;opacity:0.7;">Quit</button>
  </div>

  <!-- ======= RESULTS SCREEN ======= -->
  <div id="screen-results" class="screen">
    <div class="app-title" style="font-size:1.8rem;">Results</div>

    <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
      <div class="score-ring-wrap">
        <svg class="score-ring" width="160" height="160" viewBox="0 0 160 160">
          <defs>
            <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#6c63ff"/>
              <stop offset="100%" stop-color="#ff6584"/>
            </linearGradient>
          </defs>
          <circle class="score-ring-track" cx="80" cy="80" r="68"/>
          <circle class="score-ring-fill" id="ring-fill" cx="80" cy="80" r="68"
                  stroke-dasharray="427.3" stroke-dashoffset="427.3"/>
        </svg>
        <div class="score-center">
          <div class="score-pct" id="result-pct">0%</div>
          <div class="score-label">ACCURACY</div>
        </div>
      </div>
      <div class="grade-badge" id="grade-badge"></div>
    </div>

    <div class="results-grid">
      <div class="result-stat">
        <div class="rs-val" id="res-correct" style="color:var(--green)">0</div>
        <div class="rs-lbl">Correct</div>
      </div>
      <div class="result-stat">
        <div class="rs-val" id="res-wrong" style="color:var(--red)">0</div>
        <div class="rs-lbl">Wrong</div>
      </div>
      <div class="result-stat">
        <div class="rs-val" id="res-time" style="color:var(--yellow)">0s</div>
        <div class="rs-lbl">Avg Time</div>
      </div>
    </div>

    <!-- Review list -->
    <div class="card" style="padding:20px;">
      <div style="font-size:0.75rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;">Review</div>
      <div class="history-list" id="history-list"></div>
    </div>

    <div style="display:flex;gap:12px;width:100%;">
      <button class="btn btn-secondary" style="flex:1;" onclick="showScreen('home')">Settings</button>
      <button class="btn btn-primary" style="flex:1;" onclick="replayQuiz()">Play Again</button>
    </div>
  </div>

</div>

<script>
// ========== STATE ==========
const state = {
  ops: ['+', '-', '×', '÷'],
  difficulty: 'medium',
  timeLimit: 10,
  questionCount: 10,
  inputMode: 'keyboard',

  // runtime
  questions: [],
  current: 0,
  score: 0,
  timerInterval: null,
  timeLeft: 10,
  startTime: 0,
  questionTimes: [],
  answers: [],
  numpadVal: '',
  bestScores: JSON.parse(localStorage.getItem('mpdBest') || '{}')
};

// ========== SETTINGS ==========
function toggleOp(btn) {
  const op = btn.dataset.op;
  btn.classList.toggle('active');
  const idx = state.ops.indexOf(op);
  if (idx > -1) state.ops.splice(idx, 1);
  else state.ops.push(op);
  if (state.ops.length === 0) { btn.classList.add('active'); state.ops.push(op); }
}

function selectToggle(groupId, btn) {
  document.querySelectorAll(`#${groupId} .toggle-btn`).forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const val = btn.dataset.val;
  if (groupId === 'diff-group') state.difficulty = val;
  if (groupId === 'time-group') state.timeLimit = +val;
  if (groupId === 'count-group') state.questionCount = +val;
  if (groupId === 'input-group') state.inputMode = val;
}

// ========== PROBLEM GENERATION ==========
function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function getRanges() {
  switch (state.difficulty) {
    case 'easy':   return { add: [1,10], mul: [1,5] };
    case 'medium': return { add: [1,20], mul: [1,12] };
    case 'hard':   return { add: [1,99], mul: [2,15] };
  }
}

function generateProblem() {
  const r = getRanges();
  const op = state.ops[randInt(0, state.ops.length - 1)];
  let a, b, answer, display;

  if (op === '+') {
    a = randInt(r.add[0], r.add[1]);
    b = randInt(r.add[0], r.add[1]);
    answer = a + b;
    display = { a, op: '+', b };
  } else if (op === '-') {
    a = randInt(r.add[0], r.add[1]);
    b = randInt(r.add[0], a); // no negatives
    answer = a - b;
    display = { a, op: '−', b };
  } else if (op === '×') {
    a = randInt(r.mul[0], r.mul[1]);
    b = randInt(r.mul[0], r.mul[1]);
    answer = a * b;
    display = { a, op: '×', b };
  } else { // ÷
    b = randInt(r.mul[0], r.mul[1]);
    answer = randInt(r.mul[0], r.mul[1]);
    a = b * answer;
    display = { a, op: '÷', b };
  }
  return { display, answer };
}

function generateQuestions() {
  state.questions = Array.from({ length: state.questionCount }, generateProblem);
}

// ========== QUIZ FLOW ==========
function startQuiz() {
  generateQuestions();
  state.current = 0;
  state.score = 0;
  state.questionTimes = [];
  state.answers = [];
  state.numpadVal = '';
  showScreen('quiz');
  loadQuestion();
  updateScoreLive();
}

function replayQuiz() {
  startQuiz();
}

function loadQuestion() {
  clearTimer();
  const q = state.questions[state.current];
  const { a, op, b } = q.display;

  document.getElementById('q-current').textContent = state.current + 1;
  document.getElementById('q-total').textContent = state.questionCount;

  const pw = document.getElementById('problem-wrap');
  pw.innerHTML = `<div class="problem-expr"><span>${a}</span><span class="op">${op}</span><span>${b}</span><span class="op">=</span><span style="color:var(--muted)">?</span></div>`;
  pw.style.animation = 'none';
  pw.offsetHeight; // reflow
  pw.style.animation = '';

  document.getElementById('feedback-msg').textContent = '';
  document.getElementById('feedback-msg').className = 'feedback';

  // Update progress
  const pct = (state.current / state.questionCount) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `${state.current} / ${state.questionCount}`;

  if (state.inputMode === 'keyboard') {
    document.getElementById('answer-row-keyboard').style.display = 'flex';
    document.getElementById('answer-row-numpad').style.display = 'none';
    const inp = document.getElementById('answer-input');
    inp.value = '';
    inp.className = 'answer-input';
    setTimeout(() => inp.focus(), 50);
  } else {
    document.getElementById('answer-row-keyboard').style.display = 'none';
    document.getElementById('answer-row-numpad').style.display = 'block';
    state.numpadVal = '';
    renderNumpad();
    updateNumpadDisplay();
  }

  state.startTime = Date.now();
  startTimer();
}

function startTimer() {
  if (state.timeLimit === 0) {
    document.getElementById('timer-pill').style.display = 'none';
    document.getElementById('timer-bar').style.width = '100%';
    document.getElementById('timer-bar').style.background = 'var(--accent)';
    return;
  }
  document.getElementById('timer-pill').style.display = 'flex';
  state.timeLeft = state.timeLimit;
  updateTimerDisplay();

  state.timerInterval = setInterval(() => {
    state.timeLeft--;
    updateTimerDisplay();
    if (state.timeLeft <= 0) { timeUp(); }
  }, 1000);
}

function updateTimerDisplay() {
  const tl = state.timeLimit;
  const left = state.timeLeft;
  document.getElementById('timer-val').textContent = left;
  const pct = (left / tl) * 100;
  const bar = document.getElementById('timer-bar');
  bar.style.width = pct + '%';
  bar.className = 'timer-bar' + (pct < 30 ? ' warning' : '');
}

function clearTimer() {
  clearInterval(state.timerInterval);
  state.timerInterval = null;
}

function timeUp() {
  clearTimer();
  const elapsed = (Date.now() - state.startTime) / 1000;
  state.questionTimes.push(state.timeLimit || elapsed);
  state.answers.push({ q: state.questions[state.current], given: null, correct: false });
  showFeedback(false, state.questions[state.current].answer);
  setTimeout(nextQuestion, 900);
}

function submitAnswer() {
  clearTimer();
  const elapsed = (Date.now() - state.startTime) / 1000;

  let given;
  if (state.inputMode === 'keyboard') {
    given = parseInt(document.getElementById('answer-input').value, 10);
  } else {
    given = state.numpadVal === '' || state.numpadVal === '-' ? NaN : parseInt(state.numpadVal, 10);
  }

  const correct = !isNaN(given) && given === state.questions[state.current].answer;
  state.questionTimes.push(elapsed);

  if (correct) {
    state.score++;
    updateScoreLive();
  }
  state.answers.push({ q: state.questions[state.current], given, correct });

  showFeedback(correct, state.questions[state.current].answer, given);
  setTimeout(nextQuestion, 700);
}

function showFeedback(correct, answer, given) {
  const fb = document.getElementById('feedback-msg');
  if (correct) {
    fb.textContent = '✓ Correct!';
    fb.className = 'feedback correct';
  } else {
    fb.textContent = given == null ? `✗ Time's up! Answer: ${answer}` : `✗ Answer was ${answer}`;
    fb.className = 'feedback wrong';
    // shake
    const pw = document.getElementById('problem-wrap');
    pw.classList.remove('shake');
    pw.offsetHeight;
    pw.classList.add('shake');
  }

  if (state.inputMode === 'keyboard') {
    const inp = document.getElementById('answer-input');
    inp.classList.add(correct ? 'correct' : 'wrong');
  } else {
    const nd = document.getElementById('numpad-display');
    nd.classList.add(correct ? 'correct' : 'wrong');
  }
}

function nextQuestion() {
  state.current++;
  if (state.current >= state.questionCount) {
    endQuiz(false);
  } else {
    loadQuestion();
  }
}

function updateScoreLive() {
  document.getElementById('score-live').textContent = state.score;
}

function endQuiz(quit) {
  clearTimer();
  if (quit) {
    showScreen('home');
    return;
  }
  showResults();
}

// ========== RESULTS ==========
function showResults() {
  showScreen('results');

  const total = state.answers.length;
  const correct = state.score;
  const wrong = total - correct;
  const pct = total ? Math.round((correct / total) * 100) : 0;
  const avgTime = state.questionTimes.length
    ? (state.questionTimes.reduce((a,b)=>a+b,0) / state.questionTimes.length).toFixed(1)
    : 0;

  document.getElementById('result-pct').textContent = pct + '%';
  document.getElementById('res-correct').textContent = correct;
  document.getElementById('res-wrong').textContent = wrong;
  document.getElementById('res-time').textContent = avgTime + 's';

  // Grade
  const badge = document.getElementById('grade-badge');
  let grade, gc, bg;
  if (pct >= 95) { grade = 'S'; gc = '#fff'; bg = 'linear-gradient(135deg,#ffd700,#ff9f43)'; }
  else if (pct >= 85) { grade = 'A+'; gc = '#fff'; bg = 'linear-gradient(135deg,#6c63ff,#9b59ff)'; }
  else if (pct >= 75) { grade = 'A'; gc = '#fff'; bg = 'linear-gradient(135deg,#43e97b,#38f9d7)'; }
  else if (pct >= 60) { grade = 'B'; gc = '#0f1117'; bg = 'linear-gradient(135deg,#ffd166,#f4a261)'; }
  else if (pct >= 45) { grade = 'C'; gc = '#fff'; bg = 'linear-gradient(135deg,#a29bfe,#6c63ff)'; }
  else { grade = 'D'; gc = '#fff'; bg = 'linear-gradient(135deg,#ff4d6d,#c9184a)'; }
  badge.textContent = grade;
  badge.style.background = bg;
  badge.style.color = gc;

  // Ring animation
  const circ = 427.3;
  const fill = document.getElementById('ring-fill');
  fill.style.strokeDashoffset = circ;
  setTimeout(() => {
    fill.style.strokeDashoffset = circ - (pct / 100) * circ;
  }, 100);

  // History
  const list = document.getElementById('history-list');
  list.innerHTML = '';
  state.answers.forEach(({ q, given, correct }) => {
    const { a, op, b } = q.display;
    const row = document.createElement('div');
    row.className = 'history-row';
    row.innerHTML = `
      <span class="hr-expr">${a} ${op} ${b} = ${q.answer}</span>
      <span class="hr-answer">${given == null ? '—' : given}</span>
      <span class="${correct ? 'hr-correct' : 'hr-wrong'}">${correct ? '✓' : '✗'}</span>
    `;
    list.appendChild(row);
  });

  // Save best
  const key = `${state.difficulty}_${state.ops.sort().join('')}_${state.questionCount}`;
  if (!state.bestScores[key] || pct > state.bestScores[key].pct) {
    state.bestScores[key] = { pct, avg: avgTime, label: `${state.difficulty} | ${state.ops.join('')} | ${state.questionCount}Q` };
    localStorage.setItem('mpdBest', JSON.stringify(state.bestScores));
  }
  renderBestScores();
}

function renderBestScores() {
  const keys = Object.keys(state.bestScores);
  const card = document.getElementById('best-scores-card');
  const list = document.getElementById('best-scores-list');
  if (keys.length === 0) { card.style.display = 'none'; return; }
  card.style.display = 'block';
  list.innerHTML = '';
  keys.slice(-5).reverse().forEach(k => {
    const b = state.bestScores[k];
    const row = document.createElement('div');
    row.className = 'history-row';
    row.innerHTML = `<span style="font-size:0.8rem;color:var(--muted)">${b.label}</span><span style="font-weight:700;color:var(--accent)">${b.pct}%</span>`;
    list.appendChild(row);
  });
}

// ========== INPUT ==========
function handleKey(e) {
  if (e.key === 'Enter') submitAnswer();
}

function renderNumpad() {
  const pad = document.getElementById('numpad');
  pad.innerHTML = '';
  const keys = ['7','8','9','⌫','4','5','6','-','1','2','3','','0','','⌫','↵'];
  // simpler layout
  const layout = ['7','8','9','4','5','6','1','2','3','-','0','⌫'];
  layout.forEach(k => {
    const btn = document.createElement('button');
    btn.className = 'np-btn';
    btn.textContent = k;
    if (k === '⌫') btn.classList.add('np-clear');
    btn.ontouchstart = (e) => { e.preventDefault(); handleNumpad(k); };
    btn.onclick = () => handleNumpad(k);
    pad.appendChild(btn);
  });
  // Enter button spanning 4 cols
  const enter = document.createElement('button');
  enter.className = 'np-btn np-enter';
  enter.textContent = 'Enter ↵';
  enter.style.gridColumn = 'span 4';
  enter.ontouchstart = (e) => { e.preventDefault(); submitAnswer(); };
  enter.onclick = () => submitAnswer();
  pad.appendChild(enter);
}

function handleNumpad(k) {
  if (k === '⌫') {
    state.numpadVal = state.numpadVal.slice(0, -1);
  } else if (k === '-') {
    if (state.numpadVal === '') state.numpadVal = '-';
    else if (state.numpadVal === '-') state.numpadVal = '';
  } else {
    if (state.numpadVal.length < 6) state.numpadVal += k;
  }
  updateNumpadDisplay();
}

function updateNumpadDisplay() {
  const d = document.getElementById('numpad-display');
  d.textContent = state.numpadVal === '' ? '?' : state.numpadVal;
  d.className = 'answer-input';
}

// ========== NAVIGATION ==========
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  if (name === 'home') renderBestScores();
}

// ========== INIT ==========
renderBestScores();
renderNumpad();
</script>
</body>
</html>
