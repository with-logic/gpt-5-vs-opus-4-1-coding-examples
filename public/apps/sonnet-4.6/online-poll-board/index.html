<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Online Poll Board</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f4ff;
      --card: #ffffff;
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --accent: #ec4899;
      --success: #10b981;
      --text: #1e293b;
      --muted: #64748b;
      --border: #e2e8f0;
      --shadow: 0 4px 24px rgba(99,102,241,0.10);
      --radius: 18px;
    }

    body {
      background: var(--bg);
      background-image:
        radial-gradient(circle at 15% 20%, rgba(99,102,241,0.12) 0%, transparent 40%),
        radial-gradient(circle at 85% 75%, rgba(236,72,153,0.10) 0%, transparent 40%);
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: var(--text);
    }

    header {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 18px 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-inner {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo svg { width: 22px; height: 22px; fill: #fff; }

    .header-text h1 {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .header-text p {
      font-size: 0.78rem;
      color: var(--muted);
    }

    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    .section-title {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }

    .section-sub {
      color: var(--muted);
      font-size: 0.92rem;
      margin-bottom: 32px;
    }

    .polls-grid {
      display: grid;
      gap: 24px;
    }

    .poll-card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px 28px 22px;
      border: 1px solid var(--border);
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }

    .poll-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      border-radius: var(--radius) var(--radius) 0 0;
    }

    .poll-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 36px rgba(99,102,241,0.16);
    }

    .poll-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .poll-category {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      padding: 3px 10px;
      border-radius: 99px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #fff;
    }

    .poll-votes-badge {
      font-size: 0.75rem;
      color: var(--muted);
      margin-left: auto;
    }

    .poll-question {
      font-size: 1.15rem;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 20px;
      letter-spacing: -0.2px;
    }

    .options-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .option-btn {
      position: relative;
      width: 100%;
      background: none;
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      cursor: pointer;
      font-size: 0.93rem;
      font-family: inherit;
      color: var(--text);
      text-align: left;
      overflow: hidden;
      transition: border-color 0.2s, color 0.2s;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .option-btn .bar-fill {
      position: absolute;
      top: 0; left: 0; bottom: 0;
      border-radius: 10px;
      z-index: 0;
      width: 0%;
      transition: width 0.7s cubic-bezier(0.34,1.56,0.64,1), background 0.3s;
      background: rgba(99,102,241,0.1);
    }

    .option-btn .bar-fill.winner {
      background: rgba(16,185,129,0.15);
    }

    .option-btn .bar-fill.voted {
      background: rgba(99,102,241,0.15);
    }

    .option-btn .label-text {
      position: relative;
      z-index: 1;
      flex: 1;
    }

    .option-btn .pct-label {
      position: relative;
      z-index: 1;
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--primary);
      min-width: 36px;
      text-align: right;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .option-btn .vote-count {
      position: relative;
      z-index: 1;
      font-size: 0.75rem;
      color: var(--muted);
      min-width: 44px;
      text-align: right;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .option-btn .check-icon {
      position: relative;
      z-index: 1;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid var(--border);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, border-color 0.2s;
    }

    .option-btn:hover:not(:disabled) {
      border-color: var(--primary);
    }

    .option-btn:hover:not(:disabled) .check-icon {
      border-color: var(--primary);
    }

    /* After voting */
    .poll-card.voted .option-btn {
      cursor: default;
    }

    .poll-card.voted .pct-label,
    .poll-card.voted .vote-count {
      opacity: 1;
    }

    .poll-card.voted .option-btn.my-vote {
      border-color: var(--primary);
    }

    .poll-card.voted .option-btn.my-vote .check-icon {
      background: var(--primary);
      border-color: var(--primary);
    }

    .poll-card.voted .option-btn.winner-opt {
      border-color: var(--success);
    }

    .poll-card.voted .option-btn.winner-opt .pct-label {
      color: var(--success);
    }

    .vote-btn {
      margin-top: 18px;
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      letter-spacing: 0.2px;
    }

    .vote-btn:hover:not(:disabled) {
      opacity: 0.92;
      transform: scale(1.01);
    }

    .vote-btn:disabled {
      opacity: 0.5;
      cursor: default;
      transform: none;
    }

    .poll-footer {
      margin-top: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .total-votes {
      font-size: 0.8rem;
      color: var(--muted);
    }

    .voted-tag {
      display: none;
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--success);
      background: rgba(16,185,129,0.1);
      padding: 3px 10px;
      border-radius: 99px;
    }

    .poll-card.voted .voted-tag { display: inline-block; }

    /* Confetti burst */
    .confetti-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
    }

    /* Number counter animation */
    @keyframes pop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.35); }
      100% { transform: scale(1); }
    }

    .pop { animation: pop 0.4s ease; }

    /* Responsive */
    @media (max-width: 560px) {
      .poll-card { padding: 20px 16px 16px; }
      .poll-question { font-size: 1rem; }
    }
  </style>
</head>
<body>

<canvas class="confetti-layer" id="confettiCanvas"></canvas>

<header>
  <div class="header-inner">
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M3 3h18v2H3V3zm0 4h14v2H3V7zm0 4h18v2H3v-2zm0 4h10v2H3v-2z"/></svg>
    </div>
    <div class="header-text">
      <h1>Online Poll Board</h1>
      <p>Cast your vote — see results instantly</p>
    </div>
  </div>
</header>

<main>
  <div class="section-title">Today's Polls</div>
  <p class="section-sub">Pick your answer and see what everyone thinks.</p>
  <div class="polls-grid" id="pollsGrid"></div>
</main>

<script>
const POLLS = [
  {
    id: 1,
    category: "Technology",
    question: "Which programming language do you enjoy most?",
    options: [
      { text: "JavaScript / TypeScript", votes: 482 },
      { text: "Python", votes: 391 },
      { text: "Rust", votes: 178 },
      { text: "Go", votes: 134 },
    ]
  },
  {
    id: 2,
    category: "Lifestyle",
    question: "What's your preferred way to work remotely?",
    options: [
      { text: "From home — cozy setup", votes: 543 },
      { text: "Coffee shop vibes", votes: 212 },
      { text: "Co-working space", votes: 156 },
      { text: "Anywhere with WiFi", votes: 98 },
    ]
  },
  {
    id: 3,
    category: "Entertainment",
    question: "How do you mostly consume music?",
    options: [
      { text: "Spotify / Apple Music", votes: 720 },
      { text: "YouTube", votes: 310 },
      { text: "Vinyl & physical media", votes: 84 },
      { text: "Radio", votes: 61 },
    ]
  },
  {
    id: 4,
    category: "Food",
    question: "Pizza — which style wins?",
    options: [
      { text: "New York slice", votes: 374 },
      { text: "Neapolitan (woodfire)", votes: 441 },
      { text: "Chicago deep dish", votes: 198 },
      { text: "Detroit square", votes: 87 },
    ]
  },
  {
    id: 5,
    category: "AI",
    question: "What excites you most about AI?",
    options: [
      { text: "Productivity & automation", votes: 502 },
      { text: "Creative tools", votes: 388 },
      { text: "Scientific research", votes: 271 },
      { text: "I'm cautiously skeptical", votes: 140 },
    ]
  },
];

const state = {}; // pollId -> selectedOption index

function totalVotes(poll) {
  return poll.options.reduce((s, o) => s + o.votes, 0);
}

function winnerIdx(poll) {
  let max = -1, idx = 0;
  poll.options.forEach((o, i) => { if (o.votes > max) { max = o.votes; idx = i; } });
  return idx;
}

function buildPollCard(poll) {
  const card = document.createElement('div');
  card.className = 'poll-card';
  card.id = 'poll-' + poll.id;

  const total = totalVotes(poll);

  card.innerHTML = `
    <div class="poll-meta">
      <span class="poll-category">${poll.category}</span>
      <span class="poll-votes-badge" id="badge-${poll.id}">${total.toLocaleString()} votes</span>
    </div>
    <div class="poll-question">${poll.question}</div>
    <div class="options-list" id="opts-${poll.id}"></div>
    <button class="vote-btn" id="votebtn-${poll.id}" disabled>Select an option to vote</button>
    <div class="poll-footer">
      <span class="total-votes" id="total-${poll.id}">${total.toLocaleString()} total votes</span>
      <span class="voted-tag">✓ Voted!</span>
    </div>
  `;

  const optsList = card.querySelector(`#opts-${poll.id}`);

  poll.options.forEach((opt, idx) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.dataset.idx = idx;
    btn.innerHTML = `
      <span class="check-icon">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
          <path d="M2 5l2.5 2.5 3.5-4" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
      <span class="bar-fill"></span>
      <span class="label-text">${opt.text}</span>
      <span class="vote-count" id="vc-${poll.id}-${idx}">${opt.votes.toLocaleString()}</span>
      <span class="pct-label" id="pct-${poll.id}-${idx}">0%</span>
    `;
    btn.addEventListener('click', () => onOptionSelect(poll, card, idx));
    optsList.appendChild(btn);
  });

  const voteBtn = card.querySelector(`#votebtn-${poll.id}`);
  voteBtn.addEventListener('click', () => onVote(poll, card));

  return card;
}

function onOptionSelect(poll, card, idx) {
  if (card.classList.contains('voted')) return;
  state[poll.id] = idx;

  card.querySelectorAll('.option-btn').forEach((btn, i) => {
    btn.classList.toggle('selected', i === idx);
    const ci = btn.querySelector('.check-icon');
    if (i === idx) {
      ci.style.background = 'var(--primary)';
      ci.style.borderColor = 'var(--primary)';
    } else {
      ci.style.background = '';
      ci.style.borderColor = '';
    }
  });

  const voteBtn = card.querySelector(`#votebtn-${poll.id}`);
  voteBtn.disabled = false;
  voteBtn.textContent = 'Submit Vote';
}

function onVote(poll, card) {
  const idx = state[poll.id];
  if (idx === undefined) return;

  // Increment votes
  poll.options[idx].votes += 1;

  const total = totalVotes(poll);
  const winner = winnerIdx(poll);

  card.classList.add('voted');

  const optBtns = card.querySelectorAll('.option-btn');
  optBtns.forEach((btn, i) => {
    btn.disabled = true;
    if (i === idx) btn.classList.add('my-vote');
    if (i === winner) btn.classList.add('winner-opt');

    const pct = total > 0 ? Math.round((poll.options[i].votes / total) * 100) : 0;
    const fill = btn.querySelector('.bar-fill');
    fill.classList.toggle('winner', i === winner);
    fill.classList.toggle('voted', i === idx);

    // Animate bar
    requestAnimationFrame(() => {
      fill.style.width = pct + '%';
    });

    // Animate counter
    animateCount(card.querySelector(`#vc-${poll.id}-${i}`), 0, poll.options[i].votes);
    animateCount(card.querySelector(`#pct-${poll.id}-${i}`), 0, pct, '%');
  });

  // Update badges
  animateCount(card.querySelector(`#badge-${poll.id}`), 0, total, ' votes');
  animateCount(card.querySelector(`#total-${poll.id}`), 0, total, ' total votes');

  // Update vote btn
  const voteBtn = card.querySelector(`#votebtn-${poll.id}`);
  voteBtn.style.background = 'linear-gradient(135deg, #10b981, #34d399)';
  voteBtn.textContent = '✓ Vote Recorded!';
  voteBtn.disabled = true;

  // Confetti
  launchConfetti();
}

function animateCount(el, from, to, suffix = '') {
  if (!el) return;
  const duration = 700;
  const start = performance.now();
  const update = (now) => {
    const t = Math.min((now - start) / duration, 1);
    const ease = 1 - Math.pow(1 - t, 3);
    const val = Math.round(from + (to - from) * ease);
    el.textContent = val.toLocaleString() + suffix;
    el.classList.remove('pop');
    void el.offsetWidth;
    el.classList.add('pop');
    if (t < 1) requestAnimationFrame(update);
  };
  requestAnimationFrame(update);
}

// ---- Confetti ----
const canvas = document.getElementById('confettiCanvas');
const ctx = canvas.getContext('2d');
let particles = [];
let animId = null;

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function launchConfetti() {
  const colors = ['#6366f1','#ec4899','#10b981','#f59e0b','#3b82f6','#a78bfa'];
  for (let i = 0; i < 90; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: -10,
      r: Math.random() * 7 + 3,
      color: colors[Math.floor(Math.random() * colors.length)],
      vx: (Math.random() - 0.5) * 4,
      vy: Math.random() * 4 + 2,
      spin: Math.random() * 0.3 - 0.15,
      angle: Math.random() * Math.PI * 2,
      alpha: 1,
      life: Math.random() * 0.4 + 0.8,
    });
  }
  if (!animId) renderConfetti();
}

function renderConfetti() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles = particles.filter(p => p.alpha > 0.05);
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.12;
    p.angle += p.spin;
    p.alpha -= 0.012 / p.life;
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.alpha);
    ctx.translate(p.x, p.y);
    ctx.rotate(p.angle);
    ctx.fillStyle = p.color;
    ctx.fillRect(-p.r / 2, -p.r / 2, p.r, p.r * 0.5);
    ctx.restore();
  });
  if (particles.length > 0) {
    animId = requestAnimationFrame(renderConfetti);
  } else {
    animId = null;
  }
}

// ---- Init ----
const grid = document.getElementById('pollsGrid');
POLLS.forEach(poll => grid.appendChild(buildPollCard(poll)));
</script>
</body>
</html>
