<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloud Painter for Kids ☁️</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', 'Comic Sans MS', cursive, sans-serif;
    background: linear-gradient(180deg, #87CEEB 0%, #B0E0FF 60%, #E0F4FF 100%);
    min-height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* TOP BAR */
  #topbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 14px;
    background: rgba(255,255,255,0.55);
    backdrop-filter: blur(8px);
    border-bottom: 2px solid rgba(255,255,255,0.8);
    flex-wrap: wrap;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(135,206,235,0.4);
  }

  #title {
    font-size: 1.5rem;
    font-weight: 900;
    color: #4A90D9;
    text-shadow: 1px 1px 0 #fff, 2px 2px 0 rgba(135,206,235,0.5);
    letter-spacing: 1px;
    white-space: nowrap;
  }

  .section-label {
    font-size: 0.65rem;
    font-weight: 700;
    color: #7BB8E0;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 2px;
  }

  .tool-group {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 2px;
  }

  .btn-row {
    display: flex;
    gap: 5px;
    align-items: center;
  }

  .brush-btn {
    width: 44px;
    height: 44px;
    border-radius: 14px;
    border: 3px solid transparent;
    background: rgba(255,255,255,0.7);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.3rem;
    transition: all 0.18s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
  .brush-btn:hover { transform: scale(1.12); background: rgba(255,255,255,0.9); }
  .brush-btn.active {
    border-color: #4A90D9;
    background: rgba(74,144,217,0.18);
    box-shadow: 0 0 0 3px rgba(74,144,217,0.25);
    transform: scale(1.08);
  }

  .action-btn {
    padding: 8px 14px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 700;
    transition: all 0.18s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    white-space: nowrap;
  }
  .action-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 14px rgba(0,0,0,0.15); }
  .action-btn:active { transform: translateY(0); }

  .btn-clear { background: linear-gradient(135deg, #FFB3BA, #FF8A95); color: white; }
  .btn-save  { background: linear-gradient(135deg, #B5EAD7, #5CC9A0); color: white; }
  .btn-plane { background: linear-gradient(135deg, #FFDAC1, #FFB085); color: white; }
  .btn-undo  { background: linear-gradient(135deg, #C7CEEA, #9FA8DA); color: white; }

  /* SIZE SLIDER */
  .size-group {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  #brushSize {
    -webkit-appearance: none;
    width: 100px;
    height: 8px;
    border-radius: 4px;
    background: linear-gradient(90deg, #87CEEB, #4A90D9);
    outline: none;
    cursor: pointer;
  }
  #brushSize::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: white;
    border: 3px solid #4A90D9;
    cursor: pointer;
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }

  /* OPACITY SLIDER */
  #opacitySlider {
    -webkit-appearance: none;
    width: 90px;
    height: 8px;
    border-radius: 4px;
    background: linear-gradient(90deg, rgba(74,144,217,0.1), rgba(74,144,217,1));
    outline: none;
    cursor: pointer;
  }
  #opacitySlider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: white;
    border: 3px solid #4A90D9;
    cursor: pointer;
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }

  /* COLOR SWATCHES */
  .color-swatch {
    width: 30px; height: 30px;
    border-radius: 50%;
    border: 3px solid transparent;
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  }
  .color-swatch:hover { transform: scale(1.2); }
  .color-swatch.active {
    border-color: #333;
    transform: scale(1.15);
    box-shadow: 0 0 0 2px white, 0 0 0 4px #4A90D9;
  }

  /* CANVAS AREA */
  #canvas-wrap {
    position: relative;
    flex: 1;
    overflow: hidden;
  }

  #bgCanvas, #mainCanvas, #planeCanvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }

  #bgCanvas { z-index: 0; }
  #mainCanvas { z-index: 1; cursor: none; }
  #planeCanvas { z-index: 2; pointer-events: none; }

  /* CUSTOM CURSOR */
  #cursor-preview {
    position: absolute;
    pointer-events: none;
    z-index: 50;
    transform: translate(-50%, -50%);
    border: 2px dashed rgba(74,144,217,0.7);
    border-radius: 50%;
    transition: width 0.1s, height 0.1s;
  }

  /* FUN HINTS */
  #hint {
    position: absolute;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,255,255,0.8);
    backdrop-filter: blur(6px);
    border-radius: 20px;
    padding: 6px 18px;
    font-size: 0.85rem;
    color: #4A90D9;
    font-weight: 600;
    pointer-events: none;
    z-index: 200;
    box-shadow: 0 2px 10px rgba(135,206,235,0.4);
    transition: opacity 0.5s;
  }

  /* CLOUD DRIFT PARTICLES */
  .drifting-cloud {
    position: absolute;
    pointer-events: none;
    opacity: 0.15;
    z-index: 0;
    animation: drift linear infinite;
  }
  @keyframes drift {
    from { transform: translateX(-200px); }
    to   { transform: translateX(calc(100vw + 200px)); }
  }

  /* SPARKLE */
  .sparkle {
    position: absolute;
    pointer-events: none;
    z-index: 100;
    font-size: 1.2rem;
    animation: sparkleAnim 0.7s ease-out forwards;
  }
  @keyframes sparkleAnim {
    0%   { opacity: 1; transform: scale(0.5) translate(0,0); }
    60%  { opacity: 0.8; transform: scale(1.4) translate(var(--dx), var(--dy)); }
    100% { opacity: 0; transform: scale(0.3) translate(calc(var(--dx)*1.8), calc(var(--dy)*2)); }
  }

  /* WELCOME */
  #welcome {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: none;
    z-index: 10;
    transition: opacity 1s;
  }
  #welcome h2 {
    font-size: 2.5rem;
    color: rgba(74,144,217,0.5);
    font-weight: 900;
    text-shadow: 2px 2px 0 rgba(255,255,255,0.8);
  }
  #welcome p {
    font-size: 1.1rem;
    color: rgba(74,144,217,0.4);
    margin-top: 8px;
  }

  .separator {
    width: 1px;
    height: 44px;
    background: rgba(74,144,217,0.2);
    margin: 0 4px;
  }
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div id="title">☁️ Cloud Painter</div>
    <div class="separator"></div>

    <!-- Brush Shapes -->
    <div class="tool-group">
      <div class="section-label">Brush</div>
      <div class="btn-row" id="brushBtns">
        <button class="brush-btn active" data-brush="cloud" title="Cloud brush">☁️</button>
        <button class="brush-btn" data-brush="fluffy" title="Fluffy brush">🌤️</button>
        <button class="brush-btn" data-brush="round" title="Round brush">⚪</button>
        <button class="brush-btn" data-brush="storm" title="Storm cloud">⛅</button>
        <button class="brush-btn" data-brush="stars" title="Sparkle brush">✨</button>
        <button class="brush-btn" data-brush="rainbow" title="Rainbow brush">🌈</button>
      </div>
    </div>

    <div class="separator"></div>

    <!-- Size -->
    <div class="tool-group size-group">
      <div class="section-label">Size: <span id="sizeVal">40</span></div>
      <input type="range" id="brushSize" min="10" max="120" value="40">
    </div>

    <div class="separator"></div>

    <!-- Opacity -->
    <div class="tool-group size-group">
      <div class="section-label">Puffiness</div>
      <input type="range" id="opacitySlider" min="20" max="100" value="75">
    </div>

    <div class="separator"></div>

    <!-- Colors -->
    <div class="tool-group">
      <div class="section-label">Color</div>
      <div class="btn-row" id="colorSwatches"></div>
    </div>

    <div class="separator"></div>

    <!-- Actions -->
    <div class="tool-group">
      <div class="section-label">Actions</div>
      <div class="btn-row">
        <button class="action-btn btn-plane" id="btnPlane">✈️ Add Plane</button>
        <button class="action-btn btn-undo" id="btnUndo">↩️ Undo</button>
        <button class="action-btn btn-clear" id="btnClear">🗑️ Clear</button>
        <button class="action-btn btn-save" id="btnSave">💾 Save</button>
      </div>
    </div>
  </div>

  <div id="canvas-wrap">
    <canvas id="bgCanvas"></canvas>
    <canvas id="mainCanvas"></canvas>
    <canvas id="planeCanvas"></canvas>
    <div id="cursor-preview"></div>
    <div id="welcome">
      <h2>Paint your sky! ☁️</h2>
      <p>Click and drag to draw fluffy clouds</p>
    </div>
    <div id="hint">✨ Draw clouds and watch them drift!</div>
  </div>
</div>

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
const state = {
  brush: 'cloud',
  size: 40,
  opacity: 0.75,
  color: '#FFFFFF',
  drawing: false,
  lastX: 0, lastY: 0,
  undoStack: [],
  maxUndo: 20,
  planes: [],
  animFrame: null,
  driftClouds: [],
  hasDrawn: false,
};

const COLORS = [
  '#FFFFFF',  // pure white
  '#E8F4FD',  // ice blue-white
  '#F5E6FF',  // lavender cloud
  '#FFE4E1',  // blush pink
  '#E0FFE8',  // mint cloud
  '#FFFACD',  // lemon yellow
  '#FFD700',  // golden sun
  '#87CEEB',  // sky blue
  '#4A90D9',  // deep sky
  '#C8B4E3',  // purple cloud
  '#FF9AA2',  // salmon cloud
  '#B5EAD7',  // seafoam
];

// ─── CANVAS SETUP ────────────────────────────────────────────────────────────
const bgCanvas = document.getElementById('bgCanvas');
const mainCanvas = document.getElementById('mainCanvas');
const planeCanvas = document.getElementById('planeCanvas');
const bgCtx = bgCanvas.getContext('2d');
const ctx = mainCanvas.getContext('2d');
const planeCtx = planeCanvas.getContext('2d');
const wrap = document.getElementById('canvas-wrap');

function resizeCanvases() {
  const w = wrap.clientWidth, h = wrap.clientHeight;
  [bgCanvas, mainCanvas, planeCanvas].forEach(c => {
    const saved = ctx.getImageData ? null : null;
    c.width = w; c.height = h;
  });
  drawBackground();
  redrawFromStack();
}

function drawBackground() {
  const w = bgCanvas.width, h = bgCanvas.height;
  const grad = bgCtx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, '#5BC0F8');
  grad.addColorStop(0.4, '#87CEEB');
  grad.addColorStop(0.8, '#B8E3FF');
  grad.addColorStop(1, '#D4EFFF');
  bgCtx.fillStyle = grad;
  bgCtx.fillRect(0, 0, w, h);

  // Sun
  const sunGrad = bgCtx.createRadialGradient(w * 0.85, h * 0.12, 0, w * 0.85, h * 0.12, 80);
  sunGrad.addColorStop(0, 'rgba(255,230,80,0.95)');
  sunGrad.addColorStop(0.4, 'rgba(255,200,50,0.7)');
  sunGrad.addColorStop(0.7, 'rgba(255,180,30,0.3)');
  sunGrad.addColorStop(1, 'rgba(255,165,0,0)');
  bgCtx.fillStyle = sunGrad;
  bgCtx.beginPath();
  bgCtx.arc(w * 0.85, h * 0.12, 80, 0, Math.PI * 2);
  bgCtx.fill();

  // Sun rays
  bgCtx.save();
  bgCtx.translate(w * 0.85, h * 0.12);
  bgCtx.strokeStyle = 'rgba(255,220,50,0.25)';
  bgCtx.lineWidth = 3;
  for (let i = 0; i < 12; i++) {
    const angle = (i / 12) * Math.PI * 2;
    bgCtx.beginPath();
    bgCtx.moveTo(Math.cos(angle) * 55, Math.sin(angle) * 55);
    bgCtx.lineTo(Math.cos(angle) * 95, Math.sin(angle) * 95);
    bgCtx.stroke();
  }
  bgCtx.restore();

  // Horizon haze
  const hazeGrad = bgCtx.createLinearGradient(0, h * 0.75, 0, h);
  hazeGrad.addColorStop(0, 'rgba(255,255,255,0)');
  hazeGrad.addColorStop(1, 'rgba(255,255,255,0.3)');
  bgCtx.fillStyle = hazeGrad;
  bgCtx.fillRect(0, h * 0.75, w, h * 0.25);
}

// ─── UNDO STACK ──────────────────────────────────────────────────────────────
function saveUndo() {
  const imageData = ctx.getImageData(0, 0, mainCanvas.width, mainCanvas.height);
  state.undoStack.push(imageData);
  if (state.undoStack.length > state.maxUndo) state.undoStack.shift();
}

function undo() {
  if (state.undoStack.length === 0) return;
  const imageData = state.undoStack.pop();
  ctx.putImageData(imageData, 0, 0);
}

function redrawFromStack() {
  if (state.undoStack.length > 0) {
    const last = state.undoStack[state.undoStack.length - 1];
    ctx.putImageData(last, 0, 0);
  }
}

// ─── COLOR SWATCHES ──────────────────────────────────────────────────────────
const swatchContainer = document.getElementById('colorSwatches');
COLORS.forEach((color, i) => {
  const sw = document.createElement('div');
  sw.className = 'color-swatch' + (i === 0 ? ' active' : '');
  sw.style.background = color;
  sw.style.border = color === '#FFFFFF' ? '3px solid #87CEEB' : '3px solid transparent';
  sw.title = color;
  sw.addEventListener('click', () => {
    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
    sw.classList.add('active');
    state.color = color;
  });
  swatchContainer.appendChild(sw);
});

// ─── BRUSH BUTTONS ───────────────────────────────────────────────────────────
document.getElementById('brushBtns').addEventListener('click', e => {
  const btn = e.target.closest('.brush-btn');
  if (!btn) return;
  document.querySelectorAll('.brush-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  state.brush = btn.dataset.brush;
  updateHint();
});

// ─── SIZE / OPACITY ──────────────────────────────────────────────────────────
const brushSizeInput = document.getElementById('brushSize');
const sizeVal = document.getElementById('sizeVal');
brushSizeInput.addEventListener('input', () => {
  state.size = parseInt(brushSizeInput.value);
  sizeVal.textContent = state.size;
  updateCursorPreview();
});

const opacityInput = document.getElementById('opacitySlider');
opacityInput.addEventListener('input', () => {
  state.opacity = parseInt(opacityInput.value) / 100;
});

// ─── CURSOR PREVIEW ──────────────────────────────────────────────────────────
const cursorPreview = document.getElementById('cursor-preview');
function updateCursorPreview(x, y) {
  const d = state.size * 2;
  cursorPreview.style.width = d + 'px';
  cursorPreview.style.height = d + 'px';
  if (x !== undefined) {
    cursorPreview.style.left = x + 'px';
    cursorPreview.style.top = y + 'px';
  }
}
updateCursorPreview(0, 0);

// ─── CLOUD DRAWING FUNCTIONS ──────────────────────────────────────────────────
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}

function drawCloud(cx, cy, size, color, opacity, brush) {
  ctx.save();
  ctx.globalAlpha = opacity;

  const rgb = hexToRgb(color);
  const colorStr = `rgb(${rgb.r},${rgb.g},${rgb.b})`;

  if (brush === 'round') {
    // Simple round soft brush
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, size);
    grad.addColorStop(0, colorStr);
    grad.addColorStop(0.6, `rgba(${rgb.r},${rgb.g},${rgb.b},0.7)`);
    grad.addColorStop(1, `rgba(${rgb.r},${rgb.g},${rgb.b},0)`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(cx, cy, size, 0, Math.PI * 2);
    ctx.fill();

  } else if (brush === 'cloud' || brush === 'fluffy' || brush === 'storm') {
    // Multi-lobe cloud shape
    const numLobes = brush === 'fluffy' ? 6 : brush === 'storm' ? 4 : 5;
    const lobePositions = [];

    if (brush === 'cloud' || brush === 'fluffy') {
      // Puffy cumulus arrangement
      lobePositions.push({x: cx, y: cy, r: size * 0.75});
      lobePositions.push({x: cx - size * 0.55, y: cy + size * 0.2, r: size * 0.55});
      lobePositions.push({x: cx + size * 0.55, y: cy + size * 0.2, r: size * 0.55});
      lobePositions.push({x: cx - size * 0.3, y: cy - size * 0.3, r: size * 0.55});
      lobePositions.push({x: cx + size * 0.3, y: cy - size * 0.3, r: size * 0.55});
      if (brush === 'fluffy') {
        lobePositions.push({x: cx, y: cy - size * 0.5, r: size * 0.5});
        lobePositions.push({x: cx - size * 0.8, y: cy + size * 0.35, r: size * 0.4});
        lobePositions.push({x: cx + size * 0.8, y: cy + size * 0.35, r: size * 0.4});
      }
    } else {
      // Storm - darker, flatter
      lobePositions.push({x: cx, y: cy, r: size * 0.8});
      lobePositions.push({x: cx - size * 0.6, y: cy + size * 0.1, r: size * 0.65});
      lobePositions.push({x: cx + size * 0.6, y: cy + size * 0.1, r: size * 0.65});
      lobePositions.push({x: cx - size * 0.2, y: cy - size * 0.25, r: size * 0.5});
      lobePositions.push({x: cx + size * 0.2, y: cy - size * 0.25, r: size * 0.5});
    }

    lobePositions.forEach(lobe => {
      const grad = ctx.createRadialGradient(lobe.x, lobe.y - lobe.r * 0.1, 0, lobe.x, lobe.y, lobe.r);
      if (brush === 'storm') {
        grad.addColorStop(0, `rgba(${rgb.r},${rgb.g},${rgb.b},0.95)`);
        grad.addColorStop(0.5, `rgba(${rgb.r},${rgb.g},${rgb.b},0.7)`);
        grad.addColorStop(1, `rgba(${rgb.r},${rgb.g},${rgb.b},0)`);
      } else {
        grad.addColorStop(0, `rgba(255,255,255,0.95)`);
        grad.addColorStop(0.3, colorStr);
        grad.addColorStop(0.7, `rgba(${rgb.r},${rgb.g},${rgb.b},0.7)`);
        grad.addColorStop(1, `rgba(${rgb.r},${rgb.g},${rgb.b},0)`);
      }
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(lobe.x, lobe.y, lobe.r, 0, Math.PI * 2);
      ctx.fill();
    });

  } else if (brush === 'stars') {
    // Scatter sparkle stars
    for (let i = 0; i < 8; i++) {
      const angle = Math.random() * Math.PI * 2;
      const dist = Math.random() * size;
      const sx = cx + Math.cos(angle) * dist;
      const sy = cy + Math.sin(angle) * dist;
      const sr = size * 0.15 + Math.random() * size * 0.2;
      drawStar(ctx, sx, sy, sr, colorStr, rgb, opacity * 0.9);
    }

  } else if (brush === 'rainbow') {
    // Rainbow arc brush
    const rainbowColors = [
      [255,80,80], [255,160,0], [255,230,0],
      [100,220,80], [80,160,255], [160,80,255]
    ];
    const startAngle = -Math.PI * 0.8;
    const endAngle = Math.PI * -0.2;
    rainbowColors.forEach((c, i) => {
      const r2 = size * (1.0 - i * 0.15);
      ctx.beginPath();
      ctx.arc(cx, cy + size * 0.2, r2, startAngle, endAngle);
      ctx.strokeStyle = `rgba(${c[0]},${c[1]},${c[2]},0.8)`;
      ctx.lineWidth = size * 0.15;
      ctx.stroke();
    });
  }

  ctx.restore();
}

function drawStar(ctx2, x, y, r, colorStr, rgb, opacity) {
  ctx2.save();
  ctx2.globalAlpha = opacity;
  const grad = ctx2.createRadialGradient(x, y, 0, x, y, r);
  grad.addColorStop(0, 'rgba(255,255,255,1)');
  grad.addColorStop(0.3, colorStr);
  grad.addColorStop(1, `rgba(${rgb.r},${rgb.g},${rgb.b},0)`);
  ctx2.fillStyle = grad;
  ctx2.beginPath();
  ctx2.arc(x, y, r, 0, Math.PI * 2);
  ctx2.fill();

  // Cross sparkle
  ctx2.strokeStyle = 'rgba(255,255,255,0.8)';
  ctx2.lineWidth = 2;
  ctx2.beginPath();
  ctx2.moveTo(x, y - r * 1.3);
  ctx2.lineTo(x, y + r * 1.3);
  ctx2.moveTo(x - r * 1.3, y);
  ctx2.lineTo(x + r * 1.3, y);
  ctx2.stroke();
  ctx2.restore();
}

// ─── DRAWING EVENTS ──────────────────────────────────────────────────────────
function getPos(e) {
  const rect = mainCanvas.getBoundingClientRect();
  const scaleX = mainCanvas.width / rect.width;
  const scaleY = mainCanvas.height / rect.height;
  if (e.touches) {
    return {
      x: (e.touches[0].clientX - rect.left) * scaleX,
      y: (e.touches[0].clientY - rect.top) * scaleY
    };
  }
  return {
    x: (e.clientX - rect.left) * scaleX,
    y: (e.clientY - rect.top) * scaleY
  };
}

let strokePoints = [];

mainCanvas.addEventListener('mousedown', e => startDraw(e));
mainCanvas.addEventListener('mousemove', e => {
  const pos = getPos(e);
  updateCursorPreview(pos.x, pos.y);
  if (state.drawing) continueDraw(e);
});
mainCanvas.addEventListener('mouseup', e => endDraw(e));
mainCanvas.addEventListener('mouseleave', e => {
  if (state.drawing) endDraw(e);
  cursorPreview.style.opacity = '0';
});
mainCanvas.addEventListener('mouseenter', () => cursorPreview.style.opacity = '1');
mainCanvas.addEventListener('touchstart', e => { e.preventDefault(); startDraw(e); }, {passive: false});
mainCanvas.addEventListener('touchmove', e => { e.preventDefault(); continueDraw(e); }, {passive: false});
mainCanvas.addEventListener('touchend', e => { e.preventDefault(); endDraw(e); }, {passive: false});

function startDraw(e) {
  saveUndo();
  strokePoints = [];
  state.drawing = true;
  const pos = getPos(e);
  state.lastX = pos.x;
  state.lastY = pos.y;
  drawCloud(pos.x, pos.y, state.size, state.color, state.opacity, state.brush);
  strokePoints.push(pos);
  hideWelcome();
}

function continueDraw(e) {
  if (!state.drawing) return;
  const pos = getPos(e);
  const dx = pos.x - state.lastX;
  const dy = pos.y - state.lastY;
  const dist = Math.sqrt(dx*dx + dy*dy);
  const spacing = Math.max(state.size * 0.35, 8);

  if (dist >= spacing) {
    const steps = Math.ceil(dist / spacing);
    for (let i = 1; i <= steps; i++) {
      const t = i / steps;
      const px = state.lastX + dx * t;
      const py = state.lastY + dy * t;
      drawCloud(px, py, state.size, state.color, state.opacity * 0.8, state.brush);
    }
    state.lastX = pos.x;
    state.lastY = pos.y;
    strokePoints.push(pos);
  }
}

function endDraw(e) {
  state.drawing = false;
  // Spawn sparkle effect at last position
  if (strokePoints.length > 0) {
    const last = strokePoints[strokePoints.length - 1];
    spawnSparkle(last.x, last.y);
    state.hasDrawn = true;
  }
}

// ─── SPARKLE FX ──────────────────────────────────────────────────────────────
function spawnSparkle(x, y) {
  const sparkles = ['✨', '⭐', '💫', '🌟', '✦'];
  const count = 3 + Math.floor(Math.random() * 3);
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'sparkle';
    el.textContent = sparkles[Math.floor(Math.random() * sparkles.length)];
    const dx = (Math.random() - 0.5) * 60;
    const dy = -(20 + Math.random() * 50);
    el.style.setProperty('--dx', dx + 'px');
    el.style.setProperty('--dy', dy + 'px');
    el.style.left = (x - 12 + (Math.random()-0.5)*30) + 'px';
    el.style.top  = (y - 12) + 'px';
    wrap.appendChild(el);
    setTimeout(() => el.remove(), 750);
  }
}

// ─── PLANES ──────────────────────────────────────────────────────────────────
const PLANE_EMOJIS = ['✈️', '🛩️', '🚀', '🛸', '🎈'];

function addPlane() {
  const h = planeCanvas.height;
  const emoji = PLANE_EMOJIS[Math.floor(Math.random() * PLANE_EMOJIS.length)];
  const goRight = Math.random() > 0.5;
  const speed = 60 + Math.random() * 80;
  const y = 50 + Math.random() * (h * 0.6);
  const size = 28 + Math.random() * 24;
  const bobAmp = 5 + Math.random() * 10;
  const bobSpeed = 0.5 + Math.random() * 1;
  const trail = [];

  state.planes.push({
    emoji, speed, y, size, bobAmp, bobSpeed,
    x: goRight ? -80 : planeCanvas.width + 80,
    dir: goRight ? 1 : -1,
    t: Math.random() * Math.PI * 2,
    trail,
    opacity: 0,
    // contrail color
    contrailColor: `hsl(${200 + Math.random()*40},80%,${90 + Math.random()*10}%)`
  });
}

function updatePlanes(dt) {
  const w = planeCanvas.width, h = planeCanvas.height;
  planeCtx.clearRect(0, 0, w, h);

  state.planes = state.planes.filter(p => {
    p.t += dt * p.bobSpeed;
    p.x += p.speed * p.dir * dt;
    p.opacity = Math.min(1, p.opacity + dt * 2);

    const py = p.y + Math.sin(p.t) * p.bobAmp;

    // Contrail
    p.trail.push({x: p.x - p.dir * 30, y: py});
    if (p.trail.length > 60) p.trail.shift();

    if (p.trail.length > 2) {
      for (let i = 1; i < p.trail.length; i++) {
        const alpha = (i / p.trail.length) * 0.4 * p.opacity;
        planeCtx.beginPath();
        planeCtx.moveTo(p.trail[i-1].x, p.trail[i-1].y);
        planeCtx.lineTo(p.trail[i].x, p.trail[i].y);
        planeCtx.strokeStyle = `rgba(255,255,255,${alpha})`;
        planeCtx.lineWidth = 3 * (i / p.trail.length);
        planeCtx.stroke();
      }
    }

    // Draw emoji
    planeCtx.save();
    planeCtx.globalAlpha = p.opacity;
    planeCtx.font = `${p.size}px serif`;
    planeCtx.textAlign = 'center';
    planeCtx.textBaseline = 'middle';
    if (p.dir < 0) {
      planeCtx.translate(p.x, py);
      planeCtx.scale(-1, 1);
      planeCtx.fillText(p.emoji, 0, 0);
    } else {
      planeCtx.fillText(p.emoji, p.x, py);
    }
    planeCtx.restore();

    // Remove if out of bounds
    return (p.dir > 0 ? p.x < w + 150 : p.x > -150);
  });
}

// ─── DRIFTING BACKGROUND CLOUDS ──────────────────────────────────────────────
function initDriftClouds() {
  // These are CSS animated clouds for ambiance
  const cloudShapes = ['☁', '⛅'];
  for (let i = 0; i < 5; i++) {
    const el = document.createElement('div');
    el.className = 'drifting-cloud';
    el.textContent = cloudShapes[i % 2];
    el.style.fontSize = (40 + Math.random() * 60) + 'px';
    el.style.top = (5 + Math.random() * 70) + '%';
    el.style.left = '-200px';
    const duration = 30 + Math.random() * 40;
    const delay = -Math.random() * duration;
    el.style.animationDuration = duration + 's';
    el.style.animationDelay = delay + 's';
    wrap.appendChild(el);
  }
}

// ─── ANIMATION LOOP ──────────────────────────────────────────────────────────
let lastTime = 0;
function animate(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.1);
  lastTime = ts;
  updatePlanes(dt);
  state.animFrame = requestAnimationFrame(animate);
}

// ─── WELCOME HIDE ────────────────────────────────────────────────────────────
const welcomeEl = document.getElementById('welcome');
function hideWelcome() {
  welcomeEl.style.opacity = '0';
  setTimeout(() => welcomeEl.style.display = 'none', 1000);
}

// ─── HINT MESSAGES ───────────────────────────────────────────────────────────
const hintEl = document.getElementById('hint');
const HINTS = [
  '✨ Draw clouds and watch them drift!',
  '☁️ Try different brush shapes!',
  '🌈 Use the rainbow brush for magic!',
  '✈️ Add a plane to fly through!',
  '⭐ Stars brush makes sparkly clouds!',
  '💾 Save your masterpiece!',
  '🎨 Mix colors for sunset clouds!',
];
let hintIdx = 0;
function updateHint() {
  hintEl.style.opacity = '0';
  setTimeout(() => {
    hintEl.textContent = HINTS[hintIdx % HINTS.length];
    hintEl.style.opacity = '1';
    hintIdx++;
  }, 500);
}
setInterval(updateHint, 6000);

// ─── ACTIONS ─────────────────────────────────────────────────────────────────
document.getElementById('btnPlane').addEventListener('click', () => {
  addPlane();
  spawnSparkle(
    60 + Math.random() * (wrap.clientWidth - 120),
    60 + Math.random() * (wrap.clientHeight - 120)
  );
});

document.getElementById('btnUndo').addEventListener('click', undo);

document.getElementById('btnClear').addEventListener('click', () => {
  if (confirm('Clear your sky? ☁️')) {
    saveUndo();
    ctx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
    state.planes = [];
    welcomeEl.style.display = '';
    welcomeEl.style.opacity = '1';
    state.hasDrawn = false;
  }
});

document.getElementById('btnSave').addEventListener('click', () => {
  // Composite all layers
  const offscreen = document.createElement('canvas');
  offscreen.width = mainCanvas.width;
  offscreen.height = mainCanvas.height;
  const offCtx = offscreen.getContext('2d');

  offCtx.drawImage(bgCanvas, 0, 0);
  offCtx.drawImage(mainCanvas, 0, 0);
  offCtx.drawImage(planeCanvas, 0, 0);

  // Watermark
  offCtx.save();
  offCtx.globalAlpha = 0.4;
  offCtx.font = '16px serif';
  offCtx.fillStyle = '#fff';
  offCtx.textAlign = 'right';
  offCtx.fillText('☁️ Cloud Painter', offscreen.width - 12, offscreen.height - 12);
  offCtx.restore();

  const link = document.createElement('a');
  link.download = 'my-sky-painting.png';
  link.href = offscreen.toDataURL('image/png');
  link.click();
});

// ─── KEYBOARD SHORTCUTS ──────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'z' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); undo(); }
  if (e.key === 'p') addPlane();
  if (e.key === '+' || e.key === '=') {
    brushSizeInput.value = Math.min(120, state.size + 5);
    state.size = parseInt(brushSizeInput.value);
    sizeVal.textContent = state.size;
    updateCursorPreview();
  }
  if (e.key === '-') {
    brushSizeInput.value = Math.max(10, state.size - 5);
    state.size = parseInt(brushSizeInput.value);
    sizeVal.textContent = state.size;
    updateCursorPreview();
  }
});

// ─── INIT ────────────────────────────────────────────────────────────────────
window.addEventListener('resize', resizeCanvases);
resizeCanvases();
initDriftClouds();
requestAnimationFrame(ts => { lastTime = ts; animate(ts); });

// Auto-add some initial planes for life
setTimeout(() => addPlane(), 1500);
setTimeout(() => addPlane(), 5000);

</script>
</body>
</html>
