<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Typing Rain</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Courier New', monospace;
    background: #0a0a1a;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    user-select: none;
  }

  #gameCanvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }

  #ui {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }

  #hud {
    position: absolute;
    top: 20px; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 0 30px;
    pointer-events: none;
  }

  .hud-box {
    background: rgba(0, 20, 40, 0.75);
    border: 1px solid rgba(0, 200, 255, 0.3);
    border-radius: 8px;
    padding: 10px 18px;
    min-width: 120px;
    text-align: center;
    backdrop-filter: blur(4px);
    box-shadow: 0 0 15px rgba(0, 150, 255, 0.1);
  }

  .hud-label {
    font-size: 10px;
    color: rgba(0, 200, 255, 0.6);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 4px;
  }

  .hud-value {
    font-size: 22px;
    font-weight: bold;
    color: #00d4ff;
    text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
  }

  #level-display .hud-value { color: #ffd700; text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
  #lives-display .hud-value { color: #ff4466; text-shadow: 0 0 10px rgba(255, 68, 102, 0.5); }

  #input-area {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    width: 420px;
    max-width: 90vw;
    pointer-events: all;
  }

  #word-input {
    width: 100%;
    padding: 14px 22px;
    font-family: 'Courier New', monospace;
    font-size: 20px;
    font-weight: bold;
    background: rgba(0, 10, 30, 0.85);
    border: 2px solid rgba(0, 200, 255, 0.4);
    border-radius: 10px;
    color: #00d4ff;
    outline: none;
    text-align: center;
    letter-spacing: 2px;
    backdrop-filter: blur(8px);
    box-shadow: 0 0 20px rgba(0, 150, 255, 0.15), inset 0 0 15px rgba(0, 100, 200, 0.1);
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  #word-input:focus {
    border-color: rgba(0, 200, 255, 0.8);
    box-shadow: 0 0 30px rgba(0, 150, 255, 0.3), inset 0 0 15px rgba(0, 100, 200, 0.15);
  }

  #word-input.correct {
    border-color: rgba(0, 255, 120, 0.8);
    color: #00ff88;
    box-shadow: 0 0 30px rgba(0, 255, 120, 0.3);
  }

  #word-input.wrong {
    border-color: rgba(255, 50, 80, 0.8);
    color: #ff3250;
    box-shadow: 0 0 30px rgba(255, 50, 80, 0.3);
  }

  #combo-display {
    text-align: center;
    margin-bottom: 10px;
    font-size: 13px;
    color: rgba(255, 200, 0, 0.8);
    text-shadow: 0 0 8px rgba(255, 200, 0, 0.5);
    min-height: 20px;
    letter-spacing: 1px;
  }

  /* Overlay screens */
  .overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0, 5, 20, 0.88);
    backdrop-filter: blur(6px);
    pointer-events: all;
    z-index: 100;
  }

  .overlay-card {
    background: rgba(0, 15, 35, 0.95);
    border: 1px solid rgba(0, 200, 255, 0.3);
    border-radius: 16px;
    padding: 50px 60px;
    text-align: center;
    max-width: 480px;
    width: 90%;
    box-shadow: 0 0 60px rgba(0, 100, 255, 0.15);
  }

  .overlay-title {
    font-size: 48px;
    font-weight: bold;
    color: #00d4ff;
    text-shadow: 0 0 20px rgba(0, 212, 255, 0.6);
    margin-bottom: 10px;
    letter-spacing: 4px;
  }

  .overlay-subtitle {
    font-size: 14px;
    color: rgba(0, 200, 255, 0.5);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 40px;
  }

  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid rgba(0, 200, 255, 0.1);
  }

  .stat-row:last-of-type { border-bottom: none; }

  .stat-label {
    color: rgba(0, 200, 255, 0.5);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .stat-value {
    color: #00d4ff;
    font-size: 20px;
    font-weight: bold;
    text-shadow: 0 0 8px rgba(0, 212, 255, 0.4);
  }

  .btn {
    margin-top: 35px;
    padding: 14px 40px;
    font-family: 'Courier New', monospace;
    font-size: 16px;
    font-weight: bold;
    letter-spacing: 3px;
    text-transform: uppercase;
    background: rgba(0, 100, 200, 0.25);
    border: 2px solid rgba(0, 200, 255, 0.5);
    border-radius: 8px;
    color: #00d4ff;
    cursor: pointer;
    transition: all 0.2s;
    pointer-events: all;
  }

  .btn:hover {
    background: rgba(0, 150, 255, 0.35);
    border-color: rgba(0, 200, 255, 0.9);
    box-shadow: 0 0 25px rgba(0, 150, 255, 0.4);
    transform: translateY(-2px);
  }

  .btn:active { transform: translateY(0); }

  .accuracy-bar-container {
    margin: 20px 0;
  }

  .accuracy-bar-bg {
    width: 100%;
    height: 6px;
    background: rgba(0, 50, 100, 0.5);
    border-radius: 3px;
    overflow: hidden;
  }

  .accuracy-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.5s ease;
    background: linear-gradient(90deg, #0088ff, #00d4ff);
    box-shadow: 0 0 8px rgba(0, 212, 255, 0.6);
  }

  #level-up-banner {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 36px;
    font-weight: bold;
    color: #ffd700;
    text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
    letter-spacing: 6px;
    pointer-events: none;
    opacity: 0;
    z-index: 50;
    white-space: nowrap;
  }

  .hidden { display: none !important; }

  #accuracy-hud {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .mini-bar {
    width: 80px;
    height: 4px;
    background: rgba(0, 50, 100, 0.5);
    border-radius: 2px;
    overflow: hidden;
  }

  .mini-bar-fill {
    height: 100%;
    border-radius: 2px;
    background: linear-gradient(90deg, #0066ff, #00d4ff);
    transition: width 0.3s ease;
  }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="ui">
  <div id="hud">
    <div class="hud-box" id="score-display">
      <div class="hud-label">Score</div>
      <div class="hud-value" id="score-val">0</div>
    </div>
    <div class="hud-box" id="accuracy-hud">
      <div class="hud-label">Accuracy</div>
      <div class="hud-value" id="accuracy-val">100%</div>
      <div class="mini-bar"><div class="mini-bar-fill" id="accuracy-bar" style="width:100%"></div></div>
    </div>
    <div class="hud-box" id="level-display">
      <div class="hud-label">Level</div>
      <div class="hud-value" id="level-val">1</div>
    </div>
    <div class="hud-box" id="lives-display">
      <div class="hud-label">Lives</div>
      <div class="hud-value" id="lives-val">♥ ♥ ♥</div>
    </div>
  </div>

  <div id="level-up-banner">LEVEL UP!</div>

  <div id="input-area">
    <div id="combo-display"></div>
    <input type="text" id="word-input" placeholder="type here..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
  </div>
</div>

<!-- Start Screen -->
<div class="overlay" id="start-screen">
  <div class="overlay-card">
    <div class="overlay-title">TYPING<br>RAIN</div>
    <div class="overlay-subtitle">Type the falling words</div>
    <div style="color: rgba(0,200,255,0.5); font-size: 13px; line-height: 1.8; margin-bottom: 10px;">
      Words fall from the sky like rain.<br>
      Type them before they hit the ground.<br>
      Miss too many and the city drowns.
    </div>
    <button class="btn" id="start-btn">START GAME</button>
  </div>
</div>

<!-- Game Over Screen -->
<div class="overlay hidden" id="gameover-screen">
  <div class="overlay-card">
    <div class="overlay-title" style="color: #ff4466; text-shadow: 0 0 20px rgba(255,68,102,0.6); font-size: 36px;">GAME OVER</div>
    <div class="overlay-subtitle">The city has flooded</div>
    <div style="margin: 20px 0;">
      <div class="stat-row">
        <span class="stat-label">Final Score</span>
        <span class="stat-value" id="final-score">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Level Reached</span>
        <span class="stat-value" id="final-level">1</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Words Typed</span>
        <span class="stat-value" id="final-words">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Accuracy</span>
        <span class="stat-value" id="final-accuracy">0%</span>
      </div>
      <div class="accuracy-bar-container">
        <div class="accuracy-bar-bg">
          <div class="accuracy-bar-fill" id="final-accuracy-bar" style="width:0%"></div>
        </div>
      </div>
    </div>
    <button class="btn" id="restart-btn">PLAY AGAIN</button>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- State ---
let W, H;
let gameState = 'start'; // start, playing, gameover
let score = 0;
let level = 1;
let lives = 3;
let wordsTyped = 0;
let totalKeystrokes = 0;
let correctKeystrokes = 0;
let combo = 0;
let maxCombo = 0;

let fallingWords = [];
let particles = [];
let rainDrops = [];
let explosions = [];
let lastSpawn = 0;
let spawnInterval = 2800;
let levelProgress = 0;
let wordsForNextLevel = 8;
let animFrame;

// City geometry cache
let cityBuildings = [];

const WORD_LISTS = {
  easy: ['cat','dog','sun','run','big','hot','sky','map','fly','car','pen','box','cup','top','red','fog','ice','dew','mist','drop','rain','wind','cold','dark','glow','blue','grey','city','lamp','road'],
  medium: ['storm','cloud','flood','light','dream','track','climb','swing','blaze','frost','river','night','urban','foggy','rainy','tower','glass','steel','neon','flash','speed','sharp','coded','pixel','typed','blast','input','surge','brick','drift'],
  hard: ['thunder','blizzard','highway','crystal','network','current','climate','rooftop','texture','circuit','torrent','voltage','cascade','silicon','eclipse','phantom','cyclone','skyline','lantern','overload','quantum','digital','complex','encrypt','decrypt'],
  expert: ['thunderstorm','architecture','fluorescent','infrastructure','constellation','electromagnetic','crystallography','meteorological','telecommunications','cybersecurity','cryptocurrency','microprocessor','pharmaceutical','transportation']
};

function getWordPool(lvl) {
  if (lvl <= 2) return [...WORD_LISTS.easy];
  if (lvl <= 4) return [...WORD_LISTS.easy, ...WORD_LISTS.medium];
  if (lvl <= 7) return [...WORD_LISTS.medium, ...WORD_LISTS.hard];
  if (lvl <= 10) return [...WORD_LISTS.hard, ...WORD_LISTS.expert];
  return [...WORD_LISTS.hard, ...WORD_LISTS.expert];
}

function randomWord(lvl) {
  const pool = getWordPool(lvl);
  return pool[Math.floor(Math.random() * pool.length)];
}

function getFallSpeed(lvl) {
  const base = 0.4;
  const inc = 0.18;
  return base + (lvl - 1) * inc + Math.random() * 0.25;
}

function getSpawnInterval(lvl) {
  return Math.max(800, 2800 - (lvl - 1) * 200);
}

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  generateCity();
}

// --- City Buildings ---
function generateCity() {
  cityBuildings = [];
  const minBuildingW = 55, maxBuildingW = 110;
  let x = 0;
  while (x < W + 100) {
    const bw = minBuildingW + Math.random() * (maxBuildingW - minBuildingW);
    const bh = 80 + Math.random() * (H * 0.45);
    const floors = Math.floor(bh / 22);
    const windowCols = Math.floor((bw - 14) / 18);
    const hue = 200 + Math.random() * 40;
    const lightness = 8 + Math.random() * 10;
    cityBuildings.push({ x, y: H - bh, w: bw, h: bh, floors, windowCols, hue, lightness });
    x += bw - 2 + Math.random() * 8;
  }
}

function drawCity() {
  // Sky gradient
  const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
  skyGrad.addColorStop(0, '#050510');
  skyGrad.addColorStop(0.55, '#0a0a25');
  skyGrad.addColorStop(1, '#0d1535');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H);

  // Moon / glow
  const moonX = W * 0.8, moonY = H * 0.12;
  const moonGlow = ctx.createRadialGradient(moonX, moonY, 0, moonX, moonY, 120);
  moonGlow.addColorStop(0, 'rgba(150,200,255,0.07)');
  moonGlow.addColorStop(1, 'rgba(150,200,255,0)');
  ctx.fillStyle = moonGlow;
  ctx.fillRect(0, 0, W, H);
  ctx.beginPath();
  ctx.arc(moonX, moonY, 22, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(200,220,255,0.9)';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(moonX, moonY, 22, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(150,200,255,0.3)';
  ctx.lineWidth = 8;
  ctx.stroke();

  // Buildings (back layer - slightly dimmer)
  for (let i = 0; i < cityBuildings.length; i++) {
    const b = cityBuildings[i];
    const isBack = i % 3 === 0;
    const alpha = isBack ? 0.6 : 1.0;
    const yOff = isBack ? 30 : 0;

    ctx.save();
    ctx.globalAlpha = alpha;
    // Building body
    const bGrad = ctx.createLinearGradient(b.x, b.y + yOff, b.x + b.w, b.y + b.h);
    bGrad.addColorStop(0, `hsl(${b.hue}, 20%, ${b.lightness + 3}%)`);
    bGrad.addColorStop(1, `hsl(${b.hue}, 20%, ${b.lightness - 2}%)`);
    ctx.fillStyle = bGrad;
    ctx.fillRect(b.x, b.y + yOff, b.w, b.h);

    // Edge highlight
    ctx.fillStyle = `hsla(${b.hue}, 40%, 40%, 0.15)`;
    ctx.fillRect(b.x, b.y + yOff, 2, b.h);

    // Windows
    for (let row = 0; row < b.floors; row++) {
      for (let col = 0; col < b.windowCols; col++) {
        const wx = b.x + 8 + col * 18;
        const wy = b.y + yOff + 14 + row * 22;
        if (wy > H - 5) continue;
        const lit = Math.random() < 0.55;
        if (lit) {
          const warmth = Math.random();
          let wColor;
          if (warmth < 0.4) wColor = 'rgba(255,240,180,0.85)'; // warm yellow
          else if (warmth < 0.7) wColor = 'rgba(180,220,255,0.85)'; // cool blue-white
          else wColor = 'rgba(255,200,120,0.7)'; // orange
          ctx.fillStyle = wColor;
          ctx.fillRect(wx, wy, 10, 14);
          // window glow
          ctx.shadowColor = wColor;
          ctx.shadowBlur = 6;
          ctx.fillRect(wx, wy, 10, 14);
          ctx.shadowBlur = 0;
        } else {
          ctx.fillStyle = 'rgba(0,5,20,0.7)';
          ctx.fillRect(wx, wy, 10, 14);
        }
      }
    }
    // Rooftop details
    ctx.fillStyle = `hsl(${b.hue}, 30%, ${b.lightness + 10}%)`;
    ctx.fillRect(b.x + b.w * 0.35, b.y + yOff - 12, b.w * 0.08, 12);
    ctx.fillStyle = 'rgba(255,50,50,0.8)';
    ctx.beginPath();
    ctx.arc(b.x + b.w * 0.35 + b.w * 0.04, b.y + yOff - 14, 3, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  // Ground / street
  const groundGrad = ctx.createLinearGradient(0, H - 40, 0, H);
  groundGrad.addColorStop(0, '#0a0f20');
  groundGrad.addColorStop(1, '#060810');
  ctx.fillStyle = groundGrad;
  ctx.fillRect(0, H - 40, W, 40);

  // Street reflection puddles
  ctx.globalAlpha = 0.15;
  for (let px = 50; px < W; px += 180 + Math.sin(px) * 60) {
    const pw = 60 + Math.sin(px * 0.01) * 40;
    const pudGrad = ctx.createLinearGradient(px, H - 35, px + pw, H - 20);
    pudGrad.addColorStop(0, 'rgba(0,150,255,0)');
    pudGrad.addColorStop(0.5, 'rgba(0,180,255,0.5)');
    pudGrad.addColorStop(1, 'rgba(0,150,255,0)');
    ctx.fillStyle = pudGrad;
    ctx.fillRect(px, H - 35, pw, 15);
  }
  ctx.globalAlpha = 1;
}

// --- Rain drops ---
function initRain() {
  rainDrops = [];
  const count = Math.floor(W / 6);
  for (let i = 0; i < count; i++) {
    rainDrops.push({
      x: Math.random() * W,
      y: Math.random() * H,
      len: 8 + Math.random() * 14,
      speed: 12 + Math.random() * 10,
      alpha: 0.1 + Math.random() * 0.25,
      wind: 1.5
    });
  }
}

function drawRain() {
  ctx.save();
  ctx.strokeStyle = 'rgba(120,180,255,0.5)';
  ctx.lineWidth = 1;
  for (const d of rainDrops) {
    ctx.globalAlpha = d.alpha;
    ctx.beginPath();
    ctx.moveTo(d.x, d.y);
    ctx.lineTo(d.x + d.wind, d.y + d.len);
    ctx.stroke();
    d.x += d.wind;
    d.y += d.speed;
    if (d.y > H) {
      d.y = -d.len - Math.random() * 50;
      d.x = Math.random() * W;
    }
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

// --- Particles ---
function spawnExplosion(x, y, isSuccess) {
  const count = isSuccess ? 18 : 10;
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 / count) * i + Math.random() * 0.5;
    const speed = isSuccess ? (2 + Math.random() * 4) : (1 + Math.random() * 2.5);
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 1,
      life: 1.0,
      decay: 0.025 + Math.random() * 0.02,
      size: isSuccess ? (2 + Math.random() * 3) : (1.5 + Math.random() * 2),
      color: isSuccess
        ? `hsl(${160 + Math.random() * 60}, 100%, 60%)`
        : `hsl(${0 + Math.random() * 30}, 100%, 60%)`
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.12;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// --- Falling Words ---
const WORD_COLORS = [
  { base: '#00d4ff', glow: 'rgba(0,212,255,0.6)', matched: '#ffffff' },
  { base: '#00ff88', glow: 'rgba(0,255,136,0.6)', matched: '#ffffff' },
  { base: '#ffaa00', glow: 'rgba(255,170,0,0.6)', matched: '#ffffff' },
  { base: '#ff66cc', glow: 'rgba(255,102,204,0.6)', matched: '#ffffff' },
  { base: '#aaaaff', glow: 'rgba(170,170,255,0.6)', matched: '#ffffff' },
];

function spawnWord() {
  const text = randomWord(level);
  // Avoid duplicate words
  const existing = fallingWords.map(w => w.text);
  let tries = 0, finalText = text;
  while (existing.includes(finalText) && tries < 10) {
    finalText = randomWord(level);
    tries++;
  }

  const fontSize = 18 + Math.max(0, 3 - level) * 2;
  ctx.font = `bold ${fontSize}px 'Courier New', monospace`;
  const textW = ctx.measureText(finalText).width;
  const margin = 30;
  const x = margin + Math.random() * (W - textW - margin * 2);
  const colorIdx = Math.floor(Math.random() * WORD_COLORS.length);

  fallingWords.push({
    text: finalText,
    x,
    y: -30,
    speed: getFallSpeed(level),
    fontSize,
    matched: 0,
    colorIdx,
    wobble: Math.random() * Math.PI * 2,
    wobbleSpeed: 0.02 + Math.random() * 0.01,
    opacity: 1,
    dying: false,
    dyingTimer: 0,
    id: Math.random()
  });
}

function drawFallingWords(currentTyped) {
  for (const w of fallingWords) {
    if (w.dying) continue;

    const c = WORD_COLORS[w.colorIdx];
    const danger = w.y / (H - 80);
    const dangerAlpha = danger > 0.75 ? 0.4 + Math.sin(Date.now() * 0.01) * 0.3 : 0;

    ctx.save();
    ctx.font = `bold ${w.fontSize}px 'Courier New', monospace`;

    // Wobble
    const wobX = w.x + Math.sin(w.wobble) * 1.5;
    const ty = w.y;

    // Background pill
    const textW = ctx.measureText(w.text).width;
    const padX = 10, padY = 6;
    ctx.globalAlpha = 0.55 + dangerAlpha * 0.1;
    ctx.fillStyle = 'rgba(0, 5, 20, 0.7)';
    roundRect(ctx, wobX - padX, ty - w.fontSize - padY, textW + padX * 2, w.fontSize + padY * 2, 6);
    ctx.fill();

    if (dangerAlpha > 0) {
      ctx.strokeStyle = `rgba(255, 50, 50, ${dangerAlpha})`;
      ctx.lineWidth = 1.5;
      roundRect(ctx, wobX - padX, ty - w.fontSize - padY, textW + padX * 2, w.fontSize + padY * 2, 6);
      ctx.stroke();
    }

    ctx.globalAlpha = 1;

    // Glow behind text
    ctx.shadowColor = c.glow;
    ctx.shadowBlur = 12 + dangerAlpha * 8;

    // Draw character by character
    let cx = wobX;
    for (let i = 0; i < w.text.length; i++) {
      const ch = w.text[i];
      const chW = ctx.measureText(ch).width;

      if (i < w.matched) {
        ctx.fillStyle = '#00ff88';
        ctx.shadowColor = 'rgba(0,255,136,0.8)';
        ctx.shadowBlur = 15;
      } else {
        ctx.fillStyle = c.base;
        ctx.shadowColor = c.glow;
        ctx.shadowBlur = 10;
      }

      ctx.fillText(ch, cx, ty);
      cx += chW;
    }

    ctx.restore();
    w.wobble += w.wobbleSpeed;
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// --- Input ---
const wordInput = document.getElementById('word-input');

wordInput.addEventListener('input', () => {
  if (gameState !== 'playing') return;
  const typed = wordInput.value.toLowerCase().trim();
  totalKeystrokes++;

  // Check for exact match
  const matchIdx = fallingWords.findIndex(w => !w.dying && w.text === typed);
  if (matchIdx !== -1) {
    wordTypedCorrectly(matchIdx, typed);
    return;
  }

  // Highlight partial matches
  let anyMatch = false;
  for (const w of fallingWords) {
    if (w.dying) continue;
    if (w.text.startsWith(typed)) {
      w.matched = typed.length;
      anyMatch = true;
    } else {
      w.matched = 0;
    }
  }

  if (typed.length > 0 && !anyMatch) {
    wordInput.classList.add('wrong');
    setTimeout(() => wordInput.classList.remove('wrong'), 200);
  } else {
    wordInput.classList.remove('wrong');
  }
});

wordInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    if (gameState !== 'playing') return;
    const typed = wordInput.value.toLowerCase().trim();
    const matchIdx = fallingWords.findIndex(w => !w.dying && w.text === typed);
    if (matchIdx !== -1) {
      wordTypedCorrectly(matchIdx, typed);
    }
  }
});

function wordTypedCorrectly(idx, typed) {
  const w = fallingWords[idx];
  correctKeystrokes += typed.length;
  wordsTyped++;
  combo++;
  if (combo > maxCombo) maxCombo = combo;

  // Score calculation
  const baseScore = w.text.length * 10;
  const speedBonus = Math.floor((1 - w.y / H) * 20);
  const comboBonus = Math.floor(combo * 1.5);
  const levelBonus = level * 5;
  const points = baseScore + speedBonus + comboBonus + levelBonus;
  score += points;

  // Visual feedback
  spawnExplosion(w.x + ctx.measureText(w.text).width / 2, w.y - 10, true);
  showFloatingScore(w.x + ctx.measureText(w.text).width / 2, w.y - 30, `+${points}`);

  // Mark dying
  w.dying = true;
  fallingWords.splice(idx, 1);

  wordInput.value = '';
  wordInput.classList.add('correct');
  setTimeout(() => wordInput.classList.remove('correct'), 200);

  // Reset partial matches
  for (const fw of fallingWords) fw.matched = 0;

  updateHUD();
  checkLevelUp();
  updateComboDisplay();
}

// --- Floating score text ---
let floatingTexts = [];
function showFloatingScore(x, y, text) {
  floatingTexts.push({ x, y, text, life: 1.0, vy: -1.5 });
}

function updateFloatingTexts() {
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    const ft = floatingTexts[i];
    ft.y += ft.vy;
    ft.life -= 0.02;
    if (ft.life <= 0) floatingTexts.splice(i, 1);
  }
}

function drawFloatingTexts() {
  ctx.save();
  for (const ft of floatingTexts) {
    ctx.globalAlpha = ft.life;
    ctx.font = 'bold 16px Courier New';
    ctx.fillStyle = '#ffd700';
    ctx.shadowColor = 'rgba(255,215,0,0.8)';
    ctx.shadowBlur = 10;
    ctx.textAlign = 'center';
    ctx.fillText(ft.text, ft.x, ft.y);
  }
  ctx.textAlign = 'left';
  ctx.restore();
}

// --- Level Up ---
function checkLevelUp() {
  levelProgress++;
  if (levelProgress >= wordsForNextLevel) {
    level++;
    levelProgress = 0;
    wordsForNextLevel = Math.min(wordsForNextLevel + 2, 18);
    spawnInterval = getSpawnInterval(level);
    showLevelUp();
    document.getElementById('level-val').textContent = level;
  }
}

function showLevelUp() {
  const banner = document.getElementById('level-up-banner');
  banner.textContent = `LEVEL ${level}!`;
  banner.style.opacity = '1';
  banner.style.transition = 'opacity 0s';
  setTimeout(() => {
    banner.style.transition = 'opacity 1.5s ease';
    banner.style.opacity = '0';
  }, 1000);
}

// --- Game Logic ---
function updateWords(now) {
  for (let i = fallingWords.length - 1; i >= 0; i--) {
    const w = fallingWords[i];
    w.y += w.speed;

    if (w.y > H - 50) {
      // Word hit the ground
      spawnExplosion(w.x + 40, H - 50, false);
      fallingWords.splice(i, 1);
      loseLife();
      combo = 0;
      updateComboDisplay();
    }
  }

  // Spawn
  if (now - lastSpawn > spawnInterval) {
    const maxWords = Math.min(2 + Math.floor(level / 2), 6);
    if (fallingWords.length < maxWords) {
      spawnWord();
      lastSpawn = now;
    }
  }
}

function loseLife() {
  lives--;
  updateLivesDisplay();
  if (lives <= 0) {
    endGame();
  }
  // Flash screen
  flashScreen('rgba(255,0,50,0.2)');
}

function flashScreen(color) {
  const flash = document.createElement('div');
  flash.style.cssText = `position:fixed;top:0;left:0;width:100%;height:100%;background:${color};pointer-events:none;z-index:200;`;
  document.body.appendChild(flash);
  setTimeout(() => flash.remove(), 300);
}

function updateLivesDisplay() {
  const hearts = ['', '♥', '♥ ♥', '♥ ♥ ♥'];
  document.getElementById('lives-val').textContent = lives >= 0 ? (hearts[lives] || '') : '';
}

function updateHUD() {
  document.getElementById('score-val').textContent = score.toLocaleString();
  const acc = totalKeystrokes > 0 ? Math.round((correctKeystrokes / totalKeystrokes) * 100) : 100;
  document.getElementById('accuracy-val').textContent = acc + '%';
  document.getElementById('accuracy-bar').style.width = acc + '%';
}

function updateComboDisplay() {
  const el = document.getElementById('combo-display');
  if (combo >= 3) {
    el.textContent = `${combo}x COMBO!`;
    el.style.opacity = '1';
  } else {
    el.textContent = '';
  }
}

// --- Main loop ---
function gameLoop(now) {
  ctx.clearRect(0, 0, W, H);
  drawCity();
  drawRain();

  if (gameState === 'playing') {
    updateWords(now);
    updateParticles();
    updateFloatingTexts();
    drawFallingWords(wordInput.value.toLowerCase());
    drawParticles();
    drawFloatingTexts();
  }

  animFrame = requestAnimationFrame(gameLoop);
}

// --- Start / Stop ---
function startGame() {
  score = 0;
  level = 1;
  lives = 3;
  wordsTyped = 0;
  totalKeystrokes = 0;
  correctKeystrokes = 0;
  combo = 0;
  maxCombo = 0;
  levelProgress = 0;
  wordsForNextLevel = 8;
  spawnInterval = getSpawnInterval(1);
  fallingWords = [];
  particles = [];
  floatingTexts = [];
  lastSpawn = 0;

  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('gameover-screen').classList.add('hidden');
  document.getElementById('level-val').textContent = '1';
  updateHUD();
  updateLivesDisplay();

  gameState = 'playing';
  wordInput.value = '';
  wordInput.focus();
}

function endGame() {
  gameState = 'gameover';
  fallingWords = [];

  const acc = totalKeystrokes > 0 ? Math.round((correctKeystrokes / totalKeystrokes) * 100) : 0;
  document.getElementById('final-score').textContent = score.toLocaleString();
  document.getElementById('final-level').textContent = level;
  document.getElementById('final-words').textContent = wordsTyped;
  document.getElementById('final-accuracy').textContent = acc + '%';
  document.getElementById('final-accuracy-bar').style.width = acc + '%';
  document.getElementById('gameover-screen').classList.remove('hidden');
}

// --- Event Listeners ---
document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('restart-btn').addEventListener('click', startGame);

window.addEventListener('resize', resize);

// Init
resize();
initRain();
generateCity();
requestAnimationFrame(gameLoop);

// Keep focus on input
document.addEventListener('keydown', (e) => {
  if (gameState === 'playing' && e.target !== wordInput && !e.metaKey && !e.ctrlKey) {
    wordInput.focus();
  }
});
</script>
