<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virtual Drum Kit</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-dark: #0a0a0f;
    --bg-panel: #111118;
    --bg-card: #1a1a24;
    --accent-red: #ff3b3b;
    --accent-orange: #ff7b00;
    --accent-yellow: #ffd700;
    --accent-green: #00ff88;
    --accent-blue: #00aaff;
    --accent-purple: #aa44ff;
    --accent-cyan: #00ffdd;
    --accent-pink: #ff44aa;
    --text-primary: #f0f0f0;
    --text-secondary: #888;
    --border: #2a2a3a;
    --glow-red: 0 0 20px rgba(255,59,59,0.6);
    --glow-green: 0 0 20px rgba(0,255,136,0.6);
    --glow-blue: 0 0 20px rgba(0,170,255,0.6);
  }

  body {
    background: var(--bg-dark);
    color: var(--text-primary);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(170,68,255,0.05) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(0,170,255,0.05) 0%, transparent 60%),
      radial-gradient(ellipse at 50% 90%, rgba(255,59,59,0.05) 0%, transparent 60%);
  }

  /* Scanline effect */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 1000;
  }

  .app-container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 20px 0 30px;
    position: relative;
  }

  .header-logo {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 15px;
    margin-bottom: 8px;
  }

  .logo-icon {
    width: 50px;
    height: 50px;
    background: linear-gradient(135deg, var(--accent-red), var(--accent-orange));
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    box-shadow: var(--glow-red);
    animation: pulse-logo 3s ease-in-out infinite;
  }

  @keyframes pulse-logo {
    0%, 100% { box-shadow: 0 0 20px rgba(255,59,59,0.6); }
    50% { box-shadow: 0 0 40px rgba(255,123,0,0.8), 0 0 60px rgba(255,59,59,0.4); }
  }

  .app-title {
    font-family: 'Orbitron', monospace;
    font-size: clamp(24px, 5vw, 42px);
    font-weight: 900;
    background: linear-gradient(135deg, #ff3b3b, #ff7b00, #ffd700);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    letter-spacing: 3px;
  }

  .app-subtitle {
    font-size: 14px;
    color: var(--text-secondary);
    letter-spacing: 6px;
    text-transform: uppercase;
    font-weight: 600;
  }

  /* Controls Bar */
  .controls-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 20px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .control-group {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .control-label {
    font-size: 11px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 2px;
    font-weight: 600;
  }

  .btn {
    padding: 8px 18px;
    border: none;
    border-radius: 6px;
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
    text-transform: uppercase;
    position: relative;
    overflow: hidden;
  }

  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.1);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .btn:hover::after { opacity: 1; }
  .btn:active { transform: scale(0.95); }

  .btn-record {
    background: linear-gradient(135deg, #ff3b3b, #cc0000);
    color: white;
    box-shadow: 0 0 15px rgba(255,59,59,0.4);
  }

  .btn-record.recording {
    animation: pulse-record 1s ease-in-out infinite;
  }

  @keyframes pulse-record {
    0%, 100% { box-shadow: 0 0 15px rgba(255,59,59,0.4); }
    50% { box-shadow: 0 0 30px rgba(255,59,59,0.9), 0 0 50px rgba(255,59,59,0.5); }
  }

  .btn-play {
    background: linear-gradient(135deg, #00ff88, #00cc66);
    color: #0a0a0f;
    box-shadow: 0 0 15px rgba(0,255,136,0.4);
  }

  .btn-stop {
    background: linear-gradient(135deg, #ff7b00, #cc5500);
    color: white;
    box-shadow: 0 0 15px rgba(255,123,0,0.4);
  }

  .btn-clear {
    background: var(--bg-card);
    color: var(--text-secondary);
    border: 1px solid var(--border);
  }

  .btn-clear:hover { color: var(--text-primary); border-color: var(--accent-red); }

  /* Volume Slider */
  .slider-container {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .slider {
    -webkit-appearance: none;
    width: 80px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
  }

  .slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    background: var(--accent-blue);
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 0 8px rgba(0,170,255,0.6);
  }

  /* BPM Display */
  .bpm-display {
    font-family: 'Orbitron', monospace;
    font-size: 18px;
    font-weight: 700;
    color: var(--accent-yellow);
    min-width: 60px;
    text-align: center;
  }

  /* Recording indicator */
  .rec-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--accent-red);
    display: none;
  }

  .recording .rec-dot {
    display: block;
    animation: blink 1s step-end infinite;
  }

  @keyframes blink {
    50% { opacity: 0; }
  }

  /* Sequencer / Timeline */
  .timeline {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 15px;
    margin-bottom: 20px;
    min-height: 60px;
    position: relative;
    overflow: hidden;
  }

  .timeline-label {
    font-size: 11px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 8px;
    font-weight: 600;
  }

  .timeline-bar {
    display: flex;
    gap: 3px;
    align-items: center;
    flex-wrap: wrap;
  }

  .timeline-event {
    width: 8px;
    height: 24px;
    border-radius: 2px;
    opacity: 0.8;
    animation: pop-in 0.15s ease-out;
  }

  @keyframes pop-in {
    from { transform: scaleY(0); opacity: 0; }
    to { transform: scaleY(1); opacity: 0.8; }
  }

  .timeline-empty {
    color: var(--text-secondary);
    font-size: 13px;
    font-style: italic;
  }

  .playback-cursor {
    position: absolute;
    top: 0;
    width: 2px;
    height: 100%;
    background: var(--accent-green);
    box-shadow: var(--glow-green);
    transition: left 0.05s linear;
    display: none;
  }

  .playback-cursor.active { display: block; }

  /* Drum Kit Layout */
  .kit-container {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 15px;
    margin-bottom: 20px;
  }

  @media (max-width: 700px) {
    .kit-container {
      grid-template-columns: repeat(2, 1fr);
    }
  }

  @media (max-width: 400px) {
    .kit-container {
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
  }

  /* Drum Pad */
  .drum-pad {
    position: relative;
    background: var(--bg-card);
    border: 2px solid var(--border);
    border-radius: 16px;
    padding: 20px 15px;
    cursor: pointer;
    user-select: none;
    transition: all 0.1s;
    overflow: hidden;
    min-height: 120px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    -webkit-tap-highlight-color: transparent;
  }

  .drum-pad::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at center, var(--pad-color) 0%, transparent 70%);
    opacity: 0;
    transition: opacity 0.1s;
    border-radius: 14px;
  }

  .drum-pad::after {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: 17px;
    border: 2px solid var(--pad-color);
    opacity: 0;
    transition: opacity 0.15s, box-shadow 0.15s;
  }

  .drum-pad:hover {
    border-color: var(--pad-color);
    transform: translateY(-2px);
  }

  .drum-pad:hover::after {
    opacity: 0.4;
    box-shadow: 0 0 15px var(--pad-color);
  }

  .drum-pad.active {
    transform: scale(0.95) translateY(0);
    border-color: var(--pad-color);
  }

  .drum-pad.active::before { opacity: 0.15; }
  .drum-pad.active::after {
    opacity: 1;
    box-shadow: 0 0 30px var(--pad-color), 0 0 60px var(--pad-color-dim);
  }

  .pad-icon {
    font-size: 36px;
    line-height: 1;
    filter: drop-shadow(0 0 8px var(--pad-color));
    transition: transform 0.1s, filter 0.1s;
  }

  .drum-pad.active .pad-icon {
    transform: scale(1.2);
    filter: drop-shadow(0 0 16px var(--pad-color)) drop-shadow(0 0 30px var(--pad-color));
  }

  .pad-name {
    font-family: 'Orbitron', monospace;
    font-size: 12px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: 1px;
    text-align: center;
  }

  .pad-key {
    font-size: 12px;
    color: var(--text-secondary);
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 7px;
    font-family: 'Orbitron', monospace;
    font-weight: 600;
  }

  .drum-pad.active .pad-key {
    color: var(--pad-color);
    border-color: var(--pad-color);
    box-shadow: 0 0 8px var(--pad-color);
  }

  /* Velocity bar */
  .velocity-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: var(--pad-color);
    transform-origin: left;
    transform: scaleX(0);
    transition: transform 0.3s ease-out;
    opacity: 0.7;
  }

  .drum-pad.active .velocity-bar {
    transform: scaleX(1);
  }

  /* Hit rings */
  .hit-ring {
    position: absolute;
    width: 40px;
    height: 40px;
    border: 2px solid var(--pad-color);
    border-radius: 50%;
    pointer-events: none;
    opacity: 0;
  }

  .hit-ring.animate {
    animation: ring-expand 0.5s ease-out forwards;
  }

  @keyframes ring-expand {
    from { transform: scale(0.5); opacity: 0.8; }
    to { transform: scale(3); opacity: 0; }
  }

  /* Footer with keyboard hint */
  .keyboard-hint {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 15px 20px;
    text-align: center;
    color: var(--text-secondary);
    font-size: 13px;
  }

  .keyboard-hint strong {
    color: var(--text-primary);
    font-weight: 700;
  }

  /* Status bar */
  .status-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 20px;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 15px;
    font-size: 12px;
    color: var(--text-secondary);
    flex-wrap: wrap;
    gap: 8px;
  }

  .status-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--text-secondary);
  }

  .status-dot.active { background: var(--accent-green); box-shadow: 0 0 6px var(--accent-green); }
  .status-dot.recording { background: var(--accent-red); animation: blink 1s step-end infinite; box-shadow: 0 0 6px var(--accent-red); }
  .status-dot.playing { background: var(--accent-blue); box-shadow: 0 0 6px var(--accent-blue); animation: blink 0.5s step-end infinite; }

  /* VU Meter */
  .vu-meter {
    display: flex;
    gap: 2px;
    align-items: flex-end;
    height: 20px;
  }

  .vu-bar {
    width: 5px;
    background: var(--accent-green);
    border-radius: 1px;
    transition: height 0.1s;
    min-height: 2px;
  }

  .vu-bar:nth-child(n+6) { background: var(--accent-yellow); }
  .vu-bar:nth-child(n+8) { background: var(--accent-red); }

  /* Playback progress */
  .playback-progress {
    width: 120px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .playback-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent-blue), var(--accent-cyan));
    border-radius: 2px;
    width: 0%;
    transition: width 0.1s linear;
  }

  /* Hit count badge */
  .hit-count {
    font-family: 'Orbitron', monospace;
    font-size: 18px;
    color: var(--accent-yellow);
    font-weight: 700;
  }

  /* Ripple animation overlay */
  .ripple-overlay {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 500;
  }

  .ripple {
    position: absolute;
    border-radius: 50%;
    animation: ripple-out 0.6s ease-out forwards;
    border: 2px solid currentColor;
  }

  @keyframes ripple-out {
    from { transform: scale(0); opacity: 0.8; width: 20px; height: 20px; }
    to { transform: scale(8); opacity: 0; }
  }

  /* Metronome tick indicator */
  .metronome {
    display: flex;
    gap: 4px;
    align-items: center;
  }

  .metro-beat {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--border);
    transition: background 0.05s, box-shadow 0.05s;
  }

  .metro-beat.tick {
    background: var(--accent-yellow);
    box-shadow: 0 0 8px var(--accent-yellow);
  }

  .metro-beat.downbeat.tick {
    background: var(--accent-orange);
    box-shadow: 0 0 12px var(--accent-orange);
    transform: scale(1.3);
  }
</style>
</head>
<body>
<div class="ripple-overlay" id="rippleOverlay"></div>
<div class="app-container">

  <!-- Header -->
  <div class="header">
    <div class="header-logo">
      <div class="logo-icon">🥁</div>
      <h1 class="app-title">DRUM KIT</h1>
    </div>
    <div class="app-subtitle">Virtual Studio · Pro Edition</div>
  </div>

  <!-- Status Bar -->
  <div class="status-bar" id="statusBar">
    <div class="status-item">
      <div class="status-dot active" id="statusDot"></div>
      <span id="statusText">Ready</span>
    </div>
    <div class="status-item">
      <span class="control-label">Hits:</span>
      <span class="hit-count" id="hitCount">0</span>
    </div>
    <div class="status-item">
      <span class="control-label">Recorded:</span>
      <span id="recordedCount" style="font-family: 'Orbitron', monospace; font-size: 13px; color: var(--accent-purple);">0 notes</span>
    </div>
    <div class="status-item">
      <div class="vu-meter" id="vuMeter">
        <div class="vu-bar" id="vu1" style="height: 2px"></div>
        <div class="vu-bar" id="vu2" style="height: 2px"></div>
        <div class="vu-bar" id="vu3" style="height: 2px"></div>
        <div class="vu-bar" id="vu4" style="height: 2px"></div>
        <div class="vu-bar" id="vu5" style="height: 2px"></div>
        <div class="vu-bar" id="vu6" style="height: 2px"></div>
        <div class="vu-bar" id="vu7" style="height: 2px"></div>
        <div class="vu-bar" id="vu8" style="height: 2px"></div>
      </div>
    </div>
  </div>

  <!-- Controls Bar -->
  <div class="controls-bar">
    <!-- Record/Playback -->
    <div class="control-group">
      <div class="rec-dot" id="recDot"></div>
      <button class="btn btn-record" id="btnRecord" onclick="toggleRecord()">⏺ Record</button>
      <button class="btn btn-play" id="btnPlay" onclick="togglePlay()" disabled>▶ Play</button>
      <button class="btn btn-stop" id="btnStop" onclick="stopAll()" style="display:none">⏹ Stop</button>
      <button class="btn btn-clear" onclick="clearRecording()">✕ Clear</button>
    </div>

    <!-- BPM -->
    <div class="control-group">
      <span class="control-label">BPM</span>
      <button class="btn btn-clear" onclick="changeBPM(-5)" style="padding: 6px 10px; font-size:14px;">−</button>
      <span class="bpm-display" id="bpmDisplay">120</span>
      <button class="btn btn-clear" onclick="changeBPM(5)" style="padding: 6px 10px; font-size:14px;">+</button>
    </div>

    <!-- Metronome -->
    <div class="control-group">
      <span class="control-label">Metro</span>
      <button class="btn btn-clear" id="btnMetro" onclick="toggleMetronome()">OFF</button>
      <div class="metronome">
        <div class="metro-beat downbeat" id="mb0"></div>
        <div class="metro-beat" id="mb1"></div>
        <div class="metro-beat" id="mb2"></div>
        <div class="metro-beat" id="mb3"></div>
      </div>
    </div>

    <!-- Volume -->
    <div class="control-group">
      <span class="control-label">VOL</span>
      <div class="slider-container">
        <input type="range" class="slider" id="volumeSlider" min="0" max="100" value="80" oninput="setVolume(this.value)">
        <span style="font-family: 'Orbitron', monospace; font-size: 12px; color: var(--accent-blue); min-width: 35px;" id="volDisplay">80%</span>
      </div>
    </div>
  </div>

  <!-- Timeline -->
  <div class="timeline" id="timeline">
    <div class="timeline-label">Recording Timeline</div>
    <div id="timelineBar" class="timeline-bar">
      <span class="timeline-empty">No recording yet — hit Record and play!</span>
    </div>
    <div class="playback-cursor" id="playbackCursor"></div>
  </div>

  <!-- Drum Pads -->
  <div class="kit-container" id="kitContainer">
    <!-- Pads generated by JS -->
  </div>

  <!-- Keyboard Hint -->
  <div class="keyboard-hint">
    <strong>Keyboard Shortcuts:</strong>&nbsp;
    Q · W · E · R · A · S · D · F &nbsp;|&nbsp;
    <strong>Space</strong> = Record &nbsp;|&nbsp;
    <strong>Enter</strong> = Play/Stop
  </div>

</div>

<script>
// ============================================================
// Audio Engine (Web Audio API)
// ============================================================
let audioCtx = null;
let masterGain = null;
let masterVolume = 0.8;

function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = masterVolume;
    masterGain.connect(audioCtx.destination);
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function setVolume(val) {
  masterVolume = val / 100;
  if (masterGain) masterGain.gain.value = masterVolume;
  document.getElementById('volDisplay').textContent = val + '%';
}

// Sound synthesis functions
const soundSynths = {
  kick: (ctx, gain) => {
    const osc = ctx.createOscillator();
    const oscGain = ctx.createGain();
    const t = ctx.currentTime;
    osc.frequency.setValueAtTime(150, t);
    osc.frequency.exponentialRampToValueAtTime(30, t + 0.15);
    oscGain.gain.setValueAtTime(1.2, t);
    oscGain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
    osc.connect(oscGain);
    oscGain.connect(gain);
    osc.start(t);
    osc.stop(t + 0.4);

    // Add click transient
    const buf = ctx.createBuffer(1, ctx.sampleRate * 0.05, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const clickGain = ctx.createGain();
    clickGain.gain.setValueAtTime(0.8, t);
    clickGain.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
    src.connect(clickGain);
    clickGain.connect(gain);
    src.start(t);
  },

  snare: (ctx, gain) => {
    const t = ctx.currentTime;
    // Tone
    const osc = ctx.createOscillator();
    const oscGain = ctx.createGain();
    osc.frequency.setValueAtTime(200, t);
    osc.frequency.exponentialRampToValueAtTime(100, t + 0.1);
    oscGain.gain.setValueAtTime(0.7, t);
    oscGain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
    osc.connect(oscGain);
    oscGain.connect(gain);
    osc.start(t);
    osc.stop(t + 0.2);

    // Noise
    const buf = ctx.createBuffer(1, ctx.sampleRate * 0.2, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const filter = ctx.createBiquadFilter();
    filter.type = 'highpass';
    filter.frequency.value = 1500;
    const noiseGain = ctx.createGain();
    noiseGain.gain.setValueAtTime(0.8, t);
    noiseGain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
    src.connect(filter);
    filter.connect(noiseGain);
    noiseGain.connect(gain);
    src.start(t);
  },

  hihat_closed: (ctx, gain) => {
    const t = ctx.currentTime;
    const buf = ctx.createBuffer(1, ctx.sampleRate * 0.08, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const filter = ctx.createBiquadFilter();
    filter.type = 'highpass';
    filter.frequency.value = 7000;
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.5, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
    src.connect(filter);
    filter.connect(g);
    g.connect(gain);
    src.start(t);
  },

  hihat_open: (ctx, gain) => {
    const t = ctx.currentTime;
    const buf = ctx.createBuffer(1, ctx.sampleRate * 0.4, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const filter = ctx.createBiquadFilter();
    filter.type = 'highpass';
    filter.frequency.value = 6000;
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.4, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
    src.connect(filter);
    filter.connect(g);
    g.connect(gain);
    src.start(t);
  },

  tom_hi: (ctx, gain) => {
    const t = ctx.currentTime;
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.frequency.setValueAtTime(300, t);
    osc.frequency.exponentialRampToValueAtTime(120, t + 0.15);
    g.gain.setValueAtTime(0.9, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
    osc.connect(g);
    g.connect(gain);
    osc.start(t);
    osc.stop(t + 0.25);
  },

  tom_mid: (ctx, gain) => {
    const t = ctx.currentTime;
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.frequency.setValueAtTime(180, t);
    osc.frequency.exponentialRampToValueAtTime(70, t + 0.2);
    g.gain.setValueAtTime(0.9, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    osc.connect(g);
    g.connect(gain);
    osc.start(t);
    osc.stop(t + 0.3);
  },

  tom_floor: (ctx, gain) => {
    const t = ctx.currentTime;
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.frequency.setValueAtTime(100, t);
    osc.frequency.exponentialRampToValueAtTime(45, t + 0.25);
    g.gain.setValueAtTime(1.0, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
    osc.connect(g);
    g.connect(gain);
    osc.start(t);
    osc.stop(t + 0.4);
  },

  clap: (ctx, gain) => {
    const t = ctx.currentTime;
    const times = [0, 0.01, 0.02];
    times.forEach(offset => {
      const buf = ctx.createBuffer(1, ctx.sampleRate * 0.12, ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
      const src = ctx.createBufferSource();
      src.buffer = buf;
      const filter = ctx.createBiquadFilter();
      filter.type = 'bandpass';
      filter.frequency.value = 1200;
      filter.Q.value = 0.7;
      const g = ctx.createGain();
      g.gain.setValueAtTime(0.6, t + offset);
      g.gain.exponentialRampToValueAtTime(0.001, t + offset + 0.12);
      src.connect(filter);
      filter.connect(g);
      g.connect(gain);
      src.start(t + offset);
    });
  },

  ride: (ctx, gain) => {
    const t = ctx.currentTime;
    // Bell tone
    const osc = ctx.createOscillator();
    osc.type = 'sine';
    const g = ctx.createGain();
    osc.frequency.setValueAtTime(800, t);
    g.gain.setValueAtTime(0.4, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.8);
    osc.connect(g);
    g.connect(gain);
    osc.start(t);
    osc.stop(t + 0.8);

    // Shimmer
    const buf = ctx.createBuffer(1, ctx.sampleRate * 0.3, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const filt = ctx.createBiquadFilter();
    filt.type = 'bandpass';
    filt.frequency.value = 5000;
    filt.Q.value = 0.5;
    const sg = ctx.createGain();
    sg.gain.setValueAtTime(0.2, t);
    sg.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    src.connect(filt);
    filt.connect(sg);
    sg.connect(gain);
    src.start(t);
  },

  crash: (ctx, gain) => {
    const t = ctx.currentTime;
    const buf = ctx.createBuffer(1, ctx.sampleRate * 1.5, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const filt = ctx.createBiquadFilter();
    filt.type = 'highpass';
    filt.frequency.value = 4000;
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.5, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 1.5);
    src.connect(filt);
    filt.connect(g);
    g.connect(gain);
    src.start(t);
  },

  cowbell: (ctx, gain) => {
    const t = ctx.currentTime;
    const freqs = [562, 845];
    freqs.forEach(f => {
      const osc = ctx.createOscillator();
      osc.type = 'square';
      const g = ctx.createGain();
      osc.frequency.value = f;
      g.gain.setValueAtTime(0.3, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
      const filt = ctx.createBiquadFilter();
      filt.type = 'bandpass';
      filt.frequency.value = 1000;
      osc.connect(filt);
      filt.connect(g);
      g.connect(gain);
      osc.start(t);
      osc.stop(t + 0.5);
    });
  },

  shaker: (ctx, gain) => {
    const t = ctx.currentTime;
    const buf = ctx.createBuffer(1, ctx.sampleRate * 0.1, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const filt = ctx.createBiquadFilter();
    filt.type = 'bandpass';
    filt.frequency.value = 8000;
    filt.Q.value = 1.5;
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.35, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
    src.connect(filt);
    filt.connect(g);
    g.connect(gain);
    src.start(t);
  },

  rim: (ctx, gain) => {
    const t = ctx.currentTime;
    const osc = ctx.createOscillator();
    osc.type = 'square';
    const g = ctx.createGain();
    osc.frequency.setValueAtTime(1500, t);
    osc.frequency.exponentialRampToValueAtTime(400, t + 0.03);
    g.gain.setValueAtTime(0.5, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
    osc.connect(g);
    g.connect(gain);
    osc.start(t);
    osc.stop(t + 0.06);
  }
};

// ============================================================
// Drum Pad Definitions
// ============================================================
const DRUMS = [
  { id: 'kick',         name: 'KICK',       key: 'Q', icon: '🔴', color: '#ff3b3b', colorDim: 'rgba(255,59,59,0.2)' },
  { id: 'snare',        name: 'SNARE',      key: 'W', icon: '⚪', color: '#ffffff', colorDim: 'rgba(255,255,255,0.2)' },
  { id: 'hihat_closed', name: 'HI-HAT',     key: 'E', icon: '🟡', color: '#ffd700', colorDim: 'rgba(255,215,0,0.2)' },
  { id: 'hihat_open',   name: 'OPEN HAT',   key: 'R', icon: '🟠', color: '#ff9900', colorDim: 'rgba(255,153,0,0.2)' },
  { id: 'tom_hi',       name: 'TOM HI',     key: 'A', icon: '🔵', color: '#00aaff', colorDim: 'rgba(0,170,255,0.2)' },
  { id: 'tom_mid',      name: 'TOM MID',    key: 'S', icon: '🟣', color: '#aa44ff', colorDim: 'rgba(170,68,255,0.2)' },
  { id: 'tom_floor',    name: 'FLOOR TOM',  key: 'D', icon: '🟢', color: '#00ff88', colorDim: 'rgba(0,255,136,0.2)' },
  { id: 'clap',         name: 'CLAP',       key: 'F', icon: '👏', color: '#ff44aa', colorDim: 'rgba(255,68,170,0.2)' },
  { id: 'crash',        name: 'CRASH',      key: 'Z', icon: '💥', color: '#ff7b00', colorDim: 'rgba(255,123,0,0.2)' },
  { id: 'ride',         name: 'RIDE',       key: 'X', icon: '✨', color: '#00ffdd', colorDim: 'rgba(0,255,221,0.2)' },
  { id: 'cowbell',      name: 'COWBELL',    key: 'C', icon: '🔔', color: '#ffaa00', colorDim: 'rgba(255,170,0,0.2)' },
  { id: 'rim',          name: 'RIM',        key: 'V', icon: '⚡', color: '#44ddff', colorDim: 'rgba(68,221,255,0.2)' },
];

// ============================================================
// State
// ============================================================
let isRecording = false;
let isPlaying = false;
let recordingStart = 0;
let recordedNotes = [];
let hitCount = 0;
let playbackTimeout = null;
let bpm = 120;
let metronomeOn = false;
let metronomeInterval = null;
let metroBeat = 0;

// VU meter state
let vuLevel = 0;
let vuAnimFrame = null;

// ============================================================
// Build UI
// ============================================================
function buildPads() {
  const container = document.getElementById('kitContainer');
  DRUMS.forEach(drum => {
    const pad = document.createElement('div');
    pad.className = 'drum-pad';
    pad.id = 'pad-' + drum.id;
    pad.style.setProperty('--pad-color', drum.color);
    pad.style.setProperty('--pad-color-dim', drum.colorDim);
    pad.innerHTML = `
      <div class="hit-ring" id="ring-${drum.id}"></div>
      <div class="pad-icon">${drum.icon}</div>
      <div class="pad-name">${drum.name}</div>
      <div class="pad-key">${drum.key}</div>
      <div class="velocity-bar"></div>
    `;
    pad.addEventListener('mousedown', e => { e.preventDefault(); triggerDrum(drum.id); });
    pad.addEventListener('touchstart', e => { e.preventDefault(); triggerDrum(drum.id); }, { passive: false });
    container.appendChild(pad);
  });
}

// ============================================================
// Trigger Drum
// ============================================================
function triggerDrum(drumId) {
  const drum = DRUMS.find(d => d.id === drumId);
  if (!drum) return;

  const ctx = getAudioCtx();
  soundSynths[drumId] && soundSynths[drumId](ctx, masterGain);

  // Visual feedback
  const pad = document.getElementById('pad-' + drumId);
  pad.classList.remove('active');
  void pad.offsetWidth; // reflow
  pad.classList.add('active');

  // Ring animation
  const ring = document.getElementById('ring-' + drumId);
  ring.classList.remove('animate');
  void ring.offsetWidth;
  ring.classList.add('animate');

  setTimeout(() => pad.classList.remove('active'), 150);

  // VU meter hit
  vuLevel = 1;
  animateVU();

  // Hit count
  hitCount++;
  document.getElementById('hitCount').textContent = hitCount;

  // Record
  if (isRecording) {
    const time = performance.now() - recordingStart;
    recordedNotes.push({ drumId, time, color: drum.color });
    updateTimeline();
    document.getElementById('recordedCount').textContent = recordedNotes.length + ' notes';
  }
}

// ============================================================
// VU Meter
// ============================================================
function animateVU() {
  if (vuAnimFrame) cancelAnimationFrame(vuAnimFrame);
  const bars = document.querySelectorAll('.vu-bar');

  function step() {
    vuLevel *= 0.88;
    bars.forEach((bar, i) => {
      const threshold = i / 8;
      const height = Math.max(2, vuLevel * 20 * (1 - threshold * 0.5));
      bar.style.height = height + 'px';
    });
    if (vuLevel > 0.01) vuAnimFrame = requestAnimationFrame(step);
    else bars.forEach(b => b.style.height = '2px');
  }
  requestAnimationFrame(step);
}

// ============================================================
// Timeline
// ============================================================
function updateTimeline() {
  const bar = document.getElementById('timelineBar');
  if (recordedNotes.length === 0) {
    bar.innerHTML = '<span class="timeline-empty">No recording yet — hit Record and play!</span>';
    return;
  }
  const duration = recordedNotes[recordedNotes.length - 1].time;
  bar.innerHTML = '';
  recordedNotes.forEach(note => {
    const el = document.createElement('div');
    el.className = 'timeline-event';
    el.style.background = note.color;
    el.style.boxShadow = `0 0 6px ${note.color}`;
    el.title = DRUMS.find(d => d.id === note.drumId)?.name || note.drumId;
    bar.appendChild(el);
  });
}

// ============================================================
// Record / Play
// ============================================================
function toggleRecord() {
  if (isPlaying) stopAll();

  if (!isRecording) {
    isRecording = true;
    recordingStart = performance.now();
    document.getElementById('btnRecord').textContent = '⏹ Stop Rec';
    document.getElementById('btnRecord').classList.add('recording');
    document.getElementById('recDot').style.display = 'block';
    setStatus('recording', '● Recording...');
    getAudioCtx(); // init
  } else {
    isRecording = false;
    document.getElementById('btnRecord').textContent = '⏺ Record';
    document.getElementById('btnRecord').classList.remove('recording');
    document.getElementById('recDot').style.display = 'none';
    document.getElementById('btnPlay').disabled = recordedNotes.length === 0;
    setStatus('active', 'Ready');
  }
}

function togglePlay() {
  if (isPlaying) {
    stopAll();
  } else {
    startPlayback();
  }
}

function startPlayback() {
  if (recordedNotes.length === 0) return;
  if (isRecording) toggleRecord();

  isPlaying = true;
  document.getElementById('btnPlay').textContent = '⏹ Stop';
  document.getElementById('btnStop').style.display = 'inline-block';
  setStatus('playing', '▶ Playing...');

  const duration = recordedNotes[recordedNotes.length - 1].time;
  const cursor = document.getElementById('playbackCursor');
  const timelineEl = document.getElementById('timeline');
  cursor.classList.add('active');

  const startTime = performance.now();

  // Animate cursor
  function animCursor() {
    if (!isPlaying) return;
    const elapsed = performance.now() - startTime;
    const pct = Math.min(elapsed / duration, 1);
    const timelineW = timelineEl.offsetWidth - 30;
    cursor.style.left = (20 + pct * timelineW) + 'px';
    if (pct < 1) requestAnimationFrame(animCursor);
  }
  requestAnimationFrame(animCursor);

  // Schedule all notes
  const timeouts = [];
  recordedNotes.forEach(note => {
    const t = setTimeout(() => {
      if (isPlaying) triggerDrum(note.drumId);
    }, note.time);
    timeouts.push(t);
  });

  // End
  const endT = setTimeout(() => {
    stopAll();
  }, duration + 200);
  timeouts.push(endT);
  playbackTimeout = timeouts;
}

function stopAll() {
  if (isRecording) {
    isRecording = false;
    document.getElementById('btnRecord').textContent = '⏺ Record';
    document.getElementById('btnRecord').classList.remove('recording');
    document.getElementById('recDot').style.display = 'none';
  }

  if (playbackTimeout) {
    if (Array.isArray(playbackTimeout)) playbackTimeout.forEach(clearTimeout);
    else clearTimeout(playbackTimeout);
    playbackTimeout = null;
  }

  isPlaying = false;
  document.getElementById('btnPlay').textContent = '▶ Play';
  document.getElementById('btnPlay').disabled = recordedNotes.length === 0;
  document.getElementById('btnStop').style.display = 'none';
  document.getElementById('playbackCursor').classList.remove('active');
  setStatus('active', 'Ready');
}

function clearRecording() {
  stopAll();
  recordedNotes = [];
  document.getElementById('btnPlay').disabled = true;
  document.getElementById('recordedCount').textContent = '0 notes';
  updateTimeline();
}

// ============================================================
// Status
// ============================================================
function setStatus(type, text) {
  const dot = document.getElementById('statusDot');
  const label = document.getElementById('statusText');
  dot.className = 'status-dot ' + type;
  label.textContent = text;
}

// ============================================================
// BPM & Metronome
// ============================================================
function changeBPM(delta) {
  bpm = Math.max(40, Math.min(240, bpm + delta));
  document.getElementById('bpmDisplay').textContent = bpm;
  if (metronomeOn) {
    stopMetronome();
    startMetronome();
  }
}

function toggleMetronome() {
  metronomeOn = !metronomeOn;
  const btn = document.getElementById('btnMetro');
  if (metronomeOn) {
    btn.textContent = 'ON';
    btn.style.color = 'var(--accent-yellow)';
    btn.style.borderColor = 'var(--accent-yellow)';
    btn.style.boxShadow = '0 0 10px rgba(255,215,0,0.4)';
    startMetronome();
  } else {
    btn.textContent = 'OFF';
    btn.style.color = '';
    btn.style.borderColor = '';
    btn.style.boxShadow = '';
    stopMetronome();
  }
}

function startMetronome() {
  const interval = (60 / bpm) * 1000;
  metroBeat = 0;
  metronomeInterval = setInterval(() => {
    // Click sound
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    const isDownbeat = metroBeat === 0;
    osc.frequency.value = isDownbeat ? 1200 : 800;
    g.gain.setValueAtTime(isDownbeat ? 0.3 : 0.15, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.05);
    osc.connect(g);
    g.connect(masterGain);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.05);

    // Light up beat dot
    const dots = document.querySelectorAll('.metro-beat');
    dots.forEach(d => d.classList.remove('tick'));
    const dot = document.getElementById('mb' + metroBeat);
    if (dot) dot.classList.add('tick');
    setTimeout(() => dot && dot.classList.remove('tick'), 100);

    metroBeat = (metroBeat + 1) % 4;
  }, interval);
}

function stopMetronome() {
  clearInterval(metronomeInterval);
  document.querySelectorAll('.metro-beat').forEach(d => d.classList.remove('tick'));
}

// ============================================================
// Keyboard Input
// ============================================================
const keyMap = {};
DRUMS.forEach(d => { keyMap[d.key.toLowerCase()] = d.id; });

document.addEventListener('keydown', e => {
  if (e.repeat) return;
  const key = e.key.toLowerCase();

  if (key === ' ') { e.preventDefault(); toggleRecord(); return; }
  if (key === 'enter') { e.preventDefault(); togglePlay(); return; }

  const drumId = keyMap[key];
  if (drumId) {
    e.preventDefault();
    triggerDrum(drumId);
  }
});

// ============================================================
// Init
// ============================================================
buildPads();
updateTimeline();
</script>
