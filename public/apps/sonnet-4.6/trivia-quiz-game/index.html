<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>American Trivia Quiz</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --card2: #253047;
      --accent: #3b82f6;
      --accent2: #6366f1;
      --green: #22c55e;
      --red: #ef4444;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --border: #334155;
      --radius: 18px;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(59,130,246,0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(99,102,241,0.08) 0%, transparent 50%);
    }

    #app {
      width: 100%;
      max-width: 680px;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 28px;
    }
    .header h1 {
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 800;
      background: linear-gradient(135deg, #60a5fa, #818cf8, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }
    .header p {
      color: var(--muted);
      font-size: 0.95rem;
      margin-top: 4px;
    }

    /* ── Progress ── */
    .progress-wrap {
      margin-bottom: 22px;
    }
    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 7px;
    }
    .progress-track {
      height: 8px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width 0.45s cubic-bezier(.4,0,.2,1);
    }

    /* ── Card ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 28px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.35);
      animation: fadeSlide 0.38s ease both;
    }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(20px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .question-num {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
    }
    .question-text {
      font-size: clamp(1.1rem, 3vw, 1.35rem);
      font-weight: 700;
      line-height: 1.45;
      color: var(--text);
      margin-bottom: 26px;
    }

    /* ── Choices ── */
    .choices {
      display: grid;
      gap: 11px;
    }
    .choice-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--card2);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      cursor: pointer;
      font-size: 1rem;
      color: var(--text);
      text-align: left;
      transition: border-color 0.18s, background 0.18s, transform 0.15s;
      position: relative;
      overflow: hidden;
    }
    .choice-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.03), transparent);
      pointer-events: none;
    }
    .choice-btn:hover:not(:disabled) {
      border-color: var(--accent);
      background: #1e3a5f;
      transform: translateX(3px);
    }
    .choice-btn:disabled { cursor: default; }

    .choice-letter {
      width: 32px; height: 32px;
      min-width: 32px;
      border-radius: 8px;
      background: var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.82rem;
      font-weight: 800;
      color: var(--muted);
      transition: background 0.18s, color 0.18s;
    }

    .choice-btn.correct {
      border-color: var(--green);
      background: rgba(34,197,94,0.12);
      animation: pulse-green 0.4s ease;
    }
    .choice-btn.correct .choice-letter { background: var(--green); color: #fff; }

    .choice-btn.wrong {
      border-color: var(--red);
      background: rgba(239,68,68,0.10);
      animation: shake 0.35s ease;
    }
    .choice-btn.wrong .choice-letter { background: var(--red); color: #fff; }

    @keyframes pulse-green {
      0%   { box-shadow: 0 0 0 0 rgba(34,197,94,0.5); }
      70%  { box-shadow: 0 0 0 12px rgba(34,197,94,0); }
      100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%     { transform: translateX(-6px); }
      60%     { transform: translateX(6px); }
    }

    /* ── Feedback banner ── */
    .feedback {
      margin-top: 18px;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.95rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.25s, transform 0.25s;
    }
    .feedback.show { opacity: 1; transform: translateY(0); }
    .feedback.correct-fb { background: rgba(34,197,94,0.13); border: 1px solid rgba(34,197,94,0.3); color: #4ade80; }
    .feedback.wrong-fb  { background: rgba(239,68,68,0.13);  border: 1px solid rgba(239,68,68,0.3);  color: #f87171; }

    /* ── Next button ── */
    .next-btn {
      display: block;
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(59,130,246,0.3);
    }
    .next-btn.show {
      opacity: 1;
      pointer-events: auto;
    }
    .next-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(59,130,246,0.45); }
    .next-btn:active { transform: translateY(0); }

    /* ── Score screen ── */
    .score-screen {
      text-align: center;
      padding: 10px 0;
      animation: fadeSlide 0.5s ease both;
    }
    .score-icon {
      font-size: 5rem;
      margin-bottom: 16px;
      display: block;
      animation: pop 0.5s cubic-bezier(.175,.885,.32,1.275) both;
    }
    @keyframes pop {
      from { transform: scale(0.3); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    .score-title {
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 800;
      margin-bottom: 8px;
    }
    .score-sub {
      color: var(--muted);
      font-size: 1rem;
      margin-bottom: 28px;
    }
    .score-big {
      font-size: clamp(3rem, 10vw, 5rem);
      font-weight: 900;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 6px;
    }
    .score-label {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 32px;
    }

    .score-bars {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 28px;
    }
    .score-stat {
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
    }
    .score-stat .val {
      font-size: 1.6rem;
      font-weight: 800;
      margin-bottom: 2px;
    }
    .score-stat .lbl { font-size: 0.78rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; }
    .correct-stat .val { color: var(--green); }
    .wrong-stat .val   { color: var(--red); }

    .restart-btn {
      padding: 14px 36px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(99,102,241,0.4);
    }
    .restart-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(99,102,241,0.5); }

    /* ── Start screen ── */
    .start-screen {
      text-align: center;
      animation: fadeSlide 0.4s ease both;
    }
    .start-screen .flag { font-size: 4rem; display: block; margin-bottom: 16px; animation: pop 0.5s ease both; }
    .start-screen h2 { font-size: 1.5rem; font-weight: 800; margin-bottom: 8px; }
    .start-screen p { color: var(--muted); margin-bottom: 28px; line-height: 1.6; }
    .start-btn {
      padding: 14px 40px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(59,130,246,0.4);
      transition: transform 0.15s, box-shadow 0.2s;
    }
    .start-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(59,130,246,0.5); }

    /* ── Confetti canvas ── */
    #confetti { position: fixed; inset: 0; pointer-events: none; z-index: 100; }
  </style>
</head>
<body>
<canvas id="confetti"></canvas>
<div id="app">
  <div class="header">
    <h1>American Trivia Quiz</h1>
    <p>Test your knowledge of the United States!</p>
  </div>
  <div id="main"></div>
</div>

<script>
const ALL_QUESTIONS = [
  {
    q: "How many stars are on the United States flag?",
    choices: ["48", "50", "52", "13"],
    answer: 1,
    explain: "The flag has 50 stars — one for each state in the Union."
  },
  {
    q: "Which document begins with \"We the People\"?",
    choices: ["The Declaration of Independence", "The Bill of Rights", "The Constitution", "The Federalist Papers"],
    answer: 2,
    explain: "The U.S. Constitution opens with the famous preamble \"We the People.\""
  },
  {
    q: "What is the capital city of the United States?",
    choices: ["New York City", "Los Angeles", "Chicago", "Washington, D.C."],
    answer: 3,
    explain: "Washington, D.C. (District of Columbia) has been the nation's capital since 1800."
  },
  {
    q: "On what date did the United States declare independence?",
    choices: ["July 4, 1776", "July 4, 1787", "September 17, 1787", "June 15, 1775"],
    answer: 0,
    explain: "The Declaration of Independence was adopted on July 4, 1776."
  },
  {
    q: "Who was the first President of the United States?",
    choices: ["John Adams", "Thomas Jefferson", "Benjamin Franklin", "George Washington"],
    answer: 3,
    explain: "George Washington became the first U.S. President in 1789."
  },
  {
    q: "How many amendments are in the Bill of Rights?",
    choices: ["7", "8", "10", "12"],
    answer: 2,
    explain: "The Bill of Rights consists of the first 10 amendments to the Constitution."
  },
  {
    q: "Which ocean borders the East Coast of the United States?",
    choices: ["Pacific Ocean", "Arctic Ocean", "Indian Ocean", "Atlantic Ocean"],
    answer: 3,
    explain: "The Atlantic Ocean lies along the eastern coast of the U.S."
  },
  {
    q: "What is the national bird of the United States?",
    choices: ["Golden Eagle", "Bald Eagle", "Wild Turkey", "Great Blue Heron"],
    answer: 1,
    explain: "The Bald Eagle was chosen as the national bird and symbol in 1782."
  },
  {
    q: "How many senators does each U.S. state send to Congress?",
    choices: ["1", "2", "3", "4"],
    answer: 1,
    explain: "Each of the 50 states is represented by exactly 2 senators."
  },
  {
    q: "Which war was fought between the Northern and Southern states of the United States?",
    choices: ["The Revolutionary War", "The War of 1812", "The Civil War", "World War I"],
    answer: 2,
    explain: "The American Civil War (1861–1865) was fought between the Union (North) and the Confederacy (South)."
  },
  {
    q: "What is the largest state in the United States by area?",
    choices: ["Texas", "California", "Montana", "Alaska"],
    answer: 3,
    explain: "Alaska is by far the largest U.S. state, more than twice the size of Texas."
  },
  {
    q: "Who wrote the Declaration of Independence?",
    choices: ["George Washington", "Benjamin Franklin", "Thomas Jefferson", "James Madison"],
    answer: 2,
    explain: "Thomas Jefferson was the primary author of the Declaration of Independence."
  },
  {
    q: "How many stripes are on the U.S. flag?",
    choices: ["13", "15", "50", "20"],
    answer: 0,
    explain: "The 13 stripes represent the original 13 colonies."
  },
  {
    q: "In what year did the United States land astronauts on the Moon for the first time?",
    choices: ["1961", "1965", "1969", "1972"],
    answer: 2,
    explain: "Apollo 11 landed on the Moon on July 20, 1969."
  },
  {
    q: "What river is the longest in the United States?",
    choices: ["Colorado River", "Ohio River", "Missouri River", "Mississippi River"],
    answer: 2,
    explain: "The Missouri River is slightly longer than the Mississippi, though both are among the longest."
  }
];

const LETTERS = ['A','B','C','D'];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let questions = [];
let current = 0;
let score = 0;
let answered = false;
let phase = 'start'; // start | quiz | end

function pickQuestions() {
  const pool = shuffle(ALL_QUESTIONS).slice(0, 10);
  // For each question, shuffle answer order but track correct index
  questions = pool.map(q => {
    const indexed = q.choices.map((c, i) => ({ text: c, orig: i }));
    const shuffled = shuffle(indexed);
    const newAnswer = shuffled.findIndex(x => x.orig === q.answer);
    return {
      q: q.q,
      choices: shuffled.map(x => x.text),
      answer: newAnswer,
      explain: q.explain
    };
  });
}

function render() {
  const main = document.getElementById('main');
  if (phase === 'start') { main.innerHTML = startHTML(); return; }
  if (phase === 'end')   { main.innerHTML = endHTML();   return; }
  main.innerHTML = quizHTML();
  attachEvents();
}

function startHTML() {
  return `
    <div class="card start-screen">
      <span class="flag">🇺🇸</span>
      <h2>Ready to test your knowledge?</h2>
      <p>10 questions about American history, civics, and geography.<br>Basic level — good luck!</p>
      <button class="start-btn" onclick="startQuiz()">Start Quiz</button>
    </div>`;
}

function quizHTML() {
  const q = questions[current];
  const pct = (current / questions.length) * 100;
  return `
    <div class="progress-wrap">
      <div class="progress-meta">
        <span>Question ${current + 1} of ${questions.length}</span>
        <span>${score} correct</span>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="card">
      <div class="question-num">Question ${current + 1}</div>
      <div class="question-text">${q.q}</div>
      <div class="choices">
        ${q.choices.map((c, i) => `
          <button class="choice-btn" data-idx="${i}">
            <span class="choice-letter">${LETTERS[i]}</span>
            <span>${c}</span>
          </button>`).join('')}
      </div>
      <div class="feedback" id="feedback"></div>
      <button class="next-btn" id="nextBtn" onclick="nextQuestion()">
        ${current + 1 < questions.length ? 'Next Question →' : 'See Results →'}
      </button>
    </div>`;
}

function endHTML() {
  const pct = Math.round((score / questions.length) * 100);
  let emoji, title, sub;
  if (pct === 100)       { emoji = '🏆'; title = 'Perfect Score!';    sub = 'Outstanding — you aced it!'; }
  else if (pct >= 80)    { emoji = '🌟'; title = 'Excellent!';         sub = 'You really know your stuff!'; }
  else if (pct >= 60)    { emoji = '👍'; title = 'Good Job!';          sub = 'Solid knowledge overall.'; }
  else if (pct >= 40)    { emoji = '📚'; title = 'Keep Studying!';     sub = 'A bit more practice and you\'ll nail it.'; }
  else                   { emoji = '💪'; title = 'Don\'t Give Up!';    sub = 'Every quiz is a chance to learn.'; }

  return `
    <div class="card score-screen">
      <span class="score-icon">${emoji}</span>
      <div class="score-title">${title}</div>
      <div class="score-sub">${sub}</div>
      <div class="score-big">${pct}%</div>
      <div class="score-label">Final Score</div>
      <div class="score-bars">
        <div class="score-stat correct-stat">
          <div class="val">${score}</div>
          <div class="lbl">Correct</div>
        </div>
        <div class="score-stat wrong-stat">
          <div class="val">${questions.length - score}</div>
          <div class="lbl">Incorrect</div>
        </div>
      </div>
      <button class="restart-btn" onclick="restart()">Play Again</button>
    </div>`;
}

function attachEvents() {
  document.querySelectorAll('.choice-btn').forEach(btn => {
    btn.addEventListener('click', () => handleAnswer(parseInt(btn.dataset.idx)));
  });
}

function handleAnswer(idx) {
  if (answered) return;
  answered = true;

  const q = questions[current];
  const isCorrect = idx === q.answer;
  if (isCorrect) score++;

  // Style buttons
  document.querySelectorAll('.choice-btn').forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.answer) btn.classList.add('correct');
    else if (i === idx && !isCorrect) btn.classList.add('wrong');
  });

  // Feedback
  const fb = document.getElementById('feedback');
  if (isCorrect) {
    fb.textContent = '✓  Correct! ' + q.explain;
    fb.className = 'feedback show correct-fb';
  } else {
    fb.textContent = '✗  ' + q.explain;
    fb.className = 'feedback show wrong-fb';
  }

  // Show next button
  const nextBtn = document.getElementById('nextBtn');
  setTimeout(() => nextBtn.classList.add('show'), 200);
}

function nextQuestion() {
  current++;
  answered = false;
  if (current >= questions.length) {
    phase = 'end';
    render();
    if (score / questions.length >= 0.6) launchConfetti();
  } else {
    render();
  }
}

function startQuiz() {
  pickQuestions();
  current = 0;
  score = 0;
  answered = false;
  phase = 'quiz';
  render();
}

function restart() {
  stopConfetti();
  startQuiz();
}

// ── Confetti ──────────────────────────────────────────────────────────────
let confettiAnim = null;
const canvas = document.getElementById('confetti');
const ctx = canvas.getContext('2d');
let particles = [];

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

const CONFETTI_COLORS = ['#3b82f6','#6366f1','#a78bfa','#22c55e','#f59e0b','#ec4899','#f1f5f9'];

function createParticle() {
  return {
    x: Math.random() * canvas.width,
    y: -10,
    vx: (Math.random() - 0.5) * 3,
    vy: Math.random() * 3 + 2,
    w: Math.random() * 10 + 6,
    h: Math.random() * 5 + 4,
    color: CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)],
    rot: Math.random() * Math.PI * 2,
    rotV: (Math.random() - 0.5) * 0.15,
    opacity: 1
  };
}

function launchConfetti() {
  particles = [];
  for (let i = 0; i < 140; i++) {
    const p = createParticle();
    p.y = Math.random() * canvas.height * 0.4; // spread initial positions
    particles.push(p);
  }
  let frame = 0;
  function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (frame < 60) {
      for (let i = 0; i < 3; i++) particles.push(createParticle());
    }
    particles.forEach(p => {
      p.x  += p.vx;
      p.y  += p.vy;
      p.rot += p.rotV;
      p.vy += 0.04;
      if (p.y > canvas.height * 0.8) p.opacity -= 0.02;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.globalAlpha = Math.max(0, p.opacity);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
    });
    particles = particles.filter(p => p.opacity > 0);
    frame++;
    if (particles.length > 0 || frame < 80) {
      confettiAnim = requestAnimationFrame(loop);
    } else {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
  }
  confettiAnim = requestAnimationFrame(loop);
}

function stopConfetti() {
  if (confettiAnim) { cancelAnimationFrame(confettiAnim); confettiAnim = null; }
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles = [];
}

// ── Init ──────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
