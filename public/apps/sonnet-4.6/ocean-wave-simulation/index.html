<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ocean Wave Simulation</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #050d1a;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  overflow: hidden;
  height: 100vh; width: 100vw;
}
canvas {
  display: block;
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
}
#ui {
  position: absolute;
  top: 20px; right: 20px;
  background: rgba(5, 15, 35, 0.78);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(80, 180, 255, 0.18);
  border-radius: 18px;
  padding: 22px 26px 18px;
  color: #b8ddf8;
  width: 250px;
  z-index: 10;
  box-shadow: 0 12px 40px rgba(0,0,0,0.55), inset 0 1px 0 rgba(120,200,255,0.08);
}
#ui h2 {
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #4ab8ff;
  margin-bottom: 20px;
  font-weight: 500;
}
.ctrl {
  margin-bottom: 16px;
}
.ctrl label {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 11.5px;
  letter-spacing: 0.3px;
  margin-bottom: 7px;
  color: #88b8d8;
}
.ctrl label .val {
  color: #4ab8ff;
  font-weight: 600;
  font-size: 12px;
  min-width: 52px;
  text-align: right;
}
input[type=range] {
  width: 100%;
  -webkit-appearance: none;
  appearance: none;
  height: 3px;
  border-radius: 3px;
  background: rgba(80,180,255,0.18);
  outline: none;
  cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 15px; height: 15px;
  border-radius: 50%;
  background: #4ab8ff;
  box-shadow: 0 0 0 3px rgba(74,184,255,0.2), 0 0 10px rgba(74,184,255,0.5);
  cursor: pointer;
  transition: transform 0.12s, box-shadow 0.12s;
}
input[type=range]:hover::-webkit-slider-thumb,
input[type=range]:active::-webkit-slider-thumb {
  transform: scale(1.25);
  box-shadow: 0 0 0 4px rgba(74,184,255,0.3), 0 0 16px rgba(74,184,255,0.7);
}
.sep {
  height: 1px;
  background: rgba(80,180,255,0.1);
  margin: 18px 0 16px;
}
.stats {
  display: flex;
  justify-content: space-between;
  font-size: 10.5px;
  color: rgba(136,184,216,0.55);
  margin-top: 16px;
  padding-top: 12px;
  border-top: 1px solid rgba(80,180,255,0.08);
}
.stats span { color: rgba(74,184,255,0.75); }
#watermark {
  position: absolute;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 11px;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: rgba(160,210,255,0.22);
  pointer-events: none;
  white-space: nowrap;
  z-index: 5;
  font-weight: 300;
}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="ui">
  <h2>&#9679; Ocean Controls</h2>

  <div class="ctrl">
    <label>Wind Speed <span class="val" id="windVal">12 kts</span></label>
    <input type="range" id="wind" min="0" max="50" value="12" step="0.5">
  </div>
  <div class="ctrl">
    <label>Wave Height <span class="val" id="heightVal">1.00 m</span></label>
    <input type="range" id="waveHeight" min="0.05" max="3.5" value="1.0" step="0.05">
  </div>
  <div class="ctrl">
    <label>Choppiness <span class="val" id="choppyVal">0.50</span></label>
    <input type="range" id="choppy" min="0" max="1" value="0.5" step="0.01">
  </div>

  <div class="sep"></div>

  <div class="ctrl">
    <label>Sun Elevation <span class="val" id="sunElevVal">45°</span></label>
    <input type="range" id="sunElev" min="2" max="88" value="45" step="1">
  </div>
  <div class="ctrl">
    <label>Sun Direction <span class="val" id="sunAzVal">30°</span></label>
    <input type="range" id="sunAz" min="0" max="360" value="30" step="1">
  </div>
  <div class="ctrl">
    <label>Time of Day <span class="val" id="todVal">Midday</span></label>
    <input type="range" id="tod" min="0" max="100" value="60" step="1">
  </div>

  <div class="sep"></div>

  <div class="ctrl">
    <label>Water Depth <span class="val" id="depthVal">Deep</span></label>
    <input type="range" id="depth" min="0" max="100" value="80" step="1">
  </div>
  <div class="ctrl">
    <label>Turbidity <span class="val" id="turbVal">0.30</span></label>
    <input type="range" id="turb" min="0" max="1" value="0.3" step="0.01">
  </div>

  <div class="stats">
    Beaufort <span id="beaufort">3</span> &ensp;|&ensp;
    Period <span id="period">4.2s</span> &ensp;|&ensp;
    State <span id="seaState">Slight</span>
  </div>
</div>

<div id="watermark">Ocean Wave Simulation</div>

<script>
'use strict';

// ── Canvas & WebGL ──────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2') || canvas.getContext('experimental-webgl');
if (!gl) { document.body.innerHTML = '<p style="color:#fff;padding:40px">WebGL not supported.</p>'; }

let W = 0, H = 0;

// ── Params ──────────────────────────────────────────────────────────────────
const P = {
  wind: 12, waveHeight: 1.0, choppy: 0.5,
  sunElev: 45, sunAz: 30,
  tod: 60,   // 0-100
  depth: 80, turb: 0.3
};

// ── GLSL ─────────────────────────────────────────────────────────────────────
const VS = `
attribute vec2 aPos;
varying vec2 vUV;
void main() {
  vUV = aPos * 0.5 + 0.5;
  gl_Position = vec4(aPos, 0.0, 1.0);
}
`;

const FS = `
precision highp float;
varying vec2 vUV;

uniform float uTime;
uniform float uWind;
uniform float uHeight;
uniform float uChoppy;
uniform float uSunElev;   // degrees
uniform float uSunAz;     // degrees
uniform float uTOD;       // 0..1
uniform float uDepth;     // 0..1
uniform float uTurb;      // 0..1
uniform vec2  uRes;

// ── Utility ──────────────────────────────────────────────────────────────────
#define PI 3.14159265
#define TAU 6.28318530

float hash12(vec2 p) {
  p = fract(p * vec2(127.1, 311.7));
  p += dot(p, p + 45.32);
  return fract(p.x * p.y);
}
float hash11(float p) { return fract(sin(p) * 43758.5453); }

float vnoise(vec2 p) {
  vec2 i = floor(p), f = fract(p);
  vec2 u = f * f * (3.0 - 2.0 * f);
  float a = hash12(i);
  float b = hash12(i + vec2(1,0));
  float c = hash12(i + vec2(0,1));
  float d = hash12(i + vec2(1,1));
  return mix(mix(a,b,u.x), mix(c,d,u.x), u.y);
}

float fbm(vec2 p, int oct) {
  float v = 0.0, a = 0.55, f = 1.0, tot = 0.0;
  mat2 R = mat2(0.8,-0.6, 0.6,0.8);
  for(int i=0; i<8; i++){
    if(i >= oct) break;
    v += a * vnoise(p * f);
    tot += a;
    f *= 1.95; a *= 0.5;
    p = R * p;
  }
  return v / tot;
}

// ── Gerstner Waves ───────────────────────────────────────────────────────────
struct Wave { vec2 dir; float k; float amp; float spd; };

vec3 gerstnerSum(vec2 xz, float t) {
  float ws = uWind * 0.05;
  float h  = uHeight;
  float ch = uChoppy;

  Wave waves[6];
  waves[0] = Wave(normalize(vec2(1.0,  0.0)),  0.7,  0.40 * h, 1.0  + ws);
  waves[1] = Wave(normalize(vec2(0.9,  0.4)),  1.3,  0.25 * h, 0.88 + ws);
  waves[2] = Wave(normalize(vec2(1.0, -0.3)),  2.1,  0.18 * h, 1.12 + ws);
  waves[3] = Wave(normalize(vec2(0.6,  0.8)),  3.5,  0.12 * h, 0.75 + ws);
  waves[4] = Wave(normalize(vec2(-0.2, 1.0)),  5.0,  0.07 * h, 1.4  + ws);
  waves[5] = Wave(normalize(vec2(0.8, -0.6)),  8.0,  0.04 * h, 0.6  + ws);

  vec3 pos = vec3(0.0);
  for(int i=0; i<6; i++){
    float phi = waves[i].k * dot(waves[i].dir, xz) - waves[i].spd * t;
    float s = sin(phi), c = cos(phi);
    pos.y   += waves[i].amp * s;
    pos.x   += ch * waves[i].amp * c * waves[i].dir.x;
    pos.z   += ch * waves[i].amp * c * waves[i].dir.y;
  }
  return pos;
}

vec3 gerstnerNormal(vec2 xz, float t) {
  float e = 0.018;
  vec3 px = gerstnerSum(xz + vec2(e,0.0), t);
  vec3 mx = gerstnerSum(xz - vec2(e,0.0), t);
  vec3 pz = gerstnerSum(xz + vec2(0.0,e), t);
  vec3 mz = gerstnerSum(xz - vec2(0.0,e), t);
  return normalize(cross(pz - mz, px - mx));
}

// ── Sky / Atmosphere ─────────────────────────────────────────────────────────
vec3 skyGradient(vec3 dir, vec3 sun, float tod) {
  float elev = dir.y;
  float sunDot = dot(dir, sun);

  // Zenith / horizon colours keyed to time-of-day
  vec3 zenith, horiz;
  if (tod < 0.25) {
    // Night -> dawn
    float t = tod / 0.25;
    zenith = mix(vec3(0.005,0.008,0.03), vec3(0.04,0.06,0.18), t);
    horiz  = mix(vec3(0.01,0.01,0.04),  vec3(0.55,0.22,0.08), t);
  } else if (tod < 0.45) {
    // Dawn -> morning
    float t = (tod - 0.25) / 0.2;
    zenith = mix(vec3(0.04,0.06,0.18), vec3(0.12,0.25,0.58), t);
    horiz  = mix(vec3(0.55,0.22,0.08), vec3(0.62,0.72,0.92), t);
  } else if (tod < 0.75) {
    // Midday
    float t = (tod - 0.45) / 0.3;
    zenith = mix(vec3(0.12,0.25,0.58), vec3(0.1,0.3,0.7), t);
    horiz  = mix(vec3(0.62,0.72,0.92), vec3(0.52,0.72,0.96), t);
  } else {
    // Afternoon -> sunset
    float t = (tod - 0.75) / 0.25;
    zenith = mix(vec3(0.1,0.3,0.7),   vec3(0.05,0.08,0.25), t);
    horiz  = mix(vec3(0.52,0.72,0.96),vec3(0.7,0.28,0.06), t);
  }

  float h = pow(clamp(1.0 - elev, 0.0, 1.0), 3.0);
  vec3 sky = mix(zenith, horiz, h);

  // Sun tint
  vec3 sunColor;
  if (tod < 0.3) sunColor = vec3(1.0, 0.5, 0.08);
  else if (tod < 0.5) sunColor = vec3(1.0, 0.82, 0.5);
  else if (tod < 0.75) sunColor = vec3(1.0, 0.96, 0.85);
  else sunColor = vec3(1.0, 0.55, 0.1);

  // Glow
  float glow = pow(max(0.0, sunDot), 12.0) * 0.35 + pow(max(0.0,sunDot), 3.0) * 0.08;
  sky += sunColor * glow;

  // Sun disc
  float disc = smoothstep(0.9996, 0.9999, sunDot);
  sky += sunColor * disc * 3.0;

  return sky;
}

// ── Ocean shading ────────────────────────────────────────────────────────────
vec3 oceanShade(vec2 worldXZ, vec3 N, vec3 V, vec3 sunDir, float foam, float dist) {

  // Water base colour (depth + turbidity)
  vec3 deepWater   = mix(vec3(0.01,0.04,0.10), vec3(0.01,0.06,0.16), uDepth);
  vec3 shallowWater= mix(vec3(0.04,0.18,0.22), vec3(0.02,0.14,0.28), uDepth);
  float depthBlend = exp(-dist * 0.06 * (1.0 - uDepth + 0.1));
  vec3 waterBase = mix(deepWater, shallowWater, depthBlend * 0.5);

  // Turbidity (scatter)
  vec3 turbCol = mix(vec3(0.02,0.12,0.18), vec3(0.18,0.14,0.06), uTurb);
  waterBase = mix(waterBase, turbCol, uTurb * 0.4);

  // Time-of-day water tint
  vec3 todTint;
  if (uTOD < 0.3) todTint = mix(vec3(0.3,0.35,0.55), vec3(0.7,0.55,0.35), uTOD/0.3);
  else if (uTOD < 0.75) todTint = mix(vec3(0.9,0.85,0.7), vec3(1.0,1.0,1.0), (uTOD-0.3)/0.45);
  else todTint = mix(vec3(1.0,0.95,0.85), vec3(0.6,0.45,0.3), (uTOD-0.75)/0.25);

  // Fresnel
  float cosTheta = clamp(dot(N, V), 0.0, 1.0);
  float F0 = 0.02;
  float fresnel = F0 + (1.0 - F0) * pow(1.0 - cosTheta, 5.0);

  // Reflected sky
  vec3 R = reflect(-V, N);
  vec3 reflectedSky = skyGradient(R, sunDir, uTOD);

  // Refracted / transmitted light
  vec3 refracted = waterBase * todTint;
  float NdotL = max(0.0, dot(N, sunDir));
  refracted += waterBase * NdotL * todTint * 0.5;

  // Specular highlight (Cook-Torrance simplified)
  vec3 H = normalize(sunDir + V);
  float NdotH = max(0.0, dot(N, H));
  float roughness = mix(0.02, 0.18, uTurb + (1.0 - uDepth) * 0.2);
  float spec = pow(NdotH, 2.0 / (roughness * roughness) - 1.0) * 0.15;

  vec3 sunColor;
  if (uTOD < 0.3) sunColor = vec3(1.0, 0.55, 0.15);
  else if (uTOD < 0.5) sunColor = vec3(1.0, 0.85, 0.55);
  else if (uTOD < 0.75) sunColor = vec3(1.0, 0.97, 0.88);
  else sunColor = vec3(1.0, 0.6, 0.15);

  // Combine
  vec3 col = mix(refracted, reflectedSky, fresnel);
  col += sunColor * spec * (0.8 + uWind * 0.015);

  // Subsurface scatter hint (light blue-green in lit areas)
  float sss = pow(max(0.0, dot(sunDir, -N)), 2.0) * 0.15;
  col += vec3(0.05, 0.25, 0.2) * sss * todTint;

  // Foam
  col = mix(col, vec3(0.9, 0.95, 1.0), clamp(foam, 0.0, 1.0) * 0.88);

  return col;
}

// ── Main ─────────────────────────────────────────────────────────────────────
void main() {
  vec2 ndc = vUV * 2.0 - 1.0;
  ndc.x *= uRes.x / uRes.y;

  // Camera: slightly elevated, tilted downward
  float eyeH = 1.6 + uHeight * 0.5;
  vec3 camPos = vec3(0.0, eyeH, 0.0);
  float tiltY = -0.1 - uHeight * 0.04 - uWind * 0.002;
  vec3 fwd    = normalize(vec3(0.0, tiltY, -1.0));
  vec3 right  = normalize(cross(fwd, vec3(0,1,0)));
  vec3 up     = cross(right, fwd);
  vec3 rayDir = normalize(fwd + right * ndc.x * 0.75 + up * ndc.y * 0.55);

  // Sun direction
  float sElev = radians(uSunElev);
  float sAz   = radians(uSunAz);
  vec3 sunDir = normalize(vec3(
    cos(sElev) * sin(sAz),
    sin(sElev),
    cos(sElev) * cos(sAz)
  ));

  vec3 col;

  if (rayDir.y >= -0.001) {
    // ── Sky ──
    col = skyGradient(rayDir, sunDir, uTOD);

    // Horizon haze
    float h = pow(clamp(1.0 - rayDir.y, 0.0, 1.0), 12.0);
    vec3 hazeCol = mix(vec3(0.5,0.65,0.85), vec3(0.75,0.42,0.12), clamp(1.0-uTOD*1.5,0.0,1.0));
    col = mix(col, hazeCol, h * 0.5);

    // Distant ocean tint blending at horizon
    float blendH = pow(clamp(1.0 - rayDir.y * 60.0, 0.0, 1.0), 2.0);
    vec3 oceanHorizon = mix(vec3(0.05,0.18,0.28), vec3(0.02,0.06,0.12), uTOD);
    col = mix(col, oceanHorizon, blendH * 0.35);
  } else {
    // ── Ocean ──
    // Intersection with y=0
    float t = -camPos.y / rayDir.y;
    t = max(0.01, t);
    vec2 wXZ = camPos.xz + rayDir.xz * t;

    float dist = t;

    // Scale for waves
    float wScale = (0.25 + uWind * 0.018);
    vec2 ws = wXZ * wScale;

    float spd = 0.8 + uWind * 0.025;
    float wt = uTime * spd;

    // Normal
    vec3 N = gerstnerNormal(ws, wt);

    // FBM detail normals (close-range)
    float nearW = exp(-dist * 0.35);
    float dx = fbm(ws * 3.0 + vec2(uTime * 0.15, 0.0), 4) - fbm(ws * 3.0 + vec2(uTime*0.15 + 0.03, 0.0), 4);
    float dz = fbm(ws * 3.0 + vec2(0.0, uTime * 0.12), 4) - fbm(ws * 3.0 + vec2(0.0, uTime*0.12 + 0.03), 4);
    vec3 detailN = normalize(vec3(dx * 0.8, 0.05, dz * 0.8));
    N = normalize(N + detailN * (0.25 + uChoppy * 0.3) * nearW);

    // Foam: whitecaps from choppiness + wind + wave peaks
    float foamFBM = fbm(ws * 1.5 + vec2(wt * 0.1), 5);
    float foamThresh = 0.58 - uChoppy * 0.12 - uWind * 0.004;
    float foam = smoothstep(foamThresh, foamThresh + 0.1, foamFBM) * (0.5 + uWind * 0.02);
    // Near-shore foam
    foam += pow(max(0.0, 1.0 - N.y - 0.6), 2.0) * uChoppy * 1.5;
    foam = clamp(foam, 0.0, 1.0);

    vec3 V = -rayDir;
    col = oceanShade(wXZ, N, V, sunDir, foam, dist);

    // Atmospheric fog
    float fog = 1.0 - exp(-dist * 0.01 * (0.5 + uTurb));
    vec3 fogCol = skyGradient(normalize(vec3(rayDir.x, 0.005, rayDir.z)), sunDir, uTOD);
    col = mix(col, fogCol, clamp(fog, 0.0, 0.85));

    // Horizon blend to sky
    float horizBlend = pow(clamp(1.0 + rayDir.y * 5.0, 0.0, 1.0), 3.0);
    vec3 horizSky = skyGradient(normalize(vec3(rayDir.x, 0.001, rayDir.z)), sunDir, uTOD);
    col = mix(horizSky, col, horizBlend);
  }

  // ── Post-process ────────────────────────────────────────────────────────────
  // ACES filmic tone mapping
  col = col * (col * 2.51 + 0.03) / (col * (col * 2.43 + 0.59) + 0.14);
  col = clamp(col, 0.0, 1.0);

  // Gamma 2.2
  col = pow(col, vec3(1.0 / 2.2));

  // Vignette
  vec2 vUV2 = vUV * 2.0 - 1.0;
  float vig = dot(vUV2 * vec2(0.65, 0.85), vUV2 * vec2(0.65, 0.85));
  vig = pow(clamp(1.0 - vig, 0.0, 1.0), 0.45);
  col *= vig;

  // Subtle color grading: slight cool-warm split
  col.r *= 0.97 + uTOD * 0.05;
  col.b *= 1.02 - uTOD * 0.04;

  gl_FragColor = vec4(col, 1.0);
}
`;

// ── Compile ──────────────────────────────────────────────────────────────────
function mkShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error('Shader error:', gl.getShaderInfoLog(s));
    console.error('Source:\n', src.split('\n').map((l,i)=>`${i+1}: ${l}`).join('\n'));
    return null;
  }
  return s;
}
function mkProg(vs, fs) {
  const p = gl.createProgram();
  gl.attachShader(p, mkShader(gl.VERTEX_SHADER, vs));
  gl.attachShader(p, mkShader(gl.FRAGMENT_SHADER, fs));
  gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS)) {
    console.error('Link error:', gl.getProgramInfoLog(p));
    return null;
  }
  return p;
}

const prog = mkProg(VS, FS);
gl.useProgram(prog);

// Full-screen quad
const vbo = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
const aPos = gl.getAttribLocation(prog, 'aPos');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

// Uniform cache
const U = {};
['uTime','uWind','uHeight','uChoppy','uSunElev','uSunAz','uTOD','uDepth','uTurb','uRes']
  .forEach(n => U[n] = gl.getUniformLocation(prog, n));

// ── Controls ──────────────────────────────────────────────────────────────────
const SEA_STATES = ['Calm','Calm','Smooth','Slight','Moderate','Rough','Very Rough','High','Very High','Phenomenal'];

function beaufort(kts) {
  if (kts < 1) return 0;
  if (kts < 3) return 1;
  if (kts < 7) return 2;
  if (kts < 11) return 3;
  if (kts < 16) return 4;
  if (kts < 21) return 5;
  if (kts < 27) return 6;
  if (kts < 33) return 7;
  if (kts < 40) return 8;
  if (kts < 47) return 9;
  return 10;
}

function wavePeriod(kts) {
  // T ≈ 0.57 * sqrt(fetch) approximation; simplified: T ≈ wind * 0.28
  const mps = kts * 0.5144;
  const T = Math.max(1.5, Math.min(18, mps * 0.28));
  return T.toFixed(1);
}

function todLabel(v) {
  const t = v / 100;
  if (t < 0.1) return 'Night';
  if (t < 0.22) return 'Pre-Dawn';
  if (t < 0.32) return 'Dawn';
  if (t < 0.45) return 'Morning';
  if (t < 0.65) return 'Midday';
  if (t < 0.8)  return 'Afternoon';
  if (t < 0.92) return 'Dusk';
  return 'Night';
}

function depthLabel(v) {
  if (v > 70) return 'Deep';
  if (v > 40) return 'Medium';
  if (v > 15) return 'Shallow';
  return 'Surf';
}

function updateStats() {
  const bf = beaufort(P.wind);
  document.getElementById('beaufort').textContent = bf;
  document.getElementById('period').textContent = wavePeriod(P.wind) + 's';
  document.getElementById('seaState').textContent = SEA_STATES[Math.min(bf, SEA_STATES.length-1)];
}

function bindControl(sliderId, key, displayId, fmt) {
  const slider = document.getElementById(sliderId);
  const display = document.getElementById(displayId);
  slider.addEventListener('input', () => {
    P[key] = parseFloat(slider.value);
    display.textContent = fmt(P[key]);
    updateStats();
  });
  display.textContent = fmt(P[key]);
}

bindControl('wind',       'wind',      'windVal',   v => `${v.toFixed(0)} kts`);
bindControl('waveHeight', 'waveHeight','heightVal', v => `${v.toFixed(2)} m`);
bindControl('choppy',     'choppy',    'choppyVal', v => v.toFixed(2));
bindControl('sunElev',    'sunElev',   'sunElevVal',v => `${v.toFixed(0)}\u00b0`);
bindControl('sunAz',      'sunAz',     'sunAzVal',  v => `${v.toFixed(0)}\u00b0`);
bindControl('tod',        'tod',       'todVal',    v => todLabel(v));
bindControl('depth',      'depth',     'depthVal',  v => depthLabel(v));
bindControl('turb',       'turb',      'turbVal',   v => v.toFixed(2));

updateStats();

// ── Render loop ───────────────────────────────────────────────────────────────
let t0 = performance.now();

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  gl.viewport(0, 0, W, H);
}
resize();
window.addEventListener('resize', resize);

function render(now) {
  requestAnimationFrame(render);
  const t = (now - t0) * 0.001;

  gl.useProgram(prog);
  gl.uniform1f(U.uTime,    t);
  gl.uniform1f(U.uWind,    P.wind);
  gl.uniform1f(U.uHeight,  P.waveHeight);
  gl.uniform1f(U.uChoppy,  P.choppy);
  gl.uniform1f(U.uSunElev, P.sunElev);
  gl.uniform1f(U.uSunAz,   P.sunAz);
  gl.uniform1f(U.uTOD,     P.tod / 100);
  gl.uniform1f(U.uDepth,   P.depth / 100);
  gl.uniform1f(U.uTurb,    P.turb);
  gl.uniform2f(U.uRes,     W, H);

  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

requestAnimationFrame(render);
</script>
</body>
</html>
