<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Language Learning Flashcards</title>
<style>
  :root {
    --primary: #6C63FF;
    --primary-dark: #5A52D5;
    --secondary: #FF6584;
    --accent: #43E97B;
    --bg: #0F0F1A;
    --surface: #1A1A2E;
    --surface2: #252540;
    --text: #E8E8F0;
    --text-muted: #9090B0;
    --learned: #43E97B;
    --card-front: linear-gradient(135deg, #1e1e3f 0%, #2d2d5e 100%);
    --card-back: linear-gradient(135deg, #3a1c71 0%, #d76d77 50%, #ffaf7b 100%);
    --shadow: 0 20px 60px rgba(0,0,0,0.5);
    --radius: 20px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(108,99,255,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(255,101,132,0.1) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(67,233,123,0.05) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 800px;
    margin: 0 auto;
    padding: 20px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── LANGUAGE SELECTION SCREEN ── */
  #lang-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 40px;
    animation: fadeIn 0.6s ease;
  }

  .logo {
    font-size: 3rem;
    margin-bottom: -10px;
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  .app-title {
    font-size: clamp(1.8rem, 5vw, 2.8rem);
    font-weight: 800;
    text-align: center;
    background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.2;
  }

  .app-subtitle {
    color: var(--text-muted);
    text-align: center;
    font-size: 1.1rem;
    max-width: 400px;
  }

  .lang-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
    width: 100%;
    max-width: 480px;
  }

  .lang-btn {
    background: var(--surface);
    border: 2px solid transparent;
    border-radius: var(--radius);
    padding: 24px 20px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    color: var(--text);
    position: relative;
    overflow: hidden;
  }

  .lang-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    opacity: 0;
    transition: opacity 0.3s;
  }

  .lang-btn:hover::before { opacity: 0.15; }
  .lang-btn:hover {
    border-color: var(--primary);
    transform: translateY(-4px) scale(1.02);
    box-shadow: 0 12px 40px rgba(108,99,255,0.3);
  }

  .lang-btn:active { transform: translateY(-2px) scale(0.99); }

  .lang-flag { font-size: 2.5rem; position: relative; z-index: 1; }
  .lang-name { font-size: 1.1rem; font-weight: 700; position: relative; z-index: 1; }
  .lang-native { font-size: 0.85rem; color: var(--text-muted); position: relative; z-index: 1; }

  /* ── MAIN APP SCREEN ── */
  #app-screen {
    flex: 1;
    display: none;
    flex-direction: column;
    gap: 24px;
    animation: fadeIn 0.6s ease;
  }

  #app-screen.visible { display: flex; }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .back-btn {
    background: var(--surface);
    border: none;
    border-radius: 12px;
    width: 40px;
    height: 40px;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 1.1rem;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .back-btn:hover { background: var(--surface2); color: var(--text); }

  .current-lang {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 700;
    font-size: 1.1rem;
  }

  .progress-info {
    color: var(--text-muted);
    font-size: 0.9rem;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .learned-badge {
    background: rgba(67,233,123,0.15);
    color: var(--accent);
    border-radius: 20px;
    padding: 2px 10px;
    font-size: 0.8rem;
    font-weight: 600;
  }

  /* Progress bar */
  .progress-bar-wrap {
    background: var(--surface);
    border-radius: 100px;
    height: 6px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--primary), var(--accent));
    border-radius: 100px;
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* Card area */
  .card-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    flex: 1;
  }

  .card-counter {
    color: var(--text-muted);
    font-size: 0.9rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    font-weight: 600;
  }

  /* Flashcard */
  .card-scene {
    width: 100%;
    max-width: 560px;
    height: 300px;
    perspective: 1200px;
    cursor: pointer;
  }

  .card {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.65s cubic-bezier(0.4, 0, 0.2, 1);
    border-radius: var(--radius);
  }

  .card.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    border-radius: var(--radius);
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
    box-shadow: var(--shadow);
  }

  .card-front {
    background: var(--card-front);
    border: 1px solid rgba(255,255,255,0.08);
  }

  .card-back {
    background: var(--card-back);
    transform: rotateY(180deg);
  }

  .card-face .label {
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0.6;
    margin-bottom: 16px;
  }

  .card-face .word {
    font-size: clamp(1.5rem, 4vw, 2.2rem);
    font-weight: 800;
    text-align: center;
    line-height: 1.3;
  }

  .card-face .phonetic {
    margin-top: 12px;
    font-size: 1rem;
    opacity: 0.65;
    font-style: italic;
    text-align: center;
  }

  .card-face .context {
    margin-top: 16px;
    font-size: 0.85rem;
    opacity: 0.5;
    text-align: center;
    max-width: 300px;
  }

  .flip-hint {
    position: absolute;
    bottom: 16px;
    right: 20px;
    font-size: 0.75rem;
    opacity: 0.4;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .card-learned-overlay {
    position: absolute;
    inset: 0;
    border-radius: var(--radius);
    border: 3px solid var(--accent);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
    box-shadow: inset 0 0 30px rgba(67,233,123,0.1), 0 0 40px rgba(67,233,123,0.2);
  }

  .card.is-learned .card-learned-overlay { opacity: 1; }

  /* Card slide animations */
  @keyframes slideInRight {
    from { opacity: 0; transform: translateX(60px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes slideInLeft {
    from { opacity: 0; transform: translateX(-60px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes slideOutLeft {
    from { opacity: 1; transform: translateX(0); }
    to { opacity: 0; transform: translateX(-60px); }
  }
  @keyframes slideOutRight {
    from { opacity: 1; transform: translateX(0); }
    to { opacity: 0; transform: translateX(60px); }
  }
  @keyframes shufflePop {
    0% { transform: scale(1) rotate(0deg); }
    25% { transform: scale(0.9) rotate(-3deg); }
    50% { transform: scale(1.05) rotate(2deg); }
    75% { transform: scale(0.95) rotate(-1deg); }
    100% { transform: scale(1) rotate(0deg); }
  }

  .card-scene.slide-in-right .card { animation: slideInRight 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
  .card-scene.slide-in-left .card { animation: slideInLeft 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
  .card-scene.shuffle-anim .card { animation: shufflePop 0.5s ease; }

  /* Controls */
  .controls {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn {
    border: none;
    border-radius: 14px;
    padding: 12px 22px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text);
    position: relative;
    overflow: hidden;
  }

  .btn:hover { transform: translateY(-2px); }
  .btn:active { transform: translateY(0) scale(0.97); }

  .btn-prev, .btn-next {
    background: var(--surface);
  }
  .btn-prev:hover, .btn-next:hover { background: var(--surface2); }

  .btn-nav-group {
    display: flex;
    gap: 8px;
  }

  .btn-learned {
    background: rgba(67,233,123,0.15);
    color: var(--accent);
    border: 1.5px solid rgba(67,233,123,0.3);
  }
  .btn-learned:hover {
    background: rgba(67,233,123,0.25);
    box-shadow: 0 6px 20px rgba(67,233,123,0.2);
  }
  .btn-learned.active {
    background: var(--accent);
    color: #0F0F1A;
    border-color: var(--accent);
  }

  .btn-shuffle {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    box-shadow: 0 4px 20px rgba(108,99,255,0.3);
  }
  .btn-shuffle:hover {
    box-shadow: 0 8px 30px rgba(108,99,255,0.4);
  }

  .btn-flip {
    background: var(--surface2);
    flex: 1;
    justify-content: center;
    max-width: 200px;
  }

  /* All cards learned state */
  .all-learned {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    padding: 40px;
    text-align: center;
    animation: fadeIn 0.6s ease;
  }

  .all-learned.visible { display: flex; }

  .all-learned .trophy { font-size: 4rem; animation: float 3s ease-in-out infinite; }
  .all-learned h2 { font-size: 1.8rem; font-weight: 800; }
  .all-learned p { color: var(--text-muted); }

  .btn-reset {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    box-shadow: 0 4px 20px rgba(108,99,255,0.3);
    padding: 14px 28px;
    font-size: 1rem;
  }

  /* Card deck indicators */
  .deck-dots {
    display: flex;
    gap: 6px;
    justify-content: center;
    flex-wrap: wrap;
    max-width: 300px;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--surface2);
    transition: all 0.3s;
    cursor: pointer;
  }

  .dot.current { background: var(--primary); transform: scale(1.4); }
  .dot.learned { background: var(--accent); }

  /* Toast notification */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--surface2);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    padding: 12px 20px;
    font-size: 0.9rem;
    font-weight: 600;
    z-index: 100;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Keyboard shortcut hint */
  .keyboard-hints {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
    padding: 0 0 20px;
  }

  .kbd-hint {
    color: var(--text-muted);
    font-size: 0.78rem;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  kbd {
    background: var(--surface2);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 5px;
    padding: 1px 6px;
    font-family: inherit;
    font-size: 0.75rem;
    color: var(--text);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 480px) {
    .card-scene { height: 260px; }
    .card-face { padding: 28px 24px; }
    .controls { gap: 8px; }
    .btn { padding: 10px 16px; font-size: 0.88rem; }
    .keyboard-hints { display: none; }
  }
</style>
</head>
<body>

<div class="container">

  <!-- LANGUAGE SELECTION -->
  <div id="lang-screen">
    <div class="logo">🌍</div>
    <div>
      <h1 class="app-title" id="main-title">Language Flashcards</h1>
      <p class="app-subtitle" id="main-subtitle">Choose a language to start learning travel phrases</p>
    </div>
    <div class="lang-grid">
      <button class="lang-btn" onclick="startLearning('english')">
        <span class="lang-flag">🇺🇸</span>
        <span class="lang-name">English</span>
        <span class="lang-native">English</span>
      </button>
      <button class="lang-btn" onclick="startLearning('spanish')">
        <span class="lang-flag">🇪🇸</span>
        <span class="lang-name" id="btn-spanish">Spanish</span>
        <span class="lang-native">Español</span>
      </button>
      <button class="lang-btn" onclick="startLearning('french')">
        <span class="lang-flag">🇫🇷</span>
        <span class="lang-name" id="btn-french">French</span>
        <span class="lang-native">Français</span>
      </button>
      <button class="lang-btn" onclick="startLearning('japanese')">
        <span class="lang-flag">🇯🇵</span>
        <span class="lang-name" id="btn-japanese">Japanese</span>
        <span class="lang-native">日本語</span>
      </button>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="app-screen">
    <div class="header">
      <div class="header-left">
        <button class="back-btn" onclick="goBack()" title="Back">←</button>
        <div class="current-lang">
          <span id="header-flag"></span>
          <span id="header-lang-name"></span>
        </div>
      </div>
      <div class="progress-info">
        <span id="learned-count-badge" class="learned-badge">0 learned</span>
        <span id="card-progress-text"></span>
      </div>
    </div>

    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-bar" style="width:0%"></div>
    </div>

    <div class="card-area" id="card-area">
      <div class="card-scene" id="card-scene" onclick="flipCard()">
        <div class="card" id="card">
          <div class="card-face card-front">
            <div class="label" id="front-label">PHRASE</div>
            <div class="word" id="front-word"></div>
            <div class="phonetic" id="front-phonetic"></div>
            <div class="flip-hint">tap to flip ↩</div>
          </div>
          <div class="card-face card-back">
            <div class="label" id="back-label">TRANSLATION</div>
            <div class="word" id="back-word"></div>
            <div class="phonetic" id="back-phonetic"></div>
            <div class="context" id="back-context"></div>
          </div>
          <div class="card-learned-overlay"></div>
        </div>
      </div>

      <div class="deck-dots" id="deck-dots"></div>

      <div class="controls">
        <div class="btn-nav-group">
          <button class="btn btn-prev" onclick="prevCard()">← <span id="lbl-prev">Prev</span></button>
          <button class="btn btn-next" onclick="nextCard()"><span id="lbl-next">Next</span> →</button>
        </div>
        <button class="btn btn-flip" onclick="flipCard()">↩ <span id="lbl-flip">Flip</span></button>
        <button class="btn btn-learned" id="btn-learned" onclick="toggleLearned()">
          ✓ <span id="lbl-learned">Mark Learned</span>
        </button>
        <button class="btn btn-shuffle" onclick="shuffleCards()">⇄ <span id="lbl-shuffle">Shuffle</span></button>
      </div>

      <div class="keyboard-hints">
        <div class="kbd-hint"><kbd>Space</kbd> Flip</div>
        <div class="kbd-hint"><kbd>←</kbd> Prev</div>
        <div class="kbd-hint"><kbd>→</kbd> Next</div>
        <div class="kbd-hint"><kbd>L</kbd> Learned</div>
        <div class="kbd-hint"><kbd>S</kbd> Shuffle</div>
      </div>
    </div>

    <div class="all-learned" id="all-learned">
      <div class="trophy">🏆</div>
      <h2 id="all-learned-title">All cards learned!</h2>
      <p id="all-learned-sub">You've mastered all the travel phrases. Keep it up!</p>
      <button class="btn btn-reset" onclick="resetLearned()">↺ <span id="lbl-reset">Start Over</span></button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────

    items: [
      { front: 'Où se trouve l\'hôtel le plus proche?', phonetic: 'oo suh troov lo-tel luh ploo prosh', back: 'Where is the nearest hotel?', context: 'Finding accommodation' },

// ── STATE ─────────────────────────────────────────────────────────────────────

let currentLang = null;
let currentDeck = [];
let currentIndex = 0;
let learnedSet = new Set();
let isFlipped = false;
let uiLang = 'en';
let t = uiTranslations.en;

// ── INIT ──────────────────────────────────────────────────────────────────────

function detectUILang() {
  const locale = (navigator.language || 'en').toLowerCase();
  if (locale.startsWith('es')) return 'es';
  if (locale.startsWith('fr')) return 'fr';
  if (locale.startsWith('ja')) return 'ja';
  return 'en';
}

function applyUITranslations() {
  t = uiTranslations[uiLang];
  document.getElementById('main-title').textContent = t.title;
  document.getElementById('main-subtitle').textContent = t.subtitle;
  document.getElementById('btn-spanish').textContent = t.learnSpanish;
  document.getElementById('btn-french').textContent = t.learnFrench;
  document.getElementById('btn-japanese').textContent = t.learnJapanese;
  document.getElementById('lbl-prev').textContent = t.prev;
  document.getElementById('lbl-next').textContent = t.next;
  document.getElementById('lbl-flip').textContent = t.flip;
  document.getElementById('lbl-learned').textContent = t.markLearned;
  document.getElementById('lbl-shuffle').textContent = t.shuffle;
  document.getElementById('lbl-reset').textContent = t.reset;
  document.getElementById('all-learned-title').textContent = t.allLearnedTitle;
  document.getElementById('all-learned-sub').textContent = t.allLearnedSub;
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────

function startLearning(lang) {
  currentLang = lang;
  const data = cards[lang];
  currentDeck = data.items.map((item, i) => ({ ...item, id: i }));
  currentIndex = 0;
  learnedSet = new Set();
  isFlipped = false;

  document.getElementById('header-flag').textContent = data.flag;
  document.getElementById('header-lang-name').textContent = data.name;
  document.getElementById('front-label').textContent = data.sourceLabel;
  document.getElementById('back-label').textContent = data.targetLabel;

  document.getElementById('lang-screen').style.display = 'none';
  const appScreen = document.getElementById('app-screen');
  appScreen.classList.add('visible');

  renderCard(false);
  updateDots();
  updateProgress();
}

function goBack() {
  document.getElementById('app-screen').classList.remove('visible');
  document.getElementById('all-learned').classList.remove('visible');
  document.getElementById('card-area').style.display = '';
  document.getElementById('lang-screen').style.display = '';
  // Fade in
  document.getElementById('lang-screen').style.animation = 'none';
  requestAnimationFrame(() => {
    document.getElementById('lang-screen').style.animation = 'fadeIn 0.6s ease';
  });
}

// ── CARD LOGIC ────────────────────────────────────────────────────────────────

function renderCard(direction) {
  const card = document.getElementById('card');
  const scene = document.getElementById('card-scene');
  const item = currentDeck[currentIndex];

  // Reset flip
  isFlipped = false;
  card.classList.remove('flipped');

  // Learned state
  if (learnedSet.has(item.id)) {
    card.classList.add('is-learned');
    document.getElementById('btn-learned').classList.add('active');
    document.getElementById('lbl-learned').textContent = t.unmarkLearned;
  } else {
    card.classList.remove('is-learned');
    document.getElementById('btn-learned').classList.remove('active');
    document.getElementById('lbl-learned').textContent = t.markLearned;
  }

  // Animation
  scene.classList.remove('slide-in-right', 'slide-in-left', 'shuffle-anim');
  void scene.offsetWidth; // reflow
  if (direction === 'next') scene.classList.add('slide-in-right');
  else if (direction === 'prev') scene.classList.add('slide-in-left');

  // Content
  document.getElementById('front-word').textContent = item.front;
  document.getElementById('front-phonetic').textContent = item.phonetic || '';
  document.getElementById('back-word').textContent = item.back;
  document.getElementById('back-phonetic').textContent = item.phonetic && currentLang !== 'english' ? '/' + item.phonetic + '/' : '';
  document.getElementById('back-context').textContent = item.context || '';

  updateDots();
  updateProgress();
}

function flipCard() {
  const card = document.getElementById('card');
  isFlipped = !isFlipped;
  card.classList.toggle('flipped', isFlipped);
}

function nextCard() {
  if (currentIndex < currentDeck.length - 1) {
    currentIndex++;
    renderCard('next');
  } else {
    // Loop back with animation
    currentIndex = 0;
    renderCard('next');
  }
}

function prevCard() {
  if (currentIndex > 0) {
    currentIndex--;
    renderCard('prev');
  } else {
    currentIndex = currentDeck.length - 1;
    renderCard('prev');
  }
}

function toggleLearned() {
  const item = currentDeck[currentIndex];
  if (learnedSet.has(item.id)) {
    learnedSet.delete(item.id);
    showToast(t.toastUnlearned);
  } else {
    learnedSet.add(item.id);
    showToast(t.toastLearned);

    // Auto-advance after marking learned
    setTimeout(() => {
      if (learnedSet.size === currentDeck.length) {
        showAllLearned();
      } else {
        nextCard();
      }
    }, 600);
  }

  renderCard(false);
}

function shuffleCards() {
  // Fisher-Yates shuffle
  const arr = [...currentDeck];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  currentDeck = arr;
  currentIndex = 0;

  // Shuffle animation
  const scene = document.getElementById('card-scene');
  scene.classList.remove('shuffle-anim');
  void scene.offsetWidth;
  scene.classList.add('shuffle-anim');

  renderCard(false);
  showToast(t.toastShuffle);
}

function resetLearned() {
  learnedSet.clear();
  currentDeck = cards[currentLang].items.map((item, i) => ({ ...item, id: i }));
  currentIndex = 0;
  document.getElementById('all-learned').classList.remove('visible');
  document.getElementById('card-area').style.display = '';
  renderCard(false);
  updateProgress();
}

function showAllLearned() {
  document.getElementById('card-area').style.display = 'none';
  document.getElementById('all-learned').classList.add('visible');
}

// ── UI UPDATES ────────────────────────────────────────────────────────────────

function updateDots() {
  const container = document.getElementById('deck-dots');
  container.innerHTML = '';
  currentDeck.forEach((item, i) => {
    const dot = document.createElement('div');
    dot.className = 'dot';
    if (i === currentIndex) dot.classList.add('current');
    if (learnedSet.has(item.id)) dot.classList.add('learned');
    dot.onclick = () => {
      const dir = i > currentIndex ? 'next' : 'prev';
      currentIndex = i;
      renderCard(dir);
    };
    container.appendChild(dot);
  });
}

function updateProgress() {
  const total = currentDeck.length;
  const learned = learnedSet.size;
  const pct = (learned / total) * 100;

  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('learned-count-badge').textContent = t.learnedBadge(learned);
  document.getElementById('card-progress-text').textContent = t.cardOf(currentIndex + 1, total);
}

// ── TOAST ─────────────────────────────────────────────────────────────────────

let toastTimer = null;
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
}

// ── KEYBOARD ──────────────────────────────────────────────────────────────────

document.addEventListener('keydown', (e) => {
  if (!currentLang) return;
  const tag = e.target.tagName.toLowerCase();
  if (tag === 'input' || tag === 'textarea') return;

  switch (e.key) {
    case ' ':
    case 'Enter':
      e.preventDefault();
      flipCard();
      break;
    case 'ArrowRight':
    case 'ArrowDown':
      e.preventDefault();
      nextCard();
      break;
    case 'ArrowLeft':
    case 'ArrowUp':
      e.preventDefault();
      prevCard();
      break;
    case 'l':
    case 'L':
      toggleLearned();
      break;
    case 's':
    case 'S':
      shuffleCards();
      break;
    case 'Escape':
      goBack();
      break;
  }
});

// Touch/swipe support
let touchStartX = 0;
let touchStartY = 0;
document.getElementById('card-scene')?.addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

// We attach after DOM is ready
window.addEventListener('DOMContentLoaded', () => {
  const scene = document.getElementById('card-scene');

  scene.addEventListener('touchstart', (e) => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });

  scene.addEventListener('touchend', (e) => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
      if (dx < 0) nextCard();
      else prevCard();
    }
  }, { passive: true });
});

// ── STARTUP ───────────────────────────────────────────────────────────────────

uiLang = detectUILang();
applyUITranslations();
</script>
