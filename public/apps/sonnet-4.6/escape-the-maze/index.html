<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escape the Maze</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a1a;
    color: #e0e0ff;
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  h1 {
    font-size: 2.2rem;
    font-weight: 800;
    letter-spacing: 0.1em;
    background: linear-gradient(135deg, #7c3aed, #2563eb, #06b6d4);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 10px;
    text-transform: uppercase;
    text-shadow: none;
    filter: drop-shadow(0 0 20px rgba(124,58,237,0.5));
  }

  #hud {
    display: flex;
    gap: 30px;
    align-items: center;
    margin-bottom: 12px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 10px 24px;
    backdrop-filter: blur(10px);
  }

  .hud-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .hud-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: #888;
  }

  .hud-value {
    font-size: 1.3rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: #c4b5fd;
  }

  #timer { color: #34d399; }
  #moves-val { color: #f9a8d4; }
  #shortest-val { color: #fbbf24; }

  #maze-container {
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 60px rgba(124,58,237,0.3), 0 0 120px rgba(37,99,235,0.15);
    border: 2px solid rgba(124,58,237,0.4);
  }

  canvas {
    display: block;
  }

  #controls {
    display: flex;
    gap: 12px;
    margin-top: 14px;
    align-items: center;
  }

  button {
    background: linear-gradient(135deg, #7c3aed, #2563eb);
    color: white;
    border: none;
    padding: 10px 24px;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.2s;
    box-shadow: 0 4px 15px rgba(124,58,237,0.4);
    text-transform: uppercase;
  }

  button:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(124,58,237,0.6);
  }

  button:active {
    transform: translateY(0);
  }

  select {
    background: rgba(255,255,255,0.08);
    color: #e0e0ff;
    border: 1px solid rgba(255,255,255,0.2);
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 0.9rem;
    cursor: pointer;
    outline: none;
  }

  select option {
    background: #1a1a2e;
    color: #e0e0ff;
  }

  #hint-label {
    font-size: 0.75rem;
    color: #555;
    margin-top: 6px;
  }

  #overlay {
    position: absolute;
    inset: 0;
    background: rgba(10,10,26,0.92);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    border-radius: 10px;
    z-index: 10;
    backdrop-filter: blur(8px);
  }

  #overlay.hidden { display: none; }

  #overlay h2 {
    font-size: 2.5rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    background: linear-gradient(135deg, #fbbf24, #f59e0b);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 20px rgba(251,191,36,0.6));
  }

  #overlay .subtitle {
    font-size: 1rem;
    color: #aaa;
    text-align: center;
    max-width: 300px;
    line-height: 1.6;
  }

  #overlay .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    width: 280px;
  }

  .stat-card {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 12px;
    text-align: center;
  }

  .stat-card .val {
    font-size: 1.6rem;
    font-weight: 700;
    color: #c4b5fd;
  }

  .stat-card .lbl {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #666;
    margin-top: 2px;
  }

  .bonus-badge {
    background: linear-gradient(135deg, rgba(251,191,36,0.2), rgba(245,158,11,0.2));
    border: 1px solid rgba(251,191,36,0.4);
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 0.85rem;
    color: #fbbf24;
    font-weight: 600;
  }
</style>
</head>
<body>

<h1>Escape the Maze</h1>

<div id="hud">
  <div class="hud-item">
    <span class="hud-label">Time</span>
    <span class="hud-value" id="timer">0.0s</span>
  </div>
  <div class="hud-item">
    <span class="hud-label">Moves</span>
    <span class="hud-value" id="moves-val">0</span>
  </div>
  <div class="hud-item">
    <span class="hud-label">Shortest</span>
    <span class="hud-value" id="shortest-val">-</span>
  </div>
  <div class="hud-item">
    <span class="hud-label">Efficiency</span>
    <span class="hud-value" id="efficiency-val">-</span>
  </div>
</div>

<div id="maze-container">
  <canvas id="mazeCanvas"></canvas>
  <div id="overlay">
    <h2 id="overlay-title">Escape the Maze</h2>
    <p class="subtitle" id="overlay-sub">Navigate from <span style="color:#34d399">green</span> to <span style="color:#f59e0b">gold</span>. Use arrow keys or WASD to move.</p>
    <div class="stats-grid" id="stats-grid" style="display:none"></div>
    <div class="bonus-badge" id="bonus-badge" style="display:none"></div>
    <button id="overlay-btn">Start Game</button>
  </div>
</div>

<div id="controls">
  <select id="size-select">
    <option value="10">Small (10×10)</option>
    <option value="15" selected>Medium (15×15)</option>
    <option value="20">Large (20×20)</option>
    <option value="25">XL (25×25)</option>
  </select>
  <button id="replay-btn">New Maze</button>
  <button id="hint-btn">Show Path</button>
</div>
<div id="hint-label">Arrow keys / WASD to move</div>

<script>
// ─── Constants ────────────────────────────────────────────────────
const CELL = 36;
const WALL_W = 2;

// Colors
const C = {
  bg:       '#0d0d1f',
  wall:     '#1e1b4b',
  wallBright:'#4c1d95',
  floor:    '#12122a',
  floorAlt: '#13132d',
  start:    '#065f46',
  startGlow:'#34d399',
  end:      '#78350f',
  endGlow:  '#f59e0b',
  avatar:   '#7c3aed',
  avatarGlow:'#c4b5fd',
  path:     'rgba(59,130,246,0.35)',
  pathLine: 'rgba(96,165,250,0.7)',
  visited:  'rgba(124,58,237,0.12)',
  trail:    'rgba(124,58,237,0.25)',
};

// ─── Maze Generation (Recursive Backtracker / DFS) ────────────────
function generateMaze(rows, cols) {
  // walls[r][c] = { right: bool, bottom: bool } — true = wall present
  const walls = Array.from({length: rows}, () =>
    Array.from({length: cols}, () => ({ right: true, bottom: true }))
  );
  const visited = Array.from({length: rows}, () => new Array(cols).fill(false));

  const dirs = [
    {dr: -1, dc: 0, wall: 'bottom', rev: true},  // up: remove bottom of (r-1)
    {dr:  1, dc: 0, wall: 'bottom', rev: false},  // down: remove bottom of (r)
    {dr:  0, dc: -1, wall: 'right', rev: true},   // left: remove right of (c-1)
    {dr:  0, dc:  1, wall: 'right', rev: false},  // right: remove right of (c)
  ];

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function carve(r, c) {
    visited[r][c] = true;
    const shuffled = shuffle([...dirs]);
    for (const d of shuffled) {
      const nr = r + d.dr, nc = c + d.dc;
      if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && !visited[nr][nc]) {
        // Remove wall between (r,c) and (nr,nc)
        if (d.wall === 'bottom') {
          if (d.rev) walls[nr][nc].bottom = false;  // up: remove bottom of upper cell
          else       walls[r][c].bottom = false;    // down: remove bottom of current
        } else {
          if (d.rev) walls[nr][nc].right = false;   // left: remove right of left cell
          else       walls[r][c].right = false;     // right: remove right of current
        }
        carve(nr, nc);
      }
    }
  }

  carve(0, 0);
  return walls;
}

// ─── BFS shortest path ────────────────────────────────────────────
function bfs(walls, rows, cols, start, end) {
  const [sr, sc] = start;
  const [er, ec] = end;
  const dist = Array.from({length: rows}, () => new Array(cols).fill(-1));
  const prev = Array.from({length: rows}, () => new Array(cols).fill(null));
  dist[sr][sc] = 0;
  const queue = [[sr, sc]];
  let qi = 0;

  const moves = [
    {dr: -1, dc: 0},  // up
    {dr:  1, dc: 0},  // down
    {dr:  0, dc: -1}, // left
    {dr:  0, dc:  1}, // right
  ];

  while (qi < queue.length) {
    const [r, c] = queue[qi++];
    for (const {dr, dc} of moves) {
      const nr = r + dr, nc = c + dc;
      if (nr < 0 || nr >= rows || nc < 0 || nc >= cols) continue;
      if (dist[nr][nc] !== -1) continue;
      // Check wall
      if (dr === -1) { if (walls[nr][nc].bottom) continue; } // up: check upper cell's bottom
      if (dr ===  1) { if (walls[r][c].bottom) continue; }   // down: check current bottom
      if (dc === -1) { if (walls[nr][nc].right) continue; }  // left: check left cell's right
      if (dc ===  1) { if (walls[r][c].right) continue; }    // right: check current right
      dist[nr][nc] = dist[r][c] + 1;
      prev[nr][nc] = [r, c];
      queue.push([nr, nc]);
    }
  }

  // Reconstruct path
  const path = [];
  let cur = [er, ec];
  while (cur) {
    path.unshift(cur);
    cur = prev[cur[0]][cur[1]];
  }
  return { dist: dist[er][ec], path };
}

// ─── Game State ───────────────────────────────────────────────────
let state = {
  rows: 15, cols: 15,
  walls: null,
  player: [0, 0],
  start: [0, 0],
  end: [14, 14],
  moves: 0,
  startTime: null,
  elapsed: 0,
  running: false,
  won: false,
  shortestPath: [],
  shortestDist: 0,
  showPath: false,
  trail: [],
  animFrame: null,
  timerInterval: null,
};

// ─── Canvas Setup ────────────────────────────────────────────────
const canvas = document.getElementById('mazeCanvas');
const ctx = canvas.getContext('2d');

function setupCanvas() {
  const n = parseInt(document.getElementById('size-select').value);
  state.rows = n;
  state.cols = n;
  state.end = [n - 1, n - 1];
  canvas.width  = n * CELL + WALL_W;
  canvas.height = n * CELL + WALL_W;
}

// ─── Drawing ─────────────────────────────────────────────────────
function lerp(a, b, t) { return a + (b - a) * t; }

let avatarAnim = { x: 0, y: 0, tx: 0, ty: 0, t: 1 };

function cellCenter(r, c) {
  return {
    x: c * CELL + CELL / 2,
    y: r * CELL + CELL / 2,
  };
}

function draw(timestamp) {
  const { rows, cols, walls, player, start, end, shortestPath, showPath, trail } = state;
  const W = canvas.width, H = canvas.height;

  ctx.clearRect(0, 0, W, H);

  // Background
  ctx.fillStyle = C.bg;
  ctx.fillRect(0, 0, W, H);

  // Floor tiles (checkerboard subtle)
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const x = c * CELL, y = r * CELL;
      ctx.fillStyle = (r + c) % 2 === 0 ? C.floor : C.floorAlt;
      ctx.fillRect(x + WALL_W, y + WALL_W, CELL - WALL_W, CELL - WALL_W);
    }
  }

  // Trail
  for (const [tr, tc] of trail) {
    const x = tc * CELL + WALL_W, y = tr * CELL + WALL_W;
    ctx.fillStyle = C.trail;
    ctx.fillRect(x, y, CELL - WALL_W, CELL - WALL_W);
  }

  // Visited cells highlight (player position history dim glow)
  // Shortest path
  if (showPath && shortestPath.length > 0) {
    ctx.save();
    for (const [pr, pc] of shortestPath) {
      const x = pc * CELL + WALL_W, y = pr * CELL + WALL_W;
      ctx.fillStyle = C.path;
      ctx.fillRect(x, y, CELL - WALL_W, CELL - WALL_W);
    }
    // Draw path line
    ctx.beginPath();
    ctx.strokeStyle = C.pathLine;
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    for (let i = 0; i < shortestPath.length; i++) {
      const [pr, pc] = shortestPath[i];
      const cx = pc * CELL + CELL / 2, cy = pr * CELL + CELL / 2;
      if (i === 0) ctx.moveTo(cx, cy); else ctx.lineTo(cx, cy);
    }
    ctx.stroke();
    ctx.restore();
  }

  // Start cell
  {
    const [sr, sc] = start;
    const x = sc * CELL + WALL_W, y = sr * CELL + WALL_W;
    ctx.fillStyle = C.start;
    ctx.fillRect(x, y, CELL - WALL_W, CELL - WALL_W);
    // S label
    ctx.fillStyle = C.startGlow;
    ctx.font = `bold ${CELL * 0.38}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('S', sc * CELL + CELL / 2, sr * CELL + CELL / 2);
  }

  // End cell
  {
    const [er, ec] = end;
    const x = ec * CELL + WALL_W, y = er * CELL + WALL_W;
    ctx.fillStyle = C.end;
    ctx.fillRect(x, y, CELL - WALL_W, CELL - WALL_W);
    // Pulsing glow
    const pulse = 0.5 + 0.5 * Math.sin((timestamp || 0) * 0.004);
    ctx.save();
    ctx.shadowColor = C.endGlow;
    ctx.shadowBlur = 10 + pulse * 12;
    ctx.fillStyle = C.endGlow;
    ctx.font = `bold ${CELL * 0.38}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('★', ec * CELL + CELL / 2, er * CELL + CELL / 2);
    ctx.restore();
  }

  // Walls
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const x = c * CELL, y = r * CELL;
      const w = walls[r][c];

      ctx.strokeStyle = C.wallBright;
      ctx.lineWidth = WALL_W;
      ctx.lineCap = 'square';

      // Right wall
      if (c < cols - 1 && w.right) {
        ctx.beginPath();
        ctx.moveTo(x + CELL, y);
        ctx.lineTo(x + CELL, y + CELL);
        ctx.strokeStyle = C.wallBright;
        ctx.stroke();
        // Outer border glow
        ctx.shadowColor = C.wallBright;
        ctx.shadowBlur = 4;
        ctx.stroke();
        ctx.shadowBlur = 0;
      }
      // Bottom wall
      if (r < rows - 1 && w.bottom) {
        ctx.beginPath();
        ctx.moveTo(x, y + CELL);
        ctx.lineTo(x + CELL, y + CELL);
        ctx.stroke();
      }
    }
  }

  // Border walls
  ctx.strokeStyle = '#6d28d9';
  ctx.lineWidth = WALL_W + 1;
  ctx.strokeRect(1, 1, W - 2, H - 2);

  // Avatar animation
  if (avatarAnim.t < 1) {
    avatarAnim.t = Math.min(1, avatarAnim.t + 0.18);
  }
  const ax = lerp(avatarAnim.x, avatarAnim.tx, avatarAnim.t);
  const ay = lerp(avatarAnim.y, avatarAnim.ty, avatarAnim.t);

  // Avatar glow
  const [pr, pc] = player;
  const pulse2 = 0.5 + 0.5 * Math.sin((timestamp || 0) * 0.006);
  ctx.save();
  ctx.shadowColor = C.avatarGlow;
  ctx.shadowBlur = 12 + pulse2 * 8;

  // Draw avatar as filled circle
  const r2 = CELL * 0.34;
  ctx.beginPath();
  ctx.arc(ax, ay, r2, 0, Math.PI * 2);

  // Gradient fill
  const grad = ctx.createRadialGradient(ax - r2 * 0.3, ay - r2 * 0.3, 0, ax, ay, r2);
  grad.addColorStop(0, '#c4b5fd');
  grad.addColorStop(0.5, '#7c3aed');
  grad.addColorStop(1, '#4c1d95');
  ctx.fillStyle = grad;
  ctx.fill();

  // Inner shine
  ctx.beginPath();
  ctx.arc(ax - r2 * 0.28, ay - r2 * 0.28, r2 * 0.28, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.fill();

  ctx.restore();

  if (!state.won) {
    state.animFrame = requestAnimationFrame(draw);
  } else {
    requestAnimationFrame(draw); // keep animating for end glow
  }
}

// ─── Timer ────────────────────────────────────────────────────────
function startTimer() {
  state.startTime = performance.now();
  state.timerInterval = setInterval(() => {
    if (!state.running) return;
    state.elapsed = (performance.now() - state.startTime) / 1000;
    document.getElementById('timer').textContent = state.elapsed.toFixed(1) + 's';
  }, 100);
}

function stopTimer() {
  clearInterval(state.timerInterval);
  state.elapsed = (performance.now() - state.startTime) / 1000;
  document.getElementById('timer').textContent = state.elapsed.toFixed(1) + 's';
}

// ─── New Game ─────────────────────────────────────────────────────
function newGame() {
  clearInterval(state.timerInterval);
  cancelAnimationFrame(state.animFrame);

  setupCanvas();

  const { rows, cols } = state;
  state.walls = generateMaze(rows, cols);
  state.player = [0, 0];
  state.start = [0, 0];
  state.end = [rows - 1, cols - 1];
  state.moves = 0;
  state.elapsed = 0;
  state.running = false;
  state.won = false;
  state.showPath = false;
  state.trail = [];

  const { dist, path } = bfs(state.walls, rows, cols, state.start, state.end);
  state.shortestDist = dist;
  state.shortestPath = path;

  document.getElementById('moves-val').textContent = '0';
  document.getElementById('shortest-val').textContent = dist;
  document.getElementById('efficiency-val').textContent = '-';
  document.getElementById('timer').textContent = '0.0s';
  document.getElementById('hint-btn').textContent = 'Show Path';

  // Reset avatar position
  const startCenter = cellCenter(0, 0);
  avatarAnim.x = startCenter.x;
  avatarAnim.y = startCenter.y;
  avatarAnim.tx = startCenter.x;
  avatarAnim.ty = startCenter.y;
  avatarAnim.t = 1;

  showOverlay('Escape the Maze',
    `Navigate from <span style="color:#34d399">S</span> to <span style="color:#f59e0b">★</span>.<br>Arrow keys or WASD to move.<br>Shortest path: <b style="color:#fbbf24">${dist} moves</b>`,
    'Start Game', false);
}

// ─── Movement ────────────────────────────────────────────────────
function canMove(r, c, dr, dc) {
  const { walls, rows, cols } = state;
  const nr = r + dr, nc = c + dc;
  if (nr < 0 || nr >= rows || nc < 0 || nc >= cols) return false;
  if (dr === -1) return !walls[nr][nc].bottom; // up
  if (dr ===  1) return !walls[r][c].bottom;   // down
  if (dc === -1) return !walls[nr][nc].right;  // left
  if (dc ===  1) return !walls[r][c].right;    // right
  return false;
}

function movePlayer(dr, dc) {
  if (!state.running || state.won) return;

  const [r, c] = state.player;
  if (!canMove(r, c, dr, dc)) return;

  const nr = r + dr, nc = c + dc;

  // Add to trail
  if (!state.trail.some(([tr, tc]) => tr === r && tc === c)) {
    state.trail.push([r, c]);
  }

  state.player = [nr, nc];
  state.moves++;
  document.getElementById('moves-val').textContent = state.moves;

  // Update avatar animation target
  const center = cellCenter(nr, nc);
  avatarAnim.x = lerp(avatarAnim.x, avatarAnim.tx, avatarAnim.t); // snap to current pos
  avatarAnim.tx = center.x;
  avatarAnim.ty = center.y;
  avatarAnim.t = 0;

  // Check win
  const [er, ec] = state.end;
  if (nr === er && nc === ec) {
    winGame();
  }
}

// ─── Win ─────────────────────────────────────────────────────────
function winGame() {
  state.won = true;
  state.running = false;
  stopTimer();

  const efficiency = Math.round((state.shortestDist / state.moves) * 100);
  document.getElementById('efficiency-val').textContent = efficiency + '%';

  const isOptimal = state.moves === state.shortestDist;
  const isFast = efficiency >= 80;

  let bonus = '';
  if (isOptimal) bonus = '🏆 PERFECT PATH! Solved in minimum moves!';
  else if (isFast) bonus = '⚡ Excellent efficiency! Very close to optimal!';
  else bonus = `Path efficiency: ${efficiency}% (Optimal: ${state.shortestDist} moves)`;

  setTimeout(() => {
    showWinOverlay(efficiency, isOptimal, isFast, bonus);
  }, 400);
}

function showWinOverlay(efficiency, isOptimal, isFast, bonus) {
  const overlay = document.getElementById('overlay');
  overlay.classList.remove('hidden');
  document.getElementById('overlay-title').textContent = '🎉 Escaped!';

  document.getElementById('overlay-sub').innerHTML = '';

  const statsGrid = document.getElementById('stats-grid');
  statsGrid.style.display = 'grid';
  statsGrid.innerHTML = `
    <div class="stat-card">
      <div class="val" style="color:#34d399">${state.elapsed.toFixed(1)}s</div>
      <div class="lbl">Time</div>
    </div>
    <div class="stat-card">
      <div class="val" style="color:#f9a8d4">${state.moves}</div>
      <div class="lbl">Moves</div>
    </div>
    <div class="stat-card">
      <div class="val" style="color:#fbbf24">${state.shortestDist}</div>
      <div class="lbl">Optimal</div>
    </div>
    <div class="stat-card">
      <div class="val" style="color:${efficiency >= 90 ? '#34d399' : efficiency >= 70 ? '#fbbf24' : '#f87171'}">${efficiency}%</div>
      <div class="lbl">Efficiency</div>
    </div>
  `;

  const bonusBadge = document.getElementById('bonus-badge');
  bonusBadge.style.display = 'block';
  bonusBadge.textContent = bonus;
  if (isOptimal) {
    bonusBadge.style.background = 'linear-gradient(135deg, rgba(251,191,36,0.25), rgba(245,158,11,0.25))';
    bonusBadge.style.borderColor = 'rgba(251,191,36,0.6)';
    bonusBadge.style.color = '#fbbf24';
  }

  document.getElementById('overlay-btn').textContent = 'Play Again';
}

function showOverlay(title, sub, btnText, showStats) {
  const overlay = document.getElementById('overlay');
  overlay.classList.remove('hidden');
  document.getElementById('overlay-title').textContent = title;
  document.getElementById('overlay-sub').innerHTML = sub;
  document.getElementById('overlay-btn').textContent = btnText;
  document.getElementById('stats-grid').style.display = 'none';
  document.getElementById('bonus-badge').style.display = 'none';
  document.getElementById('stats-grid').innerHTML = '';

  // Start rendering in background
  if (state.animFrame) cancelAnimationFrame(state.animFrame);
  state.animFrame = requestAnimationFrame(draw);
}

// ─── Key Controls ─────────────────────────────────────────────────
document.addEventListener('keydown', (e) => {
  const map = {
    ArrowUp: [-1, 0], ArrowDown: [1, 0], ArrowLeft: [0, -1], ArrowRight: [0, 1],
    w: [-1, 0], s: [1, 0], a: [0, -1], d: [0, 1],
    W: [-1, 0], S: [1, 0], A: [0, -1], D: [0, 1],
  };
  if (map[e.key]) {
    e.preventDefault();
    movePlayer(...map[e.key]);
  }
});

// ─── Buttons ──────────────────────────────────────────────────────
document.getElementById('overlay-btn').addEventListener('click', () => {
  const overlay = document.getElementById('overlay');
  if (!state.running && !state.won) {
    // Start game
    overlay.classList.add('hidden');
    state.running = true;
    startTimer();
  } else if (state.won) {
    // Play again
    overlay.classList.add('hidden');
    newGame();
  }
});

document.getElementById('replay-btn').addEventListener('click', () => {
  newGame();
});

document.getElementById('hint-btn').addEventListener('click', () => {
  state.showPath = !state.showPath;
  document.getElementById('hint-btn').textContent = state.showPath ? 'Hide Path' : 'Show Path';
  if (state.showPath && !state.running) {
    // If game hasn't started, start it
  }
});

document.getElementById('size-select').addEventListener('change', () => {
  newGame();
});

// ─── Touch support ───────────────────────────────────────────────
let touchStart = null;
canvas.addEventListener('touchstart', (e) => {
  touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
}, { passive: true });

canvas.addEventListener('touchend', (e) => {
  if (!touchStart) return;
  const dx = e.changedTouches[0].clientX - touchStart.x;
  const dy = e.changedTouches[0].clientY - touchStart.y;
  const adx = Math.abs(dx), ady = Math.abs(dy);
  if (Math.max(adx, ady) < 20) return;
  if (adx > ady) movePlayer(0, dx > 0 ? 1 : -1);
  else movePlayer(dy > 0 ? 1 : -1, 0);
  touchStart = null;
}, { passive: true });

// ─── Init ────────────────────────────────────────────────────────
newGame();
</script>
</body>
</html>
