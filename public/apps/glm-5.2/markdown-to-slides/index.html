<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Markdown → Slides</title>
<style>
  /* ============================================================
     THEME TOKENS
     ============================================================ */
  :root {
    --app-bg: #eef1f5;
    --app-bg-2: #e3e8ef;
    --panel: #ffffff;
    --panel-2: #f7f9fc;
    --chrome: #1f2733;
    --chrome-fg: #e8ecf2;
    --chrome-muted: #93a0b3;
    --border: #dde3ec;
    --border-strong: #c4cdd9;
    --text: #1f2733;
    --text-muted: #5b6675;
    --accent: #0f766e;
    --accent-2: #14b8a6;
    --accent-soft: rgba(15,118,110,.10);
    --shadow-sm: 0 1px 2px rgba(15,23,42,.06), 0 1px 3px rgba(15,23,42,.05);
    --shadow-md: 0 10px 30px rgba(15,23,42,.12), 0 4px 12px rgba(15,23,42,.08);
    --shadow-lg: 0 30px 80px rgba(15,23,42,.28), 0 12px 30px rgba(15,23,42,.16);
    --radius: 12px;

    /* slide canvas (designed at 1280x720, font in em scales with --slide-fs) */
    --slide-fs: 30px;
    --slide-bg: #ffffff;
    --slide-fg: #1f2733;
    --slide-fg-muted: #5b6675;
    --slide-accent: #0f766e;
    --slide-rule: #e6ebf1;
    --slide-pad: 1.6em;
  }
  [data-theme="dark"] {
    --app-bg: #0b0f17;
    --app-bg-2: #0e131d;
    --panel: #111723;
    --panel-2: #0d1320;
    --chrome: #05080e;
    --chrome-fg: #e8ecf2;
    --chrome-muted: #6b7689;
    --border: #1e2633;
    --border-strong: #2a3445;
    --text: #e6ecf3;
    --text-muted: #93a0b3;
    --accent: #2dd4bf;
    --accent-2: #5eead4;
    --accent-soft: rgba(45,212,191,.12);
    --shadow-sm: 0 1px 2px rgba(0,0,0,.4);
    --shadow-md: 0 10px 30px rgba(0,0,0,.5);
    --shadow-lg: 0 30px 80px rgba(0,0,0,.65), 0 12px 30px rgba(0,0,0,.4);

    --slide-bg: #0f1623;
    --slide-fg: #e6ecf3;
    --slide-fg-muted: #93a0b3;
    --slide-accent: #2dd4bf;
    --slide-rule: #1e2633;
  }

  /* ============================================================
     BASE
     ============================================================ */
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: radial-gradient(1200px 800px at 80% -10%, var(--app-bg-2), var(--app-bg));
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow: hidden;
  }
  button { font-family: inherit; }

  /* ============================================================
     APP SHELL
     ============================================================ */
  .app {
    display: grid;
    grid-template-rows: auto 1fr;
    height: 100vh;
  }

  .topbar {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 10px 16px;
    background: linear-gradient(180deg, var(--chrome), color-mix(in srgb, var(--chrome) 92%, black));
    color: var(--chrome-fg);
    border-bottom: 1px solid rgba(0,0,0,.25);
    box-shadow: var(--shadow-sm);
    z-index: 30;
  }
  .brand {
    display: flex; align-items: center; gap: 10px;
    font-weight: 700; letter-spacing: -.01em; font-size: 15px;
  }
  .brand .logo {
    width: 26px; height: 26px; border-radius: 7px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    display: grid; place-items: center; color: #fff;
    box-shadow: 0 2px 8px rgba(15,118,110,.45);
  }
  .brand .logo svg { width: 16px; height: 16px; }
  .brand .sub { color: var(--chrome-muted); font-weight: 500; font-size: 12px; }

  .spacer { flex: 1; }

  .btn {
    display: inline-flex; align-items: center; gap: 7px;
    background: rgba(255,255,255,.07);
    color: var(--chrome-fg);
    border: 1px solid rgba(255,255,255,.12);
    padding: 7px 12px; border-radius: 9px;
    font-size: 13px; font-weight: 600; cursor: pointer;
    transition: background .15s, border-color .15s, transform .05s, box-shadow .15s;
    white-space: nowrap;
  }
  .btn:hover { background: rgba(255,255,255,.14); border-color: rgba(255,255,255,.22); }
  .btn:active { transform: translateY(1px); }
  .btn.primary {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    border-color: transparent; color: #04140f;
    box-shadow: 0 4px 14px rgba(15,118,110,.4);
  }
  [data-theme="dark"] .btn.primary { color: #04140f; }
  .btn.primary:hover { filter: brightness(1.06); }
  .btn svg { width: 15px; height: 15px; }
  .btn.icon { padding: 7px; }
  .btn.icon svg { width: 17px; height: 17px; }

  .seg {
    display: inline-flex; background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.12); border-radius: 9px; padding: 2px;
  }
  .seg button {
    background: transparent; border: 0; color: var(--chrome-muted);
    padding: 5px 10px; border-radius: 7px; font-size: 12px; font-weight: 600; cursor: pointer;
  }
  .seg button.active { background: rgba(255,255,255,.14); color: var(--chrome-fg); }

  /* ============================================================
     WORKSPACE
     ============================================================ */
  .workspace {
    display: grid;
    grid-template-columns: minmax(280px, var(--editor-w, 42%)) 6px 1fr;
    min-height: 0;
  }
  .gutter {
    background: transparent;
    cursor: col-resize;
    position: relative;
    z-index: 5;
  }
  .gutter::after {
    content: ""; position: absolute; inset: 0 -3px;
  }
  .gutter:hover { background: var(--accent-soft); }

  /* ---- Editor ---- */
  .editor-pane {
    display: flex; flex-direction: column; min-width: 0;
    background: var(--panel);
    border-right: 1px solid var(--border);
  }
  .pane-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 9px 14px; border-bottom: 1px solid var(--border);
    font-size: 12px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase;
    color: var(--text-muted);
  }
  .pane-head .hint { font-weight: 600; color: var(--text-muted); text-transform: none; letter-spacing: 0; font-size: 11px; }
  .editor-wrap { position: relative; flex: 1; min-height: 0; display: flex; }
  #editor {
    flex: 1; min-width: 0; resize: none; border: 0; outline: 0;
    padding: 18px 20px 18px 20px;
    font-family: "SF Mono", "JetBrains Mono", "Fira Code", ui-monospace, Menlo, Consolas, monospace;
    font-size: 13.5px; line-height: 1.65; tab-size: 2;
    color: var(--text); background: var(--panel-2);
  }
  #editor::selection { background: var(--accent-soft); }
  .editor-foot {
    display: flex; gap: 16px; align-items: center; padding: 8px 14px;
    border-top: 1px solid var(--border); font-size: 11.5px; color: var(--text-muted);
    background: var(--panel);
  }
  .editor-foot b { color: var(--text); font-weight: 700; }
  .kbd {
    font-family: ui-monospace, monospace; font-size: 10.5px;
    background: var(--panel-2); border: 1px solid var(--border-strong);
    border-bottom-width: 2px; border-radius: 5px; padding: 1px 5px; color: var(--text-muted);
  }

  /* ---- Preview ---- */
  .preview-pane {
    display: flex; flex-direction: column; min-width: 0;
    background: radial-gradient(900px 600px at 50% -20%, var(--app-bg-2), var(--app-bg));
  }
  .preview-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 9px 14px; border-bottom: 1px solid var(--border);
    background: color-mix(in srgb, var(--panel) 70%, transparent);
    backdrop-filter: blur(8px);
  }
  .nav-cluster { display: flex; align-items: center; gap: 8px; }
  .nav-btn {
    width: 30px; height: 30px; border-radius: 8px; cursor: pointer;
    display: grid; place-items: center;
    background: var(--panel); border: 1px solid var(--border-strong); color: var(--text);
    transition: background .15s, border-color .15s, transform .05s;
  }
  .nav-btn:hover { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
  .nav-btn:disabled { opacity: .35; cursor: not-allowed; }
  .nav-btn svg { width: 16px; height: 16px; }
  .counter {
    font-variant-numeric: tabular-nums; font-weight: 700; font-size: 13px;
    color: var(--text); min-width: 56px; text-align: center;
  }
  .counter span { color: var(--text-muted); font-weight: 600; }

  .progress {
    height: 3px; background: var(--border); position: relative; flex: 1; max-width: 220px; margin: 0 6px;
    border-radius: 99px; overflow: hidden;
  }
  .progress > i {
    position: absolute; inset: 0 auto 0 0; width: 0;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    border-radius: 99px; transition: width .25s ease;
  }

  /* ---- Slide stage ---- */
  .stage {
    flex: 1; min-height: 0; position: relative;
    display: grid; place-items: center; padding: 28px;
    overflow: hidden;
  }
  .stage-inner { position: relative; width: 100%; height: 100%; }
  .slide {
    position: absolute; left: 50%; top: 50%;
    width: 1280px; height: 720px;
    transform-origin: center center;
    background: var(--slide-bg);
    color: var(--slide-fg);
    font-size: var(--slide-fs);
    padding: var(--slide-pad);
    border-radius: 14px;
    box-shadow: var(--shadow-lg);
    overflow: hidden;
    display: flex; flex-direction: column;
  }
  .slide::before {
    /* subtle accent rail */
    content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 6px;
    background: linear-gradient(180deg, var(--slide-accent), color-mix(in srgb, var(--slide-accent) 60%, white));
  }
  .slide-content { margin: 0; flex: 1; display: flex; flex-direction: column; justify-content: center; }
  .slide.is-title .slide-content { justify-content: center; }
  .slide.is-title { align-items: flex-start; }
  .slide-footer {
    position: absolute; left: var(--slide-pad); right: var(--slide-pad); bottom: .8em;
    display: flex; justify-content: space-between; align-items: center;
    font-size: .42em; color: var(--slide-fg-muted); letter-spacing: .02em;
    border-top: 1px solid var(--slide-rule); padding-top: .5em;
  }
  .slide-footer .brand-dot {
    width: .55em; height: .55em; border-radius: 2px; background: var(--slide-accent); display: inline-block; margin-right: .5em; vertical-align: middle;
  }

  /* entrance animation */
  .slide.enter { animation: slideIn .42s cubic-bezier(.22,.61,.36,1); }
  @keyframes slideIn {
    from { opacity: 0; transform: translate(-50%,-50%) scale(.985); }
    to   { opacity: 1; }
  }

  /* ============================================================
     SLIDE TYPOGRAPHY (em-based so it scales with --slide-fs)
     ============================================================ */
  .slide h1, .slide h2, .slide h3, .slide h4 {
    margin: 0 0 .55em; line-height: 1.12; letter-spacing: -.02em; font-weight: 800;
    color: var(--slide-fg);
  }
  .slide h1 { font-size: 3em; line-height: 1.05; }
  .slide h2 { font-size: 2em; }
  .slide h2::after {
    content: ""; display: block; width: 1.6em; height: .09em; margin-top: .35em;
    background: var(--slide-accent); border-radius: 99px;
  }
  .slide h3 { font-size: 1.35em; font-weight: 700; color: var(--slide-fg-muted); letter-spacing: 0; }
  .slide h4 { font-size: 1.05em; color: var(--slide-fg-muted); }
  .slide p { margin: 0 0 .7em; line-height: 1.55; font-size: 1em; }
  .slide p:last-child { margin-bottom: 0; }
  .slide ul, .slide ol { margin: 0 0 .8em; padding-left: 1.4em; line-height: 1.6; }
  .slide li { margin: 0 0 .35em; font-size: 1.02em; }
  .slide li::marker { color: var(--slide-accent); }
  .slide strong { color: var(--slide-fg); font-weight: 800; }
  .slide em { color: var(--slide-fg); }
  .slide a { color: var(--slide-accent); text-decoration: none; border-bottom: 1px solid color-mix(in srgb, var(--slide-accent) 40%, transparent); }
  .slide blockquote {
    margin: .4em 0 .6em; padding: .7em 1.1em; border-left: .12em solid var(--slide-accent);
    background: var(--accent-soft); border-radius: 0 .5em .5em 0;
    font-size: 1.05em; font-style: italic; color: var(--slide-fg);
  }
  .slide blockquote p { margin: 0; }
  .slide code {
    font-family: "SF Mono","JetBrains Mono",ui-monospace,Menlo,Consolas,monospace;
    font-size: .86em; background: color-mix(in srgb, var(--slide-accent) 12%, transparent);
    color: var(--slide-fg); padding: .12em .4em; border-radius: .35em; border: 1px solid var(--slide-rule);
  }
  .slide pre.code {
    margin: 0 0 .8em; padding: .9em 1.1em; border-radius: .6em;
    background: color-mix(in srgb, var(--slide-fg) 8%, var(--slide-bg));
    border: 1px solid var(--slide-rule); overflow: hidden;
  }
  .slide pre.code code {
    background: transparent; border: 0; padding: 0; color: var(--slide-fg);
    font-size: .78em; line-height: 1.55; white-space: pre-wrap; word-break: break-word;
  }
  .slide hr { border: 0; height: .06em; background: var(--slide-rule); margin: 1em 0; }
  .slide img { max-width: 100%; border-radius: .5em; box-shadow: var(--shadow-md); }
  .slide table { border-collapse: collapse; width: 100%; margin: 0 0 .8em; font-size: .92em; }
  .slide th, .slide td { padding: .5em .8em; text-align: left; border-bottom: 1px solid var(--slide-rule); }
  .slide thead th {
    background: var(--accent-soft); color: var(--slide-fg); font-weight: 800;
    border-bottom: 2px solid var(--slide-accent); font-size: .85em; text-transform: uppercase; letter-spacing: .03em;
  }
  .slide tbody tr:nth-child(even) { background: color-mix(in srgb, var(--slide-fg) 3%, transparent); }

  /* title slide treatment */
  .slide.is-title h1 { font-size: 3.6em; }
  .slide.is-title h3 { font-size: 1.4em; margin-bottom: 0; }
  .slide.is-title .kicker {
    display: inline-block; font-size: .5em; font-weight: 800; letter-spacing: .22em;
    text-transform: uppercase; color: var(--slide-accent); margin-bottom: .9em;
  }

  /* ============================================================
     THUMBNAILS
     ============================================================ */
  .thumb-strip {
    display: flex; gap: 10px; padding: 12px 16px; overflow-x: auto;
    border-top: 1px solid var(--border); background: color-mix(in srgb, var(--panel) 80%, transparent);
    backdrop-filter: blur(6px);
    scrollbar-width: thin;
  }
  .thumb-strip::-webkit-scrollbar { height: 8px; }
  .thumb-strip::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 99px; }
  .thumb {
    flex: 0 0 auto; position: relative; width: 170px; height: 96px;
    border-radius: 8px; overflow: hidden; cursor: pointer;
    border: 2px solid var(--border-strong); background: var(--slide-bg);
    box-shadow: var(--shadow-sm); transition: border-color .15s, transform .12s, box-shadow .15s;
  }
  .thumb:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
  .thumb.active { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft), var(--shadow-md); }
  .thumb .thumb-slide {
    position: absolute; left: 50%; top: 50%;
    width: 1280px; height: 720px; transform-origin: center center;
    pointer-events: none; overflow: hidden;
  }
  .thumb .thumb-slide::before { display: none; }
  .thumb .num {
    position: absolute; left: 5px; bottom: 4px; z-index: 2;
    font-size: 10px; font-weight: 700; color: #fff;
    background: rgba(0,0,0,.55); padding: 1px 6px; border-radius: 99px;
  }

  /* ============================================================
     FULLSCREEN PRESENTATION
     ============================================================ */
  body.presenting { overflow: hidden; }
  .present-layer {
    position: fixed; inset: 0; z-index: 100;
    background: #05080e;
    display: none; flex-direction: column;
  }
  body.presenting .present-layer { display: flex; }
  body.presenting .app { visibility: hidden; }
  .present-stage { flex: 1; position: relative; min-height: 0; }
  .present-controls {
    position: absolute; left: 0; right: 0; bottom: 0; z-index: 5;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    padding: 14px; opacity: 0; transition: opacity .3s;
    background: linear-gradient(0deg, rgba(0,0,0,.55), transparent);
  }
  .present-layer:hover .present-controls, .present-controls.show { opacity: 1; }
  .present-controls .btn { background: rgba(255,255,255,.1); border-color: rgba(255,255,255,.18); color: #fff; }
  .present-controls .counter { color: #fff; }
  .present-controls .counter span { color: rgba(255,255,255,.55); }
  .present-hint {
    position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,.5); font-size: 12px; z-index: 5;
    background: rgba(0,0,0,.4); padding: 5px 12px; border-radius: 99px;
    opacity: 0; transition: opacity .4s; pointer-events: none;
  }
  body.presenting .present-hint { opacity: 1; animation: hintFade 4s 2s forwards; }
  @keyframes hintFade { to { opacity: 0; } }

  /* ============================================================
     PRINT / PDF
     ============================================================ */
  #print-root { display: none; }
  @media print {
    @page { size: 1280px 720px; margin: 0; }
    body { background: #fff; overflow: visible; }
    .app, .present-layer, .topbar, .present-hint, .present-controls { display: none !important; }
    #print-root { display: block; }
    .print-slide {
      width: 1280px; height: 720px; page-break-after: always;
      break-after: page; overflow: hidden; box-shadow: none; border-radius: 0;
    }
    .print-slide:last-child { page-break-after: auto; }
  }

  /* ============================================================
     RESPONSIVE
     ============================================================ */
  @media (max-width: 820px) {
    .workspace { grid-template-columns: 1fr; grid-template-rows: 40% 6px 1fr; }
    .gutter { cursor: row-resize; }
    .editor-pane { border-right: 0; border-bottom: 1px solid var(--border); }
    .brand .sub { display: none; }
    .btn span.label { display: none; }
  }
</style>
</head>
<body>
  <div class="app">
    <!-- ===== Top bar ===== -->
    <header class="topbar">
      <div class="brand">
        <div class="logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="13" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
        </div>
        <div>Markdown → Slides<div class="sub">Write markdown, present like a pro</div></div>
      </div>

      <div class="spacer"></div>

      <div class="seg" id="themeSeg" title="Theme">
        <button data-theme-val="light" class="active">Light</button>
        <button data-theme-val="dark">Dark</button>
      </div>

      <button class="btn" id="sampleBtn" title="Load sample deck">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M9 13h6M9 17h4"/></svg>
        <span class="label">Sample</span>
      </button>

      <button class="btn" id="printBtn" title="Print / Export PDF">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        <span class="label">Print</span>
      </button>

      <button class="btn primary" id="presentBtn" title="Present (F)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h6v6H4zM14 4h6v6h-6zM4 14h6v6H4zM14 14h6v6h-6z"/></svg>
        <span class="label">Present</span>
      </button>
    </header>

    <!-- ===== Workspace ===== -->
    <div class="workspace" id="workspace">
      <!-- Editor -->
      <section class="editor-pane">
        <div class="pane-head">
          <span>Editor</span>
          <span class="hint">Separate slides with <span class="kbd">---</span></span>
        </div>
        <div class="editor-wrap">
          <textarea id="editor" spellcheck="false" autocomplete="off"></textarea>
        </div>
        <div class="editor-foot">
          <span><b id="slideCount">0</b> slides</span>
          <span><b id="wordCount">0</b> words</span>
          <span style="flex:1"></span>
          <span class="kbd">F</span> present · <span class="kbd">T</span> theme · <span class="kbd">Esc</span> exit</span>
        </div>
      </section>

      <div class="gutter" id="gutter"></div>

      <!-- Preview -->
      <section class="preview-pane">
        <div class="preview-head">
          <div class="pane-head" style="border:0;padding:0;background:transparent">Preview</div>
          <div class="nav-cluster">
            <button class="nav-btn" id="firstBtn" title="First (Home)" aria-label="First slide">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 18l-7-6 7-6M5 6v12"/></svg>
            </button>
            <button class="nav-btn" id="prevBtn" title="Previous (←)" aria-label="Previous slide">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-7-6 7-6"/></svg>
            </button>
            <div class="counter"><b id="curNum">0</b><span> / </span><b id="totNum">0</b></div>
            <button class="nav-btn" id="nextBtn" title="Next (→)" aria-label="Next slide">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l7-6-7-6"/></svg>
            </button>
            <button class="nav-btn" id="lastBtn" title="Last (End)" aria-label="Last slide">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 18l7-6-7-6M19 6v12"/></svg>
            </button>
            <div class="progress"><i id="progressBar"></i></div>
          </div>
        </div>

        <div class="stage" id="stage">
          <div class="stage-inner">
            <article class="slide enter" id="slide"><div class="slide-content"></div></article>
          </div>
        </div>

        <div class="thumb-strip" id="thumbs"></div>
      </section>
    </div>
  </div>

  <!-- ===== Presentation overlay ===== -->
  <div class="present-layer" id="presentLayer">
    <div class="present-hint">Use ← → to navigate · F to toggle · Esc to exit</div>
    <div class="present-stage" id="presentStage">
      <article class="slide enter" id="presentSlide"><div class="slide-content"></div></article>
    </div>
    <div class="present-controls" id="presentControls">
      <button class="btn" id="pPrev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-7-6 7-6"/></svg></button>
      <div class="counter"><b id="pCur">0</b><span> / </span><b id="pTot">0</b></div>
      <button class="btn" id="pNext"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l7-6-7-6"/></svg></button>
      <button class="btn" id="pExit">Exit</button>
    </div>
  </div>

  <div id="print-root"></div>

<script>
/* ============================================================
   MARKDOWN ENGINE (self-contained, no dependencies)
   ============================================================ */
function escapeHtml(s){
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function inlineMarkdown(src){
  const codes = [];
  // pull out inline code first so its contents aren't formatted
  src = src.replace(/`([^`]+)`/g, (m,p)=>{ codes.push(p); return "␀"+(codes.length-1)+"␀"; });
  src = escapeHtml(src);
  // images
  src = src.replace(/!\[([^\]]*)\]\(([^)\s]+)(?:\s+"([^"]*)")?\)/g,
    (m,alt,url,title)=>`<img src="${url}" alt="${alt}"${title?` title="${title}"`:""} loading="lazy">`);
  // links
  src = src.replace(/\[([^\]]+)\]\(([^)\s]+)(?:\s+"([^"]*)")?\)/g,
    (m,txt,url,title)=>`<a href="${url}" target="_blank" rel="noopener"${title?` title="${title}"`:""}>${txt}</a>`);
  // bold
  src = src.replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>")
           .replace(/__([^_]+)__/g,"<strong>$1</strong>");
  // italic
  src = src.replace(/(^|[^\*])\*([^*\n]+)\*(?!\*)/g,"$1<em>$2</em>")
           .replace(/(^|[^\w])_([^_\n]+)_(?!\w)/g,"$1<em>$2</em>");
  // strikethrough
  src = src.replace(/~~([^~]+)~~/g,"<del>$1</del>");
  // restore inline code
  src = src.replace(/␀(\d+)␀/g,(m,i)=>`<code>${escapeHtml(codes[+i])}</code>`);
  return src;
}

function splitTableRow(line){
  return line.replace(/^\s*\|/,"").replace(/\|\s*$/,"").split("|").map(s=>s.trim());
}

function parseMarkdown(md){
  const lines = md.replace(/\r\n?/g,"\n").split("\n");
  const out = [];
  let i = 0;
  const isEmpty = l => /^\s*$/.test(l);

  while (i < lines.length){
    const line = lines[i];
    if (isEmpty(line)) { i++; continue; }

    // fenced code block
    const fence = /^(\s*)(`{3,}|~{3,})(.*)$/.exec(line);
    const fenceMarker = fence && fence[2];
    if (fenceMarker) {
      const lang = (fence[3]||"").trim();
      const buf = [];
      i++;
      while (i < lines.length && !new RegExp("^\\s*"+fence[2].replace(/[`~]/g,"\\$&")).test(lines[i])) {
        buf.push(lines[i]); i++;
      }
      i++; // closing fence
      out.push(`<pre class="code"><code${lang?` data-lang="${lang}"`:""}>${escapeHtml(buf.join("\n"))}</code></pre>`);
      continue;
    }

    // ATX headings
    const h = /^(#{1,6})\s+(.*)$/.exec(line);
    if (h){ const lvl=h[1].length; out.push(`<h${lvl}>${inlineMarkdown(h[2].replace(/^#+$/,"").trim())}</h${lvl}>`); i++; continue; }

    // horizontal rule (--- already consumed as slide break; handle *** / ___)
    if (/^\s*([\*_])\1{2,}\s*$/.test(line)){ out.push("<hr>"); i++; continue; }

    // blockquote
    if (/^\s*>/.test(line)){
      const buf = [];
      while (i < lines.length && /^\s*>/.test(lines[i])){ buf.push(lines[i].replace(/^\s*>\s?/,"")); i++; }
      out.push(`<blockquote>${inlineMarkdown(buf.join(" "))}</blockquote>`);
      continue;
    }

    // unordered list
    if (/^\s*[-*+]\s+/.test(line)){
      const items = [];
      while (i < lines.length && /^\s*[-*+]\s+/.test(lines[i])){
        items.push(`<li>${inlineMarkdown(lines[i].replace(/^\s*[-*+]\s+/,""))}</li>`); i++;
      }
      out.push(`<ul>${items.join("")}</ul>`);
      continue;
    }

    // ordered list
    if (/^\s*\d+\.\s+/.test(line)){
      const items = [];
      while (i < lines.length && /^\s*\d+\.\s+/.test(lines[i])){
        items.push(`<li>${inlineMarkdown(lines[i].replace(/^\s*\d+\.\s+/,""))}</li>`); i++;
      }
      out.push(`<ol>${items.join("")}</ol>`);
      continue;
    }

    // GFM table
    if (/\|/.test(line) && i+1 < lines.length &&
        /^\s*\|?[\s:|\-]+\|?\s*$/.test(lines[i+1]) && /-/.test(lines[i+1])){
      const header = splitTableRow(line);
      i += 2;
      const rows = [];
      while (i < lines.length && /\|/.test(lines[i]) && !isEmpty(lines[i])){
        rows.push(splitTableRow(lines[i])); i++;
      }
      let html = '<table><thead><tr>'+header.map(c=>`<th>${inlineMarkdown(c)}</th>`).join("")+'</tr></thead><tbody>';
      for (const r of rows) html += '<tr>'+r.map(c=>`<td>${inlineMarkdown(c)}</td>`).join("")+'</tr>';
      html += '</tbody></table>';
      out.push(html);
      continue;
    }

    // paragraph (gather contiguous plain lines)
    const para = [];
    const isSpecial = l => /^(#{1,6}\s|>|[-*+]\s|\d+\.\s|```|~~~)/.test(l) || /^\s*([\*_])\1{2,}\s*$/.test(l) || /^\s*-{3,}\s*$/.test(l);
    while (i < lines.length && !isEmpty(lines[i]) && !isSpecial(lines[i])){
      para.push(lines[i]); i++;
    }
    if (para.length) out.push(`<p>${inlineMarkdown(para.join(" "))}</p>`);
  }
  return out.join("\n");
}

/* Split deck on lines of 3+ dashes */
function splitSlides(md){
  const lines = md.replace(/\r\n?/g,"\n").split("\n");
  const slides = [];
  let cur = [];
  for (const l of lines){
    if (/^\s*-{3,}\s*$/.test(l)){ slides.push(cur.join("\n")); cur = []; }
    else cur.push(l);
  }
  slides.push(cur.join("\n"));
  return slides.map(s=>s.trim()).filter(s=>s.length>0);
}

/* ============================================================
   SAMPLE DECK
   ============================================================ */
const SAMPLE = `# Q3 Strategy Review

/* ============================================================
   STATE & DOM
   ============================================================ */
const $ = id => document.getElementById(id);
const editor = $("editor");
const slideEl = $("slide");
const slideContent = slideEl.querySelector(".slide-content");
const presentSlide = $("presentSlide");
const presentContent = presentSlide.querySelector(".slide-content");
const thumbs = $("thumbs");
const stage = $("stage");
const presentStage = $("presentStage");

let slides = [];        // parsed HTML per slide
let current = 0;
let presentMode = false;

/* ============================================================
   RENDER PIPELINE
   ============================================================ */
function buildSlides(){
  slides = splitSlides(editor.value).map(parseMarkdown);
  if (slides.length === 0) slides = ["<p style='color:var(--slide-fg-muted)'>Start typing markdown to create your first slide…</p>"];
  if (current > slides.length - 1) current = slides.length - 1;
  if (current < 0) current = 0;
}

function slideClasses(html){
  const trimmed = html.trim();
  const isTitle = /^<h1/i.test(trimmed);
  return isTitle ? "is-title" : "";
}

function renderSlide(host, contentEl, html, index, total){
  contentEl.innerHTML = html;
  const isTitle = /^<h1/i.test((html||"").trim());
  host.classList.toggle("is-title", isTitle);
  let footer = host.querySelector(".slide-footer");
  if (isTitle || total <= 1){
    if (footer) footer.remove();
  } else {
    if (!footer){
      footer = document.createElement("div");
      footer.className = "slide-footer";
      host.appendChild(footer);
    }
    const n = String(index + 1).padStart(2, "0");
    const t = String(total).padStart(2, "0");
    footer.innerHTML = `<span><span class="brand-dot"></span>Markdown &rarr; Slides</span><span>${n} / ${t}</span>`;
  }
}

function showSlide(animate){
  const html = slides[current] || "";
  renderSlide(slideEl, slideContent, html, current, slides.length);
  renderSlide(presentSlide, presentContent, html, current, slides.length);
  if (animate){
    [slideEl, presentSlide].forEach(el=>{
      el.classList.remove("enter");
      void el.offsetWidth;
      el.classList.add("enter");
    });
  }
  fitStage();
  fitPresent();
  updateChrome();
  updateThumbsActive();
}

function fitTo(host, container){
  const scale = Math.min(container.clientWidth / 1280, container.clientHeight / 720);
  host.style.transform = `translate(-50%,-50%) scale(${Math.max(scale, 0.01)})`;
}
function fitStage(){ fitTo(slideEl, stage); }
function fitPresent(){ if (presentMode) fitTo(presentSlide, presentStage); }

function updateChrome(){
  const n = slides.length;
  $("curNum").textContent = current + 1;
  $("totNum").textContent = n;
  $("pCur").textContent = current + 1;
  $("pTot").textContent = n;
  $("slideCount").textContent = n;
  $("progressBar").style.width = (n ? ((current+1)/n)*100 : 0) + "%";
  $("prevBtn").disabled = current <= 0;
  $("firstBtn").disabled = current <= 0;
  $("nextBtn").disabled = current >= n-1;
  $("lastBtn").disabled = current >= n-1;
  const words = editor.value.trim().split(/\s+/).filter(Boolean).length;
  $("wordCount").textContent = words;
}

/* ---- Thumbnails ---- */
function renderThumbs(){
  thumbs.innerHTML = "";
  const scale = 170 / 1280;
  slides.forEach((html, idx)=>{
    const t = document.createElement("div");
    t.className = "thumb" + (idx === current ? " active" : "");
    t.innerHTML = `<span class="num">${idx+1}</span>`;
    const inner = document.createElement("div");
    inner.className = "thumb-slide";
    inner.style.transform = `translate(-50%,-50%) scale(${scale})`;
    inner.innerHTML = `<div class="slide-content">${html}</div>`;
    // mimic slide typography context
    const fake = document.createElement("article");
    fake.className = "slide" + (slideClasses(html) ? " is-title" : "");
    fake.style.cssText = "position:absolute;left:50%;top:50%;width:1280px;height:720px;transform-origin:center;overflow:hidden;padding:1.6em;font-size:30px;color:var(--slide-fg);";
    fake.innerHTML = `<div class="slide-content">${html}</div>`;
    fake.style.transform = `translate(-50%,-50%) scale(${scale})`;
    t.appendChild(fake);
    t.addEventListener("click", ()=>{ current = idx; showSlide(true); });
    thumbs.appendChild(t);
  });
}
function updateThumbsActive(){
  [...thumbs.children].forEach((t,idx)=>t.classList.toggle("active", idx===current));
  const active = thumbs.children[current];
  if (active) active.scrollIntoView({behavior:"smooth", inline:"center", block:"nearest"});
}

/* ============================================================
   NAVIGATION
   ============================================================ */
function go(delta){ moveTo(current + delta); }
function moveTo(idx){
  idx = Math.max(0, Math.min(slides.length - 1, idx));
  if (idx === current) return;
  current = idx;
  showSlide(true);
}

/* ============================================================
   FULL UPDATE (on edit)
   ============================================================ */
let raf = null;
function scheduleUpdate(){
  if (raf) cancelAnimationFrame(raf);
  raf = requestAnimationFrame(()=>{ raf = null; fullUpdate(); });
}
function fullUpdate(){
  const prevCount = slides.length;
  buildSlides();
  renderThumbs();
  showSlide(false);
}

/* ============================================================
   THEME
   ============================================================ */
function setTheme(val){
  document.documentElement.setAttribute("data-theme", val);
  [...$("themeSeg").children].forEach(b=>b.classList.toggle("active", b.dataset.themeVal === val));
  try { localStorage.setItem("mds-theme", val); } catch(e){}
}
function toggleTheme(){
  setTheme(document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark");
}
$("themeSeg").addEventListener("click", e=>{
  const b = e.target.closest("button"); if (!b) return;
  setTheme(b.dataset.themeVal);
});

/* ============================================================
   PRESENTATION MODE
   ============================================================ */
function enterPresent(){
  if (slides.length === 0) return;
  presentMode = true;
  document.body.classList.add("presenting");
  renderSlide(presentSlide, presentContent, slides[current], current, slides.length);
  fitPresent();
  const c = $("presentControls"); c.classList.add("show");
  setTimeout(()=>c.classList.remove("show"), 1800);
  try { presentSlide.requestFullscreen && presentSlide.requestFullscreen(); } catch(e){}
}
function exitPresent(){
  presentMode = false;
  document.body.classList.remove("presenting");
  if (document.fullscreenElement) document.exitFullscreen().catch(()=>{});
}
$("presentBtn").addEventListener("click", enterPresent);
$("pExit").addEventListener("click", exitPresent);
$("pNext").addEventListener("click", ()=>go(1));
$("pPrev").addEventListener("click", ()=>go(-1));

/* ============================================================
   BUTTONS
   ============================================================ */
$("prevBtn").addEventListener("click", ()=>go(-1));
$("nextBtn").addEventListener("click", ()=>go(1));
$("firstBtn").addEventListener("click", ()=>moveTo(0));
$("lastBtn").addEventListener("click", ()=>moveTo(slides.length-1));
$("sampleBtn").addEventListener("click", ()=>{
  editor.value = SAMPLE;
  current = 0;
  persist();
  fullUpdate();
});

/* ============================================================
   PRINT / PDF
   ============================================================ */
function buildPrint(){
  const root = $("print-root");
  root.innerHTML = "";
  slides.forEach(html=>{
    const s = document.createElement("article");
    s.className = "slide print-slide" + (slideClasses(html) ? " is-title" : "");
    s.innerHTML = `<div class="slide-content">${html}</div>`;
    root.appendChild(s);
  });
}
$("printBtn").addEventListener("click", ()=>{
  buildPrint();
  // allow layout before print dialog
  setTimeout(()=>window.print(), 60);
});

/* ============================================================
   KEYBOARD
   ============================================================ */
window.addEventListener("keydown", e=>{
  // ignore when typing in editor (except a few global keys)
  const inEditor = document.activeElement === editor;

  if (e.key === "Escape" && presentMode){ exitPresent(); e.preventDefault(); return; }

  // global shortcut: F (present), T (theme) — work even from editor? only when not typing for F/T
  if (!inEditor){
    if (e.key === "f" || e.key === "F"){ enterPresent(); e.preventDefault(); return; }
    if (e.key === "t" || e.key === "T"){ toggleTheme(); e.preventDefault(); return; }
  }

  if (presentMode){
    if (e.key === "ArrowRight" || e.key === "PageDown" || e.key === " "){ go(1); e.preventDefault(); }
    else if (e.key === "ArrowLeft" || e.key === "PageUp"){ go(-1); e.preventDefault(); }
    else if (e.key === "Home"){ moveTo(0); e.preventDefault(); }
    else if (e.key === "End"){ moveTo(slides.length-1); e.preventDefault(); }
    return;
  }

  if (!inEditor){
    if (e.key === "ArrowRight" || e.key === "PageDown"){ go(1); e.preventDefault(); }
    else if (e.key === "ArrowLeft" || e.key === "PageUp"){ go(-1); e.preventDefault(); }
    else if (e.key === "Home"){ moveTo(0); e.preventDefault(); }
    else if (e.key === "End"){ moveTo(slides.length-1); e.preventDefault(); }
  }
});

/* ============================================================
   GUTTER (resizable editor / preview)
   ============================================================ */
const gutter = $("gutter");
const workspace = $("workspace");
let dragging = false;
function startDrag(e){ dragging = true; document.body.style.cursor = "col-resize"; e.preventDefault(); }
gutter.addEventListener("mousedown", startDrag);
window.addEventListener("mousemove", e=>{
  if (!dragging) return;
  const rect = workspace.getBoundingClientRect();
  let pct = ((e.clientX - rect.left) / rect.width) * 100;
  pct = Math.max(18, Math.min(80, pct));
  workspace.style.setProperty("--editor-w", pct + "%");
});
window.addEventListener("mouseup", ()=>{ if (dragging){ dragging = false; document.body.style.cursor = ""; fitStage(); } });

/* ============================================================
   RESIZE & PERSISTENCE
   ============================================================ */
const ro = new ResizeObserver(()=>{ fitStage(); fitPresent(); });
ro.observe(stage);
ro.observe(presentStage);
window.addEventListener("resize", ()=>{ fitStage(); fitPresent(); });

function persist(){
  try { localStorage.setItem("mds-doc", editor.value); } catch(e){}
}
let persistTimer = null;
editor.addEventListener("input", ()=>{
  scheduleUpdate();
  clearTimeout(persistTimer);
  persistTimer = setTimeout(persist, 500);
});

// Tab support in textarea
editor.addEventListener("keydown", e=>{
  if (e.key === "Tab"){
    e.preventDefault();
    const s = editor.selectionStart, en = editor.selectionEnd;
    editor.value = editor.value.slice(0,s) + "  " + editor.value.slice(en);
    editor.selectionStart = editor.selectionEnd = s + 2;
    scheduleUpdate();
  }
});

/* ============================================================
   INIT
   ============================================================ */
(function init(){
  let savedTheme = "light";
  let savedDoc = null;
  try { savedTheme = localStorage.getItem("mds-theme") || "light"; savedDoc = localStorage.getItem("mds-doc"); } catch(e){}
  setTheme(savedTheme);
  editor.value = (savedDoc && savedDoc.trim()) ? savedDoc : SAMPLE;
  current = 0;
  fullUpdate();
  // re-fit once layout settles
  requestAnimationFrame(()=>{ fitStage(); fitPresent(); });
})();
</script>
