<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Weather Theatre — A Remixed Forecast</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;0,900;1,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --velvet:#3a0a12;
    --velvet-2:#5a0d18;
    --gold:#d9b26a;
    --gold-bright:#f4d98b;
    --gold-deep:#8a6a2a;
    --ink:#0a0608;
    --paper:#f3e7cf;
    --cosy:#ff9d54;
    --eerie:#5fc4cc;
    --heroic:#ff5a3c;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:'Inter',system-ui,sans-serif;
    color:var(--paper);
    background:
      radial-gradient(1200px 700px at 50% -10%, #2a1218 0%, rgba(20,8,12,0) 60%),
      radial-gradient(900px 600px at 90% 110%, #1a1024 0%, rgba(10,6,12,0) 55%),
      linear-gradient(180deg,#160a10 0%,#0a0608 100%);
    min-height:100%;
    overflow-x:hidden;
  }
  .wrap{max-width:1180px;margin:0 auto;padding:34px 22px 60px}

  /* ---- Marquee header ---- */
  .marquee{text-align:center;margin-bottom:22px;position:relative}
  .marquee .orn{display:flex;align-items:center;justify-content:center;gap:14px;color:var(--gold-deep);letter-spacing:.42em;font-size:11px;font-weight:600;text-transform:uppercase}
  .marquee .orn i{flex:0 0 120px;height:1px;background:linear-gradient(90deg,transparent,var(--gold-deep),transparent);font-style:normal}
  .marquee h1{
    font-family:'Playfair Display',serif;font-weight:900;
    font-size:clamp(30px,5.4vw,58px);margin:6px 0 2px;line-height:1;
    background:linear-gradient(180deg,#fbe7b0 0%,#e8c074 45%,#a87a30 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    letter-spacing:.01em;text-shadow:0 2px 0 rgba(0,0,0,.25);
  }
  .marquee .sub{font-family:'Playfair Display',serif;font-style:italic;color:#c9a87a;font-size:14px;letter-spacing:.02em}

  /* ---- Stage ---- */
  .stage{
    position:relative;width:100%;aspect-ratio:16/9;
    background:#000;border-radius:14px;overflow:hidden;
    box-shadow:
      0 0 0 2px var(--gold-deep),
      0 0 0 10px #1a0d14,
      0 0 0 12px var(--gold),
      0 30px 70px -20px rgba(0,0,0,.8),
      inset 0 0 0 1px rgba(255,220,150,.08);
  }
  .stage canvas{display:block;width:100%;height:100%}

  /* proscenium inner gilt frame */
  .frame{position:absolute;inset:0;pointer-events:none;border-radius:14px;
    box-shadow:inset 0 0 0 2px rgba(244,217,139,.55), inset 0 0 0 6px rgba(0,0,0,.35), inset 0 0 60px rgba(0,0,0,.55);
    z-index:6}
  .frame::before,.frame::after{content:"";position:absolute;width:46px;height:46px;
    background:
      radial-gradient(circle at 50% 50%, var(--gold-bright) 0 18%, var(--gold) 18% 38%, var(--gold-deep) 38% 60%, transparent 62%);
    opacity:.85}
  .frame::before{top:8px;left:8px}
  .frame::after{bottom:8px;right:8px}

  /* valance (top pelmet) */
  .valance{position:absolute;top:0;left:0;right:0;height:13%;z-index:7;pointer-events:none;
    background:
      linear-gradient(180deg,#6e1020 0%,#4a0a14 100%);
    -webkit-mask:radial-gradient(circle 18px at 18px 18px, #000 98%, transparent 100%) repeat-x;
    -webkit-mask-size:36px 18px;
    mask:radial-gradient(circle 18px at 18px 18px, #000 98%, transparent 100%) repeat-x;
    mask-size:36px 18px;
    box-shadow:0 6px 14px rgba(0,0,0,.6), inset 0 -3px 6px rgba(0,0,0,.5);
    border-bottom:2px solid var(--gold);
  }
  .valance::after{content:"";position:absolute;left:0;right:0;bottom:-7px;height:7px;
    background:repeating-linear-gradient(90deg,var(--gold-bright) 0 2px, transparent 2px 10px, var(--gold) 10px 12px, transparent 12px 22px);
    opacity:.8;filter:drop-shadow(0 1px 1px rgba(0,0,0,.5))}

  /* curtains */
  .curtain{position:absolute;top:0;bottom:0;width:50%;z-index:8;pointer-events:none;
    transition:transform 1500ms cubic-bezier(.7,0,.2,1), opacity .4s;
    background:
      linear-gradient(90deg, rgba(0,0,0,.55), rgba(0,0,0,0) 18%, rgba(0,0,0,0) 82%, rgba(0,0,0,.55)),
      repeating-linear-gradient(90deg,#5a0d18 0 16px,#420911 16px 20px,#6e1322 20px 38px,#4a0a14 38px 42px),
      #4a0a14;
    box-shadow:inset 0 0 60px rgba(0,0,0,.6);
  }
  .curtain.l{left:0;transform-origin:left center}
  .curtain.r{right:0;transform-origin:right center}
  .stage.revealed .curtain.l{transform:translateX(-94%)}
  .stage.revealed .curtain.r{transform:translateX(94%)}
  .curtain::after{content:"";position:absolute;top:0;bottom:0;width:14px;
    background:linear-gradient(90deg,rgba(244,217,139,.0),rgba(244,217,139,.55));
    border-right:2px solid var(--gold)}
  .curtain.l::after{right:0}
  .curtain.r::after{left:0;border-right:none;border-left:2px solid var(--gold);
    background:linear-gradient(270deg,rgba(244,217,139,.0),rgba(244,217,139,.55))}

  /* footlights */
  .footlights{position:absolute;left:3%;right:3%;bottom:6px;height:14px;z-index:7;pointer-events:none;
    display:flex;justify-content:space-between;align-items:flex-end}
  .footlights b{width:9px;height:9px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #fff6d8, #ffcf6b 45%, #c87a1e 80%);
    box-shadow:0 0 10px 3px rgba(255,190,90,.7), 0 -6px 16px 4px rgba(255,180,80,.35);
    animation:flick 3.6s infinite}
  .footlights b:nth-child(2n){animation-duration:4.4s;animation-delay:.4s}
  .footlights b:nth-child(3n){animation-duration:3.1s;animation-delay:.9s}
  @keyframes flick{0%,100%{opacity:1}48%{opacity:.78}50%{opacity:.92}52%{opacity:.7}}

  /* scene card / subtitle */
  .scenecard{position:absolute;left:7%;right:7%;bottom:9%;z-index:9;pointer-events:none;
    display:flex;flex-direction:column;align-items:center;text-align:center;gap:6px}
  .scenecard .tag{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.4em;
    color:var(--gold-bright);text-transform:uppercase;opacity:.85;
    text-shadow:0 1px 2px #000}
  .scenecard .line{font-family:'Playfair Display',serif;font-style:italic;font-weight:500;
    font-size:clamp(13px,1.7vw,20px);color:#f6ecd6;line-height:1.4;max-width:42ch;
    text-shadow:0 2px 10px rgba(0,0,0,.9), 0 0 2px rgba(0,0,0,.9);min-height:2.6em}
  .tw-cursor{display:inline-block;width:.5ch;opacity:.9;animation:blink 1s steps(1) infinite;color:var(--gold-bright)}
  @keyframes blink{50%{opacity:0}}

  /* ---- Controls ---- */
  .panel{margin-top:24px;display:grid;grid-template-columns:1.35fr 1fr;gap:22px}
  @media(max-width:820px){.panel{grid-template-columns:1fr}}
  .card{
    background:linear-gradient(180deg, rgba(40,18,26,.92), rgba(20,10,14,.92));
    border:1px solid rgba(217,178,106,.28);border-radius:14px;padding:20px 22px;
    box-shadow:inset 0 1px 0 rgba(255,220,150,.07), 0 14px 30px -18px rgba(0,0,0,.7);
  }
  .card h2{font-family:'Playfair Display',serif;font-weight:700;font-size:15px;letter-spacing:.04em;
    margin:0 0 4px;color:var(--gold-bright);display:flex;align-items:center;gap:10px}
  .card h2 .dot{width:8px;height:8px;border-radius:50%;box-shadow:0 0 8px currentColor}
  .card .hint{font-size:12px;color:#b69a78;margin:0 0 16px}

  .slider{margin:14px 0}
  .slider .row{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:7px}
  .slider .name{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;letter-spacing:.01em}
  .slider .desc{font-size:11px;color:#9c8266;margin-left:8px;font-style:italic}
  .slider .val{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--gold-bright);
    background:rgba(0,0,0,.35);border:1px solid rgba(217,178,106,.25);padding:2px 8px;border-radius:6px}
  input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:8px;border-radius:8px;outline:none;
    background:linear-gradient(90deg,var(--c) 0%, var(--c) var(--p,50%), rgba(255,255,255,.08) var(--p,50%));
    box-shadow:inset 0 0 0 1px rgba(0,0,0,.4)}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #fff4d6, var(--c) 60%, #6b4a1e 100%);
    border:2px solid #1a0d14;box-shadow:0 0 10px var(--c), 0 3px 6px rgba(0,0,0,.6);cursor:pointer}
  input[type=range]::-moz-range-thumb{width:22px;height:22px;border-radius:50%;border:2px solid #1a0d14;
    background:radial-gradient(circle at 35% 30%, #fff4d6, var(--c) 60%, #6b4a1e 100%);box-shadow:0 0 10px var(--c);cursor:pointer}

  .nowplaying{display:flex;align-items:center;gap:10px;margin-top:16px;padding-top:14px;
    border-top:1px solid rgba(217,178,106,.18);font-size:13px}
  .nowplaying .pill{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;
    padding:4px 10px;border-radius:999px;color:#0a0608;font-weight:600}

  /* toggle */
  .toggle{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:18px}
  .toggle .labels{font-family:'Playfair Display',serif}
  .toggle .labels b{display:block;font-size:18px;font-weight:700;color:var(--gold-bright)}
  .toggle .labels span{font-size:11px;color:#9c8266}
  .switch{position:relative;width:96px;height:42px;border-radius:999px;cursor:pointer;flex:0 0 auto;
    background:linear-gradient(180deg,#241318,#160a10);border:1px solid rgba(217,178,106,.4);
    box-shadow:inset 0 2px 6px rgba(0,0,0,.6)}
  .switch .knob{position:absolute;top:3px;left:3px;width:34px;height:34px;border-radius:50%;
    transition:transform .45s cubic-bezier(.6,.0,.2,1), background .3s;
    background:radial-gradient(circle at 35% 30%, #fff6d8, #ffcf6b 55%, #c87a1e 100%);
    box-shadow:0 0 14px rgba(255,190,90,.7)}
  .switch.night .knob{transform:translateX(54px);
    background:radial-gradient(circle at 35% 30%, #fdfcf0, #d8e2ee 55%, #6c7a8c 100%);
    box-shadow:0 0 14px rgba(190,210,230,.6)}
  .switch .knob::after{content:"";position:absolute;inset:6px;border-radius:50%;box-shadow:inset 0 0 6px rgba(0,0,0,.25)}

  .forecast{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.18em;line-height:1.9;
    color:#d9c6a4;border:1px dashed rgba(217,178,106,.3);border-radius:10px;padding:14px 16px;
    background:rgba(0,0,0,.25)}
  .forecast .k{color:#8a6a4a;margin-right:6px}
  .forecast .v{color:var(--gold-bright)}

  .encore{margin-top:16px;width:100%;cursor:pointer;border:1px solid var(--gold);
    background:linear-gradient(180deg,rgba(217,178,106,.18),rgba(217,178,106,.06));
    color:var(--gold-bright);font-family:'Playfair Display',serif;font-weight:700;font-size:15px;
    letter-spacing:.06em;padding:12px;border-radius:10px;transition:.2s}
  .encore:hover{background:linear-gradient(180deg,rgba(244,217,139,.3),rgba(217,178,106,.12));box-shadow:0 0 18px rgba(217,178,106,.3)}
  .encore:active{transform:translateY(1px)}

  .footer{text-align:center;margin-top:26px;color:#7a6450;font-size:11px;letter-spacing:.2em;text-transform:uppercase;font-family:'JetBrains Mono',monospace}
</style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.7/babel.min.js"></script>

<script type="text/plain" id="app-src">
const { useState, useEffect, useRef, useMemo } = React;

/* ============================================================
   PALETTES — three moods, day & night variants
   ============================================================ */
const PALETTES = {
  cosy: {
    day:  { skyTop:'#f7c98a', skyBot:'#fde9cf', orb:'#ffd98a', orbGlow:'rgba(255,200,120,0.55)', hillFar:'#caa078', hillMid:'#a8764e', hillNear:'#7c5232', fg:'#4f321f', accent:'#ff9d54', mist:'rgba(255,223,182,0.16)', cloud:'#f3d6b0' },
    night:{ skyTop:'#241a36', skyBot:'#5b4670', orb:'#f6ead0', orbGlow:'rgba(240,230,200,0.35)', hillFar:'#3a2f4a', hillMid:'#2a2238', hillNear:'#1b1426', fg:'#100a1a', accent:'#ffb066', mist:'rgba(120,90,140,0.22)', cloud:'#3a2f4a' }
  },
  eerie: {
    day:  { skyTop:'#566270', skyBot:'#9aa8af', orb:'#e2ebee', orbGlow:'rgba(200,220,225,0.30)', hillFar:'#4a5560', hillMid:'#343d46', hillNear:'#212930', fg:'#11161a', accent:'#5fc4cc', mist:'rgba(150,170,180,0.30)', cloud:'#5a6770' },
    night:{ skyTop:'#0b1620', skyBot:'#243640', orb:'#d8e6ec', orbGlow:'rgba(180,210,220,0.28)', hillFar:'#1a2a36', hillMid:'#12202a', hillNear:'#0b161e', fg:'#050b12', accent:'#7fd6dd', mist:'rgba(90,120,140,0.30)', cloud:'#16242e' }
  },
  heroic: {
    day:  { skyTop:'#ff7a3c', skyBot:'#ffd06b', orb:'#fff3c6', orbGlow:'rgba(255,220,150,0.62)', hillFar:'#c25a3a', hillMid:'#8c3a2a', hillNear:'#5c1f1a', fg:'#2a0d0a', accent:'#ff5a3c', mist:'rgba(255,180,120,0.15)', cloud:'#e8985c' },
    night:{ skyTop:'#1a0d2a', skyBot:'#3d2a52', orb:'#f4ecd2', orbGlow:'rgba(230,210,180,0.40)', hillFar:'#2a1a3a', hillMid:'#1c1228', hillNear:'#11091c', fg:'#080410', accent:'#ff8a5c', mist:'rgba(120,80,150,0.22)', cloud:'#2a1c3a' }
  }
};

const SCENE_LINES = {
  cosy:   { day:"A soft drizzle whispers past lamplit windows, and the village nestles into its quiet warmth.",
            night:"Rain taps the rooftops while warm light pools behind every frosty pane." },
  eerie:  { day:"A pale mist crawls between the dead oaks, and the rain carries something half-heard.",
            night:"Cold rain hisses through the hollow; the moon stares down, and nothing moves but the fog." },
  heroic: { day:"Storm-winds rake the peaks and the banners crack like thunder beneath a burning sky.",
            night:"Banners stream under a bruised moon as the gale roars down from the high passes." }
};
const MOOD_META = {
  cosy:   { label:'Cosy',   desc:'warm · snug · lamplit',  color:'var(--cosy)'   },
  eerie:  { label:'Eerie',  desc:'cold · haunted · hollow',color:'var(--eerie)'  },
  heroic: { label:'Heroic', desc:'bold · storm · banners', color:'var(--heroic)' }
};
const FORECAST = [
  ['SKY','DRIZZLE'],['TEMP','12°C'],['WIND','W 14 km/h'],['FEEL','RAW & DAMP'],['TONIGHT','PATCHY FOG']
];

/* ============================================================
   HELPERS
   ============================================================ */
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function hexToRgb(h){h=h.replace('#','');if(h.length===3)h=h.split('').map(c=>c+c).join('');const n=parseInt(h,16);return [(n>>16)&255,(n>>8)&255,n&255];}
function rgbaStr(c,a){return `rgba(${c[0]|0},${c[1]|0},${c[2]|0},${a})`;}
function lerp(a,b,t){return a+(b-a)*t;}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}

function blendPalette(weights, isNight){
  const moods=['cosy','eerie','heroic'];
  const parts = moods.map(m=>PALETTES[m][isNight?'night':'day']);
  const W = weights[0]+weights[1]+weights[2] || 1;
  const keys = Object.keys(parts[0]);
  const out={};
  keys.forEach(k=>{
    if(typeof parts[0][k]==='string' && parts[0][k].startsWith('rgba')){
      // glow / mist: blend alphas & colors
      const comps = parts.map(p=>{
        const m=p[k].match(/rgba\(([^)]+)\)/)[1].split(',').map(s=>parseFloat(s.trim()));
        return m;
      });
      const sum=[0,0,0,0];
      comps.forEach((c,i)=>{sum[0]+=c[0]*weights[i];sum[1]+=c[1]*weights[i];sum[2]+=c[2]*weights[i];sum[3]+=c[3]*weights[i];});
      out[k]=`rgba(${(sum[0]/W)|0},${(sum[1]/W)|0},${(sum[2]/W)|0},${(sum[3]/W).toFixed(3)})`;
    } else if(k==='skyTop'||k==='skyBot'||k==='orb'||k==='hillFar'||k==='hillMid'||k==='hillNear'||k==='fg'||k==='accent'||k==='cloud'){
      const rgb=[0,0,0];
      parts.forEach((p,i)=>{const c=hexToRgb(p[k]);rgb[0]+=c[0]*weights[i];rgb[1]+=c[1]*weights[i];rgb[2]+=c[2]*weights[i];});
      out[k]=[rgb[0]/W,rgb[1]/W,rgb[2]/W];
    }
  });
  return out;
}

/* ============================================================
   STAGE — the canvas scene
   ============================================================ */
function Stage({state, revealed}){
  const canvasRef = useRef(null);
  const stateRef = useRef(state);
  stateRef.current = state;
  const revealedRef = useRef(revealed);
  revealedRef.current = revealed;

  useEffect(()=>{
    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');
    let raf, W=0, H=0, dpr=Math.min(window.devicePixelRatio||1, 2);
    const rng = mulberry32(20260617);
    const mouse={x:0.5,y:0.4,t:0};
    let stars=[], particles=[], houses=[], trees=[], banners=[], hillsFar=[], hillsMid=[], hillsNear=[];
    let lastDominant=null, flash=0, nextFlash=0, time=0;

    function resize(){
      const r=canvas.getBoundingClientRect();
      W=r.width; H=r.height;
      canvas.width=Math.round(W*dpr); canvas.height=Math.round(H*dpr);
      ctx.setTransform(dpr,0,0,dpr,0,0);
      buildScene();
    }

    function buildScene(){
      // stars
      stars=[]; for(let i=0;i<90;i++) stars.push({x:Math.random(),y:Math.random()*0.6,r:Math.random()*1.4+.3,p:Math.random()*6.28});
      // hills as polyline samples
      const mkHills=(baseY,amp,freqs,seed)=>{const rr=mulberry32(seed);const pts=[];const n=64;for(let i=0;i<=n;i++){let y=baseY;freqs.forEach(f=>y+=Math.sin(i*f*6.28+rr()*6.28)*amp);pts.push({x:i/n,y:y});}return pts;};
      hillsFar = mkHills(0.62,0.06,[0.6,1.3,2.7],11);
      hillsMid = mkHills(0.72,0.09,[0.5,1.1,2.2],29);
      hillsNear= mkHills(0.84,0.12,[0.4,0.9,1.7],47);
      // foreground clusters
      houses=[]; let rr=mulberry32(7); for(let i=0;i<7;i++){houses.push({x:0.06+i*0.13+(rr()-.5)*.04,w:0.05+rr()*0.03,h:0.07+rr()*0.05,roof:rr()>.4,win:1+ (rr()*2|0)});}
      trees=[]; rr=mulberry32(91); for(let i=0;i<6;i++){trees.push({x:0.05+i*0.17+(rr()-.5)*.05,h:0.16+rr()*0.07,seed:rr()*1000,lean:(rr()-.5)*0.3});}
      banners=[]; rr=mulberry32(123); for(let i=0;i<5;i++){banners.push({x:0.12+i*0.18+(rr()-.5)*.03,h:0.18+rr()*0.05,phase:rr()*6.28,wave:0.5+rr()});}
      reinitParticles(lastDominant||'cosy');
    }

    function reinitParticles(kind){
      particles=[];
      const N = kind==='eerie'?180 : kind==='heroic'?120 : 130;
      for(let i=0;i<N;i++){
        if(kind==='eerie') particles.push({x:Math.random(),y:Math.random(),v:0.018+Math.random()*0.02,len:0.06+Math.random()*0.05,wind:0.004});
        else if(kind==='heroic') particles.push({x:Math.random(),y:Math.random(),v:0.004+Math.random()*0.01,rot:Math.random()*6.28,vr:(Math.random()-.5)*0.1,s:0.006+Math.random()*0.01,phase:Math.random()*6.28,hue:Math.random()});
        else particles.push({x:Math.random(),y:Math.random(),v:0.004+Math.random()*0.008,r:1+Math.random()*2.6,drift:Math.random()*6.28,tw:Math.random()*6.28});
      }
    }

    function drawHills(pts, color, par){
      ctx.beginPath();ctx.moveTo(0,H);
      const off = (mouse.x-0.5)*par*40;
      pts.forEach(p=>ctx.lineTo(p.x*W+off, p.y*H));
      ctx.lineTo(W,H);ctx.closePath();
      ctx.fillStyle=rgbaStr(color,1);ctx.fill();
    }

    function drawVillage(p){
      const off=(mouse.x-0.5)*60;
      const baseY=0.86*H; const lit = stateRef.current.isNight ? '#ffcf7a' : '#ffba6b';
      ctx.save();
      houses.forEach(h=>{
        const x=h.x*W+off; const w=h.w*W; const ht=h.h*H; const y=baseY-ht;
        ctx.fillStyle=rgbaStr(p.fg,1);
        ctx.fillRect(x,y,w,ht);
        if(h.roof){ctx.beginPath();ctx.moveTo(x-4,y);ctx.lineTo(x+w/2,y-ht*0.5);ctx.lineTo(x+w+4,y);ctx.closePath();ctx.fill();}
        // lit windows
        const glow = stateRef.current.isNight?0.95:0.7;
        for(let i=0;i<h.win;i++){
          const wx=x+w*(0.22+i*0.3), wy=y+ht*0.3, ww=w*0.18, wh=ht*0.22;
          ctx.fillStyle=rgbaStr(hexToRgb(lit),glow);
          ctx.fillRect(wx,wy,ww,wh);
          ctx.shadowBlur=12;ctx.shadowColor=lit;ctx.fillRect(wx,wy,ww,wh);ctx.shadowBlur=0;
        }
        // chimney smoke (cosy night warmth)
        if(stateRef.current.isNight){
          ctx.fillStyle='rgba(220,210,200,0.06)';
          for(let i=0;i<3;i++){ctx.beginPath();ctx.arc(x+w*0.7, y-ht*0.4-i*10 - (time*8%30), 6+i*2,0,6.28);ctx.fill();}
        }
      });
      ctx.restore();
    }

    function branch(x,y,len,ang,depth,seed){
      if(depth<=0||len<2) return;
      const ex=x+Math.cos(ang)*len, ey=y+Math.sin(ang)*len;
      ctx.moveTo(x,y);ctx.lineTo(ex,ey);
      const r=mulberry32(seed|0);
      branch(ex,ey,len*0.72,ang-0.4+r()*0.3,depth-1,seed*2+1);
      branch(ex,ey,len*0.7,ang+0.5+r()*0.3,depth-1,seed*3+2);
      if(r()>.7) branch(ex,ey,len*0.5,ang+(r()-.5)*0.4,depth-2,seed*5+7);
    }
    function drawDeadTrees(p){
      const off=(mouse.x-0.5)*70;
      const baseY=0.88*H;
      ctx.strokeStyle=rgbaStr(p.fg,1);ctx.lineCap='round';
      trees.forEach(t=>{
        const x=t.x*W+off; const th=t.h*H;
        ctx.lineWidth=3+th*0.02;
        ctx.beginPath();ctx.moveTo(x,baseY);
        branch(x,baseY,th, -Math.PI/2 + t.lean, 6, (t.seed|0)+1);
        ctx.stroke();
      });
    }

    function drawBanners(p){
      const off=(mouse.x-0.5)*65;
      const baseY=0.87*H;
      banners.forEach(b=>{
        const x=b.x*W+off; const ph=b.h*H;
        // pole
        ctx.strokeStyle=rgbaStr(p.fg,1);ctx.lineWidth=2;
        ctx.beginPath();ctx.moveTo(x,baseY);ctx.lineTo(x,baseY-ph);ctx.stroke();
        // flag
        const wave=Math.sin(time*1.5+b.phase)*0.5*b.wave;
        const fy=baseY-ph;
        ctx.fillStyle=rgbaStr(p.accent,0.92);
        ctx.beginPath();
        ctx.moveTo(x,fy);
        ctx.lineTo(x+0.05*W, fy+6+wave*4);
        ctx.lineTo(x+0.012*W, fy+22);
        ctx.lineTo(x, fy+18);
        ctx.closePath();ctx.fill();
        // accent stripe
        ctx.fillStyle=rgbaStr(p.fg,0.6);ctx.fillRect(x,fy,2,18);
      });
    }

    function drawParticles(kind,p){
      const off=(mouse.x-0.5)*20;
      if(kind==='eerie'){
        ctx.strokeStyle=rgbaStr([200,220,225],0.45);ctx.lineWidth=1.1;ctx.lineCap='round';
        particles.forEach(pt=>{
          pt.y+=pt.v; pt.x+=pt.wind*0.4;
          if(pt.y>1){pt.y=-0.02;pt.x=Math.random();}
          if(pt.x>1)pt.x-=1;
          const x=pt.x*W+off, y=pt.y*H;
          ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x-pt.len*W*0.5,y-pt.len*H);ctx.stroke();
        });
      } else if(kind==='heroic'){
        particles.forEach(pt=>{
          pt.y+=pt.v; pt.x+=Math.sin(time*0.8+pt.phase)*0.0015+0.002; pt.rot+=pt.vr;
          if(pt.y>1){pt.y=-0.02;pt.x=Math.random();}
          if(pt.x>1)pt.x-=1;
          const x=pt.x*W+off, y=pt.y*H, s=pt.s*W;
          ctx.save();ctx.translate(x,y);ctx.rotate(pt.rot);
          const col = pt.hue>.5? p.accent : hexToRgb('#c1352f');
          ctx.fillStyle=rgbaStr(col,0.85);
          ctx.beginPath();ctx.ellipse(0,0,s,s*0.5,0,0,6.28);ctx.fill();
          ctx.restore();
        });
      } else { // cosy snow / soft
        particles.forEach(pt=>{
          pt.y+=pt.v; pt.drift+=0.01; pt.x+=Math.sin(pt.drift)*0.0006;
          pt.tw+=0.05;
          if(pt.y>1){pt.y=-0.02;pt.x=Math.random();}
          if(pt.x>1)pt.x-=1; if(pt.x<0)pt.x+=1;
          const x=pt.x*W+off, y=pt.y*H;
          const a=0.4+Math.sin(pt.tw)*0.25;
          ctx.fillStyle=rgbaStr([255,250,235],a);
          ctx.beginPath();ctx.arc(x,y,pt.r,0,6.28);ctx.fill();
        });
      }
    }

    function drawClouds(p, eerieW, heroicW){
      const off=(mouse.x-0.5)*30;
      const n = 2 + Math.round(eerieW*3 + heroicW*2);
      const baseAlpha = 0.35 + eerieW*0.25 + heroicW*0.15;
      ctx.fillStyle=rgbaStr(p.cloud, baseAlpha);
      for(let i=0;i<n;i++){
        const cx=((i*0.27 + time*0.01*(1+heroicW))%1.2 - 0.1)*W + off;
        const cy=(0.12+ (i%3)*0.06)*H;
        const rw=(0.08+0.04*(i%2))*W, rh=(0.02+0.012*(i%2))*H*(1+heroicW*0.8);
        // dramatic tall clouds for heroic
        for(let k=-2;k<=2;k++){
          ctx.beginPath();ctx.ellipse(cx+k*rw*0.5, cy+Math.abs(k)*rh*0.3, rw*(1-Math.abs(k)*0.18), rh,0,0,6.28);ctx.fill();
        }
      }
    }

    function drawSpotlightSweep(){
      // mechanical theatre beam from top, slow sweep
      const cx=W*0.5, top=H*0.02;
      const ang = Math.sin(time*0.25)*0.5; // -0.5..0.5 rad
      const len=H*1.2, spread=0.32;
      ctx.save();ctx.globalCompositeOperation='lighter';
      const g=ctx.createLinearGradient(cx,top, cx+Math.sin(ang)*len, top+Math.cos(ang)*len);
      g.addColorStop(0,'rgba(255,240,200,0.16)');g.addColorStop(1,'rgba(255,240,200,0)');
      ctx.fillStyle=g;
      ctx.beginPath();ctx.moveTo(cx,top);
      ctx.lineTo(cx+Math.sin(ang-spread)*len, top+Math.cos(ang-spread)*len);
      ctx.lineTo(cx+Math.sin(ang+spread)*len, top+Math.cos(ang+spread)*len);
      ctx.closePath();ctx.fill();
      ctx.restore();

      // soft stage pool
      const pg=ctx.createRadialGradient(W*0.5,H*0.92,10, W*0.5,H*0.92,H*0.5);
      pg.addColorStop(0,'rgba(255,235,190,0.10)');pg.addColorStop(1,'rgba(255,235,190,0)');
      ctx.save();ctx.globalCompositeOperation='lighter';ctx.fillStyle=pg;
      ctx.fillRect(0,H*0.5,W,H*0.5);ctx.restore();
    }

    function drawGodRays(p, heroicW){
      if(heroicW<0.05) return;
      const orbX=W*0.72, orbY=H*0.24;
      ctx.save();ctx.globalCompositeOperation='lighter';
      for(let i=0;i<7;i++){
        const a = -0.3 + i*0.12 + Math.sin(time*0.3+i)*0.02;
        const len=H*1.3, w=0.06;
        const g=ctx.createLinearGradient(orbX,orbY, orbX+Math.sin(a)*len, orbY+Math.cos(a)*len);
        g.addColorStop(0,rgbaStr(p.orb,0.10*heroicW));g.addColorStop(1,rgbaStr(p.orb,0));
        ctx.fillStyle=g;
        ctx.beginPath();ctx.moveTo(orbX,orbY);
        ctx.lineTo(orbX+Math.sin(a-w)*len, orbY+Math.cos(a-w)*len);
        ctx.lineTo(orbX+Math.sin(a+w)*len, orbY+Math.cos(a+w)*len);
        ctx.closePath();ctx.fill();
      }
      ctx.restore();
    }

    function drawStars(){
      if(!stateRef.current.isNight) return;
      ctx.save();
      stars.forEach(s=>{
        const tw=0.4+Math.sin(time*1.5+s.p)*0.4;
        ctx.fillStyle=`rgba(255,250,235,${tw})`;
        ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.r,0,6.28);ctx.fill();
      });
      ctx.restore();
    }

    function drawAurora(p, heroicW){
      if(!(stateRef.current.isNight && heroicW>0.25)) return;
      ctx.save();ctx.globalCompositeOperation='lighter';
      for(let b=0;b<2;b++){
        const y=H*(0.18+b*0.06);
        const g=ctx.createLinearGradient(0,y-30,0,y+30);
        g.addColorStop(0,'rgba(120,230,170,0)');g.addColorStop(0.5,`rgba(120,230,170,${0.12*heroicW})`);g.addColorStop(1,'rgba(120,230,170,0)');
        ctx.fillStyle=g;
        ctx.beginPath();ctx.moveTo(0,y);
        for(let i=0;i<=20;i++){const x=i/20*W;const yy=y+Math.sin(i*0.5+time*0.6+b)*10;ctx.lineTo(x,yy);}
        ctx.lineTo(W,y+40);ctx.lineTo(0,y+40);ctx.closePath();ctx.fill();
      }
      ctx.restore();
    }

    function render(){
      time+=0.016;
      const st=stateRef.current;
      const weights=[st.cosy, st.eerie, st.heroic];
      const dominant = weights[0]>=weights[1]&&weights[0]>=weights[2]?'cosy':weights[1]>=weights[2]?'eerie':'heroic';
      if(dominant!==lastDominant){lastDominant=dominant;reinitParticles(dominant);}
      const p = blendPalette(weights, st.isNight);
      const eerieW=weights[1], heroicW=weights[2], cosyW=weights[0];

      // lightning trigger (eerie)
      if(eerieW>0.4){
        if(time>nextFlash){flash=1; nextFlash=time+3+Math.random()*5;}
      }
      if(flash>0){flash-=0.06; if(flash<0)flash=0;}

      // sky
      const sky=ctx.createLinearGradient(0,0,0,H);
      const top=p.skyTop, bot=p.skyBot;
      if(flash>0){top[0]=lerp(top[0],255,flash*0.7);top[1]=lerp(top[1],255,flash*0.7);top[2]=lerp(top[2],255,flash*0.7);}
      sky.addColorStop(0,rgbaStr(top,1));sky.addColorStop(1,rgbaStr(bot,1));
      ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);

      drawStars();
      drawAurora(p,heroicW);

      // orb (sun/moon)
      const orbX=W*0.72+(mouse.x-0.5)*20, orbY=H*(st.isNight?0.20:0.26);
      const orbR=Math.min(W,H)*0.07;
      const og=ctx.createRadialGradient(orbX,orbY,orbR*0.2, orbX,orbY,orbR*4);
      og.addColorStop(0,p.orbGlow);og.addColorStop(1,'rgba(0,0,0,0)');
      ctx.save();ctx.globalCompositeOperation='lighter';ctx.fillStyle=og;ctx.beginPath();ctx.arc(orbX,orbY,orbR*4,0,6.28);ctx.fill();ctx.restore();
      ctx.fillStyle=rgbaStr(p.orb,1);ctx.beginPath();ctx.arc(orbX,orbY,orbR,0,6.28);ctx.fill();
      if(st.isNight){
        // moon crescent shading
        ctx.fillStyle=rgbaStr(p.skyTop,0.55);ctx.beginPath();ctx.arc(orbX-orbR*0.35,orbY-orbR*0.15,orbR*0.92,0,6.28);ctx.fill();
      }

      drawGodRays(p,heroicW);
      drawClouds(p,eerieW,heroicW);

      // mist band (eerie)
      if(eerieW>0.1){
        const mg=ctx.createLinearGradient(0,H*0.55,0,H*0.85);
        const mistAlpha=0.05+eerieW*0.25;
        mg.addColorStop(0,'rgba(0,0,0,0)');mg.addColorStop(0.5,p.mist.replace(/[\d.]+\)$/,(mistAlpha).toFixed(2)+')'));mg.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=mg;ctx.fillRect(0,H*0.5,W,H*0.4);
      }

      drawHills(hillsFar,p.hillFar,0.3);
      drawHills(hillsMid,p.hillMid,0.6);
      drawHills(hillsNear,p.hillNear,1.0);

      // foreground by dominant mood
      if(dominant==='cosy') drawVillage(p);
      else if(dominant==='eerie') drawDeadTrees(p);
      else drawBanners(p);

      drawParticles(dominant,p);
      drawSpotlightSweep();

      // vignette
      const vg=ctx.createRadialGradient(W*0.5,H*0.5,H*0.2, W*0.5,H*0.55,H*0.75);
      vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,0.55)');
      ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);

      // stage floor darkening
      const fl=ctx.createLinearGradient(0,H*0.9,0,H);
      fl.addColorStop(0,'rgba(0,0,0,0)');fl.addColorStop(1,'rgba(0,0,0,0.5)');
      ctx.fillStyle=fl;ctx.fillRect(0,H*0.88,W,H*0.12);

      raf=requestAnimationFrame(render);
    }

    function onMove(e){const r=canvas.getBoundingClientRect();const cx=(e.touches?e.touches[0].clientX:e.clientX);const cy=(e.touches?e.touches[0].clientY:e.clientY);mouse.x=clamp((cx-r.left)/r.width,0,1);mouse.y=clamp((cy-r.top)/r.height,0,1);}
    function onLeave(){mouse.x=0.5;mouse.y=0.4;}

    resize();
    window.addEventListener('resize',resize);
    canvas.addEventListener('mousemove',onMove);
    canvas.addEventListener('touchmove',onMove,{passive:true});
    canvas.addEventListener('mouseleave',onLeave);
    render();
    return ()=>{cancelAnimationFrame(raf);window.removeEventListener('resize',resize);canvas.removeEventListener('mousemove',onMove);canvas.removeEventListener('touchmove',onMove);canvas.removeEventListener('mouseleave',onLeave);};
  },[]);

  return <canvas ref={canvasRef} aria-label="Weather theatre stage"></canvas>;
}

/* ============================================================
   TYPEWRITER
   ============================================================ */
function Typewriter({text, active}){
  const [shown,setShown]=useState('');
  useEffect(()=>{
    if(!active){setShown('');return;}
    setShown(''); let i=0;
    const id=setInterval(()=>{i++;setShown(text.slice(0,i));if(i>=text.length)clearInterval(id);},26);
    return ()=>clearInterval(id);
  },[text,active]);
  return <span>{shown}<span className="tw-cursor">▍</span></span>;
}

/* ============================================================
   APP
   ============================================================ */
function Slider({name,desc,value,set,color}){
  const p=Math.round(value*100);
  return (
    <div className="slider" style={{'--c':color,'--p':p+'%'}}>
      <div className="row">
        <div><span className="name">{name}</span><span className="desc">{desc}</span></div>
        <div className="val">{p}</div>
      </div>
      <input type="range" min="0" max="1" step="0.01" value={value}
        onChange={e=>set(parseFloat(e.target.value))} style={{'--p':p+'%'}}/>
    </div>
  );
}

function App(){
  const [cosy,setCosy]=useState(0.85);
  const [eerie,setEerie]=useState(0.1);
  const [heroic,setHeroic]=useState(0.15);
  const [isNight,setNight]=useState(false);
  const [revealed,setRevealed]=useState(false);
  const [encoreKey,setEncoreKey]=useState(0);

  useEffect(()=>{const t=setTimeout(()=>setRevealed(true),700);return ()=>clearTimeout(t);},[encoreKey]);

  const weights=[cosy,eerie,heroic];
  const dominant = weights[0]>=weights[1]&&weights[0]>=weights[2]?'cosy':weights[1]>=weights[2]?'eerie':'heroic';
  const sceneLine = SCENE_LINES[dominant][isNight?'night':'day'];
  const meta = MOOD_META[dominant];

  return (
    <div className="wrap">
      <header className="marquee">
        <div className="orn"><i></i>Now Playing<i></i></div>
        <h1>Weather Theatre</h1>
        <div className="sub">one forecast · three stages · the mood is the director</div>
      </header>

      <div className={'stage'+(revealed?' revealed':'')} key={encoreKey}>
        <Stage state={{cosy,eerie,heroic,isNight}} revealed={revealed}/>
        <div className="valance"></div>
        <div className="curtain l"></div>
        <div className="curtain r"></div>
        <div className="footlights">
          {Array.from({length:18}).map((_,i)=><b key={i}></b>)}
        </div>
        <div className="frame"></div>
        <div className="scenecard">
          <div className="tag">Act I · {meta.label}</div>
          <div className="line"><Typewriter text={sceneLine} active={revealed}/></div>
        </div>
      </div>

      <div className="panel">
        <div className="card">
          <h2><span className="dot" style={{color:'#f4d98b'}}></span>The Director's Sliders</h2>
          <p className="hint">Remix the forecast into a stage set. Push a mood up to recolour the sky, recast the foreground, and change the weather.</p>
          <Slider name="Cosy"   desc="warm · snug · lamplit"   value={cosy}   set={setCosy}   color="#ff9d54"/>
          <Slider name="Eerie"  desc="cold · haunted · hollow" value={eerie}  set={setEerie}  color="#5fc4cc"/>
          <Slider name="Heroic" desc="bold · storm · banners"  value={heroic} set={setHeroic} color="#ff5a3c"/>
          <div className="nowplaying">
            <span style={{color:'#b69a78'}}>Now playing:</span>
            <span className="pill" style={{background:meta.color}}>{meta.label}</span>
            <span style={{color:'#9c8266',fontStyle:'italic',fontFamily:'Playfair Display,serif'}}>{meta.desc}</span>
          </div>
          <button className="encore" onClick={()=>{setRevealed(false);setEncoreKey(k=>k+1);}}>✦ Encore — Drop the Curtain Again</button>
        </div>

        <div className="card">
          <h2><span className="dot" style={{color:isNight?'#cfe0ee':'#ffcf6b'}}></span>House Lights</h2>
          <p className="hint">Toggle between a matinée warmth and a night performance.</p>
          <div className="toggle">
            <div className="labels">
              <b>{isNight?'Night':'Matinée'}</b>
              <span>{isNight?'moonlit stage · stars · cold pools':'golden hour · footlights · warm spill'}</span>
            </div>
            <div className={'switch'+(isNight?' night':'')} onClick={()=>setNight(n=>!n)} role="switch" aria-checked={isNight} tabIndex={0}
              onKeyDown={e=>{if(e.key===' '||e.key==='Enter'){e.preventDefault();setNight(n=>!n);}}}>
              <div className="knob"></div>
            </div>
          </div>

          <div className="forecast">
            <div style={{fontFamily:'Playfair Display,serif',fontSize:13,letterSpacing:'.04em',color:'#f4d98b',marginBottom:8,textTransform:'none'}}>The Mock Forecast</div>
            {FORECAST.map(([k,v])=>(<div key={k}><span className="k">{k}</span><span className="v">{v}</span></div>))}
          </div>
        </div>
      </div>

      <div className="footer">Weather Theatre · a self-contained canvas performance · no forecasts were fetched in the making of this scene</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

// emitted code uses React.createElement (no ESM `import` statements).
// Babel's automatic runtime emits `import {jsx} from "react/jsx-runtime"`,
// which fails with "Cannot use import statement outside a module" when

      var out = Babel.transform(el.textContent, {
        presets: [['react', { runtime: 'classic' }]]

      var s = document.createElement('script');

      document.body.appendChild(s);

  else { document.addEventListener('DOMContentLoaded', boot); }
