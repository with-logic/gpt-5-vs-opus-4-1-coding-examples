<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Escape the Maze</title>
<style>
  :root {
    --bg: #0b1020;
    --bg-2: #131a33;
    --panel: rgba(22, 30, 56, 0.72);
    --panel-border: rgba(120, 150, 255, 0.18);
    --wall: #6d8bff;
    --wall-glow: rgba(109, 139, 255, 0.55);
    --path: #0e1530;
    --player: #ffd166;
    --player-glow: rgba(255, 209, 102, 0.9);
    --goal: #06d6a0;
    --goal-glow: rgba(6, 214, 160, 0.8);
    --start: #ef476f;
    --trail: rgba(255, 209, 102, 0.10);
    --accent: #4cc9f0;
    --text: #e8ecff;
    --muted: #9aa6d4;
    --good: #06d6a0;
    --warn: #ef476f;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background:
      radial-gradient(1200px 800px at 20% -10%, #1b2550 0%, transparent 55%),
      radial-gradient(1000px 700px at 100% 110%, #2a1d4a 0%, transparent 55%),
      linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
    color: var(--text);
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  .app {
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 18px 16px 24px;
    gap: 14px;
  }

  header {
    width: 100%;
    max-width: 1100px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  .title {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  .title h1 {
    margin: 0;
    font-size: clamp(20px, 3vw, 30px);
    font-weight: 800;
    letter-spacing: 0.4px;
    background: linear-gradient(90deg, #ffd166, #4cc9f0 60%, #b5179e);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .title .sub {
    color: var(--muted);
    font-size: 13px;
  }

  .controls {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }

  button {
    font: inherit;
    font-weight: 600;
    color: var(--text);
    background: linear-gradient(180deg, rgba(76, 201, 240, 0.18), rgba(76, 201, 240, 0.06));
    border: 1px solid rgba(76, 201, 240, 0.35);
    padding: 9px 14px;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.08s ease, box-shadow 0.2s ease, background 0.2s ease;
    box-shadow: 0 2px 0 rgba(0,0,0,0.25);
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  button:hover { background: linear-gradient(180deg, rgba(76,201,240,0.30), rgba(76,201,240,0.10)); }
  button:active { transform: translateY(1px); }
  button.primary {
    background: linear-gradient(180deg, #4cc9f0, #3a8fd6);
    color: #06203a;
    border-color: rgba(76,201,240,0.7);
  }
  button.primary:hover { background: linear-gradient(180deg, #6ad4ff, #4cc9f0); }

  select {
    font: inherit;
    color: var(--text);
    background: rgba(10, 16, 38, 0.8);
    border: 1px solid var(--panel-border);
    padding: 8px 10px;
    border-radius: 10px;
    cursor: pointer;
  }
  select:focus, button:focus { outline: 2px solid rgba(76,201,240,0.55); outline-offset: 1px; }

  .stage {
    width: 100%;
    max-width: 1100px;
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 280px;
    gap: 16px;
    min-height: 0;
  }

  @media (max-width: 820px) {
    .stage { grid-template-columns: 1fr; }
    .sidebar { order: 2; }
  }

  .board-wrap {
    position: relative;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 16px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    padding: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 0;
    overflow: hidden;
  }

  .board-wrap::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(600px 300px at 50% -20%, rgba(76,201,240,0.10), transparent 70%);
    pointer-events: none;
  }

  canvas#maze {
    display: block;
    border-radius: 10px;
    background: var(--path);
    box-shadow:
      0 0 0 1px rgba(109,139,255,0.25),
      0 10px 40px rgba(0,0,0,0.45),
      inset 0 0 60px rgba(0,0,0,0.4);
    touch-action: none;
  }

  .sidebar {
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-height: 0;
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 14px;
    padding: 14px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .stat {
    background: rgba(8, 12, 30, 0.55);
    border: 1px solid rgba(120,150,255,0.12);
    border-radius: 10px;
    padding: 10px 12px;
  }
  .stat .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--muted);
  }
  .stat .value {
    font-size: 22px;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    margin-top: 2px;
    color: var(--text);
  }
  .stat .value.accent { color: var(--accent); }
  .stat .value.good { color: var(--good); }
  .stat .value.warn { color: var(--warn); }
  .stat .sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .bonus-bar {
    height: 8px;
    border-radius: 999px;
    background: rgba(255,255,255,0.08);
    overflow: hidden;
    margin-top: 6px;
  }
  .bonus-bar > div {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, #06d6a0, #4cc9f0);
    border-radius: 999px;
    transition: width 0.25s ease;
  }

  .legend {
    display: flex;
    flex-direction: column;
    gap: 8px;
    font-size: 13px;
    color: var(--muted);
  }
  .legend .row { display: flex; align-items: center; gap: 8px; }
  .swatch {
    width: 14px; height: 14px; border-radius: 4px;
    box-shadow: 0 0 8px rgba(0,0,0,0.3);
  }
  .swatch.player { background: var(--player); box-shadow: 0 0 8px var(--player-glow); }
  .swatch.goal { background: var(--goal); box-shadow: 0 0 8px var(--goal-glow); }
  .swatch.start { background: var(--start); }
  .swatch.wall { background: var(--wall); }

  .keys {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    max-width: 180px;
    margin: 4px auto 0;
  }
  .key {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(8,12,30,0.6);
    border: 1px solid rgba(120,150,255,0.18);
    border-bottom-width: 3px;
    border-radius: 8px;
    font-weight: 700;
    color: var(--muted);
    font-size: 16px;
    user-select: none;
  }
  .key.active {
    background: rgba(76,201,240,0.25);
    color: #fff;
    border-color: rgba(76,201,240,0.6);
    transform: translateY(1px);
    border-bottom-width: 1px;
  }
  .key.spacer { visibility: hidden; }

  .overlay {
    position: absolute;
    inset: 14px;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 10px;
    background: rgba(6, 10, 26, 0.78);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
    padding: 24px;
  }
  .overlay.show { opacity: 1; pointer-events: auto; }
  .overlay h2 {
    margin: 0;
    font-size: clamp(22px, 4vw, 36px);
    font-weight: 800;
    background: linear-gradient(90deg, #ffd166, #06d6a0);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .overlay .summary {
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 4px;
  }
  .overlay .summary .s { display: flex; flex-direction: column; align-items: center; }
  .overlay .summary .s .l { font-size: 11px; text-transform: uppercase; letter-spacing: 1.3px; color: var(--muted); }
  .overlay .summary .s .v { font-size: 22px; font-weight: 800; font-variant-numeric: tabular-nums; }
  .overlay .badge {
    font-size: 13px;
    color: var(--good);
    font-weight: 700;
    letter-spacing: 0.4px;
  }
  .overlay .badge.miss { color: var(--muted); }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(10,16,38,0.92);
    border: 1px solid var(--panel-border);
    color: var(--text);
    padding: 10px 16px;
    border-radius: 999px;
    font-size: 14px;
    opacity: 0;
    transition: opacity 0.2s ease, transform 0.2s ease;
    pointer-events: none;
    z-index: 50;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .hint {
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    line-height: 1.5;
  }
  kbd {
    background: rgba(8,12,30,0.7);
    border: 1px solid rgba(120,150,255,0.25);
    border-radius: 5px;
    padding: 1px 6px;
    font-size: 11px;
    color: var(--text);
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="title">
      <h1>Escape the Maze</h1>
      <span class="sub">Reach the green goal — bonus for the shortest path</span>
    </div>
    <div class="controls">
      <select id="difficulty" title="Difficulty">
        <option value="13">Easy · 13×13</option>
        <option value="19" selected>Medium · 19×19</option>
        <option value="27">Hard · 27×27</option>
        <option value="35">Insane · 35×35</option>
      </select>
      <button id="hintBtn" title="Highlight the shortest path (disables bonus)">Hint</button>
      <button id="newBtn" class="primary">↻ New Maze</button>
    </div>
  </header>

  <div class="stage">
    <div class="board-wrap" id="boardWrap">
      <canvas id="maze" width="600" height="600"></canvas>
      <div class="overlay" id="overlay">
        <h2 id="overlayTitle">You escaped!</h2>
        <div class="summary" id="overlaySummary"></div>
        <div class="badge" id="overlayBadge"></div>
        <button class="primary" id="replayBtn">Play again</button>
      </div>
    </div>

    <aside class="sidebar">
      <div class="card">
        <div class="stats">
          <div class="stat">
            <div class="label">Time</div>
            <div class="value accent" id="timeVal">0.0s</div>
          </div>
          <div class="stat">
            <div class="label">Moves</div>
            <div class="value" id="movesVal">0</div>
            <div class="sub" id="optimalVal">optimal —</div>
          </div>
          <div class="stat" style="grid-column: 1 / -1">
            <div class="label">Shortest Path Bonus</div>
            <div class="value good" id="bonusVal">100%</div>
            <div class="bonus-bar"><div id="bonusBar"></div></div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="legend">
          <div class="row"><span class="swatch player"></span> You</div>
          <div class="row"><span class="swatch start"></span> Start</div>
          <div class="row"><span class="swatch goal"></span> Goal</div>
          <div class="row"><span class="swatch wall"></span> Wall</div>
        </div>
        <div class="keys" aria-label="Arrow key controls">
          <div class="key spacer"></div>
          <div class="key" data-k="ArrowUp">↑</div>
          <div class="key spacer"></div>
          <div class="key" data-k="ArrowLeft">←</div>
          <div class="key" data-k="ArrowDown">↓</div>
          <div class="key" data-k="ArrowRight">→</div>
        </div>
        <p class="hint" style="margin-top:10px">
          Move with <kbd>Arrow keys</kbd> or <kbd>WASD</kbd>.<br/>
          On touch screens, swipe to move.
        </p>
      </div>
    </aside>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(() => {
  "use strict";

  const canvas = document.getElementById("maze");
  const ctx = canvas.getContext("2d");
  const boardWrap = document.getElementById("boardWrap");

  const timeVal = document.getElementById("timeVal");
  const movesVal = document.getElementById("movesVal");
  const optimalVal = document.getElementById("optimalVal");
  const bonusVal = document.getElementById("bonusVal");
  const bonusBar = document.getElementById("bonusBar");
  const overlay = document.getElementById("overlay");
  const overlayTitle = document.getElementById("overlayTitle");
  const overlaySummary = document.getElementById("overlaySummary");
  const overlayBadge = document.getElementById("overlayBadge");
  const difficultySel = document.getElementById("difficulty");
  const newBtn = document.getElementById("newBtn");
  const replayBtn = document.getElementById("replayBtn");
  const hintBtn = document.getElementById("hintBtn");
  const toastEl = document.getElementById("toast");

  // ---- State ----
  let cols = 19, rows = 19;
  let grid = [];          // cells with wall flags
  let player = { x: 0, y: 0 };
  let goal = { x: 0, y: 0 };
  let visited = new Set();    // "x,y" trail cells
  let moves = 0;
  let optimalLen = 0;
  let startedAt = 0;
  let elapsed = 0;
  let running = false;
  let finished = false;
  let hintUsed = false;
  let hintPath = null;
  let rafId = null;
  let anim = { from: null, to: null, t: 1 }; // smooth avatar slide
  let pulse = 0;
  let particles = [];

  // ---- Maze generation (recursive backtracker, iterative) ----
  function makeGrid(c, r) {
    const g = [];
    for (let y = 0; y < r; y++) {
      const row = [];
      for (let x = 0; x < c; x++) {
        // walls: N E S W
        row.push({ x, y, walls: [true, true, true, true], visited: false });
      }
      g.push(row);
    }
    return g;
  }

  const DIRS = [
    { dx: 0, dy: -1, wall: 0, opp: 2 }, // N
    { dx: 1, dy: 0,  wall: 1, opp: 3 }, // E
    { dx: 0, dy: 1,  wall: 2, opp: 0 }, // S
    { dx: -1, dy: 0, wall: 3, opp: 1 }, // W
  ];

  function generateMaze(c, r) {
    const g = makeGrid(c, r);
    const stack = [];
    let cur = g[0][0];
    cur.visited = true;
    stack.push(cur);
    while (stack.length) {
      cur = stack[stack.length - 1];
      const neighbors = [];
      for (const d of DIRS) {
        const nx = cur.x + d.dx, ny = cur.y + d.dy;
        if (nx >= 0 && nx < c && ny >= 0 && ny < r && !g[ny][nx].visited) {
          neighbors.push({ cell: g[ny][nx], d });
        }
      }
      if (neighbors.length) {
        const pick = neighbors[(Math.random() * neighbors.length) | 0];
        cur.walls[pick.d.wall] = false;
        pick.cell.walls[pick.d.opp] = false;
        pick.cell.visited = true;
        stack.push(pick.cell);
      } else {
        stack.pop();
      }
    }
    // Reset visited flag (reused for BFS)
    for (const row of g) for (const cell of row) cell.visited = false;
    return g;
  }

  // ---- Shortest path (BFS) ----
  function shortestPath(from, to) {
    const startKey = from.x + "," + from.y;
    const prev = new Map();
    prev.set(startKey, null);
    const queue = [from];
    grid[from.y][from.x].visited = true;
    let found = false;
    while (queue.length) {
      const cell = queue.shift();
      if (cell.x === to.x && cell.y === to.y) { found = true; break; }
      const c = grid[cell.y][cell.x];
      for (let i = 0; i < 4; i++) {
        if (c.walls[i]) continue;
        const d = DIRS[i];
        const nx = cell.x + d.dx, ny = cell.y + d.dy;
        if (nx < 0 || nx >= cols || ny < 0 || ny >= rows) continue;
        const ncell = grid[ny][nx];
        if (ncell.visited) continue;
        ncell.visited = true;
        prev.set(nx + "," + ny, cell.x + "," + cell.y);
        queue.push({ x: nx, y: ny });
      }
    }
    if (!found) return null;
    // Reconstruct
    const path = [];
    let key = to.x + "," + to.y;
    while (key) {
      const [x, y] = key.split(",").map(Number);
      path.push({ x, y });
      key = prev.get(key);
    }
    path.reverse();
    return path;
  }

  // ---- Layout / sizing ----
  let cellSize = 0;
  let offsetX = 0, offsetY = 0;
  let dpr = Math.max(1, window.devicePixelRatio || 1);

  function fitCanvas() {
    const rect = boardWrap.getBoundingClientRect();
    const pad = 28; // board padding + breathing room
    const avail = Math.min(rect.width - pad, rect.height - pad);
    const size = Math.max(240, Math.floor(avail));
    // round cell size so walls are crisp
    cellSize = Math.floor(size / cols);
    const drawW = cellSize * cols;
    const drawH = cellSize * rows;

    dpr = Math.max(1, window.devicePixelRatio || 1);
    canvas.style.width = drawW + "px";
    canvas.style.height = drawH + "px";
    canvas.width = Math.round(drawW * dpr);
    canvas.height = Math.round(drawH * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    offsetX = 0;
    offsetY = 0;
  }

  // ---- Game setup ----
  function newGame() {
    cols = rows = parseInt(difficultySel.value, 10) || 19;
    grid = generateMaze(cols, rows);
    player = { x: 0, y: 0 };
    goal = { x: cols - 1, y: rows - 1 };
    visited = new Set([player.x + "," + player.y]);
    moves = 0;
    elapsed = 0;
    startedAt = 0;
    running = false;
    finished = false;
    hintUsed = false;
    hintPath = null;
    particles = [];
    anim = { from: { x: 0, y: 0 }, to: { x: 0, y: 0 }, t: 1 };
    overlay.classList.remove("show");
    fitCanvas();
    const sp = shortestPath(player, goal);
    optimalLen = sp ? sp.length - 1 : 0;
    optimalVal.textContent = "optimal " + optimalLen;
    updateHUD();
    draw();
  }

  // ---- Movement ----
  function canMove(dir) {
    const cell = grid[player.y][player.x];
    return !cell.walls[dir.wall];
  }

  function tryMove(dx, dy) {
    if (finished) return;
    let dirIdx = -1;
    if (dx === 0 && dy === -1) dirIdx = 0;
    else if (dx === 1 && dy === 0) dirIdx = 1;
    else if (dx === 0 && dy === 1) dirIdx = 2;
    else if (dx === -1 && dy === 0) dirIdx = 3;
    if (dirIdx < 0) return;
    const dir = DIRS[dirIdx];
    if (canMove(dir)) {
      if (!running) {
        running = true;
        startedAt = performance.now();
      }
      anim.from = { x: player.x, y: player.y };
      player = { x: player.x + dx, y: player.y + dy };
      anim.to = { x: player.x, y: player.y };
      anim.t = 0;
      visited.add(player.x + "," + player.y);
      moves++;
      // break trail trail
      spawnTrailParticles(player.x, player.y);
      if (player.x === goal.x && player.y === goal.y) {
        win();
      }
      updateHUD();
    } else {
      bumpFeedback(dirIdx);
    }
  }

  function bumpFeedback(dirIdx) {
    // tiny shake on the avatar by nudging anim target back
    const dir = DIRS[dirIdx];
    anim.from = { x: player.x, y: player.y };
    anim.to = { x: player.x + dir.dx * 0.22, y: player.y + dir.dy * 0.22 };
    anim.t = 0;
    anim.bump = true;
  }

  function spawnTrailParticles(cx, cy) {
    // subtle sparkle when moving
    for (let i = 0; i < 4; i++) {
      particles.push({
        x: cx + 0.5 + (Math.random() - 0.5) * 0.4,
        y: cy + 0.5 + (Math.random() - 0.5) * 0.4,
        vx: (Math.random() - 0.5) * 0.6,
        vy: (Math.random() - 0.5) * 0.6,
        life: 1,
        size: 1.5 + Math.random() * 2,
      });
    }
  }

  function win() {
    finished = true;
    running = false;
    elapsed = (performance.now() - startedAt) / 1000;
    // celebration particles
    for (let i = 0; i < 80; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = 1 + Math.random() * 4;
      particles.push({
        x: goal.x + 0.5,
        y: goal.y + 0.5,
        vx: Math.cos(a) * s,
        vy: Math.sin(a) * s,
        life: 1,
        size: 2 + Math.random() * 3,
        color: Math.random() < 0.5 ? "#06d6a0" : "#ffd166",
      });
    }
    showResult();
  }

  function bonusPercent() {
    if (optimalLen === 0) return 100;
    if (hintUsed) return 0;
    if (moves <= optimalLen) return 100;
    const ratio = optimalLen / moves; // <=1
    // smooth curve so small overshoot isn't punished too hard
    const pct = Math.round(Math.pow(ratio, 0.7) * 100);
    return Math.max(0, Math.min(100, pct));
  }

  function showResult() {
    const bonus = bonusPercent();
    const summary = [
      { l: "Time", v: elapsed.toFixed(2) + "s" },
      { l: "Moves", v: moves },
      { l: "Optimal", v: optimalLen },
      { l: "Bonus", v: bonus + "%" },
    ];
    overlaySummary.innerHTML = summary.map(s =>
      `<div class="s"><div class="l">${s.l}</div><div class="v">${s.v}</div></div>`
    ).join("");

    let badgeText = "";
    if (hintUsed) {
      badgeText = "Hint used — bonus disabled";
      overlayBadge.classList.add("miss");
    } else if (moves === optimalLen) {
      badgeText = "★ Perfect route — shortest path achieved!";
      overlayBadge.classList.remove("miss");
    } else if (bonus >= 70) {
      badgeText = "Great pathing!";
      overlayBadge.classList.remove("miss");
    } else {
      badgeText = "Escaped — try a tighter route next time.";
      overlayBadge.classList.remove("miss");
    }
    overlayBadge.textContent = badgeText;
    overlayTitle.textContent = "You escaped!";
    overlay.classList.add("show");
  }

  // ---- HUD ----
  function updateHUD() {
    if (running && !finished) {
      elapsed = (performance.now() - startedAt) / 1000;
    }
    timeVal.textContent = (finished ? elapsed : (running ? elapsed : 0)).toFixed(1) + "s";
    movesVal.textContent = moves;
    const b = bonusPercent();
    bonusVal.textContent = (hintUsed ? "—" : b + "%");
    bonusBar.style.width = (hintUsed ? 0 : b) + "%";
    if (hintUsed) {
      bonusVal.classList.remove("good");
      bonusVal.classList.add("warn");
    } else {
      bonusVal.classList.add("good");
      bonusVal.classList.remove("warn");
    }
  }

  // ---- Drawing ----
  function cellRect(x, y) {
    return { px: x * cellSize + offsetX, py: y * cellSize + offsetY, s: cellSize };
  }

  function draw() {
    const W = canvas.width / dpr;
    const H = canvas.height / dpr;
    ctx.clearRect(0, 0, W, H);

    // background path fill
    ctx.fillStyle = "#0e1530";
    ctx.fillRect(0, 0, cols * cellSize, rows * cellSize);

    // visited trail
    ctx.fillStyle = "rgba(255, 209, 102, 0.10)";
    for (const key of visited) {
      const [x, y] = key.split(",").map(Number);
      ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
    }

    // start marker
    drawStartMarker();

    // hint path
    if (hintPath && hintPath.length) {
      ctx.save();
      ctx.strokeStyle = "rgba(76, 201, 240, 0.55)";
      ctx.lineWidth = Math.max(2, cellSize * 0.16);
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.setLineDash([cellSize * 0.3, cellSize * 0.25]);
      ctx.lineDashOffset = -((performance.now() / 60) % (cellSize));
      ctx.beginPath();
      for (let i = 0; i < hintPath.length; i++) {
        const p = hintPath[i];
        const cx = p.x * cellSize + cellSize / 2;
        const cy = p.y * cellSize + cellSize / 2;
        if (i === 0) ctx.moveTo(cx, cy); else ctx.lineTo(cx, cy);
      }
      ctx.stroke();
      ctx.restore();
    }

    // goal
    drawGoal();

    // walls
    drawWalls();

    // particles (under avatar)
    drawParticles();

    // avatar
    drawPlayer();

    // overlay frame
    drawFrame();
  }

  function drawFrame() {
    ctx.save();
    ctx.strokeStyle = "rgba(109,139,255,0.25)";
    ctx.lineWidth = 1;
    ctx.strokeRect(0.5, 0.5, cols * cellSize - 1, rows * cellSize - 1);
    ctx.restore();
  }

  function drawStartMarker() {
    const { px, py, s } = cellRect(0, 0);
    ctx.save();
    ctx.fillStyle = "rgba(239, 71, 111, 0.18)";
    ctx.fillRect(px, py, s, s);
    // S
    ctx.fillStyle = "rgba(239, 71, 111, 0.9)";
    ctx.font = `${Math.max(8, s * 0.4)}px ui-sans-serif, system-ui, sans-serif`;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("S", px + s / 2, py + s / 2 + 1);
    ctx.restore();
  }

  function drawGoal() {
    const { px, py, s } = cellRect(goal.x, goal.y);
    const cx = px + s / 2, cy = py + s / 2;
    const r = s * 0.32;
    const glow = 0.5 + 0.5 * Math.sin(pulse);
    ctx.save();
    // glow
    const g = ctx.createRadialGradient(cx, cy, r * 0.2, cx, cy, r * 2.2);
    g.addColorStop(0, `rgba(6, 214, 160, ${0.55 + 0.3 * glow})`);
    g.addColorStop(1, "rgba(6, 214, 160, 0)");
    ctx.fillStyle = g;
    ctx.fillRect(px - s, py - s, s * 3, s * 3);
    // core
    ctx.fillStyle = "#06d6a0";
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fill();
    // ring
    ctx.strokeStyle = `rgba(255,255,255,${0.4 + 0.4 * glow})`;
    ctx.lineWidth = Math.max(1, s * 0.06);
    ctx.beginPath();
    ctx.arc(cx, cy, r + s * 0.08 * glow, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }

  function drawWalls() {
    ctx.save();
    ctx.strokeStyle = "#6d8bff";
    ctx.lineWidth = Math.max(2, cellSize * 0.10);
    ctx.lineCap = "round";
    ctx.shadowColor = "rgba(109,139,255,0.45)";
    ctx.shadowBlur = Math.max(3, cellSize * 0.18);

    ctx.beginPath();
    for (let y = 0; y < rows; y++) {
      for (let x = 0; x < cols; x++) {
        const cell = grid[y][x];
        const px = x * cellSize, py = y * cellSize;
        if (cell.walls[0]) { ctx.moveTo(px, py); ctx.lineTo(px + cellSize, py); }
        if (cell.walls[1]) { ctx.moveTo(px + cellSize, py); ctx.lineTo(px + cellSize, py + cellSize); }
        // only draw S and W for interior to avoid double, but draw outer edges via N/E of last cells
        if (cell.walls[2]) { ctx.moveTo(px, py + cellSize); ctx.lineTo(px + cellSize, py + cellSize); }
        if (cell.walls[3]) { ctx.moveTo(px, py); ctx.lineTo(px, py + cellSize); }
      }
    }
    ctx.stroke();
    ctx.restore();
  }

  function drawPlayer() {
    // interpolated position
    let ax, ay;
    if (anim.t < 1 && anim.from && anim.to) {
      const t = easeOut(anim.t);
      ax = anim.from.x + (anim.to.x - anim.from.x) * t;
      ay = anim.from.y + (anim.to.y - anim.from.y) * t;
    } else {
      ax = player.x;
      ay = player.y;
    }
    const cx = ax * cellSize + cellSize / 2;
    const cy = ay * cellSize + cellSize / 2;
    const r = cellSize * 0.30;
    ctx.save();
    // glow
    const g = ctx.createRadialGradient(cx, cy, r * 0.2, cx, cy, r * 2.4);
    g.addColorStop(0, "rgba(255, 209, 102, 0.75)");
    g.addColorStop(1, "rgba(255, 209, 102, 0)");
    ctx.fillStyle = g;
    ctx.fillRect(cx - cellSize * 1.5, cy - cellSize * 1.5, cellSize * 3, cellSize * 3);
    // body
    const grad = ctx.createRadialGradient(cx - r * 0.3, cy - r * 0.3, r * 0.2, cx, cy, r);
    grad.addColorStop(0, "#fff1c2");
    grad.addColorStop(1, "#ffd166");
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fill();
    // outline
    ctx.strokeStyle = "rgba(255,255,255,0.7)";
    ctx.lineWidth = Math.max(1, cellSize * 0.04);
    ctx.stroke();
    ctx.restore();
  }

  function drawParticles() {
    for (const p of particles) {
      const cx = p.x * cellSize;
      const cy = p.y * cellSize;
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle = p.color || "rgba(255, 209, 102, 0.9)";
      ctx.beginPath();
      ctx.arc(cx, cy, p.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  function easeOut(t) { return 1 - Math.pow(1 - t, 3); }

  // ---- Animation loop ----
  let last = performance.now();
  function loop(now) {
    const dt = Math.min(50, now - last) / 1000;
    last = now;
    pulse += dt * 3;

    // advance anim
    if (anim.t < 1) {
      anim.t = Math.min(1, anim.t + dt * 14);
      if (anim.bump && anim.t >= 1) {
        anim.bump = false;
        anim.from = { x: player.x, y: player.y };
        anim.to = { x: player.x, y: player.y };
      }
    }

    // particles
    for (const p of particles) {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vx *= 0.92;
      p.vy *= 0.92;
      p.life -= dt * 1.6;
    }
    particles = particles.filter(p => p.life > 0);

    if (running && !finished) updateHUD();

    draw();
    rafId = requestAnimationFrame(loop);
  }

  // ---- Input ----
  const keyMap = {
    ArrowUp: [0, -1], ArrowDown: [0, 1], ArrowLeft: [-1, 0], ArrowRight: [1, 0],
    w: [0, -1], W: [0, -1], s: [0, 1], S: [0, 1],
    a: [-1, 0], A: [-1, 0], d: [1, 0], D: [1, 0],
  };

  function flashKey(dir) {
    let sel = null;
    if (dir[1] === -1) sel = 'ArrowUp';
    else if (dir[1] === 1) sel = 'ArrowDown';
    else if (dir[0] === -1) sel = 'ArrowLeft';
    else if (dir[0] === 1) sel = 'ArrowRight';
    if (!sel) return;
    const el = document.querySelector(`.key[data-k="${sel}"]`);
    if (el) {
      el.classList.add('active');
      clearTimeout(el._t);
      el._t = setTimeout(() => el.classList.remove('active'), 120);
    }
  }

  window.addEventListener("keydown", (e) => {
    if (e.repeat) return;
    const dir = keyMap[e.key];
    if (dir) {
      e.preventDefault();
      flashKey(dir);
      tryMove(dir[0], dir[1]);
    } else if (e.key === "r" || e.key === "R") {
      newGame();
    } else if (e.key === "h" || e.key === "H") {
      toggleHint();
    }
  });

  // Touch swipe
  let touchStart = null;
  canvas.addEventListener("touchstart", (e) => {
    const t = e.touches[0];
    touchStart = { x: t.clientX, y: t.clientY };
  }, { passive: true });
  canvas.addEventListener("touchmove", (e) => { e.preventDefault(); }, { passive: false });
  canvas.addEventListener("touchend", (e) => {
    if (!touchStart) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - touchStart.x;
    const dy = t.clientY - touchStart.y;
    const ax = Math.abs(dx), ay = Math.abs(dy);
    if (Math.max(ax, ay) < 18) { touchStart = null; return; }
    let dir;
    if (ax > ay) dir = dx > 0 ? [1, 0] : [-1, 0];
    else dir = dy > 0 ? [0, 1] : [0, -1];
    flashKey(dir);
    tryMove(dir[0], dir[1]);
    touchStart = null;
  }, { passive: true });

  // ---- Hint ----
  function toggleHint() {
    if (finished) return;
    if (hintPath) {
      hintPath = null;
      hintBtn.textContent = "Hint";
      showToast("Hint hidden");
      return;
    }
    hintPath = shortestPath(player, goal);
    if (!hintUsed) {
      hintUsed = true;
      showToast("Hint shown — shortest path bonus disabled");
      updateHUD();
    } else {
      showToast("Hint shown");
    }
    hintBtn.textContent = "Hide hint";
  }

  // ---- Toast ----
  let toastTimer = null;
  function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove("show"), 1600);
  }

  // ---- Buttons ----
  newBtn.addEventListener("click", () => { newGame(); showToast("New maze generated"); });
  replayBtn.addEventListener("click", () => newGame());
  hintBtn.addEventListener("click", toggleHint);
  difficultySel.addEventListener("change", () => { newGame(); });

  // ---- Resize ----
  let resizeTimer = null;
  window.addEventListener("resize", () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => { fitCanvas(); }, 80);
  });

  // ---- Boot ----
  newGame();
  last = performance.now();
  rafId = requestAnimationFrame(loop);
})();
</script>
</body>
</html>
