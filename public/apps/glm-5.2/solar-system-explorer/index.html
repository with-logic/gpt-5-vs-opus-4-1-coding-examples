<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Solar System Explorer</title>
<style>
  :root {
    --bg: #05060a;
    --panel: rgba(14, 18, 30, 0.72);
    --panel-border: rgba(120, 150, 220, 0.18);
    --text: #e8edf7;
    --muted: #8b97b3;
    --accent: #6ea8ff;
    --accent-2: #ffb86b;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  #app { position: fixed; inset: 0; }
  canvas { display: block; touch-action: none; }

  /* ---------- Top bar ---------- */
  .topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 22px;
    pointer-events: none;
    z-index: 10;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    pointer-events: auto;
  }
  .brand .logo {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #ffe3a3, #ff9d2f 45%, #c2410c 90%);
    box-shadow: 0 0 18px rgba(255, 157, 47, 0.65), 0 0 40px rgba(255, 120, 30, 0.35);
  }
  .brand h1 {
    margin: 0;
    font-size: 17px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }
  .brand .sub {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1.2px;
    text-transform: uppercase;
  }
  .hint {
    pointer-events: auto;
    font-size: 11px;
    color: var(--muted);
    background: var(--panel);
    border: 1px solid var(--panel-border);
    padding: 8px 14px;
    border-radius: 999px;
    backdrop-filter: blur(10px);
    display: flex;
    gap: 16px;
    align-items: center;
  }
  .hint span b { color: var(--text); font-weight: 600; }

  /* ---------- Control panel ---------- */
  .panel {
    position: fixed;
    left: 22px;
    bottom: 22px;
    width: 300px;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 16px;
    padding: 18px;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    z-index: 10;
    box-shadow: 0 18px 50px rgba(0,0,0,0.5);
  }
  .panel h2 {
    margin: 0 0 4px 0;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1.6px;
    color: var(--muted);
  }
  .row { margin: 14px 0; }
  .row .label-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .row label { font-size: 12.5px; color: var(--text); }
  .row .val {
    font-size: 12px;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
    font-weight: 600;
  }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 4px;
    border-radius: 999px;
    background: linear-gradient(to right, var(--accent), var(--accent-2));
    outline: none;
    cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: #fff;
    border: 3px solid var(--accent);
    box-shadow: 0 0 10px rgba(110,168,255,0.7);
    cursor: pointer;
    transition: transform 0.12s ease;
  }
  input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.18); }
  input[type="range"]::-moz-range-thumb {
    width: 16px; height: 16px;
    border-radius: 50%;
    background: #fff;
    border: 3px solid var(--accent);
    cursor: pointer;
  }

  .toggles { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
  .toggle {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 12.5px;
  }
  .switch {
    position: relative;
    width: 38px; height: 21px;
    background: rgba(255,255,255,0.12);
    border-radius: 999px;
    cursor: pointer;
    transition: background 0.2s ease;
    flex-shrink: 0;
  }
  .switch::after {
    content: "";
    position: absolute;
    top: 2.5px; left: 2.5px;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: #fff;
    transition: transform 0.22s cubic-bezier(.4,.0,.2,1);
  }
  .switch.on { background: var(--accent); }
  .switch.on::after { transform: translateX(17px); }

  .btn-row { display: flex; gap: 8px; margin-top: 14px; }
  .btn {
    flex: 1;
    font-size: 12px;
    padding: 9px;
    border-radius: 10px;
    border: 1px solid var(--panel-border);
    background: rgba(255,255,255,0.04);
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .btn:hover { background: rgba(110,168,255,0.18); border-color: var(--accent); }
  .btn.primary { background: var(--accent); color: #061224; font-weight: 600; border-color: transparent; }
  .btn.primary:hover { background: #8cb8ff; }

  /* ---------- Planet list ---------- */
  .planet-list {
    position: fixed;
    right: 22px;
    top: 80px;
    width: 200px;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 16px;
    padding: 12px;
    backdrop-filter: blur(14px);
    z-index: 10;
    box-shadow: 0 18px 50px rgba(0,0,0,0.5);
  }
  .planet-list h2 {
    margin: 4px 6px 10px;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1.4px;
    color: var(--muted);
  }
  .planet-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.15s ease;
  }
  .planet-item:hover { background: rgba(255,255,255,0.06); }
  .planet-item.active { background: rgba(110,168,255,0.18); }
  .planet-item .dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 0 8px currentColor;
  }
  .planet-item .nm { flex: 1; }
  .planet-item .foc { font-size: 10px; color: var(--muted); opacity: 0; transition: opacity 0.15s; }
  .planet-item:hover .foc, .planet-item.active .foc { opacity: 1; color: var(--accent); }

  /* ---------- Info card ---------- */
  .info-card {
    position: fixed;
    right: 22px;
    bottom: 22px;
    width: 320px;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 16px;
    padding: 20px;
    backdrop-filter: blur(14px);
    z-index: 11;
    box-shadow: 0 18px 50px rgba(0,0,0,0.5);
    transform: translateY(20px);
    opacity: 0;
    pointer-events: none;
    transition: transform 0.28s cubic-bezier(.4,0,.2,1), opacity 0.28s ease;
  }
  .info-card.show { transform: translateY(0); opacity: 1; pointer-events: auto; }
  .info-card .close {
    position: absolute;
    top: 14px; right: 14px;
    width: 24px; height: 24px;
    border: none;
    background: rgba(255,255,255,0.08);
    color: var(--muted);
    border-radius: 50%;
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    display: flex; align-items: center; justify-content: center;
  }
  .info-card .close:hover { background: rgba(255,255,255,0.18); color: var(--text); }
  .info-card .head { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
  .info-card .swatch {
    width: 46px; height: 46px;
    border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 0 22px currentColor, inset -8px -8px 16px rgba(0,0,0,0.45);
  }
  .info-card .head .t h3 { margin: 0; font-size: 19px; font-weight: 600; }
  .info-card .head .t .type { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.3px; }
  .info-card .desc { font-size: 12.5px; line-height: 1.55; color: #c4cce0; margin: 0 0 14px; }
  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .stat {
    background: rgba(255,255,255,0.04);
    border-radius: 10px;
    padding: 9px 11px;
  }
  .stat .k { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .stat .v { font-size: 13px; font-weight: 600; margin-top: 3px; font-variant-numeric: tabular-nums; }

  /* ---------- Toast / tooltip ---------- */
  #tooltip {
    position: fixed;
    pointer-events: none;
    z-index: 20;
    background: rgba(8,12,22,0.92);
    border: 1px solid var(--panel-border);
    color: var(--text);
    font-size: 12px;
    padding: 5px 10px;
    border-radius: 8px;
    transform: translate(-50%, -150%);
    opacity: 0;
    transition: opacity 0.12s ease;
    white-space: nowrap;
  }
  #tooltip.show { opacity: 1; }

  /* ---------- Loader ---------- */
  #loader {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    gap: 18px;
    z-index: 100;
    transition: opacity 0.6s ease;
  }
  #loader.hide { opacity: 0; pointer-events: none; }
  .spinner {
    width: 46px; height: 46px;
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.12);
    border-top-color: var(--accent);
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loader .lt { font-size: 12px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }

  @media (max-width: 760px) {
    .planet-list { display: none; }
    .panel { width: calc(100% - 44px); }
    .info-card { width: calc(100% - 44px); }
    .hint { display: none; }
  }
</style>
</head>
<body>
<div id="app"></div>

<!-- Top bar -->
<div class="topbar">
  <div class="brand">
    <div class="logo"></div>
    <div>
      <h1>Solar System Explorer</h1>
      <div class="sub">Interactive 3D Orrery</div>
    </div>
  </div>
  <div class="hint">
    <span><b>Drag</b> rotate</span>
    <span><b>Scroll</b> zoom</span>
    <span><b>Click</b> a planet</span>
  </div>
</div>

<!-- Control panel -->
<div class="panel">
  <h2>Controls</h2>
  <div class="row">
    <div class="label-row"><label>Orbit Speed</label><span class="val" id="speedVal">1.0×</span></div>
    <input type="range" id="speed" min="0" max="500" value="100" />
  </div>
  <div class="row">
    <div class="label-row"><label>Sun Glow</label><span class="val" id="glowVal">100%</span></div>
    <input type="range" id="glow" min="0" max="200" value="100" />
  </div>
  <div class="toggles">
    <div class="toggle"><span>Orbit Paths</span><div class="switch on" id="t-orbits"></div></div>
    <div class="toggle"><span>Planet Labels</span><div class="switch on" id="t-labels"></div></div>
    <div class="toggle"><span>Realistic Sizes</span><div class="switch" id="t-realistic"></div></div>
  </div>
  <div class="btn-row">
    <button class="btn" id="resetView">Reset View</button>
    <button class="btn primary" id="topView">Top View</button>
  </div>
</div>

<!-- Planet list -->
<div class="planet-list">
  <h2>Planets</h2>
  <div id="planetList"></div>
</div>

<!-- Info card -->
<div class="info-card" id="infoCard">
  <button class="close" id="infoClose">✕</button>
  <div class="head">
    <div class="swatch" id="iSwatch"></div>
    <div class="t">
      <h3 id="iName">—</h3>
      <div class="type" id="iType">—</div>
    </div>
  </div>
  <p class="desc" id="iDesc"></p>
  <div class="stats" id="iStats"></div>
</div>

<div id="tooltip"></div>

<div id="loader">
  <div class="spinner"></div>
  <div class="lt">Building the cosmos…</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ---------- Planet data ----------
// radius: visual radius (Earth=1 baseline), distance: orbit radius in scene units,
// period: relative orbital period (Earth=1), rotSpeed: spin, tilt: axial tilt deg
const PLANETS = [
  { name:'Mercury', type:'Terrestrial', color:'#a0866b', accent:'#d8c4a0', emissive:'#000000',
    radius:0.42, distance:9, period:0.24, rotSpeed:0.004, tilt:0.03,
    diameter:'4,879 km', day:'59 Earth days', year:'88 Earth days', moons:'0', gravity:'3.7 m/s²',
    desc:'The smallest planet and closest to the Sun. Its cratered, airless surface swings between scorching days and freezing nights.' },
  { name:'Venus', type:'Terrestrial', color:'#e3b266', accent:'#f7dca0', emissive:'#3a1f00',
    radius:0.78, distance:13, period:0.62, rotSpeed:-0.002, tilt:177.4,
    diameter:'12,104 km', day:'243 Earth days', year:'225 Earth days', moons:'0', gravity:'8.9 m/s²',
    desc:'A scorching world wrapped in thick, toxic clouds. It spins backward so slowly that a day lasts longer than its year.' },
  { name:'Earth', type:'Terrestrial', color:'#3b7dd8', accent:'#4fb36b', emissive:'#001a33',
    radius:0.85, distance:18, period:1.0, rotSpeed:0.02, tilt:23.4,
    diameter:'12,742 km', day:'24 hours', year:'365.25 days', moons:'1', gravity:'9.8 m/s²',
    desc:'Our home — the only known world with liquid oceans and life. A blue marble wrapped in a thin, protective atmosphere.' },
  { name:'Mars', type:'Terrestrial', color:'#c1440e', accent:'#e8895a', emissive:'#1a0500',
    radius:0.58, distance:24, period:1.88, rotSpeed:0.018, tilt:25.2,
    diameter:'6,779 km', day:'24.6 hours', year:'687 Earth days', moons:'2', gravity:'3.7 m/s²',
    desc:'The Red Planet, home to the tallest volcano and deepest canyon in the solar system. A frontier for future exploration.' },
  { name:'Jupiter', type:'Gas Giant', color:'#d4a373', accent:'#f0d9b5', emissive:'#2a1a00',
    radius:2.4, distance:36, period:11.86, rotSpeed:0.045, tilt:3.1, bands:true,
    diameter:'139,820 km', day:'9.9 hours', year:'11.9 Earth years', moons:'95', gravity:'24.8 m/s²',
    desc:'The largest planet — a swirling ball of gas with a centuries-old storm, the Great Red Spot, bigger than Earth itself.' },
  { name:'Saturn', type:'Gas Giant', color:'#e3c98f', accent:'#f5e6c0', emissive:'#2a2000',
    radius:2.0, distance:50, period:29.5, rotSpeed:0.04, tilt:26.7, bands:true, ring:true,
    diameter:'116,460 km', day:'10.7 hours', year:'29.5 Earth years', moons:'146', gravity:'10.4 m/s²',
    desc:'Famed for its dazzling rings of ice and rock. The least dense planet — it would float in water if you had a big enough tub.' },
  { name:'Uranus', type:'Ice Giant', color:'#9fe0e0', accent:'#c8f5f5', emissive:'#002a2a',
    radius:1.4, distance:62, period:84, rotSpeed:0.025, tilt:97.8, ring:true,
    diameter:'50,724 km', day:'17.2 hours', year:'84 Earth years', moons:'27', gravity:'8.7 m/s²',
    desc:'An ice giant tipped on its side, rolling around the Sun like a barrel. Its pale blue tint comes from methane gas.' },
  { name:'Neptune', type:'Ice Giant', color:'#3b6fe0', accent:'#7fa6ff', emissive:'#000f33',
    radius:1.35, distance:72, period:164.8, rotSpeed:0.026, tilt:28.3,
    diameter:'49,244 km', day:'16.1 hours', year:'165 Earth years', moons:'14', gravity:'11.0 m/s²',
    desc:'The windiest planet, with supersonic storms tearing across its deep-blue atmosphere. The most distant of the eight.' }
];

// ---------- Scene setup ----------
const app = document.getElementById('app');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x05060a);
scene.fog = null;

const camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 4000);
camera.position.set(0, 55, 110);

const renderer = new THREE.WebGLRenderer({ antialias:true, powerPreference:'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
app.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 6;
controls.maxDistance = 600;
controls.rotateSpeed = 0.7;
controls.zoomSpeed = 0.9;

// ---------- Lighting ----------
const ambient = new THREE.AmbientLight(0x334466, 0.55);
scene.add(ambient);
const sunLight = new THREE.PointLight(0xfff1d0, 3.2, 0, 1.4);
sunLight.position.set(0,0,0);
scene.add(sunLight);

// ---------- Starfield ----------
function makeStars(count, radius) {
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(count*3);
  const col = new Float32Array(count*3);
  const sizes = new Float32Array(count);
  const c = new THREE.Color();
  for (let i=0;i<count;i++){
    // distribute on a sphere shell
    const u = Math.random(), v = Math.random();
    const theta = 2*Math.PI*u, phi = Math.acos(2*v-1);
    const r = radius*(0.8 + Math.random()*0.2);
    pos[i*3]   = r*Math.sin(phi)*Math.cos(theta);
    pos[i*3+1] = r*Math.sin(phi)*Math.sin(theta);
    pos[i*3+2] = r*Math.cos(phi);
    const t = Math.random();
    if (t<0.7) c.setHSL(0.6, 0.1, 0.85);
    else if (t<0.9) c.setHSL(0.08, 0.5, 0.8);
    else c.setHSL(0.55, 0.6, 0.8);
    col[i*3]=c.r; col[i*3+1]=c.g; col[i*3+2]=c.b;
    sizes[i] = Math.random()*1.6 + 0.3;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
  geo.setAttribute('color', new THREE.BufferAttribute(col,3));
  geo.setAttribute('size', new THREE.BufferAttribute(sizes,1));
  const mat = new THREE.PointsMaterial({
    size: 1.4, sizeAttenuation:true, vertexColors:true,
    transparent:true, opacity:0.95, depthWrite:false
  });
  return new THREE.Points(geo, mat);
}
const stars = makeStars(6000, 1400);
scene.add(stars);

// distant nebula glow planes
function makeNebula(color, x, y, z, scale) {
  const cv = document.createElement('canvas'); cv.width=256; cv.height=256;
  const ctx = cv.getContext('2d');
  const g = ctx.createRadialGradient(128,128,0,128,128,128);
  g.addColorStop(0, color);
  g.addColorStop(0.4, color.replace(/[\d.]+\)$/,'0.25)'));
  g.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = g; ctx.fillRect(0,0,256,256);
  const tex = new THREE.CanvasTexture(cv);
  const mat = new THREE.SpriteMaterial({ map:tex, transparent:true, depthWrite:false, blending:THREE.AdditiveBlending, opacity:0.6 });
  const sp = new THREE.Sprite(mat);
  sp.position.set(x,y,z); sp.scale.set(scale,scale,1);
  return sp;
}
scene.add(makeNebula('rgba(80,120,255,0.55)', -500, 120, -700, 700));
scene.add(makeNebula('rgba(200,80,180,0.45)', 600, -180, -650, 600));
scene.add(makeNebula('rgba(255,150,80,0.35)', -200, -300, 600, 500));

// ---------- Procedural planet textures ----------
function noiseTex(w, h, base, opts={}) {
  const cv = document.createElement('canvas'); cv.width=w; cv.height=h;
  const ctx = cv.getContext('2d');
  const baseCol = new THREE.Color(base);
  // fill base
  ctx.fillStyle = '#'+baseCol.getHexString(); ctx.fillRect(0,0,w,h);
  // layered blobs for surface detail
  const blobs = opts.blobs ?? 220;
  for (let i=0;i<blobs;i++){
    const x=Math.random()*w, y=Math.random()*h;
    const r=Math.random()*(opts.maxR??40)+(opts.minR??6);
    const g=ctx.createRadialGradient(x,y,0,x,y,r);
    const tint = opts.tint ?? '#ffffff';
    const a = (Math.random()*0.5+0.1);
    g.addColorStop(0, hexA(tint, a));
    g.addColorStop(1, hexA(tint, 0));
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
  }
  // subtle latitude bands for gas giants
  if (opts.bands){
    for (let i=0;i<h;i++){
      const band = Math.sin(i*0.06)*0.5+0.5;
      ctx.fillStyle = hexA(opts.accent ?? '#ffffff', band*0.12);
      ctx.fillRect(0,i,w,1);
    }
  }
  const tex = new THREE.CanvasTexture(cv);
  tex.wrapS = THREE.RepeatWrapping;
  tex.anisotropy = 4;
  return tex;
}
function hexA(hex, a){
  const c = new THREE.Color(hex);
  return `rgba(${Math.round(c.r*255)},${Math.round(c.g*255)},${Math.round(c.b*255)},${a})`;
}

// Earth: continents via green patches over blue
function earthTex(w,h){
  const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
  const ctx=cv.getContext('2d');
  // ocean
  const og=ctx.createLinearGradient(0,0,0,h);
  og.addColorStop(0,'#1a4a8a'); og.addColorStop(0.5,'#2a6fc8'); og.addColorStop(1,'#1a4a8a');
  ctx.fillStyle=og; ctx.fillRect(0,0,w,h);
  // continents
  ctx.fillStyle='#2f7d3a';
  for (let i=0;i<40;i++){
    const x=Math.random()*w, y=Math.random()*h;
    ctx.beginPath();
    const pts=8+Math.floor(Math.random()*6);
    for (let p=0;p<pts;p++){
      const a=(p/pts)*Math.PI*2;
      const rr=20+Math.random()*45;
      const px=x+Math.cos(a)*rr, py=y+Math.sin(a)*rr*0.7;
      if(p===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.closePath(); ctx.fill();
  }
  // ice caps
  ctx.fillStyle='rgba(240,250,255,0.85)';
  ctx.fillRect(0,0,w,h*0.06); ctx.fillRect(0,h*0.94,w,h*0.06);
  // clouds
  ctx.globalAlpha=0.35; ctx.fillStyle='#ffffff';
  for(let i=0;i<60;i++){
    const x=Math.random()*w,y=Math.random()*h,r=10+Math.random()*30;
    const g=ctx.createRadialGradient(x,y,0,x,y,r);
    g.addColorStop(0,'rgba(255,255,255,0.7)'); g.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
  const tex=new THREE.CanvasTexture(cv); tex.wrapS=THREE.RepeatWrapping; tex.anisotropy=4; return tex;
}

function ringTexture(){
  const cv=document.createElement('canvas'); cv.width=512; cv.height=64;
  const ctx=cv.getContext('2d');
  for(let i=0;i<512;i++){
    const t=i/512;
    let a = 0.55 + 0.35*Math.sin(t*40)*Math.sin(t*7);
    // gap
    if (t>0.55 && t<0.6) a*=0.15;
    if (t>0.72 && t<0.74) a*=0.2;
    a = Math.max(0, Math.min(1,a));
    const shade = 0.8 + 0.2*Math.sin(t*23);
    ctx.fillStyle=`rgba(${Math.round(230*shade)},${Math.round(205*shade)},${Math.round(165*shade)},${a})`;
    ctx.fillRect(i,0,1,64);
  }
  const tex=new THREE.CanvasTexture(cv); return tex;
}

// ---------- Sun ----------
const sunGroup = new THREE.Group(); scene.add(sunGroup);
const sunGeo = new THREE.SphereGeometry(4, 64, 64);
const sunTex = noiseTex(512,256,'#ffb24d',{ blobs:120, tint:'#fff2c0', maxR:60, minR:10 });
const sunMat = new THREE.MeshBasicMaterial({ map: sunTex, color: 0xffd27a });
const sun = new THREE.Mesh(sunGeo, sunMat);
sunGroup.add(sun);

// glow sprites
function makeGlow(color, scale){
  const cv=document.createElement('canvas'); cv.width=256; cv.height=256;
  const ctx=cv.getContext('2d');
  const g=ctx.createRadialGradient(128,128,0,128,128,128);
  g.addColorStop(0,color);
  g.addColorStop(0.2,color.replace(/[\d.]+\)$/,'0.55)'));
  g.addColorStop(0.5,color.replace(/[\d.]+\)$/,'0.18)'));
  g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g; ctx.fillRect(0,0,256,256);
  const tex=new THREE.CanvasTexture(cv);
  const mat=new THREE.SpriteMaterial({ map:tex, transparent:true, depthWrite:false, blending:THREE.AdditiveBlending });
  const sp=new THREE.Sprite(mat); sp.scale.set(scale,scale,1);
  return sp;
}
const glow1 = makeGlow('rgba(255,200,90,1)', 22);
const glow2 = makeGlow('rgba(255,140,40,1)', 40);
sunGroup.add(glow1); sunGroup.add(glow2);

// ---------- Build planets ----------
const planetObjs = [];
const REALISTIC_RADII = { Mercury:0.38, Venus:0.95, Earth:1.0, Mars:0.53, Jupiter:11.2, Saturn:9.4, Uranus:4.0, Neptune:3.9 };

function buildPlanet(data){
  const group = new THREE.Group(); // pivot at sun
  const orbit = new THREE.Group(); // moves along orbit
  group.add(orbit);

  let tex;
  if (data.name==='Earth') tex = earthTex(512,256);
  else tex = noiseTex(512,256, data.color, { blobs: data.bands?80:160, tint: data.accent, accent: data.accent, maxR: data.bands?30:42, minR:6, bands: data.bands });

  const r = data.radius;
  const geo = new THREE.SphereGeometry(r, 48, 48);
  const mat = new THREE.MeshStandardMaterial({
    map: tex,
    roughness: 0.85,
    metalness: 0.05,
    emissive: new THREE.Color(data.emissive),
    emissiveIntensity: 0.25
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.rotation.z = THREE.MathUtils.degToRad(data.tilt);
  mesh.userData = { name: data.name, data };
  orbit.add(mesh);

  // axial tilt: rotate the orbit group so planet tilts — we already tilted mesh
  // ring
  if (data.ring){
    const ringGeo = new THREE.RingGeometry(r*1.4, r*2.4, 96);
    // adjust UVs so texture maps radially
    const pos = ringGeo.attributes.position;
    const uv = ringGeo.attributes.uv;
    const v3 = new THREE.Vector3();
    for (let i=0;i<pos.count;i++){
      v3.fromBufferAttribute(pos,i);
      const dist = v3.length();
      const t = (dist - r*1.4)/(r*2.4 - r*1.4);
      uv.setXY(i, t, 0.5);
    }
    const ringMat = new THREE.MeshBasicMaterial({ map: ringTexture(), side: THREE.DoubleSide, transparent:true, opacity:0.85, depthWrite:false });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = Math.PI/2;
    mesh.add(ring);
  }

  // label sprite
  const label = makeLabel(data.name);
  label.position.set(0, r + 1.4, 0);
  orbit.add(label);

  // orbit line
  const orbitLine = makeOrbitLine(data.distance);
  scene.add(orbitLine);

  // start angle random
  const angle = Math.random()*Math.PI*2;
  group.userData = { data, mesh, orbit, label, orbitLine, angle, distance: data.distance };

  planetObjs.push(group);
  scene.add(group);
  return group;
}

function makeLabel(text){
  const cv=document.createElement('canvas'); cv.width=256; cv.height=64;
  const ctx=cv.getContext('2d');
  ctx.font = '600 30px Inter, sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='rgba(255,255,255,0.92)';
  ctx.shadowColor='rgba(0,0,0,0.8)'; ctx.shadowBlur=6;
  ctx.fillText(text, 128, 32);
  const tex=new THREE.CanvasTexture(cv);
  const mat=new THREE.SpriteMaterial({ map:tex, transparent:true, depthTest:false, depthWrite:false });
  const sp=new THREE.Sprite(mat); sp.scale.set(8,2,1); sp.renderOrder=10;
  return sp;
}

function makeOrbitLine(distance){
  const seg=128; const pts=[];
  for (let i=0;i<=seg;i++){
    const a=(i/seg)*Math.PI*2;
    pts.push(new THREE.Vector3(Math.cos(a)*distance, 0, Math.sin(a)*distance));
  }
  const geo=new THREE.BufferGeometry().setFromPoints(pts);
  const mat=new THREE.LineBasicMaterial({ color:0x3a5a8a, transparent:true, opacity:0.35 });
  return new THREE.Line(geo, mat);
}

PLANETS.forEach(buildPlanet);

// ---------- Asteroid belt (between Mars and Jupiter) ----------
function makeBelt(){
  const count=900;
  const geo=new THREE.BufferGeometry();
  const pos=new Float32Array(count*3);
  for (let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2;
    const d=28+Math.random()*5;
    const y=(Math.random()-0.5)*1.6;
    pos[i*3]=Math.cos(a)*d; pos[i*3+1]=y; pos[i*3+2]=Math.sin(a)*d;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
  const mat=new THREE.PointsMaterial({ color:0x9a8a70, size:0.18, sizeAttenuation:true, transparent:true, opacity:0.7 });
  return new THREE.Points(geo, mat);
}
const belt = makeBelt(); scene.add(belt);

// ---------- Interaction: raycast click ----------
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
let hovered = null;
const tooltip = document.getElementById('tooltip');

function pickPlanet(clientX, clientY){
  pointer.x = (clientX/window.innerWidth)*2-1;
  pointer.y = -(clientY/window.innerHeight)*2+1;
  raycaster.setFromCamera(pointer, camera);
  const meshes = [sun, ...planetObjs.map(g=>g.userData.mesh)];
  const hits = raycaster.intersectObjects(meshes, false);
  return hits[0] || null;
}

let downX=0, downY=0, isDrag=false;
renderer.domElement.addEventListener('pointerdown', e=>{ downX=e.clientX; downY=e.clientY; isDrag=false; });
renderer.domElement.addEventListener('pointermove', e=>{
  const hit = pickPlanet(e.clientX, e.clientY);
  hovered = hit;
  if (hit){
    renderer.domElement.style.cursor='pointer';
    tooltip.textContent = hit.object.userData.name;
    tooltip.style.left = e.clientX+'px';
    tooltip.style.top = e.clientY+'px';
    tooltip.classList.add('show');
  } else {
    renderer.domElement.style.cursor='grab';
    tooltip.classList.remove('show');
  }
  if (Math.abs(e.clientX-downX)>5 || Math.abs(e.clientY-downY)>5) isDrag=true;
});
renderer.domElement.addEventListener('pointerup', e=>{
  if (isDrag) return;
  const hit = pickPlanet(e.clientX, e.clientY);
  if (hit) selectPlanet(hit.object.userData.name);
});

// ---------- Info card ----------
const infoCard = document.getElementById('infoCard');
const iName=document.getElementById('iName');
const iType=document.getElementById('iType');
const iDesc=document.getElementById('iDesc');
const iSwatch=document.getElementById('iSwatch');
const iStats=document.getElementById('iStats');
let selected = null;
let followTimer = 0;

function selectPlanet(name){
  selected = name;
  const data = PLANETS.find(p=>p.name===name);
  if (!data){ infoCard.classList.remove('show'); return; }
  iName.textContent = data.name;
  iType.textContent = data.type;
  iDesc.textContent = data.desc;
  iSwatch.style.background = `radial-gradient(circle at 35% 35%, ${data.accent}, ${data.color} 60%, #000 130%)`;
  iSwatch.style.color = data.color;
  iStats.innerHTML = [
    ['Diameter', data.diameter],['Gravity', data.gravity],
    ['Day Length', data.day],['Orbital Period', data.year],
    ['Moons', data.moons],['Axial Tilt', data.tilt+'°']
  ].map(([k,v])=>`<div class="stat"><div class="k">${k}</div><div class="v">${v}</div></div>`).join('');
  infoCard.classList.add('show');
  // highlight in list
  document.querySelectorAll('.planet-item').forEach(el=>{
    el.classList.toggle('active', el.dataset.name===name);
  });
  // gently fly camera toward planet
  flyToPlanet(name);
}

document.getElementById('infoClose').addEventListener('click', ()=>{
  infoCard.classList.remove('show');
  selected=null;
  document.querySelectorAll('.planet-item').forEach(el=>el.classList.remove('active'));
});

// ---------- Planet list UI ----------
const planetListEl = document.getElementById('planetList');
PLANETS.forEach(p=>{
  const el=document.createElement('div');
  el.className='planet-item';
  el.dataset.name=p.name;
  el.innerHTML=`<div class="dot" style="background:${p.color};color:${p.color}"></div>
    <div class="nm">${p.name}</div><div class="foc">focus</div>`;
  el.addEventListener('click', ()=>selectPlanet(p.name));
  planetListEl.appendChild(el);
});

// ---------- Camera fly-to ----------
let camAnim=null;
function flyToPlanet(name){
  const obj = planetObjs.find(g=>g.userData.data.name===name);
  if (!obj) return;
  const wp = new THREE.Vector3();
  obj.userData.mesh.getWorldPosition(wp);
  const r = obj.userData.data.radius;
  const offset = new THREE.Vector3(r*4+6, r*2+4, r*4+6);
  const targetPos = wp.clone().add(offset);
  camAnim = { from: camera.position.clone(), to: targetPos, tfrom: controls.target.clone(), tto: wp.clone(), t:0, dur:1.1, follow:name };
  followTimer = 0;
}
function resetView(){
  camAnim = { from: camera.position.clone(), to: new THREE.Vector3(0,55,110), tfrom: controls.target.clone(), tto: new THREE.Vector3(0,0,0), t:0, dur:1.1, follow:null };
  infoCard.classList.remove('show');
  selected=null;
  document.querySelectorAll('.planet-item').forEach(el=>el.classList.remove('active'));
}
function topView(){
  camAnim = { from: camera.position.clone(), to: new THREE.Vector3(0,180,0.01), tfrom: controls.target.clone(), tto: new THREE.Vector3(0,0,0), t:0, dur:1.1, follow:null };
}
document.getElementById('resetView').addEventListener('click', resetView);
document.getElementById('topView').addEventListener('click', topView);

// ---------- Controls UI ----------
let speedFactor = 1.0;
const speedEl=document.getElementById('speed'), speedVal=document.getElementById('speedVal');
speedEl.addEventListener('input', ()=>{
  speedFactor = speedEl.value/100;
  speedVal.textContent = speedFactor.toFixed(1)+'×';
});

const glowEl=document.getElementById('glow'), glowVal=document.getElementById('glowVal');
glowEl.addEventListener('input', ()=>{
  const v = glowEl.value/100;
  glowVal.textContent = Math.round(v*100)+'%';
  glow1.material.opacity = v;
  glow2.material.opacity = v*0.8;
  glow1.visible = v>0.01; glow2.visible = v>0.01;
});

function toggleSwitch(id, cb){
  const el=document.getElementById(id);
  el.addEventListener('click', ()=>{
    el.classList.toggle('on');
    cb(el.classList.contains('on'));
  });
}
toggleSwitch('t-orbits', on=>{
  planetObjs.forEach(g=> g.userData.orbitLine.visible = on);
});
let labelsOn = true;
toggleSwitch('t-labels', on=>{ labelsOn = on; planetObjs.forEach(g=> g.userData.label.visible=on); });
toggleSwitch('t-realistic', on=>{
  planetObjs.forEach(g=>{
    const d = g.userData.data;
    const newR = on ? Math.max(0.3, REALISTIC_RADII[d.name]*0.45) : d.radius;
    g.userData.mesh.scale.setScalar(newR / d.radius);
  });
});

// ---------- Resize ----------
window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ---------- Animation loop ----------
const clock = new THREE.Clock();
function easeInOutCubic(t){ return t<0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2; }

function animate(){
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  const t = clock.getElapsedTime();

  // sun rotation & glow pulse
  sun.rotation.y += 0.0015;
  const pulse = 1 + Math.sin(t*1.3)*0.04;
  glow1.scale.set(22*pulse, 22*pulse, 1);

  // planets
  planetObjs.forEach(g=>{
    const u = g.userData;
    u.angle += (dt * speedFactor * (1.0/u.data.period)) * 0.5;
    const x = Math.cos(u.angle)*u.distance;
    const z = Math.sin(u.angle)*u.distance;
    u.orbit.position.set(x, 0, z);
    u.mesh.rotation.y += u.data.rotSpeed * speedFactor * (dt*60) * 0.3;
    // billboard-ish label scale stays; fade by distance handled by sprite depthTest off
  });

  // belt slow spin
  belt.rotation.y += 0.0006 * speedFactor;

  // starfield slow drift
  stars.rotation.y += 0.00003;

  // camera anim
  if (camAnim){
    camAnim.t += dt;
    const k = Math.min(1, camAnim.t/camAnim.dur);
    const e = easeInOutCubic(k);
    camera.position.lerpVectors(camAnim.from, camAnim.to, e);
    controls.target.lerpVectors(camAnim.tfrom, camAnim.tto, e);
    if (k>=1){
      if (camAnim.follow){
        // keep following the planet for a moment
        followTimer = 1.2;
      }
      camAnim = null;
    }
  } else if (followTimer > 0){
    followTimer -= dt;
    const obj = planetObjs.find(g=>g.userData.data.name===selected);
    if (obj){
      const wp = new THREE.Vector3();
      obj.userData.mesh.getWorldPosition(wp);
      controls.target.lerp(wp, 0.08);
    }
  }

  controls.update();
  renderer.render(scene, camera);
}

// hide loader + start
animate();
setTimeout(()=> document.getElementById('loader').classList.add('hide'), 400);
window.addEventListener('load', ()=> setTimeout(()=> document.getElementById('loader').classList.add('hide'), 300));
</script>
