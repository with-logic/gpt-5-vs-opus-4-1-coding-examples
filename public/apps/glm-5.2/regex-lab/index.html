<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Regex Lab — Learn & Test Regular Expressions</title>
<style>
  /* ===========================================================
     Regex Lab — single-file playground
     =========================================================== */

  /* ---------- Theme tokens ---------- */
  :root {
    --bg: #0d1117;
    --bg-elev: #161b22;
    --bg-elev2: #1c2230;
    --bg-input: #0a0e14;
    --border: #2a3142;
    --border-soft: #1f2633;
    --text: #e6edf3;
    --text-dim: #8b95a7;
    --text-faint: #5c6678;
    --accent: #7ee787;
    --accent-dim: #3fb950;
    --danger: #ff7b72;
    --warn: #f2cc60;
    --info: #79c0ff;
    --magenta: #d2a8ff;
    --orange: #ffa657;
    --cyan: #56d4dd;
    --mono: 'SF Mono', 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Menlo', 'Consolas', monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, sans-serif;
    --radius: 8px;
    --shadow: 0 8px 24px rgba(0,0,0,0.4);
  }

  [data-theme="light"] {
    --bg: #f6f8fa;
    --bg-elev: #ffffff;
    --bg-elev2: #eef1f4;
    --bg-input: #ffffff;
    --border: #d0d7de;
    --border-soft: #e3e8ed;
    --text: #1f2328;
    --text-dim: #59636e;
    --text-faint: #8c959f;
    --accent: #1a7f37;
    --accent-dim: #2da44e;
    --danger: #cf222e;
    --warn: #9a6700;
    --info: #0969da;
    --magenta: #8250df;
    --orange: #bc4c00;
    --cyan: #1b7c83;
    --shadow: 0 8px 24px rgba(140,149,159,0.2);
  }

  /* ---------- Reset ---------- */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, textarea { font-family: var(--mono); }

  /* ---------- Layout ---------- */
  .app {
    display: grid;
    grid-template-rows: auto 1fr;
    height: 100vh;
    max-width: 1500px;
    margin: 0 auto;
  }

  /* ---------- Terminal window chrome ---------- */
  .term {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    margin: 12px;
  }
  .term-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: linear-gradient(180deg, var(--bg-elev2), var(--bg-elev));
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .lights { display: flex; gap: 7px; }
  .light {
    width: 12px; height: 12px; border-radius: 50%;
    background: #ff5f56;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.15);
  }
  .light:nth-child(2) { background: #ffbd2e; }
  .light:nth-child(3) { background: #27c93f; }
  .term-title {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    margin-left: 6px;
    user-select: none;
    flex: 1;
  }
  .term-title .prompt { color: var(--accent); }
  .term-title .path { color: var(--info); }
  .term-actions { display: flex; gap: 6px; align-items: center; }
  .icon-btn {
    width: 30px; height: 30px;
    border-radius: 6px;
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--text-dim);
    transition: background .15s, color .15s;
  }
  .icon-btn:hover { background: var(--bg-elev2); color: var(--text); }
  .icon-btn svg { width: 16px; height: 16px; }

  /* ---------- Main grid ---------- */
  .main {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 1.15fr);
    gap: 1px;
    background: var(--border-soft);
    overflow: hidden;
    min-height: 0;
  }
  .pane {
    background: var(--bg-elev);
    display: flex;
    flex-direction: column;
    min-width: 0;
    min-height: 0;
    overflow: hidden;
  }
  .pane-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 14px;
    border-bottom: 1px solid var(--border-soft);
    flex-shrink: 0;
    gap: 8px;
  }
  .pane-head h2 {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .pane-head h2 .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent);
  }
  .pane-head h2 .dot.err { background: var(--danger); }
  .pane-body { flex: 1; min-height: 0; overflow: hidden; display: flex; flex-direction: column; }
  .pane-scroll { overflow: auto; padding: 14px; flex: 1; min-height: 0; }

  /* ---------- Pattern input row ---------- */
  .pattern-area { padding: 12px 14px; border-bottom: 1px solid var(--border-soft); flex-shrink: 0; }
  .pattern-row {
    display: flex;
    align-items: stretch;
    gap: 0;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 6px;
    transition: border-color .15s, box-shadow .15s;
  }
  .pattern-row:focus-within {
    border-color: var(--accent-dim);
    box-shadow: 0 0 0 3px rgba(126,231,135,0.12);
  }
  [data-theme="light"] .pattern-row:focus-within { box-shadow: 0 0 0 3px rgba(26,127,55,0.15); }
  .pattern-row.err {
    border-color: var(--danger);
    box-shadow: 0 0 0 3px rgba(255,123,114,0.15);
  }
  .delim {
    display: flex; align-items: center;
    padding: 0 8px;
    color: var(--text-faint);
    font-family: var(--mono);
    font-size: 15px;
    user-select: none;
  }
  .pattern-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 15px;
    padding: 11px 4px;
    letter-spacing: 0.01em;
    caret-color: var(--accent);
  }
  .flags-input {
    background: transparent;
    border: none;
    border-left: 1px solid var(--border-soft);
    outline: none;
    color: var(--magenta);
    font-size: 15px;
    padding: 11px 10px;
    width: 64px;
    text-align: center;
    letter-spacing: 0.15em;
    text-transform: lowercase;
    caret-color: var(--magenta);
  }

  .flag-chips { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
  .flag-chip {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 9px;
    border-radius: 5px;
    font-size: 11px;
    font-family: var(--mono);
    background: var(--bg-elev2);
    border: 1px solid var(--border-soft);
    color: var(--text-dim);
    transition: all .12s;
    user-select: none;
  }
  .flag-chip:hover { border-color: var(--border); color: var(--text); }
  .flag-chip.active {
    background: rgba(210,168,255,0.14);
    border-color: var(--magenta);
    color: var(--magenta);
  }
  .flag-chip .k { font-weight: 700; }
  .flag-chip .d { font-size: 10px; opacity: 0.75; }

  /* ---------- Error box ---------- */
  .error-box {
    margin-top: 10px;
    padding: 9px 12px;
    background: rgba(255,123,114,0.08);
    border: 1px solid rgba(255,123,114,0.3);
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--danger);
    display: none;
    white-space: pre-wrap;
    overflow-x: auto;
  }
  .error-box.show { display: block; }
  .error-box .label { color: var(--warn); font-weight: 600; }
  .error-caret {
    display: inline-block;
    margin-top: 4px;
    color: var(--orange);
  }

  /* ---------- Test text ---------- */
  .test-wrap { flex: 1; min-height: 0; display: flex; flex-direction: column; padding: 12px 14px; }
  .test-toolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .toolbar-btn {
    font-size: 11px;
    padding: 4px 9px;
    border-radius: 5px;
    background: var(--bg-elev2);
    border: 1px solid var(--border-soft);
    color: var(--text-dim);
    transition: all .12s;
    display: inline-flex; align-items: center; gap: 5px;
  }
  .toolbar-btn:hover { color: var(--text); border-color: var(--border); }
  .toolbar-btn svg { width: 12px; height: 12px; }
  .toolbar-spacer { flex: 1; }
  .match-count {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
  }
  .match-count b { color: var(--accent); font-weight: 600; }

  .test-field {
    flex: 1;
    position: relative;
    min-height: 120px;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    background: var(--bg-input);
  }
  .test-field:focus-within {
    border-color: var(--accent-dim);
    box-shadow: 0 0 0 3px rgba(126,231,135,0.12);
  }
  [data-theme="light"] .test-field:focus-within { box-shadow: 0 0 0 3px rgba(26,127,55,0.15); }
  .test-input, .test-mirror {
    position: absolute;
    inset: 0;
    margin: 0;
    border: none;
    padding: 12px 14px;
    font-family: var(--mono);
    font-size: 13.5px;
    line-height: 1.65;
    white-space: pre-wrap;
    word-wrap: break-word;
    overflow: auto;
    tab-size: 2;
  }
  .test-input {
    background: transparent;
    color: transparent;
    caret-color: var(--accent);
    outline: none;
    resize: none;
    z-index: 2;
  }
  .test-input::selection { background: rgba(121,192,255,0.25); }
  .test-mirror {
    z-index: 1;
    color: var(--text);
    pointer-events: none;
    user-select: none;
  }
  .test-mirror .tok { color: var(--text-faint); }

  /* highlight match spans */
  .hl {
    border-radius: 3px;
    padding: 1px 0;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.04) inset;
  }
  /* group color cycle */
  .g0 { background: rgba(126,231,135,0.22); box-shadow: inset 0 0 0 1px rgba(126,231,135,0.4); }
  .g1 { background: rgba(121,192,255,0.22); box-shadow: inset 0 0 0 1px rgba(121,192,255,0.4); }
  .g2 { background: rgba(210,168,255,0.22); box-shadow: inset 0 0 0 1px rgba(210,168,255,0.4); }
  .g3 { background: rgba(255,166,87,0.22); box-shadow: inset 0 0 0 1px rgba(255,166,87,0.4); }
  .g4 { background: rgba(242,204,96,0.22); box-shadow: inset 0 0 0 1px rgba(242,204,96,0.4); }
  .g5 { background: rgba(255,123,114,0.22); box-shadow: inset 0 0 0 1px rgba(255,123,114,0.4); }
  .g6 { background: rgba(86,212,221,0.22); box-shadow: inset 0 0 0 1px rgba(86,212,221,0.4); }
  .g7 { background: rgba(255,145,175,0.22); box-shadow: inset 0 0 0 1px rgba(255,145,175,0.4); }
  .hl-num {
    display: inline-block;
    min-width: 14px;
    padding: 0 3px;
    margin-left: 1px;
    border-radius: 3px;
    font-size: 9px;
    font-weight: 700;
    color: #0d1117;
    background: var(--accent);
    text-align: center;
    vertical-align: top;
    line-height: 14px;
  }
  [data-theme="light"] .hl-num { color: #fff; }

  /* ---------- Quick inserts ---------- */
  .inserts {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    padding: 10px 14px;
    border-top: 1px solid var(--border-soft);
    flex-shrink: 0;
    background: var(--bg-elev2);
  }
  .inserts-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-faint);
    align-self: center;
    margin-right: 2px;
  }
  .insert {
    font-family: var(--mono);
    font-size: 11.5px;
    padding: 4px 8px;
    border-radius: 5px;
    background: var(--bg-elev);
    border: 1px solid var(--border-soft);
    color: var(--text);
    transition: all .12s;
    white-space: nowrap;
  }
  .insert:hover {
    border-color: var(--accent-dim);
    color: var(--accent);
    transform: translateY(-1px);
  }
  .insert .sub { color: var(--text-faint); font-size: 10px; margin-left: 3px; }

  /* ---------- Right pane tabs ---------- */
  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border-soft);
    flex-shrink: 0;
  }
  .tab {
    padding: 10px 16px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-dim);
    border-bottom: 2px solid transparent;
    transition: all .12s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    user-select: none;
  }
  .tab:hover { color: var(--text); }
  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  .tab .badge {
    font-size: 10px;
    font-family: var(--mono);
    background: var(--bg-elev2);
    border: 1px solid var(--border-soft);
    border-radius: 10px;
    padding: 0 6px;
    color: var(--text-dim);
  }
  .tab.active .badge { background: rgba(126,231,135,0.14); border-color: rgba(126,231,135,0.3); color: var(--accent); }

  .tab-panel { display: none; flex: 1; min-height: 0; flex-direction: column; }
  .tab-panel.active { display: flex; }

  /* ---------- Matches table ---------- */
  .table-wrap { overflow: auto; flex: 1; min-height: 0; }
  table.matches {
    width: 100%;
    border-collapse: collapse;
    font-size: 12.5px;
    font-family: var(--mono);
  }
  table.matches thead th {
    position: sticky; top: 0;
    background: var(--bg-elev2);
    text-align: left;
    padding: 8px 12px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--text-dim);
    font-weight: 600;
    border-bottom: 1px solid var(--border);
    z-index: 1;
    white-space: nowrap;
  }
  table.matches tbody tr {
    border-bottom: 1px solid var(--border-soft);
    transition: background .1s;
  }
  table.matches tbody tr:hover { background: var(--bg-elev2); }
  table.matches td {
    padding: 7px 12px;
    vertical-align: top;
    max-width: 320px;
    overflow: auto;
  }
  table.matches td.idx { color: var(--text-faint); white-space: nowrap; }
  table.matches td.range { color: var(--text-dim); white-space: nowrap; }
  table.matches td.match-val { color: var(--text); white-space: pre; }
  table.matches td.groups { color: var(--text-dim); }
  table.matches td.groups .grp { display: block; white-space: pre; }
  table.matches td.groups .gn { color: var(--orange); }
  .empty-row td { text-align: center; color: var(--text-faint); padding: 28px; font-family: var(--sans); font-style: italic; }

  /* swatch */
  .swatch {
    display: inline-block;
    width: 10px; height: 10px;
    border-radius: 3px;
    margin-right: 6px;
    vertical-align: -1px;
  }

  /* ---------- Explanation ---------- */
  .explain { font-family: var(--mono); font-size: 13px; line-height: 1.7; }
  .explain .segment {
    display: block;
    padding: 7px 10px;
    border-radius: 6px;
    margin-bottom: 4px;
    border-left: 3px solid var(--border);
    background: var(--bg-input);
    transition: background .12s;
  }
  .explain .segment:hover { background: var(--bg-elev2); }
  .explain .segment .glyph {
    display: inline-block;
    min-width: 64px;
    color: var(--accent);
    font-weight: 600;
    margin-right: 8px;
  }
  .explain .segment .glyph.esc { color: var(--magenta); }
  .explain .segment .glyph.qty { color: var(--orange); }
  .explain .segment .glyph.anch { color: var(--warn); }
  .explain .segment .glyph.grp { color: var(--info); }
  .explain .segment .glyph.cls { color: var(--cyan); }
  .explain .segment .desc { color: var(--text-dim); }
  .explain .segment .desc b { color: var(--text); font-weight: 600; }
  .explain .unk { color: var(--text-faint); font-style: italic; }
  .explain .header {
    font-family: var(--sans);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-faint);
    margin: 14px 0 7px 2px;
  }
  .explain .header:first-child { margin-top: 0; }

  /* ---------- Toast ---------- */
  .toast-wrap {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: center;
    pointer-events: none;
  }
  .toast {
    background: var(--bg-elev2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 9px 16px;
    border-radius: 7px;
    font-size: 12.5px;
    box-shadow: var(--shadow);
    display: inline-flex;
    align-items: center;
    gap: 8px;
    animation: toastIn .2s ease, toastOut .3s ease 1.7s forwards;
  }
  .toast.ok { border-color: var(--accent-dim); }
  .toast.ok svg { color: var(--accent); }
  .toast svg { width: 15px; height: 15px; }
  @keyframes toastIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes toastOut { to { opacity: 0; transform: translateY(8px); } }

  /* ---------- Scrollbar ---------- */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; border: 2px solid var(--bg-elev); }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-faint); }

  /* ---------- Footer hint ---------- */
  .hint-bar {
    padding: 6px 14px;
    border-top: 1px solid var(--border-soft);
    font-size: 11px;
    color: var(--text-faint);
    font-family: var(--mono);
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    flex-shrink: 0;
    background: var(--bg-elev);
  }
  .hint-bar kbd {
    background: var(--bg-elev2);
    border: 1px solid var(--border-soft);
    border-radius: 3px;
    padding: 1px 5px;
    font-size: 10px;
    color: var(--text-dim);
  }

  /* ---------- Responsive ---------- */
  @media (max-width: 900px) {
    .main { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
    body { overflow: auto; }
    .app { height: auto; min-height: 100vh; }
    .term { margin: 8px; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="term">
    <!-- Title bar -->
    <div class="term-bar">
      <div class="lights"><span class="light"></span><span class="light"></span><span class="light"></span></div>
      <div class="term-title"><span class="prompt">user@regex-lab</span>:<span class="path">~/playground</span>$ ./regexlab --interactive</div>
      <div class="term-actions">
        <button class="icon-btn" id="shareBtn" title="Copy share permalink" aria-label="Copy share link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        </button>
        <button class="icon-btn" id="themeBtn" title="Toggle light/dark" aria-label="Toggle theme">
          <svg id="iconMoon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <svg id="iconSun" style="display:none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
        <button class="icon-btn" id="clearBtn" title="Clear pattern & text" aria-label="Clear all">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
        </button>
      </div>
    </div>

    <!-- Main grid -->
    <div class="main">
      <!-- LEFT PANE -->
      <div class="pane">
        <div class="pane-head">
          <h2><span class="dot" id="statusDot"></span>Pattern &amp; Test String</h2>
          <div class="match-count" id="matchCountLine"></div>
        </div>
        <div class="pane-body">
          <!-- Pattern input -->
          <div class="pattern-area">
            <div class="pattern-row" id="patternRow">
              <span class="delim">/</span>
              <input class="pattern-input" id="patternInput" spellcheck="false" autocomplete="off" placeholder="Enter pattern, e.g. (\w+)@(\w+\.\w+)" aria-label="Regex pattern">
              <span class="delim">/</span>
              <input class="flags-input" id="flagsInput" spellcheck="false" autocomplete="off" value="g" maxlength="6" aria-label="Flags">
            </div>
            <div class="flag-chips" id="flagChips"></div>
            <div class="error-box" id="errorBox"></div>
          </div>

          <!-- Test text -->
          <div class="test-wrap">
            <div class="test-toolbar">
              <button class="toolbar-btn" id="sampleBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                Load sample
              </button>
              <button class="toolbar-btn" id="clearTextBtn">Clear text</button>
              <div class="toolbar-spacer"></div>
            </div>
            <div class="test-field">
              <div class="test-mirror" id="testMirror"></div>
              <textarea class="test-input" id="testInput" spellcheck="false" placeholder="Type or paste text to test your pattern against…" aria-label="Test text"></textarea>
            </div>
          </div>

          <!-- Quick inserts -->
          <div class="inserts" id="inserts">
            <span class="inserts-label">Insert</span>
          </div>
        </div>
      </div>

      <!-- RIGHT PANE -->
      <div class="pane">
        <div class="tabs">
          <button class="tab active" data-tab="explain">Explanation</button>
          <button class="tab" data-tab="matches">Matches <span class="badge" id="matchBadge">0</span></button>
        </div>
        <div class="tab-panel active" id="panel-explain">
          <div class="pane-scroll"><div class="explain" id="explain"></div></div>
        </div>
        <div class="tab-panel" id="panel-matches">
          <div class="table-wrap">
            <table class="matches">
              <thead><tr><th>#</th><th>Range</th><th>Match</th><th>Groups</th></tr></thead>
              <tbody id="matchTbody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <!-- Hint bar -->
    <div class="hint-bar">
      <span><kbd>Tab</kbd> in pattern = insert token</span>
      <span><kbd>Ctrl/Cmd+S</kbd> = copy share link</span>
      <span>Pattern &amp; flags are stored in the URL <kbd>#</kbd> hash</span>
    </div>
  </div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<script>
"use strict";
/* ===========================================================
   Regex Lab — logic
   =========================================================== */
(function () {

  // ---------- DOM ----------
  const $ = (id) => document.getElementById(id);
  const patternInput = $('patternInput');
  const flagsInput   = $('flagsInput');
  const patternRow   = $('patternRow');
  const flagChips    = $('flagChips');
  const errorBox     = $('errorBox');
  const statusDot    = $('statusDot');
  const testInput    = $('testInput');
  const testMirror   = $('testMirror');
  const matchBadge   = $('matchBadge');
  const matchCountLine = $('matchCountLine');
  const matchTbody   = $('matchTbody');
  const explainEl    = $('explain');
  const insertsEl    = $('inserts');
  const themeBtn     = $('themeBtn');
  const iconMoon     = $('iconMoon');
  const iconSun      = $('iconSun');
  const shareBtn     = $('shareBtn');
  const clearBtn     = $('clearBtn');
  const clearTextBtn = $('clearTextBtn');
  const sampleBtn    = $('sampleBtn');
  const toastWrap    = $('toastWrap');

  const MAX_MATCHES = 5000;     // safety cap
  const MAX_HIGHLIGHT = 2000;   // safety cap for mirror highlighting

  // ---------- Flag metadata ----------
  const FLAGS = [
    { k: 'g', d: 'global' },
    { k: 'i', d: 'case-insensitive' },
    { k: 'm', d: 'multiline' },
    { k: 's', d: 'dotAll' },
    { k: 'u', d: 'unicode' },
    { k: 'y', d: 'sticky' },
  ];

  // ---------- Quick insert tokens ----------
  const INSERTS = [
    { label: '\\d', sub: 'digit', value: '\\d' },
    { label: '\\D', sub: 'non-digit', value: '\\D' },
    { label: '\\w', sub: 'word', value: '\\w' },
    { label: '\\W', sub: 'non-word', value: '\\W' },
    { label: '\\s', sub: 'space', value: '\\s' },
    { label: '\\S', sub: 'non-space', value: '\\S' },
    { label: '\\b', sub: 'boundary', value: '\\b' },
    { label: '[A-Z]', sub: 'class', value: '[A-Z]' },
    { label: '[0-9]', sub: 'range', value: '[0-9]' },
    { label: '.', sub: 'any', value: '.' },
    { label: '+', sub: '1+', value: '+' },
    { label: '*', sub: '0+', value: '*' },
    { label: '?', sub: 'opt', value: '?' },
    { label: '{n,m}', sub: 'qty', value: '{1,3}' },
    { label: '(…)', sub: 'group', value: '()' },
    { label: '(?:…)', sub: 'non-cap', value: '(?:)' },
    { label: '(?=…)', sub: 'lookahead', value: '(?=)' },
    { label: '(?!…)', sub: 'neg-ahead', value: '(?!)' },
    { label: '(?<=…)', sub: 'lookbehind', value: '(?<=)' },
    { label: '(?<!…)', sub: 'neg-behind', value: '(?<!)' },
    { label: '^', sub: 'start', value: '^' },
    { label: '$', sub: 'end', value: '$' },
  ];

  // ---------- Sample data ----------
  const SAMPLE = {
    pattern: '(\\w+)@(\\w+\\.\\w+)',
    flags: 'gi',
    text: 'Contact alice@example.com or bob@mail.org for details.\n'
        + 'Also reach out to support@company.co.uk — invalid@@bad..com should not fully match.\n'
        + 'Phone: 555-0142, Date: 2026-06-17, Hex: #1a2B3c'
  };

  // ---------- Utility: escape HTML ----------
  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ---------- Toast ----------
  function toast(msg, ok) {
    const t = document.createElement('div');
    t.className = 'toast' + (ok ? ' ok' : '');
    t.innerHTML = (ok
      ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'
      : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>')
      + '<span>' + esc(msg) + '</span>';
    toastWrap.appendChild(t);
    setTimeout(() => t.remove(), 2100);
  }

  // ---------- Flag chips ----------
  function renderFlagChips() {
    flagChips.innerHTML = '';
    const current = flagsInput.value;
    FLAGS.forEach(f => {
      const chip = document.createElement('button');
      chip.className = 'flag-chip' + (current.includes(f.k) ? ' active' : '');
      chip.innerHTML = '<span class="k">' + f.k + '</span><span class="d">' + f.d + '</span>';
      chip.title = 'flag: ' + f.d;
      chip.addEventListener('click', () => toggleFlag(f.k));
      flagChips.appendChild(chip);
    });
  }
  function toggleFlag(k) {
    let v = flagsInput.value;
    if (v.includes(k)) v = v.replace(k, '');
    else v += k;
    // keep canonical order g i m s u y
    v = FLAGS.map(f => f.k).filter(kk => v.includes(kk)).join('');
    flagsInput.value = v;
    syncFlagChips();
    update();
  }
  function syncFlagChips() {
    const current = flagsInput.value;
    [...flagChips.children].forEach((chip, i) => {
      chip.classList.toggle('active', current.includes(FLAGS[i].k));
    });
  }

  // ---------- Quick inserts ----------
  function renderInserts() {
    INSERTS.forEach(tok => {
      const b = document.createElement('button');
      b.className = 'insert';
      b.innerHTML = esc(tok.label) + '<span class="sub">' + esc(tok.sub) + '</span>';
      b.title = 'Insert ' + tok.label + ' at cursor';
      b.addEventListener('click', () => insertAtCursor(patternInput, tok.value, tok.value === '.' ? 1 : tokenCaretAdjust(tok.value)));
      update();
      b.addEventListener('click', () => { patternInput.focus(); });
      insertsEl.appendChild(b);
    });
  }
  function tokenCaretAdjust(v) {
    // place caret inside parens/brackets when token is a wrapper
    if (v === '()' ) return 1;
    if (v === '(?:)') return 3;
    if (v === '(?=)') return 3;
    if (v === '(?!)') return 3;
    if (v === '(?<=)') return 4;
    if (v === '(?<!)') return 4;
    if (v === '{1,3}') return 3;
    return v.length;
  }
  function insertAtCursor(el, text, caretPos) {
    const s = el.selectionStart ?? el.value.length;
    const e = el.selectionEnd ?? el.value.length;
    const val = el.value;
    el.value = val.slice(0, s) + text + val.slice(e);
    const pos = s + (caretPos ?? text.length);
    el.setSelectionRange(pos, pos);
    el.focus();
    update();
  }

  // ---------- Regex compilation + error parsing ----------
  function compileRegex(pattern, flags) {
    // sanitize flags — keep only valid chars
    const cleanFlags = (flags || '').replace(/[^gimsuy]/g, '');
    try {
      const re = new RegExp(pattern, cleanFlags);
      return { re, error: null };
    } catch (err) {
      return { re: null, error: parseError(err, pattern) };
    }
  }

  function parseError(err, pattern) {
    const msg = (err && err.message) ? err.message : String(err);
    let caret = -1;
    // V8 / Chrome style: "Invalid regular expression: /.../: Nothing to repeat"
    // Firefox style: "Invalid regular expression: invalid identity escape in regular expression"
    // Safari: "Invalid regular expression: unexpected token"
    let clean = msg.replace(/^Invalid regular expression:\s*/i, '').replace(/^SyntaxError:\s*/i, '');
    // Try to extract a character index from V8 "at character N"
    let m = msg.match(/at character (\d+)/);
    if (m) caret = parseInt(m[1], 10);
    // Strip the echoed pattern if present
    clean = clean.replace(/^\/.*?\/[gimsuy]*:\s*/, '');
    // Safari sometimes says: "Invalid regular expression: group (...): unmatched parentheses"
    return { message: clean, caret };
  }

  // ---------- Run matches ----------
  function runMatches(re, text) {
    const matches = [];
    if (!re) return matches;
    // Non-global: only first match. global/sticky: iterate.
    let lastIndex = 0;
    let guard = 0;
    try {
      if (re.global) {
        re.lastIndex = 0;
        let m;
        while ((m = re.exec(text)) !== null) {
          matches.push({
            index: m.index,
            end: m.index + m[0].length,
            value: m[0],
            groups: Array.from(m).slice(1),
          });
          if (m[0].length === 0) {
            // avoid infinite loop on zero-width match
            if (re.lastIndex === lastIndex) re.lastIndex++;
            lastIndex = re.lastIndex;
          }
          if (++guard > MAX_MATCHES) break;
        }
      } else if (re.sticky) {
        re.lastIndex = 0;
        let m;
        while ((m = re.exec(text)) !== null) {
          matches.push({ index: m.index, end: m.index + m[0].length, value: m[0], groups: Array.from(m).slice(1) });
          if (m[0].length === 0) re.lastIndex++;
          if (++guard > MAX_MATCHES) break;
        }
      } else {
        const m = re.exec(text);
        if (m) matches.push({ index: m.index, end: m.index + m[0].length, value: m[0], groups: Array.from(m).slice(1) });
      }
    } catch (e) {
      return matches;
    }
    return matches;
  }

  // ---------- Highlight mirror ----------
  function groupColorClass(n) {
    return 'g' + (n % 8);
  }
  function renderMirror(text, matches, groupRanges) {
    if (!text) {
      testMirror.innerHTML = '<span class="tok"></span>';
      return;
    }
    if (matches.length === 0) {
      testMirror.textContent = text;
      return;
    }
    // Build flat list of boundaries
    // We render full match spans; inside, also wrap group subspans where available.
    // For simplicity & robustness, wrap each match as a span, and separately wrap
    // capture group substrings nested inside.
    let out = '';
    let cursor = 0;
    const count = Math.min(matches.length, MAX_HIGHLIGHT);
    for (let i = 0; i < count; i++) {
      const mth = matches[i];
      if (mth.end <= cursor) continue;
      // text before match
      if (mth.index > cursor) out += esc(text.slice(cursor, mth.index));
      // match span
      const matchText = text.slice(mth.index, mth.end);
      // build inner with group highlights if we have group ranges
      let inner = '';
      const gr = groupRanges[i];
      if (gr && gr.length && matchText.length) {
        let gc = mth.index;
        // depth-colored by group number
        for (let gi = 0; gi < gr.length; gi++) {
          const g = gr[gi];
          if (g == null) continue;
          const [gs, ge] = g;
          if (gs < 0 || ge < 0) continue;
          // between
          if (gs > gc) inner += esc(text.slice(gc, gs));
          const cls = groupColorClass(gi + 1);
          inner += '<span class="hl ' + cls + '">' + esc(text.slice(gs, ge)) + '</span>';
          gc = ge;
        }
        if (gc < mth.end) inner += esc(text.slice(gc, mth.end));
      } else {
        inner = esc(matchText);
      }
      out += '<span class="hl g0">' + inner + '<span class="hl-num">' + (i + 1) + '</span></span>';
      cursor = mth.end;
      if (mth.end <= mth.index) { // zero-width
        // emit a visible marker so user sees the position
        out += '​'; // zero-width space keeps caret sane; no visual cost
        cursor = mth.index + 1;
      }
    }
    if (cursor < text.length) out += esc(text.slice(cursor));
    testMirror.innerHTML = out;
  }

  // Compute group ranges (absolute offsets) per match by re-running exec
  // using indices flag if available; fallback to indexOf search within match.
  function computeGroupRanges(re, text, matches) {
    const ranges = [];
    if (!re || matches.length === 0) return ranges;
    // Try 'd' flag (indices) — but we strip 'd' in sanitize; re-add attempt manually:
    try {
      const dFlags = (flagsInput.value.replace(/[^gimsuy]/g,'')) + 'd';
      const dre = new RegExp(patternInput.value, dFlags);
      if (re.global) {
        dre.lastIndex = 0;
        let m, i = 0;
        while ((m = dre.exec(text)) !== null) {
          if (m.indices) {
            ranges.push(m.indices.slice(1).map(g => g ? [g[0], g[1]] : null));
          } else { ranges.push([]); }
          if (m[0].length === 0) dre.lastIndex++;
          if (++i > matches.length) break;
        }
      } else {
        const m = dre.exec(text);
        if (m && m.indices) ranges.push(m.indices.slice(1).map(g => g ? [g[0], g[1]] : null));
      }
    } catch (e) {
      // fallback: leave empty; mirror renders match-only color
    }
    return ranges;
  }

  // ---------- Matches table ----------
  function renderTable(matches, groupRanges) {
    matchTbody.innerHTML = '';
    if (matches.length === 0) {
      const tr = document.createElement('tr');
      tr.className = 'empty-row';
      tr.innerHTML = '<td colspan="4">No matches — adjust your pattern or test text.</td>';
      matchTbody.appendChild(tr);
      return;
    }
    const shown = matches.slice(0, 500);
    shown.forEach((m, i) => {
      const tr = document.createElement('tr');
      const groupsHtml = m.groups.map((g, gi) => {
        const cls = groupColorClass(gi + 1);
        return '<span class="grp"><span class="swatch ' + cls + '"></span><span class="gn">$' + (gi + 1) + '</span> = ' + esc(g === undefined ? '∅' : JSON.stringify(g)) + '</span>';
      }).join('');
      tr.innerHTML =
        '<td class="idx">' + (i + 1) + '</td>' +
        '<td class="range">' + m.index + '–' + m.end + '</td>' +
        '<td class="match-val">' + esc(m.value === '' ? '∅ (zero-width)' : m.value) + '</td>' +
        '<td class="groups">' + (groupsHtml || '<span class="tok">—</span>') + '</td>';
      matchTbody.appendChild(tr);
    });
    if (matches.length > 500) {
      const tr = document.createElement('tr');
      tr.className = 'empty-row';
      tr.innerHTML = '<td colspan="4">Showing first 500 of ' + matches.length + ' matches.</td>';
      matchTbody.appendChild(tr);
    }
  }

  // ---------- Explanation engine ----------
  // Tokenizer that walks the pattern and emits human-readable descriptions.
  function explain(pattern) {
    const segs = [];
    let i = 0;
    const n = pattern.length;

    function peek(o) { return pattern[i + (o || 0)]; }
    function push(glyph, desc, type) {
      segs.push({ glyph, desc, type: type || '' });
    }

    // named escape map
    const escapeMap = {
      d: 'digit (<b>0–9</b>)',
      D: 'non-digit (anything except <b>0–9</b>)',
      w: 'word char (<b>A–Z a–z 0–9 _</b>)',
      W: 'non-word char',
      s: 'whitespace (space, tab, newline…)',
      S: 'non-whitespace',
      b: 'word boundary (between <b>\\w</b> and <b>\\W</b>)',
      B: 'non-word-boundary',
      n: 'newline (<b>\\n</b>)',
      r: 'carriage return (<b>\\r</b>)',
      t: 'tab (<b>\\t</b>)',
      v: 'vertical tab',
      f: 'form feed',
      0: 'NUL character',
    };

    function parseCharClass() {
      // i points at '['
      const start = i;
      i++; // consume '['
      let inner = '';
      if (peek() === '^') { i++; inner += '^'; }
      // ] immediately after [ or [^ is a literal
      if (peek() === ']') { inner += ']'; i++; }
      let depth = 0;
      while (i < n && (pattern[i] !== ']' || depth > 0)) {
        const c = pattern[i];
        if (c === '[') depth++;
        else if (c === ']') depth--;
        else if (c === '[' && pattern[i-1] === '\\') { /* no-op */ }
        if (c === '\\' && i + 1 < n) { inner += c + pattern[i+1]; i += 2; continue; }
        inner += c; i++;
        if (i > start + 200) break; // safety
      }
      if (i < n && pattern[i] === ']') i++; // consume ']'
      // describe
      let desc;
      const neg = inner.startsWith('^');
      const body = neg ? inner.slice(1) : inner;
      if (body.length === 0 && !neg) desc = 'empty character class (matches nothing)';
      else desc = (neg ? '<b>negated</b> set: ' : 'character class: ') + '<b>[' + body + ']</b>';
      // detect ranges
      const ranges = body.match(/([^\\]-[^\\])/g);
      if (ranges && ranges.length) {
        desc += ' (includes range' + (ranges.length>1?'s':'') + ' ' + ranges.map(r => r.trim()).join(', ') + ')';
      }
      push('[' + inner + ']', desc, 'cls');
    }

    function parseGroup() {
      // i at '('
      const startIdx = i;
      i++;
      if (peek() === '?') {
        i++;
        const c = peek();
        if (c === ':') {
          i++;
          push('(?:…)', '<b>non-capturing group</b> — groups without creating a capture', 'grp');
          return;
        } else if (c === '=') {
          i++;
          push('(?=…)', '<b>positive lookahead</b> — asserts match follows, no consumption', 'grp');
          return;
        } else if (c === '!') {
          i++;
          push('(?!…)', '<b>negative lookahead</b> — asserts match does NOT follow', 'grp');
          return;
        } else if (c === '<') {
          i++;
          const c2 = peek();
          if (c2 === '=') { i++; push('(?<=…)', '<b>positive lookbehind</b> — asserts match precedes', 'grp'); return; }
          if (c2 === '!') { i++; push('(?<!…)', '<b>negative lookbehind</b> — asserts match does NOT precede', 'grp'); return; }
          // named group (?<name>…)
          let name = '';
          while (i < n && peek() !== '>' && peek() !== ')' ) { name += pattern[i]; i++; }
          if (peek() === '>') { i++; }
          push('(?<' + name + '>…)', '<b>named capture group</b> “' + esc(name) + '”', 'grp');
          return;
        } else {
          // unknown group flag — bail
          push('(' + pattern.slice(startIdx, Math.min(startIdx+4, n)) + '…', 'group with unknown flag <b>?' + esc(c) + '</b>', 'grp');
          return;
        }
      }
      push('(…)', '<b>capturing group</b> — saves the matched substring', 'grp');
    }

    function parseQuantifier() {
      const c = pattern[i];
      if (c === '+') { push('+', 'match <b>one or more</b> (greedy)', 'qty'); i++; if (peek()==='?'){push('?','lazy (non-greedy)','qty');i++;} else if (peek()==='+'){push('+','possessive','qty');i++;} return; }
      if (c === '*') { push('*', 'match <b>zero or more</b> (greedy)', 'qty'); i++; if (peek()==='?'){push('?','lazy (non-greedy)','qty');i++;} else if (peek()==='+'){push('+','possessive','qty');i++;} return; }
      if (c === '?') { push('?', 'match <b>zero or one</b> (optional)', 'qty'); i++; if (peek()==='?'){push('?','lazy','qty');i++;} else if (peek()==='+'){push('+','possessive','qty');i++;} return; }
      if (c === '{') {
        let body = '{';
        i++;
        while (i < n && pattern[i] !== '}' && pattern[i] !== ')' ) { body += pattern[i]; i++; }
        if (peek() === '}') { body += '}'; i++; }
        let desc;
        const inner = body.slice(1, -1);
        if (/^\d+$/.test(inner)) desc = 'match <b>exactly ' + esc(inner) + '</b> time' + (inner==='1'?'':'s');
        else if (/^\d+,$/.test(inner)) desc = 'match <b>at least ' + esc(inner.slice(0,-1)) + '</b> times';
        else if (/^\d+,\d+$/.test(inner)) { const p = inner.split(','); desc = 'match between <b>' + esc(p[0]) + ' and ' + esc(p[1]) + '</b> times'; }
        else desc = 'invalid/loose quantifier <b>' + esc(body) + '</b>';
        push(body, desc, 'qty');
        if (peek()==='?'){push('?','lazy','qty');i++;}
        else if (peek()==='+'){push('+','possessive','qty');i++;}
        return;
      }
    }

    while (i < n) {
      const c = pattern[i];

      // quantifiers
      if (c === '+' || c === '*' || c === '?' || c === '{') {
        parseQuantifier();
        continue;
      }
      // anchors
      if (c === '^') { push('^', '<b>start</b> of string (or line with <b>m</b> flag)', 'anch'); i++; continue; }
      if (c === '$') { push('$', '<b>end</b> of string (or line with <b>m</b> flag)', 'anch'); i++; continue; }
      // groups
      if (c === '(') { parseGroup(); continue; }
      // char class
      if (c === '[') { parseCharClass(); continue; }
      // dot
      if (c === '.') { push('.', '<b>any char</b> (except newline, unless <b>s</b> flag)', 'cls'); i++; continue; }
      // pipe
      if (c === '|') { push('|', '<b>alternation</b> — OR between options', 'grp'); i++; continue; }
      // escapes
      if (c === '\\') {
        const next = pattern[i + 1];
        if (next === undefined) { push('\\', 'trailing backslash (invalid)', 'esc'); i++; continue; }
        // Unicode property \p{...}
        if (next === 'p' || next === 'P') {
          let body = '\\' + next;
          i += 2;
          if (peek() === '{') {
            while (i < n && pattern[i] !== '}') { body += pattern[i]; i++; }
            if (peek() === '}') { body += '}'; i++; }
          }
          const neg = next === 'P';
          push(body, (neg ? '<b>negated</b> ' : '') + 'Unicode property <b>' + esc(body) + '</b> (requires <b>u</b> flag)', 'cls');
          continue;
        }
        // hex \xHH
        if (next === 'x') {
          let body = '\\x';
          i += 2;
          if (peek() === '{') {
            while (i < n && pattern[i] !== '}') { body += pattern[i]; i++; }
            if (peek() === '}') { body += '}'; i++; }
          } else {
            body += (pattern[i]||'') + (pattern[i+1]||''); i += 2;
          }
          push(body, 'hex escape <b>' + esc(body) + '</b>', 'esc');
          continue;
        }
        // unicode \uHHHH
        if (next === 'u') {
          let body = '\\u';
          i += 2;
          if (peek() === '{') {
            while (i < n && pattern[i] !== '}') { body += pattern[i]; i++; }
            if (peek() === '}') { body += '}'; i++; }
          } else {
            body += (pattern[i]||'')+(pattern[i+1]||'')+(pattern[i+2]||'')+(pattern[i+3]||''); i += 4;
          }
          push(body, 'unicode escape <b>' + esc(body) + '</b>', 'esc');
          continue;
        }
        // backreference \1..\9 or \k<name>
        if (/[1-9]/.test(next)) {
          let num = '';
          while (i + 1 < n && /[0-9]/.test(pattern[i+1])) { num += pattern[i+1]; i++; }
          i++; // consume last digit
          push('\\' + num, '<b>backreference</b> to group ' + esc(num), 'grp');
          continue;
        }
        if (next === 'k') {
          let body = '\\k';
          i += 2;
          if (peek() === '<') {
            while (i < n && pattern[i] !== '>') { body += pattern[i]; i++; }
            if (peek() === '>') { body += '>'; i++; }
          }
          push(body, '<b>named backreference</b> ' + esc(body), 'grp');
          continue;
        }
        // known escapes
        if (escapeMap[next]) {
          push('\\' + next, escapeMap[next], 'esc');
          i += 2; continue;
        }
        // any other escaped char => literal
        push('\\' + next, 'escaped literal <b>' + esc('\\' + next) + '</b>', 'esc');
        i += 2; continue;
      }
      // literal char
      if (c === ' ') { push('␣', 'literal space', ''); i++; continue; }
      push(c, 'literal char <b>' + esc(c) + '</b>', '');
      i++;
    }
    return segs;
  }

  function renderExplanation(pattern, flags) {
    if (!pattern) {
      explainEl.innerHTML = '<div class="unk">Enter a pattern above to see a token-by-token explanation.</div>';
      return;
    }
    let html = '';
    // flags summary
    html += '<div class="header">Flags · ' + esc(flags || '(none)') + '</div>';
    const flagDocs = {
      g: 'global — find all matches',
      i: 'case-insensitive',
      m: 'multiline — ^ and $ match line boundaries',
      s: 'dotAll — . matches newline too',
      u: 'unicode — full unicode support',
      y: 'sticky — match at lastIndex only',
    };
    if (flags && flags.length) {
      [...flags].forEach(f => {
        if (flagDocs[f]) {
          html += '<span class="segment"><span class="glyph grp">' + esc(f) + '</span><span class="desc">' + flagDocs[f] + '</span></span>';
        }
      });
    } else {
      html += '<span class="segment"><span class="desc">No flags — finds the first match only.</span></span>';
    }

    html += '<div class="header">Pattern tokens</div>';
    let segs;
    try {
      segs = explain(pattern);
    } catch (e) {
      html += '<span class="segment"><span class="desc unk">Could not parse pattern for explanation: ' + esc(e.message) + '</span></span>';
      segs = [];
    }
    if (segs.length === 0) {
      html += '<span class="segment unk">No recognizable tokens.</span>';
    }
    segs.forEach(s => {
      html += '<span class="segment"><span class="glyph ' + s.type + '">' + esc(s.glyph) + '</span><span class="desc">' + s.desc + '</span></span>';
    });
    explainEl.innerHTML = html;
  }

  // ---------- Main update ----------
  let updateTimer = null;
  function scheduleUpdate() {
    if (updateTimer) cancelAnimationFrame(updateTimer);
    updateTimer = requestAnimationFrame(update);
  }

  function update() {
    const pattern = patternInput.value;
    const flags = flagsInput.value;
    const text = testInput.value;

    // persist to URL hash
    persistHash(pattern, flags, text);

    syncFlagChips();

    // explanation
    renderExplanation(pattern, flags);

    // compile
    const { re, error } = compileRegex(pattern, flags);
    if (error) {
      showError(error, pattern);
      statusDot.classList.add('err');
      patternRow.classList.add('err');
      // clear outputs but keep mirror text plain
      testMirror.textContent = text;
      matchTbody.innerHTML = '<tr class="empty-row"><td colspan="4">Pattern invalid — fix the error to see matches.</td></tr>';
      matchBadge.textContent = '0';
      matchCountLine.innerHTML = '';
      return;
    }
    hideError();
    statusDot.classList.remove('err');
    patternRow.classList.remove('err');

    const matches = runMatches(re, text);
    const groupRanges = computeGroupRanges(re, text, matches);

    renderMirror(text, matches, groupRanges);
    renderTable(matches, groupRanges);

    const total = matches.length;
    matchBadge.textContent = total > 999 ? '999+' : total;
    if (total === 0) {
      matchCountLine.innerHTML = 'No matches';
    } else {
      matchCountLine.innerHTML = '<b>' + total + '</b> match' + (total === 1 ? '' : 'es') + (re.global ? '' : ' (non-global: first only)');
    }
  }

  // ---------- Error display ----------
  function showError(error, pattern) {
    let html = '<span class="label">⚠ Invalid pattern:</span> ' + esc(error.message);
    if (error.caret >= 0 && error.caret <= pattern.length) {
      // show pattern with caret underline
      const before = pattern.slice(0, error.caret);
      const at = pattern.slice(error.caret, error.caret + 1);
      const after = pattern.slice(error.caret + 1);
      html += '\n<span class="error-caret">' + esc(before) + '▸' + esc(at) + '◂\n' + ' '.repeat(before.length) + '^ char ' + error.caret + '</span>';
    }
    errorBox.innerHTML = html;
    errorBox.classList.add('show');
  }
  function hideError() {
    errorBox.classList.remove('show');
    errorBox.innerHTML = '';
  }

  // ---------- URL hash persistence ----------
  function persistHash(pattern, flags, text) {
    try {
      const data = { p: pattern, f: flags, t: text };
      const enc = encodeURIComponent(JSON.stringify(data));
      const hash = '#' + enc;
      if (location.hash !== hash) history.replaceState(null, '', hash);
    } catch (e) { /* ignore */ }
  }
  function loadHash() {
    try {
      const h = location.hash.slice(1);
      if (!h) return false;
      const data = JSON.parse(decodeURIComponent(h));
      if (typeof data.p === 'string') patternInput.value = data.p;
      if (typeof data.f === 'string') flagsInput.value = data.f;
      if (typeof data.t === 'string') testInput.value = data.t;
      return true;
    } catch (e) { return false; }
  }

  // ---------- Share ----------
  function copyShareLink() {
    const url = location.href;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(url).then(
        () => toast('Share link copied to clipboard', true),
        () => fallbackCopy(url)
      );
    } else fallbackCopy(url);
  }
  function fallbackCopy(url) {
    const ta = document.createElement('textarea');
    ta.value = url; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); toast('Share link copied', true); }
    catch (e) { toast('Copy failed — copy URL manually', false); }
    ta.remove();
  }

  // ---------- Theme ----------
  function setTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    iconMoon.style.display = t === 'dark' ? 'none' : '';
    iconSun.style.display  = t === 'dark' ? '' : 'none';
    try { localStorage.setItem('regexlab-theme', t); } catch (e) {}
  }
  function toggleTheme() {
    const cur = document.documentElement.getAttribute('data-theme');
    setTheme(cur === 'dark' ? 'light' : 'dark');
  }

  // ---------- Tabs ----------
  function activateTab(name) {
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + name));
  }

  // ---------- Mirror scroll sync ----------
  testInput.addEventListener('scroll', () => {
    testMirror.scrollTop = testInput.scrollTop;
    testMirror.scrollLeft = testInput.scrollLeft;
  });

  // ---------- Wire up events ----------
  patternInput.addEventListener('input', scheduleUpdate);
  flagsInput.addEventListener('input', () => {
    // sanitize + canonicalize on manual edit
    let v = flagsInput.value.replace(/[^gimsuy]/g, '');
    v = FLAGS.map(f => f.k).filter(kk => v.includes(kk)).join('');
    flagsInput.value = v;
    scheduleUpdate();
  });
  testInput.addEventListener('input', scheduleUpdate);

  // Tab key inserts token placeholder; otherwise lets focus move with Ctrl+Tab
  patternInput.addEventListener('keydown', (e) => {
    if (e.key === 'Tab' && !e.ctrlKey && !e.metaKey) {
      e.preventDefault();
      insertAtCursor(patternInput, '…', 0);
    }
  });
  // Ctrl/Cmd+S -> share
  document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 's') {
      e.preventDefault(); copyShareLink();
    }
    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'k') {
      e.preventDefault(); patternInput.focus(); patternInput.select();
    }
  });

  document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => activateTab(t.dataset.tab)));
  themeBtn.addEventListener('click', toggleTheme);
  shareBtn.addEventListener('click', copyShareLink);
  clearBtn.addEventListener('click', () => {
    patternInput.value = '';
    flagsInput.value = 'g';
    testInput.value = '';
    scheduleUpdate();
    patternInput.focus();
    toast('Cleared', true);
  });
  clearTextBtn.addEventListener('click', () => {
    testInput.value = '';
    scheduleUpdate();
    testInput.focus();
  });
  sampleBtn.addEventListener('click', () => {
    patternInput.value = SAMPLE.pattern;
    flagsInput.value = SAMPLE.flags;
    testInput.value = SAMPLE.text;
    scheduleUpdate();
    toast('Sample loaded', true);
  });

  window.addEventListener('hashchange', () => {
    if (loadHash()) { renderFlagChips(); scheduleUpdate(); }
  });

  // ---------- Init ----------
  function init() {
    // theme
    let theme = 'dark';
    try { theme = localStorage.getItem('regexlab-theme') || 'dark'; } catch (e) {}
    setTheme(theme);

    renderFlagChips();
    renderInserts();

    const loaded = loadHash();
    if (!loaded) {
      patternInput.value = SAMPLE.pattern;
      flagsInput.value = SAMPLE.flags;
      testInput.value = SAMPLE.text;
    }
    renderFlagChips();
    update();
    patternInput.focus();
    // place caret at end of pattern
    const len = patternInput.value.length;
    patternInput.setSelectionRange(len, len);
  }

  init();
})();
</script>
</body>
</html>
