<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Cloud Painter · Paint Your Sky</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#5a6b8a;
    --ink-soft:#8aa0c2;
    --glass:rgba(255,255,255,0.55);
    --glass-border:rgba(255,255,255,0.85);
    --shadow:0 10px 30px rgba(80,110,170,0.22);
    --pop:#ff8fb1;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;overflow:hidden;font-family:'Fredoka',system-ui,sans-serif;color:var(--ink);
    background:#7ec8f0;}
  #sky{position:fixed;inset:0;z-index:0;display:block;touch-action:none;cursor:crosshair;}

  /* ----- Top bar ----- */
  .topbar{position:fixed;top:0;left:0;right:0;z-index:10;display:flex;justify-content:space-between;
    align-items:flex-start;padding:18px 22px;pointer-events:none;}
  .brand{pointer-events:auto;display:flex;align-items:center;gap:12px;
    background:var(--glass);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border:2px solid var(--glass-border);border-radius:22px;padding:10px 18px 10px 14px;box-shadow:var(--shadow);}
  .brand .logo{font-size:30px;animation:floaty 4s ease-in-out infinite;filter:drop-shadow(0 4px 6px rgba(120,160,210,.4));}
  .brand .txt b{font-size:22px;font-weight:700;color:#5b6f9e;letter-spacing:.3px;line-height:1}
  .brand .txt span{display:block;font-size:12.5px;color:var(--ink-soft);font-weight:500;margin-top:2px}
  .top-actions{pointer-events:auto;display:flex;gap:10px}
  .pill-btn{font-family:inherit;font-weight:600;font-size:15px;border:none;cursor:pointer;
    display:inline-flex;align-items:center;gap:8px;padding:11px 18px;border-radius:18px;
    background:var(--glass);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border:2px solid var(--glass-border);color:var(--ink);box-shadow:var(--shadow);
    transition:transform .15s cubic-bezier(.34,1.56,.64,1), background .2s;}
  .pill-btn:hover{transform:translateY(-2px) scale(1.03)}
  .pill-btn:active{transform:translateY(0) scale(.97)}
  .pill-btn .ic{font-size:18px}
  .pill-btn.save{background:linear-gradient(135deg,#fff4b8,#ffd479);color:#8a5a17;border-color:#fff}

  /* ----- Bottom toolbar ----- */
  .dock{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);z-index:10;
    display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:center;
    max-width:calc(100vw - 28px);padding:12px 16px;border-radius:28px;
    background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    border:2px solid var(--glass-border);box-shadow:var(--shadow);}
  .group{display:flex;align-items:center;gap:8px}
  .group + .group{border-left:2px dashed rgba(140,170,210,.4);padding-left:10px}
  .label{font-size:11px;font-weight:600;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.6px;
    margin-right:2px;align-self:center}
  .tool{width:46px;height:46px;border-radius:16px;border:2px solid transparent;cursor:pointer;
    font-size:22px;display:flex;align-items:center;justify-content:center;
    background:rgba(255,255,255,.6);color:var(--ink);transition:all .15s cubic-bezier(.34,1.56,.64,1);
    box-shadow:0 4px 10px rgba(110,150,200,.18);line-height:1;}
  .tool:hover{transform:translateY(-3px) scale(1.08);background:#fff}
  .tool:active{transform:scale(.92)}
  .tool.active{background:linear-gradient(135deg,#bfe9ff,#9fd4ff);border-color:#7fb8ee;color:#2c4d77;
    box-shadow:0 6px 16px rgba(110,170,230,.45);}
  .tool.plane{background:linear-gradient(135deg,#e9f6ff,#cfe8ff)}
  .tool.plane:hover{background:linear-gradient(135deg,#fff,#eaf6ff)}
  .swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid #fff;
    box-shadow:0 3px 8px rgba(110,150,200,.3);transition:transform .15s cubic-bezier(.34,1.56,.64,1)}
  .swatch:hover{transform:scale(1.15)}
  .swatch.active{transform:scale(1.22);box-shadow:0 0 0 3px var(--pop),0 3px 8px rgba(110,150,200,.3)}
  input[type=range]{-webkit-appearance:none;appearance:none;width:96px;height:8px;border-radius:8px;
    background:linear-gradient(90deg,#cfe6ff,#9fd0ff);outline:none;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;
    background:#fff;border:3px solid #7fb8ee;cursor:pointer;box-shadow:0 2px 6px rgba(110,160,220,.4);}
  input[type=range]::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:#fff;border:3px solid #7fb8ee;cursor:pointer}
  .size-dot{width:26px;height:26px;display:flex;align-items:center;justify-content:center}
  .size-dot i{display:block;border-radius:50%;background:#fff;box-shadow:0 2px 5px rgba(110,160,220,.4)}

  /* ----- Hint toast ----- */
  .hint{position:fixed;left:50%;top:96px;transform:translateX(-50%);z-index:9;
    background:rgba(255,255,255,.8);backdrop-filter:blur(8px);border:2px solid #fff;border-radius:16px;
    padding:9px 18px;font-size:14px;font-weight:500;color:var(--ink);box-shadow:var(--shadow);
    pointer-events:none;animation:hintIn .6s ease both, hintOut .6s ease 6.5s both;}
  @keyframes hintIn{from{opacity:0;transform:translate(-50%,-12px)}to{opacity:1;transform:translate(-50%,0)}}
  @keyframes hintOut{to{opacity:0;transform:translate(-50%,-12px)}}

  @keyframes floaty{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-6px) rotate(2deg)}}

  /* tiny screens */
  @media (max-width:640px){
    .brand .txt span{display:none}
    .brand .txt b{font-size:18px}
    .brand{padding:8px 14px 8px 10px}
    .pill-btn{font-size:13px;padding:9px 13px}
    .tool{width:40px;height:40px;font-size:19px;border-radius:14px}
    .swatch{width:24px;height:24px}
    input[type=range]{width:74px}
    .label{display:none}
  }
</style>
</head>
<body>
<canvas id="sky"></canvas>

<div class="topbar">
  <div class="brand">
    <div class="logo">☁️</div>
    <div class="txt"><b>Cloud Painter</b><span>Paint your own sky</span></div>
  </div>
  <div class="top-actions">
    <button class="pill-btn" id="clearBtn"><span class="ic">🗑️</span>Clear</button>
    <button class="pill-btn save" id="saveBtn"><span class="ic">💾</span>Save Sky</button>
  </div>
</div>

<div class="hint" id="hint">Drag your finger or mouse across the sky to paint clouds! ☁️</div>

<div class="dock">
  <div class="group">
    <span class="label">Brush</span>
    <button class="tool active" data-brush="puff" title="Puffy cloud">☁️</button>
    <button class="tool" data-brush="star" title="Star sparkles">⭐</button>
    <button class="tool" data-brush="heart" title="Hearts">❤️</button>
    <button class="tool" data-brush="rainbow" title="Rainbow puff">🌈</button>
    <button class="tool" data-brush="eraser" title="Eraser">🧽</button>
  </div>

  <div class="group" id="colors">
    <span class="label">Color</span>
    <!-- swatches injected by JS -->
  </div>

  <div class="group">
    <span class="label">Size</span>
    <div class="size-dot"><i id="sizeDot" style="width:18px;height:18px"></i></div>
    <input type="range" id="size" min="14" max="90" value="42" />
  </div>

  <div class="group">
    <span class="label">Sky</span>
    <button class="tool active" data-sky="day" title="Day">☀️</button>
    <button class="tool" data-sky="sunset" title="Sunset">🌅</button>
    <button class="tool" data-sky="night" title="Night">🌙</button>
  </div>

  <div class="group">
    <button class="tool plane" id="planeBtn" title="Launch an airplane!">✈️</button>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById('sky');
  const ctx = canvas.getContext('2d');
  let W = 0, H = 0, DPR = 1;

  /* ---------- State ---------- */
  const state = {
    brush: 'puff',
    color: '#ffffff',
    size: 42,
    sky: 'day',
  };

  const PALETTE = ['#ffffff','#ffd6e8','#ffe0c2','#fff3b0','#c8f7d4','#bfe9ff','#e2d4ff','#ffc2c2'];

  let painted = [];          // user clouds: {blobs:[{x,y,r,color,shape,hue,bob}], vx, ox, phase}
  let activeCloud = null;
  let lastStamp = null;
  let painting = false;

  let ambient = [];          // background drifting clouds
  let stars = [];            // night stars
  let planes = [];           // airplanes
  let lastPlaneAt = 0;
  let lastAutoPlane = 0;

  /* ---------- Resize ---------- */
  function resize(){
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR,0,0,DPR,0,0);
  }
  window.addEventListener('resize', resize);
  resize();

  /* ---------- Init scene ---------- */
  function rand(a,b){return a + Math.random()*(b-a);}

  function makeAmbient(){
    ambient = [];
    const n = 7;
    for(let i=0;i<n;i++){
      const blobs=[];
      const segs = 4 + (Math.random()*4|0);
      for(let j=0;j<segs;j++){
        blobs.push({
          x: (j - segs/2) * rand(34,52) + rand(-10,10),
          y: rand(-18,18),
          r: rand(28,52)
        });
      }
      ambient.push({
        blobs,
        x: rand(0, W),
        y: rand(60, H*0.55),
        scale: rand(0.7,1.4),
        speed: rand(6,18),
        alpha: rand(0.55,0.85)
      });
    }
  }

  function makeStars(){
    stars = [];
    for(let i=0;i<110;i++){
      stars.push({
        x: rand(0,W), y: rand(0,H*0.8),
        r: rand(0.6,1.8),
        tw: rand(0,Math.PI*2),
        sp: rand(1.2,3)
      });
    }
  }

  makeAmbient();
  makeStars();
  window.addEventListener('resize', () => { makeStars(); });

  /* ---------- Sky palettes ---------- */
  const SKIES = {
    day:    { stops:[[0,'#5fb8f0'],[0.55,'#9fd8f5'],[1,'#d6f1ff']], sun:{x:0.84,y:0.18,r:60,c1:'#fff6c8',c2:'#ffd86b'}, sunGlow:'#ffe9a8' },
    sunset: { stops:[[0,'#5b6db0'],[0.4,'#ff9a8b'],[0.75,'#ffcaa0'],[1,'#ffe3c4']], sun:{x:0.5,y:0.72,r:80,c1:'#fff1c0',c2:'#ff8a5c'}, sunGlow:'#ffb98a' },
    night:  { stops:[[0,'#0a1340'],[0.5,'#172a6b'],[1,'#2c3f86']], sun:{x:0.82,y:0.2,r:48,c1:'#fdfdff',c2:'#c9d4ff'}, sunGlow:'#a9c2ff' },
  };

  function drawSky(){
    const s = SKIES[state.sky];
    const g = ctx.createLinearGradient(0,0,0,H);
    s.stops.forEach(st => g.addColorStop(st[0], st[1]));
    ctx.fillStyle = g;
    ctx.fillRect(0,0,W,H);

    // soft horizon glow at sunset
    if(state.sky === 'sunset'){
      const hg = ctx.createRadialGradient(W*0.5, H*0.72, 20, W*0.5, H*0.72, H*0.6);
      hg.addColorStop(0,'rgba(255,200,140,0.45)');
      hg.addColorStop(1,'rgba(255,200,140,0)');
      ctx.fillStyle = hg; ctx.fillRect(0,0,W,H);
    }
  }

  function drawSun(t){
    const s = SKIES[state.sky];
    const sx = W*s.sun.x, sy = H*s.sun.y, r = s.sun.r;
    // glow
    const gl = ctx.createRadialGradient(sx,sy,r*0.4,sx,sy,r*4);
    gl.addColorStop(0, hexA(s.sunGlow, state.sky==='night'?0.35:0.5));
    gl.addColorStop(1, hexA(s.sunGlow,0));
    ctx.fillStyle = gl;
    ctx.beginPath(); ctx.arc(sx,sy,r*4,0,Math.PI*2); ctx.fill();
    // body
    const bg = ctx.createRadialGradient(sx-r*0.3,sy-r*0.3,r*0.1,sx,sy,r);
    bg.addColorStop(0,s.sun.c1); bg.addColorStop(1,s.sun.c2);
    ctx.fillStyle = bg;
    ctx.beginPath(); ctx.arc(sx,sy,r,0,Math.PI*2); ctx.fill();

    if(state.sky==='night'){
      // craters
      ctx.fillStyle = 'rgba(170,190,230,0.35)';
      [[0.3,-0.1,0.22],[-0.2,0.25,0.16],[0.15,0.35,0.12]].forEach(c=>{
        ctx.beginPath(); ctx.arc(sx+c[0]*r, sy+c[1]*r, r*c[2],0,Math.PI*2); ctx.fill();
      });
    } else if (state.sky!=='sunset') {
      // gentle rays for day
      ctx.save(); ctx.translate(sx,sy); ctx.rotate(t*0.0002);
      ctx.strokeStyle = hexA('#fff3b0',0.18); ctx.lineWidth=4;
      for(let i=0;i<12;i++){
        ctx.rotate(Math.PI/6);
        ctx.beginPath(); ctx.moveTo(r+10,0); ctx.lineTo(r+30,0); ctx.stroke();
      }
      ctx.restore();
    }
  }

  function drawStars(t){
    if(state.sky!=='night') return;
    for(const st of stars){
      const a = 0.5 + 0.5*Math.sin(t*0.001*st.sp + st.tw);
      ctx.fillStyle = `rgba(255,255,255,${0.35+a*0.55})`;
      ctx.beginPath(); ctx.arc(st.x, st.y, st.r, 0, Math.PI*2); ctx.fill();
    }
  }

  /* ---------- Cloud blob rendering ---------- */
  function hexA(hex, a){
    // accept #rrggbb
    const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${a})`;
  }

  function drawPuff(x,y,r,color){
    r = Math.max(2,r);
    const g = ctx.createRadialGradient(x-r*0.25,y-r*0.25,r*0.1, x,y,r);
    g.addColorStop(0, hexA(color,0.95));
    g.addColorStop(0.55, hexA(color,0.55));
    g.addColorStop(1, hexA(color,0));
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
  }

  function drawStar(x,y,r,color){
    ctx.save(); ctx.translate(x,y);
    ctx.fillStyle = color;
    ctx.shadowColor = hexA(color,0.8); ctx.shadowBlur = r*0.6;
    ctx.beginPath();
    for(let i=0;i<10;i++){
      const ang = -Math.PI/2 + i*Math.PI/5;
      const rad = i%2===0 ? r : r*0.45;
      ctx.lineTo(Math.cos(ang)*rad, Math.sin(ang)*rad);
    }
    ctx.closePath(); ctx.fill();
    ctx.restore();
  }

  function drawHeart(x,y,r,color){
    ctx.save(); ctx.translate(x,y); ctx.scale(r/24,r/24);
    ctx.fillStyle = color;
    ctx.shadowColor = hexA(color,0.7); ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.moveTo(0,8);
    ctx.bezierCurveTo(-18,-10,-10,-26,0,-14);
    ctx.bezierCurveTo(10,-26,18,-10,0,8);
    ctx.closePath(); ctx.fill();
    ctx.restore();
  }

  function drawStamp(shape, x, y, r, color, hue){
    if(shape==='puff') drawPuff(x,y,r,color);
    else if(shape==='star') drawStar(x,y,r*0.7,color);
    else if(shape==='heart') drawHeart(x,y,r,color);
    else if(shape==='rainbow') drawPuff(x,y,r,`hsl(${hue},85%,72%)`);
  }

  /* ---------- Painted clouds (drift + wrap) ---------- */
  function blobScreen(cloud, blob){
    let bx = blob.x + cloud.ox;
    const m = 120;
    bx = ((bx + m) % (W + 2*m)); if(bx<0) bx += (W+2*m); bx -= m;
    const by = blob.y + Math.sin(cloud.phase + blob.bob)*4;
    return [bx,by];
  }

  function drawPainted(){
    for(const cloud of painted){
      for(const b of cloud.blobs){
        const [bx,by] = blobScreen(cloud,b);
        drawStamp(b.shape, bx, by, b.r, b.color, b.hue);
      }
    }
  }

  function updatePainted(dt){
    for(const cloud of painted){
      cloud.ox += cloud.vx * dt;
      cloud.phase += dt * 1.2;
    }
  }

  /* ---------- Ambient clouds ---------- */
  function drawAmbient(dt){
    for(const c of ambient){
      c.x += c.speed * dt;
      const m = 220;
      if(c.x - 160 > W) c.x = -160 - Math.random()*120;

      ctx.save();
      ctx.globalAlpha = c.alpha;
      for(const b of c.blobs){
        const bx = c.x + b.x * c.scale;
        const by = c.y + b.y * c.scale;
        drawPuff(bx, by, b.r * c.scale, '#ffffff');
      }
      ctx.restore();
    }
  }

  /* ---------- Airplanes ---------- */
  function launchPlane(){
    const fromLeft = Math.random() < 0.5;
    const y = rand(H*0.12, H*0.6);
    const speed = rand(80,140);
    planes.push({
      x: fromLeft ? -80 : W+80,
      y,
      baseY: y,
      amp: rand(8,22),
      freq: rand(0.4,0.8),
      t: 0,
      vx: fromLeft ? speed : -speed,
      prop: 0,
      trail: [],
      hue: rand(0,360)
    });
  }

  function drawPlane(p){
    // contrail
    for(let i=0;i<p.trail.length;i++){
      const tp = p.trail[i];
      const k = i/p.trail.length;
      ctx.save();
      ctx.globalAlpha = (1-k) * 0.6;
      const g = ctx.createRadialGradient(tp.x,tp.y,0,tp.x,tp.y,7-k*4);
      g.addColorStop(0,'rgba(255,255,255,0.9)');
      g.addColorStop(1,'rgba(255,255,255,0)');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(tp.x,tp.y,7-k*4,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }

    const ang = Math.atan2(Math.cos(p.t*p.freq)*p.amp*p.freq, p.vx>0?1:-1) * 0.5;
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.vx>0 ? ang : Math.PI - ang);
    const dir = 1; // drawn pointing +x, flipped via rotate for left-moving

    // body
    const bg = ctx.createLinearGradient(0,-8,0,8);
    bg.addColorStop(0,'#ffffff'); bg.addColorStop(1,'#d7e6f5');
    ctx.fillStyle = bg; ctx.strokeStyle='#b9cfe4'; ctx.lineWidth=2;
    ctx.beginPath();
    roundRect(ctx, -26, -7, 52, 14, 7); ctx.fill(); ctx.stroke();

    // nose
    ctx.fillStyle='#ff8fb1'; ctx.beginPath();
    ctx.moveTo(26,-7); ctx.lineTo(34,0); ctx.lineTo(26,7); ctx.closePath(); ctx.fill();

    // tail fin
    ctx.fillStyle='#9fd4ff'; ctx.strokeStyle='#b9cfe4';
    ctx.beginPath(); ctx.moveTo(-26,-4); ctx.lineTo(-34,-16); ctx.lineTo(-20,-4); ctx.closePath();
    ctx.fill(); ctx.stroke();

    // wings
    ctx.fillStyle='#bfe9ff';
    ctx.beginPath(); ctx.moveTo(-6,4); ctx.lineTo(4,4); ctx.lineTo(14,20); ctx.lineTo(-12,20); ctx.closePath();
    ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-6,-4); ctx.lineTo(4,-4); ctx.lineTo(14,-18); ctx.lineTo(-12,-18); ctx.closePath();
    ctx.fill(); ctx.stroke();

    // window
    ctx.fillStyle='#aee3ff';
    for(let i=0;i<3;i++){ ctx.beginPath(); ctx.arc(8-i*9,-1.5,2.2,0,Math.PI*2); ctx.fill(); }

    // propeller
    ctx.save(); ctx.translate(34,0); ctx.rotate(p.prop);
    ctx.strokeStyle='#7fb8ee'; ctx.lineWidth=2.4;
    ctx.beginPath(); ctx.moveTo(-7,0); ctx.lineTo(7,0); ctx.stroke();
    ctx.restore();
    ctx.fillStyle='#7fb8ee'; ctx.beginPath(); ctx.arc(34,0,2.2,0,Math.PI*2); ctx.fill();

    ctx.restore();
  }

  function roundRect(c,x,y,w,h,r){
    c.moveTo(x+r,y);
    c.arcTo(x+w,y,x+w,y+h,r);
    c.arcTo(x+w,y+h,x,y+h,r);
    c.arcTo(x,y+h,x,y,r);
    c.arcTo(x,y,x+w,y,r);
  }

  function updatePlanes(dt){
    for(const p of planes){
      p.t += dt;
      p.x += p.vx * dt;
      p.y = p.baseY + Math.sin(p.t*p.freq)*p.amp;
      p.prop += dt * 30;
      p.trail.push({x: p.x - Math.sign(p.vx)*30, y: p.y});
      if(p.trail.length>22) p.trail.shift();
    }
    planes = planes.filter(p => p.x > -200 && p.x < W+200);
  }

  /* ---------- Main loop ---------- */
  let last = performance.now();
  function frame(now){
    const dt = Math.min(0.05, (now-last)/1000);
    last = now;

    drawSky();
    drawStars(now);
    drawSun(now);
    drawAmbient(dt);

    updatePainted(dt);
    drawPainted();

    updatePlanes(dt);
    for(const p of planes) drawPlane(p);

    // occasional auto plane
    if(now - lastAutoPlane > 14000 && planes.length < 2){
      launchPlane(); lastAutoPlane = now;
    }

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  /* ---------- Painting input ---------- */
  function pos(e){
    const r = canvas.getBoundingClientRect();
    return { x: e.clientX - r.left, y: e.clientY - r.top };
  }

  function startStroke(e){
    if(e.target && e.target.closest && e.target.closest('.dock,.topbar,.hint')) return;
    painting = true;
    const p = pos(e);
    activeCloud = { blobs:[], vx: rand(4,12), ox: 0, phase: Math.random()*Math.PI*2 };
    painted.push(activeCloud);
    lastStamp = null;
    stamp(p.x, p.y);
    e.preventDefault();
  }

  function moveStroke(e){
    if(!painting) return;
    const p = pos(e);
    if(state.brush==='eraser'){ eraseAt(p.x,p.y); return; }
    if(lastStamp){
      const dx=p.x-lastStamp.x, dy=p.y-lastStamp.y;
      const d=Math.hypot(dx,dy);
      const step = Math.max(6, state.size*0.42);
      if(d < step) return;
      const n = Math.ceil(d/step);
      for(let i=1;i<=n;i++){
        stamp(lastStamp.x + dx*i/n, lastStamp.y + dy*i/n);
      }
    } else {
      stamp(p.x,p.y);
    }
    e.preventDefault();
  }

  function endStroke(){
    painting = false; activeCloud = null; lastStamp = null;
  }

  function stamp(x,y){
    const c = activeCloud; if(!c) return;
    const s = state.size;
    if(state.brush==='rainbow'){
      c.blobs.push({x, y, r: s*(0.85+Math.random()*0.3), color:'#ffffff', shape:'rainbow',
        hue:(performance.now()*0.2 + c.blobs.length*40)%360, bob:Math.random()*Math.PI*2});
    } else if(state.brush==='star' || state.brush==='heart'){
      c.blobs.push({x, y, r: s, color: state.color, shape: state.brush, hue:0, bob:Math.random()*Math.PI*2});
    } else { // puff
      c.blobs.push({x: x+rand(-s*0.12,s*0.12), y: y+rand(-s*0.12,s*0.12),
        r: s*(0.8+Math.random()*0.4), color: state.color, shape:'puff', hue:0, bob:Math.random()*Math.PI*2});
    }
    lastStamp = {x,y};
  }

  function eraseAt(x,y){
    const r = state.size;
    for(const cloud of painted){
      cloud.blobs = cloud.blobs.filter(b => {
        const [bx,by] = blobScreen(cloud,b);
        return Math.hypot(bx-x, by-y) > r*0.5;
      });
    }
    painted = painted.filter(c => c.blobs.length>0);
  }

  canvas.addEventListener('pointerdown', startStroke);
  window.addEventListener('pointermove', moveStroke);
  window.addEventListener('pointerup', endStroke);
  window.addEventListener('pointercancel', endStroke);

  /* ---------- UI wiring ---------- */
  // brushes
  document.querySelectorAll('.tool[data-brush]').forEach(btn=>{
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tool[data-brush]').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      state.brush = btn.dataset.brush;
      canvas.style.cursor = state.brush==='eraser' ? 'cell' : 'crosshair';
    });
  });

  // colors
  const colorsEl = document.getElementById('colors');
  PALETTE.forEach((c,i)=>{
    const sw = document.createElement('div');
    sw.className = 'swatch' + (i===0?' active':'');
    sw.style.background = c;
    sw.title = c;
    sw.addEventListener('click', () => {
      document.querySelectorAll('.swatch').forEach(s=>s.classList.remove('active'));
      sw.classList.add('active');
      state.color = c;
      // if on eraser, switch to puff
      if(state.brush==='eraser'){
        state.brush='puff';
        document.querySelectorAll('.tool[data-brush]').forEach(b=>b.classList.toggle('active', b.dataset.brush==='puff'));
      }
    });
    colorsEl.appendChild(sw);
  });

  // size
  const sizeEl = document.getElementById('size');
  const sizeDot = document.getElementById('sizeDot');
  function updateSizeDot(){
    const v = state.size;
    const d = Math.max(8, Math.min(24, v*0.32));
    sizeDot.style.width = d+'px'; sizeDot.style.height = d+'px';
  }
  sizeEl.addEventListener('input', () => { state.size = +sizeEl.value; updateSizeDot(); });
  updateSizeDot();

  // sky
  document.querySelectorAll('.tool[data-sky]').forEach(btn=>{
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tool[data-sky]').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      state.sky = btn.dataset.sky;
      makeStars();
    });
  });

  // plane
  document.getElementById('planeBtn').addEventListener('click', () => { launchPlane(); });

  // clear
  document.getElementById('clearBtn').addEventListener('click', () => { painted = []; });

  // save
  document.getElementById('saveBtn').addEventListener('click', () => {
    const link = document.createElement('a');
    link.download = 'my-cloud-sky.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  });

  // launch one plane shortly after load for delight
  setTimeout(launchPlane, 1200);
})();
</script>
</body>
</html>
