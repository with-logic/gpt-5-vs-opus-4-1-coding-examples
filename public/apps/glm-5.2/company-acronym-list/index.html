<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Company Acronym List — Internal Glossary & Quiz</title>
<style>
  :root {
    --bg: #f6f7f9;
    --surface: #ffffff;
    --surface-2: #f0f2f5;
    --border: #e3e6eb;
    --border-strong: #cdd2da;
    --text: #1b1f27;
    --text-muted: #5c6473;
    --text-faint: #8a93a4;
    --brand: #3b5bdb;
    --brand-strong: #2b46b8;
    --brand-soft: #eaf0ff;
    --accent: #0ca678;
    --accent-soft: #e6f7f1;
    --warn: #d9480f;
    --warn-soft: #fff0e8;
    --shadow-sm: 0 1px 2px rgba(20,25,40,.06), 0 1px 1px rgba(20,25,40,.04);
    --shadow-md: 0 4px 14px rgba(20,25,40,.08);
    --shadow-lg: 0 18px 50px rgba(20,25,40,.16);
    --radius: 14px;
    --radius-sm: 9px;
    --ring: 0 0 0 3px rgba(59,91,219,.28);
    font-synthesis-weight: none;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0e1117;
      --surface: #161b24;
      --surface-2: #1d2430;
      --border: #26303f;
      --border-strong: #364456;
      --text: #e7ecf3;
      --text-muted: #97a1b3;
      --text-faint: #6b7689;
      --brand: #6d8bff;
      --brand-strong: #8aa2ff;
      --brand-soft: #1c2747;
      --accent: #38d6a0;
      --accent-soft: #102c25;
      --warn: #ff7849;
      --warn-soft: #33160c;
      --shadow-sm: 0 1px 2px rgba(0,0,0,.4);
      --shadow-md: 0 6px 18px rgba(0,0,0,.45);
      --shadow-lg: 0 22px 60px rgba(0,0,0,.6);
      --ring: 0 0 0 3px rgba(109,139,255,.35);
    }
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    min-height: 100vh;
  }

  /* ---------- Layout ---------- */
  .app {
    max-width: 1040px;
    margin: 0 auto;
    padding: 28px 20px 80px;
  }

  header.top {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 22px;
  }
  .logo {
    width: 42px; height: 42px;
    border-radius: 11px;
    background: linear-gradient(135deg, var(--brand), var(--brand-strong));
    display: grid; place-items: center;
    color: #fff;
    font-weight: 800;
    font-size: 18px;
    letter-spacing: -0.5px;
    box-shadow: var(--shadow-md);
    flex-shrink: 0;
  }
  .title-block h1 {
    margin: 0;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.4px;
  }
  .title-block p {
    margin: 2px 0 0;
    color: var(--text-muted);
    font-size: 13px;
  }

  /* ---------- Mode switcher ---------- */
  .modes {
    display: inline-flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 4px;
    box-shadow: var(--shadow-sm);
    margin-left: auto;
  }
  .modes button {
    appearance: none;
    border: none;
    background: transparent;
    color: var(--text-muted);
    font: inherit;
    font-size: 13.5px;
    font-weight: 600;
    padding: 8px 16px;
    border-radius: 999px;
    cursor: pointer;
    transition: color .15s, background .15s;
    display: inline-flex;
    align-items: center;
    gap: 7px;
  }
  .modes button:hover { color: var(--text); }
  .modes button.active {
    background: var(--brand);
    color: #fff;
    box-shadow: 0 2px 8px rgba(59,91,219,.3);
  }
  .modes .ico { width: 15px; height: 15px; }

  /* ---------- Cards / panels ---------- */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
  }

  /* ---------- Search ---------- */
  .search-wrap {
    position: relative;
    margin-bottom: 16px;
  }
  .search-wrap .search-ico {
    position: absolute;
    left: 16px; top: 50%;
    transform: translateY(-50%);
    width: 18px; height: 18px;
    color: var(--text-faint);
    pointer-events: none;
  }
  #search {
    width: 100%;
    font: inherit;
    font-size: 15px;
    padding: 14px 44px 14px 46px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text);
    transition: border-color .15s, box-shadow .15s;
  }
  #search:focus {
    outline: none;
    border-color: var(--brand);
    box-shadow: var(--ring);
  }
  .clear-btn {
    position: absolute;
    right: 10px; top: 50%;
    transform: translateY(-50%);
    appearance: none;
    border: none;
    background: var(--surface-2);
    color: var(--text-muted);
    width: 26px; height: 26px;
    border-radius: 50%;
    cursor: pointer;
    display: none;
    place-items: center;
    font-size: 16px;
    line-height: 1;
  }
  .clear-btn:hover { background: var(--border-strong); color: var(--text); }
  .clear-btn.show { display: grid; }

  /* ---------- Category filter chips ---------- */
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 18px;
  }
  .chip {
    appearance: none;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    font: inherit;
    font-size: 12.5px;
    font-weight: 600;
    padding: 6px 12px;
    border-radius: 999px;
    cursor: pointer;
    transition: all .15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .chip:hover { border-color: var(--border-strong); color: var(--text); }
  .chip.active {
    background: var(--brand-soft);
    border-color: var(--brand);
    color: var(--brand-strong);
  }
  .chip .count {
    font-weight: 700;
    font-size: 11px;
    opacity: .7;
  }
  .chip .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }

  /* ---------- Result meta ---------- */
  .result-meta {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 12px;
    color: var(--text-faint);
    font-size: 12.5px;
  }
  .result-meta strong { color: var(--text); font-weight: 700; }

  /* ---------- Acronym list ---------- */
  .acronym-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
    gap: 12px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 16px 14px;
    box-shadow: var(--shadow-sm);
    transition: transform .12s ease, box-shadow .12s ease, border-color .12s;
    cursor: default;
    position: relative;
    overflow: hidden;
  }
  .card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
    border-color: var(--border-strong);
  }
  .card-head {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
  }
  .acronym-badge {
    font-weight: 800;
    font-size: 15px;
    letter-spacing: .2px;
    padding: 5px 10px;
    border-radius: 8px;
    background: var(--brand-soft);
    color: var(--brand-strong);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .acronym-name {
    font-weight: 600;
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.3;
  }
  .card-def {
    font-size: 13.5px;
    color: var(--text);
    margin: 0 0 12px;
    line-height: 1.5;
  }
  .card-foot {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .tag {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .5px;
    padding: 3px 8px;
    border-radius: 6px;
    background: var(--surface-2);
    color: var(--text-muted);
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .tag .tdot { width: 6px; height: 6px; border-radius: 50%; }
  .star {
    appearance: none;
    border: none;
    background: transparent;
    cursor: pointer;
    color: var(--text-faint);
    padding: 4px;
    border-radius: 6px;
    display: grid;
    place-items: center;
    transition: color .15s, background .15s;
  }
  .star:hover { background: var(--surface-2); color: var(--warn); }
  .star.on { color: var(--warn); }
  .star svg { width: 18px; height: 18px; }

  /* highlight matched text */
  mark {
    background: transparent;
    color: var(--brand-strong);
    font-weight: 800;
  }
  @media (prefers-color-scheme: dark) {
    mark { color: var(--brand); }
  }

  /* ---------- Empty state ---------- */
  .empty {
    text-align: center;
    padding: 50px 20px;
    color: var(--text-faint);
  }
  .empty .big-ico {
    width: 52px; height: 52px;
    margin: 0 auto 14px;
    color: var(--border-strong);
  }
  .empty h3 { margin: 0 0 6px; color: var(--text-muted); font-weight: 600; font-size: 16px; }
  .empty p { margin: 0; font-size: 13.5px; }

  /* ---------- Quiz ---------- */
  .quiz-view { display: none; }
  .quiz-view.active { display: block; }

  .quiz-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow-md);
    padding: 26px;
    max-width: 640px;
    margin: 0 auto;
  }
  .quiz-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 18px;
  }
  .quiz-stats {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .stat {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 11px;
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .stat b { color: var(--text); font-weight: 800; }
  .stat.good b { color: var(--accent); }
  .stat.bad b { color: var(--warn); }

  .progress-track {
    height: 6px;
    background: var(--surface-2);
    border-radius: 999px;
    overflow: hidden;
    margin-bottom: 22px;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--brand), var(--brand-strong));
    width: 0%;
    transition: width .35s ease;
    border-radius: 999px;
  }

  .q-prompt { color: var(--text-faint); font-size: 12.5px; font-weight: 600; text-transform: uppercase; letter-spacing: .6px; margin-bottom: 6px; }
  .q-text {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.4px;
    margin-bottom: 22px;
    line-height: 1.3;
  }

  .choices { display: grid; gap: 10px; }
  .choice {
    appearance: none;
    text-align: left;
    font: inherit;
    font-size: 14px;
    color: var(--text);
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 13px 15px;
    cursor: pointer;
    transition: all .15s;
    display: flex;
    align-items: center;
    gap: 11px;
  }
  .choice:hover:not(:disabled) {
    border-color: var(--brand);
    background: var(--brand-soft);
  }
  .choice:disabled { cursor: default; }
  .choice .key {
    width: 26px; height: 26px;
    border-radius: 7px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    display: grid; place-items: center;
    font-weight: 700; font-size: 12px;
    color: var(--text-muted);
    flex-shrink: 0;
  }
  .choice.correct {
    border-color: var(--accent);
    background: var(--accent-soft);
  }
  .choice.correct .key { background: var(--accent); color: #fff; border-color: var(--accent); }
  .choice.wrong {
    border-color: var(--warn);
    background: var(--warn-soft);
  }
  .choice.wrong .key { background: var(--warn); color: #fff; border-color: var(--warn); }

  .quiz-feedback {
    margin-top: 16px;
    padding: 13px 15px;
    border-radius: var(--radius-sm);
    font-size: 13.5px;
    display: none;
    line-height: 1.5;
  }
  .quiz-feedback.show { display: block; }
  .quiz-feedback.ok { background: var(--accent-soft); color: var(--accent); border: 1px solid var(--accent); }
  .quiz-feedback.no { background: var(--warn-soft); color: var(--warn); border: 1px solid var(--warn); }
  .quiz-feedback b { display: block; margin-bottom: 2px; font-size: 14px; }

  .quiz-actions {
    margin-top: 18px;
    display: flex;
    justify-content: flex-end;
    gap: 10px;
  }
  .btn {
    appearance: none;
    font: inherit;
    font-size: 14px;
    font-weight: 600;
    border-radius: var(--radius-sm);
    padding: 11px 20px;
    cursor: pointer;
    border: 1.5px solid transparent;
    transition: all .15s;
  }
  .btn-primary {
    background: var(--brand);
    color: #fff;
    box-shadow: 0 2px 8px rgba(59,91,219,.25);
  }
  .btn-primary:hover { background: var(--brand-strong); }
  .btn-ghost {
    background: var(--surface);
    color: var(--text-muted);
    border-color: var(--border);
  }
  .btn-ghost:hover { color: var(--text); border-color: var(--border-strong); background: var(--surface-2); }

  /* quiz result screen */
  .quiz-result {
    text-align: center;
    padding: 14px 6px 6px;
  }
  .result-score {
    font-size: 46px;
    font-weight: 800;
    letter-spacing: -1px;
    margin: 6px 0 2px;
  }
  .result-score.pct { color: var(--brand); }
  .result-sub { color: var(--text-muted); font-size: 14px; margin-bottom: 22px; }
  .result-grade {
    display: inline-block;
    padding: 4px 14px;
    border-radius: 999px;
    font-weight: 700;
    font-size: 13px;
    margin-bottom: 18px;
  }

  .quiz-config {
    display: grid;
    gap: 18px;
  }
  .config-row { display: flex; flex-direction: column; gap: 8px; }
  .config-row > label { font-size: 12.5px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; }
  .seg {
    display: inline-flex;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 3px;
    gap: 2px;
    flex-wrap: wrap;
  }
  .seg button {
    appearance: none; border: none; background: transparent;
    font: inherit; font-size: 13px; font-weight: 600;
    color: var(--text-muted);
    padding: 7px 13px; border-radius: 7px; cursor: pointer;
    transition: all .15s;
  }
  .seg button:hover { color: var(--text); }
  .seg button.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow-sm); }

  .quiz-start-hero { text-align: center; padding: 10px 0 6px; margin-bottom: 6px; }
  .quiz-start-hero .ql { width: 54px; height: 54px; margin: 0 auto 14px; color: var(--brand); }
  .quiz-start-hero h2 { margin: 0 0 6px; font-size: 21px; font-weight: 700; letter-spacing: -0.3px; }
  .quiz-start-hero p { margin: 0 0 4px; color: var(--text-muted); font-size: 14px; }

  .reveal-tag { margin-top: 10px; font-size: 12px; color: var(--text-faint); display: inline-flex; align-items: center; gap: 6px; }
  .reveal-tag .tdot { width: 6px; height: 6px; border-radius: 50%; }

  /* ---------- Hidden util ---------- */
  .hidden { display: none !important; }

  /* list view container */
  .list-view { }
  .list-view.hidden { display: none; }

  /* footer */
  footer {
    margin-top: 40px;
    text-align: center;
    color: var(--text-faint);
    font-size: 12px;
  }

  /* ---------- Responsive ---------- */
  @media (max-width: 640px) {
    .app { padding: 18px 14px 60px; }
    header.top { flex-wrap: wrap; }
    .modes { margin-left: 0; }
    .acronym-list { grid-template-columns: 1fr; }
    .q-text { font-size: 19px; }
    .quiz-card { padding: 20px 16px; }
    .result-score { font-size: 38px; }
  }

  /* motion preferences */
  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; animation: none !important; }
    .card:hover { transform: none; }
  }

  /* fade-in for list */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card { animation: fadeUp .25s ease both; }
  .card:nth-child(n+20) { animation: none; }
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <div class="logo" aria-hidden="true">CAL</div>
    <div class="title-block">
      <h1>Company Acronym List</h1>
      <p>Internal glossary &amp; knowledge quiz</p>
    </div>
    <div class="modes" role="tablist" aria-label="View mode">
      <button id="mode-list" class="active" role="tab" aria-selected="true">
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        Glossary
      </button>
      <button id="mode-quiz" role="tab" aria-selected="false">
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        Quiz
      </button>
    </div>
  </header>

  <!-- ===================== LIST VIEW ===================== -->
  <section class="list-view" id="list-view">
    <div class="search-wrap">
      <svg class="search-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="search" type="search" placeholder="Search acronyms, names, or definitions…" autocomplete="off" spellcheck="false" aria-label="Search acronyms" />
      <button class="clear-btn" id="clear-btn" aria-label="Clear search">×</button>
    </div>

    <div class="chips" id="chips" role="group" aria-label="Filter by category"></div>

    <div class="result-meta" id="result-meta"></div>

    <div class="acronym-list" id="acronym-list"></div>
  </section>

  <!-- ===================== QUIZ VIEW ===================== -->
  <section class="quiz-view" id="quiz-view">
    <div class="quiz-card" id="quiz-card"></div>
  </section>

  <footer>
    <span id="footer-count"></span> · Press <kbd>/</kbd> to search · <kbd>Q</kbd> for quiz
  </footer>
</div>

<script>
/* =========================================================
   DATA — internal company acronyms
   ========================================================= */
const CATEGORIES = {
  teams:     { label: "Teams",     color: "#3b5bdb" },
  projects:  { label: "Projects",  color: "#0ca678" },
  processes: { label: "Processes", color: "#d9480f" },
  products:  { label: "Products",  color: "#9c36b5" },
  tools:     { label: "Tools",     color: "#1c7ed6" },
  org:       { label: "Org",       color: "#e8590c" },
};

const ACRONYMS = [
  { acro: "SRE",      name: "Site Reliability Engineering", cat: "teams",     def: "Team responsible for availability, latency, performance, and incident response for production services." },
  { acro: "DS",       name: "Data Science",                 cat: "teams",     def: "Team building models, analytics pipelines, and experiments that drive product and business decisions." },
  { acro: "PE",       name: "Platform Engineering",         cat: "teams",     def: "Team that builds internal developer platforms, CI/CD, and shared infrastructure services." },
  { acro: "PM",       name: "Product Manager",              cat: "teams",     def: "Owns product strategy, roadmap, and prioritization; bridges engineering, design, and business." },
  { acro: "EM",       name: "Engineering Manager",          cat: "teams",     def: "People manager responsible for a team's delivery, health, hiring, and technical direction." },
  { acro: "UXR",      name: "User Experience Research",     cat: "teams",     def: "Researchers who run interviews, usability tests, and surveys to inform design decisions." },
  { acro: "GT",       name: "Growth Team",                  cat: "teams",     def: "Cross-functional team focused on activation, retention, and revenue experimentation." },

  { acro: "ORION",    name: "Orion Billing Platform",       cat: "projects",  def: "Multi-year initiative to unify billing, invoicing, and entitlements onto a single ledger." },
  { acro: "NEXUS",    name: "Nexus Data Warehouse",         cat: "projects",  def: "Project migrating analytics from legacy silos into a centralized, governed cloud warehouse." },
  { acro: "ATLAS",    name: "Atlas Identity Migration",     cat: "projects",  def: "Program consolidating three auth systems into one SSO with unified session management." },
  { acro: "HELIOS",   name: "Helios Mobile Rewrite",        cat: "projects",  def: "Ground-up rebuild of the mobile app on a new offline-first sync engine." },

];

/* note: "IC" appears twice (Incident Commander / Individual Contributor) — both are real usages */

/* =========================================================
   STATE
   ========================================================= */
const state = {
  mode: "list",
  query: "",
  category: "all",
  starred: new Set(JSON.parse(localStorage.getItem("cal.starred") || "[]")),
};

function saveStarred() {
  localStorage.setItem("cal.starred", JSON.stringify([...state.starred]));
}

/* =========================================================
   HELPERS
   ========================================================= */
function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
}
function highlight(text, q) {
  if (!q) return escapeHtml(text);
  const safe = escapeHtml(text);
  const qq = q.trim();
  if (!qq) return safe;
  const re = new RegExp("(" + qq.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + ")", "ig");
  return safe.replace(re, "<mark>$1</mark>");
}
function catLabel(cat) { return CATEGORIES[cat]?.label || cat; }
function catColor(cat) { return CATEGORIES[cat]?.color || "#888"; }

/* =========================================================
   LIST VIEW RENDERING
   ========================================================= */
const $list = document.getElementById("acronym-list");
const $meta = document.getElementById("result-meta");
const $chips = document.getElementById("chips");
const $search = document.getElementById("search");
const $clear = document.getElementById("clear-btn");
const $footer = document.getElementById("footer-count");

function getFiltered() {
  const q = state.query.trim().toLowerCase();
  return ACRONYMS.filter(a => {
    if (state.category !== "all" && a.cat !== state.category) return false;
    if (!q) return true;
    return (
      a.acro.toLowerCase().includes(q) ||
      a.name.toLowerCase().includes(q) ||
      a.def.toLowerCase().includes(q) ||
      catLabel(a.cat).toLowerCase().includes(q)
    );
  });
}

function renderChips() {
  const counts = { all: ACRONYMS.length };
  for (const key of Object.keys(CATEGORIES)) counts[key] = 0;
  for (const a of ACRONYMS) counts[a.cat] = (counts[a.cat] || 0) + 1;

  const order = ["all", ...Object.keys(CATEGORIES)];
  $chips.innerHTML = "";
  for (const key of order) {
    if (key !== "all" && !counts[key]) continue;
    const label = key === "all" ? "All" : CATEGORIES[key].label;
    const color = key === "all" ? null : CATEGORIES[key].color;
    const b = document.createElement("button");
    b.className = "chip" + (state.category === key ? " active" : "");
    b.innerHTML = (color ? `<span class="dot" style="background:${color}"></span>` : "") +
                  escapeHtml(label) +
                  `<span class="count">${counts[key]}</span>`;
    b.addEventListener("click", () => {
      state.category = key;
      renderChips();
      renderList();
    });
    $chips.appendChild(b);
  }
}

function starIcon(filled) {
  return filled
    ? `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 17.27 18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>`
    : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M12 17.27 18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>`;
}

function renderList() {
  const items = getFiltered();
  const q = state.query.trim();

  // sort: starred first, then alphabetical by acronym
  items.sort((a, b) => {
    const sa = state.starred.has(a.acro + "|" + a.name) ? 0 : 1;
    const sb = state.starred.has(b.acro + "|" + b.name) ? 0 : 1;
    if (sa !== sb) return sa - sb;
    return a.acro.localeCompare(b.acro);
  });

  $list.innerHTML = "";
  if (items.length === 0) {
    $list.innerHTML = `
      <div class="empty" style="grid-column:1/-1">
        <svg class="big-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <h3>No acronyms found</h3>
        <p>Try a different search term or category.</p>
      </div>`;
    $meta.innerHTML = `<span><strong>0</strong> results</span>`;
    return;
  }

  for (const a of items) {
    const id = a.acro + "|" + a.name;
    const filled = state.starred.has(id);
    const card = document.createElement("article");
    card.className = "card";
    card.innerHTML = `
      <div class="card-head">
        <span class="acronym-badge">${highlight(a.acro, q)}</span>
        <span class="acronym-name">${highlight(a.name, q)}</span>
      </div>
      <p class="card-def">${highlight(a.def, q)}</p>
      <div class="card-foot">
        <span class="tag"><span class="tdot" style="background:${catColor(a.cat)}"></span>${escapeHtml(catLabel(a.cat))}</span>
        <button class="star ${filled ? "on" : ""}" aria-label="${filled ? "Unstar" : "Star"} acronym" data-id="${escapeHtml(id)}">${starIcon(filled)}</button>
      </div>`;
    $list.appendChild(card);
  }

  // wire stars
  $list.querySelectorAll(".star").forEach(btn => {
    btn.addEventListener("click", () => {
      const id = btn.getAttribute("data-id");
      if (state.starred.has(id)) state.starred.delete(id);
      else state.starred.add(id);
      saveStarred();
      renderList();
    });
  });

  const showing = items.length;
  const total = ACRONYMS.length;
  $meta.innerHTML = `<span><strong>${showing}</strong> of ${total} acronyms${state.category !== "all" ? " in " + catLabel(state.category) : ""}</span>
    ${state.starred.size ? `<span><strong>${state.starred.size}</strong> starred</span>` : ""}`;
}

/* =========================================================
   SEARCH WIRING
   ========================================================= */
$search.addEventListener("input", () => {
  state.query = $search.value;
  $clear.classList.toggle("show", !!state.query);
  renderList();
});
$clear.addEventListener("click", () => {
  $search.value = "";
  state.query = "";
  $clear.classList.remove("show");
  $search.focus();
  renderList();
});

/* =========================================================
   QUIZ
   ========================================================= */
const $quizCard = document.getElementById("quiz-card");

const quiz = {
  state: "config", // config | playing | done
  config: { direction: "acro-to-name", length: 10, categories: new Set(["all"]) },
  pool: [],
  questions: [],
  idx: 0,
  score: 0,
  answered: false,
};

function buildPool() {
  let pool = ACRONYMS.slice();
  const cats = quiz.config.categories;
  if (!cats.has("all")) {
    pool = pool.filter(a => cats.has(a.cat));
  }
  return pool;
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function makeQuestions() {
  const pool = buildPool();
  const n = Math.min(quiz.config.length, pool.length);
  const chosen = shuffle(pool).slice(0, n);
  return chosen.map(target => {
    const distractors = shuffle(pool.filter(x => x.name !== target.name)).slice(0, 3);
    const opts = shuffle([target, ...distractors]);
    return { target, options: opts, correctIndex: opts.findIndex(o => o.name === target.name) };
  });
}

function renderQuizConfig() {
  quiz.state = "config";
  const catChips = ["all", ...Object.keys(CATEGORIES)].map(key => {
    const label = key === "all" ? "All" : CATEGORIES[key].label;
    const active = quiz.config.categories.has(key) ? "active" : "";
    return `<button data-cat="${key}" class="${active}">${escapeHtml(label)}</button>`;
  }).join("");

  const dir = quiz.config.direction;
  $quizCard.innerHTML = `
    <div class="quiz-start-hero">
      <svg class="ql" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      <h2>Test your knowledge</h2>
      <p>Multiple-choice quiz drawn from the acronym glossary.</p>
    </div>
    <div class="quiz-config">
      <div class="config-row">
        <label>Question type</label>
        <div class="seg" id="seg-dir">
          <button data-dir="acro-to-name" class="${dir === "acro-to-name" ? "active" : ""}">Acronym → Meaning</button>
          <button data-dir="name-to-acro" class="${dir === "name-to-acro" ? "active" : ""}">Meaning → Acronym</button>
        </div>
      </div>
      <div class="config-row">
        <label>Number of questions</label>
        <div class="seg" id="seg-len">
          ${[5,10,15,20].map(n => `<button data-len="${n}" class="${quiz.config.length === n ? "active" : ""}">${n}</button>`).join("")}
        </div>
      </div>
      <div class="config-row">
        <label>Categories</label>
        <div class="seg" id="seg-cat">${catChips}</div>
      </div>
    </div>
    <div class="quiz-actions" style="justify-content:center;margin-top:24px">
      <button class="btn btn-primary" id="start-quiz">Start quiz</button>
    </div>`;

  // wire segs
  $quizCard.querySelector("#seg-dir").addEventListener("click", e => {
    const b = e.target.closest("button[data-dir]");
    if (!b) return;
    quiz.config.direction = b.dataset.dir;
    renderQuizConfig();
  });
  $quizCard.querySelector("#seg-len").addEventListener("click", e => {
    const b = e.target.closest("button[data-len]");
    if (!b) return;
    quiz.config.length = parseInt(b.dataset.len, 10);
    renderQuizConfig();
  });
  $quizCard.querySelector("#seg-cat").addEventListener("click", e => {
    const b = e.target.closest("button[data-cat]");
    if (!b) return;
    const cat = b.dataset.cat;
    if (cat === "all") {
      quiz.config.categories = new Set(["all"]);
    } else {
      quiz.config.categories.delete("all");
      if (quiz.config.categories.has(cat)) quiz.config.categories.delete(cat);
      else quiz.config.categories.add(cat);
      if (quiz.config.categories.size === 0) quiz.config.categories.add("all");
    }
    renderQuizConfig();
  });
  $quizCard.querySelector("#start-quiz").addEventListener("click", startQuiz);
}

function startQuiz() {
  const pool = buildPool();
  if (pool.length < 4) {
    // need at least 4 for 4-choice questions
    alert("Select at least one category with 4 or more acronyms to start a quiz.");
    return;
  }
  quiz.questions = makeQuestions();
  if (quiz.questions.length === 0) {
    alert("Not enough acronyms to build a quiz with these settings.");
    return;
  }
  quiz.idx = 0;
  quiz.score = 0;
  quiz.answered = false;
  quiz.state = "playing";
  renderQuestion();
}

function renderQuestion() {
  const q = quiz.questions[quiz.idx];
  const total = quiz.questions.length;
  const num = quiz.idx + 1;
  quiz.answered = false;
  const isAcroToName = quiz.config.direction === "acro-to-name";

  const prompt = isAcroToName ? "What does this acronym stand for?" : "Which acronym matches this meaning?";
  const promptValue = isAcroToName ? q.target.acro : q.target.name;

  $quizCard.innerHTML = `
    <div class="quiz-top">
      <div class="quiz-stats">
        <span class="stat">Q <b>${num}</b>/${total}</span>
        <span class="stat good">Correct <b>${quiz.score}</b></span>
      </div>
    </div>
    <div class="progress-track"><div class="progress-fill" style="width:${((num - 1) / total) * 100}%"></div></div>
    <div class="q-prompt">${prompt}</div>
    <div class="q-text">${escapeHtml(promptValue)}</div>
    <div class="choices" id="choices">
      ${q.options.map((o, i) => {
        const label = isAcroToName ? o.name : o.acro;
        const key = String.fromCharCode(65 + i);
        return `<button class="choice" data-i="${i}"><span class="key">${key}</span><span>${escapeHtml(label)}</span></button>`;
      }).join("")}
    </div>
    <div class="quiz-feedback" id="feedback"></div>
    <div class="quiz-actions">
      <button class="btn btn-ghost" id="quit-quiz">Quit</button>
      <button class="btn btn-primary" id="next-q" disabled>Next →</button>
    </div>`;

  const $choices = $quizCard.querySelector("#choices");
  const $fb = $quizCard.querySelector("#feedback");
  const $next = $quizCard.querySelector("#next-q");

  $choices.querySelectorAll(".choice").forEach(btn => {
    btn.addEventListener("click", () => {
      if (quiz.answered) return;
      quiz.answered = true;
      const chosen = parseInt(btn.dataset.i, 10);
      const correct = q.correctIndex;
      const isCorrect = chosen === correct;

      $choices.querySelectorAll(".choice").forEach((b, i) => {
        b.disabled = true;
        if (i === correct) b.classList.add("correct");
        else if (i === chosen) b.classList.add("wrong");
      });

      if (isCorrect) {
        quiz.score++;
        $fb.className = "quiz-feedback ok show";
        $fb.innerHTML = `<b>Correct!</b>${escapeHtml(q.target.acro)} — ${escapeHtml(q.target.name)}`;
      } else {
        const picked = q.options[chosen];
        const pickedLabel = isAcroToName ? picked.name : picked.acro;
        $fb.className = "quiz-feedback no show";
        $fb.innerHTML = `<b>Not quite.</b> The answer was <strong>${escapeHtml(q.target.name)}</strong>. You picked ${escapeHtml(pickedLabel)}.`;
      }
      $next.disabled = false;
      $next.focus();

      // update score badge live
      $quizCard.querySelector(".stat.good b").textContent = quiz.score;
    });
  });

  $next.addEventListener("click", () => {
    if (quiz.idx + 1 < quiz.questions.length) {
      quiz.idx++;
      renderQuestion();
    } else {
      renderQuizResult();
    }
  });
  $quizCard.querySelector("#quit-quiz").addEventListener("click", () => {
    if (confirm("Quit this quiz? Your progress will be lost.")) {
      setMode("list");
    }
  });

  // keyboard: 1-4 / A-D to answer, Enter for next
  $quizCard.tabIndex = -1;
  $quizCard.focus();
}

function renderQuizResult() {
  quiz.state = "done";
  const total = quiz.questions.length;
  const score = quiz.score;
  const pct = Math.round((score / total) * 100);
  let grade, gradeBg, gradeColor, msg;
  if (pct === 100) { grade = "Perfect"; gradeColor = "#0ca678"; gradeBg = "var(--accent-soft)"; msg = "Flawless. You know the glossary cold."; }
  else if (pct >= 80) { grade = "Great"; gradeColor = "#0ca678"; gradeBg = "var(--accent-soft)"; msg = "Strong recall — just a few gaps."; }
  else if (pct >= 60) { grade = "Good"; gradeColor = "#3b5bdb"; gradeBg = "var(--brand-soft)"; msg = "Solid foundation. Review the misses below."; }
  else if (pct >= 40) { grade = "Fair"; gradeColor = "#d9480f"; gradeBg = "var(--warn-soft)"; msg = "Getting there — spend more time in the glossary."; }
  else { grade = "Keep going"; gradeColor = "#d9480f"; gradeBg = "var(--warn-soft)"; msg = "Revisit the glossary, then try again."; }

  $quizCard.innerHTML = `
    <div class="quiz-result">
      <div class="result-grade" style="background:${gradeBg};color:${gradeColor}">${grade}</div>
      <div class="result-score pct">${pct}%</div>
      <div class="result-sub">${score} of ${total} correct · ${msg}</div>
      <div class="quiz-actions" style="justify-content:center;margin-bottom:10px">
        <button class="btn btn-ghost" id="back-glossary">Back to glossary</button>
        <button class="btn btn-primary" id="retry-quiz">Try again</button>
      </div>
    </div>`;

  $quizCard.querySelector("#retry-quiz").addEventListener("click", () => {
    startQuiz();
  });
  $quizCard.querySelector("#back-glossary").addEventListener("click", () => setMode("list"));
}

/* =========================================================
   MODE SWITCHING
   ========================================================= */
const $listView = document.getElementById("list-view");
const $quizView = document.getElementById("quiz-view");
const $modeList = document.getElementById("mode-list");
const $modeQuiz = document.getElementById("mode-quiz");

function setMode(mode) {
  state.mode = mode;
  const isQuiz = mode === "quiz";
  $modeList.classList.toggle("active", !isQuiz);
  $modeQuiz.classList.toggle("active", isQuiz);
  $modeList.setAttribute("aria-selected", String(!isQuiz));
  $modeQuiz.setAttribute("aria-selected", String(isQuiz));
  $listView.classList.toggle("hidden", isQuiz);
  $quizView.classList.toggle("active", isQuiz);

  if (isQuiz && quiz.state === "config") {
    renderQuizConfig();
  }
}
$modeList.addEventListener("click", () => setMode("list"));
$modeQuiz.addEventListener("click", () => setMode("quiz"));

/* =========================================================
   KEYBOARD SHORTCUTS
   ========================================================= */
document.addEventListener("keydown", e => {
  const tag = (e.target.tagName || "").toLowerCase();
  const typing = tag === "input" || tag === "textarea" || e.target.isContentEditable;

  if (e.key === "/" && !typing) {
    e.preventDefault();
    setMode("list");
    $search.focus();
  } else if (e.key.toLowerCase() === "q" && !typing) {
    e.preventDefault();
    setMode("quiz");
  } else if (e.key === "Escape" && document.activeElement === $search) {
    $search.blur();
  }

  // quiz keyboard answering
  if (state.mode === "quiz" && quiz.state === "playing" && !typing) {
    const map = { "1":0,"2":1,"3":2,"4":3,"a":0,"b":1,"c":2,"d":3 };
    const k = e.key.toLowerCase();
    if (map[k] !== undefined && !quiz.answered) {
      const btns = $quizCard.querySelectorAll(".choice");
      if (btns[map[k]]) btns[map[k]].click();
    } else if (e.key === "Enter" && quiz.answered) {
      $quizCard.querySelector("#next-q")?.click();
    }
  }
});

/* =========================================================
   INIT
   ========================================================= */
function init() {
  $footer.textContent = `${ACRONYMS.length} acronyms across ${Object.keys(CATEGORIES).length} categories`;
  renderChips();
  renderList();
  setMode("list");
}
init();
</script>
