<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tea Dunkability Simulator</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin integrity="sha384-gTGxhz21lVGYNMcdJOyq01Edg0jhn/c22nsx0kyqP0TxaV5WVdsSH1fSDUf5YJj1" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.7/babel.min.js" integrity="sha384-ezQ6HS3FLspd9te19o2McUV6FAK091+GG7KO54f/R8DKgCDi7fULhapNrd5LY+vG" crossorigin="anonymous"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg0:#0a0d14;
    --bg1:#111726;
    --tea:#c9772f;
    --tea-deep:#7a3d12;
    --cream:#f4e4c1;
    --accent:#f6b04a;
    --accent2:#e8743b;
    --glass:rgba(255,255,255,0.045);
    --glass-brd:rgba(255,255,255,0.10);
    --text:#eef2f8;
    --muted:#8b97ad;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg0);color:var(--text);font-family:'Inter',system-ui,sans-serif;overflow-x:hidden}
  body{
    min-height:100vh;
    background:
      radial-gradient(1200px 700px at 80% -10%, rgba(246,176,74,0.10), transparent 60%),
      radial-gradient(900px 600px at -10% 110%, rgba(232,116,59,0.10), transparent 55%),
      radial-gradient(700px 500px at 50% 50%, rgba(80,120,200,0.05), transparent 60%),
      linear-gradient(180deg,#0a0d14 0%,#0b1019 40%,#0a0d14 100%);
  }
  .font-display{font-family:'Fraunces',serif;font-optical-sizing:auto}
  .font-mono{font-family:'JetBrains Mono',monospace}

  .glass{
    background:linear-gradient(160deg,rgba(255,255,255,0.06),rgba(255,255,255,0.02));
    border:1px solid var(--glass-brd);
    backdrop-filter:blur(14px) saturate(140%);
    -webkit-backdrop-filter:blur(14px) saturate(140%);
    box-shadow:0 20px 50px -25px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.08);
    border-radius:22px;
  }
  .glass-soft{
    background:linear-gradient(160deg,rgba(255,255,255,0.04),rgba(255,255,255,0.012));
    border:1px solid rgba(255,255,255,0.07);
    border-radius:16px;
  }

  /* Custom range sliders */
  input[type=range]{
    -webkit-appearance:none;appearance:none;width:100%;height:6px;border-radius:999px;
    background:linear-gradient(90deg,var(--accent) 0%,var(--accent) var(--p,50%),rgba(255,255,255,0.10) var(--p,50%),rgba(255,255,255,0.10) 100%);
    outline:none;cursor:pointer;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;appearance:none;width:20px;height:20px;border-radius:50%;
    background:radial-gradient(circle at 30% 30%,#fff,#f6b04a);
    border:2px solid rgba(0,0,0,0.4);
    box-shadow:0 4px 12px rgba(246,176,74,0.5),0 0 0 4px rgba(246,176,74,0.10);
    transition:transform .15s ease, box-shadow .15s ease;
  }
  input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.15);box-shadow:0 4px 16px rgba(246,176,74,0.7),0 0 0 6px rgba(246,176,74,0.16)}
  input[type=range]::-webkit-slider-thumb:active{transform:scale(1.05)}
  input[type=range]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:#f6b04a;border:2px solid rgba(0,0,0,0.4);box-shadow:0 4px 12px rgba(246,176,74,0.5)}

  /* Steam */
  @keyframes steamRise{
    0%{transform:translateY(0) translateX(0) scale(0.6);opacity:0}
    15%{opacity:0.55}
    50%{transform:translateY(-60px) translateX(8px) scale(1.1);opacity:0.4}
    100%{transform:translateY(-130px) translateX(-6px) scale(1.6);opacity:0}
  }
  .steam{position:absolute;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,0.55),rgba(255,255,255,0));filter:blur(6px);animation:steamRise linear infinite;pointer-events:none}

  /* Tea surface shimmer */
  @keyframes shimmer{0%{transform:translateX(-30%)}100%{transform:translateX(30%)}}
  .tea-shimmer{animation:shimmer 4s ease-in-out infinite alternate}

  /* Biscuit dunk */
  @keyframes dipBob{0%,100%{transform:translateY(var(--dipY,40px))}50%{transform:translateY(calc(var(--dipY,40px) - 4px))}}

  /* Crumb fall */
  @keyframes crumbFall{
    0%{transform:translate(0,0) rotate(0deg);opacity:1}
    70%{opacity:1}
    100%{transform:translate(var(--cx,20px),120px) rotate(var(--cr,420deg));opacity:0}
  }
  .crumb{position:absolute;width:7px;height:7px;border-radius:2px;background:linear-gradient(135deg,#d9a86a,#8a5a2b);box-shadow:0 1px 2px rgba(0,0,0,0.5);animation:crumbFall 1.6s cubic-bezier(.4,.1,.7,1) forwards;pointer-events:none}

  /* Splash */
  @keyframes splashRing{0%{transform:scale(0.3);opacity:0.7}100%{transform:scale(1.6);opacity:0}}
  .splash{position:absolute;border:2px solid rgba(246,176,74,0.6);border-radius:50%;animation:splashRing 0.9s ease-out forwards;pointer-events:none}

  /* Danger pulse */
  @keyframes dangerPulse{0%,100%{box-shadow:0 0 0 0 rgba(232,80,40,0.0)}50%{box-shadow:0 0 0 8px rgba(232,80,40,0.18)}}
  .danger{animation:dangerPulse 1s ease-in-out infinite}

  .kbd{
    font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:700;
    padding:2px 7px;border-radius:6px;
    background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.14);
    border-bottom-width:2px;color:#eef2f8;min-width:22px;display:inline-block;text-align:center;
  }

  .reveal{opacity:0;transform:translateY(14px);animation:rv .7s cubic-bezier(.2,.7,.2,1) forwards}
  @keyframes rv{to{opacity:1;transform:none}}

  .scroll-hide::-webkit-scrollbar{display:none}
  .scroll-hide{scrollbar-width:none}

  @keyframes wobble{0%,100%{transform:rotate(-1deg)}50%{transform:rotate(1deg)}}
  .wobble{animation:wobble 2.4s ease-in-out infinite}

  @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  .floaty{animation:floaty 5s ease-in-out infinite}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel-src" id="app-source">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

/* ---------------- Biscuit catalogue ---------------- */
const BISCUITS = [
  { id:'richtea',  name:'Rich Tea',       strength:0.34, absorb:0.55, crunch:'Crisp & stoic',     color:'#e8c98c', edge:'#c79a52', desc:'The diplomat. Low absorb, high nerve. Made for long dunks.' },
  { id:'digestive',name:'Digestive',      strength:0.52, absorb:0.78, crunch:'Crumbly comfort',   color:'#c79a5b', edge:'#8a5a2b', desc:'Sweet, sandy, structurally ambitious. A middle path.' },
  { id:'hobnob',   name:'Hobnob',         strength:0.66, absorb:0.72, crunch:'Oaty resilience',   color:'#b07a3e', edge:'#6f451f', desc:'The oat armor. Survives where others surrender.' },
  { id:'custard',  name:'Custard Cream',  strength:0.42, absorb:0.68, crunch:'Cream-layered risk',color:'#f0d28a', edge:'#d2a44e', desc:'Two biscuits, one agenda, one fault line.' },
  { id:'choc',     name:'Chocolate Digestive', strength:0.58, absorb:0.70, crunch:'Sealed coating', color:'#6b4226', edge:'#3d2414', desc:'The choc side is a raincoat. Flip at your peril.' },
  { id:'florentine',name:'Florentine',    strength:0.30, absorb:0.85, crunch:'Caramel chaos',     color:'#c88a3a', edge:'#7a4a18', desc:'Absorbs tea like a sponge. Tragic, delicious.' },
];

/* ---------------- Physics model ----------------
   Returns instantaneous structural integrity 0..1 over dunk time.
   hotter tea + longer dunk + higher absorb => faster collapse. */
function integrityCurve(t, { temp, biscuit, baseIntegrity }) {
  // t in seconds (0..maxDunk)
  const tempFactor = 0.25 + (temp / 100) * 1.35;     // 0.25 .. 1.6
  const decayK = biscuit.absorb * tempFactor * 0.42; // per second
  // initial integrity slider sets starting structural strength
  const I0 = baseIntegrity * 0.65 + 0.35 * biscuit.strength;
  const I = I0 * Math.exp(-decayK * t) - (biscuit.absorb * 0.04 * t);
  return Math.max(0, Math.min(1, I));
}
function optimalDunk({ temp, biscuit, baseIntegrity }) {
  // find t where integrity drops to ~ "perfect soften" band (0.55..0.45)
  const target = 0.5;
  let best = 0, bestErr = 99;
  for (let t=0; t<=12; t+=0.05){
    const I = integrityCurve(t,{temp,biscuit,baseIntegrity});
    const err = Math.abs(I - target) + (t>0?0:1);
    if (I < 0.92 && err < bestErr){ bestErr = err; best = t; }
  }
  return Math.max(0.4, best);
}
function dunkScore(integrityAtOpt, duration, opt){
  // sweet spot: dunk near optimal time, integrity in the 0.4-0.6 band
  const timeErr = Math.abs(duration - opt);
  const timeScore = Math.exp(-(timeErr*timeErr)/6);
  const band = integrityAtOpt;
  const bandScore = band < 0.15 ? 0.1 : (band > 0.85 ? 0.4 : 1 - Math.abs(band-0.5)*1.4);
  const survival = band > 0.1 ? 1 : 0;
  return Math.round(Math.max(0,Math.min(100, (timeScore*55 + bandScore*35 + survival*10))));
}
function verdict(score, broken){
  if (broken) return { label:'Catastrophic Structural Failure', tone:'bad', sub:'The biscuit is now one with the tea. A moment of silence.' };
  if (score >= 88) return { label:'Sublime Dunk', tone:'great', sub:'Peak softening. Texture nirvana. The biscuit held.' };
  if (score >= 72) return { label:'Excellent Dunk', tone:'good', sub:'Beautifully yielding. Honour the craft.' };
  if (score >= 55) return { label:'Solid Dunk', tone:'good', sub:'Soft enough, intact enough. A respectable showing.' };
  if (score >= 38) return { label:'Underdeveloped', tone:'mid', sub:'Too brief or too cool. The core still resists.' };
  if (score >= 20) return { label:'Soggy Regrets', tone:'mid', sub:'Limp, defeated, drifting. Eat it anyway.' };
  return { label:'Biscuit Soup', tone:'bad', sub:'You have made a broth. Reflect on your choices.' };
}

/* ---------------- Icons (tiny inline SVGs) ---------------- */
const Ico = ({ name, className }) => {
  const p = { width:18, height:18, viewBox:'0 0 24 24', fill:'none', stroke:'currentColor', strokeWidth:1.8, strokeLinecap:'round', strokeLinejoin:'round' };
  const paths = {
    thermo:<><path d="M14 14.76V5a2 2 0 1 0-4 0v9.76a4 4 0 1 0 4 0Z"/><path d="M12 9v6"/></>,
    clock:<><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></>,
    cookie:<><circle cx="12" cy="12" r="9"/><circle cx="9" cy="9" r="1"/><circle cx="15" cy="11" r="1"/><circle cx="11" cy="15" r="1"/></>,
    shield:<><path d="M12 3l7 3v6c0 4-3 7-7 9-4-2-7-5-7-9V6l7-3Z"/></>,
    key:<><rect x="3" y="9" width="18" height="6" rx="1"/><path d="M7 9V7M11 9V7M15 9V7"/></>,
  };
  return <svg {...p} className={className}>{paths[name]}</svg>;
};

/* ---------------- Slider component ---------------- */
function Slider({ label, icon, value, min, max, step, unit, onChange, fmt, accent }) {
  const pct = ((value-min)/(max-min))*100;
  return (
    <div className="px-1">
      <div className="flex items-center justify-between mb-2">
        <div className="flex items-center gap-2 text-[13px] font-medium text-[var(--muted)]">
          <span className="text-[var(--accent)]">{icon}</span>
          {label}
        </div>
        <div className="font-mono text-sm font-bold text-white tabular-nums">
          {fmt ? fmt(value) : value}{unit}
        </div>
      </div>
      <input
        type="range" min={min} max={max} step={step} value={value}
        style={{ ['--p']: pct+'%' }}
        onChange={e => onChange(parseFloat(e.target.value))}
      />
    </div>
  );
}

/* ---------------- The Teacup scene ---------------- */
function Teacup({ phase, dunkProgress, integrity, broken, biscuit, crumbBurst, splashKey }) {
  // dunkProgress 0..1 controls biscuit vertical position.
  // 0 = hovering above cup (held by fingers); 1 = fully submerged.
  const dipY = -54 + dunkProgress * 108; // px
  const biscuitOpacity = broken ? 0.0 : 1;
  // waterline on the biscuit (tea surface sits at y=104 in cup coords)
  const teaY = 104;
  const wly = Math.max(82, Math.min(140, teaY - dipY));
  const touchesTea = (140 + dipY) > teaY;

  // steam count scales with temp implicitly via parent; here keep 5 streams
  const steams = [0,1,2,3,4];
  const crumbs = crumbBurst || [];
  const teaColor = `hsl(${30 - dunkProgress*4} 70% ${38 - dunkProgress*4}%)`;

  return (
    <div className="relative w-full h-full flex items-end justify-center pb-6 select-none">
      {/* steam */}
      <div className="absolute left-1/2 top-6 -translate-x-1/2 w-40 h-40 pointer-events-none">
        {steams.map(i=>(
          <div key={i} className="steam"
            style={{
              left: (40 + i*14) + 'px',
              bottom: (10 + (i%2)*8) + 'px',
              width:(22+i*5)+'px', height:(22+i*5)+'px',
              animationDuration:(3.2 + i*0.5)+'s',
              animationDelay:(i*0.6)+'s',
            }}
          />
        ))}
      </div>

      {/* splash rings */}
      {splashKey>0 && (
        <>
          <div key={'s'+splashKey} className="splash" style={{left:'50%',top:'52%',width:60,height:18,transform:'translate(-50%,-50%)'}}/>
          <div key={'s2'+splashKey} className="splash" style={{left:'50%',top:'52%',width:90,height:26,transform:'translate(-50%,-50%)',animationDelay:'0.15s'}}/>
        </>
      )}

      {/* cup SVG */}
      <svg viewBox="0 0 320 280" className="w-full max-w-[360px] floaty" style={{filter:'drop-shadow(0 30px 30px rgba(0,0,0,0.55))'}}>
        <defs>
          <linearGradient id="cupG" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stopColor="#f4e4c1"/>
            <stop offset="0.5" stopColor="#d9c39a"/>
            <stop offset="1" stopColor="#a07a4a"/>
          </linearGradient>
          <linearGradient id="teaG" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stopColor="#d68a3c"/>
            <stop offset="1" stopColor="#6e3411"/>
          </linearGradient>
          <linearGradient id="bisG" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stopColor={biscuit.color}/>
            <stop offset="1" stopColor={biscuit.edge}/>
          </linearGradient>
          <clipPath id="cupClip">
            <path d="M70 70 L250 70 L232 250 Q230 268 210 268 L110 268 Q90 268 88 250 Z"/>
          </clipPath>
        </defs>

        {/* saucer */}
        <ellipse cx="160" cy="272" rx="120" ry="14" fill="rgba(0,0,0,0.35)"/>
        <ellipse cx="160" cy="268" rx="116" ry="12" fill="url(#cupG)" opacity="0.9"/>
        <ellipse cx="160" cy="266" rx="92" ry="8" fill="rgba(0,0,0,0.18)"/>

        {/* handle */}
        <path d="M250 110 q42 6 42 44 q0 38 -42 44" fill="none" stroke="url(#cupG)" strokeWidth="16" strokeLinecap="round"/>
        <path d="M250 116 q34 6 34 38 q0 32 -34 38" fill="none" stroke="rgba(0,0,0,0.25)" strokeWidth="6" strokeLinecap="round"/>

        {/* cup body */}
        <path d="M70 70 L250 70 L232 250 Q230 268 210 268 L110 268 Q90 268 88 250 Z" fill="url(#cupG)"/>
        {/* inner shadow */}
        <path d="M82 78 L238 78 L222 246 Q220 260 206 260 L114 260 Q100 260 98 246 Z" fill="rgba(0,0,0,0.28)"/>

        {/* biscuit — drawn UNCLIPPED so it's visible held above the cup at idle */}
        <g style={{ opacity: biscuitOpacity, transition:'opacity .25s' }}>
          <g style={{ transform:`translateY(${dipY}px)`, transition:'transform .1s linear', transformOrigin:'160px 110px' }}>
            {/* fingers holding the biscuit */}
            <rect x="146" y="44" width="10" height="40" rx="4" fill="#f0c9a0"/>
            <rect x="164" y="44" width="10" height="40" rx="4" fill="#f0c9a0"/>
            {/* biscuit body */}
            <rect x="138" y="82" width="44" height="58" rx="6" fill="url(#bisG)" stroke={biscuit.edge} strokeWidth="1.5"/>
            {/* dotted texture */}
            {[[148,94],[160,94],[172,94],[148,108],[172,108],[148,122],[160,122],[172,122]].map(([x,y],i)=>(
              <circle key={i} cx={x} cy={y} r="1.6" fill={biscuit.edge} opacity="0.6"/>
            ))}
            {/* logo swirl */}
            <path d="M152 112 q8 -6 16 0 q8 6 0 12 q-8 6 -16 0" fill="none" stroke={biscuit.edge} strokeWidth="1.2" opacity="0.5"/>
            {/* wet line where tea meets biscuit */}
            <rect x="138" y={wly} width="44" height="3" fill="rgba(60,30,10,0.6)" opacity={touchesTea?0.9:0}/>
          </g>
        </g>

        {/* tea — drawn ON TOP, clipped to cup interior, so the submerged part
            of the biscuit appears tinted under the brew */}
        <g clipPath="url(#cupClip)">
          <rect x="80" y="100" width="160" height="170" fill="url(#teaG)" opacity="0.86"/>
          {/* tea surface ellipse */}
          <ellipse cx="160" cy="104" rx="80" ry="12" fill={teaColor}/>
          <ellipse cx="160" cy="102" rx="80" ry="10" fill="none" stroke="rgba(255,220,170,0.4)" strokeWidth="2"/>
          {/* shimmer */}
          <ellipse cx="150" cy="102" rx="40" ry="5" fill="rgba(255,240,210,0.25)" className="tea-shimmer"/>
        </g>

        {/* rim highlight */}
        <ellipse cx="160" cy="70" rx="90" ry="10" fill="none" stroke="rgba(255,255,255,0.4)" strokeWidth="2"/>
        <ellipse cx="160" cy="70" rx="80" ry="7" fill="rgba(0,0,0,0.45)"/>
      </svg>

      {/* floating crumbs (over the cup, in screen space) */}
      <div className="absolute left-1/2 top-[44%] pointer-events-none">
        {crumbs.map(c=>(
          <div key={c.id} className="crumb"
            style={{
              left:c.x+'px', top:c.y+'px',
              ['--cx']:(c.dx)+'px', ['--cr']:(c.rot)+'deg',
              width:c.s+'px', height:c.s+'px',
              animationDuration:c.dur+'s',
            }}/>
        ))}
      </div>

      {/* status badge */}
      <div className="absolute top-3 right-3 px-3 py-1.5 rounded-full text-[11px] font-semibold tracking-wide"
        style={{
          background: phase==='dunking' ? 'rgba(246,176,74,0.18)' : phase==='broken' ? 'rgba(232,80,40,0.18)' : 'rgba(255,255,255,0.05)',
          color: phase==='dunking' ? '#f6b04a' : phase==='broken' ? '#ff7a5c' : '#8b97ad',
          border:`1px solid ${phase==='dunking'?'rgba(246,176,74,0.35)':phase==='broken'?'rgba(232,80,40,0.4)':'rgba(255,255,255,0.10)'}`,
        }}>
        {phase==='idle' && 'READY'}
        {phase==='dunking' && 'DUNKING…'}
        {phase==='done' && 'RESULT'}
        {phase==='broken' && 'BROKEN'}
      </div>
    </div>
  );
}

/* ---------------- Crumble-o-meter graph ---------------- */
function CrumbleGraph({ curve, cursor, opt, maxDunk, sim }) {
  const W=520,H=200,P=18;
  const x = t => P + (t/maxDunk)*(W-2*P);
  const y = I => H-P - I*(H-2*P);
  const path = curve.map((I,i)=> (i?'L':'M') + x(i*0.1).toFixed(1)+' '+y(I).toFixed(1)).join(' ');
  const area = path + ` L ${x((curve.length-1)*0.1)} ${H-P} L ${x(0)} ${H-P} Z`;

  return (
    <div className="relative">
      <svg viewBox={`0 0 ${W} ${H}`} className="w-full">
        <defs>
          <linearGradient id="cArea" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stopColor="#f6b04a" stopOpacity="0.45"/>
            <stop offset="1" stopColor="#f6b04a" stopOpacity="0.02"/>
          </linearGradient>
          <linearGradient id="cLine" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0" stopColor="#f6b04a"/>
            <stop offset="1" stopColor="#e8743b"/>
          </linearGradient>
        </defs>
        {/* grid */}
        {[0,0.25,0.5,0.75,1].map(g=>(
          <g key={g}>
            <line x1={P} y1={y(g)} x2={W-P} y2={y(g)} stroke="rgba(255,255,255,0.07)" strokeDasharray="3 4"/>
            <text x={4} y={y(g)+3} fontSize="9" fill="#5b6678" fontFamily="JetBrains Mono">{Math.round(g*100)}</text>
          </g>
        ))}
        {/* danger zone */}
        <rect x={P} y={y(0.2)} width={W-2*P} height={y(0)-y(0.2)} fill="rgba(232,80,40,0.10)"/>
        <text x={W-P-4} y={y(0.08)} textAnchor="end" fontSize="9" fill="#c4624a" fontFamily="JetBrains Mono">FRACTURE ZONE</text>
        {/* sweet band */}
        <rect x={P} y={y(0.6)} width={W-2*P} height={y(0.4)-y(0.6)} fill="rgba(80,200,140,0.10)"/>
        <text x={P+4} y={y(0.52)} fontSize="9" fill="#5fbf90" fontFamily="JetBrains Mono">SWEET SPOT</text>

        {/* optimal marker */}
        <line x1={x(opt)} y1={P} x2={x(opt)} y2={H-P} stroke="rgba(95,191,144,0.6)" strokeDasharray="4 4"/>
        <text x={x(opt)+4} y={P+10} fontSize="9" fill="#5fbf90" fontFamily="JetBrains Mono">opt {opt.toFixed(1)}s</text>

        {/* curve */}
        <path d={area} fill="url(#cArea)"/>
        <path d={path} fill="none" stroke="url(#cLine)" strokeWidth="2.5" strokeLinecap="round"/>

        {/* cursor */}
        {cursor>=0 && (
          <>
            <line x1={x(cursor)} y1={P} x2={x(cursor)} y2={H-P} stroke="rgba(255,255,255,0.35)"/>
            <circle cx={x(cursor)} cy={y(integrityCurve(cursor, sim))} r="5" fill="#fff" stroke="#f6b04a" strokeWidth="2"/>
          </>
        )}
        {/* x axis labels */}
        <text x={P} y={H-3} fontSize="9" fill="#5b6678" fontFamily="JetBrains Mono">0s</text>
        <text x={W-P} y={H-3} textAnchor="end" fontSize="9" fill="#5b6678" fontFamily="JetBrains Mono">{maxDunk}s · dunk time</text>
      </svg>
    </div>
  );
}

/* ---------------- Main App ---------------- */
function App(){
  const [temp,setTemp] = useState(72);          // °C
  const [duration,setDuration] = useState(3.0); // seconds
  const [biscuitIdx,setBiscuitIdx] = useState(1);
  const [integ,setInteg] = useState(0.7);       // 0..1 structural integrity
  const maxDunk = 12;

  const biscuit = BISCUITS[biscuitIdx];
  const sim = useMemo(()=>({ temp, biscuit, baseIntegrity:integ }),[temp,biscuit,integ]);

  const opt = useMemo(()=>optimalDunk(sim),[sim]);
  const curve = useMemo(()=>{
    const arr=[];
    for(let t=0;t<=maxDunk;t+=0.1) arr.push(integrityCurve(t,sim));
    return arr;
  },[sim]);

  // dunk state machine
  const [phase,setPhase] = useState('idle'); // idle | dunking | done | broken
  const [elapsed,setElapsed] = useState(0);
  const [dunkProg,setDunkProg] = useState(0); // visual 0..1
  const [broken,setBroken] = useState(false);
  const [crumbs,setCrumbs] = useState([]);
  const [splashKey,setSplashKey] = useState(0);
  const [score,setScore] = useState(null);
  const rafRef = useRef(null);
  const startRef = useRef(0);
  const crumbId = useRef(0);

  const reset = useCallback((keepPhase=false)=>{
    cancelAnimationFrame(rafRef.current);
    setPhase('idle'); setElapsed(0); setDunkProg(0); setBroken(false);
    setCrumbs([]); setScore(null);
    if(!keepPhase){ /* no-op */ }
  },[]);

  const spawnCrumbs = useCallback((n)=>{
    const arr=[];
    for(let i=0;i<n;i++){
      arr.push({
        id: crumbId.current++,
        x: (Math.random()*70-35),
        y: (Math.random()*10-5),
        dx: (Math.random()*120-60),
        rot: (Math.random()*900-450),
        s: 4+Math.random()*7,
        dur: 1.2+Math.random()*1.0,
      });
    }
    setCrumbs(arr);
    setTimeout(()=>setCrumbs([]), 2400);
  },[]);

  const startDunk = useCallback(()=>{
    if(phase==='dunking') return;
    cancelAnimationFrame(rafRef.current);
    setBroken(false); setCrumbs([]); setScore(null);
    setPhase('dunking'); setDunkProg(0); setElapsed(0);
    setSplashKey(k=>k+1);
    startRef.current = performance.now();
    let broke = false; // local flag, immune to stale closure state
    const tick = (now)=>{
      const e = (now - startRef.current)/1000; // seconds elapsed
      const dur = duration;
      const t = Math.min(e, dur);
      setElapsed(t);
      // visual dip: ease in then hold
      const dp = Math.min(1, e/0.6);
      setDunkProg(dp);
      const I = integrityCurve(t, sim);
      // break mid-dunk if integrity collapses
      if(I < 0.08 && !broke){
        broke = true;
        setBroken(true);
        setPhase('broken');
        spawnCrumbs(26);
        setSplashKey(k=>k+1);
        setScore(0);
      }
      if(e >= dur){
        if(!broke){
          const finalI = integrityCurve(dur, sim);
          const sc = dunkScore(finalI, dur, opt);
          setScore(sc);
          setPhase('done');
          if(finalI < 0.18){ spawnCrumbs(14); setSplashKey(k=>k+1); }
        }
        setDunkProg(1);
        return; // stop
      }
      rafRef.current = requestAnimationFrame(tick);
    };
    rafRef.current = requestAnimationFrame(tick);
  },[phase,duration,sim,opt,spawnCrumbs]);

  // keyboard shortcuts
  useEffect(()=>{
    const onKey = (e)=>{
      const tag = (e.target.tagName||'').toLowerCase();
      if(tag==='input' || tag==='textarea') return;
      const k = e.key.toLowerCase();
      if(k===' '){ e.preventDefault(); phase==='dunking'?null:startDunk(); }
      else if(k==='r'){ reset(); }
      else if(k==='arrowup'){ e.preventDefault(); setTemp(v=>Math.min(100,+(v+2).toFixed(0))); }
      else if(k==='arrowdown'){ e.preventDefault(); setTemp(v=>Math.max(40,+(v-2).toFixed(0))); }
      else if(k==='arrowright'){ e.preventDefault(); setDuration(v=>Math.min(maxDunk,+(v+0.5).toFixed(1))); }
      else if(k==='arrowleft'){ e.preventDefault(); setDuration(v=>Math.max(0.5,+(v-0.5).toFixed(1))); }
      else if(k==='['){ setBiscuitIdx(i=>(i-1+BISCUITS.length)%BISCUITS.length); }
      else if(k===']'){ setBiscuitIdx(i=>(i+1)%BISCUITS.length); }
      else if(k==='i'){ setInteg(v=>Math.min(1,+(v+0.05).toFixed(2))); }
      else if(k==='o'){ setInteg(v=>Math.max(0,+(v-0.05).toFixed(2))); }
    };
    window.addEventListener('keydown', onKey);
    return ()=>window.removeEventListener('keydown', onKey);
  },[phase,startDunk,reset]);

  // live preview integrity at current duration (idle)
  const previewI = integrityCurve(duration, sim);
  const v = score!=null ? verdict(score, broken) : verdict(dunkScore(previewI, duration, opt), false);

  const cursor = phase==='dunking' ? elapsed : (phase==='idle' ? duration : (phase==='done'||phase==='broken') ? duration : -1);
  const toneColor = { great:'#5fbf90', good:'#8fd16f', mid:'#f6b04a', bad:'#ff7a5c' }[v.tone];

  return (
    <div className="min-h-screen w-full px-4 sm:px-8 py-8 max-w-[1280px] mx-auto">

      {/* Header */}
      <header className="reveal flex flex-col sm:flex-row sm:items-end sm:justify-between gap-4 mb-8" style={{animationDelay:'0ms'}}>
        <div>
          <div className="flex items-center gap-3 mb-2">
            <div className="w-10 h-10 rounded-2xl glass-soft flex items-center justify-center text-[var(--accent)] text-xl">☕</div>
            <span className="text-[11px] tracking-[0.25em] text-[var(--muted)] uppercase font-semibold">Biscuit Engineering Lab · Mk III</span>
          </div>
          <h1 className="font-display text-5xl sm:text-6xl font-extrabold leading-[0.95] tracking-tight">
            Tea <span className="italic" style={{color:'var(--accent)'}}>Dunkability</span> Simulator
          </h1>
          <p className="text-[var(--muted)] mt-3 max-w-xl text-sm leading-relaxed">
            A scientific instrument for the most important decision in British engineering: how long to leave the biscuit in.
            Tune the parameters, commit to a dunk, and pray the structural integrity holds.
          </p>
        </div>
        <div className="flex items-center gap-2 text-xs text-[var(--muted)]">
          <span className="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
          Live physics · {BISCUITS.length} biscuit profiles
        </div>
      </header>

      <div className="grid grid-cols-1 lg:grid-cols-[1.05fr_1.4fr] gap-6">

        {/* LEFT: controls */}
        <section className="glass p-6 reveal" style={{animationDelay:'80ms'}}>
          <div className="flex items-center justify-between mb-5">
            <h2 className="font-display text-2xl font-bold">Parameters</h2>
            <button onClick={reset}
              className="text-xs font-semibold px-3 py-1.5 rounded-lg glass-soft hover:bg-white/10 transition flex items-center gap-1.5">
              ↺ Reset <span className="kbd ml-1">R</span>
            </button>
          </div>

          <div className="space-y-6">
            <Slider label="Tea Temperature" icon={<Ico name="thermo"/>} value={temp} min={40} max={100} step={1} unit="°C"
              onChange={setTemp} fmt={v=>v}/>
            <Slider label="Dunk Duration" icon={<Ico name="clock"/>} value={duration} min={0.5} max={maxDunk} step={0.1} unit="s"
              onChange={setDuration} fmt={v=>v.toFixed(1)}/>
            <Slider label="Structural Integrity" icon={<Ico name="shield"/>} value={integ} min={0} max={1} step={0.01}
              onChange={setInteg} fmt={v=>Math.round(v*100)+'%'} unit=""/>
          </div>

          {/* Biscuit picker */}
          <div className="mt-7">
            <div className="flex items-center justify-between mb-3">
              <div className="flex items-center gap-2 text-[13px] font-medium text-[var(--muted)]">
                <span className="text-[var(--accent)]"><Ico name="cookie"/></span>
                Biscuit Selection
              </div>
              <div className="flex items-center gap-1 text-[10px] text-[var(--muted)]">
                <span className="kbd">[</span><span className="kbd">]</span>
              </div>
            </div>
            <div className="grid grid-cols-3 gap-2">
              {BISCUITS.map((b,i)=>(
                <button key={b.id} onClick={()=>setBiscuitIdx(i)}
                  className={`relative text-left px-3 py-2.5 rounded-xl border transition-all ${i===biscuitIdx?'bg-white/10 border-[var(--accent)]/60':'glass-soft hover:bg-white/5 border-transparent'}`}>
                  <div className="flex items-center gap-2">
                    <span className="w-4 h-4 rounded-md" style={{background:`linear-gradient(135deg,${b.color},${b.edge})`}}></span>
                    <span className="text-[11.5px] font-semibold leading-tight">{b.name}</span>
                  </div>
                  <div className="text-[9.5px] text-[var(--muted)] mt-1 font-mono">S:{b.strength.toFixed(2)} A:{b.absorb.toFixed(2)}</div>
                </button>
              ))}
            </div>
            <div className="mt-3 glass-soft p-3 rounded-xl">
              <div className="flex items-center justify-between">
                <span className="font-display text-base font-semibold">{biscuit.name}</span>
                <span className="text-[10px] px-2 py-0.5 rounded-full" style={{background:'rgba(246,176,74,0.15)',color:'var(--accent)'}}>{biscuit.crunch}</span>
              </div>
              <p className="text-[11.5px] text-[var(--muted)] mt-1.5 leading-relaxed">{biscuit.desc}</p>
            </div>
          </div>

          {/* Dunk button */}
          <button onClick={startDunk} disabled={phase==='dunking'}
            className={`mt-6 w-full py-4 rounded-2xl font-display text-lg font-bold tracking-wide transition-all relative overflow-hidden ${phase==='dunking'?'opacity-70 cursor-not-allowed':'hover:scale-[1.02] active:scale-[0.99]'}`}
            style={{
              background: phase==='broken' ? 'linear-gradient(135deg,#e85028,#b8341a)' : 'linear-gradient(135deg,#f6b04a,#e8743b)',
              color:'#1a1206',
              boxShadow:'0 14px 40px -12px rgba(246,176,74,0.7)',
            }}>
            {phase==='dunking' ? 'DUNKING…' : phase==='broken' ? 'STRUCTURAL FAILURE' : 'DUNK THE BISCUIT'}
            <span className="ml-2 kbd" style={{background:'rgba(0,0,0,0.18)',borderColor:'rgba(0,0,0,0.25)',color:'#1a1206'}}>SPACE</span>
          </button>
        </section>

        {/* RIGHT: visualisation */}
        <section className="flex flex-col gap-6">

          {/* Teacup card */}
          <div className="glass p-6 reveal relative overflow-hidden" style={{animationDelay:'160ms'}}>
            <div className="flex items-center justify-between mb-2">
              <h2 className="font-display text-2xl font-bold">The Dunk</h2>
              <div className="text-[11px] font-mono text-[var(--muted)]">
                t = <span className="text-white">{(phase==='dunking'?elapsed:duration).toFixed(1)}s</span> · I = <span style={{color:toneColor}}>{Math.round((phase==='dunking'?integrityCurve(elapsed,sim):previewI)*100)}%</span>
              </div>
            </div>
            <div className="h-[340px] relative">
              <Teacup
                phase={phase}
                dunkProgress={dunkProg}
                integrity={phase==='dunking'?integrityCurve(elapsed,sim):previewI}
                broken={broken}
                biscuit={biscuit}
                crumbBurst={crumbs}
                splashKey={splashKey}
              />
            </div>

            {/* Verdict bar */}
            <div className="mt-2 flex items-center justify-between gap-3 px-1">
              <div>
                <div className="text-[10px] uppercase tracking-widest text-[var(--muted)] mb-0.5">
                  {score!=null ? 'Final Verdict' : 'Projected Verdict'}
                </div>
                <div className="font-display text-xl font-bold" style={{color:toneColor}}>{v.label}</div>
                <div className="text-[11.5px] text-[var(--muted)] mt-0.5">{v.sub}</div>
              </div>
              <div className="text-right">
                <div className="text-[10px] uppercase tracking-widest text-[var(--muted)] mb-0.5">Score</div>
                <div className="font-mono text-4xl font-bold tabular-nums" style={{color:toneColor}}>
                  {(score!=null?score:dunkScore(previewI,duration,opt)).toString().padStart(2,'0')}
                </div>
              </div>
            </div>
          </div>

          {/* Crumble-o-meter */}
          <div className="glass p-6 reveal" style={{animationDelay:'240ms'}}>
            <div className="flex items-center justify-between mb-1">
              <h2 className="font-display text-2xl font-bold">Crumble-o-meter<span className="text-[var(--accent)]">™</span></h2>
              <span className="text-[10px] font-mono text-[var(--muted)]">structural integrity vs dunk time</span>
            </div>
            <CrumbleGraph curve={curve} cursor={cursor} opt={opt} maxDunk={maxDunk} sim={sim}/>
            <div className="grid grid-cols-3 gap-3 mt-3 text-center">
              <div className="glass-soft py-2.5 rounded-xl">
                <div className="text-[10px] uppercase tracking-wider text-[var(--muted)]">Optimal</div>
                <div className="font-mono text-base font-bold text-emerald-300">{opt.toFixed(2)}s</div>
              </div>
              <div className="glass-soft py-2.5 rounded-xl">
                <div className="text-[10px] uppercase tracking-wider text-[var(--muted)]">At Duration</div>
                <div className="font-mono text-base font-bold" style={{color:toneColor}}>{Math.round(previewI*100)}%</div>
              </div>
              <div className="glass-soft py-2.5 rounded-xl">
                <div className="text-[10px] uppercase tracking-wider text-[var(--muted)]">Risk</div>
                <div className="font-mono text-base font-bold" style={{color:previewI<0.2?'#ff7a5c':previewI<0.5?'#f6b04a':'#5fbf90'}}>
                  {previewI<0.2?'HIGH':previewI<0.5?'MEDIUM':'LOW'}
                </div>
              </div>
            </div>
          </div>
        </section>
      </div>

      {/* Footer / shortcuts */}
      <footer className="reveal mt-8 glass p-5 flex flex-wrap items-center justify-between gap-4" style={{animationDelay:'320ms'}}>
        <div className="flex flex-wrap items-center gap-x-5 gap-y-2 text-[11.5px] text-[var(--muted)]">
          <span className="flex items-center gap-1.5"><span className="kbd">SPACE</span> Dunk</span>
          <span className="flex items-center gap-1.5"><span className="kbd">R</span> Reset</span>
          <span className="flex items-center gap-1.5"><span className="kbd">↑</span><span className="kbd">↓</span> Temp</span>
          <span className="flex items-center gap-1.5"><span className="kbd">←</span><span className="kbd">→</span> Duration</span>
          <span className="flex items-center gap-1.5"><span className="kbd">[</span><span className="kbd">]</span> Biscuit</span>
          <span className="flex items-center gap-1.5"><span className="kbd">I</span><span className="kbd">O</span> Integrity</span>
        </div>
        <div className="text-[10.5px] text-[var(--muted)] font-mono opacity-70">
          dunkability = f(temp, t, biscuit, I₀) · no biscuits were harmed irreversibly
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

     React.createElement (using the global React UMD build) instead of
     automatic-runtime `import { jsx } from "react/jsx-runtime"`, which
     fails with "Cannot use import statement outside a module" when Babel
     injects the transformed code as a classic (non-module) script. -->
<script>
  (function () {
    var src = document.getElementById('app-source').textContent;
    var out = Babel.transform(src, { presets: [['react', { runtime: 'classic' }]] });
    (0, eval)(out.code);
  })();
