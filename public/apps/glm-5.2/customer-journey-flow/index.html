<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Customer Journey Flow</title>
<style>
  :root{
    --bg:#f6f7fb;
    --grid:#e7eaf3;
    --panel:#ffffff;
    --ink:#1f2433;
    --muted:#6b7280;
    --line:#d7dce8;
    --accent:#5b6cff;
    --accent-soft:#eef0ff;
    --danger:#e5484d;
    --shadow:0 1px 2px rgba(16,22,40,.06), 0 8px 24px rgba(16,22,40,.08);
    --shadow-lg:0 4px 12px rgba(16,22,40,.08), 0 24px 48px rgba(16,22,40,.14);
    --radius:14px;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink);
    background:var(--bg);
    -webkit-font-smoothing:antialiased;
    overflow:hidden;
  }

  /* ===== App layout ===== */
  .app{display:flex;flex-direction:column;height:100vh}
  .topbar{
    display:flex;align-items:center;gap:16px;
    padding:12px 20px;
    background:var(--panel);
    border-bottom:1px solid var(--line);
    z-index:30;
  }
  .brand{display:flex;align-items:center;gap:12px;min-width:0}
  .brand .logo{
    width:34px;height:34px;border-radius:9px;flex:0 0 auto;
    background:linear-gradient(135deg,#5b6cff,#8a5bff);
    display:grid;place-items:center;color:#fff;font-weight:700;
    box-shadow:0 4px 10px rgba(91,108,255,.4);
  }
  .brand h1{font-size:16px;margin:0;font-weight:700;letter-spacing:-.2px;white-space:nowrap}
  .brand .sub{font-size:12px;color:var(--muted);white-space:nowrap}
  .spacer{flex:1}

  .btn{
    appearance:none;border:1px solid var(--line);background:#fff;color:var(--ink);
    padding:8px 14px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;
    display:inline-flex;align-items:center;gap:7px;transition:.15s ease;
    font-family:inherit;
  }
  .btn:hover{border-color:#c2c8d9;transform:translateY(-1px);box-shadow:var(--shadow)}
  .btn:active{transform:translateY(0)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 4px 12px rgba(91,108,255,.32)}
  .btn.primary:hover{filter:brightness(1.05)}
  .btn.ghost{background:transparent}
  .btn .ic{width:15px;height:15px}

  .toolbar{display:flex;gap:8px;align-items:center}

  /* ===== Canvas ===== */
  .stage{
    position:relative;flex:1;overflow:hidden;
    background-color:var(--bg);
    background-image:
      radial-gradient(var(--grid) 1.4px, transparent 1.4px);
    background-size:22px 22px;
    background-position:0 0;
  }
  .canvas{position:absolute;inset:0;cursor:default}
  .canvas.panning{cursor:grabbing}

  /* ===== Stage nodes ===== */
  .node{
    position:absolute;
    width:220px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    user-select:none;
    transition:box-shadow .15s ease, border-color .15s ease, transform .05s ease;
    will-change:transform;
  }
  .node:hover{box-shadow:var(--shadow-lg)}
  .node.selected{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft), var(--shadow-lg)}
  .node.dragging{cursor:grabbing;box-shadow:var(--shadow-lg)}
  .node .head{
    display:flex;align-items:center;gap:10px;
    padding:12px 14px 10px;cursor:grab;
    border-bottom:1px solid var(--line);
  }
  .node .head .dot{
    width:10px;height:10px;border-radius:50%;flex:0 0 auto;
    box-shadow:0 0 0 4px rgba(0,0,0,.04);
  }
  .node .title{
    flex:1;min-width:0;font-size:14px;font-weight:700;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .node .title-input{
    flex:1;min-width:0;font-size:14px;font-weight:700;
    border:1px solid var(--accent);border-radius:6px;
    padding:2px 6px;outline:none;font-family:inherit;color:var(--ink);
  }
  .node .actions{display:flex;gap:2px;opacity:0;transition:opacity .15s}
  .node:hover .actions, .node.selected .actions{opacity:1}
  .iconbtn{
    border:none;background:transparent;color:var(--muted);
    width:24px;height:24px;border-radius:6px;cursor:pointer;
    display:grid;place-items:center;transition:.15s;
  }
  .iconbtn:hover{background:#f1f3f9;color:var(--ink)}
  .iconbtn.danger:hover{background:#fdecec;color:var(--danger)}
  .iconbtn svg{width:14px;height:14px}

  .node .body{padding:10px 14px 12px}
  .node .desc{
    font-size:12.5px;color:var(--muted);line-height:1.45;
    white-space:pre-wrap;word-break:break-word;
    min-height:18px;cursor:text;
  }
  .node .desc.empty{color:#aab0c0;font-style:italic}
  .node .desc-edit{
    width:100%;font-size:12.5px;color:var(--ink);line-height:1.45;
    border:1px solid var(--accent);border-radius:6px;padding:4px 6px;
    outline:none;resize:none;font-family:inherit;min-height:40px;
    background:#fff;
  }
  .node .meta{
    display:flex;align-items:center;justify-content:space-between;
    margin-top:10px;font-size:11px;color:var(--muted);
  }
  .node .tag{
    display:inline-flex;align-items:center;gap:5px;
    padding:2px 8px;border-radius:20px;font-weight:600;
    background:#f1f3f9;color:#5a6175;text-transform:uppercase;letter-spacing:.4px;font-size:10px;
  }

  /* ===== Ports ===== */
  .port{
    position:absolute;top:50%;width:14px;height:14px;border-radius:50%;
    background:#fff;border:2.5px solid var(--accent);
    transform:translateY(-50%);
    cursor:crosshair;z-index:5;
    transition:transform .12s ease, background .12s;
  }
  .port:hover{transform:translateY(-50%) scale(1.35);background:var(--accent)}
  .port.in{left:-8px}
  .port.out{right:-8px}
  .port.connecting{background:var(--accent);transform:translateY(-50%) scale(1.35)}

  /* ===== SVG edges ===== */
  .edges{position:absolute;inset:0;pointer-events:none;overflow:visible}
  .edges path.edge{
    fill:none;stroke:#9aa3bd;stroke-width:2.2;
    pointer-events:stroke;cursor:pointer;
    transition:stroke .15s, stroke-width .15s;
  }
  .edges path.edge:hover{stroke:var(--accent);stroke-width:3}
  .edges path.edge.selected{stroke:var(--accent);stroke-width:3}
  .edges path.temp{stroke:var(--accent);stroke-width:2.4;stroke-dasharray:6 5;fill:none;opacity:.85}
  .edges .hit{stroke:transparent;stroke-width:14;fill:none;pointer-events:stroke;cursor:pointer}

  /* ===== Side panel ===== */
  .sidepanel{
    position:absolute;top:0;right:0;bottom:0;width:320px;
    background:var(--panel);border-left:1px solid var(--line);
    box-shadow:var(--shadow-lg);
    transform:translateX(100%);transition:transform .25s ease;
    display:flex;flex-direction:column;z-index:20;
  }
  .sidepanel.open{transform:translateX(0)}
  .sp-head{
    display:flex;align-items:center;gap:10px;padding:16px 18px;
    border-bottom:1px solid var(--line);
  }
  .sp-head h2{font-size:14px;margin:0;flex:1;font-weight:700}
  .sp-body{padding:18px;overflow-y:auto;flex:1}
  .field{margin-bottom:16px}
  .field label{display:block;font-size:11px;font-weight:700;color:var(--muted);
    text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
  .field input, .field textarea, .field select{
    width:100%;border:1px solid var(--line);border-radius:8px;
    padding:9px 11px;font-size:13px;font-family:inherit;color:var(--ink);
    outline:none;transition:.15s;background:#fff;
  }
  .field input:focus, .field textarea:focus, .field select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .field textarea{resize:vertical;min-height:70px;line-height:1.5}
  .swatches{display:flex;gap:8px;flex-wrap:wrap}
  .swatch{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid #fff;
    box-shadow:0 0 0 1px var(--line);transition:.15s}
  .swatch:hover{transform:scale(1.12)}
  .swatch.active{box-shadow:0 0 0 2px var(--ink)}
  .sp-foot{padding:14px 18px;border-top:1px solid var(--line);display:flex;gap:8px}
  .sp-foot .btn{flex:1;justify-content:center}

  /* ===== Empty hint ===== */
  .hint{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    text-align:center;color:#aab0c0;pointer-events:none;max-width:380px;
  }
  .hint h3{font-size:18px;margin:0 0 8px;font-weight:700;color:#8a91a6}
  .hint p{margin:0;font-size:13px;line-height:1.6}

  /* ===== Zoom controls ===== */
  .zoomctl{
    position:absolute;left:18px;bottom:18px;display:flex;flex-direction:column;
    background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow);
    overflow:hidden;z-index:15;
  }
  .zoomctl button{
    border:none;background:#fff;width:38px;height:38px;cursor:pointer;
    display:grid;place-items:center;color:var(--ink);transition:.15s;font-size:16px;
  }
  .zoomctl button:hover{background:#f1f3f9}
  .zoomctl button+button{border-top:1px solid var(--line)}
  .zoomctl .zlabel{font-size:11px;color:var(--muted);text-align:center;padding:4px 0}

  .help{
    position:absolute;right:18px;bottom:18px;
    background:#fff;border:1px solid var(--line);border-radius:10px;
    box-shadow:var(--shadow);padding:10px 14px;font-size:11.5px;color:var(--muted);
    z-index:15;max-width:260px;line-height:1.5;
  }
  .help b{color:var(--ink)}
  .help kbd{
    background:#f1f3f9;border:1px solid var(--line);border-radius:4px;
    padding:1px 5px;font-size:10.5px;font-family:inherit;color:var(--ink);
  }

  /* toast */
  .toast{
    position:absolute;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
    background:#1f2433;color:#fff;padding:10px 18px;border-radius:9px;font-size:13px;
    opacity:0;transition:.25s;z-index:50;box-shadow:var(--shadow-lg);pointer-events:none;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media (max-width:720px){
    .brand .sub{display:none}
    .help{display:none}
    .sidepanel{width:100%}
  }
</style>
</head>
<body>
<div class="app">
  <!-- Top bar -->
  <div class="topbar">
    <div class="brand">
      <div class="logo">CJ</div>
      <div>
        <h1>Customer Journey Flow</h1>
        <div class="sub">Map every step from awareness to purchase</div>
      </div>
    </div>
    <div class="spacer"></div>
    <div class="toolbar">
      <button class="btn" id="btnTemplate" title="Load a starter template">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h10"/></svg>
        Template
      </button>
      <button class="btn" id="btnAdd">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
        Add stage
      </button>
      <button class="btn ghost" id="btnClear" title="Clear canvas">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>
        Clear
      </button>
      <button class="btn primary" id="btnExport" title="Export as SVG image">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0l-4-4m4 4l4-4M5 21h14"/></svg>
        Export
      </button>
    </div>
  </div>

  <!-- Canvas stage -->
  <div class="stage" id="stage">
    <div class="canvas" id="canvas">
      <svg class="edges" id="edges">
        <defs>
          <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <path d="M0,0 L10,5 L0,10 z" fill="#9aa3bd"/>
          </marker>
          <marker id="arrow-sel" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <path d="M0,0 L10,5 L0,10 z" fill="#5b6cff"/>
          </marker>
        </defs>
        <g id="edges-group"></g>
      </svg>
      <div id="nodes-layer"></div>
    </div>

    <div class="zoomctl">
      <button id="zoomIn" title="Zoom in">+</button>
      <div class="zlabel" id="zoomLabel">100%</div>
      <button id="zoomOut" title="Zoom out">−</button>
      <button id="zoomFit" title="Reset view">⤢</button>
    </div>

    <div class="help">
      <b>Tip:</b> Drag a node's <span style="color:var(--accent)">●</span> port onto another to connect.
      Double-click a title to edit. <kbd>Del</kbd> removes selection.
    </div>

    <div class="sidepanel" id="sidepanel">
      <div class="sp-head">
        <h2>Stage details</h2>
        <button class="iconbtn" id="spClose" title="Close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6L6 18"/></svg>
        </button>
      </div>
      <div class="sp-body">
        <div class="field">
          <label>Title</label>
          <input id="spTitle" type="text" placeholder="e.g. Awareness" />
        </div>
        <div class="field">
          <label>Description</label>
          <textarea id="spDesc" placeholder="What does the customer do here?"></textarea>
        </div>
        <div class="field">
          <label>Stage type</label>
          <select id="spType">
            <option value="awareness">Awareness</option>
            <option value="interest">Interest</option>
            <option value="consideration">Consideration</option>
            <option value="intent">Intent</option>
            <option value="decision">Decision</option>
            <option value="purchase">Purchase</option>
            <option value="retention">Retention</option>
            <option value="advocacy">Advocacy</option>
          </select>
        </div>
        <div class="field">
          <label>Accent color</label>
          <div class="swatches" id="swatches"></div>
        </div>
      </div>
      <div class="sp-foot">
        <button class="btn" id="spDelete">Delete stage</button>
        <button class="btn primary" id="spDone">Done</button>
      </div>
    </div>

    <div class="toast" id="toast"></div>
  </div>
</div>

<script>
(function(){
  "use strict";

  // ===== State =====
  const COLORS = ["#5b6cff","#8a5bff","#22b8a6","#f59f00","#e8590c","#e5484d","#1098ad","#7c54ff"];
  const TYPE_LABELS = {
    awareness:"Awareness", interest:"Interest", consideration:"Consideration",
    intent:"Intent", decision:"Decision", purchase:"Purchase",
    retention:"Retention", advocacy:"Advocacy"
  };

  const state = {
    nodes: [],          // {id,x,y,title,desc,type,color}
    edges: [],          // {id, from, to}
    nextId: 1,
    selectedNodeId: null,
    selectedEdgeId: null,
    pan: {x:0,y:0},
    zoom: 1,
  };

  // ===== DOM refs =====
  const canvas = document.getElementById('canvas');
  const nodesLayer = document.getElementById('nodes-layer');
  const edgesGroup = document.getElementById('edges-group');
  const edgesSvg = document.getElementById('edges');
  const stage = document.getElementById('stage');
  const sidepanel = document.getElementById('sidepanel');
  const toastEl = document.getElementById('toast');
  const zoomLabel = document.getElementById('zoomLabel');

  // ===== Utilities =====
  const uid = () => 'n' + (state.nextId++);
  function toast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toast._t);
    toast._t = setTimeout(()=>toastEl.classList.remove('show'), 1800);
  }
  function clamp(v,min,max){return Math.max(min,Math.min(max,v));}

  function applyTransform(){
    canvas.style.transform = `translate(${state.pan.x}px, ${state.pan.y}px) scale(${state.zoom})`;
    zoomLabel.textContent = Math.round(state.zoom*100) + '%';
  }

  // Convert a screen point to canvas (logical) coordinates
  function screenToCanvas(clientX, clientY){
    const r = stage.getBoundingClientRect();
    const x = (clientX - r.left - state.pan.x) / state.zoom;
    const y = (clientY - r.top  - state.pan.y) / state.zoom;
    return {x,y};
  }

  // ===== Persistence =====
  function save(){
    try{
      localStorage.setItem('cjf_state', JSON.stringify({
        nodes:state.nodes, edges:state.edges, nextId:state.nextId,
        pan:state.pan, zoom:state.zoom
      }));
    }catch(e){}
  }
  function load(){
    try{
      const raw = localStorage.getItem('cjf_state');
      if(!raw) return false;
      const d = JSON.parse(raw);
      if(d && d.nodes){
        state.nodes = d.nodes; state.edges = d.edges;
        state.nextId = d.nextId || (d.nodes.length+1);
        state.pan = d.pan || {x:0,y:0};
        state.zoom = d.zoom || 1;
        return true;
      }
    }catch(e){}
    return false;
  }

  // ===== Node CRUD =====
  function addNode(opts={}){
    const node = {
      id: uid(),
      x: opts.x ?? 140,
      y: opts.y ?? 140,
      title: opts.title ?? 'New stage',
      desc: opts.desc ?? '',
      type: opts.type ?? 'awareness',
      color: opts.color ?? COLORS[state.nodes.length % COLORS.length],
    };
    state.nodes.push(node);
    render();
    save();
    return node;
  }

  function deleteNode(id){
    state.nodes = state.nodes.filter(n=>n.id!==id);
    state.edges = state.edges.filter(e=>e.from!==id && e.to!==id);
    if(state.selectedNodeId===id) selectNode(null);
    render(); save();
  }

  // ===== Edge CRUD =====
  function addEdge(from,to){
    if(from===to) return null;
    if(state.edges.some(e=>e.from===from && e.to===to)) return null;
    const edge = { id:'e'+(state.nextId++), from, to };
    state.edges.push(edge);
    render(); save();
    return edge;
  }
  function deleteEdge(id){
    state.edges = state.edges.filter(e=>e.id!==id);
    if(state.selectedEdgeId===id) state.selectedEdgeId=null;
    render(); save();
  }

  // ===== Selection =====
  // Selection only toggles CSS classes + re-renders the lightweight edge layer,
  // never the node elements — so it is safe to call mid-event without detaching
  // the node a drag handler is bound to.
  function applySelectionVisuals(){
    nodesLayer.querySelectorAll('.node').forEach(el=>{
      el.classList.toggle('selected', el.dataset.id===state.selectedNodeId);
    });
    renderEdges();
  }
  function selectNode(id){
    state.selectedNodeId = id;
    state.selectedEdgeId = null;
    applySelectionVisuals();
    if(id){ openSidePanel(id); } else { closeSidePanel(); }
  }
  function selectEdge(id){
    state.selectedNodeId = null;
    state.selectedEdgeId = id;
    applySelectionVisuals();
    closeSidePanel();
  }
  function clearSelection(){
    state.selectedNodeId=null; state.selectedEdgeId=null;
    applySelectionVisuals(); closeSidePanel();
  }

  // ===== Rendering =====
  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function render(){
    // nodes
    nodesLayer.innerHTML = '';
    state.nodes.forEach(n=>nodesLayer.appendChild(buildNode(n)));
    // edges
    renderEdges();
    // empty hint
    let hint = document.getElementById('hintEmpty');
    if(state.nodes.length===0){
      if(!hint){
        hint = document.createElement('div');
        hint.id='hintEmpty'; hint.className='hint';
        hint.innerHTML = '<h3>Start mapping your journey</h3>'+
          '<p>Click <b>Add stage</b> or <b>Template</b> to drop stages onto the canvas, then drag from a node\'s port to connect them.</p>';
        stage.appendChild(hint);
      }
    } else if(hint){ hint.remove(); }
  }

  function buildNode(n){
    const el = document.createElement('div');
    el.className = 'node' + (state.selectedNodeId===n.id ? ' selected':'');
    el.style.left = n.x + 'px';
    el.style.top  = n.y + 'px';
    el.dataset.id = n.id;
    const label = TYPE_LABELS[n.type] || 'Stage';
    const descHtml = n.desc && n.desc.trim()
      ? escapeHtml(n.desc)
      : '<span class="empty">Add a description…</span>';
    el.innerHTML = `
      <div class="head">
        <span class="dot" style="background:${n.color}"></span>
        <span class="title">${escapeHtml(n.title)}</span>
        <div class="actions">
          <button class="iconbtn" data-act="edit" title="Edit"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg></button>
          <button class="iconbtn danger" data-act="delete" title="Delete"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg></button>
        </div>
      </div>
      <div class="body">
        <div class="desc">${descHtml}</div>
        <div class="meta">
          <span class="tag" style="color:${n.color};background:${n.color}1a">${label}</span>
          <span class="count"></span>
        </div>
      </div>
      <div class="port in" data-port="in" title="Input — drop a connection here"></div>
      <div class="port out" data-port="out" title="Drag to another stage to connect"></div>
    `;
    // wire events
    wireNode(el, n);
    return el;
  }

  function wireNode(el, n){
    const head = el.querySelector('.head');
    // drag node
    head.addEventListener('mousedown', (e)=>{
      if(e.target.closest('.iconbtn')) return;
      if(e.button!==0) return;
      e.preventDefault();
      startDragNode(n, e);
    });
    // select on click
    el.addEventListener('mousedown', (e)=>{
      if(e.target.closest('.port') || e.target.closest('.iconbtn')) return;
      selectNode(n.id);
    }, true);

    // double-click title to edit inline
    const titleEl = el.querySelector('.title');
    titleEl.addEventListener('dblclick', (e)=>{ e.stopPropagation(); inlineEditTitle(el,n); });
    // double-click desc to edit inline
    const descEl = el.querySelector('.desc');
    descEl.addEventListener('dblclick', (e)=>{ e.stopPropagation(); inlineEditDesc(el,n); });

    // action buttons
    el.querySelectorAll('.iconbtn').forEach(b=>{
      b.addEventListener('click', (e)=>{
        e.stopPropagation();
        const act = b.dataset.act;
        if(act==='edit'){ selectNode(n.id); }
        else if(act==='delete'){ deleteNode(n.id); toast('Stage deleted'); }
      });
    });

    // ports
    const outPort = el.querySelector('.port.out');
    const inPort  = el.querySelector('.port.in');
    outPort.addEventListener('mousedown', (e)=>{ e.preventDefault(); e.stopPropagation(); startDrawEdge(n, e); });
    inPort.addEventListener('mousedown', (e)=>{ e.stopPropagation(); }); // allow drop targeting
  }

  function inlineEditTitle(el,n){
    const titleEl = el.querySelector('.title');
    const input = document.createElement('input');
    input.className='title-input'; input.value = n.title;
    titleEl.replaceWith(input);
    input.focus(); input.select();
    const commit = ()=>{
      n.title = input.value.trim() || 'Untitled';
      render(); save();
    };
    input.addEventListener('blur', commit);
    input.addEventListener('keydown', (e)=>{
      if(e.key==='Enter'){ e.preventDefault(); input.blur(); }
      if(e.key==='Escape'){ input.value=n.title; input.blur(); }
    });
  }
  function inlineEditDesc(el,n){
    const descEl = el.querySelector('.desc');
    const ta = document.createElement('textarea');
    ta.className='desc-edit'; ta.value = n.desc;
    descEl.replaceWith(ta);
    ta.focus();
    const commit = ()=>{
      n.desc = ta.value;
      render(); save();
    };
    ta.addEventListener('blur', commit);
    ta.addEventListener('keydown', (e)=>{
      if(e.key==='Enter' && (e.metaKey||e.ctrlKey)){ e.preventDefault(); ta.blur(); }
      if(e.key==='Escape'){ ta.value=n.desc; ta.blur(); }
    });
  }

  // ===== Edges rendering =====
  function nodeCenter(n){
    // approximate node size
    return { x: n.x + 110, y: n.y + 60 };
  }
  function nodeById(id){ return state.nodes.find(n=>n.id===id); }

  function edgePath(from, to, opts={}){
    // connection points on right side of 'from', left side of 'to'
    const x1 = from.x + 220, y1 = from.y + 60;
    const x2 = to.x,         y2 = to.y + 60;
    const dx = Math.max(60, Math.abs(x2-x1)*0.5);
    const c1x = x1 + dx, c1y = y1;
    const c2x = x2 - dx, c2y = y2;
    return `M ${x1} ${y1} C ${c1x} ${c1y}, ${c2x} ${c2y}, ${x2} ${y2}`;
  }

  function renderEdges(){
    edgesGroup.innerHTML = '';
    state.edges.forEach(edge=>{
      const from = nodeById(edge.from), to = nodeById(edge.to);
      if(!from || !to) return;
      const d = edgePath(from, to);
      const sel = state.selectedEdgeId===edge.id;
      // wide invisible hit area
      const hit = document.createElementNS('http://www.w3.org/2000/svg','path');
      hit.setAttribute('d', d); hit.setAttribute('class','hit');
      hit.addEventListener('click',(e)=>{ e.stopPropagation(); selectEdge(edge.id); });
      // visible path
      const p = document.createElementNS('http://www.w3.org/2000/svg','path');
      p.setAttribute('d', d);
      p.setAttribute('class','edge'+(sel?' selected':''));
      p.setAttribute('marker-end', sel?'url(#arrow-sel)':'url(#arrow)');
      p.addEventListener('click',(e)=>{ e.stopPropagation(); selectEdge(edge.id); });
      // delete handle (small circle at midpoint) when selected
      edgesGroup.appendChild(hit);
      edgesGroup.appendChild(p);
      if(sel){
        const mid = midPoint(from,to);
        const g = document.createElementNS('http://www.w3.org/2000/svg','g');
        g.setAttribute('transform',`translate(${mid.x},${mid.y})`);
        g.style.pointerEvents='all';
        const c = document.createElementNS('http://www.w3.org/2000/svg','circle');
        c.setAttribute('r','11'); c.setAttribute('fill','#fff'); c.setAttribute('stroke','#e5484d'); c.setAttribute('stroke-width','2');
        c.style.cursor='pointer';
        const x1 = document.createElementNS('http://www.w3.org/2000/svg','path');
        x1.setAttribute('d','M -4 -4 L 4 4 M 4 -4 L -4 4');
        x1.setAttribute('stroke','#e5484d'); x1.setAttribute('stroke-width','2'); x1.setAttribute('fill','none');
        x1.style.pointerEvents='none';
        g.appendChild(c); g.appendChild(x1);
        g.addEventListener('click',(e)=>{ e.stopPropagation(); deleteEdge(edge.id); toast('Connection removed'); });
        edgesGroup.appendChild(g);
      }
    });
  }

  function midPoint(from,to){
    const x1=from.x+220, y1=from.y+60, x2=to.x, y2=to.y+60;
    return { x:(x1+x2)/2, y:(y1+y2)/2 };
  }

  // ===== Interactions: drag node =====
  function startDragNode(n, e){
    const start = screenToCanvas(e.clientX, e.clientY);
    const orig = { x:n.x, y:n.y };
    // Selecting rebuilds nodes, so select first then grab the fresh element.
    selectNode(n.id);
    const el = nodesLayer.querySelector(`.node[data-id="${n.id}"]`);
    el.classList.add('dragging');
    let moved = false;
    function onMove(ev){
      const p = screenToCanvas(ev.clientX, ev.clientY);
      n.x = orig.x + (p.x - start.x);
      n.y = orig.y + (p.y - start.y);
      el.style.left = n.x+'px';
      el.style.top  = n.y+'px';
      moved = true;
      renderEdges(); // update attached edges live
    }
    function onUp(){
      el.classList.remove('dragging');
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
      if(moved) save();
    }
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  }

  // ===== Interactions: draw edge =====
  let drawCtx = null;
  function startDrawEdge(n, e){
    const from = n;
    // temp path element
    const temp = document.createElementNS('http://www.w3.org/2000/svg','path');
    temp.setAttribute('class','temp');
    edgesGroup.appendChild(temp);
    drawCtx = { from, temp, targetId:null };
    const startP = screenToCanvas(e.clientX, e.clientY);
    function onMove(ev){
      const p = screenToCanvas(ev.clientX, ev.clientY);
      // detect hover over an input port
      const elUnder = document.elementFromPoint(ev.clientX, ev.clientY);
      let targetId = null;
      // highlight ports
      nodesLayer.querySelectorAll('.port.in.connecting').forEach(p=>p.classList.remove('connecting'));
      if(elUnder && elUnder.classList && elUnder.classList.contains('port') && elUnder.dataset.port==='in'){
        const nodeEl = elUnder.closest('.node');
        targetId = nodeEl ? nodeEl.dataset.id : null;
        elUnder.classList.add('connecting');
      }
      drawCtx.targetId = targetId;
      const x1 = from.x + 220, y1 = from.y + 60;
      const x2 = targetId ? (nodeById(targetId).x) : p.x;
      const y2 = targetId ? (nodeById(targetId).y + 60) : p.y;
      const dx = Math.max(60, Math.abs(x2-x1)*0.5);
      temp.setAttribute('d', `M ${x1} ${y1} C ${x1+dx} ${y1}, ${x2-dx} ${y2}, ${x2} ${y2}`);
    }
    function onUp(){
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
      nodesLayer.querySelectorAll('.port.in.connecting').forEach(p=>p.classList.remove('connecting'));
      temp.remove();
      if(drawCtx && drawCtx.targetId && drawCtx.targetId!==from.id){
        const edge = addEdge(from.id, drawCtx.targetId);
        toast(edge ? 'Connected' : 'Already connected');
      }
      drawCtx = null;
    }
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  }

  // ===== Panning & zoom on canvas background =====
  let panCtx = null;
  stage.addEventListener('mousedown', (e)=>{
    if(e.target!==canvas && e.target!==stage && !e.target.isSameNode(edgesSvg)) {
      // only start pan when clicking empty canvas area
    }
    // pan only on empty canvas/svg background
    const onEmpty = (e.target===canvas) || (e.target===edgesSvg) || (e.target===edgesGroup) || (e.target===stage);
    if(!onEmpty) return;
    if(e.button!==0 && e.button!==1) return;
    e.preventDefault();
    clearSelection();
    const startX = e.clientX, startY = e.clientY;
    const orig = { x:state.pan.x, y:state.pan.y };
    canvas.classList.add('panning');
    function onMove(ev){
      state.pan.x = orig.x + (ev.clientX - startX);
      state.pan.y = orig.y + (ev.clientY - startY);
      applyTransform();
    }
    function onUp(){
      canvas.classList.remove('panning');
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
      save();
    }
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  });

  // wheel zoom (zoom toward cursor)
  stage.addEventListener('wheel', (e)=>{
    e.preventDefault();
    const r = stage.getBoundingClientRect();
    const cx = e.clientX - r.left, cy = e.clientY - r.top;
    const delta = -e.deltaY * 0.0015;
    const newZoom = clamp(state.zoom * (1+delta), 0.35, 2.2);
    // keep cursor fixed: adjust pan
    const ratio = newZoom / state.zoom;
    state.pan.x = cx - (cx - state.pan.x) * ratio;
    state.pan.y = cy - (cy - state.pan.y) * ratio;
    state.zoom = newZoom;
    applyTransform();
    save();
  }, {passive:false});

  // zoom buttons
  function zoomBy(factor){
    const r = stage.getBoundingClientRect();
    const cx = r.width/2, cy = r.height/2;
    const newZoom = clamp(state.zoom*factor, 0.35, 2.2);
    const ratio = newZoom/state.zoom;
    state.pan.x = cx - (cx - state.pan.x)*ratio;
    state.pan.y = cy - (cy - state.pan.y)*ratio;
    state.zoom = newZoom;
    applyTransform(); save();
  }
  document.getElementById('zoomIn').onclick = ()=>zoomBy(1.2);
  document.getElementById('zoomOut').onclick= ()=>zoomBy(1/1.2);
  document.getElementById('zoomFit').onclick= ()=>{ state.zoom=1; state.pan={x:0,y:0}; applyTransform(); save(); };

  // ===== Side panel =====
  const spTitle = document.getElementById('spTitle');
  const spDesc  = document.getElementById('spDesc');
  const spType  = document.getElementById('spType');
  const swatches= document.getElementById('swatches');

  function openSidePanel(id){
    const n = nodeById(id); if(!n) return;
    state.selectedNodeId = id;
    sidepanel.classList.add('open');
    spTitle.value = n.title;
    spDesc.value = n.desc;
    spType.value = n.type;
    renderSwatches(n.color);
  }
  function closeSidePanel(){ sidepanel.classList.remove('open'); }

  function renderSwatches(active){
    swatches.innerHTML = '';
    COLORS.forEach(c=>{
      const s = document.createElement('div');
      s.className = 'swatch' + (c===active?' active':'');
      s.style.background = c;
      s.title = c;
      s.onclick = ()=>{
        const n = nodeById(state.selectedNodeId); if(!n) return;
        n.color = c; renderSwatches(c); render(); save();
      };
      swatches.appendChild(s);
    });
  }

  spTitle.addEventListener('input', ()=>{
    const n = nodeById(state.selectedNodeId); if(!n) return;
    n.title = spTitle.value; render(); save();
  });
  spDesc.addEventListener('input', ()=>{
    const n = nodeById(state.selectedNodeId); if(!n) return;
    n.desc = spDesc.value; render(); save();
  });
  spType.addEventListener('change', ()=>{
    const n = nodeById(state.selectedNodeId); if(!n) return;
    n.type = spType.value; render(); save();
  });
  document.getElementById('spClose').onclick = ()=>{ closeSidePanel(); clearSelection(); };
  document.getElementById('spDone').onclick = ()=>{ closeSidePanel(); clearSelection(); };
  document.getElementById('spDelete').onclick = ()=>{
    if(state.selectedNodeId){ deleteNode(state.selectedNodeId); toast('Stage deleted'); closeSidePanel(); }
  };

  // ===== Toolbar =====
  document.getElementById('btnAdd').onclick = ()=>{
    // add at center of current view
    const r = stage.getBoundingClientRect();
    const p = screenToCanvas(r.left + r.width/2, r.top + r.height/2);
    const n = addNode({ x:p.x-110, y:p.y-60, title:'New stage' });
    selectNode(n.id);
    spTitle.focus(); spTitle.select();
  };

  document.getElementById('btnClear').onclick = ()=>{
    if(state.nodes.length===0){ toast('Already empty'); return; }
    if(confirm('Clear all stages and connections?')){
      state.nodes=[]; state.edges=[]; state.selectedNodeId=null; state.selectedEdgeId=null;
      render(); save(); closeSidePanel(); toast('Canvas cleared');
    }
  };

  document.getElementById('btnTemplate').onclick = ()=>{ loadTemplate(true); };

  function loadTemplate(force){
    if(!force && state.nodes.length>0) return;
    if(force && state.nodes.length>0){
      if(!confirm('Replace current canvas with the starter template?')) return;
    }
    state.nodes=[]; state.edges=[]; state.selectedNodeId=null; state.selectedEdgeId=null;
    const stages = [
      {title:'Awareness',     desc:'Customer discovers the brand through ads, search, or word of mouth.', type:'awareness',     color:'#5b6cff'},
      {title:'Interest',      desc:'They explore the website and read content to learn more.',            type:'interest',      color:'#8a5bff'},
      {title:'Consideration', desc:'They compare features, pricing, and alternatives side by side.',      type:'consideration', color:'#22b8a6'},
      {title:'Decision',      desc:'Intent forms — they add to cart or sign up for a trial.',             type:'decision',      color:'#f59f00'},
      {title:'Purchase',      desc:'Checkout completes. The customer becomes a paying user.',             type:'purchase',      color:'#1098ad'},
      {title:'Retention',     desc:'Onboarding and support keep them engaged over time.',                 type:'retention',     color:'#e8590c'},
    ];
    const x0 = 120, gap = 270, y0 = 160;
    const created = stages.map((s,i)=>addNodeNoRender({ x: x0 + i*gap, y: y0, ...s }));
    for(let i=0;i<created.length-1;i++){
      state.edges.push({ id:'e'+(state.nextId++), from:created[i].id, to:created[i+1].id });
    }
    state.zoom=1; state.pan={x:0,y:0};
    applyTransform(); render(); save();
    toast('Template loaded');
  }

  function addNodeNoRender(opts){
    const node = {
      id: uid(),
      x: opts.x ?? 140, y: opts.y ?? 140,
      title: opts.title ?? 'New stage',
      desc: opts.desc ?? '',
      type: opts.type ?? 'awareness',
      color: opts.color ?? COLORS[state.nodes.length % COLORS.length],
    };
    state.nodes.push(node);
    return node;
  }

  // ===== Export to standalone SVG =====
  document.getElementById('btnExport').onclick = ()=>{
    if(state.nodes.length===0){ toast('Nothing to export'); return; }
    // compute bounding box
    let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
    state.nodes.forEach(n=>{
      minX=Math.min(minX,n.x); minY=Math.min(minY,n.y);
      maxX=Math.max(maxX,n.x+220); maxY=Math.max(maxY,n.y+120);
    });
    const pad=40;
    const w=(maxX-minX)+pad*2, h=(maxY-minY)+pad*2;
    const ox=-minX+pad, oy=-minY+pad;
    let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="background:#f6f7fb">`;
    svg += `<defs><marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#9aa3bd"/></marker></defs>`;
    // edges
    state.edges.forEach(edge=>{
      const from=nodeById(edge.from), to=nodeById(edge.to); if(!from||!to) return;
      const d=edgePath({x:from.x+ox,y:from.y+oy},{x:to.x+ox,y:to.y+oy});
      svg += `<path d="${d}" fill="none" stroke="#9aa3bd" stroke-width="2.2" marker-end="url(#ar)"/>`;
    });
    // nodes
    state.nodes.forEach(n=>{
      const x=n.x+ox, y=n.y+oy;
      svg += `<g transform="translate(${x},${y})">`;
      svg += `<rect width="220" height="120" rx="14" fill="#fff" stroke="#d7dce8"/>`;
      svg += `<rect width="220" height="44" rx="14" fill="#fff"/>`;
      svg += `<line x1="0" y1="44" x2="220" y2="44" stroke="#d7dce8"/>`;
      svg += `<circle cx="14" cy="22" r="5" fill="${n.color}"/>`;
      svg += `<text x="28" y="27" font-family="sans-serif" font-size="14" font-weight="700" fill="#1f2433">${escapeHtml(n.title)}</text>`;
      const desc = (n.desc||'').slice(0,140);
      svg += `<foreignObject x="14" y="52" width="192" height="50"><div xmlns="http://www.w3.org/1999/xhtml" style="font:12.5px sans-serif;color:#6b7280;line-height:1.4">${escapeHtml(desc)}</div></foreignObject>`;
      svg += `<rect x="14" y="98" width="${(TYPE_LABELS[n.type]||'').length*7+16}" height="18" rx="9" fill="${n.color}1a"/>`;
      svg += `<text x="22" y="111" font-family="sans-serif" font-size="10" font-weight="700" fill="${n.color}">${(TYPE_LABELS[n.type]||'').toUpperCase()}</text>`;
      svg += `</g>`;
    });
    svg += `</svg>`;
    const blob = new Blob([svg], {type:'image/svg+xml'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href=url; a.download='customer-journey-flow.svg';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 1000);
    toast('Exported as SVG');
  };

  // ===== Keyboard =====
  window.addEventListener('keydown', (e)=>{
    const typing = ['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName);
    if(typing) return;
    if(e.key==='Delete' || e.key==='Backspace'){
      if(state.selectedEdgeId){ deleteEdge(state.selectedEdgeId); toast('Connection removed'); e.preventDefault(); }
      else if(state.selectedNodeId){ deleteNode(state.selectedNodeId); toast('Stage deleted'); e.preventDefault(); }
    }
    if(e.key==='Escape'){ clearSelection(); }
  });

  // ===== Init =====
  function init(){
    if(!load() || state.nodes.length===0){
      loadTemplate(false);
    }
    applyTransform();
    render();
  }
  init();

})();
</script>
</body>
</html>
