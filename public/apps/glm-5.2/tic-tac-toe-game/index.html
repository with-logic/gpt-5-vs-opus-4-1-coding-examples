<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SPQR · Tic Tac Toe</title>
<meta name="description" content="A Roman Empire themed Tic Tac Toe game.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
/* ============================================================
   SPQR TIC TAC TOE — Roman Empire themed
   ============================================================ */

:root{
  /* Marble Day theme (default) */
  --bg-1:#efe9df;
  --bg-2:#dcd2c2;
  --marble-vein:rgba(120,110,95,0.12);
  --panel:rgba(255,253,247,0.62);
  --panel-solid:#fbf8f1;
  --panel-border:rgba(120,100,60,0.22);
  --ink:#2a2418;
  --ink-soft:#5b513f;
  --ink-faint:#8a7d66;
  --gold:#b8860b;
  --gold-bright:#e6b54a;
  --gold-deep:#8a6310;
  --gold-glow:rgba(212,167,70,0.55);
  --x-color:#7a1f1f;       /* imperial purple-red for X */
  --x-soft:#a63a3a;
  --o-color:#1f4d6b;       /* legion blue for O */
  --o-soft:#3a7398;
  --cell-bg:rgba(255,252,244,0.55);
  --cell-bg-hover:rgba(255,250,238,0.85);
  --cell-line:rgba(90,76,50,0.28);
  --shadow:0 10px 30px rgba(60,48,28,0.18), 0 2px 6px rgba(60,48,28,0.10);
  --shadow-soft:0 4px 14px rgba(60,48,28,0.12);
  --radius:14px;
  --radius-lg:22px;
  --serif:"Cinzel", "Times New Roman", serif;
  --body:"Cormorant Garamond", Georgia, serif;
}

[data-theme="night"]{
  /* Night Legion theme */
  --bg-1:#1a1612;
  --bg-2:#0c0a08;
  --marble-vein:rgba(180,160,120,0.06);
  --panel:rgba(28,24,18,0.66);
  --panel-solid:#1c1812;
  --panel-border:rgba(180,150,80,0.26);
  --ink:#efe6d2;
  --ink-soft:#c4b894;
  --ink-faint:#9c8f6e;
  --gold:#d4a746;
  --gold-bright:#f0c862;
  --gold-deep:#8a6310;
  --gold-glow:rgba(240,200,98,0.45);
  --x-color:#d05858;
  --x-soft:#e07878;
  --o-color:#5fa8d4;
  --o-soft:#7ec0e8;
  --cell-bg:rgba(40,34,24,0.55);
  --cell-bg-hover:rgba(56,48,32,0.75);
  --cell-line:rgba(180,150,80,0.22);
  --shadow:0 12px 34px rgba(0,0,0,0.55), 0 2px 6px rgba(0,0,0,0.35);
  --shadow-soft:0 4px 14px rgba(0,0,0,0.4);
}

*{box-sizing:border-box;}

html,body{
  margin:0;
  padding:0;
  height:100%;
  width:100%;
  overflow-x:hidden;
}

body{
  font-family:var(--body);
  color:var(--ink);
  min-height:100dvh;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  background:
    radial-gradient(120% 90% at 50% -10%, rgba(255,255,255,0.45) 0%, rgba(255,255,255,0) 55%),
    radial-gradient(100% 80% at 50% 120%, var(--bg-2) 0%, var(--bg-1) 60%),
    var(--bg-1);
  background-attachment:fixed;
  position:relative;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}

/* Marble veining + Colosseum atmosphere overlay */
body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
  background:
    repeating-linear-gradient(118deg,
      transparent 0 40px,
      var(--marble-vein) 40px 41px,
      transparent 41px 90px),
    repeating-linear-gradient(72deg,
      transparent 0 70px,
      var(--marble-vein) 70px 71px,
      transparent 71px 150px);
  opacity:0.9;
  mix-blend-mode:multiply;
}
[data-theme="night"] body::before{mix-blend-mode:screen; opacity:0.7;}

/* Faint Colosseum arches silhouette */
body::after{
  content:"";
  position:fixed;
  left:50%;
  bottom:0;
  width:140vmax;
  height:60vmax;
  transform:translateX(-50%);
  pointer-events:none;
  z-index:0;
  opacity:0.10;
  background:
    radial-gradient(circle at 50% 100%, transparent 7vmax, var(--ink) 7vmax, var(--ink) 8vmax, transparent 8vmax) 0 0/16vmax 16vmax repeat-x;
  -webkit-mask:linear-gradient(to top, #000 0%, transparent 70%);
          mask:linear-gradient(to top, #000 0%, transparent 70%);
}
[data-theme="night"] body::after{opacity:0.16;}

/* ============ Top bar ============ */
.topbar{
  position:relative;
  z-index:3;
  flex:0 0 auto;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:clamp(8px,2vmin,18px);
  padding:clamp(10px,2.4vmin,20px) clamp(12px,3.2vmin,28px);
  background:linear-gradient(180deg, var(--panel) 0%, rgba(255,253,247,0) 100%);
  backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);
  border-bottom:1px solid var(--panel-border);
}

.crest{
  display:flex;
  align-items:center;
  gap:clamp(6px,1.4vmin,12px);
  min-width:0;
}
.crest-emblem{
  flex:0 0 auto;
  width:clamp(34px,6.2vmin,52px);
  height:clamp(34px,6.2vmin,52px);
  display:grid;
  place-items:center;
  border-radius:50%;
  background:
    radial-gradient(circle at 35% 30%, var(--gold-bright), var(--gold) 55%, var(--gold-deep) 100%);
  box-shadow:0 0 0 2px rgba(0,0,0,0.10) inset, 0 2px 8px var(--gold-glow);
  color:#3a2a08;
  font-family:var(--serif);
  font-weight:800;
  font-size:clamp(11px,2vmin,16px);
  letter-spacing:0.5px;
  text-shadow:0 1px 0 rgba(255,255,255,0.3);
}
.crest-text{display:flex; flex-direction:column; line-height:1; min-width:0;}
.crest-title{
  font-family:var(--serif);
  font-weight:700;
  font-size:clamp(15px,3vmin,24px);
  letter-spacing:clamp(1px,0.4vmin,4px);
  color:var(--ink);
  white-space:nowrap;
}
.crest-sub{
  font-family:var(--body);
  font-style:italic;
  font-size:clamp(9px,1.7vmin,13px);
  color:var(--ink-faint);
  letter-spacing:0.5px;
  white-space:nowrap;
}

.topbar-actions{
  display:flex;
  align-items:center;
  gap:clamp(6px,1.5vmin,12px);
  flex:0 0 auto;
}

/* ============ Buttons ============ */
.btn{
  font-family:var(--serif);
  font-weight:600;
  font-size:clamp(11px,2vmin,15px);
  letter-spacing:clamp(0.5px,0.18vmin,1.6px);
  text-transform:uppercase;
  color:var(--ink);
  background:linear-gradient(180deg, var(--cell-bg-hover), var(--cell-bg));
  border:1px solid var(--panel-border);
  border-radius:999px;
  padding:clamp(7px,1.7vmin,11px) clamp(12px,2.8vmin,20px);
  cursor:pointer;
  box-shadow:var(--shadow-soft);
  transition:transform .14s ease, box-shadow .14s ease, background .2s ease, color .2s ease;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
  white-space:nowrap;
}
.btn:hover{
  transform:translateY(-1px);
  box-shadow:0 8px 20px rgba(60,48,28,0.18);
  background:linear-gradient(180deg, #fff8e6, var(--cell-bg-hover));
}
[data-theme="night"] .btn:hover{background:linear-gradient(180deg, #3a3220, var(--cell-bg-hover));}
.btn:active{transform:translateY(0) scale(0.98); box-shadow:var(--shadow-soft);}
.btn:focus-visible{outline:3px solid var(--gold-glow); outline-offset:2px;}

.btn-gold{
  color:#3a2a08;
  background:linear-gradient(180deg, var(--gold-bright), var(--gold) 60%, var(--gold-deep));
  border-color:var(--gold-deep);
  text-shadow:0 1px 0 rgba(255,255,255,0.25);
}
.btn-gold:hover{background:linear-gradient(180deg, #f4cf76, var(--gold-bright) 60%, var(--gold));}

.btn-icon-only .btn-label{display:none;}

/* ============ Main stage ============ */
.stage{
  position:relative;
  z-index:2;
  flex:1 1 auto;
  display:grid;
  place-items:center;
  padding:clamp(12px,2.6vmin,26px);
  min-height:0;
}

.arena{
  width:min(92vmin, 640px);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:clamp(10px,2.2vmin,18px);
}

/* ============ Status / banner ============ */
.status{
  width:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:clamp(8px,1.8vmin,14px);
  min-height:clamp(34px,7vmin,52px);
  text-align:center;
  font-family:var(--serif);
  font-weight:600;
  font-size:clamp(13px,2.7vmin,20px);
  letter-spacing:clamp(0.5px,0.2vmin,2px);
  color:var(--ink-soft);
  padding:clamp(6px,1.4vmin,10px) clamp(10px,2.4vmin,18px);
  border-radius:var(--radius);
  background:var(--panel);
  border:1px solid var(--panel-border);
  box-shadow:var(--shadow-soft);
  backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);
  transition:background .35s ease, color .35s ease, box-shadow .35s ease;
}
.status .turn-glyph{
  font-family:var(--serif);
  font-weight:800;
  font-size:1.15em;
}
.status[data-side="X"] .turn-glyph{color:var(--x-color);}
.status[data-side="O"] .turn-glyph{color:var(--o-color);}

/* Victory banner — appears under header, never overlaps board */
.status.victory{
  color:#3a2a08;
  background:linear-gradient(90deg, var(--gold) 0%, var(--gold-bright) 50%, var(--gold) 100%);
  border-color:var(--gold-deep);
  box-shadow:0 0 0 1px var(--gold-deep) inset, 0 8px 26px var(--gold-glow);
  animation:bannerRise .45s cubic-bezier(.2,.8,.2,1) both;
}
@keyframes bannerRise{
  from{opacity:0; transform:translateY(-8px) scale(0.98);}
  to{opacity:1; transform:translateY(0) scale(1);}
}
@media (prefers-reduced-motion: reduce){
  .status.victory{animation:none;}
  *{animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important;}
}

/* ============ Board ============ */
.board-wrap{
  position:relative;
  width:100%;
}

.board{
  position:relative;
  width:100%;
  aspect-ratio:1/1;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(3,1fr);
  gap:clamp(4px,1vmin,9px);
  padding:clamp(6px,1.4vmin,12px);
  background:linear-gradient(180deg, var(--panel) 0%, var(--panel-solid) 100%);
  border:1px solid var(--panel-border);
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow), 0 0 0 1px rgba(255,255,255,0.25) inset;
  backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);
}
[data-theme="night"] .board{box-shadow:var(--shadow), 0 0 0 1px rgba(255,230,170,0.06) inset;}

/* ornamental gold corners on the board frame */
.board::before, .board::after{
  content:"";
  position:absolute;
  width:clamp(14px,3vmin,26px);
  height:clamp(14px,3vmin,26px);
  border:2px solid var(--gold);
  opacity:0.85;
  pointer-events:none;
}
.board::before{top:6px; left:6px; border-right:0; border-bottom:0; border-top-left-radius:8px;}
.board::after{bottom:6px; right:6px; border-left:0; border-top:0; border-bottom-right-radius:8px;}

.cell{
  position:relative;
  display:grid;
  place-items:center;
  background:var(--cell-bg);
  border:1px solid var(--cell-line);
  border-radius:clamp(8px,1.6vmin,14px);
  cursor:pointer;
  box-shadow:var(--shadow-soft);
  transition:transform .16s ease, background .18s ease, box-shadow .18s ease;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
  outline:none;
  overflow:hidden;
}
.cell::after{ /* subtle inner highlight */
  content:"";
  position:absolute;
  inset:0;
  border-radius:inherit;
  background:linear-gradient(180deg, rgba(255,255,255,0.25), rgba(255,255,255,0) 60%);
  pointer-events:none;
  opacity:0.6;
}
[data-theme="night"] .cell::after{background:linear-gradient(180deg, rgba(255,230,170,0.06), rgba(255,230,170,0) 60%);}

.cell:hover:not(.disabled):not(.filled){
  background:var(--cell-bg-hover);
  transform:translateY(-2px);
  box-shadow:0 10px 22px rgba(60,48,28,0.16);
}
.cell:active:not(.disabled){transform:translateY(0) scale(0.97);}
.cell:focus-visible{outline:3px solid var(--gold-glow); outline-offset:1px;}
.cell.disabled{cursor:default;}

.cell.filled{cursor:default;}

/* win highlight */
.cell.win{
  background:linear-gradient(180deg, var(--gold-bright), var(--gold));
  border-color:var(--gold-deep);
  box-shadow:0 0 0 2px var(--gold-deep) inset, 0 0 26px var(--gold-glow);
  animation:winPulse 1.6s ease-in-out infinite;
}
.cell.win .glyph{color:#3a2a08 !important; text-shadow:0 1px 0 rgba(255,255,255,0.35);}
@keyframes winPulse{
  0%,100%{box-shadow:0 0 0 2px var(--gold-deep) inset, 0 0 18px var(--gold-glow);}
  50%{box-shadow:0 0 0 2px var(--gold-deep) inset, 0 0 34px var(--gold-glow);}
}
@media (prefers-reduced-motion: reduce){.cell.win{animation:none;}}

/* Glyphs */
.glyph{
  position:relative;
  z-index:1;
  font-family:var(--serif);
  font-weight:800;
  font-size:clamp(26px,9vmin,64px);
  line-height:1;
  letter-spacing:0;
  animation:glyphIn .28s cubic-bezier(.2,.9,.25,1.2) both;
  text-shadow:0 2px 6px rgba(0,0,0,0.18);
}
@keyframes glyphIn{
  from{opacity:0; transform:scale(0.4) rotate(-6deg);}
  to{opacity:1; transform:scale(1) rotate(0);}
}
@media (prefers-reduced-motion: reduce){.glyph{animation:none;}}

.glyph.x{color:var(--x-color);}
.glyph.o{color:var(--o-color);}

/* When using sword/laurel glyphs we keep the same letter shapes but color them.
   The "Gladius/Laurel" option swaps the displayed character. */
.glyph.glyph-sword{font-size:clamp(24px,8.4vmin,60px);}
.glyph.glyph-laurel{font-size:clamp(22px,8vmin,56px);}

/* ============ Scoreboard ============ */
.scoreboard{
  width:100%;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:clamp(6px,1.4vmin,12px);
}
.score{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:2px;
  padding:clamp(8px,1.8vmin,14px) clamp(6px,1.4vmin,12px);
  background:var(--panel);
  border:1px solid var(--panel-border);
  border-radius:var(--radius);
  box-shadow:var(--shadow-soft);
  backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);
  transition:box-shadow .25s ease, border-color .25s ease;
}
.score .score-glyph{
  font-family:var(--serif);
  font-weight:700;
  font-size:clamp(12px,2.4vmin,17px);
  letter-spacing:1px;
}
.score[data-side="X"] .score-glyph{color:var(--x-color);}
.score[data-side="O"] .score-glyph{color:var(--o-color);}
.score[data-side="D"] .score-glyph{color:var(--ink-faint);}
.score .score-val{
  font-family:var(--serif);
  font-weight:800;
  font-size:clamp(20px,4.4vmin,32px);
  color:var(--ink);
  line-height:1;
  font-variant-numeric:tabular-nums;
}
.score .score-label{
  font-family:var(--body);
  font-style:italic;
  font-size:clamp(10px,1.8vmin,13px);
  color:var(--ink-faint);
  letter-spacing:0.5px;
}
.score.bump{animation:scoreBump .4s ease;}
@keyframes scoreBump{0%{transform:scale(1);}40%{transform:scale(1.12); box-shadow:0 0 20px var(--gold-glow);}100%{transform:scale(1);}}
@media (prefers-reduced-motion: reduce){.score.bump{animation:none;}}

/* ============ Confetti canvas ============ */
#confetti{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index:50;
}

/* ============ Dialog ============ */
dialog{
  border:none;
  border-radius:var(--radius-lg);
  padding:0;
  background:var(--panel-solid);
  color:var(--ink);
  box-shadow:0 24px 70px rgba(0,0,0,0.4);
  max-width:min(92vw, 460px);
  width:min(92vw, 460px);
  font-family:var(--body);
}
dialog::backdrop{background:rgba(20,16,10,0.55); backdrop-filter:blur(3px); -webkit-backdrop-filter:blur(3px);}
dialog[open]{animation:dialogIn .3s cubic-bezier(.2,.8,.2,1) both;}
@keyframes dialogIn{from{opacity:0; transform:translateY(12px) scale(0.97);} to{opacity:1; transform:none;}}
@media (prefers-reduced-motion: reduce){dialog[open]{animation:none;}}

.dialog-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:clamp(14px,3vmin,22px) clamp(16px,3.4vmin,26px);
  border-bottom:1px solid var(--panel-border);
}
.dialog-title{
  font-family:var(--serif);
  font-weight:700;
  font-size:clamp(16px,3.2vmin,22px);
  letter-spacing:1.5px;
  color:var(--ink);
}
.dialog-close{
  appearance:none;
  border:1px solid var(--panel-border);
  background:var(--cell-bg);
  color:var(--ink-soft);
  width:34px; height:34px;
  border-radius:50%;
  font-size:18px;
  line-height:1;
  cursor:pointer;
  display:grid; place-items:center;
  transition:background .15s ease, transform .15s ease, color .15s ease;
}
.dialog-close:hover{background:var(--cell-bg-hover); color:var(--ink); transform:rotate(90deg);}
.dialog-close:focus-visible{outline:3px solid var(--gold-glow); outline-offset:2px;}

.dialog-body{
  padding:clamp(12px,2.6vmin,20px) clamp(16px,3.4vmin,26px);
  display:flex;
  flex-direction:column;
  gap:clamp(14px,3vmin,20px);
  max-height:62vh;
  overflow-y:auto;
}

.option{
  display:flex;
  flex-direction:column;
  gap:clamp(6px,1.4vmin,9px);
}
.option-label{
  font-family:var(--serif);
  font-weight:600;
  font-size:clamp(12px,2.4vmin,15px);
  letter-spacing:1px;
  text-transform:uppercase;
  color:var(--ink-soft);
  display:flex;
  align-items:center;
  gap:8px;
}
.option-label .opt-hint{
  font-family:var(--body);
  font-style:italic;
  font-weight:400;
  text-transform:none;
  letter-spacing:0;
  font-size:0.92em;
  color:var(--ink-faint);
}

.seg{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  background:var(--cell-bg);
  border:1px solid var(--panel-border);
  border-radius:999px;
  padding:5px;
}
.seg-btn{
  flex:1 1 auto;
  min-width:0;
  appearance:none;
  border:none;
  background:transparent;
  color:var(--ink-soft);
  font-family:var(--serif);
  font-weight:600;
  font-size:clamp(11px,2.1vmin,14px);
  letter-spacing:0.5px;
  padding:clamp(7px,1.5vmin,10px) clamp(8px,1.8vmin,14px);
  border-radius:999px;
  cursor:pointer;
  white-space:nowrap;
  transition:background .18s ease, color .18s ease, box-shadow .18s ease;
  -webkit-tap-highlight-color:transparent;
}
.seg-btn:hover{color:var(--ink);}
.seg-btn[aria-pressed="true"]{
  background:linear-gradient(180deg, var(--gold-bright), var(--gold) 60%, var(--gold-deep));
  color:#3a2a08;
  box-shadow:0 3px 10px var(--gold-glow);
  text-shadow:0 1px 0 rgba(255,255,255,0.25);
}
.seg-btn:focus-visible{outline:3px solid var(--gold-glow); outline-offset:1px;}

.dialog-foot{
  display:flex;
  align-items:center;
  justify-content:flex-end;
  gap:10px;
  padding:clamp(12px,2.6vmin,18px) clamp(16px,3.4vmin,26px);
  border-top:1px solid var(--panel-border);
}

/* ============ Responsive tweaks ============ */
@media (max-width:520px){
  .crest-sub{display:none;}
  .topbar{padding:10px 12px;}
  .btn{padding:8px 12px; font-size:12px;}
}
@media (max-width:380px){
  .crest-title{font-size:16px;}
  .btn .btn-label{font-size:11px;}
}

/* tall screens: keep arena from overflowing */
@media (max-height:680px) and (min-width:560px){
  .arena{width:min(72vmin,520px);}
}

/* Skip link for a11y */
.skip-link{
  position:absolute;
  left:-999px;
  top:0;
  background:var(--panel-solid);
  color:var(--ink);
  padding:10px 16px;
  border-radius:8px;
  z-index:100;
  font-family:var(--serif);
}
.skip-link:focus{left:8px; top:8px;}

.sr-only{
  position:absolute; width:1px; height:1px; padding:0; margin:-1px;
  overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0;
}
</style>
</head>
<body data-theme="day">

<a class="skip-link" href="#board">Skip to game board</a>

<canvas id="confetti" aria-hidden="true"></canvas>

<header class="topbar" role="banner">
  <div class="crest">
    <div class="crest-emblem" aria-hidden="true">SPQR</div>
    <div class="crest-text">
      <span class="crest-title">SENATVS·POPVLVSQVE·ROMANVS</span>
      <span class="crest-sub">Tic Tac Toe · Arena of Strategy</span>
    </div>
  </div>
  <div class="topbar-actions">
    <button class="btn" id="btnNewRound" type="button">New Round</button>
    <button class="btn" id="btnCustomize" type="button">Customize</button>
    <button class="btn" id="btnReset" type="button">Reset Scores</button>
  </div>
</header>

<main class="stage" id="stage">
  <section class="arena" aria-label="Game arena">

    <div class="status" id="status" role="status" aria-live="polite" aria-atomic="true" data-side="X">
      <span class="turn-glyph" id="turnGlyph">X</span>
      <span id="statusText">X opens the campaign</span>
    </div>

    <div class="board-wrap">
      <div class="board" id="board" role="grid" aria-label="Tic Tac Toe board" tabindex="-1"></div>
    </div>

    <div class="scoreboard" aria-label="Scoreboard">
      <div class="score" id="scoreX" data-side="X">
        <span class="score-glyph" id="scoreXGlyph">X</span>
        <span class="score-val" id="scoreXVal">0</span>
        <span class="score-label">Victories</span>
      </div>
      <div class="score" id="scoreD" data-side="D">
        <span class="score-glyph">·</span>
        <span class="score-val" id="scoreDVal">0</span>
        <span class="score-label">Draws</span>
      </div>
      <div class="score" id="scoreO" data-side="O">
        <span class="score-glyph" id="scoreOGlyph">O</span>
        <span class="score-val" id="scoreOVal">0</span>
        <span class="score-label">Victories</span>
      </div>
    </div>

  </section>
</main>

<!-- Customize dialog -->
<dialog id="customizeDialog" aria-labelledby="customizeTitle">
  <div class="dialog-head">
    <h2 class="dialog-title" id="customizeTitle">Customize</h2>
    <button class="dialog-close" id="dialogClose" type="button" aria-label="Close customize dialog">&times;</button>
  </div>
  <div class="dialog-body">

    <div class="option">
      <span class="option-label">Theme</span>
      <div class="seg" role="group" aria-label="Theme">
        <button class="seg-btn" type="button" data-opt="theme" data-val="day" aria-pressed="true">Marble Day</button>
        <button class="seg-btn" type="button" data-opt="theme" data-val="night" aria-pressed="false">Night Legion</button>
      </div>
    </div>

    <div class="option">
      <span class="option-label">Glyphs</span>
      <div class="seg" role="group" aria-label="Glyphs">
        <button class="seg-btn" type="button" data-opt="glyphs" data-val="standard" aria-pressed="true">X / O</button>
        <button class="seg-btn" type="button" data-opt="glyphs" data-val="sword" aria-pressed="false">Gladius / Laurel</button>
      </div>
    </div>

    <div class="option">
      <span class="option-label">Mode</span>
      <div class="seg" role="group" aria-label="Mode">
        <button class="seg-btn" type="button" data-opt="mode" data-val="2p" aria-pressed="true">2 Players</button>
        <button class="seg-btn" type="button" data-opt="mode" data-val="ai" aria-pressed="false">vs AI</button>
      </div>
    </div>

    <div class="option">
      <span class="option-label">First Move</span>
      <div class="seg" role="group" aria-label="First move">
        <button class="seg-btn" type="button" data-opt="first" data-val="X" aria-pressed="true">X begins</button>
        <button class="seg-btn" type="button" data-opt="first" data-val="O" aria-pressed="false">O begins</button>
      </div>
    </div>

    <div class="option">
      <span class="option-label">AI Discipline <span class="opt-hint">— only in vs AI</span></span>
      <div class="seg" role="group" aria-label="AI discipline">
        <button class="seg-btn" type="button" data-opt="ai" data-val="perfect" aria-pressed="true">Perfect</button>
        <button class="seg-btn" type="button" data-opt="ai" data-val="pragmatic" aria-pressed="false">Pragmatic</button>
        <button class="seg-btn" type="button" data-opt="ai" data-val="reckless" aria-pressed="false">Reckless</button>
      </div>
    </div>

  </div>
  <div class="dialog-foot">
    <button class="btn btn-gold" id="dialogDone" type="button">Apply &amp; New Round</button>
  </div>
</dialog>

<script>
"use strict";
(function(){
  /* =========================================================
     SPQR Tic Tac Toe — game logic
     ========================================================= */

  const WIN_LINES = [
    [0,1,2],[3,4,5],[6,7,8],   // rows
    [0,3,6],[1,4,7],[2,5,8],   // cols
    [0,4,8],[2,4,6]            // diagonals
  ];

  // Glyph characters per option set. X always shown via x-class, O via o-class.
  const GLYPH_CHARS = {
    standard: { X:"X", O:"O" },
    sword:    { X:"⚔", O:"❀" } // crossed swords / florette laurel-ish
  };
  const GLYPH_CLASS = { X:{standard:"",sword:"glyph-sword"}, O:{standard:"",sword:"glyph-laurel"} };

  const state = {
    board: Array(9).fill(null),     // "X" | "O" | null
    current: "X",                   // whose turn
    first: "X",                     // who moves first each round
    mode: "2p",                     // "2p" | "ai"
    aiDiscipline: "perfect",        // "perfect" | "pragmatic" | "reckless"
    glyphs: "standard",             // "standard" | "sword"
    theme: "day",                   // "day" | "night"
    humanSide: "X",                 // in vs AI, which side the human plays (= first)
    scores: { X:0, O:0, D:0 },
    over: false,
    winner: null,                   // "X" | "O" | "D" | null
    winLine: null,
    busy: false,                    // AI thinking lock
  };

  const $ = (id) => document.getElementById(id);
  const boardEl  = $("board");
  const statusEl = $("status");
  const statusText = $("statusText");
  const turnGlyph = $("turnGlyph");

  /* ---------- Persistence ---------- */
  const STORE_KEY = "spqr-ttt-v1";
  function persist(){
    try{
      localStorage.setItem(STORE_KEY, JSON.stringify({
        theme:state.theme, glyphs:state.glyphs, mode:state.mode,
        first:state.first, aiDiscipline:state.aiDiscipline,
        scores:state.scores
      }));
    }catch(e){/* ignore */}
  }
  function restore(){
    try{
      const raw = localStorage.getItem(STORE_KEY);
      if(!raw) return;
      const d = JSON.parse(raw);
      if(d.theme) state.theme = d.theme;
      if(d.glyphs) state.glyphs = d.glyphs;
      if(d.mode) state.mode = d.mode;
      if(d.first) state.first = d.first;
      if(d.aiDiscipline) state.aiDiscipline = d.aiDiscipline;
      if(d.scores) state.scores = Object.assign(state.scores, d.scores);
    }catch(e){/* ignore */}
  }

  /* ---------- Rendering ---------- */
  function buildBoard(){
    boardEl.innerHTML = "";
    for(let i=0;i<9;i++){
      const cell = document.createElement("div");
      cell.className = "cell";
      cell.setAttribute("role","gridcell");
      cell.setAttribute("tabindex","0");
      cell.setAttribute("aria-label", `Cell ${i+1}, empty`);
      cell.dataset.idx = i;
      cell.addEventListener("click", () => onCellActivate(i, true));
      cell.addEventListener("keydown", (e) => {
        if(e.key === "Enter" || e.key === " "){
          e.preventDefault();
          onCellActivate(i, true);
        }
      });
      boardEl.appendChild(cell);
    }
  }

  function renderBoard(){
    const cells = boardEl.children;
    for(let i=0;i<9;i++){
      const cell = cells[i];
      const val = state.board[i];
      cell.classList.toggle("filled", !!val);
      cell.classList.toggle("disabled", state.over || state.busy || (state.mode==="ai" && state.current!==state.humanSide));
      cell.classList.toggle("win", !!(state.winLine && state.winLine.includes(i)));
      // content
      const existing = cell.querySelector(".glyph");
      if(val){
        if(!existing || existing.dataset.v !== val){
          if(existing) existing.remove();
          const g = document.createElement("span");
          g.className = "glyph " + val.toLowerCase() + " " + (GLYPH_CLASS[val][state.glyphs]||"");
          g.dataset.v = val;
          g.textContent = GLYPH_CHARS[state.glyphs][val];
          cell.appendChild(g);
        }
      } else if(existing){
        existing.remove();
      }
      // aria
      const ariaVal = val ? `${val} marker` : "empty";
      cell.setAttribute("aria-label", `Cell ${i+1}, ${ariaVal}`);
    }
  }

  function renderScores(){
    $("scoreXVal").textContent = state.scores.X;
    $("scoreOVal").textContent = state.scores.O;
    $("scoreDVal").textContent = state.scores.D;
    // glyph labels reflect chosen glyph set
    $("scoreXGlyph").textContent = GLYPH_CHARS[state.glyphs].X;
    $("scoreOGlyph").textContent = GLYPH_CHARS[state.glyphs].O;
  }

  function setStatus(text, side, isVictory){
    statusText.textContent = text;
    if(side){ statusEl.setAttribute("data-side", side); turnGlyph.textContent = (side==="X"||side==="O") ? GLYPH_CHARS[state.glyphs][side] : ""; }
    statusEl.classList.toggle("victory", !!isVictory);
  }

  function describeSide(s){
    if(s === "X") return state.glyphs==="sword" ? "Gladius" : "X";
    if(s === "O") return state.glyphs==="sword" ? "Laurel" : "O";
    return "";
  }

  function updateStatus(){
    if(state.over){
      if(state.winner === "D"){
        setStatus("A stalemate — the gods are divided", "", true);
      } else {
        const name = describeSide(state.winner);
        setStatus(`${name} triumphs — victory!`, state.winner, true);
      }
      return;
    }
    const name = describeSide(state.current);
    if(state.mode === "ai" && state.current !== state.humanSide){
      setStatus(`The legion (${name}) advances…`, state.current, false);
    } else {
      setStatus(`${name} to move`, state.current, false);
    }
  }

  /* ---------- Game flow ---------- */
  function onCellActivate(i, fromHuman){
    if(state.over || state.busy) return;
    if(state.board[i] !== null) return;
    if(state.mode === "ai" && state.current !== state.humanSide) return; // not human's turn
    placeMark(i, state.current);
  }

  function placeMark(i, player){
    state.board[i] = player;
    const winLine = checkWin(state.board, player);
    if(winLine){
      finishRound(player, winLine);
      return;
    }
    if(state.board.every(v => v !== null)){
      finishRound("D", null);
      return;
    }
    state.current = (player === "X") ? "O" : "X";
    renderBoard();
    updateStatus();
    maybeAiMove();
  }

  function finishRound(winner, winLine){
    state.over = true;
    state.winner = winner;
    state.winLine = winLine;
    if(winner === "D") state.scores.D++;
    else state.scores[winner]++;
    renderBoard();
    renderScores();
    updateStatus();
    persist();
    // bump animation
    const bumpEl = winner==="D" ? $("scoreD") : (winner==="X" ? $("scoreX") : $("scoreO"));
    bumpEl.classList.remove("bump"); void bumpEl.offsetWidth; bumpEl.classList.add("bump");
    if(winner !== "D") launchConfetti();
  }

  function newRound(){
    state.board = Array(9).fill(null);
    state.over = false;
    state.winner = null;
    state.winLine = null;
    state.busy = false;
    state.current = state.first;
    // In vs AI, human plays the "first" side by default so they can act first.
    state.humanSide = state.first;
    statusEl.classList.remove("victory");
    renderBoard();
    renderScores();
    updateStatus();
    maybeAiMove();
  }

  function resetScores(){
    state.scores = { X:0, O:0, D:0 };
    persist();
    renderScores();
    newRound();
  }

  /* ---------- Win detection ---------- */
  function checkWin(b, p){
    for(const line of WIN_LINES){
      if(b[line[0]]===p && b[line[1]]===p && b[line[2]]===p) return line;
    }
    return null;
  }

  /* ---------- AI: minimax + handicaps ---------- */
  const OTHER = { X:"O", O:"X" };

  function minimax(b, player, aiSide){
    const opp = OTHER[aiSide];
    // terminal checks
    if(checkWin(b, aiSide))  return { score: 10 - depthCount(b) };
    if(checkWin(b, opp))     return { score: depthCount(b) - 10 };
    if(b.every(v => v !== null)) return { score: 0 };

    let best = (player === aiSide) ? { score:-Infinity } : { score:Infinity };
    for(let i=0;i<9;i++){
      if(b[i] !== null) continue;
      b[i] = player;
      const next = (player === aiSide) ? opp : aiSide;
      const res = minimax(b, next, aiSide);
      b[i] = null;
      if(player === aiSide){
        if(res.score > best.score) best = { score:res.score, move:i };
      } else {
        if(res.score < best.score) best = { score:res.score, move:i };
      }
    }
    return best;
  }
  // count filled cells (used to prefer faster wins / slower losses)
  function depthCount(b){ return b.reduce((a,c)=> a + (c?1:0), 0); }

  function aiPickMove(){
    const aiSide = OTHER[state.humanSide];
    const b = state.board.slice();
    const empties = [];
    for(let i=0;i<9;i++) if(b[i]===null) empties.push(i);
    if(empties.length === 0) return null;

    const disc = state.aiDiscipline;

    // Reckless: mostly random, occasionally smart — easy to beat.
    if(disc === "reckless"){
      if(Math.random() < 0.22){
        return minimax(b, aiSide, aiSide).move;
      }
      return empties[Math.floor(Math.random()*empties.length)];
    }

    // Pragmatic: take immediate win, block immediate loss, otherwise mostly good
    // with a 35% chance of a random non-losing move (beatable but competent).
    if(disc === "pragmatic"){
      // 1. win now
      for(const i of empties){ b[i]=aiSide; if(checkWin(b,aiSide)){ b[i]=null; return i; } b[i]=null; }
      // 2. block opponent win
      const opp = OTHER[aiSide];
      for(const i of empties){ b[i]=opp; if(checkWin(b,opp)){ b[i]=null; return i; } b[i]=null; }
      // 3. sometimes random among empties
      if(Math.random() < 0.35){
        return empties[Math.floor(Math.random()*empties.length)];
      }
      // 4. prefer center, then corners, then edges (classic heuristic) blended with minimax
      const pref = [4,0,2,6,8,1,3,5,7].filter(i => empties.includes(i));
      if(Math.random() < 0.5 && pref.length){
        return pref[0];
      }
      return minimax(b, aiSide, aiSide).move;
    }

    // Perfect: full minimax. First move optimization — pick from a small strong set
    // to vary games while staying optimal.
    if(empties.length === 9){
      return [0,2,4,6,8][Math.floor(Math.random()*5)];
    }
    return minimax(b, aiSide, aiSide).move;
  }

  function maybeAiMove(){
    if(state.mode !== "ai") return;
    if(state.over) return;
    if(state.current === state.humanSide) return;
    state.busy = true;
    renderBoard(); // disables cells
    updateStatus();
    // small delay for natural pacing + to let status render
    const delay = 380 + Math.floor(Math.random()*260);
    setTimeout(() => {
      const move = aiPickMove();
      state.busy = false;
      if(move === null){ return; }
      placeMark(move, state.current);
    }, delay);
  }

  /* ---------- Confetti (canvas) ---------- */
  const cv = $("confetti");
  const ctx = cv.getContext("2d");
  let confettiPieces = [];
  let confettiRAF = null;

  function sizeCanvas(){
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    cv.width = Math.floor(window.innerWidth * dpr);
    cv.height = Math.floor(window.innerHeight * dpr);
    cv.style.width = window.innerWidth + "px";
    cv.style.height = window.innerHeight + "px";
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener("resize", sizeCanvas);
  sizeCanvas();

  function launchConfetti(){
    if(confettiPieces.length) return; // don't stack
    const reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if(reduce){ return; } // respect preference — no confetti animation
    const w = window.innerWidth, h = window.innerHeight;
    const colors = ["#e6b54a","#b8860b","#d4a746","#7a1f1f","#1f4d6b","#f4cf76","#efe6d2"];
    const count = Math.min(180, Math.max(80, Math.floor(w/7)));
    for(let i=0;i<count;i++){
      confettiPieces.push({
        x: Math.random()*w,
        y: -20 - Math.random()*h*0.4,
        w: 5 + Math.random()*7,
        h: 8 + Math.random()*10,
        color: colors[Math.floor(Math.random()*colors.length)],
        rot: Math.random()*Math.PI*2,
        vr: (Math.random()-0.5)*0.2,
        vx: (Math.random()-0.5)*1.6,
        vy: 2 + Math.random()*3,
        sway: Math.random()*Math.PI*2,
        swaySpeed: 0.02 + Math.random()*0.03,
        shape: Math.random() < 0.5 ? "rect" : "ribbon"
      });
    }
    if(!confettiRAF) confettiRAF = requestAnimationFrame(stepConfetti);
  }

  function stepConfetti(){
    const w = window.innerWidth, h = window.innerHeight;
    ctx.clearRect(0,0,w,h);
    for(let i=confettiPieces.length-1;i>=0;i--){
      const p = confettiPieces[i];
      p.sway += p.swaySpeed;
      p.x += p.vx + Math.sin(p.sway)*0.6;
      p.y += p.vy;
      p.rot += p.vr;
      if(p.y > h + 30){ confettiPieces.splice(i,1); continue; }
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      if(p.shape === "rect"){
        ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      } else {
        // ribbon: a couple of wavy segments
        ctx.beginPath();
        ctx.moveTo(-p.w/2, -p.h/2);
        ctx.quadraticCurveTo(p.w/2, 0, -p.w/2, p.h/2);
        ctx.lineWidth = p.w*0.6;
        ctx.strokeStyle = p.color;
        ctx.stroke();
      }
      ctx.restore();
    }
    if(confettiPieces.length){
      confettiRAF = requestAnimationFrame(stepConfetti);
    } else {
      confettiRAF = null;
      ctx.clearRect(0,0,w,h);
    }
  }

  /* ---------- Customize dialog ---------- */
  const dlg = $("customizeDialog");
  function openCustomize(){
    syncSegButtons();
    dlg.showModal();
    $("dialogDone").focus();
  }
  function closeCustomize(){ if(dlg.open) dlg.close(); }

  function syncSegButtons(){
    document.querySelectorAll(".seg-btn").forEach(btn => {
      const opt = btn.dataset.opt, val = btn.dataset.val;
      let active = false;
      if(opt==="theme") active = state.theme===val;
      else if(opt==="glyphs") active = state.glyphs===val;
      else if(opt==="mode") active = state.mode===val;
      else if(opt==="first") active = state.first===val;
      else if(opt==="ai") active = state.aiDiscipline===val;
      btn.setAttribute("aria-pressed", active ? "true" : "false");
    });
  }

  document.querySelectorAll(".seg-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const opt = btn.dataset.opt, val = btn.dataset.val;
      // toggle within group
      btn.parentElement.querySelectorAll(".seg-btn").forEach(b => b.setAttribute("aria-pressed","false"));
      btn.setAttribute("aria-pressed","true");
      // apply immediately for live feel
      if(opt==="theme"){ state.theme = val; document.body.setAttribute("data-theme", val); }
      else if(opt==="glyphs"){ state.glyphs = val; renderBoard(); renderScores(); updateStatus(); }
      else if(opt==="mode"){ state.mode = val; }
      else if(opt==="first"){ state.first = val; }
      else if(opt==="ai"){ state.aiDiscipline = val; }
      persist();
    });
  });

  /* ---------- Wire up buttons ---------- */
  $("btnNewRound").addEventListener("click", newRound);
  $("btnCustomize").addEventListener("click", openCustomize);
  $("btnReset").addEventListener("click", () => {
    resetScores();
  });
  $("dialogClose").addEventListener("click", closeCustomize);
  $("dialogDone").addEventListener("click", () => {
    closeCustomize();
    newRound();
  });
  dlg.addEventListener("click", (e) => {
    // click on backdrop closes
    const rect = dlg.getBoundingClientRect();
    if(e.clientX < rect.left || e.clientX > rect.right || e.clientY < rect.top || e.clientY > rect.bottom){
      closeCustomize();
    }
  });
  dlg.addEventListener("cancel", (e) => { e.preventDefault(); closeCustomize(); });

  // Keyboard shortcuts: N new round, C customize, R reset, Esc closes dialog (native)
  window.addEventListener("keydown", (e) => {
    if(dlg.open) return;
    if(e.target && (e.target.tagName === "BUTTON" || e.target.classList.contains("cell"))) {
      // allow space/enter on focused controls; don't hijack
      if(e.key === " " || e.key === "Enter") return;
    }
    if(e.key === "n" || e.key === "N"){ newRound(); }
    else if(e.key === "c" || e.key === "C"){ openCustomize(); }
    else if(e.key === "r" || e.key === "R"){ resetScores(); }
  });

  /* ---------- Init ---------- */
  restore();
  document.body.setAttribute("data-theme", state.theme);
  buildBoard();
  renderScores();
  newRound();

})();
</script>
</body>
</html>
