<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Event Countdown</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@200;400;600;800&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0:#070710;
    --bg-1:#0d0f1f;
    --glass: rgba(255,255,255,0.06);
    --glass-strong: rgba(255,255,255,0.12);
    --stroke: rgba(255,255,255,0.14);
    --stroke-strong: rgba(255,255,255,0.28);
    --text:#f5f7ff;
    --muted: rgba(245,247,255,0.62);
    --faint: rgba(245,247,255,0.40);
    --accent:#7c5cff;
    --accent-2:#22d3ee;
    --accent-3:#ff5c8a;
    --glow: 0 0 60px rgba(124,92,255,0.45);
    --ease: cubic-bezier(.22,1,.36,1);
  }

  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Space Grotesk',system-ui,sans-serif;
    background:var(--bg-0);
    color:var(--text);
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }

  /* ===== Background layers ===== */
  .bg-stage{position:fixed;inset:0;z-index:0;overflow:hidden;background:var(--bg-0)}
  .bg-image{
    position:absolute;inset:-8%;
    background-size:cover;background-position:center;
    transform:translate3d(0,0,0) scale(1.08);
    will-change:transform;
    transition:opacity .8s var(--ease);
    opacity:0;
  }
  .bg-image.active{opacity:.55}
  .bg-tint{
    position:absolute;inset:0;
    background:
      radial-gradient(120% 80% at 50% -10%, rgba(124,92,255,0.28), transparent 60%),
      radial-gradient(90% 70% at 100% 100%, rgba(34,211,238,0.18), transparent 60%),
      radial-gradient(80% 60% at 0% 100%, rgba(255,92,138,0.16), transparent 60%),
      linear-gradient(180deg, rgba(7,7,16,0.55), rgba(7,7,16,0.92));
    pointer-events:none;
  }
  .bg-grid{
    position:absolute;inset:0;
    background-image:
      linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
    background-size:64px 64px;
    mask-image:radial-gradient(120% 90% at 50% 30%, #000 30%, transparent 80%);
    pointer-events:none;
    transform:translate3d(0,0,0);
    will-change:transform;
  }
  .bg-orb{
    position:absolute;border-radius:50%;filter:blur(70px);opacity:.5;
    pointer-events:none;will-change:transform;mix-blend-mode:screen;
  }
  .orb-1{width:540px;height:540px;background:radial-gradient(circle,#7c5cff,transparent 65%);top:-12%;left:-8%}
  .orb-2{width:480px;height:480px;background:radial-gradient(circle,#22d3ee,transparent 65%);bottom:-14%;right:-6%}
  .orb-3{width:380px;height:380px;background:radial-gradient(circle,#ff5c8a,transparent 65%);top:40%;left:55%}

  /* ===== Shell layout ===== */
  .shell{
    position:relative;z-index:2;
    height:100%;display:flex;flex-direction:column;
  }

  /* ===== Top bar ===== */
  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:20px clamp(16px,4vw,40px);
    gap:16px;flex-wrap:wrap;
  }
  .brand{display:flex;align-items:center;gap:12px;font-family:'Sora';font-weight:800;letter-spacing:.02em;font-size:15px}
  .brand .dot{
    width:11px;height:11px;border-radius:50%;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));
    box-shadow:0 0 14px var(--accent);
    animation:pulse 2.4s var(--ease) infinite;
  }
  @keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.35);opacity:.6}}
  .brand small{color:var(--muted);font-weight:400;letter-spacing:.18em;font-size:11px;text-transform:uppercase}

  .top-actions{display:flex;gap:10px;align-items:center}
  .btn{
    font-family:'Space Grotesk';font-size:13.5px;font-weight:500;
    color:var(--text);background:var(--glass);
    border:1px solid var(--stroke);
    padding:10px 16px;border-radius:12px;cursor:pointer;
    display:inline-flex;align-items:center;gap:8px;
    transition:all .25s var(--ease);
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  }
  .btn:hover{background:var(--glass-strong);border-color:var(--stroke-strong);transform:translateY(-1px)}
  .btn:active{transform:translateY(0)}
  .btn svg{width:16px;height:16px}
  .btn-primary{
    background:linear-gradient(135deg,var(--accent),#5b7bff);
    border-color:transparent;color:#fff;
    box-shadow:0 8px 30px rgba(124,92,255,0.35);
  }
  .btn-primary:hover{box-shadow:0 10px 40px rgba(124,92,255,0.55)}
  .btn-ghost{background:transparent}

  /* ===== Main stage ===== */
  .stage{
    flex:1;display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    padding:8px clamp(16px,4vw,40px) 32px;
    text-align:center;position:relative;
  }

  /* Edit panel */
  .panel{
    width:min(680px,94vw);
    background:var(--glass);
    border:1px solid var(--stroke);
    border-radius:22px;
    padding:26px clamp(20px,3vw,30px);
    backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
    box-shadow:0 30px 80px rgba(0,0,0,0.45);
    animation:rise .6s var(--ease) both;
  }
  @keyframes rise{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
  .panel h2{font-family:'Sora';font-weight:600;font-size:20px;margin-bottom:4px}
  .panel .sub{color:var(--muted);font-size:13px;margin-bottom:22px}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .full{grid-column:1/-1}
  .field{display:flex;flex-direction:column;gap:7px;text-align:left}
  .field label{font-size:11.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);font-weight:500}
  .field input[type=text],.field input[type=datetime-local]{
    font-family:inherit;font-size:14.5px;color:var(--text);
    background:rgba(0,0,0,0.28);border:1px solid var(--stroke);
    padding:12px 14px;border-radius:11px;outline:none;
    transition:all .2s var(--ease);width:100%;
  }
  .field input::placeholder{color:var(--faint)}
  .field input:focus{border-color:var(--accent);background:rgba(124,92,255,0.10);box-shadow:0 0 0 4px rgba(124,92,255,0.18)}
  .field input[type=datetime-local]{color-scheme:dark}

  .drop{
    border:1.5px dashed var(--stroke-strong);border-radius:12px;
    padding:16px;display:flex;align-items:center;gap:14px;cursor:pointer;
    transition:all .25s var(--ease);background:rgba(0,0,0,0.18);
    text-align:left;
  }
  .drop:hover{border-color:var(--accent);background:rgba(124,92,255,0.08)}
  .drop.drag{border-color:var(--accent-2);background:rgba(34,211,238,0.10)}
  .drop .ic{
    width:42px;height:42px;border-radius:10px;flex:none;
    background:linear-gradient(135deg,rgba(124,92,255,0.35),rgba(34,211,238,0.25));
    display:grid;place-items:center;
  }
  .drop .ic svg{width:20px;height:20px;color:#fff}
  .drop .meta{min-width:0}
  .drop .meta b{font-size:13.5px;font-weight:600;display:block}
  .drop .meta span{font-size:12px;color:var(--muted);display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .thumb-preview{
    width:46px;height:46px;border-radius:10px;flex:none;background-size:cover;background-position:center;
    border:1px solid var(--stroke);
  }

  .panel-actions{display:flex;gap:12px;justify-content:flex-end;margin-top:24px;flex-wrap:wrap}

  /* ===== Countdown view ===== */
  .countdown{
    width:100%;display:flex;flex-direction:column;align-items:center;
    animation:rise .7s var(--ease) both;
  }
  .event-tag{
    display:inline-flex;align-items:center;gap:10px;
    font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);
    padding:8px 16px;border:1px solid var(--stroke);border-radius:999px;
    background:var(--glass);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    margin-bottom:18px;
  }
  .event-tag .live{width:7px;height:7px;border-radius:50%;background:var(--accent-3);box-shadow:0 0 10px var(--accent-3);animation:pulse 1.6s infinite}

  .event-title{
    font-family:'Sora';font-weight:200;
    font-size:clamp(28px,5.4vw,58px);
    line-height:1.05;letter-spacing:-.01em;
    max-width:14ch;margin-bottom:10px;
    background:linear-gradient(180deg,#fff,rgba(255,255,255,0.72));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  }
  .event-where{
    display:inline-flex;align-items:center;gap:8px;color:var(--muted);
    font-size:14px;margin-bottom:34px;
  }
  .event-where svg{width:15px;height:15px;color:var(--accent-2)}

  .units{
    display:flex;gap:clamp(10px,2.4vw,28px);
    justify-content:center;flex-wrap:nowrap;
  }
  .unit{
    position:relative;
    min-width:clamp(74px,13vw,150px);
    display:flex;flex-direction:column;align-items:center;
  }
  .num-wrap{
    position:relative;width:100%;
    padding:clamp(14px,2.4vw,26px) 0;
    border:1px solid var(--stroke);
    border-radius:18px;
    background:linear-gradient(180deg,rgba(255,255,255,0.07),rgba(255,255,255,0.02));
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    overflow:hidden;
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.08), 0 20px 50px rgba(0,0,0,0.35);
  }
  .num-wrap::before{
    content:"";position:absolute;inset:0;
    background:radial-gradient(80% 60% at 50% 0%, rgba(124,92,255,0.18), transparent 70%);
    pointer-events:none;
  }
  .num{
    font-family:'Sora';font-weight:800;font-variant-numeric:tabular-nums;
    font-size:clamp(40px,9vw,92px);line-height:1;
    display:block;text-align:center;
    background:linear-gradient(180deg,#fff 30%,rgba(255,255,255,0.55));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    filter:drop-shadow(0 4px 24px rgba(124,92,255,0.35));
  }
  .num.flip{animation:flip .55s var(--ease)}
  @keyframes flip{
    0%{transform:translateY(0);opacity:1}
    45%{transform:translateY(-14px);opacity:0;filter:blur(2px) drop-shadow(0 4px 24px rgba(124,92,255,0.35))}
    55%{transform:translateY(14px);opacity:0}
    100%{transform:translateY(0);opacity:1}
  }
  .lab{
    margin-top:14px;font-size:11px;letter-spacing:.28em;text-transform:uppercase;
    color:var(--faint);font-weight:500;
  }
  .sep{
    align-self:center;font-family:'Sora';font-weight:800;
    font-size:clamp(28px,6vw,56px);color:rgba(255,255,255,0.18);
    margin-top:clamp(14px,2.4vw,26px);
    animation:blink 1s steps(2,end) infinite;
  }
  @keyframes blink{50%{opacity:.25}}

  .cd-actions{margin-top:38px;display:flex;gap:12px;flex-wrap:wrap;justify-content:center}

  /* Arrived state */
  .arrived{
    text-align:center;animation:rise .8s var(--ease) both;
  }
  .arrived .big{
    font-family:'Sora';font-weight:800;font-size:clamp(40px,8vw,90px);
    background:linear-gradient(135deg,var(--accent),var(--accent-2),var(--accent-3));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    filter:drop-shadow(0 6px 40px rgba(124,92,255,0.5));
    animation:wave 2.6s var(--ease) infinite;
  }
  @keyframes wave{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
  .arrived p{color:var(--muted);margin-top:10px;font-size:15px}

  /* Confetti */
  .confetti{position:fixed;inset:0;z-index:3;pointer-events:none;overflow:hidden}

  /* Toast */
  .toast{
    position:fixed;left:50%;bottom:28px;transform:translate(-50%,30px);
    background:rgba(15,16,28,0.92);border:1px solid var(--stroke-strong);
    color:var(--text);padding:12px 18px;border-radius:12px;font-size:13.5px;
    display:flex;align-items:center;gap:10px;opacity:0;pointer-events:none;
    backdrop-filter:blur(12px);box-shadow:0 14px 40px rgba(0,0,0,0.5);
    transition:all .35s var(--ease);z-index:50;
  }
  .toast.show{opacity:1;transform:translate(-50%,0)}
  .toast svg{width:16px;height:16px;color:var(--accent-2)}

  .hidden{display:none !important}

  @media (max-width:560px){
    .grid{grid-template-columns:1fr}
    .sep{display:none}
    .units{gap:8px}
  }
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.001ms !important;animation-iteration-count:1 !important}
  }
</style>
</head>
<body>
  <div class="bg-stage" id="bgStage">
    <div class="bg-image" id="bgImage"></div>
    <div class="bg-grid" id="bgGrid"></div>
    <div class="bg-orb orb-1" id="orb1"></div>
    <div class="bg-orb orb-2" id="orb2"></div>
    <div class="bg-orb orb-3" id="orb3"></div>
    <div class="bg-tint"></div>
  </div>

  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <span class="dot"></span>
        <span>Countdown</span>
        <small>Studio</small>
      </div>
      <div class="top-actions">
        <button class="btn btn-ghost" id="editToggle" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
          <span>Edit event</span>
        </button>
      </div>
    </header>

    <main class="stage">
      <!-- Edit panel -->
      <section class="panel" id="panel" aria-label="Event details">
        <h2>Build your countdown</h2>
        <p class="sub">Set the details, drop in a background, and watch the seconds fall.</p>
        <div class="grid">
          <div class="field full">
            <label for="ev-name">Event name</label>
            <input id="ev-name" type="text" placeholder="Product Launch 2026" maxlength="60" />
          </div>
          <div class="field">
            <label for="ev-date">Date &amp; time</label>
            <input id="ev-date" type="datetime-local" />
          </div>
          <div class="field">
            <label for="ev-loc">Location</label>
            <input id="ev-loc" type="text" placeholder="San Francisco, CA" maxlength="80" />
          </div>
          <div class="field full">
            <label>Background image</label>
            <div class="drop" id="drop" tabindex="0" role="button" aria-label="Upload background image">
              <div class="ic" id="dropIcon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="m17 8-5-5-5 5"/><path d="M12 3v12"/></svg>
              </div>
              <div class="meta">
                <b id="dropTitle">Upload an image</b>
                <span id="dropHint">Drag &amp; drop or click — JPG, PNG, WebP</span>
              </div>
              <div class="thumb-preview hidden" id="thumb"></div>
            </div>
            <input id="ev-img" type="file" accept="image/*" class="hidden" />
          </div>
        </div>
        <div class="panel-actions">
          <button class="btn" id="sampleBtn" type="button">Use sample event</button>
          <button class="btn btn-primary" id="startBtn" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 7-7 7 7"/><path d="M12 19V5"/></svg>
            Start countdown
          </button>
        </div>
      </section>

      <!-- Countdown view -->
      <section class="countdown hidden" id="countdown" aria-live="polite">
        <div class="event-tag"><span class="live"></span><span id="tagText">Counting down</span></div>
        <h1 class="event-title" id="cdTitle">Event</h1>
        <div class="event-where hidden" id="cdWhere">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
          <span id="cdWhereText"></span>
        </div>
        <div class="units" id="units">
          <div class="unit"><div class="num-wrap"><span class="num" id="n-days">00</span></div><div class="lab">Days</div></div>
          <div class="sep">:</div>
          <div class="unit"><div class="num-wrap"><span class="num" id="n-hours">00</span></div><div class="lab">Hours</div></div>
          <div class="sep">:</div>
          <div class="unit"><div class="num-wrap"><span class="num" id="n-mins">00</span></div><div class="lab">Minutes</div></div>
          <div class="sep">:</div>
          <div class="unit"><div class="num-wrap"><span class="num" id="n-secs">00</span></div><div class="lab">Seconds</div></div>
        </div>
        <div class="cd-actions">
          <button class="btn btn-primary" id="calBtn" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
            <span>Save to Calendar</span>
          </button>
          <button class="btn" id="shareBtn" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="m8.6 13.5 6.8 4M15.4 6.5l-6.8 4"/></svg>
            <span>Copy link</span>
          </button>
        </div>
      </section>

      <!-- Arrived -->
      <section class="arrived hidden" id="arrived">
        <div class="big">It's happening!</div>
        <p id="arrivedSub"></p>
        <div class="cd-actions" style="margin-top:28px">
          <button class="btn btn-primary" id="calBtn2" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
            <span>Save to Calendar</span>
          </button>
        </div>
      </section>
    </main>
  </div>

  <canvas class="confetti" id="confetti"></canvas>
  <div class="toast" id="toast"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg><span id="toastMsg"></span></div>

<script>
(function(){
  "use strict";

  // ---------- Element refs ----------
  const $ = id => document.getElementById(id);
  const panel = $("panel"), countdown = $("countdown"), arrived = $("arrived");
  const nameIn = $("ev-name"), dateIn = $("ev-date"), locIn = $("ev-loc"), imgIn = $("ev-img");
  const drop = $("drop"), dropTitle = $("dropTitle"), dropHint = $("dropHint"), thumb = $("thumb");
  const cdTitle = $("cdTitle"), cdWhere = $("cdWhere"), cdWhereText = $("cdWhereText"), tagText = $("tagText");
  const nDays = $("n-days"), nHours = $("n-hours"), nMins = $("n-mins"), nSecs = $("n-secs");
  const startBtn = $("startBtn"), editToggle = $("editToggle"), sampleBtn = $("sampleBtn");
  const calBtn = $("calBtn"), calBtn2 = $("calBtn2"), shareBtn = $("shareBtn");
  const bgImage = $("bgImage"), bgGrid = $("bgGrid");
  const orb1 = $("orb1"), orb2 = $("orb2"), orb3 = $("orb3");
  const toast = $("toast"), toastMsg = $("toastMsg");
  const arrivedSub = $("arrivedSub");
  const confetti = $("confetti");

  // ---------- State ----------
  const state = {
    name: "",
    dateISO: null,
    location: "",
    bgDataUrl: null,
    running: false,
    arrived: false,
  };

  // ---------- Utilities ----------
  function pad(n){ return String(n).padStart(2,"0"); }
  function toastShow(msg){
    toastMsg.textContent = msg;
    toast.classList.add("show");
    clearTimeout(toastShow._t);
    toastShow._t = setTimeout(()=>toast.classList.remove("show"), 2400);
  }

  // ---------- Default sample ----------
  function sampleEvent(){
    const now = new Date();
    const t = new Date(now.getFullYear(), now.getMonth(), now.getDate()+37, 19, 30);
    nameIn.value = "Aurora Product Launch";
    dateIn.value = localDTValue(t);
    locIn.value = "Pier 70, San Francisco";
  }
  function localDTValue(d){
    // produce yyyy-MM-ddThh:mm in local time for datetime-local input
    const off = d.getTimezoneOffset();
    const local = new Date(d.getTime() - off*60000);
    return local.toISOString().slice(0,16);
  }

  // ---------- Background image handling ----------
  function setImage(dataUrl){
    state.bgDataUrl = dataUrl;
    if(dataUrl){
      bgImage.style.backgroundImage = `url("${dataUrl}")`;
      bgImage.classList.add("active");
      thumb.style.backgroundImage = `url("${dataUrl}")`;
      thumb.classList.remove("hidden");
      const icon = $("dropIcon");
      dropTitle.textContent = "Background set";
      dropHint.textContent = "Click to replace";
    } else {
      bgImage.style.backgroundImage = "";
      bgImage.classList.remove("active");
      thumb.classList.add("hidden");
      dropTitle.textContent = "Upload an image";
      dropHint.textContent = "Drag & drop or click — JPG, PNG, WebP";
    }
  }
  function readFile(file){
    if(!file || !file.type.startsWith("image/")){ toastShow("Please choose an image file"); return; }
    if(file.size > 8*1024*1024){ toastShow("Image must be under 8 MB"); return; }
    const r = new FileReader();
    r.onload = e => setImage(e.target.result);
    r.readAsDataURL(file);
  }
  drop.addEventListener("click", ()=>imgIn.click());
  drop.addEventListener("keydown", e=>{ if(e.key==="Enter"||e.key===" "){e.preventDefault();imgIn.click();} });
  imgIn.addEventListener("change", e=>readFile(e.target.files[0]));
  ["dragenter","dragover"].forEach(ev=>drop.addEventListener(ev, e=>{e.preventDefault();drop.classList.add("drag");}));
  ["dragleave","drop"].forEach(ev=>drop.addEventListener(ev, e=>{e.preventDefault();drop.classList.remove("drag");}));
  drop.addEventListener("drop", e=>{ const f = e.dataTransfer.files[0]; readFile(f); });

  // ---------- Parallax ----------
  let px = 0, py = 0, tx = 0, ty = 0;
  window.addEventListener("mousemove", e=>{
    tx = (e.clientX / window.innerWidth - 0.5);
    ty = (e.clientY / window.innerHeight - 0.5);
  });
  window.addEventListener("deviceorientation", e=>{
    if(e.gamma==null) return;
    tx = Math.max(-1, Math.min(1, e.gamma/45));
    ty = Math.max(-1, Math.min(1, e.beta/45));
  });
  function parallaxLoop(){
    px += (tx - px) * 0.06;
    py += (ty - py) * 0.06;
    bgImage.style.transform = `translate3d(${px*-26}px, ${py*-26}px, 0) scale(1.12)`;
    bgGrid.style.transform = `translate3d(${px*18}px, ${py*18}px, 0)`;
    orb1.style.transform = `translate3d(${px*40}px, ${py*40}px, 0)`;
    orb2.style.transform = `translate3d(${px*-34}px, ${py*-34}px, 0)`;
    orb3.style.transform = `translate3d(${px*22}px, ${py*-22}px, 0)`;
    requestAnimationFrame(parallaxLoop);
  }
  parallaxLoop();

  // ---------- Countdown logic ----------
  let last = {d:"",h:"",m:"",s:""};
  let timer = null;

  function setNum(el, val, key){
    if(last[key] === val) return;
    last[key] = val;
    el.textContent = val;
    el.classList.remove("flip");
    // reflow to restart animation
    void el.offsetWidth;
    el.classList.add("flip");
  }

  function tick(){
    if(!state.dateISO){ return; }
    const target = new Date(state.dateISO).getTime();
    const now = Date.now();
    let diff = target - now;

    if(diff <= 0){
      setNum(nDays, "00","d");
      setNum(nHours, "00","h");
      setNum(nMins, "00","m");
      setNum(nSecs, "00","s");
      if(!state.arrived){
        state.arrived = true;
        showArrived();
      }
      return;
    }

    const days = Math.floor(diff/86400000); diff %= 86400000;
    const hours = Math.floor(diff/3600000); diff %= 3600000;
    const mins = Math.floor(diff/60000); diff %= 60000;
    const secs = Math.floor(diff/1000);

    setNum(nDays, pad(days),"d");
    setNum(nHours, pad(hours),"h");
    setNum(nMins, pad(mins),"m");
    setNum(nSecs, pad(secs),"s");
  }

  function startTimer(){
    clearInterval(timer);
    tick();
    timer = setInterval(tick, 1000);
  }

  function showArrived(){
    countdown.classList.add("hidden");
    arrived.classList.remove("hidden");
    arrivedSub.textContent = state.name ? state.name + " is live." : "The moment is here.";
    burstConfetti();
  }

  // ---------- Start / edit flow ----------
  function startCountdown(){
    const name = nameIn.value.trim();
    const dateVal = dateIn.value;
    const loc = locIn.value.trim();

    if(!name){ toastShow("Add an event name"); nameIn.focus(); return; }
    if(!dateVal){ toastShow("Pick a date and time"); dateIn.focus(); return; }

    const target = new Date(dateVal).getTime();
    if(isNaN(target)){ toastShow("That date doesn't look right"); return; }

    state.name = name;
    state.dateISO = dateVal;
    state.location = loc;
    state.arrived = false;

    cdTitle.textContent = name;
    if(loc){ cdWhereText.textContent = loc; cdWhere.classList.remove("hidden"); }
    else { cdWhere.classList.add("hidden"); }

    // tag label
    const future = target > Date.now();
    tagText.textContent = future ? "Counting down" : "Time's up";

    panel.classList.add("hidden");
    arrived.classList.add("hidden");
    countdown.classList.remove("hidden");
    state.running = true;

    last = {d:"",h:"",m:"",s:""};
    startTimer();
  }

  function openEditor(){
    panel.classList.remove("hidden");
    countdown.classList.add("hidden");
    arrived.classList.add("hidden");
    clearInterval(timer);
    state.running = false;
  }

  startBtn.addEventListener("click", startCountdown);
  editToggle.addEventListener("click", ()=>{
    if(panel.classList.contains("hidden")) openEditor();
    else if(state.dateISO) { panel.classList.add("hidden"); countdown.classList.remove("hidden"); startTimer(); }
  });
  sampleBtn.addEventListener("click", sampleEvent);

  // ---------- Save to Calendar (.ics) ----------
  function formatICS(d){
    // d is a Date; produce UTC yyyymmddThhmmssZ
    const p = n => String(n).padStart(2,"0");
    return d.getUTCFullYear() +
      p(d.getUTCMonth()+1) + p(d.getUTCDate()) + "T" +
      p(d.getUTCHours()) + p(d.getUTCMinutes()) + p(d.getUTCSeconds()) + "Z";
  }
  function downloadICS(){
    if(!state.dateISO){ toastShow("Set up an event first"); return; }
    const start = new Date(state.dateISO);
    if(isNaN(start.getTime())){ toastShow("Invalid event date"); return; }
    const end = new Date(start.getTime() + 2*3600000); // 2h event
    const esc = s => (s||"").replace(/\\/g,"\\\\").replace(/;/g,"\\;").replace(/,/g,"\\,").replace(/\n/g,"\\n");
    const ics = [
      "BEGIN:VCALENDAR",
      "VERSION:2.0",
      "PRODID:-//Countdown Studio//EN",
      "CALSCALE:GREGORIAN",
      "METHOD:PUBLISH",
      "BEGIN:VEVENT",
      "UID:" + Date.now() + "-countdown@studio.local",
      "DTSTAMP:" + formatICS(new Date()),
      "DTSTART:" + formatICS(start),
      "DTEND:" + formatICS(end),
      "SUMMARY:" + esc(state.name || "Event"),
      "LOCATION:" + esc(state.location || ""),
      "DESCRIPTION:" + esc("Counting down to " + (state.name || "our event") + "."),
      "BEGIN:VALARM",
      "ACTION:DISPLAY",
      "DESCRIPTION:" + esc(state.name || "Event reminder"),
      "TRIGGER:-PT15M",
      "END:VALARM",
      "END:VEVENT",
      "END:VCALENDAR"
    ].join("\r\n") + "\r\n";

    const blob = new Blob([ics], {type:"text/calendar;charset=utf-8"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const safe = (state.name||"event").replace(/[^a-z0-9]+/gi,"-").replace(/^-+|-+$/g,"").toLowerCase() || "event";
    a.href = url; a.download = safe + ".ics";
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 1000);
    toastShow("Calendar file downloaded — open it to save");
  }
  calBtn.addEventListener("click", downloadICS);
  calBtn2.addEventListener("click", downloadICS);

  // ---------- Share link (encodes state into URL hash) ----------
  function buildLink(){
    if(!state.dateISO) return location.href.split("#")[0];
    const payload = {
      n: state.name,
      d: state.dateISO,
      l: state.location
    };
    return location.origin + location.pathname + "#" + encodeURIComponent(JSON.stringify(payload));
  }
  shareBtn.addEventListener("click", ()=>{
    const link = buildLink();
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(link).then(
        ()=>toastShow("Share link copied to clipboard"),
        ()=>{ prompt("Copy this link:", link); }
      );
    } else {
      prompt("Copy this link:", link);
    }
  });

  // ---------- Restore from URL hash ----------
  function restoreFromHash(){
    if(!location.hash || location.hash.length < 2) return false;
    try{
      const data = JSON.parse(decodeURIComponent(location.hash.slice(1)));
      if(data.n) nameIn.value = data.n;
      if(data.d) dateIn.value = data.d.slice(0,16);
      if(data.l) locIn.value = data.l || "";
      return !!data.d;
    }catch(e){ return false; }
  }

  // ---------- Confetti on arrival ----------
  const ctx = confetti.getContext("2d");
  let pieces = [], confRunning = false;
  function sizeConf(){ confetti.width = window.innerWidth; confetti.height = window.innerHeight; }
  sizeConf(); window.addEventListener("resize", sizeConf);

  function spawnConfetti(){
    const colors = ["#7c5cff","#22d3ee","#ff5c8a","#ffd166","#ffffff"];
    for(let i=0;i<160;i++){
      pieces.push({
        x: confetti.width/2 + (Math.random()-0.5)*60,
        y: confetti.height*0.42,
        vx: (Math.random()-0.5)*16,
        vy: (Math.random()*-14)-4,
        g: 0.35 + Math.random()*0.2,
        size: 6 + Math.random()*7,
        rot: Math.random()*Math.PI*2,
        vr: (Math.random()-0.5)*0.3,
        color: colors[(Math.random()*colors.length)|0],
        life: 0,
        shape: Math.random() > 0.5 ? "rect" : "circ"
      });
    }
    if(!confRunning){ confRunning = true; requestAnimationFrame(confLoop); }
  }
  function burstConfetti(){ spawnConfetti(); setTimeout(spawnConfetti, 350); setTimeout(spawnConfetti, 750); }
  function confLoop(){
    ctx.clearRect(0,0,confetti.width,confetti.height);
    let alive = 0;
    for(const p of pieces){
      if(p.dead) continue;
      p.vy += p.g; p.x += p.vx; p.y += p.vy; p.rot += p.vr; p.vx *= 0.99; p.life++;
      if(p.y > confetti.height + 30 || p.x < -40 || p.x > confetti.width + 40){ p.dead = true; continue; }
      alive++;
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot); ctx.fillStyle = p.color; ctx.globalAlpha = Math.max(0, 1 - p.life/260);
      if(p.shape==="rect"){ ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size*0.6); }
      else { ctx.beginPath(); ctx.arc(0,0,p.size/2,0,Math.PI*2); ctx.fill(); }
      ctx.restore();
    }
    if(alive === 0){ confRunning = false; pieces = []; ctx.clearRect(0,0,confetti.width,confetti.height); return; }
    requestAnimationFrame(confLoop);
  }

  // ---------- Init ----------
  (function init(){
    // sensible default date: 30 days from now at 7pm
    const def = new Date(); def.setDate(def.getDate()+30); def.setHours(19,30,0,0);
    dateIn.value = localDTValue(def);

    if(restoreFromHash()){
      // auto-start if a shared event is in the URL
      startCountdown();
    }
  })();
})();
</script>
</body>
