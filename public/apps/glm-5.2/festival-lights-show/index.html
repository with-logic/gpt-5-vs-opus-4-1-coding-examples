<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Festival Lights Show</title>
<style>
  :root{
    --bg:#05060f;
    --panel:rgba(18,20,40,0.55);
    --panel-border:rgba(255,255,255,0.08);
    --text:#eef0ff;
    --muted:#8a8fb8;
    --accent:#ff2d95;
    --accent2:#22d3ee;
    --accent3:#a855f7;
    --glow:0 0 24px rgba(255,45,149,.55);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--text);font-family:"Segoe UI",Inter,system-ui,sans-serif;overflow:hidden}
  #app{position:fixed;inset:0;display:flex;flex-direction:column}

  /* Animated backdrop */
  #bgfx{position:fixed;inset:0;z-index:0;pointer-events:none}
  #stage{position:relative;flex:1;z-index:1;min-height:0}
  canvas#lights{position:absolute;inset:0;width:100%;height:100%;display:block}

  /* Top bar */
  #topbar{
    position:relative;z-index:3;display:flex;align-items:center;justify-content:space-between;
    padding:14px 22px;gap:16px;flex-wrap:wrap;
    background:linear-gradient(180deg,rgba(0,0,0,.45),rgba(0,0,0,0));
    pointer-events:none;
  }
  #topbar > *{pointer-events:auto}
  .brand{display:flex;align-items:center;gap:12px}
  .logo{
    width:40px;height:40px;border-radius:12px;
    background:conic-gradient(from 0deg,#ff2d95,#a855f7,#22d3ee,#facc15,#22ee88,#ff2d95);
    box-shadow:var(--glow);animation:spin 8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  .brand h1{font-size:18px;margin:0;letter-spacing:.5px;font-weight:800;
    background:linear-gradient(90deg,#fff,#ffd6ec,#bdeeff);-webkit-background-clip:text;background-clip:text;color:transparent}
  .brand p{margin:0;font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
  .meta{display:flex;gap:10px;align-items:center}
  .chip{
    display:flex;align-items:center;gap:8px;padding:7px 13px;border-radius:999px;
    background:var(--panel);border:1px solid var(--panel-border);backdrop-filter:blur(10px);
    font-size:12px;color:var(--muted)
  }
  .dot{width:9px;height:9px;border-radius:50%;background:#3a3f5e}
  .dot.live{background:#ff3b6b;box-shadow:0 0 12px #ff3b6b;animation:pulse 1s infinite}
  @keyframes pulse{50%{opacity:.35}}

  /* Control dock */
  #dock{
    position:relative;z-index:3;display:flex;flex-direction:column;gap:12px;
    padding:14px 22px 20px;
    background:linear-gradient(0deg,rgba(0,0,0,.6),rgba(0,0,0,0));
  }
  .panel{
    background:var(--panel);border:1px solid var(--panel-border);border-radius:18px;
    backdrop-filter:blur(14px);padding:14px 16px;
    box-shadow:0 10px 40px rgba(0,0,0,.35);
  }
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-right:6px}

  .btn{
    appearance:none;border:1px solid var(--panel-border);background:rgba(255,255,255,.04);
    color:var(--text);padding:9px 14px;border-radius:12px;font-size:13px;cursor:pointer;
    transition:.18s transform,.18s background,.18s box-shadow,.18s border-color;
    display:inline-flex;align-items:center;gap:8px;user-select:none;
  }
  .btn:hover{background:rgba(255,255,255,.09);transform:translateY(-1px)}
  .btn:active{transform:translateY(0)}
  .btn.primary{
    background:linear-gradient(90deg,var(--accent),var(--accent3));
    border-color:transparent;font-weight:700;box-shadow:0 6px 20px rgba(255,45,149,.4)
  }
  .btn.primary:hover{box-shadow:0 8px 28px rgba(255,45,149,.6)}
  .btn.active{border-color:var(--accent2);box-shadow:0 0 0 1px var(--accent2),0 0 16px rgba(34,211,238,.4);background:rgba(34,211,238,.12)}
  .btn .ic{width:15px;height:15px;display:inline-block}

  .seg{display:flex;gap:4px;padding:4px;background:rgba(0,0,0,.3);border-radius:12px;border:1px solid var(--panel-border)}
  .seg .btn{border:none;background:transparent;padding:7px 11px;border-radius:9px}
  .seg .btn.active{background:linear-gradient(90deg,var(--accent3),var(--accent2));color:#04121a;font-weight:700;box-shadow:none}

  .grid-patterns{display:grid;grid-template-columns:repeat(auto-fill,minmax(118px,1fr));gap:8px}
  .pat{
    cursor:pointer;border:1px solid var(--panel-border);border-radius:14px;padding:10px;
    background:rgba(255,255,255,.03);transition:.18s;position:relative;overflow:hidden;
  }
  .pat:hover{background:rgba(255,255,255,.07);transform:translateY(-2px)}
  .pat.active{border-color:var(--accent);box-shadow:0 0 18px rgba(255,45,149,.45)}
  .pat .swatch{height:30px;border-radius:8px;margin-bottom:8px;position:relative;overflow:hidden}
  .pat .name{font-size:12px;font-weight:600;text-align:center}

  /* Sliders */
  .slider{display:flex;align-items:center;gap:10px;min-width:150px}
  .slider input[type=range]{
    -webkit-appearance:none;appearance:none;height:5px;border-radius:5px;
    background:linear-gradient(90deg,var(--accent2),var(--accent3),var(--accent));
    flex:1;outline:none;
  }
  .slider input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#fff;
    box-shadow:0 0 10px rgba(255,255,255,.8);cursor:pointer
  }
  .slider input[type=range]::-moz-range-thumb{width:16px;height:16px;border:none;border-radius:50%;background:#fff;box-shadow:0 0 10px rgba(255,255,255,.8);cursor:pointer}
  .slider .val{font-size:11px;color:var(--muted);width:42px;text-align:right;font-variant-numeric:tabular-nums}

  /* Palette chips */
  .palettes{display:flex;gap:8px;flex-wrap:wrap}
  .pal{
    cursor:pointer;border-radius:10px;border:2px solid transparent;padding:3px;transition:.18s;
  }
  .pal:hover{transform:translateY(-2px)}
  .pal.active{border-color:#fff;box-shadow:0 0 14px rgba(255,255,255,.5)}
  .pal .strip{width:64px;height:22px;border-radius:7px}

  /* Spectrum */
  #spec{position:absolute;left:0;right:0;bottom:0;height:60px;z-index:2;pointer-events:none;opacity:.85}

  /* Music note flash */
  .beat-ring{position:absolute;border:2px solid rgba(255,255,255,.7);border-radius:50%;pointer-events:none}

  .hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2;
    text-align:center;color:var(--muted);font-size:14px;pointer-events:none;opacity:0;transition:.4s}
  .hint.show{opacity:1}

  @media (max-width:760px){
    #topbar{padding:10px 14px}
    .brand h1{font-size:15px}
    #dock{padding:10px 12px 14px}
    .panel{padding:10px 12px}
  }
</style>
</head>
<body>
<div id="app">
  <canvas id="bgfx"></canvas>

  <div id="topbar">
    <div class="brand">
      <div class="logo"></div>
      <div>
        <h1>FESTIVAL LIGHTS SHOW</h1>
        <p>Virtual Stage Control</p>
      </div>
    </div>
    <div class="meta">
      <div class="chip"><span class="dot" id="liveDot"></span><span id="liveTxt">STANDBY</span></div>
      <div class="chip"><span id="fpsTxt">— fps</span></div>
      <div class="chip"><span id="patTxt">Pattern: —</span></div>
    </div>
  </div>

  <div id="stage">
    <canvas id="lights"></canvas>
    <canvas id="spec"></canvas>
    <div class="hint" id="hint">Drop an audio file or hit Play to start the beat</div>
  </div>

  <div id="dock">
    <div class="panel row" style="justify-content:space-between">
      <div class="row">
        <button class="btn primary" id="playBtn">▶ Play Beat</button>
        <button class="btn" id="loadBtn">♪ Load Track</button>
        <input type="file" id="fileIn" accept="audio/*" style="display:none">
        <div class="seg" id="srcSeg">
          <button class="btn active" data-src="synth">Synth</button>
          <button class="btn" data-src="track">Track</button>
          <button class="btn" data-src="mic">Mic</button>
        </div>
      </div>
      <div class="row">
        <div class="slider"><span class="label">BPM</span><input type="range" id="bpm" min="60" max="180" value="120"><span class="val" id="bpmVal">120</span></div>
        <div class="slider"><span class="label">Speed</span><input type="range" id="speed" min="20" max="200" value="100"><span class="val" id="speedVal">1.0×</span></div>
        <div class="slider"><span class="label">Glow</span><input type="range" id="glow" min="0" max="100" value="60"><span class="val" id="glowVal">60</span></div>
      </div>
    </div>

    <div class="panel">
      <div class="row" style="margin-bottom:10px">
        <span class="label">Pattern</span>
      </div>
      <div class="grid-patterns" id="patternGrid"></div>
    </div>

    <div class="panel row" style="justify-content:space-between;align-items:flex-start">
      <div>
        <div class="label" style="display:block;margin-bottom:8px">Palette</div>
        <div class="palettes" id="paletteList"></div>
      </div>
      <div class="row" style="align-items:flex-end;gap:18px">
        <div>
          <div class="label" style="display:block;margin-bottom:6px">Color Mode</div>
          <div class="seg" id="modeSeg">
            <button class="btn active" data-mode="cycle">Cycle</button>
            <button class="btn" data-mode="spread">Spread</button>
            <button class="btn" data-mode="solid">Solid</button>
          </div>
        </div>
        <div>
          <div class="label" style="display:block;margin-bottom:6px">Sync</div>
          <div class="seg" id="syncSeg">
            <button class="btn active" data-sync="on">Music</button>
            <button class="btn" data-sync="off">Free</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
(() => {
  "use strict";

  // ---------- Palettes ----------
  const PALETTES = [
    {name:"Aurora", colors:["#22d3ee","#a855f7","#ff2d95","#facc15"]},
    {name:"Sunset", colors:["#ff6a00","#ff2d95","#a855f7","#ffd166"]},
    {name:"Neon",   colors:["#39ff14","#00f0ff","#ff00e6","#ffe600"]},
    {name:"Candy",  colors:["#ff8fb1","#ffd6a5","#a0c4ff","#caffbf"]},
    {name:"Fire",   colors:["#ff1f1f","#ff7b00","#ffd000","#ff4e00"]},
    {name:"Ocean",  colors:["#0077ff","#00d4ff","#22ee88","#a855f7"]},
  ];

  // ---------- Patterns ----------
  const PATTERNS = ["Ripple","Chase","Strobe","Wave","Spiral","Pulse","Matrix","Comet","Rainbow","Orbit"];
  const PAT_SWATCH = {
    Ripple:["radial-gradient(circle,#fff,#ff2d95 40%,#05060f)"],
    Chase:["linear-gradient(90deg,#22d3ee,#a855f7,#ff2d95,#05060f)"],
    Strobe:["repeating-linear-gradient(90deg,#fff 0 6px,#111 6px 12px)"],
    Wave:["linear-gradient(90deg,#22d3ee,#a855f7,#ff2d95,#facc15)"],
    Spiral:["conic-gradient(from 0deg,#22d3ee,#a855f7,#ff2d95,#facc15,#22d3ee)"],
    Pulse:["radial-gradient(circle,#fff,#a855f7 50%,#05060f)"],
    Matrix:["linear-gradient(#22ee88 0 100%)"],
    Comet:["linear-gradient(90deg,#05060f,#fff,#22d3ee)"],
    Rainbow:["linear-gradient(90deg,#ff0040,#ff8a00,#facc15,#22ee88,#22d3ee,#a855f7)"],
    Orbit:["conic-gradient(from 0deg,#fff,#ff2d95,#05060f,#22d3ee,#fff)"],
  };

  // ---------- State ----------
  const state = {
    pattern: "Ripple",
    paletteIdx: 0,
    mode: "cycle",      // cycle | spread | solid
    sync: "on",         // on | off
    bpm: 120,
    speed: 1.0,
    glow: 0.6,
    src: "synth",
    playing: false,
    beat: 0,            // 0..1 envelope on kick
    energy: 0,          // smoothed bass energy
    time: 0,
  };

  // ---------- DOM ----------
  const $ = s => document.querySelector(s);
  const lights = $("#lights");
  const bgfx = $("#bgfx");
  const spec = $("#spec");
  const lctx = lights.getContext("2d");
  const bctx = bgfx.getContext("2d");
  const sctx = spec.getContext("2d");

  // ---------- Build UI ----------
  const patternGrid = $("#patternGrid");
  PATTERNS.forEach(name=>{
    const el = document.createElement("div");
    el.className = "pat" + (name===state.pattern?" active":"");
    el.dataset.name = name;
    el.innerHTML = `<div class="swatch" style="background:${PAT_SWATCH[name][0]}"></div><div class="name">${name}</div>`;
    el.onclick = ()=>{
      state.pattern = name;
      document.querySelectorAll(".pat").forEach(p=>p.classList.toggle("active",p.dataset.name===name));
      $("#patTxt").textContent = "Pattern: "+name;
    };
    patternGrid.appendChild(el);
  });
  $("#patTxt").textContent = "Pattern: "+state.pattern;

  const paletteList = $("#paletteList");
  PALETTES.forEach((p,i)=>{
    const el = document.createElement("div");
    el.className = "pal" + (i===state.paletteIdx?" active":"");
    el.title = p.name;
    const grad = `linear-gradient(90deg,${p.colors.join(",")})`;
    el.innerHTML = `<div class="strip" style="background:${grad}"></div>`;
    el.onclick = ()=>{
      state.paletteIdx = i;
      document.querySelectorAll(".pal").forEach((q,j)=>q.classList.toggle("active",j===i));
    };
    paletteList.appendChild(el);
  });

  // Segments
  const bindSeg = (sel, key, valAttr="data-src") => {
    document.querySelectorAll(`${sel} .btn`).forEach(b=>{
      b.onclick = ()=>{
        document.querySelectorAll(`${sel} .btn`).forEach(x=>x.classList.remove("active"));
        b.classList.add("active");
        const v = b.getAttribute(valAttr);
        if(sel==="#srcSeg"){ setSource(v); }
        else if(sel==="#modeSeg"){ state.mode = v; }
        else if(sel==="#syncSeg"){ state.sync = v; }
      };
    });
  };
  bindSeg("#srcSeg","src","data-src");
  bindSeg("#modeSeg","mode","data-mode");
  bindSeg("#syncSeg","sync","data-sync");

  // Sliders
  const bpmIn = $("#bpm"), speedIn = $("#speed"), glowIn = $("#glow");
  bpmIn.oninput = ()=>{ state.bpm = +bpmIn.value; $("#bpmVal").textContent = bpmIn.value; };
  speedIn.oninput = ()=>{ state.speed = +speedIn.value/100; $("#speedVal").textContent = state.speed.toFixed(1)+"×"; };
  glowIn.oninput = ()=>{ state.glow = +glowIn.value/100; $("#glowVal").textContent = glowIn.value; };

  // ---------- Resize ----------
  function resize(){
    const dpr = Math.min(window.devicePixelRatio||1, 2);
    [lights,bgfx,spec].forEach(c=>{
      const r = c.getBoundingClientRect();
      c.width = Math.max(1, Math.floor(r.width*dpr));
      c.height = Math.max(1, Math.floor(r.height*dpr));
      c.getContext("2d").setTransform(dpr,0,0,dpr,0,0);
    });
  }
  window.addEventListener("resize", resize);

  // ---------- Color helpers ----------
  function hexToRgb(h){
    h=h.replace("#","");
    if(h.length===3) h=h.split("").map(x=>x+x).join("");
    const n=parseInt(h,16);
    return [(n>>16)&255,(n>>8)&255,n&255];
  }
  function rgbStr(r,g,b,a=1){ return `rgba(${r|0},${g|0},${b|0},${a})`; }
  function lerp(a,b,t){ return a+(b-a)*t; }
  function paletteColor(i, n, t){
    const pal = PALETTES[state.paletteIdx].colors;
    if(state.mode==="solid") return hexToRgb(pal[0]);
    if(state.mode==="spread"){
      const idx = (i % pal.length + pal.length) % pal.length;
      return hexToRgb(pal[idx]);
    }
    // cycle: animate around palette
    const f = (i/Math.max(1,n) + t) % 1 * pal.length;
    const k = Math.floor(f), frac = f-k;
    const a = hexToRgb(pal[k%pal.length]);
    const b = hexToRgb(pal[(k+1)%pal.length]);
    return [lerp(a[0],b[0],frac), lerp(a[1],b[1],frac), lerp(a[2],b[2],frac)];
  }

  // ---------- Audio ----------
  let actx=null, analyser=null, audioEl=null, micStream=null, synthNode=null, trackSrc=null;
  let freqData=null, beatHistory=[];
  let lastBeatTime=0;

  function ensureCtx(){
    if(!actx){
      actx = new (window.AudioContext||window.webkitAudioContext)();
      analyser = actx.createAnalyser();
      analyser.fftSize = 1024;
      analyser.smoothingTimeConstant = 0.8;
      freqData = new Uint8Array(analyser.frequencyBinCount);
    }
    if(actx.state==="suspended") actx.resume();
    return actx;
  }

  function disconnectAll(){
    try{ if(trackSrc){trackSrc.disconnect();trackSrc=null;} }catch(e){}
    try{ if(synthNode){synthNode.stop();synthNode=null;} }catch(e){}
    try{ if(micStream){micicStop(micStream);micStream=null;} }catch(e){}
  }
  function micicStop(s){ s.getTracks().forEach(t=>t.stop()); }

  // Built-in synth beat generator
  function startSynth(){
    const ctx = ensureCtx();
    analyser.connect(ctx.destination);
    const master = ctx.createGain(); master.gain.value=0.9; master.connect(analyser); master.connect(ctx.destination);
    const stepDur = 60/state.bpm/4; // 16th notes
    let step=0, nextTime=ctx.currentTime+0.05;
    const schedTimer = setInterval(()=>{
      while(nextTime < ctx.currentTime+0.2){
        scheduleStep(ctx, master, step, nextTime);
        nextTime += stepDur;
        step=(step+1)%16;
      }
    }, 50);
    synthNode = { stop(){ clearInterval(schedTimer); try{master.disconnect();}catch(e){} }, _sched:schedTimer };
  }
  function scheduleStep(ctx, dest, step, t){
    const s = step%16;
    // Kick on 0,4,8,12
    if(s%4===0) kick(ctx,dest,t, s===0?1:0.8);
    // Snare on 4,12
    if(s===4||s===12) snare(ctx,dest,t);
    // Hats on offbeats
    if(s%2===1) hat(ctx,dest,t, 0.25);
    // Bass note pattern
    const bassNotes = [55,0,55,0, 73,0,55,0, 65,0,55,0, 73,0,82,0];
    if(bassNotes[s]) bass(ctx,dest,t, bassNotes[s]);
    // Lead stab
    if(s===0||s===8){ chord(ctx,dest,t,[220,277,330],0.25); }
  }
  function kick(ctx,dest,t,vol=1){
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.frequency.setValueAtTime(150,t); o.frequency.exponentialRampToValueAtTime(45,t+0.12);
    g.gain.setValueAtTime(0.9*vol,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.25);
    o.connect(g); g.connect(dest); o.start(t); o.stop(t+0.28);
  }
  function snare(ctx,dest,t){
    const n=ctx.createBufferSource(); const b=ctx.createBuffer(1, ctx.sampleRate*0.2, ctx.sampleRate);
    const d=b.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);
    n.buffer=b; const g=ctx.createGain(); g.gain.value=0.35; const f=ctx.createBiquadFilter(); f.type="highpass"; f.frequency.value=1500;
    n.connect(f); f.connect(g); g.connect(dest); n.start(t);
  }
  function hat(ctx,dest,t,vol){
    const n=ctx.createBufferSource(); const b=ctx.createBuffer(1, ctx.sampleRate*0.05, ctx.sampleRate);
    const d=b.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1);
    n.buffer=b; const g=ctx.createGain(); g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.05);
    const f=ctx.createBiquadFilter(); f.type="highpass"; f.frequency.value=7000;
    n.connect(f); f.connect(g); g.connect(dest); n.start(t);
  }
  function bass(ctx,dest,t,freq){
    const o=ctx.createOscillator(),g=ctx.createGain(),f=ctx.createBiquadFilter();
    o.type="sawtooth"; o.frequency.value=freq;
    f.type="lowpass"; f.frequency.value=400; f.Q.value=8;
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.3,t+0.01);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.18);
    o.connect(f); f.connect(g); g.connect(dest); o.start(t); o.stop(t+0.2);
  }
  function chord(ctx,dest,t,freqs,vol){
    freqs.forEach(fr=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type="triangle"; o.frequency.value=fr;
      g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(vol,t+0.02);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.4);
      o.connect(g); g.connect(dest); o.start(t); o.stop(t+0.45);
    });
  }

  function setSource(src){
    state.src = src;
    stopAudio();
    if(state.playing) startAudio();
  }

  function startAudio(){
    ensureCtx();
    if(state.src==="synth"){ startSynth(); }
    else if(state.src==="track"){ if(audioEl){ playTrack(); } else { $("#fileIn").click(); } }
    else if(state.src==="mic"){ startMic(); }
  }
  function stopAudio(){
    try{ if(synthNode){synthNode.stop();synthNode=null;} }catch(e){}
    try{ if(audioEl){audioEl.pause();} }catch(e){}
    try{ if(micStream){micStream.getTracks().forEach(t=>t.stop());micStream=null;} }catch(e){}
    try{ if(trackSrc){trackSrc.disconnect();trackSrc=null;} }catch(e){}
  }

  function playTrack(){
    const ctx = ensureCtx();
    if(!trackSrc){ trackSrc = ctx.createMediaElementSource(audioEl); trackSrc.connect(analyser); analyser.connect(ctx.destination); }
    analyser.connect(ctx.destination);
    audioEl.play();
  }

  function startMic(){
    navigator.mediaDevices.getUserMedia({audio:true}).then(s=>{
      micStream = s;
      const ctx = ensureCtx();
      const src = ctx.createMediaStreamSource(s);
      src.connect(analyser);
    }).catch(()=>{ hint("Mic access denied"); });
  }

  // File loader
  $("#loadBtn").onclick = ()=>$("#fileIn").click();
  $("#fileIn").onchange = (e)=>{
    const f = e.target.files[0]; if(!f) return;
    if(!audioEl){
      audioEl = new Audio(); audioEl.loop = true; audioEl.crossOrigin="anonymous";
    }
    audioEl.src = URL.createObjectURL(f);
    state.src="track";
    document.querySelectorAll("#srcSeg .btn").forEach(b=>b.classList.toggle("active",b.dataset.src==="track"));
    if(state.playing) playTrack();
    hint("Loaded: "+f.name);
  };

  // Play button
  const playBtn = $("#playBtn");
  playBtn.onclick = ()=>{
    state.playing = !state.playing;
    if(state.playing){
      playBtn.textContent = "⏸ Pause";
      $("#liveDot").classList.add("live");
      $("#liveTxt").textContent = "LIVE";
      startAudio();
    } else {
      playBtn.textContent = "▶ Play Beat";
      $("#liveDot").classList.remove("live");
      $("#liveTxt").textContent = "STANDBY";
      stopAudio();
    }
  };

  function hint(msg){
    const h = $("#hint"); h.textContent = msg; h.classList.add("show");
    clearTimeout(h._t); h._t = setTimeout(()=>h.classList.remove("show"),1800);
  }
  setTimeout(()=>hint("Drop an audio file or hit Play to start the beat"), 600);

  // ---------- Beat detection from analyser ----------
  function audioFrame(dt){
    if(!analyser || !state.playing) {
      state.beat *= Math.pow(0.001, dt); // decay
      state.energy *= Math.pow(0.5, dt);
      return null;
    }
    analyser.getByteFrequencyData(freqData);
    // Bass energy from low bins
    let bass=0; const N=Math.min(24, freqData.length);
    for(let i=0;i<N;i++) bass+=freqData[i]; bass/=N;
    let total=0; for(let i=0;i<freqData.length;i++) total+=freqData[i]; total/=freqData.length;
    state.energy = state.energy*0.7 + (bass/255)*0.3;

    // Simple onset detection on bass
    beatHistory.push(bass); if(beatHistory.length>43) beatHistory.shift();
    const avg = beatHistory.reduce((a,b)=>a+b,0)/beatHistory.length;
    const now = performance.now();
    let kick = false;
    if(bass > avg*1.35 && bass>60 && now-lastBeatTime>180){
      kick = true; lastBeatTime = now;
    }
    if(kick) state.beat = 1;
    else state.beat *= Math.pow(0.0008, dt);

    // Draw spectrum
    drawSpectrum(total);
    return {bass, total};
  }

  function drawSpectrum(total){
    const w = spec.getBoundingClientRect().width, h = spec.getBoundingClientRect().height;
    sctx.clearRect(0,0,w,h);
    if(!freqData) return;
    const bins = 64;
    const bw = w/bins;
    for(let i=0;i<bins;i++){
      const v = freqData[i*2]/255;
      const bh = v*h;
      const c = paletteColor(i, bins, state.time*0.3);
      const g = sctx.createLinearGradient(0,h,0,h-bh);
      g.addColorStop(0, rgbStr(c[0],c[1],c[2],0.15));
      g.addColorStop(1, rgbStr(c[0],c[1],c[2],0.9));
      sctx.fillStyle = g;
      sctx.fillRect(i*bw, h-bh, bw-1, bh);
    }
  }

  // ---------- Light show geometry ----------
  // We model a grid of "lights" arranged on a stage. Each light has position + brightness.
  const COLS = 28, ROWS = 14;
  function lightPos(i){
    const c = i % COLS, r = Math.floor(i / COLS);
    const w = lights.getBoundingClientRect().width;
    const h = lights.getBoundingClientRect().height;
    const padX = w*0.06, padY = h*0.10;
    const x = padX + c*(w-2*padX)/(COLS-1);
    const y = padY + r*(h-2*padY)/(ROWS-1);
    return [x,y,c,r];
  }

  // ---------- Pattern renderers ----------
  // Each returns brightness [0..1] for light i given time t and beat envelope
  function patternBrightness(i, t, beat){
    const n = COLS*ROWS;
    const c = i % COLS, r = Math.floor(i / COLS);
    const cx = (COLS-1)/2, cy = (ROWS-1)/2;
    const dx = c-cx, dy = r-cy;
    const dist = Math.sqrt(dx*dx+dy*dy);
    const ang = Math.atan2(dy,dx);
    const T = state.sync==="on" ? t*(0.6+state.speed*1.2)*(1+state.beat*0.5) : t*(0.4+state.speed*0.9);
    let b=0;
    switch(state.pattern){
      case "Ripple":{
        const wave = Math.sin(dist*0.9 - T*4);
        b = 0.5+0.5*wave;
        b += beat*0.6*Math.exp(-dist*0.18);
        break;
      }
      case "Chase":{
        const m = ((T*6) % COLS);
        b = Math.exp(-Math.pow((c-m),2)*0.5);
        b += 0.3*Math.exp(-Math.pow((c-(m+COLS/2)%COLS),2)*0.6);
        b *= 0.6+0.4*Math.sin(r*0.6+T*2);
        break;
      }
      case "Strobe":{
        const ph = Math.floor(T*8)%2;
        b = ph? (0.8+0.2*Math.random()):0.05;
        b *= 0.5+0.5*beat;
        break;
      }
      case "Wave":{
        b = 0.5+0.5*Math.sin(c*0.5 + T*3);
        b *= 0.6+0.4*Math.sin(r*0.5 - T*2);
        break;
      }
      case "Spiral":{
        const a = ang + dist*0.5 - T*3;
        b = 0.5+0.5*Math.sin(a*3);
        b += 0.3*Math.sin(dist*0.7 - T*5);
        break;
      }
      case "Pulse":{
        const p = 0.5+0.5*Math.sin(T*4 - dist*0.4);
        b = p*Math.exp(-dist*0.08);
        b += beat*Math.exp(-dist*0.12);
        break;
      }
      case "Matrix":{
        // falling columns
        const fall = ((T*10 + c*0.7) % ROWS);
        b = Math.exp(-Math.pow((r-fall),2)*0.8);
        b += 0.15*Math.random();
        break;
      }
      case "Comet":{
        const head = ((T*8) % (COLS+ROWS));
        // diagonal comet
        const f = (c+r);
        b = Math.exp(-Math.pow((f-head),2)*0.25);
        break;
      }
      case "Rainbow":{
        b = 0.55+0.45*Math.sin((c+r)*0.4 - T*4);
        break;
      }
      case "Orbit":{
        const orbit = Math.sin(ang*3 + dist*0.3 - T*3);
        b = 0.5+0.5*orbit;
        b *= 0.7+0.3*Math.sin(T*2+dist);
        break;
      }
    }
    return Math.max(0, Math.min(1, b));
  }

  // ---------- Main render ----------
  let lastT = performance.now(), fpsAcc=0, fpsCount=0, fpsTimer=0;
  function frame(now){
    const dt = Math.min(0.05, (now-lastT)/1000);
    lastT = now;
    state.time += dt;

    audioFrame(dt);

    const W = lights.getBoundingClientRect().width, H = lights.getBoundingClientRect().height;

    // backdrop pulse
    drawBg(state.time, state.beat, state.energy);

    // trails
    lctx.globalCompositeOperation = "source-over";
    lctx.fillStyle = "rgba(5,6,15,"+(0.25 - state.glow*0.12)+")";
    lctx.fillRect(0,0,W,H);

    lctx.globalCompositeOperation = "lighter";

    const baseR = Math.min(W/COLS, H/ROWS) * 0.42;
    const n = COLS*ROWS;
    const beat = state.beat;
    for(let i=0;i<n;i++){
      const [x,y] = lightPos(i);
      const b = patternBrightness(i, state.time, beat);
      const dim = state.sync==="on" ? (0.35 + state.energy*0.8 + b*0.8) : (0.4 + b);
      const bright = Math.min(1.2, dim) * (0.7+0.3*beat);
      const [cr,cg,cb] = paletteColor(i, n, state.time*0.4);
      const rad = baseR*(0.6 + b*0.7 + beat*0.4);
      // glow
      const g = lctx.createRadialGradient(x,y,0,x,y,rad*2.2);
      g.addColorStop(0, rgbStr(cr,cg,cb, Math.min(1,bright)));
      g.addColorStop(0.4, rgbStr(cr,cg,cb, Math.min(1,bright)*0.4));
      g.addColorStop(1, rgbStr(cr,cg,cb,0));
      lctx.fillStyle = g;
      lctx.beginPath(); lctx.arc(x,y,rad*2.2,0,Math.PI*2); lctx.fill();
      // core
      lctx.fillStyle = rgbStr(255,255,255, Math.min(1,bright*0.7));
      lctx.beginPath(); lctx.arc(x,y,rad*0.45,0,Math.PI*2); lctx.fill();
    }

    // beat flash overlay
    if(beat>0.3){
      lctx.globalCompositeOperation="lighter";
      lctx.fillStyle = rgbStr(255,255,255, (beat-0.3)*0.12);
      lctx.fillRect(0,0,W,H);
    }

    lctx.globalCompositeOperation = "source-over";

    // FPS
    fpsAcc += dt; fpsCount++; fpsTimer+=dt;
    if(fpsTimer>=0.5){
      const fps = Math.round(fpsCount/fpsAcc);
      $("#fpsTxt").textContent = fps+" fps";
      fpsAcc=0; fpsCount=0; fpsTimer=0;
    }

    requestAnimationFrame(frame);
  }

  // ---------- Animated backdrop ----------
  let bgPhase=0;
  function drawBg(t, beat, energy){
    const W = bgfx.getBoundingClientRect().width, H = bgfx.getBoundingClientRect().height;
    bctx.clearRect(0,0,W,H);
    // deep gradient with moving aurora
    const g = bctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0, "#070318");
    g.addColorStop(1, "#02030a");
    bctx.fillStyle = g; bctx.fillRect(0,0,W,H);
    bctx.globalCompositeOperation="lighter";
    const blobs = [
      {c:"#ff2d95", x:0.2+0.1*Math.sin(t*0.3), y:0.3+0.08*Math.cos(t*0.27), s:0.6},
      {c:"#a855f7", x:0.8+0.1*Math.cos(t*0.21), y:0.7+0.08*Math.sin(t*0.24), s:0.7},
      {c:"#22d3ee", x:0.5+0.12*Math.sin(t*0.18), y:0.5+0.1*Math.cos(t*0.2), s:0.8},
    ];
    const boost = 0.5 + energy*0.8 + beat*0.6;
    blobs.forEach(b=>{
      const rr = Math.min(W,H)*0.4*b.s*boost;
      const rg = bctx.createRadialGradient(b.x*W,b.y*H,0, b.x*W,b.y*H, rr);
      rg.addColorStop(0, b.c+"40");
      rg.addColorStop(1, b.c+"00");
      bctx.fillStyle = rg;
      bctx.beginPath(); bctx.arc(b.x*W,b.y*H,rr,0,Math.PI*2); bctx.fill();
    });
    bctx.globalCompositeOperation="source-over";
  }

  // ---------- Init ----------
  resize();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
