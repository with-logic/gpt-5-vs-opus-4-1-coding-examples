<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tiny Kanban</title>
<style>
  :root {
    --bg: #0f172a;
    --bg-grad-1: #1e293b;
    --bg-grad-2: #0f172a;
    --panel: #1e293b;
    --panel-2: #273449;
    --border: #334155;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --accent: #38bdf8;
    --accent-2: #0ea5e9;
    --danger: #ef4444;
    --wip-warn: #f59e0b;

    --p-low: #38bdf8;
    --p-med: #f59e0b;
    --p-high: #ef4444;
    --p-crit: #d946ef;

    --radius: 14px;
    --shadow: 0 10px 30px rgba(0,0,0,.45);
    --shadow-sm: 0 2px 8px rgba(0,0,0,.35);
  }

  * { box-sizing: border-box; }

  html, body {
    height: 100%;
    margin: 0;
  }

  body {
    font-family: "Inter", "Segoe UI", system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif;
    color: var(--text);
    background:
      radial-gradient(1200px 600px at 10% -10%, rgba(56,189,248,.12), transparent 60%),
      radial-gradient(1000px 500px at 100% 0%, rgba(217,70,239,.10), transparent 55%),
      linear-gradient(180deg, var(--bg-grad-1), var(--bg-grad-2));
    background-attachment: fixed;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    /* Standup-friendly base font */
    font-size: 18px;
  }

  /* ---------- Header ---------- */
  header {
    position: sticky;
    top: 0;
    z-index: 30;
    backdrop-filter: blur(10px);
    background: rgba(15, 23, 42, 0.72);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
  }
  .header-row {
    display: flex;
    align-items: center;
    gap: 18px;
    flex-wrap: wrap;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    font-weight: 800;
    font-size: 1.6rem;
    letter-spacing: -0.02em;
    white-space: nowrap;
  }
  .brand .logo {
    width: 34px; height: 34px;
    border-radius: 9px;
    background: linear-gradient(135deg, var(--accent), var(--p-crit));
    display: grid; place-items: center;
    box-shadow: 0 6px 18px rgba(56,189,248,.35);
    font-size: 1.1rem;
  }
  .brand .sub {
    font-weight: 500;
    color: var(--muted);
    font-size: 0.95rem;
  }

  .toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-left: auto;
    flex-wrap: wrap;
  }
  .search {
    position: relative;
  }
  .search input {
    width: 260px;
    max-width: 50vw;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    padding: 10px 14px 10px 38px;
    font-size: 1rem;
    transition: border-color .15s, box-shadow .15s, width .2s;
  }
  .search input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(56,189,248,.25);
    width: 320px;
  }
  .search .icon {
    position: absolute;
    left: 12px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 1.05rem;
  }

  .btn {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    padding: 10px 16px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: background .15s, border-color .15s, transform .05s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--panel-2); border-color: #475569; }
  .btn:active { transform: translateY(1px); }
  .btn.primary {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    border-color: transparent;
    color: #0b1220;
    box-shadow: 0 6px 18px rgba(56,189,248,.30);
  }
  .btn.primary:hover { filter: brightness(1.08); }
  .btn.ghost {
    background: transparent;
  }
  .btn.danger {
    color: var(--danger);
    border-color: rgba(239,68,68,.35);
  }
  .btn.danger:hover { background: rgba(239,68,68,.12); }
  .btn.icon-only {
    padding: 10px 12px;
  }

  /* ---------- Board ---------- */
  main {
    padding: 22px 24px 40px;
  }
  .board {
    display: grid;
    grid-template-columns: repeat(3, minmax(300px, 1fr));
    gap: 20px;
    align-items: start;
  }
  @media (max-width: 920px) {
    .board { grid-template-columns: 1fr; }
  }

  .column {
    background: rgba(30, 41, 59, 0.55);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    display: flex;
    flex-direction: column;
    min-height: 240px;
    transition: background .18s, border-color .18s, box-shadow .18s;
  }
  .column.drag-over {
    background: rgba(56,189,248,.10);
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(56,189,248,.25), var(--shadow-sm);
  }
  .column.wip-exceeded {
    border-color: var(--wip-warn);
  }
  .column.wip-exceeded .col-count {
    color: var(--wip-warn);
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: .55; }
  }

  .col-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 18px;
    border-bottom: 1px solid var(--border);
    cursor: grab;
  }
  .col-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    flex: none;
  }
  .col-title {
    font-size: 1.3rem;
    font-weight: 800;
    letter-spacing: -0.01em;
  }
  .col-count {
    font-size: 1rem;
    font-weight: 700;
    color: var(--muted);
    background: rgba(2,6,23,.45);
    border: 1px solid var(--border);
    padding: 2px 10px;
    border-radius: 999px;
  }
  .col-count .wip {
    color: var(--muted);
    font-weight: 600;
  }
  .col-actions {
    margin-left: auto;
    display: flex;
    gap: 6px;
  }
  .col-actions button {
    background: transparent;
    border: 1px solid transparent;
    color: var(--muted);
    width: 34px; height: 34px;
    border-radius: 8px;
    font-size: 1.1rem;
    cursor: pointer;
    display: grid; place-items: center;
    transition: background .15s, color .15s, border-color .15s;
  }
  .col-actions button:hover {
    background: var(--panel-2);
    color: var(--text);
    border-color: var(--border);
  }

  .col-body {
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    flex: 1;
    min-height: 80px;
  }
  .col-body.empty-hint::after {
    content: "Drop cards here";
    color: var(--muted);
    text-align: center;
    padding: 22px 8px;
    font-size: 1rem;
    border: 1px dashed var(--border);
    border-radius: 10px;
    opacity: .6;
  }

  .add-card {
    border: 1px dashed var(--border);
    background: transparent;
    color: var(--muted);
    border-radius: 10px;
    padding: 12px;
    font-size: 1.05rem;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s, color .15s, border-color .15s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .add-card:hover {
    background: rgba(56,189,248,.08);
    color: var(--text);
    border-color: var(--accent);
  }

  /* ---------- Card ---------- */
  .card {
    background: linear-gradient(180deg, #243349, #1c283f);
    border: 1px solid var(--border);
    border-left: 5px solid var(--p-low);
    border-radius: 12px;
    padding: 14px 14px 12px;
    box-shadow: var(--shadow-sm);
    cursor: grab;
    position: relative;
    transition: transform .08s, box-shadow .15s, border-color .15s, opacity .15s;
  }
  .card:hover {
    border-color: #475569;
    box-shadow: 0 6px 18px rgba(0,0,0,.40);
  }
  .card[draggable="true"] { /* fine */ }
  .card.dragging {
    opacity: .4;
    cursor: grabbing;
  }
  .card.p-low  { --p: var(--p-low); }
  .card.p-med  { --p: var(--p-med); }
  .card.p-high { --p: var(--p-high); }
  .card.p-crit { --p: var(--p-crit); }
  .card { border-left-color: var(--p); }

  .card-title {
    font-size: 1.12rem;
    font-weight: 700;
    line-height: 1.3;
    word-break: break-word;
    margin: 0 28px 4px 0;
  }
  .card-desc {
    font-size: .98rem;
    color: var(--muted);
    line-height: 1.4;
    word-break: break-word;
    margin: 0 0 10px;
  }
  .card-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .badge {
    font-size: .82rem;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 999px;
    border: 1px solid transparent;
    letter-spacing: .02em;
    text-transform: uppercase;
  }
  .badge.priority {
    color: var(--p);
    border-color: color-mix(in srgb, var(--p) 45%, transparent);
    background: color-mix(in srgb, var(--p) 14%, transparent);
  }
  .badge.tag {
    color: var(--muted);
    border-color: var(--border);
    background: rgba(2,6,23,.4);
  }
  .assignees {
    display: flex;
    gap: -6px;
    margin-left: auto;
  }
  .avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    display: grid; place-items: center;
    font-size: .8rem;
    font-weight: 800;
    color: #fff;
    border: 2px solid #1c283f;
    margin-left: -8px;
    box-shadow: var(--shadow-sm);
    text-transform: uppercase;
    position: relative;
  }
  .avatar:first-child { margin-left: 0; }

  .card-actions {
    position: absolute;
    top: 10px; right: 10px;
    display: flex;
    gap: 4px;
    opacity: 0;
    transition: opacity .15s;
  }
  .card:hover .card-actions { opacity: 1; }
  .card-actions button {
    width: 28px; height: 28px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: rgba(2,6,23,.6);
    color: var(--muted);
    cursor: pointer;
    font-size: .95rem;
    display: grid; place-items: center;
    transition: background .15s, color .15s;
  }
  .card-actions button:hover { background: var(--panel-2); color: var(--text); }
  .card-actions .del:hover { color: var(--danger); border-color: rgba(239,68,68,.5); }

  .card.hidden-by-search {
    display: none;
  }

  /* ---------- Modal ---------- */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(2,6,23,.7);
    backdrop-filter: blur(4px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .overlay.show { display: flex; }
  .modal {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    box-shadow: var(--shadow);
    width: 560px;
    max-width: 100%;
    max-height: 90vh;
    overflow: auto;
    animation: pop .18s ease-out;
  }
  @keyframes pop {
    from { transform: scale(.96); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }
  .modal h3 {
    margin: 0;
    padding: 20px 22px;
    font-size: 1.4rem;
    border-bottom: 1px solid var(--border);
  }
  .modal-body { padding: 20px 22px; display: flex; flex-direction: column; gap: 16px; }
  .field label {
    display: block;
    font-size: .95rem;
    font-weight: 700;
    color: var(--muted);
    margin-bottom: 7px;
    text-transform: uppercase;
    letter-spacing: .04em;
  }
  .field input[type=text],
  .field textarea,
  .field input[type=number] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    padding: 11px 13px;
    font-size: 1.05rem;
    font-family: inherit;
  }
  .field textarea { min-height: 76px; resize: vertical; }
  .field input:focus, .field textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(56,189,248,.22);
  }

  .priority-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .popt {
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    border-radius: 10px;
    padding: 10px 6px;
    cursor: pointer;
    font-weight: 700;
    font-size: .92rem;
    text-transform: uppercase;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    transition: background .15s, border-color .15s, transform .05s;
  }
  .popt .swatch { width: 22px; height: 6px; border-radius: 4px; }
  .popt:hover { background: var(--panel-2); }
  .popt.selected {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(56,189,248,.3);
  }

  .people-pool, .tag-pool {
    display: flex; flex-wrap: wrap; gap: 8px;
  }
  .person-chip {
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    border-radius: 999px;
    padding: 6px 12px 6px 6px;
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 8px;
    font-weight: 600;
    font-size: .98rem;
    transition: background .15s, border-color .15s;
  }
  .person-chip:hover { background: var(--panel-2); }
  .person-chip.selected {
    border-color: var(--accent);
    background: rgba(56,189,248,.12);
  }
  .person-chip .ava {
    width: 24px; height: 24px; border-radius: 50%;
    display: grid; place-items: center;
    font-size: .72rem; font-weight: 800; color:#fff;
  }

  .modal-footer {
    padding: 16px 22px;
    border-top: 1px solid var(--border);
    display: flex; gap: 10px; justify-content: flex-end;
  }

  /* ---------- People manager ---------- */
  .people-list { display: flex; flex-direction: column; gap: 8px; }
  .person-row {
    display: flex; align-items: center; gap: 10px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 10px; padding: 8px 10px;
  }
  .person-row .ava { width: 30px; height: 30px; }
  .person-row input {
    flex: 1;
    background: transparent; border: none; color: var(--text);
    font-size: 1rem; padding: 4px;
  }
  .person-row input:focus { outline: 1px solid var(--border); border-radius: 6px; }

  .hint {
    font-size: .9rem; color: var(--muted);
  }
  kbd {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 5px; padding: 1px 6px; font-size: .82rem;
    font-family: ui-monospace, monospace;
  }

  /* scrollbars */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: #334155; border-radius: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }

  .toast-wrap {
    position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
    z-index: 200; display: flex; flex-direction: column; gap: 8px; align-items: center;
  }
  .toast {
    background: var(--panel); border: 1px solid var(--border);
    color: var(--text); padding: 12px 18px; border-radius: 10px;
    box-shadow: var(--shadow); font-weight: 600; font-size: 1rem;
    animation: pop .16s ease-out;
  }
  .toast.warn { border-color: var(--wip-warn); }
  .toast .ico { margin-right: 8px; }
</style>
</head>
<body>

<header>
  <div class="header-row">
    <div class="brand">
      <div class="logo">▦</div>
      <div>Tiny Kanban <span class="sub">· standup board</span></div>
    </div>
    <div class="toolbar">
      <div class="search">
        <span class="icon">⌕</span>
        <input id="search" type="text" placeholder="Search title, tag, person…" aria-label="Search" />
      </div>
      <button class="btn ghost" id="managePeople" title="Manage people">👥 People</button>
      <button class="btn primary" id="addCardBtn">+ New card</button>
    </div>
  </div>
</header>

<main>
  <div class="board" id="board"></div>
  <p class="hint" style="margin-top:18px;">
    Drag cards between columns · Click a card to edit · <kbd>N</kbd> new card · <kbd>/</kbd> focus search · Changes saved locally
  </p>
</main>

<!-- Card editor modal -->
<div class="overlay" id="cardOverlay">
  <div class="modal" role="dialog" aria-modal="true">
    <h3 id="cardModalTitle">New card</h3>
    <div class="modal-body">
      <div class="field">
        <label for="f-title">Title</label>
        <input id="f-title" type="text" placeholder="What needs to happen?" />
      </div>
      <div class="field">
        <label for="f-desc">Description (optional)</label>
        <textarea id="f-desc" placeholder="Add details, links, acceptance criteria…"></textarea>
      </div>
      <div class="field">
        <label>Priority</label>
        <div class="priority-grid" id="priorityGrid">
          <button type="button" class="popt" data-p="low"><span class="swatch" style="background:var(--p-low)"></span>Low</button>
          <button type="button" class="popt" data-p="med"><span class="swatch" style="background:var(--p-med)"></span>Med</button>
          <button type="button" class="popt" data-p="high"><span class="swatch" style="background:var(--p-high)"></span>High</button>
          <button type="button" class="popt" data-p="crit"><span class="swatch" style="background:var(--p-crit)"></span>Crit</button>
        </div>
      </div>
      <div class="field">
        <label>Assigned to</label>
        <div class="people-pool" id="assignPool"></div>
        <p class="hint" id="assignEmpty" style="margin:8px 0 0;">No people yet — click “People” to add teammates.</p>
      </div>
      <div class="field">
        <label for="f-tags">Tags (comma separated)</label>
        <input id="f-tags" type="text" placeholder="frontend, bug, q3" />
      </div>
      <div class="field">
        <label for="f-col">Column</label>
        <select id="f-col" style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:11px 13px;font-size:1.05rem;"></select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn danger" id="cardDeleteBtn" style="margin-right:auto; display:none;">Delete</button>
      <button class="btn ghost" id="cardCancelBtn">Cancel</button>
      <button class="btn primary" id="cardSaveBtn">Save</button>
    </div>
  </div>
</div>

<!-- People manager modal -->
<div class="overlay" id="peopleOverlay">
  <div class="modal" role="dialog" aria-modal="true" style="width:460px;">
    <h3>People</h3>
    <div class="modal-body">
      <div class="people-list" id="peopleList"></div>
      <div class="field" style="margin-top:6px;">
        <label for="newPerson">Add person</label>
        <div style="display:flex;gap:8px;">
          <input id="newPerson" type="text" placeholder="Name…" />
          <button class="btn primary" id="addPersonBtn">Add</button>
        </div>
        <p class="hint" style="margin-top:8px;">Removing a person unassigns them from all cards.</p>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn ghost" id="peopleCloseBtn">Done</button>
    </div>
  </div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<script>
"use strict";

/* ============================================================
   Tiny Kanban — single-file vanilla JS app
   State persisted to localStorage.
   ============================================================ */

const STORAGE_KEY = "tiny-kanban-v1";

const DEFAULT_STATE = {
  columns: [
    { id: "todo",   title: "Todo",  color: "#64748b", wip: 0 },
    { id: "doing",  title: "Doing", color: "#38bdf8", wip: 3 },
    { id: "done",   title: "Done",  color: "#22c55e", wip: 0 },
  ],
  cards: [],
  people: [],
  nextCardId: 1,
};

const COLUMN_ORDER = ["todo", "doing", "done"];

const PRIORITY_LABELS = { low: "Low", med: "Med", high: "High", crit: "Crit" };
const PRIORITY_RANK = { crit: 3, high: 2, med: 1, low: 0 };

// vivid palette for avatars
const AVATAR_COLORS = [
  "#ef4444","#f97316","#f59e0b","#eab308","#84cc16","#22c55e",
  "#10b981","#14b8a6","#06b6d4","#0ea5e9","#3b82f6","#6366f1",
  "#8b5cf6","#a855f7","#d946ef","#ec4899"
];

let state = loadState();
let searchQuery = "";

// editor scratch state
let editing = { id: null, priority: "low", assigned: [], columnId: "todo" };

/* ---------- Persistence ---------- */
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return seedState();
    const s = JSON.parse(raw);
    // basic shape guard
    if (!s || !Array.isArray(s.columns) || !Array.isArray(s.cards)) return seedState();
    if (!s.people) s.people = [];
    if (typeof s.nextCardId !== "number") s.nextCardId = (Math.max(0, ...s.cards.map(c => parseInt(String(c.id))||0)) || 0) + 1;
    return s;
  } catch (e) {
    console.warn("load failed", e);
    return seedState();
  }
}
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch (e) { console.warn("save failed", e); }
}
function seedState() {
  const s = JSON.parse(JSON.stringify(DEFAULT_STATE));
  const demo = [
    { title: "Fix login redirect loop", desc: "Happens on Safari when session expires mid-flow.", col: "todo",   p: "high", people: ["Ada"],     tags: ["bug","auth"] },
    { title: "Draft Q3 roadmap slide",  desc: "3 options with effort estimates.",                       col: "todo",   p: "med",  people: ["Marco"],   tags: ["planning"] },
    { title: "Migrate cron jobs to k8s", desc: "Replace legacy worker schedule.",                       col: "doing",  p: "high", people: ["Ada","Priya"], tags: ["infra"] },
    { title: "Design empty-states",      desc: "4 screens need illustrations.",                         col: "doing",  p: "low",  people: ["Priya"],   tags: ["design"] },
    { title: "Ship dark mode toggle",    desc: "Persisted preference, system default fallback.",         col: "done",   p: "med",  people: ["Marco"],   tags: ["frontend"] },
  ];
  s.people = [
    { id: "p_ada",   name: "Ada",   color: "#ef4444" },
    { id: "p_marco", name: "Marco", color: "#3b82f6" },
    { id: "p_priya", name: "Priya", color: "#a855f7" },
  ];
  demo.forEach(d => {
    const id = "c" + s.nextCardId++;
    const assigned = d.people.map(n => (s.people.find(p => p.name === n) || {}).id).filter(Boolean);
    s.cards.push({
      id, title: d.title, desc: d.desc, priority: d.p,
      assigned, tags: d.tags, columnId: d.col, created: Date.now(),
    });
  });
  return s;
}

/* ---------- Helpers ---------- */
function el(html) {
  const t = document.createElement("template");
  t.innerHTML = html.trim();
  return t.content.firstElementChild;
}
function personById(id) { return state.people.find(p => p.id === id); }
function personByName(name) {
  const n = name.trim().toLowerCase();
  return state.people.find(p => p.name.trim().toLowerCase() === n);
}
function initials(name) {
  const parts = name.trim().split(/\s+/).filter(Boolean);
  if (parts.length === 0) return "?";
  if (parts.length === 1) return parts[0].slice(0,2);
  return parts[0][0] + parts[parts.length-1][0];
}
function escapeHtml(s) {
  return String(s ?? "").replace(/[&<>"']/g, c => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  }[c]));
}
function cardsIn(colId) {
  return state.cards
    .filter(c => c.columnId === colId)
    .sort((a,b) => (PRIORITY_RANK[b.priority] - PRIORITY_RANK[a.priority]) || (a.created - b.created));
}

/* ---------- Rendering ---------- */
function render() {
  const board = document.getElementById("board");
  board.innerHTML = "";
  COLUMN_ORDER.forEach(colId => {
    const col = state.columns.find(c => c.id === colId) || { id: colId, title: colId, wip: 0, color: "#64748b" };
    board.appendChild(renderColumn(col));
  });
  applySearch();
}

function renderColumn(col) {
  const cards = cardsIn(col.id);
  const overWip = col.wip > 0 && cards.length > col.wip;

  const node = el(`
    <section class="column ${overWip ? 'wip-exceeded':''}" data-col="${col.id}">
      <div class="col-header">
        <span class="col-dot" style="background:${col.color}"></span>
        <span class="col-title">${escapeHtml(col.title)}</span>
        <span class="col-count">
          ${cards.length}<span class="wip">${col.wip > 0 ? ' / '+col.wip : ''}</span>
        </span>
        <div class="col-actions">
          <button data-act="wip" title="Set WIP limit">⏱</button>
          <button data-act="add"  title="Add card here">＋</button>
        </div>
      </div>
      <div class="col-body ${cards.length === 0 ? 'empty-hint':''}" data-dropbody="${col.id}"></div>
    </section>
  `);

  const body = node.querySelector(".col-body");
  cards.forEach(c => body.appendChild(renderCard(c)));

  const addBtn = el(`<button class="add-card">＋ Add card</button>`);
  addBtn.addEventListener("click", () => openCardEditor(null, col.id));
  body.appendChild(addBtn);

  // column actions
  node.querySelector('[data-act="add"]').addEventListener("click", () => openCardEditor(null, col.id));
  node.querySelector('[data-act="wip"]').addEventListener("click", () => promptWip(col));

  // drop targets
  setupDropZone(node, body, col.id);

  return node;
}

function renderCard(card) {
  const tags = (card.tags || []).filter(Boolean);
  const assigned = (card.assigned || []).map(personById).filter(Boolean);

  const avatarsHtml = assigned.map(p => `
    <div class="avatar" style="background:${p.color}" title="${escapeHtml(p.name)}">${escapeHtml(initials(p.name))}</div>
  `).join("");

  const tagsHtml = tags.map(t => `<span class="badge tag">${escapeHtml(t)}</span>`).join("");

  const node = el(`
    <article class="card p-${card.priority || 'low'}" draggable="true" data-id="${card.id}">
      <div class="card-actions">
        <button data-ca="edit" title="Edit">✎</button>
        <button data-ca="del" class="del" title="Delete">🗑</button>
      </div>
      <div class="card-title">${escapeHtml(card.title)}</div>
      ${card.desc ? `<div class="card-desc">${escapeHtml(card.desc)}</div>` : ""}
      <div class="card-meta">
        <span class="badge priority">${PRIORITY_LABELS[card.priority] || "Low"}</span>
        ${tagsHtml}
        <div class="assignees">${avatarsHtml}</div>
      </div>
    </article>
  `);

  node.addEventListener("click", e => {
    if (e.target.closest("[data-ca]")) return;
    openCardEditor(card.id, card.columnId);
  });
  node.querySelector('[data-ca="edit"]').addEventListener("click", e => { e.stopPropagation(); openCardEditor(card.id, card.columnId); });
  node.querySelector('[data-ca="del"]').addEventListener("click", e => { e.stopPropagation(); deleteCard(card.id); });

  setupCardDrag(node, card.id);

  return node;
}

/* ---------- Drag & drop (HTML5 DnD) ---------- */
let draggingId = null;

function setupCardDrag(node, id) {
  node.addEventListener("dragstart", e => {
    draggingId = id;
    node.classList.add("dragging");
    e.dataTransfer.effectAllowed = "move";
    try { e.dataTransfer.setData("text/plain", id); } catch(_) {}
  });
  node.addEventListener("dragend", () => {
    draggingId = null;
    node.classList.remove("dragging");
    document.querySelectorAll(".column.drag-over").forEach(c => c.classList.remove("drag-over"));
  });
}

function setupDropZone(colNode, body, colId) {
  colNode.addEventListener("dragover", e => {
    e.preventDefault();
    e.dataTransfer.dropEffect = "move";
    colNode.classList.add("drag-over");
  });
  colNode.addEventListener("dragleave", e => {
    // only clear when leaving the column entirely
    if (!colNode.contains(e.relatedTarget)) colNode.classList.remove("drag-over");
  });
  colNode.addEventListener("drop", e => {
    e.preventDefault();
    colNode.classList.remove("drag-over");
    const id = draggingId || (e.dataTransfer && e.dataTransfer.getData("text/plain"));
    if (!id) return;
    const card = state.cards.find(c => c.id === id);
    if (!card) return;
    const fromCol = card.columnId;
    if (fromCol === colId) return; // no-op within same col (reordering handled below)

    // WIP guard: allow but warn if exceeds (don't hard-block — standups need flexibility)
    const col = state.columns.find(c => c.id === colId);
    const newCount = state.cards.filter(c => c.columnId === colId).length + 1;
    card.columnId = colId;
    saveState();
    render();
    if (col && col.wip > 0 && newCount > col.wip) {
      toast(`⚠ "${col.title}" WIP limit is ${col.wip} — now ${newCount}`, "warn");
    } else {
      toast(`Moved to ${col.title}`);
    }
  });
}

/* ---------- Search ---------- */
function applySearch() {
  const q = searchQuery.trim().toLowerCase();
  document.querySelectorAll(".card").forEach(node => {
    if (!q) { node.classList.remove("hidden-by-search"); return; }
    const card = state.cards.find(c => c.id === node.dataset.id);
    if (!card) { node.classList.add("hidden-by-search"); return; }
    const hay = [
      card.title, card.desc, (card.tags||[]).join(" "),
      (card.assigned||[]).map(id => { const p = personById(id); return p ? p.name : ""; }).join(" ")
    ].join(" ").toLowerCase();
    node.classList.toggle("hidden-by-search", !hay.includes(q));
  });
  // toggle empty hints based on visible cards
  document.querySelectorAll(".col-body").forEach(body => {
    const visible = body.querySelectorAll(".card:not(.hidden-by-search)").length;
    body.classList.toggle("empty-hint", visible === 0);
  });
}

/* ---------- Card editor ---------- */
function openCardEditor(cardId, defaultCol) {
  editing = { id: cardId, priority: "low", assigned: [], columnId: defaultCol || "todo" };

  const card = cardId ? state.cards.find(c => c.id === cardId) : null;
  document.getElementById("cardModalTitle").textContent = card ? "Edit card" : "New card";
  document.getElementById("cardDeleteBtn").style.display = card ? "inline-flex" : "none";

  document.getElementById("f-title").value = card ? card.title : "";
  document.getElementById("f-desc").value  = card ? (card.desc || "") : "";
  document.getElementById("f-tags").value  = card ? (card.tags || []).join(", ") : "";
  editing.priority = card ? (card.priority || "low") : "low";
  editing.assigned = card ? [...(card.assigned || [])] : [];
  editing.columnId = card ? card.columnId : (defaultCol || "todo");

  // priority grid
  document.querySelectorAll("#priorityGrid .popt").forEach(b => {
    b.classList.toggle("selected", b.dataset.p === editing.priority);
  });

  // column select
  const sel = document.getElementById("f-col");
  sel.innerHTML = state.columns.map(c => `<option value="${c.id}">${escapeHtml(c.title)}</option>`).join("");
  sel.value = editing.columnId;

  // assignment pool
  renderAssignPool();

  showOverlay("cardOverlay");
  setTimeout(() => document.getElementById("f-title").focus(), 30);
}

function renderAssignPool() {
  const pool = document.getElementById("assignPool");
  const empty = document.getElementById("assignEmpty");
  if (state.people.length === 0) {
    pool.innerHTML = "";
    empty.style.display = "block";
    return;
  }
  empty.style.display = "none";
  pool.innerHTML = "";
  state.people.forEach(p => {
    const sel = editing.assigned.includes(p.id);
    const chip = el(`
      <button type="button" class="person-chip ${sel?'selected':''}" data-pid="${p.id}">
        <span class="ava" style="background:${p.color}">${escapeHtml(initials(p.name))}</span>
        ${escapeHtml(p.name)}
      </button>
    `);
    chip.addEventListener("click", () => {
      const i = editing.assigned.indexOf(p.id);
      if (i >= 0) editing.assigned.splice(i,1); else editing.assigned.push(p.id);
      chip.classList.toggle("selected");
    });
    pool.appendChild(chip);
  });
}

function saveCardFromEditor() {
  const title = document.getElementById("f-title").value.trim();
  if (!title) {
    document.getElementById("f-title").focus();
    toast("Title is required", "warn");
    return;
  }
  const desc = document.getElementById("f-desc").value.trim();
  const tagsRaw = document.getElementById("f-tags").value.split(",").map(t => t.trim()).filter(Boolean);
  const columnId = document.getElementById("f-col").value;

  if (editing.id) {
    const card = state.cards.find(c => c.id === editing.id);
    if (card) {
      const moved = card.columnId !== columnId;
      Object.assign(card, { title, desc, tags: tagsRaw, priority: editing.priority, assigned: [...editing.assigned], columnId });
      if (moved) {
        const col = state.columns.find(c => c.id === columnId);
        const newCount = state.cards.filter(c => c.columnId === columnId).length;
        if (col && col.wip > 0 && newCount > col.wip) toast(`⚠ "${col.title}" WIP ${col.wip} — now ${newCount}`, "warn");
      }
      toast("Card updated");
    }
  } else {
    const id = "c" + state.nextCardId++;
    state.cards.push({
      id, title, desc, tags: tagsRaw, priority: editing.priority,
      assigned: [...editing.assigned], columnId, created: Date.now(),
    });
    const col = state.columns.find(c => c.id === columnId);
    const newCount = state.cards.filter(c => c.columnId === columnId).length;
    if (col && col.wip > 0 && newCount > col.wip) toast(`⚠ "${col.title}" WIP ${col.wip} — now ${newCount}`, "warn");
    else toast("Card added");
  }

  saveState();
  hideOverlay("cardOverlay");
  render();
}

function deleteCard(id) {
  const card = state.cards.find(c => c.id === id);
  if (!card) return;
  if (!confirm(`Delete "${card.title}"?`)) return;
  state.cards = state.cards.filter(c => c.id !== id);
  saveState();
  render();
  toast("Card deleted");
}

/* ---------- WIP prompt ---------- */
function promptWip(col) {
  const cur = col.wip || 0;
  const input = prompt(`WIP limit for "${col.title}" (0 = unlimited)`, String(cur));
  if (input === null) return;
  const n = Math.max(0, parseInt(input, 10));
  if (isNaN(n)) { toast("Enter a whole number", "warn"); return; }
  col.wip = n;
  saveState();
  render();
  toast(n > 0 ? `WIP for ${col.title} set to ${n}` : `WIP limit removed for ${col.title}`);
}

/* ---------- People manager ---------- */
function openPeopleManager() {
  renderPeopleList();
  document.getElementById("newPerson").value = "";
  showOverlay("peopleOverlay");
  setTimeout(() => document.getElementById("newPerson").focus(), 30);
}
function renderPeopleList() {
  const list = document.getElementById("peopleList");
  list.innerHTML = "";
  if (state.people.length === 0) {
    list.appendChild(el(`<p class="hint">No people yet. Add someone below.</p>`));
    return;
  }
  state.people.forEach((p, idx) => {
    const row = el(`
      <div class="person-row">
        <span class="ava" style="background:${p.color};width:30px;height:30px;border-radius:50%;display:grid;place-items:center;font-size:.78rem;font-weight:800;color:#fff;">${escapeHtml(initials(p.name))}</span>
        <input type="text" value="${escapeHtml(p.name)}" data-pid="${p.id}" />
        <button class="btn danger icon-only" data-rm="${p.id}" title="Remove">✕</button>
      </div>
    `);
    const input = row.querySelector("input");
    input.addEventListener("change", () => {
      const v = input.value.trim();
      if (!v) { input.value = p.name; return; }
      p.name = v;
      saveState();
      render();
      renderPeopleList();
    });
    row.querySelector("[data-rm]").addEventListener("click", () => {
      if (!confirm(`Remove ${p.name}? They will be unassigned from all cards.`)) return;
      state.people = state.people.filter(x => x.id !== p.id);
      state.cards.forEach(c => { c.assigned = (c.assigned || []).filter(a => a !== p.id); });
      saveState();
      render();
      renderPeopleList();
      toast(`${p.name} removed`);
    });
    list.appendChild(row);
  });
}
function addPerson() {
  const input = document.getElementById("newPerson");
  const name = input.value.trim();
  if (!name) return;
  if (personByName(name)) { toast(`${name} already exists`, "warn"); return; }
  const color = AVATAR_COLORS[state.people.length % AVATAR_COLORS.length];
  const id = "p_" + Date.now().toString(36) + Math.random().toString(36).slice(2,5);
  state.people.push({ id, name, color });
  input.value = "";
  saveState();
  render();
  renderPeopleList();
  renderAssignPool();
  input.focus();
}

/* ---------- Overlays ---------- */
function showOverlay(id) { document.getElementById(id).classList.add("show"); }
function hideOverlay(id) { document.getElementById(id).classList.remove("show"); }

/* ---------- Toast ---------- */
let toastTimer = null;
function toast(msg, kind) {
  const wrap = document.getElementById("toastWrap");
  wrap.innerHTML = "";
  const t = el(`<div class="toast ${kind||''}"><span class="ico">${kind==='warn'?'⚠':'✓'}</span>${escapeHtml(msg)}</div>`);
  wrap.appendChild(t);
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.style.opacity = "0"; t.style.transition = "opacity .3s"; setTimeout(()=>t.remove(), 300); }, 2600);
}

/* ---------- Wire up ---------- */
function init() {
  render();

  document.getElementById("addCardBtn").addEventListener("click", () => openCardEditor(null, "todo"));
  document.getElementById("managePeople").addEventListener("click", openPeopleManager);

  const search = document.getElementById("search");
  search.addEventListener("input", () => { searchQuery = search.value; applySearch(); });

  // card modal
  document.querySelectorAll("#priorityGrid .popt").forEach(b => {
    b.addEventListener("click", () => {
      editing.priority = b.dataset.p;
      document.querySelectorAll("#priorityGrid .popt").forEach(x => x.classList.toggle("selected", x === b));
    });
  });
  document.getElementById("cardSaveBtn").addEventListener("click", saveCardFromEditor);
  document.getElementById("cardCancelBtn").addEventListener("click", () => hideOverlay("cardOverlay"));
  document.getElementById("cardDeleteBtn").addEventListener("click", () => {
    if (editing.id) { deleteCard(editing.id); hideOverlay("cardOverlay"); }
  });

  // people modal
  document.getElementById("addPersonBtn").addEventListener("click", addPerson);
  document.getElementById("peopleCloseBtn").addEventListener("click", () => hideOverlay("peopleOverlay"));
  document.getElementById("newPerson").addEventListener("keydown", e => { if (e.key === "Enter") addPerson(); });

  // overlay click-to-close
  ["cardOverlay","peopleOverlay"].forEach(id => {
    const ov = document.getElementById(id);
    ov.addEventListener("click", e => { if (e.target === ov) hideOverlay(id); });
  });

  // keyboard shortcuts
  document.addEventListener("keydown", e => {
    const typing = ["INPUT","TEXTAREA","SELECT"].includes(document.activeElement.tagName);
    if (e.key === "Escape") {
      hideOverlay("cardOverlay"); hideOverlay("peopleOverlay");
    } else if (e.key === "n" && !typing) {
      e.preventDefault(); openCardEditor(null, "todo");
    } else if (e.key === "/" && !typing) {
      e.preventDefault(); document.getElementById("search").focus();
    } else if (e.key === "Enter" && document.getElementById("cardOverlay").classList.contains("show")) {
      // enter to save only when title focused-ish; allow Ctrl/Cmd+Enter anywhere
      if ((e.metaKey || e.ctrlKey) || document.activeElement.id === "f-title") {
        e.preventDefault(); saveCardFromEditor();
      }
    }
  });
}

document.addEventListener("DOMContentLoaded", init);
</script>
