<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Fun Game — Jump & Dodge!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    font-family: 'Trebuchet MS', 'Segoe UI', system-ui, sans-serif;
    background: #000; user-select: none;
  }
  #wrap {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #1a1033;
  }
  #game {
    display: block;
    width: 100vw; height: 100vh;
    image-rendering: auto;
    touch-action: none;
  }
  /* HUD */
  #hud {
    position: fixed; top: 0; left: 0; right: 0;
    padding: 14px 22px;
    display: flex; justify-content: space-between; align-items: flex-start;
    pointer-events: none;
    font-weight: 800;
    text-shadow: 0 3px 0 rgba(0,0,0,.35), 0 0 18px rgba(0,0,0,.25);
    color: #fff;
    z-index: 5;
  }
  .hud-block { display: flex; flex-direction: column; line-height: 1.1; }
  .hud-label {
    font-size: 11px; letter-spacing: 3px; opacity: .75; font-weight: 700; text-transform: uppercase;
  }
  .hud-value { font-size: clamp(22px, 4vw, 38px); }
  #scoreNow { color: #ffe14d; }
  #scoreBest { color: #6bf0ff; text-align: right; }
  #bestWrap { align-items: flex-end; }

  /* Overlays */
  .overlay {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; color: #fff;
    background: radial-gradient(circle at 50% 35%, rgba(40,20,80,.55), rgba(10,5,30,.85));
    backdrop-filter: blur(3px);
    padding: 24px;
    transition: opacity .25s ease;
  }
  .overlay.hidden { opacity: 0; pointer-events: none; }
  .title {
    font-size: clamp(44px, 11vw, 110px);
    font-weight: 900;
    letter-spacing: 2px;
    line-height: .95;
    background: linear-gradient(180deg, #fff6a8 0%, #ffd23f 45%, #ff7b3a 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    filter: drop-shadow(0 6px 0 rgba(0,0,0,.35)) drop-shadow(0 0 30px rgba(255,180,60,.45));
    transform: rotate(-2deg);
  }
  .subtitle {
    margin-top: 10px;
    font-size: clamp(14px, 3vw, 20px); font-weight: 700;
    color: #c9b8ff; letter-spacing: 1px;
  }
  .bigbtn {
    margin-top: 26px;
    padding: 16px 42px;
    border: none; border-radius: 999px;
    font-size: clamp(18px, 4vw, 26px); font-weight: 900; letter-spacing: 1px;
    color: #3a1b00;
    background: linear-gradient(180deg, #ffe14d, #ffb020);
    box-shadow: 0 8px 0 #c97a00, 0 14px 24px rgba(0,0,0,.4);
    cursor: pointer; pointer-events: auto;
    transition: transform .08s ease, box-shadow .08s ease;
  }
  .bigbtn:hover { transform: translateY(-2px); }
  .bigbtn:active { transform: translateY(6px); box-shadow: 0 2px 0 #c97a00, 0 6px 12px rgba(0,0,0,.4); }
  .bigbtn.alt { background: linear-gradient(180deg, #8be9ff, #4aa8ff); color: #06203a; box-shadow: 0 8px 0 #1f6fc0, 0 14px 24px rgba(0,0,0,.4); }
  .bigbtn.alt:active { box-shadow: 0 2px 0 #1f6fc0, 0 6px 12px rgba(0,0,0,.4); }

  .hint {
    margin-top: 22px; font-size: 13px; color: #9a8cc7; font-weight: 600; letter-spacing: .5px;
  }
  kbd {
    background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.25);
    border-radius: 6px; padding: 2px 8px; font-weight: 800; color: #fff; font-family: inherit;
  }
  .stats {
    margin-top: 18px; display: flex; gap: clamp(20px, 6vw, 50px); justify-content: center;
  }
  .stat { display: flex; flex-direction: column; align-items: center; }
  .stat .n { font-size: clamp(28px, 6vw, 48px); font-weight: 900; }
  .stat .l { font-size: 11px; letter-spacing: 2px; opacity: .7; text-transform: uppercase; }
  #endScore { color: #ffe14d; }
  #endBest { color: #6bf0ff; }
  .newbest {
    margin-top: 14px; font-size: clamp(16px, 3.5vw, 22px); font-weight: 900;
    color: #ff5ea8; text-shadow: 0 0 18px rgba(255,94,168,.6);
    animation: pop 0.6s ease infinite alternate;
  }
  @keyframes pop { from { transform: scale(1); } to { transform: scale(1.12); } }
  #muteBtn {
    position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
    z-index: 6; pointer-events: auto;
    background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.25);
    color: #fff; border-radius: 999px; padding: 6px 14px;
    font-size: 12px; font-weight: 800; letter-spacing: 1px; cursor: pointer;
    backdrop-filter: blur(4px);
  }
  .flash {
    position: fixed; inset: 0; background: #fff; z-index: 8;
    pointer-events: none; opacity: 0;
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>
</div>

<div id="hud">
  <div class="hud-block">
    <span class="hud-label">Score</span>
    <span class="hud-value" id="scoreNow">0</span>
  </div>
  <div class="hud-block" id="bestWrap">
    <span class="hud-label">Best</span>
    <span class="hud-value" id="scoreBest">0</span>
  </div>
</div>

<button id="muteBtn" title="Toggle sound">🔊 SOUND</button>
<div class="flash" id="flash"></div>

<!-- Start overlay -->
<div class="overlay" id="startScreen">
  <div class="title">FUN&nbsp;GAME</div>
  <div class="subtitle">Jump over obstacles. Survive as long as you can!</div>
  <button class="bigbtn" id="startBtn">▶ PLAY</button>
  <div class="hint">Press <kbd>Space</kbd> / <kbd>↑</kbd> or <kbd>Tap</kbd> to jump &nbsp;·&nbsp; double-jump in the air</div>
</div>

<!-- Game over overlay -->
<div class="overlay hidden" id="endScreen">
  <div class="title" style="font-size:clamp(36px,9vw,80px)">OUCH!</div>
  <div class="stats">
    <div class="stat"><span class="n" id="endScore">0</span><span class="l">Score</span></div>
    <div class="stat"><span class="n" id="endBest">0</span><span class="l">Best</span></div>
  </div>
  <div class="newbest hidden" id="newBest">🎉 NEW BEST!</div>
  <button class="bigbtn" id="retryBtn">↻ RETRY</button>
  <div class="hint">Press <kbd>Space</kbd> to try again</div>
</div>

<script>
"use strict";
/* =========================================================================
   FUN GAME — a colorful cartoon endless runner in a single file.
   Canvas2D rendering, parallax skies, WebAudio sound effects, local best score.
   ========================================================================= */

(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d', { alpha: false });

  // ----- DOM -----
  const hudScore = document.getElementById('scoreNow');
  const hudBest  = document.getElementById('scoreBest');
  const startScreen = document.getElementById('startScreen');
  const endScreen   = document.getElementById('endScreen');
  const startBtn = document.getElementById('startBtn');
  const retryBtn = document.getElementById('retryBtn');
  const endScoreEl = document.getElementById('endScore');
  const endBestEl  = document.getElementById('endBest');
  const newBestEl  = document.getElementById('newBest');
  const muteBtn = document.getElementById('muteBtn');
  const flashEl = document.getElementById('flash');

  // ----- Sizing -----
  let W = 0, H = 0, DPR = 1;
  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    GROUND_Y = H * 0.82;
  }
  let GROUND_Y = 0;

  // ----- Game state -----
  const STATE = { MENU: 0, PLAY: 1, OVER: 2 };
  let state = STATE.MENU;
  let score = 0;
  let displayScore = 0;
  let best = parseInt(localStorage.getItem('fungame_best') || '0', 10) || 0;
  let speed = 7;          // world speed (px / frame@60fps baseline)
  let baseSpeed = 7;
  let timeAlive = 0;
  let shake = 0;
  let muted = false;
  hudBest.textContent = best;

  // ----- Audio (WebAudio synthesized — funny little bleeps) -----
  let actx = null;
  function ensureAudio() {
    if (!actx) {
      try { actx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch(e) { actx = null; }
    }
    if (actx && actx.state === 'suspended') actx.resume();
  }
  function tone({freq=440, type='square', dur=0.12, vol=0.18, slideTo=null, delay=0, attack=0.005}) {
    if (muted || !actx) return;
    const t0 = actx.currentTime + delay;
    const osc = actx.createOscillator();
    const g = actx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t0);
    if (slideTo !== null) osc.frequency.exponentialRampToValueAtTime(Math.max(1, slideTo), t0 + dur);
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(vol, t0 + attack);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(g).connect(actx.destination);
    osc.start(t0); osc.stop(t0 + dur + 0.02);
  }
  function noiseBurst({dur=0.25, vol=0.25, delay=0, filterFreq=800}) {
    if (muted || !actx) return;
    const t0 = actx.currentTime + delay;
    const len = Math.floor(actx.sampleRate * dur);
    const buf = actx.createBuffer(1, len, actx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < len; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / len);
    const src = actx.createBufferSource(); src.buffer = buf;
    const filt = actx.createBiquadFilter(); filt.type = 'lowpass'; filt.frequency.value = filterFreq;
    const g = actx.createGain(); g.gain.setValueAtTime(vol, t0); g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    src.connect(filt).connect(g).connect(actx.destination);
    src.start(t0); src.stop(t0 + dur);
  }
  const SFX = {
    jump()  { tone({freq:420, slideTo:760, type:'square', dur:0.16, vol:0.16}); },
    dbl()   { tone({freq:620, slideTo:980, type:'square', dur:0.14, vol:0.15}); },
    land()  { tone({freq:180, slideTo:90,  type:'sine',   dur:0.10, vol:0.18}); noiseBurst({dur:0.08, vol:0.08, filterFreq:500}); },
    point() { tone({freq:880, type:'triangle', dur:0.07, vol:0.10}); tone({freq:1320, type:'triangle', dur:0.08, vol:0.10, delay:0.06}); },
    hi()    { [523,659,784,1046].forEach((f,i)=>tone({freq:f,type:'triangle',dur:0.12,vol:0.12,delay:i*0.07})); },
    die()   { tone({freq:520, slideTo:70, type:'sawtooth', dur:0.5, vol:0.22}); noiseBurst({dur:0.4, vol:0.18, filterFreq:1200, delay:0.02}); },
    start() { [392,523,659].forEach((f,i)=>tone({freq:f,type:'square',dur:0.12,vol:0.14,delay:i*0.08})); },
  };

  // ----- Input -----
  function jumpInput() {
    ensureAudio();
    if (state === STATE.MENU) { startGame(); return; }
    if (state === STATE.OVER) { startGame(); return; }
    if (state === STATE.PLAY) player.tryJump();
  }
  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
      e.preventDefault(); jumpInput();
    }
  });
  canvas.addEventListener('pointerdown', (e) => { e.preventDefault(); jumpInput(); }, {passive:false});
  startBtn.addEventListener('click', (e) => { e.stopPropagation(); ensureAudio(); startGame(); });
  retryBtn.addEventListener('click', (e) => { e.stopPropagation(); ensureAudio(); startGame(); });
  muteBtn.addEventListener('click', () => {
    muted = !muted; ensureAudio();
    muteBtn.textContent = muted ? '🔇 MUTED' : '🔊 SOUND';
  });

  // ----- Player (a googly-eyed cartoon blob) -----
  const player = {
    x: 0, y: 0, vy: 0, w: 54, h: 54,
    onGround: true, jumps: 0, maxJumps: 2,
    squash: 1, stretch: 1, blink: 0, blinkT: 0,
    legPhase: 0, dead: false, spin: 0,
    reset() {
      this.x = W * 0.22; this.y = GROUND_Y - this.h;
      this.vy = 0; this.onGround = true; this.jumps = 0;
      this.squash = 1; this.stretch = 1; this.dead = false; this.spin = 0;
    },
    tryJump() {
      if (this.jumps < this.maxJumps) {
        this.vy = this.jumps === 0 ? -16.5 : -14;
        this.jumps++;
        this.onGround = false;
        this.stretch = 1.35; this.squash = 0.72;
        if (this.jumps === 1) SFX.jump(); else SFX.dbl();
        spawnDust(this.x + this.w/2, GROUND_Y, 8);
      }
    },
    update(dt) {
      const grav = 0.92;
      if (!this.dead) {
        this.vy += grav * dt;
        this.y += this.vy * dt;
        if (this.y + this.h >= GROUND_Y) {
          if (!this.onGround) { // just landed
            this.onGround = true; this.jumps = 0;
            this.squash = 1.4; this.stretch = 0.7;
            SFX.land(); spawnDust(this.x + this.w/2, GROUND_Y, 6);
          }
          this.y = GROUND_Y - this.h; this.vy = 0;
        }
        // running legs
        if (this.onGround) this.legPhase += dt * 0.5 * (speed / baseSpeed);
      } else {
        this.vy += grav * dt; this.y += this.vy * dt;
        this.spin += dt * 0.35;
      }
      // ease squash/stretch back
      this.squash += (1 - this.squash) * 0.18 * dt;
      this.stretch += (1 - this.stretch) * 0.18 * dt;
      // blink
      this.blinkT += dt;
      if (this.blinkT > 120 + Math.random()*60) { this.blink = 8; this.blinkT = 0; }
      if (this.blink > 0) this.blink -= dt;
    },
    draw() {
      const cx = this.x + this.w/2;
      const cy = this.y + this.h/2;
      ctx.save();
      ctx.translate(cx, cy);
      if (this.dead) ctx.rotate(this.spin);
      ctx.scale(this.stretch, this.squash);

      // shadow on ground
      ctx.save();
      ctx.setTransform(DPR,0,0,DPR,0,0);
      const dist = Math.max(0, (GROUND_Y - (this.y + this.h)));
      const sw = Math.max(8, this.w * (1 - dist/420));
      ctx.globalAlpha = Math.max(0.06, 0.32 - dist/900);
      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.ellipse(cx, GROUND_Y + 4, sw/2, 7, 0, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1;
      ctx.restore();

      // legs (little wiggly nubs)
      if (this.onGround && !this.dead) {
        const lp = Math.sin(this.legPhase * Math.PI) * 6;
        ctx.fillStyle = '#b5357a';
        ctx.beginPath(); ctx.ellipse(-12, this.h/2 - 6 + lp, 7, 9, 0, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse( 12, this.h/2 - 6 - lp, 7, 9, 0, 0, Math.PI*2); ctx.fill();
      }

      // body (rounded blob)
      const r = this.w/2;
      const grad = ctx.createLinearGradient(0, -r, 0, r);
      grad.addColorStop(0, '#6ee7ff');
      grad.addColorStop(0.5, '#38c5ff');
      grad.addColorStop(1, '#1f7fe0');
      ctx.fillStyle = grad;
      ctx.strokeStyle = 'rgba(20,40,90,.45)'; ctx.lineWidth = 3;
      roundRect(ctx, -r, -r, this.w, this.h, r*0.55); ctx.fill(); ctx.stroke();

      // cheeky belly
      ctx.fillStyle = 'rgba(255,255,255,.85)';
      ctx.beginPath(); ctx.ellipse(0, 6, r*0.55, r*0.42, 0, 0, Math.PI*2); ctx.fill();

      // eyes (googly)
      const ex = 11, ey = -8;
      for (const sx of [-1, 1]) {
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.ellipse(sx*ex, ey, 9, 11, 0, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle='rgba(0,0,0,.15)'; ctx.lineWidth=1.5; ctx.stroke();
        // pupil — looks toward motion / direction of travel
        const lookX = this.dead ? 0 : (this.vy < -2 ? 2 : (this.onGround ? 3 : 0));
        const lookY = this.dead ? 4 : (this.vy < 0 ? -3 : (this.vy > 6 ? 3 : 1));
        if (this.blink > 0) {
          ctx.strokeStyle = '#222'; ctx.lineWidth = 2;
          ctx.beginPath(); ctx.moveTo(sx*ex - 6, ey); ctx.lineTo(sx*ex + 6, ey); ctx.stroke();
        } else {
          ctx.fillStyle = '#1a1a1a';
          ctx.beginPath(); ctx.arc(sx*ex + lookX, ey + lookY, 4.2, 0, Math.PI*2); ctx.fill();
          ctx.fillStyle = '#fff';
          ctx.beginPath(); ctx.arc(sx*ex + lookX - 1.3, ey + lookY - 1.3, 1.4, 0, Math.PI*2); ctx.fill();
        }
      }
      // smile
      ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 2.4; ctx.lineCap = 'round';
      ctx.beginPath();
      if (this.dead) { ctx.arc(0, 12, 6, Math.PI, Math.PI*2); } // o-mouth
      else { ctx.arc(0, 6, 8, 0.15*Math.PI, 0.85*Math.PI); }
      ctx.stroke();
      // little tongue
      if (!this.dead) { ctx.fillStyle = '#ff5e8a'; ctx.beginPath(); ctx.arc(2, 11, 2.4, 0, Math.PI*2); ctx.fill(); }

      ctx.restore();
    },
    hitbox() {
      // slightly forgiving
      const pad = 6;
      return { x: this.x + pad, y: this.y + pad, w: this.w - pad*2, h: this.h - pad*2 };
    }
  };

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.arcTo(x+w, y, x+w, y+h, r);
    ctx.arcTo(x+w, y+h, x, y+h, r);
    ctx.arcTo(x, y+h, x, y, r);
    ctx.arcTo(x, y, x+w, y, r);
    ctx.closePath();
  }

  // ----- Obstacles -----
  const OBSTACLE_KINDS = [
    { type:'cactus', w: 30, h: 64, color:'#2faa57' },
    { type:'cactus', w: 46, h: 92, color:'#1f8f47' },
    { type:'rock',   w: 56, h: 44, color:'#9a8478' },
    { type:'bird',   w: 50, h: 34, color:'#ff8a3d', flying:true }, // must duck? we just jump under/over — placed at head height
  ];
  let obstacles = [];
  let spawnTimer = 0;
  let nextSpawn = 90;

  function spawnObstacle() {
    const k = OBSTACLE_KINDS[Math.floor(Math.random() * OBSTACLE_KINDS.length)];
    const o = {
      type: k.type, w: k.w, h: k.h, color: k.color, flying: !!k.flying,
      x: W + 40, passed: false, wob: Math.random()*Math.PI*2,
    };
    if (k.flying) {
      o.y = GROUND_Y - (player.h + 14 + Math.random()*30); // floats up high — jump must clear or duck (we clear by double jump)
      o.baseY = o.y;
    } else {
      o.y = GROUND_Y - k.h;
    }
    obstacles.push(o);
  }

  function updateObstacles(dt) {
    spawnTimer += dt;
    if (spawnTimer >= nextSpawn) {
      spawnTimer = 0;
      // spacing scales inversely with speed so it stays fair
      nextSpawn = (70 + Math.random()*70) * (baseSpeed / speed) * 1.0;
      spawnObstacle();
      // occasional double obstacle
      if (Math.random() < 0.18 && speed > 9) {
        setTimeout(()=> { if (state===STATE.PLAY) spawnObstacle(); }, 220);
      }
    }
    for (let i = obstacles.length - 1; i >= 0; i--) {
      const o = obstacles[i];
      o.x -= speed * dt;
      if (o.flying) { o.wob += dt*0.1; o.y = o.baseY + Math.sin(o.wob)*6; }
      if (!o.passed && o.x + o.w < player.x) {
        o.passed = true; score++; SFX.point();
        if (score > 0 && score % 10 === 0) SFX.hi();
      }
      if (o.x + o.w < -60) obstacles.splice(i, 1);
    }
  }

  // ----- Particles (dust, sparkles, pop) -----
  let particles = [];
  function spawnDust(x, y, n) {
    for (let i = 0; i < n; i++) {
      particles.push({
        x, y, vx: (Math.random()-0.5)*4 - 1, vy: -Math.random()*3,
        life: 30 + Math.random()*15, max: 45, r: 3+Math.random()*4, kind:'dust'
      });
    }
  }
  function spawnPop(x, y) {
    for (let i = 0; i < 26; i++) {
      const a = Math.random()*Math.PI*2, s = 2 + Math.random()*6;
      const cols = ['#ffe14d','#ff7b3a','#ff5ea8','#6bf0ff','#a06bff'];
      particles.push({
        x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s - 2,
        life: 40 + Math.random()*25, max: 65, r: 3+Math.random()*4,
        kind: 'pop', color: cols[(Math.random()*cols.length)|0], grav: 0.25
      });
    }
  }
  function updateParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx * dt; p.y += p.vy * dt;
      if (p.grav) p.vy += p.grav * dt;
      else p.vy += 0.06 * dt;
      p.life -= dt;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }
  function drawParticles() {
    for (const p of particles) {
      const a = Math.max(0, p.life / p.max);
      ctx.globalAlpha = a;
      if (p.kind === 'dust') {
        ctx.fillStyle = '#e8dcc0';
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r * a, 0, Math.PI*2); ctx.fill();
      } else {
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
      }
    }
    ctx.globalAlpha = 1;
  }

  // ----- Parallax background layers -----
  // Each layer: array of decorative elements generated procedurally with wrap.
  const stars = [];
  function initStars() {
    stars.length = 0;
    for (let i = 0; i < 60; i++) stars.push({
      x: Math.random(), y: Math.random()*0.45, r: Math.random()*1.6+0.4, tw: Math.random()*Math.PI*2
    });
  }
  // Far hills, mid hills, trees/bushes — built as offset arrays
  let farLayer = [], midLayer = [], nearLayer = [];
  function initScenery() {
    farLayer = []; midLayer = []; nearLayer = [];
    // Far: rounded hills with positions in "world units" (we just mod by W)
    let x = 0;
    while (x < W * 2 + 200) {
      farLayer.push({ x, w: 200 + Math.random()*220, h: 90 + Math.random()*120 });
      x += 150 + Math.random()*120;
    }
    x = 0;
    while (x < W * 2 + 200) {
      midLayer.push({ x, w: 160 + Math.random()*160, h: 70 + Math.random()*90, tone: Math.random()<0.5 });
      x += 110 + Math.random()*90;
    }
    x = 0;
    while (x < W * 2 + 200) {
      const kind = Math.random();
      nearLayer.push({ x, kind: kind < 0.5 ? 'tree' : (kind < 0.8 ? 'bush' : 'flower'), s: 0.7 + Math.random()*0.6 });
      x += 70 + Math.random()*70;
    }
  }
  let farOff = 0, midOff = 0, nearOff = 0, cloudOff = 0;
  const clouds = [];
  function initClouds() {
    clouds.length = 0;
    for (let i = 0; i < 6; i++) clouds.push({
      x: Math.random()*W, y: 40 + Math.random()*(H*0.35), s: 0.7 + Math.random()*0.9, spd: 0.3 + Math.random()*0.5
    });
  }

  function drawSky() {
    // gradient sky shifts hue subtly with timeAlive for variety
    const g = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
    const hue = (timeAlive * 0.2) % 360;
    g.addColorStop(0, `hsl(${(260 + hue*0.05)%360}, 70%, 22%)`);
    g.addColorStop(0.4, `hsl(${(280 + hue*0.05)%360}, 65%, 38%)`);
    g.addColorStop(0.75, `hsl(${(320 + hue*0.05)%360}, 75%, 58%)`);
    g.addColorStop(1, `hsl(${(340 + hue*0.05)%360}, 85%, 72%)`);
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, GROUND_Y);

    // sun/moon glow
    const sunX = W * 0.78, sunY = H * 0.22;
    const sg = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, 220);
    sg.addColorStop(0, 'rgba(255,240,200,.9)');
    sg.addColorStop(0.3, 'rgba(255,210,150,.45)');
    sg.addColorStop(1, 'rgba(255,210,150,0)');
    ctx.fillStyle = sg; ctx.fillRect(0, 0, W, GROUND_Y);
    ctx.fillStyle = '#fff3c4';
    ctx.beginPath(); ctx.arc(sunX, sunY, 46, 0, Math.PI*2); ctx.fill();

    // stars (only upper area, fading when sky is bright-ish)
    for (const s of stars) {
      const tw = 0.5 + Math.sin(timeAlive*0.05 + s.tw)*0.5;
      ctx.globalAlpha = 0.35 * tw;
      ctx.fillStyle = '#fff';
      ctx.fillRect(s.x*W, s.y*H, s.r, s.r);
    }
    ctx.globalAlpha = 1;
  }

  function drawClouds(dt) {
    cloudOff += 0.25 * dt;
    for (const c of clouds) {
      let cx = ((c.x - cloudOff * c.spd) % (W + 200));
      if (cx < -200) cx += (W + 200);
      drawCloud(cx, c.y, c.s);
    }
  }
  function drawCloud(x, y, s) {
    ctx.fillStyle = 'rgba(255,255,255,.9)';
    ctx.beginPath();
    ctx.arc(x, y, 22*s, 0, Math.PI*2);
    ctx.arc(x+24*s, y+6*s, 18*s, 0, Math.PI*2);
    ctx.arc(x-24*s, y+8*s, 16*s, 0, Math.PI*2);
    ctx.arc(x+6*s, y+12*s, 20*s, 0, Math.PI*2);
    ctx.fill();
  }

  function drawFar(dt) {
    farOff += speed * 0.15 * dt;
    const baseY = GROUND_Y - 10;
    for (const h of farLayer) {
      let x = h.x - (farOff % (W*2));
      drawHillLooped(x, baseY, h.w, h.h, '#7a5bb0', '#5b3f8f');
    }
  }
  function drawMid(dt) {
    midOff += speed * 0.4 * dt;
    const baseY = GROUND_Y - 4;
    for (const h of midLayer) {
      let x = h.x - (midOff % (W*2));
      const c1 = h.tone ? '#5fb86a' : '#4aa85e';
      const c2 = h.tone ? '#3c9650' : '#2f8246';
      drawHillLooped(x, baseY, h.w, h.h, c1, c2);
    }
  }
  function drawHillLooped(x, baseY, w, h, c1, c2) {
    // draw twice for wrap
    for (let k = 0; k < 2; k++) {
      const xx = x + k * (W*2);
      if (xx + w < -10 || xx > W + 10) continue;
      const g = ctx.createLinearGradient(0, baseY - h, 0, baseY);
      g.addColorStop(0, c1); g.addColorStop(1, c2);
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.moveTo(xx, baseY);
      ctx.quadraticCurveTo(xx + w/2, baseY - h*1.25, xx + w, baseY);
      ctx.lineTo(xx + w, baseY); ctx.closePath();
      ctx.fill();
    }
  }
  function drawNear(dt) {
    nearOff += speed * 0.8 * dt;
    for (const n of nearLayer) {
      let x = n.x - (nearOff % (W*2));
      for (let k = 0; k < 2; k++) {
        const xx = x + k * (W*2);
        if (xx < -60 || xx > W + 60) continue;
        drawScenery(xx, GROUND_Y, n.kind, n.s);
      }
    }
  }
  function drawScenery(x, gy, kind, s) {
    if (kind === 'tree') {
      ctx.fillStyle = '#6b3f1d';
      ctx.fillRect(x-4*s, gy-22*s, 8*s, 22*s);
      ctx.fillStyle = '#2f8f3a';
      ctx.beginPath(); ctx.arc(x, gy-30*s, 18*s, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#3aa847';
      ctx.beginPath(); ctx.arc(x-9*s, gy-26*s, 12*s, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x+9*s, gy-26*s, 12*s, 0, Math.PI*2); ctx.fill();
    } else if (kind === 'bush') {
      ctx.fillStyle = '#357a3c';
      ctx.beginPath(); ctx.arc(x, gy-6*s, 14*s, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x-12*s, gy-3*s, 10*s, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x+12*s, gy-3*s, 10*s, 0, Math.PI*2); ctx.fill();
    } else {
      ctx.fillStyle = '#2f8f3a';
      ctx.fillRect(x-1*s, gy-16*s, 2*s, 16*s);
      ctx.fillStyle = ['#ff5ea8','#ffe14d','#ff7b3a','#6bf0ff'][Math.floor((x*0.01)%4)];
      ctx.beginPath(); ctx.arc(x, gy-18*s, 5*s, 0, Math.PI*2); ctx.fill();
    }
  }

  function drawGround(dt) {
    // ground band
    const g = ctx.createLinearGradient(0, GROUND_Y, 0, H);
    g.addColorStop(0, '#caa15a');
    g.addColorStop(0.25, '#b07f3e');
    g.addColorStop(1, '#7a4f24');
    ctx.fillStyle = g;
    ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);

    // top grass strip
    ctx.fillStyle = '#3aa847';
    ctx.fillRect(0, GROUND_Y - 8, W, 10);
    ctx.fillStyle = '#2f8f3a';
    ctx.fillRect(0, GROUND_Y - 2, W, 4);

    // moving ground texture dashes (parallax fast)
    const dashOff = (timeAlive * speed * 1.2) % 60;
    ctx.strokeStyle = 'rgba(90,55,20,.45)';
    ctx.lineWidth = 3;
    for (let y = GROUND_Y + 20; y < H; y += 26) {
      for (let x = -dashOff; x < W; x += 60) {
        ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x + 30, y); ctx.stroke();
      }
    }
    // little pebbles
    ctx.fillStyle = 'rgba(60,40,15,.5)';
    const pebOff = (timeAlive * speed * 1.2) % 90;
    for (let x = -pebOff; x < W; x += 90) {
      ctx.beginPath(); ctx.arc(x, GROUND_Y + 40, 3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x + 50, GROUND_Y + 62, 2, 0, Math.PI*2); ctx.fill();
    }
  }

  // ----- Obstacle drawing -----
  function drawObstacle(o) {
    ctx.save();
    ctx.translate(o.x, o.y);
    // shadow
    ctx.globalAlpha = 0.22; ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.ellipse(o.w/2, (GROUND_Y - o.y) , o.w*0.55, 6, 0, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;

    if (o.type === 'cactus') {
      const g = ctx.createLinearGradient(0,0,o.w,0);
      g.addColorStop(0, '#1f8f47'); g.addColorStop(0.5, o.color); g.addColorStop(1, '#157a38');
      ctx.fillStyle = g;
      roundRect(ctx, o.w*0.3, 0, o.w*0.4, o.h, 8); ctx.fill();
      // arms
      ctx.fillRect(o.w*0.1, o.h*0.3, o.w*0.25, 8);
      ctx.fillRect(o.w*0.1, o.h*0.18, 8, o.h*0.2);
      ctx.fillRect(o.w*0.66, o.h*0.45, o.w*0.25, 8);
      ctx.fillRect(o.w*0.84, o.h*0.33, 8, o.h*0.2);
      // face (grumpy little cactus)
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(o.w*0.42, o.h*0.2, 3, 0, Math.PI*2);
      ctx.arc(o.w*0.58, o.h*0.2, 3, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#1a1a1a';
      ctx.beginPath(); ctx.arc(o.w*0.43, o.h*0.2, 1.5, 0, Math.PI*2);
      ctx.arc(o.w*0.59, o.h*0.2, 1.5, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(o.w*0.5, o.h*0.28, 4, Math.PI, Math.PI*2); ctx.stroke();
      // spines
      ctx.strokeStyle = 'rgba(255,255,255,.7)'; ctx.lineWidth = 1;
      for (let yy = 8; yy < o.h-6; yy += 12) {
        ctx.beginPath(); ctx.moveTo(o.w*0.45, yy); ctx.lineTo(o.w*0.45-4, yy-2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(o.w*0.55, yy); ctx.lineTo(o.w*0.55+4, yy-2); ctx.stroke();
      }
    } else if (o.type === 'rock') {
      const g = ctx.createLinearGradient(0,0,0,o.h);
      g.addColorStop(0, '#b8a594'); g.addColorStop(1, '#7c6452');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.moveTo(2, o.h);
      ctx.lineTo(0, o.h*0.5);
      ctx.lineTo(o.w*0.25, 4);
      ctx.lineTo(o.w*0.7, 0);
      ctx.lineTo(o.w-2, o.h*0.4);
      ctx.lineTo(o.w, o.h);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,.25)';
      ctx.beginPath(); ctx.moveTo(o.w*0.3, 4); ctx.lineTo(o.w*0.65, 2); ctx.lineTo(o.w*0.5, o.h*0.45); ctx.closePath(); ctx.fill();
      // grumpy face
      ctx.fillStyle = '#1a1a1a';
      ctx.beginPath(); ctx.arc(o.w*0.4, o.h*0.55, 2.5, 0, Math.PI*2);
      ctx.arc(o.w*0.6, o.h*0.55, 2.5, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle='#1a1a1a'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.arc(o.w*0.5, o.h*0.7, 4, Math.PI, Math.PI*2); ctx.stroke();
    } else if (o.type === 'bird') {
      // body
      const g = ctx.createLinearGradient(0,0,0,o.h);
      g.addColorStop(0, '#ffb066'); g.addColorStop(1, '#ff6a1a');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.ellipse(o.w*0.5, o.h*0.55, o.w*0.4, o.h*0.42, 0, 0, Math.PI*2); ctx.fill();
      // wing flapping
      const flap = Math.sin(timeAlive*0.4 + o.wob) * 10;
      ctx.fillStyle = '#e0541a';
      ctx.beginPath(); ctx.ellipse(o.w*0.5, o.h*0.5 + flap, o.w*0.42, o.h*0.18, 0, 0, Math.PI*2); ctx.fill();
      // head + beak
      ctx.fillStyle = '#ffd9a8';
      ctx.beginPath(); ctx.arc(o.w*0.78, o.h*0.4, 10, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ffcf3a';
      ctx.beginPath(); ctx.moveTo(o.w*0.86, o.h*0.38); ctx.lineTo(o.w+6, o.h*0.42); ctx.lineTo(o.w*0.86, o.h*0.48); ctx.closePath(); ctx.fill();
      // eye
      ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(o.w*0.8, o.h*0.38, 3.5, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#1a1a1a'; ctx.beginPath(); ctx.arc(o.w*0.81, o.h*0.38, 1.8, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }

  // ----- Collision -----
  function aabb(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
  }
  function checkCollisions() {
    const pb = player.hitbox();
    for (const o of obstacles) {
      // tighter hitbox for cactus/rock/bird cores
      const ob = (o.type === 'bird')
        ? { x: o.x + 6, y: o.y + 4, w: o.w - 12, h: o.h - 8 }
        : { x: o.x + 5, y: o.y + 4, w: o.w - 10, h: o.h - 6 };
      if (aabb(pb, ob)) { gameOver(); return; }
    }
  }

  // ----- Game flow -----
  function startGame() {
    ensureAudio();
    SFX.start();
    state = STATE.PLAY;
    score = 0; displayScore = 0;
    speed = baseSpeed; timeAlive = 0;
    obstacles = []; particles = []; spawnTimer = 0; nextSpawn = 90;
    shake = 0;
    player.reset();
    startScreen.classList.add('hidden');
    endScreen.classList.add('hidden');
    newBestEl.classList.add('hidden');
  }

  function gameOver() {
    if (state !== STATE.PLAY) return;
    state = STATE.OVER;
    player.dead = true;
    player.vy = -12;
    SFX.die();
    spawnPop(player.x + player.w/2, player.y + player.h/2);
    shake = 16;
    flashScreen();
    const isNew = score > best;
    if (isNew) {
      best = score;
      localStorage.setItem('fungame_best', String(best));
      hudBest.textContent = best;
      newBestEl.classList.remove('hidden');
    }
    endScoreEl.textContent = score;
    endBestEl.textContent = best;
    // show end screen after a tiny delay so the pop is visible
    setTimeout(()=> { endScreen.classList.remove('hidden'); }, 480);
  }

  function flashScreen() {
    flashEl.style.transition = 'none';
    flashEl.style.opacity = '0.8';
    requestAnimationFrame(()=> {
      flashEl.style.transition = 'opacity .4s ease';
      flashEl.style.opacity = '0';
    });
  }

  // ----- Main loop -----
  let last = performance.now();
  function loop(now) {
    const rawDt = (now - last) / 16.6667; // normalized to ~60fps frames
    last = now;
    const dt = Math.min(rawDt, 2.5); // clamp to avoid huge jumps after tab switch
    update(dt);
    render(dt);
    requestAnimationFrame(loop);
  }

  function update(dt) {
    if (state === STATE.PLAY) {
      timeAlive += dt;
      // ramp speed up over time, with a cap
      speed = baseSpeed + Math.min(11, timeAlive * 0.018);
      player.update(dt);
      updateObstacles(dt);
      checkCollisions();
      // score also creeps from distance (so it ticks even between obstacles)
      displayScore += dt * 0.15 * (speed / baseSpeed);
      const shown = Math.floor(displayScore) + score;
      hudScore.textContent = shown;
    } else if (state === STATE.OVER) {
      player.update(dt);
    } else {
      // menu: gentle idle bob
      player.y = GROUND_Y - player.h + Math.sin(timeAlive*0.05)*4;
      timeAlive += dt;
    }
    updateParticles(dt);
    if (shake > 0) shake = Math.max(0, shake - dt * 1.2);
  }

  function render(dt) {
    ctx.save();
    if (shake > 0) {
      ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);
    }
    drawSky();
    drawClouds(dt);
    drawFar(dt);
    drawMid(dt);
    drawNear(dt);
    drawGround(dt);

    for (const o of obstacles) drawObstacle(o);
    player.draw();
    drawParticles();

    ctx.restore();
  }

  // ----- Init -----
  function fullInit() {
    resize();
    initStars();
    initClouds();
    initScenery();
    player.reset();
  }
  window.addEventListener('resize', () => {
    resize();
    initScenery();
    if (state === STATE.MENU) player.reset();
  });
  fullInit();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
