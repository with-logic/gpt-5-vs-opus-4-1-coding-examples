<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stars & Stripes Trivia</title>
<style>
  :root{
    --bg-1:#0b1026;
    --bg-2:#1a2a6c;
    --bg-3:#b21f1f;
    --ink:#f7f7ff;
    --muted:#aeb4d6;
    --card:rgba(255,255,255,0.06);
    --card-border:rgba(255,255,255,0.14);
    --correct:#22c55e;
    --wrong:#ef4444;
    --accent:#fbbf24;
    --shadow:0 20px 60px rgba(0,0,0,0.45);
    --radius:22px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Segoe UI', system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif;
    color:var(--ink);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    background:radial-gradient(1200px 800px at 10% 10%, #1a2a6c 0%, transparent 60%),
               radial-gradient(1000px 700px at 90% 90%, #b21f1f 0%, transparent 55%),
               linear-gradient(160deg, var(--bg-1), #060912 100%);
    background-attachment:fixed;
    overflow-x:hidden;
  }
  /* subtle starfield */
  .stars{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.5}

  .app{
    position:relative;
    z-index:1;
    width:min(720px,100%);
  }

  /* ---------- Header ---------- */
  .brand{
    display:flex;
    align-items:center;
    gap:12px;
    justify-content:center;
    margin-bottom:18px;
  }
  .flag{
    width:46px;height:32px;border-radius:5px;overflow:hidden;display:block;
    box-shadow:0 6px 18px rgba(0,0,0,.4);
    background:
      linear-gradient(#b21f1f 0 12.5%, #fff 12.5% 25%, #b21f1f 25% 37.5%, #fff 37.5% 50%, #b21f1f 50% 62.5%, #fff 62.5% 75%, #b21f1f 75% 87.5%, #fff 87.5% 100%);
    position:relative;
  }
  .flag::before{
    content:"";position:absolute;left:0;top:0;width:40%;height:53%;
    background:#1a2a6c;
    background-image:
      radial-gradient(circle at 25% 25%, #fff 1.2px, transparent 1.6px),
      radial-gradient(circle at 75% 25%, #fff 1.2px, transparent 1.6px),
      radial-gradient(circle at 50% 55%, #fff 1.2px, transparent 1.6px),
      radial-gradient(circle at 25% 85%, #fff 1.2px, transparent 1.6px),
      radial-gradient(circle at 75% 85%, #fff 1.2px, transparent 1.6px);
    background-size:100% 100%;
  }
  .brand h1{
    font-size:clamp(22px,4vw,30px);font-weight:800;letter-spacing:.3px;
    background:linear-gradient(90deg,#fff,#fbbf24);
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .brand h1 small{display:block;font-size:12px;font-weight:600;letter-spacing:3px;color:var(--muted);-webkit-text-fill-color:var(--muted);}

  /* ---------- Progress ---------- */
  .progress-wrap{margin-bottom:18px}
  .progress-meta{
    display:flex;justify-content:space-between;align-items:center;
    font-size:13px;color:var(--muted);margin-bottom:8px;letter-spacing:.4px;
  }
  .progress-track{
    height:12px;border-radius:999px;background:rgba(255,255,255,.08);
    overflow:hidden;border:1px solid rgba(255,255,255,.1);
  }
  .progress-fill{
    height:100%;width:0%;border-radius:999px;
    background:linear-gradient(90deg,#fbbf24,#22c55e);
    transition:width .55s cubic-bezier(.22,1,.36,1);
    box-shadow:0 0 14px rgba(251,191,36,.55);
  }

  /* ---------- Card ---------- */
  .card{
    background:var(--card);
    border:1px solid var(--card-border);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
    padding:32px clamp(20px,5vw,40px);
    position:relative;
    overflow:hidden;
    animation:cardIn .5s cubic-bezier(.22,1,.36,1);
  }
  .card::after{
    content:"";position:absolute;inset:0;border-radius:var(--radius);
    background:linear-gradient(120deg,rgba(255,255,255,.08),transparent 40%);
    pointer-events:none;
  }
  @keyframes cardIn{from{opacity:0;transform:translateY(18px) scale(.98)}to{opacity:1;transform:none}}

  .topic-pill{
    display:inline-flex;align-items:center;gap:8px;
    font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
    color:var(--accent);background:rgba(251,191,36,.12);
    border:1px solid rgba(251,191,36,.35);
    padding:6px 14px;border-radius:999px;margin-bottom:18px;
  }
  .qnum{font-size:13px;color:var(--muted);margin-bottom:10px}
  .question{
    font-size:clamp(22px,3.6vw,30px);font-weight:800;line-height:1.3;margin-bottom:26px;
  }

  .options{display:grid;gap:12px}
  .option{
    text-align:left;width:100%;
    display:flex;align-items:center;gap:14px;
    background:rgba(255,255,255,.05);
    border:2px solid rgba(255,255,255,.12);
    color:var(--ink);
    padding:16px 18px;border-radius:14px;
    font-size:clamp(16px,2.4vw,18px);font-weight:600;
    cursor:pointer;transition:all .2s ease;
    position:relative;
  }
  .option:hover:not(:disabled){border-color:rgba(251,191,36,.6);background:rgba(251,191,36,.08);transform:translateY(-2px)}
  .option:disabled{cursor:default}
  .key{
    flex:none;width:30px;height:30px;border-radius:8px;
    background:rgba(255,255,255,.12);display:grid;place-items:center;
    font-size:14px;font-weight:800;color:var(--accent);
    border:1px solid rgba(255,255,255,.18);
  }
  .opt-text{flex:1}
  .opt-mark{flex:none;width:24px;height:24px;opacity:0;transition:opacity .2s}
  .option.correct{border-color:var(--correct);background:rgba(34,197,94,.18)}
  .option.correct .opt-mark{opacity:1;color:var(--correct)}
  .option.wrong{border-color:var(--wrong);background:rgba(239,68,68,.18)}
  .option.wrong .opt-mark{opacity:1;color:var(--wrong)}
  .option.reveal{border-color:var(--correct);background:rgba(34,197,94,.14)}
  .option.reveal .opt-mark{opacity:1;color:var(--correct)}

  /* feedback flash */
  .flash{
    position:absolute;inset:0;display:grid;place-items:center;
    pointer-events:none;z-index:5;
  }
  .flash svg{width:120px;height:120px;opacity:0}
  .flash.show svg{animation:pop .7s cubic-bezier(.22,1.4,.4,1) forwards}
  .flash.correct{background:radial-gradient(circle at 50% 50%, rgba(34,197,94,.22), transparent 60%)}
  .flash.wrong{background:radial-gradient(circle at 50% 50%, rgba(239,68,68,.22), transparent 60%)}
  @keyframes pop{
    0%{opacity:0;transform:scale(.3)}
    40%{opacity:1;transform:scale(1.15)}
    70%{transform:scale(.95)}
    100%{opacity:0;transform:scale(1)}
  }

  .actions{display:flex;justify-content:flex-end;margin-top:24px}
  .btn{
    background:linear-gradient(90deg,#fbbf24,#f59e0b);
    color:#1a1205;font-weight:800;border:none;border-radius:12px;
    padding:13px 26px;font-size:15px;cursor:pointer;letter-spacing:.3px;
    transition:transform .15s, box-shadow .2s, opacity .2s;
    box-shadow:0 10px 24px rgba(251,191,36,.3);
  }
  .btn:hover{transform:translateY(-2px);box-shadow:0 14px 30px rgba(251,191,36,.45)}
  .btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
  .btn.ghost{background:rgba(255,255,255,.1);color:var(--ink);box-shadow:none}
  .btn.ghost:hover{background:rgba(255,255,255,.18)}

  /* ---------- Result ---------- */
  .result{text-align:center}
  .result .score-ring{
    width:170px;height:170px;margin:6px auto 22px;position:relative;
  }
  .result .score-ring svg{transform:rotate(-90deg)}
  .result .score-ring .num{
    position:absolute;inset:0;display:grid;place-items:center;
    font-size:40px;font-weight:800;
  }
  .result .score-ring .num span{font-size:14px;font-weight:600;color:var(--muted);display:block}
  .result h2{font-size:clamp(26px,5vw,38px);font-weight:800;margin-bottom:8px}
  .result .verdict{color:var(--muted);font-size:16px;margin-bottom:24px;max-width:460px;margin-inline:auto}
  .stat-row{
    display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:26px;
  }
  .stat{
    background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);
    border-radius:14px;padding:14px;
  }
  .stat .v{font-size:24px;font-weight:800;color:var(--accent)}
  .stat .l{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}

  .btn-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}

  /* start screen */
  .start{text-align:center;padding:8px}
  .start h2{font-size:clamp(24px,4.5vw,34px);margin-bottom:10px}
  .start p{color:var(--muted);margin-bottom:22px;line-height:1.6}
  .topics-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:24px}
  .topic-chip{
    background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);
    border-radius:10px;padding:10px 12px;font-size:13px;font-weight:600;
    display:flex;align-items:center;gap:8px;color:var(--muted);
  }
  .topic-chip .dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}

  .shake{animation:shake .4s}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}

  @media (max-width:480px){
    .topics-grid{grid-template-columns:1fr}
    .stat-row{grid-template-columns:1fr}
  }
</style>
</head>
<body>
<canvas class="stars" id="stars"></canvas>
<main class="app">
  <div class="brand">
    <div class="flag" aria-hidden="true"></div>
    <h1>Stars &amp; Stripes Trivia<small>U.S. BASICS QUIZ</small></h1>
  </div>

  <div class="progress-wrap" id="progressWrap" style="display:none">
    <div class="progress-meta">
      <span id="topicLabel">Topic</span>
      <span id="countLabel">Question 1 of 5</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  </div>

  <section class="card" id="card">
    <!-- dynamic content -->
  </section>
</main>

<script>
/* ---------------- Quiz data ---------------- */
const QUIZZES = [
  {
    topic: "U.S. Presidents",
    color: "#fbbf24",
    questions: [
      { q: "Who was the first President of the United States?",
        a: ["George Washington","Thomas Jefferson","Abraham Lincoln","John Adams"], c:0 },
      { q: "Which president is on the U.S. one-dollar bill?",
        a: ["Abraham Lincoln","George Washington","Benjamin Franklin","Andrew Jackson"], c:1 },
      { q: "Which president issued the Emancipation Proclamation?",
        a: ["Ulysses S. Grant","Abraham Lincoln","Franklin D. Roosevelt","Theodore Roosevelt"], c:1 },
      { q: "Who was president during most of World War II?",
        a: ["Harry S. Truman","Franklin D. Roosevelt","Dwight D. Eisenhower","John F. Kennedy"], c:1 },
      { q: "Which president is famous for the quote 'Ask not what your country can do for you'?",
        a: ["Richard Nixon","John F. Kennedy","Ronald Reagan","Lyndon B. Johnson"], c:1 },
    ]
  },
  {
    topic: "U.S. Geography",
    color: "#22c55e",
    questions: [
      { q: "What is the capital city of the United States?",
        a: ["New York City","Washington, D.C.","Philadelphia","Boston"], c:1 },
      { q: "Which is the largest U.S. state by area?",
        a: ["Texas","California","Alaska","Montana"], c:2 },
      { q: "Which river is the longest in the United States?",
        a: ["Mississippi River","Missouri River","Colorado River","Ohio River"], c:1 },
      { q: "The Grand Canyon is located in which state?",
        a: ["Nevada","Utah","Arizona","Colorado"], c:2 },
      { q: "Which ocean borders the west coast of the United States?",
        a: ["Atlantic Ocean","Pacific Ocean","Arctic Ocean","Indian Ocean"], c:1 },
    ]
  },
  {
    topic: "American History",
    color: "#ef4444",
    questions: [
      { q: "In what year did the Declaration of Independence get adopted?",
        a: ["1492","1776","1812","1865"], c:1 },
      { q: "How many original colonies declared independence?",
        a: ["10","13","50","20"], c:1 },
      { q: "What year did the United States land astronauts on the Moon?",
        a: ["1958","1969","1972","1981"], c:1 },
      { q: "Which war was fought between the northern and southern states?",
        a: ["Revolutionary War","War of 1812","Civil War","World War I"], c:2 },
      { q: "Which document begins with 'We the People'?",
        a: ["Declaration of Independence","U.S. Constitution","Bill of Rights","Magna Carta"], c:1 },
    ]
  },
  {
    topic: "U.S. States & Capitals",
    color: "#60a5fa",
    questions: [
      { q: "What is the capital of California?",
        a: ["Los Angeles","San Francisco","Sacramento","San Diego"], c:2 },
      { q: "What is the capital of Texas?",
        a: ["Dallas","Houston","Austin","San Antonio"], c:2 },
      { q: "What is the capital of Florida?",
        a: ["Miami","Tallahassee","Orlando","Tampa"], c:1 },
      { q: "What is the capital of New York state?",
        a: ["New York City","Buffalo","Albany","Rochester"], c:2 },
      { q: "What is the capital of Illinois?",
        a: ["Chicago","Springfield","Peoria","Champaign"], c:1 },
    ]
  },
  {
    topic: "U.S. Symbols & Holidays",
    color: "#f97316",
    questions: [
      { q: "What is the national bird of the United States?",
        a: ["Bald eagle","Turkey","Dove","Hawk"], c:0 },
      { q: "On what date is Independence Day celebrated?",
        a: ["June 14","July 4","September 17","December 25"], c:1 },
      { q: "How many stripes are on the U.S. flag?",
        a: ["50","13","48","10"], c:1 },
      { q: "How many stars are on the U.S. flag?",
        a: ["13","48","50","52"], c:2 },
      { q: "What is the national anthem of the United States?",
        a: ["God Bless America","The Star-Spangled Banner","America the Beautiful","Yankee Doodle"], c:1 },
    ]
  },
  {
    topic: "U.S. Government",
    color: "#a78bfa",
    questions: [
      { q: "How many branches does the U.S. government have?",
        a: ["Two","Three","Four","Five"], c:1 },
      { q: "How many senators serve in the U.S. Senate?",
        a: ["50","100","435","538"], c:1 },
      { q: "What is the term length for a U.S. President?",
        a: ["4 years","6 years","8 years","2 years"], c:0 },
      { q: "Which branch of government interprets the laws?",
        a: ["Executive","Legislative","Judicial","Cabinet"], c:2 },
      { q: "How many U.S. Supreme Court justices are there?",
        a: ["7","9","11","12"], c:1 },
    ]
  },
  {
    topic: "American Landmarks",
    color: "#14b8a6",
    questions: [
      { q: "Which statue stands in New York Harbor?",
        a: ["Statue of Liberty","Lincoln Memorial","Mount Rushmore","Liberty Bell"], c:0 },
      { q: "Mount Rushmore features the faces of how many presidents?",
        a: ["Three","Four","Five","Six"], c:1 },
      { q: "The Golden Gate Bridge is located in which city?",
        a: ["Los Angeles","San Diego","San Francisco","Seattle"], c:2 },
      { q: "Which monument is a tall obelisk in Washington, D.C.?",
        a: ["Lincoln Memorial","Washington Monument","Jefferson Memorial","Vietnam Wall"], c:1 },
      { q: "Where is the Liberty Bell located?",
        a: ["Boston","New York","Philadelphia","Baltimore"], c:2 },
    ]
  },
  {
    topic: "American Sports",
    color: "#ec4899",
    questions: [
      { q: "How many players are on a baseball team on the field?",
        a: ["9","11","5","7"], c:0 },
      { q: "In American football, how many points is a touchdown worth (without the extra point)?",
        a: ["3","6","7","2"], c:1 },
      { q: "How many points is a basketball free throw worth?",
        a: ["1","2","3","4"], c:0 },
      { q: "What sport is known as 'America's pastime'?",
        a: ["Football","Basketball","Baseball","Soccer"], c:2 },
      { q: "The Super Bowl is the championship for which sport?",
        a: ["Baseball","Basketball","Football","Hockey"], c:2 },
    ]
  },
  {
    topic: "Famous Americans",
    color: "#facc15",
    questions: [
      { q: "Who invented the light bulb and held over 1,000 patents?",
        a: ["Nikola Tesla","Thomas Edison","Benjamin Franklin","Alexander Graham Bell"], c:1 },
      { q: "Who was the civil rights leader famous for his 'I Have a Dream' speech?",
        a: ["Malcolm X","Martin Luther King Jr.","Frederick Douglass","Rosa Parks"], c:1 },
      { q: "Which woman refused to give up her bus seat in Montgomery, Alabama?",
        a: ["Harriet Tubman","Rosa Parks","Sojourner Truth","Eleanor Roosevelt"], c:1 },
      { q: "Who was the first man to fly an airplane across the Atlantic solo?",
        a: ["Amelia Earhart","Charles Lindbergh","Wright Brothers","Neil Armstrong"], c:1 },
      { q: "Which American woman was a pioneer of the Underground Railroad?",
        a: ["Harriet Tubman","Clara Barton","Susan B. Anthony","Betsy Ross"], c:0 },
    ]
  },
  {
    topic: "American Pop Culture",
    color: "#38bdf8",
    questions: [
      { q: "Which movie series features a character named Luke Skywalker?",
        a: ["Star Trek","Star Wars","Indiana Jones","The Matrix"], c:1 },
      { q: "Which animated mouse is the mascot of The Walt Disney Company?",
        a: ["Mickey Mouse","Jerry","Stuart Little","Speedy Gonzales"], c:0 },
      { q: "Which city is home to the Hollywood film industry?",
        a: ["New York City","Las Vegas","Los Angeles","San Francisco"], c:2 },
      { q: "Which band sang 'I Want to Hold Your Hand'?",
        a: ["The Rolling Stones","The Beatles","The Beach Boys","The Doors"], c:1 },
      { q: "Which U.S. theme park opened in 1955 in Anaheim, California?",
        a: ["Universal Studios","Six Flags","Disneyland","Busch Gardens"], c:2 },
    ]
  },
];

/* ---------------- State ---------------- */
const LETTERS = ["A","B","C","D"];
const PER_QUESTION = 1; // pts normalized at end

let state = {
  quiz: null,
  idx: 0,
  score: 0,
  answered: 0,
  correctCount: 0,
  locked: false,
};

const card = document.getElementById('card');
const progressWrap = document.getElementById('progressWrap');
const progressFill = document.getElementById('progressFill');
const countLabel = document.getElementById('countLabel');
const topicLabel = document.getElementById('topicLabel');

function pickQuiz(){
  const i = Math.floor(Math.random() * QUIZZES.length);
  return QUIZZES[i];
}

/* ---------------- Screens ---------------- */
function startScreen(){
  progressWrap.style.display = 'none';
  const chips = QUIZZES.map(q =>
    `<div class="topic-chip"><span class="dot" style="background:${q.color}"></span>${q.topic}</div>`
  ).join('');
  card.innerHTML = `
    <div class="start">
      <h2>Ready to test your U.S. knowledge?</h2>
      <p>Ten themed quizzes — pick a random one and answer 5 questions. Big text, instant feedback, and a final scorecard at the end.</p>
      <div class="topics-grid">${chips}</div>
      <button class="btn" id="startBtn">Start Random Quiz →</button>
    </div>`;
  document.getElementById('startBtn').onclick = beginQuiz;
}

function beginQuiz(){
  state.quiz = pickQuiz();
  state.idx = 0;
  state.score = 0;
  state.correctCount = 0;
  state.answered = 0;
  progressWrap.style.display = 'block';
  topicLabel.textContent = state.quiz.topic;
  topicLabel.style.color = state.quiz.color;
  renderQuestion();
}

function renderQuestion(){
  const q = state.quiz.questions[state.idx];
  const total = state.quiz.questions.length;
  state.locked = false;
  countLabel.textContent = `Question ${state.idx+1} of ${total}`;
  progressFill.style.width = ((state.idx)/total*100) + '%';

  const opts = q.a.map((txt,i)=>`
    <button class="option" data-i="${i}">
      <span class="key">${LETTERS[i]}</span>
      <span class="opt-text">${txt}</span>
      <svg class="opt-mark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
    </button>`).join('');

  card.innerHTML = `
    <div class="flash" id="flash"></div>
    <span class="topic-pill" style="color:${state.quiz.color};background:${hexA(state.quiz.color,.12)};border-color:${hexA(state.quiz.color,.35)}">${state.quiz.topic}</span>
    <div class="qnum">Question ${state.idx+1} of ${total}</div>
    <h2 class="question">${q.q}</h2>
    <div class="options" id="options">${opts}</div>
    <div class="actions"><button class="btn" id="nextBtn" disabled>Next →</button></div>
  `;

  // reset pop-in animation
  card.style.animation = 'none';
  void card.offsetWidth;
  card.style.animation = '';

  const optEls = [...card.querySelectorAll('.option')];
  optEls.forEach(el=>{
    el.addEventListener('click', ()=> choose(+el.dataset.i, optEls, q));
  });
  document.getElementById('nextBtn').onclick = nextQuestion;
}

function choose(i, optEls, q){
  if(state.locked) return;
  state.locked = true;
  state.answered++;
  const correct = i === q.c;
  optEls.forEach((el, ei)=>{
    el.disabled = true;
    if(ei === q.c) el.classList.add('correct');
    if(ei === i && !correct) el.classList.add('wrong');
  });

  const flash = document.getElementById('flash');
  flash.className = 'flash show ' + (correct ? 'correct' : 'wrong');
  flash.innerHTML = correct ? checkSVG() : xSVG();
  if(!correct) card.classList.add('shake');
  setTimeout(()=>card.classList.remove('shake'), 450);

  if(correct){ state.correctCount++; state.score += PER_QUESTION; }

  // update progress to reflect answered state subtly
  progressFill.style.width = ((state.idx+1)/state.quiz.questions.length*100) + '%';

  const nb = document.getElementById('nextBtn');
  nb.disabled = false;
  nb.focus();
}

function nextQuestion(){
  if(state.idx + 1 < state.quiz.questions.length){
    state.idx++;
    renderQuestion();
  } else {
    showResult();
  }
}

function showResult(){
  const total = state.quiz.questions.length;
  const pct = Math.round(state.correctCount/total*100);
  const r = 76, c = 2* Math.PI * r;
  const offset = c * (1 - state.correctCount/total);
  let verdict;
  if(pct === 100) verdict = "Perfect score! You're a true Americana expert. 🦅";
  else if(pct >= 80) verdict = "Excellent work — you really know your U.S. basics!";
  else if(pct >= 60) verdict = "Nicely done. A few more rounds and you'll ace it.";
  else if(pct >= 40) verdict = "Not bad — a good chance to brush up on the basics.";
  else verdict = "Everyone starts somewhere. Give it another spin!";

  progressFill.style.width = '100%';
  countLabel.textContent = 'Complete';

  card.innerHTML = `
    <div class="result">
      <div class="score-ring">
        <svg width="170" height="170">
          <circle cx="85" cy="85" r="${r}" stroke="rgba(255,255,255,.1)" stroke-width="14" fill="none"/>
          <circle id="ring" cx="85" cy="85" r="${r}" stroke="url(#grad)" stroke-width="14" fill="none"
            stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${c}"
            style="transition:stroke-dashoffset 1.1s cubic-bezier(.22,1,.36,1)"/>
          <defs>
            <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#fbbf24"/>
              <stop offset="100%" stop-color="#22c55e"/>
            </linearGradient>
          </defs>
        </svg>
        <div class="num">${pct}%<span>${state.correctCount}/${total} correct</span></div>
      </div>
      <h2>${state.correctCount} out of ${total}</h2>
      <p class="verdict">${verdict}</p>
      <div class="stat-row">
        <div class="stat"><div class="v">${state.quiz.topic.split(' ')[0]}</div><div class="l">Topic</div></div>
        <div class="stat"><div class="v">${state.correctCount}</div><div class="l">Correct</div></div>
        <div class="stat"><div class="v">${total - state.correctCount}</div><div class="l">Missed</div></div>
      </div>
      <div class="btn-row">
        <button class="btn ghost" id="againSame">Retry Topic</button>
        <button class="btn" id="againNew">New Random Quiz →</button>
      </div>
    </div>`;
  requestAnimationFrame(()=>{
    document.getElementById('ring').style.strokeDashoffset = offset;
  });
  document.getElementById('againSame').onclick = ()=>{
    state.idx=0;state.score=0;state.correctCount=0;state.answered=0;
    topicLabel.textContent = state.quiz.topic;
    topicLabel.style.color = state.quiz.color;
    renderQuestion();
  };
  document.getElementById('againNew').onclick = beginQuiz;
}

/* ---------------- Helpers ---------------- */
function checkSVG(){
  return `<svg viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10" stroke="rgba(34,197,94,.25)" fill="rgba(34,197,94,.12)"/><polyline points="16 8 10.5 14 7.5 11"></polyline></svg>`;
}
function xSVG(){
  return `<svg viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10" stroke="rgba(239,68,68,.25)" fill="rgba(239,68,68,.12)"/><line x1="9" y1="9" x2="15" y2="15"></line><line x1="15" y1="9" x2="9" y2="15"></line></svg>`;
}
function hexA(hex,a){
  const h = hex.replace('#','');
  const n = h.length===3 ? h.split('').map(x=>x+x).join('') : h;
  const r=parseInt(n.slice(0,2),16),g=parseInt(n.slice(2,4),16),b=parseInt(n.slice(4,6),16);
  return `rgba(${r},${g},${b},${a})`;
}

/* ---------------- Starfield ---------------- */
(function starfield(){
  const c = document.getElementById('stars');
  const ctx = c.getContext('2d');
  let stars=[], w, h;
  function resize(){
    w = c.width = innerWidth; h = c.height = innerHeight;
    stars = Array.from({length: Math.min(140, Math.floor(w*h/9000))}, ()=>({
      x: Math.random()*w, y: Math.random()*h,
      r: Math.random()*1.3+0.3, a: Math.random(), s: Math.random()*0.02+0.005,
      d: Math.random()>.5?1:-1
    }));
  }
  function draw(){
    ctx.clearRect(0,0,w,h);
    for(const st of stars){
      st.a += st.s*st.d;
      if(st.a<=0||st.a>=1) st.d*=-1;
      ctx.globalAlpha = st.a*0.8;
      ctx.fillStyle = '#ffffff';
      ctx.beginPath(); ctx.arc(st.x, st.y, st.r, 0, 7); ctx.fill();
    }
    ctx.globalAlpha = 1;
    requestAnimationFrame(draw);
  }
  addEventListener('resize', resize);
  resize(); draw();
})();

/* ---------------- Boot ---------------- */
startScreen();
</script>
