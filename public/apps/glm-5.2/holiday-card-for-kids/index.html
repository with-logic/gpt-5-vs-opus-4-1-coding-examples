<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🎄 Holiday Card for Kids</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root{
    --gold:#ffd86b;
    --red:#e23b4e;
    --green:#1f8a55;
  }
  html,body{height:100%;}
  body{
    margin:0;
    font-family:"Baloo 2", "Comic Sans MS", system-ui, sans-serif;
    overflow:hidden;
    -webkit-user-select:none;user-select:none;
    touch-action:none;
  }
  /* Background scene */
  #scene{
    position:fixed;inset:0;
    background:
      radial-gradient(120% 80% at 50% -10%, #2b5a8c 0%, #1c3a63 35%, #122544 70%, #0a1730 100%);
    overflow:hidden;
  }
  body.day #scene{
    background:
      radial-gradient(120% 80% at 50% -10%, #bfe3ff 0%, #8fc7f5 35%, #5fa8e6 70%, #3b8fd6 100%);
  }
  /* Moon / Sun */
  .moon{
    position:absolute;top:8%;right:10%;
    width:90px;height:90px;border-radius:50%;
    background:radial-gradient(circle at 35% 35%, #fffef0, #ffe9a8 60%, #f6d76b 100%);
    box-shadow:0 0 60px 20px rgba(255,235,150,.55), 0 0 120px 40px rgba(255,220,120,.25);
  }
  .moon::after{
    content:"";position:absolute;width:26px;height:26px;border-radius:50%;
    background:rgba(220,200,140,.5);top:24px;left:20px;
    box-shadow:34px 14px 0 -6px rgba(220,200,140,.45), 14px 44px 0 -8px rgba(220,200,140,.4);
  }
  body.day .moon{
    background:radial-gradient(circle at 40% 40%, #fff7d6, #ffe27a 60%, #ffc24b 100%);
    box-shadow:0 0 80px 30px rgba(255,210,90,.8), 0 0 160px 60px rgba(255,190,80,.35);
  }
  body.day .moon::after{display:none;}
  /* Snowy ground */
  .ground{
    position:absolute;left:0;right:0;bottom:0;height:26%;
    background:linear-gradient(to bottom, #f4fbff 0%, #e3f1fb 60%, #cfe6f5 100%);
    border-radius:50% 50% 0 0 / 30px 30px 0 0;
    box-shadow:0 -10px 30px rgba(255,255,255,.15) inset;
  }
  body.day .ground{background:linear-gradient(to bottom,#ffffff 0%,#eef7ff 60%,#dcefff 100%);}
  .ground::before{
    content:"";position:absolute;left:-5%;right:-5%;bottom:0;height:60%;
    background:radial-gradient(50% 100% at 20% 100%, #fff 50%, transparent 51%),
               radial-gradient(50% 100% at 55% 100%, #fff 45%, transparent 46%),
               radial-gradient(50% 100% at 85% 100%, #fff 50%, transparent 51%);
    background-repeat:no-repeat;
    opacity:.6;
  }

  canvas#snow{position:absolute;inset:0;pointer-events:none;}

  /* Card panel */
  #card{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    width:min(520px,92vw);
    background:linear-gradient(160deg, rgba(255,255,255,.16), rgba(255,255,255,.04));
    border:1px solid rgba(255,255,255,.28);
    border-radius:24px;
    box-shadow:0 20px 60px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.3);
    backdrop-filter:blur(8px);
    padding:18px 20px 16px;
    text-align:center;
    z-index:5;
  }
  #card h1{
    margin:0;font-size:clamp(26px,6vw,40px);line-height:1.05;
    color:#fff;text-shadow:0 2px 0 #b3322f, 0 4px 10px rgba(0,0,0,.4);
    letter-spacing:.5px;
  }
  #card h1 .green{color:#9ff3c4;text-shadow:0 2px 0 #176b48, 0 4px 10px rgba(0,0,0,.4);}
  #card p.sub{
    margin:6px 0 12px;color:#ffe9a8;font-weight:600;font-size:14px;
    text-shadow:0 1px 3px rgba(0,0,0,.4);
  }
  #card p.message{
    color:#eaf3ff;font-size:15px;line-height:1.4;font-weight:500;
    text-shadow:0 1px 3px rgba(0,0,0,.35);
    min-height:42px;
  }
  .card-controls{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:12px;}
  .btn{
    font-family:inherit;font-weight:700;font-size:13px;
    border:none;border-radius:999px;padding:8px 14px;cursor:pointer;
    color:#fff;background:linear-gradient(180deg,var(--red),#b32b39);
    box-shadow:0 4px 0 #8e2230, 0 6px 12px rgba(0,0,0,.3);
    transition:transform .08s, box-shadow .08s;
  }
  .btn:active{transform:translateY(3px);box-shadow:0 1px 0 #8e2230;}
  .btn.green{background:linear-gradient(180deg,var(--green),#146b40);box-shadow:0 4px 0 #0e4f2e,0 6px 12px rgba(0,0,0,.3);}
  .btn.gold{background:linear-gradient(180deg,var(--gold),#e6b53e);color:#5a3d00;box-shadow:0 4px 0 #b88c1f,0 6px 12px rgba(0,0,0,.3);}
  .btn.blue{background:linear-gradient(180deg,#3a8de0,#2160b0);box-shadow:0 4px 0 #184a8e,0 6px 12px rgba(0,0,0,.3);}

  /* Tray of items */
  #tray{
    position:absolute;left:50%;bottom:12px;transform:translateX(-50%);
    display:flex;gap:6px;flex-wrap:wrap;justify-content:center;
    max-width:96vw;padding:8px 10px;border-radius:18px;
    background:linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,.06));
    border:1px solid rgba(255,255,255,.3);
    box-shadow:0 8px 24px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.3);
    backdrop-filter:blur(6px);
    z-index:8;
  }
  .tray-label{
    width:100%;text-align:center;color:#ffe9a8;font-size:11px;font-weight:700;
    letter-spacing:1px;text-transform:uppercase;text-shadow:0 1px 2px rgba(0,0,0,.4);
    margin-bottom:2px;
  }
  .item{
    font-size:28px;cursor:grab;width:42px;height:42px;
    display:flex;align-items:center;justify-content:center;
    border-radius:12px;background:rgba(255,255,255,.12);
    transition:transform .12s, background .12s;
    line-height:1;
  }
  .item:hover{transform:translateY(-3px) scale(1.12);background:rgba(255,255,255,.25);}
  .item:active{cursor:grabbing;}
  .item .badge{
    position:absolute;font-size:9px;color:#fff;background:var(--red);
    border-radius:999px;padding:0 4px;transform:translate(14px,-14px);
    box-shadow:0 1px 3px rgba(0,0,0,.4);pointer-events:none;
  }
  .item{position:relative;}

  /* Placed items on the scene */
  .placed{
    position:absolute;font-size:clamp(34px,7vw,58px);
    cursor:grab;transform:translate(-50%,-50%);
    filter:drop-shadow(0 6px 6px rgba(0,0,0,.35));
    transition:filter .15s;
    z-index:6;line-height:1;
    touch-action:none;
  }
  .placed:hover{filter:drop-shadow(0 6px 6px rgba(0,0,0,.35)) brightness(1.12);}
  .placed.dragging{cursor:grabbing;z-index:30;filter:drop-shadow(0 12px 14px rgba(0,0,0,.45)) brightness(1.15);}
  .placed.placed-anim{animation:pop .35s cubic-bezier(.2,1.4,.4,1);}
  @keyframes pop{0%{transform:translate(-50%,-50%) scale(0) rotate(-25deg);}60%{transform:translate(-50%,-50%) scale(1.25) rotate(8deg);}100%{transform:translate(-50%,-50%) scale(1) rotate(0);}}

  /* Sparkle burst */
  .spark{position:absolute;width:10px;height:10px;border-radius:50%;
    background:radial-gradient(circle,#fff,#ffe9a8);pointer-events:none;z-index:31;}
  .heart{position:absolute;font-size:22px;pointer-events:none;z-index:31;animation:floatUp 1.2s ease forwards;}
  @keyframes floatUp{0%{opacity:1;transform:translate(-50%,0) scale(.6);}100%{opacity:0;transform:translate(-50%,-80px) scale(1.3);}}

  /* Twinkling stars */
  .star{position:absolute;width:3px;height:3px;border-radius:50%;background:#fff;
    box-shadow:0 0 6px #fff;animation:tw 3s infinite;}
  @keyframes tw{0%,100%{opacity:.2;transform:scale(.7);}50%{opacity:1;transform:scale(1.3);}}

  /* Hint */
  .hint{
    position:absolute;top:14px;left:50%;transform:translateX(-50%);
    color:#eaf3ff;font-size:12px;font-weight:600;background:rgba(0,0,0,.25);
    padding:6px 12px;border-radius:999px;letter-spacing:.3px;z-index:9;
    text-shadow:0 1px 2px rgba(0,0,0,.4);
  }
  .hint b{color:var(--gold);}

  .sound-toggle{
    position:absolute;top:14px;right:14px;z-index:9;
    font-size:20px;width:40px;height:40px;border-radius:50%;border:1px solid rgba(255,255,255,.3);
    background:rgba(0,0,0,.25);cursor:pointer;color:#fff;
    display:flex;align-items:center;justify-content:center;
  }
  .sound-toggle:active{transform:scale(.92);}

  /* Wiggle for fun */
  @keyframes wiggle{0%,100%{transform:translate(-50%,-50%) rotate(-4deg);}50%{transform:translate(-50%,-50%) rotate(4deg);}}
  .placed.wiggle{animation:wiggle .4s ease;}
</style>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&display=swap" rel="stylesheet">
</head>
<body class="">
  <div id="scene">
    <div class="moon"></div>
    <div id="stars"></div>
    <canvas id="snow"></canvas>
    <div class="ground"></div>

    <div id="placed-layer"></div>

    <div id="card">
      <h1>🎄 <span>Merry &amp;</span> <span class="green">Bright!</span> ❄️</h1>
      <p class="sub">✨ A Holiday Card Just for You ✨</p>
      <p class="message" id="msg">Drag cute things onto the snow! Tap Santa for a surprise 🎅</p>
      <div class="card-controls">
        <button class="btn green" id="btnMessage">📜 New Message</button>
        <button class="btn gold" id="btnJingle">🔔 Jingle Bells</button>
        <button class="btn" id="btnSnow">☃️ Snow Blast</button>
        <button class="btn blue" id="btnDay">🌅 Day / Night</button>
        <button class="btn" id="btnClear">🧹 Clear</button>
      </div>
    </div>

    <div class="hint">👆 Drag from the tray &nbsp;•&nbsp; <b>tap</b> items to wiggle &nbsp;•&nbsp; <b>double-tap</b> to remove</div>

    <div id="tray">
      <div class="tray-label">🎁 Drag me onto the card! 🎁</div>
    </div>

    <div class="sound-toggle" id="soundToggle" title="Sound on/off">🔊</div>
  </div>

<script>
/* ============================================================
   Holiday Card for Kids — interactive, self-contained
   ============================================================ */

/* ---------- Web Audio: synthesized festive sounds ---------- */
const Sound = (()=>{
  let ctx=null, enabled=true;
  const ensure = ()=>{ if(!ctx) ctx = new (window.AudioContext||window.webkitAudioContext)(); if(ctx.state==='suspended') ctx.resume(); return ctx; };
  function tone({freq=440, dur=.25, type='sine', vol=.25, glide=null, delay=0}){
    if(!enabled) return;
    const c=ensure(); const t0=c.currentTime+delay;
    const o=c.createOscillator(), g=c.createGain();
    o.type=type; o.frequency.setValueAtTime(freq,t0);
    if(glide) o.frequency.exponentialRampToValueAtTime(Math.max(1,glide), t0+dur);
    g.gain.setValueAtTime(0.0001,t0);
    g.gain.exponentialRampToValueAtTime(vol, t0+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
    o.connect(g).connect(c.destination);
    o.start(t0); o.stop(t0+dur+0.02);
  }
  function noise({dur=.3, vol=.15, delay=0, hp=400}){
    if(!enabled) return;
    const c=ensure(); const t0=c.currentTime+delay;
    const n=Math.floor(c.sampleRate*dur);
    const buf=c.createBuffer(1,n,c.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*(1-i/n);
    const src=c.createBufferSource(); src.buffer=buf;
    const f=c.createBiquadFilter(); f.type='highpass'; f.frequency.value=hp;
    const g=c.createGain(); g.gain.value=vol;
    src.connect(f).connect(g).connect(c.destination);
    src.start(t0);
  }
  // a pleasant pop for dropping items
  const pop = ()=>{ tone({freq:520, glide:880, dur:.18, type:'triangle', vol:.3}); noise({dur:.06, vol:.06, hp:1200}); };
  // sparkle
  const sparkle = ()=>{ [1320,1760,2200].forEach((f,i)=>tone({freq:f, dur:.12, type:'sine', vol:.12, delay:i*0.05})); };
  // jingle bells (shake noise + bell tones)
  const jingle = ()=>{
    noise({dur:.18, vol:.18, hp:2000});
    [880,1046,1318].forEach((f,i)=>tone({freq:f, dur:.5, type:'triangle', vol:.18, delay:i*0.08}));
  };
  // santa ho ho ho
  const santa = ()=>{
    [180,150,120].forEach((f,i)=>tone({freq:f, dur:.45, type:'sawtooth', vol:.2, glide:f*0.6, delay:i*0.28}));
  };
  // soft chime for messages
  const chime = ()=>{ [659,784,988].forEach((f,i)=>tone({freq:f, dur:.6, type:'sine', vol:.16, delay:i*0.1})); };
  // swoosh for snow blast
  const swoosh = ()=>{ noise({dur:.6, vol:.2, hp:600}); };
  // boing wiggle
  const boing = ()=>{ tone({freq:300, glide:900, dur:.25, type:'sine', vol:.22}); };
  // remove pop
  const poof = ()=>{ tone({freq:700, glide:200, dur:.2, type:'triangle', vol:.2}); noise({dur:.1, vol:.05, hp:800}); };

  return {
    pop, sparkle, jingle, santa, chime, swoosh, boing, poof,
    toggle(){ enabled=!enabled; return enabled; },
    isOn(){ return enabled; }
  };
})();

/* ---------- Twinkling stars ---------- */
(function makeStars(){
  const layer=document.getElementById('stars');
  for(let i=0;i<70;i++){
    const s=document.createElement('div');
    s.className='star';
    s.style.left=Math.random()*100+'%';
    s.style.top=Math.random()*55+'%';
    s.style.animationDelay=(Math.random()*3)+'s';
    s.style.opacity=0.3+Math.random()*0.7;
    layer.appendChild(s);
  }
})();

/* ---------- Snowfall canvas ---------- */
const snow=(()=>{
  const cv=document.getElementById('snow'); const c=cv.getContext('2d');
  let W,H, flakes=[], bursts=[], raf, density=70;
  function resize(){ W=cv.width=innerWidth; H=cv.height=innerHeight; }
  function makeFlake(){ return {x:Math.random()*W, y:Math.random()*H, r:1+Math.random()*3.5, vy:.4+Math.random()*1.2, vx:-.4+Math.random()*.8, sw:Math.random()*Math.PI*2, o:.4+Math.random()*.6}; }
  function init(){ resize(); flakes=Array.from({length:density},makeFlake); }
  function tick(){
    c.clearRect(0,0,W,H);
    for(const f of flakes){
      f.sw+=0.02; f.x+=f.vx+Math.sin(f.sw)*0.3; f.y+=f.vy;
      if(f.y>H+4){ f.y=-4; f.x=Math.random()*W; }
      if(f.x<-4)f.x=W+4; if(f.x>W+4)f.x=-4;
      c.beginPath(); c.arc(f.x,f.y,f.r,0,7); c.fillStyle='rgba(255,255,255,'+f.o+')'; c.fill();
    }
    // burst flakes (from snow blast button)
    for(let i=bursts.length-1;i>=0;i--){
      const b=bursts[i];
      b.vy+=0.03; b.x+=b.vx; b.y+=b.vy; b.life-=1;
      if(b.life<=0){ bursts.splice(i,1); continue; }
      c.beginPath(); c.arc(b.x,b.y,b.r,0,7); c.fillStyle='rgba(255,255,255,'+(b.life/60)+')'; c.fill();
    }
    raf=requestAnimationFrame(tick);
  }
  function burst(n=120){
    for(let i=0;i<n;i++){
      bursts.push({x:Math.random()*W, y:-Math.random()*H*0.3, r:1+Math.random()*4,
        vx:-1.5+Math.random()*3, vy:1+Math.random()*2, life:50+Math.random()*30});
    }
  }
  addEventListener('resize',()=>{resize();});
  init(); tick();
  return { burst, setDensity:(d)=>{ density=d; const target=d; while(flakes.length<target)flakes.push(makeFlake()); while(flakes.length>target)flakes.pop(); } };
})();

/* ---------- Item palette ---------- */
const ITEMS=[
  {e:'🎄', name:'Tree', sound:'chime'},
  {e:'☃️', name:'Snowman', sound:'boing'},
  {e:'⛄', name:'Snowman2', sound:'boing'},
  {e:'🎅', name:'Santa', sound:'santa', special:'santa'},
  {e:'🤶', name:'Mrs Claus', sound:'chime'},
  {e:'🎁', name:'Present', sound:'pop'},
  {e:'⭐', name:'Star', sound:'sparkle'},
  {e:'✨', name:'Sparkle', sound:'sparkle'},
  {e:'🔔', name:'Bell', sound:'jingle'},
  {e:'🎀', name:'Bow', sound:'pop'},
  {e:'🦌', name:'Reindeer', sound:'boing'},
  {e:'🐧', name:'Penguin', sound:'boing'},
  {e:'🧊', name:'Ice', sound:'poof'},
  {e:'⛄', name:'Snow2', sound:'boing'},
  {e:'🍪', name:'Cookie', sound:'pop'},
  {e:'🥛', name:'Milk', sound:'pop'},
  {e:'🍬', name:'Candy', sound:'sparkle'},
  {e:'🍭', name:'Lolly', sound:'sparkle'},
  {e:'🌟', name:'Glow', sound:'sparkle'},
  {e:'❄️', name:'Flake', sound:'sparkle'},
  {e:'⛄', name:'Snow3', sound:'boing'},
  {e:'🕊️', name:'Dove', sound:'chime'},
  {e:'🧦', name:'Stocking', sound:'pop'},
  {e:'🕯️', name:'Candle', sound:'chime'},
  {e:'🎶', name:'Carol', sound:'jingle'},
  {e:'💙', name:'Heart', sound:'sparkle'},
];

/* Build tray */
const tray=document.getElementById('tray');
const seen=new Set();
ITEMS.forEach((it)=>{
  if(seen.has(it.e))return; seen.add(it.e);
  const el=document.createElement('div');
  el.className='item'; el.textContent=it.e; el.title=it.name;
  el.dataset.e=it.e; el.dataset.sound=it.sound; el.dataset.special=it.special||'';
  tray.appendChild(el);
});

/* ---------- Placement / drag logic ---------- */
const placedLayer=document.getElementById('placed-layer');
let drag=null; // {el, offX, offY, moved}

function spawnPlaced(emoji, x, y, opts={}){
  const el=document.createElement('div');
  el.className='placed'; el.textContent=emoji;
  el.style.left=x+'px'; el.style.top=y+'px';
  const cfg = ITEMS.find(i=>i.e===emoji) || {};
  el.dataset.sound = opts.sound || cfg.sound || 'pop';
  el.dataset.special = opts.special || cfg.special || '';
  if(opts.anim!==false){ el.classList.add('placed-anim'); setTimeout(()=>el.classList.remove('placed-anim'),400); }
  placedLayer.appendChild(el);
  attachPlaced(el);
  return el;
}

function attachPlaced(el){
  let lastTap=0, downX=0, downY=0, moved=false, downT=0;
  el.addEventListener('pointerdown', (e)=>{
    e.preventDefault();
    el.setPointerCapture(e.pointerId);
    drag={el, offX:0, offY:0, moved:false, startLeft:parseFloat(el.style.left), startTop:parseFloat(el.style.top), px:e.clientX, py:e.clientY};
    el.classList.add('dragging');
    el.classList.remove('placed-anim');
    downX=e.clientX; downY=e.clientY; downT=performance.now();
  });
  el.addEventListener('pointermove',(e)=>{
    if(!drag||drag.el!==el)return;
    const dx=e.clientX-downX, dy=e.clientY-downY;
    if(Math.abs(dx)>4||Math.abs(dy)>4) drag.moved=moved=true;
    const nx=drag.startLeft+dx, ny=drag.startTop+dy;
    el.style.left=clamp(nx,20,innerWidth-20)+'px';
    el.style.top=clamp(ny,20,innerHeight-20)+'px';
  });
  el.addEventListener('pointerup',(e)=>{
    if(!drag||drag.el!==el)return;
    el.classList.remove('dragging');
    const wasMoved=moved; moved=false;
    const now=performance.now();
    drag=null;
    if(!wasMoved){
      // treat as tap
      const dt=now-downT;
      if(now-lastTap<320){
        // double tap -> remove
        removePlaced(el);
        lastTap=0;
      } else {
        // single tap -> wiggle + sound
        lastTap=now;
        el.classList.remove('wiggle'); void el.offsetWidth; el.classList.add('wiggle');
        playFor(el);
        tapSpecial(el);
        burstSparkles(parseFloat(el.style.left), parseFloat(el.style.top), 6);
      }
    }
  });
}

function removePlaced(el){
  Sound.poof();
  el.style.transition='transform .25s, opacity .25s';
  el.style.transform='translate(-50%,-50%) scale(0) rotate(40deg)';
  el.style.opacity='0';
  setTimeout(()=>el.remove(),250);
}

function playFor(el){
  const s=el.dataset.sound||'pop';
  if(Sound[s]) Sound[s](); else Sound.pop();
}
function tapSpecial(el){
  if(el.dataset.special==='santa'){ Sound.santa(); floatText('Ho Ho Ho! 🎅', el); }
  else { /* random little message */ }
}

function floatText(txt, el){
  const t=document.createElement('div');
  t.textContent=txt;
  t.style.cssText='position:absolute;font-size:18px;font-weight:800;color:#fff;left:'+el.style.left+';top:'+el.style.top+';transform:translate(-50%,-130%);text-shadow:0 2px 4px rgba(0,0,0,.5);pointer-events:none;z-index:40;transition:transform 1s,opacity 1s;';
  placedLayer.appendChild(t);
  requestAnimationFrame(()=>{ t.style.transform='translate(-50%,-220%)'; t.style.opacity='0'; });
  setTimeout(()=>t.remove(),1000);
}

function burstSparkles(x,y,n){
  for(let i=0;i<n;i++){
    const s=document.createElement('div'); s.className='spark';
    s.style.left=x+'px'; s.style.top=y+'px';
    const ang=Math.random()*Math.PI*2, d=20+Math.random()*40;
    placedLayer.appendChild(s);
    s.animate([
      {transform:'translate(-50%,-50%) scale(1)', opacity:1},
      {transform:`translate(calc(-50% + ${Math.cos(ang)*d}px), calc(-50% + ${Math.sin(ang)*d}px)) scale(0)`, opacity:0}
    ],{duration:600, easing:'ease-out'}).onfinish=()=>s.remove();
  }
}

/* ---------- Tray drag → spawn ---------- */
tray.addEventListener('pointerdown',(e)=>{
  const it=e.target.closest('.item'); if(!it)return;
  e.preventDefault();
  const emoji=it.dataset.e;
  const ghost=spawnGhost(emoji, e.clientX, e.clientY);
  drag={el:ghost, offX:0, offY:0, moved:false, startLeft:e.clientX, startTop:e.clientY, px:e.clientX, py:e.clientY, fromTray:true, emoji, sound:it.dataset.sound, special:it.dataset.special};
});

function spawnGhost(emoji,x,y){
  const el=document.createElement('div');
  el.className='placed dragging'; el.textContent=emoji;
  el.style.left=x+'px'; el.style.top=y+'px'; el.style.zIndex=50;
  placedLayer.appendChild(el);
  return el;
}

addEventListener('pointermove',(e)=>{
  if(!drag)return;
  const dx=e.clientX-drag.px, dy=e.clientY-drag.py;
  if(Math.abs(dx)>4||Math.abs(dy)>4) drag.moved=true;
  const nx=drag.startLeft+dx, ny=drag.startTop+dy;
  drag.el.style.left=clamp(nx,20,innerWidth-20)+'px';
  drag.el.style.top=clamp(ny,20,innerHeight-20)+'px';
});
addEventListener('pointerup',()=>{
  if(!drag) return;
  const el=drag.el, fromTray=drag.fromTray;
  const x=parseFloat(el.style.left), y=parseFloat(el.style.top);
  drag=null;
  if(fromTray) finalizeTrayDrop(el, x, y);
});

function finalizeTrayDrop(el,x,y){
  const emoji=el.textContent;
  const cfg=ITEMS.find(i=>i.e===emoji) || {e:emoji, sound:'pop'};
  el.dataset.sound=cfg.sound; el.dataset.special=cfg.special||'';
  attachPlaced(el);
  el.classList.remove('dragging');
  el.classList.add('placed-anim'); setTimeout(()=>el.classList.remove('placed-anim'),400);
  Sound.pop();
  burstSparkles(x,y,8);
  floatHearts(x,y);
}

function floatHearts(x,y){
  const hearts=['❤️','💛','✨','⭐','💙'];
  for(let i=0;i<3;i++){
    const h=document.createElement('div'); h.className='heart';
    h.textContent=hearts[(Math.random()*hearts.length)|0];
    h.style.left=(x-10+Math.random()*20)+'px'; h.style.top=y+'px';
    placedLayer.appendChild(h);
    setTimeout(()=>h.remove(),1200);
  }
}

function clamp(v,a,b){return Math.max(a,Math.min(b,v));}

/* ---------- Default placed items ---------- */
function defaults(){
  const cx=innerWidth/2, cy=innerHeight*0.78;
  const layout=[
    ['🎄', cx-150, cy-10],
    ['🎄', cx+150, cy-10],
    ['☃️', cx-40, cy+10],
    ['🎁', cx+60, cy+25],
    ['🎁', cx-90, cy+30],
    ['⭐', cx, cy-160],
    ['🦌', cx-220, cy+25],
    ['🎅', cx+220, cy+20],
    ['🔔', cx-260, cy-60],
    ['🕯️', cx+250, cy-70],
  ];
  layout.forEach(([e,x,y],i)=>{
    setTimeout(()=>spawnPlaced(e,x,y), i*90);
  });
}

/* ---------- Buttons ---------- */
const MESSAGES=[
  "Wishing you cozy cocoa, snowy giggles, and the merriest Christmas! 🎄",
  "May your holidays be stuffed with cookies & joy! 🍪❄️",
  "Sending you a blizzard of warm hugs this winter! 🐧💙",
  "Hope Santa brings you everything on your list! 🎅🎁",
  "Jingle all the way to a happy New Year! 🔔✨",
  "You make the world sparkle like fresh snow! ⭐❄️",
  "Warm wishes, hot cocoa, and marshmallow dreams! ☕❄️",
];
let msgIndex=0;
const msgEl=document.getElementById('msg');
document.getElementById('btnMessage').onclick=()=>{
  msgIndex=(msgIndex+1)%MESSAGES.length;
  msgEl.style.transition='none'; msgEl.style.opacity='0'; msgEl.style.transform='translateY(8px)';
  setTimeout(()=>{ msgEl.textContent=MESSAGES[msgIndex]; msgEl.style.transition='all .35s'; msgEl.style.opacity='1'; msgEl.style.transform='translateY(0)'; Sound.chime(); },120);
};
document.getElementById('btnJingle').onclick=()=>{ Sound.jingle(); floatText('🔔 Jingle! 🔔', {style:{left:innerWidth/2+'px', top:(innerHeight/2-40)+'px'}}); };
document.getElementById('btnSnow').onclick=()=>{ snow.burst(160); Sound.swoosh(); };
document.getElementById('btnClear').onclick=()=>{
  Sound.poof();
  [...placedLayer.querySelectorAll('.placed')].forEach((el,i)=>{
    setTimeout(()=>removePlaced(el), i*40);
  });
};
document.getElementById('btnDay').onclick=()=>{ document.body.classList.toggle('day'); Sound.sparkle(); };

/* ---------- Sound toggle ---------- */
const sBtn=document.getElementById('soundToggle');
sBtn.onclick=()=>{ const on=Sound.toggle(); sBtn.textContent=on?'🔊':'🔇'; };

/* ---------- First interaction unlocks audio ---------- */
addEventListener('pointerdown',()=>{ if(Sound.isOn()){ try{ const c=new (window.AudioContext||window.webkitAudioContext)(); c.resume(); }catch(e){} } }, {once:true});

/* ---------- Start ---------- */
window.addEventListener('load', ()=>{ defaults(); });
defaults();
</script>
