<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tiny Kanban</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f0e8;
      --bg-accent: #efe3cf;
      --panel: rgba(255, 252, 246, 0.84);
      --panel-strong: rgba(255, 249, 240, 0.98);
      --text: #1f2933;
      --muted: #6b7280;
      --line: rgba(109, 85, 56, 0.12);
      --shadow: 0 20px 50px rgba(61, 39, 17, 0.12);
      --todo: #5c8d89;
      --doing: #d97706;
      --done: #2b8a5d;
      --critical: #bc3f32;
      --high: #d97706;
      --medium: #4477b2;
      --low: #5c8d89;
      --danger: #b42318;
      --danger-bg: #fff0ee;
      --ok: #156f52;
      --ok-bg: #edf9f1;
      --warn: #9a6700;
      --warn-bg: #fff6dd;
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 16px;
      --radius-sm: 12px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: "IBM Plex Sans", sans-serif;
      background:
        radial-gradient(circle at top right, rgba(217, 119, 6, 0.16), transparent 26%),
        radial-gradient(circle at left bottom, rgba(92, 141, 137, 0.18), transparent 30%),
        linear-gradient(135deg, #f7f1e7, #efe2cc 52%, #f4ead7);
      color: var(--text);
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: auto;
      width: 38vmax;
      height: 38vmax;
      pointer-events: none;
      filter: blur(18px);
      opacity: 0.35;
      z-index: 0;
    }

    body::before {
      top: -12vmax;
      right: -10vmax;
      background: radial-gradient(circle, rgba(217, 119, 6, 0.18), transparent 66%);
    }

    body::after {
      left: -14vmax;
      bottom: -14vmax;
      background: radial-gradient(circle, rgba(92, 141, 137, 0.2), transparent 66%);
    }

    .app {
      position: relative;
      z-index: 1;
      max-width: 1600px;
      margin: 0 auto;
      padding: 28px;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.3fr) minmax(320px, 0.9fr);
      gap: 20px;
      align-items: stretch;
      margin-bottom: 22px;
    }

    .hero-card,
    .composer,
    .column {
      background: var(--panel);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.55);
      box-shadow: var(--shadow);
    }

    .hero-card {
      border-radius: var(--radius-xl);
      padding: 28px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
      position: relative;
      min-height: 220px;
    }

    .hero-card::after {
      content: "";
      position: absolute;
      right: -44px;
      top: -36px;
      width: 200px;
      height: 200px;
      border-radius: 36px;
      background: linear-gradient(135deg, rgba(217, 119, 6, 0.18), rgba(92, 141, 137, 0.08));
      transform: rotate(18deg);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(109, 85, 56, 0.08);
      border-radius: 999px;
      font-weight: 700;
      color: #5d4934;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-size: 0.82rem;
      width: fit-content;
    }

    .hero h1 {
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(2.3rem, 4vw, 4.25rem);
      line-height: 0.95;
      letter-spacing: -0.05em;
      margin: 16px 0 12px;
      max-width: 10ch;
      position: relative;
      z-index: 1;
    }

    .hero p {
      margin: 0;
      max-width: 58ch;
      font-size: 1.12rem;
      line-height: 1.5;
      color: #4b5563;
      position: relative;
      z-index: 1;
    }

    .hero-stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin-top: 24px;
      position: relative;
      z-index: 1;
    }

    .stat {
      padding: 16px;
      border-radius: var(--radius-md);
      background: rgba(255, 255, 255, 0.68);
      border: 1px solid rgba(109, 85, 56, 0.08);
    }

    .stat strong {
      display: block;
      font-family: "Space Grotesk", sans-serif;
      font-size: 1.8rem;
      line-height: 1;
      margin-bottom: 8px;
      letter-spacing: -0.04em;
    }

    .stat span {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .composer {
      border-radius: var(--radius-xl);
      padding: 22px;
      display: grid;
      gap: 14px;
      align-content: start;
      background: var(--panel-strong);
    }

    .composer-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
    }

    .composer-header h2,
    .board-top h2 {
      margin: 0;
      font-family: "Space Grotesk", sans-serif;
      font-size: 1.35rem;
      letter-spacing: -0.03em;
    }

    .helper {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .field-grid.full,
    .field.full {
      grid-column: 1 / -1;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    label {
      font-size: 0.9rem;
      font-weight: 700;
      color: #4a5561;
    }

    input,
    textarea,
    select,
    button {
      font: inherit;
    }

    input,
    textarea,
    select {
      width: 100%;
      border: 1px solid rgba(109, 85, 56, 0.14);
      background: rgba(255, 255, 255, 0.9);
      color: var(--text);
      border-radius: 14px;
      padding: 14px 15px;
      outline: none;
      transition: border-color 140ms ease, transform 140ms ease, box-shadow 140ms ease;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: rgba(68, 119, 178, 0.52);
      box-shadow: 0 0 0 4px rgba(68, 119, 178, 0.12);
    }

    textarea {
      resize: vertical;
      min-height: 88px;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .btn {
      border: 0;
      border-radius: 14px;
      padding: 14px 18px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 160ms ease, box-shadow 160ms ease, opacity 160ms ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn-primary {
      color: white;
      background: linear-gradient(135deg, #c96b06, #ae4e08);
      box-shadow: 0 12px 24px rgba(201, 107, 6, 0.24);
    }

    .btn-secondary {
      color: #67492a;
      background: rgba(255, 255, 255, 0.84);
      border: 1px solid rgba(109, 85, 56, 0.14);
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) auto auto;
      gap: 14px;
      align-items: center;
      margin: 0 0 18px;
    }

    .toolbar .field {
      gap: 6px;
    }

    .board-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 12px;
    }

    .board-note {
      color: var(--muted);
      font-size: 0.98rem;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
      align-items: start;
    }

    .column {
      border-radius: var(--radius-xl);
      padding: 18px;
      min-height: 560px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      border-top: 5px solid transparent;
    }

    .column[data-status="todo"] { border-top-color: var(--todo); }
    .column[data-status="doing"] { border-top-color: var(--doing); }
    .column[data-status="done"] { border-top-color: var(--done); }

    .column.over {
      transform: translateY(-2px);
      box-shadow: 0 28px 46px rgba(61, 39, 17, 0.16);
    }

    .column-header {
      display: grid;
      gap: 12px;
    }

    .column-topline {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .column-title {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .column-title h3 {
      margin: 0;
      font-size: 1.22rem;
      letter-spacing: -0.03em;
    }

    .column-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    .dot-todo { background: var(--todo); }
    .dot-doing { background: var(--doing); }
    .dot-done { background: var(--done); }

    .count-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(109, 85, 56, 0.12);
      font-weight: 700;
      color: #5d4934;
    }

    .column-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .wip-control {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: rgba(255, 255, 255, 0.66);
      border-radius: 999px;
      border: 1px solid rgba(109, 85, 56, 0.1);
      color: var(--muted);
      font-size: 0.9rem;
    }

    .wip-control input {
      width: 72px;
      border-radius: 999px;
      padding: 8px 10px;
      text-align: center;
      font-weight: 700;
      background: white;
    }

    .lane {
      display: grid;
      gap: 12px;
      align-content: start;
      min-height: 320px;
    }

    .card {
      position: relative;
      display: grid;
      gap: 12px;
      padding: 16px;
      border-radius: var(--radius-lg);
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(109, 85, 56, 0.08);
      box-shadow: 0 12px 24px rgba(77, 52, 25, 0.08);
      cursor: grab;
      transition: transform 160ms ease, box-shadow 160ms ease, opacity 160ms ease;
      overflow: hidden;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 28px rgba(77, 52, 25, 0.12);
    }

    .card.dragging {
      opacity: 0.5;
      transform: rotate(1deg);
      cursor: grabbing;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 6px;
      background: var(--medium);
    }

    .card.priority-critical::before { background: var(--critical); }
    .card.priority-high::before { background: var(--high); }
    .card.priority-medium::before { background: var(--medium); }
    .card.priority-low::before { background: var(--low); }

    .card-top,
    .card-bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .card-title {
      font-weight: 700;
      font-size: 1.08rem;
      line-height: 1.25;
      margin: 0;
      letter-spacing: -0.02em;
    }

    .card-desc {
      margin: 0;
      color: #57606a;
      line-height: 1.45;
      font-size: 0.96rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: max-content;
      padding: 8px 10px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border: 1px solid transparent;
    }

    .badge-critical {
      color: var(--critical);
      background: #fff0ee;
      border-color: rgba(188, 63, 50, 0.12);
    }

    .badge-high {
      color: #a95f05;
      background: #fff4e5;
      border-color: rgba(217, 119, 6, 0.14);
    }

    .badge-medium {
      color: #4477b2;
      background: #edf5ff;
      border-color: rgba(68, 119, 178, 0.14);
    }

    .badge-low {
      color: #44746f;
      background: #eef8f7;
      border-color: rgba(92, 141, 137, 0.14);
    }

    .card-controls {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .mini-field {
      display: grid;
      gap: 6px;
    }

    .mini-field label {
      font-size: 0.74rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #7a8189;
    }

    .mini-field select {
      padding: 10px 12px;
      border-radius: 12px;
      background: #fdfbf7;
    }

    .delete-btn {
      border: 0;
      background: var(--danger-bg);
      color: var(--danger);
      border-radius: 12px;
      padding: 10px 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .delete-btn:hover {
      background: #ffe6e1;
    }

    .meta-text {
      color: var(--muted);
      font-size: 0.84rem;
    }

    .empty {
      border: 2px dashed rgba(109, 85, 56, 0.18);
      border-radius: var(--radius-lg);
      padding: 20px;
      text-align: center;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.36);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%) translateY(24px);
      padding: 14px 18px;
      border-radius: 14px;
      color: white;
      background: rgba(31, 41, 51, 0.92);
      box-shadow: 0 16px 34px rgba(0, 0, 0, 0.18);
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease;
      max-width: min(92vw, 520px);
      text-align: center;
      z-index: 10;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast.warn {
      background: rgba(154, 103, 0, 0.95);
    }

    .toast.ok {
      background: rgba(21, 111, 82, 0.95);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 1180px) {
      .hero {
        grid-template-columns: 1fr;
      }

      .board {
        grid-template-columns: 1fr;
      }

      .column {
        min-height: 0;
      }
    }

    @media (max-width: 760px) {
      .app {
        padding: 16px;
      }

      .hero-card,
      .composer,
      .column {
        border-radius: 22px;
      }

      .hero-stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .toolbar,
      .field-grid,
      .card-controls {
        grid-template-columns: 1fr;
      }

      .actions {
        flex-wrap: wrap;
      }
    }
  </style>
</head>
<body>
  <div class="app" id="app"></div>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const STORAGE_KEY = "tiny-kanban-standup-v1";

    const PEOPLE = ["Alex", "Jordan", "Sam", "Priya", "Casey", "Morgan"];
    const PRIORITIES = [
      { value: "critical", label: "Critical" },
      { value: "high", label: "High" },
      { value: "medium", label: "Medium" },
      { value: "low", label: "Low" }
    ];
    const COLUMNS = [
      { id: "todo", label: "Todo", accentClass: "dot-todo", color: "todo" },
      { id: "doing", label: "Doing", accentClass: "dot-doing", color: "doing" },
      { id: "done", label: "Done", accentClass: "dot-done", color: "done" }
    ];

    const defaultState = {
      limits: {
        todo: 6,
        doing: 3,
        done: 0
      },
      form: {
        title: "",
        description: "",
        assignee: PEOPLE[0],
        priority: "medium"
      },
      search: "",
      assigneeFilter: "all",
      cards: [
        {
          id: crypto.randomUUID(),
          title: "Draft deployment checklist",
          description: "Confirm rollback owner, smoke tests, and release notes before handoff.",
          assignee: "Priya",
          priority: "high",
          status: "todo",
          createdAt: Date.now() - 1000 * 60 * 80
        },
        {
          id: crypto.randomUUID(),
          title: "Audit flaky API tests",
          description: "Pair on the top two failing test cases and isolate retry-sensitive mocks.",
          assignee: "Jordan",
          priority: "critical",
          status: "doing",
          createdAt: Date.now() - 1000 * 60 * 50
        },
        {
          id: crypto.randomUUID(),
          title: "Standup notes template",
          description: "Align blockers, owners, and follow-ups in one reusable board-friendly template.",
          assignee: "Alex",
          priority: "low",
          status: "done",
          createdAt: Date.now() - 1000 * 60 * 140
        }
      ]
    };

    let state = loadState();
    let dragCardId = null;
    let toastTimer = null;

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return structuredClone(defaultState);
        const parsed = JSON.parse(raw);
        return {
          ...structuredClone(defaultState),
          ...parsed,
          limits: { ...defaultState.limits, ...(parsed.limits || {}) },
          form: { ...defaultState.form, ...(parsed.form || {}) },
          cards: Array.isArray(parsed.cards) ? parsed.cards : defaultState.cards
        };
      } catch (error) {
        return structuredClone(defaultState);
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function showToast(message, tone = "ok") {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.className = "toast show " + tone;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toast.className = "toast";
      }, 2200);
    }

    function sanitizeLimit(value) {
      const next = Number.parseInt(value, 10);
      if (Number.isNaN(next) || next < 0) return 0;
      return next;
    }

    function getCards(status) {
      return state.cards.filter((card) => card.status === status);
    }

    function getFilteredCards(status) {
      const term = state.search.trim().toLowerCase();
      const assigneeFilter = state.assigneeFilter;
      return getCards(status).filter((card) => {
        const matchesSearch = !term || [card.title, card.description, card.assignee, card.priority].join(" ").toLowerCase().includes(term);
        const matchesAssignee = assigneeFilter === "all" || card.assignee === assigneeFilter;
        return matchesSearch && matchesAssignee;
      });
    }

    function limitLabel(status) {
      const limit = state.limits[status];
      return limit === 0 ? "No cap" : "WIP " + limit;
    }

    function canMoveTo(status, cardId) {
      const limit = state.limits[status];
      if (limit === 0) return true;
      const currentCards = getCards(status);
      const alreadyHere = currentCards.some((card) => card.id === cardId);
      return alreadyHere || currentCards.length < limit;
    }

    function remainingCapacity(status) {
      const limit = state.limits[status];
      if (limit === 0) return "Open";
      const count = getCards(status).length;
      const remaining = limit - count;
      return remaining > 0 ? remaining + " slot" + (remaining === 1 ? "" : "s") : "Full";
    }

    function formatAge(createdAt) {
      const minutes = Math.max(1, Math.round((Date.now() - createdAt) / 60000));
      if (minutes < 60) return minutes + "m ago";
      const hours = Math.round(minutes / 60);
      if (hours < 24) return hours + "h ago";
      const days = Math.round(hours / 24);
      return days + "d ago";
    }

    function updateForm(field, value) {
      state.form[field] = value;
      saveState();
    }

    function addCard(event) {
      event.preventDefault();
      const title = state.form.title.trim();
      const description = state.form.description.trim();
      if (!title) {
        showToast("Add a title before creating a card.", "warn");
        return;
      }
      if (!canMoveTo("todo")) {
        showToast("Todo is at its WIP limit. Raise the cap or move work forward first.", "warn");
        return;
      }
      state.cards.unshift({
        id: crypto.randomUUID(),
        title,
        description,
        assignee: state.form.assignee,
        priority: state.form.priority,
        status: "todo",
        createdAt: Date.now()
      });
      state.form.title = "";
      state.form.description = "";
      saveState();
      render();
      showToast("Card added to Todo.", "ok");
    }

    function clearBoard() {
      if (!window.confirm("Clear all cards from the board?")) return;
      state.cards = [];
      saveState();
      render();
      showToast("Board cleared.", "ok");
    }

    function updateCard(cardId, field, value) {
      state.cards = state.cards.map((card) => card.id === cardId ? { ...card, [field]: value } : card);
      saveState();
      render();
    }

    function deleteCard(cardId) {
      state.cards = state.cards.filter((card) => card.id !== cardId);
      saveState();
      render();
      showToast("Card deleted.", "ok");
    }

    function moveCard(cardId, nextStatus) {
      if (!canMoveTo(nextStatus, cardId)) {
        showToast(COLUMNS.find((column) => column.id === nextStatus).label + " is at its WIP limit.", "warn");
        return false;
      }
      state.cards = state.cards.map((card) => card.id === cardId ? { ...card, status: nextStatus } : card);
      saveState();
      render();
      return true;
    }

    function setLimit(status, value) {
      state.limits[status] = sanitizeLimit(value);
      saveState();
      render();
    }

    function resetDemoData() {
      state = structuredClone(defaultState);
      saveState();
      render();
      showToast("Demo board restored.", "ok");
    }

    function getStats() {
      const total = state.cards.length;
      const doing = getCards("doing").length;
      const done = getCards("done").length;
      const highFocus = state.cards.filter((card) => card.priority === "critical" || card.priority === "high").length;
      return { total, doing, done, highFocus };
    }

    function priorityLabel(value) {
      return PRIORITIES.find((item) => item.value === value)?.label || value;
    }

    function render() {
      const app = document.getElementById("app");
      const activeElement = document.activeElement;
      const activeId = activeElement && activeElement.id ? activeElement.id : null;
      const activeSelection = activeElement && typeof activeElement.selectionStart === "number"
        ? [activeElement.selectionStart, activeElement.selectionEnd]
        : null;
      const stats = getStats();
      app.innerHTML = `
        <section class="hero">
          <article class="hero-card">
            <div>
              <div class="eyebrow">Tiny Kanban</div>
              <h1>Daily flow for standup-ready teams.</h1>
              <p>Track work from Todo to Doing to Done, keep WIP honest, and surface who owns what before the meeting starts.</p>
            </div>
            <div class="hero-stats">
              <div class="stat">
                <strong>${stats.total}</strong>
                <span>Total cards</span>
              </div>
              <div class="stat">
                <strong>${stats.doing}</strong>
                <span>In progress</span>
              </div>
              <div class="stat">
                <strong>${stats.done}</strong>
                <span>Shipped today</span>
              </div>
              <div class="stat">
                <strong>${stats.highFocus}</strong>
                <span>High priority</span>
              </div>
            </div>
          </article>

          <form class="composer" id="composerForm">
            <div class="composer-header">
              <h2>Add Work</h2>
              <div class="helper">New cards start in Todo</div>
            </div>
            <div class="field">
              <label for="title">Task title</label>
              <input id="title" name="title" maxlength="90" placeholder="What needs to happen next?" value="${escapeHtml(state.form.title)}">
            </div>
            <div class="field full">
              <label for="description">Notes</label>
              <textarea id="description" name="description" maxlength="240" placeholder="Helpful context for the handoff or standup">${escapeHtml(state.form.description)}</textarea>
            </div>
            <div class="field-grid">
              <div class="field">
                <label for="assignee">Owner</label>
                <select id="assignee" name="assignee">
                  ${PEOPLE.map((person) => `<option value="${person}" ${person === state.form.assignee ? "selected" : ""}>${person}</option>`).join("")}
                </select>
              </div>
              <div class="field">
                <label for="priority">Priority</label>
                <select id="priority" name="priority">
                  ${PRIORITIES.map((item) => `<option value="${item.value}" ${item.value === state.form.priority ? "selected" : ""}>${item.label}</option>`).join("")}
                </select>
              </div>
            </div>
            <div class="actions">
              <button class="btn btn-primary" type="submit">Add Card</button>
              <button class="btn btn-secondary" type="button" id="resetDemo">Restore Demo</button>
              <button class="btn btn-secondary" type="button" id="clearBoard">Clear Board</button>
            </div>
          </form>
        </section>

        <section>
          <div class="board-top">
            <div>
              <h2>Board View</h2>
              <div class="board-note">Drag any card between lanes. WIP limits block overload automatically.</div>
            </div>
          </div>

          <div class="toolbar">
            <div class="field">
              <label for="search">Search</label>
              <input id="search" name="search" placeholder="Filter by task, note, owner, or priority" value="${escapeHtml(state.search)}">
            </div>
            <div class="field">
              <label for="assigneeFilter">Owner filter</label>
              <select id="assigneeFilter" name="assigneeFilter">
                <option value="all" ${state.assigneeFilter === "all" ? "selected" : ""}>Everyone</option>
                ${PEOPLE.map((person) => `<option value="${person}" ${person === state.assigneeFilter ? "selected" : ""}>${person}</option>`).join("")}
              </select>
            </div>
            <div class="field">
              <label for="summary">Standup pulse</label>
              <input id="summary" value="${stats.doing} doing • ${stats.done} done • ${stats.highFocus} hot items" readonly>
            </div>
          </div>

          <div class="board">
            ${COLUMNS.map(renderColumn).join("")}
          </div>
        </section>
      `;

      bindEvents();

      if (activeId) {
        const nextActive = document.getElementById(activeId);
        if (nextActive) {
          nextActive.focus({ preventScroll: true });
          if (activeSelection && typeof nextActive.setSelectionRange === "function") {
            nextActive.setSelectionRange(activeSelection[0], activeSelection[1]);
          }
        }
      }
    }

    function renderColumn(column) {
      const cards = getFilteredCards(column.id);
      const totalCards = getCards(column.id).length;
      const limit = state.limits[column.id];
      const isOverLimit = limit !== 0 && totalCards > limit;
      return `
        <section class="column" data-status="${column.id}">
          <div class="column-header">
            <div class="column-topline">
              <div class="column-title">
                <span class="column-dot ${column.accentClass}"></span>
                <h3>${column.label}</h3>
              </div>
              <div class="count-pill">${totalCards}</div>
            </div>
            <div class="column-meta">
              <div class="wip-control" ${isOverLimit ? 'style="background: var(--danger-bg); color: var(--danger);"' : ""}>
                <span>${limitLabel(column.id)}</span>
                <label class="sr-only" for="limit-${column.id}">Set ${column.label} WIP limit</label>
                <input id="limit-${column.id}" type="number" min="0" inputmode="numeric" value="${limit}">
              </div>
              <div class="meta-text">${remainingCapacity(column.id)}</div>
            </div>
          </div>
          <div class="lane" data-status="${column.id}">
            ${cards.length ? cards.map(renderCard).join("") : `<div class="empty">No matching cards here.</div>`}
          </div>
        </section>
      `;
    }

    function renderCard(card) {
      return `
        <article class="card priority-${card.priority}" draggable="true" data-card-id="${card.id}">
          <div class="card-top">
            <div>
              <h4 class="card-title">${escapeHtml(card.title)}</h4>
              ${card.description ? `<p class="card-desc">${escapeHtml(card.description)}</p>` : ""}
            </div>
            <div class="badge badge-${card.priority}">${priorityLabel(card.priority)}</div>
          </div>
          <div class="card-controls">
            <div class="mini-field">
              <label for="person-${card.id}">Owner</label>
              <select id="person-${card.id}" data-action="assignee" data-card-id="${card.id}">
                ${PEOPLE.map((person) => `<option value="${person}" ${person === card.assignee ? "selected" : ""}>${person}</option>`).join("")}
              </select>
            </div>
            <div class="mini-field">
              <label for="priority-${card.id}">Priority</label>
              <select id="priority-${card.id}" data-action="priority" data-card-id="${card.id}">
                ${PRIORITIES.map((item) => `<option value="${item.value}" ${item.value === card.priority ? "selected" : ""}>${item.label}</option>`).join("")}
              </select>
            </div>
          </div>
          <div class="card-bottom">
            <div class="meta-text">${escapeHtml(card.assignee)} · ${formatAge(card.createdAt)}</div>
            <button class="delete-btn" type="button" data-action="delete" data-card-id="${card.id}">Delete</button>
          </div>
        </article>
      `;
    }

    function bindEvents() {
      document.getElementById("composerForm").addEventListener("submit", addCard);
      document.getElementById("title").addEventListener("input", (event) => updateForm("title", event.target.value));
      document.getElementById("description").addEventListener("input", (event) => updateForm("description", event.target.value));
      document.getElementById("assignee").addEventListener("change", (event) => updateForm("assignee", event.target.value));
      document.getElementById("priority").addEventListener("change", (event) => updateForm("priority", event.target.value));
      document.getElementById("search").addEventListener("input", (event) => {
        state.search = event.target.value;
        saveState();
        render();
      });
      document.getElementById("assigneeFilter").addEventListener("change", (event) => {
        state.assigneeFilter = event.target.value;
        saveState();
        render();
      });
      document.getElementById("clearBoard").addEventListener("click", clearBoard);
      document.getElementById("resetDemo").addEventListener("click", resetDemoData);

      document.querySelectorAll(".wip-control input").forEach((input) => {
        input.addEventListener("change", (event) => setLimit(event.target.id.replace("limit-", ""), event.target.value));
      });

      document.querySelectorAll("[data-action='assignee']").forEach((select) => {
        select.addEventListener("change", (event) => updateCard(event.target.dataset.cardId, "assignee", event.target.value));
      });

      document.querySelectorAll("[data-action='priority']").forEach((select) => {
        select.addEventListener("change", (event) => updateCard(event.target.dataset.cardId, "priority", event.target.value));
      });

      document.querySelectorAll("[data-action='delete']").forEach((button) => {
        button.addEventListener("click", (event) => deleteCard(event.target.dataset.cardId));
      });

      document.querySelectorAll(".card").forEach((card) => {
        card.addEventListener("dragstart", (event) => {
          dragCardId = card.dataset.cardId;
          card.classList.add("dragging");
          event.dataTransfer.effectAllowed = "move";
          event.dataTransfer.setData("text/plain", dragCardId);
        });

        card.addEventListener("dragend", () => {
          dragCardId = null;
          card.classList.remove("dragging");
          document.querySelectorAll(".column").forEach((column) => column.classList.remove("over"));
        });
      });

      document.querySelectorAll(".lane").forEach((lane) => {
        lane.addEventListener("dragover", (event) => {
          event.preventDefault();
          event.dataTransfer.dropEffect = "move";
          lane.closest(".column").classList.add("over");
        });

        lane.addEventListener("dragleave", () => {
          lane.closest(".column").classList.remove("over");
        });

        lane.addEventListener("drop", (event) => {
          event.preventDefault();
          lane.closest(".column").classList.remove("over");
          const cardId = event.dataTransfer.getData("text/plain") || dragCardId;
          if (!cardId) return;
          const nextStatus = lane.dataset.status;
          const moved = moveCard(cardId, nextStatus);
          if (moved) {
            const laneName = COLUMNS.find((column) => column.id === nextStatus).label;
            showToast("Moved to " + laneName + ".", "ok");
          }
        });
      });
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    render();
  </script>
</body>
</html>
