<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Language Learning Flashcards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;700&family=Manrope:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-1: #173247;
      --bg-2: #0b151d;
      --bg-3: #2a4e4d;
      --accent: #f3b562;
      --accent-2: #7fd1b9;
      --accent-soft: rgba(243, 181, 98, 0.22);
      --text: #f8fbff;
      --muted: rgba(248, 251, 255, 0.7);
      --muted-2: rgba(248, 251, 255, 0.48);
      --panel: rgba(12, 18, 29, 0.58);
      --panel-strong: rgba(8, 14, 23, 0.72);
      --border: rgba(255, 255, 255, 0.14);
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.34);
      --success: #8ae39b;
      --danger: #ff9b87;
    }

    body[data-theme="en"] {
      --bg-1: #173247;
      --bg-2: #0b151d;
      --bg-3: #2a4e4d;
      --accent: #f3b562;
      --accent-2: #7fd1b9;
      --accent-soft: rgba(243, 181, 98, 0.22);
    }

    body[data-theme="es"] {
      --bg-1: #3a1022;
      --bg-2: #11070f;
      --bg-3: #1f6a67;
      --accent: #ff8a5b;
      --accent-2: #ffd166;
      --accent-soft: rgba(255, 138, 91, 0.22);
    }

    body[data-theme="fr"] {
      --bg-1: #0c2347;
      --bg-2: #090d17;
      --bg-3: #521b2d;
      --accent: #ffd8a8;
      --accent-2: #8bd3ff;
      --accent-soft: rgba(139, 211, 255, 0.2);
    }

    body[data-theme="ja"] {
      --bg-1: #26132c;
      --bg-2: #0d0911;
      --bg-3: #5e4632;
      --accent: #ffcc85;
      --accent-2: #f08ca0;
      --accent-soft: rgba(240, 140, 160, 0.2);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      min-height: 100%;
    }

    body {
      margin: 0;
      font-family: "Manrope", "Avenir Next", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 20%, rgba(255, 255, 255, 0.08), transparent 22%),
        radial-gradient(circle at 82% 18%, var(--accent-soft), transparent 26%),
        radial-gradient(circle at 72% 78%, rgba(127, 209, 185, 0.22), transparent 28%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2) 52%, var(--bg-3));
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: auto;
      width: 42rem;
      height: 42rem;
      border-radius: 50%;
      filter: blur(50px);
      opacity: 0.38;
      pointer-events: none;
      z-index: 0;
      animation: drift 18s ease-in-out infinite alternate;
    }

    body::before {
      top: -14rem;
      left: -10rem;
      background: radial-gradient(circle, var(--accent-soft), transparent 62%);
    }

    body::after {
      bottom: -16rem;
      right: -12rem;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.12), transparent 60%);
      animation-duration: 22s;
    }

    @keyframes drift {
      from { transform: translate3d(-2%, -1%, 0) scale(0.98); }
      to { transform: translate3d(3%, 2%, 0) scale(1.05); }
    }

    .app-shell {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      padding: 30px 18px 44px;
    }

    .layout {
      width: min(1160px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(320px, 0.9fr);
      gap: 24px;
      align-items: stretch;
    }

    .panel {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.03));
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 30px;
      overflow: hidden;
    }

    .hero {
      padding: 30px;
      display: flex;
      flex-direction: column;
      gap: 26px;
      position: relative;
      isolation: isolate;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(140deg, rgba(255, 255, 255, 0.08), transparent 36%),
        radial-gradient(circle at top right, rgba(255, 255, 255, 0.08), transparent 30%);
      pointer-events: none;
      z-index: -1;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      align-self: flex-start;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.05);
      color: var(--muted);
      letter-spacing: 0.04em;
      font-size: 0.79rem;
      text-transform: uppercase;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 0 16px rgba(255, 255, 255, 0.3);
    }

    .hero-copy {
      display: grid;
      gap: 14px;
    }

    h1 {
      margin: 0;
      font-family: "Fraunces", Georgia, serif;
      font-size: clamp(2.6rem, 4vw, 4.5rem);
      line-height: 0.96;
      letter-spacing: -0.04em;
      max-width: 11ch;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      max-width: 60ch;
      line-height: 1.65;
      font-size: 1.02rem;
    }

    .language-section {
      display: grid;
      gap: 16px;
    }

    .section-title {
      margin: 0;
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .language-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .language-pill {
      position: relative;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      border-radius: 20px;
      padding: 16px 18px;
      text-align: left;
      cursor: pointer;
      transition: transform 180ms ease, border-color 180ms ease, background 180ms ease, box-shadow 180ms ease;
      overflow: hidden;
    }

    .language-pill::after {
      content: "";
      position: absolute;
      inset: auto auto 0 0;
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 180ms ease;
    }

    .language-pill:hover,
    .language-pill:focus-visible {
      transform: translateY(-2px);
      border-color: rgba(255, 255, 255, 0.24);
      outline: none;
    }

    .language-pill.is-active {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.04));
      border-color: rgba(255, 255, 255, 0.24);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06), 0 12px 28px rgba(0, 0, 0, 0.22);
    }

    .language-pill.is-active::after {
      transform: scaleX(1);
    }

    .language-name {
      display: block;
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .language-meta {
      display: block;
      color: var(--muted-2);
      font-size: 0.9rem;
    }

    .info-rail {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 22px;
      padding: 18px;
      display: grid;
      gap: 8px;
    }

    .stat-label {
      color: var(--muted);
      font-size: 0.84rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .stat-value {
      font-weight: 800;
      font-size: clamp(1.25rem, 2vw, 1.6rem);
    }

    .stat-value.small {
      font-size: 1rem;
      line-height: 1.4;
      color: var(--text);
      font-weight: 600;
    }

    .deck-panel {
      padding: 28px;
      display: grid;
      gap: 20px;
      align-content: start;
      background:
        linear-gradient(180deg, rgba(6, 11, 18, 0.68), rgba(5, 9, 16, 0.78)),
        radial-gradient(circle at top right, rgba(255, 255, 255, 0.08), transparent 25%);
    }

    .deck-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: start;
      flex-wrap: wrap;
    }

    .deck-copy {
      display: grid;
      gap: 8px;
      max-width: 34rem;
    }

    .deck-kicker {
      color: var(--accent);
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 700;
    }

    .deck-title {
      margin: 0;
      font-size: 1.55rem;
      letter-spacing: -0.03em;
    }

    .deck-subtitle {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      appearance: none;
      border: none;
      cursor: pointer;
      border-radius: 999px;
      padding: 12px 18px;
      font: inherit;
      font-weight: 700;
      color: #10151c;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      transition: transform 180ms ease, box-shadow 180ms ease, opacity 180ms ease, filter 180ms ease;
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.22);
    }

    .btn:hover,
    .btn:focus-visible {
      transform: translateY(-2px);
      filter: brightness(1.03);
      outline: none;
    }

    .btn:disabled {
      opacity: 0.42;
      cursor: not-allowed;
      transform: none;
      filter: none;
      box-shadow: none;
    }

    .btn.secondary {
      color: var(--text);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: none;
    }

    .progress-wrap {
      display: grid;
      gap: 10px;
    }

    .progress-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      color: var(--muted);
      font-size: 0.93rem;
    }

    .progress-bar {
      position: relative;
      height: 10px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.08);
    }

    .progress-fill {
      position: absolute;
      inset: 0 auto 0 0;
      width: 0;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      border-radius: inherit;
      transition: width 260ms ease;
    }

    .deck-stage {
      position: relative;
      min-height: 450px;
      display: grid;
      place-items: center;
      perspective: 1600px;
      padding: 8px 0 10px;
    }

    .deck-stage.is-shuffling .flashcard {
      animation: shufflePulse 480ms ease;
    }

    @keyframes shufflePulse {
      0% { transform: translateY(0) rotate(0deg) scale(1); }
      30% { transform: translateY(-8px) rotate(-2deg) scale(1.02); }
      60% { transform: translateY(4px) rotate(2deg) scale(0.99); }
      100% { transform: translateY(0) rotate(0deg) scale(1); }
    }

    .flashcard {
      position: absolute;
      width: min(100%, 520px);
      aspect-ratio: 5 / 3.2;
      transform-style: preserve-3d;
      transition: transform 420ms cubic-bezier(0.2, 0.8, 0.2, 1), opacity 320ms ease, filter 320ms ease;
      will-change: transform;
    }

    .flashcard[data-depth="0"] {
      z-index: 4;
    }

    .flashcard[data-depth="1"] {
      z-index: 3;
      transform: translateY(16px) scale(0.96);
      opacity: 0.78;
      filter: saturate(0.8);
      pointer-events: none;
    }

    .flashcard[data-depth="2"] {
      z-index: 2;
      transform: translateY(32px) scale(0.92);
      opacity: 0.48;
      filter: saturate(0.65);
      pointer-events: none;
    }

    .flashcard.is-leaving {
      animation: learnAway 460ms cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      pointer-events: none;
    }

    @keyframes learnAway {
      0% { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
      100% { opacity: 0; transform: translateY(-44px) rotate(5deg) scale(0.92); }
    }

    .card-button {
      width: 100%;
      height: 100%;
      border: none;
      background: transparent;
      padding: 0;
      cursor: pointer;
      perspective: inherit;
      display: block;
    }

    .card-button:focus-visible {
      outline: none;
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 640ms cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .flashcard.is-flipped .card-inner {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      inset: 0;
      border-radius: 28px;
      overflow: hidden;
      backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 22px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.02)),
        radial-gradient(circle at top right, rgba(255, 255, 255, 0.1), transparent 28%),
        var(--panel-strong);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.08),
        0 18px 44px rgba(0, 0, 0, 0.28);
    }

    .card-face.back {
      transform: rotateY(180deg);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.03)),
        radial-gradient(circle at bottom left, rgba(255, 255, 255, 0.08), transparent 28%),
        linear-gradient(135deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.01)),
        var(--panel-strong);
    }

    .card-face::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(120deg, transparent 0%, rgba(255, 255, 255, 0.08) 48%, transparent 52%);
      opacity: 0.4;
      pointer-events: none;
      transform: translateX(-100%);
      animation: sheen 7s linear infinite;
    }

    @keyframes sheen {
      0% { transform: translateX(-120%); }
      24% { transform: translateX(120%); }
      100% { transform: translateX(120%); }
    }

    .card-top,
    .card-bottom {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--muted);
      font-size: 0.85rem;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .card-side {
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 700;
    }

    .card-content {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 14px;
      align-content: center;
      justify-items: start;
      flex: 1;
      padding: 10px 2px 6px;
    }

    .card-phrase {
      margin: 0;
      font-size: clamp(1.9rem, 3.8vw, 3rem);
      line-height: 1.08;
      letter-spacing: -0.04em;
      max-width: 12ch;
      font-weight: 800;
    }

    .card-phrase.jp {
      font-family: "Noto Sans JP", "Hiragino Sans", sans-serif;
      letter-spacing: -0.01em;
      line-height: 1.2;
    }

    .card-support {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
      max-width: 36ch;
      font-size: 0.97rem;
    }

    .pronunciation {
      font-size: 0.95rem;
      color: var(--accent);
      font-weight: 700;
      letter-spacing: 0.03em;
    }

    .listen-btn {
      appearance: none;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 14px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform 180ms ease, background 180ms ease;
    }

    .listen-btn:hover,
    .listen-btn:focus-visible {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.12);
      outline: none;
    }

    .completion-card {
      width: min(100%, 520px);
      min-height: 390px;
      border-radius: 30px;
      padding: 30px;
      display: grid;
      align-content: center;
      gap: 18px;
      background:
        radial-gradient(circle at top right, rgba(255, 255, 255, 0.12), transparent 24%),
        linear-gradient(160deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.03)),
        var(--panel-strong);
      border: 1px solid rgba(255, 255, 255, 0.14);
      box-shadow: 0 18px 44px rgba(0, 0, 0, 0.28);
      text-align: left;
      position: relative;
      overflow: hidden;
    }

    .completion-card::after {
      content: "";
      position: absolute;
      inset: auto -20% -40% auto;
      width: 260px;
      height: 260px;
      background: radial-gradient(circle, var(--accent-soft), transparent 62%);
      pointer-events: none;
    }

    .completion-title {
      margin: 0;
      font-size: clamp(2rem, 3vw, 2.6rem);
      letter-spacing: -0.04em;
      font-family: "Fraunces", Georgia, serif;
    }

    .completion-text {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
      max-width: 32ch;
    }

    .learned-panel {
      display: grid;
      gap: 14px;
    }

    .learned-title {
      margin: 0;
      font-size: 1rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .learned-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      min-height: 44px;
    }

    .learned-chip {
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text);
      font-size: 0.95rem;
      animation: chipIn 320ms cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    @keyframes chipIn {
      from { opacity: 0; transform: translateY(10px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .learned-empty {
      color: var(--muted-2);
      line-height: 1.6;
    }

    .footer-note {
      color: var(--muted-2);
      font-size: 0.9rem;
      line-height: 1.6;
    }

    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .hero,
      .deck-panel {
        padding: 24px;
      }

      .deck-stage {
        min-height: 420px;
      }
    }

    @media (max-width: 640px) {
      .app-shell {
        padding: 16px 12px 28px;
      }

      .hero,
      .deck-panel {
        padding: 20px;
        border-radius: 24px;
      }

      .language-grid,
      .info-rail {
        grid-template-columns: 1fr;
      }

      .controls {
        width: 100%;
      }

      .btn {
        flex: 1 1 auto;
        justify-content: center;
      }

      .deck-stage {
        min-height: 360px;
      }

      .card-face,
      .completion-card {
        border-radius: 24px;
        padding: 18px;
      }

      .card-phrase {
        max-width: 14ch;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <main class="layout">
      <section class="panel hero" aria-labelledby="app-title">
        <div class="eyebrow"><span class="dot"></span><span id="eyebrow-text"></span></div>
        <div class="hero-copy">
          <h1 id="app-title"></h1>
          <p class="subtitle" id="app-subtitle"></p>
        </div>

        <div class="language-section">
          <h2 class="section-title" id="language-label"></h2>
          <div class="language-grid" id="language-grid"></div>
        </div>

        <div class="info-rail">
          <div class="stat-card">
            <span class="stat-label" id="stat-selected-label"></span>
            <span class="stat-value" id="stat-selected-value"></span>
          </div>
          <div class="stat-card">
            <span class="stat-label" id="stat-prompt-label"></span>
            <span class="stat-value" id="stat-prompt-value"></span>
          </div>
          <div class="stat-card">
            <span class="stat-label" id="stat-tip-label"></span>
            <span class="stat-value small" id="stat-tip-value"></span>
          </div>
        </div>
      </section>

      <section class="panel deck-panel" aria-labelledby="deck-title">
        <div class="deck-head">
          <div class="deck-copy">
            <span class="deck-kicker" id="deck-kicker"></span>
            <h2 class="deck-title" id="deck-title"></h2>
            <p class="deck-subtitle" id="deck-subtitle"></p>
          </div>
          <div class="controls">
            <button class="btn secondary" id="shuffle-btn" type="button"></button>
            <button class="btn" id="learn-btn" type="button"></button>
          </div>
        </div>

        <div class="progress-wrap">
          <div class="progress-top">
            <span id="progress-label"></span>
            <span id="progress-value"></span>
          </div>

    const languageNames = {

      },

      },
      ja: {
        eyebrow: "旅行フレーズデッキ",
        title: "Pocket Phrase Pilot",
        subtitle: "旅先で役立つ定番フレーズをすばやく定着させます。学びたい言語を選び、カードをめくりながらデッキをクリアしてください。",
        chooseLanguage: "どの言語を学びますか？",
        selectedLanguage: "学習言語",
        promptLanguage: "ヒント面",
        promptTip: "可能な場合は、カード表面にあなたのUI言語を使います。",
        sameLanguageTip: "同じ言語を選んだときは、学習しやすいようにヒント面を英語に切り替えます。",
        deckKicker: "インタラクティブフラッシュカード",
        deckTitle: "旅行で使えるフレーズ",
        deckSubtitle: "一番上のカードをタップすると裏返ります。裏面には選んだ言語の表現と、必要に応じて発音が表示されます。",
        shuffle: "シャッフル",
        markLearned: "習得済みにする",
        progress: "進み具合",
        learnedTitle: "習得済みフレーズ",
        learnedEmpty: "カードを習得済みにして、旅行向けのフレーズ一覧を増やしましょう。",
        footerNote: "内蔵セット: 移動、食事、道案内、ていねいな会話で役立つ必須フレーズ10個。",
        promptSide: "ヒント",
        answerSide: "翻訳",
        pronunciation: "発音",
        listen: "再生",
        remaining: "残り",
        completedTitle: "デッキ完了",
        completedText: "このセットの内蔵フレーズをすべて習得しました。もう一度始めるか、言語を切り替えて続けてください。",
        restart: "最初から",
        cardHint: "カードをめくる",
        promptNote: "意味表示",
        learnedCount: "習得済み",
        noSpeech: "このブラウザでは音声再生を利用できません。"
      }
    };

    const categories = {
      basics: { en: "Basics", es: "Básicos", fr: "Bases", ja: "基本" },
      courtesy: { en: "Courtesy", es: "Cortesía", fr: "Politesse", ja: "ていねい" },
      directions: { en: "Directions", es: "Direcciones", fr: "Orientation", ja: "道案内" },
      transit: { en: "Transit", es: "Transporte", fr: "Transport", ja: "交通" },
      dining: { en: "Dining", es: "Comida", fr: "Repas", ja: "食事" },
      safety: { en: "Safety", es: "Seguridad", fr: "Sécurité", ja: "安全" }
    };

    const phraseBank = [
      {
        id: "hello",
        category: "basics",
        text: {
          en: "Hello",
          es: "Hola",
          fr: "Bonjour",
          ja: "こんにちは"
        },
        note: { ja: "Konnichiwa" }
      },
      {
        id: "thank-you",
        category: "courtesy",
        text: {
          en: "Thank you",
          es: "Gracias",
          fr: "Merci",
          ja: "ありがとうございます"
        },
        note: { ja: "Arigato gozaimasu" }
      },
      {
        id: "do-you-speak-english",
        category: "basics",
        text: {
          en: "Do you speak English?",
          es: "¿Habla inglés?",
          fr: "Parlez-vous anglais ?",
          ja: "英語を話せますか？"
        },
        note: { ja: "Eigo o hanasemasu ka?" }
      },
      {
        id: "where-is-bathroom",
        category: "directions",
        text: {
          en: "Where is the bathroom?",
          es: "¿Dónde está el baño?",
          fr: "Où sont les toilettes ?",
          ja: "トイレはどこですか？"
        },
        note: { ja: "Toire wa doko desu ka?" }
      },
      {
        id: "how-much",
        category: "dining",
        text: {
          en: "How much does this cost?",
          es: "¿Cuánto cuesta esto?",
          fr: "Combien ça coûte ?",
          ja: "これはいくらですか？"
        },
        note: { ja: "Kore wa ikura desu ka?" }
      },
      {
        id: "i-would-like-this",
        category: "dining",
        text: {
          en: "I would like this, please.",
          es: "Quisiera esto, por favor.",
          fr: "Je voudrais ceci, s'il vous plaît.",
          ja: "これをお願いします。"
        },
        note: { ja: "Kore o onegaishimasu." }
      },
      {
        id: "train-station",
        category: "transit",
        text: {
          en: "Where is the train station?",
          es: "¿Dónde está la estación de tren?",
          fr: "Où est la gare ?",
          ja: "駅はどこですか？"
        },
        note: { ja: "Eki wa doko desu ka?" }
      },
      {
        id: "bill-please",
        category: "dining",
        text: {
          en: "Can I have the bill, please?",
          es: "La cuenta, por favor.",
          fr: "L'addition, s'il vous plaît.",
          ja: "お会計をお願いします。"
        },
        note: { ja: "Okaikei o onegaishimasu." }
      },
      {
        id: "allergic-to-nuts",
        category: "safety",
        text: {
          en: "I am allergic to nuts.",
          es: "Soy alérgico a los frutos secos.",
          fr: "Je suis allergique aux fruits à coque.",
          ja: "ナッツアレルギーがあります。"
        },
        note: { ja: "Nattsu arerugi ga arimasu." }
      },
      {
        id: "i-need-help",
        category: "safety",
        text: {
          en: "I need help.",
          es: "Necesito ayuda.",
          fr: "J'ai besoin d'aide.",
          ja: "助けが必要です。"
        },
        note: { ja: "Tasuke ga hitsuyo desu." }
      }
    ];

    const state = {
      uiLocale: detectUiLocale(),
      targetLanguage: "es",
      deck: [],
      learned: [],
      flipped: false,
      isShuffling: false,
      exitingId: null
    };

    const elements = {
      eyebrowText: document.getElementById("eyebrow-text"),
      title: document.getElementById("app-title"),
      subtitle: document.getElementById("app-subtitle"),
      languageLabel: document.getElementById("language-label"),
      languageGrid: document.getElementById("language-grid"),
      statSelectedLabel: document.getElementById("stat-selected-label"),
      statSelectedValue: document.getElementById("stat-selected-value"),
      statPromptLabel: document.getElementById("stat-prompt-label"),
      statPromptValue: document.getElementById("stat-prompt-value"),
      statTipLabel: document.getElementById("stat-tip-label"),
      statTipValue: document.getElementById("stat-tip-value"),
      deckKicker: document.getElementById("deck-kicker"),
      deckTitle: document.getElementById("deck-title"),
      deckSubtitle: document.getElementById("deck-subtitle"),
      shuffleBtn: document.getElementById("shuffle-btn"),
      learnBtn: document.getElementById("learn-btn"),
      progressLabel: document.getElementById("progress-label"),
      progressValue: document.getElementById("progress-value"),
      progressFill: document.getElementById("progress-fill"),
      deckStage: document.getElementById("deck-stage"),
      learnedTitle: document.getElementById("learned-title"),
      learnedList: document.getElementById("learned-list"),
      footerNote: document.getElementById("footer-note")
    };

    state.targetLanguage = chooseDefaultTargetLanguage();
    resetDeck();
    render();
    bindEvents();

    function detectUiLocale() {
      const navLocale = (navigator.language || navigator.userLanguage || "en").toLowerCase();
      const match = uiLanguages.find((locale) => navLocale.startsWith(locale));
      return match || "en";
    }

    function chooseDefaultTargetLanguage() {
      const candidate = state.uiLocale === "en" ? "es" : "en";
      return supportedLanguageCodes.includes(candidate) ? candidate : "es";
    }

    function bindEvents() {
      elements.languageGrid.addEventListener("click", (event) => {
        const button = event.target.closest("[data-language]");
        if (!button) return;
        const language = button.getAttribute("data-language");
        if (!supportedLanguageCodes.includes(language) || language === state.targetLanguage) return;
        state.targetLanguage = language;
        document.body.setAttribute("data-theme", state.targetLanguage);
        resetDeck();
        render();
      });

      elements.shuffleBtn.addEventListener("click", shuffleDeck);
      elements.learnBtn.addEventListener("click", markLearned);

      elements.deckStage.addEventListener("click", (event) => {
        const listenButton = event.target.closest("[data-action='listen']");
        if (listenButton) {
          const phraseId = listenButton.getAttribute("data-phrase-id");
          speakPhrase(phraseId);
          event.stopPropagation();
          return;
        }

        const resetButton = event.target.closest("[data-action='restart']");
        if (resetButton) {
          resetDeck();
          render();
          return;
        }

        const cardButton = event.target.closest("[data-action='flip']");
        if (cardButton && !state.exitingId && state.deck.length) {
          state.flipped = !state.flipped;
          renderDeck();
        }
      });

      document.addEventListener("keydown", (event) => {
        if (event.key !== " " && event.key !== "Enter") return;
        const active = document.activeElement;
        if (!active || !active.matches("[data-action='flip']")) return;
        event.preventDefault();
        if (!state.exitingId && state.deck.length) {
          state.flipped = !state.flipped;
          renderDeck();
        }
      });
    }

    function resetDeck() {
      state.deck = phraseBank.map((phrase) => phrase.id);
      state.learned = [];
      state.flipped = false;
      state.isShuffling = false;
      state.exitingId = null;
      document.body.setAttribute("data-theme", state.targetLanguage);
    }

    function getUiText(key) {
      return uiCopy[state.uiLocale][key];
    }

    function getPromptLocale() {
      if (state.uiLocale !== state.targetLanguage) {
        return state.uiLocale;
      }
      return state.targetLanguage === "en" ? "es" : "en";
    }

    function getPhraseById(id) {
      return phraseBank.find((phrase) => phrase.id === id);
    }

    function shuffleDeck() {
      if (state.isShuffling || state.exitingId || state.deck.length < 2) return;
      state.isShuffling = true;
      state.flipped = false;
      renderDeck();
      window.setTimeout(() => {
        for (let index = state.deck.length - 1; index > 0; index -= 1) {
          const swapIndex = Math.floor(Math.random() * (index + 1));
          [state.deck[index], state.deck[swapIndex]] = [state.deck[swapIndex], state.deck[index]];
        }
        state.isShuffling = false;
        render();
      }, 420);
    }

    function markLearned() {
      if (!state.deck.length || state.exitingId) return;
      state.flipped = false;
      state.exitingId = state.deck[0];
      renderDeck();
      window.setTimeout(() => {
        const learnedId = state.deck.shift();
        if (learnedId) {
          state.learned.unshift(learnedId);
        }
        state.exitingId = null;
        state.flipped = false;
        render();
      }, 430);
    }

    function speakPhrase(phraseId) {
      const phrase = getPhraseById(phraseId);
      if (!phrase || !("speechSynthesis" in window)) {
        window.alert(getUiText("noSpeech"));
        return;
      }

      const utterance = new SpeechSynthesisUtterance(phrase.text[state.targetLanguage]);
      utterance.lang = languageMeta[state.targetLanguage].speech;
      utterance.rate = state.targetLanguage === "ja" ? 0.92 : 0.98;
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(utterance);
    }

    function render() {
      const promptLocale = getPromptLocale();
      const completedCount = state.learned.length;
      const totalCount = phraseBank.length;
      const remainingCount = state.deck.length;
      const isSameLanguageMode = state.uiLocale === state.targetLanguage;
      const currentUi = uiCopy[state.uiLocale];

      document.documentElement.lang = state.uiLocale;
      document.title = currentUi.title;
      elements.eyebrowText.textContent = currentUi.eyebrow;
      elements.title.textContent = currentUi.title;
      elements.subtitle.textContent = currentUi.subtitle;
      elements.languageLabel.textContent = currentUi.chooseLanguage;
      elements.statSelectedLabel.textContent = currentUi.selectedLanguage;
      elements.statSelectedValue.textContent = languageNames[state.uiLocale][state.targetLanguage];
      elements.statPromptLabel.textContent = currentUi.promptLanguage;
      elements.statPromptValue.textContent = languageNames[state.uiLocale][promptLocale];
      elements.statTipLabel.textContent = currentUi.promptSide;
      elements.statTipValue.textContent = isSameLanguageMode ? currentUi.sameLanguageTip : currentUi.promptTip;
      elements.deckKicker.textContent = currentUi.deckKicker;
      elements.deckTitle.textContent = currentUi.deckTitle;
      elements.deckSubtitle.textContent = currentUi.deckSubtitle;
      elements.shuffleBtn.textContent = currentUi.shuffle;
      elements.learnBtn.textContent = currentUi.markLearned;
      elements.shuffleBtn.disabled = state.deck.length < 2 || Boolean(state.exitingId);
      elements.learnBtn.disabled = !state.deck.length || Boolean(state.exitingId);
      elements.progressLabel.textContent = currentUi.progress;
      elements.progressValue.textContent = `${completedCount}/${totalCount} ${currentUi.learnedCount.toLowerCase()} • ${remainingCount} ${currentUi.remaining}`;
      elements.progressFill.style.width = `${(completedCount / totalCount) * 100}%`;
      elements.learnedTitle.textContent = currentUi.learnedTitle;
      elements.footerNote.textContent = currentUi.footerNote;

      renderLanguageButtons();
      renderDeck();
      renderLearned();
    }

    function renderLanguageButtons() {
      const promptLocale = state.uiLocale;
      elements.languageGrid.innerHTML = supportedLanguageCodes.map((language) => {
        const isActive = state.targetLanguage === language;
        return `
          <button
            class="language-pill ${isActive ? "is-active" : ""}"
            type="button"
            data-language="${language}"
            aria-pressed="${isActive ? "true" : "false"}"
          >
            <span class="language-name">${languageNames[promptLocale][language]}</span>
            <span class="language-meta">${languageMeta[language].native}</span>
          </button>
        `;
      }).join("");
    }

    function renderDeck() {
      const currentUi = uiCopy[state.uiLocale];
      const promptLocale = getPromptLocale();
      elements.deckStage.classList.toggle("is-shuffling", state.isShuffling);

      if (!state.deck.length) {
        elements.deckStage.innerHTML = `
          <section class="completion-card" aria-label="${escapeHtml(currentUi.completedTitle)}">
            <span class="badge">${escapeHtml(languageNames[state.uiLocale][state.targetLanguage])}</span>
            <h3 class="completion-title">${escapeHtml(currentUi.completedTitle)}</h3>
            <p class="completion-text">${escapeHtml(currentUi.completedText)}</p>
            <div class="controls">
              <button class="btn" type="button" data-action="restart">${escapeHtml(currentUi.restart)}</button>
            </div>
          </section>
        `;
        return;
      }

      const stack = state.deck.slice(0, 3).map((phraseId, index) => {
        const phrase = getPhraseById(phraseId);
        const frontText = phrase.text[promptLocale];
        const backText = phrase.text[state.targetLanguage];
        const isFlipped = index === 0 && state.flipped;
        const isLeaving = state.exitingId === phraseId;
        const note = phrase.note && phrase.note[state.targetLanguage] ? phrase.note[state.targetLanguage] : "";
        const category = categories[phrase.category][state.uiLocale];
        const currentNumber = phraseBank.length - state.deck.length + index + 1;

        return `
          <article
            class="flashcard ${isFlipped ? "is-flipped" : ""} ${isLeaving ? "is-leaving" : ""}"
            data-depth="${index}"
          >
            <div
              class="card-button"
              data-action="${index === 0 ? "flip" : ""}"
              ${index === 0 ? `aria-label="${escapeHtml(currentUi.cardHint)}" role="button" tabindex="0"` : "tabindex='-1' aria-hidden='true'"}
            >
              <div class="card-inner">
                <section class="card-face front" aria-hidden="${isFlipped ? "true" : "false"}">
                  <div class="card-top">
                    <span class="badge">${escapeHtml(category)}</span>
                    <span class="card-side">${escapeHtml(currentUi.promptSide)}</span>
                  </div>
                  <div class="card-content">
                    <p class="card-phrase ${promptLocale === "ja" ? "jp" : ""}" lang="${promptLocale}">${escapeHtml(frontText)}</p>
                    <p class="card-support">${escapeHtml(currentUi.promptNote)} ${escapeHtml(languageNames[state.uiLocale][promptLocale].toLowerCase())}</p>
                  </div>
                  <div class="card-bottom">
                    <span class="badge">${currentNumber} / ${phraseBank.length}</span>
                    <span class="card-side">${escapeHtml(currentUi.cardHint)}</span>
                  </div>
                </section>
                <section class="card-face back" aria-hidden="${isFlipped ? "false" : "true"}">
                  <div class="card-top">
                    <span class="badge">${escapeHtml(category)}</span>
                    <span class="card-side">${escapeHtml(currentUi.answerSide)}</span>
                  </div>
                  <div class="card-content">
                    <p class="card-phrase ${state.targetLanguage === "ja" ? "jp" : ""}" lang="${state.targetLanguage}">${escapeHtml(backText)}</p>
                    ${note ? `<div class="pronunciation">${escapeHtml(currentUi.pronunciation)}: ${escapeHtml(note)}</div>` : ""}
                    <p class="card-support">${escapeHtml(frontText)}</p>
                  </div>
                  <div class="card-bottom">
                    <button class="listen-btn" type="button" data-action="listen" data-phrase-id="${phrase.id}">${escapeHtml(currentUi.listen)}</button>
                    <span class="badge">${escapeHtml(languageMeta[state.targetLanguage].native)}</span>
                  </div>
                </section>
              </div>
            </div>
          </article>
        `;
      }).reverse().join("");

      elements.deckStage.innerHTML = stack;
    }

    function renderLearned() {
      if (!state.learned.length) {
        elements.learnedList.innerHTML = `<div class="learned-empty">${escapeHtml(getUiText("learnedEmpty"))}</div>`;
        return;
      }

      elements.learnedList.innerHTML = state.learned
        .map((phraseId) => {
          const phrase = getPhraseById(phraseId);
          return `<div class="learned-chip">${escapeHtml(phrase.text[state.targetLanguage])}</div>`;
        })
        .join("");
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }
  </script>
</body>
