<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather Theatre</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --paper: #f7f1e3;
        --ink: #11161c;
        --wine: #7a1f2e;
        --velvet: #3d1020;
        --gold: #d2a64f;
        --amber: #f1b75d;
        --teal: #173746;
        --mist: rgba(241, 244, 248, 0.7);
        --panel: rgba(9, 16, 22, 0.7);
        --border: rgba(255, 232, 187, 0.18);
        --shadow: 0 30px 80px rgba(0, 0, 0, 0.4);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body,
      #root {
        margin: 0;
        min-height: 100%;
      }

      body {
        font-family: "Manrope", sans-serif;
        color: var(--paper);
        background:
          radial-gradient(circle at top, rgba(248, 197, 88, 0.1), transparent 28%),
          radial-gradient(circle at 20% 20%, rgba(192, 33, 68, 0.18), transparent 35%),
          linear-gradient(180deg, #071015, #121f2b 40%, #071015 100%);
        overflow-x: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
          linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        background-size: 32px 32px;
        opacity: 0.18;
        mask-image: radial-gradient(circle at center, black 40%, transparent 90%);
      }

      .app-shell {
        width: min(1240px, calc(100vw - 32px));
        margin: 24px auto;
        padding: 18px;
        border-radius: 30px;
        border: 1px solid rgba(255, 248, 220, 0.12);
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.01)),
          rgba(6, 10, 15, 0.82);
        box-shadow: var(--shadow);
        backdrop-filter: blur(22px);
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 8px 6px 18px;
      }

      .eyebrow {
        margin: 0 0 4px;
        text-transform: uppercase;
        letter-spacing: 0.28em;
        font-size: 11px;
        color: rgba(255, 236, 191, 0.68);
      }

      h1 {
        margin: 0;
        font-family: "Cormorant Garamond", serif;
        font-size: clamp(44px, 7vw, 74px);
        line-height: 0.9;
        letter-spacing: 0.01em;
        font-weight: 700;
      }

      .dek {
        margin: 10px 0 0;
        max-width: 70ch;
        color: rgba(245, 239, 225, 0.76);
        font-size: 14px;
      }

      .mode-toggle {
        display: inline-flex;
        padding: 6px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: rgba(255, 250, 239, 0.07);
        gap: 6px;
        align-self: flex-start;
      }

      .mode-toggle button {
        appearance: none;
        border: 0;
        padding: 10px 16px;
        border-radius: 999px;
        color: rgba(252, 245, 230, 0.82);
        background: transparent;
        font: inherit;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.02em;
        cursor: pointer;
        transition: background 180ms ease, color 180ms ease, transform 180ms ease;
      }

      .mode-toggle button.active {
        color: #151109;
        background: linear-gradient(135deg, #f1cf8a, #e2ac48);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.45);
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1.25fr) minmax(320px, 0.8fr);
        gap: 18px;
      }

      .stage-card,
      .control-card {
        border-radius: 28px;
        border: 1px solid var(--border);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.015));
        overflow: hidden;
      }

      .stage-card {
        position: relative;
        min-height: 720px;
      }

      .stage-inner {
        position: relative;
        min-height: 720px;
        padding: 18px;
      }

      .canvas-frame {
        position: relative;
        height: 100%;
        min-height: 684px;
        border-radius: 24px;
        overflow: hidden;
        background: linear-gradient(180deg, rgba(2, 8, 11, 0.9), rgba(6, 16, 23, 0.96));
        border: 1px solid rgba(255, 241, 206, 0.08);
      }

      canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
      }

      .stage-header {
        position: absolute;
        top: 18px;
        left: 18px;
        right: 18px;
        z-index: 8;
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: flex-start;
        pointer-events: none;
      }

      .scene-pill,
      .forecast-pill {
        border: 1px solid rgba(255, 241, 211, 0.18);
        background: rgba(11, 19, 26, 0.44);
        backdrop-filter: blur(14px);
        border-radius: 16px;
        padding: 12px 14px;
        max-width: 380px;
      }

      .scene-pill h2 {
        margin: 4px 0 8px;
        font-family: "Cormorant Garamond", serif;
        font-size: clamp(34px, 4vw, 48px);
        line-height: 0.92;
        font-weight: 600;
      }

      .mono {
        text-transform: uppercase;
        letter-spacing: 0.2em;
        font-size: 10px;
        color: rgba(247, 231, 188, 0.66);
      }

      .subtitle {
        min-height: 48px;
        margin: 0;
        color: rgba(247, 241, 227, 0.88);
        font-size: 15px;
        line-height: 1.5;
      }

      .cursor {
        display: inline-block;
        width: 10px;
        color: #f6d28b;
        animation: blink 1s steps(2, start) infinite;
      }

      .forecast-pill {
        max-width: 250px;
      }

      .forecast-pill strong {
        display: block;
        margin-top: 4px;
        font-size: 15px;
      }

      .forecast-pill span {
        display: block;
        margin-top: 4px;
        font-size: 13px;
        color: rgba(247, 241, 227, 0.74);
      }

      .stage-footer {
        position: absolute;
        left: 18px;
        right: 18px;
        bottom: 18px;
        z-index: 8;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
      }

      .stat {
        border-radius: 18px;
        padding: 13px 14px;
        background: rgba(9, 16, 22, 0.45);
        border: 1px solid rgba(255, 239, 198, 0.1);
        backdrop-filter: blur(10px);
      }

      .stat strong {
        display: block;
        margin-top: 4px;
        font-size: 20px;
        font-weight: 800;
      }

      .stat span {
        display: block;
        font-size: 12px;
        color: rgba(246, 241, 228, 0.72);
      }

      .proscenium {
        position: absolute;
        inset: 0;
        border-radius: 24px;
        pointer-events: none;
        z-index: 7;
        box-shadow:
          inset 0 0 0 1px rgba(255, 232, 187, 0.08),
          inset 0 0 70px rgba(0, 0, 0, 0.34),
          inset 0 -90px 100px rgba(0, 0, 0, 0.4);
      }

      .proscenium::before,
      .proscenium::after {
        content: "";
        position: absolute;
        pointer-events: none;
      }

      .proscenium::before {
        inset: 0 0 auto;
        height: 116px;
        background:
          radial-gradient(circle at center bottom, rgba(237, 184, 76, 0.35), transparent 38%),
          repeating-linear-gradient(
            90deg,
            rgba(88, 12, 28, 0.92) 0,
            rgba(125, 24, 48, 0.98) 22px,
            rgba(84, 8, 23, 0.94) 46px
          );
        box-shadow: inset 0 -18px 40px rgba(0, 0, 0, 0.28);
      }

      .proscenium::after {
        inset: auto 0 0;
        height: 148px;
        background:
          radial-gradient(circle at 50% 0%, rgba(246, 196, 96, 0.22), transparent 40%),
          linear-gradient(180deg, transparent, rgba(7, 11, 16, 0.66) 25%, rgba(7, 11, 16, 0.92));
      }

      .curtain {
        position: absolute;
        inset: 0;
        z-index: 9;
        pointer-events: none;
      }

      .curtain-top {
        position: absolute;
        inset: 0 0 auto;
        height: 112px;
        background:
          radial-gradient(circle at center top, rgba(255, 210, 112, 0.3), transparent 38%),
          repeating-linear-gradient(
            90deg,
            #561424 0,
            #7e2035 20px,
            #621222 42px
          );
        border-bottom: 1px solid rgba(252, 231, 183, 0.14);
      }

      .curtain-side {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 52%;
        background:
          linear-gradient(90deg, rgba(255, 219, 150, 0.06), transparent 35%),
          repeating-linear-gradient(
            90deg,
            #4b0d1b 0,
            #7f2338 20px,
            #59111d 44px
          );
        box-shadow: inset -18px 0 28px rgba(0, 0, 0, 0.26);
        transition: transform 1.5s cubic-bezier(0.2, 0.8, 0.1, 1);
        will-change: transform;
      }

      .curtain-side.left {
        left: -3%;
        border-radius: 0 0 38px 0;
        transform: translateX(var(--curtain-left, 0));
      }

      .curtain-side.right {
        right: -3%;
        transform: translateX(var(--curtain-right, 0));
        border-radius: 0 0 0 38px;
        box-shadow: inset 18px 0 28px rgba(0, 0, 0, 0.26);
      }

      .stage-card.open .curtain-side.left {
        --curtain-left: -92%;
      }

      .stage-card.open .curtain-side.right {
        --curtain-right: 92%;
      }

      .control-card {
        padding: 22px 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 18px;
      }

      .control-card h3 {
        margin: 0;
        font-family: "Cormorant Garamond", serif;
        font-size: 38px;
        font-weight: 600;
      }

      .control-card p {
        margin: 0;
        color: rgba(245, 239, 225, 0.76);
        font-size: 14px;
        line-height: 1.55;
      }

      .slider-block {
        padding: 14px;
        border-radius: 20px;
        border: 1px solid rgba(255, 236, 190, 0.12);
        background: rgba(255, 248, 235, 0.045);
      }

      .slider-head {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 14px;
      }

      .slider-head strong {
        font-size: 18px;
      }

      .slider-head span {
        color: rgba(249, 241, 226, 0.72);
        font-size: 13px;
      }

      .slider-value {
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: rgba(247, 230, 187, 0.72);
      }

      input[type="range"] {
        width: 100%;
        margin-top: 14px;
        appearance: none;
        height: 10px;
        border-radius: 999px;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0.06));
        outline: none;
      }

      input[type="range"]::-webkit-slider-thumb {
        appearance: none;
        width: 24px;
        height: 24px;
        border-radius: 50%;
        border: 2px solid rgba(255, 250, 240, 0.9);
        background: linear-gradient(135deg, #ffe9be, #d89a37);
        box-shadow: 0 6px 18px rgba(233, 176, 74, 0.35);
        cursor: ew-resize;
      }

      input[type="range"]::-moz-range-thumb {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        border: 2px solid rgba(255, 250, 240, 0.9);
        background: linear-gradient(135deg, #ffe9be, #d89a37);
        box-shadow: 0 6px 18px rgba(233, 176, 74, 0.35);
        cursor: ew-resize;
      }

      .mix-meter {
        display: grid;
        gap: 10px;
      }

      .mix-bar {
        overflow: hidden;
        height: 14px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.07);
        display: flex;
      }

      .mix-bar i {
        display: block;
        height: 100%;
      }

      .mix-legend {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        font-size: 12px;
        color: rgba(245, 239, 225, 0.76);
      }

      .mix-legend b {
        color: #fff1cc;
      }

      .beats {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .beat {
        padding: 14px;
        border-radius: 18px;
        background: rgba(255, 248, 235, 0.045);
        border: 1px solid rgba(255, 236, 190, 0.1);
      }

      .beat strong {
        display: block;
        margin-bottom: 6px;
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: rgba(247, 230, 187, 0.68);
      }

      .beat span {
        color: rgba(245, 239, 225, 0.86);
        line-height: 1.45;
        font-size: 14px;
      }

      .buttons {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .buttons button {
        appearance: none;
        border: 0;
        border-radius: 999px;
        padding: 12px 16px;
        font: inherit;
        font-weight: 700;
        color: #171108;
        background: linear-gradient(135deg, #f5d28a, #d89d42);
        cursor: pointer;
        box-shadow: 0 14px 30px rgba(207, 152, 62, 0.24);
      }

      .buttons button.secondary {
        color: rgba(245, 239, 225, 0.9);
        background: rgba(255, 248, 235, 0.08);
        border: 1px solid rgba(255, 236, 190, 0.14);
        box-shadow: none;
      }

      .credit {
        font-size: 12px;
        color: rgba(245, 239, 225, 0.58);
      }

      @keyframes blink {
        0%,
        49% {
          opacity: 1;
        }
        50%,
        100% {
          opacity: 0;
        }
      }

      @media (max-width: 980px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .stage-card,
        .stage-inner {
          min-height: 620px;
        }

        .canvas-frame {
          min-height: 584px;
        }
      }

      @media (max-width: 720px) {
        .app-shell {
          width: min(calc(100vw - 14px), 100%);
          margin: 7px auto;
          padding: 10px;
          border-radius: 22px;
        }

        .topbar,
        .stage-header {
          flex-direction: column;
        }

        .stage-header {
          left: 12px;
          right: 12px;
          top: 12px;
        }

        .stage-footer {
          left: 12px;
          right: 12px;
          bottom: 12px;
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .stage-inner,
        .control-card {
          padding: 12px;
        }

        .canvas-frame {
          min-height: 540px;
        }

        .forecast-pill {
          max-width: none;
        }

        .beats {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel">
      const { useEffect, useMemo, useRef, useState } = React;

      const FORECAST = {
        location: "Grand Harbour Promenade",
        temp: 64,
        feelsLike: 61,
        high: 67,
        low: 54,
        condition: "Light rain with marine gusts",
        chance: 68,
        wind: 14,
        humidity: 79,
        pressure: 1012,
        sunrise: "6:18",
        sunset: "18:02",
      };

      const clamp = (value, min, max) => Math.max(min, Math.min(max, value));

      function useTypewriter(text, speed = 28) {
        const [display, setDisplay] = useState("");

        useEffect(() => {
          let index = 0;
          setDisplay("");
          const timer = window.setInterval(() => {
            index += 1;
            setDisplay(text.slice(0, index));
            if (index >= text.length) {
              window.clearInterval(timer);
            }
          }, speed);

          return () => window.clearInterval(timer);
        }, [text, speed]);

        return display;
      }

      function normalizeMood(cosy, eerie, heroic) {
        const total = cosy + eerie + heroic || 1;
        return {
          cosy: cosy / total,
          eerie: eerie / total,
          heroic: heroic / total,
        };
      }

      function describeScene(mood, isNight) {
        const dominant = [
          ["cosy", mood.cosy],
          ["eerie", mood.eerie],
          ["heroic", mood.heroic],
        ].sort((a, b) => b[1] - a[1])[0][0];

        const titleByMood = {
          cosy: isNight ? "Lantern Rain Revue" : "Matinée Under Awnings",
          eerie: isNight ? "Spectral Front Tonight" : "Fog Between Acts",
          heroic: isNight ? "Nocturne of the Brave" : "Stormbreak Overture",
        };

        const fragments = [];
        if (mood.cosy > 0.34) {
          fragments.push(isNight ? "amber lamps soften the drizzle" : "cafe awnings cradle the rain");
        }
        if (mood.eerie > 0.34) {
          fragments.push(isNight ? "sea fog turns every lamp into a ghost" : "the promenade breathes with pale mist");
        }
        if (mood.heroic > 0.34) {
          fragments.push(isNight ? "searchlights comb the horizon for a final triumph" : "sunbreaks strike the harbor like brass fanfare");
        }
        if (!fragments.length) {
          fragments.push(isNight ? "the harbor plays its silver weather in half-light" : "the harbor keeps the same forecast but changes the costume");
        }

        const subtitle =
          fragments.join(", ") +
          `. ${FORECAST.condition.toLowerCase()} stays constant; only the staging shifts.`;

        const beats = {
          opening:
            dominant === "cosy"
              ? "Warm windows, wet cobblestones, and footlights low enough to hear the rain."
              : dominant === "eerie"
                ? "Mist gathers in the wings while the same shower learns a colder language."
                : "Rain becomes percussion beneath broad beams and a determined skyline.",
          finale:
            dominant === "cosy"
              ? "The curtain closes on cocoa-colored reflections and a gentle encore."
              : dominant === "eerie"
                ? "The last cue is a distant horn swallowed by vapor."
                : "Every gust lands like applause as the storm exits in gold.",
        };

        return { title: titleByMood[dominant], subtitle, beats };
      }

      function weightedMixLabel(mood) {
        return `${Math.round(mood.cosy * 100)}% cosy / ${Math.round(mood.eerie * 100)}% eerie / ${Math.round(mood.heroic * 100)}% heroic`;
      }

      function SceneCanvas({ cosy, eerie, heroic, isNight, curtainPulse }) {
        const canvasRef = useRef(null);
        const hostRef = useRef(null);
        const pointerRef = useRef({ x: 0.5, y: 0.4 });
        const stateRef = useRef({ cosy, eerie, heroic, isNight, curtainPulse });

        useEffect(() => {
          stateRef.current = { cosy, eerie, heroic, isNight, curtainPulse };
        }, [cosy, eerie, heroic, isNight, curtainPulse]);

        useEffect(() => {
          const canvas = canvasRef.current;
          const host = hostRef.current;
          const ctx = canvas.getContext("2d");
          let animationFrame = 0;
          let width = 0;
          let height = 0;
          let dpr = 1;

          const resize = () => {
            const rect = host.getBoundingClientRect();
            dpr = Math.min(window.devicePixelRatio || 1, 2);
            width = rect.width;
            height = rect.height;
            canvas.width = Math.round(width * dpr);
            canvas.height = Math.round(height * dpr);
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          };

          const makeCloud = (x, y, scale, alpha, tint) => {
            ctx.save();
            ctx.translate(x, y);
            ctx.scale(scale, scale);
            const grad = ctx.createRadialGradient(0, -8, 8, 0, 0, 72);
            grad.addColorStop(0, tint.replace("ALPHA", alpha.toFixed(3)));
            grad.addColorStop(1, tint.replace("ALPHA", "0"));
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.ellipse(-34, 10, 54, 28, -0.3, 0, Math.PI * 2);
            ctx.ellipse(16, -4, 64, 34, 0.08, 0, Math.PI * 2);
            ctx.ellipse(58, 12, 42, 24, 0.12, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
          };

          const draw = (time) => {
            const state = stateRef.current;
            const mood = normalizeMood(state.cosy, state.eerie, state.heroic);
            const t = time * 0.001;
            const swayX = (pointerRef.current.x - 0.5) * 26;
            const swayY = (pointerRef.current.y - 0.5) * 16;

            ctx.clearRect(0, 0, width, height);

            const topHue = state.isNight
              ? 206 + mood.eerie * 28 - mood.cosy * 16 + mood.heroic * 8
              : 197 - mood.eerie * 18 + mood.heroic * 4;
            const topLight = state.isNight
              ? 9 + mood.heroic * 11 + mood.cosy * 6
              : 66 + mood.cosy * 10 + mood.heroic * 6 - mood.eerie * 7;
            const bottomHue = state.isNight
              ? 188 + mood.heroic * 16 - mood.cosy * 10
              : 32 + mood.cosy * 6 + mood.heroic * 10;
            const bottomLight = state.isNight
              ? 16 + mood.cosy * 20 + mood.heroic * 16
              : 56 + mood.heroic * 14 + mood.cosy * 10 - mood.eerie * 10;

            const sky = ctx.createLinearGradient(0, 0, 0, height);
            sky.addColorStop(0, `hsl(${topHue} 55% ${topLight}%)`);
            sky.addColorStop(0.58, `hsl(${bottomHue} ${state.isNight ? 42 : 62}% ${bottomLight}%)`);
            sky.addColorStop(1, `hsl(${bottomHue - 6} 36% ${state.isNight ? 11 : 22}%)`);
            ctx.fillStyle = sky;
            ctx.fillRect(0, 0, width, height);

            if (state.isNight) {
              const starCount = Math.floor(42 + mood.heroic * 30 + mood.eerie * 10);
              for (let i = 0; i < starCount; i += 1) {
                const sx = ((i * 173) % width) + Math.sin(i * 9.3) * 22;
                const sy = 30 + ((i * 97) % (height * 0.48));
                const twinkle = 0.2 + ((Math.sin(t * 1.8 + i * 0.7) + 1) / 2) * 0.8;
                ctx.fillStyle = `rgba(255, 243, 214, ${0.18 + twinkle * 0.45})`;
                ctx.fillRect(sx, sy, 1.5, 1.5);
              }
            }

            const celestialX = width * (0.72 + Math.sin(t * 0.08) * 0.04) + swayX * 0.4;
            const celestialY = state.isNight ? height * 0.2 : height * 0.22;
            const celestialRadius = state.isNight ? 34 : 46;
            const aura = ctx.createRadialGradient(
              celestialX,
              celestialY,
              0,
              celestialX,
              celestialY,
              celestialRadius * 3.6
            );
            if (state.isNight) {
              aura.addColorStop(0, `rgba(242, 242, 255, ${0.35 + mood.eerie * 0.18})`);
              aura.addColorStop(0.4, `rgba(157, 196, 226, ${0.14 + mood.heroic * 0.08})`);
              aura.addColorStop(1, "rgba(157, 196, 226, 0)");
            } else {
              aura.addColorStop(0, `rgba(255, 244, 201, ${0.5 + mood.heroic * 0.16})`);
              aura.addColorStop(0.38, `rgba(255, 198, 92, ${0.18 + mood.cosy * 0.12})`);
              aura.addColorStop(1, "rgba(255, 198, 92, 0)");
            }
            ctx.fillStyle = aura;
            ctx.beginPath();
            ctx.arc(celestialX, celestialY, celestialRadius * 3.6, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = state.isNight ? "#eef0ff" : "#fff4d0";
            ctx.beginPath();
            ctx.arc(celestialX, celestialY, celestialRadius, 0, Math.PI * 2);
            ctx.fill();
            if (state.isNight) {
              ctx.fillStyle = `rgba(22, 42, 57, ${0.82 - mood.heroic * 0.2})`;
              ctx.beginPath();
              ctx.arc(celestialX + 11, celestialY - 6, celestialRadius * 0.88, 0, Math.PI * 2);
              ctx.fill();
            }

            for (let i = 0; i < 4; i += 1) {
              const y = height * (0.16 + i * 0.09) + Math.sin(t * (0.1 + i * 0.02) + i) * 14;
              const x = ((t * (18 + i * 12) + i * 210) % (width + 260)) - 130 - swayX * (0.25 + i * 0.05);
              makeCloud(
                x,
                y + swayY * (0.12 + i * 0.04),
                1 + i * 0.18 + mood.cosy * 0.26,
                0.12 + mood.cosy * 0.18 + mood.eerie * 0.1,
                state.isNight
                  ? "rgba(197, 219, 233, ALPHA)"
                  : "rgba(255, 247, 232, ALPHA)"
              );
              makeCloud(
                x + width * 0.56,
                y + 18,
                0.8 + i * 0.16,
                0.08 + mood.eerie * 0.14,
                state.isNight
                  ? "rgba(111, 160, 192, ALPHA)"
                  : "rgba(240, 243, 248, ALPHA)"
              );
            }

            const horizon = height * 0.58;
            const drawHills = (baseY, amplitude, color, detail, drift, alpha = 1) => {
              ctx.save();
              ctx.globalAlpha = alpha;
              ctx.fillStyle = color;
              ctx.beginPath();
              ctx.moveTo(0, height);
              for (let x = 0; x <= width; x += 12) {
                const hill =
                  Math.sin((x + t * drift + swayX * detail) * 0.009 * detail) * amplitude +
                  Math.sin((x + t * drift * 0.65) * 0.015) * (amplitude * 0.3);
                ctx.lineTo(x, baseY + hill);
              }
              ctx.lineTo(width, height);
              ctx.closePath();
              ctx.fill();
              ctx.restore();
            };

            drawHills(
              horizon - 46 + swayY * 0.2,
              28 + mood.heroic * 24,
              state.isNight ? "rgba(24, 43, 55, 0.94)" : "rgba(74, 94, 101, 0.8)",
              1.2,
              16,
              0.94
            );

            drawHills(
              horizon + 18 + swayY * 0.35,
              34 + mood.eerie * 18,
              state.isNight ? "rgba(13, 25, 34, 0.94)" : "rgba(43, 66, 76, 0.92)",
              1.9,
              28,
              1
            );

            ctx.save();
            ctx.fillStyle = state.isNight ? "rgba(10, 18, 26, 0.96)" : "rgba(24, 37, 45, 0.92)";
            const skylineBase = horizon + 50;
            for (let i = 0; i < 16; i += 1) {
              const x = i * (width / 15) - 30 - swayX * 0.55;
              const w = 30 + ((i * 19) % 24);
              const spire =
                mood.eerie * ((i % 3 === 0 ? 1 : 0) * 24) +
                mood.heroic * ((i % 4 === 0 ? 1 : 0) * 20) +
                mood.cosy * ((i % 5 === 0 ? 1 : 0) * 10);
              const h = 48 + ((i * 31) % 58) + spire;
              ctx.fillRect(x, skylineBase - h, w, h);
              if (spire > 8) {
                ctx.beginPath();
                ctx.moveTo(x + w * 0.5, skylineBase - h - 16);
                ctx.lineTo(x + w * 0.25, skylineBase - h + 4);
                ctx.lineTo(x + w * 0.75, skylineBase - h + 4);
                ctx.closePath();
                ctx.fill();
              }
              if (mood.cosy > 0.3) {
                ctx.fillStyle = `rgba(247, 197, 97, ${0.1 + mood.cosy * 0.22})`;
                ctx.fillRect(x + 6, skylineBase - h + 10, 4, 6);
                ctx.fillRect(x + w - 12, skylineBase - h + 18, 4, 6);
                ctx.fillStyle = state.isNight ? "rgba(10, 18, 26, 0.96)" : "rgba(24, 37, 45, 0.92)";
              }
            }
            ctx.restore();

            if (mood.heroic > 0.2) {
              ctx.save();
              ctx.globalCompositeOperation = "screen";
              for (let i = 0; i < 4; i += 1) {
                const rayX = width * (0.28 + i * 0.13) + Math.sin(t * 0.6 + i) * 30;
                const rayWidth = 100 + i * 24;
                const ray = ctx.createLinearGradient(rayX, horizon - 190, rayX + rayWidth, horizon + 90);
                ray.addColorStop(0, `rgba(255, 244, 201, ${0.12 + mood.heroic * 0.14})`);
                ray.addColorStop(1, "rgba(255, 244, 201, 0)");
                ctx.fillStyle = ray;
                ctx.beginPath();
                ctx.moveTo(rayX, horizon - 160);
                ctx.lineTo(rayX + rayWidth * 0.08, horizon - 160);
                ctx.lineTo(rayX + rayWidth, height);
                ctx.lineTo(rayX - rayWidth * 0.38, height);
                ctx.closePath();
                ctx.fill();
              }
              ctx.restore();
            }

            if (mood.eerie > 0.18) {
              ctx.save();
              ctx.globalCompositeOperation = "screen";
              const fog = ctx.createLinearGradient(0, horizon - 30, 0, height);
              fog.addColorStop(0, `rgba(185, 224, 234, ${0.02 + mood.eerie * 0.08})`);
              fog.addColorStop(0.45, `rgba(146, 199, 208, ${0.12 + mood.eerie * 0.16})`);
              fog.addColorStop(1, "rgba(146, 199, 208, 0)");
              ctx.fillStyle = fog;
              ctx.fillRect(0, horizon - 30, width, height - horizon + 30);
              ctx.restore();
            }

            ctx.save();
            ctx.globalCompositeOperation = "screen";
            for (let i = 0; i < 2; i += 1) {
              const swing = Math.sin(t * 0.7 + i * 1.6 + state.curtainPulse * 0.8);
              const sourceX = i === 0 ? width * 0.08 : width * 0.92;
              const targetX = width * (0.5 + swing * 0.16 * (i === 0 ? 1 : -1));
              const beam = ctx.createLinearGradient(sourceX, 0, targetX, height * 0.82);
              beam.addColorStop(0, `rgba(255, 237, 190, ${0.18 + mood.heroic * 0.08 + mood.eerie * 0.04})`);
              beam.addColorStop(0.52, `rgba(255, 237, 190, ${0.08 + mood.cosy * 0.08})`);
              beam.addColorStop(1, "rgba(255, 237, 190, 0)");
              ctx.fillStyle = beam;
              ctx.beginPath();
              ctx.moveTo(sourceX, 0);
              ctx.lineTo(sourceX + (i === 0 ? 64 : -64), 0);
              ctx.lineTo(targetX + (i === 0 ? 90 : -90), height * 0.84);
              ctx.lineTo(targetX + (i === 0 ? -40 : 40), height * 0.84);
              ctx.closePath();
              ctx.fill();
            }
            ctx.restore();

            const rainCount = Math.floor(80 + mood.eerie * 70 + mood.heroic * 18 - mood.cosy * 12);
            ctx.strokeStyle = state.isNight
              ? `rgba(202, 227, 241, ${0.22 + mood.eerie * 0.12})`
              : `rgba(232, 238, 244, ${0.22 + mood.heroic * 0.08})`;
            ctx.lineWidth = 1.2;
            for (let i = 0; i < rainCount; i += 1) {
              const rx = ((i * 37 + t * 260) % (width + 160)) - 80;
              const ry = ((i * 91 + t * 380) % (height + 220)) - 110;
              const slant = 12 + mood.heroic * 6 + mood.eerie * 10;
              const drop = 18 + mood.eerie * 8;
              ctx.beginPath();
              ctx.moveTo(rx, ry);
              ctx.lineTo(rx - slant, ry + drop);
              ctx.stroke();
            }

            const stageTop = height * 0.76;
            const floorGrad = ctx.createLinearGradient(0, stageTop, 0, height);
            floorGrad.addColorStop(0, "rgba(20, 12, 7, 0.02)");
            floorGrad.addColorStop(0.18, `rgba(62, 28, 16, ${0.32 + mood.cosy * 0.16})`);
            floorGrad.addColorStop(1, "rgba(12, 6, 4, 0.96)");
            ctx.fillStyle = floorGrad;
            ctx.fillRect(0, stageTop, width, height - stageTop);

            ctx.save();
            ctx.translate(width / 2, height * 0.83);
            ctx.scale(1, 0.3);
            const deck = ctx.createRadialGradient(0, 0, 40, 0, 0, width * 0.42);
            deck.addColorStop(0, `rgba(255, 203, 102, ${0.16 + mood.cosy * 0.18})`);
            deck.addColorStop(0.5, `rgba(169, 75, 34, ${0.18 + mood.heroic * 0.1})`);
            deck.addColorStop(1, "rgba(10, 5, 4, 0)");
            ctx.fillStyle = deck;
            ctx.beginPath();
            ctx.arc(0, 0, width * 0.44, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            const footlights = 10;
            for (let i = 0; i < footlights; i += 1) {
              const lx = width * (0.11 + i * 0.086);
              const ly = height - 24 + Math.sin(t * 4 + i) * 1.8;
              const glow = ctx.createRadialGradient(lx, ly, 0, lx, ly, 28);
              glow.addColorStop(0, `rgba(255, 219, 141, ${0.58 + mood.cosy * 0.16})`);
              glow.addColorStop(0.35, `rgba(255, 176, 84, ${0.3 + mood.heroic * 0.08})`);
              glow.addColorStop(1, "rgba(255, 176, 84, 0)");
              ctx.fillStyle = glow;
              ctx.beginPath();
              ctx.arc(lx, ly, 28, 0, Math.PI * 2);
              ctx.fill();
            }

            if (mood.cosy > 0.16) {
              for (let i = 0; i < 4; i += 1) {
                const lx = width * (0.18 + i * 0.2) + Math.sin(t * 0.7 + i) * 8;
                const ly = horizon - 36 - i * 8;
                const lantern = ctx.createRadialGradient(lx, ly, 0, lx, ly, 52);
                lantern.addColorStop(0, `rgba(255, 213, 128, ${0.2 + mood.cosy * 0.22})`);
                lantern.addColorStop(1, "rgba(255, 213, 128, 0)");
                ctx.fillStyle = lantern;
                ctx.beginPath();
                ctx.arc(lx, ly, 52, 0, Math.PI * 2);
                ctx.fill();
              }
            }

            const vignette = ctx.createRadialGradient(width / 2, height / 2, width * 0.14, width / 2, height / 2, width * 0.7);
            vignette.addColorStop(0, "rgba(0, 0, 0, 0)");
            vignette.addColorStop(1, "rgba(0, 0, 0, 0.34)");
            ctx.fillStyle = vignette;
            ctx.fillRect(0, 0, width, height);

            animationFrame = window.requestAnimationFrame(draw);
          };

          resize();
          animationFrame = window.requestAnimationFrame(draw);
          window.addEventListener("resize", resize);

          return () => {
            window.cancelAnimationFrame(animationFrame);
            window.removeEventListener("resize", resize);
          };
        }, []);

        const handlePointerMove = (event) => {
          const rect = event.currentTarget.getBoundingClientRect();
          pointerRef.current = {
            x: clamp((event.clientX - rect.left) / rect.width, 0, 1),
            y: clamp((event.clientY - rect.top) / rect.height, 0, 1),
          };
        };

        const handlePointerLeave = () => {
          pointerRef.current = { x: 0.5, y: 0.4 };
        };

        return (
          <div
            ref={hostRef}
            className="canvas-frame"
            onPointerMove={handlePointerMove}
            onPointerLeave={handlePointerLeave}
          >
            <canvas ref={canvasRef} />
            <div className="proscenium" />
          </div>
        );
      }

      function App() {
        const [cosy, setCosy] = useState(58);
        const [eerie, setEerie] = useState(26);
        const [heroic, setHeroic] = useState(44);
        const [isNight, setIsNight] = useState(false);
        const [openCurtain, setOpenCurtain] = useState(false);
        const [curtainPulse, setCurtainPulse] = useState(0);

        useEffect(() => {
          const timer = window.setTimeout(() => setOpenCurtain(true), 280);
          return () => window.clearTimeout(timer);
        }, []);

        const mood = useMemo(() => normalizeMood(cosy, eerie, heroic), [cosy, eerie, heroic]);
        const scene = useMemo(() => describeScene(mood, isNight), [mood, isNight]);
        const typedSubtitle = useTypewriter(scene.subtitle, 24);
        const mixLabel = useMemo(() => weightedMixLabel(mood), [mood]);

        const resetMix = () => {
          setCosy(58);
          setEerie(26);
          setHeroic(44);
          setIsNight(false);
        };

        const replayCurtain = () => {
          setOpenCurtain(false);
          setCurtainPulse((value) => value + 1);
          window.setTimeout(() => setOpenCurtain(true), 140);
        };

        const controls = [
          {
            key: "cosy",
            label: "Cosy",
            hint: "Lantern glow, warm reflections, and softer weather edges.",
            value: cosy,
            setValue: setCosy,
          },
          {
            key: "eerie",
            label: "Eerie",
            hint: "Fog, spectral depth, and colder silhouettes in the same rain.",
            value: eerie,
            setValue: setEerie,
          },
          {
            key: "heroic",
            label: "Heroic",
            hint: "Brass-toned light, stronger beams, and a storm with purpose.",
            value: heroic,
            setValue: setHeroic,
          },
        ];

        return (
          <div className="app-shell">
            <div className="topbar">
              <div>
                <p className="eyebrow">React + Canvas Production</p>
                <h1>Weather Theatre</h1>
                <p className="dek">
                  One fixed harbor forecast, endlessly recast as stagecraft. Shift the emotional direction,
                  let the backdrop parallax through the drizzle, and flip the house lights from matinée to nightfall.
                </p>
              </div>
              <div className="mode-toggle" role="tablist" aria-label="Time of day">
                <button
                  type="button"
                  className={!isNight ? "active" : ""}
                  onClick={() => setIsNight(false)}
                  aria-pressed={!isNight}
                >
                  Matinée
                </button>
                <button
                  type="button"
                  className={isNight ? "active" : ""}
                  onClick={() => setIsNight(true)}
                  aria-pressed={isNight}
                >
                  Night
                </button>
              </div>
            </div>

            <div className="layout">
              <section className={`stage-card ${openCurtain ? "open" : ""}`}>
                <div className="stage-inner">
                  <div className="stage-header">
                    <div className="scene-pill">
                      <div className="mono">{isNight ? "Tonight" : "Matinée"} at {FORECAST.location}</div>
                      <h2>{scene.title}</h2>
                      <p className="subtitle">
                        {typedSubtitle}
                        <span className="cursor">|</span>
                      </p>
                    </div>
                    <div className="forecast-pill">
                      <div className="mono">Unchanged Forecast</div>
                      <strong>{FORECAST.temp}&deg;F, {FORECAST.condition}</strong>
                      <span>
                        Rain {FORECAST.chance}% • Wind {FORECAST.wind} mph • Humidity {FORECAST.humidity}%
                      </span>
                    </div>
                  </div>

                  <SceneCanvas
                    cosy={cosy}
                    eerie={eerie}
                    heroic={heroic}
                    isNight={isNight}
                    curtainPulse={curtainPulse}
                  />

                  <div className="stage-footer">
                    <div className="stat">
                      <span>Feels Like</span>
                      <strong>{FORECAST.feelsLike}&deg;F</strong>
                    </div>
                    <div className="stat">
                      <span>High / Low</span>
                      <strong>{FORECAST.high}&deg; / {FORECAST.low}&deg;</strong>
                    </div>
                    <div className="stat">
                      <span>Pressure</span>
                      <strong>{FORECAST.pressure} mb</strong>
                    </div>
                    <div className="stat">
                      <span>{isNight ? "Sunset" : "Sunrise"}</span>
                      <strong>{isNight ? FORECAST.sunset : FORECAST.sunrise}</strong>
                    </div>
                  </div>
                </div>

                <div className="curtain" aria-hidden="true">
                  <div className="curtain-top" />
                  <div className="curtain-side left" />
                  <div className="curtain-side right" />
                </div>
              </section>

              <aside className="control-card">
                <div>
                  <p className="eyebrow">Direct The Scene</p>
                  <h3>Same weather. New production.</h3>
                  <p>
                    The forecast never changes. Only the interpretation does: velvet warmth, sea-born unease,
                    or a full-throated storm overture. Sweep the sliders to rebalance the stage picture.
                  </p>
                </div>

                {controls.map((control) => (
                  <div className="slider-block" key={control.key}>
                    <div className="slider-head">
                      <div>
                        <strong>{control.label}</strong>
                        <span>{control.hint}</span>
                      </div>
                      <div className="slider-value">{control.value}</div>
                    </div>
                    <input
                      aria-label={control.label}
                      type="range"
                      min="0"
                      max="100"
                      value={control.value}
                      onChange={(event) => control.setValue(Number(event.target.value))}
                    />
                  </div>
                ))}

                <div className="slider-block mix-meter">
                  <div className="slider-head">
                    <div>
                      <strong>Cast Balance</strong>
                      <span>{mixLabel}</span>
                    </div>
                  </div>
                  <div className="mix-bar" aria-hidden="true">
                    <i style={{ width: `${mood.cosy * 100}%`, background: "linear-gradient(90deg, #ffdc9d, #dc9c3f)" }} />
                    <i style={{ width: `${mood.eerie * 100}%`, background: "linear-gradient(90deg, #8ec6d2, #2e6475)" }} />
                    <i style={{ width: `${mood.heroic * 100}%`, background: "linear-gradient(90deg, #f5df99, #c15e2c)" }} />
                  </div>
                  <div className="mix-legend">
                    <span><b>Cosy</b> warms the footlights.</span>
                    <span><b>Eerie</b> deepens the fogbank.</span>
                    <span><b>Heroic</b> broadens the beams.</span>
                  </div>
                </div>

                <div className="beats">
                  <div className="beat">
                    <strong>Opening Cue</strong>
                    <span>{scene.beats.opening}</span>
                  </div>
                  <div className="beat">
                    <strong>Final Tableau</strong>
                    <span>{scene.beats.finale}</span>
                  </div>
                </div>

                <div className="buttons">
                  <button type="button" onClick={replayCurtain}>Replay Curtain</button>
                  <button type="button" className="secondary" onClick={resetMix}>Reset Mix</button>
                </div>

                <p className="credit">
                  Hover the stage to lean the parallax backdrop. No API calls, no live data, just one mock forecast staged with different emotional lighting.
                </p>
              </aside>
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
