<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Employee Skills Matrix</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; }

    .btn-primary {
      display: inline-flex; align-items: center; justify-content: center; gap: 0.375rem;
      padding: 0.5rem 1rem; background-color: #4f46e5; color: #fff; border: 1px solid transparent;
      border-radius: 0.5rem; font-size: 0.875rem; font-weight: 500; cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
    }
    .btn-primary:hover { background-color: #4338ca; }
    .btn-primary:active { transform: scale(0.97); }

    .btn-secondary {
      display: inline-flex; align-items: center; justify-content: center; gap: 0.375rem;
      padding: 0.5rem 1rem; background-color: #fff; color: #334155; border: 1px solid #cbd5e1;
      border-radius: 0.5rem; font-size: 0.875rem; font-weight: 500; cursor: pointer;
      transition: background-color 0.2s, border-color 0.2s;
    }
    .btn-secondary:hover { background-color: #f8fafc; border-color: #94a3b8; }

    .btn-ghost {
      display: inline-flex; align-items: center; justify-content: center; gap: 0.375rem;
      padding: 0.5rem 0.75rem; color: #475569; border-radius: 0.5rem;
      font-size: 0.875rem; font-weight: 500; cursor: pointer; transition: background-color 0.2s;
    }
    .btn-ghost:hover { background-color: #f1f5f9; }

    .btn-danger { color: #dc2626; font-size: 0.75rem; transition: color 0.2s; }
    .btn-danger:hover { color: #b91c1c; }

    .form-input {
      width: 100%; padding: 0.5rem 0.75rem; border: 1px solid #cbd5e1; border-radius: 0.5rem;
      font-size: 0.875rem; color: #1e293b; background-color: #fff; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-input:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15); }

    .matrix-scroll { max-height: calc(100vh - 320px); overflow: auto; }
    .matrix-scroll::-webkit-scrollbar { width: 8px; height: 8px; }
    .matrix-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    .matrix-scroll::-webkit-scrollbar-track { background: #f1f5f9; }

    table.matrix { border-collapse: separate; border-spacing: 0; width: 100%; }
    table.matrix th, table.matrix td { vertical-align: middle; }

    .first-col { background-color: #ffffff; }
    tr:hover td.first-col { background-color: #f8fafc; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800">
  <div id="app"></div>

  <script type="text/x-template" id="app-template">
    <div class="min-h-screen flex flex-col">
      <!-- Header -->
      <header class="bg-white border-b border-slate-200 sticky top-0 z-40">
        <div class="max-w-[1600px] mx-auto px-4 sm:px-6 py-4 flex items-center justify-between gap-4">
          <div class="flex items-center gap-3">
            <div class="h-10 w-10 rounded-lg bg-indigo-600 text-white flex items-center justify-center shadow-md">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z" />
              </svg>
            </div>
            <div>
              <h1 class="text-xl font-bold text-slate-900 tracking-tight">Employee Skills Matrix</h1>
              <p class="text-xs text-slate-500">Team capability tracking & coverage</p>
            </div>
          </div>
          <div class="flex items-center gap-2">
            <button @click="exportData" class="btn-secondary">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
              Export
            </button>
            <label class="btn-secondary cursor-pointer">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>
              Import
              <input type="file" accept=".json,application/json" @change="importFile" class="hidden" />
            </label>
            <button @click="resetDemo" class="btn-ghost">Reset</button>
          </div>
        </div>
      </header>

      <!-- Main Content -->
      <main class="flex-1 max-w-[1600px] w-full mx-auto px-4 sm:px-6 py-6">
        <!-- Stats Cards -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
          <div v-for="stat in stats" :key="stat.label" class="bg-white rounded-xl p-5 shadow-sm border border-slate-200 flex items-start justify-between">
            <div>
              <div class="text-xs font-semibold text-slate-500 uppercase tracking-wider">{{ stat.label }}</div>
              <div class="text-2xl font-bold text-slate-900 mt-1">{{ stat.value }}</div>
              <div class="text-xs text-slate-500 mt-1">{{ stat.sub }}</div>
            </div>
            <div class="h-10 w-10 rounded-lg bg-indigo-50 text-indigo-600 flex items-center justify-center">
              <svg v-if="stat.icon === 'team'" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-12 0v1z" /></svg>
              <svg v-if="stat.icon === 'skills'" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" /></svg>
              <svg v-if="stat.icon === 'coverage'" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z" /><path stroke-linecap="round" stroke-linejoin="round" d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z" /></svg>
              <svg v-if="stat.icon === 'average'" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" /></svg>
            </div>
          </div>
        </div>

        <!-- Controls -->
        <div class="flex flex-col md:flex-row gap-3 mb-4 items-center justify-between">
          <div class="flex flex-col sm:flex-row gap-3 w-full md:w-auto">
            <div class="relative w-full sm:w-64">
              <input v-model="searchQuery" type="text" placeholder="Search skills..." class="form-input pl-9" />
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 absolute left-3 top-2.5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
            </div>
            <select v-model="categoryFilter" class="form-input w-full sm:w-48">
              <option value="">All categories</option>
              <option v-for="cat in categories" :key="cat" :value="cat">{{ cat }}</option>
            </select>
          </div>
          <div class="flex gap-2 w-full md:w-auto">
            <button @click="openEmployeeModal" class="btn-primary">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" /></svg>
              Add Employee
            </button>
            <button @click="openSkillModal" class="btn-primary">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" /></svg>
              Add Skill
            </button>
          </div>
        </div>

        <!-- Matrix -->
        <div class="bg-white rounded-xl shadow border border-slate-200 overflow-hidden">
          <div class="matrix-scroll">
            <table class="matrix text-sm">
              <thead class="bg-slate-50">
                <tr>
                  <th class="bg-slate-100 sticky top-0 left-0 z-30 border-b border-r border-slate-200 p-3 text-left w-72 min-w-[18rem]">
                    <div class="font-semibold text-slate-700">Skill / Category</div>
                    <div class="text-xs text-slate-500 font-normal">{{ filteredSkills.length }} rows</div>
                  </th>
                  <th v-for="emp in employees" :key="emp.id" class="bg-slate-50 sticky top-0 z-20 border-b border-r border-slate-200 p-3 min-w-[10rem] text-center group cursor-pointer" @click="openProfile(emp)">
                    <div class="flex flex-col items-center gap-1">
                      <div class="h-9 w-9 rounded-full text-white flex items-center justify-center text-xs font-bold shadow-sm" :style="{backgroundColor: emp.color}">{{ initials(emp.name) }}</div>
                      <div class="font-semibold text-slate-900 leading-tight">{{ emp.name }}</div>
                      <div class="text-xs text-slate-500 leading-tight">{{ emp.role }}</div>
                      <button @click.stop="removeEmployee(emp.id)" class="btn-danger opacity-0 group-hover:opacity-100 transition">Remove</button>
                    </div>
                  </th>
                  <th v-if="!employees.length" class="bg-slate-50 sticky top-0 z-20 border-b border-slate-200 p-3 text-center text-slate-400">
                    No employees yet
                  </th>
                </tr>
              </thead>
              <tbody>
                <tr v-for="skill in filteredSkills" :key="skill.id" class="hover:bg-slate-50 transition-colors">
                  <td class="first-col sticky left-0 z-10 border-b border-r border-slate-200 p-3">
                    <div class="flex items-start justify-between">
                      <div>
                        <div class="font-semibold text-slate-800">{{ skill.name }}</div>
                        <div class="flex items-center gap-2 mt-1.5">
                          <span class="px-2 py-0.5 rounded-full text-xs font-medium bg-slate-100 text-slate-600 border border-slate-200">{{ skill.category }}</span>
                          <span class="text-xs text-slate-400">{{ skillCoverageText(skill.id) }} covered · avg {{ skillAverage(skill.id) }}</span>
                        </div>
                      </div>
                      <button @click="removeSkill(skill.id)" class="text-slate-300 hover:text-red-500 ml-2 text-lg leading-none" title="Remove skill">×</button>
                    </div>
                  </td>
                  <td v-for="emp in employees" :key="emp.id" class="border-b border-r border-slate-200 p-2 text-center">
                    <button @click="cycleLevel(skill.id, emp.id)" class="w-full py-2 rounded-md font-semibold text-xs border transition transform hover:scale-105 focus:outline-none" :class="levelClass(getLevel(skill.id, emp.id))" :title="levelLabel(getLevel(skill.id, emp.id)) + ' — click to cycle'">
                      {{ levelShort(getLevel(skill.id, emp.id)) }}
                    </button>
                  </td>
                  <td v-if="!employees.length" class="border-b border-slate-200 p-3 text-center text-slate-400">—</td>
                </tr>
                <tr v-if="!filteredSkills.length">
                  <td :colspan="employees.length + 1" class="p-8 text-center text-slate-500">
                    No skills match your search.
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
          <div class="px-4 py-3 bg-slate-50 border-t border-slate-200 text-xs text-slate-500 flex flex-col sm:flex-row justify-between gap-2">
            <span>Click any cell to cycle proficiency. Levels: 1 Novice → 2 Beginner → 3 Intermediate → 4 Advanced → 5 Expert.</span>
            <span class="font-medium">{{ stats[2].value }} coverage</span>
          </div>
        </div>

        <!-- Coverage Insights -->
        <section class="mt-8 grid grid-cols-1 lg:grid-cols-2 gap-6">
          <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
            <div class="flex items-center justify-between mb-4">
              <h3 class="font-bold text-slate-900">Top Skill Gaps</h3>
              <span class="text-xs text-slate-500">Lowest coverage first</span>
            </div>
            <div class="space-y-3">
              <div v-for="skill in gapSkills" :key="skill.id" class="flex items-center justify-between">
                <div>
                  <div class="font-medium text-sm text-slate-800">{{ skill.name }}</div>
                  <div class="text-xs text-slate-500">{{ skill.category }}</div>
                </div>
                <div class="text-right">
                  <div class="text-sm font-semibold" :class="skill.coverage === 0 ? 'text-red-600' : 'text-slate-700'">{{ skill.coverage }}/{{ skill.total }} covered</div>
                  <div class="text-xs text-slate-500">Avg {{ skill.avg }}</div>
                </div>
              </div>
              <div v-if="!gapSkills.length" class="text-sm text-slate-500">No skills added yet.</div>
            </div>
          </div>

          <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
            <div class="flex items-center justify-between mb-4">
              <h3 class="font-bold text-slate-900">Category Heatmap</h3>
              <span class="text-xs text-slate-500">Average proficiency by category</span>
            </div>
            <div class="space-y-3">
              <div v-for="cat in categoryAverages" :key="cat.category">
                <div class="flex justify-between text-sm mb-1">
                  <span class="text-slate-700">{{ cat.category }}</span>
                  <span class="font-semibold text-slate-900">{{ cat.avg }}</span>
                </div>
                <div class="h-2 bg-slate-100 rounded-full overflow-hidden">
                  <div class="h-full rounded-full transition-all" :class="cat.avg >= 4 ? 'bg-emerald-500' : cat.avg >= 3 ? 'bg-blue-500' : cat.avg >= 2 ? 'bg-amber-400' : 'bg-red-400'" :style="{width: (cat.avg / 5 * 100) + '%'}"></div>
                </div>
              </div>
              <div v-if="!categoryAverages.length" class="text-sm text-slate-500">No data available.</div>
            </div>
          </div>
        </section>
      </main>

      <!-- Modals -->
      <div v-if="modal" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/50 backdrop-blur-sm p-4" @click.self="closeModal">
        <div class="bg-white rounded-xl shadow-2xl max-w-md w-full p-6 transform transition-all">
          <!-- Add Employee -->
          <div v-if="modal === 'employee'">
            <h2 class="text-lg font-bold text-slate-900 mb-4">Add Employee</h2>
            <label class="block text-sm font-medium text-slate-700 mb-1">Full Name</label>
            <input v-model="forms.employee.name" type="text" class="form-input mb-3" placeholder="e.g. Alice Chen" />
            <label class="block text-sm font-medium text-slate-700 mb-1">Role / Title</label>
            <input v-model="forms.employee.role" type="text" class="form-input mb-3" placeholder="e.g. Senior Frontend Engineer" />
            <label class="block text-sm font-medium text-slate-700 mb-1">Avatar Color</label>
            <div class="flex flex-wrap gap-2 mb-5">
              <button v-for="c in colorPalette" :key="c" @click="forms.employee.color = c" class="w-8 h-8 rounded-full border-2 transition" :class="forms.employee.color === c ? 'border-slate-900 scale-110' : 'border-transparent'" :style="{backgroundColor: c}" :title="c"></button>
            </div>
            <div class="flex justify-end gap-2">
              <button @click="closeModal" class="btn-ghost">Cancel</button>
              <button @click="saveEmployee" class="btn-primary">Add Employee</button>
            </div>
          </div>

          <!-- Add Skill -->
          <div v-if="modal === 'skill'">
            <h2 class="text-lg font-bold text-slate-900 mb-4">Add Skill</h2>
            <label class="block text-sm font-medium text-slate-700 mb-1">Skill Name</label>
            <input v-model="forms.skill.name" type="text" class="form-input mb-3" placeholder="e.g. Machine Learning" />
            <label class="block text-sm font-medium text-slate-700 mb-1">Category</label>
            <select v-model="forms.skill.category" class="form-input mb-3">
              <option v-for="cat in skillCategoryOptions" :key="cat" :value="cat">{{ cat }}</option>
            </select>
            <div v-if="forms.skill.category === 'Other'" class="mb-3">
              <label class="block text-sm font-medium text-slate-700 mb-1">Custom Category</label>
              <input v-model="forms.skill.customCategory" type="text" class="form-input" placeholder="e.g. Security" />
            </div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Description <span class="text-slate-400 font-normal">(optional)</span></label>
            <textarea v-model="forms.skill.description" rows="2" class="form-input mb-5" placeholder="Short description of the skill"></textarea>
            <div class="flex justify-end gap-2">
              <button @click="closeModal" class="btn-ghost">Cancel</button>
              <button @click="saveSkill" class="btn-primary">Add Skill</button>
            </div>
          </div>

          <!-- Employee Profile -->
          <div v-if="modal === 'profile' && profileEmployee">
            <div class="flex items-center gap-4 mb-5">
              <div class="h-14 w-14 rounded-full text-white flex items-center justify-center text-xl font-bold shadow-sm" :style="{backgroundColor: profileEmployee.color}">{{ initials(profileEmployee.name) }}</div>
              <div>
                <h2 class="text-lg font-bold text-slate-900">{{ profileEmployee.name }}</h2>
                <p class="text-sm text-slate-500">{{ profileEmployee.role }}</p>
              </div>
            </div>
            <div class="grid grid-cols-2 gap-4 mb-5">
              <div class="bg-slate-50 rounded-lg p-3">
                <div class="text-xs text-slate-500 uppercase">Average Proficiency</div>
                <div class="text-2xl font-bold text-indigo-600">{{ employeeAverage(profileEmployee.id) }}</div>
              </div>
              <div class="bg-slate-50 rounded-lg p-3">
                <div class="text-xs text-slate-500 uppercase">Skills Rated</div>
                <div class="text-2xl font-bold text-slate-800">{{ skills.filter(s => getLevel(s.id, profileEmployee.id) > 0).length }} / {{ skills.length }}</div>
              </div>
            </div>
            <div class="max-h-72 overflow-y-auto space-y-2 mb-5 pr-1">
              <div v-for="skill in skills" :key="skill.id" class="flex items-center justify-between text-sm py-1 border-b border-slate-100 last:border-0">
                <span class="text-slate-700">{{ skill.name }}</span>
                <span class="px-2 py-0.5 rounded text-xs font-medium border" :class="levelClass(getLevel(skill.id, profileEmployee.id))">{{ levelLabel(getLevel(skill.id, profileEmployee.id)) }}</span>
              </div>
            </div>
            <div class="flex justify-end">
              <button @click="closeModal" class="btn-ghost">Close</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </script>

  <script>
    const { createApp, ref, computed, onMounted, watch } = Vue;

    const colorPalette = [
      '#6366f1', '#0ea5e9', '#10b981', '#f59e0b', '#ec4899', '#8b5cf6', '#ef4444', '#14b8a6'
    ];

    const skillCategoryOptions = [
      'Technical', 'Cloud/DevOps', 'Design', 'Management', 'Soft Skills', 'Analytics', 'Other'
    ];

    const levelDefs = [
      { value: 0, label: 'Not Assessed', short: '—', class: 'bg-slate-50 text-slate-400 border-slate-200' },
      { value: 1, label: 'Novice', short: 'N', class: 'bg-red-50 text-red-700 border-red-200' },
      { value: 2, label: 'Beginner', short: 'B', class: 'bg-orange-50 text-orange-700 border-orange-200' },
      { value: 3, label: 'Intermediate', short: 'I', class: 'bg-amber-50 text-amber-800 border-amber-200' },
      { value: 4, label: 'Advanced', short: 'A', class: 'bg-blue-50 text-blue-700 border-blue-200' },
      { value: 5, label: 'Expert', short: 'E', class: 'bg-emerald-50 text-emerald-700 border-emerald-200' }
    ];

    const defaultEmployees = [
      { id: 'e1', name: 'Alice Chen', role: 'Senior Frontend Engineer', color: '#6366f1' },
      { id: 'e2', name: 'Bob Smith', role: 'Backend Engineer', color: '#0ea5e9' },
      { id: 'e3', name: 'Carol Davis', role: 'Product Designer', color: '#ec4899' },
      { id: 'e4', name: 'David Lee', role: 'DevOps Engineer', color: '#10b981' },
      { id: 'e5', name: 'Eve Morgan', role: 'Engineering Manager', color: '#f59e0b' }
    ];

    const defaultSkills = [
      { id: 's1', name: 'JavaScript', category: 'Technical', description: 'Core language proficiency' },
      { id: 's2', name: 'React', category: 'Technical', description: 'Component-based UI library' },
      { id: 's3', name: 'Node.js', category: 'Technical', description: 'Server-side JS runtime' },
      { id: 's4', name: 'Python', category: 'Technical', description: 'General-purpose programming' },
      { id: 's5', name: 'SQL', category: 'Technical', description: 'Relational database querying' },
      { id: 's6', name: 'AWS', category: 'Cloud/DevOps', description: 'Cloud platform & services' },
      { id: 's7', name: 'Docker', category: 'Cloud/DevOps', description: 'Containerization' },
      { id: 's8', name: 'CI/CD', category: 'Cloud/DevOps', description: 'Automated build & deploy' },
      { id: 's9', name: 'Figma', category: 'Design', description: 'Interface design tool' },
      { id: 's10', name: 'UI/UX Design', category: 'Design', description: 'User experience design' },
      { id: 's11', name: 'Project Management', category: 'Management', description: 'Planning & execution' },
      { id: 's12', name: 'Communication', category: 'Soft Skills', description: 'Verbal & written communication' },
      { id: 's13', name: 'Data Analysis', category: 'Analytics', description: 'Data interpretation & reporting' }
    ];

    const defaultMatrix = {
      s1: { e1: 5, e2: 4, e3: 2, e4: 3, e5: 3 },
      s2: { e1: 5, e2: 3, e3: 1, e4: 2, e5: 2 },
      s3: { e1: 3, e2: 5, e3: 1, e4: 3, e5: 2 },
      s4: { e1: 2, e2: 4, e3: 1, e4: 4, e5: 3 },
      s5: { e1: 2, e2: 5, e3: 1, e4: 3, e5: 2 },
      s6: { e1: 2, e2: 3, e3: 1, e4: 5, e5: 3 },
      s7: { e1: 1, e2: 3, e3: 1, e4: 5, e5: 2 },
      s8: { e1: 1, e2: 3, e3: 0, e4: 4, e5: 3 },
      s9: { e1: 2, e2: 0, e3: 5, e4: 0, e5: 1 },
      s10: { e1: 3, e2: 1, e3: 5, e4: 1, e5: 2 },
      s11: { e1: 2, e2: 2, e3: 3, e4: 2, e5: 5 },
      s12: { e1: 4, e2: 3, e3: 4, e4: 3, e5: 5 },
      s13: { e1: 3, e2: 3, e3: 2, e4: 4, e5: 4 }
    };

    createApp({
      template: '#app-template',
      setup() {
        const employees = ref([]);
        const skills = ref([]);
        const matrix = ref({});
        const searchQuery = ref('');
        const categoryFilter = ref('');
        const modal = ref(null);
        const profileEmployee = ref(null);
        const forms = ref({
          employee: { name: '', role: '', color: colorPalette[0] },
          skill: { name: '', category: 'Technical', description: '', customCategory: '' }
        });

        const categories = computed(() => [...new Set(skills.value.map(s => s.category))].sort());

        const filteredSkills = computed(() => {
          let list = skills.value.slice().sort((a, b) => a.category.localeCompare(b.category) || a.name.localeCompare(b.name));
          if (categoryFilter.value) list = list.filter(s => s.category === categoryFilter.value);
          if (searchQuery.value.trim()) {
            const q = searchQuery.value.toLowerCase();
            list = list.filter(s => s.name.toLowerCase().includes(q) || s.category.toLowerCase().includes(q));
          }
          return list;
        });

        const stats = computed(() => {
          const totalCells = Math.max(employees.value.length * skills.value.length, 1);
          let filled = 0, sum = 0;
          skills.value.forEach(s => {
            employees.value.forEach(e => {
              const lvl = getLevel(s.id, e.id);
              if (lvl > 0) { filled++; sum += lvl; }
            });
          });
          const coverage = (employees.value.length && skills.value.length) ? Math.round((filled / totalCells) * 100) : 0;
          const avg = filled ? (sum / filled).toFixed(1) : '0.0';
          return [
            { label: 'Team Size', value: employees.value.length, sub: 'employees', icon: 'team' },
            { label: 'Skills Tracked', value: skills.value.length, sub: 'skills', icon: 'skills' },
            { label: 'Coverage', value: coverage + '%', sub: `${filled}/${totalCells} rated`, icon: 'coverage' },
            { label: 'Avg Proficiency', value: avg, sub: 'among rated cells', icon: 'average' }
          ];
        });

        const skillSummaries = computed(() => {
          return skills.value.map(s => {
            const ratings = employees.value.map(e => getLevel(s.id, e.id)).filter(l => l > 0);
            return {
              ...s,
              coverage: ratings.length,
              total: employees.value.length,
              avg: ratings.length ? (ratings.reduce((a, b) => a + b, 0) / ratings.length).toFixed(1) : '0.0'
            };
          });
        });

        const gapSkills = computed(() => {
          return [...skillSummaries.value]
            .sort((a, b) => a.coverage - b.coverage || parseFloat(a.avg) - parseFloat(b.avg))
            .slice(0, 5);
        });

        const categoryAverages = computed(() => {
          const groups = {};
          skills.value.forEach(s => {
            groups[s.category] = groups[s.category] || [];
            employees.value.forEach(e => {
              const l = getLevel(s.id, e.id);
              if (l > 0) groups[s.category].push(l);
            });
          });
          return Object.entries(groups)
            .map(([category, arr]) => ({
              category,
              avg: arr.length ? (arr.reduce((a, b) => a + b, 0) / arr.length).toFixed(1) : '0.0',
              count: arr.length
            }))
            .sort((a, b) => parseFloat(b.avg) - parseFloat(a.avg));
        });

        function getLevel(skillId, empId) {
          return matrix.value[skillId]?.[empId] || 0;
        }
        function setLevel(skillId, empId, level) {
          if (!matrix.value[skillId]) matrix.value[skillId] = {};
          matrix.value[skillId][empId] = level;
        }
        function cycleLevel(skillId, empId) {
          const current = getLevel(skillId, empId);
          const next = current === 5 ? 0 : current + 1;
          setLevel(skillId, empId, next);
        }
        function levelDef(v) { return levelDefs[v] || levelDefs[0]; }
        function levelClass(v) { return levelDef(v).class; }
        function levelLabel(v) { return levelDef(v).label; }
        function levelShort(v) { return levelDef(v).short; }

        function initials(name) {
          return name.split(/\s+/).map(n => n[0]).slice(0, 2).join('').toUpperCase();
        }
        function skillCoverageText(skillId) {
          const covered = employees.value.filter(e => getLevel(skillId, e.id) > 0).length;
          return `${covered}/${employees.value.length}`;
        }
        function skillAverage(skillId) {
          const vals = employees.value.map(e => getLevel(skillId, e.id)).filter(l => l > 0);
          return vals.length ? (vals.reduce((a, b) => a + b, 0) / vals.length).toFixed(1) : '0.0';
        }
        function employeeAverage(empId) {
          const vals = skills.value.map(s => getLevel(s.id, empId)).filter(l => l > 0);
          return vals.length ? (vals.reduce((a, b) => a + b, 0) / vals.length).toFixed(1) : '0.0';
        }

        function openEmployeeModal() {
          forms.value.employee = { name: '', role: '', color: colorPalette[employees.value.length % colorPalette.length] };
          modal.value = 'employee';
        }
        function saveEmployee() {
          const f = forms.value.employee;
          if (!f.name.trim() || !f.role.trim()) return;
          const id = 'e' + Date.now().toString(36);
          employees.value.push({ id, name: f.name.trim(), role: f.role.trim(), color: f.color });
          closeModal();
        }
        function removeEmployee(id) {
          if (!confirm('Remove this employee?')) return;
          employees.value = employees.value.filter(e => e.id !== id);
          for (const sid in matrix.value) {
            delete matrix.value[sid][id];
          }
        }

        function openSkillModal() {
          forms.value.skill = { name: '', category: 'Technical', description: '', customCategory: '' };
          modal.value = 'skill';
        }
        function saveSkill() {
          const f = forms.value.skill;
          if (!f.name.trim()) return;
          const category = f.category === 'Other' ? (f.customCategory.trim() || 'Other') : f.category;
          const id = 's' + Date.now().toString(36);
          skills.value.push({ id, name: f.name.trim(), category, description: f.description.trim() });
          closeModal();
        }
        function removeSkill(id) {
          if (!confirm('Remove this skill?')) return;
          skills.value = skills.value.filter(s => s.id !== id);
          delete matrix.value[id];
        }

        function openProfile(emp) {
          profileEmployee.value = emp;
          modal.value = 'profile';
        }
        function closeModal() {
          modal.value = null;
          profileEmployee.value = null;
        }

        function exportData() {
          const data = { employees: employees.value, skills: skills.value, matrix: matrix.value };
          const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'employee-skills-matrix.json';
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
        }
        function importFile(event) {
          const file = event.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = (e) => {
            try {
              const data = JSON.parse(e.target.result);
              if (data && Array.isArray(data.employees) && Array.isArray(data.skills) && data.matrix && typeof data.matrix === 'object') {
                loadData(data);
                alert('Skills matrix imported successfully.');
              } else {
                alert('Invalid file format. Expected employees, skills, and matrix fields.');
              }
            } catch (err) {
              alert('Failed to parse import file.');
            }
            event.target.value = '';
          };
          reader.readAsText(file);
        }
        function resetDemo() {
          if (!confirm('Reset to demo data? This will overwrite your current matrix.')) return;
          loadData(JSON.parse(JSON.stringify({ employees: defaultEmployees, skills: defaultSkills, matrix: defaultMatrix })));
        }
        function loadData(data) {
          employees.value = data.employees || [];
          skills.value = data.skills || [];
          matrix.value = data.matrix || {};
        }

        onMounted(() => {
          const saved = localStorage.getItem('skillsMatrixData');
          if (saved) {
            try {
              const data = JSON.parse(saved);
              if (data && Array.isArray(data.employees)) {
                loadData(data);
                return;
              }
            } catch (e) { /* fall through */ }
          }
          loadData({ employees: defaultEmployees, skills: defaultSkills, matrix: defaultMatrix });
        });

        watch(() => [employees.value, skills.value, matrix.value], () => {
          localStorage.setItem('skillsMatrixData', JSON.stringify({
            employees: employees.value, skills: skills.value, matrix: matrix.value
          }));
        }, { deep: true });

        return {
          employees, skills, matrix, searchQuery, categoryFilter, modal, profileEmployee, forms,
          categories, filteredSkills, stats, gapSkills, categoryAverages,
          getLevel, setLevel, cycleLevel, levelClass, levelLabel, levelShort,
          initials, skillCoverageText, skillAverage, employeeAverage,
          openEmployeeModal, saveEmployee, removeEmployee,
          openSkillModal, saveSkill, removeSkill,
          openProfile, closeModal,
          exportData, importFile, resetDemo,
          skillCategoryOptions, colorPalette
        };
      }
    }).mount('#app');
  </script>
</body>
</html>
