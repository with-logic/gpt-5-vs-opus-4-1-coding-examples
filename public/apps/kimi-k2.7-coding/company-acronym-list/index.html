<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Company Acronym List</title>
  <script src="https://cdn.tailwindcss.com" integrity="sha384-igm5BeiBt36UU4gqwWS7imYmelpTsZlQ45FZf+XBn9MuJbn4nQr7yx1yFydocC/K" crossorigin="anonymous"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: {
              50: '#eff6ff',
              100: '#dbeafe',
              200: '#bfdbfe',
              300: '#93c5fd',
              400: '#60a5fa',
              500: '#3b82f6',
              600: '#2563eb',
              700: '#1d4ed8',
              800: '#1e40af',
              900: '#1e3a8a',
            }
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    :root {
      --transition-fast: 150ms ease;
      --transition-medium: 250ms ease;
    }

    .fade-in {
      animation: fadeInUp 0.35s ease-out both;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card-hover {
      transition: transform var(--transition-fast), box-shadow var(--transition-fast);
    }
    .card-hover:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 24px -8px rgba(0, 0, 0, 0.12);
    }
    .dark .card-hover:hover {
      box-shadow: 0 12px 24px -8px rgba(0, 0, 0, 0.35);
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }
    .dark ::-webkit-scrollbar-thumb {
      background: #475569;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    .chip {
      transition: all var(--transition-fast);
    }
    .chip.active {
      ring-width: 2px;
      ring-offset-width: 2px;
    }

    .quiz-option {
      transition: all var(--transition-fast);
    }
    .quiz-option.correct {
      background-color: #dcfce7;
      border-color: #22c55e;
      color: #166534;
    }
    .dark .quiz-option.correct {
      background-color: rgba(34, 197, 94, 0.15);
      color: #86efac;
      border-color: #22c55e;
    }
    .quiz-option.wrong {
      background-color: #fee2e2;
      border-color: #ef4444;
      color: #991b1b;
    }
    .dark .quiz-option.wrong {
      background-color: rgba(239, 68, 68, 0.15);
      color: #fca5a5;
      border-color: #ef4444;
    }
    .quiz-option:disabled {
      cursor: default;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-900 dark:text-slate-100 min-h-screen flex flex-col transition-colors duration-300">

  <!-- Header -->
  <header class="sticky top-0 z-40 bg-white/80 dark:bg-slate-900/80 backdrop-blur border-b border-slate-200 dark:border-slate-800 transition-colors">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="p-2 rounded-lg bg-primary-600 text-white">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H19a1 1 0 0 1 1 1v18a1 1 0 0 1-1 1H6.5a1 1 0 0 1 0-5H20"/><path d="M8 7h6"/><path d="M8 11h8"/></svg>
        </div>
        <div>
          <h1 class="text-lg sm:text-xl font-bold tracking-tight">Company Acronym List</h1>
          <p class="hidden sm:block text-xs text-slate-500 dark:text-slate-400">Learn the language of your workplace</p>
        </div>
      </div>

      <div class="flex items-center gap-2">
        <button id="quizToggleBtn" class="inline-flex items-center gap-2 px-3 py-1.5 text-sm font-medium rounded-full border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors focus:outline-none focus:ring-2 focus:ring-primary-500 focus:ring-offset-2 dark:focus:ring-offset-slate-900">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12h5"/><path d="M17 12h5"/><path d="M8 12a4 4 0 0 1 8 0"/><path d="M12 16v5"/><path d="M12 2v5"/></svg>
          <span id="quizToggleText">Quiz Mode</span>
        </button>
        <button id="themeToggleBtn" class="p-2 rounded-full text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors focus:outline-none focus:ring-2 focus:ring-primary-500 focus:ring-offset-2 dark:focus:ring-offset-slate-900" aria-label="Toggle dark mode">
          <svg id="sunIcon" class="hidden" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
          <svg id="moonIcon" class="hidden" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
        </button>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main id="main" class="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-6 sm:py-8">
  </main>

  <!-- Toast -->
  <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 pointer-events-none opacity-0 transition-opacity duration-300">
    <div class="px-4 py-2.5 rounded-full bg-slate-900 dark:bg-white text-white dark:text-slate-900 text-sm font-medium shadow-lg flex items-center gap-2">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
      <span id="toastMsg">Copied</span>
    </div>
  </div>

  <script>
    // ============================
    // Data
    // ============================
    const acronyms = [
      { acronym: "API", name: "Application Programming Interface", definition: "A set of rules that lets different software applications communicate with each other.", category: "Technical", tags: ["engineering", "integration"] },
      { acronym: "SLA", name: "Service Level Agreement", definition: "A contract that defines the expected level of service between a provider and a customer.", category: "Process", tags: ["support", "contract"] },
      { acronym: "OKR", name: "Objectives and Key Results", definition: "A goal-setting framework that pairs ambitious objectives with measurable outcomes.", category: "Process", tags: ["goals", "planning"] },
      { acronym: "KPI", name: "Key Performance Indicator", definition: "A measurable value that shows how effectively a company is achieving key business objectives.", category: "Process", tags: ["metrics", "performance"] },
      { acronym: "ROI", name: "Return on Investment", definition: "A metric used to evaluate the efficiency of an investment relative to its cost.", category: "Finance", tags: ["investment", "profit"] },
      { acronym: "PTO", name: "Paid Time Off", definition: "Company leave time during which employees are paid while not working.", category: "HR", tags: ["benefits", "leave"] },
      { acronym: "SaaS", name: "Software as a Service", definition: "A cloud computing model where software is hosted by a vendor and made available over the internet.", category: "Product", tags: ["cloud", "software"] },
      { acronym: "MRR", name: "Monthly Recurring Revenue", definition: "The predictable revenue a business expects to receive every month from subscriptions.", category: "Finance", tags: ["subscriptions", "revenue"] },
      { acronym: "CAC", name: "Customer Acquisition Cost", definition: "The total cost of acquiring a new customer, including marketing and sales expenses.", category: "Finance", tags: ["sales", "marketing"] },
      { acronym: "UX", name: "User Experience", definition: "The overall experience a person has when using a product, especially in terms of ease and pleasure.", category: "Technical", tags: ["design", "product"] },
      { acronym: "QA", name: "Quality Assurance", definition: "Processes and practices designed to ensure products meet defined quality standards.", category: "Technical", tags: ["testing", "engineering"] },
      { acronym: "RFP", name: "Request for Proposal", definition: "A document that solicits bids from vendors for a project or service.", category: "Sales", tags: ["procurement", "vendor"] },
      { acronym: "NDA", name: "Non-Disclosure Agreement", definition: "A legal contract that protects confidential information shared between parties.", category: "Legal", tags: ["confidentiality", "contract"] },
      { acronym: "EOD", name: "End of Day", definition: "A deadline reference meaning the close of the business day.", category: "General", tags: ["deadline", "time"] },
      { acronym: "SME", name: "Subject Matter Expert", definition: "A person with deep knowledge and expertise in a particular topic or area.", category: "General", tags: ["expertise", "consulting"] },
      { acronym: "ETA", name: "Estimated Time of Arrival", definition: "The expected time at which something or someone will arrive or be completed.", category: "General", tags: ["timeline", "delivery"] },
      { acronym: "FAQ", name: "Frequently Asked Questions", definition: "A curated list of common questions and answers about a product, service, or topic.", category: "General", tags: ["support", "documentation"] },
      { acronym: "COO", name: "Chief Operating Officer", definition: "The executive responsible for the day-to-day administration and operations of a company.", category: "Executive", tags: ["leadership", "operations"] },
      { acronym: "CTO", name: "Chief Technology Officer", definition: "The executive responsible for overseeing a company's technology strategy and engineering teams.", category: "Executive", tags: ["leadership", "technology"] },
      { acronym: "B2B", name: "Business to Business", definition: "Commerce transactions between two businesses rather than between a business and a consumer.", category: "Sales", tags: ["commerce", "enterprise"] },
      { acronym: "B2C", name: "Business to Customer", definition: "Commerce transactions that sell products or services directly to consumers.", category: "Sales", tags: ["commerce", "retail"] },
      { acronym: "CRM", name: "Customer Relationship Management", definition: "Software and practices used to manage a company's interactions with current and potential customers.", category: "Product", tags: ["sales", "tool"] },
      { acronym: "ERP", name: "Enterprise Resource Planning", definition: "Integrated software used to manage core business processes such as finance, HR, and supply chain.", category: "Product", tags: ["enterprise", "tool"] },
      { acronym: "VPN", name: "Virtual Private Network", definition: "A secure connection that extends a private network across a public network, protecting privacy.", category: "Technical", tags: ["security", "networking"] },
      { acronym: "SSO", name: "Single Sign-On", definition: "An authentication method that lets users access multiple applications with one set of credentials.", category: "Technical", tags: ["security", "identity"] },
      { acronym: "HRIS", name: "Human Resources Information System", definition: "Software used to manage employee data, payroll, benefits, and other HR processes.", category: "HR", tags: ["tool", "people"] },
      { acronym: "L&D", name: "Learning and Development", definition: "The practice of helping employees develop skills and knowledge through training.", category: "HR", tags: ["training", "growth"] },
      { acronym: "DEI", name: "Diversity, Equity, and Inclusion", definition: "Initiatives and policies that promote representation, fairness, and belonging in the workplace.", category: "HR", tags: ["culture", "inclusion"] },
      { acronym: "BCP", name: "Business Continuity Plan", definition: "A plan that ensures critical business functions can continue during and after a disruption.", category: "Process", tags: ["risk", "disaster"] },
      { acronym: "RACI", name: "Responsible, Accountable, Consulted, Informed", definition: "A matrix that clarifies roles and responsibilities for tasks and deliverables.", category: "Process", tags: ["roles", "project"] },
      { acronym: "SWOT", name: "Strengths, Weaknesses, Opportunities, Threats", definition: "A strategic planning framework used to evaluate internal and external factors.", category: "Process", tags: ["strategy", "planning"] },
      { acronym: "GDPR", name: "General Data Protection Regulation", definition: "A European regulation that governs data protection and privacy for individuals.", category: "Legal", tags: ["privacy", "data"] },
      { acronym: "SOP", name: "Standard Operating Procedure", definition: "A documented set of step-by-step instructions to help workers carry out routine operations.", category: "Process", tags: ["documentation", "workflow"] },
      { acronym: "NPS", name: "Net Promoter Score", definition: "A metric that measures customer loyalty and satisfaction based on a single survey question.", category: "Product", tags: ["feedback", "satisfaction"] }
    ].map(item => ({ ...item, acronym: item.acronym.toUpperCase() }));

    // ============================
    // State
    // ============================
    const state = {
      view: 'list', // 'list' | 'quiz'
      search: '',
      activeCategory: 'All',
      darkMode: false,
      quiz: {
        questions: [],
        current: 0,
        score: 0,
        streak: 0,
        selected: null,
        answered: false,
        missed: [],
      }
    };

    const categoryOrder = ['All', 'Technical', 'Product', 'Process', 'Sales', 'Finance', 'HR', 'Legal', 'Executive', 'General'];
    const categoryPalette = {
      'Technical': 'bg-blue-100 text-blue-700 dark:bg-blue-900/30 dark:text-blue-300 ring-blue-400',
      'Product': 'bg-cyan-100 text-cyan-700 dark:bg-cyan-900/30 dark:text-cyan-300 ring-cyan-400',
      'Process': 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/30 dark:text-emerald-300 ring-emerald-400',
      'Sales': 'bg-purple-100 text-purple-700 dark:bg-purple-900/30 dark:text-purple-300 ring-purple-400',
      'Finance': 'bg-amber-100 text-amber-700 dark:bg-amber-900/30 dark:text-amber-300 ring-amber-400',
      'HR': 'bg-rose-100 text-rose-700 dark:bg-rose-900/30 dark:text-rose-300 ring-rose-400',
      'Legal': 'bg-indigo-100 text-indigo-700 dark:bg-indigo-900/30 dark:text-indigo-300 ring-indigo-400',
      'Executive': 'bg-slate-100 text-slate-700 dark:bg-slate-800 dark:text-slate-300 ring-slate-400',
      'General': 'bg-teal-100 text-teal-700 dark:bg-teal-900/30 dark:text-teal-300 ring-teal-400'
    };

    // ============================
    // Helpers
    // ============================
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function highlightText(text, query) {
      const escaped = escapeHtml(text);
      if (!query) return escaped;
      const safe = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      const re = new RegExp(`(${safe})`, 'gi');
      return escaped.replace(re, '<span class="bg-primary-200 dark:bg-primary-900/50 text-primary-900 dark:text-primary-100 px-0.5 rounded">$1</span>');
    }

    function shuffle(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function getCategories() {
      const counts = {};
      acronyms.forEach(a => counts[a.category] = (counts[a.category] || 0) + 1);
      const orderMap = Object.fromEntries(categoryOrder.map((c, i) => [c, i]));
      return Object.keys(counts).sort((a, b) => (orderMap[a] ?? 99) - (orderMap[b] ?? 99));
    }

    function filteredAcronyms() {
      const q = state.search.trim().toLowerCase();
      return acronyms.filter(a => {
        const matchesSearch = !q ||
          a.acronym.toLowerCase().includes(q) ||
          a.name.toLowerCase().includes(q) ||
          a.definition.toLowerCase().includes(q) ||
          a.tags.some(t => t.toLowerCase().includes(q)) ||
          a.category.toLowerCase().includes(q);
        const matchesCategory = state.activeCategory === 'All' || a.category === state.activeCategory;
        return matchesSearch && matchesCategory;
      });
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      const toastMsg = document.getElementById('toastMsg');
      toastMsg.textContent = message;
      toast.classList.remove('opacity-0');
      setTimeout(() => toast.classList.add('opacity-0'), 2200);
    }

    function copyText(text) {
      if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(() => showToast('Copied to clipboard'));
      } else {
        const input = document.createElement('textarea');
        input.value = text;
        document.body.appendChild(input);
        input.select();
        document.execCommand('copy');
        document.body.removeChild(input);
        showToast('Copied to clipboard');
      }
    }

    // ============================
    // Theme
    // ============================
    function initTheme() {
      const saved = localStorage.getItem('cal-theme');
      if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        state.darkMode = true;
      }
      applyTheme();
    }

    function applyTheme() {
      const html = document.documentElement;
      const sun = document.getElementById('sunIcon');
      const moon = document.getElementById('moonIcon');
      if (!sun || !moon) return;
      if (state.darkMode) {
        html.classList.add('dark');
        sun.classList.remove('hidden');
        moon.classList.add('hidden');
      } else {
        html.classList.remove('dark');
        sun.classList.add('hidden');
        moon.classList.remove('hidden');
      }
      localStorage.setItem('cal-theme', state.darkMode ? 'dark' : 'light');
    }

    function toggleTheme() {
      state.darkMode = !state.darkMode;
      applyTheme();
    }

    // ============================
    // List View
    // ============================
    function renderCategories() {
      const categories = getCategories();
      const counts = {};
      acronyms.forEach(a => counts[a.category] = (counts[a.category] || 0) + 1);

      let html = `
        <button data-category="All" class="chip whitespace-nowrap px-3 py-1.5 rounded-full text-sm font-medium border ${state.activeCategory === 'All' ? 'bg-primary-600 text-white border-primary-600 ring-2 ring-primary-500 ring-offset-2 dark:ring-offset-slate-900' : 'bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 border-slate-200 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-700'}">
          All <span class="ml-1 text-xs opacity-80">${acronyms.length}</span>
        </button>
      `;

      categories.forEach(c => {
        const active = state.activeCategory === c;
        html += `
          <button data-category="${c}" class="chip whitespace-nowrap px-3 py-1.5 rounded-full text-sm font-medium border ${active ? 'ring-2 ring-offset-2 dark:ring-offset-slate-900 ' + categoryPalette[c] : 'bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 border-slate-200 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-700'}">
            ${escapeHtml(c)} <span class="ml-1 text-xs opacity-80">${counts[c]}</span>
          </button>
        `;
      });
      return html;
    }

    function renderCard(item, index, query = '') {
      const h = (text) => highlightText(text, query);
      const palette = categoryPalette[item.category] || 'bg-slate-100 text-slate-700 dark:bg-slate-800 dark:text-slate-300';
      const tags = item.tags.map(t => `<span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400">#${h(t)}</span>`).join('');
      const copyValue = `${item.acronym} — ${item.name}: ${item.definition}`;
      return `
        <article class="fade-in bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 p-5 sm:p-6 card-hover relative group" style="animation-delay: ${Math.min(index * 40, 400)}ms">
          <div class="flex items-start justify-between gap-3 mb-3">
            <div class="flex items-center gap-3">
              <span class="inline-flex items-center justify-center w-12 h-10 rounded-lg bg-primary-600 text-white font-bold text-lg tracking-tight">${h(item.acronym)}</span>
              <div>
                <h3 class="font-semibold text-slate-900 dark:text-slate-100 leading-tight">${h(item.name)}</h3>
                <span class="inline-block mt-1 px-2 py-0.5 rounded-full text-xs font-semibold ${palette}">${escapeHtml(item.category)}</span>
              </div>
            </div>
            <button class="copy-btn p-2 rounded-lg text-slate-400 hover:text-primary-600 hover:bg-primary-50 dark:hover:bg-primary-900/20 dark:hover:text-primary-400 transition-colors" aria-label="Copy acronym" data-copy="${escapeHtml(copyValue)}">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
            </button>
          </div>
          <p class="text-slate-600 dark:text-slate-300 text-sm leading-relaxed mb-4">${h(item.definition)}</p>
          <div class="flex flex-wrap gap-2">${tags}</div>
        </article>
      `;
    }

    function renderListView() {
      const items = filteredAcronyms();
      const query = state.search.trim();
      const categoriesHtml = renderCategories();
      let cardsHtml = items.map((a, i) => renderCard(a, i, query)).join('');
      if (items.length === 0) {
        cardsHtml = `
          <div class="col-span-full flex flex-col items-center justify-center py-16 text-center">
            <div class="p-4 rounded-full bg-slate-100 dark:bg-slate-800 mb-4">
              <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-slate-400"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            </div>
            <h3 class="text-lg font-semibold text-slate-900 dark:text-slate-100">No acronyms found</h3>
            <p class="text-slate-500 dark:text-slate-400 mt-1 max-w-sm">Try adjusting your search or category filter to find what you're looking for.</p>
            <button id="clearFiltersBtn" class="mt-5 px-4 py-2 rounded-lg bg-primary-600 text-white text-sm font-medium hover:bg-primary-700 transition-colors">Clear filters</button>
          </div>
        `;
      }

      document.getElementById('main').innerHTML = `
        <div class="space-y-6 fade-in">
          <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
            <div>
              <h2 class="text-2xl font-bold text-slate-900 dark:text-slate-100">Acronym Directory</h2>
              <p class="text-sm text-slate-500 dark:text-slate-400 mt-0.5">${items.length} result${items.length === 1 ? '' : 's'} available</p>
            </div>
            <div class="relative w-full md:w-80">
              <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-slate-400"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
              </div>
              <input id="searchInput" type="text" value="${escapeHtml(state.search)}" placeholder="Search acronyms, names, or tags..." class="w-full pl-10 pr-10 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all" autocomplete="off">
              <button id="clearSearchBtn" class="absolute inset-y-0 right-0 pr-3 flex items-center ${state.search ? '' : 'hidden'}">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
              </button>
            </div>
          </div>

          <div class="flex items-center gap-2 overflow-x-auto pb-2 -mb-2 scrollbar-thin">
            ${categoriesHtml}
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5">
            ${cardsHtml}
          </div>
        </div>
      `;

      bindListEvents();
      updateQuizToggleButton();
    }

    function bindListEvents() {
      const searchInput = document.getElementById('searchInput');
      searchInput.addEventListener('input', (e) => {
        const start = e.target.selectionStart;
        const end = e.target.selectionEnd;
        state.search = e.target.value;
        renderListView();
        // restore focus and cursor position after re-render
        const next = document.getElementById('searchInput');
        next.focus();
        next.setSelectionRange(start, end);
      });

      const clearSearch = document.getElementById('clearSearchBtn');
      if (clearSearch) {
        clearSearch.addEventListener('click', () => {
          state.search = '';
          renderListView();
          document.getElementById('searchInput').focus();
        });
      }

      document.querySelectorAll('[data-category]').forEach(btn => {
        btn.addEventListener('click', () => {
          state.activeCategory = btn.dataset.category;
          renderListView();
        });
      });

      document.querySelectorAll('.copy-btn').forEach(btn => {
        btn.addEventListener('click', () => copyText(btn.dataset.copy));
      });

      const clearFilters = document.getElementById('clearFiltersBtn');
      if (clearFilters) {
        clearFilters.addEventListener('click', () => {
          state.search = '';
          state.activeCategory = 'All';
          renderListView();
        });
      }
    }

    // ============================
    // Quiz View
    // ============================
    function generateQuiz() {
      const pool = shuffle(acronyms).slice(0, Math.min(10, acronyms.length));
      const questions = pool.map(item => {
        const type = Math.random() > 0.5 ? 'acronym-to-definition' : 'definition-to-acronym';
        const wrongPool = acronyms.filter(a => a.acronym !== item.acronym);
        const wrong = shuffle(wrongPool).slice(0, 3);
        let options;
        if (type === 'acronym-to-definition') {
          options = shuffle([item, ...wrong]).map(a => ({ label: a.definition, value: a.acronym }));
        } else {
          options = shuffle([item, ...wrong]).map(a => ({ label: a.acronym, value: a.acronym }));
        }
        return { type, item, options };
      });

      state.quiz = {
        questions,
        current: 0,
        score: 0,
        streak: 0,
        selected: null,
        answered: false,
        missed: []
      };
    }

    function getQuizQuestion() {
      return state.quiz.questions[state.quiz.current];
    }

    function quizProgress() {
      const { current, questions, score, streak } = state.quiz;
      return `
        <div class="flex items-center justify-between text-sm mb-2">
          <span class="font-medium text-slate-700 dark:text-slate-300">Question ${current + 1} of ${questions.length}</span>
          <div class="flex items-center gap-4">
            <span class="text-slate-500 dark:text-slate-400">Score: <strong class="text-slate-900 dark:text-slate-100">${score}</strong></span>
            <span class="text-slate-500 dark:text-slate-400">Streak: <strong class="text-slate-900 dark:text-slate-100">${streak}</strong></span>
          </div>
        </div>
        <div class="h-2 w-full bg-slate-200 dark:bg-slate-700 rounded-full overflow-hidden mb-6">
          <div class="h-full bg-primary-500 transition-all duration-500" style="width: ${((current + 1) / questions.length) * 100}%"></div>
        </div>
      `;
    }

    function renderQuizView() {
      if (state.quiz.questions.length === 0) {
        generateQuiz();
      }

      const { questions, current } = state.quiz;
      if (current >= questions.length) {
        renderQuizEnd();
        return;
      }

      const q = questions[current];
      const prompt = q.type === 'acronym-to-definition'
        ? `What does <strong class="text-primary-600 dark:text-primary-400">${escapeHtml(q.item.acronym)}</strong> stand for?`
        : `Which acronym matches this definition? <span class="block mt-2 text-slate-600 dark:text-slate-300 font-normal">${escapeHtml(q.item.definition)}</span>`;

      const optionsHtml = q.options.map((opt, idx) => {
        let classes = 'quiz-option w-full text-left px-4 py-3.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 focus:outline-none focus:ring-2 focus:ring-primary-500';
        let badge = '';
        let status = '';
        if (state.quiz.answered) {
          const isCorrect = opt.value === q.item.acronym;
          const isSelected = idx === state.quiz.selected;
          if (isCorrect) {
            classes += ' correct';
            status = ' <span class="ml-2 text-xs font-semibold uppercase tracking-wide">Correct</span>';
          } else if (isSelected) {
            classes += ' wrong';
            status = ' <span class="ml-2 text-xs font-semibold uppercase tracking-wide">Your answer</span>';
          } else {
            classes += ' opacity-60';
          }
        }
        return `
          <button class="${classes}" data-index="${idx}" ${state.quiz.answered ? 'disabled' : ''}>
            <span class="inline-flex items-center">
              <span class="w-6 h-6 rounded-full bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 text-xs font-semibold flex items-center justify-center mr-3 shrink-0">${idx + 1}</span>
              <span class="text-sm sm:text-base">${escapeHtml(opt.label)}${status}</span>
            </span>
          </button>
        `;
      }).join('');

      const feedbackHtml = state.quiz.answered ? `
        <div class="mt-5 p-4 rounded-xl bg-slate-50 dark:bg-slate-800/60 border border-slate-200 dark:border-slate-700 fade-in">
          <p class="text-sm font-medium text-slate-900 dark:text-slate-100">
            ${q.type === 'acronym-to-definition' ? escapeHtml(q.item.acronym) + ' means ' : ''}
            <span class="text-primary-600 dark:text-primary-400">${escapeHtml(q.item.name)}</span>
          </p>
          <p class="text-sm text-slate-600 dark:text-slate-300 mt-1">${escapeHtml(q.item.definition)}</p>
        </div>
      ` : '';

      document.getElementById('main').innerHTML = `
        <div class="max-w-2xl mx-auto fade-in">
          <div class="mb-6">
            <button id="exitQuizBtn" class="inline-flex items-center gap-1.5 text-sm text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-slate-100 transition-colors">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
              Back to directory
            </button>
          </div>

          <div class="bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 p-6 sm:p-8 shadow-sm">
            ${quizProgress()}
            <h2 class="text-xl font-semibold text-slate-900 dark:text-slate-100 mb-6">${prompt}</h2>
            <div class="space-y-3" id="optionsContainer">
              ${optionsHtml}
            </div>
            ${feedbackHtml}
            <div class="mt-6 flex justify-end">
              <button id="nextQuestionBtn" class="px-5 py-2.5 rounded-lg bg-primary-600 text-white text-sm font-medium hover:bg-primary-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed" ${state.quiz.answered ? '' : 'disabled'}>
                ${current === questions.length - 1 ? 'Finish quiz' : 'Next question'}
              </button>
            </div>
          </div>

          <p class="text-center text-xs text-slate-400 dark:text-slate-500 mt-6">Tip: Press 1–4 on your keyboard to select an answer, then Enter to continue.</p>
        </div>
      `;

      bindQuizEvents();
      updateQuizToggleButton();
    }

    function bindQuizEvents() {
      document.getElementById('exitQuizBtn').addEventListener('click', () => {
        state.view = 'list';
        renderListView();
      });

      document.querySelectorAll('#optionsContainer button').forEach(btn => {
        btn.addEventListener('click', () => handleQuizAnswer(parseInt(btn.dataset.index, 10)));
      });

      const nextBtn = document.getElementById('nextQuestionBtn');
      if (nextBtn) {
        nextBtn.addEventListener('click', nextQuestion);
      }
    }

    function handleQuizAnswer(index) {
      if (state.quiz.answered) return;
      const q = getQuizQuestion();
      const correct = q.options[index].value === q.item.acronym;
      state.quiz.selected = index;
      state.quiz.answered = true;
      if (correct) {
        state.quiz.score += 1;
        state.quiz.streak += 1;
      } else {
        state.quiz.streak = 0;
        state.quiz.missed.push(q);
      }
      renderQuizView();
    }

    function nextQuestion() {
      state.quiz.current += 1;
      renderQuizView();
    }

    function renderQuizEnd() {
      const { score, questions, missed } = state.quiz;
      const percentage = Math.round((score / questions.length) * 100);
      const previousHigh = parseInt(localStorage.getItem('cal-high-score') || '0', 10);
      const highScore = Math.max(previousHigh, score);
      localStorage.setItem('cal-high-score', highScore);
      const isNewRecord = score > previousHigh && score > 0;
      const newRecordHtml = isNewRecord ? ` <span class="inline-flex items-center text-xs font-semibold text-emerald-600 dark:text-emerald-400"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-1"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>New record!</span>` : '';
      let message = '';
      if (percentage >= 90) message = 'Outstanding! You know the company language inside and out.';
      else if (percentage >= 70) message = 'Great job! A few more reps and you\'ll be fluent.';
      else if (percentage >= 50) message = 'Not bad — keep studying the directory.';
      else message = 'Keep practicing! The directory is here whenever you need it.';

      const missedHtml = missed.length > 0 ? `
        <div class="mt-6 text-left">
          <h3 class="text-sm font-semibold text-slate-900 dark:text-slate-100 uppercase tracking-wide mb-3">Review missed questions</h3>
          <div class="space-y-3">
            ${missed.map(q => `
              <div class="p-4 rounded-xl bg-slate-50 dark:bg-slate-800/60 border border-slate-200 dark:border-slate-700">
                <p class="font-medium text-slate-900 dark:text-slate-100">${escapeHtml(q.item.acronym)} <span class="text-slate-500 dark:text-slate-400 font-normal">— ${escapeHtml(q.item.name)}</span></p>
                <p class="text-sm text-slate-600 dark:text-slate-300 mt-1">${escapeHtml(q.item.definition)}</p>
              </div>
            `).join('')}
          </div>
        </div>
      ` : '';

      document.getElementById('main').innerHTML = `
        <div class="max-w-2xl mx-auto fade-in">
          <div class="bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 p-8 sm:p-10 text-center shadow-sm">
            <div class="mx-auto w-20 h-20 rounded-full bg-primary-100 dark:bg-primary-900/30 flex items-center justify-center text-primary-600 dark:text-primary-400 mb-5">
              <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
            </div>
            <h2 class="text-2xl font-bold text-slate-900 dark:text-slate-100">Quiz Complete</h2>
            <p class="text-slate-500 dark:text-slate-400 mt-1">You scored <strong class="text-slate-900 dark:text-slate-100">${score}</strong> points out of a possible <strong class="text-slate-900 dark:text-slate-100">${questions.length}</strong> <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-semibold bg-primary-100 dark:bg-primary-900/30 text-primary-700 dark:text-primary-300">High score: ${highScore}/${questions.length}</span>${newRecordHtml}</p>
            <div class="mt-6">
              <div class="h-4 w-full bg-slate-200 dark:bg-slate-700 rounded-full overflow-hidden">
                <div class="h-full bg-primary-500 transition-all duration-1000" style="width: ${percentage}%"></div>
              </div>
              <p class="mt-2 text-sm font-semibold text-slate-700 dark:text-slate-300">${percentage}% accuracy</p>
            </div>
            <p class="mt-5 text-sm text-slate-600 dark:text-slate-300">${message}</p>
            ${missedHtml}
            <div class="mt-8 flex flex-col sm:flex-row items-center justify-center gap-3">
              <button id="restartQuizBtn" class="w-full sm:w-auto px-5 py-2.5 rounded-lg bg-primary-600 text-white text-sm font-medium hover:bg-primary-700 transition-colors">Try again</button>
              <button id="backToListBtn" class="w-full sm:w-auto px-5 py-2.5 rounded-lg border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-300 text-sm font-medium hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">Back to directory</button>
            </div>
          </div>
        </div>
      `;

      document.getElementById('restartQuizBtn').addEventListener('click', () => {
        generateQuiz();
        renderQuizView();
      });
      document.getElementById('backToListBtn').addEventListener('click', () => {
        state.view = 'list';
        renderListView();
      });
      updateQuizToggleButton();
    }

    // ============================
    // Global handlers
    // ============================
    function toggleQuiz() {
      if (state.view === 'list') {
        state.view = 'quiz';
        generateQuiz();
        renderQuizView();
      } else {
        state.view = 'list';
        renderListView();
      }
      updateQuizToggleButton();
    }

    function updateQuizToggleButton() {
      const text = document.getElementById('quizToggleText');
      if (text) text.textContent = state.view === 'quiz' ? 'Exit Quiz' : 'Quiz Mode';
    }

    function setupKeyboard() {
      document.addEventListener('keydown', (e) => {
        if (e.key === '/' && state.view === 'list') {
          e.preventDefault();
          const input = document.getElementById('searchInput');
          if (input) input.focus();
        }

        if (state.view === 'quiz' && !state.quiz.answered) {
          if (['1','2','3','4'].includes(e.key)) {
            const idx = parseInt(e.key, 10) - 1;
            if (idx < getQuizQuestion().options.length) handleQuizAnswer(idx);
          }
        }

        if (state.view === 'quiz' && state.quiz.answered && e.key === 'Enter') {
          nextQuestion();
        }
      });
    }

    // ============================
    // Init
    // ============================
    function init() {
      initTheme();
      renderListView();
      updateQuizToggleButton();
      document.getElementById('quizToggleBtn').addEventListener('click', toggleQuiz);
      document.getElementById('themeToggleBtn').addEventListener('click', toggleTheme);
      setupKeyboard();
    }

    init();
  </script>
</body>
</html>
