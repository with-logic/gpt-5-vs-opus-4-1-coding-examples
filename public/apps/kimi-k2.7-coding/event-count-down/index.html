<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Event Countdown</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root { --mouse-x: 0; --mouse-y: 0; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      background: #000;
      color: #fff;
      overflow-x: hidden;
      overflow-y: auto;
    }
    #bg {
      position: fixed;
      inset: -5%;
      z-index: 0;
      background: linear-gradient(135deg, #0f172a 0%, #312e81 40%, #4c1d95 100%);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      transform: translate(calc(var(--mouse-x) * -40px), calc(var(--mouse-y) * -40px)) scale(1.1);
      transition: background-image 0.6s ease;
      will-change: transform;
    }
    #bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, rgba(0,0,0,0.25) 0%, rgba(0,0,0,0.7) 100%);
      pointer-events: none;
    }
    #particles {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }
    .glass {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: 0 30px 60px -15px rgba(0,0,0,0.55);
    }
    .glass-input {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.22);
      color: #fff;
      transition: all 0.2s ease;
    }
    .glass-input:focus {
      outline: none;
      border-color: rgba(165, 180, 252, 0.8);
      box-shadow: 0 0 0 3px rgba(165, 180, 252, 0.25);
      background: rgba(255, 255, 255, 0.14);
    }
    .glass-input::placeholder { color: rgba(255, 255, 255, 0.45); }
    .glass-input::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.7; }
    .digit-card {
      background: linear-gradient(145deg, rgba(255,255,255,0.14), rgba(255,255,255,0.04));
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 1.25rem;
      position: relative;
      overflow: hidden;
      box-shadow: 0 20px 40px -12px rgba(0,0,0,0.4);
    }
    .digit-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.18) 0%, transparent 55%);
      pointer-events: none;
    }
    .number-change { animation: pop 0.55s cubic-bezier(0.175, 0.885, 0.32, 1.275) both; }
    @keyframes pop {
      0% { transform: scale(1.12); opacity: 0.55; text-shadow: 0 0 20px rgba(255,255,255,0.8); }
      100% { transform: scale(1); opacity: 1; text-shadow: none; }
    }
    .gradient-text {
      background: linear-gradient(135deg, #ffffff 0%, #c7d2fe 60%, #a5b4fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .panel-stack {
      display: grid;
      place-items: center;
      width: 100%;
    }
    .panel-stack > .app-panel {
      grid-area: 1 / 1;
      width: 100%;
      opacity: 0;
      transform: translateY(24px) scale(0.98);
      transition: opacity 0.7s cubic-bezier(0.4, 0, 0.2, 1), transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: none;
    }
    .panel-stack > .app-panel.active {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0) scale(1);
    }
    .hidden { display: none !important; }
    .btn-primary {
      background: linear-gradient(90deg, #6366f1, #9333ea);
      box-shadow: 0 15px 35px -8px rgba(99, 102, 241, 0.45);
      transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
    }
    .btn-primary:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 20px 45px -8px rgba(147, 51, 234, 0.55);
      filter: brightness(1.1);
    }
    .btn-primary:active { transform: scale(0.98); }
    .calendar-btn {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
      transition: background 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
    }
    .calendar-btn:hover {
      background: rgba(255,255,255,0.22);
      transform: translateY(-2px);
      box-shadow: 0 10px 30px -8px rgba(255,255,255,0.15);
    }
    .calendar-btn:active { transform: scale(0.97); }
    .uploader-zone {
      background: rgba(255,255,255,0.08);
      border: 2px dashed rgba(255,255,255,0.25);
      transition: all 0.2s ease;
    }
    .uploader-zone:hover, .uploader-zone.dragover {
      background: rgba(255,255,255,0.14);
      border-color: rgba(165,180,252,0.8);
    }
    .ring-pulse {
      position: absolute;
      inset: -1.5rem;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.2);
      animation: ripple 3s ease-out infinite;
      pointer-events: none;
    }
    .ring-pulse:nth-child(2) { animation-delay: 1s; }
    @keyframes ripple {
      0% { transform: scale(0.85); opacity: 0.5; }
      100% { transform: scale(1.5); opacity: 0; }
    }
    .expired-glow {
      animation: glow 1.5s ease-in-out infinite alternate;
    }
    @keyframes glow {
      from { text-shadow: 0 0 10px rgba(255,255,255,0.3); }
      to { text-shadow: 0 0 30px rgba(167,139,250,0.8), 0 0 60px rgba(99,102,241,0.5); }
    }
    @media (max-width: 640px) {
      .digit-card { padding: 1rem; }
    }
  </style>
</head>
<body class="antialiased selection:bg-indigo-500 selection:text-white">
  <div id="bg" aria-hidden="true"></div>
  <canvas id="particles" aria-hidden="true"></canvas>

  <main class="relative z-10 flex items-center justify-center min-h-screen p-4 sm:p-6">
    <div class="w-full max-w-5xl panel-stack">
      <!-- Setup Form -->
      <div id="setupPanel" class="app-panel active glass rounded-3xl p-6 sm:p-10 md:p-12 max-w-2xl mx-auto">
        <div class="mb-8">
          <h1 class="text-4xl sm:text-5xl md:text-6xl font-black gradient-text tracking-tight leading-tight">Event Countdown</h1>
          <p class="text-white/70 text-base sm:text-lg mt-2">Create a stunning live countdown for your next big moment.</p>
        </div>

        <form id="eventForm" class="space-y-5">
          <div>
            <label for="eventName" class="block text-xs font-bold uppercase tracking-widest text-white/60 mb-2">Event Name</label>
            <input id="eventName" type="text" placeholder="e.g. Product Launch" class="glass-input w-full rounded-xl px-5 py-3.5 text-lg" required />
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <div>
              <label for="eventDate" class="block text-xs font-bold uppercase tracking-widest text-white/60 mb-2">Date &amp; Time</label>
              <input id="eventDate" type="datetime-local" class="glass-input w-full rounded-xl px-5 py-3.5 text-lg" required />
            </div>
            <div>
              <label for="eventLocation" class="block text-xs font-bold uppercase tracking-widest text-white/60 mb-2">Location</label>
              <input id="eventLocation" type="text" placeholder="e.g. New York, NY" class="glass-input w-full rounded-xl px-5 py-3.5 text-lg" />
            </div>
          </div>

          <div>
            <label for="eventImage" class="block text-xs font-bold uppercase tracking-widest text-white/60 mb-2">Background Image</label>
            <div class="relative uploader-zone rounded-xl overflow-hidden">
              <input id="eventImage" type="file" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-20" />
              <div class="px-5 py-4 text-center text-white/70 pointer-events-none">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mx-auto mb-1 opacity-80" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
                <span id="imageLabel" class="text-sm font-medium">Click or drag an image here</span>
              </div>
            </div>
          </div>

          <button type="submit" class="btn-primary w-full text-white font-bold py-4 rounded-xl text-lg mt-2">
            Start Countdown
          </button>
        </form>
      </div>

      <!-- Countdown Display -->
      <div id="countdownPanel" class="app-panel flex flex-col items-center text-center">
        <div class="relative inline-block mb-8 sm:mb-10">
          <div class="ring-pulse"></div>
          <div class="ring-pulse"></div>
          <h2 id="displayName" class="relative text-4xl sm:text-5xl md:text-7xl font-black gradient-text drop-shadow-2xl leading-tight"></h2>
          <p id="displayLocation" class="relative text-lg sm:text-xl md:text-2xl text-white/80 font-medium mt-3 flex items-center justify-center gap-2"></p>
          <p id="displayDate" class="relative text-sm sm:text-base text-white/50 font-medium mt-1"></p>
        </div>

        <div id="countdownGrid" class="grid grid-cols-2 md:grid-cols-4 gap-3 sm:gap-5 md:gap-8 w-full max-w-4xl mb-10">
          <div class="digit-card p-4 sm:p-6 md:p-8">
            <div id="days" class="text-5xl sm:text-6xl md:text-8xl font-black tabular-nums gradient-text leading-none">00</div>
            <div class="text-xs sm:text-sm uppercase tracking-widest text-white/60 mt-2 sm:mt-3">Days</div>
          </div>
          <div class="digit-card p-4 sm:p-6 md:p-8">
            <div id="hours" class="text-5xl sm:text-6xl md:text-8xl font-black tabular-nums gradient-text leading-none">00</div>
            <div class="text-xs sm:text-sm uppercase tracking-widest text-white/60 mt-2 sm:mt-3">Hours</div>
          </div>
          <div class="digit-card p-4 sm:p-6 md:p-8">
            <div id="minutes" class="text-5xl sm:text-6xl md:text-8xl font-black tabular-nums gradient-text leading-none">00</div>
            <div class="text-xs sm:text-sm uppercase tracking-widest text-white/60 mt-2 sm:mt-3">Minutes</div>
          </div>
          <div class="digit-card p-4 sm:p-6 md:p-8">
            <div id="seconds" class="text-5xl sm:text-6xl md:text-8xl font-black tabular-nums gradient-text leading-none">00</div>
            <div class="text-xs sm:text-sm uppercase tracking-widest text-white/60 mt-2 sm:mt-3">Seconds</div>
          </div>
        </div>

        <div id="expiredMessage" class="hidden text-4xl sm:text-6xl font-black gradient-text expired-glow mb-8">It's time!</div>

        <div class="flex flex-col sm:flex-row gap-3 sm:gap-4 items-center">
          <button id="saveCalendar" class="calendar-btn flex items-center gap-2 font-semibold py-3 px-8 rounded-full">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
            </svg>
            Save to Calendar
          </button>
          <button id="editEvent" class="text-white/70 hover:text-white font-medium py-3 px-6 rounded-full transition hover:bg-white/10">
            Edit Event
          </button>
        </div>
      </div>
    </div>
  </main>

  <script>
    (function () {
      const $ = (id) => document.getElementById(id);
      const setupPanel = $('setupPanel');
      const countdownPanel = $('countdownPanel');
      const expiredMessage = $('expiredMessage');
      const countdownGrid = $('countdownGrid');
      const eventForm = $('eventForm');
      const bg = $('bg');
      const imageLabel = $('imageLabel');
      const dateInput = $('eventDate');
      const root = document.documentElement;
      const canvas = $('particles');
      const ctx = canvas.getContext('2d');

      let targetDate = null;
      let eventData = {};
      let bgUrl = '';
      let timerId = null;
      let isExpired = false;
      const prev = { d: '00', h: '00', m: '00', s: '00' };

      // Ensure date input can't pick past dates
      const now = new Date();
      now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
      dateInput.min = now.toISOString().slice(0, 16);

      // ---------- Utilities ----------
      function pad(n) { return String(n).padStart(2, '0'); }
      function formatHumanDate(d) {
        return d.toLocaleString(undefined, {
          weekday: 'long', year: 'numeric', month: 'long', day: 'numeric',
          hour: 'numeric', minute: '2-digit'
        });
      }

      // ---------- Parallax ----------
      let mouseX = 0, mouseY = 0, currentX = 0, currentY = 0;
      document.addEventListener('mousemove', (e) => {
        mouseX = (e.clientX / window.innerWidth) - 0.5;
        mouseY = (e.clientY / window.innerHeight) - 0.5;
      });
      function animateParallax() {
        currentX += (mouseX - currentX) * 0.05;
        currentY += (mouseY - currentY) * 0.05;
        root.style.setProperty('--mouse-x', currentX.toFixed(4));
        root.style.setProperty('--mouse-y', currentY.toFixed(4));
        requestAnimationFrame(animateParallax);
      }
      animateParallax();

      // ---------- Particles ----------
      let particles = [];
      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();
      for (let i = 0; i < 90; i++) {
        particles.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          r: Math.random() * 1.8 + 0.4,
          vx: (Math.random() - 0.5) * 0.4,
          vy: (Math.random() - 0.5) * 0.4,
          o: Math.random() * 0.25 + 0.08
        });
      }
      function drawParticles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => {
          p.x += p.vx + currentX * 0.4;
          p.y += p.vy + currentY * 0.4;
          if (p.x < 0) p.x += canvas.width;
          if (p.x > canvas.width) p.x -= canvas.width;
          if (p.y < 0) p.y += canvas.height;
          if (p.y > canvas.height) p.y -= canvas.height;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255, 255, 255, ${p.o})`;
          ctx.fill();
        });
        requestAnimationFrame(drawParticles);
      }
      drawParticles();

      // ---------- Image Upload ----------
      const imageInput = $('eventImage');
      const uploaderZone = document.querySelector('.uploader-zone');
      imageInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (bgUrl) URL.revokeObjectURL(bgUrl);
        bgUrl = URL.createObjectURL(file);
        bg.style.backgroundImage = `url(${bgUrl})`;
        imageLabel.textContent = file.name;
      });
      ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(evt => {
        uploaderZone.addEventListener(evt, (e) => { e.preventDefault(); e.stopPropagation(); }, false);
      });
      ['dragenter', 'dragover'].forEach(evt => {
        uploaderZone.addEventListener(evt, () => uploaderZone.classList.add('dragover'), false);
      });
      ['dragleave', 'drop'].forEach(evt => {
        uploaderZone.addEventListener(evt, () => uploaderZone.classList.remove('dragover'), false);
      });

      // ---------- Form Submit ----------
      eventForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const rawDate = dateInput.value;
        if (!rawDate) return;

        const [datePart, timePart] = rawDate.split('T');
        const [y, mo, da] = datePart.split('-').map(Number);
        const [hh, mm] = timePart.split(':').map(Number);
        targetDate = new Date(y, mo - 1, da, hh, mm);

        eventData = {
          name: $('eventName').value.trim(),
          dateRaw: rawDate,
          dateObj: targetDate,
          location: $('eventLocation').value.trim()
        };

        $('displayName').textContent = eventData.name;
        $('displayDate').textContent = formatHumanDate(targetDate);
        const locEl = $('displayLocation');
        if (eventData.location) {
          locEl.innerHTML = `
            <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a2 2 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
            </svg>
            <span>${eventData.location}</span>`;
        } else {
          locEl.textContent = '';
        }

        // Reset state
        isExpired = false;
        expiredMessage.classList.add('hidden');
        countdownGrid.classList.remove('hidden');
        prev.d = prev.h = prev.m = prev.s = '00';

        setupPanel.classList.remove('active');
        countdownPanel.classList.add('active');

        updateCountdown();
      });

      // ---------- Edit Button ----------
      $('editEvent').addEventListener('click', () => {
        countdownPanel.classList.remove('active');
        setupPanel.classList.add('active');
      });

      // ---------- Countdown ----------
      function updateCountdown() {
        if (!targetDate) return;
        const diff = targetDate.getTime() - Date.now();
        let totalSeconds = Math.floor(diff / 1000);

        if (totalSeconds <= 0) {
          totalSeconds = 0;
          if (!isExpired) {
            isExpired = true;
            countdownGrid.classList.add('hidden');
            expiredMessage.classList.remove('hidden');
          }
        }

        const d = Math.floor(totalSeconds / 86400); totalSeconds %= 86400;
        const h = Math.floor(totalSeconds / 3600); totalSeconds %= 3600;
        const m = Math.floor(totalSeconds / 60);
        const s = totalSeconds % 60;

        const ds = pad(d), hs = pad(h), ms = pad(m), ss = pad(s);
        setDigit('days', ds, prev.d);
        setDigit('hours', hs, prev.h);
        setDigit('minutes', ms, prev.m);
        setDigit('seconds', ss, prev.s);
        prev.d = ds; prev.h = hs; prev.m = ms; prev.s = ss;
      }

      function setDigit(id, value, oldValue) {
        const el = $(id);
        el.textContent = value;
        if (value === oldValue) return;
        el.classList.remove('number-change');
        void el.offsetWidth;
        el.classList.add('number-change');
      }

      timerId = setInterval(updateCountdown, 1000);
      updateCountdown();

      // ---------- Save to Calendar (ICS) ----------
      $('saveCalendar').addEventListener('click', () => {
        if (!targetDate) return;
        const start = formatICSDate(eventData.dateObj);
        const end = formatICSDate(new Date(eventData.dateObj.getTime() + 60 * 60 * 1000));
        const summary = escapeICS(eventData.name);
        const location = escapeICS(eventData.location || '');
        const description = escapeICS('Countdown event: ' + eventData.name);
        const ics = [
          'BEGIN:VCALENDAR',
          'VERSION:2.0',
          'PRODID:-//Event Countdown//EN',
          'CALSCALE:GREGORIAN',
          'METHOD:PUBLISH',
          'BEGIN:VEVENT',
          'UID:' + Date.now() + '@eventcountdown.local',
          'DTSTAMP:' + new Date().toISOString().replace(/[-:]/g, '').split('.')[0] + 'Z',
          'DTSTART:' + start,
          'DTEND:' + end,
          'SUMMARY:' + summary,
          'LOCATION:' + location,
          'DESCRIPTION:' + description,
          'END:VEVENT',
          'END:VCALENDAR'
        ].join('\r\n');
        const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = (eventData.name.replace(/\s+/g, '_').toLowerCase() || 'event') + '.ics';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 1200);
      });

      function formatICSDate(d) {
        return '' + d.getFullYear() + pad(d.getMonth() + 1) + pad(d.getDate()) + 'T' + pad(d.getHours()) + pad(d.getMinutes()) + pad(d.getSeconds());
      }
      function escapeICS(str) {
        return str.replace(/[\\,;]/g, '\\$&').replace(/\n/g, '\\n');
      }
    })();
  </script>
</body>
</html>
