<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>US Citizenship Trivia Quiz</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }

    .btn-choice {
      display: flex;
      align-items: center;
      width: 100%;
      text-align: left;
      padding: 1rem 1.25rem;
      border-radius: 1rem;
      border: 2px solid #e2e8f0;
      background: #f8fafc;
      transition: all 0.2s ease;
    }
    .btn-choice:hover:not(:disabled) {
      border-color: #3b82f6;
      background: #eff6ff;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.15);
    }
    .btn-choice:focus-visible {
      outline: 3px solid #93c5fd;
      outline-offset: 2px;
    }
    .btn-choice:disabled {
      opacity: 1;
      cursor: default;
    }
    .btn-choice .letter {
      transition: all 0.2s ease;
    }
    .btn-choice.correct {
      border-color: #22c55e;
      background: #f0fdf4;
    }
    .btn-choice.correct .letter {
      background: #22c55e;
      color: #ffffff;
    }
    .btn-choice.wrong {
      border-color: #ef4444;
      background: #fef2f2;
    }
    .btn-choice.wrong .letter {
      background: #ef4444;
      color: #ffffff;
    }

    .feedback-icon {
      animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    }
    @keyframes pop {
      0% { transform: scale(0); opacity: 0; }
      60% { transform: scale(1.2); opacity: 1; }
      100% { transform: scale(1); }
    }

    .fade-in { animation: fadeIn 0.5s ease-out both; }
    .slide-up { animation: slideUp 0.5s ease-out both; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .progress-bar {
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-blue-900 to-indigo-800 min-h-screen text-slate-800 flex items-center justify-center p-4">

  <div id="app" class="w-full max-w-3xl">
    <!-- Header -->
    <header class="mb-6 text-center">
      <h1 class="text-3xl md:text-4xl font-extrabold text-white tracking-tight drop-shadow mb-3">
        🇺🇸 US Citizenship Trivia
      </h1>
      <div class="h-3 bg-white/20 rounded-full overflow-hidden backdrop-blur-sm max-w-md mx-auto shadow-lg">
        <div id="progress" class="progress-bar h-full bg-gradient-to-r from-emerald-400 to-green-500 w-0"></div>
      </div>
      <p id="progress-text" class="text-white/80 mt-2 text-sm font-semibold">
        Question 1 of 10
      </p>
    </header>

    <!-- Main Card -->
    <main id="card" class="bg-white rounded-3xl shadow-2xl p-6 md:p-10 fade-in relative overflow-hidden">
      <!-- dynamic content -->
    </main>

    <!-- Screen reader / live region -->
    <div id="live" aria-live="polite" class="sr-only"></div>
  </div>

  <script>
    const questions = [
      {
        text: "What is the capital of the United States?",
        choices: ["New York City", "Washington, D.C.", "Los Angeles", "Chicago"],
        correct: 1
      },
      {
        text: "How many stars are on the flag of the United States?",
        choices: ["48", "49", "50", "52"],
        correct: 2
      },
      {
        text: "Who is the head of the executive branch of the U.S. government?",
        choices: ["The Chief Justice", "The Speaker of the House", "The President", "The Vice President"],
        correct: 2
      },
      {
        text: "What are the first three words of the U.S. Constitution?",
        choices: ["We the People", "Four score and", "In Congress, July", "Life, Liberty, and"],
        correct: 0
      },
      {
        text: "How many amendments does the U.S. Constitution have?",
        choices: ["10", "25", "27", "30"],
        correct: 2
      },
      {
        text: "Who wrote the Declaration of Independence?",
        choices: ["George Washington", "John Adams", "Benjamin Franklin", "Thomas Jefferson"],
        correct: 3
      },
      {
        text: "What is the national anthem of the United States?",
        choices: ["America the Beautiful", "The Star-Spangled Banner", "God Bless America", "My Country, 'Tis of Thee"],
        correct: 1
      },
      {
        text: "What do we call the first ten amendments to the Constitution?",
        choices: ["The Federalist Papers", "The Bill of Rights", "The Preamble", "The Articles of Confederation"],
        correct: 1
      },
      {
        text: "How many U.S. Senators are there in Congress?",
        choices: ["50", "100", "435", "200"],
        correct: 1
      },
      {
        text: "What is the supreme law of the land in the United States?",
        choices: ["The Declaration of Independence", "The Constitution", "The Bill of Rights", "The Federal Code"],
        correct: 1
      }
    ];

    const card = document.getElementById('card');
    const progress = document.getElementById('progress');
    const progressText = document.getElementById('progress-text');
    const live = document.getElementById('live');

    let quiz = [];
    let current = 0;
    let score = 0;
    let answered = false;

    const checkIcon = `<svg class="w-8 h-8" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg>`;
    const xIcon = `<svg class="w-8 h-8" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>`;

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function init() {
      removeConfetti();
      quiz = shuffle([...questions]);
      current = 0;
      score = 0;
      answered = false;
      renderQuestion();
    }

    function renderQuestion() {
      const q = quiz[current];
      const answeredCount = current + (answered ? 1 : 0);
      progressText.textContent = `Question ${current + 1} of ${quiz.length}`;
      progress.style.width = `${(answeredCount / quiz.length) * 100}%`;

      card.innerHTML = `
        <div class="flex items-center justify-between mb-6">
          <span class="inline-flex items-center justify-center rounded-full bg-blue-100 text-blue-800 font-bold px-4 py-1.5 text-sm">
            Q${current + 1}
          </span>
          <span class="text-sm md:text-base text-slate-500 font-semibold">
            Score: ${score}
          </span>
        </div>
        <h2 class="text-2xl md:text-3xl font-bold text-slate-900 mb-8 leading-snug slide-up">
          ${q.text}
        </h2>
        <div class="grid grid-cols-1 gap-4" id="choices" role="listbox" aria-label="Answer choices">
          ${q.choices.map((c, i) => `
            <button class="btn-choice choice-btn group" data-index="${i}" role="option" aria-label="Answer ${letter(i)}: ${c}" ${answered ? 'disabled' : ''}>
              <span class="letter w-10 h-10 md:w-11 md:h-11 rounded-full bg-slate-200 text-slate-700 font-bold flex items-center justify-center mr-4 shrink-0 text-lg md:text-xl">
                ${letter(i)}
              </span>
              <span class="text-lg md:text-xl font-semibold text-slate-800 text-left leading-snug">
                ${c}
              </span>
              <span class="status-icon ml-auto hidden"></span>
            </button>
          `).join('')}
        </div>
        <div id="feedback" class="mt-6 hidden rounded-2xl p-4 text-center font-bold text-lg md:text-xl"></div>
        <div class="mt-6 flex justify-end">
          <button id="nextBtn" class="hidden px-8 py-3 rounded-full bg-blue-600 text-white font-bold shadow-lg hover:bg-blue-700 hover:scale-105 transition transform duration-200">
            Next Question
          </button>
        </div>
      `;

      document.querySelectorAll('.choice-btn').forEach(btn => {
        btn.addEventListener('click', () => selectAnswer(parseInt(btn.dataset.index)));
      });

      const nextBtn = document.getElementById('nextBtn');
      if (nextBtn) nextBtn.addEventListener('click', nextQuestion);

      live.textContent = `Question ${current + 1}: ${q.text}`;
    }

    function letter(i) {
      return String.fromCharCode(65 + i);
    }

    function selectAnswer(index) {
      if (answered) return;
      answered = true;

      const q = quiz[current];
      const isCorrect = index === q.correct;
      if (isCorrect) score++;

      const buttons = document.querySelectorAll('.choice-btn');
      buttons.forEach((btn, i) => {
        btn.disabled = true;
        const icon = btn.querySelector('.status-icon');
        if (i === q.correct) {
          btn.classList.add('correct');
          icon.innerHTML = checkIcon;
          icon.classList.remove('hidden');
          icon.classList.add('text-green-600');
        } else if (i === index && !isCorrect) {
          btn.classList.add('wrong');
          icon.innerHTML = xIcon;
          icon.classList.remove('hidden');
          icon.classList.add('text-red-600');
        }
      });

      const feedback = document.getElementById('feedback');
      const icon = isCorrect ? checkIcon : xIcon;
      const colorClass = isCorrect ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-700';
      const message = isCorrect
        ? "Correct! Great job."
        : `Incorrect. The correct answer is <span class="block mt-1">${letter(q.correct)}. ${q.choices[q.correct]}</span>`;
      feedback.className = `mt-6 rounded-2xl p-4 text-center font-bold text-lg md:text-xl slide-up ${colorClass}`;
      feedback.innerHTML = `
        <div class="flex items-center justify-center gap-3">
          <span class="feedback-icon ${isCorrect ? 'text-green-600' : 'text-red-700'}">${icon}</span>
          <span>${message}</span>
        </div>
      `;
      feedback.classList.remove('hidden');

      const nextBtn = document.getElementById('nextBtn');
      nextBtn.classList.remove('hidden');
      nextBtn.focus();

      progress.style.width = `${((current + 1) / quiz.length) * 100}%`;

      live.textContent = isCorrect ? 'Correct answer!' : `Incorrect. The correct answer is ${letter(q.correct)}.`;
    }

    function nextQuestion() {
      if (!answered) return;
      answered = false;
      current++;
      if (current < quiz.length) {
        renderQuestion();
      } else {
        showResults();
      }
    }

    function showResults() {
      progress.style.width = '100%';
      progressText.textContent = 'Quiz Complete';

      const total = quiz.length;
      const pct = Math.round((score / total) * 100);
      let title, message;
      if (score === total) {
        title = "Perfect Score! 🎉";
        message = "You answered every question correctly. You'd ace the citizenship test!";
      } else if (score >= 8) {
        title = "Excellent work!";
        message = "You have a strong grasp of U.S. civics.";
      } else if (score >= 6) {
        title = "Good job!";
        message = "You're on the right track. Review a bit more and you'll be set.";
      } else if (score >= 4) {
        title = "Keep studying!";
        message = "There's room to grow. Try the quiz again to improve.";
      } else {
        title = "Let's try again";
        message = "Keep practicing these important facts about U.S. civics.";
      }

      card.innerHTML = `
        <div class="text-center py-6 md:py-10">
          <div class="relative inline-flex items-center justify-center mb-6">
            <div class="w-40 h-40 rounded-full bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center shadow-xl">
              <div class="text-white text-center">
                <div class="text-5xl font-extrabold">${score}<span class="text-2xl opacity-70">/${total}</span></div>
                <div class="text-sm font-semibold opacity-90 mt-1">${pct}%</div>
              </div>
            </div>
            <div class="absolute -top-2 -right-2 bg-emerald-500 text-white rounded-full w-12 h-12 flex items-center justify-center font-bold text-lg shadow">
              ${pct}%
            </div>
          </div>
          <h2 class="text-3xl md:text-4xl font-extrabold text-slate-900 mb-3 slide-up">${title}</h2>
          <p class="text-lg md:text-xl text-slate-600 mb-8 max-w-md mx-auto slide-up">${message}</p>
          <button id="restartBtn" class="px-10 py-4 rounded-full bg-blue-600 text-white font-bold text-lg shadow-lg hover:bg-blue-700 hover:scale-105 transition transform duration-200">
            Play Again
          </button>
        </div>
      `;

      document.getElementById('restartBtn').addEventListener('click', init);

      live.textContent = `Quiz complete. You scored ${score} out of ${total}.`;

      if (score >= 7) fireConfetti();
    }

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.key >= '1' && e.key <= '4' && !answered && current < quiz.length) {
        selectAnswer(parseInt(e.key) - 1);
      } else if ((e.key === 'Enter' || e.key === ' ') && answered && current < quiz.length) {
        e.preventDefault();
        nextQuestion();
      } else if (e.key === 'Enter' && current >= quiz.length) {
        const restartBtn = document.getElementById('restartBtn');
        if (restartBtn) restartBtn.click();
      }
    });

    // Confetti
    let confettiCanvas = null;
    let confettiCtx = null;
    let confettiParticles = [];
    let confettiAnimId = null;

    function fireConfetti() {
      removeConfetti();
      confettiCanvas = document.createElement('canvas');
      confettiCanvas.id = 'confetti-canvas';
      confettiCanvas.style.position = 'fixed';
      confettiCanvas.style.inset = '0';
      confettiCanvas.style.pointerEvents = 'none';
      confettiCanvas.style.zIndex = '50';
      confettiCanvas.width = window.innerWidth;
      confettiCanvas.height = window.innerHeight;
      document.body.appendChild(confettiCanvas);
      confettiCtx = confettiCanvas.getContext('2d');

      const colors = ['#ef4444', '#22c55e', '#3b82f6', '#eab308', '#a855f7', '#f97316', '#ec4899'];
      for (let i = 0; i < 180; i++) {
        confettiParticles.push({
          x: confettiCanvas.width / 2 + (Math.random() - 0.5) * confettiCanvas.width * 0.6,
          y: confettiCanvas.height / 2 + (Math.random() - 0.5) * 200 - 100,
          vx: (Math.random() - 0.5) * 12,
          vy: Math.random() * -10 - 4,
          color: colors[Math.floor(Math.random() * colors.length)],
          size: Math.random() * 6 + 3,
          rotation: Math.random() * Math.PI * 2,
          rotSpeed: (Math.random() - 0.5) * 0.25,
          gravity: 0.25 + Math.random() * 0.1,
          drag: 0.96,
          life: 1,
          decay: 0.004 + Math.random() * 0.006
        });
      }
      drawConfetti();
    }

    function drawConfetti() {
      if (!confettiCanvas) return;
      confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
      for (let p of confettiParticles) {
        confettiCtx.save();
        confettiCtx.translate(p.x, p.y);
        confettiCtx.rotate(p.rotation);
        confettiCtx.fillStyle = p.color;
        confettiCtx.globalAlpha = p.life;
        confettiCtx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
        confettiCtx.restore();
        p.vx *= p.drag;
        p.vy += p.gravity;
        p.x += p.vx;
        p.y += p.vy;
        p.rotation += p.rotSpeed;
        p.life -= p.decay;
      }
      for (let i = confettiParticles.length - 1; i >= 0; i--) {
        if (confettiParticles[i].life <= 0) confettiParticles.splice(i, 1);
      }
      if (confettiParticles.length) {
        confettiAnimId = requestAnimationFrame(drawConfetti);
      } else {
        removeConfetti();
      }
    }

    function removeConfetti() {
      if (confettiAnimId) cancelAnimationFrame(confettiAnimId);
      confettiAnimId = null;
      confettiParticles = [];
      if (confettiCanvas) {
        confettiCanvas.remove();
        confettiCanvas = null;
        confettiCtx = null;
      }
    }

    window.addEventListener('resize', () => {
      if (confettiCanvas) {
        confettiCanvas.width = window.innerWidth;
        confettiCanvas.height = window.innerHeight;
      }
    });

    // Start
    init();
  </script>
</body>
</html>
