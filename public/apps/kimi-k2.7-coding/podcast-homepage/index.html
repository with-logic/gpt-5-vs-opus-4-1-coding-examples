<html lang="en" class="dark">
<head>

  <title>Podcast Home Page</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <script>
    window.tailwind = window.tailwind || {};
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Space Grotesk', 'sans-serif'],
          },
          colors: {
            primary: {
              50: '#f0fdfa',
              100: '#ccfbf1',
              200: '#99f6e4',
              300: '#5eead4',
              400: '#2dd4bf',
              500: '#14b8a6',
              600: '#0d9488',
              700: '#0f766e',
              800: '#115e59',
              900: '#134e4a',
              950: '#042f2e',
            },
          },
        },
      },
    }
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --thumb: #14b8a6;
    }
    html, body { scroll-behavior: smooth; }
    body { font-family: 'Inter', sans-serif; }
    .font-display { font-family: 'Space Grotesk', sans-serif; }
    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #475569; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    /* Range input styling */
    input[type=range] {
      -webkit-appearance: none;
      background: transparent;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-runnable-track {
      height: 4px;
      background: #334155;
      border-radius: 999px;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      height: 14px;
      width: 14px;
      border-radius: 50%;
      background: var(--thumb);
      margin-top: -5px;
      transition: transform 0.1s ease;
    }
    input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }
    input[type=range]::-moz-range-track {
      height: 4px;
      background: #334155;
      border-radius: 999px;
    }
    input[type=range]::-moz-range-thumb {
      height: 14px;
      width: 14px;
      border: none;
      border-radius: 50%;
      background: var(--thumb);
    }
    .progress-track:hover .progress-thumb { transform: scaleY(1.5); }
    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-900 dark:text-slate-100 transition-colors duration-300">

    </div>

          date: '2026-06-03',
          duration: 1620,
          category: 'Comedy',
          description: 'Comedians react to AI-generated jokes and whether the human touch is irreplaceable.',
          audio: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3',
        },
        {
          id: 5,
          show: 'Culture Atlas',
          title: 'Street Food as World History',
          date: '2026-05-30',
          duration: 1935,
          category: 'Culture',
          description: 'From Bangkok carts to Mexico City corners, the stories behind the snacks that shaped cities.',
          audio: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3',
        },
        {

          date: '2026-05-28',
          duration: 1480,
          category: 'Health',
          description: 'Why elite athletes and executives are finally treating sleep as a serious competitive advantage.',
          audio: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-6.mp3',
        },
        {
          id: 7,
          show: 'Future Talk',
          title: 'Building Cities That Breathe',
          date: '2026-05-25',
          duration: 2280,
          category: 'Technology',
          description: 'Architects and urban planners use biomimicry to design cooler, greener, more resilient cities.',
          audio: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-7.mp3',
        },
        {
          id: 8,
          show: 'Market Makers',
          title: 'The Subscription Economy\'s Next Wave',
          date: '2026-05-22',
          duration: 1750,
          category: 'Business',
          description: 'From cars to clothing, why ownership is being replaced by access—and what that means for brands.',
          audio: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3',
        },
        {
          id: 9,
          show: 'Cosmic Queries',
          title: 'Life in the Clouds of Venus',
          date: '2026-05-19',
          duration: 2560,
          category: 'Science',
          description: 'New missions probe the hostile atmosphere for biosignatures no one expected to find.',
          audio: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-9.mp3',
        },
        {
          id: 10,
          show: 'The Green Room',
          title: 'Improv in the Age of Streaming',
          date: '2026-05-15',
          duration: 1390,
          category: 'Comedy',
          description: 'How live-streamed improv is changing the relationship between performer and audience.',
          audio: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-10.mp3',
        },
        {
          id: 11,
          show: 'Culture Atlas',
          title: 'The Return of the Mixtape',
          date: '2026-05-12',
          duration: 2020,
          category: 'Culture',
          description: 'Curated playlists are becoming a new social language—here\'s how they tell our stories.',
          audio: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-11.mp3',
        },
        {
          id: 12,
          show: 'Wellness Weekly',
          title: 'Micro-Workouts, Macro Results',
          date: '2026-05-10',
          duration: 1560,
          category: 'Health',
          description: 'Can five-minute movement snacks really replace the gym? The science says yes—if you do them right.',
          audio: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-12.mp3',
        },
      ];

      const categories = ['All', ...new Set(rawEpisodes.map((e) => e.category))];
      const categoryOrder = ['All', 'Technology', 'Business', 'Science', 'Comedy', 'Culture', 'Health'];
      const sortedCategories = categoryOrder.filter((c) => categories.includes(c));

      const state = {
        episodes: rawEpisodes.map((e) => ({ ...e })),
        current: null,
        isPlaying: false,
        category: 'All',
        search: '',
        sort: 'newest',
        favorites: new Set(),
        speedIndex: 0,
        speeds: [1, 1.25, 1.5, 2],
      };

      const audio = new Audio();
      audio.preload = 'metadata';
      audio.volume = 0.85;

      // Icons
      const playIcon = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5 ml-0.5"><path fill-rule="evenodd" d="M4.5 5.653c0-1.426 1.529-2.33 2.779-1.643l11.54 6.348c1.295.712 1.295 2.573 0 3.285L7.28 19.991c-1.25.687-2.779-.217-2.779-1.643V5.653z" clip-rule="evenodd" /></svg>`;
      const pauseIcon = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5"><path fill-rule="evenodd" d="M6.75 5.25a.75.75 0 01.75.75v12a.75.75 0 01-1.5 0V6a.75.75 0 01.75-.75zM18 5.25a.75.75 0 01.75.75v12a.75.75 0 01-1.5 0V6a.75.75 0 01.75-.75z" clip-rule="evenodd" /></svg>`;
      const heartEmpty = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z" /></svg>`;
      const heartFull = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5 text-rose-500"><path d="M11.645 20.91l-.007-.003-.022-.012a15.247 15.247 0 01-.383-.218 25.18 25.18 0 01-4.244-3.17C4.688 15.36 2.25 12.174 2.25 8.25 2.25 5.322 4.714 3 7.688 3A5.5 5.5 0 0112 5.052 5.5 5.5 0 0116.313 3c2.973 0 5.437 2.322 5.437 5.25 0 3.925-2.438 7.111-4.739 9.256a25.175 25.175 0 01-4.244 3.17 15.247 15.247 0 01-.383.219l-.022.012-.007.004-.003.001a.752.752 0 01-.704 0l-.003-.001z" /></svg>`;

      function stringHash(str) {
        let h = 0;
        for (let i = 0; i < str.length; i++) h = ((h << 5) - h + str.charCodeAt(i)) | 0;
        return Math.abs(h);
      }

      function generateCover(seed, color) {
        const h = stringHash(seed);
        const cx1 = 80 + (h % 240);
        const cy1 = 80 + ((h >> 8) % 240);
        const r1 = 80 + (h % 80);
        const cx2 = 300 - ((h >> 4) % 200);
        const cy2 = 300 - ((h >> 8) % 200);
        const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400"><defs><radialGradient id="g" cx="30%" cy="30%" r="80%"><stop offset="0%" stop-color="#fff" stop-opacity="0.35"/><stop offset="100%" stop-color="#000" stop-opacity="0"/></radialGradient></defs><rect width="400" height="400" fill="${color}"/><circle cx="${cx1}" cy="${cy1}" r="${r1}" fill="url(#g)"/><circle cx="${cx2}" cy="${cy2}" r="${60 + (h % 60)}" fill="rgba(0,0,0,0.15)"/></svg>`;
        return 'data:image/svg+xml;base64,' + btoa(svg);
      }

      function getCategoryColor(cat) {
        return palette[cat] || categoryColors[stringHash(cat) % categoryColors.length];
      }

      function formatTime(seconds) {
        if (!isFinite(seconds) || isNaN(seconds)) return '0:00';
        const h = Math.floor(seconds / 3600);
        const m = Math.floor((seconds % 3600) / 60);
        const s = Math.floor(seconds % 60);
        if (h > 0) return `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        return `${m}:${s.toString().padStart(2, '0')}`;
      }

      function formatDate(dateStr) {
        const d = new Date(dateStr);
        return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
      }

      function showToast(message) {
        const toast = $('#toast');
        toast.textContent = message;
        toast.classList.remove('opacity-0');
        toast.classList.add('opacity-100');
        setTimeout(() => {
          toast.classList.remove('opacity-100');
          toast.classList.add('opacity-0');
        }, 2200);
      }

      function getFiltered() {
        const q = state.search.toLowerCase().trim();
        return state.episodes
          .filter((e) => (state.category === 'All' || e.category === state.category))
          .filter((e) =>
            !q ||
            e.title.toLowerCase().includes(q) ||
            e.show.toLowerCase().includes(q) ||
            e.description.toLowerCase().includes(q) ||
            e.category.toLowerCase().includes(q)
          )
          .sort((a, b) => {
            switch (state.sort) {
              case 'oldest': return new Date(a.date) - new Date(b.date);
              case 'longest': return b.duration - a.duration;
              case 'shortest': return a.duration - b.duration;
              default: return new Date(b.date) - new Date(a.date);
            }
          });
      }

      function renderChips() {
        const container = $('#filterChips');
        container.innerHTML = sortedCategories
          .map((cat) => {
            const active = state.category === cat;
            return `<button data-category="${cat}" class="chip whitespace-nowrap px-4 py-2 rounded-full text-sm font-medium transition border ${
              active
                ? 'bg-primary-500 text-white border-primary-500 shadow-md shadow-primary-500/20'
                : 'bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 border-slate-200 dark:border-slate-700 hover:border-primary-400 dark:hover:border-primary-600'
            }">${cat}</button>`;
          })
          .join('');
        $$('.chip').forEach((btn) => {
          btn.addEventListener('click', () => {
            state.category = btn.dataset.category;
            renderChips();
            renderEpisodes();
          });
        });
      }

      function renderEpisodes() {
        const grid = $('#episodeGrid');
        const empty = $('#emptyState');
        const count = $('#resultCount');
        const list = getFiltered();
        count.textContent = `${list.length} episode${list.length !== 1 ? 's' : ''}`;
        if (!list.length) {
          grid.innerHTML = '';
          empty.classList.remove('hidden');
          return;
        }
        empty.classList.add('hidden');
        grid.innerHTML = list
          .map((ep) => {
            const color = getCategoryColor(ep.category);
            const cover = generateCover(ep.title + ep.show, color);
            const isCurrent = state.current && state.current.id === ep.id;
            const playing = isCurrent && state.isPlaying;
            return `
              <article class="group relative bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 overflow-hidden shadow-sm hover:shadow-xl hover:shadow-primary-500/5 transition duration-300 ${isCurrent ? 'ring-2 ring-primary-500' : ''}">
                <div class="relative aspect-square overflow-hidden">
                  <img src="${cover}" alt="${ep.title}" loading="lazy" class="w-full h-full object-cover transition duration-500 group-hover:scale-105" />
                  <div class="absolute inset-0 bg-gradient-to-t from-slate-900/60 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition"></div>
                  <button class="play-btn absolute bottom-3 right-3 w-12 h-12 rounded-full bg-primary-500 text-white flex items-center justify-center shadow-lg hover:bg-primary-400 transform hover:scale-110 transition" data-id="${ep.id}" aria-label="Play ${ep.title}">
                    ${playing ? pauseIcon : playIcon}
                  </button>
                </div>
                <div class="p-4">
                  <div class="flex items-center justify-between gap-2 mb-2">
                    <span class="text-xs font-semibold uppercase tracking-wider text-primary-600 dark:text-primary-400">${ep.show}</span>
                    <span class="text-xs text-slate-500">${formatDate(ep.date)}</span>
                  </div>
                  <h3 class="font-display font-bold text-lg leading-snug line-clamp-2 group-hover:text-primary-600 dark:group-hover:text-primary-400 transition">${ep.title}</h3>
                  <p class="mt-2 text-sm text-slate-500 dark:text-slate-400 line-clamp-2">${ep.description}</p>
                  <div class="mt-4 flex items-center justify-between">
                    <div class="flex items-center gap-2 text-xs text-slate-500">
                      <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path fill-rule="evenodd" d="M12 2.25c-5.385 0-9.75 4.365-9.75 9.75s4.365 9.75 9.75 9.75 9.75-4.365 9.75-9.75S17.385 2.25 12 2.25zM12.75 6a.75.75 0 00-1.5 0v6c0 .199.079.39.22.53l3 3a.75.75 0 101.06-1.06L12.75 11.44V6z" clip-rule="evenodd" /></svg>
                      <span>${formatTime(ep.duration)}</span>
                    </div>
                    <div class="flex items-center gap-2">
                      <span class="px-2.5 py-1 rounded-full text-xs font-medium bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300">${ep.category}</span>
                      <button class="fav-btn p-1.5 rounded-full hover:bg-slate-100 dark:hover:bg-slate-700 transition text-slate-400 hover:text-rose-500" data-id="${ep.id}" aria-label="Favorite">
                        ${state.favorites.has(ep.id) ? heartFull : heartEmpty}
                      </button>
                    </div>
                  </div>
                </div>
              </article>
            `;
          })
          .join('');

        $$('.play-btn').forEach((btn) => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            playEpisode(parseInt(btn.dataset.id, 10));
          });
        });

        $$('.fav-btn').forEach((btn) => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const id = parseInt(btn.dataset.id, 10);
            if (state.favorites.has(id)) state.favorites.delete(id);
            else state.favorites.add(id);
            renderEpisodes();
          });
        });
      }

      function updateHero() {
        const featured = [...state.episodes].sort((a, b) => new Date(b.date) - new Date(a.date))[0];
        if (!featured) return;
        const color = getCategoryColor(featured.category);
        $('#heroTitle').textContent = featured.title;
        $('#heroDesc').textContent = featured.description;
        const cover = generateCover(featured.title + featured.show, color);
        $('#heroCover').style.background = `url('${cover}') center/cover`;
        $('#heroCover').innerHTML = '';
        $('#heroPlay').dataset.id = featured.id;
        $('#heroSubscribe').dataset.id = featured.id;
      }

      function showPlayer() {
        const bar = $('#playerBar');
        bar.hidden = false;
        bar.classList.remove('translate-y-full');
        bar.classList.add('translate-y-0');
      }

      function updatePlayerUI() {
        const bar = $('#playerBar');
        if (!state.current) {
          bar.classList.add('translate-y-full');
          bar.classList.remove('translate-y-0');
          return;
        }
        const ep = state.current;
        const color = getCategoryColor(ep.category);
        $('#playerCover').src = generateCover(ep.title + ep.show, color);
        $('#playerTitle').textContent = ep.title;
        $('#playerShow').textContent = ep.show;
        $('#playIcon').classList.toggle('hidden', state.isPlaying);
        $('#pauseIcon').classList.toggle('hidden', !state.isPlaying);
        $('#speedBtn').textContent = state.speeds[state.speedIndex] + 'x';
        audio.playbackRate = state.speeds[state.speedIndex];
        showPlayer();
        renderEpisodes();
      }

      function playEpisode(id) {
        const ep = state.episodes.find((e) => e.id === id);
        if (!ep) return;
        if (state.current && state.current.id === id) {
          togglePlay();
          return;
        }
        state.current = ep;
        state.isPlaying = true;
        audio.src = ep.audio;
        audio.playbackRate = state.speeds[state.speedIndex];
        audio.play().catch(() => {});
        updatePlayerUI();
      }

      function togglePlay() {
        if (!state.current) return;
        if (audio.paused) {
          audio.play().catch(() => {});
          state.isPlaying = true;
        } else {
          audio.pause();
          state.isPlaying = false;
        }
        updatePlayerUI();
      }

      function playOffset(offset) {
        if (!state.current) return;
        const list = getFiltered();
        const idx = list.findIndex((e) => e.id === state.current.id);
        const next = list[idx + offset];
        if (next) playEpisode(next.id);
      }

      function handleProgressClick(e) {
        if (!audio.duration) return;
        const rect = $('#progressBar').getBoundingClientRect();
        const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
        audio.currentTime = pct * audio.duration;
      }

      function updateProgress() {
        const pct = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
        $('#progressFill').style.width = `${pct}%`;
        $('#currentTime').textContent = formatTime(audio.currentTime);
        $('#totalTime').textContent = formatTime(audio.duration || state.current?.duration || 0);
      }

      function handleSubscribe(service) {
        const url = service === 'Spotify' ? 'https://open.spotify.com/' : service === 'Apple Podcasts' ? 'https://podcasts.apple.com/' : 'https://feeds.simplecast.com/';
        window.open(url, '_blank', 'noopener,noreferrer');
        showToast(`Subscribed to ${service}`);
      }

      // Event listeners
      $('#heroPlay').addEventListener('click', () => playEpisode(parseInt($('#heroPlay').dataset.id, 10)));
      $('#heroSubscribe').addEventListener('click', () => showToast('Thanks for subscribing!'));
      $('#playPauseBtn').addEventListener('click', togglePlay);
      $('#prevBtn').addEventListener('click', () => playOffset(-1));
      $('#nextBtn').addEventListener('click', () => playOffset(1));
      $('#progressBar').addEventListener('click', handleProgressClick);
      $('#volumeSlider').addEventListener('input', (e) => { audio.volume = parseFloat(e.target.value); });
      $('#speedBtn').addEventListener('click', () => {
        state.speedIndex = (state.speedIndex + 1) % state.speeds.length;
        audio.playbackRate = state.speeds[state.speedIndex];
        $('#speedBtn').textContent = state.speeds[state.speedIndex] + 'x';
      });
      $('#searchInput').addEventListener('input', (e) => {
        state.search = e.target.value;
        renderEpisodes();
      });
      $('#sortSelect').addEventListener('change', (e) => {
        state.sort = e.target.value;
        renderEpisodes();
      });
      $('#clearFilters').addEventListener('click', () => {
        state.search = '';
        state.category = 'All';
        state.sort = 'newest';
        $('#searchInput').value = '';
        $('#sortSelect').value = 'newest';
        renderChips();
        renderEpisodes();
      });
      $$('.subscribe-btn').forEach((btn) => {
        btn.addEventListener('click', () => handleSubscribe(btn.dataset.service));
      });
      $('#themeToggle').addEventListener('click', () => {
        document.documentElement.classList.toggle('dark');
      });

      audio.addEventListener('timeupdate', updateProgress);
      audio.addEventListener('loadedmetadata', () => {
        if (state.current) {
          state.current.duration = audio.duration;
          updateProgress();
          renderEpisodes();
        }
      });
      audio.addEventListener('play', () => { state.isPlaying = true; updatePlayerUI(); });
      audio.addEventListener('pause', () => { state.isPlaying = false; updatePlayerUI(); });
      audio.addEventListener('ended', () => playOffset(1));

      document.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
        if (e.code === 'Space') {
          e.preventDefault();
          togglePlay();
        } else if (e.code === 'ArrowRight') {
          audio.currentTime = Math.min(audio.currentTime + 15, audio.duration || audio.currentTime + 15);
        } else if (e.code === 'ArrowLeft') {
          audio.currentTime = Math.max(audio.currentTime - 15, 0);
        }
      });

      // Initialize
      renderChips();
      renderEpisodes();
      updateHero();
    })();
  </script>
</body>
</html>
