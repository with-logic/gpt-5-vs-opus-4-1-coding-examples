<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro — Focus & Flow</title>
    <style>
        :root {
            --bg: #fff7ed;
            --surface: #ffffff;
            --surface-2: #ffedd5;
            --text: #431407;
            --text-2: #9a3412;
            --primary: #ea580c;
            --primary-light: #fb923c;
            --accent: #f59e0b;
            --success: #16a34a;
            --shadow: 0 10px 30px rgba(234, 88, 12, 0.15);
            --ring: #ea580c;
            --transition: 0.3s ease;
        }

        [data-theme="dark"] {
            --bg: #0c0a09;
            --surface: #1c1917;
            --surface-2: #292524;
            --text: #fafaf9;
            --text-2: #fdba74;
            --primary: #f97316;
            --primary-light: #fb923c;
            --accent: #fbbf24;
            --success: #4ade80;
            --shadow: 0 10px 30px rgba(249, 115, 22, 0.25);
            --ring: #f97316;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background var(--transition), color var(--transition);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 24px;
        }

        .app {
            width: 100%;
            max-width: 720px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: var(--surface);
            border-radius: 24px;
            box-shadow: var(--shadow);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 800;
            font-size: 1.5rem;
            color: var(--primary);
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 12px;
            display: grid;
            place-items: center;
            color: white;
            font-size: 1.4rem;
            animation: pulse-logo 2s ease-in-out infinite;
        }

        @keyframes pulse-logo {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        .btn-icon {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            border: none;
            background: var(--surface-2);
            color: var(--text);
            cursor: pointer;
            display: grid;
            place-items: center;
            transition: transform 0.2s, background var(--transition), color var(--transition);
            font-size: 1.1rem;
        }

        .btn-icon:hover {
            transform: translateY(-2px);
            background: var(--primary);
            color: white;
        }

        .card {
            background: var(--surface);
            border-radius: 28px;
            padding: 28px;
            box-shadow: var(--shadow);
            transition: background var(--transition), box-shadow var(--transition);
        }

        .timer-card {
            text-align: center;
        }

        .mode-tabs {
            display: inline-flex;
            background: var(--surface-2);
            border-radius: 16px;
            padding: 6px;
            gap: 6px;
            margin-bottom: 28px;
        }

        .mode-tab {
            border: none;
            background: transparent;
            color: var(--text-2);
            padding: 10px 18px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mode-tab.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(234, 88, 12, 0.3);
        }

        .timer-wrap {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 0 auto 28px;
        }

        .timer-ring {
            transform: rotate(-90deg);
            width: 100%;
            height: 100%;
        }

        .ring-bg {
            fill: none;
            stroke: var(--surface-2);
            stroke-width: 12;
        }

        .ring-progress {
            fill: none;
            stroke: url(#ringGradient);
            stroke-width: 12;
            stroke-linecap: round;
            stroke-dasharray: 817;
            stroke-dashoffset: 0;
            transition: stroke-dashoffset 1s linear;
        }

        .timer-display {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .time {
            font-size: 4.2rem;
            font-weight: 800;
            line-height: 1;
            color: var(--text);
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.02em;
        }

        .label {
            margin-top: 8px;
            font-weight: 600;
            color: var(--text-2);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-size: 0.9rem;
        }

        .timer-actions {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 20px;
        }

        .btn {
            border: none;
            border-radius: 16px;
            padding: 14px 28px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, background var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            box-shadow: 0 8px 24px rgba(234, 88, 12, 0.35);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(234, 88, 12, 0.45);
        }

        .btn-secondary {
            background: var(--surface-2);
            color: var(--text);
        }

        .btn-secondary:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-2px);
        }

        .session-counter {
            font-weight: 600;
            color: var(--text-2);
        }

        .session-counter span {
            color: var(--primary);
            font-weight: 800;
        }

        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 16px;
        }

        .setting {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .setting label {
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-2);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .setting input[type="number"] {
            width: 100%;
            padding: 12px 14px;
            border-radius: 14px;
            border: 2px solid var(--surface-2);
            background: var(--surface-2);
            color: var(--text);
            font-size: 1rem;
            font-weight: 700;
            transition: border-color 0.2s;
        }

        .setting input[type="number"]:focus {
            outline: none;
            border-color: var(--primary);
        }

        .toggles {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-top: 8px;
        }

        .toggle {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-weight: 600;
            color: var(--text);
            user-select: none;
        }

        .toggle input {
            display: none;
        }

        .toggle-switch {
            width: 48px;
            height: 28px;
            background: var(--surface-2);
            border-radius: 14px;
            position: relative;
            transition: background 0.2s;
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 22px;
            height: 22px;
            background: white;
            border-radius: 50%;
            transition: transform 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }

        .toggle input:checked + .toggle-switch {
            background: var(--primary);
        }

        .toggle input:checked + .toggle-switch::after {
            transform: translateX(20px);
        }

        .chart-section {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chart-card {
            background: var(--surface-2);
            border-radius: 20px;
            padding: 20px;
        }

        .chart-bar {
            transition: y 0.4s, height 0.4s, fill 0.2s;
        }

        .chart-bar:hover {
            fill: var(--primary) !important;
        }

        .log-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 300px;
            overflow-y: auto;
            padding-right: 6px;
        }

        .log-list::-webkit-scrollbar {
            width: 6px;
        }

        .log-list::-webkit-scrollbar-thumb {
            background: var(--primary-light);
            border-radius: 3px;
        }

        .log-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--surface-2);
            padding: 14px 18px;
            border-radius: 16px;
            transition: transform 0.2s;
        }

        .log-item:hover {
            transform: translateX(4px);
        }

        .log-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .log-mode {
            font-weight: 700;
            color: var(--primary);
        }

        .log-time {
            font-size: 0.85rem;
            color: var(--text-2);
        }

        .log-duration {
            font-weight: 800;
            color: var(--text);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-2);
            font-weight: 600;
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 12px;
            opacity: 0.6;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 16px;
            margin-bottom: 16px;
        }

        .stat {
            background: var(--surface-2);
            border-radius: 18px;
            padding: 18px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--primary);
        }

        .stat-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-2);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        #confetti {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 100;
        }

        .confetti-piece {
            position: absolute;
            width: 10px;
            height: 10px;
            animation: confetti-fall 1.2s ease-out forwards;
        }

        @keyframes confetti-fall {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        @media (max-width: 600px) {
            body {
                padding: 16px;
            }
            .timer-wrap {
                width: 240px;
                height: 240px;
            }
            .time {
                font-size: 3.4rem;
            }
            .timer-actions {
                flex-wrap: wrap;
            }
            .btn {
                padding: 12px 20px;
            }
            header {
                flex-direction: column;
                gap: 14px;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <header>
            <div class="logo">
                <div class="logo-icon">🍅</div>
                <span>Pomodoro</span>
            </div>
            <div class="controls">
                <button class="btn-icon" id="soundToggle" title="Toggle sound">🔊</button>
                <button class="btn-icon" id="themeToggle" title="Toggle dark mode">🌙</button>
            </div>
        </header>

        <main class="card timer-card">
            <div class="mode-tabs">
                <button class="mode-tab active" data-mode="work">Focus</button>
                <button class="mode-tab" data-mode="short">Short Break</button>
                <button class="mode-tab" data-mode="long">Long Break</button>
            </div>

            <div class="timer-wrap">
                <svg class="timer-ring" viewBox="0 0 280 280">
                    <defs>
                        <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:var(--primary);stop-opacity:1" />
                            <stop offset="100%" style="stop-color:var(--accent);stop-opacity:1" />
                        </linearGradient>
                    </defs>
                    <circle class="ring-bg" cx="140" cy="140" r="130"></circle>
                    <circle class="ring-progress" cx="140" cy="140" r="130" id="progressRing"></circle>
                </svg>
                <div class="timer-display">
                    <div class="time" id="timeDisplay">25:00</div>
                    <div class="label" id="modeLabel">Ready to focus</div>
                </div>
            </div>

            <div class="timer-actions">
                <button class="btn btn-primary" id="startBtn">▶ Start</button>
                <button class="btn btn-secondary" id="pauseBtn">⏸ Pause</button>
                <button class="btn btn-secondary" id="resetBtn">↺ Reset</button>
            </div>

            <div class="session-counter">
                Sessions completed today: <span id="sessionCount">0</span> 🎯
            </div>
        </main>

        <section class="card">
            <h2 class="section-title">⚙️ Settings</h2>
            <div class="settings-grid">
                <div class="setting">
                    <label for="workDuration">Focus (min)</label>
                    <input type="number" id="workDuration" min="1" max="120" value="25">
                </div>
                <div class="setting">
                    <label for="shortDuration">Short Break (min)</label>
                    <input type="number" id="shortDuration" min="1" max="60" value="5">
                </div>
                <div class="setting">
                    <label for="longDuration">Long Break (min)</label>
                    <input type="number" id="longDuration" min="1" max="60" value="15">
                </div>
            </div>
            <div class="toggles">
                <label class="toggle">
                    <input type="checkbox" id="autoStart">
                    <span class="toggle-switch"></span>
                    Auto-start sessions
                </label>
                <label class="toggle">
                    <input type="checkbox" id="soundEnabled" checked>
                    <span class="toggle-switch"></span>
                    Sound alert
                </label>
            </div>
        </section>

        <section class="card chart-section">
            <h2 class="section-title">📊 Today's Focus</h2>
            <div class="stats-grid">
                <div class="stat">
                    <div class="stat-value" id="statSessions">0</div>
                    <div class="stat-label">Sessions</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="statMinutes">0</div>
                    <div class="stat-label">Focus Minutes</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="statStreak">0</div>
                    <div class="stat-label">Current Streak</div>
                </div>
            </div>
            <div class="chart-card">
                <svg id="sessionChart" width="100%" height="160" viewBox="0 0 600 160" preserveAspectRatio="none">
                    <!-- Bars generated by JS -->
                </svg>
            </div>
        </section>

        <section class="card">
            <h2 class="section-title">📝 Session Log</h2>
            <div class="log-list" id="logList">
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polyline points="12 6 12 12 16 14"></polyline>
                    </svg>
                    <div>No sessions yet. Start your first focus block!</div>
                </div>
            </div>
        </section>
    </div>

    <div id="confetti"></div>

    <script>
        // State
        const state = {
            mode: 'work',
            timeLeft: 25 * 60,
            totalTime: 25 * 60,
            isRunning: false,
            timerId: null,
            sessions: [],
            streak: 0,
            sound: true,
            autoStart: false,
            durations: { work: 25, short: 5, long: 15 }
        };

        // Audio context for beep
        let audioCtx = null;

        // DOM refs
        const timeDisplay = document.getElementById('timeDisplay');
        const modeLabel = document.getElementById('modeLabel');
        const progressRing = document.getElementById('progressRing');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const modeTabs = document.querySelectorAll('.mode-tab');
        const workInput = document.getElementById('workDuration');
        const shortInput = document.getElementById('shortDuration');
        const longInput = document.getElementById('longDuration');
        const autoStartToggle = document.getElementById('autoStart');
        const soundToggle = document.getElementById('soundEnabled');
        const soundBtn = document.getElementById('soundToggle');
        const themeBtn = document.getElementById('themeToggle');
        const sessionCount = document.getElementById('sessionCount');
        const logList = document.getElementById('logList');
        const statSessions = document.getElementById('statSessions');
        const statMinutes = document.getElementById('statMinutes');
        const statStreak = document.getElementById('statStreak');
        const sessionChart = document.getElementById('sessionChart');

        const circumference = 2 * Math.PI * 130;
        progressRing.style.strokeDasharray = circumference;
        progressRing.style.strokeDashoffset = 0;

        const modeLabels = {
            work: 'Focus time',
            short: 'Short break',
            long: 'Long break'
        };

        const modeColors = {
            work: '#ea580c',
            short: '#16a34a',
            long: '#2563eb'
        };

        // Format time as MM:SS
        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        // Update timer display and ring
        function updateDisplay() {
            timeDisplay.textContent = formatTime(state.timeLeft);
            const offset = circumference * (1 - state.timeLeft / state.totalTime);
            progressRing.style.strokeDashoffset = offset;
            document.title = `${formatTime(state.timeLeft)} — Pomodoro`;
        }

        // Switch mode
        function setMode(mode) {
            state.mode = mode;
            state.totalTime = state.durations[mode] * 60;
            state.timeLeft = state.totalTime;
            state.isRunning = false;
            clearInterval(state.timerId);
            updateDisplay();
            modeLabel.textContent = modeLabels[mode];
            modeTabs.forEach(tab => {
                tab.classList.toggle('active', tab.dataset.mode === mode);
            });
            updateThemeColor(modeColors[mode]);
            updateButtons();
        }

        // Update dynamic CSS color for primary
        function updateThemeColor(hex) {
            document.documentElement.style.setProperty('--primary', hex);
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            const light = `rgba(${r},${g},${b},0.15)`;
            document.documentElement.style.setProperty('--shadow', `0 10px 30px ${light}`);
        }

        // Update buttons state
        function updateButtons() {
            startBtn.textContent = state.isRunning ? '▶ Running' : '▶ Start';
            startBtn.style.opacity = state.isRunning ? '0.6' : '1';
        }

        // Timer tick
        function tick() {
            if (state.timeLeft > 0) {
                state.timeLeft--;
                updateDisplay();
            } else {
                completeSession();
            }
        }

        // Start timer
        function startTimer() {
            if (state.isRunning) return;
            state.isRunning = true;
            updateButtons();
            state.timerId = setInterval(tick, 1000);
        }

        // Pause timer
        function pauseTimer() {
            state.isRunning = false;
            clearInterval(state.timerId);
            updateButtons();
        }

        // Reset timer
        function resetTimer() {
            pauseTimer();
            state.timeLeft = state.totalTime;
            updateDisplay();
        }

        // Complete session
        function completeSession() {
            pauseTimer();
            const duration = state.durations[state.mode];
            const now = new Date();
            const session = {
                mode: state.mode,
                duration: duration,
                time: now
            };
            state.sessions.unshift(session);

            if (state.mode === 'work') {
                state.streak++;
                fireConfetti();
                playBeep(880, 0.15, 3);
                if (state.autoStart) {
                    // After work, switch to short break if streak < 4, else long break
                    const nextMode = state.streak % 4 === 0 ? 'long' : 'short';
                    setMode(nextMode);
                    startTimer();
                } else {
                    setMode(state.streak % 4 === 0 ? 'long' : 'short');
                }
            } else {
                playBeep(660, 0.2, 2);
                if (state.autoStart) {
                    setMode('work');
                    startTimer();
                } else {
                    setMode('work');
                }
            }

            saveSessions();
            renderLog();
            renderStats();
            renderChart();
        }

        // Play beep using Web Audio API
        function playBeep(frequency, duration, repeats) {
            if (!state.sound) return;
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                for (let i = 0; i < repeats; i++) {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.value = frequency;
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    const startTime = audioCtx.currentTime + i * (duration + 0.1);
                    osc.start(startTime);
                    gain.gain.setValueAtTime(0.3, startTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
                    osc.stop(startTime + duration);
                }
            } catch (e) {
                console.log('Audio not available');
            }
        }

        // Fire confetti
        function fireConfetti() {
            const container = document.getElementById('confetti');
            const colors = ['#ea580c', '#f59e0b', '#16a34a', '#2563eb', '#db2777', '#7c3aed'];
            for (let i = 0; i < 60; i++) {
                const piece = document.createElement('div');
                piece.className = 'confetti-piece';
                piece.style.left = Math.random() * 100 + 'vw';
                piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                piece.style.animationDuration = (0.8 + Math.random() * 0.8) + 's';
                piece.style.animationDelay = Math.random() * 0.3 + 's';
                piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                container.appendChild(piece);
                setTimeout(() => piece.remove(), 2000);
            }
        }

        // Render session log
        function renderLog() {
            if (state.sessions.length === 0) {
                logList.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <polyline points="12 6 12 12 16 14"></polyline>
                        </svg>
                        <div>No sessions yet. Start your first focus block!</div>
                    </div>`;
                return;
            }
            logList.innerHTML = state.sessions.map(s => {
                const date = new Date(s.time);
                const timeStr = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const modeName = s.mode === 'work' ? 'Focus' : s.mode === 'short' ? 'Short Break' : 'Long Break';
                return `
                    <div class="log-item">
                        <div class="log-info">
                            <span class="log-mode">${modeName}</span>
                            <span class="log-time">${timeStr}</span>
                        </div>
                        <span class="log-duration">${s.duration} min</span>
                    </div>
                `;
            }).join('');
        }

        // Render stats
        function renderStats() {
            const workSessions = state.sessions.filter(s => s.mode === 'work');
            const totalMinutes = workSessions.reduce((sum, s) => sum + s.duration, 0);
            sessionCount.textContent = workSessions.length;
            statSessions.textContent = workSessions.length;
            statMinutes.textContent = totalMinutes;
            statStreak.textContent = state.streak;
        }

        // Render SVG chart
        function renderChart() {
            // Group sessions by hour of day (0-23)
            const hours = Array(24).fill(0);
            state.sessions.filter(s => s.mode === 'work').forEach(s => {
                const h = new Date(s.time).getHours();
                hours[h] += s.duration;
            });

            const max = Math.max(...hours, 1);
            const barWidth = 20;
            const gap = 5;
            const chartWidth = 24 * (barWidth + gap);
            const svgWidth = 600;
            const startX = (svgWidth - chartWidth) / 2;

            let bars = '';
            hours.forEach((val, i) => {
                const h = (val / max) * 140;
                const x = startX + i * (barWidth + gap);
                const y = 150 - h;
                const color = val > 0 ? 'var(--primary)' : 'var(--surface)';
                const opacity = val > 0 ? 0.8 : 0.2;
                bars += `<rect x="${x}" y="${y}" width="${barWidth}" height="${h}" rx="4" fill="${color}" fill-opacity="${opacity}" class="chart-bar">
                    <title>Hour ${i}: ${val} min</title>
                </rect>`;
            });

            // Add labels for every 6 hours
            const labels = [0, 6, 12, 18, 23];
            let text = '';
            labels.forEach(i => {
                const x = startX + i * (barWidth + gap) + barWidth / 2;
                text += `<text x="${x}" y="155" text-anchor="middle" font-size="10" fill="var(--text-2)">${i}:00</text>`;
            });

            sessionChart.innerHTML = bars + text;
        }

        // Save/load from localStorage
        function saveSessions() {
            try {
                localStorage.setItem('pomodoro_sessions', JSON.stringify(state.sessions));
                localStorage.setItem('pomodoro_streak', state.streak);
            } catch (e) {}
        }

        function loadSessions() {
            try {
                const saved = localStorage.getItem('pomodoro_sessions');
                if (saved) {
                    state.sessions = JSON.parse(saved);
                    // Filter to today only
                    const today = new Date().toDateString();
                    state.sessions = state.sessions.filter(s => new Date(s.time).toDateString() === today);
                }
                const streak = localStorage.getItem('pomodoro_streak');
                if (streak) state.streak = parseInt(streak, 10);
            } catch (e) {}
            renderLog();
            renderStats();
            renderChart();
        }

        // Theme handling
        function initTheme() {
            const saved = localStorage.getItem('pomodoro_theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const isDark = saved ? saved === 'dark' : prefersDark;
            document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
            themeBtn.textContent = isDark ? '☀️' : '🌙';
        }

        function toggleTheme() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            const newTheme = isDark ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('pomodoro_theme', newTheme);
            themeBtn.textContent = isDark ? '🌙' : '☀️';
        }

        // Event listeners
        startBtn.addEventListener('click', startTimer);
        pauseBtn.addEventListener('click', pauseTimer);
        resetBtn.addEventListener('click', resetTimer);

        modeTabs.forEach(tab => {
            tab.addEventListener('click', () => setMode(tab.dataset.mode));
        });

        [workInput, shortInput, longInput].forEach(input => {
            input.addEventListener('change', () => {
                state.durations.work = parseInt(workInput.value, 10) || 25;
                state.durations.short = parseInt(shortInput.value, 10) || 5;
                state.durations.long = parseInt(longInput.value, 10) || 15;
                if (!state.isRunning) {
                    setMode(state.mode);
                }
            });
        });

        autoStartToggle.addEventListener('change', () => {
            state.autoStart = autoStartToggle.checked;
        });

        soundToggle.addEventListener('change', () => {
            state.sound = soundToggle.checked;
            soundBtn.textContent = state.sound ? '🔊' : '🔇';
        });

        soundBtn.addEventListener('click', () => {
            soundToggle.checked = !soundToggle.checked;
            state.sound = soundToggle.checked;
            soundBtn.textContent = state.sound ? '🔊' : '🔇';
            if (state.sound) playBeep(880, 0.1, 1);
        });

        themeBtn.addEventListener('click', toggleTheme);

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            if (e.code === 'Space') {
                e.preventDefault();
                state.isRunning ? pauseTimer() : startTimer();
            } else if (e.code === 'KeyR') {
                resetTimer();
            } else if (e.code === 'Digit1') {
                setMode('work');
            } else if (e.code === 'Digit2') {
                setMode('short');
            } else if (e.code === 'Digit3') {
                setMode('long');
            }
        });

        // Initialize
        initTheme();
        loadSessions();
        setMode('work');

        // Clear storage on new day
        const lastDate = localStorage.getItem('pomodoro_last_date');
        const today = new Date().toDateString();
        if (lastDate !== today) {
            state.sessions = [];
            state.streak = 0;
            saveSessions();
            localStorage.setItem('pomodoro_last_date', today);
            renderLog();
            renderStats();
            renderChart();
        }
    </script>
</body>
</html>
