<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Visualization Playground</title>
  <script src="https://cdn.tailwindcss.com" integrity="sha384-igm5BeiBt36UU4gqwWS7imYmelpTsZlQ45FZf+XBn9MuJbn4nQr7yx1yFydocC/K" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js" integrity="sha384-jb8JQMbMoBUzgWatfe6COACi2ljcDdZQ2OxczGA3bGNeWe+6DChMTBJemed7ZnvJ" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js" integrity="sha384-D/t0ZMqQW31H3az8ktEiNb39wyKnS82iFY52QPACM+IjKW3jDUhyIgh2PApRqJZs" crossorigin="anonymous"></script>
  <style>
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #1e293b; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #64748b; }
    input[type="color"] {
      -webkit-appearance: none;
      border: none;
      overflow: hidden;
      cursor: pointer;
    }
    input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
    input[type="color"]::-webkit-color-swatch { border: none; border-radius: 9999px; }
    .drop-active {
      border-color: #818cf8 !important;
      background-color: rgba(129, 140, 248, 0.12) !important;
    }
  </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col">

  <header class="bg-slate-800/80 backdrop-blur border-b border-slate-700 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
      <div>
        <h1 class="text-2xl sm:text-3xl font-bold bg-gradient-to-r from-indigo-400 via-purple-400 to-cyan-400 bg-clip-text text-transparent">Data Visualization Playground</h1>
        <p class="text-sm text-slate-400 mt-1">Upload CSV data and generate beautiful, customizable charts in seconds.</p>
      </div>
      <div class="flex items-center gap-2">
        <button id="downloadPng" class="px-4 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-medium transition shadow-lg shadow-indigo-500/20">Save PNG</button>
        <button id="downloadJpg" class="px-4 py-2 rounded-lg bg-slate-700 hover:bg-slate-600 text-white text-sm font-medium transition border border-slate-600">Save JPG</button>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 py-6 grid grid-cols-1 lg:grid-cols-12 gap-6 flex-1">
    <aside class="lg:col-span-3 space-y-6">
      <div class="bg-slate-800 rounded-2xl shadow-xl border border-slate-700 p-5">
        <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
          <svg class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0 4.5 4.5M12 3v13.5"></path></svg>
          Upload CSV
        </h2>
        <div id="dropZone" class="border-2 border-dashed border-slate-600 rounded-xl p-6 text-center transition hover:border-indigo-400 hover:bg-slate-700/30 cursor-pointer">
          <div class="mx-auto w-12 h-12 rounded-full bg-slate-700 flex items-center justify-center mb-3">
            <svg class="w-6 h-6 text-slate-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 16.5V9.75m0 0 3 3m-3-3-3 3M6.75 19.5a4.5 4.5 0 01-1.41-8.775 5.25 5.25 0 0110.233-2.33 3 3 0 013.758 3.848A3.752 3.752 0 0118 19.5H6.75Z"></path></svg>
          </div>
          <p class="text-sm text-slate-300 font-medium">Drop your CSV here</p>
          <p class="text-xs text-slate-500 mt-1">or click to browse</p>
          <input id="fileInput" type="file" accept=".csv,text/csv" class="hidden">
        </div>
        <p id="fileName" class="mt-3 text-xs text-slate-500 truncate"></p>
        <button id="loadSample" class="mt-4 w-full py-2 rounded-lg border border-indigo-500/30 text-indigo-300 hover:bg-indigo-500/10 text-sm font-medium transition">Load Sample Data</button>
      </div>

      <div class="bg-slate-800 rounded-2xl shadow-xl border border-slate-700 p-5 space-y-5">
        <h2 class="text-lg font-semibold flex items-center gap-2">
          <svg class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 6a7.5 7.5 0 107.5 7.5h-7.5V6Z"></path><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 10.5H21A7.5 7.5 0 0013.5 3v7.5Z"></path></svg>
          Chart Settings
        </h2>

        <div class="space-y-1">
          <label class="text-xs font-medium text-slate-400 uppercase tracking-wider">Chart Type</label>
          <select id="chartType" class="mt-1 w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-100">
            <option value="line">Line</option>
            <option value="bar" selected>Bar</option>
            <option value="horizontalBar">Horizontal Bar</option>
            <option value="area">Area</option>
            <option value="pie">Pie</option>
            <option value="doughnut">Doughnut</option>
            <option value="polarArea">Polar Area</option>
            <option value="radar">Radar</option>
          </select>
          <p class="text-xs text-slate-500 mt-1">Circular charts use the first selected data series.</p>
        </div>

        <div class="space-y-1">
          <label class="text-xs font-medium text-slate-400 uppercase tracking-wider">Label Column</label>
          <select id="labelColumn" class="mt-1 w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-100"></select>
        </div>

        <div class="space-y-1">
          <label class="text-xs font-medium text-slate-400 uppercase tracking-wider">Data Series</label>
          <div id="datasetList" class="max-h-40 overflow-y-auto rounded-lg border border-slate-700 bg-slate-900/30 p-2 space-y-1"></div>
        </div>

        <div class="space-y-1">
          <label class="text-xs font-medium text-slate-400 uppercase tracking-wider">Color Scheme</label>
          <div class="flex gap-2">
            <select id="colorScheme" class="flex-1 bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-100">
              <option value="spectrum">Spectrum</option>
              <option value="ocean">Ocean</option>
              <option value="sunset">Sunset</option>
              <option value="forest">Forest</option>
              <option value="berry">Berry</option>
              <option value="monochrome">Monochrome</option>
            </select>
            <button id="randomizeColors" title="Randomize colors" class="px-3 py-2 rounded-lg bg-slate-700 border border-slate-600 hover:bg-slate-600 text-lg leading-none transition">🎲</button>
          </div>
        </div>

        <div id="seriesColors" class="space-y-1 hidden">
          <label class="text-xs font-medium text-slate-400 uppercase tracking-wider">Series Colors</label>
          <div id="seriesColorList" class="max-h-40 overflow-y-auto rounded-lg border border-slate-700 bg-slate-900/30 p-2 space-y-2"></div>
        </div>

        <div class="space-y-1">
          <label class="text-xs font-medium text-slate-400 uppercase tracking-wider">Chart Title</label>
          <input id="chartTitle" type="text" placeholder="e.g. Monthly Revenue" class="mt-1 w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-100 placeholder-slate-500">
        </div>

        <div class="grid grid-cols-2 gap-3">
          <label class="flex items-center gap-2 text-sm text-slate-300 cursor-pointer">
            <input id="smoothToggle" type="checkbox" class="accent-indigo-500 rounded" checked>
            Smooth lines
          </label>
          <label class="flex items-center gap-2 text-sm text-slate-300 cursor-pointer">
            <input id="fillToggle" type="checkbox" class="accent-indigo-500 rounded">
            Fill area
          </label>
          <label class="flex items-center gap-2 text-sm text-slate-300 cursor-pointer">
            <input id="gridToggle" type="checkbox" class="accent-indigo-500 rounded" checked>
            Show grid
          </label>
          <label class="flex items-center gap-2 text-sm text-slate-300 cursor-pointer">
            <input id="legendToggle" type="checkbox" class="accent-indigo-500 rounded" checked>
            Show legend
          </label>
        </div>

        <div class="space-y-1">
          <label class="text-xs font-medium text-slate-400 uppercase tracking-wider">Legend Position</label>
          <select id="legendPosition" class="mt-1 w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-100">
            <option value="top">Top</option>
            <option value="right">Right</option>
            <option value="bottom">Bottom</option>
            <option value="left">Left</option>
          </select>
        </div>

        <div class="space-y-1">
          <label class="text-xs font-medium text-slate-400 uppercase tracking-wider">Export Background</label>
          <div class="flex items-center gap-3">
            <input id="exportBg" type="color" value="#ffffff" class="w-10 h-10 rounded-full bg-transparent border border-slate-600 p-0">
            <span class="text-xs text-slate-500">Used for PNG/JPG export</span>
          </div>
        </div>

        <button id="updateChart" class="w-full py-2 rounded-lg bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-medium transition shadow-lg shadow-indigo-500/20">Update Chart</button>
      </div>
    </aside>

    <section class="lg:col-span-9 space-y-6">
      <div class="bg-slate-800 rounded-2xl shadow-xl border border-slate-700 p-5">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-lg font-semibold">Chart Preview</h2>
          <div class="flex gap-2">
            <button id="downloadPng2" class="px-3 py-1.5 rounded-lg bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-medium transition">PNG</button>
            <button id="downloadJpg2" class="px-3 py-1.5 rounded-lg bg-slate-700 hover:bg-slate-600 text-white text-xs font-medium transition border border-slate-600">JPG</button>
          </div>
        </div>
        <div class="relative h-80 md:h-96 lg:h-[520px] w-full">
          <canvas id="chartCanvas" class="w-full h-full"></canvas>
        </div>
      </div>

      <div class="bg-slate-800 rounded-2xl shadow-xl border border-slate-700 p-5">
        <h2 class="text-lg font-semibold mb-3">Data Preview <span id="rowCount" class="text-sm font-normal text-slate-400"></span></h2>
        <div class="overflow-x-auto max-h-80 overflow-y-auto rounded-lg border border-slate-700">
          <table id="previewTable" class="w-full text-sm text-left">
            <thead class="bg-slate-700 text-slate-200 sticky top-0 z-10"></thead>
            <tbody class="divide-y divide-slate-700"></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <script>
    (function() {
      const $ = (id) => document.getElementById(id);
      const chartCanvas = $('chartCanvas');
      let chartInstance = null;
      let parsedData = [];
      let columns = [];
      let numericColumns = [];
      const datasetColors = {};
      let rowColors = [];
      const circularTypes = ['pie', 'doughnut', 'polarArea'];

      const fileInput = $('fileInput');
      const dropZone = $('dropZone');
      const fileName = $('fileName');
      const loadSampleBtn = $('loadSample');
      const chartType = $('chartType');
      const labelColumn = $('labelColumn');
      const datasetList = $('datasetList');
      const colorScheme = $('colorScheme');
      const randomizeColorsBtn = $('randomizeColors');
      const seriesColorsPanel = $('seriesColors');
      const seriesColorList = $('seriesColorList');
      const chartTitle = $('chartTitle');
      const smoothToggle = $('smoothToggle');
      const fillToggle = $('fillToggle');
      const gridToggle = $('gridToggle');
      const legendToggle = $('legendToggle');
      const legendPosition = $('legendPosition');
      const exportBg = $('exportBg');
      const updateChartBtn = $('updateChart');
      const rowCount = $('rowCount');

      function escapeHtml(text) {
        if (text == null) return '';
        return String(text)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      function hslToHex(h, s, l) {
        s /= 100;
        l /= 100;
        const a = s * Math.min(l, 1 - l);
        const f = (n) => {
          const k = (n + h / 30) % 12;
          const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
          return Math.round(255 * color).toString(16).padStart(2, '0');
        };
        return `#${f(0)}${f(8)}${f(4)}`;
      }

      function hexToRgba(hex, alpha) {
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        return `rgba(${r}, ${g}, ${b}, ${alpha})`;
      }

      const colorSchemeGenerators = {
        spectrum: (i) => ({ h: (i * 137.508) % 360, s: 70, l: 58 }),
        ocean: (i) => ({ h: 180 + (i * 25) % 100, s: 70, l: 55 }),
        sunset: (i) => ({ h: (i * 30) % 80, s: 75, l: 60 }),
        forest: (i) => ({ h: 90 + (i * 25) % 70, s: 65, l: 50 }),
        berry: (i) => ({ h: 280 + (i * 25) % 70, s: 70, l: 60 }),
        monochrome: (i, n) => ({ h: 210, s: 25, l: 30 + (i * 55 / Math.max(n - 1, 1)) })
      };

      function generateColors(count, scheme) {
        const gen = colorSchemeGenerators[scheme] || colorSchemeGenerators.spectrum;
        return Array.from({ length: count }, (_, i) => {
          const { h, s, l } = gen(i, count);
          return hslToHex(h, s, l);
        });
      }

      function isNumericColumn(col) {
        return parsedData.some(row => typeof row[col] === 'number');
      }

      function formatValue(v) {
        if (v === null || v === undefined) return '';
        if (typeof v === 'number') {
          return Number.isInteger(v) ? v.toString() : v.toLocaleString(undefined, { maximumFractionDigits: 4 });
        }
        return String(v);
      }

      function getSelectedDatasets() {
        return Array.from(document.querySelectorAll('.dataset-checkbox:checked')).map(cb => cb.value);
      }

      function populateLabelSelect() {
        const firstNonNumeric = columns.find(c => !numericColumns.includes(c)) || columns[0] || '';
        labelColumn.innerHTML = columns.map(c =>
          `<option value="${escapeHtml(c)}" ${c === firstNonNumeric ? 'selected' : ''}>${escapeHtml(c)}</option>`
        ).join('');
      }

      function populateDatasetList() {
        datasetList.innerHTML = numericColumns.map(col => `
          <label class="flex items-center gap-2 p-2 rounded-lg bg-slate-700/50 hover:bg-slate-700 cursor-pointer transition">
            <input type="checkbox" class="dataset-checkbox h-4 w-4 accent-indigo-500 rounded border-slate-500 bg-slate-700" value="${escapeHtml(col)}" checked>
            <span class="text-sm text-slate-200 truncate">${escapeHtml(col)}</span>
          </label>
        `).join('');
        datasetList.querySelectorAll('.dataset-checkbox').forEach(cb => {
          cb.addEventListener('change', () => {
            ensureColors();
            updateSeriesColorPanel();
            renderChart();
          });
        });
      }

      function ensureColors() {
        numericColumns.forEach((col, i) => {
          if (!datasetColors[col]) {
            datasetColors[col] = generateColors(numericColumns.length, colorScheme.value)[i];
          }
        });
      }

      function applyColorScheme() {
        const scheme = colorScheme.value;
        numericColumns.forEach((col, i) => {
          datasetColors[col] = generateColors(numericColumns.length, scheme)[i];
        });
        rowColors = generateColors(parsedData.length, scheme);
        updateSeriesColorPanel();
        renderChart();
      }

      function randomizeColors() {
        numericColumns.forEach(col => {
          datasetColors[col] = hslToHex(Math.random() * 360, 60 + Math.random() * 25, 45 + Math.random() * 20);
        });
        rowColors = Array.from({ length: parsedData.length }, () =>
          hslToHex(Math.random() * 360, 60 + Math.random() * 25, 45 + Math.random() * 20)
        );
        updateSeriesColorPanel();
        renderChart();
      }

      function updateSeriesColorPanel() {
        const selected = getSelectedDatasets();
        if (circularTypes.includes(chartType.value) || selected.length === 0) {
          seriesColorsPanel.classList.add('hidden');
          return;
        }
        seriesColorsPanel.classList.remove('hidden');
        seriesColorList.innerHTML = selected.map(col => `
          <div class="flex items-center gap-2">
            <input type="color" value="${datasetColors[col] || '#3b82f6'}" data-col="${escapeHtml(col)}" class="series-color w-8 h-8 rounded-full bg-transparent border border-slate-600 p-0">
            <span class="text-xs text-slate-300 truncate">${escapeHtml(col)}</span>
          </div>
        `).join('');
        seriesColorList.querySelectorAll('.series-color').forEach(input => {
          input.addEventListener('input', () => {
            datasetColors[input.dataset.col] = input.value;
            renderChart();
          });
        });
      }

      function renderTable() {
        const thead = document.querySelector('#previewTable thead');
        const tbody = document.querySelector('#previewTable tbody');
        if (!parsedData.length) {
          thead.innerHTML = '';
          tbody.innerHTML = '';
          rowCount.textContent = '';
          return;
        }
        thead.innerHTML = '<tr>' + columns.map(c =>
          `<th class="px-4 py-2 text-xs font-medium uppercase tracking-wider whitespace-nowrap">${escapeHtml(c)}</th>`
        ).join('') + '</tr>';
        tbody.innerHTML = parsedData.slice(0, 100).map((row, idx) => `
          <tr class="${idx % 2 === 0 ? 'bg-slate-800/50' : 'bg-slate-800/20'} hover:bg-slate-700/50 transition">
            ${columns.map(c => `<td class="px-4 py-2 whitespace-nowrap">${escapeHtml(formatValue(row[c]))}</td>`).join('')}
          </tr>
        `).join('');
        rowCount.textContent = `(${parsedData.length.toLocaleString()} row${parsedData.length !== 1 ? 's' : ''})`;
      }

      function renderChart() {
        if (!parsedData.length || !numericColumns.length) return;
        const selectedDatasets = getSelectedDatasets();
        if (!selectedDatasets.length) {
          if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
          return;
        }
        const type = chartType.value;
        const labelCol = labelColumn.value;
        const labels = parsedData.map(row => String(row[labelCol] ?? ''));
        const datasets = [];
        let actualType = type;

        if (circularTypes.includes(type)) {
          const col = selectedDatasets[0] || numericColumns[0];
          const data = parsedData.map(row => Number(row[col]) || 0);
          const bg = rowColors.slice(0, data.length);
          datasets.push({
            label: col,
            data: data,
            backgroundColor: bg,
            borderColor: '#1e293b',
            borderWidth: 1
          });
        } else {
          selectedDatasets.forEach(col => {
            const color = datasetColors[col] || '#3b82f6';
            const data = parsedData.map(row => Number(row[col]) || 0);
            let bg, border;
            if (type === 'line' || type === 'area' || type === 'radar') {
              border = color;
              bg = hexToRgba(color, (type === 'area' || fillToggle.checked) ? 0.25 : 0.08);
            } else {
              border = color;
              bg = hexToRgba(color, 0.85);
            }
            datasets.push({
              label: col,
              data: data,
              borderColor: border,
              backgroundColor: bg,
              borderWidth: 2,
              tension: (type === 'line' || type === 'area' || type === 'radar') ? (smoothToggle.checked ? 0.4 : 0) : 0,
              fill: (type === 'area' || (type === 'line' && fillToggle.checked))
            });
          });
        }

        if (type === 'horizontalBar') actualType = 'bar';

        const options = {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: {
              display: legendToggle.checked,
              position: legendPosition.value,
              labels: { color: '#e2e8f0', font: { size: 12 }, padding: 16, usePointStyle: true }
            },
            title: {
              display: !!chartTitle.value.trim(),
              text: chartTitle.value.trim(),
              color: '#f8fafc',
              font: { size: 16, weight: '600' },
              padding: { top: 10, bottom: 20 }
            },
            tooltip: {
              backgroundColor: 'rgba(15, 23, 42, 0.95)',
              titleColor: '#f8fafc',
              bodyColor: '#e2e8f0',
              borderColor: '#475569',
              borderWidth: 1,
              padding: 10,
              cornerRadius: 8
            }
          }
        };

        if (actualType === 'line' || actualType === 'bar' || actualType === 'radar') {
          options.scales = {
            x: {
              ticks: { color: '#94a3b8' },
              grid: { color: gridToggle.checked ? 'rgba(148, 163, 184, 0.15)' : 'transparent' }
            },
            y: {
              beginAtZero: true,
              ticks: { color: '#94a3b8' },
              grid: { color: gridToggle.checked ? 'rgba(148, 163, 184, 0.15)' : 'transparent' }
            }
          };
          if (type === 'horizontalBar') options.indexAxis = 'y';
        }

        if (actualType === 'radar') {
          options.scales = {
            r: {
              ticks: { color: '#94a3b8', backdropColor: 'transparent' },
              grid: { color: gridToggle.checked ? 'rgba(148, 163, 184, 0.15)' : 'transparent' },
              angleLines: { color: gridToggle.checked ? 'rgba(148, 163, 184, 0.15)' : 'transparent' },
              pointLabels: { color: '#e2e8f0', font: { size: 11 } }
            }
          };
        }

        if (actualType === 'polarArea') {
          options.scales = {
            r: {
              ticks: { color: '#94a3b8', backdropColor: 'transparent' },
              grid: { color: gridToggle.checked ? 'rgba(148, 163, 184, 0.15)' : 'transparent' }
            }
          };
        }

        if (chartInstance) chartInstance.destroy();
        const ctx = chartCanvas.getContext('2d');
        chartInstance = new Chart(ctx, {
          type: actualType,
          data: { labels, datasets },
          options
        });
      }

      function parseFile(file) {
        fileName.textContent = file.name;
        Papa.parse(file, {
          header: true,
          dynamicTyping: true,
          skipEmptyLines: true,
          complete: (results) => {
            if (results.data && results.data.length) {
              parsedData = results.data;
              columns = results.meta.fields || Object.keys(parsedData[0]);
              analyzeAndInit();
            } else {
              alert('The CSV file appears to be empty or unreadable.');
            }
          },
          error: (err) => alert('Error parsing CSV: ' + err.message)
        });
      }

      function analyzeAndInit() {
        numericColumns = columns.filter(isNumericColumn);
        if (!numericColumns.length) {
          alert('No numeric columns found. Please upload a CSV with at least one numeric column.');
          return;
        }
        populateLabelSelect();
        populateDatasetList();
        applyColorScheme();
        updateSeriesColorPanel();
        renderTable();
        renderChart();
      }

      function loadSample() {
        const csv = `Month,Revenue,Expenses,Profit
Jan,12000,8000,4000
Feb,15000,9500,5500
Mar,11000,7500,3500
Apr,18000,10500,7500
May,22000,12000,10000
Jun,26000,14000,12000
Jul,24000,13000,11000
Aug,28000,15000,13000
Sep,21000,11500,9500
Oct,23000,12500,10500
Nov,27000,14500,12500
Dec,32000,16000,16000`;
        const results = Papa.parse(csv, { header: true, dynamicTyping: true, skipEmptyLines: true });
        parsedData = results.data;
        columns = results.meta.fields;
        fileName.textContent = 'sample-sales.csv';
        analyzeAndInit();
      }

      function downloadImage(format) {
        if (!chartInstance) return;
        const bg = exportBg.value;
        const temp = document.createElement('canvas');
        temp.width = chartCanvas.width;
        temp.height = chartCanvas.height;
        const ctx = temp.getContext('2d');
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, temp.width, temp.height);
        ctx.drawImage(chartCanvas, 0, 0);
        const url = temp.toDataURL('image/' + (format === 'jpg' ? 'jpeg' : format), format === 'jpeg' ? 0.92 : undefined);
        const a = document.createElement('a');
        a.href = url;
        a.download = `chart-${Date.now()}.${format}`;
        a.click();
      }

      fileInput.addEventListener('change', (e) => { if (e.target.files[0]) parseFile(e.target.files[0]); });
      dropZone.addEventListener('click', () => fileInput.click());
      dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drop-active'); });
      dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drop-active'));
      dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('drop-active');
        const file = e.dataTransfer.files[0];
        if (file) parseFile(file);
      });
      loadSampleBtn.addEventListener('click', loadSample);
      chartType.addEventListener('change', () => { updateSeriesColorPanel(); renderChart(); });
      labelColumn.addEventListener('change', renderChart);
      colorScheme.addEventListener('change', applyColorScheme);
      randomizeColorsBtn.addEventListener('click', randomizeColors);
      [chartTitle, smoothToggle, fillToggle, gridToggle, legendToggle, legendPosition].forEach(el => el.addEventListener('input', renderChart));
      updateChartBtn.addEventListener('click', renderChart);
      $('downloadPng').addEventListener('click', () => downloadImage('png'));
      $('downloadJpg').addEventListener('click', () => downloadImage('jpg'));
      $('downloadPng2').addEventListener('click', () => downloadImage('png'));
      $('downloadJpg2').addEventListener('click', () => downloadImage('jpg'));

      loadSample();
    })();
  </script>
</body>
</html>
