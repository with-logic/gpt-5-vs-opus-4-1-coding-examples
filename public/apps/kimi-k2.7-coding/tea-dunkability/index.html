<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tea Dunkability Simulator</title>
  <script src="https://cdn.tailwindcss.com" integrity="sha384-igm5BeiBt36UU4gqwWS7imYmelpTsZlQ45FZf+XBn9MuJbn4nQr7yx1yFydocC/K" crossorigin="anonymous"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            serif: ['Playfair Display', 'serif'],
          },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'Inter', sans-serif;
      transition: background-color 0.5s, color 0.5s;
    }
    h1, h2, h3, .font-serif { font-family: 'Playfair Display', serif; }

    .glass {
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(0, 0, 0, 0.05);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
    }
    .dark .glass {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
    }

    .kbd {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 1.75rem;
      padding: 0.25rem 0.5rem;
      border-radius: 0.5rem;
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.2);
      font-weight: 600;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, monospace;
      font-size: 0.75rem;
    }

    /* Steam */
    .steam {
      position: absolute;
      border-radius: 50%;
      filter: blur(10px);
      background: radial-gradient(circle, rgba(255, 255, 255, 0.7) 0%, rgba(255, 255, 255, 0) 70%);
      pointer-events: none;
      animation: rise 3s ease-out infinite;
      opacity: 0;
    }
    @keyframes rise {
      0% { transform: translateY(0) scale(0.5); opacity: 0; }
      20% { opacity: 0.6; }
      100% { transform: translateY(-90px) scale(1.6); opacity: 0; }
    }

    /* Cup animations */
    .wave { animation: wave 2.5s ease-in-out infinite; transform-origin: center; }
    @keyframes wave {
      0%, 100% { transform: scale(1) translateY(0); }
      50% { transform: scale(1.06) translateY(-2px); }
    }
    .animate-bob { animation: bob 2.5s ease-in-out infinite; }
    @keyframes bob {
      0%, 100% { transform: translateY(-4px); }
      50% { transform: translateY(4px); }
    }
    .animate-dip { animation: dip 0.6s ease-in-out infinite; }
    @keyframes dip {
      0%, 100% { transform: translateY(-2px); }
      50% { transform: translateY(14px); }
    }

    /* Crumbs */
    .crumb {
      position: absolute;
      border-radius: 9999px;
      pointer-events: none;
      animation: fall 1.2s ease-in forwards;
    }
    @keyframes fall {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(300px) rotate(720deg); opacity: 0; }
    }

    /* Range slider */
    input[type=range].range-slider {
      -webkit-appearance: none;
      width: 100%;
      background: transparent;
      --accent: #f59e0b;
      --value: 0%;
    }
    input[type=range].range-slider:focus { outline: none; }
    input[type=range].range-slider::-webkit-slider-runnable-track {
      width: 100%;
      height: 6px;
      cursor: pointer;
      border-radius: 999px;
      background: linear-gradient(to right, var(--accent) var(--value), rgba(0, 0, 0, 0.1) var(--value));
    }
    input[type=range].range-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      height: 20px;
      width: 20px;
      border-radius: 50%;
      background: #0f172a;
      cursor: pointer;
      margin-top: -7px;
      box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.1);
      transition: transform 0.1s;
    }
    input[type=range].range-slider::-webkit-slider-thumb:hover { transform: scale(1.1); }
    .dark input[type=range].range-slider::-webkit-slider-runnable-track {
      background: linear-gradient(to right, var(--accent) var(--value), rgba(255, 255, 255, 0.18) var(--value));
    }
    .dark input[type=range].range-slider::-webkit-slider-thumb {
      background: #fff;
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.2);
    }
    input[type=range].range-slider::-moz-range-track {
      width: 100%;
      height: 6px;
      cursor: pointer;
      border-radius: 999px;
      background: linear-gradient(to right, var(--accent) var(--value), rgba(0, 0, 0, 0.1) var(--value));
    }
    input[type=range].range-slider::-moz-range-thumb {
      height: 20px;
      width: 20px;
      border: none;
      border-radius: 50%;
      background: #0f172a;
      cursor: pointer;
      box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.1);
    }
    .dark input[type=range].range-slider::-moz-range-track {
      background: linear-gradient(to right, var(--accent) var(--value), rgba(255, 255, 255, 0.18) var(--value));
    }
    .dark input[type=range].range-slider::-moz-range-thumb {
      background: #fff;
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.2);
    }

    /* Background orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
      pointer-events: none;
      z-index: -1;
    }
    .orb-1 { width: 400px; height: 400px; top: -100px; left: -100px; background: #fbbf24; animation: floatOrb 20s ease-in-out infinite; }
    .orb-2 { width: 350px; height: 350px; bottom: -80px; right: -80px; background: #f97316; animation: floatOrb 22s ease-in-out infinite reverse; }
    .orb-3 { width: 250px; height: 250px; top: 40%; left: 60%; background: #a78bfa; animation: floatOrb 24s ease-in-out infinite; }
    @keyframes floatOrb {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(30px, -30px); }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin integrity="sha384-gTGxhz21lVGYNMcdJOyq01Edg0jhn/c22nsx0kyqP0TxaV5WVdsSH1fSDUf5YJj1" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.7/babel.min.js" integrity="sha384-ezQ6HS3FLspd9te19o2McUV6FAK091+GG7KO54f/R8DKgCDi7fULhapNrd5LY+vG" crossorigin="anonymous"></script>
  <script type="text/plain" id="app-jsx">
    const { useState, useEffect, useMemo, useCallback, useRef } = React;

    const biscuits = [
      { id: 'digestive', name: 'Digestive', resilience: 65, absorption: 7, color: '#b67f51', icon: '🍪', desc: 'Sturdy, reliable' },
      { id: 'richTea', name: 'Rich Tea', resilience: 30, absorption: 12, color: '#e2c08d', icon: '🫓', desc: 'Fragile, elegant' },
      { id: 'hobnob', name: 'Hobnob', resilience: 85, absorption: 5, color: '#9c6b3c', icon: '🍘', desc: 'Oaty tank' },
      { id: 'gingerNut', name: 'Ginger Nut', resilience: 95, absorption: 3, color: '#c25e00', icon: '🟤', desc: 'Bulletproof' },
    ];

    function getStatus(score) {
      if (score >= 80) return { text: 'Perfect Dunk', color: 'text-emerald-400', stroke: '#34d399' };
      if (score >= 50) return { text: 'Stable', color: 'text-amber-400', stroke: '#fbbf24' };
      if (score >= 20) return { text: 'Risky', color: 'text-orange-400', stroke: '#fb923c' };
      if (score > 0) return { text: 'Perilous', color: 'text-red-400', stroke: '#f87171' };
      return { text: 'Catastrophic Crumble', color: 'text-red-600', stroke: '#dc2626' };
    }

    function Slider({ label, value, min, max, step, unit, accent, onChange }) {
      const pct = ((value - min) / (max - min)) * 100;
      return (
        <div className="space-y-3">
          <div className="flex justify-between items-center">
            <label className="text-sm font-semibold tracking-wide">{label}</label>
            <span className="text-sm font-bold text-amber-600 dark:text-amber-400">{value}{unit}</span>
          </div>
          <input
            type="range"
            min={min}
            max={max}
            step={step}
            value={value}
            onChange={(e) => onChange(parseFloat(e.target.value))}
            className="range-slider"
            style={{ '--accent': accent || '#f59e0b', '--value': pct + '%' }}
          />
        </div>
      );
    }

    function BiscuitSelector({ biscuits, selected, onSelect }) {
      return (
        <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
          {biscuits.map((b, i) => (
            <button
              key={b.id}
              onClick={() => onSelect(i)}
              className={`glass p-3 rounded-xl text-left transition-all duration-200 ${
                selected === i
                  ? 'ring-2 ring-amber-400 bg-white/30 dark:bg-white/20 scale-[1.02]'
                  : 'hover:bg-white/20 dark:hover:bg-white/10'
              }`}
            >
              <div className="text-2xl mb-1">{b.icon}</div>
              <div className="font-semibold text-sm leading-tight">{b.name}</div>
              <div className="text-xs opacity-70 mt-1">{b.desc}</div>
            </button>
          ))}
        </div>
      );
    }

    function CupScene({ biscuit, teaTemp, dunkTime, isDunking, crumbs }) {
      const depth = (dunkTime / 15) * 58;
      const teaColor = useMemo(() => {
        const t = (teaTemp - 20) / 80;
        const r = Math.round(245 + t * (123 - 245));
        const g = Math.round(200 + t * (63 - 200));
        const b = Math.round(120 + t * (0 - 120));
        return `rgb(${r}, ${g}, ${b})`;
      }, [teaTemp]);

      return (
        <div className="relative w-full max-w-sm aspect-square mx-auto">
          <svg viewBox="0 0 300 300" className="w-full h-full drop-shadow-2xl">
            <defs>
              <linearGradient id="teaGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor={teaColor} stopOpacity="0.9" />
                <stop offset="100%" stopColor={teaColor} stopOpacity="1" />
              </linearGradient>
            </defs>

            {/* Saucer */}
            <ellipse cx="150" cy="260" rx="110" ry="14" className="fill-slate-200 dark:fill-slate-600" />

            {/* Handle */}
            <path
              d="M220 135 C260 135, 260 195, 220 195"
              fill="none"
              strokeWidth="12"
              strokeLinecap="round"
              className="stroke-slate-300 dark:stroke-slate-600"
            />

            {/* Biscuit */}
            <g transform={`translate(0, ${depth})`}>
              <g className={isDunking ? 'animate-dip' : 'animate-bob'}>
                <circle cx="150" cy="85" r="28" fill={biscuit.color} stroke="rgba(0,0,0,0.2)" strokeWidth="2" />
                <circle cx="150" cy="85" r="22" fill="none" stroke="rgba(0,0,0,0.1)" strokeWidth="1" strokeDasharray="4 4" />
                <circle cx="140" cy="78" r="2" fill="rgba(0,0,0,0.15)" />
                <circle cx="160" cy="80" r="1.5" fill="rgba(0,0,0,0.15)" />
                <circle cx="155" cy="92" r="2" fill="rgba(0,0,0,0.15)" />
                <circle cx="148" cy="72" r="1.5" fill="rgba(0,0,0,0.15)" />
              </g>
            </g>

            {/* Tea liquid */}
            <ellipse cx="150" cy="120" rx="68" ry="14" fill="url(#teaGrad)" className="wave origin-center" />

            {/* Cup body with opening hole */}
            <path
              d="M 80 120 C 80 230, 100 250, 150 250 C 200 250, 220 230, 220 120 Z M 150 120 m -68 0 a 68 16 0 1 0 136 0 a 68 16 0 1 0 -136 0 Z"
              fillRule="evenodd"
              className="fill-slate-100 dark:fill-slate-800"
            />

            {/* Rim */}
            <ellipse cx="150" cy="120" rx="70" ry="16" fill="none" strokeWidth="3" className="stroke-slate-300 dark:stroke-slate-600" />
          </svg>

          {/* Steam */}
          <div className="steam" style={{ top: '30%', left: '38%', width: 24, height: 24, animationDelay: '0s' }} />
          <div className="steam" style={{ top: '30%', left: '46%', width: 18, height: 18, animationDelay: '0.7s' }} />
          <div className="steam" style={{ top: '30%', left: '54%', width: 26, height: 26, animationDelay: '1.4s' }} />
          <div className="steam" style={{ top: '30%', left: '42%', width: 20, height: 20, animationDelay: '2.1s' }} />

          {/* Crumbs */}
          {crumbs.map((c) => (
            <div
              key={c.id}
              className="crumb"
              style={{
                left: c.x,
                top: c.y,
                width: c.size,
                height: c.size,
                backgroundColor: c.color,
                animationDuration: `${c.duration}s`,
                animationDelay: `${c.delay}s`,
              }}
            />
          ))}
        </div>
      );
    }

    function CrumbleMeter({ biscuit, teaTemp, integritySlider, dunkTime, score, status }) {
      const maxT = 15;
      const W = 600;
      const H = 220;
      const pad = 40;
      const tempFactor = teaTemp / 80;
      const x = (t) => pad + (t / maxT) * (W - 2 * pad);
      const y = (v) => H - pad - (v / 100) * (H - 2 * pad);
      const pts = [];
      for (let t = 0; t <= maxT; t += 0.25) {
        const v = Math.max(0, Math.min(100, integritySlider - t * biscuit.absorption * tempFactor));
        pts.push([x(t), y(v)]);
      }
      const linePath = pts.map((p, i) => (i === 0 ? 'M' : 'L') + p.join(',')).join(' ');
      const fillPath = `${linePath} L ${x(maxT)} ${H - pad} L ${x(0)} ${H - pad} Z`;
      const currentIntegrity = Math.max(0, Math.min(100, integritySlider - dunkTime * biscuit.absorption * tempFactor));
      const cx = x(dunkTime);
      const cy = y(currentIntegrity);
      const critical = integritySlider / (biscuit.absorption * tempFactor);
      const criticalClamped = Math.min(maxT, critical);
      const gaugeArc = Math.PI * 80;
      const needleAngle = 180 - (score / 100) * 180;
      const needleRad = (needleAngle * Math.PI) / 180;
      const nx = 100 + 70 * Math.cos(needleRad);
      const ny = 100 + 70 * Math.sin(needleRad);

      return (
        <div className="glass p-6 rounded-2xl">
          <div className="flex flex-col md:flex-row md:items-center justify-between mb-6 gap-4">
            <div>
              <h2 className="text-2xl font-bold">Crumble-o-Meter</h2>
              <p className="text-sm opacity-70">Live structural-integrity forecast.</p>
            </div>
            <div className="text-right md:text-right">
              <div className={`text-4xl font-bold ${status.color}`}>{score}%</div>
              <div className={`text-sm font-semibold uppercase tracking-wider ${status.color}`}>{status.text}</div>
              <div className="text-xs opacity-60 mt-1">Critical time: {criticalClamped.toFixed(1)}s</div>
            </div>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-12 gap-6 items-end">
            {/* Gauge */}
            <div className="md:col-span-4 flex justify-center">
              <svg viewBox="0 0 200 110" className="w-full max-w-[180px]">
                <defs>
                  <linearGradient id="gaugeGrad" x1="0" y1="0" x2="1" y2="0">
                    <stop offset="0%" stopColor="#34d399" />
                    <stop offset="50%" stopColor="#fbbf24" />
                    <stop offset="100%" stopColor="#f87171" />
                  </linearGradient>
                </defs>
                <path
                  d="M 20 100 A 80 80 0 0 1 180 100"
                  fill="none"
                  strokeWidth="12"
                  strokeLinecap="round"
                  className="stroke-slate-200 dark:stroke-white/15"
                />
                <path
                  d="M 20 100 A 80 80 0 0 1 180 100"
                  fill="none"
                  stroke="url(#gaugeGrad)"
                  strokeWidth="12"
                  strokeLinecap="round"
                  strokeDasharray={gaugeArc}
                  strokeDashoffset={gaugeArc - (gaugeArc * score) / 100}
                />
                <line x1="100" y1="100" x2={nx} y2={ny} stroke="#f8fafc" strokeWidth="4" strokeLinecap="round" />
                <circle cx="100" cy="100" r="6" fill="#f8fafc" />
              </svg>
            </div>

            {/* Graph */}
            <div className="md:col-span-8">
              <svg viewBox={`0 0 ${W} ${H}`} className="w-full h-auto">
                <defs>
                  <linearGradient id="curveFill" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stopColor={status.stroke} stopOpacity="0.35" />
                    <stop offset="100%" stopColor={status.stroke} stopOpacity="0" />
                  </linearGradient>
                </defs>

                {/* Axes */}
                <line x1={pad} y1={H - pad} x2={W - pad} y2={H - pad} strokeWidth="2" className="stroke-slate-300 dark:stroke-white/20" />
                <line x1={pad} y1={pad} x2={pad} y2={H - pad} strokeWidth="2" className="stroke-slate-300 dark:stroke-white/20" />

                {/* Grid */}
                {[0, 25, 50, 75, 100].map((v) => (
                  <line key={v} x1={pad} y1={y(v)} x2={W - pad} y2={y(v)} strokeDasharray="4 4" className="stroke-slate-200 dark:stroke-white/10" />
                ))}
                {[0, 5, 10, 15].map((t) => (
                  <line key={t} x1={x(t)} y1={pad} x2={x(t)} y2={H - pad} strokeDasharray="4 4" className="stroke-slate-200 dark:stroke-white/10" />
                ))}

                {/* Curve fill and line */}
                <path d={fillPath} fill="url(#curveFill)" />
                <path d={linePath} fill="none" stroke={status.stroke} strokeWidth="4" strokeLinecap="round" strokeLinejoin="round" />

                {/* Current marker */}
                <circle cx={cx} cy={cy} r="14" fill="none" stroke={status.stroke} strokeWidth="2" strokeOpacity="0.5" />
                <circle cx={cx} cy={cy} r="8" fill={status.stroke} stroke="#fff" strokeWidth="3" />

                {/* Labels */}
                <text x={pad} y={pad - 10} fontSize="12" className="fill-slate-500 dark:fill-slate-300">Integrity %</text>
                <text x={W - pad} y={H - pad + 20} fontSize="12" textAnchor="end" className="fill-slate-500 dark:fill-slate-300">Time (s)</text>
                <text x={x(0)} y={H - pad + 20} fontSize="12" textAnchor="middle" className="fill-slate-500 dark:fill-slate-300">0s</text>
                <text x={x(15)} y={H - pad + 20} fontSize="12" textAnchor="middle" className="fill-slate-500 dark:fill-slate-300">15s</text>
              </svg>
            </div>
          </div>
        </div>
      );
    }

    function HelpOverlay({ onClose }) {
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm p-4" onClick={onClose}>
          <div className="glass max-w-md w-full p-6 rounded-2xl" onClick={(e) => e.stopPropagation()}>
            <h2 className="text-2xl font-bold mb-4">Keyboard Shortcuts</h2>
            <div className="grid grid-cols-2 gap-3 text-sm">
              <div className="flex items-center gap-2"><span className="kbd">1‑4</span> Select biscuit</div>
              <div className="flex items-center gap-2"><span className="kbd">↑/↓</span> Adjust temperature</div>
              <div className="flex items-center gap-2"><span className="kbd">←/→</span> Adjust dunk time</div>
              <div className="flex items-center gap-2"><span className="kbd">Space</span> Dunk it</div>
              <div className="flex items-center gap-2"><span className="kbd">T</span> Toggle theme</div>
              <div className="flex items-center gap-2"><span className="kbd">H</span> Show help</div>
              <div className="flex items-center gap-2"><span className="kbd">R</span> Reset</div>
              <div className="flex items-center gap-2"><span className="kbd">Esc</span> Close help</div>
            </div>
            <button onClick={onClose} className="mt-6 w-full py-2.5 rounded-xl bg-gradient-to-r from-amber-500 to-orange-600 text-white font-bold shadow-lg hover:scale-[1.02] active:scale-95 transition">Close</button>
          </div>
        </div>
      );
    }

    function Background() {
      return (
        <>
          <div className="fixed inset-0 -z-20 bg-slate-100 dark:bg-slate-900 transition-colors duration-500" />
          <div className="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
            <div className="orb orb-1" />
            <div className="orb orb-2" />
            <div className="orb orb-3" />
          </div>
        </>
      );
    }

    function App() {
      const [dark, setDark] = useState(true);
      const [biscuitIndex, setBiscuitIndex] = useState(0);
      const [teaTemp, setTeaTemp] = useState(85);
      const [dunkTime, setDunkTime] = useState(3);
      const [integritySlider, setIntegritySlider] = useState(100);
      const [isDunking, setIsDunking] = useState(false);
      const [crumbs, setCrumbs] = useState([]);
      const [helpOpen, setHelpOpen] = useState(false);
      const prevOver = useRef(false);

      const biscuit = biscuits[biscuitIndex];
      const tempFactor = teaTemp / 80;
      const rawIntegrity = integritySlider - dunkTime * biscuit.absorption * tempFactor;
      const finalIntegrity = Math.max(0, Math.min(100, rawIntegrity));
      const score = Math.round(finalIntegrity);
      const isOverDunked = finalIntegrity <= 0;
      const status = getStatus(score);

      const addCrumbs = useCallback(() => {
        const burst = [];
        for (let i = 0; i < 22; i++) {
          burst.push({
            id: Math.random().toString(36).slice(2),
            x: 35 + Math.random() * 30 + '%',
            y: 28 + Math.random() * 12 + '%',
            size: 3 + Math.random() * 6,
            color: biscuit.color,
            duration: 0.7 + Math.random() * 0.9,
            delay: Math.random() * 0.3,
          });
        }
        setCrumbs((prev) => [...prev, ...burst]);
        setTimeout(() => {
          setCrumbs((prev) => prev.filter((c) => !burst.find((b) => b.id === c.id)));
        }, 2200);
      }, [biscuit]);

      const handleDunk = useCallback(() => {
        if (isDunking) return;
        setIsDunking(true);
        if (finalIntegrity <= 0) {
          setTimeout(addCrumbs, 600);
        }
        setTimeout(() => setIsDunking(false), 1500);
      }, [isDunking, finalIntegrity, addCrumbs]);

      const reset = useCallback(() => {
        setBiscuitIndex(0);
        setTeaTemp(85);
        setDunkTime(3);
        setIntegritySlider(100);
        setIsDunking(false);
        setCrumbs([]);
        setHelpOpen(false);
      }, []);

      useEffect(() => {
        if (dark) document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
      }, [dark]);

      useEffect(() => {
        if (isOverDunked && !prevOver.current) addCrumbs();
        prevOver.current = isOverDunked;
      }, [isOverDunked, addCrumbs]);

      useEffect(() => {
        const onKey = (e) => {
          if (['INPUT', 'TEXTAREA', 'SELECT'].includes(e.target.tagName)) return;
          if (e.key === 'h') setHelpOpen(true);
          if (e.key === 'Escape') setHelpOpen(false);
          if (e.key === 't') setDark((d) => !d);
          if (e.key === ' ') {
            e.preventDefault();
            handleDunk();
          }
          if (e.key === 'r') reset();
          if (e.key === '1') setBiscuitIndex(0);
          if (e.key === '2') setBiscuitIndex(1);
          if (e.key === '3') setBiscuitIndex(2);
          if (e.key === '4') setBiscuitIndex(3);
          if (e.key === 'ArrowUp') setTeaTemp((t) => Math.min(100, t + 5));
          if (e.key === 'ArrowDown') setTeaTemp((t) => Math.max(20, t - 5));
          if (e.key === 'ArrowRight') setDunkTime((t) => Math.min(15, +(t + 1).toFixed(1)));
          if (e.key === 'ArrowLeft') setDunkTime((t) => Math.max(0, +(t - 1).toFixed(1)));
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [handleDunk, reset]);

      return (
        <div className="relative min-h-screen text-slate-800 dark:text-slate-100 transition-colors duration-500">
          <Background />
          <header className="px-6 py-8 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 max-w-7xl mx-auto">
            <div>
              <h1 className="text-4xl md:text-5xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-amber-300 to-orange-500">
                Tea Dunkability Simulator
              </h1>
              <p className="mt-2 text-slate-600 dark:text-slate-400">Scientifically optimize your biscuit submersion.</p>
            </div>
            <div className="flex items-center gap-3">
              <button
                onClick={() => setHelpOpen(true)}
                className="glass px-4 py-2 rounded-full text-sm font-semibold hover:bg-white/30 dark:hover:bg-white/15 transition"
              >
                Shortcuts
              </button>
              <button
                onClick={() => setDark((d) => !d)}
                className="glass p-2.5 rounded-full text-lg hover:bg-white/30 dark:hover:bg-white/15 transition"
                aria-label="Toggle theme"
              >
                {dark ? '☀️' : '🌙'}
              </button>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-6 pb-12 grid grid-cols-1 lg:grid-cols-12 gap-6">
            <section className="lg:col-span-5 space-y-6">
              <div className={`glass p-6 rounded-2xl transition ${isOverDunked ? 'ring-2 ring-red-500/40' : ''}`}>
                <CupScene
                  biscuit={biscuit}
                  teaTemp={teaTemp}
                  dunkTime={dunkTime}
                  isDunking={isDunking}
                  crumbs={crumbs}
                />
                <div className="mt-6 text-center">
                  <div className={`text-5xl font-bold ${status.color}`}>{score}%</div>
                  <div className={`text-sm uppercase tracking-widest font-semibold mt-1 ${status.color}`}>{status.text}</div>
                  <div className="text-xs opacity-60 mt-2">
                    {isOverDunked
                      ? 'The biscuit has disintegrated. A moment of silence, please.'
                      : `Dunkability score: ${score} / 100`}
                  </div>
                </div>
                <div className="mt-6 flex gap-3">
                  <button
                    onClick={handleDunk}
                    className="flex-1 py-3.5 rounded-xl bg-gradient-to-r from-amber-500 to-orange-600 text-white font-bold shadow-lg hover:scale-[1.02] active:scale-95 transition"
                  >
                    {isDunking ? 'Dunking…' : 'Dunk It!'}
                  </button>
                  <button
                    onClick={reset}
                    className="px-5 py-3.5 rounded-xl glass font-semibold hover:bg-white/30 dark:hover:bg-white/15 transition"
                  >
                    Reset
                  </button>
                </div>
              </div>
            </section>

            <section className="lg:col-span-7 grid grid-cols-1 md:grid-cols-2 gap-6">
              <div className="glass p-6 rounded-2xl md:col-span-2">
                <h3 className="text-lg font-bold mb-4">Biscuit Type</h3>
                <BiscuitSelector biscuits={biscuits} selected={biscuitIndex} onSelect={setBiscuitIndex} />
              </div>

              <div className="glass p-6 rounded-2xl">
                <Slider
                  label="Tea Temperature"
                  value={teaTemp}
                  min={20}
                  max={100}
                  step={1}
                  unit="°C"
                  accent="#f59e0b"
                  onChange={setTeaTemp}
                />
              </div>
              <div className="glass p-6 rounded-2xl">
                <Slider
                  label="Dunk Time"
                  value={dunkTime}
                  min={0}
                  max={15}
                  step={0.1}
                  unit="s"
                  accent="#f97316"
                  onChange={setDunkTime}
                />
              </div>
              <div className="glass p-6 rounded-2xl">
                <Slider
                  label="Structural Integrity"
                  value={integritySlider}
                  min={0}
                  max={100}
                  step={1}
                  unit="%"
                  accent="#34d399"
                  onChange={setIntegritySlider}
                />
              </div>

              <div className="md:col-span-2">
                <CrumbleMeter
                  biscuit={biscuit}
                  teaTemp={teaTemp}
                  integritySlider={integritySlider}
                  dunkTime={dunkTime}
                  score={score}
                  status={status}
                />
              </div>

              <div className="glass p-4 rounded-xl md:col-span-2">
                <div className="flex flex-wrap gap-3 text-xs items-center">
                  <span className="kbd">1‑4</span>
                  <span className="opacity-80">Biscuit</span>
                  <span className="kbd">↑/↓</span>
                  <span className="opacity-80">Temp</span>
                  <span className="kbd">←/→</span>
                  <span className="opacity-80">Time</span>
                  <span className="kbd">Space</span>
                  <span className="opacity-80">Dunk</span>
                  <span className="kbd">T</span>
                  <span className="opacity-80">Theme</span>
                  <span className="kbd">H</span>
                  <span className="opacity-80">Help</span>
                  <span className="kbd">R</span>
                  <span className="opacity-80">Reset</span>
                </div>
              </div>
            </section>
          </main>

          {helpOpen && <HelpOverlay onClose={() => setHelpOpen(false)} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
  <script>
    (function () {
      const source = document.getElementById('app-jsx').textContent;
      const { code } = Babel.transform(source, {
        presets: [['react', { runtime: 'classic' }]],
        sourceType: 'script'
      });
      const script = document.createElement('script');
      script.type = 'text/javascript';
      script.textContent = code;
      document.body.appendChild(script);
    })();
  </script>
</body>
</html>
