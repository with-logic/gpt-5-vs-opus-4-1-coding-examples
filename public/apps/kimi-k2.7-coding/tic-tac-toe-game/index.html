<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#c5a059" />
  <title>SPQR Tic Tac Toe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold: #c5a059;
      --gold-light: #e4cc8a;
      --gold-dark: #9a7b3d;
      --red: #8b2635;
      --red-glow: rgba(139, 38, 53, 0.35);
      --shadow-soft: 0 8px 24px rgba(0, 0, 0, 0.12);
      --radius: 1.2vmin;
      --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .theme-day {
      --bg-1: #fdfcf8;
      --bg-2: #e8e4da;
      --text: #2d2a26;
      --text-muted: #6b655a;
      --accent: #c5a059;
      --board-bg: #efe9de;
      --cell-bg: rgba(255, 255, 252, 0.85);
      --cell-bg-win: rgba(196, 160, 89, 0.22);
      --line-color: #c5a059;
      --shadow-color: rgba(0, 0, 0, 0.08);
      --crest-fill: #2d2a26;
      --mark-x: #8b2635;
      --mark-o: #3a4a5c;
    }

    .theme-night {
      --bg-1: #0f1116;
      --bg-2: #1a1d26;
      --text: #e6d9b8;
      --text-muted: #9e9178;
      --accent: #d4b05a;
      --board-bg: #161a22;
      --cell-bg: rgba(30, 35, 45, 0.85);
      --cell-bg-win: rgba(212, 176, 90, 0.18);
      --line-color: #d4b05a;
      --shadow-color: rgba(0, 0, 0, 0.45);
      --crest-fill: #e6d9b8;
      --mark-x: #e4a2a2;
      --mark-o: #a8b8c8;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Lato', system-ui, sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      background:
        radial-gradient(circle at 18% 25%, rgba(255,255,255,0.22) 0%, transparent 22%),
        radial-gradient(circle at 82% 75%, rgba(255,255,255,0.14) 0%, transparent 22%),
        linear-gradient(160deg, var(--bg-1), var(--bg-2));
      color: var(--text);
      transition: background 0.4s ease, color 0.4s ease;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.07;
      background:
        repeating-radial-gradient(circle at 50% 110%, transparent 0, transparent 6vmin, var(--line-color) 6.2vmin, var(--line-color) 6.4vmin, transparent 6.6vmin, transparent 12vmin);
      mask-image: linear-gradient(to top, black 0%, transparent 55%);
      -webkit-mask-image: linear-gradient(to top, black 0%, transparent 55%);
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 900px;
      padding: clamp(1rem, 3vmin, 2rem);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(1rem, 2.5vmin, 2rem);
      flex: 1;
      overflow-y: auto;
    }

    header {
      display: flex;
      align-items: center;
      gap: clamp(0.8rem, 2vmin, 1.2rem);
      text-align: center;
      width: 100%;
      justify-content: center;
    }

    .crest {
      width: clamp(44px, 9vmin, 72px);
      height: clamp(44px, 9vmin, 72px);
      flex-shrink: 0;
      filter: drop-shadow(0 2px 4px var(--shadow-color));
    }
    .crest svg { width: 100%; height: 100%; display: block; }
    .crest path { fill: var(--crest-fill); transition: fill 0.4s ease; }

    .title-block h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.6rem, 5.5vmin, 2.6rem);
      font-weight: 700;
      margin: 0;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      line-height: 1.05;
      background: linear-gradient(90deg, var(--accent), var(--gold-light), var(--accent));
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 1px 2px rgba(0,0,0,0.05);
      animation: shimmer 6s linear infinite;
    }
    .title-block p {
      margin: 0.2rem 0 0;
      font-size: clamp(0.75rem, 2.2vmin, 0.95rem);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    @keyframes shimmer {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .controls {
      display: flex;
      gap: clamp(0.6rem, 1.8vmin, 1rem);
      justify-content: center;
      flex-wrap: wrap;
      width: 100%;
    }

    .controls button, .dialog-actions button, .segmented button {
      font-family: 'Cinzel', serif;
      font-weight: 700;
      letter-spacing: 0.05em;
      border: 2px solid var(--gold-dark);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      border-radius: 999px;
      padding: 0.55rem 1.1rem;
      font-size: clamp(0.8rem, 2.4vmin, 1rem);
      cursor: pointer;
      box-shadow: 0 2px 6px var(--shadow-color);
      transition: transform var(--transition), box-shadow var(--transition), background var(--transition), border-color var(--transition);
      outline: none;
      position: relative;
      min-width: 7.5rem;
      text-align: center;
    }
    .controls button:hover, .controls button:focus-visible,
    .dialog-actions button:hover, .dialog-actions button:focus-visible,
    .segmented button:hover, .segmented button:focus-visible {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px var(--shadow-color), 0 0 0 3px rgba(197, 160, 89, 0.25);
      border-color: var(--gold);
    }
    .controls button:active, .dialog-actions button:active, .segmented button:active { transform: translateY(1px); }

    .controls button.primary, .dialog-actions button.primary, .segmented button.active {
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      color: #1a1512;
      border-color: var(--gold);
      text-shadow: 0 1px 0 rgba(255,255,255,0.25);
    }
    .segmented button.active {
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.15), 0 0 0 2px var(--gold-light);
    }

    .status-banner {
      min-height: 2.4rem;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-family: 'Cinzel', serif;
      font-size: clamp(1rem, 3.2vmin, 1.45rem);
      font-weight: 700;
      letter-spacing: 0.04em;
      padding: 0.4rem 1.2rem;
      border-radius: 999px;
      background: rgba(197, 160, 89, 0.12);
      border: 1px solid rgba(197, 160, 89, 0.35);
      color: var(--text-muted);
      width: min(90%, 540px);
      transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease, transform 0.3s ease;
    }
    .status-banner.win {
      color: var(--gold);
      background: rgba(197, 160, 89, 0.22);
      border-color: var(--gold);
      transform: scale(1.05);
    }
    .status-banner.draw { color: var(--text-muted); }

    .arena {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      flex: 1;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: clamp(0.6rem, 1.4vmin, 1rem);
      width: min(85vmin, 520px);
      aspect-ratio: 1 / 1;
      padding: clamp(0.6rem, 1.4vmin, 1rem);
      background:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,0.12) 0%, transparent 30%),
        radial-gradient(circle at 80% 70%, rgba(255,255,255,0.08) 0%, transparent 30%),
        var(--board-bg);
      border-radius: clamp(1.2rem, 3vmin, 2rem);
      border: 1px solid rgba(197, 160, 89, 0.18);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.25),
        0 12px 40px var(--shadow-color);
      transition: background 0.4s ease, box-shadow 0.4s ease;
    }

    .cell {
      appearance: none;
      border: none;
      background: var(--cell-bg);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cinzel', serif;
      font-size: clamp(3.2rem, 14vmin, 7rem);
      font-weight: 700;
      line-height: 1;
      color: var(--text);
      cursor: pointer;
      padding: 0;
      position: relative;
      overflow: hidden;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.18), 0 2px 6px var(--shadow-color);
      transition: transform var(--transition), background var(--transition), box-shadow var(--transition), border-color var(--transition);
      outline: none;
      user-select: none;
    }
    .cell:hover:not(:disabled):not(.win-cell) {
      transform: scale(1.03);
      box-shadow: 0 4px 14px rgba(197, 160, 89, 0.25), inset 0 1px 0 rgba(255,255,255,0.2);
      z-index: 2;
    }
    .cell:active:not(:disabled) { transform: scale(0.97); }
    .cell:focus-visible { box-shadow: 0 0 0 3px rgba(197, 160, 89, 0.45); z-index: 2; }
    .cell:disabled { cursor: default; }

    .mark-x { color: var(--mark-x); }
    .mark-o { color: var(--mark-o); }
    .mark-svg { width: 60%; height: 60%; display: block; }
    .mark-svg path { fill: currentColor; }

    .cell.win-cell {
      background: var(--cell-bg-win);
      box-shadow: 0 0 24px rgba(197, 160, 89, 0.45), inset 0 0 0 2px var(--gold);
      z-index: 3;
      animation: pulse-gold 1.4s ease-in-out infinite;
    }
    .cell.win-cell .mark-x, .cell.win-cell .mark-o { color: var(--gold); text-shadow: 0 0 12px rgba(197, 160, 89, 0.6); }
    .cell.win-cell .mark-svg path { fill: var(--gold); }

    @keyframes pulse-gold {
      0%, 100% { box-shadow: 0 0 20px rgba(197, 160, 89, 0.4), inset 0 0 0 2px var(--gold); }
      50% { box-shadow: 0 0 34px rgba(197, 160, 89, 0.65), inset 0 0 0 2px var(--gold-light); }
    }

    .scoreboard {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: clamp(0.6rem, 2vmin, 1rem);
      width: min(90%, 520px);
    }
    .score {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0.6rem 0.2rem;
      border-radius: 1rem;
      background: var(--cell-bg);
      box-shadow: 0 4px 12px var(--shadow-color);
      border: 1px solid rgba(197, 160, 89, 0.2);
      transition: background 0.4s ease, border-color 0.3s ease, transform 0.3s ease;
    }
    .score.active { border-color: var(--gold); transform: translateY(-2px); }
    .score .label {
      font-family: 'Cinzel', serif;
      font-size: clamp(0.75rem, 2.2vmin, 0.9rem);
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      text-transform: uppercase;
    }
    .score .value {
      font-size: clamp(1.3rem, 4vmin, 1.8rem);
      font-weight: 700;
      color: var(--text);
      margin-top: 0.2rem;
    }
    .score.x .value { color: var(--mark-x); }
    .score.o .value { color: var(--mark-o); }
    .score.draw .value { color: var(--gold); }

    .customize-dialog {
      border: none;
      border-radius: 1.4rem;
      padding: 0;
      background: var(--bg-1);
      color: var(--text);
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      width: min(90vw, 420px);
      overflow: hidden;
      transition: background 0.4s ease, color 0.4s ease;
    }
    .customize-dialog::backdrop {
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    .customize-dialog form { padding: clamp(1.2rem, 4vmin, 1.8rem); display: flex; flex-direction: column; gap: 1.2rem; }
    .customize-dialog h2 {
      font-family: 'Cinzel', serif;
      margin: 0;
      font-size: clamp(1.2rem, 4vmin, 1.5rem);
      text-align: center;
      letter-spacing: 0.06em;
      color: var(--gold);
    }
    .option-group { display: flex; flex-direction: column; gap: 0.5rem; }
    .option-group label {
      font-family: 'Cinzel', serif;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .segmented { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .segmented button { flex: 1; min-width: 0; padding: 0.5rem 0.6rem; font-size: clamp(0.75rem, 2.2vmin, 0.9rem); border-radius: 0.8rem; }

    .dialog-actions { display: flex; gap: 0.8rem; justify-content: center; margin-top: 0.4rem; }
    .dialog-actions button { min-width: 5.5rem; }
    .dialog-actions button.primary { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: #1a1512; }

    #confetti {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 50;
    }

    @media (max-width: 400px) {
      .app { padding: 0.8rem; gap: 0.8rem; }
      .controls button { padding: 0.5rem 0.8rem; min-width: 5.5rem; }
      .title-block p { display: none; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body class="theme-day">
  <div class="app" role="application" aria-label="Roman Empire themed Tic Tac Toe">
    <header>
      <div class="crest" aria-hidden="true">
        <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
          <path d="M32 2 L38 10 H52 L48 22 L56 28 L48 36 L54 50 L40 46 L32 56 L24 46 L10 50 L16 36 L8 28 L16 22 L12 10 H26 Z" />
          <text x="32" y="33" text-anchor="middle" dominant-baseline="middle" font-family="Cinzel, serif" font-size="12" font-weight="700" style="fill: var(--bg-1); letter-spacing: 0.04em;">SPQR</text>
        </svg>
      </div>
      <div class="title-block">
        <h1>SPQR Tic Tac Toe</h1>
        <p>The Colosseum Arena</p>
      </div>
    </header>

    <nav class="controls" aria-label="Game controls">
      <button id="newRoundBtn" type="button">New Round</button>
      <button id="customizeBtn" type="button">Customize</button>
      <button id="resetScoresBtn" type="button">Reset Scores</button>
    </nav>

    <div id="statusBanner" class="status-banner" role="status" aria-live="polite">X begins the battle</div>

    <main class="arena">
      <div id="board" class="board" role="grid" aria-label="Tic Tac Toe board"></div>
    </main>

    <section class="scoreboard" aria-label="Scores">
      <div class="score x" id="scoreXWrap"><span class="label">X</span><span class="value" id="scoreX">0</span></div>
      <div class="score draw" id="scoreDrawWrap"><span class="label">Draws</span><span class="value" id="scoreDraw">0</span></div>
      <div class="score o" id="scoreOWrap"><span class="label">O</span><span class="value" id="scoreO">0</span></div>
    </section>
  </div>

  <dialog id="customizeDialog" class="customize-dialog" aria-labelledby="customizeTitle">
    <form id="customizeForm" method="dialog" onsubmit="return false;">
      <h2 id="customizeTitle">Customize the Arena</h2>

      <div class="option-group">
        <label>Theme</label>
        <div class="segmented" data-group="theme">
          <button type="button" data-val="day" class="opt active">Marble Day</button>
          <button type="button" data-val="night" class="opt">Night Legion</button>
        </div>
      </div>

      <div class="option-group">
        <label>Glyphs</label>
        <div class="segmented" data-group="glyph">
          <button type="button" data-val="standard" class="opt active">X / O</button>
          <button type="button" data-val="roman" class="opt">Gladius / Laurel</button>
        </div>
      </div>

      <div class="option-group">
        <label>Mode</label>
        <div class="segmented" data-group="mode">
          <button type="button" data-val="ai" class="opt active">vs AI</button>
          <button type="button" data-val="2p" class="opt">2 Player</button>
        </div>
      </div>

      <div class="option-group">
        <label>First Move</label>
        <div class="segmented" data-group="first">
          <button type="button" data-val="X" class="opt active">X</button>
          <button type="button" data-val="O" class="opt">O</button>
        </div>
      </div>

      <div class="option-group" id="aiGroup">
        <label>AI Discipline</label>
        <div class="segmented" data-group="ai">
          <button type="button" data-val="perfect" class="opt active">Perfect</button>
          <button type="button" data-val="pragmatic" class="opt">Pragmatic</button>
          <button type="button" data-val="reckless" class="opt">Reckless</button>
        </div>
      </div>

      <div class="dialog-actions">
        <button id="applyBtn" class="primary" type="button">Apply</button>
        <button id="closeBtn" type="button">Cancel</button>
      </div>
    </form>
  </dialog>

  <canvas id="confetti" aria-hidden="true"></canvas>

  <script>
    (function() {
      'use strict';

      const SVG_GLADIUS = '<svg class="mark-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M12 2 L14 5 L14 17 L12 20 L10 17 L10 5 Z"/><path d="M7 17 H17 V20 H7 Z"/><path d="M11 20 V22 M13 20 V22"/></svg>';
      const SVG_LAUREL = '<svg class="mark-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M12 2 C10 6 9 10 10 15 C10 17 11 19 12 20 C13 19 14 17 14 15 C15 10 14 6 12 2 Z"/><path d="M2 11 C5 8 9 10 10 12 C9 13 5 15 2 11 Z"/><path d="M22 11 C19 8 15 10 14 12 C15 13 19 15 22 11 Z"/></svg>';

      const WIN_LINES = [
        [0,1,2], [3,4,5], [6,7,8],
        [0,3,6], [1,4,7], [2,5,8],
        [0,4,8], [2,4,6]
      ];

      const state = {
        board: Array(9).fill(null),
        current: 'X',
        gameOver: false,
        winner: null,
        line: null,
        scores: { X: 0, O: 0, D: 0 },
        settings: { theme: 'day', glyph: 'standard', mode: 'ai', first: 'X', ai: 'perfect' },
        aiTurnPending: false
      };

      const els = {
        body: document.body,
        board: document.getElementById('board'),
        status: document.getElementById('statusBanner'),
        scoreX: document.getElementById('scoreX'),
        scoreO: document.getElementById('scoreO'),
        scoreDraw: document.getElementById('scoreDraw'),
        scoreXWrap: document.getElementById('scoreXWrap'),
        scoreOWrap: document.getElementById('scoreOWrap'),
        scoreDrawWrap: document.getElementById('scoreDrawWrap'),
        dialog: document.getElementById('customizeDialog'),
        aiGroup: document.getElementById('aiGroup'),
        confetti: document.getElementById('confetti')
      };

      const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      function init() {
        bindControls();
        bindBoard();
        bindDialog();
        newRound();
      }

      function bindControls() {
        document.getElementById('newRoundBtn').addEventListener('click', newRound);
        document.getElementById('customizeBtn').addEventListener('click', openDialog);
        document.getElementById('resetScoresBtn').addEventListener('click', resetScores);
      }

      function bindBoard() {
        els.board.addEventListener('click', (e) => {
          const cell = e.target.closest('.cell');
          if (!cell || cell.disabled) return;
          const index = Number(cell.dataset.index);
          if (state.board[index] === null && !state.gameOver && !state.aiTurnPending) {
            playMove(index);
          }
        });
      }

      function bindDialog() {
        const groups = els.dialog.querySelectorAll('.segmented');
        groups.forEach(group => {
          group.addEventListener('click', (e) => {
            const btn = e.target.closest('button');
            if (!btn) return;
            group.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if (group.dataset.group === 'mode') {
              els.aiGroup.style.display = btn.dataset.val === 'ai' ? 'flex' : 'none';
            }
          });
        });
        document.getElementById('applyBtn').addEventListener('click', applySettings);
        document.getElementById('closeBtn').addEventListener('click', () => els.dialog.close('cancel'));
        els.dialog.addEventListener('close', () => {
          if (els.dialog.returnValue !== 'apply') {
            syncDialogFromState();
          }
        });
      }

      function openDialog() {
        syncDialogFromState();
        els.dialog.showModal();
      }

      function syncDialogFromState() {
        const groups = els.dialog.querySelectorAll('.segmented');
        groups.forEach(group => {
          const key = group.dataset.group;
          const val = state.settings[key];
          group.querySelectorAll('button').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.val === val);
          });
        });
        els.aiGroup.style.display = state.settings.mode === 'ai' ? 'flex' : 'none';
      }

      function applySettings() {
        const groups = els.dialog.querySelectorAll('.segmented');
        groups.forEach(group => {
          const active = group.querySelector('button.active');
          if (active) {
            state.settings[group.dataset.group] = active.dataset.val;
          }
        });
        els.body.classList.toggle('theme-day', state.settings.theme === 'day');
        els.body.classList.toggle('theme-night', state.settings.theme === 'night');
        els.dialog.close('apply');
        newRound();
      }

      function newRound() {
        state.board.fill(null);
        state.current = state.settings.first;
        state.gameOver = false;
        state.winner = null;
        state.line = null;
        state.aiTurnPending = false;
        render();
        scheduleAiIfNeeded();
      }

      function resetScores() {
        state.scores = { X: 0, O: 0, D: 0 };
        renderScores();
        setStatus('Scores reset — the empire begins anew', 'draw');
      }

      function render() {
        els.board.innerHTML = '';
        state.board.forEach((value, i) => {
          const cell = document.createElement('button');
          cell.className = 'cell';
          cell.setAttribute('role', 'gridcell');
          cell.setAttribute('aria-label', value ? `${labelForPlayer(value)} in cell ${i + 1}` : `Empty cell ${i + 1}`);
          cell.dataset.index = i;
          cell.disabled = state.gameOver || value !== null;
          if (value) {
            cell.innerHTML = markForPlayer(value);
            cell.classList.add(value === 'X' ? 'mark-x' : 'mark-o');
          }
          if (state.line && state.line.includes(i)) {
            cell.classList.add('win-cell');
          }
          els.board.appendChild(cell);
        });
        renderScores();
        updateStatus();
        updateActivePlayer();
      }

      function markForPlayer(player) {
        if (state.settings.glyph === 'standard') {
          return `<span class="mark-${player.toLowerCase()}">${player}</span>`;
        }
        return player === 'X' ? SVG_GLADIUS : SVG_LAUREL;
      }

      function labelForPlayer(player) {
        if (state.settings.glyph === 'standard') return player;
        return player === 'X' ? 'Gladius' : 'Laurel';
      }

      function updateStatus() {
        if (state.gameOver) {
          if (state.winner === 'D') {
            setStatus('Stalemate — the legions are evenly matched', 'draw');
          } else {
            const name = labelForPlayer(state.winner);
            setStatus(`${name} claims victory! Ave ${state.winner}!`, 'win');
          }
        } else {
          const name = labelForPlayer(state.current);
          setStatus(`${name}'s turn — to battle!`, 'turn');
        }
      }

      function setStatus(text, type) {
        els.status.textContent = text;
        els.status.classList.remove('win', 'draw');
        if (type === 'win') els.status.classList.add('win');
        else if (type === 'draw') els.status.classList.add('draw');
      }

      function updateActivePlayer() {
        els.scoreXWrap.classList.toggle('active', !state.gameOver && state.current === 'X');
        els.scoreOWrap.classList.toggle('active', !state.gameOver && state.current === 'O');
        els.scoreDrawWrap.classList.remove('active');
      }

      function renderScores() {
        els.scoreX.textContent = state.scores.X;
        els.scoreO.textContent = state.scores.O;
        els.scoreDraw.textContent = state.scores.D;
      }

      function playMove(index) {
        if (state.board[index] !== null || state.gameOver) return;
        state.board[index] = state.current;
        const result = checkResult(state.board);
        if (result) {
          finishGame(result);
        } else {
          state.current = state.current === 'X' ? 'O' : 'X';
          render();
          scheduleAiIfNeeded();
        }
      }

      function finishGame(result) {
        state.gameOver = true;
        state.winner = result.winner;
        state.line = result.line || null;
        if (result.winner === 'D') {
          state.scores.D++;
        } else {
          state.scores[result.winner]++;
        }
        render();
        if (result.winner !== 'D') {
          triggerConfetti();
        }
      }

      function checkResult(board) {
        for (const line of WIN_LINES) {
          const [a, b, c] = line;
          if (board[a] && board[a] === board[b] && board[a] === board[c]) {
            return { winner: board[a], line };
          }
        }
        if (board.every(c => c !== null)) return { winner: 'D', line: null };
        return null;
      }

      function scheduleAiIfNeeded() {
        if (state.gameOver || state.settings.mode !== 'ai' || state.current !== 'O') return;
        state.aiTurnPending = true;
        const delay = reducedMotion ? 50 : 450 + Math.random() * 350;
        setTimeout(() => {
          if (!state.gameOver) {
            const move = chooseAiMove();
            state.aiTurnPending = false;
            playMove(move);
          }
        }, delay);
      }

      function chooseAiMove() {
        const empty = state.board.map((v, i) => v === null ? i : null).filter(i => i !== null);
        const discipline = state.settings.ai;
        if (empty.length === 0) return -1;

        const winningMove = findImmediateWin('O');
        if (winningMove !== null) return winningMove;

        if (discipline === 'reckless') {
          const blocking = findImmediateWin('X');
          if (blocking !== null && Math.random() < 0.5) return blocking;
          return empty[Math.floor(Math.random() * empty.length)];
        }

        if (discipline === 'pragmatic') {
          const blocking = findImmediateWin('X');
          if (blocking !== null && Math.random() < 0.85) return blocking;
        }

        const moves = [];
        for (const i of empty) {
          const boardCopy = [...state.board];
          boardCopy[i] = 'O';
          const score = minimax(boardCopy, 0, false);
          moves.push({ i, score });
        }
        moves.sort((a, b) => b.score - a.score);

        if (discipline === 'perfect') return moves[0].i;

        const top = moves.slice(0, Math.min(2, moves.length));
        const weights = top.map((m, idx) => (idx === 0 ? 0.75 : 0.25));
        let r = Math.random();
        for (let j = 0; j < top.length; j++) {
          r -= weights[j];
          if (r <= 0) return top[j].i;
        }
        return top[0].i;
      }

      function findImmediateWin(player) {
        for (const line of WIN_LINES) {
          const values = line.map(i => state.board[i]);
          const count = values.filter(v => v === player).length;
          const emptyIdx = line.find(i => state.board[i] === null);
          if (count === 2 && emptyIdx !== undefined) return emptyIdx;
        }
        return null;
      }

      function minimax(board, depth, isMaximizing) {
        const result = checkResult(board);
        if (result) {
          if (result.winner === 'O') return 10 - depth;
          if (result.winner === 'X') return depth - 10;
          return 0;
        }
        const player = isMaximizing ? 'O' : 'X';
        let best = isMaximizing ? -Infinity : Infinity;
        for (let i = 0; i < 9; i++) {
          if (board[i] === null) {
            board[i] = player;
            const score = minimax(board, depth + 1, !isMaximizing);
            board[i] = null;
            best = isMaximizing ? Math.max(best, score) : Math.min(best, score);
          }
        }
        return best;
      }

      function triggerConfetti() {
        if (reducedMotion) return;
        const canvas = els.confetti;
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;
        const particles = [];
        const colors = ['#c5a059', '#e4cc8a', '#9a7b3d', '#8b2635', '#fdfcf8', '#d4b05a'];
        for (let i = 0; i < 120; i++) {
          particles.push({
            x: width / 2,
            y: height / 2 - 40,
            vx: (Math.random() - 0.5) * 16,
            vy: (Math.random() - 1.2) * 14,
            size: Math.random() * 6 + 3,
            color: colors[Math.floor(Math.random() * colors.length)],
            rotation: Math.random() * Math.PI * 2,
            vr: (Math.random() - 0.5) * 0.3,
            alpha: 1,
            drag: 0.97,
            gravity: 0.35 + Math.random() * 0.2
          });
        }
        let start = performance.now();
        function draw(now) {
          ctx.clearRect(0, 0, width, height);
          let alive = false;
          for (const p of particles) {
            if (p.alpha <= 0) continue;
            alive = true;
            p.vx *= p.drag;
            p.vy += p.gravity;
            p.x += p.vx;
            p.y += p.vy;
            p.rotation += p.vr;
            p.alpha -= 0.006;
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rotation);
            ctx.globalAlpha = Math.max(0, p.alpha);
            ctx.fillStyle = p.color;
            ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
            ctx.restore();
          }
          if (alive && now - start < 4500) {
            requestAnimationFrame(draw);
          } else {
            ctx.clearRect(0, 0, width, height);
          }
        }
        requestAnimationFrame(draw);
      }

      window.addEventListener('resize', () => {
        els.confetti.width = window.innerWidth;
        els.confetti.height = window.innerHeight;
      });

      init();
    })();
  </script>
</body>
</html>
