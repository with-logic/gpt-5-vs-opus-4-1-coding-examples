<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Theatre</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #050505;
      color: #fff;
      font-family: Georgia, "Times New Roman", serif;
    }
    #root { height: 100%; }
    .theatre {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }
    .stage-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      z-index: 1;
    }
    .spotlight-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 4;
      background:
        radial-gradient(circle at 25% 20%, rgba(255,255,255,0.12) 0%, transparent 32%),
        radial-gradient(circle at 75% 25%, rgba(255,255,255,0.10) 0%, transparent 28%);
      mix-blend-mode: overlay;
      animation: pulse 6s ease-in-out infinite alternate;
    }
    @keyframes pulse {
      0% { opacity: 0.75; }
      100% { opacity: 1; }
    }
    .proscenium {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 5;
      border: 14px solid;
      border-image: linear-gradient(135deg, #4a0e0e 0%, #b8860b 25%, #4a0e0e 50%, #b8860b 75%, #4a0e0e 100%) 1;
      box-shadow: inset 0 0 100px rgba(0,0,0,0.75);
    }
    .grain {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 6;
      opacity: 0.07;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    }
    .glass {
      background: rgba(20, 20, 30, 0.32);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.35);
    }
    .theatre-title {
      position: absolute;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 30;
      font-size: 0.85rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      opacity: 0.75;
      text-shadow: 0 2px 10px rgba(0,0,0,0.6);
    }
    .forecast-card {
      position: absolute;
      top: 56px;
      left: 28px;
      z-index: 30;
      padding: 24px 28px;
      min-width: 280px;
    }
    .forecast-card h1 {
      margin: 0;
      font-size: 0.95rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0.8;
    }
    .forecast-card .date {
      margin: 4px 0 18px;
      font-size: 0.9rem;
      opacity: 0.65;
    }
    .forecast-card .temp-row {
      display: flex;
      align-items: baseline;
      gap: 14px;
    }
    .forecast-card .temp {
      font-size: 4.5rem;
      font-weight: 300;
      line-height: 1;
      text-shadow: 0 2px 18px rgba(0,0,0,0.35);
    }
    .forecast-card .condition {
      font-size: 1.15rem;
      opacity: 0.9;
    }
    .forecast-card .icon {
      width: 42px;
      height: 42px;
      margin-bottom: 8px;
      opacity: 0.9;
    }
    .forecast-card .stats {
      display: flex;
      gap: 28px;
      margin-top: 18px;
    }
    .forecast-card .stats div {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .forecast-card .stats span {
      font-size: 0.7rem;
      opacity: 0.6;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }
    .forecast-card .stats b {
      font-size: 1rem;
      font-weight: 600;
    }
    .subtitle {
      position: absolute;
      bottom: 184px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 30;
      font-size: 1.4rem;
      font-style: italic;
      text-align: center;
      max-width: 80vw;
      text-shadow: 0 2px 14px rgba(0,0,0,0.7);
      pointer-events: none;
      min-height: 1.6em;
    }
    .subtitle .cursor {
      animation: blink 1.1s step-end infinite;
      margin-left: 2px;
    }
    @keyframes blink { 50% { opacity: 0; } }
    .control-panel {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 30;
      display: flex;
      align-items: center;
      gap: 28px;
      padding: 18px 26px;
      max-width: 92vw;
      flex-wrap: wrap;
      justify-content: center;
    }
    .sliders {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
    }
    .slider-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 130px;
    }
    .slider-group label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      opacity: 0.85;
      display: flex;
      justify-content: space-between;
    }
    .slider-group input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: rgba(255,255,255,0.2);
      outline: none;
      cursor: pointer;
    }
    .slider-group input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 12px rgba(255,255,255,0.5);
      cursor: pointer;
      transition: transform 0.1s;
    }
    .slider-group input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.1); }
    .slider-group input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #fff;
      border: none;
      box-shadow: 0 0 12px rgba(255,255,255,0.5);
      cursor: pointer;
    }
    .toggles {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .toggles button {
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.22);
      color: #fff;
      border-radius: 12px;
      padding: 10px 16px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.85rem;
      transition: all 0.2s ease;
    }
    .toggles button:hover { background: rgba(255,255,255,0.2); transform: translateY(-1px); }
    .toggles button.active { background: rgba(255,255,255,0.9); color: #111; border-color: rgba(255,255,255,0.9); }
    .curtains {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 50;
    }
    .curtain {
      position: absolute;
      top: 0;
      width: 55%;
      height: 100%;
      transition: transform 1.2s cubic-bezier(0.22, 1, 0.36, 1);
      background:
        repeating-linear-gradient(90deg, rgba(0,0,0,0.12) 0px, rgba(0,0,0,0.12) 2px, transparent 4px),
        repeating-linear-gradient(90deg, #4a0e0e 0, #7a1f1f 24px, #4a0e0e 48px);
      box-shadow: inset -14px 0 50px rgba(0,0,0,0.55);
    }
    .curtain.left { left: 0; transform: translateX(0); }
    .curtain.left.open { transform: translateX(-96%); }
    .curtain.right { right: 0; transform: translateX(0); }
    .curtain.right.open { transform: translateX(96%); }
    .curtain-top {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 8vh;
      background: linear-gradient(to bottom, #3d0c0c, #6b1a1a);
      box-shadow: 0 12px 40px rgba(0,0,0,0.55);
      z-index: 51;
    }
    .curtain-tassel {
      position: absolute;
      top: 8vh;
      width: 18px;
      height: 120px;
      background: linear-gradient(to right, #3d0c0c, #7a1f1f, #3d0c0c);
      border-radius: 0 0 40px 40px;
      transition: transform 1.2s cubic-bezier(0.22, 1, 0.36, 1);
      z-index: 49;
    }
    .curtain-tassel.left { left: 8%; transform: translateX(0); }
    .curtain-tassel.left.open { transform: translateX(-50vw); }
    .curtain-tassel.right { right: 8%; transform: translateX(0); }
    .curtain-tassel.right.open { transform: translateX(50vw); }
    @media (max-width: 720px) {
      .forecast-card { top: 48px; left: 16px; min-width: 220px; padding: 18px; }
      .forecast-card .temp { font-size: 3rem; }
      .subtitle { bottom: 220px; font-size: 1.1rem; }
      .control-panel { bottom: 12px; gap: 16px; padding: 14px; }
      .sliders { gap: 16px; }
      .slider-group { min-width: 110px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js" integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z" crossorigin="anonymous"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" integrity="sha384-gTGxhz21lVGYNMcdJOyq01Edg0jhn/c22nsx0kyqP0TxaV5WVdsSH1fSDUf5YJj1" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.7/babel.min.js" integrity="sha384-ezQ6HS3FLspd9te19o2McUV6FAK091+GG7KO54f/R8DKgCDi7fULhapNrd5LY+vG" crossorigin="anonymous"></script>
  <script>
    const reactPreset = Babel.availablePresets && Babel.availablePresets.react;
    Babel.registerPreset('classic-react', {
      presets: reactPreset ? [[reactPreset, { runtime: 'classic' }]] : []
    });
  </script>

  <script type="text/babel" data-presets="classic-react">
    const { useState, useEffect, useRef, useMemo } = React;

    const FORECAST = {
      location: "London, UK",
      baseTemp: 18,
      humidity: 62,
      wind: 12,
    };

    const PALETTE = {
      matinee: {
        cosy: { skyTop: "#FFDAB9", skyBottom: "#87CEEB", celestial: "#FFF5E6", fog: "#FFE4C4" },
        eerie: { skyTop: "#5D7A75", skyBottom: "#223344", celestial: "#DDECEB", fog: "#2F4F4F" },
        heroic: { skyTop: "#FDCB6E", skyBottom: "#3A5F9A", celestial: "#FFFBEA", fog: "#8FAADC" }
      },
      night: {
        cosy: { skyTop: "#2C1B3D", skyBottom: "#1A0F15", celestial: "#FFF8DC", fog: "#5B4A61" },
        eerie: { skyTop: "#0F0510", skyBottom: "#051018", celestial: "#B8D8BA", fog: "#0F2318" },
        heroic: { skyTop: "#050814", skyBottom: "#0A1020", celestial: "#F0E6C3", fog: "#1C2E4A" }
      }
    };

    function hexToRgb(hex) {
      const n = hex.replace("#", "");
      const bigint = parseInt(n, 16);
      return [(bigint >> 16) & 255, (bigint >> 8) & 255, bigint & 255];
    }

    function rgbToCss([r, g, b], a = 1) {
      return `rgba(${Math.round(r)},${Math.round(g)},${Math.round(b)},${a})`;
    }

    function blendColors(colors, weights) {
      let r = 0, g = 0, b = 0;
      for (let i = 0; i < colors.length; i++) {
        const c = hexToRgb(colors[i]);
        const w = weights[i];
        r += c[0] * w; g += c[1] * w; b += c[2] * w;
      }
      return rgbToCss([r, g, b]);
    }

    function darken(rgbaStr, factor) {
      const match = rgbaStr.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)(?:,\s*([\d.]+))?\)/);
      if (!match) return rgbaStr;
      const r = parseFloat(match[1]) * factor;
      const g = parseFloat(match[2]) * factor;
      const b = parseFloat(match[3]) * factor;
      const a = match[4] !== undefined ? parseFloat(match[4]) : 1;
      return rgbToCss([r, g, b], a);
    }

    function makeRidge(w, h, baseY, amp, seed) {
      const points = [];
      const segments = 40;
      const step = w / segments;
      let rng = seed;
      const rand = () => {
        rng = (rng * 9301 + 49297) % 233280;
        return rng / 233280;
      };
      for (let i = 0; i <= segments; i++) {
        const x = i * step;
        const y = baseY - amp * (0.5 + 0.5 * Math.sin(i * 0.7 + rand() * 4));
        points.push({ x, y });
      }
      return points;
    }

    function CanvasStage({ mood, time, mouseRef }) {
      const canvasRef = useRef(null);
      const dataRef = useRef({ mood, time });
      useEffect(() => { dataRef.current = { mood, time }; }, [mood, time]);

      useEffect(() => {
        const canvas = canvasRef.current;
        const ctx = canvas.getContext("2d");
        let raf, particles, farRidge, midRidge, floorRidge;
        const dpr = Math.min(window.devicePixelRatio || 1, 2);

        function resize() {
          const w = canvas.clientWidth;
          const h = canvas.clientHeight;
          canvas.width = w * dpr;
          canvas.height = h * dpr;
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          init(w, h);
        }

        function init(w, h) {
          farRidge = makeRidge(w, h, h * 0.55, h * 0.08, 123);
          midRidge = makeRidge(w, h, h * 0.72, h * 0.12, 456);
          floorRidge = makeRidge(w, h, h * 0.86, h * 0.04, 789);
          particles = [];
          for (let i = 0; i < 60; i++) {
            particles.push({
              type: "cosy", x: Math.random() * w, y: Math.random() * h,
              vx: 0.2 + Math.random() * 0.6, vy: 0.3 + Math.random() * 0.6,
              size: 2 + Math.random() * 4, rot: Math.random() * Math.PI * 2,
              rotSpeed: (Math.random() - 0.5) * 0.04, color: "#FF8C42"
            });
          }
          for (let i = 0; i < 120; i++) {
            particles.push({
              type: "eerie", x: Math.random() * w, y: Math.random() * h,
              vx: -0.5 + Math.random() * 1, vy: 5 + Math.random() * 6,
              len: 10 + Math.random() * 15, color: "rgba(180,200,220,0.45)"
            });
          }
          for (let i = 0; i < 80; i++) {
            particles.push({
              type: "heroic", x: Math.random() * w, y: h + Math.random() * 200,
              vx: -1 + Math.random() * 2, vy: -(1 + Math.random() * 3),
              size: 1 + Math.random() * 3, color: "#FFAE42"
            });
          }
        }

        function draw() {
          const w = canvas.clientWidth;
          const h = canvas.clientHeight;
          const { mood, time } = dataRef.current;
          const mouse = mouseRef.current;
          const total = mood.cosy + mood.eerie + mood.heroic;
          const weights = total ? [mood.cosy / total, mood.eerie / total, mood.heroic / total] : [1/3, 1/3, 1/3];
          const t = performance.now();

          ctx.clearRect(0, 0, w, h);

          const p = PALETTE[time];
          const skyTop = blendColors([p.cosy.skyTop, p.eerie.skyTop, p.heroic.skyTop], weights);
          const skyBottom = blendColors([p.cosy.skyBottom, p.eerie.skyBottom, p.heroic.skyBottom], weights);
          const grad = ctx.createLinearGradient(0, 0, 0, h);
          grad.addColorStop(0, skyTop);
          grad.addColorStop(1, skyBottom);
          ctx.fillStyle = grad;
          ctx.fillRect(0, 0, w, h);

          if (time === "night") {
            ctx.save();
            for (let i = 0; i < 90; i++) {
              const sx = ((i * 137.5) % w + w) % w;
              const sy = ((i * 73.3) % (h * 0.55) + h * 0.55) % (h * 0.55);
              const twinkle = 0.4 + 0.6 * Math.sin(t * 0.002 + i);
              ctx.fillStyle = `rgba(255,255,255,${twinkle})`;
              ctx.beginPath();
              ctx.arc(sx + (mouse.x - 0.5) * 10, sy + (mouse.y - 0.5) * 10, 1.2, 0, Math.PI * 2);
              ctx.fill();
            }
            ctx.restore();
          }

          const celestialColor = blendColors([p.cosy.celestial, p.eerie.celestial, p.heroic.celestial], weights);
          const cx = w * 0.75 + (mouse.x - 0.5) * 60;
          const cy = h * 0.18 + (mouse.y - 0.5) * 30;
          const radius = time === "matinee" ? 52 : 38;
          ctx.save();
          ctx.shadowBlur = time === "matinee" ? 90 : 60;
          ctx.shadowColor = celestialColor;
          ctx.fillStyle = celestialColor;
          ctx.beginPath();
          ctx.arc(cx, cy, radius, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();

          if (time === "night") {
            ctx.save();
            ctx.globalAlpha = 0.22;
            ctx.fillStyle = "#000";
            ctx.beginPath();
            ctx.arc(cx - 8, cy - 5, 7, 0, Math.PI * 2);
            ctx.arc(cx + 11, cy + 8, 5, 0, Math.PI * 2);
            ctx.arc(cx - 2, cy + 12, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
          }

          const offX = (mouse.x - 0.5) * 2;
          const baseFog = blendColors([p.cosy.fog, p.eerie.fog, p.heroic.fog], weights);

          drawRidge(farRidge, w, h, darken(baseFog, 0.6), offX * 15);
          drawRidge(midRidge, w, h, darken(baseFog, 0.42), offX * 38);
          drawFloor(w, h, darken(baseFog, 0.28), offX * 65);

          drawSpotlights(w, h, t);
          drawParticles(w, h, weights, t);
          drawVignette(w, h);

          raf = requestAnimationFrame(draw);
        }

        function drawRidge(points, w, h, color, shiftX) {
          ctx.save();
          ctx.fillStyle = color;
          ctx.beginPath();
          ctx.moveTo(points[0].x + shiftX, h);
          for (let i = 0; i < points.length; i++) {
            ctx.lineTo(points[i].x + shiftX, points[i].y);
          }
          ctx.lineTo(points[points.length - 1].x + shiftX, h);
          ctx.closePath();
          ctx.fill();
          ctx.restore();
        }

        function drawFloor(w, h, color, shiftX) {
          const horizon = h * 0.72;
          const grad = ctx.createLinearGradient(0, horizon, 0, h);
          grad.addColorStop(0, color);
          grad.addColorStop(1, darken(color, 0.4));
          ctx.save();
          ctx.fillStyle = grad;
          ctx.beginPath();
          ctx.moveTo(-w * 0.1 + shiftX, horizon);
          ctx.lineTo(w * 1.1 + shiftX, horizon);
          ctx.lineTo(w + shiftX, h);
          ctx.lineTo(0 + shiftX, h);
          ctx.closePath();
          ctx.fill();
          ctx.strokeStyle = "rgba(0,0,0,0.18)";
          ctx.lineWidth = 1;
          for (let i = -4; i <= 14; i++) {
            const x = (w * i / 10) + shiftX * (1 + i / 12);
            ctx.beginPath();
            ctx.moveTo(x, horizon);
            ctx.lineTo(x + (i - 5) * 18, h);
            ctx.stroke();
          }
          ctx.restore();
        }

        function drawSpotlights(w, h, t) {
          ctx.save();
          ctx.globalCompositeOperation = "lighter";
          const spot1 = {
            x: w * 0.5 + Math.sin(t * 0.0008) * w * 0.45,
            y: h * 0.28 + Math.cos(t * 0.0006) * h * 0.06
          };
          const spot2 = {
            x: w * 0.5 + Math.cos(t * 0.0007) * w * 0.42,
            y: h * 0.32 + Math.sin(t * 0.0005) * h * 0.07
          };
          [spot1, spot2].forEach((s, i) => {
            const sourceX = w * 0.5 + (s.x - w * 0.5) * 0.3;
            const sourceY = -h * 0.1;
            const beam = ctx.createLinearGradient(sourceX, sourceY, s.x, s.y);
            beam.addColorStop(0, "rgba(255,255,255,0.14)");
            beam.addColorStop(1, "rgba(255,255,255,0.0)");
            ctx.fillStyle = beam;
            ctx.beginPath();
            ctx.moveTo(sourceX - 14, sourceY);
            ctx.lineTo(s.x - 75, s.y);
            ctx.lineTo(s.x + 75, s.y);
            ctx.closePath();
            ctx.fill();
            const rg = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, 150 + i * 45);
            rg.addColorStop(0, "rgba(255,255,255,0.24)");
            rg.addColorStop(1, "rgba(255,255,255,0)");
            ctx.fillStyle = rg;
            ctx.beginPath();
            ctx.arc(s.x, s.y, 170 + i * 45, 0, Math.PI * 2);
            ctx.fill();
          });
          ctx.restore();
        }

        function drawParticles(w, h, weights, t) {
          ctx.save();

          ctx.globalAlpha = weights[0];
          for (const p of particles) if (p.type === "cosy") {
            p.x += p.vx; p.y += p.vy; p.rot += p.rotSpeed;
            if (p.x > w) p.x = -10;
            if (p.y > h) p.y = -10;
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rot);
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.ellipse(0, 0, p.size, p.size * 0.6, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
          }

          ctx.globalAlpha = weights[1] * 0.8;
          ctx.strokeStyle = "rgba(170,190,210,0.55)";
          ctx.lineWidth = 1;
          for (const p of particles) if (p.type === "eerie") {
            p.x += p.vx; p.y += p.vy;
            if (p.y > h) { p.y = -20; p.x = Math.random() * w; }
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            ctx.lineTo(p.x + p.vx * 2, p.y + p.len);
            ctx.stroke();
          }

          ctx.globalAlpha = weights[2];
          for (const p of particles) if (p.type === "heroic") {
            p.x += p.vx; p.y += p.vy;
            if (p.y < -20) { p.y = h + Math.random() * 100; p.x = Math.random() * w; }
            ctx.fillStyle = p.color;
            ctx.shadowBlur = 6;
            ctx.shadowColor = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
          }

          ctx.restore();
        }

        function drawVignette(w, h) {
          ctx.save();
          const grad = ctx.createRadialGradient(w / 2, h / 2, w * 0.25, w / 2, h / 2, w * 0.85);
          grad.addColorStop(0, "rgba(0,0,0,0)");
          grad.addColorStop(1, "rgba(0,0,0,0.55)");
          ctx.fillStyle = grad;
          ctx.fillRect(0, 0, w, h);
          ctx.restore();
        }

        window.addEventListener("resize", resize);
        resize();
        raf = requestAnimationFrame(draw);
        return () => {
          window.removeEventListener("resize", resize);
          cancelAnimationFrame(raf);
        };
      }, []);

      return <canvas className="stage-canvas" ref={canvasRef} />;
    }

    function Curtain({ open }) {
      return (
        <div className="curtains">
          <div className="curtain-top" />
          <div className={"curtain left " + (open ? "open" : "")} />
          <div className={"curtain right " + (open ? "open" : "")} />
          <div className={"curtain-tassel left " + (open ? "open" : "")} />
          <div className={"curtain-tassel right " + (open ? "open" : "")} />
        </div>
      );
    }

    function Typewriter({ text }) {
      const [displayed, setDisplayed] = useState("");
      useEffect(() => {
        setDisplayed("");
        let i = 0;
        const timer = setInterval(() => {
          setDisplayed(text.slice(0, i + 1));
          i++;
          if (i >= text.length) clearInterval(timer);
        }, 32);
        return () => clearInterval(timer);
      }, [text]);
      return (
        <div className="subtitle">
          {displayed}<span className="cursor">|</span>
        </div>
      );
    }

    function ForecastCard({ location, date, temp, condition, humidity, wind }) {
      return (
        <div className="forecast-card glass">
          <svg className="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
            <circle cx="12" cy="12" r="5" />
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
          </svg>
          <h1>{location}</h1>
          <div className="date">{date}</div>
          <div className="temp-row">
            <span className="temp">{temp}°</span>
            <span className="condition">{condition}</span>
          </div>
          <div className="stats">
            <div><span>Humidity</span><b>{humidity}%</b></div>
            <div><span>Wind</span><b>{wind} km/h</b></div>
          </div>
        </div>
      );
    }

    function Controls({ mood, onMoodChange, time, setTime, curtainOpen, setCurtainOpen }) {
      return (
        <div className="control-panel glass">
          <div className="sliders">
            {["cosy", "eerie", "heroic"].map((m) => (
              <div className="slider-group" key={m}>
                <label>
                  {m.charAt(0).toUpperCase() + m.slice(1)}
                  <span>{mood[m]}</span>
                </label>
                <input
                  type="range"
                  min="0"
                  max="100"
                  value={mood[m]}
                  onChange={(e) => onMoodChange(m, parseInt(e.target.value))}
                />
              </div>
            ))}
          </div>
          <div className="toggles">
            <button className={time === "matinee" ? "active" : ""} onClick={() => setTime("matinee")}>Matinée</button>
            <button className={time === "night" ? "active" : ""} onClick={() => setTime("night")}>Night</button>
            <button onClick={() => setCurtainOpen(!curtainOpen)}>{curtainOpen ? "Close Curtain" : "Raise Curtain"}</button>
            <button onClick={() => { onMoodChange("cosy", Math.floor(Math.random()*60)); onMoodChange("eerie", Math.floor(Math.random()*60)); onMoodChange("heroic", Math.floor(Math.random()*60)); }}>Shuffle</button>
          </div>
        </div>
      );
    }

    function App() {
      const [mood, setMood] = useState({ cosy: 70, eerie: 10, heroic: 20 });
      const [time, setTime] = useState("matinee");
      const [curtainOpen, setCurtainOpen] = useState(false);
      const mouseRef = useRef({ x: 0.5, y: 0.5 });

      useEffect(() => {
        const timer = setTimeout(() => setCurtainOpen(true), 700);
        return () => clearTimeout(timer);
      }, []);

      useEffect(() => {
        const onMove = (e) => {
          mouseRef.current.x = e.clientX / window.innerWidth;
          mouseRef.current.y = e.clientY / window.innerHeight;
        };
        window.addEventListener("mousemove", onMove);
        return () => window.removeEventListener("mousemove", onMove);
      }, []);

      const total = mood.cosy + mood.eerie + mood.heroic;
      const weights = total ? [mood.cosy / total, mood.eerie / total, mood.heroic / total] : [1/3, 1/3, 1/3];
      const dominant = ["cosy", "eerie", "heroic"][weights.indexOf(Math.max(...weights))];

      const temp = useMemo(() => {
        const mods = { cosy: 2, eerie: -3, heroic: 0 };
        return Math.round(FORECAST.baseTemp + weights[0] * mods.cosy + weights[1] * mods.eerie + weights[2] * mods.heroic);
      }, [weights]);

      const condition = useMemo(() => {
        const map = { cosy: "Golden Breeze", eerie: "Whispering Fog", heroic: "Blazing Horizon" };
        return map[dominant];
      }, [dominant]);

      const subtitle = useMemo(() => {
        const phrases = {
          matinee: {
            cosy: "A warm, golden matinée settles over the stage…",
            eerie: "A pale mist creeps through the morning light…",
            heroic: "Daybreak marches in like a brass fanfare…"
          },
          night: {
            cosy: "A hush of amber lamplight glows against the dark…",
            eerie: "Shadows lengthen and the fog whispers secrets…",
            heroic: "The stars themselves stand at attention…"
          }
        };
        return phrases[time][dominant];
      }, [time, dominant]);

      const date = new Date().toLocaleDateString("en-GB", { weekday: "long", day: "numeric", month: "long" });

      const onMoodChange = (key, value) => setMood((prev) => ({ ...prev, [key]: value }));

      return (
        <div className="theatre">
          <div className="theatre-title">Weather Theatre</div>
          <Curtain open={curtainOpen} />
          <CanvasStage mood={mood} time={time} mouseRef={mouseRef} />
          <div className="spotlight-overlay" />
          <div className="proscenium" />
          <div className="grain" />
          <ForecastCard
            location={FORECAST.location}
            date={date}
            temp={temp}
            condition={condition}
            humidity={FORECAST.humidity}
            wind={FORECAST.wind}
          />
          <Typewriter text={subtitle} />
          <Controls
            mood={mood}
            onMoodChange={onMoodChange}
            time={time}
            setTime={setTime}
            curtainOpen={curtainOpen}
            setCurtainOpen={setCurtainOpen}
          />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
