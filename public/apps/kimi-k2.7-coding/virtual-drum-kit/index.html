<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Virtual Drum Kit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --studio-glow: #38bdf8;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at 50% 0%, #1e293b 0%, #0f172a 40%, #020617 100%);
      overflow-x: hidden;
    }
    .glass-panel {
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    }
    .drum-pad {
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.06s ease, box-shadow 0.1s ease, filter 0.1s ease;
      position: relative;
      overflow: hidden;
    }
    .drum-pad::after {
      content: '';
      position: absolute;
      inset: 8px;
      border-radius: 1rem;
      border: 2px solid rgba(255, 255, 255, 0.12);
      pointer-events: none;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
    }
    .drum-pad.hit {
      transform: scale(0.95);
      filter: brightness(1.3);
      box-shadow: 0 0 40px rgba(255, 255, 255, 0.25), inset 0 0 30px rgba(0,0,0,0.4);
    }
    .ripple {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.5) 0%, transparent 60%);
      animation: ripple 0.28s ease-out forwards;
      pointer-events: none;
    }
    @keyframes ripple {
      from { transform: scale(0.4); opacity: 1; }
      to { transform: scale(1.8); opacity: 0; }
    }
    .control-btn {
      transition: all 0.15s ease;
      position: relative;
      overflow: hidden;
    }
    .control-btn:active:not(:disabled) {
      transform: translateY(1px);
    }
    .control-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .recording {
      animation: recordPulse 1s infinite;
    }
    @keyframes recordPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.6); }
      50% { box-shadow: 0 0 0 12px rgba(239, 68, 68, 0); }
    }
    .vu-bar {
      transition: height 0.05s ease;
    }
    /* Custom scrollbar for the whole page */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
  </style>
</head>
<body class="text-white min-h-screen flex flex-col select-none">

  <!-- Header -->
  <header class="pt-6 pb-2 text-center z-10">
    <div class="inline-flex items-center gap-3 justify-center">
      <div class="w-10 h-10 rounded-full bg-gradient-to-br from-cyan-400 to-blue-600 flex items-center justify-center shadow-lg shadow-cyan-500/30">
        <span class="text-xl">🥁</span>
      </div>
      <h1 class="text-3xl sm:text-4xl font-black tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-cyan-300 via-white to-purple-300 drop-shadow">
        VIRTUAL DRUM KIT
      </h1>
    </div>
    <p class="text-slate-400 text-sm mt-2">Tap the pads or use your keyboard · Record and playback your beats</p>
  </header>

  <!-- Controls -->
  <section class="w-full max-w-6xl mx-auto px-4 py-3 z-10">
    <div class="glass-panel rounded-2xl p-3 sm:p-4 flex flex-wrap items-center justify-between gap-4">
      <div class="flex items-center gap-2 sm:gap-3">
        <button id="recordBtn" class="control-btn flex items-center gap-2 bg-red-500 hover:bg-red-400 text-white px-4 py-2 rounded-xl font-bold shadow-lg shadow-red-500/20">
          <span class="w-2.5 h-2.5 rounded-full bg-white"></span>
          Record
        </button>
        <button id="stopBtn" class="control-btn bg-slate-600 hover:bg-slate-500 text-white px-4 py-2 rounded-xl font-bold disabled:opacity-40" disabled>Stop</button>
        <button id="playBtn" class="control-btn bg-emerald-500 hover:bg-emerald-400 text-white px-4 py-2 rounded-xl font-bold shadow-lg shadow-emerald-500/20 disabled:opacity-40" disabled>Play</button>
        <button id="clearBtn" class="control-btn bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded-xl font-bold disabled:opacity-40" disabled>Clear</button>
      </div>

      <div class="flex items-center gap-4 sm:gap-6 flex-wrap">
        <div class="flex items-center gap-2">
          <label for="volumeSlider" class="text-xs text-slate-300 font-semibold uppercase tracking-wider">Volume</label>
          <input id="volumeSlider" type="range" min="0" max="1" step="0.01" value="0.7" class="w-28 accent-cyan-400">
        </div>
        <label class="flex items-center gap-2 cursor-pointer text-sm text-slate-300">
          <input id="loopCheck" type="checkbox" class="w-4 h-4 accent-cyan-400 rounded">
          Loop
        </label>
        <div class="flex items-center gap-2">
          <div id="recordIndicator" class="w-3 h-3 rounded-full bg-red-500 opacity-30 transition-opacity"></div>
          <span id="timeDisplay" class="font-mono text-lg text-cyan-300 w-24">00:00.00</span>
        </div>
      </div>
    </div>
  </section>

  <!-- Visualizer -->
  <section class="w-full max-w-6xl mx-auto px-4 z-10">
    <div class="glass-panel rounded-xl p-2 flex items-center justify-center">
      <canvas id="visualizer" width="320" height="60" class="w-full max-w-2xl h-16 rounded-lg bg-black/40"></canvas>
    </div>
  </section>

  <!-- Drum Pads -->
  <main class="flex-1 flex items-center justify-center px-4 py-6 z-10">
    <div id="padGrid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4 sm:gap-5 w-full max-w-6xl">
      <!-- Pads generated by JavaScript -->
    </div>
  </main>

  <!-- Footer hints -->
  <footer class="pb-6 pt-2 text-center z-10">
    <div class="inline-block glass-panel rounded-full px-4 py-2 text-xs text-slate-400">
      <span class="hidden sm:inline">Keyboard: </span>
      <span class="font-mono text-cyan-300">Q</span> Crash ·
      <span class="font-mono text-cyan-300">W</span> Hi-Hat ·
      <span class="font-mono text-cyan-300">E</span> Ride ·
      <span class="font-mono text-cyan-300">A</span> Snare ·
      <span class="font-mono text-cyan-300">S</span> Clap ·
      <span class="font-mono text-cyan-300">D</span> High Tom ·
      <span class="font-mono text-cyan-300">F</span> Mid Tom ·
      <span class="font-mono text-cyan-300">Z</span> Floor Tom ·
      <span class="font-mono text-cyan-300">Space</span> Kick
    </div>
  </footer>

  <script>
    (function () {
      const drums = [
        { name: 'Kick', key: ' ', label: 'SPACE', type: 'kick', emoji: '🥁', color: 'from-orange-600 to-orange-900', span: true },
        { name: 'Snare', key: 'a', label: 'A', type: 'snare', emoji: '🐍', color: 'from-amber-400 to-amber-700' },
        { name: 'Hi-Hat', key: 'w', label: 'W', type: 'hihat', emoji: '🎩', color: 'from-cyan-400 to-cyan-700' },
        { name: 'Crash', key: 'q', label: 'Q', type: 'crash', emoji: '💥', color: 'from-yellow-400 to-yellow-700' },
        { name: 'Ride', key: 'e', label: 'E', type: 'ride', emoji: '🔔', color: 'from-teal-400 to-teal-700' },
        { name: 'High Tom', key: 'd', label: 'D', type: 'tom', emoji: '🍅', color: 'from-red-500 to-red-800', pitch: 200 },
        { name: 'Mid Tom', key: 'f', label: 'F', type: 'tom', emoji: '🍊', color: 'from-orange-500 to-orange-800', pitch: 150 },
        { name: 'Floor Tom', key: 'z', label: 'Z', type: 'floortom', emoji: '🪘', color: 'from-rose-500 to-rose-800', pitch: 100 },
        { name: 'Clap', key: 's', label: 'S', type: 'clap', emoji: '👏', color: 'from-purple-500 to-purple-800' },
      ];

      const keyMap = {};
      drums.forEach((d, i) => { keyMap[d.key.toLowerCase()] = i; });

      const padGrid = document.getElementById('padGrid');
      const recordBtn = document.getElementById('recordBtn');
      const stopBtn = document.getElementById('stopBtn');
      const playBtn = document.getElementById('playBtn');
      const clearBtn = document.getElementById('clearBtn');
      const volumeSlider = document.getElementById('volumeSlider');
      const loopCheck = document.getElementById('loopCheck');
      const timeDisplay = document.getElementById('timeDisplay');
      const recordIndicator = document.getElementById('recordIndicator');
      const canvas = document.getElementById('visualizer');
      const ctx = canvas.getContext('2d');

      let audioCtx, masterGain, analyser, noiseBuffer;
      let isRecording = false, isPlaying = false;
      let recording = [], recordStart = 0;
      let playbackTimeouts = [];
      let loop = false;

      function initAudio() {
        if (audioCtx) {
          if (audioCtx.state === 'suspended') audioCtx.resume();
          return;
        }
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        audioCtx = new AudioContext();
        masterGain = audioCtx.createGain();
        masterGain.gain.value = parseFloat(volumeSlider.value);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 64;
        masterGain.connect(analyser);
        analyser.connect(audioCtx.destination);
        createNoiseBuffer();
        drawVisualizer();
        updateTimer();
      }

      function createNoiseBuffer() {
        const len = audioCtx.sampleRate * 2;
        noiseBuffer = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
        const data = noiseBuffer.getChannelData(0);
        for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
      }

      // --- Sound synthesis ---
      function playDrum(index, when) {
        const drum = drums[index];
        switch (drum.type) {
          case 'kick': playKick(when); break;
          case 'snare': playSnare(when); break;
          case 'hihat': playHiHat(when); break;
          case 'crash': playCrash(when); break;
          case 'ride': playRide(when); break;
          case 'tom': playTom(when, drum.pitch || 200); break;
          case 'floortom': playTom(when, drum.pitch || 100); break;
          case 'clap': playClap(when); break;
        }
      }

      function playKick(when) {
        const osc = audioCtx.createOscillator();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(150, when);
        osc.frequency.exponentialRampToValueAtTime(0.01, when + 0.5);
        const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(1, when);
        gain.gain.exponentialRampToValueAtTime(0.001, when + 0.5);
        osc.connect(gain).connect(masterGain);
        osc.start(when);
        osc.stop(when + 0.5);
      }

      function playSnare(when) {
        const noise = audioCtx.createBufferSource();
        noise.buffer = noiseBuffer;
        const noiseFilter = audioCtx.createBiquadFilter();
        noiseFilter.type = 'highpass';
        noiseFilter.frequency.value = 800;
        const noiseGain = audioCtx.createGain();
        noiseGain.gain.setValueAtTime(0.8, when);
        noiseGain.gain.exponentialRampToValueAtTime(0.01, when + 0.25);
        noise.connect(noiseFilter).connect(noiseGain).connect(masterGain);
        noise.start(when);
        noise.stop(when + 0.25);

        const tone = audioCtx.createOscillator();
        tone.type = 'triangle';
        tone.frequency.setValueAtTime(220, when);
        const toneGain = audioCtx.createGain();
        toneGain.gain.setValueAtTime(0.4, when);
        toneGain.gain.exponentialRampToValueAtTime(0.001, when + 0.12);
        tone.connect(toneGain).connect(masterGain);
        tone.start(when);
        tone.stop(when + 0.12);
      }

      function playHiHat(when) {
        const src = audioCtx.createBufferSource();
        src.buffer = noiseBuffer;
        const hp = audioCtx.createBiquadFilter();
        hp.type = 'highpass';
        hp.frequency.value = 8000;
        const bp = audioCtx.createBiquadFilter();
        bp.type = 'bandpass';
        bp.frequency.value = 13000;
        bp.Q.value = 1;
        const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(0.5, when);
        gain.gain.exponentialRampToValueAtTime(0.001, when + 0.08);
        src.connect(hp).connect(bp).connect(gain).connect(masterGain);
        src.start(when);
        src.stop(when + 0.08);
      }

      function playCrash(when) {
        const src = audioCtx.createBufferSource();
        src.buffer = noiseBuffer;
        const bp = audioCtx.createBiquadFilter();
        bp.type = 'bandpass';
        bp.frequency.value = 7000;
        bp.Q.value = 1;
        const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(0.7, when);
        gain.gain.exponentialRampToValueAtTime(0.001, when + 1.4);
        src.connect(bp).connect(gain).connect(masterGain);
        src.start(when);
        src.stop(when + 1.4);
      }

      function playRide(when) {
        const src = audioCtx.createBufferSource();
        src.buffer = noiseBuffer;
        const hp = audioCtx.createBiquadFilter();
        hp.type = 'highpass';
        hp.frequency.value = 7000;
        const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(0.4, when);
        gain.gain.exponentialRampToValueAtTime(0.001, when + 0.35);
        src.connect(hp).connect(gain).connect(masterGain);
        src.start(when);
        src.stop(when + 0.35);

        const osc = audioCtx.createOscillator();
        osc.type = 'square';
        osc.frequency.setValueAtTime(8000, when);
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(0.03, when);
        g.gain.exponentialRampToValueAtTime(0.001, when + 0.35);
        osc.connect(g).connect(masterGain);
        osc.start(when);
        osc.stop(when + 0.35);
      }

      function playTom(when, pitch) {
        const osc = audioCtx.createOscillator();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(pitch, when);
        osc.frequency.exponentialRampToValueAtTime(pitch * 0.5, when + 0.3);
        const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(0.8, when);
        gain.gain.exponentialRampToValueAtTime(0.001, when + 0.3);
        osc.connect(gain).connect(masterGain);
        osc.start(when);
        osc.stop(when + 0.3);
      }

      function playClap(when) {
        const src = audioCtx.createBufferSource();
        src.buffer = noiseBuffer;
        const bp = audioCtx.createBiquadFilter();
        bp.type = 'bandpass';
        bp.frequency.value = 1500;
        const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(0, when);
        gain.gain.linearRampToValueAtTime(1, when + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.01, when + 0.15);
        src.connect(bp).connect(gain).connect(masterGain);
        src.start(when);
        src.stop(when + 0.15);
      }

      // --- UI generation ---
      drums.forEach((drum, i) => {
        const btn = document.createElement('button');
        const spanClass = drum.span
          ? 'col-span-2 sm:col-span-3 lg:col-span-4 min-h-[140px] sm:min-h-[160px]'
          : 'min-h-[120px] sm:min-h-[140px]';
        btn.className = `drum-pad group ${spanClass} rounded-2xl border border-white/10 bg-gradient-to-br ${drum.color} shadow-xl flex flex-col items-center justify-center focus:outline-none`;
        btn.setAttribute('data-index', i);
        btn.setAttribute('aria-label', drum.name);
        btn.innerHTML = `
          <span class="text-4xl sm:text-5xl drop-shadow-md transition-transform group-active:scale-110">${drum.emoji}</span>
          <span class="font-bold text-base sm:text-lg mt-1 drop-shadow-sm">${drum.name}</span>
          <span class="mt-1 px-2 py-0.5 rounded bg-black/30 text-[10px] sm:text-xs font-mono tracking-widest border border-white/10">${drum.label}</span>
        `;
        btn.addEventListener('pointerdown', (e) => { e.preventDefault(); triggerDrum(i); });
        padGrid.appendChild(btn);
      });

      // --- Interaction ---
      function triggerDrum(index) {
        initAudio();
        playDrum(index, audioCtx.currentTime);
        visualHit(index);
        if (isRecording && !isPlaying) {
          recording.push({ padIndex: index, time: audioCtx.currentTime - recordStart });
          updateControls();
        }
      }

      function visualHit(index) {
        const pad = padGrid.children[index];
        if (!pad) return;
        pad.classList.add('hit');
        const ripple = document.createElement('span');
        ripple.className = 'ripple';
        pad.appendChild(ripple);
        setTimeout(() => {
          pad.classList.remove('hit');
          ripple.remove();
        }, 120);
      }

      window.addEventListener('keydown', (e) => {
        if (e.repeat) return;
        const k = e.key.toLowerCase();
        if (k === ' ') e.preventDefault();
        if (keyMap[k] !== undefined) triggerDrum(keyMap[k]);
      });

      // --- Recording / Playback ---
      function startRecording() {
        initAudio();
        stopPlayback();
        recording = [];
        isRecording = true;
        recordStart = audioCtx.currentTime;
        updateControls();
      }

      function stopRecording() {
        isRecording = false;
        updateControls();
      }

      function toggleRecording() {
        if (isRecording) stopRecording(); else startRecording();
      }

      function stopPlayback() {
        isPlaying = false;
        playbackTimeouts.forEach(t => clearTimeout(t));
        playbackTimeouts = [];
        updateControls();
      }

      function playRecording() {
        if (!recording.length || isPlaying) return;
        initAudio();
        stopRecording();
        isPlaying = true;
        updateControls();
        playbackTimeouts.forEach(t => clearTimeout(t));
        playbackTimeouts = [];
        const baseTime = audioCtx.currentTime + 0.05;
        recording.forEach(ev => {
          playDrum(ev.padIndex, baseTime + ev.time);
          const t = setTimeout(() => visualHit(ev.padIndex), ev.time * 1000);
          playbackTimeouts.push(t);
        });
        const last = recording[recording.length - 1];
        const endT = setTimeout(() => {
          if (loop) {
            playRecording();
          } else {
            isPlaying = false;
            updateControls();
          }
        }, last.time * 1000 + 400);
        playbackTimeouts.push(endT);
      }

      function clearRecording() {
        stopPlayback();
        stopRecording();
        recording = [];
        updateControls();
      }

      function updateControls() {
        recordBtn.classList.toggle('recording', isRecording);
        recordBtn.innerHTML = isRecording
          ? '<span class="w-2.5 h-2.5 rounded-full bg-white"></span> Recording'
          : '<span class="w-2.5 h-2.5 rounded-full bg-white"></span> Record';
        recordBtn.className = isRecording
          ? 'control-btn flex items-center gap-2 bg-red-600 text-white px-4 py-2 rounded-xl font-bold shadow-lg shadow-red-500/20 recording'
          : 'control-btn flex items-center gap-2 bg-red-500 hover:bg-red-400 text-white px-4 py-2 rounded-xl font-bold shadow-lg shadow-red-500/20';
        recordIndicator.classList.toggle('opacity-100', isRecording);
        recordIndicator.classList.toggle('opacity-30', !isRecording);
        recordIndicator.classList.toggle('animate-pulse', isRecording);
        stopBtn.disabled = !isRecording && !isPlaying;
        playBtn.disabled = isPlaying || recording.length === 0;
        clearBtn.disabled = recording.length === 0 || isPlaying;
      }

      function formatTime(seconds) {
        const m = Math.floor(seconds / 60);
        const s = Math.floor(seconds % 60);
        const cs = Math.floor((seconds % 1) * 100);
        return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}.${cs.toString().padStart(2, '0')}`;
      }

      function updateTimer() {
        let t = 0;
        if (isRecording && audioCtx) {
          t = audioCtx.currentTime - recordStart;
        } else if (!isPlaying) {
          t = recording.length ? recording[recording.length - 1].time : 0;
        }
        timeDisplay.textContent = formatTime(t);
        requestAnimationFrame(updateTimer);
      }

      function drawVisualizer() {
        requestAnimationFrame(drawVisualizer);
        if (!analyser) return;
        const data = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteFrequencyData(data);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const barWidth = canvas.width / data.length;
        for (let i = 0; i < data.length; i++) {
          const h = (data[i] / 255) * canvas.height;
          const alpha = 0.4 + (data[i] / 255) * 0.6;
          ctx.fillStyle = `rgba(56, 189, 248, ${alpha})`;
          ctx.fillRect(i * barWidth + 1, canvas.height - h, barWidth - 2, h);
        }
      }

      // --- Event wiring ---
      recordBtn.addEventListener('click', toggleRecording);
      stopBtn.addEventListener('click', () => { stopPlayback(); stopRecording(); });
      playBtn.addEventListener('click', () => { if (!isPlaying) playRecording(); });
      clearBtn.addEventListener('click', clearRecording);
      volumeSlider.addEventListener('input', () => {
        if (masterGain) masterGain.gain.value = parseFloat(volumeSlider.value);
      });
      loopCheck.addEventListener('change', () => { loop = loopCheck.checked; });

      // Initialize display state
      updateControls();
    })();
  </script>
</body>
</html>
