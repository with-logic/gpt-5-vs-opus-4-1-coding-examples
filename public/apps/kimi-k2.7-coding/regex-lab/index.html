<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Regex Lab</title>
  <script src="https://cdn.tailwindcss.com" integrity="sha384-igm5BeiBt36UU4gqwWS7imYmelpTsZlQ45FZf+XBn9MuJbn4nQr7yx1yFydocC/K" crossorigin="anonymous"></script>
  <style>
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --surface-2: #f1f5f9;
      --text: #0f172a;
      --muted: #64748b;
      --accent: #0ea5e9;
      --accent-2: #8b5cf6;
      --success: #22c55e;
      --error: #ef4444;
      --warning: #eab308;
      --border: #e2e8f0;
      --shadow: 0 25px 50px -12px rgba(15, 23, 42, 0.15);
    }
    [data-theme="dark"] {
      --bg: #0b0f19;
      --surface: #111827;
      --surface-2: #1e293b;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --accent-2: #c084fc;
      --success: #4ade80;
      --error: #f87171;
      --warning: #facc15;
      --border: #334155;
      --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    * { box-sizing: border-box; }
    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background 0.2s, color 0.2s;
    }
    code, pre, .font-mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }
    .text-muted { color: var(--muted); }
    .terminal-window {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 1rem;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .title-bar {
      background: var(--surface-2);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .title-bar .btn-circle {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      box-shadow: inset 0 0 0 0.5px rgba(0,0,0,0.1);
    }
    .title-bar .btn-red { background: #ff5f57; }
    .title-bar .btn-yellow { background: #febc2e; }
    .title-bar .btn-green { background: #28c840; }
    .title {
      flex: 1;
      text-align: center;
      font-weight: 600;
      color: var(--muted);
      font-size: 0.95rem;
      letter-spacing: 0.02em;
    }
    .panel {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      overflow: hidden;
    }
    .panel-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0.5rem 0.75rem;
      font-weight: 600;
      font-size: 0.875rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .input-row {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
    }
    input[type="text"], textarea {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      padding: 0.65rem 0.85rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input[type="text"]:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15);
    }
    textarea { min-height: 10rem; resize: vertical; }
    .checkbox {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.875rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      cursor: pointer;
      user-select: none;
    }
    .checkbox input {
      accent-color: var(--accent);
      width: 1rem;
      height: 1rem;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      padding: 0.5rem 0.85rem;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s, transform 0.05s;
    }
    .btn:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .btn:active { transform: translateY(1px); }
    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { filter: brightness(1.1); }
    .quick-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 0.375rem;
      padding: 0.25rem 0.5rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 0.75rem;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .quick-btn:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .error-panel {
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid var(--error);
      color: var(--error);
      border-radius: 0.75rem;
      padding: 0.85rem 1rem;
      font-size: 0.9rem;
    }
    .error-caret {
      margin-top: 0.5rem;
      padding: 0.5rem 0.75rem;
      background: var(--surface);
      border-radius: 0.5rem;
      color: var(--error);
      overflow-x: auto;
    }
    .highlight-output {
      background: var(--surface);
      padding: 0.85rem;
      min-height: 6rem;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      line-height: 1.8;
      font-size: 0.95rem;
    }
    .match-full {
      background: rgba(74, 222, 128, 0.12);
      border-radius: 3px;
      outline: 1px solid rgba(74, 222, 128, 0.4);
    }
    .group {
      border-radius: 2px;
      border-bottom: 2px solid var(--gc);
    }
    .g1 { --gc: #38bdf8; background: rgba(56, 189, 248, 0.18); }
    .g2 { --gc: #f472b6; background: rgba(244, 114, 182, 0.18); }
    .g3 { --gc: #a78bfa; background: rgba(167, 139, 250, 0.18); }
    .g4 { --gc: #fbbf24; background: rgba(251, 191, 36, 0.18); }
    .g5 { --gc: #4ade80; background: rgba(74, 222, 128, 0.18); }
    .g6 { --gc: #f87171; background: rgba(248, 113, 113, 0.18); }
    .g7 { --gc: #2dd4bf; background: rgba(45, 212, 191, 0.18); }
    .g8 { --gc: #fb923c; background: rgba(251, 146, 60, 0.18); }
    .g9 { --gc: #60a5fa; background: rgba(96, 165, 250, 0.18); }
    .g10 { --gc: #e879f9; background: rgba(232, 121, 249, 0.18); }
    .g11 { --gc: #34d399; background: rgba(52, 211, 153, 0.18); }
    .g12 { --gc: #facc15; background: rgba(250, 204, 21, 0.18); }
    .group-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      border-radius: 0.375rem;
      padding: 0.15rem 0.45rem;
      margin: 0.125rem;
      font-size: 0.75rem;
      font-weight: 600;
      border: 1px solid var(--gc);
      color: var(--gc);
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th, td { border-bottom: 1px solid var(--border); padding: 0.55rem 0.75rem; text-align: left; vertical-align: top; }
    th { color: var(--muted); font-weight: 600; background: var(--surface); }
    tr:hover td { background: rgba(255,255,255,0.03); }
    .empty-state {
      padding: 2rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .explanation-output {
      padding: 0.85rem;
      font-size: 0.875rem;
    }
    .expl-sequence {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 0.35rem;
    }
    .expl-token {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.375rem;
      padding: 0.2rem 0.45rem;
      margin: 0.1rem 0;
    }
    .expl-token code {
      color: var(--accent-2);
      font-weight: 600;
      font-size: 0.85rem;
    }
    .expl-desc {
      color: var(--muted);
      font-size: 0.75rem;
    }
    .expl-group {
      width: 100%;
      border-left: 2px solid var(--accent);
      margin: 0.35rem 0;
      padding-left: 0.75rem;
    }
    .expl-group-head {
      color: var(--accent);
      font-weight: 700;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 0.35rem;
    }
    .expl-group-body {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 0.35rem;
    }
    .toast {
      position: fixed;
      bottom: 1.25rem;
      right: 1.25rem;
      background: var(--accent);
      color: #fff;
      padding: 0.6rem 1rem;
      border-radius: 0.5rem;
      box-shadow: var(--shadow);
      font-weight: 600;
      font-size: 0.85rem;
      transform: translateY(150%);
      transition: transform 0.25s;
      z-index: 50;
    }
    .toast.show { transform: translateY(0); }
  </style>
</head>
<body class="min-h-screen p-4 md:p-8">
  <div class="max-w-6xl mx-auto terminal-window">
    <div class="title-bar">
      <div class="flex items-center gap-2">
        <div class="btn-circle btn-red"></div>
        <div class="btn-circle btn-yellow"></div>
        <div class="btn-circle btn-green"></div>
      </div>
      <div class="title">Regex Lab</div>
      <button id="themeToggle" class="btn" aria-label="Toggle theme">🌙</button>
    </div>
    <div class="p-5 md:p-6 space-y-5">
      <div class="input-row">
        <label for="patternInput">Regular Expression</label>
        <div class="flex flex-col sm:flex-row gap-2">
          <div class="relative flex-1">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-muted font-mono text-sm">/</span>
            <input id="patternInput" type="text" class="w-full pl-7" spellcheck="false" autocomplete="off" placeholder="Enter your regex pattern...">
            <span id="flagDisplay" class="absolute right-3 top-1/2 -translate-y-1/2 text-muted font-mono text-sm">/</span>
          </div>
          <div class="flex gap-2">
            <button id="shareBtn" class="btn btn-primary">Share</button>
            <button id="clearBtn" class="btn">Clear</button>
          </div>
        </div>
      </div>
      <div>
        <label class="block mb-2">Flags</label>
        <div id="flagsRow" class="flex flex-wrap gap-3"></div>
      </div>
      <div class="input-row">
        <label for="textInput">Test Text</label>
        <textarea id="textInput" placeholder="Paste or type text to test against your pattern..."></textarea>
      </div>
      <div>
        <label class="block mb-2">Quick Inserts</label>
        <div id="quickInserts" class="flex flex-wrap gap-1"></div>
      </div>
      <div id="errorPanel" class="error-panel hidden"></div>
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
        <div class="panel">
          <div class="panel-header">Highlighted Matches</div>
          <div id="highlightOutput" class="highlight-output"><span class="text-muted">Enter a pattern and test text to see matches.</span></div>
        </div>
        <div class="panel">
          <div class="panel-header">Match Table</div>
          <div class="overflow-x-auto">
            <table id="matchesTable">
              <tbody><tr><td class="empty-state" colspan="4">No matches yet</td></tr></tbody>
            </table>
          </div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-header">Pattern Explanation</div>
        <div id="explanationOutput" class="explanation-output">
          <div class="empty-state">Enter a pattern to see an explanation.</div>
        </div>
      </div>
    </div>
  </div>
  <div id="toast" class="toast">Copied to clipboard!</div>
  <script>
    const patternInput = document.getElementById('patternInput');
    const textInput = document.getElementById('textInput');
    const flagsRow = document.getElementById('flagsRow');
    const flagDisplay = document.getElementById('flagDisplay');
    const errorPanel = document.getElementById('errorPanel');
    const highlightOutput = document.getElementById('highlightOutput');
    const matchesTable = document.getElementById('matchesTable');
    const explanationOutput = document.getElementById('explanationOutput');
    const quickInsertsEl = document.getElementById('quickInserts');
    const shareBtn = document.getElementById('shareBtn');
    const clearBtn = document.getElementById('clearBtn');
    const themeToggle = document.getElementById('themeToggle');
    const toast = document.getElementById('toast');

    const ALLOWED_FLAGS = ['g','i','m','s','u','y'];
    const flagChecks = {};
    let hasIndices = false;
    try { new RegExp('', 'd'); hasIndices = true; } catch (e) { hasIndices = false; }

    const DEFAULT_PATTERN = "(\\w+)@(\\w+\\.\\w+)";
    const DEFAULT_FLAGS = 'g';
    const DEFAULT_TEXT = "Reach out at alice@example.com or bob@example.org.\nAlso try support@regex-lab.dev.";

    function escapeHTML(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    ALLOWED_FLAGS.forEach(f => {
      const label = document.createElement('label');
      label.className = 'checkbox';
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.value = f;
      cb.addEventListener('change', update);
      flagChecks[f] = cb;
      label.appendChild(cb);
      label.appendChild(document.createTextNode(f));
      flagsRow.appendChild(label);
    });

    const quickInserts = [
      {label:'\\d', raw:'\\d', offset:2},
      {label:'\\D', raw:'\\D', offset:2},
      {label:'\\w', raw:'\\w', offset:2},
      {label:'\\W', raw:'\\W', offset:2},
      {label:'\\s', raw:'\\s', offset:2},
      {label:'\\S', raw:'\\S', offset:2},
      {label:'.', raw:'.', offset:1},
      {label:'^', raw:'^', offset:1},
      {label:'$', raw:'$', offset:1},
      {label:'[A-Z]', raw:'[A-Z]', offset:1},
      {label:'[a-z]', raw:'[a-z]', offset:1},
      {label:'[0-9]', raw:'[0-9]', offset:1},
      {label:'[^...]', raw:'[^ ]', offset:2, select:1},
      {label:'(...)', raw:'( )', offset:1, select:1},
      {label:'(?:...)', raw:'(?: )', offset:2, select:1},
      {label:'(?=...)', raw:'(?= )', offset:3, select:1},
      {label:'(?!...)', raw:'(?! )', offset:3, select:1},
      {label:'\\b', raw:'\\b', offset:2},
      {label:'+', raw:'+', offset:1},
      {label:'*', raw:'*', offset:1},
      {label:'?', raw:'?', offset:1},
      {label:'{n}', raw:'{1}', offset:1, select:1},
      {label:'|', raw:'|', offset:1},
      {label:'\\t', raw:'\\t', offset:2},
      {label:'\\n', raw:'\\n', offset:2},
      {label:'\\1', raw:'\\1', offset:2},
      {label:'(?<name>)', raw:'(?<name> )', offset:8, select:1},
    ];
    quickInserts.forEach(({label, raw, offset, select}) => {
      const btn = document.createElement('button');
      btn.className = 'quick-btn';
      btn.textContent = label;
      btn.addEventListener('click', () => insertAtCursor(patternInput, raw, offset, select || 0));
      quickInsertsEl.appendChild(btn);
    });

    function insertAtCursor(input, text, cursorOffset, selectLength) {
      const start = input.selectionStart;
      const end = input.selectionEnd;
      const before = input.value.slice(0, start);
      const after = input.value.slice(end);
      input.value = before + text + after;
      const selStart = start + cursorOffset;
      const selEnd = selStart + (selectLength || 0);
      input.setSelectionRange(selStart, selEnd);
      input.focus();
      update();
    }

    function getFlags() {
      return ALLOWED_FLAGS.filter(f => flagChecks[f].checked).join('');
    }
    function setFlags(flags) {
      ALLOWED_FLAGS.forEach(f => { flagChecks[f].checked = flags.includes(f); });
      flagDisplay.textContent = '/' + getFlags();
    }

    function updateHash() {
      const p = patternInput.value;
      const f = getFlags();
      const hash = new URLSearchParams();
      if (p) hash.set('p', p);
      if (f) hash.set('f', f);
      const hashString = hash.toString();
      if (hashString) {
        history.replaceState(null, '', '#' + hashString);
      } else {
        history.replaceState(null, '', location.pathname + location.search);
      }
    }
    function loadFromHash() {
      const hash = location.hash.slice(1);
      if (!hash) return false;
      const params = new URLSearchParams(hash);
      const p = params.get('p');
      const f = params.get('f');
      if (p !== null) patternInput.value = p;
      if (f !== null) setFlags(f);
      return true;
    }

    function initTheme() {
      const saved = localStorage.getItem('regexLabTheme');
      if (saved) document.documentElement.setAttribute('data-theme', saved);
      updateThemeIcon();
    }
    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme') || 'dark';
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('regexLabTheme', next);
      updateThemeIcon();
    }
    function updateThemeIcon() {
      const isDark = (document.documentElement.getAttribute('data-theme') || 'dark') === 'dark';
      themeToggle.textContent = isDark ? '🌙' : '☀️';
    }
    themeToggle.addEventListener('click', toggleTheme);

    function update() {
      flagDisplay.textContent = '/' + getFlags();
      updateHash();
      run();
    }

    function run() {
      const pattern = patternInput.value;
      const text = textInput.value;
      const flags = getFlags();
      if (!pattern) {
        clearOutputs();
        return;
      }
      try {
        new RegExp(pattern, flags);
      } catch (err) {
        handleError(err, pattern);
        clearOutputs();
        return;
      }
      errorPanel.classList.add('hidden');
      try {
        const matches = getMatches(text, pattern, flags);
        renderOutputs(matches, text);
      } catch (err) {
        handleError(err, pattern);
        clearOutputs();
      }
    }

    function handleError(err, pattern) {
      let position = null;
      try {
        const parser = new RegexParser(pattern);
        parser.parse();
      } catch (parseErr) {
        if (parseErr.position != null) {
          position = parseErr.position;
          if (parseErr.message && parseErr.message !== err.message) {
            err = parseErr;
          }
        }
      }
      let html = '<strong class="font-semibold">Invalid regular expression</strong>';
      html += '<p class="mt-1">' + escapeHTML(err.message) + '</p>';
      if (position != null && position >= 0) {
        const windowSize = 60;
        const start = Math.max(0, position - 20);
        const end = Math.min(pattern.length, start + windowSize);
        const snippet = pattern.slice(start, end);
        const caretPos = position - start;
        const caret = ' '.repeat(caretPos) + '^';
        html += '<pre class="error-caret font-mono">' + escapeHTML(snippet) + '\n' + caret + '</pre>';
        html += '<p class="mt-1 text-xs opacity-80">Position ' + position + '</p>';
      }
      errorPanel.innerHTML = html;
      errorPanel.classList.remove('hidden');
    }

    function clearOutputs() {
      highlightOutput.innerHTML = '<span class="text-muted">Enter a pattern and test text to see matches.</span>';
      matchesTable.innerHTML = '<tbody><tr><td class="empty-state" colspan="4">No matches yet</td></tr></tbody>';
      explanationOutput.innerHTML = '<div class="empty-state">Enter a pattern to see an explanation.</div>';
    }

    function renderOutputs(matches, text) {
      highlightOutput.innerHTML = renderHighlights(text, matches);
      matchesTable.innerHTML = renderMatchesTable(matches);
      explanationOutput.innerHTML = '<div class="expl-sequence">' + explainPattern(patternInput.value) + '</div>';
    }

    function getMatches(text, pattern, flags) {
      let internalFlags = flags;
      if (hasIndices && !internalFlags.includes('d')) internalFlags += 'd';
      const re = new RegExp(pattern, internalFlags);
      const matches = [];
      const isGlobal = flags.includes('g');
      let m;
      if (isGlobal) {
        while ((m = re.exec(text)) !== null) {
          matches.push(processMatch(m));
        }
      } else {
        m = re.exec(text);
        if (m) matches.push(processMatch(m));
      }
      return matches;
    }
    function processMatch(m) {
      const start = m.index;
      const end = start + m[0].length;
      const groups = [];
      const nameMap = {};
      if (m.indices && m.indices.groups) {
        for (const [name, range] of Object.entries(m.indices.groups)) {
          if (range) nameMap[range[0] + '-' + range[1]] = name;
        }
      }
      for (let i = m.length - 1; i >= 1; i--) {
        if (m[i] === undefined) continue;
        let gstart, gend;
        if (m.indices && m.indices[i]) {
          gstart = m.indices[i][0];
          gend = m.indices[i][1];
        }
        const key = (gstart != null) ? (gstart + '-' + gend) : null;
        const name = (key && !nameMap[key + '_used']) ? nameMap[key] : null;
        if (key && name) nameMap[key + '_used'] = true;
        groups.push({group: i, text: m[i], start: gstart, end: gend, name});
      }
      groups.sort((a, b) => a.group - b.group);
      return {start, end, text: m[0], groups};
    }

    function renderHighlights(text, matches) {
      if (!text) return '<span class="empty-state">Enter test text to see matches highlighted.</span>';
      if (!matches.length) return escapeHTML(text) + '<div class="mt-2 text-muted">No matches found.</div>';
      matches.sort((a, b) => a.start - b.start);
      let html = '';
      let last = 0;
      for (const m of matches) {
        if (m.start > last) html += escapeHTML(text.slice(last, m.start));
        else if (m.start < last) continue;
        const matchInterval = {start: m.start, end: m.end, type: 'match', children: []};
        const groupIntervals = m.groups

    function buildTree(intervals) {

    function renderMatchesTable(matches) {

        html += '<tr><td>' + (idx + 1) + '</td><td><code>' + escapeHTML(m.text) + '</code></td><td>' + m.start + '–' + m.end + '</td><td>';

          m.groups.forEach(g => {

    function scanTokens(pattern) {

                j++;
                if (j < pattern.length && pattern[j] === '=') { raw += '='; desc = 'positive lookbehind'; j++; }

    function describeEscapeToken(raw) {

        't': 'tab', 'n': 'newline', 'r': 'carriage return', 'f': 'form feed', 'v': 'vertical tab',
        '0': 'null', '1': 'backreference 1', '2': 'backreference 2', '3': 'backreference 3',
        '4': 'backreference 4', '5': 'backreference 5', '6': 'backreference 6', '7': 'backreference 7',

      return map[ch] || 'special character';
    }

    function shareLink() {
      const url = window.location.href;
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(url).then(() => showToast('Copied permalink to clipboard')).catch(() => showToast('Could not copy'));
      } else {
        showToast('Permalink ready in address bar');
      }
    }
    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2200);
    }
    function clearAll() {
      patternInput.value = '';
      textInput.value = '';
      ALLOWED_FLAGS.forEach(f => flagChecks[f].checked = false);
      update();
    }
    shareBtn.addEventListener('click', shareLink);
    clearBtn.addEventListener('click', clearAll);

    function init() {
      initTheme();
      const loaded = loadFromHash();
      if (!loaded) {
        patternInput.value = DEFAULT_PATTERN;
        setFlags(DEFAULT_FLAGS);
        textInput.value = DEFAULT_TEXT;
      }
      patternInput.addEventListener('input', update);
      textInput.addEventListener('input', update);
      window.addEventListener('hashchange', () => { loadFromHash(); update(); });
      update();
