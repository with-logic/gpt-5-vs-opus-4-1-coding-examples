<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custom QR Code Generator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --glass: rgba(30, 41, 59, 0.65);
      --border: rgba(148, 163, 184, 0.12);
    }

    body {
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(ellipse at top left, #1e293b 0%, #0f172a 50%, #020617 100%);
      min-height: 100vh;
    }

    .panel {
      background: var(--glass);
      border: 1px solid var(--border);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    input[type="color"].color-input {
      -webkit-appearance: none;
      appearance: none;
      border: none;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      padding: 0;
      overflow: hidden;
      cursor: pointer;
      background: transparent;
    }
    input[type="color"].color-input::-webkit-color-swatch-wrapper { padding: 0; }
    input[type="color"].color-input::-webkit-color-swatch { border: none; border-radius: 50%; }
    input[type="color"].color-input::-moz-color-swatch { border: none; border-radius: 50%; }

    input[type="range"].range-slider {
      -webkit-appearance: none;
      appearance: none;
      height: 6px;
      border-radius: 999px;
      background: rgba(148, 163, 184, 0.2);
      outline: none;
    }
    input[type="range"].range-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #6366f1;
      cursor: pointer;
      border: 2px solid #0f172a;
      box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.4);
      transition: transform 0.15s ease;
    }
    input[type="range"].range-slider::-webkit-slider-thumb:hover { transform: scale(1.1); }
    input[type="range"].range-slider::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #6366f1;
      cursor: pointer;
      border: 2px solid #0f172a;
      box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.4);
    }

    .preview-canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
  </style>
</head>
<body class="text-slate-100 flex flex-col">

  <header class="pt-10 pb-6 text-center px-6">
    <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-gradient-to-br from-indigo-500 to-violet-600 mb-4 shadow-lg shadow-indigo-500/30">
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white">
        <rect width="5" height="5" x="3" y="3" rx="1"></rect>
        <rect width="5" height="5" x="16" y="3" rx="1"></rect>
        <rect width="5" height="5" x="3" y="16" rx="1"></rect>
        <path d="M21 16h-3a2 2 0 0 0-2 2v3"></path>
        <path d="M21 21v.01"></path>
        <path d="M12 7v3a2 2 0 0 1-2 2H7"></path>
        <path d="M3 12h.01"></path>
        <path d="M12 3h.01"></path>
        <path d="M12 16v.01"></path>
        <path d="M16 12h1"></path>
        <path d="M21 12v.01"></path>
        <path d="M12 21v-1"></path>
      </svg>
    </div>
    <h1 class="text-4xl font-extrabold tracking-tight text-white">Custom QR Code Generator</h1>
    <p class="text-slate-400 mt-2 text-lg">Turn any text or URL into a styled, downloadable QR code.</p>
  </header>

  <main class="flex-1 w-full max-w-6xl mx-auto px-6 pb-12">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">

      <!-- Controls -->
      <section class="lg:col-span-4 space-y-6">
        <div class="panel rounded-3xl p-6 shadow-2xl">
          <div class="space-y-5">

            <!-- Text Input -->
            <div class="space-y-2">
              <label for="textInput" class="text-sm font-semibold text-slate-300">Text or URL</label>
              <textarea id="textInput" rows="4" placeholder="https://example.com"
                class="w-full bg-slate-950/50 border border-slate-700 rounded-2xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500/70 focus:border-indigo-500 transition resize-none">https://example.com</textarea>
            </div>

            <!-- Colors -->
            <div class="grid grid-cols-2 gap-4">
              <div class="space-y-2">
                <label for="fgColor" class="text-sm font-semibold text-slate-300">Foreground</label>
                <div class="flex items-center gap-3 bg-slate-950/50 border border-slate-700 rounded-2xl px-3 py-2.5">
                  <input type="color" id="fgColor" value="#000000" class="color-input">
                  <span id="fgColorHex" class="text-xs font-mono text-slate-400">#000000</span>
                </div>
              </div>
              <div class="space-y-2">
                <label for="bgColor" class="text-sm font-semibold text-slate-300">Background</label>
                <div class="flex items-center gap-3 bg-slate-950/50 border border-slate-700 rounded-2xl px-3 py-2.5">
                  <input type="color" id="bgColor" value="#ffffff" class="color-input">
                  <span id="bgColorHex" class="text-xs font-mono text-slate-400">#ffffff</span>
                </div>
              </div>
            </div>

            <!-- Error Correction -->
            <div class="space-y-2">
              <label for="ecLevel" class="text-sm font-semibold text-slate-300">Error Correction</label>
              <select id="ecLevel"
                class="w-full bg-slate-950/50 border border-slate-700 rounded-2xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-indigo-500/70 focus:border-indigo-500 transition">
                <option value="L">Low (~7%)</option>
                <option value="M" selected>Medium (~15%)</option>
                <option value="Q">Quartile (~25%)</option>
                <option value="H">High (~30%)</option>
              </select>
            </div>

            <!-- Margin -->
            <div class="space-y-2">
              <div class="flex justify-between items-center">
                <label for="margin" class="text-sm font-semibold text-slate-300">Quiet Zone</label>
                <span id="marginVal" class="text-xs font-mono text-slate-400">3 modules</span>
              </div>
              <input type="range" id="margin" min="0" max="10" value="3" step="1" class="w-full range-slider">
            </div>

            <!-- Resolution -->
            <div class="space-y-2">
              <div class="flex justify-between items-center">
                <label for="size" class="text-sm font-semibold text-slate-300">Download Size</label>
                <span id="sizeVal" class="text-xs font-mono text-slate-400">768 px</span>
              </div>
              <input type="range" id="size" min="256" max="1200" value="768" step="64" class="w-full range-slider">
            </div>

          </div>
        </div>
      </section>

      <!-- Preview -->
      <section class="lg:col-span-8">
        <div class="panel rounded-3xl p-6 h-full min-h-[420px] flex flex-col items-center justify-center relative shadow-2xl">
          <div id="placeholder" class="absolute inset-0 flex flex-col items-center justify-center text-slate-500 hidden">
            <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="mb-3 opacity-50">
              <rect width="5" height="5" x="3" y="3" rx="1"></rect>
              <rect width="5" height="5" x="16" y="3" rx="1"></rect>
              <rect width="5" height="5" x="3" y="16" rx="1"></rect>
              <path d="M21 16h-3a2 2 0 0 0-2 2v3"></path>
              <path d="M21 21v.01"></path>
              <path d="M12 7v3a2 2 0 0 1-2 2H7"></path>
              <path d="M3 12h.01"></path>
              <path d="M12 3h.01"></path>
              <path d="M12 16v.01"></path>
              <path d="M16 12h1"></path>
              <path d="M21 12v.01"></path>
              <path d="M12 21v-1"></path>
            </svg>
            <p class="text-sm">Enter text to generate a QR code</p>
          </div>

          <canvas id="qrCanvas" class="hidden preview-canvas max-w-full max-h-[60vh] rounded-2xl shadow-2xl transition-all"></canvas>

          <p id="errorMsg" class="mt-4 text-sm text-red-400 hidden text-center max-w-md"></p>

          <button id="downloadBtn" class="mt-6 inline-flex items-center gap-2 bg-indigo-600 hover:bg-indigo-500 text-white font-semibold px-7 py-3 rounded-2xl transition-all shadow-lg shadow-indigo-600/30 hover:shadow-indigo-500/40 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:ring-offset-2 focus:ring-offset-slate-900 disabled:opacity-50 disabled:cursor-not-allowed">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="7 10 12 15 17 10"></polyline>
              <line x1="12" x2="12" y1="15" y2="3"></line>
            </svg>
            Download PNG
          </button>
        </div>
      </section>
    </div>
  </main>

  <footer class="text-center py-6 text-slate-500 text-sm">
    Custom QR Code Generator &middot; Generate &amp; download in seconds
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js" integrity="sha384-lQXOAyZwHXE55JFyrOMB7nY2Wv+m5ZWNtJcHrd1rceRQXAYNLak8ukN5TjBTcIwz" crossorigin="anonymous"></script>
  <script>
    (function() {
      const textInput = document.getElementById('textInput');
      const fgInput = document.getElementById('fgColor');
      const bgInput = document.getElementById('bgColor');
      const fgHex = document.getElementById('fgColorHex');
      const bgHex = document.getElementById('bgColorHex');
      const ecLevel = document.getElementById('ecLevel');
      const marginInput = document.getElementById('margin');
      const marginVal = document.getElementById('marginVal');
      const sizeInput = document.getElementById('size');
      const sizeVal = document.getElementById('sizeVal');
      const canvas = document.getElementById('qrCanvas');
      const ctx = canvas.getContext('2d');
      const placeholder = document.getElementById('placeholder');
      const errorMsg = document.getElementById('errorMsg');
      const downloadBtn = document.getElementById('downloadBtn');

      function updateLabels() {
        fgHex.textContent = fgInput.value.toUpperCase();
        bgHex.textContent = bgInput.value.toUpperCase();
        marginVal.textContent = marginInput.value + ' module' + (marginInput.value === '1' ? '' : 's');
        sizeVal.textContent = sizeInput.value + ' px';
      }

      function renderQR() {
        const text = textInput.value.trim();

        if (!text) {
          canvas.classList.add('hidden');
          placeholder.classList.remove('hidden');
          errorMsg.classList.add('hidden');
          downloadBtn.disabled = true;
          return;
        }

        try {
          const qr = qrcode(0, ecLevel.value);
          qr.addData(text);
          qr.make();
          const count = qr.getModuleCount();
          const margin = parseInt(marginInput.value, 10);
          const targetWidth = parseInt(sizeInput.value, 10);
          const cellSize = Math.max(2, Math.floor(targetWidth / (count + 2 * margin)));
          const width = count * cellSize + 2 * margin * cellSize;

          // Ensure reasonable resolution for download.
          canvas.width = width;
          canvas.height = width;

          // Background
          ctx.fillStyle = bgInput.value;
          ctx.fillRect(0, 0, width, width);

          // Modules
          ctx.fillStyle = fgInput.value;
          for (let row = 0; row < count; row++) {
            for (let col = 0; col < count; col++) {
              if (qr.isDark(row, col)) {
                ctx.fillRect((margin + col) * cellSize, (margin + row) * cellSize, cellSize, cellSize);
              }
            }
          }

          canvas.classList.remove('hidden');
          placeholder.classList.add('hidden');
          errorMsg.classList.add('hidden');
          downloadBtn.disabled = false;
        } catch (err) {
          canvas.classList.add('hidden');
          placeholder.classList.remove('hidden');
          errorMsg.textContent = 'Could not generate QR code: ' + err.message;
          errorMsg.classList.remove('hidden');
          downloadBtn.disabled = true;
        }
      }

      function downloadQR() {
        if (textInput.value.trim() === '') return;
        const link = document.createElement('a');
        link.download = 'custom-qr-code.png';
        link.href = canvas.toDataURL('image/png');
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      }

      // Debounce rapid typing.
      let timeout = null;
      function scheduleRender() {
        clearTimeout(timeout);
        timeout = setTimeout(renderQR, 80);
      }

      textInput.addEventListener('input', scheduleRender);
      ecLevel.addEventListener('change', renderQR);
      marginInput.addEventListener('input', () => { updateLabels(); renderQR(); });
      sizeInput.addEventListener('input', () => { updateLabels(); renderQR(); });
      fgInput.addEventListener('input', () => { updateLabels(); renderQR(); });
      bgInput.addEventListener('input', () => { updateLabels(); renderQR(); });
      downloadBtn.addEventListener('click', downloadQR);

      updateLabels();
      renderQR();
    })();
  </script>
</body>
</html>
