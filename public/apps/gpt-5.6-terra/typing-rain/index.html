<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Typing Rain — A night-time typing game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet">
  <style>
    :root{--ink:#e9f5f4;--muted:#9bb6ba;--line:rgba(201,239,237,.17);--glass:rgba(8,25,38,.52);--cyan:#8df2e4;--cyan2:#42bcbc;--coral:#ffad82;--night:#071523}*{box-sizing:border-box}html,body{height:100%;margin:0}body{background:#06111d;color:var(--ink);font-family:"DM Mono",monospace;overflow:hidden;letter-spacing:.02em}button{font:inherit;color:inherit}#game{height:100%;min-height:570px;position:relative;isolation:isolate;overflow:hidden;background:radial-gradient(ellipse at 71% 8%,#19405a 0%,#0c253a 31%,#071827 67%,#04101b 100%)}
    /* atmosphere */
    .moon{position:absolute;width:min(19vw,240px);aspect-ratio:1;border-radius:50%;right:12%;top:8%;background:#d7f4e8;box-shadow:0 0 35px 12px rgba(190,246,229,.22),0 0 120px 30px rgba(111,220,214,.12);opacity:.95}.moon:after{content:"";position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle at 38% 28%,transparent 0 8%,rgba(54,115,123,.14) 9% 10%,transparent 11% 20%,rgba(54,115,123,.12) 21% 24%,transparent 25% 100%)}.haze{position:absolute;inset:33% -10% 0;background:linear-gradient(180deg,rgba(49,129,148,.13),transparent 31%);filter:blur(22px)}
    .rain{position:absolute;inset:0;overflow:hidden;pointer-events:none;opacity:.52}.rain i{position:absolute;top:-16%;width:1px;height:88px;background:linear-gradient(transparent,rgba(158,231,237,.7),transparent);transform:rotate(16deg);animation:shower linear infinite}.rain i:nth-child(1){left:8%;animation-duration:1.65s}.rain i:nth-child(2){left:18%;animation-duration:2s;animation-delay:-.7s}.rain i:nth-child(3){left:30%;animation-duration:1.45s;animation-delay:-.3s}.rain i:nth-child(4){left:43%;animation-duration:1.9s;animation-delay:-1.1s}.rain i:nth-child(5){left:55%;animation-duration:1.55s;animation-delay:-.4s}.rain i:nth-child(6){left:67%;animation-duration:2.2s;animation-delay:-.9s}.rain i:nth-child(7){left:77%;animation-duration:1.8s;animation-delay:-1.4s}.rain i:nth-child(8){left:89%;animation-duration:1.5s;animation-delay:-.1s}.rain i:nth-child(9){left:95%;animation-duration:2.05s;animation-delay:-.6s}@keyframes shower{to{transform:translate(-130px,125vh) rotate(16deg)}}
    .skyline{position:absolute;z-index:-1;left:0;right:0;bottom:0;height:35%;display:flex;align-items:flex-end;gap:4px;padding:0 2%;opacity:.94;filter:drop-shadow(0 -10px 20px rgba(20,122,143,.12))}.building{position:relative;background:linear-gradient(90deg,#071624,#0b2635 52%,#06121e);width:var(--w);height:var(--h);box-shadow:inset -3px 0 rgba(0,0,0,.24)}.building:before{content:"";position:absolute;inset:13px 17% 0;background:repeating-linear-gradient(180deg,transparent 0 9px,rgba(101,207,196,.42) 10px 12px,transparent 13px 22px),repeating-linear-gradient(90deg,transparent 0 8px,rgba(7,24,35,.9) 9px 13px)}.building:nth-child(3n):before,.building:nth-child(7n):before{background:repeating-linear-gradient(180deg,transparent 0 12px,rgba(249,194,112,.5) 13px 15px,transparent 16px 29px),repeating-linear-gradient(90deg,transparent 0 9px,rgba(7,24,35,.9) 10px 15px)}.building.tower:after{content:"";position:absolute;left:49%;top:-44px;height:44px;width:2px;background:linear-gradient(#8cf0de,transparent)}.water{position:absolute;z-index:-1;inset:auto 0 0;height:11%;background:linear-gradient(#0a2739cc,#06151f)}.water:before{content:"";position:absolute;inset:11% 0;background:repeating-linear-gradient(179deg,transparent 0 7px,rgba(112,216,211,.12) 8px 9px,transparent 10px 16px);animation:ripple 6s ease-in-out infinite}@keyframes ripple{50%{transform:translateX(4%)}}
    .topbar{position:absolute;z-index:6;top:0;left:0;right:0;height:88px;padding:24px clamp(20px,5vw,72px);display:flex;align-items:center;justify-content:space-between;background:linear-gradient(#06131ddd,transparent)}.brand{font-family:Fraunces,serif;font-size:clamp(23px,2.5vw,32px);letter-spacing:-.055em;line-height:1}.brand span{color:var(--cyan)}.sub{color:var(--muted);font-size:10px;letter-spacing:.18em;text-transform:uppercase;margin-top:5px}.top-actions{display:flex;gap:11px;align-items:center}.sound,.pause{border:1px solid var(--line);background:rgba(4,19,30,.35);border-radius:50%;width:38px;height:38px;cursor:pointer;transition:.2s}.pause{border-radius:20px;width:auto;padding:0 15px;font-size:11px;letter-spacing:.09em}.sound:hover,.pause:hover{border-color:var(--cyan);color:var(--cyan)}button:focus-visible{outline:2px solid var(--cyan);outline-offset:3px}
    .hud{position:absolute;z-index:5;top:110px;left:clamp(20px,5vw,72px);right:clamp(20px,5vw,72px);display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none}.metric-group{display:flex;gap:clamp(20px,4.5vw,68px)}.metric-label{display:block;color:var(--muted);font-size:9px;letter-spacing:.19em;text-transform:uppercase;margin-bottom:8px}.metric-value{font-family:Fraunces,serif;font-size:clamp(26px,3.3vw,43px);letter-spacing:-.04em;line-height:.9}.metric-value small{font-family:"DM Mono";font-size:11px;color:var(--muted);letter-spacing:0}.level{border:1px solid var(--line);border-radius:2px;padding:12px 15px;background:var(--glass);backdrop-filter:blur(8px);font-size:10px;line-height:1.7;text-align:right}.level b{color:var(--cyan);font-size:15px}
    #field{position:absolute;inset:0;z-index:2}.word{position:absolute;white-space:nowrap;font-size:clamp(14px,1.6vw,19px);font-weight:500;color:#eafffa;text-shadow:0 0 9px rgba(119,240,227,.42);will-change:transform;transition:filter .13s}.word:before{content:"";position:absolute;left:50%;bottom:calc(100% + 9px);height:25px;width:1px;background:linear-gradient(transparent,var(--cyan));opacity:.74}.word .done{color:var(--cyan);text-shadow:0 0 15px var(--cyan)}.word.target{filter:brightness(1.45);text-shadow:0 0 14px var(--cyan),0 0 28px rgba(85,240,218,.3)}.word.target:after{content:"";position:absolute;left:-12px;right:-12px;bottom:-9px;height:1px;background:var(--cyan);box-shadow:0 0 7px var(--cyan)}
    .bottom{position:absolute;z-index:7;bottom:0;left:0;right:0;padding:0 clamp(20px,5vw,72px) clamp(22px,4vw,46px);display:flex;align-items:flex-end;justify-content:space-between;gap:24px;background:linear-gradient(transparent,rgba(3,13,22,.83) 38%)}.typing-area{width:min(550px,68vw)}.prompt{font-size:10px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin:0 0 9px}.type-line{height:55px;border-bottom:1px solid rgba(181,241,235,.53);display:flex;align-items:center;gap:11px;font-size:22px;text-shadow:0 0 12px rgba(124,242,225,.5)}.cursor{width:8px;height:25px;background:var(--cyan);box-shadow:0 0 12px var(--cyan);animation:blink 1s step-end infinite}.type-line.error{border-color:var(--coral);animation:shake .18s linear 2}.type-line.error .cursor{background:var(--coral)}@keyframes blink{50%{opacity:0}}@keyframes shake{25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}.danger{width:min(220px,20vw);padding-bottom:9px}.danger span{font-size:9px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase}.danger-line{height:3px;background:rgba(215,244,237,.18);margin-top:9px;position:relative}.danger-line:after{content:"";position:absolute;left:0;top:0;bottom:0;width:var(--risk,0%);background:linear-gradient(90deg,var(--cyan),var(--coral));transition:width .25s}
    .overlay{position:absolute;inset:0;z-index:10;display:flex;align-items:center;justify-content:center;text-align:center;background:rgba(3,15,24,.18);backdrop-filter:blur(2px);transition:opacity .4s,visibility .4s}.overlay.hidden{opacity:0;visibility:hidden;pointer-events:none}.intro{width:min(520px,88vw);padding:32px}.eyebrow{color:var(--cyan);font-size:10px;letter-spacing:.22em;text-transform:uppercase;margin:0 0 15px}.intro h1{font-family:Fraunces,serif;font-size:clamp(48px,8vw,91px);font-weight:600;letter-spacing:-.075em;line-height:.85;margin:0}.intro h1 em{font-weight:600;color:var(--cyan);font-style:italic}.intro p{max-width:355px;margin:22px auto 28px;color:#bed2d3;font-size:13px;line-height:1.75}.start{border:1px solid var(--cyan);background:var(--cyan);color:#06212b;cursor:pointer;padding:15px 23px;font-size:11px;font-weight:500;letter-spacing:.17em;text-transform:uppercase;transition:transform .2s,box-shadow .2s}.start:hover{transform:translateY(-2px);box-shadow:0 8px 26px rgba(101,242,219,.27)}.how{margin:17px 0 0;color:var(--muted);font-size:10px}.how kbd{border:1px solid rgba(201,239,237,.35);padding:2px 5px;color:#dffaf6}.burst{position:absolute;z-index:8;font-size:12px;color:var(--cyan);text-shadow:0 0 14px var(--cyan);animation:burst .7s ease-out forwards;pointer-events:none}@keyframes burst{0%{opacity:0;transform:translateY(10px) scale(.7)}20%{opacity:1}100%{opacity:0;transform:translateY(-30px) scale(1.15)}}
    @media(max-width:650px){#game{min-height:500px}.topbar{height:72px;padding-top:17px}.hud{top:91px}.metric-group{gap:22px}.metric-value{font-size:28px}.level{padding:8px 10px}.bottom{align-items:flex-end}.danger{display:none}.typing-area{width:100%}.word{font-size:15px}.moon{right:-4%;top:11%;width:155px}.skyline{height:29%}}
  </style>
</head>
<body>
<main id="game" aria-label="Typing Rain game" tabindex="0">
  <div class="moon"></div><div class="haze"></div><div class="rain" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i></div>
  <div class="skyline" aria-hidden="true"><div class="building" style="--w:8%;--h:39%"></div><div class="building tower" style="--w:6%;--h:70%"></div><div class="building" style="--w:10%;--h:49%"></div><div class="building" style="--w:7%;--h:83%"></div><div class="building tower" style="--w:9%;--h:61%"></div><div class="building" style="--w:5%;--h:42%"></div><div class="building" style="--w:12%;--h:76%"></div><div class="building" style="--w:7%;--h:58%"></div><div class="building tower" style="--w:8%;--h:95%"></div><div class="building" style="--w:10%;--h:54%"></div><div class="building" style="--w:6%;--h:71%"></div><div class="building" style="--w:8%;--h:44%"></div></div><div class="water" aria-hidden="true"></div>
  <header class="topbar"><div><div class="brand">Typing <span>Rain</span></div><div class="sub">Midnight practice</div></div><div class="top-actions"><button class="sound" id="sound" aria-label="Toggle sound">◖))</button><button class="pause" id="pause">Pause</button></div></header>
  <section class="hud" aria-label="Game statistics"><div class="metric-group"><div><span class="metric-label">Score</span><strong class="metric-value" id="score">0000</strong></div><div><span class="metric-label">Accuracy</span><strong class="metric-value"><span id="accuracy">100</span><small>%</small></strong></div></div><div class="level"><span class="metric-label">Rain intensity</span><b id="level">01</b> / 10</div></section>
  <section id="field" aria-live="polite" aria-label="Falling words"></section>
  <footer class="bottom"><div class="typing-area"><p class="prompt" id="prompt">Listen to the rain. Type the glowing words.</p><div class="type-line" id="typeLine"><span id="typed"></span><span class="cursor"></span></div></div><div class="danger"><span>Street level</span><div class="danger-line" id="dangerLine"></div></div></footer>
  <section class="overlay" id="overlay"><div class="intro"><p class="eyebrow">A nocturnal typing game</p><h1>Make the<br>rain <em>listen.</em></h1><p>Catch each word before it reaches the streets. The storm learns your pace.</p><button class="start" id="start">Begin the storm</button><p class="how"><kbd>Type</kbd> to catch · <kbd>Esc</kbd> to pause</p></div></section>
</main>
<script>
(() => {
  const words=['mist','neon','drift','night','street','cloud','quiet','glow','harbor','window','silver','signal','lantern','thunder','midnight','electric','rooftop','puddle','monsoon','echo','velvet','tide','shadow','weather','city','distant','reflect','whisper','station','shelter','sapphire','current','lowlight','raindrop','horizon','afterglow','tremble','cascade','solstice','rivulet','cathedral'];
  const el={game:document.querySelector('#game'),field:document.querySelector('#field'),score:document.querySelector('#score'),accuracy:document.querySelector('#accuracy'),level:document.querySelector('#level'),typed:document.querySelector('#typed'),line:document.querySelector('#typeLine'),overlay:document.querySelector('#overlay'),start:document.querySelector('#start'),pause:document.querySelector('#pause'),prompt:document.querySelector('#prompt'),risk:document.querySelector('#dangerLine'),sound:document.querySelector('#sound')};
  let active=[],input='',score=0,correct=0,keystrokes=0,started=false,paused=false,last=0,nextDrop=0,clock=0,muted=false,ctx;
  function level(){return Math.min(10,1+Math.floor(score/80))}function accuracy(){return keystrokes?Math.round(correct/keystrokes*100):100}
  function tone(freq,duration=.055,type='sine',gain=.025){if(muted)return;try{ctx||=new (window.AudioContext||window.webkitAudioContext)();const o=ctx.createOscillator(),g=ctx.createGain();o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(gain,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+duration);o.connect(g).connect(ctx.destination);o.start();o.stop(ctx.currentTime+duration)}catch(e){}}
  function update(){el.score.textContent=String(score).padStart(4,'0');el.accuracy.textContent=accuracy();el.level.textContent=String(level()).padStart(2,'0');const farthest=Math.max(0,...active.map(a=>a.y));el.risk.style.setProperty('--risk',Math.min(100,farthest/Math.max(1,innerHeight-120)*100)+'%');el.typed.textContent=input;active.forEach(a=>{const n=Math.min(input.length,a.word.length);a.node.classList.toggle('target',input&&a.word.startsWith(input));a.node.innerHTML=a.word.startsWith(input)?'<span class="done">'+a.word.slice(0,n)+'</span>'+a.word.slice(n):a.word})}
  function makeWord(){const occupied=active.map(x=>x.word);let word;do{word=words[Math.floor(Math.random()*words.length)]}while(occupied.includes(word));const node=document.createElement('div');node.className='word';node.textContent=word;const x=7+Math.random()*82;const item={word,node,x,y:175+Math.random()*-85,speed:18+level()*4+Math.random()*8};node.style.left=x+'%';el.field.append(node);active.push(item)}
  function burst(x,y,text){const n=document.createElement('div');n.className='burst';n.textContent=text;n.style.left=x+'px';n.style.top=y+'px';el.field.append(n);setTimeout(()=>n.remove(),720)}
  function clearWord(item){const rect=item.node.getBoundingClientRect();burst(rect.left+rect.width/2,rect.top,'+'+(item.word.length*10));item.node.remove();active=active.filter(a=>a!==item);score+=item.word.length*10;input='';tone(520+item.word.length*32,.09,'triangle',.04);update()}
  function miss(item){const r=item.node.getBoundingClientRect();burst(r.left+r.width/2,innerHeight-135,'missed');item.node.remove();active=active.filter(a=>a!==item);input='';tone(105,.14,'sawtooth',.03);update()}
  function frame(t){requestAnimationFrame(frame);if(!started||paused)return;if(!last)last=t;const dt=Math.min(.05,(t-last)/1000);last=t;clock+=dt;const spawnEvery=Math.max(.82,2.45-level()*.16);if(clock>nextDrop){makeWord();nextDrop=clock+spawnEvery}active.slice().forEach(a=>{a.y+=a.speed*dt;a.node.style.transform='translateY('+a.y+'px)';if(a.y>innerHeight-110)miss(a)});update()}
  function begin(){started=true;paused=false;last=0;clock=0;nextDrop=.15;el.overlay.classList.add('hidden');el.pause.textContent='Pause';el.prompt.textContent='Type the glowing words before they fall.';el.game.focus();tone(330,.12,'sine',.035)}
  function togglePause(){if(!started)return;paused=!paused;el.pause.textContent=paused?'Resume':'Pause';if(paused){el.overlay.querySelector('.eyebrow').textContent='The rain waits';el.overlay.querySelector('h1').innerHTML='Take a<br><em>breath.</em>';el.overlay.querySelector('.intro p:not(.eyebrow):not(.how)').textContent='Press resume whenever you are ready.';el.start.textContent='Resume the storm';el.overlay.classList.remove('hidden')}else{el.overlay.classList.add('hidden');last=0;el.game.focus()}}
  function handleKey(e){if(!started||paused)return;if(e.key==='Escape'){togglePause();return}if(e.key==='Backspace'){input=input.slice(0,-1);update();return}if(e.key.length!==1||!/[a-z]/i.test(e.key))return;const char=e.key.toLowerCase();keystrokes++;let candidate=active.find(a=>a.word.startsWith(input+char));if(candidate){input+=char;correct++;tone(260+input.length*33,.035,'sine',.014);if(input===candidate.word)clearWord(candidate)}else{input='';el.line.classList.remove('error');void el.line.offsetWidth;el.line.classList.add('error');setTimeout(()=>el.line.classList.remove('error'),400);tone(130,.055,'square',.016)}update()}
  el.start.addEventListener('click',()=>paused?togglePause():begin());el.pause.addEventListener('click',togglePause);el.sound.addEventListener('click',()=>{muted=!muted;el.sound.textContent=muted?'◖×':'◖))';el.sound.setAttribute('aria-label',muted?'Turn sound on':'Turn sound off')});window.addEventListener('keydown',handleKey);window.addEventListener('resize',update);requestAnimationFrame(frame);update();
})();
</script>
</body>
</html>
