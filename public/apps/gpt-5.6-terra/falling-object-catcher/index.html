<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#42c8c1">
  <title>Fruit Frenzy — Catch the Good Stuff!</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@700;800;900&display=swap');
    :root { --ink:#17394b; --cream:#fff9df; --sky:#51cfca; --yellow:#ffd95b; --coral:#ff6c5d; --leaf:#2d9e67; }
    * { box-sizing:border-box; }
    html,body { height:100%; margin:0; overflow:hidden; }
    body { background:#1c6779; color:var(--ink); font-family:'Nunito',sans-serif; user-select:none; }
    button { font:inherit; }
    .app { min-height:100%; display:grid; place-items:center; padding:clamp(10px,2.5vw,28px); background:
      radial-gradient(circle at 50% 0%, #6de6d4 0 18%, transparent 45%),
      linear-gradient(180deg,#3bb8c4 0%,#1f7889 100%); }
    .game-shell { width:min(100%, 980px); height:min(91vh, 720px); min-height:520px; position:relative; overflow:hidden; border:7px solid var(--cream); border-radius:38px; background:#6edbd3; box-shadow:0 16px 0 #145565,0 30px 45px rgba(4,44,58,.36); }
    .game-shell:before { content:""; position:absolute; inset:0; pointer-events:none; background-image:radial-gradient(rgba(255,255,255,.26) 1.5px,transparent 1.5px); background-size:18px 18px; opacity:.35; z-index:2; }
    .sky { position:absolute; inset:0 0 19%; background:linear-gradient(180deg,#70e3dd 0%,#8ce7c7 100%); overflow:hidden; }
    .sun { position:absolute; width:106px; height:106px; right:7%; top:7%; border-radius:50%; background:#ffe26a; box-shadow:0 0 0 12px rgba(255,237,144,.31); animation:sunbop 3.5s ease-in-out infinite; }
    .cloud { position:absolute; background:#fff9e7; border-radius:999px; opacity:.9; filter:drop-shadow(0 5px 0 rgba(48,141,140,.13)); }
    .cloud:before,.cloud:after { content:""; position:absolute; background:inherit; border-radius:50%; }
    .cloud.one { left:8%; top:22%; width:92px; height:24px; animation:drift 15s ease-in-out infinite; }.cloud.one:before{width:41px;height:41px;left:17px;bottom:8px}.cloud.one:after{width:32px;height:32px;right:13px;bottom:7px}
    .cloud.two { right:25%; top:34%; width:70px; height:19px; animation:drift 20s -9s ease-in-out infinite reverse;}.cloud.two:before{width:33px;height:33px;left:11px;bottom:7px}.cloud.two:after{width:25px;height:25px;right:9px;bottom:6px}
    .hills { position:absolute; left:-8%; right:-8%; bottom:-1px; height:35%; background:#51bd79; border-radius:50% 50% 0 0/100% 100% 0 0; box-shadow:inset 0 13px rgba(255,255,255,.12); }
    .hills:before { content:""; position:absolute; width:60%; height:82%; right:-8%; bottom:-1px; background:#319b68; border-radius:50% 50% 0 0/100% 100% 0 0; }
    .trees { position:absolute; inset:auto 0 15% 0; height:100px; display:flex; justify-content:space-around; align-items:flex-end; opacity:.82; }
    .tree { width:19px; height:67px; border-radius:9px 9px 0 0; background:#9b663d; position:relative; }.tree:before,.tree:after{content:"";position:absolute;border-radius:50%;background:#2c9e67}.tree:before{width:70px;height:65px;bottom:42px;left:-25px}.tree:after{width:48px;height:52px;bottom:66px;left:-14px;background:#45b86c}
    .header { position:absolute; z-index:10; top:clamp(14px,3vw,25px); left:clamp(14px,3vw,25px); right:clamp(14px,3vw,25px); display:flex; justify-content:space-between; align-items:flex-start; pointer-events:none; }
    .brand { display:flex; align-items:center; gap:10px; color:white; text-shadow:0 3px 0 rgba(15,99,110,.3); }.brand-mark{width:48px;height:48px;display:grid;place-items:center;background:#fff9df;border-radius:16px;font-size:29px;box-shadow:0 5px 0 rgba(15,99,110,.17);text-shadow:none}.brand-name{font-family:'Baloo 2',sans-serif;font-size:clamp(20px,3vw,30px);line-height:.8;font-weight:800;letter-spacing:.2px}.brand small{display:block;font-size:10px;letter-spacing:1.5px;line-height:1.7;font-weight:900}
    .hud { display:flex; gap:9px; }.score-box,.miss-box { min-width:92px; background:var(--cream); border:3px solid rgba(255,255,255,.82); border-radius:17px; padding:6px 12px 7px; box-shadow:0 5px 0 rgba(16,93,104,.22); text-align:center; }.hud .label { display:block; color:#43808a; font-size:10px; letter-spacing:1.1px; font-weight:900; line-height:1; }.hud strong { font-family:'Baloo 2',sans-serif; font-size:25px; line-height:.9; color:#18435a; }.miss-box { min-width:130px; }.hearts { height:23px; display:flex; justify-content:center; gap:3px; margin-top:2px; }.heart{font-size:19px;line-height:1;filter:drop-shadow(0 2px 0 #d94346)}.heart.lost{filter:grayscale(1);opacity:.28}
    #fruit-layer,#burst-layer { position:absolute; inset:0; z-index:5; pointer-events:none; overflow:hidden; }
    .fruit { position:absolute; width:clamp(50px,7vw,71px); height:clamp(50px,7vw,71px); transform:translate(-50%,-50%); will-change:transform,top; filter:drop-shadow(0 5px 2px rgba(16,72,77,.24)); }
    .fruit .emoji { font-size:clamp(47px,6.7vw,68px); line-height:1; display:block; animation:fruitWiggle .7s ease-in-out infinite alternate; }
    .fruit.bonus .emoji{ filter:drop-shadow(0 0 6px #fff3a4); }
    .basket-wrap { position:absolute; z-index:7; bottom:8.5%; left:50%; width:clamp(108px,16vw,150px); height:105px; transform:translateX(-50%); will-change:left; filter:drop-shadow(0 7px 2px rgba(15,85,77,.27)); }
    .basket-handle { position:absolute; width:78%; height:55px; border:10px solid #9c5938; border-bottom:0; border-radius:70px 70px 0 0; left:11%; top:1px; }.basket-handle:after{content:"";position:absolute;inset:7px 8px auto;border-top:5px solid #d88b55;border-radius:50%}
    .basket { position:absolute; left:0; right:0; bottom:0; height:67px; overflow:hidden; border-radius:9px 9px 37px 37px; background:repeating-linear-gradient(90deg,#d98a4d 0 12px,#f3bb65 12px 22px); border:5px solid #8a4b31; box-shadow:inset 0 8px #ffe09a,inset 0 -8px rgba(105,49,29,.15); }.basket:before{content:"";position:absolute;left:-6px;right:-6px;top:17px;border-top:4px solid #a55b37;border-bottom:4px solid rgba(133,70,42,.42);height:13px}
    .ground { position:absolute; z-index:4; left:0;right:0;bottom:0;height:20%; background:repeating-linear-gradient(135deg,#f0d36f 0 7px,#f8df83 7px 14px); border-top:7px solid #4baf70; }
    .ground:after { content:""; position:absolute; height:12px; left:0;right:0;top:-19px; background:radial-gradient(ellipse at 8px 12px,#2b9865 0 9px,transparent 10px) 0 0/28px 18px repeat-x; }
    .tip { position:absolute; z-index:8; bottom:17px; left:50%; transform:translateX(-50%); color:#fff8da; font-size:12px; font-weight:900; letter-spacing:.5px; text-shadow:0 2px 0 rgba(69,111,58,.52); transition:opacity .4s; white-space:nowrap; }
    .burst { position:absolute; font-family:'Baloo 2',sans-serif; font-weight:800; font-size:26px; color:white; text-shadow:0 3px 0 #d6514e; transform:translate(-50%,-50%); animation:burst .65s ease-out forwards; }
    .spark { position:absolute; width:9px;height:9px;border-radius:50%; background:#fff4a8; transform:translate(-50%,-50%); animation:spark .52s ease-out forwards; }
    .overlay { position:absolute; z-index:20; inset:0; display:grid; place-items:center; padding:22px; background:rgba(18,79,82,.2); transition:opacity .25s,visibility .25s; }.overlay.hidden{opacity:0;visibility:hidden;pointer-events:none}.dialog { width:min(100%,420px); text-align:center; padding:27px 28px 24px; border:5px solid white; border-radius:30px; background:var(--cream); box-shadow:0 9px 0 rgba(17,81,88,.35),0 18px 30px rgba(0,55,61,.25); animation:pop .5s cubic-bezier(.2,1.3,.3,1); }.dialog .fruit-crown{font-size:64px;display:block;margin:-9px 0 -2px;filter:drop-shadow(0 4px 0 rgba(229,145,63,.23))}.dialog h1{font-family:'Baloo 2',sans-serif;color:#18435a;font-size:clamp(39px,7vw,57px);line-height:.82;margin:0;letter-spacing:-1.8px}.dialog h1 span{color:var(--coral)}.dialog p{margin:13px auto 20px;max-width:300px;font-size:15px;line-height:1.4;color:#477481;font-weight:800}.keys{display:flex;gap:7px;justify-content:center;align-items:center;color:#51909a;font-size:12px;margin:-5px 0 20px}.key{padding:3px 8px;border:2px solid #91bac0;border-bottom-width:4px;border-radius:6px;background:white;font-size:13px;color:#326373}.play-btn{border:0;border-bottom:6px solid #c64b42;border-radius:17px;background:var(--coral);color:#fffdf1;padding:12px 27px 10px;font-size:19px;font-family:'Baloo 2',sans-serif;font-weight:800;cursor:pointer;box-shadow:0 3px 0 rgba(255,255,255,.25) inset;transition:transform .15s,filter .15s}.play-btn:hover{filter:brightness(1.06);transform:translateY(-2px)}.play-btn:active{border-bottom-width:2px;transform:translateY(3px)}.play-btn:focus-visible{outline:4px solid #17465a;outline-offset:4px}.final-score{font-family:'Baloo 2',sans-serif;color:#f05a50;font-size:59px;line-height:.8;margin:6px 0}.final-label{font-size:12px;letter-spacing:1.4px;color:#52808a;font-weight:900}.new-best{font-size:13px;color:#d36d2c;font-weight:900;min-height:18px}.shake{animation:shake .35s linear}.score-bump{animation:scoreBump .28s ease-out}
    @keyframes sunbop{50%{transform:translateY(6px) rotate(10deg)}}@keyframes drift{50%{transform:translateX(35px)}}@keyframes fruitWiggle{to{transform:rotate(9deg)}}@keyframes burst{0%{opacity:0;transform:translate(-50%,-40%) scale(.4)}25%{opacity:1;transform:translate(-50%,-80%) scale(1.2)}100%{opacity:0;transform:translate(-50%,-180%) scale(.9)}}@keyframes spark{to{opacity:0;transform:translate(var(--x),var(--y)) scale(.1)}}@keyframes pop{from{transform:scale(.72) translateY(16px);opacity:0}to{transform:scale(1);opacity:1}}@keyframes shake{25%,75%{transform:translateX(-5px)}50%{transform:translateX(5px)}}@keyframes scoreBump{50%{transform:scale(1.22);color:#ed5b51}}
    @media(max-width:570px){.app{padding:0}.game-shell{height:100vh;min-height:0;width:100%;border:0;border-radius:0;box-shadow:none}.brand-mark{width:40px;height:40px;font-size:24px;border-radius:13px}.brand-name{font-size:22px}.hud{gap:5px}.score-box{min-width:67px;padding:6px 7px}.miss-box{min-width:99px;padding:6px 6px}.hud strong{font-size:22px}.heart{font-size:16px}.dialog{padding:23px 20px}.tip{bottom:13px}.trees{transform:scale(.8);transform-origin:bottom}}
    @media(prefers-reduced-motion:reduce){*,*:before,*:after{animation-duration:.01ms!important;animation-iteration-count:1!important;scroll-behavior:auto!important}}
  </style>
</head>
<body>
  <main class="app">
    <section class="game-shell" id="game" aria-label="Fruit Frenzy game. Catch fruits in the basket.">
      <div class="sky"><div class="sun"></div><div class="cloud one"></div><div class="cloud two"></div><div class="hills"></div></div>
      <div class="trees"><i class="tree"></i><i class="tree"></i><i class="tree"></i><i class="tree"></i><i class="tree"></i></div>
      <header class="header"><div class="brand"><div class="brand-mark">🍓</div><div class="brand-name">FRUIT<br>FRENZY<small>CATCH THE GOOD STUFF!</small></div></div><div class="hud"><div class="score-box"><span class="label">SCORE</span><strong id="score">0</strong></div><div class="miss-box"><span class="label">OOPS!</span><div class="hearts" id="hearts" aria-label="3 chances left"><span class="heart">♥</span><span class="heart">♥</span><span class="heart">♥</span></div></div></div></header>
      <div id="fruit-layer" aria-hidden="true"></div><div id="burst-layer" aria-hidden="true"></div>
      <div class="basket-wrap" id="basket"><div class="basket-handle"></div><div class="basket"></div></div>
      <div class="ground"></div><div class="tip" id="tip">← → or move your mouse to steer!</div>
      <div class="overlay" id="start-screen"><div class="dialog"><span class="fruit-crown">🍎🍌🍇</span><h1>Fruit <span>Frenzy!</span></h1><p>Catch the fruity treasures before they hit the grass. Three oopsies and the picnic is over!</p><div class="keys"><span class="key">←</span><span class="key">→</span><span>or move your mouse</span></div><button class="play-btn" id="start-btn">Let's catch! ✨</button></div></div>
      <div class="overlay hidden" id="end-screen"><div class="dialog"><span class="fruit-crown">🍉</span><h1>Nice <span>try!</span></h1><div class="final-score" id="final-score">0</div><div class="final-label">FRUITS SAVED</div><div class="new-best" id="best-message"></div><button class="play-btn" id="again-btn">Play again! ↻</button></div></div>
    </section>
  </main>
  <script>
    (() => {
      const game=document.getElementById('game'), basket=document.getElementById('basket'), fruitLayer=document.getElementById('fruit-layer'), burstLayer=document.getElementById('burst-layer');
      const scoreEl=document.getElementById('score'), heartsEl=document.getElementById('hearts'), tip=document.getElementById('tip'), startScreen=document.getElementById('start-screen'), endScreen=document.getElementById('end-screen'), finalScore=document.getElementById('final-score'), bestMessage=document.getElementById('best-message');
      const fruits=['🍎','🍊','🍌','🍓','🍇','🍉','🍐','🍒']; let items=[], score=0, misses=0, playing=false, basketX=.5, keys={}, last=0, spawnTimer=0, audioCtx;
      function bounds(){return game.getBoundingClientRect()}
      function tone(freq,duration,type='sine',volume=.035){try{audioCtx ||= new (window.AudioContext||window.webkitAudioContext)(); const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(volume,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+duration);o.connect(g).connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+duration)}catch(e){}}
      function setBasket(){basket.style.left=(basketX*100)+'%'}
      function addFruit(){ const b=bounds(), bonus=Math.random()<.09; const el=document.createElement('div');el.className='fruit'+(bonus?' bonus':'');el.innerHTML='<span class="emoji">'+(bonus?'⭐':fruits[Math.floor(Math.random()*fruits.length)])+'</span>'; fruitLayer.appendChild(el);items.push({el,x:.07+Math.random()*.86,y:-.09,speed:(.18+Math.random()*.12)*(1+Math.min(score,40)/115),bonus,spin:(Math.random()-.5)*.002}); }
      function burst(x,y,text){const label=document.createElement('div');label.className='burst';label.textContent=text;label.style.left=x+'px';label.style.top=y+'px';burstLayer.appendChild(label);setTimeout(()=>label.remove(),650); for(let i=0;i<7;i++){const s=document.createElement('i');s.className='spark';s.style.left=x+'px';s.style.top=y+'px';const a=Math.random()*Math.PI*2,d=35+Math.random()*32;s.style.setProperty('--x',(Math.cos(a)*d)+'px');s.style.setProperty('--y',(Math.sin(a)*d)+'px');burstLayer.appendChild(s);setTimeout(()=>s.remove(),540)}}
      function catchFruit(item,index,b){const amount=item.bonus?3:1;score+=amount;scoreEl.textContent=score;scoreEl.classList.remove('score-bump');void scoreEl.offsetWidth;scoreEl.classList.add('score-bump');burst(item.x*b.width,item.y*b.height,item.bonus?'+3!':'YUM!');tone(item.bonus?880:620,.12,'triangle',item.bonus?.055:.035);item.el.remove();items.splice(index,1)}
      function miss(item,index){misses++; heartsEl.querySelectorAll('.heart')[misses-1].classList.add('lost'); game.classList.remove('shake');void game.offsetWidth;game.classList.add('shake');tone(145,.22,'sawtooth',.035);item.el.remove();items.splice(index,1); if(misses>=3) setTimeout(finish,360)}
      function finish(){playing=false;items.forEach(i=>i.el.remove());items=[];finalScore.textContent=score;const best=+localStorage.getItem('fruitFrenzyBest')||0;if(score>best&&score>0){localStorage.setItem('fruitFrenzyBest',score);bestMessage.textContent='🌟 New high score! 🌟'}else if(best){bestMessage.textContent='Best picnic: '+best+' fruits'}else bestMessage.textContent='Every fruit counts!';endScreen.classList.remove('hidden');tone(260,.36,'sine',.04)}
      function loop(now){if(!playing)return;const dt=Math.min((now-last)/1000,.045);last=now; if(keys.ArrowLeft||keys.a)basketX-=dt*.72;if(keys.ArrowRight||keys.d)basketX+=dt*.72;basketX=Math.max(.09,Math.min(.91,basketX));setBasket();spawnTimer-=dt;if(spawnTimer<=0){addFruit();spawnTimer=Math.max(.42,.95-score*.012)+Math.random()*.33}const b=bounds(), basketLeft=basketX*b.width-basket.offsetWidth*.42,basketRight=basketX*b.width+basket.offsetWidth*.42,basketY=b.height*.81;for(let i=items.length-1;i>=0;i--){const it=items[i];it.y+=it.speed*dt;it.el.style.left=(it.x*100)+'%';it.el.style.top=(it.y*100)+'%';it.el.style.transform='translate(-50%,-50%) rotate('+(it.y*800*it.spin)+'deg)';const x=it.x*b.width;if(it.y*b.height>basketY&&it.y*b.height<basketY+75&&x>basketLeft&&x<basketRight){catchFruit(it,i,b)}else if(it.y>1.04)miss(it,i)}requestAnimationFrame(loop)}
      function start(){score=0;misses=0;scoreEl.textContent='0';heartsEl.querySelectorAll('.heart').forEach(h=>h.classList.remove('lost'));items.forEach(i=>i.el.remove());items=[];basketX=.5;setBasket();spawnTimer=.65;playing=true;last=performance.now();startScreen.classList.add('hidden');endScreen.classList.add('hidden');tip.style.opacity='1';setTimeout(()=>tip.style.opacity='0',3600);tone(520,.08,'triangle',.03);requestAnimationFrame(loop)}
      document.getElementById('start-btn').addEventListener('click',start);document.getElementById('again-btn').addEventListener('click',start);
      window.addEventListener('keydown',e=>{if(['ArrowLeft','ArrowRight','a','d'].includes(e.key)){e.preventDefault();keys[e.key]=true}if(e.key===' '&&!playing){start()}});window.addEventListener('keyup',e=>keys[e.key]=false);
      function steer(e){if(!playing)return;const b=bounds();basketX=Math.max(.09,Math.min(.91,(e.clientX-b.left)/b.width));setBasket()}game.addEventListener('pointermove',steer);game.addEventListener('pointerdown',e=>{if(playing)steer(e)});setBasket();
    })();
  </script>
</body>
</html>
