<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f5f1e8" />
  <title>Custom QR Code Generator</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap');

    :root { --ink:#1b1b18; --muted:#74736b; --paper:#f5f1e8; --line:#d8d2c5; --accent:#ef5b2a; --white:#fffefa; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; background:var(--paper); color:var(--ink); font-family:"DM Sans", sans-serif; }
    button, input, textarea { font:inherit; }
    button { cursor:pointer; }
    .app { max-width:1500px; min-height:100vh; margin:0 auto; padding:30px 38px 22px; display:flex; flex-direction:column; }
    .topbar { display:flex; align-items:center; justify-content:space-between; gap:24px; padding-bottom:29px; border-bottom:1px solid var(--line); }
    .brand { display:flex; align-items:center; gap:12px; font-weight:700; letter-spacing:-.04em; font-size:19px; }
    .brand-mark { width:29px; height:29px; display:grid; grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(3,1fr); gap:3px; padding:3px; background:var(--ink); }
    .brand-mark i { display:block; background:var(--paper); } .brand-mark i:nth-child(2), .brand-mark i:nth-child(4), .brand-mark i:nth-child(6) { background:var(--accent); }
    .eyebrow { font-family:"DM Mono", monospace; font-size:10px; color:var(--muted); letter-spacing:.08em; text-transform:uppercase; white-space:nowrap; }
    main { flex:1; display:grid; grid-template-columns:minmax(310px,.9fr) minmax(460px,1.45fr); gap:clamp(48px,8vw,150px); align-items:center; padding:clamp(36px,6.4vh,76px) 6.5% clamp(38px,5vh,58px); }
    .editor { max-width:420px; animation:rise .7s cubic-bezier(.2,.8,.2,1) both; }
    h1 { margin:0 0 14px; font-family:"Playfair Display", Georgia, serif; font-weight:600; font-size:clamp(45px,4.5vw,72px); line-height:.98; letter-spacing:-.055em; }
    h1 em { color:var(--accent); font-weight:600; }
    .intro { margin:0 0 38px; max-width:340px; color:var(--muted); font-size:15px; line-height:1.55; }
    .field-label { display:flex; justify-content:space-between; margin-bottom:10px; color:var(--ink); font-size:12px; font-weight:700; letter-spacing:.02em; }
    .counter { color:var(--muted); font-family:"DM Mono", monospace; font-size:10px; font-weight:400; }
    textarea { display:block; width:100%; min-height:100px; resize:vertical; border:1px solid var(--ink); border-radius:0; background:rgba(255,254,250,.45); padding:15px 16px; color:var(--ink); outline:none; font-size:14px; line-height:1.45; transition:box-shadow .2s, background .2s; }
    textarea:focus { background:var(--white); box-shadow:5px 5px 0 var(--accent); }
    .customize { display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--line); padding:30px 0 12px; margin-bottom:16px; }
    .customize h2 { margin:0; font-size:12px; text-transform:uppercase; letter-spacing:.09em; }
    .reset { appearance:none; border:0; background:transparent; color:var(--muted); padding:3px 0; font-family:"DM Mono", monospace; font-size:10px; transition:color .18s; }
    .reset:hover { color:var(--accent); }
    .swatches { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .color-field { display:flex; align-items:center; justify-content:space-between; min-height:48px; border-bottom:1px solid var(--line); }
    .color-field label { font-size:13px; color:var(--muted); }
    .color-control { display:flex; align-items:center; gap:9px; }
    input[type="color"] { width:27px; height:27px; padding:0; border:1px solid var(--ink); background:none; border-radius:50%; overflow:hidden; cursor:pointer; }
    input[type="color"]::-webkit-color-swatch-wrapper { padding:3px; } input[type="color"]::-webkit-color-swatch { border:0; border-radius:50%; }
    .hex { width:58px; border:0; background:transparent; padding:3px 0; color:var(--ink); font-family:"DM Mono", monospace; font-size:11px; outline:none; text-transform:uppercase; }
    .preview-area { position:relative; display:grid; place-items:center; min-height:540px; animation:appear .8s .12s cubic-bezier(.2,.8,.2,1) both; }
    .orbit { position:absolute; width:min(44vw,570px); aspect-ratio:1; border:1px solid var(--line); border-radius:50%; pointer-events:none; }
    .orbit::before, .orbit::after { content:""; position:absolute; border-radius:50%; background:var(--accent); } .orbit::before { width:8px; height:8px; top:3%; left:18%; } .orbit::after { width:5px; height:5px; right:5%; bottom:24%; }
    .qr-sheet { position:relative; z-index:1; width:min(100%,480px); aspect-ratio:1; display:grid; place-items:center; background:var(--white); padding:clamp(25px,4vw,46px); box-shadow:18px 20px 0 rgba(27,27,24,.12), 1px 1px 0 rgba(27,27,24,.15); transform:rotate(2.5deg); transition:transform .4s cubic-bezier(.2,.8,.2,1), box-shadow .4s; }
    .qr-sheet:hover { transform:rotate(0) scale(1.017); box-shadow:25px 29px 0 rgba(27,27,24,.12), 1px 1px 0 rgba(27,27,24,.15); }
    #qr-canvas { display:block; width:100%; height:100%; image-rendering:pixelated; }
    .corner { position:absolute; font-family:"DM Mono", monospace; color:var(--muted); font-size:9px; letter-spacing:.03em; } .corner.top { top:13px; left:15px; } .corner.bottom { bottom:13px; right:15px; }
    .hint { position:absolute; left:0; bottom:17px; z-index:2; display:flex; align-items:center; gap:8px; font-family:"DM Mono", monospace; color:var(--muted); font-size:10px; letter-spacing:.02em; }
    .hint span { width:34px; height:1px; background:var(--accent); }
    .download { position:absolute; z-index:3; right:0; bottom:0; display:inline-flex; align-items:center; gap:11px; border:1px solid var(--ink); background:var(--accent); color:var(--ink); padding:15px 18px 14px; font-size:13px; font-weight:700; box-shadow:4px 4px 0 var(--ink); transition:transform .17s, box-shadow .17s, background .17s; }
    .download svg { width:17px; height:17px; } .download:hover { transform:translate(2px,2px); box-shadow:2px 2px 0 var(--ink); background:#ff7445; } .download:active { transform:translate(4px,4px); box-shadow:none; }
    .download:focus-visible, .reset:focus-visible { outline:2px solid var(--accent); outline-offset:3px; }
    footer { display:flex; justify-content:space-between; gap:20px; padding-top:18px; border-top:1px solid var(--line); font-family:"DM Mono", monospace; color:var(--muted); font-size:10px; }
    .status { transition:color .2s; } .status.ready { color:#3e725c; }
    @keyframes rise { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:none; } } @keyframes appear { from { opacity:0; transform:translateY(22px) rotate(-2deg); } to { opacity:1; transform:none; } }
    @media (max-width:850px) { .app { padding:23px 22px 18px; } main { grid-template-columns:1fr; gap:20px; padding:44px 0 35px; } .editor { max-width:550px; } .preview-area { min-height:440px; order:-1; } .orbit { width:min(75vw,500px); } .hint { left:0; bottom:0; } .download { right:0; bottom:-2px; } .qr-sheet { width:min(82vw,440px); } }
    @media (max-width:460px) { .topbar .eyebrow { display:none; } h1 { font-size:48px; } .preview-area { min-height:370px; } .qr-sheet { padding:26px; } .hint { display:none; } .swatches { grid-template-columns:1fr; gap:0; } footer span:last-child { display:none; } }
    @media (prefers-reduced-motion:reduce) { *,*::before,*::after { animation-duration:.01ms !important; transition-duration:.01ms !important; } }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand" aria-label="Custom QR Code Generator"><span class="brand-mark" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i></span>QR Studio</div>
      <div class="eyebrow">Custom QR Code Generator / 01</div>
    </header>

    <main>
      <section class="editor" aria-labelledby="page-title">
        <h1 id="page-title">Make it<br /><em>scannable.</em></h1>
        <p class="intro">Turn a link, note, or invitation into a QR code that looks like it belongs to you.</p>
        <div class="field-label"><label for="content">Your content</label><span class="counter" id="counter">0 / 500</span></div>
        <textarea id="content" maxlength="500" spellcheck="false" aria-describedby="counter" placeholder="Paste a URL or write something..."></textarea>
        <div class="customize"><h2>Colors</h2><button class="reset" id="reset" type="button">RESET</button></div>
        <div class="swatches">
          <div class="color-field"><label for="foreground">Foreground</label><div class="color-control"><input id="foreground" type="color" value="#1B1B18" aria-label="Foreground color" /><input class="hex" id="foreground-hex" value="#1B1B18" maxlength="7" aria-label="Foreground hex value" /></div></div>
          <div class="color-field"><label for="background">Background</label><div class="color-control"><input id="background" type="color" value="#FFFEFA" aria-label="Background color" /><input class="hex" id="background-hex" value="#FFFEFA" maxlength="7" aria-label="Background hex value" /></div></div>
        </div>
      </section>

      <section class="preview-area" aria-label="QR code preview">
        <div class="orbit" aria-hidden="true"></div>
        <div class="qr-sheet" id="qr-sheet"><span class="corner top">SCAN / SHARE</span><canvas id="qr-canvas" aria-label="Generated QR code"></canvas><span class="corner bottom">QR–01</span></div>
        <div class="hint" aria-hidden="true"><span></span>LIVE PREVIEW</div>
        <button class="download" id="download" type="button"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="square" stroke-linejoin="miter" aria-hidden="true"><path d="M12 3v12m0 0 4-4m-4 4-4-4M4 20h16" /></svg>Download PNG</button>
      </section>
    </main>
    <footer><span class="status" id="status" role="status">READY TO GENERATE</span><span>HIGH CONTRAST • PNG EXPORT</span></footer>
  </div>

  <script>
    (() => {
      const defaults = { text: 'https://example.com', foreground: '#1B1B18', background: '#FFFEFA' };
      const content = document.getElementById('content');
      const foreground = document.getElementById('foreground');
      const background = document.getElementById('background');
      const fgHex = document.getElementById('foreground-hex');
      const bgHex = document.getElementById('background-hex');
      const counter = document.getElementById('counter');
      const canvas = document.getElementById('qr-canvas');
      const status = document.getElementById('status');
      let timer;

      content.value = defaults.text;
      const normalize = (value) => /^#[0-9a-f]{6}$/i.test(value.trim()) ? value.trim().toUpperCase() : null;
      const updateCounter = () => counter.textContent = `${content.value.length} / 500`;
      const setStatus = (text, okay = false) => { status.textContent = text; status.classList.toggle('ready', okay); };
      function render() {
        updateCounter();
        const text = content.value.trim() || 'Scan me';
        if (!window.QRCode) { setStatus('QR LIBRARY UNAVAILABLE'); return; }
        QRCode.toCanvas(canvas, text, { width: 1200, margin: 2, errorCorrectionLevel: 'H', color: { dark: foreground.value, light: background.value } }, error => {
          if (error) { setStatus('TRY SHORTER CONTENT'); console.error(error); return; }
          setStatus('CODE UPDATED', true);
          clearTimeout(timer); timer = setTimeout(() => setStatus('READY TO GENERATE'), 1250);
        });
      }
      function wireColor(picker, input) {
        picker.addEventListener('input', () => { input.value = picker.value.toUpperCase(); render(); });
        input.addEventListener('change', () => { const value = normalize(input.value); if (value) { picker.value = value; input.value = value; render(); } else input.value = picker.value.toUpperCase(); });
        input.addEventListener('keydown', event => { if (event.key === 'Enter') input.blur(); });
      }
      content.addEventListener('input', render);
      wireColor(foreground, fgHex); wireColor(background, bgHex);
      document.getElementById('reset').addEventListener('click', () => { content.value = defaults.text; foreground.value = defaults.foreground; background.value = defaults.background; fgHex.value = defaults.foreground; bgHex.value = defaults.background; render(); setStatus('RESET COMPLETE', true); });
      document.getElementById('download').addEventListener('click', () => {
        const exportCanvas = document.createElement('canvas'); const size = 1600; exportCanvas.width = exportCanvas.height = size;
        const ctx = exportCanvas.getContext('2d'); ctx.fillStyle = background.value; ctx.fillRect(0, 0, size, size); ctx.drawImage(canvas, 0, 0, size, size);
        const link = document.createElement('a'); link.download = 'custom-qr-code.png'; link.href = exportCanvas.toDataURL('image/png'); link.click(); setStatus('PNG DOWNLOADED', true);
      });
      window.addEventListener('load', render);
    })();
  </script>
</body>
</html>
