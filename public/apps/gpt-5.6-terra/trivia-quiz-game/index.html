<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#10243b" />
  <title>Common Ground — U.S. Civics Quiz</title>
  <style>
    :root { --navy:#10243b; --ink:#172234; --paper:#fbf8f0; --cream:#f3ecdc; --red:#b83a3a; --blue:#315b87; --gold:#d89a2b; --green:#19765a; --line:rgba(16,36,59,.15); }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; color:var(--ink); background:var(--cream); font-family:"Avenir Next",Avenir,"Segoe UI",sans-serif; overflow-x:hidden; }
    body:before { content:""; position:fixed; inset:0; pointer-events:none; opacity:.34; background-image:radial-gradient(rgba(28,44,61,.22) .6px, transparent .7px); background-size:5px 5px; mix-blend-mode:multiply; }
    .stripes { height:8px; background:repeating-linear-gradient(90deg,var(--red) 0 31px,#f8f3e8 31px 62px); }
    .shell { width:min(100% - 32px, 790px); margin:0 auto; padding:34px 0 44px; position:relative; }
    header { display:flex; justify-content:space-between; align-items:center; gap:16px; margin-bottom:31px; }
    .brand { display:flex; align-items:center; gap:12px; color:var(--navy); }
    .seal { width:43px; height:43px; display:grid; place-items:center; border:2px solid var(--navy); border-radius:50%; position:relative; font-size:18px; }
    .seal:after { content:""; position:absolute; inset:4px; border:1px solid var(--navy); border-radius:50%; opacity:.7; }
    .brand-word { font-family:Georgia,serif; font-size:17px; font-weight:700; letter-spacing:-.5px; }
    .brand small { display:block; margin-top:2px; font-family:ui-monospace,monospace; font-size:9px; letter-spacing:1.4px; text-transform:uppercase; opacity:.72; }
    .round { font:500 11px ui-monospace,monospace; color:var(--blue); letter-spacing:.08em; text-transform:uppercase; }
    .progress-wrap { margin-bottom:25px; }
    .progress-label { display:flex; justify-content:space-between; color:#465262; font:500 10px ui-monospace,monospace; letter-spacing:.12em; text-transform:uppercase; margin:0 2px 9px; }
    .progress { height:7px; overflow:hidden; border-radius:10px; background:#d9d2c2; }
    .progress > span { display:block; width:0%; height:100%; background:var(--red); border-radius:inherit; transition:width .55s cubic-bezier(.22,1,.36,1); }
    main { min-height:470px; }
    .quiz-card { background:var(--paper); border:1px solid rgba(16,36,59,.16); box-shadow:7px 8px 0 rgba(16,36,59,.12); padding:clamp(25px,5vw,46px); position:relative; overflow:hidden; }
    .quiz-card:before { content:""; position:absolute; width:150px; height:150px; border:1px solid rgba(49,91,135,.13); border-radius:50%; top:-82px; right:-51px; }
    .quiz-card:after { content:""; position:absolute; width:8px; height:100%; top:0; left:0; background:var(--navy); }
    .eyebrow { position:relative; z-index:1; display:flex; align-items:center; gap:9px; color:var(--red); font:500 10px ui-monospace,monospace; text-transform:uppercase; letter-spacing:.16em; }
    .eyebrow:before { content:""; height:1px; width:30px; background:currentColor; }
    h1 { position:relative; z-index:1; max-width:630px; margin:18px 0 30px; color:var(--navy); font:700 clamp(25px,4.6vw,39px)/1.28 Georgia,serif; letter-spacing:-1.3px; }
    .answers { display:grid; gap:11px; position:relative; z-index:1; }
    .answer { appearance:none; width:100%; padding:14px 17px; border:1px solid var(--line); border-radius:3px; background:#fffdf7; color:var(--ink); display:flex; align-items:center; gap:14px; font:600 15px/1.35 "Avenir Next",Avenir,"Segoe UI",sans-serif; text-align:left; cursor:pointer; transition:transform .18s ease, border-color .18s ease, background .18s ease, box-shadow .18s ease; }
    .answer:hover:not(:disabled) { transform:translateX(5px); border-color:var(--blue); box-shadow:-4px 4px 0 rgba(49,91,135,.18); }
    .answer:focus-visible, .next:focus-visible, .start:focus-visible, .again:focus-visible { outline:3px solid var(--gold); outline-offset:3px; }
    .answer:disabled { cursor:default; }
    .letter { height:28px; width:28px; flex:0 0 28px; display:grid; place-items:center; border:1px solid currentColor; border-radius:50%; color:var(--blue); font:500 11px ui-monospace,monospace; }
    .answer.correct { border-color:var(--green); background:#e6f4ec; color:#105740; animation:answer-in .35s ease both; }
    .answer.correct .letter { color:var(--green); background:#fff; }
    .answer.wrong { border-color:#c44a46; background:#fae7e3; color:#992c2c; animation:shake .32s ease both; }
    .answer.wrong .letter { color:#b83a3a; }
    .answer.reveal { border-color:var(--green); background:#e6f4ec; color:#105740; }
    .answer.reveal .letter { color:var(--green); background:#fff; }
    .feedback { min-height:35px; margin-top:20px; display:flex; align-items:center; gap:10px; opacity:0; transform:translateY(6px); transition:opacity .25s ease,transform .25s ease; font-size:13px; font-weight:700; }
    .feedback.visible { opacity:1; transform:translateY(0); }
    .feedback-mark { width:27px; height:27px; border-radius:50%; display:grid; place-items:center; color:#fff; font-size:16px; line-height:1; }
    .feedback.good { color:#126447; } .feedback.good .feedback-mark { background:var(--green); }
    .feedback.bad { color:#9d302d; } .feedback.bad .feedback-mark { background:var(--red); }
    .card-bottom { display:flex; justify-content:space-between; align-items:center; gap:16px; margin-top:12px; }
    .hint { color:#68707c; font-size:11px; } kbd { padding:2px 5px; border:1px solid #c8c1b2; border-radius:3px; color:#4a5665; background:#fffdf7; font:10px ui-monospace,monospace; }
    .next,.start,.again { border:0; color:#fff; background:var(--navy); padding:12px 18px; font:800 11px ui-monospace,monospace; letter-spacing:.1em; text-transform:uppercase; cursor:pointer; transition:transform .18s ease,background .18s ease; }
    .next:hover,.start:hover,.again:hover { background:var(--red); transform:translateY(-2px); }
    .next { visibility:hidden; } .next.show { visibility:visible; animation:pop .25s ease both; }
    .intro,.results { text-align:center; padding:clamp(28px,7vw,62px) clamp(20px,5vw,54px); }
    .intro .mini-seal { width:76px; height:76px; margin:0 auto 25px; border:2px solid var(--navy); border-radius:50%; display:grid; place-items:center; color:var(--red); font-size:31px; box-shadow:inset 0 0 0 6px var(--paper), inset 0 0 0 7px var(--navy); }
    .intro h1,.results h1 { margin:0 auto 16px; max-width:600px; }
    .intro p,.results p { max-width:480px; margin:0 auto 28px; color:#576170; font-size:14px; line-height:1.7; }
    .start,.again { min-width:190px; }
    .facts { display:flex; justify-content:center; flex-wrap:wrap; gap:9px 20px; margin-top:30px; color:#55616f; font:10px ui-monospace,monospace; letter-spacing:.05em; text-transform:uppercase; }
    .facts span:before { content:'✦'; color:var(--red); margin-right:7px; }
    .score-ring { width:130px; height:130px; margin:0 auto 25px; border:7px solid var(--navy); border-radius:50%; display:grid; place-items:center; color:var(--navy); box-shadow:inset 0 0 0 5px var(--paper), inset 0 0 0 6px var(--gold); }
    .score-ring strong { display:block; font:700 44px/1 Georgia,serif; letter-spacing:-3px; }.score-ring small{display:block;font:10px ui-monospace,monospace;letter-spacing:.12em;margin-top:3px}
    .verdict { color:var(--red); font:700 11px ui-monospace,monospace; text-transform:uppercase; letter-spacing:.15em; margin-bottom:12px; }
    .confetti { position:absolute; width:8px;height:14px;left:50%;top:38%; opacity:0; animation:confetti 1.2s ease-out forwards; }
    footer { margin-top:27px; display:flex; align-items:center; justify-content:space-between; color:#66707b; font:10px ui-monospace,monospace; letter-spacing:.04em; }
    .stars { letter-spacing:4px; color:var(--gold); }
    .hidden { display:none !important; }
    @keyframes answer-in { from{transform:scale(.98)} to{transform:scale(1)} } @keyframes shake { 25%{transform:translateX(-6px)} 70%{transform:translateX(4px)} }
    @keyframes pop { from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1} } @keyframes confetti { 0%{opacity:1;transform:translate(var(--x),0) rotate(0)}100%{opacity:0;transform:translate(var(--x),var(--y)) rotate(560deg)} }
    @media (max-width:520px){.shell{width:min(100% - 22px,790px);padding-top:22px}.brand-word{font-size:15px}.round{font-size:9px}.quiz-card{box-shadow:5px 6px 0 rgba(16,36,59,.12)}h1{letter-spacing:-.8px}.hint{display:none} footer{font-size:8px}}
    @media (prefers-reduced-motion:reduce){*,*:before,*:after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
  </style>
</head>
<body>
  <div class="stripes"></div>
  <div class="shell">
    <header><div class="brand"><div class="seal" aria-hidden="true">★</div><div><div class="brand-word">Common Ground</div><small>Everyday civics</small></div></div><div class="round" id="round">Civics Quiz</div></header>
    <div class="progress-wrap" aria-label="Quiz progress"><div class="progress-label"><span id="progressText">Ready when you are</span><span id="progressNumber">0 / 10</span></div><div class="progress"><span id="progressBar"></span></div></div>
    <main id="app" aria-live="polite"></main>
    <footer><span>10 questions · basic U.S. civics</span><span class="stars" aria-hidden="true">★ ★ ★</span></footer>
  </div>
  <script>
    const questions = [
      {q:'What is the capital of the United States?', a:['New York City','Washington, D.C.','Philadelphia','Boston'], c:1},
      {q:'How many branches are there in the U.S. federal government?', a:['Two','Three','Four','Five'], c:1},
      {q:'Which document begins with the words “We the People”?', a:['The Declaration of Independence','The Constitution','The Bill of Rights','The Emancipation Proclamation'], c:1},
      {q:'Who is the leader of the executive branch?', a:['The Chief Justice','The Speaker of the House','The President','The Secretary of State'], c:2},
      {q:'What do we call the first ten amendments to the Constitution?', a:['The Articles of Confederation','The Federalist Papers','The Bill of Rights','The Preamble'], c:2},
      {q:'Which holiday celebrates U.S. independence?', a:['Memorial Day','Veterans Day','Labor Day','Independence Day'], c:3},
      {q:'What are the two parts of the U.S. Congress?', a:['Senate and House of Representatives','President and Cabinet','Courts and Congress','States and Territories'], c:0},
      {q:'How many U.S. states are there?', a:['48','49','50','52'], c:2},
      {q:'What is one right protected by the First Amendment?', a:['The right to vote at age 16','Freedom of speech','The right to own a passport','Free public transportation'], c:1},
      {q:'What is the highest court in the United States?', a:['The Federal Court','The Supreme Court','The Court of Appeals','The Senate Court'], c:1}
    ];
    const app = document.getElementById('app'), bar = document.getElementById('progressBar'), pText = document.getElementById('progressText'), pNumber = document.getElementById('progressNumber'), round = document.getElementById('round');
    let order = [], index = 0, score = 0, locked = false;
    const shuffle = arr => [...arr].sort(() => Math.random() - .5);
    function setProgress(){ const done=index; bar.style.width=`${(done/10)*100}%`; pNumber.textContent=`${done} / 10`; pText.textContent=done ? `${10-done} question${10-done===1?'':'s'} to go` : 'Ready when you are'; }
    function intro(){ round.textContent='Civics Quiz'; app.innerHTML=`<section class="quiz-card intro"><div class="mini-seal" aria-hidden="true">★</div><div class="eyebrow" style="justify-content:center">A quick civic refresher</div><h1>How well do you know the basics?</h1><p>Ten approachable questions about the United States—its government, history, and shared civic life.</p><button class="start" id="start">Begin the quiz →</button><div class="facts"><span>10 questions</span><span>Instant feedback</span><span>About 3 minutes</span></div></section>`; document.getElementById('start').focus(); }
    function renderQuestion(){ locked=false; const item=order[index], letters=['A','B','C','D']; round.textContent=`Question ${index+1}`; pText.textContent=`Question ${index+1} of 10`; pNumber.textContent=`${index+1} / 10`; bar.style.width=`${(index/10)*100}%`;
      app.innerHTML=`<article class="quiz-card" id="card"><div class="eyebrow">Question ${String(index+1).padStart(2,'0')}</div><h1>${item.q}</h1><div class="answers">${item.a.map((answer,i)=>`<button class="answer" data-i="${i}"><span class="letter">${letters[i]}</span><span>${answer}</span></button>`).join('')}</div><div class="feedback" id="feedback"></div><div class="card-bottom"><span class="hint">Choose an answer · or press <kbd>1</kbd>–<kbd>4</kbd></span><button class="next" id="next">${index===9?'See results':'Next question'} →</button></div></article>`;
      app.querySelectorAll('.answer').forEach(btn=>btn.addEventListener('click',()=>answer(+btn.dataset.i)));
      requestAnimationFrame(()=>document.getElementById('card').animate([{opacity:0,transform:'translateY(12px)'},{opacity:1,transform:'translateY(0)'}],{duration:340,easing:'cubic-bezier(.22,1,.36,1)'}));
    }
    function answer(choice){ if(locked)return; locked=true; const item=order[index], buttons=[...app.querySelectorAll('.answer')], correct=choice===item.c; buttons.forEach((btn,i)=>{btn.disabled=true;if(i===item.c) btn.classList.add(choice===item.c?'correct':'reveal'); if(i===choice&&!correct)btn.classList.add('wrong');}); if(correct)score++; const feedback=document.getElementById('feedback');feedback.className=`feedback visible ${correct?'good':'bad'}`;feedback.innerHTML=`<span class="feedback-mark">${correct?'✓':'×'}</span><span>${correct?'That’s right! Nicely done.':`Not quite — the answer is ${item.a[item.c]}.`}</span>`; const next=document.getElementById('next');next.classList.add('show'); next.focus(); }
    function results(){ bar.style.width='100%'; pText.textContent='Quiz complete'; pNumber.textContent=`${score} / 10`; round.textContent='Your Score'; const pct=score/10; const verdict=pct===1?'Perfect score!':pct>=.8?'Strong civic knowledge!':pct>=.6?'A solid foundation!':'Keep exploring!'; const message=pct===1?'You aced every question. Common ground, indeed.':pct>=.8?'You know your way around the essentials of American civics.':pct>=.6?'You’ve got the essentials—one more round could make it a sweep.':'Every good citizen starts somewhere. Try another round and watch your score climb.'; app.innerHTML=`<section class="quiz-card results" id="results"><div class="score-ring"><div><strong>${score}</strong><small>OUT OF 10</small></div></div><div class="verdict">${verdict}</div><h1>${score===10?'A truly stellar round.':'Thanks for playing.'}</h1><p>${message}</p><button class="again" id="again">Try another round ↻</button></section>`; if(score>=7) celebrate(); document.getElementById('again').focus(); }
    function celebrate(){ const colors=['#b83a3a','#d89a2b','#315b87','#19765a']; for(let i=0;i<28;i++){const bit=document.createElement('i');bit.className='confetti';bit.style.background=colors[i%colors.length];bit.style.setProperty('--x',`${(Math.random()-.5)*600}px`);bit.style.setProperty('--y',`${120+Math.random()*280}px`);bit.style.animationDelay=`${Math.random()*.2}s`;app.appendChild(bit);} }
    function start(){ order=shuffle(questions);index=0;score=0;renderQuestion(); }
    app.addEventListener('click',e=>{if(e.target.closest('#start')||e.target.closest('#again'))start(); if(e.target.closest('#next')&&locked){index++;index<10?renderQuestion():results();}});
    document.addEventListener('keydown',e=>{if(!locked && index<10 && /^[1-4]$/.test(e.key) && app.querySelector('.answer'))answer(+e.key-1); if(locked&&e.key==='Enter'&&app.querySelector('#next'))app.querySelector('#next').click();});
    setProgress(); intro();
  </script>
</body>
</html>
