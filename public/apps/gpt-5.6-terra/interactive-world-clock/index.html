<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0b1020" />
  <title>World Clock</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap');

    :root { --ink:#eff4ff; --muted:#9ba8bd; --line:rgba(222,231,248,.13); --paper:#0b1020; --panel:#121a30; --blue:#89b9ff; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; overflow-x:hidden; background:var(--paper); color:var(--ink); font-family:"DM Sans", sans-serif; }
    body::before { content:""; position:fixed; width:55rem; height:55rem; border-radius:50%; top:-38rem; left:45%; transform:translateX(-50%); background:radial-gradient(circle, rgba(41,83,162,.26), transparent 66%); pointer-events:none; }
    button { font:inherit; color:inherit; }
    .shell { width:min(1160px, calc(100% - 40px)); margin:auto; padding:30px 0 38px; position:relative; }
    header { display:flex; align-items:center; justify-content:space-between; padding-bottom:30px; border-bottom:1px solid var(--line); }
    .brand { display:flex; align-items:center; gap:12px; letter-spacing:.03em; font-weight:600; }
    .brand-mark { width:31px; height:31px; border:1px solid rgba(182,208,255,.7); border-radius:50%; position:relative; box-shadow:inset -7px -2px 0 rgba(137,185,255,.18); }
    .brand-mark::after { content:""; position:absolute; height:1px; width:41px; top:14px; left:-6px; background:#89b9ff; transform:rotate(-35deg); opacity:.85; }
    .live { color:#b9c6da; font:500 11px "DM Mono",monospace; text-transform:uppercase; letter-spacing:.14em; display:flex; gap:9px; align-items:center; }
    .live i { width:7px; height:7px; border-radius:50%; background:#65e3b0; box-shadow:0 0 0 5px rgba(101,227,176,.1); animation:pulse 2s infinite; }
    .hero { min-height:325px; padding:76px 2px 55px; display:grid; grid-template-columns:1fr auto; align-items:end; gap:30px; }
    .eyebrow { margin:0 0 13px; font:500 11px "DM Mono",monospace; letter-spacing:.16em; color:var(--blue); text-transform:uppercase; }
    h1 { font:600 clamp(46px, 7vw, 83px)/.98 "Playfair Display",serif; letter-spacing:-.055em; margin:0; }
    h1 em { font-weight:600; color:#a8c8ff; }
    .today { text-align:right; padding-bottom:8px; }
    .today strong { font:400 15px "DM Mono",monospace; }
    .today span { display:block; margin-top:6px; color:var(--muted); font-size:13px; }
    .toolbar { display:flex; justify-content:space-between; align-items:center; padding:17px 0; border-top:1px solid var(--line); border-bottom:1px solid var(--line); }
    .city-count { color:var(--muted); font-size:13px; }
    .toolbar-actions { display:flex; align-items:center; gap:10px; }
    .format { display:flex; border:1px solid var(--line); padding:3px; border-radius:7px; background:rgba(255,255,255,.025); }
    .format button { border:0; background:transparent; font:500 11px "DM Mono",monospace; padding:7px 9px; border-radius:4px; cursor:pointer; color:#8390a6; transition:.2s; }
    .format button.active { color:#081121; background:#dce9ff; }
    .add { border:1px solid rgba(162,195,249,.6); border-radius:7px; background:#b7d4ff; color:#091223; padding:9px 14px; font-size:13px; font-weight:600; cursor:pointer; transition:transform .2s, background .2s; }
    .add:hover { transform:translateY(-1px); background:#d2e4ff; }
    .clocks { display:grid; grid-template-columns:repeat(2, minmax(0, 1fr)); }
    .clock { --phase:#83b7ff; --phase-bg:rgba(94,159,255,.1); min-height:218px; position:relative; padding:26px 29px 25px; border-bottom:1px solid var(--line); border-right:1px solid var(--line); overflow:hidden; animation:rise .55s both; }
    .clock:nth-child(even) { border-right:0; }
    .clock::before { content:""; position:absolute; width:210px; height:210px; border-radius:50%; background:radial-gradient(circle, var(--phase-bg), transparent 68%); right:-42px; top:-74px; pointer-events:none; }
    .clock:hover .remove { opacity:1; transform:none; }
    .city-line { display:flex; align-items:center; gap:10px; position:relative; }
    .phase-icon { width:27px; height:27px; display:grid; place-items:center; color:var(--phase); font-size:21px; filter:drop-shadow(0 0 10px var(--phase-bg)); }
    .city-line h2 { margin:0; font-size:16px; font-weight:600; letter-spacing:-.02em; }
    .zone { margin-left:auto; color:var(--muted); font:400 11px "DM Mono",monospace; }
    .time { margin:25px 0 6px; font:500 clamp(41px, 5vw, 61px)/.9 "DM Mono",monospace; letter-spacing:-.08em; white-space:nowrap; position:relative; }
    .time .seconds { color:#6d7a90; font-size:.38em; letter-spacing:-.03em; vertical-align:middle; margin-left:8px; }
    .meta { display:flex; justify-content:space-between; align-items:center; gap:10px; color:var(--muted); font-size:12px; position:relative; }
    .phase-label { color:var(--phase); text-transform:uppercase; letter-spacing:.12em; font:500 10px "DM Mono",monospace; }
    .remove { opacity:0; transform:translateX(3px); padding:4px; border:0; background:transparent; color:#9ba8bd; position:absolute; right:23px; top:20px; cursor:pointer; line-height:1; transition:.2s; z-index:2; }
    .remove:hover { color:#ff9f9f; }
    footer { padding-top:23px; display:flex; justify-content:space-between; gap:18px; color:#748198; font:11px "DM Mono",monospace; letter-spacing:.025em; }
    .legend { display:flex; gap:15px; align-items:center; }
    .legend span { display:flex; align-items:center; gap:6px; }
    .dot { width:6px; height:6px; border-radius:50%; background:var(--c); }
    dialog { border:1px solid rgba(183,212,255,.22); border-radius:13px; padding:0; background:#121a30; color:var(--ink); width:min(450px, calc(100% - 32px)); box-shadow:0 24px 80px rgba(0,0,0,.55); }
    dialog::backdrop { background:rgba(3,6,14,.7); backdrop-filter:blur(4px); }
    .dialog-inner { padding:26px; }
    .dialog-top { display:flex; justify-content:space-between; align-items:center; }
    .dialog-top h3 { margin:0; font:600 25px "Playfair Display",serif; letter-spacing:-.03em; }
    .close { cursor:pointer; padding:5px 8px; border:0; background:transparent; color:var(--muted); font-size:21px; }
    .search { width:100%; margin:21px 0 13px; padding:12px 13px; border-radius:7px; border:1px solid var(--line); background:#0c1325; color:var(--ink); outline:none; font-size:14px; }
    .search:focus { border-color:#89b9ff; }
    .city-options { max-height:310px; overflow:auto; display:grid; gap:4px; }
    .city-option { width:100%; display:flex; align-items:center; justify-content:space-between; border:0; border-radius:7px; padding:11px; background:transparent; text-align:left; cursor:pointer; }
    .city-option:hover { background:rgba(139,182,255,.1); }
    .city-option strong { font-size:14px; }
    .city-option span { color:var(--muted); font:11px "DM Mono",monospace; }
    .empty { grid-column:1/-1; min-height:280px; display:grid; place-items:center; text-align:center; color:var(--muted); border-bottom:1px solid var(--line); }
    .empty p { margin:8px 0 16px; }
    @keyframes rise { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }
    @keyframes pulse { 50% { opacity:.45; } }
    @media (max-width:650px) { .shell{width:min(100% - 26px, 1160px);padding-top:19px}.hero{display:block;min-height:245px;padding:53px 1px 40px}.today{text-align:left;margin-top:25px;padding:0}.clocks{grid-template-columns:1fr}.clock,.clock:nth-child(even){border-right:0}.clock{min-height:195px;padding:23px 20px}.time{margin-top:23px}.remove{opacity:1;right:14px;top:17px}.toolbar{align-items:flex-start;gap:13px}.toolbar-actions{gap:7px}.add{padding:9px 10px}.city-count{padding-top:9px}footer{display:block}.legend{margin-top:10px;flex-wrap:wrap;gap:10px} }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div class="brand"><span class="brand-mark" aria-hidden="true"></span><span>World Clock</span></div>
      <div class="live"><i></i> Live</div>
    </header>
    <main>
      <section class="hero" aria-labelledby="title">
        <div><p class="eyebrow">A small observatory of now</p><h1 id="title">Time, <em>elsewhere.</em></h1></div>
        <div class="today"><strong id="local-time">--:--</strong><span id="local-date">Your local time</span></div>
      </section>
      <section class="toolbar" aria-label="Clock settings">
        <div class="city-count"><span id="count">0</span> cities in view</div>
        <div class="toolbar-actions">
          <div class="format" aria-label="Time format"><button class="active" data-format="12" aria-pressed="true">12H</button><button data-format="24" aria-pressed="false">24H</button></div>
          <button class="add" id="add-city">+ Add city</button>
        </div>
      </section>
      <section class="clocks" id="clocks" aria-live="polite"></section>
    </main>
    <footer><span>Times update every second</span><div class="legend"><span><b class="dot" style="--c:#ffd07c"></b> day</span><span><b class="dot" style="--c:#d39fff"></b> twilight</span><span><b class="dot" style="--c:#8abaff"></b> night</span></div></footer>
  </div>
  <dialog id="city-dialog" aria-labelledby="dialog-title">
    <div class="dialog-inner">
      <div class="dialog-top"><h3 id="dialog-title">Add a city</h3><button class="close" id="close-dialog" aria-label="Close">×</button></div>
      <input class="search" id="search" type="search" placeholder="Search cities or time zones" autocomplete="off" />
      <div class="city-options" id="city-options"></div>
    </div>
  </dialog>
  <script>
    const cities = [
      {name:'San Francisco', zone:'America/Los_Angeles', country:'United States'},
      {name:'New York', zone:'America/New_York', country:'United States'},
      {name:'London', zone:'Europe/London', country:'United Kingdom'},
      {name:'Paris', zone:'Europe/Paris', country:'France'},
      {name:'Cairo', zone:'Africa/Cairo', country:'Egypt'},
      {name:'Nairobi', zone:'Africa/Nairobi', country:'Kenya'},
      {name:'Dubai', zone:'Asia/Dubai', country:'United Arab Emirates'},
      {name:'Mumbai', zone:'Asia/Kolkata', country:'India'},
      {name:'Singapore', zone:'Asia/Singapore', country:'Singapore'},
      {name:'Tokyo', zone:'Asia/Tokyo', country:'Japan'},
      {name:'Sydney', zone:'Australia/Sydney', country:'Australia'},
      {name:'Auckland', zone:'Pacific/Auckland', country:'New Zealand'},
      {name:'Honolulu', zone:'Pacific/Honolulu', country:'United States'},
      {name:'Mexico City', zone:'America/Mexico_City', country:'Mexico'},
      {name:'São Paulo', zone:'America/Sao_Paulo', country:'Brazil'}
    ];
    let selected = [cities[0], cities[2], cities[8], cities[9], cities[10]];
    let use24 = false;
    const clocks = document.querySelector('#clocks');
    const count = document.querySelector('#count');
    const dialog = document.querySelector('#city-dialog');
    const optionList = document.querySelector('#city-options');
    const search = document.querySelector('#search');
    const phaseFor = hour => hour >= 5 && hour < 9 ? ['morning','☀',' #ffd07c','rgba(255,192,99,.17)'] : hour >= 9 && hour < 17 ? ['afternoon','☼','#ffc06a','rgba(255,184,85,.15)'] : hour >= 17 && hour < 21 ? ['evening','◐','#d39fff','rgba(195,117,255,.18)'] : ['night','☾','#8abaff','rgba(74,145,255,.17)'];
    function parts(city, now = new Date()) {
      const f = new Intl.DateTimeFormat('en-US',{timeZone:city.zone,hour:'2-digit',minute:'2-digit',second:'2-digit',hourCycle:'h23',weekday:'short',month:'short',day:'numeric',timeZoneName:'short'});
      const values = Object.fromEntries(f.formatToParts(now).filter(x => x.type !== 'literal').map(x => [x.type,x.value]));
      return values;
    }
    function card(city, i) {
      const p = parts(city), phase = phaseFor(+p.hour);
      const hour = use24 ? p.hour : String((+p.hour % 12) || 12).padStart(2,'0');
      const ampm = use24 ? '' : (+p.hour >= 12 ? ' PM' : ' AM');
      return `<article class="clock" style="--phase:${phase[2]};--phase-bg:${phase[3]};animation-delay:${i*65}ms" data-zone="${city.zone}">
        <button class="remove" data-remove="${city.zone}" aria-label="Remove ${city.name}">×</button>
        <div class="city-line"><span class="phase-icon" aria-hidden="true">${phase[1]}</span><h2>${city.name}</h2><span class="zone">${p.timeZoneName}</span></div>
        <div class="time"><span class="hm">${hour}:${p.minute}</span><span class="seconds">${p.second}${ampm}</span></div>
        <div class="meta"><span>${p.weekday}, ${p.month} ${p.day}</span><span class="phase-label">${phase[0]}</span></div>
      </article>`;
    }
    function render() {
      count.textContent = selected.length;
      clocks.innerHTML = selected.length ? selected.map(card).join('') : `<div class="empty"><div><strong>No cities in view</strong><p>Add a city to begin your time map.</p><button class="add" onclick="document.querySelector('#add-city').click()">+ Add city</button></div></div>`;
    }
    function refresh() {
      const now = new Date();
      const local = new Intl.DateTimeFormat('en-US',{hour:'2-digit',minute:'2-digit',hourCycle:'h23',weekday:'long',month:'long',day:'numeric'}).formatToParts(now);
      const lp = Object.fromEntries(local.filter(x=>x.type!=='literal').map(x=>[x.type,x.value]));
      document.querySelector('#local-time').textContent = `${lp.hour}:${lp.minute}`;
      document.querySelector('#local-date').textContent = `${lp.weekday}, ${lp.month} ${lp.day} · Your local time`;
      document.querySelectorAll('.clock').forEach(el => {
        const city = selected.find(c => c.zone === el.dataset.zone); if (!city) return;
        const p = parts(city, now), phase = phaseFor(+p.hour), h = use24 ? p.hour : String((+p.hour % 12)||12).padStart(2,'0');
        el.style.setProperty('--phase',phase[2]); el.style.setProperty('--phase-bg',phase[3]);
        el.querySelector('.phase-icon').textContent = phase[1]; el.querySelector('.zone').textContent = p.timeZoneName;
        el.querySelector('.hm').textContent = `${h}:${p.minute}`; el.querySelector('.seconds').textContent = `${p.second}${use24?'':(+p.hour>=12?' PM':' AM')}`;
        el.querySelector('.meta span:first-child').textContent = `${p.weekday}, ${p.month} ${p.day}`; el.querySelector('.phase-label').textContent = phase[0];
      });
    }
    function renderOptions(q='') {
      const term=q.toLowerCase(); const available=cities.filter(c => !selected.some(x=>x.zone===c.zone) && `${c.name} ${c.country} ${c.zone}`.toLowerCase().includes(term));
      optionList.innerHTML = available.length ? available.map(c=>`<button class="city-option" data-add="${c.zone}"><strong>${c.name}</strong><span>${c.country} · ${c.zone.replace(/_/g,' ')}</span></button>`).join('') : '<div class="city-option"><span>No matching cities available</span></div>';
    }
    document.querySelector('#add-city').addEventListener('click',()=>{ renderOptions(); search.value=''; dialog.showModal(); setTimeout(()=>search.focus(),80); });
    document.querySelector('#close-dialog').addEventListener('click',()=>dialog.close());
    dialog.addEventListener('click', e=> { if(e.target === dialog) dialog.close(); });
    search.addEventListener('input',e=>renderOptions(e.target.value));
    optionList.addEventListener('click', e=> { const b=e.target.closest('[data-add]'); if(!b)return; selected.push(cities.find(c=>c.zone===b.dataset.add)); dialog.close(); render(); refresh(); });
    clocks.addEventListener('click', e=> { const b=e.target.closest('[data-remove]'); if(!b)return; selected=selected.filter(c=>c.zone!==b.dataset.remove); render(); });
    document.querySelectorAll('[data-format]').forEach(b=>b.addEventListener('click',()=>{ use24=b.dataset.format==='24'; document.querySelectorAll('[data-format]').forEach(x=>{x.classList.toggle('active',x===b);x.setAttribute('aria-pressed',x===b)}); render(); refresh(); }));
    render(); refresh(); setInterval(refresh,1000);
  </script>
</body>
</html>
