<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#062432" />
  <title>Ocean Wave Simulation</title>
  <style>
    :root{--ink:#e8f3f2;--muted:#a4bfc1;--line:rgba(203,236,233,.2);--pane:rgba(5,29,39,.48);--accent:#b7eeea;}
    *{box-sizing:border-box} html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#041f2e;color:var(--ink)}
    body{font-family:ui-monospace,"SFMono-Regular",Menlo,monospace;letter-spacing:.01em} canvas{position:fixed;inset:0;width:100%;height:100%;display:block}
    .grain{position:fixed;inset:0;pointer-events:none;opacity:.16;mix-blend-mode:soft-light;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.42'/%3E%3C/svg%3E")}
    .vignette{position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse at 50% 45%,transparent 35%,rgba(0,14,22,.33) 100%)}
    header{position:fixed;inset:0 0 auto;display:flex;align-items:flex-start;justify-content:space-between;padding:28px 34px;z-index:2;animation:appear .9s ease both}
    .brand{display:flex;align-items:center;gap:12px;font-size:10px;line-height:1.2;text-transform:uppercase;letter-spacing:.18em}.brand-mark{width:25px;height:25px;border:1px solid rgba(218,248,244,.75);border-radius:50%;position:relative}.brand-mark:before,.brand-mark:after{content:"";position:absolute;left:4px;right:4px;height:1px;background:var(--accent);border-radius:2px}.brand-mark:before{top:9px;transform:skewY(-16deg)}.brand-mark:after{top:14px;opacity:.65;transform:skewY(16deg)}
    .readout{text-align:right;font-size:9px;line-height:1.8;color:var(--muted);letter-spacing:.13em;text-transform:uppercase}.readout span{color:#e9f7f5}
    main{position:fixed;inset:0;z-index:1;pointer-events:none}.intro{position:absolute;top:19.5vh;left:9vw;max-width:445px;animation:rise 1s .12s cubic-bezier(.2,.7,.2,1) both}.eyebrow{font-size:10px;letter-spacing:.19em;text-transform:uppercase;color:#bdede8;margin-bottom:18px}.eyebrow:before{content:"";display:inline-block;width:25px;height:1px;margin:0 9px 3px 0;background:#bdece7}h1{margin:0;font:500 clamp(45px,5.6vw,82px)/.94 Georgia,"Times New Roman",serif;letter-spacing:-.055em;text-shadow:0 2px 20px rgba(0,0,0,.22)}h1 em{font-weight:500;color:#c6f2ec}.intro p{margin:18px 0 0;max-width:342px;font-size:11px;line-height:1.8;color:#c3d9d8;text-wrap:balance}
    .controls{position:fixed;right:34px;bottom:33px;width:min(390px,calc(100vw - 40px));z-index:3;background:linear-gradient(135deg,rgba(10,45,57,.65),rgba(4,29,39,.48));border:1px solid var(--line);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);box-shadow:0 18px 55px rgba(0,10,17,.26);animation:rise 1s .26s cubic-bezier(.2,.7,.2,1) both}
    .control-top{display:flex;justify-content:space-between;align-items:center;padding:17px 18px 15px;border-bottom:1px solid var(--line)}.control-title{font-size:10px;letter-spacing:.16em;text-transform:uppercase}.live{display:flex;align-items:center;gap:7px;font-size:9px;color:#b8d4d3}.live i{display:block;width:6px;height:6px;border-radius:50%;background:#a9f1d9;box-shadow:0 0 0 0 rgba(169,241,217,.65);animation:pulse 2s infinite}
    .sliders{padding:7px 18px 10px}.control{display:grid;grid-template-columns:82px 1fr 38px;align-items:center;gap:11px;min-height:45px}.control label,.value{font-size:9px;text-transform:uppercase;letter-spacing:.1em}.control label{color:#c1d9d8}.value{text-align:right;color:#eaf8f6;font-variant-numeric:tabular-nums}
    input[type=range]{--p:50%;appearance:none;width:100%;height:14px;margin:0;background:transparent;cursor:pointer}input[type=range]::-webkit-slider-runnable-track{height:1px;background:linear-gradient(90deg,#b7eeea var(--p),rgba(190,231,229,.25) var(--p))}input[type=range]::-moz-range-track{height:1px;background:linear-gradient(90deg,#b7eeea var(--p),rgba(190,231,229,.25) var(--p))}input[type=range]::-webkit-slider-thumb{appearance:none;width:10px;height:10px;border:1px solid #e9fbf8;border-radius:50%;background:#78bbb9;margin-top:-4.5px;box-shadow:0 0 0 3px rgba(154,229,224,.12);transition:transform .2s}input[type=range]:hover::-webkit-slider-thumb{transform:scale(1.2)}input[type=range]::-moz-range-thumb{width:9px;height:9px;border:1px solid #e9fbf8;border-radius:50%;background:#78bbb9;box-shadow:0 0 0 3px rgba(154,229,224,.12)}
    .foot{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--line);padding:12px 18px 13px}.preset{display:flex;gap:6px}.preset button,.pause{border:0;background:transparent;color:#91adaa;font:9px ui-monospace,"SFMono-Regular",Menlo,monospace;letter-spacing:.1em;text-transform:uppercase;padding:5px 6px;cursor:pointer;transition:color .2s,background .2s}.preset button.active,.preset button:hover{color:#e7faf7;background:rgba(185,239,234,.12)}.pause{color:#dff6f3;display:flex;align-items:center;gap:7px}.pause:before{content:"";display:block;width:7px;height:8px;border-left:2px solid currentColor;border-right:2px solid currentColor}.pause.stopped:before{width:0;height:0;border-top:4px solid transparent;border-bottom:4px solid transparent;border-left:6px solid currentColor;border-right:0}
    .scale{position:fixed;left:34px;bottom:34px;z-index:2;display:flex;align-items:flex-end;gap:11px;color:#bcd4d3;animation:appear 1s .45s both}.scale-line{height:36px;width:1px;background:linear-gradient(#bce9e5,rgba(188,233,229,.1))}.scale p{margin:0;font-size:9px;line-height:1.55;letter-spacing:.11em;text-transform:uppercase}.scale strong{display:block;color:#ecfbf8;font-weight:400}
    @keyframes rise{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}@keyframes appear{from{opacity:0}to{opacity:1}}@keyframes pulse{50%{box-shadow:0 0 0 5px rgba(169,241,217,0)}}
    @media(max-width:700px){header{padding:20px}.intro{left:24px;top:15vh;max-width:310px}.intro p{font-size:10px}.controls{right:20px;bottom:20px}.scale{display:none}h1{font-size:48px}.readout{display:none}}@media(prefers-reduced-motion:reduce){*,*:before,*:after{animation-duration:.01ms!important;animation-iteration-count:1!important}}
  </style>
</head>
<body>
  <canvas id="ocean" aria-label="Animated ocean wave simulation"></canvas><div class="grain"></div><div class="vignette"></div>
  <header><div class="brand"><span class="brand-mark"></span><span>Pelagic<br>Observatory</span></div><div class="readout">simulation <span id="clock">00:00:00</span><br>north pacific · 34.02° n</div></header>
  <main><section class="intro" aria-labelledby="title"><div class="eyebrow">Living water study · no. 04</div><h1 id="title">Ocean <em>in motion.</em></h1><p>Observe the shifting character of a wind-driven sea. Tune the elements and let the horizon settle into its own rhythm.</p></section></main>
  <section class="controls" aria-label="Wave controls"><div class="control-top"><span class="control-title">Conditions</span><span class="live"><i></i> Live simulation</span></div><div class="sliders">
    <div class="control"><label for="wind">Wind speed</label><input id="wind" type="range" min="0" max="100" value="46"><output class="value" id="windVal">18 kn</output></div>
    <div class="control"><label for="height">Wave height</label><input id="height" type="range" min="0" max="100" value="54"><output class="value" id="heightVal">2.4 m</output></div>
    <div class="control"><label for="light">Sun angle</label><input id="light" type="range" min="0" max="100" value="64"><output class="value" id="lightVal">Late day</output></div>
  </div><div class="foot"><div class="preset"><button data-preset="calm">Calm</button><button class="active" data-preset="open">Open sea</button><button data-preset="storm">Storm</button></div><button class="pause" id="pause" aria-pressed="false">Pause</button></div></section>
  <script>
  (()=>{
    const canvas=document.getElementById('ocean'),ctx=canvas.getContext('2d',{alpha:false});
    const el={wind:document.getElementById('wind'),height:document.getElementById('height'),light:document.getElementById('light'),windVal:document.getElementById('windVal'),heightVal:document.getElementById('heightVal'),lightVal:document.getElementById('lightVal')};
    let W,H,DPR,paused=false,last=performance.now(),time=0,wind=46,height=54,light=64;
    const presets={calm:[16,22,78],open:[46,54,64],storm:[88,92,25]};
    function resize(){DPR=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;canvas.width=W*DPR;canvas.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0)}
    addEventListener('resize',resize);resize();
    function rangeStyle(input){input.style.setProperty('--p',input.value+'%')}
    function update(){wind=+el.wind.value;height=+el.height.value;light=+el.light.value;rangeStyle(el.wind);rangeStyle(el.height);rangeStyle(el.light);el.windVal.textContent=Math.round(4+wind*.31)+' kn';el.heightVal.textContent=(.45+height*.036).toFixed(1)+' m';el.lightVal.textContent=light>72?'Golden hour':light>43?'Late day':light>20?'Blue hour':'Nightfall'}
    Object.values(el).filter(x=>x.tagName==='INPUT').forEach(x=>x.addEventListener('input',()=>{update();document.querySelectorAll('.preset button').forEach(b=>b.classList.remove('active'))}));update();
    document.querySelectorAll('.preset button').forEach(b=>b.onclick=()=>{const p=presets[b.dataset.preset];[el.wind.value,el.height.value,el.light.value]=p;update();document.querySelectorAll('.preset button').forEach(x=>x.classList.toggle('active',x===b))});
    const pause=document.getElementById('pause');pause.onclick=()=>{paused=!paused;pause.classList.toggle('stopped',paused);pause.textContent=paused?'Resume':'Pause';pause.setAttribute('aria-pressed',paused)};
    function wave(x,z,t){const s=.35+wind*.012,a=.16+height*.006;return (Math.sin(x*.51+z*.64-t*s)*.58+Math.sin(x*.96-z*.29-t*s*1.45)*.25+Math.sin(x*.21+z*1.37-t*s*.7)*.31)*a}
    function sky(){let sunX=W*(.52+(light-50)*.0032),sunY=H*(.1+(100-light)*.0023),dark=Math.max(0,(35-light)/35);let g=ctx.createLinearGradient(0,0,0,H*.52);g.addColorStop(0,`rgb(${Math.round(12-4*dark)},${Math.round(43-15*dark)},${Math.round(59-17*dark)})`);g.addColorStop(.55,`rgb(${Math.round(23+light*.38)},${Math.round(73+light*.43)},${Math.round(84+light*.38)})`);g.addColorStop(1,`rgb(${Math.round(95+light*.52)},${Math.round(133+light*.43)},${Math.round(128+light*.32)})`);ctx.fillStyle=g;ctx.fillRect(0,0,W,H*.53);
      let glow=ctx.createRadialGradient(sunX,sunY,0,sunX,sunY,H*.32);glow.addColorStop(0,`rgba(255,237,185,${.05+light*.006})`);glow.addColorStop(.3,`rgba(244,208,152,${.02+light*.002})`);glow.addColorStop(1,'rgba(246,196,125,0)');ctx.fillStyle=glow;ctx.fillRect(0,0,W,H*.58);
      if(light>14){ctx.beginPath();ctx.arc(sunX,sunY,Math.max(5,light*.1),0,Math.PI*2);ctx.fillStyle=`rgba(255,243,206,${.25+light*.005})`;ctx.fill()}
      // low clouds
      ctx.fillStyle=`rgba(4,35,48,${.08+dark*.2})`;for(let i=0;i<5;i++){let x=(i*.28+.05)*W,y=H*(.18+(i%2)*.045);ctx.beginPath();ctx.ellipse(x,y,W*.19,H*.035,0,0,7);ctx.fill()}
      return {sunX,sunY,dark};}
    function render(){let now=performance.now(),dt=Math.min(.05,(now-last)/1000);last=now;if(!paused)time+=dt;let sun=sky(), horizon=H*.455,rows=Math.max(36,Math.min(66,Math.round(H/13))),cols=Math.max(80,Math.min(150,Math.round(W/11)));let maxZ=26,near=1.15;
      // water base
      let base=ctx.createLinearGradient(0,horizon,0,H);base.addColorStop(0,'#1c626e');base.addColorStop(1,'#042f43');ctx.fillStyle=base;ctx.fillRect(0,horizon,W,H-horizon);
      for(let iz=0;iz<rows;iz++){let zn=iz/(rows-1),z=maxZ*Math.pow(zn,1.75)+near, z2=maxZ*Math.pow((iz+1)/(rows-1),1.75)+near;let y1=horizon+(1-near/z)*H*.86,y2=horizon+(1-near/z2)*H*.86;let spread1=W*.66*(near/z),spread2=W*.66*(near/z2);let cx=W*.5;
        for(let ix=0;ix<cols;ix++){let u=ix/cols-.5,x1=u*42,x2=(ix+1)/cols*42-21;let h1=wave(x1,z,time),h2=wave(x2,z,time),h3=wave(x2,z2,time),h4=wave(x1,z2,time);let px1=cx+x1/z*spread1*1.82,px2=cx+x2/z*spread1*1.82,px3=cx+x2/z2*spread2*1.82,px4=cx+x1/z2*spread2*1.82;let py1=y1-h1*H*.29/z,py2=y1-h2*H*.29/z,py3=y2-h3*H*.29/z2,py4=y2-h4*H*.29/z2;
          let slope=(h2-h1)*1.5+(h3-h2)*.4;let shimmer=Math.max(0,Math.sin(ix*2.31+iz*.71+time*1.4)*.5+.5);let sunDist=Math.abs((px1+px2+px3+px4)/4-sun.sunX)/(W*.46);let reflect=Math.max(0,1-sunDist)*Math.max(0,(1-zn)*1.1);let foam=Math.max(0,slope-.23)*(.38+height*.007);let r=5+Math.round(reflect*42+foam*80),g=48+Math.round(reflect*98+foam*125),b=65+Math.round(reflect*90+foam*105);let alpha=.54+Math.min(.25,zn*.22);ctx.fillStyle=`rgba(${r},${g},${b},${alpha})`;ctx.beginPath();ctx.moveTo(px1,py1);ctx.lineTo(px2,py2);ctx.lineTo(px3,py3);ctx.lineTo(px4,py4);ctx.closePath();ctx.fill();
          if((reflect*.85+foam)>.26&&shimmer>.58){ctx.strokeStyle=`rgba(230,255,244,${Math.min(.55,(reflect+foam)*.5)})`;ctx.lineWidth=Math.max(.35,1.2*zn);ctx.beginPath();ctx.moveTo(px1,py1);ctx.lineTo(px2,py2);ctx.stroke()}
        }}
      // horizon haze
      let haze=ctx.createLinearGradient(0,horizon-18,0,horizon+32);haze.addColorStop(0,'rgba(187,227,213,0)');haze.addColorStop(.5,`rgba(196,232,216,${.09+light*.001})`);haze.addColorStop(1,'rgba(136,199,194,0)');ctx.fillStyle=haze;ctx.fillRect(0,horizon-18,W,50);
      requestAnimationFrame(render);
    } render();
    setInterval(()=>{document.getElementById('clock').textContent=new Date().toLocaleTimeString('en-GB',{hour12:false})},1000);
  })();
  </script>
</body>
</html>
