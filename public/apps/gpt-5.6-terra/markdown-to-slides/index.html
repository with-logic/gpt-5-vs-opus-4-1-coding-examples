<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Markdown → Slides</title>
  <style>
    :root { --paper:#f4f2ee; --surface:#fbfaf8; --ink:#17212c; --muted:#77818b; --line:#d9d7d2; --blue:#0d3554; --blue2:#174d76; --sky:#b8d7ea; --accent:#ef6a45; --gold:#f1c56c; --shadow:0 20px 60px rgba(19,31,43,.13); }
    * { box-sizing:border-box; }
    body { margin:0; font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background:var(--paper); color:var(--ink); min-height:100vh; overflow-x:hidden; }
    button, textarea { font:inherit; }
    button { cursor:pointer; }
    .app { min-height:100vh; display:grid; grid-template-rows:76px 1fr; }
    .topbar { height:76px; display:flex; align-items:center; justify-content:space-between; padding:0 34px; background:rgba(251,250,248,.9); border-bottom:1px solid var(--line); position:sticky; top:0; z-index:20; backdrop-filter:blur(16px); }
    .brand { display:flex; align-items:center; gap:13px; text-decoration:none; color:var(--ink); font-size:17px; font-weight:760; letter-spacing:-.03em; }
    .brand-mark { width:30px; height:30px; border-radius:8px; background:var(--blue); color:white; display:grid; place-items:center; box-shadow:inset 0 -7px 15px rgba(0,0,0,.16); }
    .brand-mark svg { width:17px; }
    .top-actions { display:flex; align-items:center; gap:10px; }
    .icon-btn, .action-btn { border:1px solid var(--line); background:transparent; color:var(--ink); height:37px; border-radius:8px; display:inline-flex; align-items:center; justify-content:center; gap:8px; transition:.2s ease; }
    .icon-btn { width:37px; }
    .action-btn { padding:0 13px; font-size:13px; font-weight:650; }
    .action-btn.primary { background:var(--blue); color:#fff; border-color:var(--blue); box-shadow:0 4px 10px rgba(13,53,84,.18); }
    .icon-btn:hover,.action-btn:hover { transform:translateY(-1px); border-color:#aeb4b6; background:#fff; }
    .action-btn.primary:hover { background:var(--blue2); border-color:var(--blue2); }
    .icon-btn svg,.action-btn svg { width:16px; height:16px; stroke:currentColor; stroke-width:1.8; fill:none; }
    .workspace { padding:26px 30px 30px; display:grid; grid-template-columns:minmax(280px, .84fr) minmax(520px, 1.56fr); gap:26px; max-width:1760px; width:100%; margin:auto; }
    .editor-panel { min-height:calc(100vh - 132px); display:grid; grid-template-rows:auto 1fr auto; background:var(--surface); border:1px solid var(--line); border-radius:13px; overflow:hidden; box-shadow:0 5px 18px rgba(20,29,33,.035); }
    .panel-heading { min-height:67px; padding:0 19px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--line); }
    .eyebrow { margin:0 0 4px; color:var(--muted); font-size:10px; letter-spacing:.13em; text-transform:uppercase; font-weight:750; }
    h1 { font-family:Georgia, "Times New Roman", serif; font-size:20px; letter-spacing:-.03em; margin:0; font-weight:600; }
    .count { font-size:12px; color:var(--muted); background:#f0efeb; border-radius:99px; padding:5px 8px; font-variant-numeric:tabular-nums; }
    .editor-wrap { position:relative; min-height:300px; }
    textarea { border:0; outline:0; resize:none; width:100%; height:100%; min-height:400px; padding:23px 20px; line-height:1.72; color:#344250; background:transparent; font-family:"SFMono-Regular", Consolas, "Liberation Mono", monospace; font-size:13px; tab-size:2; }
    textarea::selection { background:#d9e7f0; }
    .editor-footer { padding:14px 18px; border-top:1px solid var(--line); display:flex; justify-content:space-between; align-items:center; color:var(--muted); font-size:11px; }
    kbd { color:#55616c; border:1px solid #d4d5d2; border-bottom-width:2px; border-radius:4px; padding:1px 5px; font-family:inherit; font-size:10px; background:#fff; }
    .stage { min-width:0; display:grid; grid-template-rows:auto 1fr auto; gap:16px; }
    .stage-header { display:flex; align-items:end; justify-content:space-between; min-height:67px; }
    .stage-title { font-family:Georgia, "Times New Roman", serif; font-size:23px; letter-spacing:-.035em; margin:0; font-weight:600; }
    .stage-title span { color:var(--muted); font-family:ui-sans-serif, sans-serif; font-size:12px; letter-spacing:0; font-weight:600; margin-left:9px; }
    .presentation { width:100%; min-height:0; display:grid; place-items:center; position:relative; }
    .slide-frame { width:100%; aspect-ratio:16 / 9; max-height:calc(100vh - 230px); position:relative; overflow:hidden; background:#0d3554; border-radius:14px; box-shadow:var(--shadow); color:white; transform-origin:center; }
    .slide { position:absolute; inset:0; padding:7.1% 8.1%; display:flex; flex-direction:column; justify-content:space-between; overflow:hidden; opacity:0; transform:translateX(18px); pointer-events:none; transition:opacity .38s ease, transform .42s cubic-bezier(.2,.8,.2,1); }
    .slide.active { opacity:1; transform:translateX(0); pointer-events:auto; }
    .slide.out-left { opacity:0; transform:translateX(-18px); }
    .slide::before { content:""; position:absolute; width:58%; aspect-ratio:1; border-radius:50%; background:radial-gradient(circle at 35% 35%, rgba(115,190,222,.22), transparent 63%); right:-20%; top:-36%; pointer-events:none; }
    .slide::after { content:""; position:absolute; width:40%; height:3px; background:var(--accent); left:8.1%; top:11.5%; opacity:.96; }
    .slide-kicker { position:relative; z-index:2; font-size:clamp(9px,1vw,15px); letter-spacing:.18em; text-transform:uppercase; font-weight:720; color:#c2dbe8; }
    .slide-content { position:relative; z-index:2; max-width:78%; }
    .slide h2 { font-family:Georgia, "Times New Roman", serif; font-size:clamp(30px,4.1vw,66px); line-height:1.03; margin:0 0 .42em; letter-spacing:-.055em; font-weight:500; }
    .slide h3 { font-size:clamp(16px,2.05vw,30px); margin:0 0 .6em; font-weight:520; line-height:1.25; color:#d6e3e9; }
    .slide p { font-size:clamp(12px,1.38vw,21px); line-height:1.52; max-width:780px; color:#c6d7df; margin:.45em 0; }
    .slide ul { list-style:none; padding:0; margin:1.35em 0 0; display:grid; gap:.62em; font-size:clamp(12px,1.28vw,19px); color:#e5edf0; }
    .slide li { position:relative; padding-left:1.35em; line-height:1.35; }
    .slide li::before { content:""; width:.45em; height:.45em; border-radius:50%; background:var(--gold); position:absolute; left:0; top:.43em; }
    .slide quote { display:block; border-left:2px solid var(--gold); padding-left:1em; color:#e7edf0; font-size:clamp(13px,1.55vw,23px); font-family:Georgia,serif; line-height:1.35; }
    .slide-meta { position:relative; z-index:2; display:flex; justify-content:space-between; align-items:end; font-size:clamp(8px,.82vw,12px); color:#b2cbd8; letter-spacing:.12em; text-transform:uppercase; }
    .slide-number { color:#fff; font-variant-numeric:tabular-nums; font-weight:700; }
    .slide.visual-right .slide-content { max-width:56%; }
    .slide .visual { position:absolute; right:5.6%; bottom:11%; width:29%; aspect-ratio:1; z-index:1; }
    .visual.orbit::before { content:""; position:absolute; inset:5%; border-radius:50%; border:1px solid rgba(191,223,236,.42); }
    .visual.orbit::after { content:""; position:absolute; inset:23%; border-radius:50%; background:var(--gold); box-shadow:0 0 0 15px rgba(241,197,108,.12), 33px -22px 0 -7px var(--accent), -43px 39px 0 -10px #89c2d9; }
    .visual.bars { display:flex; align-items:end; gap:8%; padding:12% 10%; border-bottom:1px solid rgba(255,255,255,.38); }
    .visual.bars i { width:14%; background:#8bc5dc; display:block; border-radius:3px 3px 0 0; box-shadow:0 -12px 35px rgba(139,197,220,.15); }
    .visual.bars i:nth-child(1){height:32%}.visual.bars i:nth-child(2){height:56%}.visual.bars i:nth-child(3){height:44%;background:var(--gold)}.visual.bars i:nth-child(4){height:76%}.visual.bars i:nth-child(5){height:92%;background:var(--accent)}
    .visual.grid { border:1px solid rgba(190,220,232,.32); background:linear-gradient(rgba(190,220,232,.17) 1px,transparent 1px),linear-gradient(90deg,rgba(190,220,232,.17) 1px,transparent 1px); background-size:25% 25%; transform:rotate(-8deg); }
    .visual.grid::after { content:""; position:absolute; width:42%; aspect-ratio:1; border-radius:50%; background:var(--gold); top:28%; left:29%; box-shadow:0 0 0 17px rgba(241,197,108,.12); }
    .slide.light { background:#e9e7e1; color:#172a3a; }
    .slide.light::before { background:radial-gradient(circle at 35% 35%, rgba(13,53,84,.15), transparent 63%); }
    .slide.light .slide-kicker, .slide.light .slide-meta { color:#527187; }
    .slide.light h3,.slide.light p { color:#47606f; }
    .slide.light li,.slide.light quote { color:#263e4d; }
    .slide.light .slide-number { color:#0d3554; }
    .slide.light .visual.grid { border-color:rgba(13,53,84,.26); background:linear-gradient(rgba(13,53,84,.13) 1px,transparent 1px),linear-gradient(90deg,rgba(13,53,84,.13) 1px,transparent 1px); background-size:25% 25%; }
    .slide.tone-clay { background:#c55d42; }.slide.tone-clay .slide-kicker,.slide.tone-clay .slide-meta {color:#ffe7d8}.slide.tone-clay h3,.slide.tone-clay p { color:#ffe8dc; }.slide.tone-clay::before{background:radial-gradient(circle at 35% 35%,rgba(255,228,183,.3),transparent 62%)}
    .stage-controls { display:flex; align-items:center; justify-content:center; gap:12px; }
    .nav-btn { border:1px solid var(--line); background:var(--surface); color:var(--ink); width:38px; height:38px; display:grid; place-items:center; border-radius:50%; transition:.2s; }
    .nav-btn:hover:not(:disabled) { background:var(--blue); color:#fff; border-color:var(--blue); transform:translateY(-1px); }
    .nav-btn:disabled { opacity:.38; cursor:not-allowed; }.nav-btn svg { width:17px; stroke:currentColor; fill:none; stroke-width:1.8; }
    .progress { width:min(180px, 27vw); height:3px; border-radius:9px; overflow:hidden; background:#dcddd9; }.progress > i{display:block;height:100%;background:var(--accent); width:25%;transition:width .35s ease}.slide-pos{font-size:12px;min-width:42px;color:var(--muted);font-variant-numeric:tabular-nums}
    .fullscreen-controls { position:absolute; top:18px; right:18px; z-index:5; opacity:0; transition:.2s; }.slide-frame:hover .fullscreen-controls, .slide-frame:focus-within .fullscreen-controls {opacity:1}.fullscreen-controls .icon-btn{background:rgba(255,255,255,.14);color:white;border-color:rgba(255,255,255,.3);backdrop-filter:blur(8px)}
    .toast { position:fixed; bottom:24px; left:50%; transform:translate(-50%, 80px); background:var(--ink); color:#fff; font-size:13px; padding:10px 14px; border-radius:8px; box-shadow:0 8px 25px rgba(0,0,0,.2); opacity:0; transition:.3s; z-index:40; }.toast.show{transform:translate(-50%,0);opacity:1}
    #themeToggle .sun { display:none; } body.light-deck #themeToggle .moon{display:none} body.light-deck #themeToggle .sun{display:block}
    body.light-deck .slide-frame { background:#e9e7e1; } body.light-deck .slide { background:#e9e7e1; color:#172a3a; } body.light-deck .slide::before { background:radial-gradient(circle at 35% 35%,rgba(13,53,84,.15),transparent 63%); } body.light-deck .slide-kicker,body.light-deck .slide-meta{color:#527187}body.light-deck .slide h3,body.light-deck .slide p{color:#47606f}body.light-deck .slide li,body.light-deck .slide quote{color:#263e4d}body.light-deck .slide-number{color:#0d3554}body.light-deck .visual.grid{border-color:rgba(13,53,84,.26);background:linear-gradient(rgba(13,53,84,.13) 1px,transparent 1px),linear-gradient(90deg,rgba(13,53,84,.13) 1px,transparent 1px);background-size:25% 25%}
    @media (max-width: 920px) { .workspace{grid-template-columns:1fr;padding:17px}.editor-panel{min-height:420px}.stage{min-height:0}.slide-frame{max-height:none}.stage-header{min-height:42px}.topbar{padding:0 17px}.action-btn .hide-sm{display:none}.action-btn{padding:0 10px} }
    @media (max-width: 560px) { .topbar{height:62px}.app{grid-template-rows:62px 1fr}.workspace{padding:12px;gap:18px}.editor-panel{min-height:390px}.slide-frame{border-radius:9px}.slide{padding:9% 8%}.slide-content{max-width:90%}.slide.visual-right .slide-content{max-width:64%}.top-actions{gap:6px}.icon-btn{width:34px;height:34px}.action-btn{height:34px}.brand{font-size:15px} }
    @media (prefers-reduced-motion: reduce) { *,*::before,*::after{transition-duration:.01ms!important;animation-duration:.01ms!important} }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <a href="#" class="brand" aria-label="Markdown to Slides home"><span class="brand-mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 4h14v16H5z"/><path d="m8 15 2-3 2 2 2-3 2 4"/></svg></span> Markdown <span style="color:#77818b;font-weight:500">→</span> Slides</a>
      <nav class="top-actions" aria-label="Presentation actions">
        <button class="action-btn" id="sampleBtn" title="Load the sample presentation"><svg viewBox="0 0 24 24"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/></svg><span class="hide-sm">Load sample</span></button>
        <button class="icon-btn" id="themeToggle" title="Toggle deck theme" aria-label="Toggle deck theme"><svg class="moon" viewBox="0 0 24 24"><path d="M20.5 14.3A8.5 8.5 0 0 1 9.7 3.5 8.5 8.5 0 1 0 20.5 14.3Z"/></svg><svg class="sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.5"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg></button>
        <button class="action-btn primary" id="presentBtn"><svg viewBox="0 0 24 24"><path d="M4 4h16v16H4z"/><path d="M9 4v3M15 4v3M9 17v3M15 17v3"/></svg><span class="hide-sm">Present</span></button>
      </nav>
    </header>

    <main class="workspace">
      <section class="editor-panel" aria-labelledby="editor-title">
        <header class="panel-heading"><div><p class="eyebrow">Source</p><h1 id="editor-title">Your markdown</h1></div><span class="count" id="wordCount">0 words</span></header>
        <div class="editor-wrap"><textarea id="markdownInput" spellcheck="false" aria-label="Markdown source"></textarea></div>
        <footer class="editor-footer"><span>Separate slides with <kbd>---</kbd></span><span>Updates as you type</span></footer>
      </section>

      <section class="stage" aria-labelledby="preview-title">
        <header class="stage-header"><div><p class="eyebrow">Live preview</p><h2 class="stage-title" id="preview-title">Deck canvas <span id="slideCount">01 slides</span></h2></div></header>
        <div class="presentation">
          <div class="slide-frame" id="slideFrame" tabindex="0" aria-label="Slide preview; use arrow keys to navigate">
            <div class="fullscreen-controls"><button class="icon-btn" id="frameFullscreen" title="Present full screen" aria-label="Present full screen"><svg viewBox="0 0 24 24"><path d="M8 3H3v5M16 3h5v5M21 16v5h-5M3 16v5h5"/></svg></button></div>
            <div id="slides"></div>
          </div>
        </div>
        <footer class="stage-controls" aria-label="Slide navigation">
          <button class="nav-btn" id="prevBtn" aria-label="Previous slide"><svg viewBox="0 0 24 24"><path d="m14.5 5-7 7 7 7"/></svg></button>
          <div class="progress" aria-hidden="true"><i id="progressBar"></i></div><span class="slide-pos" id="slidePos">01 / 01</span>
          <button class="nav-btn" id="nextBtn" aria-label="Next slide"><svg viewBox="0 0 24 24"><path d="m9.5 5 7 7-7 7"/></svg></button>
        </footer>
      </section>
    </main>
  </div>
  <div class="toast" id="toast" role="status"></div>
  <script>
  (() => {
    const sample = `# The next chapter\n## A five-year view of sustainable growth\n\nA focused strategy for an expanding market.\n\n— Northstar / 2025\n\n---\n\n# The opportunity\n\nOur market is changing faster than our operating model.\n\n- Demand is moving upstream\n- Expectations are rising\n- The window to lead is now\n\n---\n\n# One connected system\n## From signals to smarter decisions\n\n> “Clarity arrives when every team can see the same horizon.”\n\n---\n\n# What changes now\n\n## A deliberate shift in how we build\n\n- Design for the whole customer journey\n- Make the useful choice the effortless one\n- Turn insight into a weekly habit\n\n---\n\n# The path forward\n## Start narrow. Learn quickly. Scale with confidence.\n\nQ1 — Align the core\nQ2 — Prove the model\nQ3 — Expand the advantage\n\n---\n\n# Ready for the work\n\nA sharper focus. A shared cadence. A better tomorrow.\n\n— Thank you`;
    const input = document.getElementById('markdownInput');
    const slidesEl = document.getElementById('slides');
    const countEl = document.getElementById('slideCount');
    const wordEl = document.getElementById('wordCount');
    const posEl = document.getElementById('slidePos');
    const progress = document.getElementById('progressBar');
    const prev = document.getElementById('prevBtn');
    const next = document.getElementById('nextBtn');
    const frame = document.getElementById('slideFrame');
    const toast = document.getElementById('toast');
    let data = [], current = 0, toastTimer;

    function escapeHTML(s) { return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c])); }
    function inline(s) { return escapeHTML(s).replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\*(.*?)\*/g, '<em>$1</em>').replace(/`(.*?)`/g, '<code>$1</code>'); }
    function parse(markdown) {
      return markdown.split(/^\s*---\s*$/m).map(part => {
        const lines = part.trim().split('\n'); let title='', sub='', body=[], bullets=[], quote='', footer='';
        lines.forEach(raw => { const l=raw.trim(); if(!l) return; if(/^#\s+/.test(l) && !title) title=l.replace(/^#\s+/, ''); else if(/^##\s+/.test(l) && !sub) sub=l.replace(/^##\s+/, ''); else if(/^[-*+]\s+/.test(l)) bullets.push(l.replace(/^[-*+]\s+/, '')); else if(/^>\s?/.test(l)) quote=l.replace(/^>\s?/, ''); else if(/^[—–]/.test(l)) footer=l.replace(/^[—–]\s?/, ''); else body.push(l); });
        return {title:title || (sub ? sub : 'Untitled slide'), sub, body, bullets, quote, footer};
      }).filter(s => s.title || s.body.length || s.bullets.length || s.quote);
    }
    function visualFor(index, slide) { if (slide.bullets.length >= 3) return '<div class="visual bars" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i></div>'; if (index % 3 === 1) return '<div class="visual grid" aria-hidden="true"></div>'; return '<div class="visual orbit" aria-hidden="true"></div>'; }
    function render() {
      data = parse(input.value); if (!data.length) data=[{title:'Start with a thought',sub:'Your first slide is waiting',body:['Write markdown here — then separate slides with three dashes.'],bullets:[],quote:'',footer:''}];
      current = Math.min(current, data.length-1);
      slidesEl.innerHTML = data.map((s,i) => {
        const isVisual = data.length > 1 && i !== 0 && (s.bullets.length >= 3 || i % 3 !== 0); const tone = i === data.length-1 && data.length > 2 ? 'tone-clay' : (i % 5 === 3 ? 'light' : '');
        const kicker = i === 0 ? 'Strategy presentation' : `Northstar / ${String(i + 1).padStart(2, '0')}`;
        return `<article class="slide ${i===current?'active':''} ${isVisual?'visual-right':''} ${tone}" aria-hidden="${i===current?'false':'true'}"><div class="slide-kicker">${kicker}</div><div class="slide-content"><h2>${inline(s.title)}</h2>${s.sub?`<h3>${inline(s.sub)}</h3>`:''}${s.body.map(p=>`<p>${inline(p)}</p>`).join('')}${s.quote?`<quote>${inline(s.quote)}</quote>`:''}${s.bullets.length?`<ul>${s.bullets.map(b=>`<li>${inline(b)}</li>`).join('')}</ul>`:''}</div>${isVisual?visualFor(i,s):''}<div class="slide-meta"><span>${inline(s.footer || 'Markdown → Slides')}</span><span class="slide-number">${String(i+1).padStart(2,'0')} / ${String(data.length).padStart(2,'0')}</span></div></article>`;
      }).join('');
      countEl.textContent = `${String(data.length).padStart(2,'0')} slide${data.length === 1 ? '' : 's'}`;
      const words = (input.value.match(/\S+/g)||[]).length; wordEl.textContent = `${words} word${words===1?'':'s'}`; updateControls();
    }
    function updateControls(){ document.querySelectorAll('.slide').forEach((s,i)=>{s.classList.toggle('active',i===current);s.classList.remove('out-left');s.setAttribute('aria-hidden',i===current?'false':'true');}); posEl.textContent=`${String(current+1).padStart(2,'0')} / ${String(data.length).padStart(2,'0')}`; progress.style.width=`${((current+1)/data.length)*100}%`; prev.disabled=current===0; next.disabled=current===data.length-1; }
    function go(delta) { const target=Math.max(0,Math.min(data.length-1,current+delta)); if(target===current) return; const old=document.querySelectorAll('.slide')[current]; if(old && delta>0) old.classList.add('out-left'); current=target; updateControls(); }
    function showToast(message){ toast.textContent=message; toast.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>toast.classList.remove('show'),1800); }
    input.value = sample; render();
    input.addEventListener('input',()=>{render(); showToast('Preview updated');});
    prev.addEventListener('click',()=>go(-1)); next.addEventListener('click',()=>go(1));
    document.getElementById('sampleBtn').addEventListener('click',()=>{input.value=sample;current=0;render();showToast('Sample deck loaded');});
    document.getElementById('themeToggle').addEventListener('click',()=>{document.body.classList.toggle('light-deck');showToast(document.body.classList.contains('light-deck')?'Light deck theme':'Night deck theme');});
    function fullscreen(){ if(document.fullscreenElement) document.exitFullscreen(); else frame.requestFullscreen?.(); }
    document.getElementById('presentBtn').addEventListener('click',fullscreen);document.getElementById('frameFullscreen').addEventListener('click',fullscreen);
    document.addEventListener('keydown',e=>{if(e.target===input && !e.metaKey && !e.ctrlKey) return; if(['ArrowRight','PageDown',' '].includes(e.key)){e.preventDefault();go(1)} if(['ArrowLeft','PageUp'].includes(e.key)){e.preventDefault();go(-1)} if(e.key==='Home'){e.preventDefault();current=0;updateControls()} if(e.key==='End'){e.preventDefault();current=data.length-1;updateControls()} if(e.key.toLowerCase()==='f') fullscreen();});
    document.addEventListener('fullscreenchange',()=>{showToast(document.fullscreenElement?'Presentation mode · use ← → to navigate':'Exited presentation mode');});
  })();
  </script>
</body>
</html>
