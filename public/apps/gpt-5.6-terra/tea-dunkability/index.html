<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tea Dunkability Simulator</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root{--ink:#10151a;--ink2:#182027;--glass:rgba(255,255,255,.07);--line:rgba(255,255,255,.13);--cream:#f6ead1;--muted:#b8b2a8;--gold:#f0b35d;--hot:#f0714f;--tea:#a75128;--teal:#9ed4cb;--shadow:0 24px 70px rgba(0,0,0,.32)}

    body:before{content:"";position:fixed;inset:0;z-index:-3;background:radial-gradient(circle at 76% 12%,#3a2921 0,transparent 27%),radial-gradient(circle at 16% 85%,#162f32 0,transparent 32%),linear-gradient(140deg,#10151a 0%,#172027 54%,#171419 100%)}
    body:after{content:"";position:fixed;inset:0;z-index:-2;opacity:.26;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 220 220' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.26'/%3E%3C/svg%3E")}
    button,input{font:inherit}button{color:inherit;cursor:pointer}.app{max-width:1440px;margin:auto;padding:25px 32px 38px}.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;padding-bottom:26px}.brand{display:flex;align-items:center;gap:12px;letter-spacing:.12em;text-transform:uppercase;font-size:11px;font-weight:800}.seal{width:34px;height:34px;border:1px solid var(--gold);border-radius:50%;display:grid;place-items:center;color:var(--gold);font-size:20px;box-shadow:inset 0 0 0 4px rgba(240,179,93,.1)}.top-actions{display:flex;gap:10px}.icon-button{width:36px;height:36px;border:1px solid var(--line);background:var(--glass);border-radius:50%;display:grid;place-items:center;transition:.2s}.icon-button:hover{border-color:var(--gold);color:var(--gold);transform:translateY(-2px)}
    .hero{display:grid;grid-template-columns:minmax(320px,.8fr) minmax(480px,1.25fr) minmax(260px,.65fr);align-items:stretch;gap:18px;min-height:665px}.glass{border:1px solid var(--line);background:linear-gradient(135deg,rgba(255,255,255,.095),rgba(255,255,255,.035));backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);box-shadow:var(--shadow)}

    .settings{display:grid;gap:20px;margin-top:auto}.setting-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:9px}.setting-head label{font-size:13px;font-weight:700}.setting-head output{color:var(--gold);font-size:12px;font-weight:800;font-variant-numeric:tabular-nums}.range{appearance:none;width:100%;height:4px;border-radius:4px;background:linear-gradient(to right,var(--gold) 0%,var(--gold) var(--pos),rgba(255,255,255,.18) var(--pos),rgba(255,255,255,.18) 100%);outline:0}.range::-webkit-slider-thumb{appearance:none;width:17px;height:17px;border-radius:50%;background:var(--cream);border:3px solid var(--gold);box-shadow:0 2px 9px #0007}.range::-moz-range-thumb{width:12px;height:12px;border-radius:50%;background:var(--cream);border:3px solid var(--gold)}
    .biscuit-row{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}.biscuit{position:relative;isolation:isolate;min-height:58px;padding:8px 5px 6px;border:1px solid transparent;border-radius:12px;background:rgba(0,0,0,.1);font-size:10px;color:var(--muted);transition:.2s}.biscuit:before{content:"";display:block;margin:0 auto 5px;width:21px;height:21px;border-radius:5px;background:#d5a467;border:2px solid #80522f;box-shadow:inset 0 0 0 3px #d8af75}.biscuit:nth-child(2):before{border-radius:50%;background:#b98348;box-shadow:inset 0 0 0 3px #cd9f63}.biscuit:nth-child(3):before{border-radius:8px 8px 3px 3px;background:#e0c078;box-shadow:inset 0 0 0 3px #e8cf93}.biscuit.active{color:var(--cream);border-color:var(--gold);background:rgba(240,179,93,.12)}.biscuit.active:after{content:"";position:absolute;width:5px;height:5px;background:var(--gold);border-radius:50%;top:7px;right:7px}
    .stage{border-radius:28px;position:relative;overflow:hidden;min-height:665px;display:flex;align-items:center;justify-content:center;animation:reveal .8s .1s both}.stage:before{content:"";position:absolute;width:580px;height:580px;border-radius:50%;background:radial-gradient(circle,rgba(240,179,93,.11),transparent 65%);top:50%;left:50%;transform:translate(-50%,-50%)}.stage-grid{position:absolute;inset:0;opacity:.12;background-image:linear-gradient(rgba(255,255,255,.12) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.12) 1px,transparent 1px);background-size:52px 52px;mask-image:linear-gradient(transparent,black 20%,black 80%,transparent)}.stage-label{position:absolute;left:24px;top:23px;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);font-weight:700}.stage-label span{color:var(--teal);margin-left:7px}.steam{position:absolute;top:120px;left:50%;height:145px;width:120px;transform:translateX(-50%)}.steam i{position:absolute;bottom:0;border:2px solid rgba(220,239,235,.42);border-color:rgba(220,239,235,.46) transparent transparent transparent;border-radius:50%;width:44px;height:90px;animation:steam 3.4s ease-in-out infinite}.steam i:nth-child(1){left:7px;animation-delay:-.8s}.steam i:nth-child(2){left:44px;height:110px;animation-delay:-2s}.steam i:nth-child(3){left:76px;animation-delay:-.2s}
    .cup-scene{width:370px;height:425px;position:relative;z-index:2;transform:translateY(28px)}.saucer{position:absolute;width:306px;height:52px;border-radius:50%;left:32px;bottom:19px;background:radial-gradient(ellipse at 50% 35%,#f8eddb 0 38%,#c7b09b 40%,#76584a 49%,#281f20 63%,transparent 64%);filter:drop-shadow(0 22px 15px rgba(0,0,0,.5))}.cup{position:absolute;width:218px;height:177px;left:72px;bottom:48px;border-radius:18px 18px 88px 88px;background:linear-gradient(100deg,#b99e88,#fff3dc 28%,#e7d0b3 72%,#98755f);box-shadow:inset 10px -6px 18px #8d6c5778,0 8px 5px #0002}.cup:before{content:"";position:absolute;width:178px;height:38px;top:-16px;left:20px;border-radius:50%;background:radial-gradient(ellipse at center,#512415 0 43%,#7f3e26 47%,#f6e6ce 52%,#c1a28b 64%,transparent 65%);box-shadow:0 4px 8px #0003}.cup:after{content:"";position:absolute;width:62px;height:88px;right:-46px;top:34px;border:18px solid #c5a68f;border-left:12px solid #9d7e68;border-radius:0 55px 55px 0;z-index:-1}.tea-shine{position:absolute;bottom:63px;left:112px;width:60px;height:94px;border-radius:50%;background:linear-gradient(100deg,rgba(255,255,255,.32),transparent);transform:rotate(24deg)}
    .biscuit-dunk{position:absolute;width:74px;height:20px;top:105px;left:140px;background:#d2a164;border:3px solid #80502f;border-radius:4px;box-shadow:inset 0 0 0 4px #dcb576,0 5px 7px #0004;transform-origin:44px -125px;animation:dunk 3.5s cubic-bezier(.45,.08,.18,.94) infinite}.biscuit-dunk:after{content:"";position:absolute;inset:5px 9px;background:radial-gradient(circle,#815631 1.4px,transparent 1.8px);background-size:14px 10px}.biscuit-dunk.crumbling{animation:crumbleDunk 1s ease-in infinite}.drop-line{position:absolute;top:0;left:176px;height:120px;border-left:1px dashed rgba(246,234,209,.25)}.orbit{position:absolute;border:1px solid rgba(240,179,93,.18);border-radius:50%;width:420px;height:420px;left:-26px;top:-5px;animation:spin 20s linear infinite}.orbit:after{content:"✦";position:absolute;top:51px;left:40px;color:var(--gold);font-size:14px}.run-button{position:absolute;bottom:23px;right:25px;border:0;border-radius:50%;width:52px;height:52px;background:var(--gold);color:#26190f;font-size:20px;box-shadow:0 9px 20px #0005;transition:.2s}.run-button:hover{transform:scale(1.08)}.run-button.running{background:var(--hot);color:white}.crumbs{position:absolute;inset:0;pointer-events:none;z-index:4}.crumb{position:absolute;width:5px;height:5px;background:#dca665;border-radius:45% 55% 55% 45%;opacity:0;animation:fall .75s linear forwards}.current-read{position:absolute;right:24px;top:22px;text-align:right}.current-read b{display:block;font-size:10px;letter-spacing:.15em;color:var(--muted);text-transform:uppercase}.current-read strong{font-size:16px;color:var(--cream);font-weight:600}
    .readout{border-radius:24px;padding:24px;display:flex;flex-direction:column;animation:slideIn .8s .2s both}.score-label{display:flex;justify-content:space-between;align-items:center;color:var(--muted);font-size:10px;letter-spacing:.16em;text-transform:uppercase}.score-number{font-family:Georgia,serif;font-size:78px;letter-spacing:-.08em;line-height:.95;margin:17px 0 4px;color:var(--cream)}.verdict{font-size:15px;line-height:1.35;margin:0;color:var(--gold);font-weight:700}.meter{height:10px;border-radius:10px;background:rgba(0,0,0,.28);overflow:hidden;margin:25px 0 11px}.meter i{display:block;height:100%;border-radius:inherit;background:linear-gradient(90deg,var(--teal),var(--gold),var(--hot));width:0;transition:width .55s cubic-bezier(.22,.8,.22,1)}.meter-legend{display:flex;justify-content:space-between;font-size:10px;color:var(--muted)}.metrics{display:grid;gap:0;margin:29px 0 20px;border-top:1px solid var(--line)}.metric{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--line);font-size:12px}.metric span{color:var(--muted)}.metric b{font-variant-numeric:tabular-nums;font-size:13px}.chart-wrap{margin-top:auto}.chart-title{font-size:10px;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;margin-bottom:10px}.chart{height:116px;width:100%;overflow:visible}.chart .line{fill:none;stroke:var(--gold);stroke-width:3;stroke-linecap:round;stroke-linejoin:round;filter:drop-shadow(0 4px 3px rgba(240,179,93,.3))}.chart .area{fill:url(#area)}.chart .guide{stroke:rgba(255,255,255,.13);stroke-width:1}.chart .dot{fill:var(--cream);stroke:var(--gold);stroke-width:3}.axis{display:flex;justify-content:space-between;color:#8d8c87;font-size:9px;margin-top:-2px}.shortcut{display:flex;align-items:center;gap:7px;margin-top:22px;padding-top:18px;border-top:1px solid var(--line);font-size:10px;color:var(--muted)}kbd{font-family:inherit;color:var(--cream);padding:2px 5px;border:1px solid var(--line);border-bottom-color:rgba(255,255,255,.3);border-radius:4px;font-size:9px}
    .bottom{display:grid;grid-template-columns:1.3fr .9fr;gap:18px;margin-top:18px}.note,.tips{border-radius:19px;padding:17px 20px}.note{display:flex;align-items:center;gap:14px;font-size:13px;color:var(--muted)}.note b{color:var(--cream)}.note-icon{color:var(--gold);font-size:22px}.tips{display:flex;align-items:center;justify-content:space-between;gap:15px;font-size:12px;color:var(--muted)}.tips button{border:0;background:none;color:var(--gold);font-weight:800;font-size:12px;padding:3px}
    .modal-backdrop{position:fixed;inset:0;background:rgba(7,10,13,.68);backdrop-filter:blur(8px);z-index:10;display:grid;place-items:center;padding:20px}.modal{width:min(460px,100%);border-radius:24px;padding:28px;background:#1c252b;border:1px solid var(--line);box-shadow:var(--shadow)}.modal h2{font-family:Georgia,serif;font-size:34px;margin:0 0 12px;font-weight:500}.modal p{color:var(--muted);line-height:1.55;font-size:14px}.key-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:21px}.key-grid div{padding:9px 10px;border-radius:10px;background:rgba(255,255,255,.05);font-size:12px;color:var(--muted)}.key-grid kbd{margin-right:7px}.close{margin-top:24px;width:100%;padding:11px;border:0;border-radius:10px;background:var(--gold);color:#2c1b0f;font-weight:800}
    .light{--ink:#e5dccd;--ink2:#efe6d8;--glass:rgba(38,31,25,.055);--line:rgba(47,35,26,.18);--cream:#262019;--muted:#71675c;--gold:#a9611d;--hot:#bd5137;--tea:#8c351e;--teal:#2b766e}.light:before{background:radial-gradient(circle at 76% 12%,#efd2aa 0,transparent 27%),radial-gradient(circle at 16% 85%,#b9d4d1 0,transparent 32%),linear-gradient(140deg,#e8e0d4,#ddd4c7)}.light .glass{background:linear-gradient(135deg,rgba(255,255,255,.42),rgba(255,255,255,.18));box-shadow:0 24px 70px rgba(72,51,32,.14)}.light .stage-grid{opacity:.25}.light .icon-button{background:rgba(255,255,255,.28)}.light .cup{filter:saturate(.95)}
    @keyframes steam{0%,100%{opacity:0;transform:translate(0,12px) scale(.75)}30%{opacity:.75}70%{opacity:.16;transform:translate(9px,-64px) scale(1.13)}}@keyframes dunk{0%,17%{transform:rotate(-8deg) translateY(-18px)}45%,65%{transform:rotate(8deg) translateY(89px)}84%,100%{transform:rotate(-8deg) translateY(-18px)}}@keyframes crumbleDunk{0%,100%{filter:none}50%{filter:brightness(.85);width:60px}}@keyframes spin{to{transform:rotate(360deg)}}@keyframes fall{0%{opacity:1;transform:translate(0,0) rotate(0)}100%{opacity:0;transform:translate(var(--x),var(--y)) rotate(220deg)}}@keyframes slideIn{from{opacity:0;transform:translateX(-14px)}to{opacity:1;transform:none}}@keyframes reveal{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:none}}
    @media(max-width:1050px){.hero{grid-template-columns:1fr 1fr;min-height:0}.stage{grid-row:span 2}.readout{min-height:390px}.control-panel{min-height:390px}}@media(max-width:720px){.app{padding:18px}.topbar{padding-bottom:18px}.brand{font-size:9px}.hero{display:flex;flex-direction:column;gap:13px}.control-panel{min-height:auto}.title{font-size:50px}.settings{margin-top:8px}.stage{min-height:495px;order:-1}.cup-scene{transform:scale(.83) translateY(54px)}.steam{top:75px}.readout{min-height:0}.bottom{grid-template-columns:1fr;gap:13px}.tips{padding:14px}.current-read{display:none}.stage-label{left:18px}.run-button{right:18px}.key-grid{grid-template-columns:1fr}}
    @media(prefers-reduced-motion:reduce){*,*:before,*:after{animation-duration:.01ms!important;animation-iteration-count:1!important;scroll-behavior:auto!important}}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const {useState,useEffect,useMemo,useRef} = React;
    const BISCUITS = [
      {id:'digestive',name:'Digestive',base:82,sweet:'malted',ideal:3.8},
      {id:'hobnob',name:'Hobnob',base:91,sweet:'oaty',ideal:4.8},
      {id:'shortbread',name:'Shortbread',base:68,sweet:'buttery',ideal:2.7}
    ];
    const clamp=(x,a,b)=>Math.max(a,Math.min(b,x));
    function App(){
      const [temp,setTemp]=useState(82),[time,setTime]=useState(4.2),[biscuit,setBiscuit]=useState('hobnob'),[integrity,setIntegrity]=useState(74),[running,setRunning]=useState(true),[help,setHelp]=useState(false),[light,setLight]=useState(false),[crumbs,setCrumbs]=useState([]);
      const teaRef=useRef(null), timeRef=useRef(null), integrityRef=useRef(null);
      const b=BISCUITS.find(x=>x.id===biscuit);
      const calc=useMemo(()=>{const heat=Math.abs(temp-83)*.47;const timing=Math.abs(time-b.ideal)*10.5;const structure=(100-integrity)*.18;const score=clamp(Math.round(b.base-heat-timing-structure),8,99);const risk=clamp(Math.round(100-score+(time>b.ideal?9:0)),3,96);const absorb=clamp(Math.round(32+time*8+(temp-60)*.34),20,96);const crumb=Math.max(0,Math.round((time-b.ideal)*18+(100-integrity)*.42+(temp-82)*.55));const verdict=score>85?'Prime dunk window':score>68?'Satisfying, watch the edges':score>48?'Softening alarm':'Structural incident imminent';return {score,risk,absorb,crumb,verdict}},[temp,time,b,integrity]);
      const rangeStyle=v=>({'--pos':v+'%'});
      const makeCrumbs=()=>{if(calc.crumb<11)return; const next=Array.from({length:Math.min(22,Math.round(calc.crumb/3))},(_,i)=>({id:Date.now()+i,x:(Math.random()*145-70)+'px',y:(105+Math.random()*140)+'px',left:(50+Math.random()*15)+'%',top:(45+Math.random()*18)+'%',delay:(Math.random()*.25)+'s'}));setCrumbs(next);setTimeout(()=>setCrumbs([]),1200)};
      const run=()=>{setRunning(x=>!x);makeCrumbs()};
      useEffect(()=>{const onKey=e=>{if(e.target.tagName==='INPUT')return;const k=e.key.toLowerCase();if(k==='t'){teaRef.current.focus();e.preventDefault()}if(k==='d'){timeRef.current.focus();e.preventDefault()}if(k==='i'){integrityRef.current.focus();e.preventDefault()}if(k==='b'){let i=BISCUITS.findIndex(x=>x.id===biscuit);setBiscuit(BISCUITS[(i+1)%3].id)}if(k===' '){e.preventDefault();run()}if(k==='r'){setTemp(82);setTime(4.2);setBiscuit('hobnob');setIntegrity(74);setRunning(true)}if(k==='?'){setHelp(true)}};window.addEventListener('keydown',onKey);return()=>window.removeEventListener('keydown',onKey)},[biscuit,calc.crumb]);
      return <div className={'app '+(light?'light':'')}>
        <header className="topbar"><div className="brand"><div className="seal">♨</div><span>Brim &amp; Biscuit<br/>Dunkability Lab</span></div><div className="top-actions"><button className="icon-button" aria-label="Toggle color mode" onClick={()=>setLight(!light)}>{light?'☾':'☀'}</button><button className="icon-button" aria-label="Keyboard shortcuts" onClick={()=>setHelp(true)}>?</button></div></header>
        <main className="hero">
          <section className="control-panel glass" aria-labelledby="title"><p className="eyebrow">Experimental brew no. 17</p><h1 className="title" id="title">Find the <em>perfect</em> plunge.</h1><p className="subtitle">A tiny bit of tea science for the decisive biscuit enthusiast.</p>
            <div className="settings">
              <div><div className="setting-head"><label htmlFor="temp">Tea temperature</label><output>{temp}°C</output></div><input ref={teaRef} id="temp" className="range" style={rangeStyle((temp-55)/.4)} type="range" min="55" max="95" value={temp} onChange={e=>setTemp(+e.target.value)}/></div>
              <div><div className="setting-head"><label htmlFor="time">Dunk duration</label><output>{time.toFixed(1)} sec</output></div><input ref={timeRef} id="time" className="range" style={rangeStyle((time-.5)/.075)} type="range" min="0.5" max="8" step=".1" value={time} onChange={e=>setTime(+e.target.value)}/></div>
              <div><div className="setting-head"><label>Biscuit type</label><output>{b.sweet}</output></div><div className="biscuit-row" role="radiogroup" aria-label="Biscuit type">{BISCUITS.map(x=><button key={x.id} className={'biscuit '+(biscuit===x.id?'active':'')} onClick={()=>setBiscuit(x.id)} role="radio" aria-checked={biscuit===x.id}>{x.name}</button>)}</div></div>
              <div><div className="setting-head"><label htmlFor="integrity">Structural integrity</label><output>{integrity}%</output></div><input ref={integrityRef} id="integrity" className="range" style={rangeStyle((integrity-20)*1.25)} type="range" min="20" max="100" value={integrity} onChange={e=>setIntegrity(+e.target.value)}/></div>
            </div>
          </section>
          <section className="stage glass" aria-label="Animated teacup experiment"><div className="stage-grid"></div><div className="stage-label">Live immersion <span>●</span></div><div className="current-read"><b>Selected biscuit</b><strong>{b.name}</strong></div><div className="orbit"></div><div className="steam"><i></i><i></i><i></i></div><div className="cup-scene"><div className="drop-line"></div><div className={'biscuit-dunk '+(calc.crumb>18?'crumbling':'')} style={{animationPlayState:running?'running':'paused'}}></div><div className="cup"></div><div className="tea-shine"></div><div className="saucer"></div></div><div className="crumbs">{crumbs.map(c=><i className="crumb" key={c.id} style={{left:c.left,top:c.top,'--x':c.x,'--y':c.y,animationDelay:c.delay}}/> )}</div><button className={'run-button '+(running?'running':'')} aria-label={running?'Pause dunk':'Start dunk'} onClick={run}>{running?'Ⅱ':'▶'}</button></section>
          <aside className="readout glass" aria-label="Dunkability score"><div className="score-label"><span>Dunkability score</span><span>01 / 01</span></div><div className="score-number">{calc.score}</div><p className="verdict">{calc.verdict}</p><div className="meter"><i style={{width:calc.score+'%'}}></i></div><div className="meter-legend"><span>crumbly</span><span>golden</span><span>brave</span></div><div className="metrics"><div className="metric"><span>Absorption</span><b>{calc.absorb}%</b></div><div className="metric"><span>Crumble risk</span><b style={{color:calc.risk>50?'var(--hot)':'var(--teal)'}}>{calc.risk}%</b></div><div className="metric"><span>Safety margin</span><b>{Math.max(0,Math.round(b.ideal+1.5-time)).toFixed(1)} sec</b></div></div><div className="chart-wrap"><div className="chart-title">Crumble-o-meter <span style={{float:'right',color:calc.crumb>20?'var(--hot)':'var(--gold)'}}>{calc.crumb}%</span></div><svg className="chart" viewBox="0 0 260 116" preserveAspectRatio="none" role="img" aria-label="Crumble risk over dunk duration"><defs><linearGradient id="area" x1="0" x2="0" y1="0" y2="1"><stop stopColor="#f0b35d" stopOpacity=".32"/><stop offset="1" stopColor="#f0b35d" stopOpacity="0"/></linearGradient></defs><path className="guide" d="M0 85H260M0 52H260M0 20H260"/><path className="area" d={`M0,96 C35,95 53,91 76,85 S119,70 145,${90-calc.crumb*.5} S202,${65-calc.crumb*.68} 260,${Math.max(8,88-calc.crumb*.9)} L260,116 L0,116Z`}/><path className="line" d={`M0,96 C35,95 53,91 76,85 S119,70 145,${90-calc.crumb*.5} S202,${65-calc.crumb*.68} 260,${Math.max(8,88-calc.crumb*.9)}`}/><circle className="dot" cx={clamp(time/8*260,5,255)} cy={clamp(101-calc.crumb*.88,10,100)} r="5"/></svg><div className="axis"><span>0s</span><span>4s</span><span>8s</span></div></div><div className="shortcut"><kbd>space</kbd> pause / plunge <kbd>?</kbd> all shortcuts</div></aside>
        </main>
        <footer className="bottom"><div className="note glass"><span className="note-icon">✦</span><span><b>Lab note:</b> {time>b.ideal+1?'You have crossed the recommended dunk line. Expect fallout.':`The ${b.name} likes a confident, unhurried dip.`}</span></div><div className="tips glass"><span>Over-dunk it if you dare. The crumbs will tell.</span><button onClick={makeCrumbs}>Sprinkle crumbs ↗</button></div></footer>
        {help&&<div className="modal-backdrop" onMouseDown={()=>setHelp(false)}><section className="modal" role="dialog" aria-modal="true" aria-labelledby="help-title" onMouseDown={e=>e.stopPropagation()}><p className="eyebrow">Command deck</p><h2 id="help-title">Keyboard shortcuts</h2><p>Keep one hand on the biscuit, one hand on the controls.</p><div className="key-grid"><div><kbd>T</kbd> tea temperature</div><div><kbd>D</kbd> dunk duration</div><div><kbd>I</kbd> integrity</div><div><kbd>B</kbd> next biscuit</div><div><kbd>Space</kbd> pause / plunge</div><div><kbd>R</kbd> reset experiment</div></div><button className="close" autoFocus onClick={()=>setHelp(false)}>Back to the bench</button></section></div>}
      </div>
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
