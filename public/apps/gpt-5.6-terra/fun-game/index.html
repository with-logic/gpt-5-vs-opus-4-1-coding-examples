<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#f9b84b" />
  <title>Fun Game — Cloud Hop</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Fredoka:wght@500;600;700&display=swap');
    :root { --ink:#17324d; --cream:#fff9e9; --sun:#ffc654; --orange:#f47a47; --pink:#ec5f87; --mint:#68c99b; --sky:#69d9ef; --deep-sky:#31b8dc; --white:#fffdf5; }
    * { box-sizing:border-box; }
    html,body { min-height:100%; margin:0; }
    body { min-height:100vh; overflow:hidden; background:#2aaed1; color:var(--ink); font-family:"Baloo 2", ui-rounded, sans-serif; display:grid; place-items:center; }
    button { font:inherit; }
    .app { width:min(100%, 1040px); height:min(100vh, 760px); position:relative; display:flex; flex-direction:column; padding:20px 24px 18px; }
    .topbar { height:84px; display:flex; justify-content:space-between; align-items:center; position:relative; z-index:8; }
    .brand { display:flex; align-items:center; gap:11px; color:#fff9e9; text-shadow:0 3px 0 rgba(18,105,141,.28); }
    .logo-orb { width:42px; height:42px; border:3px solid #fff9e9; background:var(--sun); border-radius:50% 46% 52% 46%; display:grid; place-items:center; box-shadow:0 4px 0 rgba(24,95,128,.22); transform:rotate(-9deg); }
    .logo-orb:after { content:"✦"; font-size:23px; color:var(--orange); transform:rotate(9deg); }
    .brand small { display:block; font-family:Fredoka,sans-serif; color:#d8f8ff; font-size:11px; font-weight:600; letter-spacing:1.8px; line-height:1; }
    .brand strong { display:block; font-family:Fredoka,sans-serif; font-size:27px; letter-spacing:.2px; line-height:1.02; }
    .stat-rack { display:flex; gap:10px; }
    .stat { min-width:96px; height:53px; padding:6px 13px 5px; border:2px solid rgba(255,255,255,.7); border-radius:16px; background:rgba(255,253,245,.84); box-shadow:0 4px 0 rgba(22,109,142,.15); text-align:center; line-height:1; }
    .stat label { display:block; font-family:Fredoka,sans-serif; font-size:10px; letter-spacing:1.1px; color:#5d7582; }
    .stat b { display:block; margin-top:5px; color:var(--ink); font:700 23px/1 Fredoka,sans-serif; font-variant-numeric:tabular-nums; }
    .game-shell { flex:1; min-height:0; position:relative; overflow:hidden; border:4px solid var(--ink); border-radius:31px; background:linear-gradient(#69d9ef 0 58%, #bdf0dd 58% 100%); box-shadow:0 9px 0 rgba(16,82,110,.28), inset 0 0 0 3px rgba(255,255,255,.24); isolation:isolate; }
    .game-shell:before { content:""; position:absolute; inset:0; pointer-events:none; z-index:7; border-radius:27px; box-shadow:inset 0 -10px 26px rgba(8,101,124,.13); }
    .sun { position:absolute; width:124px; aspect-ratio:1; top:7%; right:11%; border-radius:50%; background:#ffe38c; box-shadow:0 0 0 10px rgba(255,238,171,.22); z-index:0; animation:float 4.5s ease-in-out infinite; }
    .sun:after { content:""; position:absolute; width:20px; height:10px; left:52px; top:59px; border-bottom:4px solid #ec9e5d; border-radius:50%; }
    .cloud { position:absolute; width:150px; height:31px; border-radius:40px; background:rgba(255,255,244,.91); z-index:1; animation:drift linear infinite; }
    .cloud:before,.cloud:after { content:""; position:absolute; bottom:0; border-radius:50%; background:inherit; }
    .cloud:before { width:62px; height:62px; left:22px; }.cloud:after { width:49px; height:49px; right:21px; }
    .cloud.one { top:17%; left:-11%; transform:scale(.55); animation-duration:24s; }.cloud.two { top:36%; left:38%; transform:scale(.36); opacity:.86; animation-duration:31s; animation-delay:-12s; }.cloud.three { top:9%; left:60%; transform:scale(.25); animation-duration:36s; animation-delay:-19s; }
    .hills { position:absolute; left:-10%; bottom:22.5%; width:120%; height:30%; z-index:1; background:#7ecfa3; border-radius:50% 50% 0 0 / 100% 100% 0 0; box-shadow: 190px 18px 0 2px #8eddac, 370px -8px 0 -16px #6bbd91, 590px 16px 0 -3px #8bddaa; animation:scroll 22s linear infinite; }
    .hills:before { content:""; position:absolute; width:100%; height:20%; bottom:-7%; background:repeating-linear-gradient(90deg, transparent 0 42px, rgba(37,142,103,.15) 43px 47px, transparent 48px 103px); }
    .ground { position:absolute; left:0; right:0; bottom:0; height:26%; background:#75c77a; z-index:3; }
    .ground:before { content:""; position:absolute; left:0; right:0; top:-15px; height:26px; background:radial-gradient(ellipse at 12px 3px, #fdf9c9 0 6px, transparent 7px) 0 0 / 31px 19px repeat-x; filter:drop-shadow(0 4px 0 #388958); }
    .ground:after { content:""; position:absolute; inset:15px 0 0; opacity:.62; background:repeating-linear-gradient(100deg, transparent 0 62px, rgba(20,111,66,.23) 63px 67px, transparent 68px 102px); animation:groundScroll .7s linear infinite; }
    .flowers { position:absolute; inset:0; z-index:4; pointer-events:none; opacity:.9; background:radial-gradient(circle, #ffe45a 0 3px, transparent 4px) 0 84%/86px 34px repeat-x; animation:groundScroll 1.2s linear infinite; }
    .player { --y:0px; position:absolute; z-index:5; left:16%; bottom:21.5%; width:76px; height:86px; transform:translateY(var(--y)); transform-origin:50% 88%; transition:filter .12s; }
    .player .shadow { position:absolute; width:60px; height:12px; left:9px; bottom:-2px; border-radius:50%; background:rgba(23,64,63,.18); transform:scaleX(calc(1 + var(--shadow, 0))); }
    .bunny { position:absolute; inset:5px 2px 4px; animation:idle .55s ease-in-out infinite alternate; }
    .ear { position:absolute; top:0; width:26px; height:48px; background:#fff5d9; border:3px solid var(--ink); border-radius:50% 50% 42% 42%; transform-origin:50% 95%; }
    .ear:after { content:""; position:absolute; inset:9px 7px; border-radius:50%; background:#f6a2af; }.ear.left { left:11px; transform:rotate(-19deg); }.ear.right { right:8px; transform:rotate(18deg); }
    .head { position:absolute; width:65px; height:56px; left:6px; top:31px; border:3px solid var(--ink); border-radius:48% 48% 46% 46%; background:#fff7df; box-shadow:inset -7px -5px 0 #f7dfb7; }
    .eye { position:absolute; top:22px; width:7px; height:10px; border-radius:50%; background:var(--ink); }.eye.left { left:19px; }.eye.right { right:17px; }
    .blush { position:absolute; top:34px; width:12px; height:6px; border-radius:50%; background:#f4999e; opacity:.7; }.blush.left { left:9px; }.blush.right { right:8px; }
    .nose { position:absolute; left:29px; top:32px; width:7px; height:5px; border-radius:50%; background:#e77887; }.mouth { position:absolute; top:35px; left:29px; width:8px; height:8px; border-bottom:2px solid var(--ink); border-radius:50%; }
    .body { position:absolute; width:51px; height:38px; left:14px; bottom:0; border:3px solid var(--ink); border-radius:52% 52% 38% 38%; background:var(--orange); box-shadow:inset -7px -5px 0 #d9633f; }.belly { position:absolute; width:25px; height:23px; left:10px; top:9px; border-radius:50%; background:#ffeab2; }.foot { position:absolute; bottom:-3px; width:22px; height:13px; border:3px solid var(--ink); border-radius:50%; background:#fff7df; }.foot.left { left:7px; }.foot.right { right:6px; }
    .obstacle { position:absolute; z-index:5; bottom:20.6%; width:52px; height:78px; animation:obWiggle .75s ease-in-out infinite alternate; }
    .rock { position:absolute; inset:15px 0 0; background:#ec5f87; border:3px solid var(--ink); border-radius:48% 52% 38% 43%; box-shadow:inset -7px -8px 0 #c8456d; }.rock:before,.rock:after { content:""; position:absolute; width:6px; height:7px; border-radius:50%; background:#fff0b3; top:17px; }.rock:before{left:13px}.rock:after{right:12px; top:32px}.leaf { position:absolute; width:24px; height:35px; background:#5ec28e; border:3px solid var(--ink); border-radius:70% 5% 70% 5%; top:0; left:15px; transform:rotate(-18deg); }.leaf:after { content:""; position:absolute; height:25px; border-left:2px solid #31845d; left:10px; top:4px; transform:rotate(31deg); }
    .dust { position:absolute; z-index:4; height:20px; width:20px; border-radius:50%; background:#fff4bc; opacity:0; }
    .banner { position:absolute; top:25px; left:50%; z-index:7; width:min(88%,500px); transform:translateX(-50%) translateY(-11px); text-align:center; pointer-events:none; }
    .banner h1 { margin:0; font:800 clamp(27px,5vw,48px)/.95 Fredoka,sans-serif; color:var(--ink); letter-spacing:-1.2px; text-shadow:0 3px 0 rgba(255,255,255,.6); }.banner p { margin:7px 0 0; font-size:15px; font-weight:700; color:#31576a; }.key { display:inline-block; padding:1px 8px 2px; margin:0 2px; border:2px solid #436c75; border-bottom-width:4px; border-radius:7px; background:#fff9df; font-size:12px; vertical-align:1px; }
    .tip { position:absolute; z-index:7; bottom:17px; left:50%; transform:translateX(-50%); color:#eaffeb; font-family:Fredoka,sans-serif; font-size:13px; letter-spacing:.3px; text-shadow:0 2px 0 rgba(23,87,60,.42); white-space:nowrap; transition:opacity .2s; }
    .sound-button { position:absolute; top:15px; right:15px; z-index:9; width:37px; height:37px; border:2px solid rgba(23,50,77,.65); border-radius:12px; background:#fff8dc; color:var(--ink); cursor:pointer; font-size:16px; box-shadow:0 3px 0 rgba(23,50,77,.28); }.sound-button:hover{transform:translateY(-1px)}.sound-button:active{transform:translateY(2px);box-shadow:none}
    .overlay { position:absolute; z-index:20; inset:0; display:grid; place-items:center; background:rgba(31,99,124,.34); backdrop-filter:blur(2px); opacity:0; pointer-events:none; transition:opacity .22s; }.overlay.show{opacity:1;pointer-events:auto}.game-over { width:min(390px, 86%); padding:28px 28px 24px; border:4px solid var(--ink); border-radius:26px; background:var(--cream); text-align:center; box-shadow:0 8px 0 rgba(23,50,77,.34); transform:translateY(10px) scale(.96); transition:transform .22s; }.overlay.show .game-over{transform:translateY(0) scale(1)}.game-over .mini{font:700 13px Fredoka,sans-serif;letter-spacing:1.5px;color:#d15572}.game-over h2{margin:5px 0 2px;font:800 38px/.95 Fredoka,sans-serif;color:var(--ink)}.game-over p{margin:7px 0 18px;font-size:17px;font-weight:700}.score-burst{display:flex;justify-content:center;gap:7px;margin-bottom:19px}.score-burst span{padding:7px 12px;border-radius:12px;background:#d9f3e1;font:700 15px Fredoka,sans-serif}.score-burst b{font-size:22px}.retry { border:3px solid var(--ink); border-bottom-width:6px; border-radius:15px; padding:11px 25px 9px; background:var(--orange); color:white; text-shadow:0 2px 0 rgba(125,50,31,.28); box-shadow:0 2px 0 #c05032; cursor:pointer; font:800 18px Fredoka,sans-serif; transition:transform .12s,filter .12s; }.retry:hover{filter:brightness(1.06);transform:translateY(-1px)}.retry:active{transform:translateY(3px);border-bottom-width:3px}.retry:focus-visible,.sound-button:focus-visible{outline:4px solid #fff;outline-offset:3px}
    .new-best { display:none; margin:7px auto 0; color:#c64a69; font:700 14px Fredoka,sans-serif; animation:pop .5s ease both; }.new-best.show{display:block}.screen-flash{position:absolute;inset:0;z-index:15;background:#fff3b0;opacity:0;pointer-events:none}.screen-flash.flash{animation:flash .24s ease-out}
    @keyframes drift { from{margin-left:0} to{margin-left:125%} } @keyframes scroll{from{background-position:0 0;transform:translateX(0)}to{background-position:0 0;transform:translateX(-180px)}} @keyframes groundScroll{from{background-position-x:0}to{background-position-x:-102px}} @keyframes idle{from{transform:translateY(0) rotate(-1deg)}to{transform:translateY(-3px) rotate(1deg)}} @keyframes obWiggle{to{transform:rotate(2deg)}} @keyframes float{50%{transform:translateY(-8px)}} @keyframes flash{20%{opacity:.75}100%{opacity:0}}@keyframes pop{0%{transform:scale(.4) rotate(-8deg)}80%{transform:scale(1.1) rotate(3deg)}100%{transform:scale(1)}}
    @media (max-width:640px){.app{padding:11px 10px 12px;height:100vh}.topbar{height:66px}.brand strong{font-size:22px}.brand small{font-size:9px}.logo-orb{width:34px;height:34px}.stat{min-width:65px;height:44px;padding:5px 8px}.stat b{font-size:19px}.stat label{font-size:8px}.stat-rack{gap:5px}.game-shell{border-radius:23px;border-width:3px}.banner{top:23px}.banner h1{font-size:27px}.banner p{font-size:12px;margin-top:6px}.tip{font-size:11px;bottom:11px}.player{left:12%;transform:translateY(var(--y)) scale(.88);transform-origin:50% 100%}.sun{width:83px}.cloud.one{top:25%}.hills{bottom:21.5%}.ground{height:25%}.obstacle{bottom:20.1%;transform:scale(.86);transform-origin:bottom}.sound-button{top:10px;right:10px}.game-over{padding:24px 18px 19px}.game-over h2{font-size:33px}}
    @media (prefers-reduced-motion:reduce){*,*:before,*:after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important}}
  </style>
</head>
<body>
  <main class="app" aria-label="Fun Game">
    <header class="topbar"><div class="brand"><span class="logo-orb"></span><span><small>THE SUNNY LITTLE</small><strong>Fun Game</strong></span></div><div class="stat-rack"><div class="stat"><label>SCORE</label><b id="score">000</b></div><div class="stat"><label>BEST</label><b id="best">000</b></div></div></header>
    <section class="game-shell" id="game" aria-label="Cloud Hop game. Press Space, the up arrow, or tap to jump.">
      <div class="sun"></div><div class="cloud one"></div><div class="cloud two"></div><div class="cloud three"></div><div class="hills"></div><div class="ground"></div><div class="flowers"></div>
      <button class="sound-button" id="sound" aria-label="Toggle sounds" title="Toggle sounds">♪</button>
      <div class="banner" id="banner"><h1>Cloud Hop!</h1><p>Press <span class="key">SPACE</span> or tap to leap over the sprout rocks.</p></div>
      <div class="player" id="player" aria-hidden="true"><div class="shadow"></div><div class="bunny"><span class="ear left"></span><span class="ear right"></span><div class="head"><i class="eye left"></i><i class="eye right"></i><i class="blush left"></i><i class="blush right"></i><i class="nose"></i><i class="mouth"></i></div><div class="body"><i class="belly"></i><i class="foot left"></i><i class="foot right"></i></div></div></div>
      <div class="tip" id="tip">Ready, set... hop!</div><div class="screen-flash" id="flash"></div>
      <div class="overlay" id="overlay"><div class="game-over"><div class="mini">SPLAT! THAT ROCK HAD PLANS.</div><h2>Nice hopping!</h2><p>You made it <strong id="finalScore">0</strong> cloud-meters.</p><div class="new-best" id="newBest">★ New personal best! ★</div><div class="score-burst"><span>BEST <b id="endBest">0</b></span></div><button class="retry" id="retry">Hop again ↻</button></div></div>
    </section>
  </main>
  <script>
    (() => {
      const game=document.getElementById('game'), player=document.getElementById('player'), scoreEl=document.getElementById('score'), bestEl=document.getElementById('best'), banner=document.getElementById('banner'), tip=document.getElementById('tip'), overlay=document.getElementById('overlay'), retry=document.getElementById('retry'), finalScore=document.getElementById('finalScore'), endBest=document.getElementById('endBest'), newBest=document.getElementById('newBest'), soundBtn=document.getElementById('sound'), flash=document.getElementById('flash');
      let best=+localStorage.getItem('cloudHopBest')||0, active=false, ended=false, score=0, last=0, speed=300, obstacle=null, obsX=0, jumping=false, y=0, vy=0, nextObstacle=0, muted=false, audio=null;
      bestEl.textContent=String(best).padStart(3,'0');
      function beep(type='sine', freq=440, duration=.08, gain=.05, slide=0){ if(muted)return; try{audio ||= new (window.AudioContext||window.webkitAudioContext)(); const now=audio.currentTime, o=audio.createOscillator(), g=audio.createGain();o.type=type;o.frequency.setValueAtTime(freq,now);if(slide)o.frequency.exponentialRampToValueAtTime(Math.max(30,freq+slide),now+duration);g.gain.setValueAtTime(gain,now);g.gain.exponentialRampToValueAtTime(.001,now+duration);o.connect(g).connect(audio.destination);o.start(now);o.stop(now+duration)}catch(e){} }
      function start(){ if(active)return; active=true; ended=false; score=0; speed=300; last=performance.now(); nextObstacle=700; banner.style.opacity='0'; tip.style.opacity='0'; overlay.classList.remove('show'); newBest.classList.remove('show'); if(obstacle){obstacle.remove();obstacle=null} beep('triangle',500,.08,.04,150); requestAnimationFrame(tick); }
      function jump(){ if(ended){start(); return} if(!active)start(); if(jumping)return; jumping=true; vy=680; player.style.filter='drop-shadow(0 3px 0 rgba(255,255,255,.35))'; beep('triangle',420,.095,.055,260); setTimeout(()=>player.style.filter='',100); }
      function spawn(){ obstacle=document.createElement('div'); obstacle.className='obstacle'; obstacle.innerHTML='<div class="leaf"></div><div class="rock"></div>'; game.appendChild(obstacle); obsX=game.clientWidth+45; obstacle.style.left=obsX+'px'; beep('sine',210,.035,.018,30); }
      function end(){ active=false; ended=true; const total=Math.floor(score); const wasBest=total>best; if(wasBest){best=total;localStorage.setItem('cloudHopBest',best);newBest.classList.add('show');beep('triangle',780,.13,.06,260);setTimeout(()=>beep('triangle',1040,.18,.055,180),120)} else {beep('sawtooth',160,.22,.05,-100)} flash.classList.remove('flash');void flash.offsetWidth;flash.classList.add('flash'); finalScore.textContent=total;endBest.textContent=best;bestEl.textContent=String(best).padStart(3,'0');overlay.classList.add('show'); }
      function tick(t){ if(!active)return; let dt=Math.min((t-last)/1000,.032);last=t; speed=Math.min(660,300+score*3.2);score+=dt*10;scoreEl.textContent=String(Math.floor(score)).padStart(3,'0');
        if(jumping){vy-=1750*dt;y+=vy*dt;if(y<=0){y=0;vy=0;jumping=false;beep('sine',170,.045,.02,60)}player.style.setProperty('--y',-y+'px');player.style.setProperty('--shadow',Math.min(.75,y/160));}
        if(!obstacle){nextObstacle-=dt*1000;if(nextObstacle<=0){spawn();nextObstacle=Math.max(750,1450-score*12)+Math.random()*490;}}
        else {obsX-=speed*dt;obstacle.style.left=obsX+'px';const px=game.clientWidth*.16; if(obsX<px+47&&obsX+42>px+10&&y<49){end();return} if(obsX<-70){obstacle.remove();obstacle=null;beep('sine',670,.045,.018,60)}} requestAnimationFrame(tick); }
      function input(e){ if(e.type==='keydown'&&!['Space','ArrowUp','KeyW'].includes(e.code))return;e.preventDefault();jump(); }
      document.addEventListener('keydown',input); game.addEventListener('pointerdown',e=>{if(e.target.closest('button'))return;jump()}); retry.addEventListener('click',()=>{start();jump()}); soundBtn.addEventListener('click',()=>{muted=!muted;soundBtn.textContent=muted?'×':'♪';soundBtn.setAttribute('aria-label',muted?'Turn sounds on':'Mute sounds');if(!muted)beep('sine',620,.08,.04,50)});
    })();
  </script>
</body>
</html>
