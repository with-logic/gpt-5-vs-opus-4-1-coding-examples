<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boingo! — Fun Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    font-family: 'Comic Sans MS', 'Chalkboard SE', 'Marker Felt', system-ui, sans-serif;
    background: #87CEEB;
    touch-action: manipulation;
  }
  #gameWrap {
    position: relative;
    width: 100vw; height: 100vh;
    overflow: hidden;
    background: linear-gradient(to bottom, #ffb6ff 0%, #ffd9a0 40%, #ffe9c4 70%, #cdeba0 100%);
    cursor: pointer;
  }
  canvas {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  .hud {
    position: absolute; top: 18px; left: 18px; right: 18px;
    display: flex; justify-content: space-between; align-items: flex-start;
    pointer-events: none; z-index: 5;
    font-weight: 900;
    text-shadow: 3px 3px 0 rgba(0,0,0,0.25);
  }
  .score-panel {
    background: rgba(255,255,255,0.8);
    padding: 10px 18px;
    border-radius: 16px;
    border: 3px solid #222;
    box-shadow: 0 4px 0 #222, 0 4px 12px rgba(0,0,0,0.15);
    color: #222;
    text-shadow: none;
  }
  .score-panel .lbl { font-size: 12px; color: #777; letter-spacing: 1px; }
  .score-panel .val { font-size: 28px; color: #ff5a5f; }
  .hi .val { color: #ffa93a; }
  .coins .val { color: #ffbe0b; }
  .mute-btn {
    pointer-events: auto;
    background: rgba(255,255,255,0.85);
    border: 3px solid #222;
    border-radius: 50%;
    width: 52px; height: 52px;
    font-size: 24px;
    cursor: pointer;
    box-shadow: 0 4px 0 #222;
    transition: transform 0.1s;
  }
  .mute-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #222; }
  .overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: radial-gradient(circle, rgba(0,0,0,0.1), rgba(0,0,0,0.5));
    z-index: 10;
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
    transition: opacity 0.3s;
  }
  .overlay.hidden { opacity: 0; pointer-events: none; }
  .title {
    font-size: clamp(48px, 10vw, 120px);
    font-weight: 900;
    color: #fff;
    text-shadow:
      4px 4px 0 #ff5a5f,
      8px 8px 0 #222,
      0 0 40px rgba(255,90,95,0.6);
    letter-spacing: 2px;
    animation: wobble 2s ease-in-out infinite;
    margin-bottom: 10px;
  }
  .subtitle {
    font-size: clamp(16px, 2.5vw, 22px);
    color: #fff;
    text-shadow: 2px 2px 0 #222;
    margin-bottom: 30px;
    text-align: center;
  }
  .btn {
    font-family: inherit;
    font-size: clamp(22px, 3.5vw, 32px);
    font-weight: 900;
    padding: 16px 40px;
    border-radius: 20px;
    border: 4px solid #222;
    background: linear-gradient(to bottom, #ffd93d, #ff9a3d);
    color: #222;
    cursor: pointer;
    box-shadow: 0 6px 0 #222, 0 10px 20px rgba(0,0,0,0.3);
    transition: transform 0.08s, box-shadow 0.08s;
    text-shadow: 1px 1px 0 rgba(255,255,255,0.4);
    letter-spacing: 1px;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 0 #222, 0 12px 24px rgba(0,0,0,0.3); }
  .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #222; }
  .game-over-stats {
    background: rgba(255,255,255,0.95);
    padding: 24px 40px;
    border-radius: 24px;
    border: 4px solid #222;
    margin-bottom: 24px;
    text-align: center;
    box-shadow: 0 8px 0 #222, 0 12px 30px rgba(0,0,0,0.3);
  }
  .game-over-stats .big-score {
    font-size: clamp(40px, 7vw, 72px);
    font-weight: 900;
    color: #ff5a5f;
    line-height: 1;
  }
  .game-over-stats .label {
    font-size: 14px; color: #777; letter-spacing: 2px; margin-bottom: 4px;
  }
  .game-over-stats .hi-score {
    font-size: clamp(18px, 2.5vw, 22px);
    color: #ffa93a;
    font-weight: 900;
    margin-top: 10px;
  }
  .new-hi {
    display: inline-block;
    background: #ffbe0b;
    color: #222;
    padding: 4px 12px;
    border-radius: 8px;
    margin-top: 8px;
    font-size: 18px;
    animation: pulse 0.6s ease-in-out infinite alternate;
  }
  .hint {
    color: #fff;
    text-shadow: 2px 2px 0 #222;
    font-size: clamp(14px, 2vw, 18px);
    margin-top: 20px;
    opacity: 0.9;
    animation: pulse 1.2s ease-in-out infinite alternate;
  }
  @keyframes wobble {
    0%, 100% { transform: rotate(-2deg) scale(1); }
    50% { transform: rotate(2deg) scale(1.03); }
  }
  @keyframes pulse {
    from { transform: scale(1); }
    to { transform: scale(1.08); }
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  .character-preview {
    font-size: 80px;
    animation: float 1.5s ease-in-out infinite;
    margin-bottom: 10px;
    filter: drop-shadow(4px 6px 0 rgba(0,0,0,0.2));
  }
</style>
</head>
<body>
<div id="gameWrap">
  <canvas id="game"></canvas>

  <div class="hud">
    <div class="score-panel">
      <div class="lbl">SCORE</div>
      <div class="val" id="scoreVal">0</div>
    </div>
    <div style="display:flex; gap:12px;">
      <div class="score-panel coins">
        <div class="lbl">COINS</div>
        <div class="val" id="coinVal">0</div>
      </div>
      <div class="score-panel hi">
        <div class="lbl">BEST</div>
        <div class="val" id="hiVal">0</div>
      </div>
      <button class="mute-btn" id="muteBtn" title="Toggle sound">🔊</button>
    </div>
  </div>

  <div class="overlay" id="startOverlay">
    <div class="character-preview">🐸</div>
    <div class="title">BOINGO!</div>
    <div class="subtitle">Jump over obstacles. Survive as long as you can!</div>
    <button class="btn" id="startBtn">▶ START GAME</button>
    <div class="hint">TAP, CLICK, or press SPACE to jump</div>
  </div>

  <div class="overlay hidden" id="gameOverOverlay">
    <div class="character-preview">💥</div>
    <div class="game-over-stats">
      <div class="label">GAME OVER</div>
      <div class="big-score" id="finalScore">0</div>
      <div class="hi-score">🏆 Best: <span id="finalHi">0</span></div>
      <div id="newHiBadge" class="new-hi" style="display:none">⭐ NEW RECORD! ⭐</div>
    </div>
    <button class="btn" id="retryBtn">🔄 RETRY</button>
    <div class="hint">TAP, CLICK, or press SPACE</div>
  </div>
</div>

<script>
(() => {
  'use strict';

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const wrap = document.getElementById('gameWrap');
  const scoreVal = document.getElementById('scoreVal');
  const coinVal = document.getElementById('coinVal');
  const hiVal = document.getElementById('hiVal');
  const startOverlay = document.getElementById('startOverlay');
  const gameOverOverlay = document.getElementById('gameOverOverlay');
  const startBtn = document.getElementById('startBtn');
  const retryBtn = document.getElementById('retryBtn');
  const finalScore = document.getElementById('finalScore');
  const finalHi = document.getElementById('finalHi');
  const newHiBadge = document.getElementById('newHiBadge');
  const muteBtn = document.getElementById('muteBtn');

  // ====== Responsive Canvas ======
  let W = 0, H = 0, DPR = Math.min(window.devicePixelRatio || 1, 2);
  function resize() {
    W = wrap.clientWidth;
    H = wrap.clientHeight;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  // ====== Sound Engine (Web Audio API) ======
  let audioCtx = null;
  let muted = false;
  function initAudio() {
    if (!audioCtx) {
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      } catch (e) {}
    }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  }
  function beep(freq, dur, type = 'square', vol = 0.15, slide = 0) {
    if (muted || !audioCtx) return;
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t);
    if (slide) osc.frequency.exponentialRampToValueAtTime(Math.max(40, freq + slide), t + dur);
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(vol, t + 0.005);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + dur + 0.05);
  }
  function sndJump() {
    beep(280, 0.12, 'square', 0.14, 300);
    beep(560, 0.1, 'sine', 0.08, 200);
  }
  function sndDoubleJump() {
    beep(420, 0.1, 'square', 0.12, 400);
    beep(700, 0.1, 'triangle', 0.1, 300);
  }
  function sndLand() {
    beep(90, 0.08, 'sawtooth', 0.1, -30);
  }
  function sndCoin() {
    beep(880, 0.07, 'square', 0.12);
    setTimeout(() => beep(1320, 0.12, 'square', 0.12), 60);
  }
  function sndCrash() {
    for (let i = 0; i < 4; i++) {
      setTimeout(() => beep(200 - i * 30, 0.15, 'sawtooth', 0.2, -100), i * 40);
    }
  }
  function sndMilestone() {
    const notes = [523, 659, 784, 1047];
    notes.forEach((n, i) => setTimeout(() => beep(n, 0.15, 'triangle', 0.12), i * 80));
  }
  function sndStart() {
    beep(440, 0.1, 'triangle', 0.12);
    setTimeout(() => beep(660, 0.15, 'triangle', 0.12), 90);
  }

  muteBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    muted = !muted;
    muteBtn.textContent = muted ? '🔇' : '🔊';
  });

  // ====== Game State ======
  const STATE = { MENU: 0, PLAYING: 1, GAMEOVER: 2 };
  let state = STATE.MENU;
  let score = 0, coins = 0, hiScore = 0, distance = 0;
  let speed = 0, baseSpeed = 6;
  let groundY = 0;
  let gameTime = 0;
  let shake = 0;
  let lastMilestone = 0;

  try { hiScore = parseInt(localStorage.getItem('boingoHi') || '0'); } catch(e) {}
  hiVal.textContent = hiScore;

  // ====== Player ======
  const player = {
    x: 0, y: 0, vx: 0, vy: 0,
    w: 56, h: 64,
    onGround: true,
    jumps: 0, maxJumps: 2,
    rot: 0, rotVel: 0,
    squash: 1, stretch: 1,
    blink: 0, blinkTimer: 0,
    legPhase: 0,
    trail: [],
    dead: false,
  };

  // ====== Entities ======
  let obstacles = [];
  let collectibles = [];
  let particles = [];
  let clouds = [];
  let mountains = [];
  let hills = [];
  let trees = [];
  let grassTufts = [];
  let birds = [];
  let popups = [];

  function initBackground() {
    clouds = [];
    for (let i = 0; i < 8; i++) {
      clouds.push({
        x: Math.random() * W * 2,
        y: 40 + Math.random() * (H * 0.35),
        scale: 0.5 + Math.random() * 1.2,
        speed: 0.2 + Math.random() * 0.3,
      });
    }
    mountains = [];
    for (let i = 0; i < 6; i++) {
      mountains.push({
        x: i * 280 + Math.random() * 100,
        h: 140 + Math.random() * 80,
        w: 240 + Math.random() * 120,
      });
    }
    hills = [];
    for (let i = 0; i < 8; i++) {
      hills.push({
        x: i * 220 + Math.random() * 50,
        h: 70 + Math.random() * 50,
        w: 200 + Math.random() * 100,
      });
    }
    trees = [];
    for (let i = 0; i < 10; i++) {
      trees.push({
        x: Math.random() * W * 2,
        scale: 0.7 + Math.random() * 0.6,
        kind: Math.floor(Math.random() * 3),
      });
    }
    grassTufts = [];
    for (let i = 0; i < 30; i++) {
      grassTufts.push({ x: Math.random() * W * 2, c: ['#4caf50', '#66bb6a', '#81c784'][i%3] });
    }
    birds = [];
  }

  // ====== Obstacles ======
  const OBSTACLE_TYPES = [
    { kind: 'cactus', w: 30, h: 60 },
    { kind: 'cactus-big', w: 44, h: 90 },
    { kind: 'cactus-double', w: 64, h: 64 },
    { kind: 'rock', w: 50, h: 34 },
    { kind: 'bird', w: 52, h: 36, flying: true },
    { kind: 'spikes', w: 80, h: 28 },
  ];

  function spawnObstacle() {
    const availableTypes = speed < 8 ? OBSTACLE_TYPES.slice(0, 4) : OBSTACLE_TYPES;
    const type = availableTypes[Math.floor(Math.random() * availableTypes.length)];
    const o = {
      kind: type.kind,
      x: W + 40,
      w: type.w,
      h: type.h,
      flying: !!type.flying,
      y: 0,
      phase: Math.random() * Math.PI * 2,
    };
    if (o.flying) {
      o.y = groundY - 120 - Math.random() * 60;
    } else {
      o.y = groundY - o.h;
    }
    obstacles.push(o);
  }

  function spawnCollectible() {
    const count = 1 + Math.floor(Math.random() * 4);
    const baseY = groundY - 90 - Math.random() * 80;
    for (let i = 0; i < count; i++) {
      collectibles.push({
        x: W + 40 + i * 36,
        y: baseY + Math.sin(i * 0.8) * 20,
        r: 12,
        phase: Math.random() * Math.PI * 2,
        collected: false,
      });
    }
  }

  // ====== Particles ======
  function spawnParticle(x, y, opts = {}) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * (opts.spread || 4),
      vy: opts.vy !== undefined ? opts.vy : -Math.random() * 3 - 1,
      life: opts.life || 0.6,
      age: 0,
      size: opts.size || (2 + Math.random() * 3),
      color: opts.color || '#fff',
      gravity: opts.gravity !== undefined ? opts.gravity : 0.15,
      shape: opts.shape || 'circle',
      rot: Math.random() * Math.PI * 2,
      rotVel: (Math.random() - 0.5) * 0.3,
    });
  }

  function burst(x, y, color, count = 12, big = false) {
    for (let i = 0; i < count; i++) {
      const ang = (Math.PI * 2 * i) / count + Math.random() * 0.4;
      const spd = (big ? 4 : 2) + Math.random() * 3;
      particles.push({
        x, y,
        vx: Math.cos(ang) * spd,
        vy: Math.sin(ang) * spd - 1,
        life: 0.8 + Math.random() * 0.5,
        age: 0,
        size: (big ? 4 : 2) + Math.random() * 3,
        color,
        gravity: 0.15,
        shape: Math.random() < 0.5 ? 'circle' : 'square',
        rot: Math.random() * Math.PI * 2,
        rotVel: (Math.random() - 0.5) * 0.4,
      });
    }
  }

  function addPopup(x, y, text, color) {
    popups.push({ x, y, text, color, age: 0, life: 1.0 });
  }

  // ====== Input ======
  function tryJump() {
    if (state === STATE.MENU) { startGame(); return; }
    if (state === STATE.GAMEOVER) { startGame(); return; }
    if (!player.dead && player.jumps < player.maxJumps) {
      player.vy = -14.5;
      if (player.jumps === 0) {
        sndJump();
        player.rotVel = -0.15;
      } else {
        sndDoubleJump();
        player.rotVel = -0.3;
        // double jump particles
        for (let i = 0; i < 8; i++) {
          spawnParticle(player.x + player.w/2, player.y + player.h,
            { color: '#fff', vy: 1 + Math.random() * 2, spread: 6, life: 0.4, size: 3 });
        }
      }
      player.jumps++;
      player.onGround = false;
      player.squash = 0.7;
      player.stretch = 1.3;
    }
  }

  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
      e.preventDefault();
      initAudio();
      tryJump();
    }
  });
  wrap.addEventListener('mousedown', (e) => {
    if (e.target === muteBtn) return;
    initAudio();
    tryJump();
  });
  wrap.addEventListener('touchstart', (e) => {
    if (e.target === muteBtn) return;
    e.preventDefault();
    initAudio();
    tryJump();
  }, { passive: false });

  startBtn.addEventListener('click', (e) => { e.stopPropagation(); initAudio(); startGame(); });
  retryBtn.addEventListener('click', (e) => { e.stopPropagation(); initAudio(); startGame(); });

  // ====== Game Start/Reset ======
  function startGame() {
    groundY = H - 80;
    player.x = W * 0.2;
    player.y = groundY - player.h;
    player.vx = 0;
    player.vy = 0;
    player.jumps = 0;
    player.onGround = true;
    player.rot = 0;
    player.rotVel = 0;
    player.squash = 1;
    player.stretch = 1;
    player.trail = [];
    player.dead = false;
    player.legPhase = 0;

    score = 0;
    coins = 0;
    distance = 0;
    speed = baseSpeed;
    gameTime = 0;
    shake = 0;
    lastMilestone = 0;

    obstacles = [];
    collectibles = [];
    particles = [];
    popups = [];
    birds = [];

    initBackground();

    state = STATE.PLAYING;
    startOverlay.classList.add('hidden');
    gameOverOverlay.classList.add('hidden');
    sndStart();
    updateHUD();
  }

  function gameOver() {
    if (state !== STATE.PLAYING) return;
    state = STATE.GAMEOVER;
    player.dead = true;
    sndCrash();
    shake = 24;
    burst(player.x + player.w/2, player.y + player.h/2, '#ff5a5f', 30, true);
    burst(player.x + player.w/2, player.y + player.h/2, '#ffd93d', 20, true);
    burst(player.x + player.w/2, player.y + player.h/2, '#fff', 15, true);

    const isNewHi = score > hiScore;
    if (isNewHi) {
      hiScore = Math.floor(score);
      try { localStorage.setItem('boingoHi', String(hiScore)); } catch(e) {}
    }
    finalScore.textContent = Math.floor(score);
    finalHi.textContent = hiScore;
    newHiBadge.style.display = isNewHi ? 'inline-block' : 'none';
    hiVal.textContent = hiScore;

    setTimeout(() => {
      gameOverOverlay.classList.remove('hidden');
    }, 900);
  }

  function updateHUD() {
    scoreVal.textContent = Math.floor(score);
    coinVal.textContent = coins;
    hiVal.textContent = hiScore;
  }

  // ====== Physics/Update ======
  let spawnTimer = 0;
  let coinTimer = 120;
  let birdTimer = 400;

  function update(dt) {
    if (state !== STATE.PLAYING) return;

    gameTime += dt;
    speed = baseSpeed + Math.min(14, gameTime * 0.25);
    distance += speed;
    score = distance / 10;

    // Milestones
    const milestone = Math.floor(score / 100);
    if (milestone > lastMilestone) {
      lastMilestone = milestone;
      sndMilestone();
      addPopup(W/2, H/3, milestone * 100 + '!', '#ffbe0b');
    }

    // Player physics
    player.vy += 0.7;
    if (player.vy > 20) player.vy = 20;
    player.y += player.vy;

    if (player.y + player.h >= groundY) {
      if (!player.onGround && !player.dead) {
        sndLand();
        // dust puff
        for (let i = 0; i < 6; i++) {
          spawnParticle(player.x + player.w/2 + (Math.random() - 0.5) * 20, groundY,
            { color: '#d4a373', vy: -Math.random() * 2, spread: 4, life: 0.4, gravity: 0.05, size: 4 });
        }
        player.squash = 1.3;
        player.stretch = 0.7;
      }
      player.y = groundY - player.h;
      player.vy = 0;
      player.onGround = true;
      player.jumps = 0;
      player.rot = 0;
      player.rotVel = 0;
    } else {
      player.onGround = false;
      player.rot += player.rotVel;
    }

    // Squash/stretch easing
    player.squash += (1 - player.squash) * 0.18;
    player.stretch += (1 - player.stretch) * 0.18;

    // Legs / blink
    player.legPhase += 0.3;
    player.blinkTimer -= dt;
    if (player.blinkTimer <= 0) {
      player.blink = 0.15;
      player.blinkTimer = 2 + Math.random() * 3;
    }
    player.blink = Math.max(0, player.blink - dt);

    // Trail
    if (!player.onGround) {
      player.trail.push({ x: player.x + player.w/2, y: player.y + player.h/2, age: 0 });
    }
    player.trail.forEach(t => t.age += dt);
    player.trail = player.trail.filter(t => t.age < 0.3);
    while (player.trail.length > 14) player.trail.shift();

    // Spawn obstacles
    spawnTimer -= speed;
    if (spawnTimer <= 0) {
      spawnObstacle();
      const minGap = 260 - Math.min(80, gameTime * 1.5);
      const maxGap = 480 - Math.min(100, gameTime * 1.5);
      spawnTimer = minGap + Math.random() * (maxGap - minGap);
    }

    // Spawn coins occasionally
    coinTimer -= speed;
    if (coinTimer <= 0) {
      spawnCollectible();
      coinTimer = 600 + Math.random() * 600;
    }

    // Background birds
    birdTimer -= speed;
    if (birdTimer <= 0) {
      birds.push({
        x: W + 40,
        y: 60 + Math.random() * (H * 0.3),
        phase: Math.random() * Math.PI * 2,
        speed: speed * 0.3 + Math.random() * 1,
      });
      birdTimer = 1200 + Math.random() * 1500;
    }

    // Move obstacles
    for (let o of obstacles) {
      o.x -= speed;
      o.phase += 0.15;
      if (o.flying) o.y += Math.sin(o.phase) * 0.5;
    }
    obstacles = obstacles.filter(o => o.x + o.w > -40);

    // Move collectibles
    for (let c of collectibles) {
      c.x -= speed;
      c.phase += 0.15;
    }
    collectibles = collectibles.filter(c => c.x + c.r > -40 && !c.collected);

    // Move background
    for (let cloud of clouds) {
      cloud.x -= cloud.speed + speed * 0.05;
      if (cloud.x < -100) { cloud.x = W + Math.random() * 100; cloud.y = 40 + Math.random() * (H * 0.35); }
    }
    for (let m of mountains) {
      m.x -= speed * 0.1;
      if (m.x + m.w < -20) m.x = W + Math.random() * 100;
    }
    for (let h of hills) {
      h.x -= speed * 0.3;
      if (h.x + h.w < -20) h.x = W + Math.random() * 80;
    }
    for (let t of trees) {
      t.x -= speed * 0.5;
      if (t.x < -60) { t.x = W + Math.random() * 200; t.scale = 0.7 + Math.random() * 0.6; t.kind = Math.floor(Math.random() * 3); }
    }
    for (let g of grassTufts) {
      g.x -= speed * 0.9;
      if (g.x < -10) g.x = W + Math.random() * 100;
    }
    for (let b of birds) {
      b.x -= b.speed;
      b.phase += 0.2;
      b.y += Math.sin(b.phase) * 0.3;
    }
    birds = birds.filter(b => b.x > -40);

    // Collision detection
    const px = player.x + 8, py = player.y + 8, pw = player.w - 16, ph = player.h - 16;
    for (let o of obstacles) {
      const ox = o.x + 4, oy = o.y + 4, ow = o.w - 8, oh = o.h - 8;
      if (px < ox + ow && px + pw > ox && py < oy + oh && py + ph > oy) {
        gameOver();
        return;
      }
    }
    for (let c of collectibles) {
      if (c.collected) continue;
      const dx = (player.x + player.w/2) - c.x;
      const dy = (player.y + player.h/2) - c.y;
      if (dx*dx + dy*dy < (c.r + 24) * (c.r + 24)) {
        c.collected = true;
        coins++;
        score += 5;
        sndCoin();
        burst(c.x, c.y, '#ffd700', 10);
        burst(c.x, c.y, '#fff', 6);
        addPopup(c.x, c.y - 20, '+5', '#ffd700');
      }
    }

    // Particles
    for (let p of particles) {
      p.age += dt;
      p.x += p.vx;
      p.y += p.vy;
      p.vy += p.gravity;
      p.rot += p.rotVel;
    }
    particles = particles.filter(p => p.age < p.life);

    // Popups
    for (let pu of popups) {
      pu.age += dt;
      pu.y -= 0.8;
    }
    popups = popups.filter(pu => pu.age < pu.life);

    // Shake decay
    if (shake > 0) shake *= 0.88;

    updateHUD();
  }

  // ====== Rendering ======
  function drawSky() {
    // Dynamic sky gradient based on game time
    const dayPhase = (gameTime % 60) / 60;
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, '#ffb6ff');
    g.addColorStop(0.35, '#ffd9a0');
    g.addColorStop(0.7, '#ffe9c4');
    g.addColorStop(1, '#cdeba0');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);

    // Sun
    const sunX = W * 0.75;
    const sunY = H * 0.2;
    ctx.save();
    ctx.globalAlpha = 0.6;
    const sunG = ctx.createRadialGradient(sunX, sunY, 20, sunX, sunY, 120);
    sunG.addColorStop(0, '#fff4a3');
    sunG.addColorStop(1, 'rgba(255,244,163,0)');
    ctx.fillStyle = sunG;
    ctx.fillRect(sunX - 120, sunY - 120, 240, 240);
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#fff8c6';
    ctx.beginPath();
    ctx.arc(sunX, sunY, 40, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ffeb3b';
    ctx.beginPath();
    ctx.arc(sunX, sunY, 32, 0, Math.PI * 2);
    ctx.fill();
    // Sun face
    ctx.fillStyle = '#222';
    ctx.beginPath(); ctx.arc(sunX - 10, sunY - 4, 3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(sunX + 10, sunY - 4, 3, 0, Math.PI * 2); ctx.fill();
    // Smile
    ctx.strokeStyle = '#222'; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.arc(sunX, sunY + 4, 10, 0.1 * Math.PI, 0.9 * Math.PI); ctx.stroke();
    // Cheeks
    ctx.fillStyle = 'rgba(255,150,150,0.6)';
    ctx.beginPath(); ctx.arc(sunX - 16, sunY + 6, 3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(sunX + 16, sunY + 6, 3, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  function drawCloud(x, y, scale) {
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(scale, scale);
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.beginPath();
    ctx.arc(0, 0, 22, 0, Math.PI * 2);
    ctx.arc(22, -6, 26, 0, Math.PI * 2);
    ctx.arc(48, 0, 22, 0, Math.PI * 2);
    ctx.arc(32, 8, 20, 0, Math.PI * 2);
    ctx.arc(10, 8, 18, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawClouds() {
    for (let c of clouds) drawCloud(c.x, c.y, c.scale);
  }

  function drawMountains() {
    for (let m of mountains) {
      const baseY = groundY - 20;
      // Back mountain
      ctx.fillStyle = '#9b7cb9';
      ctx.beginPath();
      ctx.moveTo(m.x, baseY);
      ctx.lineTo(m.x + m.w / 2, baseY - m.h);
      ctx.lineTo(m.x + m.w, baseY);
      ctx.closePath();
      ctx.fill();
      // Snow cap
      ctx.fillStyle = '#fff';
      const peakX = m.x + m.w / 2;
      const peakY = baseY - m.h;
      ctx.beginPath();
      ctx.moveTo(peakX - 18, peakY + 26);
      ctx.lineTo(peakX, peakY);
      ctx.lineTo(peakX + 18, peakY + 26);
      ctx.quadraticCurveTo(peakX + 10, peakY + 22, peakX, peakY + 28);
      ctx.quadraticCurveTo(peakX - 10, peakY + 22, peakX - 18, peakY + 26);
      ctx.closePath();
      ctx.fill();
    }
  }

  function drawHills() {
    for (let h of hills) {
      const baseY = groundY;
      ctx.fillStyle = '#6bbf59';
      ctx.beginPath();
      ctx.moveTo(h.x, baseY);
      ctx.quadraticCurveTo(h.x + h.w / 2, baseY - h.h, h.x + h.w, baseY);
      ctx.closePath();
      ctx.fill();
      // Highlight
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.beginPath();
      ctx.ellipse(h.x + h.w * 0.4, baseY - h.h * 0.6, h.w * 0.25, h.h * 0.3, -0.3, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawTree(x, baseY, scale, kind) {
    ctx.save();
    ctx.translate(x, baseY);
    ctx.scale(scale, scale);
    // Trunk
    ctx.fillStyle = '#8b5a2b';
    ctx.fillRect(-6, -40, 12, 40);
    ctx.strokeStyle = '#5d3a1a';
    ctx.lineWidth = 1;
    ctx.strokeRect(-6, -40, 12, 40);
    if (kind === 0) {
      // Round tree
      ctx.fillStyle = '#4caf50';
      ctx.beginPath(); ctx.arc(0, -55, 28, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#66bb6a';
      ctx.beginPath(); ctx.arc(-8, -62, 14, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = 'rgba(0,0,0,0.1)';
      ctx.beginPath(); ctx.arc(10, -48, 10, 0, Math.PI * 2); ctx.fill();
    } else if (kind === 1) {
      // Pine
      ctx.fillStyle = '#2e7d32';
      ctx.beginPath();
      ctx.moveTo(-22, -30); ctx.lineTo(0, -80); ctx.lineTo(22, -30); ctx.closePath(); ctx.fill();
      ctx.beginPath();
      ctx.moveTo(-26, -50); ctx.lineTo(0, -95); ctx.lineTo(26, -50); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#43a047';
      ctx.beginPath();
      ctx.moveTo(-18, -70); ctx.lineTo(0, -110); ctx.lineTo(18, -70); ctx.closePath(); ctx.fill();
    } else {
      // Bushy tree with fruit
      ctx.fillStyle = '#558b2f';
      ctx.beginPath(); ctx.arc(-14, -50, 22, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(14, -50, 22, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(0, -65, 24, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#ff5a5f';
      ctx.beginPath(); ctx.arc(-10, -45, 3, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(12, -55, 3, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(4, -70, 3, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();
  }

  function drawTrees() {
    for (let t of trees) drawTree(t.x, groundY, t.scale, t.kind);
  }

  function drawGround() {
    // Main ground
    const g = ctx.createLinearGradient(0, groundY, 0, H);
    g.addColorStop(0, '#6bbf59');
    g.addColorStop(0.15, '#5ba84a');
    g.addColorStop(0.4, '#c9986a');
    g.addColorStop(1, '#8b5a2b');
    ctx.fillStyle = g;
    ctx.fillRect(0, groundY, W, H - groundY);

    // Grass top highlight
    ctx.fillStyle = '#7fd071';
    ctx.fillRect(0, groundY, W, 6);

    // Grass tufts
    for (let gt of grassTufts) {
      ctx.fillStyle = gt.c;
      ctx.beginPath();
      ctx.moveTo(gt.x - 3, groundY);
      ctx.lineTo(gt.x, groundY - 8);
      ctx.lineTo(gt.x + 3, groundY);
      ctx.closePath();
      ctx.fill();
    }

    // Ground texture dots
    ctx.fillStyle = 'rgba(0,0,0,0.08)';
    const offset = (distance * 0.9) % 40;
    for (let x = -offset; x < W; x += 40) {
      ctx.fillRect(x, groundY + 30, 3, 3);
      ctx.fillRect(x + 20, groundY + 50, 2, 2);
      ctx.fillRect(x + 10, groundY + 70, 2, 2);
    }
  }

  function drawBirds() {
    for (let b of birds) {
      ctx.save();
      ctx.translate(b.x, b.y);
      const wing = Math.sin(b.phase * 2) * 0.5;
      ctx.fillStyle = '#444';
      ctx.strokeStyle = '#444';
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(-12, 0);
      ctx.quadraticCurveTo(-6, -8 + wing * 6, 0, 0);
      ctx.quadraticCurveTo(6, -8 + wing * 6, 12, 0);
      ctx.stroke();
      ctx.restore();
    }
  }

  function drawPlayer() {
    const cx = player.x + player.w / 2;
    const cy = player.y + player.h / 2;

    // Trail
    for (let i = 0; i < player.trail.length; i++) {
      const t = player.trail[i];
      const a = (1 - t.age / 0.3) * 0.3;
      ctx.fillStyle = `rgba(102, 221, 102, ${a})`;
      ctx.beginPath();
      ctx.arc(t.x, t.y, 12 * (1 - t.age / 0.3), 0, Math.PI * 2);
      ctx.fill();
    }

    // Shadow
    if (!player.dead) {
      const shadowScale = player.onGround ? 1 : Math.max(0.3, 1 - (groundY - (player.y + player.h)) / 200);
      ctx.fillStyle = `rgba(0,0,0,${0.25 * shadowScale})`;
      ctx.beginPath();
      ctx.ellipse(cx, groundY - 2, 26 * shadowScale, 7 * shadowScale, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(player.rot);
    ctx.scale(player.stretch, player.squash);

    // Frog body (cartoonish)
    const bodyW = 54, bodyH = 50;

    // Back legs (jumping pose)
    ctx.fillStyle = '#4caf50';
    ctx.strokeStyle = '#2e7d32';
    ctx.lineWidth = 2;
    if (player.onGround) {
      const legY = bodyH / 2 - 4;
      const hop = Math.sin(player.legPhase) * 2;
      // Left leg
      ctx.beginPath();
      ctx.ellipse(-18, legY - hop, 10, 14, -0.3, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
      // Right leg
      ctx.beginPath();
      ctx.ellipse(18, legY + hop, 10, 14, 0.3, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
      // Feet
      ctx.fillStyle = '#66bb6a';
      ctx.beginPath(); ctx.ellipse(-22, legY + 10 - hop, 8, 4, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
      ctx.beginPath(); ctx.ellipse(22, legY + 10 + hop, 8, 4, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    } else {
      // Tucked legs when jumping
      ctx.beginPath();
      ctx.ellipse(-16, bodyH / 2 - 10, 12, 16, -0.6, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
      ctx.beginPath();
      ctx.ellipse(16, bodyH / 2 - 10, 12, 16, 0.6, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
    }

    // Body
    const bodyGrad = ctx.createRadialGradient(-8, -8, 5, 0, 0, bodyW / 2);
    bodyGrad.addColorStop(0, '#7ccc63');
    bodyGrad.addColorStop(1, '#4caf50');
    ctx.fillStyle = bodyGrad;
    ctx.strokeStyle = '#2e7d32';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.ellipse(0, 0, bodyW / 2, bodyH / 2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // Belly
    ctx.fillStyle = '#e8f5a0';
    ctx.beginPath();
    ctx.ellipse(0, 8, bodyW / 2 - 10, bodyH / 2 - 12, 0, 0, Math.PI * 2);
    ctx.fill();

    // Spots
    ctx.fillStyle = '#2e7d32';
    ctx.beginPath(); ctx.arc(-16, -8, 3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(14, -12, 2.5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(-10, 4, 2, 0, Math.PI * 2); ctx.fill();

    // Front arms (little)
    ctx.fillStyle = '#4caf50';
    ctx.strokeStyle = '#2e7d32';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.ellipse(-18, 10, 6, 9, -0.3, 0, Math.PI * 2);
    ctx.fill(); ctx.stroke();
    ctx.beginPath();
    ctx.ellipse(18, 10, 6, 9, 0.3, 0, Math.PI * 2);
    ctx.fill(); ctx.stroke();

    // Eye bumps
    ctx.fillStyle = '#4caf50';
    ctx.strokeStyle = '#2e7d32';
    ctx.beginPath(); ctx.arc(-10, -20, 11, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.arc(10, -20, 11, 0, Math.PI * 2); ctx.fill(); ctx.stroke();

    // Eyes
    if (player.dead) {
      // X eyes
      ctx.strokeStyle = '#222';
      ctx.lineWidth = 3;
      ctx.lineCap = 'round';
      for (let ex of [-10, 10]) {
        ctx.beginPath(); ctx.moveTo(ex - 4, -24); ctx.lineTo(ex + 4, -16); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(ex + 4, -24); ctx.lineTo(ex - 4, -16); ctx.stroke();
      }
    } else if (player.blink > 0) {
      ctx.strokeStyle = '#222'; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(-14, -20); ctx.lineTo(-6, -20); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(6, -20); ctx.lineTo(14, -20); ctx.stroke();
    } else {
      // White
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(-10, -20, 7, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(10, -20, 7, 0, Math.PI * 2); ctx.fill();
      // Pupil
      const pupilOffset = player.onGround ? 0 : 2;
      ctx.fillStyle = '#222';
      ctx.beginPath(); ctx.arc(-9, -20 + pupilOffset, 4, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(11, -20 + pupilOffset, 4, 0, Math.PI * 2); ctx.fill();
      // Highlight
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(-8, -22 + pupilOffset, 1.5, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(12, -22 + pupilOffset, 1.5, 0, Math.PI * 2); ctx.fill();
    }

    // Mouth
    ctx.strokeStyle = '#2e7d32';
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.beginPath();
    if (player.dead) {
      ctx.arc(0, 8, 5, Math.PI, Math.PI * 2);
    } else if (!player.onGround) {
      // Open mouth when jumping
      ctx.fillStyle = '#d84141';
      ctx.beginPath();
      ctx.ellipse(0, 6, 6, 4, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
    } else {
      ctx.moveTo(-8, 4);
      ctx.quadraticCurveTo(0, 10, 8, 4);
      ctx.stroke();
    }

    // Cheeks
    ctx.fillStyle = 'rgba(255,100,120,0.4)';
    ctx.beginPath(); ctx.arc(-20, 2, 3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(20, 2, 3, 0, Math.PI * 2); ctx.fill();

    ctx.restore();
  }

  function drawObstacle(o) {
    ctx.save();
    ctx.translate(o.x, o.y);

    if (o.kind === 'cactus' || o.kind === 'cactus-big') {
      const h = o.h;
      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      ctx.beginPath(); ctx.ellipse(o.w/2, o.h + 2, o.w/2 + 2, 4, 0, 0, Math.PI * 2); ctx.fill();

      ctx.fillStyle = '#2e7d32';
      ctx.strokeStyle = '#1b5e20';
      ctx.lineWidth = 2;
      // Main body
      ctx.beginPath();
      ctx.roundRect(o.w/2 - 10, 0, 20, h, 8);
      ctx.fill(); ctx.stroke();
      // Arms
      if (o.kind === 'cactus-big') {
        ctx.beginPath();
        ctx.roundRect(-4, h * 0.3, 12, h * 0.3, 5);
        ctx.fill(); ctx.stroke();
        ctx.beginPath();
        ctx.roundRect(o.w - 8, h * 0.2, 12, h * 0.4, 5);
        ctx.fill(); ctx.stroke();
      }
      // Spots/spines
      ctx.fillStyle = '#1b5e20';
      for (let i = 0; i < 4; i++) {
        ctx.beginPath(); ctx.arc(o.w/2 - 3, 10 + i * (h / 5), 1.5, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(o.w/2 + 3, 18 + i * (h / 5), 1.5, 0, Math.PI * 2); ctx.fill();
      }
      // Face
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(o.w/2 - 4, 14, 2.5, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(o.w/2 + 4, 14, 2.5, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#222';
      ctx.beginPath(); ctx.arc(o.w/2 - 4, 14, 1.2, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(o.w/2 + 4, 14, 1.2, 0, Math.PI * 2); ctx.fill();
      // Grumpy mouth
      ctx.strokeStyle = '#222';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(o.w/2, 22, 3, 0.1, Math.PI - 0.1);
      ctx.stroke();
    } else if (o.kind === 'cactus-double') {
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      ctx.beginPath(); ctx.ellipse(o.w/2, o.h + 2, o.w/2 + 2, 4, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#2e7d32';
      ctx.strokeStyle = '#1b5e20';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.roundRect(4, 10, 20, o.h - 10, 8); ctx.fill(); ctx.stroke();
      ctx.beginPath(); ctx.roundRect(40, 0, 20, o.h, 8); ctx.fill(); ctx.stroke();
    } else if (o.kind === 'rock') {
      ctx.fillStyle = 'rgba(0,0,0,0.2)';
      ctx.beginPath(); ctx.ellipse(o.w/2, o.h + 2, o.w/2 + 2, 4, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#888';
      ctx.strokeStyle = '#444';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(2, o.h);
      ctx.lineTo(6, 14);
      ctx.lineTo(18, 4);
      ctx.lineTo(34, 8);
      ctx.lineTo(o.w - 4, 16);
      ctx.lineTo(o.w - 2, o.h);
      ctx.closePath();
      ctx.fill(); ctx.stroke();
      // Highlight
      ctx.fillStyle = '#bbb';
      ctx.beginPath();
      ctx.moveTo(8, 14);
      ctx.lineTo(20, 8);
      ctx.lineTo(30, 12);
      ctx.lineTo(20, 18);
      ctx.closePath();
      ctx.fill();
      // Face
      ctx.fillStyle = '#222';
      ctx.beginPath(); ctx.arc(18, 18, 2, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(32, 18, 2, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = '#222'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(22, 24); ctx.lineTo(28, 24); ctx.stroke();
    } else if (o.kind === 'bird') {
      // Evil flying bird
      const flap = Math.sin(o.phase * 2);
      ctx.save();
      // Body
      ctx.fillStyle = '#e91e63';
      ctx.strokeStyle = '#880e4f';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.ellipse(o.w/2, o.h/2, 18, 12, 0, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
      // Wings
      ctx.fillStyle = '#c2185b';
      ctx.beginPath();
      ctx.ellipse(o.w/2, o.h/2 - 4 + flap * 6, 14, 6, flap * 0.3, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
      // Head
      ctx.fillStyle = '#e91e63';
      ctx.beginPath(); ctx.arc(o.w/2 - 14, o.h/2 - 2, 9, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
      // Beak
      ctx.fillStyle = '#ffb300';
      ctx.beginPath();
      ctx.moveTo(o.w/2 - 22, o.h/2 - 2);
      ctx.lineTo(o.w/2 - 28, o.h/2);
      ctx.lineTo(o.w/2 - 22, o.h/2 + 2);
      ctx.closePath();
      ctx.fill(); ctx.stroke();
      // Eye
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(o.w/2 - 14, o.h/2 - 4, 3, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#222';
      ctx.beginPath(); ctx.arc(o.w/2 - 15, o.h/2 - 4, 1.5, 0, Math.PI * 2); ctx.fill();
      // Angry brow
      ctx.strokeStyle = '#222'; ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(o.w/2 - 18, o.h/2 - 9);
      ctx.lineTo(o.w/2 - 10, o.h/2 - 6);
      ctx.stroke();
      ctx.restore();
    } else if (o.kind === 'spikes') {
      ctx.fillStyle = 'rgba(0,0,0,0.2)';
      ctx.beginPath(); ctx.ellipse(o.w/2, o.h + 2, o.w/2 + 2, 4, 0, 0, Math.PI * 2); ctx.fill();
      // Base
      ctx.fillStyle = '#555';
      ctx.strokeStyle = '#222';
      ctx.lineWidth = 2;
      ctx.fillRect(0, o.h - 10, o.w, 10);
      ctx.strokeRect(0, o.h - 10, o.w, 10);
      // Spikes
      const sc = 5;
      for (let i = 0; i < sc; i++) {
        const sx = (i + 0.5) * (o.w / sc);
        ctx.fillStyle = '#888';
        ctx.strokeStyle = '#333';
        ctx.beginPath();
        ctx.moveTo(sx - 7, o.h - 10);
        ctx.lineTo(sx, 0);
        ctx.lineTo(sx + 7, o.h - 10);
        ctx.closePath();
        ctx.fill(); ctx.stroke();
        // Shine
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.beginPath();
        ctx.moveTo(sx - 2, o.h - 10);
        ctx.lineTo(sx - 1, 4);
        ctx.lineTo(sx + 1, o.h - 10);
        ctx.closePath();
        ctx.fill();
      }
    }
    ctx.restore();
  }

  function drawObstacles() {
    for (let o of obstacles) drawObstacle(o);
  }

  function drawCollectibles() {
    for (let c of collectibles) {
      if (c.collected) continue;
      ctx.save();
      ctx.translate(c.x, c.y + Math.sin(c.phase) * 4);
      ctx.rotate(Math.sin(c.phase * 0.5) * 0.3);
      // Glow
      const glow = ctx.createRadialGradient(0, 0, 5, 0, 0, 24);
      glow.addColorStop(0, 'rgba(255, 215, 0, 0.5)');
      glow.addColorStop(1, 'rgba(255, 215, 0, 0)');
      ctx.fillStyle = glow;
      ctx.fillRect(-24, -24, 48, 48);
      // Coin
      ctx.fillStyle = '#ffb300';
      ctx.strokeStyle = '#e65100';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(0, 0, c.r, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
      ctx.fillStyle = '#ffd54f';
      ctx.beginPath(); ctx.arc(0, 0, c.r - 3, 0, Math.PI * 2); ctx.fill();
      // Star
      ctx.fillStyle = '#f57c00';
      ctx.font = 'bold 14px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('★', 0, 1);
      // Shine
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.beginPath(); ctx.arc(-4, -4, 2, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }
  }

  function drawParticles() {
    for (let p of particles) {
      const a = 1 - p.age / p.life;
      ctx.save();
      ctx.globalAlpha = a;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      if (p.shape === 'square') {
        ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
      } else {
        ctx.beginPath();
        ctx.arc(0, 0, p.size, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }
  }

  function drawPopups() {
    for (let pu of popups) {
      const a = 1 - pu.age / pu.life;
      ctx.save();
      ctx.globalAlpha = a;
      ctx.font = 'bold 28px "Comic Sans MS", sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.lineWidth = 4;
      ctx.strokeStyle = '#222';
      ctx.strokeText(pu.text, pu.x, pu.y);
      ctx.fillStyle = pu.color;
      ctx.fillText(pu.text, pu.x, pu.y);
      ctx.restore();
    }
  }

  function render() {
    ctx.save();
    if (shake > 0.1) {
      ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
    }

    drawSky();
    drawClouds();
    drawMountains();
    drawHills();
    drawBirds();
    drawTrees();
    drawGround();
    drawCollectibles();
    drawObstacles();
    drawPlayer();
    drawParticles();
    drawPopups();

    ctx.restore();

    // Speed lines when fast
    if (state === STATE.PLAYING && speed > 10) {
      ctx.save();
      ctx.globalAlpha = Math.min(0.3, (speed - 10) * 0.05);
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      for (let i = 0; i < 6; i++) {
        const y = (i * 137 + distance * 2) % H;
        const x = (i * 211) % W;
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x - 40, y);
        ctx.stroke();
      }
      ctx.restore();
    }
  }

  // ====== Game Loop ======
  let lastTime = performance.now();
  function loop(now) {
    const dt = Math.min(0.05, (now - lastTime) / 1000);
    lastTime = now;
    update(dt);
    render();
    requestAnimationFrame(loop);
  }

  // Initial setup
  groundY = H - 80;
  player.x = W * 0.2;
  player.y = groundY - player.h;
  initBackground();

  // Draw menu scene
  requestAnimationFrame(loop);

})();
</script>
</body>
</html>
