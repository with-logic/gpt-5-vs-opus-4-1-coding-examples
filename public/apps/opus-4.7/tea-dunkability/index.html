<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tea Dunkability Simulator — The Biscuit Lab</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    --bg-0: #0b0d14;
    --bg-1: #12151f;
    --bg-2: #181c2a;
    --accent: #d9a566;
    --accent-2: #e8c789;
    --tea: #b97a3f;
    --tea-light: #d89a5a;
    --crumb: #c49669;
    --text: #e7e3d7;
    --text-dim: #a29e90;
    --danger: #ef6a4b;
    --ok: #7fc28a;
    --warn: #e6c25a;
  }
  html, body, #root { height: 100%; }
  body {
    margin: 0;
    font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    background:
      radial-gradient(1200px 600px at 10% -10%, rgba(217,165,102,.12), transparent 60%),
      radial-gradient(1000px 500px at 110% 110%, rgba(120,90,220,.10), transparent 60%),
      linear-gradient(180deg, #0a0c13 0%, #0b0d14 100%);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }
  .font-display { font-family: 'Fraunces', 'Playfair Display', Georgia, serif; letter-spacing: -0.02em; }
  .glass {
    background: linear-gradient(180deg, rgba(255,255,255,.045), rgba(255,255,255,.015));
    border: 1px solid rgba(255,255,255,.08);
    backdrop-filter: blur(14px) saturate(140%);
    -webkit-backdrop-filter: blur(14px) saturate(140%);
    border-radius: 18px;
    box-shadow:
      0 1px 0 rgba(255,255,255,.05) inset,
      0 30px 60px -30px rgba(0,0,0,.6),
      0 0 0 1px rgba(255,255,255,.02);
  }
  .glass-strong {
    background: linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.02));
    border: 1px solid rgba(255,255,255,.1);
  }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: 999px; font-size: 12px;
    background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.08); color: var(--text-dim);
  }
  .kbd {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    padding: 2px 7px;
    font-size: 11px;
    border-radius: 6px;
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.14);
    border-bottom-width: 2px;
    color: var(--text);
  }

  /* Slider */
  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    background: transparent;
  }
  input[type=range]::-webkit-slider-runnable-track {
    height: 6px;
    border-radius: 999px;
    background: linear-gradient(90deg, rgba(217,165,102,.9) 0%, rgba(217,165,102,.9) var(--pct,50%), rgba(255,255,255,.08) var(--pct,50%), rgba(255,255,255,.08) 100%);
  }
  input[type=range]::-moz-range-track {
    height: 6px;
    border-radius: 999px;
    background: linear-gradient(90deg, rgba(217,165,102,.9) 0%, rgba(217,165,102,.9) var(--pct,50%), rgba(255,255,255,.08) var(--pct,50%), rgba(255,255,255,.08) 100%);
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    height: 18px; width: 18px; border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #fff, var(--accent));
    border: 2px solid #2a1f12;
    box-shadow: 0 4px 12px rgba(217,165,102,.4), 0 0 0 4px rgba(217,165,102,.12);
    margin-top: -6px;
    cursor: grab;
    transition: transform .15s ease;
  }
  input[type=range]::-webkit-slider-thumb:active { cursor: grabbing; transform: scale(1.1); }
  input[type=range]::-moz-range-thumb {
    height: 18px; width: 18px; border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #fff, var(--accent));
    border: 2px solid #2a1f12;
    box-shadow: 0 4px 12px rgba(217,165,102,.4);
    cursor: grab;
  }

  /* Steam animation */
  @keyframes steamRise {
    0%   { transform: translateY(0) scale(1); opacity: 0; }
    20%  { opacity: .8; }
    100% { transform: translateY(-90px) scale(1.6); opacity: 0; }
  }
  .steam-puff {
    position: absolute;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,.6), rgba(255,255,255,0) 70%);
    filter: blur(6px);
    animation: steamRise 2.8s ease-in infinite;
    pointer-events: none;
  }

  /* Tea ripple */
  @keyframes ripple {
    0% { transform: scale(.5); opacity: .7; }
    100% { transform: scale(1.8); opacity: 0; }
  }
  .ripple { animation: ripple 1.6s ease-out infinite; transform-origin: center; }

  /* Crumb falling */
  @keyframes crumbFall {
    0% { transform: translate(0, 0) rotate(0deg); opacity: 1; }
    100% { transform: translate(var(--tx, 0), 260px) rotate(var(--rz, 360deg)); opacity: 0; }
  }
  .crumb {
    position: absolute;
    width: 6px; height: 6px;
    background: var(--crumb);
    border-radius: 2px;
    box-shadow: 0 0 0 1px rgba(0,0,0,.15);
    animation: crumbFall 2.4s ease-in forwards;
    pointer-events: none;
  }

  @keyframes dunkBob {
    0%, 100% { transform: translate(var(--dx, 0), var(--dy, 0)) rotate(var(--dr, 0deg)); }
    50%      { transform: translate(var(--dx, 0), calc(var(--dy, 0) + 3px)) rotate(var(--dr, 0deg)); }
  }

  .shimmer {
    background: linear-gradient(90deg, transparent, rgba(255,255,255,.08), transparent);
    background-size: 200% 100%;
    animation: shimmerMove 2.2s linear infinite;
  }
  @keyframes shimmerMove {
    0% { background-position: -150% 0; }
    100% { background-position: 150% 0; }
  }

  .glow-accent {
    box-shadow: 0 0 0 1px rgba(217,165,102,.25), 0 10px 30px -10px rgba(217,165,102,.3);
  }

  /* Tick labels */
  .tick { color: var(--text-dim); font-size: 10px; }

  /* Biscuit selector */
  .biscuit-card {
    transition: transform .2s ease, border-color .2s ease, background .2s ease;
  }
  .biscuit-card.selected {
    border-color: var(--accent);
    background: linear-gradient(180deg, rgba(217,165,102,.14), rgba(217,165,102,.04));
    transform: translateY(-2px);
  }

  /* Graph grid */
  .grid-lines line { stroke: rgba(255,255,255,.07); stroke-width: 1; }

  /* Blink cursor */
  @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }
  .blink { animation: blink 1s steps(2) infinite; }

  /* Pulse dot */
  @keyframes pulseDot { 0% { box-shadow: 0 0 0 0 rgba(217,165,102,.7); } 70% { box-shadow: 0 0 0 10px rgba(217,165,102,0); } 100% { box-shadow: 0 0 0 0 rgba(217,165,102,0); } }
  .pulse-dot { animation: pulseDot 2s infinite; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.08); border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,.15); }

  /* Verdict flash */
  @keyframes flashBad { 0% { background: rgba(239,106,75,.3); } 100% { background: transparent; } }
  .flash-bad { animation: flashBad .8s ease-out; }

  @keyframes flashGood { 0% { background: rgba(127,194,138,.22); } 100% { background: transparent; } }
  .flash-good { animation: flashGood .8s ease-out; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

// ---------- Biscuit catalog ----------
const BISCUITS = [
  { id: 'digestive',  name: 'Digestive',        emoji: '🍪', color: '#c49669', rim: '#8a5f36',
    baseTime: 3.2, heatSens: 0.85, desc: 'The honest workhorse. Balanced crumb.', dots: true },
  { id: 'rich_tea',   name: 'Rich Tea',         emoji: '🟤', color: '#d4a876', rim: '#8c6039',
    baseTime: 2.4, heatSens: 1.15, desc: 'Thin, thirsty. Fails fast.', dots: false },
  { id: 'custard',    name: 'Custard Cream',    emoji: '🍯', color: '#e6c98a', rim: '#b08647',
    baseTime: 4.5, heatSens: 0.7, desc: 'Sandwich fortress. Sugar-glazed.', dots: false },
  { id: 'bourbon',    name: 'Bourbon',          emoji: '🟫', color: '#6b3e25', rim: '#3a2012',
    baseTime: 5.2, heatSens: 0.65, desc: 'Chocolatey tank. Dunk royalty.', dots: true },
  { id: 'ginger',     name: 'Ginger Nut',       emoji: '🟠', color: '#b66d2e', rim: '#7a4418',
    baseTime: 6.0, heatSens: 0.55, desc: 'Hard as diamond. Slow hydrator.', dots: false },
  { id: 'hobnob',     name: 'Hobnob',           emoji: '🌾', color: '#caa06a', rim: '#8a6031',
    baseTime: 4.8, heatSens: 0.75, desc: 'Oaty. Rugged. Forgiving.', dots: true },
  { id: 'shortbread', name: 'Shortbread',       emoji: '🟨', color: '#eacf96', rim: '#b99254',
    baseTime: 2.0, heatSens: 1.35, desc: 'Buttery. Fragile. Handle with care.', dots: false },
  { id: 'oreo',       name: 'Oreo',             emoji: '⚫', color: '#222226', rim: '#0a0a0d',
    baseTime: 3.6, heatSens: 0.9,  desc: 'Cream-filled. Surprisingly stoic.', dots: false },
];

const TEMP_LABELS = (t) => {
  if (t < 40) return { label: 'Tepid', tone: 'text-sky-300' };
  if (t < 65) return { label: 'Warm', tone: 'text-amber-300' };
  if (t < 85) return { label: 'Hot', tone: 'text-orange-300' };
  if (t < 95) return { label: 'Steaming', tone: 'text-red-300' };
  return { label: 'Scalding', tone: 'text-rose-400' };
};

// Dunkability model
// survives = user dunkTime <= failTime
function computeFailTime(biscuit, tempC, integrity) {
  // Hotter tea = faster collapse. Higher integrity = more time.
  const heatFactor = 0.5 + (tempC - 20) / 80; // ~0.5 at 20C, ~1.5 at 100C
  const integrityFactor = 0.4 + integrity / 100 * 1.1; // 0.4..1.5
  const fail = biscuit.baseTime * integrityFactor / Math.pow(heatFactor, biscuit.heatSens);
  return Math.max(0.4, fail);
}

function computeCrumbleCurve(biscuit, tempC, integrity, maxTime = 12) {
  const fail = computeFailTime(biscuit, tempC, integrity);
  const points = [];
  for (let t = 0; t <= maxTime; t += 0.25) {
    // Sigmoid-ish collapse around fail time
    const x = (t - fail) / (0.15 * fail + 0.4);
    const structural = 100 / (1 + Math.exp(x * 2.2));
    points.push({ t, y: structural, fail });
  }
  return { points, fail };
}

// Rating
function rateDunk(dunkTime, fail) {
  const ratio = dunkTime / fail;
  if (ratio < 0.45) return { grade: 'Under-dunked', tone: 'text-sky-300', quip: 'Too shy. Commit to the dunk.', score: 0.4 + ratio };
  if (ratio < 0.85) return { grade: 'Perfect', tone: 'text-emerald-300', quip: 'Textbook hydration. Chef’s kiss.', score: 1.0 };
  if (ratio < 1.0)  return { grade: 'Risky', tone: 'text-amber-300', quip: 'On the edge. You feel lucky?', score: 0.9 };
  if (ratio < 1.3)  return { grade: 'Over-dunked', tone: 'text-orange-300', quip: 'Soggy bottom detected.', score: 0.5 };
  return { grade: 'Catastrophic', tone: 'text-rose-400', quip: 'Biscuit overboard. Call a priest.', score: 0.1 };
}

// ---------- Components ----------
function Slider({ label, value, min, max, step, onChange, unit, hint, accent='accent' }) {
  const pct = ((value - min) / (max - min)) * 100;
  return (
    <div>
      <div className="flex items-end justify-between mb-2">
        <div className="flex items-center gap-2">
          <span className="text-sm font-medium text-white/90">{label}</span>
          {hint && <span className="chip">{hint}</span>}
        </div>
        <div className="font-display text-2xl text-white tabular-nums">
          {typeof value === 'number' ? value.toFixed(step < 1 ? 1 : 0) : value}
          <span className="text-sm text-white/40 ml-1">{unit}</span>
        </div>
      </div>
      <input
        type="range" min={min} max={max} step={step} value={value}
        onChange={(e) => onChange(parseFloat(e.target.value))}
        style={{ '--pct': pct + '%' }}
      />
    </div>
  );
}

// ---------- Teacup SVG + crumbs ----------
function Teacup({ tempC, dunkProgress, biscuit, integrityRatio, crumbs, shake }) {
  const steamCount = Math.max(0, Math.min(8, Math.round((tempC - 40) / 7)));
  const teaColor = `hsl(${30 - tempC/10}, ${55 + tempC/8}%, ${38 + tempC/20}%)`;

  // Biscuit y-position: -60 (above) to +20 (submerged)
  const biscuitY = -60 + dunkProgress * 95;
  const dipDepth = Math.max(0, dunkProgress - 0.6);
  const soakRatio = 1 - integrityRatio;

  return (
    <div className="relative w-full h-[420px] flex items-center justify-center select-none">
      {/* Steam layer */}
      <div className="absolute top-[40px] left-1/2 -translate-x-1/2 w-[160px] h-[140px]">
        {Array.from({ length: steamCount }).map((_, i) => (
          <div key={i} className="steam-puff"
            style={{
              left: `${20 + (i * 17) % 120}px`,
              bottom: '0px',
              animationDelay: `${(i * 0.35) % 2.8}s`,
              opacity: 0.6 + (tempC - 40) / 200,
            }}
          />
        ))}
      </div>

      {/* Table shadow */}
      <div className="absolute bottom-4 w-[260px] h-[20px] rounded-full"
           style={{ background: 'radial-gradient(ellipse at center, rgba(0,0,0,.5), transparent 70%)' }} />

      {/* SVG Cup */}
      <svg viewBox="0 0 320 400" width="340" height="420" className="relative z-10"
           style={{ filter: 'drop-shadow(0 30px 40px rgba(0,0,0,.45))' }}>
        <defs>
          <radialGradient id="tea-grad" cx="50%" cy="35%" r="75%">
            <stop offset="0%" stopColor={teaColor} stopOpacity="1" />
            <stop offset="70%" stopColor={teaColor} stopOpacity=".95" />
            <stop offset="100%" stopColor="#3a1f0e" stopOpacity="1" />
          </radialGradient>
          <linearGradient id="cup-grad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#f5f2ea" />
            <stop offset="55%" stopColor="#e8e3d6" />
            <stop offset="100%" stopColor="#b9b3a2" />
          </linearGradient>
          <linearGradient id="cup-inner" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#aaa598" />
            <stop offset="100%" stopColor="#3b372e" />
          </linearGradient>
          <linearGradient id="saucer-grad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#f5f2ea" />
            <stop offset="100%" stopColor="#a8a293" />
          </linearGradient>
          <clipPath id="cup-clip">
            <path d="M60,160 Q60,320 160,330 Q260,320 260,160 Z" />
          </clipPath>
          <radialGradient id="biscuit-top" cx="50%" cy="35%" r="70%">
            <stop offset="0%" stopColor={biscuit.color} stopOpacity="1" />
            <stop offset="100%" stopColor={biscuit.rim} stopOpacity="1" />
          </radialGradient>
          <filter id="soft-blur"><feGaussianBlur stdDeviation="0.6" /></filter>
        </defs>

        {/* Saucer */}
        <ellipse cx="160" cy="360" rx="130" ry="18" fill="url(#saucer-grad)" />
        <ellipse cx="160" cy="354" rx="100" ry="10" fill="#efeade" />
        <ellipse cx="160" cy="354" rx="90" ry="7" fill="#cfc9b8" opacity=".5" />

        {/* Handle */}
        <path d="M260,200 Q310,205 310,245 Q310,285 260,290"
              fill="none" stroke="url(#cup-grad)" strokeWidth="14" strokeLinecap="round" />
        <path d="M260,205 Q300,210 300,245 Q300,280 260,285"
              fill="none" stroke="#bfb9a8" strokeWidth="3" strokeLinecap="round" opacity=".6" />

        {/* Cup body */}
        <path d="M60,160 Q60,320 160,335 Q260,320 260,160 Z" fill="url(#cup-grad)" />
        <path d="M70,165 Q70,312 160,326 Q250,312 250,165 Z" fill="url(#cup-inner)" opacity=".9" />

        {/* Tea */}
        <g clipPath="url(#cup-clip)">
          <rect x="0" y="170" width="320" height="200" fill="url(#tea-grad)" />
          {/* Surface highlight */}
          <ellipse cx="160" cy="178" rx="95" ry="10" fill="#fff" opacity={0.08 + tempC/800} />
          <ellipse cx="130" cy="175" rx="30" ry="3" fill="#fff" opacity={0.2} />
          {/* Ripples when dunking */}
          {dunkProgress > 0.55 && (
            <>
              <ellipse cx="160" cy="178" rx="40" ry="6"
                       fill="none" stroke="rgba(255,255,255,.35)" strokeWidth="1.5" className="ripple" />
              <ellipse cx="160" cy="178" rx="40" ry="6"
                       fill="none" stroke="rgba(255,255,255,.25)" strokeWidth="1" className="ripple"
                       style={{ animationDelay: '.6s' }} />
            </>
          )}
          {/* Soggy dissolve plume */}
          {soakRatio > 0.4 && dunkProgress > 0.6 && (
            <circle cx="160" cy={200 + dunkProgress * 40} r={10 + soakRatio * 30}
                    fill={biscuit.color} opacity={0.15 + soakRatio * 0.3} filter="url(#soft-blur)" />
          )}
        </g>

        {/* Rim ellipse */}
        <ellipse cx="160" cy="160" rx="100" ry="14" fill="#d6d0bf" />
        <ellipse cx="160" cy="160" rx="100" ry="14" fill="none" stroke="#a8a293" strokeWidth="1.2" />
        <ellipse cx="160" cy="160" rx="90" ry="10" fill="#2a251d" />
        <ellipse cx="160" cy="160" rx="90" ry="10" fill="url(#tea-grad)" opacity=".9" />

        {/* Biscuit (held by "hand" line) */}
        <g style={{
             transform: `translate(0px, ${biscuitY}px) rotate(${shake * 4}deg)`,
             transformOrigin: '160px 140px',
             transition: 'transform .06s linear'
           }}>
          {/* fingers / pinch */}
          <circle cx="160" cy="70" r="9" fill="#f0d6b2" stroke="#a07847" strokeWidth="1" />
          <circle cx="150" cy="72" r="7" fill="#e4c49b" stroke="#a07847" strokeWidth="1" />
          <circle cx="170" cy="72" r="7" fill="#e4c49b" stroke="#a07847" strokeWidth="1" />
          {/* Biscuit */}
          <g>
            <ellipse cx="160" cy="110" rx="38" ry="11" fill={biscuit.rim} opacity=".7" />
            <circle cx="160" cy="105" r="34" fill="url(#biscuit-top)" stroke={biscuit.rim} strokeWidth="2" />
            {/* Soaked darkening at bottom */}
            {dunkProgress > 0.55 && (
              <path d={`M126,${105 + 34 - dipDepth*60} A34,34 0 0 0 194,${105 + 34 - dipDepth*60} L194,139 L126,139 Z`}
                    fill="#3b1f0b" opacity={0.35 + soakRatio * 0.45} />
            )}
            {/* Dots / pattern for some biscuits */}
            {biscuit.dots && (
              <g fill={biscuit.rim} opacity=".55">
                {[[146,95],[170,90],[155,112],[175,115],[160,100]].map(([cx,cy],i)=>(
                  <circle key={i} cx={cx} cy={cy} r="1.8" />
                ))}
              </g>
            )}
            {/* Crack lines when collapsing */}
            {soakRatio > 0.55 && (
              <g stroke="#2a170a" strokeWidth="1.2" fill="none" opacity={soakRatio}>
                <path d="M140,100 Q155,108 165,95" />
                <path d="M150,118 Q165,114 178,120" />
              </g>
            )}
            {/* Label (e.g. BOURBON) */}
            <text x="160" y="108" textAnchor="middle"
                  fontFamily="Fraunces, serif" fontWeight="700"
                  fontSize="9" fill="#fff" opacity={biscuit.id==='bourbon'?.7:0}>
              {biscuit.name.toUpperCase()}
            </text>
          </g>
        </g>

        {/* Crumb particles in tea */}
        <g clipPath="url(#cup-clip)">
          {crumbs.filter(c=>c.inTea).map(c => (
            <circle key={c.id} cx={c.x} cy={c.y} r={c.size} fill={biscuit.color} opacity={0.55} />
          ))}
        </g>
      </svg>

      {/* Falling crumb particles (HTML, outside SVG) */}
      <div className="absolute inset-0 pointer-events-none">
        {crumbs.filter(c => !c.inTea).map(c => (
          <span key={c.id} className="crumb"
            style={{
              left: `calc(50% + ${c.x - 160}px)`,
              top: `${120 + c.y*0.4}px`,
              background: biscuit.color,
              '--tx': `${c.dx}px`,
              '--rz': `${c.rot}deg`,
              width: c.size*2 + 'px',
              height: c.size*2 + 'px',
            }}
          />
        ))}
      </div>

      {/* Cup temp label */}
      <div className="absolute top-2 right-4 flex items-center gap-2">
        <div className="w-2 h-2 rounded-full" style={{ background: tempC > 85 ? '#ef6a4b' : tempC > 60 ? '#e6c25a' : '#7fc28a' }} />
        <span className={`text-xs ${TEMP_LABELS(tempC).tone}`}>{TEMP_LABELS(tempC).label} · {Math.round(tempC)}°C</span>
      </div>
    </div>
  );
}

// ---------- Crumble-o-meter graph ----------
function CrumbleGraph({ curve, fail, dunkTime, tempC, biscuit }) {
  const W = 560, H = 220, PAD = { l: 44, r: 16, t: 16, b: 30 };
  const maxT = 12;
  const xScale = (t) => PAD.l + (t / maxT) * (W - PAD.l - PAD.r);
  const yScale = (v) => PAD.t + (1 - v / 100) * (H - PAD.t - PAD.b);

  const path = useMemo(() => {
    return curve.map((p, i) => `${i === 0 ? 'M' : 'L'}${xScale(p.t).toFixed(1)},${yScale(p.y).toFixed(1)}`).join(' ');
  }, [curve]);

  const area = `${path} L${xScale(maxT)},${yScale(0)} L${xScale(0)},${yScale(0)} Z`;
  const userY = curve.reduce((acc, p) => Math.abs(p.t - dunkTime) < Math.abs(acc.t - dunkTime) ? p : acc, curve[0]);

  return (
    <svg viewBox={`0 0 ${W} ${H}`} className="w-full h-auto">
      <defs>
        <linearGradient id="curve-fill" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#d9a566" stopOpacity=".35" />
          <stop offset="100%" stopColor="#d9a566" stopOpacity="0" />
        </linearGradient>
        <linearGradient id="curve-stroke" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stopColor="#7fc28a" />
          <stop offset="55%" stopColor="#e6c25a" />
          <stop offset="100%" stopColor="#ef6a4b" />
        </linearGradient>
      </defs>

      {/* Grid */}
      <g className="grid-lines">
        {Array.from({length:6}).map((_,i)=>{
          const y = PAD.t + (i/5)*(H-PAD.t-PAD.b);
          return <line key={i} x1={PAD.l} y1={y} x2={W-PAD.r} y2={y} />;
        })}
        {Array.from({length:7}).map((_,i)=>{
          const x = PAD.l + (i/6)*(W-PAD.l-PAD.r);
          return <line key={i} x1={x} y1={PAD.t} x2={x} y2={H-PAD.b} />;
        })}
      </g>
      {/* Axes */}
      <line x1={PAD.l} y1={H-PAD.b} x2={W-PAD.r} y2={H-PAD.b} stroke="rgba(255,255,255,.25)" />
      <line x1={PAD.l} y1={PAD.t} x2={PAD.l} y2={H-PAD.b} stroke="rgba(255,255,255,.25)" />

      {/* Y labels */}
      {[0,25,50,75,100].map(v=>(
        <text key={v} x={PAD.l-6} y={yScale(v)+3} textAnchor="end" className="tick" fill="currentColor">{v}</text>
      ))}
      {/* X labels */}
      {[0,2,4,6,8,10,12].map(t=>(
        <text key={t} x={xScale(t)} y={H-PAD.b+14} textAnchor="middle" className="tick" fill="currentColor">{t}s</text>
      ))}

      {/* Area */}
      <path d={area} fill="url(#curve-fill)" />
      {/* Curve */}
      <path d={path} fill="none" stroke="url(#curve-stroke)" strokeWidth="2.5" />

      {/* Fail threshold */}
      <line x1={xScale(fail)} y1={PAD.t} x2={xScale(fail)} y2={H-PAD.b}
            stroke="#ef6a4b" strokeDasharray="4 3" strokeWidth="1.3" opacity=".9" />
      <text x={xScale(fail)+4} y={PAD.t+12} fill="#ef6a4b" fontSize="10">failure · {fail.toFixed(1)}s</text>

      {/* Perfect zone */}
      <rect x={xScale(fail*0.45)} y={PAD.t} width={xScale(fail*0.85)-xScale(fail*0.45)} height={H-PAD.t-PAD.b}
            fill="#7fc28a" opacity=".08" />
      <text x={(xScale(fail*0.45)+xScale(fail*0.85))/2} y={PAD.t+12} textAnchor="middle" fill="#7fc28a" fontSize="10" opacity=".8">perfect zone</text>

      {/* User's dunk time marker */}
      <g>
        <line x1={xScale(dunkTime)} y1={PAD.t} x2={xScale(dunkTime)} y2={H-PAD.b}
              stroke="#e8c789" strokeWidth="1.5" />
        <circle cx={xScale(dunkTime)} cy={yScale(userY.y)} r="6" fill="#fff" stroke="#d9a566" strokeWidth="2" />
        <circle cx={xScale(dunkTime)} cy={yScale(userY.y)} r="10" fill="none" stroke="#d9a566" strokeWidth="1" opacity=".5" />
      </g>

      {/* Axis titles */}
      <text x={W/2} y={H-4} textAnchor="middle" fill="rgba(255,255,255,.5)" fontSize="10">Dunk time (s)</text>
      <text transform={`translate(12, ${H/2}) rotate(-90)`} textAnchor="middle" fill="rgba(255,255,255,.5)" fontSize="10">Structural integrity (%)</text>
    </svg>
  );
}

// ---------- Main App ----------
function App() {
  const [tempC, setTempC] = useState(82);
  const [dunkTime, setDunkTime] = useState(3.2);
  const [biscuitId, setBiscuitId] = useState('digestive');
  const [integrity, setIntegrity] = useState(70);
  const [isDunking, setIsDunking] = useState(false);
  const [dunkProgress, setDunkProgress] = useState(0); // 0..1 animation
  const [crumbs, setCrumbs] = useState([]);
  const [lastRun, setLastRun] = useState(null); // { grade, quip, score, tone }
  const [runCount, setRunCount] = useState(0);
  const [shake, setShake] = useState(0);
  const [flash, setFlash] = useState(null); // 'good' | 'bad' | null
  const [helpOpen, setHelpOpen] = useState(false);

  const biscuit = BISCUITS.find(b => b.id === biscuitId) || BISCUITS[0];
  const { points: curve, fail } = useMemo(() => computeCrumbleCurve(biscuit, tempC, integrity), [biscuit, tempC, integrity]);
  const rating = useMemo(() => rateDunk(dunkTime, fail), [dunkTime, fail]);

  const structuralAtDunk = useMemo(() => {
    const p = curve.reduce((a, p) => Math.abs(p.t - dunkTime) < Math.abs(a.t - dunkTime) ? p : a, curve[0]);
    return p.y;
  }, [curve, dunkTime]);

  // Auto-loop the teacup animation
  useEffect(() => {
    let raf;
    let start = null;
    const cycle = Math.max(2.6, dunkTime + 2.0) * 1000;
    const holdFrac = Math.max(0.18, dunkTime / (dunkTime + 2.0));

    const tick = (ts) => {
      if (start == null) start = ts;
      const elapsed = (ts - start) % cycle;
      const t = elapsed / cycle; // 0..1
      // Ease into dunk (0..0.35), hold (0.35..0.35+holdFrac*0.5), retract (..1)
      let p;
      const downEnd = 0.35;
      const holdEnd = downEnd + holdFrac * 0.35;
      if (t < downEnd) {
        const k = t / downEnd;
        p = 1 - Math.pow(1 - k, 2);
      } else if (t < holdEnd) {
        p = 1;
      } else {
        const k = (t - holdEnd) / (1 - holdEnd);
        p = 1 - Math.pow(k, 2);
      }
      setDunkProgress(p);
      setIsDunking(t < holdEnd && t > 0.05);

      // Crumb generation during dunk if over-dunked
      if (t < holdEnd && t > downEnd && runCount === 0) {
        // passive crumbs for preview - disabled to keep things calm
      }
      raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [dunkTime, runCount]);

  // Crumb lifecycle cleanup
  useEffect(() => {
    if (crumbs.length === 0) return;
    const id = setTimeout(() => {
      setCrumbs(cs => cs.filter(c => Date.now() - c.createdAt < 2400));
    }, 400);
    return () => clearTimeout(id);
  }, [crumbs]);

  // Run a full simulation ("Dunk!")
  const runSimulation = useCallback(() => {
    setRunCount(c => c + 1);
    const r = rateDunk(dunkTime, fail);
    setLastRun(r);
    setFlash(r.score > 0.7 ? 'good' : 'bad');
    setTimeout(() => setFlash(null), 800);

    // Spawn crumbs based on how bad the dunk was
    const overAmount = Math.max(0, dunkTime - fail * 0.85);
    const crumbCount = Math.round(Math.min(60, overAmount * 10 + (100 - structuralAtDunk) * 0.3));
    if (crumbCount > 0) {
      const now = Date.now();
      const newCrumbs = Array.from({ length: crumbCount }).map((_, i) => ({
        id: now + i,
        x: 160 + (Math.random() - 0.5) * 60,
        y: 110 + Math.random() * 20,
        size: 2 + Math.random() * 3,
        dx: (Math.random() - 0.5) * 140,
        rot: (Math.random() - 0.5) * 720,
        inTea: Math.random() < 0.55,
        createdAt: now,
      }));
      setCrumbs(cs => [...cs, ...newCrumbs]);

      // Shake cup
      let s = 0;
      const shakeInt = setInterval(() => {
        s += 1;
        setShake(Math.sin(s * 1.2) * (1 - s/12));
        if (s > 12) { clearInterval(shakeInt); setShake(0); }
      }, 40);
    }
  }, [dunkTime, fail, structuralAtDunk]);

  const reset = () => {
    setTempC(82); setDunkTime(3.2); setIntegrity(70); setBiscuitId('digestive');
    setCrumbs([]); setLastRun(null); setRunCount(0);
  };

  const cycleBiscuit = (dir) => {
    const idx = BISCUITS.findIndex(b => b.id === biscuitId);
    const n = (idx + dir + BISCUITS.length) % BISCUITS.length;
    setBiscuitId(BISCUITS[n].id);
  };

  // Keyboard shortcuts
  useEffect(() => {
    const onKey = (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      const k = e.key.toLowerCase();
      if (k === 'arrowup')   { setTempC(t => Math.min(100, t + 2)); e.preventDefault(); }
      else if (k === 'arrowdown') { setTempC(t => Math.max(20, t - 2)); e.preventDefault(); }
      else if (k === 'arrowright'){ setDunkTime(d => Math.min(12, +(d + 0.2).toFixed(1))); e.preventDefault(); }
      else if (k === 'arrowleft') { setDunkTime(d => Math.max(0, +(d - 0.2).toFixed(1))); e.preventDefault(); }
      else if (k === 'w') setIntegrity(v => Math.min(100, v + 5));
      else if (k === 's') setIntegrity(v => Math.max(0, v - 5));
      else if (k === '[') cycleBiscuit(-1);
      else if (k === ']') cycleBiscuit(1);
      else if (k === ' ') { runSimulation(); e.preventDefault(); }
      else if (k === 'r') reset();
      else if (k === '?') setHelpOpen(o=>!o);
      else if (/^[1-8]$/.test(k)) setBiscuitId(BISCUITS[parseInt(k,10)-1].id);
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [biscuitId, runSimulation]);

  const flashClass = flash === 'good' ? 'flash-good' : flash === 'bad' ? 'flash-bad' : '';

  return (
    <div className={`min-h-screen w-full ${flashClass}`}>
      {/* Header */}
      <header className="max-w-7xl mx-auto px-6 pt-8 pb-4 flex items-center justify-between">
        <div className="flex items-center gap-3">
          <div className="w-10 h-10 rounded-xl glass-strong flex items-center justify-center text-xl glow-accent">🫖</div>
          <div>
            <h1 className="font-display text-2xl leading-none">Tea Dunkability Simulator</h1>
            <p className="text-xs text-white/50 mt-1">A rigorous study of biscuit hydrodynamics · v2.6</p>
          </div>
        </div>
        <div className="hidden md:flex items-center gap-2">
          <span className="chip"><span className="w-1.5 h-1.5 rounded-full bg-emerald-400 pulse-dot"></span> lab online</span>
          <span className="chip">{runCount} trials</span>
          <button onClick={() => setHelpOpen(o=>!o)} className="chip hover:bg-white/10">
            <span>keys</span><span className="kbd">?</span>
          </button>
        </div>
      </header>

      {/* Grid */}
      <main className="max-w-7xl mx-auto px-6 pb-10 grid grid-cols-12 gap-5">
        {/* LEFT: Controls */}
        <section className="col-span-12 lg:col-span-4 flex flex-col gap-5">
          {/* Biscuit picker */}
          <div className="glass p-5">
            <div className="flex items-center justify-between mb-3">
              <div>
                <h2 className="font-display text-lg">Specimen</h2>
                <p className="text-xs text-white/50">Press <span className="kbd">[</span> <span className="kbd">]</span> or 1–8</p>
              </div>
              <span className="chip">{biscuit.baseTime.toFixed(1)}s base τ</span>
            </div>
            <div className="grid grid-cols-4 gap-2">
              {BISCUITS.map((b, i) => (
                <button key={b.id}
                        onClick={() => setBiscuitId(b.id)}
                        className={`biscuit-card glass px-2 py-3 flex flex-col items-center gap-1 text-center border ${biscuitId===b.id ? 'selected' : ''}`}
                        title={b.desc}>
                  <div className="w-9 h-9 rounded-full flex items-center justify-center"
                       style={{ background: `radial-gradient(circle at 30% 30%, ${b.color}, ${b.rim})`, boxShadow:`inset 0 -2px 4px rgba(0,0,0,.3)` }}>
                  </div>
                  <div className="text-[11px] font-medium leading-tight">{b.name}</div>
                  <div className="text-[9px] text-white/40">{i+1}</div>
                </button>
              ))}
            </div>
            <p className="text-xs text-white/60 mt-3 italic">“{biscuit.desc}”</p>
          </div>

          {/* Sliders */}
          <div className="glass p-5 space-y-6">
            <Slider
              label="Tea temperature"
              value={tempC} min={20} max={100} step={1}
              onChange={setTempC} unit="°C"
              hint={TEMP_LABELS(tempC).label}
            />
            <Slider
              label="Dunk duration"
              value={dunkTime} min={0} max={12} step={0.1}
              onChange={setDunkTime} unit="s"
              hint={dunkTime > fail ? 'exceeds τ_fail' : 'within limits'}
            />
            <Slider
              label="Structural integrity"
              value={integrity} min={0} max={100} step={1}
              onChange={setIntegrity} unit="%"
              hint={integrity < 30 ? 'stale' : integrity > 80 ? 'pristine' : 'nominal'}
            />
          </div>

          {/* Actions */}
          <div className="glass p-5 flex gap-3">
            <button onClick={runSimulation}
                    className="flex-1 py-3 rounded-xl font-semibold text-[#1a120a] glow-accent"
                    style={{ background: 'linear-gradient(180deg, #efcb8a, #c68b44)' }}>
              Dunk!  <span className="kbd ml-1" style={{ background: 'rgba(0,0,0,.15)', borderColor: 'rgba(0,0,0,.2)', color:'#2a1c0f' }}>Space</span>
            </button>
            <button onClick={reset}
                    className="px-4 py-3 rounded-xl glass-strong text-sm hover:bg-white/10 transition">
              Reset <span className="kbd ml-1">R</span>
            </button>
          </div>
        </section>

        {/* MIDDLE: Teacup */}
        <section className="col-span-12 lg:col-span-5">
          <div className="glass p-4 relative overflow-hidden h-full">
            <div className="absolute inset-0 opacity-[.05] pointer-events-none"
                 style={{ backgroundImage:'radial-gradient(circle at 10% 20%, #d9a566, transparent 40%), radial-gradient(circle at 80% 80%, #7fc28a, transparent 40%)' }}/>
            <div className="flex items-start justify-between relative z-10">
              <div>
                <div className="chip mb-2">
                  <span className={`w-1.5 h-1.5 rounded-full ${isDunking ? 'bg-amber-300' : 'bg-emerald-300'}`}></span>
                  {isDunking ? 'Dunking…' : 'Ready'}
                </div>
                <h2 className="font-display text-xl">Laboratory Chamber</h2>
                <p className="text-xs text-white/50">Real-time simulation · thermally coupled</p>
              </div>
              <div className="text-right">
                <div className="text-[10px] uppercase tracking-widest text-white/40">τ_fail</div>
                <div className="font-display text-2xl tabular-nums" style={{ color: rating.tone.replace('text-','#') }}>
                  {fail.toFixed(2)}<span className="text-sm text-white/40">s</span>
                </div>
              </div>
            </div>
            <Teacup tempC={tempC} dunkProgress={dunkProgress} biscuit={biscuit}
                    integrityRatio={Math.max(0, Math.min(1, structuralAtDunk/100))}
                    crumbs={crumbs} shake={shake} />

            {/* Verdict ribbon */}
            <div className="mt-2 grid grid-cols-3 gap-3 relative z-10">
              <div className="glass-strong rounded-xl p-3">
                <div className="text-[10px] uppercase text-white/40 tracking-widest">Verdict</div>
                <div className={`font-display text-xl ${rating.tone}`}>{rating.grade}</div>
              </div>
              <div className="glass-strong rounded-xl p-3">
                <div className="text-[10px] uppercase text-white/40 tracking-widest">Integrity @ dunk</div>
                <div className="font-display text-xl tabular-nums">{structuralAtDunk.toFixed(0)}%</div>
              </div>
              <div className="glass-strong rounded-xl p-3">
                <div className="text-[10px] uppercase text-white/40 tracking-widest">Score</div>
                <div className="font-display text-xl tabular-nums">
                  {(rating.score * 100).toFixed(0)}<span className="text-xs text-white/40">/100</span>
                </div>
              </div>
            </div>

            <p className="mt-3 text-sm text-white/70 italic relative z-10">
              <span className="text-white/50">Observation:</span> {rating.quip}
            </p>
          </div>
        </section>

        {/* RIGHT: Graph + telemetry */}
        <section className="col-span-12 lg:col-span-3 flex flex-col gap-5">
          <div className="glass p-5">
            <div className="flex items-center justify-between mb-1">
              <h2 className="font-display text-lg">Crumble-o-Meter</h2>
              <span className="chip">live</span>
            </div>
            <p className="text-xs text-white/50 mb-3">Structural integrity vs. submersion time</p>
            <CrumbleGraph curve={curve} fail={fail} dunkTime={dunkTime} tempC={tempC} biscuit={biscuit} />
            <div className="flex items-center justify-between mt-2">
              <div className="flex items-center gap-2 text-[11px] text-white/60">
                <span className="w-2 h-2 rounded-full bg-emerald-400"></span> safe
                <span className="w-2 h-2 rounded-full bg-amber-400"></span> risk
                <span className="w-2 h-2 rounded-full bg-rose-400"></span> fail
              </div>
              <span className="text-[11px] text-white/50">
                t = <span className="text-white/80 tabular-nums">{dunkTime.toFixed(1)}s</span>
              </span>
            </div>
          </div>

          <div className="glass p-5">
            <h3 className="font-display text-lg mb-3">Telemetry</h3>
            <div className="space-y-3 text-sm">
              <Stat label="Heat flux" value={`${(tempC * 0.042).toFixed(2)} kW/m²`} bar={tempC/100} tone="warm" />
              <Stat label="Capillary uptake" value={`${(0.3 + (1 - integrity/100)*0.7).toFixed(2)} g/s`} bar={0.3 + (1-integrity/100)*0.7} tone="blue" />
              <Stat label="Crack propagation" value={`${((100-structuralAtDunk)/10).toFixed(1)} mm`} bar={(100-structuralAtDunk)/100} tone="danger" />
              <Stat label="Dunk envelope" value={`${((dunkTime/fail)*100).toFixed(0)}%`} bar={Math.min(1, dunkTime/fail)} tone="accent" />
            </div>
          </div>

          <div className="glass p-5">
            <h3 className="font-display text-lg mb-2">Field Notes</h3>
            <ul className="text-xs text-white/70 space-y-1.5 leading-relaxed">
              <li>• <b>{biscuit.name}</b> tolerates ~{biscuit.baseTime.toFixed(1)}s in neutral conditions.</li>
              <li>• Every <b>+10°C</b> cuts tolerance by ~{(biscuit.heatSens * 12).toFixed(0)}%.</li>
              <li>• Aim for <b>{(fail*0.45).toFixed(1)}–{(fail*0.85).toFixed(1)}s</b> for optimal hydration.</li>
              {rating.grade === 'Catastrophic' && <li className="text-rose-300">• Abort. Retrieve biscuit fragments from cup floor.</li>}
              {rating.grade === 'Perfect' && <li className="text-emerald-300">• Log this trial. Serve immediately.</li>}
            </ul>
          </div>
        </section>

      </main>

      {/* Footer keys */}
      <footer className="max-w-7xl mx-auto px-6 pb-10 text-xs text-white/45 flex flex-wrap items-center gap-x-4 gap-y-2">
        <span><span className="kbd">Space</span> dunk</span>
        <span><span className="kbd">↑</span><span className="kbd">↓</span> temperature</span>
        <span><span className="kbd">←</span><span className="kbd">→</span> dunk time</span>
        <span><span className="kbd">W</span>/<span className="kbd">S</span> integrity</span>
        <span><span className="kbd">[</span>/<span className="kbd">]</span> biscuit</span>
        <span><span className="kbd">1-8</span> jump</span>
        <span><span className="kbd">R</span> reset</span>
        <span><span className="kbd">?</span> help</span>
        <span className="ml-auto">Crafted with a splash of Earl Grey · The Biscuit Lab</span>
      </footer>

      {/* Help modal */}
      {helpOpen && (
        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-6"
             onClick={()=>setHelpOpen(false)}>
          <div className="glass glass-strong p-6 max-w-md w-full" onClick={e=>e.stopPropagation()}>
            <div className="flex items-center justify-between mb-4">
              <h3 className="font-display text-xl">Keyboard Shortcuts</h3>
              <button onClick={()=>setHelpOpen(false)} className="chip hover:bg-white/10">close</button>
            </div>
            <div className="grid grid-cols-2 gap-3 text-sm">
              {[
                ['Space','Dunk!'],
                ['↑ ↓','Adjust temperature'],
                ['← →','Adjust dunk time'],
                ['W / S','Integrity +/-'],
                ['[ / ]','Prev / Next biscuit'],
                ['1-8','Pick biscuit'],
                ['R','Reset all'],
                ['?','Toggle this help'],
              ].map(([k,v])=>(
                <div key={k} className="flex items-center justify-between glass-strong rounded-lg px-3 py-2">
                  <span className="text-white/70">{v}</span>
                  <span className="kbd">{k}</span>
                </div>
              ))}
            </div>
            <p className="text-xs text-white/45 mt-4 italic">Pro tip: hold the biscuit pinched, lower slowly, retrieve with purpose.</p>
          </div>
        </div>
      )}
    </div>
  );
}

function Stat({ label, value, bar, tone }) {
  const colors = {
    warm:   'linear-gradient(90deg, #e6c25a, #ef6a4b)',
    blue:   'linear-gradient(90deg, #6aa8ef, #b78cff)',
    danger: 'linear-gradient(90deg, #7fc28a, #e6c25a, #ef6a4b)',
    accent: 'linear-gradient(90deg, #d9a566, #e8c789)',
  };
  return (
    <div>
      <div className="flex justify-between text-xs mb-1">
        <span className="text-white/60">{label}</span>
        <span className="text-white/80 tabular-nums">{value}</span>
      </div>
      <div className="h-1.5 rounded-full bg-white/5 overflow-hidden relative">
        <div className="h-full shimmer" style={{ width: Math.min(100, bar*100)+'%', background: colors[tone] || colors.accent }}></div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
