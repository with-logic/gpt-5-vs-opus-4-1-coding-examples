<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Festival Lights Show</title>
<style>
  :root {
    --bg-0: #05010f;
    --bg-1: #0a0420;
    --panel: rgba(18, 10, 40, 0.7);
    --panel-border: rgba(160, 100, 255, 0.25);
    --accent-1: #ff2bd6;
    --accent-2: #00e5ff;
    --accent-3: #ffe14d;
    --text: #f3e9ff;
    --muted: #a99fc8;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
  body {
    font-family: "Segoe UI", "Inter", system-ui, -apple-system, sans-serif;
    color: var(--text);
    background: radial-gradient(ellipse at top, #1a0533 0%, #05010f 60%, #000 100%);
    user-select: none;
    -webkit-user-select: none;
  }

  #stage {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  #stage canvas { display: block; width: 100%; height: 100%; }

  /* Floor reflection / haze */
  .haze {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 40%;
    pointer-events: none;
    background:
      radial-gradient(ellipse at 50% 100%, rgba(255,43,214,0.15), transparent 70%),
      radial-gradient(ellipse at 20% 100%, rgba(0,229,255,0.10), transparent 70%),
      radial-gradient(ellipse at 80% 100%, rgba(255,225,77,0.08), transparent 70%);
    mix-blend-mode: screen;
    z-index: 1;
  }

  /* Header */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 22px;
    z-index: 10;
    pointer-events: none;
  }

  .brand {
    display: flex; align-items: center; gap: 12px;
    pointer-events: auto;
  }
  .logo {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, #ff2bd6, #ffe14d, #00e5ff, #7a2bff, #ff2bd6);
    filter: drop-shadow(0 0 12px rgba(255, 43, 214, 0.6));
    animation: spin 6s linear infinite;
    position: relative;
  }
  .logo::after {
    content: "";
    position: absolute; inset: 6px;
    border-radius: 50%;
    background: var(--bg-0);
  }
  .logo::before {
    content: "";
    position: absolute; inset: 14px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 0 10px #fff, 0 0 20px #ff2bd6;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .title {
    font-weight: 800;
    font-size: 20px;
    letter-spacing: 1.2px;
    background: linear-gradient(90deg, #ff2bd6, #ffe14d, #00e5ff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 0 20px rgba(255, 43, 214, 0.1);
  }
  .subtitle {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .bpm-badge {
    pointer-events: auto;
    font-family: "SF Mono", "Menlo", monospace;
    font-size: 12px;
    color: var(--muted);
    padding: 6px 12px;
    border: 1px solid var(--panel-border);
    border-radius: 999px;
    background: rgba(10, 4, 32, 0.4);
    backdrop-filter: blur(8px);
  }
  .bpm-badge strong {
    color: var(--accent-3);
    font-weight: 700;
  }

  /* Control Panel */
  .panel {
    position: fixed;
    left: 20px;
    bottom: 20px;
    width: 340px;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 18px;
    padding: 16px 16px 14px 16px;
    z-index: 10;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    box-shadow: 0 10px 40px rgba(0,0,0,0.5), 0 0 40px rgba(122, 43, 255, 0.15) inset;
  }

  .panel h3 {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin: 10px 0 8px 0;
    font-weight: 600;
  }
  .panel h3:first-child { margin-top: 0; }

  .pattern-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }
  .pat-btn {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--text);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.5px;
    padding: 10px 4px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.18s ease;
    text-transform: uppercase;
  }
  .pat-btn:hover {
    background: rgba(255, 43, 214, 0.15);
    border-color: rgba(255, 43, 214, 0.4);
    transform: translateY(-1px);
  }
  .pat-btn.active {
    background: linear-gradient(135deg, rgba(255,43,214,0.3), rgba(0,229,255,0.3));
    border-color: rgba(255,43,214,0.6);
    color: #fff;
    box-shadow: 0 0 16px rgba(255,43,214,0.4);
  }

  .palette-row {
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .palette {
    flex: 1;
    min-width: 60px;
    height: 28px;
    border-radius: 8px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }
  .palette:hover { transform: scale(1.05); }
  .palette.active { border-color: #fff; box-shadow: 0 0 14px rgba(255,255,255,0.4); }

  .slider-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .slider-row label { font-size: 10px; color: var(--muted); width: 52px; text-transform: uppercase; letter-spacing: 1px; }
  .slider-row .val {
    font-size: 11px; color: var(--accent-3); width: 36px; text-align: right;
    font-family: "SF Mono", "Menlo", monospace;
  }
  input[type="range"] {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 4px;
    background: linear-gradient(90deg, #ff2bd6, #00e5ff);
    border-radius: 4px;
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #fff;
    cursor: pointer;
    box-shadow: 0 0 10px rgba(255,255,255,0.6);
    border: 2px solid #ff2bd6;
  }
  input[type="range"]::-moz-range-thumb {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #fff;
    cursor: pointer;
    border: 2px solid #ff2bd6;
  }

  .row { display: flex; gap: 8px; }

  .btn {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.05);
    color: var(--text);
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn:hover { background: rgba(255,255,255,0.1); }

  .btn.primary {
    background: linear-gradient(135deg, #ff2bd6, #7a2bff);
    border-color: transparent;
    box-shadow: 0 4px 18px rgba(255, 43, 214, 0.35);
  }
  .btn.primary.on {
    background: linear-gradient(135deg, #00e5ff, #2bff9d);
    box-shadow: 0 4px 18px rgba(0, 229, 255, 0.45);
  }
  .btn.accent {
    background: linear-gradient(135deg, #ffe14d, #ff8c2b);
    border-color: transparent;
    color: #1a0533;
  }

  /* Right side info */
  .info {
    position: fixed;
    right: 20px;
    bottom: 20px;
    width: 240px;
    padding: 14px;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 18px;
    z-index: 10;
    backdrop-filter: blur(14px);
    font-size: 11px;
    color: var(--muted);
    line-height: 1.6;
  }
  .info h3 {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent-2);
    margin: 0 0 8px 0;
  }
  .info kbd {
    display: inline-block;
    padding: 2px 6px;
    background: rgba(255,255,255,0.08);
    border-radius: 4px;
    font-family: "SF Mono", monospace;
    font-size: 10px;
    color: #fff;
    margin: 0 2px;
    border: 1px solid rgba(255,255,255,0.1);
  }

  /* VU meter */
  .vu {
    display: flex;
    gap: 3px;
    height: 28px;
    padding: 4px;
    background: rgba(0,0,0,0.4);
    border-radius: 8px;
    margin-top: 6px;
  }
  .vu .bar {
    flex: 1;
    background: linear-gradient(to top, #00e5ff, #ff2bd6, #ffe14d);
    border-radius: 2px;
    transform: scaleY(0.05);
    transform-origin: bottom;
    transition: transform 0.05s;
  }

  /* Loader toast */
  .toast {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    padding: 10px 18px;
    background: rgba(10,4,32,0.9);
    border: 1px solid var(--panel-border);
    border-radius: 999px;
    color: #fff;
    font-size: 12px;
    letter-spacing: 1px;
    z-index: 100;
    opacity: 0;
    transition: all 0.35s;
    pointer-events: none;
    backdrop-filter: blur(12px);
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  @media (max-width: 720px) {
    .panel { width: calc(100% - 40px); }
    .info { display: none; }
  }
</style>
</head>
<body>

<div id="stage">
  <canvas id="c"></canvas>
</div>
<div class="haze"></div>

<header>
  <div class="brand">
    <div class="logo"></div>
    <div>
      <div class="title">FESTIVAL LIGHTS</div>
      <div class="subtitle">Live Show Controller</div>
    </div>
  </div>
  <div class="bpm-badge">BPM <strong id="bpmVal">120</strong> · BEAT <strong id="beatVal">1</strong></div>
</header>

<div class="panel">
  <h3>Pattern</h3>
  <div class="pattern-grid" id="patternGrid"></div>

  <h3>Palette</h3>
  <div class="palette-row" id="paletteRow"></div>

  <h3>Dynamics</h3>
  <div class="slider-row">
    <label>BPM</label>
    <input type="range" id="bpm" min="60" max="180" value="120" />
    <span class="val" id="bpmOut">120</span>
  </div>
  <div class="slider-row">
    <label>Energy</label>
    <input type="range" id="energy" min="0" max="100" value="70" />
    <span class="val" id="energyOut">70</span>
  </div>
  <div class="slider-row">
    <label>Strobe</label>
    <input type="range" id="strobe" min="0" max="100" value="0" />
    <span class="val" id="strobeOut">0</span>
  </div>

  <h3>Music</h3>
  <div class="row" style="margin-bottom:6px;">
    <button class="btn primary" id="playBtn">▶ PLAY SYNTH</button>
    <button class="btn accent" id="micBtn">🎤 MIC</button>
  </div>
  <div class="vu" id="vu"></div>

  <div class="row" style="margin-top:10px;">
    <button class="btn" id="dropBtn">💥 DROP</button>
    <button class="btn" id="randBtn">🎲 RANDOM</button>
  </div>
</div>

<div class="info">
  <h3>Shortcuts</h3>
  <div><kbd>Space</kbd> Drop / Flash</div>
  <div><kbd>1</kbd>–<kbd>8</kbd> Pattern</div>
  <div><kbd>P</kbd> Play music</div>
  <div><kbd>M</kbd> Toggle mic</div>
  <div><kbd>R</kbd> Random preset</div>
  <div style="margin-top:8px; color: var(--accent-1);">Click stage to emit fireworks</div>
</div>

<div class="toast" id="toast"></div>

<script>
(() => {
  'use strict';

  // -------------------- Canvas setup --------------------
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d', { alpha: false });
  let W = 0, H = 0, DPR = Math.min(window.devicePixelRatio || 1, 2);

  function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  // -------------------- Palettes --------------------
  const palettes = [
    { name: 'Neon',     colors: ['#ff2bd6', '#00e5ff', '#ffe14d', '#7a2bff', '#2bff9d'] },
    { name: 'Sunset',   colors: ['#ff4e50', '#f9d423', '#ff9d6c', '#ff2e63', '#ffb347'] },
    { name: 'Ocean',    colors: ['#00c6ff', '#0072ff', '#00ffa3', '#3dfff5', '#3b5998'] },
    { name: 'Rainbow',  colors: ['#ff0040', '#ff8000', '#ffff00', '#00ff40', '#00aaff', '#8000ff'] },
    { name: 'Mono',     colors: ['#ff2bd6', '#ff66e2', '#ff99ec', '#ffccf5', '#ffffff'] },
    { name: 'Forest',   colors: ['#2bff9d', '#00e5ff', '#88ff00', '#ffe14d', '#a8ff3c'] },
  ];
  let paletteIdx = 0;

  function getColor(i, a = 1) {
    const pal = palettes[paletteIdx].colors;
    const hex = pal[((i % pal.length) + pal.length) % pal.length];
    return hexToRgba(hex, a);
  }
  function hexToRgba(hex, a) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return `rgba(${r},${g},${b},${a})`;
  }

  // -------------------- State --------------------
  const state = {
    pattern: 0,
    bpm: 120,
    energy: 0.7,
    strobe: 0,
    beat: 0,
    phase: 0,         // beat phase 0..1
    lastBeatTime: 0,
    time: 0,
    audioLevel: 0,
    audioPulse: 0,    // decays after each beat
    flash: 0,
    micActive: false,
    playing: false,
  };

  const patterns = [
    { id: 'rays',     name: 'Rays' },
    { id: 'spots',    name: 'Spots' },
    { id: 'lasers',   name: 'Lasers' },
    { id: 'pulse',    name: 'Pulse' },
    { id: 'wave',     name: 'Wave' },
    { id: 'kaleido',  name: 'Kaleid' },
    { id: 'matrix',   name: 'Matrix' },
    { id: 'fireworks',name: 'Fire' },
  ];

  // -------------------- UI wiring --------------------
  const patternGrid = document.getElementById('patternGrid');
  patterns.forEach((p, i) => {
    const b = document.createElement('button');
    b.className = 'pat-btn' + (i === 0 ? ' active' : '');
    b.textContent = p.name;
    b.dataset.idx = i;
    b.addEventListener('click', () => selectPattern(i));
    patternGrid.appendChild(b);
  });

  const paletteRow = document.getElementById('paletteRow');
  palettes.forEach((p, i) => {
    const el = document.createElement('div');
    el.className = 'palette' + (i === 0 ? ' active' : '');
    el.style.background = `linear-gradient(90deg, ${p.colors.join(',')})`;
    el.title = p.name;
    el.addEventListener('click', () => selectPalette(i));
    paletteRow.appendChild(el);
  });

  function selectPattern(i) {
    state.pattern = i;
    [...patternGrid.children].forEach((b, idx) => b.classList.toggle('active', idx === i));
    showToast(`Pattern: ${patterns[i].name.toUpperCase()}`);
  }
  function selectPalette(i) {
    paletteIdx = i;
    [...paletteRow.children].forEach((b, idx) => b.classList.toggle('active', idx === i));
    showToast(`Palette: ${palettes[i].name.toUpperCase()}`);
  }

  const bpmSlider = document.getElementById('bpm');
  const energySlider = document.getElementById('energy');
  const strobeSlider = document.getElementById('strobe');
  const bpmOut = document.getElementById('bpmOut');
  const energyOut = document.getElementById('energyOut');
  const strobeOut = document.getElementById('strobeOut');
  const bpmVal = document.getElementById('bpmVal');
  const beatVal = document.getElementById('beatVal');

  bpmSlider.addEventListener('input', () => { state.bpm = +bpmSlider.value; bpmOut.textContent = state.bpm; bpmVal.textContent = state.bpm; });
  energySlider.addEventListener('input', () => { state.energy = +energySlider.value / 100; energyOut.textContent = energySlider.value; });
  strobeSlider.addEventListener('input', () => { state.strobe = +strobeSlider.value / 100; strobeOut.textContent = strobeSlider.value; });

  // Toast
  const toast = document.getElementById('toast');
  let toastTimer;
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 1400);
  }

  // -------------------- VU meter --------------------
  const vuEl = document.getElementById('vu');
  const VU_BARS = 32;
  const vuBars = [];
  for (let i = 0; i < VU_BARS; i++) {
    const b = document.createElement('div');
    b.className = 'bar';
    vuEl.appendChild(b);
    vuBars.push(b);
  }

  // -------------------- Audio engine --------------------
  let audioCtx = null;
  let masterGain = null;
  let analyser = null;
  let freqData = null;
  let micStream = null;
  let micSource = null;
  let synthNodes = [];
  let synthTimer = null;

  function ensureAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = audioCtx.createGain();
      masterGain.gain.value = 0.25;
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 128;
      analyser.smoothingTimeConstant = 0.75;
      freqData = new Uint8Array(analyser.frequencyBinCount);
      masterGain.connect(analyser);
      analyser.connect(audioCtx.destination);
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }

  // Simple synth groove: kick + bass + arpeggio synced to BPM
  function startSynth() {
    ensureAudio();
    stopSynth();
    const scale = [0, 3, 5, 7, 10, 12, 15, 17]; // minor pentatonic-ish
    const root = 110; // A2
    let step = 0;

    const tick = () => {
      if (!state.playing) return;
      const now = audioCtx.currentTime;
      const beatDur = 60 / state.bpm;
      const stepDur = beatDur / 2; // 8th notes

      // Kick on every beat
      if (step % 2 === 0) {
        playKick(now);
      }
      // Snare on 2 and 4
      if (step % 8 === 4) {
        playSnare(now);
      }
      // Hats on every 8th
      playHat(now, step % 2 === 0 ? 0.12 : 0.06);

      // Bass on 1 and 3
      if (step % 4 === 0) {
        const note = scale[(step / 4) % scale.length];
        playBass(now, root * Math.pow(2, note / 12));
      }
      // Arp
      if (step % 2 === 1) {
        const note = scale[step % scale.length] + 12;
        playArp(now, root * Math.pow(2, note / 12));
      }

      step++;
      synthTimer = setTimeout(tick, stepDur * 1000);
    };
    tick();
  }

  function stopSynth() {
    if (synthTimer) { clearTimeout(synthTimer); synthTimer = null; }
    synthNodes.forEach(n => { try { n.stop(); } catch(e){} });
    synthNodes = [];
  }

  function playKick(t) {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.frequency.setValueAtTime(140, t);
    osc.frequency.exponentialRampToValueAtTime(40, t + 0.15);
    g.gain.setValueAtTime(0.9, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
    osc.connect(g).connect(masterGain);
    osc.start(t); osc.stop(t + 0.4);
  }
  function playSnare(t) {
    const bufferSize = audioCtx.sampleRate * 0.2;
    const buf = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    const bp = audioCtx.createBiquadFilter();
    bp.type = 'bandpass'; bp.frequency.value = 1800;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.5, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
    src.connect(bp).connect(g).connect(masterGain);
    src.start(t); src.stop(t + 0.2);
  }
  function playHat(t, vol) {
    const bufferSize = audioCtx.sampleRate * 0.05;
    const buf = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    const hp = audioCtx.createBiquadFilter();
    hp.type = 'highpass'; hp.frequency.value = 7000;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
    src.connect(hp).connect(g).connect(masterGain);
    src.start(t); src.stop(t + 0.06);
  }
  function playBass(t, freq) {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(freq, t);
    const lp = audioCtx.createBiquadFilter();
    lp.type = 'lowpass'; lp.frequency.value = 600;
    g.gain.setValueAtTime(0.35, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
    osc.connect(lp).connect(g).connect(masterGain);
    osc.start(t); osc.stop(t + 0.42);
  }
  function playArp(t, freq) {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime(0.12, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
    osc.connect(g).connect(masterGain);
    osc.start(t); osc.stop(t + 0.22);
  }

  // Microphone
  async function toggleMic() {
    if (state.micActive) {
      if (micStream) micStream.getTracks().forEach(t => t.stop());
      micStream = null;
      if (micSource) micSource.disconnect();
      micSource = null;
      state.micActive = false;
      document.getElementById('micBtn').textContent = '🎤 MIC';
      showToast('MIC OFF');
      return;
    }
    try {
      ensureAudio();
      micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      micSource = audioCtx.createMediaStreamSource(micStream);
      micSource.connect(analyser);
      state.micActive = true;
      document.getElementById('micBtn').textContent = '🎤 ON';
      showToast('MIC LISTENING');
    } catch(e) {
      showToast('MIC DENIED');
    }
  }

  // -------------------- Particles (fireworks, bursts) --------------------
  const particles = [];
  function spawnBurst(x, y, count, color, speed = 4) {
    for (let i = 0; i < count; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = Math.random() * speed + 1;
      particles.push({
        x, y,
        vx: Math.cos(a) * s,
        vy: Math.sin(a) * s - 1,
        life: 1,
        decay: 0.012 + Math.random() * 0.015,
        size: 2 + Math.random() * 3,
        color: color || getColor(i, 1),
      });
    }
  }

  canvas.addEventListener('click', (e) => {
    spawnBurst(e.clientX, e.clientY, 60, null, 6);
  });

  // -------------------- Input: keyboard --------------------
  window.addEventListener('keydown', (e) => {
    if (e.key === ' ') { e.preventDefault(); triggerDrop(); }
    else if (e.key >= '1' && e.key <= '8') {
      const i = +e.key - 1; if (i < patterns.length) selectPattern(i);
    }
    else if (e.key.toLowerCase() === 'p') document.getElementById('playBtn').click();
    else if (e.key.toLowerCase() === 'm') document.getElementById('micBtn').click();
    else if (e.key.toLowerCase() === 'r') randomPreset();
  });

  function triggerDrop() {
    state.flash = 1;
    spawnBurst(W/2, H*0.6, 160, null, 10);
    for (let i = 0; i < 5; i++) {
      setTimeout(() => spawnBurst(Math.random()*W, Math.random()*H*0.7 + H*0.1, 50, null, 7), i*80);
    }
    showToast('💥 DROP!');
  }

  function randomPreset() {
    selectPattern(Math.floor(Math.random() * patterns.length));
    selectPalette(Math.floor(Math.random() * palettes.length));
    const newBpm = 90 + Math.floor(Math.random() * 70);
    bpmSlider.value = newBpm; state.bpm = newBpm;
    bpmOut.textContent = newBpm; bpmVal.textContent = newBpm;
    energySlider.value = 50 + Math.floor(Math.random() * 50);
    state.energy = +energySlider.value / 100; energyOut.textContent = energySlider.value;
    showToast('🎲 RANDOMIZED');
  }

  document.getElementById('dropBtn').addEventListener('click', triggerDrop);
  document.getElementById('randBtn').addEventListener('click', randomPreset);

  const playBtn = document.getElementById('playBtn');
  playBtn.addEventListener('click', () => {
    state.playing = !state.playing;
    if (state.playing) {
      playBtn.classList.add('on');
      playBtn.textContent = '⏸ PAUSE';
      startSynth();
      showToast('SYNTH PLAYING');
    } else {
      playBtn.classList.remove('on');
      playBtn.textContent = '▶ PLAY SYNTH';
      stopSynth();
      showToast('PAUSED');
    }
  });

  document.getElementById('micBtn').addEventListener('click', toggleMic);

  // -------------------- Main render loop --------------------
  let lastT = performance.now();
  function frame(now) {
    const dt = Math.min(50, now - lastT) / 1000;
    lastT = now;
    state.time += dt;

    // Beat progression
    const beatDur = 60 / state.bpm;
    state.phase += dt / beatDur;
    while (state.phase >= 1) {
      state.phase -= 1;
      state.beat = (state.beat + 1) % 4;
      state.audioPulse = 1;
      beatVal.textContent = state.beat + 1;
    }
    state.audioPulse *= Math.pow(0.06, dt); // fast decay

    // Audio analysis
    let audioEnergy = 0;
    if (analyser) {
      analyser.getByteFrequencyData(freqData);
      let sum = 0;
      for (let i = 0; i < freqData.length; i++) sum += freqData[i];
      audioEnergy = sum / (freqData.length * 255);
      // Update VU
      const step = Math.floor(freqData.length / VU_BARS);
      for (let i = 0; i < VU_BARS; i++) {
        let v = 0;
        for (let j = 0; j < step; j++) v = Math.max(v, freqData[i * step + j]);
        vuBars[i].style.transform = `scaleY(${Math.max(0.05, v / 255)})`;
      }
    }
    state.audioLevel = state.audioLevel * 0.85 + audioEnergy * 0.15;

    // Strobe flash
    const strobeHit = state.strobe > 0 && Math.random() < state.strobe * 0.4;

    // Clear with slight trail fade for motion blur
    const fade = 0.18 + (1 - state.energy) * 0.15;
    ctx.fillStyle = `rgba(5, 1, 15, ${fade})`;
    ctx.fillRect(0, 0, W, H);

    // Background glow
    drawBackground();

    // Pattern
    const pat = patterns[state.pattern].id;
    if (pat === 'rays')      drawRays();
    else if (pat === 'spots')    drawSpots();
    else if (pat === 'lasers')   drawLasers();
    else if (pat === 'pulse')    drawPulse();
    else if (pat === 'wave')     drawWave();
    else if (pat === 'kaleido')  drawKaleido();
    else if (pat === 'matrix')   drawMatrix();
    else if (pat === 'fireworks')drawFireworks();

    // Particles
    drawParticles(dt);

    // Strobe
    if (strobeHit || state.flash > 0.01) {
      const intensity = Math.max(state.flash, strobeHit ? 0.7 : 0);
      ctx.fillStyle = `rgba(255,255,255,${intensity})`;
      ctx.fillRect(0, 0, W, H);
      state.flash *= 0.85;
    }

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  // -------------------- Drawing helpers --------------------
  function beatPulse() {
    // Combines beat phase, audio level and pulse
    const beatP = 1 - state.phase;
    return Math.max(beatP * beatP, state.audioLevel * 1.5, state.audioPulse);
  }

  function drawBackground() {
    const pulse = beatPulse();
    const cx = W/2, cy = H * 0.55;
    const r = Math.max(W, H) * (0.5 + pulse * 0.3);
    const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
    g.addColorStop(0, getColor(state.beat, 0.25 * pulse + 0.05));
    g.addColorStop(0.5, getColor(state.beat + 1, 0.08));
    g.addColorStop(1, 'rgba(5,1,15,0)');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
  }

  // Pattern 1: Rays from above
  function drawRays() {
    const pulse = beatPulse();
    const n = 12;
    const originY = -40;
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (let i = 0; i < n; i++) {
      const t = i / n;
      const baseX = W * t + (W/n)/2;
      const sway = Math.sin(state.time * 1.2 + i * 0.7) * W * 0.15;
      const originX = baseX + sway;
      const targetY = H * 0.9;
      const spread = 120 + Math.sin(state.time * 2 + i) * 40;
      const col = getColor(i + state.beat, 0.75);
      const colEnd = getColor(i + state.beat, 0);

      const g = ctx.createLinearGradient(originX, originY, originX, targetY);
      g.addColorStop(0, col);
      g.addColorStop(1, colEnd);
      ctx.fillStyle = g;

      ctx.beginPath();
      ctx.moveTo(originX - 6, originY);
      ctx.lineTo(originX + 6, originY);
      ctx.lineTo(originX + spread * (0.6 + pulse * 0.8), targetY);
      ctx.lineTo(originX - spread * (0.6 + pulse * 0.8), targetY);
      ctx.closePath();
      ctx.fill();

      // Light source
      ctx.fillStyle = getColor(i + state.beat, 0.9);
      ctx.beginPath();
      ctx.arc(originX, originY + 20, 6 + pulse * 8, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  // Pattern 2: Moving spot lights (circles)
  function drawSpots() {
    const pulse = beatPulse();
    const n = 6;
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (let i = 0; i < n; i++) {
      const angle = state.time * (0.5 + i * 0.1) + i * (Math.PI * 2 / n);
      const r = Math.min(W, H) * (0.25 + Math.sin(state.time * 0.6 + i) * 0.1);
      const x = W/2 + Math.cos(angle) * r;
      const y = H/2 + Math.sin(angle * 1.3) * r * 0.6;
      const rad = 120 + pulse * 80;
      const g = ctx.createRadialGradient(x, y, 0, x, y, rad);
      g.addColorStop(0, getColor(i + state.beat, 0.9));
      g.addColorStop(0.4, getColor(i + state.beat, 0.4));
      g.addColorStop(1, getColor(i + state.beat, 0));
      ctx.fillStyle = g;
      ctx.fillRect(x - rad, y - rad, rad * 2, rad * 2);
    }
    ctx.restore();
  }

  // Pattern 3: Laser grid
  function drawLasers() {
    const pulse = beatPulse();
    const cx = W/2, cy = H * 0.8;
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    const n = 24;
    for (let i = 0; i < n; i++) {
      const t = i / n;
      const angle = -Math.PI/2 + (t - 0.5) * Math.PI * 0.9 + Math.sin(state.time + i * 0.3) * 0.12;
      const len = Math.max(W, H) * 1.2;
      const x2 = cx + Math.cos(angle) * len;
      const y2 = cy + Math.sin(angle) * len;
      ctx.strokeStyle = getColor(i + state.beat, 0.5 + pulse * 0.4);
      ctx.lineWidth = 1 + pulse * 2;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(x2, y2);
      ctx.stroke();
    }
    // Center glow
    const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, 80 + pulse * 40);
    g.addColorStop(0, getColor(state.beat, 1));
    g.addColorStop(1, getColor(state.beat, 0));
    ctx.fillStyle = g;
    ctx.fillRect(cx - 120, cy - 120, 240, 240);
    ctx.restore();
  }

  // Pattern 4: Concentric pulse
  function drawPulse() {
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    const cx = W/2, cy = H/2;
    const rings = 8;
    const maxR = Math.max(W, H) * 0.7;
    for (let i = 0; i < rings; i++) {
      const phase = (state.time * 0.5 + i / rings) % 1;
      const r = phase * maxR;
      const alpha = (1 - phase) * 0.7 * (0.5 + state.energy * 0.5);
      ctx.strokeStyle = getColor(i + state.beat, alpha);
      ctx.lineWidth = 3 + beatPulse() * 6;
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.restore();
  }

  // Pattern 5: Wave bars (EQ style)
  function drawWave() {
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    const bars = 48;
    const bw = W / bars;
    for (let i = 0; i < bars; i++) {
      const freqVal = freqData ? freqData[i % freqData.length] / 255 : 0;
      const sineVal = (Math.sin(state.time * 3 + i * 0.35) * 0.5 + 0.5);
      const v = Math.max(sineVal * state.energy, freqVal);
      const h = v * H * 0.7;
      const x = i * bw;
      const g = ctx.createLinearGradient(0, H, 0, H - h);
      g.addColorStop(0, getColor(i + state.beat, 0.9));
      g.addColorStop(1, getColor(i + state.beat + 2, 0.3));
      ctx.fillStyle = g;
      ctx.fillRect(x + 1, H - h, bw - 2, h);
      // Mirror top
      const g2 = ctx.createLinearGradient(0, 0, 0, h * 0.5);
      g2.addColorStop(0, getColor(i + state.beat, 0.5));
      g2.addColorStop(1, getColor(i + state.beat, 0));
      ctx.fillStyle = g2;
      ctx.fillRect(x + 1, 0, bw - 2, h * 0.4);
    }
    ctx.restore();
  }

  // Pattern 6: Kaleidoscope
  function drawKaleido() {
    const pulse = beatPulse();
    ctx.save();
    ctx.translate(W/2, H/2);
    ctx.globalCompositeOperation = 'lighter';
    const segs = 8;
    for (let s = 0; s < segs; s++) {
      ctx.save();
      ctx.rotate((s / segs) * Math.PI * 2 + state.time * 0.3);
      for (let i = 0; i < 10; i++) {
        const r = 30 + i * 28 + Math.sin(state.time * 2 + i) * 10;
        const a = state.time * 0.6 + i * 0.4;
        const x = Math.cos(a) * r;
        const y = Math.sin(a) * r;
        const rad = 12 + pulse * 20 + Math.sin(state.time * 4 + i) * 6;
        const g = ctx.createRadialGradient(x, y, 0, x, y, rad);
        g.addColorStop(0, getColor(i + s + state.beat, 0.9));
        g.addColorStop(1, getColor(i + s + state.beat, 0));
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(x, y, rad, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }
    ctx.restore();
  }

  // Pattern 7: Matrix / grid of dots
  function drawMatrix() {
    const pulse = beatPulse();
    const cols = 28;
    const rows = 18;
    const gx = W / cols, gy = H / rows;
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (let i = 0; i < cols; i++) {
      for (let j = 0; j < rows; j++) {
        const cx = i * gx + gx/2;
        const cy = j * gy + gy/2;
        const d = Math.hypot(cx - W/2, cy - H/2);
        const phase = Math.sin(state.time * 3 - d * 0.01 + (i + j) * 0.2) * 0.5 + 0.5;
        const v = phase * (0.5 + state.energy * 0.5) + pulse * 0.3;
        if (v < 0.35) continue;
        const r = Math.min(gx, gy) * 0.35 * v;
        ctx.fillStyle = getColor(i + j + state.beat, v);
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    ctx.restore();
  }

  // Pattern 8: Auto fireworks
  let lastFirework = 0;
  function drawFireworks() {
    const pulse = beatPulse();
    if (state.time - lastFirework > 0.25 / (0.3 + state.energy) || pulse > 0.8) {
      if (Math.random() < 0.7 + pulse * 0.3) {
        spawnBurst(
          Math.random() * W * 0.8 + W * 0.1,
          Math.random() * H * 0.5 + H * 0.1,
          40 + Math.floor(Math.random() * 40),
          null,
          4 + Math.random() * 4
        );
        lastFirework = state.time;
      }
    }
    // Trails rising
    if (Math.random() < 0.05 + pulse * 0.1) {
      particles.push({
        x: Math.random() * W,
        y: H,
        vx: (Math.random() - 0.5) * 0.5,
        vy: -6 - Math.random() * 3,
        life: 1, decay: 0.02,
        size: 2, color: getColor(state.beat, 1),
        trail: true,
      });
    }
  }

  // Particles
  function drawParticles(dt) {
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.08; // gravity
      p.vx *= 0.99;
      p.life -= p.decay;
      if (p.life <= 0 || p.y > H + 20) {
        particles.splice(i, 1);
        continue;
      }
      if (p.trail && p.vy > 0) {
        // explode
        spawnBurst(p.x, p.y, 50, null, 5);
        particles.splice(i, 1);
        continue;
      }
      const col = p.color.replace(/[\d.]+\)$/g, (p.life).toFixed(3) + ')');
      ctx.fillStyle = col;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  // -------------------- Init --------------------
  showToast('WELCOME TO FESTIVAL LIGHTS');
})();
</script>
</body>
</html>
