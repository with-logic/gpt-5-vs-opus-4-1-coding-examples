<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Polyglot — Language Flashcards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Serif+JP:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0:#0a0a1a;
    --bg-1:#12122b;
    --bg-2:#1a1a3e;
    --ink:#f5f5ff;
    --ink-dim:#a9a9c9;
    --ink-faint:#6b6b8a;
    --accent:#7c5cff;
    --accent-2:#ff5cb4;
    --accent-3:#5cc8ff;
    --good:#4ade80;
    --gold:#fbbf24;
    --card-face:#ffffff;
    --card-ink:#141432;
    --shadow: 0 30px 60px -20px rgba(0,0,0,.5), 0 18px 36px -18px rgba(124,92,255,.35);
    --radius:22px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Inter',system-ui,-apple-system,sans-serif;
    color:var(--ink);
    min-height:100vh;
    overflow-x:hidden;
    background:
      radial-gradient(1200px 800px at 10% -10%, rgba(124,92,255,.28), transparent 60%),
      radial-gradient(1000px 700px at 100% 10%, rgba(255,92,180,.22), transparent 60%),
      radial-gradient(900px 700px at 50% 120%, rgba(92,200,255,.22), transparent 60%),
      linear-gradient(180deg, var(--bg-0), var(--bg-1) 60%, var(--bg-0));
    background-attachment: fixed;
  }
  body::before{
    content:"";
    position:fixed;inset:0;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(255,255,255,.04) 1px, transparent 1px),
      radial-gradient(circle at 80% 60%, rgba(255,255,255,.03) 1px, transparent 1px);
    background-size: 40px 40px, 60px 60px;
    pointer-events:none;z-index:0;
  }
  .shell{
    position:relative;z-index:1;
    max-width:1100px;
    margin:0 auto;
    padding:32px 24px 80px;
    min-height:100vh;
    display:flex;flex-direction:column;
  }
  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    gap:16px;margin-bottom:28px;flex-wrap:wrap;
  }
  .brand{
    display:flex;align-items:center;gap:12px;font-weight:700;letter-spacing:.2px;
  }
  .brand-mark{
    width:40px;height:40px;border-radius:12px;
    background:conic-gradient(from 140deg, #7c5cff, #ff5cb4, #5cc8ff, #7c5cff);
    box-shadow:0 10px 30px rgba(124,92,255,.5), inset 0 0 0 2px rgba(255,255,255,.15);
    position:relative;
  }
  .brand-mark::after{
    content:"";position:absolute;inset:6px;border-radius:8px;
    background:linear-gradient(135deg, rgba(10,10,26,.85), rgba(10,10,26,.5));
    box-shadow: inset 0 0 12px rgba(255,255,255,.15);
  }
  .brand-text{font-size:18px}
  .brand-text small{display:block;font-weight:400;color:var(--ink-dim);font-size:12px;letter-spacing:.4px}

  .lang-chips{display:flex;gap:8px;flex-wrap:wrap}
  .chip{
    border:1px solid rgba(255,255,255,.12);
    background:rgba(255,255,255,.04);
    color:var(--ink);
    padding:8px 14px;border-radius:999px;
    font-size:13px;font-weight:500;cursor:pointer;
    transition:all .2s ease;
    display:flex;align-items:center;gap:8px;
    backdrop-filter: blur(8px);
  }
  .chip:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.22)}
  .chip.active{
    background:linear-gradient(135deg, rgba(124,92,255,.35), rgba(255,92,180,.35));
    border-color:rgba(255,255,255,.35);
    box-shadow:0 8px 22px rgba(124,92,255,.25);
  }
  .chip .flag{font-size:16px}

  /* WELCOME MODAL */
  .modal-wrap{
    position:fixed;inset:0;z-index:50;
    display:flex;align-items:center;justify-content:center;
    padding:20px;
    background:radial-gradient(circle at center, rgba(10,10,26,.85), rgba(10,10,26,.98));
    backdrop-filter: blur(14px);
    transition:opacity .4s ease, visibility .4s ease;
  }
  .modal-wrap.hidden{opacity:0;visibility:hidden;pointer-events:none}
  .modal{
    width:min(560px,100%);
    background:linear-gradient(180deg, rgba(30,30,60,.9), rgba(18,18,43,.95));
    border:1px solid rgba(255,255,255,.12);
    border-radius:28px;
    padding:32px;
    box-shadow: var(--shadow);
    transform:scale(.96);opacity:0;
    animation: modalIn .5s cubic-bezier(.2,.8,.2,1) forwards;
  }
  @keyframes modalIn{to{transform:scale(1);opacity:1}}
  .modal h1{
    font-size:26px;font-weight:700;margin-bottom:6px;
    background:linear-gradient(135deg,#fff,#c9c0ff);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  }
  .modal p{color:var(--ink-dim);font-size:14px;margin-bottom:22px}
  .lang-grid{
    display:grid;grid-template-columns:repeat(2,1fr);gap:12px;
  }
  .lang-card{
    border:1px solid rgba(255,255,255,.12);
    background:rgba(255,255,255,.03);
    border-radius:18px;padding:18px;cursor:pointer;
    display:flex;flex-direction:column;gap:6px;
    transition:transform .2s ease, background .2s ease, border-color .2s ease;
    text-align:left;
  }
  .lang-card:hover{
    transform:translateY(-3px);
    background:rgba(255,255,255,.06);
    border-color:rgba(255,255,255,.28);
  }
  .lang-card .emoji{font-size:28px}
  .lang-card .name{font-size:16px;font-weight:600}
  .lang-card .native{font-size:13px;color:var(--ink-dim)}
  .modal-foot{margin-top:18px;font-size:12px;color:var(--ink-faint);text-align:center}

  /* HEADER */
  .hero{
    display:flex;align-items:center;justify-content:space-between;
    gap:20px;margin-bottom:16px;flex-wrap:wrap;
  }
  .hero h2{
    font-size:clamp(24px,3.2vw,36px);font-weight:700;letter-spacing:-.3px;
    background:linear-gradient(120deg,#fff 0%, #c9c0ff 50%, #ffc5e3 100%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  }
  .hero .sub{color:var(--ink-dim);font-size:14px;margin-top:4px}
  .progress-box{
    display:flex;align-items:center;gap:14px;
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.08);
    padding:10px 14px;border-radius:14px;
    backdrop-filter: blur(6px);
  }
  .ring{
    --p:0;
    width:48px;height:48px;border-radius:50%;
    background: conic-gradient(var(--good) calc(var(--p)*1%), rgba(255,255,255,.08) 0);
    display:grid;place-items:center;
    transition:background .5s ease;
  }
  .ring::after{
    content:"";width:38px;height:38px;border-radius:50%;background:var(--bg-1);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.06);
  }
  .ring span{position:absolute;font-size:11px;font-weight:600;color:var(--ink)}
  .ring-wrap{position:relative;display:grid;place-items:center}
  .progress-label{font-size:12px;color:var(--ink-dim)}
  .progress-label b{display:block;font-size:14px;color:var(--ink);font-weight:600}

  /* CONTROLS */
  .controls{
    display:flex;gap:10px;flex-wrap:wrap;margin:18px 0 24px;
  }
  .btn{
    appearance:none;border:none;cursor:pointer;
    font-family:inherit;font-weight:600;font-size:14px;
    padding:11px 18px;border-radius:12px;
    display:inline-flex;align-items:center;gap:8px;
    transition: transform .15s ease, box-shadow .2s ease, background .2s ease;
    background:rgba(255,255,255,.06);color:var(--ink);
    border:1px solid rgba(255,255,255,.1);
  }
  .btn:hover{background:rgba(255,255,255,.12);transform:translateY(-1px)}
  .btn:active{transform:translateY(0)}
  .btn.primary{
    background:linear-gradient(135deg, var(--accent), var(--accent-2));
    border-color:transparent;
    box-shadow:0 10px 22px rgba(124,92,255,.35);
  }
  .btn.primary:hover{box-shadow:0 14px 26px rgba(124,92,255,.5)}
  .btn.good{
    background:linear-gradient(135deg, #22c55e, #4ade80);
    border-color:transparent;color:#06220f;
    box-shadow:0 10px 22px rgba(74,222,128,.3);
  }
  .btn.ghost{background:transparent}
  .btn svg{width:16px;height:16px}

  /* CARD STAGE */
  .stage{
    perspective: 1800px;
    display:flex;justify-content:center;align-items:center;
    flex:1;min-height:420px;
    position:relative;
    margin:10px 0 22px;
  }
  .deck{
    position:relative;
    width:min(560px, 100%);
    height:360px;
  }
  .deck .shadow-layer{
    position:absolute;inset:10px;
    border-radius:var(--radius);
    background:rgba(255,255,255,.03);
    border:1px solid rgba(255,255,255,.06);
    transform: translateY(18px) scale(.96);
    opacity:.8;
  }
  .deck .shadow-layer.layer-2{transform:translateY(32px) scale(.92);opacity:.5}
  .card{
    position:absolute;inset:0;
    transform-style:preserve-3d;
    transition: transform .7s cubic-bezier(.2,.8,.2,1);
    cursor:pointer;
    will-change: transform;
  }
  .card.flipped{transform:rotateY(180deg)}
  .card.swipe-left{animation: swipeLeft .5s cubic-bezier(.4,0,.2,1) forwards}
  .card.swipe-right{animation: swipeRight .5s cubic-bezier(.4,0,.2,1) forwards}
  .card.incoming{animation: incoming .5s cubic-bezier(.2,.8,.2,1) forwards}
  .card.learned{animation: learnedPop .9s cubic-bezier(.2,.8,.2,1) forwards}
  @keyframes swipeLeft{to{transform:translateX(-130%) rotate(-12deg) scale(.9);opacity:0}}
  @keyframes swipeRight{to{transform:translateX(130%) rotate(12deg) scale(.9);opacity:0}}
  @keyframes incoming{
    0%{transform:translateY(30px) scale(.92);opacity:0}
    100%{transform:translateY(0) scale(1);opacity:1}
  }
  @keyframes learnedPop{
    0%{transform:scale(1)}
    30%{transform:scale(1.04);box-shadow:0 0 0 6px rgba(74,222,128,.35)}
    100%{transform:translateY(-30px) scale(.85);opacity:0}
  }

  .face{
    position:absolute;inset:0;
    backface-visibility:hidden;
    border-radius:var(--radius);
    padding:32px 34px;
    display:flex;flex-direction:column;justify-content:space-between;
    box-shadow: var(--shadow);
    overflow:hidden;
  }
  .face.front{
    background:
      radial-gradient(600px 300px at 10% 0%, rgba(124,92,255,.1), transparent 60%),
      linear-gradient(180deg, #ffffff, #f3f1ff);
    color:var(--card-ink);
  }
  .face.back{
    background:
      radial-gradient(600px 300px at 90% 100%, rgba(255,92,180,.15), transparent 60%),
      linear-gradient(180deg, #13132d, #1d1d45);
    color:#fff;
    transform: rotateY(180deg);
    border:1px solid rgba(255,255,255,.08);
  }
  .face .tag{
    display:inline-flex;align-items:center;gap:8px;
    font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;
    color:var(--accent);
  }
  .face.back .tag{color:#ffb3d9}
  .face .tag::before{
    content:"";width:6px;height:6px;border-radius:50%;
    background:currentColor;box-shadow:0 0 8px currentColor;
  }
  .phrase{
    font-size:clamp(24px,3.2vw,34px);
    font-weight:700;line-height:1.15;letter-spacing:-.3px;
  }
  .phrase.jp{font-family:'Noto Serif JP',serif;font-weight:600}
  .pron{
    font-size:13px;color:var(--ink-faint);margin-top:10px;font-style:italic;
  }
  .face.back .pron{color:#b6b6de}
  .hint{
    font-size:12px;color:var(--ink-faint);display:flex;align-items:center;gap:6px;
  }
  .face.back .hint{color:#8a8ab3}
  .hint kbd{
    background:rgba(0,0,0,.06);border:1px solid rgba(0,0,0,.1);
    padding:2px 6px;border-radius:5px;font-size:11px;font-family:inherit;
  }
  .face.back .hint kbd{
    background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.15);
  }
  .category{
    font-size:12px;color:var(--ink-dim);
    text-transform:uppercase;letter-spacing:.6px;font-weight:600;
  }
  .face .top-row{display:flex;justify-content:space-between;align-items:center}
  .learned-badge{
    position:absolute;top:22px;right:22px;
    background:var(--good);color:#052e14;
    font-size:11px;font-weight:700;letter-spacing:.5px;
    padding:5px 10px;border-radius:999px;
    display:flex;align-items:center;gap:4px;
  }

  /* NAVIGATION */
  .nav{
    display:flex;align-items:center;justify-content:center;gap:16px;
    margin-top:6px;
  }
  .nav .counter{
    min-width:80px;text-align:center;
    font-size:14px;color:var(--ink-dim);font-weight:500;
  }
  .nav .counter b{color:var(--ink);font-size:16px}
  .nav-btn{
    width:44px;height:44px;border-radius:50%;
    background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
    color:var(--ink);cursor:pointer;
    display:grid;place-items:center;
    transition: all .2s ease;
  }
  .nav-btn:hover{background:rgba(255,255,255,.12);transform:scale(1.05)}
  .nav-btn:disabled{opacity:.3;cursor:not-allowed}
  .nav-btn svg{width:18px;height:18px}

  /* DOT PROGRESS */
  .dots{
    display:flex;justify-content:center;gap:6px;margin-top:18px;flex-wrap:wrap;
  }
  .dot{
    width:8px;height:8px;border-radius:50%;
    background:rgba(255,255,255,.15);
    transition: all .3s ease;
  }
  .dot.active{background:var(--accent);width:20px;border-radius:4px}
  .dot.learned{background:var(--good)}

  /* TOAST */
  .toast{
    position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);
    background:rgba(20,20,50,.95);border:1px solid rgba(255,255,255,.12);
    color:#fff;padding:12px 18px;border-radius:12px;
    font-size:13px;font-weight:500;
    backdrop-filter:blur(8px);
    box-shadow:0 20px 40px rgba(0,0,0,.4);
    opacity:0;pointer-events:none;
    transition:opacity .3s ease, transform .3s ease;
    z-index:100;display:flex;align-items:center;gap:8px;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast.success{border-color:rgba(74,222,128,.4)}

  /* CONFETTI */
  .confetti{position:fixed;inset:0;pointer-events:none;z-index:99;overflow:hidden}
  .confetti span{
    position:absolute;top:-10px;width:8px;height:14px;opacity:.9;
    animation: fall 1.6s cubic-bezier(.3,.2,.4,1) forwards;
  }
  @keyframes fall{
    to{transform:translateY(110vh) rotate(720deg);opacity:0}
  }

  /* EMPTY */
  .empty{
    text-align:center;padding:60px 20px;color:var(--ink-dim);
  }
  .empty .icon{font-size:50px;margin-bottom:12px}
  .empty h3{color:var(--ink);font-size:20px;margin-bottom:6px}
  .empty p{font-size:14px;margin-bottom:18px}

  @media (max-width:640px){
    .progress-box{padding:8px 10px}
    .hero{flex-direction:column;align-items:flex-start}
    .deck{height:340px}
    .face{padding:26px 24px}
    .lang-grid{grid-template-columns:1fr}
  }
</style>
</head>
<body>

<!-- WELCOME MODAL -->
<div class="modal-wrap" id="welcome">
  <div class="modal">
    <h1 id="welcomeTitle">Which language would you like to learn?</h1>
    <p id="welcomeSub">Pick one to get started — you can change it anytime.</p>
    <div class="lang-grid" id="langGrid"></div>
    <div class="modal-foot" id="localeHint"></div>
  </div>
</div>

<div class="shell">
  <!-- TOP BAR -->
  <div class="topbar">
    <div class="brand">
      <div class="brand-mark"></div>
      <div class="brand-text">Polyglot
        <small id="brandSub">Travel Phrases</small>
      </div>
    </div>
    <div class="lang-chips" id="langChips"></div>
  </div>

  <!-- HERO -->
  <div class="hero">
    <div>
      <h2 id="heroTitle">Learn essential phrases</h2>
      <div class="sub" id="heroSub">Tap the card to flip. Swipe to navigate.</div>
    </div>
    <div class="progress-box">
      <div class="ring-wrap">
        <div class="ring" id="ring" style="--p:0"></div>
        <span id="ringLabel">0%</span>
      </div>
      <div class="progress-label">
        <span id="progressText">Progress</span>
        <b><span id="learnedCount">0</span> / <span id="totalCount">10</span></b>
      </div>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <button class="btn primary" id="shuffleBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
      <span data-i18n="shuffle">Shuffle</span>
    </button>
    <button class="btn good" id="learnedBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      <span data-i18n="learned">Mark as learned</span>
    </button>
    <button class="btn ghost" id="resetBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><polyline points="3 3 3 8 8 8"/></svg>
      <span data-i18n="reset">Reset</span>
    </button>
  </div>

  <!-- CARD STAGE -->
  <div class="stage">
    <div class="deck" id="deck">
      <div class="shadow-layer layer-2"></div>
      <div class="shadow-layer"></div>
      <div class="card" id="card">
        <div class="face front">
          <div class="top-row">
            <span class="tag" id="frontTag">Phrase</span>
            <span class="category" id="cardCategory">—</span>
          </div>
          <div>
            <div class="phrase" id="frontPhrase">—</div>
            <div class="pron" id="frontPron"></div>
          </div>
          <div class="hint"><span data-i18n="tapHint">Tap card to reveal</span> · <kbd>Space</kbd></div>
        </div>
        <div class="face back">
          <div class="top-row">
            <span class="tag" id="backTag">Translation</span>
            <span class="category" id="cardCategoryBack">—</span>
          </div>
          <div>
            <div class="phrase" id="backPhrase">—</div>
            <div class="pron" id="backPron"></div>
          </div>
          <div class="hint"><span data-i18n="navHint">Arrow keys to navigate</span> · <kbd>←</kbd> <kbd>→</kbd></div>
        </div>
      </div>
    </div>
  </div>

  <!-- NAVIGATION -->
  <div class="nav">
    <button class="nav-btn" id="prevBtn" aria-label="Previous">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="counter"><b id="currentNum">1</b> / <span id="totalNum">10</span></div>
    <button class="nav-btn" id="nextBtn" aria-label="Next">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>

  <div class="dots" id="dots"></div>
</div>

<div class="toast" id="toast"><span id="toastText"></span></div>

<script>
/* --------- I18N --------- */
const I18N = {
  en: {
    welcomeTitle:"Which language would you like to learn?",
    welcomeSub:"Pick one to get started — you can change it anytime.",
    localeHint:"We detected your locale and suggested a language.",
    heroTitle:"Learn essential travel phrases",
    heroSub:"Tap the card to flip. Swipe or use arrows to navigate.",
    brandSub:"Travel Phrases",
    shuffle:"Shuffle",
    learned:"Mark as learned",
    unlearned:"Unmark",
    reset:"Reset",
    tapHint:"Tap card to reveal",
    navHint:"Arrow keys to navigate",
    progress:"Progress",
    front:"Phrase",
    back:"Translation",
    shuffled:"Deck shuffled!",
    markedLearned:"Nice! Marked as learned",
    unmarked:"Unmarked as learned",
    resetDone:"Progress reset",

    localeHint:"Detectamos tu idioma y te sugerimos uno.",
    heroTitle:"Aprende frases esenciales de viaje",
    heroSub:"Toca la tarjeta para voltearla. Desliza o usa las flechas.",
    brandSub:"Frases de Viaje",
    shuffle:"Mezclar",
    learned:"Marcar como aprendida",
    unlearned:"Desmarcar",
    reset:"Reiniciar",
    tapHint:"Toca la tarjeta para ver",
    navHint:"Flechas para navegar",
    progress:"Progreso",
    front:"Frase",
    back:"Traducción",
    shuffled:"¡Baraja mezclada!",
    markedLearned:"¡Bien hecho! Aprendida",
    unmarked:"Desmarcada",
    resetDone:"Progreso reiniciado",
    allLearned:"¡Todas aprendidas! ",
    congrats:"¡Has dominado las 10 frases!",
    studyAgain:"Estudiar de nuevo",
  },
  fr: {
    welcomeTitle:"Quelle langue voulez-vous apprendre ?",
    welcomeSub:"Choisissez-en une — vous pouvez changer à tout moment.",

/* --------- DECKS ---------
  Each entry: { category, front: {text, pron}, back: {text, pron} }
  'front' is the user's native-ish display ("what you want to say").
  'back' is the language being learned — shown after flip.
*/
const LANG_META = {
  en: { label:"English", native:"English", emoji:"🇬🇧", flag:"🇬🇧" },
  es: { label:"Spanish", native:"Español", emoji:"🇪🇸", flag:"🇪🇸" },
  fr: { label:"French",  native:"Français", emoji:"🇫🇷", flag:"🇫🇷" },
  ja: { label:"Japanese",native:"日本語",   emoji:"🇯🇵", flag:"🇯🇵" }
};

/* Travel phrases — 10 per target language.
   We store the English prompt + target-language translation + pronunciation.
   The UI label for the 'prompt' side is translated through the UI locale. */
const DECKS = {

  ],

    { category:"Travel",     prompt:"Where is the train station?",       target:"¿Dónde está la estación de tren?", pron:"...ehs-tah-see-OHN deh tren" },

  ],
  fr: [
    { category:"Greeting",   prompt:"Hello",                            target:"Bonjour",                      pron:"bohn-ZHOOR" },
    { category:"Courtesy",   prompt:"Thank you (very much)",            target:"Merci beaucoup",               pron:"mehr-SEE boh-KOO" },

    { category:"Help",       prompt:"Excuse me, do you speak English?", target:"Excusez-moi, parlez-vous anglais ?", pron:"ex-kew-ZAY mwah, par-LAY voo ahn-GLAY" },
    { category:"Directions", prompt:"Where is the bathroom?",           target:"Où sont les toilettes ?",       pron:"oo sohn lay twa-LET" },
    { category:"Dining",     prompt:"The check, please",                target:"L'addition, s'il vous plaît",   pron:"lah-dee-SYOHN, seel voo PLAY" },
    { category:"Shopping",   prompt:"How much does it cost?",           target:"Combien ça coûte ?",            pron:"kohm-BYEN sah KOOT" },
    { category:"Emergency",  prompt:"I need help",                      target:"J'ai besoin d'aide",            pron:"zhay buh-ZWAHN DED" },
    { category:"Travel",     prompt:"Where is the train station?",      target:"Où est la gare ?",              pron:"oo ay lah GAHR" },
    { category:"Farewell",   prompt:"Goodbye, see you soon",            target:"Au revoir, à bientôt",          pron:"oh ruh-VWAHR, ah byan-TOH" },
  ],
  ja: [
    { category:"Greeting",   prompt:"Hello",                            target:"こんにちは",                   pron:"kon-nichi-wa" },
    { category:"Courtesy",   prompt:"Thank you (very much)",            target:"どうもありがとうございます",   pron:"dōmo arigatō gozaimasu" },
    { category:"Basics",     prompt:"Yes / No",                         target:"はい / いいえ",                pron:"hai / iie" },
    { category:"Help",       prompt:"Excuse me, do you speak English?", target:"すみません、英語が話せますか？", pron:"sumimasen, eigo ga hanasemasu ka?" },
    { category:"Directions", prompt:"Where is the bathroom?",           target:"トイレはどこですか？",          pron:"toire wa doko desu ka?" },
    { category:"Dining",     prompt:"The check, please",                target:"お会計をお願いします",           pron:"o-kaikei o onegai shimasu" },
    { category:"Shopping",   prompt:"How much is this?",                target:"これはいくらですか？",           pron:"kore wa ikura desu ka?" },
    { category:"Emergency",  prompt:"I need help",                      target:"助けが必要です",                 pron:"tasuke ga hitsuyō desu" },
    { category:"Travel",     prompt:"Where is the train station?",      target:"駅はどこですか？",               pron:"eki wa doko desu ka?" },
    { category:"Farewell",   prompt:"Goodbye, see you again",           target:"さようなら、また会いましょう",   pron:"sayōnara, mata aimashō" },
  ],
};

/* --------- STATE --------- */
const STORAGE_KEY = 'polyglot.state.v1';
let state = {
  uiLocale: 'en',      // UI language (from browser)
  learning: null,      // target language: 'es' | 'fr' | 'ja' | 'en'
  index: 0,
  order: [],           // indices into DECKS[learning]
  learned: {},         // { lang: { idx: true } }
};

/* --------- UTILS --------- */
const $ = (id) => document.getElementById(id);
function detectUILocale(){
  const n = (navigator.language || 'en').toLowerCase();
  if (n.startsWith('es')) return 'es';
  if (n.startsWith('fr')) return 'fr';
  if (n.startsWith('ja')) return 'ja';
  return 'en';
}
function suggestLearning(uiLocale){
  // If user's locale is EN, suggest Spanish; otherwise suggest English.
  return uiLocale === 'en' ? 'es' : 'en';
}
function saveState(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch{}
}
function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return JSON.parse(raw);
  }catch{}
  return null;
}
function shuffleArr(a){
  const arr = a.slice();
  for(let i=arr.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}
function t(key){ return (I18N[state.uiLocale] && I18N[state.uiLocale][key]) || I18N.en[key] || key; }

/* --------- INIT --------- */
function init(){
  const saved = loadState();
  state.uiLocale = detectUILocale();

  if (saved && saved.learning){
    state = Object.assign(state, saved);
    state.uiLocale = detectUILocale(); // always refresh UI locale
    hideWelcome();
    applyUI();
    render();
  } else {
    showWelcome();
  }

  bindEvents();
  applyI18n();
}

function applyI18n(){
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const k = el.getAttribute('data-i18n');
    el.textContent = t(k);
  });
  $('welcomeTitle').textContent = t('welcomeTitle');
  $('welcomeSub').textContent = t('welcomeSub');
  $('brandSub').textContent = t('brandSub');
  $('heroTitle').textContent = t('heroTitle');
  $('heroSub').textContent = t('heroSub');
  $('progressText').textContent = t('progress');
  $('frontTag').textContent = t('front');
  $('backTag').textContent = t('back');

  const hint = $('localeHint');
  const loc = state.uiLocale;
  hint.textContent = `${t('localeHint')}`;
}

/* --------- WELCOME --------- */
function showWelcome(){
  const grid = $('langGrid');
  grid.innerHTML = '';
  const suggested = suggestLearning(state.uiLocale);
  const order = Object.keys(LANG_META).sort((a,b)=>{
    if(a===suggested) return -1;
    if(b===suggested) return 1;
    return 0;
  });
  order.forEach(code=>{
    const m = LANG_META[code];
    const btn = document.createElement('button');
    btn.className = 'lang-card';
    btn.innerHTML = `
      <div class="emoji">${m.emoji}</div>
      <div class="name">${m.label} ${code===suggested?'<span style="font-size:11px;color:#a9a9c9;font-weight:500">· suggested</span>':''}</div>
      <div class="native">${m.native}</div>
    `;
    btn.onclick = ()=>chooseLanguage(code);
    grid.appendChild(btn);
  });
  $('welcome').classList.remove('hidden');
}
function hideWelcome(){ $('welcome').classList.add('hidden'); }

function chooseLanguage(code){
  state.learning = code;
  state.index = 0;
  state.order = DECKS[code].map((_,i)=>i);
  if(!state.learned[code]) state.learned[code] = {};
  saveState();
  hideWelcome();
  applyUI();
  render(true);
}

/* --------- RENDER --------- */
function applyUI(){
  // Build language chips
  const chips = $('langChips');
  chips.innerHTML = '';
  Object.keys(LANG_META).forEach(code=>{
    const m = LANG_META[code];
    const c = document.createElement('button');
    c.className = 'chip' + (code===state.learning?' active':'');
    c.innerHTML = `<span class="flag">${m.flag}</span> ${m.label}`;
    c.onclick = ()=>{ if(code!==state.learning){ chooseLanguage(code); } };
    chips.appendChild(c);
  });
}

function currentCard(){
  const deckIdx = state.order[state.index];
  return DECKS[state.learning][deckIdx];
}

function isLearnedAt(i){
  const deckIdx = state.order[i];
  return !!(state.learned[state.learning] && state.learned[state.learning][deckIdx]);
}

function render(incoming){
  if(!state.learning) return;
  const card = $('card');
  card.classList.remove('flipped','swipe-left','swipe-right','incoming','learned');
  if(incoming) card.classList.add('incoming');

  const deck = DECKS[state.learning];
  const c = currentCard();

  $('cardCategory').textContent = c.category;
  $('cardCategoryBack').textContent = c.category;
  $('frontPhrase').textContent = c.prompt;
  $('frontPron').textContent = '';
  $('backPhrase').textContent = c.target;
  $('backPron').textContent = c.pron;

  // Apply JP font for Japanese back side
  $('backPhrase').classList.toggle('jp', state.learning === 'ja');

  // learned badge
  const frontFace = document.querySelector('.face.front');
  const oldBadge = frontFace.querySelector('.learned-badge');
  if(oldBadge) oldBadge.remove();
  const backFace = document.querySelector('.face.back');
  const oldBadge2 = backFace.querySelector('.learned-badge');
  if(oldBadge2) oldBadge2.remove();

  if(isLearnedAt(state.index)){
    const b = document.createElement('div');
    b.className='learned-badge';
    b.innerHTML = '✓ learned';
    frontFace.appendChild(b);
    const b2 = b.cloneNode(true);
    backFace.appendChild(b2);
  }

  // counter
  $('currentNum').textContent = state.index+1;
  $('totalNum').textContent = deck.length;
  $('totalCount').textContent = deck.length;

  // learned count
  const learnedSet = state.learned[state.learning] || {};
  const learnedN = Object.values(learnedSet).filter(Boolean).length;
  $('learnedCount').textContent = learnedN;
  const pct = Math.round((learnedN/deck.length)*100);
  $('ring').style.setProperty('--p', pct);
  $('ringLabel').textContent = pct+'%';

  // learned button label
  const learnedBtn = $('learnedBtn');
  learnedBtn.querySelector('span').textContent = isLearnedAt(state.index) ? t('unlearned') : t('learned');

  // dots
  const dots = $('dots');
  dots.innerHTML = '';
  for(let i=0;i<deck.length;i++){
    const d = document.createElement('div');
    d.className = 'dot' + (i===state.index?' active':'') + (isLearnedAt(i)?' learned':'');
    d.onclick = ()=>goTo(i);
    dots.appendChild(d);
  }

  // nav buttons
  $('prevBtn').disabled = state.index===0;
  $('nextBtn').disabled = state.index===deck.length-1;

  // all learned celebration
  if(learnedN === deck.length){
    celebrate();
  }

  saveState();
}

/* --------- NAVIGATION --------- */
function goTo(i){
  const deck = DECKS[state.learning];
  if(i<0) i=0;
  if(i>=deck.length) i=deck.length-1;
  const dir = i>state.index ? 'left' : 'right';
  animateChange(dir, ()=>{
    state.index = i;
    render(true);
  });
}
function next(){ if(state.index < state.order.length-1) goTo(state.index+1); }
function prev(){ if(state.index > 0) goTo(state.index-1); }

function animateChange(dir, cb){
  const card = $('card');
  card.classList.remove('flipped');
  card.classList.add(dir==='left'?'swipe-left':'swipe-right');
  setTimeout(()=>cb(), 360);
}

function toggleFlip(){
  $('card').classList.toggle('flipped');
}

/* --------- LEARNED --------- */
function toggleLearned(){
  const deckIdx = state.order[state.index];
  const lang = state.learning;
  if(!state.learned[lang]) state.learned[lang] = {};
  const wasLearned = !!state.learned[lang][deckIdx];
  if(wasLearned){
    delete state.learned[lang][deckIdx];
    toast(t('unmarked'));
    render();
  } else {
    state.learned[lang][deckIdx] = true;
    toast(t('markedLearned'));
    // play learned animation, then advance
    const card = $('card');
    card.classList.remove('flipped');
    card.classList.add('learned');
    miniConfetti();
    setTimeout(()=>{
      // move to next unlearned, or next
      const deck = DECKS[lang];
      const total = deck.length;
      let target = state.index;
      let found = false;
      for(let k=1; k<=total; k++){
        const i = (state.index + k) % total;
        if(!isLearnedAt(i)){
          target = i; found = true; break;
        }
      }
      if(!found){
        // all learned
        render(true);
      } else {
        state.index = target;
        render(true);
      }
    }, 650);
  }
  saveState();
}

/* --------- SHUFFLE --------- */
function shuffle(){
  state.order = shuffleArr(state.order);
  state.index = 0;
  const card = $('card');
  card.classList.remove('flipped');
  // brief wobble
  card.style.transition = 'transform .4s cubic-bezier(.2,.8,.2,1)';
  card.style.transform = 'scale(.92) rotate(-2deg)';
  setTimeout(()=>{
    card.style.transform = 'scale(1.03) rotate(1.5deg)';
    setTimeout(()=>{
      card.style.transform = '';
      setTimeout(()=>{ card.style.transition=''; render(true); }, 250);
    }, 180);
  }, 180);
  toast(t('shuffled'));
}

/* --------- RESET --------- */
function resetProgress(){
  state.learned[state.learning] = {};
  state.index = 0;
  state.order = DECKS[state.learning].map((_,i)=>i);
  toast(t('resetDone'));
  render(true);
}

/* --------- UI HELPERS --------- */
let toastTimer;
function toast(msg, success){
  const el = $('toast');
  $('toastText').textContent = msg;
  el.classList.toggle('success', !!success);
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove('show'), 1800);
}

function celebrate(){
  toast(t('allLearned') + '🎉', true);
  bigConfetti();
}

function miniConfetti(){ spawnConfetti(18); }
function bigConfetti(){ spawnConfetti(80); }
function spawnConfetti(n){
  const wrap = document.createElement('div');
  wrap.className='confetti';
  document.body.appendChild(wrap);
  const colors = ['#7c5cff','#ff5cb4','#5cc8ff','#4ade80','#fbbf24','#ffffff'];
  for(let i=0;i<n;i++){
    const s = document.createElement('span');
    s.style.left = Math.random()*100+'vw';
    s.style.background = colors[i%colors.length];
    s.style.animationDelay = (Math.random()*.4)+'s';
    s.style.animationDuration = (1.2 + Math.random()*1.2)+'s';
    s.style.transform = `rotate(${Math.random()*360}deg)`;
    s.style.width = (6+Math.random()*6)+'px';
    s.style.height = (10+Math.random()*8)+'px';
    s.style.borderRadius = Math.random()<.3 ? '50%' : '2px';
    wrap.appendChild(s);
  }
  setTimeout(()=>wrap.remove(), 2600);
}

/* --------- EVENTS --------- */
function bindEvents(){
  $('card').addEventListener('click', toggleFlip);
  $('prevBtn').addEventListener('click', prev);
  $('nextBtn').addEventListener('click', next);
  $('shuffleBtn').addEventListener('click', shuffle);
  $('learnedBtn').addEventListener('click', toggleLearned);
  $('resetBtn').addEventListener('click', resetProgress);

  document.addEventListener('keydown', (e)=>{
    if(e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if(!state.learning) return;
    if(e.code === 'Space'){ e.preventDefault(); toggleFlip(); }
    else if(e.code === 'ArrowLeft'){ prev(); }
    else if(e.code === 'ArrowRight'){ next(); }
    else if(e.code === 'KeyS'){ shuffle(); }
    else if(e.code === 'Enter' || e.code === 'KeyL'){ toggleLearned(); }
  });

  // Swipe
  let sx=0, sy=0, active=false;
  const deck = $('deck');
  deck.addEventListener('touchstart', (e)=>{
    const t = e.touches[0]; sx = t.clientX; sy = t.clientY; active=true;
  }, {passive:true});
  deck.addEventListener('touchend', (e)=>{
    if(!active) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - sx, dy = t.clientY - sy;
    if(Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy)){
      if(dx < 0) next(); else prev();
    }
    active=false;
  });
}

init();
</script>
