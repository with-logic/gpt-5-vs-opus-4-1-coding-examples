<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Custom QR Code Generator</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js" onerror="this.onerror=null;var s=document.createElement('script');s.src='https://unpkg.com/qrcode@1.5.3/build/qrcode.min.js';s.onerror=function(){var s2=document.createElement('script');s2.src='https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.3/qrcode.min.js';document.head.appendChild(s2);};document.head.appendChild(s);"></script>
<style>
  :root {
    --bg-1: #0a0a0f;
    --bg-2: #13131d;
    --surface: rgba(255, 255, 255, 0.04);
    --surface-strong: rgba(255, 255, 255, 0.08);
    --border: rgba(255, 255, 255, 0.08);
    --border-strong: rgba(255, 255, 255, 0.16);
    --text: #f5f5fa;
    --text-dim: #9a9aa8;
    --text-muted: #6a6a78;
    --accent: #7c5cff;
    --accent-2: #00e0ff;
    --danger: #ff4d6d;
    --radius: 14px;
    --radius-lg: 20px;
    --shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, "Helvetica Neue", Arial, sans-serif;
    color: var(--text);
    background:
      radial-gradient(1200px 600px at 10% -10%, rgba(124, 92, 255, 0.25), transparent 60%),
      radial-gradient(900px 500px at 110% 10%, rgba(0, 224, 255, 0.18), transparent 55%),
      radial-gradient(800px 800px at 50% 120%, rgba(255, 77, 109, 0.12), transparent 60%),
      linear-gradient(180deg, var(--bg-1), var(--bg-2));
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image:
      radial-gradient(rgba(255,255,255,0.035) 1px, transparent 1px);
    background-size: 22px 22px;
    mask-image: radial-gradient(ellipse at center, black 40%, transparent 80%);
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: grid;
    grid-template-columns: 420px 1fr;
    gap: 0;
  }

  @media (max-width: 960px) {
    .app { grid-template-columns: 1fr; }
  }

  .sidebar {
    padding: 32px 28px;
    border-right: 1px solid var(--border);
    backdrop-filter: blur(20px);
    background: rgba(10, 10, 15, 0.4);
    display: flex;
    flex-direction: column;
    gap: 24px;
    max-height: 100vh;
    overflow-y: auto;
  }

  @media (max-width: 960px) {
    .sidebar { max-height: none; border-right: none; border-bottom: 1px solid var(--border); }
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 4px;
  }

  .brand-mark {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    display: grid;
    place-items: center;
    box-shadow: 0 8px 24px rgba(124, 92, 255, 0.4);
    position: relative;
  }

  .brand-mark::before {
    content: "";
    position: absolute;
    inset: 6px;
    border-radius: 4px;
    background:
      linear-gradient(#fff, #fff) top left / 8px 8px no-repeat,
      linear-gradient(#fff, #fff) top right / 8px 8px no-repeat,
      linear-gradient(#fff, #fff) bottom left / 8px 8px no-repeat,
      linear-gradient(#fff, #fff) center center / 4px 4px no-repeat;
  }

  .brand-title {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  .brand-sub {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .section {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .section-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    font-weight: 600;
  }

  textarea.input, input.input, select.input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 14px;
    border-radius: var(--radius);
    font-size: 14px;
    font-family: inherit;
    resize: vertical;
    transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
    outline: none;
  }

  textarea.input { min-height: 92px; }

  .input:focus {
    border-color: rgba(124, 92, 255, 0.6);
    background: var(--surface-strong);
    box-shadow: 0 0 0 3px rgba(124, 92, 255, 0.15);
  }

  .input::placeholder { color: var(--text-muted); }

  .row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .color-field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .color-field label {
    font-size: 12px;
    color: var(--text-dim);
  }

  .color-input {
    position: relative;
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 10px;
    transition: border-color 0.15s, background 0.15s;
  }

  .color-input:hover { border-color: var(--border-strong); }

  .color-swatch {
    position: relative;
    width: 28px;
    height: 28px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.2);
    overflow: hidden;
    flex-shrink: 0;
  }

  .color-swatch input[type="color"] {
    position: absolute;
    inset: -4px;
    width: calc(100% + 8px);
    height: calc(100% + 8px);
    border: 0;
    padding: 0;
    background: none;
    cursor: pointer;
  }

  .color-hex {
    flex: 1;
    background: transparent;
    border: 0;
    color: var(--text);
    font-family: "SF Mono", Menlo, Consolas, monospace;
    font-size: 13px;
    outline: none;
    min-width: 0;
    text-transform: uppercase;
  }

  .chip-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    font-size: 12px;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }

  .chip:hover { border-color: var(--border-strong); color: var(--text); }

  .chip.active {
    border-color: rgba(124, 92, 255, 0.6);
    background: rgba(124, 92, 255, 0.12);
    color: var(--text);
  }

  .chip-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.2);
  }

  .slider-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .slider-row input[type="range"] {
    flex: 1;
    accent-color: var(--accent);
    background: transparent;
  }

  .slider-value {
    font-size: 12px;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
    min-width: 40px;
    text-align: right;
  }

  .seg {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 4px;
    gap: 2px;
  }

  .seg button {
    flex: 1;
    background: transparent;
    border: 0;
    color: var(--text-dim);
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    padding: 7px 10px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .seg button:hover { color: var(--text); }

  .seg button.active {
    background: rgba(124, 92, 255, 0.18);
    color: var(--text);
    box-shadow: inset 0 0 0 1px rgba(124, 92, 255, 0.35);
  }

  .actions {
    display: flex;
    gap: 10px;
    margin-top: 6px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 12px 16px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    flex: 1;
  }

  .btn:hover { background: var(--surface-strong); border-color: var(--border-strong); }
  .btn:active { transform: translateY(1px); }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #5b3fe0);
    border-color: transparent;
    color: #fff;
    box-shadow: 0 8px 24px rgba(124, 92, 255, 0.35);
  }

  .btn-primary:hover {
    background: linear-gradient(135deg, #8a6dff, #6a4cff);
    border-color: transparent;
  }

  .btn svg { width: 16px; height: 16px; }

  .footer-note {
    margin-top: auto;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.5;
  }

  /* Preview area */
  .preview-wrap {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px;
    min-height: 100vh;
  }

  @media (max-width: 960px) {
    .preview-wrap { min-height: 70vh; padding: 32px 20px; }
  }

  .preview-card {
    position: relative;
    width: min(560px, 100%);
    aspect-ratio: 1 / 1;
    border-radius: var(--radius-lg);
    background: var(--qr-bg, #ffffff);
    display: grid;
    place-items: center;
    padding: 32px;
    box-shadow:
      0 40px 80px rgba(0, 0, 0, 0.55),
      0 0 0 1px rgba(255, 255, 255, 0.05);
    transition: background 0.3s ease, transform 0.4s cubic-bezier(.2,.8,.2,1);
  }

  .preview-card::after {
    content: "";
    position: absolute;
    inset: -20px;
    border-radius: calc(var(--radius-lg) + 8px);
    background: linear-gradient(135deg, rgba(124,92,255,0.35), rgba(0,224,255,0.25), rgba(255,77,109,0.25));
    filter: blur(40px);
    z-index: -1;
    opacity: 0.7;
  }

  #qr-canvas {
    display: block;
    width: 100% !important;
    height: 100% !important;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    border-radius: 8px;
  }

  .preview-meta {
    position: absolute;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 12px;
    white-space: nowrap;
  }

  .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent-2); box-shadow: 0 0 10px var(--accent-2);
  }

  .preview-empty {
    color: #888;
    font-size: 14px;
    text-align: center;
    padding: 20px;
  }

  /* Scrollbar */
  .sidebar::-webkit-scrollbar { width: 6px; }
  .sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(20, 20, 30, 0.95);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border-strong);
    color: var(--text);
    padding: 10px 16px;
    border-radius: 10px;
    font-size: 13px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark"></div>
        <div>
          <div class="brand-title">QR Studio</div>
          <div class="brand-sub">Custom QR Code Generator</div>
        </div>
      </div>

      <div class="section">
        <div class="section-label">Content</div>
        <textarea id="content" class="input" placeholder="Enter text or URL — e.g. https://anthropic.com"></textarea>
      </div>

      <div class="section">
        <div class="section-label">Colors</div>
        <div class="row">
          <div class="color-field">
            <label>Foreground</label>
            <div class="color-input">
              <div class="color-swatch" style="background: #111111">
                <input type="color" id="fg-color" value="#111111" />
              </div>
              <input type="text" class="color-hex" id="fg-hex" value="#111111" maxlength="7" />
            </div>
          </div>
          <div class="color-field">
            <label>Background</label>
            <div class="color-input">
              <div class="color-swatch" style="background: #ffffff">
                <input type="color" id="bg-color" value="#ffffff" />
              </div>
              <input type="text" class="color-hex" id="bg-hex" value="#ffffff" maxlength="7" />
            </div>
          </div>
        </div>
        <div class="chip-row" id="presets"></div>
      </div>

      <div class="section">
        <div class="section-label">Options</div>
        <div class="row">
          <div class="color-field">
            <label>Error correction</label>
            <div class="seg" id="ec-seg">
              <button data-v="L">L</button>
              <button data-v="M" class="active">M</button>
              <button data-v="Q">Q</button>
              <button data-v="H">H</button>
            </div>
          </div>
          <div class="color-field">
            <label>Margin <span class="slider-value" id="margin-val">2</span></label>
            <div class="slider-row">
              <input type="range" id="margin" min="0" max="8" value="2" />
            </div>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-label">Export</div>
        <div class="color-field">
          <label>Resolution <span class="slider-value" id="size-val">1024px</span></label>
          <div class="slider-row">
            <input type="range" id="size" min="256" max="2048" step="128" value="1024" />
          </div>
        </div>
        <div class="actions">
          <button class="btn" id="copy-btn" title="Copy to clipboard">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Copy
          </button>
          <button class="btn btn-primary" id="download-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Download PNG
          </button>
        </div>
      </div>

      <div class="footer-note">
        QR Code is a registered trademark of DENSO WAVE. Built with love — no data leaves your browser.
      </div>
    </aside>

    <main class="preview-wrap">
      <div class="preview-card" id="preview-card">
        <canvas id="qr-canvas"></canvas>
      </div>
      <div class="preview-meta">
        <span class="dot"></span>
        <span id="preview-status">Live preview • updates as you type</span>
      </div>
    </main>
  </div>

  <div class="toast" id="toast">Copied to clipboard</div>

<script>
(() => {
  const $ = (id) => document.getElementById(id);
  const contentEl = $('content');
  const fgColor = $('fg-color'), fgHex = $('fg-hex');
  const bgColor = $('bg-color'), bgHex = $('bg-hex');
  const marginEl = $('margin'), marginVal = $('margin-val');
  const sizeEl = $('size'), sizeVal = $('size-val');
  const canvas = $('qr-canvas');
  const previewCard = $('preview-card');
  const statusEl = $('preview-status');
  const ecSeg = $('ec-seg');
  const presetsEl = $('presets');
  const toast = $('toast');

  let ecLevel = 'M';
  const defaultText = 'https://anthropic.com';
  contentEl.value = defaultText;

  const presets = [
    { name: 'Classic', fg: '#111111', bg: '#ffffff' },
    { name: 'Midnight', fg: '#ffffff', bg: '#0a0a1f' },
    { name: 'Ocean', fg: '#003b5c', bg: '#e0f7ff' },
    { name: 'Forest', fg: '#1a3a1a', bg: '#e8f5e9' },
    { name: 'Sunset', fg: '#5a1a2b', bg: '#ffe5d9' },
    { name: 'Violet', fg: '#4c1d95', bg: '#ede9fe' },
    { name: 'Mono', fg: '#000000', bg: '#f5f5f5' },
  ];

  presets.forEach(p => {
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.innerHTML = `
      <span class="chip-dot" style="background: linear-gradient(135deg, ${p.fg} 50%, ${p.bg} 50%)"></span>
      <span>${p.name}</span>`;
    chip.onclick = () => {
      setFg(p.fg); setBg(p.bg);
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      render();
    };
    presetsEl.appendChild(chip);
  });

  function setSwatch(inputEl, color) {
    const swatch = inputEl.closest('.color-input').querySelector('.color-swatch');
    swatch.style.background = color;
  }

  function setFg(c) {
    fgColor.value = c; fgHex.value = c.toUpperCase();
    setSwatch(fgColor, c);
  }
  function setBg(c) {
    bgColor.value = c; bgHex.value = c.toUpperCase();
    setSwatch(bgColor, c);
    previewCard.style.setProperty('--qr-bg', c);
  }

  setFg('#111111'); setBg('#ffffff');

  function syncHex(colorInput, hexInput, setter) {
    colorInput.addEventListener('input', () => {
      hexInput.value = colorInput.value.toUpperCase();
      setSwatch(colorInput, colorInput.value);
      if (setter) setter(colorInput.value);
      clearPreset();
      render();
    });
    hexInput.addEventListener('input', () => {
      let v = hexInput.value.trim();
      if (!v.startsWith('#')) v = '#' + v;
      if (/^#[0-9a-fA-F]{6}$/.test(v)) {
        colorInput.value = v;
        setSwatch(colorInput, v);
        if (setter) setter(v);
        clearPreset();
        render();
      }
    });
  }

  syncHex(fgColor, fgHex);
  syncHex(bgColor, bgHex, (v) => previewCard.style.setProperty('--qr-bg', v));

  function clearPreset() {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  }

  ecSeg.addEventListener('click', (e) => {
    const btn = e.target.closest('button');
    if (!btn) return;
    ecLevel = btn.dataset.v;
    ecSeg.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });

  marginEl.addEventListener('input', () => {
    marginVal.textContent = marginEl.value;
    render();
  });

  sizeEl.addEventListener('input', () => {
    sizeVal.textContent = sizeEl.value + 'px';
  });

  let renderTimer;
  contentEl.addEventListener('input', () => {
    clearTimeout(renderTimer);
    renderTimer = setTimeout(render, 120);
  });

  function render() {
    if (typeof QRCode === 'undefined') {
      statusEl.textContent = 'Loading QR library…';
      setTimeout(render, 150);
      return;
    }
    const text = contentEl.value || ' ';
    const opts = {
      errorCorrectionLevel: ecLevel,
      margin: parseInt(marginEl.value, 10),
      color: {
        dark: fgColor.value,
        light: bgColor.value,
      },
      width: 1024,
    };
    QRCode.toCanvas(canvas, text, opts, (err) => {
      if (err) {
        statusEl.textContent = 'Too much data for this error correction level';
        return;
      }
      if (!contentEl.value.trim()) {
        statusEl.textContent = 'Empty input — showing placeholder';
      } else {
        const bytes = new Blob([contentEl.value]).size;
        statusEl.textContent = `Live preview • ${bytes} bytes • EC ${ecLevel}`;
      }
    });
  }

  $('download-btn').addEventListener('click', () => {
    const text = contentEl.value || ' ';
    const size = parseInt(sizeEl.value, 10);
    const opts = {
      errorCorrectionLevel: ecLevel,
      margin: parseInt(marginEl.value, 10),
      color: { dark: fgColor.value, light: bgColor.value },
      width: size,
    };
    const tmp = document.createElement('canvas');
    QRCode.toCanvas(tmp, text, opts, (err) => {
      if (err) { showToast('Error: ' + err.message); return; }
      tmp.toBlob((blob) => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        const safe = (contentEl.value || 'qr').slice(0, 24).replace(/[^a-z0-9]/gi, '_');
        a.download = `qr-${safe || 'code'}-${size}.png`;
        a.click();
        URL.revokeObjectURL(url);
        showToast('Downloaded PNG');
      }, 'image/png');
    });
  });

  $('copy-btn').addEventListener('click', async () => {
    try {
      const text = contentEl.value || ' ';
      const size = parseInt(sizeEl.value, 10);
      const opts = {
        errorCorrectionLevel: ecLevel,
        margin: parseInt(marginEl.value, 10),
        color: { dark: fgColor.value, light: bgColor.value },
        width: size,
      };
      const tmp = document.createElement('canvas');
      await new Promise((resolve, reject) => {
        QRCode.toCanvas(tmp, text, opts, (err) => err ? reject(err) : resolve());
      });
      tmp.toBlob(async (blob) => {
        try {
          await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
          showToast('Copied to clipboard');
        } catch {
          showToast('Clipboard not available');
        }
      }, 'image/png');
    } catch (e) {
      showToast('Failed to copy');
    }
  });

  let toastTimer;
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 1800);
  }

  render();
})();
</script>
</body>
</html>
