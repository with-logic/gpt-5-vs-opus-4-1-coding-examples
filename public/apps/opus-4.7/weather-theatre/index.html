<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Weather Theatre — A Performance of Forecasts</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    --bg: #0b0710;
    --bg-soft: #120b1c;
    --ink: #f7eede;
    --ink-dim: #c9b99a;
    --gold: #e8c878;
    --gold-soft: #b8924a;
    --velvet: #4a0b18;
    --velvet-dark: #2b0410;
    --velvet-hl: #7a1a2c;
    --brass: #b8924a;
  }
  * { box-sizing: border-box; }
  html, body, #root {
    margin: 0; padding: 0; height: 100%; width: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Georgia', 'Garamond', serif;
    overflow: hidden;
    user-select: none;
  }
  .app {
    position: relative;
    width: 100vw; height: 100vh;
    background: radial-gradient(ellipse at center top, #1a0f24 0%, #0b0710 60%, #050309 100%);
    overflow: hidden;
  }
  .app.matinee {
    background: radial-gradient(ellipse at center top, #e8d8b8 0%, #c9a878 55%, #8a6a48 100%);
  }
  .stage-wrap {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .proscenium {
    position: relative;
    width: min(92vw, 1400px);
    height: min(82vh, 780px);
    border-radius: 18px;
    overflow: hidden;
    box-shadow:
      0 30px 80px rgba(0,0,0,0.7),
      inset 0 0 0 6px rgba(184,146,74,0.55),
      inset 0 0 0 14px rgba(10,6,4,0.9),
      inset 0 0 0 16px rgba(232,200,120,0.35);
    background: #000;
  }
  .stage-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  /* Curtain */
  .curtain {
    position: absolute;
    top: 0; bottom: 0;
    width: 52%;
    pointer-events: none;
    transition: transform 1.4s cubic-bezier(.7,.02,.3,1);
    z-index: 20;
    background:
      radial-gradient(ellipse at 20% 30%, rgba(255,180,180,0.18), transparent 55%),
      repeating-linear-gradient(90deg,
        var(--velvet-dark) 0px,
        var(--velvet) 18px,
        var(--velvet-hl) 36px,
        var(--velvet) 54px,
        var(--velvet-dark) 72px);
    box-shadow: inset 0 0 80px rgba(0,0,0,0.7);
  }
  .curtain.left { left: 0; transform-origin: left top; }
  .curtain.right { right: 0; transform-origin: right top; }
  .curtain.open.left { transform: translateX(-86%) skewX(-2deg); }
  .curtain.open.right { transform: translateX(86%) skewX(2deg); }
  .curtain::after {
    content: '';
    position: absolute;
    top: 0; bottom: 0;
    width: 14px;
    background: linear-gradient(90deg, transparent, rgba(0,0,0,0.6));
  }
  .curtain.left::after { right: 0; }
  .curtain.right::after { left: 0; background: linear-gradient(270deg, transparent, rgba(0,0,0,0.6)); }

  /* Valance (top curtain) */
  .valance {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 90px;
    z-index: 25;
    pointer-events: none;
    background:
      repeating-linear-gradient(180deg,
        var(--velvet-dark) 0px,
        var(--velvet) 10px,
        var(--velvet-hl) 18px,
        var(--velvet) 28px,
        var(--velvet-dark) 40px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 -20px 40px rgba(0,0,0,0.5);
    clip-path: polygon(
      0 0, 100% 0, 100% 60%,
      96% 90%, 92% 60%, 88% 92%, 84% 60%, 80% 92%,
      76% 60%, 72% 92%, 68% 60%, 64% 92%, 60% 60%,
      56% 92%, 52% 60%, 48% 92%, 44% 60%, 40% 92%,
      36% 60%, 32% 92%, 28% 60%, 24% 92%, 20% 60%,
      16% 92%, 12% 60%, 8% 92%, 4% 60%, 0 90%);
  }
  .valance-trim {
    position: absolute;
    top: 82px; left: 0; right: 0;
    height: 6px;
    background: linear-gradient(180deg, var(--gold), var(--gold-soft));
    z-index: 26;
    pointer-events: none;
    box-shadow: 0 2px 8px rgba(232,200,120,0.5);
  }

  /* HUD */
  .hud-top {
    position: absolute;
    top: 18px; left: 50%;
    transform: translateX(-50%);
    z-index: 40;
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 10px 22px;
    background: rgba(10,6,16,0.7);
    border: 1px solid rgba(232,200,120,0.3);
    border-radius: 40px;
    backdrop-filter: blur(8px);
  }
  .brand {
    font-family: 'Playfair Display', 'Didot', 'Georgia', serif;
    font-style: italic;
    letter-spacing: 2px;
    color: var(--gold);
    font-size: 16px;
    text-shadow: 0 0 12px rgba(232,200,120,0.4);
  }
  .brand b { font-weight: 700; letter-spacing: 3px; }
  .mode-toggle {
    display: flex;
    background: rgba(0,0,0,0.4);
    border-radius: 30px;
    padding: 3px;
    border: 1px solid rgba(232,200,120,0.2);
  }
  .mode-toggle button {
    background: transparent;
    color: var(--ink-dim);
    border: none;
    padding: 6px 14px;
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    border-radius: 30px;
    cursor: pointer;
    transition: all 0.3s;
  }
  .mode-toggle button.active {
    background: linear-gradient(180deg, var(--gold), var(--gold-soft));
    color: #2a1808;
    box-shadow: 0 0 12px rgba(232,200,120,0.5);
  }

  /* Sliders panel */
  .panel {
    position: absolute;
    left: 50%;
    bottom: 22px;
    transform: translateX(-50%);
    z-index: 40;
    display: flex;
    gap: 24px;
    align-items: center;
    padding: 14px 26px;
    background: rgba(10,6,16,0.78);
    border: 1px solid rgba(232,200,120,0.3);
    border-radius: 18px;
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
  }
  .mood {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    min-width: 140px;
  }
  .mood-label {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .mood-label .icon { font-size: 14px; }
  .mood-value {
    font-family: 'Courier New', monospace;
    font-size: 10px;
    color: var(--ink-dim);
    min-width: 28px;
    text-align: center;
  }
  .slider {
    -webkit-appearance: none;
    appearance: none;
    width: 130px;
    height: 4px;
    background: linear-gradient(90deg, rgba(232,200,120,0.1), rgba(232,200,120,0.4));
    border-radius: 4px;
    outline: none;
    cursor: pointer;
  }
  .slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #fff8e0, var(--gold) 50%, var(--gold-soft) 100%);
    box-shadow: 0 0 10px rgba(232,200,120,0.8), 0 2px 4px rgba(0,0,0,0.5);
    cursor: pointer;
    border: 1px solid var(--gold-soft);
  }
  .slider::-moz-range-thumb {
    width: 16px; height: 16px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #fff8e0, var(--gold) 50%, var(--gold-soft) 100%);
    box-shadow: 0 0 10px rgba(232,200,120,0.8);
    border: 1px solid var(--gold-soft);
    cursor: pointer;
  }

  /* Forecast card */
  .forecast {
    position: absolute;
    top: 110px;
    right: 32px;
    z-index: 35;
    width: 240px;
    padding: 14px 16px;
    background: rgba(10,6,16,0.72);
    border: 1px solid rgba(232,200,120,0.3);
    border-radius: 14px;
    backdrop-filter: blur(10px);
    color: var(--ink);
  }
  .forecast h3 {
    margin: 0 0 10px 0;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--gold);
    text-transform: uppercase;
    border-bottom: 1px solid rgba(232,200,120,0.2);
    padding-bottom: 6px;
  }
  .forecast-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 5px 0;
    font-size: 13px;
  }
  .forecast-row .day {
    color: var(--ink-dim);
    font-style: italic;
  }
  .forecast-row .temp {
    font-family: 'Courier New', monospace;
    color: var(--ink);
  }
  .forecast-row .icon {
    font-size: 16px;
    width: 20px;
    text-align: center;
  }

  /* Subtitle / Playbill */
  .subtitle {
    position: absolute;
    left: 50%;
    bottom: 108px;
    transform: translateX(-50%);
    z-index: 35;
    min-width: 340px;
    max-width: 680px;
    padding: 10px 24px;
    text-align: center;
    font-family: 'Courier New', 'Courier', monospace;
    color: var(--ink);
    font-size: 15px;
    letter-spacing: 1px;
    background: rgba(0,0,0,0.55);
    border-top: 1px solid rgba(232,200,120,0.3);
    border-bottom: 1px solid rgba(232,200,120,0.3);
    text-shadow: 0 0 8px rgba(0,0,0,0.8);
  }
  .subtitle .caret {
    display: inline-block;
    width: 8px;
    margin-left: 2px;
    animation: blink 1s steps(2) infinite;
    color: var(--gold);
  }
  @keyframes blink {
    50% { opacity: 0; }
  }

  /* Scene title */
  .act-title {
    position: absolute;
    top: 100px;
    left: 32px;
    z-index: 35;
    max-width: 260px;
  }
  .act-label {
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--gold);
    opacity: 0.8;
  }
  .act-name {
    font-family: 'Playfair Display', 'Didot', 'Georgia', serif;
    font-size: 28px;
    font-style: italic;
    color: var(--ink);
    line-height: 1.1;
    margin-top: 4px;
    text-shadow: 0 2px 12px rgba(0,0,0,0.9);
  }
  .act-divider {
    width: 60px;
    height: 2px;
    background: linear-gradient(90deg, var(--gold), transparent);
    margin-top: 8px;
  }

  /* Footer credit */
  .footer {
    position: absolute;
    bottom: 6px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 30;
    font-size: 9px;
    letter-spacing: 4px;
    color: var(--gold-soft);
    text-transform: uppercase;
    opacity: 0.6;
    pointer-events: none;
  }

  /* Spotlight sweep sheen over the whole thing */
  .sheen {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 15;
    mix-blend-mode: screen;
    opacity: 0.6;
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useRef, useMemo } = React;

// ---- Mock forecast data (stays constant; moods remix how it's shown) ----
const BASE_FORECAST = [
  { day: 'Mon', tempC: 14, cond: 'cloudy', wind: 12, rain: 40 },
  { day: 'Tue', tempC: 11, cond: 'rain',   wind: 22, rain: 80 },
  { day: 'Wed', tempC:  8, cond: 'storm',  wind: 38, rain: 90 },
  { day: 'Thu', tempC: 13, cond: 'fog',    wind:  8, rain: 30 },
  { day: 'Fri', tempC: 17, cond: 'sun',    wind:  6, rain:  5 },
  { day: 'Sat', tempC: 19, cond: 'sun',    wind: 10, rain: 10 },
  { day: 'Sun', tempC: 15, cond: 'cloudy', wind: 14, rain: 25 },
];

const CONDITION_GLYPH = {
  sun: '☀', cloudy: '☁', rain: '☂', storm: '⚡', fog: '≈'
};

// ---- Palettes for each mood axis; blended by slider weights ----
// Each is: sky top, sky mid, sky bottom, mountain far, mountain mid, mountain near, ground, accent
const PALETTES = {
  cosy: {
    night: ['#2a1533','#51244a','#8a4566','#3a2540','#2a1a30','#1a1020','#15091c','#f4b36a'],
    day:   ['#fcd8a8','#f8b78a','#e78c6a','#c67458','#8e4d42','#5a2e2e','#2a1518','#ffd97a'],
  },
  eerie: {
    night: ['#0a1a22','#0c2430','#133846','#0a1a22','#07121a','#030810','#020509','#7fe0c7'],
    day:   ['#6e8a92','#8ea0a2','#a5b3b0','#5a6a68','#3a4846','#222a2a','#0a1212','#a0f0d0'],
  },
  heroic: {
    night: ['#1a0a3a','#3a145a','#7a2070','#2a0a48','#1a0535','#0a0220','#05011a','#ffd44a'],
    day:   ['#ffb347','#ff8555','#e64a3a','#a82e3a','#5a1a2a','#220a1a','#080308','#fff2a0'],
  }
};

const SCENE_LINES = {
  cosy: [
    "A hush of rain on the kitchen window. The radiator hums.",
    "Paper lanterns swing in the damp wind. Someone is baking.",
    "Mist settles into the hedgerow; the tea has gone cold.",
    "Blankets multiply on the couch as the drizzle persists.",
  ],
  eerie: [
    "Fog drifts through the empty lamp posts, remembering a sound.",
    "The weather vane turns without wind. Nothing flies over.",
    "A cold front, pressed against the glass like a palm.",
    "The barometer falls. The wallpaper listens.",
  ],
  heroic: [
    "Thunder practices its lines behind the mountains.",
    "The storm marshals its cavalry at the horizon's edge.",
    "Lightning rehearses a soliloquy. The valley holds its breath.",
    "The sun breaks rank and charges through the cumulus wall.",
  ],
};

function blendColor(c1, c2, t) {
  const p = (c) => [parseInt(c.slice(1,3),16), parseInt(c.slice(3,5),16), parseInt(c.slice(5,7),16)];
  const [a,b,c] = p(c1), [d,e,f] = p(c2);
  const r = Math.round(a + (d-a)*t);
  const g = Math.round(b + (e-b)*t);
  const bl = Math.round(c + (f-c)*t);
  const h = (x) => x.toString(16).padStart(2,'0');
  return `#${h(r)}${h(g)}${h(bl)}`;
}

function blendPalette(cosy, eerie, heroic, mode) {
  // Normalize weights
  const sum = cosy + eerie + heroic + 0.0001;
  const wc = cosy/sum, we = eerie/sum, wh = heroic/sum;
  const pC = PALETTES.cosy[mode];
  const pE = PALETTES.eerie[mode];
  const pH = PALETTES.heroic[mode];
  return pC.map((_, i) => {
    // weighted average in RGB
    const hex2rgb = (c) => [parseInt(c.slice(1,3),16), parseInt(c.slice(3,5),16), parseInt(c.slice(5,7),16)];
    const [r1,g1,b1] = hex2rgb(pC[i]);
    const [r2,g2,b2] = hex2rgb(pE[i]);
    const [r3,g3,b3] = hex2rgb(pH[i]);
    const r = Math.round(r1*wc + r2*we + r3*wh);
    const g = Math.round(g1*wc + g2*we + g3*wh);
    const b = Math.round(b1*wc + b2*we + b3*wh);
    const h = (x) => Math.max(0,Math.min(255,x)).toString(16).padStart(2,'0');
    return `#${h(r)}${h(g)}${h(b)}`;
  });
}

// Determine dominant mood for scene labeling
function dominantMood(cosy, eerie, heroic) {
  const entries = [['cosy', cosy], ['eerie', eerie], ['heroic', heroic]];
  entries.sort((a,b) => b[1]-a[1]);
  return entries[0][0];
}

function pickSubtitle(cosy, eerie, heroic) {
  const d = dominantMood(cosy, eerie, heroic);
  const lines = SCENE_LINES[d];
  // deterministic by rough values to reduce flicker
  const idx = Math.floor((cosy*3 + eerie*5 + heroic*7) / 97) % lines.length;
  return lines[idx];
}

// ---- Typewriter hook ----
function useTypewriter(text, speed = 28) {
  const [shown, setShown] = useState('');
  const idxRef = useRef(0);
  const textRef = useRef(text);
  useEffect(() => {
    textRef.current = text;
    idxRef.current = 0;
    setShown('');
    let cancelled = false;
    const tick = () => {
      if (cancelled) return;
      const t = textRef.current;
      if (idxRef.current <= t.length) {
        setShown(t.slice(0, idxRef.current));
        idxRef.current++;
        setTimeout(tick, speed + Math.random()*30);
      }
    };
    tick();
    return () => { cancelled = true; };
  }, [text, speed]);
  return shown;
}

// ---- Canvas scene ----
function Stage({ cosy, eerie, heroic, mode, curtainOpen }) {
  const canvasRef = useRef(null);
  const animRef = useRef(0);
  const paramsRef = useRef({ cosy, eerie, heroic, mode });
  paramsRef.current = { cosy, eerie, heroic, mode };

  // Persistent entities
  const entitiesRef = useRef(null);
  if (!entitiesRef.current) {
    entitiesRef.current = {
      raindrops: Array.from({length: 260}, () => ({
        x: Math.random(), y: Math.random(), v: 0.4 + Math.random()*0.6, len: 8+Math.random()*16
      })),
      snowflakes: Array.from({length: 120}, () => ({
        x: Math.random(), y: Math.random(), v: 0.05 + Math.random()*0.1, r: 1 + Math.random()*2, drift: Math.random()*6.28
      })),
      stars: Array.from({length: 140}, () => ({
        x: Math.random(), y: Math.random()*0.55, r: Math.random()*1.5 + 0.3, tw: Math.random()*6.28
      })),
      leaves: Array.from({length: 22}, () => ({
        x: Math.random(), y: Math.random(), v: 0.08 + Math.random()*0.15, rot: Math.random()*6.28, spin: (Math.random()-0.5)*0.04, size: 6+Math.random()*8
      })),
      clouds: Array.from({length: 8}, (_,i) => ({
        x: Math.random(), y: 0.1 + Math.random()*0.25, v: 0.002 + Math.random()*0.004, s: 0.6 + Math.random()*0.8
      })),
      embers: Array.from({length: 60}, () => ({
        x: Math.random(), y: Math.random(), v: 0.001 + Math.random()*0.004, r: 1 + Math.random()*2, life: Math.random()
      })),
      lightningTimer: 0,
      lightningFlash: 0,
      birds: Array.from({length: 4}, () => ({ x: Math.random(), y: 0.15 + Math.random()*0.25, v: 0.002 + Math.random()*0.002, phase: Math.random()*6.28 })),
    };
  }

  useEffect(() => {
    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');

    const resize = () => {
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    };
    resize();
    const ro = new ResizeObserver(resize);
    ro.observe(canvas);

    let t0 = performance.now();

    const draw = (now) => {
      const p = paramsRef.current;
      const dt = Math.min(50, now - t0);
      t0 = now;
      const time = now / 1000;

      const rect = canvas.getBoundingClientRect();
      const W = rect.width, H = rect.height;

      const palette = blendPalette(p.cosy, p.eerie, p.heroic, p.mode);
      const [cSkyTop, cSkyMid, cSkyBot, cFar, cMid, cNear, cGround, cAccent] = palette;

      // --- Sky gradient ---
      const sky = ctx.createLinearGradient(0,0,0,H*0.75);
      sky.addColorStop(0, cSkyTop);
      sky.addColorStop(0.5, cSkyMid);
      sky.addColorStop(1, cSkyBot);
      ctx.fillStyle = sky;
      ctx.fillRect(0,0,W,H);

      const isNight = p.mode === 'night';
      const stormWeight = p.heroic / (p.cosy + p.eerie + p.heroic + 0.001);
      const eerieWeight = p.eerie / (p.cosy + p.eerie + p.heroic + 0.001);
      const cosyWeight  = p.cosy / (p.cosy + p.eerie + p.heroic + 0.001);

      // --- Stars (night only) ---
      if (isNight) {
        const e = entitiesRef.current;
        for (const s of e.stars) {
          const a = 0.5 + 0.5*Math.sin(time*2 + s.tw);
          ctx.globalAlpha = 0.4 + 0.6*a;
          ctx.fillStyle = '#ffffff';
          ctx.beginPath();
          ctx.arc(s.x*W, s.y*H, s.r, 0, Math.PI*2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
      }

      // --- Sun / Moon ---
      const orbX = W * (0.65 + 0.15*Math.sin(time*0.1));
      const orbY = H * 0.22;
      const orbR = Math.min(W,H) * 0.06;
      if (isNight) {
        // moon
        const grd = ctx.createRadialGradient(orbX, orbY, 0, orbX, orbY, orbR*2.8);
        grd.addColorStop(0, 'rgba(255,240,210,0.9)');
        grd.addColorStop(0.3, 'rgba(255,235,200,0.2)');
        grd.addColorStop(1, 'rgba(255,235,200,0)');
        ctx.fillStyle = grd;
        ctx.beginPath();
        ctx.arc(orbX, orbY, orbR*2.8, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#f5ecd0';
        ctx.beginPath(); ctx.arc(orbX, orbY, orbR, 0, Math.PI*2); ctx.fill();
        // crater
        ctx.fillStyle = 'rgba(180,170,150,0.4)';
        ctx.beginPath(); ctx.arc(orbX - orbR*0.3, orbY - orbR*0.1, orbR*0.15, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(orbX + orbR*0.2, orbY + orbR*0.25, orbR*0.1, 0, Math.PI*2); ctx.fill();
      } else {
        // sun with halo
        const grd = ctx.createRadialGradient(orbX, orbY, 0, orbX, orbY, orbR*3.5);
        grd.addColorStop(0, 'rgba(255,240,180,0.9)');
        grd.addColorStop(0.3, 'rgba(255,200,120,0.3)');
        grd.addColorStop(1, 'rgba(255,180,100,0)');
        ctx.fillStyle = grd;
        ctx.beginPath(); ctx.arc(orbX, orbY, orbR*3.5, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#fff5c8';
        ctx.beginPath(); ctx.arc(orbX, orbY, orbR*0.85, 0, Math.PI*2); ctx.fill();
      }

      // --- Cloud bank ---
      const e = entitiesRef.current;
      for (const c of e.clouds) {
        c.x += c.v * (1 + stormWeight*2);
        if (c.x > 1.3) c.x = -0.3;
      }
      ctx.save();
      for (const c of e.clouds) {
        const cx = c.x * W, cy = c.y * H;
        const sz = c.s * Math.min(W,H) * 0.08;
        const darkness = 0.3 + stormWeight*0.5 + eerieWeight*0.2;
        const alpha = 0.6 + stormWeight*0.3;
        ctx.fillStyle = isNight
          ? `rgba(${Math.floor(40 + (1-darkness)*80)}, ${Math.floor(40 + (1-darkness)*70)}, ${Math.floor(60 + (1-darkness)*70)}, ${alpha})`
          : `rgba(${Math.floor(200 - darkness*140)}, ${Math.floor(200 - darkness*140)}, ${Math.floor(210 - darkness*130)}, ${alpha})`;
        // fluffy
        for (let i=0;i<5;i++) {
          const ox = Math.cos(i*1.3 + c.x*20) * sz*0.7;
          const oy = Math.sin(i*0.9 + c.x*17) * sz*0.3;
          ctx.beginPath();
          ctx.arc(cx+ox, cy+oy, sz*(0.6 + Math.sin(i+c.x*10)*0.15), 0, Math.PI*2);
          ctx.fill();
        }
      }
      ctx.restore();

      // --- Lightning (heroic) ---
      e.lightningTimer -= dt;
      if (stormWeight > 0.35 && e.lightningTimer <= 0) {
        e.lightningFlash = 1;
        e.lightningTimer = 1200 + Math.random()*2500 * (1 - stormWeight);
        // make a zig-zag path
        e.lightningPath = [];
        let lx = W * (0.2 + Math.random()*0.6);
        let ly = 0;
        while (ly < H*0.7) {
          e.lightningPath.push([lx, ly]);
          lx += (Math.random()-0.5) * 40;
          ly += 18 + Math.random()*25;
        }
      }
      if (e.lightningFlash > 0) {
        ctx.save();
        ctx.fillStyle = `rgba(255,255,230,${0.25 * e.lightningFlash})`;
        ctx.fillRect(0,0,W,H);
        if (e.lightningPath) {
          ctx.strokeStyle = `rgba(255,250,200,${e.lightningFlash})`;
          ctx.lineWidth = 2.5;
          ctx.shadowColor = 'rgba(255,240,150,1)';
          ctx.shadowBlur = 20;
          ctx.beginPath();
          ctx.moveTo(e.lightningPath[0][0], e.lightningPath[0][1]);
          for (let i=1;i<e.lightningPath.length;i++) ctx.lineTo(e.lightningPath[i][0], e.lightningPath[i][1]);
          ctx.stroke();
        }
        ctx.restore();
        e.lightningFlash -= dt/400;
      }

      // --- Mountains: three parallax layers ---
      // Parallax drift based on time
      const drawMountains = (layer, colorTop, colorBot, amp, baseY, seed, parallax) => {
        const px = (time * 4 * parallax) % W;
        ctx.save();
        const grd = ctx.createLinearGradient(0, baseY - amp, 0, H);
        grd.addColorStop(0, colorTop);
        grd.addColorStop(1, colorBot);
        ctx.fillStyle = grd;
        ctx.beginPath();
        ctx.moveTo(0, H);
        const step = 14;
        for (let x = -200; x <= W + 200; x += step) {
          const xx = x - px;
          const n =
            Math.sin((xx+seed)*0.008) * 0.5 +
            Math.sin((xx+seed)*0.021 + 1.4) * 0.3 +
            Math.sin((xx+seed)*0.053 + 2.1) * 0.2;
          const y = baseY + n * amp;
          ctx.lineTo(x, y);
        }
        ctx.lineTo(W, H);
        ctx.closePath();
        ctx.fill();
        // snowcap hint on far layer
        if (layer === 0 && stormWeight < 0.6) {
          ctx.fillStyle = `rgba(255,255,255,${0.15 - eerieWeight*0.1})`;
          ctx.beginPath();
          ctx.moveTo(0, baseY);
          for (let x = -200; x <= W + 200; x += step) {
            const xx = x - px;
            const n =
              Math.sin((xx+seed)*0.008) * 0.5 +
              Math.sin((xx+seed)*0.021 + 1.4) * 0.3 +
              Math.sin((xx+seed)*0.053 + 2.1) * 0.2;
            const y = baseY + n * amp;
            const cap = baseY + n * amp + 14;
            ctx.lineTo(x, y);
          }
          ctx.lineTo(W, baseY+10);
          ctx.lineTo(0, baseY+10);
          ctx.closePath();
          ctx.fill();
        }
        ctx.restore();
      };

      drawMountains(0, cFar, blendColor(cFar, cMid, 0.5), 60, H*0.55, 100, 1);
      drawMountains(1, cMid, blendColor(cMid, cNear, 0.5), 80, H*0.67, 400, 2);
      drawMountains(2, cNear, blendColor(cNear, cGround, 0.6), 90, H*0.8, 900, 3);

      // --- Ground / stage floor ---
      const gg = ctx.createLinearGradient(0, H*0.82, 0, H);
      gg.addColorStop(0, cGround);
      gg.addColorStop(1, '#000');
      ctx.fillStyle = gg;
      ctx.fillRect(0, H*0.82, W, H*0.2);

      // Ground reflection suggestions (cosy: windows)
      if (cosyWeight > 0.2) {
        // a little cottage silhouette
        const cxw = W*0.22, cyw = H*0.78;
        ctx.fillStyle = `rgba(15,8,12,0.9)`;
        ctx.beginPath();
        ctx.moveTo(cxw-40, cyw);
        ctx.lineTo(cxw-40, cyw-36);
        ctx.lineTo(cxw-25, cyw-55);
        ctx.lineTo(cxw+25, cyw-55);
        ctx.lineTo(cxw+40, cyw-36);
        ctx.lineTo(cxw+40, cyw);
        ctx.closePath();
        ctx.fill();
        // window glow
        const glow = 0.5 + 0.2*Math.sin(time*2);
        ctx.fillStyle = `rgba(255, 200, 120, ${0.6*cosyWeight + glow*0.2})`;
        ctx.fillRect(cxw-10, cyw-44, 8, 10);
        ctx.fillRect(cxw+2, cyw-44, 8, 10);
        // chimney smoke
        ctx.strokeStyle = `rgba(200,200,210,${0.2*cosyWeight})`;
        ctx.lineWidth = 6;
        ctx.beginPath();
        const sx = cxw+28;
        for (let i=0;i<20;i++) {
          ctx.lineTo(sx + Math.sin(time*0.6 + i*0.2)*6, cyw - 60 - i*5);
        }
        ctx.stroke();
      }

      // Eerie: lone lamp post
      if (eerieWeight > 0.2) {
        const lx = W*0.78, ly = H*0.82;
        ctx.fillStyle = 'rgba(10,15,20,0.95)';
        ctx.fillRect(lx-2, ly-90, 4, 90);
        ctx.beginPath();
        ctx.arc(lx, ly-92, 8, 0, Math.PI*2);
        ctx.fill();
        // halo
        const gradL = ctx.createRadialGradient(lx, ly-92, 0, lx, ly-92, 90);
        const lampCol = isNight ? 'rgba(180,230,220,0.5)' : 'rgba(220,220,180,0.35)';
        gradL.addColorStop(0, lampCol);
        gradL.addColorStop(1, 'rgba(180,230,220,0)');
        ctx.fillStyle = gradL;
        ctx.beginPath();
        ctx.arc(lx, ly-92, 90, 0, Math.PI*2);
        ctx.fill();
      }

      // Heroic: banner/flag on the near hill
      if (stormWeight > 0.2) {
        const fx = W*0.78, fy = H*0.72;
        ctx.strokeStyle = 'rgba(20,10,10,0.9)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(fx, fy);
        ctx.lineTo(fx, fy-70);
        ctx.stroke();
        ctx.fillStyle = cAccent;
        ctx.beginPath();
        ctx.moveTo(fx, fy-70);
        ctx.lineTo(fx + 34 + Math.sin(time*5)*4, fy-62);
        ctx.lineTo(fx, fy-50);
        ctx.closePath();
        ctx.fill();
      }

      // --- Precipitation ---
      // Rain (eerie + heroic)
      const rainAmount = Math.min(1, eerieWeight*1.2 + stormWeight*1.3);
      if (rainAmount > 0.1) {
        ctx.strokeStyle = `rgba(180,200,220,${0.4*rainAmount})`;
        ctx.lineWidth = 1;
        for (const d of e.raindrops) {
          d.y += d.v * 0.02 * (1 + stormWeight);
          d.x += 0.001 * (1 + stormWeight*3);
          if (d.y > 1) { d.y = -0.05; d.x = Math.random(); }
          if (d.x > 1) d.x -= 1;
          const x = d.x * W, y = d.y * H;
          ctx.beginPath();
          ctx.moveTo(x, y);
          ctx.lineTo(x + stormWeight*3, y + d.len);
          ctx.stroke();
        }
      }

      // Cosy: falling leaves / embers
      if (cosyWeight > 0.3) {
        for (const lf of e.leaves) {
          lf.y += lf.v * 0.003;
          lf.x += Math.sin(time + lf.rot) * 0.0007;
          lf.rot += lf.spin;
          if (lf.y > 1) { lf.y = -0.05; lf.x = Math.random(); }
          const x = lf.x*W, y = lf.y*H;
          ctx.save();
          ctx.translate(x,y);
          ctx.rotate(lf.rot);
          ctx.fillStyle = `rgba(${200+Math.sin(lf.rot)*30}, ${120+Math.sin(lf.rot*2)*30}, 60, ${0.7*cosyWeight})`;
          ctx.beginPath();
          ctx.ellipse(0,0, lf.size, lf.size*0.55, 0, 0, Math.PI*2);
          ctx.fill();
          ctx.restore();
        }
      }

      // Eerie: fog band
      if (eerieWeight > 0.25) {
        const fogCount = 3;
        for (let i=0;i<fogCount;i++) {
          const y = H*0.7 + i*30;
          const g = ctx.createLinearGradient(0,y-30,0,y+30);
          g.addColorStop(0, 'rgba(200,220,220,0)');
          g.addColorStop(0.5, `rgba(200,220,220,${0.15*eerieWeight})`);
          g.addColorStop(1, 'rgba(200,220,220,0)');
          ctx.fillStyle = g;
          ctx.fillRect(0, y-30, W, 60);
        }
        // drifting fog blobs
        for (let i=0;i<8;i++) {
          const fx = ((time*10 + i*180) % (W+200)) - 100;
          const fy = H*0.75 + Math.sin(i + time*0.3)*20;
          const r = 80 + Math.sin(i*2+time)*20;
          const g = ctx.createRadialGradient(fx,fy,0,fx,fy,r);
          g.addColorStop(0, `rgba(220,230,230,${0.18*eerieWeight})`);
          g.addColorStop(1, 'rgba(220,230,230,0)');
          ctx.fillStyle = g;
          ctx.beginPath(); ctx.arc(fx,fy,r,0,Math.PI*2); ctx.fill();
        }
      }

      // Day mode: birds
      if (!isNight && cosyWeight + stormWeight < 0.9) {
        ctx.strokeStyle = 'rgba(30,20,20,0.7)';
        ctx.lineWidth = 1.5;
        for (const b of e.birds) {
          b.x += b.v;
          if (b.x > 1.1) b.x = -0.1;
          const bx = b.x*W, by = b.y*H + Math.sin(time*2+b.phase)*6;
          const flap = Math.sin(time*8 + b.phase)*4;
          ctx.beginPath();
          ctx.moveTo(bx-6, by+flap);
          ctx.quadraticCurveTo(bx, by-3, bx+6, by+flap);
          ctx.stroke();
        }
      }

      // --- Spotlight sweep (always) ---
      const spotX = W * (0.5 + Math.sin(time*0.3)*0.3);
      const spotY = 0;
      ctx.save();
      ctx.globalCompositeOperation = 'screen';
      const spot = ctx.createRadialGradient(spotX, spotY, 0, spotX, H*0.9, H*0.9);
      const spotIntensity = 0.25 + stormWeight*0.2;
      spot.addColorStop(0, `rgba(255,240,200,${spotIntensity})`);
      spot.addColorStop(0.4, `rgba(255,220,160,${spotIntensity*0.3})`);
      spot.addColorStop(1, 'rgba(255,220,160,0)');
      ctx.fillStyle = spot;
      ctx.beginPath();
      // cone
      ctx.moveTo(spotX - 10, spotY);
      ctx.lineTo(spotX + 10, spotY);
      ctx.lineTo(spotX + W*0.6, H*1.0);
      ctx.lineTo(spotX - W*0.6, H*1.0);
      ctx.closePath();
      ctx.fill();

      // second spotlight (counter-swing)
      const spotX2 = W * (0.5 - Math.sin(time*0.23)*0.28);
      const spot2 = ctx.createRadialGradient(spotX2, 0, 0, spotX2, H*0.9, H*0.9);
      spot2.addColorStop(0, `rgba(200,220,255,${spotIntensity*0.7})`);
      spot2.addColorStop(0.4, `rgba(200,220,255,${spotIntensity*0.2})`);
      spot2.addColorStop(1, 'rgba(200,220,255,0)');
      ctx.fillStyle = spot2;
      ctx.beginPath();
      ctx.moveTo(spotX2 - 10, 0);
      ctx.lineTo(spotX2 + 10, 0);
      ctx.lineTo(spotX2 + W*0.55, H);
      ctx.lineTo(spotX2 - W*0.55, H);
      ctx.closePath();
      ctx.fill();
      ctx.restore();

      // --- Vignette ---
      const vg = ctx.createRadialGradient(W/2, H/2, Math.min(W,H)*0.3, W/2, H/2, Math.max(W,H)*0.8);
      vg.addColorStop(0, 'rgba(0,0,0,0)');
      vg.addColorStop(1, 'rgba(0,0,0,0.55)');
      ctx.fillStyle = vg;
      ctx.fillRect(0,0,W,H);

      // --- Foreground stage edge (floorboards) ---
      const fgH = 26;
      const fg = ctx.createLinearGradient(0, H - fgH, 0, H);
      fg.addColorStop(0, 'rgba(50,30,20,0.95)');
      fg.addColorStop(1, 'rgba(10,5,3,1)');
      ctx.fillStyle = fg;
      ctx.fillRect(0, H - fgH, W, fgH);
      ctx.strokeStyle = 'rgba(180,140,80,0.25)';
      ctx.lineWidth = 1;
      for (let x=0; x<W; x+=80) {
        ctx.beginPath();
        ctx.moveTo(x, H - fgH);
        ctx.lineTo(x, H);
        ctx.stroke();
      }
      // footlights
      for (let x = 40; x < W; x += 60) {
        const g = ctx.createRadialGradient(x, H-fgH, 0, x, H-fgH, 60);
        g.addColorStop(0, `rgba(255,220,150,${0.35 + Math.sin(time*4+x)*0.05})`);
        g.addColorStop(1, 'rgba(255,220,150,0)');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(x, H-fgH, 60, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#ffd77a';
        ctx.beginPath();
        ctx.arc(x, H-fgH+2, 2.5, 0, Math.PI*2);
        ctx.fill();
      }

      animRef.current = requestAnimationFrame(draw);
    };
    animRef.current = requestAnimationFrame(draw);

    return () => {
      cancelAnimationFrame(animRef.current);
      ro.disconnect();
    };
  }, []);

  return <canvas ref={canvasRef} className="stage-canvas" />;
}

// ---- Forecast remix: reframes same data with mood-inflected words ----
function forecastLine(cond, mood) {
  const table = {
    sun:    { cosy: 'Fond light', eerie: 'Pale sky',    heroic: 'Blazing sun' },
    cloudy: { cosy: 'Soft skies', eerie: 'Drab overcast', heroic: 'Marching clouds' },
    rain:   { cosy: 'Gentle rain', eerie: 'Cold drizzle', heroic: 'Driving rain' },
    storm:  { cosy: 'Rolling thunder', eerie: 'Ominous squall', heroic: 'Great tempest' },
    fog:    { cosy: 'Dreamy mist',  eerie: 'Creeping fog',  heroic: 'Veiled field' },
  };
  return table[cond][mood];
}

function App() {
  const [cosy, setCosy] = useState(60);
  const [eerie, setEerie] = useState(25);
  const [heroic, setHeroic] = useState(50);
  const [mode, setMode] = useState('night'); // matinee (day) / night
  const [curtainOpen, setCurtainOpen] = useState(false);

  useEffect(() => {
    const t = setTimeout(() => setCurtainOpen(true), 700);
    return () => clearTimeout(t);
  }, []);

  // Trigger curtain re-reveal when mode changes
  const [curtainKey, setCurtainKey] = useState(0);
  useEffect(() => {
    setCurtainOpen(false);
    const t1 = setTimeout(() => setCurtainOpen(true), 700);
    setCurtainKey(k => k+1);
    return () => clearTimeout(t1);
  }, [mode]);

  const dMood = dominantMood(cosy, eerie, heroic);
  const actNames = {
    cosy: 'Act I — The Warm Window',
    eerie: 'Act II — The Lantern\u2019s Doubt',
    heroic: 'Act III — The Storm Ascendant',
  };
  const subtitle = pickSubtitle(cosy, eerie, heroic) + ' ' + (mode === 'night' ? '(Nightly performance.)' : '(Matinée.)');
  const shown = useTypewriter(subtitle, 26);

  return (
    <div className={`app ${mode === 'day' ? 'matinee' : ''}`}>
      <div className="stage-wrap">
        <div className="proscenium">
          <Stage cosy={cosy} eerie={eerie} heroic={heroic} mode={mode === 'day' ? 'day' : 'night'} curtainOpen={curtainOpen} />
          <div className="valance" />
          <div className="valance-trim" />
          <div className={`curtain left ${curtainOpen ? 'open' : ''}`} />
          <div className={`curtain right ${curtainOpen ? 'open' : ''}`} />

          <div className="act-title">
            <div className="act-label">NOW PLAYING</div>
            <div className="act-name">{actNames[dMood]}</div>
            <div className="act-divider" />
          </div>

          <div className="forecast">
            <h3>This Week&rsquo;s Playbill</h3>
            {BASE_FORECAST.map((f) => (
              <div className="forecast-row" key={f.day}>
                <span className="icon" style={{color: 'var(--gold)'}}>{CONDITION_GLYPH[f.cond]}</span>
                <span className="day">{f.day}</span>
                <span style={{fontSize: 11, color: 'var(--ink-dim)', flex: 1, paddingLeft: 8, fontStyle: 'italic'}}>
                  {forecastLine(f.cond, dMood)}
                </span>
                <span className="temp">{f.tempC}°</span>
              </div>
            ))}
          </div>

          <div className="subtitle">
            <span>{shown}</span><span className="caret">▍</span>
          </div>

          <div className="footer">THE WEATHER THEATRE · EST. MDCCCXC</div>
        </div>
      </div>

      <div className="hud-top">
        <div className="brand">THE <b>WEATHER</b> THEATRE</div>
        <div className="mode-toggle">
          <button className={mode==='day'?'active':''} onClick={() => setMode('day')}>Matinée</button>
          <button className={mode==='night'?'active':''} onClick={() => setMode('night')}>Night</button>
        </div>
      </div>

      <div className="panel">
        <div className="mood">
          <div className="mood-label"><span className="icon">🕯</span>Cosy</div>
          <input className="slider" type="range" min="0" max="100" value={cosy} onChange={e => setCosy(+e.target.value)} />
          <div className="mood-value">{cosy}</div>
        </div>
        <div className="mood">
          <div className="mood-label"><span className="icon">🜛</span>Eerie</div>
          <input className="slider" type="range" min="0" max="100" value={eerie} onChange={e => setEerie(+e.target.value)} />
          <div className="mood-value">{eerie}</div>
        </div>
        <div className="mood">
          <div className="mood-label"><span className="icon">⚔</span>Heroic</div>
          <input className="slider" type="range" min="0" max="100" value={heroic} onChange={e => setHeroic(+e.target.value)} />
          <div className="mood-value">{heroic}</div>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
