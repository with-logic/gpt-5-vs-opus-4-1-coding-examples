<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cloud Painter ☁️</title>
<style>
  :root {
    --sky-top: #8ec5ff;
    --sky-mid: #b6dcff;
    --sky-bot: #ffd8e8;
    --panel: rgba(255, 255, 255, 0.72);
    --panel-border: rgba(255, 255, 255, 0.9);
    --accent: #ff8fb2;
    --accent-2: #7cc6ff;
    --ink: #3a4a6b;
    --shadow: 0 10px 30px rgba(80, 110, 170, 0.25);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    font-family: 'Comic Sans MS', 'Chalkboard SE', 'Quicksand', system-ui, sans-serif;
    color: var(--ink);
    user-select: none;
    -webkit-user-select: none;
  }

  body {
    background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 55%, var(--sky-bot) 100%);
    position: relative;
  }

  /* Sun */
  .sun {
    position: fixed;
    top: 60px;
    right: 80px;
    width: 110px;
    height: 110px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #fff7c4, #ffd66b 60%, #ffb347 100%);
    box-shadow: 0 0 80px 20px rgba(255, 214, 107, 0.55), 0 0 140px 40px rgba(255, 214, 107, 0.25);
    pointer-events: none;
    z-index: 1;
    animation: sunPulse 6s ease-in-out infinite;
  }
  @keyframes sunPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  /* Canvas */
  #paintCanvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    z-index: 2;
    cursor: none;
    touch-action: none;
  }

  /* Animation canvas (planes & drift overlays) */
  #animCanvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    z-index: 3;
    pointer-events: none;
  }

  /* Custom cursor */
  .cursor {
    position: fixed;
    pointer-events: none;
    z-index: 20;
    transform: translate(-50%, -50%);
    mix-blend-mode: normal;
    transition: transform 0.08s ease-out;
  }
  .cursor svg {
    display: block;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));
    opacity: 0.85;
  }

  /* Title */
  .title {
    position: fixed;
    top: 22px;
    left: 28px;
    z-index: 10;
    font-size: 32px;
    font-weight: 700;
    color: white;
    text-shadow: 0 3px 10px rgba(80, 110, 170, 0.4), 0 1px 0 rgba(255,255,255,0.8);
    letter-spacing: 1px;
    pointer-events: none;
  }
  .title .emoji {
    display: inline-block;
    animation: wobble 3s ease-in-out infinite;
  }
  @keyframes wobble {
    0%, 100% { transform: rotate(-5deg); }
    50% { transform: rotate(10deg); }
  }

  /* Toolbar */
  .toolbar {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 18px;
    background: var(--panel);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 2px solid var(--panel-border);
    border-radius: 32px;
    box-shadow: var(--shadow);
    max-width: 95vw;
    flex-wrap: wrap;
    justify-content: center;
  }

  .tool-group {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 10px;
    border-radius: 20px;
    background: rgba(255,255,255,0.4);
  }

  .tool-group + .tool-group {
    border-left: none;
  }

  .tool-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--ink);
    opacity: 0.6;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-right: 4px;
  }

  .brush-btn, .action-btn {
    width: 52px;
    height: 52px;
    border: none;
    border-radius: 18px;
    background: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 3px 8px rgba(80, 110, 170, 0.15);
    position: relative;
  }

  .brush-btn:hover, .action-btn:hover {
    transform: translateY(-3px) scale(1.06);
    box-shadow: 0 8px 18px rgba(80, 110, 170, 0.25);
  }

  .brush-btn:active, .action-btn:active {
    transform: translateY(0) scale(0.96);
  }

  .brush-btn.active {
    background: linear-gradient(135deg, #ffd5e5 0%, #ffe9c2 100%);
    box-shadow: 0 0 0 3px var(--accent), 0 6px 14px rgba(255, 143, 178, 0.4);
    transform: translateY(-2px);
  }

  .brush-btn svg, .action-btn svg {
    width: 30px;
    height: 30px;
  }

  /* Size slider */
  .size-control {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 14px;
  }

  .size-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 110px;
    height: 6px;
    background: linear-gradient(90deg, #b6dcff, #ff8fb2);
    border-radius: 3px;
    outline: none;
  }

  .size-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: white;
    border: 3px solid var(--accent);
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }
  .size-slider::-moz-range-thumb {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: white;
    border: 3px solid var(--accent);
    cursor: pointer;
  }

  .size-preview {
    width: 34px;
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .size-preview .dot {
    background: white;
    border-radius: 50%;
    box-shadow: 0 0 8px rgba(255,255,255,0.8);
  }

  /* Color buttons */
  .color-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 3px solid white;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  }
  .color-btn:hover {
    transform: scale(1.15);
  }
  .color-btn.active {
    border-color: var(--accent);
    transform: scale(1.18);
    box-shadow: 0 0 0 2px var(--accent), 0 4px 10px rgba(0,0,0,0.2);
  }

  /* Welcome toast */
  .toast {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.8);
    z-index: 30;
    padding: 30px 50px;
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(10px);
    border: 3px solid white;
    border-radius: 30px;
    box-shadow: var(--shadow);
    text-align: center;
    opacity: 0;
    pointer-events: none;
    transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .toast.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }
  .toast h2 {
    margin: 0 0 8px;
    font-size: 28px;
    color: var(--accent);
  }
  .toast p {
    margin: 0;
    font-size: 16px;
    color: var(--ink);
  }

  /* Floating hearts/stars on save */
  .sparkle {
    position: fixed;
    pointer-events: none;
    z-index: 15;
    font-size: 24px;
    animation: floatUp 1.5s ease-out forwards;
  }
  @keyframes floatUp {
    0% { opacity: 1; transform: translate(0, 0) scale(0.5); }
    100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(1.4); }
  }

  /* Tooltip */
  .brush-btn::after, .action-btn::after {
    content: attr(data-tip);
    position: absolute;
    bottom: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--ink);
    color: white;
    padding: 4px 10px;
    border-radius: 10px;
    font-size: 11px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .brush-btn:hover::after, .action-btn:hover::after {
    opacity: 1;
  }

  @media (max-width: 640px) {
    .title { font-size: 22px; }
    .brush-btn, .action-btn { width: 44px; height: 44px; border-radius: 14px; }
    .brush-btn svg, .action-btn svg { width: 24px; height: 24px; }
    .color-btn { width: 28px; height: 28px; }
    .size-slider { width: 80px; }
    .sun { width: 70px; height: 70px; top: 30px; right: 30px; }
  }
</style>
</head>
<body>

<div class="sun"></div>
<div class="title">Cloud Painter <span class="emoji">☁️</span></div>

<canvas id="paintCanvas"></canvas>
<canvas id="animCanvas"></canvas>

<div class="cursor" id="cursor">
  <svg width="40" height="40" viewBox="0 0 40 40">
    <circle cx="20" cy="20" r="18" fill="none" stroke="white" stroke-width="2" stroke-dasharray="3 3" opacity="0.9"/>
    <circle cx="20" cy="20" r="2" fill="white"/>
  </svg>
</div>

<div class="toolbar" id="toolbar">
  <div class="tool-group" id="brushGroup">
    <button class="brush-btn active" data-brush="fluffy" data-tip="Fluffy Cloud">
      <svg viewBox="0 0 40 30" fill="white" stroke="#c8d6ef" stroke-width="1.5">
        <path d="M8 25 Q2 25 2 18 Q2 12 8 12 Q8 5 16 5 Q22 5 24 10 Q30 8 32 14 Q38 14 38 20 Q38 25 32 25 Z"/>
      </svg>
    </button>
    <button class="brush-btn" data-brush="puffy" data-tip="Puffy Cloud">
      <svg viewBox="0 0 40 30" fill="white" stroke="#c8d6ef" stroke-width="1.5">
        <circle cx="12" cy="20" r="8"/>
        <circle cx="22" cy="15" r="10"/>
        <circle cx="30" cy="21" r="7"/>
      </svg>
    </button>
    <button class="brush-btn" data-brush="wispy" data-tip="Wispy Streak">
      <svg viewBox="0 0 40 30" fill="none" stroke="white" stroke-width="3" stroke-linecap="round">
        <path d="M4 15 Q12 10 20 15 T36 15" />
        <path d="M8 22 Q14 19 22 22" opacity="0.7"/>
      </svg>
    </button>
    <button class="brush-btn" data-brush="star" data-tip="Sparkle">
      <svg viewBox="0 0 40 40" fill="#fff5a6" stroke="#ffd66b" stroke-width="1">
        <path d="M20 4 L24 16 L36 18 L26 26 L30 38 L20 30 L10 38 L14 26 L4 18 L16 16 Z"/>
      </svg>
    </button>
    <button class="brush-btn" data-brush="heart" data-tip="Heart">
      <svg viewBox="0 0 40 40" fill="#ffb3c6" stroke="#ff8fb2" stroke-width="1">
        <path d="M20 34 L6 20 Q2 14 8 10 Q14 6 20 14 Q26 6 32 10 Q38 14 34 20 Z"/>
      </svg>
    </button>
    <button class="brush-btn" data-brush="rainbow" data-tip="Rainbow">
      <svg viewBox="0 0 40 30" fill="none" stroke-width="3" stroke-linecap="round">
        <path d="M4 26 Q20 2 36 26" stroke="#ff8fb2"/>
        <path d="M8 26 Q20 8 32 26" stroke="#ffd66b"/>
        <path d="M12 26 Q20 14 28 26" stroke="#7cc6ff"/>
      </svg>
    </button>
  </div>

  <div class="tool-group">
    <div class="size-control">
      <div class="size-preview" id="sizePreview"><div class="dot" style="width: 20px; height: 20px;"></div></div>
      <input type="range" min="10" max="100" value="40" class="size-slider" id="sizeSlider">
    </div>
  </div>

  <div class="tool-group" id="colorGroup">
    <button class="color-btn active" data-color="#ffffff" style="background: white;"></button>
    <button class="color-btn" data-color="#ffd5e5" style="background: #ffd5e5;"></button>
    <button class="color-btn" data-color="#d5e8ff" style="background: #d5e8ff;"></button>
    <button class="color-btn" data-color="#e5d5ff" style="background: #e5d5ff;"></button>
    <button class="color-btn" data-color="#ffe9c2" style="background: #ffe9c2;"></button>
    <button class="color-btn" data-color="#d5f5e0" style="background: #d5f5e0;"></button>
  </div>

  <div class="tool-group">
    <button class="action-btn" id="planeBtn" data-tip="Add Plane">
      <svg viewBox="0 0 40 40" fill="#ff8fb2">
        <path d="M38 20 L22 22 L14 34 L10 33 L14 22 L4 20 L6 17 L15 17 L22 8 L26 9 Z"/>
      </svg>
    </button>
    <button class="action-btn" id="undoBtn" data-tip="Undo">
      <svg viewBox="0 0 40 40" fill="none" stroke="#7cc6ff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8 20 L16 12 L16 17 Q30 17 30 28 Q30 32 28 34"/>
        <path d="M8 20 L16 28 L16 23"/>
      </svg>
    </button>
    <button class="action-btn" id="clearBtn" data-tip="Clear Sky">
      <svg viewBox="0 0 40 40" fill="none" stroke="#ff8fb2" stroke-width="3" stroke-linecap="round">
        <path d="M10 12 L30 12 M14 12 L14 32 Q14 34 16 34 L24 34 Q26 34 26 32 L26 12 M17 8 L23 8"/>
      </svg>
    </button>
    <button class="action-btn" id="saveBtn" data-tip="Save Picture">
      <svg viewBox="0 0 40 40" fill="none" stroke="#6ac68a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 6 L20 26 M12 18 L20 26 L28 18"/>
        <path d="M8 30 L8 34 L32 34 L32 30"/>
      </svg>
    </button>
  </div>
</div>

<div class="toast" id="toast">
  <h2>✨ Saved! ✨</h2>
  <p>Your beautiful sky is downloading!</p>
</div>

<script>
(() => {
  const paintCanvas = document.getElementById('paintCanvas');
  const animCanvas = document.getElementById('animCanvas');
  const pctx = paintCanvas.getContext('2d');
  const actx = animCanvas.getContext('2d');
  const cursor = document.getElementById('cursor');
  const sizeSlider = document.getElementById('sizeSlider');
  const sizePreview = document.getElementById('sizePreview').querySelector('.dot');
  const toast = document.getElementById('toast');

  let W, H, DPR;
  let currentBrush = 'fluffy';
  let currentColor = '#ffffff';
  let currentSize = 40;
  let isDrawing = false;
  let lastX = 0, lastY = 0;
  let lastStampX = -999, lastStampY = -999;
  let undoStack = [];
  const MAX_UNDO = 20;

  // Planes
  const planes = [];
  // Background drifting clouds (decorative)
  const driftClouds = [];

  function resize() {
    DPR = window.devicePixelRatio || 1;
    W = window.innerWidth;
    H = window.innerHeight;
    [paintCanvas, animCanvas].forEach(c => {
      c.width = W * DPR;
      c.height = H * DPR;
      c.style.width = W + 'px';
      c.style.height = H + 'px';
      c.getContext('2d').setTransform(DPR, 0, 0, DPR, 0, 0);
    });
  }
  window.addEventListener('resize', resize);
  resize();

  // Initialize background clouds
  for (let i = 0; i < 4; i++) {
    driftClouds.push({
      x: Math.random() * W,
      y: 80 + Math.random() * (H * 0.5),
      speed: 0.1 + Math.random() * 0.2,
      scale: 0.6 + Math.random() * 0.7,
      opacity: 0.25 + Math.random() * 0.2,
      puffs: generatePuffs(3 + Math.floor(Math.random() * 3))
    });
  }

  function generatePuffs(n) {
    const puffs = [];
    let x = 0;
    for (let i = 0; i < n; i++) {
      puffs.push({
        dx: x,
        dy: (Math.random() - 0.5) * 12,
        r: 18 + Math.random() * 14
      });
      x += 15 + Math.random() * 12;
    }
    return puffs;
  }

  // === BRUSH RENDERERS ===
  function drawFluffy(ctx, x, y, size, color) {
    // Soft, classic cartoon cloud with multiple bumps
    const baseR = size * 0.5;
    ctx.save();
    ctx.translate(x, y);
    const puffs = [
      { x: -baseR * 0.7, y: baseR * 0.2, r: baseR * 0.75 },
      { x: -baseR * 0.2, y: -baseR * 0.35, r: baseR * 0.9 },
      { x: baseR * 0.35, y: -baseR * 0.2, r: baseR * 0.85 },
      { x: baseR * 0.75, y: baseR * 0.15, r: baseR * 0.7 },
      { x: 0, y: baseR * 0.35, r: baseR * 0.75 }
    ];
    // Soft shadow underneath
    ctx.fillStyle = 'rgba(130, 160, 210, 0.15)';
    for (const p of puffs) {
      ctx.beginPath();
      ctx.arc(p.x, p.y + 3, p.r, 0, Math.PI * 2);
      ctx.fill();
    }
    // Main color with gradient
    for (const p of puffs) {
      const grad = ctx.createRadialGradient(p.x - p.r * 0.3, p.y - p.r * 0.3, 0, p.x, p.y, p.r);
      grad.addColorStop(0, lightenColor(color, 15));
      grad.addColorStop(0.7, color);
      grad.addColorStop(1, darkenColor(color, 8));
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawPuffy(ctx, x, y, size, color) {
    // Smaller, rounder, denser puffs in a cluster
    const baseR = size * 0.4;
    ctx.save();
    ctx.translate(x, y);
    const count = 5;
    for (let i = 0; i < count; i++) {
      const angle = (i / count) * Math.PI * 2 + Math.random() * 0.3;
      const dist = baseR * 0.5;
      const px = Math.cos(angle) * dist;
      const py = Math.sin(angle) * dist * 0.6;
      const r = baseR * (0.7 + Math.random() * 0.3);
      const grad = ctx.createRadialGradient(px - r * 0.3, py - r * 0.3, 0, px, py, r);
      grad.addColorStop(0, lightenColor(color, 20));
      grad.addColorStop(1, color);
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(px, py, r, 0, Math.PI * 2);
      ctx.fill();
    }
    // Center puff
    const grad = ctx.createRadialGradient(-baseR * 0.3, -baseR * 0.3, 0, 0, 0, baseR);
    grad.addColorStop(0, lightenColor(color, 25));
    grad.addColorStop(1, color);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, 0, baseR, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawWispy(ctx, x, y, size, color) {
    // Long, soft horizontal wisp
    const w = size * 1.4;
    const h = size * 0.35;
    ctx.save();
    ctx.translate(x, y);
    const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, w * 0.6);
    grad.addColorStop(0, color);
    grad.addColorStop(0.5, hexToRgba(color, 0.6));
    grad.addColorStop(1, hexToRgba(color, 0));
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(0, 0, w * 0.6, h, 0, 0, Math.PI * 2);
    ctx.fill();
    // Extra wispy strokes
    ctx.fillStyle = hexToRgba(color, 0.4);
    ctx.beginPath();
    ctx.ellipse(-w * 0.2, h * 0.5, w * 0.3, h * 0.5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(w * 0.25, -h * 0.3, w * 0.25, h * 0.4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawStar(ctx, x, y, size, color) {
    const r = size * 0.5;
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(Math.random() * Math.PI * 2);
    // Glow
    const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, r * 1.5);
    glow.addColorStop(0, 'rgba(255, 245, 166, 0.6)');
    glow.addColorStop(1, 'rgba(255, 245, 166, 0)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(0, 0, r * 1.5, 0, Math.PI * 2);
    ctx.fill();
    // Star shape
    ctx.fillStyle = '#fff5a6';
    ctx.strokeStyle = '#ffd66b';
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let i = 0; i < 10; i++) {
      const angle = (i / 10) * Math.PI * 2 - Math.PI / 2;
      const rad = i % 2 === 0 ? r : r * 0.45;
      const px = Math.cos(angle) * rad;
      const py = Math.sin(angle) * rad;
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    // Sparkle center
    ctx.fillStyle = 'white';
    ctx.beginPath();
    ctx.arc(-r * 0.15, -r * 0.15, r * 0.12, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawHeart(ctx, x, y, size, color) {
    const r = size * 0.5;
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate((Math.random() - 0.5) * 0.3);
    // Shadow
    ctx.fillStyle = 'rgba(255, 143, 178, 0.25)';
    ctx.beginPath();
    heartPath(ctx, 2, 3, r);
    ctx.fill();
    // Heart
    const grad = ctx.createRadialGradient(-r * 0.3, -r * 0.3, 0, 0, 0, r);
    grad.addColorStop(0, '#ffd5e5');
    grad.addColorStop(1, '#ff8fb2');
    ctx.fillStyle = grad;
    ctx.beginPath();
    heartPath(ctx, 0, 0, r);
    ctx.fill();
    // Shine
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.beginPath();
    ctx.ellipse(-r * 0.25, -r * 0.2, r * 0.18, r * 0.1, -0.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function heartPath(ctx, x, y, r) {
    ctx.moveTo(x, y + r * 0.3);
    ctx.bezierCurveTo(x - r, y - r * 0.3, x - r, y - r * 1.1, x, y - r * 0.5);
    ctx.bezierCurveTo(x + r, y - r * 1.1, x + r, y - r * 0.3, x, y + r * 0.3);
    ctx.bezierCurveTo(x + r * 0.4, y + r * 0.7, x + r * 0.2, y + r * 0.9, x, y + r);
    ctx.bezierCurveTo(x - r * 0.2, y + r * 0.9, x - r * 0.4, y + r * 0.7, x, y + r * 0.3);
  }

  function drawRainbow(ctx, x, y, size, color) {
    const r = size * 0.8;
    ctx.save();
    ctx.translate(x, y);
    const colors = ['#ff8fb2', '#ffb87a', '#ffd66b', '#7cc68a', '#7cc6ff', '#b89aff'];
    const stripe = r * 0.1;
    ctx.lineCap = 'round';
    ctx.lineWidth = stripe;
    colors.forEach((col, i) => {
      ctx.strokeStyle = col;
      ctx.beginPath();
      ctx.arc(0, r * 0.3, r - i * stripe * 1.1, Math.PI, 0, false);
      ctx.stroke();
    });
    // Tiny cloud at ends
    ctx.fillStyle = 'white';
    ctx.beginPath();
    ctx.arc(-r + stripe, r * 0.3, stripe * 1.8, 0, Math.PI * 2);
    ctx.arc(r - stripe, r * 0.3, stripe * 1.8, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // Color helpers
  function hexToRgb(hex) {
    hex = hex.replace('#', '');
    return {
      r: parseInt(hex.substr(0, 2), 16),
      g: parseInt(hex.substr(2, 2), 16),
      b: parseInt(hex.substr(4, 2), 16)
    };
  }
  function lightenColor(hex, amt) {
    const { r, g, b } = hexToRgb(hex);
    return `rgb(${Math.min(255, r + amt * 2.55)},${Math.min(255, g + amt * 2.55)},${Math.min(255, b + amt * 2.55)})`;
  }
  function darkenColor(hex, amt) {
    const { r, g, b } = hexToRgb(hex);
    return `rgb(${Math.max(0, r - amt * 2.55)},${Math.max(0, g - amt * 2.55)},${Math.max(0, b - amt * 2.55)})`;
  }
  function hexToRgba(hex, a) {
    const { r, g, b } = hexToRgb(hex);
    return `rgba(${r},${g},${b},${a})`;
  }

  function stamp(x, y) {
    const size = currentSize;
    const ctx = pctx;
    switch (currentBrush) {
      case 'fluffy': drawFluffy(ctx, x, y, size, currentColor); break;
      case 'puffy': drawPuffy(ctx, x, y, size, currentColor); break;
      case 'wispy': drawWispy(ctx, x, y, size, currentColor); break;
      case 'star': drawStar(ctx, x, y, size, currentColor); break;
      case 'heart': drawHeart(ctx, x, y, size, currentColor); break;
      case 'rainbow': drawRainbow(ctx, x, y, size, currentColor); break;
    }
  }

  // Undo snapshots
  function saveSnapshot() {
    try {
      const snap = pctx.getImageData(0, 0, paintCanvas.width, paintCanvas.height);
      undoStack.push(snap);
      if (undoStack.length > MAX_UNDO) undoStack.shift();
    } catch(e) {}
  }
  function undo() {
    if (undoStack.length > 0) {
      const snap = undoStack.pop();
      pctx.save();
      pctx.setTransform(1, 0, 0, 1, 0, 0);
      pctx.putImageData(snap, 0, 0);
      pctx.restore();
    }
  }

  // === DRAWING EVENTS ===
  function getPos(e) {
    const rect = paintCanvas.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return { x: t.clientX - rect.left, y: t.clientY - rect.top };
  }

  function startDraw(e) {
    e.preventDefault();
    saveSnapshot();
    isDrawing = true;
    const { x, y } = getPos(e);
    lastX = x; lastY = y;
    lastStampX = -999; lastStampY = -999;
    drawLine(x, y);
  }
  function moveDraw(e) {
    const { x, y } = getPos(e);
    updateCursor(x, y);
    if (!isDrawing) return;
    e.preventDefault();
    drawLine(x, y);
    lastX = x; lastY = y;
  }
  function endDraw() {
    isDrawing = false;
  }

  function drawLine(x, y) {
    // Space stamps based on brush & size
    const spacing = Math.max(currentSize * (currentBrush === 'wispy' ? 0.3 : 0.25), 4);
    const dx = x - lastStampX;
    const dy = y - lastStampY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < spacing && lastStampX !== -999) return;

    // Interpolate stamps along the segment
    const fromX = lastStampX === -999 ? x : lastStampX;
    const fromY = lastStampY === -999 ? y : lastStampY;
    const segDx = x - fromX;
    const segDy = y - fromY;
    const segDist = Math.sqrt(segDx * segDx + segDy * segDy);
    const steps = Math.max(1, Math.floor(segDist / spacing));
    for (let i = 1; i <= steps; i++) {
      const t = i / steps;
      const sx = fromX + segDx * t;
      const sy = fromY + segDy * t;
      stamp(sx, sy);
    }
    lastStampX = x;
    lastStampY = y;
  }

  paintCanvas.addEventListener('mousedown', startDraw);
  paintCanvas.addEventListener('mousemove', moveDraw);
  window.addEventListener('mouseup', endDraw);
  paintCanvas.addEventListener('mouseleave', () => { cursor.style.opacity = '0'; });
  paintCanvas.addEventListener('mouseenter', () => { cursor.style.opacity = '1'; });

  paintCanvas.addEventListener('touchstart', startDraw, { passive: false });
  paintCanvas.addEventListener('touchmove', moveDraw, { passive: false });
  paintCanvas.addEventListener('touchend', endDraw);

  function updateCursor(x, y) {
    cursor.style.left = x + 'px';
    cursor.style.top = y + 'px';
    const s = Math.max(30, currentSize);
    cursor.style.width = s + 'px';
    cursor.style.height = s + 'px';
    cursor.querySelector('svg').setAttribute('width', s);
    cursor.querySelector('svg').setAttribute('height', s);
  }

  // === TOOLBAR HANDLERS ===
  document.querySelectorAll('.brush-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.brush-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentBrush = btn.dataset.brush;
    });
  });

  document.querySelectorAll('.color-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentColor = btn.dataset.color;
    });
  });

  sizeSlider.addEventListener('input', () => {
    currentSize = parseInt(sizeSlider.value);
    const pv = Math.min(30, currentSize * 0.4);
    sizePreview.style.width = pv + 'px';
    sizePreview.style.height = pv + 'px';
  });

  document.getElementById('clearBtn').addEventListener('click', () => {
    saveSnapshot();
    pctx.clearRect(0, 0, W, H);
    planes.length = 0;
  });

  document.getElementById('undoBtn').addEventListener('click', undo);

  document.getElementById('planeBtn').addEventListener('click', () => {
    addPlane();
  });

  document.getElementById('saveBtn').addEventListener('click', saveImage);

  // === PLANES ===
  function addPlane() {
    const goRight = Math.random() > 0.5;
    const y = 80 + Math.random() * (H * 0.5);
    const colors = ['#ff8fb2', '#7cc6ff', '#ffb347', '#b89aff', '#7cc68a'];
    planes.push({
      x: goRight ? -100 : W + 100,
      y,
      vx: (goRight ? 1 : -1) * (1.5 + Math.random() * 1.5),
      color: colors[Math.floor(Math.random() * colors.length)],
      trail: [],
      bob: Math.random() * Math.PI * 2
    });
  }

  // Start with one plane
  setTimeout(() => addPlane(), 500);

  function drawPlane(ctx, p) {
    const dir = p.vx > 0 ? 1 : -1;
    // Trail (contrail)
    p.trail.push({ x: p.x - dir * 20, y: p.y + 2, life: 1 });
    if (p.trail.length > 40) p.trail.shift();

    ctx.save();
    for (let i = 0; i < p.trail.length; i++) {
      const t = p.trail[i];
      t.life -= 0.025;
      if (t.life <= 0) continue;
      ctx.fillStyle = `rgba(255, 255, 255, ${t.life * 0.7})`;
      ctx.beginPath();
      ctx.arc(t.x, t.y, 4 * t.life + 1, 0, Math.PI * 2);
      ctx.fill();
    }
    p.trail = p.trail.filter(t => t.life > 0);
    ctx.restore();

    // Plane body
    ctx.save();
    ctx.translate(p.x, p.y + Math.sin(p.bob) * 3);
    ctx.scale(dir, 1);

    // Shadow
    ctx.fillStyle = 'rgba(80, 110, 170, 0.2)';
    ctx.beginPath();
    ctx.ellipse(2, 18, 25, 4, 0, 0, Math.PI * 2);
    ctx.fill();

    // Body
    ctx.fillStyle = p.color;
    ctx.strokeStyle = darkenColor(p.color, 10);
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(-22, 0);
    ctx.quadraticCurveTo(-18, -6, 0, -5);
    ctx.lineTo(20, -2);
    ctx.quadraticCurveTo(26, 0, 20, 3);
    ctx.lineTo(0, 5);
    ctx.quadraticCurveTo(-18, 6, -22, 0);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Wings
    ctx.fillStyle = lightenColor(p.color, 5);
    ctx.beginPath();
    ctx.moveTo(-4, -2);
    ctx.lineTo(-14, -14);
    ctx.lineTo(-6, -14);
    ctx.lineTo(6, -2);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(-4, 2);
    ctx.lineTo(-14, 12);
    ctx.lineTo(-6, 12);
    ctx.lineTo(6, 2);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Tail
    ctx.fillStyle = darkenColor(p.color, 5);
    ctx.beginPath();
    ctx.moveTo(-22, 0);
    ctx.lineTo(-28, -8);
    ctx.lineTo(-22, -4);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Window
    ctx.fillStyle = '#a0d8ff';
    ctx.strokeStyle = 'white';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.ellipse(8, -1, 5, 2.5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // Nose dot
    ctx.fillStyle = 'white';
    ctx.beginPath();
    ctx.arc(22, 0, 1.5, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  function drawDriftCloud(ctx, c) {
    ctx.save();
    ctx.translate(c.x, c.y);
    ctx.scale(c.scale, c.scale);
    ctx.globalAlpha = c.opacity;
    for (const p of c.puffs) {
      const grad = ctx.createRadialGradient(p.dx - p.r * 0.3, p.dy - p.r * 0.3, 0, p.dx, p.dy, p.r);
      grad.addColorStop(0, 'rgba(255, 255, 255, 1)');
      grad.addColorStop(1, 'rgba(255, 255, 255, 0.5)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(p.dx, p.dy, p.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  // === ANIMATION LOOP ===
  function animate() {
    actx.clearRect(0, 0, W, H);

    // Drift clouds (decorative, behind planes)
    for (const c of driftClouds) {
      c.x += c.speed;
      const width = 100 * c.scale;
      if (c.x > W + width) c.x = -width;
      drawDriftCloud(actx, c);
    }

    // Planes
    for (const p of planes) {
      p.x += p.vx;
      p.bob += 0.05;
      drawPlane(actx, p);
    }
    // Remove off-screen planes
    for (let i = planes.length - 1; i >= 0; i--) {
      if (planes[i].x < -200 || planes[i].x > W + 200) planes.splice(i, 1);
    }

    requestAnimationFrame(animate);
  }
  animate();

  // === SAVE IMAGE ===
  function saveImage() {
    // Compose everything onto a temp canvas
    const out = document.createElement('canvas');
    out.width = W * DPR;
    out.height = H * DPR;
    const octx = out.getContext('2d');

    // Sky gradient
    const grad = octx.createLinearGradient(0, 0, 0, out.height);
    grad.addColorStop(0, '#8ec5ff');
    grad.addColorStop(0.55, '#b6dcff');
    grad.addColorStop(1, '#ffd8e8');
    octx.fillStyle = grad;
    octx.fillRect(0, 0, out.width, out.height);

    // Sun
    const sunX = out.width - 135 * DPR;
    const sunY = 115 * DPR;
    const sunR = 55 * DPR;
    const sunGrad = octx.createRadialGradient(sunX - sunR * 0.3, sunY - sunR * 0.3, 0, sunX, sunY, sunR);
    sunGrad.addColorStop(0, '#fff7c4');
    sunGrad.addColorStop(0.6, '#ffd66b');
    sunGrad.addColorStop(1, '#ffb347');
    octx.fillStyle = sunGrad;
    octx.beginPath();
    octx.arc(sunX, sunY, sunR, 0, Math.PI * 2);
    octx.fill();

    // Drift clouds
    octx.save();
    octx.scale(DPR, DPR);
    for (const c of driftClouds) drawDriftCloud(octx, c);
    octx.restore();

    // Paint canvas
    octx.drawImage(paintCanvas, 0, 0);

    // Planes
    octx.save();
    octx.scale(DPR, DPR);
    for (const p of planes) drawPlane(octx, p);
    octx.restore();

    // Download
    const link = document.createElement('a');
    link.download = 'my-sky-' + Date.now() + '.png';
    link.href = out.toDataURL('image/png');
    link.click();

    // Toast + sparkles
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1800);
    spawnSparkles();
  }

  function spawnSparkles() {
    const symbols = ['✨', '⭐', '💖', '🌟', '☁️'];
    for (let i = 0; i < 14; i++) {
      const s = document.createElement('div');
      s.className = 'sparkle';
      s.textContent = symbols[Math.floor(Math.random() * symbols.length)];
      s.style.left = (window.innerWidth / 2 + (Math.random() - 0.5) * 100) + 'px';
      s.style.top = (window.innerHeight / 2) + 'px';
      s.style.setProperty('--dx', ((Math.random() - 0.5) * 400) + 'px');
      s.style.setProperty('--dy', (-150 - Math.random() * 200) + 'px');
      document.body.appendChild(s);
      setTimeout(() => s.remove(), 1600);
    }
  }

  // Keyboard shortcuts
  window.addEventListener('keydown', (e) => {
    if (e.ctrlKey || e.metaKey) {
      if (e.key === 'z') { e.preventDefault(); undo(); }
      if (e.key === 's') { e.preventDefault(); saveImage(); }
    }
  });

  // Initial cursor
  document.addEventListener('mousemove', (e) => {
    updateCursor(e.clientX, e.clientY);
  });

  // Paint a welcome cloud
  setTimeout(() => {
    drawFluffy(pctx, W * 0.3, H * 0.4, 80, '#ffffff');
    drawPuffy(pctx, W * 0.65, H * 0.55, 60, '#ffd5e5');
  }, 100);
})();
</script>
</body>
</html>
