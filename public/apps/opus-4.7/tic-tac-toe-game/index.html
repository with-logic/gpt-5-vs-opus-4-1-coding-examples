<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Ludus Trium — Roman Tic Tac Toe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;800&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Cinzel+Decorative:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    /* Marble Day (default) */
    --bg-1: #f3ece0;
    --bg-2: #e8ddc7;
    --bg-3: #d9c9a8;
    --marble-vein: rgba(120, 95, 55, 0.18);
    --panel: rgba(255, 251, 240, 0.72);
    --panel-border: rgba(160, 125, 60, 0.35);
    --ink: #2a2013;
    --ink-soft: #5b4a2c;
    --muted: #8a7850;
    --gold-1: #d4a944;
    --gold-2: #b8862a;
    --gold-3: #8a5e16;
    --gold-glow: rgba(212, 169, 68, 0.55);
    --crimson: #8a1c1c;
    --crimson-soft: #a83232;
    --cell-bg: rgba(255, 250, 238, 0.78);
    --cell-border: rgba(140, 105, 45, 0.38);
    --cell-hover: rgba(255, 240, 200, 0.95);
    --shadow-1: 0 8px 24px rgba(80, 55, 20, 0.18);
    --shadow-2: 0 18px 48px rgba(80, 55, 20, 0.22);
    --shadow-in: inset 0 2px 6px rgba(0, 0, 0, 0.08);
    --win-bg: linear-gradient(135deg, rgba(255, 225, 150, 0.95), rgba(220, 170, 60, 0.95));
  }

  [data-theme="night"] {
    --bg-1: #0f1320;
    --bg-2: #1a1f33;
    --bg-3: #262a42;
    --marble-vein: rgba(200, 180, 140, 0.08);
    --panel: rgba(28, 32, 52, 0.78);
    --panel-border: rgba(200, 165, 80, 0.35);
    --ink: #f1e7cc;
    --ink-soft: #cbbb8a;
    --muted: #8a7f5f;
    --gold-1: #e8c15a;
    --gold-2: #c79a2e;
    --gold-3: #8a6514;
    --gold-glow: rgba(232, 193, 90, 0.55);
    --crimson: #b32f2f;
    --crimson-soft: #d34545;
    --cell-bg: rgba(40, 45, 68, 0.82);
    --cell-border: rgba(200, 165, 80, 0.32);
    --cell-hover: rgba(55, 60, 90, 0.92);
    --shadow-1: 0 8px 24px rgba(0, 0, 0, 0.5);
    --shadow-2: 0 18px 48px rgba(0, 0, 0, 0.6);
    --shadow-in: inset 0 2px 6px rgba(0, 0, 0, 0.35);
    --win-bg: linear-gradient(135deg, rgba(80, 60, 20, 0.95), rgba(180, 130, 40, 0.9));
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; padding: 0; }

  body {
    font-family: 'Cormorant Garamond', Georgia, serif;
    color: var(--ink);
    background: var(--bg-1);
    overflow: hidden;
    min-height: 100vh;
    min-height: 100dvh;
    position: relative;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* Marble background */
  .marble {
    position: fixed;
    inset: 0;
    z-index: -2;
    background:
      radial-gradient(ellipse at 20% 15%, var(--bg-1) 0%, var(--bg-2) 45%, var(--bg-3) 100%);
  }
  .marble::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(ellipse at 30% 20%, var(--marble-vein) 0%, transparent 45%),
      radial-gradient(ellipse at 70% 80%, var(--marble-vein) 0%, transparent 50%),
      radial-gradient(ellipse at 85% 30%, var(--marble-vein) 0%, transparent 40%),
      radial-gradient(ellipse at 15% 85%, var(--marble-vein) 0%, transparent 45%);
    opacity: 0.9;
    mix-blend-mode: multiply;
  }
  [data-theme="night"] .marble::before { mix-blend-mode: screen; opacity: 0.7; }

  .marble::after {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='600' height='600'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.2  0 0 0 0 0.15  0 0 0 0 0.08  0 0 0 0.12 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    opacity: 0.35;
    mix-blend-mode: multiply;
    pointer-events: none;
  }
  [data-theme="night"] .marble::after { opacity: 0.18; mix-blend-mode: screen; }

  /* Colosseum silhouette */
  .colosseum {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    height: 38vh;
    z-index: -1;
    pointer-events: none;
    opacity: 0.18;
    background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1200 400' preserveAspectRatio='xMidYMax meet'><g fill='%23000'><path d='M0,400 L0,290 Q0,240 30,240 L60,240 L60,200 L90,200 L90,240 L120,240 L120,200 L150,200 L150,240 L180,240 L180,200 L210,200 L210,240 L240,240 L240,200 L270,200 L270,240 L300,240 L300,200 L330,200 L330,240 L360,240 L360,200 L390,200 L390,240 L420,240 L420,180 Q420,140 470,130 Q510,122 540,124 L540,80 Q540,40 600,40 Q660,40 660,80 L660,124 Q690,122 730,130 Q780,140 780,180 L780,240 L810,240 L810,200 L840,200 L840,240 L870,240 L870,200 L900,200 L900,240 L930,240 L930,200 L960,200 L960,240 L990,240 L990,200 L1020,200 L1020,240 L1050,240 L1050,200 L1080,200 L1080,240 L1110,240 L1110,200 L1140,200 L1140,240 L1170,240 Q1200,240 1200,290 L1200,400 Z'/></g></svg>") center bottom / cover no-repeat;
  }
  [data-theme="night"] .colosseum { opacity: 0.32; filter: invert(1) brightness(0.6); }

  /* Layout */
  .stage {
    position: relative;
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
    padding: clamp(8px, 1.4vmin, 18px);
    gap: clamp(6px, 1vmin, 14px);
  }

  /* Top bar */
  header.topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: clamp(8px, 1.5vmin, 18px);
    padding: clamp(8px, 1.4vmin, 16px) clamp(12px, 2vmin, 22px);
    background: var(--panel);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid var(--panel-border);
    border-radius: 14px;
    box-shadow: var(--shadow-1);
    flex-wrap: wrap;
  }

  .title-group {
    display: flex;
    align-items: center;
    gap: clamp(8px, 1.5vmin, 14px);
    min-width: 0;
  }

  .crest {
    width: clamp(36px, 5vmin, 52px);
    height: clamp(36px, 5vmin, 52px);
    flex-shrink: 0;
    filter: drop-shadow(0 2px 4px rgba(80, 55, 20, 0.25));
  }

  .title-stack { display: flex; flex-direction: column; line-height: 1; min-width: 0; }

  h1.title {
    font-family: 'Cinzel Decorative', 'Cinzel', serif;
    font-weight: 900;
    letter-spacing: 0.08em;
    font-size: clamp(1rem, 2.6vmin, 1.6rem);
    margin: 0;
    color: var(--ink);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    background: linear-gradient(180deg, var(--gold-1) 0%, var(--gold-2) 55%, var(--gold-3) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 1px 0 rgba(255,255,255,0.25);
  }

  .subtitle {
    font-family: 'Cinzel', serif;
    font-size: clamp(0.65rem, 1.3vmin, 0.82rem);
    letter-spacing: 0.32em;
    color: var(--muted);
    margin-top: 0.25em;
    text-transform: uppercase;
  }

  .actions {
    display: flex;
    gap: clamp(6px, 1vmin, 10px);
    flex-wrap: wrap;
  }

  button {
    font-family: 'Cinzel', serif;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    font-size: clamp(0.7rem, 1.4vmin, 0.85rem);
    padding: clamp(8px, 1.3vmin, 12px) clamp(12px, 2vmin, 20px);
    border-radius: 10px;
    border: 1px solid var(--panel-border);
    background: linear-gradient(180deg, rgba(255,255,255,0.35), rgba(255,255,255,0.05));
    color: var(--ink);
    box-shadow: var(--shadow-1), inset 0 1px 0 rgba(255,255,255,0.35);
    transition: transform 120ms ease, box-shadow 120ms ease, background 120ms ease, border-color 120ms ease;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  [data-theme="night"] button {
    background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(0,0,0,0.1));
    color: var(--ink);
  }
  button:hover { transform: translateY(-1px); border-color: var(--gold-2); box-shadow: 0 10px 24px rgba(80, 55, 20, 0.22), inset 0 1px 0 rgba(255,255,255,0.4); }
  button:active { transform: translateY(0); box-shadow: var(--shadow-in); }
  button:focus-visible { outline: 2px solid var(--gold-1); outline-offset: 2px; }

  button.primary {
    color: #fff7e0;
    background: linear-gradient(180deg, var(--gold-1), var(--gold-2) 65%, var(--gold-3));
    border-color: var(--gold-3);
    text-shadow: 0 1px 0 rgba(0,0,0,0.25);
  }
  button.primary:hover { filter: brightness(1.05); }

  /* Banner for victory */
  .banner {
    min-height: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 0;
    transition: min-height 320ms cubic-bezier(.2,.7,.2,1);
  }
  .banner.show { min-height: clamp(44px, 6.5vmin, 64px); }
  .banner-inner {
    opacity: 0;
    transform: translateY(-8px) scale(0.98);
    transition: opacity 260ms ease, transform 260ms ease;
    padding: clamp(8px, 1.4vmin, 14px) clamp(14px, 2.5vmin, 24px);
    border-radius: 12px;
    background: var(--win-bg);
    color: var(--ink);
    border: 1px solid var(--gold-3);
    box-shadow: var(--shadow-2), inset 0 1px 0 rgba(255,255,255,0.35);
    font-family: 'Cinzel Decorative', 'Cinzel', serif;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-size: clamp(0.85rem, 2vmin, 1.2rem);
    text-align: center;
    white-space: nowrap;
  }
  .banner.show .banner-inner { opacity: 1; transform: translateY(0) scale(1); }

  /* Main area */
  main.arena {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: clamp(8px, 2vmin, 20px);
    align-items: center;
    justify-items: center;
    min-height: 0;
  }
  @media (max-width: 780px) {
    main.arena {
      grid-template-columns: 1fr;
      grid-template-rows: auto auto auto;
      gap: clamp(6px, 1.5vmin, 12px);
    }
  }

  /* Scoreboards as side panels on desktop; stacked rows on mobile */
  .side {
    display: flex;
    flex-direction: column;
    gap: clamp(8px, 1.3vmin, 14px);
    width: min(22vmin, 280px);
    min-width: 140px;
  }
  @media (max-width: 780px) {
    .side {
      flex-direction: row;
      width: 100%;
      justify-content: space-around;
      gap: clamp(6px, 1.5vmin, 10px);
    }
  }

  .score-card {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 14px;
    padding: clamp(10px, 1.8vmin, 18px);
    box-shadow: var(--shadow-1);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    text-align: center;
    position: relative;
    overflow: hidden;
    transition: border-color 180ms ease, transform 180ms ease, box-shadow 180ms ease;
  }
  .score-card.active {
    border-color: var(--gold-2);
    box-shadow: 0 0 0 2px var(--gold-glow), var(--shadow-1);
  }
  .score-card .label {
    font-family: 'Cinzel', serif;
    font-size: clamp(0.7rem, 1.3vmin, 0.85rem);
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .score-card .glyph {
    font-size: clamp(1.4rem, 4vmin, 2.4rem);
    font-weight: 800;
    color: var(--gold-2);
    font-family: 'Cinzel Decorative', 'Cinzel', serif;
    line-height: 1;
    margin: 4px 0;
  }
  .score-card .value {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: clamp(1.3rem, 3.2vmin, 2rem);
    color: var(--ink);
  }
  .score-card .sub {
    font-size: clamp(0.65rem, 1.1vmin, 0.75rem);
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* Board */
  .board-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(6px, 1.2vmin, 12px);
    min-width: 0;
  }

  .board {
    --size: min(62vmin, 62vh);
    width: var(--size);
    height: var(--size);
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: clamp(6px, 1.2vmin, 12px);
    padding: clamp(8px, 1.5vmin, 16px);
    background:
      linear-gradient(145deg, rgba(255,255,255,0.22), rgba(0,0,0,0.06)),
      var(--panel);
    border: 1.5px solid var(--panel-border);
    border-radius: 18px;
    box-shadow: var(--shadow-2), inset 0 1px 0 rgba(255,255,255,0.35);
    position: relative;
  }
  .board::before {
    content: "";
    position: absolute;
    inset: 3px;
    border-radius: 16px;
    border: 1px solid rgba(212, 169, 68, 0.35);
    pointer-events: none;
  }

  .cell {
    position: relative;
    background: var(--cell-bg);
    border: 1px solid var(--cell-border);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 120ms ease, background 150ms ease, box-shadow 200ms ease, border-color 180ms ease;
    box-shadow: var(--shadow-in);
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }
  .cell:hover:not(.taken):not(.disabled) {
    background: var(--cell-hover);
    border-color: var(--gold-2);
    transform: translateY(-1px);
  }
  .cell:active:not(.taken):not(.disabled) { transform: translateY(0); }
  .cell:focus-visible { outline: 2px solid var(--gold-1); outline-offset: -4px; }
  .cell.taken { cursor: not-allowed; }
  .cell.disabled { cursor: not-allowed; }

  .cell .mark {
    font-family: 'Cinzel Decorative', 'Cinzel', serif;
    font-weight: 900;
    font-size: clamp(2.5rem, 14vmin, 10rem);
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 78%;
    height: 78%;
    transform: scale(0.5);
    opacity: 0;
    transition: transform 280ms cubic-bezier(.2,1.3,.3,1), opacity 220ms ease;
    user-select: none;
    pointer-events: none;
  }
  .cell.taken .mark { transform: scale(1); opacity: 1; }

  .mark.x { color: var(--crimson); text-shadow: 0 2px 4px rgba(138, 28, 28, 0.3); }
  .mark.o { color: var(--gold-2); text-shadow: 0 2px 4px rgba(184, 134, 42, 0.3); }
  [data-theme="night"] .mark.x { color: var(--crimson-soft); }

  .cell.win {
    background: linear-gradient(145deg, rgba(255, 220, 140, 0.95), rgba(220, 170, 60, 0.9));
    border-color: var(--gold-3);
    box-shadow: 0 0 0 2px var(--gold-glow), 0 8px 24px rgba(212, 169, 68, 0.4);
  }
  [data-theme="night"] .cell.win {
    background: linear-gradient(145deg, rgba(100, 75, 25, 0.95), rgba(190, 140, 40, 0.9));
  }
  .cell.win .mark { color: #fff7d6; text-shadow: 0 2px 6px rgba(0,0,0,0.3); }

  /* SVG glyph sizing */
  .cell .mark svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  .status-line {
    font-family: 'Cinzel', serif;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-size: clamp(0.72rem, 1.4vmin, 0.9rem);
    color: var(--ink-soft);
    text-align: center;
    min-height: 1.5em;
  }
  .status-line .accent { color: var(--gold-2); font-weight: 700; }

  /* Canvas confetti */
  canvas.confetti {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 50;
  }

  /* Dialog */
  dialog.modal {
    border: none;
    padding: 0;
    background: transparent;
    max-width: none;
    max-height: none;
    width: 100%;
    height: 100%;
    margin: 0;
  }
  dialog.modal::backdrop {
    background: rgba(20, 14, 4, 0.55);
    backdrop-filter: blur(4px);
  }
  [data-theme="night"] dialog.modal::backdrop { background: rgba(0, 0, 0, 0.65); }

  .modal-inner {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: min(92vw, 560px);
    max-height: 90vh;
    overflow-y: auto;
    background: var(--panel);
    background-color: var(--bg-1);
    border: 1px solid var(--panel-border);
    border-radius: 16px;
    box-shadow: var(--shadow-2);
    padding: clamp(16px, 2.5vmin, 26px);
    color: var(--ink);
  }

  .modal-title {
    font-family: 'Cinzel Decorative', 'Cinzel', serif;
    font-weight: 900;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-size: clamp(1.1rem, 2.5vmin, 1.5rem);
    margin: 0 0 4px 0;
    color: var(--gold-2);
    text-align: center;
  }
  .modal-sub {
    text-align: center;
    color: var(--muted);
    font-family: 'Cinzel', serif;
    font-size: clamp(0.7rem, 1.3vmin, 0.85rem);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 18px;
  }

  .option-group { margin: 14px 0; }
  .option-group > .legend {
    font-family: 'Cinzel', serif;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-size: clamp(0.72rem, 1.3vmin, 0.82rem);
    color: var(--ink-soft);
    margin-bottom: 8px;
    display: block;
  }

  .segmented {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
    gap: 6px;
    padding: 5px;
    background: rgba(0,0,0,0.04);
    border-radius: 10px;
    border: 1px solid var(--panel-border);
  }
  [data-theme="night"] .segmented { background: rgba(255,255,255,0.04); }

  .segmented label {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px 10px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Cinzel', serif;
    font-size: clamp(0.72rem, 1.3vmin, 0.85rem);
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--ink-soft);
    transition: background 150ms ease, color 150ms ease, box-shadow 150ms ease;
    text-align: center;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .segmented input { position: absolute; opacity: 0; pointer-events: none; }
  .segmented label:hover { color: var(--ink); background: rgba(255,255,255,0.3); }
  [data-theme="night"] .segmented label:hover { background: rgba(255,255,255,0.06); }
  .segmented input:checked + span,
  .segmented label:has(input:checked) {
    background: linear-gradient(180deg, var(--gold-1), var(--gold-2));
    color: #fff7e0;
    box-shadow: 0 2px 6px rgba(184, 134, 42, 0.35), inset 0 1px 0 rgba(255,255,255,0.3);
    text-shadow: 0 1px 0 rgba(0,0,0,0.2);
  }

  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 22px;
  }

  /* Visually-hidden */
  .sr { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }

  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
  }

  /* Small screens polish */
  @media (max-width: 480px) {
    .title-group .subtitle { display: none; }
    .actions button { padding: 8px 12px; }
  }
</style>
</head>
<body data-theme="day" data-glyph="standard">

<div class="marble" aria-hidden="true"></div>
<div class="colosseum" aria-hidden="true"></div>

<div class="stage">
  <header class="topbar" role="banner">
    <div class="title-group">
      <!-- SPQR Crest -->
      <svg class="crest" viewBox="0 0 64 64" aria-hidden="true">
        <defs>
          <linearGradient id="goldgrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#f4d77a"/>
            <stop offset="55%" stop-color="#c69529"/>
            <stop offset="100%" stop-color="#7a4f10"/>
          </linearGradient>
          <radialGradient id="shieldgrad" cx="50%" cy="40%" r="60%">
            <stop offset="0%" stop-color="#b62323"/>
            <stop offset="100%" stop-color="#6e1212"/>
          </radialGradient>
        </defs>
        <!-- Laurel wreath -->
        <g fill="url(#goldgrad)" stroke="#6b4410" stroke-width="0.5">
          <path d="M10 40 Q8 30 14 22 Q12 30 18 36 Z"/>
          <path d="M10 46 Q6 40 10 32 Q10 40 16 42 Z"/>
          <path d="M54 40 Q56 30 50 22 Q52 30 46 36 Z"/>
          <path d="M54 46 Q58 40 54 32 Q54 40 48 42 Z"/>
          <path d="M14 52 Q12 46 18 42 Q16 48 22 50 Z"/>
          <path d="M50 52 Q52 46 46 42 Q48 48 42 50 Z"/>
        </g>
        <!-- Shield -->
        <path d="M32 8 L52 14 L52 34 Q52 48 32 56 Q12 48 12 34 L12 14 Z" fill="url(#shieldgrad)" stroke="url(#goldgrad)" stroke-width="1.4"/>
        <!-- SPQR text -->
        <text x="32" y="34" text-anchor="middle" font-family="Cinzel, serif" font-weight="900" font-size="11" fill="url(#goldgrad)" style="letter-spacing:1px">SPQR</text>
        <!-- Eagle top -->
        <path d="M28 12 L32 10 L36 12 L34 14 L32 13 L30 14 Z" fill="url(#goldgrad)"/>
      </svg>
      <div class="title-stack">
        <h1 class="title">Ludus Trium</h1>
        <span class="subtitle">Tria Lineae Victoriae</span>
      </div>
    </div>
    <div class="actions" role="toolbar" aria-label="Game actions">
      <button id="btn-new" class="primary" type="button">New Round</button>
      <button id="btn-customize" type="button">Customize</button>

  </header>

  <div id="banner" class="banner" role="region" aria-live="polite">
    <div class="banner-inner" id="banner-inner">Victory</div>

  <main class="arena">
    <aside class="side" aria-label="Scoreboard">
      <div class="score-card" id="card-x">
        <div class="label">Legio I</div>

        <div class="value" id="score-x">0</div>
        <div class="sub" id="label-x">Red</div>
      </div>
      <div class="score-card" id="card-draws">
        <div class="label">Pax</div>
        <div class="glyph">=</div>
        <div class="value" id="score-draws">0</div>
        <div class="sub">Draws</div>
      </div>
    </aside>

    <div class="board-wrap">
      <div class="board" id="board" role="grid" aria-label="Tic tac toe board">
        <!-- 9 cells injected by JS -->
      </div>
      <div class="status-line" id="status" aria-live="polite">
        <span class="accent" id="status-player">X</span> to move
      </div>

    <aside class="side" aria-label="Scoreboard">
      <div class="score-card" id="card-o">
        <div class="label">Legio II</div>
        <div class="glyph" id="glyph-o-display">O</div>
        <div class="value" id="score-o">0</div>
        <div class="sub" id="label-o">Gold</div>

<canvas class="confetti" id="confetti" aria-hidden="true"></canvas>

<!-- Customize Dialog -->
<dialog class="modal" id="modal" aria-labelledby="modal-title">
  <form method="dialog" class="modal-inner">
    <h2 class="modal-title" id="modal-title">Customize the Arena</h2>
    <div class="modal-sub">Senatus Populusque Ludens</div>

    <div class="option-group">
      <span class="legend">Theme</span>
      <div class="segmented" role="radiogroup" aria-label="Theme">
        <label><input type="radio" name="theme" value="day" checked><span>Marble Day</span></label>
        <label><input type="radio" name="theme" value="night"><span>Night Legion</span></label>
      </div>
    </div>

    <div class="option-group">
      <span class="legend">Glyphs</span>
      <div class="segmented" role="radiogroup" aria-label="Glyphs">
        <label><input type="radio" name="glyph" value="standard" checked><span>Standard X / O</span></label>
        <label><input type="radio" name="glyph" value="roman"><span>Gladius / Laurel</span></label>
      </div>
    </div>

    <div class="option-group">
      <span class="legend">Mode</span>
      <div class="segmented" role="radiogroup" aria-label="Mode">

        <label><input type="radio" name="mode" value="ai" checked><span>Versus AI</span></label>

      <span class="legend">First Move</span>

        <label><input type="radio" name="first" value="O"><span>O Begins</span></label>

      <span class="legend">AI Discipline</span>
      <div class="segmented" role="radiogroup" aria-label="AI discipline">
        <label><input type="radio" name="ai" value="perfect"><span>Perfect</span></label>
        <label><input type="radio" name="ai" value="pragmatic" checked><span>Pragmatic</span></label>
        <label><input type="radio" name="ai" value="reckless"><span>Reckless</span></label>
      </div>

    <div class="modal-actions">
      <button value="cancel" type="button" id="modal-cancel">Cancel</button>
      <button value="save" class="primary" id="modal-save" type="button">Apply</button>
    </div>
  </form>
</dialog>

<script>
(() => {
  'use strict';

  // ---------- State ----------
  const state = {
    board: Array(9).fill(null),
    current: 'X',
    first: 'X',
    mode: 'ai',        // 'pvp' | 'ai'
    ai: 'pragmatic',   // 'perfect' | 'pragmatic' | 'reckless'
    theme: 'day',
    glyph: 'standard', // 'standard' | 'roman'
    scores: { X: 0, O: 0, D: 0 },
    gameOver: false,
    winLine: null,
    busy: false,       // lock during AI thinking / anims
  };

  const WIN_LINES = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6],
  ];

  // ---------- DOM refs ----------
  const boardEl   = document.getElementById('board');
  const statusEl  = document.getElementById('status');
  const statusP   = document.getElementById('status-player');
  const banner    = document.getElementById('banner');
  const bannerInner = document.getElementById('banner-inner');
  const scoreX    = document.getElementById('score-x');
  const scoreO    = document.getElementById('score-o');
  const scoreD    = document.getElementById('score-draws');
  const cardX     = document.getElementById('card-x');
  const cardO     = document.getElementById('card-o');
  const glyphXDisp = document.getElementById('glyph-x-display');
  const glyphODisp = document.getElementById('glyph-o-display');
  const labelX = document.getElementById('label-x');
  const labelO = document.getElementById('label-o');
  const modal     = document.getElementById('modal');
  const btnNew    = document.getElementById('btn-new');
  const btnCustom = document.getElementById('btn-customize');
  const btnReset  = document.getElementById('btn-reset');
  const modalSave = document.getElementById('modal-save');
  const modalCancel = document.getElementById('modal-cancel');
  const grpAI     = document.getElementById('grp-ai');

  // ---------- Build board ----------
  function buildBoard() {
    boardEl.innerHTML = '';
    for (let i = 0; i < 9; i++) {
      const c = document.createElement('button');
      c.type = 'button';
      c.className = 'cell';
      c.setAttribute('role', 'gridcell');
      c.setAttribute('aria-label', `Cell ${i+1}, empty`);
      c.setAttribute('data-index', String(i));
      c.tabIndex = 0;
      const mark = document.createElement('span');
      mark.className = 'mark';
      c.appendChild(mark);
      c.addEventListener('click', onCellClick);
      c.addEventListener('keydown', onCellKey);
      boardEl.appendChild(c);
    }
  }

  // ---------- Glyph rendering ----------
  function glyphSVG(player) {
    if (state.glyph === 'roman') {
      if (player === 'X') {
        // Gladius (sword) - crossed
        return `<svg viewBox="0 0 100 100" aria-hidden="true">
          <defs>
            <linearGradient id="steel" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#f0e4c5"/>
              <stop offset="50%" stop-color="#c9b27b"/>
              <stop offset="100%" stop-color="#8a6e33"/>
            </linearGradient>
            <linearGradient id="hilt" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#e8c15a"/>
              <stop offset="100%" stop-color="#8a5e16"/>
            </linearGradient>
          </defs>
          <g transform="rotate(45 50 50)">
            <rect x="47" y="10" width="6" height="55" fill="url(#steel)" stroke="#6b4410" stroke-width="0.8"/>
            <polygon points="50,8 53,12 47,12" fill="url(#steel)" stroke="#6b4410" stroke-width="0.8"/>
            <rect x="40" y="63" width="20" height="5" rx="1" fill="url(#hilt)" stroke="#5c3d0a" stroke-width="0.8"/>
            <rect x="48" y="68" width="4" height="16" fill="#4a2e0a"/>
            <circle cx="50" cy="86" r="3.5" fill="url(#hilt)" stroke="#5c3d0a" stroke-width="0.8"/>
          </g>
          <g transform="rotate(-45 50 50)">
            <rect x="47" y="10" width="6" height="55" fill="url(#steel)" stroke="#6b4410" stroke-width="0.8"/>
            <polygon points="50,8 53,12 47,12" fill="url(#steel)" stroke="#6b4410" stroke-width="0.8"/>
            <rect x="40" y="63" width="20" height="5" rx="1" fill="url(#hilt)" stroke="#5c3d0a" stroke-width="0.8"/>
            <rect x="48" y="68" width="4" height="16" fill="#4a2e0a"/>
            <circle cx="50" cy="86" r="3.5" fill="url(#hilt)" stroke="#5c3d0a" stroke-width="0.8"/>
          </g>
        </svg>`;
      } else {
        // Laurel wreath
        return `<svg viewBox="0 0 100 100" aria-hidden="true">
          <defs>
            <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#e8c15a"/>
              <stop offset="100%" stop-color="#7a4f10"/>
            </linearGradient>
          </defs>
          <g fill="url(#leaf)" stroke="#5c3d0a" stroke-width="0.6">
            <!-- left branch -->
            <path d="M20 30 Q15 40 18 52 Q22 44 27 38 Z"/>
            <path d="M16 44 Q12 54 16 64 Q22 56 26 50 Z"/>
            <path d="M18 60 Q16 70 22 78 Q28 70 30 62 Z"/>
            <path d="M26 74 Q26 82 34 86 Q38 78 38 70 Z"/>
            <!-- right branch -->
            <path d="M80 30 Q85 40 82 52 Q78 44 73 38 Z"/>
            <path d="M84 44 Q88 54 84 64 Q78 56 74 50 Z"/>
            <path d="M82 60 Q84 70 78 78 Q72 70 70 62 Z"/>
            <path d="M74 74 Q74 82 66 86 Q62 78 62 70 Z"/>
            <!-- ribbon -->
            <path d="M40 84 Q50 90 60 84 L56 92 Q50 95 44 92 Z" fill="#a83232" stroke="#6a1818" stroke-width="0.6"/>
            <!-- top jewel -->
            <circle cx="50" cy="22" r="4" fill="#e8c15a" stroke="#6a4410"/>
          </g>
        </svg>`;
      }
    } else {
      return player; // plain text
    }
  }

  function renderCellMark(cellEl, player) {
    const mark = cellEl.querySelector('.mark');
    mark.classList.remove('x', 'o');
    if (!player) { mark.innerHTML = ''; return; }
    mark.classList.add(player.toLowerCase());
    mark.innerHTML = glyphSVG(player);
  }

  // ---------- Render ----------
  function render() {
    // Board cells
    const cells = boardEl.querySelectorAll('.cell');
    cells.forEach((cell, i) => {
      const val = state.board[i];
      cell.classList.toggle('taken', !!val);
      cell.classList.toggle('win', state.winLine && state.winLine.includes(i));
      cell.classList.toggle('disabled', state.gameOver || state.busy);
      cell.setAttribute('aria-label', val
        ? `Cell ${i+1}, ${val === 'X' ? playerName('X') : playerName('O')}`
        : `Cell ${i+1}, empty`);
      renderCellMark(cell, val);
    });

    // Scoreboard highlight
    cardX.classList.toggle('active', !state.gameOver && state.current === 'X');
    cardO.classList.toggle('active', !state.gameOver && state.current === 'O');

    scoreX.textContent = state.scores.X;
    scoreO.textContent = state.scores.O;
    scoreD.textContent = state.scores.D;

    // Glyph labels in sidebar
    const glyphDisp = (p) => state.glyph === 'roman' ? (p === 'X' ? '⚔' : '🏛') : p;
    // Use text versions for compactness (avoid emoji where possible)
    if (state.glyph === 'roman') {
      glyphXDisp.textContent = '⚔';
      glyphODisp.textContent = '❧';
      labelX.textContent = 'Gladius';
      labelO.textContent = 'Laurel';
    } else {
      glyphXDisp.textContent = 'X';
      glyphODisp.textContent = 'O';
      labelX.textContent = 'Red';
      labelO.textContent = 'Gold';
    }

    // Status line
    if (state.gameOver) {
      if (state.winLine) {
        const winner = state.board[state.winLine[0]];
        statusP.textContent = playerName(winner);
        statusEl.innerHTML = `<span class="accent">${playerName(winner)}</span> triumphs — press New Round`;
      } else {
        statusEl.innerHTML = `<span class="accent">Pax</span> — a draw. Press New Round`;
      }
    } else {
      statusP.textContent = playerName(state.current);
      const suffix = (state.mode === 'ai' && state.current === aiPlayer()) ? 'deliberates…' : 'to move';
      statusEl.innerHTML = `<span class="accent">${playerName(state.current)}</span> ${suffix}`;
    }

    // Theme / glyph
    document.body.dataset.theme = state.theme;
    document.body.dataset.glyph = state.glyph;
  }

  function playerName(p) {
    if (state.glyph === 'roman') return p === 'X' ? 'Gladius' : 'Laurel';
    return p;
  }

  function aiPlayer() {
    if (state.mode !== 'ai') return null;
    return state.first === 'X' ? 'O' : 'X'; // AI plays second by default
  }

  // ---------- Game logic ----------
  function checkWin(b) {
    for (const line of WIN_LINES) {
      const [a, c, d] = line;
      if (b[a] && b[a] === b[c] && b[a] === b[d]) return line;
    }
    return null;
  }
  function isDraw(b) { return b.every(x => x) && !checkWin(b); }

  function resetBoard() {
    state.board = Array(9).fill(null);
    state.current = state.first;
    state.gameOver = false;
    state.winLine = null;
    state.busy = false;
    hideBanner();
    render();
    maybeAIMove();
  }

  function onCellClick(e) {
    if (state.gameOver || state.busy) return;
    const idx = parseInt(e.currentTarget.dataset.index, 10);
    if (state.board[idx]) return;
    if (state.mode === 'ai' && state.current === aiPlayer()) return;
    makeMove(idx, state.current);
  }

  function onCellKey(e) {
    const idx = parseInt(e.currentTarget.dataset.index, 10);
    const row = Math.floor(idx / 3), col = idx % 3;
    let target = null;
    if (e.key === 'ArrowRight') target = row*3 + (col+1)%3;
    else if (e.key === 'ArrowLeft') target = row*3 + (col+2)%3;
    else if (e.key === 'ArrowDown') target = ((row+1)%3)*3 + col;
    else if (e.key === 'ArrowUp') target = ((row+2)%3)*3 + col;
    else if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      onCellClick(e);
      return;
    }
    if (target !== null) {
      e.preventDefault();
      boardEl.querySelectorAll('.cell')[target].focus();
    }
  }

  function makeMove(idx, player) {
    if (state.board[idx]) return;
    state.board[idx] = player;

    const winLine = checkWin(state.board);
    if (winLine) {
      state.winLine = winLine;
      state.gameOver = true;
      state.scores[player] += 1;
      render();
      announceVictory(player);
      startConfetti();
      return;
    }
    if (isDraw(state.board)) {
      state.gameOver = true;
      state.scores.D += 1;
      render();
      announceDraw();
      return;
    }
    state.current = player === 'X' ? 'O' : 'X';
    render();
    maybeAIMove();
  }

  function maybeAIMove() {
    if (state.mode !== 'ai') return;
    if (state.gameOver) return;
    if (state.current !== aiPlayer()) return;
    state.busy = true;
    render();
    // Small delay for feel
    const delay = 320 + Math.random() * 320;
    setTimeout(() => {
      const move = chooseAIMove();
      state.busy = false;
      if (move != null) makeMove(move, aiPlayer());
      else render();
    }, delay);
  }

  // ---------- AI ----------
  function chooseAIMove() {
    const me = aiPlayer();
    const opp = me === 'X' ? 'O' : 'X';
    const avail = state.board.map((v,i)=>v?null:i).filter(v=>v!==null);
    if (!avail.length) return null;

    if (state.ai === 'reckless') {
      // Random, but never miss obvious win if available 40% of the time
      if (Math.random() < 0.4) {
        const winNow = findWinning(state.board, me);
        if (winNow !== -1) return winNow;
      }
      return avail[Math.floor(Math.random()*avail.length)];
    }

    if (state.ai === 'pragmatic') {
      // Mostly smart, 25% blunder probability
      if (Math.random() < 0.25) {
        const winNow = findWinning(state.board, me);
        if (winNow !== -1) return winNow;
        return avail[Math.floor(Math.random()*avail.length)];
      }
    }

    // Perfect minimax (or pragmatic fallback)
    return minimaxBestMove(state.board, me, opp);
  }

  function findWinning(b, p) {
    for (const line of WIN_LINES) {
      const vals = line.map(i => b[i]);
      const count = vals.filter(v => v === p).length;
      const emptyCount = vals.filter(v => !v).length;
      if (count === 2 && emptyCount === 1) {
        return line[vals.indexOf(null)];
      }
    }
    return -1;
  }

  function minimaxBestMove(board, me, opp) {
    let bestScore = -Infinity;
    let bestMoves = [];
    for (let i = 0; i < 9; i++) {
      if (!board[i]) {
        board[i] = me;
        const score = minimax(board, 0, false, me, opp, -Infinity, Infinity);
        board[i] = null;
        if (score > bestScore) {
          bestScore = score;
          bestMoves = [i];
        } else if (score === bestScore) {
          bestMoves.push(i);
        }
      }
    }
    return bestMoves[Math.floor(Math.random()*bestMoves.length)];
  }

  function minimax(board, depth, isMax, me, opp, alpha, beta) {
    const win = checkWin(board);
    if (win) {
      const w = board[win[0]];
      if (w === me) return 10 - depth;
      return depth - 10;
    }
    if (board.every(v => v)) return 0;

    if (isMax) {
      let best = -Infinity;
      for (let i = 0; i < 9; i++) {
        if (!board[i]) {
          board[i] = me;
          best = Math.max(best, minimax(board, depth+1, false, me, opp, alpha, beta));
          board[i] = null;
          alpha = Math.max(alpha, best);
          if (beta <= alpha) break;
        }
      }
      return best;
    } else {
      let best = Infinity;
      for (let i = 0; i < 9; i++) {
        if (!board[i]) {
          board[i] = opp;
          best = Math.min(best, minimax(board, depth+1, true, me, opp, alpha, beta));
          board[i] = null;
          beta = Math.min(beta, best);
          if (beta <= alpha) break;
        }
      }
      return best;
    }
  }

  // ---------- Banner ----------
  function announceVictory(p) {
    bannerInner.textContent = `${playerName(p)} is Victorious — Ave!`;
    banner.classList.add('show');
  }
  function announceDraw() {
    bannerInner.textContent = `Pax Romana — a Draw`;
    banner.classList.add('show');
  }
  function hideBanner() { banner.classList.remove('show'); }

  // ---------- Confetti (canvas) ----------
  const canvas = document.getElementById('confetti');
  const ctx = canvas.getContext('2d');
  let particles = [];
  let confettiRAF = null;
  let confettiEndTime = 0;

  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;
    canvas.width = Math.floor(innerWidth * dpr);
    canvas.height = Math.floor(innerHeight * dpr);
    canvas.style.width = innerWidth + 'px';
    canvas.style.height = innerHeight + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function startConfetti() {
    if (reduceMotion) return;
    const count = 140;
    const colors = ['#d4a944','#b8862a','#8a5e16','#8a1c1c','#f4d77a','#efe0b5','#c69529'];
    particles = [];
    const cx = innerWidth / 2;
    const cy = innerHeight * 0.28;
    for (let i = 0; i < count; i++) {
      particles.push({
        x: cx + (Math.random() - 0.5) * 120,
        y: cy + (Math.random() - 0.5) * 40,
        vx: (Math.random() - 0.5) * 10,
        vy: (Math.random() * -8) - 4,
        g: 0.22 + Math.random()*0.14,
        w: 6 + Math.random() * 6,
        h: 8 + Math.random() * 10,
        rot: Math.random() * Math.PI * 2,
        vrot: (Math.random() - 0.5) * 0.3,
        color: colors[Math.floor(Math.random() * colors.length)],
        shape: Math.random() < 0.3 ? 'circle' : 'rect',
        life: 1,
      });
    }
    confettiEndTime = performance.now() + 2800;
    if (!confettiRAF) loopConfetti();
  }

  function loopConfetti() {
    ctx.clearRect(0, 0, innerWidth, innerHeight);
    let alive = 0;
    const now = performance.now();
    for (const p of particles) {
      p.vy += p.g;
      p.x += p.vx;
      p.y += p.vy;
      p.vx *= 0.995;
      p.rot += p.vrot;
      if (now > confettiEndTime) p.life -= 0.02;
      if (p.life > 0 && p.y < innerHeight + 40) {
        alive++;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.globalAlpha = Math.max(0, Math.min(1, p.life));
        ctx.fillStyle = p.color;
        if (p.shape === 'rect') {
          ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
          ctx.strokeStyle = 'rgba(0,0,0,0.1)';
          ctx.strokeRect(-p.w/2, -p.h/2, p.w, p.h);
        } else {
          ctx.beginPath();
          ctx.arc(0, 0, p.w/2, 0, Math.PI*2);
          ctx.fill();
        }
        ctx.restore();
      }
    }
    if (alive > 0) {
      confettiRAF = requestAnimationFrame(loopConfetti);
    } else {
      ctx.clearRect(0, 0, innerWidth, innerHeight);
      confettiRAF = null;
      particles = [];
    }
  }

  // ---------- Modal ----------
  function openModal() {
    // Sync radio inputs with state
    modal.querySelectorAll('input[name="theme"]').forEach(r => r.checked = r.value === state.theme);
    modal.querySelectorAll('input[name="glyph"]').forEach(r => r.checked = r.value === state.glyph);
    modal.querySelectorAll('input[name="mode"]').forEach(r => r.checked = r.value === state.mode);
    modal.querySelectorAll('input[name="first"]').forEach(r => r.checked = r.value === state.first);
    modal.querySelectorAll('input[name="ai"]').forEach(r => r.checked = r.value === state.ai);
    updateAIGroupVisibility();
    if (typeof modal.showModal === 'function') {
      modal.showModal();
    } else {
      modal.setAttribute('open', '');
    }
  }
  function closeModal() {
    if (typeof modal.close === 'function') modal.close();
    else modal.removeAttribute('open');
  }

  function readModal() {
    const v = (name) => (modal.querySelector(`input[name="${name}"]:checked`) || {}).value;
    return {
      theme: v('theme') || 'day',
      glyph: v('glyph') || 'standard',
      mode:  v('mode')  || 'ai',
      first: v('first') || 'X',
      ai:    v('ai')    || 'pragmatic',
    };
  }

  function applyFromModal() {
    const next = readModal();
    const needsReset =
      next.mode !== state.mode ||
      next.first !== state.first ||
      next.ai !== state.ai;
    Object.assign(state, next);
    render();
    if (needsReset) {
      resetBoard();
    }
    closeModal();
  }

  function updateAIGroupVisibility() {
    const mode = (modal.querySelector('input[name="mode"]:checked') || {}).value || state.mode;
    grpAI.style.display = (mode === 'ai') ? '' : 'none';
  }

  // ---------- Events ----------
  btnNew.addEventListener('click', () => {
    resetBoard();
  });
  btnReset.addEventListener('click', () => {
    state.scores = { X: 0, O: 0, D: 0 };
    resetBoard();
  });
  btnCustom.addEventListener('click', openModal);
  modalSave.addEventListener('click', applyFromModal);
  modalCancel.addEventListener('click', closeModal);
  modal.addEventListener('click', (e) => {
    // Click on backdrop closes
    if (e.target === modal) closeModal();
  });
  modal.addEventListener('change', (e) => {
    if (e.target.name === 'mode') updateAIGroupVisibility();
    if (e.target.name === 'theme') {
      // Live theme preview
      document.body.dataset.theme = e.target.value;
    }
  });
  modal.addEventListener('close', () => {
    // Ensure theme matches saved state if user closed via ESC
    document.body.dataset.theme = state.theme;
  });

  // ---------- Init ----------
  buildBoard();
  render();
  // If AI goes first
  maybeAIMove();
})();
</script>
</body>
</html>
