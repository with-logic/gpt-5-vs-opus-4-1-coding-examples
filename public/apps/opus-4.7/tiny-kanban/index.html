<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Tiny Kanban — Standup Board</title>
<style>
  :root {
    --bg-0: #0b1020;
    --bg-1: #0f1530;
    --bg-2: #141b3a;
    --panel: #1a2244;
    --panel-2: #222c55;
    --border: #2a3566;
    --border-strong: #3a4a88;
    --text: #eef1ff;
    --text-dim: #aab3d9;
    --text-mute: #7d88b5;
    --accent: #7c9cff;
    --accent-2: #9b7cff;
    --todo: #5b8def;
    --doing: #f4a93a;
    --done: #2ecc8b;
    --danger: #ff6b7a;
    --p-high: #ff5a6e;
    --p-med: #f7b955;
    --p-low: #6bd0c4;
    --shadow: 0 10px 30px rgba(0,0,0,.35), 0 2px 8px rgba(0,0,0,.25);
    --shadow-lg: 0 20px 60px rgba(0,0,0,.45), 0 4px 12px rgba(0,0,0,.3);
    --radius: 14px;
    --radius-sm: 10px;
    --transition: 180ms cubic-bezier(.2,.7,.2,1);
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, "Helvetica Neue", Arial, sans-serif;
    font-size: 16px;
    line-height: 1.45;
    color: var(--text);
    background:
      radial-gradient(1200px 700px at 10% -10%, #1c2a66 0%, transparent 60%),
      radial-gradient(900px 600px at 110% 10%, #2a1a5a 0%, transparent 60%),
      linear-gradient(180deg, var(--bg-0) 0%, var(--bg-1) 100%);
    background-attachment: fixed;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  button, input, select, textarea { font: inherit; color: inherit; }
  button { cursor: pointer; }

  /* ---------------- App shell ---------------- */
  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    min-height: 0;
  }

  header.top {
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 14px 22px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,0)) , rgba(10,14,36,.55);
    backdrop-filter: blur(10px);
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 240px;
  }
  .brand .logo {
    width: 38px; height: 38px;
    border-radius: 10px;
    background: conic-gradient(from 210deg, #7c9cff, #9b7cff, #2ecc8b, #f4a93a, #7c9cff);
    display: grid; place-items: center;
    color: #0b1020;
    font-weight: 800;
    font-size: 18px;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.2), 0 6px 20px rgba(124,156,255,.35);
  }
  .brand .titles h1 {
    margin: 0;
    font-size: 18px;
    letter-spacing: .2px;
  }
  .brand .titles .sub {
    font-size: 12px;
    color: var(--text-mute);
    letter-spacing: .4px;
    text-transform: uppercase;
  }

  .top-center {
    flex: 1;
    display: flex;
    gap: 10px;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
  }

  .search {
    position: relative;
    min-width: 340px;
    flex: 1;
    max-width: 520px;
  }
  .search input {
    width: 100%;
    padding: 10px 14px 10px 38px;
    border-radius: 10px;
    background: rgba(255,255,255,.05);
    border: 1px solid var(--border);
    outline: none;
    transition: border-color var(--transition), background var(--transition);
  }
  .search input:focus {
    border-color: var(--accent);
    background: rgba(124,156,255,.08);
  }
  .search .icon {
    position: absolute;
    left: 12px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-mute);
  }
  .search .clear {
    position: absolute;
    right: 8px; top: 50%;
    transform: translateY(-50%);
    background: transparent;
    border: 0;
    color: var(--text-mute);
    width: 26px; height: 26px;
    border-radius: 6px;
    display: none;
  }
  .search input:not(:placeholder-shown) ~ .clear { display: grid; place-items: center; }
  .search .clear:hover { background: rgba(255,255,255,.08); color: var(--text); }

  .chips {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    border-radius: 999px;
    background: rgba(255,255,255,.05);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 13px;
    cursor: pointer;
    user-select: none;
    transition: all var(--transition);
  }
  .chip:hover { border-color: var(--border-strong); color: var(--text); }
  .chip.active {
    background: rgba(124,156,255,.15);
    border-color: var(--accent);
    color: #fff;
  }
  .chip .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: currentColor;
  }
  .chip .avatar {
    width: 18px; height: 18px; border-radius: 50%;
    display: grid; place-items: center;
    font-size: 10px; font-weight: 700;
    color: #0b1020;
  }

  .top-right {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 9px 14px;
    border-radius: 10px;
    background: rgba(255,255,255,.05);
    border: 1px solid var(--border);
    color: var(--text);
    transition: all var(--transition);
  }
  .btn:hover { border-color: var(--border-strong); background: rgba(255,255,255,.09); }
  .btn.primary {
    background: linear-gradient(135deg, #7c9cff, #9b7cff);
    border-color: transparent;
    color: #0b1020;
    font-weight: 700;
    box-shadow: 0 6px 18px rgba(124,156,255,.35);
  }
  .btn.primary:hover { filter: brightness(1.06); }
  .btn.icon { padding: 8px; width: 38px; justify-content: center; }

  /* ---------------- Board ---------------- */
  main.board-wrap {
    flex: 1;
    min-height: 0;
    display: flex;
    gap: 16px;
    padding: 18px 22px 22px;
    overflow-x: auto;
  }

  .column {
    flex: 1 1 0;
    min-width: 320px;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
    border: 1px solid var(--border);
    border-radius: var(--radius);
    min-height: 0;
    overflow: hidden;
    transition: border-color var(--transition), background var(--transition);
  }
  .column.drag-over {
    border-color: var(--accent);
    background: linear-gradient(180deg, rgba(124,156,255,.09), rgba(124,156,255,.02));
  }
  .column.over-wip {
    border-color: var(--doing);
  }

  .col-head {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px 12px;
    border-bottom: 1px solid var(--border);
  }
  .col-head .bar {
    width: 10px; height: 10px; border-radius: 50%;
  }
  .col-head h2 {
    margin: 0;
    font-size: 15px;
    letter-spacing: .5px;
    text-transform: uppercase;
    flex: 1;
  }
  .col-count {
    font-size: 13px;
    color: var(--text-mute);
    background: rgba(255,255,255,.04);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 2px 10px;
    min-width: 36px;
    text-align: center;
  }
  .col-count.over { color: var(--doing); border-color: var(--doing); }
  .col-count.full { color: var(--danger); border-color: var(--danger); }

  .wip {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--text-mute);
    padding: 2px 8px;
    border-radius: 999px;
    background: rgba(255,255,255,.04);
    border: 1px dashed var(--border);
    cursor: pointer;
    user-select: none;
  }
  .wip:hover { border-color: var(--border-strong); color: var(--text); }
  .wip.warn { color: var(--doing); border-color: var(--doing); }
  .wip.bad { color: var(--danger); border-color: var(--danger); }

  .col-body {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .col-add {
    padding: 10px 12px 14px;
    border-top: 1px solid var(--border);
  }
  .col-add button {
    width: 100%;
    padding: 10px;
    background: rgba(255,255,255,.04);
    border: 1px dashed var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-dim);
    transition: all var(--transition);
  }
  .col-add button:hover {
    border-color: var(--accent);
    color: var(--text);
    background: rgba(124,156,255,.08);
  }

  /* ---------------- Card ---------------- */
  .card {
    position: relative;
    background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    cursor: grab;
    transition: transform var(--transition), border-color var(--transition), box-shadow var(--transition), opacity var(--transition);
    box-shadow: 0 1px 0 rgba(255,255,255,.04) inset, 0 2px 6px rgba(0,0,0,.2);
  }
  .card::before {
    content: "";
    position: absolute;
    left: 0; top: 10px; bottom: 10px;
    width: 4px;
    border-radius: 3px;
    background: var(--p-med);
  }
  .card.p-high::before { background: var(--p-high); box-shadow: 0 0 14px rgba(255,90,110,.5); }
  .card.p-med::before  { background: var(--p-med); }
  .card.p-low::before  { background: var(--p-low); }

  .card:hover {
    border-color: var(--border-strong);
    transform: translateY(-1px);
    box-shadow: var(--shadow);
  }
  .card.dragging {
    opacity: .4;
    transform: rotate(1.5deg) scale(.98);
  }
  .card.ghost-before { box-shadow: -4px 0 0 var(--accent) inset, var(--shadow); }
  .card.just-dropped { animation: pop .35s ease; }
  @keyframes pop {
    0% { transform: scale(1); }
    40% { transform: scale(1.03); box-shadow: 0 0 0 2px var(--accent); }
    100% { transform: scale(1); }
  }

  .card .title {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.35;
    color: var(--text);
    word-wrap: break-word;
  }
  .card .desc {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.45;
    word-wrap: break-word;
    max-height: 60px;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
  }
  .card .meta {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .tag {
    font-size: 11px;
    letter-spacing: .4px;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 999px;
    background: rgba(255,255,255,.06);
    color: var(--text-dim);
    border: 1px solid var(--border);
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .tag.p-high { color: var(--p-high); border-color: rgba(255,90,110,.4); background: rgba(255,90,110,.1); }
  .tag.p-med  { color: var(--p-med);  border-color: rgba(247,185,85,.4); background: rgba(247,185,85,.1); }
  .tag.p-low  { color: var(--p-low);  border-color: rgba(107,208,196,.4); background: rgba(107,208,196,.1); }

  .avatar {
    width: 24px; height: 24px;
    border-radius: 50%;
    display: inline-grid; place-items: center;
    font-size: 11px; font-weight: 700;
    color: #0b1020;
    border: 1px solid rgba(255,255,255,.25);
    flex-shrink: 0;
  }

  .card .actions {
    position: absolute;
    top: 8px; right: 8px;
    display: flex;
    gap: 4px;
    opacity: 0;
    transition: opacity var(--transition);
  }
  .card:hover .actions, .card:focus-within .actions { opacity: 1; }
  .card .actions button {
    width: 26px; height: 26px;
    display: grid; place-items: center;
    border-radius: 7px;
    background: rgba(20,28,60,.85);
    border: 1px solid var(--border);
    color: var(--text-dim);
    transition: all var(--transition);
  }
  .card .actions button:hover {
    color: var(--text);
    border-color: var(--border-strong);
    background: rgba(40,52,110,.95);
  }
  .card .actions button.danger:hover {
    color: var(--danger);
    border-color: var(--danger);
  }

  .empty {
    padding: 24px 12px;
    text-align: center;
    color: var(--text-mute);
    font-size: 13px;
    border: 1px dashed var(--border);
    border-radius: var(--radius-sm);
  }

  /* ---------------- Modal ---------------- */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(5,8,20,.6);
    backdrop-filter: blur(6px);
    display: grid; place-items: center;
    z-index: 100;
    animation: fade .2s ease;
  }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    width: min(560px, 92vw);
    background: linear-gradient(180deg, var(--panel), var(--panel-2));
    border: 1px solid var(--border-strong);
    border-radius: 16px;
    box-shadow: var(--shadow-lg);
    overflow: hidden;
    animation: rise .25s cubic-bezier(.2,.8,.2,1);
  }
  @keyframes rise { from { transform: translateY(12px); opacity: 0; } to { transform: none; opacity: 1; } }
  .modal header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .modal header h3 { margin: 0; font-size: 16px; flex: 1; }
  .modal form { padding: 18px 20px; display: flex; flex-direction: column; gap: 14px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 12px; color: var(--text-mute); text-transform: uppercase; letter-spacing: .5px; }
  .field input, .field textarea, .field select {
    width: 100%;
    padding: 10px 12px;
    border-radius: 10px;
    background: rgba(0,0,0,.25);
    border: 1px solid var(--border);
    outline: none;
    transition: border-color var(--transition);
  }
  .field textarea { min-height: 80px; resize: vertical; }
  .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--accent); }
  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .priority-picker { display: flex; gap: 8px; }
  .priority-picker label {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 9px;
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    font-size: 13px;
    transition: all var(--transition);
  }
  .priority-picker input { display: none; }
  .priority-picker label .dot { width: 10px; height: 10px; border-radius: 50%; }
  .priority-picker label:hover { border-color: var(--border-strong); }
  .priority-picker input:checked + span { color: var(--text); }
  .priority-picker label:has(input:checked) {
    background: rgba(124,156,255,.1);
    border-color: var(--accent);
  }
  .modal footer {
    padding: 12px 20px 18px;
    display: flex; justify-content: flex-end; gap: 8px;
    border-top: 1px solid var(--border);
  }

  /* ---------------- Toasts & tooltips ---------------- */
  .toast-container {
    position: fixed;
    bottom: 20px; right: 20px;
    display: flex; flex-direction: column; gap: 8px;
    z-index: 200;
  }
  .toast {
    background: var(--panel-2);
    border: 1px solid var(--border-strong);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 14px;
    box-shadow: var(--shadow);
    animation: rise .2s ease;
    display: flex; align-items: center; gap: 10px;
    max-width: 360px;
  }
  .toast.warn { border-color: var(--doing); }
  .toast.error { border-color: var(--danger); }
  .toast.success { border-color: var(--done); }
  .toast .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
  .toast.warn .dot { background: var(--doing); }
  .toast.error .dot { background: var(--danger); }
  .toast.success .dot { background: var(--done); }

  /* ---------------- Scrollbar ---------------- */
  .col-body::-webkit-scrollbar, .board-wrap::-webkit-scrollbar { height: 10px; width: 10px; }
  .col-body::-webkit-scrollbar-thumb, .board-wrap::-webkit-scrollbar-thumb {
    background: var(--border); border-radius: 10px;
  }
  .col-body::-webkit-scrollbar-thumb:hover, .board-wrap::-webkit-scrollbar-thumb:hover {
    background: var(--border-strong);
  }

  /* ---------------- Stats bar ---------------- */
  .statusbar {
    display: flex; gap: 12px; align-items: center;
    padding: 8px 22px;
    border-top: 1px solid var(--border);
    color: var(--text-mute);
    font-size: 12px;
    background: rgba(10,14,36,.4);
  }
  .statusbar .sep { color: var(--border-strong); }
  .statusbar .k { color: var(--text-dim); }
  .statusbar b { color: var(--text); font-weight: 600; }

  /* ---------------- Focus rings ---------------- */
  button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible, .card:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  /* ---------------- Responsive ---------------- */
  @media (max-width: 900px) {
    .brand .titles .sub { display: none; }
    .search { min-width: 200px; }
    main.board-wrap { padding: 12px; }
    .column { min-width: 280px; }
  }
  @media (max-width: 640px) {
    header.top { flex-wrap: wrap; }
    .top-center { order: 3; width: 100%; }
    .brand { min-width: 0; flex: 1; }
  }
</style>
</head>
<body>

<div class="app">
  <header class="top">
    <div class="brand">
      <div class="logo">K</div>
      <div class="titles">
        <h1>Tiny Kanban</h1>
        <div class="sub" id="date-label">Standup board</div>
      </div>
    </div>

    <div class="top-center">
      <div class="search">
        <svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"></circle><path d="M21 21l-4.3-4.3"></path></svg>
        <input id="search" type="search" placeholder="Search cards by title, description, or assignee…" />
        <button class="clear" id="search-clear" title="Clear">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>

      <div class="chips" id="people-chips" title="Filter by assignee"></div>
    </div>

    <div class="top-right">
      <button class="btn icon" id="reset-btn" title="Reset board with sample data">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 3v6h6"/></svg>
      </button>
      <button class="btn primary" id="new-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
        New card
      </button>
    </div>
  </header>

  <main class="board-wrap" id="board"></main>

  <div class="statusbar" id="statusbar"></div>
</div>

<div class="toast-container" id="toasts"></div>

<template id="modal-tpl">
  <div class="modal-backdrop">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <header>
        <h3 id="modal-title">New card</h3>
        <button class="btn icon" data-close title="Close">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </header>
      <form id="card-form">
        <div class="field">
          <label for="f-title">Title</label>
          <input id="f-title" name="title" required maxlength="120" placeholder="e.g. Ship staging deploy pipeline" autocomplete="off" />
        </div>
        <div class="field">
          <label for="f-desc">Description</label>
          <textarea id="f-desc" name="desc" maxlength="500" placeholder="Optional details for the team…"></textarea>
        </div>
        <div class="row-2">
          <div class="field">
            <label>Priority</label>
            <div class="priority-picker">
              <label><input type="radio" name="priority" value="high"><span><span class="dot" style="background:var(--p-high)"></span>High</span></label>
              <label><input type="radio" name="priority" value="med" checked><span><span class="dot" style="background:var(--p-med)"></span>Med</span></label>
              <label><input type="radio" name="priority" value="low"><span><span class="dot" style="background:var(--p-low)"></span>Low</span></label>
            </div>
          </div>
          <div class="field">
            <label for="f-assignee">Assignee</label>
            <select id="f-assignee" name="assignee"></select>
          </div>
        </div>
        <div class="field">
          <label for="f-column">Column</label>
          <select id="f-column" name="column">
            <option value="todo">Todo</option>
            <option value="doing">Doing</option>
            <option value="done">Done</option>
          </select>
        </div>
      </form>
      <footer>
        <button class="btn" data-close type="button">Cancel</button>
        <button class="btn primary" id="modal-save" type="button">Save card</button>
      </footer>
    </div>
  </div>
</template>

<script>
(() => {
  'use strict';

  // ---------------- State ----------------
  const STORAGE_KEY = 'tiny-kanban-v1';

  const PEOPLE = [
    { id: 'al', name: 'Alex',   color: '#7c9cff' },
    { id: 'ja', name: 'Jordan', color: '#f4a93a' },
    { id: 'sa', name: 'Sam',    color: '#2ecc8b' },
    { id: 'ta', name: 'Taylor', color: '#ff6b7a' },
    { id: 'ri', name: 'Riley',  color: '#9b7cff' },
    { id: 'ca', name: 'Casey',  color: '#6bd0c4' },
  ];

  const COLUMNS = [
    { id: 'todo',  name: 'Todo',  color: 'var(--todo)',  wip: 0 },
    { id: 'doing', name: 'Doing', color: 'var(--doing)', wip: 3 },
    { id: 'done',  name: 'Done',  color: 'var(--done)',  wip: 0 },
  ];

  const SAMPLE = [
    { id: uid(), title: 'Kick off Q2 roadmap review', desc: 'Align with PM, set milestones, share with stakeholders before Friday.', priority: 'high', assignee: 'ja', column: 'todo' },
    { id: uid(), title: 'Finalize design system tokens', desc: 'Consolidate spacing + color primitives; publish v2 to npm.', priority: 'med', assignee: 'al', column: 'todo' },
    { id: uid(), title: 'Triage incoming bug reports', desc: 'Clear the P2 backlog and tag owners.', priority: 'low', assignee: 'ca', column: 'todo' },
    { id: uid(), title: 'Fix flaky auth integration test', desc: 'Investigate timing issue on CI runners.', priority: 'high', assignee: 'sa', column: 'doing' },
    { id: uid(), title: 'Refactor billing webhook handler', desc: 'Break out retry logic; add structured logs.', priority: 'med', assignee: 'ri', column: 'doing' },
    { id: uid(), title: 'Ship new onboarding tour', desc: 'QA complete, waiting on copy review.', priority: 'med', assignee: 'ta', column: 'done' },
    { id: uid(), title: 'Upgrade CI runners to 22.04', desc: 'Rolled out Monday, monitoring resource use.', priority: 'low', assignee: 'al', column: 'done' },
  ];

  let state = load() || { cards: SAMPLE.slice(), wip: { doing: 3 } };
  let filter = { text: '', person: null };
  let dragCardId = null;

  // ---------------- Utils ----------------
  function uid() { return 'c_' + Math.random().toString(36).slice(2, 10); }
  function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return null;
      const s = JSON.parse(raw);
      if (!s || !Array.isArray(s.cards)) return null;
      return s;
    } catch { return null; }
  }
  function personById(id) { return PEOPLE.find(p => p.id === id); }
  function initials(name) {
    return name.split(/\s+/).map(w => w[0]).slice(0, 2).join('').toUpperCase();
  }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function highlight(text, q) {
    const t = escapeHtml(text || '');
    if (!q) return t;
    const esc = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return t.replace(new RegExp(esc, 'ig'), m => `<mark style="background:rgba(247,185,85,.3);color:#fff;border-radius:3px;padding:0 2px;">${m}</mark>`);
  }
  function prioRank(p) { return p === 'high' ? 0 : p === 'med' ? 1 : 2; }

  function toast(msg, kind = '') {
    const c = document.getElementById('toasts');
    const t = document.createElement('div');
    t.className = 'toast ' + kind;
    t.innerHTML = `<span class="dot"></span><span>${escapeHtml(msg)}</span>`;
    c.appendChild(t);
    setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateY(6px)'; t.style.transition = 'all .2s'; }, 2600);
    setTimeout(() => t.remove(), 2900);
  }

  // ---------------- Filtering ----------------
  function visibleCards() {
    const q = filter.text.trim().toLowerCase();
    return state.cards.filter(c => {
      if (filter.person && c.assignee !== filter.person) return false;
      if (!q) return true;
      const p = personById(c.assignee);
      const hay = (c.title + ' ' + (c.desc || '') + ' ' + (p ? p.name : '')).toLowerCase();
      return hay.includes(q);
    });
  }

  // ---------------- Render ----------------
  const board = document.getElementById('board');

  function render() {
    renderPeopleChips();
    renderBoard();
    renderStatus();
    save();
  }

  function renderPeopleChips() {
    const el = document.getElementById('people-chips');
    el.innerHTML = '';
    const allChip = chipEl({ id: '__all', name: 'All', color: '#aab3d9' }, filter.person === null, true);
    allChip.addEventListener('click', () => { filter.person = null; render(); });
    el.appendChild(allChip);

    PEOPLE.forEach(p => {
      const ch = chipEl(p, filter.person === p.id);
      ch.addEventListener('click', () => {
        filter.person = filter.person === p.id ? null : p.id;
        render();
      });
      el.appendChild(ch);
    });
  }

  function chipEl(p, active, isAll = false) {
    const d = document.createElement('button');
    d.className = 'chip' + (active ? ' active' : '');
    if (isAll) {
      d.innerHTML = `<span class="dot" style="background:${p.color}"></span><span>${escapeHtml(p.name)}</span>`;
    } else {
      d.innerHTML = `<span class="avatar" style="background:${p.color}">${initials(p.name)}</span><span>${escapeHtml(p.name)}</span>`;
    }
    return d;
  }

  function renderBoard() {
    board.innerHTML = '';
    const cards = visibleCards();
    const grouped = { todo: [], doing: [], done: [] };
    cards.forEach(c => { if (grouped[c.column]) grouped[c.column].push(c); });

    COLUMNS.forEach(col => {
      const list = grouped[col.id].slice().sort((a, b) => {
        const pr = prioRank(a.priority) - prioRank(b.priority);
        if (pr !== 0) return pr;
        return (a._order || 0) - (b._order || 0);
      });
      const total = state.cards.filter(c => c.column === col.id).length;
      const wip = state.wip[col.id] || 0;
      const overWip = wip > 0 && total > wip;
      const atWip = wip > 0 && total >= wip;

      const colEl = document.createElement('section');
      colEl.className = 'column';
      colEl.dataset.column = col.id;
      if (overWip) colEl.classList.add('over-wip');

      colEl.innerHTML = `
        <div class="col-head">
          <span class="bar" style="background:${col.color}"></span>
          <h2>${col.name}</h2>
          ${wip > 0 ? `<span class="wip ${overWip ? 'bad' : atWip ? 'warn' : ''}" data-wip="${col.id}" title="Click to change WIP limit">WIP ${total}/${wip}</span>` : `<span class="wip" data-wip="${col.id}" title="Click to set WIP limit">No limit</span>`}
          <span class="col-count ${overWip ? 'full' : atWip ? 'over' : ''}">${total}</span>
        </div>
        <div class="col-body" data-drop="${col.id}"></div>
        <div class="col-add">
          <button data-add="${col.id}">＋ Add card to ${col.name}</button>
        </div>
      `;
      const body = colEl.querySelector('.col-body');

      if (list.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.textContent = filter.text || filter.person ? 'No cards match the current filter.' : 'Drop cards here.';
        body.appendChild(empty);
      } else {
        list.forEach(c => body.appendChild(cardEl(c)));
      }

      board.appendChild(colEl);
    });

    wireBoardEvents();
  }

  function cardEl(c) {
    const p = personById(c.assignee);
    const q = filter.text.trim();
    const el = document.createElement('article');
    el.className = `card p-${c.priority}`;
    el.draggable = true;
    el.tabIndex = 0;
    el.dataset.id = c.id;
    el.innerHTML = `
      <div class="actions">
        <button data-edit="${c.id}" title="Edit">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 1 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>
        </button>
        <button class="danger" data-del="${c.id}" title="Delete">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M6 6l1 14a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-14"/></svg>
        </button>
      </div>
      <div class="title">${highlight(c.title, q)}</div>
      ${c.desc ? `<div class="desc">${highlight(c.desc, q)}</div>` : ''}
      <div class="meta">
        <span class="tag p-${c.priority}"><span class="dot" style="background:currentColor;width:6px;height:6px;border-radius:50%;"></span>${c.priority === 'med' ? 'Medium' : c.priority[0].toUpperCase()+c.priority.slice(1)}</span>
        ${p ? `<span class="avatar" style="background:${p.color}" title="${escapeHtml(p.name)}">${initials(p.name)}</span><span style="font-size:12px;color:var(--text-dim);">${escapeHtml(p.name)}</span>` : `<span class="tag">Unassigned</span>`}
      </div>
    `;
    return el;
  }

  function renderStatus() {
    const total = state.cards.length;
    const by = { todo: 0, doing: 0, done: 0 };
    state.cards.forEach(c => { if (by[c.column] !== undefined) by[c.column]++; });
    const percent = total ? Math.round((by.done / total) * 100) : 0;
    const visible = visibleCards().length;

    const el = document.getElementById('statusbar');
    el.innerHTML = `
      <span><span class="k">Total:</span> <b>${total}</b></span>
      <span class="sep">•</span>
      <span><span class="k">Todo:</span> <b>${by.todo}</b></span>
      <span class="sep">•</span>
      <span><span class="k">Doing:</span> <b>${by.doing}</b>${state.wip.doing ? ` <span class="k">(WIP ${state.wip.doing})</span>` : ''}</span>
      <span class="sep">•</span>
      <span><span class="k">Done:</span> <b>${by.done}</b></span>
      <span class="sep">•</span>
      <span><span class="k">Progress:</span> <b>${percent}%</b></span>
      <span class="sep">•</span>
      <span><span class="k">Showing:</span> <b>${visible}</b> of ${total}</span>
      <span style="flex:1"></span>
      <span class="k">Tip: press <b>N</b> for new, <b>/</b> to search, drag cards between columns</span>
    `;
  }

  // ---------------- Events ----------------
  function wireBoardEvents() {
    document.querySelectorAll('.card').forEach(el => {
      el.addEventListener('dragstart', onDragStart);
      el.addEventListener('dragend', onDragEnd);
    });
    document.querySelectorAll('[data-drop]').forEach(el => {
      el.addEventListener('dragover', onDragOver);
      el.addEventListener('dragleave', onDragLeave);
      el.addEventListener('drop', onDrop);
    });
    document.querySelectorAll('[data-add]').forEach(btn => {
      btn.addEventListener('click', () => openModal({ column: btn.dataset.add }));
    });
    document.querySelectorAll('[data-edit]').forEach(btn => {
      btn.addEventListener('click', () => {
        const c = state.cards.find(x => x.id === btn.dataset.edit);
        if (c) openModal(c);
      });
    });
    document.querySelectorAll('[data-del]').forEach(btn => {
      btn.addEventListener('click', () => deleteCard(btn.dataset.del));
    });
    document.querySelectorAll('[data-wip]').forEach(el => {
      el.addEventListener('click', () => changeWip(el.dataset.wip));
    });
  }

  function onDragStart(e) {
    dragCardId = e.currentTarget.dataset.id;
    e.currentTarget.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    try { e.dataTransfer.setData('text/plain', dragCardId); } catch {}
  }
  function onDragEnd(e) {
    e.currentTarget.classList.remove('dragging');
    document.querySelectorAll('.column').forEach(c => c.classList.remove('drag-over'));
    dragCardId = null;
  }
  function onDragOver(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    const col = e.currentTarget.closest('.column');
    if (col) col.classList.add('drag-over');
  }
  function onDragLeave(e) {
    const col = e.currentTarget.closest('.column');
    if (col && !col.contains(e.relatedTarget)) col.classList.remove('drag-over');
  }
  function onDrop(e) {
    e.preventDefault();
    const targetCol = e.currentTarget.dataset.drop;
    const id = dragCardId || e.dataTransfer.getData('text/plain');
    const card = state.cards.find(c => c.id === id);
    if (!card) return;
    if (card.column === targetCol) return;

    const wip = state.wip[targetCol] || 0;
    const currentInTarget = state.cards.filter(c => c.column === targetCol).length;
    if (wip > 0 && currentInTarget >= wip) {
      toast(`WIP limit reached for "${targetCol}" (${wip}). Finish something first.`, 'warn');
      document.querySelectorAll('.column').forEach(c => c.classList.remove('drag-over'));
      return;
    }

    card.column = targetCol;
    render();
    requestAnimationFrame(() => {
      const el = document.querySelector(`.card[data-id="${id}"]`);
      if (el) {
        el.classList.add('just-dropped');
        setTimeout(() => el.classList.remove('just-dropped'), 360);
      }
    });
  }

  // ---------------- Modal ----------------
  let modalEl = null;
  let modalCardId = null;

  function openModal(preset) {
    closeModal();
    const tpl = document.getElementById('modal-tpl');
    modalEl = tpl.content.cloneNode(true).firstElementChild;
    document.body.appendChild(modalEl);

    const title = modalEl.querySelector('#modal-title');
    const form = modalEl.querySelector('#card-form');
    const assigneeSel = modalEl.querySelector('#f-assignee');
    assigneeSel.innerHTML = '<option value="">— Unassigned —</option>' +
      PEOPLE.map(p => `<option value="${p.id}">${escapeHtml(p.name)}</option>`).join('');

    const isEdit = !!preset.id;
    modalCardId = isEdit ? preset.id : null;
    title.textContent = isEdit ? 'Edit card' : 'New card';
    form.title.value = preset.title || '';
    form.desc.value = preset.desc || '';
    const prio = preset.priority || 'med';
    form.querySelectorAll('input[name=priority]').forEach(r => r.checked = r.value === prio);
    assigneeSel.value = preset.assignee || '';
    form.column.value = preset.column || 'todo';

    const close = () => closeModal();
    modalEl.querySelectorAll('[data-close]').forEach(b => b.addEventListener('click', close));
    modalEl.addEventListener('click', (e) => { if (e.target === modalEl) close(); });
    modalEl.querySelector('#modal-save').addEventListener('click', saveFromModal);
    form.addEventListener('submit', (e) => { e.preventDefault(); saveFromModal(); });
    document.addEventListener('keydown', onModalKey);

    setTimeout(() => form.title.focus(), 50);
  }

  function closeModal() {
    if (modalEl) modalEl.remove();
    modalEl = null;
    modalCardId = null;
    document.removeEventListener('keydown', onModalKey);
  }
  function onModalKey(e) {
    if (e.key === 'Escape') closeModal();
    else if ((e.key === 'Enter') && (e.metaKey || e.ctrlKey)) saveFromModal();
  }

  function saveFromModal() {
    if (!modalEl) return;
    const form = modalEl.querySelector('#card-form');
    const data = {
      title: form.title.value.trim(),
      desc: form.desc.value.trim(),
      priority: form.querySelector('input[name=priority]:checked').value,
      assignee: form.assignee.value || null,
      column: form.column.value,
    };
    if (!data.title) {
      toast('Title is required.', 'error');
      form.title.focus();
      return;
    }

    if (modalCardId) {
      const c = state.cards.find(x => x.id === modalCardId);
      if (c) {
        const movedCol = c.column !== data.column;
        if (movedCol) {
          const wip = state.wip[data.column] || 0;
          const inTarget = state.cards.filter(x => x.column === data.column && x.id !== c.id).length;
          if (wip > 0 && inTarget >= wip) {
            toast(`WIP limit reached for "${data.column}" (${wip}).`, 'warn');
            return;
          }
        }
        Object.assign(c, data);
        toast('Card updated.', 'success');
      }
    } else {
      const wip = state.wip[data.column] || 0;
      const inTarget = state.cards.filter(x => x.column === data.column).length;
      if (wip > 0 && inTarget >= wip) {
        toast(`WIP limit reached for "${data.column}" (${wip}).`, 'warn');
        return;
      }
      state.cards.push({ id: uid(), ...data });
      toast('Card added.', 'success');
    }
    closeModal();
    render();
  }

  function deleteCard(id) {
    const c = state.cards.find(x => x.id === id);
    if (!c) return;
    if (!confirm(`Delete "${c.title}"?`)) return;
    state.cards = state.cards.filter(x => x.id !== id);
    toast('Card deleted.');
    render();
  }

  function changeWip(colId) {
    const current = state.wip[colId] || 0;
    const val = prompt(`Set WIP limit for "${colId}" column (0 = no limit):`, current);
    if (val === null) return;
    const n = Math.max(0, Math.min(99, parseInt(val, 10) || 0));
    state.wip[colId] = n;
    toast(n === 0 ? `WIP limit removed for ${colId}.` : `WIP limit set to ${n} for ${colId}.`, 'success');
    render();
  }

  // ---------------- Top-level handlers ----------------
  document.getElementById('new-btn').addEventListener('click', () => openModal({ column: 'todo' }));
  document.getElementById('reset-btn').addEventListener('click', () => {
    if (!confirm('Reset the board to sample data? This removes your current cards.')) return;
    state = { cards: SAMPLE.slice().map(c => ({ ...c, id: uid() })), wip: { doing: 3 } };
    filter = { text: '', person: null };
    document.getElementById('search').value = '';
    toast('Board reset.', 'success');
    render();
  });

  const searchInput = document.getElementById('search');
  searchInput.addEventListener('input', () => {
    filter.text = searchInput.value;
    renderBoard();
    renderStatus();
  });
  document.getElementById('search-clear').addEventListener('click', () => {
    searchInput.value = '';
    filter.text = '';
    searchInput.focus();
    renderBoard();
    renderStatus();
  });

  document.addEventListener('keydown', (e) => {
    if (modalEl) return;
    const tag = (e.target.tagName || '').toLowerCase();
    if (tag === 'input' || tag === 'textarea' || tag === 'select') return;
    if (e.key === '/') { e.preventDefault(); searchInput.focus(); }
    else if (e.key.toLowerCase() === 'n') { e.preventDefault(); openModal({ column: 'todo' }); }
    else if (e.key === 'Escape') {
      if (filter.text || filter.person) {
        filter = { text: '', person: null };
        searchInput.value = '';
        render();
      }
    }
  });

  // Pretty date label
  const dateLabel = document.getElementById('date-label');
  const now = new Date();
  const fmt = now.toLocaleDateString(undefined, { weekday: 'long', month: 'short', day: 'numeric' });
  dateLabel.textContent = `Standup · ${fmt}`;

  // Boot
  render();
})();
</script>
</body>
</html>
