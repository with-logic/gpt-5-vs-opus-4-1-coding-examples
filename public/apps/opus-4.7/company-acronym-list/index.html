<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Acronymicon — Company Acronym Dictionary</title>
<style>
  :root {
    --bg-0: #0b0d12;
    --bg-1: #11141b;
    --bg-2: #171b25;
    --bg-3: #1d2230;
    --border: #262b3a;
    --border-hi: #343b4f;
    --text: #e8ecf4;
    --text-dim: #9aa3b8;
    --text-faint: #6b7388;
    --accent: #6d8cff;
    --accent-2: #8a6dff;
    --accent-hi: #9db0ff;
    --success: #3fd37e;
    --warn: #ffb347;
    --danger: #ff5a6a;
    --glow: 0 0 0 1px rgba(109,140,255,0.35), 0 8px 30px -12px rgba(109,140,255,0.45);
    --shadow-soft: 0 1px 0 rgba(255,255,255,0.03) inset, 0 10px 30px -18px rgba(0,0,0,0.7);

    --tag-teams-bg: rgba(109,140,255,0.12);
    --tag-teams-fg: #9db0ff;
    --tag-teams-bd: rgba(109,140,255,0.35);

    --tag-projects-bg: rgba(138,109,255,0.12);
    --tag-projects-fg: #b9a6ff;
    --tag-projects-bd: rgba(138,109,255,0.35);

    --tag-processes-bg: rgba(63,211,126,0.10);
    --tag-processes-fg: #7fe3a8;
    --tag-processes-bd: rgba(63,211,126,0.30);

    --tag-tech-bg: rgba(255,179,71,0.10);
    --tag-tech-fg: #ffcf8a;
    --tag-tech-bd: rgba(255,179,71,0.30);

    --tag-hr-bg: rgba(255,90,106,0.10);
    --tag-hr-fg: #ff9aa5;
    --tag-hr-bd: rgba(255,90,106,0.30);

    --tag-finance-bg: rgba(90,210,210,0.10);
    --tag-finance-fg: #8ee0e0;
    --tag-finance-bd: rgba(90,210,210,0.30);

    --tag-general-bg: rgba(154,163,184,0.10);
    --tag-general-fg: #c7cee0;
    --tag-general-bd: rgba(154,163,184,0.30);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background:
      radial-gradient(1200px 600px at 10% -10%, rgba(109,140,255,0.08), transparent 60%),
      radial-gradient(1000px 500px at 100% 0%, rgba(138,109,255,0.07), transparent 60%),
      var(--bg-0);
    color: var(--text);
    font-family: "Inter", "SF Pro Text", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  .app {
    max-width: 1180px;
    margin: 0 auto;
    padding: 28px 24px 80px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo {
    width: 40px; height: 40px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    display: grid; place-items: center;
    font-weight: 800;
    letter-spacing: 0.5px;
    color: white;
    box-shadow: var(--glow);
    font-size: 15px;
  }
  .brand-text h1 {
    margin: 0;
    font-size: 20px;
    letter-spacing: -0.2px;
  }
  .brand-text p {
    margin: 0;
    color: var(--text-dim);
    font-size: 12.5px;
  }
  .tabs {
    display: flex;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px;
    gap: 2px;
  }
  .tab {
    appearance: none;
    background: transparent;
    border: 0;
    color: var(--text-dim);
    padding: 8px 14px;
    border-radius: 7px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all .18s ease;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .tab:hover { color: var(--text); }
  .tab.active {
    background: linear-gradient(180deg, rgba(109,140,255,0.18), rgba(109,140,255,0.08));
    color: var(--text);
    box-shadow: inset 0 0 0 1px rgba(109,140,255,0.35);
  }

  /* Search */
  .toolbar {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px;
    margin-bottom: 16px;
  }
  .search {
    position: relative;
  }
  .search input {
    width: 100%;
    padding: 14px 14px 14px 44px;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-size: 15px;
    outline: none;
    transition: border-color .18s ease, box-shadow .18s ease, background .18s ease;
  }
  .search input::placeholder { color: var(--text-faint); }
  .search input:focus {
    border-color: rgba(109,140,255,0.55);
    box-shadow: 0 0 0 4px rgba(109,140,255,0.12);
    background: var(--bg-1);
  }
  .search svg.icon {
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-faint);
    width: 18px; height: 18px;
  }
  .search kbd {
    position: absolute; right: 10px; top: 50%;
    transform: translateY(-50%);
    font-family: "SF Mono", ui-monospace, Menlo, monospace;
    font-size: 11px;
    padding: 3px 7px;
    background: var(--bg-3);
    color: var(--text-faint);
    border-radius: 6px;
    border: 1px solid var(--border-hi);
  }
  .sort-select {
    background: var(--bg-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0 14px;
    height: 48px;
    font-size: 14px;
    cursor: pointer;
    outline: none;
    transition: all .18s ease;
    min-width: 160px;
  }
  .sort-select:hover { border-color: var(--border-hi); }

  /* Category chips */
  .chips {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .chip {
    appearance: none;
    border: 1px solid var(--border);
    background: var(--bg-2);
    color: var(--text-dim);
    padding: 7px 12px;
    border-radius: 999px;
    font-size: 12.5px;
    font-weight: 500;
    cursor: pointer;
    transition: all .16s ease;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .chip .count {
    color: var(--text-faint);
    font-variant-numeric: tabular-nums;
    font-weight: 500;
  }
  .chip:hover { color: var(--text); border-color: var(--border-hi); }
  .chip.active {
    background: linear-gradient(180deg, rgba(109,140,255,0.18), rgba(109,140,255,0.08));
    color: var(--text);
    border-color: rgba(109,140,255,0.5);
  }
  .chip.active .count { color: var(--accent-hi); }

  /* Stats bar */
  .stats {
    display: flex;
    gap: 18px;
    color: var(--text-dim);
    font-size: 12.5px;
    margin-bottom: 14px;
    align-items: center;
  }
  .stats .divider {
    width: 4px; height: 4px; border-radius: 50%;
    background: var(--text-faint);
    opacity: 0.6;
  }

  /* List */
  .list {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
  }
  @media (min-width: 820px) {
    .list { grid-template-columns: 1fr 1fr; }
  }
  .card {
    background: linear-gradient(180deg, var(--bg-2), var(--bg-1));
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 18px;
    transition: border-color .18s ease, transform .18s ease, box-shadow .18s ease;
    box-shadow: var(--shadow-soft);
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(400px 120px at 0% 0%, rgba(109,140,255,0.08), transparent 70%);
    opacity: 0;
    transition: opacity .18s ease;
    pointer-events: none;
  }
  .card:hover {
    border-color: var(--border-hi);
    transform: translateY(-1px);
  }
  .card:hover::before { opacity: 1; }
  .card-top {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 6px;
  }
  .acronym {
    font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.4px;
    color: var(--text);
  }
  .expansion {
    color: var(--text-dim);
    font-size: 13.5px;
    font-style: italic;
  }
  .definition {
    font-size: 14px;
    color: var(--text);
    margin: 8px 0 12px;
    line-height: 1.55;
  }
  .card-bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .tag {
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 999px;
    border: 1px solid;
    font-weight: 500;
    letter-spacing: 0.2px;
    white-space: nowrap;
  }
  .tag[data-cat="Teams"] { background: var(--tag-teams-bg); color: var(--tag-teams-fg); border-color: var(--tag-teams-bd); }
  .tag[data-cat="Projects"] { background: var(--tag-projects-bg); color: var(--tag-projects-fg); border-color: var(--tag-projects-bd); }
  .tag[data-cat="Processes"] { background: var(--tag-processes-bg); color: var(--tag-processes-fg); border-color: var(--tag-processes-bd); }
  .tag[data-cat="Tech"] { background: var(--tag-tech-bg); color: var(--tag-tech-fg); border-color: var(--tag-tech-bd); }
  .tag[data-cat="People"] { background: var(--tag-hr-bg); color: var(--tag-hr-fg); border-color: var(--tag-hr-bd); }
  .tag[data-cat="Finance"] { background: var(--tag-finance-bg); color: var(--tag-finance-fg); border-color: var(--tag-finance-bd); }
  .tag[data-cat="General"] { background: var(--tag-general-bg); color: var(--tag-general-fg); border-color: var(--tag-general-bd); }

  .fav {
    appearance: none;
    background: transparent;
    border: 0;
    color: var(--text-faint);
    cursor: pointer;
    padding: 4px;
    border-radius: 8px;
    transition: color .18s ease, background .18s ease, transform .15s ease;
  }
  .fav:hover { color: var(--warn); background: rgba(255,179,71,0.08); }
  .fav.active { color: var(--warn); }
  .fav:active { transform: scale(0.9); }

  mark.hl {
    background: rgba(109,140,255,0.25);
    color: var(--accent-hi);
    border-radius: 3px;
    padding: 0 2px;
  }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
    background: var(--bg-2);
    border: 1px dashed var(--border-hi);
    border-radius: 14px;
  }
  .empty h3 { margin: 6px 0 6px; color: var(--text); font-weight: 600; }
  .empty p { margin: 0; font-size: 13px; }

  /* Quiz */
  .quiz {
    display: none;
  }
  .quiz.active { display: block; }
  .list-wrap.hidden { display: none; }

  .quiz-card {
    background: linear-gradient(180deg, var(--bg-2), var(--bg-1));
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    max-width: 720px;
    margin: 10px auto;
    box-shadow: var(--shadow-soft);
  }
  .quiz-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    color: var(--text-dim);
    font-size: 13px;
  }
  .quiz-progress {
    height: 6px;
    background: var(--bg-3);
    border-radius: 999px;
    overflow: hidden;
    margin-bottom: 22px;
  }
  .quiz-progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    transition: width .3s ease;
    width: 0%;
  }
  .quiz-question {
    font-size: 15px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  .quiz-acronym {
    font-family: "SF Mono", ui-monospace, Menlo, monospace;
    font-size: 42px;
    font-weight: 700;
    letter-spacing: 1px;
    margin: 6px 0 24px;
    background: linear-gradient(90deg, var(--accent-hi), #d6bfff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-align: center;
  }
  .quiz-options {
    display: grid;
    gap: 10px;
  }
  .quiz-option {
    appearance: none;
    text-align: left;
    padding: 14px 16px;
    background: var(--bg-3);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 14px;
    cursor: pointer;
    transition: all .18s ease;
    display: flex;
    align-items: center;
    gap: 12px;
    line-height: 1.45;
  }
  .quiz-option:hover:not(:disabled) {
    border-color: rgba(109,140,255,0.5);
    background: rgba(109,140,255,0.08);
  }
  .quiz-option .letter {
    width: 26px; height: 26px;
    min-width: 26px;
    border-radius: 7px;
    background: var(--bg-1);
    border: 1px solid var(--border-hi);
    color: var(--text-dim);
    display: grid; place-items: center;
    font-size: 12px;
    font-weight: 600;
    font-family: "SF Mono", ui-monospace, Menlo, monospace;
  }
  .quiz-option.correct {
    border-color: rgba(63,211,126,0.6);
    background: rgba(63,211,126,0.1);
    color: #c5f3d8;
  }
  .quiz-option.correct .letter {
    background: rgba(63,211,126,0.2);
    border-color: rgba(63,211,126,0.4);
    color: #7fe3a8;
  }
  .quiz-option.wrong {
    border-color: rgba(255,90,106,0.5);
    background: rgba(255,90,106,0.08);
    color: #ffc1c8;
  }
  .quiz-option.wrong .letter {
    background: rgba(255,90,106,0.18);
    border-color: rgba(255,90,106,0.4);
    color: #ff9aa5;
  }
  .quiz-option:disabled { cursor: default; }

  .quiz-actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 22px;
    gap: 10px;
    flex-wrap: wrap;
  }
  .btn {
    appearance: none;
    border: 1px solid var(--border);
    background: var(--bg-3);
    color: var(--text);
    padding: 10px 16px;
    border-radius: 10px;
    font-size: 13.5px;
    font-weight: 500;
    cursor: pointer;
    transition: all .18s ease;
  }
  .btn:hover { border-color: var(--border-hi); background: var(--bg-2); }
  .btn.primary {
    background: linear-gradient(180deg, var(--accent), #5670e6);
    border-color: transparent;
    color: white;
    font-weight: 600;
  }
  .btn.primary:hover { filter: brightness(1.08); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .quiz-feedback {
    margin-top: 14px;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 13.5px;
    background: var(--bg-3);
    border: 1px solid var(--border);
    display: none;
  }
  .quiz-feedback.visible { display: block; }
  .quiz-feedback.correct {
    border-color: rgba(63,211,126,0.4);
    background: rgba(63,211,126,0.07);
    color: #c5f3d8;
  }
  .quiz-feedback.wrong {
    border-color: rgba(255,90,106,0.4);
    background: rgba(255,90,106,0.06);
    color: #ffc1c8;
  }

  .quiz-start {
    text-align: center;
    padding: 12px 0 4px;
  }
  .quiz-start h2 {
    margin: 0 0 8px;
    font-size: 22px;
  }
  .quiz-start p {
    color: var(--text-dim);
    margin: 0 auto 22px;
    max-width: 480px;
    font-size: 14px;
  }
  .quiz-start .btn { padding: 12px 22px; font-size: 14px; }

  .quiz-result {
    text-align: center;
    padding: 20px 0 8px;
  }
  .quiz-score {
    font-size: 60px;
    font-weight: 800;
    margin: 8px 0;
    background: linear-gradient(90deg, var(--accent-hi), #d6bfff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    letter-spacing: -1px;
  }
  .quiz-score small {
    font-size: 22px;
    color: var(--text-faint);
    font-weight: 500;
    -webkit-text-fill-color: var(--text-faint);
  }
  .quiz-verdict {
    color: var(--text-dim);
    font-size: 15px;
    margin-bottom: 8px;
  }
  .review-list {
    margin-top: 20px;
    display: grid;
    gap: 8px;
    text-align: left;
  }
  .review-item {
    padding: 10px 14px;
    background: var(--bg-3);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 13px;
  }
  .review-item .r-acr {
    font-family: "SF Mono", ui-monospace, monospace;
    font-weight: 600;
    color: var(--text);
    margin-right: 8px;
  }
  .review-item .r-def { color: var(--text-dim); }
  .review-item.r-correct { border-left: 3px solid var(--success); }
  .review-item.r-wrong { border-left: 3px solid var(--danger); }

  /* Mobile */
  @media (max-width: 720px) {
    .app { padding: 20px 14px 60px; }
    .toolbar { grid-template-columns: 1fr; }
    .sort-select { width: 100%; }
    .header { gap: 12px; }
    .tabs { width: 100%; justify-content: space-between; }
    .tab { flex: 1; justify-content: center; }
    .quiz-acronym { font-size: 34px; }
    .quiz-card { padding: 20px; }
    .brand-text h1 { font-size: 17px; }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: var(--bg-0); }
  ::-webkit-scrollbar-thumb { background: var(--bg-3); border-radius: 10px; border: 2px solid var(--bg-0); }
  ::-webkit-scrollbar-thumb:hover { background: var(--border-hi); }
</style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="brand">
        <div class="logo">Ax</div>
        <div class="brand-text">
          <h1>Acronymicon</h1>
          <p>Your internal decoder ring for company acronyms</p>
        </div>
      </div>
      <nav class="tabs" role="tablist" aria-label="View mode">
        <button class="tab active" data-view="browse" role="tab" aria-selected="true">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          Browse
        </button>
        <button class="tab" data-view="quiz" role="tab" aria-selected="false">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          Quiz
        </button>
      </nav>
    </header>

    <section class="list-wrap" id="browseView">
      <div class="toolbar">
        <div class="search">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="searchInput" placeholder="Search acronyms, definitions, or tags…" autocomplete="off" spellcheck="false" />
          <kbd>/</kbd>
        </div>
        <select id="sortSelect" class="sort-select" aria-label="Sort">
          <option value="az">Sort: A → Z</option>
          <option value="za">Sort: Z → A</option>
          <option value="cat">Sort: By category</option>
          <option value="fav">Sort: Favorites first</option>
        </select>
      </div>

      <div class="chips" id="chips"></div>

      <div class="stats" id="stats"></div>

      <div class="list" id="list"></div>
    </section>

    <section class="quiz" id="quizView">
      <div class="quiz-card" id="quizCard"></div>
    </section>
  </div>

<script>
  // ---------- DATA ----------
  const DATA = [
    { acr: "OKR", def: "Objectives and Key Results — a goal-setting framework that pairs ambitious objectives with measurable key results.", cat: "Processes" },
    { acr: "KPI", def: "Key Performance Indicator — a quantifiable measure used to evaluate success against a specific objective.", cat: "Processes" },
    { acr: "EOD", def: "End of Day — typically means before the close of the working day (e.g., 5 or 6 PM local time).", cat: "General" },
    { acr: "COB", def: "Close of Business — the end of the business day, often used interchangeably with EOD.", cat: "General" },
    { acr: "WFH", def: "Work From Home — remote work arrangement from an employee's residence.", cat: "General" },
    { acr: "PTO", def: "Paid Time Off — approved leave from work while continuing to be paid.", cat: "People" },
    { acr: "1:1", def: "One-on-One — a recurring private meeting between a manager and a direct report.", cat: "Processes" },
    { acr: "ERG", def: "Employee Resource Group — a voluntary, employee-led community for shared identity or interests.", cat: "People" },
    { acr: "L&D", def: "Learning & Development — programs and resources dedicated to employee growth and training.", cat: "People" },
    { acr: "RFC", def: "Request for Comments — a written proposal circulated for feedback before a decision or build.", cat: "Processes" },
    { acr: "PRD", def: "Product Requirements Document — specifies the purpose, features, and success criteria of a product.", cat: "Projects" },
    { acr: "MVP", def: "Minimum Viable Product — the smallest version of a product that delivers user value and learning.", cat: "Projects" },
    { acr: "POC", def: "Proof of Concept — a small demonstration built to validate that an idea is feasible.", cat: "Projects" },
    { acr: "QBR", def: "Quarterly Business Review — a recurring deep-dive on performance, priorities, and plans each quarter.", cat: "Processes" },
    { acr: "AOR", def: "Area of Responsibility — the scope of ownership assigned to a specific person or team.", cat: "Teams" },
    { acr: "DRI", def: "Directly Responsible Individual — the single person accountable for a decision or deliverable.", cat: "Teams" },
    { acr: "SME", def: "Subject Matter Expert — a person with deep expertise in a specific domain or system.", cat: "Teams" },
    { acr: "IC",  def: "Individual Contributor — an employee focused on hands-on work rather than people management.", cat: "People" },
    { acr: "EM",  def: "Engineering Manager — leads a team of engineers, balancing people, delivery, and technical direction.", cat: "Teams" },
    { acr: "PM",  def: "Product Manager — owns the direction and success of a product or feature area.", cat: "Teams" },
    { acr: "TPM", def: "Technical Program Manager — coordinates complex cross-team initiatives with technical dependencies.", cat: "Teams" },
    { acr: "UX",  def: "User Experience — the overall feel and usability of a product from the user's perspective.", cat: "Projects" },
    { acr: "UI",  def: "User Interface — the visual elements and controls a user interacts with on screen.", cat: "Projects" },
    { acr: "SLA", def: "Service Level Agreement — a formal commitment on the expected performance of a service.", cat: "Processes" },
    { acr: "SLO", def: "Service Level Objective — an internal target (e.g., 99.9% uptime) that upholds an SLA.", cat: "Processes" },
    { acr: "SLI", def: "Service Level Indicator — the actual metric measured, like latency or error rate, against an SLO.", cat: "Processes" },
    { acr: "CI/CD", def: "Continuous Integration / Continuous Delivery — automated pipelines that build, test, and deploy changes.", cat: "Tech" },
    { acr: "API", def: "Application Programming Interface — a contract that lets systems or services talk to each other.", cat: "Tech" },
    { acr: "SSO", def: "Single Sign-On — one login credential that grants access to multiple internal systems.", cat: "Tech" },
    { acr: "VPN", def: "Virtual Private Network — a secure, encrypted tunnel for accessing internal resources remotely.", cat: "Tech" },
    { acr: "SOC2", def: "Service Organization Control 2 — a compliance standard covering security, availability, and confidentiality.", cat: "Processes" },
    { acr: "NDA", def: "Non-Disclosure Agreement — a contract protecting confidential information shared between parties.", cat: "Finance" },
    { acr: "PO",  def: "Purchase Order — an official document authorizing a purchase from a vendor.", cat: "Finance" },
    { acr: "P&L", def: "Profit and Loss — a financial statement summarizing revenues, costs, and earnings over a period.", cat: "Finance" },
    { acr: "ARR", def: "Annual Recurring Revenue — the normalized yearly subscription revenue of the business.", cat: "Finance" },
    { acr: "MRR", def: "Monthly Recurring Revenue — the predictable subscription revenue each month.", cat: "Finance" },
    { acr: "CAC", def: "Customer Acquisition Cost — the average cost to acquire one new paying customer.", cat: "Finance" },
    { acr: "LTV", def: "Lifetime Value — total expected revenue from a customer over the full relationship.", cat: "Finance" },
    { acr: "NPS", def: "Net Promoter Score — a customer loyalty metric based on likelihood to recommend.", cat: "Processes" },
    { acr: "CSAT", def: "Customer Satisfaction Score — a short survey-based measure of how happy customers are.", cat: "Processes" },
    { acr: "RACI", def: "Responsible, Accountable, Consulted, Informed — a matrix clarifying roles in a project.", cat: "Processes" },
    { acr: "FYI", def: "For Your Information — shared as context with no action required.", cat: "General" },
    { acr: "TLDR", def: "Too Long; Didn't Read — a brief summary of a longer message or document.", cat: "General" },
    { acr: "WIP", def: "Work In Progress — a task or document that is not yet finished.", cat: "General" },
    { acr: "ETA", def: "Estimated Time of Arrival — the expected date or time something will be ready.", cat: "General" },
    { acr: "BRB", def: "Be Right Back — a quick signal in chat that you'll return shortly.", cat: "General" },
    { acr: "IMO", def: "In My Opinion — flags a statement as personal perspective rather than fact.", cat: "General" },
    { acr: "AMA", def: "Ask Me Anything — an open Q&A session, typically with a leader or subject expert.", cat: "People" },
    { acr: "TGIF", def: "Thank Goodness It's Friday — an all-hands or social gathering held on Friday afternoons.", cat: "People" },
  ];

  const CATEGORIES = ["All", "Teams", "Projects", "Processes", "Tech", "People", "Finance", "General"];

  // ---------- STATE ----------
  const state = {
    query: "",
    category: "All",
    sort: "az",
    favorites: loadFavs(),
    view: "browse",
    quiz: null,
  };

  function loadFavs() {
    try { return new Set(JSON.parse(localStorage.getItem("acr_favs") || "[]")); }
    catch { return new Set(); }
  }
  function saveFavs() {
    try { localStorage.setItem("acr_favs", JSON.stringify([...state.favorites])); } catch {}
  }

  // ---------- DOM REFS ----------
  const $chips = document.getElementById("chips");
  const $list = document.getElementById("list");
  const $stats = document.getElementById("stats");
  const $search = document.getElementById("searchInput");
  const $sort = document.getElementById("sortSelect");
  const $browseView = document.getElementById("browseView");
  const $quizView = document.getElementById("quizView");
  const $quizCard = document.getElementById("quizCard");
  const $tabs = document.querySelectorAll(".tab");

  // ---------- HELPERS ----------
  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" }[c]));
  }
  function highlight(text, q) {
    const safe = escapeHtml(text);
    if (!q) return safe;
    const terms = q.split(/\s+/).filter(Boolean).map(t => t.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"));
    if (!terms.length) return safe;
    const re = new RegExp("(" + terms.join("|") + ")", "gi");
    return safe.replace(re, '<mark class="hl">$1</mark>');
  }

  function matches(item, q) {
    if (!q) return true;
    const needle = q.toLowerCase();
    return item.acr.toLowerCase().includes(needle)
      || item.def.toLowerCase().includes(needle)
      || item.cat.toLowerCase().includes(needle);
  }

  function filtered() {
    let items = DATA.filter(i =>
      (state.category === "All" || i.cat === state.category) &&
      matches(i, state.query)
    );
    switch (state.sort) {
      case "az": items.sort((a,b) => a.acr.localeCompare(b.acr)); break;
      case "za": items.sort((a,b) => b.acr.localeCompare(a.acr)); break;
      case "cat": items.sort((a,b) => a.cat.localeCompare(b.cat) || a.acr.localeCompare(b.acr)); break;
      case "fav": items.sort((a,b) => {
        const fa = state.favorites.has(a.acr) ? 0 : 1;
        const fb = state.favorites.has(b.acr) ? 0 : 1;
        return fa - fb || a.acr.localeCompare(b.acr);
      }); break;
    }
    return items;
  }

  // ---------- RENDER ----------
  function renderChips() {
    $chips.innerHTML = CATEGORIES.map(cat => {
      const count = cat === "All" ? DATA.length : DATA.filter(d => d.cat === cat).length;
      const active = state.category === cat ? " active" : "";
      return `<button class="chip${active}" data-cat="${cat}">${cat}<span class="count">${count}</span></button>`;
    }).join("");
    $chips.querySelectorAll(".chip").forEach(btn => {
      btn.addEventListener("click", () => {
        state.category = btn.dataset.cat;
        renderChips();
        renderList();
      });
    });
  }

  function renderStats(items) {
    const total = DATA.length;
    const shown = items.length;
    const favs = state.favorites.size;
    $stats.innerHTML = `
      <span>Showing <strong style="color:var(--text)">${shown}</strong> of ${total}</span>
      <span class="divider"></span>
      <span>${favs} favorited</span>
      <span class="divider"></span>
      <span>${CATEGORIES.length - 1} categories</span>
    `;
  }

  function renderList() {
    const items = filtered();
    renderStats(items);
    if (!items.length) {
      $list.innerHTML = `
        <div class="empty" style="grid-column: 1 / -1">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color:var(--text-faint)"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <h3>No matches found</h3>
          <p>Try a different search term or clear the category filter.</p>
        </div>`;
      return;
    }
    $list.innerHTML = items.map(item => {
      const isFav = state.favorites.has(item.acr);
      return `
        <article class="card">
          <div class="card-top">
            <div class="acronym">${highlight(item.acr, state.query)}</div>
          </div>
          <div class="definition">${highlight(item.def, state.query)}</div>
          <div class="card-bottom">
            <div class="tags">
              <span class="tag" data-cat="${item.cat}">${item.cat}</span>
            </div>
            <button class="fav${isFav ? " active" : ""}" data-acr="${escapeHtml(item.acr)}" aria-label="${isFav ? "Unfavorite" : "Favorite"}" title="${isFav ? "Remove from favorites" : "Add to favorites"}">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="${isFav ? "currentColor" : "none"}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
            </button>
          </div>
        </article>`;
    }).join("");

    $list.querySelectorAll(".fav").forEach(btn => {
      btn.addEventListener("click", e => {
        const acr = btn.dataset.acr;
        if (state.favorites.has(acr)) state.favorites.delete(acr);
        else state.favorites.add(acr);
        saveFavs();
        renderList();
      });
    });
  }

  // ---------- QUIZ ----------
  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function buildQuiz(size = 10) {
    const pool = state.category === "All" ? DATA : DATA.filter(d => d.cat === state.category);
    const base = pool.length >= 4 ? pool : DATA;
    const questions = shuffle(base).slice(0, Math.min(size, base.length)).map(item => {
      const wrongPool = DATA.filter(d => d.acr !== item.acr);
      const distractors = shuffle(wrongPool).slice(0, 3).map(d => d.def);
      const options = shuffle([item.def, ...distractors]);
      return { item, options, answerIndex: options.indexOf(item.def), chosen: null };
    });
    return { questions, index: 0, score: 0, done: false };
  }

  function renderQuiz() {
    const q = state.quiz;
    if (!q) {
      $quizCard.innerHTML = `
        <div class="quiz-start">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="url(#gg)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:8px">
            <defs><linearGradient id="gg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#6d8cff"/><stop offset="1" stop-color="#8a6dff"/></linearGradient></defs>
            <circle cx="12" cy="12" r="10"/>
            <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
            <line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
          <h2>Test your acronym fluency</h2>
          <p>Ten random multiple-choice questions drawn from the dictionary. Filter by category on the Browse tab to focus your practice.</p>
          <button class="btn primary" id="startQuizBtn">Start quiz →</button>
        </div>`;
      document.getElementById("startQuizBtn").addEventListener("click", () => {
        state.quiz = buildQuiz(10);
        renderQuiz();
      });
      return;
    }
    if (q.done) {
      const pct = Math.round((q.score / q.questions.length) * 100);
      const verdict =
        pct === 100 ? "Flawless. You are the office acronym oracle." :
        pct >= 80 ? "Excellent — you'd fit in at any all-hands." :
        pct >= 60 ? "Solid. A few more and you'll be fluent." :
        pct >= 40 ? "Not bad — worth another round." :
                    "Time to browse the dictionary first. 📘";
      const reviews = q.questions.map(qi => {
        const correct = qi.chosen === qi.answerIndex;
        return `<div class="review-item ${correct ? "r-correct" : "r-wrong"}">
          <span class="r-acr">${escapeHtml(qi.item.acr)}</span>
          <span class="r-def">${escapeHtml(qi.item.def)}</span>
        </div>`;
      }).join("");
      $quizCard.innerHTML = `
        <div class="quiz-result">
          <div class="quiz-verdict">You scored</div>
          <div class="quiz-score">${q.score}<small>/${q.questions.length}</small></div>
          <div class="quiz-verdict">${verdict}</div>
          <div style="display:flex;gap:10px;justify-content:center;margin-top:18px;flex-wrap:wrap">
            <button class="btn primary" id="quizAgainBtn">Try another round</button>
            <button class="btn" id="quizBackBtn">Back to browse</button>
          </div>
          <div class="review-list">${reviews}</div>
        </div>`;
      document.getElementById("quizAgainBtn").addEventListener("click", () => {
        state.quiz = buildQuiz(10);
        renderQuiz();
      });
      document.getElementById("quizBackBtn").addEventListener("click", () => {
        state.quiz = null;
        switchView("browse");
      });
      return;
    }

    const cur = q.questions[q.index];
    const pct = (q.index / q.questions.length) * 100;
    const letters = ["A", "B", "C", "D"];
    $quizCard.innerHTML = `
      <div class="quiz-header">
        <span>Question ${q.index + 1} of ${q.questions.length}</span>
        <span>Score: ${q.score}</span>
      </div>
      <div class="quiz-progress"><div class="quiz-progress-bar" style="width:${pct}%"></div></div>
      <div class="quiz-question">What does this acronym stand for?</div>
      <div class="quiz-acronym">${escapeHtml(cur.item.acr)}</div>
      <div class="quiz-options" id="optionsWrap">
        ${cur.options.map((opt, i) => `
          <button class="quiz-option" data-i="${i}">
            <span class="letter">${letters[i]}</span>
            <span>${escapeHtml(opt)}</span>
          </button>`).join("")}
      </div>
      <div class="quiz-feedback" id="quizFeedback"></div>
      <div class="quiz-actions">
        <button class="btn" id="quizQuitBtn">Quit</button>
        <button class="btn primary" id="quizNextBtn" disabled>Next →</button>
      </div>
    `;

    const optionsWrap = document.getElementById("optionsWrap");
    const feedback = document.getElementById("quizFeedback");
    const nextBtn = document.getElementById("quizNextBtn");
    const quitBtn = document.getElementById("quizQuitBtn");

    optionsWrap.querySelectorAll(".quiz-option").forEach(btn => {
      btn.addEventListener("click", () => {
        if (cur.chosen !== null) return;
        const idx = Number(btn.dataset.i);
        cur.chosen = idx;
        const correct = idx === cur.answerIndex;
        if (correct) q.score++;

        optionsWrap.querySelectorAll(".quiz-option").forEach((b, i) => {
          b.disabled = true;
          if (i === cur.answerIndex) b.classList.add("correct");
          else if (i === idx) b.classList.add("wrong");
        });

        feedback.classList.add("visible", correct ? "correct" : "wrong");
        feedback.innerHTML = correct
          ? `<strong>Correct!</strong> ${escapeHtml(cur.item.acr)} = ${escapeHtml(cur.item.def)}`
          : `<strong>Not quite.</strong> ${escapeHtml(cur.item.acr)} actually stands for: ${escapeHtml(cur.item.def)}`;

        nextBtn.disabled = false;
        nextBtn.textContent = q.index === q.questions.length - 1 ? "See results →" : "Next →";
      });
    });

    nextBtn.addEventListener("click", () => {
      if (q.index === q.questions.length - 1) q.done = true;
      else q.index++;
      renderQuiz();
    });
    quitBtn.addEventListener("click", () => {
      state.quiz = null;
      switchView("browse");
    });
  }

  // ---------- TABS ----------
  function switchView(v) {
    state.view = v;
    $tabs.forEach(t => {
      const is = t.dataset.view === v;
      t.classList.toggle("active", is);
      t.setAttribute("aria-selected", is ? "true" : "false");
    });
    if (v === "browse") {
      $browseView.classList.remove("hidden");
      $quizView.classList.remove("active");
    } else {
      $browseView.classList.add("hidden");
      $quizView.classList.add("active");
      renderQuiz();
    }
  }

  $tabs.forEach(t => t.addEventListener("click", () => switchView(t.dataset.view)));

  // ---------- EVENTS ----------
  let searchTimer = null;
  $search.addEventListener("input", e => {
    clearTimeout(searchTimer);
    const val = e.target.value;
    searchTimer = setTimeout(() => {
      state.query = val.trim();
      renderList();
    }, 80);
  });

  $sort.addEventListener("change", e => {
    state.sort = e.target.value;
    renderList();
  });

  document.addEventListener("keydown", e => {
    if (e.key === "/" && document.activeElement !== $search && state.view === "browse") {
      e.preventDefault();
      $search.focus();
    }
    if (e.key === "Escape" && document.activeElement === $search) {
      $search.value = "";
      state.query = "";
      renderList();
      $search.blur();
    }
  });

  // ---------- INIT ----------
  renderChips();
  renderList();
</script>
</body>
</html>
