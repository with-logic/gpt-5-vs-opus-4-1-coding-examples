<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Countdown · Your Moment Awaits</title>
<style>
  :root {
    --bg: #07070b;
    --fg: #ffffff;
    --muted: rgba(255, 255, 255, 0.62);
    --accent: #ff4d7d;
    --accent2: #7b5cff;
    --accent3: #22d3ee;
    --glass: rgba(255, 255, 255, 0.08);
    --glass-strong: rgba(255, 255, 255, 0.14);
    --stroke: rgba(255, 255, 255, 0.16);
    --shadow: 0 30px 80px rgba(0, 0, 0, 0.55);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--fg);
    -webkit-font-smoothing: antialiased;
    letter-spacing: -0.01em;
  }

  /* Background layers (parallax) */
  .bg-stack {
    position: fixed;
    inset: -8%;
    z-index: 0;
    overflow: hidden;
  }

  .bg-image {
    position: absolute;
    inset: -6%;
    background-size: cover;
    background-position: center;
    transform: scale(1.12);
    transition: background-image 0.8s ease;
    filter: brightness(0.55) saturate(1.15);
    will-change: transform;
  }

  .bg-image::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 30% 20%, rgba(123, 92, 255, 0.35), transparent 55%),
                radial-gradient(circle at 80% 80%, rgba(255, 77, 125, 0.35), transparent 55%),
                linear-gradient(180deg, rgba(7, 7, 11, 0.35) 0%, rgba(7, 7, 11, 0.8) 100%);
    pointer-events: none;
  }

  .bg-grain {
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.5'/></svg>");
    opacity: 0.08;
    mix-blend-mode: overlay;
    pointer-events: none;
  }

  .bg-stars {
    position: absolute;
    inset: 0;
    pointer-events: none;
    will-change: transform;
  }
  .bg-stars canvas { width: 100%; height: 100%; display: block; }

  /* Main layout */
  .app {
    position: relative;
    z-index: 2;
    height: 100%;
    display: flex;
    flex-direction: column;
    padding: 28px 36px;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 3;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 600;
    letter-spacing: 0.02em;
    font-size: 14px;
    color: rgba(255, 255, 255, 0.8);
  }

  .brand-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    box-shadow: 0 0 18px var(--accent);
    animation: pulse 2.2s infinite ease-in-out;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.3); opacity: 0.7; }
  }

  .header-actions {
    display: flex;
    gap: 10px;
  }

  .icon-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--glass);
    border: 1px solid var(--stroke);
    color: var(--fg);
    display: grid; place-items: center;
    cursor: pointer;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    transition: all 0.25s ease;
  }
  .icon-btn:hover {
    background: var(--glass-strong);
    transform: translateY(-1px);
  }
  .icon-btn svg { width: 18px; height: 18px; }

  /* Center stage */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    position: relative;
    will-change: transform;
  }

  .event-meta {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    margin-bottom: 36px;
    opacity: 0;
    animation: fadeUp 0.9s 0.2s forwards ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .kicker {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    border-radius: 999px;
    background: var(--glass);
    border: 1px solid var(--stroke);
    backdrop-filter: blur(14px);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: rgba(255, 255, 255, 0.75);
  }
  .kicker .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent3);
    box-shadow: 0 0 10px var(--accent3);
  }

  .event-name {
    font-size: clamp(32px, 5vw, 64px);
    font-weight: 700;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, #ffffff 0%, #d0d0ff 50%, #ffb8d9 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    line-height: 1.05;
    max-width: 900px;
    text-shadow: 0 1px 30px rgba(255, 255, 255, 0.1);
  }

  .event-details {
    display: flex;
    gap: 28px;
    color: var(--muted);
    font-size: 14px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .event-details span {
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }

  .event-details svg { width: 14px; height: 14px; opacity: 0.8; }

  /* Countdown */
  .countdown {
    display: flex;
    gap: clamp(10px, 2vw, 28px);
    margin-bottom: 40px;
    opacity: 0;
    animation: fadeUp 0.9s 0.4s forwards ease;
  }

  .unit {
    position: relative;
    min-width: clamp(90px, 13vw, 170px);
    padding: 22px 14px 16px;
    border-radius: 20px;
    background: linear-gradient(180deg, rgba(255,255,255,0.09), rgba(255,255,255,0.03));
    border: 1px solid var(--stroke);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .unit::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
  }

  .unit::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 50% -20%, rgba(255,255,255,0.18), transparent 60%);
    pointer-events: none;
  }

  .digits {
    display: flex;
    justify-content: center;
    font-variant-numeric: tabular-nums;
    font-weight: 700;
    font-size: clamp(44px, 7vw, 84px);
    line-height: 1;
    letter-spacing: -0.04em;
    color: #fff;
    text-shadow: 0 2px 20px rgba(0, 0, 0, 0.4);
  }

  .digit-slot {
    position: relative;
    width: 1ch;
    height: 1em;
    overflow: hidden;
    display: inline-block;
  }

  .digit-roll {
    position: absolute;
    left: 0;
    top: 0;
    display: flex;
    flex-direction: column;
    transition: transform 0.75s cubic-bezier(0.33, 1, 0.68, 1);
  }

  .digit-roll span {
    height: 1em;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 1ch;
  }

  .unit-label {
    margin-top: 12px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.22em;
    color: rgba(255, 255, 255, 0.6);
    text-align: center;
  }

  /* Action buttons */
  .actions {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
    opacity: 0;
    animation: fadeUp 0.9s 0.6s forwards ease;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 24px;
    border-radius: 999px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    border: 1px solid var(--stroke);
    background: var(--glass);
    color: var(--fg);
    cursor: pointer;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
  }

  .btn:hover {
    background: var(--glass-strong);
    transform: translateY(-2px);
    border-color: rgba(255, 255, 255, 0.3);
  }

  .btn svg { width: 16px; height: 16px; }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    border-color: transparent;
    box-shadow: 0 10px 30px rgba(255, 77, 125, 0.35), 0 4px 10px rgba(123, 92, 255, 0.25);
  }
  .btn-primary:hover {
    box-shadow: 0 14px 40px rgba(255, 77, 125, 0.5), 0 6px 14px rgba(123, 92, 255, 0.35);
    transform: translateY(-3px);
  }

  /* Dropdown menu */
  .menu-wrap { position: relative; }
  .menu {
    position: absolute;
    right: 0;
    top: calc(100% + 10px);
    background: rgba(20, 20, 28, 0.92);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid var(--stroke);
    border-radius: 14px;
    padding: 6px;
    min-width: 200px;
    box-shadow: var(--shadow);
    opacity: 0;
    transform: translateY(-6px) scale(0.98);
    pointer-events: none;
    transition: all 0.2s ease;
    z-index: 10;
  }
  .menu.open {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: auto;
  }
  .menu button {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    padding: 10px 12px;
    border: none;
    background: transparent;
    color: var(--fg);
    border-radius: 8px;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    text-align: left;
    transition: background 0.15s ease;
  }
  .menu button:hover { background: var(--glass-strong); }
  .menu button svg { width: 14px; height: 14px; opacity: 0.8; }

  /* Modal (editor) */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    z-index: 20;
    background: rgba(0, 0, 0, 0.55);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .modal-backdrop.open { opacity: 1; pointer-events: auto; }

  .modal {
    position: fixed;
    z-index: 21;
    top: 50%; left: 50%;
    transform: translate(-50%, -48%) scale(0.96);
    width: min(520px, calc(100vw - 40px));
    max-height: calc(100vh - 40px);
    overflow-y: auto;
    background: linear-gradient(180deg, rgba(30, 30, 40, 0.95), rgba(18, 18, 26, 0.95));
    border: 1px solid var(--stroke);
    border-radius: 20px;
    padding: 28px;
    box-shadow: var(--shadow);
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s cubic-bezier(0.33, 1, 0.68, 1);
  }
  .modal.open {
    opacity: 1;
    pointer-events: auto;
    transform: translate(-50%, -50%) scale(1);
  }

  .modal h2 {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 6px;
    letter-spacing: -0.02em;
  }
  .modal p.desc {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 22px;
  }

  .field {
    margin-bottom: 16px;
  }
  .field label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: rgba(255, 255, 255, 0.65);
    margin-bottom: 8px;
  }
  .field input, .field select {
    width: 100%;
    padding: 12px 14px;
    background: rgba(0, 0, 0, 0.3);
    border: 1px solid var(--stroke);
    border-radius: 10px;
    color: var(--fg);
    font-family: inherit;
    font-size: 14px;
    transition: all 0.2s ease;
  }
  .field input:focus, .field select:focus {
    outline: none;
    border-color: var(--accent2);
    box-shadow: 0 0 0 3px rgba(123, 92, 255, 0.2);
  }

  .field input[type="datetime-local"] {
    color-scheme: dark;
  }

  .field-row { display: flex; gap: 12px; }
  .field-row > div { flex: 1; }

  .upload {
    position: relative;
    border: 1.5px dashed var(--stroke);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s ease;
    background: rgba(0, 0, 0, 0.2);
  }
  .upload:hover, .upload.drag {
    border-color: var(--accent2);
    background: rgba(123, 92, 255, 0.08);
  }
  .upload input { display: none; }
  .upload svg {
    width: 24px; height: 24px;
    opacity: 0.7;
    margin-bottom: 6px;
  }
  .upload-text {
    font-size: 13px;
    color: var(--muted);
  }
  .upload-text strong { color: var(--fg); font-weight: 500; }
  .upload-preview {
    margin-top: 10px;
    width: 100%;
    height: 80px;
    border-radius: 8px;
    background-size: cover;
    background-position: center;
    display: none;
  }
  .upload-preview.show { display: block; }

  .preset-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-top: 6px;
  }
  .preset {
    padding: 10px 4px;
    border-radius: 10px;
    border: 1px solid var(--stroke);
    background: rgba(0,0,0,0.25);
    color: var(--muted);
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s ease;
  }
  .preset:hover {
    color: var(--fg);
    border-color: var(--accent2);
  }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 24px;
    justify-content: flex-end;
  }
  .btn-secondary {
    background: transparent;
    border: 1px solid var(--stroke);
  }

  .close-btn {
    position: absolute;
    top: 20px; right: 20px;
    width: 32px; height: 32px;
    border-radius: 50%;
    border: none;
    background: var(--glass);
    color: var(--fg);
    cursor: pointer;
    display: grid; place-items: center;
  }
  .close-btn:hover { background: var(--glass-strong); }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    padding: 12px 20px;
    background: rgba(30, 30, 40, 0.95);
    backdrop-filter: blur(14px);
    border: 1px solid var(--stroke);
    border-radius: 999px;
    color: var(--fg);
    font-size: 13px;
    box-shadow: var(--shadow);
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s ease;
    z-index: 30;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .toast svg { width: 16px; height: 16px; color: var(--accent3); }

  /* Event fired */
  .fired .countdown { animation: celebrate 1s ease; }
  @keyframes celebrate {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  .confetti {
    position: fixed;
    pointer-events: none;
    z-index: 15;
  }

  /* Mobile */
  @media (max-width: 640px) {
    .app { padding: 16px; }
    .event-details { gap: 14px; font-size: 12px; }
    .countdown { gap: 8px; }
    .unit { padding: 14px 8px 10px; border-radius: 14px; }
    .unit-label { font-size: 9px; letter-spacing: 0.16em; margin-top: 8px; }
    .btn { padding: 11px 18px; font-size: 12px; }
    .preset-row { grid-template-columns: repeat(2, 1fr); }
    .field-row { flex-direction: column; gap: 16px; }
  }

  /* Scroll lock during modal */
  body.modal-open { overflow: hidden; }

  /* Scrollbar */
  .modal::-webkit-scrollbar { width: 6px; }
  .modal::-webkit-scrollbar-track { background: transparent; }
  .modal::-webkit-scrollbar-thumb { background: var(--stroke); border-radius: 3px; }
</style>
</head>
<body>

<div class="bg-stack">
  <div class="bg-image" id="bgImage"></div>
  <div class="bg-stars" id="bgStars"><canvas></canvas></div>
  <div class="bg-grain"></div>
</div>

<div class="app">
  <header>
    <div class="brand">
      <span class="brand-dot"></span>
      <span>ECHO · Countdown</span>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="fullscreenBtn" title="Fullscreen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
      </button>
      <button class="icon-btn" id="editBtn" title="Edit event">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="m18.5 2.5 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </button>
    </div>
  </header>

  <main id="stage">
    <div class="event-meta">
      <div class="kicker"><span class="dot"></span><span id="statusText">Counting down</span></div>
      <h1 class="event-name" id="eventName">Aurora Festival 2026</h1>
      <div class="event-details">
        <span id="dateDisplay">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>
          <span id="dateText">—</span>
        </span>
        <span id="locationDisplay">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 7-8 13-8 13s-8-6-8-13a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
          <span id="locationText">—</span>
        </span>
      </div>
    </div>

    <div class="countdown" id="countdown">
      <div class="unit">
        <div class="digits" data-unit="d"></div>
        <div class="unit-label">Days</div>
      </div>
      <div class="unit">
        <div class="digits" data-unit="h"></div>
        <div class="unit-label">Hours</div>
      </div>
      <div class="unit">
        <div class="digits" data-unit="m"></div>
        <div class="unit-label">Minutes</div>
      </div>
      <div class="unit">
        <div class="digits" data-unit="s"></div>
        <div class="unit-label">Seconds</div>
      </div>
    </div>

    <div class="actions">
      <div class="menu-wrap">
        <button class="btn btn-primary" id="saveBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/><path d="M8 14h.01"/><path d="M12 14h.01"/><path d="M16 14h.01"/></svg>
          Save to Calendar
        </button>
        <div class="menu" id="saveMenu">
          <button data-cal="google">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
            Google Calendar
          </button>
          <button data-cal="outlook">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
            Outlook Calendar
          </button>
          <button data-cal="ics">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
            Download .ics
          </button>
          <button data-cal="share">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" x2="15.42" y1="13.51" y2="17.49"/><line x1="15.41" x2="8.59" y1="6.51" y2="10.49"/></svg>
            Share link
          </button>
        </div>
      </div>
      <button class="btn" id="editBtn2">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        Edit
      </button>
    </div>
  </main>
</div>

<!-- Modal -->
<div class="modal-backdrop" id="backdrop"></div>
<div class="modal" id="modal">
  <button class="close-btn" id="closeBtn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
  </button>
  <h2>Your Event</h2>
  <p class="desc">Customize every detail of your countdown experience.</p>

  <div class="field">
    <label for="fName">Event Name</label>
    <input type="text" id="fName" placeholder="e.g. Aurora Festival 2026" />
  </div>

  <div class="field-row">
    <div class="field">
      <label for="fDate">Date & Time</label>
      <input type="datetime-local" id="fDate" />
    </div>
  </div>

  <div class="field">
    <label>Quick Presets</label>
    <div class="preset-row">
      <button class="preset" data-preset="newyear">New Year</button>
      <button class="preset" data-preset="week">+1 Week</button>
      <button class="preset" data-preset="month">+1 Month</button>
      <button class="preset" data-preset="tomorrow">Tomorrow</button>
    </div>
  </div>

  <div class="field">
    <label for="fLocation">Location</label>
    <input type="text" id="fLocation" placeholder="e.g. Reykjavik, Iceland" />
  </div>

  <div class="field">
    <label>Background Image</label>
    <label class="upload" id="uploadZone">
      <input type="file" id="fImage" accept="image/*" />
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
      <div class="upload-text"><strong>Click to upload</strong> or drag & drop</div>
      <div class="upload-preview" id="uploadPreview"></div>
    </label>
  </div>

  <div class="modal-actions">
    <button class="btn btn-secondary" id="cancelBtn">Cancel</button>
    <button class="btn btn-primary" id="applyBtn">Apply</button>
  </div>
</div>

<div class="toast" id="toast">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
  <span id="toastMsg">Done</span>
</div>

<script>
(() => {
  const DEFAULT_BG = 'https://images.unsplash.com/photo-1534796636912-3b95b3ab5986?auto=format&fit=crop&w=2400&q=80';

  const state = {
    name: 'Aurora Festival 2026',
    date: nextFutureDate(),
    location: 'Reykjavik, Iceland',
    bg: DEFAULT_BG,
  };

  // persistence
  try {
    const saved = JSON.parse(localStorage.getItem('countdown-state') || 'null');
    if (saved && saved.date) {
      Object.assign(state, saved);
      state.date = new Date(saved.date);
    }
  } catch (e) {}

  function nextFutureDate() {
    const d = new Date();
    d.setDate(d.getDate() + 37);
    d.setHours(20, 0, 0, 0);
    return d;
  }

  function save() {
    localStorage.setItem('countdown-state', JSON.stringify({
      ...state,
      date: state.date.toISOString(),
    }));
  }

  // DOM refs
  const $ = id => document.getElementById(id);
  const eventName = $('eventName');
  const dateText = $('dateText');
  const locationText = $('locationText');
  const statusText = $('statusText');
  const stage = $('stage');
  const bgImage = $('bgImage');
  const modal = $('modal');
  const backdrop = $('backdrop');
  const uploadZone = $('uploadZone');
  const uploadPreview = $('uploadPreview');
  const toast = $('toast');
  const toastMsg = $('toastMsg');
  const countdown = $('countdown');

  // Digit reels setup
  const reelMap = {};
  function initReels() {
    document.querySelectorAll('.digits').forEach(d => {
      const unit = d.dataset.unit;
      reelMap[unit] = [];
      d.innerHTML = '';
      // we'll initialize slots dynamically on first update
    });
  }

  function setDigits(unit, numStr) {
    const container = document.querySelector(`.digits[data-unit="${unit}"]`);
    const slots = reelMap[unit];
    // Ensure enough slots
    while (slots.length < numStr.length) {
      const slot = document.createElement('div');
      slot.className = 'digit-slot';
      const roll = document.createElement('div');
      roll.className = 'digit-roll';
      for (let i = 0; i <= 9; i++) {
        const s = document.createElement('span');
        s.textContent = i;
        roll.appendChild(s);
      }
      slot.appendChild(roll);
      container.appendChild(slot);
      slots.push({ slot, roll, current: 0 });
    }
    // Remove extra slots
    while (slots.length > numStr.length) {
      const { slot } = slots.pop();
      slot.remove();
    }
    // Update each digit
    for (let i = 0; i < numStr.length; i++) {
      const digit = parseInt(numStr[i], 10);
      const s = slots[i];
      if (s.current !== digit) {
        s.current = digit;
        s.roll.style.transform = `translateY(-${digit}em)`;
      }
    }
  }

  function formatUnit(n, width = 2) {
    return String(Math.max(0, n)).padStart(width, '0');
  }

  function updateCountdown() {
    const now = new Date();
    const target = state.date;
    let diff = target - now;
    const fired = diff <= 0;
    if (fired) diff = 0;

    const totalSec = Math.floor(diff / 1000);
    const days = Math.floor(totalSec / 86400);
    const hours = Math.floor((totalSec % 86400) / 3600);
    const mins = Math.floor((totalSec % 3600) / 60);
    const secs = totalSec % 60;

    setDigits('d', formatUnit(days, Math.max(2, String(days).length)));
    setDigits('h', formatUnit(hours));
    setDigits('m', formatUnit(mins));
    setDigits('s', formatUnit(secs));

    if (fired) {
      if (!document.body.classList.contains('fired')) {
        document.body.classList.add('fired');
        statusText.textContent = 'The moment is here';
        fireConfetti();
      }
    } else {
      document.body.classList.remove('fired');
      statusText.textContent = days > 0 ? `${days} day${days===1?'':'s'} to go` : (hours > 0 ? `Starts in hours` : 'Starting soon');
    }
  }

  function renderMeta() {
    eventName.textContent = state.name || 'Your Event';
    const d = state.date;
    const opts = { weekday: 'short', month: 'long', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' };
    try {
      dateText.textContent = d.toLocaleString(undefined, opts);
    } catch {
      dateText.textContent = d.toString();
    }
    locationText.textContent = state.location || 'Somewhere amazing';
    document.getElementById('locationDisplay').style.display = state.location ? '' : 'none';
    bgImage.style.backgroundImage = `url(${state.bg})`;
  }

  // Parallax
  let pmx = 0, pmy = 0, cmx = 0, cmy = 0;
  let gmx = 0, gmy = 0;
  window.addEventListener('mousemove', (e) => {
    const cx = (e.clientX / window.innerWidth) - 0.5;
    const cy = (e.clientY / window.innerHeight) - 0.5;
    pmx = cx; pmy = cy;
  });
  // Device orientation parallax (mobile)
  window.addEventListener('deviceorientation', (e) => {
    if (e.gamma === null) return;
    pmx = Math.max(-1, Math.min(1, (e.gamma || 0) / 40));
    pmy = Math.max(-1, Math.min(1, (e.beta || 0) / 40));
  });

  function animateParallax() {
    cmx += (pmx - cmx) * 0.05;
    cmy += (pmy - cmy) * 0.05;
    gmx += (pmx - gmx) * 0.02;
    gmy += (pmy - gmy) * 0.02;
    bgImage.style.transform = `scale(1.12) translate(${cmx * -30}px, ${cmy * -30}px)`;
    const stars = document.getElementById('bgStars');
    stars.style.transform = `translate(${gmx * -60}px, ${gmy * -60}px)`;
    stage.style.transform = `translate(${cmx * 10}px, ${cmy * 8}px)`;
    requestAnimationFrame(animateParallax);
  }

  // Stars canvas
  function initStars() {
    const canvas = document.querySelector('#bgStars canvas');
    const ctx = canvas.getContext('2d');
    let stars = [];
    function resize() {
      canvas.width = window.innerWidth * window.devicePixelRatio;
      canvas.height = window.innerHeight * window.devicePixelRatio;
      canvas.style.width = window.innerWidth + 'px';
      canvas.style.height = window.innerHeight + 'px';
      ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
      generate();
    }
    function generate() {
      stars = [];
      const count = Math.min(140, Math.floor(window.innerWidth * window.innerHeight / 12000));
      for (let i = 0; i < count; i++) {
        stars.push({
          x: Math.random() * window.innerWidth,
          y: Math.random() * window.innerHeight,
          r: Math.random() * 1.4 + 0.3,
          a: Math.random(),
          ds: (Math.random() - 0.5) * 0.005,
          dr: (Math.random() - 0.5) * 0.01,
        });
      }
    }
    resize();
    window.addEventListener('resize', resize);

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      stars.forEach(s => {
        s.a += s.dr;
        if (s.a < 0.1) s.a = 0.1;
        if (s.a > 1) s.a = 1;
        s.y += s.ds;
        if (s.y < 0) s.y = window.innerHeight;
        if (s.y > window.innerHeight) s.y = 0;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 255, 255, ${s.a * 0.9})`;
        ctx.fill();
        if (s.r > 1.2) {
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r * 4, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(200, 200, 255, ${s.a * 0.08})`;
          ctx.fill();
        }
      });
      requestAnimationFrame(draw);
    }
    draw();
  }

  // Confetti
  function fireConfetti() {
    const colors = ['#ff4d7d', '#7b5cff', '#22d3ee', '#ffd54d', '#ffffff'];
    for (let i = 0; i < 120; i++) {
      const c = document.createElement('div');
      c.className = 'confetti';
      const s = 6 + Math.random() * 8;
      c.style.width = s + 'px';
      c.style.height = s * 0.4 + 'px';
      c.style.background = colors[Math.floor(Math.random() * colors.length)];
      c.style.left = (40 + Math.random() * 20) + '%';
      c.style.top = '40%';
      c.style.borderRadius = '2px';
      c.style.opacity = '0.9';
      document.body.appendChild(c);

      const angle = Math.random() * Math.PI * 2;
      const velocity = 200 + Math.random() * 400;
      const vx = Math.cos(angle) * velocity;
      const vy = Math.sin(angle) * velocity - 200;
      const rot = Math.random() * 720;
      const dur = 1500 + Math.random() * 1500;

      c.animate([
        { transform: 'translate(0, 0) rotate(0deg)', opacity: 1 },
        { transform: `translate(${vx}px, ${vy + 600}px) rotate(${rot}deg)`, opacity: 0 }
      ], { duration: dur, easing: 'cubic-bezier(.2,.8,.4,1)' });
      setTimeout(() => c.remove(), dur);
    }
  }

  // Modal
  function openModal() {
    $('fName').value = state.name;
    $('fLocation').value = state.location;
    // Format for input
    const pad = n => String(n).padStart(2, '0');
    const d = state.date;
    $('fDate').value = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
    uploadPreview.style.backgroundImage = `url(${state.bg})`;
    uploadPreview.classList.add('show');
    modal.classList.add('open');
    backdrop.classList.add('open');
    document.body.classList.add('modal-open');
    setTimeout(() => $('fName').focus(), 200);
  }
  function closeModal() {
    modal.classList.remove('open');
    backdrop.classList.remove('open');
    document.body.classList.remove('modal-open');
  }

  $('editBtn').addEventListener('click', openModal);
  $('editBtn2').addEventListener('click', openModal);
  $('closeBtn').addEventListener('click', closeModal);
  $('cancelBtn').addEventListener('click', closeModal);
  backdrop.addEventListener('click', closeModal);

  $('applyBtn').addEventListener('click', () => {
    const name = $('fName').value.trim() || 'Your Event';
    const dateVal = $('fDate').value;
    const loc = $('fLocation').value.trim();
    if (dateVal) {
      const d = new Date(dateVal);
      if (!isNaN(d)) state.date = d;
    }
    state.name = name;
    state.location = loc;
    renderMeta();
    save();
    closeModal();
    showToast('Event updated');
  });

  // Presets
  document.querySelectorAll('.preset').forEach(btn => {
    btn.addEventListener('click', () => {
      const now = new Date();
      let d;
      switch (btn.dataset.preset) {
        case 'newyear':
          d = new Date(now.getFullYear() + (now.getMonth() === 11 && now.getDate() > 25 ? 1 : 1), 0, 1, 0, 0);
          break;
        case 'week':
          d = new Date(now.getTime() + 7 * 86400000);
          break;
        case 'month':
          d = new Date(now); d.setMonth(d.getMonth() + 1);
          break;
        case 'tomorrow':
          d = new Date(now.getTime() + 86400000);
          d.setHours(9, 0, 0, 0);
          break;
      }
      if (d) {
        const pad = n => String(n).padStart(2, '0');
        $('fDate').value = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
      }
    });
  });

  // Upload
  const fImage = $('fImage');
  function handleFile(file) {
    if (!file || !file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      state.bg = e.target.result;
      uploadPreview.style.backgroundImage = `url(${state.bg})`;
      uploadPreview.classList.add('show');
      bgImage.style.backgroundImage = `url(${state.bg})`;
      save();
    };
    reader.readAsDataURL(file);
  }
  fImage.addEventListener('change', e => handleFile(e.target.files[0]));
  ['dragover', 'dragenter'].forEach(ev => uploadZone.addEventListener(ev, e => {
    e.preventDefault(); uploadZone.classList.add('drag');
  }));
  ['dragleave', 'drop'].forEach(ev => uploadZone.addEventListener(ev, e => {
    e.preventDefault(); uploadZone.classList.remove('drag');
  }));
  uploadZone.addEventListener('drop', e => {
    e.preventDefault();
    handleFile(e.dataTransfer.files[0]);
  });

  // Save menu / calendar
  const saveMenu = $('saveMenu');
  $('saveBtn').addEventListener('click', (e) => {
    e.stopPropagation();
    saveMenu.classList.toggle('open');
  });
  document.addEventListener('click', (e) => {
    if (!saveMenu.contains(e.target) && e.target !== $('saveBtn')) {
      saveMenu.classList.remove('open');
    }
  });

  function formatICSDate(d) {
    const pad = n => String(n).padStart(2, '0');
    return `${d.getUTCFullYear()}${pad(d.getUTCMonth()+1)}${pad(d.getUTCDate())}T${pad(d.getUTCHours())}${pad(d.getUTCMinutes())}${pad(d.getUTCSeconds())}Z`;
  }

  function calendarAction(type) {
    const start = state.date;
    const end = new Date(start.getTime() + 2 * 3600 * 1000);
    const title = encodeURIComponent(state.name);
    const loc = encodeURIComponent(state.location || '');
    const details = encodeURIComponent('Created with ECHO Countdown');

    if (type === 'google') {
      const url = `https://www.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${formatICSDate(start)}/${formatICSDate(end)}&location=${loc}&details=${details}`;
      window.open(url, '_blank');
    } else if (type === 'outlook') {
      const url = `https://outlook.live.com/calendar/0/deeplink/compose?path=/calendar/action/compose&rru=addevent&subject=${title}&startdt=${start.toISOString()}&enddt=${end.toISOString()}&location=${loc}&body=${details}`;
      window.open(url, '_blank');
    } else if (type === 'ics') {
      const ics = [
        'BEGIN:VCALENDAR',
        'VERSION:2.0',
        'PRODID:-//ECHO Countdown//EN',
        'BEGIN:VEVENT',
        `UID:${Date.now()}@echo-countdown`,
        `DTSTAMP:${formatICSDate(new Date())}`,
        `DTSTART:${formatICSDate(start)}`,
        `DTEND:${formatICSDate(end)}`,
        `SUMMARY:${state.name}`,
        `LOCATION:${state.location || ''}`,
        'END:VEVENT',
        'END:VCALENDAR'
      ].join('\r\n');
      const blob = new Blob([ics], { type: 'text/calendar' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = `${state.name.replace(/[^a-z0-9]/gi, '_')}.ics`;
      link.click();
      showToast('Calendar file downloaded');
    } else if (type === 'share') {
      const text = `${state.name} — ${dateText.textContent}`;
      if (navigator.share) {
        navigator.share({ title: state.name, text }).catch(()=>{});
      } else {
        navigator.clipboard.writeText(text).then(() => showToast('Copied to clipboard'));
      }
    }
    saveMenu.classList.remove('open');
  }

  saveMenu.querySelectorAll('button').forEach(b => {
    b.addEventListener('click', () => calendarAction(b.dataset.cal));
  });

  // Fullscreen
  $('fullscreenBtn').addEventListener('click', () => {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
  });

  // Toast
  let toastTimer;
  function showToast(msg) {
    toastMsg.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2400);
  }

  // Keyboard
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
    if (e.key === 'e' && !modal.classList.contains('open') && document.activeElement.tagName !== 'INPUT') openModal();
  });

  // Init
  initReels();
  renderMeta();
  updateCountdown();
  setInterval(updateCountdown, 1000);
  animateParallax();
  initStars();

})();
</script>
</body>
</html>
