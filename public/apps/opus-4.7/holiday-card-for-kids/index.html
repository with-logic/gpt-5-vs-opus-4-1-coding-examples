<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>✨ A Magical Holiday Card ✨</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-tap-highlight-color:transparent; }
  html, body { width:100%; height:100%; overflow:hidden; font-family:'Comic Sans MS','Chalkboard SE','Marker Felt',sans-serif; }
  body {
    background: radial-gradient(ellipse at top, #1b2a5e 0%, #0b1436 55%, #050a20 100%);
    position:relative;
  }

  /* Stars */
  .sky-stars { position:fixed; inset:0; pointer-events:none; z-index:0; }
  .star {
    position:absolute;
    width:2px; height:2px;
    background:#fff;
    border-radius:50%;
    box-shadow:0 0 6px #fff, 0 0 12px #fff;
    animation: twinkle 3s infinite ease-in-out;
  }
  @keyframes twinkle {
    0%,100% { opacity:.3; transform:scale(1); }
    50% { opacity:1; transform:scale(1.4); }
  }

  /* Aurora */
  .aurora {
    position:fixed; top:0; left:0; right:0; height:60vh;
    background: linear-gradient(180deg,
      rgba(120,255,200,0.15) 0%,
      rgba(120,180,255,0.1) 40%,
      rgba(200,120,255,0.08) 70%,
      transparent 100%);
    filter: blur(30px);
    animation: aurora 10s ease-in-out infinite alternate;
    pointer-events:none;
    z-index:0;
  }
  @keyframes aurora {
    0% { transform:translateX(-5%) scaleY(1); opacity:.7; }
    100% { transform:translateX(5%) scaleY(1.1); opacity:1; }
  }

  /* Moon */
  .moon {
    position:fixed;
    top:40px; right:60px;
    width:90px; height:90px;
    background: radial-gradient(circle at 35% 35%, #fff9e0 0%, #f5e6a1 60%, #d4b85d 100%);
    border-radius:50%;
    box-shadow: 0 0 40px #fff1a8, 0 0 80px rgba(255,241,168,0.5), inset -10px -10px 20px rgba(0,0,0,0.2);
    z-index:1;
    cursor:pointer;
    transition: transform 0.3s;
  }
  .moon:hover { transform: scale(1.1) rotate(15deg); }
  .moon::before, .moon::after {
    content:''; position:absolute; background:rgba(0,0,0,0.08); border-radius:50%;
  }
  .moon::before { width:18px; height:18px; top:25px; left:30px; }
  .moon::after { width:12px; height:12px; top:55px; left:20px; box-shadow: 20px -10px 0 rgba(0,0,0,0.08); }

  /* Snow ground */
  .ground {
    position:fixed;
    bottom:0; left:0; right:0;
    height:35vh;
    background:
      radial-gradient(ellipse at 20% 0%, rgba(255,255,255,0.9), rgba(255,255,255,0.7) 40%, rgba(220,230,255,0.8) 100%),
      linear-gradient(180deg, #e8f0ff 0%, #c8d8f0 100%);
    border-radius: 50% 50% 0 0 / 20% 20% 0 0;
    box-shadow: inset 0 10px 30px rgba(180,200,230,0.6);
    z-index:1;
  }
  .ground::before {
    content:'';
    position:absolute;
    top:-10px; left:0; right:0; height:20px;
    background: radial-gradient(ellipse 30px 10px at 10% 50%, #fff 30%, transparent 60%),
                radial-gradient(ellipse 30px 10px at 30% 30%, #fff 30%, transparent 60%),
                radial-gradient(ellipse 30px 10px at 50% 60%, #fff 30%, transparent 60%),
                radial-gradient(ellipse 30px 10px at 70% 40%, #fff 30%, transparent 60%),
                radial-gradient(ellipse 30px 10px at 90% 50%, #fff 30%, transparent 60%);
  }

  /* Mountains */
  .mountains {
    position:fixed;
    bottom:32vh; left:-5%; right:-5%;
    height:30vh;
    z-index:1;
    pointer-events:none;
  }
  .mountain {
    position:absolute;
    bottom:0;
    width:0; height:0;
    border-left:150px solid transparent;
    border-right:150px solid transparent;
    border-bottom:180px solid #2c3a6b;
    filter: drop-shadow(0 -5px 10px rgba(0,0,0,0.3));
  }
  .mountain::after {
    content:'';
    position:absolute;
    bottom:130px; left:-60px;
    width:0; height:0;
    border-left:60px solid transparent;
    border-right:60px solid transparent;
    border-bottom:50px solid #fff;
  }
  .m1 { left:5%; }
  .m2 { left:25%; border-left-width:200px; border-right-width:200px; border-bottom:240px solid #3a4a80; }
  .m2::after { bottom:175px; left:-80px; border-left-width:80px; border-right-width:80px; border-bottom-width:65px; }
  .m3 { left:55%; }
  .m4 { left:75%; border-left-width:180px; border-right-width:180px; border-bottom:210px solid #374778; }
  .m4::after { bottom:155px; left:-70px; border-left-width:70px; border-right-width:70px; border-bottom-width:55px; }

  /* Snowflakes falling */
  .snow-layer { position:fixed; inset:0; pointer-events:none; z-index:3; overflow:hidden; }
  .snowflake {
    position:absolute;
    color:#fff;
    text-shadow: 0 0 6px #fff, 0 0 12px #b0d0ff;
    user-select:none;
    animation: fall linear infinite;
    opacity: 0.9;
  }
  @keyframes fall {
    0% { transform: translateY(-10vh) translateX(0) rotate(0deg); }
    100% { transform: translateY(110vh) translateX(60px) rotate(360deg); }
  }

  /* Scene / card */
  .scene {
    position:relative;
    width:100%; height:100%;
    z-index:2;
  }

  /* Tree */
  .tree {
    position:absolute;
    bottom:20vh;
    left: 15%;
    width:200px; height:320px;
    cursor:pointer;
    transition: transform 0.3s;
    z-index:5;
  }
  .tree:hover { transform: scale(1.05); }
  .tree:active { transform: scale(0.98); }
  .tree-layer {
    position:absolute;
    width:0; height:0;
    left:50%; transform: translateX(-50%);
    filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.3));
  }
  .tree-l1 { top:0; border-left:50px solid transparent; border-right:50px solid transparent; border-bottom:80px solid #2d6a3e; }
  .tree-l2 { top:50px; border-left:70px solid transparent; border-right:70px solid transparent; border-bottom:90px solid #2d7a44; }
  .tree-l3 { top:110px; border-left:90px solid transparent; border-right:90px solid transparent; border-bottom:100px solid #2d8a4c; }
  .tree-l4 { top:180px; border-left:110px solid transparent; border-right:110px solid transparent; border-bottom:110px solid #2d9a54; }
  .tree-trunk {
    position:absolute;
    bottom:-20px; left:50%;
    transform:translateX(-50%);
    width:40px; height:50px;
    background: linear-gradient(180deg, #6b3a1f 0%, #4a2812 100%);
    border-radius: 6px;
  }
  .tree-star {
    position:absolute;
    top:-20px; left:50%;
    transform: translateX(-50%);
    font-size:36px;
    animation: star-glow 2s ease-in-out infinite;
    z-index:2;
  }
  @keyframes star-glow {
    0%,100% { filter: drop-shadow(0 0 10px #ffd700) drop-shadow(0 0 20px #fff3a0); transform: translateX(-50%) scale(1); }
    50% { filter: drop-shadow(0 0 20px #ffd700) drop-shadow(0 0 35px #fff3a0); transform: translateX(-50%) scale(1.2); }
  }
  .tree-light {
    position:absolute;
    width:8px; height:8px;
    border-radius:50%;
    animation: bulb 1.5s infinite;
  }
  @keyframes bulb {
    0%,100% { opacity:1; box-shadow:0 0 8px currentColor, 0 0 16px currentColor; }
    50% { opacity:0.4; box-shadow:0 0 3px currentColor; }
  }

  /* Snowman */
  .snowman {
    position:absolute;
    bottom:22vh;
    right: 15%;
    width:110px;
    cursor:pointer;
    transition: transform 0.3s;
    z-index:5;
  }
  .snowman:hover { transform: rotate(-5deg) scale(1.05); }
  .snow-body {
    position:relative;
    border-radius:50%;
    background: radial-gradient(circle at 30% 30%, #fff, #e6eeff);
    box-shadow: inset -10px -5px 15px rgba(180,200,230,0.4), 2px 4px 8px rgba(0,0,0,0.2);
    margin: 0 auto;
  }
  .snow-head { width:70px; height:70px; }
  .snow-mid  { width:90px; height:90px; margin-top:-10px; }
  .snow-bot  { width:110px; height:110px; margin-top:-15px; }
  .eye {
    position:absolute;
    width:8px; height:8px;
    background:#222; border-radius:50%;
    top:20px;
  }
  .eye.l { left:20px; }
  .eye.r { right:20px; }
  .nose {
    position:absolute;
    top:30px; left:50%;
    transform: translateX(-50%);
    width:0; height:0;
    border-top:4px solid transparent;
    border-bottom:4px solid transparent;
    border-left:22px solid #ff8a3d;
    filter: drop-shadow(0 2px 2px rgba(0,0,0,0.2));
  }
  .mouth {
    position:absolute;
    bottom:15px; left:50%;
    transform: translateX(-50%);
    width:30px; height:8px;
    border-bottom: 3px solid #222;
    border-radius:50%;
  }
  .hat {
    position:absolute;
    top:-30px; left:50%;
    transform: translateX(-50%);
    width:80px;
  }
  .hat-brim { width:80px; height:8px; background:#222; border-radius:4px; }
  .hat-top { width:50px; height:30px; background:#222; margin:0 auto; margin-top:-2px; border-radius:4px 4px 2px 2px; position:relative; }
  .hat-top::after {
    content:''; position:absolute;
    bottom:0; left:0; right:0; height:6px;
    background:#c62828;
  }
  .scarf {
    position:absolute;
    top:58px; left:50%;
    transform:translateX(-50%);
    width:90px; height:14px;
    background: repeating-linear-gradient(45deg, #e53935 0 8px, #fff 8px 14px);
    border-radius:4px;
    z-index:3;
  }
  .scarf::after {
    content:'';
    position:absolute;
    left:60px; top:10px;
    width:14px; height:35px;
    background: repeating-linear-gradient(45deg, #e53935 0 8px, #fff 8px 14px);
    border-radius:3px;
  }
  .arm {
    position:absolute;
    top:90px;
    width:40px; height:4px;
    background:#5a3a1f;
    border-radius:3px;
  }
  .arm.l { left:-30px; transform: rotate(-30deg); transform-origin:right center; animation: wave-arm 3s ease-in-out infinite; }
  .arm.r { right:-30px; transform: rotate(30deg); }
  @keyframes wave-arm {
    0%,100% { transform: rotate(-30deg); }
    50% { transform: rotate(-60deg); }
  }

  /* Gifts */
  .gift {
    position:absolute;
    width:60px; height:50px;
    cursor:grab;
    transition: transform 0.2s;
    z-index:6;
  }
  .gift:active { cursor:grabbing; }
  .gift:hover { transform: translateY(-4px) rotate(3deg); }
  .gift-body {
    width:100%; height:100%;
    border-radius:6px;
    position:relative;
    box-shadow: 2px 4px 8px rgba(0,0,0,0.3);
  }
  .gift-ribbon-h {
    position:absolute;
    top:0; bottom:0;
    left:50%; width:10px;
    transform:translateX(-50%);
    background:rgba(255,255,255,0.9);
  }
  .gift-ribbon-v {
    position:absolute;
    left:0; right:0;
    top:50%; height:10px;
    transform:translateY(-50%);
    background:rgba(255,255,255,0.9);
  }
  .gift-bow {
    position:absolute;
    top:-10px; left:50%;
    transform:translateX(-50%);
    width:25px; height:15px;
    background:rgba(255,255,255,0.9);
    border-radius:50% 50% 0 0 / 70% 70% 0 0;
  }
  .gift-bow::before, .gift-bow::after {
    content:'';
    position:absolute;
    width:12px; height:10px;
    background:rgba(255,255,255,0.9);
    border-radius:50%;
    top:5px;
  }
  .gift-bow::before { left:-4px; }
  .gift-bow::after { right:-4px; }

  /* Santa */
  .santa-sleigh {
    position:fixed;
    top:15%; left:-300px;
    width:250px; height:120px;
    z-index:4;
    pointer-events:none;
    animation: fly 30s linear infinite;
  }
  @keyframes fly {
    0% { left:-300px; top:15%; }
    50% { left:50%; top:10%; }
    100% { left:110%; top:20%; }
  }
  .santa-sleigh .emoji { font-size:70px; filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.5)); }

  /* Toolbar */
  .toolbar {
    position:fixed;
    top:20px; left:50%;
    transform: translateX(-50%);
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 30px;
    padding: 12px 20px;
    display:flex;
    gap:8px;
    z-index:100;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    flex-wrap:wrap;
    max-width:95vw;
    justify-content:center;
  }
  .tool {
    width:50px; height:50px;
    border-radius:50%;
    background: linear-gradient(135deg,#ffffff,#e0e8ff);
    border:2px solid rgba(255,255,255,0.6);
    font-size:28px;
    cursor:grab;
    display:flex; align-items:center; justify-content:center;
    transition: transform 0.2s;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
  }
  .tool:hover { transform: scale(1.15) rotate(10deg); }
  .tool:active { cursor:grabbing; transform: scale(0.95); }

  /* Title */
  .title {
    position:fixed;
    top:85px; left:50%;
    transform: translateX(-50%);
    color: #fff;
    font-size: 3.5rem;
    font-weight: bold;
    text-align:center;
    z-index:50;
    text-shadow:
      0 0 10px #ffd700,
      0 0 20px #ff6b6b,
      2px 2px 0 #c62828,
      4px 4px 0 #8b0000,
      6px 6px 12px rgba(0,0,0,0.5);
    animation: title-bounce 3s ease-in-out infinite;
    pointer-events:none;
  }
  @keyframes title-bounce {
    0%,100% { transform: translateX(-50%) translateY(0) rotate(-2deg); }
    50% { transform: translateX(-50%) translateY(-10px) rotate(2deg); }
  }

  /* Dropped items */
  .dropped {
    position:absolute;
    font-size:50px;
    cursor:grab;
    z-index:7;
    transition: transform 0.2s;
    filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.4));
    animation: drop-in 0.5s ease-out;
  }
  @keyframes drop-in {
    0% { transform: scale(0) rotate(360deg); opacity:0; }
    70% { transform: scale(1.3); opacity:1; }
    100% { transform: scale(1) rotate(0); }
  }
  .dropped:hover { transform: scale(1.2) rotate(10deg); }
  .dropped:active { cursor:grabbing; }

  /* Sparkle effect */
  .sparkle {
    position:absolute;
    pointer-events:none;
    font-size:20px;
    animation: sparkle-pop 1s ease-out forwards;
    z-index:100;
  }
  @keyframes sparkle-pop {
    0% { transform: scale(0) rotate(0); opacity:1; }
    100% { transform: scale(2) rotate(360deg); opacity:0; }
  }

  /* Hint */
  .hint {
    position:fixed;
    bottom:15px; left:50%;
    transform:translateX(-50%);
    color:#fff;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(8px);
    padding:10px 20px;
    border-radius:20px;
    border:1px solid rgba(255,255,255,0.3);
    z-index:100;
    font-size:0.9rem;
    text-align:center;
    animation: hint-pulse 3s ease-in-out infinite;
    max-width:90vw;
  }
  @keyframes hint-pulse {
    0%,100% { opacity:0.8; }
    50% { opacity:1; }
  }

  /* Control buttons */
  .controls {
    position:fixed;
    top:20px; right:20px;
    display:flex;
    flex-direction:column;
    gap:10px;
    z-index:101;
  }
  .ctrl-btn {
    width:45px; height:45px;
    border-radius:50%;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    border: 2px solid rgba(255,255,255,0.4);
    color:white;
    font-size:22px;
    cursor:pointer;
    transition: transform 0.2s;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .ctrl-btn:hover { transform: scale(1.1); background: rgba(255,255,255,0.35); }

  /* House */
  .house {
    position:absolute;
    bottom:22vh;
    left:45%;
    transform: translateX(-50%);
    width:130px;
    height:140px;
    z-index:4;
    cursor:pointer;
    transition: transform 0.3s;
  }
  .house:hover { transform: translateX(-50%) scale(1.05); }
  .house-body {
    position:absolute;
    bottom:0; left:0; right:0;
    height:90px;
    background: linear-gradient(180deg, #b85c3d 0%, #8b3f26 100%);
    box-shadow: inset -10px 0 20px rgba(0,0,0,0.2), 2px 4px 10px rgba(0,0,0,0.3);
    border-radius: 4px;
  }
  .roof {
    position:absolute;
    top:0; left:-10px; right:-10px;
    height:60px;
  }
  .roof::before {
    content:'';
    position:absolute;
    top:10px; left:0; right:0; bottom:0;
    background: #5e2e1a;
    clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
  }
  .roof::after {
    content:'';
    position:absolute;
    top:0; left:0; right:0; height:15px;
    background: white;
    clip-path: polygon(50% 0%, 15% 50%, 85% 50%);
  }
  .door {
    position:absolute;
    bottom:0; left:50%;
    transform: translateX(-50%);
    width:30px; height:50px;
    background: linear-gradient(180deg, #3a1f10, #2a1408);
    border-radius: 15px 15px 0 0;
    border: 2px solid #1a0d06;
  }
  .door::after {
    content:''; position:absolute;
    right:4px; top:25px; width:4px; height:4px;
    border-radius:50%;
    background:#ffd700;
    box-shadow: 0 0 4px #ffd700;
  }
  .window {
    position:absolute;
    width:22px; height:22px;
    background: radial-gradient(circle, #fff5a0, #ffcc44);
    border:2px solid #5e2e1a;
    box-shadow: 0 0 15px rgba(255, 220, 100, 0.8);
    bottom:40px;
  }
  .window.w1 { left:15px; }
  .window.w2 { right:15px; }
  .window::before, .window::after {
    content:'';
    position:absolute;
    background: #5e2e1a;
  }
  .window::before { top:50%; left:0; right:0; height:2px; transform:translateY(-50%); }
  .window::after { left:50%; top:0; bottom:0; width:2px; transform:translateX(-50%); }
  .chimney {
    position:absolute;
    top:8px; right:20px;
    width:16px; height:30px;
    background: #7a3d24;
    border-top:3px solid #5e2e1a;
    z-index:-1;
  }
  .smoke {
    position:absolute;
    top:-10px;
    width:8px; height:8px;
    background: rgba(255,255,255,0.7);
    border-radius:50%;
    animation: smoke-rise 3s linear infinite;
  }
  @keyframes smoke-rise {
    0% { transform: translate(0,0) scale(0.5); opacity:0.7; }
    100% { transform: translate(-20px,-60px) scale(2); opacity:0; }
  }

  /* Fireworks */
  .firework {
    position:absolute;
    pointer-events:none;
    width:6px; height:6px;
    border-radius:50%;
    animation: firework-burst 1s ease-out forwards;
    z-index:50;
  }
  @keyframes firework-burst {
    0% { transform: translate(0,0) scale(1); opacity:1; }
    100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity:0; }
  }

  /* Card greeting */
  .greeting {
    position:absolute;
    left:50%;
    top:55%;
    transform: translate(-50%,-50%);
    color: #fff;
    font-size: 1.4rem;
    text-align:center;
    background: rgba(198, 40, 40, 0.85);
    padding: 20px 40px;
    border-radius: 20px;
    border: 3px dashed #ffd700;
    box-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
    z-index: 30;
    display:none;
    animation: greeting-pop 0.5s ease-out;
    max-width:90vw;
  }
  @keyframes greeting-pop {
    0% { transform: translate(-50%,-50%) scale(0) rotate(-10deg); }
    70% { transform: translate(-50%,-50%) scale(1.1) rotate(2deg); }
    100% { transform: translate(-50%,-50%) scale(1) rotate(0); }
  }

  @media (max-width:600px) {
    .title { font-size:2rem; top:90px; }
    .tool { width:40px; height:40px; font-size:22px; }
    .tree { left:5%; width:150px; height:250px; transform:scale(0.8); }
    .snowman { right:5%; transform:scale(0.8); }
  }
</style>
</head>
<body>

<div class="sky-stars" id="stars"></div>
<div class="aurora"></div>
<div class="moon" id="moon" title="Click me!"></div>

<div class="mountains">
  <div class="mountain m1"></div>
  <div class="mountain m2"></div>
  <div class="mountain m3"></div>
  <div class="mountain m4"></div>
</div>

<div class="ground"></div>

<div class="santa-sleigh" id="santa"><span class="emoji">🎅🦌✨</span></div>

<div class="snow-layer" id="snow"></div>

<div class="scene" id="scene">
  <!-- Christmas Tree -->
  <div class="tree" id="tree" data-sound="bell">
    <div class="tree-star">⭐</div>
    <div class="tree-layer tree-l1"></div>
    <div class="tree-layer tree-l2"></div>
    <div class="tree-layer tree-l3"></div>
    <div class="tree-layer tree-l4"></div>
    <div class="tree-trunk"></div>
  </div>

  <!-- Snowman -->
  <div class="snowman" id="snowman" data-sound="giggle">
    <div class="hat">
      <div class="hat-top"></div>
      <div class="hat-brim"></div>
    </div>
    <div class="snow-body snow-head">
      <div class="eye l"></div>
      <div class="eye r"></div>
      <div class="nose"></div>
      <div class="mouth"></div>
    </div>
    <div class="snow-body snow-mid">
      <div class="scarf"></div>

<div class="title">🎄 Happy Holidays! 🎄</div>

<!-- Toolbar with draggable items -->
<div class="toolbar">
  <div class="tool" draggable="true" data-emoji="🎁" title="Gift">🎁</div>
  <div class="tool" draggable="true" data-emoji="🍬" title="Candy">🍬</div>
  <div class="tool" draggable="true" data-emoji="🍭" title="Lollipop">🍭</div>
  <div class="tool" draggable="true" data-emoji="🦌" title="Reindeer">🦌</div>
  <div class="tool" draggable="true" data-emoji="🐧" title="Penguin">🐧</div>
  <div class="tool" draggable="true" data-emoji="🐻" title="Bear">🐻</div>
  <div class="tool" draggable="true" data-emoji="⛄" title="Snowman">⛄</div>
  <div class="tool" draggable="true" data-emoji="🎅" title="Santa">🎅</div>
  <div class="tool" draggable="true" data-emoji="🔔" title="Bell">🔔</div>
  <div class="tool" draggable="true" data-emoji="🎀" title="Ribbon">🎀</div>

  <div class="tool" draggable="true" data-emoji="🥛" title="Milk">🥛</div>
  <div class="tool" draggable="true" data-emoji="🍫" title="Chocolate">🍫</div>

  <button class="ctrl-btn" id="musicBtn" title="Toggle music">🎵</button>

</div>

<div class="hint">✨ Drag items from the top to decorate! Click the tree, snowman & house for surprises! ✨</div>

<div class="greeting" id="greeting"></div>

<script>
/* ============================================================
   SOUND ENGINE (Web Audio API — no external assets)
============================================================ */
let audioCtx;
let musicOn = false;
let musicInterval = null;
let musicGain;
function ensureAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, duration = 0.3, type = 'sine', gain = 0.2, when = 0) {
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  g.gain.setValueAtTime(0, audioCtx.currentTime + when);
  g.gain.linearRampToValueAtTime(gain, audioCtx.currentTime + when + 0.02);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + when + duration);
  osc.connect(g);
  g.connect(audioCtx.destination);
  osc.start(audioCtx.currentTime + when);
  osc.stop(audioCtx.currentTime + when + duration);
}

function playBell() {
  const notes = [880, 1100, 1320];
  notes.forEach((f, i) => playTone(f, 0.5, 'triangle', 0.15, i * 0.08));
}
function playChime() {
  const notes = [523, 659, 784, 1046];
  notes.forEach((f, i) => playTone(f, 0.4, 'sine', 0.12, i * 0.1));
}
function playGiggle() {
  ensureAudio();
  for (let i = 0; i < 5; i++) {
    playTone(600 + Math.random()*400, 0.1, 'square', 0.08, i*0.08);
  }
}
function playPop() {
  playTone(400, 0.1, 'triangle', 0.2);
  playTone(800, 0.08, 'sine', 0.15, 0.05);
}
function playWhoosh() {
  ensureAudio();
  const noise = audioCtx.createBufferSource();
  const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.3, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = (Math.random()*2-1) * (1 - i/data.length);
  noise.buffer = buffer;
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = 1000;
  const g = audioCtx.createGain();
  g.gain.value = 0.15;
  noise.connect(filter); filter.connect(g); g.connect(audioCtx.destination);
  noise.start();
}
function playFirework() {
  playWhoosh();
  setTimeout(()=>{
    for(let i=0;i<3;i++) playTone(200+Math.random()*600, 0.3, 'square', 0.1, i*0.05);
  }, 200);
}

/* Jingle Bells melody */
const jingleBells = [
  [659, 0.3],[659,0.3],[659,0.6],
  [659,0.3],[659,0.3],[659,0.6],
  [659,0.3],[784,0.3],[523,0.3],[587,0.3],
  [659,1.2],
  [698,0.3],[698,0.3],[698,0.3],[698,0.3],
  [698,0.3],[659,0.3],[659,0.3],[659,0.3],
  [659,0.3],[587,0.3],[587,0.3],[659,0.3],
  [587,0.6],[784,0.6]
];
let melodyIdx = 0;
function playMelody() {
  if (!musicOn) return;
  const [f, d] = jingleBells[melodyIdx];
  playTone(f, d * 0.9, 'triangle', 0.15);
  playTone(f/2, d * 0.9, 'sine', 0.05);
  melodyIdx = (melodyIdx + 1) % jingleBells.length;
  musicInterval = setTimeout(playMelody, d * 450);
}

/* ============================================================
   SNOW AND STARS
============================================================ */
function createStars() {
  const sky = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 60 + '%';
    s.style.animationDelay = Math.random() * 3 + 's';
    s.style.width = s.style.height = (Math.random()*2+1) + 'px';
    sky.appendChild(s);
  }
}

function createSnow() {
  const layer = document.getElementById('snow');
  const flakes = ['❄','❅','❆','*','·'];
  for (let i = 0; i < 60; i++) {
    const f = document.createElement('div');
    f.className = 'snowflake';
    f.textContent = flakes[Math.floor(Math.random()*flakes.length)];
    f.style.left = Math.random() * 100 + '%';
    f.style.fontSize = (Math.random() * 18 + 8) + 'px';
    f.style.animationDuration = (Math.random() * 8 + 6) + 's';
    f.style.animationDelay = (-Math.random() * 10) + 's';
    f.style.opacity = Math.random() * 0.7 + 0.3;
    layer.appendChild(f);
  }
}

/* ============================================================
   TREE LIGHTS
============================================================ */
function addTreeLights() {
  const tree = document.getElementById('tree');
  const colors = ['#ff3b3b', '#ffd700', '#4fc3f7', '#a5ff4b', '#ff6bcc', '#fff'];
  const positions = [
    [40, 100], [65, 85], [55, 130], [80, 150], [100, 125],
    [120, 150], [140, 130], [75, 175], [110, 190], [140, 175],
    [50, 200], [95, 215], [130, 200], [60, 240], [100, 260],
    [140, 245], [170, 260], [30, 240], [45, 270],
    [125, 275], [155, 235]
  ];
  positions.forEach((p, i) => {
    const light = document.createElement('div');
    light.className = 'tree-light';
    light.style.left = p[0] + 'px';
    light.style.top = p[1] + 'px';
    const c = colors[i % colors.length];
    light.style.background = c;
    light.style.color = c;
    light.style.animationDelay = (Math.random() * 1.5) + 's';
    tree.appendChild(light);
  });
}

/* ============================================================
   DRAG & DROP
============================================================ */
let draggedEmoji = null;
let touchGhost = null;

document.querySelectorAll('.tool').forEach(tool => {
  tool.addEventListener('dragstart', e => {
    draggedEmoji = tool.dataset.emoji;
    e.dataTransfer.setData('text/plain', tool.dataset.emoji);
    e.dataTransfer.effectAllowed = 'copy';
  });

  // Touch support
  tool.addEventListener('touchstart', e => {
    e.preventDefault();
    draggedEmoji = tool.dataset.emoji;
    touchGhost = document.createElement('div');
    touchGhost.textContent = draggedEmoji;
    touchGhost.style.cssText = 'position:fixed; font-size:50px; pointer-events:none; z-index:1000; opacity:0.8;';
    document.body.appendChild(touchGhost);
    const t = e.touches[0];
    touchGhost.style.left = (t.clientX-25)+'px';
    touchGhost.style.top = (t.clientY-25)+'px';
  }, {passive:false});
});

document.addEventListener('touchmove', e => {
  if (touchGhost) {
    const t = e.touches[0];
    touchGhost.style.left = (t.clientX-25)+'px';
    touchGhost.style.top = (t.clientY-25)+'px';
  }
}, {passive:false});

document.addEventListener('touchend', e => {
  if (touchGhost && draggedEmoji) {
    const t = e.changedTouches[0];
    dropItem(draggedEmoji, t.clientX, t.clientY);
    touchGhost.remove();
    touchGhost = null;
    draggedEmoji = null;
  }
});

document.addEventListener('dragover', e => {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'copy';
});

document.addEventListener('drop', e => {
  e.preventDefault();
  const emoji = e.dataTransfer.getData('text/plain');
  if (emoji) dropItem(emoji, e.clientX, e.clientY);
});

function dropItem(emoji, x, y) {
  ensureAudio();
  playPop();
  const d = document.createElement('div');
  d.className = 'dropped';
  d.textContent = emoji;
  d.style.left = (x - 25) + 'px';
  d.style.top = (y - 25) + 'px';

  // make draggable within scene
  makeMovable(d);
  d.addEventListener('dblclick', () => {
    sparkleAt(d.offsetLeft+25, d.offsetTop+25);
    playPop();
    d.style.animation = 'drop-in 0.3s reverse';
    setTimeout(()=>d.remove(), 280);
  });
  d.addEventListener('click', () => {
    sparkleAt(d.offsetLeft+25, d.offsetTop+25);
    playTone(500 + Math.random()*400, 0.2, 'triangle', 0.12);
  });

  document.body.appendChild(d);
  sparkleAt(x, y);
}

/* Make dropped items movable */
function makeMovable(el) {
  let ox=0, oy=0, dragging=false;
  const start = (cx, cy) => {
    dragging = true;
    ox = cx - el.offsetLeft;
    oy = cy - el.offsetTop;
    el.style.zIndex = 50;
  };
  const move = (cx, cy) => {
    if (!dragging) return;
    el.style.left = (cx - ox) + 'px';
    el.style.top = (cy - oy) + 'px';
  };
  const end = () => { dragging = false; };

  el.addEventListener('mousedown', e => { start(e.clientX, e.clientY); e.preventDefault(); });
  document.addEventListener('mousemove', e => move(e.clientX, e.clientY));
  document.addEventListener('mouseup', end);

  el.addEventListener('touchstart', e => { const t=e.touches[0]; start(t.clientX,t.clientY); e.preventDefault(); }, {passive:false});
  document.addEventListener('touchmove', e => { if(dragging){ const t=e.touches[0]; move(t.clientX,t.clientY); e.preventDefault(); }}, {passive:false});
  document.addEventListener('touchend', end);
}

/* ============================================================
   SPARKLES
============================================================ */
function sparkleAt(x, y) {
  const emojis = ['✨','⭐','💫','❇️'];
  for (let i = 0; i < 8; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    const angle = (Math.PI * 2 / 8) * i;
    const dist = 30 + Math.random() * 40;
    s.style.left = x + 'px';
    s.style.top = y + 'px';
    s.style.setProperty('--dx', Math.cos(angle)*dist+'px');
    s.style.setProperty('--dy', Math.sin(angle)*dist+'px');
    s.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
    document.body.appendChild(s);
    setTimeout(()=>s.remove(), 1000);
  }
}

/* ============================================================
   GREETING MESSAGES
============================================================ */
const greetings = [
  "🎅 Ho Ho Ho! Merry Christmas! 🎄",
  "❄️ Let it snow, let it snow! ❄️",
  "🌟 May your wishes come true! 🌟",
  "🎁 Hope your stocking is full! 🎁",
  "🔔 Jingle all the way! 🔔",
  "⛄ Stay warm and cozy! ⛄",
  "🍪 Don't forget Santa's cookies! 🍪",
  "🎶 Tis the season to be jolly! 🎶"
];
function showGreeting() {
  const g = document.getElementById('greeting');
  g.textContent = greetings[Math.floor(Math.random()*greetings.length)];
  g.style.display = 'block';
  g.style.animation = 'greeting-pop 0.5s ease-out';
  clearTimeout(showGreeting.t);
  showGreeting.t = setTimeout(()=>{ g.style.display = 'none'; }, 2500);
}

/* ============================================================
   INTERACTIONS
============================================================ */
document.getElementById('tree').addEventListener('click', e => {
  playBell();
  sparkleAt(e.clientX, e.clientY);
  showGreeting();
});

document.getElementById('snowman').addEventListener('click', e => {
  playGiggle();
  sparkleAt(e.clientX, e.clientY);
  showGreeting();
  const sm = document.getElementById('snowman');
  sm.style.transition = 'transform 0.3s';
  sm.style.transform = 'rotate(-10deg) scale(1.1)';
  setTimeout(()=>{ sm.style.transform = ''; }, 500);
});

document.getElementById('house').addEventListener('click', e => {
  playChime();
  sparkleAt(e.clientX, e.clientY);
  showGreeting();
});

document.getElementById('moon').addEventListener('click', e => {
  playTone(440, 0.5, 'sine', 0.2);
  sparkleAt(e.clientX, e.clientY);
  // Shoot a star
  const star = document.createElement('div');
  star.textContent = '⭐';
  star.style.cssText = `position:fixed; font-size:30px; left:${e.clientX}px; top:${e.clientY}px; z-index:99; pointer-events:none; transition: all 2s ease-in;`;
  document.body.appendChild(star);
  setTimeout(()=>{
    star.style.left = Math.random()*window.innerWidth+'px';
    star.style.top = (window.innerHeight*0.6)+'px';
    star.style.transform = 'rotate(720deg) scale(0.3)';
    star.style.opacity = '0';
  }, 50);
  setTimeout(()=>star.remove(), 2100);
});

/* Music toggle */
document.getElementById('musicBtn').addEventListener('click', function() {
  ensureAudio();
  musicOn = !musicOn;
  this.textContent = musicOn ? '🔇' : '🎵';
  this.style.background = musicOn ? 'rgba(255,215,0,0.4)' : 'rgba(255,255,255,0.2)';
  if (musicOn) {
    melodyIdx = 0;
    playMelody();
  } else {
    clearTimeout(musicInterval);
  }
});

/* Clear */
document.getElementById('clearBtn').addEventListener('click', () => {
  document.querySelectorAll('.dropped').forEach(d => {
    d.style.animation = 'drop-in 0.3s reverse';
    setTimeout(()=>d.remove(), 280);
  });
  playWhoosh();
});

/* Fireworks */
document.getElementById('fireworkBtn').addEventListener('click', () => {
  launchFireworks();
});

function launchFireworks() {
  playFirework();
  const colors = ['#ff3b3b','#ffd700','#4fc3f7','#a5ff4b','#ff6bcc','#fff','#ff8800'];
  for (let burst = 0; burst < 3; burst++) {
    setTimeout(() => {
      const cx = Math.random()*window.innerWidth*0.8 + window.innerWidth*0.1;
      const cy = Math.random()*window.innerHeight*0.4 + window.innerHeight*0.1;
      const color = colors[Math.floor(Math.random()*colors.length)];
      for (let i = 0; i < 30; i++) {
        const p = document.createElement('div');
        p.className = 'firework';
        const angle = (Math.PI*2/30)*i;
        const vel = 80 + Math.random()*60;
        p.style.background = color;
        p.style.boxShadow = `0 0 8px ${color}, 0 0 16px ${color}`;
        p.style.left = cx + 'px';
        p.style.top = cy + 'px';
        p.style.setProperty('--dx', Math.cos(angle)*vel + 'px');
        p.style.setProperty('--dy', Math.sin(angle)*vel + 'px');
        document.body.appendChild(p);
        setTimeout(()=>p.remove(), 1000);
      }
      playTone(200+Math.random()*400, 0.5, 'sawtooth', 0.08);
    }, burst * 400);
  }
}

/* ============================================================
   DEFAULT DROPPED ITEMS
============================================================ */
function placeDefaults() {
  const W = window.innerWidth;
  const H = window.innerHeight;
  const groundY = H - H * 0.18;
  const defaults = [
    {e: '🎁', x: W*0.22, y: groundY},
    {e: '🎁', x: W*0.27, y: groundY+20},
    {e: '🧦', x: W*0.4, y: groundY-20},
    {e: '🦌', x: W*0.35, y: groundY+10},
    {e: '🐧', x: W*0.65, y: groundY+10},
    {e: '🍬', x: W*0.5, y: groundY+30},
    {e: '🔔', x: W*0.7, y: groundY-10},
    {e: '🍪', x: W*0.55, y: groundY-10},
    {e: '⭐', x: W*0.8, y: groundY+20}
  ];
  defaults.forEach(d => {
    const el = document.createElement('div');
    el.className = 'dropped';
    el.textContent = d.e;
    el.style.left = d.x + 'px';
    el.style.top = d.y + 'px';
    el.style.animationDelay = Math.random()*1 + 's';
    makeMovable(el);
    el.addEventListener('dblclick', () => {
      sparkleAt(el.offsetLeft+25, el.offsetTop+25);
      el.remove();
    });
    el.addEventListener('click', () => {
      sparkleAt(el.offsetLeft+25, el.offsetTop+25);
      playTone(500 + Math.random()*400, 0.2, 'triangle', 0.12);
    });
    document.body.appendChild(el);
  });
}

/* ============================================================
   STARTUP
============================================================ */
window.addEventListener('load', () => {
  createStars();
  createSnow();
  addTreeLights();
  placeDefaults();

  // Welcome sparkle
  setTimeout(() => {
    sparkleAt(window.innerWidth/2, 100);
  }, 500);

  // Periodic santa bell on flyby
  setInterval(() => {
    if (musicOn) playTone(1200, 0.15, 'triangle', 0.08);
  }, 8000);
});

/* First-interaction audio unlock */
document.addEventListener('click', ensureAudio, {once:true});
document.addEventListener('touchstart', ensureAudio, {once:true});
</script>
