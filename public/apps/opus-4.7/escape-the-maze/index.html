<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Escape the Maze</title>
<style>
  :root {
    --bg-0: #0a0a18;
    --bg-1: #11112a;
    --bg-2: #1a1a3e;
    --wall: #2d2d6b;
    --wall-glow: #4a4ab8;
    --path: #0e0e24;
    --accent: #00f0ff;
    --accent-2: #ff00e5;
    --gold: #ffd84a;
    --success: #00ff9d;
    --text: #e8e8ff;
    --muted: #8888b0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
    background: radial-gradient(ellipse at top, #1a1a3e 0%, #0a0a18 60%, #05050f 100%);
    color: var(--text);
    overflow: hidden;
    user-select: none;
  }

  #app {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
    gap: 18px;
  }

  .title-bar {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 4px;
  }

  .title {
    font-size: 34px;
    font-weight: 800;
    letter-spacing: 2px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 0 30px rgba(0, 240, 255, 0.25);
  }

  .title-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 4px 9px;
    border-radius: 999px;
    background: rgba(0, 240, 255, 0.1);
    border: 1px solid rgba(0, 240, 255, 0.35);
    color: var(--accent);
    letter-spacing: 1.5px;
  }

  .hud {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
  }

  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 108px;
    padding: 10px 18px;
    border-radius: 14px;
    background: linear-gradient(145deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(6px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.35);
  }

  .stat-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .stat-value {
    font-size: 22px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    margin-top: 2px;
    color: var(--text);
  }

  .stat.timer .stat-value { color: var(--accent); }
  .stat.steps .stat-value { color: var(--accent-2); }
  .stat.best .stat-value { color: var(--gold); }
  .stat.par .stat-value { color: var(--success); }

  .board-wrap {
    position: relative;
    padding: 16px;
    border-radius: 20px;
    background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow:
      0 20px 60px rgba(0,0,0,0.5),
      inset 0 0 40px rgba(0, 240, 255, 0.05);
  }

  canvas {
    display: block;
    border-radius: 10px;
    background: var(--path);
    image-rendering: pixelated;
  }

  .controls {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
  }

  button {
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    padding: 11px 22px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.15);
    background: linear-gradient(145deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
    color: var(--text);
    cursor: pointer;
    transition: transform 0.12s ease, box-shadow 0.2s ease, background 0.2s ease;
  }

  button:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(0, 240, 255, 0.2);
    background: linear-gradient(145deg, rgba(0, 240, 255, 0.15), rgba(0, 240, 255, 0.05));
    border-color: rgba(0, 240, 255, 0.4);
  }

  button:active { transform: translateY(0); }

  button.primary {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #0a0a18;
    border: none;
  }

  button.primary:hover {
    box-shadow: 0 6px 24px rgba(255, 0, 229, 0.35);
    filter: brightness(1.1);
  }

  select {
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    padding: 11px 14px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.04);
    color: var(--text);
    cursor: pointer;
    outline: none;
  }

  .hint {
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    letter-spacing: 0.5px;
  }

  .hint kbd {
    display: inline-block;
    padding: 2px 7px;
    margin: 0 2px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 5px;
    font-size: 11px;
    font-family: monospace;
    color: var(--text);
  }

  /* Win overlay */
  .overlay {
    position: absolute;
    inset: 16px;
    display: none;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
    background: rgba(10, 10, 24, 0.85);
    backdrop-filter: blur(10px);
    z-index: 5;
    animation: fadeIn 0.4s ease;
  }

  .overlay.show { display: flex; }

  .win-card {
    text-align: center;
    padding: 28px 36px;
    border-radius: 18px;
    background: linear-gradient(145deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
    border: 1px solid rgba(0, 240, 255, 0.3);
    box-shadow: 0 10px 40px rgba(0, 240, 255, 0.2);
    animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .win-title {
    font-size: 32px;
    font-weight: 800;
    letter-spacing: 2px;
    background: linear-gradient(135deg, var(--gold), var(--accent));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 14px;
  }

  .win-stats {
    display: flex;
    gap: 18px;
    justify-content: center;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }

  .win-stat {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .win-stat-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .win-stat-value {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    margin-top: 2px;
  }

  .bonus {
    display: inline-block;
    padding: 8px 16px;
    border-radius: 999px;
    background: linear-gradient(135deg, var(--gold), #ff9500);
    color: #0a0a18;
    font-weight: 800;
    font-size: 13px;
    letter-spacing: 1px;
    margin-bottom: 18px;
    box-shadow: 0 4px 20px rgba(255, 216, 74, 0.4);
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes popIn {
    0% { opacity: 0; transform: scale(0.8); }
    100% { opacity: 1; transform: scale(1); }
  }

  /* Mobile touch pad */
  .touchpad {
    display: none;
    grid-template-columns: repeat(3, 56px);
    grid-template-rows: repeat(3, 56px);
    gap: 6px;
  }

  .touchpad button {
    padding: 0;
    font-size: 22px;
  }

  .touchpad .tp-up { grid-column: 2; grid-row: 1; }
  .touchpad .tp-left { grid-column: 1; grid-row: 2; }
  .touchpad .tp-right { grid-column: 3; grid-row: 2; }
  .touchpad .tp-down { grid-column: 2; grid-row: 3; }

  @media (max-width: 760px) {
    .title { font-size: 26px; }
    .touchpad { display: grid; }
    .stat { min-width: 84px; padding: 8px 12px; }
    .stat-value { font-size: 18px; }
  }
</style>
</head>
<body>
<div id="app">
  <div class="title-bar">
    <div class="title">ESCAPE THE MAZE</div>
    <div class="title-badge">NEON</div>
  </div>

  <div class="hud">
    <div class="stat timer">
      <div class="stat-label">Time</div>
      <div class="stat-value" id="timerVal">0.0s</div>
    </div>
    <div class="stat steps">
      <div class="stat-label">Steps</div>
      <div class="stat-value" id="stepsVal">0</div>
    </div>
    <div class="stat par">
      <div class="stat-label">Par</div>
      <div class="stat-value" id="parVal">–</div>
    </div>
    <div class="stat best">
      <div class="stat-label">Best</div>
      <div class="stat-value" id="bestVal">–</div>
    </div>
  </div>

  <div class="board-wrap">
    <canvas id="maze" width="600" height="600"></canvas>
    <div class="overlay" id="overlay">
      <div class="win-card">
        <div class="win-title" id="winTitle">ESCAPED!</div>
        <div class="win-stats">
          <div class="win-stat">
            <div class="win-stat-label">Time</div>
            <div class="win-stat-value" id="winTime">0.0s</div>
          </div>
          <div class="win-stat">
            <div class="win-stat-label">Steps</div>
            <div class="win-stat-value" id="winSteps">0</div>
          </div>
          <div class="win-stat">
            <div class="win-stat-label">Par</div>
            <div class="win-stat-value" id="winPar">0</div>
          </div>
        </div>
        <div class="bonus" id="winBonus" style="display:none;">⭐ OPTIMAL PATH BONUS!</div>
        <button class="primary" id="overlayReplay">PLAY AGAIN</button>
      </div>
    </div>
  </div>

  <div class="controls">
    <select id="difficulty">
      <option value="11">Easy · 11×11</option>
      <option value="17" selected>Medium · 17×17</option>
      <option value="23">Hard · 23×23</option>
      <option value="31">Expert · 31×31</option>
    </select>
    <button id="replay">🔁 New Maze</button>
    <button id="hintBtn">💡 Hint</button>
  </div>

  <div class="touchpad" id="touchpad" aria-label="Movement controls">
    <button class="tp-up" data-dir="up">▲</button>
    <button class="tp-left" data-dir="left">◀</button>
    <button class="tp-right" data-dir="right">▶</button>
    <button class="tp-down" data-dir="down">▼</button>
  </div>

  <div class="hint">
    Move with <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> or <kbd>WASD</kbd> · Match the par for a bonus!
  </div>
</div>

<script>
(() => {
  // ------- Config ---------
  const canvas = document.getElementById('maze');
  const ctx = canvas.getContext('2d');

  const timerEl = document.getElementById('timerVal');
  const stepsEl = document.getElementById('stepsVal');
  const parEl = document.getElementById('parVal');
  const bestEl = document.getElementById('bestVal');
  const difficultyEl = document.getElementById('difficulty');
  const replayBtn = document.getElementById('replay');
  const hintBtn = document.getElementById('hintBtn');
  const overlay = document.getElementById('overlay');
  const overlayReplay = document.getElementById('overlayReplay');
  const winTime = document.getElementById('winTime');
  const winSteps = document.getElementById('winSteps');
  const winPar = document.getElementById('winPar');
  const winBonus = document.getElementById('winBonus');
  const winTitle = document.getElementById('winTitle');
  const touchpad = document.getElementById('touchpad');

  let cols, rows, cellSize, wallThickness;
  let grid;         // 2D array of cells with wall info
  let player;       // {x, y, rx, ry} (rx,ry = render position)
  let goal;         // {x, y}
  let path = [];    // Path trail from player movements
  let shortestPath = []; // Optimal path solution
  let shortestLen = 0;
  let moves = 0;
  let startTime = 0;
  let elapsed = 0;
  let timerInterval = null;
  let isRunning = false;
  let hasWon = false;
  let showHint = false;
  let hintTimeout = null;
  let visited = new Set(); // cells the player has visited

  // Particle effects
  let particles = [];

  // ------- Maze generation (recursive backtracker) ---------
  function makeCell() {
    return {
      walls: { top: true, right: true, bottom: true, left: true },
      visited: false,
    };
  }

  function generateMaze(w, h) {
    const g = Array.from({ length: h }, () =>
      Array.from({ length: w }, () => makeCell())
    );
    const stack = [];
    const start = { x: 0, y: 0 };
    g[start.y][start.x].visited = true;
    stack.push(start);

    while (stack.length) {
      const current = stack[stack.length - 1];
      const neighbors = [];
      const dirs = [
        { dx: 0, dy: -1, wall: 'top', opp: 'bottom' },
        { dx: 1, dy: 0, wall: 'right', opp: 'left' },
        { dx: 0, dy: 1, wall: 'bottom', opp: 'top' },
        { dx: -1, dy: 0, wall: 'left', opp: 'right' },
      ];
      for (const d of dirs) {
        const nx = current.x + d.dx;
        const ny = current.y + d.dy;
        if (nx >= 0 && nx < w && ny >= 0 && ny < h && !g[ny][nx].visited) {
          neighbors.push({ x: nx, y: ny, d });
        }
      }
      if (neighbors.length) {
        const pick = neighbors[Math.floor(Math.random() * neighbors.length)];
        g[current.y][current.x].walls[pick.d.wall] = false;
        g[pick.y][pick.x].walls[pick.d.opp] = false;
        g[pick.y][pick.x].visited = true;
        stack.push({ x: pick.x, y: pick.y });
      } else {
        stack.pop();
      }
    }

    // Optional: Knock down a few extra walls for multiple paths (sparingly)
    const extraRemovals = Math.floor((w * h) * 0.02);
    for (let i = 0; i < extraRemovals; i++) {
      const x = Math.floor(Math.random() * w);
      const y = Math.floor(Math.random() * h);
      const sides = ['top', 'right', 'bottom', 'left'];
      const side = sides[Math.floor(Math.random() * sides.length)];
      if (side === 'top' && y > 0) {
        g[y][x].walls.top = false;
        g[y - 1][x].walls.bottom = false;
      } else if (side === 'right' && x < w - 1) {
        g[y][x].walls.right = false;
        g[y][x + 1].walls.left = false;
      } else if (side === 'bottom' && y < h - 1) {
        g[y][x].walls.bottom = false;
        g[y + 1][x].walls.top = false;
      } else if (side === 'left' && x > 0) {
        g[y][x].walls.left = false;
        g[y][x - 1].walls.right = false;
      }
    }

    return g;
  }

  // BFS to find shortest path length from start to goal
  function bfsShortestPath(g, sx, sy, gx, gy) {
    const w = g[0].length;
    const h = g.length;
    const dist = Array.from({ length: h }, () => new Array(w).fill(-1));
    const parent = Array.from({ length: h }, () => new Array(w).fill(null));
    const queue = [{ x: sx, y: sy }];
    dist[sy][sx] = 0;
    while (queue.length) {
      const { x, y } = queue.shift();
      if (x === gx && y === gy) break;
      const cell = g[y][x];
      const candidates = [
        { nx: x, ny: y - 1, wall: 'top' },
        { nx: x + 1, ny: y, wall: 'right' },
        { nx: x, ny: y + 1, wall: 'bottom' },
        { nx: x - 1, ny: y, wall: 'left' },
      ];
      for (const c of candidates) {
        if (c.nx < 0 || c.nx >= w || c.ny < 0 || c.ny >= h) continue;
        if (cell.walls[c.wall]) continue;
        if (dist[c.ny][c.nx] !== -1) continue;
        dist[c.ny][c.nx] = dist[y][x] + 1;
        parent[c.ny][c.nx] = { x, y };
        queue.push({ x: c.nx, y: c.ny });
      }
    }
    // Reconstruct
    const path = [];
    let cur = { x: gx, y: gy };
    if (dist[gy][gx] === -1) return { length: -1, path: [] };
    while (cur) {
      path.unshift(cur);
      cur = parent[cur.y][cur.x];
    }
    return { length: dist[gy][gx], path };
  }

  // ------- Game flow ---------
  function setupGame() {
    const size = parseInt(difficultyEl.value, 10);
    cols = size; rows = size;

    // Choose canvas size that fits nicely
    const maxSide = Math.min(window.innerWidth - 60, 620);
    const target = Math.max(320, Math.min(620, maxSide));
    cellSize = Math.floor(target / cols);
    if (cellSize < 14) cellSize = 14;
    wallThickness = Math.max(2, Math.floor(cellSize * 0.12));
    const dim = cellSize * cols;
    const dpr = window.devicePixelRatio || 1;
    canvas.width = dim * dpr;
    canvas.height = dim * dpr;
    canvas.style.width = dim + 'px';
    canvas.style.height = dim + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    grid = generateMaze(cols, rows);
    player = { x: 0, y: 0, rx: 0, ry: 0 };
    goal = { x: cols - 1, y: rows - 1 };

    const sp = bfsShortestPath(grid, player.x, player.y, goal.x, goal.y);
    shortestLen = sp.length;
    shortestPath = sp.path;

    path = [{ x: 0, y: 0 }];
    visited = new Set(['0,0']);
    moves = 0;
    elapsed = 0;
    hasWon = false;
    isRunning = false;
    showHint = false;
    if (hintTimeout) clearTimeout(hintTimeout);
    particles = [];

    parEl.textContent = shortestLen;
    stepsEl.textContent = moves;
    timerEl.textContent = '0.0s';

    const bestKey = `etm_best_${cols}`;
    const best = localStorage.getItem(bestKey);
    bestEl.textContent = best ? `${parseFloat(best).toFixed(1)}s` : '–';

    overlay.classList.remove('show');

    if (timerInterval) clearInterval(timerInterval);
  }

  function startTimer() {
    if (isRunning) return;
    isRunning = true;
    startTime = performance.now();
    timerInterval = setInterval(() => {
      elapsed = (performance.now() - startTime) / 1000;
      timerEl.textContent = elapsed.toFixed(1) + 's';
    }, 50);
  }

  function stopTimer() {
    if (timerInterval) {
      clearInterval(timerInterval);
      timerInterval = null;
    }
    isRunning = false;
  }

  function tryMove(dx, dy) {
    if (hasWon) return;
    const cx = player.x, cy = player.y;
    const cell = grid[cy][cx];
    let wall;
    if (dx === 0 && dy === -1) wall = 'top';
    else if (dx === 1 && dy === 0) wall = 'right';
    else if (dx === 0 && dy === 1) wall = 'bottom';
    else if (dx === -1 && dy === 0) wall = 'left';
    else return;
    if (cell.walls[wall]) {
      // blocked - little visual shake particle
      spawnShake(cx, cy, dx, dy);
      return;
    }
    if (!isRunning) startTimer();
    player.x += dx;
    player.y += dy;
    moves++;
    stepsEl.textContent = moves;

    const key = `${player.x},${player.y}`;
    if (!visited.has(key)) visited.add(key);

    // Trail: if we backtracked (stepped onto previous) pop the end
    if (path.length >= 2 &&
        path[path.length - 2].x === player.x &&
        path[path.length - 2].y === player.y) {
      path.pop();
    } else {
      path.push({ x: player.x, y: player.y });
    }

    // Little dust particle
    spawnDust(player.x, player.y);

    if (player.x === goal.x && player.y === goal.y) {
      win();
    }
  }

  function spawnDust(cx, cy) {
    const px = cx * cellSize + cellSize / 2;
    const py = cy * cellSize + cellSize / 2;
    for (let i = 0; i < 6; i++) {
      particles.push({
        x: px, y: py,
        vx: (Math.random() - 0.5) * 1.5,
        vy: (Math.random() - 0.5) * 1.5,
        life: 1,
        r: 1 + Math.random() * 2,
        color: `rgba(0, 240, 255, ${0.6 + Math.random() * 0.4})`
      });
    }
  }

  function spawnShake(cx, cy, dx, dy) {
    const px = cx * cellSize + cellSize / 2 + dx * cellSize * 0.25;
    const py = cy * cellSize + cellSize / 2 + dy * cellSize * 0.25;
    for (let i = 0; i < 4; i++) {
      particles.push({
        x: px, y: py,
        vx: (Math.random() - 0.5) * 2,
        vy: (Math.random() - 0.5) * 2,
        life: 0.7,
        r: 1 + Math.random() * 1.5,
        color: `rgba(255, 80, 100, ${0.5 + Math.random() * 0.5})`
      });
    }
  }

  function spawnCelebration() {
    const px = goal.x * cellSize + cellSize / 2;
    const py = goal.y * cellSize + cellSize / 2;
    for (let i = 0; i < 120; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 1 + Math.random() * 4;
      particles.push({
        x: px, y: py,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 1.5,
        r: 1.5 + Math.random() * 2.5,
        color: `hsl(${Math.random() * 60 + 40}, 100%, ${50 + Math.random() * 30}%)`
      });
    }
  }

  function win() {
    hasWon = true;
    stopTimer();
    spawnCelebration();

    const bestKey = `etm_best_${cols}`;
    const prev = localStorage.getItem(bestKey);
    const prevNum = prev ? parseFloat(prev) : Infinity;
    const improved = elapsed < prevNum;
    if (improved) localStorage.setItem(bestKey, elapsed.toFixed(2));
    bestEl.textContent = (improved ? elapsed : prevNum).toFixed(1) + 's';

    winTime.textContent = elapsed.toFixed(1) + 's';
    winSteps.textContent = moves;
    winPar.textContent = shortestLen;
    if (moves === shortestLen) {
      winBonus.style.display = 'inline-block';
      winTitle.textContent = 'PERFECT ESCAPE!';
    } else {
      winBonus.style.display = 'none';
      winTitle.textContent = improved ? 'NEW BEST!' : 'ESCAPED!';
    }
    setTimeout(() => overlay.classList.add('show'), 600);
  }

  // ------- Rendering ---------
  function drawGridBG() {
    // soft grid background within cells
    ctx.fillStyle = 'rgba(255,255,255,0.015)';
    for (let y = 0; y < rows; y++) {
      for (let x = 0; x < cols; x++) {
        if ((x + y) % 2 === 0) {
          ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
        }
      }
    }
  }

  function drawVisited() {
    ctx.save();
    for (const key of visited) {
      const [x, y] = key.split(',').map(Number);
      ctx.fillStyle = 'rgba(0, 240, 255, 0.05)';
      ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
    }
    ctx.restore();
  }

  function drawHintPath() {
    if (!showHint || !shortestPath.length) return;
    ctx.save();
    ctx.strokeStyle = 'rgba(255, 216, 74, 0.55)';
    ctx.lineWidth = Math.max(2, cellSize * 0.18);
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.setLineDash([cellSize * 0.3, cellSize * 0.25]);
    ctx.lineDashOffset = -(performance.now() / 60);
    ctx.beginPath();
    for (let i = 0; i < shortestPath.length; i++) {
      const p = shortestPath[i];
      const px = p.x * cellSize + cellSize / 2;
      const py = p.y * cellSize + cellSize / 2;
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.stroke();
    ctx.restore();
  }

  function drawPlayerTrail() {
    if (path.length < 2) return;
    ctx.save();
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.lineWidth = Math.max(2, cellSize * 0.22);
    const grad = ctx.createLinearGradient(0, 0, cellSize * cols, cellSize * rows);
    grad.addColorStop(0, 'rgba(0, 240, 255, 0.15)');
    grad.addColorStop(1, 'rgba(255, 0, 229, 0.4)');
    ctx.strokeStyle = grad;
    ctx.beginPath();
    for (let i = 0; i < path.length; i++) {
      const p = path[i];
      const px = p.x * cellSize + cellSize / 2;
      const py = p.y * cellSize + cellSize / 2;
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.stroke();
    ctx.restore();
  }

  function drawWalls() {
    ctx.save();
    ctx.strokeStyle = 'rgba(74, 74, 184, 0.95)';
    ctx.lineWidth = wallThickness;
    ctx.lineCap = 'square';

    // Draw glowing back-pass
    ctx.shadowBlur = 8;
    ctx.shadowColor = 'rgba(74, 74, 184, 0.55)';

    for (let y = 0; y < rows; y++) {
      for (let x = 0; x < cols; x++) {
        const cell = grid[y][x];
        const x0 = x * cellSize;
        const y0 = y * cellSize;
        if (cell.walls.top) {
          ctx.beginPath();
          ctx.moveTo(x0, y0);
          ctx.lineTo(x0 + cellSize, y0);
          ctx.stroke();
        }
        if (cell.walls.left) {
          ctx.beginPath();
          ctx.moveTo(x0, y0);
          ctx.lineTo(x0, y0 + cellSize);
          ctx.stroke();
        }
        if (x === cols - 1 && cell.walls.right) {
          ctx.beginPath();
          ctx.moveTo(x0 + cellSize, y0);
          ctx.lineTo(x0 + cellSize, y0 + cellSize);
          ctx.stroke();
        }
        if (y === rows - 1 && cell.walls.bottom) {
          ctx.beginPath();
          ctx.moveTo(x0, y0 + cellSize);
          ctx.lineTo(x0 + cellSize, y0 + cellSize);
          ctx.stroke();
        }
      }
    }
    ctx.restore();
  }

  function drawStartGoal() {
    // Start marker
    const sx = 0 + cellSize / 2;
    const sy = 0 + cellSize / 2;
    const r = cellSize * 0.3;
    ctx.save();
    const startGrad = ctx.createRadialGradient(sx, sy, 0, sx, sy, r);
    startGrad.addColorStop(0, 'rgba(0, 240, 255, 0.7)');
    startGrad.addColorStop(1, 'rgba(0, 240, 255, 0)');
    ctx.fillStyle = startGrad;
    ctx.fillRect(0, 0, cellSize, cellSize);
    ctx.restore();

    // Goal marker - pulsating portal
    const gx = goal.x * cellSize + cellSize / 2;
    const gy = goal.y * cellSize + cellSize / 2;
    const t = performance.now() / 400;
    const pulse = (Math.sin(t) + 1) / 2;

    ctx.save();
    // outer glow
    for (let i = 3; i >= 0; i--) {
      const rad = cellSize * 0.18 + i * (cellSize * 0.08) + pulse * cellSize * 0.08;
      const alpha = 0.15 + (3 - i) * 0.1;
      ctx.fillStyle = `rgba(255, 216, 74, ${alpha * 0.5})`;
      ctx.beginPath();
      ctx.arc(gx, gy, rad, 0, Math.PI * 2);
      ctx.fill();
    }
    // core
    const coreGrad = ctx.createRadialGradient(gx, gy, 0, gx, gy, cellSize * 0.28);
    coreGrad.addColorStop(0, '#fff');
    coreGrad.addColorStop(0.4, '#ffd84a');
    coreGrad.addColorStop(1, 'rgba(255, 149, 0, 0)');
    ctx.fillStyle = coreGrad;
    ctx.beginPath();
    ctx.arc(gx, gy, cellSize * 0.28, 0, Math.PI * 2);
    ctx.fill();

    // star flicker
    ctx.fillStyle = `rgba(255, 255, 255, ${0.5 + pulse * 0.5})`;
    const starR = cellSize * 0.08;
    ctx.beginPath();
    ctx.arc(gx, gy, starR, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawPlayer() {
    // Smoothly lerp toward target
    const speed = 0.28;
    player.rx += (player.x - player.rx) * speed;
    player.ry += (player.y - player.ry) * speed;

    const px = player.rx * cellSize + cellSize / 2;
    const py = player.ry * cellSize + cellSize / 2;
    const t = performance.now() / 300;
    const bob = Math.sin(t) * cellSize * 0.04;
    const r = cellSize * 0.3;

    ctx.save();
    // glow
    for (let i = 3; i >= 0; i--) {
      const rad = r + i * (cellSize * 0.06);
      ctx.fillStyle = `rgba(255, 0, 229, ${0.06 + (3 - i) * 0.04})`;
      ctx.beginPath();
      ctx.arc(px, py + bob, rad, 0, Math.PI * 2);
      ctx.fill();
    }

    // body
    const bodyGrad = ctx.createRadialGradient(
      px - r * 0.3, py - r * 0.3 + bob, 0,
      px, py + bob, r
    );
    bodyGrad.addColorStop(0, '#ffffff');
    bodyGrad.addColorStop(0.4, '#00f0ff');
    bodyGrad.addColorStop(1, '#ff00e5');
    ctx.fillStyle = bodyGrad;
    ctx.beginPath();
    ctx.arc(px, py + bob, r, 0, Math.PI * 2);
    ctx.fill();

    // shine
    ctx.fillStyle = 'rgba(255, 255, 255, 0.65)';
    ctx.beginPath();
    ctx.arc(px - r * 0.35, py - r * 0.4 + bob, r * 0.22, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function updateParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.05;
      p.life -= dt * 1.2;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  function drawParticles() {
    for (const p of particles) {
      ctx.fillStyle = p.color;
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  let lastTime = performance.now();
  function render() {
    const now = performance.now();
    const dt = Math.min(0.05, (now - lastTime) / 1000);
    lastTime = now;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawGridBG();
    drawVisited();
    drawHintPath();
    drawPlayerTrail();
    drawWalls();
    drawStartGoal();
    updateParticles(dt);
    drawParticles();
    drawPlayer();

    requestAnimationFrame(render);
  }

  // ------- Input ---------
  const keyMap = {
    'ArrowUp': [0, -1], 'w': [0, -1], 'W': [0, -1],
    'ArrowDown': [0, 1], 's': [0, 1], 'S': [0, 1],
    'ArrowLeft': [-1, 0], 'a': [-1, 0], 'A': [-1, 0],
    'ArrowRight': [1, 0], 'd': [1, 0], 'D': [1, 0],
  };

  window.addEventListener('keydown', (e) => {
    if (keyMap[e.key]) {
      e.preventDefault();
      const [dx, dy] = keyMap[e.key];
      tryMove(dx, dy);
    }
    if (e.key === 'r' || e.key === 'R') {
      setupGame();
    }
  });

  touchpad.addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-dir]');
    if (!btn) return;
    const dir = btn.dataset.dir;
    const dmap = { up: [0, -1], down: [0, 1], left: [-1, 0], right: [1, 0] };
    const [dx, dy] = dmap[dir];
    tryMove(dx, dy);
  });

  // Swipe on canvas
  let touchStart = null;
  canvas.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) {
      touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    }
  }, { passive: true });
  canvas.addEventListener('touchend', (e) => {
    if (!touchStart) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - touchStart.x;
    const dy = t.clientY - touchStart.y;
    const absX = Math.abs(dx), absY = Math.abs(dy);
    const threshold = 20;
    if (Math.max(absX, absY) < threshold) { touchStart = null; return; }
    if (absX > absY) tryMove(dx > 0 ? 1 : -1, 0);
    else tryMove(0, dy > 0 ? 1 : -1);
    touchStart = null;
  });

  replayBtn.addEventListener('click', setupGame);
  overlayReplay.addEventListener('click', setupGame);
  difficultyEl.addEventListener('change', setupGame);

  hintBtn.addEventListener('click', () => {
    showHint = true;
    if (hintTimeout) clearTimeout(hintTimeout);
    hintTimeout = setTimeout(() => { showHint = false; }, 2500);
  });

  window.addEventListener('resize', () => {
    // Re-fit canvas but keep current maze state
    const size = cols;
    const maxSide = Math.min(window.innerWidth - 60, 620);
    const target = Math.max(320, Math.min(620, maxSide));
    cellSize = Math.floor(target / size);
    if (cellSize < 14) cellSize = 14;
    wallThickness = Math.max(2, Math.floor(cellSize * 0.12));
    const dim = cellSize * size;
    const dpr = window.devicePixelRatio || 1;
    canvas.width = dim * dpr;
    canvas.height = dim * dpr;
    canvas.style.width = dim + 'px';
    canvas.style.height = dim + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  });

  // Boot
  setupGame();
  render();
})();
</script>
</body>
</html>
