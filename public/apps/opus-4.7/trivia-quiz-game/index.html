<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Star-Spangled Trivia · USA Quiz</title>
<style>
  :root {
    --navy: #0a2463;
    --navy-2: #1e3a8a;
    --red: #d72631;
    --red-2: #b91c1c;
    --white: #ffffff;
    --cream: #f8f5f0;
    --gold: #ffd166;
    --green: #10b981;
    --green-soft: #d1fae5;
    --rose: #fee2e2;
    --ink: #0f172a;
    --muted: #64748b;
    --border: #e2e8f0;
    --shadow: 0 20px 60px -20px rgba(10, 36, 99, 0.35);
    --shadow-sm: 0 6px 20px -8px rgba(10, 36, 99, 0.25);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    background: var(--cream);
  }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background:
      radial-gradient(1200px 600px at 10% -10%, rgba(215, 38, 49, 0.10), transparent 60%),
      radial-gradient(1000px 500px at 110% 110%, rgba(10, 36, 99, 0.12), transparent 60%),
      linear-gradient(180deg, #fbf8f3 0%, #f2ebdf 100%);
    position: relative;
    overflow-x: hidden;
  }

  /* Subtle star field */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1.5px 1.5px at 20% 30%, rgba(10,36,99,0.20) 50%, transparent 51%),
      radial-gradient(1.5px 1.5px at 70% 60%, rgba(215,38,49,0.18) 50%, transparent 51%),
      radial-gradient(1.5px 1.5px at 85% 15%, rgba(10,36,99,0.15) 50%, transparent 51%),
      radial-gradient(1.5px 1.5px at 40% 80%, rgba(215,38,49,0.15) 50%, transparent 51%),
      radial-gradient(1.5px 1.5px at 55% 22%, rgba(10,36,99,0.12) 50%, transparent 51%);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 720px;
  }

  .card {
    background: var(--white);
    border-radius: 24px;
    box-shadow: var(--shadow);
    overflow: hidden;
    border: 1px solid rgba(10, 36, 99, 0.08);
  }

  header.top {
    padding: 22px 28px 14px;
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-2) 60%, #2544a3 100%);
    color: white;
    position: relative;
  }

  header.top .stripes {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      90deg,
      transparent 0 40px,
      rgba(255,255,255,0.04) 40px 42px
    );
    pointer-events: none;
  }

  .brand {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    position: relative;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }

  .logo .badge {
    width: 34px; height: 34px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--red) 0%, #ff4b57 100%);
    display: grid; place-items: center;
    box-shadow: 0 6px 14px -4px rgba(215, 38, 49, 0.6);
  }

  .logo .badge svg { width: 20px; height: 20px; }

  .logo .title {
    font-size: 15px;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  .logo .title span {
    color: var(--gold);
  }

  .meta {
    font-size: 13px;
    color: rgba(255,255,255,0.78);
    display: flex;
    gap: 14px;
    align-items: center;
  }

  .meta .pill {
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.15);
    padding: 5px 10px;
    border-radius: 999px;
    font-weight: 600;
    letter-spacing: 0.4px;
  }

  .progress-wrap {
    margin-top: 16px;
    position: relative;
    z-index: 1;
  }

  .progress-track {
    height: 10px;
    background: rgba(255,255,255,0.15);
    border-radius: 999px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.1);
  }

  .progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #ffd166 0%, #ff4b57 50%, #ffd166 100%);
    background-size: 200% 100%;
    border-radius: 999px;
    transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    box-shadow: 0 0 14px rgba(255, 209, 102, 0.6);
    animation: shimmer 3s linear infinite;
  }

  @keyframes shimmer {
    0% { background-position: 0% 50%; }
    100% { background-position: 200% 50%; }
  }

  .stage {
    padding: 34px 34px 28px;
    min-height: 380px;
  }

  /* Intro screen */
  .intro {
    text-align: center;
    padding: 28px 14px 10px;
  }
  .intro h1 {
    font-size: 34px;
    line-height: 1.15;
    color: var(--navy);
    margin-bottom: 10px;
    letter-spacing: -0.5px;
  }
  .intro h1 em {
    font-style: normal;
    color: var(--red);
  }
  .intro p {
    color: var(--muted);
    font-size: 16px;
    max-width: 480px;
    margin: 0 auto 22px;
    line-height: 1.55;
  }
  .flag-art {
    width: 104px;
    height: 104px;
    margin: 0 auto 18px;
    display: grid;
    place-items: center;
    position: relative;
  }
  .flag-art::after {
    content: "";
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255, 209, 102, 0.35), transparent 70%);
    filter: blur(6px);
    z-index: 0;
  }
  .flag-art svg { position: relative; z-index: 1; filter: drop-shadow(0 8px 18px rgba(10,36,99,0.25)); }

  /* Question */
  .qnum {
    font-size: 13px;
    letter-spacing: 2px;
    color: var(--red);
    text-transform: uppercase;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .question {
    font-size: 24px;
    font-weight: 700;
    color: var(--navy);
    line-height: 1.35;
    margin-bottom: 22px;
    letter-spacing: -0.2px;
  }

  .answers {
    display: grid;
    gap: 12px;
  }

  .answer {
    position: relative;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 18px;
    background: #fbfbfd;
    border: 2px solid var(--border);
    border-radius: 14px;
    font-size: 16.5px;
    font-weight: 600;
    color: var(--ink);
    cursor: pointer;
    text-align: left;
    width: 100%;
    transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    font-family: inherit;
  }

  .answer:hover:not(:disabled) {
    background: #fff;
    border-color: var(--navy-2);
    transform: translateY(-1px);
    box-shadow: var(--shadow-sm);
  }

  .answer .letter {
    flex: 0 0 32px;
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: white;
    border: 2px solid var(--border);
    display: grid;
    place-items: center;
    font-weight: 700;
    color: var(--navy);
    font-size: 14px;
    transition: inherit;
  }
  .answer:hover:not(:disabled) .letter { background: var(--navy); color: white; border-color: var(--navy); }

  .answer .text { flex: 1; }

  .answer .icon {
    width: 28px;
    height: 28px;
    display: none;
    align-items: center;
    justify-content: center;
    flex: 0 0 28px;
  }

  .answer.correct {
    background: var(--green-soft);
    border-color: var(--green);
    color: #065f46;
    animation: popIn 0.45s cubic-bezier(0.18, 1.3, 0.4, 1);
  }
  .answer.correct .letter {
    background: var(--green);
    border-color: var(--green);
    color: white;
  }
  .answer.correct .icon { display: flex; }

  .answer.incorrect {
    background: var(--rose);
    border-color: var(--red);
    color: #7f1d1d;
    animation: shake 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97);
  }
  .answer.incorrect .letter {
    background: var(--red);
    border-color: var(--red);
    color: white;
  }
  .answer.incorrect .icon { display: flex; }

  .answer.dim { opacity: 0.55; }

  .answer:disabled { cursor: default; }

  @keyframes popIn {
    0% { transform: scale(1); }
    40% { transform: scale(1.035); box-shadow: 0 10px 30px -10px rgba(16, 185, 129, 0.45); }
    100% { transform: scale(1); }
  }

  @keyframes shake {
    10%, 90% { transform: translateX(-2px); }
    20%, 80% { transform: translateX(3px); }
    30%, 50%, 70% { transform: translateX(-5px); }
    40%, 60% { transform: translateX(5px); }
  }

  .footer {
    padding: 18px 28px 26px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    border-top: 1px solid var(--border);
    background: linear-gradient(180deg, #fbfaf7, #f4eee4);
  }

  .score {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--navy);
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.4px;
  }

  .score .star { color: var(--red); }

  .btn {
    padding: 12px 22px;
    border: none;
    border-radius: 12px;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    font-family: inherit;
    transition: transform 0.15s ease, box-shadow 0.2s ease, background 0.2s ease, opacity 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    letter-spacing: 0.3px;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--red) 0%, #ff4b57 100%);
    color: white;
    box-shadow: 0 10px 24px -10px rgba(215, 38, 49, 0.7);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 14px 28px -10px rgba(215, 38, 49, 0.85); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

  .btn-ghost {
    background: transparent;
    color: var(--navy);
    border: 2px solid var(--border);
  }
  .btn-ghost:hover { background: white; border-color: var(--navy); }

  /* Final screen */
  .final {
    text-align: center;
    padding: 16px 8px;
  }

  .final .medal {
    width: 120px; height: 120px;
    margin: 0 auto 18px;
    border-radius: 50%;
    display: grid;
    place-items: center;
    background: radial-gradient(circle at 30% 30%, #ffe8a3, #ffd166 60%, #e0a800 100%);
    color: #6b3d00;
    font-weight: 900;
    font-size: 40px;
    box-shadow: 0 20px 40px -15px rgba(255, 170, 0, 0.6), inset 0 -6px 12px rgba(0,0,0,0.08);
    position: relative;
    animation: medalIn 0.7s cubic-bezier(0.18, 1.3, 0.4, 1);
  }

  @keyframes medalIn {
    0% { transform: scale(0.4) rotate(-30deg); opacity: 0; }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }

  .final h2 {
    color: var(--navy);
    font-size: 28px;
    margin-bottom: 6px;
    letter-spacing: -0.3px;
  }
  .final .score-big {
    font-size: 54px;
    font-weight: 900;
    color: var(--red);
    margin: 8px 0 2px;
    letter-spacing: -1.5px;
  }
  .final .score-big span { color: var(--muted); font-size: 30px; font-weight: 700; }
  .final .tagline {
    color: var(--muted);
    font-size: 16px;
    margin-bottom: 22px;
    max-width: 420px;
    margin-left: auto;
    margin-right: auto;
    line-height: 1.55;
  }

  .breakdown {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-bottom: 22px;
    flex-wrap: wrap;
  }
  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .stat .num { font-size: 22px; font-weight: 800; color: var(--navy); }
  .stat .lbl { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.2px; font-weight: 600; }

  .feedback-banner {
    margin-top: 14px;
    padding: 12px 16px;
    border-radius: 12px;
    font-weight: 600;
    font-size: 14.5px;
    display: none;
    align-items: center;
    gap: 10px;
    animation: fadeSlide 0.35s ease;
  }
  .feedback-banner.show { display: flex; }
  .feedback-banner.ok { background: var(--green-soft); color: #065f46; border: 1px solid #a7f3d0; }
  .feedback-banner.no { background: var(--rose); color: #7f1d1d; border: 1px solid #fecaca; }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .fade-in { animation: fadeIn 0.4s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  /* Confetti */
  .confetti {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 10;
    overflow: hidden;
  }
  .confetti i {
    position: absolute;
    top: -20px;
    width: 8px; height: 14px;
    opacity: 0.95;
    animation: fall linear forwards;
    border-radius: 2px;
  }
  @keyframes fall {
    to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  @media (max-width: 540px) {
    .stage { padding: 26px 22px 20px; }
    .question { font-size: 20px; }
    .intro h1 { font-size: 26px; }
    .final .score-big { font-size: 44px; }
    .footer { padding: 14px 20px 18px; }
    header.top { padding: 18px 22px 12px; }
  }
</style>
</head>
<body>

<div class="app">
  <div class="card" id="card">
    <header class="top">
      <div class="stripes"></div>
      <div class="brand">
        <div class="logo">
          <div class="badge" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 2l2.39 4.84L19.8 7.6l-3.9 3.8.92 5.37L12 14.9l-4.82 2.53.92-5.37L4.2 8.26 9.6 7.49 12 2z" fill="white"/>
            </svg>
          </div>
          <div class="title">Star-Spangled <span>Trivia</span></div>
        </div>
        <div class="meta">
          <div class="pill" id="pill">Ready</div>
        </div>
      </div>
      <div class="progress-wrap">
        <div class="progress-track">
          <div class="progress-fill" id="progress"></div>
        </div>
      </div>
    </header>

    <section class="stage" id="stage">
      <!-- dynamic content -->
    </section>

    <footer class="footer">
      <div class="score">
        <span class="star">★</span>
        <span>Score:</span>
        <span id="scoreLabel">0 / 0</span>
      </div>
      <button class="btn btn-primary" id="nextBtn" disabled>Next →</button>
    </footer>
  </div>
</div>

<div class="confetti" id="confetti"></div>

<script>
  const ALL_QUESTIONS = [
    {
      q: "How many stars are on the current U.S. flag?",
      options: ["48", "50", "52", "13"],
      answer: 1
    },
    {
      q: "Who was the first President of the United States?",
      options: ["Thomas Jefferson", "Abraham Lincoln", "George Washington", "John Adams"],
      answer: 2
    },
    {
      q: "What is the capital of the United States?",
      options: ["New York City", "Philadelphia", "Los Angeles", "Washington, D.C."],
      answer: 3
    },
    {
      q: "On what date do Americans celebrate Independence Day?",
      options: ["July 1", "June 14", "July 4", "September 11"],
      answer: 2
    },
    {
      q: "How many U.S. states are there?",
      options: ["50", "48", "51", "52"],
      answer: 0
    },
    {
      q: "What document begins with the words \"We the People\"?",
      options: ["The Declaration of Independence", "The Bill of Rights", "The Constitution", "The Gettysburg Address"],
      answer: 2
    },
    {
      q: "Which U.S. president is featured on the $1 bill?",
      options: ["Abraham Lincoln", "George Washington", "Benjamin Franklin", "Thomas Jefferson"],
      answer: 1
    },
    {
      q: "What are the two major political parties in the U.S.?",
      options: ["Whig and Federalist", "Republican and Democratic", "Libertarian and Green", "Labour and Conservative"],
      answer: 1
    },
    {
      q: "Which ocean lies off the West Coast of the continental U.S.?",
      options: ["Atlantic", "Arctic", "Indian", "Pacific"],
      answer: 3
    },
    {
      q: "What is the name of the national anthem of the United States?",
      options: ["America the Beautiful", "My Country, 'Tis of Thee", "The Star-Spangled Banner", "God Bless America"],
      answer: 2
    },
    {
      q: "In what year did the United States declare independence?",
      options: ["1492", "1776", "1812", "1865"],
      answer: 1
    },
    {
      q: "Which state is known as 'The Sunshine State'?",
      options: ["California", "Texas", "Florida", "Arizona"],
      answer: 2
    },
    {
      q: "Who wrote the Declaration of Independence?",
      options: ["Thomas Jefferson", "Benjamin Franklin", "John Adams", "George Washington"],
      answer: 0
    }
  ];

  const NUM_QUESTIONS = 10;

  // State
  let quiz = [];
  let current = 0;
  let score = 0;
  let answered = false;
  let started = false;

  const stage = document.getElementById('stage');
  const progressEl = document.getElementById('progress');
  const scoreLabel = document.getElementById('scoreLabel');
  const nextBtn = document.getElementById('nextBtn');
  const pill = document.getElementById('pill');

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function buildQuiz() {
    const shuffled = shuffle(ALL_QUESTIONS).slice(0, NUM_QUESTIONS);
    // Shuffle options while tracking the new correct index
    return shuffled.map(q => {
      const paired = q.options.map((opt, idx) => ({ opt, isCorrect: idx === q.answer }));
      const shuf = shuffle(paired);
      return {
        q: q.q,
        options: shuf.map(p => p.opt),
        answer: shuf.findIndex(p => p.isCorrect)
      };
    });
  }

  function updateProgress() {
    const total = quiz.length || NUM_QUESTIONS;
    const pct = !started ? 0 : Math.min(100, (current / total) * 100);
    progressEl.style.width = pct + '%';
  }

  function updateHUD() {
    scoreLabel.textContent = `${score} / ${quiz.length || NUM_QUESTIONS}`;
    if (!started) pill.textContent = 'Ready';
    else if (current >= quiz.length) pill.textContent = 'Complete';
    else pill.textContent = `Q ${current + 1} of ${quiz.length}`;
  }

  function renderIntro() {
    started = false;
    current = 0;
    score = 0;
    answered = false;
    updateProgress();
    updateHUD();
    nextBtn.textContent = 'Start Quiz →';
    nextBtn.disabled = false;
    nextBtn.onclick = startQuiz;

    stage.innerHTML = `
      <div class="intro fade-in">
        <div class="flag-art" aria-hidden="true">
          <svg width="96" height="96" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="g1" x1="0" x2="1" y1="0" y2="1">
                <stop offset="0" stop-color="#0a2463"/>
                <stop offset="1" stop-color="#1e3a8a"/>
              </linearGradient>
            </defs>
            <circle cx="48" cy="48" r="44" fill="white" stroke="#0a2463" stroke-width="3"/>
            <path d="M8 48 H88" stroke="#d72631" stroke-width="6"/>
            <path d="M8 34 H88" stroke="#d72631" stroke-width="6"/>
            <path d="M8 62 H88" stroke="#d72631" stroke-width="6"/>
            <rect x="8" y="12" width="40" height="26" fill="url(#g1)"/>
            <g fill="white">
              <circle cx="16" cy="18" r="1.3"/><circle cx="24" cy="18" r="1.3"/><circle cx="32" cy="18" r="1.3"/><circle cx="40" cy="18" r="1.3"/>
              <circle cx="20" cy="24" r="1.3"/><circle cx="28" cy="24" r="1.3"/><circle cx="36" cy="24" r="1.3"/>
              <circle cx="16" cy="30" r="1.3"/><circle cx="24" cy="30" r="1.3"/><circle cx="32" cy="30" r="1.3"/><circle cx="40" cy="30" r="1.3"/>
            </g>
          </svg>
        </div>
        <h1>Think you know your <em>America</em>?</h1>
        <p>A 10-question trivia challenge covering U.S. history, geography, and government — the basics every citizen should know. Tap Start when you're ready.</p>
      </div>
    `;
  }

  function startQuiz() {
    quiz = buildQuiz();
    current = 0;
    score = 0;
    answered = false;
    started = true;
    renderQuestion();
  }

  function renderQuestion() {
    answered = false;
    nextBtn.disabled = true;
    nextBtn.textContent = (current === quiz.length - 1) ? 'See Results →' : 'Next →';
    nextBtn.onclick = goNext;
    updateProgress();
    updateHUD();

    const item = quiz[current];
    const letters = ['A', 'B', 'C', 'D'];

    stage.innerHTML = `
      <div class="fade-in">
        <div class="qnum">Question ${current + 1} · of ${quiz.length}</div>
        <div class="question">${escapeHtml(item.q)}</div>
        <div class="answers" id="answers">
          ${item.options.map((opt, i) => `
            <button class="answer" data-i="${i}">
              <span class="letter">${letters[i]}</span>
              <span class="text">${escapeHtml(opt)}</span>
              <span class="icon" aria-hidden="true"></span>
            </button>
          `).join('')}
        </div>
        <div class="feedback-banner" id="banner"></div>
      </div>
    `;

    document.querySelectorAll('.answer').forEach(btn => {
      btn.addEventListener('click', () => onAnswer(parseInt(btn.dataset.i, 10)));
    });
  }

  function onAnswer(i) {
    if (answered) return;
    answered = true;
    const item = quiz[current];
    const buttons = document.querySelectorAll('.answer');
    const banner = document.getElementById('banner');

    const correctIdx = item.answer;
    const isCorrect = i === correctIdx;

    buttons.forEach((b, idx) => {
      b.disabled = true;
      const icon = b.querySelector('.icon');
      if (idx === correctIdx) {
        b.classList.add('correct');
        icon.innerHTML = checkSVG();
      } else if (idx === i) {
        b.classList.add('incorrect');
        icon.innerHTML = crossSVG();
      } else {
        b.classList.add('dim');
      }
    });

    if (isCorrect) {
      score++;
      banner.classList.add('show', 'ok');
      banner.innerHTML = `${checkSVG('#065f46')} <span>Correct! Nicely done.</span>`;
    } else {
      banner.classList.add('show', 'no');
      banner.innerHTML = `${crossSVG('#7f1d1d')} <span>Not quite. The answer is <b>${escapeHtml(item.options[correctIdx])}</b>.</span>`;
    }

    updateHUD();
    nextBtn.disabled = false;
  }

  function goNext() {
    current++;
    if (current >= quiz.length) {
      renderFinal();
    } else {
      renderQuestion();
    }
  }

  function renderFinal() {
    updateProgress();
    progressEl.style.width = '100%';
    updateHUD();
    nextBtn.textContent = 'Play Again ↻';
    nextBtn.disabled = false;
    nextBtn.onclick = renderIntro;

    const pct = Math.round((score / quiz.length) * 100);
    let title = 'Good effort!';
    let tag = 'Brush up and try again — you\'ll do even better next time.';
    if (pct === 100) { title = 'Perfect Score!'; tag = 'You\'re a bona fide trivia patriot. Outstanding work!'; }
    else if (pct >= 80) { title = 'Excellent!'; tag = 'Top marks — your civics teacher would be proud.'; }
    else if (pct >= 60) { title = 'Well Done!'; tag = 'A solid performance. A little review and you\'ll ace it.'; }
    else if (pct >= 40) { title = 'Not Bad!'; tag = 'You\'ve got the basics down — room to grow.'; }

    stage.innerHTML = `
      <div class="final fade-in">
        <div class="medal">${score}</div>
        <h2>${title}</h2>
        <div class="score-big">${score}<span>/${quiz.length}</span></div>
        <p class="tagline">${tag}</p>
        <div class="breakdown">
          <div class="stat"><div class="num">${pct}%</div><div class="lbl">Accuracy</div></div>
          <div class="stat"><div class="num">${score}</div><div class="lbl">Correct</div></div>
          <div class="stat"><div class="num">${quiz.length - score}</div><div class="lbl">Missed</div></div>
        </div>
      </div>
    `;

    if (pct >= 70) launchConfetti();
  }

  function launchConfetti() {
    const colors = ['#d72631', '#ffffff', '#0a2463', '#ffd166'];
    const container = document.getElementById('confetti');
    container.innerHTML = '';
    for (let i = 0; i < 90; i++) {
      const piece = document.createElement('i');
      piece.style.left = Math.random() * 100 + 'vw';
      piece.style.background = colors[i % colors.length];
      piece.style.animationDuration = (2.5 + Math.random() * 2.5) + 's';
      piece.style.animationDelay = (Math.random() * 0.5) + 's';
      piece.style.transform = `rotate(${Math.random() * 360}deg)`;
      piece.style.width = (6 + Math.random() * 6) + 'px';
      piece.style.height = (10 + Math.random() * 10) + 'px';
      container.appendChild(piece);
    }
    setTimeout(() => { container.innerHTML = ''; }, 5500);
  }

  function checkSVG(color) {
    return `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="12" cy="12" r="11" fill="${color || '#10b981'}"/>
      <path d="M7 12.5l3.2 3.2L17 8.8" stroke="white" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>`;
  }
  function crossSVG(color) {
    return `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="12" cy="12" r="11" fill="${color || '#d72631'}"/>
      <path d="M8.5 8.5l7 7M15.5 8.5l-7 7" stroke="white" stroke-width="2.4" stroke-linecap="round"/>
    </svg>`;
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  // Keyboard support
  document.addEventListener('keydown', (e) => {
    if (!started && e.key === 'Enter') { startQuiz(); return; }
    if (current >= quiz.length) {
      if (e.key === 'Enter') renderIntro();
      return;
    }
    if (!answered) {
      const map = { '1': 0, '2': 1, '3': 2, '4': 3, 'a': 0, 'b': 1, 'c': 2, 'd': 3, 'A': 0, 'B': 1, 'C': 2, 'D': 3 };
      if (map[e.key] !== undefined && quiz[current]) {
        const btn = document.querySelector(`.answer[data-i="${map[e.key]}"]`);
        if (btn) btn.click();
      }
    } else if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      goNext();
    }
  });

  // Init
  renderIntro();
</script>
</body>
</html>
