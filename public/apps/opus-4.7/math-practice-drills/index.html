<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Math Practice Drills</title>
<style>
  :root {
    --bg-1: #0f0c29;
    --bg-2: #302b63;
    --bg-3: #24243e;
    --surface: rgba(255, 255, 255, 0.06);
    --surface-strong: rgba(255, 255, 255, 0.10);
    --border: rgba(255, 255, 255, 0.12);
    --text: #f5f7ff;
    --text-dim: #b3b8d4;
    --accent: #7cf5d1;
    --accent-2: #8b8cff;
    --danger: #ff7b9c;
    --gold: #ffd770;
    --success: #7cf5d1;
    --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    color: var(--text);
    background: linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 50%, var(--bg-3) 100%);
    background-attachment: fixed;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(600px circle at 15% 20%, rgba(124, 245, 209, 0.12), transparent 40%),
      radial-gradient(700px circle at 85% 80%, rgba(139, 140, 255, 0.14), transparent 45%);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px;
  }

  header {
    width: 100%;
    max-width: 960px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 4px 32px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    font-weight: 700;
    font-size: 1.1rem;
    letter-spacing: 0.5px;
  }

  .logo-mark {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
    display: grid;
    place-items: center;
    font-size: 1.2rem;
    color: #0f0c29;
    font-weight: 900;
    box-shadow: 0 6px 20px rgba(124, 245, 209, 0.3);
  }

  .stats-chip {
    display: flex;
    gap: 8px;
    align-items: center;
    padding: 8px 14px;
    border-radius: 999px;
    background: var(--surface);
    border: 1px solid var(--border);
    font-size: 0.85rem;
    color: var(--text-dim);
  }

  .stats-chip strong { color: var(--gold); font-weight: 700; }

  main {
    width: 100%;
    max-width: 720px;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card {
    width: 100%;
    background: var(--surface);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 48px 40px;
    box-shadow: var(--shadow);
    animation: rise 0.5s cubic-bezier(0.2, 0.9, 0.3, 1);
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(20px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  h1 {
    font-size: 2.4rem;
    font-weight: 800;
    text-align: center;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.02em;
  }

  .subtitle {
    text-align: center;
    color: var(--text-dim);
    font-size: 1rem;
    margin-bottom: 36px;
  }

  .section-label {
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    margin-bottom: 12px;
  }

  .option-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
    gap: 10px;
    margin-bottom: 24px;
  }

  .option {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 12px;
    cursor: pointer;
    transition: all 0.2s ease;
    text-align: center;
    color: var(--text);
    font-size: 0.95rem;
    font-weight: 600;
    font-family: inherit;
    user-select: none;
  }

  .option:hover {
    background: var(--surface-strong);
    border-color: rgba(255, 255, 255, 0.22);
    transform: translateY(-1px);
  }

  .option.active {
    background: linear-gradient(135deg, rgba(124, 245, 209, 0.18), rgba(139, 140, 255, 0.2));
    border-color: var(--accent);
    color: #fff;
    box-shadow: 0 6px 20px rgba(124, 245, 209, 0.18);
  }

  .option .option-symbol {
    font-size: 1.6rem;
    display: block;
    margin-bottom: 4px;
  }

  .option .option-hint {
    display: block;
    font-size: 0.7rem;
    color: var(--text-dim);
    margin-top: 2px;
    font-weight: 400;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 18px 24px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
    color: #0f0c29;
    font-size: 1.05rem;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    box-shadow: 0 10px 30px rgba(124, 245, 209, 0.25);
    margin-top: 8px;
  }

  .btn:hover { transform: translateY(-2px); box-shadow: 0 14px 36px rgba(124, 245, 209, 0.35); }
  .btn:active { transform: translateY(0); }
  .btn.secondary {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    box-shadow: none;
  }
  .btn.secondary:hover { background: var(--surface-strong); box-shadow: 0 6px 20px rgba(0,0,0,0.2); }

  /* Quiz screen */
  .quiz-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 32px;
  }

  .timer-ring {
    position: relative;
    width: 72px;
    height: 72px;
  }
  .timer-ring svg { transform: rotate(-90deg); }
  .timer-ring circle { fill: none; stroke-width: 6; }
  .timer-ring .track { stroke: rgba(255,255,255,0.08); }
  .timer-ring .progress {
    stroke: var(--accent);
    stroke-linecap: round;
    transition: stroke-dashoffset 1s linear, stroke 0.3s ease;
  }
  .timer-ring.warn .progress { stroke: var(--gold); }
  .timer-ring.danger .progress { stroke: var(--danger); }
  .timer-text {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    font-size: 1.3rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }

  .score-display {
    text-align: right;
  }
  .score-display .label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-dim);
  }
  .score-display .value {
    font-size: 1.5rem;
    font-weight: 800;
    color: var(--gold);
    font-variant-numeric: tabular-nums;
  }

  .progress-bar {
    width: 100%;
    height: 4px;
    background: rgba(255,255,255,0.06);
    border-radius: 999px;
    overflow: hidden;
    margin-bottom: 32px;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    border-radius: 999px;
    transition: width 0.3s ease;
  }

  .problem {
    text-align: center;
    padding: 32px 16px 40px;
  }

  .problem-question {
    font-size: clamp(3rem, 10vw, 5.5rem);
    font-weight: 800;
    letter-spacing: -0.02em;
    font-variant-numeric: tabular-nums;
    line-height: 1.1;
    margin-bottom: 32px;
    color: #fff;
  }

  .answer-wrap {
    max-width: 300px;
    margin: 0 auto;
    position: relative;
  }

  .answer-input {
    width: 100%;
    padding: 20px 24px;
    border-radius: 14px;
    border: 2px solid var(--border);
    background: var(--surface);
    color: #fff;
    font-size: 2rem;
    font-weight: 700;
    text-align: center;
    font-family: inherit;
    font-variant-numeric: tabular-nums;
    transition: border-color 0.2s ease, background 0.2s ease;
    outline: none;
  }
  .answer-input:focus { border-color: var(--accent); background: var(--surface-strong); }
  .answer-input.correct {
    border-color: var(--success);
    background: rgba(124, 245, 209, 0.15);
    animation: pulse-good 0.4s ease;
  }
  .answer-input.wrong {
    border-color: var(--danger);
    background: rgba(255, 123, 156, 0.15);
    animation: shake 0.4s ease;
  }

  @keyframes pulse-good {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.04); }
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-6px); }
    80% { transform: translateX(6px); }
  }

  .feedback-pop {
    position: absolute;
    top: -40px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 1.2rem;
    font-weight: 800;
    opacity: 0;
    pointer-events: none;
  }
  .feedback-pop.show { animation: float-up 0.8s ease forwards; }
  .feedback-pop.correct { color: var(--success); }
  .feedback-pop.wrong { color: var(--danger); }

  @keyframes float-up {
    0% { opacity: 0; transform: translate(-50%, 0); }
    30% { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%, -30px); }
  }

  .streak-indicator {
    margin-top: 20px;
    display: flex;
    justify-content: center;
    gap: 4px;
    min-height: 22px;
  }
  .streak-dot {
    width: 8px;
    height: 8px;
    border-radius: 999px;
    background: rgba(255,255,255,0.15);
    transition: all 0.3s ease;
  }
  .streak-dot.on {
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }

  .quiz-footer {
    display: flex;
    justify-content: center;
    margin-top: 24px;
  }
  .quit-btn {
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-size: 0.85rem;
    cursor: pointer;
    padding: 8px 16px;
    border-radius: 8px;
    font-family: inherit;
  }
  .quit-btn:hover { color: var(--text); background: var(--surface); }

  /* Results */
  .results-head {
    text-align: center;
    margin-bottom: 32px;
  }
  .results-emoji {
    font-size: 4rem;
    margin-bottom: 8px;
    animation: bounce-in 0.6s cubic-bezier(0.2, 1.4, 0.4, 1);
  }
  @keyframes bounce-in {
    0% { transform: scale(0); opacity: 0; }
    60% { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
  }

  .results-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 16px;
    margin-bottom: 28px;
  }
  .stat-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    text-align: center;
  }
  .stat-box .stat-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    margin-bottom: 6px;
  }
  .stat-box .stat-value {
    font-size: 2rem;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
  }
  .stat-box .stat-value.accent { color: var(--accent); }
  .stat-box .stat-value.gold { color: var(--gold); }
  .stat-box .stat-value.danger { color: var(--danger); }

  .review-list {
    background: rgba(0,0,0,0.15);
    border-radius: 14px;
    padding: 8px;
    max-height: 220px;
    overflow-y: auto;
    margin-bottom: 24px;
  }
  .review-list::-webkit-scrollbar { width: 6px; }
  .review-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 999px; }

  .review-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 14px;
    border-radius: 10px;
    font-variant-numeric: tabular-nums;
    font-size: 0.95rem;
  }
  .review-item:not(:last-child) { border-bottom: 1px solid rgba(255,255,255,0.04); }
  .review-item .q { font-weight: 600; }
  .review-item .a-correct { color: var(--success); font-weight: 700; }
  .review-item .a-wrong { color: var(--danger); font-weight: 700; text-decoration: line-through; text-decoration-color: rgba(255,123,156,0.5); }
  .review-item .a-expected { color: var(--text-dim); font-size: 0.85rem; margin-left: 6px; }
  .review-item .tag {
    font-size: 0.7rem;
    padding: 3px 8px;
    border-radius: 999px;
    font-weight: 700;
  }
  .review-item .tag.ok { background: rgba(124, 245, 209, 0.15); color: var(--success); }
  .review-item .tag.bad { background: rgba(255, 123, 156, 0.15); color: var(--danger); }

  .result-buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .new-best {
    display: inline-block;
    font-size: 0.8rem;
    color: var(--gold);
    font-weight: 700;
    background: rgba(255, 215, 112, 0.12);
    padding: 4px 10px;
    border-radius: 999px;
    margin-top: 8px;
    animation: shimmer 2s ease-in-out infinite;
  }
  @keyframes shimmer {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  footer {
    width: 100%;
    max-width: 960px;
    text-align: center;
    color: var(--text-dim);
    font-size: 0.78rem;
    padding: 24px 0 8px;
    opacity: 0.7;
  }

  @media (max-width: 520px) {
    .card { padding: 32px 24px; border-radius: 20px; }
    h1 { font-size: 1.9rem; }
    .problem-question { font-size: 3.4rem; }
    .answer-input { font-size: 1.7rem; padding: 16px 20px; }
    header { padding-bottom: 16px; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">
      <div class="logo-mark">∑</div>
      <span>Math Drills</span>
    </div>
    <div class="stats-chip" id="bestChip">
      <span>Best</span>
      <strong id="bestScore">0</strong>
    </div>
  </header>

  <main id="main"></main>

  <footer>Press Enter to submit • Numbers only</footer>
</div>

<script>
(() => {
  'use strict';

  const STORAGE_KEY = 'mathDrillsBest_v1';
  const main = document.getElementById('main');
  const bestScoreEl = document.getElementById('bestScore');

  const state = {
    screen: 'home',
    operation: 'mixed',
    difficulty: 'medium',
    duration: 60,
    score: 0,
    streak: 0,
    maxStreak: 0,
    correct: 0,
    wrong: 0,
    history: [],
    current: null,
    timeLeft: 0,
    timerId: null,
  };

  const best = loadBest();
  updateBestChip();

  function loadBest() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : { score: 0, accuracy: 0, streak: 0 };
    } catch { return { score: 0, accuracy: 0, streak: 0 }; }
  }
  function saveBest(b) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(b)); } catch {}
  }
  function updateBestChip() { bestScoreEl.textContent = best.score || 0; }

  // --- Problem generation ---
  const DIFFICULTY = {
    easy:   { add: [1, 20],  sub: [1, 20],  mul: [1, 10],  div: [1, 10]  },
    medium: { add: [10, 99], sub: [10, 99], mul: [2, 12],  div: [2, 12]  },
    hard:   { add: [25, 250],sub: [25, 250],mul: [5, 20],  div: [3, 15]  },
    expert: { add: [50, 999],sub: [50, 999],mul: [7, 30],  div: [4, 20]  },
  };

  const rand = (a, b) => Math.floor(Math.random() * (b - a + 1)) + a;

  function genProblem() {
    let op = state.operation;
    if (op === 'mixed') {
      op = ['add', 'sub', 'mul', 'div'][Math.floor(Math.random() * 4)];
    }
    const range = DIFFICULTY[state.difficulty][op];
    let a, b, ans, symbol;
    if (op === 'add') {
      a = rand(range[0], range[1]); b = rand(range[0], range[1]);
      ans = a + b; symbol = '+';
    } else if (op === 'sub') {
      a = rand(range[0], range[1]); b = rand(range[0], range[1]);
      if (b > a) [a, b] = [b, a];
      ans = a - b; symbol = '−';
    } else if (op === 'mul') {
      a = rand(range[0], range[1]); b = rand(range[0], range[1]);
      ans = a * b; symbol = '×';
    } else {
      b = rand(range[0], range[1]);
      ans = rand(range[0], range[1]);
      a = b * ans; symbol = '÷';
    }
    return { a, b, symbol, ans, op };
  }

  // --- Screens ---
  function render() {
    if (state.screen === 'home') renderHome();
    else if (state.screen === 'quiz') renderQuiz();
    else if (state.screen === 'results') renderResults();
  }

  function renderHome() {
    main.innerHTML = `
      <div class="card">
        <h1>Math Practice Drills</h1>
        <p class="subtitle">Sharpen your speed. Improve your accuracy.</p>

        <div class="section-label">Operation</div>
        <div class="option-grid" id="opGrid">
          ${opBtn('add', '+', 'Add')}
          ${opBtn('sub', '−', 'Subtract')}
          ${opBtn('mul', '×', 'Multiply')}
          ${opBtn('div', '÷', 'Divide')}
          ${opBtn('mixed', '⁂', 'Mixed')}
        </div>

        <div class="section-label">Difficulty</div>
        <div class="option-grid" id="diffGrid">
          ${diffBtn('easy', 'Easy')}
          ${diffBtn('medium', 'Medium')}
          ${diffBtn('hard', 'Hard')}
          ${diffBtn('expert', 'Expert')}
        </div>

        <div class="section-label">Time Limit</div>
        <div class="option-grid" id="timeGrid">
          ${timeBtn(30, '30s')}
          ${timeBtn(60, '1m')}
          ${timeBtn(120, '2m')}
          ${timeBtn(300, '5m')}
        </div>

        <button class="btn" id="startBtn">Start Drill →</button>
      </div>
    `;

    document.getElementById('opGrid').addEventListener('click', (e) => {
      const el = e.target.closest('.option'); if (!el) return;
      state.operation = el.dataset.val;
      refreshActive('opGrid', state.operation);
    });
    document.getElementById('diffGrid').addEventListener('click', (e) => {
      const el = e.target.closest('.option'); if (!el) return;
      state.difficulty = el.dataset.val;
      refreshActive('diffGrid', state.difficulty);
    });
    document.getElementById('timeGrid').addEventListener('click', (e) => {
      const el = e.target.closest('.option'); if (!el) return;
      state.duration = Number(el.dataset.val);
      refreshActive('timeGrid', String(state.duration));
    });
    document.getElementById('startBtn').addEventListener('click', startQuiz);
  }

  function opBtn(val, symbol, label) {
    return `<button class="option ${state.operation === val ? 'active' : ''}" data-val="${val}">
      <span class="option-symbol">${symbol}</span>${label}
    </button>`;
  }
  function diffBtn(val, label) {
    const range = DIFFICULTY[val];
    const hint = `1–${range.add[1]}`;
    return `<button class="option ${state.difficulty === val ? 'active' : ''}" data-val="${val}">
      ${label}<span class="option-hint">${hint}</span>
    </button>`;
  }
  function timeBtn(val, label) {
    return `<button class="option ${state.duration === val ? 'active' : ''}" data-val="${val}">
      ${label}
    </button>`;
  }
  function refreshActive(gridId, val) {
    const grid = document.getElementById(gridId);
    grid.querySelectorAll('.option').forEach(el => {
      el.classList.toggle('active', el.dataset.val === val);
    });
  }

  // --- Quiz ---
  function startQuiz() {
    state.score = 0;
    state.streak = 0;
    state.maxStreak = 0;
    state.correct = 0;
    state.wrong = 0;
    state.history = [];
    state.timeLeft = state.duration;
    state.current = genProblem();
    state.screen = 'quiz';
    render();
    startTimer();
  }

  function renderQuiz() {
    const p = state.current;
    const radius = 30;
    const circ = 2 * Math.PI * radius;

    main.innerHTML = `
      <div class="card">
        <div class="quiz-header">
          <div class="timer-ring" id="timerRing">
            <svg width="72" height="72">
              <circle class="track" cx="36" cy="36" r="${radius}"></circle>
              <circle class="progress" cx="36" cy="36" r="${radius}"
                stroke-dasharray="${circ}"
                stroke-dashoffset="0"
                id="timerProgress"></circle>
            </svg>
            <div class="timer-text" id="timerText">${state.timeLeft}</div>
          </div>
          <div class="score-display">
            <div class="label">Score</div>
            <div class="value" id="scoreVal">${state.score}</div>
          </div>
        </div>

        <div class="progress-bar">
          <div class="progress-bar-fill" id="progressBar" style="width:100%"></div>
        </div>

        <div class="problem">
          <div class="problem-question" id="problemQ">${p.a} ${p.symbol} ${p.b}</div>
          <div class="answer-wrap">
            <div class="feedback-pop" id="feedbackPop"></div>
            <input type="text"
                   inputmode="numeric"
                   pattern="-?[0-9]*"
                   class="answer-input"
                   id="answerInput"
                   autocomplete="off"
                   autofocus
                   placeholder="?" />
          </div>
          <div class="streak-indicator" id="streakIndicator">
            ${streakDots()}
          </div>
        </div>

        <div class="quiz-footer">
          <button class="quit-btn" id="quitBtn">End Early</button>
        </div>
      </div>
    `;

    const input = document.getElementById('answerInput');
    input.focus();
    input.addEventListener('keydown', onAnswerKey);
    input.addEventListener('input', () => {
      // allow only digits and minus
      input.value = input.value.replace(/[^\d-]/g, '').replace(/(?!^)-/g, '');
    });

    document.getElementById('quitBtn').addEventListener('click', () => {
      stopTimer();
      state.screen = 'results';
      render();
    });

    updateTimerUI();
  }

  function streakDots() {
    const max = 5;
    let html = '';
    const filled = Math.min(state.streak, max);
    for (let i = 0; i < max; i++) {
      html += `<div class="streak-dot ${i < filled ? 'on' : ''}"></div>`;
    }
    return html;
  }

  function onAnswerKey(e) {
    if (e.key !== 'Enter') return;
    const input = e.currentTarget;
    const val = input.value.trim();
    if (val === '' || val === '-') return;
    const num = parseInt(val, 10);
    if (Number.isNaN(num)) return;
    submitAnswer(num);
  }

  function submitAnswer(num) {
    const input = document.getElementById('answerInput');
    const pop = document.getElementById('feedbackPop');
    const p = state.current;
    const correct = num === p.ans;

    state.history.push({
      q: `${p.a} ${p.symbol} ${p.b}`,
      given: num,
      expected: p.ans,
      correct,
    });

    if (correct) {
      state.correct++;
      state.streak++;
      state.maxStreak = Math.max(state.maxStreak, state.streak);
      const bonus = Math.min(state.streak, 5);
      const diffMult = { easy: 1, medium: 2, hard: 3, expert: 4 }[state.difficulty];
      state.score += 10 * diffMult + bonus * 2;

      input.classList.add('correct');
      pop.textContent = state.streak >= 3 ? `+${10 * diffMult + bonus * 2} 🔥` : `+${10 * diffMult + bonus * 2}`;
      pop.className = 'feedback-pop correct show';
    } else {
      state.wrong++;
      state.streak = 0;
      input.classList.add('wrong');
      pop.textContent = `${p.ans}`;
      pop.className = 'feedback-pop wrong show';
    }

    document.getElementById('scoreVal').textContent = state.score;
    document.getElementById('streakIndicator').innerHTML = streakDots();

    setTimeout(() => {
      state.current = genProblem();
      const nextInput = document.getElementById('answerInput');
      const nextPop = document.getElementById('feedbackPop');
      if (!nextInput) return;
      nextInput.value = '';
      nextInput.classList.remove('correct', 'wrong');
      nextPop.className = 'feedback-pop';
      document.getElementById('problemQ').textContent = `${state.current.a} ${state.current.symbol} ${state.current.b}`;
      nextInput.focus();
    }, correct ? 260 : 520);
  }

  function startTimer() {
    stopTimer();
    state.timerId = setInterval(() => {
      state.timeLeft--;
      updateTimerUI();
      if (state.timeLeft <= 0) {
        stopTimer();
        state.screen = 'results';
        render();
      }
    }, 1000);
  }

  function stopTimer() {
    if (state.timerId) { clearInterval(state.timerId); state.timerId = null; }
  }

  function updateTimerUI() {
    const ring = document.getElementById('timerRing');
    const prog = document.getElementById('timerProgress');
    const text = document.getElementById('timerText');
    const bar = document.getElementById('progressBar');
    if (!prog || !text) return;
    const radius = 30;
    const circ = 2 * Math.PI * radius;
    const pct = state.timeLeft / state.duration;
    prog.style.strokeDashoffset = `${circ * (1 - pct)}`;
    text.textContent = state.timeLeft;
    ring.classList.toggle('warn', pct <= 0.33 && pct > 0.15);
    ring.classList.toggle('danger', pct <= 0.15);
    if (bar) bar.style.width = `${pct * 100}%`;
  }

  // --- Results ---
  function renderResults() {
    const total = state.correct + state.wrong;
    const accuracy = total === 0 ? 0 : Math.round((state.correct / total) * 100);
    const isNewBest = state.score > (best.score || 0);
    if (isNewBest) {
      best.score = state.score;
      best.accuracy = accuracy;
      best.streak = state.maxStreak;
      saveBest(best);
      updateBestChip();
    }

    let emoji = '💪';
    if (accuracy >= 95 && total >= 10) emoji = '🏆';
    else if (accuracy >= 85) emoji = '🎯';
    else if (accuracy >= 70) emoji = '👍';
    else if (total === 0) emoji = '📘';

    const reviewHTML = state.history.length === 0
      ? `<div style="padding: 24px; text-align:center; color: var(--text-dim);">No answers submitted.</div>`
      : state.history.slice().reverse().map(h => `
          <div class="review-item">
            <span class="q">${h.q} =</span>
            <span>
              ${h.correct
                ? `<span class="a-correct">${h.given}</span>`
                : `<span class="a-wrong">${h.given}</span><span class="a-expected">→ ${h.expected}</span>`}
              <span class="tag ${h.correct ? 'ok' : 'bad'}">${h.correct ? '✓' : '✗'}</span>
            </span>
          </div>
        `).join('');

    main.innerHTML = `
      <div class="card">
        <div class="results-head">
          <div class="results-emoji">${emoji}</div>
          <h1>${total === 0 ? 'Session Ended' : 'Nicely done!'}</h1>
          <p class="subtitle">${state.operation === 'mixed' ? 'Mixed' : capitalize(state.operation)} · ${capitalize(state.difficulty)} · ${state.duration}s</p>
          ${isNewBest && state.score > 0 ? `<div class="new-best">🎉 New Personal Best!</div>` : ''}
        </div>

        <div class="results-grid">
          <div class="stat-box">
            <div class="stat-label">Score</div>
            <div class="stat-value gold">${state.score}</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Accuracy</div>
            <div class="stat-value accent">${accuracy}%</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Correct</div>
            <div class="stat-value">${state.correct}</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Best Streak</div>
            <div class="stat-value ${state.maxStreak >= 5 ? 'accent' : ''}">${state.maxStreak}</div>
          </div>
        </div>

        ${state.history.length > 0 ? `
          <div class="section-label">Review</div>
          <div class="review-list">${reviewHTML}</div>
        ` : ''}

        <div class="result-buttons">
          <button class="btn secondary" id="homeBtn">Change Settings</button>
          <button class="btn" id="againBtn">Play Again</button>
        </div>
      </div>
    `;

    document.getElementById('homeBtn').addEventListener('click', () => {
      state.screen = 'home'; render();
    });
    document.getElementById('againBtn').addEventListener('click', startQuiz);
  }

  function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

  render();
})();
</script>
</body>
</html>
