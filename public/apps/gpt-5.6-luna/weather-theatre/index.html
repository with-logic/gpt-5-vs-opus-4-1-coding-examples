<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#13141b" />
    <title>Weather Theatre — Live Atmosphere</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Manrope:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500;1,600&display=swap" rel="stylesheet" />
    <style>
      :root {
        --ink: #f5efdf;
        --muted: #a9a69e;
        --dim: #77746f;
        --stage: #13141b;
        --stage-deep: #0d0e13;
        --brass: #e5bc72;
        --brass-bright: #f4d493;
        --brass-dim: #8c7044;
        --wine: #4e1720;
        --line: rgba(239, 220, 175, 0.17);
        --line-bright: rgba(239, 220, 175, 0.35);
        --cosy: #e9a761;
        --eerie: #a99be7;
        --heroic: #79bed1;
      }

      * { box-sizing: border-box; }

      html { background: var(--stage-deep); }

      body {
        margin: 0;
        min-width: 320px;
        color: var(--ink);
        background:
          radial-gradient(circle at 50% -16%, rgba(106, 80, 43, 0.19), transparent 40rem),
          var(--stage-deep);
        font-family: "Manrope", ui-sans-serif, sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      button, input { font: inherit; }
      button { color: inherit; }

      :focus-visible {
        outline: 2px solid var(--brass-bright);
        outline-offset: 4px;
      }

      .app { min-height: 100vh; padding: 28px 28px 34px; }

      .shell {
        width: min(1420px, 100%);
        margin: 0 auto;
      }

      .mono {
        font-family: "DM Mono", ui-monospace, monospace;
        font-size: 10px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .masthead {
        display: flex;
        align-items: center;
        justify-content: space-between;
        min-height: 62px;
        padding: 0 0 20px;
        border-bottom: 1px solid var(--line);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 15px;
      }

      .brand-mark {
        position: relative;
        display: grid;
        width: 37px;
        height: 37px;
        place-items: center;
        border: 1px solid var(--brass-dim);
        border-radius: 50%;
        color: var(--brass-bright);
      }

      .brand-mark::before,
      .brand-mark::after {
        position: absolute;
        content: "";
        border: 1px solid currentColor;
        border-radius: 50%;
        opacity: 0.65;
      }

      .brand-mark::before { width: 22px; height: 22px; }
      .brand-mark::after { width: 8px; height: 8px; background: var(--brass-bright); }

      .brand-wordmark {
        margin: 0;
        color: var(--ink);
        font-size: 14px;
        font-weight: 800;
        letter-spacing: 0.19em;
        line-height: 1;
        text-transform: uppercase;
      }

      .brand-kicker {
        margin: 7px 0 0;
        color: var(--dim);
        font-family: "DM Mono", ui-monospace, monospace;
        font-size: 9px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .masthead-right {
        display: flex;
        align-items: center;
        gap: 28px;
      }

      .live-readout { display: flex; align-items: center; gap: 10px; color: var(--muted); }
      .live-dot { width: 6px; height: 6px; border-radius: 50%; background: #e46958; box-shadow: 0 0 0 4px rgba(228, 105, 88, 0.13); }

      .mode-toggle {
        display: grid;
        grid-template-columns: 1fr 1fr;
        min-width: 188px;
        padding: 3px;
        border: 1px solid var(--line-bright);
        border-radius: 999px;
        background: rgba(255,255,255,0.03);
      }

      .mode-button {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        min-height: 29px;
        padding: 0 10px;
        border: 0;
        border-radius: 999px;
        color: var(--dim);
        background: transparent;
        cursor: pointer;
        font-family: "DM Mono", ui-monospace, monospace;
        font-size: 9px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        transition: background 220ms ease, color 220ms ease, box-shadow 220ms ease;
      }

      .mode-button:hover { color: var(--ink); }
      .mode-button.active { color: #25211a; background: var(--brass-bright); box-shadow: 0 3px 13px rgba(229, 188, 114, 0.16); }

      .hero-intro {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 30px;
        padding: 38px 2px 28px;
      }

      .eyebrow { display: flex; align-items: center; gap: 11px; color: var(--brass); }
      .eyebrow-rule { width: 34px; height: 1px; background: var(--brass); }

      .hero-title {
        max-width: 720px;
        margin: 15px 0 0;
        color: var(--ink);
        font-family: "Playfair Display", Georgia, serif;
        font-size: clamp(39px, 5vw, 70px);
        font-weight: 500;
        letter-spacing: -0.045em;
        line-height: 0.98;
      }

      .hero-title em { color: var(--brass-bright); font-weight: 500; }

      .hero-note {
        max-width: 245px;
        margin: 0 0 4px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.65;
      }

      .theatre-shell {
        position: relative;
        padding: 9px;
        overflow: hidden;
        border: 1px solid var(--line-bright);
        border-radius: 13px;
        background: #08090d;
        box-shadow: 0 22px 80px rgba(0,0,0,0.32), inset 0 0 0 1px rgba(255,255,255,0.04);
      }

      .theatre-shell::before {
        position: absolute;
        z-index: 1;
        inset: 4px;
        border: 1px solid rgba(242, 209, 145, 0.17);
        border-radius: 9px;
        content: "";
        pointer-events: none;
      }

      .stage-viewport {
        position: relative;
        isolation: isolate;
        aspect-ratio: 16 / 8.55;
        min-height: 570px;
        overflow: hidden;
        border-radius: 7px;
        background: #171922;
      }

      .weather-canvas { display: block; width: 100%; height: 100%; }

      .stage-vignette {
        position: absolute;
        z-index: 3;
        inset: 0;
        background:
          linear-gradient(180deg, rgba(2, 4, 8, 0.43), transparent 17%, transparent 65%, rgba(4, 4, 7, 0.6)),
          radial-gradient(ellipse at center, transparent 37%, rgba(2, 3, 7, 0.47) 100%);
        pointer-events: none;
      }

      .stage-topline {
        position: absolute;
        z-index: 5;
        top: 25px;
        left: 31px;
        right: 31px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        color: rgba(247, 232, 198, 0.78);
      }

      .stage-topline .mono { font-size: 9px; }
      .stage-topline-right { display: flex; align-items: center; gap: 17px; }
      .topline-marker { display: inline-block; width: 4px; height: 4px; margin-right: 6px; border-radius: 50%; background: var(--brass); vertical-align: 1px; }

      .scene-tag {
        position: absolute;
        z-index: 6;
        top: 65px;
        left: 31px;
        max-width: 270px;
        color: rgba(255, 246, 226, 0.88);
      }

      .scene-tag-title { margin: 8px 0 0; font-family: "Playfair Display", Georgia, serif; font-size: 24px; letter-spacing: -0.03em; }
      .scene-tag-rule { width: 58px; height: 1px; margin-top: 13px; background: var(--brass); }

      .forecast-card {
        position: absolute;
        z-index: 6;
        right: 34px;
        bottom: 32px;
        width: min(420px, calc(100% - 62px));
        padding: 21px 23px 18px;
        border: 1px solid rgba(245, 224, 178, 0.35);
        border-radius: 9px;
        background: rgba(15, 17, 23, 0.74);
        box-shadow: 0 19px 40px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.07);
        -webkit-backdrop-filter: blur(13px);
        backdrop-filter: blur(13px);
      }

      .forecast-card-head { display: flex; align-items: center; justify-content: space-between; padding-bottom: 15px; border-bottom: 1px solid rgba(240, 215, 166, 0.16); }
      .forecast-card-label { color: var(--brass); }
      .forecast-card-time { color: var(--dim); font-size: 10px; }
      .forecast-main { display: flex; align-items: center; justify-content: space-between; padding: 16px 0 13px; }
      .temperature { display: flex; align-items: start; color: var(--ink); font-family: "Playfair Display", Georgia, serif; font-size: 61px; font-weight: 500; letter-spacing: -0.08em; line-height: 0.85; }
      .temperature sup { margin: 2px 0 0 5px; color: var(--brass-bright); font-family: "Manrope", sans-serif; font-size: 23px; font-weight: 500; letter-spacing: 0; }
      .condition { margin-left: 10px; color: var(--ink); font-family: "Playfair Display", Georgia, serif; font-size: 17px; font-style: italic; }
      .condition-detail { margin: 8px 0 0; color: var(--muted); font-size: 10px; letter-spacing: 0.02em; }

      .forecast-metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding-top: 13px; border-top: 1px solid rgba(240, 215, 166, 0.16); }
      .metric-label { color: var(--dim); font-size: 9px; letter-spacing: 0.11em; text-transform: uppercase; }
      .metric-value { margin-top: 5px; color: #e8e0d0; font-family: "DM Mono", ui-monospace, monospace; font-size: 11px; }

      .reveal-button {
        position: absolute;
        z-index: 8;
        right: 32px;
        top: 66px;
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 8px 11px;
        border: 1px solid rgba(242, 210, 150, 0.28);
        border-radius: 999px;
        color: rgba(255, 237, 191, 0.84);
        background: rgba(8, 9, 13, 0.34);
        cursor: pointer;
        font-family: "DM Mono", ui-monospace, monospace;
        font-size: 9px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        transition: background 180ms ease, border-color 180ms ease;
      }

      .reveal-button:hover { border-color: var(--brass); background: rgba(8, 9, 13, 0.65); }
      .reveal-button svg { width: 12px; height: 12px; }

      .typewriter {
        position: absolute;
        z-index: 6;
        bottom: 34px;
        left: 32px;
        max-width: min(430px, 45%);
        margin: 0;
        color: rgba(255, 241, 211, 0.94);
        font-family: "Playfair Display", Georgia, serif;
        font-size: clamp(17px, 2vw, 24px);
        font-style: italic;
        letter-spacing: -0.025em;
        line-height: 1.24;
        text-shadow: 0 2px 16px rgba(0,0,0,0.42);
      }

      .typewriter::after { display: inline-block; width: 6px; height: 20px; margin-left: 5px; background: var(--brass-bright); content: ""; animation: cursor-blink 900ms steps(1) infinite; vertical-align: -2px; }
      @keyframes cursor-blink { 50% { opacity: 0; } }

      .curtain {
        position: absolute;
        z-index: 10;
        top: -3%;
        width: 29%;
        height: 108%;
        background:
          radial-gradient(ellipse at 14% 52%, rgba(198, 66, 51, 0.38), transparent 21%),
          radial-gradient(ellipse at 43% 48%, rgba(33, 2, 12, 0.56), transparent 24%),
          radial-gradient(ellipse at 74% 48%, rgba(181, 54, 42, 0.25), transparent 23%),
          repeating-linear-gradient(88deg, #321018 0 8%, #731c27 10%, #43111a 16%, #861f29 21%, #2c0d15 28%);
        box-shadow: inset -22px 0 25px rgba(12, 1, 6, 0.46), inset 0 0 55px rgba(20, 0, 7, 0.44), 8px 0 20px rgba(0,0,0,0.25);
        transition: transform 1.9s cubic-bezier(0.77, 0, 0.17, 1);
        pointer-events: none;
      }

      .curtain::before { position: absolute; inset: 0; background: linear-gradient(90deg, rgba(255, 114, 73, 0.06), transparent 28%, rgba(5, 0, 4, 0.18) 46%, transparent 68%, rgba(255, 96, 69, 0.06)); content: ""; }
      .curtain::after { position: absolute; bottom: 7%; left: 2%; width: 93%; height: 12px; border-radius: 50%; background: rgba(20, 2, 7, 0.43); box-shadow: 0 2px 0 rgba(185, 60, 43, 0.21); content: ""; filter: blur(5px); }
      .curtain-left { left: -2%; transform-origin: left center; }
      .curtain-right { right: -2%; transform: scaleX(-1); transform-origin: right center; }
      .curtain-left.revealed { transform: translateX(-111%); }
      .curtain-right.revealed { transform: scaleX(-1) translateX(-111%); }

      .curtain-valance {
        position: absolute;
        z-index: 11;
        top: -2px;
        left: 23%;
        width: 54%;
        height: 45px;
        border-radius: 0 0 50% 50%;
        background: repeating-linear-gradient(100deg, #350e17 0 9%, #7d1e29 13%, #430f18 21%, #871f29 27%);
        box-shadow: 0 10px 17px rgba(0,0,0,0.31), inset 0 -6px 8px rgba(20,0,6,0.31);
        transition: transform 1.9s 0.12s cubic-bezier(0.77, 0, 0.17, 1), opacity 1s 1s;
        transform-origin: top center;
      }

      .curtain-valance.revealed { transform: translateY(-120%); opacity: 0; }

      .bottom-caption {
        display: flex;
        align-items: center;
        justify-content: space-between;
        min-height: 52px;
        padding: 0 4px;
        color: var(--dim);
      }

      .bottom-caption strong { color: var(--brass); font-weight: 500; }
      .caption-right { display: flex; align-items: center; gap: 11px; }
      .caption-pin { width: 5px; height: 5px; border: 1px solid var(--brass); border-radius: 50%; }

      .director-desk {
        display: grid;
        grid-template-columns: 0.8fr 1.75fr;
        gap: 48px;
        margin-top: 31px;
        padding: 30px 3px 0;
        border-top: 1px solid var(--line);
      }

      .desk-heading { margin: 0; color: var(--ink); font-family: "Playfair Display", Georgia, serif; font-size: 29px; font-weight: 500; letter-spacing: -0.035em; }
      .desk-copy { max-width: 270px; margin: 11px 0 0; color: var(--muted); font-size: 12px; line-height: 1.65; }
      .desk-status { display: flex; align-items: center; gap: 8px; margin-top: 23px; color: var(--brass); }
      .status-light { width: 6px; height: 6px; border-radius: 50%; background: var(--brass); box-shadow: 0 0 0 4px rgba(229,188,114,0.1); }

      .slider-stack { display: grid; gap: 24px; padding: 2px 0; }
      .slider-row { display: grid; grid-template-columns: 122px minmax(150px, 1fr) 34px; align-items: center; gap: 17px; }
      .slider-label { display: flex; align-items: center; gap: 9px; color: #e4ded1; font-size: 12px; font-weight: 600; }
      .mood-symbol { display: grid; width: 20px; height: 20px; place-items: center; border: 1px solid currentColor; border-radius: 50%; font-family: Georgia, serif; font-size: 12px; font-style: italic; }
      .slider-sub { display: block; margin: 4px 0 0 29px; color: var(--dim); font-family: "DM Mono", ui-monospace, monospace; font-size: 8px; letter-spacing: 0.05em; text-transform: uppercase; }
      .slider-value { color: var(--brass-bright); font-family: "DM Mono", ui-monospace, monospace; font-size: 11px; text-align: right; }

      input[type="range"] { width: 100%; height: 18px; margin: 0; appearance: none; background: transparent; cursor: pointer; }
      input[type="range"]::-webkit-slider-runnable-track { height: 2px; border-radius: 99px; background: linear-gradient(90deg, var(--slider-color) 0%, var(--slider-color) var(--progress), rgba(255,255,255,0.14) var(--progress), rgba(255,255,255,0.14) 100%); }
      input[type="range"]::-moz-range-track { height: 2px; border-radius: 99px; background: rgba(255,255,255,0.14); }
      input[type="range"]::-moz-range-progress { height: 2px; border-radius: 99px; background: var(--slider-color); }
      input[type="range"]::-webkit-slider-thumb { width: 13px; height: 13px; margin-top: -5px; border: 2px solid var(--stage-deep); border-radius: 50%; appearance: none; background: var(--slider-color); box-shadow: 0 0 0 1px var(--slider-color), 0 0 10px color-mix(in srgb, var(--slider-color) 34%, transparent); }
      input[type="range"]::-moz-range-thumb { width: 10px; height: 10px; border: 2px solid var(--stage-deep); border-radius: 50%; background: var(--slider-color); box-shadow: 0 0 0 1px var(--slider-color); }

      .forecast-section { margin-top: 49px; padding-top: 24px; border-top: 1px solid var(--line); }
      .section-heading-row { display: flex; align-items: baseline; justify-content: space-between; gap: 20px; }
      .section-title { margin: 0; font-family: "Playfair Display", Georgia, serif; font-size: 25px; font-weight: 500; letter-spacing: -0.03em; }
      .section-note { color: var(--dim); }

      .forecast-rail { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1px; margin-top: 18px; overflow: hidden; border: 1px solid var(--line); border-radius: 8px; background: var(--line); }
      .day-card { min-height: 135px; padding: 17px 18px; background: rgba(255,255,255,0.025); transition: background 200ms ease, transform 200ms ease; }
      .day-card:hover { background: rgba(255,255,255,0.06); transform: translateY(-2px); }
      .day-card.today { background: rgba(229, 188, 114, 0.09); }
      .day-top { display: flex; align-items: center; justify-content: space-between; color: var(--dim); }
      .day-card.today .day-top { color: var(--brass-bright); }
      .day-icon { margin: 18px 0 13px; color: var(--brass); }
      .day-icon svg { width: 23px; height: 23px; }
      .day-condition { color: #c4c0b7; font-family: "DM Mono", ui-monospace, monospace; font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; }
      .day-temps { display: flex; align-items: baseline; gap: 6px; margin-top: 5px; font-family: "Playfair Display", Georgia, serif; font-size: 18px; }
      .day-temps .low { color: var(--dim); font-size: 13px; }

      .footer { display: flex; justify-content: space-between; gap: 20px; margin-top: 26px; padding: 0 2px; color: #5c5b58; }
      .footer span { color: #838078; }

      @keyframes soft-rise { from { opacity: 0; transform: translateY(11px); } to { opacity: 1; transform: translateY(0); } }
      .masthead, .hero-intro, .theatre-shell, .director-desk, .forecast-section { animation: soft-rise 700ms both; }
      .hero-intro { animation-delay: 80ms; }
      .theatre-shell { animation-delay: 140ms; }
      .director-desk { animation-delay: 230ms; }
      .forecast-section { animation-delay: 300ms; }

      @media (max-width: 900px) {
        .app { padding: 20px 16px 25px; }
        .masthead-right { gap: 12px; }
        .live-readout { display: none; }
        .hero-intro { display: block; padding-top: 31px; }
        .hero-note { margin-top: 16px; }
        .stage-viewport { min-height: 565px; aspect-ratio: auto; }
        .stage-topline { top: 21px; left: 21px; right: 21px; }
        .scene-tag { top: 60px; left: 21px; }
        .reveal-button { top: 62px; right: 21px; }
        .forecast-card { right: 21px; bottom: 22px; width: calc(100% - 42px); }
        .typewriter { bottom: 181px; left: 21px; max-width: calc(100% - 42px); font-size: 18px; }
        .director-desk { grid-template-columns: 1fr; gap: 24px; }
        .desk-copy { max-width: 520px; }
        .desk-status { margin-top: 17px; }
      }

      @media (max-width: 580px) {
        .masthead { align-items: flex-start; }
        .brand-kicker { display: none; }
        .brand-wordmark { font-size: 12px; }
        .brand-mark { width: 31px; height: 31px; }
        .brand-mark::before { width: 18px; height: 18px; }
        .brand-mark::after { width: 6px; height: 6px; }
        .mode-toggle { min-width: 154px; }
        .mode-button { padding: 0 7px; font-size: 8px; }
        .hero-title { font-size: 41px; }
        .stage-viewport { min-height: 625px; }
        .stage-topline-right { gap: 8px; }
        .stage-topline-right .location { display: none; }
        .scene-tag-title { font-size: 21px; }
        .reveal-button { top: 100px; }
        .typewriter { bottom: 184px; font-size: 17px; }
        .forecast-card { padding: 17px 17px 15px; }
        .temperature { font-size: 54px; }
        .forecast-card-time { font-size: 9px; }
        .slider-row { grid-template-columns: 105px minmax(80px, 1fr) 30px; gap: 11px; }
        .slider-label { font-size: 11px; }
        .slider-sub { font-size: 7px; }
        .forecast-rail { grid-template-columns: repeat(5, minmax(91px, 1fr)); overflow-x: auto; }
        .day-card { min-width: 91px; padding: 14px 13px; }
        .footer { display: block; line-height: 1.8; }
      }

      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after { scroll-behavior: auto !important; animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel">
      const { useEffect, useMemo, useRef, useState } = React;

      const forecast = [
        { day: "FRI", date: "18 OCT", high: "11°", low: "6°", condition: "DRIZZLE", icon: "rain" },
        { day: "SAT", date: "19 OCT", high: "13°", low: "8°", condition: "BRIGHT", icon: "sun" },
        { day: "SUN", date: "20 OCT", high: "12°", low: "7°", condition: "VEIL", icon: "veil" },
        { day: "MON", date: "21 OCT", high: "9°", low: "4°", condition: "RAIN", icon: "rain" },
        { day: "TUE", date: "22 OCT", high: "10°", low: "5°", condition: "CLEAR", icon: "moon" }
      ];

      const initialMood = { cosy: 58, eerie: 28, heroic: 46 };

      const iconPaths = {
        sun: <><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.42 1.42M17.65 17.65l1.42 1.42M2 12h2M20 12h2M4.93 19.07l1.42-1.42M17.65 6.35l1.42-1.42"/></>,
        moon: <path d="M20.2 15.3A8.5 8.5 0 0 1 8.7 3.8 8.52 8.52 0 1 0 20.2 15.3Z"/>,
        rain: <><path d="M5 16.5h10.4a3.6 3.6 0 1 0-.6-7.15A5.1 5.1 0 0 0 5.4 8.5a4 4 0 0 0-.4 8Z"/><path d="m8 19-1 2M13 19l-1 2M18 19l-1 2"/></>,
        veil: <><path d="M4 10a4.2 4.2 0 0 1 7.8-2.2A4.5 4.5 0 1 1 16 16H6a4 4 0 0 1-2-6Z"/><path d="M4 19h16M7 22h10"/></>,
        wind: <><path d="M3 8h12.5a2.5 2.5 0 1 0-2.3-3.5M3 12h16a2.5 2.5 0 1 1-2.3 3.5M3 16h9"/></>,
        replay: <><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v6h6"/></>
      };

      function LineIcon({ name, size = 18, strokeWidth = 1.35 }) {
        return <svg aria-hidden="true" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round">{iconPaths[name]}</svg>;
      }

      function WeatherIcon({ name }) {
        return <LineIcon name={name} size={23} />;
      }

      function ModeToggle({ mode, setMode }) {
        return (
          <div className="mode-toggle" aria-label="Choose atmosphere lighting">
            <button className={`mode-button ${mode === "matinee" ? "active" : ""}`} onClick={() => setMode("matinee")} aria-pressed={mode === "matinee"}>
              <LineIcon name="sun" size={13} /> Matinée
            </button>
            <button className={`mode-button ${mode === "night" ? "active" : ""}`} onClick={() => setMode("night")} aria-pressed={mode === "night"}>
              <LineIcon name="moon" size={13} /> Night
            </button>
          </div>
        );
      }

      function SliderControl({ id, label, desc, symbol, color, value, onChange }) {
        return (
          <div className="slider-row">
            <label htmlFor={id}>
              <span className="slider-label" style={{ color }}><span className="mood-symbol">{symbol}</span>{label}</span>
              <span className="slider-sub">{desc}</span>
            </label>
            <input id={id} type="range" min="0" max="100" value={value} aria-label={`${label} atmosphere`} onChange={(event) => onChange(Number(event.target.value))} style={{ "--slider-color": color, "--progress": `${value}%` }} />
            <span className="slider-value">{String(value).padStart(2, "0")}</span>
          </div>
        );
      }

      function ForecastCard({ mode }) {
        return (
          <article className="forecast-card" aria-label="Current fictional weather">
            <div className="forecast-card-head">
              <span className="forecast-card-label mono">Current conditions</span>
              <span className="forecast-card-time mono">07:42 {mode === "night" ? "PM" : "AM"}</span>
            </div>
            <div className="forecast-main">
              <div>
                <div className="temperature">7<sup>°C</sup></div>
                <div className="condition">Light rain</div>
                <p className="condition-detail">A clean break after dusk</p>
              </div>
              <LineIcon name="rain" size={53} strokeWidth={0.85} />
            </div>
            <div className="forecast-metrics">
              <div><div className="metric-label mono">Feels like</div><div className="metric-value">5°</div></div>
              <div><div className="metric-label mono">Wind</div><div className="metric-value">SW · 18</div></div>
              <div><div className="metric-label mono">Humidity</div><div className="metric-value">82%</div></div>
            </div>
          </article>
        );
      }

      function sceneFor(mood, mode) {
        const { cosy, eerie, heroic } = mood;
        if (mode === "night" && eerie >= cosy && eerie >= heroic) return "The rain rehearses in the dark, each drop finding its mark.";
        if (heroic >= cosy && heroic >= eerie) return mode === "night" ? "A silver front rolls in; the whole horizon takes a bow." : "The west wind lifts its chin and lets the weather take the stage.";
        if (eerie >= cosy) return mode === "night" ? "The footlights fade to blue; something soft moves behind the rain." : "A little fog at the wings, and a secret in the afternoon light.";
        return mode === "night" ? "Warm windows glow through the drizzle; the night knows your name." : "A tender rain, brass light, and nowhere else you need to be.";
      }

      function leadingMood(mood) {
        return Object.entries(mood).sort((a, b) => b[1] - a[1])[0][0];
      }

      function WeatherCanvas({ mood, mode }) {
        const canvasRef = useRef(null);
        const valuesRef = useRef({ mood, mode });

        useEffect(() => { valuesRef.current = { mood, mode }; }, [mood, mode]);

        useEffect(() => {
          const canvas = canvasRef.current;
          const host = canvas.parentElement;
          const ctx = canvas.getContext("2d");
          const size = { width: 0, height: 0, dpr: 1 };
          let frame;

          const resize = () => {
            const rect = host.getBoundingClientRect();
            size.width = Math.max(1, rect.width);
            size.height = Math.max(1, rect.height);
            size.dpr = Math.min(window.devicePixelRatio || 1, 2);
            canvas.width = Math.floor(size.width * size.dpr);
            canvas.height = Math.floor(size.height * size.dpr);
            ctx.setTransform(size.dpr, 0, 0, size.dpr, 0, 0);
          };

          resize();
          const observer = new ResizeObserver(resize);
          observer.observe(host);

          const render = (time) => {
            drawWeather(ctx, size.width, size.height, time, valuesRef.current.mood, valuesRef.current.mode);
            frame = requestAnimationFrame(render);
          };
          frame = requestAnimationFrame(render);

          return () => { cancelAnimationFrame(frame); observer.disconnect(); };
        }, []);

        return <canvas ref={canvasRef} className="weather-canvas" role="img" aria-label="Animated weather theatre scene with rain, mountains, clouds and sweeping spotlights" />;
      }

      function drawWeather(ctx, width, height, time, mood, mode) {
        const t = time * 0.001;
        const cosy = mood.cosy / 100;
        const eerie = mood.eerie / 100;
        const heroic = mood.heroic / 100;
        const night = mode === "night";
        const centerX = width * 0.5;
        const horizon = height * (0.64 - heroic * 0.045 + eerie * 0.025);
        const cycle = Math.sin(t * 0.18);

        const topColor = night ? mixColor("#10182b", "#261b3a", eerie * 0.75) : mixColor("#9bb9c8", "#9b7798", eerie * 0.35);
        const bottomColor = night ? mixColor("#25233b", "#161621", eerie * 0.55) : mixColor("#f6d8b5", "#cdb4ce", eerie * 0.34);
        const sky = ctx.createLinearGradient(0, 0, 0, height);
        sky.addColorStop(0, topColor);
        sky.addColorStop(0.56, bottomColor);
        sky.addColorStop(1, night ? "#15141d" : "#574d51");
        ctx.fillStyle = sky;
        ctx.fillRect(0, 0, width, height);

        const atmosphericGlow = ctx.createRadialGradient(width * (0.68 + cycle * 0.04), height * 0.34, 0, width * 0.68, height * 0.34, width * 0.56);
        atmosphericGlow.addColorStop(0, night ? `rgba(126, 147, 210, ${0.1 + eerie * 0.08})` : `rgba(255, 222, 174, ${0.29 + cosy * 0.13})`);
        atmosphericGlow.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = atmosphericGlow;
        ctx.fillRect(0, 0, width, horizon + 40);

        drawStars(ctx, width, height, night, eerie, t);
        drawMoonOrSun(ctx, width, height, night, cosy, eerie, t);
        drawClouds(ctx, width, height, night, cosy, eerie, t);

        drawMountainRange(ctx, width, height, horizon + 15, 0.22, night ? "#252b42" : "#9ca5a7", 0.26, t, heroic);
        drawMountainRange(ctx, width, height, horizon + 27, 0.3, night ? "#1d2031" : "#6f777d", 0.48, t, eerie);
        drawHazeBands(ctx, width, horizon, night, eerie, cosy);
        drawHillside(ctx, width, height, horizon + 82, night, heroic, t);
        drawTrees(ctx, width, height, horizon + 92, night, cosy, eerie, t);

        const floor = ctx.createLinearGradient(0, horizon + 105, 0, height);
        floor.addColorStop(0, night ? "#181722" : "#45373c");
        floor.addColorStop(1, night ? "#0b0b11" : "#201b22");
        ctx.fillStyle = floor;
        ctx.fillRect(0, horizon + 94, width, height - horizon);
        drawStageFloor(ctx, width, height, horizon + 96, heroic, t);
        drawRain(ctx, width, height, horizon, cosy, eerie, heroic, t);
        drawSpotlights(ctx, width, height, night, cosy, eerie, heroic, t);
        drawAtmosphere(ctx, width, height, night, cosy, eerie, t);
      }

      function mixColor(a, b, amount) {
        const A = hexRgb(a), B = hexRgb(b), n = Math.max(0, Math.min(1, amount));
        return `rgb(${Math.round(A[0] + (B[0] - A[0]) * n)}, ${Math.round(A[1] + (B[1] - A[1]) * n)}, ${Math.round(A[2] + (B[2] - A[2]) * n)})`;
      }

      function hexRgb(hex) { return [parseInt(hex.slice(1, 3), 16), parseInt(hex.slice(3, 5), 16), parseInt(hex.slice(5, 7), 16)]; }

      function drawStars(ctx, width, height, night, eerie, t) {
        if (!night && eerie < 0.36) return;
        const alpha = night ? 0.43 + eerie * 0.3 : eerie * 0.14;
        for (let i = 0; i < 62; i++) {
          const x = ((i * 177.31) % width + Math.sin(i * 2.4) * 17 + width) % width;
          const y = 28 + ((i * 61.17) % (height * 0.44));
          const size = 0.45 + ((i * 13) % 10) / 10;
          const pulse = 0.55 + Math.sin(t * 1.2 + i * 1.9) * 0.45;
          ctx.globalAlpha = alpha * pulse;
          ctx.fillStyle = i % 9 === 0 ? "#f3d9a6" : "#d1daf2";
          ctx.beginPath(); ctx.arc(x, y, size, 0, Math.PI * 2); ctx.fill();
        }
        ctx.globalAlpha = 1;
      }

      function drawMoonOrSun(ctx, width, height, night, cosy, eerie, t) {
        const x = width * (0.74 + Math.sin(t * 0.12) * 0.012);
        const y = height * (night ? 0.23 : 0.27);
        const r = Math.min(width, height) * 0.065;
        const glow = ctx.createRadialGradient(x, y, 0, x, y, r * 4.5);
        glow.addColorStop(0, night ? `rgba(196, 208, 239, ${0.15 + eerie * 0.08})` : `rgba(255, 225, 174, ${0.23 + cosy * 0.1})`);
        glow.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = glow; ctx.fillRect(x - r * 5, y - r * 5, r * 10, r * 10);
        ctx.fillStyle = night ? "#d7d9dc" : "#ffe0a0";
        ctx.globalAlpha = 0.9;
        ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
        if (night) { ctx.fillStyle = topColorForNight(eerie); ctx.beginPath(); ctx.arc(x + r * 0.36, y - r * 0.25, r * 0.86, 0, Math.PI * 2); ctx.fill(); }
        ctx.globalAlpha = 1;
      }

      function topColorForNight(eerie) { return mixColor("#10182b", "#261b3a", eerie * 0.75); }

      function drawClouds(ctx, width, height, night, cosy, eerie, t) {
        const cloudColor = night ? `rgba(60, 64, 90, ${0.17 + eerie * 0.12})` : `rgba(247, 239, 220, ${0.27 + cosy * 0.1})`;
        const cloudColorDark = night ? `rgba(15, 19, 35, ${0.35 + eerie * 0.16})` : `rgba(157, 166, 176, ${0.14 + eerie * 0.16})`;
        const clouds = [
          { x: 0.05, y: 0.28, scale: 1.1, speed: 0.9 },
          { x: 0.48, y: 0.16, scale: 0.72, speed: -0.55 },
          { x: 0.72, y: 0.39, scale: 1.25, speed: 0.38 }
        ];
        clouds.forEach((cloud, index) => {
          const w = width * 0.25 * cloud.scale;
          const x = ((cloud.x * width + Math.sin(t * 0.05 * cloud.speed + index) * width * 0.035) % (width + w * 1.8)) - w * 0.42;
          const y = height * cloud.y;
          ctx.fillStyle = index === 2 ? cloudColorDark : cloudColor;
          ctx.beginPath();
          ctx.ellipse(x, y, w * 0.34, w * 0.09, 0, 0, Math.PI * 2);
          ctx.ellipse(x + w * 0.24, y - w * 0.045, w * 0.22, w * 0.14, 0, 0, Math.PI * 2);
          ctx.ellipse(x - w * 0.2, y - w * 0.02, w * 0.18, w * 0.11, 0, 0, Math.PI * 2);
          ctx.fill();
        });
      }

      function drawMountainRange(ctx, width, height, base, heightRatio, color, offset, t, mood) {
        const movement = Math.sin(t * 0.08 + offset * 8) * width * 0.012;
        ctx.fillStyle = color;
        ctx.globalAlpha = 0.67 + mood * 0.12;
        ctx.beginPath();
        ctx.moveTo(-50, base + 40);
        for (let i = -1; i < 8; i++) {
          const x = i * width * 0.18 + movement;
          const peak = base - height * heightRatio * (0.55 + ((i * 17) % 5) / 12);
          ctx.lineTo(x + width * 0.09, peak);
          ctx.lineTo(x + width * 0.24, base + ((i % 2) * 13));
        }
        ctx.lineTo(width + 50, height); ctx.lineTo(-50, height); ctx.closePath(); ctx.fill();
        ctx.globalAlpha = 1;
      }

      function drawHazeBands(ctx, width, horizon, night, eerie, cosy) {
        for (let i = 0; i < 3; i++) {
          const band = ctx.createLinearGradient(0, horizon - 50 + i * 27, 0, horizon + 30 + i * 27);
          band.addColorStop(0, night ? `rgba(105, 108, 140, ${0.05 + eerie * 0.04})` : `rgba(247, 223, 190, ${0.10 + cosy * 0.04})`);
          band.addColorStop(1, "rgba(0,0,0,0)");
          ctx.fillStyle = band; ctx.fillRect(0, horizon - 50 + i * 27, width, 80);
        }
      }

      function drawHillside(ctx, width, height, base, night, heroic, t) {
        ctx.fillStyle = night ? "#181a29" : "#52605f";
        ctx.globalAlpha = 0.84;
        ctx.beginPath();
        ctx.moveTo(0, base + 30);
        ctx.bezierCurveTo(width * 0.17, base - 45 - heroic * 20, width * 0.32, base + 2, width * 0.51, base - 25);
        ctx.bezierCurveTo(width * 0.68, base - 70 - heroic * 17, width * 0.84, base - 23, width, base - 44);
        ctx.lineTo(width, height); ctx.lineTo(0, height); ctx.closePath(); ctx.fill();
        ctx.globalAlpha = 1;
      }

      function drawTrees(ctx, width, height, base, night, cosy, eerie, t) {
        const count = Math.floor(width / 16);
        for (let i = 0; i < count; i++) {
          const x = i * 16 + ((i * 31) % 10) - 5;
          const sway = Math.sin(t * 0.8 + i * 1.2) * (2 + cosy * 2);
          const size = 23 + ((i * 19) % 17) + eerie * 6;
          const color = night ? (i % 4 === 0 ? "#111521" : "#141a24") : (i % 3 === 0 ? "#33463f" : "#273b38");
          ctx.fillStyle = color;
          ctx.beginPath();
          ctx.moveTo(x + sway, base + 12);
          ctx.lineTo(x + size * 0.5 + sway, base - size);
          ctx.lineTo(x + size + sway, base + 12);
          ctx.closePath(); ctx.fill();
        }
      }

      function drawStageFloor(ctx, width, height, floorTop, heroic, t) {
        ctx.save();
        ctx.globalAlpha = 0.17 + heroic * 0.11;
        ctx.strokeStyle = "#e4b86f";
        ctx.lineWidth = 1;
        for (let i = -7; i <= 7; i++) {
          ctx.beginPath(); ctx.moveTo(width * 0.5, floorTop + 3); ctx.lineTo(width * 0.5 + i * width * 0.19, height); ctx.stroke();
        }
        for (let i = 1; i < 6; i++) {
          const y = floorTop + Math.pow(i / 6, 1.8) * (height - floorTop);
          ctx.globalAlpha = 0.07 + heroic * 0.05;
          ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(width, y); ctx.stroke();
        }
        const pool = ctx.createRadialGradient(width * (0.52 + Math.sin(t * 0.2) * 0.06), floorTop + 14, 0, width * 0.5, floorTop + 15, width * 0.48);
        pool.addColorStop(0, `rgba(229, 188, 114, ${0.13 + heroic * 0.11})`); pool.addColorStop(1, "rgba(229,188,114,0)");
        ctx.globalAlpha = 1; ctx.fillStyle = pool; ctx.fillRect(0, floorTop, width, height - floorTop);
        ctx.restore();
      }

      function drawRain(ctx, width, height, horizon, cosy, eerie, heroic, t) {
        const count = Math.floor(16 + eerie * 38 + heroic * 22);
        ctx.save();
        ctx.lineWidth = 1;
        for (let i = 0; i < count; i++) {
          const x = ((i * 93.7 + t * (52 + heroic * 35) * (i % 3 + 1)) % (width + 50)) - 25;
          const y = ((i * 52.4 + t * (95 + heroic * 40)) % (height + 160)) - 140;
          const length = 5 + eerie * 9 + (i % 4) * 2;
          const alpha = 0.12 + eerie * 0.13 + heroic * 0.09;
          ctx.strokeStyle = `rgba(221, 227, 237, ${alpha})`;
          ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x - 2.2, y + length); ctx.stroke();
        }
        if (heroic > 0.55) {
          ctx.strokeStyle = `rgba(236, 223, 178, ${0.13 + heroic * 0.11})`;
          ctx.lineWidth = 1.5;
          ctx.beginPath(); ctx.moveTo(width * 0.18, 0); ctx.lineTo(width * 0.2, horizon + 100); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(width * 0.81, 0); ctx.lineTo(width * 0.78, horizon + 150); ctx.stroke();
        }
        ctx.restore();
      }

      function drawSpotlights(ctx, width, height, night, cosy, eerie, heroic, t) {
        const sweepA = Math.sin(t * 0.35) * 0.23;
        const sweepB = Math.cos(t * 0.22 + 1.4) * 0.19;
        ctx.save();
        ctx.globalCompositeOperation = "screen";
        drawBeam(ctx, width, height, 0.32 + sweepA, night ? "rgba(129, 154, 221, 0.055)" : `rgba(255, 216, 166, ${0.052 + cosy * 0.035})`, -0.29, 0.24);
        drawBeam(ctx, width, height, 0.75 + sweepB, night ? `rgba(154, 179, 237, ${0.035 + eerie * 0.04})` : `rgba(255, 225, 175, ${0.04 + heroic * 0.035})`, 0.28, 0.2);
        ctx.restore();
      }

      function drawBeam(ctx, width, height, x, color, tilt, spread) {
        const topX = x * width;
        const bottomLeft = topX + tilt * width;
        const bottomRight = topX + (tilt + spread) * width;
        const gradient = ctx.createLinearGradient(topX, 0, topX + tilt * width, height * 0.76);
        gradient.addColorStop(0, color); gradient.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = gradient;
        ctx.beginPath(); ctx.moveTo(topX - 10, -10); ctx.lineTo(topX + 18, -10); ctx.lineTo(bottomRight, height * 0.83); ctx.lineTo(bottomLeft, height * 0.83); ctx.closePath(); ctx.fill();
      }

      function drawAtmosphere(ctx, width, height, night, cosy, eerie, t) {
        const haze = ctx.createLinearGradient(0, height * 0.57, 0, height);
        haze.addColorStop(0, "rgba(237, 202, 160, 0)");
        haze.addColorStop(0.76, night ? `rgba(111, 104, 144, ${0.025 + eerie * 0.05})` : `rgba(219, 183, 152, ${0.04 + cosy * 0.04})`);
        haze.addColorStop(1, night ? "rgba(2, 3, 8, 0.22)" : "rgba(18, 13, 17, 0.3)");
        ctx.fillStyle = haze; ctx.fillRect(0, height * 0.56, width, height * 0.44);
        ctx.globalAlpha = 0.08 + eerie * 0.04;
        ctx.fillStyle = night ? "#b7bde1" : "#ffe6b8";
        for (let i = 0; i < 8; i++) {
          const x = ((i * 243 + t * 8) % (width + 130)) - 65;
          ctx.fillRect(x, height * (0.54 + (i % 3) * 0.06), 1, height * 0.25);
        }
        ctx.globalAlpha = 1;
      }

      function DayCard({ day, index }) {
        return (
          <article className={`day-card ${index === 0 ? "today" : ""}`}>
            <div className="day-top mono"><span>{day.day}</span><span>{day.date}</span></div>
            <div className="day-icon"><WeatherIcon name={day.icon} /></div>
            <div className="day-condition">{day.condition}</div>
            <div className="day-temps"><span>{day.high}</span><span className="low">{day.low}</span></div>
          </article>
        );
      }

      function App() {
        const [mode, setMode] = useState("matinee");
        const [mood, setMood] = useState(initialMood);
        const [revealed, setRevealed] = useState(false);
        const [typedScene, setTypedScene] = useState("");
        const scene = useMemo(() => sceneFor(mood, mode), [mood, mode]);
        const leadMood = leadingMood(mood);

        useEffect(() => {
          const enterTimer = setTimeout(() => setRevealed(true), 280);
          return () => clearTimeout(enterTimer);
        }, []);

        useEffect(() => {
          setTypedScene("");
          let index = 0;
          const typing = window.matchMedia("(prefers-reduced-motion: reduce)").matches ? 2 : 25;
          const typeTimer = setInterval(() => {
            index += 1;
            setTypedScene(scene.slice(0, index));
            if (index >= scene.length) clearInterval(typeTimer);
          }, typing);
          return () => clearInterval(typeTimer);
        }, [scene]);

        const setMoodValue = (key, value) => setMood((current) => ({ ...current, [key]: value }));
        const replayReveal = () => {
          setRevealed(false);
          window.setTimeout(() => setRevealed(true), 90);
        };

        return (
          <div className="app">
            <div className="shell">
              <header className="masthead">
                <div className="brand">
                  <span className="brand-mark" aria-hidden="true" />
                  <div><p className="brand-wordmark">Weather Theatre</p><p className="brand-kicker">A forecast in three acts · Kestrel Bay</p></div>
                </div>
                <div className="masthead-right">
                  <div className="live-readout mono"><span className="live-dot" />Live atmosphere</div>
                  <ModeToggle mode={mode} setMode={setMode} />
                </div>
              </header>

              <main>
                <section className="hero-intro" aria-labelledby="page-title">
                  <div>
                    <div className="eyebrow mono"><span className="eyebrow-rule" />Tonight's programme</div>
                    <h1 id="page-title" className="hero-title">One forecast.<br /><em>Infinite atmosphere.</em></h1>
                  </div>
                  <p className="hero-note">Turn the same little weather system into a different kind of evening. Pull the sliders, change the light, and let the stage respond.</p>
                </section>

                <section className="theatre-shell" aria-label="Weather theatre stage">
                  <div className="stage-viewport">
                    <WeatherCanvas mood={mood} mode={mode} />
                    <div className="stage-vignette" />
                    <div className="stage-topline mono"><span><span className="topline-marker" />Act II / {mode === "night" ? "Blue Hour" : "First Light"}</span><div className="stage-topline-right"><span className="location">Kestrel Bay, North Pier</span><span>18 · 10 · 24</span></div></div>
                    <div className="scene-tag"><div className="mono">The weather, interpreted</div><div className="scene-tag-title">A small change in the air</div><div className="scene-tag-rule" /></div>
                    <button className="reveal-button" onClick={replayReveal} aria-label="Replay curtain reveal"><LineIcon name="replay" size={12} /> Replay reveal</button>
                    <p className="typewriter" aria-live="polite">{typedScene}</p>
                    <ForecastCard mode={mode} />
                    <div className={`curtain curtain-left ${revealed ? "revealed" : ""}`} />
                    <div className={`curtain curtain-right ${revealed ? "revealed" : ""}`} />
                    <div className={`curtain-valance ${revealed ? "revealed" : ""}`} />
                  </div>
                  <div className="bottom-caption mono"><span>Mock forecast / <strong>no two performances alike</strong></span><span className="caption-right"><span className="caption-pin" />Weather Theatre 04</span></div>
                </section>

                <section className="director-desk" aria-labelledby="director-title">
                  <div>
                    <div className="eyebrow mono"><span className="eyebrow-rule" />The director's desk</div>
                    <h2 id="director-title" className="desk-heading">Set the scene.</h2>
                    <p className="desk-copy">Three dials, one forecast. The horizon, light, and weather all move with your mix.</p>
                    <div className="desk-status mono"><span className="status-light" />{leadMood} leads the room</div>
                  </div>
                  <div className="slider-stack">
                    <SliderControl id="cosy" label="Cosy" desc="lamplight / soft rain" symbol="C" color="var(--cosy)" value={mood.cosy} onChange={(value) => setMoodValue("cosy", value)} />
                    <SliderControl id="eerie" label="Eerie" desc="fog / the blue hour" symbol="E" color="var(--eerie)" value={mood.eerie} onChange={(value) => setMoodValue("eerie", value)} />
                    <SliderControl id="heroic" label="Heroic" desc="wind / open horizon" symbol="H" color="var(--heroic)" value={mood.heroic} onChange={(value) => setMoodValue("heroic", value)} />
                  </div>
                </section>

                <section className="forecast-section" aria-labelledby="forecast-title">
                  <div className="section-heading-row"><h2 id="forecast-title" className="section-title">The five-day run</h2><span className="section-note mono">Same cast · new lighting</span></div>
                  <div className="forecast-rail">{forecast.map((day, index) => <DayCard key={day.day} day={day} index={index} />)}</div>
                </section>
              </main>

              <footer className="footer mono"><span>Forecast data is fictional, composed for the stage.</span><span>Scene no. 04 / <span>Live from Kestrel Bay</span></span></footer>
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
