<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0b0f16" />
  <title>Weather Theatre — a living forecast</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap');

    :root {
      --ink: #0b0f16;
      --ink-soft: #101722;
      --panel: #151f2a;
      --panel-light: #1b2733;
      --paper: #f4eee5;
      --paper-dim: #a9a59e;
      --brass: #d8b878;
      --brass-bright: #f4d89a;
      --storm: #8bbfd0;
      --rose: #d8796f;
      --line: rgba(244, 238, 229, 0.13);
      --line-soft: rgba(244, 238, 229, 0.07);
      --sans: 'DM Sans', 'Helvetica Neue', Arial, sans-serif;
      --display: 'Playfair Display', Georgia, serif;
      --mono: 'DM Mono', 'SFMono-Regular', Consolas, monospace;
    }

    * { box-sizing: border-box; }
    html { background: var(--ink); }
    body {
      margin: 0;
      min-width: 320px;
      color: var(--paper);
      background:
        radial-gradient(circle at 12% -10%, rgba(59, 88, 111, 0.26), transparent 34rem),
        radial-gradient(circle at 92% 3%, rgba(153, 84, 65, 0.12), transparent 28rem),
        var(--ink);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
    }

    button, input { font: inherit; }
    button { color: inherit; }
    button:focus-visible, input:focus-visible { outline: 2px solid var(--brass-bright); outline-offset: 4px; }

    .app-shell {
      width: min(1480px, 100%);
      margin: 0 auto;
      padding: 0 38px 34px;
    }

    .site-header {
      min-height: 93px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--line-soft);
      position: relative;
      z-index: 5;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      color: var(--paper);
    }

    .brand-mark {
      width: 39px;
      height: 39px;
      border: 1px solid rgba(216, 184, 120, 0.56);
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 50% 44%, rgba(216,184,120,.3) 0 18%, transparent 19%), rgba(216,184,120,.03);
      position: relative;
    }

    .brand-mark::before, .brand-mark::after {
      content: '';
      position: absolute;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--brass);
      top: 5px;
    }
    .brand-mark::before { left: 7px; }
    .brand-mark::after { right: 7px; }

    .brand-mark svg { width: 22px; height: 22px; color: var(--brass-bright); }
    .brand-name {
      font-family: var(--display);
      font-size: 20px;
      line-height: 1;
      letter-spacing: -.025em;
    }
    .brand-kicker {
      display: block;
      margin-top: 5px;
      color: var(--paper-dim);
      font: 10px var(--mono);
      letter-spacing: .16em;
      text-transform: uppercase;
    }

    .header-status {
      display: flex;
      align-items: center;
      gap: 25px;
      color: var(--paper-dim);
      font-size: 12px;
    }
    .live-note { display: flex; align-items: center; gap: 8px; }
    .live-dot { width: 7px; height: 7px; border-radius: 50%; background: #90c69d; box-shadow: 0 0 0 4px rgba(144,198,157,.1); animation: pulse 2.4s ease-in-out infinite; }
    .header-index { font: 11px var(--mono); color: var(--brass); letter-spacing: .12em; }

    .hero-intro {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 28px;
      padding: 48px 0 31px;
    }
    .eyebrow {
      margin: 0 0 15px;
      color: var(--brass);
      font: 10px var(--mono);
      text-transform: uppercase;
      letter-spacing: .2em;
    }
    .page-title {
      max-width: 700px;
      margin: 0;
      font: 600 clamp(42px, 5.5vw, 76px)/.94 var(--display);
      letter-spacing: -.05em;
    }
    .page-title em { color: var(--brass-bright); font-style: normal; }
    .intro-copy {
      width: min(330px, 100%);
      margin: 0 0 4px;
      color: var(--paper-dim);
      font-size: 13px;
      line-height: 1.65;
    }

    .theatre-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.72fr) minmax(310px, .78fr);
      gap: 18px;
      align-items: stretch;
    }

    .stage-card, .director-card {
      background: linear-gradient(145deg, rgba(24, 35, 47, .98), rgba(13, 19, 27, .98));
      border: 1px solid var(--line);
      box-shadow: 0 25px 70px rgba(0,0,0,.24), inset 0 1px 0 rgba(255,255,255,.025);
    }

    .stage-card { min-width: 0; padding: 13px 13px 0; overflow: hidden; }
    .stage-topline { height: 38px; display: flex; align-items: center; justify-content: space-between; padding: 0 7px; color: var(--paper-dim); }
    .stage-topline .mono { font: 10px var(--mono); letter-spacing: .15em; text-transform: uppercase; }
    .scene-number { color: var(--brass); }
    .stage-window {
      aspect-ratio: 1.65 / 1;
      min-height: 400px;
      position: relative;
      overflow: hidden;
      background: #131c27;
      border: 1px solid rgba(244,238,229,.12);
      box-shadow: inset 0 0 0 10px rgba(10, 13, 18, .16), inset 0 0 100px rgba(0,0,0,.2);
    }
    .stage-window::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(180deg, rgba(0,0,0,.1), transparent 20%, transparent 76%, rgba(0,0,0,.32));
      z-index: 1;
    }
    .scene-canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }

    .curtain {
      position: absolute;
      top: -4%;
      bottom: -4%;
      width: 20%;
      min-width: 80px;
      z-index: 3;
      transition: transform 2.1s cubic-bezier(.68,0,.22,1), opacity .6s ease 1.55s;
      background:
        repeating-linear-gradient(90deg, rgba(52,10,17,.46) 0 10%, rgba(152,55,56,.65) 13% 18%, rgba(71,13,20,.73) 24% 32%),
        linear-gradient(90deg, #3a0d18, #a44848 47%, #52121f);
      box-shadow: inset -16px 0 23px rgba(11, 2, 7, .45), inset 14px 0 18px rgba(239, 124, 92, .08), 6px 0 22px rgba(0,0,0,.34);
    }
    .curtain::before { content: ''; position: absolute; top: 0; bottom: 0; left: 8%; width: 3px; background: rgba(242,157,113,.18); box-shadow: 22px 0 0 rgba(39,5,11,.34), 44px 0 0 rgba(242,157,113,.13); }
    .curtain-left { left: 0; transform: translateX(0); transform-origin: left center; border-radius: 0 0 34% 0; }
    .curtain-right { right: 0; transform: translateX(0); transform-origin: right center; border-radius: 0 0 0 34%; transform: scaleX(-1); }
    .curtain-open .curtain-left { transform: translateX(-108%); }
    .curtain-open .curtain-right { transform: scaleX(-1) translateX(-108%); }
    .curtain-open .curtain-stamp { opacity: 0; transform: translate(-50%, -42%); }
    .curtain-stamp {
      position: absolute;
      z-index: 4;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      padding: 10px 14px;
      border: 1px solid rgba(244,238,229,.34);
      color: var(--paper);
      background: rgba(10,13,18,.55);
      backdrop-filter: blur(6px);
      font: 9px var(--mono);
      letter-spacing: .18em;
      text-transform: uppercase;
      transition: opacity .5s ease, transform .8s ease;
      white-space: nowrap;
    }

    .stage-caption {
      min-height: 96px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding: 22px 9px 20px;
      border-top: 1px solid var(--line-soft);
    }
    .caption-label { margin: 0 0 8px; color: var(--brass); font: 9px var(--mono); letter-spacing: .16em; text-transform: uppercase; }
    .caption-text { min-height: 24px; margin: 0; color: var(--paper); font: 500 clamp(16px, 1.8vw, 22px)/1.2 var(--display); letter-spacing: -.015em; }
    .caption-cursor { display: inline-block; width: 1px; height: 1em; margin-left: 3px; background: var(--brass); vertical-align: -.14em; animation: blink 1s steps(1) infinite; }
    .caption-aside { flex: 0 0 auto; text-align: right; }
    .caption-aside strong { display: block; color: var(--paper); font: 600 12px var(--sans); }
    .caption-aside span { display: block; margin-top: 5px; color: var(--paper-dim); font: 10px var(--mono); }

    .director-card { padding: 28px 26px 23px; display: flex; flex-direction: column; }
    .director-heading { display: flex; justify-content: space-between; align-items: flex-start; gap: 15px; padding-bottom: 23px; border-bottom: 1px solid var(--line-soft); }
    .director-heading h2 { margin: 0; font: 600 24px/1 var(--display); letter-spacing: -.03em; }
    .director-heading p { margin: 9px 0 0; color: var(--paper-dim); font-size: 12px; line-height: 1.45; }
    .rehearsal { color: var(--brass); font: 9px var(--mono); letter-spacing: .15em; text-transform: uppercase; white-space: nowrap; }

    .control-list { padding: 24px 0 20px; display: grid; gap: 25px; }
    .control-row { display: grid; gap: 12px; }
    .control-label { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; }
    .control-name { display: flex; align-items: center; gap: 9px; font-size: 13px; font-weight: 600; }
    .control-name::before { content: ''; width: 7px; height: 7px; border-radius: 50%; background: var(--control-color); box-shadow: 0 0 0 4px color-mix(in srgb, var(--control-color) 13%, transparent); }
    .control-hint { color: var(--paper-dim); font-size: 10px; }
    .control-value { color: var(--control-color); font: 11px var(--mono); }
    .range-wrap { position: relative; height: 17px; display: flex; align-items: center; }
    .range-wrap::before { content: ''; position: absolute; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--control-color) 0 var(--value), rgba(244,238,229,.15) var(--value) 100%); }
    input[type=range] { -webkit-appearance: none; appearance: none; position: relative; width: 100%; height: 17px; margin: 0; background: transparent; cursor: pointer; }
    input[type=range]::-webkit-slider-runnable-track { height: 17px; background: transparent; }
    input[type=range]::-moz-range-track { height: 17px; background: transparent; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 13px; height: 13px; margin-top: 2px; border: 2px solid var(--ink); border-radius: 50%; background: var(--control-color); box-shadow: 0 0 0 1px var(--control-color), 0 3px 8px rgba(0,0,0,.35); }
    input[type=range]::-moz-range-thumb { width: 10px; height: 10px; border: 2px solid var(--ink); border-radius: 50%; background: var(--control-color); box-shadow: 0 0 0 1px var(--control-color), 0 3px 8px rgba(0,0,0,.35); }
    .range-ends { display: flex; justify-content: space-between; color: rgba(244,238,229,.38); font: 9px var(--mono); text-transform: uppercase; letter-spacing: .08em; }

    .toggle-block { padding: 22px 0 20px; border-top: 1px solid var(--line-soft); border-bottom: 1px solid var(--line-soft); }
    .toggle-title { display: flex; justify-content: space-between; align-items: center; margin-bottom: 13px; }
    .toggle-title span:first-child { color: var(--paper-dim); font: 10px var(--mono); text-transform: uppercase; letter-spacing: .15em; }
    .toggle-title span:last-child { color: var(--brass); font-size: 10px; }
    .day-toggle { display: grid; grid-template-columns: 1fr 1fr; padding: 3px; border: 1px solid var(--line); background: rgba(0,0,0,.18); }
    .day-toggle button { border: 0; background: transparent; color: var(--paper-dim); padding: 11px 8px; cursor: pointer; font-size: 11px; transition: color .25s ease, background .25s ease; }
    .day-toggle button.active { color: var(--ink); background: var(--brass); font-weight: 700; }
    .day-toggle button:hover:not(.active) { color: var(--paper); background: rgba(244,238,229,.07); }
    .toggle-icon { display: inline-block; margin-right: 6px; vertical-align: -2px; }

    .director-foot { display: flex; justify-content: space-between; align-items: flex-end; gap: 14px; padding-top: 20px; margin-top: auto; }
    .forecast-note { color: var(--paper-dim); font-size: 10px; line-height: 1.45; }
    .forecast-note b { display: block; margin-bottom: 4px; color: var(--paper); font: 500 12px var(--display); }
    .reveal-button { border: 1px solid rgba(216,184,120,.6); background: rgba(216,184,120,.08); color: var(--brass-bright); padding: 10px 12px; cursor: pointer; font: 9px var(--mono); letter-spacing: .12em; text-transform: uppercase; transition: background .2s ease, border-color .2s ease, transform .2s ease; }
    .reveal-button:hover { background: rgba(216,184,120,.18); border-color: var(--brass-bright); transform: translateY(-1px); }

    .forecast-section { padding-top: 18px; }
    .forecast-bar { display: flex; align-items: center; justify-content: space-between; padding: 20px 5px 15px; }
    .forecast-bar h2 { margin: 0; font: 600 18px var(--display); letter-spacing: -.02em; }
    .forecast-bar span { color: var(--paper-dim); font: 10px var(--mono); letter-spacing: .11em; text-transform: uppercase; }
    .forecast-strip { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); }
    .forecast-item { position: relative; min-height: 116px; padding: 18px 19px; border-right: 1px solid var(--line); }
    .forecast-item:last-child { border-right: 0; }
    .forecast-day { display: flex; justify-content: space-between; align-items: center; color: var(--paper-dim); font: 10px var(--mono); text-transform: uppercase; letter-spacing: .1em; }
    .forecast-day strong { color: var(--brass); font-weight: 500; }
    .forecast-main { display: flex; align-items: center; gap: 11px; margin-top: 17px; }
    .weather-glyph { width: 27px; height: 27px; color: var(--storm); }
    .weather-glyph.sun { color: var(--brass); }
    .weather-glyph.rain { color: #80aac6; }
    .forecast-temp { font: 500 22px var(--display); letter-spacing: -.04em; }
    .forecast-temp small { margin-left: 4px; color: var(--paper-dim); font: 11px var(--sans); letter-spacing: 0; }
    .forecast-desc { margin-top: 5px; color: var(--paper-dim); font-size: 10px; }

    .footer-line { display: flex; justify-content: space-between; gap: 16px; padding-top: 17px; color: rgba(244,238,229,.38); font: 9px var(--mono); letter-spacing: .07em; }
    .footer-line span:last-child { text-align: right; }

    @keyframes pulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: .55; transform: scale(.78); } }
    @keyframes blink { 0%, 45% { opacity: 1; } 46%, 100% { opacity: 0; } }

    @media (max-width: 980px) {
      .app-shell { padding: 0 22px 28px; }
      .theatre-layout { grid-template-columns: 1fr; }
      .director-card { min-height: 0; }
      .control-list { grid-template-columns: repeat(3, 1fr); gap: 22px; }
      .toggle-block { grid-column: 1 / -1; }
      .director-foot { margin-top: 0; }
    }
    @media (max-width: 650px) {
      .app-shell { padding: 0 14px 22px; }
      .site-header { min-height: 76px; }
      .header-status { gap: 10px; }
      .live-note { display: none; }
      .hero-intro { display: block; padding: 33px 0 25px; }
      .intro-copy { margin-top: 20px; max-width: 315px; }
      .stage-card { padding: 9px 9px 0; }
      .stage-window { min-height: 260px; }
      .stage-topline { height: 32px; padding: 0 4px; }
      .stage-caption { display: block; padding: 18px 4px 18px; }
      .caption-aside { margin-top: 13px; text-align: left; display: flex; align-items: baseline; gap: 8px; }
      .caption-aside span { margin-top: 0; }
      .director-card { padding: 23px 18px 19px; }
      .control-list { display: grid; grid-template-columns: 1fr; gap: 22px; }
      .toggle-block { grid-column: auto; }
      .forecast-strip { grid-template-columns: repeat(5, 142px); overflow-x: auto; margin-right: -14px; padding-right: 14px; }
      .forecast-item { min-height: 108px; }
      .forecast-bar { padding-top: 17px; }
      .footer-line { display: block; line-height: 1.6; }
      .footer-line span:last-child { margin-top: 3px; text-align: left; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useEffect, useMemo, useRef, useState } = React;

    const clamp = (value, min = 0, max = 100) => Math.min(max, Math.max(min, value));
    const lerp = (a, b, amount) => a + (b - a) * amount;
    const color = (hex) => {
      const clean = hex.replace('#', '');
      return { r: parseInt(clean.slice(0, 2), 16), g: parseInt(clean.slice(2, 4), 16), b: parseInt(clean.slice(4, 6), 16) };
    };
    const rgba = (hex, alpha = 1) => {
      const c = color(hex);
      return `rgba(${c.r}, ${c.g}, ${c.b}, ${alpha})`;
    };
    const mix = (a, b, amount) => {
      const ca = color(a); const cb = color(b);
      return `rgb(${Math.round(lerp(ca.r, cb.r, amount))}, ${Math.round(lerp(ca.g, cb.g, amount))}, ${Math.round(lerp(ca.b, cb.b, amount))})`;
    };

    const initialForecast = [
      { day: 'Today', temp: 22, low: 17, desc: 'Gentle rain', type: 'rain', active: true },
      { day: 'Thu', temp: 19, low: 14, desc: 'Cloud break', type: 'cloud' },
      { day: 'Fri', temp: 24, low: 16, desc: 'Clear & bright', type: 'sun' },
      { day: 'Sat', temp: 21, low: 15, desc: 'Soft showers', type: 'rain' },
      { day: 'Sun', temp: 23, low: 16, desc: 'Late light', type: 'sun' },
    ];

    function WeatherGlyph({ type }) {
      if (type === 'sun') return <svg className="weather-glyph sun" viewBox="0 0 32 32" aria-hidden="true"><circle cx="16" cy="16" r="6" fill="currentColor"/><path d="M16 3v4M16 25v4M3 16h4M25 16h4M6.8 6.8l2.8 2.8M22.4 22.4l2.8 2.8M25.2 6.8l-2.8 2.8M9.6 22.4l-2.8 2.8" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round"/></svg>;
      if (type === 'cloud') return <svg className="weather-glyph" viewBox="0 0 32 32" aria-hidden="true"><path d="M7.2 23.2h17.5a4.2 4.2 0 0 0 .3-8.4 8.8 8.8 0 0 0-16.9-1.5A5 5 0 0 0 7.2 23.2Z" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinejoin="round"/></svg>;
      return <svg className="weather-glyph rain" viewBox="0 0 32 32" aria-hidden="true"><path d="M7.2 19.5h17.5a4.2 4.2 0 0 0 .3-8.4 8.8 8.8 0 0 0-16.9-1.5 5 5 0 0 0-.9 9.9Z" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinejoin="round"/><path d="m11 23-1.3 3M17 23l-1.3 3M23 23l-1.3 3" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round"/></svg>;
    }

    function sceneFromValues(cosy, eerie, heroic, night) {
      const dominant = Math.max(cosy, eerie, heroic);
      let title = 'Blue Hour Interlude';
      let subtitle = 'A quiet front moves through in blue hour.';
      let label = 'balanced composition';
      if (eerie === dominant) {
        title = 'Midnight Watch';
        subtitle = 'The rain keeps time against the dark.';
        label = 'nocturne in rain';
      } else if (heroic === dominant) {
        title = 'Skyward Overture';
        subtitle = 'A bright front gathers beyond the horizon.';
        label = 'weather, in full voice';
      } else if (cosy === dominant) {
        title = 'Hearthlight Forecast';
        subtitle = 'Windows glow while the weather softens.';
        label = 'a warm little weather';
      }
      if (!night && eerie < 54 && heroic < 58) {
        subtitle = cosy > heroic ? 'Morning light settles softly on the wet streets.' : 'The day opens in a silver, hopeful hush.';
      }
      return { title, subtitle, label, dominant, night };
    }

    function drawCloud(ctx, x, y, scale, fill, opacity = 1) {
      ctx.save();
      ctx.globalAlpha = opacity;
      ctx.fillStyle = fill;
      ctx.beginPath();
      ctx.ellipse(x, y + scale * .08, scale * .68, scale * .24, 0, 0, Math.PI * 2);
      ctx.ellipse(x - scale * .35, y + scale * .03, scale * .38, scale * .22, 0, 0, Math.PI * 2);
      ctx.ellipse(x + scale * .25, y - scale * .04, scale * .4, scale * .29, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawHill(ctx, w, h, base, colorValue, height, offset, alpha = 1) {
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = colorValue;
      ctx.beginPath();
      ctx.moveTo(-20, base);
      ctx.bezierCurveTo(w * .10, base - height * .36 + offset, w * .21, base - height * .93 + offset, w * .37, base - height * .42 + offset);
      ctx.bezierCurveTo(w * .54, base - height * .08 + offset, w * .63, base - height * .9 + offset, w * .78, base - height * .47 + offset);
      ctx.bezierCurveTo(w * .9, base - height * .2 + offset, w * .98, base - height * .72 + offset, w + 20, base - height * .28 + offset);
      ctx.lineTo(w + 20, h + 20); ctx.lineTo(-20, h + 20); ctx.closePath(); ctx.fill();
      ctx.restore();
    }

    function drawScene(canvas, values, time) {
      const rect = canvas.getBoundingClientRect();
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      const w = Math.max(1, rect.width); const h = Math.max(1, rect.height);
      if (canvas.width !== Math.floor(w * dpr) || canvas.height !== Math.floor(h * dpr)) {
        canvas.width = Math.floor(w * dpr); canvas.height = Math.floor(h * dpr);
      }
      const ctx = canvas.getContext('2d');
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.clearRect(0, 0, w, h);

      const cosy = values.cosy / 100; const eerie = values.eerie / 100; const heroic = values.heroic / 100;
      const night = values.night;
      const drift = time * .000018;
      const horizon = h * .72;
      const top = night ? mix('#080c18', '#192d42', heroic * .5 + cosy * .18) : mix('#9ab4bf', '#e0b78d', heroic * .45);
      const mid = night ? mix('#12253a', '#273e55', heroic * .4) : mix('#c5d2ce', '#e8c39c', heroic * .42);
      const ground = night ? mix('#101722', '#1e303b', cosy * .48) : mix('#536b68', '#997064', cosy * .34);
      const glow = night ? '#dfb978' : '#ffdd9a';

      const sky = ctx.createLinearGradient(0, 0, 0, h);
      sky.addColorStop(0, top); sky.addColorStop(.53, mid); sky.addColorStop(1, ground);
      ctx.fillStyle = sky; ctx.fillRect(0, 0, w, h);

      // Atmospheric bloom behind the set.
      const sunX = w * (.77 + Math.sin(drift * 4) * .012);
      const sunY = h * (night ? .22 : .23);
      const bloom = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, h * .55);
      bloom.addColorStop(0, rgba(glow, night ? .27 + heroic * .12 : .37));
      bloom.addColorStop(.28, rgba(glow, .08)); bloom.addColorStop(1, rgba(glow, 0));
      ctx.fillStyle = bloom; ctx.fillRect(0, 0, w, h);

      // Stars, softened by the day toggle and clouds.
      if (night) {
        for (let i = 0; i < 47; i++) {
          const x = ((i * 73.37) % 101) / 100 * w;
          const y = ((i * 41.19 + 9) % 57) / 100 * h;
          const alpha = .14 + ((i * 17) % 7) / 28 + Math.sin(time * .0015 + i) * .035;
          ctx.fillStyle = `rgba(244,238,229,${Math.max(.04, alpha)})`;
          ctx.beginPath(); ctx.arc(x, y, i % 8 === 0 ? 1.3 : .65, 0, Math.PI * 2); ctx.fill();
        }
        ctx.fillStyle = rgba('#f5d89a', .08 + heroic * .04);
        ctx.beginPath(); ctx.arc(sunX, sunY, 39 + heroic * 10, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#eed7a4'; ctx.beginPath(); ctx.arc(sunX, sunY, 18, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = top; ctx.beginPath(); ctx.arc(sunX + 8, sunY - 5, 16, 0, Math.PI * 2); ctx.fill();
      } else {
        ctx.save(); ctx.translate(sunX, sunY); ctx.strokeStyle = rgba('#fff0be', .24); ctx.lineWidth = 1;
        for (let i = 0; i < 10; i++) { const a = i * Math.PI / 5; ctx.beginPath(); ctx.moveTo(Math.cos(a) * 26, Math.sin(a) * 26); ctx.lineTo(Math.cos(a) * 34, Math.sin(a) * 34); ctx.stroke(); }
        ctx.fillStyle = '#ffe0a0'; ctx.beginPath(); ctx.arc(0, 0, 20, 0, Math.PI * 2); ctx.fill(); ctx.restore();
      }

      // Far cloud bank, sliding with subtle parallax.
      const cloudColor = night ? '#243746' : '#d5d8d2';
      drawCloud(ctx, w * (.18 + (drift * 3 % 1) * .06), h * .28, w * .12, cloudColor, .16 + eerie * .16);
      drawCloud(ctx, w * (.53 - (drift * 1.7 % 1) * .08), h * .18, w * .17, cloudColor, .12 + eerie * .12);
      drawCloud(ctx, w * (.87 + (drift * 1.2 % 1) * .04), h * .36, w * .16, night ? '#273b4b' : '#b5c3c2', .16 + cosy * .06);

      // Parallax hills.
      drawHill(ctx, w, h, horizon + 5, night ? '#172733' : '#81908b', h * .21, Math.sin(drift * 8) * 2, .86);
      drawHill(ctx, w, h, horizon + 14, night ? '#12202b' : '#5b716d', h * .27, Math.sin(drift * 5 + 1) * 4, .98);
      drawHill(ctx, w, h, horizon + 26, night ? '#0e1922' : '#3f5756', h * .32, Math.sin(drift * 3 + 2) * 6, 1);

      // Moody rain veil.
      if (eerie > .28) {
        ctx.save();
        ctx.lineWidth = .8;
        for (let i = 0; i < 105; i++) {
          const x = (i * 37 + time * (.03 + eerie * .04)) % (w + 50) - 25;
          const y = (i * 19 + time * (.018 + eerie * .012)) % (h + 35) - 30;
          const length = 4 + eerie * 12 + (i % 5);
          ctx.strokeStyle = rgba(night ? '#92b4c4' : '#6f929d', .05 + eerie * .09);
          ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x - 2.5, y + length); ctx.stroke();
        }
        ctx.restore();
      }

      // Warm window lights in the middle distance.
      const windowCount = 5 + Math.round(cosy * 6);
      for (let i = 0; i < windowCount; i++) {
        const x = w * (.12 + i * (.77 / Math.max(1, windowCount - 1)));
        const y = horizon - 9 - (i % 3) * 6;
        const lit = cosy > .12;
        if (lit) {
          const halo = ctx.createRadialGradient(x, y, 0, x, y, 18 + cosy * 12);
          halo.addColorStop(0, rgba('#f5ca7e', .18 + cosy * .16)); halo.addColorStop(1, rgba('#f5ca7e', 0));
          ctx.fillStyle = halo; ctx.fillRect(x - 26, y - 26, 52, 52);
          ctx.fillStyle = rgba('#f2c77e', .23 + cosy * .45); ctx.fillRect(x - 2, y - 3, 4, 6);
        }
      }

      // Heroic sweeping spotlights: the theatre's own weather system.
      ctx.save(); ctx.globalCompositeOperation = 'screen';
      const sweep = Math.sin(time * .00055) * .33;
      for (let i = 0; i < 2; i++) {
        const originX = i === 0 ? w * .16 : w * .84;
        const originY = h * .86;
        const angle = (i === 0 ? -.94 : -2.2) + sweep * (i === 0 ? 1 : -.7);
        ctx.save(); ctx.translate(originX, originY); ctx.rotate(angle);
        const beam = ctx.createLinearGradient(0, 0, 0, -h * 1.1);
        beam.addColorStop(0, rgba('#f6d59a', .03 + heroic * .04)); beam.addColorStop(.7, rgba('#d9eff2', heroic * .045)); beam.addColorStop(1, rgba('#d9eff2', 0));
        ctx.fillStyle = beam; ctx.beginPath(); ctx.moveTo(-8, 0); ctx.lineTo(-w * (.12 + heroic * .08), -h * 1.1); ctx.lineTo(w * (.12 + heroic * .08), -h * 1.1); ctx.lineTo(8, 0); ctx.closePath(); ctx.fill(); ctx.restore();
      }
      ctx.restore();

      // Foreground stage floor with a subtle painted reflection.
      const floor = ctx.createLinearGradient(0, horizon, 0, h);
      floor.addColorStop(0, rgba(night ? '#17252e' : '#53625f', .45)); floor.addColorStop(1, rgba('#080b10', .85));
      ctx.fillStyle = floor; ctx.fillRect(0, horizon, w, h - horizon);
      ctx.strokeStyle = rgba('#d8b878', .14 + heroic * .1); ctx.lineWidth = 1;
      for (let i = -4; i < 11; i++) { const x = w / 2 + i * w * .12; ctx.beginPath(); ctx.moveTo(w / 2, horizon); ctx.lineTo(x, h); ctx.stroke(); }
      ctx.strokeStyle = rgba('#f0d09a', .28); ctx.beginPath(); ctx.moveTo(0, horizon + 1); ctx.lineTo(w, horizon + 1); ctx.stroke();

      // Floating motes when the cosy slider is doing the talking.
      if (cosy > .27) {
        for (let i = 0; i < Math.round(8 + cosy * 15); i++) {
          const x = (i * 59 + time * (.008 + cosy * .008)) % (w + 30) - 15;
          const y = (i * 31 + Math.sin(time * .001 + i) * 12) % (h * .7);
          ctx.fillStyle = rgba('#f2cc8a', .13 + cosy * .15); ctx.beginPath(); ctx.arc(x, y, 1 + (i % 3) * .35, 0, Math.PI * 2); ctx.fill();
        }
      }

      // Vignette, painted like a small proscenium.
      const vignette = ctx.createRadialGradient(w / 2, h * .43, h * .12, w / 2, h * .48, Math.max(w, h) * .72);
      vignette.addColorStop(0, 'rgba(4,7,12,0)'); vignette.addColorStop(.7, 'rgba(4,7,12,.06)'); vignette.addColorStop(1, `rgba(4,7,12,${.58 + eerie * .13})`);
      ctx.fillStyle = vignette; ctx.fillRect(0, 0, w, h);
    }

    function StageCanvas({ cosy, eerie, heroic, night }) {
      const canvasRef = useRef(null);
      const stateRef = useRef({ cosy, eerie, heroic, night });
      stateRef.current = { cosy, eerie, heroic, night };
      useEffect(() => {
        const canvas = canvasRef.current;
        let frame;
        const render = (time) => { drawScene(canvas, stateRef.current, time); frame = requestAnimationFrame(render); };
        frame = requestAnimationFrame(render);
        return () => cancelAnimationFrame(frame);
      }, []);
      return <canvas ref={canvasRef} className="scene-canvas" aria-label="Animated weather theatre stage" />;
    }

    function Slider({ name, hint, value, colorValue, onChange, minLabel, maxLabel }) {
      return <div className="control-row" style={{ '--control-color': colorValue, '--value': `${value}%` }}>
        <div className="control-label"><div className="control-name">{name}<span className="control-hint">{hint}</span></div><span className="control-value">{String(value).padStart(2, '0')}</span></div>
        <div className="range-wrap"><input aria-label={`${name} atmosphere`} type="range" min="0" max="100" value={value} onChange={(event) => onChange(Number(event.target.value))} /></div>
        <div className="range-ends"><span>{minLabel}</span><span>{maxLabel}</span></div>
      </div>;
    }

    function App() {
      const [cosy, setCosy] = useState(64);
      const [eerie, setEerie] = useState(31);
      const [heroic, setHeroic] = useState(46);
      const [night, setNight] = useState(true);
      const [curtainOpen, setCurtainOpen] = useState(false);
      const [typed, setTyped] = useState('');
      const scene = useMemo(() => sceneFromValues(cosy, eerie, heroic, night), [cosy, eerie, heroic, night]);

      useEffect(() => {
        const revealTimer = window.setTimeout(() => setCurtainOpen(true), 300);
        return () => window.clearTimeout(revealTimer);
      }, []);

      useEffect(() => {
        setTyped('');
        let index = 0;
        const timer = window.setInterval(() => {
          index += 1;
          setTyped(scene.subtitle.slice(0, index));
          if (index >= scene.subtitle.length) window.clearInterval(timer);
        }, 34);
        return () => window.clearInterval(timer);
      }, [scene.subtitle]);

      const replay = () => {
        setCurtainOpen(false);
        window.setTimeout(() => setCurtainOpen(true), 120);
      };

      return <div className="app-shell">
        <header className="site-header">
          <a href="#stage" className="brand" aria-label="Weather Theatre home">
            <span className="brand-mark"><svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 15.5c2.1-2.2 4.1-3.2 6-3.2 2 0 4.2 1.1 6.2 3.2M7 11.3c1.3-1.1 2.7-1.7 4.1-1.7 1.5 0 3 .6 4.3 1.7M9.2 7.7c.6-.3 1.2-.5 1.9-.5.7 0 1.4.2 2 .5" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round"/><path d="M3 18.8h18" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round"/></svg></span>
            <span><span className="brand-name">Weather Theatre</span><span className="brand-kicker">a living forecast</span></span>
          </a>
          <div className="header-status"><span className="live-note"><i className="live-dot" /> local performance, live</span><span className="header-index">WT—03 / 07</span></div>
        </header>

        <main>
          <section className="hero-intro" aria-labelledby="page-title">
            <div><p className="eyebrow">Tonight’s programme · Thursday, 07:14 pm</p><h1 className="page-title" id="page-title">The forecast,<br /><em>re-staged.</em></h1></div>
            <p className="intro-copy">Same sky. Different feeling. Direct the evening with three small gestures and watch the weather find its new score.</p>
          </section>

          <section className="theatre-layout" id="stage" aria-label="Weather theatre performance">
            <article className="stage-card">
              <div className="stage-topline"><span className="mono">main stage · <span className="scene-number">{scene.title}</span></span><span className="mono">22° / 17°</span></div>
              <div className={`stage-window ${curtainOpen ? 'curtain-open' : ''}`}>
                <StageCanvas cosy={cosy} eerie={eerie} heroic={heroic} night={night} />
                <div className="curtain curtain-left" aria-hidden="true" /><div className="curtain curtain-right" aria-hidden="true" />
                <div className="curtain-stamp">curtain up</div>
              </div>
              <div className="stage-caption">
                <div><p className="caption-label">Scene subtitle · {scene.label}</p><p className="caption-text">{typed}<span className="caption-cursor" aria-hidden="true" /></p></div>
                <div className="caption-aside"><strong>{night ? 'Night watch' : 'Matinée'}</strong><span>north-west district</span></div>
              </div>
            </article>

            <aside className="director-card" aria-label="Scene director controls">
              <div className="director-heading"><div><h2>Scene director</h2><p>Remix the same mock forecast<br />into a different atmosphere.</p></div><span className="rehearsal">rehearsal 01</span></div>
              <div className="control-list">
                <Slider name="Cosy" hint="warmth" value={cosy} colorValue="#d8b878" onChange={setCosy} minLabel="bare" maxLabel="hearth" />
                <Slider name="Eerie" hint="mystery" value={eerie} colorValue="#9bb5c2" onChange={setEerie} minLabel="still" maxLabel="strange" />
                <Slider name="Heroic" hint="scale" value={heroic} colorValue="#d8796f" onChange={setHeroic} minLabel="quiet" maxLabel="grand" />
              </div>
              <div className="toggle-block"><div className="toggle-title"><span>Lighting cue</span><span>{night ? 'after dark' : 'first light'}</span></div><div className="day-toggle" role="group" aria-label="Time of day"><button className={!night ? 'active' : ''} onClick={() => setNight(false)}><span className="toggle-icon">☼</span>Matinée</button><button className={night ? 'active' : ''} onClick={() => setNight(true)}><span className="toggle-icon">◐</span>Night</button></div></div>
              <div className="director-foot"><div className="forecast-note"><b>Forecast: light rain</b>Feels like 19° · wind WNW 11 km/h</div><button className="reveal-button" onClick={replay}>Replay reveal ↗</button></div>
            </aside>
          </section>

          <section className="forecast-section" aria-labelledby="forecast-heading"><div className="forecast-bar"><h2 id="forecast-heading">The unchanging forecast</h2><span>five-day reference · fictional</span></div><div className="forecast-strip">{initialForecast.map((item) => <article className="forecast-item" key={item.day}><div className="forecast-day"><span>{item.day}</span>{item.active && <strong>on stage</strong>}</div><div className="forecast-main"><WeatherGlyph type={item.type} /><span className="forecast-temp">{item.temp}° <small>/ {item.low}°</small></span></div><div className="forecast-desc">{item.desc}</div></article>)}</div></section>
        </main>
        <footer className="footer-line"><span>Weather data imagined for atmospheric purposes.</span><span>Turn the dials. Keep the weather.</span></footer>
      </div>;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
