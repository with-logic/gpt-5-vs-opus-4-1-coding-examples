<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f5eedf" />
  <title>Fun Game — Hop, bop, repeat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;600;700&family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #1b2333;
      --muted: #687086;
      --cream: #f5eedf;
      --paper: #fffaf0;
      --coral: #ff6f61;
      --yellow: #ffd75a;
      --teal: #31c3b4;
      --blue: #83c9ed;
      --navy: #27334d;
      --line: rgba(27, 35, 51, .14);
      --shadow: 0 18px 45px rgba(52, 51, 68, .14);
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 8%, rgba(255,255,255,.82) 0 2px, transparent 3px) 0 0 / 22px 22px,
        var(--cream);
      font-family: "DM Sans", ui-sans-serif, system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    button { font: inherit; }
    .app {
      width: min(1240px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      padding: 22px clamp(16px, 4vw, 54px) 28px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .topbar {
      min-height: 54px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .logo-lockup { display: inline-flex; align-items: center; gap: 12px; }
    .logo-mark {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      position: relative;
      border: 3px solid var(--ink);
      border-radius: 14px 15px 12px 16px;
      background: var(--yellow);
      box-shadow: 4px 4px 0 var(--ink);
      transform: rotate(-4deg);
    }
    .logo-mark::before, .logo-mark::after {
      content: "";
      position: absolute;
      width: 7px;
      height: 7px;
      border: 2px solid var(--ink);
      border-radius: 50%;
      background: var(--paper);
    }
    .logo-mark::before { left: 9px; top: 10px; }
    .logo-mark::after { right: 8px; top: 8px; }
    .logo-spark { width: 10px; height: 17px; background: var(--coral); border-radius: 9px 7px 8px 7px; transform: rotate(29deg); }
    .brand-name {
      font: 700 clamp(1.35rem, 2.3vw, 1.75rem)/1 "Fredoka", sans-serif;
      letter-spacing: .03em;
    }
    .brand-note { color: var(--muted); font-size: .72rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; margin-top: 3px; }

    .top-actions { display: flex; align-items: center; gap: 9px; }
    .icon-button, .tiny-button {
      border: 2px solid var(--ink);
      background: rgba(255, 250, 240, .8);
      color: var(--ink);
      border-radius: 12px;
      cursor: pointer;
      transition: transform .16s ease, background .16s ease, box-shadow .16s ease;
    }
    .icon-button {
      width: 45px; height: 43px;
      display: grid; place-items: center;
      font-size: 1.12rem;
      box-shadow: 3px 3px 0 rgba(27,35,51,.2);
    }
    .icon-button:hover, .tiny-button:hover { transform: translate(-1px, -2px); background: var(--yellow); box-shadow: 4px 5px 0 rgba(27,35,51,.23); }
    .icon-button:active, .tiny-button:active { transform: translate(1px, 1px); box-shadow: none; }
    .icon-button:focus-visible, .tiny-button:focus-visible, .primary-button:focus-visible { outline: 3px solid var(--teal); outline-offset: 3px; }

    .game-frame {
      position: relative;
      padding: 13px;
      border-radius: 27px;
      background: var(--navy);
      box-shadow: var(--shadow), 0 3px 0 rgba(255,255,255,.65) inset;
    }
    .game-frame::after {
      content: "";
      position: absolute;
      inset: 7px;
      border: 1px solid rgba(255,255,255,.13);
      border-radius: 21px;
      pointer-events: none;
    }
    .stage-wrap { position: relative; isolation: isolate; overflow: hidden; border-radius: 19px; background: #a9dcf0; }
    #gameCanvas { display: block; width: 100%; height: auto; aspect-ratio: 16 / 9; cursor: pointer; touch-action: manipulation; }

    .hud {
      position: absolute;
      inset: 18px 20px auto;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      pointer-events: none;
      z-index: 2;
    }
    .hud-left { display: flex; gap: 9px; flex-wrap: wrap; }
    .stat-chip {
      min-width: 108px;
      padding: 10px 14px 9px;
      border: 2px solid var(--ink);
      border-radius: 14px;
      background: rgba(255,250,240,.9);
      box-shadow: 3px 3px 0 rgba(27,35,51,.2);
      backdrop-filter: blur(4px);
    }
    .stat-label { display: block; color: #687086; font-size: .62rem; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; }
    .stat-value { display: block; font: 700 1.3rem/1.05 "Fredoka", sans-serif; margin-top: 4px; }
    .score-chip .stat-value { color: var(--coral); }
    .best-chip .stat-value { color: #ebac26; }
    .speed-meter { width: 132px; padding: 9px 11px 10px; border-radius: 13px; background: rgba(39,51,77,.78); color: white; box-shadow: 3px 3px 0 rgba(27,35,51,.2); }
    .speed-meter .stat-label { color: rgba(255,255,255,.65); }
    .meter-track { height: 6px; margin-top: 7px; overflow: hidden; background: rgba(255,255,255,.2); border-radius: 9px; }
    .meter-fill { height: 100%; width: 18%; border-radius: inherit; background: var(--yellow); transition: width .3s ease; }

    .stage-hint {
      position: absolute;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 9px 14px;
      color: var(--ink);
      background: rgba(255,250,240,.88);
      border: 2px solid rgba(27,35,51,.72);
      border-radius: 999px;
      font-size: .74rem;
      font-weight: 800;
      letter-spacing: .06em;
      text-transform: uppercase;
      opacity: .88;
      pointer-events: none;
      transition: opacity .35s ease, transform .35s ease;
    }
    .stage-hint.is-hidden { opacity: 0; transform: translate(-50%, 10px); }
    .keycap { min-width: 22px; padding: 2px 5px; border-radius: 5px; background: var(--ink); color: var(--yellow); font-size: .68rem; line-height: 1.2; text-align: center; }

    .game-over {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(39, 51, 77, .36);
      backdrop-filter: blur(3px);
      opacity: 0;
      visibility: hidden;
      transition: opacity .25s ease, visibility .25s ease;
      z-index: 5;
    }
    .game-over.visible { opacity: 1; visibility: visible; }
    .result-card {
      width: min(360px, 100%);
      padding: 28px 28px 25px;
      text-align: center;
      border: 3px solid var(--ink);
      border-radius: 24px;
      background: var(--paper);
      box-shadow: 8px 8px 0 rgba(27,35,51,.42);
      transform: translateY(10px) rotate(-1deg);
      transition: transform .3s cubic-bezier(.2,.8,.2,1);
    }
    .game-over.visible .result-card { transform: translateY(0) rotate(-1deg); }
    .result-emoji { font-size: 2.9rem; line-height: 1; animation: bob .9s ease-in-out infinite alternate; }
    .result-kicker { margin-top: 12px; color: var(--coral); font-size: .7rem; font-weight: 800; letter-spacing: .16em; text-transform: uppercase; }
    .result-title { margin: 2px 0 8px; font: 700 2rem/1 "Fredoka", sans-serif; }
    .result-copy { color: var(--muted); font-size: .88rem; margin: 0 0 17px; }
    .result-numbers { display: flex; justify-content: center; gap: 9px; margin-bottom: 20px; }
    .result-number { flex: 1; padding: 10px 8px; border-radius: 12px; background: #fff0d1; }
    .result-number.best { background: #dcf5ee; }
    .result-number small { display: block; color: var(--muted); font-size: .61rem; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; }
    .result-number strong { display: block; margin-top: 3px; font: 700 1.4rem/1 "Fredoka", sans-serif; }
    .primary-button {
      width: 100%;
      border: 3px solid var(--ink);
      border-radius: 14px;
      padding: 12px 18px;
      color: var(--ink);
      background: var(--yellow);
      box-shadow: 4px 4px 0 var(--ink);
      font: 700 1rem "Fredoka", sans-serif;
      letter-spacing: .04em;
      cursor: pointer;
      transition: transform .16s ease, box-shadow .16s ease, background .16s ease;
    }
    .primary-button:hover { background: #ffe484; transform: translate(-1px, -2px); box-shadow: 5px 6px 0 var(--ink); }
    .primary-button:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 var(--ink); }

    .bottom-row { display: flex; justify-content: space-between; align-items: center; gap: 18px; padding: 0 5px; }
    .how-to { display: flex; align-items: center; gap: 11px; color: var(--muted); font-size: .77rem; font-weight: 700; }
    .how-to strong { color: var(--ink); }
    .jump-icon { width: 32px; height: 32px; display: grid; place-items: center; flex: 0 0 auto; border-radius: 11px; background: var(--teal); border: 2px solid var(--ink); color: var(--ink); font-size: 1rem; box-shadow: 2px 2px 0 var(--ink); }
    .tip { display: flex; align-items: center; gap: 7px; color: var(--muted); font-size: .7rem; font-weight: 600; }
    .tip-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--coral); }

    @keyframes bob { from { transform: translateY(0) rotate(-7deg); } to { transform: translateY(-5px) rotate(7deg); } }
    @media (max-width: 650px) {
      .app { padding-top: 14px; gap: 12px; }
      .topbar { min-height: 46px; }
      .logo-mark { width: 36px; height: 36px; border-radius: 11px; box-shadow: 3px 3px 0 var(--ink); }
      .logo-mark::before { left: 7px; top: 8px; width: 6px; height: 6px; }
      .logo-mark::after { right: 7px; top: 7px; width: 6px; height: 6px; }
      .brand-note { display: none; }
      .icon-button { width: 38px; height: 36px; border-radius: 10px; }
      .game-frame { padding: 8px; border-radius: 20px; }
      .stage-wrap { border-radius: 14px; }
      .hud { inset: 10px 11px auto; gap: 6px; }
      .stat-chip { min-width: 79px; padding: 7px 9px 6px; border-radius: 10px; }
      .stat-label { font-size: .5rem; }
      .stat-value { font-size: 1rem; margin-top: 3px; }
      .speed-meter { width: 95px; padding: 7px 8px 8px; border-radius: 10px; }
      .speed-meter .stat-label { font-size: .5rem; }
      .meter-track { height: 5px; margin-top: 5px; }
      .stage-hint { bottom: 10px; padding: 7px 10px; font-size: .59rem; gap: 6px; }
      .keycap { min-width: 18px; padding: 2px 4px; font-size: .55rem; }
      .bottom-row { align-items: flex-start; padding: 0 2px; }
      .how-to { font-size: .66rem; gap: 7px; }
      .jump-icon { width: 28px; height: 28px; }
      .tip { display: none; }
      .result-card { padding: 22px 19px 20px; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .001ms !important; animation-iteration-count: 1 !important; scroll-behavior: auto !important; transition-duration: .001ms !important; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="logo-lockup" aria-label="Fun Game">
        <div class="logo-mark" aria-hidden="true"><span class="logo-spark"></span></div>
        <div>
          <div class="brand-name">Fun Game</div>
          <div class="brand-note">Hop, bop, repeat</div>
        </div>
      </div>
      <div class="top-actions">
        <button class="icon-button" id="soundButton" type="button" aria-label="Turn sound off" aria-pressed="true">🔊</button>
        <button class="icon-button" id="resetButton" type="button" aria-label="Restart game">↻</button>
      </div>
    </header>

    <section class="game-frame" aria-label="Fun Game play area">
      <div class="stage-wrap">
        <canvas id="gameCanvas" width="1000" height="562" aria-label="A runner game. Press Space, the up arrow, or tap to jump."></canvas>
        <div class="hud" aria-live="polite">
          <div class="hud-left">
            <div class="stat-chip score-chip"><span class="stat-label">Score</span><span class="stat-value" id="scoreValue">0000</span></div>
            <div class="stat-chip best-chip"><span class="stat-label">Best run</span><span class="stat-value" id="bestValue">0000</span></div>
          </div>
          <div class="speed-meter"><span class="stat-label">Zoom level</span><div class="meter-track"><div class="meter-fill" id="speedFill"></div></div></div>
        </div>
        <div class="stage-hint" id="stageHint"><span class="keycap">SPACE</span> or tap to jump</div>
        <div class="game-over" id="gameOver" aria-hidden="true">
          <div class="result-card" role="dialog" aria-modal="true" aria-labelledby="resultTitle">
            <div class="result-emoji" id="resultEmoji">😵‍💫</div>
            <div class="result-kicker">Well, that happened</div>
            <h1 class="result-title" id="resultTitle">Bonk! Try again?</h1>
            <p class="result-copy" id="resultCopy">The obstacle was rude. Your score was not.</p>
            <div class="result-numbers">
              <div class="result-number"><small>Your run</small><strong id="finalScore">0000</strong></div>
              <div class="result-number best"><small>Best run</small><strong id="finalBest">0000</strong></div>
            </div>
            <button class="primary-button" id="retryButton" type="button">↻ &nbsp; Try again</button>
          </div>
        </div>
      </div>
    </section>

    <div class="bottom-row">
      <div class="how-to"><span class="jump-icon">↗</span><span><strong>Jump</strong> with Space, ↑, or a tap</span></div>
      <div class="tip"><span class="tip-dot"></span><span>Every hop gets a little faster</span></div>
    </div>
  </main>

  <script>
    (() => {
      "use strict";
      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");
      const scoreEl = document.getElementById("scoreValue");
      const bestEl = document.getElementById("bestValue");
      const finalScoreEl = document.getElementById("finalScore");
      const finalBestEl = document.getElementById("finalBest");
      const speedFill = document.getElementById("speedFill");
      const gameOverEl = document.getElementById("gameOver");
      const stageHint = document.getElementById("stageHint");
      const retryButton = document.getElementById("retryButton");
      const resetButton = document.getElementById("resetButton");
      const soundButton = document.getElementById("soundButton");
      const resultEmoji = document.getElementById("resultEmoji");
      const resultCopy = document.getElementById("resultCopy");

      const W = 1000;
      const H = 562;
      const groundY = 449;
      const hero = { x: 174, y: groundY - 76, w: 58, h: 76, vy: 0, onGround: true, coyote: 0, jumpBuffer: 0, squash: 1, tilt: 0, blink: 0, runTime: 0 };
      const palette = { ink: "#1b2333", coral: "#ff6f61", yellow: "#ffd75a", teal: "#31c3b4", navy: "#27334d", cream: "#fffaf0", blue: "#a9dcf0" };

      let state = "running";
      let score = 0;
      let best = Number(localStorage.getItem("fun-game-best") || 0);
      let distance = 0;
      let lastTime = performance.now();
      let spawnClock = 1.4;
      let obstacleId = 0;
      let soundOn = true;
      let audioContext = null;
      let flash = 0;
      let milestone = 0;
      let screenShake = 0;
      let lastLand = 0;
      let particles = [];
      let obstacles = [];
      let floatingWords = [];

      bestEl.textContent = pad(best);

      function pad(value) { return String(Math.max(0, Math.floor(value))).padStart(4, "0"); }
      function clamp(value, min, max) { return Math.min(max, Math.max(min, value)); }
      function rand(min, max) { return min + Math.random() * (max - min); }

      function setupAudio() {
        if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
        if (audioContext.state === "suspended") audioContext.resume();
      }
      function blip(kind) {
        if (!soundOn) return;
        try {
          setupAudio();
          const now = audioContext.currentTime;
          const osc = audioContext.createOscillator();
          const gain = audioContext.createGain();
          const filter = audioContext.createBiquadFilter();
          osc.connect(filter); filter.connect(gain); gain.connect(audioContext.destination);
          filter.type = "lowpass"; filter.frequency.value = kind === "hit" ? 700 : 2400;
          const notes = { jump: [270, 500], land: [130, 85], score: [520, 760], hit: [190, 65], click: [360, 440] };
          const [from, to] = notes[kind] || notes.click;
          osc.type = kind === "hit" ? "sawtooth" : "triangle";
          osc.frequency.setValueAtTime(from, now);
          osc.frequency.exponentialRampToValueAtTime(Math.max(20, to), now + (kind === "hit" ? .28 : .13));
          gain.gain.setValueAtTime(.0001, now);
          gain.gain.exponentialRampToValueAtTime(kind === "hit" ? .16 : .09, now + .012);
          gain.gain.exponentialRampToValueAtTime(.0001, now + (kind === "hit" ? .32 : .18));
          osc.start(now); osc.stop(now + (kind === "hit" ? .34 : .2));
        } catch (_) { /* audio is a nice-to-have */ }
      }

      function resetGame() {
        state = "running";
        score = 0; distance = 0; spawnClock = 1.45; milestone = 0; flash = 0; screenShake = 0;
        obstacles = []; particles = []; floatingWords = [];
        Object.assign(hero, { y: groundY - hero.h, vy: 0, onGround: true, coyote: 0, jumpBuffer: 0, squash: 1, tilt: 0, runTime: 0 });
        scoreEl.textContent = pad(score);
        speedFill.style.width = "18%";
        stageHint.classList.remove("is-hidden");
        gameOverEl.classList.remove("visible");
        gameOverEl.setAttribute("aria-hidden", "true");
        lastTime = performance.now();
        blip("click");
      }

      function jump() {
        if (state === "over") { resetGame(); return; }
        setupAudio();
        hero.jumpBuffer = .13;
        if (hero.onGround || hero.coyote > 0) {
          hero.vy = -760;
          hero.onGround = false;
          hero.coyote = 0;
          hero.jumpBuffer = 0;
          hero.squash = .82;
          burst(hero.x + 23, groundY - 5, palette.cream, 7, 110);
          addWord("WHEE!", hero.x - 3, hero.y - 8, palette.coral);
          blip("jump");
          stageHint.classList.add("is-hidden");
        }
      }

      function spawnObstacle() {
        const type = Math.random() > .58 ? "puddle" : (Math.random() > .48 ? "crate" : "cactus");
        const specs = {
          cactus: { w: 43, h: rand(48, 67), color: palette.teal },
          crate: { w: 53, h: rand(45, 62), color: palette.coral },
          puddle: { w: 70, h: rand(25, 34), color: palette.yellow }
        };
        const spec = specs[type];
        obstacles.push({ id: ++obstacleId, type, x: W + 40, y: groundY - spec.h, w: spec.w, h: spec.h, color: spec.color, wobble: rand(0, Math.PI * 2), passed: false });
        const speed = gameSpeed();
        spawnClock = clamp(rand(1.18, 1.82) - (speed - 260) / 1250, .78, 1.82);
      }

      function gameSpeed() { return 270 + Math.min(230, score * 1.08); }
      function addWord(text, x, y, color) { floatingWords.push({ text, x, y, color, life: 1, drift: rand(-5, 5) }); }
      function burst(x, y, color, amount = 10, power = 160) {
        for (let i = 0; i < amount; i++) {
          const angle = rand(Math.PI * .9, Math.PI * 2.1);
          const speed = rand(power * .4, power);
          particles.push({ x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, life: 1, size: rand(3, 7), color, gravity: 560, shape: Math.random() > .5 ? "dot" : "star" });
        }
      }

      function update(dt) {
        if (state !== "running") { updateParticles(dt); return; }
        dt = Math.min(dt, .032);
        distance += gameSpeed() * dt;
        score += dt * (8 + gameSpeed() / 150);
        const shownScore = Math.floor(score);
        scoreEl.textContent = pad(shownScore);
        if (shownScore > best) { best = shownScore; bestEl.textContent = pad(best); localStorage.setItem("fun-game-best", best); }
        const normalizedSpeed = clamp((gameSpeed() - 270) / 230, 0, 1);
        speedFill.style.width = `${18 + normalizedSpeed * 82}%`;

        if (shownScore >= (milestone + 1) * 100) {
          milestone = Math.floor(shownScore / 100);
          addWord(`${milestone * 100}!`, hero.x + 4, hero.y - 24, palette.yellow);
          burst(hero.x + 30, hero.y + 25, palette.yellow, 14, 190);
          blip("score");
        }

        hero.runTime += dt * (gameSpeed() / 55);
        hero.jumpBuffer -= dt;
        hero.coyote = hero.onGround ? .1 : Math.max(0, hero.coyote - dt);
        if (hero.jumpBuffer > 0 && (hero.onGround || hero.coyote > 0)) jump();
        const wasGrounded = hero.onGround;
        hero.vy += 1900 * dt;
        hero.y += hero.vy * dt;
        if (hero.y >= groundY - hero.h) {
          hero.y = groundY - hero.h;
          if (!wasGrounded && hero.vy > 170) {
            hero.squash = 1.18; hero.tilt = 0; burst(hero.x + 24, groundY - 2, "#ffffff", 5, 90); if (performance.now() - lastLand > 180) blip("land"); lastLand = performance.now();
          }
          hero.vy = 0; hero.onGround = true;
        } else { hero.onGround = false; }
        hero.squash += (1 - hero.squash) * Math.min(1, dt * 11);
        hero.tilt += ((hero.onGround ? Math.sin(hero.runTime * 1.35) * .025 : clamp(hero.vy / 2100, -.28, .28)) - hero.tilt) * Math.min(1, dt * 8);
        hero.blink = Math.max(0, hero.blink - dt);
        if (Math.random() < dt * .9) hero.blink = .12;

        spawnClock -= dt;
        if (spawnClock <= 0) spawnObstacle();
        const speed = gameSpeed();
        for (let i = obstacles.length - 1; i >= 0; i--) {
          const obstacle = obstacles[i];
          obstacle.x -= speed * dt;
          obstacle.wobble += dt * 4;
          if (!obstacle.passed && obstacle.x + obstacle.w < hero.x - 4) {
            obstacle.passed = true;
            burst(obstacle.x + obstacle.w, obstacle.y + 4, "#ffffff", 3, 50);
          }
          if (obstacle.x + obstacle.w < -80) obstacles.splice(i, 1);
          else if (hitTest(hero, obstacle)) endGame();
        }
        updateParticles(dt);
        flash = Math.max(0, flash - dt * 3.5);
        screenShake = Math.max(0, screenShake - dt * 28);
      }

      function hitTest(a, b) {
        const ax = a.x + 12, ay = a.y + 11, aw = a.w - 22, ah = a.h - 13;
        const bx = b.x + 6, by = b.y + 4, bw = b.w - 12, bh = b.h - 5;
        return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
      }

      function updateParticles(dt) {
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i]; p.life -= dt * 2.2; p.x += p.vx * dt; p.y += p.vy * dt; p.vy += p.gravity * dt; p.vx *= .985;
          if (p.life <= 0) particles.splice(i, 1);
        }
        for (let i = floatingWords.length - 1; i >= 0; i--) {
          const w = floatingWords[i]; w.life -= dt * .78; w.y -= dt * 27; w.x += w.drift * dt;
          if (w.life <= 0) floatingWords.splice(i, 1);
        }
      }

      function endGame() {
        if (state === "over") return;
        state = "over"; flash = .8; screenShake = 14; hero.squash = 1.22;
        burst(hero.x + 28, hero.y + 36, palette.coral, 18, 240);
        addWord("BONK!", hero.x - 4, hero.y - 12, palette.coral);
        blip("hit");
        const finalScore = Math.floor(score);
        finalScoreEl.textContent = pad(finalScore); finalBestEl.textContent = pad(best);
        resultEmoji.textContent = finalScore > best - 1 && finalScore > 20 ? "🏆" : (finalScore > 50 ? "🤸" : "😵‍💫");
        resultCopy.textContent = finalScore > best - 1 && finalScore > 20 ? "New best! The obstacle is filing an appeal." : "The obstacle was rude. Your score was not.";
        setTimeout(() => { gameOverEl.classList.add("visible"); gameOverEl.setAttribute("aria-hidden", "false"); retryButton.focus({ preventScroll: true }); }, 220);
      }

      function draw() {
        ctx.save();
        if (screenShake > 0) ctx.translate(rand(-screenShake, screenShake) * .35, rand(-screenShake, screenShake) * .35);
        drawSky();
        drawClouds();
        drawHills();
        drawGround();
        obstacles.forEach(drawObstacle);
        drawHero();
        particles.forEach(drawParticle);
        floatingWords.forEach(drawWord);
        if (flash > 0) { ctx.fillStyle = `rgba(255,111,97,${flash * .16})`; ctx.fillRect(0, 0, W, H); }
        ctx.restore();
      }

      function drawSky() {
        const sky = ctx.createLinearGradient(0, 0, 0, groundY);
        sky.addColorStop(0, "#8dcbe9"); sky.addColorStop(.62, "#bfe7ee"); sky.addColorStop(1, "#f6d8a0");
        ctx.fillStyle = sky; ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = "rgba(255,247,207,.62)"; ctx.beginPath(); ctx.arc(806, 98, 46, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "rgba(255,255,255,.2)"; ctx.beginPath(); ctx.arc(806, 98, 60, 0, Math.PI * 2); ctx.fill();
      }

      function drawClouds() {
        const offset = (distance * .11) % 1180;
        drawCloud(170 - offset, 100, 1.1, .82); drawCloud(660 - offset, 156, .74, .65); drawCloud(1040 - offset, 72, .56, .6);
        drawCloud(1220 - offset, 116, .92, .63); drawCloud(390 - ((distance * .07) % 1180), 210, .46, .45);
      }
      function drawCloud(x, y, scale, alpha) {
        ctx.save(); ctx.globalAlpha = alpha; ctx.translate(x, y); ctx.scale(scale, scale); ctx.fillStyle = "#f9f4e8";
        ctx.beginPath(); ctx.moveTo(-56, 18); ctx.bezierCurveTo(-72, 16, -70, -4, -50, -4); ctx.bezierCurveTo(-45, -28, -13, -37, 3, -18); ctx.bezierCurveTo(26, -35, 53, -20, 48, 2); ctx.bezierCurveTo(76, 0, 81, 24, 54, 27); ctx.lineTo(-55, 27); ctx.closePath(); ctx.fill();
        ctx.fillStyle = "rgba(27,35,51,.06)"; ctx.fillRect(-52, 25, 108, 5); ctx.restore();
      }

      function drawHills() {
        const far = (distance * .14) % 1100;
        ctx.fillStyle = "#91d2c5"; ctx.beginPath(); ctx.moveTo(0, 365); for (let x = -200 - far; x <= W + 250; x += 135) { ctx.quadraticCurveTo(x + 45, 304 + (Math.abs(x) % 3) * 10, x + 135, 365); } ctx.lineTo(W, groundY + 10); ctx.lineTo(0, groundY + 10); ctx.closePath(); ctx.fill();
        const near = (distance * .27) % 980;
        ctx.fillStyle = "#62bcb2"; ctx.beginPath(); ctx.moveTo(0, 405); for (let x = -220 - near; x <= W + 250; x += 170) { ctx.quadraticCurveTo(x + 72, 335 + (Math.abs(x) % 2) * 15, x + 170, 405); } ctx.lineTo(W, groundY + 15); ctx.lineTo(0, groundY + 15); ctx.closePath(); ctx.fill();
        ctx.fillStyle = "rgba(255,255,255,.34)"; ctx.beginPath(); ctx.moveTo(0, 397); for (let x = -220 - near; x <= W + 250; x += 170) { ctx.quadraticCurveTo(x + 72, 327 + (Math.abs(x) % 2) * 15, x + 170, 397); } ctx.lineTo(W, 405); ctx.lineTo(0, 405); ctx.closePath(); ctx.fill();
      }

      function drawGround() {
        ctx.fillStyle = "#f8d998"; ctx.fillRect(0, groundY, W, H - groundY);
        ctx.fillStyle = "#efb866"; ctx.fillRect(0, groundY, W, 9);
        ctx.fillStyle = "rgba(255,250,235,.48)";
        const offset = (distance * .9) % 74;
        for (let x = -74 - offset; x < W + 74; x += 74) { ctx.beginPath(); ctx.ellipse(x, groundY + 37, 25, 4, -.08, 0, Math.PI * 2); ctx.fill(); }
        ctx.fillStyle = "rgba(160,102,55,.18)";
        for (let x = 20 - ((distance * 1.4) % 52); x < W; x += 52) { ctx.fillRect(x, groundY + 68 + (x % 3) * 5, 18, 3); }
      }

      function drawObstacle(o) {
        ctx.save();
        const bob = o.type === "puddle" ? Math.sin(o.wobble) * 1.5 : Math.sin(o.wobble) * 2;
        ctx.translate(o.x, o.y + bob);
        if (o.type === "cactus") drawCactus(o); else if (o.type === "crate") drawCrate(o); else drawPuddle(o);
        ctx.restore();
      }
      function drawCactus(o) {
        ctx.fillStyle = "rgba(27,35,51,.18)"; ctx.beginPath(); ctx.ellipse(o.w / 2, o.h + 7, o.w * .65, 6, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = o.color; ctx.strokeStyle = palette.ink; ctx.lineWidth = 4; ctx.lineJoin = "round";
        ctx.beginPath(); ctx.moveTo(13, o.h); ctx.lineTo(13, 23); ctx.quadraticCurveTo(13, 15, 21, 15); ctx.lineTo(25, 15); ctx.lineTo(25, 2); ctx.quadraticCurveTo(25, -5, 32, 0); ctx.lineTo(32, 15); ctx.lineTo(37, 15); ctx.quadraticCurveTo(43, 15, 43, 22); ctx.lineTo(43, o.h); ctx.closePath(); ctx.fill(); ctx.stroke();
        ctx.fillStyle = palette.ink; ctx.beginPath(); ctx.arc(24, 29, 2.5, 0, Math.PI * 2); ctx.arc(34, 29, 2.5, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = palette.ink; ctx.lineWidth = 2.2; ctx.beginPath(); ctx.arc(29, 33, 5, 0, Math.PI); ctx.stroke();
      }
      function drawCrate(o) {
        ctx.fillStyle = "rgba(27,35,51,.18)"; ctx.beginPath(); ctx.ellipse(o.w / 2, o.h + 7, o.w * .63, 6, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = o.color; ctx.strokeStyle = palette.ink; ctx.lineWidth = 4; ctx.lineJoin = "round";
        ctx.beginPath(); ctx.roundRect(2, 2, o.w - 4, o.h - 2, 8); ctx.fill(); ctx.stroke();
        ctx.strokeStyle = "rgba(27,35,51,.32)"; ctx.lineWidth = 5; ctx.beginPath(); ctx.moveTo(9, 10); ctx.lineTo(o.w - 10, o.h - 9); ctx.moveTo(o.w - 10, 10); ctx.lineTo(9, o.h - 9); ctx.stroke();
        ctx.fillStyle = palette.cream; ctx.beginPath(); ctx.arc(o.w / 2 - 8, o.h / 2 - 2, 3, 0, Math.PI * 2); ctx.arc(o.w / 2 + 8, o.h / 2 - 2, 3, 0, Math.PI * 2); ctx.fill();
      }
      function drawPuddle(o) {
        ctx.fillStyle = "rgba(27,35,51,.18)"; ctx.beginPath(); ctx.ellipse(o.w / 2, o.h + 8, o.w * .61, 6, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = o.color; ctx.strokeStyle = palette.ink; ctx.lineWidth = 4; ctx.beginPath(); ctx.moveTo(2, o.h - 7); ctx.quadraticCurveTo(15, -1, 30, 10); ctx.quadraticCurveTo(42, -3, 67, 8); ctx.quadraticCurveTo(76, 22, 61, o.h - 3); ctx.quadraticCurveTo(33, o.h + 9, 2, o.h - 7); ctx.closePath(); ctx.fill(); ctx.stroke();
        ctx.fillStyle = palette.ink; ctx.beginPath(); ctx.arc(29, 17, 2.7, 0, Math.PI * 2); ctx.arc(42, 17, 2.7, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = palette.ink; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(35, 19, 5, 0, Math.PI); ctx.stroke();
      }

      function drawHero() {
        const bob = hero.onGround ? Math.abs(Math.sin(hero.runTime * 1.7)) * 2.5 : 0;
        ctx.save(); ctx.translate(hero.x + hero.w / 2, hero.y + hero.h); ctx.rotate(hero.tilt); ctx.scale(1 / hero.squash, hero.squash); ctx.translate(-hero.w / 2, -hero.h - bob);
        ctx.fillStyle = "rgba(27,35,51,.2)"; ctx.beginPath(); ctx.ellipse(30, 6, 34, 6, 0, 0, Math.PI * 2); ctx.fill();
        const legWave = hero.onGround ? Math.sin(hero.runTime * 1.7) * 10 : 0;
        ctx.strokeStyle = palette.ink; ctx.lineWidth = 6; ctx.lineCap = "round";
        ctx.beginPath(); ctx.moveTo(20, 63); ctx.lineTo(18 + legWave * .35, 75); ctx.lineTo(10 + legWave * .35, 75); ctx.moveTo(40, 63); ctx.lineTo(44 - legWave * .35, 75); ctx.lineTo(52 - legWave * .35, 75); ctx.stroke();
        ctx.fillStyle = palette.coral; ctx.strokeStyle = palette.ink; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(12, 30); ctx.quadraticCurveTo(14, 7, 31, 7); ctx.quadraticCurveTo(49, 7, 51, 28); ctx.lineTo(48, 59); ctx.quadraticCurveTo(31, 69, 13, 59); ctx.closePath(); ctx.fill(); ctx.stroke();
        ctx.fillStyle = palette.yellow; ctx.beginPath(); ctx.arc(31, 8, 12, Math.PI, Math.PI * 1.88); ctx.lineTo(39, 8); ctx.closePath(); ctx.fill(); ctx.stroke();
        ctx.fillStyle = palette.cream;
        if (hero.blink > 0) { ctx.strokeStyle = palette.ink; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(20, 29); ctx.lineTo(27, 29); ctx.moveTo(35, 29); ctx.lineTo(42, 29); ctx.stroke(); }
        else { ctx.beginPath(); ctx.arc(24, 29, 5, 0, Math.PI * 2); ctx.arc(39, 29, 5, 0, Math.PI * 2); ctx.fill(); ctx.fillStyle = palette.ink; ctx.beginPath(); ctx.arc(25, 30, 2.5, 0, Math.PI * 2); ctx.arc(38, 30, 2.5, 0, Math.PI * 2); ctx.fill(); }
        ctx.strokeStyle = palette.ink; ctx.lineWidth = 2.7; ctx.beginPath(); ctx.arc(31, 37, 8, 0, Math.PI); ctx.stroke();
        ctx.fillStyle = palette.yellow; ctx.strokeStyle = palette.ink; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(13, 44); ctx.quadraticCurveTo(1, 47, 7, 55); ctx.quadraticCurveTo(13, 54, 17, 49); ctx.fill(); ctx.stroke();
        ctx.strokeStyle = palette.ink; ctx.lineWidth = 4; ctx.beginPath(); ctx.moveTo(14, 53); ctx.lineTo(4, 59); ctx.moveTo(48, 50); ctx.lineTo(57, 55); ctx.stroke();
        ctx.restore();
      }

      function drawParticle(p) {
        ctx.save(); ctx.globalAlpha = clamp(p.life, 0, 1); ctx.fillStyle = p.color; ctx.translate(p.x, p.y); ctx.rotate(p.life * 4);
        if (p.shape === "star") { ctx.beginPath(); for (let i = 0; i < 10; i++) { const r = i % 2 ? p.size * .4 : p.size; const a = i * Math.PI / 5; ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r); } ctx.closePath(); ctx.fill(); } else { ctx.beginPath(); ctx.arc(0, 0, p.size * p.life, 0, Math.PI * 2); ctx.fill(); }
        ctx.restore();
      }
      function drawWord(w) {
        ctx.save(); ctx.globalAlpha = clamp(w.life, 0, 1); ctx.fillStyle = w.color; ctx.strokeStyle = palette.ink; ctx.lineWidth = 4; ctx.lineJoin = "round"; ctx.font = "700 23px Fredoka, sans-serif"; ctx.textAlign = "center"; ctx.strokeText(w.text, w.x, w.y, 130); ctx.fillText(w.text, w.x, w.y, 130); ctx.restore();
      }

      function loop(now) {
        const dt = (now - lastTime) / 1000; lastTime = now;
        update(dt); draw(); requestAnimationFrame(loop);
      }

      canvas.addEventListener("pointerdown", (event) => { event.preventDefault(); jump(); }, { passive: false });
      window.addEventListener("keydown", (event) => {
        if (["Space", "ArrowUp", "KeyW"].includes(event.code)) { event.preventDefault(); jump(); }
        if (event.code === "KeyM") toggleSound();
      });
      retryButton.addEventListener("click", resetGame);
      resetButton.addEventListener("click", resetGame);
      function toggleSound() {
        soundOn = !soundOn; soundButton.textContent = soundOn ? "🔊" : "🔇"; soundButton.setAttribute("aria-pressed", String(soundOn)); soundButton.setAttribute("aria-label", soundOn ? "Turn sound off" : "Turn sound on"); if (soundOn) blip("click");
      }
      soundButton.addEventListener("click", toggleSound);

      requestAnimationFrame(loop);
    })();
  </script>
</body>
</html>
