<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dunk Lab — Tea dunkability simulator</title>
  <meta name="theme-color" content="#1c1424" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap');

    :root {
      --ink: #f5efe9;
      --muted: #a79ba8;
      --faint: #6f6473;
      --bg: #19131f;
      --bg-deep: #120e18;
      --panel: rgba(43, 32, 48, .76);
      --panel-solid: #2b2030;
      --panel-soft: rgba(59, 42, 63, .72);
      --line: rgba(255, 237, 225, .11);
      --line-strong: rgba(255, 237, 225, .18);
      --cream: #fff3e4;
      --tea: #a9643c;
      --tea-dark: #6f392f;
      --apricot: #ee9e6a;
      --apricot-soft: #f6c09a;
      --mint: #a9cebb;
      --lavender: #c0b0db;
      --red: #ed786e;
      --display: 'Fraunces', Georgia, serif;
      --sans: 'Manrope', system-ui, sans-serif;
      --mono: 'DM Mono', monospace;
      --shadow: 0 24px 90px rgba(5, 2, 11, .28);
    }

    [data-theme="light"] {
      --ink: #2a1f2c;
      --muted: #756a79;
      --faint: #9c8f9e;
      --bg: #f4eee8;
      --bg-deep: #eee5df;
      --panel: rgba(255, 251, 246, .76);
      --panel-solid: #fffaf4;
      --panel-soft: rgba(255, 245, 236, .85);
      --line: rgba(49, 31, 42, .1);
      --line-strong: rgba(49, 31, 42, .17);
      --cream: #3c2d39;
      --tea: #a9643c;
      --tea-dark: #6f392f;
      --apricot: #d87943;
      --apricot-soft: #bd6335;
      --mint: #4c9279;
      --lavender: #78669a;
      --red: #ca554e;
      --shadow: 0 24px 90px rgba(87, 54, 36, .12);
    }

    * { box-sizing: border-box; }
    html { min-width: 320px; background: var(--bg); }
    body {
      margin: 0;
      min-width: 320px;
      min-height: 100vh;
      background:
        radial-gradient(circle at 84% 6%, rgba(153, 99, 102, .14), transparent 25rem),
        radial-gradient(circle at 8% 90%, rgba(83, 113, 121, .09), transparent 28rem),
        var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
      transition: background .35s ease, color .35s ease;
    }
    button, input { font: inherit; }
    button { color: inherit; }
    button:focus-visible, input:focus-visible { outline: 2px solid var(--apricot); outline-offset: 4px; }
    .app-shell { max-width: 1480px; margin: 0 auto; padding: 26px 42px 34px; }

    .topbar { display: flex; align-items: center; justify-content: space-between; gap: 20px; margin-bottom: 54px; }
    .brand { display: inline-flex; align-items: center; gap: 12px; text-decoration: none; color: inherit; }
    .brand-mark { width: 39px; height: 39px; display: grid; place-items: center; border: 1px solid var(--line-strong); border-radius: 13px; background: linear-gradient(145deg, #4a314a, #221b2a); box-shadow: inset 0 1px rgba(255,255,255,.1); }
    [data-theme="light"] .brand-mark { background: linear-gradient(145deg, #fff, #ead8cf); }
    .brand-mark svg { width: 23px; height: 23px; }
    .brand-copy { display: flex; flex-direction: column; gap: 1px; }
    .brand-name { font-size: 13px; font-weight: 800; letter-spacing: .16em; line-height: 1; }
    .brand-tag { color: var(--muted); font-family: var(--mono); font-size: 9px; letter-spacing: .13em; text-transform: uppercase; }
    .top-actions { display: flex; align-items: center; gap: 12px; }
    .session-pill { display: flex; align-items: center; gap: 8px; color: var(--muted); font-family: var(--mono); font-size: 10px; letter-spacing: .09em; text-transform: uppercase; }
    .live-dot { width: 7px; height: 7px; border-radius: 999px; background: var(--mint); box-shadow: 0 0 0 4px rgba(169, 206, 187, .1), 0 0 12px rgba(169, 206, 187, .6); }
    .icon-btn { width: 37px; height: 37px; display: grid; place-items: center; border: 1px solid var(--line); border-radius: 11px; background: transparent; cursor: pointer; transition: background .2s ease, border-color .2s ease, transform .2s ease; }
    .icon-btn:hover { background: var(--panel-soft); border-color: var(--line-strong); transform: translateY(-1px); }
    .icon-btn svg { width: 16px; height: 16px; }

    .hero { display: flex; align-items: flex-end; justify-content: space-between; gap: 40px; margin-bottom: 33px; animation: rise-in .7s cubic-bezier(.22,.78,.22,1) both; }
    .eyebrow { display: flex; align-items: center; gap: 9px; color: var(--apricot); font-family: var(--mono); font-size: 10px; letter-spacing: .16em; text-transform: uppercase; margin-bottom: 15px; }
    .eyebrow-line { width: 28px; height: 1px; background: var(--apricot); opacity: .75; }
    h1 { max-width: 700px; margin: 0; font-family: var(--display); font-size: clamp(38px, 5vw, 72px); font-weight: 500; letter-spacing: -.055em; line-height: .96; }
    h1 em { color: var(--apricot); font-style: italic; }
    .hero-note { max-width: 260px; padding-bottom: 6px; color: var(--muted); font-size: 13px; line-height: 1.6; }
    .hero-note strong { color: var(--ink); font-weight: 700; }

    .main-grid { display: grid; grid-template-columns: minmax(0, 1.43fr) minmax(350px, .89fr); gap: 16px; align-items: stretch; }
    .glass { position: relative; background: var(--panel); border: 1px solid var(--line); border-radius: 24px; box-shadow: var(--shadow), inset 0 1px rgba(255,255,255,.045); backdrop-filter: blur(22px); -webkit-backdrop-filter: blur(22px); overflow: hidden; }
    .simulation-card { min-height: 535px; padding: 25px 28px 21px; animation: rise-in .7s .08s cubic-bezier(.22,.78,.22,1) both; }
    .card-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 20px; }
    .section-kicker { color: var(--muted); font-family: var(--mono); font-size: 10px; letter-spacing: .14em; text-transform: uppercase; }
    .card-title { margin: 8px 0 0; font-family: var(--display); font-size: 24px; font-weight: 600; letter-spacing: -.03em; }
    .status-chip { display: inline-flex; align-items: center; gap: 7px; padding: 8px 11px; border: 1px solid rgba(169,206,187,.2); border-radius: 10px; color: var(--mint); background: rgba(169,206,187,.07); font-family: var(--mono); font-size: 10px; letter-spacing: .08em; text-transform: uppercase; white-space: nowrap; }
    .status-chip.warn { color: var(--apricot); border-color: rgba(238,158,106,.28); background: rgba(238,158,106,.08); }
    .status-chip.danger { color: var(--red); border-color: rgba(237,120,110,.3); background: rgba(237,120,110,.09); }
    .status-chip .status-bullet { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

    .scene { position: relative; height: 375px; margin: 20px -8px 4px; border-radius: 17px; background: radial-gradient(ellipse at 55% 73%, rgba(123,77,67,.24), transparent 39%), linear-gradient(155deg, rgba(116,81,91,.16), transparent 48%), rgba(16,12,22,.2); border: 1px solid rgba(255,255,255,.035); overflow: hidden; }
    [data-theme="light"] .scene { background: radial-gradient(ellipse at 55% 73%, rgba(183,108,75,.19), transparent 39%), linear-gradient(155deg, rgba(157,113,125,.14), transparent 48%), rgba(247,238,232,.54); }
    .scene::before { content: ''; position: absolute; inset: 0; opacity: .24; background-image: radial-gradient(rgba(255,255,255,.12) .6px, transparent .6px); background-size: 13px 13px; mix-blend-mode: overlay; }
    .scene-label { position: absolute; left: 17px; bottom: 15px; color: var(--faint); font-family: var(--mono); font-size: 9px; letter-spacing: .1em; text-transform: uppercase; }
    .scene-temp { position: absolute; top: 15px; left: 17px; display: flex; align-items: center; gap: 5px; color: var(--muted); font-family: var(--mono); font-size: 10px; letter-spacing: .1em; }
    .scene-temp strong { color: var(--apricot); font-weight: 500; }
    .dunk-stage { position: absolute; left: 50%; top: 50%; width: 395px; height: 310px; transform: translate(-48%, -43%); }
    .table-shadow { position: absolute; left: 50%; bottom: 29px; width: 285px; height: 42px; transform: translateX(-50%); border-radius: 50%; background: rgba(7,4,11,.36); filter: blur(15px); }
    .plate { position: absolute; left: 50%; bottom: 29px; width: 238px; height: 31px; transform: translateX(-50%); border-radius: 50%; border: 1px solid rgba(255,243,228,.3); background: linear-gradient(to bottom, rgba(255,243,228,.18), rgba(255,243,228,.05)); box-shadow: 0 4px 8px rgba(0,0,0,.25), inset 0 1px rgba(255,255,255,.2); }
    .plate::after { content: ''; position: absolute; inset: 7px 27px; border-radius: 50%; border: 1px solid rgba(255,243,228,.12); }
    .cup-wrap { position: absolute; left: 50%; bottom: 46px; width: 205px; height: 175px; transform: translateX(-50%); animation: cup-breathe 4.6s ease-in-out infinite; }
    .cup-body { position: absolute; left: 13px; bottom: 9px; width: 177px; height: 129px; border-radius: 13px 13px 61px 61px / 12px 12px 45px 45px; background: linear-gradient(110deg, #fbefe1 0%, #e8d4cb 53%, #c79da0 100%); border: 1px solid rgba(255,255,255,.55); box-shadow: inset 12px 0 15px rgba(255,255,255,.25), inset -15px -7px 20px rgba(100,49,62,.12), 0 16px 20px rgba(5,2,10,.24); }
    .cup-body::before { content: ''; position: absolute; left: 10px; right: 10px; top: -7px; height: 27px; border-radius: 50%; background: linear-gradient(to bottom, #fff5e9 0 20%, #bb7049 25% 73%, #6e3d3c 83% 100%); border: 1px solid rgba(255,255,255,.5); box-shadow: inset 0 3px 5px rgba(102,41,30,.35); }
    .cup-body::after { content: ''; position: absolute; left: 20px; top: 29px; width: 7px; height: 72px; border-radius: 50%; background: rgba(255,255,255,.35); filter: blur(2px); transform: rotate(3deg); }
    .cup-handle { position: absolute; right: -25px; top: 25px; width: 60px; height: 71px; border: 11px solid #dfc2bd; border-left: 0; border-radius: 0 55% 55% 0; box-shadow: inset -5px 4px 5px rgba(255,255,255,.33), 4px 6px 10px rgba(8,2,10,.18); }
    .cup-handle::after { content: ''; position: absolute; right: 8px; top: 12px; width: 32px; height: 44px; border: 1px solid rgba(117,69,81,.18); border-left: 0; border-radius: 0 55% 55% 0; }
    .biscuit { position: absolute; z-index: 3; left: 53px; top: 22px; width: 102px; height: 49px; transform: rotate(-15deg); border-radius: 22px; background: linear-gradient(110deg, #dfad70, #b97448); border: 1px solid rgba(255,229,183,.52); box-shadow: inset 3px 3px 8px rgba(255,224,168,.3), inset -5px -6px 9px rgba(109,53,39,.24), 0 8px 12px rgba(12,4,12,.25); animation: dunk-biscuit 4.6s ease-in-out infinite; }
    .biscuit::before { content: ''; position: absolute; inset: 7px 10px; border: 1px dashed rgba(101,54,35,.22); border-radius: 15px; }
    .biscuit::after { content: '✦  ✦  ✦'; position: absolute; inset: 13px 0 0 20px; color: rgba(111,57,36,.38); font-family: Georgia, serif; font-size: 10px; letter-spacing: 7px; }
    .crumb { position: absolute; z-index: 4; width: 7px; height: 7px; border-radius: 35% 60% 45% 55%; background: #ce8b55; box-shadow: inset 1px 1px rgba(255,220,151,.5); opacity: 0; }
    .crumb.c1 { left: 45px; top: 80px; --x: -55px; --y: 116px; }
    .crumb.c2 { left: 138px; top: 66px; --x: 82px; --y: 121px; width: 5px; height: 5px; }
    .crumb.c3 { left: 76px; top: 71px; --x: -31px; --y: 145px; width: 4px; height: 4px; }
    .crumb.c4 { left: 166px; top: 83px; --x: 103px; --y: 107px; width: 6px; height: 6px; }
    .crumb.c5 { left: 112px; top: 72px; --x: 32px; --y: 157px; width: 4px; height: 4px; }
    .crumb.c6 { left: 57px; top: 92px; --x: -84px; --y: 129px; width: 5px; height: 5px; }
    .crumb.c7 { left: 146px; top: 83px; --x: 49px; --y: 148px; width: 3px; height: 3px; }
    .crumb.c8 { left: 87px; top: 88px; --x: 11px; --y: 118px; width: 6px; height: 6px; }
    .danger-zone .crumb { animation: sprinkle 2.9s ease-out infinite; }
    .scene.paused * { animation-play-state: paused !important; }
    .danger-zone .crumb.c2 { animation-delay: .18s; } .danger-zone .crumb.c3 { animation-delay: .42s; } .danger-zone .crumb.c4 { animation-delay: .72s; } .danger-zone .crumb.c5 { animation-delay: .95s; } .danger-zone .crumb.c6 { animation-delay: 1.2s; } .danger-zone .crumb.c7 { animation-delay: 1.42s; } .danger-zone .crumb.c8 { animation-delay: 1.7s; }
    .steam { position: absolute; z-index: 2; bottom: 192px; width: 21px; height: 108px; opacity: .3; filter: blur(.4px); }
    .steam::before, .steam::after { content: ''; position: absolute; bottom: 0; width: 17px; height: 105px; border: solid rgba(255,247,236,.75); border-width: 0 2px 0 0; border-radius: 50%; transform: rotate(14deg); animation: steam-rise 3.7s ease-in-out infinite; }
    .steam::after { left: 13px; height: 91px; transform: rotate(-17deg); animation-delay: 1.2s; opacity: .64; }
    .steam.one { left: 133px; } .steam.two { left: 198px; bottom: 188px; transform: scale(.72); opacity: .21; animation-delay: 1.1s; }
    .mini-note { position: absolute; right: 17px; bottom: 14px; color: var(--faint); font-family: var(--mono); font-size: 9px; letter-spacing: .09em; text-transform: uppercase; }
    .mini-note span { color: var(--apricot); }

    .metrics-card { padding: 25px 25px 21px; animation: rise-in .7s .15s cubic-bezier(.22,.78,.22,1) both; }
    .metrics-score { display: flex; align-items: flex-end; justify-content: space-between; gap: 12px; margin-top: 32px; }
    .score-number { font-family: var(--display); font-size: 71px; font-weight: 500; letter-spacing: -.08em; line-height: .78; }
    .score-number small { margin-left: 4px; color: var(--muted); font-family: var(--mono); font-size: 15px; letter-spacing: 0; }
    .score-copy { max-width: 118px; padding-bottom: 2px; text-align: right; color: var(--muted); font-size: 11px; line-height: 1.5; }
    .score-copy strong { display: block; color: var(--ink); font-weight: 700; }
    .meter { margin-top: 29px; }
    .meter-track { position: relative; height: 8px; border-radius: 10px; background: linear-gradient(90deg, var(--red) 0 31%, var(--apricot) 31% 58%, var(--mint) 58% 100%); opacity: .92; }
    .meter-track::after { content: ''; position: absolute; inset: 2px 0; background: rgba(24,15,27,.24); border-radius: inherit; }
    [data-theme="light"] .meter-track::after { background: rgba(255,255,255,.28); }
    .meter-marker { position: absolute; z-index: 2; top: 50%; width: 17px; height: 17px; transform: translate(-50%, -50%); border: 3px solid var(--bg); border-radius: 50%; background: var(--ink); box-shadow: 0 0 0 1px rgba(255,255,255,.3), 0 3px 8px rgba(0,0,0,.3); transition: left .45s cubic-bezier(.22,.78,.22,1); }
    .meter-labels { display: flex; justify-content: space-between; margin-top: 11px; color: var(--faint); font-family: var(--mono); font-size: 9px; letter-spacing: .05em; text-transform: uppercase; }
    .graph { margin: 30px 0 0; }
    .graph-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .graph-head span:last-child { color: var(--faint); font-family: var(--mono); font-size: 9px; }
    .graph svg { display: block; width: 100%; height: 163px; overflow: visible; }
    .graph-line { fill: none; stroke: var(--apricot); stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; transition: d .4s ease; }
    .graph-area { fill: url(#areaFill); opacity: .9; transition: d .4s ease; }
    .graph-point { fill: var(--bg); stroke: var(--apricot); stroke-width: 2; transition: cx .4s ease, cy .4s ease; }
    .graph-legend { display: flex; gap: 17px; margin-top: 9px; color: var(--muted); font-family: var(--mono); font-size: 9px; }
    .legend-key { display: inline-flex; align-items: center; gap: 6px; }
    .legend-key i { width: 12px; height: 2px; border-radius: 5px; background: var(--apricot); } .legend-key i.current { width: 7px; height: 7px; border-radius: 50%; background: var(--bg); border: 2px solid var(--apricot); }
    .metrics-foot { display: flex; justify-content: space-between; gap: 20px; margin-top: 29px; padding-top: 16px; border-top: 1px solid var(--line); }
    .foot-stat { color: var(--muted); font-family: var(--mono); font-size: 9px; letter-spacing: .06em; line-height: 1.5; text-transform: uppercase; }
    .foot-stat strong { display: block; margin-bottom: 2px; color: var(--ink); font-size: 13px; font-weight: 500; letter-spacing: 0; text-transform: none; }

    .control-strip { display: grid; grid-template-columns: 1.05fr 1fr 1.43fr; gap: 16px; margin-top: 16px; animation: rise-in .7s .22s cubic-bezier(.22,.78,.22,1) both; }
    .control-card { min-height: 176px; padding: 21px 23px 19px; }
    .control-card.wide { grid-column: span 1; }
    .control-heading { display: flex; align-items: center; justify-content: space-between; gap: 15px; margin-bottom: 23px; }
    .control-label { color: var(--muted); font-family: var(--mono); font-size: 10px; letter-spacing: .12em; text-transform: uppercase; }
    .control-value { color: var(--ink); font-family: var(--display); font-size: 23px; letter-spacing: -.03em; }
    .control-value small { margin-left: 3px; color: var(--muted); font-family: var(--mono); font-size: 11px; letter-spacing: 0; }
    .range-wrap { position: relative; padding-top: 4px; }
    input[type="range"] { width: 100%; height: 22px; appearance: none; -webkit-appearance: none; background: transparent; cursor: ew-resize; }
    input[type="range"]::-webkit-slider-runnable-track { height: 4px; border-radius: 5px; background: linear-gradient(90deg, var(--apricot) var(--fill, 50%), rgba(255,255,255,.13) var(--fill, 50%)); }
    input[type="range"]::-moz-range-track { height: 4px; border-radius: 5px; background: rgba(255,255,255,.13); }
    input[type="range"]::-moz-range-progress { height: 4px; border-radius: 5px; background: var(--apricot); }
    input[type="range"]::-webkit-slider-thumb { width: 16px; height: 16px; margin-top: -6px; appearance: none; -webkit-appearance: none; border: 3px solid var(--bg); border-radius: 50%; background: var(--cream); box-shadow: 0 0 0 1px var(--line-strong), 0 2px 6px rgba(0,0,0,.25); }
    input[type="range"]::-moz-range-thumb { width: 12px; height: 12px; border: 3px solid var(--bg); border-radius: 50%; background: var(--cream); box-shadow: 0 0 0 1px var(--line-strong); }
    .range-ticks { display: flex; justify-content: space-between; margin-top: 7px; color: var(--faint); font-family: var(--mono); font-size: 9px; }
    .range-ticks span:nth-child(2) { color: var(--muted); }
    .biscuit-options { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; }
    .biscuit-option { position: relative; min-width: 0; min-height: 63px; padding: 9px 6px 7px; border: 1px solid var(--line); border-radius: 11px; background: transparent; cursor: pointer; transition: border-color .2s ease, background .2s ease, transform .2s ease; }
    .biscuit-option:hover { background: var(--panel-soft); transform: translateY(-1px); }
    .biscuit-option.active { border-color: rgba(238,158,106,.67); background: rgba(238,158,106,.09); box-shadow: inset 0 0 0 1px rgba(238,158,106,.08); }
    .biscuit-symbol { display: block; width: 28px; height: 15px; margin: 0 auto 8px; border: 1px solid rgba(226,169,112,.7); border-radius: 8px; background: linear-gradient(100deg, #dfad70, #a76545); box-shadow: inset 2px 2px 4px rgba(255,222,162,.24); transform: rotate(-12deg); }
    .biscuit-option:nth-child(2) .biscuit-symbol { border-radius: 4px; background: linear-gradient(100deg, #d8a06d, #9d5b40); }
    .biscuit-option:nth-child(3) .biscuit-symbol { width: 24px; border-radius: 50%; background: radial-gradient(circle at 28% 32%, #8c4f3f 0 2px, transparent 2px), radial-gradient(circle at 70% 57%, #8c4f3f 0 2px, transparent 2px), #c98652; }
    .biscuit-option:nth-child(4) .biscuit-symbol { border-radius: 50%; background: radial-gradient(#89503d 0 1px, transparent 1px) 0 0 / 6px 6px, #b97849; }
    .biscuit-option span:last-child { display: block; overflow: hidden; color: var(--muted); font-size: 9px; font-weight: 600; text-overflow: ellipsis; white-space: nowrap; }
    .biscuit-option.active span:last-child { color: var(--apricot-soft); }
    .integrity-note { margin-top: 13px; color: var(--faint); font-size: 10px; }
    .integrity-note b { color: var(--muted); font-weight: 600; }

    .shortcuts { display: flex; align-items: center; justify-content: space-between; gap: 15px; margin-top: 21px; color: var(--faint); font-family: var(--mono); font-size: 9px; letter-spacing: .02em; }
    .shortcut-list { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    kbd { display: inline-grid; place-items: center; min-width: 19px; height: 19px; padding: 0 5px; margin-right: 4px; border: 1px solid var(--line-strong); border-bottom-width: 2px; border-radius: 5px; color: var(--muted); background: var(--panel-soft); font-family: var(--mono); font-size: 9px; }
    .reset-btn { display: inline-flex; align-items: center; gap: 6px; border: 0; background: none; color: var(--muted); cursor: pointer; font-family: var(--mono); font-size: 9px; letter-spacing: .04em; text-transform: uppercase; transition: color .2s ease; }
    .reset-btn:hover { color: var(--apricot); }
    .reset-btn svg { width: 12px; height: 12px; }

    @keyframes rise-in { from { opacity: 0; transform: translateY(13px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes cup-breathe { 0%, 100% { transform: translateX(-50%) translateY(0); } 50% { transform: translateX(-50%) translateY(-4px); } }
    @keyframes dunk-biscuit { 0%, 17% { transform: translateY(0) rotate(-15deg); } 34%, 69% { transform: translateY(62px) rotate(-11deg); } 83%, 100% { transform: translateY(0) rotate(-15deg); } }
    @keyframes steam-rise { 0%, 100% { opacity: .18; transform: translateY(9px) rotate(12deg) scaleY(.91); } 45% { opacity: .7; } 65% { transform: translateY(-19px) rotate(-10deg) scaleY(1.05); } }
    @keyframes sprinkle { 0% { opacity: 0; transform: translate(0,0) rotate(0); } 12% { opacity: 1; } 100% { opacity: .65; transform: translate(var(--x), var(--y)) rotate(290deg); } }
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: .01ms !important; animation-iteration-count: 1 !important; transition-duration: .01ms !important; } }
    @media (max-width: 1020px) { .app-shell { padding-inline: 24px; } .main-grid { grid-template-columns: minmax(0, 1.1fr) minmax(320px, .9fr); } .control-strip { grid-template-columns: 1fr 1fr; } .control-card:last-child { grid-column: 1 / -1; } }
    @media (max-width: 760px) { .app-shell { padding: 20px 16px 27px; } .topbar { margin-bottom: 39px; } .session-pill { display: none; } .hero { display: block; margin-bottom: 27px; } h1 { font-size: clamp(40px, 14vw, 63px); } .hero-note { max-width: 330px; margin-top: 18px; padding: 0; } .main-grid { grid-template-columns: 1fr; } .simulation-card { min-height: 500px; padding-inline: 17px; } .metrics-card { padding-inline: 19px; } .scene { height: 340px; } .dunk-stage { transform: translate(-50%, -43%) scale(.86); } .control-strip { grid-template-columns: 1fr; } .control-card:last-child { grid-column: auto; } .shortcuts { align-items: flex-start; flex-direction: column; } }
    @media (max-width: 400px) { .dunk-stage { transform: translate(-50%, -43%) scale(.76); } .status-chip { padding-inline: 8px; font-size: 8px; } .card-title { font-size: 21px; } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useEffect, useMemo, useState } = React;

    const BISCUITS = [
      { name: 'Digestive', short: 'Digestive', soak: 1.0, ideal: 4.1, note: 'balanced classic' },
      { name: 'Rich Tea', short: 'Rich Tea', soak: .86, ideal: 3.4, note: 'delicate crumb' },
      { name: 'Ginger Nut', short: 'Ginger Nut', soak: 1.22, ideal: 4.8, note: 'sturdy snap' },
      { name: 'Hobnob', short: 'Hobnob', soak: 1.08, ideal: 4.4, note: 'oaty resilience' }
    ];

    const clamp = (n, min, max) => Math.min(max, Math.max(min, n));
    const signed = (n) => n > 0 ? `+${n}` : `${n}`;

    function Icon({ name, size = 16 }) {
      const common = { width: size, height: size, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 1.7, strokeLinecap: 'round', strokeLinejoin: 'round' };
      const paths = {
        sun: <><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.42 1.42M17.65 17.65l1.42 1.42M2 12h2M20 12h2M4.93 19.07l1.42-1.42M17.65 6.35l1.42-1.42"/></>,
        moon: <><path d="M20.6 15.3A8.5 8.5 0 0 1 8.7 3.4 8.5 8.5 0 1 0 20.6 15.3Z"/></>,
        refresh: <><path d="M20 11a8 8 0 0 0-14.8-4L3 10"/><path d="M3 5v5h5"/><path d="M4 13a8 8 0 0 0 14.8 4L21 14"/><path d="M21 19v-5h-5"/></>,
        cup: <><path d="M5 8h12v6.5A4.5 4.5 0 0 1 12.5 19h-3A4.5 4.5 0 0 1 5 14.5V8Z"/><path d="M17 10h1.6a2.4 2.4 0 0 1 0 4.8H17M3 21h15"/><path d="M8 5c0-1 1-1.2 1-2M12 5c0-1 1-1.2 1-2"/></>,
        drop: <><path d="M12 3.5S6.5 10.1 6.5 14.3a5.5 5.5 0 0 0 11 0C17.5 10.1 12 3.5 12 3.5Z"/><path d="M9.5 15.5a2.7 2.7 0 0 0 2.5 1.6"/></>,
      };
      return <svg {...common} aria-hidden="true">{paths[name]}</svg>;
    }

    function CupScene({ temp, score, risk, biscuit, paused }) {
      const danger = risk === 'danger';
      return <div className={`scene ${danger ? 'danger-zone' : ''} ${paused ? 'paused' : ''}`}>
        <div className="scene-temp"><Icon name="drop" size={12}/> / <strong>{temp}°C</strong> steeping environment</div>
        <div className="dunk-stage" aria-label={`Animated cup with ${biscuit.name} biscuit`}>
          <div className="table-shadow"/><div className="plate"/>
          <div className="steam one"/><div className="steam two"/>
          <div className="cup-wrap">
            <div className="cup-handle"/><div className="cup-body"/>
          </div>
          <div className="biscuit" title={biscuit.name}/>
          {['c1','c2','c3','c4','c5','c6','c7','c8'].map(c => <i className={`crumb ${c}`} key={c}/>) }
        </div>
        <div className="scene-label"><Icon name="cup" size={12}/> live dunk chamber / {biscuit.short.toLowerCase()}</div>
        <div className="mini-note"><span>{Math.round(score)}%</span> structural confidence</div>
      </div>;
    }

    function curvePath(temp, time, integrity, biscuit) {
      const points = [];
      for (let i = 0; i <= 40; i++) {
        const x = i / 4;
        const temperatureBoost = 1 + ((temp - 76) / 190);
        const softness = x * biscuit.soak * temperatureBoost;
        const strength = integrity / 100;
        const curve = 100 * Math.exp(-Math.pow((softness - biscuit.ideal) / (1.8 + strength * .6), 2) / 2);
        const collapse = x > biscuit.ideal ? Math.max(0, (x - biscuit.ideal) * 6.3 * biscuit.soak) : 0;
        const y = clamp(curve - collapse + strength * 3, 3, 100);
        const px = 14 + (x / 10) * 328;
        const py = 137 - (y / 100) * 112;
        points.push([px, py]);
      }
      return points;
    }

    function Graph({ temp, time, integrity, biscuit }) {
      const points = useMemo(() => curvePath(temp, time, integrity, biscuit), [temp,time,integrity,biscuit]);
      const line = points.map(([x,y], i) => `${i ? 'L' : 'M'}${x.toFixed(1)},${y.toFixed(1)}`).join(' ');
      const area = `${line} L342,137 L14,137 Z`;
      const tempBoost = 1 + ((temp - 76) / 190);
      const currentSoftness = time * biscuit.soak * tempBoost;
      const currentScore = clamp(100 * Math.exp(-Math.pow((currentSoftness - biscuit.ideal) / (1.8 + (integrity / 100) * .6), 2) / 2) - Math.max(0, currentSoftness - biscuit.ideal) * 6.3 * biscuit.soak + (integrity / 100) * 3, 3, 100);
      const cx = 14 + (time / 10) * 328;
      const cy = 137 - (currentScore / 100) * 112;
      return <div className="graph">
        <div className="graph-head"><span className="control-label">softness trajectory</span><span>10 sec window</span></div>
        <svg viewBox="0 0 356 151" role="img" aria-label="Crumble-o-meter graph showing softness over dunk time">
          <defs><linearGradient id="areaFill" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stopColor="#ee9e6a" stopOpacity=".3"/><stop offset="1" stopColor="#ee9e6a" stopOpacity="0"/></linearGradient></defs>
          {[25,53,81,109,137].map(y => <line key={y} x1="14" y1={y} x2="342" y2={y} stroke="var(--line)" strokeDasharray="2 5"/>) }
          <line x1="14" y1="137" x2="342" y2="137" stroke="var(--line-strong)"/>
          <path className="graph-area" d={area}/><path className="graph-line" d={line}/>
          <line x1={cx} y1="18" x2={cx} y2="137" stroke="var(--apricot)" strokeOpacity=".26" strokeDasharray="3 4"/>
          <circle className="graph-point" cx={cx} cy={cy} r="5"/>
          <text x="10" y="11" fill="var(--faint)" fontFamily="DM Mono, monospace" fontSize="8">100</text><text x="10" y="148" fill="var(--faint)" fontFamily="DM Mono, monospace" fontSize="8">0</text>
          {[0,2.5,5,7.5,10].map(v => <text key={v} x={14 + (v/10)*328} y="148" textAnchor="middle" fill="var(--faint)" fontFamily="DM Mono, monospace" fontSize="8">{v}s</text>)}
        </svg>
        <div className="graph-legend"><span className="legend-key"><i/> predicted integrity</span><span className="legend-key"><i className="current"/> right now</span></div>
      </div>;
    }

    function RangeControl({ label, value, min, max, step, unit, onChange, ticks, hint }) {
      const fill = `${((value - min) / (max - min)) * 100}%`;
      return <section className="glass control-card">
        <div className="control-heading"><span className="control-label">{label}</span><span className="control-value">{value}<small>{unit}</small></span></div>
        <div className="range-wrap"><input aria-label={label} type="range" min={min} max={max} step={step} value={value} style={{'--fill': fill}} onChange={e => onChange(Number(e.target.value))}/></div>
        <div className="range-ticks"><span>{ticks[0]}</span><span>{ticks[1]}</span><span>{ticks[2]}</span></div>
        {hint && <div className="integrity-note">{hint}</div>}
      </section>;
    }

    function App() {
      const [temp, setTemp] = useState(84);
      const [time, setTime] = useState(3.7);
      const [integrity, setIntegrity] = useState(72);
      const [biscuitIndex, setBiscuitIndex] = useState(0);
      const [dark, setDark] = useState(true);
      const [paused, setPaused] = useState(false);
      const biscuit = BISCUITS[biscuitIndex];

      const { score, risk, label } = useMemo(() => {
        const tempFactor = 1 + ((temp - 76) / 190);
        const softness = time * biscuit.soak * tempFactor;
        const sweetSpot = biscuit.ideal * (0.96 + integrity / 800);
        const distance = (softness - sweetSpot) / (1.58 + integrity / 90);
        let raw = 100 * Math.exp(-(distance * distance) / 2) + (integrity - 70) * .1;
        if (softness > sweetSpot) raw -= (softness - sweetSpot) * 7.2;
        if (temp > 94) raw -= (temp - 94) * .42;
        raw = clamp(raw, 4, 99);
        if (raw < 39) return { score: raw, risk: 'danger', label: 'crumbly territory' };
        if (raw < 64) return { score: raw, risk: 'warn', label: 'proceed gently' };
        return { score: raw, risk: 'good', label: 'golden dunk zone' };
      }, [temp, time, integrity, biscuit]);

      useEffect(() => { document.documentElement.dataset.theme = dark ? 'dark' : 'light'; }, [dark]);
      useEffect(() => {
        const onKey = (e) => {
          if (e.target.tagName === 'INPUT') return;
          if (e.key.toLowerCase() === 'd') setDark(v => !v);
          if (e.key.toLowerCase() === 'r') { setTemp(84); setTime(3.7); setIntegrity(72); setBiscuitIndex(0); }
          if (e.key === ' ') { e.preventDefault(); setPaused(v => !v); }
          if (/^[1-4]$/.test(e.key)) setBiscuitIndex(Number(e.key) - 1);
          if (e.key === 'ArrowUp') setTemp(v => clamp(v + 1, 55, 100));
          if (e.key === 'ArrowDown') setTemp(v => clamp(v - 1, 55, 100));
        };
        window.addEventListener('keydown', onKey); return () => window.removeEventListener('keydown', onKey);
      }, []);

      return <div className="app-shell">
        <header className="topbar">
          <a className="brand" href="#top" aria-label="Dunk Lab home"><span className="brand-mark"><Icon name="cup" size={21}/></span><span className="brand-copy"><span className="brand-name">DUNK LAB</span><span className="brand-tag">tea / biscuit studies</span></span></a>
          <div className="top-actions"><span className="session-pill"><i className="live-dot"/> session 04 / live</span><button className="icon-btn" aria-label={dark ? 'Switch to light mode' : 'Switch to dark mode'} onClick={() => setDark(v => !v)}><Icon name={dark ? 'sun' : 'moon'} size={16}/></button></div>
        </header>

        <main id="top">
          <section className="hero"><div><div className="eyebrow"><span className="eyebrow-line"/> domestic science, made delicious</div><h1>Find your perfect <em>dunk.</em></h1></div><p className="hero-note"><strong>A little heat. A little patience.</strong><br/>Tune the variables and watch the biscuit cross from pleasantly yielding to gloriously gone.</p></section>

          <div className="main-grid">
            <section className="glass simulation-card" aria-labelledby="sim-title">
              <div className="card-head"><div><div className="section-kicker">01 / live simulation</div><h2 className="card-title" id="sim-title">The dunk chamber</h2></div><div className={`status-chip ${risk === 'warn' ? 'warn' : risk === 'danger' ? 'danger' : ''}`}><i className="status-bullet"/>{label}</div></div>
              <CupScene temp={temp} score={score} risk={risk} biscuit={biscuit} paused={paused}/>
            </section>
            <section className="glass metrics-card" aria-labelledby="meter-title">
              <div className="card-head"><div><div className="section-kicker">02 / structural readout</div><h2 className="card-title" id="meter-title">Crumble-o-meter</h2></div><Icon name="drop" size={18}/></div>
              <div className="metrics-score"><div className="score-number">{Math.round(score)}<small>/100</small></div><p className="score-copy"><strong>{risk === 'good' ? 'Beautifully calibrated.' : risk === 'warn' ? 'This one is getting tender.' : 'The point of no return.'}</strong> biscuit integrity, estimated</p></div>
              <div className="meter"><div className="meter-track"><i className="meter-marker" style={{left: `${score}%`}}/></div><div className="meter-labels"><span>crumbs</span><span>golden</span><span>collapse</span></div></div>
              <Graph temp={temp} time={time} integrity={integrity} biscuit={biscuit}/>
              <div className="metrics-foot"><div className="foot-stat"><strong>{biscuit.short}</strong> biscuit profile</div><div className="foot-stat"><strong>{time.toFixed(1)}s</strong> current dunk</div><div className="foot-stat"><strong>{biscuit.ideal.toFixed(1)}s</strong> peak window</div></div>
            </section>
          </div>

          <div className="control-strip">
            <RangeControl label="Tea temperature" value={temp} min={55} max={100} step={1} unit="°C" onChange={setTemp} ticks={['55°', 'warm', '100°']} />
            <RangeControl label="Dunk duration" value={time} min={.5} max={10} step={.1} unit=" sec" onChange={setTime} ticks={['0.5s', 'sweet spot', '10s']} />
            <section className="glass control-card wide"><div className="control-heading"><span className="control-label">Biscuit type</span><span className="control-value"><small>profile {String(biscuitIndex + 1).padStart(2,'0')}</small></span></div><div className="biscuit-options">{BISCUITS.map((b, i) => <button key={b.name} className={`biscuit-option ${i === biscuitIndex ? 'active' : ''}`} onClick={() => setBiscuitIndex(i)} aria-pressed={i === biscuitIndex}><i className="biscuit-symbol"/><span>{b.name}</span></button>)}</div><div className="integrity-note"><b>{biscuit.note}</b> · ideal dunk {biscuit.ideal.toFixed(1)} seconds</div></section>
            <RangeControl label="Structural integrity" value={integrity} min={20} max={100} step={1} unit="%" onChange={setIntegrity} ticks={['fragile', 'average', 'fortified']} hint={<><b>{integrity < 48 ? 'Handle with care' : integrity > 82 ? 'Built for the long haul' : 'A dependable everyday crumb'}</b></>} />
          </div>
          <div className="shortcuts"><div className="shortcut-list"><span><kbd>1—4</kbd> biscuit</span><span><kbd>↑↓</kbd> temperature</span><span><kbd>space</kbd> {paused ? 'resume' : 'pause'} scene</span><span><kbd>D</kbd> theme</span></div><button className="reset-btn" onClick={() => {setTemp(84);setTime(3.7);setIntegrity(72);setBiscuitIndex(0);}}><Icon name="refresh" size={12}/> reset lab</button></div>
        </main>
      </div>;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
