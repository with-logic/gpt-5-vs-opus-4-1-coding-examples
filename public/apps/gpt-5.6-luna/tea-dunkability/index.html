<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#111413" />
  <title>Dunkability Simulator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@10..48,400;10..48,500;10..48,600;10..48,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --bg: #f2f0e8;
      --bg-deep: #e9e8df;
      --panel: rgba(255, 255, 252, .72);
      --panel-strong: rgba(255, 255, 252, .92);
      --ink: #17201e;
      --ink-soft: #68736d;
      --line: rgba(23, 32, 30, .12);
      --line-strong: rgba(23, 32, 30, .2);
      --tea: #bb754b;
      --tea-dark: #6b3928;
      --lime: #cbf26b;
      --lime-deep: #94bf44;
      --orange: #ef936b;
      --blue: #97d5ce;
      --cream: #fff7df;
      --shadow: 0 20px 80px rgba(38, 47, 41, .12);
      --radius-lg: 26px;
      --radius-md: 18px;
      --radius-sm: 11px;
    }

    body.dark {
      --bg: #111413;
      --bg-deep: #0b0e0d;
      --panel: rgba(27, 32, 29, .74);
      --panel-strong: rgba(31, 37, 33, .94);
      --ink: #ecf0df;
      --ink-soft: #98a49b;
      --line: rgba(236, 240, 223, .12);
      --line-strong: rgba(236, 240, 223, .22);
      --tea: #d48454;
      --tea-dark: #4f2c20;
      --cream: #fff1c9;
      --shadow: 0 24px 100px rgba(0, 0, 0, .27);
    }

    * { box-sizing: border-box; }
    html { min-width: 320px; background: var(--bg); }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: 'Bricolage Grotesque', sans-serif;
      transition: background .45s ease, color .45s ease;
    }
    button, input, select { font: inherit; }
    button { color: inherit; }
    button:focus-visible, select:focus-visible, input:focus-visible { outline: 3px solid var(--lime); outline-offset: 3px; }

    .app-shell {
      position: relative;
      min-height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at 83% 4%, rgba(203,242,107,.12), transparent 25rem),
        radial-gradient(circle at 0% 52%, rgba(151,213,206,.12), transparent 28rem),
        var(--bg);
    }
    .app-shell::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .16;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.16'/%3E%3C/svg%3E");
      mix-blend-mode: soft-light;
      z-index: 10;
    }
    .shell-inner { max-width: 1440px; margin: 0 auto; padding: 0 36px 42px; position: relative; z-index: 1; }
    .mono { font-family: 'DM Mono', monospace; letter-spacing: .02em; }
    .eyebrow { text-transform: uppercase; font-size: 10px; line-height: 1; letter-spacing: .16em; color: var(--ink-soft); font-family: 'DM Mono', monospace; }

    .topbar {
      height: 84px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--line);
      animation: arrive .65s both cubic-bezier(.22,1,.36,1);
    }
    .brand { display: flex; align-items: center; gap: 12px; min-width: 240px; }
    .brand-mark {
      width: 32px; height: 32px; border-radius: 10px; display: grid; place-items: center;
      background: var(--lime); color: #18200e; box-shadow: 3px 3px 0 rgba(23,32,30,.22); transform: rotate(-5deg);
    }
    .brand-mark svg { width: 20px; height: 20px; }
    .brand-name { font-weight: 600; font-size: 15px; letter-spacing: -.03em; }
    .brand-name span { color: var(--ink-soft); font-weight: 400; }
    .topnav { display: flex; align-items: center; gap: 28px; margin-left: 90px; }
    .nav-link { color: var(--ink-soft); font-size: 13px; text-decoration: none; position: relative; padding: 8px 0; }
    .nav-link.active { color: var(--ink); }
    .nav-link.active::after { content: ''; height: 2px; width: 20px; position: absolute; left: 0; bottom: -2px; background: var(--tea); border-radius: 2px; }
    .top-actions { display: flex; align-items: center; gap: 10px; min-width: 240px; justify-content: flex-end; }
    .icon-button, .theme-button {
      display: inline-flex; align-items: center; justify-content: center; border: 1px solid var(--line); background: var(--panel); cursor: pointer; transition: .2s ease; color: var(--ink-soft);
    }
    .icon-button:hover, .theme-button:hover { border-color: var(--line-strong); color: var(--ink); transform: translateY(-1px); }
    .icon-button { width: 36px; height: 36px; border-radius: 50%; }
    .theme-button { height: 36px; padding: 0 11px 0 8px; border-radius: 30px; gap: 7px; font-size: 11px; }
    .theme-button svg { width: 16px; height: 16px; color: var(--tea); }

    .hero {
      display: grid; grid-template-columns: minmax(0, 1.01fr) minmax(410px, .99fr); gap: 26px; padding: 45px 0 28px; align-items: stretch;
      animation: arrive .75s .08s both cubic-bezier(.22,1,.36,1);
    }
    .headline-block { display: flex; flex-direction: column; justify-content: space-between; min-height: 480px; padding: 9px 0 7px; }
    .headline-kicker { display: flex; align-items: center; gap: 10px; margin-bottom: 25px; }
    .live-dot { width: 7px; height: 7px; background: var(--lime-deep); border-radius: 50%; box-shadow: 0 0 0 5px rgba(148,191,68,.15); animation: pulse 2.5s ease-in-out infinite; }
    h1 { font-size: clamp(54px, 6.4vw, 94px); line-height: .88; letter-spacing: -.075em; font-weight: 500; margin: 0; max-width: 700px; }
    h1 em { color: var(--tea); font-style: normal; }
    .hero-sub { max-width: 400px; color: var(--ink-soft); font-size: 16px; line-height: 1.45; letter-spacing: -.02em; margin: 25px 0 0; }
    .hero-bottom { display: flex; align-items: flex-end; justify-content: space-between; gap: 30px; margin-top: 45px; }
    .protocol-meta { display: flex; align-items: center; gap: 13px; color: var(--ink-soft); font-size: 12px; }
    .protocol-meta strong { color: var(--ink); font-size: 13px; font-weight: 500; }
    .protocol-number { display: grid; place-items: center; width: 37px; height: 37px; border: 1px solid var(--line-strong); border-radius: 50%; font-size: 11px; color: var(--tea); }
    .small-note { max-width: 160px; font-size: 11px; line-height: 1.35; color: var(--ink-soft); text-align: right; }

    .glass { background: var(--panel); border: 1px solid var(--line); box-shadow: var(--shadow); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px); }
    .control-card { border-radius: var(--radius-lg); padding: 25px 27px 23px; display: flex; flex-direction: column; justify-content: space-between; min-height: 480px; }
    .card-topline { display: flex; justify-content: space-between; align-items: center; gap: 16px; }
    .card-label { font-size: 14px; font-weight: 500; letter-spacing: -.03em; }
    .status-chip { display: inline-flex; align-items: center; gap: 7px; padding: 7px 10px; border-radius: 30px; background: rgba(203,242,107,.14); color: var(--lime-deep); font-family: 'DM Mono', monospace; font-size: 10px; white-space: nowrap; }
    body.dark .status-chip { color: var(--lime); }
    .status-chip .live-dot { width: 5px; height: 5px; box-shadow: none; }

    .cup-stage { position: relative; height: 220px; display: grid; place-items: center; margin: 8px 0 4px; overflow: hidden; }
    .cup-stage::before { content: ''; position: absolute; width: 295px; height: 95px; border-radius: 50%; background: rgba(203,242,107,.06); filter: blur(8px); bottom: 17px; }
    .cup-shadow { position: absolute; width: 218px; height: 23px; bottom: 19px; border-radius: 50%; background: rgba(0,0,0,.2); filter: blur(14px); }
    .cup-assembly { position: relative; width: 270px; height: 197px; animation: cup-float 4.5s ease-in-out infinite; }
    .cup-body { position: absolute; left: 37px; top: 55px; width: 174px; height: 103px; border-radius: 18px 18px 66px 66px; background: linear-gradient(160deg, #f5ead5 0%, #d7c3a2 48%, #a58a68 100%); box-shadow: inset 10px 4px 16px rgba(255,255,255,.46), inset -10px -12px 20px rgba(93,67,39,.2), 0 12px 17px rgba(0,0,0,.14); }
    body.dark .cup-body { background: linear-gradient(160deg, #eadfc8 0%, #c8b28c 45%, #876b4d 100%); }
    .cup-rim { position: absolute; left: 29px; top: 42px; width: 190px; height: 44px; border-radius: 50%; background: linear-gradient(180deg, #fff9e5, #d0b891); box-shadow: inset 0 -7px 8px rgba(90,60,37,.2), 0 3px 4px rgba(0,0,0,.16); }
    .tea-surface { position: absolute; left: 39px; top: 48px; width: 170px; height: 32px; border-radius: 50%; background: radial-gradient(ellipse at 43% 35%, #cf9160 0%, #94502f 45%, #562d20 100%); box-shadow: inset 0 3px 4px rgba(255,221,170,.3); overflow: hidden; }
    .tea-surface::after { content: ''; position: absolute; width: 48px; height: 12px; left: 37px; top: 7px; border-radius: 50%; border-top: 2px solid rgba(255,229,185,.33); transform: rotate(-7deg); animation: ripple 2.8s ease-in-out infinite; }
    .cup-handle { position: absolute; right: 12px; top: 67px; width: 60px; height: 65px; border: 14px solid #b79d7b; border-left-width: 8px; border-radius: 50%; z-index: -1; box-shadow: inset -3px 3px 5px rgba(255,255,255,.3); }
    .saucer { position: absolute; left: 15px; bottom: 16px; width: 220px; height: 36px; border-radius: 50%; background: linear-gradient(170deg,#fff9e7,#c8b08d); box-shadow: inset 0 -7px 9px rgba(80,56,34,.2), 0 6px 5px rgba(0,0,0,.13); }
    .saucer::after { content: ''; position: absolute; inset: 7px 34px 10px; border-radius: 50%; border: 1px solid rgba(117,79,43,.33); }
    .biscuit-stick { position: absolute; left: 110px; top: 7px; width: 47px; height: 89px; border-radius: 9px 9px 6px 6px; background: linear-gradient(90deg, #b87549, #e3aa71 40%, #a85f3d 100%); transform-origin: 50% 90%; transform: rotate(12deg); box-shadow: inset 6px 0 9px rgba(255,231,174,.28), 0 5px 8px rgba(0,0,0,.16); transition: transform .5s cubic-bezier(.22,1,.36,1), top .5s cubic-bezier(.22,1,.36,1); z-index: 2; }
    .biscuit-stick::before { content: ''; position: absolute; inset: 12px 9px; background: radial-gradient(circle at 20% 18%, rgba(102,52,29,.45) 0 2px, transparent 2.5px), radial-gradient(circle at 70% 52%, rgba(102,52,29,.35) 0 2px, transparent 2.5px), radial-gradient(circle at 45% 82%, rgba(102,52,29,.38) 0 1.5px, transparent 2px); background-size: 24px 27px, 29px 30px, 30px 28px; opacity: .75; }
    .dunking .biscuit-stick { top: 42px; transform: rotate(8deg) translateY(30px); }
    .steam { position: absolute; left: 104px; top: -16px; width: 75px; height: 65px; z-index: 3; opacity: .72; }
    .steam i { position: absolute; bottom: 0; width: 12px; height: 55px; border-left: 2px solid rgba(232,240,216,.55); border-radius: 50%; filter: blur(.3px); animation: steam 3.5s ease-in-out infinite; }
    .steam i:nth-child(1) { left: 7px; animation-delay: .3s; }
    .steam i:nth-child(2) { left: 30px; height: 68px; animation-delay: 1.2s; }
    .steam i:nth-child(3) { left: 54px; height: 48px; animation-delay: 2s; }
    .crumb { position: absolute; z-index: 5; width: 7px; height: 7px; border-radius: 40% 60% 55% 45%; background: #b77b4e; box-shadow: 0 1px 2px rgba(0,0,0,.18); animation: crumb-fall .9s both cubic-bezier(.18,.7,.36,1); }
    .crumb.c1 { left: 96px; top: 57px; --x: -27px; --y: 81px; transform: rotate(20deg); }
    .crumb.c2 { left: 133px; top: 61px; --x: 38px; --y: 73px; width: 5px; height: 6px; animation-delay: .12s; }
    .crumb.c3 { left: 158px; top: 51px; --x: 61px; --y: 96px; width: 6px; height: 5px; animation-delay: .24s; }
    .crumb.c4 { left: 116px; top: 56px; --x: -52px; --y: 103px; width: 4px; height: 4px; animation-delay: .34s; }
    .crumb.c5 { left: 153px; top: 70px; --x: 82px; --y: 48px; width: 4px; height: 5px; animation-delay: .4s; }
    .dunk-readout { display: flex; justify-content: space-between; align-items: end; margin: 0 5px; }
    .readout-key { font-size: 11px; color: var(--ink-soft); margin-bottom: 4px; }
    .readout-value { font-size: 28px; line-height: 1; letter-spacing: -.06em; }
    .readout-value span { color: var(--ink-soft); font-size: 14px; letter-spacing: -.02em; }
    .readout-right { text-align: right; }
    .readout-right .readout-value { color: var(--tea); }

    .workspace { display: block; }
    .panel { border-radius: var(--radius-lg); padding: 24px 27px; }
    .panel-heading { display: flex; align-items: flex-start; justify-content: space-between; gap: 20px; }
    .panel-title { font-size: 16px; letter-spacing: -.04em; margin: 0 0 5px; font-weight: 500; }
    .panel-description { font-size: 12px; color: var(--ink-soft); margin: 0; line-height: 1.45; }
    .chart-legend { display: flex; gap: 13px; align-items: center; color: var(--ink-soft); font-size: 10px; font-family: 'DM Mono', monospace; white-space: nowrap; }
    .legend-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--orange); display: inline-block; margin-right: 5px; }
    .chart-wrap { margin: 21px -6px 0; height: 202px; }
    .chart-svg { width: 100%; height: 100%; overflow: visible; }
    .chart-grid { stroke: var(--line); stroke-width: .55; stroke-dasharray: 2 4; }
    .chart-axis { fill: var(--ink-soft); font-family: 'DM Mono', monospace; font-size: 7px; }
    .chart-area { fill: url(#areaGradient); opacity: .42; }
    .chart-line { fill: none; stroke: var(--orange); stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .chart-needle { stroke: var(--lime); stroke-width: 1; stroke-dasharray: 2 3; }
    .chart-point { fill: var(--bg); stroke: var(--lime); stroke-width: 2.5; }
    .chart-label-bg { fill: var(--panel-strong); stroke: var(--line); stroke-width: .7; }
    .chart-label { fill: var(--ink); font-family: 'DM Mono', monospace; font-size: 7px; }
    .risk-scale { display: flex; justify-content: space-between; gap: 8px; margin: -2px 2px 0 37px; font-size: 9px; color: var(--ink-soft); font-family: 'DM Mono', monospace; }

    .control-panel { padding-bottom: 17px; }
    .control-panel .panel-heading { margin-bottom: 23px; }
    .control-section { padding: 17px 0 20px; border-top: 1px solid var(--line); }
    .control-section:first-of-type { border-top: 0; padding-top: 0; }
    .control-label-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .control-label { font-size: 12px; color: var(--ink-soft); }
    .control-value { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--ink); }
    .control-value b { color: var(--tea); font-weight: 500; font-size: 14px; }
    input[type=range] { appearance: none; -webkit-appearance: none; width: 100%; background: transparent; cursor: pointer; height: 24px; margin: 0; }
    input[type=range]::-webkit-slider-runnable-track { height: 5px; border-radius: 8px; background: linear-gradient(90deg, var(--tea) var(--fill, 50%), var(--line) var(--fill, 50%)); }
    input[type=range]::-moz-range-track { height: 5px; border-radius: 8px; background: var(--line); }
    input[type=range]::-moz-range-progress { height: 5px; border-radius: 8px; background: var(--tea); }
    input[type=range]::-webkit-slider-thumb { appearance: none; -webkit-appearance: none; width: 17px; height: 17px; margin-top: -6px; border-radius: 50%; border: 3px solid var(--bg); background: var(--tea); box-shadow: 0 0 0 1px var(--tea), 0 2px 7px rgba(0,0,0,.2); }
    input[type=range]::-moz-range-thumb { width: 12px; height: 12px; border-radius: 50%; border: 3px solid var(--bg); background: var(--tea); box-shadow: 0 0 0 1px var(--tea), 0 2px 7px rgba(0,0,0,.2); }
    .range-endpoints { display: flex; justify-content: space-between; color: var(--ink-soft); font-family: 'DM Mono', monospace; font-size: 9px; margin-top: 3px; }
    .biscuit-options { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; }
    .biscuit-option { border: 1px solid var(--line); color: var(--ink-soft); background: transparent; border-radius: 12px; min-height: 63px; padding: 8px 4px 6px; cursor: pointer; transition: .2s ease; font-size: 10px; }
    .biscuit-option:hover { border-color: var(--line-strong); color: var(--ink); transform: translateY(-1px); }
    .biscuit-option.selected { color: var(--ink); background: rgba(187,117,75,.11); border-color: var(--tea); box-shadow: inset 0 0 0 1px rgba(187,117,75,.18); }
    .biscuit-emoji { display: block; font-size: 20px; line-height: 1; margin-bottom: 7px; filter: saturate(.8); }
    .run-button { width: 100%; border: 0; background: var(--lime); color: #202816; border-radius: 13px; padding: 14px 17px; cursor: pointer; font-size: 13px; font-weight: 600; letter-spacing: -.02em; display: flex; align-items: center; justify-content: space-between; transition: transform .2s ease, box-shadow .2s ease, background .2s ease; box-shadow: 0 8px 18px rgba(148,191,68,.16); }
    .run-button:hover { transform: translateY(-2px); box-shadow: 0 12px 22px rgba(148,191,68,.23); background: #d8fc80; }
    .run-button:active { transform: translateY(0); }
    .run-button svg { width: 17px; height: 17px; }

    .lower-row { display: grid; grid-template-columns: 1.17fr .83fr; gap: 26px; margin-top: 26px; animation: arrive .8s .2s both cubic-bezier(.22,1,.36,1); }
    .insight-panel { display: grid; grid-template-columns: minmax(0, 1fr) 125px; gap: 24px; min-height: 169px; }
    .insight-main { display: flex; flex-direction: column; justify-content: space-between; }
    .insight-caption { display: flex; align-items: center; gap: 9px; color: var(--ink-soft); font-size: 11px; }
    .insight-caption .mini-line { height: 1px; width: 28px; background: var(--tea); }
    .insight-title { font-size: 31px; line-height: .96; letter-spacing: -.06em; margin: 15px 0 0; max-width: 280px; }
    .insight-title em { color: var(--tea); font-style: normal; }
    .insight-foot { font-size: 10px; line-height: 1.35; color: var(--ink-soft); max-width: 300px; }
    .score-ring { width: 116px; height: 116px; border-radius: 50%; display: grid; place-items: center; position: relative; background: conic-gradient(var(--lime) calc(var(--score) * 1%), var(--line) 0); }
    .score-ring::before { content: ''; position: absolute; inset: 8px; border-radius: 50%; background: var(--panel-strong); border: 1px solid var(--line); }
    .score-ring-content { position: relative; text-align: center; }
    .score-number { font-size: 33px; line-height: 1; letter-spacing: -.08em; }
    .score-unit { color: var(--ink-soft); font-family: 'DM Mono', monospace; font-size: 8px; text-transform: uppercase; letter-spacing: .12em; margin-top: 3px; }
    .shortcut-panel { min-height: 169px; }
    .shortcut-list { list-style: none; padding: 0; margin: 17px 0 0; display: grid; gap: 10px; }
    .shortcut-list li { display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: var(--ink-soft); }
    kbd { min-width: 25px; padding: 3px 6px; border: 1px solid var(--line-strong); border-bottom-width: 2px; border-radius: 5px; text-align: center; font-family: 'DM Mono', monospace; font-size: 9px; color: var(--ink); background: var(--panel-strong); }
    .footer-line { display: flex; justify-content: space-between; align-items: center; margin-top: 27px; color: var(--ink-soft); font-size: 10px; font-family: 'DM Mono', monospace; }
    .footer-line .footer-accent { color: var(--tea); }

    @keyframes arrive { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .35; } }
    @keyframes cup-float { 0%,100% { transform: translateY(3px) rotate(-.5deg); } 50% { transform: translateY(-4px) rotate(.5deg); } }
    @keyframes ripple { 0%,100% { transform: translateX(0) rotate(-7deg) scaleX(.9); opacity: .4; } 50% { transform: translateX(41px) rotate(-7deg) scaleX(1.2); opacity: .8; } }
    @keyframes steam { 0% { transform: translateY(7px) scaleX(1); opacity: 0; } 30% { opacity: .65; } 70% { opacity: .25; } 100% { transform: translateY(-13px) scaleX(1.45); opacity: 0; } }
    @keyframes crumb-fall { from { opacity: 0; transform: translate(0,0) rotate(0); } 15% { opacity: 1; } to { opacity: 1; transform: translate(var(--x), var(--y)) rotate(240deg); } }
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: .01ms !important; animation-iteration-count: 1 !important; transition-duration: .01ms !important; } }
    @media (max-width: 1080px) {
      .hero, .workspace, .lower-row { grid-template-columns: 1fr; }
      .headline-block { min-height: auto; padding-bottom: 8px; }
      .headline-block .hero-bottom { margin-top: 34px; }
      .control-card { min-height: 0; }
      .control-card .cup-stage { height: 245px; }
      .topnav { margin-left: 0; }
      .lower-row { gap: 18px; }
    }
    @media (max-width: 650px) {
      .shell-inner { padding: 0 18px 28px; }
      .topbar { height: 70px; }
      .topnav { display: none; }
      .brand, .top-actions { min-width: auto; }
      .brand-name span { display: none; }
      .theme-button span { display: none; }
      .theme-button { padding: 0 9px; }
      .hero { padding-top: 32px; gap: 20px; }
      h1 { font-size: clamp(52px, 17vw, 82px); }
      .hero-sub { font-size: 14px; }
      .hero-bottom { align-items: flex-start; }
      .small-note { display: none; }
      .panel, .control-card { padding: 20px; border-radius: 20px; }
      .chart-wrap { height: 175px; margin-top: 17px; }
      .control-card .cup-stage { height: 210px; }
      .biscuit-options { gap: 5px; }
      .biscuit-option { min-height: 59px; font-size: 9px; }
      .biscuit-emoji { font-size: 18px; }
      .insight-panel { grid-template-columns: minmax(0, 1fr) 102px; gap: 10px; }
      .score-ring { width: 96px; height: 96px; }
      .score-ring::before { inset: 7px; }
      .score-number { font-size: 27px; }
      .insight-title { font-size: 27px; }
      .footer-line { font-size: 8px; }
    }
  </style>
</head>
<body class="dark">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo, useEffect, useRef } = React;

    const biscuitData = {
      richTea: { name: 'Rich Tea', emoji: '◉', optimalTemp: 78, optimalTime: 5.3, texture: 'silky snap', note: 'lightweight · fast soak', softness: .78 },
      digestive: { name: 'Digestive', emoji: '✦', optimalTemp: 82, optimalTime: 7.2, texture: 'crumbly bite', note: 'wheaty · forgiving', softness: .88 },
      hobnob: { name: 'Hobnob', emoji: '✣', optimalTemp: 84, optimalTime: 8.7, texture: 'oaty crunch', note: 'textured · resilient', softness: .69 },
      shortbread: { name: 'Shortbread', emoji: '⌁', optimalTemp: 75, optimalTime: 3.8, texture: 'buttery snap', note: 'rich · delicate', softness: .58 }
    };

    const clamp = (value, min, max) => Math.max(min, Math.min(max, value));
    const pct = (value, min, max) => `${((value - min) / (max - min)) * 100}%`;

    function Icon({ name, size = 18 }) {
      const paths = {
        sun: <><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.42 1.42M17.65 17.65l1.42 1.42M2 12h2M20 12h2M4.93 19.07l1.42-1.42M17.65 6.35l1.42-1.42"/></>,
        moon: <path d="M20.2 15.5A8.5 8.5 0 0 1 8.5 3.8 8.5 8.5 0 1 0 20.2 15.5Z"/>,
        settings: <><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.06.06-1.42 1.42-.06-.06a1.7 1.7 0 0 0-1.88-.34 1.7 1.7 0 0 0-1.03 1.56V20h-2v-.48a1.7 1.7 0 0 0-1.03-1.56 1.7 1.7 0 0 0-1.88.34l-.06.06-1.42-1.42.06-.06A1.7 1.7 0 0 0 9.4 15a1.7 1.7 0 0 0-1.56-1.03H7v-2h.84A1.7 1.7 0 0 0 9.4 11a1.7 1.7 0 0 0-.34-1.88L9 9.06l1.42-1.42.06.06a1.7 1.7 0 0 0 1.88.34A1.7 1.7 0 0 0 13.39 6.5V6h2v.48a1.7 1.7 0 0 0 1.03 1.56 1.7 1.7 0 0 0 1.88-.34l.06-.06 1.42 1.42-.06.06a1.7 1.7 0 0 0-.34 1.88A1.7 1.7 0 0 0 20.94 12H21v2h-.48A1.7 1.7 0 0 0 19.4 15Z"/></>,
        arrow: <path d="M5 12h13m-6-6 6 6-6 6"/>,
        spark: <><path d="m12 2 1.7 6.3L20 10l-6.3 1.7L12 18l-1.7-6.3L4 10l6.3-1.7L12 2Z"/><path d="m19 16 .7 2.3L22 19l-2.3.7L19 22l-.7-2.3L16 19l2.3-.7L19 16Z"/></>,
        cup: <><path d="M4 8h13v5.5A4.5 4.5 0 0 1 12.5 18h-4A4.5 4.5 0 0 1 4 13.5V8Z"/><path d="M17 10h1.5a2.5 2.5 0 0 1 0 5H17M2 21h17"/></>
      };
      return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">{paths[name]}</svg>;
    }

    function Header({ isDark, toggleTheme }) {
      return <header className="topbar">
        <div className="brand">
          <div className="brand-mark"><Icon name="cup" size={20} /></div>
          <div className="brand-name">Dunkability <span>/ simulator</span></div>
        </div>
        <nav className="topnav" aria-label="Primary navigation">
          <a className="nav-link active" href="#simulator">Live run</a>
          <a className="nav-link" href="#insights">Field notes</a>
          <a className="nav-link" href="#shortcuts">Shortcuts</a>
        </nav>
        <div className="top-actions">
          <button className="theme-button" type="button" onClick={toggleTheme} aria-label={`Switch to ${isDark ? 'light' : 'dark'} mode`}><Icon name={isDark ? 'sun' : 'moon'} size={16} /><span>{isDark ? 'Light' : 'Dark'} mode</span></button>
          <button className="icon-button" type="button" aria-label="Open settings"><Icon name="settings" size={16} /></button>
        </div>
      </header>;
    }

    function CupScene({ dunking, crumbCount }) {
      return <div className={`cup-stage ${dunking ? 'dunking' : ''}`} aria-label="Animated tea cup and biscuit illustration">
        <div className="cup-assembly">
          <div className="steam" aria-hidden="true"><i></i><i></i><i></i></div>
          <div className="biscuit-stick" aria-hidden="true"></div>
          <div className="cup-handle" aria-hidden="true"></div>
          <div className="cup-rim" aria-hidden="true"></div>
          <div className="tea-surface" aria-hidden="true"></div>
          <div className="cup-body" aria-hidden="true"></div>
          <div className="saucer" aria-hidden="true"></div>
          {Array.from({ length: Math.min(5, crumbCount) }).map((_, i) => <span key={i} className={`crumb c${i + 1}`} aria-hidden="true" />)}
        </div>
        <div className="cup-shadow" aria-hidden="true"></div>
      </div>;
    }

    function Controls({ temp, setTemp, time, setTime, integrity, setIntegrity, biscuit, setBiscuit, dunking, onDunk, tempRef, timeRef }) {
      return <section className="control-card glass" aria-labelledby="controls-title">
        <div className="card-topline"><div id="controls-title" className="card-label">Dunk protocol</div><div className="status-chip"><span className="live-dot"></span> SIMULATION LIVE</div></div>
        <CupScene dunking={dunking} crumbCount={Math.max(0, Math.floor((time - (biscuitData[biscuit].optimalTime + .8)) * 2) + Math.floor((55 - integrity) / 10))} />
        <div className="dunk-readout">
          <div><div className="readout-key">current biscuit</div><div className="readout-value">{biscuitData[biscuit].name}</div></div>
          <div className="readout-right"><div className="readout-key">tea state</div><div className="readout-value">{temp}° <span>steaming</span></div></div>
        </div>
        <div style={{height: 17}}></div>
        <div className="control-section"><div className="control-label-row"><label htmlFor="temp" className="control-label">Tea temperature</label><div className="control-value"><b>{temp}</b> °C</div></div><input ref={tempRef} id="temp" type="range" min="60" max="100" step="1" value={temp} style={{'--fill': pct(temp,60,100)}} onChange={e => setTemp(Number(e.target.value))} /><div className="range-endpoints"><span>60° lukewarm</span><span>100° rolling</span></div></div>
        <div className="control-section"><div className="control-label-row"><label htmlFor="time" className="control-label">Dunk time</label><div className="control-value"><b>{time.toFixed(1)}</b> sec</div></div><input ref={timeRef} id="time" type="range" min="1" max="15" step="0.1" value={time} style={{'--fill': pct(time,1,15)}} onChange={e => setTime(Number(e.target.value))} /><div className="range-endpoints"><span>quick dip</span><span>deep soak</span></div></div>
        <div className="control-section"><div className="control-label-row"><span className="control-label">Biscuit type</span><div className="control-value"><b>{biscuitData[biscuit].texture}</b></div></div><div className="biscuit-options">{Object.entries(biscuitData).map(([key, data]) => <button type="button" key={key} className={`biscuit-option ${biscuit === key ? 'selected' : ''}`} onClick={() => setBiscuit(key)} aria-pressed={biscuit === key}><span className="biscuit-emoji">{data.emoji}</span>{data.name}</button>)}</div></div>
        <div className="control-section"><div className="control-label-row"><label htmlFor="integrity" className="control-label">Structural integrity</label><div className="control-value"><b>{integrity}</b> %</div></div><input id="integrity" type="range" min="20" max="100" step="1" value={integrity} style={{'--fill': pct(integrity,20,100)}} onChange={e => setIntegrity(Number(e.target.value))} /><div className="range-endpoints"><span>already fragile</span><span>fresh from tin</span></div></div>
        <button type="button" className="run-button" onClick={onDunk}><span>Run the dunk</span><Icon name="arrow" size={17} /></button>
      </section>;
    }

    function buildCurve(temp, time, integrity, biscuit) {
      const b = biscuitData[biscuit];
      return Array.from({ length: 49 }, (_, i) => {
        const x = i / 48 * 100;
        const seconds = i / 48 * 15;
        const soak = Math.pow(Math.max(0, seconds - 1.3), 1.24) * (18 + b.softness * 14);
        const heat = Math.max(0, temp - 70) * .25;
        const fragility = (100 - integrity) * .26 + (1 - b.softness) * 12;
        const swing = Math.sin(i * .54) * 1.7;
        const y = clamp(10 + soak + heat + fragility + swing, 7, 94);
        return { x, y };
      });
    }

    function Chart({ temp, time, integrity, biscuit }) {
      const curve = useMemo(() => buildCurve(temp, time, integrity, biscuit), [temp, time, integrity, biscuit]);
      const points = curve.map(p => `${p.x},${100 - p.y}`).join(' ');
      const areaPoints = `0,100 ${points} 100,100`;
      const currentX = clamp(time, 0, 15) / 15 * 100;
      const current = curve[Math.round(clamp(time, 0, 15) / 15 * 48)];
      return <section className="panel glass" aria-labelledby="chart-title">
        <div className="panel-heading"><div><h2 className="panel-title" id="chart-title">Crumble-o-meter</h2><p className="panel-description">Structural risk as the soak continues</p></div><div className="chart-legend"><span><i className="legend-dot"></i>crumble risk</span></div></div>
        <div className="chart-wrap">
          <svg className="chart-svg" viewBox="0 0 100 115" preserveAspectRatio="none" role="img" aria-label={`Crumble risk graph for ${biscuitData[biscuit].name}`}>
            <defs><linearGradient id="areaGradient" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stopColor="#ef936b" stopOpacity=".45"/><stop offset="1" stopColor="#ef936b" stopOpacity="0"/></linearGradient></defs>
            {[20, 40, 60, 80].map(y => <line key={y} x1="7" x2="98" y1={100 - y} y2={100 - y} className="chart-grid" />)}
            {[0, 5, 10, 15].map(x => <line key={x} x1={7 + x / 15 * 91} x2={7 + x / 15 * 91} y1="8" y2="100" className="chart-grid" />)}
            <text x="0" y="22" className="chart-axis">HIGH</text><text x="1" y="98" className="chart-axis">LOW</text>
            <polygon points={areaPoints} className="chart-area" transform="translate(7,0) scale(.91,1)" />
            <polyline points={points} className="chart-line" transform="translate(7,0) scale(.91,1)" />
            <line x1={7 + currentX / 100 * 91} x2={7 + currentX / 100 * 91} y1="8" y2="100" className="chart-needle" />
            <circle cx={7 + current.x / 100 * 91} cy={100 - current.y} r="2.4" className="chart-point" />
            <g transform={`translate(${clamp(7 + currentX / 100 * 91 - 10, 7, 80)}, ${clamp(100 - current.y - 17, 4, 83)})`}>
              <rect width="20" height="12" rx="3" className="chart-label-bg"/><text x="10" y="8" textAnchor="middle" className="chart-label">{time.toFixed(1)}s</text>
            </g>
            {[0,5,10,15].map(x => <text key={x} x={7 + x / 15 * 91} y="112" textAnchor="middle" className="chart-axis">{x}s</text>)}
          </svg>
        </div>
        <div className="risk-scale"><span>safe</span><span>soft spot</span><span>collapse</span></div>
      </section>;
    }

    function ScorePanel({ score, status, biscuit, temp, time, integrity }) {
      const b = biscuitData[biscuit];
      const insight = score >= 84 ? 'Peak dunkability' : score >= 68 ? 'A very good dunk' : score >= 45 ? 'Handle with care' : 'Crumble alert';
      const advice = score >= 84 ? `The ${b.name} is in its golden window. Pull at ${b.optimalTime.toFixed(1)} seconds for a clean tea-to-crumb ratio.` : score >= 68 ? 'A confident dip. A half-second less will keep the edges crisp and the center properly steeped.' : 'Shorten the soak or cool the tea slightly. The seam is beginning to negotiate its exit.';
      return <section className="panel glass insight-panel" id="insights" aria-labelledby="score-title">
        <div className="insight-main"><div><div className="insight-caption"><span className="mini-line"></span><span>FIELD NOTE 04 / LIVE READ</span></div><h2 className="insight-title" id="score-title"><em>{insight.split(' ')[0]}</em> {insight.split(' ').slice(1).join(' ')}</h2></div><p className="insight-foot">{advice}</p></div>
        <div className="score-ring" style={{'--score': score}}><div className="score-ring-content"><div className="score-number">{score}</div><div className="score-unit">score / 100</div></div></div>
      </section>;
    }

    function ShortcutPanel() {
      return <section className="panel glass shortcut-panel" id="shortcuts" aria-labelledby="shortcut-title"><div className="panel-heading"><div><h2 className="panel-title" id="shortcut-title">Quick controls</h2><p className="panel-description">Keep your hands on the mug.</p></div><Icon name="spark" size={18} /></div><ul className="shortcut-list"><li><span>Focus temperature</span><kbd>T</kbd></li><li><span>Focus dunk time</span><kbd>D</kbd></li><li><span>Run the dunk</span><kbd>SPACE</kbd></li><li><span>Reset protocol</span><kbd>R</kbd></li></ul></section>;
    }

    function App() {
      const [isDark, setIsDark] = useState(true);
      const [temp, setTemp] = useState(82);
      const [time, setTime] = useState(6.7);
      const [integrity, setIntegrity] = useState(76);
      const [biscuit, setBiscuit] = useState('digestive');
      const [dunking, setDunking] = useState(false);
      const tempRef = useRef(null);
      const timeRef = useRef(null);
      const biscuitInfo = biscuitData[biscuit];

      useEffect(() => { document.body.className = isDark ? 'dark' : 'light'; }, [isDark]);

      const score = useMemo(() => {
        const b = biscuitInfo;
        const tempPenalty = Math.abs(temp - b.optimalTemp) * 1.25;
        const timePenalty = Math.abs(time - b.optimalTime) * 7.2;
        const integrityPenalty = Math.max(0, 75 - integrity) * .28;
        return Math.round(clamp(100 - tempPenalty - timePenalty - integrityPenalty, 12, 99));
      }, [temp, time, integrity, biscuit, biscuitInfo]);

      const status = score >= 84 ? 'Peak dunk' : score >= 68 ? 'Sweet spot' : score >= 45 ? 'Watch the seam' : 'Crumble alert';

      const runDunk = () => {
        setDunking(true);
        window.setTimeout(() => setDunking(false), 850);
      };
      const reset = () => { setTemp(82); setTime(6.7); setIntegrity(76); setBiscuit('digestive'); };

      useEffect(() => {
        const handler = e => {
          if (['INPUT', 'SELECT', 'TEXTAREA'].includes(document.activeElement?.tagName)) return;
          const key = e.key.toLowerCase();
          if (key === 't') { e.preventDefault(); tempRef.current?.focus(); }
          if (key === 'd') { e.preventDefault(); timeRef.current?.focus(); }
          if (key === ' ') { e.preventDefault(); runDunk(); }
          if (key === 'r') { e.preventDefault(); reset(); }
          if (key === 'm') { e.preventDefault(); setIsDark(value => !value); }
        };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
      }, []);

      return <div className="app-shell" id="simulator">
        <div className="shell-inner">
          <Header isDark={isDark} toggleTheme={() => setIsDark(value => !value)} />
          <main>
            <section className="hero" aria-labelledby="page-title">
              <div className="headline-block">
                <div><div className="headline-kicker"><span className="live-dot"></span><span className="eyebrow">A small science of comfort</span></div><h1 id="page-title">Find your<br /><em>perfect</em> dunk.</h1><p className="hero-sub">A live simulator for the delicate interval between tea-soaked bliss and total biscuit surrender.</p></div>
                <div className="hero-bottom"><div className="protocol-meta"><div className="protocol-number mono">01</div><div><div className="eyebrow" style={{marginBottom: 5}}>protocol</div><strong>Tea / crumb / time</strong></div></div><p className="small-note">Tune the variables.<br />Trust the crumb.</p></div>
              </div>
              <Controls temp={temp} setTemp={setTemp} time={time} setTime={setTime} integrity={integrity} setIntegrity={setIntegrity} biscuit={biscuit} setBiscuit={setBiscuit} dunking={dunking} onDunk={runDunk} tempRef={tempRef} timeRef={timeRef} />
            </section>
            <section className="workspace" aria-label="Dunk analysis"><Chart temp={temp} time={time} integrity={integrity} biscuit={biscuit} /></section>
            <div className="lower-row"><ScorePanel score={score} status={status} biscuit={biscuit} temp={temp} time={time} integrity={integrity} /><ShortcutPanel /></div>
          </main>
          <footer className="footer-line"><span>DUNKABILITY LABS <span className="footer-accent">/</span> EST. SOMEWHERE BETWEEN TEA &amp; BISCUITS</span><span>BUILD 02.4 · <span className="footer-accent">NICE &amp; WARM</span></span></footer>
        </div>
      </div>;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
