<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tumble & Catch</title>
  <meta name="theme-color" content="#f6bd46" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@600;700;800;900&display=swap');

    :root {
      --ink: #243041;
      --muted: #667185;
      --paper: #fffaf0;
      --sun: #ffd45f;
      --coral: #f16d5b;
      --mint: #69c7a5;
      --sky: #a9e1e7;
      --berry: #cb4f73;
      --stage-h: min(69vh, 650px);
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 8%, rgba(255,255,255,.74) 0 7%, transparent 22%),
        linear-gradient(145deg, #fff4dc 0%, #fbe5bd 52%, #f4cf9d 100%);
      font-family: 'Nunito', 'Trebuchet MS', sans-serif;
      display: grid;
      place-items: center;
      padding: clamp(14px, 3vw, 34px);
      overflow-x: hidden;
    }

    button { font: inherit; }
    .app-shell { width: min(1180px, 100%); }

    .topbar {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      margin: 0 6px 15px;
    }

    .brand-lockup { display: flex; align-items: center; gap: 13px; }
    .brand-mark {
      width: 52px; height: 52px; flex: 0 0 auto;
      display: grid; place-items: center;
      border: 3px solid var(--ink);
      border-radius: 17px 19px 15px 20px;
      background: var(--sun);
      box-shadow: 4px 4px 0 var(--ink);
      transform: rotate(-5deg);
      font-size: 28px;
    }
    .eyebrow {
      margin: 0 0 -2px;
      color: var(--coral);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .16em;
      text-transform: uppercase;
    }
    h1 {
      margin: 0;
      font-family: 'Baloo 2', 'Trebuchet MS', sans-serif;
      font-size: clamp(28px, 4vw, 42px);
      font-weight: 800;
      line-height: .9;
      letter-spacing: -.045em;
    }

    .hud { display: flex; align-items: stretch; gap: 9px; }
    .hud-card {
      min-width: 102px;
      padding: 9px 15px 8px;
      border: 2px solid rgba(36,48,65,.18);
      border-radius: 15px;
      background: rgba(255,250,240,.72);
      box-shadow: 0 3px 0 rgba(36,48,65,.08);
    }
    .hud-label {
      display: block;
      color: var(--muted);
      font-size: 10px;
      font-weight: 900;
      letter-spacing: .1em;
      text-transform: uppercase;
    }
    .hud-value {
      display: block;
      margin-top: -2px;
      font-family: 'Baloo 2', sans-serif;
      font-size: 26px;
      font-weight: 800;
      line-height: 1;
    }
    .misses-value { color: var(--coral); letter-spacing: 2px; font-size: 20px; padding-top: 4px; }
    .miss-dot { color: #e3d9c9; transition: color .2s ease, transform .2s ease; display: inline-block; }
    .miss-dot.lost { color: var(--coral); transform: scale(1.15); }

    .game-card {
      position: relative;
      isolation: isolate;
      overflow: hidden;
      min-height: var(--stage-h);
      border: 3px solid var(--ink);
      border-radius: 29px;
      background: var(--sky);
      box-shadow: 0 12px 0 rgba(36,48,65,.1), 0 22px 35px rgba(77,61,46,.14);
    }
    .game-stage {
      position: absolute;
      inset: 0;
      overflow: hidden;
      user-select: none;
      cursor: crosshair;
      touch-action: none;
    }
    .sky-wash {
      position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,.23), transparent 48%, rgba(255,220,139,.2));
      pointer-events: none;
    }
    .sun {
      position: absolute; top: 38px; right: 10%;
      width: clamp(80px, 12vw, 130px); aspect-ratio: 1;
      border: 3px solid rgba(36,48,65,.15);
      border-radius: 50%;
      background: var(--sun);
      box-shadow: 0 0 0 11px rgba(255,212,95,.18), 0 0 0 22px rgba(255,212,95,.1);
      animation: sun-bob 5s ease-in-out infinite;
    }
    .sun::before, .sun::after { content: ''; position: absolute; inset: 19%; border: 3px solid rgba(36,48,65,.1); border-radius: 50%; }
    .sun::after { inset: 32%; border-color: rgba(36,48,65,.12); }

    .cloud { position: absolute; height: 28px; width: 112px; border-radius: 30px; background: rgba(255,255,255,.55); opacity: .8; animation: cloud-drift 22s linear infinite; }
    .cloud::before, .cloud::after { content: ''; position: absolute; border-radius: 50%; background: inherit; }
    .cloud::before { width: 46px; height: 46px; left: 17px; bottom: 4px; }
    .cloud::after { width: 35px; height: 35px; right: 18px; bottom: 2px; }
    .cloud.one { top: 16%; left: -150px; transform: scale(.8); animation-delay: -4s; }
    .cloud.two { top: 33%; left: -130px; transform: scale(.58); opacity: .45; animation-delay: -14s; }

    .hill { position: absolute; bottom: 0; border-radius: 50% 50% 0 0 / 28% 28% 0 0; pointer-events: none; }
    .hill.back { left: -10%; width: 70%; height: 28%; background: #8fd4b7; opacity: .8; }
    .hill.back::after { content: ''; position: absolute; left: 76%; bottom: -4%; width: 68%; height: 100%; border-radius: 50% 50% 0 0 / 28% 28% 0 0; background: #8fd4b7; }
    .hill.front { right: -15%; width: 75%; height: 22%; background: #5db59a; }
    .hill.front::after { content: ''; position: absolute; right: 70%; bottom: -5%; width: 70%; height: 105%; border-radius: 50% 50% 0 0 / 28% 28% 0 0; background: #5db59a; }
    .ground-line { position: absolute; left: 0; right: 0; bottom: 0; height: 11%; background: #5fb18c; border-top: 3px solid rgba(36,48,65,.12); }
    .ground-line::after { content: '✦  ·  ✦     ·  ✦  ·      ✦   ·  ✦'; position: absolute; left: 5%; top: 14px; color: rgba(255,250,240,.34); font-size: 15px; letter-spacing: 18px; }

    .instructions {
      position: absolute; left: 29px; top: 26px; z-index: 4;
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px;
      border: 2px solid rgba(36,48,65,.18);
      border-radius: 11px;
      color: rgba(36,48,65,.7);
      background: rgba(255,250,240,.52);
      font-size: 12px; font-weight: 800;
      pointer-events: none;
    }
    .key { display: inline-grid; place-items: center; min-width: 20px; height: 20px; border: 2px solid rgba(36,48,65,.35); border-radius: 5px; background: rgba(255,255,255,.4); font-size: 13px; line-height: 1; }

    .fruit {
      position: absolute;
      z-index: 5;
      display: grid; place-items: center;
      width: var(--size); height: var(--size);
      font-size: calc(var(--size) * .76);
      line-height: 1;
      filter: drop-shadow(0 7px 0 rgba(36,48,65,.15));
      transform: translate(-50%, -50%) rotate(var(--rotation));
      will-change: transform, top;
      pointer-events: none;
    }
    .fruit::after { content: ''; position: absolute; top: 4%; right: 4%; width: 20%; height: 11%; border-radius: 50%; background: rgba(255,255,255,.65); transform: rotate(-35deg); }
    .basket {
      position: absolute;
      z-index: 8;
      bottom: 5.5%; left: 50%;
      width: clamp(120px, 16vw, 182px);
      height: clamp(72px, 10vw, 100px);
      transform: translateX(-50%);
      transition: left .1s linear;
      filter: drop-shadow(0 7px 0 rgba(36,48,65,.16));
      pointer-events: none;
    }
    .basket-handle { position: absolute; left: 17%; top: -36%; width: 66%; height: 63%; border: 9px solid #8d542f; border-bottom: 0; border-radius: 60px 60px 0 0; opacity: .95; }
    .basket-bowl { position: absolute; inset: 10% 0 0; overflow: hidden; border: 3px solid var(--ink); border-radius: 14px 14px 36px 36px / 12px 12px 44px 44px; background: repeating-linear-gradient(90deg, #d98343 0 13px, #bc6b38 13px 19px); }
    .basket-bowl::before { content: ''; position: absolute; left: -3%; top: 4%; width: 106%; height: 18px; border: 3px solid var(--ink); border-radius: 50%; background: #efa253; }
    .basket-bowl::after { content: ''; position: absolute; inset: 22% 13% 0; opacity: .18; background: repeating-linear-gradient(60deg, transparent 0 12px, #fff 13px 15px, transparent 16px 28px); }

    .catch-pop { position: absolute; z-index: 12; pointer-events: none; font-family: 'Baloo 2'; font-size: 27px; font-weight: 800; color: var(--berry); text-shadow: 2px 2px 0 var(--paper); animation: pop-up .62s ease-out forwards; }
    .catch-pop.combo { color: #d17d2d; font-size: 20px; }

    .veil { position: absolute; inset: 0; z-index: 20; display: grid; place-items: center; background: rgba(36,48,65,.14); backdrop-filter: blur(3px); transition: opacity .25s ease; }
    .veil.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .modal { width: min(410px, calc(100% - 30px)); padding: 32px 30px 28px; border: 3px solid var(--ink); border-radius: 25px 25px 22px 27px; background: var(--paper); box-shadow: 8px 9px 0 var(--ink); text-align: center; animation: modal-in .45s cubic-bezier(.2,.9,.3,1.2); }
    .modal-emoji { font-size: 58px; line-height: 1; margin-bottom: 6px; animation: fruit-wiggle 2s ease-in-out infinite; }
    .modal h2 { margin: 0; font-family: 'Baloo 2'; font-size: 40px; line-height: .95; letter-spacing: -.04em; }
    .modal p { margin: 9px auto 20px; max-width: 280px; color: var(--muted); font-size: 14px; font-weight: 800; line-height: 1.4; }
    .primary-btn { cursor: pointer; border: 3px solid var(--ink); border-radius: 14px 12px 16px 13px; padding: 12px 28px 10px; color: var(--ink); background: var(--sun); box-shadow: 4px 5px 0 var(--ink); font-family: 'Baloo 2'; font-size: 22px; font-weight: 800; line-height: 1; transition: transform .14s ease, box-shadow .14s ease, background .14s ease; }
    .primary-btn:hover { background: #ffcf42; transform: translateY(-2px) rotate(-1deg); box-shadow: 5px 7px 0 var(--ink); }
    .primary-btn:active { transform: translateY(3px); box-shadow: 1px 2px 0 var(--ink); }
    .primary-btn:focus-visible, .icon-btn:focus-visible { outline: 4px solid rgba(241,109,91,.45); outline-offset: 3px; }
    .sub-note { display: block; margin-top: 17px; color: #9b9488; font-size: 11px; font-weight: 800; }

    .bottom-bar { display: flex; justify-content: space-between; align-items: center; gap: 18px; margin: 15px 5px 0; color: #766d61; font-size: 12px; font-weight: 800; }
    .legend { display: flex; align-items: center; gap: 8px; }
    .legend-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--mint); box-shadow: 0 0 0 3px rgba(105,199,165,.2); }
    .icon-btn { cursor: pointer; display: inline-grid; place-items: center; width: 34px; height: 34px; border: 2px solid rgba(36,48,65,.2); border-radius: 10px; color: var(--ink); background: rgba(255,250,240,.54); font-size: 16px; transition: .15s ease; }
    .icon-btn:hover { border-color: var(--ink); background: var(--paper); transform: translateY(-1px); }

    @keyframes sun-bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(7px); } }
    @keyframes cloud-drift { from { margin-left: -150px; } to { margin-left: calc(100vw + 180px); } }
    @keyframes pop-up { 0% { opacity: 0; transform: translate(-50%, 0) scale(.6) rotate(-5deg); } 25% { opacity: 1; transform: translate(-50%, -12px) scale(1.12) rotate(4deg); } 100% { opacity: 0; transform: translate(-50%, -60px) scale(.9) rotate(-3deg); } }
    @keyframes modal-in { from { transform: translateY(14px) scale(.94); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }
    @keyframes fruit-wiggle { 0%,100% { transform: rotate(-7deg); } 50% { transform: rotate(7deg) scale(1.04); } }
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: .01ms !important; animation-iteration-count: 1 !important; transition-duration: .01ms !important; } }
    @media (max-width: 650px) {
      :root { --stage-h: min(72vh, 620px); }
      body { padding: 12px 10px 18px; }
      .topbar { align-items: flex-start; flex-direction: column; gap: 13px; margin-bottom: 12px; }
      .hud { width: 100%; }
      .hud-card { flex: 1; min-width: 0; padding: 8px 10px; }
      .instructions { left: 15px; top: 15px; font-size: 10px; padding: 6px 9px; }
      .game-card { border-radius: 22px; }
      .sun { top: 55px; right: 7%; }
      .bottom-bar { margin-top: 11px; }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div class="brand-lockup">
        <div class="brand-mark" aria-hidden="true">🍎</div>
        <div>
          <p class="eyebrow">Garden arcade · 01</p>
          <h1>Tumble &amp; Catch</h1>
        </div>
      </div>
      <section class="hud" aria-label="Game score">
        <div class="hud-card"><span class="hud-label">Score</span><strong class="hud-value" id="score">0</strong></div>
        <div class="hud-card"><span class="hud-label">Streak</span><strong class="hud-value" id="streak">0</strong></div>
        <div class="hud-card"><span class="hud-label">Misses</span><strong class="hud-value misses-value" id="misses" aria-label="0 of 3 misses"><span class="miss-dot">●</span><span class="miss-dot">●</span><span class="miss-dot">●</span></strong></div>
      </section>
    </header>

    <section class="game-card" aria-label="Falling fruit game">
      <div class="game-stage" id="gameStage" tabindex="0" aria-label="Game board. Use left and right arrow keys or move your pointer to control the basket.">
        <div class="sky-wash"></div><div class="sun" aria-hidden="true"></div>
        <div class="cloud one" aria-hidden="true"></div><div class="cloud two" aria-hidden="true"></div>
        <div class="hill back" aria-hidden="true"></div><div class="hill front" aria-hidden="true"></div><div class="ground-line" aria-hidden="true"></div>
        <div class="instructions"><span class="key">←</span><span class="key">→</span> steer your basket</div>
        <div class="basket" id="basket" aria-hidden="true"><div class="basket-handle"></div><div class="basket-bowl"></div></div>
        <div class="veil" id="veil">
          <div class="modal">
            <div class="modal-emoji" id="modalEmoji">🍓</div>
            <h2 id="modalTitle">Ready, set, catch!</h2>
            <p id="modalCopy">Catch the falling fruit. Miss three and the garden closes for the day.</p>
            <button class="primary-btn" id="startBtn" type="button">Start picking</button>
            <small class="sub-note" id="bestNote">Best harvest: 0</small>
          </div>
        </div>
      </div>
    </section>

    <footer class="bottom-bar">
      <span class="legend"><span class="legend-dot"></span> The fruit gets faster as your basket fills.</span>
      <button class="icon-btn" id="pauseBtn" type="button" aria-label="Pause game" title="Pause (P)">Ⅱ</button>
    </footer>
  </main>

  <script>
    (() => {
      const stage = document.getElementById('gameStage');
      const basket = document.getElementById('basket');
      const veil = document.getElementById('veil');
      const scoreEl = document.getElementById('score');
      const streakEl = document.getElementById('streak');
      const missesEl = document.getElementById('misses');
      const startBtn = document.getElementById('startBtn');
      const pauseBtn = document.getElementById('pauseBtn');
      const modalTitle = document.getElementById('modalTitle');
      const modalCopy = document.getElementById('modalCopy');
      const modalEmoji = document.getElementById('modalEmoji');
      const bestNote = document.getElementById('bestNote');
      const dots = [...document.querySelectorAll('.miss-dot')];
      const fruits = [
        { emoji: '🍎', tone: '#ed6a53' }, { emoji: '🍊', tone: '#ef9b3d' },
        { emoji: '🍋', tone: '#e6b935' }, { emoji: '🍐', tone: '#86bf59' },
        { emoji: '🍓', tone: '#d85672' }, { emoji: '🍑', tone: '#ef9b78' },
        { emoji: '🍉', tone: '#63ae7e' }, { emoji: '🫐', tone: '#7666ad' }
      ];
      let state = 'idle', score = 0, misses = 0, streak = 0, basketX = 50;
      let active = [], nextId = 0, lastTime = 0, spawnClock = 0, raf = 0;
      let best = Number(localStorage.getItem('tumble-catch-best') || 0);

      const clamp = (n, min, max) => Math.max(min, Math.min(max, n));
      const stageSize = () => ({ w: stage.clientWidth, h: stage.clientHeight });

      function updateHud() {
        scoreEl.textContent = score;
        streakEl.textContent = streak;
        dots.forEach((dot, i) => dot.classList.toggle('lost', i < misses));
        missesEl.setAttribute('aria-label', `${misses} of 3 misses`);
      }

      function positionBasket() { basket.style.left = `${basketX}%`; }

      function createFruit() {
        const { w } = stageSize();
        const data = fruits[Math.floor(Math.random() * fruits.length)];
        const size = clamp(w * (0.075 + Math.random() * .02), 54, 78);
        const fruit = {
          id: nextId++, x: 7 + Math.random() * 86, y: -8,
          size, speed: 0.19 + Math.min(score, 35) * .004 + Math.random() * .055,
          sway: (Math.random() - .5) * .06, rotation: (Math.random() * 24 - 12), spin: Math.random() * 1.4 - .7,
          data, el: document.createElement('div')
        };
        fruit.el.className = 'fruit';
        fruit.el.textContent = data.emoji;
        fruit.el.setAttribute('aria-hidden', 'true');
        fruit.el.style.setProperty('--size', `${size}px`);
        fruit.el.style.setProperty('--rotation', `${fruit.rotation}deg`);
        fruit.el.title = data.emoji;
        stage.appendChild(fruit.el);
        active.push(fruit);
      }

      function pop(text, x, y, combo = false) {
        const el = document.createElement('div');
        el.className = `catch-pop${combo ? ' combo' : ''}`;
        el.textContent = text;
        el.style.left = `${x}%`; el.style.top = `${y}%`;
        stage.appendChild(el);
        setTimeout(() => el.remove(), 700);
      }

      function catchFruit(fruit) {
        const gain = 10 + Math.min(streak, 10) * 2;
        score += gain; streak += 1;
        pop(`+${gain}`, fruit.x, 72);
        if (streak > 2) pop(`${streak} in a row!`, fruit.x, 64, true);
        fruit.el.remove();
        active = active.filter(item => item.id !== fruit.id);
        updateHud();
      }

      function missFruit(fruit) {
        misses += 1; streak = 0;
        pop('miss!', fruit.x, 80, true);
        fruit.el.remove();
        active = active.filter(item => item.id !== fruit.id);
        updateHud();
        if (misses >= 3) endGame();
      }

      function animate(time) {
        if (state !== 'running') return;
        if (!lastTime) lastTime = time;
        const dt = Math.min(32, time - lastTime); lastTime = time;
        const { h } = stageSize();
        spawnClock += dt;
        const interval = Math.max(430, 910 - score * 8);
        if (spawnClock >= interval) { spawnClock = 0; createFruit(); }
        const basketRect = basket.getBoundingClientRect();
        const stageRect = stage.getBoundingClientRect();
        const basketLeft = basketRect.left - stageRect.left;
        const basketRight = basketLeft + basketRect.width;
        const catchY = basketRect.top - stageRect.top + 17;
        active.forEach(fruit => {
          fruit.y += fruit.speed * dt;
          fruit.x += fruit.sway * dt;
          fruit.rotation += fruit.spin * dt * .04;
          fruit.el.style.left = `${fruit.x}%`;
          fruit.el.style.top = `${fruit.y}%`;
          fruit.el.style.setProperty('--rotation', `${fruit.rotation}deg`);
          const fx = fruit.x / 100 * stage.clientWidth;
          const fy = fruit.y / 100 * h;
          const half = fruit.size * .36;
          if (fy + half >= catchY && fy - half <= catchY + 30 && fx + half >= basketLeft && fx - half <= basketRight) catchFruit(fruit);
          else if (fy - half > h * .91) missFruit(fruit);
        });
        raf = requestAnimationFrame(animate);
      }

      function clearFruits() { active.forEach(fruit => fruit.el.remove()); active = []; stage.querySelectorAll('.catch-pop').forEach(el => el.remove()); }
      function startGame() {
        clearFruits(); score = 0; misses = 0; streak = 0; basketX = 50; spawnClock = 0; lastTime = 0;
        state = 'running'; veil.classList.add('hidden'); pauseBtn.textContent = 'Ⅱ'; pauseBtn.setAttribute('aria-label', 'Pause game');
        positionBasket(); updateHud(); stage.focus(); cancelAnimationFrame(raf); raf = requestAnimationFrame(animate);
      }
      function pauseGame() {
        if (state !== 'running' && state !== 'paused') return;
        if (state === 'running') {
          state = 'paused'; modalEmoji.textContent = '🌤️'; modalTitle.textContent = 'A tiny pause'; modalCopy.textContent = 'Your fruit is waiting right where you left it.'; startBtn.textContent = 'Keep picking';
          bestNote.textContent = `Harvest so far: ${score}`; veil.classList.remove('hidden'); pauseBtn.textContent = '▶'; pauseBtn.setAttribute('aria-label', 'Resume game');
        } else { state = 'running'; veil.classList.add('hidden'); pauseBtn.textContent = 'Ⅱ'; pauseBtn.setAttribute('aria-label', 'Pause game'); lastTime = 0; raf = requestAnimationFrame(animate); }
      }
      function endGame() {
        state = 'over'; cancelAnimationFrame(raf);
        if (score > best) { best = score; localStorage.setItem('tumble-catch-best', String(best)); }
        modalEmoji.textContent = score >= best && score > 0 ? '🏆' : '🧺';
        modalTitle.textContent = score > 0 ? 'Garden closed!' : 'A slippery start!';
        modalCopy.textContent = `You picked ${score} points${score ? '. That was a lovely harvest.' : '. Try moving the basket to the fruit path.'}`;
        startBtn.textContent = 'Play again'; bestNote.textContent = `Best harvest: ${best}`; veil.classList.remove('hidden'); pauseBtn.textContent = 'Ⅱ'; pauseBtn.setAttribute('aria-label', 'Pause game');
      }

      stage.addEventListener('pointermove', event => {
        if (state !== 'running') return;
        const rect = stage.getBoundingClientRect(); basketX = clamp((event.clientX - rect.left) / rect.width * 100, 10, 90); positionBasket();
      });
      window.addEventListener('keydown', event => {
        if (['ArrowLeft', 'ArrowRight', ' ', 'p', 'P'].includes(event.key)) event.preventDefault();
        if (event.key === 'ArrowLeft') { basketX = clamp(basketX - 5, 10, 90); positionBasket(); }
        if (event.key === 'ArrowRight') { basketX = clamp(basketX + 5, 10, 90); positionBasket(); }
        if (event.key === 'p' || event.key === 'P' || event.key === ' ') pauseGame();
      });
      startBtn.addEventListener('click', () => state === 'paused' ? pauseGame() : startGame());
      pauseBtn.addEventListener('click', pauseGame);
      window.addEventListener('resize', positionBasket);
      bestNote.textContent = `Best harvest: ${best}`;
      positionBasket(); updateHud();
    })();
  </script>
</body>
</html>
