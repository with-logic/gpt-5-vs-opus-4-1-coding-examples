<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2e234f">
  <title>Fruit Frenzy — Falling Fruit Catcher</title>
  <style>
    :root {
      --ink: #2e234f;
      --ink-soft: #51436d;
      --paper: #fffaf0;
      --cream: #fff4d7;
      --yellow: #ffd34e;
      --orange: #ff8f52;
      --coral: #f66a63;
      --mint: #78e0b0;
      --sky: #a7e7f4;
      --lilac: #e9ddff;
      --shadow: rgba(46, 35, 79, .18);
      --round: "Arial Rounded MT Bold", "Trebuchet MS", ui-rounded, system-ui, sans-serif;
      --body: "Trebuchet MS", ui-rounded, system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      margin: 0;
      overflow: hidden;
      color: var(--ink);
      background: var(--paper);
      font-family: var(--body);
      -webkit-font-smoothing: antialiased;
      user-select: none;
    }

    button { font: inherit; }

    .app {
      position: relative;
      height: 100%;
      min-height: 560px;
      padding: clamp(14px, 2.4vw, 30px) clamp(14px, 4vw, 60px) clamp(12px, 2vw, 24px);
      isolation: isolate;
      background:
        radial-gradient(circle at 6% 5%, rgba(255, 211, 78, .2) 0 5%, transparent 5.3%),
        radial-gradient(circle at 93% 93%, rgba(120, 224, 176, .2) 0 12%, transparent 12.3%),
        var(--paper);
    }

    .app::before,
    .app::after {
      content: "";
      position: absolute;
      z-index: -1;
      border-radius: 50%;
      pointer-events: none;
    }

    .app::before {
      width: 180px;
      height: 180px;
      top: -105px;
      right: 12%;
      background: var(--yellow);
      opacity: .32;
      box-shadow: 0 0 0 18px rgba(255, 211, 78, .08), 0 0 0 36px rgba(255, 211, 78, .06);
    }

    .app::after {
      width: 300px;
      height: 300px;
      left: -160px;
      bottom: -180px;
      background: var(--mint);
      opacity: .24;
    }

    .topbar {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      max-width: 1440px;
      margin: 0 auto clamp(12px, 2vh, 24px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      width: 48px;
      height: 48px;
      overflow: hidden;
      border: 3px solid var(--ink);
      border-radius: 16px 16px 16px 5px;
      background: var(--yellow);
      box-shadow: 4px 4px 0 var(--ink);
      transform: rotate(-6deg);
    }

    .brand-mark svg { width: 36px; height: 36px; transform: rotate(6deg); }

    .brand-copy { line-height: 1; }

    .brand-name {
      margin: 0;
      font-family: var(--round);
      font-size: clamp(20px, 2.2vw, 29px);
      font-weight: 1000;
      letter-spacing: -.06em;
      text-transform: uppercase;
    }

    .brand-tag {
      display: block;
      margin-top: 5px;
      color: var(--ink-soft);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .16em;
      text-transform: uppercase;
    }

    .top-hint {
      display: flex;
      align-items: center;
      gap: 9px;
      color: var(--ink-soft);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .02em;
      text-align: right;
    }

    .key {
      display: inline-grid;
      place-items: center;
      min-width: 28px;
      height: 28px;
      padding: 0 7px;
      border: 2px solid var(--ink);
      border-bottom-width: 4px;
      border-radius: 9px;
      color: var(--ink);
      background: #fff;
      font-size: 13px;
      line-height: 1;
    }

    .game-shell {
      position: relative;
      display: flex;
      flex-direction: column;
      width: min(1440px, 100%);
      height: calc(100% - 72px);
      min-height: 480px;
      margin: 0 auto;
      overflow: hidden;
      border: 3px solid var(--ink);
      border-radius: 32px;
      background: #302451;
      box-shadow: 0 14px 0 rgba(46, 35, 79, .11), 0 26px 60px rgba(46, 35, 79, .12);
    }

    .hud {
      position: relative;
      z-index: 8;
      display: grid;
      grid-template-columns: minmax(155px, 1fr) auto minmax(155px, 1fr);
      align-items: center;
      gap: 16px;
      padding: clamp(14px, 2.4vw, 24px) clamp(16px, 3vw, 36px) clamp(12px, 2vw, 20px);
      color: #fff8e9;
      background: linear-gradient(180deg, rgba(31, 22, 58, .9), rgba(31, 22, 58, .48));
    }

    .hud-label {
      display: block;
      margin-bottom: 4px;
      color: #c3b8e2;
      font-size: 10px;
      font-weight: 900;
      letter-spacing: .18em;
      text-transform: uppercase;
    }

    .score-wrap { justify-self: start; }

    .score {
      display: flex;
      align-items: baseline;
      gap: 7px;
      font-family: var(--round);
      font-size: clamp(34px, 5vw, 58px);
      font-weight: 1000;
      letter-spacing: -.08em;
      line-height: .85;
      text-shadow: 3px 3px 0 rgba(17, 10, 42, .35);
    }

    .score.bump { animation: score-bump .34s cubic-bezier(.2, 1.6, .4, 1); }

    .score small {
      color: var(--yellow);
      font-size: 13px;
      font-weight: 1000;
      letter-spacing: .1em;
    }

    .level-wrap { justify-self: center; text-align: center; }

    .level-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 13px 9px;
      border: 2px solid rgba(255, 255, 255, .2);
      border-radius: 999px;
      color: #fff8e9;
      background: rgba(255, 255, 255, .1);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .1em;
      text-transform: uppercase;
    }

    .level-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--mint);
      box-shadow: 0 0 0 4px rgba(120, 224, 176, .15);
    }

    .lives-wrap { justify-self: end; text-align: right; }

    .lives { display: flex; justify-content: flex-end; gap: 6px; }

    .heart {
      display: block;
      width: 23px;
      height: 23px;
      color: var(--coral);
      filter: drop-shadow(0 2px 0 rgba(17, 10, 42, .25));
      transition: transform .25s ease, opacity .25s ease, color .25s ease;
    }

    .heart.lost { color: #6a6083; opacity: .6; transform: scale(.82); }

    .heart.pulse { animation: heart-pulse .4s ease; }

    .stage {
      position: relative;
      flex: 1;
      min-height: 0;
      overflow: hidden;
      cursor: none;
      touch-action: none;
      background:
        linear-gradient(180deg, rgba(131, 193, 238, .12), transparent 35%),
        linear-gradient(180deg, #6fc7de 0%, #b3e4e1 47%, #efdfad 100%);
    }

    .stage::before {
      content: "";
      position: absolute;
      z-index: 0;
      top: 9%;
      right: 8%;
      width: clamp(52px, 7vw, 92px);
      height: clamp(52px, 7vw, 92px);
      border-radius: 50%;
      background: #ffed92;
      box-shadow: 0 0 0 15px rgba(255, 237, 146, .13), 0 0 0 31px rgba(255, 237, 146, .07);
    }

    .sky-texture {
      position: absolute;
      z-index: 0;
      inset: 0;
      opacity: .25;
      background-image: radial-gradient(rgba(255,255,255,.55) 1px, transparent 1px);
      background-size: 18px 18px;
      mask-image: linear-gradient(180deg, black, transparent 74%);
      pointer-events: none;
    }

    .cloud {
      position: absolute;
      z-index: 1;
      width: 100px;
      height: 27px;
      border-radius: 40px;
      background: rgba(255, 255, 255, .58);
      filter: blur(.2px);
      opacity: .8;
      animation: cloud-drift 19s ease-in-out infinite alternate;
      pointer-events: none;
    }

    .cloud::before, .cloud::after {
      content: "";
      position: absolute;
      bottom: 0;
      border-radius: 50%;
      background: inherit;
    }

    .cloud::before { left: 18px; width: 43px; height: 43px; }
    .cloud::after { right: 16px; width: 32px; height: 32px; }
    .cloud.one { top: 14%; left: 9%; transform: scale(.8); }
    .cloud.two { top: 25%; right: 18%; transform: scale(.56); animation-delay: -7s; opacity: .48; }

    .hill {
      position: absolute;
      z-index: 1;
      bottom: -7%;
      width: 75%;
      height: 28%;
      border-radius: 50% 50% 0 0;
      background: #a4d48d;
      box-shadow: inset 0 12px 0 rgba(255, 255, 255, .15);
      pointer-events: none;
    }

    .hill.left { left: -24%; transform: rotate(-4deg); }
    .hill.right { right: -27%; bottom: -3%; background: #86c781; transform: rotate(5deg); }

    .ground {
      position: absolute;
      z-index: 2;
      bottom: 0;
      width: 100%;
      height: clamp(42px, 9%, 72px);
      background: #72bd70;
      border-top: 4px solid rgba(46, 35, 79, .16);
      box-shadow: inset 0 10px 0 rgba(255, 255, 255, .08);
      pointer-events: none;
    }

    .ground::before, .ground::after {
      content: "✦  ✦  ✦  ✦  ✦  ✦  ✦";
      position: absolute;
      top: 10px;
      color: rgba(39, 113, 72, .3);
      font-size: 12px;
      letter-spacing: 23px;
      white-space: nowrap;
    }

    .ground::before { left: 5%; transform: rotate(4deg); }
    .ground::after { right: 4%; top: 26px; transform: rotate(-4deg); }

    .fruit {
      position: absolute;
      z-index: 5;
      display: grid;
      place-items: center;
      width: 68px;
      height: 68px;
      will-change: top, left;
      pointer-events: none;
    }

    .fruit-art {
      display: grid;
      place-items: center;
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 7px 4px rgba(46, 35, 79, .24));
      animation: fruit-wiggle 1.6s ease-in-out infinite;
      transform: rotate(var(--tilt));
    }

    .fruit-art svg { width: 100%; height: 100%; overflow: visible; }

    .basket {
      position: absolute;
      z-index: 6;
      bottom: clamp(18px, 5%, 36px);
      left: 50%;
      width: clamp(108px, 14vw, 164px);
      height: clamp(75px, 10vw, 112px);
      will-change: left;
      pointer-events: none;
      transform: translateX(0);
      filter: drop-shadow(0 7px 4px rgba(46, 35, 79, .22));
    }

    .basket svg { width: 100%; height: 100%; overflow: visible; }

    .basket-mouth {
      position: absolute;
      top: -18px;
      left: 50%;
      width: 68%;
      height: 20px;
      border: 5px solid #7a3f2c;
      border-radius: 50%;
      background: #f39a4b;
      transform: translateX(-50%);
      box-shadow: inset 0 4px 0 rgba(255, 242, 176, .4);
    }

    .basket.wiggle { animation: basket-wiggle .3s ease; }

    .catch-pop {
      position: absolute;
      z-index: 9;
      color: #fffdf2;
      font-family: var(--round);
      font-size: 20px;
      font-weight: 1000;
      letter-spacing: -.04em;
      text-shadow: 2px 3px 0 rgba(46, 35, 79, .35);
      pointer-events: none;
      animation: pop-up .72s cubic-bezier(.15,.8,.3,1) forwards;
    }

    .sparkle {
      position: absolute;
      z-index: 8;
      width: 7px;
      height: 7px;
      border-radius: 2px;
      background: var(--yellow);
      pointer-events: none;
      animation: sparkle-out .58s ease-out forwards;
    }

    .sparkle:nth-child(2n) { background: var(--coral); }
    .sparkle:nth-child(3n) { background: #fff; }

    .modal {
      position: absolute;
      z-index: 20;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(37, 26, 71, .34);
      transition: opacity .28s ease, visibility .28s ease;
    }

    .modal.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

    .modal-card {
      width: min(430px, 100%);
      padding: clamp(26px, 5vw, 44px);
      border: 3px solid var(--ink);
      border-radius: 27px;
      text-align: center;
      background: var(--cream);
      box-shadow: 9px 10px 0 var(--ink), 0 24px 50px rgba(35, 21, 69, .25);
      animation: card-in .55s cubic-bezier(.2, 1.4, .4, 1) both;
    }

    .modal:not(.hidden) .modal-card { animation: card-in .55s cubic-bezier(.2, 1.4, .4, 1) both; }

    .fruit-medal {
      display: grid;
      place-items: center;
      width: 88px;
      height: 88px;
      margin: 0 auto 15px;
      border: 3px solid var(--ink);
      border-radius: 50%;
      background: var(--yellow);
      box-shadow: 5px 5px 0 var(--ink);
      transform: rotate(-7deg);
    }

    .fruit-medal svg { width: 62px; height: 62px; }

    .modal-kicker {
      margin: 0 0 7px;
      color: var(--coral);
      font-size: 11px;
      font-weight: 1000;
      letter-spacing: .17em;
      text-transform: uppercase;
    }

    .modal-title {
      margin: 0;
      font-family: var(--round);
      font-size: clamp(33px, 8vw, 50px);
      font-weight: 1000;
      letter-spacing: -.08em;
      line-height: .93;
    }

    .modal-text {
      max-width: 305px;
      margin: 15px auto 22px;
      color: var(--ink-soft);
      font-size: 14px;
      font-weight: 700;
      line-height: 1.45;
    }

    .primary-btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      min-width: 185px;
      padding: 14px 22px 15px;
      border: 3px solid var(--ink);
      border-radius: 15px;
      color: var(--ink);
      background: var(--mint);
      box-shadow: 0 5px 0 var(--ink);
      cursor: pointer;
      font-family: var(--round);
      font-size: 16px;
      font-weight: 1000;
      letter-spacing: -.02em;
      transition: transform .14s ease, box-shadow .14s ease, background .14s ease;
    }

    .primary-btn:hover { background: #94edc4; transform: translateY(-2px) rotate(-1deg); box-shadow: 0 7px 0 var(--ink); }
    .primary-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 var(--ink); }
    .primary-btn:focus-visible, .control-btn:focus-visible { outline: 4px solid #fff; outline-offset: 3px; }

    .modal-tip {
      margin: 19px 0 0;
      color: #7b6e8e;
      font-size: 11px;
      font-weight: 800;
    }

    .modal-tip b { color: var(--ink); }

    .mobile-controls {
      position: absolute;
      z-index: 12;
      right: 18px;
      bottom: 14px;
      left: 18px;
      display: none;
      justify-content: space-between;
      pointer-events: none;
    }

    .control-btn {
      display: grid;
      place-items: center;
      width: 54px;
      height: 48px;
      border: 2px solid rgba(46, 35, 79, .6);
      border-radius: 15px;
      color: var(--ink);
      background: rgba(255, 250, 240, .74);
      box-shadow: 0 4px 0 rgba(46, 35, 79, .28);
      cursor: pointer;
      font-size: 25px;
      font-weight: 1000;
      pointer-events: auto;
      -webkit-tap-highlight-color: transparent;
    }

    .control-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(46, 35, 79, .28); }

    .visually-hidden {
      position: absolute !important;
      width: 1px !important;
      height: 1px !important;
      padding: 0 !important;
      margin: -1px !important;
      overflow: hidden !important;
      clip: rect(0, 0, 0, 0) !important;
      white-space: nowrap !important;
      border: 0 !important;
    }

    @keyframes fruit-wiggle { 0%, 100% { transform: rotate(var(--tilt)) translateY(0); } 50% { transform: rotate(calc(var(--tilt) * -1)) translateY(3px); } }
    @keyframes cloud-drift { from { margin-left: -8px; } to { margin-left: 18px; } }
    @keyframes pop-up { 0% { opacity: 0; transform: translate(-50%, 7px) scale(.7) rotate(-5deg); } 18% { opacity: 1; } 100% { opacity: 0; transform: translate(-50%, -54px) scale(1.06) rotate(4deg); } }
    @keyframes sparkle-out { 0% { opacity: 1; transform: translate(0,0) rotate(0) scale(1); } 100% { opacity: 0; transform: translate(var(--dx), var(--dy)) rotate(140deg) scale(.3); } }
    @keyframes basket-wiggle { 0%, 100% { transform: translateX(0) rotate(0); } 40% { transform: translateX(0) rotate(-4deg) scale(1.03); } 70% { transform: translateX(0) rotate(3deg); } }
    @keyframes score-bump { 0% { transform: scale(1); } 45% { transform: scale(1.18) rotate(-2deg); color: var(--yellow); } 100% { transform: scale(1); } }
    @keyframes heart-pulse { 0%,100% { transform: scale(1); } 45% { transform: scale(1.3); } }
    @keyframes card-in { from { opacity: 0; transform: translateY(20px) scale(.94) rotate(-1deg); } to { opacity: 1; transform: translateY(0) scale(1) rotate(0); } }

    @media (max-width: 680px) {
      .app { min-height: 500px; padding: 11px 10px 10px; }
      .topbar { margin-bottom: 10px; }
      .brand-mark { width: 39px; height: 39px; border-radius: 12px 12px 12px 4px; box-shadow: 3px 3px 0 var(--ink); }
      .brand-mark svg { width: 30px; height: 30px; }
      .brand-tag { display: none; }
      .top-hint { gap: 5px; font-size: 10px; }
      .top-hint .key { display: none; }
      .game-shell { height: calc(100% - 50px); min-height: 430px; border-radius: 24px; box-shadow: 0 8px 0 rgba(46, 35, 79, .11); }
      .hud { grid-template-columns: 1fr auto 1fr; gap: 8px; padding: 13px 15px 11px; }
      .score { font-size: 38px; }
      .level-pill { padding: 7px 9px 8px; font-size: 9px; letter-spacing: .06em; }
      .level-dot { width: 6px; height: 6px; }
      .hud-label { font-size: 8px; letter-spacing: .12em; }
      .heart { width: 19px; height: 19px; }
      .stage { cursor: default; }
      .mobile-controls { display: flex; }
      .fruit { width: 60px; height: 60px; }
      .basket { width: 124px; height: 88px; }
      .modal-card { box-shadow: 6px 7px 0 var(--ink); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .01ms !important; animation-iteration-count: 1 !important; scroll-behavior: auto !important; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar" aria-label="Game header">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 48 48" fill="none">
            <path d="M24 13c-7.1-5.1-14.6.5-13.5 9.6C11.6 33 18.2 39 24 39s12.4-6 13.5-16.4C38.6 13.5 31.1 7.9 24 13Z" fill="#F66A63" stroke="#2E234F" stroke-width="2.6"/>
            <path d="M24 13c-.4-4 1.7-7 5.3-8.2" stroke="#2E234F" stroke-width="2.6" stroke-linecap="round"/>
            <path d="M27 7c4.3-1.1 7.7 1 9.5 4.1-4.2 1.5-7.6.2-9.5-4.1Z" fill="#78E0B0" stroke="#2E234F" stroke-width="2.2" stroke-linejoin="round"/>
            <path d="M17 21c2.1-2.2 4.9-2.3 7.2-.5" stroke="#FFB4A4" stroke-width="2.2" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="brand-copy">
          <h1 class="brand-name">Fruit Frenzy</h1>
          <span class="brand-tag">Catch the good stuff</span>
        </div>
      </div>
      <div class="top-hint" aria-label="Controls hint">
        <span>Move your basket</span>
        <span class="key">←</span><span class="key">→</span>
      </div>
    </header>

    <section class="game-shell" aria-label="Fruit Frenzy game">
      <div class="hud">
        <div class="score-wrap">
          <span class="hud-label">Score</span>
          <div class="score" id="score" aria-live="polite">0 <small>PTS</small></div>
        </div>
        <div class="level-wrap">
          <span class="hud-label">Pace</span>
          <div class="level-pill"><span class="level-dot"></span><span id="paceLabel">Sunny</span></div>
        </div>
        <div class="lives-wrap">
          <span class="hud-label">Misses <span id="missCount">0</span>/3</span>
          <div class="lives" aria-label="Three chances">
            <svg class="heart" id="heart1" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12 21.3 2.7 12A5.8 5.8 0 0 1 11 3.8l1 1 1-1A5.8 5.8 0 0 1 21.3 12L12 21.3Z"/></svg>
            <svg class="heart" id="heart2" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12 21.3 2.7 12A5.8 5.8 0 0 1 11 3.8l1 1 1-1A5.8 5.8 0 0 1 21.3 12L12 21.3Z"/></svg>
            <svg class="heart" id="heart3" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12 21.3 2.7 12A5.8 5.8 0 0 1 11 3.8l1 1 1-1A5.8 5.8 0 0 1 21.3 12L12 21.3Z"/></svg>
          </div>
        </div>
      </div>

      <div class="stage" id="stage" role="application" aria-label="Play area. Use left and right arrow keys, or move your pointer, to guide the basket.">
        <div class="sky-texture" aria-hidden="true"></div>
        <div class="cloud one" aria-hidden="true"></div>
        <div class="cloud two" aria-hidden="true"></div>
        <div class="hill left" aria-hidden="true"></div>
        <div class="hill right" aria-hidden="true"></div>
        <div class="ground" aria-hidden="true"></div>
        <div class="basket" id="basket" aria-hidden="true">
          <div class="basket-mouth"></div>
          <svg viewBox="0 0 160 110" fill="none">
            <path d="M18 26h124l-12 63c-1 7-7 12-14 12H44c-7 0-13-5-14-12L18 26Z" fill="#C96B36" stroke="#2E234F" stroke-width="5" stroke-linejoin="round"/>
            <path d="M29 37h102l-8 45c-1 7-5 10-12 10H49c-7 0-11-3-12-10l-8-45Z" fill="#F09A4E"/>
            <path d="M43 37 51 92M66 37l3 55M91 37l-3 55M116 37l-8 55" stroke="#B75B32" stroke-width="4" stroke-linecap="round" opacity=".7"/>
            <path d="M18 27c0-10 12-15 28-15h68c16 0 28 5 28 15s-12 13-28 13H46c-16 0-28-3-28-13Z" fill="#F5A65B" stroke="#2E234F" stroke-width="5"/>
            <path d="M27 26c9 5 21 7 37 7h34c16 0 27-2 35-7" stroke="#FFD58A" stroke-width="4" stroke-linecap="round" opacity=".8"/>
          </svg>
        </div>
        <div class="mobile-controls" aria-label="Touch controls">
          <button type="button" class="control-btn" id="leftBtn" aria-label="Move basket left">←</button>
          <button type="button" class="control-btn" id="rightBtn" aria-label="Move basket right">→</button>
        </div>
        <div class="modal" id="modal">
          <div class="modal-card">
            <div class="fruit-medal" id="medal" aria-hidden="true">
              <svg viewBox="0 0 80 80" fill="none">
                <path d="M41 20C27 10 12 21 14 38c2 15 15 27 27 27s25-12 27-27c2-17-13-28-27-18Z" fill="#F66A63" stroke="#2E234F" stroke-width="4"/>
                <path d="M41 20c-1-6 2-11 8-14" stroke="#2E234F" stroke-width="4" stroke-linecap="round"/>
                <path d="M45 10c8-3 15 1 18 7-8 3-15 0-18-7Z" fill="#78E0B0" stroke="#2E234F" stroke-width="3" stroke-linejoin="round"/>
                <path d="M26 33c4-4 9-4 13-1" stroke="#FFB4A4" stroke-width="3" stroke-linecap="round"/>
              </svg>
            </div>
            <p class="modal-kicker" id="modalKicker">Welcome to the orchard</p>
            <h2 class="modal-title" id="modalTitle">Catch the fruit!</h2>
            <p class="modal-text" id="modalText">Guide your basket and catch the falling treats. You get three misses — make them count!</p>
            <button class="primary-btn" type="button" id="startBtn"><span id="buttonLabel">Start catching</span><span aria-hidden="true">↗</span></button>
            <p class="modal-tip"><b>Arrow keys</b> or <b>move your pointer</b> to steer</p>
          </div>
        </div>
        <div class="visually-hidden" id="gameStatus" aria-live="assertive"></div>
      </div>
    </section>
  </main>

  <script>
    (() => {
      "use strict";

      const stage = document.getElementById("stage");
      const basket = document.getElementById("basket");
      const scoreEl = document.getElementById("score");
      const missCountEl = document.getElementById("missCount");
      const paceLabel = document.getElementById("paceLabel");
      const modal = document.getElementById("modal");
      const modalKicker = document.getElementById("modalKicker");
      const modalTitle = document.getElementById("modalTitle");
      const modalText = document.getElementById("modalText");
      const startBtn = document.getElementById("startBtn");
      const buttonLabel = document.getElementById("buttonLabel");
      const gameStatus = document.getElementById("gameStatus");
      const fruits = [];
      const fruitTypes = ["apple", "orange", "watermelon", "lemon", "berry"];
      const paceNames = ["Sunny", "Breezy", "Zippy", "Wild"];
      const hearts = [1, 2, 3].map((n) => document.getElementById("heart" + n));
      let state = "ready";
      let score = 0;
      let misses = 0;
      let streak = 0;
      let basketX = NaN;
      let targetBasketX = NaN;
      let lastTime = 0;
      let spawnTimer = 0;
      let nextSpawn = 700;
      let raf = 0;
      let keyLeft = false;
      let keyRight = false;
      let stageWidth = 0;
      let stageHeight = 0;
      let basketWidth = 140;
      let fruitCounter = 0;

      const fruitSvg = {
        apple: '<svg viewBox="0 0 80 80" fill="none"><path d="M40 23C27 13 12 23 14 40c2 15 14 27 26 27s24-12 26-27c2-17-13-27-26-17Z" fill="#F45F5F" stroke="#2E234F" stroke-width="4"/><path d="M40 23c-.7-5 2-10 7-13" stroke="#2E234F" stroke-width="4" stroke-linecap="round"/><path d="M44 13c8-3 14 1 17 7-8 3-14 0-17-7Z" fill="#78E0B0" stroke="#2E234F" stroke-width="3"/><path d="M24 35c3-3 8-4 12-1" stroke="#FFB0A5" stroke-width="3" stroke-linecap="round"/></svg>',
        orange: '<svg viewBox="0 0 80 80" fill="none"><circle cx="40" cy="43" r="27" fill="#FF9B3D" stroke="#2E234F" stroke-width="4"/><path d="M40 16c0-6 4-9 9-11" stroke="#2E234F" stroke-width="4" stroke-linecap="round"/><path d="M45 10c7-2 12 1 15 6-7 3-12 1-15-6Z" fill="#78E0B0" stroke="#2E234F" stroke-width="3"/><path d="M26 27c6-4 13-5 20-3" stroke="#FFD58A" stroke-width="4" stroke-linecap="round"/><path d="M23 44h.5M31 58h.5M54 32h.5M59 50h.5M43 64h.5" stroke="#F47A32" stroke-width="4" stroke-linecap="round"/></svg>',
        watermelon: '<svg viewBox="0 0 80 80" fill="none"><path d="M13 33c2 21 13 34 27 34s25-13 27-34H13Z" fill="#FF6D67" stroke="#2E234F" stroke-width="4" stroke-linejoin="round"/><path d="M13 33h54" stroke="#7FD678" stroke-width="9" stroke-linecap="round"/><path d="M17 32h46" stroke="#2E234F" stroke-width="3" stroke-linecap="round"/><path d="M27 44v4M40 42v4M53 44v4" stroke="#2E234F" stroke-width="3" stroke-linecap="round"/><path d="M24 61c5 2 10 3 16 3M44 64c5-.3 9-1.5 13-4" stroke="#FFAE9D" stroke-width="3" stroke-linecap="round"/></svg>',
        lemon: '<svg viewBox="0 0 80 80" fill="none"><path d="M16 39c2-16 13-26 28-25 14 1 23 11 21 25-2 16-13 27-28 26-14-1-23-11-21-26Z" fill="#FFD84F" stroke="#2E234F" stroke-width="4"/><path d="M42 15c1-5 4-8 9-9" stroke="#2E234F" stroke-width="4" stroke-linecap="round"/><path d="M46 9c7-2 12 1 14 6-7 2-11 0-14-6Z" fill="#78E0B0" stroke="#2E234F" stroke-width="3"/><path d="M28 25c6-4 14-5 20-3" stroke="#FFF2A0" stroke-width="4" stroke-linecap="round"/><path d="M24 50c8 6 22 8 31 1" stroke="#F6B832" stroke-width="3" stroke-linecap="round"/></svg>',
        berry: '<svg viewBox="0 0 80 80" fill="none"><path d="M40 22c-10-8-23-3-25 10-2 15 10 34 25 34s27-19 25-34c-2-13-15-18-25-10Z" fill="#A477E7" stroke="#2E234F" stroke-width="4"/><path d="M40 22c0-6 3-10 8-13" stroke="#2E234F" stroke-width="4" stroke-linecap="round"/><path d="M44 11c7-3 14 0 16 6-7 3-13 2-16-6Z" fill="#78E0B0" stroke="#2E234F" stroke-width="3"/><circle cx="27" cy="37" r="3" fill="#DCC4FF"/><circle cx="41" cy="32" r="3" fill="#DCC4FF"/><circle cx="53" cy="40" r="3" fill="#DCC4FF"/><circle cx="34" cy="49" r="3" fill="#DCC4FF"/><circle cx="48" cy="54" r="3" fill="#DCC4FF"/></svg>'
      };

      function measure() {
        const rect = stage.getBoundingClientRect();
        stageWidth = rect.width;
        stageHeight = rect.height;
        basketWidth = basket.getBoundingClientRect().width;
        if (!Number.isFinite(basketX)) basketX = (stageWidth - basketWidth) / 2;
        if (!Number.isFinite(targetBasketX)) targetBasketX = basketX;
        basketX = clamp(basketX, 0, Math.max(0, stageWidth - basketWidth));
        targetBasketX = clamp(targetBasketX, 0, Math.max(0, stageWidth - basketWidth));
        basket.style.left = basketX + "px";
      }

      function clamp(value, min, max) { return Math.max(min, Math.min(max, value)); }

      function currentLevel() { return Math.min(3, Math.floor(score / 80)); }

      function resetGame() {
        fruits.splice(0).forEach((fruit) => fruit.el.remove());
        document.querySelectorAll(".catch-pop, .sparkle").forEach((el) => el.remove());
        score = 0;
        misses = 0;
        streak = 0;
        spawnTimer = 0;
        nextSpawn = 760;
        scoreEl.innerHTML = '0 <small>PTS</small>';
        missCountEl.textContent = "0";
        paceLabel.textContent = paceNames[0];
        hearts.forEach((heart) => heart.classList.remove("lost", "pulse"));
        measure();
      }

      function beginGame() {
        resetGame();
        state = "running";
        modal.classList.add("hidden");
        gameStatus.textContent = "Game started. Catch the falling fruit.";
        lastTime = performance.now();
        raf = requestAnimationFrame(loop);
      }

      function endGame() {
        state = "over";
        cancelAnimationFrame(raf);
        modalKicker.textContent = score > 0 ? "Orchard closed for now" : "So close!";
        modalTitle.textContent = score > 0 ? "Great picking!" : "Give it another go!";
        modalText.textContent = `You scored ${score} point${score === 1 ? "" : "s"}. Your basket caught ${streak > 1 ? "a " + streak + " fruit streak" : "some tasty fruit"}!`;
        buttonLabel.textContent = "Play again";
        modal.classList.remove("hidden");
        gameStatus.textContent = `Game over. Final score ${score}. Press Play again to restart.`;
      }

      function spawnFruit() {
        const type = fruitTypes[Math.floor(Math.random() * fruitTypes.length)];
        const el = document.createElement("div");
        const art = document.createElement("div");
        const size = stageWidth < 680 ? 60 : 68;
        const x = Math.random() * Math.max(1, stageWidth - size);
        const tilt = (Math.random() * 26 - 13).toFixed(1) + "deg";
        el.className = "fruit";
        el.dataset.fruit = type;
        art.className = "fruit-art";
        art.style.setProperty("--tilt", tilt);
        art.innerHTML = fruitSvg[type];
        el.appendChild(art);
        el.style.left = x + "px";
        el.style.top = "-78px";
        stage.appendChild(el);
        fruits.push({
          el,
          x,
          y: -78,
          size,
          speed: 135 + Math.random() * 55 + currentLevel() * 28,
          id: fruitCounter++
        });
      }

      function loop(now) {
        if (state !== "running") return;
        const delta = Math.min(42, now - lastTime);
        lastTime = now;
        measure();
        const level = currentLevel();
        const moveSpeed = 0.72 + level * .11;
        if (keyLeft) targetBasketX -= 430 * moveSpeed * (delta / 1000);
        if (keyRight) targetBasketX += 430 * moveSpeed * (delta / 1000);
        targetBasketX = clamp(targetBasketX, 0, Math.max(0, stageWidth - basketWidth));
        basketX += (targetBasketX - basketX) * Math.min(1, delta / 65);
        basket.style.left = basketX + "px";

        spawnTimer += delta;
        nextSpawn = Math.max(365, 760 - level * 110 - Math.min(110, score * 0.5));
        if (spawnTimer >= nextSpawn) {
          spawnTimer = 0;
          spawnFruit();
          if (Math.random() < Math.min(.28, level * .08)) setTimeout(() => { if (state === "running") spawnFruit(); }, 190);
        }

        for (let i = fruits.length - 1; i >= 0; i--) {
          const fruit = fruits[i];
          fruit.y += fruit.speed * (delta / 1000);
          fruit.el.style.top = fruit.y + "px";
          if (isCaught(fruit)) {
            catchFruit(fruit);
            fruits.splice(i, 1);
          } else if (fruit.y > stageHeight - 30) {
            missFruit(fruit);
            fruits.splice(i, 1);
          }
        }
        raf = requestAnimationFrame(loop);
      }

      function isCaught(fruit) {
        const basketHeight = basket.getBoundingClientRect().height;
        const bottomGap = Math.max(18, Math.min(36, stageHeight * .05));
        const basketTop = stageHeight - basketHeight - bottomGap - 18;
        const fruitBottom = fruit.y + fruit.size - 5;
        const fruitCenter = fruit.x + fruit.size / 2;
        return fruitBottom >= basketTop && fruit.y < basketTop + 38 && fruitCenter > basketX - 6 && fruitCenter < basketX + basketWidth + 6;
      }

      function catchFruit(fruit) {
        streak++;
        const multiplier = Math.min(4, 1 + Math.floor(streak / 5));
        const points = 10 * multiplier;
        score += points;
        scoreEl.innerHTML = `${score} <small>PTS</small>`;
        scoreEl.classList.remove("bump");
        void scoreEl.offsetWidth;
        scoreEl.classList.add("bump");
        basket.classList.remove("wiggle");
        void basket.offsetWidth;
        basket.classList.add("wiggle");
        if (streak >= 3) showPop(`+${points}  ${multiplier > 1 ? "COMBO!" : "NICE!"}`, fruit.x + fruit.size / 2, fruit.y);
        burst(fruit.x + fruit.size / 2, fruit.y + fruit.size / 2);
        paceLabel.textContent = paceNames[currentLevel()];
      }

      function missFruit(fruit) {
        misses++;
        streak = 0;
        missCountEl.textContent = misses;
        const heart = hearts[misses - 1];
        if (heart) {
          heart.classList.add("lost", "pulse");
          setTimeout(() => heart.classList.remove("pulse"), 450);
        }
        showPop("miss!", fruit.x + fruit.size / 2, Math.min(stageHeight - 80, fruit.y));
        if (misses >= 3) endGame();
      }

      function showPop(text, x, y) {
        const pop = document.createElement("div");
        pop.className = "catch-pop";
        pop.textContent = text;
        pop.style.left = x + "px";
        pop.style.top = y + "px";
        stage.appendChild(pop);
        setTimeout(() => pop.remove(), 750);
      }

      function burst(x, y) {
        for (let i = 0; i < 8; i++) {
          const sparkle = document.createElement("i");
          const angle = (Math.PI * 2 * i) / 8;
          const distance = 24 + Math.random() * 21;
          sparkle.className = "sparkle";
          sparkle.style.left = x + "px";
          sparkle.style.top = y + "px";
          sparkle.style.setProperty("--dx", `${Math.cos(angle) * distance}px`);
          sparkle.style.setProperty("--dy", `${Math.sin(angle) * distance}px`);
          stage.appendChild(sparkle);
          setTimeout(() => sparkle.remove(), 650);
        }
      }

      function setBasketFromPointer(clientX) {
        const rect = stage.getBoundingClientRect();
        targetBasketX = clamp(clientX - rect.left - basketWidth / 2, 0, Math.max(0, stageWidth - basketWidth));
      }

      stage.addEventListener("pointermove", (event) => {
        if (event.pointerType === "touch") return;
        if (state === "running") setBasketFromPointer(event.clientX);
      });

      stage.addEventListener("pointerdown", (event) => {
        if (state === "running") setBasketFromPointer(event.clientX);
      });

      function holdButton(button, direction) {
        const start = (event) => { event.preventDefault(); if (direction === "left") keyLeft = true; else keyRight = true; };
        const stop = () => { if (direction === "left") keyLeft = false; else keyRight = false; };
        button.addEventListener("pointerdown", start);
        button.addEventListener("pointerup", stop);
        button.addEventListener("pointerleave", stop);
        button.addEventListener("pointercancel", stop);
      }

      holdButton(document.getElementById("leftBtn"), "left");
      holdButton(document.getElementById("rightBtn"), "right");

      document.addEventListener("keydown", (event) => {
        if (["ArrowLeft", "ArrowRight", " "].includes(event.key)) event.preventDefault();
        if (event.key === "ArrowLeft") keyLeft = true;
        if (event.key === "ArrowRight") keyRight = true;
        if (event.key === " " && state !== "running") beginGame();
      });

      document.addEventListener("keyup", (event) => {
        if (event.key === "ArrowLeft") keyLeft = false;
        if (event.key === "ArrowRight") keyRight = false;
      });

      startBtn.addEventListener("click", beginGame);
      window.addEventListener("resize", measure);
      measure();
    })();
  </script>
</body>
</html>
