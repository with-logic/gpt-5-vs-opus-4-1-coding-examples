<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0c1321" />
  <title>Markdown → Slides</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Manrope:wght@400;500;600;700;800&display=swap');

    :root {
      --bg: #09101c;
      --bg-deep: #060b13;
      --surface: #101a2a;
      --surface-2: #152237;
      --surface-3: #1b2a43;
      --line: rgba(187, 204, 231, .12);
      --line-strong: rgba(187, 204, 231, .2);
      --text: #e8eef8;
      --muted: #8795ad;
      --muted-2: #5f6d84;
      --accent: #f4b65f;
      --accent-soft: rgba(244, 182, 95, .15);
      --blue: #8fb4ea;
      --green: #91d6ba;
      --shadow: 0 25px 70px rgba(0, 0, 0, .34);
      --radius: 12px;
      --slide-bg: #f3f0e9;
      --slide-ink: #182335;
      --slide-muted: #6d7683;
      --slide-accent: #cf713f;
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Manrope', ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 13px;
      -webkit-font-smoothing: antialiased;
    }

    button, textarea { font: inherit; }
    button { color: inherit; }
    button:focus-visible, textarea:focus-visible, [tabindex]:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
    }

    .app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background:
        radial-gradient(circle at 78% -15%, rgba(49, 75, 119, .2), transparent 32rem),
        linear-gradient(140deg, var(--bg-deep), var(--bg) 54%, #0d1727);
      transition: background .3s ease, color .3s ease;
    }
    .app.is-light {
      --bg: #eef1f4;
      --bg-deep: #e5e9ee;
      --surface: #fbfcfd;
      --surface-2: #f3f6f8;
      --surface-3: #eaf0f4;
      --line: rgba(19, 33, 53, .1);
      --line-strong: rgba(19, 33, 53, .18);
      --text: #132137;
      --muted: #68778d;
      --muted-2: #9aa6b5;
      --shadow: 0 25px 70px rgba(36, 54, 79, .13);
      background: linear-gradient(150deg, #e7ebef, #f2f5f7 54%, #e8edf2);
    }

    .topbar {
      height: 68px;
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      border-bottom: 1px solid var(--line);
      background: rgba(8, 14, 24, .5);
      backdrop-filter: blur(18px);
      position: relative;
      z-index: 2;
    }
    .is-light .topbar { background: rgba(250, 252, 253, .74); }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: var(--text);
      letter-spacing: -.02em;
      font-size: 14px;
      font-weight: 800;
    }
    .brand-mark {
      width: 27px;
      height: 27px;
      border: 1px solid rgba(244, 182, 95, .56);
      border-radius: 8px;
      display: grid;
      place-items: center;
      position: relative;
      background: linear-gradient(145deg, rgba(244, 182, 95, .2), rgba(244, 182, 95, .04));
    }
    .brand-mark::before, .brand-mark::after {
      content: '';
      position: absolute;
      left: 7px;
      right: 7px;
      height: 2px;
      background: var(--accent);
      border-radius: 99px;
      transform: skewX(-23deg);
    }
    .brand-mark::before { top: 8px; }
    .brand-mark::after { bottom: 8px; opacity: .54; }
    .brand-arrow { color: var(--muted-2); font-weight: 400; margin: 0 2px; }
    .brand-sub { color: var(--muted); font-weight: 500; }

    .topbar-actions { display: flex; gap: 10px; align-items: center; }
    .status {
      display: inline-flex;
      gap: 7px;
      align-items: center;
      color: var(--muted);
      margin-right: 10px;
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      letter-spacing: .01em;
    }
    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 0 4px rgba(145, 214, 186, .1);
    }
    .ghost-button, .primary-button, .icon-button {
      border: 1px solid var(--line);
      background: transparent;
      border-radius: 8px;
      cursor: pointer;
      transition: background .18s ease, border-color .18s ease, color .18s ease, transform .18s ease;
    }
    .ghost-button {
      padding: 9px 12px;
      color: var(--muted);
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .ghost-button:hover, .icon-button:hover { background: var(--surface-2); border-color: var(--line-strong); color: var(--text); }
    .ghost-button:active, .primary-button:active, .icon-button:active { transform: translateY(1px); }
    .primary-button {
      background: var(--accent);
      border-color: var(--accent);
      color: #17120d;
      padding: 9px 13px;
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .primary-button:hover { background: #ffca7b; border-color: #ffca7b; }
    .icon-button {
      width: 35px;
      height: 35px;
      display: grid;
      place-items: center;
      color: var(--muted);
    }
    .icon-button svg, .ghost-button svg, .primary-button svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

    .app-body {
      min-height: 0;
      flex: 1;
      display: flex;
    }
    .sidebar {
      width: 230px;
      flex: 0 0 230px;
      padding: 28px 18px 22px;
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background: rgba(6, 11, 19, .18);
    }
    .is-light .sidebar { background: rgba(242, 246, 248, .35); }
    .sidebar-label, .eyebrow {
      color: var(--muted-2);
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .14em;
    }
    .sidebar-label { padding: 0 11px; margin-bottom: 12px; }
    .nav-list { display: grid; gap: 4px; }
    .nav-item {
      border: 0;
      background: transparent;
      color: var(--muted);
      width: 100%;
      padding: 10px 11px;
      text-align: left;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      gap: 11px;
      align-items: center;
      font-size: 12px;
    }
    .nav-item svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
    .nav-item:hover { color: var(--text); background: var(--surface-2); }
    .nav-item.active { color: var(--text); background: var(--surface-2); box-shadow: inset 2px 0 0 var(--accent); }
    .sidebar-footer { padding: 0 11px; }
    .shortcut-box {
      border-top: 1px solid var(--line);
      padding-top: 17px;
      color: var(--muted-2);
      font-size: 11px;
      line-height: 1.75;
    }
    .shortcut-row { display: flex; justify-content: space-between; gap: 16px; }
    kbd {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      color: var(--muted);
      border: 1px solid var(--line-strong);
      border-radius: 4px;
      padding: 1px 4px;
      background: var(--surface-2);
    }

    .workspace {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
    }
    .workspace-head {
      height: 79px;
      flex: 0 0 auto;
      padding: 0 28px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .workspace-title { display: flex; align-items: baseline; gap: 10px; }
    .workspace-title h1 { font-size: 17px; letter-spacing: -.03em; margin: 0; font-weight: 700; }
    .workspace-title span { color: var(--muted); font-size: 11px; }
    .view-switcher { display: flex; align-items: center; gap: 3px; padding: 3px; border: 1px solid var(--line); border-radius: 8px; background: rgba(0,0,0,.08); }
    .view-switcher button { border: 0; border-radius: 5px; padding: 6px 11px; background: transparent; color: var(--muted); cursor: pointer; font-size: 11px; }
    .view-switcher button.active { color: var(--text); background: var(--surface-3); box-shadow: 0 1px 2px rgba(0,0,0,.12); }

    .workgrid {
      flex: 1;
      min-height: 0;
      padding: 23px 28px 26px;
      display: grid;
      grid-template-columns: minmax(250px, 33%) minmax(520px, 1fr);
      gap: 23px;
    }
    .panel {
      min-height: 0;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(14, 24, 39, .58);
      box-shadow: 0 14px 35px rgba(0,0,0,.08);
      overflow: hidden;
    }
    .is-light .panel { background: rgba(252, 253, 254, .62); }
    .editor-panel { display: flex; flex-direction: column; }
    .panel-top {
      min-height: 62px;
      flex: 0 0 auto;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .panel-heading { display: flex; align-items: center; gap: 10px; }
    .panel-heading strong { display: block; font-size: 12px; font-weight: 700; }
    .panel-heading small { display: block; color: var(--muted-2); margin-top: 3px; font-size: 10px; }
    .code-mark { width: 27px; height: 27px; display: grid; place-items: center; color: var(--accent); background: var(--accent-soft); border-radius: 7px; font-family: 'DM Mono', monospace; font-size: 13px; }
    .text-editor {
      resize: none;
      flex: 1;
      min-height: 260px;
      width: 100%;
      border: 0;
      outline: 0;
      color: var(--text);
      background: transparent;
      padding: 19px 18px;
      line-height: 1.78;
      letter-spacing: -.005em;
      font-family: 'DM Mono', ui-monospace, monospace;
      font-size: 11px;
      tab-size: 2;
    }
    .text-editor::selection { background: rgba(244, 182, 95, .25); }
    .editor-footer { padding: 12px 16px; border-top: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; color: var(--muted-2); font-size: 10px; }
    .editor-footer .mono { font-family: 'DM Mono', monospace; color: var(--muted); }
    .slide-map { padding: 15px 16px 16px; border-top: 1px solid var(--line); }
    .slide-map-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .slide-map-head span { font-size: 10px; color: var(--muted-2); text-transform: uppercase; letter-spacing: .12em; font-family: 'DM Mono', monospace; }
    .slide-count { color: var(--muted); font-family: 'DM Mono', monospace; font-size: 10px; }
    .map-list { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 5px; }
    .map-item { border: 1px solid var(--line); height: 34px; border-radius: 5px; background: var(--surface-2); color: var(--muted); display: grid; place-items: center; cursor: pointer; font-family: 'DM Mono', monospace; font-size: 10px; transition: all .18s ease; }
    .map-item:hover { border-color: var(--line-strong); color: var(--text); }
    .map-item.active { color: var(--accent); border-color: rgba(244, 182, 95, .6); background: var(--accent-soft); }

    .preview-panel { min-width: 0; display: flex; flex-direction: column; }
    .preview-top { min-height: 62px; flex: 0 0 auto; padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--line); }
    .preview-label { display: flex; align-items: center; gap: 9px; }
    .pulse { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 0 5px var(--accent-soft); }
    .preview-label strong { font-size: 12px; }
    .preview-label small { color: var(--muted); font-size: 10px; margin-left: 4px; }
    .preview-tools { display: flex; gap: 7px; align-items: center; }
    .preview-tools .icon-button { width: 31px; height: 31px; }
    .ratio { color: var(--muted-2); font-family: 'DM Mono', monospace; font-size: 10px; padding-right: 7px; }
    .stage-wrap { flex: 1; min-height: 0; display: flex; align-items: center; justify-content: center; padding: 22px 23px 18px; background: radial-gradient(circle at 55% 48%, rgba(62, 93, 137, .13), transparent 47%); }
    .stage-layout { width: 100%; max-width: 1000px; min-height: 0; display: grid; grid-template-columns: minmax(0, 1fr) 92px; gap: 16px; align-items: center; }
    .stage-shell { width: 100%; min-width: 0; position: relative; }
    .stage-shell::before { content: ''; position: absolute; inset: 5% -4% -4%; background: rgba(0,0,0,.35); filter: blur(22px); border-radius: 14px; opacity: .7; }
    .stage {
      position: relative;
      z-index: 1;
      width: 100%;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      border-radius: 4px;
      background: var(--slide-bg);
      box-shadow: var(--shadow);
      transform: translateZ(0);
    }
    .stage.is-changing { animation: stageIn .32s ease both; }
    @keyframes stageIn { from { opacity: .2; transform: translateY(6px) scale(.992); } to { opacity: 1; transform: translateY(0) scale(1); } }
    .slide {
      width: 100%;
      height: 100%;
      position: relative;
      overflow: hidden;
      padding: 8.6% 9%;
      color: var(--slide-ink);
      background: var(--slide-bg);
    }
    .slide::after { content: ''; position: absolute; width: 22%; aspect-ratio: 1; border-radius: 50%; border: 1px solid rgba(207, 113, 63, .18); right: -8%; top: -15%; }
    .slide > * { position: relative; z-index: 1; }
    .slide .slide-kicker { color: var(--slide-accent); font-family: 'DM Mono', monospace; font-size: clamp(6px, .8vw, 10px); text-transform: uppercase; letter-spacing: .14em; margin-bottom: 4%; }
    .slide h1, .slide h2, .slide h3 { margin: 0; font-weight: 700; letter-spacing: -.055em; line-height: .98; }
    .slide h1 { max-width: 72%; font-size: clamp(25px, 4.25vw, 58px); }
    .slide h2 { max-width: 74%; font-size: clamp(20px, 3vw, 42px); }
    .slide h3 { font-size: clamp(12px, 1.7vw, 23px); margin-top: 2.5%; }
    .slide p { max-width: 64%; color: var(--slide-muted); font-size: clamp(8px, 1.03vw, 15px); line-height: 1.6; margin: 3.2% 0 0; }
    .slide ul { list-style: none; padding: 0; margin: 6% 0 0; max-width: 80%; display: grid; gap: 4%; }
    .slide li { color: var(--slide-ink); font-size: clamp(9px, 1.17vw, 17px); line-height: 1.3; display: flex; align-items: flex-start; gap: 4%; }
    .slide li::before { content: ''; flex: 0 0 auto; width: .52em; height: .52em; margin-top: .38em; border-radius: 50%; background: var(--slide-accent); }
    .slide blockquote { margin: 7% 0 0; padding: 0 0 0 5%; max-width: 88%; border-left: 2px solid var(--slide-accent); font-size: clamp(14px, 2.35vw, 32px); line-height: 1.13; letter-spacing: -.04em; }
    .slide code { font-family: 'DM Mono', monospace; font-size: .84em; color: var(--slide-accent); }
    .slide a { color: var(--slide-accent); }
    .slide strong { font-weight: 800; }
    .slide em { font-family: Georgia, serif; }
    .slide .slide-footer { position: absolute; bottom: 6.5%; left: 9%; right: 9%; display: flex; justify-content: space-between; align-items: center; color: #a2a5a5; font-size: clamp(6px, .72vw, 10px); font-family: 'DM Mono', monospace; letter-spacing: .02em; }
    .slide .slide-footer .bar { width: 33%; height: 2px; background: rgba(24, 35, 53, .13); position: relative; }
    .slide .slide-footer .bar::after { content: ''; position: absolute; inset: 0 auto 0 0; width: 27%; background: var(--slide-accent); }
    .slide-cover { background: #16263d; color: #f4f0e7; }
    .slide-cover::before { content: ''; position: absolute; width: 44%; aspect-ratio: 1; right: -8%; bottom: -42%; border-radius: 50%; background: #cf713f; opacity: .98; box-shadow: -40px -20px 0 -16px rgba(244, 182, 95, .65); }
    .slide-cover::after { width: 34%; right: 12%; top: -12%; border-color: rgba(244, 182, 95, .28); }
    .slide-cover .slide-kicker { color: #f4b65f; }
    .slide-cover h1 { color: #f4f0e7; max-width: 76%; font-size: clamp(28px, 5.2vw, 72px); }
    .slide-cover p { color: #aebccc; max-width: 52%; }
    .slide-cover .slide-footer { color: #71849b; }
    .slide-cover .slide-footer .bar { background: rgba(255,255,255,.16); }
    .slide-cover .slide-footer .bar::after { width: 13%; }
    .slide-split { background: #e7e4db; }
    .slide-split::before { content: ''; position: absolute; width: 36%; top: 0; bottom: 0; right: 0; background: #d7ddd8; clip-path: polygon(28% 0, 100% 0, 100% 100%, 0 100%); }
    .slide-split::after { right: 10%; top: 23%; width: 22%; border-color: rgba(24, 35, 53, .13); }
    .slide-split h2 { max-width: 57%; }
    .slide-split p { max-width: 48%; }
    .slide-split ul { max-width: 52%; }
    .slide-signal { background: #f3f0e9; }
    .slide-signal::before { content: ''; position: absolute; right: 10%; top: 23%; width: 25%; aspect-ratio: 1; border-radius: 50%; background: #203653; box-shadow: 0 0 0 18px rgba(32, 54, 83, .07), 0 0 0 38px rgba(32, 54, 83, .045); }
    .slide-signal::after { right: 19%; top: 31%; width: 7%; height: 7%; aspect-ratio: auto; background: var(--accent); border: 0; }
    .slide-signal h2, .slide-signal p { max-width: 58%; }
    .slide-signal ul { max-width: 56%; }
    .slide-quote { background: #f0eee8; }
    .slide-quote::before { content: '“'; position: absolute; left: 8%; top: 12%; color: rgba(207, 113, 63, .22); font-family: Georgia, serif; font-size: clamp(100px, 15vw, 210px); line-height: .7; }
    .slide-quote blockquote { position: relative; max-width: 79%; }
    .slide-quote p { margin-left: 5%; font-size: clamp(7px, .9vw, 13px); }
    .slide-close { background: #1b2d46; color: #f2eee4; }
    .slide-close::before { content: ''; position: absolute; width: 58%; aspect-ratio: 1; right: -25%; top: -42%; background: #cf713f; border-radius: 50%; opacity: .9; }
    .slide-close::after { right: 7%; top: 8%; width: 41%; border-color: rgba(244, 182, 95, .35); }
    .slide-close h2 { color: #f2eee4; max-width: 70%; }
    .slide-close p { color: #afbdcb; max-width: 48%; }
    .slide-close .slide-footer { color: #8296ac; }
    .slide-close .slide-footer .bar { background: rgba(255,255,255,.13); }

    .thumb-strip { min-width: 0; display: grid; gap: 9px; align-content: center; }
    .thumb { position: relative; border: 1px solid var(--line); border-radius: 4px; overflow: hidden; aspect-ratio: 16 / 9; padding: 0; background: var(--slide-bg); cursor: pointer; opacity: .52; transition: opacity .18s ease, border-color .18s ease, transform .18s ease; }
    .thumb:hover { opacity: .82; transform: translateX(-2px); }
    .thumb.active { opacity: 1; border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft); }
    .thumb .mini-slide { display: block; position: absolute; inset: 0; pointer-events: none; }
    .thumb .mini-slide .slide { width: 400%; height: 400%; transform: scale(.25); transform-origin: top left; }
    .thumb-number { position: absolute; top: 4px; left: 5px; z-index: 2; color: rgba(255,255,255,.75); font: 8px 'DM Mono', monospace; text-shadow: 0 1px 2px rgba(0,0,0,.5); }
    .thumb:not(.active) .thumb-number { color: var(--muted); text-shadow: none; }
    .preview-footer { height: 50px; flex: 0 0 auto; padding: 0 16px; border-top: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; }
    .slide-meta { color: var(--muted); font-family: 'DM Mono', monospace; font-size: 10px; }
    .nav-buttons { display: flex; gap: 6px; }
    .nav-buttons .icon-button { width: 29px; height: 29px; }

    .toast { position: fixed; z-index: 20; bottom: 22px; left: 50%; transform: translate(-50%, 16px); padding: 10px 14px; border: 1px solid var(--line-strong); border-radius: 8px; background: #17253a; color: #eaf0f7; box-shadow: var(--shadow); font-size: 11px; opacity: 0; pointer-events: none; transition: opacity .22s ease, transform .22s ease; }
    .toast.show { opacity: 1; transform: translate(-50%, 0); }
    .empty-slide { color: var(--slide-muted); font-family: 'DM Mono', monospace; font-size: 12px; }

    .fullscreen .topbar, .fullscreen .sidebar, .fullscreen .workspace-head, .fullscreen .editor-panel { display: none; }
    .fullscreen .app-body, .fullscreen .workspace, .fullscreen .preview-panel { height: 100vh; }
    .fullscreen .workgrid { display: block; padding: 0; }
    .fullscreen .preview-panel { border: 0; border-radius: 0; background: #07101d; }
    .fullscreen .preview-top { padding: 18px 24px; }
    .fullscreen .stage-wrap { padding: 28px; }
    .fullscreen .stage-layout { max-width: 1200px; grid-template-columns: minmax(0, 1fr) 120px; }
    .fullscreen .preview-footer { display: none; }

    @media (max-width: 1060px) {
      .sidebar { width: 72px; flex-basis: 72px; padding-left: 10px; padding-right: 10px; }
      .sidebar-label, .nav-item span, .shortcut-box { display: none; }
      .nav-item { justify-content: center; padding: 11px 0; }
      .sidebar-footer { padding: 0; }
      .workgrid { grid-template-columns: minmax(230px, 36%) minmax(430px, 1fr); padding-left: 18px; padding-right: 18px; }
      .workspace-head { padding-left: 18px; padding-right: 18px; }
    }
    @media (max-width: 780px) {
      .topbar { padding: 0 16px; }
      .status { display: none; }
      .brand-sub, .brand-arrow { display: none; }
      .sidebar { display: none; }
      .workspace-head { height: 62px; }
      .workgrid { display: flex; flex-direction: column; padding: 14px; gap: 14px; }
      .editor-panel { min-height: 330px; flex: 0 0 330px; }
      .preview-panel { min-height: 480px; flex: 1; }
      .stage-layout { grid-template-columns: minmax(0, 1fr) 72px; gap: 9px; }
      .stage-wrap { padding: 16px 11px 13px; }
      .preview-top { min-height: 54px; padding: 11px 12px; }
      .preview-footer { padding: 0 12px; }
      .view-switcher { display: none; }
    }
    @media (max-width: 500px) {
      .topbar { height: 58px; }
      .topbar-actions .ghost-button { display: none; }
      .workspace-title h1 { font-size: 15px; }
      .workspace-title span { display: none; }
      .workgrid { padding: 10px; }
      .editor-panel { flex-basis: 300px; min-height: 300px; }
      .preview-panel { min-height: 380px; }
      .stage-layout { grid-template-columns: 1fr; }
      .thumb-strip { grid-row: 2; grid-template-columns: repeat(5, 1fr); gap: 5px; }
      .thumb { width: 100%; }
      .stage-wrap { padding: 15px 10px 10px; }
      .ratio { display: none; }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <header class="topbar">
      <a class="brand" href="#" aria-label="Markdown to Slides home">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>Markdown</span><span class="brand-arrow">→</span><span class="brand-sub">Slides</span>
      </a>
      <div class="topbar-actions">
        <div class="status"><span class="status-dot"></span><span id="saveStatus">Draft synced</span></div>
        <button class="ghost-button" id="themeToggle" type="button" aria-label="Toggle theme">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20.4 15.2A8.1 8.1 0 0 1 8.8 3.6 8.1 8.1 0 1 0 20.4 15.2Z"/></svg>
          <span id="themeLabel">Light mode</span>
        </button>
        <button class="primary-button" id="presentButton" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3.5 5.5h17v13h-17z"/><path d="m8 10 3 2-3 2M13 14h3"/></svg>
          Present
        </button>
      </div>
    </header>

    <div class="app-body">
      <aside class="sidebar" aria-label="Main navigation">
        <div>
          <div class="sidebar-label">Workspace</div>
          <nav class="nav-list">
            <button class="nav-item active" type="button"><svg viewBox="0 0 24 24"><rect x="3.5" y="4" width="17" height="16" rx="2"/><path d="M7 8h10M7 12h6M7 16h8"/></svg><span>Editor</span></button>
            <button class="nav-item" type="button" id="sampleNav"><svg viewBox="0 0 24 24"><path d="M5 4.5h14v15H5z"/><path d="M8.5 8h7M8.5 11.5h7M8.5 15h4"/></svg><span>Sample deck</span></button>
            <button class="nav-item" type="button" id="shortcutsNav"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8.5"/><path d="M12 8v4l2.5 2.5"/></svg><span>Shortcuts</span></button>
          </nav>
        </div>
        <div class="sidebar-footer">
          <div class="shortcut-box">
            <div class="shortcut-row"><span>Next slide</span><kbd>→</kbd></div>
            <div class="shortcut-row"><span>Previous</span><kbd>←</kbd></div>
            <div class="shortcut-row"><span>Present</span><kbd>⌘ ↵</kbd></div>
          </div>
        </div>
      </aside>

      <main class="workspace">
        <div class="workspace-head">
          <div class="workspace-title"><h1>Deck workspace</h1><span>Untitled presentation</span></div>
          <div class="view-switcher" aria-label="View mode">
            <button type="button" class="active">Split view</button><button type="button" id="previewOnlyButton">Preview</button>
          </div>
        </div>

        <div class="workgrid" id="workgrid">
          <section class="panel editor-panel" aria-label="Markdown editor">
            <div class="panel-top">
              <div class="panel-heading">
                <div class="code-mark">#</div>
                <div><strong>Source markdown</strong><small>Use <code>---</code> to create a new slide</small></div>
              </div>
              <button class="ghost-button" id="loadSample" type="button">Load sample</button>
            </div>
            <textarea id="markdownInput" class="text-editor" spellcheck="false" aria-label="Markdown source"></textarea>
            <div class="editor-footer"><span><span class="mono" id="charCount">0</span> characters</span><span>Markdown supported</span></div>
            <div class="slide-map">
              <div class="slide-map-head"><span>Slide map</span><span class="slide-count" id="slideCount">0 slides</span></div>
              <div class="map-list" id="mapList"></div>
            </div>
          </section>

          <section class="panel preview-panel" aria-label="Live slide preview">
            <div class="preview-top">
              <div class="preview-label"><span class="pulse"></span><strong>Live preview</strong><small id="previewTitle">Title slide</small></div>
              <div class="preview-tools"><span class="ratio">16 : 9</span><button class="icon-button" id="fullscreenButton" type="button" aria-label="Open full screen"><svg viewBox="0 0 24 24"><path d="M8 4H4v4M16 4h4v4M20 16v4h-4M4 16v4h4"/></svg></button></div>
            </div>
            <div class="stage-wrap">
              <div class="stage-layout">
                <div class="stage-shell"><div class="stage" id="stage" aria-live="polite"></div></div>
                <div class="thumb-strip" id="thumbStrip" aria-label="Slide thumbnails"></div>
              </div>
            </div>
            <div class="preview-footer"><span class="slide-meta" id="slideMeta">01 / 05</span><div class="nav-buttons"><button class="icon-button" id="prevButton" type="button" aria-label="Previous slide"><svg viewBox="0 0 24 24"><path d="m14.5 6-6 6 6 6"/></svg></button><button class="icon-button" id="nextButton" type="button" aria-label="Next slide"><svg viewBox="0 0 24 24"><path d="m9.5 6 6 6-6 6"/></svg></button></div></div>
          </section>
        </div>
      </main>
    </div>
    <div class="toast" id="toast" role="status"></div>
  </div>

  <script>
    (() => {
      const sampleMarkdown = `# The work between\nA field guide to building momentum when the answer is not obvious.\n\n**Northstar / 2024**\n---\n## The signal is changing\nThe most useful work rarely arrives as a clean brief. It begins as a pattern: a customer pause, a team workaround, a metric that moves before the story catches up.\n\n- Start with the tension, not the feature\n- Make the invisible cost visible\n- Turn a point of view into a practice\n---\n## Three moves that create clarity\n\n- **Name the friction** — give the stuck moment a shared language.\n- **Run the smallest test** — learn in days, not planning cycles.\n- **Make the signal legible** — show the team what changed and why.\n\n> Momentum is not speed. It is the confidence to take the next true step.\n---\n## A better operating rhythm\n\n**Observe**  →  Find the pattern before you prescribe the answer.\n\n**Focus**  →  Choose the smallest decision that unlocks learning.\n\n**Share**  →  Give the insight a shape others can carry forward.\n---\n## Make room for the next true step\nThe work between the question and the answer is where the advantage compounds.\n\n**Build the habit. Keep the signal.**`;

      const input = document.getElementById('markdownInput');
      const stage = document.getElementById('stage');
      const thumbStrip = document.getElementById('thumbStrip');
      const mapList = document.getElementById('mapList');
      const app = document.getElementById('app');
      const charCount = document.getElementById('charCount');
      const slideCount = document.getElementById('slideCount');
      const slideMeta = document.getElementById('slideMeta');
      const previewTitle = document.getElementById('previewTitle');
      const toast = document.getElementById('toast');
      const saveStatus = document.getElementById('saveStatus');
      let slides = [];
      let activeIndex = 0;
      let toastTimer;

      const escapeHtml = (value) => value.replace(/[&<>'"]/g, (char) => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', "'":'&#39;', '"':'&quot;' })[char]);
      const inline = (value) => {
        let text = escapeHtml(value);
        text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
        text = text.replace(/!\[([^\]]+)\]\(([^)]+)\)/g, '<span>$1</span>');
        text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noreferrer">$1</a>');
        text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
        text = text.replace(/__([^_]+)__/g, '<strong>$1</strong>');
        text = text.replace(/\*([^*]+)\*/g, '<em>$1</em>');
        text = text.replace(/_([^_]+)_/g, '<em>$1</em>');
        return text;
      };

      function renderMarkdown(markdown, index, mini = false) {
        const lines = markdown.trim().split(/\r?\n/);
        let html = '';
        let paragraph = [];
        let inList = false;
        const flushParagraph = () => {
          if (!paragraph.length) return;
          html += `<p>${inline(paragraph.join(' '))}</p>`;
          paragraph = [];
        };
        const closeList = () => { if (inList) { html += '</ul>'; inList = false; } };
        lines.forEach((line) => {
          const trimmed = line.trim();
          if (!trimmed) { flushParagraph(); closeList(); return; }
          const heading = trimmed.match(/^(#{1,3})\s+(.+)$/);
          if (heading) {
            flushParagraph(); closeList();
            const level = heading[1].length;
            if (level === 1) html += `<h1>${inline(heading[2])}</h1>`;
            else if (level === 2) html += `<h2>${inline(heading[2])}</h2>`;
            else html += `<h3>${inline(heading[2])}</h3>`;
            return;
          }
          const bullet = trimmed.match(/^[-*+]\s+(.+)$/);
          if (bullet) {
            flushParagraph();
            if (!inList) { html += '<ul>'; inList = true; }
            html += `<li>${inline(bullet[1])}</li>`;
            return;
          }
          if (trimmed.startsWith('>')) {
            flushParagraph(); closeList();
            html += `<blockquote>${inline(trimmed.replace(/^>\s?/, ''))}</blockquote>`;
            return;
          }
          paragraph.push(trimmed);
        });
        flushParagraph(); closeList();
        if (!html) html = '<div class="empty-slide">Start writing to create this slide…</div>';
        const variant = ['slide-cover', 'slide-split', 'slide-signal', 'slide-quote', 'slide-close'][index] || 'slide-split';
        const titleMatch = markdown.match(/^#{1,3}\s+(.+)$/m);
        const title = titleMatch ? titleMatch[1].replace(/[*_`]/g, '') : `Slide ${index + 1}`;
        const footer = `<div class="slide-footer"><span>MARKDOWN → SLIDES</span><span class="bar"></span><span>${String(index + 1).padStart(2, '0')}</span></div>`;
        const kicker = index === 0 ? '' : `<div class="slide-kicker">${String(index + 1).padStart(2, '0')} / FIELD NOTES</div>`;
        return { html: `<article class="slide ${variant}">${kicker}${html}${footer}</article>`, title };
      }

      function getSlideSources() {
        const raw = input.value.replace(/\r\n/g, '\n').trim();
        if (!raw) return [''];
        return raw.split(/\n\s*---\s*\n/g).map((part) => part.trim());
      }

      function render() {
        const sources = getSlideSources();
        slides = sources.map((source, index) => renderMarkdown(source, index));
        if (activeIndex >= slides.length) activeIndex = slides.length - 1;
        charCount.textContent = input.value.length.toLocaleString();
        slideCount.textContent = `${slides.length} ${slides.length === 1 ? 'slide' : 'slides'}`;
        stage.innerHTML = slides[activeIndex].html;
        previewTitle.textContent = slides[activeIndex].title;
        slideMeta.textContent = `${String(activeIndex + 1).padStart(2, '0')} / ${String(slides.length).padStart(2, '0')}`;
        mapList.innerHTML = slides.map((_, index) => `<button type="button" class="map-item ${index === activeIndex ? 'active' : ''}" data-index="${index}" aria-label="Go to slide ${index + 1}">${String(index + 1).padStart(2, '0')}</button>`).join('');
        thumbStrip.innerHTML = slides.map((slide, index) => `<button type="button" class="thumb ${index === activeIndex ? 'active' : ''}" data-index="${index}" aria-label="Preview slide ${index + 1}"><span class="thumb-number">${String(index + 1).padStart(2, '0')}</span><span class="mini-slide">${slide.html}</span></button>`).join('');
        document.querySelectorAll('.map-item, .thumb').forEach((button) => button.addEventListener('click', () => setActive(Number(button.dataset.index))));
        saveStatus.textContent = 'Draft synced';
      }

      function setActive(index) {
        if (!slides.length) return;
        activeIndex = Math.max(0, Math.min(index, slides.length - 1));
        stage.classList.remove('is-changing');
        void stage.offsetWidth;
        stage.classList.add('is-changing');
        stage.innerHTML = slides[activeIndex].html;
        previewTitle.textContent = slides[activeIndex].title;
        slideMeta.textContent = `${String(activeIndex + 1).padStart(2, '0')} / ${String(slides.length).padStart(2, '0')}`;
        document.querySelectorAll('.map-item, .thumb').forEach((button) => button.classList.toggle('active', Number(button.dataset.index) === activeIndex));
      }

      function move(direction) { setActive(activeIndex + direction); }
      function showToast(message) {
        toast.textContent = message;
        toast.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
      }

      input.value = sampleMarkdown;
      input.addEventListener('input', () => {
        saveStatus.textContent = 'Saving…';
        clearTimeout(input.saveTimer);
        input.saveTimer = setTimeout(render, 180);
      });
      document.getElementById('prevButton').addEventListener('click', () => move(-1));
      document.getElementById('nextButton').addEventListener('click', () => move(1));
      document.getElementById('loadSample').addEventListener('click', () => {
        input.value = sampleMarkdown;
        activeIndex = 0;
        render();
        showToast('Sample deck loaded');
      });
      document.getElementById('sampleNav').addEventListener('click', () => document.getElementById('loadSample').click());
      document.getElementById('shortcutsNav').addEventListener('click', () => showToast('Use ← → to navigate · ⌘ ↵ to present'));
      document.getElementById('themeToggle').addEventListener('click', () => {
        app.classList.toggle('is-light');
        const light = app.classList.contains('is-light');
        document.getElementById('themeLabel').textContent = light ? 'Dark mode' : 'Light mode';
      });
      document.getElementById('presentButton').addEventListener('click', () => {
        if (document.fullscreenElement) document.exitFullscreen();
        else document.documentElement.requestFullscreen?.();
        app.classList.add('fullscreen');
      });
      document.getElementById('fullscreenButton').addEventListener('click', () => {
        const preview = document.querySelector('.preview-panel');
        if (!document.fullscreenElement) preview.requestFullscreen?.();
        else document.exitFullscreen?.();
      });
      document.addEventListener('fullscreenchange', () => {
        app.classList.toggle('fullscreen', Boolean(document.fullscreenElement));
      });
      document.addEventListener('keydown', (event) => {
        const editing = document.activeElement === input;
        if ((event.metaKey || event.ctrlKey) && event.key === 'Enter') {
          event.preventDefault();
          document.getElementById('presentButton').click();
          return;
        }
        if (editing) return;
        if (event.key === 'ArrowRight' || event.key === 'PageDown') { event.preventDefault(); move(1); }
        if (event.key === 'ArrowLeft' || event.key === 'PageUp') { event.preventDefault(); move(-1); }
        if (event.key === 'Home') { event.preventDefault(); setActive(0); }
        if (event.key === 'End') { event.preventDefault(); setActive(slides.length - 1); }
        if (event.key === 'Escape' && document.fullscreenElement) document.exitFullscreen();
      });
      document.querySelectorAll('.view-switcher button').forEach((button) => button.addEventListener('click', () => {
        document.querySelectorAll('.view-switcher button').forEach((item) => item.classList.remove('active'));
        button.classList.add('active');
        const previewOnly = button.id === 'previewOnlyButton';
        document.querySelector('.editor-panel').style.display = previewOnly ? 'none' : '';
        document.querySelector('.workgrid').style.gridTemplateColumns = previewOnly ? '1fr' : '';
      }));
      render();
    })();
  </script>
</body>
</html>
