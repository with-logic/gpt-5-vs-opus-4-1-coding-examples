<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Markdown → Slides</title>
  <meta name="description" content="Turn markdown into a presentation deck." />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap');

    :root {
      --canvas: #e9eceb;
      --chrome: #f7f8f7;
      --panel: #ffffff;
      --panel-soft: #f0f2f1;
      --ink: #18201f;
      --ink-soft: #61706d;
      --ink-faint: #93a09d;
      --line: #dce2e0;
      --line-strong: #cbd4d1;
      --blue: #205cff;
      --blue-soft: #e9efff;
      --blue-deep: #0d35ad;
      --coral: #ec6b52;
      --shadow: 0 18px 60px rgba(22, 35, 33, .10);
      --stage: #d7deda;
      --slide-bg: #fbfbf8;
      --slide-ink: #18201f;
      --slide-muted: #71807c;
      --slide-rule: #d8dfda;
      --slide-accent: #205cff;
      --radius: 14px;
      color-scheme: light;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--canvas);
      color: var(--ink);
      font-family: 'DM Sans', ui-sans-serif, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }
    button, textarea { font: inherit; }
    button { cursor: pointer; }
    button:focus-visible, textarea:focus-visible { outline: 3px solid rgba(32, 92, 255, .28); outline-offset: 2px; }

    .app-shell { height: 100%; display: flex; flex-direction: column; }
    .topbar {
      height: 72px; flex: 0 0 72px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 22px; border-bottom: 1px solid var(--line); background: var(--chrome); z-index: 10;
    }
    .brand { display: flex; align-items: center; gap: 11px; min-width: 200px; }
    .brand-mark { width: 30px; height: 30px; border-radius: 9px; background: var(--ink); color: #fff; display: grid; place-items: center; font: 500 15px 'DM Mono', monospace; letter-spacing: -2px; }
    .brand-name { font-weight: 700; letter-spacing: -.04em; font-size: 15px; }
    .brand-name span { color: var(--ink-faint); font-weight: 500; }
    .topbar-center { display: flex; align-items: center; gap: 12px; color: var(--ink-soft); font-size: 12px; }
    .save-state { display: inline-flex; align-items: center; gap: 7px; }
    .save-dot { width: 6px; height: 6px; border-radius: 50%; background: #36a878; }
    .save-dot.unsaved { background: var(--coral); }
    .top-actions { display: flex; align-items: center; justify-content: flex-end; gap: 8px; min-width: 200px; }
    .icon-button, .text-button, .primary-button {
      border: 1px solid var(--line); background: var(--panel); color: var(--ink); border-radius: 9px; height: 36px;
      display: inline-flex; align-items: center; justify-content: center; gap: 8px; transition: border-color .18s, background .18s, transform .18s, color .18s;
    }
    .icon-button { width: 36px; }
    .text-button { padding: 0 12px; font-size: 12px; font-weight: 600; }
    .primary-button { padding: 0 14px; background: var(--blue); border-color: var(--blue); color: white; font-size: 12px; font-weight: 700; box-shadow: 0 5px 14px rgba(32, 92, 255, .16); }
    .icon-button:hover, .text-button:hover { border-color: var(--line-strong); background: var(--panel-soft); }
    .primary-button:hover { background: var(--blue-deep); border-color: var(--blue-deep); transform: translateY(-1px); }
    .button-icon { width: 15px; height: 15px; display: block; }
    .main-grid { flex: 1; min-height: 0; display: grid; grid-template-columns: 310px minmax(460px, 1fr) 238px; }

    .editor-panel, .outline-panel { background: var(--chrome); min-width: 0; }
    .editor-panel { border-right: 1px solid var(--line); display: flex; flex-direction: column; }
    .outline-panel { border-left: 1px solid var(--line); display: flex; flex-direction: column; }
    .panel-heading { padding: 18px 18px 14px; display: flex; align-items: center; justify-content: space-between; }
    .eyebrow { margin: 0 0 5px; color: var(--ink-faint); font: 500 10px 'DM Mono', monospace; letter-spacing: .12em; text-transform: uppercase; }
    .panel-title { font-size: 14px; letter-spacing: -.02em; font-weight: 700; margin: 0; }
    .count-chip { display: inline-grid; place-items: center; height: 22px; min-width: 26px; padding: 0 7px; border-radius: 5px; background: var(--panel-soft); color: var(--ink-soft); font: 500 10px 'DM Mono', monospace; }
    .editor-meta { display: flex; align-items: center; justify-content: space-between; padding: 0 18px 12px; color: var(--ink-faint); font: 10px 'DM Mono', monospace; }
    .editor-wrap { flex: 1; min-height: 0; position: relative; margin: 0 12px 12px; border: 1px solid var(--line); border-radius: 10px; overflow: hidden; background: #fbfcfb; }
    textarea { width: 100%; height: 100%; border: 0; resize: none; padding: 18px 16px; background: transparent; color: #273431; font: 12px/1.85 'DM Mono', monospace; letter-spacing: -.025em; tab-size: 2; }
    textarea::selection { background: #cfdbff; }
    .editor-footer { padding: 12px 14px 14px; border-top: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .hint { color: var(--ink-faint); font-size: 10px; line-height: 1.4; }
    .kbd { display: inline-block; border: 1px solid var(--line-strong); background: var(--panel); border-radius: 4px; padding: 1px 4px; font: 9px 'DM Mono', monospace; color: var(--ink-soft); }

    .stage-panel { min-width: 0; display: flex; flex-direction: column; background: var(--stage); position: relative; }
    .stage-toolbar { height: 55px; flex: 0 0 55px; display: flex; align-items: center; justify-content: space-between; padding: 0 18px; border-bottom: 1px solid rgba(116, 131, 125, .18); }
    .stage-label { display: flex; align-items: center; gap: 9px; color: #56645f; font-size: 12px; font-weight: 600; }
    .stage-label .live { height: 7px; width: 7px; border-radius: 50%; background: var(--blue); box-shadow: 0 0 0 4px rgba(32,92,255,.11); }
    .stage-tools { display: flex; align-items: center; gap: 7px; }
    .stage-tool { border: 0; background: transparent; color: #687671; width: 31px; height: 31px; border-radius: 7px; display: grid; place-items: center; }
    .stage-tool:hover { color: var(--ink); background: rgba(255,255,255,.42); }
    .stage-content { flex: 1; min-height: 0; display: flex; align-items: center; justify-content: center; padding: 36px 42px; position: relative; }
    .slide-frame { width: min(100%, 880px); aspect-ratio: 16 / 9; position: relative; box-shadow: var(--shadow); transition: transform .26s ease, opacity .22s ease; }
    .slide-frame.swap { animation: slideSwap .28s ease both; }
    @keyframes slideSwap { 0% { opacity: .45; transform: scale(.985) translateY(5px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
    .slide { width: 100%; height: 100%; padding: clamp(32px, 5.3vw, 74px); background: var(--slide-bg); color: var(--slide-ink); overflow: hidden; position: relative; }
    .slide::before { content: ''; position: absolute; top: 0; left: 0; width: 37%; height: 5px; background: var(--slide-accent); }
    .slide.kickered { padding-top: clamp(29px, 4.4vw, 62px); }
    .slide-grid { display: grid; grid-template-columns: 1.35fr .65fr; gap: 7%; height: 100%; align-items: center; }
    .slide-number { position: absolute; right: clamp(22px, 3.2vw, 45px); bottom: clamp(17px, 2.8vw, 38px); color: var(--slide-muted); font: 10px 'DM Mono', monospace; }
    .slide-kicker { color: var(--slide-accent); font: 500 clamp(9px, 1vw, 12px) 'DM Mono', monospace; letter-spacing: .11em; text-transform: uppercase; margin-bottom: 19px; }
    .slide h1, .slide h2 { font: 600 clamp(27px, 4vw, 59px)/.98 'Fraunces', Georgia, serif; letter-spacing: -.055em; max-width: 740px; margin: 0; }
    .slide h2 { font-size: clamp(24px, 3.3vw, 47px); }
    .slide .lede { margin: 21px 0 0; color: var(--slide-muted); font: 400 clamp(13px, 1.28vw, 18px)/1.45 'DM Sans', sans-serif; max-width: 550px; }
    .slide .byline { margin-top: 29px; padding-top: 13px; border-top: 1px solid var(--slide-rule); color: var(--slide-muted); font: 11px 'DM Mono', monospace; max-width: 400px; }
    .slide ul { margin: 25px 0 0; padding: 0; list-style: none; display: grid; gap: 13px; max-width: 610px; }
    .slide li { display: grid; grid-template-columns: 14px 1fr; gap: 11px; font-size: clamp(12px, 1.17vw, 17px); line-height: 1.35; }
    .slide li::before { content: ''; width: 6px; height: 6px; margin-top: .48em; border-radius: 50%; background: var(--slide-accent); }
    .slide li strong { font-weight: 700; }
    .slide blockquote { margin: 28px 0 0; padding-left: 17px; border-left: 3px solid var(--slide-accent); color: var(--slide-muted); font: italic 400 clamp(15px, 1.5vw, 22px)/1.3 'Fraunces', serif; max-width: 580px; }
    .slide blockquote cite { display: block; margin-top: 13px; font: 10px 'DM Mono', monospace; font-style: normal; color: var(--slide-accent); }
    .slide .visual-mark { width: min(21vw, 240px); aspect-ratio: 1; border-radius: 50%; border: 1px solid var(--slide-rule); position: relative; display: grid; place-items: center; }
    .visual-mark::before, .visual-mark::after { content: ''; position: absolute; border: 1px solid var(--slide-accent); border-radius: 50%; inset: 17%; opacity: .48; }
    .visual-mark::after { inset: 34%; opacity: .9; background: var(--slide-accent); border-color: var(--slide-accent); box-shadow: 0 0 0 11px var(--slide-bg), 0 0 0 12px var(--slide-accent); }
    .slide .side-note { border-top: 1px solid var(--slide-rule); padding-top: 15px; color: var(--slide-muted); font: 10px/1.55 'DM Mono', monospace; align-self: end; max-width: 180px; }
    .slide .rule { height: 1px; background: var(--slide-rule); width: 100%; margin: 26px 0; }
    .slide pre { margin-top: 22px; padding: 15px 17px; background: #eff2ef; border-radius: 7px; color: var(--slide-ink); font: 11px/1.6 'DM Mono', monospace; overflow: hidden; }
    .slide a { color: var(--slide-accent); text-decoration: underline; text-underline-offset: 3px; }
    .stage-controls { height: 62px; flex: 0 0 62px; padding: 0 20px; display: flex; align-items: center; justify-content: center; gap: 15px; }
    .nav-button { border: 1px solid rgba(93, 109, 103, .25); background: rgba(255,255,255,.40); color: #35443f; height: 32px; width: 34px; border-radius: 7px; display: grid; place-items: center; transition: .18s; }
    .nav-button:hover:not(:disabled) { background: #fff; transform: translateY(-1px); }
    .nav-button:disabled { opacity: .35; cursor: default; }
    .slide-progress { display: flex; align-items: baseline; gap: 6px; color: #4f5e59; font: 500 12px 'DM Mono', monospace; min-width: 65px; justify-content: center; }
    .slide-progress strong { color: var(--ink); font-size: 15px; }

    .outline-panel .panel-heading { border-bottom: 1px solid var(--line); }
    .outline-list { list-style: none; margin: 0; padding: 11px 10px; overflow: auto; }
    .outline-item { display: grid; grid-template-columns: 29px 1fr; align-items: center; gap: 7px; min-height: 51px; padding: 8px; border-radius: 9px; color: var(--ink-soft); cursor: pointer; transition: background .18s, color .18s; }
    .outline-item:hover { background: var(--panel-soft); color: var(--ink); }
    .outline-item.active { background: var(--blue-soft); color: var(--blue-deep); }
    .outline-index { font: 10px 'DM Mono', monospace; color: var(--ink-faint); text-align: center; }
    .outline-item.active .outline-index { color: var(--blue); }
    .outline-title { font-size: 12px; line-height: 1.25; font-weight: 600; letter-spacing: -.02em; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .outline-type { display: block; margin-top: 3px; font: 9px 'DM Mono', monospace; color: var(--ink-faint); text-transform: uppercase; letter-spacing: .05em; }
    .outline-bottom { margin-top: auto; border-top: 1px solid var(--line); padding: 15px; }
    .shortcuts-title { margin: 0 0 11px; color: var(--ink-faint); font: 10px 'DM Mono', monospace; text-transform: uppercase; letter-spacing: .09em; }
    .shortcut { display: flex; justify-content: space-between; color: var(--ink-soft); font-size: 10px; margin-top: 7px; }
    .shortcut .keys { display: flex; gap: 3px; }
    .shortcut .kbd { min-width: 19px; text-align: center; }

    .toast { position: fixed; z-index: 30; bottom: 24px; left: 50%; transform: translate(-50%, 15px); padding: 10px 14px; border-radius: 8px; background: var(--ink); color: #fff; box-shadow: 0 10px 30px rgba(0,0,0,.2); font-size: 12px; opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s; }
    .toast.show { opacity: 1; transform: translate(-50%, 0); }
    .fullscreen-shell { position: fixed; inset: 0; z-index: 50; background: #111716; display: none; align-items: center; justify-content: center; padding: 7vh 8vw; }
    .fullscreen-shell.open { display: flex; animation: reveal .25s ease both; }
    @keyframes reveal { from { opacity: 0; } to { opacity: 1; } }
    .fullscreen-shell .slide-frame { width: min(100%, 1280px); box-shadow: 0 30px 90px rgba(0,0,0,.5); }
    .close-fullscreen { position: fixed; top: 22px; right: 25px; border: 1px solid rgba(255,255,255,.18); color: rgba(255,255,255,.7); background: rgba(255,255,255,.08); border-radius: 8px; width: 36px; height: 36px; display: grid; place-items: center; }
    .fs-help { position: fixed; bottom: 21px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,.42); font: 10px 'DM Mono', monospace; }

    body.night { --canvas: #111716; --chrome: #19201f; --panel: #202826; --panel-soft: #26302d; --ink: #f0f4f1; --ink-soft: #aab8b3; --ink-faint: #73827d; --line: #303b37; --line-strong: #46534e; --blue-soft: #1b2e69; --stage: #202a27; --shadow: 0 18px 60px rgba(0,0,0,.26); color-scheme: dark; }
    body.night .editor-wrap { background: #141a18; }
    body.night textarea { color: #d6e0dc; }
    body.night .slide { --slide-bg: #f8f9f5; --slide-ink: #18201f; --slide-muted: #71807c; --slide-rule: #d8dfda; }
    body.night .stage-tool:hover, body.night .nav-button:hover:not(:disabled) { background: rgba(255,255,255,.1); }

    @media (max-width: 1050px) {
      .main-grid { grid-template-columns: 270px minmax(400px, 1fr) 200px; }
      .topbar-center { display: none; }
    }
    @media (max-width: 780px) {
      body { overflow: auto; }
      .topbar { height: 62px; flex-basis: 62px; padding: 0 13px; }
      .brand { min-width: auto; }
      .brand-name { font-size: 14px; }
      .top-actions { min-width: auto; }
      .top-actions .text-button { display: none; }
      .main-grid { display: flex; flex-direction: column; height: auto; }
      .stage-panel { order: 1; min-height: 53vh; }
      .editor-panel { order: 2; min-height: 370px; border-right: 0; border-top: 1px solid var(--line); }
      .outline-panel { order: 3; border-left: 0; border-top: 1px solid var(--line); min-height: 220px; }
      .stage-content { padding: 23px 15px; }
      .stage-toolbar { padding: 0 13px; }
      .stage-controls { height: 52px; flex-basis: 52px; }
      .slide-frame { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand" aria-label="Markdown Slides home">
        <div class="brand-mark">→</div>
        <div class="brand-name">Markdown <span>→</span> Slides</div>
      </div>
      <div class="topbar-center">
        <span class="save-state"><span class="save-dot" id="saveDot"></span><span id="saveText">Saved locally</span></span>
        <span>·</span><span id="wordCount">0 words</span>
      </div>
      <div class="top-actions">
        <button class="text-button" id="sampleButton" type="button">Load sample</button>
        <button class="icon-button" id="themeButton" type="button" aria-label="Toggle appearance" title="Toggle appearance">
          <svg class="button-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20.7 15.1A8.7 8.7 0 0 1 8.9 3.3 8.7 8.7 0 1 0 20.7 15.1Z"/></svg>
        </button>
        <button class="primary-button" id="presentButton" type="button"><svg class="button-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m8 5 11 7-11 7V5Z"/></svg>Present</button>
      </div>
    </header>

    <main class="main-grid">
      <section class="editor-panel" aria-label="Markdown editor">
        <div class="panel-heading"><div><p class="eyebrow">Source</p><h2 class="panel-title">Markdown</h2></div><span class="count-chip" id="slideCount">04</span></div>
        <div class="editor-meta"><span>deck.md</span><span id="charCount">0 chars</span></div>
        <div class="editor-wrap"><textarea id="markdownInput" spellcheck="false" aria-label="Markdown source"></textarea></div>
        <div class="editor-footer"><span class="hint">Separate slides with <span class="kbd">---</span></span><span class="hint">Live preview</span></div>
      </section>

      <section class="stage-panel" aria-label="Slide preview">
        <div class="stage-toolbar"><div class="stage-label"><span class="live"></span><span>Live preview</span></div><div class="stage-tools"><button class="stage-tool" id="zoomOut" aria-label="Zoom out" title="Zoom out">−</button><span id="zoomValue" style="font:10px 'DM Mono';color:#687671;min-width:33px;text-align:center">100%</span><button class="stage-tool" id="zoomIn" aria-label="Zoom in" title="Zoom in">+</button><button class="stage-tool" id="fullscreenButton" aria-label="Open full screen" title="Open full screen"><svg class="button-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M8 3H3v5M16 3h5v5M21 16v5h-5M3 16v5h5"/></svg></button></div></div>
        <div class="stage-content"><div class="slide-frame" id="slideFrame"><article class="slide" id="slidePreview"></article></div></div>
        <div class="stage-controls"><button class="nav-button" id="prevButton" aria-label="Previous slide"><svg class="button-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg></button><div class="slide-progress"><strong id="currentSlide">01</strong><span>/</span><span id="totalSlides">04</span></div><button class="nav-button" id="nextButton" aria-label="Next slide"><svg class="button-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg></button></div>
      </section>

      <aside class="outline-panel" aria-label="Slide outline"><div class="panel-heading"><div><p class="eyebrow">Navigation</p><h2 class="panel-title">Outline</h2></div><span class="count-chip">⌘ K</span></div><ol class="outline-list" id="outlineList"></ol><div class="outline-bottom"><p class="shortcuts-title">Shortcuts</p><div class="shortcut"><span>Next slide</span><span class="keys"><span class="kbd">→</span><span class="kbd">↓</span></span></div><div class="shortcut"><span>Previous slide</span><span class="keys"><span class="kbd">←</span><span class="kbd">↑</span></span></div><div class="shortcut"><span>Present</span><span class="keys"><span class="kbd">P</span></span></div></div></aside>
    </main>
  </div>

  <div class="toast" id="toast" role="status"></div>
  <div class="fullscreen-shell" id="fullscreenShell" role="dialog" aria-label="Presentation mode" aria-modal="true"><button class="close-fullscreen" id="closeFullscreen" aria-label="Close presentation mode"><svg class="button-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="m7 7 10 10M17 7 7 17"/></svg></button><div class="slide-frame"><article class="slide" id="fullscreenSlide"></article></div><div class="fs-help">ESC to exit · Arrow keys to navigate</div></div>

  <script>
    const sampleMarkdown = `# The next chapter is already in motion

The operating system for thoughtful teams — one clear workspace for the work that matters.

*Northstar / Q3 2025*

---

## A quieter way to move faster

- **One source of truth** — decisions, context, and momentum in the same place
- **Less status theatre** — replace recurring updates with visible progress
- **More room to think** — give the important work a surface of its own

> “The best systems make the right thing feel obvious.”
> — Product principle 01

---

## From fragments to forward motion

We turn scattered inputs into a shared rhythm: align on the signal, make the call, and keep the whole team in the loop.

    listen → clarify → decide → compound

---

## Make progress legible

The work gets lighter when everyone can see what is moving, what is blocked, and what changed.

*Build less ceremony. Create more signal.*`;

    const input = document.getElementById('markdownInput');
    const slidePreview = document.getElementById('slidePreview');
    const fullscreenSlide = document.getElementById('fullscreenSlide');
    const slideFrame = document.getElementById('slideFrame');
    const fullscreenShell = document.getElementById('fullscreenShell');
    const outlineList = document.getElementById('outlineList');
    const toast = document.getElementById('toast');
    let slides = [];
    let current = 0;
    let zoom = 100;
    let toastTimer;

    const escapeHtml = (value) => value.replace(/[&<>'"]/g, (char) => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[char]));
    const inline = (value) => escapeHtml(value)
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/`(.+?)`/g, '<code>$1</code>')
      .replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2">$1</a>');

    function parseSlides(markdown) {
      return markdown.split(/^\s*---\s*$/m).map((raw, index) => {
        const lines = raw.trim().split('\n');
        const titleLine = lines.find(line => /^#{1,2}\s+/.test(line));
        const title = titleLine ? titleLine.replace(/^#{1,2}\s+/, '').trim() : `Slide ${String(index + 1).padStart(2,'0')}`;
        return { raw, lines, title, index };
      }).filter(slide => slide.raw.trim().length > 0);
    }

    function renderSlide(slide) {
      const lines = slide.lines;
      let html = '';
      let i = 0;
      let hasTitle = false;
      let hasKicker = false;
      while (i < lines.length) {
        const line = lines[i];
        if (!line.trim()) { i++; continue; }
        if (/^#{1,2}\s+/.test(line)) {
          const level = line.startsWith('##') ? 2 : 1;
          html += `<h${level}>${inline(line.replace(/^#{1,2}\s+/, ''))}</h${level}>`;
          hasTitle = true; i++; continue;
        }
        if (/^\*[^*].*\*$/.test(line.trim()) && !line.trim().startsWith('**')) {
          html += `<div class="slide-kicker">${inline(line.trim().slice(1,-1))}</div>`;
          hasKicker = true; i++; continue;
        }
        if (/^[-*+]\s+/.test(line)) {
          const items = [];
          while (i < lines.length && /^[-*+]\s+/.test(lines[i])) { items.push(`<li>${inline(lines[i].replace(/^[-*+]\s+/, ''))}</li>`); i++; }
          html += `<ul>${items.join('')}</ul>`; continue;
        }
        if (/^>\s?/.test(line)) {
          const quote = [];
          while (i < lines.length && /^>\s?/.test(lines[i])) { quote.push(lines[i].replace(/^>\s?/, '')); i++; }
          let cite = '';
          if (quote.length > 1 && /^—/.test(quote[quote.length - 1])) cite = `<cite>${inline(quote.pop())}</cite>`;
          html += `<blockquote>${inline(quote.join(' '))}${cite}</blockquote>`; continue;
        }
        if (/^\s{4}/.test(line)) {
          const code = [];
          while (i < lines.length && (/^\s{4}/.test(lines[i]) || !lines[i].trim())) { code.push(lines[i].replace(/^\s{4}/, '')); i++; }
          html += `<pre>${escapeHtml(code.join('\n').trim())}</pre>`; continue;
        }
        const paragraph = [];
        while (i < lines.length && lines[i].trim() && !/^#{1,2}\s+|^[-*+]\s+|^>\s?|^\s{4}/.test(lines[i])) { paragraph.push(lines[i]); i++; }
        html += `<p class="lede">${inline(paragraph.join(' '))}</p>`;
      }
      const isTitle = slide.index === 0 && hasTitle;
      if (isTitle) html = `<div class="slide-grid"><div>${html}</div><div class="visual-mark" aria-hidden="true"></div></div>`;
      else html = `<div>${html}</div>`;
      if (!isTitle && slide.index === 1) html += `<div class="side-note">A small set of principles for a more focused operating rhythm.</div>`;
      return `<span class="slide-number">${String(slide.index + 1).padStart(2,'0')} / ${String(slides.length).padStart(2,'0')}</span>${html}`;
    }

    function update() {
      slides = parseSlides(input.value);
      if (!slides.length) slides = [{raw:'', lines:['# Start writing'], title:'Start writing', index:0}];
      current = Math.min(current, slides.length - 1);
      document.getElementById('slideCount').textContent = String(slides.length).padStart(2,'0');
      document.getElementById('totalSlides').textContent = String(slides.length).padStart(2,'0');
      document.getElementById('charCount').textContent = `${input.value.length.toLocaleString()} chars`;
      const words = input.value.trim() ? input.value.trim().split(/\s+/).length : 0;
      document.getElementById('wordCount').textContent = `${words} words`;
      renderCurrent();
      renderOutline();
      document.getElementById('saveDot').classList.add('unsaved');
      document.getElementById('saveText').textContent = 'Unsaved changes';
      clearTimeout(window.saveTimer);
      window.saveTimer = setTimeout(() => { document.getElementById('saveDot').classList.remove('unsaved'); document.getElementById('saveText').textContent = 'Saved locally'; localStorage.setItem('markdown-slides-deck', input.value); }, 700);
    }

    function renderCurrent() {
      const markup = renderSlide(slides[current]);
      slidePreview.innerHTML = markup;
      fullscreenSlide.innerHTML = markup;
      document.getElementById('currentSlide').textContent = String(current + 1).padStart(2,'0');
      document.getElementById('prevButton').disabled = current === 0;
      document.getElementById('nextButton').disabled = current === slides.length - 1;
      slideFrame.classList.remove('swap'); void slideFrame.offsetWidth; slideFrame.classList.add('swap');
    }

    function renderOutline() {
      outlineList.innerHTML = slides.map((slide, index) => `<li class="outline-item ${index === current ? 'active' : ''}" data-index="${index}"><span class="outline-index">${String(index + 1).padStart(2,'0')}</span><span><span class="outline-title">${escapeHtml(slide.title)}</span><span class="outline-type">${index === 0 ? 'Opening' : index === slides.length - 1 ? 'Closing' : 'Content'}</span></span></li>`).join('');
      outlineList.querySelectorAll('.outline-item').forEach(item => item.addEventListener('click', () => goTo(Number(item.dataset.index))));
    }

    function goTo(index) { if (index < 0 || index >= slides.length) return; current = index; renderCurrent(); renderOutline(); }
    function showToast(message) { toast.textContent = message; toast.classList.add('show'); clearTimeout(toastTimer); toastTimer = setTimeout(() => toast.classList.remove('show'), 1800); }
    function setZoom(next) { zoom = Math.max(75, Math.min(120, next)); slideFrame.style.transform = `scale(${zoom / 100})`; document.getElementById('zoomValue').textContent = `${zoom}%`; }

    input.addEventListener('input', update);
    document.getElementById('sampleButton').addEventListener('click', () => { input.value = sampleMarkdown; current = 0; update(); input.focus(); showToast('Sample deck loaded'); });
    document.getElementById('prevButton').addEventListener('click', () => goTo(current - 1));
    document.getElementById('nextButton').addEventListener('click', () => goTo(current + 1));
    document.getElementById('zoomOut').addEventListener('click', () => setZoom(zoom - 5));
    document.getElementById('zoomIn').addEventListener('click', () => setZoom(zoom + 5));
    document.getElementById('themeButton').addEventListener('click', () => { document.body.classList.toggle('night'); localStorage.setItem('markdown-slides-night', document.body.classList.contains('night')); showToast(document.body.classList.contains('night') ? 'Night mode on' : 'Day mode on'); });
    document.getElementById('presentButton').addEventListener('click', () => { fullscreenShell.classList.add('open'); document.body.style.overflow = 'hidden'; });
    document.getElementById('fullscreenButton').addEventListener('click', () => { fullscreenShell.classList.add('open'); document.body.style.overflow = 'hidden'; });
    document.getElementById('closeFullscreen').addEventListener('click', () => { fullscreenShell.classList.remove('open'); document.body.style.overflow = ''; });
    document.addEventListener('keydown', (event) => {
      if (event.target === input && event.key !== 'Escape') return;
      if (event.key === 'ArrowRight' || event.key === 'ArrowDown' || event.key === 'PageDown') { event.preventDefault(); goTo(current + 1); }
      if (event.key === 'ArrowLeft' || event.key === 'ArrowUp' || event.key === 'PageUp') { event.preventDefault(); goTo(current - 1); }
      if (event.key.toLowerCase() === 'p' && event.target !== input) { fullscreenShell.classList.add('open'); document.body.style.overflow = 'hidden'; }
      if (event.key === 'Escape' && fullscreenShell.classList.contains('open')) { fullscreenShell.classList.remove('open'); document.body.style.overflow = ''; }
    });

    const storedDeck = localStorage.getItem('markdown-slides-deck');
    input.value = storedDeck || sampleMarkdown;
    if (localStorage.getItem('markdown-slides-night') === 'true') document.body.classList.add('night');
    update();
  </script>
</body>
</html>
