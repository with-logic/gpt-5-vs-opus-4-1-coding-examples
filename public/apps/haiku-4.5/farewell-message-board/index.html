<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farewell Message Board</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.1/tailwind.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container-wrapper {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding: 20px 0;
        }

        .header-title {
            flex: 1;
        }

        .header-title h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .header-title p {
            color: #64748b;
            font-size: 1.1rem;
            font-weight: 500;
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        button {
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 10px 20px;
        }

        .btn-login {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.1);
        }

        .btn-login:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .btn-write {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 28px;
            font-size: 1.05rem;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-write:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }

        .messages-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .message-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .message-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.12);
        }

        .message-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .message-content {
            padding: 24px;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .message-author {
            font-weight: 700;
            color: #1e293b;
            font-size: 1.1rem;
            margin-bottom: 8px;
        }

        .message-date {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-bottom: 12px;
        }

        .message-text {
            color: #475569;
            line-height: 1.6;
            font-size: 0.95rem;
            flex: 1;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.3s ease;
        }

        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 16px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            animation: slideUp 0.3s ease;
        }

        .modal-header {
            margin-bottom: 24px;
        }

        .modal-header h2 {
            font-size: 1.8rem;
            color: #1e293b;
            margin-bottom: 8px;
        }

        .modal-header p {
            color: #64748b;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #334155;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 28px;
        }

        .btn-cancel {
            background: #f1f5f9;
            color: #475569;
            padding: 10px 24px;
        }

        .btn-cancel:hover {
            background: #e2e8f0;
        }

        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px 28px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .login-modal-content {
            max-width: 400px;
        }

        .login-form-group {
            margin-bottom: 16px;
        }

        .login-form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
        }

        .login-form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .login-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .login-actions button {
            flex: 1;
            padding: 11px 20px;
        }

        @media (max-width: 640px) {
            header {
                flex-direction: column;
                gap: 16px;
                text-align: center;
            }

            .header-title h1 {
                font-size: 1.8rem;
            }

            .header-actions {
                width: 100%;
                justify-content: center;
            }

            .messages-grid {
                grid-template-columns: 1fr;
            }

            .modal-content {
                padding: 24px;
            }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #64748b;
        }

        .empty-state h3 {
            font-size: 1.3rem;
            margin-bottom: 8px;
            color: #475569;
        }
    </style>
</head>
<body>
    <div class="container-wrapper">
        <header>
            <div class="header-title">
                <h1>Farewell</h1>
                <p>Share your heartfelt messages</p>
            </div>
            <div class="header-actions">
                <button class="btn-login" onclick="openLoginModal()">Login</button>
                <button class="btn-write" onclick="openWriteModal()">Write</button>
            </div>
        </header>

        <div class="messages-grid" id="messagesGrid"></div>
    </div>

    <!-- Login Modal -->
    <div class="modal" id="loginModal">
        <div class="modal-content login-modal-content">
            <div class="modal-header">
                <h2>Welcome Back</h2>
                <p>Sign in to continue</p>
            </div>
            <div class="login-form-group">
                <input type="email" placeholder="Email" id="loginEmail">
            </div>
            <div class="login-form-group">
                <input type="password" placeholder="Password" id="loginPassword">
            </div>
            <div class="login-actions">
                <button class="btn-cancel" onclick="closeLoginModal()">Cancel</button>
                <button class="btn-submit" onclick="handleLogin()">Sign In</button>
            </div>
        </div>
    </div>

    <!-- Write Modal -->
    <div class="modal" id="writeModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Write a Message</h2>
                <p>Share your farewell message with the community</p>
            </div>
            <div class="form-group">
                <label for="authorName">Your Name</label>
                <input type="text" id="authorName" placeholder="Enter your name">
            </div>
            <div class="form-group">
                <label for="messageText">Message</label>
                <textarea id="messageText" placeholder="Write your heartfelt message here..."></textarea>
            </div>
            <div class="form-group">
                <label for="imageUrl">Image URL (optional)</label>
                <input type="url" id="imageUrl" placeholder="https://example.com/image.jpg">
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeWriteModal()">Cancel</button>
                <button class="btn-submit" onclick="submitMessage()">Post Message</button>
            </div>
        </div>
    </div>

    <script>
        // Sample messages with meaningful pictures
        const initialMessages = [
            {
                id: 1,
                author: "Emma Johnson",
                date: "March 8, 2026",
                text: "As I look back on our time together, I realize that every moment we shared has shaped who I am today. Thank you for being part of my journey. The memories we created will forever hold a special place in my heart.",
                image: "https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=400&h=300&fit=crop"
            },
            {
                id: 2,
                author: "James Mitchell",
                date: "March 7, 2026",
                text: "To my dearest friends, parting is bittersweet, but I'm grateful for every laugh, every lesson, and every moment we've shared. You've made my life richer than words can express. Until we meet again.",
                image: "https://images.unsplash.com/photo-1529156069898-49953e39b3ac?w=400&h=300&fit=crop"
            },
            {
                id: 3,
                author: "Sarah Chen",
                date: "March 6, 2026",
                text: "This goodbye is not an ending, but a celebration of all the beautiful moments we've had. You've taught me the true meaning of friendship and kindness. Forever grateful for you.",
                image: "https://images.unsplash.com/photo-1496442226666-8d4d0e62e6e9?w=400&h=300&fit=crop"
            },
            {
                id: 4,
                author: "Michael Torres",
                date: "March 5, 2026",
                text: "Life with you has been a masterpiece painted with colors of joy and warmth. As we part ways, I carry these precious moments in my heart. Thank you for everything.",
                image: "https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?w=400&h=300&fit=crop"
            },
            {
                id: 5,
                author: "Jessica Parker",
                date: "March 4, 2026",
                text: "To the most wonderful person I've known, your kindness and warmth have touched my soul in ways I can't fully express. This isn't goodbye, it's see you later. I love you.",
                image: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=400&h=300&fit=crop"
            },
            {
                id: 6,
                author: "David Wong",
                date: "March 3, 2026",
                text: "Every conversation we had, every moment we spent together, has been a gift. You've inspired me to be better, to dream bigger, to love deeper. Thank you for being you.",
                image: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=400&h=300&fit=crop"
            },
            {
                id: 7,
                author: "Amanda Foster",
                date: "March 2, 2026",
                text: "As I bid farewell, I want you to know that you've made a difference in my life that words cannot capture. The impact you've had on me is immeasurable and everlasting.",
                image: "https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=400&h=300&fit=crop"
            },
            {
                id: 8,
                author: "Christopher Lee",
                date: "March 1, 2026",
                text: "Life is a journey, and you've been one of the best chapters. The memories we share are the greatest treasure I could ever have. Grateful beyond words.",
                image: "https://images.unsplash.com/photo-1500322969430-26958ee1b72e?w=400&h=300&fit=crop"
            },
            {
                id: 9,
                author: "Rebecca Myers",
                date: "February 28, 2026",
                text: "Saying goodbye to you feels like closing a book I never wanted to end. But I'm thankful for every page, every word, every beautiful moment written in our story together.",
                image: "https://images.unsplash.com/photo-1531746020798-e6953c6e8e04?w=400&h=300&fit=crop"
            },
            {
                id: 10,
                author: "Alexander Hall",
                date: "February 27, 2026",
                text: "In the tapestry of life, you are a golden thread that has woven beauty and meaning into my days. This farewell is just a chapter closing, not the end of what we share.",
                image: "https://images.unsplash.com/photo-1516321318423-f06f70e504f9?w=400&h=300&fit=crop"
            }
        ];

        let messages = [...initialMessages];
        let nextId = 11;

        function renderMessages() {
            const grid = document.getElementById('messagesGrid');
            grid.innerHTML = '';

            if (messages.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <h3>No messages yet</h3>
                        <p>Be the first to share your farewell message</p>
                    </div>
                `;
                return;
            }

            messages.forEach(msg => {
                const card = document.createElement('div');
                card.className = 'message-card';

                const imageHTML = msg.image ? `<img src="${msg.image}" alt="Message from ${msg.author}" class="message-image">` : '';

                card.innerHTML = `
                    ${imageHTML}
                    <div class="message-content">
                        <div class="message-author">${escapeHtml(msg.author)}</div>
                        <div class="message-date">${msg.date}</div>
                        <div class="message-text">${escapeHtml(msg.text)}</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function openLoginModal() {
            document.getElementById('loginModal').classList.add('show');
        }

        function closeLoginModal() {
            document.getElementById('loginModal').classList.remove('show');
            document.getElementById('loginEmail').value = '';
            document.getElementById('loginPassword').value = '';
        }

        function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            if (email && password) {
                alert(`Welcome back, ${email}! You are now logged in.`);
                closeLoginModal();
            } else {
                alert('Please fill in all fields');
            }
        }

        function openWriteModal() {
            document.getElementById('writeModal').classList.add('show');
        }

        function closeWriteModal() {
            document.getElementById('writeModal').classList.remove('show');
            document.getElementById('authorName').value = '';
            document.getElementById('messageText').value = '';
            document.getElementById('imageUrl').value = '';
        }

        function submitMessage() {
            const author = document.getElementById('authorName').value.trim();
            const text = document.getElementById('messageText').value.trim();
            const image = document.getElementById('imageUrl').value.trim();

            if (!author || !text) {
                alert('Please fill in both your name and message');
                return;
            }

            const today = new Date();
            const dateStr = today.toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });

            const newMessage = {
                id: nextId++,
                author: author,
                date: dateStr,
                text: text,
                image: image || `https://images.unsplash.com/photo-1516321318423-f06f70e504f9?w=400&h=300&fit=crop`
            };

            messages.unshift(newMessage);
            renderMessages();
            closeWriteModal();
            alert('Message posted successfully!');
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const loginModal = document.getElementById('loginModal');
            const writeModal = document.getElementById('writeModal');

            if (event.target === loginModal) {
                closeLoginModal();
            }
            if (event.target === writeModal) {
                closeWriteModal();
            }
        }

        // Keyboard shortcut to close modals
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                closeLoginModal();
                closeWriteModal();
            }
        });

        // Initial render
        renderMessages();
    </script>
</body>
</html>
