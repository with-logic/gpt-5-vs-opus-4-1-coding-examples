<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fun Game - Jump!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        #gameContainer {
            position: relative;
            width: 800px;
            height: 600px;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 50%, #90EE90 100%);
            overflow: hidden;
            border: 5px solid #FFD700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            border-radius: 10px;
        }

        .parallax-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }

        #clouds {
            background-image:
                radial-gradient(circle at 20% 30%, rgba(255,255,255,0.8) 0%, transparent 50%),
                radial-gradient(circle at 60% 50%, rgba(255,255,255,0.6) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255,255,255,0.7) 0%, transparent 50%);
            background-size: 400px 200px, 500px 250px, 300px 150px;
            background-position: 0 20%, 100px 40px, 50px 10px;
            background-repeat: repeat-x;
            z-index: 1;
        }

        #mountains {
            background-image: linear-gradient(135deg, #228B22 0%, #32CD32 100%);
            position: absolute;
            bottom: 0;
            width: 200%;
            height: 120px;
            z-index: 2;
            clip-path: polygon(
                0% 100%, 0% 60%, 3% 55%, 6% 65%, 9% 50%, 12% 60%, 15% 45%, 18% 55%,
                21% 50%, 24% 65%, 27% 40%, 30% 60%, 33% 45%, 36% 55%, 39% 50%, 42% 65%,
                45% 35%, 48% 60%, 51% 45%, 54% 55%, 57% 50%, 60% 70%, 63% 40%, 66% 60%,
                69% 45%, 72% 55%, 75% 50%, 78% 65%, 81% 40%, 84% 60%, 87% 45%, 90% 55%,
                93% 50%, 96% 70%, 100% 50%, 100% 100%
            );
        }

        #gameArea {
            position: relative;
            width: 100%;
            height: 100%;
            z-index: 10;
        }

        #player {
            position: absolute;
            width: 40px;
            height: 50px;
            left: 100px;
            bottom: 100px;
            z-index: 20;
            animation: idle 0.6s infinite;
        }

        .player-body {
            width: 100%;
            height: 100%;
            position: relative;
            background: linear-gradient(90deg, #FF6B6B 0%, #FF8E8E 100%);
            border-radius: 8px;
        }

        .player-head {
            position: absolute;
            width: 22px;
            height: 22px;
            background: #FFB366;
            border-radius: 50%;
            top: -12px;
            left: 9px;
        }

        .player-eye {
            position: absolute;
            width: 4px;
            height: 6px;
            background: #000;
            border-radius: 50%;
            top: 5px;
        }

        .player-eye-1 { left: 6px; }
        .player-eye-2 { left: 14px; }

        .player-mouth {
            position: absolute;
            width: 8px;
            height: 3px;
            background: #000;
            border-radius: 2px;
            top: 14px;
            left: 7px;
        }

        .player-arm {
            position: absolute;
            width: 8px;
            height: 20px;
            background: #FFB366;
            border-radius: 4px;
            top: 5px;
        }

        .player-arm-1 { left: -8px; }
        .player-arm-2 { right: -8px; }

        .obstacle {
            position: absolute;
            bottom: 100px;
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #FF1493 0%, #FF69B4 100%);
            border-radius: 8px;
            z-index: 15;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        #ground {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100px;
            background: linear-gradient(180deg, #90EE90 0%, #228B22 100%);
            z-index: 3;
            border-top: 3px dashed #FFD700;
        }

        #ground::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 10px;
            top: 0;
            background: repeating-linear-gradient(
                90deg,
                #FFD700 0px,
                #FFD700 20px,
                transparent 20px,
                transparent 40px
            );
        }

        .ui-container {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px 20px;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: bold;
        }

        .score-box {
            background: rgba(255, 215, 0, 0.9);
            padding: 8px 16px;
            border-radius: 5px;
            color: #000;
            min-width: 120px;
            text-align: center;
        }

        .high-score-box {
            background: rgba(255, 69, 0, 0.9);
            padding: 8px 16px;
            border-radius: 5px;
            color: white;
            min-width: 140px;
            text-align: center;
        }

        .speed-indicator {
            background: rgba(50, 205, 50, 0.9);
            padding: 8px 16px;
            border-radius: 5px;
            color: white;
        }

        #gameOverScreen {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 200;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        .game-over-content {
            animation: popIn 0.5s ease-out;
        }

        .game-over-title {
            font-size: 48px;
            margin-bottom: 20px;
            color: #FF1493;
            font-weight: bold;
        }

        .game-over-score {
            font-size: 32px;
            margin-bottom: 10px;
            color: #FFD700;
        }

        .game-over-high-score {
            font-size: 24px;
            margin-bottom: 30px;
            color: #90EE90;
        }

        .retry-btn {
            padding: 15px 40px;
            font-size: 20px;
            background: linear-gradient(135deg, #FF6B6B 0%, #FF1493 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 20px;
        }

        .retry-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.8);
        }

        .retry-btn:active {
            transform: scale(0.95);
        }

        @keyframes idle {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
        }

        @keyframes jump {
            0% { bottom: 100px; }
            50% { bottom: 200px; }
            100% { bottom: 100px; }
        }

        @keyframes popIn {
            0% {
                opacity: 0;
                transform: scale(0.5);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .shake {
            animation: shake 0.3s;
        }

        #gameContainer.game-active #player {
            animation: idle 0.6s infinite;
        }

        #gameContainer.jumping #player {
            animation: jump 0.5s ease-out;
            bottom: 100px !important;
        }

        .mute-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 8px 12px;
            background: rgba(100, 100, 100, 0.8);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            z-index: 100;
            transition: background 0.2s;
        }

        .mute-btn:hover {
            background: rgba(150, 150, 150, 0.9);
        }

        .particle {
            position: absolute;
            pointer-events: none;
        }

        @media (max-width: 900px) {
            #gameContainer {
                width: 100vw;
                height: 100vh;
                border: none;
                border-radius: 0;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="clouds" class="parallax-layer"></div>
        <div id="mountains" class="parallax-layer"></div>
        <div id="gameArea"></div>
        <div id="ground"></div>

        <div class="ui-container">
            <div class="score-box">
                Score: <span id="score">0</span>
            </div>
            <div class="speed-indicator">
                Speed: <span id="speed">1</span>x
            </div>
            <div class="high-score-box">
                High Score: <span id="highScore">0</span>
            </div>
        </div>

        <button class="mute-btn" id="muteBtn">🔊 Sound</button>

        <div id="gameArea">
            <div id="player">
                <div class="player-body">
                    <div class="player-head">
                        <div class="player-eye player-eye-1"></div>
                        <div class="player-eye player-eye-2"></div>
                        <div class="player-mouth"></div>
                    </div>
                    <div class="player-arm player-arm-1"></div>
                    <div class="player-arm player-arm-2"></div>
                </div>
            </div>
        </div>

        <div id="gameOverScreen">
            <div class="game-over-content">
                <div class="game-over-title">Game Over!</div>
                <div class="game-over-score">Score: <span id="finalScore">0</span></div>
                <div class="game-over-high-score">High Score: <span id="finalHighScore">0</span></div>
                <button class="retry-btn" id="retryBtn">Try Again!</button>
            </div>
        </div>
    </div>

    <script>
        // Audio context setup
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        let soundEnabled = true;

        function playSound(freq, duration, type = 'sine') {
            if (!soundEnabled) return;

            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();

            osc.connect(gain);
            gain.connect(audioContext.destination);

            osc.frequency.value = freq;
            osc.type = type;

            gain.gain.setValueAtTime(0.3, audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);

            osc.start(audioContext.currentTime);
            osc.stop(audioContext.currentTime + duration);
        }

        function playJumpSound() {
            playSound(400, 0.1);
            playSound(600, 0.15);
        }

        function playHitSound() {
            playSound(150, 0.2, 'square');
            playSound(100, 0.2, 'square');
        }

        function playCollectSound() {
            playSound(800, 0.1);
            playSound(1000, 0.1);
            playSound(1200, 0.1);
        }

        function playSpeedUpSound() {
            playSound(500, 0.08);
            playSound(700, 0.08);
            playSound(900, 0.08);
        }

        // Game variables
        const gameContainer = document.getElementById('gameContainer');
        const gameArea = document.getElementById('gameArea');
        const player = document.getElementById('player');
        const scoreDisplay = document.getElementById('score');
        const highScoreDisplay = document.getElementById('highScore');
        const speedDisplay = document.getElementById('speed');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const muteBtn = document.getElementById('muteBtn');

        let gameActive = false;
        let isJumping = false;
        let score = 0;
        let highScore = localStorage.getItem('highScore') || 0;
        let gameSpeed = 1;
        let obstacleSpeed = 5;
        let spawnRate = 80;
        let frameCount = 0;
        let playerBottomPos = 100;
        let velocityY = 0;

        const GRAVITY = 0.6;
        const JUMP_POWER = 15;
        const GROUND_LEVEL = 100;
        const MAX_SPEED = 3;

        highScoreDisplay.textContent = highScore;

        // Mute button
        muteBtn.addEventListener('click', () => {
            soundEnabled = !soundEnabled;
            muteBtn.textContent = soundEnabled ? '🔊 Sound' : '🔇 Muted';
        });

        // Start game on any key press
        document.addEventListener('keydown', (e) => {
            if (!gameActive && (e.key === ' ' || e.code === 'Space')) {
                e.preventDefault();
                startGame();
            } else if (gameActive && (e.key === ' ' || e.code === 'Space')) {
                e.preventDefault();
                jump();
            }
        });

        // Touch support
        document.addEventListener('click', () => {
            if (!gameActive) {
                startGame();
            }
        });

        gameContainer.addEventListener('touchstart', (e) => {
            if (gameActive) {
                jump();
            }
        });

        document.getElementById('retryBtn').addEventListener('click', startGame);

        function startGame() {
            gameActive = true;
            score = 0;
            gameSpeed = 1;
            obstacleSpeed = 5;
            spawnRate = 80;
            frameCount = 0;
            playerBottomPos = GROUND_LEVEL;
            velocityY = 0;
            isJumping = false;

            scoreDisplay.textContent = score;
            speedDisplay.textContent = gameSpeed.toFixed(1);
            gameOverScreen.style.display = 'none';
            gameContainer.classList.add('game-active');

            // Clear obstacles
            document.querySelectorAll('.obstacle').forEach(obs => obs.remove());

            gameLoop();
        }

        function jump() {
            if (!isJumping && gameActive) {
                velocityY = JUMP_POWER;
                isJumping = true;
                playJumpSound();
            }
        }

        function updateParallax() {
            const offset = (frameCount * obstacleSpeed * 0.3) % 400;
            document.getElementById('clouds').style.backgroundPosition = `-${offset}px 20%, ${100 - offset}px 40px, ${50 - offset}px 10px`;
            document.getElementById('mountains').style.transform = `translateX(-${offset * 0.5}px)`;
        }

        function createObstacle() {
            const obstacle = document.createElement('div');
            obstacle.className = 'obstacle';
            obstacle.textContent = '🎭';
            obstacle.style.left = '800px';
            gameArea.appendChild(obstacle);

            return {
                element: obstacle,
                x: 800,
                y: GROUND_LEVEL,
                width: 40,
                height: 40,
                passed: false
            };
        }

        let obstacles = [];

        function gameLoop() {
            if (!gameActive) return;

            frameCount++;
            updateParallax();

            // Spawn obstacles
            if (frameCount % Math.max(20, spawnRate) === 0) {
                obstacles.push(createObstacle());
            }

            // Update obstacles
            obstacles = obstacles.filter(obs => {
                obs.x -= obstacleSpeed;
                obs.element.style.left = obs.x + 'px';

                // Check collision
                if (checkCollision(obs)) {
                    endGame();
                }

                // Score point when obstacle passes
                if (!obs.passed && obs.x < 100) {
                    obs.passed = true;
                    score++;
                    scoreDisplay.textContent = score;
                    playCollectSound();

                    // Increase difficulty
                    if (score % 5 === 0) {
                        gameSpeed += 0.2;
                        obstacleSpeed += 0.5;
                        spawnRate = Math.max(20, spawnRate - 2);
                        speedDisplay.textContent = gameSpeed.toFixed(1);
                        playSpeedUpSound();

                        // Visual feedback
                        gameContainer.classList.add('shake');
                        setTimeout(() => gameContainer.classList.remove('shake'), 300);
                    }
                }

                // Remove off-screen obstacles
                if (obs.x < -50) {
                    obs.element.remove();
                    return false;
                }

                return true;
            });

            // Update player physics
            velocityY -= GRAVITY;
            playerBottomPos -= velocityY;

            // Ground collision
            if (playerBottomPos <= GROUND_LEVEL) {
                playerBottomPos = GROUND_LEVEL;
                velocityY = 0;
                isJumping = false;
            }

            // Keep player in bounds
            if (playerBottomPos > 600) {
                endGame();
            }

            player.style.bottom = playerBottomPos + 'px';

            requestAnimationFrame(gameLoop);
        }

        function checkCollision(obstacle) {
            const playerLeft = 100;
            const playerRight = 140;
            const playerTop = playerBottomPos + 50;
            const playerBottom = playerBottomPos;

            const obsLeft = obstacle.x;
            const obsRight = obstacle.x + obstacle.width;
            const obsTop = obstacle.y + obstacle.height;
            const obsBottom = obstacle.y;

            return !(playerRight < obsLeft ||
                     playerLeft > obsRight ||
                     playerTop < obsBottom ||
                     playerBottom > obsTop);
        }

        function endGame() {
            gameActive = false;

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('highScore', highScore);
                highScoreDisplay.textContent = highScore;
            }

            playHitSound();

            // Show game over screen
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalHighScore').textContent = highScore;
            gameOverScreen.style.display = 'flex';
            gameContainer.classList.remove('game-active');
        }

        // Initial high score display
        window.addEventListener('load', () => {
            highScore = localStorage.getItem('highScore') || 0;
            highScoreDisplay.textContent = highScore;
        });

        // Show game over screen initially
        gameOverScreen.style.display = 'flex';
    </script>
</body>
</html>
