<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Countdown</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        }

        .container-viewport {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        }

        .background-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.4;
            z-index: 1;
        }

        .parallax-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0.3;
            z-index: 0;
            will-change: transform;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.7) 100%);
            z-index: 2;
        }

        .content {
            position: relative;
            z-index: 3;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            padding: 40px 20px;
        }

        .form-panel {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 16px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .form-title {
            font-size: 32px;
            font-weight: 700;
            color: #f1f5f9;
            margin-bottom: 30px;
            text-align: center;
            background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #cbd5e1;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(148, 163, 184, 0.3);
            border-radius: 8px;
            background: rgba(51, 65, 85, 0.5);
            color: #f1f5f9;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: #60a5fa;
            background: rgba(51, 65, 85, 0.8);
            box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.1);
        }

        .form-input::placeholder {
            color: rgba(203, 213, 225, 0.6);
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            border-radius: 8px;
        }

        .file-input-label {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            border: 2px dashed rgba(96, 165, 250, 0.3);
            border-radius: 8px;
            background: rgba(30, 41, 59, 0.5);
            cursor: pointer;
            transition: all 0.3s ease;
            gap: 8px;
        }

        .file-input-label:hover {
            border-color: #60a5fa;
            background: rgba(30, 41, 59, 0.8);
        }

        .file-input-label.has-image {
            border: 1px solid rgba(96, 165, 250, 0.5);
            background: rgba(96, 165, 250, 0.1);
        }

        .file-input {
            display: none;
        }

        .file-input-text {
            font-size: 13px;
            color: #94a3b8;
        }

        .file-input-icon {
            font-size: 20px;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 30px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.6);
        }

        .btn-secondary {
            background: rgba(51, 65, 85, 0.5);
            color: #cbd5e1;
            border: 1px solid rgba(148, 163, 184, 0.3);
        }

        .btn-secondary:hover {
            background: rgba(51, 65, 85, 0.8);
            border-color: #60a5fa;
            color: #60a5fa;
        }

        .countdown-container {
            text-align: center;
            color: white;
        }

        .event-name {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .event-location {
            font-size: 18px;
            color: #cbd5e1;
            margin-bottom: 40px;
            font-weight: 500;
        }

        .countdown-display {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .countdown-unit {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(96, 165, 250, 0.2);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            animation: float 3s ease-in-out infinite;
        }

        .countdown-unit:nth-child(1) {
            animation-delay: 0s;
        }

        .countdown-unit:nth-child(2) {
            animation-delay: 0.2s;
        }

        .countdown-unit:nth-child(3) {
            animation-delay: 0.4s;
        }

        .countdown-unit:nth-child(4) {
            animation-delay: 0.6s;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-8px);
            }
        }

        .countdown-number {
            font-size: 56px;
            font-weight: 700;
            background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-variant-numeric: tabular-nums;
            line-height: 1;
            margin-bottom: 8px;
        }

        .countdown-label {
            font-size: 12px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .countdown-message {
            font-size: 24px;
            color: #60a5fa;
            font-weight: 600;
            margin-bottom: 30px;
        }

        .save-calendar-btn {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            padding: 14px 32px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .save-calendar-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.6);
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 768px) {
            .form-panel {
                padding: 30px 20px;
                max-width: 100%;
            }

            .form-title {
                font-size: 24px;
            }

            .event-name {
                font-size: 32px;
            }

            .event-location {
                font-size: 16px;
            }

            .countdown-number {
                font-size: 40px;
            }

            .countdown-display {
                gap: 12px;
            }

            .countdown-unit {
                padding: 15px;
            }

            .button-group {
                grid-template-columns: 1fr;
            }
        }

        .glow-effect {
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% {
                box-shadow: 0 0 20px rgba(96, 165, 250, 0.5);
            }
            50% {
                box-shadow: 0 0 40px rgba(96, 165, 250, 0.8);
            }
        }
    </style>
</head>
<body>
    <div class="container-viewport">
        <div class="parallax-layer" id="parallaxLayer"></div>
        <div class="overlay"></div>

        <div class="content">
            <!-- Form Panel -->
            <div class="form-panel" id="formPanel">
                <div class="form-title">Event Countdown</div>

                <div class="form-group">
                    <label class="form-label" for="eventName">Event Name</label>
                    <input
                        type="text"
                        id="eventName"
                        class="form-input"
                        placeholder="e.g., Wedding, Conference, Launch"
                    >
                </div>

                <div class="form-group">
                    <label class="form-label" for="eventDate">Date & Time</label>
                    <input
                        type="datetime-local"
                        id="eventDate"
                        class="form-input"
                    >
                </div>

                <div class="form-group">
                    <label class="form-label" for="eventLocation">Location</label>
                    <input
                        type="text"
                        id="eventLocation"
                        class="form-input"
                        placeholder="e.g., New York, NY"
                    >
                </div>

                <div class="form-group">
                    <label class="form-label">Background Image</label>
                    <div class="file-input-wrapper">
                        <label for="backgroundImage" class="file-input-label" id="fileInputLabel">
                            <span class="file-input-icon">📸</span>
                            <span class="file-input-text" id="fileInputText">Click to upload or drag & drop</span>
                        </label>
                        <input
                            type="file"
                            id="backgroundImage"
                            class="file-input"
                            accept="image/*"
                        >
                    </div>
                </div>

                <div class="button-group">
                    <button class="btn btn-primary" id="startBtn">Start Countdown</button>
                    <button class="btn btn-secondary" id="resetBtn" onclick="location.reload()">Reset</button>
                </div>
            </div>

            <!-- Countdown Display -->
            <div class="countdown-container hidden" id="countdownContainer">
                <div class="event-name" id="displayEventName"></div>
                <div class="event-location" id="displayEventLocation"></div>

                <div class="countdown-display" id="countdownDisplay">
                    <div class="countdown-unit">
                        <div class="countdown-number" id="days">0</div>
                        <div class="countdown-label">Days</div>
                    </div>
                    <div class="countdown-unit">
                        <div class="countdown-number" id="hours">0</div>
                        <div class="countdown-label">Hours</div>
                    </div>
                    <div class="countdown-unit">
                        <div class="countdown-number" id="minutes">0</div>
                        <div class="countdown-label">Minutes</div>
                    </div>
                    <div class="countdown-unit">
                        <div class="countdown-number" id="seconds">0</div>
                        <div class="countdown-label">Seconds</div>
                    </div>
                </div>

                <div class="countdown-message hidden" id="completedMessage">
                    🎉 Event is here! 🎉
                </div>

                <button class="save-calendar-btn" id="saveCalendarBtn">Save to Calendar</button>
            </div>
        </div>
    </div>

    <script>
        let eventData = null;
        let countdownInterval = null;

        // Parallax effect on mouse move
        document.addEventListener('mousemove', (e) => {
            const parallaxLayer = document.getElementById('parallaxLayer');
            if (!parallaxLayer.style.backgroundImage) return;

            const x = (e.clientX / window.innerWidth) * 20 - 10;
            const y = (e.clientY / window.innerHeight) * 20 - 10;
            parallaxLayer.style.transform = `translate(${x}px, ${y}px)`;
        });

        // Drag and drop for file input
        const fileInputLabel = document.getElementById('fileInputLabel');
        const backgroundImageInput = document.getElementById('backgroundImage');

        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            fileInputLabel.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            fileInputLabel.addEventListener(eventName, () => {
                fileInputLabel.style.borderColor = '#60a5fa';
                fileInputLabel.style.background = 'rgba(96, 165, 250, 0.2)';
            });
        });

        ['dragleave', 'drop'].forEach(eventName => {
            fileInputLabel.addEventListener(eventName, () => {
                fileInputLabel.style.borderColor = 'rgba(96, 165, 250, 0.3)';
                fileInputLabel.style.background = 'rgba(30, 41, 59, 0.5)';
            });
        });

        fileInputLabel.addEventListener('drop', (e) => {
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                backgroundImageInput.files = files;
                updateFileInputDisplay();
            }
        });

        backgroundImageInput.addEventListener('change', updateFileInputDisplay);

        function updateFileInputDisplay() {
            const fileName = backgroundImageInput.files[0]?.name;
            const fileInputText = document.getElementById('fileInputText');

            if (fileName) {
                fileInputLabel.classList.add('has-image');
                fileInputText.textContent = `✓ ${fileName}`;
            } else {
                fileInputLabel.classList.remove('has-image');
                fileInputText.textContent = 'Click to upload or drag & drop';
            }
        }

        // Handle start button
        document.getElementById('startBtn').addEventListener('click', startCountdown);

        function startCountdown() {
            const eventName = document.getElementById('eventName').value.trim();
            const eventDate = document.getElementById('eventDate').value;
            const eventLocation = document.getElementById('eventLocation').value.trim();
            const backgroundImage = document.getElementById('backgroundImage').files[0];

            if (!eventName || !eventDate || !eventLocation) {
                alert('Please fill in all fields');
                return;
            }

            eventData = {
                name: eventName,
                date: new Date(eventDate),
                location: eventLocation,
            };

            // Handle background image
            if (backgroundImage) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const parallaxLayer = document.getElementById('parallaxLayer');
                    parallaxLayer.style.backgroundImage = `url('${e.target.result}')`;
                };
                reader.readAsDataURL(backgroundImage);
            }

            // Show countdown, hide form
            document.getElementById('formPanel').classList.add('hidden');
            document.getElementById('countdownContainer').classList.remove('hidden');

            // Display event info
            document.getElementById('displayEventName').textContent = eventName;
            document.getElementById('displayEventLocation').textContent = eventLocation;

            // Start countdown
            updateCountdown();
            countdownInterval = setInterval(updateCountdown, 1000);
        }

        function updateCountdown() {
            const now = new Date();
            const remaining = eventData.date - now;

            if (remaining <= 0) {
                clearInterval(countdownInterval);
                document.getElementById('countdownDisplay').classList.add('hidden');
                document.getElementById('completedMessage').classList.remove('hidden');
                return;
            }

            const days = Math.floor(remaining / (1000 * 60 * 60 * 24));
            const hours = Math.floor((remaining / (1000 * 60 * 60)) % 24);
            const minutes = Math.floor((remaining / (1000 * 60)) % 60);
            const seconds = Math.floor((remaining / 1000) % 60);

            document.getElementById('days').textContent = String(days).padStart(2, '0');
            document.getElementById('hours').textContent = String(hours).padStart(2, '0');
            document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
            document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
        }

        // Save to Calendar functionality
        document.getElementById('saveCalendarBtn').addEventListener('click', saveToCalendar);

        function saveToCalendar() {
            if (!eventData) return;

            const start = formatDateForCalendar(eventData.date);
            const title = encodeURIComponent(eventData.name);
            const description = encodeURIComponent(`Location: ${eventData.location}`);
            const location = encodeURIComponent(eventData.location);

            // Try Google Calendar
            const googleCalendarUrl = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${start}/${start}&location=${location}&details=${description}`;

            // Create iCal format for other calendar apps
            const icalEvent = generateIcalEvent();

            // Try Google Calendar first, fallback to iCal download
            window.open(googleCalendarUrl, '_blank');

            // Also provide iCal download as fallback
            setTimeout(() => {
                downloadIcal(icalEvent);
            }, 500);
        }

        function formatDateForCalendar(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            return `${year}${month}${day}T${hours}${minutes}00`;
        }

        function generateIcalEvent() {
            const now = new Date();
            const dtstart = formatDateForCalendar(eventData.date);
            const dtend = new Date(eventData.date.getTime() + 3600000); // 1 hour duration
            const dtend_formatted = formatDateForCalendar(dtend);
            const created = formatDateForCalendar(now);

            return `BEGIN:VCALENDAR
VERSION:2.0
PRODID:-//Event Countdown//EN
CALSCALE:GREGORIAN
METHOD:PUBLISH
BEGIN:VEVENT
UID:${now.getTime()}@eventcountdown
DTSTAMP:${created}
DTSTART:${dtstart}
DTEND:${dtend_formatted}
SUMMARY:${eventData.name}
LOCATION:${eventData.location}
DESCRIPTION:Event countdown created from Event Countdown app
STATUS:CONFIRMED
END:VEVENT
END:VCALENDAR`;
        }

        function downloadIcal(icalContent) {
            const blob = new Blob([icalContent], { type: 'text/calendar;charset=utf-8' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.setAttribute('href', url);
            link.setAttribute('download', `${eventData.name.replace(/\s+/g, '_')}.ics`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
