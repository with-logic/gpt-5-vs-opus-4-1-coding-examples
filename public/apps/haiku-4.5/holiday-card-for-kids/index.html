<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎄 Holiday Card for Kids 🎄</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Sans MS', 'Arial Rounded MT Bold', cursive, sans-serif;
            overflow: hidden;
            background: linear-gradient(135deg, #1a472a 0%, #2d5a3d 50%, #0f2818 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .card-container {
            position: relative;
            width: 90%;
            max-width: 1000px;
            height: 85%;
            max-height: 700px;
            background: linear-gradient(135deg, #ffe4e1 0%, #fff0f5 50%, #ffd6e8 100%);
            border: 8px solid #d4345f;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4), inset 0 0 30px rgba(255, 255, 255, 0.3);
            overflow: hidden;
            animation: cardGlow 3s ease-in-out infinite;
            display: flex;
            flex-direction: column;
        }

        @keyframes cardGlow {
            0%, 100% { box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4), inset 0 0 30px rgba(255, 255, 255, 0.3), 0 0 40px rgba(212, 52, 95, 0.3); }
            50% { box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4), inset 0 0 30px rgba(255, 255, 255, 0.5), 0 0 60px rgba(212, 52, 95, 0.6); }
        }

        .header {
            text-align: center;
            padding: 20px;
            background: linear-gradient(90deg, #d4345f, #e85a8f);
            color: white;
            font-size: 2.5em;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            letter-spacing: 2px;
        }

        .canvas-area {
            flex: 1;
            position: relative;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="20" cy="20" r="2" fill="rgba(255,255,255,0.3)"/><circle cx="70" cy="50" r="2" fill="rgba(255,255,255,0.2)"/><circle cx="80" cy="80" r="1.5" fill="rgba(255,255,255,0.25)"/></svg>');
            background-size: 200px 200px;
        }

        .toolbar {
            padding: 15px;
            background: linear-gradient(90deg, #d4345f, #e85a8f);
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .item-btn {
            padding: 10px 15px;
            border: none;
            border-radius: 15px;
            font-size: 1.2em;
            cursor: pointer;
            background: white;
            color: #d4345f;
            font-weight: bold;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            font-family: 'Comic Sans MS', cursive;
        }

        .item-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.3);
        }

        .item-btn:active {
            transform: scale(0.95);
        }

        .draggable {
            position: absolute;
            cursor: grab;
            user-select: none;
            transition: filter 0.1s;
        }

        .draggable:hover {
            filter: brightness(1.2);
            z-index: 1000;
        }

        .draggable:active {
            cursor: grabbing;
        }

        .snowflake {
            font-size: 1.8em;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotateZ(0deg); }
            50% { transform: translateY(-15px) rotateZ(180deg); }
        }

        .ornament {
            font-size: 2.2em;
            animation: spin 4s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotateZ(0deg) scale(1); }
            50% { transform: rotateZ(180deg) scale(1.1); }
            100% { transform: rotateZ(360deg) scale(1); }
        }

        .candy-cane {
            font-size: 2em;
            animation: swing 2s ease-in-out infinite;
        }

        @keyframes swing {
            0%, 100% { transform: rotateZ(-10deg); }
            50% { transform: rotateZ(10deg); }
        }

        .bell {
            font-size: 2em;
            animation: ring 1s ease-in-out infinite;
        }

        @keyframes ring {
            0%, 100% { transform: rotateZ(-15deg); }
            25% { transform: rotateZ(15deg); }
            50% { transform: rotateZ(-10deg); }
            75% { transform: rotateZ(10deg); }
        }

        .star {
            font-size: 2.5em;
            animation: twinkle 1.5s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.3); }
        }

        .gift {
            font-size: 2em;
            animation: bounce 1.5s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .gingerbread {
            font-size: 2.2em;
            animation: wiggle 1s ease-in-out infinite;
        }

        @keyframes wiggle {
            0%, 100% { transform: rotateZ(0deg); }
            25% { transform: rotateZ(-3deg); }
            75% { transform: rotateZ(3deg); }
        }

        .snow-container {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .snowdrop {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.8;
            animation: snowfall linear infinite;
        }

        @keyframes snowfall {
            to {
                transform: translateY(100vh) translateX(var(--tx, 0px));
                opacity: 0;
            }
        }

        .clear-btn {
            padding: 8px 12px;
            border: none;
            border-radius: 10px;
            font-size: 0.9em;
            cursor: pointer;
            background: #ff6b6b;
            color: white;
            font-weight: bold;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            font-family: 'Comic Sans MS', cursive;
            margin-left: auto;
        }

        .clear-btn:hover {
            background: #ff5252;
            transform: scale(1.05);
        }

        .clear-btn:active {
            transform: scale(0.95);
        }

        .sound-toggle {
            padding: 8px 12px;
            border: none;
            border-radius: 10px;
            font-size: 1.2em;
            cursor: pointer;
            background: white;
            color: #d4345f;
            font-weight: bold;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            font-family: 'Comic Sans MS', cursive;
            margin-left: 10px;
        }

        .sound-toggle:hover {
            transform: scale(1.05);
        }

        .sound-toggle.muted {
            opacity: 0.6;
        }

        @media (max-width: 768px) {
            .header {
                font-size: 1.8em;
            }

            .item-btn {
                padding: 8px 12px;
                font-size: 1em;
            }

            .card-container {
                max-height: 600px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card-container">
            <div class="header">🎄 Happy Holidays! 🎅</div>
            <div class="canvas-area" id="canvas">
                <div class="snow-container" id="snowContainer"></div>
            </div>
            <div class="toolbar">
                <button class="item-btn" data-item="snowflake" title="Add Snowflakes ❄️">❄️ Snowflake</button>
                <button class="item-btn" data-item="ornament" title="Add Ornaments 🎄">🎄 Ornament</button>
                <button class="item-btn" data-item="candy-cane" title="Add Candy Canes 🍭">🍭 Candy</button>
                <button class="item-btn" data-item="bell" title="Add Bells 🔔">🔔 Bell</button>
                <button class="item-btn" data-item="star" title="Add Stars ⭐">⭐ Star</button>
                <button class="item-btn" data-item="gift" title="Add Gifts 🎁">🎁 Gift</button>
                <button class="item-btn" data-item="gingerbread" title="Add Gingerbread 🍪">🍪 Gingerbread</button>
                <button class="sound-toggle" id="soundToggle" title="Toggle Sound 🔊">🔊</button>
                <button class="clear-btn" title="Clear All">✕ Clear</button>
            </div>
        </div>
    </div>

    <script>
        // Audio context for sound generation
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        let soundEnabled = true;

        // Predefined items to start with
        const defaultItems = [
            { emoji: '⭐', type: 'star', x: '50%', y: '10%' },
            { emoji: '🎄', type: 'ornament', x: '20%', y: '25%' },
            { emoji: '🎄', type: 'ornament', x: '80%', y: '30%' },
            { emoji: '🎁', type: 'gift', x: '15%', y: '60%' },
            { emoji: '🎁', type: 'gift', x: '85%', y: '65%' },
            { emoji: '🔔', type: 'bell', x: '50%', y: '50%' },
            { emoji: '🍭', type: 'candy-cane', x: '30%', y: '70%' },
            { emoji: '🍭', type: 'candy-cane', x: '70%', y: '75%' },
        ];

        const itemEmojis = {
            snowflake: '❄️',
            ornament: '🎄',
            'candy-cane': '🍭',
            bell: '🔔',
            star: '⭐',
            gift: '🎁',
            gingerbread: '🍪'
        };

        let draggedElement = null;
        let offsetX = 0;
        let offsetY = 0;

        // Initialize
        function init() {
            const canvas = document.getElementById('canvas');

            // Add default items
            defaultItems.forEach(item => {
                createDraggableItem(item.emoji, item.type, item.x, item.y);
            });

            // Setup event listeners
            document.querySelectorAll('.item-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const itemType = btn.dataset.item;
                    addRandomItem(itemType);
                    playClickSound();
                });
            });

            document.getElementById('soundToggle').addEventListener('click', toggleSound);
            document.querySelector('.clear-btn').addEventListener('click', clearAll);

            // Setup canvas drag and drop for new items
            canvas.addEventListener('dragover', e => e.preventDefault());
            canvas.addEventListener('drop', e => {
                e.preventDefault();
                const itemType = e.dataTransfer.getData('itemType');
                if (itemType) {
                    const rect = canvas.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    createDraggableItem(itemEmojis[itemType], itemType, x, y);
                    playClickSound();
                }
            });

            // Start snowfall
            startSnowfall();
        }

        function createDraggableItem(emoji, type, x, y) {
            const canvas = document.getElementById('canvas');
            const item = document.createElement('div');
            item.className = `draggable ${type}`;
            item.textContent = emoji;
            item.style.left = typeof x === 'string' ? x : x + 'px';
            item.style.top = typeof y === 'string' ? y : y + 'px';

            item.addEventListener('mousedown', startDrag);
            item.addEventListener('click', () => {
                playSound(type);
            });

            canvas.appendChild(item);
        }

        function startDrag(e) {
            draggedElement = this;
            const rect = this.getBoundingClientRect();
            const canvasRect = document.getElementById('canvas').getBoundingClientRect();
            offsetX = e.clientX - rect.left;
            offsetY = e.clientY - rect.top;
            draggedElement.style.zIndex = 999;
        }

        document.addEventListener('mousemove', e => {
            if (draggedElement) {
                const canvasRect = document.getElementById('canvas').getBoundingClientRect();
                let x = e.clientX - canvasRect.left - offsetX;
                let y = e.clientY - canvasRect.top - offsetY;

                // Keep items within bounds
                x = Math.max(0, Math.min(x, canvasRect.width - 40));
                y = Math.max(0, Math.min(y, canvasRect.height - 40));

                draggedElement.style.left = x + 'px';
                draggedElement.style.top = y + 'px';
            }
        });

        document.addEventListener('mouseup', () => {
            if (draggedElement) {
                draggedElement.style.zIndex = 'auto';
                draggedElement = null;
            }
        });

        function addRandomItem(type) {
            const canvas = document.getElementById('canvas');
            const x = Math.random() * (canvas.offsetWidth - 40);
            const y = Math.random() * (canvas.offsetHeight - 40);
            createDraggableItem(itemEmojis[type], type, x, y);
        }

        function clearAll() {
            document.querySelectorAll('.draggable').forEach(item => item.remove());
            playSound('clear');
        }

        // Sound generation
        function playSound(type) {
            if (!soundEnabled) return;

            const now = audioContext.currentTime;
            const duration = 0.2;

            const oscillator = audioContext.createOscillator();
            const gain = audioContext.createGain();
            oscillator.connect(gain);
            gain.connect(audioContext.destination);

            const frequencies = {
                snowflake: 800,
                ornament: 600,
                'candy-cane': 900,
                bell: 1200,
                star: 1000,
                gift: 700,
                gingerbread: 500,
                clear: 400
            };

            oscillator.frequency.setValueAtTime(frequencies[type] || 800, now);
            oscillator.frequency.exponentialRampToValueAtTime(200, now + duration);
            oscillator.type = 'sine';

            gain.gain.setValueAtTime(0.1, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + duration);

            oscillator.start(now);
            oscillator.stop(now + duration);
        }

        function playClickSound() {
            if (!soundEnabled) return;

            const now = audioContext.currentTime;
            const oscillator = audioContext.createOscillator();
            const gain = audioContext.createGain();
            oscillator.connect(gain);
            gain.connect(audioContext.destination);

            oscillator.frequency.setValueAtTime(523.25, now); // C5
            oscillator.type = 'sine';
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);

            oscillator.start(now);
            oscillator.stop(now + 0.1);
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            const btn = document.getElementById('soundToggle');
            btn.textContent = soundEnabled ? '🔊' : '🔇';
            btn.classList.toggle('muted');
            playClickSound();
        }

        // Snowfall effect
        function startSnowfall() {
            const snowContainer = document.getElementById('snowContainer');
            const canvasArea = document.getElementById('canvas');

            setInterval(() => {
                const snowdrop = document.createElement('div');
                snowdrop.className = 'snowdrop';

                const size = Math.random() * 8 + 3;
                const duration = Math.random() * 5 + 8;
                const xOffset = Math.random() * 100;

                snowdrop.style.width = size + 'px';
                snowdrop.style.height = size + 'px';
                snowdrop.style.left = Math.random() * 100 + '%';
                snowdrop.style.top = '-10px';
                snowdrop.style.setProperty('--tx', (xOffset - 50) + 'px');
                snowdrop.style.animationDuration = duration + 's';

                snowContainer.appendChild(snowdrop);

                setTimeout(() => snowdrop.remove(), duration * 1000);
            }, 300);
        }

        // Start the app
        window.addEventListener('load', init);
    </script>
</body>
</html>
