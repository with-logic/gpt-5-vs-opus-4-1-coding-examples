<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Practice Drills</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .title {
            font-size: 32px;
            font-weight: 700;
            color: #333;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 16px;
            color: #666;
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        /* Home Screen */
        .home-screen {
            text-align: center;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 24px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            padding: 16px 24px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
            transform: translateY(-2px);
        }

        .btn-small {
            padding: 12px 16px;
            font-size: 14px;
        }

        /* Settings Screen */
        .settings-screen {
            text-align: center;
        }

        .setting-group {
            margin-bottom: 32px;
            text-align: left;
        }

        .setting-label {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
            display: block;
        }

        .difficulty-options {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
        }

        .option-btn {
            padding: 12px 16px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .option-btn:hover {
            border-color: #667eea;
            color: #667eea;
        }

        .option-btn.selected {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }

        .time-options {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
        }

        /* Quiz Screen */
        .quiz-screen {
            text-align: center;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            margin-bottom: 32px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s ease;
        }

        .timer {
            font-size: 48px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 24px;
            font-variant-numeric: tabular-nums;
        }

        .timer.warning {
            color: #ff6b6b;
            animation: pulse 0.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.6;
            }
        }

        .problem {
            margin-bottom: 32px;
        }

        .problem-text {
            font-size: 48px;
            font-weight: 700;
            color: #333;
            margin-bottom: 24px;
            font-family: 'Courier New', monospace;
        }

        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .answer-input {
            flex: 1;
            padding: 16px;
            font-size: 24px;
            border: 2px solid #ddd;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            transition: border-color 0.3s ease;
        }

        .answer-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .answer-input.correct {
            border-color: #51cf66;
            background: #f0fdf4;
        }

        .answer-input.incorrect {
            border-color: #ff6b6b;
            background: #fef2f2;
        }

        .feedback-text {
            font-size: 16px;
            font-weight: 600;
            min-height: 24px;
        }

        .feedback-text.correct {
            color: #51cf66;
        }

        .feedback-text.incorrect {
            color: #ff6b6b;
        }

        .btn-submit {
            min-width: 120px;
        }

        /* Results Screen */
        .results-screen {
            text-align: center;
        }

        .results-title {
            font-size: 28px;
            font-weight: 700;
            color: #333;
            margin-bottom: 32px;
        }

        .results-stats {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 32px;
            border-radius: 12px;
            margin-bottom: 32px;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 16px;
            font-size: 18px;
        }

        .result-row:last-child {
            margin-bottom: 0;
        }

        .result-label {
            text-align: left;
        }

        .result-value {
            font-weight: 700;
        }

        .score-message {
            font-size: 20px;
            font-weight: 600;
            color: #333;
            margin-bottom: 24px;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
        }

        .nav-buttons .btn {
            flex: 1;
        }

        .hint-text {
            font-size: 14px;
            color: #666;
            margin-top: 16px;
            font-style: italic;
        }

        @media (max-width: 480px) {
            .container {
                padding: 24px;
            }

            .title {
                font-size: 24px;
            }

            .problem-text {
                font-size: 36px;
            }

            .timer {
                font-size: 36px;
            }

            .difficulty-options,
            .time-options {
                grid-template-columns: 1fr 1fr;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">🧮 Math Practice Drills</div>
            <div class="subtitle">Improve your speed and accuracy</div>
        </div>

        <!-- Home Screen -->
        <div id="homeScreen" class="screen active home-screen">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="totalQuizzes">0</div>
                    <div class="stat-label">Quizzes Completed</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="averageScore">0%</div>
                    <div class="stat-label">Average Score</div>
                </div>
            </div>
            <div class="button-group">
                <button class="btn btn-primary" onclick="goToSettings()">Start Practice</button>
                <button class="btn btn-secondary btn-small" onclick="resetStats()">Reset Stats</button>
            </div>
        </div>

        <!-- Settings Screen -->
        <div id="settingsScreen" class="screen settings-screen">
            <div class="setting-group">
                <label class="setting-label">📊 Difficulty Level</label>
                <div class="difficulty-options">
                    <button class="option-btn selected" data-difficulty="easy" onclick="selectDifficulty(this)">Easy</button>
                    <button class="option-btn" data-difficulty="medium" onclick="selectDifficulty(this)">Medium</button>
                    <button class="option-btn" data-difficulty="hard" onclick="selectDifficulty(this)">Hard</button>
                </div>
            </div>

            <div class="setting-group">
                <label class="setting-label">⏱️ Quiz Duration</label>
                <div class="time-options">
                    <button class="option-btn" data-time="30" onclick="selectTime(this)">30 sec</button>
                    <button class="option-btn selected" data-time="60" onclick="selectTime(this)">1 min</button>
                    <button class="option-btn" data-time="120" onclick="selectTime(this)">2 min</button>
                </div>
            </div>

            <div class="button-group">
                <button class="btn btn-primary" onclick="startQuiz()">Begin Quiz</button>
                <button class="btn btn-secondary btn-small" onclick="goHome()">Back</button>
            </div>
        </div>

        <!-- Quiz Screen -->
        <div id="quizScreen" class="screen quiz-screen">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>

            <div class="timer" id="timer">60</div>

            <div class="problem">
                <div class="problem-text" id="problemText">5 + 3</div>
                <div class="input-group">
                    <input type="number" class="answer-input" id="answerInput" placeholder="Enter answer" autofocus>
                    <button class="btn btn-primary btn-submit" onclick="submitAnswer()">Submit</button>
                </div>
                <div class="feedback-text" id="feedbackText"></div>
            </div>

            <div class="hint-text" id="hintText"></div>
        </div>

        <!-- Results Screen -->
        <div id="resultsScreen" class="screen results-screen">
            <div class="results-title">Quiz Complete! 🎉</div>

            <div class="results-stats">
                <div class="result-row">
                    <div class="result-label">Correct Answers:</div>
                    <div class="result-value" id="correctCount">0/0</div>
                </div>
                <div class="result-row">
                    <div class="result-label">Accuracy:</div>
                    <div class="result-value" id="accuracyPercent">0%</div>
                </div>
                <div class="result-row">
                    <div class="result-label">Average Time:</div>
                    <div class="result-value" id="avgTime">0.0s</div>
                </div>
            </div>

            <div class="score-message" id="scoreMessage"></div>

            <div class="button-group">
                <div class="nav-buttons">
                    <button class="btn btn-primary" onclick="goToSettings()">Try Again</button>
                    <button class="btn btn-secondary" onclick="goHome()">Home</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // State management
        let state = {
            difficulty: 'easy',
            duration: 60,
            currentProblem: null,
            answers: [],
            timeRemaining: 60,
            timerInterval: null,
            quizActive: false,
            startTime: null,
            problemStartTime: null
        };

        const difficultyConfig = {
            easy: {
                maxNum1: 10,
                maxNum2: 10,
                operations: ['+', '-'],
                label: 'Easy (1-10)'
            },
            medium: {
                maxNum1: 20,
                maxNum2: 20,
                operations: ['+', '-', '×'],
                label: 'Medium (1-20)'
            },
            hard: {
                maxNum1: 50,
                maxNum2: 50,
                operations: ['+', '-', '×', '÷'],
                label: 'Hard (1-50)'
            }
        };

        // Utility functions
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function generateProblem() {
            const config = difficultyConfig[state.difficulty];
            const op = config.operations[Math.floor(Math.random() * config.operations.length)];
            let num1, num2, answer;

            num1 = Math.floor(Math.random() * config.maxNum1) + 1;
            num2 = Math.floor(Math.random() * config.maxNum2) + 1;

            if (op === '+') {
                answer = num1 + num2;
            } else if (op === '-') {
                answer = num1 - num2;
            } else if (op === '×') {
                answer = num1 * num2;
            } else if (op === '÷') {
                // Ensure division is exact
                answer = Math.floor(Math.random() * 10) + 1;
                num1 = answer * num2;
            }

            return {
                num1,
                num2,
                operation: op,
                answer: Math.floor(answer),
                text: `${num1} ${op} ${num2} = ?`
            };
        }

        function displayProblem() {
            state.currentProblem = generateProblem();
            document.getElementById('problemText').textContent = state.currentProblem.text;
            document.getElementById('answerInput').value = '';
            document.getElementById('answerInput').className = 'answer-input';
            document.getElementById('feedbackText').textContent = '';
            document.getElementById('feedbackText').className = 'feedback-text';
            document.getElementById('answerInput').focus();
            state.problemStartTime = Date.now();
        }

        function submitAnswer() {
            const input = document.getElementById('answerInput');
            const userAnswer = parseInt(input.value, 10);

            if (isNaN(userAnswer)) {
                document.getElementById('feedbackText').textContent = 'Please enter a number';
                document.getElementById('feedbackText').className = 'feedback-text';
                return;
            }

            const isCorrect = userAnswer === state.currentProblem.answer;
            const timeTaken = (Date.now() - state.problemStartTime) / 1000;

            state.answers.push({
                problem: state.currentProblem,
                userAnswer,
                correct: isCorrect,
                time: timeTaken
            });

            if (isCorrect) {
                input.className = 'answer-input correct';
                document.getElementById('feedbackText').textContent = '✓ Correct!';
                document.getElementById('feedbackText').className = 'feedback-text correct';
            } else {
                input.className = 'answer-input incorrect';
                document.getElementById('feedbackText').textContent = `✗ Incorrect. Answer: ${state.currentProblem.answer}`;
                document.getElementById('feedbackText').className = 'feedback-text incorrect';
            }

            input.disabled = true;
            document.querySelector('.btn-submit').disabled = true;

            setTimeout(() => {
                if (state.quizActive) {
                    displayProblem();
                    input.disabled = false;
                    document.querySelector('.btn-submit').disabled = false;
                }
            }, 1000);
        }

        function updateTimer() {
            state.timeRemaining--;
            const timerEl = document.getElementById('timer');
            timerEl.textContent = state.timeRemaining;

            if (state.timeRemaining <= 10) {
                timerEl.classList.add('warning');
            } else {
                timerEl.classList.remove('warning');
            }

            const progress = ((state.duration - state.timeRemaining) / state.duration) * 100;
            document.getElementById('progressFill').style.width = progress + '%';

            if (state.timeRemaining <= 0) {
                endQuiz();
            }
        }

        function startTimer() {
            state.timerInterval = setInterval(updateTimer, 1000);
        }

        function stopTimer() {
            if (state.timerInterval) {
                clearInterval(state.timerInterval);
            }
        }

        function endQuiz() {
            state.quizActive = false;
            stopTimer();

            // Save stats
            const stats = JSON.parse(localStorage.getItem('mathStats')) || { quizzes: [], totalScore: 0 };
            const accuracy = state.answers.length > 0
                ? (state.answers.filter(a => a.correct).length / state.answers.length) * 100
                : 0;
            stats.quizzes.push({ accuracy, timestamp: Date.now() });
            stats.totalScore += accuracy;
            localStorage.setItem('mathStats', JSON.stringify(stats));

            showResults();
        }

        function showResults() {
            const correct = state.answers.filter(a => a.correct).length;
            const total = state.answers.length;
            const accuracy = total > 0 ? Math.round((correct / total) * 100) : 0;
            const avgTime = total > 0
                ? (state.answers.reduce((sum, a) => sum + a.time, 0) / total).toFixed(1)
                : 0;

            document.getElementById('correctCount').textContent = `${correct}/${total}`;
            document.getElementById('accuracyPercent').textContent = `${accuracy}%`;
            document.getElementById('avgTime').textContent = `${avgTime}s`;

            let message = '';
            if (accuracy === 100 && total > 0) {
                message = '🏆 Perfect score! You are unstoppable!';
            } else if (accuracy >= 90) {
                message = '⭐ Excellent work! Keep it up!';
            } else if (accuracy >= 75) {
                message = '👍 Good job! Practice makes perfect.';
            } else if (accuracy >= 50) {
                message = '💪 Nice effort! Keep practicing.';
            } else {
                message = '🌱 Keep practicing to improve!';
            }

            document.getElementById('scoreMessage').textContent = message;
            showScreen('resultsScreen');
        }

        function updateStats() {
            const stats = JSON.parse(localStorage.getItem('mathStats')) || { quizzes: [], totalScore: 0 };
            const quizCount = stats.quizzes.length;
            const avgScore = quizCount > 0 ? Math.round(stats.totalScore / quizCount) : 0;

            document.getElementById('totalQuizzes').textContent = quizCount;
            document.getElementById('averageScore').textContent = avgScore + '%';
        }

        // Navigation functions
        function goHome() {
            stopTimer();
            state.quizActive = false;
            updateStats();
            showScreen('homeScreen');
        }

        function goToSettings() {
            showScreen('settingsScreen');
        }

        function selectDifficulty(btn) {
            document.querySelectorAll('[data-difficulty]').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            state.difficulty = btn.dataset.difficulty;
        }

        function selectTime(btn) {
            document.querySelectorAll('[data-time]').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            state.duration = parseInt(btn.dataset.time, 10);
        }

        function startQuiz() {
            state.answers = [];
            state.timeRemaining = state.duration;
            state.quizActive = true;

            showScreen('quizScreen');
            displayProblem();
            startTimer();
            updateTimer();
        }

        function resetStats() {
            if (confirm('Reset all stats? This cannot be undone.')) {
                localStorage.removeItem('mathStats');
                updateStats();
            }
        }

        // Allow Enter key to submit
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && state.quizActive) {
                submitAnswer();
            }
        });

        // Initialize
        updateStats();
    </script>
</body>
</html>
