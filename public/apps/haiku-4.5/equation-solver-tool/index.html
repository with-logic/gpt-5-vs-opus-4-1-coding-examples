<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equation Solver Tool</title>
    <script src="https://cdn.jsdelivr.net/npm/mathjs@11.11.0/lib/browser/math.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            max-width: 800px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 32px;
            color: #1a202c;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .header p {
            color: #718096;
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        .input-section {
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            font-family: "Monaco", "Courier New", monospace;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #4299e1;
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.1);
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 14px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: #4299e1;
            color: white;
            flex: 1;
        }

        .btn-primary:hover {
            background: #3182ce;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(66, 153, 225, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #edf2f7;
            color: #2d3748;
        }

        .btn-secondary:hover {
            background: #e2e8f0;
        }

        .btn-secondary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .help-text {
            margin-top: 8px;
            font-size: 12px;
            color: #a0aec0;
        }

        .results-section {
            display: none;
        }

        .results-section.active {
            display: block;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .solution-box {
            background: #f7fafc;
            border-left: 4px solid #4299e1;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
        }

        .solution-box.error {
            border-left-color: #f56565;
            background: #fff5f5;
        }

        .solution-box.error .label {
            color: #c53030;
        }

        .label {
            font-size: 12px;
            color: #718096;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .solution-value {
            font-size: 24px;
            font-family: "Monaco", "Courier New", monospace;
            color: #2d3748;
            font-weight: 600;
            word-break: break-all;
        }

        .steps-container {
            margin-top: 20px;
        }

        .step {
            background: white;
            padding: 16px;
            margin-bottom: 12px;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
            animation: fadeIn 0.3s ease-out;
        }

        .step:last-child {
            margin-bottom: 0;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .step-number {
            display: inline-block;
            background: #4299e1;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            text-align: center;
            line-height: 28px;
            font-size: 12px;
            font-weight: 600;
            margin-right: 10px;
            margin-bottom: 8px;
        }

        .step-description {
            font-size: 13px;
            color: #4a5568;
            line-height: 1.5;
            margin-top: 8px;
        }

        .step-equation {
            font-family: "Monaco", "Courier New", monospace;
            color: #2d3748;
            margin-top: 8px;
            padding: 8px 12px;
            background: #f7fafc;
            border-radius: 4px;
            font-size: 14px;
            word-break: break-all;
        }

        .export-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 10px;
        }

        .export-section.hidden {
            display: none;
        }

        .error-message {
            background: #fff5f5;
            border: 1px solid #feb2b2;
            color: #742a2a;
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 14px;
            margin-top: 10px;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 16px;
        }

        .stat {
            background: white;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
        }

        .stat-label {
            font-size: 11px;
            color: #a0aec0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 14px;
            color: #2d3748;
            font-weight: 600;
            font-family: "Monaco", "Courier New", monospace;
        }

        .clear-button {
            margin-left: auto;
            background: #fc8181;
            color: white;
        }

        .clear-button:hover {
            background: #f56565;
        }

        @media (max-width: 600px) {
            .container {
                padding: 24px;
            }

            .header h1 {
                font-size: 24px;
            }

            .input-group {
                flex-direction: column;
            }

            .button-group {
                flex-direction: column;
            }

            .button-group button {
                width: 100%;
            }

            .stats {
                grid-template-columns: 1fr;
            }

            .export-section {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Equation Solver</h1>
            <p>Solve and understand mathematical equations step by step</p>
        </div>

        <div class="input-section">
            <div class="input-group">
                <input
                    type="text"
                    id="equationInput"
                    placeholder="Enter equation (e.g., 2x + 5 = 13)"
                    autocomplete="off"
                >
            </div>
            <div class="button-group">
                <button class="btn-primary" id="solveBtn">Solve</button>
                <button class="btn-secondary" id="clearBtn">Clear</button>
            </div>
            <div class="help-text">
                Supported: linear equations, quadratic equations, expressions. Use 'x' as variable.
            </div>
        </div>

        <div class="results-section" id="resultsSection">
            <div id="solutionContainer"></div>
        </div>
    </div>

    <script>
        const equationInput = document.getElementById('equationInput');
        const solveBtn = document.getElementById('solveBtn');
        const clearBtn = document.getElementById('clearBtn');
        const resultsSection = document.getElementById('resultsSection');
        const solutionContainer = document.getElementById('solutionContainer');

        solveBtn.addEventListener('click', solveEquation);
        clearBtn.addEventListener('click', clearResults);
        equationInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') solveEquation();
        });

        function solveEquation() {
            const input = equationInput.value.trim();
            if (!input) {
                showError('Please enter an equation');
                return;
            }

            try {
                solutionContainer.innerHTML = '';

                let result;
                if (input.includes('=')) {
                    result = solveEquationMode(input);
                } else {
                    result = simplifyMode(input);
                }

                displaySolution(result);
                resultsSection.classList.add('active');
            } catch (error) {
                showError(error.message);
                resultsSection.classList.add('active');
            }
        }

        function solveEquationMode(input) {
            const [left, right] = input.split('=').map(s => s.trim());

            const leftExpr = left.replace(/x/g, '(x)');
            const rightExpr = right.replace(/x/g, '(x)');

            let steps = [];
            let currentLeft = left;
            let currentRight = right;

            steps.push({
                description: 'Original equation',
                equation: `${left} = ${right}`
            });

            try {
                const xCoeff = extractLinearCoefficient(left, right);

                if (xCoeff.isLinear) {
                    const solution = solveLinearEquation(left, right);

                    steps.push({
                        description: 'Rearrange to isolate variable',
                        equation: `${xCoeff.simplified}`
                    });

                    steps.push({
                        description: 'Solve for x',
                        equation: `x = ${formatNumber(solution)}`
                    });

                    return {
                        type: 'equation',
                        solution: solution,
                        steps: steps,
                        isQuadratic: false
                    };
                }

                const quadSol = solveQuadratic(input);
                if (quadSol) {
                    return {
                        type: 'equation',
                        solution: quadSol.solutions,
                        steps: quadSol.steps,
                        isQuadratic: true
                    };
                }

                throw new Error('Could not solve equation. Supported: linear and quadratic equations.');
            } catch (e) {
                throw new Error('Could not parse equation. Please check syntax.');
            }
        }

        function extractLinearCoefficient(left, right) {
            try {
                const leftFunc = math.compile(left);
                const rightFunc = math.compile(right);

                const leftAt1 = leftFunc.evaluate({ x: 1 });
                const leftAt2 = leftFunc.evaluate({ x: 2 });
                const rightVal = rightFunc.evaluate({ x: 0 });

                const coeff = (leftAt1 - leftAt2);
                const constant = leftAt1 - coeff;

                if (Math.abs(coeff) < 0.0001) {
                    return { isLinear: false };
                }

                const simplified = `${formatNumber(coeff)}x = ${formatNumber(rightVal - constant)}`;
                return {
                    isLinear: true,
                    coefficient: coeff,
                    simplified: simplified
                };
            } catch (e) {
                return { isLinear: false };
            }
        }

        function solveLinearEquation(left, right) {
            try {
                const leftFunc = math.compile(left);
                const rightFunc = math.compile(right);

                const y1 = leftFunc.evaluate({ x: 0 });
                const y2 = leftFunc.evaluate({ x: 1 });
                const slope = y2 - y1;

                if (Math.abs(slope) < 0.0001) {
                    throw new Error('No unique solution');
                }

                const rightVal = rightFunc.evaluate({ x: 0 });
                const solution = (rightVal - y1) / slope;

                const verification = leftFunc.evaluate({ x: solution });
                if (Math.abs(verification - rightVal) > 0.0001) {
                    throw new Error('Solution verification failed');
                }

                return solution;
            } catch (e) {
                throw new Error('Unable to solve this linear equation');
            }
        }

        function solveQuadratic(input) {
            try {
                const [left, right] = input.split('=').map(s => s.trim());
                const expression = `(${left}) - (${right})`;

                const compiledExpr = math.compile(expression);

                let a, b, c;
                const h = 0.001;

                const f = (x) => compiledExpr.evaluate({ x });
                const f0 = f(0);
                const f1 = f(1);
                const f2 = f(2);

                const fd1 = (f1 - f0) / 1;
                const fd2 = (f2 - 2*f1 + f0) / 1;

                a = fd2 / 2;
                b = fd1 - a;
                c = f0;

                if (Math.abs(a) < 0.001) {
                    return null;
                }

                const discriminant = b*b - 4*a*c;

                if (discriminant < 0) {
                    const realPart = -b / (2*a);
                    const imagPart = Math.sqrt(-discriminant) / (2*a);
                    return {
                        solutions: [
                            { real: realPart, imag: imagPart, isComplex: true },
                            { real: realPart, imag: -imagPart, isComplex: true }
                        ],
                        steps: generateQuadraticSteps(a, b, c, discriminant)
                    };
                }

                const sol1 = (-b + Math.sqrt(discriminant)) / (2*a);
                const sol2 = (-b - Math.sqrt(discriminant)) / (2*a);

                return {
                    solutions: [sol1, sol2],
                    steps: generateQuadraticSteps(a, b, c, discriminant)
                };
            } catch (e) {
                return null;
            }
        }

        function generateQuadraticSteps(a, b, c, discriminant) {
            return [
                {
                    description: 'Standard form: ax² + bx + c = 0',
                    equation: `a = ${formatNumber(a)}, b = ${formatNumber(b)}, c = ${formatNumber(c)}`
                },
                {
                    description: 'Calculate discriminant (b² - 4ac)',
                    equation: `Δ = ${formatNumber(discriminant)}`
                },
                {
                    description: 'Apply quadratic formula: x = (-b ± √Δ) / 2a',
                    equation: `x = ${formatNumber(-b / (2*a))} ± ${formatNumber(Math.sqrt(Math.abs(discriminant)) / (2*a))}`
                }
            ];
        }

        function simplifyMode(input) {
            try {
                const result = math.simplify(input).toString();
                const evaluated = math.evaluate(input);

                return {
                    type: 'simplify',
                    input: input,
                    simplified: result,
                    evaluated: evaluated,
                    steps: [
                        {
                            description: 'Original expression',
                            equation: input
                        },
                        {
                            description: 'Simplified form',
                            equation: result
                        },
                        {
                            description: 'Numerical value',
                            equation: `≈ ${formatNumber(evaluated)}`
                        }
                    ]
                };
            } catch (e) {
                throw new Error('Invalid expression. Please check syntax.');
            }
        }

        function displaySolution(result) {
            let html = '<div class="solution-box">';

            if (result.type === 'equation') {
                html += '<div class="label">Solution</div>';
                if (result.isQuadratic) {
                    if (result.solution[0].isComplex) {
                        html += `<div class="solution-value">
                            x₁ = ${formatNumber(result.solution[0].real)} + ${formatNumber(result.solution[0].imag)}i<br>
                            x₂ = ${formatNumber(result.solution[1].real)} - ${formatNumber(result.solution[1].imag)}i
                        </div>`;
                    } else {
                        html += `<div class="solution-value">
                            x₁ = ${formatNumber(result.solution[0])}<br>
                            x₂ = ${formatNumber(result.solution[1])}
                        </div>`;
                    }
                } else {
                    html += `<div class="solution-value">x = ${formatNumber(result.solution)}</div>`;
                }
            } else {
                html += '<div class="label">Simplified Result</div>';
                html += `<div class="solution-value">${escapeHtml(result.simplified)}</div>`;
                if (typeof result.evaluated === 'number') {
                    html += `<div style="margin-top: 8px; font-size: 13px; color: #718096;">≈ ${formatNumber(result.evaluated)}</div>`;
                }
            }

            html += '</div>';

            if (result.steps && result.steps.length > 0) {
                html += '<div class="steps-container">';
                html += '<div class="label" style="margin-bottom: 12px;">Step-by-Step Breakdown</div>';
                result.steps.forEach((step, index) => {
                    html += `
                        <div class="step">
                            <span class="step-number">${index + 1}</span>
                            <div>
                                <div style="font-weight: 600; color: #2d3748; font-size: 14px;">${escapeHtml(step.description)}</div>
                                <div class="step-equation">${escapeHtml(step.equation)}</div>
                            </div>
                        </div>
                    `;
                });
                html += '</div>';
            }

            html += createExportSection(result);

            solutionContainer.innerHTML = html;
        }

        function createExportSection(result) {
            return `
                <div class="export-section">
                    <button class="btn-secondary" onclick="exportToText(event)">Download as Text</button>
                    <button class="btn-secondary" onclick="copyToClipboard(event)">Copy to Clipboard</button>
                </div>
            `;
        }

        function exportToText(event) {
            event.preventDefault();
            const equationText = equationInput.value;
            const content = solutionContainer.innerText;

            const fullContent = `Equation Solver Results\n${'='.repeat(50)}\n\nEquation: ${equationText}\n\n${content}`;

            const blob = new Blob([fullContent], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'equation_solution.txt';
            a.click();
            URL.revokeObjectURL(url);
        }

        function copyToClipboard(event) {
            event.preventDefault();
            const content = solutionContainer.innerText;
            navigator.clipboard.writeText(content).then(() => {
                const btn = event.target;
                const originalText = btn.textContent;
                btn.textContent = 'Copied!';
                setTimeout(() => {
                    btn.textContent = originalText;
                }, 2000);
            });
        }

        function showError(message) {
            const errorHtml = `
                <div class="solution-box error">
                    <div class="label">Error</div>
                    <div class="error-message">${escapeHtml(message)}</div>
                </div>
            `;
            solutionContainer.innerHTML = errorHtml;
        }

        function clearResults() {
            equationInput.value = '';
            equationInput.focus();
            resultsSection.classList.remove('active');
            solutionContainer.innerHTML = '';
        }

        function formatNumber(num) {
            if (typeof num !== 'number') return String(num);
            if (Number.isInteger(num)) return String(num);

            const rounded = Math.round(num * 1000000) / 1000000;
            if (Math.abs(rounded) < 0.00001 || Math.abs(rounded) > 1000000) {
                return rounded.toExponential(4);
            }

            return rounded.toString();
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        equationInput.focus();
    </script>
</body>
</html>
