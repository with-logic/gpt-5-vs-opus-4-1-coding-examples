<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regex Lab - Learn & Test Regular Expressions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        body.dark-mode {
            background-color: #0f172a;
            color: #e2e8f0;
        }

        body.light-mode {
            background-color: #f8fafc;
            color: #1e293b;
        }

        .terminal-window {
            border-radius: 8px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            overflow: hidden;
            transition: box-shadow 0.3s ease;
        }

        .dark-mode .terminal-window {
            background-color: #1e293b;
            border: 1px solid #334155;
        }

        .light-mode .terminal-window {
            background-color: #ffffff;
            border: 1px solid #cbd5e1;
        }

        .terminal-header {
            display: flex;
            gap: 8px;
            padding: 8px 16px;
            border-bottom: 1px solid;
            align-items: center;
        }

        .dark-mode .terminal-header {
            background-color: #334155;
            border-bottom-color: #475569;
        }

        .light-mode .terminal-header {
            background-color: #e2e8f0;
            border-bottom-color: #cbd5e1;
        }

        .traffic-light {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            opacity: 0.8;
        }

        .red { background-color: #ef4444; }
        .yellow { background-color: #eab308; }
        .green { background-color: #22c55e; }

        .terminal-content {
            padding: 20px;
        }

        textarea {
            resize: vertical;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 13px;
            line-height: 1.6;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        .dark-mode textarea {
            background-color: #0f172a;
            color: #e2e8f0;
            border-color: #475569;
        }

        .dark-mode textarea:focus {
            background-color: #0f172a;
            color: #e2e8f0;
            border-color: #3b82f6;
            outline: none;
        }

        .light-mode textarea {
            background-color: #f1f5f9;
            color: #1e293b;
            border-color: #cbd5e1;
        }

        .light-mode textarea:focus {
            background-color: #f1f5f9;
            color: #1e293b;
            border-color: #3b82f6;
            outline: none;
        }

        input[type="text"],
        input[type="checkbox"] {
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        .dark-mode input[type="text"] {
            background-color: #0f172a;
            color: #e2e8f0;
            border-color: #475569;
        }

        .dark-mode input[type="text"]:focus {
            background-color: #0f172a;
            color: #e2e8f0;
            border-color: #3b82f6;
            outline: none;
        }

        .light-mode input[type="text"] {
            background-color: #f1f5f9;
            color: #1e293b;
            border-color: #cbd5e1;
        }

        .light-mode input[type="text"]:focus {
            background-color: #f1f5f9;
            color: #1e293b;
            border-color: #3b82f6;
            outline: none;
        }

        .match-highlight {
            background-color: #3b82f6;
            color: white;
            padding: 2px 4px;
            border-radius: 2px;
            font-weight: 500;
        }

        .group-color-1 { background-color: #fbbf24; }
        .group-color-2 { background-color: #f87171; }
        .group-color-3 { background-color: #60a5fa; }
        .group-color-4 { background-color: #34d399; }
        .group-color-5 { background-color: #a78bfa; }
        .group-color-6 { background-color: #fb7185; }

        .dark-mode .match-highlight {
            background-color: #3b82f6;
            color: white;
        }

        .light-mode .match-highlight {
            background-color: #2563eb;
            color: white;
        }

        .error-message {
            padding: 12px 16px;
            border-radius: 4px;
            margin-bottom: 16px;
            display: none;
            align-items: center;
            gap: 8px;
        }

        .error-message.show {
            display: flex;
        }

        .dark-mode .error-message {
            background-color: #7f1d1d;
            color: #fecaca;
            border: 1px solid #991b1b;
        }

        .light-mode .error-message {
            background-color: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .token-button {
            padding: 6px 12px;
            border-radius: 4px;
            border: 1px solid;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .dark-mode .token-button {
            background-color: #334155;
            border-color: #475569;
            color: #e2e8f0;
        }

        .dark-mode .token-button:hover {
            background-color: #475569;
            border-color: #64748b;
        }

        .light-mode .token-button {
            background-color: #e2e8f0;
            border-color: #cbd5e1;
            color: #1e293b;
        }

        .light-mode .token-button:hover {
            background-color: #cbd5e1;
            border-color: #94a3b8;
        }

        .action-button {
            padding: 8px 16px;
            border-radius: 4px;
            border: none;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .primary-button {
            background-color: #3b82f6;
            color: white;
        }

        .primary-button:hover {
            background-color: #2563eb;
        }

        .dark-mode .secondary-button {
            background-color: #334155;
            color: #e2e8f0;
            border: 1px solid #475569;
        }

        .dark-mode .secondary-button:hover {
            background-color: #475569;
        }

        .light-mode .secondary-button {
            background-color: #e2e8f0;
            color: #1e293b;
            border: 1px solid #cbd5e1;
        }

        .light-mode .secondary-button:hover {
            background-color: #cbd5e1;
        }

        .match-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
            font-size: 13px;
        }

        .dark-mode .match-table {
            color: #e2e8f0;
        }

        .light-mode .match-table {
            color: #1e293b;
        }

        .match-table th,
        .match-table td {
            padding: 8px 12px;
            text-align: left;
            border-bottom: 1px solid;
        }

        .dark-mode .match-table th,
        .dark-mode .match-table td {
            border-bottom-color: #475569;
        }

        .dark-mode .match-table th {
            background-color: #1e293b;
            color: #64748b;
            font-weight: 600;
        }

        .light-mode .match-table th,
        .light-mode .match-table td {
            border-bottom-color: #cbd5e1;
        }

        .light-mode .match-table th {
            background-color: #f1f5f9;
            color: #64748b;
            font-weight: 600;
        }

        .dark-mode .match-table tr:hover {
            background-color: #1e293b;
        }

        .light-mode .match-table tr:hover {
            background-color: #f8fafc;
        }

        .copy-btn {
            padding: 4px 8px;
            font-size: 11px;
            cursor: pointer;
            border-radius: 2px;
            border: none;
            transition: all 0.2s ease;
        }

        .dark-mode .copy-btn {
            background-color: #475569;
            color: #e2e8f0;
        }

        .dark-mode .copy-btn:hover {
            background-color: #64748b;
        }

        .light-mode .copy-btn {
            background-color: #cbd5e1;
            color: #1e293b;
        }

        .light-mode .copy-btn:hover {
            background-color: #94a3b8;
        }

        .copy-feedback {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 16px;
            border-radius: 4px;
            background-color: #22c55e;
            color: white;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            z-index: 1000;
        }

        .copy-feedback.show {
            opacity: 1;
        }

        .explanation-code {
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 12px;
            padding: 8px;
            border-radius: 4px;
            display: inline-block;
            margin: 0 4px;
        }

        .dark-mode .explanation-code {
            background-color: #0f172a;
            color: #60a5fa;
        }

        .light-mode .explanation-code {
            background-color: #f1f5f9;
            color: #2563eb;
        }

        .toggle-switch {
            position: relative;
            display: inline-flex;
            width: 48px;
            height: 24px;
            background-color: #cbd5e1;
            border-radius: 12px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .toggle-switch.active {
            background-color: #3b82f6;
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background-color: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: left 0.3s ease;
        }

        .toggle-switch.active::after {
            left: 26px;
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid;
            gap: 0;
            margin-bottom: 16px;
        }

        .dark-mode .tabs {
            border-bottom-color: #475569;
        }

        .light-mode .tabs {
            border-bottom-color: #cbd5e1;
        }

        .tab {
            padding: 12px 16px;
            cursor: pointer;
            font-weight: 500;
            border-bottom: 2px solid transparent;
            transition: all 0.2s ease;
        }

        .dark-mode .tab {
            color: #64748b;
            border-bottom-color: transparent;
        }

        .dark-mode .tab:hover {
            color: #cbd5e1;
        }

        .dark-mode .tab.active {
            color: #3b82f6;
            border-bottom-color: #3b82f6;
        }

        .light-mode .tab {
            color: #94a3b8;
            border-bottom-color: transparent;
        }

        .light-mode .tab:hover {
            color: #475569;
        }

        .light-mode .tab.active {
            color: #2563eb;
            border-bottom-color: #2563eb;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            user-select: none;
            font-weight: 500;
        }

        .dark-mode .checkbox-label {
            color: #e2e8f0;
        }

        .light-mode .checkbox-label {
            color: #1e293b;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #3b82f6;
        }

        .dark-mode .output-section {
            background-color: #0f172a;
            border: 1px solid #475569;
        }

        .light-mode .output-section {
            background-color: #f8fafc;
            border: 1px solid #cbd5e1;
        }

        .output-section {
            border-radius: 4px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .section-title {
            font-weight: 600;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .dark-mode .section-title {
            color: #cbd5e1;
        }

        .light-mode .section-title {
            color: #1e293b;
        }

        .text-highlight {
            word-break: break-all;
            white-space: pre-wrap;
            line-height: 1.8;
        }

        .no-matches {
            font-style: italic;
            opacity: 0.7;
        }

        .flag-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            margin-right: 4px;
            margin-bottom: 4px;
        }

        .dark-mode .flag-badge {
            background-color: #1e293b;
            color: #60a5fa;
        }

        .light-mode .flag-badge {
            background-color: #dbeafe;
            color: #1e40af;
        }
    </style>
</head>
<body class="dark-mode">
    <div class="min-h-screen p-6">
        <div class="max-w-7xl mx-auto">
            <!-- Header -->
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h1 class="text-4xl font-bold mb-2">Regex Lab</h1>
                    <p class="opacity-70">Learn and test regular expressions with live feedback</p>
                </div>
                <button id="darkModeToggle" class="toggle-switch active" title="Toggle dark/light mode"></button>
            </div>

            <!-- Main Layout -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <!-- Left Panel: Input -->
                <div>
                    <div class="terminal-window mb-6">
                        <div class="terminal-header">
                            <div class="traffic-light red"></div>
                            <div class="traffic-light yellow"></div>
                            <div class="traffic-light green"></div>
                            <span class="ml-4 text-sm font-medium">Pattern Input</span>
                        </div>
                        <div class="terminal-content">
                            <!-- Pattern Input -->
                            <div class="mb-4">
                                <label class="block text-sm font-medium mb-2">Regular Expression Pattern</label>
                                <input type="text" id="patternInput" placeholder="e.g., \b\w+@\w+\.\w+\b" class="w-full px-3 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 focus:ring-offset-0">
                            </div>

                            <!-- Error Message -->
                            <div id="errorMessage" class="error-message">
                                <span>⚠️</span>
                                <span id="errorText"></span>
                            </div>

                            <!-- Flags -->
                            <div class="mb-4">
                                <label class="block text-sm font-medium mb-3">Flags</label>
                                <div class="grid grid-cols-3 gap-3">
                                    <label class="checkbox-label">
                                        <input type="checkbox" id="flagG" data-flag="g">
                                        <span>Global (g)</span>
                                    </label>
                                    <label class="checkbox-label">
                                        <input type="checkbox" id="flagI" data-flag="i">
                                        <span>Ignore Case (i)</span>
                                    </label>
                                    <label class="checkbox-label">
                                        <input type="checkbox" id="flagM" data-flag="m">
                                        <span>Multiline (m)</span>
                                    </label>
                                    <label class="checkbox-label">
                                        <input type="checkbox" id="flagS" data-flag="s">
                                        <span>Dotall (s)</span>
                                    </label>
                                    <label class="checkbox-label">
                                        <input type="checkbox" id="flagU" data-flag="u">
                                        <span>Unicode (u)</span>
                                    </label>
                                    <label class="checkbox-label">
                                        <input type="checkbox" id="flagY" data-flag="y">
                                        <span>Sticky (y)</span>
                                    </label>
                                </div>
                            </div>

                            <!-- Test Text -->
                            <div class="mb-4">
                                <label class="block text-sm font-medium mb-2">Test Text</label>
                                <textarea id="testText" class="w-full px-3 py-2 border rounded-md h-48" placeholder="Enter text to test the regex pattern..."></textarea>
                            </div>

                            <!-- Quick Insert Buttons -->
                            <div class="mb-4">
                                <label class="block text-sm font-medium mb-2">Quick Insert</label>
                                <div class="grid grid-cols-2 gap-2 text-xs">
                                    <button class="token-button" data-token="\d">Digit (\d)</button>
                                    <button class="token-button" data-token="\D">Not Digit (\D)</button>
                                    <button class="token-button" data-token="\w">Word (\w)</button>
                                    <button class="token-button" data-token="\W">Not Word (\W)</button>
                                    <button class="token-button" data-token="\s">Space (\s)</button>
                                    <button class="token-button" data-token="\S">Not Space (\S)</button>
                                    <button class="token-button" data-token="[A-Za-z]">Char Range</button>
                                    <button class="token-button" data-token="[A-Z]">Uppercase</button>
                                    <button class="token-button" data-token="[a-z]">Lowercase</button>
                                    <button class="token-button" data-token=".">Any Char (.)</button>
                                    <button class="token-button" data-token=".*">Any Sequence</button>
                                    <button class="token-button" data-token="+">One or More (+)</button>
                                    <button class="token-button" data-token="*">Zero or More (*)</button>
                                    <button class="token-button" data-token="?">Optional (?)</button>
                                    <button class="token-button" data-token="(?=)">Lookahead</button>
                                    <button class="token-button" data-token="(?!)">Neg Lookahead</button>
                                    <button class="token-button" data-token="(...)">Group</button>
                                    <button class="token-button" data-token="|">Or Pipe (|)</button>
                                    <button class="token-button" data-token="^">Start (^)</button>
                                    <button class="token-button" data-token="$">End ($)</button>
                                    <button class="token-button" data-token="\b">Word Boundary</button>
                                    <button class="token-button" data-token="{m,n}">Quantifier</button>
                                </div>
                            </div>

                            <!-- Action Buttons -->
                            <div class="flex gap-3">
                                <button id="clearBtn" class="action-button secondary-button flex-1">Clear</button>
                                <button id="shareBtn" class="action-button primary-button flex-1">Copy Permalink</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Right Panel: Output -->
                <div>
                    <!-- Matched Text Preview -->
                    <div class="terminal-window mb-6">
                        <div class="terminal-header">
                            <div class="traffic-light red"></div>
                            <div class="traffic-light yellow"></div>
                            <div class="traffic-light green"></div>
                            <span class="ml-4 text-sm font-medium">Matches Preview</span>
                        </div>
                        <div class="terminal-content">
                            <div id="matchesPreview" class="text-highlight">No matches yet</div>
                        </div>
                    </div>

                    <!-- Tabs for Details -->
                    <div class="terminal-window">
                        <div class="terminal-header">
                            <div class="traffic-light red"></div>
                            <div class="traffic-light yellow"></div>
                            <div class="traffic-light green"></div>
                            <span class="ml-4 text-sm font-medium">Details</span>
                        </div>
                        <div class="terminal-content">
                            <div class="tabs">
                                <div class="tab active" data-tab="matches-table">Matches</div>
                                <div class="tab" data-tab="explanation">Explanation</div>
                            </div>

                            <!-- Matches Table Tab -->
                            <div id="matches-table" class="tab-content active">
                                <div id="matchesTableContainer">
                                    <p class="no-matches">No matches yet</p>
                                </div>
                            </div>

                            <!-- Explanation Tab -->
                            <div id="explanation" class="tab-content">
                                <div id="explanationContainer">
                                    <p class="no-matches">Enter a pattern to see explanation</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Copy Feedback -->
    <div id="copyFeedback" class="copy-feedback">✓ Copied to clipboard!</div>

    <script>
        // State management
        const state = {
            pattern: '',
            flags: '',
            testText: '',
            isDarkMode: true
        };

        // DOM elements
        const patternInput = document.getElementById('patternInput');
        const testText = document.getElementById('testText');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const matchesPreview = document.getElementById('matchesPreview');
        const matchesTableContainer = document.getElementById('matchesTableContainer');
        const explanationContainer = document.getElementById('explanationContainer');
        const darkModeToggle = document.getElementById('darkModeToggle');
        const clearBtn = document.getElementById('clearBtn');
        const shareBtn = document.getElementById('shareBtn');
        const copyFeedback = document.getElementById('copyFeedback');
        const tabButtons = document.querySelectorAll('.tab');
        const flagCheckboxes = document.querySelectorAll('input[data-flag]');
        const tokenButtons = document.querySelectorAll('.token-button');

        // Initialize from URL hash if present
        function initializeFromHash() {
            const hash = window.location.hash.slice(1);
            if (hash) {
                try {
                    const decoded = atob(decodeURIComponent(hash));
                    const [pattern, flags, text] = decoded.split('|');
                    patternInput.value = pattern || '';
                    testText.value = text || '';
                    state.pattern = pattern || '';
                    state.testText = text || '';

                    // Set flags
                    if (flags) {
                        for (let i = 0; i < flagCheckboxes.length; i++) {
                            const flag = flagCheckboxes[i].dataset.flag;
                            flagCheckboxes[i].checked = flags.includes(flag);
                        }
                        state.flags = flags;
                    }
                } catch (e) {
                    // Silent fail for invalid hash
                }
            }
        }

        // Dark mode toggle
        darkModeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            document.body.classList.toggle('light-mode');
            state.isDarkMode = document.body.classList.contains('dark-mode');
            darkModeToggle.classList.toggle('active');
            localStorage.setItem('darkMode', state.isDarkMode);
        });

        // Load dark mode preference
        const savedDarkMode = localStorage.getItem('darkMode');
        if (savedDarkMode === 'false') {
            darkModeToggle.click();
        }

        // Clear button
        clearBtn.addEventListener('click', () => {
            patternInput.value = '';
            testText.value = '';
            state.pattern = '';
            state.testText = '';
            flagCheckboxes.forEach(cb => cb.checked = false);
            state.flags = '';
            updateResults();
        });

        // Share button
        shareBtn.addEventListener('click', () => {
            const data = `${state.pattern}|${state.flags}|${state.testText}`;
            const encoded = btoa(data);
            const url = `${window.location.origin}${window.location.pathname}#${encodeURIComponent(encoded)}`;
            navigator.clipboard.writeText(url).then(() => {
                copyFeedback.classList.add('show');
                setTimeout(() => copyFeedback.classList.remove('show'), 2000);
            });
        });

        // Flag checkboxes
        flagCheckboxes.forEach(checkbox => {
            checkbox.addEventListener('change', () => {
                state.flags = Array.from(flagCheckboxes)
                    .filter(cb => cb.checked)
                    .map(cb => cb.dataset.flag)
                    .join('');
                updateResults();
            });
        });

        // Pattern input
        patternInput.addEventListener('input', (e) => {
            state.pattern = e.target.value;
            updateResults();
        });

        // Test text input
        testText.addEventListener('input', (e) => {
            state.testText = e.target.value;
            updateResults();
        });

        // Token buttons
        tokenButtons.forEach(button => {
            button.addEventListener('click', () => {
                const token = button.dataset.token;
                const start = patternInput.selectionStart;
                const end = patternInput.selectionEnd;
                const before = patternInput.value.substring(0, start);
                const after = patternInput.value.substring(end);
                patternInput.value = before + token + after;
                state.pattern = patternInput.value;
                patternInput.focus();
                patternInput.setSelectionRange(start + token.length, start + token.length);
                updateResults();
            });
        });

        // Tab switching
        tabButtons.forEach(button => {
            button.addEventListener('click', () => {
                const tabName = button.dataset.tab;
                document.querySelectorAll('.tab-content').forEach(content => {
                    content.classList.remove('active');
                });
                document.getElementById(tabName).classList.add('active');
                tabButtons.forEach(btn => btn.classList.remove('active'));
                button.classList.add('active');
            });
        });

        // Regex execution
        function tryRegex() {
            if (!state.pattern) {
                return {
                    valid: true,
                    matches: [],
                    error: null
                };
            }

            try {
                const regex = new RegExp(state.pattern, state.flags);
                const matches = [];
                let match;

                if (state.flags.includes('g')) {
                    while ((match = regex.exec(state.testText)) !== null) {
                        matches.push({
                            text: match[0],
                            index: match.index,
                            groups: Array.from(match).slice(1)
                        });
                    }
                } else {
                    match = regex.exec(state.testText);
                    if (match) {
                        matches.push({
                            text: match[0],
                            index: match.index,
                            groups: Array.from(match).slice(1)
                        });
                    }
                }

                return {
                    valid: true,
                    matches,
                    error: null
                };
            } catch (e) {
                return {
                    valid: false,
                    matches: [],
                    error: e.message
                };
            }
        }

        // Color assignment for groups
        function getGroupColor(index) {
            const colors = ['group-color-1', 'group-color-2', 'group-color-3', 'group-color-4', 'group-color-5', 'group-color-6'];
            return colors[index % colors.length];
        }

        // Update all results
        function updateResults() {
            const result = tryRegex();

            // Error handling
            if (!result.valid) {
                errorMessage.classList.add('show');
                errorText.textContent = result.error;
                matchesPreview.innerHTML = '<div class="no-matches">Invalid regex pattern</div>';
                matchesTableContainer.innerHTML = '<p class="no-matches">Invalid regex pattern</p>';
                explanationContainer.innerHTML = '<p class="no-matches">Invalid regex pattern</p>';
                return;
            } else {
                errorMessage.classList.remove('show');
            }

            // Update matches preview
            if (result.matches.length === 0) {
                matchesPreview.innerHTML = '<div class="no-matches">No matches found</div>';
                matchesTableContainer.innerHTML = '<p class="no-matches">No matches found</p>';
            } else {
                let highlightedText = state.testText;
                const positions = result.matches.map(m => ({
                    start: m.index,
                    end: m.index + m.text.length,
                    groups: m.groups
                })).sort((a, b) => b.start - a.start);

                // Build highlighted preview
                let preview = state.testText;
                positions.forEach(pos => {
                    const before = preview.substring(0, pos.start);
                    const match = preview.substring(pos.start, pos.end);
                    const after = preview.substring(pos.end);
                    preview = before + '<span class="match-highlight">' + escapeHtml(match) + '</span>' + after;
                });
                matchesPreview.innerHTML = preview;

                // Build matches table
                let tableHtml = '<table class="match-table"><thead><tr><th>Match</th><th>Index</th><th>Length</th><th>Groups</th></tr></thead><tbody>';
                result.matches.forEach((match, idx) => {
                    const groupsHtml = match.groups.length > 0
                        ? match.groups.map((g, i) => `<span class="${getGroupColor(i)}" style="padding: 2px 6px; border-radius: 2px; color: ${document.body.classList.contains('dark-mode') ? 'white' : 'white'}">${escapeHtml(g || '(empty)')}</span>`).join(' ')
                        : '<span class="no-matches">-</span>';

                    tableHtml += `<tr>
                        <td><code>${escapeHtml(match.text)}</code></td>
                        <td>${match.index}</td>
                        <td>${match.text.length}</td>
                        <td>${groupsHtml}</td>
                    </tr>`;
                });
                tableHtml += '</tbody></table>';
                matchesTableContainer.innerHTML = tableHtml;
            }

            // Update explanation
            updateExplanation();
        }

        // Explanation
        function updateExplanation() {
            if (!state.pattern) {
                explanationContainer.innerHTML = '<p class="no-matches">Enter a pattern to see explanation</p>';
                return;
            }

            const explanations = {
                '\\d': 'Matches any digit (0-9)',
                '\\D': 'Matches any non-digit character',
                '\\w': 'Matches any word character (a-z, A-Z, 0-9, _)',
                '\\W': 'Matches any non-word character',
                '\\s': 'Matches any whitespace character (space, tab, newline, etc.)',
                '\\S': 'Matches any non-whitespace character',
                '\\b': 'Matches a word boundary',
                '\\B': 'Matches a non-word boundary',
                '.': 'Matches any character except newline (unless s flag is set)',
                '*': 'Matches 0 or more of the preceding element',
                '+': 'Matches 1 or more of the preceding element',
                '?': 'Matches 0 or 1 of the preceding element',
                '^': 'Matches the start of a string (or line with m flag)',
                '$': 'Matches the end of a string (or line with m flag)',
                '|': 'Matches either the pattern on the left or right',
                '()': 'Creates a capturing group',
                '(?:)': 'Creates a non-capturing group',
                '(?=)': 'Positive lookahead assertion',
                '(?!)': 'Negative lookahead assertion',
                '[abc]': 'Matches any character in the set',
                '[^abc]': 'Matches any character not in the set',
                '{m,n}': 'Matches between m and n occurrences'
            };

            let html = '<div style="font-size: 13px; line-height: 1.6;">';

            // Show flags explanation
            if (state.flags) {
                html += '<div class="mb-4"><strong>Active Flags:</strong><div style="margin-top: 8px;">';
                const flagExplanations = {
                    'g': 'Global - Find all matches instead of just the first',
                    'i': 'Ignore Case - Pattern matching is case-insensitive',
                    'm': 'Multiline - ^ and $ match line boundaries instead of string boundaries',
                    's': 'Dotall - . matches newline characters',
                    'u': 'Unicode - Enable full Unicode support',
                    'y': 'Sticky - Only matches from the lastIndex position'
                };

                for (let flag of state.flags) {
                    html += `<div class="flag-badge">${flag.toUpperCase()}</div> ${flagExplanations[flag]}<br>`;
                }
                html += '</div></div>';
            }

            // Show pattern breakdown
            html += '<div><strong>Pattern Analysis:</strong><div style="margin-top: 8px; font-family: monospace; font-size: 12px;">';
            let hasExplanation = false;

            for (const [key, value] of Object.entries(explanations)) {
                if (state.pattern.includes(key)) {
                    html += `<div style="margin-bottom: 6px;"><span class="explanation-code">${escapeHtml(key)}</span> → ${value}</div>`;
                    hasExplanation = true;
                }
            }

            if (!hasExplanation) {
                html += `<div style="margin-bottom: 6px;">Pattern: <span class="explanation-code">${escapeHtml(state.pattern)}</span></div>`;
            }

            html += '</div></div>';

            explanationContainer.innerHTML = html;
        }

        // Utility function to escape HTML
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Initialize
        initializeFromHash();
        updateResults();
    </script>
</body>
</html>
