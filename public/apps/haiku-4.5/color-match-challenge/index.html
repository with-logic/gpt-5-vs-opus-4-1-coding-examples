<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Match Challenge</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        .header {
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            gap: 20px;
            margin-top: 20px;
        }

        .stat {
            flex: 1;
            padding: 15px;
            background: #f5f7fa;
            border-radius: 10px;
            border: 2px solid #e0e7ff;
        }

        .stat-label {
            font-size: 0.9em;
            color: #666;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 2em;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .game-area {
            margin: 40px 0;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .word-display {
            font-size: 5em;
            font-weight: 900;
            letter-spacing: -2px;
            margin-bottom: 30px;
            font-family: 'Arial Black', sans-serif;
            animation: wordPop 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        @keyframes wordPop {
            0% {
                transform: scale(0.8);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .color-button {
            aspect-ratio: 1;
            border: none;
            border-radius: 15px;
            font-weight: 700;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: white;
            font-family: 'Arial Black', sans-serif;
        }

        .color-button:active {
            transform: scale(0.95);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .color-button:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
        }

        .color-button:disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }

        .correct-feedback {
            animation: correctPulse 0.4s ease;
        }

        @keyframes correctPulse {
            0% {
                transform: scale(1);
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            }
            50% {
                transform: scale(1.1);
                box-shadow: 0 0 30px rgba(76, 175, 80, 0.6);
            }
            100% {
                transform: scale(1);
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            }
        }

        .wrong-feedback {
            animation: wrongShake 0.4s ease;
        }

        @keyframes wrongShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .start-button, .restart-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1em;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .start-button:hover, .restart-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .start-button:active, .restart-button:active {
            transform: translateY(0);
        }

        .game-over-message {
            font-size: 1.3em;
            color: #333;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .hidden {
            display: none;
        }

        .timer-warning {
            animation: timerPulse 1s infinite;
        }

        @keyframes timerPulse {
            0%, 100% { color: #f44336; }
            50% { color: #d32f2f; }
        }

        .info-text {
            color: #999;
            font-size: 0.9em;
            margin-top: 20px;
            font-style: italic;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 2em;
            }

            .word-display {
                font-size: 4em;
            }

            .color-button {
                font-size: 0.95em;
            }

            .stats {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎨 Color Match</h1>
            <div class="stats">
                <div class="stat">
                    <div class="stat-label">Score</div>
                    <div class="stat-value" id="score">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Time</div>
                    <div class="stat-value" id="timer">30</div>
                </div>
            </div>
        </div>

        <div class="game-area">
            <div id="gameContent" class="hidden">
                <div class="word-display" id="wordDisplay">RED</div>
                <div class="buttons-grid" id="buttonsGrid"></div>
            </div>

            <div id="startScreen">
                <div class="game-over-message">Test your color perception!</div>
                <p style="color: #666; margin-bottom: 30px; font-size: 1em;">
                    Click the button that matches the <strong>color</strong> of the word,<br/>
                    not the word itself.
                </p>
                <button class="start-button" onclick="startGame()">Start Game</button>
                <p class="info-text">You have 30 seconds. How many can you get right?</p>
            </div>

            <div id="gameOverScreen" class="hidden">
                <div class="game-over-message">Game Over!</div>
                <div style="font-size: 1.5em; margin-bottom: 30px; color: #667eea; font-weight: 700;">
                    Final Score: <span id="finalScore">0</span>
                </div>
                <button class="restart-button" onclick="startGame()">Play Again</button>
            </div>
        </div>
    </div>

    <script>
        const colors = [
            { name: 'RED', hex: '#e74c3c' },
            { name: 'BLUE', hex: '#3498db' },
            { name: 'GREEN', hex: '#2ecc71' },
            { name: 'YELLOW', hex: '#f39c12' },
            { name: 'PURPLE', hex: '#9b59b6' },
            { name: 'ORANGE', hex: '#e67e22' },
            { name: 'PINK', hex: '#e91e63' },
            { name: 'CYAN', hex: '#1abc9c' }
        ];

        let score = 0;
        let timeLeft = 30;
        let gameActive = false;
        let timerInterval = null;
        let currentCorrectColor = null;

        function startGame() {
            score = 0;
            timeLeft = 30;
            gameActive = true;

            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            document.getElementById('gameContent').classList.remove('hidden');

            updateScore();
            generateNewRound();
            startTimer();
        }

        function startTimer() {
            updateTimerDisplay();
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const timerElement = document.getElementById('timer');
            timerElement.textContent = timeLeft;
            if (timeLeft <= 10) {
                timerElement.classList.add('timer-warning');
            } else {
                timerElement.classList.remove('timer-warning');
            }
        }

        function generateNewRound() {
            if (!gameActive) return;

            // Select a random color for display (word)
            const wordColorObj = colors[Math.floor(Math.random() * colors.length)];

            // Select a different color to actually display
            let actualColor;
            do {
                actualColor = colors[Math.floor(Math.random() * colors.length)];
            } while (actualColor.name === wordColorObj.name);

            currentCorrectColor = actualColor.name;

            // Display the word in the actual color
            const wordDisplay = document.getElementById('wordDisplay');
            wordDisplay.textContent = wordColorObj.name;
            wordDisplay.style.color = actualColor.hex;

            // Create shuffle array of 4 colors with correct answer included
            const buttonColors = [actualColor];
            const otherColors = colors.filter(c => c.name !== actualColor.name);
            while (buttonColors.length < 4) {
                const randomColor = otherColors[Math.floor(Math.random() * otherColors.length)];
                if (!buttonColors.find(c => c.name === randomColor.name)) {
                    buttonColors.push(randomColor);
                }
            }

            // Shuffle buttons
            for (let i = buttonColors.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [buttonColors[i], buttonColors[j]] = [buttonColors[j], buttonColors[i]];
            }

            // Render buttons
            const grid = document.getElementById('buttonsGrid');
            grid.innerHTML = '';
            buttonColors.forEach(color => {
                const button = document.createElement('button');
                button.className = 'color-button';
                button.style.backgroundColor = color.hex;
                button.textContent = color.name;
                button.onclick = () => handleColorClick(color.name, button);
                button.disabled = !gameActive;
                grid.appendChild(button);
            });
        }

        function handleColorClick(selectedColor, buttonElement) {
            if (!gameActive) return;

            const isCorrect = selectedColor === currentCorrectColor;

            if (isCorrect) {
                score++;
                buttonElement.classList.add('correct-feedback');
                updateScore();
                setTimeout(() => {
                    buttonElement.classList.remove('correct-feedback');
                    generateNewRound();
                }, 300);
            } else {
                buttonElement.classList.add('wrong-feedback');
                setTimeout(() => {
                    buttonElement.classList.remove('wrong-feedback');
                }, 400);
            }
        }

        function updateScore() {
            document.getElementById('score').textContent = score;
        }

        function endGame() {
            gameActive = false;
            clearInterval(timerInterval);

            document.getElementById('gameContent').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.remove('hidden');
            document.getElementById('finalScore').textContent = score;
        }
    </script>
</body>
</html>
