<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Rain</title>
    <link href="https://cdn.tailwindcss.com" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background: #0f172a;
        }

        #gameContainer {
            width: 100vw;
            height: 100vh;
            position: relative;
            background: linear-gradient(180deg, #1a1f3a 0%, #0f172a 50%, #1a1f35 100%);
            overflow: hidden;
        }

        /* City skyline background */
        .skyline {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 30%;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400"><defs><linearGradient id="grad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:%23152e4d;stop-opacity:1" /><stop offset="100%" style="stop-color:%230a0e1a;stop-opacity:1" /></linearGradient></defs><rect width="1200" height="400" fill="url(%23grad)"/><rect x="50" y="150" width="80" height="250" fill="%23243447"/><rect x="180" y="100" width="100" height="300" fill="%232a3f57"/><rect x="350" y="120" width="90" height="280" fill="%23243447"/><rect x="500" y="80" width="120" height="320" fill="%232a3f57"/><rect x="700" y="140" width="85" height="260" fill="%23243447"/><rect x="850" y="110" width="110" height="290" fill="%232a3f57"/><rect x="1050" y="130" width="100" height="270" fill="%23243447"/></svg>') repeat-x;
            background-size: auto 100%;
            background-position: bottom;
            pointer-events: none;
        }

        .rain-container {
            position: absolute;
            width: 100%;
            height: 70%;
            top: 0;
            left: 0;
        }

        .rain-word {
            position: absolute;
            color: #4f9eff;
            font-weight: 600;
            font-size: 1.25rem;
            text-shadow: 0 0 10px rgba(79, 158, 255, 0.8);
            cursor: default;
            user-select: none;
            letter-spacing: 1px;
            transition: color 0.1s ease;
        }

        .rain-word.typed {
            color: #10b981;
            text-shadow: 0 0 15px rgba(16, 185, 129, 0.8);
        }

        .rain-word.complete {
            color: #34d399;
            text-shadow: 0 0 20px rgba(52, 211, 153, 0.8);
        }

        .ui-container {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 1.5rem;
            z-index: 100;
            color: white;
            font-size: 0.95rem;
        }

        .ui-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            gap: 2rem;
        }

        .ui-stat {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            background: rgba(15, 23, 42, 0.7);
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            border: 1px solid rgba(79, 158, 255, 0.3);
        }

        .ui-label {
            color: #94a3b8;
            font-size: 0.85rem;
        }

        .ui-value {
            font-size: 1.25rem;
            font-weight: 700;
            color: #4f9eff;
        }

        #currentWord {
            font-size: 1.5rem;
            font-weight: 700;
            color: #60a5fa;
            background: rgba(30, 58, 138, 0.5);
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            border-left: 3px solid #60a5fa;
        }

        #inputField {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            max-width: 90%;
            padding: 0.75rem 1rem;
            border: 2px solid #4f9eff;
            border-radius: 0.5rem;
            background: rgba(15, 23, 42, 0.9);
            color: white;
            font-size: 1rem;
            outline: none;
            z-index: 200;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        #inputField:focus {
            border-color: #60a5fa;
            box-shadow: 0 0 20px rgba(96, 165, 250, 0.5);
        }

        .game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 300;
            color: white;
            text-align: center;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .game-over-content h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: #fbbf24;
            text-shadow: 0 0 30px rgba(251, 191, 36, 0.5);
        }

        .game-over-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2rem;
            margin-bottom: 2rem;
            padding: 2rem;
            background: rgba(30, 58, 138, 0.3);
            border-radius: 1rem;
            border: 1px solid rgba(79, 158, 255, 0.3);
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .stat-item .label {
            font-size: 0.9rem;
            color: #94a3b8;
        }

        .stat-item .value {
            font-size: 2rem;
            font-weight: 700;
            color: #4f9eff;
        }

        .restart-btn {
            padding: 1rem 2rem;
            background: linear-gradient(135deg, #4f9eff, #60a5fa);
            border: none;
            border-radius: 0.5rem;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .restart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(79, 158, 255, 0.6);
        }

        .restart-btn:active {
            transform: scale(0.95);
        }

        .difficulty-indicator {
            display: flex;
            gap: 0.25rem;
            align-items: center;
        }

        .difficulty-bar {
            width: 4px;
            height: 16px;
            background: rgba(79, 158, 255, 0.3);
            border-radius: 2px;
            transition: background 0.3s ease;
        }

        .difficulty-bar.active {
            background: #4f9eff;
            box-shadow: 0 0 8px rgba(79, 158, 255, 0.6);
        }

        .combo-indicator {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.5rem;
            font-weight: 700;
            color: #fbbf24;
            text-shadow: 0 0 20px rgba(251, 191, 36, 0.8);
            pointer-events: none;
            z-index: 150;
            animation: comboFloat 1s ease-out forwards;
        }

        @keyframes comboFloat {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -150%);
            }
        }

        .particle {
            position: absolute;
            pointer-events: none;
        }

        .particle-dot {
            width: 8px;
            height: 8px;
            background: #4f9eff;
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(79, 158, 255, 0.8);
            animation: particleFloat 1s ease-out forwards;
        }

        @keyframes particleFloat {
            0% {
                opacity: 1;
                transform: translate(0, 0);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty));
            }
        }

        .rain-effect {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .rain-line {
            position: absolute;
            width: 1px;
            background: linear-gradient(180deg, rgba(79, 158, 255, 0.6), transparent);
            opacity: 0.4;
        }

        @media (max-width: 768px) {
            #inputField {
                width: 70vw;
            }

            .game-over-stats {
                grid-template-columns: 1fr;
                gap: 1rem;
            }

            .ui-row {
                gap: 1rem;
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div class="rain-effect"></div>

        <div class="ui-container">
            <div class="ui-row">
                <div class="ui-stat">
                    <span class="ui-label">SCORE</span>
                    <span class="ui-value" id="scoreDisplay">0</span>
                </div>
                <div class="ui-stat">
                    <span class="ui-label">ACCURACY</span>
                    <span class="ui-value" id="accuracyDisplay">100%</span>
                </div>
                <div class="ui-stat">
                    <span class="ui-label">COMBO</span>
                    <span class="ui-value" id="comboDisplay">0</span>
                </div>
                <div class="ui-stat">
                    <span class="ui-label">DIFFICULTY</span>
                    <div class="difficulty-indicator" id="difficultyIndicator">
                        <div class="difficulty-bar active"></div>
                        <div class="difficulty-bar"></div>
                        <div class="difficulty-bar"></div>
                    </div>
                </div>
            </div>
            <div id="currentWord" style="display: inline-block;"></div>
        </div>

        <div class="rain-container" id="rainContainer"></div>
        <div class="skyline"></div>

        <input
            type="text"
            id="inputField"
            placeholder="Type here..."
            autocomplete="off"
            spellcheck="false"
        >
    </div>

    <script>
        // Game state
        const game = {
            score: 0,
            combo: 0,
            accuracy: 1,
            totalKeystrokes: 0,
            correctKeystrokes: 0,
            currentDifficulty: 1,
            gameActive: true,
            activeWord: null,
            words: [
                'RAIN', 'STORM', 'CLOUD', 'THUNDER', 'LIGHTNING', 'DROPS',
                'FLOOD', 'WIND', 'WEATHER', 'FALLING', 'WATER', 'SKY',
                'GREY', 'DARK', 'FLASH', 'RUMBLE', 'DRIZZLE', 'DELUGE',
                'TYPE', 'SPEED', 'CATCH', 'QUICK', 'REACT', 'FOCUS',
                'FAST', 'SLOW', 'RISE', 'FALL', 'SURGE', 'WAVE'
            ],
            fallingWords: []
        };

        const elements = {
            container: document.getElementById('gameContainer'),
            rainContainer: document.getElementById('rainContainer'),
            inputField: document.getElementById('inputField'),
            scoreDisplay: document.getElementById('scoreDisplay'),
            accuracyDisplay: document.getElementById('accuracyDisplay'),
            comboDisplay: document.getElementById('comboDisplay'),
            currentWord: document.getElementById('currentWord'),
            difficultyIndicator: document.getElementById('difficultyIndicator'),
            rainEffect: document.querySelector('.rain-effect')
        };

        // Initialize
        function init() {
            elements.inputField.focus();
            elements.currentWord.textContent = '';
            createRainEffect();
            spawnWord();
            gameLoop();
        }

        function createRainEffect() {
            const rainCount = 15;
            for (let i = 0; i < rainCount; i++) {
                const line = document.createElement('div');
                line.className = 'rain-line';
                line.style.left = (Math.random() * 100) + '%';
                line.style.height = (50 + Math.random() * 150) + 'px';
                line.style.top = (Math.random() * 100) + '%';
                line.style.animation = `fall ${2 + Math.random() * 1}s linear infinite`;
                line.style.animationDelay = (Math.random() * 2) + 's';
                elements.rainEffect.appendChild(line);
            }

            // Add CSS animation
            if (!document.querySelector('style[data-rain]')) {
                const style = document.createElement('style');
                style.setAttribute('data-rain', '');
                style.textContent = `
                    @keyframes fall {
                        to {
                            transform: translateY(100vh);
                        }
                    }
                `;
                document.head.appendChild(style);
            }
        }

        function spawnWord() {
            if (!game.gameActive) return;

            const word = game.words[Math.floor(Math.random() * game.words.length)];
            const x = Math.random() * (window.innerWidth - 100);
            const duration = Math.max(3000 - game.currentDifficulty * 300, 1500);

            const wordEl = document.createElement('div');
            wordEl.className = 'rain-word';
            wordEl.textContent = word;
            wordEl.style.left = x + 'px';
            wordEl.style.top = '-50px';

            const wordObj = {
                element: wordEl,
                word: word,
                typed: '',
                x: x,
                y: -50,
                duration: duration,
                elapsed: 0,
                complete: false
            };

            elements.rainContainer.appendChild(wordEl);
            game.fallingWords.push(wordObj);

            const spawnRate = Math.max(1500 - game.currentDifficulty * 250, 500);
            setTimeout(spawnWord, spawnRate);
        }

        function gameLoop() {
            const containerHeight = elements.rainContainer.clientHeight;
            const now = Date.now();

            for (let i = game.fallingWords.length - 1; i >= 0; i--) {
                const wordObj = game.fallingWords[i];

                if (!wordObj.complete) {
                    const progress = Math.min(wordObj.elapsed / wordObj.duration, 1);
                    wordObj.y = -50 + progress * (containerHeight + 50);
                    wordObj.element.style.top = wordObj.y + 'px';
                }

                // Word reached bottom without being typed
                if (wordObj.y > containerHeight && !wordObj.complete) {
                    removeWord(i, false);
                    endGame();
                    return;
                }
            }

            // Update elapsed time
            for (let word of game.fallingWords) {
                word.elapsed += 16;
            }

            requestAnimationFrame(gameLoop);
        }

        function removeWord(index, isComplete = false) {
            const wordObj = game.fallingWords[index];
            if (wordObj.element.parentNode) {
                wordObj.element.parentNode.removeChild(wordObj.element);
            }
            game.fallingWords.splice(index, 1);
        }

        elements.inputField.addEventListener('input', (e) => {
            const input = e.target.value.toUpperCase();
            game.totalKeystrokes++;

            if (game.fallingWords.length === 0) return;

            let matched = false;
            for (let i = 0; i < game.fallingWords.length; i++) {
                const wordObj = game.fallingWords[i];
                if (wordObj.complete) continue;

                const word = wordObj.word;

                if (input.length <= word.length && word.startsWith(input)) {
                    matched = true;
                    game.activeWord = wordObj;

                    // Visual feedback
                    wordObj.element.classList.remove('typed');
                    if (input.length > 0) {
                        wordObj.element.classList.add('typed');
                    }

                    // Show current word being typed
                    elements.currentWord.textContent = word;

                    if (input === word) {
                        // Word completed
                        wordObj.complete = true;
                        wordObj.element.classList.add('complete');

                        game.score += Math.floor(100 * (game.combo / 10 + 1));
                        game.combo++;
                        game.correctKeystrokes += input.length;

                        // Spawn combo indicator
                        if (game.combo > 1 && game.combo % 5 === 0) {
                            showCombo();
                        }

                        // Spawn particles
                        spawnParticles(parseInt(wordObj.element.style.left), parseInt(wordObj.element.style.top));

                        // Clear input and remove word
                        setTimeout(() => {
                            const idx = game.fallingWords.indexOf(wordObj);
                            if (idx !== -1) removeWord(idx);
                            elements.inputField.value = '';
                            elements.currentWord.textContent = '';
                        }, 100);

                        // Increase difficulty
                        game.currentDifficulty = 1 + Math.floor(game.score / 500);
                        updateDifficultyIndicator();

                        break;
                    }
                } else if (input.length > 0 && word.startsWith(input.substring(0, input.length - 1))) {
                    // Wrong key pressed
                    wordObj.element.style.color = '#ef4444';
                    wordObj.element.style.textShadow = '0 0 15px rgba(239, 68, 68, 0.8)';
                    game.combo = 0;
                    setTimeout(() => {
                        wordObj.element.style.color = '#4f9eff';
                        wordObj.element.style.textShadow = '0 0 10px rgba(79, 158, 255, 0.8)';
                    }, 150);
                    break;
                }
            }

            updateStats();
        });

        function showCombo() {
            const combo = document.createElement('div');
            combo.className = 'combo-indicator';
            combo.textContent = game.combo + ' 🔥';
            elements.container.appendChild(combo);
            setTimeout(() => combo.remove(), 1000);
        }

        function spawnParticles(x, y) {
            for (let i = 0; i < 8; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';

                const dot = document.createElement('div');
                dot.className = 'particle-dot';

                const angle = (Math.PI * 2 * i) / 8;
                const distance = 50;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;

                dot.style.setProperty('--tx', tx + 'px');
                dot.style.setProperty('--ty', ty + 'px');

                particle.appendChild(dot);
                elements.container.appendChild(particle);
                setTimeout(() => particle.remove(), 1000);
            }
        }

        function updateStats() {
            elements.scoreDisplay.textContent = game.score;
            elements.comboDisplay.textContent = game.combo;

            const accuracy = game.totalKeystrokes > 0
                ? (game.correctKeystrokes / game.totalKeystrokes * 100).toFixed(1)
                : 100;
            elements.accuracyDisplay.textContent = accuracy + '%';
        }

        function updateDifficultyIndicator() {
            const bars = elements.difficultyIndicator.querySelectorAll('.difficulty-bar');
            bars.forEach((bar, idx) => {
                if (idx < Math.min(game.currentDifficulty, 3)) {
                    bar.classList.add('active');
                } else {
                    bar.classList.remove('active');
                }
            });
        }

        function endGame() {
            game.gameActive = false;
            elements.inputField.disabled = true;

            const accuracy = game.totalKeystrokes > 0
                ? (game.correctKeystrokes / game.totalKeystrokes * 100).toFixed(1)
                : 100;

            const gameOverScreen = document.createElement('div');
            gameOverScreen.className = 'game-over-screen';
            gameOverScreen.innerHTML = `
                <div class="game-over-content">
                    <h1>GAME OVER</h1>
                    <div class="game-over-stats">
                        <div class="stat-item">
                            <span class="label">FINAL SCORE</span>
                            <span class="value">${game.score}</span>
                        </div>
                        <div class="stat-item">
                            <span class="label">ACCURACY</span>
                            <span class="value">${accuracy}%</span>
                        </div>
                        <div class="stat-item">
                            <span class="label">MAX COMBO</span>
                            <span class="value">${game.combo}</span>
                        </div>
                        <div class="stat-item">
                            <span class="label">DIFFICULTY</span>
                            <span class="value">LVL ${game.currentDifficulty}</span>
                        </div>
                    </div>
                    <button class="restart-btn">PLAY AGAIN</button>
                </div>
            `;

            elements.container.appendChild(gameOverScreen);

            gameOverScreen.querySelector('.restart-btn').addEventListener('click', () => {
                location.reload();
            });
        }

        // Start the game
        init();
    </script>
</body>
</html>
