<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown → Slides</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
        }

        .slide {
            display: none;
            width: 100%;
            height: 100%;
            padding: 60px;
            overflow-y: auto;
            background: white;
            position: absolute;
            top: 0;
            left: 0;
        }

        .slide.active {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .slide h1, .slide h2, .slide h3, .slide h4, .slide h5, .slide h6 {
            margin: 20px 0 10px 0;
            font-weight: 700;
            line-height: 1.3;
        }

        .slide h1 {
            font-size: 3.5rem;
            color: #1f2937;
        }

        .slide h2 {
            font-size: 2.5rem;
            color: #1f2937;
            margin-top: 0;
        }

        .slide h3 {
            font-size: 1.875rem;
            color: #374151;
        }

        .slide h4 {
            font-size: 1.5rem;
            color: #4b5563;
        }

        .slide p {
            font-size: 1.25rem;
            line-height: 1.8;
            color: #4b5563;
            margin: 15px 0;
        }

        .slide ul, .slide ol {
            margin: 20px 0 20px 40px;
            font-size: 1.1rem;
            line-height: 1.8;
            color: #4b5563;
        }

        .slide li {
            margin: 10px 0;
        }

        .slide code {
            background: #f3f4f6;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 0.95em;
            color: #d97706;
        }

        .slide pre {
            background: #1f2937;
            color: #f3f4f6;
            padding: 20px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 20px 0;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .slide pre code {
            background: none;
            padding: 0;
            color: #f3f4f6;
        }

        .slide blockquote {
            border-left: 4px solid #3b82f6;
            padding-left: 20px;
            margin: 20px 0;
            font-style: italic;
            color: #6b7280;
            font-size: 1.1rem;
        }

        .slide a {
            color: #3b82f6;
            text-decoration: none;
            border-bottom: 1px solid #3b82f6;
        }

        .slide a:hover {
            background: rgba(59, 130, 246, 0.1);
        }

        .slide strong {
            font-weight: 700;
            color: #1f2937;
        }

        .slide em {
            font-style: italic;
            color: #374151;
        }

        .slide hr {
            border: none;
            border-top: 2px solid #e5e7eb;
            margin: 40px 0;
        }

        .slide table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            font-size: 1rem;
        }

        .slide th, .slide td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e5e7eb;
        }

        .slide th {
            background: #f9fafb;
            font-weight: 700;
            color: #1f2937;
        }

        .slide img {
            max-width: 100%;
            max-height: 400px;
            margin: 20px 0;
            border-radius: 8px;
        }

        /* Dark theme */
        body.dark-theme .slide {
            background: #1f2937;
            color: #f3f4f6;
        }

        body.dark-theme .slide h1,
        body.dark-theme .slide h2,
        body.dark-theme .slide h3,
        body.dark-theme .slide h4 {
            color: #f3f4f6;
        }

        body.dark-theme .slide p,
        body.dark-theme .slide ul,
        body.dark-theme .slide ol,
        body.dark-theme .slide li {
            color: #d1d5db;
        }

        body.dark-theme .slide code {
            background: #374151;
            color: #fbbf24;
        }

        body.dark-theme .slide blockquote {
            border-left-color: #60a5fa;
            color: #9ca3af;
        }

        body.dark-theme .slide th {
            background: #374151;
            color: #f3f4f6;
        }

        body.dark-theme .slide th,
        body.dark-theme .slide td {
            border-bottom-color: #4b5563;
        }

        body.dark-theme .slide a {
            color: #60a5fa;
            border-bottom-color: #60a5fa;
        }

        body.dark-theme .slide a:hover {
            background: rgba(96, 165, 250, 0.1);
        }

        body.dark-theme .slide hr {
            border-top-color: #4b5563;
        }

        .viewer {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
            background: white;
        }

        body.dark-theme .viewer {
            background: #1f2937;
        }

        .controls {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px;
            background: white;
            border-top: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 50;
        }

        body.dark-theme .controls {
            background: #111827;
            border-top-color: #4b5563;
        }

        .slide-counter {
            color: #6b7280;
            font-size: 0.95rem;
            font-weight: 500;
        }

        body.dark-theme .slide-counter {
            color: #9ca3af;
        }

        .control-buttons {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        button {
            padding: 8px 16px;
            border: 1px solid #d1d5db;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            color: #374151;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        button:hover {
            background: #f9fafb;
            border-color: #9ca3af;
        }

        button:active {
            background: #f3f4f6;
        }

        body.dark-theme button {
            background: #374151;
            border-color: #4b5563;
            color: #f3f4f6;
        }

        body.dark-theme button:hover {
            background: #4b5563;
            border-color: #6b7280;
        }

        body.dark-theme button:active {
            background: #6b7280;
        }

        .fullscreen-button {
            padding: 8px 16px;
        }

        .theme-toggle {
            width: 44px;
            height: 24px;
            background: #d1d5db;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            position: relative;
            transition: background 0.3s;
            padding: 0;
        }

        .theme-toggle.dark {
            background: #3b82f6;
        }

        .theme-toggle-slider {
            position: absolute;
            top: 2px;
            left: 2px;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            transition: left 0.3s;
        }

        .theme-toggle.dark .theme-toggle-slider {
            left: 22px;
        }

        .editor-section {
            position: fixed;
            left: 0;
            top: 0;
            width: 400px;
            height: 100%;
            background: #f9fafb;
            border-right: 1px solid #e5e7eb;
            display: flex;
            flex-direction: column;
            z-index: 40;
            transition: transform 0.3s;
        }

        body.dark-theme .editor-section {
            background: #111827;
            border-right-color: #4b5563;
        }

        .editor-section.hidden {
            transform: translateX(-100%);
        }

        .editor-header {
            padding: 16px;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        body.dark-theme .editor-header {
            border-bottom-color: #4b5563;
        }

        .editor-title {
            font-weight: 700;
            color: #1f2937;
            font-size: 1rem;
        }

        body.dark-theme .editor-title {
            color: #f3f4f6;
        }

        .close-editor {
            background: none;
            border: none;
            color: #6b7280;
            padding: 4px 8px;
            cursor: pointer;
            font-size: 1.5rem;
        }

        body.dark-theme .close-editor {
            color: #9ca3af;
        }

        textarea {
            flex: 1;
            border: none;
            padding: 16px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 0.9rem;
            resize: none;
            outline: none;
            background: #f9fafb;
            color: #1f2937;
            line-height: 1.5;
        }

        body.dark-theme textarea {
            background: #1f2937;
            color: #f3f4f6;
        }

        .editor-footer {
            padding: 12px 16px;
            border-top: 1px solid #e5e7eb;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        body.dark-theme .editor-footer {
            border-top-color: #4b5563;
        }

        .footer-button {
            flex: 1;
            min-width: 120px;
            padding: 8px 12px;
            font-size: 0.85rem;
        }

        .main-content {
            margin-left: 400px;
            width: calc(100% - 400px);
            height: 100%;
            display: flex;
            flex-direction: column;
            transition: margin-left 0.3s, width 0.3s;
        }

        .main-content.expanded {
            margin-left: 0;
            width: 100%;
        }

        .toggle-editor {
            position: fixed;
            left: 16px;
            top: 16px;
            z-index: 45;
        }

        .toggle-editor.hidden {
            opacity: 0.5;
        }

        .keyboard-hint {
            position: fixed;
            top: 16px;
            right: 16px;
            font-size: 0.85rem;
            color: #9ca3af;
            z-index: 30;
            text-align: right;
        }

        body.dark-theme .keyboard-hint {
            color: #6b7280;
        }

        .keyboard-hint div {
            margin: 4px 0;
        }

        @media (max-width: 768px) {
            .editor-section {
                width: 100%;
                height: 50%;
                bottom: 0;
                left: 0;
                top: auto;
                border-right: none;
                border-top: 1px solid #e5e7eb;
            }

            .editor-section.hidden {
                transform: translateY(100%);
            }

            .main-content {
                margin-left: 0;
                width: 100%;
                height: 50%;
            }

            .main-content.expanded {
                height: 100%;
            }

            .keyboard-hint {
                display: none;
            }

            .controls {
                padding: 12px;
            }

            button {
                padding: 6px 12px;
                font-size: 0.85rem;
            }

            .slide {
                padding: 40px 20px;
            }

            .slide h1 {
                font-size: 2.5rem;
            }

            .slide h2 {
                font-size: 1.875rem;
            }

            .slide p {
                font-size: 1rem;
            }

            .slide ul, .slide ol {
                font-size: 0.95rem;
            }
        }

        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f4f6;
            border-top: 2px solid #3b82f6;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .slide-thumbnail {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f3f4f6;
            border-radius: 6px;
            overflow: hidden;
            cursor: pointer;
            font-size: 0.9rem;
            color: #6b7280;
            padding: 12px;
            text-align: center;
            transition: all 0.2s;
        }

        .slide-thumbnail:hover {
            background: #e5e7eb;
            transform: scale(1.05);
        }

        body.dark-theme .slide-thumbnail {
            background: #374151;
            color: #9ca3af;
        }

        body.dark-theme .slide-thumbnail:hover {
            background: #4b5563;
        }
    </style>
</head>
<body>
    <div class="editor-section" id="editorSection">
        <div class="editor-header">
            <div class="editor-title">Markdown Editor</div>
            <button class="close-editor" id="closeEditor">×</button>
        </div>
        <textarea id="markdownInput" placeholder="Enter your markdown here. Use --- to separate slides..."></textarea>
        <div class="editor-footer">
            <button class="footer-button" id="loadSampleBtn">Load Sample</button>
            <button class="footer-button" id="clearBtn">Clear</button>
        </div>
    </div>

    <div class="main-content" id="mainContent">
        <div class="viewer" id="viewer">
            <button class="toggle-editor hidden" id="toggleEditor">✎ Edit</button>
            <div class="keyboard-hint">
                <div>← → Navigate</div>
                <div>E Edit | F Fullscreen</div>
            </div>
        </div>
        <div class="controls">
            <div class="slide-counter">
                <span id="currentSlide">1</span> / <span id="totalSlides">1</span>
            </div>
            <div class="control-buttons">
                <button id="prevBtn">← Previous</button>
                <button id="nextBtn">Next →</button>
                <button id="fullscreenBtn">⛶ Fullscreen</button>
                <button class="theme-toggle" id="themeToggle">
                    <div class="theme-toggle-slider"></div>
                </button>
            </div>
        </div>
    </div>

    <script>
        const editorSection = document.getElementById('editorSection');
        const mainContent = document.getElementById('mainContent');
        const markdownInput = document.getElementById('markdownInput');
        const viewer = document.getElementById('viewer');
        const toggleEditor = document.getElementById('toggleEditor');
        const closeEditor = document.getElementById('closeEditor');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const themeToggle = document.getElementById('themeToggle');
        const loadSampleBtn = document.getElementById('loadSampleBtn');
        const clearBtn = document.getElementById('clearBtn');
        const currentSlideSpan = document.getElementById('currentSlide');
        const totalSlidesSpan = document.getElementById('totalSlides');

        let currentSlide = 0;
        let slides = [];

        const sampleMarkdown = `# Markdown → Slides

A professional presentation tool for markdown enthusiasts

---

## Features

- **Live Preview**: Edit and see changes instantly
- **Keyboard Navigation**: Arrow keys to move between slides
- **Dark Mode**: Toggle for comfortable viewing
- **Full-Screen**: Distraction-free presentation mode

---

## How to Use

1. Write or paste your markdown in the editor
2. Use \`---\` to separate slides
3. Navigate with arrow keys or buttons
4. Press F for fullscreen mode
5. Toggle dark mode for night presentations

---

## Markdown Support

### Headers
All heading levels are supported for your content structure

### Lists
- Bullet points work great
- For organized content
- Perfect for presentations

1. Numbered lists too
2. For step-by-step
3. Instructions

---

## Code & Formatting

\`\`\`javascript
// Beautiful code blocks
function greet(name) {
  return \`Hello, \${name}!\`;
}
\`\`\`

**Bold text** for emphasis, *italic* for notes, and \`inline code\` too.

---

## Advanced Features

| Feature | Keyboard | Notes |
|---------|----------|-------|
| Next Slide | → or N | Move forward |
| Previous | ← or P | Move backward |
| Fullscreen | F | Immersive mode |
| Edit | E | Toggle editor |
| Jump | 1-9 | Go to slide |

---

## Thank You!

Questions? Use the editor to customize this presentation.

Press the fullscreen button for presentation mode.`;

        function parseMarkdown(markdown) {
            const slideTexts = markdown.split(/\n---\n/);
            return slideTexts.map((text, index) => ({
                id: index,
                html: marked.parse(text.trim()),
                text: text.trim()
            }));
        }

        function renderSlides() {
            const slides_parsed = parseMarkdown(markdownInput.value);
            slides = slides_parsed;
            totalSlidesSpan.textContent = slides.length;

            viewer.querySelectorAll('.slide').forEach(el => el.remove());

            slides.forEach((slide) => {
                const slideDiv = document.createElement('div');
                slideDiv.className = 'slide';
                slideDiv.innerHTML = slide.html;
                viewer.appendChild(slideDiv);
            });

            goToSlide(Math.min(currentSlide, slides.length - 1));
        }

        function goToSlide(index) {
            if (index < 0 || index >= slides.length) return;

            const allSlides = viewer.querySelectorAll('.slide');
            allSlides.forEach(slide => slide.classList.remove('active'));

            if (allSlides[index]) {
                allSlides[index].classList.add('active');
            }

            currentSlide = index;
            currentSlideSpan.textContent = index + 1;
            updateToggleEditorState();
        }

        function nextSlide() {
            goToSlide(currentSlide + 1);
        }

        function prevSlide() {
            goToSlide(currentSlide - 1);
        }

        function updateToggleEditorState() {
            if (editorSection.classList.contains('hidden')) {
                toggleEditor.classList.remove('hidden');
            }
        }

        function toggleEditorPanel() {
            editorSection.classList.toggle('hidden');
            mainContent.classList.toggle('expanded');
            updateToggleEditorState();
        }

        function enterFullscreen() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            } else if (elem.webkitRequestFullscreen) {
                elem.webkitRequestFullscreen();
            }
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-theme');
            themeToggle.classList.toggle('dark');
            localStorage.setItem('theme', document.body.classList.contains('dark-theme') ? 'dark' : 'light');
        }

        function loadSample() {
            markdownInput.value = sampleMarkdown;
            renderSlides();
        }

        function clearEditor() {
            if (confirm('Clear all content?')) {
                markdownInput.value = '';
                renderSlides();
            }
        }

        // Event listeners
        markdownInput.addEventListener('input', () => {
            renderSlides();
        });

        prevBtn.addEventListener('click', prevSlide);
        nextBtn.addEventListener('click', nextSlide);
        fullscreenBtn.addEventListener('click', enterFullscreen);
        themeToggle.addEventListener('click', toggleTheme);
        toggleEditor.addEventListener('click', toggleEditorPanel);
        closeEditor.addEventListener('click', toggleEditorPanel);
        loadSampleBtn.addEventListener('click', loadSample);
        clearBtn.addEventListener('click', clearEditor);

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === 'n' || e.key === 'N') {
                if (document.activeElement !== markdownInput) nextSlide();
            } else if (e.key === 'ArrowLeft' || e.key === 'p' || e.key === 'P') {
                if (document.activeElement !== markdownInput) prevSlide();
            } else if (e.key === 'f' || e.key === 'F') {
                if (document.activeElement !== markdownInput) {
                    e.preventDefault();
                    enterFullscreen();
                }
            } else if (e.key === 'e' || e.key === 'E') {
                if (document.activeElement !== markdownInput) {
                    e.preventDefault();
                    toggleEditorPanel();
                }
            } else if (/^[1-9]$/.test(e.key)) {
                const num = parseInt(e.key) - 1;
                if (num < slides.length) {
                    goToSlide(num);
                }
            }
        });

        // Initialize theme
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.body.classList.add('dark-theme');
            themeToggle.classList.add('dark');
        }

        // Load sample on first load
        loadSample();
    </script>
</body>
</html>
