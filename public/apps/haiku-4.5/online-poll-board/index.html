<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Poll Board</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1000px;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
            animation: slideDown 0.6s ease-out;
        }

        h1 {
            font-size: 3.5rem;
            color: white;
            font-weight: 800;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .subtitle {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 500;
        }

        .polls-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
            animation: fadeIn 0.8s ease-out 0.2s both;
        }

        .poll-card {
            background: white;
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            position: relative;
        }

        .poll-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
        }

        .poll-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
        }

        .poll-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 20px;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            position: relative;
            overflow: hidden;
        }

        .option-button {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            background: white;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            color: #2d3748;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
            position: relative;
            z-index: 2;
        }

        .option-button:hover {
            border-color: #667eea;
            background: #f7f9ff;
            transform: translateX(4px);
        }

        .option-button:active {
            transform: translateX(2px);
        }

        .option-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            width: 0%;
            transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 1;
        }

        .option-button:hover .option-bar {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            opacity: 0.9;
        }

        .vote-animation {
            animation: voteSparkle 0.6s ease-out;
        }

        .result-container {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #e2e8f0;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .result-label {
            font-weight: 600;
            color: #4a5568;
            font-size: 0.95rem;
        }

        .result-stats {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .result-percentage {
            font-size: 1.1rem;
            font-weight: 700;
            color: #667eea;
            min-width: 40px;
            text-align: right;
        }

        .result-count {
            font-size: 0.85rem;
            color: #718096;
            min-width: 45px;
            text-align: right;
        }

        .result-bar-container {
            position: relative;
            width: 100%;
            height: 6px;
            background: #e2e8f0;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .result-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 3px;
            width: 0%;
            transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .vote-counter {
            text-align: center;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 2px solid #e2e8f0;
        }

        .total-votes {
            font-size: 0.9rem;
            color: #718096;
            font-weight: 500;
        }

        .total-votes-number {
            font-size: 1.5rem;
            font-weight: 800;
            color: #667eea;
            animation: countUp 0.5s ease-out;
        }

        .vote-feedback {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: white;
            padding: 16px 24px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            font-weight: 600;
            color: #667eea;
            animation: slideUp 0.3s ease-out;
            pointer-events: none;
            z-index: 1000;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes voteSparkle {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
            100% {
                transform: scale(1);
            }
        }

        @keyframes countUp {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }

            .polls-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .poll-card {
                padding: 20px;
            }

            .poll-title {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>✨ Poll Board</h1>
            <p class="subtitle">Vote on your favorite topics and see live results</p>
        </header>

        <div class="polls-grid" id="pollsContainer"></div>
    </div>

    <script>
        // Mock poll data
        const pollsData = [
            {
                id: 1,
                title: "What's your favorite programming language?",
                options: [
                    { label: "JavaScript", votes: 142 },
                    { label: "Python", votes: 189 },
                    { label: "TypeScript", votes: 95 },
                    { label: "Go", votes: 67 }
                ]
            },
            {
                id: 2,
                title: "Which frontend framework do you prefer?",
                options: [
                    { label: "React", votes: 234 },
                    { label: "Vue", votes: 127 },
                    { label: "Angular", votes: 89 },
                    { label: "Svelte", votes: 156 }
                ]
            },
            {
                id: 3,
                title: "What's your ideal work environment?",
                options: [
                    { label: "Remote", votes: 312 },
                    { label: "Office", votes: 98 },
                    { label: "Hybrid", votes: 287 },
                    { label: "No preference", votes: 43 }
                ]
            },
            {
                id: 4,
                title: "How many hours of sleep do you get?",
                options: [
                    { label: "Less than 6 hours", votes: 67 },
                    { label: "6-8 hours", votes: 456 },
                    { label: "8-10 hours", votes: 234 },
                    { label: "More than 10 hours", votes: 89 }
                ]
            }
        ];

        class Poll {
            constructor(data) {
                this.data = JSON.parse(JSON.stringify(data));
                this.element = null;
            }

            getTotalVotes() {
                return this.data.options.reduce((sum, opt) => sum + opt.votes, 0);
            }

            addVote(optionIndex) {
                this.data.options[optionIndex].votes++;
                this.render();
                this.showFeedback();
            }

            getPercentage(optionIndex) {
                const total = this.getTotalVotes();
                return total === 0 ? 0 : Math.round((this.data.options[optionIndex].votes / total) * 100);
            }

            render() {
                const totalVotes = this.getTotalVotes();

                let optionsHTML = this.data.options.map((option, index) => `
                    <div class="option">
                        <div class="option-bar" style="width: ${this.getPercentage(index)}%"></div>
                        <button class="option-button" onclick="polls[${pollsData.indexOf(this.data)}].addVote(${index})">
                            ${option.label}
                        </button>
                    </div>
                `).join('');

                let resultsHTML = this.data.options.map((option, index) => `
                    <div class="result-item">
                        <div style="flex: 1;">
                            <div class="result-label">${option.label}</div>
                            <div class="result-bar-container">
                                <div class="result-bar" style="width: ${this.getPercentage(index)}%"></div>
                            </div>
                        </div>
                        <div class="result-stats">
                            <div class="result-percentage">${this.getPercentage(index)}%</div>
                            <div class="result-count">${option.votes}</div>
                        </div>
                    </div>
                `).join('');

                const html = `
                    <div class="poll-card">
                        <h2 class="poll-title">${this.data.title}</h2>
                        <div class="options-container">
                            ${optionsHTML}
                        </div>
                        <div class="result-container">
                            ${resultsHTML}
                            <div class="vote-counter">
                                <div class="total-votes">Total Votes</div>
                                <div class="total-votes-number">${totalVotes}</div>
                            </div>
                        </div>
                    </div>
                `;

                if (!this.element) {
                    this.element = document.createElement('div');
                    document.getElementById('pollsContainer').appendChild(this.element);
                }

                this.element.innerHTML = html;
            }

            showFeedback() {
                const feedback = document.createElement('div');
                feedback.className = 'vote-feedback';
                feedback.textContent = '✓ Vote recorded!';
                document.body.appendChild(feedback);

                setTimeout(() => {
                    feedback.remove();
                }, 2000);
            }
        }

        // Initialize polls
        const polls = pollsData.map(data => new Poll(data));
        polls.forEach(poll => poll.render());

        // Simulate occasional votes for demo purposes
        setInterval(() => {
            const randomPoll = polls[Math.floor(Math.random() * polls.length)];
            const randomOption = Math.floor(Math.random() * randomPoll.data.options.length);
            // Uncomment to enable auto-voting demo
            // randomPoll.addVote(randomOption);
        }, 5000);
    </script>
</body>
</html>
