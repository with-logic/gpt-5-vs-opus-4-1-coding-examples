<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Step Sequencer</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0f1419 100%);
            color: #00ff88;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            background: rgba(10, 20, 40, 0.95);
            border: 2px solid #00ff88;
            border-radius: 20px;
            padding: 30px;
            max-width: 1200px;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.3), inset 0 0 20px rgba(0, 255, 136, 0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #00ff88;
            padding-bottom: 20px;
        }

        .title {
            font-size: 2.5em;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.8);
            margin-bottom: 10px;
            letter-spacing: 3px;
        }

        .subtitle {
            color: #00ccff;
            font-size: 0.9em;
            opacity: 0.8;
        }

        .controls-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(0, 255, 136, 0.05);
            border-radius: 10px;
            border: 1px solid rgba(0, 255, 136, 0.2);
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .control-label {
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #00ccff;
            opacity: 0.9;
        }

        .control-value {
            font-size: 1.2em;
            color: #00ff88;
            font-weight: bold;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: linear-gradient(to right, #0a0e27, #00ff88);
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #00ff88;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.8);
        }

        input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #00ff88;
            cursor: pointer;
            border: none;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.8);
        }

        .drum-grid {
            display: grid;
            grid-template-columns: repeat(16, 1fr);
            gap: 8px;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(0, 255, 136, 0.05);
            border-radius: 10px;
            border: 1px solid rgba(0, 255, 136, 0.2);
        }

        .drum-row {
            display: contents;
        }

        .drum-row-label {
            grid-column: 1 / -1;
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 10px;
            align-items: center;
            margin-bottom: 5px;
            font-size: 0.9em;
            color: #00ccff;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .step-button {
            width: 100%;
            aspect-ratio: 1;
            border: 2px solid rgba(0, 255, 136, 0.3);
            background: rgba(0, 255, 136, 0.1);
            color: #00ff88;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.1s ease;
            position: relative;
            overflow: hidden;
        }

        .step-button:hover {
            border-color: #00ff88;
            background: rgba(0, 255, 136, 0.2);
            transform: scale(1.05);
        }

        .step-button.active {
            background: linear-gradient(135deg, #00ff88, #00ccff);
            border-color: #00ff88;
            color: #0a0e27;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.8), inset 0 0 10px rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        .step-button.playing {
            animation: pulse 0.15s ease-out;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 20px rgba(0, 255, 136, 0.8), inset 0 0 10px rgba(255, 255, 255, 0.5);
                transform: scale(1.15);
            }
            100% {
                box-shadow: 0 0 15px rgba(0, 255, 136, 0.8), inset 0 0 10px rgba(255, 255, 255, 0.3);
                transform: scale(1.1);
            }
        }

        .button-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
            margin-bottom: 30px;
        }

        .btn {
            padding: 12px 20px;
            border: 2px solid #00ff88;
            background: rgba(0, 255, 136, 0.1);
            color: #00ff88;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9em;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background: rgba(0, 255, 136, 0.2);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.5);
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn.play {
            border-color: #00ccff;
            color: #00ccff;
            font-size: 1.1em;
            padding: 15px 25px;
        }

        .btn.play:hover {
            box-shadow: 0 0 20px rgba(0, 204, 255, 0.6);
        }

        .btn.play.playing {
            background: linear-gradient(135deg, #00ccff, #00ff88);
            color: #0a0e27;
            box-shadow: 0 0 25px rgba(0, 204, 255, 0.8);
        }

        .pattern-controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            padding: 20px;
            background: rgba(0, 255, 136, 0.05);
            border-radius: 10px;
            border: 1px solid rgba(0, 255, 136, 0.2);
        }

        .pattern-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .pattern-btn {
            padding: 8px 12px;
            border: 2px solid rgba(0, 255, 136, 0.3);
            background: rgba(0, 255, 136, 0.1);
            color: #00ff88;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8em;
            font-weight: bold;
            transition: all 0.2s ease;
        }

        .pattern-btn:hover {
            border-color: #00ff88;
            background: rgba(0, 255, 136, 0.2);
        }

        .pattern-btn.selected {
            background: linear-gradient(135deg, #00ff88, #00ccff);
            color: #0a0e27;
            border-color: #00ff88;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.8);
        }

        .drum-select {
            width: 100%;
            padding: 8px 12px;
            background: rgba(0, 255, 136, 0.1);
            border: 2px solid rgba(0, 255, 136, 0.3);
            color: #00ff88;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .drum-select:hover {
            border-color: #00ff88;
            background: rgba(0, 255, 136, 0.2);
        }

        .drum-select:focus {
            outline: none;
            border-color: #00ccff;
            box-shadow: 0 0 10px rgba(0, 204, 255, 0.5);
        }

        .drum-select option {
            background: #0a0e27;
            color: #00ff88;
        }

        .export-section {
            padding: 20px;
            background: rgba(0, 255, 136, 0.05);
            border-radius: 10px;
            border: 1px solid rgba(0, 255, 136, 0.2);
            text-align: center;
        }

        .info-text {
            color: #00ccff;
            font-size: 0.85em;
            opacity: 0.8;
            margin-top: 10px;
        }

        .grid-wrapper {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 15px;
            align-items: start;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(0, 255, 136, 0.05);
            border-radius: 10px;
            border: 1px solid rgba(0, 255, 136, 0.2);
        }

        .drum-labels {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .drum-label {
            width: 60px;
            height: auto;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 0.75em;
            font-weight: bold;
            color: #00ccff;
            padding: 5px;
        }

        .steps-grid {
            display: grid;
            grid-template-columns: repeat(16, 1fr);
            gap: 8px;
            min-width: 100%;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .step-column {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .step-header {
            text-align: center;
            font-size: 0.75em;
            color: #00ccff;
            font-weight: bold;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .step-item {
            width: 100%;
            aspect-ratio: 1;
            min-width: 40px;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: rgba(0, 255, 136, 0.05);
            border-radius: 10px;
            border: 1px solid rgba(0, 255, 136, 0.2);
            margin-bottom: 20px;
            font-size: 0.9em;
        }

        .status-item {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .status-label {
            color: #00ccff;
            text-transform: uppercase;
            font-size: 0.8em;
            letter-spacing: 1px;
        }

        .status-value {
            color: #00ff88;
            font-weight: bold;
            font-size: 1.1em;
        }

        .loading {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #00ff88;
            border-radius: 50%;
            animation: blink 1s infinite;
            margin-right: 5px;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            .title {
                font-size: 1.8em;
            }

            .controls-section {
                grid-template-columns: 1fr;
            }

            .button-row {
                grid-template-columns: repeat(2, 1fr);
            }

            .grid-wrapper {
                grid-template-columns: 1fr;
            }

            .drum-labels {
                flex-direction: row;
                overflow-x: auto;
            }

            .steps-grid {
                grid-template-columns: repeat(8, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">⚡ AUDIO STEP SEQUENCER ⚡</div>
            <div class="subtitle">16-STEP DRUM GRID | POWERED BY WEB AUDIO API</div>
        </div>

        <div class="status-bar">
            <div class="status-item">
                <div class="status-label">Status:</div>
                <div class="status-value" id="statusValue">READY</div>
            </div>
            <div class="status-item">
                <div class="status-label">Current Step:</div>
                <div class="status-value" id="currentStep">0/16</div>
            </div>
            <div class="status-item">
                <div class="status-label">Master Volume:</div>
                <div class="status-value" id="volumeValue">100%</div>
            </div>
        </div>

        <div class="controls-section">
            <div class="control-group">
                <label class="control-label">🎵 Tempo (BPM)</label>
                <input type="range" id="tempoSlider" min="40" max="200" value="120" step="1">
                <div class="control-value" id="tempoValue">120</div>
            </div>

            <div class="control-group">
                <label class="control-label">🎯 Swing (%)</label>
                <input type="range" id="swingSlider" min="0" max="100" value="0" step="1">
                <div class="control-value" id="swingValue">0%</div>
            </div>

            <div class="control-group">
                <label class="control-label">📊 Volume (dB)</label>
                <input type="range" id="volumeSlider" min="-48" max="0" value="-6" step="1">
                <div class="control-value" id="volumeDbValue">-6</div>
            </div>

            <div class="control-group">
                <label class="control-label">🎚️ Drum Kit</label>
                <select id="drumKitSelect" class="drum-select">
                    <option value="standard">Standard</option>
                    <option value="electronic">Electronic</option>
                    <option value="deep">Deep</option>
                </select>
            </div>
        </div>

        <div class="grid-wrapper">
            <div class="drum-labels">
                <div class="drum-label" id="drum0">KICK</div>
                <div class="drum-label" id="drum1">SNARE</div>
                <div class="drum-label" id="drum2">HH-CLOSED</div>
                <div class="drum-label" id="drum3">TOM</div>
            </div>
            <div class="steps-grid" id="stepsGrid"></div>
        </div>

        <div class="button-row">
            <button class="btn play" id="playBtn">▶ PLAY</button>
            <button class="btn" id="stopBtn">⏹ STOP</button>
            <button class="btn" id="clearBtn">🗑 CLEAR</button>
        </div>

        <div class="pattern-controls">
            <div>
                <div class="control-label">Saved Patterns</div>
                <div class="pattern-buttons" id="patternButtons"></div>
            </div>
            <div>
                <input type="text" id="patternNameInput" placeholder="Pattern name..." style="padding: 8px; background: rgba(0, 255, 136, 0.1); border: 2px solid rgba(0, 255, 136, 0.3); color: #00ff88; border-radius: 6px; font-family: 'Courier New', monospace;">
            </div>
            <button class="btn" id="savePatternBtn">💾 SAVE</button>
            <button class="btn" id="exportBtn">📥 EXPORT WAV</button>
        </div>

        <div class="export-section" id="exportSection" style="display: none;">
            <div class="loading"></div>
            <span>Rendering audio...</span>
        </div>
    </div>

    <script>
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();

        // State
        const state = {
            isPlaying: false,
            tempo: 120,
            swing: 0,
            currentStep: 0,
            patterns: JSON.parse(localStorage.getItem('patterns')) || {},
            currentPatternName: null,
            grid: Array(4).fill(null).map(() => Array(16).fill(false)),
            masterVolume: -6,
            drumKit: 'standard'
        };

        // Drum sounds configuration
        const drumConfigs = {
            standard: {
                0: { name: 'KICK', freq: 150, decay: 0.5, type: 'sine' },
                1: { name: 'SNARE', freq: 200, decay: 0.15, type: 'triangle', noise: true },
                2: { name: 'HH-CLOSED', freq: 8000, decay: 0.08, type: 'square', noise: true },
                3: { name: 'TOM', freq: 400, decay: 0.12, type: 'sine' }
            },
            electronic: {
                0: { name: 'KICK', freq: 100, decay: 0.7, type: 'sine' },
                1: { name: 'SNARE', freq: 250, decay: 0.2, type: 'square', noise: true },
                2: { name: 'HH-CLOSED', freq: 10000, decay: 0.05, type: 'triangle', noise: true },
                3: { name: 'TOM', freq: 600, decay: 0.15, type: 'sine' }
            },
            deep: {
                0: { name: 'KICK', freq: 80, decay: 0.8, type: 'sine' },
                1: { name: 'SNARE', freq: 180, decay: 0.25, type: 'sine', noise: true },
                2: { name: 'HH-CLOSED', freq: 12000, decay: 0.1, type: 'square', noise: true },
                3: { name: 'TOM', freq: 350, decay: 0.18, type: 'sine' }
            }
        };

        let masterGain = audioContext.createGain();
        masterGain.connect(audioContext.destination);
        updateMasterVolume();

        // Initialize UI
        function initializeUI() {
            createStepGrid();
            updatePatternButtons();
            loadDefaultPattern();
        }

        function createStepGrid() {
            const grid = document.getElementById('stepsGrid');
            grid.innerHTML = '';

            for (let col = 0; col < 16; col++) {
                const column = document.createElement('div');
                column.className = 'step-column';

                const header = document.createElement('div');
                header.className = 'step-header';
                header.textContent = col + 1;
                column.appendChild(header);

                for (let row = 0; row < 4; row++) {
                    const button = document.createElement('button');
                    button.className = 'step-button step-item';
                    button.dataset.row = row;
                    button.dataset.col = col;

                    if (state.grid[row][col]) {
                        button.classList.add('active');
                    }

                    button.addEventListener('click', () => toggleStep(row, col, button));
                    column.appendChild(button);
                }

                grid.appendChild(column);
            }
        }

        function toggleStep(row, col, button) {
            state.grid[row][col] = !state.grid[row][col];
            button.classList.toggle('active');
        }

        function playDrumSound(drumIndex) {
            const config = drumConfigs[state.drumKit][drumIndex];
            const now = audioContext.currentTime;
            const duration = config.decay;

            if (config.noise) {
                const noiseBuffer = audioContext.createBufferSource();
                const bufferSize = audioContext.sampleRate * duration;
                const buffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
                const data = buffer.getChannelData(0);

                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1;
                }

                noiseBuffer.buffer = buffer;
                const gainNode = audioContext.createGain();
                gainNode.gain.setValueAtTime(0.3, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + duration);
                noiseBuffer.connect(gainNode);
                gainNode.connect(masterGain);
                noiseBuffer.start(now);
            } else {
                const osc = audioContext.createOscillator();
                osc.type = config.type;
                osc.frequency.setValueAtTime(config.freq, now);
                osc.frequency.exponentialRampToValueAtTime(10, now + duration);

                const gainNode = audioContext.createGain();
                gainNode.gain.setValueAtTime(0.3, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + duration);

                osc.connect(gainNode);
                gainNode.connect(masterGain);
                osc.start(now);
                osc.stop(now + duration);
            }
        }

        function playStep(stepIndex) {
            for (let row = 0; row < 4; row++) {
                if (state.grid[row][stepIndex]) {
                    playDrumSound(row);
                    const button = document.querySelector(`[data-row="${row}"][data-col="${stepIndex}"]`);
                    if (button) {
                        button.classList.add('playing');
                        setTimeout(() => button.classList.remove('playing'), 150);
                    }
                }
            }
        }

        function startPlayback() {
            if (state.isPlaying) return;

            state.isPlaying = true;
            state.currentStep = 0;
            updatePlayButton();
            updateStatus('PLAYING');

            const stepDuration = (60 / state.tempo) / 4; // 16th note
            let nextStepTime = audioContext.currentTime;

            function scheduleStep() {
                if (!state.isPlaying) return;

                const currentTime = audioContext.currentTime;
                while (nextStepTime < currentTime + 0.1) {
                    const stepIndex = state.currentStep % 16;
                    const swingOffset = (state.currentStep % 2 === 1) ? (state.swing / 100) * stepDuration * 0.5 : 0;

                    audioContext.currentTime + swingOffset <= nextStepTime && playStep(stepIndex);
                    updateCurrentStep(stepIndex);

                    state.currentStep++;
                    nextStepTime += stepDuration;
                }

                requestAnimationFrame(scheduleStep);
            }

            scheduleStep();
        }

        function stopPlayback() {
            state.isPlaying = false;
            updatePlayButton();
            updateStatus('STOPPED');
        }

        function updatePlayButton() {
            const btn = document.getElementById('playBtn');
            if (state.isPlaying) {
                btn.classList.add('playing');
                btn.textContent = '⏸ PAUSE';
            } else {
                btn.classList.remove('playing');
                btn.textContent = '▶ PLAY';
            }
        }

        function updateStatus(status) {
            document.getElementById('statusValue').textContent = status;
        }

        function updateCurrentStep(step) {
            document.getElementById('currentStep').textContent = `${step + 1}/16`;
        }

        function updateMasterVolume() {
            const db = state.masterVolume;
            const linear = Math.pow(10, db / 20);
            masterGain.gain.value = linear;
            document.getElementById('volumeDbValue').textContent = db;
            document.getElementById('volumeValue').textContent = Math.round(linear * 100) + '%';
        }

        function clearGrid() {
            state.grid = Array(4).fill(null).map(() => Array(16).fill(false));
            createStepGrid();
            state.currentPatternName = null;
            updatePatternButtons();
        }

        function savePattern() {
            const name = document.getElementById('patternNameInput').value.trim();
            if (!name) {
                alert('Please enter a pattern name');
                return;
            }

            state.patterns[name] = JSON.stringify(state.grid);
            localStorage.setItem('patterns', JSON.stringify(state.patterns));
            document.getElementById('patternNameInput').value = '';
            updatePatternButtons();
            state.currentPatternName = name;
            updatePatternButtons();
        }

        function loadPattern(name) {
            const data = state.patterns[name];
            if (data) {
                state.grid = JSON.parse(data);
                state.currentPatternName = name;
                createStepGrid();
                updatePatternButtons();
            }
        }

        function deletePattern(name) {
            if (confirm(`Delete pattern "${name}"?`)) {
                delete state.patterns[name];
                localStorage.setItem('patterns', JSON.stringify(state.patterns));
                updatePatternButtons();
                if (state.currentPatternName === name) {
                    state.currentPatternName = null;
                }
            }
        }

        function updatePatternButtons() {
            const container = document.getElementById('patternButtons');
            container.innerHTML = '';

            Object.keys(state.patterns).slice(0, 4).forEach(name => {
                const btn = document.createElement('button');
                btn.className = 'pattern-btn';
                if (name === state.currentPatternName) {
                    btn.classList.add('selected');
                }

                const label = document.createElement('div');
                label.style.cursor = 'pointer';
                label.textContent = name.substring(0, 8);
                label.addEventListener('click', () => loadPattern(name));

                const deleteBtn = document.createElement('div');
                deleteBtn.style.cursor = 'pointer';
                deleteBtn.style.fontSize = '0.7em';
                deleteBtn.textContent = '✕';
                deleteBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    deletePattern(name);
                });

                btn.appendChild(label);
                btn.appendChild(deleteBtn);
                container.appendChild(btn);
            });
        }

        function loadDefaultPattern() {
            const defaultPattern = Array(4).fill(null).map((_, row) => {
                return Array(16).fill(false).map((_, col) => {
                    if (row === 0) return col % 4 === 0; // Kick every 4 steps
                    if (row === 1) return col % 8 === 4; // Snare on 2 and 4
                    if (row === 2) return col % 2 === 0; // Hi-hat every step
                    return col % 8 === 2; // Tom sporadically
                });
            });
            state.grid = defaultPattern;
            createStepGrid();
        }

        async function exportWAV() {
            const exportSection = document.getElementById('exportSection');
            exportSection.style.display = 'block';

            const sampleRate = 44100;
            const duration = (60 / state.tempo) * 4 * 16; // 4 bars
            const samples = sampleRate * duration;
            const audioBuffer = audioContext.createBuffer(1, samples, sampleRate);
            const data = audioBuffer.getChannelData(0);

            const offlineContext = new OfflineAudioContext(1, samples, sampleRate);
            const offlineMasterGain = offlineContext.createGain();
            offlineMasterGain.gain.value = Math.pow(10, state.masterVolume / 20);
            offlineMasterGain.connect(offlineContext.destination);

            const stepDuration = (60 / state.tempo) / 4;

            for (let stepIndex = 0; stepIndex < 16; stepIndex++) {
                for (let row = 0; row < 4; row++) {
                    if (state.grid[row][stepIndex]) {
                        const config = drumConfigs[state.drumKit][row];
                        const now = (stepIndex * stepDuration);
                        const duration = config.decay;

                        if (config.noise) {
                            const noiseBuffer = offlineContext.createBufferSource();
                            const bufferSize = sampleRate * duration;
                            const buffer = offlineContext.createBuffer(1, bufferSize, sampleRate);
                            const ndata = buffer.getChannelData(0);

                            for (let i = 0; i < bufferSize; i++) {
                                ndata[i] = Math.random() * 2 - 1;
                            }

                            noiseBuffer.buffer = buffer;
                            const gainNode = offlineContext.createGain();
                            gainNode.gain.setValueAtTime(0.3, now);
                            gainNode.gain.exponentialRampToValueAtTime(0.01, now + duration);
                            noiseBuffer.connect(gainNode);
                            gainNode.connect(offlineMasterGain);
                            noiseBuffer.start(now);
                        } else {
                            const osc = offlineContext.createOscillator();
                            osc.type = config.type;
                            osc.frequency.setValueAtTime(config.freq, now);
                            osc.frequency.exponentialRampToValueAtTime(10, now + duration);

                            const gainNode = offlineContext.createGain();
                            gainNode.gain.setValueAtTime(0.3, now);
                            gainNode.gain.exponentialRampToValueAtTime(0.01, now + duration);

                            osc.connect(gainNode);
                            gainNode.connect(offlineMasterGain);
                            osc.start(now);
                            osc.stop(now + duration);
                        }
                    }
                }
            }

            try {
                const renderedBuffer = await offlineContext.startRendering();
                const wav = encodeWAV(renderedBuffer);
                downloadWAV(wav);
            } catch (e) {
                console.error('Export error:', e);
            }

            exportSection.style.display = 'none';
        }

        function encodeWAV(audioBuffer) {
            const data = audioBuffer.getChannelData(0);
            const samples = new Int16Array(data.length);

            for (let i = 0; i < data.length; i++) {
                samples[i] = data[i] < 0 ? data[i] * 0x8000 : data[i] * 0x7FFF;
            }

            const dataview = new DataView(new ArrayBuffer(44 + samples.length * 2));
            const view = new Uint8Array(dataview.buffer);

            const writeString = (offset, string) => {
                for (let i = 0; i < string.length; i++) {
                    view[offset + i] = string.charCodeAt(i);
                }
            };

            writeString(0, 'RIFF');
            dataview.setUint32(4, 36 + samples.length * 2, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            dataview.setUint32(16, 16, true);
            dataview.setUint16(20, 1, true);
            dataview.setUint16(22, 1, true);
            dataview.setUint32(24, audioBuffer.sampleRate, true);
            dataview.setUint32(28, audioBuffer.sampleRate * 2, true);
            dataview.setUint16(32, 2, true);
            dataview.setUint16(34, 16, true);
            writeString(36, 'data');
            dataview.setUint32(40, samples.length * 2, true);

            let index = 44;
            for (let i = 0; i < samples.length; i++) {
                dataview.setInt16(index, samples[i], true);
                index += 2;
            }

            return dataview;
        }

        function downloadWAV(dataview) {
            const blob = new Blob([dataview], { type: 'audio/wav' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `sequencer_${Date.now()}.wav`;
            link.click();
            URL.revokeObjectURL(url);
        }

        // Event Listeners
        document.getElementById('tempoSlider').addEventListener('input', (e) => {
            state.tempo = parseInt(e.target.value);
            document.getElementById('tempoValue').textContent = state.tempo;
        });

        document.getElementById('swingSlider').addEventListener('input', (e) => {
            state.swing = parseInt(e.target.value);
            document.getElementById('swingValue').textContent = state.swing + '%';
        });

        document.getElementById('volumeSlider').addEventListener('input', (e) => {
            state.masterVolume = parseInt(e.target.value);
            updateMasterVolume();
        });

        document.getElementById('drumKitSelect').addEventListener('change', (e) => {
            state.drumKit = e.target.value;
        });

        document.getElementById('playBtn').addEventListener('click', () => {
            if (state.isPlaying) {
                stopPlayback();
            } else {
                startPlayback();
            }
        });

        document.getElementById('stopBtn').addEventListener('click', () => {
            stopPlayback();
            state.currentStep = 0;
            updateCurrentStep(0);
        });

        document.getElementById('clearBtn').addEventListener('click', clearGrid);

        document.getElementById('savePatternBtn').addEventListener('click', savePattern);

        document.getElementById('exportBtn').addEventListener('click', exportWAV);

        // Initialize
        initializeUI();
    </script>
</body>
</html>
