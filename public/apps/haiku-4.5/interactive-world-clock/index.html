<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive World Clock</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }

        .clock-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            padding: 2rem;
        }

        .clock-card {
            border-radius: 1.5rem;
            padding: 1.5rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .clock-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .clock-card.night {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #ffffff;
        }

        .clock-card.evening {
            background: linear-gradient(135deg, #2d1b4e 0%, #4a0e4e 100%);
            color: #ffffff;
        }

        .clock-card.afternoon {
            background: linear-gradient(135deg, #f59e0b 0%, #f97316 100%);
            color: #ffffff;
        }

        .clock-card.morning {
            background: linear-gradient(135deg, #ec4899 0%, #f472b6 100%);
            color: #ffffff;
        }

        .clock-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 100% 0%, rgba(255, 255, 255, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        .clock-content {
            position: relative;
            z-index: 1;
        }

        .city-name {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .time-icon {
            font-size: 1.75rem;
            display: inline-block;
        }

        .clock-display {
            font-size: 3rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            margin: 1rem 0;
            letter-spacing: 0.05em;
        }

        .timezone-info {
            font-size: 0.875rem;
            opacity: 0.85;
            margin-bottom: 1rem;
        }

        .day-night-indicator {
            display: inline-block;
            font-size: 0.8rem;
            padding: 0.35rem 0.75rem;
            border-radius: 0.5rem;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            margin-top: 0.5rem;
        }

        .delete-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            width: 2rem;
            height: 2rem;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            z-index: 10;
        }

        .delete-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        .delete-btn:active {
            transform: scale(0.95);
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem 2rem;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            letter-spacing: -0.025em;
        }

        .header-subtitle {
            font-size: 1rem;
            opacity: 0.9;
        }

        .controls {
            display: flex;
            gap: 1rem;
            padding: 2rem;
            justify-content: center;
            flex-wrap: wrap;
            background: #f8f9fa;
            border-bottom: 1px solid #e0e0e0;
        }

        .toggle-btn {
            background: white;
            border: 2px solid #667eea;
            color: #667eea;
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
        }

        .toggle-btn:hover {
            background: #667eea;
            color: white;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .toggle-btn.active {
            background: #667eea;
            color: white;
        }

        .add-city-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
        }

        .add-city-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .add-city-btn:active {
            transform: translateY(0);
        }

        .input-group {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .city-input {
            padding: 0.75rem 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 0.75rem;
            font-size: 1rem;
            transition: border-color 0.2s;
            min-width: 200px;
        }

        .city-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .timezone-select {
            padding: 0.75rem 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 0.75rem;
            font-size: 1rem;
            transition: border-color 0.2s;
            min-width: 150px;
        }

        .timezone-select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .empty-state {
            text-align: center;
            padding: 3rem 2rem;
            color: #999;
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.875rem;
            }

            .clock-grid {
                grid-template-columns: 1fr;
                padding: 1rem;
                gap: 1rem;
            }

            .controls {
                flex-direction: column;
            }

            .input-group {
                flex-direction: column;
            }

            .city-input,
            .timezone-select {
                min-width: auto;
                width: 100%;
            }

            .add-city-btn {
                width: 100%;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .clock-card {
            animation: fadeIn 0.3s ease-out;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-50 to-gray-100">
    <div class="header">
        <h1>🌍 World Clock</h1>
        <p class="header-subtitle">Track time across the globe in real-time</p>
    </div>

    <div class="controls">
        <div class="input-group">
            <input
                type="text"
                id="cityInput"
                class="city-input"
                placeholder="Enter city name (e.g., Tokyo, London)..."
            >
            <select id="timezoneSelect" class="timezone-select">
                <option value="">Select timezone...</option>
            </select>
            <button class="add-city-btn" onclick="addCity()">Add City</button>
        </div>
        <button class="toggle-btn" id="formatToggle" onclick="toggleFormat()" title="Toggle 12/24 hour format">
            12h Format
        </button>
    </div>

    <div id="clocksContainer" class="clock-grid">
        <div class="empty-state">
            <div class="empty-state-icon">🏙️</div>
            <p>No cities yet. Add a city to get started!</p>
        </div>
    </div>

    <script>
        // Timezone data with UTC offsets
        const timezones = [
            { city: 'London', timezone: 'Europe/London', offset: 0 },
            { city: 'Paris', timezone: 'Europe/Paris', offset: 1 },
            { city: 'Tokyo', timezone: 'Asia/Tokyo', offset: 9 },
            { city: 'New York', timezone: 'America/New_York', offset: -5 },
            { city: 'Los Angeles', timezone: 'America/Los_Angeles', offset: -8 },
            { city: 'Sydney', timezone: 'Australia/Sydney', offset: 11 },
            { city: 'Dubai', timezone: 'Asia/Dubai', offset: 4 },
            { city: 'Singapore', timezone: 'Asia/Singapore', offset: 8 },
            { city: 'Hong Kong', timezone: 'Asia/Hong_Kong', offset: 8 },
            { city: 'Bangkok', timezone: 'Asia/Bangkok', offset: 7 },
            { city: 'Istanbul', timezone: 'Europe/Istanbul', offset: 3 },
            { city: 'Cairo', timezone: 'Africa/Cairo', offset: 2 },
            { city: 'São Paulo', timezone: 'America/Sao_Paulo', offset: -3 },
            { city: 'Mexico City', timezone: 'America/Mexico_City', offset: -6 },
            { city: 'Toronto', timezone: 'America/Toronto', offset: -5 },
            { city: 'Vancouver', timezone: 'America/Vancouver', offset: -8 },
            { city: 'Auckland', timezone: 'Pacific/Auckland', offset: 13 },
            { city: 'Moscow', timezone: 'Europe/Moscow', offset: 3 },
            { city: 'Delhi', timezone: 'Asia/Kolkata', offset: 5.5 },
            { city: 'Mumbai', timezone: 'Asia/Kolkata', offset: 5.5 },
            { city: 'Berlin', timezone: 'Europe/Berlin', offset: 1 },
            { city: 'Madrid', timezone: 'Europe/Madrid', offset: 1 },
            { city: 'Amsterdam', timezone: 'Europe/Amsterdam', offset: 1 },
            { city: 'Stockholm', timezone: 'Europe/Stockholm', offset: 1 },
            { city: 'Johannesburg', timezone: 'Africa/Johannesburg', offset: 2 },
            { city: 'Bangkok', timezone: 'Asia/Bangkok', offset: 7 },
            { city: 'Seoul', timezone: 'Asia/Seoul', offset: 9 },
            { city: 'Jakarta', timezone: 'Asia/Jakarta', offset: 7 },
            { city: 'Manila', timezone: 'Asia/Manila', offset: 8 },
            { city: 'Auckland', timezone: 'Pacific/Auckland', offset: 13 },
        ];

        let cities = [];
        let is24HourFormat = false;

        // Initialize timezone select
        function initializeTimezoneSelect() {
            const select = document.getElementById('timezoneSelect');
            const uniqueCities = [...new Map(timezones.map(item => [item.city, item])).values()];
            uniqueCities.forEach(tz => {
                const option = document.createElement('option');
                option.value = tz.timezone;
                option.textContent = `${tz.city} (UTC${tz.offset >= 0 ? '+' : ''}${tz.offset})`;
                select.appendChild(option);
            });
        }

        // Get time zone info for a city
        function getTimezoneInfo(timezone) {
            const info = timezones.find(tz => tz.timezone === timezone);
            return info || { city: 'Unknown', timezone, offset: 0 };
        }

        // Get time period of day
        function getTimePeriod(date) {
            const hour = date.getHours();
            if (hour >= 5 && hour < 12) return 'morning';
            if (hour >= 12 && hour < 17) return 'afternoon';
            if (hour >= 17 && hour < 21) return 'evening';
            return 'night';
        }

        // Get icon for time period
        function getTimeIcon(period) {
            const icons = {
                morning: '🌅',
                afternoon: '☀️',
                evening: '🌆',
                night: '🌙'
            };
            return icons[period] || '⏰';
        }

        // Format time based on 12/24 hour format
        function formatTime(date) {
            if (is24HourFormat) {
                return date.toLocaleString('en-US', {
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    hour12: false,
                    timeZone: 'UTC'
                });
            } else {
                const hours = date.getUTCHours();
                const minutes = String(date.getUTCMinutes()).padStart(2, '0');
                const seconds = String(date.getUTCSeconds()).padStart(2, '0');

                if (is24HourFormat) {
                    return `${String(hours).padStart(2, '0')}:${minutes}:${seconds}`;
                } else {
                    const period = hours >= 12 ? 'PM' : 'AM';
                    const displayHours = hours % 12 || 12;
                    return `${String(displayHours).padStart(2, '0')}:${minutes}:${seconds} ${period}`;
                }
            }
        }

        // Get local time for timezone
        function getTimeInTimezone(timezone) {
            const now = new Date();
            const formatter = new Intl.DateTimeFormat('en-US', {
                timeZone: timezone,
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            });

            const parts = formatter.formatToParts(now);
            const values = {};
            parts.forEach(part => {
                values[part.type] = part.value;
            });

            return new Date(`${values.year}-${values.month}-${values.day}T${values.hour}:${values.minute}:${values.second}`);
        }

        // Format display time
        function displayTime(date) {
            const hours24 = date.getHours();
            const minutes = String(date.getMinutes()).padStart(2, '0');
            const seconds = String(date.getSeconds()).padStart(2, '0');

            if (is24HourFormat) {
                return `${String(hours24).padStart(2, '0')}:${minutes}:${seconds}`;
            } else {
                const period = hours24 >= 12 ? 'PM' : 'AM';
                const hours12 = hours24 % 12 || 12;
                return `${String(hours12).padStart(2, '0')}:${minutes}:${seconds} ${period}`;
            }
        }

        // Add city to list
        function addCity() {
            const cityInput = document.getElementById('cityInput');
            const timezoneSelect = document.getElementById('timezoneSelect');

            const timezone = timezoneSelect.value;

            if (!timezone) {
                alert('Please select a timezone');
                return;
            }

            const tzInfo = getTimezoneInfo(timezone);
            const cityName = cityInput.value.trim() || tzInfo.city;

            cities.push({
                id: Date.now(),
                name: cityName,
                timezone: timezone
            });

            cityInput.value = '';
            timezoneSelect.value = '';

            render();
        }

        // Remove city
        function removeCity(id) {
            cities = cities.filter(c => c.id !== id);
            render();
        }

        // Toggle 12/24 hour format
        function toggleFormat() {
            is24HourFormat = !is24HourFormat;
            const btn = document.getElementById('formatToggle');
            btn.textContent = is24HourFormat ? '24h Format' : '12h Format';
            btn.classList.toggle('active');
            render();
        }

        // Render all clock cards
        function render() {
            const container = document.getElementById('clocksContainer');

            if (cities.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🏙️</div>
                        <p>No cities yet. Add a city to get started!</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = cities.map(city => {
                const localTime = getTimeInTimezone(city.timezone);
                const period = getTimePeriod(localTime);
                const icon = getTimeIcon(period);
                const timeString = displayTime(localTime);

                return `
                    <div class="clock-card ${period}">
                        <button class="delete-btn" onclick="removeCity(${city.id})" title="Remove city">✕</button>
                        <div class="clock-content">
                            <div class="city-name">
                                <span class="time-icon">${icon}</span>
                                <span>${city.name}</span>
                            </div>
                            <div class="timezone-info">${city.timezone}</div>
                            <div class="clock-display">${timeString}</div>
                            <div class="day-night-indicator">${period.charAt(0).toUpperCase() + period.slice(1)}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Update clock every second
        function updateClocks() {
            if (cities.length > 0) {
                render();
            }
        }

        // Add default cities
        function initializeDefaultCities() {
            cities = [
                { id: 1, name: 'London', timezone: 'Europe/London' },
                { id: 2, name: 'Tokyo', timezone: 'Asia/Tokyo' },
                { id: 3, name: 'New York', timezone: 'America/New_York' },
                { id: 4, name: 'Sydney', timezone: 'Australia/Sydney' }
            ];
        }

        // Initialize app
        function init() {
            initializeTimezoneSelect();
            initializeDefaultCities();
            render();
            setInterval(updateClocks, 1000);

            // Enter key to add city
            document.getElementById('cityInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') addCity();
            });
        }

        init();
    </script>
</body>
</html>
