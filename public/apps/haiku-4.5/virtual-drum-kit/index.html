<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Drum Kit</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3/dist/tailwind.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 5px;
            background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: #94a3b8;
            font-size: 0.95rem;
        }

        .drum-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
            margin-bottom: 30px;
        }

        @media (min-width: 768px) {
            .drum-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 15px;
            }
        }

        .drum-pad {
            aspect-ratio: 1;
            border-radius: 12px;
            border: 2px solid;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.1s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            position: relative;
            overflow: hidden;
            user-select: none;
            touch-action: manipulation;
        }

        .drum-pad::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.1), transparent);
            border-radius: 12px;
            pointer-events: none;
        }

        .drum-pad .pad-name {
            font-size: 0.9rem;
            font-weight: 600;
        }

        .drum-pad .pad-key {
            font-size: 0.65rem;
            opacity: 0.7;
            font-family: monospace;
        }

        /* Kick */
        .drum-pad.kick {
            background: linear-gradient(135deg, #dc2626, #7f1d1d);
            border-color: #991b1b;
            color: #fecaca;
        }

        .drum-pad.kick:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(220, 38, 38, 0.4);
        }

        .drum-pad.kick.active {
            transform: scale(0.95);
            box-shadow: inset 0 4px 12px rgba(0, 0, 0, 0.5), 0 0 30px rgba(220, 38, 38, 0.6);
        }

        /* Snare */
        .drum-pad.snare {
            background: linear-gradient(135deg, #2563eb, #1e3a8a);
            border-color: #1e40af;
            color: #bfdbfe;
        }

        .drum-pad.snare:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.4);
        }

        .drum-pad.snare.active {
            transform: scale(0.95);
            box-shadow: inset 0 4px 12px rgba(0, 0, 0, 0.5), 0 0 30px rgba(37, 99, 235, 0.6);
        }

        /* Hi-Hat */
        .drum-pad.hihat {
            background: linear-gradient(135deg, #d97706, #7c2d12);
            border-color: #92400e;
            color: #fef3c7;
        }

        .drum-pad.hihat:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(217, 119, 6, 0.4);
        }

        .drum-pad.hihat.active {
            transform: scale(0.95);
            box-shadow: inset 0 4px 12px rgba(0, 0, 0, 0.5), 0 0 30px rgba(217, 119, 6, 0.6);
        }

        /* Tom */
        .drum-pad.tom {
            background: linear-gradient(135deg, #16a34a, #14532d);
            border-color: #166534;
            color: #bbf7d0;
        }

        .drum-pad.tom:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(22, 163, 74, 0.4);
        }

        .drum-pad.tom.active {
            transform: scale(0.95);
            box-shadow: inset 0 4px 12px rgba(0, 0, 0, 0.5), 0 0 30px rgba(22, 163, 74, 0.6);
        }

        /* Clap */
        .drum-pad.clap {
            background: linear-gradient(135deg, #ec4899, #831843);
            border-color: #9d174d;
            color: #fbcfe8;
        }

        .drum-pad.clap:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(236, 72, 153, 0.4);
        }

        .drum-pad.clap.active {
            transform: scale(0.95);
            box-shadow: inset 0 4px 12px rgba(0, 0, 0, 0.5), 0 0 30px rgba(236, 72, 153, 0.6);
        }

        /* Crash */
        .drum-pad.crash {
            background: linear-gradient(135deg, #a855f7, #6b21a8);
            border-color: #7e22ce;
            color: #e9d5ff;
        }

        .drum-pad.crash:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(168, 85, 247, 0.4);
        }

        .drum-pad.crash.active {
            transform: scale(0.95);
            box-shadow: inset 0 4px 12px rgba(0, 0, 0, 0.5), 0 0 30px rgba(168, 85, 247, 0.6);
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }

        .control-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            flex: 1;
            min-width: 120px;
        }

        .btn-primary:hover:not(:disabled) {
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.4);
            transform: translateY(-2px);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: linear-gradient(135deg, #64748b, #475569);
            color: white;
            flex: 1;
            min-width: 120px;
        }

        .btn-secondary:hover:not(:disabled) {
            box-shadow: 0 8px 20px rgba(100, 116, 139, 0.4);
            transform: translateY(-2px);
        }

        .btn-secondary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-success {
            background: linear-gradient(135deg, #10b981, #047857);
            color: white;
        }

        .btn-success:hover:not(:disabled) {
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.4);
            transform: translateY(-2px);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
        }

        .btn-danger:hover:not(:disabled) {
            box-shadow: 0 8px 20px rgba(239, 68, 68, 0.4);
            transform: translateY(-2px);
        }

        .status-display {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(100, 116, 139, 0.3);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            font-size: 0.95rem;
        }

        .status-display.recording {
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }

        .status-display .status-text {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .recording-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ef4444;
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.4;
            }
        }

        .info-text {
            text-align: center;
            font-size: 0.85rem;
            color: #64748b;
            margin-top: 15px;
        }

        .tempo-control {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(100, 116, 139, 0.3);
            border-radius: 8px;
            padding: 12px;
        }

        .tempo-control label {
            font-size: 0.9rem;
            font-weight: 500;
        }

        .tempo-control input[type="range"] {
            width: 150px;
            cursor: pointer;
        }

        .tempo-control .tempo-value {
            min-width: 60px;
            text-align: right;
            font-weight: 600;
            color: #60a5fa;
        }

        @media (max-width: 640px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .btn {
                padding: 10px 16px;
                font-size: 0.85rem;
                min-width: 100px;
            }

            .control-group {
                gap: 8px;
            }

            .tempo-control {
                flex-direction: column;
                gap: 10px;
            }

            .tempo-control input[type="range"] {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🥁 Virtual Drum Kit</h1>
            <p>Click pads or use keyboard to play</p>
        </div>

        <div class="status-display" id="statusDisplay">
            <div class="status-text">
                <span id="statusText">Ready to play</span>
            </div>
        </div>

        <div class="controls">
            <div class="control-group">
                <button class="btn btn-primary" id="recordBtn">Record</button>
                <button class="btn btn-secondary" id="playBtn" disabled>Play</button>
                <button class="btn btn-danger" id="clearBtn">Clear</button>
            </div>
            <div class="tempo-control">
                <label for="tempoSlider">Playback Speed:</label>
                <input type="range" id="tempoSlider" min="0.25" max="2" step="0.25" value="1">
                <div class="tempo-value"><span id="tempoValue">1.0x</span></div>
            </div>
        </div>

        <div class="drum-grid" id="drumGrid"></div>

        <div class="info-text">
            <p>💻 Keyboard: Q, W, E, A, S, D • 🖱️ Click pads • 📱 Tap on mobile</p>
        </div>
    </div>

    <script>
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();

        const drums = [
            { name: 'KICK', key: 'q', class: 'kick', frequency: 150, duration: 0.5 },
            { name: 'SNARE', key: 'w', class: 'snare', frequency: 200, duration: 0.2 },
            { name: 'HI-HAT', key: 'e', class: 'hihat', frequency: 300, duration: 0.1 },
            { name: 'TOM', key: 'a', class: 'tom', frequency: 250, duration: 0.15 },
            { name: 'CLAP', key: 's', class: 'clap', frequency: 180, duration: 0.12 },
            { name: 'CRASH', key: 'd', class: 'crash', frequency: 400, duration: 0.8 }
        ];

        let isRecording = false;
        let recordings = [];
        let playbackSpeed = 1;

        const recordBtn = document.getElementById('recordBtn');
        const playBtn = document.getElementById('playBtn');
        const clearBtn = document.getElementById('clearBtn');
        const statusDisplay = document.getElementById('statusDisplay');
        const statusText = document.getElementById('statusText');
        const tempoSlider = document.getElementById('tempoSlider');
        const tempoValue = document.getElementById('tempoValue');
        const drumGrid = document.getElementById('drumGrid');

        // Create drum pads
        drums.forEach((drum, index) => {
            const pad = document.createElement('div');
            pad.className = `drum-pad ${drum.class}`;
            pad.innerHTML = `
                <div class="pad-name">${drum.name}</div>
                <div class="pad-key">${drum.key.toUpperCase()}</div>
            `;
            pad.dataset.index = index;

            pad.addEventListener('click', () => playDrum(index));
            pad.addEventListener('touchstart', (e) => {
                e.preventDefault();
                playDrum(index);
            });

            drumGrid.appendChild(pad);
        });

        function playDrum(index) {
            const drum = drums[index];
            const pad = document.querySelector(`[data-index="${index}"]`);

            // Visual feedback
            pad.classList.add('active');
            setTimeout(() => pad.classList.remove('active'), 100);

            // Record if recording
            if (isRecording) {
                recordings.push({ index, time: Date.now() });
            }

            // Play sound
            playSoundEffect(drum);
        }

        function playSoundEffect(drum) {
            const now = audioContext.currentTime;
            const env = createEnvelope(drum.duration);

            // Create oscillator for main sound
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.connect(gain);
            gain.connect(audioContext.destination);

            // Add some noise for realistic drum sound
            const noise = createWhiteNoise();
            const noiseGain = audioContext.createGain();
            noise.connect(noiseGain);
            noiseGain.connect(audioContext.destination);

            osc.frequency.setValueAtTime(drum.frequency, now);
            osc.frequency.exponentialRampToValueAtTime(Math.max(20, drum.frequency * 0.3), now + drum.duration);

            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + drum.duration);

            noiseGain.gain.setValueAtTime(0.2, now);
            noiseGain.gain.exponentialRampToValueAtTime(0, now + drum.duration * 0.5);

            osc.start(now);
            osc.stop(now + drum.duration);
        }

        function createWhiteNoise() {
            const bufferSize = audioContext.sampleRate * 2;
            const noiseBuffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
            const output = noiseBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                output[i] = Math.random() * 2 - 1;
            }
            const source = audioContext.createBufferSource();
            source.buffer = noiseBuffer;
            source.loop = true;
            return source;
        }

        function createEnvelope(duration) {
            return {
                attack: duration * 0.1,
                decay: duration * 0.3,
                sustain: duration * 0.4,
                release: duration * 0.2
            };
        }

        // Record button
        recordBtn.addEventListener('click', () => {
            isRecording = !isRecording;
            if (isRecording) {
                recordings = [];
                recordBtn.classList.add('btn-danger');
                recordBtn.classList.remove('btn-primary');
                statusDisplay.classList.add('recording');
                statusText.innerHTML = '<span class="recording-indicator"></span>Recording...';
            } else {
                recordBtn.classList.remove('btn-danger');
                recordBtn.classList.add('btn-primary');
                statusDisplay.classList.remove('recording');
                statusText.textContent = recordings.length > 0 ? `Recorded ${recordings.length} hits` : 'Ready to play';
                playBtn.disabled = recordings.length === 0;
            }
        });

        // Play button
        playBtn.addEventListener('click', async () => {
            if (recordings.length === 0) return;

            playBtn.disabled = true;
            recordBtn.disabled = true;
            statusText.textContent = 'Playing...';

            const startTime = recordings[0].time;
            for (const recording of recordings) {
                const delay = (recording.time - startTime) / 1000 / playbackSpeed;
                await new Promise(resolve => setTimeout(resolve, delay * 1000));
                playDrum(recording.index);
            }

            statusText.textContent = 'Playback complete';
            playBtn.disabled = false;
            recordBtn.disabled = false;
        });

        // Clear button
        clearBtn.addEventListener('click', () => {
            recordings = [];
            playBtn.disabled = true;
            statusText.textContent = 'Cleared recordings';
            setTimeout(() => {
                statusText.textContent = 'Ready to play';
            }, 1500);
        });

        // Tempo slider
        tempoSlider.addEventListener('input', (e) => {
            playbackSpeed = parseFloat(e.target.value);
            tempoValue.textContent = playbackSpeed.toFixed(2) + 'x';
        });

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            const drumIndex = drums.findIndex(d => d.key === key);
            if (drumIndex !== -1) {
                e.preventDefault();
                playDrum(drumIndex);
            }
        });

        // Resume audio context on user interaction
        document.addEventListener('click', () => {
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
        }, { once: true });
    </script>
</body>
</html>
