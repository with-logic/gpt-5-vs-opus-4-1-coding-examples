<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Target Clicker</title>
    <link href="https://cdn.tailwindcss.com" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f0f4f8 0%, #e8f0f7 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #gameContainer {
            position: relative;
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #f0f4f8 0%, #e8f0f7 100%);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Game Area */
        #playArea {
            position: absolute;
            top: 80px;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            cursor: crosshair;
        }

        /* Header */
        #header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.08);
        }

        .game-title {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .stats {
            display: flex;
            gap: 40px;
            align-items: center;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .stat-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #333;
            font-variant-numeric: tabular-nums;
        }

        .stat-value.time {
            font-size: 36px;
            color: #667eea;
        }

        /* Target */
        .target {
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: white;
            font-size: 20px;
            user-select: none;
            transition: transform 0.1s ease-out;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
            border: 3px solid rgba(255, 255, 255, 0.4);
            z-index: 50;
        }

        .target:hover {
            transform: scale(1.1);
        }

        .target:active {
            transform: scale(0.95);
        }

        .target.glow {
            animation: glow 0.6s ease-out;
        }

        @keyframes glow {
            0% {
                box-shadow: 0 0 20px rgba(255, 255, 255, 0.8), 0 8px 30px rgba(0, 0, 0, 0.2);
            }
            100% {
                box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
            }
        }

        .target.pulse-in {
            animation: pulseIn 0.4s cubic-bezier(0.36, 0, 0.66, -0.56);
        }

        @keyframes pulseIn {
            0% {
                transform: scale(0.3);
                opacity: 0;
            }
            70% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .target.fade-out {
            animation: fadeOut 0.3s ease-out forwards;
        }

        @keyframes fadeOut {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            100% {
                transform: scale(0.8);
                opacity: 0;
            }
        }

        /* Game Over Screen */
        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        #gameOverScreen.show {
            display: flex;
        }

        .game-over-card {
            background: white;
            border-radius: 20px;
            padding: 60px 80px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            animation: slideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes slideUp {
            from {
                transform: translateY(40px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .game-over-title {
            font-size: 48px;
            font-weight: 700;
            color: #333;
            margin-bottom: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .results {
            margin: 40px 0;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .result-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .result-label {
            font-size: 14px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .result-value {
            font-size: 48px;
            font-weight: 700;
            color: #667eea;
            font-variant-numeric: tabular-nums;
        }

        .result-value.accuracy {
            color: #764ba2;
        }

        .retry-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 48px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .retry-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(102, 126, 234, 0.6);
        }

        .retry-btn:active {
            transform: translateY(0);
        }

        /* Start Screen */
        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        #startScreen.hidden {
            display: none;
        }

        .start-card {
            text-align: center;
            color: white;
            animation: slideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .start-title {
            font-size: 56px;
            font-weight: 700;
            margin-bottom: 20px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .start-subtitle {
            font-size: 18px;
            margin-bottom: 40px;
            opacity: 0.95;
            letter-spacing: 0.5px;
        }

        .start-btn {
            background: white;
            color: #667eea;
            border: none;
            padding: 16px 56px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .start-btn:active {
            transform: translateY(0);
        }

        /* Miss Indicator */
        .miss-indicator {
            position: absolute;
            width: 70px;
            height: 70px;
            border: 3px solid #ff6b6b;
            border-radius: 50%;
            pointer-events: none;
            animation: missRipple 0.6s ease-out forwards;
        }

        @keyframes missRipple {
            0% {
                transform: scale(0.8);
                opacity: 1;
            }
            100% {
                transform: scale(1.5);
                opacity: 0;
            }
        }

        /* Floating Text */
        .floating-text {
            position: absolute;
            font-weight: 700;
            font-size: 28px;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
        }

        .floating-text.hit {
            color: #4ade80;
        }

        .floating-text.miss {
            color: #ff6b6b;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0);
                opacity: 1;
            }
            100% {
                transform: translateY(-60px);
                opacity: 0;
            }
        }

        /* Preload animations */
        .target {
            will-change: transform, opacity;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="startScreen">
            <div class="start-card">
                <div class="start-title">🎯 Target Clicker</div>
                <div class="start-subtitle">Click the targets as fast as you can</div>
                <button class="start-btn" onclick="game.startGame()">Start Game</button>
            </div>
        </div>

        <div id="header">
            <div class="game-title">🎯 Target Clicker</div>
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-label">Time</div>
                    <div class="stat-value time" id="timerDisplay">20</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Score</div>
                    <div class="stat-value" id="scoreDisplay">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Clicked</div>
                    <div class="stat-value" id="clickedDisplay">0</div>
                </div>
            </div>
        </div>

        <div id="playArea"></div>

        <div id="gameOverScreen">
            <div class="game-over-card">
                <div class="game-over-title">Game Over!</div>
                <div class="results">
                    <div class="result-item">
                        <div class="result-label">Final Score</div>
                        <div class="result-value" id="finalScore">0</div>
                    </div>
                    <div class="result-item">
                        <div class="result-label">Accuracy</div>
                        <div class="result-value accuracy" id="finalAccuracy">0%</div>
                    </div>
                </div>
                <button class="retry-btn" onclick="game.startGame()">Play Again</button>
            </div>
        </div>
    </div>

    <script>
        const colors = [
            { bg: 'linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%)', emoji: '🔴' },
            { bg: 'linear-gradient(135deg, #4ecdc4 0%, #44a7a0 100%)', emoji: '🔵' },
            { bg: 'linear-gradient(135deg, #ffe66d 0%, #ffb800 100%)', emoji: '🟡' },
            { bg: 'linear-gradient(135deg, #95e1d3 0%, #6fcc9f 100%)', emoji: '🟢' },
            { bg: 'linear-gradient(135deg, #c7b8ea 0%, #9b7fb8 100%)', emoji: '🟣' },
            { bg: 'linear-gradient(135deg, #ff8c94 0%, #ff6b5b 100%)', emoji: '🎀' },
            { bg: 'linear-gradient(135deg, #a8edea 0%, #fed6e3 100%)', emoji: '💎' },
            { bg: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)', emoji: '✨' },
        ];

        const game = {
            score: 0,
            timeLeft: 20,
            totalClicks: 0,
            targetsSpawned: 0,
            gameRunning: false,
            targetElement: null,
            spawnInterval: null,
            timerInterval: null,

            startGame() {
                // Hide start screen
                document.getElementById('startScreen').classList.add('hidden');

                // Reset stats
                this.score = 0;
                this.timeLeft = 20;
                this.totalClicks = 0;
                this.targetsSpawned = 0;
                this.gameRunning = true;

                // Hide game over screen
                document.getElementById('gameOverScreen').classList.remove('show');

                // Update display
                this.updateDisplay();

                // Start spawning targets
                this.spawnTarget();
                this.spawnInterval = setInterval(() => this.spawnTarget(), 800);

                // Start timer
                this.timerInterval = setInterval(() => this.tick(), 100);
            },

            tick() {
                this.timeLeft -= 0.1;
                if (this.timeLeft <= 0) {
                    this.endGame();
                } else {
                    this.updateDisplay();
                }
            },

            spawnTarget() {
                if (!this.gameRunning) return;

                // Remove previous target
                if (this.targetElement) {
                    this.targetElement.remove();
                }

                // Random position
                const playArea = document.getElementById('playArea');
                const maxX = playArea.clientWidth - 50;
                const maxY = playArea.clientHeight - 50;
                const x = Math.random() * maxX;
                const y = Math.random() * maxY;

                // Random color
                const colorObj = colors[Math.floor(Math.random() * colors.length)];

                // Create target
                const target = document.createElement('div');
                target.className = 'target pulse-in';
                target.style.background = colorObj.bg;
                target.style.left = x + 'px';
                target.style.top = y + 'px';
                target.textContent = colorObj.emoji;

                target.addEventListener('click', (e) => {
                    e.stopPropagation();
                    this.hitTarget(e);
                });

                playArea.appendChild(target);
                this.targetElement = target;
                this.targetsSpawned++;
            },

            hitTarget(e) {
                if (!this.gameRunning) return;

                this.score++;
                this.totalClicks++;

                const target = this.targetElement;
                const rect = target.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;

                // Glow effect
                target.classList.remove('glow');
                void target.offsetWidth; // Trigger reflow
                target.classList.add('glow');

                // Floating text
                const floatingText = document.createElement('div');
                floatingText.className = 'floating-text hit';
                floatingText.textContent = '+1';
                floatingText.style.left = centerX + 'px';
                floatingText.style.top = centerY + 'px';
                floatingText.style.transform = 'translate(-50%, -50%)';
                document.getElementById('playArea').appendChild(floatingText);

                setTimeout(() => floatingText.remove(), 800);

                // Spawn new target
                setTimeout(() => {
                    if (this.gameRunning) {
                        this.spawnTarget();
                    }
                }, 100);

                this.updateDisplay();
            },

            updateDisplay() {
                document.getElementById('timerDisplay').textContent = Math.ceil(this.timeLeft);
                document.getElementById('scoreDisplay').textContent = this.score;
                document.getElementById('clickedDisplay').textContent = this.totalClicks;
            },

            endGame() {
                this.gameRunning = false;
                clearInterval(this.spawnInterval);
                clearInterval(this.timerInterval);

                if (this.targetElement) {
                    this.targetElement.remove();
                }

                // Calculate accuracy
                const accuracy = this.targetsSpawned > 0
                    ? Math.round((this.score / this.targetsSpawned) * 100)
                    : 0;

                // Show results
                document.getElementById('finalScore').textContent = this.score;
                document.getElementById('finalAccuracy').textContent = accuracy + '%';
                document.getElementById('gameOverScreen').classList.add('show');
            }
        };

        // Initialize - show start screen
        window.addEventListener('load', () => {
            document.getElementById('startScreen').classList.remove('hidden');
        });
    </script>
</body>
</html>
