<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ocean Wave Simulation</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #canvas {
            display: block;
            width: 100%;
            height: calc(100vh - 120px);
        }

        .header {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header h1 {
            color: #e0f4ff;
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .controls {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .control-group label {
            color: #b0d4ff;
            font-size: 13px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            min-width: 100px;
        }

        .control-group input[type="range"] {
            width: 150px;
            height: 5px;
            border-radius: 5px;
            background: linear-gradient(to right, #1a5f7a, #2d9cdb);
            outline: none;
            -webkit-appearance: none;
            appearance: none;
            cursor: pointer;
        }

        .control-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #00d4ff;
            cursor: pointer;
            box-shadow: 0 0 8px rgba(0, 212, 255, 0.6);
            transition: all 0.2s;
        }

        .control-group input[type="range"]::-webkit-slider-thumb:hover {
            box-shadow: 0 0 12px rgba(0, 212, 255, 0.8);
            transform: scale(1.2);
        }

        .control-group input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #00d4ff;
            cursor: pointer;
            border: none;
            box-shadow: 0 0 8px rgba(0, 212, 255, 0.6);
            transition: all 0.2s;
        }

        .control-group input[type="range"]::-moz-range-thumb:hover {
            box-shadow: 0 0 12px rgba(0, 212, 255, 0.8);
            transform: scale(1.2);
        }

        .value-display {
            color: #00d4ff;
            font-size: 12px;
            font-weight: 600;
            min-width: 35px;
            text-align: right;
        }

        @media (max-width: 768px) {
            .controls {
                gap: 15px;
            }

            .control-group {
                gap: 8px;
            }

            .control-group label {
                font-size: 11px;
                min-width: 80px;
            }

            .control-group input[type="range"] {
                width: 100px;
            }

            #canvas {
                height: calc(100vh - 160px);
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>⋯ OCEAN WAVE SIMULATION ⋯</h1>
    </div>

    <div id="canvas"></div>

    <div class="controls">
        <div class="control-group">
            <label>Wind Speed</label>
            <input type="range" id="windSpeed" min="0" max="100" value="30">
            <span class="value-display" id="windValue">30</span>
        </div>
        <div class="control-group">
            <label>Wave Height</label>
            <input type="range" id="waveHeight" min="0.1" max="5" step="0.1" value="1">
            <span class="value-display" id="heightValue">1.0</span>
        </div>
        <div class="control-group">
            <label>Lighting</label>
            <input type="range" id="lighting" min="0" max="100" value="60">
            <span class="value-display" id="lightingValue">60</span>
        </div>
    </div>

    <script>
        // Three.js Scene Setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / (window.innerHeight - 120), 0.1, 10000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });

        const canvasContainer = document.getElementById('canvas');
        renderer.setSize(window.innerWidth, window.innerHeight - 120);
        renderer.setClearColor(0x0a1626, 1);
        canvasContainer.appendChild(renderer.domElement);

        camera.position.set(0, 30, 50);
        camera.lookAt(0, 0, 0);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(50, 100, 50);
        directionalLight.castShadow = true;
        directionalLight.shadow.mapSize.width = 2048;
        directionalLight.shadow.mapSize.height = 2048;
        scene.add(directionalLight);

        // Sky gradient
        const skyGeometry = new THREE.SphereGeometry(800, 32, 32);
        const skyMaterial = new THREE.MeshBasicMaterial({
            color: 0x1a3a52,
            side: THREE.BackSide
        });
        const sky = new THREE.Mesh(skyGeometry, skyMaterial);
        scene.add(sky);

        // Water plane with custom geometry
        const planeWidth = 200;
        const planeHeight = 200;
        const segmentsX = 128;
        const segmentsY = 128;

        const geometry = new THREE.PlaneGeometry(planeWidth, planeHeight, segmentsX, segmentsY);
        geometry.rotateX(-Math.PI / 2);

        // Water material with realistic appearance
        const material = new THREE.MeshPhongMaterial({
            color: 0x0d5a6f,
            emissive: 0x0a3a4f,
            shininess: 100,
            wireframe: false
        });

        const waterMesh = new THREE.Mesh(geometry, material);
        waterMesh.receiveShadow = true;
        waterMesh.castShadow = true;
        scene.add(waterMesh);

        // Store original positions for wave calculation
        const positionAttribute = geometry.getAttribute('position');
        const originalPositions = new Float32Array(positionAttribute.array);

        // Control parameters
        let windSpeed = 30;
        let waveHeight = 1;
        let lightingIntensity = 0.6;

        // Update control listeners
        document.getElementById('windSpeed').addEventListener('input', (e) => {
            windSpeed = parseFloat(e.target.value);
            document.getElementById('windValue').textContent = windSpeed;
        });

        document.getElementById('waveHeight').addEventListener('input', (e) => {
            waveHeight = parseFloat(e.target.value);
            document.getElementById('heightValue').textContent = waveHeight.toFixed(1);
        });

        document.getElementById('lighting').addEventListener('input', (e) => {
            const value = parseFloat(e.target.value);
            lightingIntensity = value / 100;
            document.getElementById('lightingValue').textContent = value;
            ambientLight.intensity = lightingIntensity * 0.6;
            directionalLight.intensity = lightingIntensity;
        });

        // Gerstner Wave implementation for realistic wave motion
        function gerstnerWave(pos, amplitude, frequency, phase, direction, steepness) {
            const waveX = direction.x;
            const waveZ = direction.y;
            const wi = frequency * (pos.x * waveX + pos.z * waveZ + phase);

            const cosWi = Math.cos(wi);
            const sinWi = Math.sin(wi);

            const Q = steepness / (frequency * amplitude);

            pos.x += Q * amplitude * waveX * cosWi;
            pos.y += amplitude * sinWi;
            pos.z += Q * amplitude * waveZ * cosWi;

            return pos;
        }

        // Animation loop
        let time = 0;
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            time += clock.getDelta();

            // Update water geometry based on wave parameters
            const positions = positionAttribute.array;

            for (let i = 0; i < originalPositions.length; i += 3) {
                const x = originalPositions[i];
                const y = originalPositions[i + 1];
                const z = originalPositions[i + 2];

                let pos = { x, y, z };

                // Multiple Gerstner waves for complex ocean behavior
                const speed = windSpeed / 50;

                // Primary wave
                pos = gerstnerWave(
                    pos,
                    0.8 * waveHeight,
                    0.6,
                    time * speed * 1.5,
                    { x: 1, y: 0.2 },
                    0.25
                );

                // Secondary wave
                pos = gerstnerWave(
                    pos,
                    0.5 * waveHeight,
                    1.2,
                    time * speed * 2,
                    { x: 0.3, y: 0.8 },
                    0.25
                );

                // Tertiary wave
                pos = gerstnerWave(
                    pos,
                    0.3 * waveHeight,
                    2.0,
                    time * speed * 2.5,
                    { x: -0.5, y: 0.6 },
                    0.25
                );

                positions[i] = pos.x;
                positions[i + 1] = pos.y;
                positions[i + 2] = pos.z;
            }

            positionAttribute.needsUpdate = true;
            geometry.computeVertexNormals();

            // Subtle camera movement for depth
            camera.position.x = Math.sin(time * 0.2) * 10;
            camera.position.z = 50 + Math.cos(time * 0.15) * 5;
            camera.lookAt(0, 0, 0);

            // Update sky color based on lighting
            const skyColor = new THREE.Color(0x1a3a52).lerp(new THREE.Color(0x87ceeb), lightingIntensity * 0.3);
            sky.material.color.copy(skyColor);

            // Update water color based on lighting
            const waterColor = new THREE.Color(0x0d5a6f).lerp(new THREE.Color(0x1a9bcf), lightingIntensity * 0.4);
            material.color.copy(waterColor);

            renderer.render(scene, camera);
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            const width = window.innerWidth;
            const height = window.innerHeight - 120;
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);
        });

        animate();
    </script>
</body>
</html>
