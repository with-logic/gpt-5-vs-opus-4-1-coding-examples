<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe - Roman Empire</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Lora:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Day Theme */
            --bg-primary: #f5e6d3;
            --bg-secondary: #e8d5c4;
            --accent-gold: #d4af37;
            --accent-dark: #8b7355;
            --text-dark: #3a2f26;
            --text-light: #f5e6d3;
            --border-gold: #b8930f;
            --cell-bg: #ede0cc;
            --cell-hover: #e0d1b8;
            --stone: #9a8b7f;
            --shadow: rgba(0, 0, 0, 0.15);
            --shadow-deep: rgba(0, 0, 0, 0.25);
        }

        body.night-theme {
            --bg-primary: #1a1410;
            --bg-secondary: #2d251f;
            --accent-gold: #c49d3f;
            --accent-dark: #d4af37;
            --text-dark: #f5e6d3;
            --text-light: #1a1410;
            --border-gold: #9a7d0f;
            --cell-bg: #2d251f;
            --cell-hover: #3d3529;
            --stone: #6b6157;
            --shadow: rgba(0, 0, 0, 0.4);
            --shadow-deep: rgba(0, 0, 0, 0.6);
        }

        body {
            font-family: 'Lora', serif;
            background:
                repeating-linear-gradient(
                    45deg,
                    var(--bg-primary),
                    var(--bg-primary) 10px,
                    var(--bg-secondary) 10px,
                    var(--bg-secondary) 20px
                );
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Header */
        .header {
            background: linear-gradient(to bottom, rgba(212, 175, 55, 0.1), transparent);
            border-bottom: 2px solid var(--accent-gold);
            padding: 1.5vmin 2vmin;
            box-shadow: 0 4px 12px var(--shadow);
            z-index: 100;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 2vmin;
        }

        .logo {
            font-family: 'Cinzel', serif;
            font-size: 2vmin;
            font-weight: 900;
            color: var(--accent-gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 0.5vmin;
        }

        .spqr {
            width: 3vmin;
            height: 3vmin;
            background: radial-gradient(circle, var(--accent-gold), var(--border-gold));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5vmin;
            font-weight: 900;
            color: var(--text-light);
            box-shadow: 0 2px 6px var(--shadow-deep);
        }

        .header-buttons {
            display: flex;
            gap: 1vmin;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.8vmin 1.5vmin;
            font-family: 'Cinzel', serif;
            font-size: 0.9vmin;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: linear-gradient(135deg, var(--accent-gold), var(--border-gold));
            color: var(--text-light);
            border: 1px solid var(--border-gold);
            border-radius: 0.5vmin;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px var(--shadow);
            white-space: nowrap;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px var(--shadow-deep);
            background: linear-gradient(135deg, var(--border-gold), var(--accent-gold));
        }

        .btn:active {
            transform: translateY(0);
            box-shadow: 0 1px 4px var(--shadow);
        }

        /* Main Container */
        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2vmin;
            gap: 2vmin;
        }

        /* Victory Banner */
        .victory-banner {
            position: relative;
            height: 0;
            overflow: visible;
            pointer-events: none;
        }

        .victory-text {
            font-family: 'Cinzel', serif;
            font-size: 3vmin;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-gold);
            text-shadow:
                0 2px 4px var(--shadow-deep),
                2px 2px 0 rgba(212, 175, 55, 0.3);
            opacity: 0;
            animation: bannerSlide 0.6s ease-out forwards;
            text-align: center;
        }

        @keyframes bannerSlide {
            from {
                opacity: 0;
                transform: translateY(-2vmin) scaleY(0.5);
            }
            to {
                opacity: 1;
                transform: translateY(0) scaleY(1);
            }
        }

        /* Scoreboard */
        .scoreboard {
            display: flex;
            gap: 2vmin;
            justify-content: center;
            flex-wrap: wrap;
            font-family: 'Cinzel', serif;
        }

        .score-box {
            padding: 1vmin 2vmin;
            background: rgba(212, 175, 55, 0.1);
            border: 2px solid var(--accent-gold);
            border-radius: 0.5vmin;
            text-align: center;
            min-width: 8vmin;
            box-shadow: 0 2px 8px var(--shadow);
        }

        .score-label {
            font-size: 0.8vmin;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dark);
            opacity: 0.8;
        }

        .score-value {
            font-size: 2.2vmin;
            font-weight: 900;
            color: var(--accent-gold);
            margin-top: 0.3vmin;
        }

        /* Game Board */
        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.8vmin;
            padding: 2vmin;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.05), rgba(139, 115, 85, 0.05));
            border: 3px solid var(--accent-gold);
            border-radius: 1vmin;
            box-shadow:
                0 8px 24px var(--shadow-deep),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 50vmin;
            aspect-ratio: 1;
        }

        .cell {
            aspect-ratio: 1;
            background: var(--cell-bg);
            border: 2px solid var(--accent-gold);
            border-radius: 0.6vmin;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Cinzel', serif;
            font-size: 5vmin;
            font-weight: 900;
            transition: all 0.2s ease;
            box-shadow: 0 2px 6px var(--shadow);
            position: relative;
            overflow: hidden;
        }

        .cell:hover:not(.disabled) {
            background: var(--cell-hover);
            transform: scale(0.98);
            box-shadow: 0 4px 10px var(--shadow-deep);
        }

        .cell:active:not(.disabled) {
            transform: scale(0.95);
        }

        .cell.disabled {
            cursor: not-allowed;
        }

        .cell.x {
            color: #c41e3a;
        }

        .cell.o {
            color: #003478;
        }

        .cell.winner {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.3), rgba(212, 175, 55, 0.1));
            box-shadow:
                0 0 0 3px var(--accent-gold),
                0 4px 10px var(--shadow-deep);
            animation: winnerPulse 0.6s ease-in-out;
        }

        @keyframes winnerPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .cell-content {
            position: relative;
            z-index: 1;
        }

        /* Modal Dialog */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(2px);
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-secondary);
            border: 3px solid var(--accent-gold);
            border-radius: 1vmin;
            padding: 3vmin;
            max-width: 90vmin;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 10px 40px var(--shadow-deep);
            animation: modalAppear 0.3s ease-out;
        }

        @keyframes modalAppear {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-header {
            font-family: 'Cinzel', serif;
            font-size: 2vmin;
            font-weight: 900;
            color: var(--accent-gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 2vmin;
            text-align: center;
        }

        .modal-group {
            margin-bottom: 2vmin;
        }

        .modal-label {
            display: block;
            font-family: 'Cinzel', serif;
            font-size: 1vmin;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dark);
            margin-bottom: 1vmin;
        }

        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 0.8vmin;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 1vmin;
            cursor: pointer;
            padding: 0.8vmin;
            border-radius: 0.5vmin;
            transition: background 0.2s ease;
        }

        .radio-option:hover {
            background: rgba(212, 175, 55, 0.1);
        }

        .radio-circle {
            width: 1.5vmin;
            height: 1.5vmin;
            border: 2px solid var(--accent-gold);
            border-radius: 50%;
            position: relative;
            transition: all 0.2s ease;
        }

        input[type="radio"] {
            display: none;
        }

        input[type="radio"]:checked + .radio-circle {
            background: var(--accent-gold);
            box-shadow: 0 0 6px var(--accent-gold);
        }

        input[type="radio"]:checked + .radio-circle::after {
            content: '';
            position: absolute;
            width: 0.5vmin;
            height: 0.5vmin;
            background: var(--text-light);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .modal-footer {
            display: flex;
            gap: 1vmin;
            justify-content: center;
            margin-top: 2vmin;
            flex-wrap: wrap;
        }

        .btn-close {
            background: linear-gradient(135deg, var(--accent-dark), var(--stone));
            color: var(--text-dark);
            border-color: var(--stone);
        }

        .btn-close:hover {
            background: linear-gradient(135deg, var(--stone), var(--accent-dark));
        }

        /* Status Area */
        .status {
            font-family: 'Cinzel', serif;
            font-size: 1.5vmin;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-gold);
            text-align: center;
            height: 2vmin;
            min-height: 2vmin;
        }

        /* Canvas for Confetti */
        #confetti {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 999;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-buttons {
                gap: 0.5vmin;
            }

            .btn {
                padding: 0.6vmin 1vmin;
                font-size: 0.75vmin;
            }

            .scoreboard {
                gap: 1vmin;
            }

            .score-box {
                min-width: 6vmin;
                padding: 0.8vmin 1.5vmin;
            }

            .score-value {
                font-size: 1.8vmin;
            }

            .game-board {
                gap: 0.6vmin;
                padding: 1.5vmin;
                max-width: 60vmin;
            }

            .cell {
                font-size: 4vmin;
            }

            .modal-content {
                padding: 2vmin;
                margin: 1vmin;
            }
        }

        /* Keyboard focus */
        .cell:focus-visible,
        .btn:focus-visible {
            outline: 2px solid var(--accent-gold);
            outline-offset: 2px;
        }

        /* Reduced Motion */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-content">
            <div class="logo">
                <div class="spqr">⚔</div>
                <span>Tic Tac Toe</span>
            </div>
            <div class="header-buttons">
                <button class="btn" id="newRound">New Round</button>
                <button class="btn" id="customize">Customize</button>
                <button class="btn" id="resetScores">Reset Scores</button>
            </div>
        </div>
    </div>

    <!-- Main Container -->
    <div class="container">
        <!-- Victory Banner -->
        <div class="victory-banner" id="victoryBanner"></div>

        <!-- Scoreboard -->
        <div class="scoreboard">
            <div class="score-box">
                <div class="score-label">Player X</div>
                <div class="score-value" id="scoreX">0</div>
            </div>
            <div class="score-box">
                <div class="score-label">Draws</div>
                <div class="score-value" id="scoreDraw">0</div>
            </div>
            <div class="score-box">
                <div class="score-label">Player O</div>
                <div class="score-value" id="scoreO">0</div>
            </div>
        </div>

        <!-- Status -->
        <div class="status" id="status" role="status" aria-live="polite" aria-atomic="true">
            X's Turn
        </div>

        <!-- Game Board -->
        <div class="game-board" role="grid" id="gameBoard">
            <button class="cell" data-index="0" role="gridcell" aria-label="Position 1"></button>
            <button class="cell" data-index="1" role="gridcell" aria-label="Position 2"></button>
            <button class="cell" data-index="2" role="gridcell" aria-label="Position 3"></button>
            <button class="cell" data-index="3" role="gridcell" aria-label="Position 4"></button>
            <button class="cell" data-index="4" role="gridcell" aria-label="Position 5"></button>
            <button class="cell" data-index="5" role="gridcell" aria-label="Position 6"></button>
            <button class="cell" data-index="6" role="gridcell" aria-label="Position 7"></button>
            <button class="cell" data-index="7" role="gridcell" aria-label="Position 8"></button>
            <button class="cell" data-index="8" role="gridcell" aria-label="Position 9"></button>
        </div>
    </div>

    <!-- Customize Modal -->
    <div class="modal" id="customizeModal">
        <div class="modal-content">
            <div class="modal-header">Customize</div>

            <!-- Theme -->
            <div class="modal-group">
                <label class="modal-label">Theme</label>
                <div class="radio-group">
                    <label class="radio-option">
                        <input type="radio" name="theme" value="day" checked>
                        <div class="radio-circle"></div>
                        <span>Marble Day</span>
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="theme" value="night">
                        <div class="radio-circle"></div>
                        <span>Night Legion</span>
                    </label>
                </div>
            </div>

            <!-- Glyphs -->
            <div class="modal-group">
                <label class="modal-label">Glyphs</label>
                <div class="radio-group">
                    <label class="radio-option">
                        <input type="radio" name="glyphs" value="standard" checked>
                        <div class="radio-circle"></div>
                        <span>X / O</span>
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="glyphs" value="gladius">
                        <div class="radio-circle"></div>
                        <span>⚔ / ♕</span>
                    </label>
                </div>
            </div>

            <!-- Game Mode -->
            <div class="modal-group">
                <label class="modal-label">Mode</label>
                <div class="radio-group">
                    <label class="radio-option">
                        <input type="radio" name="mode" value="2player" checked>
                        <div class="radio-circle"></div>
                        <span>2-Player</span>
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="mode" value="ai">
                        <div class="radio-circle"></div>
                        <span>vs AI</span>
                    </label>
                </div>
            </div>

            <!-- First Move -->
            <div class="modal-group">
                <label class="modal-label">First Move</label>
                <div class="radio-group">
                    <label class="radio-option">
                        <input type="radio" name="firstMove" value="x" checked>
                        <div class="radio-circle"></div>
                        <span>X</span>
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="firstMove" value="o">
                        <div class="radio-circle"></div>
                        <span>O</span>
                    </label>
                </div>
            </div>

            <!-- AI Discipline -->
            <div class="modal-group" id="aiDisciplineGroup" style="display: none;">
                <label class="modal-label">AI Discipline</label>
                <div class="radio-group">
                    <label class="radio-option">
                        <input type="radio" name="aiDiscipline" value="perfect" checked>
                        <div class="radio-circle"></div>
                        <span>Perfect</span>
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="aiDiscipline" value="pragmatic">
                        <div class="radio-circle"></div>
                        <span>Pragmatic</span>
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="aiDiscipline" value="reckless">
                        <div class="radio-circle"></div>
                        <span>Reckless</span>
                    </label>
                </div>
            </div>

            <!-- Modal Footer -->
            <div class="modal-footer">
                <button class="btn btn-close" id="closeCustomize">Close</button>
            </div>
        </div>
    </div>

    <!-- Confetti Canvas -->
    <canvas id="confetti"></canvas>

    <script>
        // Game State
        let gameState = {
            board: Array(9).fill(null),
            currentPlayer: 'X',
            gameOver: false,
            winner: null,
            scores: { X: 0, O: 0, draws: 0 },
            // Settings
            theme: 'day',
            glyphs: 'standard',
            mode: '2player',
            firstMove: 'x',
            aiDiscipline: 'perfect',
        };

        // Load settings from localStorage
        function loadSettings() {
            const saved = localStorage.getItem('tttSettings');
            if (saved) {
                Object.assign(gameState, JSON.parse(saved));
            }
            const scores = localStorage.getItem('tttScores');
            if (scores) {
                gameState.scores = JSON.parse(scores);
            }
            applyTheme();
            updateUI();
        }

        // Save settings to localStorage
        function saveSettings() {
            localStorage.setItem('tttSettings', JSON.stringify({
                theme: gameState.theme,
                glyphs: gameState.glyphs,
                mode: gameState.mode,
                firstMove: gameState.firstMove,
                aiDiscipline: gameState.aiDiscipline,
            }));
            localStorage.setItem('tttScores', JSON.stringify(gameState.scores));
        }

        // Apply theme
        function applyTheme() {
            if (gameState.theme === 'night') {
                document.body.classList.add('night-theme');
            } else {
                document.body.classList.remove('night-theme');
            }
            saveSettings();
        }

        // Get display character
        function getChar(player) {
            if (!player) return '';
            if (gameState.glyphs === 'standard') {
                return player === 'X' ? 'X' : 'O';
            } else {
                return player === 'X' ? '⚔' : '♕';
            }
        }

        // Update UI
        function updateUI() {
            const cells = document.querySelectorAll('.cell');
            cells.forEach((cell, idx) => {
                const value = gameState.board[idx];
                if (value) {
                    cell.classList.add(value.toLowerCase());
                    cell.textContent = getChar(value);
                    cell.disabled = true;
                } else {
                    cell.classList.remove('x', 'o', 'winner');
                    cell.textContent = '';
                    cell.disabled = gameState.gameOver || gameState.mode === 'ai' && gameState.currentPlayer === 'O';
                }
            });

            // Update scores
            document.getElementById('scoreX').textContent = gameState.scores.X;
            document.getElementById('scoreO').textContent = gameState.scores.O;
            document.getElementById('scoreDraw').textContent = gameState.scores.draws;

            // Update status
            const status = document.getElementById('status');
            if (gameState.gameOver) {
                if (gameState.winner) {
                    status.textContent = `${gameState.winner} Wins`;
                } else {
                    status.textContent = 'Draw';
                }
            } else {
                const player = gameState.currentPlayer;
                status.textContent = `${getChar(player)}'s Turn`;
            }
        }

        // Check winner
        function checkWinner() {
            const lines = [
                [0, 1, 2],
                [3, 4, 5],
                [6, 7, 8],
                [0, 3, 6],
                [1, 4, 7],
                [2, 5, 8],
                [0, 4, 8],
                [2, 4, 6],
            ];

            for (let line of lines) {
                const [a, b, c] = line;
                if (gameState.board[a] && gameState.board[a] === gameState.board[b] && gameState.board[a] === gameState.board[c]) {
                    return { winner: gameState.board[a], line };
                }
            }
            return null;
        }

        // Minimax AI
        function minimax(board, depth, isMaximizing, aiPlayer, humanPlayer) {
            const result = checkWinnerOnBoard(board);

            if (result && result.winner === aiPlayer) return 10 - depth;
            if (result && result.winner === humanPlayer) return depth - 10;
            if (!board.includes(null)) return 0;

            if (isMaximizing) {
                let best = -Infinity;
                for (let i = 0; i < 9; i++) {
                    if (board[i] === null) {
                        board[i] = aiPlayer;
                        best = Math.max(best, minimax(board, depth + 1, false, aiPlayer, humanPlayer));
                        board[i] = null;
                    }
                }
                return best;
            } else {
                let best = Infinity;
                for (let i = 0; i < 9; i++) {
                    if (board[i] === null) {
                        board[i] = humanPlayer;
                        best = Math.min(best, minimax(board, depth + 1, true, aiPlayer, humanPlayer));
                        board[i] = null;
                    }
                }
                return best;
            }
        }

        function checkWinnerOnBoard(board) {
            const lines = [
                [0, 1, 2], [3, 4, 5], [6, 7, 8],
                [0, 3, 6], [1, 4, 7], [2, 5, 8],
                [0, 4, 8], [2, 4, 6],
            ];

            for (let line of lines) {
                const [a, b, c] = line;
                if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                    return { winner: board[a], line };
                }
            }
            return null;
        }

        // AI Move
        function makeAIMove() {
            const humanPlayer = gameState.currentPlayer === 'X' ? 'X' : 'O';
            const aiPlayer = gameState.currentPlayer === 'X' ? 'O' : 'X';

            let moves = gameState.board
                .map((val, idx) => val === null ? idx : null)
                .filter(val => val !== null);

            let bestMove = moves[0];

            if (gameState.aiDiscipline === 'perfect') {
                let bestScore = -Infinity;
                for (let move of moves) {
                    gameState.board[move] = aiPlayer;
                    const score = minimax(gameState.board, 0, false, aiPlayer, humanPlayer);
                    gameState.board[move] = null;
                    if (score > bestScore) {
                        bestScore = score;
                        bestMove = move;
                    }
                }
            } else if (gameState.aiDiscipline === 'pragmatic') {
                // Prefer center, corners, then edges
                const corners = [0, 2, 6, 8];
                const edges = [1, 3, 5, 7];

                if (moves.some(m => m === 4)) bestMove = 4; // center
                else if (moves.some(m => corners.includes(m))) {
                    bestMove = moves.find(m => corners.includes(m));
                } else if (moves.some(m => edges.includes(m))) {
                    bestMove = moves.find(m => edges.includes(m));
                }
            } else if (gameState.aiDiscipline === 'reckless') {
                // Random move
                bestMove = moves[Math.floor(Math.random() * moves.length)];
            }

            gameState.board[bestMove] = aiPlayer;
            return bestMove;
        }

        // Make move
        function makeMove(index) {
            if (gameState.board[index] || gameState.gameOver) return;

            gameState.board[index] = gameState.currentPlayer;

            let result = checkWinner();
            if (result) {
                gameState.gameOver = true;
                gameState.winner = result.winner;
                gameState.scores[result.winner]++;
                highlightWinner(result.line);
                showVictoryBanner(result.winner);
                playConfetti();
            } else if (!gameState.board.includes(null)) {
                gameState.gameOver = true;
                gameState.scores.draws++;
                showVictoryBanner('draw');
            } else {
                gameState.currentPlayer = gameState.currentPlayer === 'X' ? 'O' : 'X';

                // AI move
                if (gameState.mode === 'ai' && gameState.currentPlayer === 'O') {
                    setTimeout(() => {
                        const aiMove = makeAIMove();
                        makeMove(aiMove);
                        updateUI();
                    }, 500);
                }
            }

            updateUI();
            saveSettings();
        }

        // Highlight winner
        function highlightWinner(line) {
            line.forEach(idx => {
                document.querySelector(`[data-index="${idx}"]`).classList.add('winner');
            });
        }

        // Show victory banner
        function showVictoryBanner(result) {
            const banner = document.getElementById('victoryBanner');
            banner.innerHTML = '';

            let text = '';
            if (result === 'draw') {
                text = 'It\'s a Draw';
            } else {
                text = `${getChar(result)} Victorious`;
            }

            const div = document.createElement('div');
            div.className = 'victory-text';
            div.textContent = text;
            banner.appendChild(div);
        }

        // Confetti
        function playConfetti() {
            if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

            const canvas = document.getElementById('confetti');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const ctx = canvas.getContext('2d');

            const confetti = [];
            const particleCount = 100;

            for (let i = 0; i < particleCount; i++) {
                confetti.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    vx: (Math.random() - 0.5) * 8,
                    vy: Math.random() * 3 + 4,
                    life: 1,
                    size: Math.random() * 4 + 2,
                    rotation: Math.random() * Math.PI * 2,
                    color: ['#d4af37', '#b8930f', '#c41e3a', '#003478'][Math.floor(Math.random() * 4)],
                });
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                for (let i = confetti.length - 1; i >= 0; i--) {
                    const p = confetti[i];
                    p.y += p.vy;
                    p.x += p.vx;
                    p.vy += 0.2;
                    p.life -= 0.01;
                    p.rotation += 0.05;

                    ctx.save();
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = p.color;
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rotation);
                    ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
                    ctx.restore();

                    if (p.life <= 0) {
                        confetti.splice(i, 1);
                    }
                }

                if (confetti.length > 0) {
                    requestAnimationFrame(animate);
                } else {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                }
            }

            animate();
        }

        // New round
        function newRound() {
            gameState.board = Array(9).fill(null);
            gameState.gameOver = false;
            gameState.winner = null;

            // Set first move
            gameState.currentPlayer = gameState.firstMove.toUpperCase();

            document.getElementById('victoryBanner').innerHTML = '';
            updateUI();

            // AI move if it's O's turn
            if (gameState.mode === 'ai' && gameState.currentPlayer === 'O') {
                setTimeout(() => {
                    const aiMove = makeAIMove();
                    makeMove(aiMove);
                    updateUI();
                }, 500);
            }
        }

        // Reset scores
        function resetScores() {
            if (confirm('Reset all scores?')) {
                gameState.scores = { X: 0, O: 0, draws: 0 };
                newRound();
                saveSettings();
                updateUI();
            }
        }

        // Cell click handler
        document.querySelectorAll('.cell').forEach((cell, idx) => {
            cell.addEventListener('click', () => {
                if (gameState.mode === '2player' || gameState.currentPlayer === 'X') {
                    makeMove(idx);
                }
            });

            cell.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    if (gameState.mode === '2player' || gameState.currentPlayer === 'X') {
                        makeMove(idx);
                    }
                }
            });
        });

        // Modal handling
        const customizeBtn = document.getElementById('customize');
        const customizeModal = document.getElementById('customizeModal');
        const closeCustomizeBtn = document.getElementById('closeCustomize');

        customizeBtn.addEventListener('click', () => {
            // Set form values
            document.querySelector(`input[name="theme"][value="${gameState.theme}"]`).checked = true;
            document.querySelector(`input[name="glyphs"][value="${gameState.glyphs}"]`).checked = true;
            document.querySelector(`input[name="mode"][value="${gameState.mode}"]`).checked = true;
            document.querySelector(`input[name="firstMove"][value="${gameState.firstMove}"]`).checked = true;
            document.querySelector(`input[name="aiDiscipline"][value="${gameState.aiDiscipline}"]`).checked = true;

            customizeModal.classList.add('active');
        });

        closeCustomizeBtn.addEventListener('click', () => {
            customizeModal.classList.remove('active');
        });

        customizeModal.addEventListener('click', (e) => {
            if (e.target === customizeModal) {
                customizeModal.classList.remove('active');
            }
        });

        // Handle setting changes
        document.querySelectorAll('input[type="radio"]').forEach(input => {
            input.addEventListener('change', (e) => {
                const { name, value } = e.target;
                if (name === 'mode') {
                    gameState.mode = value;
                    document.getElementById('aiDisciplineGroup').style.display = value === 'ai' ? 'block' : 'none';
                } else if (name === 'theme') {
                    gameState.theme = value;
                    applyTheme();
                } else if (name === 'glyphs') {
                    gameState.glyphs = value;
                } else if (name === 'firstMove') {
                    gameState.firstMove = value;
                } else if (name === 'aiDiscipline') {
                    gameState.aiDiscipline = value;
                }
                saveSettings();
            });
        });

        // Button handlers
        document.getElementById('newRound').addEventListener('click', newRound);
        document.getElementById('resetScores').addEventListener('click', resetScores);

        // Initialize
        window.addEventListener('resize', () => {
            const canvas = document.getElementById('confetti');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        loadSettings();
        newRound();
    </script>
</body>
</html>
