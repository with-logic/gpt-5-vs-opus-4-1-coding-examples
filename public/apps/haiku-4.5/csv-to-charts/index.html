<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Visualization Playground</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        .container-main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 2rem;
            align-items: start;
        }

        .control-panel {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 20px 25px rgba(0, 0, 0, 0.15);
            height: fit-content;
            position: sticky;
            top: 2rem;
        }

        .control-panel h2 {
            font-size: 1.3rem;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .control-section {
            margin-bottom: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid #e5e7eb;
        }

        .control-section:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .control-label {
            font-weight: 600;
            color: #374151;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            display: block;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }

        .file-input-wrapper input[type=file] {
            position: absolute;
            left: -9999px;
        }

        .file-input-label {
            display: block;
            padding: 0.75rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: transform 0.2s;
        }

        .file-input-label:hover {
            transform: translateY(-2px);
        }

        .file-input-label:active {
            transform: translateY(0);
        }

        select, input[type="color"], input[type="number"] {
            width: 100%;
            padding: 0.6rem 0.75rem;
            border: 2px solid #e5e7eb;
            border-radius: 6px;
            font-size: 0.95rem;
            transition: border-color 0.2s;
            font-family: inherit;
        }

        select:focus, input[type="color"]:focus, input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .color-input-wrapper {
            display: flex;
            gap: 0.5rem;
        }

        .color-input-wrapper input[type="color"] {
            width: 50px;
            flex-shrink: 0;
            padding: 0.3rem;
            cursor: pointer;
        }

        .color-input-wrapper input[type="text"] {
            flex: 1;
        }

        .chart-container {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 20px 25px rgba(0, 0, 0, 0.15);
            position: relative;
        }

        .chart-wrapper {
            position: relative;
            height: 500px;
        }

        .chart-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 500px;
            color: #9ca3af;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 1.1rem;
        }

        .button-group {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            min-width: 120px;
            padding: 0.7rem 1rem;
            border: none;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #f3f4f6;
            color: #374151;
            border: 2px solid #e5e7eb;
        }

        .btn-secondary:hover {
            background: #e5e7eb;
        }

        .tab-buttons {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 0.5rem 1rem;
            border: 2px solid #e5e7eb;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            color: #6b7280;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }

        .tab-btn:hover {
            border-color: #667eea;
        }

        .data-preview {
            background: #f9fafb;
            border-radius: 6px;
            padding: 1rem;
            margin-top: 1rem;
            max-height: 200px;
            overflow-y: auto;
            font-size: 0.85rem;
            color: #6b7280;
        }

        .data-preview-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 0.5rem;
            padding: 0.5rem 0;
            border-bottom: 1px solid #e5e7eb;
        }

        .data-preview-row:last-child {
            border-bottom: none;
        }

        .data-preview-cell {
            word-break: break-word;
        }

        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .control-panel {
                position: relative;
                top: 0;
            }

            .header h1 {
                font-size: 2rem;
            }

            .container-main {
                padding: 1rem;
            }
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #1f2937;
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.3s ease-out;
            z-index: 1000;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .column-selector {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            max-height: 150px;
            overflow-y: auto;
            background: #f9fafb;
            border-radius: 6px;
            padding: 0.5rem;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.4rem 0.5rem;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .checkbox-item:hover {
            background: #e5e7eb;
        }

        .checkbox-item input[type="checkbox"] {
            cursor: pointer;
            width: 16px;
            height: 16px;
        }

        .checkbox-item label {
            cursor: pointer;
            flex: 1;
            font-size: 0.9rem;
            color: #374151;
        }
    </style>
</head>
<body>
    <div class="container-main">
        <div class="header">
            <h1>📊 Data Visualization Playground</h1>
            <p>Upload CSV and create stunning charts instantly</p>
        </div>

        <div class="main-content">
            <!-- Control Panel -->
            <div class="control-panel">
                <!-- File Upload -->
                <div class="control-section">
                    <label class="control-label">📁 Upload CSV</label>
                    <div class="file-input-wrapper">
                        <input type="file" id="csvFile" accept=".csv" />
                        <label for="csvFile" class="file-input-label">Choose CSV File</label>
                    </div>
                    <div class="data-preview" id="dataPreview" style="display: none;"></div>
                </div>

                <!-- Chart Type -->
                <div class="control-section">
                    <label class="control-label">📈 Chart Type</label>
                    <select id="chartType">
                        <option value="line">Line Chart</option>
                        <option value="bar">Bar Chart</option>
                        <option value="doughnut">Doughnut Chart</option>
                        <option value="radar">Radar Chart</option>
                        <option value="bubble">Bubble Chart</option>
                        <option value="scatter">Scatter Chart</option>
                    </select>
                </div>

                <!-- X & Y Axis -->
                <div class="control-section">
                    <label class="control-label">📍 Data Columns</label>
                    <label class="control-label" style="font-size: 0.8rem; margin-top: 0.8rem;">X-Axis / Category:</label>
                    <select id="xAxisColumn"></select>

                    <label class="control-label" style="font-size: 0.8rem; margin-top: 0.8rem;">Y-Axis / Values:</label>
                    <div class="column-selector" id="yAxisColumns"></div>
                </div>

                <!-- Colors -->
                <div class="control-section">
                    <label class="control-label">🎨 Colors</label>
                    <div id="colorPickers"></div>
                    <button class="btn btn-secondary" id="randomColorBtn" style="margin-top: 0.8rem;">Generate Random</button>
                </div>

                <!-- Actions -->
                <div class="control-section">
                    <button class="btn btn-primary" id="downloadBtn" disabled>⬇️ Save as Image</button>
                </div>
            </div>

            <!-- Chart Display -->
            <div class="chart-container">
                <h2 class="chart-title">Chart Preview</h2>
                <div class="chart-wrapper" id="chartWrapper">
                    <div class="empty-state">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
                        </svg>
                        <p>Upload a CSV file to get started</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Register Chart.js plugin
        Chart.register(ChartDataLabels);

        let currentData = null;
        let currentChart = null;
        let csvColumns = [];

        const csvFile = document.getElementById('csvFile');
        const chartType = document.getElementById('chartType');
        const xAxisColumn = document.getElementById('xAxisColumn');
        const yAxisColumns = document.getElementById('yAxisColumns');
        const colorPickers = document.getElementById('colorPickers');
        const chartWrapper = document.getElementById('chartWrapper');
        const downloadBtn = document.getElementById('downloadBtn');
        const dataPreview = document.getElementById('dataPreview');
        const randomColorBtn = document.getElementById('randomColorBtn');

        const colors = {
            line: ['#667eea', '#764ba2', '#f093fb', '#4facfe'],
            bar: ['#667eea', '#764ba2', '#f093fb', '#4facfe', '#43e97b', '#fa7231'],
            doughnut: ['#667eea', '#764ba2', '#f093fb', '#4facfe', '#43e97b', '#fa7231', '#feca57'],
            radar: ['#667eea', '#764ba2', '#f093fb', '#4facfe'],
            bubble: ['#667eea', '#764ba2', '#f093fb'],
            scatter: ['#667eea', '#764ba2', '#f093fb', '#4facfe']
        };

        let selectedColors = { ...colors };

        // CSV Parser
        function parseCSV(csv) {
            const lines = csv.trim().split('\n');
            const headers = lines[0].split(',').map(h => h.trim());
            const data = [];

            for (let i = 1; i < lines.length; i++) {
                const obj = {};
                const currentLine = lines[i].split(',');

                for (let j = 0; j < headers.length; j++) {
                    obj[headers[j]] = currentLine[j]?.trim() || '';
                }
                data.push(obj);
            }

            return { headers, data };
        }

        // File Upload Handler
        csvFile.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const parsed = parseCSV(event.target.result);
                    currentData = parsed;
                    csvColumns = parsed.headers;

                    updateColumnSelectors();
                    showDataPreview();
                    updateChart();
                    showToast('CSV loaded successfully!');
                } catch (error) {
                    showToast('Error parsing CSV: ' + error.message, true);
                }
            };
            reader.readAsText(file);
        });

        // Update column selectors
        function updateColumnSelectors() {
            if (!csvColumns.length) return;

            // X-axis selector
            xAxisColumn.innerHTML = csvColumns.map(col =>
                `<option value="${col}">${col}</option>`
            ).join('');

            // Y-axis multi-select
            yAxisColumns.innerHTML = csvColumns.map(col => `
                <div class="checkbox-item">
                    <input type="checkbox" id="col-${col}" value="${col}" checked />
                    <label for="col-${col}">${col}</label>
                </div>
            `).join('');

            // Uncheck X-axis column for Y-axis
            updateYAxisCheckboxes();

            yAxisColumns.addEventListener('change', updateYAxisCheckboxes);
            yAxisColumns.addEventListener('change', updateChart);
        }

        function updateYAxisCheckboxes() {
            const xAxis = xAxisColumn.value;
            const checkbox = document.getElementById(`col-${xAxis}`);
            if (checkbox) {
                checkbox.checked = false;
                checkbox.disabled = true;
            }
            csvColumns.forEach(col => {
                if (col !== xAxis) {
                    const cb = document.getElementById(`col-${col}`);
                    if (cb) cb.disabled = false;
                }
            });
        }

        // Show data preview
        function showDataPreview() {
            if (!currentData) return;
            const preview = currentData.data.slice(0, 5);
            dataPreview.innerHTML = `<strong style="color: #1f2937;">Preview (${currentData.data.length} rows):</strong>` +
                preview.map(row => `
                    <div class="data-preview-row">
                        ${Object.entries(row).map(([key, val]) =>
                            `<div class="data-preview-cell"><strong>${key}:</strong> ${val}</div>`
                        ).join('')}
                    </div>
                `).join('');
            dataPreview.style.display = 'block';
        }

        // Color Pickers
        function updateColorPickers() {
            const type = chartType.value;
            const colorCount = Math.max(csvColumns.length - 1, 1);

            colorPickers.innerHTML = Array.from({ length: colorCount }, (_, i) => `
                <div style="display: flex; gap: 0.5rem; margin-bottom: 0.5rem;">
                    <input type="color" id="color-${i}" value="${selectedColors[type]?.[i] || '#667eea'}" />
                    <input type="text" id="colorText-${i}" value="${selectedColors[type]?.[i] || '#667eea'}" readonly />
                </div>
            `).join('');

            document.querySelectorAll('input[type="color"]').forEach((input, i) => {
                input.addEventListener('change', (e) => {
                    const hex = e.target.value;
                    document.getElementById(`colorText-${i}`).value = hex;
                    selectedColors[type][i] = hex;
                    updateChart();
                });
            });
        }

        // Random Colors
        randomColorBtn.addEventListener('click', () => {
            const type = chartType.value;
            const colorCount = Math.max(csvColumns.length - 1, 1);
            const newColors = Array.from({ length: colorCount }, () =>
                '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0')
            );
            selectedColors[type] = newColors;
            updateColorPickers();
            updateChart();
        });

        // Chart Type Change
        chartType.addEventListener('change', () => {
            updateColorPickers();
            updateChart();
        });

        // Axis Change
        xAxisColumn.addEventListener('change', updateYAxisCheckboxes);
        xAxisColumn.addEventListener('change', updateChart);

        // Update Chart
        function updateChart() {
            if (!currentData || !csvColumns.length) return;

            const type = chartType.value;
            const xAxis = xAxisColumn.value;
            const yAxisCols = Array.from(document.querySelectorAll('#yAxisColumns input:checked'))
                .map(el => el.value);

            if (!yAxisCols.length) {
                chartWrapper.innerHTML = '<div class="empty-state"><p>Select at least one Y-axis column</p></div>';
                downloadBtn.disabled = true;
                return;
            }

            const labels = currentData.data.map(row => row[xAxis]);
            const datasets = yAxisCols.map((col, idx) => {
                const data = currentData.data.map(row => {
                    const val = parseFloat(row[col]);
                    return isNaN(val) ? 0 : val;
                });

                const baseDataset = {
                    label: col,
                    data: data,
                    borderColor: selectedColors[type][idx],
                    backgroundColor: selectedColors[type][idx],
                    borderWidth: 2,
                    fill: false,
                    tension: 0.4
                };

                if (type === 'bar') {
                    baseDataset.backgroundColor = selectedColors[type][idx];
                } else if (type === 'doughnut') {
                    baseDataset.backgroundColor = selectedColors[type];
                    baseDataset.borderColor = '#fff';
                } else if (type === 'radar') {
                    baseDataset.pointBackgroundColor = selectedColors[type][idx];
                    baseDataset.pointBorderColor = '#fff';
                    baseDataset.pointBorderWidth = 2;
                    baseDataset.pointRadius = 5;
                    baseDataset.fill = true;
                    baseDataset.tension = 0.3;
                }

                return baseDataset;
            });

            // Destroy old chart
            if (currentChart) {
                currentChart.destroy();
            }

            const ctx = document.createElement('canvas');
            chartWrapper.innerHTML = '';
            chartWrapper.appendChild(ctx);

            const chartConfig = {
                type: type,
                data: {
                    labels: type === 'doughnut' ? yAxisCols : labels,
                    datasets: type === 'doughnut' ? [{
                        label: xAxis,
                        data: yAxisCols.map((col, idx) =>
                            currentData.data.reduce((sum, row) => sum + (parseFloat(row[col]) || 0), 0)
                        ),
                        backgroundColor: selectedColors[type],
                        borderColor: '#fff',
                        borderWidth: 3
                    }] : datasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: type !== 'doughnut',
                            position: 'bottom',
                            labels: { padding: 20, font: { size: 12 } }
                        },
                        datalabels: {
                            display: type === 'doughnut',
                            formatter: (value) => Math.round(value),
                            color: '#fff',
                            font: { weight: 'bold', size: 14 }
                        }
                    },
                    scales: type === 'doughnut' ? {} : {
                        x: {
                            display: true,
                            title: { display: true, text: xAxis, font: { size: 12, weight: 'bold' } }
                        },
                        y: {
                            display: true,
                            title: { display: true, text: 'Values', font: { size: 12, weight: 'bold' } }
                        }
                    }
                }
            };

            currentChart = new Chart(ctx, chartConfig);
            downloadBtn.disabled = false;
        }

        // Download Chart
        downloadBtn.addEventListener('click', () => {
            if (!currentChart) return;
            const link = document.createElement('a');
            link.href = currentChart.canvas.toDataURL();
            link.download = `chart-${Date.now()}.png`;
            link.click();
            showToast('Chart downloaded!');
        });

        // Toast Notification
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            toast.style.background = isError ? '#ef4444' : '#1f2937';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Initialize
        updateColorPickers();
    </script>
</body>
</html>
