<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar System Explorer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        #canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .ui-container {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
        }

        .panel {
            position: absolute;
            pointer-events: auto;
            background: rgba(10, 10, 20, 0.95);
            border: 1px solid rgba(100, 200, 255, 0.3);
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .top-left {
            top: 20px;
            left: 20px;
            max-width: 300px;
        }

        .top-right {
            top: 20px;
            right: 20px;
            width: 280px;
        }

        .bottom-center {
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            text-align: center;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        h2 {
            font-size: 18px;
            margin-bottom: 12px;
            color: #00d4ff;
        }

        h3 {
            font-size: 16px;
            margin-bottom: 8px;
            color: #00d4ff;
        }

        .control-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 12px;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #aaa;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(100, 200, 255, 0.1);
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.6);
        }

        input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            cursor: pointer;
            border: none;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.6);
        }

        .value-display {
            display: inline-block;
            float: right;
            font-size: 12px;
            color: #00d4ff;
            font-weight: bold;
        }

        .planet-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 300px;
            overflow-y: auto;
        }

        .planet-btn {
            padding: 10px 12px;
            background: rgba(100, 200, 255, 0.1);
            border: 1px solid rgba(100, 200, 255, 0.2);
            border-radius: 6px;
            color: #aaa;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 12px;
            text-align: left;
            position: relative;
        }

        .planet-btn:hover {
            background: rgba(100, 200, 255, 0.2);
            border-color: rgba(100, 200, 255, 0.5);
            color: #00d4ff;
        }

        .planet-btn.active {
            background: rgba(0, 212, 255, 0.3);
            border-color: rgba(0, 212, 255, 0.6);
            color: #00d4ff;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.4);
        }

        .planet-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 8px;
            vertical-align: middle;
        }

        #planetInfo {
            display: none;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(100, 200, 255, 0.2);
        }

        #planetInfo.visible {
            display: block;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-bottom: 8px;
            color: #ccc;
        }

        .info-label {
            color: #888;
        }

        .info-value {
            color: #00d4ff;
            font-weight: bold;
        }

        .controls-label {
            font-size: 11px;
            color: #666;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            font-size: 12px;
            color: #888;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(0, 212, 255, 0.6);
        }

        .sun-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: radial-gradient(circle, #ffaa00, #ff6600);
            box-shadow: 0 0 10px rgba(255, 102, 0, 0.8);
        }

        .instructions {
            font-size: 11px;
            color: #666;
            margin-top: 12px;
            line-height: 1.5;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(100, 200, 255, 0.05);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(100, 200, 255, 0.3);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(100, 200, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="ui-container">
        <div class="panel top-left">
            <h1>☀️ Solar System</h1>
            <div class="control-group">
                <label for="speedControl">Orbit Speed</label>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <input type="range" id="speedControl" min="0" max="3" step="0.1" value="1">
                    <span class="value-display" id="speedValue">1.0x</span>
                </div>
            </div>
            <div class="controls-label">Click planets for info</div>
            <div class="instructions">
                <strong>Controls:</strong><br>
                🖱️ Drag to rotate<br>
                🔍 Scroll to zoom<br>
                ▶️ Pause/Resume
            </div>
        </div>

        <div class="panel top-right">
            <h2>Planets</h2>
            <div class="planet-list" id="planetList"></div>
            <div id="planetInfo">
                <h3 id="infoTitle"></h3>
                <div class="info-row">
                    <span class="info-label">Diameter:</span>
                    <span class="info-value" id="infoDiameter"></span>
                </div>
                <div class="info-row">
                    <span class="info-label">Distance from Sun:</span>
                    <span class="info-value" id="infoDistance"></span>
                </div>
                <div class="info-row">
                    <span class="info-label">Orbit Period:</span>
                    <span class="info-value" id="infoPeriod"></span>
                </div>
                <div class="info-row">
                    <span class="info-label">Type:</span>
                    <span class="info-value" id="infoType"></span>
                </div>
            </div>
        </div>

        <div class="panel bottom-center">
            <div class="status-bar">
                <div class="status-item">
                    <div class="sun-indicator"></div>
                    <span>Sun</span>
                </div>
                <div class="status-item">
                    <span id="clockDisplay">Paused</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Scene setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        camera.position.set(0, 80, 100);
        camera.lookAt(0, 0, 0);

        // Lighting
        const sunLight = new THREE.PointLight(0xFFAA00, 2, 500);
        sunLight.position.set(0, 0, 0);
        sunLight.castShadow = true;
        scene.add(sunLight);

        const ambientLight = new THREE.AmbientLight(0x333333);
        scene.add(ambientLight);

        // Stars background
        const starsGeometry = new THREE.BufferGeometry();
        const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.7 });
        const starsVertices = [];
        for (let i = 0; i < 10000; i++) {
            starsVertices.push(
                (Math.random() - 0.5) * 4000,
                (Math.random() - 0.5) * 4000,
                (Math.random() - 0.5) * 4000
            );
        }
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(starsVertices), 3));
        const stars = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(stars);

        // Planet data
        const planetsData = [
            { name: 'Mercury', size: 3.8, distance: 45, speed: 0.04, color: 0x8c7853, period: 88, diameter: '4,879 km', type: 'Terrestrial' },
            { name: 'Venus', size: 9.5, distance: 65, speed: 0.015, color: 0xffc649, period: 225, diameter: '12,104 km', type: 'Terrestrial' },
            { name: 'Earth', size: 10, distance: 90, speed: 0.01, color: 0x0066ff, period: 365, diameter: '12,742 km', type: 'Terrestrial' },
            { name: 'Mars', size: 5.3, distance: 120, speed: 0.008, color: 0xff5722, period: 687, diameter: '6,779 km', type: 'Terrestrial' },
            { name: 'Jupiter', size: 25, distance: 180, speed: 0.002, color: 0xdaa520, period: 4383, diameter: '139,820 km', type: 'Gas Giant' },
            { name: 'Saturn', size: 21, distance: 240, speed: 0.0009, color: 0xf4a460, period: 10759, diameter: '116,460 km', type: 'Gas Giant' },
            { name: 'Uranus', size: 15, distance: 300, speed: 0.0004, color: 0x4fd0e7, period: 30687, diameter: '50,724 km', type: 'Ice Giant' },
            { name: 'Neptune', size: 15, distance: 350, speed: 0.0001, color: 0x4166f5, period: 60190, diameter: '49,244 km', type: 'Ice Giant' }
        ];

        // Create sun
        const sunGeometry = new THREE.IcosahedronGeometry(20, 32);
        const sunMaterial = new THREE.MeshBasicMaterial({ color: 0xFFAA00 });
        const sun = new THREE.Mesh(sunGeometry, sunMaterial);
        scene.add(sun);

        // Create planets
        const planets = [];
        const orbitLines = [];

        planetsData.forEach((data) => {
            // Create planet
            const geometry = new THREE.IcosahedronGeometry(data.size, 32);
            const material = new THREE.MeshPhongMaterial({ color: data.color });
            const planet = new THREE.Mesh(geometry, material);
            planet.castShadow = true;
            planet.receiveShadow = true;
            planet.userData = data;
            scene.add(planet);

            // Create orbit line
            const orbitGeometry = new THREE.BufferGeometry();
            const orbitPoints = [];
            for (let i = 0; i <= 64; i++) {
                const angle = (i / 64) * Math.PI * 2;
                orbitPoints.push(
                    Math.cos(angle) * data.distance,
                    0,
                    Math.sin(angle) * data.distance
                );
            }
            orbitGeometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(orbitPoints), 3));
            const orbitMaterial = new THREE.LineBasicMaterial({ color: data.color, transparent: true, opacity: 0.2 });
            const orbitLine = new THREE.Line(orbitGeometry, orbitMaterial);
            scene.add(orbitLine);

            planets.push({
                mesh: planet,
                angle: 0,
                data: data
            });
            orbitLines.push(orbitLine);
        });

        // Mouse controls
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        let cameraRotation = { x: 0, y: 0 };

        document.addEventListener('mousedown', (e) => {
            isDragging = true;
            previousMousePosition = { x: e.clientX, y: e.clientY };
        });

        document.addEventListener('mousemove', (e) => {
            if (isDragging) {
                const deltaX = e.clientX - previousMousePosition.x;
                const deltaY = e.clientY - previousMousePosition.y;

                cameraRotation.y += deltaX * 0.01;
                cameraRotation.x += deltaY * 0.01;

                const radius = Math.sqrt(camera.position.x ** 2 + camera.position.y ** 2 + camera.position.z ** 2);
                camera.position.x = radius * Math.sin(cameraRotation.y) * Math.cos(cameraRotation.x);
                camera.position.y = radius * Math.sin(cameraRotation.x);
                camera.position.z = radius * Math.cos(cameraRotation.y) * Math.cos(cameraRotation.x);
                camera.lookAt(0, 0, 0);

                previousMousePosition = { x: e.clientX, y: e.clientY };
            }
        });

        document.addEventListener('mouseup', () => {
            isDragging = false;
        });

        document.addEventListener('wheel', (e) => {
            e.preventDefault();
            const radius = Math.sqrt(camera.position.x ** 2 + camera.position.y ** 2 + camera.position.z ** 2);
            const newRadius = Math.max(50, Math.min(500, radius + e.deltaY * 0.5));
            const scale = newRadius / radius;

            camera.position.x *= scale;
            camera.position.y *= scale;
            camera.position.z *= scale;
        }, { passive: false });

        // Speed control
        let speedMultiplier = 1;
        document.getElementById('speedControl').addEventListener('input', (e) => {
            speedMultiplier = parseFloat(e.target.value);
            document.getElementById('speedValue').textContent = speedMultiplier.toFixed(1) + 'x';
        });

        // Planet click handling
        let selectedPlanet = null;
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        document.addEventListener('click', (event) => {
            // Don't select if clicking on UI elements
            if (event.target.closest('.panel')) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(planets.map(p => p.mesh));

            if (intersects.length > 0) {
                const clickedPlanet = planets.find(p => p.mesh === intersects[0].object);
                selectPlanet(clickedPlanet);
            } else {
                selectPlanet(null);
            }
        });

        function selectPlanet(planet) {
            selectedPlanet = planet;

            // Update button states
            document.querySelectorAll('.planet-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            if (planet) {
                const btnIndex = planetsData.indexOf(planet.data);
                document.querySelectorAll('.planet-btn')[btnIndex].classList.add('active');

                document.getElementById('planetInfo').classList.add('visible');
                document.getElementById('infoTitle').textContent = planet.data.name;
                document.getElementById('infoDiameter').textContent = planet.data.diameter;
                document.getElementById('infoDistance').textContent = Math.round(planet.data.distance) + ' million km (scaled)';
                document.getElementById('infoPeriod').textContent = planet.data.period + ' Earth days';
                document.getElementById('infoType').textContent = planet.data.type;
            } else {
                document.getElementById('planetInfo').classList.remove('visible');
            }
        }

        // Populate planet list
        const planetList = document.getElementById('planetList');
        planetsData.forEach((data, index) => {
            const btn = document.createElement('button');
            btn.className = 'planet-btn';
            btn.innerHTML = `<span class="planet-indicator" style="background-color: ${['#8c7853', '#ffc649', '#0066ff', '#ff5722', '#daa520', '#f4a460', '#4fd0e7', '#4166f5'][index]}"></span>${data.name}`;
            btn.addEventListener('click', () => {
                selectPlanet(planets[index]);
            });
            planetList.appendChild(btn);
        });

        // Animation loop
        let isRunning = true;
        let clockValue = 0;

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                isRunning = !isRunning;
                document.getElementById('clockDisplay').textContent = isRunning ? 'Running' : 'Paused';
                e.preventDefault();
            }
        });

        function animate() {
            requestAnimationFrame(animate);

            if (isRunning) {
                planets.forEach((planet) => {
                    planet.angle += planet.data.speed * speedMultiplier * 0.016;
                    planet.mesh.position.x = Math.cos(planet.angle) * planet.data.distance;
                    planet.mesh.position.z = Math.sin(planet.angle) * planet.data.distance;
                    planet.mesh.rotation.y += 0.005;
                });
                clockValue += 0.016;
            }

            sun.rotation.y += 0.001;

            renderer.render(scene, camera);
        }

        animate();

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Initialize
        document.getElementById('clockDisplay').textContent = 'Running';
    </script>
</body>
</html>
