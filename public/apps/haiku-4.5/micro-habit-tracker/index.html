<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micro Habit Tracker</title>
    <link href="https://cdn.tailwindcss.com" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 8px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .header p {
            font-size: 1rem;
            opacity: 0.95;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #f3f4f6;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e5e7eb;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 0.875rem;
        }

        .habits-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 640px) {
            .habits-grid {
                grid-template-columns: 1fr;
            }
        }

        .habit-card {
            background: #f9fafb;
            border-radius: 15px;
            padding: 20px;
            border: 2px solid #e5e7eb;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .habit-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .habit-card:hover {
            border-color: #667eea;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.15);
            transform: translateY(-2px);
        }

        .habit-card:hover::before {
            opacity: 1;
        }

        .habit-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }

        .habit-name {
            font-size: 1.2rem;
            font-weight: 700;
            color: #1f2937;
            flex: 1;
        }

        .habit-actions {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            opacity: 0.6;
            transition: opacity 0.2s;
            padding: 4px;
        }

        .icon-btn:hover {
            opacity: 1;
        }

        .streak-display {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 15px;
            padding: 12px;
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            border-radius: 10px;
            color: white;
            font-weight: 600;
        }

        .streak-display .number {
            font-size: 1.5rem;
            font-weight: 800;
        }

        .checkmark-row {
            display: flex;
            gap: 4px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .checkmark {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: 2px solid #d1d5db;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 600;
            position: relative;
        }

        .checkmark.completed {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-color: #667eea;
            color: white;
        }

        .checkmark.skipped {
            background: #f3f4f6;
            border-color: #d1d5db;
            color: #9ca3af;
            text-decoration: line-through;
        }

        .checkmark:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }

        .checkmark-tooltip {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2937;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            margin-bottom: 4px;
        }

        .checkmark:hover .checkmark-tooltip {
            opacity: 1;
        }

        .habit-chart {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e5e7eb;
        }

        .chart-label {
            font-size: 0.8rem;
            color: #6b7280;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .chart-bars {
            display: flex;
            gap: 4px;
            align-items: flex-end;
            height: 40px;
        }

        .chart-bar {
            flex: 1;
            background: linear-gradient(to top, #667eea, #764ba2);
            border-radius: 4px 4px 0 0;
            min-height: 4px;
            position: relative;
            transition: all 0.3s ease;
        }

        .chart-bar:hover {
            opacity: 0.8;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }

        .modal.open {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: #1f2937;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #374151;
        }

        .form-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 30px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.8);
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.8;
        }

        .empty-state-text {
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        .empty-state-subtext {
            font-size: 1rem;
            opacity: 0.8;
            margin-bottom: 30px;
        }

        .stats-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.2);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 0.9rem;
            opacity: 0.95;
            font-weight: 600;
        }

        @media (max-width: 640px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .controls {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }

            .stats-panel {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: white;
            padding: 16px 24px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            animation: slideInUp 0.3s ease;
            max-width: 300px;
        }

        @keyframes slideInUp {
            from {
                transform: translateY(100px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✨ Micro Habit Tracker</h1>
            <p>Build momentum with tiny daily wins</p>
        </div>

        <div class="controls">
            <button class="btn btn-primary" onclick="openAddModal()">
                ➕ Add Habit
            </button>
            <button class="btn btn-secondary btn-small" onclick="exportData()">
                📥 Export
            </button>
            <button class="btn btn-secondary btn-small" onclick="openImportModal()">
                📤 Import
            </button>
        </div>

        <div class="stats-panel" id="statsPanel"></div>

        <div id="habitsContainer" class="glass">
            <div class="habits-grid" id="habitsGrid"></div>
        </div>

        <div class="empty-state" id="emptyState" style="display: none;">
            <div class="empty-state-icon">🎯</div>
            <div class="empty-state-text">No habits yet</div>
            <div class="empty-state-subtext">Create your first habit to get started</div>
        </div>
    </div>

    <!-- Add/Edit Habit Modal -->
    <div class="modal" id="habitModal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle">Add New Habit</div>
            <form onsubmit="saveHabit(event)">
                <div class="form-group">
                    <label class="form-label">Habit Name</label>
                    <input type="text" id="habitName" class="form-input" placeholder="e.g., Morning Meditation" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Description (optional)</label>
                    <input type="text" id="habitDescription" class="form-input" placeholder="Why is this habit important?">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Habit</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Import Modal -->
    <div class="modal" id="importModal">
        <div class="modal-content">
            <div class="modal-title">Import Habits</div>
            <form onsubmit="importData(event)">
                <div class="form-group">
                    <label class="form-label">Paste JSON data</label>
                    <textarea id="importData" class="form-input" rows="8" placeholder="Paste your exported JSON here" required></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeImportModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Import</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Data management
        let habits = [];
        let editingId = null;

        const STORAGE_KEY = 'microHabits';
        const DATES_KEY = 'microHabitDates';

        // Initialize with example data
        function initializeData() {
            const storedHabits = localStorage.getItem(STORAGE_KEY);
            if (storedHabits) {
                habits = JSON.parse(storedHabits);
            } else {
                // Create example data
                const today = new Date();
                const dates = [];
                for (let i = 6; i >= 0; i--) {
                    const d = new Date(today);
                    d.setDate(d.getDate() - i);
                    dates.push(d.toISOString().split('T')[0]);
                }

                habits = [
                    {
                        id: Date.now(),
                        name: '🧘 Meditation',
                        description: '10 minutes of mindfulness',
                        createdAt: dates[0],
                        completions: {
                            [dates[0]]: 'completed',
                            [dates[1]]: 'completed',
                            [dates[2]]: 'completed',
                            [dates[3]]: 'skipped',
                            [dates[4]]: 'completed',
                            [dates[5]]: 'completed',
                            [dates[6]]: 'completed'
                        }
                    },
                    {
                        id: Date.now() + 1,
                        name: '💪 Exercise',
                        description: '30 minutes of movement',
                        createdAt: dates[0],
                        completions: {
                            [dates[0]]: 'completed',
                            [dates[1]]: 'completed',
                            [dates[2]]: 'completed',
                            [dates[3]]: 'completed',
                            [dates[4]]: 'skipped',
                            [dates[5]]: 'completed',
                            [dates[6]]: 'completed'
                        }
                    },
                    {
                        id: Date.now() + 2,
                        name: '📖 Reading',
                        description: '20 pages before bed',
                        createdAt: dates[1],
                        completions: {
                            [dates[1]]: 'completed',
                            [dates[2]]: 'completed',
                            [dates[3]]: 'completed',
                            [dates[4]]: 'completed',
                            [dates[5]]: 'completed',
                            [dates[6]]: 'completed'
                        }
                    },
                    {
                        id: Date.now() + 3,
                        name: '💧 Hydration',
                        description: '8 glasses of water',
                        createdAt: dates[2],
                        completions: {
                            [dates[2]]: 'completed',
                            [dates[3]]: 'completed',
                            [dates[4]]: 'completed',
                            [dates[5]]: 'completed',
                            [dates[6]]: 'completed'
                        }
                    }
                ];
                saveData();
            }
            render();
        }

        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(habits));
        }

        function render() {
            const grid = document.getElementById('habitsGrid');
            const container = document.getElementById('habitsContainer');
            const emptyState = document.getElementById('emptyState');
            const statsPanel = document.getElementById('statsPanel');

            if (habits.length === 0) {
                grid.innerHTML = '';
                container.style.display = 'none';
                emptyState.style.display = 'block';
                statsPanel.innerHTML = '';
                return;
            }

            container.style.display = 'block';
            emptyState.style.display = 'none';

            grid.innerHTML = habits.map(habit => createHabitCard(habit)).join('');
            renderStats();
        }

        function createHabitCard(habit) {
            const today = new Date().toISOString().split('T')[0];
            const dates = getLast7Dates();
            const completions = habit.completions || {};

            // Calculate streak
            let streak = 0;
            for (let i = 0; i < 365; i++) {
                const d = new Date();
                d.setDate(d.getDate() - i);
                const dateStr = d.toISOString().split('T')[0];
                const status = completions[dateStr];
                if (status === 'completed') {
                    streak++;
                } else if (status !== 'skipped') {
                    break;
                }
            }

            // Calculate completion rate for chart
            const completionData = dates.map(date => {
                const status = completions[date];
                return status === 'completed' ? 1 : (status === 'skipped' ? 0.3 : 0);
            });

            const maxValue = Math.max(...completionData, 1);

            return `
                <div class="habit-card">
                    <div class="habit-header">
                        <div class="habit-name">${habit.name}</div>
                        <div class="habit-actions">
                            <button class="icon-btn" onclick="editHabit(${habit.id})" title="Edit">✏️</button>
                            <button class="icon-btn" onclick="deleteHabit(${habit.id})" title="Delete">🗑️</button>
                        </div>
                    </div>

                    <div class="streak-display">
                        <span>🔥</span>
                        <div>
                            <div class="number">${streak}</div>
                            <div style="font-size: 0.75rem; opacity: 0.9;">day streak</div>
                        </div>
                    </div>

                    <div class="checkmark-row">
                        ${dates.map((date, idx) => {
                            const status = completions[date] || 'empty';
                            const isToday = date === today;
                            const dayNum = 7 - idx;
                            let cssClass = 'checkmark';
                            let symbol = '';

                            if (status === 'completed') {
                                cssClass += ' completed';
                                symbol = '✓';
                            } else if (status === 'skipped') {
                                cssClass += ' skipped';
                                symbol = '○';
                            }

                            return `
                                <button
                                    class="${cssClass}"
                                    onclick="toggleDay(${habit.id}, '${date}')"
                                    style="border: ${isToday ? '3px solid #667eea' : '2px solid #d1d5db'};"
                                >
                                    ${symbol}
                                    <div class="checkmark-tooltip">${new Date(date).toLocaleDateString('en-US', {month: 'short', day: 'numeric'})}</div>
                                </button>
                            `;
                        }).join('')}
                    </div>

                    <div class="habit-chart">
                        <div class="chart-label">7-DAY ACTIVITY</div>
                        <div class="chart-bars">
                            ${completionData.map(value => `
                                <div class="chart-bar" style="height: ${(value / maxValue) * 100}%"></div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        function getLast7Dates() {
            const dates = [];
            for (let i = 6; i >= 0; i--) {
                const d = new Date();
                d.setDate(d.getDate() - i);
                dates.push(d.toISOString().split('T')[0]);
            }
            return dates;
        }

        function toggleDay(habitId, date) {
            const habit = habits.find(h => h.id === habitId);
            if (!habit) return;

            if (!habit.completions) habit.completions = {};

            const current = habit.completions[date];
            if (current === 'completed') {
                habit.completions[date] = 'skipped';
            } else if (current === 'skipped') {
                delete habit.completions[date];
            } else {
                habit.completions[date] = 'completed';
            }

            saveData();
            render();
        }

        function openAddModal() {
            editingId = null;
            document.getElementById('modalTitle').textContent = 'Add New Habit';
            document.getElementById('habitName').value = '';
            document.getElementById('habitDescription').value = '';
            document.getElementById('habitModal').classList.add('open');
            document.getElementById('habitName').focus();
        }

        function editHabit(habitId) {
            const habit = habits.find(h => h.id === habitId);
            if (!habit) return;

            editingId = habitId;
            document.getElementById('modalTitle').textContent = 'Edit Habit';
            document.getElementById('habitName').value = habit.name;
            document.getElementById('habitDescription').value = habit.description || '';
            document.getElementById('habitModal').classList.add('open');
            document.getElementById('habitName').focus();
        }

        function saveHabit(event) {
            event.preventDefault();

            const name = document.getElementById('habitName').value.trim();
            const description = document.getElementById('habitDescription').value.trim();

            if (!name) return;

            if (editingId) {
                const habit = habits.find(h => h.id === editingId);
                if (habit) {
                    habit.name = name;
                    habit.description = description;
                }
            } else {
                habits.push({
                    id: Date.now(),
                    name,
                    description,
                    createdAt: new Date().toISOString().split('T')[0],
                    completions: {}
                });
            }

            saveData();
            render();
            closeModal();
            showNotification(editingId ? '✏️ Habit updated!' : '✨ Habit added!');
        }

        function deleteHabit(habitId) {
            if (confirm('Are you sure you want to delete this habit?')) {
                habits = habits.filter(h => h.id !== habitId);
                saveData();
                render();
                showNotification('🗑️ Habit deleted');
            }
        }

        function closeModal() {
            document.getElementById('habitModal').classList.remove('open');
            editingId = null;
        }

        function openImportModal() {
            document.getElementById('importData').value = '';
            document.getElementById('importModal').classList.add('open');
        }

        function closeImportModal() {
            document.getElementById('importModal').classList.remove('open');
        }

        function exportData() {
            const dataStr = JSON.stringify(habits, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `habits-${new Date().toISOString().split('T')[0]}.json`;
            link.click();
            URL.revokeObjectURL(url);
            showNotification('📥 Exported successfully');
        }

        function importData(event) {
            event.preventDefault();
            try {
                const imported = JSON.parse(document.getElementById('importData').value);
                if (!Array.isArray(imported)) throw new Error('Invalid format');

                habits = imported;
                saveData();
                render();
                closeImportModal();
                showNotification('📤 Imported successfully');
            } catch (e) {
                alert('Invalid JSON format: ' + e.message);
            }
        }

        function renderStats() {
            const statsPanel = document.getElementById('statsPanel');
            const today = new Date().toISOString().split('T')[0];

            const todayCompleted = habits.filter(h => h.completions?.[today] === 'completed').length;
            const totalHabits = habits.length;
            const avgStreak = Math.round(
                habits.reduce((sum, h) => {
                    let streak = 0;
                    for (let i = 0; i < 365; i++) {
                        const d = new Date();
                        d.setDate(d.getDate() - i);
                        const dateStr = d.toISOString().split('T')[0];
                        const status = h.completions?.[dateStr];
                        if (status === 'completed') {
                            streak++;
                        } else if (status !== 'skipped') {
                            break;
                        }
                    }
                    return sum + streak;
                }, 0) / Math.max(totalHabits, 1)
            );

            const last7Days = [];
            for (let i = 6; i >= 0; i--) {
                const d = new Date();
                d.setDate(d.getDate() - i);
                last7Days.push(d.toISOString().split('T')[0]);
            }

            const weekCompletion = Math.round(
                (habits.reduce((sum, h) => {
                    return sum + last7Days.filter(date => h.completions?.[date] === 'completed').length;
                }, 0) / (habits.length * 7)) * 100
            );

            statsPanel.innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${todayCompleted}</div>
                    <div class="stat-label">Today's Wins</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${totalHabits}</div>
                    <div class="stat-label">Total Habits</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${avgStreak}</div>
                    <div class="stat-label">Avg Streak</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${weekCompletion}%</div>
                    <div class="stat-label">Week Complete</div>
                </div>
            `;
        }

        function showNotification(message) {
            const notif = document.createElement('div');
            notif.className = 'notification';
            notif.textContent = message;
            document.body.appendChild(notif);

            setTimeout(() => {
                notif.style.animation = 'slideInUp 0.3s ease reverse';
                setTimeout(() => notif.remove(), 300);
            }, 2000);
        }

        // Close modals on background click
        document.getElementById('habitModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('habitModal')) closeModal();
        });

        document.getElementById('importModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('importModal')) closeImportModal();
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
                closeImportModal();
            }
        });

        // Initialize on load
        window.addEventListener('load', initializeData);
    </script>
</body>
</html>
