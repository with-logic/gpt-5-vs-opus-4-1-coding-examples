<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom QR Code Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            overflow: hidden;
        }

        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            padding: 40px;
        }

        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
                gap: 30px;
                padding: 30px 20px;
            }
        }

        .header {
            grid-column: 1 / -1;
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 32px;
            color: #333;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .input-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            color: #333;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"],
        input[type="color"] {
            padding: 12px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        input[type="color"] {
            width: 100%;
            height: 50px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            padding: 4px;
        }

        .color-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .color-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .color-group label {
            font-size: 12px;
        }

        .color-value {
            font-size: 12px;
            color: #999;
            margin-top: -4px;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-generate {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            grid-column: 1 / -1;
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-generate:active {
            transform: translateY(0);
        }

        .btn-download {
            background: #4CAF50;
            color: white;
        }

        .btn-download:hover {
            background: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.3);
        }

        .btn-download:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .btn-reset {
            background: #f0f0f0;
            color: #333;
        }

        .btn-reset:hover {
            background: #e0e0e0;
            transform: translateY(-2px);
        }

        .preview-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            justify-content: center;
        }

        .qr-container {
            width: 100%;
            max-width: 300px;
            aspect-ratio: 1;
            background: white;
            border-radius: 12px;
            border: 2px solid #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .qr-container.empty {
            background: #f9f9f9;
            border-color: #f0f0f0;
        }

        .qr-container svg {
            width: 100%;
            height: 100%;
        }

        .qr-placeholder {
            color: #999;
            font-size: 14px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        .qr-info {
            text-align: center;
            width: 100%;
        }

        .qr-info p {
            color: #666;
            font-size: 13px;
            margin-bottom: 8px;
        }

        .size-indicator {
            display: inline-block;
            padding: 6px 12px;
            background: #f0f0f0;
            border-radius: 20px;
            font-size: 12px;
            color: #666;
            font-weight: 500;
        }

        .demo-section {
            grid-column: 1 / -1;
            padding-top: 20px;
            border-top: 2px solid #f0f0f0;
        }

        .demo-title {
            font-size: 12px;
            font-weight: 600;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .demo-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .demo-btn {
            padding: 8px 12px;
            background: #f0f0f0;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .demo-btn:hover {
            background: #e8e8e8;
            border-color: #d0d0d0;
        }

        .error-message {
            color: #d32f2f;
            font-size: 12px;
            margin-top: 8px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            color: #4CAF50;
            font-size: 12px;
            margin-top: 8px;
            display: none;
            animation: fadeInOut 2s ease-in-out;
        }

        .success-message.show {
            display: block;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0; }
            10%, 90% { opacity: 1; }
        }

        .input-hint {
            font-size: 12px;
            color: #999;
            margin-top: -4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="content">
            <div class="header">
                <h1>Custom QR Code Generator</h1>
                <p>Create and customize QR codes instantly</p>
            </div>

            <div class="input-section">
                <div class="form-group">
                    <label for="qrInput">Text or URL</label>
                    <input
                        type="text"
                        id="qrInput"
                        placeholder="Enter text, URL, or any content..."
                        maxlength="2953"
                    >
                    <div class="input-hint" id="charCount">0 / 2953 characters</div>
                </div>

                <div class="form-group">
                    <label>Colors</label>
                    <div class="color-inputs">
                        <div class="color-group">
                            <label for="darkColor">Dark Color</label>
                            <input type="color" id="darkColor" value="#000000">
                            <div class="color-value" id="darkColorValue">#000000</div>
                        </div>
                        <div class="color-group">
                            <label for="lightColor">Light Color</label>
                            <input type="color" id="lightColor" value="#FFFFFF">
                            <div class="color-value" id="lightColorValue">#FFFFFF</div>
                        </div>
                    </div>
                </div>

                <div class="button-group">
                    <button class="btn-generate" id="generateBtn">Generate QR</button>
                    <button class="btn-reset" id="resetBtn">Reset</button>
                </div>

                <button class="btn-download" id="downloadBtn" disabled>Download PNG</button>

                <div id="errorMessage" class="error-message"></div>
                <div id="successMessage" class="success-message"></div>

                <div class="demo-section">
                    <div class="demo-title">Quick Examples</div>
                    <div class="demo-buttons">
                        <button class="demo-btn" data-demo="https://example.com">Website</button>
                        <button class="demo-btn" data-demo="Hello, World!">Text</button>
                        <button class="demo-btn" data-demo="https://github.com">GitHub</button>
                    </div>
                </div>
            </div>

            <div class="preview-section">
                <div class="qr-container empty" id="qrContainer">
                    <div class="qr-placeholder">Enter text above to generate QR code</div>
                </div>
                <div class="qr-info" id="qrInfo" style="display: none;">
                    <p id="qrText"></p>
                    <span class="size-indicator" id="sizeIndicator"></span>
                </div>
            </div>
        </div>
    </div>

    <script>
        let lastQRCode = null;
        let lastQRData = null;

        const elements = {
            input: document.getElementById('qrInput'),
            darkColor: document.getElementById('darkColor'),
            lightColor: document.getElementById('lightColor'),
            darkColorValue: document.getElementById('darkColorValue'),
            lightColorValue: document.getElementById('lightColorValue'),
            generateBtn: document.getElementById('generateBtn'),
            resetBtn: document.getElementById('resetBtn'),
            downloadBtn: document.getElementById('downloadBtn'),
            container: document.getElementById('qrContainer'),
            qrInfo: document.getElementById('qrInfo'),
            qrText: document.getElementById('qrText'),
            sizeIndicator: document.getElementById('sizeIndicator'),
            errorMessage: document.getElementById('errorMessage'),
            successMessage: document.getElementById('successMessage'),
            charCount: document.getElementById('charCount')
        };

        // Update character count
        elements.input.addEventListener('input', (e) => {
            const count = e.target.value.length;
            elements.charCount.textContent = `${count} / 2953 characters`;
        });

        // Update color value displays
        elements.darkColor.addEventListener('change', (e) => {
            elements.darkColorValue.textContent = e.target.value.toUpperCase();
        });

        elements.lightColor.addEventListener('change', (e) => {
            elements.lightColorValue.textContent = e.target.value.toUpperCase();
        });

        // Generate QR Code
        function generateQRCode() {
            const text = elements.input.value.trim();
            const darkColor = elements.darkColor.value;
            const lightColor = elements.lightColor.value;

            // Clear previous messages
            hideMessages();

            // Validation
            if (!text) {
                showError('Please enter some text or a URL');
                return;
            }

            if (darkColor === lightColor) {
                showError('Dark and light colors must be different');
                return;
            }

            // Clear previous QR code
            elements.container.innerHTML = '';
            elements.container.classList.remove('empty');

            try {
                // Store data for download
                lastQRData = {
                    text: text,
                    darkColor: darkColor,
                    lightColor: lightColor
                };

                // Create new QR code
                lastQRCode = new QRCode(elements.container, {
                    text: text,
                    width: 300,
                    height: 300,
                    colorDark: darkColor,
                    colorLight: lightColor,
                    correctLevel: QRCode.CorrectLevel.H
                });

                // Update info
                elements.qrText.textContent = text.length > 50 ? text.substring(0, 50) + '...' : text;
                elements.sizeIndicator.textContent = `${text.length} characters`;
                elements.qrInfo.style.display = 'block';

                // Enable download button
                elements.downloadBtn.disabled = false;
            } catch (error) {
                showError('Failed to generate QR code: ' + error.message);
            }
        }

        // Download QR Code as PNG
        function downloadQRCode() {
            const svg = elements.container.querySelector('svg');
            if (!svg) return;

            // Create canvas
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const size = 1024; // High resolution

            canvas.width = size;
            canvas.height = size;

            // Get colors from the QR code
            const darkColor = lastQRData.darkColor;
            const lightColor = lastQRData.lightColor;

            // Fill background
            ctx.fillStyle = lightColor;
            ctx.fillRect(0, 0, size, size);

            // Create a new QR code on canvas
            const qrCode = new QRCode({
                text: lastQRData.text,
                width: size,
                height: size,
                colorDark: darkColor,
                colorLight: lightColor,
                correctLevel: QRCode.CorrectLevel.H
            });

            // Convert SVG to image, then draw on canvas
            const svgString = new XMLSerializer().serializeToString(svg);
            const img = new Image();
            const blob = new Blob([svgString], { type: 'image/svg+xml' });
            const url = URL.createObjectURL(blob);

            img.onload = () => {
                // Scale and draw the SVG
                ctx.drawImage(img, 0, 0, size, size);
                URL.revokeObjectURL(url);

                // Download
                const downloadCanvas = document.createElement('canvas');
                downloadCanvas.width = size;
                downloadCanvas.height = size;
                const downloadCtx = downloadCanvas.getContext('2d');

                // Fill with light color
                downloadCtx.fillStyle = lightColor;
                downloadCtx.fillRect(0, 0, size, size);

                // Draw QR code with correct colors
                const qrImg = new Image();
                qrImg.onload = () => {
                    downloadCtx.drawImage(qrImg, 0, 0);
                    downloadCanvas.toBlob((blob) => {
                        const link = document.createElement('a');
                        link.href = URL.createObjectURL(blob);
                        link.download = 'qrcode.png';
                        link.click();
                        showSuccess('QR code downloaded successfully!');
                    });
                };
                qrImg.src = canvas.toDataURL('image/png');
            };

            img.onerror = () => {
                URL.revokeObjectURL(url);
                // Fallback: download as SVG
                const svgBlob = new Blob([svgString], { type: 'image/svg+xml' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(svgBlob);
                link.download = 'qrcode.svg';
                link.click();
                showSuccess('QR code downloaded as SVG!');
            };

            img.src = url;
        }

        // Better PNG download using canvas
        function downloadQRCodePNG() {
            if (!lastQRData) return;

            const size = 1024;
            const darkColor = lastQRData.darkColor;
            const lightColor = lastQRData.lightColor;

            // Create temporary container for high-res QR
            const tempDiv = document.createElement('div');
            new QRCode(tempDiv, {
                text: lastQRData.text,
                width: size,
                height: size,
                colorDark: darkColor,
                colorLight: lightColor,
                correctLevel: QRCode.CorrectLevel.H
            });

            const svg = tempDiv.querySelector('svg');
            const svgString = new XMLSerializer().serializeToString(svg);
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;

            const ctx = canvas.getContext('2d');
            const img = new Image();

            img.onload = () => {
                ctx.drawImage(img, 0, 0);
                canvas.toBlob((blob) => {
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(blob);
                    link.download = 'qrcode.png';
                    link.click();
                    showSuccess('QR code downloaded successfully!');
                });
            };

            img.src = 'data:image/svg+xml;base64,' + btoa(svgString);
        }

        // Error handling
        function showError(message) {
            elements.errorMessage.textContent = message;
            elements.errorMessage.classList.add('show');
        }

        function showSuccess(message) {
            elements.successMessage.textContent = message;
            elements.successMessage.classList.add('show');
            setTimeout(() => {
                elements.successMessage.classList.remove('show');
            }, 2000);
        }

        function hideMessages() {
            elements.errorMessage.classList.remove('show');
        }

        // Reset form
        function resetForm() {
            elements.input.value = '';
            elements.darkColor.value = '#000000';
            elements.lightColor.value = '#FFFFFF';
            elements.darkColorValue.textContent = '#000000';
            elements.lightColorValue.textContent = '#FFFFFF';
            elements.charCount.textContent = '0 / 2953 characters';
            elements.container.innerHTML = '<div class="qr-placeholder">Enter text above to generate QR code</div>';
            elements.container.classList.add('empty');
            elements.qrInfo.style.display = 'none';
            elements.downloadBtn.disabled = true;
            hideMessages();
            lastQRCode = null;
            lastQRData = null;
            elements.input.focus();
        }

        // Event listeners
        elements.generateBtn.addEventListener('click', generateQRCode);
        elements.resetBtn.addEventListener('click', resetForm);
        elements.downloadBtn.addEventListener('click', downloadQRCodePNG);

        // Enter key to generate
        elements.input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                generateQRCode();
            }
        });

        // Demo buttons
        document.querySelectorAll('.demo-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                elements.input.value = e.target.dataset.demo;
                elements.charCount.textContent = `${elements.input.value.length} / 2953 characters`;
                generateQRCode();
                elements.input.focus();
            });
        });

        // Initial focus
        elements.input.focus();
    </script>
</body>
</html>
