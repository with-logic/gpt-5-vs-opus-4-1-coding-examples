<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivia Quiz</title>
    <link href="https://cdn.tailwindcss.com" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e5e7eb;
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            transition: width 0.5s ease-out;
        }

        .progress-text {
            text-align: center;
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .question-container {
            margin-bottom: 30px;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .question-text {
            font-size: 24px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        .answers-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .answer-btn {
            background: #f3f4f6;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            padding: 16px 20px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
            font-weight: 500;
            color: #374151;
        }

        .answer-btn:hover:not(:disabled) {
            background: #f9fafb;
            border-color: #667eea;
            transform: translateX(4px);
        }

        .answer-btn:disabled {
            cursor: not-allowed;
        }

        .answer-btn.correct {
            background: #d1fae5;
            border-color: #10b981;
            color: #047857;
        }

        .answer-btn.incorrect {
            background: #fee2e2;
            border-color: #ef4444;
            color: #dc2626;
        }

        .feedback-icon {
            display: inline-block;
            margin-left: 8px;
            font-size: 20px;
            animation: popIn 0.4s ease-out;
        }

        @keyframes popIn {
            0% {
                transform: scale(0);
            }
            50% {
                transform: scale(1.2);
            }
            100% {
                transform: scale(1);
            }
        }

        .next-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .next-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .next-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .start-screen,
        .results-screen {
            text-align: center;
            animation: fadeIn 0.5s ease-out;
        }

        .start-screen h1,
        .results-screen h1 {
            font-size: 36px;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 16px;
        }

        .start-screen p,
        .results-screen p {
            color: #6b7280;
            font-size: 16px;
            margin-bottom: 24px;
            line-height: 1.6;
        }

        .score-display {
            font-size: 64px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 30px 0;
        }

        .score-text {
            font-size: 20px;
            color: #6b7280;
            margin-bottom: 30px;
        }

        .start-btn,
        .restart-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .start-btn:hover,
        .restart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .hidden {
            display: none !important;
        }

        .results-summary {
            background: #f9fafb;
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
            text-align: left;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e5e7eb;
        }

        .summary-item:last-child {
            border-bottom: none;
        }

        .summary-label {
            color: #6b7280;
            font-weight: 500;
        }

        .summary-value {
            color: #1f2937;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Start Screen -->
        <div id="startScreen" class="start-screen">
            <h1>🧠 Trivia Quiz</h1>
            <p>Test your knowledge with 10 exciting questions about US civics, history, geography, and more!</p>
            <p style="color: #9ca3af; font-size: 14px;">Questions are randomly selected and presented in a random order.</p>
            <button class="start-btn" onclick="startQuiz()">Start Quiz</button>
        </div>

        <!-- Quiz Screen -->
        <div id="quizScreen" class="hidden">
            <div class="progress-text">
                <span id="questionNumber">1</span> / <span id="totalQuestions">10</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>

            <div class="question-container">
                <div class="question-text" id="questionText"></div>
                <div class="answers-container" id="answersContainer"></div>
            </div>

            <button class="next-btn" id="nextBtn" onclick="nextQuestion()" disabled>Next Question</button>
        </div>

        <!-- Results Screen -->
        <div id="resultsScreen" class="hidden results-screen">
            <h1>🎉 Quiz Complete!</h1>
            <div class="score-display" id="scoreDisplay">0/10</div>
            <p class="score-text" id="scoreMessage"></p>
            <div class="results-summary">
                <div class="summary-item">
                    <span class="summary-label">Correct Answers</span>
                    <span class="summary-value" id="correctCount">0</span>
                </div>
                <div class="summary-item">
                    <span class="summary-label">Incorrect Answers</span>
                    <span class="summary-value" id="incorrectCount">0</span>
                </div>
                <div class="summary-item">
                    <span class="summary-label">Score Percentage</span>
                    <span class="summary-value" id="scorePercentage">0%</span>
                </div>
            </div>
            <button class="restart-btn" onclick="restartQuiz()">Try Again</button>
        </div>
    </div>

    <script>
        const quizData = [
            {
                question: "What is the capital of the United States?",
                answers: ["New York", "Washington, D.C.", "Boston", "Philadelphia"],
                correct: 1
            },
            {
                question: "In which year did the United States declare independence?",
                answers: ["1775", "1776", "1781", "1789"],
                correct: 1
            },
            {
                question: "Who was the first President of the United States?",
                answers: ["Thomas Jefferson", "George Washington", "Benjamin Franklin", "John Adams"],
                correct: 1
            },
            {
                question: "How many states are there in the United States?",
                answers: ["48", "49", "50", "51"],
                correct: 2
            },
            {
                question: "What is the largest state in the United States by area?",
                answers: ["Texas", "California", "Alaska", "Montana"],
                correct: 2
            },
            {
                question: "Which mountain range is the longest in the United States?",
                answers: ["Sierra Nevada", "Rocky Mountains", "Appalachian Mountains", "Cascade Range"],
                correct: 2
            },
            {
                question: "What is the most populated state in the United States?",
                answers: ["Texas", "New York", "California", "Florida"],
                correct: 2
            },
            {
                question: "In which city is the Statue of Liberty located?",
                answers: ["Boston", "New York", "Washington, D.C.", "Philadelphia"],
                correct: 1
            },
            {
                question: "What is the smallest state in the United States by area?",
                answers: ["Delaware", "Connecticut", "Rhode Island", "Vermont"],
                correct: 2
            },
            {
                question: "Which branch of government has the power to declare laws unconstitutional?",
                answers: ["Legislative", "Executive", "Judicial", "Administrative"],
                correct: 2
            }
        ];

        let currentQuestionIndex = 0;
        let score = 0;
        let selectedAnswerIndex = null;
        let answeredQuestions = [];
        let shuffledQuiz = [];

        function shuffleArray(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function startQuiz() {
            shuffledQuiz = shuffleArray(quizData);
            currentQuestionIndex = 0;
            score = 0;
            selectedAnswerIndex = null;
            answeredQuestions = [];

            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('quizScreen').classList.remove('hidden');
            document.getElementById('resultsScreen').classList.add('hidden');

            loadQuestion();
        }

        function loadQuestion() {
            const question = shuffledQuiz[currentQuestionIndex];
            selectedAnswerIndex = null;

            document.getElementById('questionNumber').textContent = currentQuestionIndex + 1;
            document.getElementById('questionText').textContent = question.question;

            const answersContainer = document.getElementById('answersContainer');
            answersContainer.innerHTML = '';

            const shuffledAnswers = question.answers.map((answer, index) => ({
                text: answer,
                originalIndex: index
            }));
            shuffleArray(shuffledAnswers).forEach((answer, displayIndex) => {
                const btn = document.createElement('button');
                btn.className = 'answer-btn';
                btn.textContent = answer.text;
                btn.onclick = () => selectAnswer(answer.originalIndex, btn);
                answersContainer.appendChild(btn);
            });

            updateProgressBar();
            document.getElementById('nextBtn').disabled = true;
        }

        function selectAnswer(answerIndex, buttonElement) {
            const question = shuffledQuiz[currentQuestionIndex];
            selectedAnswerIndex = answerIndex;

            const allButtons = document.querySelectorAll('.answer-btn');
            allButtons.forEach(btn => btn.disabled = true);

            if (answerIndex === question.correct) {
                buttonElement.classList.add('correct');
                buttonElement.innerHTML += ' <span class="feedback-icon">✓</span>';
                score++;
            } else {
                buttonElement.classList.add('incorrect');
                buttonElement.innerHTML += ' <span class="feedback-icon">✗</span>';
                const correctButton = Array.from(allButtons).find(
                    (btn, idx) => idx === question.correct
                );
                if (correctButton) {
                    correctButton.classList.add('correct');
                    correctButton.innerHTML += ' <span class="feedback-icon">✓</span>';
                }
            }

            answeredQuestions.push({
                question: question.question,
                selected: question.answers[answerIndex],
                correct: question.answers[question.correct],
                isCorrect: answerIndex === question.correct
            });

            document.getElementById('nextBtn').disabled = false;
        }

        function nextQuestion() {
            currentQuestionIndex++;

            if (currentQuestionIndex < shuffledQuiz.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function updateProgressBar() {
            const progress = ((currentQuestionIndex + 1) / shuffledQuiz.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }

        function showResults() {
            document.getElementById('quizScreen').classList.add('hidden');
            document.getElementById('resultsScreen').classList.remove('hidden');

            const percentage = Math.round((score / shuffledQuiz.length) * 100);

            document.getElementById('scoreDisplay').textContent = `${score}/${shuffledQuiz.length}`;
            document.getElementById('correctCount').textContent = score;
            document.getElementById('incorrectCount').textContent = shuffledQuiz.length - score;
            document.getElementById('scorePercentage').textContent = percentage + '%';

            let message = '';
            if (percentage === 100) {
                message = "Perfect score! You're a trivia master! 🏆";
            } else if (percentage >= 80) {
                message = "Excellent work! You really know your stuff! 🌟";
            } else if (percentage >= 60) {
                message = "Good job! You did well on the quiz. 👍";
            } else if (percentage >= 40) {
                message = "Not bad! There's always room to learn more. 📚";
            } else {
                message = "Keep practicing! You'll improve with time. 💪";
            }

            document.getElementById('scoreMessage').textContent = message;
        }

        function restartQuiz() {
            document.getElementById('startScreen').classList.remove('hidden');
            document.getElementById('quizScreen').classList.add('hidden');
            document.getElementById('resultsScreen').classList.add('hidden');
        }
    </script>
</body>
</html>
