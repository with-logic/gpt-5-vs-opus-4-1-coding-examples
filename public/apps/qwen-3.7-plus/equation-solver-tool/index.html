<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Equation Solver Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&family=JetBrains+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/mathjs@12.2.1/lib/browser/math.js"></script>
<style>
  :root {
    --bg: #faf9f6;
    --bg-card: #ffffff;
    --bg-code: #f5f3ee;
    --text: #1a1a1a;
    --text-secondary: #555555;
    --text-muted: #888888;
    --border: #e0ddd5;
    --border-light: #ebe8e0;
    --accent: #8b1a1a;
    --accent-light: #b22222;
    --accent-bg: #fdf5f5;
    --step-line: #c9c4b8;
    --step-bg: #f8f6f1;
    --success: #2d6a4f;
    --success-bg: #f0faf5;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-lg: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Crimson Pro', 'Georgia', serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    max-width: 780px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
  }

  /* Header */
  header {
    text-align: center;
    padding: 3rem 0 2.5rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 2.5rem;
  }

  header h1 {
    font-family: 'Crimson Pro', serif;
    font-size: 2.4rem;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--text);
    margin-bottom: 0.3rem;
  }

  header .subtitle {
    font-family: 'Inter', sans-serif;
    font-size: 0.82rem;
    font-weight: 400;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* Input Section */
  .input-section {
    margin-bottom: 2rem;
  }

  .input-label {
    font-family: 'Inter', sans-serif;
    font-size: 0.75rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-secondary);
    margin-bottom: 0.6rem;
    display: block;
  }

  .input-wrapper {
    position: relative;
    display: flex;
    gap: 0.5rem;
  }

  .equation-input {
    flex: 1;
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.05rem;
    padding: 0.9rem 1.1rem;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: var(--bg-card);
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .equation-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(139, 26, 26, 0.08);
  }

  .equation-input::placeholder {
    color: var(--text-muted);
    font-style: italic;
    font-family: 'Crimson Pro', serif;
    font-size: 1rem;
  }

  .solve-btn {
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    padding: 0.9rem 1.8rem;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    white-space: nowrap;
    letter-spacing: 0.02em;
  }

  .solve-btn:hover { background: var(--accent-light); }
  .solve-btn:active { transform: scale(0.98); }

  /* Examples */
  .examples {
    margin-top: 0.8rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    align-items: center;
  }

  .examples-label {
    font-family: 'Inter', sans-serif;
    font-size: 0.7rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-right: 0.3rem;
  }

  .example-chip {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    padding: 0.3rem 0.7rem;
    background: var(--bg-code);
    border: 1px solid var(--border-light);
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text-secondary);
  }

  .example-chip:hover {
    background: var(--accent-bg);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Mode Selector */
  .mode-selector {
    display: flex;
    gap: 0.25rem;
    margin-bottom: 1.5rem;
    padding: 0.25rem;
    background: var(--bg-code);
    border-radius: 8px;
    border: 1px solid var(--border-light);
  }

  .mode-btn {
    flex: 1;
    font-family: 'Inter', sans-serif;
    font-size: 0.78rem;
    font-weight: 400;
    padding: 0.55rem 0.8rem;
    background: transparent;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    color: var(--text-secondary);
    transition: all 0.2s;
  }

  .mode-btn.active {
    background: var(--bg-card);
    color: var(--text);
    font-weight: 500;
    box-shadow: var(--shadow);
  }

  .mode-btn:hover:not(.active) {
    color: var(--text);
  }

  /* Results */
  .results-section {
    margin-top: 2rem;
  }

  .result-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 2rem;
    box-shadow: var(--shadow);
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 1.5rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border-light);
  }

  .result-header h2 {
    font-family: 'Crimson Pro', serif;
    font-size: 1.3rem;
    font-weight: 600;
    color: var(--text);
  }

  .result-type {
    font-family: 'Inter', sans-serif;
    font-size: 0.68rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--accent);
    background: var(--accent-bg);
    padding: 0.25rem 0.6rem;
    border-radius: 4px;
  }

  .rendered-equation {
    text-align: center;
    padding: 1.2rem;
    background: var(--step-bg);
    border-radius: 8px;
    margin-bottom: 1.5rem;
    border: 1px solid var(--border-light);
  }

  .rendered-equation .katex { font-size: 1.4rem; }

  /* Solution Box */
  .solution-box {
    background: var(--success-bg);
    border: 1px solid #b7e4c7;
    border-radius: 8px;
    padding: 1.2rem 1.5rem;
    margin-bottom: 1.8rem;
    text-align: center;
  }

  .solution-box .solution-label {
    font-family: 'Inter', sans-serif;
    font-size: 0.68rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--success);
    margin-bottom: 0.5rem;
  }

  .solution-box .katex { font-size: 1.3rem; }

  /* Steps */
  .steps-header {
    font-family: 'Inter', sans-serif;
    font-size: 0.75rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-secondary);
    margin-bottom: 1rem;
  }

  .step {
    position: relative;
    padding-left: 2.5rem;
    padding-bottom: 1.5rem;
  }

  .step:last-child { padding-bottom: 0; }

  .step::before {
    content: '';
    position: absolute;
    left: 0.55rem;
    top: 1.6rem;
    bottom: 0;
    width: 1.5px;
    background: var(--step-line);
  }

  .step:last-child::before { display: none; }

  .step-number {
    position: absolute;
    left: 0;
    top: 0.15rem;
    width: 1.25rem;
    height: 1.25rem;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 0.65rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .step-content {
    background: var(--step-bg);
    border: 1px solid var(--border-light);
    border-radius: 7px;
    padding: 0.9rem 1.1rem;
  }

  .step-explanation {
    font-family: 'Crimson Pro', serif;
    font-size: 1.02rem;
    color: var(--text-secondary);
    margin-bottom: 0.5rem;
    line-height: 1.5;
  }

  .step-math {
    padding: 0.4rem 0;
  }

  .step-math .katex { font-size: 1.1rem; }

  /* Export */
  .export-bar {
    display: flex;
    gap: 0.5rem;
    margin-top: 1.5rem;
    padding-top: 1.2rem;
    border-top: 1px solid var(--border-light);
  }

  .export-btn {
    font-family: 'Inter', sans-serif;
    font-size: 0.75rem;
    font-weight: 500;
    padding: 0.5rem 1rem;
    background: var(--bg-code);
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    color: var(--text-secondary);
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .export-btn:hover {
    background: var(--bg-card);
    border-color: var(--accent);
    color: var(--accent);
  }

  .export-btn svg {
    width: 14px;
    height: 14px;
  }

  /* History */
  .history-section {
    margin-top: 3rem;
  }

  .history-section h3 {
    font-family: 'Inter', sans-serif;
    font-size: 0.75rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    margin-bottom: 0.8rem;
  }

  .history-item {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem;
    padding: 0.6rem 0.9rem;
    background: var(--bg-card);
    border: 1px solid var(--border-light);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: 0.4rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: var(--text-secondary);
  }

  .history-item:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .history-item .history-answer {
    font-family: 'Crimson Pro', serif;
    font-size: 0.9rem;
    color: var(--success);
  }

  /* Error */
  .error-box {
    background: #fef2f2;
    border: 1px solid #fecaca;
    border-radius: 8px;
    padding: 1rem 1.3rem;
    color: #991b1b;
    font-family: 'Crimson Pro', serif;
    font-size: 1rem;
    animation: fadeIn 0.3s ease;
  }

  .error-box strong {
    font-weight: 600;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    font-family: 'Inter', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    padding: 0.7rem 1.4rem;
    background: var(--text);
    color: #fff;
    border-radius: 8px;
    box-shadow: var(--shadow-lg);
    transition: transform 0.3s ease;
    z-index: 100;
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
  }

  /* Footer */
  footer {
    text-align: center;
    padding: 2rem 0;
    margin-top: 3rem;
    border-top: 1px solid var(--border-light);
    font-family: 'Inter', sans-serif;
    font-size: 0.72rem;
    color: var(--text-muted);
    letter-spacing: 0.04em;
  }

  /* Responsive */
  @media (max-width: 600px) {
    .container { padding: 1rem; }
    header { padding: 2rem 0 1.5rem; }
    header h1 { font-size: 1.8rem; }
    .input-wrapper { flex-direction: column; }
    .solve-btn { width: 100%; }
    .result-card { padding: 1.3rem; }
    .mode-selector { flex-wrap: wrap; }
    .mode-btn { flex: none; width: calc(50% - 0.125rem); text-align: center; }
  }

  /* Print styles */
  @media print {
    body { background: #fff; }
    .input-section, .mode-selector, .export-bar, .history-section, .examples { display: none; }
    .result-card { box-shadow: none; border: 1px solid #ccc; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>Equation Solver</h1>
    <div class="subtitle">Step-by-step solutions with detailed explanations</div>
  </header>

  <div class="mode-selector">
    <button class="mode-btn active" data-mode="auto" onclick="setMode('auto')">Auto Detect</button>
    <button class="mode-btn" data-mode="linear" onclick="setMode('linear')">Linear</button>
    <button class="mode-btn" data-mode="quadratic" onclick="setMode('quadratic')">Quadratic</button>
    <button class="mode-btn" data-mode="system" onclick="setMode('system')">System</button>
    <button class="mode-btn" data-mode="simplify" onclick="setMode('simplify')">Simplify</button>
  </div>

  <div class="input-section">
    <label class="input-label">Enter your equation</label>
    <div class="input-wrapper">
      <input type="text" class="equation-input" id="equationInput"
        placeholder="e.g. 2x + 3 = 11"
        autocomplete="off" spellcheck="false">
      <button class="solve-btn" onclick="solveEquation()">Solve</button>
    </div>
    <div class="examples">
      <span class="examples-label">Try:</span>
      <span class="example-chip" onclick="tryExample(this)">3x + 5 = 20</span>
      <span class="example-chip" onclick="tryExample(this)">x^2 - 5x + 6 = 0</span>
      <span class="example-chip" onclick="tryExample(this)">2x + y = 10, x - y = 2</span>
      <span class="example-chip" onclick="tryExample(this)">(x+3)(x-2)</span>
      <span class="example-chip" onclick="tryExample(this)">5(x-3) = 2x + 6</span>
    </div>
  </div>

  <div id="results" class="results-section"></div>

  <div id="historySection" class="history-section" style="display:none;">
    <h3>Recent Solutions</h3>
    <div id="historyList"></div>
  </div>

  <footer>
    Equation Solver Tool &middot; Supports linear, quadratic, systems &amp; simplification
  </footer>
</div>

<div class="toast" id="toast"></div>

<script>
// Wait for libraries to load
let mathReady = false;
let katexReady = false;

function checkReady() {
  if (typeof math !== 'undefined') mathReady = true;
  if (typeof katex !== 'undefined') katexReady = true;
  return mathReady && katexReady;
}

// Wait for libraries
function waitForLibs(cb) {
  if (checkReady()) { cb(); return; }
  const interval = setInterval(() => {
    if (checkReady()) { clearInterval(interval); cb(); }
  }, 50);
}

let currentMode = 'auto';
let history = [];

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === mode);
  });
}

function tryExample(el) {
  document.getElementById('equationInput').value = el.textContent;
  solveEquation();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Render KaTeX
function renderMath(latex, el) {
  if (!el) el = document.createElement('span');
  try {
    katex.render(latex, el, { throwOnError: false, displayMode: false });
  } catch(e) {
    el.textContent = latex;
  }
  return el;
}

function renderMathDisplay(latex) {
  const el = document.createElement('span');
  try {
    katex.render(latex, el, { throwOnError: false, displayMode: true });
  } catch(e) {
    el.textContent = latex;
  }
  return el;
}

// Enter key
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('equationInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') solveEquation();
  });
});

// ============ SOLVER ENGINE ============

function solveEquation() {
  const input = document.getElementById('equationInput').value.trim();
  if (!input) return;

  const resultsDiv = document.getElementById('results');
  resultsDiv.innerHTML = '';

  try {
    let result;
    const mode = currentMode === 'auto' ? detectMode(input) : currentMode;

    switch(mode) {
      case 'linear': result = solveLinear(input); break;
      case 'quadratic': result = solveQuadratic(input); break;
      case 'system': result = solveSystem(input); break;
      case 'simplify': result = simplifyExpression(input); break;
      default: result = autoSolve(input); break;
    }

    if (result) {
      renderResult(result, input);
      addToHistory(input, result);
    }
  } catch(e) {
    resultsDiv.innerHTML = `<div class="error-box"><strong>Error:</strong> ${escapeHtml(e.message)}. Please check your equation and try again.</div>`;
  }
}

function detectMode(input) {
  // System of equations
  if (input.includes(',') && (input.match(/[a-z]/g) || []).length >= 2) {
    const vars = [...new Set(input.match(/[a-z]/g))];
    if (vars.length >= 2) return 'system';
  }

  // Simplify (no equals sign)
  if (!input.includes('=')) return 'simplify';

  // Check for quadratic
  if (input.match(/[a-z]\s*\^?\s*2/) || input.match(/[a-z]²/)) return 'quadratic';

  // Try to detect higher powers
  try {
    const sides = input.split('=');
    for (const side of sides) {
      const cleaned = side.replace(/\s/g, '');
      if (cleaned.match(/x\^[2-9]/) || cleaned.match(/x[²³⁴⁵⁶⁷⁸⁹]/)) return 'quadratic';
    }
  } catch(e) {}

  // Check if it's actually quadratic by trying to parse
  try {
    const expr = input.replace(/=/, '-(') + ')';
    const parsed = math.parse(expr);
    const expanded = math.simplify(parsed);
    const str = expanded.toString();
    if (str.match(/\^[2-9]/)) return 'quadratic';
  } catch(e) {}

  return 'linear';
}

function autoSolve(input) {
  const mode = detectMode(input);
  switch(mode) {
    case 'linear': return solveLinear(input);
    case 'quadratic': return solveQuadratic(input);
    case 'system': return solveSystem(input);
    case 'simplify': return simplifyExpression(input);
  }
}

// ============ LINEAR SOLVER ============

function solveLinear(input) {
  const steps = [];
  steps.push({
    explanation: 'Start with the original equation.',
    latex: toLatex(input)
  });

  // Parse equation: split on =
  const sides = splitEquation(input);
  if (sides.length !== 2) throw new Error('Expected an equation with "="');

  let leftStr = sides[0].trim();
  let rightStr = sides[1].trim();

  // Find the variable
  const vars = [...new Set((leftStr + rightStr).match(/[a-zA-Z]/g) || [])];
  if (vars.length === 0) {
    // No variable - just evaluate both sides
    const lVal = math.evaluate(leftStr);
    const rVal = math.evaluate(rightStr);
    steps.push({
      explanation: `Evaluate both sides.`,
      latex: `${formatNum(lVal)} ${lVal === rVal ? '=' : '\\neq'} ${formatNum(rVal)}`
    });
    return {
      type: 'Verification',
      input: input,
      solutions: [lVal === rVal ? 'True' : 'False'],
      steps: steps,
      latexSolution: lVal === rVal ? `${formatNum(lVal)} = ${formatNum(rVal)} \;\\checkmark` : `${formatNum(lVal)} \\neq ${formatNum(rVal)}`
    };
  }

  const variable = vars[0];

  // Collect terms: move everything to standard form ax = b
  // Parse left and right
  let leftTerms = collectTerms(leftStr, variable);
  let rightTerms = collectTerms(rightStr, variable);

  steps.push({
    explanation: `Identify variable terms and constant terms on each side.`,
    latex: `\\text{Left: } ${termsToLatex(leftTerms, variable)} \\quad \\text{Right: } ${termsToLatex(rightTerms, variable)}`
  });

  // Move variable terms to left, constants to right
  let coeff = leftTerms.coeff - rightTerms.coeff;
  let constant = rightTerms.constant - leftTerms.constant;

  if (rightTerms.coeff !== 0 || leftTerms.constant !== 0) {
    let moveParts = [];
    if (rightTerms.coeff !== 0) {
      moveParts.push(`subtract ${formatCoeffTerm(rightTerms.coeff, variable)} from both sides`);
    }
    if (leftTerms.constant !== 0) {
      moveParts.push(`${leftTerms.constant > 0 ? 'subtract' : 'add'} ${formatNum(Math.abs(leftTerms.constant))} ${leftTerms.constant > 0 ? 'from' : 'to'} both sides`);
    }

    steps.push({
      explanation: `Isolate the variable: ${moveParts.join(' and ')}.`,
      latex: `${formatCoeffTerm(coeff, variable)} = ${formatNum(constant)}`
    });
  }

  if (coeff === 0) {
    if (constant === 0) {
      return {
        type: 'Linear Equation',
        input: input,
        solutions: ['Infinite solutions (identity)'],
        steps: steps,
        latexSolution: `${variable} \\in \\mathbb{R}`
      };
    } else {
      return {
        type: 'Linear Equation',
        input: input,
        solutions: ['No solution (contradiction)'],
        steps: steps,
        latexSolution: '\\text{No solution}'
      };
    }
  }

  if (coeff !== 1) {
    steps.push({
      explanation: `Divide both sides by ${formatNum(coeff)}.`,
      latex: `${variable} = \\frac{${formatNum(constant)}}{${formatNum(coeff)}}`
    });
  }

  const solution = constant / coeff;
  const solutionLatex = formatFraction(constant, coeff, variable);

  steps.push({
    explanation: `The solution is:`,
    latex: `${variable} = ${numberToLatex(solution)}`
  });

  // Verification step
  const verifyLatex = buildVerification(input, variable, solution);
  if (verifyLatex) {
    steps.push({
      explanation: `Verify by substituting ${variable} = ${numberToLatex(solution)} back into the original equation.`,
      latex: verifyLatex
    });
  }

  return {
    type: 'Linear Equation',
    input: input,
    solutions: [`${variable} = ${numberToLatex(solution)}`],
    steps: steps,
    latexSolution: `${variable} = ${numberToLatex(solution)}`
  };
}

// ============ QUADRATIC SOLVER ============

function solveQuadratic(input) {
  const steps = [];
  steps.push({
    explanation: 'Start with the original equation.',
    latex: toLatex(input)
  });

  const sides = splitEquation(input);
  let leftStr, rightStr;

  if (sides.length === 2) {
    leftStr = sides[0].trim();
    rightStr = sides[1].trim();
  } else {
    // No equals sign - expression to simplify/factor
    leftStr = input;
    rightStr = '0';
  }

  const vars = [...new Set((leftStr + rightStr).match(/[a-zA-Z]/g) || [])];
  const variable = vars[0] || 'x';

  // Combine into standard form ax² + bx + c = 0
  // Move everything to left side
  const combined = `${leftStr}-(${rightStr})`;

  let a, b, c;
  try {
    // Try to expand and collect coefficients
    const node = math.parse(combined);
    const simplified = math.simplify(node);

    // Evaluate at specific points to find coefficients
    // f(x) = ax² + bx + c
    const scope0 = {}; scope0[variable] = 0;
    const scope1 = {}; scope1[variable] = 1;
    const scopeNeg1 = {}; scopeNeg1[variable] = -1;
    const scope2 = {}; scope2[variable] = 2;

    const f0 = math.evaluate(simplified, scope0);
    const f1 = math.evaluate(simplified, scope1);
    const fNeg1 = math.evaluate(simplified, scopeNeg1);

    // f(0) = c
    c = f0;
    // f(1) = a + b + c
    // f(-1) = a - b + c
    // a + b = f(1) - c
    // a - b = f(-1) - c
    a = (f1 + fNeg1 - 2*c) / 2;
    b = f1 - c - a;
  } catch(e) {
    throw new Error('Could not parse the quadratic expression');
  }

  steps.push({
    explanation: `Rearrange into standard form ${variable}² coefficient form.`,
    latex: `${formatCoeffTerm(a, variable, true)}${b >= 0 ? '+' : ''}${formatCoeffTerm(b, variable)}${c >= 0 ? '+' : ''}${formatNum(c)} = 0`
  });

  steps.push({
    explanation: `Identify coefficients: a = ${formatNum(a)}, b = ${formatNum(b)}, c = ${formatNum(c)}.`,
    latex: `a = ${formatNum(a)}, \\quad b = ${formatNum(b)}, \\quad c = ${formatNum(c)}`
  });

  // Calculate discriminant
  const discriminant = b*b - 4*a*c;

  steps.push({
    explanation: `Calculate the discriminant: Δ = b² − 4ac.`,
    latex: `\\Delta = (${formatNum(b)})^2 - 4(${formatNum(a)})(${formatNum(c)}) = ${formatNum(discriminant)}`
  });

  if (discriminant < 0) {
    steps.push({
      explanation: `Since Δ < 0, there are no real solutions. The solutions are complex.`,
      latex: `\\Delta = ${formatNum(discriminant)} < 0`
    });

    const realPart = -b / (2*a);
    const imagPart = Math.sqrt(-discriminant) / (2*a);

    steps.push({
      explanation: `Apply the quadratic formula to find complex solutions.`,
      latex: `${variable} = \\frac{-b \\pm \\sqrt{\\Delta}}{2a} = \\frac{${formatNum(-b)} \\pm \\sqrt{${formatNum(discriminant)}}}{${formatNum(2*a)}}`
    });

    const sol1 = `${numberToLatex(realPart)} + ${numberToLatex(Math.abs(imagPart))}i`;
    const sol2 = `${numberToLatex(realPart)} - ${numberToLatex(Math.abs(imagPart))}i`;

    steps.push({
      explanation: `The complex solutions are:`,
      latex: `${variable}_1 = ${sol1}, \\quad ${variable}_2 = ${sol2}`
    });

    return {
      type: 'Quadratic Equation',
      input: input,
      solutions: [`${variable}_1 = ${sol1}`, `${variable}_2 = ${sol2}`],
      steps: steps,
      latexSolution: `${variable} = ${sol1} \\text{ or } ${variable} = ${sol2}`
    };
  }

  if (discriminant === 0) {
    steps.push({
      explanation: `Since Δ = 0, there is exactly one repeated solution.`,
      latex: `\\Delta = 0 \\implies \\text{one repeated root}`
    });

    const solution = -b / (2*a);

    steps.push({
      explanation: `Apply the quadratic formula: x = −b / 2a.`,
      latex: `${variable} = \\frac{-(${formatNum(b)})}{2 \\cdot ${formatNum(a)}} = \\frac{${formatNum(-b)}}{${formatNum(2*a)}} = ${numberToLatex(solution)}`
    });

    return {
      type: 'Quadratic Equation',
      input: input,
      solutions: [`${variable} = ${numberToLatex(solution)}`],
      steps: steps,
      latexSolution: `${variable} = ${numberToLatex(solution)} \\text{ (double root)}`
    };
  }

  // Two real solutions
  steps.push({
    explanation: `Since Δ > 0, there are two distinct real solutions.`,
    latex: `\\Delta = ${formatNum(discriminant)} > 0 \\implies \\text{two distinct roots}`
  });

  const sqrtDisc = Math.sqrt(discriminant);
  const x1 = (-b + sqrtDisc) / (2*a);
  const x2 = (-b - sqrtDisc) / (2*a);

  steps.push({
    explanation: `Apply the quadratic formula: x = (−b ± √Δ) / 2a.`,
    latex: `${variable} = \\frac{-(${formatNum(b)}) \\pm \\sqrt{${formatNum(discriminant)}}}{2 \\cdot ${formatNum(a)}} = \\frac{${formatNum(-b)} \\pm ${numberToLatex(sqrtDisc)}}{${formatNum(2*a)}}`
  });

  steps.push({
    explanation: `Calculate both solutions.`,
    latex: `${variable}_1 = \\frac{${formatNum(-b)} + ${numberToLatex(sqrtDisc)}}{${formatNum(2*a)}} = ${numberToLatex(x1)}`
  });

  steps.push({
    explanation: ``,
    latex: `${variable}_2 = \\frac{${formatNum(-b)} - ${numberToLatex(sqrtDisc)}}{${formatNum(2*a)}} = ${numberToLatex(x2)}`
  });

  return {
    type: 'Quadratic Equation',
    input: input,
    solutions: [`${variable}_1 = ${numberToLatex(x1)}`, `${variable}_2 = ${numberToLatex(x2)}`],
    steps: steps,
    latexSolution: `${variable}_1 = ${numberToLatex(x1)}, \\quad ${variable}_2 = ${numberToLatex(x2)}`
  };
}

// ============ SYSTEM SOLVER ============

function solveSystem(input) {
  const steps = [];
  steps.push({
    explanation: 'Start with the system of equations.',
    latex: input.split(',').map((eq, i) => toLatex(eq.trim())).join(' \\\\ ')
  });

  const equations = input.split(',').map(s => s.trim());
  if (equations.length !== 2) throw new Error('System solver currently supports exactly 2 equations.');

  const vars = [...new Set(input.match(/[a-zA-Z]/g) || [])];
  if (vars.length !== 2) throw new Error('System should have exactly 2 variables.');

  const v1 = vars[0], v2 = vars[1];

  // Parse each equation to get coefficients
  const eq1 = parseLinearEquation(equations[0], vars);
  const eq2 = parseLinearEquation(equations[1], vars);

  steps.push({
    explanation: `Write in matrix form Ax = b.`,
    latex: `\\begin{pmatrix} ${formatNum(eq1.a1)} & ${formatNum(eq1.a2)} \\\\ ${formatNum(eq2.a1)} & ${formatNum(eq2.a2)} \\end{pmatrix} \\begin{pmatrix} ${v1} \\\\ ${v2} \\end{pmatrix} = \\begin{pmatrix} ${formatNum(eq1.b)} \\\\ ${formatNum(eq2.b)} \\end{pmatrix}`
  });

  // Cramer's rule
  const det = eq1.a1 * eq2.a2 - eq1.a2 * eq2.a1;

  steps.push({
    explanation: `Calculate the determinant of the coefficient matrix.`,
    latex: `D = (${formatNum(eq1.a1)})(${formatNum(eq2.a2)}) - (${formatNum(eq1.a2)})(${formatNum(eq2.a1)}) = ${formatNum(det)}`
  });

  if (Math.abs(det) < 1e-10) {
    return {
      type: 'System of Equations',
      input: input,
      solutions: ['No unique solution (det = 0)'],
      steps: steps,
      latexSolution: '\\text{No unique solution}'
    };
  }

  const det1 = eq1.b * eq2.a2 - eq1.a2 * eq2.b;
  const det2 = eq1.a1 * eq2.b - eq1.b * eq2.a1;

  const sol1 = det1 / det;
  const sol2 = det2 / det;

  steps.push({
    explanation: `Apply Cramer's rule to find ${v1}.`,
    latex: `${v1} = \\frac{D_1}{D} = \\frac{(${formatNum(eq1.b)})(${formatNum(eq2.a2)}) - (${formatNum(eq1.a2)})(${formatNum(eq2.b)})}{${formatNum(det)}} = \\frac{${formatNum(det1)}}{${formatNum(det)}} = ${numberToLatex(sol1)}`
  });

  steps.push({
    explanation: `Apply Cramer's rule to find ${v2}.`,
    latex: `${v2} = \\frac{D_2}{D} = \\frac{(${formatNum(eq1.a1)})(${formatNum(eq2.b)}) - (${formatNum(eq1.b)})(${formatNum(eq2.a1)})}{${formatNum(det)}} = \\frac{${formatNum(det2)}}{${formatNum(det)}} = ${numberToLatex(sol2)}`
  });

  steps.push({
    explanation: `The solution to the system is:`,
    latex: `${v1} = ${numberToLatex(sol1)}, \\quad ${v2} = ${numberToLatex(sol2)}`
  });

  return {
    type: 'System of Equations',
    input: input,
    solutions: [`${v1} = ${numberToLatex(sol1)}`, `${v2} = ${numberToLatex(sol2)}`],
    steps: steps,
    latexSolution: `${v1} = ${numberToLatex(sol1)}, \\quad ${v2} = ${numberToLatex(sol2)}`
  };
}

function parseLinearEquation(eqStr, vars) {
  const sides = eqStr.split('=');
  if (sides.length !== 2) throw new Error(`Expected "=" in equation: ${eqStr}`);

  const v1 = vars[0], v2 = vars[1];

  const leftTerms = collectTerms2(sides[0].trim(), v1, v2);
  const rightTerms = collectTerms2(sides[1].trim(), v1, v2);

  return {
    a1: leftTerms.c1 - rightTerms.c1,
    a2: leftTerms.c2 - rightTerms.c2,
    b: rightTerms.constant - leftTerms.constant
  };
}

function collectTerms2(str, v1, v2) {
  let c1 = 0, c2 = 0, constant = 0;

  // Normalize
  str = str.replace(/\s+/g, '').replace(/-/g, '+-');
  if (str.startsWith('+')) str = str.slice(1);

  const terms = str.split('+').filter(t => t);

  for (let term of terms) {
    if (term.includes(v1)) {
      let coeff = term.replace(v1, '').replace(/\*/g, '');
      if (coeff === '' || coeff === '+') coeff = '1';
      if (coeff === '-') coeff = '-1';
      c1 += parseFloat(coeff);
    } else if (term.includes(v2)) {
      let coeff = term.replace(v2, '').replace(/\*/g, '');
      if (coeff === '' || coeff === '+') coeff = '1';
      if (coeff === '-') coeff = '-1';
      c2 += parseFloat(coeff);
    } else {
      constant += parseFloat(term);
    }
  }

  return { c1, c2, constant };
}

// ============ SIMPLIFY ============

function simplifyExpression(input) {
  const steps = [];
  steps.push({
    explanation: 'Start with the original expression.',
    latex: toLatex(input)
  });

  const node = math.parse(input);

  steps.push({
    explanation: 'Parse the expression into its mathematical structure.',
    latex: `\\text{Expression: } ${toLatex(input)}`
  });

  const simplified = math.simplify(node);
  const result = simplified.toString();

  steps.push({
    explanation: 'Apply algebraic simplification rules: combine like terms, distribute, and reduce.',
    latex: `${toLatex(input)} = ${toLatex(result)}`
  });

  // Try to evaluate if it's a pure number
  let evalResult = null;
  try {
    evalResult = math.evaluate(result);
    if (typeof evalResult === 'number' && !isNaN(evalResult)) {
      steps.push({
        explanation: 'The expression evaluates to a numerical value.',
        latex: `= ${formatNum(evalResult)}`
      });
    }
  } catch(e) {}

  return {
    type: 'Simplification',
    input: input,
    solutions: [toLatex(result)],
    steps: steps,
    latexSolution: toLatex(result)
  };
}

// ============ UTILITIES ============

function splitEquation(input) {
  // Smart split on = that's not == or !=
  const parts = [];
  let depth = 0;
  let current = '';

  for (let i = 0; i < input.length; i++) {
    const ch = input[i];
    if (ch === '(') depth++;
    else if (ch === ')') depth--;
    else if (ch === '=' && depth === 0 && input[i-1] !== '!' && input[i-1] !== '<' && input[i-1] !== '>' && input[i+1] !== '=') {
      parts.push(current);
      current = '';
      continue;
    }
    current += ch;
  }
  parts.push(current);
  return parts;
}

function collectTerms(str, variable) {
  let coeff = 0;
  let constant = 0;

  // Normalize the string
  str = str.replace(/\s+/g, '').replace(/-/g, '+-');
  if (str.startsWith('+')) str = str.slice(1);

  const terms = str.split('+').filter(t => t.length > 0);

  for (let term of terms) {
    if (term.includes(variable)) {
      // Extract coefficient
      let c = term.replace(new RegExp(`\\*?${variable}(\\^[0-9]+)?`, 'g'), '');
      if (c === '' || c === '+') c = '1';
      if (c === '-') c = '-1';
      coeff += parseFloat(c);
    } else {
      constant += parseFloat(term) || 0;
    }
  }

  return { coeff, constant };
}

function termsToLatex(terms, variable) {
  let parts = [];
  if (terms.coeff !== 0) parts.push(formatCoeffTerm(terms.coeff, variable));
  if (terms.constant !== 0) parts.push(formatNum(terms.constant));
  if (parts.length === 0) return '0';
  return parts.join(' + ').replace(/\+ -/g, '- ');
}

function formatNum(n) {
  if (Number.isInteger(n)) return n.toString();
  return parseFloat(n.toFixed(6)).toString();
}

function formatCoeffTerm(coeff, variable, isFirst) {
  if (coeff === 0) return '';
  const absCoeff = Math.abs(coeff);
  const sign = coeff < 0 ? '-' : (isFirst ? '' : '+');
  const num = absCoeff === 1 ? '' : formatNum(absCoeff);
  return `${sign}${num}${variable}`;
}

function numberToLatex(n) {
  if (Number.isInteger(n)) return n.toString();

  // Try to express as fraction
  const frac = toFraction(n);
  if (frac) return frac;

  return parseFloat(n.toFixed(6)).toString();
}

function toFraction(decimal) {
  if (Number.isInteger(decimal)) return null;
  const tolerance = 1e-9;
  let h1 = 1, h2 = 0, k1 = 0, k2 = 1;
  let b = decimal;
  for (let i = 0; i < 20; i++) {
    const a = Math.floor(b);
    let aux = h1; h1 = a * h1 + h2; h2 = aux;
    aux = k1; k1 = a * k1 + k2; k2 = aux;
    if (Math.abs(decimal - h1/k1) < tolerance) {
      if (k1 === 1) return null;
      if (Math.abs(h1) < 1000 && k1 < 1000) {
        return `\\frac{${h1}}{${k1}}`;
      }
      return null;
    }
    if (b - a < tolerance) break;
    b = 1 / (b - a);
  }
  return null;
}

function formatFraction(num, den, variable) {
  const result = num / den;
  return `${variable} = ${numberToLatex(result)}`;
}

function buildVerification(input, variable, solution) {
  try {
    const sides = splitEquation(input);
    if (sides.length !== 2) return null;

    const scope = {};
    scope[variable] = solution;

    const leftVal = math.evaluate(sides[0], scope);
    const rightVal = math.evaluate(sides[1], scope);

    if (Math.abs(leftVal - rightVal) < 1e-9) {
      return `${formatNum(leftVal)} = ${formatNum(rightVal)} \;\\checkmark`;
    }
    return null;
  } catch(e) {
    return null;
  }
}

function toLatex(input) {
  // Convert common patterns to LaTeX
  let latex = input
    .replace(/\*\*/g, '^')
    .replace(/\*/g, ' \\cdot ')
    .replace(/sqrt\(([^)]+)\)/g, '\\sqrt{$1}')
    .replace(/pi/g, '\\pi');

  // Handle x^2 -> x^2
  latex = latex.replace(/(\w)\^(\d+)/g, '$1^{$2}');

  return latex;
}

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ============ RENDERING ============

function renderResult(result, input) {
  const resultsDiv = document.getElementById('results');

  const card = document.createElement('div');
  card.className = 'result-card';

  // Header
  const header = document.createElement('div');
  header.className = 'result-header';
  header.innerHTML = `<h2>Solution</h2><span class="result-type">${result.type}</span>`;
  card.appendChild(header);

  // Rendered equation
  const eqDiv = document.createElement('div');
  eqDiv.className = 'rendered-equation';
  card.appendChild(eqDiv);
  renderMathDisplay(toLatex(input), eqDiv);

  // Solution box
  const solBox = document.createElement('div');
  solBox.className = 'solution-box';
  const solLabel = document.createElement('div');
  solLabel.className = 'solution-label';
  solLabel.textContent = result.solutions.length > 1 ? 'Solutions' : 'Solution';
  solBox.appendChild(solLabel);

  for (const sol of result.solutions) {
    const solLine = document.createElement('div');
    solLine.style.marginTop = '0.3rem';
    solBox.appendChild(solLine);
    renderMathDisplay(sol, solLine);
  }
  card.appendChild(solBox);

  // Steps
  const stepsHeader = document.createElement('div');
  stepsHeader.className = 'steps-header';
  stepsHeader.textContent = 'Step-by-Step Breakdown';
  card.appendChild(stepsHeader);

  const stepsContainer = document.createElement('div');
  let stepNum = 0;

  for (const step of result.steps) {
    stepNum++;
    const stepDiv = document.createElement('div');
    stepDiv.className = 'step';

    const numDiv = document.createElement('div');
    numDiv.className = 'step-number';
    numDiv.textContent = stepNum;
    stepDiv.appendChild(numDiv);

    const contentDiv = document.createElement('div');
    contentDiv.className = 'step-content';

    if (step.explanation) {
      const expDiv = document.createElement('div');
      expDiv.className = 'step-explanation';
      expDiv.textContent = step.explanation;
      contentDiv.appendChild(expDiv);
    }

    const mathDiv = document.createElement('div');
    mathDiv.className = 'step-math';
    contentDiv.appendChild(mathDiv);
    renderMathDisplay(step.latex, mathDiv);

    stepDiv.appendChild(contentDiv);
    stepsContainer.appendChild(stepDiv);
  }

  card.appendChild(stepsContainer);

  // Export bar
  const exportBar = document.createElement('div');
  exportBar.className = 'export-bar';

  const copyBtn = document.createElement('button');
  copyBtn.className = 'export-btn';
  copyBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>Copy`;
  copyBtn.onclick = () => copyResult(result);
  exportBar.appendChild(copyBtn);

  const mdBtn = document.createElement('button');
  mdBtn.className = 'export-btn';
  mdBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>Export Markdown`;
  mdBtn.onclick = () => exportMarkdown(result);
  exportBar.appendChild(mdBtn);

  const printBtn = document.createElement('button');
  printBtn.className = 'export-btn';
  printBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>Print`;
  printBtn.onclick = () => window.print();
  exportBar.appendChild(printBtn);

  card.appendChild(exportBar);

  resultsDiv.innerHTML = '';
  resultsDiv.appendChild(card);
}

// ============ EXPORT ============

function copyResult(result) {
  let text = `Equation: ${result.input}\n`;
  text += `Type: ${result.type}\n`;
  text += `Solution: ${result.solutions.join(', ')}\n\n`;
  text += `Steps:\n`;

  result.steps.forEach((step, i) => {
    text += `${i+1}. ${step.explanation}\n   ${step.latex}\n`;
  });

  navigator.clipboard.writeText(text).then(() => {
    showToast('Copied to clipboard');
  }).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('Copied to clipboard');
  });
}

function exportMarkdown(result) {
  let md = `# Equation Solution\n\n`;
  md += `**Equation:** \`${result.input}\`\n\n`;
  md += `**Type:** ${result.type}\n\n`;
  md += `## Solution\n\n`;

  for (const sol of result.solutions) {
    md += `$$${sol}$$\n\n`;
  }

  md += `## Step-by-Step Breakdown\n\n`;

  result.steps.forEach((step, i) => {
    md += `### Step ${i+1}\n\n`;
    if (step.explanation) md += `${step.explanation}\n\n`;
    md += `$$${step.latex}$$\n\n`;
  });

  const blob = new Blob([md], { type: 'text/markdown' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'equation-solution.md';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Markdown file downloaded');
}

// ============ HISTORY ============

function addToHistory(input, result) {
  history.unshift({ input, result });
  if (history.length > 10) history.pop();
  renderHistory();
}

function renderHistory() {
  const section = document.getElementById('historySection');
  const list = document.getElementById('historyList');

  if (history.length === 0) {
    section.style.display = 'none';
    return;
  }

  section.style.display = 'block';
  list.innerHTML = '';

  for (const item of history) {
    const div = document.createElement('div');
    div.className = 'history-item';

    const inputSpan = document.createElement('span');
    inputSpan.textContent = item.input;

    const answerSpan = document.createElement('span');
    answerSpan.className = 'history-answer';
    answerSpan.textContent = item.result.solutions[0] || '';

    div.appendChild(inputSpan);
    div.appendChild(answerSpan);
    div.onclick = () => {
      document.getElementById('equationInput').value = item.input;
      solveEquation();
    };
    list.appendChild(div);
  }
}
