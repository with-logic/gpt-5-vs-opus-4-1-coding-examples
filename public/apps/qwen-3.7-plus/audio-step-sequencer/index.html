<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audio Step Sequencer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a12;
    --surface: #12121f;
    --surface2: #1a1a2e;
    --border: #2a2a4a;
    --cyan: #00f0ff;
    --magenta: #ff00aa;
    --purple: #8b5cf6;
    --green: #00ff88;
    --orange: #ff8800;
    --yellow: #ffee00;
    --red: #ff3355;
    --text: #e0e0f0;
    --text-dim: #6a6a8a;
    --glow-cyan: 0 0 20px rgba(0,240,255,0.3), 0 0 40px rgba(0,240,255,0.1);
    --glow-magenta: 0 0 20px rgba(255,0,170,0.3), 0 0 40px rgba(255,0,170,0.1);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(0,240,255,0.03) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 50%, rgba(255,0,170,0.03) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 0%, rgba(139,92,246,0.05) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .app-container {
    position: relative;
    z-index: 1;
    max-width: 1400px;
    margin: 0 auto;
    padding: 20px;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 20px 0 30px;
    position: relative;
  }

  .header h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 2.2em;
    font-weight: 800;
    letter-spacing: 6px;
    text-transform: uppercase;
    background: linear-gradient(135deg, var(--cyan), var(--magenta), var(--purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    filter: drop-shadow(0 0 30px rgba(0,240,255,0.3));
  }

  .header .subtitle {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.85em;
    color: var(--text-dim);
    letter-spacing: 8px;
    text-transform: uppercase;
    margin-top: 5px;
  }

  /* Transport Controls */
  .transport {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 15px;
    padding: 20px;
    margin-bottom: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    flex-wrap: wrap;
  }

  .transport-btn {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.85em;
    font-weight: 700;
    padding: 12px 28px;
    border: 2px solid;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s ease;
    text-transform: uppercase;
    letter-spacing: 2px;
    background: transparent;
    position: relative;
    overflow: hidden;
  }

  .transport-btn::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .btn-play {
    border-color: var(--green);
    color: var(--green);
  }
  .btn-play:hover {
    background: rgba(0,255,136,0.1);
    box-shadow: 0 0 25px rgba(0,255,136,0.3), inset 0 0 25px rgba(0,255,136,0.05);
  }
  .btn-play.active {
    background: var(--green);
    color: var(--bg);
    box-shadow: 0 0 30px rgba(0,255,136,0.5);
  }

  .btn-stop {
    border-color: var(--red);
    color: var(--red);
  }
  .btn-stop:hover {
    background: rgba(255,51,85,0.1);
    box-shadow: 0 0 25px rgba(255,51,85,0.3);
  }

  .btn-export {
    border-color: var(--purple);
    color: var(--purple);
  }
  .btn-export:hover {
    background: rgba(139,92,246,0.1);
    box-shadow: 0 0 25px rgba(139,92,246,0.3);
  }

  /* Control Groups */
  .controls-row {
    display: flex;
    gap: 15px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .control-group {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 22px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    min-width: 160px;
  }

  .control-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.65em;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .control-value {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.6em;
    font-weight: 700;
    color: var(--cyan);
    text-shadow: 0 0 15px rgba(0,240,255,0.4);
  }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 140px;
    height: 6px;
    border-radius: 3px;
    background: var(--surface2);
    outline: none;
    cursor: pointer;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--cyan);
    box-shadow: 0 0 10px rgba(0,240,255,0.5);
    cursor: pointer;
    transition: transform 0.15s;
  }

  input[type="range"]::-webkit-slider-thumb:hover {
    transform: scale(1.2);
  }

  input[type="range"]::-moz-range-thumb {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--cyan);
    box-shadow: 0 0 10px rgba(0,240,255,0.5);
    cursor: pointer;
    border: none;
  }

  /* Pattern Controls */
  .pattern-controls {
    display: flex;
    gap: 10px;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .pattern-btn {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.65em;
    font-weight: 600;
    padding: 8px 16px;
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 1px;
    background: var(--surface);
    color: var(--text-dim);
  }

  .pattern-btn:hover {
    border-color: var(--cyan);
    color: var(--cyan);
    background: rgba(0,240,255,0.05);
  }

  .pattern-btn.active {
    border-color: var(--cyan);
    color: var(--cyan);
    background: rgba(0,240,255,0.1);
    box-shadow: 0 0 15px rgba(0,240,255,0.2);
  }

  .pattern-btn.save-btn { border-color: var(--green); color: var(--green); }
  .pattern-btn.save-btn:hover { background: rgba(0,255,136,0.1); }
  .pattern-btn.load-btn { border-color: var(--orange); color: var(--orange); }
  .pattern-btn.load-btn:hover { background: rgba(255,136,0,0.1); }
  .pattern-btn.clear-btn { border-color: var(--red); color: var(--red); }
  .pattern-btn.clear-btn:hover { background: rgba(255,51,85,0.1); }
  .pattern-btn.random-btn { border-color: var(--magenta); color: var(--magenta); }
  .pattern-btn.random-btn:hover { background: rgba(255,0,170,0.1); }

  /* Step indicators */
  .step-indicators {
    display: grid;
    grid-template-columns: 120px repeat(16, 1fr);
    gap: 3px;
    margin-bottom: 4px;
    padding: 0 4px;
  }

  .step-num {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.55em;
    font-weight: 600;
    text-align: center;
    color: var(--text-dim);
    padding: 4px 0;
    transition: all 0.15s;
  }

  .step-num.beat { color: var(--cyan); }
  .step-num.current {
    color: var(--yellow);
    text-shadow: 0 0 10px rgba(255,238,0,0.6);
    transform: scale(1.2);
  }

  /* Sequencer Grid */
  .sequencer {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    overflow-x: auto;
  }

  .grid-row {
    display: grid;
    grid-template-columns: 120px repeat(16, 1fr);
    gap: 3px;
    margin-bottom: 3px;
    align-items: center;
  }

  .row-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.65em;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding-right: 10px;
    text-align: right;
    white-space: nowrap;
  }

  .step-cell {
    aspect-ratio: 1;
    min-width: 32px;
    min-height: 32px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2);
    cursor: pointer;
    transition: all 0.12s ease;
    position: relative;
    overflow: hidden;
  }

  .step-cell:hover {
    border-color: rgba(255,255,255,0.2);
    transform: scale(1.05);
  }

  .step-cell.active {
    border-color: var(--cell-color, var(--cyan));
    background: var(--cell-bg, rgba(0,240,255,0.15));
    box-shadow: 0 0 12px var(--cell-glow, rgba(0,240,255,0.3));
  }

  .step-cell.active::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--cell-color, var(--cyan));
    box-shadow: 0 0 8px var(--cell-color, var(--cyan));
  }

  .step-cell.current-step {
    border-color: rgba(255,238,0,0.4) !important;
    box-shadow: inset 0 0 15px rgba(255,238,0,0.1) !important;
  }

  .step-cell.active.current-step {
    box-shadow: 0 0 20px var(--cell-glow, rgba(0,240,255,0.5)),
                inset 0 0 15px rgba(255,238,0,0.15) !important;
    transform: scale(1.1);
  }

  .step-cell.beat-marker {
    background: rgba(255,255,255,0.02);
  }

  /* Row colors */
  .row-kick .step-cell.active { --cell-color: var(--red); --cell-bg: rgba(255,51,85,0.15); --cell-glow: rgba(255,51,85,0.3); }
  .row-kick .row-label { color: var(--red); }

  .row-snare .step-cell.active { --cell-color: var(--orange); --cell-bg: rgba(255,136,0,0.15); --cell-glow: rgba(255,136,0,0.3); }
  .row-snare .row-label { color: var(--orange); }

  .row-clap .step-cell.active { --cell-color: var(--yellow); --cell-bg: rgba(255,238,0,0.15); --cell-glow: rgba(255,238,0,0.3); }
  .row-clap .row-label { color: var(--yellow); }

  .row-hihat-c .step-cell.active { --cell-color: var(--cyan); --cell-bg: rgba(0,240,255,0.15); --cell-glow: rgba(0,240,255,0.3); }
  .row-hihat-c .row-label { color: var(--cyan); }

  .row-hihat-o .step-cell.active { --cell-color: #00ccdd; --cell-bg: rgba(0,204,221,0.15); --cell-glow: rgba(0,204,221,0.3); }
  .row-hihat-o .row-label { color: #00ccdd; }

  .row-tom .step-cell.active { --cell-color: var(--green); --cell-bg: rgba(0,255,136,0.15); --cell-glow: rgba(0,255,136,0.3); }
  .row-tom .row-label { color: var(--green); }

  .row-rim .step-cell.active { --cell-color: var(--purple); --cell-bg: rgba(139,92,246,0.15); --cell-glow: rgba(139,92,246,0.3); }
  .row-rim .row-label { color: var(--purple); }

  .row-cowbell .step-cell.active { --cell-color: var(--magenta); --cell-bg: rgba(255,0,170,0.15); --cell-glow: rgba(255,0,170,0.3); }
  .row-cowbell .row-label { color: var(--magenta); }

  /* Volume controls per row */
  .row-vol {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .vol-slider {
    width: 50px !important;
    height: 4px !important;
  }

  .vol-icon {
    font-size: 0.7em;
    color: var(--text-dim);
  }

  /* Visualizer */
  .visualizer-container {
    margin-top: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 15px;
    position: relative;
    overflow: hidden;
  }

  #visualizer {
    width: 100%;
    height: 80px;
    display: block;
    border-radius: 8px;
  }

  /* Toast notifications */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--surface2);
    border: 1px solid var(--cyan);
    color: var(--cyan);
    padding: 12px 24px;
    border-radius: 10px;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.75em;
    letter-spacing: 2px;
    box-shadow: 0 0 30px rgba(0,240,255,0.3);
    transition: transform 0.3s ease;
    z-index: 1000;
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
  }

  /* Pattern selector modal */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    justify-content: center;
    align-items: center;
  }

  .modal-overlay.show { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 30px;
    min-width: 350px;
    max-width: 500px;
  }

  .modal h3 {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.9em;
    letter-spacing: 3px;
    color: var(--cyan);
    margin-bottom: 20px;
    text-align: center;
  }

  .modal-input {
    width: 100%;
    padding: 10px 15px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 1em;
    outline: none;
    margin-bottom: 15px;
  }

  .modal-input:focus { border-color: var(--cyan); }

  .modal-btns {
    display: flex;
    gap: 10px;
    justify-content: center;
  }

  .modal-btn {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.7em;
    padding: 8px 20px;
    border-radius: 8px;
    cursor: pointer;
    border: 1px solid;
    background: transparent;
    letter-spacing: 1px;
    transition: all 0.2s;
  }

  .modal-btn.confirm {
    border-color: var(--green);
    color: var(--green);
  }
  .modal-btn.confirm:hover { background: rgba(0,255,136,0.1); }

  .modal-btn.cancel {
    border-color: var(--red);
    color: var(--red);
  }
  .modal-btn.cancel:hover { background: rgba(255,51,85,0.1); }

  .saved-patterns-list {
    max-height: 200px;
    overflow-y: auto;
    margin-bottom: 15px;
  }

  .saved-pattern-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 5px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .saved-pattern-item:hover {
    border-color: var(--cyan);
    background: rgba(0,240,255,0.05);
  }

  .saved-pattern-item .name {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.7em;
    letter-spacing: 1px;
  }

  .saved-pattern-item .delete-btn {
    color: var(--red);
    cursor: pointer;
    font-size: 0.8em;
    padding: 2px 6px;
    border: none;
    background: none;
    opacity: 0.5;
    transition: opacity 0.15s;
  }

  .saved-pattern-item .delete-btn:hover { opacity: 1; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

  /* Beat group separators */
  .step-cell:nth-child(5n) { margin-left: 4px; }
  .step-cell:nth-child(9n) { margin-left: 4px; }
  .step-cell:nth-child(13n) { margin-left: 4px; }

  /* Responsive */
  @media (max-width: 900px) {
    .header h1 { font-size: 1.4em; letter-spacing: 3px; }
    .step-cell { min-width: 24px; min-height: 24px; }
    .row-label { font-size: 0.55em; }
    .grid-row { grid-template-columns: 80px repeat(16, 1fr); }
    .step-indicators { grid-template-columns: 80px repeat(16, 1fr); }
  }

  /* Pulse animation for playing state */
  @keyframes pulse-glow {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  .playing-indicator {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
    margin-right: 8px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .playing-indicator.active {
    opacity: 1;
    animation: pulse-glow 0.5s ease-in-out infinite;
  }

  /* Export progress */
  .export-progress {
    display: none;
    align-items: center;
    gap: 10px;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.7em;
    color: var(--purple);
  }

  .export-progress.show { display: flex; }

  .progress-bar {
    flex: 1;
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--purple);
    border-radius: 2px;
    transition: width 0.1s;
    box-shadow: 0 0 10px rgba(139,92,246,0.5);
  }
</style>
</head>
<body>

<div class="app-container">
  <div class="header">
    <h1>⬡ Step Sequencer</h1>
    <div class="subtitle">16-Step Drum Machine</div>
  </div>

  <!-- Transport -->
  <div class="transport">
    <button class="transport-btn btn-play" id="playBtn" onclick="togglePlay()">
      <span class="playing-indicator" id="playIndicator"></span>
      ▶ Play
    </button>
    <button class="transport-btn btn-stop" onclick="stopSequencer()">■ Stop</button>

    <div class="control-group" style="padding: 10px 18px;">
      <div class="control-label">Tempo</div>
      <div style="display:flex;align-items:center;gap:10px;">
        <input type="range" id="tempoSlider" min="40" max="240" value="120" oninput="setTempo(this.value)">
        <span class="control-value" id="tempoValue" style="font-size:1.2em; min-width:50px; text-align:center;">120</span>
      </div>
    </div>

    <div class="control-group" style="padding: 10px 18px;">
      <div class="control-label">Swing</div>
      <div style="display:flex;align-items:center;gap:10px;">
        <input type="range" id="swingSlider" min="0" max="100" value="0" oninput="setSwing(this.value)">
        <span class="control-value" id="swingValue" style="font-size:1.2em; min-width:50px; text-align:center; color: var(--magenta); text-shadow: 0 0 15px rgba(255,0,170,0.4);">0%</span>
      </div>
    </div>

    <div class="control-group" style="padding: 10px 18px;">
      <div class="control-label">Volume</div>
      <div style="display:flex;align-items:center;gap:10px;">
        <input type="range" id="masterVol" min="0" max="100" value="80" oninput="setMasterVolume(this.value)">
        <span class="control-value" id="volValue" style="font-size:1.2em; min-width:50px; text-align:center; color: var(--green); text-shadow: 0 0 15px rgba(0,255,136,0.4);">80%</span>
      </div>
    </div>

    <button class="transport-btn btn-export" onclick="exportWAV()">⬇ Export WAV</button>
    <div class="export-progress" id="exportProgress">
      <span>Rendering...</span>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>
  </div>

  <!-- Pattern Controls -->
  <div class="pattern-controls">
    <button class="pattern-btn random-btn" onclick="randomizePattern()">🎲 Random</button>
    <button class="pattern-btn clear-btn" onclick="clearPattern()">✕ Clear</button>
    <span style="color:var(--text-dim); margin: 0 5px;">│</span>
    <button class="pattern-btn save-btn" onclick="showSaveModal()">💾 Save</button>
    <button class="pattern-btn load-btn" onclick="showLoadModal()">📂 Load</button>
    <span style="color:var(--text-dim); margin: 0 5px;">│</span>
    <span class="control-label" style="margin-right:5px;">Pattern:</span>
    <button class="pattern-btn active" data-pattern="0" onclick="switchPattern(0)">A</button>
    <button class="pattern-btn" data-pattern="1" onclick="switchPattern(1)">B</button>
    <button class="pattern-btn" data-pattern="2" onclick="switchPattern(2)">C</button>
    <button class="pattern-btn" data-pattern="3" onclick="switchPattern(3)">D</button>
  </div>

  <!-- Step Indicators -->
  <div class="step-indicators" id="stepIndicators"></div>

  <!-- Sequencer Grid -->
  <div class="sequencer" id="sequencer"></div>

  <!-- Visualizer -->
  <div class="visualizer-container">
    <canvas id="visualizer"></canvas>
  </div>
</div>

<!-- Save Modal -->
<div class="modal-overlay" id="saveModal">
  <div class="modal">
    <h3>💾 Save Pattern</h3>
    <input type="text" class="modal-input" id="saveName" placeholder="Pattern name..." maxlength="30">
    <div class="modal-btns">
      <button class="modal-btn confirm" onclick="confirmSave()">Save</button>
      <button class="modal-btn cancel" onclick="closeSaveModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- Load Modal -->
<div class="modal-overlay" id="loadModal">
  <div class="modal">
    <h3>📂 Load Pattern</h3>
    <div class="saved-patterns-list" id="savedPatternsList"></div>
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="closeLoadModal()">Close</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// =============================================
// Audio Step Sequencer - Complete Implementation
// =============================================

const NUM_STEPS = 16;
const INSTRUMENTS = [
  { id: 'kick',    name: 'Kick',     rowClass: 'row-kick' },
  { id: 'snare',   name: 'Snare',    rowClass: 'row-snare' },
  { id: 'clap',    name: 'Clap',     rowClass: 'row-clap' },
  { id: 'hihat-c', name: 'Hi-Hat C', rowClass: 'row-hihat-c' },
  { id: 'hihat-o', name: 'Hi-Hat O', rowClass: 'row-hihat-o' },
  { id: 'tom',     name: 'Tom',      rowClass: 'row-tom' },
  { id: 'rim',     name: 'Rim',      rowClass: 'row-rim' },
  { id: 'cowbell', name: 'Cowbell',  rowClass: 'row-cowbell' },
];

// State
let patterns = [
  createEmptyPattern(),
  createEmptyPattern(),
  createEmptyPattern(),
  createEmptyPattern()
];
let currentPatternIdx = 0;
let isPlaying = false;
let currentStep = -1;
let tempo = 120;
let swing = 0;
let masterVolume = 0.8;
let audioCtx = null;
let masterGain = null;
let analyser = null;
let schedulerTimer = null;
let nextStepTime = 0;
let volumePerInstrument = {};

INSTRUMENTS.forEach(inst => { volumePerInstrument[inst.id] = 0.8; });

function createEmptyPattern() {
  const p = {};
  INSTRUMENTS.forEach(inst => {
    p[inst.id] = new Array(NUM_STEPS).fill(false);
  });
  return p;
}

function getCurrentPattern() {
  return patterns[currentPatternIdx];
}

// =============================================
// Audio Engine
// =============================================

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = masterVolume;

  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  masterGain.connect(analyser);
  analyser.connect(audioCtx.destination);
}

function getNoiseBuffer(duration) {
  const sampleRate = audioCtx.sampleRate;
  const length = sampleRate * duration;
  const buffer = audioCtx.createBuffer(1, length, sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < length; i++) {
    data[i] = Math.random() * 2 - 1;
  }
  return buffer;
}

// Drum synthesis functions
function playKick(time, ctx, dest, vol = 1) {
  const c = ctx || audioCtx;
  const d = dest || masterGain;
  const osc = c.createOscillator();
  const gain = c.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(160, time);
  osc.frequency.exponentialRampToValueAtTime(40, time + 0.12);
  gain.gain.setValueAtTime(vol * 1.2, time);
  gain.gain.exponentialRampToValueAtTime(0.001, time + 0.4);
  osc.connect(gain);
  gain.connect(d);
  osc.start(time);
  osc.stop(time + 0.4);

  // Click transient
  const osc2 = c.createOscillator();
  const gain2 = c.createGain();
  osc2.type = 'sine';
  osc2.frequency.setValueAtTime(800, time);
  osc2.frequency.exponentialRampToValueAtTime(100, time + 0.02);
  gain2.gain.setValueAtTime(vol * 0.6, time);
  gain2.gain.exponentialRampToValueAtTime(0.001, time + 0.03);
  osc2.connect(gain2);
  gain2.connect(d);
  osc2.start(time);
  osc2.stop(time + 0.05);
}

function playSnare(time, ctx, dest, vol = 1) {
  const c = ctx || audioCtx;
  const d = dest || masterGain;

  // Noise
  const noise = c.createBufferSource();
  noise.buffer = getNoiseBuffer(0.2);
  const noiseFilter = c.createBiquadFilter();
  noiseFilter.type = 'highpass';
  noiseFilter.frequency.value = 1000;
  const noiseGain = c.createGain();
  noiseGain.gain.setValueAtTime(vol * 0.7, time);
  noiseGain.gain.exponentialRampToValueAtTime(0.001, time + 0.2);
  noise.connect(noiseFilter);
  noiseFilter.connect(noiseGain);
  noiseGain.connect(d);
  noise.start(time);
  noise.stop(time + 0.2);

  // Body
  const osc = c.createOscillator();
  const oscGain = c.createGain();
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(200, time);
  osc.frequency.exponentialRampToValueAtTime(100, time + 0.05);
  oscGain.gain.setValueAtTime(vol * 0.7, time);
  oscGain.gain.exponentialRampToValueAtTime(0.001, time + 0.1);
  osc.connect(oscGain);
  oscGain.connect(d);
  osc.start(time);
  osc.stop(time + 0.1);
}

function playClap(time, ctx, dest, vol = 1) {
  const c = ctx || audioCtx;
  const d = dest || masterGain;

  for (let i = 0; i < 3; i++) {
    const noise = c.createBufferSource();
    noise.buffer = getNoiseBuffer(0.02);
    const filter = c.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 2500;
    filter.Q.value = 3;
    const gain = c.createGain();
    const t = time + i * 0.01;
    gain.gain.setValueAtTime(vol * 0.5, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.02);
    noise.connect(filter);
    filter.connect(gain);
    gain.connect(d);
    noise.start(t);
    noise.stop(t + 0.02);
  }

  // Tail
  const noise = c.createBufferSource();
  noise.buffer = getNoiseBuffer(0.15);
  const filter = c.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = 2500;
  filter.Q.value = 2;
  const gain = c.createGain();
  gain.gain.setValueAtTime(vol * 0.6, time + 0.03);
  gain.gain.exponentialRampToValueAtTime(0.001, time + 0.15);
  noise.connect(filter);
  filter.connect(gain);
  gain.connect(d);
  noise.start(time + 0.03);
  noise.stop(time + 0.15);
}

function playHiHatClosed(time, ctx, dest, vol = 1) {
  const c = ctx || audioCtx;
  const d = dest || masterGain;
  const noise = c.createBufferSource();
  noise.buffer = getNoiseBuffer(0.05);
  const filter = c.createBiquadFilter();
  filter.type = 'highpass';
  filter.frequency.value = 7000;
  const gain = c.createGain();
  gain.gain.setValueAtTime(vol * 0.4, time);
  gain.gain.exponentialRampToValueAtTime(0.001, time + 0.05);
  noise.connect(filter);
  filter.connect(gain);
  gain.connect(d);
  noise.start(time);
  noise.stop(time + 0.05);
}

function playHiHatOpen(time, ctx, dest, vol = 1) {
  const c = ctx || audioCtx;
  const d = dest || masterGain;
  const noise = c.createBufferSource();
  noise.buffer = getNoiseBuffer(0.3);
  const filter = c.createBiquadFilter();
  filter.type = 'highpass';
  filter.frequency.value = 6000;
  const gain = c.createGain();
  gain.gain.setValueAtTime(vol * 0.4, time);
  gain.gain.exponentialRampToValueAtTime(0.001, time + 0.3);
  noise.connect(filter);
  filter.connect(gain);
  gain.connect(d);
  noise.start(time);
  noise.stop(time + 0.3);
}

function playTom(time, ctx, dest, vol = 1) {
  const c = ctx || audioCtx;
  const d = dest || masterGain;
  const osc = c.createOscillator();
  const gain = c.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(200, time);
  osc.frequency.exponentialRampToValueAtTime(80, time + 0.15);
  gain.gain.setValueAtTime(vol * 0.9, time);
  gain.gain.exponentialRampToValueAtTime(0.001, time + 0.25);
  osc.connect(gain);
  gain.connect(d);
  osc.start(time);
  osc.stop(time + 0.25);
}

function playRim(time, ctx, dest, vol = 1) {
  const c = ctx || audioCtx;
  const d = dest || masterGain;
  const osc = c.createOscillator();
  const gain = c.createGain();
  osc.type = 'square';
  osc.frequency.setValueAtTime(800, time);
  gain.gain.setValueAtTime(vol * 0.3, time);
  gain.gain.exponentialRampToValueAtTime(0.001, time + 0.03);
  osc.connect(gain);
  gain.connect(d);
  osc.start(time);
  osc.stop(time + 0.03);

  const noise = c.createBufferSource();
  noise.buffer = getNoiseBuffer(0.02);
  const filter = c.createBiquadFilter();
  filter.type = 'highpass';
  filter.frequency.value = 4000;
  const ng = c.createGain();
  ng.gain.setValueAtTime(vol * 0.3, time);
  ng.gain.exponentialRampToValueAtTime(0.001, time + 0.02);
  noise.connect(filter);
  filter.connect(ng);
  ng.connect(d);
  noise.start(time);
  noise.stop(time + 0.02);
}

function playCowbell(time, ctx, dest, vol = 1) {
  const c = ctx || audioCtx;
  const d = dest || masterGain;
  const osc1 = c.createOscillator();
  const osc2 = c.createOscillator();
  const gain = c.createGain();
  const filter = c.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = 800;
  filter.Q.value = 5;
  osc1.type = 'square';
  osc1.frequency.value = 560;
  osc2.type = 'square';
  osc2.frequency.value = 845;
  gain.gain.setValueAtTime(vol * 0.35, time);
  gain.gain.exponentialRampToValueAtTime(0.001, time + 0.15);
  osc1.connect(filter);
  osc2.connect(filter);
  filter.connect(gain);
  gain.connect(d);
  osc1.start(time);
  osc2.start(time);
  osc1.stop(time + 0.15);
  osc2.stop(time + 0.15);
}

const playFunctions = {
  'kick': playKick,
  'snare': playSnare,
  'clap': playClap,
  'hihat-c': playHiHatClosed,
  'hihat-o': playHiHatOpen,
  'tom': playTom,
  'rim': playRim,
  'cowbell': playCowbell,
};

function playInstrument(instrumentId, time, ctx, dest, vol) {
  if (playFunctions[instrumentId]) {
    playFunctions[instrumentId](time, ctx, dest, vol);
  }
}

// =============================================
// Scheduler
// =============================================

const LOOKAHEAD = 25; // ms
const SCHEDULE_AHEAD = 0.1; // seconds

function getStepDuration() {
  return 60.0 / tempo / 4; // 16th notes
}

function scheduler() {
  while (nextStepTime < audioCtx.currentTime + SCHEDULE_AHEAD) {
    scheduleStep(currentStep, nextStepTime);
    advanceStep();
  }
}

function scheduleStep(step, time) {
  const pattern = getCurrentPattern();
  INSTRUMENTS.forEach(inst => {
    if (pattern[inst.id][step]) {
      const vol = volumePerInstrument[inst.id];
      playInstrument(inst.id, time, null, null, vol);
    }
  });

  // Visual update
  const stepToHighlight = step;
  setTimeout(() => {
    updateStepHighlight(stepToHighlight);
  }, (time - audioCtx.currentTime) * 1000);
}

function advanceStep() {
  const stepDur = getStepDuration();
  // Apply swing to even steps
  if (currentStep % 2 === 0) {
    nextStepTime += stepDur * (1 + swing * 0.33 / 100);
  } else {
    nextStepTime += stepDur * (1 - swing * 0.33 / 100);
  }
  currentStep = (currentStep + 1) % NUM_STEPS;
}

// =============================================
// Playback Controls
// =============================================

function togglePlay() {
  initAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();

  if (isPlaying) {
    pauseSequencer();
  } else {
    startSequencer();
  }
}

function startSequencer() {
  isPlaying = true;
  currentStep = 0;
  nextStepTime = audioCtx.currentTime + 0.05;
  schedulerTimer = setInterval(scheduler, LOOKAHEAD);
  document.getElementById('playBtn').classList.add('active');
  document.getElementById('playBtn').innerHTML = '<span class="playing-indicator active" id="playIndicator"></span>❚❚ Pause';
  startVisualizer();
}

function pauseSequencer() {
  isPlaying = false;
  if (schedulerTimer) { clearInterval(schedulerTimer); schedulerTimer = null; }
  document.getElementById('playBtn').classList.remove('active');
  document.getElementById('playBtn').innerHTML = '<span class="playing-indicator" id="playIndicator"></span>▶ Play';
}

function stopSequencer() {
  isPlaying = false;
  if (schedulerTimer) { clearInterval(schedulerTimer); schedulerTimer = null; }
  currentStep = -1;
  document.getElementById('playBtn').classList.remove('active');
  document.getElementById('playBtn').innerHTML = '<span class="playing-indicator" id="playIndicator"></span>▶ Play';
  clearStepHighlight();
}

// =============================================
// UI Building
// =============================================

function buildGrid() {
  const sequencer = document.getElementById('sequencer');
  const indicators = document.getElementById('stepIndicators');
  sequencer.innerHTML = '';
  indicators.innerHTML = '';

  // Step numbers
  const corner = document.createElement('div');
  indicators.appendChild(corner);
  for (let s = 0; s < NUM_STEPS; s++) {
    const num = document.createElement('div');
    num.className = 'step-num' + (s % 4 === 0 ? ' beat' : '');
    num.id = `step-ind-${s}`;
    num.textContent = s + 1;
    indicators.appendChild(num);
  }

  // Instrument rows
  INSTRUMENTS.forEach(inst => {
    const row = document.createElement('div');
    row.className = `grid-row ${inst.rowClass}`;

    const label = document.createElement('div');
    label.className = 'row-label';
    label.textContent = inst.name;
    row.appendChild(label);

    for (let s = 0; s < NUM_STEPS; s++) {
      const cell = document.createElement('div');
      cell.className = 'step-cell' + (s % 4 === 0 ? ' beat-marker' : '');
      cell.id = `cell-${inst.id}-${s}`;
      cell.dataset.instrument = inst.id;
      cell.dataset.step = s;
      cell.addEventListener('click', () => toggleCell(inst.id, s));
      cell.addEventListener('mousedown', (e) => {
        e.preventDefault();
        initAudio();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        playInstrument(inst.id, audioCtx.currentTime, null, null, volumePerInstrument[inst.id]);
      });
      row.appendChild(cell);
    }

    sequencer.appendChild(row);
  });

  refreshGrid();
}

function toggleCell(instrumentId, step) {
  initAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const pattern = getCurrentPattern();
  pattern[instrumentId][step] = !pattern[instrumentId][step];
  refreshGrid();
}

function refreshGrid() {
  const pattern = getCurrentPattern();
  INSTRUMENTS.forEach(inst => {
    for (let s = 0; s < NUM_STEPS; s++) {
      const cell = document.getElementById(`cell-${inst.id}-${s}`);
      if (cell) {
        cell.classList.toggle('active', pattern[inst.id][s]);
      }
    }
  });
}

function updateStepHighlight(step) {
  // Remove previous
  document.querySelectorAll('.step-cell.current-step').forEach(el => el.classList.remove('current-step'));
  document.querySelectorAll('.step-num.current').forEach(el => el.classList.remove('current'));

  // Add new
  INSTRUMENTS.forEach(inst => {
    const cell = document.getElementById(`cell-${inst.id}-${step}`);
    if (cell) cell.classList.add('current-step');
  });
  const ind = document.getElementById(`step-ind-${step}`);
  if (ind) ind.classList.add('current');
}

function clearStepHighlight() {
  document.querySelectorAll('.step-cell.current-step').forEach(el => el.classList.remove('current-step'));
  document.querySelectorAll('.step-num.current').forEach(el => el.classList.remove('current'));
}

// =============================================
// Controls
// =============================================

function setTempo(val) {
  tempo = parseInt(val);
  document.getElementById('tempoValue').textContent = tempo;
}

function setSwing(val) {
  swing = parseInt(val);
  document.getElementById('swingValue').textContent = swing + '%';
}

function setMasterVolume(val) {
  masterVolume = parseInt(val) / 100;
  document.getElementById('volValue').textContent = val + '%';
  if (masterGain) masterGain.gain.value = masterVolume;
}

function switchPattern(idx) {
  currentPatternIdx = idx;
  document.querySelectorAll('.pattern-btn[data-pattern]').forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.dataset.pattern) === idx);
  });
  refreshGrid();
}

function clearPattern() {
  patterns[currentPatternIdx] = createEmptyPattern();
  refreshGrid();
  showToast('Pattern cleared');
}

function randomizePattern() {
  const pattern = getCurrentPattern();
  INSTRUMENTS.forEach((inst, idx) => {
    const density = [0.25, 0.2, 0.12, 0.35, 0.1, 0.1, 0.15, 0.08][idx] || 0.15;
    for (let s = 0; s < NUM_STEPS; s++) {
      // Give some musical structure
      if (inst.id === 'kick') {
        pattern[inst.id][s] = (s === 0 || s === 8) ? true : Math.random() < 0.1;
      } else if (inst.id === 'snare') {
        pattern[inst.id][s] = (s === 4 || s === 12) ? true : Math.random() < 0.05;
      } else if (inst.id === 'hihat-c') {
        pattern[inst.id][s] = Math.random() < 0.5;
      } else {
        pattern[inst.id][s] = Math.random() < density;
      }
    }
  });
  refreshGrid();
  showToast('Random pattern generated');
}

// =============================================
// Pattern Save/Load
// =============================================

function getSavedPatterns() {
  try {
    return JSON.parse(localStorage.getItem('stepSeqPatterns') || '{}');
  } catch { return {}; }
}

function savePatternsToStorage(saved) {
  localStorage.setItem('stepSeqPatterns', JSON.stringify(saved));
}

function showSaveModal() {
  document.getElementById('saveModal').classList.add('show');
  document.getElementById('saveName').value = '';
  document.getElementById('saveName').focus();
}

function closeSaveModal() {
  document.getElementById('saveModal').classList.remove('show');
}

function confirmSave() {
  const name = document.getElementById('saveName').value.trim();
  if (!name) { showToast('Enter a pattern name'); return; }
  const saved = getSavedPatterns();
  saved[name] = JSON.parse(JSON.stringify(patterns[currentPatternIdx]));
  savePatternsToStorage(saved);
  closeSaveModal();
  showToast(`Pattern "${name}" saved`);
}

function showLoadModal() {
  const saved = getSavedPatterns();
  const list = document.getElementById('savedPatternsList');
  list.innerHTML = '';

  const names = Object.keys(saved);
  if (names.length === 0) {
    list.innerHTML = '<div style="text-align:center;color:var(--text-dim);padding:20px;font-family:Orbitron;font-size:0.75em;letter-spacing:2px;">No saved patterns</div>';
  } else {
    names.forEach(name => {
      const item = document.createElement('div');
      item.className = 'saved-pattern-item';
      item.innerHTML = `
        <span class="name">${name}</span>
        <button class="delete-btn" onclick="event.stopPropagation(); deletePattern('${name.replace(/'/g, "\\'")}')">✕</button>
      `;
      item.addEventListener('click', () => loadPattern(name));
      list.appendChild(item);
    });
  }

  document.getElementById('loadModal').classList.add('show');
}

function closeLoadModal() {
  document.getElementById('loadModal').classList.remove('show');
}

function loadPattern(name) {
  const saved = getSavedPatterns();
  if (saved[name]) {
    patterns[currentPatternIdx] = JSON.parse(JSON.stringify(saved[name]));
    refreshGrid();
    closeLoadModal();
    showToast(`Pattern "${name}" loaded`);
  }
}

function deletePattern(name) {
  const saved = getSavedPatterns();
  delete saved[name];
  savePatternsToStorage(saved);
  showLoadModal();
  showToast(`Pattern "${name}" deleted`);
}

// =============================================
// WAV Export
// =============================================

async function exportWAV() {
  initAudio();
  showToast('Rendering WAV...');

  const progressEl = document.getElementById('exportProgress');
  const fillEl = document.getElementById('progressFill');
  progressEl.classList.add('show');

  const sampleRate = 44100;
  const stepDur = 60.0 / tempo / 4;
  const totalDuration = stepDur * NUM_STEPS + 1; // extra second for tail
  const totalSamples = Math.ceil(sampleRate * totalDuration);

  const offlineCtx = new OfflineAudioContext(2, totalSamples, sampleRate);
  const offlineMaster = offlineCtx.createGain();
  offlineMaster.gain.value = masterVolume;
  offlineMaster.connect(offlineCtx.destination);

  // Override getNoiseBuffer for offline context
  const origGetNoiseBuffer = getNoiseBuffer;

  const pattern = getCurrentPattern();

  for (let step = 0; step < NUM_STEPS; step++) {
    let time = step * stepDur;
    // Apply swing
    if (step > 0) {
      time = 0;
      for (let s = 0; s < step; s++) {
        const sDur = stepDur;
        if (s % 2 === 0) {
          time += sDur * (1 + swing * 0.33 / 100);
        } else {
          time += sDur * (1 - swing * 0.33 / 100);
        }
      }
    }

    INSTRUMENTS.forEach(inst => {
      if (pattern[inst.id][step]) {
        const vol = volumePerInstrument[inst.id];
        // We need to create noise buffers in the offline context
        playInstrumentOffline(inst.id, time, offlineCtx, offlineMaster, vol, sampleRate);
      }
    });

    fillEl.style.width = ((step + 1) / NUM_STEPS * 100) + '%';
    if (step % 4 === 0) await new Promise(r => setTimeout(r, 0));
  }

  try {
    const renderedBuffer = await offlineCtx.startRendering();
    const wav = bufferToWav(renderedBuffer);
    const blob = new Blob([wav], { type: 'audio/wav' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `step-sequence-${tempo}bpm.wav`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('WAV exported successfully!');
  } catch (e) {
    showToast('Export failed: ' + e.message);
  }

  setTimeout(() => {
    progressEl.classList.remove('show');
    fillEl.style.width = '0%';
  }, 1000);
}

function getNoiseBufferOffline(duration, ctx, sampleRate) {
  const length = sampleRate * duration;
  const buffer = ctx.createBuffer(1, length, sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < length; i++) {
    data[i] = Math.random() * 2 - 1;
  }
  return buffer;
}

function playInstrumentOffline(id, time, ctx, dest, vol, sampleRate) {
  const c = ctx;
  const d = dest;

  function noiseBuffer(dur) {
    return getNoiseBufferOffline(dur, c, sampleRate);
  }

  switch(id) {
    case 'kick': {
      const osc = c.createOscillator();
      const gain = c.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(160, time);
      osc.frequency.exponentialRampToValueAtTime(40, time + 0.12);
      gain.gain.setValueAtTime(vol * 1.2, time);
      gain.gain.exponentialRampToValueAtTime(0.001, time + 0.4);
      osc.connect(gain); gain.connect(d);
      osc.start(time); osc.stop(time + 0.4);
      const osc2 = c.createOscillator();
      const g2 = c.createGain();
      osc2.type = 'sine';
      osc2.frequency.setValueAtTime(800, time);
      osc2.frequency.exponentialRampToValueAtTime(100, time + 0.02);
      g2.gain.setValueAtTime(vol * 0.6, time);
      g2.gain.exponentialRampToValueAtTime(0.001, time + 0.03);
      osc2.connect(g2); g2.connect(d);
      osc2.start(time); osc2.stop(time + 0.05);
      break;
    }
    case 'snare': {
      const n = c.createBufferSource(); n.buffer = noiseBuffer(0.2);
      const f = c.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = 1000;
      const g = c.createGain();
      g.gain.setValueAtTime(vol * 0.7, time);
      g.gain.exponentialRampToValueAtTime(0.001, time + 0.2);
      n.connect(f); f.connect(g); g.connect(d);
      n.start(time); n.stop(time + 0.2);
      const o = c.createOscillator(); o.type = 'triangle';
      o.frequency.setValueAtTime(200, time);
      o.frequency.exponentialRampToValueAtTime(100, time + 0.05);
      const og = c.createGain();
      og.gain.setValueAtTime(vol * 0.7, time);
      og.gain.exponentialRampToValueAtTime(0.001, time + 0.1);
      o.connect(og); og.connect(d);
      o.start(time); o.stop(time + 0.1);
      break;
    }
    case 'clap': {
      for (let i = 0; i < 3; i++) {
        const n = c.createBufferSource(); n.buffer = noiseBuffer(0.02);
        const f = c.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = 2500; f.Q.value = 3;
        const g = c.createGain();
        const t = time + i * 0.01;
        g.gain.setValueAtTime(vol * 0.5, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.02);
        n.connect(f); f.connect(g); g.connect(d);
        n.start(t); n.stop(t + 0.02);
      }
      const n2 = c.createBufferSource(); n2.buffer = noiseBuffer(0.15);
      const f2 = c.createBiquadFilter(); f2.type = 'bandpass'; f2.frequency.value = 2500; f2.Q.value = 2;
      const g2 = c.createGain();
      g2.gain.setValueAtTime(vol * 0.6, time + 0.03);
      g2.gain.exponentialRampToValueAtTime(0.001, time + 0.15);
      n2.connect(f2); f2.connect(g2); g2.connect(d);
      n2.start(time + 0.03); n2.stop(time + 0.15);
      break;
    }
    case 'hihat-c': {
      const n = c.createBufferSource(); n.buffer = noiseBuffer(0.05);
      const f = c.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = 7000;
      const g = c.createGain();
      g.gain.setValueAtTime(vol * 0.4, time);
      g.gain.exponentialRampToValueAtTime(0.001, time + 0.05);
      n.connect(f); f.connect(g); g.connect(d);
      n.start(time); n.stop(time + 0.05);
      break;
    }
    case 'hihat-o': {
      const n = c.createBufferSource(); n.buffer = noiseBuffer(0.3);
      const f = c.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = 6000;
      const g = c.createGain();
      g.gain.setValueAtTime(vol * 0.4, time);
      g.gain.exponentialRampToValueAtTime(0.001, time + 0.3);
      n.connect(f); f.connect(g); g.connect(d);
      n.start(time); n.stop(time + 0.3);
      break;
    }
    case 'tom': {
      const o = c.createOscillator(); o.type = 'sine';
      o.frequency.setValueAtTime(200, time);
      o.frequency.exponentialRampToValueAtTime(80, time + 0.15);
      const g = c.createGain();
      g.gain.setValueAtTime(vol * 0.9, time);
      g.gain.exponentialRampToValueAtTime(0.001, time + 0.25);
      o.connect(g); g.connect(d);
      o.start(time); o.stop(time + 0.25);
      break;
    }
    case 'rim': {
      const o = c.createOscillator(); o.type = 'square';
      o.frequency.setValueAtTime(800, time);
      const g = c.createGain();
      g.gain.setValueAtTime(vol * 0.3, time);
      g.gain.exponentialRampToValueAtTime(0.001, time + 0.03);
      o.connect(g); g.connect(d);
      o.start(time); o.stop(time + 0.03);
      const n = c.createBufferSource(); n.buffer = noiseBuffer(0.02);
      const f = c.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = 4000;
      const ng = c.createGain();
      ng.gain.setValueAtTime(vol * 0.3, time);
      ng.gain.exponentialRampToValueAtTime(0.001, time + 0.02);
      n.connect(f); f.connect(ng); ng.connect(d);
      n.start(time); n.stop(time + 0.02);
      break;
    }
    case 'cowbell': {
      const o1 = c.createOscillator(); o1.type = 'square'; o1.frequency.value = 560;
      const o2 = c.createOscillator(); o2.type = 'square'; o2.frequency.value = 845;
      const f = c.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = 800; f.Q.value = 5;
      const g = c.createGain();
      g.gain.setValueAtTime(vol * 0.35, time);
      g.gain.exponentialRampToValueAtTime(0.001, time + 0.15);
      o1.connect(f); o2.connect(f); f.connect(g); g.connect(d);
      o1.start(time); o2.start(time);
      o1.stop(time + 0.15); o2.stop(time + 0.15);
      break;
    }
  }
}

function bufferToWav(buffer) {
  const numChannels = buffer.numberOfChannels;
  const sampleRate = buffer.sampleRate;
  const format = 1; // PCM
  const bitDepth = 16;
  const numSamples = buffer.length;
  const dataLength = numSamples * numChannels * (bitDepth / 8);
  const headerLength = 44;
  const totalLength = headerLength + dataLength;
  const arrayBuffer = new ArrayBuffer(totalLength);
  const view = new DataView(arrayBuffer);

  // WAV header
  writeString(view, 0, 'RIFF');
  view.setUint32(4, totalLength - 8, true);
  writeString(view, 8, 'WAVE');
  writeString(view, 12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, format, true);
  view.setUint16(22, numChannels, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * numChannels * (bitDepth / 8), true);
  view.setUint16(32, numChannels * (bitDepth / 8), true);
  view.setUint16(34, bitDepth, true);
  writeString(view, 36, 'data');
  view.setUint32(40, dataLength, true);

  // Interleave channels
  const channels = [];
  for (let ch = 0; ch < numChannels; ch++) {
    channels.push(buffer.getChannelData(ch));
  }

  let offset = 44;
  for (let i = 0; i < numSamples; i++) {
    for (let ch = 0; ch < numChannels; ch++) {
      let sample = channels[ch][i];
      sample = Math.max(-1, Math.min(1, sample));
      sample = sample < 0 ? sample * 0x8000 : sample * 0x7FFF;
      view.setInt16(offset, sample, true);
      offset += 2;
    }
  }

  return arrayBuffer;
}

function writeString(view, offset, string) {
  for (let i = 0; i < string.length; i++) {
    view.setUint8(offset + i, string.charCodeAt(i));
  }
}

// =============================================
// Visualizer
// =============================================

let vizAnimFrame = null;

function startVisualizer() {
  if (vizAnimFrame) return;
  drawVisualizer();
}

function drawVisualizer() {
  const canvas = document.getElementById('visualizer');
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth * 2;
  canvas.height = canvas.offsetHeight * 2;

  function draw() {
    vizAnimFrame = requestAnimationFrame(draw);

    if (!analyser) return;

    const bufferLength = analyser.frequencyBinCount;
    const dataArray = new Uint8Array(bufferLength);
    analyser.getByteFrequencyData(dataArray);

    const w = canvas.width;
    const h = canvas.height;

    ctx.fillStyle = 'rgba(10, 10, 18, 0.3)';
    ctx.fillRect(0, 0, w, h);

    const barWidth = (w / bufferLength) * 2.5;
    let x = 0;

    for (let i = 0; i < bufferLength; i++) {
      const barHeight = (dataArray[i] / 255) * h * 0.9;

      const hue = (i / bufferLength) * 180 + 180;
      const saturation = 80;
      const lightness = 40 + (dataArray[i] / 255) * 30;

      ctx.fillStyle = `hsla(${hue}, ${saturation}%, ${lightness}%, 0.8)`;
      ctx.shadowColor = `hsla(${hue}, ${saturation}%, ${lightness}%, 0.5)`;
      ctx.shadowBlur = 10;

      const radius = Math.min(barWidth / 2, 4);
      const bx = x;
      const by = h - barHeight;
      const bw = barWidth - 1;
      const bh = barHeight;

      if (bh > 0) {
        ctx.beginPath();
        ctx.moveTo(bx + radius, by);
        ctx.lineTo(bx + bw - radius, by);
        ctx.quadraticCurveTo(bx + bw, by, bx + bw, by + radius);
        ctx.lineTo(bx + bw, by + bh);
        ctx.lineTo(bx, by + bh);
        ctx.lineTo(bx, by + radius);
        ctx.quadraticCurveTo(bx, by, bx + radius, by);
        ctx.closePath();
        ctx.fill();
      }

      x += barWidth;
    }

    ctx.shadowBlur = 0;
  }

  draw();
}

function showToast(message) {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

// =============================================
// Keyboard Shortcuts
// =============================================

document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  switch(e.code) {
    case 'Space':
      e.preventDefault();
      togglePlay();
      break;
    case 'Escape':
      stopSequencer();
      closeSaveModal();
      closeLoadModal();
      break;
    case 'Digit1': switchPattern(0); break;
    case 'Digit2': switchPattern(1); break;
    case 'Digit3': switchPattern(2); break;
    case 'Digit4': switchPattern(3); break;
  }
});

// Close modals on overlay click
document.getElementById('saveModal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('saveModal')) closeSaveModal();
});
document.getElementById('loadModal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('loadModal')) closeLoadModal();
});

// Enter key in save modal
document.getElementById('saveName').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') confirmSave();
  if (e.key === 'Escape') closeSaveModal();
});

function loadPresetKickSnare() {
  const p = getCurrentPattern();
  // Basic rock beat
  [0, 4, 8, 12].forEach(s => p['kick'][s] = true);
  [4, 12].forEach(s => p['snare'][s] = true);
  for (let s = 0; s < 16; s += 2) p['hihat-c'][s] = true;
  refreshGrid();
}
