<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>QR Studio — Custom QR Code Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  :root {
    --bg-0: #0b0d12;
    --bg-1: #11141b;
    --bg-2: #171b24;
    --line: rgba(255,255,255,0.08);
    --line-strong: rgba(255,255,255,0.14);
    --text: #e8ecf3;
    --text-dim: #8a93a6;
    --text-faint: #5b6478;
    --accent: #7c9cff;
    --accent-2: #b78bff;
    --success: #6ee7a7;
    --danger: #ff7a90;
    --radius: 16px;
    --radius-sm: 10px;
  }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    color: var(--text);
    background:
      radial-gradient(1200px 600px at 10% -10%, rgba(124,156,255,0.18), transparent 60%),
      radial-gradient(900px 500px at 110% 10%, rgba(183,139,255,0.15), transparent 60%),
      linear-gradient(180deg, #0a0c11 0%, #0b0d12 100%);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  .app {
    max-width: 1180px;
    margin: 0 auto;
    padding: 36px 24px 60px;
  }
  header.topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .brand-mark {
    width: 36px; height: 36px;
    border-radius: 10px;
    background:
      conic-gradient(from 210deg at 50% 50%, #7c9cff 0deg, #b78bff 140deg, #7c9cff 360deg);
    position: relative;
    box-shadow: 0 6px 24px rgba(124,156,255,0.35), inset 0 0 0 1px rgba(255,255,255,0.2);
  }
  .brand-mark::after {
    content: "";
    position: absolute; inset: 6px;
    border-radius: 6px;
    background: var(--bg-0);
    background-image:
      linear-gradient(45deg, transparent 48%, rgba(255,255,255,0.5) 49%, rgba(255,255,255,0.5) 51%, transparent 52%),
      linear-gradient(-45deg, transparent 48%, rgba(255,255,255,0.5) 49%, rgba(255,255,255,0.5) 51%, transparent 52%);
    background-size: 8px 8px;
    opacity: 0.7;
  }
  .brand-name {
    font-weight: 700;
    font-size: 18px;
    letter-spacing: -0.01em;
  }
  .brand-name span { color: var(--text-dim); font-weight: 500; }
  .topbar-meta {
    color: var(--text-faint);
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
  }
  .grid {
    display: grid;
    grid-template-columns: 1.15fr 1fr;
    gap: 24px;
  }
  @media (max-width: 880px) {
    .grid { grid-template-columns: 1fr; }
  }
  .card {
    background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
    border: 1px solid var(--line);
    border-radius: var(--radius);
    backdrop-filter: blur(10px);
  }
  /* Preview */
  .preview-card {
    padding: 28px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    position: sticky;
    top: 24px;
    align-self: start;
  }
  .preview-stage {
    aspect-ratio: 1 / 1;
    width: 100%;
    border-radius: 14px;
    background:
      radial-gradient(600px 300px at 30% 20%, rgba(124,156,255,0.08), transparent 60%),
      linear-gradient(180deg, #0e1118, #0a0c12);
    border: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .preview-stage::before {
    content: "";
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
    background-size: 24px 24px;
    mask-image: radial-gradient(ellipse at center, black 40%, transparent 80%);
    pointer-events: none;
  }
  .qr-wrap {
    position: relative;
    z-index: 1;
    width: 86%;
    height: 86%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 200ms ease;
  }
  .qr-wrap canvas {
    max-width: 100%;
    max-height: 100%;
    border-radius: 10px;
    box-shadow:
      0 30px 60px -20px rgba(0,0,0,0.6),
      0 0 0 1px rgba(255,255,255,0.05);
    image-rendering: pixelated;
  }
  .empty-state {
    color: var(--text-faint);
    font-size: 14px;
    text-align: center;
    padding: 20px;
  }
  .empty-state .kbd {
    display: inline-block;
    padding: 2px 8px;
    border: 1px solid var(--line-strong);
    border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    margin: 0 2px;
  }
  .preview-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .btn {
    appearance: none;
    border: 1px solid var(--line-strong);
    background: rgba(255,255,255,0.03);
    color: var(--text);
    padding: 12px 14px;
    border-radius: 12px;
    font-family: inherit;
    font-weight: 500;
    font-size: 14px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 160ms ease;
  }
  .btn:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.2); transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn.primary {
    background: linear-gradient(180deg, #8aa4ff, #6b85f0);
    border-color: rgba(255,255,255,0.15);
    color: #0b0d12;
    font-weight: 600;
    box-shadow: 0 8px 24px -8px rgba(124,156,255,0.55);
  }
  .btn.primary:hover { filter: brightness(1.08); }
  .btn svg { width: 16px; height: 16px; }
  .preview-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    color: var(--text-faint);
    font-family: 'JetBrains Mono', monospace;
    padding: 0 4px;
  }
  .preview-meta .dot {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--success); margin-right: 6px;
    box-shadow: 0 0 8px var(--success);
  }
  .preview-meta.error .dot { background: var(--danger); box-shadow: 0 0 8px var(--danger); }

  /* Controls */
  .controls-card { padding: 24px; display: flex; flex-direction: column; gap: 22px; }
  .section-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 10px;
  }
  .field { display: flex; flex-direction: column; gap: 8px; }
  .input, .textarea, .select {
    width: 100%;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 12px 14px;
    border-radius: 12px;
    font-family: inherit;
    font-size: 14px;
    transition: all 160ms ease;
    outline: none;
  }
  .textarea {
    resize: vertical;
    min-height: 96px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.5;
  }
  .input:focus, .textarea:focus, .select:focus {
    border-color: rgba(124,156,255,0.5);
    background: rgba(124,156,255,0.06);
    box-shadow: 0 0 0 4px rgba(124,156,255,0.12);
  }
  .input-row {
    display: flex;
    align-items: center;
    gap: 8px;
    position: relative;
  }
  .input-row .input { padding-right: 44px; }
  .clear-btn {
    position: absolute;
    right: 8px;
    width: 28px; height: 28px;
    border-radius: 8px;
    border: none;
    background: transparent;
    color: var(--text-faint);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .clear-btn:hover { background: rgba(255,255,255,0.06); color: var(--text); }
  .char-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-faint);
    text-align: right;
    margin-top: -2px;
  }
  .char-count.warn { color: #ffb86b; }
  .char-count.danger { color: var(--danger); }

  /* Color pickers */
  .color-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .color-field {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .color-field label {
    font-size: 12px;
    color: var(--text-dim);
    font-weight: 500;
  }
  .color-swatch-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 8px 10px;
    cursor: pointer;
    transition: all 160ms ease;
  }
  .color-swatch-wrap:hover { border-color: var(--line-strong); }
  .color-swatch {
    width: 28px; height: 28px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.15);
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }
  .color-swatch-wrap input[type="color"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%; height: 100%;
  }
  .color-hex {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--text);
    flex: 1;
  }

  /* Presets */
  .presets {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 4px;
  }
  .preset {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: rgba(255,255,255,0.02);
    cursor: pointer;
    font-size: 12px;
    color: var(--text-dim);
    transition: all 160ms ease;
  }
  .preset:hover { border-color: var(--line-strong); color: var(--text); }
  .preset-dots {
    display: flex;
    gap: 2px;
  }
  .preset-dot {
    width: 10px; height: 10px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.15);
  }

  /* Segmented control */
  .segmented {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 4px;
    padding: 4px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--line);
    border-radius: 12px;
  }
  .segmented button {
    appearance: none;
    border: none;
    background: transparent;
    color: var(--text-dim);
    padding: 8px 4px;
    border-radius: 8px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 160ms ease;
  }
  .segmented button:hover { color: var(--text); }
  .segmented button.active {
    background: rgba(124,156,255,0.15);
    color: var(--text);
    box-shadow: inset 0 0 0 1px rgba(124,156,255,0.3);
  }
  .segmented button small {
    display: block;
    font-size: 10px;
    color: var(--text-faint);
    font-weight: 400;
    margin-top: 2px;
  }
  .segmented button.active small { color: var(--accent); }

  /* Slider */
  .slider-row {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    flex: 1;
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: linear-gradient(180deg, #fff, #d0d6e3);
    border: 1px solid rgba(0,0,0,0.2);
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
  }
  input[type="range"]::-moz-range-thumb {
    width: 18px; height: 18px;
    border-radius: 50%;
    background: linear-gradient(180deg, #fff, #d0d6e3);
    border: 1px solid rgba(0,0,0,0.2);
    cursor: pointer;
  }
  .slider-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    min-width: 48px;
    text-align: right;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(20,24,33,0.95);
    border: 1px solid var(--line-strong);
    backdrop-filter: blur(12px);
    padding: 10px 16px;
    border-radius: 999px;
    font-size: 13px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
    opacity: 0;
    pointer-events: none;
    transition: all 280ms cubic-bezier(0.2, 0.8, 0.2, 1);
    z-index: 100;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .toast .check {
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--success);
    display: flex; align-items: center; justify-content: center;
    color: #0b0d12;
    font-size: 10px;
    font-weight: 700;
  }

  footer {
    margin-top: 32px;
    text-align: center;
    color: var(--text-faint);
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
  }
  footer kbd {
    padding: 2px 6px;
    border: 1px solid var(--line-strong);
    border-radius: 5px;
    font-size: 11px;
    color: var(--text-dim);
  }
</style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true"></div>
        <div class="brand-name">QR Studio <span>· custom generator</span></div>
      </div>
      <div class="topbar-meta">v1.0</div>
    </header>

    <div class="grid">
      <!-- Preview -->
      <section class="card preview-card">
        <div class="preview-stage" id="stage">
          <div class="qr-wrap" id="qrWrap">
            <div class="empty-state" id="emptyState">
              Type something in the panel →<br/>
              Your QR code appears here instantly.
            </div>
          </div>
        </div>
        <div class="preview-meta" id="previewMeta">
          <span><span class="dot"></span><span id="statusText">Awaiting input</span></span>
          <span id="sizeText">—</span>
        </div>
        <div class="preview-actions">
          <button class="btn primary" id="downloadBtn" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Download PNG
          </button>
          <button class="btn" id="copyBtn" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Copy
          </button>
        </div>
      </section>

      <!-- Controls -->
      <section class="card controls-card">
        <div class="field">
          <div class="section-title">Content</div>
          <div class="input-row">
            <textarea id="content" class="textarea" placeholder="Enter text, URL, email, wifi credentials…" spellcheck="false"></textarea>
          </div>
          <div class="char-count" id="charCount">0 chars</div>
        </div>

        <div>
          <div class="section-title">Colors</div>
          <div class="color-row">
            <div class="color-field">
              <label>Foreground</label>
              <div class="color-swatch-wrap">
                <div class="color-swatch" id="fgSwatch" style="background:#0b0d12"></div>
                <input type="color" id="fgColor" value="#0b0d12" />
                <span class="color-hex" id="fgHex">#0b0d12</span>
              </div>
            </div>
            <div class="color-field">
              <label>Background</label>
              <div class="color-swatch-wrap">
                <div class="color-swatch" id="bgSwatch" style="background:#ffffff"></div>
                <input type="color" id="bgColor" value="#ffffff" />
                <span class="color-hex" id="bgHex">#ffffff</span>
              </div>
            </div>
          </div>
          <div class="presets" id="presets"></div>
        </div>

        <div>
          <div class="section-title">Error correction</div>
          <div class="segmented" id="ecLevel">
            <button data-level="L">L<small>7%</small></button>
            <button data-level="M" class="active">M<small>15%</small></button>
            <button data-level="Q">Q<small>25%</small></button>
            <button data-level="H">H<small>30%</small></button>
          </div>
        </div>

        <div>
          <div class="section-title">Export size</div>
          <div class="slider-row">
            <input type="range" id="sizeSlider" min="256" max="2048" step="64" value="1024" />
            <span class="slider-value" id="sizeValue">1024px</span>
          </div>
        </div>

        <div>
          <div class="section-title">Quiet zone</div>
          <div class="slider-row">
            <input type="range" id="marginSlider" min="0" max="4" step="1" value="2" />
            <span class="slider-value" id="marginValue">2 modules</span>
          </div>
        </div>
      </section>
    </div>

    <footer>
      Tip: press <kbd>⌘/Ctrl + S</kbd> to download · <kbd>⌘/Ctrl + Shift + C</kbd> to copy
    </footer>
  </div>

  <div class="toast" id="toast">
    <span class="check">✓</span>
    <span id="toastMsg">Copied to clipboard</span>
  </div>

<script>
(() => {
  const $ = (id) => document.getElementById(id);
  const content = $('content');
  const fgColor = $('fgColor');
  const bgColor = $('bgColor');
  const fgSwatch = $('fgSwatch');
  const bgSwatch = $('bgSwatch');
  const fgHex = $('fgHex');
  const bgHex = $('bgHex');
  const ecLevelEl = $('ecLevel');
  const sizeSlider = $('sizeSlider');
  const sizeValue = $('sizeValue');
  const marginSlider = $('marginSlider');
  const marginValue = $('marginValue');
  const qrWrap = $('qrWrap');
  const emptyState = $('emptyState');
  const downloadBtn = $('downloadBtn');
  const copyBtn = $('copyBtn');
  const charCount = $('charCount');
  const previewMeta = $('previewMeta');
  const statusText = $('statusText');
  const sizeText = $('sizeText');
  const toast = $('toast');
  const toastMsg = $('toastMsg');
  const presetsEl = $('presets');

  let state = {
    text: '',
    fg: '#0b0d12',
    bg: '#ffffff',
    ec: 'M',
    size: 1024,
    margin: 2,
    lastCanvas: null,
    lastModuleCount: 0,
  };

  const PRESETS = [
    { name: 'Classic',  fg: '#0b0d12', bg: '#ffffff' },
    { name: 'Inverted', fg: '#ffffff', bg: '#0b0d12' },
    { name: 'Ocean',    fg: '#0a3d62', bg: '#dff3fb' },
    { name: 'Sunset',   fg: '#7a1f1f', bg: '#ffe8d6' },
    { name: 'Forest',   fg: '#1b4332', bg: '#e9f5db' },
    { name: 'Violet',   fg: '#3b1f6b', bg: '#f1eaff' },
    { name: 'Mono',     fg: '#1a1a1a', bg: '#f2f2f2' },
    { name: 'Cyber',    fg: '#00ff9c', bg: '#0a0e1a' },
  ];

  // Render presets
  PRESETS.forEach(p => {
    const el = document.createElement('button');
    el.className = 'preset';
    el.innerHTML = `
      <span class="preset-dots">
        <span class="preset-dot" style="background:${p.fg}"></span>
        <span class="preset-dot" style="background:${p.bg}"></span>
      </span>
      <span>${p.name}</span>
    `;
    el.addEventListener('click', () => {
      fgColor.value = p.fg;
      bgColor.value = p.bg;
      syncColorUI();
      render();
    });
    presetsEl.appendChild(el);
  });

  function syncColorUI() {
    state.fg = fgColor.value;
    state.bg = bgColor.value;
    fgSwatch.style.background = state.fg;
    bgSwatch.style.background = state.bg;
    fgHex.textContent = state.fg;
    bgHex.textContent = state.bg;
  }

  function showToast(msg) {
    toastMsg.textContent = msg;
    toast.classList.add('show');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => toast.classList.remove('show'), 1800);
  }

  // Generate QR matrix using qrcode-generator
  function generateMatrix(text, ecLevel, margin) {
    // Map level string to qrcode-generator constant
    const levelMap = { L: 'L', M: 'M', Q: 'Q', H: 'H' };
    // typeNumber 0 = auto-detect
    const qr = qrcode(0, levelMap[ecLevel]);
    qr.addData(text);
    qr.make();
    const count = qr.getModuleCount();
    const total = count + margin * 2;
    const matrix = [];
    for (let r = 0; r < total; r++) {
      const row = [];
      for (let c = 0; c < total; c++) {
        const mr = r - margin;
        const mc = c - margin;
        if (mr < 0 || mr >= count || mc < 0 || mc >= count) {
          row.push(false);
        } else {
          row.push(qr.isDark(mr, mc));
        }
      }
      matrix.push(row);
    }
    return { matrix, count: total, moduleCount: count };
  }

  function paintCanvas(canvas, matrix, fg, bg, pxSize) {
    const n = matrix.length;
    // pxSize is the final export size; canvas internal resolution matches pxSize
    canvas.width = pxSize;
    canvas.height = pxSize;
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;
    const cell = pxSize / n;
    // Background
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, pxSize, pxSize);
    // Modules
    ctx.fillStyle = fg;
    for (let r = 0; r < n; r++) {
      for (let c = 0; c < n; c++) {
        if (matrix[r][c]) {
          // Use slight rounding via integer math for crisp edges
          const x = Math.round(c * cell);
          const y = Math.round(r * cell);
          const x2 = Math.round((c + 1) * cell);
          const y2 = Math.round((r + 1) * cell);
          ctx.fillRect(x, y, x2 - x, y2 - y);
        }
      }
    }
  }

  let renderToken = 0;
  function render() {
    const token = ++renderToken;
    const text = state.text;

    if (!text.trim()) {
      qrWrap.innerHTML = '';
      qrWrap.appendChild(emptyState);
      emptyState.style.display = 'block';
      downloadBtn.disabled = true;
      copyBtn.disabled = true;
      previewMeta.classList.remove('error');
      statusText.textContent = 'Awaiting input';
      sizeText.textContent = '—';
      state.lastCanvas = null;
      return;
    }

    try {
      const { matrix, count, moduleCount } = generateMatrix(text, state.ec, state.margin);
      if (token !== renderToken) return;

      // Preview canvas (smaller)
      const previewSize = 720;
      const canvas = document.createElement('canvas');
      paintCanvas(canvas, matrix, state.fg, state.bg, previewSize);
      canvas.style.width = '100%';
      canvas.style.height = '100%';

      // Build export canvas at configured size
      const exportCanvas = document.createElement('canvas');
      paintCanvas(exportCanvas, matrix, state.fg, state.bg, state.size);

      qrWrap.innerHTML = '';
      qrWrap.appendChild(canvas);
      state.lastCanvas = exportCanvas;
      state.lastModuleCount = moduleCount;

      downloadBtn.disabled = false;
      copyBtn.disabled = false;
      previewMeta.classList.remove('error');
      statusText.textContent = 'Ready';
      sizeText.textContent = `${moduleCount}×${moduleCount} · ${state.size}px export`;
    } catch (err) {
      if (token !== renderToken) return;
      previewMeta.classList.add('error');
      statusText.textContent = 'Input too long for this EC level';
      sizeText.textContent = '—';
      downloadBtn.disabled = true;
      copyBtn.disabled = true;
      qrWrap.innerHTML = '';
      const errDiv = document.createElement('div');
      errDiv.className = 'empty-state';
      errDiv.innerHTML = `Content exceeds capacity.<br/>Try shorter text or lower error correction.`;
      qrWrap.appendChild(errDiv);
      state.lastCanvas = null;
    }
  }

  function updateCharCount() {
    const len = content.value.length;
    charCount.textContent = `${len} char${len === 1 ? '' : 's'}`;
    charCount.classList.remove('warn', 'danger');
    if (len > 2000) charCount.classList.add('danger');
    else if (len > 1000) charCount.classList.add('warn');
  }

  // Event wiring
  content.addEventListener('input', () => {
    state.text = content.value;
    updateCharCount();
    render();
  });

  fgColor.addEventListener('input', () => { syncColorUI(); render(); });
  bgColor.addEventListener('input', () => { syncColorUI(); render(); });

  ecLevelEl.addEventListener('click', (e) => {
    const btn = e.target.closest('button');
    if (!btn) return;
    [...ecLevelEl.querySelectorAll('button')].forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.ec = btn.dataset.level;
    render();
  });

  sizeSlider.addEventListener('input', () => {
    state.size = parseInt(sizeSlider.value, 10);
    sizeValue.textContent = state.size + 'px';
    // Regenerate export canvas only
    if (state.lastCanvas && state.text.trim()) {
      try {
        const { matrix } = generateMatrix(state.text, state.ec, state.margin);
        paintCanvas(state.lastCanvas, matrix, state.fg, state.bg, state.size);
        sizeText.textContent = `${state.lastModuleCount}×${state.lastModuleCount} · ${state.size}px export`;
      } catch (_) {}
    }
  });

  marginSlider.addEventListener('input', () => {
    state.margin = parseInt(marginSlider.value, 10);
    marginValue.textContent = state.margin + (state.margin === 1 ? ' module' : ' modules');
    render();
  });

  downloadBtn.addEventListener('click', () => {
    if (!state.lastCanvas) return;
    const link = document.createElement('a');
    link.download = `qr-${Date.now()}.png`;
    link.href = state.lastCanvas.toDataURL('image/png');
    link.click();
    showToast('PNG downloaded');
  });

  copyBtn.addEventListener('click', async () => {
    if (!state.lastCanvas) return;
    try {
      state.lastCanvas.toBlob(async (blob) => {
        try {
          await navigator.clipboard.write([
            new ClipboardItem({ 'image/png': blob })
          ]);
          showToast('Copied to clipboard');
        } catch (err) {
          // Fallback: copy data URL as text
          try {
            await navigator.clipboard.writeText(state.lastCanvas.toDataURL('image/png'));
            showToast('Copied as data URL');
          } catch (e) {
            showToast('Copy failed');
          }
        }
      }, 'image/png');
    } catch (err) {
      showToast('Copy failed');
    }
  });

  // Keyboard shortcuts
  window.addEventListener('keydown', (e) => {
    const meta = e.metaKey || e.ctrlKey;
    if (meta && e.key === 's') {
      e.preventDefault();
      if (!downloadBtn.disabled) downloadBtn.click();
    } else if (meta && e.shiftKey && (e.key === 'c' || e.key === 'C')) {
      e.preventDefault();
      if (!copyBtn.disabled) copyBtn.click();
    }
  });

  // Initial
  syncColorUI();
  updateCharCount();
  render();

  // Seed with a friendly default so the preview isn't empty on first load
  setTimeout(() => {
    content.value = 'https://example.com';
    state.text = content.value;
    updateCharCount();
    render();
    content.focus();
    content.setSelectionRange(content.value.length, content.value.length);
  }, 100);
})();
</script>
</body>
</html>
