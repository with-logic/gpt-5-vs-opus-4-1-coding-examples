<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Micro Habit Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f0f1a;
  --bg-card: #1a1a2e;
  --bg-card-hover: #222240;
  --bg-input: #16162b;
  --text: #e8e8f0;
  --text-dim: #8888aa;
  --text-muted: #555577;
  --accent: #7c5cfc;
  --accent-glow: rgba(124, 92, 252, 0.3);
  --success: #34d399;
  --success-glow: rgba(52, 211, 153, 0.3);
  --warning: #fbbf24;
  --danger: #f87171;
  --border: rgba(255,255,255,0.06);
  --radius: 16px;
  --radius-sm: 10px;
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
}

body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.5;
}

body::before {
  content: '';
  position: fixed;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(ellipse at 20% 50%, rgba(124,92,252,0.08) 0%, transparent 50%),
              radial-gradient(ellipse at 80% 20%, rgba(52,211,153,0.06) 0%, transparent 50%),
              radial-gradient(ellipse at 50% 80%, rgba(251,191,36,0.04) 0%, transparent 50%);
  animation: bgShift 20s ease-in-out infinite alternate;
  z-index: 0;
  pointer-events: none;
}

@keyframes bgShift {
  0% { transform: translate(0, 0) rotate(0deg); }
  100% { transform: translate(-5%, -3%) rotate(3deg); }
}

.app {
  position: relative;
  z-index: 1;
  max-width: 800px;
  margin: 0 auto;
  padding: 20px 16px 100px;
}

.header {
  text-align: center;
  padding: 30px 0 10px;
  margin-bottom: 24px;
}

.header h1 {
  font-size: 2rem;
  font-weight: 900;
  letter-spacing: -0.03em;
  background: linear-gradient(135deg, #7c5cfc 0%, #34d399 50%, #fbbf24 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 6px;
}

.header .subtitle {
  color: var(--text-dim);
  font-size: 0.9rem;
  font-weight: 400;
}

.header .date-display {
  color: var(--text-muted);
  font-size: 0.8rem;
  margin-top: 4px;
}

.motivation-banner {
  background: linear-gradient(135deg, rgba(124,92,252,0.15), rgba(52,211,153,0.1));
  border: 1px solid rgba(124,92,252,0.2);
  border-radius: var(--radius);
  padding: 16px 20px;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 14px;
  animation: fadeIn 0.6s ease;
}

.motivation-banner .emoji {
  font-size: 1.8rem;
  flex-shrink: 0;
}

.motivation-banner .msg {
  font-size: 0.9rem;
  font-weight: 500;
  color: var(--text);
}

.motivation-banner .msg span {
  color: var(--success);
  font-weight: 700;
}

.stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 24px;
}

.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 16px 12px;
  text-align: center;
  transition: transform 0.2s, box-shadow 0.2s;
}

.stat-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow);
}

.stat-card .stat-value {
  font-size: 1.6rem;
  font-weight: 800;
  line-height: 1.2;
}

.stat-card .stat-label {
  font-size: 0.7rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-top: 4px;
}

.stat-card.purple .stat-value { color: var(--accent); }
.stat-card.green .stat-value { color: var(--success); }
.stat-card.yellow .stat-value { color: var(--warning); }

.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}

.section-header h2 {
  font-size: 1rem;
  font-weight: 700;
  color: var(--text);
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: 8px;
  border: none;
  font-family: inherit;
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}

.btn-primary {
  background: var(--accent);
  color: white;
  box-shadow: 0 2px 12px var(--accent-glow);
}

.btn-primary:hover {
  background: #6a4ae8;
  transform: translateY(-1px);
  box-shadow: 0 4px 20px var(--accent-glow);
}

.btn-ghost {
  background: transparent;
  color: var(--text-dim);
  border: 1px solid var(--border);
}

.btn-ghost:hover {
  background: var(--bg-card);
  color: var(--text);
}

.btn-danger {
  background: rgba(248,113,113,0.1);
  color: var(--danger);
  border: 1px solid rgba(248,113,113,0.2);
}

.btn-danger:hover {
  background: rgba(248,113,113,0.2);
}

.btn-sm {
  padding: 5px 10px;
  font-size: 0.75rem;
}

.btn-icon {
  width: 32px;
  height: 32px;
  padding: 0;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
  border: none;
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.2s;
  font-size: 1rem;
}

.btn-icon:hover {
  background: var(--bg-card-hover);
  color: var(--text);
}

.habits-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 30px;
}

.habit-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  transition: all 0.3s;
  animation: slideUp 0.4s ease;
}

.habit-card:hover {
  border-color: rgba(255,255,255,0.1);
  box-shadow: 0 2px 16px rgba(0,0,0,0.2);
}

.habit-card.completed {
  border-color: rgba(52,211,153,0.3);
  background: linear-gradient(135deg, var(--bg-card), rgba(52,211,153,0.05));
}

.habit-card.skipped {
  border-color: rgba(251,191,36,0.2);
  background: linear-gradient(135deg, var(--bg-card), rgba(251,191,36,0.03));
}

.habit-top {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
}

.habit-icon {
  width: 42px;
  height: 42px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.3rem;
  flex-shrink: 0;
}

.habit-info {
  flex: 1;
  min-width: 0;
}

.habit-name {
  font-size: 0.95rem;
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.habit-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 2px;
}

.streak-badge {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--warning);
}

.streak-badge .fire { font-size: 0.85rem; }

.habit-actions {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}

.check-area {
  display: flex;
  gap: 8px;
  align-items: center;
}

.check-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 44px;
  height: 44px;
  border-radius: 12px;
  border: 2px solid var(--border);
  background: transparent;
  cursor: pointer;
  transition: all 0.25s;
  font-size: 1.2rem;
  color: var(--text-muted);
  position: relative;
  overflow: hidden;
}

.check-btn:hover {
  border-color: var(--success);
  color: var(--success);
  background: rgba(52,211,153,0.08);
}

.check-btn.checked {
  border-color: var(--success);
  background: var(--success);
  color: white;
  box-shadow: 0 2px 16px var(--success-glow);
  animation: checkPop 0.3s ease;
}

.skip-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 36px;
  border-radius: 10px;
  border: 1.5px solid var(--border);
  background: transparent;
  cursor: pointer;
  transition: all 0.25s;
  font-size: 0.85rem;
  color: var(--text-muted);
}

.skip-btn:hover {
  border-color: var(--warning);
  color: var(--warning);
  background: rgba(251,191,36,0.08);
}

.skip-btn.skipped {
  border-color: var(--warning);
  background: rgba(251,191,36,0.15);
  color: var(--warning);
}

@keyframes checkPop {
  0% { transform: scale(1); }
  50% { transform: scale(1.2); }
  100% { transform: scale(1); }
}

.week-dots {
  display: flex;
  gap: 6px;
  align-items: center;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}

.week-dot-group {
  display: flex;
  gap: 4px;
  flex: 1;
  justify-content: space-around;
}

.week-dot {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

.week-dot .dot {
  width: 22px;
  height: 22px;
  border-radius: 6px;
  border: 1.5px solid var(--border);
  background: transparent;
  transition: all 0.2s;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.6rem;
}

.week-dot .dot.done {
  background: var(--success);
  border-color: var(--success);
  color: white;
}

.week-dot .dot.skip {
  background: rgba(251,191,36,0.2);
  border-color: rgba(251,191,36,0.4);
  color: var(--warning);
}

.week-dot .dot.today {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px var(--accent-glow);
}

.week-dot .dot.future {
  opacity: 0.3;
  cursor: default;
}

.week-dot .dot-label {
  font-size: 0.6rem;
  color: var(--text-muted);
}

.charts-section {
  margin-bottom: 30px;
}

.chart-container {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
}

.chart-canvas-wrap {
  position: relative;
  width: 100%;
  height: 200px;
}

.chart-canvas-wrap canvas {
  width: 100% !important;
  height: 100% !important;
}

.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  animation: fadeIn 0.2s ease;
}

.modal {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px;
  width: 100%;
  max-width: 420px;
  animation: slideUp 0.3s ease;
}

.modal h3 {
  font-size: 1.1rem;
  font-weight: 700;
  margin-bottom: 20px;
}

.form-group {
  margin-bottom: 16px;
}

.form-group label {
  display: block;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--text-dim);
  margin-bottom: 6px;
}

.form-group input, .form-group select {
  width: 100%;
  padding: 10px 14px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--bg-input);
  color: var(--text);
  font-family: inherit;
  font-size: 0.9rem;
  outline: none;
  transition: border-color 0.2s;
}

.form-group input:focus, .form-group select:focus {
  border-color: var(--accent);
}

.emoji-picker {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.emoji-option {
  width: 38px;
  height: 38px;
  border-radius: 10px;
  border: 2px solid var(--border);
  background: transparent;
  font-size: 1.2rem;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}

.emoji-option:hover {
  background: var(--bg-card-hover);
  border-color: var(--text-muted);
}

.emoji-option.selected {
  border-color: var(--accent);
  background: rgba(124,92,252,0.15);
}

.color-picker {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.color-option {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 3px solid transparent;
  cursor: pointer;
  transition: all 0.2s;
}

.color-option:hover {
  transform: scale(1.15);
}

.color-option.selected {
  border-color: white;
  box-shadow: 0 0 0 2px var(--accent);
}

.modal-actions {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  margin-top: 24px;
}

.data-section {
  margin-bottom: 30px;
}

.data-buttons {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.empty-state {
  text-align: center;
  padding: 50px 20px;
  color: var(--text-dim);
}

.empty-state .empty-icon {
  font-size: 3rem;
  margin-bottom: 12px;
}

.empty-state p {
  font-size: 0.9rem;
  margin-bottom: 16px;
}

.confetti-container {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 9999;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes confettiFall {
  0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

.toast-container {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 2000;
  display: flex;
  flex-direction: column;
  gap: 8px;
  align-items: center;
}

.toast {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 20px;
  font-size: 0.85rem;
  font-weight: 500;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  animation: toastIn 0.3s ease, toastOut 0.3s ease 2.5s forwards;
  white-space: nowrap;
}

@keyframes toastIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes toastOut {
  from { opacity: 1; transform: translateY(0); }
  to { opacity: 0; transform: translateY(20px); }
}

.nav-tabs {
  display: flex;
  gap: 4px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 4px;
  margin-bottom: 24px;
}

.nav-tab {
  flex: 1;
  padding: 10px 16px;
  border-radius: 9px;
  border: none;
  background: transparent;
  color: var(--text-dim);
  font-family: inherit;
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}

.nav-tab:hover {
  color: var(--text);
}

.nav-tab.active {
  background: var(--accent);
  color: white;
  box-shadow: 0 2px 12px var(--accent-glow);
}

.tab-content {
  display: none;
  animation: fadeIn 0.3s ease;
}

.tab-content.active {
  display: block;
}

@media (max-width: 600px) {
  .app { padding: 12px 12px 80px; }
  .header h1 { font-size: 1.6rem; }
  .stats-row { gap: 8px; }
  .stat-card { padding: 12px 8px; }
  .stat-card .stat-value { font-size: 1.3rem; }
  .habit-card { padding: 14px; }
  .habit-icon { width: 36px; height: 36px; font-size: 1.1rem; }
  .habit-name { font-size: 0.88rem; }
  .week-dot .dot { width: 18px; height: 18px; }
  .modal { padding: 20px; }
  .check-btn { width: 40px; height: 40px; }
  .nav-tab { font-size: 0.75rem; padding: 8px 10px; }
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 3px; }

.hidden-input { display: none; }
</style>
</head>
<body>

<div class="app" id="app">
  <div class="header">
    <h1>✦ Micro Habit Tracker</h1>
    <div class="subtitle">Build better habits, one day at a time</div>
    <div class="date-display" id="dateDisplay"></div>
  </div>

  <div class="motivation-banner" id="motivationBanner">
    <div class="emoji">🌟</div>
    <div class="msg" id="motivationMsg">Let's make today count!</div>
  </div>

  <div class="stats-row">
    <div class="stat-card purple">
      <div class="stat-value" id="statToday">0/0</div>
      <div class="stat-label">Today</div>
    </div>
    <div class="stat-card green">
      <div class="stat-value" id="statStreak">0</div>
      <div class="stat-label">Best Streak</div>
    </div>
    <div class="stat-card yellow">
      <div class="stat-value" id="statTotal">0</div>
      <div class="stat-label">Total ✓</div>
    </div>
  </div>

  <div class="nav-tabs">
    <button class="nav-tab active" data-tab="today" onclick="switchTab('today')">📋 Today</button>
    <button class="nav-tab" data-tab="overview" onclick="switchTab('overview')">📊 Overview</button>
    <button class="nav-tab" data-tab="settings" onclick="switchTab('settings')">⚙️ Settings</button>
  </div>

  <div class="tab-content active" id="tab-today">
    <div class="section-header">
      <h2>Your Habits</h2>
      <button class="btn btn-primary btn-sm" onclick="openAddModal()" id="addHabitBtn">+ Add Habit</button>
    </div>
    <div class="habits-list" id="habitsList"></div>
  </div>

  <div class="tab-content" id="tab-overview">
    <div class="section-header">
      <h2>Weekly Overview</h2>
    </div>
    <div class="chart-container" style="margin-bottom:16px;">
      <div class="chart-canvas-wrap">
        <canvas id="weeklyChart"></canvas>
      </div>
    </div>
    <div class="section-header" style="margin-top:24px;">
      <h2>Completion Rate (Last 30 Days)</h2>
    </div>
    <div class="chart-container">
      <div class="chart-canvas-wrap">
        <canvas id="completionChart"></canvas>
      </div>
    </div>
  </div>

  <div class="tab-content" id="tab-settings">
    <div class="section-header">
      <h2>Data Management</h2>
    </div>
    <div class="data-section">
      <div class="data-buttons">
        <button class="btn btn-ghost" onclick="exportData()">📥 Export JSON</button>
        <button class="btn btn-ghost" onclick="document.getElementById('importInput').click()">📤 Import JSON</button>
        <input type="file" id="importInput" class="hidden-input" accept=".json" onchange="importData(event)">
        <button class="btn btn-danger" onclick="resetData()">🗑️ Reset All</button>
      </div>
    </div>
    <div class="section-header" style="margin-top:24px;">
      <h2>Manage Habits</h2>
    </div>
    <div id="manageHabitsList"></div>
  </div>
</div>

<div id="modalContainer"></div>
<div class="toast-container" id="toastContainer"></div>
<div class="confetti-container" id="confettiContainer"></div>

<script>
const STORAGE_KEY = 'micro_habit_tracker_v1';

const EMOJI_OPTIONS = ['💪','🏃','📚','🧘','💧','🥗','😴','✍️','🎯','🧠','🎵','💊','🌅','🚶','🧹','💰','📱','🍎'];
const COLOR_OPTIONS = ['#7c5cfc','#34d399','#f472b6','#60a5fa','#fbbf24','#f87171','#a78bfa','#2dd4bf','#fb923c','#e879f9'];
const DAY_NAMES_SHORT = ['S','M','T','W','T','F','S'];

let state = {
  habits: [],
  currentDate: todayStr()
};

function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function dateStr(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function parseDate(s) {
  const parts = s.split('-').map(Number);
  return new Date(parts[0], parts[1]-1, parts[2]);
}

function daysBetween(a, b) {
  return Math.round((parseDate(b) - parseDate(a)) / 86400000);
}

function addDays(dateS, n) {
  const d = parseDate(dateS);
  d.setDate(d.getDate() + n);
  return dateStr(d);
}

function generateId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2,7);
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function loadState() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) {
    try { state = JSON.parse(raw); return true; } catch(e) {}
  }
  return false;
}

function createDefaultData() {
  const today = todayStr();
  const habits = [
    { id: generateId(), name: 'Morning Exercise', emoji: '🏃', color: '#34d399', completions: [], skips: [] },
    { id: generateId(), name: 'Read 20 Pages', emoji: '📚', color: '#60a5fa', completions: [], skips: [] },
    { id: generateId(), name: 'Meditate', emoji: '🧘', color: '#a78bfa', completions: [], skips: [] },
    { id: generateId(), name: 'Drink 8 Glasses', emoji: '💧', color: '#2dd4bf', completions: [], skips: [] },
    { id: generateId(), name: 'Journal', emoji: '✍️', color: '#f472b6', completions: [], skips: [] }
  ];

  for (let i = 10; i >= 1; i--) {
    const d = addDays(today, -i);
    habits.forEach(function(h) {
      const rand = Math.random();
      if (rand < 0.7) h.completions.push(d);
      else if (rand < 0.82) h.skips.push(d);
    });
  }

  habits[0].completions.push(today);
  habits[1].completions.push(today);
  habits[3].completions.push(today);

  state.habits = habits;
  saveState();
}

function getStreak(habit) {
  const today = todayStr();
  let streak = 0;
  let d = today;
  const todayDone = habit.completions.includes(today);
  const todaySkipped = habit.skips.includes(today);
  if (!todayDone && !todaySkipped) d = addDays(today, -1);

  while (true) {
    if (habit.completions.includes(d)) { streak++; d = addDays(d, -1); }
    else if (habit.skips.includes(d)) { d = addDays(d, -1); }
    else break;
  }
  return streak;
}

function getBestStreak(habit) {
  const allDates = habit.completions.slice().sort();
  if (allDates.length === 0) return 0;
  let best = 0, current = 0, prevDate = null;

  for (const d of allDates) {
    if (prevDate === null) { current = 1; }
    else {
      const gap = daysBetween(prevDate, d);
      if (gap === 1) { current++; }
      else if (gap > 1) {
        let hasOnlySkips = true;
        for (let i = 1; i < gap; i++) {
          if (!habit.skips.includes(addDays(prevDate, i))) { hasOnlySkips = false; break; }
        }
        current = hasOnlySkips ? current + 1 : 1;
      }
    }
    best = Math.max(best, current);
    prevDate = d;
  }
  return best;
}

function renderMotivation() {
  const today = todayStr();
  const total = state.habits.length;
  const done = state.habits.filter(function(h) { return h.completions.includes(today); }).length;
  const banner = document.getElementById('motivationBanner');
  const msg = document.getElementById('motivationMsg');
  const emoji = banner.querySelector('.emoji');

  if (total === 0) { emoji.textContent = '🚀'; msg.innerHTML = 'Add your first habit to get started!'; }
  else if (done === total && total > 0) { emoji.textContent = '🎉'; msg.innerHTML = '<span>Perfect day!</span> All ' + total + ' habits completed!'; }
  else if (done > total / 2) { emoji.textContent = '🔥'; msg.innerHTML = 'Great progress! <span>' + done + '/' + total + '</span> done — keep pushing!'; }
  else if (done > 0) { emoji.textContent = '💪'; msg.innerHTML = '<span>' + done + '/' + total + '</span> done — you\'re on your way!'; }
  else { emoji.textContent = '🌅'; msg.innerHTML = 'New day, new opportunities. Let\'s go!'; }

function renderStats() {
  const today = todayStr();
  const total = state.habits.length;
  const done = state.habits.filter(function(h) { return h.completions.includes(today); }).length;
  document.getElementById('statToday').textContent = done + '/' + total;

  let bestStreak = 0, totalCompletions = 0;
  state.habits.forEach(function(h) {

    totalCompletions += h.completions.length;

function renderHabits() {
  const container = document.getElementById('habitsList');
  const today = todayStr();

  if (state.habits.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">🌱</div><p>No habits yet. Add your first habit to start tracking!</p><button class="btn btn-primary" onclick="openAddModal()">+ Add Habit</button></div>';

  }

  const weekDays = getWeekDates();
  container.innerHTML = state.habits.map(function(habit) {
    const isCompleted = habit.completions.includes(today);
    const isSkipped = habit.skips.includes(today);
    const streak = getStreak(habit);
    const cardClass = isCompleted ? 'completed' : (isSkipped ? 'skipped' : '');

    return '<div class="habit-card ' + cardClass + '" data-id="' + habit.id + '">' +
      '<div class="habit-top">' +
        '<div class="habit-icon" style="background:' + habit.color + '22; color:' + habit.color + '">' + habit.emoji + '</div>' +
        '<div class="habit-info">' +
          '<div class="habit-name">' + escapeHtml(habit.name) + '</div>' +
          '<div class="habit-meta">' +
            (streak > 0 ? '<span class="streak-badge"><span class="fire">🔥</span> ' + streak + ' day' + (streak>1?'s':'') + '</span>' : '') +
          '</div>' +
        '</div>' +
        '<div class="check-area">' +
          '<button class="check-btn ' + (isCompleted ? 'checked' : '') + '" onclick="toggleComplete(\'' + habit.id + '\')" title="Complete">' + (isCompleted ? '✓' : '○') + '</button>' +
          '<button class="skip-btn ' + (isSkipped ? 'skipped' : '') + '" onclick="toggleSkip(\'' + habit.id + '\')" title="Skip day">⏭</button>' +
        '</div>' +
      '</div>' +
      '<div class="week-dots">' +
        weekDays.map(function(wd) {
          const isDone = habit.completions.includes(wd.date);
          const isSkip = habit.skips.includes(wd.date);
          const isToday = wd.date === today;
          const isFuture = parseDate(wd.date) > new Date();
          let dotClass = '';
          if (isDone) dotClass = 'done';
          else if (isSkip) dotClass = 'skip';
          if (isToday) dotClass += ' today';
          if (isFuture) dotClass += ' future';
          const symbol = isDone ? '✓' : (isSkip ? '–' : '');
          return '<div class="week-dot"><div class="dot ' + dotClass + '" onclick="toggleDay(\'' + habit.id + '\',\'' + wd.date + '\')" title="' + wd.date + '">' + symbol + '</div><span class="dot-label">' + wd.label + '</span></div>';
        }).join('') +

function getWeekDates() {
  const today = new Date();
  const dayOfWeek = today.getDay();
  const dates = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() - dayOfWeek + i);
    dates.push({ date: dateStr(d), label: DAY_NAMES_SHORT[i] });
  }
  return dates;
}

function renderWeeklyChart() {
  const canvas = document.getElementById('weeklyChart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const wrap = canvas.parentElement;
  const dpr = window.devicePixelRatio || 1;
  const rect = wrap.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  const W = rect.width, H = rect.height;
  ctx.clearRect(0, 0, W, H);

  if (state.habits.length === 0) {
    ctx.fillStyle = '#555577'; ctx.font = '14px Inter, sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('No data yet', W/2, H/2); return;
  }

  const weekDates = getWeekDates();
  const padding = { top: 20, right: 20, bottom: 30, left: 40 };
  const chartW = W - padding.left - padding.right;
  const chartH = H - padding.top - padding.bottom;
  const data = weekDates.map(function(wd) {
    var count = 0;
    state.habits.forEach(function(h) { if (h.completions.includes(wd.date)) count++; });
    return count;
  });
  const maxVal = Math.max(state.habits.length, 1);
  const barW = chartW / 7 * 0.6;
  const gap = chartW / 7;

  ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.lineWidth = 1;
  for (var i = 0; i <= maxVal; i++) {
    var y = padding.top + chartH - (i / maxVal) * chartH;
    ctx.beginPath(); ctx.moveTo(padding.left, y); ctx.lineTo(W - padding.right, y); ctx.stroke();
    ctx.fillStyle = '#555577'; ctx.font = '10px Inter, sans-serif'; ctx.textAlign = 'right';
    ctx.fillText(i.toString(), padding.left - 8, y + 3);
  }

  data.forEach(function(val, i) {
    var x = padding.left + i * gap + (gap - barW) / 2;
    var barH = (val / maxVal) * chartH;
    var by = padding.top + chartH - barH;
    var grad = ctx.createLinearGradient(x, by, x, padding.top + chartH);
    grad.addColorStop(0, '#7c5cfc'); grad.addColorStop(1, '#34d399');
    ctx.fillStyle = grad;
    if (barH > 0) { roundRect(ctx, x, by, barW, barH, 4); ctx.fill(); }
    ctx.fillStyle = '#8888aa'; ctx.font = '10px Inter, sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(weekDates[i].label, x + barW/2, H - 10);
    if (val > 0) { ctx.fillStyle = '#e8e8f0'; ctx.font = 'bold 10px Inter, sans-serif'; ctx.fillText(val.toString(), x + barW/2, by - 6); }
  });
}

function renderCompletionChart() {
  const canvas = document.getElementById('completionChart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const wrap = canvas.parentElement;
  const dpr = window.devicePixelRatio || 1;
  const rect = wrap.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  const W = rect.width, H = rect.height;
  ctx.clearRect(0, 0, W, H);

  if (state.habits.length === 0) {
    ctx.fillStyle = '#555577'; ctx.font = '14px Inter, sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('No data yet', W/2, H/2); return;
  }

  const padding = { top: 20, right: 20, bottom: 30, left: 40 };
  const chartW = W - padding.left - padding.right;
  const chartH = H - padding.top - padding.bottom;
  const days = 30;
  const data = [];
  for (var i = days - 1; i >= 0; i--) {
    var d = addDays(todayStr(), -i);
    var done = 0;
    state.habits.forEach(function(h) { if (h.completions.includes(d)) done++; });
    var rate = state.habits.length > 0 ? (done / state.habits.length) * 100 : 0;
    data.push({ date: d, rate: rate });
  }

  ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.lineWidth = 1;
  for (var p = 0; p <= 100; p += 25) {
    var gy = padding.top + chartH - (p / 100) * chartH;
    ctx.beginPath(); ctx.moveTo(padding.left, gy); ctx.lineTo(W - padding.right, gy); ctx.stroke();
    ctx.fillStyle = '#555577'; ctx.font = '10px Inter, sans-serif'; ctx.textAlign = 'right';
    ctx.fillText(p + '%', padding.left - 8, gy + 3);
  }

  const stepX = chartW / (data.length - 1);

  ctx.beginPath();
  ctx.moveTo(padding.left, padding.top + chartH);
  data.forEach(function(d, i) {
    var x = padding.left + i * stepX;
    var y = padding.top + chartH - (d.rate / 100) * chartH;
    ctx.lineTo(x, y);
  });
  ctx.lineTo(padding.left + (data.length - 1) * stepX, padding.top + chartH);
  ctx.closePath();
  var fillGrad = ctx.createLinearGradient(0, padding.top, 0, padding.top + chartH);
  fillGrad.addColorStop(0, 'rgba(124,92,252,0.2)');
  fillGrad.addColorStop(1, 'rgba(124,92,252,0)');
  ctx.fillStyle = fillGrad;
  ctx.fill();

  ctx.beginPath();
  data.forEach(function(d, i) {
    var x = padding.left + i * stepX;
    var y = padding.top + chartH - (d.rate / 100) * chartH;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  var lineGrad = ctx.createLinearGradient(padding.left, 0, W - padding.right, 0);
  lineGrad.addColorStop(0, '#7c5cfc'); lineGrad.addColorStop(1, '#34d399');
  ctx.strokeStyle = lineGrad; ctx.lineWidth = 2.5; ctx.lineJoin = 'round'; ctx.stroke();

  data.forEach(function(d, i) {
    var x = padding.left + i * stepX;
    var y = padding.top + chartH - (d.rate / 100) * chartH;
    if (i % 5 === 0 || i === data.length - 1) {
      ctx.beginPath(); ctx.arc(x, y, 3.5, 0, Math.PI * 2);
      ctx.fillStyle = '#7c5cfc'; ctx.fill();
      ctx.strokeStyle = '#1a1a2e'; ctx.lineWidth = 2; ctx.stroke();
    }
  });

  ctx.fillStyle = '#555577'; ctx.font = '9px Inter, sans-serif'; ctx.textAlign = 'center';
  data.forEach(function(d, i) {
    if (i % 7 === 0 || i === data.length - 1) {
      var x = padding.left + i * stepX;
      var dt = parseDate(d.date);
      ctx.fillText((dt.getMonth()+1) + '/' + dt.getDate(), x, H - 10);
    }
  });
}

function roundRect(ctx, x, y, w, h, r) {
  if (h <= 0) h = 0;
  r = Math.min(r, h/2, w/2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h);
  ctx.lineTo(x, y + h);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function toggleComplete(habitId) {
  var habit = state.habits.find(function(h) { return h.id === habitId; });
  if (!habit) return;
  var today = todayStr();
  if (habit.completions.includes(today)) {
    habit.completions = habit.completions.filter(function(d) { return d !== today; });
  } else {
    habit.completions.push(today);
    habit.skips = habit.skips.filter(function(d) { return d !== today; });
    var allDone = state.habits.every(function(h) { return h.completions.includes(today); });
    if (allDone && state.habits.length > 0) launchConfetti();
  }
  saveState(); render();
}

function toggleSkip(habitId) {
  var habit = state.habits.find(function(h) { return h.id === habitId; });
  if (!habit) return;
  var today = todayStr();
  if (habit.skips.includes(today)) {
    habit.skips = habit.skips.filter(function(d) { return d !== today; });
  } else {
    habit.skips.push(today);
    habit.completions = habit.completions.filter(function(d) { return d !== today; });
  }
  saveState(); render();
}

function toggleDay(habitId, date) {
  var d = parseDate(date);
  if (d > new Date()) return;
  var habit = state.habits.find(function(h) { return h.id === habitId; });
  if (!habit) return;
  if (habit.completions.includes(date)) {
    habit.completions = habit.completions.filter(function(dd) { return dd !== date; });
  } else {
    habit.completions.push(date);
    habit.skips = habit.skips.filter(function(dd) { return dd !== date; });
  }
  saveState(); render();
}

function openAddModal() {
  if (state.habits.length >= 7) { showToast('Maximum 7 habits allowed!'); return; }
  openHabitModal(null);
}

function openEditModal(habitId) {
  var habit = state.habits.find(function(h) { return h.id === habitId; });
  if (!habit) return;
  openHabitModal(habit);
}

function openHabitModal(habit) {
  var isEdit = !!habit;
  var name = isEdit ? habit.name : '';
  var emoji = isEdit ? habit.emoji : '💪';
  var color = isEdit ? habit.color : COLOR_OPTIONS[Math.floor(Math.random() * COLOR_OPTIONS.length)];

  var html = '<div class="modal-overlay" onclick="closeModal(event)">' +
    '<div class="modal" onclick="event.stopPropagation()">' +
      '<h3>' + (isEdit ? 'Edit Habit' : 'New Habit') + '</h3>' +
      '<div class="form-group"><label>Name</label><input type="text" id="habitNameInput" value="' + escapeHtml(name) + '" placeholder="e.g., Morning Exercise" maxlength="40" autofocus></div>' +
      '<div class="form-group"><label>Icon</label><div class="emoji-picker" id="emojiPicker">' +
        EMOJI_OPTIONS.map(function(e) { return '<button class="emoji-option ' + (e === emoji ? 'selected' : '') + '" data-emoji="' + e + '" onclick="selectEmoji(this)">' + e + '</button>'; }).join('') +
      '</div></div>' +
      '<div class="form-group"><label>Color</label><div class="color-picker" id="colorPicker">' +
        COLOR_OPTIONS.map(function(c) { return '<div class="color-option ' + (c === color ? 'selected' : '') + '" data-color="' + c + '" style="background:' + c + '" onclick="selectColor(this)"></div>'; }).join('') +
      '</div></div>' +
      '<div class="modal-actions">' +
        '<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>' +
        '<button class="btn btn-primary" onclick="saveHabit(' + (isEdit ? "'" + habit.id + "'" : 'null') + ')">' + (isEdit ? 'Save' : 'Add Habit') + '</button>' +
      '</div>' +
    '</div></div>';

  document.getElementById('modalContainer').innerHTML = html;
  setTimeout(function() { document.getElementById('habitNameInput').focus(); }, 100);
}

function selectEmoji(el) {
  document.querySelectorAll('#emojiPicker .emoji-option').forEach(function(e) { e.classList.remove('selected'); });
  el.classList.add('selected');
}

function selectColor(el) {
  document.querySelectorAll('#colorPicker .color-option').forEach(function(e) { e.classList.remove('selected'); });
  el.classList.add('selected');
}

function saveHabit(habitId) {
  var name = document.getElementById('habitNameInput').value.trim();
  if (!name) { showToast('Please enter a habit name'); return; }
  var emoji = (document.querySelector('#emojiPicker .selected') || {}).dataset;
  emoji = emoji ? emoji.emoji : '💪';
  var colorEl = document.querySelector('#colorPicker .selected');
  var color = colorEl ? colorEl.dataset.color : '#7c5cfc';

  if (habitId) {
    var habit = state.habits.find(function(h) { return h.id === habitId; });
    if (habit) { habit.name = name; habit.emoji = emoji; habit.color = color; }
    showToast('Habit updated! ✏️');
  } else {
    if (state.habits.length >= 7) { showToast('Maximum 7 habits allowed!'); return; }
    state.habits.push({ id: generateId(), name: name, emoji: emoji, color: color, completions: [], skips: [] });
    showToast('Habit added! 🎯');
  }
  saveState(); closeModal(); render();
}

function confirmDelete(habitId) {
  var habit = state.habits.find(function(h) { return h.id === habitId; });
  if (!habit) return;
  var html = '<div class="modal-overlay" onclick="closeModal(event)">' +
    '<div class="modal" onclick="event.stopPropagation()">' +
      '<h3>Delete Habit</h3>' +
      '<p style="color:var(--text-dim);font-size:0.9rem;margin-bottom:8px;">Are you sure you want to delete <strong style="color:var(--text);">' + escapeHtml(habit.name) + '</strong>? This will remove all ' + habit.completions.length + ' completions and cannot be undone.</p>' +
      '<div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-danger" onclick="deleteHabit(\'' + habitId + '\')">Delete</button></div>' +
    '</div></div>';
  document.getElementById('modalContainer').innerHTML = html;
}

function deleteHabit(habitId) {
  state.habits = state.habits.filter(function(h) { return h.id !== habitId; });
  saveState(); closeModal(); render();
  showToast('Habit deleted 🗑️');
}

function closeModal(event) {
  if (event && event.target !== event.currentTarget) return;
  document.getElementById('modalContainer').innerHTML = '';
}

function switchTab(tabName) {
  document.querySelectorAll('.nav-tab').forEach(function(t) { t.classList.remove('active'); });
  document.querySelector('.nav-tab[data-tab="' + tabName + '"]').classList.add('active');
  document.querySelectorAll('.tab-content').forEach(function(t) { t.classList.remove('active'); });
  document.getElementById('tab-' + tabName).classList.add('active');
  if (tabName === 'overview') setTimeout(renderCharts, 50);
}

function exportData() {
  var json = JSON.stringify(state, null, 2);
  var blob = new Blob([json], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = 'habit-tracker-' + todayStr() + '.json';
  a.click(); URL.revokeObjectURL(url);
  showToast('Data exported! 📥');
}

function importData(event) {
  var file = event.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = JSON.parse(e.target.result);
      if (data.habits && Array.isArray(data.habits)) {
        state = data; saveState(); render();
        showToast('Data imported successfully! 📤');
      } else { showToast('Invalid file format'); }
    } catch(err) { showToast('Error reading file'); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function resetData() {
  var html = '<div class="modal-overlay" onclick="closeModal(event)">' +
    '<div class="modal" onclick="event.stopPropagation()">' +
      '<h3>Reset All Data</h3>' +
      '<p style="color:var(--text-dim);font-size:0.9rem;margin-bottom:8px;">This will delete all habits and history. This action cannot be undone.</p>' +
      '<div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-danger" onclick="doReset()">Reset Everything</button></div>' +
    '</div></div>';
  document.getElementById('modalContainer').innerHTML = html;
}

function doReset() {
  localStorage.removeItem(STORAGE_KEY);
  state = { habits: [], currentDate: todayStr() };
  closeModal(); render();
  showToast('All data reset 🗑️');
}

function launchConfetti() {
  var container = document.getElementById('confettiContainer');
  var colors = ['#7c5cfc','#34d399','#fbbf24','#f472b6','#60a5fa','#f87171','#a78bfa'];
  for (var i = 0; i < 60; i++) {
    var el = document.createElement('div');
    var color = colors[Math.floor(Math.random() * colors.length)];
    var left = Math.random() * 100;
    var delay = Math.random() * 0.5;
    var size = Math.random() * 8 + 4;
    var duration = Math.random() * 1.5 + 1.5;
    el.style.cssText = 'position:absolute;left:' + left + '%;top:-10px;width:' + size + 'px;height:' + size + 'px;background:' + color + ';border-radius:' + (Math.random() > 0.5 ? '50%' : '2px') + ';animation:confettiFall ' + duration + 's ease-in ' + delay + 's forwards;';
    container.appendChild(el);
  }
  setTimeout(function() { container.innerHTML = ''; }, 3500);
}

function showToast(message) {
  var container = document.getElementById('toastContainer');
  var toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = message;
  container.appendChild(toast);
  setTimeout(function() { if (toast.parentElement) toast.remove(); }, 3000);
}

function escapeHtml(str) {
  var div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function init() {
  if (!loadState() || state.habits.length === 0) createDefaultData();
  state.currentDate = todayStr();
  saveState();
  render();

  var resizeTimer;
  window.addEventListener('resize', function() {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(function() {
      if (document.getElementById('tab-overview').classList.contains('active')) renderCharts();
    }, 200);
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && document.getElementById('habitNameInput')) {
      var editBtn = document.querySelector('.modal .btn-primary');
      if (editBtn) editBtn.click();
    }
    if (e.key === 'Escape') closeModal();
  });
}

init();
</script>
</body>
</html>
