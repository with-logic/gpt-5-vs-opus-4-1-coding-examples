<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Countdown</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --glass-bg: rgba(255, 255, 255, 0.06);
  --glass-border: rgba(255, 255, 255, 0.12);
  --glass-shadow: rgba(0, 0, 0, 0.3);
  --accent: #6C63FF;
  --accent-glow: rgba(108, 99, 255, 0.4);
  --accent2: #FF6B9D;
  --accent2-glow: rgba(255, 107, 157, 0.3);
  --text-primary: #FFFFFF;
  --text-secondary: rgba(255, 255, 255, 0.65);
  --text-muted: rgba(255, 255, 255, 0.35);
  --surface: rgba(255, 255, 255, 0.04);
  --surface-hover: rgba(255, 255, 255, 0.08);
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'Inter', -apple-system, sans-serif;
  background: #0a0a1a;
  color: var(--text-primary);
}

/* ─── Background ─── */
#bg-layer {
  position: fixed; inset: -60px;
  background-size: cover;
  background-position: center;
  background-color: #0a0a1a;
  transition: transform 0.3s ease-out;
  z-index: 0;
  will-change: transform;
}

#bg-overlay {
  position: fixed; inset: 0;
  background: linear-gradient(
    180deg,
    rgba(10, 10, 26, 0.5) 0%,
    rgba(10, 10, 26, 0.3) 40%,
    rgba(10, 10, 26, 0.6) 70%,
    rgba(10, 10, 26, 0.85) 100%
  );
  z-index: 1;
}

/* Ambient particles */
#particles-canvas {
  position: fixed; inset: 0;
  z-index: 2;
  pointer-events: none;
}

/* ─── Main Container ─── */
#app {
  position: relative;
  z-index: 10;
  width: 100%; height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ─── Setup Form ─── */
#setup-view {
  width: 100%; max-width: 520px;
  padding: 20px;
  animation: fadeSlideUp 0.8s ease-out;
}

@keyframes fadeSlideUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

.setup-card {
  background: var(--glass-bg);
  backdrop-filter: blur(40px) saturate(1.5);
  -webkit-backdrop-filter: blur(40px) saturate(1.5);
  border: 1px solid var(--glass-border);
  border-radius: 24px;
  padding: 40px 36px;
  box-shadow: 0 25px 60px var(--glass-shadow), inset 0 1px 0 rgba(255,255,255,0.06);
}

.setup-header {
  text-align: center;
  margin-bottom: 36px;
}

.setup-header .logo-icon {
  width: 56px; height: 56px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 16px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  margin-bottom: 16px;
  box-shadow: 0 8px 30px var(--accent-glow);
}

.setup-header h1 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.7) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.setup-header p {
  color: var(--text-secondary);
  font-size: 14px;
  margin-top: 6px;
  font-weight: 400;
}

.form-group {
  margin-bottom: 20px;
}

.form-group label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-secondary);
  margin-bottom: 8px;
}

.form-group input,
.form-group .datetime-row input {
  width: 100%;
  padding: 14px 16px;
  background: var(--surface);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  color: var(--text-primary);
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  font-weight: 400;
  transition: all 0.25s ease;
  outline: none;
}

.form-group input::placeholder {
  color: var(--text-muted);
}

.form-group input:focus {
  border-color: var(--accent);
  background: rgba(108, 99, 255, 0.06);
  box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.12);
}

.datetime-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

/* Image upload */
.upload-area {
  border: 2px dashed rgba(255,255,255,0.12);
  border-radius: 14px;
  padding: 24px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.upload-area:hover {
  border-color: var(--accent);
  background: rgba(108, 99, 255, 0.04);
}

.upload-area.has-image {
  padding: 0;
  border-style: solid;
  border-color: var(--accent);
}

.upload-area .upload-icon {
  font-size: 32px;
  margin-bottom: 8px;
}

.upload-area .upload-text {
  font-size: 13px;
  color: var(--text-secondary);
}

.upload-area .upload-text span {
  color: var(--accent);
  font-weight: 600;
}

.upload-area img {
  width: 100%;
  height: 120px;
  object-fit: cover;
  border-radius: 12px;
}

.upload-area .remove-img {
  position: absolute;
  top: 8px; right: 8px;
  width: 28px; height: 28px;
  background: rgba(0,0,0,0.6);
  border: none;
  border-radius: 50%;
  color: #fff;
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(10px);
}

#file-input { display: none; }

.btn-start {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, var(--accent), #8B5CF6);
  border: none;
  border-radius: 14px;
  color: #fff;
  font-family: 'Inter', sans-serif;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  margin-top: 8px;
  position: relative;
  overflow: hidden;
}

.btn-start::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, transparent, rgba(255,255,255,0.15));
  opacity: 0;
  transition: opacity 0.3s;
}

.btn-start:hover::before { opacity: 1; }

.btn-start:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 35px var(--accent-glow);
}

.btn-start:active { transform: translateY(0); }

.btn-start:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  transform: none !important;
  box-shadow: none !important;
}

/* ─── Countdown View ─── */
#countdown-view {
  width: 100%; height: 100%;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  animation: fadeIn 1s ease-out;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.countdown-event-info {
  text-align: center;
  margin-bottom: 48px;
  animation: fadeSlideUp 0.8s ease-out 0.2s both;
}

.countdown-event-name {
  font-family: 'Space Grotesk', sans-serif;
  font-size: clamp(28px, 5vw, 52px);
  font-weight: 800;
  letter-spacing: -1px;
  line-height: 1.1;
  margin-bottom: 12px;
  background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.75) 50%, var(--accent) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.countdown-event-location {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--text-secondary);
  font-size: 15px;
  font-weight: 400;
}

.countdown-event-location .loc-icon {
  font-size: 14px;
}

.countdown-event-date {
  color: var(--text-muted);
  font-size: 13px;
  margin-top: 6px;
}

/* Countdown units */
.countdown-grid {
  display: flex;
  gap: clamp(12px, 3vw, 28px);
  margin-bottom: 48px;
  animation: fadeSlideUp 0.8s ease-out 0.4s both;
}

.countdown-unit {
  text-align: center;
  position: relative;
}

.flip-card {
  width: clamp(72px, 14vw, 130px);
  height: clamp(80px, 16vw, 140px);
  perspective: 600px;
  position: relative;
}

.flip-card-inner {
  width: 100%; height: 100%;
  position: relative;
}

.flip-card .top,
.flip-card .bottom {
  position: absolute;
  width: 100%;
  height: 50%;
  overflow: hidden;
  background: var(--glass-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  display: flex;
  align-items: center;
  justify-content: center;
}

.flip-card .top {
  top: 0;
  border-radius: 16px 16px 0 0;
  border-bottom: 1px solid rgba(0,0,0,0.3);
  align-items: flex-end;
  padding-bottom: 0;
}

.flip-card .bottom {
  bottom: 0;
  border-radius: 0 0 16px 16px;
  border-top: none;
  align-items: flex-start;
  padding-top: 0;
}

.flip-card .top span,
.flip-card .bottom span {
  font-family: 'Space Grotesk', sans-serif;
  font-size: clamp(36px, 8vw, 72px);
  font-weight: 700;
  color: #fff;
  line-height: 1;
}

.flip-card .top span {
  transform: translateY(50%);
}

.flip-card .bottom span {
  transform: translateY(-50%);
}

/* Flip animation overlays */
.flip-card .top-flip,
.flip-card .bottom-flip {
  position: absolute;
  width: 100%;
  height: 50%;
  overflow: hidden;
  backface-visibility: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 5;
}

.flip-card .top-flip {
  top: 0;
  background: var(--glass-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: 16px 16px 0 0;
  border-bottom: 1px solid rgba(0,0,0,0.3);
  transform-origin: bottom;
  align-items: flex-end;
}

.flip-card .top-flip span {
  font-family: 'Space Grotesk', sans-serif;
  font-size: clamp(36px, 8vw, 72px);
  font-weight: 700;
  color: #fff;
  line-height: 1;
  transform: translateY(50%);
}

.flip-card .bottom-flip {
  bottom: 0;
  background: var(--glass-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: 0 0 16px 16px;
  transform-origin: top;
  transform: rotateX(90deg);
  align-items: flex-start;
}

.flip-card .bottom-flip span {
  font-family: 'Space Grotesk', sans-serif;
  font-size: clamp(36px, 8vw, 72px);
  font-weight: 700;
  color: #fff;
  line-height: 1;
  transform: translateY(-50%);
}

.flip-card .top-flip.flip {
  animation: flipTop 0.5s ease-in forwards;
}

.flip-card .bottom-flip.flip {
  animation: flipBottom 0.5s ease-out 0.25s forwards;
}

@keyframes flipTop {
  0% { transform: rotateX(0); }
  100% { transform: rotateX(-90deg); }
}

@keyframes flipBottom {
  0% { transform: rotateX(90deg); }
  100% { transform: rotateX(0); }
}

/* Glow effect on cards */
.flip-card::after {
  content: '';
  position: absolute;
  inset: -1px;
  border-radius: 16px;
  background: linear-gradient(135deg, var(--accent-glow), transparent, var(--accent2-glow));
  opacity: 0;
  z-index: -1;
  transition: opacity 0.5s;
}

.countdown-unit:hover .flip-card::after {
  opacity: 1;
}

.countdown-label {
  margin-top: 12px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--text-muted);
}

/* Separator dots */
.countdown-separator {
  display: flex;
  flex-direction: column;
  gap: 12px;
  justify-content: center;
  padding-bottom: 28px;
}

.countdown-separator .dot {
  width: 8px; height: 8px;
  background: var(--accent);
  border-radius: 50%;
  box-shadow: 0 0 12px var(--accent-glow);
  animation: pulse-dot 1s ease-in-out infinite alternate;
}

.countdown-separator .dot:nth-child(2) {
  animation-delay: 0.5s;
}

@keyframes pulse-dot {
  from { opacity: 0.4; transform: scale(0.8); }
  to { opacity: 1; transform: scale(1.1); }
}

/* Progress bar */
.progress-section {
  width: 100%;
  max-width: 600px;
  margin-bottom: 36px;
  animation: fadeSlideUp 0.8s ease-out 0.6s both;
}

.progress-bar-bg {
  width: 100%;
  height: 4px;
  background: rgba(255,255,255,0.06);
  border-radius: 4px;
  overflow: hidden;
}

.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 4px;
  transition: width 1s ease;
  box-shadow: 0 0 15px var(--accent-glow);
}

.progress-text {
  display: flex;
  justify-content: space-between;
  margin-top: 8px;
  font-size: 12px;
  color: var(--text-muted);
}

/* Action buttons */
.action-buttons {
  display: flex;
  gap: 12px;
  animation: fadeSlideUp 0.8s ease-out 0.8s both;
}

.btn-calendar {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 14px 28px;
  background: var(--glass-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: 14px;
  color: var(--text-primary);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.3s ease;
}

.btn-calendar:hover {
  background: var(--surface-hover);
  border-color: var(--accent);
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(0,0,0,0.3);
}

.btn-calendar .cal-icon { font-size: 18px; }

.btn-edit {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 14px 28px;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px;
  color: var(--text-secondary);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.3s ease;
}

.btn-edit:hover {
  background: var(--surface);
  color: var(--text-primary);
  transform: translateY(-2px);
}

/* ─── Event Expired ─── */
.expired-message {
  text-align: center;
  animation: fadeSlideUp 0.8s ease-out;
}

.expired-message .emoji {
  font-size: 64px;
  margin-bottom: 16px;
  animation: bounce 1s ease infinite;
}

@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

.expired-message h2 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 36px;
  font-weight: 700;
  margin-bottom: 8px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.expired-message p {
  color: var(--text-secondary);
  font-size: 16px;
}

/* ─── Responsive ─── */
@media (max-width: 600px) {
  .setup-card { padding: 28px 20px; }
  .countdown-grid { gap: 8px; }
  .countdown-separator { display: none; }
  .action-buttons { flex-direction: column; align-items: center; }
  .datetime-row { grid-template-columns: 1fr; }
}

/* ─── Notification toast ─── */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--glass-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: 12px;
  padding: 14px 24px;
  color: var(--text-primary);
  font-size: 14px;
  font-weight: 500;
  z-index: 1000;
  transition: transform 0.4s ease;
  box-shadow: 0 15px 40px rgba(0,0,0,0.4);
}

.toast.show {
  transform: translateX(-50%) translateY(0);
}

/* Color scheme for date inputs */
input[type="date"]::-webkit-calendar-picker-indicator,
input[type="time"]::-webkit-calendar-picker-indicator {
  filter: invert(1);
  cursor: pointer;
}
</style>
</head>
<body>

<!-- Background layers -->
<div id="bg-layer"></div>
<div id="bg-overlay"></div>
<canvas id="particles-canvas"></canvas>

<!-- App -->
<div id="app">

  <!-- Setup View -->
  <div id="setup-view">
    <div class="setup-card">
      <div class="setup-header">
        <div class="logo-icon">⏳</div>
        <h1>Event Countdown</h1>
        <p>Create a beautiful countdown for your next event</p>
      </div>

      <div class="form-group">
        <label>Event Name</label>
        <input type="text" id="event-name" placeholder="e.g., Annual Conference 2026" maxlength="80" autocomplete="off">
      </div>

      <div class="form-group">
        <label>Date & Time</label>
        <div class="datetime-row">
          <input type="date" id="event-date">
          <input type="time" id="event-time" value="12:00">
        </div>
      </div>

      <div class="form-group">
        <label>Location</label>
        <input type="text" id="event-location" placeholder="e.g., San Francisco, CA" maxlength="100" autocomplete="off">
      </div>

      <div class="form-group">
        <label>Background Image (optional)</label>
        <div class="upload-area" id="upload-area">
          <div class="upload-icon">🖼️</div>
          <div class="upload-text">Click to upload or drag & drop<br><span>PNG, JPG up to 10MB</span></div>
        </div>
        <input type="file" id="file-input" accept="image/*">
      </div>

      <button class="btn-start" id="btn-start" disabled>Start Countdown</button>
    </div>
  </div>

  <!-- Countdown View -->
  <div id="countdown-view">
    <div class="countdown-event-info">
      <div class="countdown-event-name" id="display-name"></div>
      <div class="countdown-event-location">
        <span class="loc-icon">📍</span>
        <span id="display-location"></span>
      </div>
      <div class="countdown-event-date" id="display-date"></div>
    </div>

    <div class="countdown-grid" id="countdown-grid">
      <div class="countdown-unit">
        <div class="flip-card" id="card-days">
          <div class="flip-card-inner">
            <div class="top"><span>00</span></div>
            <div class="bottom"><span>00</span></div>
            <div class="top-flip"><span>00</span></div>
            <div class="bottom-flip"><span>00</span></div>
          </div>
        </div>
        <div class="countdown-label">Days</div>
      </div>

      <div class="countdown-separator"><div class="dot"></div><div class="dot"></div></div>

      <div class="countdown-unit">
        <div class="flip-card" id="card-hours">
          <div class="flip-card-inner">
            <div class="top"><span>00</span></div>
            <div class="bottom"><span>00</span></div>
            <div class="top-flip"><span>00</span></div>
            <div class="bottom-flip"><span>00</span></div>
          </div>
        </div>
        <div class="countdown-label">Hours</div>
      </div>

      <div class="countdown-separator"><div class="dot"></div><div class="dot"></div></div>

      <div class="countdown-unit">
        <div class="flip-card" id="card-minutes">
          <div class="flip-card-inner">
            <div class="top"><span>00</span></div>
            <div class="bottom"><span>00</span></div>
            <div class="top-flip"><span>00</span></div>
            <div class="bottom-flip"><span>00</span></div>
          </div>
        </div>
        <div class="countdown-label">Minutes</div>
      </div>

      <div class="countdown-separator"><div class="dot"></div><div class="dot"></div></div>

      <div class="countdown-unit">
        <div class="flip-card" id="card-seconds">
          <div class="flip-card-inner">
            <div class="top"><span>00</span></div>
            <div class="bottom"><span>00</span></div>
            <div class="top-flip"><span>00</span></div>
            <div class="bottom-flip"><span>00</span></div>
          </div>
        </div>
        <div class="countdown-label">Seconds</div>
      </div>
    </div>

    <div class="progress-section">
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress-fill" style="width: 0%"></div>
      </div>
      <div class="progress-text">
        <span id="progress-elapsed">Elapsed</span>
        <span id="progress-remaining">Remaining</span>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-calendar" id="btn-calendar">
        <span class="cal-icon">📅</span>
        Save to Calendar
      </button>
      <button class="btn-edit" id="btn-edit">
        ✏️ Edit Event
      </button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ─── State ───
const state = {
  eventName: '',
  eventDate: null,
  eventTime: '12:00',
  eventLocation: '',
  bgImage: null,
  createdAt: null,
  intervalId: null,
  prevValues: { days: -1, hours: -1, minutes: -1, seconds: -1 }
};

// ─── DOM refs ───
const $ = id => document.getElementById(id);
const bgLayer = $('bg-layer');
const setupView = $('setup-view');
const countdownView = $('countdown-view');
const nameInput = $('event-name');
const dateInput = $('event-date');
const timeInput = $('event-time');
const locationInput = $('event-location');
const uploadArea = $('upload-area');
const fileInput = $('file-input');
const btnStart = $('btn-start');
const btnCalendar = $('btn-calendar');
const btnEdit = $('btn-edit');
const toast = $('toast');

// ─── Set default date to tomorrow ───
const tomorrow = new Date();
tomorrow.setDate(tomorrow.getDate() + 7);
dateInput.value = tomorrow.toISOString().split('T')[0];

// ─── Validation ───
function validateForm() {
  const valid = nameInput.value.trim() && dateInput.value;
  btnStart.disabled = !valid;
}

nameInput.addEventListener('input', validateForm);
dateInput.addEventListener('input', validateForm);
validateForm();

// ─── Image Upload ───
uploadArea.addEventListener('click', () => fileInput.click());

uploadArea.addEventListener('dragover', e => {
  e.preventDefault();
  uploadArea.style.borderColor = 'var(--accent)';
  uploadArea.style.background = 'rgba(108,99,255,0.06)';
});

uploadArea.addEventListener('dragleave', () => {
  uploadArea.style.borderColor = '';
  uploadArea.style.background = '';
});

uploadArea.addEventListener('drop', e => {
  e.preventDefault();
  uploadArea.style.borderColor = '';
  uploadArea.style.background = '';
  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});

fileInput.addEventListener('change', () => {
  if (fileInput.files.length) handleFile(fileInput.files[0]);
});

function handleFile(file) {
  if (!file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = e => {
    state.bgImage = e.target.result;
    uploadArea.classList.add('has-image');
    uploadArea.innerHTML = `<img src="${state.bgImage}" alt="Preview"><button class="remove-img" onclick="removeImage(event)">✕</button>`;
  };
  reader.readAsDataURL(file);
}

function removeImage(e) {
  e.stopPropagation();
  state.bgImage = null;
  uploadArea.classList.remove('has-image');
  uploadArea.innerHTML = `<div class="upload-icon">🖼️</div><div class="upload-text">Click to upload or drag & drop<br><span>PNG, JPG up to 10MB</span></div>`;
  fileInput.value = '';
}

// ─── Start Countdown ───
btnStart.addEventListener('click', () => {
  state.eventName = nameInput.value.trim();
  state.eventDate = dateInput.value;
  state.eventTime = timeInput.value || '12:00';
  state.eventLocation = locationInput.value.trim();
  state.createdAt = new Date().toISOString();

  // Build target date
  const [y, m, d] = state.eventDate.split('-').map(Number);
  const [h, min] = state.eventTime.split(':').map(Number);
  state.targetDate = new Date(y, m - 1, d, h, min, 0);

  // Apply background
  if (state.bgImage) {
    bgLayer.style.backgroundImage = `url(${state.bgImage})`;
  }

  // Populate display
  $('display-name').textContent = state.eventName;
  $('display-location').textContent = state.eventLocation || 'No location specified';
  const opts = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: 'numeric', minute: '2-digit' };
  $('display-date').textContent = state.targetDate.toLocaleDateString('en-US', opts);

  // Transition
  setupView.style.display = 'none';
  countdownView.style.display = 'flex';

  // Reset prev values
  state.prevValues = { days: -1, hours: -1, minutes: -1, seconds: -1 };

  // Start ticking
  tick();
  state.intervalId = setInterval(tick, 1000);
});

// ─── Edit ───
btnEdit.addEventListener('click', () => {
  clearInterval(state.intervalId);
  countdownView.style.display = 'none';
  setupView.style.display = 'block';
  setupView.style.animation = 'none';
  setupView.offsetHeight; // reflow
  setupView.style.animation = 'fadeSlideUp 0.6s ease-out';
});

// ─── Flip Card Logic ───
function flipCard(cardId, newVal) {
  const card = $(cardId);
  const topEl = card.querySelector('.top span');
  const bottomEl = card.querySelector('.bottom span');
  const topFlipEl = card.querySelector('.top-flip span');
  const bottomFlipEl = card.querySelector('.bottom-flip span');
  const topFlip = card.querySelector('.top-flip');
  const bottomFlip = card.querySelector('.bottom-flip');

  const padded = String(newVal).padStart(2, '0');
  const currentVal = topEl.textContent;

  if (currentVal === padded) return;

  // Set up flip
  topFlipEl.textContent = currentVal;  // old value on top flip
  bottomFlipEl.textContent = padded;   // new value on bottom flip

  // Reset animations
  topFlip.classList.remove('flip');
  bottomFlip.classList.remove('flip');
  void topFlip.offsetHeight; // force reflow

  // Start flip
  topFlip.classList.add('flip');
  bottomFlip.classList.add('flip');

  // After animation, update static faces
  setTimeout(() => {
    topEl.textContent = padded;
    bottomEl.textContent = padded;
    topFlip.classList.remove('flip');
    bottomFlip.classList.remove('flip');
    topFlipEl.textContent = padded;
  }, 500);
}

// ─── Tick ───
function tick() {
  const now = new Date();
  const diff = state.targetDate - now;

  if (diff <= 0) {
    clearInterval(state.intervalId);
    showExpired();
    return;
  }

  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
  const minutes = Math.floor((diff / (1000 * 60)) % 60);
  const seconds = Math.floor((diff / 1000) % 60);

  if (state.prevValues.days !== days) flipCard('card-days', days);
  if (state.prevValues.hours !== hours) flipCard('card-hours', hours);
  if (state.prevValues.minutes !== minutes) flipCard('card-minutes', minutes);
  if (state.prevValues.seconds !== seconds) flipCard('card-seconds', seconds);

  state.prevValues = { days, hours, minutes, seconds };

  // Progress bar
  const created = new Date(state.createdAt);
  const totalDuration = state.targetDate - created;
  const elapsed = now - created;
  const progress = Math.min(100, Math.max(0, (elapsed / totalDuration) * 100));
  $('progress-fill').style.width = progress.toFixed(2) + '%';

  const remaining = formatDuration(diff);
  const elapsedStr = formatDuration(elapsed);
  $('progress-elapsed').textContent = `${elapsedStr} elapsed`;
  $('progress-remaining').textContent = `${remaining} remaining`;
}

function formatDuration(ms) {
  if (ms < 0) ms = 0;
  const totalSec = Math.floor(ms / 1000);
  const d = Math.floor(totalSec / 86400);
  const h = Math.floor((totalSec % 86400) / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;

  const parts = [];
  if (d > 0) parts.push(`${d}d`);
  if (h > 0) parts.push(`${h}h`);
  if (m > 0) parts.push(`${m}m`);
  parts.push(`${s}s`);
  return parts.join(' ');
}

function showExpired() {
  const grid = $('countdown-grid');
  const progressSection = document.querySelector('.progress-section');
  grid.innerHTML = `
    <div class="expired-message">
      <div class="emoji">🎉</div>
      <h2>Event Started!</h2>
      <p>${state.eventName} is happening now!</p>
    </div>
  `;
  grid.style.justifyContent = 'center';
  progressSection.style.display = 'none';
}

// ─── Save to Calendar (.ics) ───
btnCalendar.addEventListener('click', () => {
  const [y, m, d] = state.eventDate.split('-').map(Number);
  const [h, min] = state.eventTime.split(':').map(Number);

  const pad = n => String(n).padStart(2, '0');
  const startDate = `${y}${pad(m)}${pad(d)}T${pad(h)}${pad(min)}00`;

  // Default 1 hour event
  const endH = h + 1;
  const endDate = `${y}${pad(m)}${pad(d)}T${pad(endH)}${pad(min)}00`;

  const now = new Date();
  const stamp = `${now.getUTCFullYear()}${pad(now.getUTCMonth()+1)}${pad(now.getUTCDate())}T${pad(now.getUTCHours())}${pad(now.getUTCMinutes())}${pad(now.getUTCSeconds())}Z`;

  const ics = [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//Event Countdown//EN',
    'CALSCALE:GREGORIAN',
    'METHOD:PUBLISH',
    'BEGIN:VEVENT',
    `DTSTAMP:${stamp}`,
    `DTSTART:${startDate}`,
    `DTEND:${endDate}`,
    `SUMMARY:${state.eventName}`,
    `LOCATION:${state.eventLocation}`,
    `DESCRIPTION:Countdown event: ${state.eventName}`,
    'STATUS:CONFIRMED',
    'BEGIN:VALARM',
    'TRIGGER:-PT30M',
    'ACTION:DISPLAY',
    'DESCRIPTION:Event reminder',
    'END:VALARM',
    'BEGIN:VALARM',
    'TRIGGER:-PT1440M',
    'ACTION:DISPLAY',
    'DESCRIPTION:Event tomorrow',
    'END:VALARM',
    'END:VEVENT',
    'END:VCALENDAR'
  ].join('\r\n');

  const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${state.eventName.replace(/[^a-zA-Z0-9]/g, '_')}.ics`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  showToast('📅 Calendar file downloaded!');
});

// ─── Toast ───
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}

// ─── Parallax Effect ───
let mouseX = 0, mouseY = 0;
let currentX = 0, currentY = 0;

document.addEventListener('mousemove', e => {
  mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
  mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
});

function animateParallax() {
  currentX += (mouseX - currentX) * 0.05;
  currentY += (mouseY - currentY) * 0.05;
  bgLayer.style.transform = `translate(${currentX * -20}px, ${currentY * -20}px) scale(1.05)`;
  requestAnimationFrame(animateParallax);
}
animateParallax();

// ─── Particles ───
const canvas = $('particles-canvas');
const ctx = canvas.getContext('2d');
let particles = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

class Particle {
  constructor() {
    this.reset();
  }
  reset() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = Math.random() * 2 + 0.5;
    this.speedX = (Math.random() - 0.5) * 0.3;
    this.speedY = (Math.random() - 0.5) * 0.3;
    this.opacity = Math.random() * 0.4 + 0.1;
    this.pulse = Math.random() * Math.PI * 2;
    this.pulseSpeed = Math.random() * 0.02 + 0.005;
  }
  update() {
    this.x += this.speedX;
    this.y += this.speedY;
    this.pulse += this.pulseSpeed;

    if (this.x < -10 || this.x > canvas.width + 10 ||
        this.y < -10 || this.y > canvas.height + 10) {
      this.reset();
    }
  }
  draw() {
    const alpha = this.opacity * (0.5 + 0.5 * Math.sin(this.pulse));
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(108, 99, 255, ${alpha})`;
    ctx.fill();
  }
}

// Create particles
for (let i = 0; i < 60; i++) {
  particles.push(new Particle());
}

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => {
    p.update();
    p.draw();
  });

  // Draw connections
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 120) {
        const alpha = (1 - dist / 120) * 0.08;
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.strokeStyle = `rgba(108, 99, 255, ${alpha})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }
  }

  requestAnimationFrame(animateParticles);
}
animateParticles();

// ─── Keyboard shortcut ───
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !btnStart.disabled && setupView.style.display !== 'none') {
    btnStart.click();
  }
});
</script>
