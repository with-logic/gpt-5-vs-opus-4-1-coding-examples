<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown → Slides</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f8f9fc;
    --bg-tertiary: #f0f2f7;
    --bg-editor: #1e1e2e;
    --text-primary: #1a1a2e;
    --text-secondary: #4a4a6a;
    --text-tertiary: #8888a8;
    --text-editor: #cdd6f4;
    --accent: #4f46e5;
    --accent-light: #818cf8;
    --accent-bg: #eef2ff;
    --border: #e2e4ec;
    --border-light: #eff0f5;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
    --shadow-lg: 0 12px 40px rgba(0,0,0,0.1);
    --shadow-xl: 0 24px 60px rgba(0,0,0,0.14);
    --slide-bg: #ffffff;
    --slide-text: #1a1a2e;
    --slide-heading: #0f0f1e;
    --slide-accent: #4f46e5;
    --slide-muted: #64748b;
    --slide-border: #e2e8f0;
    --slide-gradient-start: #f8fafc;
    --slide-gradient-end: #ffffff;
    --toolbar-bg: #ffffff;
    --thumb-border: #e2e4ec;
    --thumb-active: #4f46e5;
    --scrollbar-track: #f0f2f7;
    --scrollbar-thumb: #c8cad4;
    --code-bg: #f1f5f9;
    --code-text: #e11d48;
    --blockquote-border: #4f46e5;
    --blockquote-bg: #f8f9ff;
    --table-stripe: #f8fafc;
    --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }

  [data-theme="dark"] {
    --bg-primary: #0f0f1a;
    --bg-secondary: #161625;
    --bg-tertiary: #1e1e30;
    --bg-editor: #12121f;
    --text-primary: #e8e8f0;
    --text-secondary: #a0a0b8;
    --text-tertiary: #6a6a82;
    --text-editor: #cdd6f4;
    --accent: #818cf8;
    --accent-light: #a5b4fc;
    --accent-bg: #1e1b4b;
    --border: #2a2a40;
    --border-light: #222238;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.3);
    --shadow-lg: 0 12px 40px rgba(0,0,0,0.4);
    --shadow-xl: 0 24px 60px rgba(0,0,0,0.5);
    --slide-bg: #1a1a2e;
    --slide-text: #e2e8f0;
    --slide-heading: #f1f5f9;
    --slide-accent: #818cf8;
    --slide-muted: #94a3b8;
    --slide-border: #2d2d48;
    --slide-gradient-start: #161625;
    --slide-gradient-end: #1a1a2e;
    --toolbar-bg: #161625;
    --thumb-border: #2a2a40;
    --thumb-active: #818cf8;
    --scrollbar-track: #1e1e30;
    --scrollbar-thumb: #3a3a55;
    --code-bg: #1e1b4b;
    --code-text: #f472b6;
    --blockquote-border: #818cf8;
    --blockquote-bg: #1a1a3a;
    --table-stripe: #1e1e32;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    overflow: hidden;
    transition: background var(--transition), color var(--transition);
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--scrollbar-track); }
  ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }

  /* App Layout */
  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* Toolbar */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    height: 56px;
    background: var(--toolbar-bg);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 10;
    transition: background var(--transition), border-color var(--transition);
  }

  .toolbar-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 700;
    font-size: 16px;
    color: var(--text-primary);
    letter-spacing: -0.02em;
  }

  .logo-icon {
    width: 32px;
    height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent-light));
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 14px;
    font-weight: 800;
    box-shadow: 0 2px 8px rgba(79, 70, 229, 0.3);
  }

  .divider-v {
    width: 1px;
    height: 24px;
    background: var(--border);
  }

  .slide-counter {
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 500;
    background: var(--bg-tertiary);
    padding: 5px 12px;
    border-radius: 6px;
    transition: background var(--transition);
  }

  .toolbar-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 7px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg-primary);
    color: var(--text-secondary);
    font-size: 13px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    transition: all var(--transition);
    white-space: nowrap;
  }

  .btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-bg);
  }

  .btn-accent {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
    box-shadow: 0 2px 8px rgba(79, 70, 229, 0.25);
  }

  .btn-accent:hover {
    background: var(--accent-light);
    border-color: var(--accent-light);
    color: white;
    box-shadow: 0 4px 12px rgba(79, 70, 229, 0.35);
  }

  .btn svg {
    width: 15px;
    height: 15px;
    flex-shrink: 0;
  }

  .btn-icon {
    padding: 7px;
    width: 34px;
    height: 34px;
    justify-content: center;
  }

  /* Main Content */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* Editor Panel */
  .editor-panel {
    width: 42%;
    min-width: 320px;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    background: var(--bg-secondary);
    transition: background var(--transition), border-color var(--transition);
  }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-secondary);
    flex-shrink: 0;
  }

  .panel-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .editor-wrap {
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  #editor {
    width: 100%;
    height: 100%;
    padding: 20px;
    border: none;
    outline: none;
    resize: none;
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    font-size: 13.5px;
    line-height: 1.7;
    color: var(--text-editor);
    background: var(--bg-editor);
    tab-size: 2;
    transition: background var(--transition);
  }

  #editor::placeholder {
    color: var(--text-tertiary);
  }

  /* Preview Panel */
  .preview-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: var(--bg-primary);
    min-width: 0;
    transition: background var(--transition);
  }

  .preview-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px;
    overflow: auto;
  }

  /* Slide Container */
  .slide-frame {
    width: 100%;
    max-width: 860px;
    aspect-ratio: 16 / 9;
    background: var(--slide-bg);
    border-radius: 12px;
    box-shadow: var(--shadow-lg);
    overflow: hidden;
    position: relative;
    transition: background var(--transition), box-shadow var(--transition);
  }

  .slide-content {
    width: 100%;
    height: 100%;
    padding: 48px 56px;
    overflow: auto;
    display: flex;
    flex-direction: column;
    justify-content: center;
    background: linear-gradient(180deg, var(--slide-gradient-start) 0%, var(--slide-gradient-end) 100%);
    position: relative;
  }

  /* Slide decorative elements */
  .slide-content::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--slide-accent), var(--accent-light));
    opacity: 0.8;
  }

  /* Slide Number Badge */
  .slide-number-badge {
    position: absolute;
    bottom: 16px;
    right: 20px;
    font-size: 11px;
    font-weight: 600;
    color: var(--slide-muted);
    opacity: 0.5;
    letter-spacing: 0.05em;
  }

  /* Slide Typography */
  .slide-content h1 {
    font-size: 2.2em;
    font-weight: 800;
    color: var(--slide-heading);
    line-height: 1.15;
    margin-bottom: 16px;
    letter-spacing: -0.03em;
  }

  .slide-content h2 {
    font-size: 1.6em;
    font-weight: 700;
    color: var(--slide-heading);
    line-height: 1.2;
    margin-bottom: 14px;
    letter-spacing: -0.02em;
  }

  .slide-content h3 {
    font-size: 1.2em;
    font-weight: 600;
    color: var(--slide-heading);
    line-height: 1.3;
    margin-bottom: 10px;
  }

  .slide-content p {
    font-size: 1em;
    line-height: 1.7;
    color: var(--slide-text);
    margin-bottom: 12px;
  }

  .slide-content ul, .slide-content ol {
    padding-left: 24px;
    margin-bottom: 12px;
  }

  .slide-content li {
    font-size: 1em;
    line-height: 1.7;
    color: var(--slide-text);
    margin-bottom: 6px;
  }

  .slide-content li::marker {
    color: var(--slide-accent);
  }

  .slide-content strong {
    color: var(--slide-heading);
    font-weight: 700;
  }

  .slide-content em {
    font-style: italic;
    color: var(--slide-muted);
  }

  .slide-content a {
    color: var(--slide-accent);
    text-decoration: underline;
    text-underline-offset: 3px;
  }

  .slide-content code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85em;
    background: var(--code-bg);
    color: var(--code-text);
    padding: 2px 7px;
    border-radius: 4px;
  }

  .slide-content pre {
    background: var(--code-bg);
    padding: 16px 20px;
    border-radius: 8px;
    margin-bottom: 12px;
    overflow-x: auto;
  }

  .slide-content pre code {
    background: none;
    color: var(--slide-text);
    padding: 0;
    font-size: 0.82em;
    line-height: 1.6;
  }

  .slide-content blockquote {
    border-left: 4px solid var(--blockquote-border);
    background: var(--blockquote-bg);
    padding: 14px 20px;
    border-radius: 0 8px 8px 0;
    margin-bottom: 12px;
  }

  .slide-content blockquote p {
    color: var(--slide-muted);
    font-style: italic;
    margin-bottom: 0;
  }

  .slide-content hr {
    border: none;
    height: 1px;
    background: var(--slide-border);
    margin: 16px 0;
  }

  .slide-content table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 12px;
    font-size: 0.92em;
  }

  .slide-content th {
    text-align: left;
    padding: 10px 14px;
    border-bottom: 2px solid var(--slide-accent);
    color: var(--slide-heading);
    font-weight: 700;
    font-size: 0.9em;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .slide-content td {
    padding: 9px 14px;
    border-bottom: 1px solid var(--slide-border);
    color: var(--slide-text);
  }

  .slide-content tr:nth-child(even) td {
    background: var(--table-stripe);
  }

  .slide-content img {
    max-width: 100%;
    border-radius: 8px;
  }

  /* Thumbnail Strip */
  .thumb-strip {
    display: flex;
    gap: 10px;
    padding: 12px 20px;
    overflow-x: auto;
    border-top: 1px solid var(--border);
    background: var(--bg-secondary);
    flex-shrink: 0;
    transition: background var(--transition), border-color var(--transition);
  }

  .thumb {
    flex-shrink: 0;
    width: 100px;
    aspect-ratio: 16/9;
    border: 2px solid var(--thumb-border);
    border-radius: 6px;
    overflow: hidden;
    cursor: pointer;
    position: relative;
    transition: all var(--transition);
    background: var(--slide-bg);
  }

  .thumb:hover {
    border-color: var(--text-tertiary);
    transform: translateY(-1px);
    box-shadow: var(--shadow-sm);
  }

  .thumb.active {
    border-color: var(--thumb-active);
    box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.15);
  }

  .thumb-inner {
    width: 200%;
    height: 200%;
    transform: scale(0.5);
    transform-origin: top left;
    padding: 16px 20px;
    font-size: 5px;
    line-height: 1.4;
    overflow: hidden;
    background: linear-gradient(180deg, var(--slide-gradient-start) 0%, var(--slide-gradient-end) 100%);
    position: relative;
  }

  .thumb-inner::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--slide-accent), var(--accent-light));
    opacity: 0.6;
  }

  .thumb-inner h1, .thumb-inner h2, .thumb-inner h3,
  .thumb-inner p, .thumb-inner li {
    font-size: inherit;
    line-height: inherit;
    margin: 0;
    padding: 0;
    color: var(--slide-heading);
  }

  .thumb-inner h1 { font-size: 1.4em; font-weight: 800; margin-bottom: 2px; }
  .thumb-inner h2 { font-size: 1.2em; font-weight: 700; margin-bottom: 2px; }
  .thumb-inner h3 { font-size: 1em; font-weight: 600; margin-bottom: 1px; }
  .thumb-inner p, .thumb-inner li { font-size: 0.85em; color: var(--slide-text); }
  .thumb-inner ul { padding-left: 8px; }
  .thumb-inner li { margin-bottom: 0; }
  .thumb-inner strong { color: var(--slide-heading); }

  .thumb-num {
    position: absolute;
    bottom: 2px;
    right: 4px;
    font-size: 8px;
    font-weight: 700;
    color: var(--slide-muted);
    opacity: 0.6;
  }

  /* Fullscreen Presentation Mode */
  .presentation-overlay {
    position: fixed;
    inset: 0;
    z-index: 1000;
    background: #000;
    display: none;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .presentation-overlay.active {
    display: flex;
    opacity: 1;
  }

  .presentation-slide {
    width: 100vw;
    height: 100vh;
    max-width: 100%;
    max-height: 100%;
    border-radius: 0;
    box-shadow: none;
    aspect-ratio: auto;
  }

  .presentation-slide .slide-content {
    padding: 6vh 8vw;
    font-size: 1.4vw;
  }

  .presentation-slide .slide-content h1 { font-size: 3em; }
  .presentation-slide .slide-content h2 { font-size: 2.2em; }
  .presentation-slide .slide-content h3 { font-size: 1.6em; }
  .presentation-slide .slide-content p,
  .presentation-slide .slide-content li { font-size: 1.2em; }

  .pres-controls {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(12px);
    padding: 8px 16px;
    border-radius: 12px;
    z-index: 1001;
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .presentation-overlay:hover .pres-controls {
    opacity: 1;
  }

  .pres-btn {
    width: 36px;
    height: 36px;
    border: none;
    border-radius: 8px;
    background: rgba(255,255,255,0.1);
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }

  .pres-btn:hover { background: rgba(255,255,255,0.2); }

  .pres-btn svg { width: 18px; height: 18px; }

  .pres-counter {
    color: rgba(255,255,255,0.7);
    font-size: 13px;
    font-weight: 500;
    min-width: 60px;
    text-align: center;
  }

  .pres-progress {
    position: fixed;
    top: 0;
    left: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent-light));
    z-index: 1002;
    transition: width 0.3s ease;
  }

  /* Animations */
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .slide-content {
    animation: slideIn 0.35s ease-out;
  }

  /* Responsive */
  @media (max-width: 900px) {
    .main { flex-direction: column; }
    .editor-panel { width: 100%; min-width: 0; height: 40%; border-right: none; border-bottom: 1px solid var(--border); }
    .preview-area { padding: 16px; }
    .slide-frame { max-width: 100%; }
    .slide-content { padding: 24px 28px; }
    .slide-content h1 { font-size: 1.6em; }
    .slide-content h2 { font-size: 1.3em; }
  }

  /* Theme toggle animation */
  .theme-toggle-icon {
    transition: transform 0.4s ease;
  }

  [data-theme="dark"] .theme-toggle-icon {
    transform: rotate(180deg);
  }

  /* Tooltip */
  .btn[title] { position: relative; }
</style>
</head>
<body>
<div class="app">
  <!-- Toolbar -->
  <div class="toolbar">
    <div class="toolbar-left">
      <div class="logo">
        <div class="logo-icon">M→</div>
        <span>Markdown → Slides</span>
      </div>
      <div class="divider-v"></div>
      <div class="slide-counter" id="slideCounter">Slide 1 of 1</div>
    </div>
    <div class="toolbar-right">
      <button class="btn" id="btnSample" title="Load sample deck" onclick="loadSample()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        Sample
      </button>
      <button class="btn btn-icon" id="btnTheme" title="Toggle theme" onclick="toggleTheme()">
        <svg class="theme-toggle-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
      <button class="btn btn-accent" id="btnPresent" title="Present fullscreen" onclick="startPresentation()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Present
      </button>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <!-- Editor -->
    <div class="editor-panel">
      <div class="panel-header">
        <span class="panel-title">Markdown</span>
        <span class="panel-title" id="wordCount" style="text-transform:none; letter-spacing:0;">0 words</span>
      </div>
      <div class="editor-wrap">
        <textarea id="editor" placeholder="Type your markdown here...&#10;&#10;Use --- on a new line to separate slides." spellcheck="false"></textarea>
      </div>
    </div>

    <!-- Preview -->
    <div class="preview-panel">
      <div class="panel-header">
        <span class="panel-title">Preview</span>
        <span class="panel-title" style="text-transform:none; letter-spacing:0; cursor:pointer;" onclick="startPresentation()" title="Click to present">⛶ Fullscreen</span>
      </div>
      <div class="preview-area">
        <div class="slide-frame" id="slideFrame">
          <div class="slide-content" id="slideContent"></div>
          <div class="slide-number-badge" id="slideBadge"></div>
        </div>
      </div>
      <div class="thumb-strip" id="thumbStrip"></div>
    </div>
  </div>
</div>

<!-- Presentation Overlay -->
<div class="presentation-overlay" id="presOverlay">
  <div class="pres-progress" id="presProgress"></div>
  <div class="slide-frame presentation-slide" id="presSlideFrame">
    <div class="slide-content" id="presSlideContent"></div>
    <div class="slide-number-badge" id="presSlideBadge"></div>
  </div>
  <div class="pres-controls">
    <button class="pres-btn" onclick="presNav(-1)" title="Previous">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <span class="pres-counter" id="presCounter">1 / 1</span>
    <button class="pres-btn" onclick="presNav(1)" title="Next">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
    <div style="width:1px;height:20px;background:rgba(255,255,255,0.15);margin:0 4px;"></div>
    <button class="pres-btn" onclick="exitPresentation()" title="Exit (Esc)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
</div>

<script>
// State
let currentSlide = 0;
let slides = [];
let presSlide = 0;
let isPresentation = false;

// Elements
const editor = document.getElementById('editor');
const slideContent = document.getElementById('slideContent');
const slideBadge = document.getElementById('slideBadge');
const slideCounter = document.getElementById('slideCounter');
const thumbStrip = document.getElementById('thumbStrip');
const wordCount = document.getElementById('wordCount');
const presOverlay = document.getElementById('presOverlay');
const presSlideContent = document.getElementById('presSlideContent');
const presSlideBadge = document.getElementById('presSlideBadge');
const presCounterEl = document.getElementById('presCounter');
const presProgress = document.getElementById('presProgress');

// Configure marked
marked.setOptions({
  breaks: true,
  gfm: true
});

// Sample deck
const sampleMarkdown = `# Q3 2026 Strategy Review
## Apex Technologies — Confidential

*Prepared by the Executive Leadership Team*
*June 2026*

---

# Agenda

- **Market Overview** — Current landscape & trends
- **Performance Review** — Q2 results & key metrics

// Parse markdown into slides
function parseSlides(md) {
  // Split by --- on its own line
  const parts = md.split(/\n---\n/);
  return parts.map(part => part.trim()).filter(p => p.length > 0);
}

// Render a slide
function renderSlide(md) {
  return marked.parse(md);
}

// Update everything
function update() {
  const md = editor.value;
  slides = parseSlides(md);

  if (slides.length === 0) {
    slideContent.innerHTML = '<p style="color:var(--slide-muted);text-align:center;font-style:italic;">Start typing to create your first slide</p>';
    slideBadge.textContent = '';
    slideCounter.textContent = 'No slides';
    thumbStrip.innerHTML = '';
    wordCount.textContent = '0 words';
    return;
  }

  // Clamp current slide
  if (currentSlide >= slides.length) currentSlide = slides.length - 1;
  if (currentSlide < 0) currentSlide = 0;

  // Render current slide
  const html = renderSlide(slides[currentSlide]);
  slideContent.innerHTML = html;
  slideContent.style.animation = 'none';
  slideContent.offsetHeight; // reflow
  slideContent.style.animation = '';

  slideBadge.textContent = `${currentSlide + 1} / ${slides.length}`;
  slideCounter.textContent = `Slide ${currentSlide + 1} of ${slides.length}`;

  // Word count
  const words = md.trim().split(/\s+/).filter(w => w.length > 0).length;
  wordCount.textContent = `${words} word${words !== 1 ? 's' : ''}`;

  // Thumbnails
  renderThumbnails();

  // Update presentation if active
  if (isPresentation) {
    updatePresentation();
  }
}

function renderThumbnails() {
  thumbStrip.innerHTML = '';
  slides.forEach((slide, i) => {
    const thumb = document.createElement('div');
    thumb.className = `thumb${i === currentSlide ? ' active' : ''}`;
    thumb.onclick = () => { currentSlide = i; update(); };

    const inner = document.createElement('div');
    inner.className = 'thumb-inner';
    inner.innerHTML = renderSlide(slide);

    const num = document.createElement('div');
    num.className = 'thumb-num';
    num.textContent = i + 1;

    thumb.appendChild(inner);
    thumb.appendChild(num);
    thumbStrip.appendChild(thumb);
  });

  // Scroll active thumb into view
  const active = thumbStrip.querySelector('.thumb.active');
  if (active) {
    active.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  }
}

// Navigation
function navigate(dir) {
  const newSlide = currentSlide + dir;
  if (newSlide >= 0 && newSlide < slides.length) {
    currentSlide = newSlide;
    update();
  }
}

// Presentation mode
function startPresentation() {
  if (slides.length === 0) return;
  isPresentation = true;
  presSlide = currentSlide;
  presOverlay.classList.add('active');
  document.body.style.overflow = 'hidden';
  updatePresentation();

  // Try fullscreen
  const el = document.documentElement;
  if (el.requestFullscreen) el.requestFullscreen().catch(() => {});
  else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
}

function exitPresentation() {
  isPresentation = false;
  presOverlay.classList.remove('active');
  document.body.style.overflow = '';
  if (document.fullscreenElement) {
    document.exitFullscreen().catch(() => {});
  }
}

function updatePresentation() {
  if (slides.length === 0) return;
  if (presSlide >= slides.length) presSlide = slides.length - 1;
  if (presSlide < 0) presSlide = 0;

  presSlideContent.innerHTML = renderSlide(slides[presSlide]);
  presSlideContent.style.animation = 'none';
  presSlideContent.offsetHeight;
  presSlideContent.style.animation = '';

  presSlideBadge.textContent = `${presSlide + 1} / ${slides.length}`;
  presCounterEl.textContent = `${presSlide + 1} / ${slides.length}`;
  presProgress.style.width = `${((presSlide + 1) / slides.length) * 100}%`;
}

function presNav(dir) {
  const newSlide = presSlide + dir;
  if (newSlide >= 0 && newSlide < slides.length) {
    presSlide = newSlide;
    updatePresentation();
  }
}

// Theme
function toggleTheme() {
  const html = document.documentElement;
  const current = html.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('md-slides-theme', next);
}

// Load sample
function loadSample() {
  editor.value = sampleMarkdown;
  currentSlide = 0;
  update();
}

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  if (isPresentation) {
    switch(e.key) {
      case 'ArrowRight':
      case 'ArrowDown':
      case ' ':
      case 'PageDown':
        e.preventDefault();
        presNav(1);
        break;
      case 'ArrowLeft':
      case 'ArrowUp':
      case 'PageUp':
        e.preventDefault();
        presNav(-1);
        break;
      case 'Escape':
        e.preventDefault();
        exitPresentation();
        break;
      case 'Home':
        e.preventDefault();
        presSlide = 0;
        updatePresentation();
        break;
      case 'End':
        e.preventDefault();
        presSlide = slides.length - 1;
        updatePresentation();
        break;
    }
  } else {
    // Only navigate slides if editor is not focused
    if (document.activeElement !== editor) {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
        e.preventDefault();
        navigate(1);
      } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
        e.preventDefault();
        navigate(-1);
      }
    }
  }
});

// Debounced update
let updateTimeout;
editor.addEventListener('input', () => {
  clearTimeout(updateTimeout);
  updateTimeout = setTimeout(update, 150);
});

// Tab key support in editor
editor.addEventListener('keydown', (e) => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const start = editor.selectionStart;
    const end = editor.selectionEnd;
    editor.value = editor.value.substring(0, start) + '  ' + editor.value.substring(end);
    editor.selectionStart = editor.selectionEnd = start + 2;
  }
});

// Init
(function init() {
  // Restore theme
  const savedTheme = localStorage.getItem('md-slides-theme');
  if (savedTheme) {
    document.documentElement.setAttribute('data-theme', savedTheme);
  }

  // Load sample
  loadSample();
})();
</script>
</body>
