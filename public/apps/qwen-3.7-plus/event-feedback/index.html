<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Event Feedback Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
        },
        colors: {
          brand: {
            50:  '#eef2ff',
            100: '#e0e7ff',
            200: '#c7d2fe',
            300: '#a5b4fc',
            400: '#818cf8',
            500: '#6366f1',
            600: '#4f46e5',
            700: '#4338ca',
            800: '#3730a3',
            900: '#312e81',
          }
        }
      }
    }
  }
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  html, body { font-family: 'Inter', system-ui, sans-serif; }
  body {
    background:
      radial-gradient(1200px 600px at -10% -20%, rgba(99,102,241,0.08), transparent 60%),
      radial-gradient(900px 500px at 110% 10%, rgba(16,185,129,0.06), transparent 60%),
      #f8fafc;
    color: #0f172a;
  }
  .glass {
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }
  .table-row { transition: background-color 120ms ease; }
  .table-row:hover { background-color: #f1f5f9; }
  .th-sortable { cursor: pointer; user-select: none; }
  .th-sortable:hover { color: #4338ca; }
  .chevron { transition: transform 200ms ease; }
  .feedback-cell {
    display: -webkit-box;
    -webkit-box-orient: vertical;
    overflow: hidden;
    line-height: 1.55;
  }
  .feedback-cell.collapsed { -webkit-line-clamp: 3; }
  .feedback-cell.expanded { -webkit-line-clamp: unset; }
  .toggle-btn { color: #4f46e5; }
  .toggle-btn:hover { text-decoration: underline; }

  /* Star rating */
  .star { color: #cbd5e1; }
  .star.filled { color: #f59e0b; }

  /* Scrollbar polish */
  .table-wrap::-webkit-scrollbar { height: 10px; width: 10px; }
  .table-wrap::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
  .table-wrap::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

  /* Summary card gradient border */
  .summary-card {
    background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
    border: 1px solid #e2e8f0;
    box-shadow: 0 1px 2px rgba(15,23,42,0.04), 0 8px 24px -12px rgba(79,70,229,0.18);
  }

  /* Close button */
  .close-btn {
    transition: background-color 120ms ease, transform 120ms ease;
  }
  .close-btn:hover { background-color: #fee2e2; color: #b91c1c; }
  .close-btn:active { transform: scale(0.95); }

  /* Fade-in for summary */
  .fade-in { animation: fadeIn 240ms ease-out; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Empty state */
  .empty-state {
    background: repeating-linear-gradient(
      45deg, #f1f5f9, #f1f5f9 10px, #f8fafc 10px, #f8fafc 20px
    );
  }
</style>
</head>
<body class="min-h-screen">

<div class="max-w-[1400px] mx-auto px-6 lg:px-10 py-8">

  <!-- Header -->
  <header class="flex items-center justify-between mb-6">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-brand-500 to-brand-700 flex items-center justify-center shadow-md shadow-brand-500/30">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
        </svg>
      </div>
      <div>
        <h1 class="text-2xl font-bold tracking-tight text-slate-900">Event Feedback Dashboard</h1>
        <p class="text-sm text-slate-500">Monitor participant sentiment across all recent events</p>
      </div>
    </div>
    <div class="hidden md:flex items-center gap-2 text-xs text-slate-500">
      <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full bg-emerald-50 text-emerald-700 border border-emerald-100">
        <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
        Live data
      </span>
      <span id="lastUpdated" class="px-2.5 py-1 rounded-full bg-slate-100 border border-slate-200"></span>
    </div>
  </header>

  <!-- AI Summary -->
  <section id="summarySection" class="summary-card rounded-2xl p-5 mb-6 fade-in">
    <div class="flex items-start justify-between gap-4">
      <div class="flex items-start gap-3 min-w-0">
        <div class="shrink-0 w-9 h-9 rounded-lg bg-gradient-to-br from-brand-500 to-purple-600 flex items-center justify-center shadow-sm">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/>
          </svg>
        </div>
        <div class="min-w-0">
          <div class="flex items-center gap-2 mb-1">
            <h2 class="text-sm font-semibold text-slate-900">AI Summary</h2>
            <span class="text-[10px] uppercase tracking-wider font-semibold px-1.5 py-0.5 rounded bg-brand-50 text-brand-700 border border-brand-100">Auto-generated</span>
          </div>
          <p id="summaryText" class="text-sm text-slate-600 leading-relaxed"></p>
          <div id="summaryStats" class="mt-3 grid grid-cols-2 sm:grid-cols-4 gap-2"></div>
        </div>
      </div>
      <button id="closeSummary" aria-label="Close summary" class="close-btn shrink-0 w-8 h-8 rounded-lg flex items-center justify-center text-slate-400 hover:text-red-600">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
  </section>

  <!-- Search / Toolbar -->
  <section class="flex flex-col md:flex-row md:items-center gap-3 mb-4">
    <div class="relative flex-1">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-slate-400 absolute left-3.5 top-1/2 -translate-y-1/2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z"/>
      </svg>
      <input id="searchInput" type="text" placeholder="Search by event, participant, or feedback keyword..."
        class="w-full pl-10 pr-4 py-2.5 rounded-xl bg-white border border-slate-200 text-sm placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-brand-500/30 focus:border-brand-500 shadow-sm"/>
    </div>
    <div class="flex items-center gap-2">
      <div id="resultCount" class="text-xs text-slate-500 px-3 py-2 rounded-lg bg-white border border-slate-200 shadow-sm whitespace-nowrap"></div>
      <button id="clearBtn" class="hidden text-xs px-3 py-2 rounded-lg bg-white border border-slate-200 text-slate-600 hover:bg-slate-50 shadow-sm">Clear</button>
    </div>
  </section>

  <!-- Table -->
  <section class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
    <div class="table-wrap overflow-auto max-h-[68vh]">
      <table class="w-full text-sm">
        <thead class="sticky top-0 z-10 bg-slate-50 border-b border-slate-200">
          <tr class="text-left text-xs font-semibold uppercase tracking-wider text-slate-500">
            <th class="th-sortable px-5 py-3" data-col="date">
              <span class="inline-flex items-center gap-1.5">Date <span class="sort-icon text-slate-300"></span></span>
            </th>
            <th class="th-sortable px-5 py-3" data-col="event">
              <span class="inline-flex items-center gap-1.5">Event <span class="sort-icon text-slate-300"></span></span>
            </th>
            <th class="th-sortable px-5 py-3" data-col="participant">
              <span class="inline-flex items-center gap-1.5">Participant <span class="sort-icon text-slate-300"></span></span>
            </th>
            <th class="th-sortable px-5 py-3" data-col="rating">
              <span class="inline-flex items-center gap-1.5">Rating <span class="sort-icon text-slate-300"></span></span>
            </th>
            <th class="th-sortable px-5 py-3" data-col="feedback">
              <span class="inline-flex items-center gap-1.5">Feedback <span class="sort-icon text-slate-300"></span></span>
            </th>
          </tr>
        </thead>
        <tbody id="tbody" class="divide-y divide-slate-100"></tbody>
      </table>
      <div id="emptyState" class="hidden empty-state py-16 text-center">
        <div class="text-slate-400 text-sm">No entries match your search.</div>
      </div>
    </div>
  </section>

  <footer class="mt-6 text-center text-xs text-slate-400">
    © 2026 Event Insights · Data refreshed automatically
  </footer>
</div>

<script>
/* ---------- Data generation ---------- */
const EVENTS = [
  "Annual Leadership Summit", "Q2 Product Launch", "Customer Success Forum",
  "Engineering All-Hands", "Sales Kickoff 2026", "Design Systems Workshop",
  "Data & Analytics Conf", "Marketing Strategy Day", "New Hire Orientation",
  "Executive Offsite", "Partner Ecosystem Meetup", "AI Innovation Symposium",
  "Customer Advisory Board", "Quarterly Business Review", "Developer Day",
  "Brand Refresh Workshop", "Investor Relations Briefing", "HR Town Hall",
  "Security & Compliance Summit", "Global Team Connect"
];

const FIRST = ["Alex","Jordan","Taylor","Morgan","Casey","Riley","Avery","Quinn","Parker","Drew",
  "Cameron","Reese","Sage","Hayden","Emerson","Finley","Rowan","Dakota","Skyler","Jamie",
  "Priya","Mateo","Aisha","Liam","Noa","Kenji","Sofia","Diego","Amara","Ethan"];
const LAST = ["Chen","Patel","Nguyen","García","Kim","Müller","Rossi","Silva","Tanaka","Okafor",
  "Bennett","Hoffman","Larsson","Kowalski","Dubois","Al-Farsi","Ito","Santos","Johansson","Reyes"];

const FEEDBACK_TEMPLATES = [
  "The keynote was genuinely inspiring and gave our team a renewed sense of purpose. I especially appreciated the segment on cross-functional collaboration — it felt practical rather than theoretical. One small suggestion: the breakout sessions ran a bit long and it would help to have clearer timeboxing. Overall, a highly valuable use of a day.",
  "Solid event with strong content, but the AV setup in the main hall was inconsistent — the microphone cut out twice during the Q&A which made it hard to follow. The catering was excellent though, and the networking lounge was well-designed. Would love to see more structured networking next time, perhaps with themed tables.",
  "I've attended several of these over the years and this one was a clear step up. The speakers were diverse in both background and expertise, which made the discussions richer. The mobile app for scheduling was a nice touch. My only critique is that the Wi-Fi struggled under load — a real issue for a tech-focused audience.",
  "Good energy throughout, but the agenda felt a bit packed. By the final session, a lot of folks had checked out. I'd recommend trimming one or two panels and giving the remaining ones more breathing room. That said, the fireside chat with the CEO was a highlight — candid, funny, and surprisingly tactical.",
  "Exceptional organization from start to finish. The venue was beautiful, the signage was clear, and the staff were genuinely helpful. Content-wise, I wish there had been more hands-on workshops rather than lecture-style talks. Participants learn best by doing, and there was a real missed opportunity there.",
  "Mixed feelings honestly. The morning sessions were fantastic — sharp, relevant, and well-delivered. The afternoon dragged a bit with some presentations that felt like thinly veiled product pitches. Please vet sponsors more carefully so their talks actually deliver value to attendees rather than just leads for the vendor.",
  "Really loved the focus on actionable takeaways this year. Every session I attended ended with a clear 'here's what you can do Monday morning' moment. The facilitators were well-prepared and handled tough audience questions gracefully. Would have appreciated slide decks shared in advance so we could annotate them live.",
  "This was my first time attending and I was blown away by how welcoming the community is. People introduced themselves, the buddy system for newcomers worked well, and I left with several useful contacts. Content was strong across the board. Definitely planning to come back next year and bring a few colleagues.",
  "The venue choice was questionable — too far from public transit and not enough parking for the number of attendees. Once inside, the experience was great, but the logistics at the start created a negative first impression. Please consider a more central location next time or provide shuttle service.",
  "Fantastic depth on the technical tracks. The session on distributed systems was one of the best I've seen at any conference — the speaker clearly runs these in production and shared real war stories. Audio quality in the smaller rooms could be better though; it was hard to hear from the back row.",
  "I appreciated the hybrid format this year. The remote experience was surprisingly smooth — good camera angles, active chat moderation, and the Q&A tool worked well. One gap: remote attendees didn't get access to the networking app, which felt like a second-class treatment. Please fix that next time.",
  "Great event but the registration process was confusing. I received three confirmation emails and the badge pickup line was extremely long. Once inside, everything ran smoothly. The lunch options were thoughtful, including genuinely good vegan choices which is rare. Speakers were top-notch, especially the closing panel.",
  "Content was strong but the pacing was off. Several sessions started 5–10 minutes late which cascaded through the day. By the end, the final speaker had to rush and we missed the planned Q&A. A dedicated timekeeper for each room would solve most of this. Still, the insights were valuable enough to forgive the hiccups.",
  "Honestly one of the best professional development experiences I've had this year. The case studies were current, the data was rigorous, and the discussions were candid. I particularly valued the 'failures and learnings' segment — so few events are brave enough to include that. Highly recommended for anyone in a leadership role.",
  "The venue was stunning and the food was excellent, but the content didn't quite match the setting. Several talks felt generic and could have been delivered at any industry event. I'd love to see more sessions tailored to our specific challenges — the ones that did hit that mark were the standout moments of the day.",
  "Loved the interactive polling throughout the sessions — it kept everyone engaged and gave speakers real-time feedback. The only downside was that some polls felt like filler rather than genuinely useful input. Trim the gimmicky ones and keep the ones that actually shape the conversation.",
  "A well-curated program with a great balance of strategic vision and tactical how-to. I took pages of notes and have already shared key insights with my team. The post-event survey was also thoughtful — you can tell the organizers actually use this feedback to improve. Kudos to the whole team.",
  "Good content, but the room layout didn't work for the session style. Round tables are great for discussion but terrible for talks — half the room had to crane their necks all day. Please match furniture to format next time. Also, more power outlets would be appreciated by the laptop-heavy crowd.",
  "This event exceeded my expectations. The facilitators were world-class, the material was fresh, and the peer discussions were surprisingly candid. I left with a concrete plan for three initiatives I'd been stuck on for months. Worth every minute and I've already recommended it to peers at other companies.",
  "The diversity of perspectives on stage was a real strength this year. It wasn't tokenism — the speakers were clearly chosen for expertise and had genuinely different viewpoints. That made the panels feel alive. One area to improve: the printed program had several errors and outdated session descriptions.",
  "Solid overall, but the price point felt high relative to what was delivered. The swag was minimal, the recorded sessions weren't included in the ticket, and lunch was just okay. For the cost, I'd expect a more premium end-to-end experience. The content itself was good enough that I'd consider returning if the value prop improves.",
  "The workshop track was the highlight for me — small groups, expert facilitators, and real work product by the end of the session. Please expand this format next year and reduce the number of pure lecture slots. Participants clearly learn more and rate the event higher when they get to apply concepts live.",
  "Loved the surprise guest speaker — what a treat. The rest of the program was also strong, though some sessions overlapped in topic which made choosing difficult. A 'theme track' label in the agenda would help attendees build a coherent personal schedule rather than jumping between unrelated talks.",
  "Great energy, great people, great venue. My one complaint is the event ran over time consistently, which meant the final networking hour got compressed. People had trains to catch and flights to make. Respect the published end time — it's a promise to attendees with real constraints.",
  "The pre-read materials were excellent and set a high baseline for the discussions. I wish more events did this. That said, the live polling tool crashed mid-session which was embarrassing for the organizers. Have a backup plan for tech failures — even a simple show-of-hands works when the tools let you down.",
  "A truly memorable event. The storytelling from the customer panel was moving and relevant. Logistics were seamless, the app worked flawlessly, and the follow-up email with resources arrived within an hour of the closing remarks. This is the standard other events should aspire to.",
  "Interesting content but the audience was way too large for the room. Standing room only for several keynotes, which is uncomfortable and unsafe. Please cap registration or choose a larger venue — quality of experience drops sharply when people can't even find a seat.",
  "The mentorship matching session was a brilliant addition. I was paired with someone whose experience directly maps to a challenge I'm facing, and we've already scheduled a follow-up call. Please keep this as a permanent feature. The rest of the program was also strong, with particularly good sessions on strategy.",
  "I came in skeptical and left impressed. The organizers clearly listened to last year's feedback — shorter talks, better food, more breaks. The one thing still missing is a dedicated quiet space for people who need to take calls or decompress between sessions. A small room with a few chairs would go a long way.",
  "Top-tier production value and a genuinely useful agenda. The live transcription and translation were game-changers for our international colleagues. If I had one ask, it would be more time between sessions — 10 minutes isn't enough to travel across a large venue, grab coffee, and prep for the next talk."
];

function rand(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function randInt(a,b){ return a + Math.floor(Math.random()*(b-a+1)); }

function genDate(){
  // dates within last ~14 months
  const now = new Date(2026, 5, 19); // June 19, 2026
  const daysBack = randInt(3, 420);
  const d = new Date(now); d.setDate(d.getDate() - daysBack);
  return d;
}

function fmtDate(d){
  return d.toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' });
}

const data = Array.from({length: 30}, (_, i) => {
  const firstName = rand(FIRST), lastName = rand(LAST);
  return {
    id: i,
    date: genDate(),
    event: rand(EVENTS),
    participant: `${firstName} ${lastName}`,
    rating: randInt(2,5),
    feedback: rand(FEEDBACK_TEMPLATES)
  };
});

/* ---------- AI Summary ---------- */
function buildSummary(){
  const avg = (data.reduce((s,r)=>s+r.rating,0)/data.length).toFixed(2);
  const five = data.filter(r=>r.rating===5).length;
  const low  = data.filter(r=>r.rating<=2).length;
  const uniqueEvents = new Set(data.map(r=>r.event)).size;
  const topEvent = Object.entries(
    data.reduce((m,r)=>{ m[r.event]=(m[r.event]||0)+1; return m; }, {})
  ).sort((a,b)=>b[1]-a[1])[0][0];

  const sentiment = avg >= 4.2 ? "overwhelmingly positive"
                  : avg >= 3.6 ? "generally positive with room for improvement"
                  : "mixed, indicating meaningful opportunities to improve";

  const summary = `Across ${data.length} feedback submissions spanning ${uniqueEvents} events, overall sentiment is ${sentiment}. Participants consistently praised speaker quality and networking opportunities, while recurring themes in constructive feedback include venue logistics, session pacing, and AV reliability. The highest-rated event cluster centers on "${topEvent}", which accounts for a notable share of five-star reviews.`;

  document.getElementById('summaryText').textContent = summary;

  const stats = [
    { label:'Avg. rating', value: `★ ${avg}`, tone:'brand' },
    { label:'5-star reviews', value: five, tone:'emerald' },
    { label:'Needs attention', value: low, tone:'amber' },
    { label:'Unique events', value: uniqueEvents, tone:'slate' },
  ];
  const tones = {
    brand:   'bg-brand-50 text-brand-700 border-brand-100',
    emerald: 'bg-emerald-50 text-emerald-700 border-emerald-100',
    amber:   'bg-amber-50 text-amber-700 border-amber-100',
    slate:   'bg-slate-50 text-slate-700 border-slate-200',
  };
  document.getElementById('summaryStats').innerHTML = stats.map(s => `
    <div class="px-3 py-2 rounded-lg border ${tones[s.tone]}">
      <div class="text-[10px] uppercase tracking-wider font-semibold opacity-70">${s.label}</div>
      <div class="text-base font-bold mt-0.5">${s.value}</div>
    </div>
  `).join('');
}
buildSummary();

/* ---------- Last updated ---------- */
document.getElementById('lastUpdated').textContent =
  'Updated ' + new Date().toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });

/* ---------- Close summary ---------- */
document.getElementById('closeSummary').addEventListener('click', () => {
  const el = document.getElementById('summarySection');
  el.style.transition = 'opacity 180ms ease, transform 180ms ease, max-height 220ms ease';
  el.style.opacity = '0';
  el.style.transform = 'translateY(-6px)';
  setTimeout(() => {
    el.style.maxHeight = el.offsetHeight + 'px';
    requestAnimationFrame(() => {
      el.style.maxHeight = '0';
      el.style.padding = '0';
      el.style.margin = '0';
      el.style.borderWidth = '0';
      el.style.overflow = 'hidden';
    });
    setTimeout(() => el.remove(), 240);
  }, 180);
});

/* ---------- Rendering ---------- */
const tbody = document.getElementById('tbody');
const searchInput = document.getElementById('searchInput');
const clearBtn = document.getElementById('clearBtn');
const resultCount = document.getElementById('resultCount');
const emptyState = document.getElementById('emptyState');

let sortState = { col: 'date', dir: 'desc' };

function stars(n){
  return Array.from({length:5}, (_,i) =>
    `<span class="star ${i<n?'filled':''}">★</span>`
  ).join('');
}

function ratingBadge(n){
  const tones = {
    5: 'bg-emerald-50 text-emerald-700 border-emerald-200',
    4: 'bg-emerald-50 text-emerald-700 border-emerald-200',
    3: 'bg-amber-50 text-amber-700 border-amber-200',
    2: 'bg-rose-50 text-rose-700 border-rose-200',
    1: 'bg-rose-50 text-rose-700 border-rose-200',
  };
  return `<span class="inline-flex items-center gap-1.5 px-2 py-0.5 rounded-md border text-xs font-semibold ${tones[n]}">
    <span class="leading-none">${stars(n)}</span>
    <span>${n}/5</span>
  </span>`;
}

function initials(name){
  return name.split(' ').map(p=>p[0]).slice(0,2).join('').toUpperCase();
}
const avatarColors = ['from-brand-500 to-purple-600','from-emerald-500 to-teal-600','from-amber-500 to-orange-600','from-rose-500 to-pink-600','from-sky-500 to-indigo-600','from-fuchsia-500 to-purple-600'];
function avatarColor(name){
  let h = 0; for (const c of name) h = (h*31 + c.charCodeAt(0)) >>> 0;
  return avatarColors[h % avatarColors.length];
}

function escapeHtml(s){
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function render(){
  const q = searchInput.value.trim().toLowerCase();
  let rows = data.filter(r => {
    if (!q) return true;
    return (
      r.event.toLowerCase().includes(q) ||
      r.participant.toLowerCase().includes(q) ||
      r.feedback.toLowerCase().includes(q) ||
      fmtDate(r.date).toLowerCase().includes(q)
    );
  });

  const { col, dir } = sortState;
  const mult = dir === 'asc' ? 1 : -1;
  rows.sort((a,b) => {
    let av = a[col], bv = b[col];
    if (col === 'date') { av = a.date.getTime(); bv = b.date.getTime(); }
    if (col === 'rating') { /* numeric */ }
    if (typeof av === 'string') { av = av.toLowerCase(); bv = bv.toLowerCase(); }
    if (av < bv) return -1 * mult;
    if (av > bv) return  1 * mult;
    return 0;
  });

  // Update sort icons
  document.querySelectorAll('.th-sortable').forEach(th => {
    const icon = th.querySelector('.sort-icon');
    const c = th.dataset.col;
    if (c === sortState.col) {
      icon.innerHTML = sortState.dir === 'asc'
        ? '<svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 15l7-7 7 7"/></svg>'
        : '<svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>';
      icon.className = 'sort-icon text-brand-600 inline-flex';
      th.querySelector('span').classList.add('text-brand-700');
      th.querySelector('span').classList.remove('text-slate-500');
    } else {
      icon.innerHTML = '<svg class="w-3 h-3 opacity-50" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 9l4-4 4 4M8 15l4 4 4-4"/></svg>';
      icon.className = 'sort-icon text-slate-300 inline-flex';
      th.querySelector('span').classList.remove('text-brand-700');
      th.querySelector('span').classList.add('text-slate-500');
    }
  });

  if (rows.length === 0) {
    tbody.innerHTML = '';
    emptyState.classList.remove('hidden');
  } else {
    emptyState.classList.add('hidden');
    tbody.innerHTML = rows.map((r, idx) => {
      const rowId = `fb-${r.id}`;
      return `
      <tr class="table-row align-top" data-row-id="${r.id}">
        <td class="px-5 py-4 whitespace-nowrap text-slate-600 text-xs font-medium">${fmtDate(r.date)}</td>
        <td class="px-5 py-4">
          <div class="font-semibold text-slate-900">${escapeHtml(r.event)}</div>
        </td>
        <td class="px-5 py-4">
          <div class="flex items-center gap-2.5">
            <div class="w-8 h-8 rounded-full bg-gradient-to-br ${avatarColor(r.participant)} flex items-center justify-center text-white text-[11px] font-bold shadow-sm">${initials(r.participant)}</div>
            <span class="text-slate-800 font-medium">${escapeHtml(r.participant)}</span>
          </div>
        </td>
        <td class="px-5 py-4">${ratingBadge(r.rating)}</td>
        <td class="px-5 py-4 max-w-[560px]">
          <div id="${rowId}" class="feedback-cell collapsed text-slate-600 leading-relaxed">${escapeHtml(r.feedback)}</div>
          <button class="toggle-btn text-xs font-medium mt-1" data-target="${rowId}">Show more</button>
        </td>
      </tr>`;
    }).join('');

    // Attach toggle handlers
    tbody.querySelectorAll('.toggle-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const target = document.getElementById(btn.dataset.target);
        const collapsed = target.classList.toggle('collapsed');
        target.classList.toggle('expanded', !collapsed);
        btn.textContent = collapsed ? 'Show more' : 'Show less';
      });
    });
  }

  // Result count + clear button
  resultCount.textContent = `${rows.length} of ${data.length} entries`;
  if (q) {
    clearBtn.classList.remove('hidden');
  } else {
    clearBtn.classList.add('hidden');
  }
}

/* ---------- Sort handlers ---------- */
document.querySelectorAll('.th-sortable').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (sortState.col === col) {
      sortState.dir = sortState.dir === 'asc' ? 'desc' : 'asc';
    } else {
      sortState.col = col;
      sortState.dir = col === 'date' || col === 'rating' ? 'desc' : 'asc';
    }
    render();
  });
});

/* ---------- Search ---------- */
searchInput.addEventListener('input', render);
clearBtn.addEventListener('click', () => { searchInput.value = ''; render(); searchInput.focus(); });

/* ---------- Initial render ---------- */
render();
</script>
</body>
</html>
