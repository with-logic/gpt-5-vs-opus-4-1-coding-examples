<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎮 Fun Game - Jump & Survive!</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
}
#gameWrapper {
  position: relative;
  width: 800px;
  max-width: 100vw;
  aspect-ratio: 800/450;
  max-height: 100vh;
}
canvas {
  width: 100%;
  height: 100%;
  display: block;
  border-radius: 12px;
  box-shadow: 0 0 40px rgba(255, 100, 200, 0.3), 0 0 80px rgba(100, 200, 255, 0.2);
}
#ui-overlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  border-radius: 12px;
  overflow: hidden;
}
#score-display {
  position: absolute;
  top: 15px; right: 20px;
  color: white;
  font-size: 20px;
  font-weight: 800;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
  text-align: right;
}
#score-display .score-val {
  font-size: 32px;
  background: linear-gradient(135deg, #FFD700, #FFA500);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
#score-display .high-score {
  font-size: 14px;
  color: #aaa;
}
#speed-display {
  position: absolute;
  top: 15px; left: 20px;
  color: #0ff;
  font-size: 14px;
  font-weight: 700;
  text-shadow: 0 0 10px #0ff;
}
#start-screen, #gameover-screen {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(5px);
  pointer-events: auto;
  border-radius: 12px;
  transition: opacity 0.3s;
}
#start-screen h1 {
  font-size: 52px;
  background: linear-gradient(135deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff, #ff6b9d);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: none;
  margin-bottom: 10px;
  animation: titleBounce 2s ease-in-out infinite;
}
@keyframes titleBounce {
  0%, 100% { transform: translateY(0) scale(1); }
  50% { transform: translateY(-10px) scale(1.05); }
}
#start-screen .subtitle {
  color: #ccc;
  font-size: 18px;
  margin-bottom: 30px;
}
.btn {
  padding: 15px 50px;
  font-size: 22px;
  font-weight: 800;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
  letter-spacing: 2px;
  pointer-events: auto;
}
.btn-play {
  background: linear-gradient(135deg, #6bcb77, #4d96ff);
  color: white;
  box-shadow: 0 5px 20px rgba(107, 203, 119, 0.4);
}
.btn-play:hover {
  transform: translateY(-3px) scale(1.05);
  box-shadow: 0 8px 30px rgba(107, 203, 119, 0.6);
}
.btn-retry {
  background: linear-gradient(135deg, #ff6b6b, #ffd93d);
  color: white;
  box-shadow: 0 5px 20px rgba(255, 107, 107, 0.4);
}
.btn-retry:hover {
  transform: translateY(-3px) scale(1.05);
  box-shadow: 0 8px 30px rgba(255, 107, 107, 0.6);
}
.btn:active { transform: translateY(0) scale(0.98); }
#gameover-screen h2 {
  font-size: 48px;
  color: #ff6b6b;
  margin-bottom: 5px;
  text-shadow: 0 0 20px rgba(255,107,107,0.5);
}
#gameover-screen .final-score {
  font-size: 28px;
  color: #ffd93d;
  margin-bottom: 5px;
}
#gameover-screen .new-high {
  font-size: 20px;
  color: #6bcb77;
  margin-bottom: 20px;
  animation: pulse 0.5s ease-in-out infinite alternate;
}
@keyframes pulse { from { opacity: 0.7; transform: scale(1); } to { opacity: 1; transform: scale(1.1); } }
#gameover-screen .stats {
  color: #aaa;
  font-size: 14px;
  margin-bottom: 25px;
}
.controls-hint {
  color: #888;
  font-size: 14px;
  margin-top: 20px;
}
.controls-hint kbd {
  background: rgba(255,255,255,0.15);
  padding: 3px 10px;
  border-radius: 5px;
  border: 1px solid rgba(255,255,255,0.2);
  font-family: inherit;
  color: #ddd;
}
#combo-display {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 40px;
  font-weight: 900;
  color: #ffd93d;
  text-shadow: 0 0 20px rgba(255,217,61,0.8);
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
.hidden { display: none !important; }
</style>
</head>
<body>
<div id="gameWrapper">
  <canvas id="gameCanvas" width="800" height="450"></canvas>
  <div id="ui-overlay">
    <div id="score-display">
      <div class="score-val" id="scoreVal">0</div>
      <div class="high-score" id="highScoreText">Best: 0</div>
    </div>
    <div id="speed-display">⚡ 1.0x</div>
    <div id="combo-display"></div>

    <div id="start-screen">
      <h1>🎮 Fun Game</h1>
      <div class="subtitle">Jump over obstacles to survive!</div>
      <button class="btn btn-play" id="btnPlay">▶ PLAY</button>
      <div class="controls-hint">
        <kbd>SPACE</kbd> / <kbd>↑</kbd> / <kbd>CLICK</kbd> / <kbd>TAP</kbd> to jump<br>
        <small>Double jump available!</small>
      </div>
    </div>

    <div id="gameover-screen" class="hidden">
      <h2>💥 Game Over!</h2>
      <div class="final-score" id="finalScore">Score: 0</div>
      <div class="new-high hidden" id="newHighLabel">🎉 NEW HIGH SCORE! 🎉</div>
      <div class="stats" id="statsText"></div>
      <button class="btn btn-retry" id="btnRetry">🔄 RETRY</button>
      <div class="controls-hint"><kbd>SPACE</kbd> / <kbd>ENTER</kbd> to retry</div>
    </div>
  </div>
</div>

<script>
// ===== AUDIO ENGINE (Web Audio API) =====
class SoundEngine {
  constructor() {
    this.ctx = null;
    this.initialized = false;
    this.muted = false;
  }
  init() {
    if (this.initialized) return;
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      this.initialized = true;
    } catch(e) { console.warn('No audio support'); }
  }
  playTone(freq, duration, type = 'square', volume = 0.15, slide = 0) {
    if (!this.ctx || this.muted) return;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
    if (slide) osc.frequency.linearRampToValueAtTime(freq + slide, this.ctx.currentTime + duration);
    gain.gain.setValueAtTime(volume, this.ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
    osc.connect(gain);
    gain.connect(this.ctx.destination);
    osc.start();
    osc.stop(this.ctx.currentTime + duration);
  }
  jump() {
    this.playTone(300, 0.15, 'square', 0.12, 400);
    setTimeout(() => this.playTone(600, 0.1, 'sine', 0.08, 200), 50);
  }
  doubleJump() {
    this.playTone(500, 0.1, 'square', 0.1, 300);
    setTimeout(() => this.playTone(800, 0.15, 'sine', 0.1, 400), 60);
    setTimeout(() => this.playTone(1000, 0.1, 'sine', 0.06, 200), 120);
  }
  land() {
    this.playTone(150, 0.08, 'triangle', 0.1, -50);
  }
  score() {
    this.playTone(523, 0.1, 'square', 0.08);
    setTimeout(() => this.playTone(659, 0.1, 'square', 0.08), 80);
    setTimeout(() => this.playTone(784, 0.15, 'square', 0.1), 160);
  }
  milestone() {
    const notes = [523, 659, 784, 1047];
    notes.forEach((n, i) => {
      setTimeout(() => this.playTone(n, 0.2, 'square', 0.1), i * 100);
    });
  }
  gameOver() {
    const notes = [400, 350, 300, 200];
    notes.forEach((n, i) => {
      setTimeout(() => this.playTone(n, 0.3, 'sawtooth', 0.1, -50), i * 200);
    });
    setTimeout(() => this.playTone(100, 0.8, 'sawtooth', 0.08), 800);
  }
  nearMiss() {
    this.playTone(800, 0.05, 'sine', 0.06);
    setTimeout(() => this.playTone(1000, 0.05, 'sine', 0.06), 40);
  }
  whoosh() {
    if (!this.ctx || this.muted) return;
    const bufferSize = this.ctx.sampleRate * 0.15;
    const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize) * 0.3;
    }
    const source = this.ctx.createBufferSource();
    source.buffer = buffer;
    const filter = this.ctx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 2000;
    filter.Q.value = 2;
    const gain = this.ctx.createGain();
    gain.gain.setValueAtTime(0.08, this.ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.15);
    source.connect(filter);
    filter.connect(gain);
    gain.connect(this.ctx.destination);
    source.start();
  }
}

const sound = new SoundEngine();

// ===== GAME ENGINE =====
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = 800, H = 450;

// Game state
let state = 'start'; // start, playing, gameover
let score = 0;
let highScore = parseInt(localStorage.getItem('funGameHighScore') || '0');
let speed = 4;
let baseSpeed = 4;
let maxSpeed = 14;
let speedMultiplier = 1;
let frameCount = 0;
let groundY = H - 70;
let lastObstacleTime = 0;
let obstacleInterval = 90;
let nearMissCount = 0;
let totalJumps = 0;
let gameStartTime = 0;

// Player
let player = {
  x: 120, y: groundY, w: 40, h: 50,
  vy: 0, jumping: false, jumpCount: 0, maxJumps: 2,
  squash: 1, stretch: 1,
  rotation: 0, eyeBlink: 0, blinkTimer: 0,
  hatBounce: 0, trail: [],
  color: '#ff6b6b', faceColor: '#ffd93d'
};

// Arrays
let obstacles = [];
let particles = [];
let bgElements = { clouds: [], mountains: [], hills: [], trees: [], stars: [], groundDetails: [] };
let floatingTexts = [];

// Parallax layers
let scrollX = 0;

// ===== INITIALIZE BACKGROUND =====
function initBackground() {
  bgElements.stars = [];
  for (let i = 0; i < 60; i++) {
    bgElements.stars.push({
      x: Math.random() * W,
      y: Math.random() * (H * 0.4),
      size: Math.random() * 2 + 0.5,
      twinkle: Math.random() * Math.PI * 2,
      speed: Math.random() * 0.02 + 0.01
    });
  }
  bgElements.clouds = [];
  for (let i = 0; i < 8; i++) {
    bgElements.clouds.push({
      x: Math.random() * W * 2,
      y: 30 + Math.random() * 100,
      w: 60 + Math.random() * 100,
      h: 25 + Math.random() * 30,
      speed: 0.2 + Math.random() * 0.3,
      opacity: 0.3 + Math.random() * 0.4
    });
  }
  bgElements.mountains = [];
  for (let i = 0; i < 12; i++) {
    bgElements.mountains.push({
      x: i * 150 - 200,
      h: 80 + Math.random() * 120,
      w: 120 + Math.random() * 100,
      color: `hsl(${260 + Math.random() * 40}, ${30 + Math.random() * 20}%, ${25 + Math.random() * 15}%)`
    });
  }
  bgElements.hills = [];
  for (let i = 0; i < 15; i++) {
    bgElements.hills.push({
      x: i * 120 - 200,
      h: 40 + Math.random() * 60,
      w: 100 + Math.random() * 80,
      color: `hsl(${140 + Math.random() * 40}, ${40 + Math.random() * 20}%, ${30 + Math.random() * 15}%)`
    });
  }
  bgElements.trees = [];
  for (let i = 0; i < 20; i++) {
    bgElements.trees.push({
      x: i * 100 + Math.random() * 50,
      h: 30 + Math.random() * 50,
      type: Math.floor(Math.random() * 3),
      color: `hsl(${100 + Math.random() * 60}, ${50 + Math.random() * 30}%, ${35 + Math.random() * 20}%)`
    });
  }
  bgElements.groundDetails = [];
  for (let i = 0; i < 40; i++) {
    bgElements.groundDetails.push({
      x: Math.random() * W * 2,
      type: Math.floor(Math.random() * 3),
      size: 3 + Math.random() * 8
    });
  }
}

// ===== DRAWING FUNCTIONS =====
function drawSky() {
  const timeOfDay = Math.min(frameCount / 3000, 1);
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  // Transition from sunset to night
  const r1 = Math.floor(25 + timeOfDay * 10);
  const g1 = Math.floor(25 + timeOfDay * 5);
  const b1 = Math.floor(80 - timeOfDay * 30);
  const r2 = Math.floor(60 - timeOfDay * 30);
  const g2 = Math.floor(30 - timeOfDay * 10);
  const b2 = Math.floor(100 - timeOfDay * 30);
  grad.addColorStop(0, `rgb(${r1},${g1},${b1})`);
  grad.addColorStop(0.5, `rgb(${r2},${g2},${b2})`);
  grad.addColorStop(1, `rgb(${40 - timeOfDay * 20},${20},${60 - timeOfDay * 20})`);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

function drawStars() {
  bgElements.stars.forEach(s => {
    s.twinkle += s.speed;
    const alpha = 0.3 + Math.sin(s.twinkle) * 0.3 + 0.3;
    ctx.fillStyle = `rgba(255, 255, 220, ${alpha})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fill();
  });
}

function drawClouds() {
  bgElements.clouds.forEach(c => {
    c.x -= c.speed * speedMultiplier * 0.3;
    if (c.x + c.w < -50) c.x = W + 50 + Math.random() * 100;
    ctx.fillStyle = `rgba(200, 210, 255, ${c.opacity * 0.3})`;
    // Draw fluffy cloud
    const cx = c.x + c.w / 2, cy = c.y;
    ctx.beginPath();
    ctx.ellipse(cx, cy, c.w / 2, c.h / 2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cx - c.w * 0.25, cy + 5, c.w * 0.3, c.h * 0.4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cx + c.w * 0.25, cy + 3, c.w * 0.35, c.h * 0.45, 0, 0, Math.PI * 2);
    ctx.fill();
  });
}

function drawMountains() {
  bgElements.mountains.forEach(m => {
    const px = ((m.x - scrollX * 0.1) % (W + 400)) - 200;
    ctx.fillStyle = m.color;
    ctx.beginPath();
    ctx.moveTo(px - m.w / 2, groundY + 10);
    ctx.lineTo(px, groundY - m.h);
    ctx.lineTo(px + m.w / 2, groundY + 10);
    ctx.closePath();
    ctx.fill();
    // Snow cap
    ctx.fillStyle = 'rgba(220, 230, 255, 0.4)';
    ctx.beginPath();
    ctx.moveTo(px - m.w * 0.1, groundY - m.h + m.h * 0.2);
    ctx.lineTo(px, groundY - m.h);
    ctx.lineTo(px + m.w * 0.1, groundY - m.h + m.h * 0.2);
    ctx.closePath();
    ctx.fill();
  });
}

function drawHills() {
  bgElements.hills.forEach(h => {
    const px = ((h.x - scrollX * 0.3) % (W + 300)) - 150;
    ctx.fillStyle = h.color;
    ctx.beginPath();
    ctx.ellipse(px, groundY + 10, h.w / 2, h.h, 0, Math.PI, 0);
    ctx.fill();
  });
}

function drawTrees() {
  bgElements.trees.forEach(t => {
    const px = ((t.x - scrollX * 0.5) % (W + 200)) - 100;
    const baseY = groundY + 5;
    // Trunk
    ctx.fillStyle = '#5a3825';
    ctx.fillRect(px - 3, baseY - t.h * 0.4, 6, t.h * 0.4);
    // Foliage
    ctx.fillStyle = t.color;
    if (t.type === 0) {
      // Round tree
      ctx.beginPath();
      ctx.arc(px, baseY - t.h * 0.5, t.h * 0.35, 0, Math.PI * 2);
      ctx.fill();
    } else if (t.type === 1) {
      // Triangle tree
      ctx.beginPath();
      ctx.moveTo(px, baseY - t.h);
      ctx.lineTo(px - t.h * 0.3, baseY - t.h * 0.3);
      ctx.lineTo(px + t.h * 0.3, baseY - t.h * 0.3);
      ctx.closePath();
      ctx.fill();
    } else {
      // Bush
      ctx.beginPath();
      ctx.ellipse(px, baseY - t.h * 0.3, t.h * 0.4, t.h * 0.3, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  });
}

function drawGround() {
  // Main ground
  const groundGrad = ctx.createLinearGradient(0, groundY, 0, H);
  groundGrad.addColorStop(0, '#4a7c3f');
  groundGrad.addColorStop(0.15, '#3d6b34');
  groundGrad.addColorStop(0.5, '#5c4033');
  groundGrad.addColorStop(1, '#3d2b1f');
  ctx.fillStyle = groundGrad;
  ctx.fillRect(0, groundY, W, H - groundY);

  // Grass tufts
  ctx.strokeStyle = '#5cb85c';
  ctx.lineWidth = 2;
  bgElements.groundDetails.forEach(g => {
    const px = ((g.x - scrollX * 0.8) % (W + 100)) - 50;
    if (g.type === 0) {
      // Grass blade
      for (let i = -1; i <= 1; i++) {
        ctx.beginPath();
        ctx.moveTo(px + i * 3, groundY);
        ctx.quadraticCurveTo(px + i * 5, groundY - g.size, px + i * 7, groundY - g.size * 1.2);
        ctx.stroke();
      }
    } else if (g.type === 1) {
      // Small flower
      ctx.fillStyle = `hsl(${(px * 3) % 360}, 80%, 65%)`;
      ctx.beginPath();
      ctx.arc(px, groundY - 3, 2.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#4a7c3f';
      ctx.beginPath();
      ctx.moveTo(px, groundY);
      ctx.lineTo(px, groundY - 2);
      ctx.stroke();
      ctx.strokeStyle = '#5cb85c';
    } else {
      // Small rock
      ctx.fillStyle = '#888';
      ctx.beginPath();
      ctx.ellipse(px, groundY + 2, g.size * 0.5, g.size * 0.3, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  });

  // Ground line
  ctx.strokeStyle = '#5cb85c';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(0, groundY);
  ctx.lineTo(W, groundY);
  ctx.stroke();
}

// ===== PLAYER DRAWING =====
function drawPlayer() {
  const p = player;
  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.rotate(p.rotation);
  ctx.scale(p.squash, p.stretch);

  // Trail effect
  p.trail.forEach((t, i) => {
    const alpha = t.life;
    ctx.fillStyle = `rgba(255, 107, 107, ${alpha * 0.3})`;
    ctx.beginPath();
    ctx.arc(t.x - p.x, t.y - p.y, 8 * alpha, 0, Math.PI * 2);
    ctx.fill();
  });

  // Shadow
  if (p.y < groundY) {
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    const shadowScale = 1 - (groundY - p.y) / 300;
    ctx.beginPath();
    ctx.ellipse(0, groundY - p.y + 5, 20 * Math.max(shadowScale, 0.3), 5 * Math.max(shadowScale, 0.3), 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // Body - cute round character
  const bodyGrad = ctx.createRadialGradient(-5, -10, 5, 0, 0, 25);
  bodyGrad.addColorStop(0, '#ff8a8a');
  bodyGrad.addColorStop(0.7, p.color);
  bodyGrad.addColorStop(1, '#cc4444');
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.ellipse(0, -15, 20, 25, 0, 0, Math.PI * 2);
  ctx.fill();

  // Belly
  ctx.fillStyle = '#ffccaa';
  ctx.beginPath();
  ctx.ellipse(0, -8, 12, 14, 0, 0, Math.PI * 2);
  ctx.fill();

  // Eyes
  const eyeY = -22;
  p.blinkTimer++;
  if (p.blinkTimer > 120) {
    p.eyeBlink = 1;
    if (p.blinkTimer > 125) { p.eyeBlink = 0; p.blinkTimer = 0; }
  }

  // Left eye
  ctx.fillStyle = 'white';
  ctx.beginPath();
  ctx.ellipse(-8, eyeY, 7, p.eyeBlink ? 1 : 8, 0, 0, Math.PI * 2);
  ctx.fill();
  if (!p.eyeBlink) {
    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.arc(-6, eyeY + 1, 3.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'white';
    ctx.beginPath();
    ctx.arc(-5, eyeY - 1, 1.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // Right eye
  ctx.fillStyle = 'white';
  ctx.beginPath();
  ctx.ellipse(8, eyeY, 7, p.eyeBlink ? 1 : 8, 0, 0, Math.PI * 2);
  ctx.fill();
  if (!p.eyeBlink) {
    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.arc(10, eyeY + 1, 3.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'white';
    ctx.beginPath();
    ctx.arc(11, eyeY - 1, 1.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // Mouth
  ctx.strokeStyle = '#cc4444';
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  if (state === 'gameover') {
    // Sad mouth
    ctx.beginPath();
    ctx.arc(0, -2, 6, Math.PI * 1.2, Math.PI * 1.8);
    ctx.stroke();
  } else if (p.jumping) {
    // Excited mouth
    ctx.fillStyle = '#cc4444';
    ctx.beginPath();
    ctx.ellipse(1, -8, 5, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ff8888';
    ctx.beginPath();
    ctx.ellipse(1, -7, 3, 2, 0, 0, Math.PI);
    ctx.fill();
  } else {
    // Happy smile
    ctx.beginPath();
    ctx.arc(0, -12, 7, 0.1, Math.PI - 0.1);
    ctx.stroke();
  }

  // Cheeks (blush)
  ctx.fillStyle = 'rgba(255, 150, 150, 0.5)';
  ctx.beginPath();
  ctx.ellipse(-14, -14, 5, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(14, -14, 5, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  // Little hat
  const hatY = -40 + Math.sin(p.hatBounce) * 2;
  ctx.fillStyle = '#4d96ff';
  ctx.beginPath();
  ctx.ellipse(0, hatY + 5, 14, 4, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#3a7bd5';
  ctx.fillRect(-8, hatY - 8, 16, 13);
  ctx.fillStyle = '#ffd93d';
  ctx.fillRect(-9, hatY + 2, 18, 3);

  // Little feet
  const footBounce = p.jumping ? 0 : Math.sin(frameCount * 0.3) * 3;
  ctx.fillStyle = '#cc4444';
  ctx.beginPath();
  ctx.ellipse(-8, 8 + footBounce, 6, 4, -0.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(8, 8 - footBounce, 6, 4, 0.2, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

// ===== OBSTACLES =====
function createObstacle() {
  const types = ['cactus', 'rock', 'bird', 'spike', 'mushroom'];
  const weights = [3, 2, 2, 2, 2];
  const totalWeight = weights.reduce((a, b) => a + b, 0);
  let r = Math.random() * totalWeight;
  let type = types[0];
  for (let i = 0; i < weights.length; i++) {
    r -= weights[i];
    if (r <= 0) { type = types[i]; break; }
  }

  let ob = { x: W + 50, type, passed: false, nearMiss: false };

  switch(type) {
    case 'cactus':
      ob.w = 20 + Math.random() * 15;
      ob.h = 40 + Math.random() * 30;
      ob.y = groundY - ob.h;
      ob.color = `hsl(${120 + Math.random() * 30}, 60%, ${35 + Math.random() * 15}%)`;
      break;
    case 'rock':
      ob.w = 30 + Math.random() * 20;
      ob.h = 25 + Math.random() * 15;
      ob.y = groundY - ob.h;
      ob.color = `hsl(0, 0%, ${40 + Math.random() * 20}%)`;
      break;
    case 'bird':
      ob.w = 35;
      ob.h = 25;
      ob.y = groundY - 60 - Math.random() * 60;
      ob.wingPhase = Math.random() * Math.PI * 2;
      ob.color = `hsl(${280 + Math.random() * 60}, 70%, 55%)`;
      break;
    case 'spike':
      ob.w = 25 + Math.random() * 15;
      ob.h = 35 + Math.random() * 20;
      ob.y = groundY - ob.h;
      ob.color = '#ff4444';
      break;
    case 'mushroom':
      ob.w = 25 + Math.random() * 10;
      ob.h = 35 + Math.random() * 15;
      ob.y = groundY - ob.h;
      ob.color = `hsl(${Math.random() * 30}, 80%, 50%)`;
      break;
  }
  return ob;
}

function drawObstacle(ob) {
  ctx.save();
  ctx.translate(ob.x, ob.y);

  switch(ob.type) {
    case 'cactus':
      // Main body
      ctx.fillStyle = ob.color;
      const cw = ob.w * 0.4;
      ctx.beginPath();
      ctx.roundRect(-cw/2, 0, cw, ob.h, [5, 5, 0, 0]);
      ctx.fill();
      // Arms
      ctx.fillStyle = ob.color;
      ctx.beginPath();
      ctx.roundRect(-ob.w/2, ob.h * 0.3, ob.w * 0.3, ob.h * 0.15, 5);
      ctx.fill();
      ctx.fillRect(-ob.w/2, ob.h * 0.15, ob.w * 0.15, ob.h * 0.2);
      ctx.beginPath();
      ctx.roundRect(ob.w * 0.2 - cw/2 + 5, ob.h * 0.45, ob.w * 0.3, ob.h * 0.12, 5);
      ctx.fill();
      ctx.fillRect(ob.w * 0.35, ob.h * 0.3, ob.w * 0.15, ob.h * 0.2);
      // Spines
      ctx.strokeStyle = '#aaff44';
      ctx.lineWidth = 1;
      for (let i = 0; i < 5; i++) {
        const sx = -cw/2 + Math.random() * cw;
        const sy = Math.random() * ob.h;
        ctx.beginPath();
        ctx.moveTo(sx, sy);
        ctx.lineTo(sx + (Math.random() - 0.5) * 8, sy - 5);
        ctx.stroke();
      }
      // Face
      ctx.fillStyle = '#333';
      ctx.beginPath();
      ctx.arc(-3, ob.h * 0.25, 2, 0, Math.PI * 2);
      ctx.arc(5, ob.h * 0.25, 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#333';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(1, ob.h * 0.32, 3, 0, Math.PI);
      ctx.stroke();
      break;

    case 'rock':
      ctx.fillStyle = ob.color;
      ctx.beginPath();
      ctx.moveTo(0, ob.h);
      ctx.lineTo(-ob.w * 0.1, ob.h * 0.3);
      ctx.lineTo(ob.w * 0.2, 0);
      ctx.lineTo(ob.w * 0.6, ob.h * 0.1);
      ctx.lineTo(ob.w, ob.h * 0.4);
      ctx.lineTo(ob.w * 0.9, ob.h);
      ctx.closePath();
      ctx.fill();
      // Highlight
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.beginPath();
      ctx.moveTo(ob.w * 0.2, 0);
      ctx.lineTo(ob.w * 0.6, ob.h * 0.1);
      ctx.lineTo(ob.w * 0.4, ob.h * 0.4);
      ctx.lineTo(ob.w * 0.1, ob.h * 0.3);
      ctx.closePath();
      ctx.fill();
      // Face
      ctx.fillStyle = '#333';
      ctx.beginPath();
      ctx.arc(ob.w * 0.35, ob.h * 0.45, 2.5, 0, Math.PI * 2);
      ctx.arc(ob.w * 0.6, ob.h * 0.42, 2.5, 0, Math.PI * 2);
      ctx.fill();
      // Angry eyebrows
      ctx.strokeStyle = '#333';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(ob.w * 0.25, ob.h * 0.35);
      ctx.lineTo(ob.w * 0.4, ob.h * 0.38);
      ctx.moveTo(ob.w * 0.7, ob.h * 0.33);
      ctx.lineTo(ob.w * 0.55, ob.h * 0.37);
      ctx.stroke();
      break;

    case 'bird':
      ob.wingPhase += 0.15;
      const wingY = Math.sin(ob.wingPhase) * 10;
      // Body
      ctx.fillStyle = ob.color;
      ctx.beginPath();
      ctx.ellipse(ob.w/2, ob.h/2, ob.w/2, ob.h/3, 0, 0, Math.PI * 2);
      ctx.fill();
      // Wings
      ctx.fillStyle = ob.color;
      ctx.beginPath();
      ctx.moveTo(ob.w * 0.3, ob.h * 0.3);
      ctx.quadraticCurveTo(ob.w * 0.5, -wingY, ob.w * 0.7, ob.h * 0.3);
      ctx.fill();
      // Eye
      ctx.fillStyle = 'white';
      ctx.beginPath();
      ctx.arc(ob.w * 0.7, ob.h * 0.35, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#333';
      ctx.beginPath();
      ctx.arc(ob.w * 0.73, ob.h * 0.37, 2.5, 0, Math.PI * 2);
      ctx.fill();
      // Beak
      ctx.fillStyle = '#ffa500';
      ctx.beginPath();
      ctx.moveTo(ob.w, ob.h * 0.4);
      ctx.lineTo(ob.w + 10, ob.h * 0.5);
      ctx.lineTo(ob.w, ob.h * 0.6);
      ctx.closePath();
      ctx.fill();
      break;

    case 'spike':
      const spikes = 3;
      const sw = ob.w / spikes;
      for (let i = 0; i < spikes; i++) {
        const grad = ctx.createLinearGradient(i * sw, ob.h, i * sw + sw/2, 0);
        grad.addColorStop(0, '#cc0000');
        grad.addColorStop(1, '#ff4444');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.moveTo(i * sw, ob.h);
        ctx.lineTo(i * sw + sw/2, 0);
        ctx.lineTo((i + 1) * sw, ob.h);
        ctx.closePath();
        ctx.fill();
        // Shine
        ctx.fillStyle = 'rgba(255,255,255,0.2)';
        ctx.beginPath();
        ctx.moveTo(i * sw + sw * 0.3, ob.h * 0.5);
        ctx.lineTo(i * sw + sw/2, 0);
        ctx.lineTo(i * sw + sw * 0.5, ob.h * 0.5);
        ctx.closePath();
        ctx.fill();
      }
      // Base
      ctx.fillStyle = '#880000';
      ctx.fillRect(-2, ob.h - 5, ob.w + 4, 5);
      break;

    case 'mushroom':
      // Stem
      ctx.fillStyle = '#f5deb3';
      ctx.fillRect(ob.w * 0.3, ob.h * 0.4, ob.w * 0.4, ob.h * 0.6);
      // Cap
      ctx.fillStyle = ob.color;
      ctx.beginPath();
      ctx.ellipse(ob.w/2, ob.h * 0.4, ob.w/2, ob.h * 0.4, 0, Math.PI, 0);
      ctx.fill();
      // Spots
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.beginPath();
      ctx.arc(ob.w * 0.3, ob.h * 0.2, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(ob.w * 0.65, ob.h * 0.15, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(ob.w * 0.5, ob.h * 0.08, 2.5, 0, Math.PI * 2);
      ctx.fill();
      // Face on stem
      ctx.fillStyle = '#333';
      ctx.beginPath();
      ctx.arc(ob.w * 0.4, ob.h * 0.6, 2, 0, Math.PI * 2);
      ctx.arc(ob.w * 0.6, ob.h * 0.6, 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(ob.w * 0.5, ob.h * 0.68, 3, 0, Math.PI);
      ctx.stroke();
      break;
  }

  ctx.restore();
}

// ===== PARTICLES =====
function spawnParticles(x, y, count, color, spread = 5, life = 1) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * spread,
      vy: (Math.random() - 1) * spread,
      life: life,
      maxLife: life,
      size: 2 + Math.random() * 4,
      color: color || `hsl(${Math.random() * 360}, 80%, 60%)`,
      gravity: 0.1
    });
  }
}

function spawnJumpParticles() {
  spawnParticles(player.x, player.y, 8, null, 4, 0.8);
  // Dust cloud
  for (let i = 0; i < 5; i++) {
    particles.push({
      x: player.x + (Math.random() - 0.5) * 20,
      y: groundY,
      vx: (Math.random() - 0.5) * 3,
      vy: -Math.random() * 2,
      life: 0.6,
      maxLife: 0.6,
      size: 5 + Math.random() * 8,
      color: 'rgba(200, 180, 150, 0.5)',
      gravity: -0.02,
      isDust: true
    });
  }
}

function spawnLandParticles() {
  spawnParticles(player.x, groundY, 12, null, 6, 0.6);
  for (let i = 0; i < 8; i++) {
    particles.push({
      x: player.x + (Math.random() - 0.5) * 30,
      y: groundY,
      vx: (Math.random() - 0.5) * 5,
      vy: -Math.random() * 3,
      life: 0.5,
      maxLife: 0.5,
      size: 4 + Math.random() * 6,
      color: 'rgba(180, 160, 130, 0.6)',
      gravity: 0.05,
      isDust: true
    });
  }
}

function spawnDeathParticles() {
  for (let i = 0; i < 30; i++) {
    const angle = (i / 30) * Math.PI * 2;
    particles.push({
      x: player.x, y: player.y - 15,
      vx: Math.cos(angle) * (3 + Math.random() * 5),
      vy: Math.sin(angle) * (3 + Math.random() * 5),
      life: 1.5,
      maxLife: 1.5,
      size: 3 + Math.random() * 6,
      color: `hsl(${Math.random() * 60}, 90%, 60%)`,
      gravity: 0.08
    });
  }
  // Stars
  for (let i = 0; i < 8; i++) {
    floatingTexts.push({
      x: player.x + (Math.random() - 0.5) * 40,
      y: player.y - 30 + (Math.random() - 0.5) * 20,
      text: ['⭐', '💫', '✨', '😵'][Math.floor(Math.random() * 4)],
      life: 2,
      maxLife: 2,
      vy: -1 - Math.random(),
      size: 20 + Math.random() * 15
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += p.gravity;
    p.life -= 0.02;
    if (p.life <= 0) particles.splice(i, 1);
  }
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    const ft = floatingTexts[i];
    ft.y += ft.vy;
    ft.life -= 0.02;
    if (ft.life <= 0) floatingTexts.splice(i, 1);
  }
}

function drawParticles() {
  particles.forEach(p => {
    const alpha = p.life / p.maxLife;
    if (p.isDust) {
      ctx.fillStyle = p.color;
      ctx.globalAlpha = alpha;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    } else {
      ctx.fillStyle = p.color;
      ctx.globalAlpha = alpha;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  });
  floatingTexts.forEach(ft => {
    const alpha = ft.life / ft.maxLife;
    ctx.globalAlpha = alpha;
    ctx.font = `${ft.size}px serif`;
    ctx.textAlign = 'center';
    ctx.fillText(ft.text, ft.x, ft.y);
    ctx.globalAlpha = 1;
  });
}

// ===== COLLISION DETECTION =====
function checkCollision(p, ob) {
  // Player hitbox (slightly smaller than visual)
  const px = p.x - 12;
  const py = p.y - 38;
  const pw = 24;
  const ph = 42;

  let ox, oy, ow, oh;
  switch(ob.type) {
    case 'bird':
      ox = ob.x + 5; oy = ob.y + 5; ow = ob.w - 10; oh = ob.h - 10;
      break;
    case 'spike':
      // More forgiving hitbox for spikes
      ox = ob.x + 5; oy = ob.y + ob.h * 0.3; ow = ob.w - 10; oh = ob.h * 0.7;
      break;
    default:
      ox = ob.x + 3; oy = ob.y + 3; ow = ob.w - 6; oh = ob.h - 3;
  }

  return px < ox + ow && px + pw > ox && py < oy + oh && py + ph > oy;
}

function checkNearMiss(p, ob) {
  const margin = 15;
  const px = p.x - 12 - margin;
  const py = p.y - 38 - margin;
  const pw = 24 + margin * 2;
  const ph = 42 + margin * 2;
  const ox = ob.x; const oy = ob.y; const ow = ob.w; const oh = ob.h;
  return px < ox + ow && px + pw > ox && py < oy + oh && py + ph > oy;
}

// ===== GAME LOGIC =====
function resetGame() {
  player.y = groundY;
  player.vy = 0;
  player.jumping = false;
  player.jumpCount = 0;
  player.squash = 1;
  player.stretch = 1;
  player.rotation = 0;
  player.trail = [];
  obstacles = [];
  particles = [];
  floatingTexts = [];
  score = 0;
  speed = baseSpeed;
  speedMultiplier = 1;
  frameCount = 0;
  lastObstacleTime = 0;
  obstacleInterval = 90;
  nearMissCount = 0;
  totalJumps = 0;
  scrollX = 0;
  gameStartTime = Date.now();
}

function jump() {
  if (state !== 'playing') return;
  if (player.jumpCount < player.maxJumps) {
    player.vy = player.jumpCount === 0 ? -12 : -10;
    player.jumping = true;
    player.jumpCount++;
    totalJumps++;

    // Squash and stretch
    player.squash = 0.7;
    player.stretch = 1.3;

    if (player.jumpCount === 1) {
      sound.jump();
      spawnJumpParticles();
    } else {
      sound.doubleJump();
      // Double jump sparkle
      spawnParticles(player.x, player.y, 12, '#ffd93d', 5, 0.8);
      floatingTexts.push({
        x: player.x, y: player.y - 50,
        text: '✨ Double!', life: 1, maxLife: 1, vy: -2, size: 18
      });
    }
  }
}

function update() {
  if (state !== 'playing') return;

  frameCount++;
  scrollX += speed;

  // Speed increase
  speedMultiplier = 1 + frameCount / 1500;
  speed = Math.min(baseSpeed * speedMultiplier, maxSpeed);

  // Score
  score = Math.floor(frameCount / 3);

  // Milestone sounds
  if (score > 0 && score % 100 === 0 && frameCount % 3 === 0) {
    sound.milestone();
    floatingTexts.push({
      x: W / 2, y: H / 3,
      text: `🎉 ${score} points!`, life: 2, maxLife: 2, vy: -1, size: 30
    });
    spawnParticles(W / 2, H / 3, 20, null, 8, 1.5);
  }

  // Player physics
  player.vy += 0.55; // gravity
  player.y += player.vy;

  if (player.y >= groundY) {
    if (player.jumping && player.vy > 2) {
      sound.land();
      spawnLandParticles();
    }
    player.y = groundY;
    player.vy = 0;
    player.jumping = false;
    player.jumpCount = 0;
  }

  // Squash & stretch recovery
  player.squash += (1 - player.squash) * 0.15;
  player.stretch += (1 - player.stretch) * 0.15;

  // Rotation during jump
  if (player.jumping) {
    player.rotation += 0.03;
    player.hatBounce += 0.2;
  } else {
    player.rotation *= 0.9;
    player.hatBounce += 0.1;
  }

  // Trail
  if (player.jumping) {
    player.trail.push({ x: player.x, y: player.y - 15, life: 0.5 });
  }
  player.trail = player.trail.filter(t => {
    t.life -= 0.03;
    return t.life > 0;
  });

  // Spawn obstacles
  lastObstacleTime++;
  const minInterval = Math.max(35, obstacleInterval - frameCount / 100);
  if (lastObstacleTime > minInterval + Math.random() * 40) {
    obstacles.push(createObstacle());
    lastObstacleTime = 0;
  }

  // Update obstacles
  for (let i = obstacles.length - 1; i >= 0; i--) {
    const ob = obstacles[i];
    ob.x -= speed;

    // Check if passed
    if (!ob.passed && ob.x + ob.w < player.x) {
      ob.passed = true;
      // Near miss detection
      if (!ob.nearMiss && checkNearMiss(player, ob) && !checkCollision(player, ob)) {
        ob.nearMiss = true;
        nearMissCount++;
        sound.nearMiss();
        sound.whoosh();
        floatingTexts.push({
          x: player.x + 30, y: player.y - 50,
          text: '😅 Close!', life: 1.2, maxLife: 1.2, vy: -2, size: 20
        });
        score += 10;
        spawnParticles(player.x, player.y - 20, 5, '#0ff', 3, 0.6);
      }
    }

    // Collision
    if (checkCollision(player, ob)) {
      gameOver();
      return;
    }

    // Remove off-screen
    if (ob.x + ob.w < -50) {
      obstacles.splice(i, 1);
    }
  }

  // Update particles
  updateParticles();

  // Update UI
  document.getElementById('scoreVal').textContent = score;
  document.getElementById('speed-display').textContent = `⚡ ${speedMultiplier.toFixed(1)}x`;
}

function gameOver() {
  state = 'gameover';
  sound.gameOver();
  spawnDeathParticles();

  const isNewHigh = score > highScore;
  if (isNewHigh) {
    highScore = score;
    localStorage.setItem('funGameHighScore', highScore.toString());
  }

  document.getElementById('finalScore').textContent = `Score: ${score}`;
  document.getElementById('highScoreText').textContent = `Best: ${highScore}`;
  document.getElementById('newHighLabel').classList.toggle('hidden', !isNewHigh);

  const elapsed = ((Date.now() - gameStartTime) / 1000).toFixed(1);
  document.getElementById('statsText').textContent =
    `Time: ${elapsed}s | Jumps: ${totalJumps} | Near Misses: ${nearMissCount} | Top Speed: ${speedMultiplier.toFixed(1)}x`;

  document.getElementById('gameover-screen').classList.remove('hidden');
}

// ===== RENDER =====
function render() {
  ctx.clearRect(0, 0, W, H);

  drawSky();
  drawStars();
  drawClouds();
  drawMountains();
  drawHills();
  drawTrees();
  drawGround();

  // Draw obstacles
  obstacles.forEach(ob => drawObstacle(ob));

  // Draw player
  if (state !== 'start') {
    drawPlayer();
  } else {
    // Idle animation on start screen
    player.y = groundY + Math.sin(frameCount * 0.05) * 5;
    player.hatBounce += 0.05;
    frameCount++;
    drawPlayer();
  }

  // Draw particles on top
  drawParticles();

  // Speed lines effect at high speed
  if (state === 'playing' && speedMultiplier > 1.5) {
    const lineAlpha = Math.min((speedMultiplier - 1.5) * 0.15, 0.3);
    ctx.strokeStyle = `rgba(255, 255, 255, ${lineAlpha})`;
    ctx.lineWidth = 1;
    for (let i = 0; i < 5; i++) {
      const ly = Math.random() * H;
      const lx = Math.random() * W;
      ctx.beginPath();
      ctx.moveTo(lx, ly);
      ctx.lineTo(lx - 30 - speedMultiplier * 10, ly);
      ctx.stroke();
    }
  }

  // Vignette
  const vignette = ctx.createRadialGradient(W/2, H/2, W * 0.3, W/2, H/2, W * 0.7);
  vignette.addColorStop(0, 'rgba(0,0,0,0)');
  vignette.addColorStop(1, 'rgba(0,0,0,0.3)');
  ctx.fillStyle = vignette;
  ctx.fillRect(0, 0, W, H);
}

// ===== GAME LOOP =====
function gameLoop() {
  update();
  render();
  requestAnimationFrame(gameLoop);
}

// ===== INPUT HANDLING =====
function handleInput(e) {
  if (e) e.preventDefault();
  sound.init();

  if (state === 'start') {
    startGame();
  } else if (state === 'playing') {
    jump();
  } else if (state === 'gameover') {
    startGame();
  }
}

function startGame() {
  resetGame();
  state = 'playing';
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('gameover-screen').classList.add('hidden');
  document.getElementById('highScoreText').textContent = `Best: ${highScore}`;
}

// Keyboard
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
    e.preventDefault();
    handleInput();
  }
  if (e.code === 'Enter' && state === 'gameover') {
    handleInput();
  }
});

// Mouse/Touch
canvas.addEventListener('mousedown', handleInput);
canvas.addEventListener('touchstart', handleInput, { passive: false });

// Buttons
document.getElementById('btnPlay').addEventListener('click', (e) => {
  e.stopPropagation();
  sound.init();
  startGame();
});
document.getElementById('btnRetry').addEventListener('click', (e) => {
  e.stopPropagation();
  sound.init();
  startGame();
});

// ===== INIT =====
initBackground();
document.getElementById('highScoreText').textContent = `Best: ${highScore}`;

// Polyfill roundRect if needed
if (!ctx.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, radii) {
    const r = Array.isArray(radii) ? radii : [radii, radii, radii, radii];
    this.moveTo(x + r[0], y);
    this.lineTo(x + w - r[1], y);
    this.quadraticCurveTo(x + w, y, x + w, y + r[1]);
    this.lineTo(x + w, y + h - r[2]);
    this.quadraticCurveTo(x + w, y + h, x + w - r[2], y + h);
    this.lineTo(x + r[3], y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - r[3]);
    this.lineTo(x, y + r[0]);
    this.quadraticCurveTo(x, y, x + r[0], y);
    this.closePath();
  };
}

gameLoop();
</script>
</body>
