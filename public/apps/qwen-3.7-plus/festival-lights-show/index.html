<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Festival Lights Show</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;500;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    color: #fff;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    user-select: none;
  }

  #lightCanvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }

  .controls-overlay {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 10;
    padding: 16px 20px 20px;
    background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.5) 70%, transparent 100%);
    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .controls-overlay.hidden {
    transform: translateY(calc(100% - 44px));
  }

  .toggle-controls {
    position: absolute;
    top: 0; left: 50%;
    transform: translate(-50%, -50%);
    width: 40px; height: 20px;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(10px);
    transition: all 0.3s;
  }

  .toggle-controls:hover {
    background: rgba(255,255,255,0.25);
  }

  .toggle-controls::after {
    content: '';
    width: 16px; height: 2px;
    background: rgba(255,255,255,0.6);
    border-radius: 1px;
  }

  .controls-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 14px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .control-group {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    padding: 14px 16px;
    backdrop-filter: blur(20px);
  }

  .control-group h3 {
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 10px;
  }

  .pattern-buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .pattern-btn {
    padding: 6px 12px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    background: rgba(255,255,255,0.05);
    color: rgba(255,255,255,0.7);
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.25s;
    font-family: 'Inter', sans-serif;
  }

  .pattern-btn:hover {
    background: rgba(255,255,255,0.12);
    color: #fff;
  }

  .pattern-btn.active {
    background: linear-gradient(135deg, rgba(139,92,246,0.5), rgba(236,72,153,0.5));
    border-color: rgba(167,139,250,0.6);
    color: #fff;
    box-shadow: 0 0 20px rgba(139,92,246,0.3);
  }

  .slider-container {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .slider-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .slider-row label {
    font-size: 11px;
    font-weight: 500;
    color: rgba(255,255,255,0.6);
    min-width: 70px;
  }

  .slider-row input[type="range"] {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 4px;
    border-radius: 2px;
    background: rgba(255,255,255,0.15);
    outline: none;
  }

  .slider-row input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: linear-gradient(135deg, #a78bfa, #ec4899);
    cursor: pointer;
    box-shadow: 0 0 10px rgba(167,139,250,0.5);
    transition: transform 0.15s;
  }

  .slider-row input[type="range"]::-webkit-slider-thumb:hover {
    transform: scale(1.2);
  }

  .slider-row .value {
    font-size: 11px;
    font-weight: 600;
    color: rgba(255,255,255,0.5);
    min-width: 30px;
    text-align: right;
    font-family: 'Orbitron', sans-serif;
  }

  .color-palettes {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .palette-btn {
    width: 36px; height: 36px;
    border-radius: 10px;
    border: 2px solid transparent;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }

  .palette-btn:hover {
    transform: scale(1.1);
  }

  .palette-btn.active {
    border-color: #fff;
    box-shadow: 0 0 15px rgba(255,255,255,0.3);
  }

  .music-controls {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .music-btn {
    padding: 8px 14px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    background: rgba(255,255,255,0.05);
    color: rgba(255,255,255,0.7);
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s;
    font-family: 'Inter', sans-serif;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .music-btn:hover {
    background: rgba(255,255,255,0.12);
    color: #fff;
  }

  .music-btn.active {
    background: linear-gradient(135deg, rgba(16,185,129,0.5), rgba(59,130,246,0.5));
    border-color: rgba(52,211,153,0.6);
    color: #fff;
    box-shadow: 0 0 20px rgba(16,185,129,0.3);
  }

  .music-btn .icon {
    font-size: 14px;
  }

  .bpm-display {
    font-family: 'Orbitron', sans-serif;
    font-size: 24px;
    font-weight: 900;
    background: linear-gradient(135deg, #a78bfa, #ec4899);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-align: center;
    line-height: 1;
  }

  .bpm-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.4);
    text-align: center;
    font-weight: 600;
  }

  .tap-btn {
    padding: 8px;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    background: rgba(255,255,255,0.05);
    color: rgba(255,255,255,0.7);
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Inter', sans-serif;
    text-align: center;
  }

  .tap-btn:active {
    transform: scale(0.95);
    background: rgba(255,255,255,0.2);
  }

  .beat-indicator {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    transition: all 0.1s;
    display: inline-block;
  }

  .beat-indicator.pulse {
    background: #ec4899;
    box-shadow: 0 0 15px #ec4899;
  }

  /* Top bar */
  .top-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 10;
    padding: 14px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, transparent 100%);
  }

  .app-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 16px;
    font-weight: 900;
    letter-spacing: 3px;
    background: linear-gradient(135deg, #f472b6, #a78bfa, #60a5fa, #34d399);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-transform: uppercase;
  }

  .fullscreen-btn {
    width: 36px; height: 36px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.6);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: all 0.25s;
    backdrop-filter: blur(10px);
  }

  .fullscreen-btn:hover {
    background: rgba(255,255,255,0.12);
    color: #fff;
  }

  /* Visualizer bars */
  .audio-visualizer {
    display: flex;
    align-items: flex-end;
    gap: 2px;
    height: 30px;
    margin-top: 6px;
  }

  .viz-bar {
    flex: 1;
    background: linear-gradient(to top, #a78bfa, #ec4899);
    border-radius: 1px;
    min-height: 2px;
    transition: height 0.05s;
    opacity: 0.7;
  }

  /* Preset row */
  .preset-row {
    display: flex;
    gap: 6px;
    margin-top: 8px;
  }

  .preset-btn {
    padding: 4px 10px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    background: rgba(255,255,255,0.03);
    color: rgba(255,255,255,0.5);
    font-size: 10px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Inter', sans-serif;
  }

  .preset-btn:hover {
    background: rgba(255,255,255,0.1);
    color: #fff;
  }

  /* Responsive */
  @media (max-width: 768px) {
    .controls-grid {
      grid-template-columns: 1fr;
      gap: 10px;
    }
    .app-title { font-size: 12px; }
  }

  /* Glow effect on body */
  .glow-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 1;
    opacity: 0.3;
    mix-blend-mode: screen;
  }
</style>
</head>
<body>

<canvas id="lightCanvas"></canvas>
<div class="glow-overlay" id="glowOverlay"></div>

<!-- Top Bar -->
<div class="top-bar">
  <div class="app-title">✦ Festival Lights Show</div>
  <button class="fullscreen-btn" id="fullscreenBtn" title="Toggle Fullscreen">⛶</button>
</div>

<!-- Controls -->
<div class="controls-overlay" id="controlsOverlay">
  <div class="toggle-controls" id="toggleControls"></div>

  <div class="controls-grid">
    <!-- Patterns -->
    <div class="control-group">
      <h3>Pattern</h3>
      <div class="pattern-buttons" id="patternButtons">
        <button class="pattern-btn active" data-pattern="aurora">Aurora</button>
        <button class="pattern-btn" data-pattern="pulse">Pulse</button>
        <button class="pattern-btn" data-pattern="wave">Wave</button>
        <button class="pattern-btn" data-pattern="spiral">Spiral</button>
        <button class="pattern-btn" data-pattern="fireworks">Fireworks</button>
        <button class="pattern-btn" data-pattern="matrix">Matrix</button>
        <button class="pattern-btn" data-pattern="laser">Laser</button>
        <button class="pattern-btn" data-pattern="nebula">Nebula</button>
      </div>
      <div class="preset-row">
        <button class="preset-btn" data-preset="chill">🌊 Chill</button>
        <button class="preset-btn" data-preset="rave">⚡ Rave</button>
        <button class="preset-btn" data-preset="dreamy">✨ Dreamy</button>
        <button class="preset-btn" data-preset="intense">🔥 Intense</button>
      </div>
    </div>

    <!-- Parameters -->
    <div class="control-group">
      <h3>Parameters</h3>
      <div class="slider-container">
        <div class="slider-row">
          <label>Speed</label>
          <input type="range" id="speedSlider" min="1" max="100" value="50">
          <span class="value" id="speedValue">50</span>
        </div>
        <div class="slider-row">
          <label>Intensity</label>
          <input type="range" id="intensitySlider" min="1" max="100" value="70">
          <span class="value" id="intensityValue">70</span>
        </div>
        <div class="slider-row">
          <label>Complexity</label>
          <input type="range" id="complexitySlider" min="1" max="100" value="50">
          <span class="value" id="complexityValue">50</span>
        </div>
        <div class="slider-row">
          <label>Bloom</label>
          <input type="range" id="bloomSlider" min="0" max="100" value="40">
          <span class="value" id="bloomValue">40</span>
        </div>
      </div>
    </div>

    <!-- Colors & Music -->
    <div class="control-group">
      <h3>Colors & Music</h3>
      <div class="color-palettes" id="colorPalettes">
        <div class="palette-btn active" data-palette="neon" style="background: linear-gradient(135deg, #ff006e, #8338ec, #3a86ff)" title="Neon"></div>
        <div class="palette-btn" data-palette="sunset" style="background: linear-gradient(135deg, #ff6b35, #f7c59f, #ff006e)" title="Sunset"></div>
        <div class="palette-btn" data-palette="ocean" style="background: linear-gradient(135deg, #0077b6, #00b4d8, #90e0ef)" title="Ocean"></div>
        <div class="palette-btn" data-palette="forest" style="background: linear-gradient(135deg, #2d6a4f, #52b788, #d8f3dc)" title="Forest"></div>
        <div class="palette-btn" data-palette="fire" style="background: linear-gradient(135deg, #ff4500, #ff8c00, #ffd700)" title="Fire"></div>
        <div class="palette-btn" data-palette="pastel" style="background: linear-gradient(135deg, #ffc8dd, #bde0fe, #cdb4db)" title="Pastel"></div>
        <div class="palette-btn" data-palette="monochrome" style="background: linear-gradient(135deg, #fff, #888, #222)" title="Mono"></div>
        <div class="palette-btn" data-palette="rainbow" style="background: linear-gradient(135deg, #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff)" title="Rainbow"></div>
      </div>
      <div class="music-controls" style="margin-top: 10px;">
        <div style="display: flex; gap: 6px;">
          <button class="music-btn" id="micBtn"><span class="icon">🎤</span> Mic Sync</button>
          <button class="music-btn" id="beatBtn"><span class="icon">🥁</span> Beat Sync</button>
        </div>
        <div style="display: flex; align-items: center; gap: 10px;">
          <div style="flex:1; text-align: center;">
            <div class="bpm-display" id="bpmDisplay">128</div>
            <div class="bpm-label">BPM</div>
          </div>
          <button class="tap-btn" id="tapBtn">TAP TEMPO</button>
          <div>
            <span class="beat-indicator" id="beatDot"></span>
          </div>
        </div>
        <div class="audio-visualizer" id="audioVisualizer"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ==================== CORE ENGINE ====================
const canvas = document.getElementById('lightCanvas');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ==================== STATE ====================
const state = {
  pattern: 'aurora',
  speed: 50,
  intensity: 70,
  complexity: 50,
  bloom: 40,
  palette: 'neon',
  beatSync: false,
  micSync: false,
  bpm: 128,
  beatPhase: 0,
  audioLevel: 0,
  audioFreqs: new Array(16).fill(0),
  time: 0,
  mouseX: 0.5,
  mouseY: 0.5,
};

// ==================== COLOR PALETTES ====================
const palettes = {
  neon: ['#ff006e', '#8338ec', '#3a86ff', '#fb5607', '#ffbe0b'],
  sunset: ['#ff6b35', '#f7c59f', '#ef476f', '#ffd166', '#06d6a0'],
  ocean: ['#0077b6', '#00b4d8', '#90e0ef', '#023e8a', '#48cae4'],
  forest: ['#2d6a4f', '#52b788', '#95d5b2', '#1b4332', '#74c69d'],
  fire: ['#ff4500', '#ff8c00', '#ffd700', '#ff6347', '#dc143c'],
  pastel: ['#ffc8dd', '#bde0fe', '#cdb4db', '#a2d2ff', '#ffafcc'],
  monochrome: ['#ffffff', '#cccccc', '#888888', '#444444', '#eeeeee'],
  rainbow: ['#ff0000', '#ff8800', '#ffff00', '#00ff00', '#0088ff', '#8800ff', '#ff00ff'],
};

function getColor(index, alpha = 1) {
  const p = palettes[state.palette];
  const c = p[((index % p.length) + p.length) % p.length];
  if (alpha === 1) return c;
  const r = parseInt(c.slice(1,3), 16);
  const g = parseInt(c.slice(3,5), 16);
  const b = parseInt(c.slice(5,7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function getColorRGB(index) {
  const p = palettes[state.palette];
  const c = p[((index % p.length) + p.length) % p.length];
  return {
    r: parseInt(c.slice(1,3), 16),
    g: parseInt(c.slice(3,5), 16),
    b: parseInt(c.slice(5,7), 16),
  };
}

function lerpColor(i1, i2, t, alpha = 1) {
  const c1 = getColorRGB(i1);
  const c2 = getColorRGB(i2);
  const r = Math.round(c1.r + (c2.r - c1.r) * t);
  const g = Math.round(c1.g + (c2.g - c1.g) * t);
  const b = Math.round(c1.b + (c2.b - c1.b) * t);
  return `rgba(${r},${g},${b},${alpha})`;
}

// ==================== PARTICLES ====================
class Particle {
  constructor(x, y, vx, vy, life, colorIdx, size) {
    this.x = x; this.y = y;
    this.vx = vx; this.vy = vy;
    this.life = life; this.maxLife = life;
    this.colorIdx = colorIdx;
    this.size = size || 3;
    this.trail = [];
  }
  update(dt) {
    this.trail.push({x: this.x, y: this.y});
    if (this.trail.length > 12) this.trail.shift();
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    this.vy += 30 * dt; // gravity
    this.life -= dt;
  }
  draw() {
    const alpha = Math.max(0, this.life / this.maxLife);
    // Trail
    for (let i = 0; i < this.trail.length; i++) {
      const t = i / this.trail.length;
      ctx.beginPath();
      ctx.arc(this.trail[i].x, this.trail[i].y, this.size * t * alpha, 0, Math.PI * 2);
      ctx.fillStyle = getColor(this.colorIdx, alpha * t * 0.5);
      ctx.fill();
    }
    // Main
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * alpha, 0, Math.PI * 2);
    ctx.fillStyle = getColor(this.colorIdx, alpha);
    ctx.fill();
    // Glow
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * alpha * 3, 0, Math.PI * 2);
    ctx.fillStyle = getColor(this.colorIdx, alpha * 0.2);
    ctx.fill();
  }
}

let particles = [];

// ==================== AUDIO ====================
let audioCtx, analyser, micStream, dataArray;
const vizBars = [];
const vizContainer = document.getElementById('audioVisualizer');
for (let i = 0; i < 16; i++) {
  const bar = document.createElement('div');
  bar.className = 'viz-bar';
  bar.style.height = '2px';
  vizContainer.appendChild(bar);
  vizBars.push(bar);
}

async function startMic() {
  try {
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const source = audioCtx.createMediaStreamSource(micStream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 64;
    source.connect(analyser);
    dataArray = new Uint8Array(analyser.frequencyBinCount);
    state.micSync = true;
    document.getElementById('micBtn').classList.add('active');
  } catch(e) {
    console.log('Mic access denied');
  }
}

function stopMic() {
  if (micStream) {
    micStream.getTracks().forEach(t => t.stop());
    micStream = null;
  }
  state.micSync = false;
  document.getElementById('micBtn').classList.remove('active');
}

function updateAudio() {
  if (state.micSync && analyser) {
    analyser.getByteFrequencyData(dataArray);
    let sum = 0;
    for (let i = 0; i < dataArray.length; i++) {
      const val = dataArray[i] / 255;
      if (i < 16) {
        state.audioFreqs[i] = state.audioFreqs[i] * 0.7 + val * 0.3;
      }
      sum += val;
    }
    state.audioLevel = state.audioLevel * 0.7 + (sum / dataArray.length) * 0.3;
  } else if (state.beatSync) {
    // Simulate beat
    const beatInterval = 60 / state.bpm;
    state.beatPhase += 1/60 / beatInterval;
    if (state.beatPhase >= 1) state.beatPhase -= 1;
    const beatPulse = Math.pow(Math.max(0, 1 - state.beatPhase * 4), 2);
    state.audioLevel = state.audioLevel * 0.8 + beatPulse * 0.2;
    for (let i = 0; i < 16; i++) {
      const freq = beatPulse * (1 - i/16) * (0.5 + 0.5 * Math.sin(state.time * 2 + i));
      state.audioFreqs[i] = state.audioFreqs[i] * 0.7 + freq * 0.3;
    }
  } else {
    state.audioLevel *= 0.95;
    for (let i = 0; i < 16; i++) state.audioFreqs[i] *= 0.95;
  }

  // Update viz bars
  for (let i = 0; i < 16; i++) {
    vizBars[i].style.height = Math.max(2, state.audioFreqs[i] * 30) + 'px';
  }

  // Beat indicator
  const dot = document.getElementById('beatDot');
  if (state.audioLevel > 0.15) {
    dot.classList.add('pulse');
  } else {
    dot.classList.remove('pulse');
  }
}

// ==================== PATTERN RENDERERS ====================

function drawAurora(t) {
  const speed = state.speed / 50;
  const intensity = state.intensity / 100;
  const complexity = state.complexity / 50;
  const layers = Math.floor(3 + complexity * 4);
  const audioBoost = 1 + state.audioLevel * 2;

  for (let l = 0; l < layers; l++) {
    ctx.beginPath();
    const yBase = H * 0.2 + (l / layers) * H * 0.5;
    const colorIdx = l % palettes[state.palette].length;

    ctx.moveTo(-10, H);
    for (let x = -10; x <= W + 10; x += 4) {
      const nx = x / W;
      let y = yBase;
      y += Math.sin(nx * 3 * complexity + t * speed * 0.5 + l * 1.5) * 80 * intensity * audioBoost;
      y += Math.sin(nx * 7 * complexity + t * speed * 0.3 + l * 0.8) * 40 * intensity;
      y += Math.sin(nx * 13 + t * speed * 0.7) * 20 * intensity;

      if (state.audioFreqs[Math.floor(nx * 15)] > 0.1) {
        y -= state.audioFreqs[Math.floor(nx * 15)] * 100 * intensity;
      }

      ctx.lineTo(x, y);
    }
    ctx.lineTo(W + 10, H);
    ctx.closePath();

    const grad = ctx.createLinearGradient(0, yBase - 150, 0, yBase + 200);
    grad.addColorStop(0, getColor(colorIdx, 0));
    grad.addColorStop(0.3, getColor(colorIdx, 0.15 * intensity * audioBoost));
    grad.addColorStop(0.5, getColor(colorIdx, 0.25 * intensity * audioBoost));
    grad.addColorStop(0.7, getColor(colorIdx, 0.1 * intensity));
    grad.addColorStop(1, getColor(colorIdx, 0));
    ctx.fillStyle = grad;
    ctx.fill();
  }

  // Stars
  const starCount = Math.floor(30 * complexity);
  for (let i = 0; i < starCount; i++) {
    const sx = (Math.sin(i * 127.1 + 311.7) * 0.5 + 0.5) * W;
    const sy = (Math.sin(i * 269.5 + 183.3) * 0.5 + 0.5) * H * 0.4;
    const twinkle = Math.sin(t * 2 + i * 1.7) * 0.5 + 0.5;
    ctx.beginPath();
    ctx.arc(sx, sy, 1 + twinkle * 1.5, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${0.3 + twinkle * 0.7})`;
    ctx.fill();
  }
}

function drawPulse(t) {
  const speed = state.speed / 50;
  const intensity = state.intensity / 100;
  const audioBoost = 1 + state.audioLevel * 3;
  const cx = W / 2;
  const cy = H / 2;
  const maxR = Math.max(W, H) * 0.7;
  const ringCount = Math.floor(5 + state.complexity / 10);

  for (let i = 0; i < ringCount; i++) {
    const phase = (t * speed * 0.5 + i / ringCount) % 1;
    const r = phase * maxR * audioBoost;
    const alpha = (1 - phase) * intensity * 0.6;
    const colorIdx = i % palettes[state.palette].length;
    const lineW = 2 + (1 - phase) * 8 * intensity;

    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.strokeStyle = getColor(colorIdx, alpha);
    ctx.lineWidth = lineW;
    ctx.stroke();

    // Glow
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.strokeStyle = getColor(colorIdx, alpha * 0.3);
    ctx.lineWidth = lineW * 4;
    ctx.stroke();
  }

  // Center glow
  const centerPulse = Math.sin(t * speed * 2) * 0.5 + 0.5;
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 100 * audioBoost);
  grad.addColorStop(0, getColor(0, 0.5 * intensity * (0.5 + centerPulse * 0.5)));
  grad.addColorStop(0.5, getColor(1, 0.2 * intensity));
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

function drawWave(t) {
  const speed = state.speed / 50;
  const intensity = state.intensity / 100;
  const complexity = state.complexity / 50;
  const audioBoost = 1 + state.audioLevel * 2;
  const waveCount = Math.floor(8 + complexity * 12);

  for (let w = 0; w < waveCount; w++) {
    const yBase = (w / waveCount) * H;
    const colorIdx = w % palettes[state.palette].length;

    ctx.beginPath();
    for (let x = 0; x <= W; x += 3) {
      const nx = x / W;
      let y = yBase;
      y += Math.sin(nx * Math.PI * 2 * complexity + t * speed + w * 0.5) * 30 * intensity * audioBoost;
      y += Math.sin(nx * Math.PI * 4 * complexity - t * speed * 0.7 + w * 0.3) * 15 * intensity;

      const freqIdx = Math.floor(nx * 15);
      if (state.audioFreqs[freqIdx] > 0.05) {
        y += Math.sin(nx * 20 + t * 3) * state.audioFreqs[freqIdx] * 60 * intensity;
      }

      if (x === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }

    ctx.strokeStyle = getColor(colorIdx, 0.4 * intensity);
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.strokeStyle = getColor(colorIdx, 0.1 * intensity);
    ctx.lineWidth = 8;
    ctx.stroke();
  }
}

function drawSpiral(t) {
  const speed = state.speed / 50;
  const intensity = state.intensity / 100;
  const complexity = state.complexity / 50;
  const audioBoost = 1 + state.audioLevel * 2;
  const cx = W / 2;
  const cy = H / 2;
  const arms = Math.floor(2 + complexity * 6);
  const maxR = Math.min(W, H) * 0.45 * audioBoost;

  for (let a = 0; a < arms; a++) {
    const baseAngle = (a / arms) * Math.PI * 2;
    ctx.beginPath();

    for (let i = 0; i < 200; i++) {
      const frac = i / 200;
      const r = frac * maxR;
      const angle = baseAngle + frac * Math.PI * 4 * complexity + t * speed;
      const x = cx + Math.cos(angle) * r;
      const y = cy + Math.sin(angle) * r;

      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }

    const colorIdx = a % palettes[state.palette].length;
    ctx.strokeStyle = getColor(colorIdx, 0.5 * intensity);
    ctx.lineWidth = 3;
    ctx.stroke();

    ctx.strokeStyle = getColor(colorIdx, 0.15 * intensity);
    ctx.lineWidth = 12;
    ctx.stroke();
  }

  // Center
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 60);
  grad.addColorStop(0, getColor(0, 0.6 * intensity));
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(cx, cy, 60, 0, Math.PI * 2);
  ctx.fill();
}

function drawFireworks(t) {
  const speed = state.speed / 50;
  const intensity = state.intensity / 100;
  const audioBoost = 1 + state.audioLevel * 3;

  // Spawn fireworks
  if (Math.random() < 0.03 * speed * audioBoost && particles.length < 500) {
    const fx = W * 0.15 + Math.random() * W * 0.7;
    const fy = H * 0.15 + Math.random() * H * 0.4;
    const count = Math.floor(30 + state.complexity * 0.7 * 40);
    const colorIdx = Math.floor(Math.random() * palettes[state.palette].length);

    for (let i = 0; i < count; i++) {
      const angle = (i / count) * Math.PI * 2 + Math.random() * 0.3;
      const spd = 80 + Math.random() * 200;
      const vx = Math.cos(angle) * spd;
      const vy = Math.sin(angle) * spd - 50;
      particles.push(new Particle(fx, fy, vx, vy, 1.5 + Math.random(), colorIdx + (Math.random() > 0.5 ? 1 : 0), 2 + Math.random() * 3));
    }
  }

  // Update and draw
  const dt = 1/60;
  particles = particles.filter(p => p.life > 0);
  for (const p of particles) {
    p.update(dt);
    p.draw();
  }
}

function drawMatrix(t) {
  const speed = state.speed / 50;
  const intensity = state.intensity / 100;
  const complexity = state.complexity / 50;
  const audioBoost = 1 + state.audioLevel * 2;

  const cols = Math.floor(20 + complexity * 40);
  const colW = W / cols;

  for (let c = 0; c < cols; c++) {
    const x = c * colW;
    const freqIdx = Math.floor((c / cols) * 15);
    const freq = state.audioFreqs[freqIdx];
    const barH = (0.1 + 0.3 * Math.sin(t * speed + c * 0.3) + 0.3 * Math.sin(t * speed * 1.7 + c * 0.7) + freq * 2) * H * 0.4 * intensity * audioBoost;

    const colorIdx = c % palettes[state.palette].length;
    const y = H / 2 - barH / 2;

    // Bar
    const grad = ctx.createLinearGradient(x, y, x, y + barH);
    grad.addColorStop(0, getColor(colorIdx, 0));
    grad.addColorStop(0.3, getColor(colorIdx, 0.6 * intensity));
    grad.addColorStop(0.5, getColor(colorIdx, 0.8 * intensity));
    grad.addColorStop(0.7, getColor(colorIdx, 0.6 * intensity));
    grad.addColorStop(1, getColor(colorIdx, 0));

    ctx.fillStyle = grad;
    ctx.fillRect(x + 1, y, colW - 2, barH);

    // Glow
    ctx.fillStyle = getColor(colorIdx, 0.1 * intensity);
    ctx.fillRect(x - 2, y - 5, colW + 4, barH + 10);
  }

  // Mirror reflection
  ctx.save();
  ctx.globalAlpha = 0.3;
  ctx.translate(0, H);
  ctx.scale(1, -1);
  // We just redraw a faded version conceptually - the gradient already fades
  ctx.restore();
}

function drawLaser(t) {
  const speed = state.speed / 50;
  const intensity = state.intensity / 100;
  const complexity = state.complexity / 50;
  const audioBoost = 1 + state.audioLevel * 3;
  const beamCount = Math.floor(4 + complexity * 12);

  for (let i = 0; i < beamCount; i++) {
    const baseAngle = (i / beamCount) * Math.PI * 2;
    const angle = baseAngle + Math.sin(t * speed * 0.5 + i * 2) * 0.8;
    const colorIdx = i % palettes[state.palette].length;

    const originX = W / 2 + Math.sin(t * speed * 0.3 + i) * W * 0.2;
    const originY = H * 0.1;
    const len = Math.max(W, H) * 1.5;

    const endX = originX + Math.cos(angle + Math.PI/2) * len;
    const endY = originY + Math.sin(angle + Math.PI/2) * len;

    // Core beam
    ctx.beginPath();
    ctx.moveTo(originX, originY);
    ctx.lineTo(endX, endY);
    ctx.strokeStyle = getColor(colorIdx, 0.6 * intensity * audioBoost);
    ctx.lineWidth = 2;
    ctx.stroke();

    // Glow
    ctx.beginPath();
    ctx.moveTo(originX, originY);
    ctx.lineTo(endX, endY);
    ctx.strokeStyle = getColor(colorIdx, 0.15 * intensity);
    ctx.lineWidth = 12;
    ctx.stroke();

    // Wide glow
    ctx.beginPath();
    ctx.moveTo(originX, originY);
    ctx.lineTo(endX, endY);
    ctx.strokeStyle = getColor(colorIdx, 0.05 * intensity);
    ctx.lineWidth = 30;
    ctx.stroke();
  }

  // Fog effect at bottom
  const fogGrad = ctx.createLinearGradient(0, H * 0.7, 0, H);
  fogGrad.addColorStop(0, 'rgba(0,0,0,0)');
  fogGrad.addColorStop(1, `rgba(100,100,100,${0.05 * intensity})`);
  ctx.fillStyle = fogGrad;
  ctx.fillRect(0, H * 0.7, W, H * 0.3);
}

function drawNebula(t) {
  const speed = state.speed / 50;
  const intensity = state.intensity / 100;
  const complexity = state.complexity / 50;
  const audioBoost = 1 + state.audioLevel * 2;
  const blobCount = Math.floor(5 + complexity * 10);

  for (let i = 0; i < blobCount; i++) {
    const phase1 = Math.sin(i * 127.1 + 311.7) * 0.5 + 0.5;
    const phase2 = Math.sin(i * 269.5 + 183.3) * 0.5 + 0.5;
    const phase3 = Math.sin(i * 419.2 + 371.9) * 0.5 + 0.5;

    const cx = W * (0.1 + phase1 * 0.8) + Math.sin(t * speed * 0.2 + i * 1.3) * 100;
    const cy = H * (0.1 + phase2 * 0.8) + Math.cos(t * speed * 0.15 + i * 0.9) * 80;
    const r = (80 + phase3 * 200) * intensity * audioBoost;

    const colorIdx = i % palettes[state.palette].length;
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
    grad.addColorStop(0, getColor(colorIdx, 0.2 * intensity));
    grad.addColorStop(0.4, getColor(colorIdx, 0.1 * intensity));
    grad.addColorStop(1, 'rgba(0,0,0,0)');

    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fill();
  }

  // Stars
  const starCount = Math.floor(50 + complexity * 100);
  for (let i = 0; i < starCount; i++) {
    const sx = (Math.sin(i * 127.1 + 311.7) * 0.5 + 0.5) * W;
    const sy = (Math.sin(i * 269.5 + 183.3) * 0.5 + 0.5) * H;
    const twinkle = Math.sin(t * 3 + i * 1.7) * 0.5 + 0.5;
    const sz = 0.5 + twinkle * 1.5;
    ctx.beginPath();
    ctx.arc(sx, sy, sz, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${0.2 + twinkle * 0.6})`;
    ctx.fill();
  }
}

const renderers = {
  aurora: drawAurora,
  pulse: drawPulse,
  wave: drawWave,
  spiral: drawSpiral,
  fireworks: drawFireworks,
  matrix: drawMatrix,
  laser: drawLaser,
  nebula: drawNebula,
};

// ==================== MAIN LOOP ====================
let lastTime = 0;

function render(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;
  state.time += dt;

  updateAudio();

  // Clear with fade
  const fadeAlpha = state.pattern === 'fireworks' ? 0.15 : 0.12;
  ctx.fillStyle = `rgba(0,0,0,${fadeAlpha + (1 - state.intensity/100) * 0.15})`;
  ctx.fillRect(0, 0, W, H);

  // Apply bloom
  if (state.bloom > 0) {
    ctx.save();
    ctx.filter = `blur(${state.bloom / 5}px)`;
    ctx.globalAlpha = 0.3;
    // We'll draw the pattern then overlay
    ctx.restore();
  }

  // Render pattern
  const renderer = renderers[state.pattern];
  if (renderer) renderer(state.time);

  // Bloom overlay (simple glow effect)
  if (state.bloom > 20) {
    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    ctx.globalAlpha = state.bloom / 300;
    ctx.filter = `blur(${state.bloom / 3}px)`;
    ctx.drawImage(canvas, 0, 0);
    ctx.restore();
  }

  // Subtle vignette
  const vignette = ctx.createRadialGradient(W/2, H/2, W*0.3, W/2, H/2, W*0.8);
  vignette.addColorStop(0, 'rgba(0,0,0,0)');
  vignette.addColorStop(1, 'rgba(0,0,0,0.4)');
  ctx.fillStyle = vignette;
  ctx.fillRect(0, 0, W, H);

  // Update glow overlay
  const glowEl = document.getElementById('glowOverlay');
  const mainColor = getColorRGB(0);
  const secColor = getColorRGB(1);
  glowEl.style.background = `radial-gradient(ellipse at 50% 50%, rgba(${mainColor.r},${mainColor.g},${mainColor.b},${0.05 * state.intensity/100}) 0%, rgba(${secColor.r},${secColor.g},${secColor.b},${0.03 * state.intensity/100}) 50%, transparent 80%)`;

  requestAnimationFrame(render);
}

requestAnimationFrame(render);

// ==================== UI HANDLERS ====================

// Pattern buttons
document.querySelectorAll('.pattern-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.pattern-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.pattern = btn.dataset.pattern;
    particles = [];
  });
});

// Palette buttons
document.querySelectorAll('.palette-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.palette-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.palette = btn.dataset.palette;
  });
});

// Sliders
['speed', 'intensity', 'complexity', 'bloom'].forEach(param => {
  const slider = document.getElementById(param + 'Slider');
  const display = document.getElementById(param + 'Value');
  slider.addEventListener('input', () => {
    state[param] = parseInt(slider.value);
    display.textContent = slider.value;
  });
});

// Mic sync
document.getElementById('micBtn').addEventListener('click', () => {
  if (state.micSync) stopMic();
  else startMic();
});

// Beat sync
document.getElementById('beatBtn').addEventListener('click', () => {
  state.beatSync = !state.beatSync;
  document.getElementById('beatBtn').classList.toggle('active');
  if (!state.beatSync) {
    state.audioLevel = 0;
    state.audioFreqs.fill(0);
  }
});

// Tap tempo
let tapTimes = [];
document.getElementById('tapBtn').addEventListener('click', () => {
  const now = performance.now();
  tapTimes.push(now);
  if (tapTimes.length > 8) tapTimes.shift();

  if (tapTimes.length >= 2) {
    let totalDiff = 0;
    for (let i = 1; i < tapTimes.length; i++) {
      totalDiff += tapTimes[i] - tapTimes[i-1];
    }
    const avgDiff = totalDiff / (tapTimes.length - 1);
    const bpm = Math.round(60000 / avgDiff);
    if (bpm >= 40 && bpm <= 300) {
      state.bpm = bpm;
      document.getElementById('bpmDisplay').textContent = bpm;
    }
  }

  // Reset if too long between taps
  if (tapTimes.length >= 2 && tapTimes[tapTimes.length-1] - tapTimes[tapTimes.length-2] > 3000) {
    tapTimes = [now];
  }
});

// Toggle controls
document.getElementById('toggleControls').addEventListener('click', () => {
  document.getElementById('controlsOverlay').classList.toggle('hidden');
});

// Fullscreen
document.getElementById('fullscreenBtn').addEventListener('click', () => {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
  } else {
    document.exitFullscreen();
  }
});

// Presets
document.querySelectorAll('.preset-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const preset = btn.dataset.preset;
    const presets = {
      chill: { pattern: 'aurora', speed: 25, intensity: 50, complexity: 30, bloom: 60, palette: 'ocean' },
      rave: { pattern: 'laser', speed: 90, intensity: 95, complexity: 80, bloom: 30, palette: 'neon' },
      dreamy: { pattern: 'nebula', speed: 20, intensity: 60, complexity: 60, bloom: 70, palette: 'pastel' },
      intense: { pattern: 'fireworks', speed: 75, intensity: 90, complexity: 70, bloom: 50, palette: 'fire' },
    };
    const p = presets[preset];
    if (!p) return;

    state.pattern = p.pattern;
    state.speed = p.speed;
    state.intensity = p.intensity;
    state.complexity = p.complexity;
    state.bloom = p.bloom;
    state.palette = p.palette;
    particles = [];

    // Update UI
    document.querySelectorAll('.pattern-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.pattern === p.pattern);
    });
    document.querySelectorAll('.palette-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.palette === p.palette);
    });
    document.getElementById('speedSlider').value = p.speed;
    document.getElementById('speedValue').textContent = p.speed;
    document.getElementById('intensitySlider').value = p.intensity;
    document.getElementById('intensityValue').textContent = p.intensity;
    document.getElementById('complexitySlider').value = p.complexity;
    document.getElementById('complexityValue').textContent = p.complexity;
    document.getElementById('bloomSlider').value = p.bloom;
    document.getElementById('bloomValue').textContent = p.bloom;
  });
});

// Mouse tracking
document.addEventListener('mousemove', (e) => {
  state.mouseX = e.clientX / W;
  state.mouseY = e.clientY / H;
});

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  const patterns = Object.keys(renderers);
  const num = parseInt(e.key);
  if (num >= 1 && num <= patterns.length) {
    const pattern = patterns[num - 1];
    state.pattern = pattern;
    particles = [];
    document.querySelectorAll('.pattern-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.pattern === pattern);
    });
  }
  if (e.key === ' ') {
    e.preventDefault();
    document.getElementById('controlsOverlay').classList.toggle('hidden');
  }
  if (e.key === 'f') {
    document.getElementById('fullscreenBtn').click();
  }
});

// Initial clear
ctx.fillStyle = '#000';
ctx.fillRect(0, 0, W, H);
</script>
</body>
</html>
