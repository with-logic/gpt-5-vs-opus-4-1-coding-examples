<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍎 Falling Fruit Catcher!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap');

  body {
    overflow: hidden;
    background: #1a1a2e;
    font-family: 'Nunito', 'Fredoka One', sans-serif;
    user-select: none;
    -webkit-user-select: none;
    cursor: none;
  }

  canvas {
    display: block;
  }

  #ui-overlay {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding: 16px 24px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    pointer-events: none;
    z-index: 10;
  }

  .score-panel {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 12px 24px;
    color: white;
    font-size: 28px;
    font-weight: 900;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    border: 2px solid rgba(255,255,255,0.2);
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  }

  .score-panel .label {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 2px;
    opacity: 0.8;
    display: block;
  }

  .lives-panel {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 12px 20px;
    color: white;
    font-size: 32px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    border: 2px solid rgba(255,255,255,0.2);
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .heart {
    display: inline-block;
    transition: all 0.3s ease;
    filter: drop-shadow(0 2px 3px rgba(0,0,0,0.3));
  }

  .heart.lost {
    opacity: 0.2;
    transform: scale(0.7);
    filter: grayscale(1);
  }

  .combo-display {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 60px;
    font-weight: 900;
    color: #FFD700;
    text-shadow: 3px 3px 6px rgba(0,0,0,0.4), 0 0 30px rgba(255,215,0,0.5);
    pointer-events: none;
    z-index: 15;
    opacity: 0;
    transition: opacity 0.3s;
  }

  #start-screen, #game-over-screen {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 100;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  #game-over-screen { display: none; }

  .screen-title {
    font-family: 'Fredoka One', 'Nunito', sans-serif;
    font-size: 72px;
    color: white;
    text-shadow: 4px 4px 8px rgba(0,0,0,0.4);
    margin-bottom: 10px;
    animation: bounceIn 0.6s ease-out;
  }

  .screen-subtitle {
    font-size: 24px;
    color: rgba(255,255,255,0.8);
    margin-bottom: 40px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
  }

  .play-btn {
    background: linear-gradient(135deg, #FF6B6B, #FF8E53);
    color: white;
    border: none;
    padding: 18px 60px;
    font-size: 28px;
    font-weight: 900;
    font-family: 'Nunito', sans-serif;
    border-radius: 50px;
    cursor: pointer;
    pointer-events: all;
    box-shadow: 0 8px 25px rgba(255,107,107,0.4), 0 4px 0 #e05555;
    transition: all 0.15s ease;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
    letter-spacing: 1px;
  }

  .play-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 35px rgba(255,107,107,0.5), 0 6px 0 #e05555;
  }

  .play-btn:active {
    transform: translateY(2px);
    box-shadow: 0 4px 15px rgba(255,107,107,0.4), 0 2px 0 #e05555;
  }

  .final-score {
    font-size: 48px;
    color: #FFD700;
    font-weight: 900;
    margin: 10px 0 30px;
    text-shadow: 3px 3px 6px rgba(0,0,0,0.4);
  }

  .fruit-parade {
    font-size: 64px;
    margin-bottom: 20px;
    animation: fruitFloat 2s ease-in-out infinite;
  }

  .instructions {
    color: rgba(255,255,255,0.6);
    font-size: 16px;
    margin-top: 20px;
  }

  @keyframes bounceIn {
    0% { transform: scale(0.3); opacity: 0; }
    50% { transform: scale(1.05); }
    70% { transform: scale(0.95); }
    100% { transform: scale(1); opacity: 1; }
  }

  @keyframes fruitFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
  }

  .level-badge {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    border-radius: 30px;
    padding: 6px 20px;
    color: rgba(255,255,255,0.8);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
    pointer-events: none;
    z-index: 10;
    border: 1px solid rgba(255,255,255,0.15);
  }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="ui-overlay">
  <div class="score-panel">
    <span class="label">Score</span>
    <span id="score-display">0</span>
  </div>
  <div class="lives-panel" id="lives-display">
    <span class="heart" id="heart-1">❤️</span>
    <span class="heart" id="heart-2">❤️</span>
    <span class="heart" id="heart-3">❤️</span>
  </div>
</div>

<div class="level-badge" id="level-badge">Level 1</div>

<div class="combo-display" id="combo-display"></div>

<div id="start-screen">
  <div class="fruit-parade">🍎 🍊 🍋 🍇 🍓</div>
  <div class="screen-title">Fruit Catcher!</div>
  <div class="screen-subtitle">Catch the falling fruits in your basket!</div>
  <button class="play-btn" id="start-btn">▶ PLAY!</button>
  <div class="instructions">Use mouse or arrow keys to move the basket</div>
</div>

<div id="game-over-screen">
  <div class="fruit-parade">😢</div>
  <div class="screen-title">Game Over!</div>
  <div class="final-score" id="final-score">Score: 0</div>
  <div class="screen-subtitle" id="high-score-text">Best: 0</div>
  <button class="play-btn" id="restart-btn">🔄 Play Again!</button>
</div>

<script>
// ============ AUDIO ENGINE ============
const AudioEngine = (() => {
  let ctx;
  const init = () => {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
  };

  const playTone = (freq, duration, type = 'sine', volume = 0.15) => {
    if (!ctx) return;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    gain.gain.setValueAtTime(volume, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + duration);
  };

  return {
    init,
    catch: () => {
      playTone(523, 0.1, 'sine', 0.12);
      setTimeout(() => playTone(659, 0.1, 'sine', 0.12), 50);
      setTimeout(() => playTone(784, 0.15, 'sine', 0.12), 100);
    },
    miss: () => {
      playTone(200, 0.3, 'sawtooth', 0.08);
      setTimeout(() => playTone(150, 0.3, 'sawtooth', 0.08), 100);
    },
    combo: (n) => {
      const base = 523 + n * 80;
      playTone(base, 0.15, 'sine', 0.1);
      setTimeout(() => playTone(base * 1.25, 0.15, 'sine', 0.1), 60);
      setTimeout(() => playTone(base * 1.5, 0.2, 'sine', 0.1), 120);
    },
    gameOver: () => {
      playTone(400, 0.2, 'square', 0.08);
      setTimeout(() => playTone(350, 0.2, 'square', 0.08), 200);
      setTimeout(() => playTone(300, 0.2, 'square', 0.08), 400);
      setTimeout(() => playTone(200, 0.5, 'square', 0.08), 600);
    },
    levelUp: () => {
      [523, 587, 659, 698, 784, 880, 988, 1047].forEach((f, i) => {
        setTimeout(() => playTone(f, 0.12, 'sine', 0.1), i * 60);
      });
    }
  };
})();

// ============ GAME ENGINE ============
const canvas = document.getElementById('gameCanvas');
const c = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Fruit types
const FRUITS = [
  { emoji: '🍎', color: '#FF4444', points: 1, size: 52 },
  { emoji: '🍊', color: '#FF8C00', points: 1, size: 52 },
  { emoji: '🍋', color: '#FFD700', points: 1, size: 48 },
  { emoji: '🍇', color: '#8B45FF', points: 2, size: 54 },
  { emoji: '🍓', color: '#FF3366', points: 1, size: 46 },
  { emoji: '🍑', color: '#FFAA88', points: 1, size: 50 },
  { emoji: '🍒', color: '#CC2244', points: 2, size: 44 },
  { emoji: '🥝', color: '#7CBB00', points: 2, size: 46 },
  { emoji: '🍌', color: '#FFE135', points: 1, size: 52 },
  { emoji: '🫐', color: '#4466FF', points: 3, size: 40 },
  { emoji: '🍉', color: '#44BB44', points: 2, size: 58 },
  { emoji: '⭐', color: '#FFD700', points: 5, size: 48, special: true },
];

// Game state
let game = {
  running: false,
  score: 0,
  lives: 3,
  level: 1,
  combo: 0,
  maxCombo: 0,
  highScore: parseInt(localStorage.getItem('fruitCatcherHigh') || '0'),
  basketX: 0,
  basketTargetX: 0,
  fruits: [],
  particles: [],
  bgStars: [],
  clouds: [],
  spawnTimer: 0,
  spawnInterval: 1200,
  difficulty: 1,
  shakeAmount: 0,
  flashAlpha: 0,
  flashColor: '#fff',
  comboTimer: 0,
  fruitsCaught: 0,
  nextLevelAt: 10,
};

// Input
let keys = {};
let mouseX = null;
window.addEventListener('keydown', e => { keys[e.key] = true; e.preventDefault(); });
window.addEventListener('keyup', e => { keys[e.key] = false; });
window.addEventListener('mousemove', e => { mouseX = e.clientX; });
window.addEventListener('touchmove', e => {
  e.preventDefault();
  mouseX = e.touches[0].clientX;
}, { passive: false });
window.addEventListener('touchstart', e => {
  mouseX = e.touches[0].clientX;
});

// Initialize background
function initBackground() {
  game.bgStars = [];
  for (let i = 0; i < 80; i++) {
    game.bgStars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      size: Math.random() * 2.5 + 0.5,
      twinkle: Math.random() * Math.PI * 2,
      speed: Math.random() * 0.02 + 0.01
    });
  }
  game.clouds = [];
  for (let i = 0; i < 5; i++) {
    game.clouds.push({
      x: Math.random() * W,
      y: Math.random() * H * 0.4 + 30,
      w: Math.random() * 200 + 100,
      speed: Math.random() * 0.3 + 0.1,
      opacity: Math.random() * 0.06 + 0.03
    });
  }
}

// ============ DRAWING ============

function drawBackground(time) {
  // Sky gradient
  const grad = c.createLinearGradient(0, 0, 0, H);
  const lerp = (a, b, t) => a + (b - a) * t;
  const lvl = Math.min(game.level, 10);
  const t = (lvl - 1) / 9;

  // Transition from day to sunset to night as levels progress
  const r1 = Math.round(lerp(70, 15, t));
  const g1 = Math.round(lerp(130, 10, t));
  const b1 = Math.round(lerp(220, 50, t));
  const r2 = Math.round(lerp(135, 40, t));
  const g2 = Math.round(lerp(206, 20, t));
  const b2 = Math.round(lerp(235, 80, t));
  const r3 = Math.round(lerp(200, 60, t));
  const g3 = Math.round(lerp(230, 30, t));
  const b3 = Math.round(lerp(255, 100, t));

  grad.addColorStop(0, `rgb(${r1},${g1},${b1})`);
  grad.addColorStop(0.5, `rgb(${r2},${g2},${b2})`);
  grad.addColorStop(1, `rgb(${r3},${g3},${b3})`);
  c.fillStyle = grad;
  c.fillRect(0, 0, W, H);

  // Stars (more visible at higher levels)
  const starAlpha = 0.3 + t * 0.7;
  game.bgStars.forEach(star => {
    star.twinkle += star.speed;
    const a = (Math.sin(star.twinkle) * 0.5 + 0.5) * starAlpha;
    c.beginPath();
    c.arc(star.x, star.y, star.size, 0, Math.PI * 2);
    c.fillStyle = `rgba(255, 255, 240, ${a})`;
    c.fill();
  });

  // Clouds
  game.clouds.forEach(cloud => {
    cloud.x += cloud.speed;
    if (cloud.x > W + cloud.w) cloud.x = -cloud.w;
    c.fillStyle = `rgba(255, 255, 255, ${cloud.opacity})`;
    c.beginPath();
    c.ellipse(cloud.x, cloud.y, cloud.w / 2, 30, 0, 0, Math.PI * 2);
    c.fill();
    c.beginPath();
    c.ellipse(cloud.x - cloud.w * 0.2, cloud.y - 10, cloud.w * 0.3, 25, 0, 0, Math.PI * 2);
    c.fill();
    c.beginPath();
    c.ellipse(cloud.x + cloud.w * 0.2, cloud.y - 5, cloud.w * 0.25, 22, 0, 0, Math.PI * 2);
    c.fill();
  });

  // Ground
  const groundGrad = c.createLinearGradient(0, H - 60, 0, H);
  const gr1 = Math.round(lerp(76, 30, t));
  const gg1 = Math.round(lerp(175, 80, t));
  const gb1 = Math.round(lerp(80, 40, t));
  const gr2 = Math.round(lerp(56, 20, t));
  const gg2 = Math.round(lerp(145, 60, t));
  const gb2 = Math.round(lerp(60, 30, t));
  groundGrad.addColorStop(0, `rgb(${gr1},${gg1},${gb1})`);
  groundGrad.addColorStop(1, `rgb(${gr2},${gg2},${gb2})`);
  c.fillStyle = groundGrad;
  c.fillRect(0, H - 60, W, 60);

  // Grass blades
  c.strokeStyle = `rgba(${Math.round(lerp(100,40,t))}, ${Math.round(lerp(200,90,t))}, ${Math.round(lerp(100,50,t))}, 0.5)`;
  c.lineWidth = 2;
  for (let i = 0; i < W; i += 12) {
    const sway = Math.sin(time * 0.001 + i * 0.05) * 5;
    c.beginPath();
    c.moveTo(i, H - 58);
    c.quadraticCurveTo(i + sway, H - 75, i + sway * 1.5, H - 80);
    c.stroke();
  }
}

function drawBasket(x, y, time) {
  const bw = 120;
  const bh = 70;
  const bx = x - bw / 2;
  const by = y;

  // Shadow
  c.save();
  c.globalAlpha = 0.2;
  c.beginPath();
  c.ellipse(x, y + bh + 5, bw / 2 + 5, 10, 0, 0, Math.PI * 2);
  c.fillStyle = '#000';
  c.fill();
  c.restore();

  // Basket body - woven look
  c.save();

  // Main basket shape
  c.beginPath();
  c.moveTo(bx + 10, by);
  c.lineTo(bx + bw - 10, by);
  c.quadraticCurveTo(bx + bw + 5, by + bh * 0.5, bx + bw - 15, by + bh);
  c.lineTo(bx + 15, by + bh);
  c.quadraticCurveTo(bx - 5, by + bh * 0.5, bx + 10, by);
  c.closePath();

  const basketGrad = c.createLinearGradient(bx, by, bx, by + bh);
  basketGrad.addColorStop(0, '#D2691E');
  basketGrad.addColorStop(0.3, '#CD853F');
  basketGrad.addColorStop(0.6, '#A0522D');
  basketGrad.addColorStop(1, '#8B4513');
  c.fillStyle = basketGrad;
  c.fill();
  c.strokeStyle = '#6B3410';
  c.lineWidth = 2;
  c.stroke();

  // Weave lines
  c.strokeStyle = 'rgba(139, 69, 19, 0.4)';
  c.lineWidth = 1.5;
  for (let i = 1; i < 4; i++) {
    const ly = by + (bh / 4) * i;
    c.beginPath();
    c.moveTo(bx + 12 + i * 2, ly);
    c.lineTo(bx + bw - 12 - i * 2, ly);
    c.stroke();
  }

  // Rim
  c.beginPath();
  c.moveTo(bx + 5, by);
  c.lineTo(bx + bw - 5, by);
  c.strokeStyle = '#8B4513';
  c.lineWidth = 6;
  c.lineCap = 'round';
  c.stroke();

  // Rim highlight
  c.beginPath();
  c.moveTo(bx + 8, by - 1);
  c.lineTo(bx + bw - 8, by - 1);
  c.strokeStyle = 'rgba(255, 220, 150, 0.4)';
  c.lineWidth = 2;
  c.stroke();

  c.restore();

  // Cute face on basket
  const faceY = by + bh * 0.45;
  // Eyes
  c.fillStyle = '#4a2800';
  c.beginPath();
  c.ellipse(x - 18, faceY, 5, 6, 0, 0, Math.PI * 2);
  c.fill();
  c.beginPath();
  c.ellipse(x + 18, faceY, 5, 6, 0, 0, Math.PI * 2);
  c.fill();
  // Eye shine
  c.fillStyle = '#fff';
  c.beginPath();
  c.arc(x - 16, faceY - 2, 2, 0, Math.PI * 2);
  c.fill();
  c.beginPath();
  c.arc(x + 20, faceY - 2, 2, 0, Math.PI * 2);
  c.fill();
  // Smile
  c.strokeStyle = '#4a2800';
  c.lineWidth = 2.5;
  c.lineCap = 'round';
  c.beginPath();
  c.arc(x, faceY + 5, 14, 0.1 * Math.PI, 0.9 * Math.PI);
  c.stroke();
  // Blush
  c.fillStyle = 'rgba(255, 150, 150, 0.3)';
  c.beginPath();
  c.ellipse(x - 28, faceY + 8, 8, 5, 0, 0, Math.PI * 2);
  c.fill();
  c.beginPath();
  c.ellipse(x + 28, faceY + 8, 8, 5, 0, 0, Math.PI * 2);
  c.fill();
}

function drawFruit(fruit, time) {
  c.save();
  c.translate(fruit.x, fruit.y);

  // Rotation
  c.rotate(fruit.rotation);

  // Glow for special items
  if (fruit.special) {
    c.shadowColor = '#FFD700';
    c.shadowBlur = 20 + Math.sin(time * 0.005) * 10;
  }

  // Shadow underneath
  c.globalAlpha = 0.15;
  c.beginPath();
  c.ellipse(3, 3, fruit.size * 0.4, fruit.size * 0.4, 0, 0, Math.PI * 2);
  c.fillStyle = '#000';
  c.fill();
  c.globalAlpha = 1;

  // Draw emoji
  c.font = `${fruit.size}px serif`;
  c.textAlign = 'center';
  c.textBaseline = 'middle';
  c.fillText(fruit.emoji, 0, 0);

  c.restore();
}

function drawParticles() {
  game.particles.forEach(p => {
    c.save();
    c.globalAlpha = p.alpha;
    c.translate(p.x, p.y);

    if (p.type === 'sparkle') {
      c.rotate(p.rotation);
      const s = p.size;
      c.fillStyle = p.color;
      // Star shape
      c.beginPath();
      for (let i = 0; i < 5; i++) {
        const angle = (i * 4 * Math.PI) / 5 - Math.PI / 2;
        const method = i === 0 ? 'moveTo' : 'lineTo';
        c[method](Math.cos(angle) * s, Math.sin(angle) * s);
      }
      c.closePath();
      c.fill();
    } else if (p.type === 'ring') {
      c.beginPath();
      c.arc(0, 0, p.size, 0, Math.PI * 2);
      c.strokeStyle = p.color;
      c.lineWidth = 3;
      c.stroke();
    } else {
      c.beginPath();
      c.arc(0, 0, p.size, 0, Math.PI * 2);
      c.fillStyle = p.color;
      c.fill();
    }

    c.restore();
  });
}

function drawScorePopup(popup) {
  c.save();
  c.globalAlpha = popup.alpha;
  c.font = `bold ${popup.size}px 'Nunito', sans-serif`;
  c.textAlign = 'center';
  c.textBaseline = 'middle';
  c.fillStyle = popup.color;
  c.strokeStyle = 'rgba(0,0,0,0.3)';
  c.lineWidth = 3;
  c.strokeText(popup.text, popup.x, popup.y);
  c.fillText(popup.text, popup.x, popup.y);
  c.restore();
}

// ============ GAME LOGIC ============

let scorePopups = [];

function spawnFruit() {
  const margin = 60;
  const x = margin + Math.random() * (W - margin * 2);

  // Choose fruit - stars are rare
  let fruitType;
  const rand = Math.random();
  if (rand < 0.03) {
    fruitType = FRUITS[FRUITS.length - 1]; // star
  } else {
    fruitType = FRUITS[Math.floor(Math.random() * (FRUITS.length - 1))];
  }

  const baseSpeed = 1.5 + game.level * 0.3;
  const speed = baseSpeed + Math.random() * 1.2;

  game.fruits.push({
    x,
    y: -50,
    speed,
    emoji: fruitType.emoji,
    color: fruitType.color,
    points: fruitType.points,
    size: fruitType.size,
    special: fruitType.special || false,
    rotation: 0,
    rotSpeed: (Math.random() - 0.5) * 0.04,
    wobble: Math.random() * Math.PI * 2,
    wobbleSpeed: Math.random() * 0.02 + 0.01,
    wobbleAmp: Math.random() * 0.5 + 0.3,
  });
}

function spawnParticles(x, y, color, count = 12) {
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count + Math.random() * 0.3;
    const speed = 2 + Math.random() * 4;
    game.particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      size: Math.random() * 5 + 3,
      alpha: 1,
      color: color,
      type: Math.random() > 0.5 ? 'sparkle' : 'circle',
      rotation: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.2,
      life: 1,
      decay: 0.015 + Math.random() * 0.01,
    });
  }
  // Ring effect
  game.particles.push({
    x, y,
    vx: 0, vy: 0,
    size: 5,
    alpha: 0.6,
    color: color,
    type: 'ring',
    rotation: 0,
    rotSpeed: 0,
    life: 1,
    decay: 0.03,
  });
}

function spawnMissParticles(x, y) {
  for (let i = 0; i < 6; i++) {
    game.particles.push({
      x: x + (Math.random() - 0.5) * 30,
      y,
      vx: (Math.random() - 0.5) * 2,
      vy: -Math.random() * 3 - 1,
      size: Math.random() * 4 + 2,
      alpha: 0.8,
      color: '#FF4444',
      type: 'circle',
      rotation: 0,
      rotSpeed: 0,
      life: 1,
      decay: 0.02,
    });
  }
}

function addScorePopup(x, y, text, color) {
  scorePopups.push({
    x, y,
    text,
    color,
    alpha: 1,
    size: 32,
    vy: -2,
  });
}

function updateBasket(dt) {
  const basketSpeed = 12;
  const halfW = 60;

  if (mouseX !== null) {
    game.basketTargetX = mouseX;
  }

  if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
    game.basketTargetX = game.basketX - basketSpeed * dt;
    mouseX = null;
  }
  if (keys['ArrowRight'] || keys['d'] || keys['D']) {
    game.basketTargetX = game.basketX + basketSpeed * dt;
    mouseX = null;
  }

  // Clamp
  game.basketTargetX = Math.max(halfW, Math.min(W - halfW, game.basketTargetX));

  // Smooth interpolation
  game.basketX += (game.basketTargetX - game.basketX) * 0.15;
}

function updateFruits(dt, time) {
  const basketY = H - 120;
  const catchZoneTop = basketY - 10;
  const catchZoneBottom = basketY + 50;
  const halfBasket = 65;

  for (let i = game.fruits.length - 1; i >= 0; i--) {
    const f = game.fruits[i];
    f.y += f.speed * dt * 0.06;
    f.rotation += f.rotSpeed;
    f.wobble += f.wobbleSpeed;
    f.x += Math.sin(f.wobble) * f.wobbleAmp;

    // Check catch
    if (f.y >= catchZoneTop && f.y <= catchZoneBottom) {
      if (Math.abs(f.x - game.basketX) < halfBasket) {
        // Caught!
        game.combo++;
        if (game.combo > game.maxCombo) game.maxCombo = game.combo;
        game.fruitsCaught++;

        const comboMultiplier = Math.min(game.combo, 5);
        const points = f.points * comboMultiplier;
        game.score += points;

        // Effects
        spawnParticles(f.x, f.y, f.color, f.special ? 20 : 12);
        AudioEngine.catch();

        let popText = `+${points}`;
        if (game.combo >= 3) {
          popText += ` x${comboMultiplier}`;
          AudioEngine.combo(game.combo);
        }
        addScorePopup(f.x, f.y - 20, popText, f.special ? '#FFD700' : '#FFFFFF');

        // Show combo display
        if (game.combo >= 3) {
          const comboEl = document.getElementById('combo-display');
          comboEl.textContent = `🔥 ${game.combo}x Combo!`;
          comboEl.style.opacity = '1';
          game.comboTimer = 60;
        }

        // Screen flash
        game.flashAlpha = 0.15;
        game.flashColor = f.color;

        // Level up check
        if (game.fruitsCaught >= game.nextLevelAt) {
          game.level++;
          game.nextLevelAt += 10 + game.level * 2;
          game.spawnInterval = Math.max(400, 1200 - game.level * 80);
          document.getElementById('level-badge').textContent = `Level ${game.level}`;
          document.getElementById('level-badge').style.animation = 'none';
          void document.getElementById('level-badge').offsetHeight;
          document.getElementById('level-badge').style.animation = 'bounceIn 0.5s ease-out';
          AudioEngine.levelUp();
          game.flashAlpha = 0.3;
          game.flashColor = '#FFD700';
        }

        updateUI();
        game.fruits.splice(i, 1);
        continue;
      }
    }

    // Check miss
    if (f.y > H + 50) {
      game.lives--;
      game.combo = 0;
      game.shakeAmount = 10;
      spawnMissParticles(f.x, H - 60);
      AudioEngine.miss();

      // Hide combo display
      document.getElementById('combo-display').style.opacity = '0';

      updateUI();
      game.fruits.splice(i, 1);

      if (game.lives <= 0) {
        endGame();
      }
    }
  }
}

function updateParticles(dt) {
  for (let i = game.particles.length - 1; i >= 0; i--) {
    const p = game.particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.1; // gravity
    p.life -= p.decay;
    p.alpha = Math.max(0, p.life);
    p.rotation += p.rotSpeed;
    if (p.type === 'ring') {
      p.size += 2;
    }
    if (p.life <= 0) {
      game.particles.splice(i, 1);
    }
  }
}

function updateScorePopups() {
  for (let i = scorePopups.length - 1; i >= 0; i--) {
    const p = scorePopups[i];
    p.y += p.vy;
    p.alpha -= 0.015;
    p.size += 0.3;
    if (p.alpha <= 0) {
      scorePopups.splice(i, 1);
    }
  }
}

function updateUI() {
  document.getElementById('score-display').textContent = game.score;

  for (let i = 1; i <= 3; i++) {
    const heart = document.getElementById(`heart-${i}`);
    if (i > game.lives) {
      heart.classList.add('lost');
    } else {
      heart.classList.remove('lost');
    }
  }
}

function updateEffects() {
  if (game.shakeAmount > 0) {
    game.shakeAmount *= 0.9;
    if (game.shakeAmount < 0.5) game.shakeAmount = 0;
  }
  if (game.flashAlpha > 0) {
    game.flashAlpha *= 0.92;
    if (game.flashAlpha < 0.01) game.flashAlpha = 0;
  }
  if (game.comboTimer > 0) {
    game.comboTimer--;
    if (game.comboTimer <= 0) {
      document.getElementById('combo-display').style.opacity = '0';
    }
  }
}

// ============ GAME LOOP ============

let lastTime = 0;
let animFrame;

function gameLoop(timestamp) {
  const dt = Math.min(timestamp - lastTime, 50);
  lastTime = timestamp;

  if (!game.running) return;

  // Spawn fruits
  game.spawnTimer += dt;
  if (game.spawnTimer >= game.spawnInterval) {
    game.spawnTimer = 0;
    spawnFruit();
    // Sometimes spawn extra fruit at higher levels
    if (game.level >= 3 && Math.random() < 0.3) {
      setTimeout(() => { if (game.running) spawnFruit(); }, 200);
    }
    if (game.level >= 6 && Math.random() < 0.2) {
      setTimeout(() => { if (game.running) spawnFruit(); }, 400);
    }
  }

  // Update
  updateBasket(dt);
  updateFruits(dt, timestamp);
  updateParticles(dt);
  updateScorePopups();
  updateEffects();

  // Draw
  c.save();

  // Screen shake
  if (game.shakeAmount > 0) {
    const sx = (Math.random() - 0.5) * game.shakeAmount;
    const sy = (Math.random() - 0.5) * game.shakeAmount;
    c.translate(sx, sy);
  }

  drawBackground(timestamp);

  // Draw fruits
  game.fruits.forEach(f => drawFruit(f, timestamp));

  // Draw basket
  drawBasket(game.basketX, H - 120, timestamp);

  // Draw particles
  drawParticles();

  // Draw score popups
  scorePopups.forEach(p => drawScorePopup(p));

  // Flash effect
  if (game.flashAlpha > 0) {
    c.fillStyle = game.flashColor;
    c.globalAlpha = game.flashAlpha;
    c.fillRect(0, 0, W, H);
    c.globalAlpha = 1;
  }

  c.restore();

  animFrame = requestAnimationFrame(gameLoop);
}

// ============ GAME MANAGEMENT ============

function startGame() {
  AudioEngine.init();

  game.running = true;
  game.score = 0;
  game.lives = 3;
  game.level = 1;
  game.combo = 0;
  game.maxCombo = 0;
  game.fruits = [];
  game.particles = [];
  game.spawnTimer = 0;
  game.spawnInterval = 1200;
  game.shakeAmount = 0;
  game.flashAlpha = 0;
  game.comboTimer = 0;
  game.fruitsCaught = 0;
  game.nextLevelAt = 10;
  game.basketX = W / 2;
  game.basketTargetX = W / 2;
  mouseX = null;
  scorePopups = [];

  initBackground();
  updateUI();
  document.getElementById('level-badge').textContent = 'Level 1';
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('game-over-screen').style.display = 'none';
  document.getElementById('combo-display').style.opacity = '0';

  lastTime = performance.now();
  animFrame = requestAnimationFrame(gameLoop);
}

function endGame() {
  game.running = false;
  cancelAnimationFrame(animFrame);

  AudioEngine.gameOver();

  if (game.score > game.highScore) {
    game.highScore = game.score;
    localStorage.setItem('fruitCatcherHigh', game.highScore.toString());
  }

  document.getElementById('final-score').textContent = `Score: ${game.score}`;
  document.getElementById('high-score-text').textContent = `Best: ${game.highScore}`;

  setTimeout(() => {
    document.getElementById('game-over-screen').style.display = 'flex';
  }, 500);
}

// ============ EVENT LISTENERS ============

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('restart-btn').addEventListener('click', startGame);

// Allow spacebar/enter to start
window.addEventListener('keydown', e => {
  if ((e.key === ' ' || e.key === 'Enter') && !game.running) {
    const startScreen = document.getElementById('start-screen');
    const overScreen = document.getElementById('game-over-screen');
    if (startScreen.style.display !== 'none' || overScreen.style.display === 'flex') {
      startGame();
    }
  }
});

// Draw initial background
initBackground();
function drawIdleBackground() {
  if (!game.running) {
    drawBackground(performance.now());
    requestAnimationFrame(drawIdleBackground);
  }
}
drawIdleBackground();

// Prevent scrolling on mobile
document.body.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
</script>
