<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solar System Explorer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    color: #e0e0e0;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
  }
  #canvas-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }
  canvas { display: block; }

  /* Top bar */
  .top-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 56px;
    background: linear-gradient(180deg, rgba(10,10,30,0.95) 0%, rgba(10,10,30,0.7) 100%);
    backdrop-filter: blur(12px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    z-index: 100;
    border-bottom: 1px solid rgba(100,140,255,0.15);
  }
  .top-bar h1 {
    font-size: 20px;
    font-weight: 600;
    background: linear-gradient(135deg, #6eb1ff, #b088f9);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 1px;
  }
  .top-bar .subtitle {
    font-size: 11px;
    color: rgba(180,190,220,0.6);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* Controls panel */
  .controls-panel {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(12,12,35,0.88);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(100,140,255,0.18);
    border-radius: 16px;
    padding: 16px 28px;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 20px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
  }
  .controls-panel label {
    font-size: 12px;
    color: rgba(180,190,220,0.8);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    white-space: nowrap;
  }
  .controls-panel .speed-value {
    font-size: 14px;
    font-weight: 600;
    color: #6eb1ff;
    min-width: 40px;
    text-align: center;
  }
  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 180px;
    height: 4px;
    background: linear-gradient(90deg, rgba(110,177,255,0.3), rgba(176,136,249,0.3));
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: linear-gradient(135deg, #6eb1ff, #b088f9);
    box-shadow: 0 0 10px rgba(110,177,255,0.5);
    cursor: pointer;
  }
  input[type="range"]::-moz-range-thumb {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: linear-gradient(135deg, #6eb1ff, #b088f9);
    box-shadow: 0 0 10px rgba(110,177,255,0.5);
    border: none;
    cursor: pointer;
  }
  .btn {
    padding: 8px 16px;
    border: 1px solid rgba(100,140,255,0.25);
    background: rgba(100,140,255,0.1);
    color: #8ab4f8;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .btn:hover {
    background: rgba(100,140,255,0.2);
    border-color: rgba(100,140,255,0.4);
  }
  .btn.active {
    background: rgba(100,140,255,0.25);
    border-color: rgba(100,140,255,0.5);
    color: #fff;
  }

  /* Info panel */
  .info-panel {
    position: fixed;
    top: 72px;
    right: 20px;
    width: 320px;
    background: rgba(12,12,35,0.92);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(100,140,255,0.18);
    border-radius: 16px;
    padding: 0;
    z-index: 100;
    box-shadow: 0 12px 48px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
    transform: translateX(360px);
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    overflow: hidden;
  }
  .info-panel.visible {
    transform: translateX(0);
  }
  .info-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid rgba(100,140,255,0.1);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .info-header .planet-name {
    font-size: 22px;
    font-weight: 700;
  }
  .info-header .close-btn {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.05);
    color: rgba(255,255,255,0.6);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    transition: all 0.2s;
  }
  .info-header .close-btn:hover {
    background: rgba(255,255,255,0.1);
    color: #fff;
  }
  .info-body {
    padding: 16px 24px 24px;
  }
  .info-body .planet-icon {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    margin: 0 auto 16px;
    display: block;
    box-shadow: 0 0 20px rgba(100,140,255,0.2);
  }
  .info-body .description {
    font-size: 13px;
    line-height: 1.7;
    color: rgba(200,210,230,0.85);
    margin-bottom: 16px;
  }
  .info-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .stat-item {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(100,140,255,0.08);
    border-radius: 10px;
    padding: 10px 12px;
  }
  .stat-item .stat-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: rgba(180,190,220,0.5);
    margin-bottom: 4px;
  }
  .stat-item .stat-value {
    font-size: 14px;
    font-weight: 600;
    color: #b0c4de;
  }

  /* Planet list sidebar */
  .planet-list {
    position: fixed;
    top: 72px;
    left: 20px;
    z-index: 100;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .planet-list-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 14px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    background: rgba(12,12,35,0.6);
    backdrop-filter: blur(8px);
    border: 1px solid transparent;
  }
  .planet-list-item:hover {
    background: rgba(30,30,70,0.7);
    border-color: rgba(100,140,255,0.15);
  }
  .planet-list-item.active {
    background: rgba(40,40,90,0.7);
    border-color: rgba(100,140,255,0.3);
  }
  .planet-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .planet-list-item span {
    font-size: 13px;
    color: rgba(200,210,230,0.8);
    letter-spacing: 0.5px;
  }

  /* Tooltip */
  .tooltip {
    position: fixed;
    padding: 6px 12px;
    background: rgba(12,12,35,0.9);
    border: 1px solid rgba(100,140,255,0.2);
    border-radius: 8px;
    font-size: 12px;
    color: #b0c4de;
    pointer-events: none;
    z-index: 200;
    opacity: 0;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
  .tooltip.visible {
    opacity: 1;
  }

  /* Loading screen */
  .loading {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #060614;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    transition: opacity 0.8s;
  }
  .loading.hidden {
    opacity: 0;
    pointer-events: none;
  }
  .loading-spinner {
    width: 48px;
    height: 48px;
    border: 3px solid rgba(110,177,255,0.15);
    border-top-color: #6eb1ff;
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  .loading p {
    margin-top: 16px;
    color: rgba(180,190,220,0.6);
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* Instructions */
  .instructions {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: rgba(180,190,220,0.35);
    letter-spacing: 1px;
    z-index: 50;
    text-align: center;
    pointer-events: none;
    transition: opacity 2s;
  }
</style>
</head>
<body>

<div class="loading" id="loading">
  <div class="loading-spinner"></div>
  <p>Loading Solar System</p>
</div>

<div id="canvas-container"></div>

<div class="top-bar">
  <div>
    <h1>☀ Solar System Explorer</h1>
  </div>
  <div class="subtitle">Interactive 3D Visualization</div>
</div>

<div class="planet-list" id="planet-list"></div>

<div class="info-panel" id="info-panel">
  <div class="info-header">
    <div class="planet-name" id="planet-name">Earth</div>
    <button class="close-btn" id="close-info">✕</button>
  </div>
  <div class="info-body">
    <canvas class="planet-icon" id="planet-icon" width="60" height="60"></canvas>
    <div class="description" id="planet-desc"></div>
    <div class="info-stats" id="planet-stats"></div>
  </div>
</div>

<div class="controls-panel">
  <label>Orbit Speed</label>
  <input type="range" id="speed-slider" min="0" max="5" step="0.1" value="1">
  <span class="speed-value" id="speed-value">1.0×</span>
  <button class="btn" id="toggle-orbits">Orbits</button>
  <button class="btn" id="toggle-labels">Labels</button>
  <button class="btn" id="reset-camera">Reset View</button>
</div>

<div class="tooltip" id="tooltip"></div>
<div class="instructions" id="instructions">Drag to rotate · Scroll to zoom · Click a planet for details</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============================================================
// OrbitControls (inline minimal version)
// ============================================================
THREE.OrbitControls = function(object, domElement) {
  this.object = object;
  this.domElement = domElement;
  this.enabled = true;
  this.target = new THREE.Vector3();
  this.minDistance = 10;
  this.maxDistance = 800;
  this.enableDamping = true;
  this.dampingFactor = 0.08;
  this.rotateSpeed = 0.5;
  this.zoomSpeed = 1.2;
  this.autoRotate = false;
  this.autoRotateSpeed = 0.5;

  var scope = this;
  var spherical = new THREE.Spherical();
  var sphericalDelta = new THREE.Spherical();
  var scale = 1;
  var panOffset = new THREE.Vector3();
  var rotateStart = new THREE.Vector2();
  var rotateEnd = new THREE.Vector2();
  var rotateDelta = new THREE.Vector2();
  var state = -1; // -1: none, 0: rotate, 1: zoom, 2: pan
  var EPS = 0.000001;

  this.update = function() {
    var offset = new THREE.Vector3();
    var quat = new THREE.Quaternion().setFromUnitVectors(object.up, new THREE.Vector3(0,1,0));
    var quatInverse = quat.clone().invert();
    var lastPosition = new THREE.Vector3();

    return function() {
      var position = scope.object.position;
      offset.copy(position).sub(scope.target);
      offset.applyQuaternion(quat);
      spherical.setFromVector3(offset);

      if (scope.autoRotate && state === -1) {
        sphericalDelta.theta -= 2 * Math.PI / 60 / 60 * scope.autoRotateSpeed;
      }

      if (scope.enableDamping) {
        spherical.theta += sphericalDelta.theta * scope.dampingFactor;
        spherical.phi += sphericalDelta.phi * scope.dampingFactor;
      } else {
        spherical.theta += sphericalDelta.theta;
        spherical.phi += sphericalDelta.phi;
      }

      spherical.phi = Math.max(EPS, Math.min(Math.PI - EPS, spherical.phi));
      spherical.radius *= scale;
      spherical.radius = Math.max(scope.minDistance, Math.min(scope.maxDistance, spherical.radius));

      scope.target.add(panOffset);
      offset.setFromSpherical(spherical);
      offset.applyQuaternion(quatInverse);
      position.copy(scope.target).add(offset);
      scope.object.lookAt(scope.target);

      if (scope.enableDamping) {
        sphericalDelta.theta *= (1 - scope.dampingFactor);
        sphericalDelta.phi *= (1 - scope.dampingFactor);
      } else {
        sphericalDelta.set(0,0,0);
      }
      scale = 1;
      panOffset.set(0,0,0);

      if (lastPosition && position.distanceTo(lastPosition) > EPS) {
        lastPosition.copy(position);
        return true;
      }
      return false;
    };
  }();

  function onMouseDown(event) {
    if (!scope.enabled) return;
    if (event.button === 0) {
      state = 0;
      rotateStart.set(event.clientX, event.clientY);
    } else if (event.button === 2) {
      state = 2;
      rotateStart.set(event.clientX, event.clientY);
    }
    if (state !== -1) {
      document.addEventListener('mousemove', onMouseMove, false);
      document.addEventListener('mouseup', onMouseUp, false);
    }
  }

  function onMouseMove(event) {
    if (!scope.enabled) return;
    if (state === 0) {
      rotateEnd.set(event.clientX, event.clientY);
      rotateDelta.subVectors(rotateEnd, rotateStart);
      sphericalDelta.theta -= 2 * Math.PI * rotateDelta.x / domElement.clientHeight * scope.rotateSpeed;
      sphericalDelta.phi -= 2 * Math.PI * rotateDelta.y / domElement.clientHeight * scope.rotateSpeed;
      rotateStart.copy(rotateEnd);
    } else if (state === 2) {
      rotateEnd.set(event.clientX, event.clientY);
      rotateDelta.subVectors(rotateEnd, rotateStart);
      var offset = new THREE.Vector3();
      var position = scope.object.position;
      offset.copy(position).sub(scope.target);
      var targetDistance = offset.length();
      targetDistance *= Math.tan((scope.object.fov / 2) * Math.PI / 180.0);
      var panLeft = new THREE.Vector3();
      panLeft.setFromMatrixColumn(scope.object.matrix, 0);
      panLeft.multiplyScalar(-2 * rotateDelta.x * targetDistance / domElement.clientHeight);
      var panUp = new THREE.Vector3();
      panUp.setFromMatrixColumn(scope.object.matrix, 1);
      panUp.multiplyScalar(2 * rotateDelta.y * targetDistance / domElement.clientHeight);
      panOffset.add(panLeft).add(panUp);
      rotateStart.copy(rotateEnd);
    }
  }

  function onMouseUp() {
    state = -1;
    document.removeEventListener('mousemove', onMouseMove, false);
    document.removeEventListener('mouseup', onMouseUp, false);
  }

  function onWheel(event) {
    if (!scope.enabled) return;
    event.preventDefault();
    if (event.deltaY < 0) {
      scale /= Math.pow(0.95, scope.zoomSpeed);
    } else {
      scale *= Math.pow(0.95, scope.zoomSpeed);
    }
  }

  // Touch support
  var touchStart = new THREE.Vector2();
  var touchStartDist = 0;

  function onTouchStart(event) {
    if (!scope.enabled) return;
    if (event.touches.length === 1) {
      state = 0;
      rotateStart.set(event.touches[0].clientX, event.touches[0].clientY);
    } else if (event.touches.length === 2) {
      state = 1;
      var dx = event.touches[0].clientX - event.touches[1].clientX;
      var dy = event.touches[0].clientY - event.touches[1].clientY;
      touchStartDist = Math.sqrt(dx*dx + dy*dy);
    }
  }

  function onTouchMove(event) {
    if (!scope.enabled) return;
    event.preventDefault();
    if (state === 0 && event.touches.length === 1) {
      rotateEnd.set(event.touches[0].clientX, event.touches[0].clientY);
      rotateDelta.subVectors(rotateEnd, rotateStart);
      sphericalDelta.theta -= 2 * Math.PI * rotateDelta.x / domElement.clientHeight * scope.rotateSpeed;
      sphericalDelta.phi -= 2 * Math.PI * rotateDelta.y / domElement.clientHeight * scope.rotateSpeed;
      rotateStart.copy(rotateEnd);
    } else if (state === 1 && event.touches.length === 2) {
      var dx = event.touches[0].clientX - event.touches[1].clientX;
      var dy = event.touches[0].clientY - event.touches[1].clientY;
      var dist = Math.sqrt(dx*dx + dy*dy);
      if (dist > touchStartDist) {
        scale /= Math.pow(0.95, scope.zoomSpeed * 0.5);
      } else {
        scale *= Math.pow(0.95, scope.zoomSpeed * 0.5);
      }
      touchStartDist = dist;
    }
  }

  function onTouchEnd() {
    state = -1;
  }

  domElement.addEventListener('mousedown', onMouseDown, false);
  domElement.addEventListener('wheel', onWheel, { passive: false });
  domElement.addEventListener('touchstart', onTouchStart, { passive: false });
  domElement.addEventListener('touchmove', onTouchMove, { passive: false });
  domElement.addEventListener('touchend', onTouchEnd, false);
  domElement.addEventListener('contextmenu', function(e) { e.preventDefault(); }, false);

  this.dispose = function() {
    domElement.removeEventListener('mousedown', onMouseDown);
    domElement.removeEventListener('wheel', onWheel);
  };

  this.reset = function() {
    scope.target.set(0,0,0);
    scope.object.position.set(0, 80, 200);
    scope.object.lookAt(scope.target);
  };

  this.update();
};

// ============================================================
// Three.js Scene Setup
// ============================================================
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 2000);
camera.position.set(0, 100, 250);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
container.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 15;
controls.maxDistance = 600;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.15;

// ============================================================
// Starfield
// ============================================================
function createStarfield() {
  const starsGeometry = new THREE.BufferGeometry();
  const starCount = 8000;
  const positions = new Float32Array(starCount * 3);
  const colors = new Float32Array(starCount * 3);
  const sizes = new Float32Array(starCount);

  for (let i = 0; i < starCount; i++) {
    const r = 500 + Math.random() * 500;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    positions[i*3] = r * Math.sin(phi) * Math.cos(theta);
    positions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
    positions[i*3+2] = r * Math.cos(phi);

    const colorTemp = Math.random();
    if (colorTemp > 0.9) {
      colors[i*3] = 0.8; colors[i*3+1] = 0.85; colors[i*3+2] = 1.0;
    } else if (colorTemp > 0.7) {
      colors[i*3] = 1.0; colors[i*3+1] = 0.95; colors[i*3+2] = 0.8;
    } else {
      colors[i*3] = 0.9; colors[i*3+1] = 0.9; colors[i*3+2] = 0.92;
    }
    sizes[i] = 0.5 + Math.random() * 1.5;
  }

  starsGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  starsGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  starsGeometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

  const starsMaterial = new THREE.PointsMaterial({
    size: 1.0,
    vertexColors: true,
    transparent: true,
    opacity: 0.9,
    sizeAttenuation: true
  });

  return new THREE.Points(starsGeometry, starsMaterial);
}
scene.add(createStarfield());

// ============================================================
// Sun
// ============================================================
function createSun() {
  const group = new THREE.Group();

  // Sun sphere
  const sunGeo = new THREE.SphereGeometry(8, 64, 64);
  const sunMat = new THREE.MeshBasicMaterial({ color: 0xffcc33 });
  const sun = new THREE.Mesh(sunGeo, sunMat);
  group.add(sun);

  // Sun glow layers
  const glowColors = [0xffaa00, 0xff8800, 0xff6600];
  const glowSizes = [10, 12, 15];
  const glowOpacities = [0.15, 0.08, 0.04];

  for (let i = 0; i < glowColors.length; i++) {
    const glowGeo = new THREE.SphereGeometry(glowSizes[i], 32, 32);
    const glowMat = new THREE.MeshBasicMaterial({
      color: glowColors[i],
      transparent: true,
      opacity: glowOpacities[i],
      side: THREE.BackSide
    });
    group.add(new THREE.Mesh(glowGeo, glowMat));
  }

  // Corona sprite
  const canvas = document.createElement('canvas');
  canvas.width = 256;
  canvas.height = 256;
  const ctx = canvas.getContext('2d');
  const gradient = ctx.createRadialGradient(128, 128, 20, 128, 128, 128);
  gradient.addColorStop(0, 'rgba(255, 200, 50, 0.6)');
  gradient.addColorStop(0.3, 'rgba(255, 150, 0, 0.2)');
  gradient.addColorStop(0.6, 'rgba(255, 100, 0, 0.05)');
  gradient.addColorStop(1, 'rgba(255, 50, 0, 0)');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, 256, 256);

  const coronaTexture = new THREE.CanvasTexture(canvas);
  const coronaMat = new THREE.SpriteMaterial({
    map: coronaTexture,
    transparent: true,
    blending: THREE.AdditiveBlending
  });
  const corona = new THREE.Sprite(coronaMat);
  corona.scale.set(50, 50, 1);
  group.add(corona);

  // Point light
  const sunLight = new THREE.PointLight(0xfff5e0, 2.0, 600);
  group.add(sunLight);

  // Ambient light
  const ambientLight = new THREE.AmbientLight(0x222244, 0.3);
  scene.add(ambientLight);

  return { group, sun };
}

const sunObj = createSun();
scene.add(sunObj.group);

// ============================================================
// Create planet texture procedurally
// ============================================================
function createPlanetTexture(color1, color2, type) {
  const canvas = document.createElement('canvas');
  canvas.width = 256;
  canvas.height = 128;
  const ctx = canvas.getContext('2d');

  // Base color
  ctx.fillStyle = color1;
  ctx.fillRect(0, 0, 256, 128);

  // Add some variation
  const c1 = new THREE.Color(color1);
  const c2 = new THREE.Color(color2);

  for (let i = 0; i < 200; i++) {
    const x = Math.random() * 256;
    const y = Math.random() * 128;
    const w = 10 + Math.random() * 60;
    const h = 2 + Math.random() * 8;
    const t = Math.random();
    const c = c1.clone().lerp(c2, t);
    ctx.fillStyle = `rgba(${Math.floor(c.r*255)},${Math.floor(c.g*255)},${Math.floor(c.b*255)},${0.2+Math.random()*0.3})`;
    ctx.fillRect(x, y, w, h);
  }

  // Add bands for gas giants
  if (type === 'gas') {
    for (let i = 0; i < 12; i++) {
      const y = (i / 12) * 128;
      const h = 4 + Math.random() * 10;
      const t = Math.random();
      const c = c1.clone().lerp(c2, t);
      ctx.fillStyle = `rgba(${Math.floor(c.r*255)},${Math.floor(c.g*255)},${Math.floor(c.b*255)},${0.3+Math.random()*0.3})`;
      ctx.fillRect(0, y, 256, h);
    }
  }

  return new THREE.CanvasTexture(canvas);
}

// ============================================================
// Create Planets
// ============================================================
const planets = [];
const orbitLines = [];
const planetMeshes = [];

planetData.forEach((data, index) => {
  const group = new THREE.Group();

  // Planet mesh
  const isGas = ['Jupiter', 'Saturn', 'Uranus', 'Neptune'].includes(data.name);
  const texture = createPlanetTexture(data.color, data.color2, isGas ? 'gas' : 'rocky');
  const geo = new THREE.SphereGeometry(data.radius, 48, 48);
  const mat = new THREE.MeshStandardMaterial({
    map: texture,
    roughness: isGas ? 0.8 : 0.7,
    metalness: 0.1
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.rotation.z = data.tilt;
  mesh.userData = { planetIndex: index, name: data.name };
  group.add(mesh);

  // Atmosphere glow for Earth
  if (data.name === 'Earth') {
    const atmosGeo = new THREE.SphereGeometry(data.radius * 1.08, 48, 48);
    const atmosMat = new THREE.MeshBasicMaterial({
      color: 0x6699ff,
      transparent: true,
      opacity: 0.12,
      side: THREE.BackSide
    });
    group.add(new THREE.Mesh(atmosGeo, atmosMat));
  }

  // Rings for Saturn and Uranus
  if (data.hasRings) {
    const innerR = data.radius * 1.4;
    const outerR = data.radius * (data.name === 'Saturn' ? 2.4 : 1.8);
    const ringGeo = new THREE.RingGeometry(innerR, outerR, 64);

    // Create ring texture
    const ringCanvas = document.createElement('canvas');
    ringCanvas.width = 256;
    ringCanvas.height = 1;
    const rctx = ringCanvas.getContext('2d');

    if (data.name === 'Saturn') {
      const grad = rctx.createLinearGradient(0, 0, 256, 0);
      grad.addColorStop(0, 'rgba(200,180,140,0.0)');
      grad.addColorStop(0.1, 'rgba(200,180,140,0.6)');
      grad.addColorStop(0.2, 'rgba(180,160,120,0.8)');
      grad.addColorStop(0.35, 'rgba(200,180,140,0.3)');
      grad.addColorStop(0.4, 'rgba(220,200,160,0.9)');
      grad.addColorStop(0.55, 'rgba(200,180,140,0.7)');
      grad.addColorStop(0.65, 'rgba(180,160,120,0.4)');
      grad.addColorStop(0.8, 'rgba(200,180,140,0.6)');
      grad.addColorStop(0.9, 'rgba(180,160,120,0.2)');
      grad.addColorStop(1, 'rgba(200,180,140,0.0)');
      rctx.fillStyle = grad;
    } else {
      const grad = rctx.createLinearGradient(0, 0, 256, 0);
      grad.addColorStop(0, 'rgba(114,181,196,0.0)');
      grad.addColorStop(0.2, 'rgba(114,181,196,0.3)');
      grad.addColorStop(0.5, 'rgba(114,181,196,0.15)');
      grad.addColorStop(1, 'rgba(114,181,196,0.0)');
      rctx.fillStyle = grad;
    }
    rctx.fillRect(0, 0, 256, 1);

    const ringTexture = new THREE.CanvasTexture(ringCanvas);
    const ringMat = new THREE.MeshBasicMaterial({
      map: ringTexture,
      side: THREE.DoubleSide,
      transparent: true,
      opacity: 0.85
    });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = -Math.PI / 2 + data.tilt * 0.3;
    group.add(ring);
  }

  // Initial position
  const angle = Math.random() * Math.PI * 2;
  group.position.x = Math.cos(angle) * data.distance;
  group.position.z = Math.sin(angle) * data.distance;

  scene.add(group);

  planets.push({
    group,
    mesh,
    data,
    angle,
    rotationSpeed: 0.01 + Math.random() * 0.02
  });
  planetMeshes.push(mesh);

  // Orbit line
  const orbitGeo = new THREE.BufferGeometry();
  const orbitPoints = [];
  const segments = 128;
  for (let i = 0; i <= segments; i++) {
    const theta = (i / segments) * Math.PI * 2;
    orbitPoints.push(
      Math.cos(theta) * data.distance,
      0,
      Math.sin(theta) * data.distance
    );
  }
  orbitGeo.setAttribute('position', new THREE.Float32BufferAttribute(orbitPoints, 3));
  const orbitMat = new THREE.LineBasicMaterial({
    color: new THREE.Color(data.color),
    transparent: true,
    opacity: 0.15
  });
  const orbitLine = new THREE.Line(orbitGeo, orbitMat);
  scene.add(orbitLine);
  orbitLines.push(orbitLine);
});

// ============================================================
// Planet List UI
// ============================================================
const planetListEl = document.getElementById('planet-list');
planetData.forEach((data, i) => {
  const item = document.createElement('div');
  item.className = 'planet-list-item';
  item.innerHTML = `<div class="planet-dot" style="background:${data.color};box-shadow:0 0 6px ${data.color}"></div><span>${data.name}</span>`;
  item.addEventListener('click', () => selectPlanet(i));
  planetListEl.appendChild(item);
});

// ============================================================
// Info Panel
// ============================================================
const infoPanel = document.getElementById('info-panel');
const planetNameEl = document.getElementById('planet-name');
const planetDescEl = document.getElementById('planet-desc');
const planetStatsEl = document.getElementById('planet-stats');
const planetIconCanvas = document.getElementById('planet-icon');
let selectedPlanet = -1;

function drawPlanetIcon(color1, color2) {
  const ctx = planetIconCanvas.getContext('2d');
  ctx.clearRect(0, 0, 60, 60);

  // Glow
  const glow = ctx.createRadialGradient(30, 30, 15, 30, 30, 30);
  glow.addColorStop(0, color1 + '40');
  glow.addColorStop(1, 'transparent');
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, 60, 60);

  // Planet body
  const grad = ctx.createRadialGradient(25, 25, 2, 30, 30, 22);
  grad.addColorStop(0, color1);
  grad.addColorStop(1, color2);
  ctx.beginPath();
  ctx.arc(30, 30, 20, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();

  // Highlight
  const hl = ctx.createRadialGradient(22, 22, 1, 30, 30, 22);
  hl.addColorStop(0, 'rgba(255,255,255,0.3)');
  hl.addColorStop(0.5, 'rgba(255,255,255,0.05)');
  hl.addColorStop(1, 'transparent');
  ctx.beginPath();
  ctx.arc(30, 30, 20, 0, Math.PI * 2);
  ctx.fillStyle = hl;
  ctx.fill();
}

function selectPlanet(index) {
  selectedPlanet = index;
  const data = planetData[index];

  planetNameEl.textContent = data.name;
  planetNameEl.style.color = data.color;
  planetDescEl.textContent = data.description;

  drawPlanetIcon(data.color, data.color2);

  planetStatsEl.innerHTML = '';
  Object.entries(data.stats).forEach(([label, value]) => {
    planetStatsEl.innerHTML += `
      <div class="stat-item">
        <div class="stat-label">${label}</div>
        <div class="stat-value">${value}</div>
      </div>`;
  });

  infoPanel.classList.add('visible');

  // Highlight in list
  document.querySelectorAll('.planet-list-item').forEach((el, i) => {
    el.classList.toggle('active', i === index);
  });

  // Focus camera on planet
  const planet = planets[index];
  const pos = planet.group.position;
  controls.target.lerp(pos, 0.3);
}

document.getElementById('close-info').addEventListener('click', () => {
  infoPanel.classList.remove('visible');
  selectedPlanet = -1;
  document.querySelectorAll('.planet-list-item').forEach(el => el.classList.remove('active'));
});

// ============================================================
// Controls
// ============================================================
let speedMultiplier = 1.0;
const speedSlider = document.getElementById('speed-slider');
const speedValueEl = document.getElementById('speed-value');

speedSlider.addEventListener('input', (e) => {
  speedMultiplier = parseFloat(e.target.value);
  speedValueEl.textContent = speedMultiplier.toFixed(1) + '×';
});

let showOrbits = true;
document.getElementById('toggle-orbits').addEventListener('click', function() {
  showOrbits = !showOrbits;
  this.classList.toggle('active', showOrbits);
  orbitLines.forEach(line => line.visible = showOrbits);
});
document.getElementById('toggle-orbits').classList.add('active');

let showLabels = false;
const labelContainer = document.createElement('div');
labelContainer.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:50;';
document.body.appendChild(labelContainer);

document.getElementById('toggle-labels').addEventListener('click', function() {
  showLabels = !showLabels;
  this.classList.toggle('active', showLabels);
});

document.getElementById('reset-camera').addEventListener('click', () => {
  controls.reset();
  camera.position.set(0, 100, 250);
  controls.target.set(0, 0, 0);
});

// ============================================================
// Raycasting for click/hover
// ============================================================
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const tooltip = document.getElementById('tooltip');
let hoveredPlanet = -1;

renderer.domElement.addEventListener('mousemove', (e) => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(planetMeshes);

  if (intersects.length > 0) {
    const idx = intersects[0].object.userData.planetIndex;
    if (idx !== undefined) {
      hoveredPlanet = idx;
      tooltip.textContent = planetData[idx].name;
      tooltip.style.left = (e.clientX + 15) + 'px';
      tooltip.style.top = (e.clientY - 10) + 'px';
      tooltip.classList.add('visible');
      renderer.domElement.style.cursor = 'pointer';
    }
  } else {
    hoveredPlanet = -1;
    tooltip.classList.remove('visible');
    renderer.domElement.style.cursor = 'grab';
  }
});

renderer.domElement.addEventListener('click', (e) => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(planetMeshes);

  if (intersects.length > 0) {
    const idx = intersects[0].object.userData.planetIndex;
    if (idx !== undefined) {
      selectPlanet(idx);
    }
  }
});

// ============================================================
// Labels
// ============================================================
function updateLabels() {
  labelContainer.innerHTML = '';
  if (!showLabels) return;

  planets.forEach((planet, i) => {
    const pos = new THREE.Vector3();
    planet.mesh.getWorldPosition(pos);
    pos.y += planet.data.radius + 2;

    const screenPos = pos.clone().project(camera);
    const x = (screenPos.x * 0.5 + 0.5) * window.innerWidth;
    const y = (-screenPos.y * 0.5 + 0.5) * window.innerHeight;

    if (screenPos.z < 1) {
      const label = document.createElement('div');
      label.style.cssText = `
        position: absolute;
        left: ${x}px;
        top: ${y}px;
        transform: translate(-50%, -100%);
        font-size: 11px;
        color: ${planet.data.color};
        text-shadow: 0 0 8px ${planet.data.color}40;
        letter-spacing: 1px;
        white-space: nowrap;
        opacity: 0.8;
      `;
      label.textContent = planet.data.name;
      labelContainer.appendChild(label);
    }
  });
}

// ============================================================
// Animation Loop
// ============================================================
const clock = new THREE.Clock();
let frameCount = 0;

function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();
  const elapsed = clock.getElapsedTime();
  frameCount++;

  // Update planet positions
  planets.forEach((planet, i) => {
    planet.angle += planet.data.speed * speedMultiplier * delta * 0.3;
    planet.group.position.x = Math.cos(planet.angle) * planet.data.distance;
    planet.group.position.z = Math.sin(planet.angle) * planet.data.distance;

    // Self rotation
    planet.mesh.rotation.y += planet.rotationSpeed * speedMultiplier;
  });

  // Sun animation
  sunObj.sun.rotation.y += delta * 0.1;
  // Pulse the sun glow
  const pulse = 1 + Math.sin(elapsed * 2) * 0.03;
  sunObj.group.children.forEach((child, i) => {
    if (i > 0 && i < 4 && child.isMesh) {
      child.scale.setScalar(pulse + i * 0.005);
    }
  });

  // Update controls
  controls.update();

  // Update labels every few frames for performance
  if (frameCount % 3 === 0) {
    updateLabels();
  }

  // Fade instructions
  if (elapsed > 6) {
    const instructions = document.getElementById('instructions');
    if (instructions) instructions.style.opacity = '0';
  }

  renderer.render(scene, camera);
}

// ============================================================
// Resize Handler
// ============================================================
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============================================================
// Start
// ============================================================
setTimeout(() => {
  document.getElementById('loading').classList.add('hidden');
}, 800);

animate();
</script>
