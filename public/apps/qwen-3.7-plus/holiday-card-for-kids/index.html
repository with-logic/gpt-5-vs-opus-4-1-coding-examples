<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎄 Happy Holidays! 🎄</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Mountains+of+Christmas:wght@400;700&family=Fredoka+One&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Fredoka One', cursive;
  overflow-x: hidden;
  min-height: 100vh;
  background: linear-gradient(180deg, #0a1628 0%, #1a2a4a 30%, #2a3a5a 60%, #1a3a2a 100%);
  user-select: none;
}

#snowCanvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 1000;
}

.header {
  text-align: center;
  padding: 20px 10px 10px;
  position: relative;
  z-index: 10;
}

.title {
  font-family: 'Mountains of Christmas', cursive;
  font-size: clamp(2.5rem, 7vw, 5rem);
  color: #fff;
  text-shadow:
    0 0 10px rgba(255, 200, 50, 0.8),
    0 0 20px rgba(255, 200, 50, 0.5),
    0 0 40px rgba(255, 150, 50, 0.3),
    3px 3px 0 #c41e3a;
  animation: titleGlow 2s ease-in-out infinite alternate;
  letter-spacing: 2px;
}

@keyframes titleGlow {
  0% { text-shadow: 0 0 10px rgba(255,200,50,0.8), 0 0 20px rgba(255,200,50,0.5), 0 0 40px rgba(255,150,50,0.3), 3px 3px 0 #c41e3a; }
  100% { text-shadow: 0 0 20px rgba(255,200,50,1), 0 0 40px rgba(255,200,50,0.7), 0 0 60px rgba(255,150,50,0.5), 3px 3px 0 #c41e3a; }
}

.subtitle {
  font-family: 'Mountains of Christmas', cursive;
  font-size: clamp(1rem, 3vw, 1.5rem);
  color: #ffd700;
  margin-top: 5px;
  animation: fadeInUp 1s ease-out 0.5s both;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.main-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 10px;
  gap: 15px;
  position: relative;
  z-index: 10;
}

.card-wrapper {
  perspective: 1000px;
  width: min(95vw, 900px);
}

.card {
  position: relative;
  width: 100%;
  min-height: 500px;
  background: linear-gradient(135deg, #1a472a 0%, #2d5a3f 30%, #1a472a 60%, #0d3320 100%);
  border-radius: 20px;
  border: 4px solid #c41e3a;
  box-shadow:
    0 0 30px rgba(196, 30, 58, 0.3),
    inset 0 0 60px rgba(0, 0, 0, 0.3),
    0 20px 60px rgba(0, 0, 0, 0.5);
  overflow: hidden;
  cursor: crosshair;
}

.card-inner-border {
  position: absolute;
  top: 8px; left: 8px; right: 8px; bottom: 8px;
  border: 2px dashed rgba(255, 215, 0, 0.4);
  border-radius: 14px;
  pointer-events: none;
}

.card-ground {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 80px;
  background: linear-gradient(180deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.8) 30%, #fff 100%);
  border-radius: 0 0 16px 16px;
}

.card-ground::before {
  content: '';
  position: absolute;
  top: -20px; left: 0; right: 0;
  height: 40px;
  background: radial-gradient(ellipse at 20% 100%, rgba(255,255,255,0.9) 0%, transparent 70%),
              radial-gradient(ellipse at 50% 100%, rgba(255,255,255,0.9) 0%, transparent 70%),
              radial-gradient(ellipse at 80% 100%, rgba(255,255,255,0.9) 0%, transparent 70%);
}

.moon {
  position: absolute;
  top: 20px; right: 30px;
  width: 60px; height: 60px;
  background: radial-gradient(circle at 40% 40%, #fffde7, #ffd54f);
  border-radius: 50%;
  box-shadow: 0 0 30px rgba(255, 213, 79, 0.6), 0 0 60px rgba(255, 213, 79, 0.3);
  animation: moonGlow 3s ease-in-out infinite alternate;
}

@keyframes moonGlow {
  0% { box-shadow: 0 0 30px rgba(255,213,79,0.6), 0 0 60px rgba(255,213,79,0.3); }
  100% { box-shadow: 0 0 40px rgba(255,213,79,0.8), 0 0 80px rgba(255,213,79,0.5); }
}

.card-star {
  position: absolute;
  color: #fff;
  animation: twinkle 2s ease-in-out infinite alternate;
  pointer-events: none;
  font-size: 8px;
}

@keyframes twinkle {
  0% { opacity: 0.3; transform: scale(0.8); }
  100% { opacity: 1; transform: scale(1.2); }
}

.placed-item {
  position: absolute;
  font-size: 40px;
  cursor: grab;
  transition: transform 0.1s;
  filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.3));
  z-index: 100;
  animation: itemAppear 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
}

.placed-item:hover {
  transform: scale(1.2);
  filter: drop-shadow(2px 2px 8px rgba(255,215,0,0.5));
}

.placed-item:active { cursor: grabbing; transform: scale(1.1); }
.placed-item.dragging { z-index: 9999; opacity: 0.8; transform: scale(1.3); }

@keyframes itemAppear {
  0% { transform: scale(0) rotate(-180deg); opacity: 0; }
  100% { transform: scale(1) rotate(0deg); opacity: 1; }
}
@keyframes itemBounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}
@keyframes itemWiggle {
  0%, 100% { transform: rotate(0deg); }
  25% { transform: rotate(-10deg); }
  75% { transform: rotate(10deg); }
}
@keyframes itemSpin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
@keyframes itemPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.2); }
}

.palette-section {
  width: min(95vw, 900px);
  background: linear-gradient(135deg, #c41e3a, #8b0000);
  border-radius: 20px;
  padding: 15px;
  border: 3px solid #ffd700;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.palette-title {
  font-family: 'Mountains of Christmas', cursive;
  color: #ffd700;
  text-align: center;
  font-size: 1.5rem;
  margin-bottom: 10px;
  text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
}

.palette-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
}

.palette-item {
  font-size: 36px;
  width: 55px; height: 55px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(255,255,255,0.15);
  border-radius: 12px;
  cursor: grab;
  transition: all 0.2s;
  border: 2px solid transparent;
  position: relative;
}

.palette-item:hover {
  background: rgba(255,255,255,0.3);
  transform: scale(1.15) rotate(-5deg);
  border-color: #ffd700;
  box-shadow: 0 0 15px rgba(255,215,0,0.4);
}

.palette-item:active { cursor: grabbing; transform: scale(0.95); }

.palette-item .tooltip {
  position: absolute;
  bottom: -25px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.8);
  color: #fff;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 5px;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
  font-family: 'Fredoka One', cursive;
}

.palette-item:hover .tooltip { opacity: 1; }

.controls {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
  width: min(95vw, 900px);
}

.btn {
  font-family: 'Fredoka One', cursive;
  padding: 10px 20px;
  border: none;
  border-radius: 50px;
  font-size: 1rem;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 8px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}

.btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.3); }
.btn:active { transform: translateY(0); }

.btn-music { background: linear-gradient(135deg, #ffd700, #ff8c00); color: #8b0000; }
.btn-music.playing { animation: btnPulse 1s ease-in-out infinite; }

@keyframes btnPulse {
  0%, 100% { box-shadow: 0 4px 15px rgba(255,215,0,0.3); }
  50% { box-shadow: 0 4px 25px rgba(255,215,0,0.6); }
}

.btn-clear { background: linear-gradient(135deg, #4caf50, #2e7d32); color: #fff; }
.btn-snow { background: linear-gradient(135deg, #64b5f6, #1976d2); color: #fff; }
.btn-sparkle { background: linear-gradient(135deg, #e040fb, #7b1fa2); color: #fff; }

.sparkle {
  position: absolute;
  pointer-events: none;
  z-index: 9999;
  animation: sparkleAnim 0.8s ease-out forwards;
}

@keyframes sparkleAnim {
  0% { transform: scale(0) rotate(0deg); opacity: 1; }
  50% { transform: scale(1) rotate(180deg); opacity: 0.8; }
  100% { transform: scale(0.5) rotate(360deg); opacity: 0; }
}

.burst-particle {
  position: absolute;
  pointer-events: none;
  z-index: 9999;
  font-size: 20px;
}

.lights-string {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 30px;
  display: flex;
  justify-content: space-around;
  align-items: flex-start;
  padding: 0 20px;
  pointer-events: none;
  z-index: 50;
}

.light-bulb {
  width: 12px; height: 16px;
  border-radius: 50%;
  margin-top: 5px;
  position: relative;
  animation: lightGlow 1.5s ease-in-out infinite alternate;
}

.light-bulb::before {
  content: '';
  position: absolute;
  top: -4px; left: 3px;
  width: 6px; height: 6px;
  background: #555;
  border-radius: 2px;
}

.light-bulb:nth-child(5n+1) { background: #ff0000; box-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000; animation-delay: 0s; }
.light-bulb:nth-child(5n+2) { background: #00ff00; box-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00; animation-delay: 0.3s; }
.light-bulb:nth-child(5n+3) { background: #ffd700; box-shadow: 0 0 10px #ffd700, 0 0 20px #ffd700; animation-delay: 0.6s; }
.light-bulb:nth-child(5n+4) { background: #0088ff; box-shadow: 0 0 10px #0088ff, 0 0 20px #0088ff; animation-delay: 0.9s; }
.light-bulb:nth-child(5n+5) { background: #ff00ff; box-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff; animation-delay: 1.2s; }

@keyframes lightGlow {
  0% { opacity: 0.4; filter: brightness(0.6); }
  100% { opacity: 1; filter: brightness(1.3); }
}

.lights-wire {
  position: absolute;
  top: 8px; left: 0; right: 0;
  height: 20px;
  pointer-events: none;
  z-index: 49;
}

.footer {
  text-align: center;
  padding: 15px;
  color: rgba(255,255,255,0.5);
  font-size: 0.8rem;
  position: relative;
  z-index: 10;
}

.drag-ghost {
  position: fixed;
  pointer-events: none;
  z-index: 99999;
  font-size: 50px;
  filter: drop-shadow(0 0 10px rgba(255,215,0,0.5));
  transform: translate(-50%, -50%);
}

.confetti {
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  animation: confettiFall 3s ease-in forwards;
}

@keyframes confettiFall {
  0% { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

.greeting-area {
  position: absolute;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  pointer-events: none;
  z-index: 50;
}

.greeting-text {
  font-family: 'Mountains of Christmas', cursive;
  font-size: clamp(1.2rem, 3vw, 2rem);
  color: #ffd700;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
  animation: greetingFloat 3s ease-in-out infinite;
  transition: opacity 0.5s;
}

@keyframes greetingFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-5px); }
}

.aurora {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 150px;
  background: linear-gradient(180deg,
    transparent 0%,
    rgba(0, 255, 100, 0.05) 30%,
    rgba(0, 200, 255, 0.08) 50%,
    rgba(100, 0, 255, 0.05) 70%,
    transparent 100%
  );
  animation: auroraMove 8s ease-in-out infinite alternate;
  pointer-events: none;
}

@keyframes auroraMove {
  0% { opacity: 0.3; transform: translateX(-20px) skewX(-5deg); }
  50% { opacity: 0.7; transform: translateX(20px) skewX(5deg); }
  100% { opacity: 0.3; transform: translateX(-10px) skewX(-3deg); }
}

.item-counter {
  position: absolute;
  top: 35px;
  left: 15px;
  background: rgba(0,0,0,0.5);
  color: #ffd700;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 0.85rem;
  z-index: 200;
  backdrop-filter: blur(5px);
}

@media (max-width: 600px) {
  .card { min-height: 400px; }
  .palette-item { width: 48px; height: 48px; font-size: 30px; }
  .placed-item { font-size: 32px; }
  .btn { padding: 8px 14px; font-size: 0.85rem; }
}
</style>
</head>
<body>

<canvas id="snowCanvas"></canvas>

<div class="header">
  <div class="title">🎄 Happy Holidays! 🎄</div>
  <div class="subtitle">✨ Drag & drop decorations onto the card! ✨</div>
</div>

<div class="main-container">
  <div class="card-wrapper">
    <div class="card" id="card">
      <div class="card-inner-border"></div>
      <div class="aurora"></div>
      <div class="moon"></div>
      <div class="lights-string" id="lightsString"></div>
      <svg class="lights-wire" id="lightsWire">
        <path d="" stroke="#2a5a2a" stroke-width="2" fill="none" id="wirePath"/>
      </svg>
      <div class="card-ground"></div>
      <div class="greeting-area">
        <div class="greeting-text" id="greetingText">🎅 Wishing You Joy & Cheer! 🎅</div>
      </div>
      <div class="item-counter" id="itemCounter">🎁 Items: 0</div>
    </div>
  </div>

  <div class="controls">
    <button class="btn btn-music" id="musicBtn" onclick="toggleMusic()">
      <span id="musicIcon">🔇</span> Music
    </button>
    <button class="btn btn-snow" onclick="toggleSnow()">
      <span>❄️</span> <span id="snowLabel">Heavy Snow</span>
    </button>
    <button class="btn btn-sparkle" onclick="addSparkles()">
      <span>✨</span> Sparkle!
    </button>
    <button class="btn btn-clear" onclick="clearCard()">
      <span>🧹</span> Clear
    </button>
  </div>

  <div class="palette-section">
    <div class="palette-title">🎨 Drag decorations onto the card! 🎨</div>
    <div class="palette-grid" id="paletteGrid"></div>
  </div>
</div>

<div class="footer">
  Made with ❤️ | Click items on the card for surprises!
</div>

<script>
// ============ AUDIO ENGINE ============
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

function ensureAudioCtx() {
  if (!audioCtx) audioCtx = new AudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playNote(freq, duration, type, volume, delay) {
  type = type || 'sine';
  volume = volume || 0.15;
  delay = delay || 0;
  const ctx = ensureAudioCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, ctx.currentTime + delay);
  gain.gain.setValueAtTime(volume, ctx.currentTime + delay);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + duration);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(ctx.currentTime + delay);
  osc.stop(ctx.currentTime + delay + duration);
}

function playDropSound() {
  playNote(523, 0.15, 'sine', 0.2);
  playNote(659, 0.15, 'sine', 0.2, 0.08);
  playNote(784, 0.2, 'sine', 0.15, 0.16);
}

function playClickSound() {
  playNote(880, 0.1, 'square', 0.08);
  playNote(1100, 0.1, 'square', 0.06, 0.05);
}

function playSparkleSound() {
  var notes = [1047, 1175, 1319, 1397, 1568];
  notes.forEach(function(n, i) { playNote(n, 0.2, 'sine', 0.08, i * 0.06); });
}

function playJingleBells() {
  var melody = [
    [330, 0.3], [330, 0.3], [330, 0.6],
    [330, 0.3], [330, 0.3], [330, 0.6],
    [330, 0.3], [392, 0.3], [262, 0.3], [294, 0.3],
    [330, 0.9],
    [349, 0.3], [349, 0.3], [349, 0.3], [349, 0.3],
    [349, 0.3], [330, 0.3], [330, 0.3], [330, 0.15], [330, 0.15],
    [330, 0.3], [294, 0.3], [294, 0.3], [330, 0.3],
    [294, 0.6], [392, 0.6],
    [330, 0.3], [330, 0.3], [330, 0.6],
    [330, 0.3], [330, 0.3], [330, 0.6],
    [330, 0.3], [392, 0.3], [262, 0.3], [294, 0.3],
    [330, 0.9],
    [349, 0.3], [349, 0.3], [349, 0.3], [349, 0.3],
    [349, 0.3], [330, 0.3], [330, 0.3], [330, 0.15], [330, 0.15],
    [392, 0.3], [392, 0.3], [349, 0.3], [294, 0.3],
    [262, 0.9]
  ];
  var time = 0;
  melody.forEach(function(note) {
    var freq = note[0], dur = note[1];
    playNote(freq, dur * 0.9, 'sine', 0.12, time);
    playNote(freq * 2, dur * 0.5, 'sine', 0.04, time);
    time += dur;
  });
  return time;
}

var musicPlaying = false;
var musicInterval = null;

function toggleMusic() {
  var btn = document.getElementById('musicBtn');
  var icon = document.getElementById('musicIcon');
  if (musicPlaying) {
    musicPlaying = false;
    clearInterval(musicInterval);
    btn.classList.remove('playing');
    icon.textContent = '🔇';
  } else {
    musicPlaying = true;
    btn.classList.add('playing');
    icon.textContent = '🔊';
    var duration = playJingleBells();
    musicInterval = setInterval(function() {
      if (musicPlaying) playJingleBells();
    }, duration * 1000 + 500);
  }
}

// ============ SNOWFALL ============
var snowCanvas = document.getElementById('snowCanvas');
var snowCtx = snowCanvas.getContext('2d');
var snowflakes = [];
var snowIntensity = 1;

function resizeCanvas() {
  snowCanvas.width = window.innerWidth;
  snowCanvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function Snowflake() { this.reset(); }
Snowflake.prototype.reset = function() {
  this.x = Math.random() * snowCanvas.width;
  this.y = Math.random() * -snowCanvas.height;
  this.size = Math.random() * 4 + 1;
  this.speed = Math.random() * 1.5 + 0.5;
  this.wind = Math.random() * 0.5 - 0.25;
  this.opacity = Math.random() * 0.6 + 0.4;
  this.swing = Math.random() * 2;
  this.swingSpeed = Math.random() * 0.02 + 0.01;
  this.swingOffset = Math.random() * Math.PI * 2;
};
Snowflake.prototype.update = function() {
  this.y += this.speed * snowIntensity;
  this.x += this.wind + Math.sin(this.swingOffset) * this.swing * 0.3;
  this.swingOffset += this.swingSpeed;
  if (this.y > snowCanvas.height + 10) { this.reset(); this.y = -10; }
  if (this.x > snowCanvas.width + 10) this.x = -10;
  if (this.x < -10) this.x = snowCanvas.width + 10;
};
Snowflake.prototype.draw = function() {
  snowCtx.beginPath();
  snowCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
  snowCtx.fillStyle = 'rgba(255, 255, 255, ' + this.opacity + ')';
  snowCtx.fill();
  if (this.size > 2.5) {
    snowCtx.beginPath();
    snowCtx.arc(this.x, this.y, this.size * 2, 0, Math.PI * 2);
    snowCtx.fillStyle = 'rgba(255, 255, 255, ' + (this.opacity * 0.1) + ')';
    snowCtx.fill();
  }
};

function initSnow() {
  snowflakes = [];
  for (var i = 0; i < 150; i++) {
    var sf = new Snowflake();
    sf.y = Math.random() * snowCanvas.height;
    snowflakes.push(sf);
  }
}
initSnow();

function animateSnow() {
  snowCtx.clearRect(0, 0, snowCanvas.width, snowCanvas.height);
  if (snowIntensity > 0) {
    var count = snowIntensity === 1 ? 80 : 150;
    for (var i = 0; i < Math.min(count, snowflakes.length); i++) {
      snowflakes[i].update();
      snowflakes[i].draw();
    }
  }
  requestAnimationFrame(animateSnow);
}
animateSnow();

function toggleSnow() {
  var label = document.getElementById('snowLabel');
  if (snowIntensity === 1) { snowIntensity = 2; label.textContent = 'Light Snow'; }
  else if (snowIntensity === 2) { snowIntensity = 0; label.textContent = 'Start Snow'; }
  else { snowIntensity = 1; label.textContent = 'Heavy Snow'; }
}

// ============ PALETTE ITEMS ============
var paletteItems = [
  { emoji: '🎄', name: 'Tree', anim: 'itemBounce' },
  { emoji: '⛄', name: 'Snowman', anim: 'itemWiggle' },
  { emoji: '🎅', name: 'Santa', anim: 'itemBounce' },
  { emoji: '🤶', name: 'Mrs. Claus', anim: 'itemBounce' },
  { emoji: '🦌', name: 'Reindeer', anim: 'itemWiggle' },
  { emoji: '🎁', name: 'Present', anim: 'itemPulse' },
  { emoji: '⭐', name: 'Star', anim: 'itemSpin' },

// ============ DRAG & DROP ============
var dragGhost = null;
var dragEmoji = '';
var dragAnim = '';
var isDragging = false;
var dragSource = null;
var dragSourceEl = null;

function startDragFromPalette(e, item) {
  e.preventDefault();
  ensureAudioCtx();
  playNote(440, 0.08, 'sine', 0.1);
  dragEmoji = item.emoji;
  dragAnim = item.anim;
  isDragging = true;
  dragSource = 'palette';
  dragSourceEl = null;
  dragGhost = document.createElement('div');
  dragGhost.className = 'drag-ghost';
  dragGhost.textContent = item.emoji;
  document.body.appendChild(dragGhost);
  var pos = getEventPos(e);
  dragGhost.style.left = pos.x + 'px';
  dragGhost.style.top = pos.y + 'px';
  document.addEventListener('mousemove', onDragMove);
  document.addEventListener('mouseup', onDragEnd);
  document.addEventListener('touchmove', onDragMove, { passive: false });
  document.addEventListener('touchend', onDragEnd);
}

function startDragFromCard(e, el) {
  e.preventDefault();
  e.stopPropagation();
  ensureAudioCtx();
  playNote(350, 0.08, 'sine', 0.1);
  dragEmoji = el.getAttribute('data-emoji');
  dragAnim = el.getAttribute('data-anim');
  isDragging = true;
  dragSource = 'card';
  dragSourceEl = el;
  el.classList.add('dragging');
  dragGhost = document.createElement('div');
  dragGhost.className = 'drag-ghost';
  dragGhost.textContent = dragEmoji;
  document.body.appendChild(dragGhost);
  var pos = getEventPos(e);
  dragGhost.style.left = pos.x + 'px';
  dragGhost.style.top = pos.y + 'px';
  document.addEventListener('mousemove', onDragMove);
  document.addEventListener('mouseup', onDragEnd);
  document.addEventListener('touchmove', onDragMove, { passive: false });
  document.addEventListener('touchend', onDragEnd);
}

function onDragMove(e) {
  if (!isDragging) return;
  e.preventDefault();
  var pos = getEventPos(e);
  if (dragGhost) {
    dragGhost.style.left = pos.x + 'px';
    dragGhost.style.top = pos.y + 'px';
  }
}

function onDragEnd(e) {
  if (!isDragging) return;
  isDragging = false;
  var pos = getEventPos(e);
  var card = document.getElementById('card');
  var rect = card.getBoundingClientRect();
  if (pos.x >= rect.left && pos.x <= rect.right && pos.y >= rect.top && pos.y <= rect.bottom) {
    var x = pos.x - rect.left;
    var y = pos.y - rect.top;
    if (dragSource === 'card' && dragSourceEl) {
      dragSourceEl.style.left = (x - 20) + 'px';
      dragSourceEl.style.top = (y - 20) + 'px';
      dragSourceEl.classList.remove('dragging');
    } else {
      placeItem(dragEmoji, dragAnim, x - 20, y - 20);
    }
    playDropSound();
    createBurstEffect(pos.x, pos.y);
  } else {
    if (dragSource === 'card' && dragSourceEl) {
      dragSourceEl.remove();
      updateCounter();
    }
    if (dragSourceEl) dragSourceEl.classList.remove('dragging');
  }
  if (dragGhost) { dragGhost.remove(); dragGhost = null; }
  dragSourceEl = null;
  document.removeEventListener('mousemove', onDragMove);
  document.removeEventListener('mouseup', onDragEnd);
  document.removeEventListener('touchmove', onDragMove);
  document.removeEventListener('touchend', onDragEnd);
}

function getEventPos(e) {
  if (e.changedTouches && e.changedTouches.length > 0) {
    return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
  }
  if (e.touches && e.touches.length > 0) {
    return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }
  return { x: e.clientX, y: e.clientY };
}

// ============ PLACE ITEMS ============
var placedCount = 0;

function placeItem(emoji, anim, x, y) {
  var card = document.getElementById('card');
  var el = document.createElement('div');
  el.className = 'placed-item';
  el.textContent = emoji;
  el.setAttribute('data-emoji', emoji);
  el.setAttribute('data-anim', anim);
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  var scale = 0.8 + Math.random() * 0.6;
  el.style.fontSize = (40 * scale) + 'px';
  el.addEventListener('click', function(e) {
    e.stopPropagation();
    onItemClicked(el, anim);
  });
  el.addEventListener('mousedown', function(ev) { startDragFromCard(ev, el); });
  el.addEventListener('touchstart', function(ev) { startDragFromCard(ev, el); }, { passive: false });
  card.appendChild(el);
  placedCount++;
  updateCounter();
}

function onItemClicked(el, anim) {
  playClickSound();
  el.style.animation = 'none';
  el.offsetHeight;
  el.style.animation = anim + ' 0.5s ease-in-out 3';
  var rect = el.getBoundingClientRect();
  var cx = rect.left + rect.width / 2;
  var cy = rect.top + rect.height / 2;
  createBurstEffect(cx, cy, 5);
  for (var i = 0; i < 3; i++) {
    createSparkle(cx + (Math.random() - 0.5) * 40, cy + (Math.random() - 0.5) * 40);
  }
}

function updateCounter() {
  document.getElementById('itemCounter').textContent = '🎁 Items: ' + placedCount;
}

// ============ EFFECTS ============
function createBurstEffect(x, y, count) {
  count = count || 8;
  var emojis = ['✨', '⭐', '💫', '🌟', '❄️', '🎄', '❤️', '🎁'];
  for (var i = 0; i < count; i++) {
    (function(idx) {
      var particle = document.createElement('div');
      particle.className = 'burst-particle';
      particle.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      particle.style.left = x + 'px';
      particle.style.top = y + 'px';
      var angle = (Math.PI * 2 * idx) / count;
      var distance = 40 + Math.random() * 60;
      var tx = Math.cos(angle) * distance;
      var ty = Math.sin(angle) * distance;
      document.body.appendChild(particle);
      requestAnimationFrame(function() {
        particle.style.transition = 'all 0.6s ease-out';
        particle.style.transform = 'translate(' + tx + 'px, ' + ty + 'px) scale(0)';
        particle.style.opacity = '0';
      });
      setTimeout(function() { particle.remove(); }, 700);
    })(i);
  }
}

function createSparkle(x, y) {
  var sparkle = document.createElement('div');
  sparkle.className = 'sparkle';
  sparkle.textContent = '✨';
  sparkle.style.left = x + 'px';
  sparkle.style.top = y + 'px';
  sparkle.style.fontSize = (15 + Math.random() * 15) + 'px';
  document.body.appendChild(sparkle);
  setTimeout(function() { sparkle.remove(); }, 800);
}

function addSparkles() {
  playSparkleSound();
  var card = document.getElementById('card');
  var rect = card.getBoundingClientRect();
  for (var i = 0; i < 20; i++) {
    (function(idx) {
      setTimeout(function() {
        var x = rect.left + Math.random() * rect.width;
        var y = rect.top + Math.random() * rect.height;
        createSparkle(x, y);
      }, idx * 50);
    })(i);
  }
  for (var j = 0; j < 15; j++) {
    (function(idx) {
      setTimeout(function() {
        var conf = document.createElement('div');
        conf.className = 'confetti';
        var colors = ['#ff0000', '#00ff00', '#ffd700', '#ff69b4', '#00bfff', '#ff8c00'];
        conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        conf.style.left = Math.random() * window.innerWidth + 'px';
        conf.style.top = '-10px';
        conf.style.width = (6 + Math.random() * 8) + 'px';
        conf.style.height = (6 + Math.random() * 8) + 'px';
        conf.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        document.body.appendChild(conf);
        setTimeout(function() { conf.remove(); }, 3000);
      }, idx * 80);
    })(j);
  }
}

function clearCard() {
  playNote(330, 0.2, 'triangle', 0.1);
  playNote(262, 0.3, 'triangle', 0.1, 0.15);
  var card = document.getElementById('card');
  var items = card.querySelectorAll('.placed-item');
  items.forEach(function(item, i) {
    setTimeout(function() {
      item.style.transition = 'all 0.3s ease-in';
      item.style.transform = 'scale(0) rotate(360deg)';
      item.style.opacity = '0';
      setTimeout(function() { item.remove(); }, 300);
    }, i * 50);
  });
  placedCount = 0;
  setTimeout(updateCounter, items.length * 50 + 300);
}

// ============ LIGHTS STRING ============
function createLights() {
  var container = document.getElementById('lightsString');
  var count = 20;
  for (var i = 0; i < count; i++) {
    var bulb = document.createElement('div');
    bulb.className = 'light-bulb';
    bulb.style.animationDelay = (i * 0.15) + 's';
    container.appendChild(bulb);
  }
  var svg = document.getElementById('lightsWire');
  var w = svg.clientWidth || 900;
  var d = 'M 0 10';
  for (var j = 0; j <= count; j++) {
    var x = (w / count) * j;
    var y = 10 + Math.sin(j * 0.5) * 8;
    d += ' L ' + x + ' ' + y;
  }
  document.getElementById('wirePath').setAttribute('d', d);
}
createLights();
