<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOID STRIKER - Space Combat</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  overflow: hidden;
  font-family: 'Courier New', monospace;
  cursor: crosshair;
}
canvas { display: block; }
#hud {
  position: fixed;
  top: 15px; left: 15px;
  color: #0ff;
  font-size: 14px;
  text-shadow: 0 0 10px #0ff;
  z-index: 11;
  pointer-events: none;
}
#hud div { margin-bottom: 6px; }
#score-display {
  position: fixed;
  top: 15px; right: 15px;
  color: #ff0;
  font-size: 18px;
  text-shadow: 0 0 10px #ff0;
  z-index: 11;
  pointer-events: none;
  text-align: right;
}
#health-bar-container {
  width: 200px; height: 12px;
  border: 1px solid #0ff;
  background: rgba(0,255,255,0.1);
  border-radius: 6px;
  overflow: hidden;
}
#health-bar {
  height: 100%;
  background: linear-gradient(90deg, #0f0, #0ff);
  transition: width 0.3s;
  border-radius: 6px;
}
#shield-bar-container {
  width: 200px; height: 8px;
  border: 1px solid #44f;
  background: rgba(0,0,255,0.1);
  border-radius: 4px;
  overflow: hidden;
  margin-top: 4px;
}
#shield-bar {
  height: 100%;
  background: linear-gradient(90deg, #22f, #88f);
  transition: width 0.3s;
  border-radius: 4px;
}
#weapon-display {
  position: fixed;
  bottom: 15px; left: 15px;
  color: #f80;
  font-size: 13px;
  text-shadow: 0 0 8px #f80;
  z-index: 11;
  pointer-events: none;
}
#minimap {
  position: fixed;
  bottom: 15px; right: 15px;
  width: 160px; height: 160px;
  border: 1px solid rgba(0,255,255,0.3);
  border-radius: 50%;
  background: rgba(0,10,30,0.7);
  z-index: 11;
  pointer-events: none;
  overflow: hidden;
}
#minimap-canvas {
  width: 100%; height: 100%;
  border-radius: 50%;
}
#start-screen, #death-screen {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.85);
  z-index: 100;
  pointer-events: all;
}
#start-screen h1 {
  font-size: 64px;
  color: #0ff;
  text-shadow: 0 0 30px #0ff, 0 0 60px #08f;
  margin-bottom: 10px;
  letter-spacing: 12px;
}
#start-screen .subtitle {
  font-size: 16px;
  color: #888;
  margin-bottom: 40px;
  letter-spacing: 4px;
}
#start-screen .controls {
  color: #aaa;
  font-size: 13px;
  line-height: 2;
  text-align: center;
  margin-bottom: 30px;
}
#start-screen .controls span {
  color: #ff0;
}
.btn {
  padding: 15px 50px;
  font-size: 18px;
  font-family: 'Courier New', monospace;
  background: transparent;
  color: #0ff;
  border: 2px solid #0ff;
  cursor: pointer;
  letter-spacing: 4px;
  transition: all 0.3s;
  pointer-events: all;
}
.btn:hover {
  background: rgba(0,255,255,0.15);
  box-shadow: 0 0 30px rgba(0,255,255,0.3);
}
#death-screen h1 {
  font-size: 48px;
  color: #f00;
  text-shadow: 0 0 30px #f00;
  margin-bottom: 20px;
}
#death-screen .final-score {
  font-size: 24px;
  color: #ff0;
  margin-bottom: 30px;
}
#wave-announce {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 36px;
  color: #ff0;
  text-shadow: 0 0 20px #ff0;
  z-index: 50;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.5s;
  letter-spacing: 6px;
}
#combo-display {
  position: fixed;
  top: 50px;
  right: 15px;
  font-size: 16px;
  color: #f80;
  text-shadow: 0 0 10px #f80;
  z-index: 11;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s;
}
#speed-indicator {
  position: fixed;
  bottom: 50px; left: 15px;
  color: #0ff;
  font-size: 11px;
  text-shadow: 0 0 6px #0ff;
  z-index: 11;
  pointer-events: none;
}
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="hud">
  <div>HEALTH</div>
  <div id="health-bar-container"><div id="health-bar" style="width:100%"></div></div>
  <div id="shield-bar-container"><div id="shield-bar" style="width:100%"></div></div>
  <div style="margin-top:8px;color:#888;font-size:12px" id="wave-info">WAVE 1</div>
  <div style="color:#888;font-size:11px" id="enemy-count">ENEMIES: 0</div>
</div>

<div id="score-display">
  <div id="score-text">0</div>
  <div style="font-size:12px;color:#aa0;margin-top:4px" id="hi-score">HI: 0</div>
</div>

<div id="weapon-display">
  <div id="weapon-name">▸ DUAL LASER CANNON</div>
  <div id="ammo-text" style="color:#aaa;font-size:11px;margin-top:4px">MISSILES: READY</div>
</div>

<div id="speed-indicator">
  <div id="speed-text">SPD: 0</div>
  <div id="afterburner-text" style="color:#f80;opacity:0">◆ AFTERBURNER</div>
</div>

<div id="minimap">
  <canvas id="minimap-canvas" width="160" height="160"></canvas>
</div>

<div id="wave-announce"></div>
<div id="combo-display"></div>

<div id="start-screen">
  <h1>VOID STRIKER</h1>
  <div class="subtitle">SPACE COMBAT SIMULATOR</div>
  <div class="controls">
    <span>W A S D</span> — Thrust &amp; Strafe<br>
    <span>MOUSE</span> — Aim<br>
    <span>LEFT CLICK</span> — Primary Weapon (Dual Lasers)<br>
    <span>RIGHT CLICK</span> — Homing Missiles<br>
    <span>SHIFT</span> — Afterburner<br>
    <span>SPACE</span> — Brake<br>
  </div>
  <button class="btn" onclick="startGame()">LAUNCH</button>
</div>

<div id="death-screen" style="display:none">
  <h1>DESTROYED</h1>
  <div class="final-score" id="final-score">SCORE: 0</div>
  <div style="color:#aaa;font-size:14px;margin-bottom:20px" id="death-stats"></div>
  <button class="btn" onclick="startGame()">RETRY</button>
</div>

<script>
// ============ GAME ENGINE ============
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const mmCanvas = document.getElementById('minimap-canvas');
const mmCtx = mmCanvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ============ INPUT ============
const keys = {};
let mouseX = W/2, mouseY = H/2, mouseDown = false, rightMouseDown = false;
window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; if(['w','a','s','d',' '].includes(e.key.toLowerCase())) e.preventDefault(); });
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });
window.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
window.addEventListener('mousedown', e => {
  if (e.button === 0) mouseDown = true;
  if (e.button === 2) rightMouseDown = true;
});
window.addEventListener('mouseup', e => {
  if (e.button === 0) mouseDown = false;
  if (e.button === 2) rightMouseDown = false;
});
window.addEventListener('contextmenu', e => e.preventDefault());

// ============ UTILITIES ============
function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }
function angleTo(a, b) { return Math.atan2(b.y - a.y, b.x - a.x); }
function lerp(a, b, t) { return a + (b - a) * t; }
function rand(min, max) { return Math.random() * (max - min) + min; }
function randInt(min, max) { return Math.floor(rand(min, max + 1)); }
function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
function normAngle(a) {
  while (a > Math.PI) a -= 2 * Math.PI;
  while (a < -Math.PI) a += 2 * Math.PI;
  return a;
}

// ============ CAMERA ============
const camera = { x: 0, y: 0, shake: 0 };
function w2s(wx, wy) {
  let sx = wx - camera.x + W / 2;
  let sy = wy - camera.y + H / 2;
  if (camera.shake > 0.5) {
    sx += rand(-camera.shake, camera.shake);
    sy += rand(-camera.shake, camera.shake);
  }
  return { x: sx, y: sy };
}
function isOnScreen(sx, sy, margin) {
  return sx > -margin && sx < W + margin && sy > -margin && sy < H + margin;
}

// ============ STARS ============
const starLayers = [[], [], []];
for (let layer = 0; layer < 3; layer++) {
  const count = [300, 150, 80][layer];
  for (let i = 0; i < count; i++) {
    starLayers[layer].push({
      x: rand(-4000, 4000),
      y: rand(-4000, 4000),
      size: [0.5, 1.2, 2][layer] + rand(0, 0.5),
      brightness: rand(0.3, 1),
      twinkle: rand(0, Math.PI * 2),
      parallax: [0.05, 0.15, 0.3][layer]
    });
  }
}

const nebulae = [];
for (let i = 0; i < 6; i++) {
  nebulae.push({
    x: rand(-3000, 3000),
    y: rand(-3000, 3000),
    radius: rand(200, 600),
    r: randInt(0, 80), g: randInt(0, 40), b: randInt(30, 100),
    parallax: rand(0.03, 0.1)
  });
}

// ============ PARTICLES ============
let particles = [];
const MAX_PARTICLES = 800;

function addParticle(x, y, vx, vy, life, color, size, type) {
  if (particles.length > MAX_PARTICLES) return;
  particles.push({
    x, y, vx, vy, life, maxLife: life, color, size, type: type || 'circle', alpha: 1
  });
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vx *= 0.98;
    p.vy *= 0.98;
    p.life -= dt;
    p.alpha = Math.max(0, p.life / p.maxLife);
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    const s = w2s(p.x, p.y);
    if (!isOnScreen(s.x, s.y, 20)) continue;
    ctx.globalAlpha = p.alpha;
    if (p.type === 'circle') {
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(s.x, s.y, p.size * (0.5 + p.alpha * 0.5), 0, Math.PI * 2);
      ctx.fill();
    } else if (p.type === 'spark') {
      ctx.strokeStyle = p.color;
      ctx.lineWidth = p.size * p.alpha;
      ctx.beginPath();
      ctx.moveTo(s.x, s.y);
      ctx.lineTo(s.x - p.vx * 0.02, s.y - p.vy * 0.02);
      ctx.stroke();
    } else if (p.type === 'smoke') {
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(s.x, s.y, p.size * (1 + (1 - p.alpha) * 3), 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

function spawnExplosion(x, y, count, colors, speed, size) {
  for (let i = 0; i < count; i++) {
    const a = rand(0, Math.PI * 2);
    const spd = rand(speed * 0.2, speed);
    const type = Math.random() > 0.4 ? 'spark' : 'circle';
    addParticle(
      x + rand(-5, 5), y + rand(-5, 5),
      Math.cos(a) * spd, Math.sin(a) * spd,
      rand(0.3, 1.5),
      colors[randInt(0, colors.length - 1)],
      rand(size * 0.5, size * 1.5), type
    );
  }
  for (let i = 0; i < count / 4; i++) {
    const a = rand(0, Math.PI * 2);
    const spd = rand(speed * 0.1, speed * 0.3);
    addParticle(x, y, Math.cos(a) * spd, Math.sin(a) * spd,
      rand(0.5, 2.5), 'rgba(80,80,80,0.4)', rand(size, size * 3), 'smoke');
  }
}

function spawnEngineTrail(x, y, vx, vy, ang, power, color1, color2) {
  const count = Math.ceil(power * 2);
  for (let i = 0; i < count; i++) {
    const a = ang + Math.PI + rand(-0.4, 0.4);
    const spd = rand(40, 120) * power;
    addParticle(
      x + rand(-3, 3), y + rand(-3, 3),
      Math.cos(a) * spd + vx * 0.2, Math.sin(a) * spd + vy * 0.2,
      rand(0.1, 0.4),
      Math.random() > 0.4 ? color1 : color2,
      rand(1, 3), 'circle'
    );
  }
}

// ============ PROJECTILES ============
let projectiles = [];

function fireProjectile(x, y, vx, vy, damage, owner, type, color) {
  projectiles.push({
    x, y, vx, vy, damage, owner, type: type || 'laser', color: color || '#0ff',
    life: type === 'missile' ? 5 : 2.5,
    radius: type === 'missile' ? 4 : 2,
    angle: Math.atan2(vy, vx),
    trail: [],
    homingTarget: null,
    homingStrength: 3
  });
}

function updateProjectiles(dt) {
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];

    // Homing
    if (p.type === 'missile' && p.homingTarget && p.homingTarget.alive) {
      const desired = angleTo(p, p.homingTarget);
      const current = Math.atan2(p.vy, p.vx);
      const diff = normAngle(desired - current);
      const turn = clamp(diff, -p.homingStrength * dt, p.homingStrength * dt);
      const newA = current + turn;
      let speed = Math.hypot(p.vx, p.vy);
      if (speed < 400) speed += 300 * dt;
      p.vx = Math.cos(newA) * speed;
      p.vy = Math.sin(newA) * speed;
    }

    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
    p.angle = Math.atan2(p.vy, p.vx);

    p.trail.push({ x: p.x, y: p.y, a: 1 });
    if (p.trail.length > 15) p.trail.shift();
    for (const t of p.trail) t.a -= dt * 4;

    // Missile smoke
    if (p.type === 'missile' && Math.random() > 0.3) {
      addParticle(p.x - Math.cos(p.angle) * 8, p.y - Math.sin(p.angle) * 8,
        rand(-15, 15), rand(-15, 15), rand(0.2, 0.4), 'rgba(180,180,180,0.3)', rand(2, 4), 'smoke');
    }

    if (p.life <= 0) { projectiles.splice(i, 1); }
  }
}

function drawProjectiles() {
  for (const p of projectiles) {
    // Trail
    for (const t of p.trail) {
      if (t.a <= 0) continue;
      const s = w2s(t.x, t.y);
      ctx.globalAlpha = t.a * 0.4;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(s.x, s.y, p.radius * 0.5, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    const s = w2s(p.x, p.y);
    if (!isOnScreen(s.x, s.y, 30)) continue;

    ctx.save();
    ctx.translate(s.x, s.y);
    ctx.rotate(p.angle);

    if (p.type === 'laser') {
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 12;
      ctx.fillStyle = p.color;
      ctx.fillRect(-10, -1.5, 20, 3);
      ctx.fillStyle = '#fff';
      ctx.fillRect(-6, -0.5, 12, 1);
    } else if (p.type === 'enemy_laser') {
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 10;
      ctx.fillStyle = p.color;
      ctx.fillRect(-8, -1.5, 16, 3);
      ctx.fillStyle = '#fcc';
      ctx.fillRect(-4, -0.5, 8, 1);
    } else if (p.type === 'missile') {
      ctx.shadowColor = '#f80';
      ctx.shadowBlur = 8;
      ctx.fillStyle = '#ddd';
      ctx.beginPath();
      ctx.moveTo(8, 0);
      ctx.lineTo(-4, -3);
      ctx.lineTo(-6, 0);
      ctx.lineTo(-4, 3);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#f80';
      ctx.fillRect(-8, -1.5, 4, 3);
    }
    ctx.shadowBlur = 0;
    ctx.restore();
  }
}

// ============ ASTEROIDS ============
let asteroids = [];

function createAsteroid(x, y, size, vx, vy) {
  const radius = size * 18 + 12;
  const verts = [];
  const n = randInt(8, 14);
  for (let i = 0; i < n; i++) {
    verts.push({ a: (i / n) * Math.PI * 2, r: radius * rand(0.7, 1.15) });
  }
  return {
    x, y, size, radius,
    vx: vx !== undefined ? vx : rand(-30, 30),
    vy: vy !== undefined ? vy : rand(-30, 30),
    rotation: rand(0, Math.PI * 2),
    rotSpeed: rand(-1, 1),
    hp: size * 2 + 1,
    verts,
    hue: randInt(15, 45),
    craters: [{ x: rand(-0.3, 0.3), y: rand(-0.3, 0.3), r: rand(0.1, 0.25) },
              { x: rand(-0.3, 0.3), y: rand(-0.3, 0.3), r: rand(0.08, 0.18) }]
  };
}

function updateAsteroids(dt) {
  for (const a of asteroids) {
    a.x += a.vx * dt;
    a.y += a.vy * dt;
    a.rotation += a.rotSpeed * dt;
  }
}

function drawAsteroids() {
  for (const a of asteroids) {
    const s = w2s(a.x, a.y);
    if (!isOnScreen(s.x, s.y, a.radius + 20)) continue;

    ctx.save();
    ctx.translate(s.x, s.y);
    ctx.rotate(a.rotation);

    ctx.fillStyle = `hsl(${a.hue}, 20%, 30%)`;
    ctx.strokeStyle = `hsl(${a.hue}, 15%, 45%)`;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    for (let i = 0; i < a.verts.length; i++) {
      const v = a.verts[i];
      const px = Math.cos(v.a) * v.r;
      const py = Math.sin(v.a) * v.r;
      i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Craters
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    for (const c of a.craters) {
      ctx.beginPath();
      ctx.arc(c.x * a.radius, c.y * a.radius, c.r * a.radius, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();
  }
}

// ============ SHIP CLASS ============
let player, enemies = [];
let totalKills = 0;

function createShip(x, y, isPlayer) {
  return {
    x, y, vx: 0, vy: 0, angle: 0,
    isPlayer,
    radius: isPlayer ? 18 : 16,
    hp: isPlayer ? 100 : 40,
    maxHp: isPlayer ? 100 : 40,
    shield: isPlayer ? 50 : 0,
    maxShield: isPlayer ? 50 : 0,
    shieldRegen: isPlayer ? 5 : 0,
    speed: isPlayer ? 280 : 170,
    fireRate: isPlayer ? 0.1 : 0.5,
    fireCooldown: 0,
    missileCooldown: 0,
    missileRate: isPlayer ? 0.8 : 3,
    alive: true,
    thrustPower: 0,
    afterburner: false,
    invulnTime: 0,
    damageFlash: 0,
    engineGlow: 0,
    type: isPlayer ? 'player' : 'fighter',
    // AI
    aiTarget: null, aiTimer: 0, aiPatrolAngle: rand(0, Math.PI * 2),
    aiDodgeDir: 1, aiDodgeTimer: 0, aiBehaviorTimer: 0,
    aiBehavior: 'engage'
  };
}

function updateShip(ship, dt) {
  if (!ship.alive) return;
  ship.fireCooldown -= dt;
  ship.missileCooldown -= dt;
  ship.invulnTime -= dt;
  ship.damageFlash -= dt;

  if (ship.isPlayer) {
    updatePlayerShip(ship, dt);
  } else {
    updateEnemyAI(ship, dt);
  }

  // Shield regen
  if (ship.shield < ship.maxShield && ship.shieldRegen > 0) {
    ship.shield = Math.min(ship.maxShield, ship.shield + ship.shieldRegen * dt);
  }

  // Engine trail
  if (ship.thrustPower > 0.1) {
    const ex = ship.x - Math.cos(ship.angle) * 16;
    const ey = ship.y - Math.sin(ship.angle) * 16;
    const c1 = ship.isPlayer ? '#4af' : '#f80';
    const c2 = ship.isPlayer ? '#08f' : '#f44';
    spawnEngineTrail(ex, ey, ship.vx, ship.vy, ship.angle, ship.thrustPower, c1, c2);
  }
  ship.engineGlow = lerp(ship.engineGlow, ship.thrustPower, dt * 8);
}

function updatePlayerShip(ship, dt) {
  let ax = 0, ay = 0;
  ship.thrustPower = 0;
  ship.afterburner = keys['shift'];
  const mult = ship.afterburner ? 1.8 : 1;

  if (keys['w']) { ay -= 1; ship.thrustPower = mult; }
  if (keys['s']) { ay += 1; ship.thrustPower = mult * 0.6; }
  if (keys['a']) { ax -= 1; ship.thrustPower = Math.max(ship.thrustPower, mult * 0.8); }
  if (keys['d']) { ax += 1; ship.thrustPower = Math.max(ship.thrustPower, mult * 0.8); }

  if (keys[' ']) {
    ship.vx *= Math.pow(0.05, dt);
    ship.vy *= Math.pow(0.05, dt);
  }

  const accel = ship.speed * mult;
  ship.vx += ax * accel * dt;
  ship.vy += ay * accel * dt;

  // Drag
  const drag = 0.6;
  ship.vx *= Math.pow(1 - drag * 0.01, dt * 60);
  ship.vy *= Math.pow(1 - drag * 0.01, dt * 60);

  // Speed limit
  const spd = Math.hypot(ship.vx, ship.vy);
  const maxSpd = ship.speed * (ship.afterburner ? 2.2 : 1.3);
  if (spd > maxSpd) {
    ship.vx *= maxSpd / spd;
    ship.vy *= maxSpd / spd;
  }

  ship.x += ship.vx * dt;
  ship.y += ship.vy * dt;

  // Aim
  const wm = { x: mouseX - W / 2 + camera.x, y: mouseY - H / 2 + camera.y };
  ship.angle = angleTo(ship, wm);

  // Fire
  if (mouseDown && ship.fireCooldown <= 0) firePlayerWeapons(ship);
  if (rightMouseDown && ship.missileCooldown <= 0) fireMissile(ship, 'player');
}

function firePlayerWeapons(ship) {
  ship.fireCooldown = ship.fireRate;
  const speed = 750;
  const a = ship.angle;
  const cos = Math.cos(a), sin = Math.sin(a);
  const perpCos = Math.cos(a + Math.PI/2), perpSin = Math.sin(a + Math.PI/2);

  // Dual cannons
  const offsets = [7, -7];
  for (const off of offsets) {
    const bx = ship.x + cos * 20 + perpCos * off;
    const by = ship.y + sin * 20 + perpSin * off;
    const spread = rand(-0.02, 0.02);
    fireProjectile(bx, by,
      Math.cos(a + spread) * speed + ship.vx * 0.2,
      Math.sin(a + spread) * speed + ship.vy * 0.2,
      8, 'player', 'laser', '#0ff');
  }
  // Muzzle flash
  for (let i = 0; i < 3; i++) {
    addParticle(ship.x + cos * 22, ship.y + sin * 22,
      cos * rand(50, 100) + rand(-30, 30), sin * rand(50, 100) + rand(-30, 30),
      rand(0.05, 0.15), '#fff', rand(1, 2), 'circle');
  }
}

function fireMissile(ship, owner) {
  ship.missileCooldown = ship.missileRate;
  const speed = 300;
  const bx = ship.x + Math.cos(ship.angle) * 20;
  const by = ship.y + Math.sin(ship.angle) * 20;

  let target = null;
  let minD = 700;
  const targets = owner === 'player' ? enemies : [player];
  for (const e of targets) {
    if (!e || !e.alive) continue;
    const d = dist(ship, e);
    if (d < minD) { minD = d; target = e; }
  }

  const p = {
    x: bx, y: by,
    vx: Math.cos(ship.angle) * speed,
    vy: Math.sin(ship.angle) * speed,
    damage: 30, owner, type: 'missile', color: '#f80',
    life: 5, radius: 4, angle: ship.angle,
    trail: [], homingTarget: target, homingStrength: 4
  };
  projectiles.push(p);
}

function updateEnemyAI(ship, dt) {
  ship.aiTimer -= dt;
  ship.aiDodgeTimer -= dt;
  ship.aiBehaviorTimer -= dt;

  // Find target
  if (!ship.aiTarget || !ship.aiTarget.alive || ship.aiTimer <= 0) {
    ship.aiTarget = player.alive ? player : null;
    ship.aiTimer = rand(1, 3);
  }

  if (ship.aiBehaviorTimer <= 0) {
    const behaviors = ['engage', 'engage', 'engage', 'flank', 'retreat'];
    ship.aiBehavior = behaviors[randInt(0, behaviors.length - 1)];
    ship.aiBehaviorTimer = rand(1, 3);
  }

  if (!ship.aiTarget) {
    ship.aiPatrolAngle += rand(-0.3, 0.3) * dt;
    ship.thrustPower = 0.4;
    ship.vx += Math.cos(ship.aiPatrolAngle) * ship.speed * 0.3 * dt;
    ship.vy += Math.sin(ship.aiPatrolAngle) * ship.speed * 0.3 * dt;
    ship.angle = Math.atan2(ship.vy, ship.vx);
  } else {
    const d = dist(ship, ship.aiTarget);
    const a = angleTo(ship, ship.aiTarget);
    const angleDiff = normAngle(a - ship.angle);

    // Turn toward target
    const turnRate = ship.type === 'interceptor' ? 4 : 2.5;
    ship.angle += clamp(angleDiff, -turnRate * dt, turnRate * dt);

    // Behavior
    let thrustDir = 1;
    let strafe = 0;
    if (ship.aiBehavior === 'retreat' && d < 300) thrustDir = -0.5;
    else if (ship.aiBehavior === 'flank') strafe = ship.aiDodgeDir;
    else if (d > 400) thrustDir = 1;
    else if (d < 120) thrustDir = -0.3;
    else {
      if (ship.aiDodgeTimer <= 0) { ship.aiDodgeDir *= -1; ship.aiDodgeTimer = rand(0.5, 2); }
      strafe = ship.aiDodgeDir;
      thrustDir = 0.6;
    }

    ship.thrustPower = Math.abs(thrustDir) * 0.8;
    ship.vx += Math.cos(ship.angle) * ship.speed * thrustDir * dt;
    ship.vy += Math.sin(ship.angle) * ship.speed * thrustDir * dt;
    if (strafe !== 0) {
      const sAngle = ship.angle + Math.PI / 2 * strafe;
      ship.vx += Math.cos(sAngle) * ship.speed * 0.4 * dt;
      ship.vy += Math.sin(sAngle) * ship.speed * 0.4 * dt;
    }

    // Dodge incoming
    for (const p of projectiles) {
      if (p.owner === 'enemy') continue;
      const pd = dist(ship, p);
      if (pd < 100) {
        const pa = angleTo(p, ship);
        const dodgeA = pa + Math.PI / 2 * ship.aiDodgeDir;
        ship.vx += Math.cos(dodgeA) * ship.speed * 2.5 * dt;
        ship.vy += Math.sin(dodgeA) * ship.speed * 2.5 * dt;
        ship.thrustPower = 1.5;
      }
    }

    // Shoot
    if (Math.abs(angleDiff) < 0.25 && d < 500 && ship.fireCooldown <= 0) {
      shipFire(ship);
    }
    // Missile
    if (d < 500 && ship.missileCooldown <= 0 && Math.random() < 0.008) {
      fireMissile(ship, 'enemy');
    }
  }

  // Drag
  ship.vx *= Math.pow(0.3, dt);
  ship.vy *= Math.pow(0.3, dt);

  const spd = Math.hypot(ship.vx, ship.vy);
  if (spd > ship.speed * 1.2) {
    ship.vx *= (ship.speed * 1.2) / spd;
    ship.vy *= (ship.speed * 1.2) / spd;
  }

  ship.x += ship.vx * dt;
  ship.y += ship.vy * dt;
}

function shipFire(ship) {
  ship.fireCooldown = ship.fireRate;
  const speed = 600;
  const a = ship.angle + rand(-0.05, 0.05);
  const bx = ship.x + Math.cos(ship.angle) * 20;
  const by = ship.y + Math.sin(ship.angle) * 20;
  fireProjectile(bx, by, Math.cos(a) * speed, Math.sin(a) * speed,
    6, 'enemy', 'enemy_laser', '#f44');
}

function shipTakeDamage(ship, dmg) {
  if (ship.invulnTime > 0) return;
  ship.damageFlash = 0.15;

  if (ship.shield > 0) {
    const absorbed = Math.min(ship.shield, dmg);
    ship.shield -= absorbed;
    dmg -= absorbed;
    for (let i = 0; i < 4; i++) {
      const a = rand(0, Math.PI * 2);
      addParticle(ship.x + rand(-12, 12), ship.y + rand(-12, 12),
        Math.cos(a) * rand(60, 120), Math.sin(a) * rand(60, 120),
        rand(0.15, 0.3), '#88f', rand(1, 2), 'spark');
    }
  }

  ship.hp -= dmg;
  if (ship.hp <= 0) {
    ship.hp = 0;
    ship.alive = false;
    shipDestroy(ship);
  }
}

function shipDestroy(ship) {
  spawnExplosion(ship.x, ship.y, 50, ['#ff0', '#f80', '#f44', '#fff'], 200, 4);
  camera.shake = Math.max(camera.shake, ship.isPlayer ? 20 : 10);
  // Debris
  for (let i = 0; i < 10; i++) {
    const a = rand(0, Math.PI * 2);
    addParticle(ship.x, ship.y, Math.cos(a) * rand(40, 180), Math.sin(a) * rand(40, 180),
      rand(1, 4), '#888', rand(2, 5), 'circle');
  }
}

function drawShip(ship) {
  if (!ship.alive) return;
  const s = w2s(ship.x, ship.y);
  if (!isOnScreen(s.x, s.y, 50)) return;

  ctx.save();
  ctx.translate(s.x, s.y);
  ctx.rotate(ship.angle);

  if (ship.damageFlash > 0) {
    ctx.globalAlpha = 0.5 + Math.sin(ship.damageFlash * 80) * 0.5;
  }

  if (ship.isPlayer) {
    drawPlayerShip();
  } else if (ship.type === 'interceptor') {
    drawInterceptor();
  } else {
    drawHeavyFighter();
  }

  ctx.globalAlpha = 1;

  // Shield bubble
  if (ship.shield > 0) {
    const shieldAlpha = 0.15 + Math.sin(Date.now() * 0.004) * 0.05;
    ctx.strokeStyle = `rgba(100,150,255,${shieldAlpha + 0.2})`;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(0, 0, ship.radius + 8, 0, Math.PI * 2 * (ship.shield / ship.maxShield));
    ctx.stroke();
  }

  ctx.restore();

  // Engine glow
  if (ship.engineGlow > 0.1) {
    const ex = ship.x - Math.cos(ship.angle) * 18;
    const ey = ship.y - Math.sin(ship.angle) * 18;
    const gs = w2s(ex, ey);
    const r = 12 * ship.engineGlow;
    const grad = ctx.createRadialGradient(gs.x, gs.y, 0, gs.x, gs.y, r);
    const gc = ship.isPlayer ? '0,150,255' : '255,100,0';
    grad.addColorStop(0, `rgba(${gc},0.7)`);
    grad.addColorStop(1, `rgba(${gc},0)`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(gs.x, gs.y, r, 0, Math.PI * 2);
    ctx.fill();
  }

  // Enemy health bar
  if (!ship.isPlayer && ship.hp < ship.maxHp) {
    const barW = 30;
    const hpPct = ship.hp / ship.maxHp;
    ctx.fillStyle = 'rgba(255,0,0,0.5)';
    ctx.fillRect(s.x - barW/2, s.y - ship.radius - 12, barW, 3);
    ctx.fillStyle = hpPct > 0.5 ? '#0f0' : hpPct > 0.25 ? '#ff0' : '#f00';
    ctx.fillRect(s.x - barW/2, s.y - ship.radius - 12, barW * hpPct, 3);
  }
}

function drawPlayerShip() {

  ctx.lineTo(-6, 18);

function drawInterceptor() {

// ============ POWERUPS ============
let powerups = [];

function spawnPowerup(x, y) {
  const types = ['health', 'shield', 'score'];
  powerups.push({
    x, y, type: types[randInt(0, 2)],
    radius: 12, life: 15, phase: rand(0, Math.PI * 2)
  });
}

function updatePowerups(dt) {
  for (let i = powerups.length - 1; i >= 0; i--) {
    powerups[i].life -= dt;
    powerups[i].phase += dt * 3;
    if (powerups[i].life <= 0) powerups.splice(i, 1);
  }
}

function drawPowerups() {
  for (const pu of powerups) {
    const s = w2s(pu.x, pu.y);
    if (!isOnScreen(s.x, s.y, 30)) continue;
    const bob = Math.sin(pu.phase) * 3;
    const colors = { health: '#0f0', shield: '#44f', score: '#ff0' };
    const icons = { health: '+', shield: '◇', score: '★' };
    const blink = pu.life < 3 ? (Math.sin(pu.life * 10) > 0 ? 1 : 0.3) : 1;

    ctx.save();
    ctx.translate(s.x, s.y + bob);
    ctx.globalAlpha = blink;

    ctx.shadowColor = colors[pu.type];
    ctx.shadowBlur = 12;
    ctx.fillStyle = colors[pu.type];
    ctx.globalAlpha = blink * 0.2;
    ctx.beginPath(); ctx.arc(0, 0, pu.radius, 0, Math.PI * 2); ctx.fill();

    ctx.globalAlpha = blink;
    ctx.strokeStyle = colors[pu.type];
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(0, 0, pu.radius, 0, Math.PI * 2); ctx.stroke();

    ctx.fillStyle = '#fff';
    ctx.font = '14px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(icons[pu.type], 0, 1);

    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
    ctx.restore();
  }
}

// ============ COLLISIONS ============
function checkCollisions() {
  // Projectiles vs asteroids
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    let hit = false;
    for (let j = asteroids.length - 1; j >= 0; j--) {
      const a = asteroids[j];
      if (dist(p, a) < a.radius + p.radius) {
        a.hp -= p.damage;
        spawnExplosion(p.x, p.y, 6, ['#a86', '#654', '#fff'], 60, 2);
        if (a.hp <= 0) {
          // Split
          if (a.size > 1) {
            for (let k = 0; k < 2; k++) {
              const sa = rand(0, Math.PI * 2);
              const ss = rand(30, 60);
              asteroids.push(createAsteroid(a.x + rand(-10,10), a.y + rand(-10,10),
                a.size - 1, Math.cos(sa)*ss + a.vx*0.5, Math.sin(sa)*ss + a.vy*0.5));
            }
          }
          spawnExplosion(a.x, a.y, 25, ['#a86', '#654', '#ff0'], 120, 3);
          camera.shake = Math.max(camera.shake, 3);
          asteroids.splice(j, 1);
          if (p.owner === 'player') score += a.size * 15;
        }
        projectiles.splice(i, 1);
        hit = true;
        break;
      }
    }
    if (hit) continue;

    // Player projectiles vs enemies
    if (p.owner === 'player') {
      for (const e of enemies) {
        if (!e.alive) continue;
        if (dist(p, e) < e.radius + p.radius) {
          shipTakeDamage(e, p.damage);
          spawnExplosion(p.x, p.y, 6, ['#ff0', '#fff'], 60, 2);
          if (!e.alive) {
            combo++;
            comboTimer = 3;
            totalKills++;
            score += 100 * combo;
            if (Math.random() > 0.4) spawnPowerup(e.x, e.y);
          }
          projectiles.splice(i, 1);
          break;
        }
      }
    }
    // Enemy projectiles vs player
    else if (p.owner === 'enemy' && player.alive) {
      if (dist(p, player) < player.radius + p.radius) {
        shipTakeDamage(player, p.damage);
        spawnExplosion(p.x, p.y, 6, ['#f44', '#fff'], 60, 2);
        camera.shake = Math.max(camera.shake, 5);
        projectiles.splice(i, 1);
      }
    }
  }

  // Ships vs asteroids
  for (const a of asteroids) {
    if (player.alive && dist(player, a) < player.radius + a.radius - 4) {
      shipTakeDamage(player, 20);
      camera.shake = Math.max(camera.shake, 8);
      const pa = angleTo(a, player);
      player.vx += Math.cos(pa) * 250;
      player.vy += Math.sin(pa) * 250;
    }
    for (const e of enemies) {
      if (!e.alive) continue;
      if (dist(e, a) < e.radius + a.radius - 4) {
        shipTakeDamage(e, 12);
        const pa = angleTo(a, e);
        e.vx += Math.cos(pa) * 120;
        e.vy += Math.sin(pa) * 120;
      }
    }
  }

  // Player vs powerups
  for (let i = powerups.length - 1; i >= 0; i--) {
    const pu = powerups[i];
    if (player.alive && dist(player, pu) < player.radius + pu.radius) {
      if (pu.type === 'health') player.hp = Math.min(player.maxHp, player.hp + 25);
      else if (pu.type === 'shield') player.shield = Math.min(player.maxShield, player.shield + 30);
      else if (pu.type === 'score') score += 250;
      for (let j = 0; j < 10; j++) {
        const a = rand(0, Math.PI * 2);
        addParticle(pu.x, pu.y, Math.cos(a)*rand(40,100), Math.sin(a)*rand(40,100),
          rand(0.2, 0.5), '#fff', rand(1,3), 'spark');
      }
      powerups.splice(i, 1);
    }
  }
}

// ============ GAME STATE ============
let gameRunning = false;
let score = 0;
let hiScore = parseInt(localStorage.getItem('voidStrikerHi') || '0');
let wave = 0;
let waveTimer = 0;
let combo = 0;
let comboTimer = 0;
let difficulty = 1;

document.getElementById('hi-score').textContent = 'HI: ' + hiScore;

function startGame() {
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('death-screen').style.display = 'none';

  player = createShip(0, 0, true);
  enemies = [];
  asteroids = [];
  projectiles = [];
  particles = [];
  powerups = [];
  score = 0;
  wave = 0;
  waveTimer = 2;
  combo = 0;
  comboTimer = 0;
  difficulty = 1;
  totalKills = 0;
  camera.x = 0;
  camera.y = 0;
  camera.shake = 0;
  gameRunning = true;

  spawnWave();
}

function spawnWave() {
  wave++;
  difficulty = 1 + wave * 0.12;

  const announce = document.getElementById('wave-announce');
  announce.textContent = `WAVE ${wave}`;
  announce.style.opacity = 1;
  setTimeout(() => announce.style.opacity = 0, 2000);

  document.getElementById('wave-info').textContent = `WAVE ${wave}`;

  // Asteroids
  const numAst = 4 + wave * 2;
  for (let i = 0; i < numAst; i++) {
    const a = rand(0, Math.PI * 2);
    const d = rand(300, 1200);
    asteroids.push(createAsteroid(
      player.x + Math.cos(a) * d,
      player.y + Math.sin(a) * d,
      randInt(1, 3)
    ));
  }

  // Enemies
  const numEnemies = Math.min(2 + Math.floor(wave * 0.8), 8);
  for (let i = 0; i < numEnemies; i++) {
    const a = rand(0, Math.PI * 2);
    const d = rand(500, 900);
    const e = createShip(player.x + Math.cos(a) * d, player.y + Math.sin(a) * d, false);
    e.type = Math.random() > 0.5 ? 'interceptor' : 'heavy';
    if (e.type === 'interceptor') {
      e.hp = Math.floor(35 * difficulty);
      e.maxHp = e.hp;
      e.speed = 220;
      e.fireRate = 0.35;
      e.radius = 15;
    } else {
      e.hp = Math.floor(60 * difficulty);
      e.maxHp = e.hp;
      e.speed = 140;
      e.fireRate = 0.5;
      e.radius = 20;
    }
    e.missileRate = rand(2.5, 4);
    enemies.push(e);
  }
}

// ============ DRAWING ============
function drawBackground() {
  // Deep space gradient
  const bgGrad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W, H));
  bgGrad.addColorStop(0, '#0a0818');
  bgGrad.addColorStop(1, '#000408');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  // Nebulae
  for (const n of nebulae) {
    const px = n.x - camera.x * n.parallax + W / 2;
    const py = n.y - camera.y * n.parallax + H / 2;
    if (px < -n.radius * 2 || px > W + n.radius * 2 || py < -n.radius * 2 || py > H + n.radius * 2) continue;
    const grad = ctx.createRadialGradient(px, py, 0, px, py, n.radius);
    grad.addColorStop(0, `rgba(${n.r},${n.g},${n.b},0.06)`);
    grad.addColorStop(0.5, `rgba(${n.r},${n.g},${n.b},0.03)`);
    grad.addColorStop(1, `rgba(${n.r},${n.g},${n.b},0)`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(px, py, n.radius, 0, Math.PI * 2);
    ctx.fill();
  }

  // Stars with parallax
  const time = Date.now() * 0.001;
  for (let layer = 0; layer < 3; layer++) {
    for (const star of starLayers[layer]) {
      let sx = ((star.x - camera.x * star.parallax) % (W + 200));
      let sy = ((star.y - camera.y * star.parallax) % (H + 200));
      if (sx < -100) sx += W + 200;
      if (sy < -100) sy += H + 200;
      const twinkle = 0.7 + Math.sin(time * 2 + star.twinkle) * 0.3;
      ctx.fillStyle = `rgba(200,220,255,${star.brightness * twinkle})`;
      ctx.beginPath();
      ctx.arc(sx, sy, star.size, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function drawCrosshair() {
  if (!player.alive) return;
  ctx.strokeStyle = 'rgba(0,255,255,0.4)';
  ctx.lineWidth = 1;
  const cx = mouseX, cy = mouseY;
  const sz = 14;
  // Cross
  ctx.beginPath();
  ctx.moveTo(cx - sz, cy); ctx.lineTo(cx - sz/3, cy);
  ctx.moveTo(cx + sz/3, cy); ctx.lineTo(cx + sz, cy);
  ctx.moveTo(cx, cy - sz); ctx.lineTo(cx, cy - sz/3);
  ctx.moveTo(cx, cy + sz/3); ctx.lineTo(cx, cy + sz);
  ctx.stroke();
  // Circle
  ctx.beginPath();
  ctx.arc(cx, cy, sz * 0.6, 0, Math.PI * 2);
  ctx.stroke();
  // Dot
  ctx.fillStyle = 'rgba(0,255,255,0.6)';
  ctx.beginPath();
  ctx.arc(cx, cy, 1.5, 0, Math.PI * 2);
  ctx.fill();
}

function drawMinimap() {
  mmCtx.clearRect(0, 0, 160, 160);
  const scale = 0.05;
  const cx = 80, cy = 80;

  mmCtx.fillStyle = 'rgba(0,8,20,0.6)';
  mmCtx.beginPath();
  mmCtx.arc(80, 80, 78, 0, Math.PI * 2);
  mmCtx.fill();

  // Rings
  mmCtx.strokeStyle = 'rgba(0,255,255,0.1)';
  mmCtx.lineWidth = 0.5;
  for (let r = 25; r <= 75; r += 25) {
    mmCtx.beginPath(); mmCtx.arc(80, 80, r, 0, Math.PI * 2); mmCtx.stroke();
  }

  // Asteroids
  mmCtx.fillStyle = 'rgba(150,100,50,0.5)';
  for (const a of asteroids) {
    const dx = (a.x - player.x) * scale;
    const dy = (a.y - player.y) * scale;
    if (Math.hypot(dx, dy) > 76) continue;
    mmCtx.beginPath();
    mmCtx.arc(cx + dx, cy + dy, Math.max(1, a.size), 0, Math.PI * 2);
    mmCtx.fill();
  }

  // Enemies
  for (const e of enemies) {
    if (!e.alive) continue;
    const dx = (e.x - player.x) * scale;
    const dy = (e.y - player.y) * scale;
    if (Math.hypot(dx, dy) > 76) continue;
    mmCtx.fillStyle = '#f44';
    mmCtx.beginPath();
    mmCtx.arc(cx + dx, cy + dy, 3, 0, Math.PI * 2);
    mmCtx.fill();
  }

  // Powerups
  for (const pu of powerups) {
    const dx = (pu.x - player.x) * scale;
    const dy = (pu.y - player.y) * scale;
    if (Math.hypot(dx, dy) > 76) continue;
    mmCtx.fillStyle = '#0f0';
    mmCtx.beginPath();
    mmCtx.arc(cx + dx, cy + dy, 2, 0, Math.PI * 2);
    mmCtx.fill();
  }

  // Player
  mmCtx.fillStyle = '#0ff';
  mmCtx.beginPath();
  mmCtx.arc(cx, cy, 3, 0, Math.PI * 2);
  mmCtx.fill();
  mmCtx.strokeStyle = '#0ff';
  mmCtx.lineWidth = 1;
  mmCtx.beginPath();
  mmCtx.moveTo(cx, cy);
  mmCtx.lineTo(cx + Math.cos(player.angle) * 10, cy + Math.sin(player.angle) * 10);
  mmCtx.stroke();
}

function updateHUD() {
  const hpPct = (player.hp / player.maxHp) * 100;
  const hpBar = document.getElementById('health-bar');
  hpBar.style.width = hpPct + '%';
  hpBar.style.background = hpPct < 30 ? 'linear-gradient(90deg, #f00, #f80)' : 'linear-gradient(90deg, #0f0, #0ff)';

  document.getElementById('shield-bar').style.width = (player.shield / player.maxShield * 100) + '%';
  document.getElementById('score-text').textContent = score.toLocaleString();
  document.getElementById('hi-score').textContent = 'HI: ' + hiScore.toLocaleString();
  document.getElementById('enemy-count').textContent = 'ENEMIES: ' + enemies.filter(e => e.alive).length;

  const comboEl = document.getElementById('combo-display');
  if (combo > 1) {
    comboEl.textContent = `${combo}x COMBO!`;
    comboEl.style.opacity = 1;
    comboEl.style.fontSize = Math.min(16 + combo * 2, 28) + 'px';
  } else {
    comboEl.style.opacity = 0;
  }

  const spd = Math.round(Math.hypot(player.vx, player.vy));
  document.getElementById('speed-text').textContent = 'SPD: ' + spd;
  document.getElementById('afterburner-text').style.opacity = player.afterburner ? 1 : 0;
  document.getElementById('ammo-text').textContent = 'MISSILES: ' + (player.missileCooldown > 0 ? 'RELOADING' : 'READY');
}

// ============ MAIN LOOP ============
let lastTime = 0;

function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;

  if (gameRunning) {
    // Update
    updateShip(player, dt);
    for (const e of enemies) updateShip(e, dt);
    updateProjectiles(dt);
    updateAsteroids(dt);
    updateParticles(dt);
    updatePowerups(dt);
    checkCollisions();

    // Combo
    if (comboTimer > 0) {
      comboTimer -= dt;
      if (comboTimer <= 0) combo = 0;
    }

    // Clean dead
    enemies = enemies.filter(e => e.alive || e.damageFlash > 0);

    // Wave check
    if (enemies.filter(e => e.alive).length === 0) {
      waveTimer -= dt;
      if (waveTimer <= 0) {
        spawnWave();
        waveTimer = 3;
      }
    }

    // Camera
    camera.x = lerp(camera.x, player.x, dt * 5);
    camera.y = lerp(camera.y, player.y, dt * 5);
    camera.shake *= Math.pow(0.01, dt);
    if (camera.shake < 0.1) camera.shake = 0;

    // Death
    if (!player.alive && gameRunning) {
      gameRunning = false;
      if (score > hiScore) {
        hiScore = score;
        localStorage.setItem('voidStrikerHi', hiScore.toString());
      }
      setTimeout(() => {
        document.getElementById('death-screen').style.display = 'flex';
        document.getElementById('final-score').textContent = 'SCORE: ' + score.toLocaleString();
        document.getElementById('death-stats').textContent =
          `Wave ${wave} | ${totalKills} kills | Best combo: ${combo}x`;
      }, 2000);
    }
  }

  // Render
  drawBackground();
  drawPowerups();
  drawAsteroids();
  drawProjectiles();
  for (const e of enemies) drawShip(e);
  if (player) drawShip(player);
  drawParticles();
  if (player && player.alive) drawCrosshair();

  if (gameRunning || (player && !player.alive)) {
    updateHUD();
    drawMinimap();
  }

  // Low health vignette
  if (player && player.alive && player.hp < player.maxHp * 0.3) {
    const vigAlpha = (1 - player.hp / (player.maxHp * 0.3)) * 0.3;
    const pulse = Math.sin(Date.now() * 0.005) * 0.1;
    const vig = ctx.createRadialGradient(W/2, H/2, W * 0.3, W/2, H/2, W * 0.7);
    vig.addColorStop(0, 'rgba(255,0,0,0)');
    vig.addColorStop(1, `rgba(255,0,0,${vigAlpha + pulse})`);
    ctx.fillStyle = vig;
    ctx.fillRect(0, 0, W, H);
  }

  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);
</script>
