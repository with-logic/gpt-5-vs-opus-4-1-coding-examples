<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ocean Wave Simulation</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  overflow: hidden;
  background: #0a1628;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  color: #e0e8f0;
}

#canvas-container {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
}

canvas { display: block; }

/* Loading screen */
#loading {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 100;
  background: linear-gradient(180deg, #0a1628 0%, #0d1f3c 50%, #132847 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: opacity 1.5s ease;
}

#loading.hidden {
  opacity: 0;
  pointer-events: none;
}

#loading h2 {
  font-weight: 200;
  font-size: 22px;
  letter-spacing: 8px;
  text-transform: uppercase;
  color: rgba(160, 200, 240, 0.6);
  margin-bottom: 30px;
}

.loading-wave {
  width: 60px;
  height: 20px;
  position: relative;
}

.loading-wave span {
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: rgba(100, 170, 240, 0.5);
  margin: 0 3px;
  animation: loadBounce 1.4s ease-in-out infinite;
}

.loading-wave span:nth-child(2) { animation-delay: 0.16s; }
.loading-wave span:nth-child(3) { animation-delay: 0.32s; }
.loading-wave span:nth-child(4) { animation-delay: 0.48s; }

@keyframes loadBounce {
  0%, 80%, 100% { transform: translateY(0); opacity: 0.3; }
  40% { transform: translateY(-12px); opacity: 1; }
}

/* Controls Panel */
#controls {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  background: rgba(8, 18, 38, 0.55);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid rgba(120, 170, 220, 0.12);
  border-radius: 20px;
  padding: 20px 32px 16px;
  display: flex;
  gap: 32px;
  align-items: flex-start;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255,255,255,0.04);
  transition: background 0.4s ease, box-shadow 0.4s ease;
  opacity: 0;
  animation: fadeInControls 1s ease 2s forwards;
}

@keyframes fadeInControls {
  to { opacity: 1; }
}

#controls:hover {
  background: rgba(8, 18, 38, 0.75);
  box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.06);
}

.control-group {
  display: flex;
  flex-direction: column;
  align-items: center;
  min-width: 110px;
}

.control-group label {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 2.5px;
  color: rgba(160, 200, 240, 0.55);
  margin-bottom: 10px;
  font-weight: 500;
}

.control-group .value-display {
  font-size: 12px;
  color: rgba(180, 215, 255, 0.8);
  margin-top: 6px;
  font-variant-numeric: tabular-nums;
  font-weight: 300;
  letter-spacing: 0.5px;
}

input[type="range"] {
  -webkit-appearance: none;
  appearance: none;
  width: 120px;
  height: 3px;
  border-radius: 2px;
  background: linear-gradient(90deg, rgba(60, 120, 180, 0.15), rgba(80, 150, 220, 0.25));
  outline: none;
  cursor: pointer;
}

input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #8ec5f0, #3a7cbd);
  border: 1.5px solid rgba(255,255,255,0.15);
  box-shadow: 0 2px 8px rgba(60, 120, 190, 0.35), 0 0 12px rgba(80, 150, 220, 0.15);
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}

input[type="range"]::-webkit-slider-thumb:hover {
  transform: scale(1.2);
  box-shadow: 0 2px 12px rgba(60, 120, 190, 0.5), 0 0 16px rgba(80, 150, 220, 0.25);
}

input[type="range"]::-moz-range-thumb {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #8ec5f0, #3a7cbd);
  border: 1.5px solid rgba(255,255,255,0.15);
  box-shadow: 0 2px 8px rgba(60, 120, 190, 0.35);
  cursor: pointer;
}

/* Title */
#title {
  position: fixed;
  top: 28px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  text-align: center;
  pointer-events: none;
  opacity: 0;
  animation: fadeInTitle 1.5s ease 1.5s forwards;
}

@keyframes fadeInTitle {
  to { opacity: 1; }
}

#title h1 {
  font-size: 14px;
  font-weight: 300;
  letter-spacing: 8px;
  text-transform: uppercase;
  color: rgba(180, 215, 255, 0.4);
  text-shadow: 0 1px 8px rgba(0,0,0,0.3);
}

/* Info overlay */
#info {
  position: fixed;
  top: 28px;
  right: 28px;
  z-index: 10;
  font-size: 10px;
  color: rgba(160, 200, 240, 0.3);
  text-align: right;
  letter-spacing: 0.5px;
  line-height: 1.6;
  opacity: 0;
  animation: fadeInTitle 1s ease 2.5s forwards;
}

/* Preset buttons */
.presets {
  display: flex;
  gap: 6px;
  margin-top: 4px;
  flex-wrap: wrap;
  justify-content: center;
}

.preset-btn {
  background: rgba(80, 130, 180, 0.1);
  border: 1px solid rgba(120, 170, 220, 0.12);
  color: rgba(160, 200, 240, 0.6);
  padding: 4px 10px;
  border-radius: 8px;
  font-size: 9px;
  cursor: pointer;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  transition: all 0.3s ease;
  font-family: inherit;
}

.preset-btn:hover {
  background: rgba(80, 130, 180, 0.25);
  color: rgba(200, 225, 255, 0.9);
  border-color: rgba(120, 170, 220, 0.25);
}

.preset-btn.active {
  background: rgba(60, 120, 190, 0.25);
  border-color: rgba(100, 160, 220, 0.35);
  color: rgba(200, 225, 255, 0.9);
}

/* Vignette overlay */
#vignette {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 5;
  background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.35) 100%);
}

@media (max-width: 700px) {
  #controls {
    flex-wrap: wrap;
    gap: 16px;
    padding: 14px 18px 10px;
    max-width: 92vw;
    justify-content: center;
    bottom: 12px;
  }
  .control-group { min-width: 90px; }
  input[type="range"] { width: 90px; }
  .control-group label { font-size: 8px; letter-spacing: 1.5px; }
}
</style>
</head>
<body>

<div id="loading">
  <h2>Ocean</h2>
  <div class="loading-wave">
    <span></span><span></span><span></span><span></span>
  </div>
</div>

<div id="title">
  <h1>Ocean Wave Simulation</h1>
</div>

<div id="info">
  <span id="fps-display"></span>
</div>

<div id="vignette"></div>

<div id="canvas-container"></div>

<div id="controls">
  <div class="control-group">
    <label>Wind Speed</label>
    <input type="range" id="windSpeed" min="0" max="100" value="35">
    <div class="value-display"><span id="windVal">35</span> kn</div>
  </div>
  <div class="control-group">
    <label>Wave Height</label>
    <input type="range" id="waveHeight" min="0" max="100" value="45">
    <div class="value-display"><span id="waveVal">4.5</span> m</div>
  </div>
  <div class="control-group">
    <label>Sun Height</label>
    <input type="range" id="sunElevation" min="0" max="100" value="35">
    <div class="value-display"><span id="sunVal">35</span>°</div>
  </div>
  <div class="control-group">
    <label>Sun Angle</label>
    <input type="range" id="sunAzimuth" min="0" max="360" value="200">
    <div class="value-display"><span id="azVal">200</span>°</div>
  </div>
  <div class="control-group">
    <label>Presets</label>
    <div class="presets">
      <button class="preset-btn" data-preset="calm">Calm</button>
      <button class="preset-btn" data-preset="moderate">Mod</button>
      <button class="preset-btn" data-preset="storm">Storm</button>
      <button class="preset-btn" data-preset="sunset">Sunset</button>
      <button class="preset-btn" data-preset="dawn">Dawn</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// ============================================================
// OCEAN WAVE SIMULATION — High-Quality WebGL Implementation
// ============================================================

// --- Ocean Vertex Shader ---
const oceanVertexShader = `
  uniform float uTime;
  uniform float uWindSpeed;
  uniform float uWaveHeight;

  varying vec3 vWorldPosition;
  varying vec3 vNormal;
  varying vec2 vUv;
  varying float vFoam;
  varying float vHeight;

  // Gerstner wave: returns displacement and modifies tangent/binormal
  vec3 gerstnerWave(vec2 pos, float amplitude, float frequency, float speed, vec2 direction, float steepness, inout vec3 tangent, inout vec3 binormal) {
    float k = frequency;
    float c = speed / k;
    vec2 d = normalize(direction);
    float f = k * (dot(d, pos) - c * uTime);
    float a = steepness / k;
    float sf = sin(f);
    float cf = cos(f);

    tangent += vec3(
      -d.x * d.x * steepness * sf,
      d.x * steepness * cf,
      -d.x * d.y * steepness * sf
    );
    binormal += vec3(
      -d.x * d.y * steepness * sf,
      d.y * steepness * cf,
      -d.y * d.y * steepness * sf
    );

    return vec3(
      d.x * a * cf,
      amplitude * sf,
      d.y * a * cf
    );
  }

  void main() {
    vUv = uv;

    vec3 pos = position;
    vec3 tangent = vec3(1.0, 0.0, 0.0);
    vec3 binormal = vec3(0.0, 0.0, 1.0);

    float h = uWaveHeight;
    float ws = 0.4 + uWindSpeed * 0.025;

    // 7 wave layers — large swell to small chop
    pos += gerstnerWave(pos.xz, h * 1.2, 0.08, ws * 0.8, vec2(1.0, 0.25), 0.5 * h * 0.12, tangent, binormal);
    pos += gerstnerWave(pos.xz, h * 0.8, 0.14, ws * 1.0, vec2(0.75, 0.65), 0.4 * h * 0.12, tangent, binormal);
    pos += gerstnerWave(pos.xz, h * 0.55, 0.22, ws * 0.85, vec2(-0.35, 0.92), 0.32 * h * 0.12, tangent, binormal);
    pos += gerstnerWave(pos.xz, h * 0.35, 0.35, ws * 1.3, vec2(0.55, -0.45), 0.25 * h * 0.12, tangent, binormal);
    pos += gerstnerWave(pos.xz, h * 0.22, 0.55, ws * 1.7, vec2(-0.5, 0.72), 0.18 * h * 0.12, tangent, binormal);
    pos += gerstnerWave(pos.xz, h * 0.12, 0.85, ws * 2.1, vec2(0.38, 0.52), 0.12 * h * 0.12, tangent, binormal);
    pos += gerstnerWave(pos.xz, h * 0.06, 1.3, ws * 2.6, vec2(-0.6, -0.35), 0.08 * h * 0.12, tangent, binormal);

    vec3 normal = normalize(cross(binormal, tangent));
    vNormal = normal;
    vWorldPosition = (modelMatrix * vec4(pos, 1.0)).xyz;
    vHeight = pos.y;

    // Foam: based on wave crest height and wind
    float crestFoam = smoothstep(h * 0.4, h * 0.9, pos.y);
    float windFoam = smoothstep(15.0, 60.0, uWindSpeed) * smoothstep(h * 0.2, h * 0.7, pos.y);
    vFoam = max(crestFoam * 0.6, windFoam * 0.5);

    gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
  }
`;

// --- Ocean Fragment Shader ---
const oceanFragmentShader = `
  uniform vec3 uSunDirection;
  uniform vec3 uSunColor;
  uniform vec3 uWaterDeepColor;
  uniform vec3 uWaterShallowColor;
  uniform vec3 uSkyColor;
  uniform vec3 uHorizonColor;
  uniform float uTime;
  uniform float uWindSpeed;
  uniform float uWaveHeight;
  uniform vec3 uCameraPosition;
  uniform float uAmbientIntensity;

  varying vec3 vWorldPosition;
  varying vec3 vNormal;
  varying vec2 vUv;
  varying float vFoam;
  varying float vHeight;

  float fresnelSchlick(float cosTheta, float f0) {
    return f0 + (1.0 - f0) * pow(1.0 - cosTheta, 5.0);
  }

  float hash(vec2 p) {
    return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123);
  }

  float noise(vec2 p) {
    vec2 i = floor(p);
    vec2 f = fract(p);
    f = f * f * (3.0 - 2.0 * f);
    return mix(
      mix(hash(i), hash(i + vec2(1.0, 0.0)), f.x),
      mix(hash(i + vec2(0.0, 1.0)), hash(i + vec2(1.0, 1.0)), f.x),
      f.y
    );
  }

  float fbm(vec2 p) {
    float val = 0.0;
    float amp = 0.5;
    for (int i = 0; i < 4; i++) {
      val += amp * noise(p);
      p *= 2.1;
      amp *= 0.5;
    }
    return val;
  }

  void main() {
    vec3 N = normalize(vNormal);
    vec3 V = normalize(uCameraPosition - vWorldPosition);
    vec3 L = normalize(uSunDirection);
    vec3 H = normalize(L + V);

    float NdotV = max(dot(N, V), 0.0);
    float NdotL = max(dot(N, L), 0.0);
    float NdotH = max(dot(N, H), 0.0);

    // Fresnel
    float F = fresnelSchlick(NdotV, 0.02);

    // Water body color
    float depthFactor = smoothstep(-0.5, 1.0, N.y);
    vec3 waterColor = mix(uWaterDeepColor, uWaterShallowColor, depthFactor);

    // Subsurface scattering
    float sssAmount = pow(max(dot(V, -L + N * 0.6), 0.0), 2.5) * 0.2;
    vec3 sssColor = vec3(0.0, 0.45, 0.35) * sssAmount * uSunColor;

    // Diffuse
    vec3 ambient = waterColor * uAmbientIntensity * 0.3;
    vec3 diffuse = waterColor * NdotL * uSunColor * 0.35;

    // Specular highlights (dual lobe)
    float specSharp = pow(NdotH, 512.0) * 3.0;
    float specMed = pow(NdotH, 64.0) * 0.6;
    float specBroad = pow(NdotH, 16.0) * 0.12;
    vec3 specular = uSunColor * (specSharp + specMed + specBroad);

    // Sky reflection
    vec3 R = reflect(-V, N);
    float skyGrad = smoothstep(-0.05, 0.6, R.y);
    vec3 skyRefl = mix(uHorizonColor * 0.8, uSkyColor, skyGrad);

    // Sun reflection in sky
    float sunInSky = pow(max(dot(R, L), 0.0), 256.0) * 3.0;
    float sunInSkyBroad = pow(max(dot(R, L), 0.0), 24.0) * 0.4;
    skyRefl += uSunColor * (sunInSky + sunInSkyBroad);

    // Combine: reflection + water body
    vec3 color = mix(diffuse + sssColor + ambient, skyRefl, F);
    color += specular;

    // Foam with animated noise
    vec2 foamUV = vWorldPosition.xz;
    float foamNoise = fbm(foamUV * 1.5 + uTime * 0.2) * 0.5 +
                      fbm(foamUV * 3.0 - uTime * 0.15) * 0.3 +
                      noise(foamUV * 6.0 + uTime * 0.1) * 0.2;
    float foam = smoothstep(0.25, 0.65, vFoam * foamNoise * 2.5);
    foam *= smoothstep(5.0, 30.0, uWindSpeed);

    // Whitecap foam on steep crests
    vec3 foamColor = vec3(0.92, 0.96, 1.0) * (0.5 + 0.5 * NdotL);
    color = mix(color, foamColor, foam * 0.65);

    // Distance fog — blend toward horizon
    float dist = length(vWorldPosition.xz - uCameraPosition.xz);
    float fogFactor = 1.0 - exp(-dist * 0.0025);
    fogFactor = clamp(fogFactor, 0.0, 1.0);
    vec3 fogColor = mix(uHorizonColor, uSkyColor * 0.8, 0.25);
    color = mix(color, fogColor, fogFactor * 0.85);

    // ACES tone mapping
    color *= 0.85;
    color = (color * (2.51 * color + 0.03)) / (color * (2.43 * color + 0.59) + 0.14);

    // Gamma
    color = pow(color, vec3(1.0 / 2.2));

    gl_FragColor = vec4(color, 1.0);
  }
`;

// --- Sky Vertex Shader ---
const skyVertexShader = `
  varying vec3 vWorldPosition;
  void main() {
    vec4 worldPos = modelMatrix * vec4(position, 1.0);
    vWorldPosition = worldPos.xyz;
    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    gl_Position.z = gl_Position.w;
  }
`;

// --- Sky Fragment Shader ---
const skyFragmentShader = `
  uniform vec3 uSunDirection;
  uniform vec3 uSunColor;
  uniform vec3 uSkyColor;
  uniform vec3 uHorizonColor;
  uniform vec3 uSunsetColor;

  varying vec3 vWorldPosition;

  void main() {
    vec3 dir = normalize(vWorldPosition);
    vec3 sunDir = normalize(uSunDirection);

    float y = dir.y;

    // Base sky gradient
    vec3 sky = mix(uHorizonColor, uSkyColor, smoothstep(-0.01, 0.6, y));

    // Below horizon — darker
    sky = mix(uHorizonColor * 0.3, sky, smoothstep(-0.15, 0.0, y));

    // Sunset band near horizon
    float sunProximity = max(dot(dir, sunDir), 0.0);
    float horizonBand = smoothstep(0.25, 0.0, abs(y)) * smoothstep(-0.05, 0.1, sunDir.y);
    sky = mix(sky, uSunsetColor, horizonBand * 0.6);

    // Sun disc
    float sunAngle = acos(clamp(dot(dir, sunDir), -1.0, 1.0));
    float sunDisc = smoothstep(0.022, 0.018, sunAngle);
    sky += uSunColor * sunDisc * 4.0;

    // Inner glow
    float innerGlow = exp(-sunAngle * 4.0);
    sky += uSunColor * innerGlow * 0.5;

    // Outer glow
    float outerGlow = exp(-sunAngle * 1.2);
    sky += uSunsetColor * outerGlow * 0.12;

    // Subtle cloud-like wisps
    float cloudNoise = sin(dir.x * 8.0 + dir.z * 3.0) * sin(dir.x * 3.0 - dir.z * 7.0);
    cloudNoise = smoothstep(0.3, 0.8, cloudNoise * 0.5 + 0.5);
    float cloudMask = smoothstep(0.05, 0.3, y) * smoothstep(0.7, 0.3, y);
    sky = mix(sky, sky + vec3(0.08, 0.08, 0.1), cloudNoise * cloudMask * 0.15 * max(sunDir.y, 0.1));

    // Tone mapping
    sky = (sky * (2.51 * sky + 0.03)) / (sky * (2.43 * sky + 0.59) + 0.14);
    sky = pow(sky, vec3(1.0 / 2.2));

    gl_FragColor = vec4(sky, 1.0);
  }
`;


// ============================================================
// MAIN APPLICATION
// ============================================================

let scene, camera, renderer, oceanMesh, skyMesh;
let clock;
let elapsedTime = 0;

let params = {
  windSpeed: 35,
  waveHeight: 4.5,
  sunElevation: 35,
  sunAzimuth: 200
};

// Smoothed params for gradual transitions
let smoothParams = { ...params };

let frameCount = 0;
let lastFpsTime = 0;
let lastTime = 0;

function init() {
  clock = new THREE.Clock();

  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.5, 2000);
  camera.position.set(0, 14, 40);
  camera.lookAt(0, -2, -30);

  renderer = new THREE.WebGLRenderer({
    antialias: true,
    alpha: false,
    powerPreference: 'high-performance'
  });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.toneMapping = THREE.NoToneMapping;
  document.getElementById('canvas-container').appendChild(renderer.domElement);

  createSky();
  createOcean();

  window.addEventListener('resize', onResize);
  setupControls();

  // Hide loading screen
  setTimeout(() => {
    document.getElementById('loading').classList.add('hidden');
  }, 1200);

  animate();
}

function createSky() {
  const geo = new THREE.SphereGeometry(950, 48, 48);
  const mat = new THREE.ShaderMaterial({
    vertexShader: skyVertexShader,
    fragmentShader: skyFragmentShader,
    uniforms: buildSkyUniforms(),
    side: THREE.BackSide,
    depthWrite: false
  });
  skyMesh = new THREE.Mesh(geo, mat);
  scene.add(skyMesh);
}

function createOcean() {
  const geo = new THREE.PlaneGeometry(800, 800, 300, 300);
  geo.rotateX(-Math.PI / 2);

  const mat = new THREE.ShaderMaterial({
    vertexShader: oceanVertexShader,
    fragmentShader: oceanFragmentShader,
    uniforms: buildOceanUniforms(),
    side: THREE.FrontSide
  });

  oceanMesh = new THREE.Mesh(geo, mat);
  scene.add(oceanMesh);
}

function getSunDirection(elev, azim) {
  const e = elev * Math.PI / 180;
  const a = azim * Math.PI / 180;
  return new THREE.Vector3(
    Math.cos(e) * Math.sin(a),
    Math.sin(e),
    Math.cos(e) * Math.cos(a)
  ).normalize();
}

function getSkyColors(sunY) {
  let skyColor, horizonColor, sunColor, sunsetColor, ambient;

  if (sunY > 0.35) {
    // Full day
    const t = (sunY - 0.35) / 0.65;
    skyColor = new THREE.Color().lerpColors(
      new THREE.Color(0.32, 0.52, 0.82),
      new THREE.Color(0.18, 0.38, 0.78), t
    );
    horizonColor = new THREE.Color().lerpColors(
      new THREE.Color(0.55, 0.65, 0.82),
      new THREE.Color(0.45, 0.6, 0.82), t
    );
    sunColor = new THREE.Color(1.0, 0.96, 0.88);
    sunsetColor = new THREE.Color(0.85, 0.55, 0.28);
    ambient = 0.9;
  } else if (sunY > 0.05) {
    // Low sun / golden hour
    const t = (sunY - 0.05) / 0.3;
    skyColor = new THREE.Color().lerpColors(
      new THREE.Color(0.2, 0.22, 0.5),
      new THREE.Color(0.32, 0.52, 0.82), t
    );
    horizonColor = new THREE.Color().lerpColors(
      new THREE.Color(0.85, 0.4, 0.15),
      new THREE.Color(0.55, 0.65, 0.82), t
    );
    sunColor = new THREE.Color().lerpColors(
      new THREE.Color(1.0, 0.55, 0.2),
      new THREE.Color(1.0, 0.96, 0.88), t
    );
    sunsetColor = new THREE.Color().lerpColors(
      new THREE.Color(0.95, 0.35, 0.1),
      new THREE.Color(0.85, 0.55, 0.28), t
    );
    ambient = 0.4 + t * 0.5;
  } else if (sunY > -0.05) {
    // Sunrise/sunset transition
    const t = (sunY + 0.05) / 0.1;
    skyColor = new THREE.Color().lerpColors(
      new THREE.Color(0.08, 0.08, 0.2),
      new THREE.Color(0.2, 0.22, 0.5), t
    );
    horizonColor = new THREE.Color().lerpColors(
      new THREE.Color(0.15, 0.08, 0.12),
      new THREE.Color(0.85, 0.4, 0.15), t
    );
    sunColor = new THREE.Color().lerpColors(
      new THREE.Color(0.4, 0.2, 0.15),
      new THREE.Color(1.0, 0.55, 0.2), t
    );
    sunsetColor = new THREE.Color(0.9, 0.3, 0.08);
    ambient = 0.15 + t * 0.25;
  } else {
    // Night
    const t = Math.max(0, (sunY + 0.35) / 0.3);
    skyColor = new THREE.Color().lerpColors(
      new THREE.Color(0.01, 0.01, 0.04),
      new THREE.Color(0.08, 0.08, 0.2), t
    );
    horizonColor = new THREE.Color().lerpColors(
      new THREE.Color(0.01, 0.01, 0.03),
      new THREE.Color(0.15, 0.08, 0.12), t
    );
    sunColor = new THREE.Color().lerpColors(
      new THREE.Color(0.15, 0.15, 0.25),
      new THREE.Color(0.4, 0.2, 0.15), t
    );
    sunsetColor = new THREE.Color(0.2, 0.08, 0.04);
    ambient = 0.05 + t * 0.1;
  }

  return { skyColor, horizonColor, sunColor, sunsetColor, ambient };
}

function buildOceanUniforms() {
  const sunDir = getSunDirection(params.sunElevation, params.sunAzimuth);
  const colors = getSkyColors(sunDir.y);
  return {
    uTime: { value: 0 },
    uWindSpeed: { value: params.windSpeed },
    uWaveHeight: { value: params.waveHeight },
    uSunDirection: { value: sunDir },
    uSunColor: { value: colors.sunColor },
    uWaterDeepColor: { value: new THREE.Color(0.0, 0.04, 0.12) },
    uWaterShallowColor: { value: new THREE.Color(0.0, 0.22, 0.32) },
    uSkyColor: { value: colors.skyColor },
    uHorizonColor: { value: colors.horizonColor },
    uCameraPosition: { value: new THREE.Vector3() },
    uAmbientIntensity: { value: colors.ambient }
  };
}

function buildSkyUniforms() {
  const sunDir = getSunDirection(params.sunElevation, params.sunAzimuth);
  const colors = getSkyColors(sunDir.y);
  return {
    uSunDirection: { value: sunDir },
    uSunColor: { value: colors.sunColor },
    uSkyColor: { value: colors.skyColor },
    uHorizonColor: { value: colors.horizonColor },
    uSunsetColor: { value: colors.sunsetColor }
  };
}

function updateUniforms() {
  const sunDir = getSunDirection(smoothParams.sunElevation, smoothParams.sunAzimuth);
  const colors = getSkyColors(sunDir.y);

  const ou = oceanMesh.material.uniforms;
  ou.uTime.value = elapsedTime;
  ou.uWindSpeed.value = smoothParams.windSpeed;
  ou.uWaveHeight.value = smoothParams.waveHeight;
  ou.uSunDirection.value.copy(sunDir);
  ou.uSunColor.value.copy(colors.sunColor);
  ou.uSkyColor.value.copy(colors.skyColor);
  ou.uHorizonColor.value.copy(colors.horizonColor);
  ou.uCameraPosition.value.copy(camera.position);
  ou.uAmbientIntensity.value = colors.ambient;

  // Adjust water colors based on lighting
  const dayFactor = Math.max(0, Math.min(1, sunDir.y * 3));
  ou.uWaterDeepColor.value.setRGB(
    0.0 + dayFactor * 0.0,
    0.02 + dayFactor * 0.03,
    0.06 + dayFactor * 0.08
  );
  ou.uWaterShallowColor.value.setRGB(
    0.0 + dayFactor * 0.0,
    0.12 + dayFactor * 0.12,
    0.18 + dayFactor * 0.16
  );

  const su = skyMesh.material.uniforms;
  su.uSunDirection.value.copy(sunDir);
  su.uSunColor.value.copy(colors.sunColor);
  su.uSkyColor.value.copy(colors.skyColor);
  su.uHorizonColor.value.copy(colors.horizonColor);
  su.uSunsetColor.value.copy(colors.sunsetColor);
}

// ============================================================
// ANIMATION LOOP
// ============================================================

function animate() {
  requestAnimationFrame(animate);

  const now = performance.now() / 1000;
  const delta = Math.min(now - lastTime, 0.05);
  lastTime = now;

  elapsedTime += delta;

  // Smooth parameter interpolation
  const lerpRate = 1.0 - Math.pow(0.05, delta);
  smoothParams.windSpeed += (params.windSpeed - smoothParams.windSpeed) * lerpRate;
  smoothParams.waveHeight += (params.waveHeight - smoothParams.waveHeight) * lerpRate;
  smoothParams.sunElevation += (params.sunElevation - smoothParams.sunElevation) * lerpRate;
  smoothParams.sunAzimuth += (params.sunAzimuth - smoothParams.sunAzimuth) * lerpRate;

  // Gentle camera motion
  const t = elapsedTime;
  const cx = Math.sin(t * 0.04) * 3.0 + Math.sin(t * 0.017) * 1.5;
  const cy = 13 + Math.sin(t * 0.03) * 0.6 + Math.sin(t * 0.013) * 0.3;
  const cz = 38 + Math.cos(t * 0.025) * 2.0;
  camera.position.set(cx, cy, cz);
  camera.lookAt(cx * 0.2, -2, -35);

  updateUniforms();
  renderer.render(scene, camera);

  // FPS
  frameCount++;
  if (now - lastFpsTime >= 1.0) {
    document.getElementById('fps-display').textContent = frameCount + ' FPS';
    frameCount = 0;
    lastFpsTime = now;
  }
}

// ============================================================
// CONTROLS
// ============================================================

function setupControls() {
  const sliders = {
    windSpeed: { el: 'windSpeed', display: 'windVal', format: v => Math.round(v), suffix: ' kn' },
    waveHeight: { el: 'waveHeight', display: 'waveVal', format: v => (v/10).toFixed(1), suffix: ' m', divisor: 10 },
    sunElevation: { el: 'sunElevation', display: 'sunVal', format: v => Math.round(v), suffix: '°' },
    sunAzimuth: { el: 'sunAzimuth', display: 'azVal', format: v => Math.round(v), suffix: '°' }
  };

  Object.keys(sliders).forEach(key => {
    const s = sliders[key];
    document.getElementById(s.el).addEventListener('input', (e) => {
      const raw = parseFloat(e.target.value);
      params[key] = s.divisor ? raw / s.divisor : raw;
      document.getElementById(s.display).textContent = s.format(raw);
    });
  });

  document.querySelectorAll('.preset-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      applyPreset(btn.dataset.preset);
    });
  });
}

function applyPreset(name) {
  const presets = {
    calm:     { windSpeed: 8,  waveHeight: 1.2, sunElevation: 50, sunAzimuth: 210 },
    moderate: { windSpeed: 35, waveHeight: 4.5, sunElevation: 40, sunAzimuth: 200 },
    storm:    { windSpeed: 88, waveHeight: 8.5, sunElevation: 55, sunAzimuth: 230 },
    sunset:   { windSpeed: 18, waveHeight: 2.8, sunElevation: 4,  sunAzimuth: 270 },
    dawn:     { windSpeed: 12, waveHeight: 2.0, sunElevation: 8,  sunAzimuth: 90  }
  };

  const target = presets[name];
  if (!target) return;

  animateParams(target, 2000);
}

function animateParams(target, duration) {
  const start = { ...params };
  const startTime = performance.now();

  function step(now) {
    const t = Math.min((now - startTime) / duration, 1);
    // Smooth ease in-out
    const ease = t < 0.5
      ? 4 * t * t * t
      : 1 - Math.pow(-2 * t + 2, 3) / 2;

    params.windSpeed = start.windSpeed + (target.windSpeed - start.windSpeed) * ease;
    params.waveHeight = start.waveHeight + (target.waveHeight - start.waveHeight) * ease;
    params.sunElevation = start.sunElevation + (target.sunElevation - start.sunElevation) * ease;
    params.sunAzimuth = start.sunAzimuth + (target.sunAzimuth - start.sunAzimuth) * ease;

    // Update slider positions and displays
    document.getElementById('windSpeed').value = Math.round(params.windSpeed);
    document.getElementById('windVal').textContent = Math.round(params.windSpeed);
    document.getElementById('waveHeight').value = Math.round(params.waveHeight * 10);
    document.getElementById('waveVal').textContent = params.waveHeight.toFixed(1);
    document.getElementById('sunElevation').value = Math.round(params.sunElevation);
    document.getElementById('sunVal').textContent = Math.round(params.sunElevation);
    document.getElementById('sunAzimuth').value = Math.round(params.sunAzimuth);
    document.getElementById('azVal').textContent = Math.round(params.sunAzimuth);

    if (t < 1) requestAnimationFrame(step);
  }

  requestAnimationFrame(step);
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

// Start
init();
</script>
