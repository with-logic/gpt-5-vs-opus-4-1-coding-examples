<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍪 Tea Dunkability Simulator</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-primary: #0a0a0f;
  --bg-secondary: #12121a;
  --bg-card: rgba(255, 255, 255, 0.04);
  --bg-card-hover: rgba(255, 255, 255, 0.07);
  --border-card: rgba(255, 255, 255, 0.08);
  --text-primary: #f0f0f5;
  --text-secondary: #8888a0;
  --text-muted: #55556a;
  --accent: #e8a44a;
  --accent-glow: rgba(232, 164, 74, 0.3);
  --danger: #e85454;
  --success: #4ae88a;
  --tea-color: #c4813a;
  --steam-color: rgba(255, 255, 255, 0.15);
}

.light-mode {
  --bg-primary: #f5f0eb;
  --bg-secondary: #ebe5de;
  --bg-card: rgba(255, 255, 255, 0.6);
  --bg-card-hover: rgba(255, 255, 255, 0.8);
  --border-card: rgba(0, 0, 0, 0.08);
  --text-primary: #1a1a2e;
  --text-secondary: #666680;
  --text-muted: #999;
  --accent: #c4813a;
  --accent-glow: rgba(196, 129, 58, 0.2);
  --steam-color: rgba(100, 100, 120, 0.12);
}

body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  transition: background 0.5s ease, color 0.5s ease;
}

body::before {
  content: '';
  position: fixed;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(ellipse at 30% 20%, rgba(232, 164, 74, 0.06) 0%, transparent 50%),
              radial-gradient(ellipse at 70% 80%, rgba(100, 60, 180, 0.04) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

.light-mode body::before {
  background: radial-gradient(ellipse at 30% 20%, rgba(232, 164, 74, 0.08) 0%, transparent 50%),
              radial-gradient(ellipse at 70% 80%, rgba(100, 60, 180, 0.05) 0%, transparent 50%);
}

#root { position: relative; z-index: 1; }

.glass-card {
  background: var(--bg-card);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border-card);
  border-radius: 20px;
  padding: 28px;
  transition: all 0.3s ease;
}

.glass-card:hover {
  background: var(--bg-card-hover);
  border-color: rgba(255, 255, 255, 0.12);
}

.light-mode .glass-card:hover {
  border-color: rgba(0, 0, 0, 0.12);
}

/* Custom Range Slider */
input[type="range"] {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 6px;
  border-radius: 3px;
  outline: none;
  transition: all 0.2s;
}

input[type="range"]::-webkit-slider-track {
  height: 6px;
  border-radius: 3px;
}

input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
  box-shadow: 0 0 12px var(--accent-glow), 0 2px 8px rgba(0,0,0,0.3);
  transition: transform 0.15s ease, box-shadow 0.15s ease;
  border: 2px solid rgba(255,255,255,0.2);
}

input[type="range"]::-webkit-slider-thumb:hover {
  transform: scale(1.2);
  box-shadow: 0 0 20px var(--accent-glow), 0 2px 12px rgba(0,0,0,0.4);
}

input[type="range"]::-moz-range-thumb {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
  box-shadow: 0 0 12px var(--accent-glow), 0 2px 8px rgba(0,0,0,0.3);
  border: 2px solid rgba(255,255,255,0.2);
}

/* Teacup Animation */
@keyframes steamRise1 {
  0% { transform: translateY(0) translateX(0) scale(1); opacity: 0; }
  15% { opacity: 0.7; }
  50% { opacity: 0.4; }
  100% { transform: translateY(-80px) translateX(15px) scale(2.5); opacity: 0; }
}
@keyframes steamRise2 {
  0% { transform: translateY(0) translateX(0) scale(1); opacity: 0; }
  15% { opacity: 0.6; }
  50% { opacity: 0.3; }
  100% { transform: translateY(-90px) translateX(-12px) scale(2.2); opacity: 0; }
}
@keyframes steamRise3 {
  0% { transform: translateY(0) translateX(0) scale(1); opacity: 0; }
  15% { opacity: 0.5; }
  50% { opacity: 0.25; }
  100% { transform: translateY(-70px) translateX(8px) scale(1.8); opacity: 0; }
}

@keyframes dunkBounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(8px); }
}

@keyframes wobble {
  0%, 100% { transform: rotate(0deg); }
  25% { transform: rotate(2deg); }
  75% { transform: rotate(-2deg); }
}

@keyframes crumbFall {
  0% { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(200px) rotate(720deg); opacity: 0; }
}

@keyframes pulseGlow {
  0%, 100% { box-shadow: 0 0 20px var(--accent-glow); }
  50% { box-shadow: 0 0 40px var(--accent-glow), 0 0 60px var(--accent-glow); }
}

@keyframes shakeCup {
  0%, 100% { transform: translateX(0); }
  10%, 30%, 50%, 70%, 90% { transform: translateX(-3px); }
  20%, 40%, 60%, 80% { transform: translateX(3px); }
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes scoreReveal {
  from { opacity: 0; transform: scale(0.5); }
  to { opacity: 1; transform: scale(1); }
}

.fade-in-up {
  animation: fadeInUp 0.6s ease forwards;
}

.score-reveal {
  animation: scoreReveal 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 3px; }

/* Biscuit selector */
.biscuit-option {
  transition: all 0.2s ease;
  cursor: pointer;
  border: 2px solid transparent;
}
.biscuit-option:hover {
  transform: translateY(-2px);
}
.biscuit-option.selected {
  border-color: var(--accent);
  background: rgba(232, 164, 74, 0.1);
}

/* Keyboard shortcut badges */
.kbd {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 24px;
  height: 24px;
  padding: 0 6px;
  font-size: 11px;
  font-family: 'Inter', monospace;
  font-weight: 600;
  color: var(--text-secondary);
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 6px;
  line-height: 1;
}

.light-mode .kbd {
  background: rgba(0,0,0,0.05);
  border-color: rgba(0,0,0,0.1);
}

/* Tooltip */
.tooltip {
  position: relative;
}
.tooltip::after {
  content: attr(data-tooltip);
  position: absolute;
  bottom: calc(100% + 8px);
  left: 50%;
  transform: translateX(-50%) scale(0.9);
  background: var(--bg-secondary);
  color: var(--text-primary);
  padding: 6px 12px;
  border-radius: 8px;
  font-size: 12px;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: all 0.2s ease;
  border: 1px solid var(--border-card);
}
.tooltip:hover::after {
  opacity: 1;
  transform: translateX(-50%) scale(1);
}

/* Meter bars */
.meter-bar {
  transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.3s ease;
}

/* Canvas container */
.canvas-container {
  position: relative;
  border-radius: 16px;
  overflow: hidden;
}

/* Help modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(8px);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: fadeIn 0.2s ease;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.modal-content {
  animation: modalSlideIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes modalSlideIn {
  from { opacity: 0; transform: scale(0.9) translateY(20px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

/* Notification toast */
@keyframes toastIn {
  from { opacity: 0; transform: translateY(20px) scale(0.95); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes toastOut {
  from { opacity: 1; transform: translateY(0) scale(1); }
  to { opacity: 0; transform: translateY(-20px) scale(0.95); }
}

.toast-enter { animation: toastIn 0.3s ease forwards; }
.toast-exit { animation: toastOut 0.3s ease forwards; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ============ Biscuit Data ============
const BISCUITS = [
  { id: 'digestive', name: 'Digestive', emoji: '🍪', tolerance: 65, absorbRate: 1.0, crumbleFactor: 0.6, color: '#c4956a' },
  { id: 'hobnob', name: 'Hobnob', emoji: '🥜', tolerance: 80, absorbRate: 0.7, crumbleFactor: 0.4, color: '#a07850' },
  { id: 'rich_tea', name: 'Rich Tea', emoji: '🥠', tolerance: 40, absorbRate: 1.4, crumbleFactor: 0.8, color: '#d4c4a0' },
  { id: 'shortbread', name: 'Shortbread', emoji: '🧈', tolerance: 55, absorbRate: 0.9, crumbleFactor: 0.7, color: '#e8d4a0' },
  { id: 'custard_cream', name: 'Custard Cream', emoji: '🍦', tolerance: 50, absorbRate: 1.1, crumbleFactor: 0.65, color: '#f0e0a0' },
  { id: 'bourbon', name: 'Bourbon', emoji: '🍫', tolerance: 60, absorbRate: 0.95, crumbleFactor: 0.55, color: '#6b4226' },
  { id: 'garibaldi', name: 'Garibaldi', emoji: '🫐', tolerance: 70, absorbRate: 0.85, crumbleFactor: 0.5, color: '#8b5e3c' },
  { id: 'nice', name: 'Nice', emoji: '🌼', tolerance: 35, absorbRate: 1.5, crumbleFactor: 0.85, color: '#d4b896' },
];

// ============ Dunk Score Calculator ============
function calcDunkScore(teaTemp, dunkTime, biscuit, structuralIntegrity) {
  const tempFactor = 0.5 + (teaTemp - 40) / 60; // 0.5 to 1.5
  const effectiveTime = dunkTime * tempFactor * biscuit.absorbRate;
  const saturation = Math.min(100, effectiveTime * 8);
  const integrity = structuralIntegrity * (1 - biscuit.crumbleFactor * 0.5);
  
  // Optimal dunk zone: 40-70% saturation
  let score;
  if (saturation < 20) {
    score = saturation * 2; // Under-dunked
  } else if (saturation <= 70) {
    score = 60 + (saturation - 20) * 0.8; // Good zone
  } else if (saturation <= 85) {
    score = 100 - (saturation - 70) * 1.5; // Risky zone
  } else {
    score = Math.max(0, 77.5 - (saturation - 85) * 5); // Over-dunked, crumbling
  }
  
  score = Math.min(100, Math.max(0, score * (integrity / 100)));
  
  const isOverdunked = saturation > 80;
  const isUnderdunked = saturation < 20;
  const isPerfect = saturation >= 40 && saturation <= 70;
  
  return {
    score: Math.round(score),
    saturation: Math.round(saturation),
    isOverdunked,
    isUnderdunked,
    isPerfect,
    status: isPerfect ? 'perfect' : isOverdunked ? 'overdunked' : isUnderdunked ? 'underdunked' : saturation <= 80 ? 'good' : 'risky'
  };
}

// ============ Crumble-O-Meter Chart ============
function CrumbleOMeter({ teaTemp, dunkTime, biscuit, structuralIntegrity }) {
  const canvasRef = useRef(null);
  const animRef = useRef(0);
  
  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.scale(dpr, dpr);
    const W = rect.width;
    const H = rect.height;
    
    cancelAnimationFrame(animRef.current);
    
    const tempFactor = 0.5 + (teaTemp - 40) / 60;
    const points = [];
    const numPoints = 100;
    
    for (let i = 0; i <= numPoints; i++) {
      const t = (i / numPoints) * 15; // 0-15 seconds
      const effectiveTime = t * tempFactor * biscuit.absorbRate;
      const saturation = Math.min(100, effectiveTime * 8);
      const integrity = structuralIntegrity * (1 - biscuit.crumbleFactor * 0.5);
      
      let score;
      if (saturation < 20) score = saturation * 2;
      else if (saturation <= 70) score = 60 + (saturation - 20) * 0.8;
      else if (saturation <= 85) score = 100 - (saturation - 70) * 1.5;
      else score = Math.max(0, 77.5 - (saturation - 85) * 5);
      score = Math.min(100, Math.max(0, score * (integrity / 100)));
      
      points.push({ t, score, saturation });
    }
    
    const padL = 45, padR = 20, padT = 25, padB = 40;
    const chartW = W - padL - padR;
    const chartH = H - padT - padB;
    
    let progress = 0;
    
    function draw() {
      progress = Math.min(1, progress + 0.03);
      ctx.clearRect(0, 0, W, H);
      
      // Grid
      ctx.strokeStyle = 'rgba(255,255,255,0.05)';
      ctx.lineWidth = 1;
      for (let i = 0; i <= 4; i++) {
        const y = padT + (chartH / 4) * i;
        ctx.beginPath();
        ctx.moveTo(padL, y);
        ctx.lineTo(W - padR, y);
        ctx.stroke();
      }
      for (let i = 0; i <= 5; i++) {
        const x = padL + (chartW / 5) * i;
        ctx.beginPath();
        ctx.moveTo(x, padT);
        ctx.lineTo(x, H - padB);
        ctx.stroke();
      }
      
      // Y-axis labels
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.font = '11px Inter, sans-serif';
      ctx.textAlign = 'right';
      for (let i = 0; i <= 4; i++) {
        const y = padT + (chartH / 4) * i;
        const val = 100 - i * 25;
        ctx.fillText(val, padL - 8, y + 4);
      }
      
      // X-axis labels
      ctx.textAlign = 'center';
      for (let i = 0; i <= 5; i++) {
        const x = padL + (chartW / 5) * i;
        const val = Math.round((i / 5) * 15);
        ctx.fillText(val + 's', x, H - padB + 20);
      }
      
      // Zone backgrounds
      // Perfect zone (40-70% saturation maps to roughly 5-9 seconds)
      const perfectStart = padL + (5 / 15) * chartW;
      const perfectEnd = padL + (9 / 15) * chartW;
      ctx.fillStyle = 'rgba(74, 232, 138, 0.05)';
      ctx.fillRect(perfectStart, padT, perfectEnd - perfectStart, chartH);
      
      // Danger zone
      const dangerStart = padL + (10 / 15) * chartW;
      ctx.fillStyle = 'rgba(232, 84, 84, 0.05)';
      ctx.fillRect(dangerStart, padT, W - padR - dangerStart, chartH);
      
      // Zone labels
      ctx.font = '10px Inter, sans-serif';
      ctx.fillStyle = 'rgba(74, 232, 138, 0.4)';
      ctx.textAlign = 'center';
      ctx.fillText('PERFECT', (perfectStart + perfectEnd) / 2, padT + 14);
      ctx.fillStyle = 'rgba(232, 84, 84, 0.4)';
      ctx.fillText('DANGER', (dangerStart + W - padR) / 2, padT + 14);
      
      // Draw curve
      const drawCount = Math.floor(points.length * progress);
      if (drawCount < 2) { animRef.current = requestAnimationFrame(draw); return; }
      
      // Gradient fill under curve
      const gradient = ctx.createLinearGradient(0, padT, 0, H - padB);
      gradient.addColorStop(0, 'rgba(232, 164, 74, 0.2)');
      gradient.addColorStop(1, 'rgba(232, 164, 74, 0)');
      
      ctx.beginPath();
      ctx.moveTo(padL, H - padB);
      for (let i = 0; i < drawCount; i++) {
        const x = padL + (points[i].t / 15) * chartW;
        const y = padT + chartH - (points[i].score / 100) * chartH;
        if (i === 0) ctx.lineTo(x, y);
        else ctx.lineTo(x, y);
      }
      const lastX = padL + (points[drawCount - 1].t / 15) * chartW;
      ctx.lineTo(lastX, H - padB);
      ctx.closePath();
      ctx.fillStyle = gradient;
      ctx.fill();
      
      // Draw line
      ctx.beginPath();
      for (let i = 0; i < drawCount; i++) {
        const x = padL + (points[i].t / 15) * chartW;
        const y = padT + chartH - (points[i].score / 100) * chartH;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.strokeStyle = '#e8a44a';
      ctx.lineWidth = 2.5;
      ctx.lineJoin = 'round';
      ctx.stroke();
      
      // Current dunk time marker
      const markerIdx = Math.min(drawCount - 1, Math.floor((dunkTime / 15) * numPoints));
      if (markerIdx >= 0 && progress >= 0.5) {
        const mx = padL + (points[markerIdx].t / 15) * chartW;
        const my = padT + chartH - (points[markerIdx].score / 100) * chartH;
        
        // Vertical line
        ctx.setLineDash([4, 4]);
        ctx.strokeStyle = 'rgba(232, 164, 74, 0.3)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(mx, padT);
        ctx.lineTo(mx, H - padB);
        ctx.stroke();
        ctx.setLineDash([]);
        
        // Dot
        ctx.beginPath();
        ctx.arc(mx, my, 6, 0, Math.PI * 2);
        ctx.fillStyle = '#e8a44a';
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.lineWidth = 2;
        ctx.stroke();
        
        // Glow
        ctx.beginPath();
        ctx.arc(mx, my, 12, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(232, 164, 74, 0.15)';
        ctx.fill();
        
        // Score label
        ctx.fillStyle = '#f0f0f5';
        ctx.font = 'bold 12px Inter, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(Math.round(points[markerIdx].score), mx, my - 16);
      }
      
      // Axis labels
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.font = '11px Inter, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Dunk Time', W / 2, H - 4);
      
      ctx.save();
      ctx.translate(12, H / 2);
      ctx.rotate(-Math.PI / 2);
      ctx.fillText('Score', 0, 0);
      ctx.restore();
      
      if (progress < 1) {
        animRef.current = requestAnimationFrame(draw);
      }
    }
    
    draw();
    return () => cancelAnimationFrame(animRef.current);
  }, [teaTemp, dunkTime, biscuit, structuralIntegrity]);
  
  return (
    <canvas 
      ref={canvasRef} 
      style={{ width: '100%', height: '220px', display: 'block' }}
    />
  );
}

// ============ Teacup Scene ============
function TeacupScene({ isDunking, dunkProgress, biscuit, isOverdunked, saturation }) {
  const canvasRef = useRef(null);
  const animRef = useRef(null);
  const particlesRef = useRef([]);
  const crumbsRef = useRef([]);
  const steamRef = useRef([]);
  const frameRef = useRef(0);
  
  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.scale(dpr, dpr);
    const W = rect.width;
    const H = rect.height;
    
    // Initialize steam particles
    if (steamRef.current.length === 0) {
      for (let i = 0; i < 12; i++) {
        steamRef.current.push({
          x: W / 2 + (Math.random() - 0.5) * 60,
          y: H * 0.38 + Math.random() * 20,
          size: 3 + Math.random() * 8,
          speed: 0.3 + Math.random() * 0.5,
          drift: (Math.random() - 0.5) * 0.5,
          opacity: 0,
          maxOpacity: 0.15 + Math.random() * 0.2,
          phase: Math.random() * Math.PI * 2,
          life: Math.random(),
        });
      }
    }
    
    function animate() {
      frameRef.current++;
      ctx.clearRect(0, 0, W, H);
      
      const cx = W / 2;
      const cupY = H * 0.55;
      const cupW = 120;
      const cupH = 80;
      
      // Saucer
      ctx.beginPath();
      ctx.ellipse(cx, cupY + cupH * 0.5 + 12, 90, 14, 0, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.06)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.1)';
      ctx.lineWidth = 1;
      ctx.stroke();
      
      // Cup body
      const wobble = isDunking ? Math.sin(frameRef.current * 0.05) * 2 : 0;
      ctx.save();
      ctx.translate(cx, cupY);
      ctx.rotate(wobble * Math.PI / 180);
      
      // Cup shape
      ctx.beginPath();
      ctx.moveTo(-cupW / 2, -cupH * 0.3);
      ctx.quadraticCurveTo(-cupW / 2 - 5, cupH * 0.5, -cupW * 0.35, cupH * 0.5);
      ctx.lineTo(cupW * 0.35, cupH * 0.5);
      ctx.quadraticCurveTo(cupW / 2 + 5, cupH * 0.5, cupW / 2, -cupH * 0.3);
      ctx.closePath();
      
      const cupGrad = ctx.createLinearGradient(-cupW / 2, 0, cupW / 2, 0);
      cupGrad.addColorStop(0, 'rgba(255,255,255,0.08)');
      cupGrad.addColorStop(0.3, 'rgba(255,255,255,0.12)');
      cupGrad.addColorStop(0.7, 'rgba(255,255,255,0.06)');
      cupGrad.addColorStop(1, 'rgba(255,255,255,0.03)');
      ctx.fillStyle = cupGrad;
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      
      // Tea liquid
      const teaLevel = -cupH * 0.15;
      ctx.beginPath();
      ctx.ellipse(0, teaLevel, cupW * 0.42, 10, 0, 0, Math.PI * 2);
      const teaColor = `rgba(196, 129, 58, ${0.5 + saturation * 0.003})`;
      ctx.fillStyle = teaColor;
      ctx.fill();
      
      // Tea surface shimmer
      ctx.beginPath();
      ctx.ellipse(-10, teaLevel - 2, 15, 4, -0.2, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255, 220, 150, 0.15)';
      ctx.fill();
      
      // Handle
      ctx.beginPath();
      ctx.ellipse(cupW / 2 + 18, cupH * 0.05, 18, 25, 0, -Math.PI * 0.6, Math.PI * 0.6);
      ctx.strokeStyle = 'rgba(255,255,255,0.12)';
      ctx.lineWidth = 4;
      ctx.stroke();
      
      // Biscuit dunking
      if (isDunking) {
        const biscuitY = -cupH * 0.3 + dunkProgress * cupH * 0.6;
        const biscuitW = 50;
        const biscuitH = 14;
        const dissolve = Math.max(0, 1 - saturation / 120);
        
        ctx.save();
        ctx.globalAlpha = dissolve;
        
        // Biscuit body
        ctx.beginPath();
        ctx.roundRect(-biscuitW / 2, biscuitY - biscuitH / 2, biscuitW * dissolve, biscuitH, 4);
        ctx.fillStyle = biscuit.color;
        ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,0.2)';
        ctx.lineWidth = 1;
        ctx.stroke();
        
        // Biscuit texture dots
        for (let i = 0; i < 5; i++) {
          const dx = -biscuitW / 2 + 8 + i * 10;
          if (dx < biscuitW / 2 * dissolve - 5) {
            ctx.beginPath();
            ctx.arc(dx, biscuitY, 1.5, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0,0,0,0.15)';
            ctx.fill();
          }
        }
        
        ctx.restore();
        
        // Spawn crumbs when overdunked
        if (isOverdunked && frameRef.current % 3 === 0) {
          for (let i = 0; i < 2; i++) {
            crumbsRef.current.push({
              x: cx + (Math.random() - 0.5) * 40,
              y: cupY + biscuitY,
              vx: (Math.random() - 0.5) * 3,
              vy: -1 - Math.random() * 3,
              size: 2 + Math.random() * 4,
              rotation: Math.random() * 360,
              rotSpeed: (Math.random() - 0.5) * 10,
              life: 1,
              color: biscuit.color,
            });
          }
        }
      }
      
      ctx.restore();
      
      // Steam particles
      steamRef.current.forEach(p => {
        p.life += 0.008;
        if (p.life > 1) {
          p.life = 0;
          p.x = cx + (Math.random() - 0.5) * 60;
          p.y = cupY - cupH * 0.3;
          p.size = 3 + Math.random() * 8;
          p.maxOpacity = 0.1 + Math.random() * 0.15;
        }
        
        p.y -= p.speed;
        p.x += Math.sin(frameRef.current * 0.02 + p.phase) * 0.3 + p.drift;
        
        const lifeRatio = p.life;
        let opacity;
        if (lifeRatio < 0.2) opacity = lifeRatio / 0.2 * p.maxOpacity;
        else if (lifeRatio > 0.6) opacity = (1 - lifeRatio) / 0.4 * p.maxOpacity;
        else opacity = p.maxOpacity;
        
        const size = p.size * (1 + lifeRatio * 1.5);
        
        ctx.beginPath();
        ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
        ctx.fill();
      });
      
      // Crumb particles
      crumbsRef.current = crumbsRef.current.filter(c => {
        c.x += c.vx;
        c.y += c.vy;
        c.vy += 0.15; // gravity
        c.rotation += c.rotSpeed;
        c.life -= 0.015;
        
        if (c.life <= 0) return false;
        
        ctx.save();
        ctx.translate(c.x, c.y);
        ctx.rotate(c.rotation * Math.PI / 180);
        ctx.globalAlpha = c.life;
        ctx.fillStyle = c.color;
        ctx.fillRect(-c.size / 2, -c.size / 2, c.size, c.size * 0.7);
        ctx.restore();
        
        return true;
      });
      
      // Ripples when dunking
      if (isDunking && dunkProgress > 0.2) {
        const ripplePhase = (frameRef.current * 0.03) % 1;
        ctx.save();
        ctx.translate(cx, cupY - cupH * 0.15);
        ctx.beginPath();
        ctx.ellipse(0, 0, 20 + ripplePhase * 30, 4 + ripplePhase * 3, 0, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(196, 129, 58, ${(1 - ripplePhase) * 0.3})`;
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.restore();
      }
      
      animRef.current = requestAnimationFrame(animate);
    }
    
    animate();
    return () => cancelAnimationFrame(animRef.current);
  }, [isDunking, dunkProgress, biscuit, isOverdunked, saturation]);
  
  return (
    <canvas 
      ref={canvasRef} 
      style={{ width: '100%', height: '280px', display: 'block' }}
    />
  );
}

// ============ Score Gauge ============
function ScoreGauge({ score, status }) {
  const color = status === 'perfect' ? '#4ae88a' : 
                status === 'overdunked' ? '#e85454' : 
                status === 'risky' ? '#e8a44a' : 
                status === 'underdunked' ? '#5488e8' : '#e8a44a';
  
  const radius = 60;
  const circumference = 2 * Math.PI * radius;
  const dashOffset = circumference - (score / 100) * circumference * 0.75;
  
  return (
    <div style={{ position: 'relative', width: 150, height: 150, margin: '0 auto' }}>
      <svg width="150" height="150" viewBox="0 0 150 150">
        <circle 
          cx="75" cy="75" r={radius} 
          fill="none" 
          stroke="rgba(255,255,255,0.05)" 
          strokeWidth="8"
          strokeDasharray={`${circumference * 0.75} ${circumference * 0.25}`}
          strokeLinecap="round"
          transform="rotate(135 75 75)"
        />
        <circle 
          cx="75" cy="75" r={radius} 
          fill="none" 
          stroke={color} 
          strokeWidth="8"
          strokeDasharray={`${circumference * 0.75} ${circumference * 0.25}`}
          strokeDashoffset={dashOffset}
          strokeLinecap="round"
          transform="rotate(135 75 75)"
          style={{ transition: 'stroke-dashoffset 0.5s ease, stroke 0.3s ease', filter: `drop-shadow(0 0 8px ${color}40)` }}
        />
      </svg>
      <div style={{ 
        position: 'absolute', top: '50%', left: '50%', transform: 'translate(-50%, -50%)', 
        textAlign: 'center' 
      }}>
        <div className="score-reveal" style={{ fontSize: 36, fontWeight: 800, color, lineHeight: 1, fontFamily: "'Playfair Display', serif" }}>
          {score}
        </div>
        <div style={{ fontSize: 10, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: 2, marginTop: 4 }}>
          Score
        </div>
      </div>
    </div>
  );
}

// ============ Slider Component ============
function Slider({ label, value, min, max, step, unit, onChange, shortcut, icon, gradientColors }) {
  const pct = ((value - min) / (max - min)) * 100;
  const bg = gradientColors 
    ? `linear-gradient(90deg, ${gradientColors[0]} 0%, ${gradientColors[1]} ${pct}%, rgba(255,255,255,0.06) ${pct}%)`
    : `linear-gradient(90deg, var(--accent) 0%, var(--accent) ${pct}%, rgba(255,255,255,0.06) ${pct}%)`;
  
  return (
    <div style={{ marginBottom: 20 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <span style={{ fontSize: 16 }}>{icon}</span>
          <span style={{ fontSize: 13, fontWeight: 600, color: 'var(--text-primary)' }}>{label}</span>
          {shortcut && <span className="kbd">{shortcut}</span>}
        </div>
        <div style={{ 
          fontSize: 14, fontWeight: 700, color: 'var(--accent)', 
          fontFamily: "'Playfair Display', serif",
          minWidth: 50, textAlign: 'right'
        }}>
          {value}{unit}
        </div>
      </div>
      <input 
        type="range" min={min} max={max} step={step} value={value}
        onChange={e => onChange(Number(e.target.value))}
        style={{ background: bg, borderRadius: 3 }}
      />
      <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 4 }}>
        <span style={{ fontSize: 10, color: 'var(--text-muted)' }}>{min}{unit}</span>
        <span style={{ fontSize: 10, color: 'var(--text-muted)' }}>{max}{unit}</span>
      </div>
    </div>
  );
}

// ============ Meter Bar ============
function MeterBar({ label, value, max, color, icon }) {
  const pct = Math.min(100, (value / max) * 100);
  return (
    <div style={{ marginBottom: 12 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 4 }}>
        <span style={{ fontSize: 12, color: 'var(--text-secondary)', display: 'flex', alignItems: 'center', gap: 6 }}>

        <span style={{ fontSize: 12, fontWeight: 600, color }}>{Math.round(value)}%</span>
      </div>
      <div style={{ height: 6, borderRadius: 3, background: 'rgba(255,255,255,0.06)', overflow: 'hidden' }}>

// ============ Toast Notification ============
function Toast({ message, type, onDone }) {
  const [exiting, setExiting] = useState(false);
  
  useEffect(() => {
    const t1 = setTimeout(() => setExiting(true), 2000);
    const t2 = setTimeout(onDone, 2300);
    return () => { clearTimeout(t1); clearTimeout(t2); };
  }, []);
  
  const colors = {
    info: { bg: 'rgba(84, 136, 232, 0.15)', border: 'rgba(84, 136, 232, 0.3)', color: '#5488e8' },
    success: { bg: 'rgba(74, 232, 138, 0.15)', border: 'rgba(74, 232, 138, 0.3)', color: '#4ae88a' },
    warning: { bg: 'rgba(232, 164, 74, 0.15)', border: 'rgba(232, 164, 74, 0.3)', color: '#e8a44a' },
    error: { bg: 'rgba(232, 84, 84, 0.15)', border: 'rgba(232, 84, 84, 0.3)', color: '#e85454' },
  };
  const c = colors[type] || colors.info;
  
  return (
    <div className={exiting ? 'toast-exit' : 'toast-enter'} style={{
      position: 'fixed', bottom: 30, left: '50%', transform: 'translateX(-50%)',
      padding: '12px 24px', borderRadius: 14,
      background: c.bg, border: `1px solid ${c.border}`,
      color: c.color, fontSize: 14, fontWeight: 600,
      backdropFilter: 'blur(20px)', zIndex: 2000,
      display: 'flex', alignItems: 'center', gap: 8,
    }}>
      {message}
    </div>
  );
}

function App() {
  const [teaTemp, setTeaTemp] = useState(85);

  const [biscuitIdx, setBiscuitIdx] = useState(0);
  const [structuralIntegrity, setStructuralIntegrity] = useState(80);
  const [isDunking, setIsDunking] = useState(true);
  const [darkMode, setDarkMode] = useState(true);
  const [showHelp, setShowHelp] = useState(false);
  const [toast, setToast] = useState(null);
  const [dunkAnimProgress, setDunkAnimProgress] = useState(0);
  
  const biscuit = BISCUITS[biscuitIdx];
  const result = useMemo(
    () => calcDunkScore(teaTemp, dunkTime, biscuit, structuralIntegrity),
    [teaTemp, dunkTime, biscuit, structuralIntegrity]
  );
  
  // Dunk animation
  useEffect(() => {
    if (!isDunking) return;
    let frame = 0;
    const interval = setInterval(() => {
      frame++;
      setDunkAnimProgress(Math.min(1, (Math.sin(frame * 0.03) + 1) / 2));
    }, 30);
    return () => clearInterval(interval);
  }, [isDunking]);
  
  // Dark mode class
  useEffect(() => {
    document.body.classList.toggle('light-mode', !darkMode);
  }, [darkMode]);
  
  // Keyboard shortcuts
  useEffect(() => {
    function handleKey(e) {
      if (e.target.tagName === 'INPUT' && e.target.type !== 'range') return;
      
      switch(e.key) {
        case 'ArrowUp':
          e.preventDefault();
          setTeaTemp(t => Math.min(100, t + 1));
          break;
        case 'ArrowDown':
          e.preventDefault();
          setTeaTemp(t => Math.max(40, t - 1));
          break;
        case 'ArrowRight':
          e.preventDefault();
          setDunkTime(t => Math.min(15, +(t + 0.5).toFixed(1)));
          break;
        case 'ArrowLeft':
          e.preventDefault();
          setDunkTime(t => Math.max(0.5, +(t - 0.5).toFixed(1)));
          break;
        case 'd': case 'D':
          setIsDunking(d => !d);
          setToast({ message: isDunking ? '⏸️ Dunk paused' : '🫖 Dunk resumed', type: 'info' });
          break;
        case 'r': case 'R':
          setTeaTemp(85); setDunkTime(5); setBiscuitIdx(0); setStructuralIntegrity(80);
          setToast({ message: '🔄 Reset to defaults', type: 'info' });
          break;
        case 'm': case 'M':
          setDarkMode(d => !d);
          setToast({ message: darkMode ? '☀️ Light mode' : '🌙 Dark mode', type: 'info' });
          break;
        case '?':
          setShowHelp(h => !h);
          break;
        case 'Escape':
          setShowHelp(false);
          break;
        case '+': case '=':
          setStructuralIntegrity(s => Math.min(100, s + 5));
          break;
        case '-': case '_':
          setStructuralIntegrity(s => Math.max(10, s - 5));
          break;
        default:
          const num = parseInt(e.key);
          if (num >= 1 && num <= BISCUITS.length) {
            setBiscuitIdx(num - 1);
            setToast({ message: `${BISCUITS[num-1].emoji} ${BISCUITS[num-1].name} selected`, type: 'success' });
          }
      }
    }
    window.addEventListener('keydown', handleKey);
    return () => window.removeEventListener('keydown', handleKey);
  }, [isDunking, darkMode]);
  
  return (
    <div style={{ minHeight: '100vh', padding: '20px 20px 40px', maxWidth: 1200, margin: '0 auto' }}>
      {/* Header */}

        <div style={{ marginTop: 12, display: 'flex', justifyContent: 'center', gap: 8 }}>

              }}>
                {biscuit.emoji}
              </div>
              <div>
                <div style={{ fontSize: 16, fontWeight: 700 }}>{biscuit.name}</div>
                <div style={{ fontSize: 12, color: 'var(--text-muted)' }}>
                  Absorption: {biscuit.absorbRate}x · Crumble: {Math.round(biscuit.crumbleFactor * 100)}%
                </div>
              </div>
            </div>
            <MeterBar label="Dunk Tolerance" value={biscuit.tolerance} max={100} color="#4ae88a" icon="💪" />
            <MeterBar label="Absorption Rate" value={biscuit.absorbRate * 60} max={100} color="#e8a44a" icon="💧" />
            <MeterBar label="Crumble Factor" value={biscuit.crumbleFactor * 100} max={100} color="#e85454" icon="💥" />
            <MeterBar label="Current Saturation" value={result.saturation} max={100} color={result.isOverdunked ? '#e85454' : '#5488e8'} icon="🫖" />
          </div>
        </div>
        
        {/* Center Column - Teacup & Score */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
          {/* Teacup Card */}
          <div className="glass-card fade-in-up" style={{ animationDelay: '0.15s', padding: 0, overflow: 'hidden' }}>
            <div style={{ padding: '20px 24px 0' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                <h3 style={{ fontSize: 14, fontWeight: 700, color: 'var(--text-secondary)', textTransform: 'uppercase', letterSpacing: 2 }}>
                  🫖 Dunk Simulation
                </h3>
                <button 
                  onClick={() => setIsDunking(d => !d)}
                  style={{
                    background: isDunking ? 'rgba(74, 232, 138, 0.1)' : 'rgba(255,255,255,0.06)',
                    border: `1px solid ${isDunking ? 'rgba(74, 232, 138, 0.2)' : 'var(--border-card)'}`,
                    color: isDunking ? '#4ae88a' : 'var(--text-secondary)',
                    padding: '6px 14px', borderRadius: 10, cursor: 'pointer', fontSize: 12,
                    fontWeight: 600, transition: 'all 0.2s',
                    display: 'flex', alignItems: 'center', gap: 6,
                  }}
                >
                  {isDunking ? '⏸ Pause' : '▶️ Dunk'}
                  <span className="kbd" style={{ fontSize: 10, height: 18, minWidth: 18 }}>D</span>
                </button>
              </div>
            </div>
            <div className="canvas-container">
              <TeacupScene 
                isDunking={isDunking} 
                dunkProgress={dunkAnimProgress} 
                biscuit={biscuit} 
                isOverdunked={result.isOverdunked}
                saturation={result.saturation}
              />
            </div>
            {result.isOverdunked && (
              <div style={{ 
                textAlign: 'center', padding: '8px 20px 16px', 
                color: '#e85454', fontSize: 13, fontWeight: 600,
                animation: 'shakeCup 0.5s ease infinite',
              }}>
                💥 The biscuit is disintegrating! Reduce dunk time or choose a sturdier biscuit.
              </div>
            )}
          </div>
          
          {/* Score Card */}
          <div className="glass-card fade-in-up" style={{ animationDelay: '0.25s', textAlign: 'center' }}>
            <h3 style={{ fontSize: 14, fontWeight: 700, color: 'var(--text-secondary)', textTransform: 'uppercase', letterSpacing: 2, marginBottom: 16 }}>
              🏆 Dunk Score
            </h3>
            <ScoreGauge score={result.score} status={result.status} />
            <div style={{ marginTop: 16 }}>
              <StatusBadge status={result.status} />
            </div>
            <div style={{ marginTop: 16, display: 'flex', justifyContent: 'center', gap: 24 }}>
              <div>
                <div style={{ fontSize: 11, color: 'var(--text-muted)', marginBottom: 4 }}>Saturation</div>
                <div style={{ fontSize: 18, fontWeight: 700, color: result.saturation > 80 ? '#e85454' : result.saturation > 60 ? '#e8a44a' : '#5488e8', fontFamily: "'Playfair Display', serif" }}>
                  {result.saturation}%
                </div>
              </div>
              <div style={{ width: 1, background: 'var(--border-card)' }} />
              <div>
                <div style={{ fontSize: 11, color: 'var(--text-muted)', marginBottom: 4 }}>Integrity</div>
                <div style={{ fontSize: 18, fontWeight: 700, color: '#4ae88a', fontFamily: "'Playfair Display', serif" }}>
                  {Math.round(structuralIntegrity * (1 - biscuit.crumbleFactor * result.saturation / 200))}%
                </div>
              </div>
            </div>
          </div>
        </div>
        
        {/* Right Column - Chart & Tips */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
          {/* Crumble-O-Meter */}
          <div className="glass-card fade-in-up" style={{ animationDelay: '0.2s' }}>
            <h3 style={{ fontSize: 14, fontWeight: 700, color: 'var(--text-secondary)', textTransform: 'uppercase', letterSpacing: 2, marginBottom: 16 }}>
              📈 Crumble-O-Meter
            </h3>
            <CrumbleOMeter 
              teaTemp={teaTemp} dunkTime={dunkTime} 
              biscuit={biscuit} structuralIntegrity={structuralIntegrity} 
            />
            <div style={{ marginTop: 12, display: 'flex', gap: 16, justifyContent: 'center' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                <div style={{ width: 10, height: 10, borderRadius: 2, background: 'rgba(74, 232, 138, 0.3)' }} />
                <span style={{ fontSize: 11, color: 'var(--text-muted)' }}>Perfect Zone</span>
              </div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                <div style={{ width: 10, height: 10, borderRadius: 2, background: 'rgba(232, 84, 84, 0.3)' }} />
                <span style={{ fontSize: 11, color: 'var(--text-muted)' }}>Danger Zone</span>
              </div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                <div style={{ width: 10, height: 3, borderRadius: 1, background: '#e8a44a' }} />
                <span style={{ fontSize: 11, color: 'var(--text-muted)' }}>Score Curve</span>
              </div>
            </div>
          </div>
          
          {/* Tips Card */}
          <div className="glass-card fade-in-up" style={{ animationDelay: '0.3s' }}>
            <h3 style={{ fontSize: 14, fontWeight: 700, color: 'var(--text-secondary)', textTransform: 'uppercase', letterSpacing: 2, marginBottom: 16 }}>
              💡 Dunk Wisdom
            </h3>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
              {[
                { tip: 'Hotter tea dissolves biscuits faster. Aim for 80-90°C for most biscuits.', icon: '🌡️' },
                { tip: 'Hobnobs are the most dunk-friendly biscuit due to their oat content.', icon: '🥜' },
                { tip: 'Rich Tea biscuits crumble fastest — keep dunks under 3 seconds!', icon: '🥠' },
                { tip: 'The perfect dunk achieves 40-70% saturation without breaking.', icon: '✨' },
                { tip: 'Lower structural integrity means the biscuit is already compromised.', icon: '🏗️' },
              ].map((item, i) => (
                <div key={i} style={{ 
                  display: 'flex', gap: 10, alignItems: 'flex-start',
                  padding: 10, borderRadius: 10, background: 'rgba(255,255,255,0.02)',
                }}>
                  <span style={{ fontSize: 16, flexShrink: 0, marginTop: 1 }}>{item.icon}</span>
                  <span style={{ fontSize: 12, color: 'var(--text-secondary)', lineHeight: 1.5 }}>{item.tip}</span>
                </div>
              ))}
            </div>
          </div>
          
          {/* Quick Stats */}
          <div className="glass-card fade-in-up" style={{ animationDelay: '0.35s' }}>
            <h3 style={{ fontSize: 14, fontWeight: 700, color: 'var(--text-secondary)', textTransform: 'uppercase', letterSpacing: 2, marginBottom: 16 }}>
              📋 Current Setup
            </h3>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
              {[
                { label: 'Tea', value: `${teaTemp}°C`, icon: '🍵' },
                { label: 'Time', value: `${dunkTime}s`, icon: '⏱️' },
                { label: 'Biscuit', value: biscuit.name, icon: biscuit.emoji },
                { label: 'Integrity', value: `${structuralIntegrity}%`, icon: '🏗️' },
              ].map((item, i) => (
                <div key={i} style={{ 
                  padding: 12, borderRadius: 12, 
                  background: 'rgba(255,255,255,0.03)', 
                  border: '1px solid var(--border-card)',
                  textAlign: 'center',
                }}>
                  <div style={{ fontSize: 20, marginBottom: 4 }}>{item.icon}</div>
                  <div style={{ fontSize: 10, color: 'var(--text-muted)', marginBottom: 2 }}>{item.label}</div>
                  <div style={{ fontSize: 14, fontWeight: 700, color: 'var(--text-primary)' }}>{item.value}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
      
      {/* Footer */}
      <footer className="fade-in-up" style={{ 
        textAlign: 'center', marginTop: 40, paddingTop: 20, 
        borderTop: '1px solid var(--border-card)',
        animationDelay: '0.4s',
      }}>
        <p style={{ fontSize: 12, color: 'var(--text-muted)' }}>
          Made with 🍪 and ☕ · Press <span className="kbd">?</span> for keyboard shortcuts
        </p>
      </footer>
      
      {/* Help Modal */}
      {showHelp && <HelpModal onClose={() => setShowHelp(false)} />}
      
      {/* Toast */}
      {toast && <Toast key={Date.now()} message={toast.message} type={toast.type} onDone={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
