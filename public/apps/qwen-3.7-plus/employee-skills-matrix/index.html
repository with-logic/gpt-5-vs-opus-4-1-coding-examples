<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Skills Matrix</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f8f9fc;
    --surface: #ffffff;
    --surface-alt: #f1f3f9;
    --border: #e2e6ef;
    --border-light: #eef1f6;
    --text: #1a1d2e;
    --text-secondary: #5f6580;
    --text-muted: #9498b3;
    --primary: #4f5fff;
    --primary-light: #eef0ff;
    --primary-dark: #3a48d9;
    --danger: #ef4444;
    --danger-light: #fef2f2;
    --success: #10b981;
    --success-light: #ecfdf5;
    --warning: #f59e0b;
    --warning-light: #fffbeb;

    --level-none: #f1f3f9;
    --level-beginner: #fde68a;
    --level-intermediate: #93c5fd;
    --level-advanced: #6ee7b7;
    --level-expert: #a78bfa;

    --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -1px rgba(0,0,0,0.04);
    --shadow-lg: 0 10px 25px -5px rgba(0,0,0,0.08), 0 4px 10px -5px rgba(0,0,0,0.03);
    --shadow-xl: 0 20px 50px -12px rgba(0,0,0,0.15);

    --radius: 10px;
    --radius-sm: 6px;
    --radius-lg: 14px;
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #4f5fff 0%, #6366f1 50%, #8b5cf6 100%);
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(79, 95, 255, 0.25);
  }

  .header-inner {
    max-width: 1440px;
    margin: 0 auto;
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .header-icon {
    width: 40px;
    height: 40px;
    background: rgba(255,255,255,0.2);
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    backdrop-filter: blur(10px);
  }

  .header h1 {
    font-size: 20px;
    font-weight: 700;
    color: white;
    letter-spacing: -0.3px;
  }

  .header p {
    font-size: 13px;
    color: rgba(255,255,255,0.75);
    font-weight: 400;
  }

  .header-actions {
    display: flex;
    gap: 10px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 9px 18px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    border: none;
    transition: all 0.2s ease;
    white-space: nowrap;
  }

  .btn-primary {
    background: white;
    color: var(--primary);
    box-shadow: var(--shadow);
  }
  .btn-primary:hover { background: #f0f0ff; transform: translateY(-1px); box-shadow: var(--shadow-md); }

  .btn-secondary {
    background: rgba(255,255,255,0.15);
    color: white;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.2);
  }
  .btn-secondary:hover { background: rgba(255,255,255,0.25); }

  .btn-ghost {
    background: transparent;
    color: var(--text-secondary);
    padding: 8px 14px;
  }
  .btn-ghost:hover { background: var(--surface-alt); color: var(--text); }

  .btn-danger {
    background: var(--danger-light);
    color: var(--danger);
  }
  .btn-danger:hover { background: #fee2e2; }

  .btn-success {
    background: var(--primary);
    color: white;
    box-shadow: 0 2px 8px rgba(79,95,255,0.3);
  }
  .btn-success:hover { background: var(--primary-dark); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(79,95,255,0.4); }

  .btn-sm { padding: 6px 12px; font-size: 12px; }

  /* Main Content */
  .main {
    max-width: 1440px;
    margin: 0 auto;
    padding: 24px 32px 48px;
  }

  /* Stats Row */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--surface);
    border-radius: var(--radius-lg);
    padding: 20px 22px;
    border: 1px solid var(--border-light);
    box-shadow: var(--shadow-sm);
    transition: all 0.2s ease;
  }
  .stat-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }

  .stat-label {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  .stat-value {
    font-size: 28px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -1px;
    line-height: 1.1;
  }

  .stat-sub {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .stat-icon {
    float: right;
    width: 38px;
    height: 38px;
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  /* Toolbar */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    gap: 12px;
    flex-wrap: wrap;
  }

  .toolbar-left {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
  }

  .search-box {
    position: relative;
    flex: 0 1 300px;
  }

  .search-box input {
    width: 100%;
    padding: 9px 14px 9px 38px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-family: inherit;
    background: var(--surface);
    color: var(--text);
    transition: all 0.2s ease;
  }
  .search-box input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
  .search-box input::placeholder { color: var(--text-muted); }

  .search-box .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 14px;
  }

  .filter-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .filter-chip {
    padding: 7px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-secondary);
    font-family: inherit;
    transition: all 0.15s ease;
  }
  .filter-chip:hover { border-color: var(--primary); color: var(--primary); }
  .filter-chip.active { background: var(--primary); color: white; border-color: var(--primary); }

  /* Matrix Table */
  .matrix-container {
    background: var(--surface);
    border-radius: var(--radius-lg);
    border: 1px solid var(--border-light);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .matrix-scroll {
    overflow-x: auto;
    overflow-y: visible;
  }

  .matrix-table {
    width: 100%;
    border-collapse: collapse;
    min-width: 800px;
  }

  .matrix-table thead th {
    padding: 14px 12px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text-muted);
    background: var(--surface-alt);
    border-bottom: 2px solid var(--border);
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 10;
    white-space: nowrap;
  }

  .matrix-table thead th:first-child {
    text-align: left;
    padding-left: 20px;
    min-width: 220px;
    position: sticky;
    left: 0;
    z-index: 20;
    background: var(--surface-alt);
  }

  .matrix-table thead th:last-child {
    min-width: 80px;
  }

  .matrix-table tbody tr {
    transition: background 0.15s ease;
  }
  .matrix-table tbody tr:hover { background: #fafbff; }
  .matrix-table tbody tr:hover td:first-child { background: #fafbff; }

  .matrix-table tbody td {
    padding: 8px 8px;
    border-bottom: 1px solid var(--border-light);
    text-align: center;
    vertical-align: middle;
  }

  .matrix-table tbody td:first-child {
    text-align: left;
    padding-left: 20px;
    position: sticky;
    left: 0;
    background: var(--surface);
    z-index: 5;
    border-right: 1px solid var(--border-light);
  }

  .employee-cell {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .avatar {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    color: white;
    flex-shrink: 0;
    text-transform: uppercase;
  }

  .employee-info {
    min-width: 0;
  }

  .employee-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .employee-dept {
    font-size: 11px;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .employee-actions {
    opacity: 0;
    transition: opacity 0.15s ease;
    margin-left: auto;
    flex-shrink: 0;
  }
  tr:hover .employee-actions { opacity: 1; }

  .icon-btn {
    width: 28px;
    height: 28px;
    border-radius: var(--radius-sm);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border: none;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 14px;
    transition: all 0.15s ease;
  }
  .icon-btn:hover { background: var(--surface-alt); color: var(--text); }
  .icon-btn.danger:hover { background: var(--danger-light); color: var(--danger); }

  /* Proficiency Cell */
  .prof-cell {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 40px;
    height: 40px;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 12px;
    font-weight: 700;
    transition: all 0.2s ease;
    position: relative;
    border: 2px solid transparent;
  }

  .prof-cell:hover {
    transform: scale(1.15);
    box-shadow: var(--shadow-md);
    z-index: 5;
  }

  .prof-none { background: var(--level-none); color: var(--text-muted); }
  .prof-1 { background: #fef3c7; color: #92400e; border-color: #fde68a; }
  .prof-2 { background: #dbeafe; color: #1e40af; border-color: #93c5fd; }
  .prof-3 { background: #d1fae5; color: #065f46; border-color: #6ee7b7; }
  .prof-4 { background: #ede9fe; color: #5b21b6; border-color: #a78bfa; }

  .prof-label {
    font-size: 9px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  /* Coverage bar in last column */
  .coverage-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }

  .coverage-bar-bg {
    width: 50px;
    height: 6px;
    background: var(--surface-alt);
    border-radius: 3px;
    overflow: hidden;
  }

  .coverage-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.4s ease;
  }

  .coverage-pct {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-secondary);
  }

  /* Skill header with coverage */
  .skill-header {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .skill-name {
    font-size: 11px;
  }

  .skill-avg {
    font-size: 9px;
    font-weight: 500;
    color: var(--text-muted);
    text-transform: none;
    letter-spacing: 0;
  }

  /* Legend */
  .legend {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 14px 20px;
    border-top: 1px solid var(--border-light);
    background: var(--surface-alt);
  }

  .legend-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .legend-items {
    display: flex;
    gap: 14px;
    align-items: center;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-secondary);
  }

  .legend-dot {
    width: 20px;
    height: 20px;
    border-radius: 5px;
    border: 2px solid transparent;
  }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    opacity: 0;
    visibility: hidden;
    transition: all 0.25s ease;
  }
  .modal-overlay.active { opacity: 1; visibility: visible; }

  .modal {
    background: var(--surface);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-xl);
    width: 460px;
    max-width: 92vw;
    max-height: 85vh;
    overflow-y: auto;
    transform: translateY(20px) scale(0.97);
    transition: transform 0.25s ease;
  }
  .modal-overlay.active .modal { transform: translateY(0) scale(1); }

  .modal-header {
    padding: 22px 24px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .modal-header h2 {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
  }

  .modal-body {
    padding: 20px 24px;
  }

  .modal-footer {
    padding: 0 24px 22px;
    display: flex;
    justify-content: flex-end;
    gap: 10px;
  }

  .form-group {
    margin-bottom: 16px;
  }

  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
  }

  .form-group input,
  .form-group select {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-family: inherit;
    color: var(--text);
    background: var(--surface);
    transition: all 0.2s ease;
  }

  .form-group input:focus,
  .form-group select:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px var(--primary-light);
  }

  /* Proficiency Picker */
  .prof-picker {
    display: flex;
    gap: 8px;
  }

  .prof-option {
    flex: 1;
    padding: 10px 6px;
    border-radius: var(--radius);
    border: 2px solid var(--border);
    background: var(--surface);
    cursor: pointer;
    text-align: center;
    transition: all 0.15s ease;
    font-family: inherit;
  }
  .prof-option:hover { border-color: var(--primary); }
  .prof-option.selected { border-color: var(--primary); background: var(--primary-light); }

  .prof-option .prof-num {
    font-size: 18px;
    font-weight: 800;
    display: block;
    line-height: 1;
    margin-bottom: 4px;
  }

  .prof-option .prof-text {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  /* Coverage Analysis */
  .analysis-section {
    margin-top: 24px;
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .section-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
  }

  .coverage-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
  }

  .coverage-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px;
    border: 1px solid var(--border-light);
    box-shadow: var(--shadow-sm);
    transition: all 0.2s ease;
  }
  .coverage-card:hover { box-shadow: var(--shadow-md); }

  .coverage-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .coverage-card-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }

  .coverage-card-badge {
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  .badge-good { background: var(--success-light); color: var(--success); }
  .badge-warning { background: var(--warning-light); color: var(--warning); }
  .badge-danger { background: var(--danger-light); color: var(--danger); }

  .coverage-bar-lg {
    width: 100%;
    height: 8px;
    background: var(--surface-alt);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 6px;
  }

  .coverage-bar-lg-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  .coverage-card-detail {
    font-size: 11px;
    color: var(--text-muted);
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-state .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state h3 { font-size: 18px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; }
  .empty-state p { font-size: 14px; }

  /* Tooltip */
  .tooltip {
    position: fixed;
    background: var(--text);
    color: white;
    padding: 6px 12px;
    border-radius: var(--radius-sm);
    font-size: 12px;
    font-weight: 500;
    pointer-events: none;
    z-index: 2000;
    opacity: 0;
    transition: opacity 0.15s ease;
    white-space: nowrap;
    box-shadow: var(--shadow-lg);
  }
  .tooltip.visible { opacity: 1; }
  .tooltip::after {
    content: '';
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-top-color: var(--text);
  }

  /* Add column button */
  .add-col-btn {
    min-width: 44px;
    padding: 8px;
    background: transparent;
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    color: var(--text-muted);
    cursor: pointer;
    font-size: 18px;
    transition: all 0.15s ease;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .add-col-btn:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }

  /* Scrollbar */
  .matrix-scroll::-webkit-scrollbar { height: 8px; }
  .matrix-scroll::-webkit-scrollbar-track { background: var(--surface-alt); border-radius: 4px; }
  .matrix-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .matrix-scroll::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  /* Responsive */
  @media (max-width: 768px) {
    .header-inner { padding: 14px 16px; }
    .main { padding: 16px; }
    .stats-row { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .toolbar { flex-direction: column; align-items: stretch; }
    .toolbar-left { flex-wrap: wrap; }
    .search-box { flex: 1 1 100%; }
    .header-actions { flex-wrap: wrap; }
  }

  /* Animations */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .animate-in {
    animation: fadeInUp 0.3s ease forwards;
  }

  .dept-tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 10px;
    font-weight: 600;
    background: var(--surface-alt);
    color: var(--text-secondary);
  }

  /* Context menu for proficiency */
  .context-menu {
    position: fixed;
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow-xl);
    border: 1px solid var(--border-light);
    padding: 6px;
    z-index: 1500;
    min-width: 160px;
    opacity: 0;
    visibility: hidden;
    transform: scale(0.95);
    transition: all 0.15s ease;
  }
  .context-menu.active { opacity: 1; visibility: visible; transform: scale(1); }

  .context-menu-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 13px;
    color: var(--text);
    transition: background 0.1s ease;
    border: none;
    background: none;
    width: 100%;
    font-family: inherit;
    text-align: left;
  }
  .context-menu-item:hover { background: var(--surface-alt); }

  .context-menu-dot {
    width: 16px;
    height: 16px;
    border-radius: 4px;
    flex-shrink: 0;
  }

  .tab-bar {
    display: flex;
    gap: 0;
    border-bottom: 2px solid var(--border-light);
    margin-bottom: 20px;
  }

  .tab {
    padding: 10px 20px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    cursor: pointer;
    border: none;
    background: none;
    font-family: inherit;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    transition: all 0.15s ease;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--primary); border-bottom-color: var(--primary); }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-left">
      <div class="header-icon">📊</div>
      <div>
        <h1>Employee Skills Matrix</h1>
        <p>Track and manage team skill coverage</p>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn btn-secondary" onclick="exportData()">📥 Export</button>
      <button class="btn btn-primary" onclick="openModal('employee')">＋ Add Employee</button>
      <button class="btn btn-primary" onclick="openModal('skill')">＋ Add Skill</button>
    </div>
  </div>
</div>

<div class="main">
  <!-- Stats -->
  <div class="stats-row" id="statsRow"></div>

  <!-- Tabs -->
  <div class="tab-bar">
    <button class="tab active" data-tab="matrix" onclick="switchTab('matrix')">Skills Matrix</button>
    <button class="tab" data-tab="coverage" onclick="switchTab('coverage')">Coverage Analysis</button>
  </div>

  <!-- Matrix View -->
  <div id="matrixView">
    <div class="toolbar">
      <div class="toolbar-left">
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" id="searchInput" placeholder="Search employees or skills..." oninput="renderMatrix()">
        </div>
        <div class="filter-group" id="deptFilters"></div>
      </div>
    </div>

    <div class="matrix-container">
      <div class="matrix-scroll">
        <table class="matrix-table" id="matrixTable"></table>
      </div>
      <div class="legend">
        <span class="legend-title">Proficiency:</span>
        <div class="legend-items">
          <div class="legend-item"><div class="legend-dot" style="background:var(--level-none);border-color:var(--border)"></div> None</div>
          <div class="legend-item"><div class="legend-dot" style="background:#fde68a;border-color:#fbbf24"></div> Beginner</div>
          <div class="legend-item"><div class="legend-dot" style="background:#93c5fd;border-color:#60a5fa"></div> Intermediate</div>
          <div class="legend-item"><div class="legend-dot" style="background:#6ee7b7;border-color:#34d399"></div> Advanced</div>
          <div class="legend-item"><div class="legend-dot" style="background:#a78bfa;border-color:#8b5cf6"></div> Expert</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Coverage View -->
  <div id="coverageView" style="display:none">
    <div class="analysis-section">
      <div class="section-header">
        <h2 class="section-title">Skill Coverage Overview</h2>
      </div>
      <div class="coverage-grid" id="coverageGrid"></div>
    </div>
  </div>
</div>

<!-- Add Employee Modal -->
<div class="modal-overlay" id="employeeModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="employeeModalTitle">Add Employee</h2>
      <button class="icon-btn" onclick="closeModal('employee')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="empName" placeholder="e.g. Sarah Johnson">
      </div>
      <div class="form-group">
        <label>Department</label>
        <select id="empDept">
          <option value="Engineering">Engineering</option>
          <option value="Design">Design</option>
          <option value="Marketing">Marketing</option>
          <option value="Sales">Sales</option>
          <option value="Product">Product</option>
          <option value="Data Science">Data Science</option>
          <option value="Operations">Operations</option>
          <option value="HR">HR</option>
          <option value="Finance">Finance</option>
        </select>
      </div>
      <div class="form-group">
        <label>Role / Title</label>
        <input type="text" id="empRole" placeholder="e.g. Senior Developer">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('employee')">Cancel</button>
      <button class="btn btn-success" onclick="saveEmployee()">Save Employee</button>
    </div>
  </div>
</div>

<!-- Add Skill Modal -->
<div class="modal-overlay" id="skillModal">
  <div class="modal">
    <div class="modal-header">
      <h2>Add Skill</h2>
      <button class="icon-btn" onclick="closeModal('skill')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Skill Name</label>
        <input type="text" id="skillName" placeholder="e.g. Machine Learning">
      </div>
      <div class="form-group">
        <label>Category</label>
        <select id="skillCategory">
          <option value="Technical">Technical</option>
          <option value="Soft Skill">Soft Skill</option>
          <option value="Leadership">Leadership</option>
          <option value="Domain">Domain Knowledge</option>
          <option value="Tool">Tool / Platform</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('skill')">Cancel</button>
      <button class="btn btn-success" onclick="saveSkill()">Save Skill</button>
    </div>
  </div>
</div>

<!-- Proficiency Picker Modal -->
<div class="modal-overlay" id="profModal">
  <div class="modal">
    <div class="modal-header">
      <h2>Set Proficiency</h2>
      <button class="icon-btn" onclick="closeModal('prof')">✕</button>
    </div>
    <div class="modal-body">
      <p style="font-size:13px;color:var(--text-secondary);margin-bottom:16px" id="profDesc"></p>
      <div class="prof-picker" id="profPicker"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger btn-sm" onclick="clearProficiency()">Clear</button>
      <button class="btn btn-ghost" onclick="closeModal('prof')">Cancel</button>
      <button class="btn btn-success" onclick="saveProficiency()">Save</button>
    </div>
  </div>
</div>

<!-- Tooltip -->
<div class="tooltip" id="tooltip"></div>

<script>
// ── Data ──────────────────────────────────────────────────────────────
const PROFICIENCY_LEVELS = [
  { value: 0, label: 'None', short: '—' },
  { value: 1, label: 'Beginner', short: 'B' },
  { value: 2, label: 'Intermediate', short: 'I' },
  { value: 3, label: 'Advanced', short: 'A' },
  { value: 4, label: 'Expert', short: 'E' }
];

const DEPT_COLORS = {
  'Engineering': '#4f5fff',
  'Design': '#ec4899',
  'Marketing': '#f59e0b',
  'Sales': '#10b981',
  'Product': '#8b5cf6',
  'Data Science': '#06b6d4',
  'Operations': '#f97316',
  'HR': '#ef4444',
  'Finance': '#14b8a6'
};

let state = {
  employees: [],
  skills: [],
  matrix: {},  // { `${empId}-${skillId}`: proficiency }
  activeFilter: 'All',
  editingProf: null,
  selectedProf: null,
  editingEmployeeId: null
};

// ── Sample Data ──────────────────────────────────────────────────────
function initSampleData() {
  const employees = [
    { id: 'e1', name: 'Sarah Chen', dept: 'Engineering', role: 'Senior Developer' },
    { id: 'e2', name: 'Marcus Johnson', dept: 'Engineering', role: 'Tech Lead' },
    { id: 'e3', name: 'Emily Rodriguez', dept: 'Design', role: 'UX Designer' },
    { id: 'e4', name: 'David Kim', dept: 'Data Science', role: 'ML Engineer' },
    { id: 'e5', name: 'Lisa Thompson', dept: 'Product', role: 'Product Manager' },
    { id: 'e6', name: 'James Wilson', dept: 'Marketing', role: 'Marketing Lead' },
    { id: 'e7', name: 'Aisha Patel', dept: 'Engineering', role: 'Frontend Developer' },
    { id: 'e8', name: 'Robert Garcia', dept: 'Sales', role: 'Account Executive' },
    { id: 'e9', name: 'Nina Kowalski', dept: 'Design', role: 'Visual Designer' },
    { id: 'e10', name: 'Tom Anderson', dept: 'Data Science', role: 'Data Analyst' },
  ];

  const skills = [
    { id: 's1', name: 'JavaScript', category: 'Technical' },
    { id: 's2', name: 'Python', category: 'Technical' },
    { id: 's3', name: 'React', category: 'Technical' },
    { id: 's4', name: 'SQL', category: 'Technical' },
    { id: 's5', name: 'UX Design', category: 'Technical' },
    { id: 's6', name: 'Project Mgmt', category: 'Leadership' },
    { id: 's7', name: 'Communication', category: 'Soft Skill' },
    { id: 's8', name: 'Machine Learning', category: 'Technical' },
    { id: 's9', name: 'Data Analysis', category: 'Technical' },
    { id: 's10', name: 'Public Speaking', category: 'Soft Skill' },
  ];

  const matrix = {
    'e1-s1': 4, 'e1-s2': 3, 'e1-s3': 4, 'e1-s4': 2, 'e1-s6': 2, 'e1-s7': 3,
    'e2-s1': 4, 'e2-s2': 4, 'e2-s3': 3, 'e2-s4': 3, 'e2-s6': 4, 'e2-s7': 4, 'e2-s8': 2,
    'e3-s5': 4, 'e3-s3': 2, 'e3-s7': 3, 'e3-s6': 2, 'e3-s1': 1,
    'e4-s2': 4, 'e4-s8': 4, 'e4-s4': 3, 'e4-s9': 4, 'e4-s1': 2,
    'e5-s6': 4, 'e5-s7': 4, 'e5-s9': 2, 'e5-s5': 2, 'e5-s10': 3, 'e5-s1': 1,
    'e6-s7': 4, 'e6-s10': 4, 'e6-s9': 2, 'e6-s6': 3, 'e6-s5': 1,
    'e7-s1': 4, 'e7-s3': 4, 'e7-s5': 2, 'e7-s7': 3, 'e7-s2': 1,
    'e8-s7': 4, 'e8-s10': 3, 'e8-s6': 2, 'e8-s9': 1, 'e8-s4': 1,
    'e9-s5': 4, 'e9-s1': 2, 'e9-s3': 1, 'e9-s7': 3, 'e9-s9': 1,
    'e10-s2': 3, 'e10-s4': 4, 'e10-s9': 4, 'e10-s8': 2, 'e10-s7': 2,
  };

  state.employees = employees;
  state.skills = skills;
  state.matrix = matrix;
}

// ── Utility ──────────────────────────────────────────────────────────
function getInitials(name) {
  return name.split(' ').map(n => n[0]).join('').substring(0, 2);
}

function getDeptColor(dept) {
  return DEPT_COLORS[dept] || '#6b7280';
}

function getProfClass(level) {
  if (level === 0 || !level) return 'prof-none';
  return `prof-${level}`;
}

function getProfLabel(level) {
  return PROFICIENCY_LEVELS[level]?.label || 'None';
}

function getProfShort(level) {
  return PROFICIENCY_LEVELS[level]?.short || '—';
}

function generateId() {
  return 'id_' + Math.random().toString(36).substr(2, 9);
}

// ── Stats ────────────────────────────────────────────────────────────
function renderStats() {
  const totalCells = state.employees.length * state.skills.length;
  const filledCells = Object.values(state.matrix).filter(v => v > 0).length;
  const overallCoverage = totalCells > 0 ? Math.round((filledCells / totalCells) * 100) : 0;

  const avgProf = Object.values(state.matrix).filter(v => v > 0);
  const avgScore = avgProf.length > 0 ? (avgProf.reduce((a,b) => a+b, 0) / avgProf.length).toFixed(1) : '0.0';

  const expertCount = Object.values(state.matrix).filter(v => v === 4).length;

  // Find biggest gap
  let biggestGap = '—';
  let minCoverage = Infinity;
  state.skills.forEach(s => {
    const count = state.employees.filter(e => (state.matrix[`${e.id}-${s.id}`] || 0) > 0).length;
    if (count < minCoverage && state.employees.length > 0) {
      minCoverage = count;
      biggestGap = s.name;
    }
  });

  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card">
      <div class="stat-icon" style="background:var(--primary-light);color:var(--primary);float:right">👥</div>
      <div class="stat-label">Team Members</div>
      <div class="stat-value">${state.employees.length}</div>
      <div class="stat-sub">${[...new Set(state.employees.map(e=>e.dept))].length} departments</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background:var(--success-light);color:var(--success);float:right">🎯</div>
      <div class="stat-label">Skills Tracked</div>
      <div class="stat-value">${state.skills.length}</div>
      <div class="stat-sub">${[...new Set(state.skills.map(s=>s.category))].length} categories</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background:#fef3c7;color:#f59e0b;float:right">📈</div>
      <div class="stat-label">Matrix Coverage</div>
      <div class="stat-value">${overallCoverage}%</div>
      <div class="stat-sub">Avg proficiency: ${avgScore}/4</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background:#ede9fe;color:#8b5cf6;float:right">⚡</div>
      <div class="stat-label">Expert Skills</div>
      <div class="stat-value">${expertCount}</div>
      <div class="stat-sub">Gap: ${biggestGap}</div>
    </div>
  `;
}

// ── Department Filters ───────────────────────────────────────────────
function renderDeptFilters() {
  const depts = ['All', ...new Set(state.employees.map(e => e.dept))];
  document.getElementById('deptFilters').innerHTML = depts.map(d =>
    `<button class="filter-chip ${state.activeFilter === d ? 'active' : ''}" onclick="setFilter('${d}')">${d}</button>`
  ).join('');
}

function setFilter(dept) {
  state.activeFilter = dept;
  renderDeptFilters();
  renderMatrix();
}

// ── Matrix ───────────────────────────────────────────────────────────
function renderMatrix() {
  const search = document.getElementById('searchInput').value.toLowerCase();

  let filteredEmps = state.employees;
  if (state.activeFilter !== 'All') {
    filteredEmps = filteredEmps.filter(e => e.dept === state.activeFilter);
  }
  if (search) {
    filteredEmps = filteredEmps.filter(e =>
      e.name.toLowerCase().includes(search) ||
      e.dept.toLowerCase().includes(search) ||
      e.role.toLowerCase().includes(search)
    );
  }

  let filteredSkills = state.skills;
  if (search) {
    const matchingSkillIds = new Set();
    state.skills.forEach(s => {
      if (s.name.toLowerCase().includes(search) || s.category.toLowerCase().includes(search)) {
        matchingSkillIds.add(s.id);
      }
    });
    // Also include skills that matched employees have
    if (matchingSkillIds.size === 0 && filteredEmps.length > 0) {
      // show all skills if search only matches employees
    } else if (matchingSkillIds.size > 0) {
      filteredSkills = state.skills.filter(s =>
        s.name.toLowerCase().includes(search) ||
        s.category.toLowerCase().includes(search) ||
        matchingSkillIds.has(s.id)
      );
    }
  }

  if (filteredEmps.length === 0 || filteredSkills.length === 0) {
    document.getElementById('matrixTable').innerHTML = `
      <tr><td>
        <div class="empty-state">
          <div class="empty-icon">🔍</div>
          <h3>No results found</h3>
          <p>Try adjusting your search or filters</p>
        </div>
      </td></tr>
    `;
    return;
  }

  // Calculate skill coverage
  const skillCoverage = {};
  filteredSkills.forEach(s => {
    const vals = filteredEmps.map(e => state.matrix[`${e.id}-${s.id}`] || 0);
    const covered = vals.filter(v => v > 0).length;
    const avg = vals.length > 0 ? vals.reduce((a,b) => a+b, 0) / vals.length : 0;
    skillCoverage[s.id] = { covered, total: filteredEmps.length, pct: Math.round((covered / filteredEmps.length) * 100), avg: avg.toFixed(1) };
  });

  // Header
  let headerHtml = '<thead><tr><th>Employee</th>';
  filteredSkills.forEach(s => {
    const cov = skillCoverage[s.id];
    headerHtml += `<th>
      <div class="skill-header">
        <span class="skill-name">${s.name}</span>
        <span class="skill-avg">avg ${cov.avg}</span>
      </div>
    </th>`;
  });
  headerHtml += '<th>Avg</th></tr></thead>';

  // Body
  let bodyHtml = '<tbody>';
  filteredEmps.forEach((emp, idx) => {
    const empSkills = filteredSkills.map(s => state.matrix[`${emp.id}-${s.id}`] || 0);
    const empAvg = empSkills.length > 0 ? (empSkills.reduce((a,b) => a+b, 0) / empSkills.length) : 0;

    bodyHtml += `<tr class="animate-in" style="animation-delay:${idx * 30}ms">
      <td>
        <div class="employee-cell">
          <div class="avatar" style="background:${getDeptColor(emp.dept)}">${getInitials(emp.name)}</div>
          <div class="employee-info">
            <div class="employee-name">${emp.name}</div>
            <div class="employee-dept">${emp.role} · <span class="dept-tag">${emp.dept}</span></div>
          </div>
          <div class="employee-actions">
            <button class="icon-btn danger" onclick="deleteEmployee('${emp.id}')" title="Remove employee">🗑</button>
          </div>
        </div>
      </td>`;

    filteredSkills.forEach(s => {
      const level = state.matrix[`${emp.id}-${s.id}`] || 0;
      bodyHtml += `<td>
        <div class="prof-cell ${getProfClass(level)}"
          onclick="openProfPicker('${emp.id}','${s.id}')"
          onmouseenter="showTooltip(event, '${emp.name} — ${s.name}: ${getProfLabel(level)}')"
          onmouseleave="hideTooltip()">
          <span class="prof-label">${getProfShort(level)}</span>
        </div>
      </td>`;
    });

    // Employee average
    const avgPct = Math.round((empAvg / 4) * 100);
    const avgColor = empAvg >= 3 ? 'var(--success)' : empAvg >= 2 ? 'var(--primary)' : empAvg >= 1 ? 'var(--warning)' : 'var(--text-muted)';
    bodyHtml += `<td>
      <div class="coverage-cell">
        <span class="coverage-pct" style="color:${avgColor}">${empAvg.toFixed(1)}</span>
        <div class="coverage-bar-bg">
          <div class="coverage-bar-fill" style="width:${avgPct}%;background:${avgColor}"></div>
        </div>
      </div>
    </td>`;

    bodyHtml += '</tr>';
  });
  bodyHtml += '</tbody>';

  document.getElementById('matrixTable').innerHTML = headerHtml + bodyHtml;
}

// ── Coverage Analysis ────────────────────────────────────────────────
function renderCoverage() {
  const grid = document.getElementById('coverageGrid');
  if (state.skills.length === 0 || state.employees.length === 0) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div class="empty-icon">📊</div>
      <h3>No data yet</h3>
      <p>Add employees and skills to see coverage analysis</p>
    </div>`;
    return;
  }

  const skillData = state.skills.map(s => {
    const vals = state.employees.map(e => state.matrix[`${e.id}-${s.id}`] || 0);
    const covered = vals.filter(v => v > 0).length;
    const pct = Math.round((covered / state.employees.length) * 100);
    const avg = vals.length > 0 ? vals.reduce((a,b) => a+b, 0) / vals.length : 0;
    const experts = vals.filter(v => v === 4).length;
    const advanced = vals.filter(v => v >= 3).length;
    return { ...s, covered, total: state.employees.length, pct, avg: avg.toFixed(1), experts, advanced };
  });

  // Sort by coverage ascending (biggest gaps first)
  skillData.sort((a, b) => a.pct - b.pct);

  grid.innerHTML = skillData.map(s => {
    let badge, badgeClass;
    if (s.pct >= 70) { badge = 'Good'; badgeClass = 'badge-good'; }
    else if (s.pct >= 40) { badge = 'Fair'; badgeClass = 'badge-warning'; }
    else { badge = 'Gap'; badgeClass = 'badge-danger'; }

    const barColor = s.pct >= 70 ? 'var(--success)' : s.pct >= 40 ? 'var(--warning)' : 'var(--danger)';

    return `<div class="coverage-card">
      <div class="coverage-card-header">
        <span class="coverage-card-name">${s.name}</span>
        <span class="coverage-card-badge ${badgeClass}">${badge}</span>
      </div>
      <div class="coverage-bar-lg">
        <div class="coverage-bar-lg-fill" style="width:${s.pct}%;background:${barColor}"></div>
      </div>
      <div class="coverage-card-detail">
        ${s.covered}/${s.total} proficient · Avg: ${s.avg} · ${s.experts} expert${s.experts !== 1 ? 's' : ''}
      </div>
    </div>`;
  }).join('');
}

// ── Tabs ─────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.getElementById('matrixView').style.display = tab === 'matrix' ? '' : 'none';
  document.getElementById('coverageView').style.display = tab === 'coverage' ? '' : 'none';
  if (tab === 'coverage') renderCoverage();
}

// ── Modals ───────────────────────────────────────────────────────────
function openModal(type) {
  if (type === 'employee') {
    document.getElementById('employeeModalTitle').textContent = 'Add Employee';
    document.getElementById('empName').value = '';
    document.getElementById('empRole').value = '';
    document.getElementById('empDept').value = 'Engineering';
    state.editingEmployeeId = null;
    document.getElementById('employeeModal').classList.add('active');
    setTimeout(() => document.getElementById('empName').focus(), 200);
  } else if (type === 'skill') {
    document.getElementById('skillName').value = '';
    document.getElementById('skillCategory').value = 'Technical';
    document.getElementById('skillModal').classList.add('active');
    setTimeout(() => document.getElementById('skillName').focus(), 200);
  }
}

function closeModal(type) {
  document.getElementById(type + 'Modal').classList.remove('active');
}

function saveEmployee() {
  const name = document.getElementById('empName').value.trim();
  const dept = document.getElementById('empDept').value;
  const role = document.getElementById('empRole').value.trim();
  if (!name) { document.getElementById('empName').focus(); return; }

  if (state.editingEmployeeId) {
    const emp = state.employees.find(e => e.id === state.editingEmployeeId);
    if (emp) { emp.name = name; emp.dept = dept; emp.role = role || 'Team Member'; }
  } else {
    state.employees.push({ id: generateId(), name, dept, role: role || 'Team Member' });
  }

  closeModal('employee');
  renderAll();
}

function saveSkill() {
  const name = document.getElementById('skillName').value.trim();
  const category = document.getElementById('skillCategory').value;
  if (!name) { document.getElementById('skillName').focus(); return; }

  state.skills.push({ id: generateId(), name, category });
  closeModal('skill');
  renderAll();
}

function deleteEmployee(id) {
  if (!confirm('Remove this employee from the matrix?')) return;
  state.employees = state.employees.filter(e => e.id !== id);
  // Clean up matrix
  Object.keys(state.matrix).forEach(key => {
    if (key.startsWith(id + '-')) delete state.matrix[key];
  });
  renderAll();
}

function deleteSkill(id) {
  if (!confirm('Remove this skill from the matrix?')) return;
  state.skills = state.skills.filter(s => s.id !== id);
  Object.keys(state.matrix).forEach(key => {
    if (key.endsWith('-' + id)) delete state.matrix[key];
  });
  renderAll();
}

// ── Proficiency Picker ───────────────────────────────────────────────
function openProfPicker(empId, skillId) {
  state.editingProf = { empId, skillId };
  state.selectedProf = state.matrix[`${empId}-${skillId}`] || 0;

  const emp = state.employees.find(e => e.id === empId);
  const skill = state.skills.find(s => s.id === skillId);
  document.getElementById('profDesc').textContent = `${emp.name} — ${skill.name}`;

  const picker = document.getElementById('profPicker');
  picker.innerHTML = PROFICIENCY_LEVELS.map(p => `
    <button class="prof-option ${state.selectedProf === p.value ? 'selected' : ''}"
      onclick="selectProfLevel(${p.value})"
      data-level="${p.value}">
      <span class="prof-num" style="color:${p.value === 0 ? 'var(--text-muted)' : p.value === 1 ? '#92400e' : p.value === 2 ? '#1e40af' : p.value === 3 ? '#065f46' : '#5b21b6'}">${p.short}</span>
      <span class="prof-text">${p.label}</span>
    </button>
  `).join('');

  document.getElementById('profModal').classList.add('active');
}

function selectProfLevel(level) {
  state.selectedProf = level;
  document.querySelectorAll('.prof-option').forEach(el => {
    el.classList.toggle('selected', parseInt(el.dataset.level) === level);
  });
}

function saveProficiency() {
  if (!state.editingProf) return;
  const { empId, skillId } = state.editingProf;
  const key = `${empId}-${skillId}`;
  if (state.selectedProf === 0) {
    delete state.matrix[key];
  } else {
    state.matrix[key] = state.selectedProf;
  }
  closeModal('prof');
  renderAll();
}

function clearProficiency() {
  if (!state.editingProf) return;
  const { empId, skillId } = state.editingProf;
  delete state.matrix[`${empId}-${skillId}`];
  closeModal('prof');
  renderAll();
}

// ── Tooltip ──────────────────────────────────────────────────────────
function showTooltip(event, text) {
  const tooltip = document.getElementById('tooltip');
  tooltip.textContent = text;
  tooltip.classList.add('visible');
  const rect = event.target.getBoundingClientRect();
  tooltip.style.left = (rect.left + rect.width/2 - tooltip.offsetWidth/2) + 'px';
  tooltip.style.top = (rect.top - tooltip.offsetHeight - 8) + 'px';
}

function hideTooltip() {
  document.getElementById('tooltip').classList.remove('visible');
}

// ── Export ────────────────────────────────────────────────────────────
function exportData() {
  let csv = 'Employee,Department,Role,' + state.skills.map(s => s.name).join(',') + '\n';
  state.employees.forEach(emp => {
    const row = [emp.name, emp.dept, emp.role];
    state.skills.forEach(s => {
      row.push(getProfLabel(state.matrix[`${emp.id}-${s.id}`] || 0));
    });
    csv += row.join(',') + '\n';
  });

  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'skills-matrix.csv';
  a.click();
  URL.revokeObjectURL(url);
}

// ── Render All ───────────────────────────────────────────────────────
function renderAll() {
  renderStats();
  renderDeptFilters();
  renderMatrix();
  renderCoverage();
}

// ── Keyboard shortcuts ───────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-overlay.active').forEach(m => m.classList.remove('active'));
  }
});

// Close modal on overlay click
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => {
    if (e.target === overlay) overlay.classList.remove('active');
  });
});

// ── Init ─────────────────────────────────────────────────────────────
initSampleData();
renderAll();
</script>
</body>
</html>
