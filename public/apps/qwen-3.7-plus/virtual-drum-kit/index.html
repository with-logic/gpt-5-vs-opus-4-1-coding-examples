<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Virtual Drum Kit — Studio Edition</title>
<style>
  :root {
    --bg-0: #08080d;
    --bg-1: #101018;
    --bg-2: #181824;
    --panel: #14141e;
    --panel-2: #1e1e2c;
    --panel-3: #252535;
    --line: #2a2a3a;
    --line-2: #353548;
    --text: #e8e8f0;
    --text-dim: #6a6a80;
    --text-dim-2: #4a4a60;
    --accent: #ff3860;
    --accent-2: #ffcc00;
    --accent-3: #00e5a0;
    --accent-4: #4a90ff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg-0);
    color: var(--text);
    font-family: 'SF Mono', 'Menlo', 'Consolas', 'Monaco', monospace;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }

  body {
    background:
      radial-gradient(ellipse at 20% 0%, #1a1a30 0%, transparent 50%),
      radial-gradient(ellipse at 80% 100%, #1a1020 0%, transparent 50%),
      var(--bg-0);
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    min-height: 100dvh;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 50px 50px;
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
    padding: 12px 16px;
    gap: 10px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: linear-gradient(180deg, var(--panel-2), var(--panel));
    border: 1px solid var(--line);
    border-radius: 12px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.04), 0 4px 20px rgba(0,0,0,0.5);
    flex-shrink: 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #ff6b8a, var(--accent) 60%, #8b0020);
    box-shadow: 0 0 16px rgba(255, 56, 96, 0.4), inset 0 -3px 6px rgba(0,0,0,0.4);
    position: relative;
    flex-shrink: 0;
  }
  .logo-icon::after {
    content: '';
    position: absolute;
    inset: 10px;
    border-radius: 50%;
    background: #14141e;
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.6);
  }

  .logo-text {
    display: flex;
    flex-direction: column;
    line-height: 1;
  }
  .logo-text .title {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 2.5px;
    color: var(--text);
  }
  .logo-text .sub {
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--text-dim);
    margin-top: 3px;
  }

  .controls {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 7px 12px;
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--text-dim);
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s ease;
    font-weight: 600;
    white-space: nowrap;
  }
  .btn:hover { background: var(--panel-3); border-color: var(--line-2); color: var(--text); }
  .btn:active { transform: scale(0.97); }

  .btn .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--text-dim-2);
    transition: all 0.15s;
  }

  .btn.record .dot { background: #802030; }
  .btn.record.active {
    background: rgba(255, 56, 96, 0.12);
    border-color: rgba(255, 56, 96, 0.4);
    color: var(--accent);
  }
  .btn.record.active .dot {
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 1s infinite;
  }

  .btn.play .dot { background: #005540; }
  .btn.play.active {
    background: rgba(0, 229, 160, 0.12);
    border-color: rgba(0, 229, 160, 0.4);
    color: var(--accent-3);
  }
  .btn.play.active .dot {
    background: var(--accent-3);
    box-shadow: 0 0 8px var(--accent-3);
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  /* Visualizer */
  .viz-row {
    display: flex;
    gap: 10px;
    flex-shrink: 0;
    height: 56px;
  }

  .visualizer {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    overflow: hidden;
    position: relative;
    box-shadow: inset 0 2px 8px rgba(0,0,0,0.5);
  }
  .visualizer canvas {
    width: 100%;
    height: 100%;
    display: block;
  }
  .visualizer .viz-label {
    position: absolute;
    top: 5px;
    left: 8px;
    font-size: 8px;
    letter-spacing: 2px;
    color: var(--text-dim-2);
    z-index: 2;
    pointer-events: none;
  }
  .visualizer::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 100% 3px;
    pointer-events: none;
    z-index: 1;
  }

  .spectrum {
    width: 120px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    overflow: hidden;
    position: relative;
    box-shadow: inset 0 2px 8px rgba(0,0,0,0.5);
    flex-shrink: 0;
  }
  .spectrum canvas {
    width: 100%;
    height: 100%;
    display: block;
  }
  .spectrum .viz-label {
    position: absolute;
    top: 5px;
    left: 8px;
    font-size: 8px;
    letter-spacing: 2px;
    color: var(--text-dim-2);
    z-index: 2;
    pointer-events: none;
  }

  /* Volume */
  .volume-wrap {
    width: 36px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 8px 0;
    flex-shrink: 0;
    box-shadow: inset 0 2px 8px rgba(0,0,0,0.5);
  }
  .volume-wrap .vol-label {
    font-size: 7px;
    letter-spacing: 1.5px;
    color: var(--text-dim-2);
    margin-bottom: 4px;
  }
  .volume-slider {
    -webkit-appearance: none;
    appearance: none;
    writing-mode: vertical-lr;
    direction: rtl;
    width: 60px;
    height: 4px;
    background: transparent;
    outline: none;
    margin: 0;
  }
  .volume-slider::-webkit-slider-runnable-track {
    width: 4px;
    height: 60px;
    background: var(--bg-2);
    border-radius: 2px;
    border: 1px solid var(--line);
  }
  .volume-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 8px;
    background: var(--text-dim);
    border-radius: 3px;
    border: 1px solid var(--line-2);
    cursor: pointer;
    margin-left: -5px;
  }
  .volume-slider::-moz-range-track {
    width: 4px;
    height: 60px;
    background: var(--bg-2);
    border-radius: 2px;
    border: 1px solid var(--line);
  }
  .volume-slider::-moz-range-thumb {
    width: 14px;
    height: 8px;
    background: var(--text-dim);
    border-radius: 3px;
    border: 1px solid var(--line-2);
    cursor: pointer;
  }

  /* Drum pads grid */
  .pads {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: 10px;
    min-height: 0;
  }

  .pad {
    position: relative;
    border-radius: 14px;
    background:
      radial-gradient(ellipse at 30% 20%, rgba(255,255,255,0.06), transparent 50%),
      linear-gradient(180deg, var(--panel-3), var(--bg-1));
    border: 1px solid var(--line);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.05),
      inset 0 -3px 12px rgba(0,0,0,0.4),
      0 4px 12px rgba(0,0,0,0.3);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    overflow: hidden;
    transition: transform 0.06s ease, box-shadow 0.12s ease, border-color 0.12s ease;
    min-height: 70px;
  }

  .pad .glow {
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at center, var(--pad-color, var(--accent)) 0%, transparent 65%);
    opacity: 0;
    transition: opacity 0.08s ease;
    pointer-events: none;
  }

  .pad.hit {
    transform: scale(0.96);
    border-color: var(--pad-color);
    box-shadow:
      inset 0 0 30px rgba(0,0,0,0.3),
      0 0 20px color-mix(in srgb, var(--pad-color) 30%, transparent),
      0 2px 8px rgba(0,0,0,0.3);
  }
  .pad.hit .glow {
    opacity: 0.3;
  }

  .pad .led {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #222;
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.6);
    transition: all 0.08s ease;
  }
  .pad.hit .led {
    background: var(--pad-color, var(--accent));
    box-shadow: 0 0 8px var(--pad-color, var(--accent)), 0 0 16px var(--pad-color, var(--accent));
  }

  .pad .icon {
    font-size: 20px;
    opacity: 0.5;
    z-index: 1;
    transition: opacity 0.1s;
    line-height: 1;
  }
  .pad.hit .icon { opacity: 0.9; }

  .pad .name {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--text);
    text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    z-index: 1;
  }
  .pad .key {
    font-size: 10px;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    padding: 2px 7px;
    background: rgba(0,0,0,0.35);
    border: 1px solid var(--line);
    border-radius: 4px;
    z-index: 1;
    font-weight: 600;
  }

  /* Pad colors */
  .pad[data-pad="0"] { --pad-color: #ff3860; }
  .pad[data-pad="1"] { --pad-color: #ffcc00; }
  .pad[data-pad="2"] { --pad-color: #00e5a0; }
  .pad[data-pad="3"] { --pad-color: #4a90ff; }
  .pad[data-pad="4"] { --pad-color: #ff6b35; }
  .pad[data-pad="5"] { --pad-color: #c77dff; }
  .pad[data-pad="6"] { --pad-color: #00d9ff; }
  .pad[data-pad="7"] { --pad-color: #ff006e; }

  /* Status bar */
  .status {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 12px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    font-size: 9px;
    letter-spacing: 1.5px;
    color: var(--text-dim-2);
    flex-shrink: 0;
  }
  .status .rec-time {
    color: var(--accent);
    font-weight: 700;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .status .rec-time.active { opacity: 1; }
  .status .play-time {
    color: var(--accent-3);
    font-weight: 700;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .status .play-time.active { opacity: 1; }

  /* Mobile adjustments */
  @media (max-width: 600px) {
    .app { padding: 8px 10px; gap: 8px; }
    .header { padding: 8px 10px; }
    .logo-text .title { font-size: 12px; letter-spacing: 1.5px; }
    .logo-text .sub { font-size: 7px; letter-spacing: 2px; }
    .logo-icon { width: 28px; height: 28px; }
    .logo-icon::after { inset: 8px; }
    .btn { padding: 6px 8px; font-size: 9px; gap: 5px; }
    .viz-row { height: 44px; }
    .spectrum { width: 80px; }
    .volume-wrap { width: 30px; }
    .volume-slider { height: 40px; }
    .pads { gap: 7px; }
    .pad .name { font-size: 10px; letter-spacing: 1px; }
    .pad .key { font-size: 8px; padding: 2px 5px; }
    .pad .icon { font-size: 16px; }
    .status { font-size: 8px; padding: 5px 10px; }
  }

  @media (max-width: 380px) {
    .spectrum { display: none; }
    .volume-wrap { display: none; }
  }

  @media (max-height: 600px) {
    .viz-row { height: 38px; }
    .pads { gap: 6px; }
    .pad .icon { display: none; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">
      <div class="logo-icon"></div>
      <div class="logo-text">
        <div class="title">BEAT FORGE</div>
        <div class="sub">DRUM KIT · STUDIO</div>
      </div>
    </div>
    <div class="controls">
      <button class="btn record" id="recBtn">
        <span class="dot"></span><span class="label">REC</span>
      </button>
      <button class="btn play" id="playBtn">
        <span class="dot"></span><span class="label">PLAY</span>
      </button>
      <button class="btn" id="clearBtn">
        <span class="label">CLR</span>
      </button>
    </div>
  </div>

  <div class="viz-row">
    <div class="visualizer">
      <span class="viz-label">WAVEFORM</span>
      <canvas id="viz"></canvas>
    </div>
    <div class="spectrum">
      <span class="viz-label">SPECTRUM</span>
      <canvas id="spec"></canvas>
    </div>
    <div class="volume-wrap">
      <span class="vol-label">VOL</span>
      <input type="range" class="volume-slider" id="volSlider" min="0" max="100" value="75" orient="vertical" />
    </div>
  </div>

  <div class="pads" id="pads"></div>

  <div class="status">
    <div>KEYS: A S D F · J K L ;</div>
    <div class="rec-time" id="recTime">● REC 00:00.0</div>
    <div class="play-time" id="playTime">▶ 00:00.0</div>
    <div id="eventCount">0 EVENTS</div>
  </div>
</div>

<script>
(() => {
  // ===== Audio Context =====
  let audioCtx = null;
  let masterGain = null;
  let compressor = null;
  let analyser = null;

  function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // Compressor for glue
    compressor = audioCtx.createDynamicsCompressor();
    compressor.threshold.value = -12;
    compressor.knee.value = 12;
    compressor.ratio.value = 4;
    compressor.attack.value = 0.003;
    compressor.release.value = 0.15;

    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.75;

    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 4096;
    analyser.smoothingTimeConstant = 0.8;

    masterGain.connect(compressor);
    compressor.connect(analyser);
    analyser.connect(audioCtx.destination);
  }

  // ===== Utility =====
  function noiseBuffer(duration = 2) {
    const len = audioCtx.sampleRate * duration;
    const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
    return buf;
  }

  let noiseBuf = null;
  function getNoise() {
    if (!noiseBuf) noiseBuf = noiseBuffer(3);
    return noiseBuf;
  }

  // Simple distortion via waveshaper
  function makeDistortion(amount = 20) {
    const samples = 44100;
    const curve = new Float32Array(samples);
    const deg = Math.PI / 180;
    for (let i = 0; i < samples; i++) {
      const x = (i * 2) / samples - 1;
      curve[i] = ((3 + amount) * x * 20 * deg) / (Math.PI + amount * Math.abs(x));
    }
    return curve;
  }

  // ===== Drum Synthesis =====
  const drums = {
    // KICK - deep 808-style with click
    kick() {
      const t = audioCtx.currentTime;
      // Main body
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(160, t);
      osc.frequency.exponentialRampToValueAtTime(50, t + 0.07);
      osc.frequency.exponentialRampToValueAtTime(30, t + 0.4);
      gain.gain.setValueAtTime(1.2, t);
      gain.gain.setValueAtTime(1.0, t + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.55);
      osc.connect(gain).connect(masterGain);
      osc.start(t);
      osc.stop(t + 0.55);
      // Click transient
      const click = audioCtx.createOscillator();
      const clickGain = audioCtx.createGain();
      click.type = 'sine';
      click.frequency.value = 4000;
      clickGain.gain.setValueAtTime(0.3, t);
      clickGain.gain.exponentialRampToValueAtTime(0.001, t + 0.015);
      click.connect(clickGain).connect(masterGain);
      click.start(t);
      click.stop(t + 0.02);
      // Sub-harmonic thump
      const sub = audioCtx.createOscillator();
      const subGain = audioCtx.createGain();
      sub.type = 'sine';
      sub.frequency.setValueAtTime(60, t);
      sub.frequency.exponentialRampToValueAtTime(25, t + 0.3);
      subGain.gain.setValueAtTime(0.6, t);
      subGain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
      sub.connect(subGain).connect(masterGain);
      sub.start(t);
      sub.stop(t + 0.4);
    },

    // SNARE - layered noise + body
    snare() {
      const t = audioCtx.currentTime;
      // Noise component
      const noise = audioCtx.createBufferSource();
      noise.buffer = getNoise();
      const nHP = audioCtx.createBiquadFilter();
      nHP.type = 'highpass';
      nHP.frequency.value = 1200;
      const nBP = audioCtx.createBiquadFilter();
      nBP.type = 'bandpass';
      nBP.frequency.value = 5000;
      nBP.Q.value = 0.6;
      const nGain = audioCtx.createGain();
      nGain.gain.setValueAtTime(0.65, t);
      nGain.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
      noise.connect(nHP).connect(nBP).connect(nGain).connect(masterGain);
      noise.start(t);
      noise.stop(t + 0.22);
      // Body tone
      const osc = audioCtx.createOscillator();
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(220, t);
      osc.frequency.exponentialRampToValueAtTime(150, t + 0.05);
      const oGain = audioCtx.createGain();
      oGain.gain.setValueAtTime(0.55, t);
      oGain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
      osc.connect(oGain).connect(masterGain);
      osc.start(t);
      osc.stop(t + 0.1);
    },

    // HI-HAT CLOSED - crisp short noise
    hihat() {
      const t = audioCtx.currentTime;
      const noise = audioCtx.createBufferSource();
      noise.buffer = getNoise();
      const hp = audioCtx.createBiquadFilter();
      hp.type = 'highpass';
      hp.frequency.value = 7000;
      const bp = audioCtx.createBiquadFilter();
      bp.type = 'bandpass';
      bp.frequency.value = 10000;
      bp.Q.value = 1.2;
      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(0.35, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
      noise.connect(hp).connect(bp).connect(gain).connect(masterGain);
      noise.start(t);
      noise.stop(t + 0.06);
    },

    // HI-HAT OPEN - sustained sizzle
    openhat() {
      const t = audioCtx.currentTime;
      const noise = audioCtx.createBufferSource();
      noise.buffer = getNoise();
      const hp = audioCtx.createBiquadFilter();
      hp.type = 'highpass';
      hp.frequency.value = 5500;
      const bp = audioCtx.createBiquadFilter();
      bp.type = 'bandpass';
      bp.frequency.value = 9000;
      bp.Q.value = 1.0;
      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(0.35, t);
      gain.gain.setValueAtTime(0.25, t + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.45);
      noise.connect(hp).connect(bp).connect(gain).connect(masterGain);
      noise.start(t);
      noise.stop(t + 0.45);
    },

    // TOM - pitched sine with body
    tom() {
      const t = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(240, t);
      osc.frequency.exponentialRampToValueAtTime(90, t + 0.3);
      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(0.85, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.45);
      osc.connect(gain).connect(masterGain);
      osc.start(t);
      osc.stop(t + 0.45);
      // Attack click
      const click = audioCtx.createBufferSource();
      click.buffer = getNoise();
      const cHP = audioCtx.createBiquadFilter();
      cHP.type = 'highpass';
      cHP.frequency.value = 2000;
      const cGain = audioCtx.createGain();
      cGain.gain.setValueAtTime(0.25, t);
      cGain.gain.exponentialRampToValueAtTime(0.001, t + 0.02);
      click.connect(cHP).connect(cGain).connect(masterGain);
      click.start(t);
      click.stop(t + 0.03);
    },

    // CLAP - multi-burst noise
    clap() {
      const t = audioCtx.currentTime;
      const bursts = [
        { offset: 0, dur: 0.015, vol: 0.5 },
        { offset: 0.01, dur: 0.015, vol: 0.45 },
        { offset: 0.022, dur: 0.015, vol: 0.4 },
        { offset: 0.038, dur: 0.22, vol: 0.6 }
      ];
      bursts.forEach(b => {
        const noise = audioCtx.createBufferSource();
        noise.buffer = getNoise();
        const bp = audioCtx.createBiquadFilter();
        bp.type = 'bandpass';
        bp.frequency.value = 1500;
        bp.Q.value = 0.7;
        const gain = audioCtx.createGain();
        const start = t + b.offset;
        gain.gain.setValueAtTime(b.vol, start);
        gain.gain.exponentialRampToValueAtTime(0.001, start + b.dur);
        noise.connect(bp).connect(gain).connect(masterGain);
        noise.start(start);
        noise.stop(start + b.dur);
      });
    },

    // CRASH - long wash of noise
    crash() {
      const t = audioCtx.currentTime;
      const noise = audioCtx.createBufferSource();
      noise.buffer = getNoise();
      const hp = audioCtx.createBiquadFilter();
      hp.type = 'highpass';
      hp.frequency.value = 3500;
      const bp = audioCtx.createBiquadFilter();
      bp.type = 'peaking';
      bp.frequency.value = 6000;
      bp.gain.value = 6;
      bp.Q.value = 0.5;
      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(0.5, t);
      gain.gain.setValueAtTime(0.35, t + 0.1);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 1.8);
      noise.connect(hp).connect(bp).connect(gain).connect(masterGain);
      noise.start(t);
      noise.stop(t + 1.8);
    },

    // RIDE - metallic shimmer
    ride() {
      const t = audioCtx.currentTime;
      // Noise shimmer
      const noise = audioCtx.createBufferSource();
      noise.buffer = getNoise();
      const bp = audioCtx.createBiquadFilter();
      bp.type = 'bandpass';
      bp.frequency.value = 7500;
      bp.Q.value = 3;
      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(0.25, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.9);
      noise.connect(bp).connect(gain).connect(masterGain);
      noise.start(t);
      noise.stop(t + 0.9);
      // Bell ping
      const osc = audioCtx.createOscillator();
      osc.type = 'square';
      osc.frequency.value = 350;
      const oGain = audioCtx.createGain();
      oGain.gain.setValueAtTime(0.06, t);
      oGain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
      osc.connect(oGain).connect(masterGain);
      osc.start(t);
      osc.stop(t + 0.4);
      // High harmonic
      const osc2 = audioCtx.createOscillator();
      osc2.type = 'sine';
      osc2.frequency.value = 850;
      const o2Gain = audioCtx.createGain();
      o2Gain.gain.setValueAtTime(0.04, t);
      o2Gain.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
      osc2.connect(o2Gain).connect(masterGain);
      osc2.start(t);
      osc2.stop(t + 0.6);
    }
  };

  const padConfig = [
    { name: 'KICK',    key: 'A', fn: drums.kick,    icon: '🔵' },
    { name: 'SNARE',   key: 'S', fn: drums.snare,   icon: '⚪' },
    { name: 'HI-HAT',  key: 'D', fn: drums.hihat,   icon: '🟡' },
    { name: 'OPEN HH', key: 'F', fn: drums.openhat, icon: '🔶' },
    { name: 'CLAP',    key: 'J', fn: drums.clap,    icon: '👏' },
    { name: 'TOM',     key: 'K', fn: drums.tom,     icon: '🟣' },
    { name: 'CRASH',   key: 'L', fn: drums.crash,   icon: '💥' },
    { name: 'RIDE',    key: ';', fn: drums.ride,     icon: '🔔' }
  ];

  // ===== Build Pads =====
  const padsEl = document.getElementById('pads');
  const padEls = [];
  padConfig.forEach((cfg, i) => {
    const pad = document.createElement('div');
    pad.className = 'pad';
    pad.dataset.pad = i;
    pad.innerHTML = `
      <div class="glow"></div>
      <div class="led"></div>
      <div class="icon">${cfg.icon}</div>
      <div class="name">${cfg.name}</div>
      <div class="key">${cfg.key}</div>
    `;
    padsEl.appendChild(pad);
    padEls.push(pad);

    // Use pointer events for unified mouse/touch
    pad.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      pad.setPointerCapture(e.pointerId);
      firePad(i);
    });
  });

  function firePad(i) {
    initAudio();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    padConfig[i].fn();
    // Visual feedback
    const pad = padEls[i];
    pad.classList.add('hit');
    clearTimeout(pad._hitT);
    pad._hitT = setTimeout(() => pad.classList.remove('hit'), 130);
    // Recording
    if (recording) {
      const t = performance.now() - recStart;
      recorded.push({ pad: i, time: t });
      updateEventCount();
    }
  }

  // ===== Keyboard =====
  const keyMap = {};
  padConfig.forEach((cfg, i) => { keyMap[cfg.key.toLowerCase()] = i; });
  const pressed = new Set();
  window.addEventListener('keydown', (e) => {
    if (e.repeat) return;
    const k = e.key.toLowerCase();
    if (k in keyMap) {
      e.preventDefault();
      pressed.add(k);
      firePad(keyMap[k]);
    }
  });
  window.addEventListener('keyup', (e) => {
    pressed.delete(e.key.toLowerCase());
  });

  // ===== Record / Playback =====
  let recording = false;
  let recStart = 0;
  let recorded = [];
  let playing = false;
  let playStart = 0;
  let playTimeouts = [];

  const recBtn = document.getElementById('recBtn');
  const playBtn = document.getElementById('playBtn');
  const clearBtn = document.getElementById('clearBtn');
  const recTimeEl = document.getElementById('recTime');
  const playTimeEl = document.getElementById('playTime');
  const eventCountEl = document.getElementById('eventCount');
  const volSlider = document.getElementById('volSlider');

  function updateEventCount() {
    eventCountEl.textContent = `${recorded.length} EVENT${recorded.length === 1 ? '' : 'S'}`;
  }

  function formatTime(t) {
    const s = Math.floor(t / 1000);
    const m = Math.floor(s / 60);
    const ss = s % 60;
    const ms = Math.floor((t % 1000) / 100);
    return `${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}.${ms}`;
  }

  let recTimer = null;
  function updateRecTime() {
    if (!recording) return;
    const t = performance.now() - recStart;
    recTimeEl.textContent = `● REC ${formatTime(t)}`;
    recTimer = requestAnimationFrame(updateRecTime);
  }

  let playTimer = null;
  function updatePlayTime() {
    if (!playing) return;
    const t = performance.now() - playStart;
    playTimeEl.textContent = `▶ ${formatTime(t)}`;
    playTimer = requestAnimationFrame(updatePlayTime);
  }

  recBtn.addEventListener('click', () => {
    initAudio();
    if (!recording) {
      recording = true;
      recorded = [];
      recStart = performance.now();
      recBtn.classList.add('active');
      recTimeEl.classList.add('active');
      playTimeEl.classList.remove('active');
      updateRecTime();
      updateEventCount();
    } else {
      recording = false;
      recBtn.classList.remove('active');
      recTimeEl.classList.remove('active');
      cancelAnimationFrame(recTimer);
    }
  });

  playBtn.addEventListener('click', () => {
    initAudio();
    if (playing) {
      playing = false;
      playBtn.classList.remove('active');
      playTimeEl.classList.remove('active');
      cancelAnimationFrame(playTimer);
      playTimeouts.forEach(clearTimeout);
      playTimeouts = [];
      return;
    }
    if (recorded.length === 0) return;
    playing = true;
    playStart = performance.now();
    playBtn.classList.add('active');
    playTimeEl.classList.add('active');
    updatePlayTime();
    playTimeouts = [];
    recorded.forEach(ev => {
      const to = setTimeout(() => {
        if (!playing) return;
        firePad(ev.pad);
      }, ev.time);
      playTimeouts.push(to);
    });
    const totalTime = recorded[recorded.length - 1].time + 200;
    const endTo = setTimeout(() => {
      playing = false;
      playBtn.classList.remove('active');
      playTimeEl.classList.remove('active');
      cancelAnimationFrame(playTimer);
    }, totalTime);
    playTimeouts.push(endTo);
  });

  clearBtn.addEventListener('click', () => {
    if (playing) {
      playing = false;
      playBtn.classList.remove('active');
      playTimeEl.classList.remove('active');
      cancelAnimationFrame(playTimer);
      playTimeouts.forEach(clearTimeout);
      playTimeouts = [];
    }
    if (recording) {
      recording = false;
      recBtn.classList.remove('active');
      recTimeEl.classList.remove('active');
      cancelAnimationFrame(recTimer);
    }
    recorded = [];
    updateEventCount();
  });

  // Volume
  volSlider.addEventListener('input', () => {
    if (masterGain) {
      masterGain.gain.value = volSlider.value / 100;
    }
  });

  // ===== Visualizer - Waveform =====
  const vizCanvas = document.getElementById('viz');
  const vizCtx = vizCanvas.getContext('2d');

  // ===== Spectrum =====
  const specCanvas = document.getElementById('spec');
  const specCtx = specCanvas.getContext('2d');

  function resizeCanvases() {
    [vizCanvas, specCanvas].forEach(c => {
      const rect = c.parentElement.getBoundingClientRect();
      c.width = rect.width * devicePixelRatio;
      c.height = rect.height * devicePixelRatio;
    });
  }
  window.addEventListener('resize', resizeCanvases);
  // Delay initial resize to ensure layout is ready
  setTimeout(resizeCanvases, 50);
  resizeCanvases();

  function drawViz() {
    requestAnimationFrame(drawViz);
    const w = vizCanvas.width;
    const h = vizCanvas.height;
    vizCtx.clearRect(0, 0, w, h);

    if (!analyser) {
      vizCtx.strokeStyle = 'rgba(255, 56, 96, 0.2)';
      vizCtx.lineWidth = 1.5 * devicePixelRatio;
      vizCtx.beginPath();
      vizCtx.moveTo(0, h/2);
      vizCtx.lineTo(w, h/2);
      vizCtx.stroke();
      return;
    }

    const bufLen = analyser.fftSize;
    const data = new Uint8Array(bufLen);
    analyser.getByteTimeDomainData(data);

    // Gradient stroke
    const grad = vizCtx.createLinearGradient(0, 0, w, 0);
    grad.addColorStop(0, '#ff3860');
    grad.addColorStop(0.35, '#ffcc00');
    grad.addColorStop(0.65, '#00e5a0');
    grad.addColorStop(1, '#4a90ff');
    vizCtx.strokeStyle = grad;
    vizCtx.lineWidth = 2 * devicePixelRatio;
    vizCtx.lineJoin = 'round';
    vizCtx.beginPath();

    const slice = w / bufLen;
    let x = 0;
    for (let i = 0; i < bufLen; i++) {
      const v = data[i] / 128.0;
      const y = (v * h) / 2;
      if (i === 0) vizCtx.moveTo(x, y);
      else vizCtx.lineTo(x, y);
      x += slice;
    }
    vizCtx.stroke();

    // Glow pass
    vizCtx.save();
    vizCtx.globalAlpha = 0.3;
    vizCtx.shadowColor = '#ff3860';
    vizCtx.shadowBlur = 12 * devicePixelRatio;
    vizCtx.stroke();
    vizCtx.restore();
  }

  function drawSpectrum() {
    requestAnimationFrame(drawSpectrum);
    const w = specCanvas.width;
    const h = specCanvas.height;
    specCtx.clearRect(0, 0, w, h);

    if (!analyser) return;

    const bufLen = analyser.frequencyBinCount;
    const data = new Uint8Array(bufLen);
    analyser.getByteFrequencyData(data);

    // Only show lower-mid frequencies (first quarter)
    const bars = 24;
    const barW = w / bars;
    const step = Math.floor(bufLen / 4 / bars);

    for (let i = 0; i < bars; i++) {
      let sum = 0;
      for (let j = 0; j < step; j++) {
        sum += data[i * step + j];
      }
      const avg = sum / step;
      const barH = (avg / 255) * h * 0.9;

      const hue = (i / bars) * 120; // green to red
      const color = `hsl(${360 - hue}, 80%, 55%)`;
      specCtx.fillStyle = color;
      specCtx.globalAlpha = 0.8;
      specCtx.fillRect(
        i * barW + 1,
        h - barH,
        barW - 2,
        barH
      );
    }
    specCtx.globalAlpha = 1;
  }

  drawViz();
  drawSpectrum();

  // Prevent context menu on long press
  window.addEventListener('contextmenu', (e) => e.preventDefault());

  updateEventCount();
})();
</script>
</body>
</html>
