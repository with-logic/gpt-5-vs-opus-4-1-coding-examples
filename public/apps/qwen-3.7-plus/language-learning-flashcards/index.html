<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Language Learning Flashcards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --primary: #6366f1;
    --primary-light: #818cf8;
    --primary-dark: #4f46e5;
    --bg: #0f0f1a;
    --bg-card: #1a1a2e;
    --bg-surface: #16162a;
    --text: #e2e8f0;
    --text-muted: #94a3b8;
    --success: #10b981;
    --success-light: #34d399;
    --accent: #f59e0b;
    --radius: 16px;
    --shadow: 0 20px 60px rgba(0,0,0,0.4);
  }

  body {
    font-family: 'Inter', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 20% 50%, rgba(99,102,241,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(245,158,11,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(16,185,129,0.06) 0%, transparent 50%);
    animation: bgFloat 20s ease-in-out infinite;
    z-index: 0;
    pointer-events: none;
  }

  @keyframes bgFloat {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    33% { transform: translate(2%, -2%) rotate(1deg); }
    66% { transform: translate(-1%, 1%) rotate(-1deg); }
  }

  .app { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; }

  .header {
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    backdrop-filter: blur(20px);
    background: rgba(15,15,26,0.7);
    border-bottom: 1px solid rgba(255,255,255,0.05);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 700;
    font-size: 1.2rem;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .header-logo:hover { opacity: 0.8; }
  .header-logo .icon { font-size: 1.5rem; }

  .header-actions { display: flex; gap: 8px; }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    border: none;
    border-radius: 12px;
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    outline: none;
    position: relative;
    overflow: hidden;
  }
  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0);
    transition: background 0.25s;
  }
  .btn:hover::after { background: rgba(255,255,255,0.1); }
  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: white;
    box-shadow: 0 4px 15px rgba(99,102,241,0.3);
  }
  .btn-primary:hover { box-shadow: 0 6px 25px rgba(99,102,241,0.45); transform: translateY(-1px); }

  .btn-ghost {
    background: rgba(255,255,255,0.05);
    color: var(--text);
    border: 1px solid rgba(255,255,255,0.1);
  }
  .btn-ghost:hover { background: rgba(255,255,255,0.1); }

  .btn-success {
    background: linear-gradient(135deg, var(--success), #059669);
    color: white;
    box-shadow: 0 4px 15px rgba(16,185,129,0.3);
  }
  .btn-success:hover { box-shadow: 0 6px 25px rgba(16,185,129,0.45); transform: translateY(-1px); }

  .btn-icon {
    width: 44px;
    height: 44px;
    padding: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 12px;
    font-size: 1.2rem;
  }

  .btn-sm { padding: 8px 14px; font-size: 0.82rem; border-radius: 10px; }

  .screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px;
    animation: fadeIn 0.5s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .select-screen { justify-content: center; gap: 40px; }

  .select-title {
    text-align: center;
  }
  .select-title h1 {
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 800;
    background: linear-gradient(135deg, #818cf8, #f59e0b, #34d399);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 12px;
    line-height: 1.2;
  }
  .select-title p {
    color: var(--text-muted);
    font-size: 1.1rem;
    max-width: 500px;
  }

  .lang-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px;
    max-width: 960px;
    width: 100%;
  }

  .lang-card {
    background: var(--bg-card);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: var(--radius);
    padding: 28px 24px;
    cursor: pointer;
    transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    position: relative;
    overflow: hidden;
  }
  .lang-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--card-accent, var(--primary)), transparent);
    opacity: 0;
    transition: opacity 0.35s;
  }
  .lang-card:hover {
    transform: translateY(-6px);
    border-color: rgba(255,255,255,0.15);
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
  }
  .lang-card:hover::before { opacity: 0.08; }
  .lang-card .flag {
    font-size: 3rem;
    position: relative;
    z-index: 1;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
    transition: transform 0.35s;
  }
  .lang-card:hover .flag { transform: scale(1.15); }
  .lang-card .lang-name {
    font-weight: 700;
    font-size: 1.15rem;
    position: relative;
    z-index: 1;
  }
  .lang-card .lang-native {
    color: var(--text-muted);
    font-size: 0.9rem;
    position: relative;
    z-index: 1;
  }
  .lang-card .phrase-count {
    font-size: 0.78rem;
    color: var(--text-muted);
    background: rgba(255,255,255,0.05);
    padding: 4px 12px;
    border-radius: 20px;
    position: relative;
    z-index: 1;
  }

  .card-screen { gap: 24px; padding-top: 16px; }

  .progress-section {
    width: 100%;
    max-width: 600px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 0.85rem;
    color: var(--text-muted);
  }
  .progress-bar {
    width: 100%;
    height: 6px;
    background: rgba(255,255,255,0.08);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--success), var(--success-light));
    border-radius: 3px;
    transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
  }
  .progress-fill::after {
    content: '';
    position: absolute;
    right: 0;
    top: 0;
    width: 20px;
    height: 100%;
    background: rgba(255,255,255,0.3);
    border-radius: 3px;
    animation: progressShine 1.5s ease-in-out infinite;
  }
  @keyframes progressShine {
    0%, 100% { opacity: 0; }
    50% { opacity: 1; }
  }

  .card-area {
    perspective: 1200px;
    width: 100%;
    max-width: 520px;
    height: 340px;
    position: relative;
  }

  .flashcard {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
  }
  .flashcard.flipped { transform: rotateY(180deg); }

  .flashcard.shuffling-out {
    animation: shuffleOut 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }
  .flashcard.shuffling-in {
    animation: shuffleIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }

  @keyframes shuffleOut {
    0% { transform: scale(1) rotate(0deg); opacity: 1; }
    100% { transform: scale(0.6) rotate(15deg) translateY(-40px); opacity: 0; }
  }
  @keyframes shuffleIn {
    0% { transform: scale(0.6) rotate(-15deg) translateY(40px); opacity: 0; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px;
    text-align: center;
    gap: 16px;
    overflow: hidden;
  }

  .card-front {
    background: linear-gradient(145deg, #1e1e38, #252545);
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.05);
  }

  .card-back {
    background: linear-gradient(145deg, #1a2740, #1e3350);
    border: 1px solid rgba(99,102,241,0.2);
    box-shadow: var(--shadow), inset 0 1px 0 rgba(99,102,241,0.1);
    transform: rotateY(180deg);
  }

  .card-lang-label {
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .card-phrase {
    font-size: clamp(1.4rem, 4vw, 2rem);
    font-weight: 700;
    line-height: 1.4;
  }

  .card-phonetic {
    font-size: 0.95rem;
    color: var(--primary-light);
    font-style: italic;
    font-weight: 400;
  }

  .card-hint {
    font-size: 0.8rem;
    color: var(--text-muted);
    position: absolute;
    bottom: 20px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .card-number {
    position: absolute;
    top: 20px;
    right: 24px;
    font-size: 0.8rem;
    color: var(--text-muted);
    font-weight: 500;
  }

  .learned-badge {
    position: absolute;
    top: 16px;
    left: 16px;
    background: var(--success);
    color: white;
    font-size: 0.7rem;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
    display: flex;
    align-items: center;
    gap: 4px;
    animation: badgePop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  @keyframes badgePop {
    0% { transform: scale(0); }
    100% { transform: scale(1); }
  }

  .card-nav {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .nav-btn {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    color: var(--text);
    font-size: 1.3rem;
    cursor: pointer;
    transition: all 0.25s;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(10px);
  }
  .nav-btn:hover {
    background: rgba(255,255,255,0.12);
    border-color: rgba(255,255,255,0.2);
    transform: scale(1.08);
  }
  .nav-btn:active { transform: scale(0.95); }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

  .card-counter {
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text-muted);
    min-width: 60px;
    text-align: center;
  }

  .action-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .complete-screen {
    justify-content: center;
    gap: 24px;
    text-align: center;
  }
  .complete-emoji { font-size: 5rem; animation: celebBounce 0.8s ease; }
  @keyframes celebBounce {
    0% { transform: scale(0); }
    50% { transform: scale(1.3); }
    70% { transform: scale(0.9); }
    100% { transform: scale(1); }
  }
  .complete-title {
    font-size: 2rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--success), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .complete-subtitle { color: var(--text-muted); font-size: 1.1rem; max-width: 400px; }
  .complete-stats {
    display: flex;
    gap: 24px;
    margin: 16px 0;
  }
  .stat-box {
    background: var(--bg-card);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: var(--radius);
    padding: 20px 28px;
    text-align: center;
  }
  .stat-number { font-size: 2rem; font-weight: 800; color: var(--success); }
  .stat-label { font-size: 0.82rem; color: var(--text-muted); margin-top: 4px; }

  .particle-container {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1000;
    overflow: hidden;
  }
  .particle {
    position: absolute;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    animation: particleFly 1s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
  }
  @keyframes particleFly {
    0% { transform: translate(0, 0) scale(1); opacity: 1; }
    100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
  }

  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--bg-card);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text);
    padding: 12px 24px;
    border-radius: 14px;
    font-size: 0.9rem;
    font-weight: 500;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 200;
    display: flex;
    align-items: center;
    gap: 8px;
    backdrop-filter: blur(20px);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 640px) {
    .lang-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .lang-card { padding: 20px 16px; }
    .lang-card .flag { font-size: 2.4rem; }
    .card-area { height: 300px; }
    .header { padding: 14px 16px; }
    .screen { padding: 16px; }
    .complete-stats { flex-direction: column; gap: 12px; }
    .action-row { gap: 8px; }
    .btn { padding: 8px 16px; font-size: 0.82rem; }
  }

  .keyboard-hints {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 8px;
  }
  .kbd-hint {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.75rem;
    color: var(--text-muted);
  }
  kbd {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 6px;
    padding: 2px 8px;
    font-family: inherit;
    font-size: 0.72rem;
    font-weight: 600;
  }

  .filter-tabs {
    display: flex;
    gap: 4px;
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    padding: 4px;
  }
  .filter-tab {
    padding: 6px 16px;
    border-radius: 8px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    font-family: inherit;
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.25s;
  }
  .filter-tab.active {
    background: rgba(255,255,255,0.1);
    color: var(--text);
  }
  .filter-tab:hover:not(.active) { color: var(--text); }

  .slide-left { animation: slideLeft 0.35s cubic-bezier(0.4, 0, 0.2, 1); }
  .slide-right { animation: slideRight 0.35s cubic-bezier(0.4, 0, 0.2, 1); }

  @keyframes slideLeft {
    0% { transform: translateX(60px); opacity: 0; }
    100% { transform: translateX(0); opacity: 1; }
  }
  @keyframes slideRight {
    0% { transform: translateX(-60px); opacity: 0; }
    100% { transform: translateX(0); opacity: 1; }
  }

  .hidden { display: none !important; }

  .mark-learned-anim {
    animation: markPulse 0.5s ease;
  }
  @keyframes markPulse {
    0% { box-shadow: 0 0 0 0 rgba(16,185,129,0.4); }
    50% { box-shadow: 0 0 0 20px rgba(16,185,129,0); }
    100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); }
  }

  .unmark-anim {
    animation: unmarkShake 0.4s ease;
  }
  @keyframes unmarkShake {
    0%, 100% { transform: rotateY(180deg); }
    25% { transform: rotateY(180deg) rotate(3deg); }
    75% { transform: rotateY(180deg) rotate(-3deg); }
  }
</style>
</head>
<body>

<div class="app" id="app">
  <header class="header">
    <div class="header-logo" onclick="goHome()">
      <span class="icon">🌍</span>
      <span data-i18n="appTitle">LinguaCards</span>
    </div>
    <div class="header-actions" id="headerActions"></div>
  </header>

  <div class="screen select-screen" id="selectScreen">
    <div class="select-title">
      <h1 data-i18n="selectTitle">Choose a Language to Learn</h1>
      <p data-i18n="selectSubtitle">Master essential travel phrases with interactive flashcards</p>
    </div>
    <div class="lang-grid" id="langGrid"></div>
  </div>

  <div class="screen card-screen hidden" id="cardScreen">
    <div class="progress-section">
      <div class="progress-info">
        <span id="progressLabel" data-i18n="progressLabel">Progress</span>
        <span id="progressCount">0 / 10</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
      </div>
    </div>

    <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;justify-content:center;">
      <div class="filter-tabs" id="filterTabs">
        <button class="filter-tab active" data-filter="all" data-i18n="filterAll">All</button>
        <button class="filter-tab" data-filter="remaining" data-i18n="filterRemaining">Remaining</button>
        <button class="filter-tab" data-filter="learned" data-i18n="filterLearned">Learned</button>
      </div>
    </div>

    <div class="card-area" id="cardArea">
      <div class="flashcard" id="flashcard" onclick="flipCard()">
        <div class="card-face card-front" id="cardFront">
          <div class="card-lang-label" id="frontLangLabel"></div>
          <div class="card-phrase" id="frontPhrase"></div>
          <div class="card-hint">
            <span>👆</span>
            <span data-i18n="tapToFlip">Tap to reveal</span>
          </div>
          <div class="card-number" id="cardNumber"></div>
        </div>
        <div class="card-face card-back" id="cardBack">
          <div class="card-lang-label" id="backLangLabel"></div>
          <div class="card-phrase" id="backPhrase"></div>
          <div class="card-phonetic" id="backPhonetic"></div>
          <div class="card-hint">
            <span>👆</span>
            <span data-i18n="tapToFlipBack">Tap to flip back</span>
          </div>
          <div class="card-number" id="cardNumberBack"></div>
        </div>
      </div>
    </div>

    <div class="card-nav">
      <button class="nav-btn" id="prevBtn" onclick="prevCard()" title="Previous">◀</button>
      <span class="card-counter" id="cardCounter">1 / 10</span>
      <button class="nav-btn" id="nextBtn" onclick="nextCard()" title="Next">▶</button>
    </div>

    <div class="action-row">
      <button class="btn btn-ghost" onclick="shuffleCards()">
        <span>🔀</span>
        <span data-i18n="shuffle">Shuffle</span>
      </button>
      <button class="btn btn-success" id="learnedBtn" onclick="toggleLearned()">
        <span id="learnedIcon">✓</span>
        <span id="learnedText" data-i18n="markLearned">Mark as Learned</span>
      </button>
      <button class="btn btn-ghost" onclick="resetProgress()">
        <span>↺</span>
        <span data-i18n="reset">Reset</span>
      </button>
    </div>

    <div class="keyboard-hints" id="keyboardHints">
      <span class="kbd-hint"><kbd>←</kbd><kbd>→</kbd> <span data-i18n="navHint">Navigate</span></span>
      <span class="kbd-hint"><kbd>Space</kbd> <span data-i18n="flipHint">Flip</span></span>
      <span class="kbd-hint"><kbd>L</kbd> <span data-i18n="learnHint">Learned</span></span>
    </div>
  </div>

  <div class="screen complete-screen hidden" id="completeScreen">
    <div class="complete-emoji">🎉</div>
    <div class="complete-title" data-i18n="completeTitle">Congratulations!</div>
    <div class="complete-subtitle" data-i18n="completeSubtitle">You've learned all the travel phrases!</div>
    <div class="complete-stats">
      <div class="stat-box">
        <div class="stat-number" id="statCards">10</div>
        <div class="stat-label" data-i18n="statCards">Cards Learned</div>
      </div>
      <div class="stat-box">
        <div class="stat-number" id="statLang">🇪🇸</div>
        <div class="stat-label" data-i18n="statLang">Language</div>

let state = {
  uiLang: 'en',
  targetLang: null,
  cards: [],
  currentIndex: 0,
  learned: new Set(),
  isFlipped: false,
  filter: 'all',
  isAnimating: false
};

function detectLocale() {
  const lang = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
  if (lang.startsWith('es')) return 'es';
  if (lang.startsWith('fr')) return 'fr';
  if (lang.startsWith('ja')) return 'ja';
  return 'en';
}

function init() {
  state.uiLang = detectLocale();
  applyTranslations();
  renderLangGrid();
}

function t(key) {
  return (ui[state.uiLang] && ui[state.uiLang][key]) || ui.en[key] || key;
}

function applyTranslations() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    el.textContent = t(key);
  });
  document.documentElement.lang = state.uiLang;
}

function renderLangGrid() {
  const grid = document.getElementById('langGrid');
  const allLangs = ['es', 'fr', 'ja', 'en'];

  grid.innerHTML = allLangs.map(code => {
    const meta = langMeta[code];
    return '<div class="lang-card" onclick="selectLanguage(\'' + code + '\')" style="--card-accent: ' + meta.color + '">' +
      '<div class="flag">' + meta.flag + '</div>' +
      '<div class="lang-name">' + meta.name + '</div>' +
      '<div class="lang-native">' + meta.native + '</div>' +
      '<div class="phrase-count">10 ' + t('phrasesLabel') + '</div>' +
    '</div>';
  }).join('');
}

function selectLanguage(lang) {
  state.targetLang = lang;
  state.cards = phrases.map(function(_, i) { return i; });
  state.currentIndex = 0;
  state.learned = new Set();
  state.isFlipped = false;
  state.filter = 'all';
  showCardScreen();
}

function showCardScreen() {
  document.getElementById('selectScreen').classList.add('hidden');
  document.getElementById('completeScreen').classList.add('hidden');
  var cs = document.getElementById('cardScreen');
  cs.classList.remove('hidden');
  cs.style.display = '';

  document.getElementById('headerActions').innerHTML =
    '<button class="btn btn-ghost btn-sm" onclick="goHome()">' +
      '<span>🌍</span>' +
      '<span>' + langMeta[state.targetLang].flag + ' ' + langMeta[state.targetLang].name + '</span>' +
    '</button>';

  document.querySelectorAll('.filter-tab').forEach(function(tab) {
    tab.classList.toggle('active', tab.dataset.filter === 'all');
  });

  renderCard();
  updateProgress();
}

function goHome() {
  document.getElementById('cardScreen').classList.add('hidden');
  document.getElementById('completeScreen').classList.add('hidden');
  document.getElementById('selectScreen').classList.remove('hidden');
  document.getElementById('headerActions').innerHTML = '';
  state.targetLang = null;
}

function getFilteredCards() {
  if (state.filter === 'learned') return state.cards.filter(function(i) { return state.learned.has(i); });
  if (state.filter === 'remaining') return state.cards.filter(function(i) { return !state.learned.has(i); });
  return state.cards.slice();
}

function renderCard(direction) {
  var filtered = getFilteredCards();

  if (filtered.length === 0) {
    document.getElementById('frontPhrase').textContent = t('noCards');
    document.getElementById('backPhrase').textContent = '';
    document.getElementById('frontLangLabel').innerHTML = '';
    document.getElementById('backLangLabel').innerHTML = '';
    document.getElementById('backPhonetic').textContent = '';
    document.getElementById('cardNumber').textContent = '';
    document.getElementById('cardNumberBack').textContent = '';
    document.getElementById('cardCounter').textContent = '0 / 0';
    document.getElementById('prevBtn').disabled = true;
    document.getElementById('nextBtn').disabled = true;
    updateLearnedBtn();
    return;
  }

  if (state.currentIndex >= filtered.length) state.currentIndex = filtered.length - 1;
  if (state.currentIndex < 0) state.currentIndex = 0;

  var phraseIdx = filtered[state.currentIndex];
  var phrase = phrases[phraseIdx];
  var srcLang = state.uiLang;
  var tgtLang = state.targetLang;

  document.getElementById('frontLangLabel').innerHTML = langMeta[srcLang].flag + ' ' + langMeta[srcLang].name;
  document.getElementById('frontPhrase').textContent = phrase[srcLang];

  document.getElementById('backLangLabel').innerHTML = langMeta[tgtLang].flag + ' ' + langMeta[tgtLang].name;
  document.getElementById('backPhrase').textContent = phrase[tgtLang];

  var phon = phrase.phonetic && phrase.phonetic[tgtLang];
  document.getElementById('backPhonetic').textContent = phon || '';

  var total = filtered.length;
  var num = (state.currentIndex + 1) + ' / ' + total;
  document.getElementById('cardNumber').textContent = num;
  document.getElementById('cardNumberBack').textContent = num;
  document.getElementById('cardCounter').textContent = num;

  var existingBadge = document.querySelector('.learned-badge');
  if (existingBadge) existingBadge.remove();
  if (state.learned.has(phraseIdx)) {
    var badge = document.createElement('div');
    badge.className = 'learned-badge';
    badge.innerHTML = '✓ ' + t('filterLearned');
    document.getElementById('cardFront').appendChild(badge);
  }

  document.getElementById('prevBtn').disabled = state.currentIndex === 0;
  document.getElementById('nextBtn').disabled = state.currentIndex === filtered.length - 1;

  if (state.isFlipped) {
    state.isFlipped = false;
    document.getElementById('flashcard').classList.remove('flipped');
  }

  var flashcard = document.getElementById('flashcard');
  if (direction) {
    flashcard.classList.remove('slide-left', 'slide-right');
    void flashcard.offsetWidth;
    flashcard.classList.add(direction === 'left' ? 'slide-left' : 'slide-right');
  }

  updateLearnedBtn();
}

function flipCard() {
  state.isFlipped = !state.isFlipped;
  document.getElementById('flashcard').classList.toggle('flipped', state.isFlipped);
}

function nextCard() {
  var filtered = getFilteredCards();
  if (state.currentIndex < filtered.length - 1) {
    state.currentIndex++;
    renderCard('left');
  }
}

function prevCard() {
  if (state.currentIndex > 0) {
    state.currentIndex--;
    renderCard('right');
  }
}

function shuffleCards() {
  if (state.isAnimating) return;
  state.isAnimating = true;

  var flashcard = document.getElementById('flashcard');
  flashcard.classList.add('shuffling-out');

  setTimeout(function() {
    for (var i = state.cards.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = state.cards[i];
      state.cards[i] = state.cards[j];
      state.cards[j] = tmp;
    }
    state.currentIndex = 0;
    state.isFlipped = false;

    flashcard.classList.remove('shuffling-out');
    flashcard.classList.add('shuffling-in');
    renderCard();

    setTimeout(function() {
      flashcard.classList.remove('shuffling-in');
      state.isAnimating = false;
    }, 500);

    showToast(t('shuffledToast'));
  }, 400);
}

function toggleLearned() {
  var filtered = getFilteredCards();
  if (filtered.length === 0) return;

  var phraseIdx = filtered[state.currentIndex];

  if (state.learned.has(phraseIdx)) {
    state.learned.delete(phraseIdx);
    showToast(t('unlearnedToast'));
    var flashcard = document.getElementById('flashcard');
    flashcard.classList.add('unmark-anim');
    setTimeout(function() { flashcard.classList.remove('unmark-anim'); }, 400);
  } else {
    state.learned.add(phraseIdx);
    showToast(t('learnedToast'));
    spawnParticles();
    var cardArea = document.getElementById('cardArea');
    cardArea.classList.add('mark-learned-anim');
    setTimeout(function() { cardArea.classList.remove('mark-learned-anim'); }, 500);
  }

  updateProgress();

  if (state.learned.size === phrases.length) {
    setTimeout(showComplete, 600);
    renderCard();
    return;
  }

  var newFiltered = getFilteredCards();
  if (newFiltered.length === 0) {
    renderCard();
  } else if (state.currentIndex >= newFiltered.length) {
    state.currentIndex = newFiltered.length - 1;
    renderCard();
  } else {
    renderCard();
  }
}

function updateLearnedBtn() {
  var filtered = getFilteredCards();
  if (filtered.length === 0) return;

  var phraseIdx = filtered[state.currentIndex];
  var isLearned = state.learned.has(phraseIdx);
  var btn = document.getElementById('learnedBtn');
  var icon = document.getElementById('learnedIcon');
  var text = document.getElementById('learnedText');

  if (isLearned) {
    btn.className = 'btn btn-ghost';
    icon.textContent = '↩';
    text.textContent = t('unmarkLearned');
    text.setAttribute('data-i18n', 'unmarkLearned');
  } else {
    btn.className = 'btn btn-success';
    icon.textContent = '✓';
    text.textContent = t('markLearned');
    text.setAttribute('data-i18n', 'markLearned');
  }
}

function updateProgress() {
  var total = phrases.length;
  var learned = state.learned.size;
  var pct = (learned / total) * 100;

  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressCount').textContent = learned + ' / ' + total;
}

document.getElementById('filterTabs').addEventListener('click', function(e) {
  var tab = e.target.closest('.filter-tab');
  if (!tab) return;

  document.querySelectorAll('.filter-tab').forEach(function(t) { t.classList.remove('active'); });
  tab.classList.add('active');
  state.filter = tab.dataset.filter;
  state.currentIndex = 0;
  renderCard();
});

function resetProgress() {
  state.learned = new Set();
  state.currentIndex = 0;
  state.isFlipped = false;
  state.cards = phrases.map(function(_, i) { return i; });
  updateProgress();
  renderCard();
  showToast(t('resetToast'));
}

function showComplete() {
  document.getElementById('cardScreen').classList.add('hidden');
  var cs = document.getElementById('completeScreen');
  cs.classList.remove('hidden');
  cs.style.display = '';

  document.getElementById('statCards').textContent = state.learned.size;
  document.getElementById('statLang').textContent = langMeta[state.targetLang].flag;

  for (var i = 0; i < 5; i++) {
    setTimeout(function() { spawnParticles(true); }, i * 200);
  }
}

function spawnParticles(big) {
  var container = document.getElementById('particles');
  var colors = ['#6366f1', '#f59e0b', '#10b981', '#ef4444', '#818cf8', '#34d399', '#fbbf24'];
  var count = big ? 30 : 15;

  var cardArea = document.getElementById('cardArea');
  var rect = cardArea.getBoundingClientRect();
  var cx = rect.left + rect.width / 2;
  var cy = rect.top + rect.height / 2;

  for (var i = 0; i < count; i++) {
    var p = document.createElement('div');
    p.className = 'particle';
    var angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.5;
    var dist = (big ? 200 : 120) + Math.random() * (big ? 200 : 100);
    var tx = Math.cos(angle) * dist;
    var ty = Math.sin(angle) * dist - 50;
    p.style.cssText =
      'left:' + cx + 'px;' +
      'top:' + cy + 'px;' +
      '--tx:' + tx + 'px;' +
      '--ty:' + ty + 'px;' +
      'background:' + colors[Math.floor(Math.random() * colors.length)] + ';' +
      'width:' + (4 + Math.random() * 6) + 'px;' +
      'height:' + (4 + Math.random() * 6) + 'px;' +
      'animation-duration:' + (0.6 + Math.random() * 0.6) + 's;';
    container.appendChild(p);
    setTimeout(function(el) { el.remove(); }.bind(null, p), 1200);
  }
}

var toastTimeout;
function showToast(msg) {
  var toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(function() { toast.classList.remove('show'); }, 2500);
}

document.addEventListener('keydown', function(e) {
  if (!state.targetLang) return;
  if (document.getElementById('cardScreen').classList.contains('hidden')) return;

  switch (e.key) {
    case 'ArrowRight':
      e.preventDefault();
      nextCard();
      break;
    case 'ArrowLeft':
      e.preventDefault();
      prevCard();
      break;
    case ' ':
      e.preventDefault();
      flipCard();
      break;
    case 'l':
    case 'L':
      e.preventDefault();
      toggleLearned();
      break;
  }
});

var touchStartX = 0;
var touchStartY = 0;
document.getElementById('cardArea').addEventListener('touchstart', function(e) {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

document.getElementById('cardArea').addEventListener('touchend', function(e) {
  var dx = e.changedTouches[0].clientX - touchStartX;
  var dy = e.changedTouches[0].clientY - touchStartY;

  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
    if (dx > 0) prevCard();
    else nextCard();
  }
}, { passive: true });

init();
</script>
