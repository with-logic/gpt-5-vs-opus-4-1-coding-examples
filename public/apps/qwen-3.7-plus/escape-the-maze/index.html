<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escape the Maze</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0e1a;
    --surface: #131829;
    --surface2: #1a2035;
    --border: #2a3050;
    --text: #e2e8f0;
    --text-dim: #8892b0;
    --accent: #6366f1;
    --accent-glow: #818cf8;
    --success: #10b981;
    --warning: #f59e0b;
    --danger: #ef4444;
    --gold: #fbbf24;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(16, 185, 129, 0.06) 0%, transparent 50%);
  }

  .header {
    text-align: center;
    padding: 30px 20px 10px;
  }

  .header h1 {
    font-size: 2.4rem;
    font-weight: 900;
    background: linear-gradient(135deg, #6366f1, #a78bfa, #6366f1);
    background-size: 200% 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 3s ease-in-out infinite;
    letter-spacing: -0.02em;
  }

  .header p {
    color: var(--text-dim);
    font-size: 0.95rem;
    margin-top: 6px;
    font-weight: 400;
  }

  @keyframes shimmer {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  .game-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    padding: 10px 20px 40px;
    width: 100%;
    max-width: 800px;
  }

  .controls-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
    width: 100%;
  }

  .difficulty-selector {
    display: flex;
    background: var(--surface);
    border-radius: 12px;
    padding: 4px;
    border: 1px solid var(--border);
  }

  .diff-btn {
    padding: 8px 18px;
    border: none;
    background: transparent;
    color: var(--text-dim);
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    border-radius: 9px;
    cursor: pointer;
    transition: all 0.25s ease;
  }

  .diff-btn:hover { color: var(--text); }

  .diff-btn.active {
    background: var(--accent);
    color: white;
    box-shadow: 0 2px 12px rgba(99, 102, 241, 0.4);
  }

  .stats-bar {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
    width: 100%;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 20px;
    min-width: 120px;
    text-align: center;
    transition: all 0.3s ease;
  }

  .stat-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 4px 20px rgba(99, 102, 241, 0.15);
  }

  .stat-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    font-weight: 600;
    margin-bottom: 4px;
  }

  .stat-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.4rem;
    font-weight: 600;
    color: var(--text);
  }

  .stat-value.time { color: var(--accent-glow); }
  .stat-value.moves { color: var(--warning); }
  .stat-value.path { color: var(--success); }

  .canvas-wrapper {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    box-shadow:
      0 0 0 1px var(--border),
      0 8px 40px rgba(0, 0, 0, 0.4),
      0 0 80px rgba(99, 102, 241, 0.08);
  }

  canvas {
    display: block;
    background: var(--surface);
  }

  .btn {
    padding: 12px 28px;
    border: none;
    border-radius: 12px;
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s ease;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }

  .btn-primary {
    background: linear-gradient(135deg, #6366f1, #7c3aed);
    color: white;
    box-shadow: 0 4px 15px rgba(99, 102, 241, 0.35);
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 25px rgba(99, 102, 241, 0.5);
  }

  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover {
    background: var(--border);
    transform: translateY(-2px);
  }

  .action-buttons {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(10, 14, 26, 0.92);
    backdrop-filter: blur(8px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    border-radius: 16px;
    z-index: 10;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }

  .overlay.visible {
    opacity: 1;
    pointer-events: all;
  }

  .overlay h2 {
    font-size: 2rem;
    font-weight: 800;
    background: linear-gradient(135deg, #fbbf24, #f59e0b);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .overlay .score-display {
    font-family: 'JetBrains Mono', monospace;
    font-size: 3rem;
    font-weight: 700;
    color: var(--gold);
    text-shadow: 0 0 30px rgba(251, 191, 36, 0.4);
  }

  .overlay .score-detail {
    color: var(--text-dim);
    font-size: 0.9rem;
    text-align: center;
    line-height: 1.8;
  }

  .overlay .score-detail span {
    color: var(--text);
    font-weight: 600;
  }

  .mobile-controls {
    display: none;
    gap: 6px;
    justify-content: center;
    margin-top: 8px;
  }

  .mobile-btn {
    width: 56px;
    height: 56px;
    border-radius: 14px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 1.4rem;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.15s ease;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  .mobile-btn:active {
    background: var(--accent);
    transform: scale(0.92);
  }

  .mobile-grid {
    display: grid;
    grid-template-areas:
      ". up ."
      "left down right";
    gap: 6px;
  }

  .mobile-grid .up { grid-area: up; }
  .mobile-grid .down { grid-area: down; }
  .mobile-grid .left { grid-area: left; }
  .mobile-grid .right { grid-area: right; }

  .hint-text {
    color: var(--text-dim);
    font-size: 0.8rem;
    text-align: center;
  }

  .hint-text kbd {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 2px 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
  }

  @media (max-width: 600px) {
    .header h1 { font-size: 1.8rem; }
    .stat-card { min-width: 90px; padding: 10px 14px; }
    .stat-value { font-size: 1.1rem; }
    .mobile-controls { display: flex; }
    .hint-text { display: none; }
  }

  .confetti-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 100;
    overflow: hidden;
  }

  .confetti {
    position: absolute;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    animation: confetti-fall linear forwards;
  }

  @keyframes confetti-fall {
    0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  .pulse-ring {
    animation: pulse-ring 1.5s ease-out infinite;
  }

  @keyframes pulse-ring {
    0% { opacity: 0.6; transform: scale(1); }
    100% { opacity: 0; transform: scale(2.5); }
  }
</style>
</head>
<body>

<div class="header">
  <h1>🏰 Escape the Maze</h1>
  <p>Navigate from the <span style="color: #10b981;">green start</span> to the <span style="color: #ef4444;">red exit</span> — find the shortest path for bonus points!</p>
</div>

<div class="game-container">
  <div class="controls-bar">
    <div class="difficulty-selector">
      <button class="diff-btn active" data-size="8" onclick="setDifficulty(this)">Easy</button>
      <button class="diff-btn" data-size="12" onclick="setDifficulty(this)">Medium</button>
      <button class="diff-btn" data-size="18" onclick="setDifficulty(this)">Hard</button>
      <button class="diff-btn" data-size="25" onclick="setDifficulty(this)">Expert</button>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-label">⏱ Time</div>
      <div class="stat-value time" id="timer">0:00</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">👣 Moves</div>
      <div class="stat-value moves" id="moves">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">🎯 Shortest</div>
      <div class="stat-value path" id="shortest">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">⭐ Score</div>
      <div class="stat-value" id="score" style="color: var(--gold);">—</div>
    </div>
  </div>

  <div class="canvas-wrapper">
    <canvas id="mazeCanvas"></canvas>
    <div class="overlay" id="winOverlay">
      <h2>🎉 Maze Escaped!</h2>
      <div class="score-display" id="finalScore">0</div>
      <div class="score-detail" id="scoreBreakdown"></div>
      <div style="display:flex; gap:12px; margin-top: 8px;">
        <button class="btn btn-primary" onclick="newGame()">🔄 Play Again</button>
      </div>
    </div>
  </div>

  <div class="action-buttons">
    <button class="btn btn-primary" onclick="newGame()">🔄 New Maze</button>
    <button class="btn btn-secondary" onclick="toggleSolution()">👁 Show Path</button>
  </div>

  <div class="mobile-controls">
    <div class="mobile-grid">
      <button class="mobile-btn up" ontouchstart="movePlayer(0,-1);event.preventDefault();" onclick="movePlayer(0,-1)">▲</button>
      <button class="mobile-btn left" ontouchstart="movePlayer(-1,0);event.preventDefault();" onclick="movePlayer(-1,0)">◀</button>
      <button class="mobile-btn down" ontouchstart="movePlayer(0,1);event.preventDefault();" onclick="movePlayer(0,1)">▼</button>
      <button class="mobile-btn right" ontouchstart="movePlayer(1,0);event.preventDefault();" onclick="movePlayer(1,0)">▶</button>
    </div>
  </div>

  <p class="hint-text">Use <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> or <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> to move</p>
</div>

<div class="confetti-container" id="confettiContainer"></div>

<script>
// ─── Configuration ──────────────────────────────────────────
const WALL_COLOR = '#2a3050';
const FLOOR_COLOR = '#131829';
const START_COLOR = 'rgba(16, 185, 129, 0.25)';
const END_COLOR = 'rgba(239, 68, 68, 0.25)';
const PLAYER_COLOR = '#6366f1';
const PLAYER_GLOW = 'rgba(99, 102, 241, 0.5)';
const SOLUTION_COLOR = 'rgba(251, 191, 36, 0.35)';
const TRAIL_COLOR = 'rgba(99, 102, 241, 0.12)';
const VISITED_COLOR = 'rgba(99, 102, 241, 0.06)';

let mazeSize = 8;
let cellSize = 0;
let canvas, ctx;
let maze = [];
let playerX = 0, playerY = 0;
let endX, endY;
let moveCount = 0;
let timerInterval = null;
let startTime = 0;
let elapsed = 0;
let gameActive = false;
let gameWon = false;
let shortestPath = [];
let solutionVisible = false;
let playerTrail = [];
let visitedCells = new Set();
let animatingPlayer = false;
let playerAnimX = 0, playerAnimY = 0;
let animFrame = null;

// ─── Maze Generation (Recursive Backtracker) ────────────────
function generateMaze(cols, rows) {
  // Each cell: { top, right, bottom, left, visited }
  const grid = [];
  for (let y = 0; y < rows; y++) {
    grid[y] = [];
    for (let x = 0; x < cols; x++) {
      grid[y][x] = { top: true, right: true, bottom: true, left: true, visited: false };
    }
  }

  const stack = [];
  const dirs = [
    { dx: 0, dy: -1, wall: 'top', opp: 'bottom' },
    { dx: 1, dy: 0, wall: 'right', opp: 'left' },
    { dx: 0, dy: 1, wall: 'bottom', opp: 'top' },
    { dx: -1, dy: 0, wall: 'left', opp: 'right' }
  ];

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  // Start from (0, 0)
  let cx = 0, cy = 0;
  grid[cy][cx].visited = true;
  let visitedCount = 1;
  const totalCells = cols * rows;

  while (visitedCount < totalCells) {
    const shuffled = shuffle([...dirs]);
    let moved = false;

    for (const d of shuffled) {
      const nx = cx + d.dx;
      const ny = cy + d.dy;
      if (nx >= 0 && nx < cols && ny >= 0 && ny < rows && !grid[ny][nx].visited) {
        // Remove walls
        grid[cy][cx][d.wall] = false;
        grid[ny][nx][d.opp] = false;
        stack.push({ x: cx, y: cy });
        cx = nx;
        cy = ny;
        grid[cy][cx].visited = true;
        visitedCount++;
        moved = true;
        break;
      }
    }

    if (!moved) {
      const prev = stack.pop();
      if (!prev) break;
      cx = prev.x;
      cy = prev.y;
    }
  }

  return grid;
}

// ─── BFS for Shortest Path ──────────────────────────────────
function findShortestPath(grid, sx, sy, ex, ey) {
  const cols = grid[0].length;
  const rows = grid.length;
  const visited = Array.from({ length: rows }, () => Array(cols).fill(false));
  const parent = Array.from({ length: rows }, () => Array(cols).fill(null));
  const queue = [{ x: sx, y: sy }];
  visited[sy][sx] = true;

  const dirs = [
    { dx: 0, dy: -1, wall: 'top' },
    { dx: 1, dy: 0, wall: 'right' },
    { dx: 0, dy: 1, wall: 'bottom' },
    { dx: -1, dy: 0, wall: 'left' }
  ];

  while (queue.length > 0) {
    const { x, y } = queue.shift();
    if (x === ex && y === ey) {
      // Reconstruct path
      const path = [];
      let cur = { x: ex, y: ey };
      while (cur) {
        path.unshift(cur);
        cur = parent[cur.y][cur.x];
      }
      return path;
    }

    for (const d of dirs) {
      const nx = x + d.dx;
      const ny = y + d.dy;
      if (nx >= 0 && nx < cols && ny >= 0 && ny < rows && !visited[ny][nx] && !grid[y][x][d.wall]) {
        visited[ny][nx] = true;
        parent[ny][nx] = { x, y };
        queue.push({ x: nx, y: ny });
      }
    }
  }

  return [];
}

// ─── Rendering ──────────────────────────────────────────────
function drawMaze() {
  const cols = maze[0].length;
  const rows = maze.length;
  const w = canvas.width;
  const h = canvas.height;

  ctx.clearRect(0, 0, w, h);

  // Background
  ctx.fillStyle = FLOOR_COLOR;
  ctx.fillRect(0, 0, w, h);

  // Draw visited cells
  for (const key of visitedCells) {
    const [vx, vy] = key.split(',').map(Number);
    ctx.fillStyle = VISITED_COLOR;
    ctx.fillRect(vx * cellSize, vy * cellSize, cellSize, cellSize);
  }

  // Draw player trail
  if (playerTrail.length > 1) {
    ctx.strokeStyle = TRAIL_COLOR;
    ctx.lineWidth = cellSize * 0.3;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(playerTrail[0].x * cellSize + cellSize / 2, playerTrail[0].y * cellSize + cellSize / 2);
    for (let i = 1; i < playerTrail.length; i++) {
      ctx.lineTo(playerTrail[i].x * cellSize + cellSize / 2, playerTrail[i].y * cellSize + cellSize / 2);
    }
    ctx.stroke();
  }

  // Draw solution path
  if (solutionVisible && shortestPath.length > 1) {
    ctx.strokeStyle = SOLUTION_COLOR;
    ctx.lineWidth = cellSize * 0.35;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.setLineDash([cellSize * 0.2, cellSize * 0.15]);
    ctx.beginPath();
    ctx.moveTo(shortestPath[0].x * cellSize + cellSize / 2, shortestPath[0].y * cellSize + cellSize / 2);
    for (let i = 1; i < shortestPath.length; i++) {
      ctx.lineTo(shortestPath[i].x * cellSize + cellSize / 2, shortestPath[i].y * cellSize + cellSize / 2);
    }
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Start cell highlight
  ctx.fillStyle = START_COLOR;
  ctx.fillRect(0, 0, cellSize, cellSize);

  // End cell highlight
  ctx.fillStyle = END_COLOR;
  ctx.fillRect(endX * cellSize, endY * cellSize, cellSize, cellSize);

  // End cell flag
  const flagSize = cellSize * 0.45;
  const flagX = endX * cellSize + cellSize / 2;
  const flagY = endY * cellSize + cellSize / 2;
  ctx.fillStyle = 'rgba(239, 68, 68, 0.8)';
  ctx.font = `${flagSize}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🏁', flagX, flagY);

  // Start cell marker
  const startSize = cellSize * 0.4;
  ctx.fillStyle = 'rgba(16, 185, 129, 0.8)';
  ctx.font = `${startSize}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🚀', cellSize / 2, cellSize / 2);

  // Draw walls
  ctx.strokeStyle = WALL_COLOR;
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';

  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      const cell = maze[y][x];
      const px = x * cellSize;
      const py = y * cellSize;

      if (cell.top) {
        ctx.beginPath();
        ctx.moveTo(px, py);
        ctx.lineTo(px + cellSize, py);
        ctx.stroke();
      }
      if (cell.right) {
        ctx.beginPath();
        ctx.moveTo(px + cellSize, py);
        ctx.lineTo(px + cellSize, py + cellSize);
        ctx.stroke();
      }
      if (cell.bottom) {
        ctx.beginPath();
        ctx.moveTo(px, py + cellSize);
        ctx.lineTo(px + cellSize, py + cellSize);
        ctx.stroke();
      }
      if (cell.left) {
        ctx.beginPath();
        ctx.moveTo(px, py);
        ctx.lineTo(px, py + cellSize);
        ctx.stroke();
      }
    }
  }

  // Outer border
  ctx.strokeStyle = '#3a4070';
  ctx.lineWidth = 3;
  ctx.strokeRect(0, 0, cols * cellSize, rows * cellSize);

  // Draw player
  const px = playerAnimX * cellSize + cellSize / 2;
  const py = playerAnimY * cellSize + cellSize / 2;
  const radius = cellSize * 0.32;

  // Glow
  const gradient = ctx.createRadialGradient(px, py, 0, px, py, radius * 2.5);
  gradient.addColorStop(0, 'rgba(99, 102, 241, 0.3)');
  gradient.addColorStop(1, 'rgba(99, 102, 241, 0)');
  ctx.fillStyle = gradient;
  ctx.beginPath();
  ctx.arc(px, py, radius * 2.5, 0, Math.PI * 2);
  ctx.fill();

  // Player body
  const bodyGrad = ctx.createRadialGradient(px - radius * 0.3, py - radius * 0.3, 0, px, py, radius);
  bodyGrad.addColorStop(0, '#a5b4fc');
  bodyGrad.addColorStop(0.5, '#6366f1');
  bodyGrad.addColorStop(1, '#4338ca');
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.arc(px, py, radius, 0, Math.PI * 2);
  ctx.fill();

  // Player shine
  ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
  ctx.beginPath();
  ctx.arc(px - radius * 0.25, py - radius * 0.25, radius * 0.35, 0, Math.PI * 2);
  ctx.fill();
}

// ─── Player Movement ────────────────────────────────────────
function movePlayer(dx, dy) {
  if (!gameActive || gameWon || animatingPlayer) return;

  const cell = maze[playerY][playerX];

  // Check walls
  if (dx === 0 && dy === -1 && cell.top) return;
  if (dx === 1 && dy === 0 && cell.right) return;
  if (dx === 0 && dy === 1 && cell.bottom) return;
  if (dx === -1 && dy === 0 && cell.left) return;

  const newX = playerX + dx;
  const newY = playerY + dy;
  const cols = maze[0].length;
  const rows = maze.length;
  if (newX < 0 || newX >= cols || newY < 0 || newY >= rows) return;

  // Start timer on first move
  if (moveCount === 0 && !timerInterval) {
    startTime = Date.now();
    timerInterval = setInterval(updateTimer, 100);
  }

  // Animate movement
  animatingPlayer = true;
  const startX = playerAnimX;
  const startY = playerAnimY;
  const targetX = newX;
  const targetY = newY;
  const duration = 80;
  const animStart = performance.now();

  function animateMove(now) {
    const t = Math.min((now - animStart) / duration, 1);
    const ease = 1 - Math.pow(1 - t, 3); // ease out cubic
    playerAnimX = startX + (targetX - startX) * ease;
    playerAnimY = startY + (targetY - startY) * ease;
    drawMaze();

    if (t < 1) {
      requestAnimationFrame(animateMove);
    } else {
      playerX = newX;
      playerY = newY;
      playerAnimX = newX;
      playerAnimY = newY;
      animatingPlayer = false;

      moveCount++;
      document.getElementById('moves').textContent = moveCount;

      // Track trail and visited
      playerTrail.push({ x: playerX, y: playerY });
      visitedCells.add(`${playerX},${playerY}`);

      // Update live score
      updateLiveScore();

      // Check win
      if (playerX === endX && playerY === endY) {
        winGame();
      }

      drawMaze();
    }
  }

  requestAnimationFrame(animateMove);
}

// ─── Timer ──────────────────────────────────────────────────
function updateTimer() {
  elapsed = Date.now() - startTime;
  document.getElementById('timer').textContent = formatTime(elapsed);
}

function formatTime(ms) {
  const totalSec = Math.floor(ms / 1000);
  const min = Math.floor(totalSec / 60);
  const sec = totalSec % 60;
  return `${min}:${sec.toString().padStart(2, '0')}`;
}

// ─── Scoring ────────────────────────────────────────────────
function updateLiveScore() {
  if (shortestPath.length === 0) return;
  const ratio = shortestPath.length / Math.max(moveCount, 1);
  const pathScore = Math.round(ratio * 1000);
  document.getElementById('score').textContent = pathScore;
}

function calculateFinalScore() {
  const pathLen = shortestPath.length;
  const ratio = pathLen / Math.max(moveCount, 1);
  const pathBonus = Math.round(ratio * 1000);

  // Time bonus: faster = more points
  const timeSec = elapsed / 1000;
  const timeBonus = Math.max(0, Math.round(500 - timeSec * 5));

  // Size multiplier
  const sizeMultiplier = mazeSize / 8;

  const total = Math.round((pathBonus + timeBonus) * sizeMultiplier);

  return { pathBonus, timeBonus, sizeMultiplier, total, ratio };
}

// ─── Win ────────────────────────────────────────────────────
function winGame() {
  gameWon = true;
  gameActive = false;
  clearInterval(timerInterval);
  updateTimer();

  const scoreData = calculateFinalScore();

  document.getElementById('finalScore').textContent = scoreData.total;
  document.getElementById('scoreBreakdown').innerHTML = `
    Time: <span>${formatTime(elapsed)}</span> · 
    Moves: <span>${moveCount}</span> · 
    Shortest: <span>${shortestPath.length}</span><br>
    Path Efficiency: <span>${Math.round(scoreData.ratio * 100)}%</span> · 
    Path Bonus: <span>${scoreData.pathBonus}</span> · 
    Time Bonus: <span>${scoreData.timeBonus}</span>
  `;

  document.getElementById('score').textContent = scoreData.total;

  setTimeout(() => {
    document.getElementById('winOverlay').classList.add('visible');
    launchConfetti();
  }, 300);
}

// ─── Confetti ───────────────────────────────────────────────
function launchConfetti() {
  const container = document.getElementById('confettiContainer');
  container.innerHTML = '';
  const colors = ['#6366f1', '#a78bfa', '#fbbf24', '#10b981', '#ef4444', '#f472b6', '#38bdf8'];

  for (let i = 0; i < 80; i++) {
    const el = document.createElement('div');
    el.className = 'confetti';
    el.style.left = Math.random() * 100 + '%';
    el.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
    el.style.width = (Math.random() * 8 + 5) + 'px';
    el.style.height = (Math.random() * 8 + 5) + 'px';
    el.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
    el.style.animationDelay = (Math.random() * 0.8) + 's';
    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    container.appendChild(el);
  }

  setTimeout(() => { container.innerHTML = ''; }, 4000);
}

// ─── Game Setup ─────────────────────────────────────────────
function setupCanvas() {
  canvas = document.getElementById('mazeCanvas');
  ctx = canvas.getContext('2d');

  const maxWidth = Math.min(window.innerWidth - 40, 600);
  cellSize = Math.floor(maxWidth / mazeSize);
  // Ensure minimum cell size
  cellSize = Math.max(cellSize, 16);

  canvas.width = cellSize * mazeSize;
  canvas.height = cellSize * mazeSize;
}

function newGame() {
  // Reset state
  clearInterval(timerInterval);
  timerInterval = null;
  startTime = 0;
  elapsed = 0;
  moveCount = 0;
  gameWon = false;
  gameActive = true;
  solutionVisible = false;
  playerTrail = [];
  visitedCells = new Set();

  document.getElementById('timer').textContent = '0:00';
  document.getElementById('moves').textContent = '0';
  document.getElementById('shortest').textContent = '—';
  document.getElementById('score').textContent = '—';
  document.getElementById('winOverlay').classList.remove('visible');

  // Generate maze
  setupCanvas();
  maze = generateMaze(mazeSize, mazeSize);

  playerX = 0;
  playerY = 0;
  playerAnimX = 0;
  playerAnimY = 0;
  endX = mazeSize - 1;
  endY = mazeSize - 1;

  // Find shortest path
  shortestPath = findShortestPath(maze, 0, 0, endX, endY);
  document.getElementById('shortest').textContent = shortestPath.length;

  playerTrail = [{ x: 0, y: 0 }];
  visitedCells.add('0,0');

  drawMaze();
}

function setDifficulty(btn) {
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  mazeSize = parseInt(btn.dataset.size);
  newGame();
}

function toggleSolution() {
  solutionVisible = !solutionVisible;
  drawMaze();
}

// ─── Input Handling ─────────────────────────────────────────
document.addEventListener('keydown', (e) => {
  switch (e.key) {
    case 'ArrowUp': case 'w': case 'W':
      e.preventDefault(); movePlayer(0, -1); break;
    case 'ArrowDown': case 's': case 'S':
      e.preventDefault(); movePlayer(0, 1); break;
    case 'ArrowLeft': case 'a': case 'A':
      e.preventDefault(); movePlayer(-1, 0); break;
    case 'ArrowRight': case 'd': case 'D':
      e.preventDefault(); movePlayer(1, 0); break;
  }
});

// Touch swipe support
let touchStartX = 0, touchStartY = 0;
document.addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

document.addEventListener('touchend', (e) => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  const absDx = Math.abs(dx);
  const absDy = Math.abs(dy);

  if (Math.max(absDx, absDy) < 20) return; // too small

  if (absDx > absDy) {
    movePlayer(dx > 0 ? 1 : -1, 0);
  } else {
    movePlayer(0, dy > 0 ? 1 : -1);
  }
}, { passive: true });

// Handle resize
window.addEventListener('resize', () => {
  if (maze.length > 0) {
    setupCanvas();
    playerAnimX = playerX;
    playerAnimY = playerY;
    drawMaze();
  }
});

// ─── Initialize ─────────────────────────────────────────────
newGame();
</script>
