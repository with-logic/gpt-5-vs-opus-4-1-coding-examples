<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>US Trivia Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --primary: #4f46e5;
            --primary-light: #818cf8;
            --success: #22c55e;
            --danger: #ef4444;
            --bg-start: #0f172a;
            --bg-end: #1e293b;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 50%, #0c1524 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated background orbs */
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            animation: float 20s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }
        .bg-orb:nth-child(1) { width: 600px; height: 600px; background: #4f46e5; top: -200px; left: -100px; animation-delay: 0s; }
        .bg-orb:nth-child(2) { width: 500px; height: 500px; background: #7c3aed; bottom: -200px; right: -100px; animation-delay: -7s; }
        .bg-orb:nth-child(3) { width: 400px; height: 400px; background: #2563eb; top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: -14s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -40px) scale(1.05); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(40px, 30px) scale(1.02); }
        }

        .app-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 640px;
            padding: 20px;
        }

        /* Progress Bar */
        .progress-container {
            width: 100%;
            margin-bottom: 24px;
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.5s ease;
        }
        .progress-container.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .progress-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .progress-label {
            color: #94a3b8;
            font-size: 14px;
            font-weight: 500;
        }
        .progress-count {
            color: #e2e8f0;
            font-size: 14px;
            font-weight: 600;
        }
        .progress-track {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.08);
            border-radius: 100px;
            overflow: hidden;
            position: relative;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--primary-light));
            border-radius: 100px;
            transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
        }
        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 2s infinite;
        }
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* Card */
        .card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 40px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
        }

        /* Start Screen */
        .screen { display: none; }
        .screen.active { display: block; animation: fadeSlideIn 0.5s ease forwards; }

        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeSlideOut {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-20px); }
        }

        .start-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary), #7c3aed);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 40px;
            box-shadow: 0 10px 30px rgba(79, 70, 229, 0.3);
            animation: pulse-glow 3s ease-in-out infinite;
        }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 10px 30px rgba(79, 70, 229, 0.3); }
            50% { box-shadow: 0 10px 40px rgba(79, 70, 229, 0.5); }
        }

        .start-title {
            font-size: 32px;
            font-weight: 800;
            color: #f1f5f9;
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        .start-subtitle {
            font-size: 16px;
            color: #94a3b8;
            text-align: center;
            margin-bottom: 32px;
            line-height: 1.6;
        }
        .start-stats {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin-bottom: 32px;
        }
        .stat {
            text-align: center;
        }
        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #e2e8f0;
        }
        .stat-label {
            font-size: 12px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 16px 32px;
            border: none;
            border-radius: 14px;
            font-family: inherit;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #6366f1);
            color: white;
            width: 100%;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(79, 70, 229, 0.5);
        }
        .btn-primary:active {
            transform: translateY(0);
        }

        /* Question */
        .question-category {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: rgba(79, 70, 229, 0.15);
            border: 1px solid rgba(79, 70, 229, 0.25);
            border-radius: 100px;
            color: var(--primary-light);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 20px;
        }
        .question-text {
            font-size: 24px;
            font-weight: 700;
            color: #f1f5f9;
            line-height: 1.4;
            margin-bottom: 32px;
            letter-spacing: -0.3px;
        }

        /* Answer Options */
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 0;
        }
        .option-btn {
            display: flex;
            align-items: center;
            gap: 16px;
            width: 100%;
            padding: 18px 20px;
            background: rgba(255,255,255,0.04);
            border: 2px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            color: #e2e8f0;
            font-family: inherit;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s ease;
            text-align: left;
            position: relative;
            overflow: hidden;
        }
        .option-btn:hover:not(.disabled) {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.15);
            transform: translateX(4px);
        }
        .option-btn .option-letter {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.06);
            border-radius: 10px;
            font-weight: 700;
            font-size: 14px;
            color: #94a3b8;
            flex-shrink: 0;
            transition: all 0.3s ease;
        }
        .option-btn .option-text {
            flex: 1;
        }
        .option-btn .option-icon {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: scale(0);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            flex-shrink: 0;
        }

        /* Answer States */
        .option-btn.correct {
            background: rgba(34, 197, 94, 0.12);
            border-color: rgba(34, 197, 94, 0.5);
        }
        .option-btn.correct .option-letter {
            background: var(--success);
            color: white;
        }
        .option-btn.correct .option-icon {
            opacity: 1;
            transform: scale(1);
        }
        .option-btn.incorrect {
            background: rgba(239, 68, 68, 0.12);
            border-color: rgba(239, 68, 68, 0.5);
        }
        .option-btn.incorrect .option-letter {
            background: var(--danger);
            color: white;
        }
        .option-btn.incorrect .option-icon {
            opacity: 1;
            transform: scale(1);
        }
        .option-btn.disabled {
            cursor: default;
            pointer-events: none;
        }
        .option-btn.dimmed {
            opacity: 0.4;
        }

        /* Feedback overlay */
        .feedback-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: 10;
            opacity: 0;
        }
        .feedback-overlay.show {
            animation: feedbackPop 0.8s ease forwards;
        }
        @keyframes feedbackPop {
            0% { opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { opacity: 0; }
        }
        .feedback-symbol {
            font-size: 120px;
            animation: feedbackScale 0.8s ease forwards;
        }
        @keyframes feedbackScale {
            0% { transform: scale(0) rotate(-20deg); opacity: 0; }
            30% { transform: scale(1.3) rotate(5deg); opacity: 1; }
            50% { transform: scale(1) rotate(0deg); opacity: 1; }
            100% { transform: scale(0.8) rotate(0deg); opacity: 0; }
        }

        /* Next Button */
        .next-container {
            margin-top: 24px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s ease;
        }
        .next-container.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .btn-next {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            color: #e2e8f0;
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            font-family: inherit;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-next:hover {
            background: rgba(255,255,255,0.12);
            transform: translateY(-1px);
        }

        /* Results Screen */
        .result-circle-container {
            display: flex;
            justify-content: center;
            margin-bottom: 32px;
        }
        .result-circle {
            position: relative;
            width: 180px;
            height: 180px;
        }
        .result-circle svg {
            transform: rotate(-90deg);
            width: 180px;
            height: 180px;
        }
        .result-circle .track {
            fill: none;
            stroke: rgba(255,255,255,0.06);
            stroke-width: 10;
        }
        .result-circle .fill-circle {
            fill: none;
            stroke-width: 10;
            stroke-linecap: round;
            stroke-dasharray: 502;
            stroke-dashoffset: 502;
            transition: stroke-dashoffset 1.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .result-score-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
        .result-score-number {
            font-size: 48px;
            font-weight: 900;
            color: #f1f5f9;
            line-height: 1;
        }
        .result-score-label {
            font-size: 14px;
            color: #64748b;
            font-weight: 500;
            margin-top: 4px;
        }

        .result-title {
            font-size: 28px;
            font-weight: 800;
            color: #f1f5f9;
            text-align: center;
            margin-bottom: 8px;
        }
        .result-message {
            font-size: 16px;
            color: #94a3b8;
            text-align: center;
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .result-stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin-bottom: 32px;
        }
        .result-stat {
            background: rgba(255,255,255,0.04);
            border-radius: 14px;
            padding: 16px;
            text-align: center;
        }
        .result-stat-value {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .result-stat-value.green { color: var(--success); }
        .result-stat-value.red { color: var(--danger); }
        .result-stat-value.blue { color: var(--primary-light); }
        .result-stat-label {
            font-size: 12px;
            color: #64748b;
            font-weight: 500;
        }

        /* Confetti Canvas */
        #confetti-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .card { padding: 28px 20px; border-radius: 20px; }
            .question-text { font-size: 20px; }
            .start-title { font-size: 26px; }
            .result-title { font-size: 24px; }
            .option-btn { padding: 14px 16px; font-size: 15px; }
        }

        /* Question transition */
        .question-content {
            animation: questionIn 0.4s ease forwards;
        }
        @keyframes questionIn {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .question-content.exit {
            animation: questionOut 0.3s ease forwards;
        }
        @keyframes questionOut {
            from { opacity: 1; transform: translateX(0); }
            to { opacity: 0; transform: translateX(-30px); }
        }

        /* Stagger options */
        .option-btn { opacity: 0; animation: optionIn 0.4s ease forwards; }
        .option-btn:nth-child(1) { animation-delay: 0.1s; }
        .option-btn:nth-child(2) { animation-delay: 0.18s; }
        .option-btn:nth-child(3) { animation-delay: 0.26s; }
        .option-btn:nth-child(4) { animation-delay: 0.34s; }
        @keyframes optionIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="bg-orb"></div>
    <div class="bg-orb"></div>
    <div class="bg-orb"></div>

    <canvas id="confetti-canvas"></canvas>

    <div class="app-container">
        <!-- Progress Bar -->
        <div class="progress-container" id="progress-container">
            <div class="progress-info">
                <span class="progress-label">Progress</span>
                <span class="progress-count" id="progress-count">1 / 10</span>
            </div>
            <div class="progress-track">
                <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
            </div>
        </div>

        <div class="card">
            <!-- Start Screen -->
            <div class="screen active" id="start-screen">
                <div class="start-icon">🇺🇸</div>
                <h1 class="start-title">US Trivia Quiz</h1>
                <p class="start-subtitle">Test your knowledge of the United States with 10 fun questions. How much do you really know?</p>
                <div class="start-stats">
                    <div class="stat">
                        <div class="stat-value">10</div>
                        <div class="stat-label">Questions</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value">4</div>
                        <div class="stat-label">Choices</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value">🏆</div>
                        <div class="stat-label">Beat Your Best</div>
                    </div>
                </div>
                <button class="btn btn-primary" onclick="startQuiz()">
                    Start Quiz
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </button>
            </div>

            <!-- Quiz Screen -->
            <div class="screen" id="quiz-screen">
                <div class="question-content" id="question-content">
                    <div class="question-category" id="question-category">📚 Category</div>
                    <h2 class="question-text" id="question-text">Question goes here?</h2>
                    <div class="options-list" id="options-list"></div>
                </div>
                <div class="next-container" id="next-container">
                    <button class="btn-next" onclick="nextQuestion()">
                        <span id="next-btn-text">Next Question</span>
                        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                    </button>
                </div>
                <div class="feedback-overlay" id="feedback-overlay">
                    <div class="feedback-symbol" id="feedback-symbol"></div>
                </div>
            </div>

            <!-- Results Screen -->
            <div class="screen" id="results-screen">
                <div class="result-circle-container">
                    <div class="result-circle">
                        <svg viewBox="0 0 180 180">
                            <circle class="track" cx="90" cy="90" r="80"/>
                            <circle class="fill-circle" id="result-circle-fill" cx="90" cy="90" r="80"/>
                        </svg>
                        <div class="result-score-text">
                            <div class="result-score-number" id="result-score-number">0</div>
                            <div class="result-score-label">out of 10</div>
                        </div>
                    </div>
                </div>
                <h2 class="result-title" id="result-title">Great Job!</h2>
                <p class="result-message" id="result-message">You did amazing!</p>
                <div class="result-stats">
                    <div class="result-stat">
                        <div class="result-stat-value green" id="result-correct">0</div>
                        <div class="result-stat-label">Correct</div>
                    </div>
                    <div class="result-stat">
                        <div class="result-stat-value red" id="result-incorrect">0</div>
                        <div class="result-stat-label">Incorrect</div>
                    </div>
                    <div class="result-stat">
                        <div class="result-stat-value blue" id="result-percent">0%</div>
                        <div class="result-stat-label">Score</div>
                    </div>
                </div>
                <button class="btn btn-primary" onclick="restartQuiz()">
                    Play Again
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15"/></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        // ==================== QUESTION BANK ====================
        const allQuestions = [
            {
                category: "Geography",
                question: "What is the capital of the United States?",
                options: ["New York City", "Washington, D.C.", "Los Angeles", "Chicago"],
                correct: 1
            },
            {
                category: "Government",
                question: "How many states are there in the United States?",
                options: ["48", "50", "51", "52"],
                correct: 1
            },
            {
                category: "Symbols",
                question: "What are the three colors of the American flag?",
                options: ["Red, White, and Blue", "Red, White, and Green", "Blue, Gold, and White", "Red, Blue, and Yellow"],
                correct: 0
            },
            {
                category: "History",
                question: "Who was the first President of the United States?",
                options: ["Thomas Jefferson", "John Adams", "George Washington", "Benjamin Franklin"],
                correct: 2
            },
            {
                category: "Culture",
                question: "What is the national anthem of the United States?",
                options: ["America the Beautiful", "God Bless America", "The Star-Spangled Banner", "My Country, 'Tis of Thee"],
                correct: 2
            },
            {
                category: "History",
                question: "On what date is Independence Day celebrated in the United States?",
                options: ["June 14th", "July 4th", "September 17th", "November 11th"],
                correct: 1
            },
            {
                category: "Geography",
                question: "What ocean borders the East Coast of the United States?",
                options: ["Pacific Ocean", "Indian Ocean", "Atlantic Ocean", "Arctic Ocean"],
                correct: 2
            },
            {
                category: "Geography",
                question: "What is the largest U.S. state by area?",
                options: ["Texas", "California", "Montana", "Alaska"],
                correct: 3
            },
            {
                category: "Symbols",
                question: "What bird is the national bird of the United States?",
                options: ["Turkey", "Bald Eagle", "American Robin", "Blue Jay"],
                correct: 1
            },
            {
                category: "Government",
                question: "How many branches does the U.S. federal government have?",
                options: ["2", "3", "4", "5"],
                correct: 1
            },
            {
                category: "History",
                question: "In what year did the United States declare independence?",
                options: ["1776", "1789", "1812", "1791"],
                correct: 0
            },
            {
                category: "Geography",
                question: "What is the longest river in the United States?",
                options: ["Colorado River", "Columbia River", "Missouri River", "Mississippi River"],
                correct: 2
            },
            {
                category: "Government",
                question: "How many senators are there in the U.S. Senate?",
                options: ["50", "100", "435", "200"],
                correct: 1
            },
            {
                category: "Culture",
                question: "What is the currency of the United States?",
                options: ["Euro", "Pound Sterling", "U.S. Dollar", "Canadian Dollar"],
                correct: 2
            },
            {
                category: "History",
                question: "Which document begins with \"We the People\"?",
                options: ["The Declaration of Independence", "The Constitution", "The Bill of Rights", "The Gettysburg Address"],
                correct: 1
            }
        ];

        // ==================== GAME STATE ====================
        let quizQuestions = [];
        let currentQuestion = 0;
        let score = 0;
        let answered = false;

        // ==================== FUNCTIONS ====================
        function shuffleArray(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function startQuiz() {
            quizQuestions = shuffleArray(allQuestions).slice(0, 10);
            currentQuestion = 0;
            score = 0;
            answered = false;

            document.getElementById('start-screen').classList.remove('active');
            document.getElementById('quiz-screen').classList.add('active');
            document.getElementById('progress-container').classList.add('visible');

            showQuestion();
        }

        function showQuestion() {
            answered = false;
            const q = quizQuestions[currentQuestion];
            const content = document.getElementById('question-content');

            // Animate in
            content.classList.remove('exit');
            content.style.animation = 'none';
            content.offsetHeight; // trigger reflow
            content.style.animation = '';
            content.classList.add('question-content');

            document.getElementById('question-category').textContent = `📚 ${q.category}`;
            document.getElementById('question-text').textContent = q.question;

            // Update progress
            document.getElementById('progress-count').textContent = `${currentQuestion + 1} / 10`;
            document.getElementById('progress-fill').style.width = `${((currentQuestion) / 10) * 100}%`;

            // Build options
            const letters = ['A', 'B', 'C', 'D'];
            const optionsList = document.getElementById('options-list');
            optionsList.innerHTML = '';

            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = `
                    <span class="option-letter">${letters[i]}</span>
                    <span class="option-text">${opt}</span>
                    <span class="option-icon"></span>
                `;
                btn.addEventListener('click', () => selectAnswer(i, btn));
                optionsList.appendChild(btn);
            });

            // Hide next button
            document.getElementById('next-container').classList.remove('visible');
            document.getElementById('next-btn-text').textContent =
                currentQuestion < 9 ? 'Next Question' : 'See Results';
        }

        function selectAnswer(index, btnEl) {
            if (answered) return;
            answered = true;

            const q = quizQuestions[currentQuestion];
            const isCorrect = index === q.correct;
            const allBtns = document.querySelectorAll('.option-btn');

            // Disable all buttons
            allBtns.forEach((btn, i) => {
                btn.classList.add('disabled');
                if (i === q.correct) {
                    btn.classList.add('correct');
                    btn.querySelector('.option-icon').innerHTML = `<svg width="22" height="22" fill="none" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5" stroke="#22c55e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
                }
                if (i === index && !isCorrect) {
                    btn.classList.add('incorrect');
                    btn.querySelector('.option-icon').innerHTML = `<svg width="22" height="22" fill="none" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12" stroke="#ef4444" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
                }
                if (i !== q.correct && i !== index) {
                    btn.classList.add('dimmed');
                }
            });

            if (isCorrect) score++;

            // Show feedback overlay
            const overlay = document.getElementById('feedback-overlay');
            const symbol = document.getElementById('feedback-symbol');
            symbol.textContent = isCorrect ? '✅' : '❌';
            overlay.classList.remove('show');
            overlay.offsetHeight;
            overlay.classList.add('show');

            // Show next button
            setTimeout(() => {
                document.getElementById('next-container').classList.add('visible');
            }, 600);
        }

        function nextQuestion() {
            currentQuestion++;

            if (currentQuestion >= 10) {
                showResults();
                return;
            }

            // Animate out then in
            const content = document.getElementById('question-content');
            content.classList.add('exit');

            setTimeout(() => {
                showQuestion();
            }, 300);
        }

        function showResults() {
            document.getElementById('quiz-screen').classList.remove('active');
            document.getElementById('results-screen').classList.add('active');
            document.getElementById('progress-container').classList.remove('visible');

            // Update progress to 100%
            document.getElementById('progress-fill').style.width = '100%';

            const percent = Math.round((score / 10) * 100);

            // Animate score circle
            const circumference = 2 * Math.PI * 80; // ~502
            const offset = circumference - (circumference * (score / 10));
            const circleFill = document.getElementById('result-circle-fill');

            let strokeColor;
            if (percent >= 80) strokeColor = '#22c55e';
            else if (percent >= 50) strokeColor = '#eab308';
            else strokeColor = '#ef4444';

            circleFill.style.stroke = strokeColor;
            setTimeout(() => {
                circleFill.style.strokeDashoffset = offset;
            }, 100);

            // Animate score number
            let currentNum = 0;
            const numEl = document.getElementById('result-score-number');
            const interval = setInterval(() => {
                currentNum++;
                numEl.textContent = currentNum;
                if (currentNum >= score) clearInterval(interval);
            }, 120);

            // Stats
            document.getElementById('result-correct').textContent = score;
            document.getElementById('result-incorrect').textContent = 10 - score;
            document.getElementById('result-percent').textContent = percent + '%';

            // Title and message
            let title, message;
            if (percent === 100) {
                title = "🏆 Perfect Score!";
                message = "Incredible! You got every single question right. You're a true U.S. trivia expert!";
            } else if (percent >= 80) {
                title = "🌟 Excellent!";
                message = "Amazing job! You really know your stuff about the United States!";
            } else if (percent >= 60) {
                title = "👏 Good Job!";
                message = "Nice work! You have solid knowledge of U.S. facts. Keep learning!";
            } else if (percent >= 40) {
                title = "📚 Not Bad!";
                message = "You got some right! A bit more studying and you'll ace it next time.";
            } else {
                title = "💪 Keep Trying!";
                message = "Don't worry — every expert was once a beginner. Give it another shot!";
            }
            document.getElementById('result-title').textContent = title;
            document.getElementById('result-message').textContent = message;

            // Confetti for good scores
            if (percent >= 60) {
                launchConfetti();
            }
        }

        function restartQuiz() {
            document.getElementById('results-screen').classList.remove('active');

            // Reset circle
            document.getElementById('result-circle-fill').style.strokeDashoffset = 502;
            document.getElementById('result-score-number').textContent = '0';

            // Go to start
            document.getElementById('start-screen').classList.add('active');
        }

        // ==================== CONFETTI ====================
        function launchConfetti() {
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const pieces = [];
            const colors = ['#4f46e5', '#22c55e', '#eab308', '#ef4444', '#ec4899', '#06b6d4', '#f97316'];
            const total = 150;

            for (let i = 0; i < total; i++) {
                pieces.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    w: Math.random() * 10 + 5,
                    h: Math.random() * 6 + 3,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    vx: (Math.random() - 0.5) * 4,
                    vy: Math.random() * 3 + 2,
                    rotation: Math.random() * 360,
                    rotationSpeed: (Math.random() - 0.5) * 10,
                    opacity: 1
                });
            }

            let frame = 0;
            const maxFrames = 200;

            function animate() {
                frame++;
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                pieces.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.05;
                    p.rotation += p.rotationSpeed;

                    if (frame > maxFrames - 60) {
                        p.opacity = Math.max(0, p.opacity - 0.02);
                    }

                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate((p.rotation * Math.PI) / 180);
                    ctx.globalAlpha = p.opacity;
                    ctx.fillStyle = p.color;
                    ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
                    ctx.restore();
                });

                if (frame < maxFrames) {
                    requestAnimationFrame(animate);
                } else {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                }
            }

            animate();
        }

        // Handle resize for confetti canvas
        window.addEventListener('resize', () => {
            const canvas = document.getElementById('confetti-canvas');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
