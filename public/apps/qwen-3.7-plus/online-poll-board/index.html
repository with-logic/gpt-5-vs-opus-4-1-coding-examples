<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Poll Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-start: #fdf2f8;
    --bg-end: #ede9fe;
    --card-bg: #ffffff;
    --text-primary: #1e1b4b;
    --text-secondary: #6b7280;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -2px rgba(0,0,0,0.05);
    --shadow-lg: 0 10px 25px -3px rgba(0,0,0,0.08), 0 4px 6px -4px rgba(0,0,0,0.04);
    --shadow-xl: 0 20px 40px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.04);
    --radius: 16px;
    --radius-sm: 10px;
    --radius-xs: 8px;
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(135deg, var(--bg-start) 0%, #fef3c7 25%, #dbeafe 50%, var(--bg-end) 75%, #fce7f3 100%);
    background-attachment: fixed;
    min-height: 100vh;
    color: var(--text-primary);
    overflow-x: hidden;
  }

  /* Animated background blobs */
  .bg-blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.3;
    z-index: 0;
    animation: blobFloat 20s ease-in-out infinite;
  }
  .bg-blob:nth-child(1) {
    width: 500px; height: 500px;
    background: #c4b5fd;
    top: -100px; left: -100px;
    animation-delay: 0s;
  }
  .bg-blob:nth-child(2) {
    width: 400px; height: 400px;
    background: #fbcfe8;
    top: 50%; right: -100px;
    animation-delay: -7s;
    animation-duration: 25s;
  }
  .bg-blob:nth-child(3) {
    width: 350px; height: 350px;
    background: #bae6fd;
    bottom: -50px; left: 30%;
    animation-delay: -14s;
    animation-duration: 22s;
  }

  @keyframes blobFloat {
    0%, 100% { transform: translate(0, 0) scale(1); }
    25% { transform: translate(30px, -50px) scale(1.05); }
    50% { transform: translate(-20px, 20px) scale(0.95); }
    75% { transform: translate(40px, 30px) scale(1.02); }
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 20px 80px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 48px;
    animation: fadeInDown 0.8s ease-out;
  }
  .header-icon {
    font-size: 52px;
    margin-bottom: 12px;
    display: inline-block;
    animation: bounce 2s ease-in-out infinite;
  }
  .header h1 {
    font-size: 2.75rem;
    font-weight: 900;
    background: linear-gradient(135deg, #7c3aed, #ec4899, #f59e0b);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.03em;
    line-height: 1.1;
    margin-bottom: 8px;
  }
  .header p {
    color: var(--text-secondary);
    font-size: 1.1rem;
    font-weight: 500;
  }

  /* Stats bar */
  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin-bottom: 40px;
    animation: fadeInUp 0.8s ease-out 0.2s both;
  }
  .stat-item {
    text-align: center;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(10px);
    padding: 14px 28px;
    border-radius: var(--radius-sm);
    border: 1px solid rgba(255,255,255,0.8);
    box-shadow: var(--shadow-sm);
  }
  .stat-number {
    font-size: 1.75rem;
    font-weight: 800;
    color: #7c3aed;
    line-height: 1;
  }
  .stat-label {
    font-size: 0.75rem;
    color: var(--text-secondary);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-top: 4px;
  }

  /* Poll cards */
  .polls-grid {
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .poll-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 28px 32px;
    box-shadow: var(--shadow-md);
    border: 1px solid rgba(255,255,255,0.9);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    opacity: 0;
    transform: translateY(30px);
    animation: fadeInUp 0.6s ease-out forwards;
    position: relative;
    overflow: hidden;
  }
  .poll-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    border-radius: var(--radius) var(--radius) 0 0;
  }
  .poll-card:nth-child(1)::before { background: linear-gradient(90deg, #7c3aed, #a78bfa); }
  .poll-card:nth-child(2)::before { background: linear-gradient(90deg, #ec4899, #f9a8d4); }
  .poll-card:nth-child(3)::before { background: linear-gradient(90deg, #f59e0b, #fcd34d); }
  .poll-card:nth-child(4)::before { background: linear-gradient(90deg, #10b981, #6ee7b7); }
  .poll-card:nth-child(5)::before { background: linear-gradient(90deg, #3b82f6, #93c5fd); }
  .poll-card:nth-child(6)::before { background: linear-gradient(90deg, #ef4444, #fca5a5); }

  .poll-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-xl);
  }

  .poll-card:nth-child(1) { animation-delay: 0.1s; }
  .poll-card:nth-child(2) { animation-delay: 0.2s; }
  .poll-card:nth-child(3) { animation-delay: 0.3s; }
  .poll-card:nth-child(4) { animation-delay: 0.4s; }
  .poll-card:nth-child(5) { animation-delay: 0.5s; }
  .poll-card:nth-child(6) { animation-delay: 0.6s; }

  .poll-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }
  .poll-emoji {
    font-size: 28px;
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 12px;
    flex-shrink: 0;
  }
  .poll-card:nth-child(1) .poll-emoji { background: #ede9fe; }
  .poll-card:nth-child(2) .poll-emoji { background: #fce7f3; }
  .poll-card:nth-child(3) .poll-emoji { background: #fef3c7; }
  .poll-card:nth-child(4) .poll-emoji { background: #d1fae5; }
  .poll-card:nth-child(5) .poll-emoji { background: #dbeafe; }
  .poll-card:nth-child(6) .poll-emoji { background: #fee2e2; }

  .poll-question {
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1.3;
  }
  .poll-meta {
    font-size: 0.78rem;
    color: var(--text-secondary);
    font-weight: 500;
    margin-top: 2px;
  }

  /* Options */
  .options-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option-btn {
    position: relative;
    display: flex;
    align-items: center;
    width: 100%;
    padding: 14px 18px;
    border: 2px solid #e5e7eb;
    border-radius: var(--radius-xs);
    background: #fafafa;
    cursor: pointer;
    transition: all 0.25s ease;
    overflow: hidden;
    font-family: inherit;
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--text-primary);
    text-align: left;
  }
  .option-btn:hover:not(.voted):not(.disabled) {
    border-color: #a78bfa;
    background: #f5f3ff;
    transform: translateX(4px);
  }
  .option-btn:active:not(.voted):not(.disabled) {
    transform: translateX(4px) scale(0.99);
  }

  .option-btn .fill-bar {
    position: absolute;
    top: 0; left: 0; bottom: 0;
    width: 0%;
    border-radius: 6px;
    transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 0;
  }
  .poll-card:nth-child(1) .option-btn .fill-bar { background: linear-gradient(90deg, #ede9fe, #ddd6fe); }
  .poll-card:nth-child(2) .option-btn .fill-bar { background: linear-gradient(90deg, #fce7f3, #fbcfe8); }
  .poll-card:nth-child(3) .option-btn .fill-bar { background: linear-gradient(90deg, #fef3c7, #fde68a); }
  .poll-card:nth-child(4) .option-btn .fill-bar { background: linear-gradient(90deg, #d1fae5, #a7f3d0); }
  .poll-card:nth-child(5) .option-btn .fill-bar { background: linear-gradient(90deg, #dbeafe, #bfdbfe); }
  .poll-card:nth-child(6) .option-btn .fill-bar { background: linear-gradient(90deg, #fee2e2, #fecaca); }

  .option-btn .option-content {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
  }
  .option-label {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .option-radio {
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 2px solid #d1d5db;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.25s ease;
  }
  .option-radio::after {
    content: '';
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #7c3aed;
    transform: scale(0);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .option-btn.selected .option-radio {
    border-color: #7c3aed;
  }
  .option-btn.selected .option-radio::after {
    transform: scale(1);
  }

  .option-stats {
    display: flex;
    align-items: center;
    gap: 10px;
    opacity: 0;
    transform: translateX(10px);
    transition: all 0.4s ease;
  }
  .option-stats.visible {
    opacity: 1;
    transform: translateX(0);
  }
  .option-percent {
    font-weight: 800;
    font-size: 1rem;
    min-width: 42px;
    text-align: right;
  }
  .option-count {
    font-size: 0.8rem;
    color: var(--text-secondary);
    font-weight: 600;
    min-width: 50px;
    text-align: right;
  }

  .option-btn.voted {
    cursor: default;
    border-color: transparent;
  }
  .option-btn.selected {
    border-color: #7c3aed;
    box-shadow: 0 0 0 1px #7c3aed;
  }
  .option-btn.disabled {
    cursor: default;
    opacity: 0.7;
  }

  /* Vote button */
  .vote-action {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 16px;
  }
  .vote-btn {
    padding: 10px 28px;
    border: none;
    border-radius: var(--radius-xs);
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.25s ease;
    color: white;
    position: relative;
    overflow: hidden;
  }
  .poll-card:nth-child(1) .vote-btn { background: linear-gradient(135deg, #7c3aed, #8b5cf6); }
  .poll-card:nth-child(2) .vote-btn { background: linear-gradient(135deg, #ec4899, #f472b6); }
  .poll-card:nth-child(3) .vote-btn { background: linear-gradient(135deg, #f59e0b, #fbbf24); }
  .poll-card:nth-child(4) .vote-btn { background: linear-gradient(135deg, #10b981, #34d399); }
  .poll-card:nth-child(5) .vote-btn { background: linear-gradient(135deg, #3b82f6, #60a5fa); }
  .poll-card:nth-child(6) .vote-btn { background: linear-gradient(135deg, #ef4444, #f87171); }

  .vote-btn:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); }
  .vote-btn:active { transform: translateY(0) scale(0.97); }
  .vote-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none !important;
    box-shadow: none !important;
  }

  .vote-btn .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.4);
    transform: scale(0);
    animation: ripple 0.6s ease-out;
    pointer-events: none;
  }
  @keyframes ripple {
    to { transform: scale(4); opacity: 0; }
  }

  .change-vote-btn {
    padding: 8px 16px;
    border: 2px solid #e5e7eb;
    border-radius: var(--radius-xs);
    background: transparent;
    font-family: inherit;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.2s ease;
    display: none;
  }
  .change-vote-btn:hover {
    border-color: #a78bfa;
    color: #7c3aed;
  }
  .change-vote-btn.visible { display: inline-flex; }

  .total-votes-label {
    font-size: 0.82rem;
    color: var(--text-secondary);
    font-weight: 600;
  }
  .total-votes-label span {
    font-weight: 800;
    color: var(--text-primary);
  }

  /* Confetti canvas */
  #confetti-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1000;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--text-primary);
    color: white;
    padding: 14px 28px;
    border-radius: 50px;
    font-weight: 600;
    font-size: 0.9rem;
    box-shadow: var(--shadow-xl);
    z-index: 999;
    transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    white-space: nowrap;
  }
  .toast.show {
    transform: translateX(-50%) translateY(0);
  }

  /* Animations */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeInDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  @keyframes countPulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.3); }
    100% { transform: scale(1); }
  }
  .count-pulse {
    animation: countPulse 0.4s ease-out;
  }

  /* Responsive */
  @media (max-width: 640px) {
    .header h1 { font-size: 2rem; }
    .container { padding: 24px 16px 60px; }
    .poll-card { padding: 20px; }
    .stats-bar { gap: 16px; }
    .stat-item { padding: 10px 18px; }
    .stat-number { font-size: 1.4rem; }
    .option-btn { padding: 12px 14px; font-size: 0.88rem; }
  }
</style>
</head>
<body>

<div class="bg-blob"></div>
<div class="bg-blob"></div>
<div class="bg-blob"></div>

<canvas id="confetti-canvas"></canvas>

<div class="container">
  <div class="header">
    <div class="header-icon">📊</div>
    <h1>Online Poll Board</h1>
    <p>Cast your vote and see what others think!</p>
  </div>

  <div class="stats-bar">
    <div class="stat-item">
      <div class="stat-number" id="total-polls">6</div>
      <div class="stat-label">Active Polls</div>
    </div>
    <div class="stat-item">
      <div class="stat-number" id="total-votes">0</div>
      <div class="stat-label">Your Votes</div>
    </div>
    <div class="stat-item">
      <div class="stat-number" id="community-votes">0</div>
      <div class="stat-label">Community Votes</div>
    </div>
  </div>

  <div class="polls-grid" id="polls-grid"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// Poll data
const pollsData = [
  {
    id: 1,
    emoji: '💻',
    question: 'What is the best programming language in 2026?',
    category: 'Technology',
    options: [
      { id: 'a', label: 'Python', votes: 342 },
      { id: 'b', label: 'TypeScript', votes: 289 },
      { id: 'c', label: 'Rust', votes: 198 },
      { id: 'd', label: 'Go', votes: 156 },
      { id: 'e', label: 'JavaScript', votes: 267 }
    ]
  },
  {
    id: 2,
    emoji: '☕',
    question: 'What\'s your go-to coffee order?',
    category: 'Lifestyle',
    options: [
      { id: 'a', label: 'Iced Latte', votes: 234 },
      { id: 'b', label: 'Espresso', votes: 178 },
      { id: 'c', label: 'Cappuccino', votes: 201 },
      { id: 'd', label: 'Cold Brew', votes: 289 },
      { id: 'e', label: 'American Black', votes: 112 }
    ]
  },
  {
    id: 3,
    emoji: '🏠',
    question: 'What\'s your ideal work setup?',
    category: 'Work',
    options: [
      { id: 'a', label: 'Fully Remote', votes: 412 },
      { id: 'b', label: 'Hybrid (3 days office)', votes: 198 },
      { id: 'c', label: 'Fully In-Office', votes: 67 },
      { id: 'd', label: 'Digital Nomad', votes: 289 }
    ]
  },
  {
    id: 4,
    emoji: '🎬',
    question: 'Best movie genre for a weekend night?',
    category: 'Entertainment',
    options: [
      { id: 'a', label: 'Sci-Fi', votes: 276 },
      { id: 'b', label: 'Comedy', votes: 321 },
      { id: 'c', label: 'Thriller / Mystery', votes: 245 },
      { id: 'd', label: 'Documentary', votes: 134 },
      { id: 'e', label: 'Animation', votes: 198 }
    ]
  },
  {
    id: 5,
    emoji: '🍕',
    question: 'The ONE food you could eat forever?',
    category: 'Food',
    options: [
      { id: 'a', label: 'Pizza', votes: 387 },
      { id: 'b', label: 'Sushi', votes: 256 },
      { id: 'c', label: 'Tacos', votes: 298 },
      { id: 'd', label: 'Pasta', votes: 234 },
      { id: 'e', label: 'Ramen', votes: 189 }
    ]
  },
  {
    id: 6,
    emoji: '🚀',
    question: 'What excites you most about the future?',
    category: 'Future',
    options: [
      { id: 'a', label: 'AI & Machine Learning', votes: 356 },
      { id: 'b', label: 'Space Exploration', votes: 278 },
      { id: 'c', label: 'Clean Energy', votes: 234 },
      { id: 'd', label: 'Biotechnology', votes: 167 },
      { id: 'e', label: 'Quantum Computing', votes: 145 }
    ]
  }
];

// State
const state = {
  polls: JSON.parse(JSON.stringify(pollsData)),
  userVotes: {},  // pollId -> optionId
  revealed: {},   // pollId -> boolean
  userVoteCount: 0
};

// Calculate community total
function getCommunityTotal() {
  let total = 0;
  state.polls.forEach(p => p.options.forEach(o => total += o.votes));
  return total;
}

// Render
function render() {
  const grid = document.getElementById('polls-grid');
  grid.innerHTML = '';

  state.polls.forEach((poll, pollIndex) => {
    const totalVotes = poll.options.reduce((s, o) => s + o.votes, 0);
    const isRevealed = state.revealed[poll.id];
    const userVote = state.userVotes[poll.id];

    const card = document.createElement('div');
    card.className = 'poll-card';
    card.style.animationDelay = `${0.1 + pollIndex * 0.1}s`;

    let optionsHTML = '';
    poll.options.forEach(opt => {
      const pct = totalVotes > 0 ? ((opt.votes / totalVotes) * 100) : 0;
      const isSelected = userVote === opt.id;
      let classes = 'option-btn';
      if (isRevealed) classes += ' voted';
      if (isSelected) classes += ' selected';
      if (isRevealed && !isSelected) classes += ' disabled';

      optionsHTML += `
        <button class="${classes}" data-poll="${poll.id}" data-option="${opt.id}" ${isRevealed ? '' : ''}>
          <div class="fill-bar" style="width: ${isRevealed ? pct : 0}%"></div>
          <div class="option-content">
            <span class="option-label">
              <span class="option-radio"></span>
              <span>${opt.label}</span>
            </span>
            <span class="option-stats ${isRevealed ? 'visible' : ''}">
              <span class="option-count" data-poll="${poll.id}" data-opt="${opt.id}">${opt.votes} votes</span>
              <span class="option-percent" data-poll="${poll.id}" data-opt-pct="${opt.id}">${pct.toFixed(1)}%</span>
            </span>
          </div>
        </button>
      `;
    });

    card.innerHTML = `
      <div class="poll-header">
        <div class="poll-emoji">${poll.emoji}</div>
        <div>
          <div class="poll-question">${poll.question}</div>
          <div class="poll-meta">${poll.category} · <span data-total="${poll.id}">${totalVotes.toLocaleString()}</span> votes</div>
        </div>
      </div>
      <div class="options-list">${optionsHTML}</div>
      <div class="vote-action">
        <button class="vote-btn" data-poll-vote="${poll.id}" ${userVote ? 'disabled' : ''}>
          ${userVote ? '✓ Voted' : 'Cast Vote'}
        </button>
        <button class="change-vote-btn ${isRevealed ? 'visible' : ''}" data-change="${poll.id}">Change vote</button>
      </div>
    `;

    grid.appendChild(card);
  });

  // Attach events
  document.querySelectorAll('.option-btn').forEach(btn => {
    btn.addEventListener('click', handleOptionClick);
  });
  document.querySelectorAll('.vote-btn').forEach(btn => {
    btn.addEventListener('click', handleVote);
  });
  document.querySelectorAll('.change-vote-btn').forEach(btn => {
    btn.addEventListener('click', handleChangeVote);
  });

  updateStats();
}

function handleOptionClick(e) {
  const btn = e.currentTarget;
  const pollId = parseInt(btn.dataset.poll);
  const optionId = btn.dataset.option;

  if (state.revealed[pollId]) return;

  // Deselect others in same poll
  document.querySelectorAll(`.option-btn[data-poll="${pollId}"]`).forEach(b => {
    b.classList.remove('selected');
  });
  btn.classList.add('selected');

  // Temporarily store selection
  state.userVotes[pollId] = optionId;

  // Enable vote button
  const voteBtn = document.querySelector(`.vote-btn[data-poll-vote="${pollId}"]`);
  if (voteBtn) {
    voteBtn.disabled = false;
    voteBtn.textContent = 'Cast Vote';
  }
}

function handleVote(e) {
  const btn = e.currentTarget;
  const pollId = parseInt(btn.dataset.pollVote);
  const optionId = state.userVotes[pollId];

  if (!optionId || state.revealed[pollId]) return;

  // Ripple effect
  const ripple = document.createElement('span');
  ripple.className = 'ripple';
  const rect = btn.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  ripple.style.left = x + 'px';
  ripple.style.top = y + 'px';
  btn.appendChild(ripple);
  setTimeout(() => ripple.remove(), 600);

  // Add vote
  const poll = state.polls.find(p => p.id === pollId);
  const option = poll.options.find(o => o.id === optionId);

  // Simulate other votes coming in
  const extraVotes = Math.floor(Math.random() * 5) + 1;
  option.votes += 1;
  poll.options.forEach(o => {
    if (o.id !== optionId) {
      o.votes += Math.floor(Math.random() * 3);
    }
  });

  state.revealed[pollId] = true;
  state.userVoteCount++;

  // Re-render to show results
  render();

  // Animate results after render
  requestAnimationFrame(() => {
    setTimeout(() => {
      animateResults(pollId);
    }, 50);
  });

  // Confetti!
  launchConfetti(btn);

  // Toast
  showToast(`🎉 Vote recorded! Thanks for participating!`);
}

function handleChangeVote(e) {
  const pollId = parseInt(e.currentTarget.dataset.change);
  delete state.userVotes[pollId];
  delete state.revealed[pollId];
  state.userVoteCount--;

  // Subtract the user's previous vote from counts (approximate - just re-render with original data)
  const poll = state.polls.find(p => p.id === pollId);
  const originalPoll = pollsData.find(p => p.id === pollId);
  // Reset votes to original minus any accumulated
  // Actually, let's just keep the current votes but allow re-voting
  render();
  showToast('🔄 Vote removed. Pick again!');
}

function animateResults(pollId) {
  const poll = state.polls.find(p => p.id === pollId);
  const totalVotes = poll.options.reduce((s, o) => s + o.votes, 0);

  // Animate each option's fill bar and numbers
  poll.options.forEach((opt, i) => {
    const pct = totalVotes > 0 ? ((opt.votes / totalVotes) * 100) : 0;
    const fillBar = document.querySelector(`.option-btn[data-poll="${pollId}"][data-option="${opt.id}"] .fill-bar`);
    const countEl = document.querySelector(`[data-poll="${pollId}"][data-opt="${opt.id}"]`);
    const pctEl = document.querySelector(`[data-poll="${pollId}"][data-opt-pct="${opt.id}"]`);

    if (fillBar) {
      setTimeout(() => {
        fillBar.style.width = pct + '%';
      }, i * 100);
    }

    // Animate count number
    if (countEl) {
      animateNumber(countEl, 0, opt.votes, 800, i * 100, v => v + ' votes');
    }
    if (pctEl) {
      animateNumber(pctEl, 0, pct, 800, i * 100, v => v.toFixed(1) + '%');
    }
  });

  // Animate total
  const totalEl = document.querySelector(`[data-total="${pollId}"]`);
  if (totalEl) {
    animateNumber(totalEl, 0, totalVotes, 800, 0, v => v.toLocaleString());
  }
}

function animateNumber(el, from, to, duration, delay, formatter) {
  setTimeout(() => {
    const start = performance.now();
    el.classList.add('count-pulse');

    function update(now) {
      const elapsed = now - start;
      const progress = Math.min(elapsed / duration, 1);
      // Ease out cubic
      const eased = 1 - Math.pow(1 - progress, 3);
      const current = from + (to - from) * eased;
      el.textContent = formatter(Math.round(current * 10) / 10);

      if (progress < 1) {
        requestAnimationFrame(update);
      } else {
        el.textContent = formatter(to);
        setTimeout(() => el.classList.remove('count-pulse'), 400);
      }
    }
    requestAnimationFrame(update);
  }, delay);
}

function updateStats() {
  const communityTotal = getCommunityTotal();
  const el = document.getElementById('community-votes');
  const currentVal = parseInt(el.textContent.replace(/,/g, '')) || 0;
  if (currentVal !== communityTotal) {
    animateNumber(el, currentVal, communityTotal, 600, 0, v => v.toLocaleString());
  }
  document.getElementById('total-votes').textContent = state.userVoteCount;
}

// Toast
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}

// Confetti
function launchConfetti(origin) {
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const rect = origin.getBoundingClientRect();
  const startX = rect.left + rect.width / 2;
  const startY = rect.top + rect.height / 2;

  const colors = ['#7c3aed', '#ec4899', '#f59e0b', '#10b981', '#3b82f6', '#ef4444', '#fbbf24', '#a78bfa'];
  const particles = [];

  for (let i = 0; i < 60; i++) {
    const angle = (Math.random() * Math.PI * 2);
    const velocity = 3 + Math.random() * 6;
    particles.push({
      x: startX,
      y: startY,
      vx: Math.cos(angle) * velocity,
      vy: Math.sin(angle) * velocity - 3,
      color: colors[Math.floor(Math.random() * colors.length)],
      size: 4 + Math.random() * 6,
      rotation: Math.random() * 360,
      rotationSpeed: (Math.random() - 0.5) * 10,
      life: 1,
      decay: 0.015 + Math.random() * 0.01,
      shape: Math.random() > 0.5 ? 'rect' : 'circle'
    });
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;

    particles.forEach(p => {
      if (p.life <= 0) return;
      alive = true;

      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.15; // gravity
      p.vx *= 0.99;
      p.rotation += p.rotationSpeed;
      p.life -= p.decay;

      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate((p.rotation * Math.PI) / 180);
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;

      if (p.shape === 'rect') {
        ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      } else {
        ctx.beginPath();
        ctx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    });

    if (alive) {
      requestAnimationFrame(animate);
    } else {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
  }
  animate();
}

// Handle window resize for confetti canvas
window.addEventListener('resize', () => {
  const canvas = document.getElementById('confetti-canvas');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
