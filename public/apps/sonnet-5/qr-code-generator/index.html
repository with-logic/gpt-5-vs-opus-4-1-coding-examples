<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Custom QR Code Generator</title>
<script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel-2: #1e222b;
    --border: #2a2f3a;
    --text: #eef0f4;
    --muted: #9aa3b2;
    --accent: #6c8cff;
    --accent-2: #8b5cf6;
    --radius: 16px;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
  }

  body {
    background:
      radial-gradient(1200px 600px at 15% -10%, rgba(108,140,255,0.16), transparent 60%),
      radial-gradient(1000px 700px at 110% 10%, rgba(139,92,246,0.14), transparent 55%),
      var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, Helvetica, Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 20px;
  }

  .app {
    width: 100%;
    max-width: 1080px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 28px;
    align-items: stretch;
  }

  @media (max-width: 860px) {
    .app {
      grid-template-columns: 1fr;
    }
  }

  .header {
    grid-column: 1 / -1;
    text-align: center;
    margin-bottom: 4px;
  }

  .header h1 {
    font-size: 28px;
    font-weight: 700;
    margin: 0 0 6px;
    letter-spacing: -0.02em;
    background: linear-gradient(90deg, #fff, #c9d3ff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .header p {
    margin: 0;
    color: var(--muted);
    font-size: 14.5px;
  }

  .panel {
    background: linear-gradient(180deg, var(--panel), var(--panel-2));
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 26px;
    box-shadow: 0 20px 60px -20px rgba(0,0,0,0.6);
  }

  .controls {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .field label {
    display: block;
    font-size: 12.5px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 8px;
  }

  textarea#text-input {
    width: 100%;
    min-height: 92px;
    resize: vertical;
    background: #0e1117;
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-size: 15px;
    padding: 12px 14px;
    font-family: inherit;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }

  textarea#text-input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(108,140,255,0.18);
  }

  .row {
    display: flex;
    gap: 16px;
  }

  .row .field { flex: 1; }

  .color-field {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #0e1117;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 8px 10px;
  }

  .color-field input[type="color"] {
    -webkit-appearance: none;
    appearance: none;
    width: 38px;
    height: 38px;
    border: none;
    background: none;
    cursor: pointer;
    border-radius: 8px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .color-field input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
  .color-field input[type="color"]::-webkit-color-swatch {
    border: 2px solid var(--border);
    border-radius: 8px;
  }

  .color-field input[type="text"] {
    flex: 1;
    min-width: 0;
    background: transparent;
    border: none;
    color: var(--text);
    font-size: 14px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    padding: 6px 2px;
  }
  .color-field input[type="text"]:focus { outline: none; }

  .field-select select {
    width: 100%;
    background: #0e1117;
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-size: 14.5px;
    padding: 11px 14px;
    font-family: inherit;
    cursor: pointer;
    appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%239aa3b2' stroke-width='2'><path d='M6 9l6 6 6-6'/></svg>");
    background-repeat: no-repeat;
    background-position: right 14px center;
  }
  .field-select select:focus { outline: none; border-color: var(--accent); }

  .slider-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  input[type="range"] {
    flex: 1;
    -webkit-appearance: none;
    height: 4px;
    border-radius: 999px;
    background: var(--border);
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    cursor: pointer;
    border: 2px solid #fff;
    box-shadow: 0 2px 6px rgba(0,0,0,0.4);
  }
  input[type="range"]::-moz-range-thumb {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    cursor: pointer;
    border: 2px solid #fff;
  }

  .slider-value {
    width: 48px;
    text-align: right;
    font-variant-numeric: tabular-nums;
    color: var(--muted);
    font-size: 13.5px;
    flex-shrink: 0;
  }

  .swap-btn {
    margin-top: 2px;
    align-self: flex-start;
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 12.5px;
    padding: 7px 12px;
    border-radius: 9px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: all 0.15s ease;
  }
  .swap-btn:hover {
    border-color: var(--accent);
    color: var(--text);
  }

  .preview-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }

  .preview-frame {
    background: #ffffff;
    border-radius: 18px;
    padding: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    aspect-ratio: 1 / 1;
    max-width: 380px;
    box-shadow: 0 10px 40px -10px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(0,0,0,0.04);
    transition: box-shadow 0.2s ease;
  }

  #qr-canvas {
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
  }

  .empty-state {
    color: #b9bec7;
    font-size: 14px;
    text-align: center;
    padding: 20px;
  }

  .download-row {
    display: flex;
    gap: 10px;
    width: 100%;
    max-width: 380px;
  }

  button.primary {
    flex: 1;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #fff;
    border: none;
    font-weight: 600;
    font-size: 15px;
    padding: 13px 20px;
    border-radius: 12px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: transform 0.12s ease, box-shadow 0.12s ease, opacity 0.12s ease;
    box-shadow: 0 8px 24px -8px rgba(108,140,255,0.6);
  }
  button.primary:hover { transform: translateY(-1px); box-shadow: 0 12px 28px -8px rgba(108,140,255,0.7); }
  button.primary:active { transform: translateY(0); }
  button.primary:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .meta-text {
    color: var(--muted);
    font-size: 12.5px;
    text-align: center;
    min-height: 16px;
  }

  .footer-note {
    grid-column: 1 / -1;
    text-align: center;
    color: #5c6373;
    font-size: 12px;
    margin-top: 4px;
  }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <h1>Custom QR Code Generator</h1>
    <p>Turn any text or URL into a downloadable QR code, styled your way.</p>
  </div>

  <div class="panel controls">
    <div class="field">
      <label for="text-input">Text or URL</label>
      <textarea id="text-input" placeholder="https://example.com or any text...">https://claude.ai</textarea>
    </div>

    <div class="row">
      <div class="field">
        <label for="fg-text">Foreground</label>
        <div class="color-field">
          <input type="color" id="fg-color" value="#000000" />
          <input type="text" id="fg-text" value="#000000" spellcheck="false" />
        </div>
      </div>
      <div class="field">
        <label for="bg-text">Background</label>
        <div class="color-field">
          <input type="color" id="bg-color" value="#ffffff" />
          <input type="text" id="bg-text" value="#ffffff" spellcheck="false" />
        </div>
      </div>
    </div>

    <button class="swap-btn" id="swap-colors" type="button">⇅ Swap colors</button>

    <div class="field field-select">
      <label for="ec-level">Error Correction</label>
      <select id="ec-level">
        <option value="L">Low (L) — smallest code</option>
        <option value="M" selected>Medium (M) — balanced</option>
        <option value="Q">Quartile (Q) — sturdier</option>
        <option value="H">High (H) — most resilient</option>
      </select>
    </div>

    <div class="field">
      <label for="size-slider">Download Size — <span id="size-label">512</span>px</label>
      <div class="slider-row">
        <input type="range" id="size-slider" min="128" max="2048" step="64" value="512" />
      </div>
    </div>

    <div class="field">
      <label for="margin-slider">Quiet Margin — <span id="margin-label">4</span> modules</label>
      <div class="slider-row">
        <input type="range" id="margin-slider" min="0" max="10" step="1" value="4" />
      </div>
    </div>
  </div>

  <div class="panel preview-panel">
    <div class="preview-frame" id="preview-frame">
      <canvas id="qr-canvas"></canvas>
    </div>
    <div class="meta-text" id="meta-text">Ready</div>
    <div class="download-row">
      <button class="primary" id="download-btn" type="button">⭳ Download PNG</button>
    </div>
  </div>

  <div class="footer-note">Generated entirely in your browser — nothing is sent to a server.</div>
</div>

<script>
(function () {
  const textInput = document.getElementById('text-input');
  const fgColor = document.getElementById('fg-color');
  const fgText = document.getElementById('fg-text');
  const bgColor = document.getElementById('bg-color');
  const bgText = document.getElementById('bg-text');
  const ecLevel = document.getElementById('ec-level');
  const sizeSlider = document.getElementById('size-slider');
  const sizeLabel = document.getElementById('size-label');
  const marginSlider = document.getElementById('margin-slider');
  const marginLabel = document.getElementById('margin-label');
  const canvas = document.getElementById('qr-canvas');
  const metaText = document.getElementById('meta-text');
  const downloadBtn = document.getElementById('download-btn');
  const swapBtn = document.getElementById('swap-colors');
  const previewFrame = document.getElementById('preview-frame');

  let renderToken = 0;
  let lastGoodDataUrl = null;

  const HEX_RE = /^#([0-9a-f]{3}|[0-9a-f]{6})$/i;

  function normalizeHex(value, fallback) {
    const v = value.trim();
    if (HEX_RE.test(v)) {
      if (v.length === 4) {
        const r = v[1], g = v[2], b = v[3];
        return ('#' + r + r + g + g + b + b).toLowerCase();
      }
      return v.toLowerCase();
    }
    return fallback;
  }

  function syncColorPair(colorInput, textInputEl) {
    textInputEl.value = colorInput.value;
  }

  fgColor.addEventListener('input', () => { syncColorPair(fgColor, fgText); render(); });
  bgColor.addEventListener('input', () => { syncColorPair(bgColor, bgText); render(); });

  fgText.addEventListener('input', () => {
    const norm = normalizeHex(fgText.value, null);
    if (norm) fgColor.value = norm;
    render();
  });
  bgText.addEventListener('input', () => {
    const norm = normalizeHex(bgText.value, null);
    if (norm) bgColor.value = norm;
    render();
  });

  fgText.addEventListener('blur', () => {
    fgText.value = normalizeHex(fgText.value, fgColor.value);
  });
  bgText.addEventListener('blur', () => {
    bgText.value = normalizeHex(bgText.value, bgColor.value);
  });

  swapBtn.addEventListener('click', () => {
    const f = fgColor.value;
    const b = bgColor.value;
    fgColor.value = b;
    bgColor.value = f;
    fgText.value = b;
    bgText.value = f;
    render();
  });

  sizeSlider.addEventListener('input', () => {
    sizeLabel.textContent = sizeSlider.value;
    render();
  });

  marginSlider.addEventListener('input', () => {
    marginLabel.textContent = marginSlider.value;
    render();
  });

  [textInput, ecLevel].forEach(el => el.addEventListener('input', render));

  function debounce(fn, wait) {
    let t;
    return function (...args) {
      clearTimeout(t);
      t = setTimeout(() => fn.apply(this, args), wait);
    };
  }

  const debouncedRender = debounce(render, 120);
  textInput.addEventListener('input', debouncedRender);

  function setEmptyState() {
    const ctx = canvas.getContext('2d');
    canvas.width = 320;
    canvas.height = 320;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    metaText.textContent = 'Enter text or a URL to generate a QR code';
    downloadBtn.disabled = true;
    lastGoodDataUrl = null;
  }

  function render() {
    const text = textInput.value;
    if (!text || !text.trim()) {
      setEmptyState();
      return;
    }

    const token = ++renderToken;
    const size = parseInt(sizeSlider.value, 10);
    const marginModules = parseInt(marginSlider.value, 10);
    const fg = HEX_RE.test(fgText.value.trim()) ? fgColor.value : fgColor.value;
    const bg = HEX_RE.test(bgText.value.trim()) ? bgColor.value : bgColor.value;
    const level = ecLevel.value;

    try {
      // QRious padding is in pixels; approximate "quiet zone modules" by
      // scaling against a nominal 25-module estimate for the rendered size.
      const padding = Math.round((marginModules / 25) * size);

      const offscreen = document.createElement('canvas');
      const qr = new QRious({
        element: offscreen,
        value: text,
        size: size,
        foreground: fg,
        background: bg,
        level: level,
        padding: marginModules === 0 ? 0 : padding
      });

      if (token !== renderToken) return;

      canvas.width = offscreen.width;
      canvas.height = offscreen.height;
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(offscreen, 0, 0);

      lastGoodDataUrl = offscreen.toDataURL('image/png');
      downloadBtn.disabled = false;

      const bytes = new Blob([text]).size;
      metaText.textContent = `${size}×${size}px · Level ${level} · ${bytes} byte${bytes === 1 ? '' : 's'} encoded`;
    } catch (err) {
      if (token !== renderToken) return;
      const ctx = canvas.getContext('2d');
      canvas.width = 320;
      canvas.height = 320;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      downloadBtn.disabled = true;
      lastGoodDataUrl = null;
      if (err && /too (big|long)|overflow|capacity/i.test(err.message || '')) {
        metaText.textContent = 'Text is too long for a QR code — try shortening it or lowering error correction.';
      } else {
        metaText.textContent = 'Could not generate QR code for this input.';
      }
    }
  }

  downloadBtn.addEventListener('click', () => {
    if (!lastGoodDataUrl) return;
    const a = document.createElement('a');
    a.href = lastGoodDataUrl;
    a.download = 'qrcode.png';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  });

  render();
})();
</script>

</body>
</html>
