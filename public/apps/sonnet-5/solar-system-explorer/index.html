<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solar System Explorer</title>
<style>
  :root {
    --bg: #04050a;
    --panel-bg: rgba(10, 14, 26, 0.82);
    --panel-border: rgba(120, 160, 255, 0.18);
    --accent: #6cb8ff;
    --accent-soft: rgba(108, 184, 255, 0.15);
    --text: #e8edf7;
    --text-dim: #8993ab;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    overflow: hidden;
  }

  #app {
    position: relative;
    width: 100vw;
    height: 100vh;
  }

  canvas {
    display: block;
    touch-action: none;
  }

  /* ---------- Header ---------- */
  #header {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    padding: 18px 26px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    pointer-events: none;
    z-index: 10;
    background: linear-gradient(to bottom, rgba(2,3,8,0.85), rgba(2,3,8,0));
  }

  #header h1 {
    margin: 0;
    font-size: 19px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: var(--text);
    text-shadow: 0 0 18px rgba(108,184,255,0.35);
  }

  #header h1 span {
    color: var(--accent);
  }

  #header .subtitle {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
    letter-spacing: 0.3px;
  }

  #hint {
    pointer-events: none;
    position: absolute;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    color: var(--text-dim);
    background: rgba(8,10,20,0.55);
    padding: 8px 16px;
    border-radius: 20px;
    border: 1px solid var(--panel-border);
    backdrop-filter: blur(6px);
    transition: opacity 0.6s ease;
    z-index: 10;
  }

  /* ---------- Control Panel ---------- */
  #controls {
    position: absolute;
    top: 18px;
    right: 18px;
    width: 250px;
    background: var(--panel-bg);
    border: 1px solid var(--panel-border);
    border-radius: 14px;
    padding: 16px 18px;
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    z-index: 20;
  }

  #controls h2 {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    margin: 0 0 12px 0;
    font-weight: 600;
  }

  .control-row {
    margin-bottom: 14px;
  }

  .control-row:last-child {
    margin-bottom: 0;
  }

  .control-label {
    display: flex;
    justify-content: space-between;
    font-size: 12.5px;
    color: var(--text);
    margin-bottom: 6px;
  }

  .control-label .val {
    color: var(--accent);
    font-variant-numeric: tabular-nums;
  }

  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    border-radius: 2px;
    background: rgba(255,255,255,0.12);
    outline: none;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    box-shadow: 0 0 8px rgba(108,184,255,0.7);
    border: 2px solid #0a0e1a;
  }

  input[type="range"]::-moz-range-thumb {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: 2px solid #0a0e1a;
    box-shadow: 0 0 8px rgba(108,184,255,0.7);
  }

  .btn-row {
    display: flex;
    gap: 8px;
    margin-top: 4px;
  }

  button {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--panel-border);
    color: var(--text);
    font-size: 12px;
    padding: 8px 6px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s, transform 0.1s;
  }

  button:hover {
    background: var(--accent-soft);
    border-color: var(--accent);
  }

  button:active {
    transform: scale(0.96);
  }

  button.active {
    background: var(--accent-soft);
    border-color: var(--accent);
    color: var(--accent);
  }

  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12.5px;
  }

  .switch {
    position: relative;
    width: 36px;
    height: 20px;
    flex-shrink: 0;
  }

  .switch input {
    opacity: 0;
    width: 0;
    height: 0;
  }

  .slider-toggle {
    position: absolute;
    cursor: pointer;
    inset: 0;
    background: rgba(255,255,255,0.15);
    border-radius: 20px;
    transition: 0.2s;
  }

  .slider-toggle::before {
    content: "";
    position: absolute;
    width: 14px;
    height: 14px;
    left: 3px;
    top: 3px;
    background: white;
    border-radius: 50%;
    transition: 0.2s;
  }

  .switch input:checked + .slider-toggle {
    background: var(--accent);
  }

  .switch input:checked + .slider-toggle::before {
    transform: translateX(16px);
  }

  hr.divider {
    border: none;
    border-top: 1px solid var(--panel-border);
    margin: 14px 0;
  }

  /* ---------- Planet Quick-select ---------- */
  #planet-list {
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 20;
  }

  .planet-chip {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--panel-bg);
    border: 1px solid var(--panel-border);
    border-radius: 20px;
    padding: 6px 14px 6px 6px;
    cursor: pointer;
    font-size: 12px;
    color: var(--text-dim);
    transition: all 0.2s;
    backdrop-filter: blur(8px);
    white-space: nowrap;
  }

  .planet-chip:hover {
    border-color: var(--accent);
    color: var(--text);
    transform: translateX(4px);
  }

  .planet-chip.selected {
    color: var(--text);
    border-color: var(--accent);
    background: var(--accent-soft);
  }

  .chip-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 0 8px currentColor;
  }

  /* ---------- Info Panel ---------- */
  #info-panel {
    position: absolute;
    bottom: 18px;
    right: 18px;
    width: 320px;
    max-width: calc(100vw - 36px);
    background: var(--panel-bg);
    border: 1px solid var(--panel-border);
    border-radius: 14px;
    padding: 20px 22px;
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    z-index: 20;
    transform: translateY(calc(100% + 30px));
    opacity: 0;
    transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.3s ease;
    pointer-events: none;
  }

  #info-panel.visible {
    transform: translateY(0);
    opacity: 1;
    pointer-events: auto;
  }

  #info-panel .close-btn {
    position: absolute;
    top: 14px;
    right: 14px;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--panel-border);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 13px;
    color: var(--text-dim);
    flex: none;
    padding: 0;
  }

  #info-panel .close-btn:hover {
    color: var(--text);
    background: rgba(255,255,255,0.12);
  }

  #info-name {
    font-size: 22px;
    font-weight: 700;
    margin: 0 0 2px 0;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  #info-swatch {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    box-shadow: 0 0 10px currentColor;
  }

  #info-type {
    font-size: 11.5px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--accent);
    margin-bottom: 10px;
  }

  #info-desc {
    font-size: 13px;
    line-height: 1.55;
    color: #c4cbdc;
    margin: 0 0 14px 0;
  }

  #info-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px 16px;
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .stat .stat-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text-dim);
  }

  .stat .stat-value {
    font-size: 13.5px;
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }

  /* ---------- Loading ---------- */
  #loading {
    position: absolute;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    transition: opacity 0.6s ease;
  }

  #loading .ring {
    width: 46px;
    height: 46px;
    border: 2px solid rgba(108,184,255,0.15);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
    margin-bottom: 18px;
  }

  #loading p {
    font-size: 13px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  #tooltip {
    position: absolute;
    pointer-events: none;
    background: rgba(8,10,20,0.9);
    border: 1px solid var(--panel-border);
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 12px;
    color: var(--text);
    z-index: 30;
    transform: translate(-50%, -130%);
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.15s ease;
  }

  #tooltip.visible {
    opacity: 1;
  }

  @media (max-width: 720px) {
    #controls { width: 190px; padding: 12px 14px; font-size: 11px; }
    #planet-list { display: none; }
    #info-panel { width: calc(100vw - 36px); }
    #header h1 { font-size: 15px; }
  }
</style>
</head>
<body>
<div id="app">
  <div id="loading">
    <div class="ring"></div>
    <p>Charting the solar system&hellip;</p>
  </div>

  <div id="header">
    <div>
      <h1>Solar <span>System</span> Explorer</h1>
      <div class="subtitle">Drag to orbit &middot; Scroll to zoom &middot; Click a planet</div>
    </div>
  </div>

  <div id="planet-list"></div>

  <div id="controls">
    <h2>Controls</h2>

    <div class="control-row">
      <div class="control-label"><span>Orbit Speed</span><span class="val" id="speed-val">1.0&times;</span></div>
      <input type="range" id="speed-slider" min="0" max="5" step="0.05" value="1">
    </div>

    <div class="control-row">
      <div class="control-label"><span>Zoom</span><span class="val" id="zoom-val"></span></div>
      <input type="range" id="zoom-slider" min="20" max="400" step="1" value="140">
    </div>

    <hr class="divider">

    <div class="control-row toggle-row">
      <span>Show Orbit Paths</span>
      <label class="switch">
        <input type="checkbox" id="toggle-orbits" checked>
        <span class="slider-toggle"></span>
      </label>
    </div>

    <div class="control-row toggle-row" style="margin-top:10px;">
      <span>Show Labels</span>
      <label class="switch">
        <input type="checkbox" id="toggle-labels" checked>
        <span class="slider-toggle"></span>
      </label>
    </div>

    <hr class="divider">

    <div class="btn-row">
      <button id="pause-btn">Pause</button>
      <button id="reset-btn">Reset View</button>
    </div>
  </div>

  <div id="tooltip"></div>

  <div id="info-panel">
    <button class="close-btn" id="info-close">&times;</button>
    <h3 id="info-name"><span id="info-swatch"></span><span id="info-name-text"></span></h3>
    <div id="info-type"></div>
    <p id="info-desc"></p>
    <div id="info-stats"></div>
  </div>

  <div id="hint">Click any planet to learn more about it</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function() {
  "use strict";

  /* ===================== Planet Data ===================== */
  const PLANET_DATA = [
    {
      name: "Mercury", color: 0x9c9c9c, glow: "#b5b5b5",
      radius: 1.6, distance: 28, orbitSpeed: 4.15, rotSpeed: 0.004, tilt: 0.001,
      type: "Terrestrial Planet",
      desc: "The smallest and innermost planet, Mercury is a cratered, airless world that swings between scorching days and frigid nights.",
      stats: { "Diameter": "4,879 km", "Day Length": "59 Earth days", "Year Length": "88 Earth days", "Moons": "0", "Avg. Temp": "167°C", "Distance from Sun": "57.9M km" }
    },
    {
      name: "Venus", color: 0xe8c27e, glow: "#e8c27e",
      radius: 2.4, distance: 40, orbitSpeed: 1.62, rotSpeed: -0.002, tilt: 3.1,
      type: "Terrestrial Planet",
      desc: "Venus is shrouded in thick, toxic clouds that trap heat in a runaway greenhouse effect, making it the hottest planet in the solar system.",
      stats: { "Diameter": "12,104 km", "Day Length": "243 Earth days", "Year Length": "225 Earth days", "Moons": "0", "Avg. Temp": "464°C", "Distance from Sun": "108.2M km" }
    },
    {
      name: "Earth", color: 0x3a8eea, glow: "#3a8eea",
      radius: 2.5, distance: 55, orbitSpeed: 1, rotSpeed: 0.02, tilt: 0.41,
      type: "Terrestrial Planet",
      desc: "Our home. The only known world with liquid surface water, a breathable atmosphere, and life — a vivid blue marble against the dark.",
      stats: { "Diameter": "12,742 km", "Day Length": "24 hours", "Year Length": "365.25 days", "Moons": "1", "Avg. Temp": "15°C", "Distance from Sun": "149.6M km" }
    },
    {
      name: "Mars", color: 0xc1440e, glow: "#c1440e",
      radius: 2.0, distance: 72, orbitSpeed: 0.53, rotSpeed: 0.018, tilt: 0.44,
      type: "Terrestrial Planet",
      desc: "The Red Planet's iron oxide dust gives it a rusty hue. Home to the solar system's tallest volcano and evidence of ancient riverbeds.",
      stats: { "Diameter": "6,779 km", "Day Length": "24.6 hours", "Year Length": "687 Earth days", "Moons": "2", "Avg. Temp": "-65°C", "Distance from Sun": "227.9M km" }
    },
    {
      name: "Jupiter", color: 0xd9b38c, glow: "#d9b38c",
      radius: 7.2, distance: 100, orbitSpeed: 0.084, rotSpeed: 0.04, tilt: 0.05,
      type: "Gas Giant",
      desc: "The largest planet in the solar system, a turbulent ball of hydrogen and helium famous for its Great Red Spot — a storm larger than Earth.",
      stats: { "Diameter": "139,820 km", "Day Length": "9.9 hours", "Year Length": "11.9 Earth years", "Moons": "95", "Avg. Temp": "-110°C", "Distance from Sun": "778.5M km" }
    },
    {
      name: "Saturn", color: 0xe3c989, glow: "#e3c989",
      radius: 6.2, distance: 138, orbitSpeed: 0.034, rotSpeed: 0.038, tilt: 0.47,
      type: "Gas Giant",
      desc: "Famous for its dazzling ring system made of ice and rock, Saturn is the least dense planet — it would float in a big enough bathtub.",
      stats: { "Diameter": "116,460 km", "Day Length": "10.7 hours", "Year Length": "29.4 Earth years", "Moons": "146", "Avg. Temp": "-140°C", "Distance from Sun": "1.43B km" },
      hasRings: true
    },
    {
      name: "Uranus", color: 0x9fe3e3, glow: "#9fe3e3",
      radius: 4.2, distance: 168, orbitSpeed: 0.012, rotSpeed: -0.03, tilt: 1.71,
      type: "Ice Giant",
      desc: "Uranus rotates almost completely on its side, likely the result of an ancient collision, giving it the most extreme seasons of any planet.",
      stats: { "Diameter": "50,724 km", "Day Length": "17.2 hours", "Year Length": "84 Earth years", "Moons": "27", "Avg. Temp": "-195°C", "Distance from Sun": "2.87B km" }
    },
    {
      name: "Neptune", color: 0x4f6fe8, glow: "#4f6fe8",
      radius: 4.1, distance: 195, orbitSpeed: 0.006, rotSpeed: 0.032, tilt: 0.49,
      type: "Ice Giant",
      desc: "The most distant planet, Neptune is battered by the fastest winds in the solar system, reaching up to 2,100 km/h.",
      stats: { "Diameter": "49,244 km", "Day Length": "16.1 hours", "Year Length": "164.8 Earth years", "Moons": "16", "Avg. Temp": "-200°C", "Distance from Sun": "4.5B km" }
    }
  ];

  /* ===================== Scene Setup ===================== */
  const app = document.getElementById('app');
  const scene = new THREE.Scene();

  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 4000);

  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  app.insertBefore(renderer.domElement, app.firstChild);

  /* ---------- Starfield ---------- */
  function buildStarfield() {
    const starGeo = new THREE.BufferGeometry();
    const count = 6000;
    const positions = new Float32Array(count * 3);
    const colors = new Float32Array(count * 3);
    for (let i = 0; i < count; i++) {
      const radius = 600 + Math.random() * 1400;
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos((Math.random() * 2) - 1);
      positions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
      positions[i * 3 + 1] = radius * Math.cos(phi);
      positions[i * 3 + 2] = radius * Math.sin(phi) * Math.sin(theta);
      const c = 0.6 + Math.random() * 0.4;
      colors[i * 3] = c;
      colors[i * 3 + 1] = c;
      colors[i * 3 + 2] = c + Math.random() * 0.15;
    }
    starGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    starGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    const starMat = new THREE.PointsMaterial({
      size: 1.4,
      vertexColors: true,
      transparent: true,
      opacity: 0.85,
      sizeAttenuation: true
    });
    const stars = new THREE.Points(starGeo, starMat);
    scene.add(stars);
  }
  buildStarfield();

  /* ---------- Lighting ---------- */
  scene.add(new THREE.AmbientLight(0x202040, 0.6));
  const sunLight = new THREE.PointLight(0xffffff, 3.2, 0, 0);
  scene.add(sunLight);

  /* ---------- Sun ---------- */
  const sunGroup = new THREE.Group();
  const sunGeo = new THREE.SphereGeometry(12, 48, 48);
  const sunMat = new THREE.MeshBasicMaterial({ color: 0xffd27a });
  const sunMesh = new THREE.Mesh(sunGeo, sunMat);
  sunGroup.add(sunMesh);

  // sun glow sprite
  function makeGlowTexture() {
    const size = 256;
    const canvas = document.createElement('canvas');
    canvas.width = size; canvas.height = size;
    const ctx = canvas.getContext('2d');
    const grd = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
    grd.addColorStop(0, 'rgba(255,220,150,0.9)');
    grd.addColorStop(0.4, 'rgba(255,180,90,0.35)');
    grd.addColorStop(1, 'rgba(255,140,60,0)');
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, size, size);
    return new THREE.CanvasTexture(canvas);
  }
  const glowTex = makeGlowTexture();
  const glowMat = new THREE.SpriteMaterial({ map: glowTex, transparent: true, depthWrite: false });
  const glowSprite = new THREE.Sprite(glowMat);
  glowSprite.scale.set(70, 70, 1);
  sunGroup.add(glowSprite);
  scene.add(sunGroup);

  /* ---------- Orbit rings ---------- */
  const orbitLines = [];
  function buildOrbitRing(distance) {
    const segments = 128;
    const points = [];
    for (let i = 0; i <= segments; i++) {
      const a = (i / segments) * Math.PI * 2;
      points.push(new THREE.Vector3(Math.cos(a) * distance, 0, Math.sin(a) * distance));
    }
    const geo = new THREE.BufferGeometry().setFromPoints(points);
    const mat = new THREE.LineBasicMaterial({ color: 0x4a5a7a, transparent: true, opacity: 0.35 });
    const line = new THREE.LineLoop(geo, mat);
    scene.add(line);
    orbitLines.push(line);
  }

  /* ---------- Label sprites ---------- */
  function makeLabelTexture(text) {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    const fontSize = 48;
    ctx.font = `600 ${fontSize}px Segoe UI, Arial, sans-serif`;
    const metrics = ctx.measureText(text);
    canvas.width = Math.ceil(metrics.width) + 40;
    canvas.height = fontSize + 30;
    ctx.font = `600 ${fontSize}px Segoe UI, Arial, sans-serif`;
    ctx.fillStyle = 'rgba(232,237,247,0.92)';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(108,184,255,0.8)';
    ctx.shadowBlur = 12;
    ctx.fillText(text, 20, canvas.height / 2);
    const tex = new THREE.CanvasTexture(canvas);
    tex.needsUpdate = true;
    return { tex, w: canvas.width, h: canvas.height };
  }

  /* ===================== Planets ===================== */
  const planets = [];

  PLANET_DATA.forEach((data, idx) => {
    const orbitGroup = new THREE.Group();
    const angle0 = Math.random() * Math.PI * 2;
    orbitGroup.rotation.y = angle0;

    const planetGroup = new THREE.Group();
    planetGroup.position.set(data.distance, 0, 0);

    const geo = new THREE.SphereGeometry(data.radius, 40, 40);
    const mat = new THREE.MeshStandardMaterial({
      color: data.color,
      roughness: 0.85,
      metalness: 0.05,
      emissive: new THREE.Color(data.color),
      emissiveIntensity: 0.06
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.rotation.z = data.tilt;
    mesh.userData = { isPlanet: true, index: idx };
    planetGroup.add(mesh);

    // subtle atmosphere glow for some planets
    if (data.name === "Earth" || data.name === "Venus") {
      const atmGeo = new THREE.SphereGeometry(data.radius * 1.12, 32, 32);
      const atmMat = new THREE.MeshBasicMaterial({ color: data.color, transparent: true, opacity: 0.12, side: THREE.BackSide });
      const atmMesh = new THREE.Mesh(atmGeo, atmMat);
      planetGroup.add(atmMesh);
    }

    // Saturn rings
    if (data.hasRings) {
      const ringGeo = new THREE.RingGeometry(data.radius * 1.5, data.radius * 2.5, 64);
      const pos = ringGeo.attributes.position;
      const v3 = new THREE.Vector3();
      const uv = ringGeo.attributes.uv;
      for (let i = 0; i < pos.count; i++) {
        v3.fromBufferAttribute(pos, i);
        const dist = v3.length();
        const t = (dist - data.radius * 1.5) / (data.radius * 1.0);
        uv.setXY(i, t, 0.5);
      }
      const ringCanvas = document.createElement('canvas');
      ringCanvas.width = 256; ringCanvas.height = 4;
      const rctx = ringCanvas.getContext('2d');
      const grad = rctx.createLinearGradient(0, 0, 256, 0);
      grad.addColorStop(0, 'rgba(227,201,137,0.1)');
      grad.addColorStop(0.3, 'rgba(227,201,137,0.7)');
      grad.addColorStop(0.5, 'rgba(180,160,110,0.3)');
      grad.addColorStop(0.7, 'rgba(227,201,137,0.6)');
      grad.addColorStop(1, 'rgba(227,201,137,0.05)');
      rctx.fillStyle = grad;
      rctx.fillRect(0, 0, 256, 4);
      const ringTex = new THREE.CanvasTexture(ringCanvas);
      const ringMat = new THREE.MeshBasicMaterial({
        map: ringTex, side: THREE.DoubleSide, transparent: true
      });
      const ringMesh = new THREE.Mesh(ringGeo, ringMat);
      ringMesh.rotation.x = Math.PI / 2 - 0.38;
      planetGroup.add(ringMesh);
    }

    // label sprite
    const labelData = makeLabelTexture(data.name);
    const labelMat = new THREE.SpriteMaterial({ map: labelData.tex, transparent: true, depthWrite: false, depthTest: false });
    const labelSprite = new THREE.Sprite(labelMat);
    const labelScale = 0.045;
    labelSprite.scale.set(labelData.w * labelScale, labelData.h * labelScale, 1);
    labelSprite.position.set(0, data.radius + 3.2, 0);
    labelSprite.renderOrder = 999;
    planetGroup.add(labelSprite);

    orbitGroup.add(planetGroup);
    scene.add(orbitGroup);
    buildOrbitRing(data.distance);

    planets.push({
      data, mesh, planetGroup, orbitGroup, labelSprite,
      angle: angle0
    });
  });

  /* ===================== Camera / Controls (custom orbit controls) ===================== */
  let camDistance = 140;
  let camTheta = 0.9;   // azimuth
  let camPhi = 1.15;    // polar
  const minPhi = 0.25, maxPhi = Math.PI - 0.25;
  let camTarget = new THREE.Vector3(0, 0, 0);

  function updateCameraPosition() {
    const sinPhi = Math.sin(camPhi);
    const x = camTarget.x + camDistance * sinPhi * Math.cos(camTheta);
    const y = camTarget.y + camDistance * Math.cos(camPhi);
    const z = camTarget.z + camDistance * sinPhi * Math.sin(camTheta);
    camera.position.set(x, y, z);
    camera.lookAt(camTarget);
  }
  updateCameraPosition();

  /* ---------- Drag to rotate ---------- */
  let isDragging = false;
  let lastX = 0, lastY = 0;
  let dragMoved = false;

  function onPointerDown(x, y) {
    isDragging = true;
    dragMoved = false;
    lastX = x; lastY = y;
  }
  function onPointerMove(x, y) {
    if (!isDragging) {
      handleHover(x, y);
      return;
    }
    const dx = x - lastX;
    const dy = y - lastY;
    if (Math.abs(dx) > 2 || Math.abs(dy) > 2) dragMoved = true;
    camTheta -= dx * 0.005;
    camPhi -= dy * 0.005;
    camPhi = Math.max(minPhi, Math.min(maxPhi, camPhi));
    lastX = x; lastY = y;
    updateCameraPosition();
  }
  function onPointerUp() {
    isDragging = false;
  }

  const canvasEl = renderer.domElement;
  canvasEl.addEventListener('mousedown', (e) => onPointerDown(e.clientX, e.clientY));
  window.addEventListener('mousemove', (e) => onPointerMove(e.clientX, e.clientY));
  window.addEventListener('mouseup', (e) => {
    onPointerUp();
  });

  canvasEl.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) {
      onPointerDown(e.touches[0].clientX, e.touches[0].clientY);
    }
  }, { passive: true });
  canvasEl.addEventListener('touchmove', (e) => {
    if (e.touches.length === 1) {
      onPointerMove(e.touches[0].clientX, e.touches[0].clientY);
    }
  }, { passive: true });
  canvasEl.addEventListener('touchend', onPointerUp);

  /* ---------- Zoom ---------- */
  const zoomSlider = document.getElementById('zoom-slider');
  const zoomVal = document.getElementById('zoom-val');

  function setZoom(value) {
    camDistance = value;
    zoomSlider.value = value;
    zoomVal.textContent = Math.round(value) + " units";
    updateCameraPosition();
  }

  canvasEl.addEventListener('wheel', (e) => {
    e.preventDefault();
    const delta = e.deltaY * 0.08;
    let newDist = camDistance + delta;
    newDist = Math.max(20, Math.min(400, newDist));
    setZoom(newDist);
  }, { passive: false });

  zoomSlider.addEventListener('input', (e) => {
    setZoom(parseFloat(e.target.value));
  });

  setZoom(140);

  /* ===================== Click detection ===================== */
  const raycaster = new THREE.Raycaster();
  const mouseNDC = new THREE.Vector2();
  const tooltip = document.getElementById('tooltip');

  function getPlanetMeshes() {
    return planets.map(p => p.mesh);
  }

  function handleHover(clientX, clientY) {
    const rect = canvasEl.getBoundingClientRect();
    mouseNDC.x = ((clientX - rect.left) / rect.width) * 2 - 1;
    mouseNDC.y = -((clientY - rect.top) / rect.height) * 2 + 1;
    raycaster.setFromCamera(mouseNDC, camera);
    const intersects = raycaster.intersectObjects(getPlanetMeshes());
    if (intersects.length > 0) {
      canvasEl.style.cursor = 'pointer';
      const idx = intersects[0].object.userData.index;
      tooltip.textContent = PLANET_DATA[idx].name;
      tooltip.style.left = clientX + 'px';
      tooltip.style.top = clientY + 'px';
      tooltip.classList.add('visible');
    } else {
      canvasEl.style.cursor = 'grab';
      tooltip.classList.remove('visible');
    }
  }

  function handleClick(clientX, clientY) {
    if (dragMoved) return;
    const rect = canvasEl.getBoundingClientRect();
    mouseNDC.x = ((clientX - rect.left) / rect.width) * 2 - 1;
    mouseNDC.y = -((clientY - rect.top) / rect.height) * 2 + 1;
    raycaster.setFromCamera(mouseNDC, camera);
    const intersects = raycaster.intersectObjects(getPlanetMeshes());
    if (intersects.length > 0) {
      const idx = intersects[0].object.userData.index;
      selectPlanet(idx);
    }
  }

  canvasEl.addEventListener('click', (e) => handleClick(e.clientX, e.clientY));

  /* ===================== Info Panel ===================== */
  const infoPanel = document.getElementById('info-panel');
  const infoNameText = document.getElementById('info-name-text');
  const infoSwatch = document.getElementById('info-swatch');
  const infoType = document.getElementById('info-type');
  const infoDesc = document.getElementById('info-desc');
  const infoStats = document.getElementById('info-stats');
  const infoClose = document.getElementById('info-close');
  const hintEl = document.getElementById('hint');

  let selectedIndex = -1;

  function selectPlanet(idx) {
    selectedIndex = idx;
    const data = PLANET_DATA[idx];
    const colorHex = '#' + data.color.toString(16).padStart(6, '0');

    infoNameText.textContent = data.name;
    infoSwatch.style.background = colorHex;
    infoSwatch.style.color = colorHex;
    infoType.textContent = data.type;
    infoDesc.textContent = data.desc;

    infoStats.innerHTML = '';
    Object.entries(data.stats).forEach(([label, value]) => {
      const statEl = document.createElement('div');
      statEl.className = 'stat';
      statEl.innerHTML = `<span class="stat-label">${label}</span><span class="stat-value">${value}</span>`;
      infoStats.appendChild(statEl);
    });

    infoPanel.classList.add('visible');
    updateChipSelection();
    hintEl.style.opacity = '0';

    // focus camera target smoothly toward the planet's current world position (snap target, keep distance/angles)
    const p = planets[idx];
    const worldPos = new THREE.Vector3();
    p.mesh.getWorldPosition(worldPos);
    flyTarget(worldPos);
  }

  infoClose.addEventListener('click', () => {
    infoPanel.classList.remove('visible');
    selectedIndex = -1;
    updateChipSelection();
    flyTarget(new THREE.Vector3(0,0,0));
  });

  /* smooth target transition */
  let targetFrom = new THREE.Vector3(0,0,0);
  let targetTo = new THREE.Vector3(0,0,0);
  let targetT = 1;
  function flyTarget(dest) {
    targetFrom = camTarget.clone();
    targetTo = dest.clone();
    targetT = 0;
  }

  /* ===================== Planet quick-select chips ===================== */
  const planetListEl = document.getElementById('planet-list');
  PLANET_DATA.forEach((data, idx) => {
    const chip = document.createElement('div');
    chip.className = 'planet-chip';
    const colorHex = '#' + data.color.toString(16).padStart(6, '0');
    chip.innerHTML = `<span class="chip-dot" style="background:${colorHex}; color:${colorHex};"></span><span>${data.name}</span>`;
    chip.addEventListener('click', () => selectPlanet(idx));
    chip.dataset.index = idx;
    planetListEl.appendChild(chip);
  });

  function updateChipSelection() {
    const chips = planetListEl.querySelectorAll('.planet-chip');
    chips.forEach((chip, i) => {
      chip.classList.toggle('selected', i === selectedIndex);
    });
  }

  /* ===================== UI: speed / orbits / labels / pause / reset ===================== */
  const speedSlider = document.getElementById('speed-slider');
  const speedVal = document.getElementById('speed-val');
  let speedMultiplier = 1;
  let paused = false;

  speedSlider.addEventListener('input', (e) => {
    speedMultiplier = parseFloat(e.target.value);
    speedVal.textContent = speedMultiplier.toFixed(2) + '×';
  });

  const toggleOrbits = document.getElementById('toggle-orbits');
  toggleOrbits.addEventListener('change', () => {
    orbitLines.forEach(line => line.visible = toggleOrbits.checked);
  });

  const toggleLabels = document.getElementById('toggle-labels');
  toggleLabels.addEventListener('change', () => {
    planets.forEach(p => p.labelSprite.visible = toggleLabels.checked);
  });

  const pauseBtn = document.getElementById('pause-btn');
  pauseBtn.addEventListener('click', () => {
    paused = !paused;
    pauseBtn.textContent = paused ? 'Resume' : 'Pause';
    pauseBtn.classList.toggle('active', paused);
  });

  const resetBtn = document.getElementById('reset-btn');
  resetBtn.addEventListener('click', () => {
    camTheta = 0.9;
    camPhi = 1.15;
    setZoom(140);
    flyTarget(new THREE.Vector3(0,0,0));
    selectedIndex = -1;
    updateChipSelection();
    infoPanel.classList.remove('visible');
  });

  /* ===================== Resize ===================== */
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  /* ===================== Animation Loop ===================== */
  const clock = new THREE.Clock();

  function animate() {
    requestAnimationFrame(animate);
    const delta = Math.min(clock.getDelta(), 0.05);

    if (!paused) {
      planets.forEach(p => {
        p.angle += delta * p.data.orbitSpeed * 0.15 * speedMultiplier;
        p.orbitGroup.rotation.y = p.angle;
        p.mesh.rotation.y += p.data.rotSpeed * speedMultiplier;
      });
      sunMesh.rotation.y += delta * 0.05;
    }

    // smooth camera target interpolation
    if (targetT < 1) {
      targetT = Math.min(1, targetT + delta * 2.2);
      const eased = 1 - Math.pow(1 - targetT, 3);
      camTarget.lerpVectors(targetFrom, targetTo, eased);
      updateCameraPosition();
    }

    // make labels always face camera (sprites already billboard automatically)
    renderer.render(scene, camera);
  }

  /* ===================== Loading screen ===================== */
  const loadingEl = document.getElementById('loading');
  setTimeout(() => {
    loadingEl.style.opacity = '0';
    setTimeout(() => { loadingEl.style.display = 'none'; }, 650);
  }, 500);

  setTimeout(() => {
    hintEl.style.opacity = '0';
  }, 6000);

  animate();
})();
</script>
</body>
</html>
