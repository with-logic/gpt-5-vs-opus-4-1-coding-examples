<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Color Match Challenge</title>
<style>
  :root {
    --bg-1: #0f0c29;
    --bg-2: #302b63;
    --bg-3: #24243e;
    --panel: rgba(255,255,255,0.06);
    --panel-border: rgba(255,255,255,0.12);
    --accent: #ffd23f;
    --danger: #ff4d6d;
    --good: #2ee6a8;
    --text: #f5f5f7;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif;
    background: linear-gradient(120deg, var(--bg-1), var(--bg-2), var(--bg-3));
    background-size: 200% 200%;
    animation: bgShift 18s ease infinite;
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    position: relative;
  }

  @keyframes bgShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* floating ambient orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.35;
    pointer-events: none;
    z-index: 0;
  }
  .orb1 { width: 380px; height: 380px; background: #ff4d6d; top: -100px; left: -100px; animation: float1 14s ease-in-out infinite; }
  .orb2 { width: 320px; height: 320px; background: #2ee6a8; bottom: -80px; right: -80px; animation: float2 16s ease-in-out infinite; }
  .orb3 { width: 260px; height: 260px; background: #4d7cff; top: 40%; right: 10%; animation: float1 20s ease-in-out infinite reverse; }

  @keyframes float1 {
    0%,100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(60px, 40px) scale(1.15); }
  }
  @keyframes float2 {
    0%,100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(-50px,-30px) scale(1.1); }
  }

  .app {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 560px;
    padding: 24px;
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 28px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.08);
    padding: 32px 28px 28px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  /* ---------- HEADER / HUD ---------- */
  .hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
    gap: 12px;
  }

  .stat {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 10px 14px;
    text-align: left;
  }

  .stat .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    opacity: 0.6;
    font-weight: 600;
  }

  .stat .value {
    font-size: 28px;
    font-weight: 800;
    line-height: 1.1;
    font-variant-numeric: tabular-nums;
  }

  #timeStat .value.low {
    color: var(--danger);
    animation: pulse 0.6s ease-in-out infinite;
  }

  @keyframes pulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.12); }
  }

  .streak-badge {
    display: inline-block;
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.2s, transform 0.2s;
  }
  .streak-badge.show {
    opacity: 1;
    transform: translateY(0);
  }

  /* ---------- WORD DISPLAY ---------- */
  .word-stage {
    position: relative;
    height: 160px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 14px;
    perspective: 600px;
  }

  .word {
    font-size: clamp(48px, 14vw, 84px);
    font-weight: 900;
    letter-spacing: 2px;
    text-shadow: 0 4px 24px rgba(0,0,0,0.35);
    will-change: transform, opacity;
    user-select: none;
  }

  .word.enter {
    animation: wordIn 0.32s cubic-bezier(.2,.9,.3,1.3);
  }

  @keyframes wordIn {
    0% { transform: scale(0.4) rotateX(40deg); opacity: 0; }
    100% { transform: scale(1) rotateX(0deg); opacity: 1; }
  }

  .word.shake {
    animation: shake 0.4s ease;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-14px); }
    40% { transform: translateX(12px); }
    60% { transform: translateX(-8px); }
    80% { transform: translateX(6px); }
  }

  .feedback-flash {
    position: absolute;
    inset: 0;
    border-radius: 28px;
    pointer-events: none;
    opacity: 0;
  }
  .feedback-flash.correct {
    background: radial-gradient(circle, rgba(46,230,168,0.35), transparent 70%);
    animation: flash 0.45s ease-out;
  }
  .feedback-flash.wrong {
    background: radial-gradient(circle, rgba(255,77,109,0.4), transparent 70%);
    animation: flash 0.45s ease-out;
  }
  @keyframes flash {
    0% { opacity: 1; }
    100% { opacity: 0; }
  }

  /* ---------- BUTTON GRID ---------- */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-top: 6px;
  }

  .color-btn {
    position: relative;
    border: none;
    border-radius: 18px;
    padding: 26px 10px;
    font-size: 19px;
    font-weight: 800;
    letter-spacing: 0.5px;
    color: rgba(0,0,0,0.75);
    cursor: pointer;
    overflow: hidden;
    transform: translateY(0) scale(1);
    transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.12s ease;
    box-shadow: 0 8px 0 rgba(0,0,0,0.25), 0 10px 20px rgba(0,0,0,0.25);
    -webkit-tap-highlight-color: transparent;
  }

  .color-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(160deg, rgba(255,255,255,0.45), rgba(255,255,255,0) 55%);
    pointer-events: none;
  }

  .color-btn:hover {
    filter: brightness(1.08);
    transform: translateY(-2px);
    box-shadow: 0 10px 0 rgba(0,0,0,0.25), 0 14px 24px rgba(0,0,0,0.3);
  }

  .color-btn:active,
  .color-btn.pressed {
    transform: translateY(6px) scale(0.97);
    box-shadow: 0 2px 0 rgba(0,0,0,0.25), 0 4px 10px rgba(0,0,0,0.2);
  }

  .color-btn.correct-flash {
    animation: correctPop 0.35s ease;
  }
  @keyframes correctPop {
    0% { transform: translateY(6px) scale(0.97); }
    50% { transform: translateY(-4px) scale(1.06); box-shadow: 0 0 0 4px rgba(46,230,168,0.6), 0 14px 24px rgba(0,0,0,0.3); }
    100% { transform: translateY(0) scale(1); }
  }
  .color-btn.wrong-flash {
    animation: wrongPop 0.4s ease;
  }
  @keyframes wrongPop {
    0%,100% { transform: translateY(0) scale(1); }
    30% { transform: translateY(2px) scale(0.95); box-shadow: 0 0 0 4px rgba(255,77,109,0.6), 0 4px 10px rgba(0,0,0,0.2); }
  }

  .color-btn .key-hint {
    position: absolute;
    top: 6px;
    right: 8px;
    font-size: 11px;
    font-weight: 700;
    background: rgba(255,255,255,0.4);
    border-radius: 6px;
    padding: 1px 6px;
    color: rgba(0,0,0,0.55);
  }

  /* ---------- START / OVERLAYS ---------- */
  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(15, 12, 41, 0.88);
    backdrop-filter: blur(6px);
    border-radius: 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px;
    text-align: center;
    z-index: 5;
    animation: overlayIn 0.3s ease;
  }

  @keyframes overlayIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .overlay h1 {
    font-size: 38px;
    margin: 0 0 6px;
    background: linear-gradient(90deg, #ff4d6d, #ffd23f, #2ee6a8, #4d7cff);
    background-size: 300% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: gradientText 6s linear infinite;
    font-weight: 900;
  }

  @keyframes gradientText {
    0% { background-position: 0% 50%; }
    100% { background-position: 300% 50%; }
  }

  .overlay p {
    opacity: 0.75;
    font-size: 15px;
    max-width: 380px;
    line-height: 1.5;
    margin: 6px 0 22px;
  }

  .overlay .score-final {
    font-size: 72px;
    font-weight: 900;
    line-height: 1;
    margin: 6px 0;
    color: var(--accent);
    text-shadow: 0 4px 30px rgba(255,210,63,0.4);
  }

  .overlay .best {
    font-size: 14px;
    opacity: 0.7;
    margin-bottom: 24px;
  }

  .overlay .best b { color: var(--good); }

  .primary-btn {
    background: linear-gradient(135deg, var(--accent), #ff9f1c);
    color: #1a1a1a;
    border: none;
    font-weight: 800;
    font-size: 18px;
    padding: 16px 42px;
    border-radius: 999px;
    cursor: pointer;
    box-shadow: 0 8px 0 #c97800, 0 12px 24px rgba(0,0,0,0.35);
    transition: transform 0.12s ease, box-shadow 0.12s ease;
    letter-spacing: 0.5px;
  }
  .primary-btn:hover { transform: translateY(-2px); }
  .primary-btn:active {
    transform: translateY(6px);
    box-shadow: 0 2px 0 #c97800, 0 4px 10px rgba(0,0,0,0.3);
  }

  .hidden { display: none !important; }

  .footer-hint {
    margin-top: 18px;
    font-size: 12px;
    opacity: 0.45;
    letter-spacing: 0.3px;
  }

  /* responsive */
  @media (max-width: 420px) {
    .card { padding: 24px 16px 20px; border-radius: 22px; }
    .word { font-size: clamp(40px, 16vw, 64px); }
    .color-btn { padding: 22px 8px; font-size: 16px; }
    .overlay .score-final { font-size: 56px; }
    .overlay h1 { font-size: 30px; }
  }
</style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="app">
  <div class="card" id="card">

    <div class="feedback-flash" id="flash"></div>

    <!-- START OVERLAY -->
    <div class="overlay" id="startOverlay">
      <h1>COLOR MATCH</h1>
      <p>A word appears in a random color. Tap the button matching the <b>color of the text</b> — not what it spells. Score as many as you can in 30 seconds!</p>
      <button class="primary-btn" id="startBtn">Start Game</button>
      <div class="footer-hint" id="bestHintStart"></div>
    </div>

    <!-- END OVERLAY -->
    <div class="overlay hidden" id="endOverlay">
      <h1 id="endTitle">TIME'S UP!</h1>
      <div class="score-final" id="finalScore">0</div>
      <div class="best" id="bestLine"></div>
      <button class="primary-btn" id="restartBtn">Play Again</button>
    </div>

    <!-- HUD -->
    <div class="hud">
      <div class="stat" id="scoreStat">
        <div class="label">Score</div>
        <div class="value" id="scoreValue">0</div>
      </div>
      <div class="stat" id="timeStat">
        <div class="label">Time</div>
        <div class="value" id="timeValue">30</div>
      </div>
      <div class="stat" id="streakStat">
        <div class="label">Streak</div>
        <div class="value" id="streakValue">0</div>
      </div>
    </div>

    <!-- WORD -->
    <div class="word-stage">
      <div class="word" id="wordEl">RED</div>
    </div>
    <div class="streak-badge" id="streakBadge">🔥 Combo!</div>

    <!-- BUTTON GRID -->
    <div class="grid" id="grid"></div>

  </div>
</div>

<script>
(function () {
  'use strict';

  const COLORS = [
    { name: 'RED',    hex: '#ff4d6d', key: '1' },
    { name: 'BLUE',   hex: '#4d7cff', key: '2' },
    { name: 'GREEN',  hex: '#2ee6a8', key: '3' },
    { name: 'YELLOW', hex: '#ffd23f', key: '4' },
    { name: 'PURPLE', hex: '#b06cff', key: '5' },
    { name: 'ORANGE', hex: '#ff991c', key: '6' }
  ];

  const GAME_LENGTH = 30;

  const scoreValue = document.getElementById('scoreValue');
  const timeValue = document.getElementById('timeValue');
  const timeStat = document.getElementById('timeStat');
  const streakValue = document.getElementById('streakValue');
  const streakBadge = document.getElementById('streakBadge');
  const wordEl = document.getElementById('wordEl');
  const grid = document.getElementById('grid');
  const flash = document.getElementById('flash');
  const startOverlay = document.getElementById('startOverlay');
  const endOverlay = document.getElementById('endOverlay');
  const startBtn = document.getElementById('startBtn');
  const restartBtn = document.getElementById('restartBtn');
  const finalScore = document.getElementById('finalScore');
  const bestLine = document.getElementById('bestLine');
  const bestHintStart = document.getElementById('bestHintStart');
  const endTitle = document.getElementById('endTitle');

  let score = 0;
  let streak = 0;
  let timeLeft = GAME_LENGTH;
  let timerId = null;
  let currentTarget = null; // the hex color the word is rendered in (the correct answer)
  let playing = false;
  let acceptingInput = false;
  let best = Number(localStorage.getItem('colorMatchBest') || 0);

  function shuffled(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function updateBestHint() {
    if (best > 0) {
      bestHintStart.textContent = 'Best score: ' + best;
    } else {
      bestHintStart.textContent = 'Press 1-6 keys or tap to answer';
    }
  }
  updateBestHint();

  function buildGrid() {
    grid.innerHTML = '';
    COLORS.forEach((c) => {
      const btn = document.createElement('button');
      btn.className = 'color-btn';
      btn.style.background = c.hex;
      btn.dataset.hex = c.hex;
      btn.dataset.name = c.name;
      btn.innerHTML = c.name + '<span class="key-hint">' + c.key + '</span>';
      btn.addEventListener('click', () => handleAnswer(c, btn));
      grid.appendChild(btn);
    });
  }
  buildGrid();

  function pickRound() {
    // word text: random color name (the "distractor" meaning)
    const wordChoice = COLORS[Math.floor(Math.random() * COLORS.length)];
    // displayed color: random hex, can match or mismatch the word's meaning
    let colorChoice = COLORS[Math.floor(Math.random() * COLORS.length)];
    // bias: avoid the displayed color always equaling the word's own meaning too often
    // (keep some matches sometimes, that's fine for the "trap" game)
    currentTarget = colorChoice;

    wordEl.textContent = wordChoice.name;
    wordEl.style.color = colorChoice.hex;
    wordEl.classList.remove('enter');
    // force reflow to restart animation
    void wordEl.offsetWidth;
    wordEl.classList.add('enter');
  }

  function flashFx(kind) {
    flash.classList.remove('correct', 'wrong');
    void flash.offsetWidth;
    flash.classList.add(kind);
  }

  function setStreakBadge() {
    if (streak >= 3) {
      streakBadge.textContent = '🔥 ' + streak + ' in a row!';
      streakBadge.classList.add('show');
    } else {
      streakBadge.classList.remove('show');
    }
  }

  function handleAnswer(choice, btnEl) {
    if (!acceptingInput || !playing) return;
    const correct = choice.hex === currentTarget.hex;

    if (btnEl) {
      btnEl.classList.add(correct ? 'correct-flash' : 'wrong-flash');
      setTimeout(() => btnEl.classList.remove('correct-flash', 'wrong-flash'), 400);
    }

    if (correct) {
      acceptingInput = false;
      score++;
      streak++;
      scoreValue.textContent = score;
      streakValue.textContent = streak;
      flashFx('correct');
      setStreakBadge();
      scoreValue.parentElement.style.transform = 'scale(1.06)';
      setTimeout(() => { scoreValue.parentElement.style.transform = 'scale(1)'; }, 150);
      setTimeout(() => {
        if (playing) {
          pickRound();
          acceptingInput = true;
        }
      }, 180);
    } else {
      streak = 0;
      streakValue.textContent = streak;
      setStreakBadge();
      flashFx('wrong');
      wordEl.classList.remove('shake');
      void wordEl.offsetWidth;
      wordEl.classList.add('shake');
    }
  }

  function tick() {
    timeLeft--;
    timeValue.textContent = timeLeft;
    if (timeLeft <= 5) {
      timeStat.querySelector('.value').classList.add('low');
    }
    if (timeLeft <= 0) {
      endGame();
    }
  }

  function startGame() {
    score = 0;
    streak = 0;
    timeLeft = GAME_LENGTH;
    scoreValue.textContent = '0';
    streakValue.textContent = '0';
    timeValue.textContent = String(GAME_LENGTH);
    timeStat.querySelector('.value').classList.remove('low');
    streakBadge.classList.remove('show');
    startOverlay.classList.add('hidden');
    endOverlay.classList.add('hidden');
    playing = true;
    acceptingInput = true;
    pickRound();
    clearInterval(timerId);
    timerId = setInterval(tick, 1000);
  }

  function endGame() {
    playing = false;
    acceptingInput = false;
    clearInterval(timerId);
    const isNewBest = score > best;
    if (isNewBest) {
      best = score;
      localStorage.setItem('colorMatchBest', String(best));
    }
    finalScore.textContent = score;
    endTitle.textContent = isNewBest && score > 0 ? "NEW BEST! 🎉" : "TIME'S UP!";
    bestLine.innerHTML = 'Best score: <b>' + best + '</b>';
    endOverlay.classList.remove('hidden');
    updateBestHint();
  }

  startBtn.addEventListener('click', startGame);
  restartBtn.addEventListener('click', startGame);

  document.addEventListener('keydown', (e) => {
    const idx = COLORS.findIndex((c) => c.key === e.key);
    if (idx === -1) return;
    if (!playing || !acceptingInput) return;
    const btn = grid.children[idx];
    handleAnswer(COLORS[idx], btn);
  });

})();
</script>
</body>
</html>
