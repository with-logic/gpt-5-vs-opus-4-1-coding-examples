<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Escape the Maze</title>
<style>
  :root {
    --bg-deep: #0b0e1a;
    --bg-panel: #131825;
    --accent: #5eead4;
    --accent2: #a78bfa;
    --wall: #2b3354;
    --wall-glow: #4a5694;
    --text: #e7eaf6;
    --muted: #8b93b8;
    --gold: #fbbf24;
    --danger: #fb7185;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: radial-gradient(1200px 800px at 50% -10%, #1a2140 0%, var(--bg-deep) 55%, #07090f 100%);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, Roboto, sans-serif;
    overflow-x: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100%;
    padding: 24px 16px 48px;
  }

  .title {
    text-align: center;
    margin: 6px 0 4px;
  }

  .title h1 {
    font-size: clamp(28px, 5vw, 42px);
    margin: 0;
    letter-spacing: 1px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    font-weight: 800;
    text-shadow: 0 0 40px rgba(94, 234, 212, 0.15);
  }

  .title p {
    margin: 4px 0 0;
    color: var(--muted);
    font-size: 14px;
    letter-spacing: 0.5px;
  }

  .layout {
    display: flex;
    gap: 22px;
    align-items: flex-start;
    margin-top: 18px;
    flex-wrap: wrap;
    justify-content: center;
    width: 100%;
    max-width: 1100px;
  }

  .panel {
    background: linear-gradient(180deg, var(--bg-panel), #0e1220);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.04);
    padding: 16px;
  }

  .stats-panel {
    width: 230px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .stat {
    background: rgba(255,255,255,0.03);
    border-radius: 10px;
    padding: 10px 14px;
    border: 1px solid rgba(255,255,255,0.05);
  }

  .stat-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .stat-value {
    font-size: 24px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }

  .stat-value.timer { color: var(--accent); }
  .stat-value.moves { color: var(--accent2); }
  .stat-value.best { color: var(--gold); }

  .difficulty-row {
    display: flex;
    gap: 6px;
  }

  .diff-btn {
    flex: 1;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--muted);
    padding: 8px 4px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    transition: all 0.15s ease;
  }

  .diff-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }

  .diff-btn.active {
    background: linear-gradient(135deg, var(--accent), #14b8a6);
    color: #06251f;
    border-color: transparent;
  }

  button.action {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.3px;
    transition: transform 0.1s ease, box-shadow 0.15s ease;
  }

  button.action:active { transform: scale(0.97); }

  .btn-replay {
    background: linear-gradient(135deg, var(--accent2), #7c3aed);
    color: #fff;
    box-shadow: 0 4px 16px rgba(167, 139, 250, 0.35);
  }

  .btn-replay:hover { box-shadow: 0 6px 22px rgba(167, 139, 250, 0.5); }

  .btn-new {
    background: linear-gradient(135deg, var(--accent), #0d9488);
    color: #042b25;
    box-shadow: 0 4px 16px rgba(94, 234, 212, 0.3);
  }

  .btn-new:hover { box-shadow: 0 6px 22px rgba(94, 234, 212, 0.45); }

  .legend {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.8;
  }

  .legend span.dot {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 3px;
    margin-right: 6px;
    vertical-align: middle;
  }

  .maze-wrap {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  canvas#maze {
    border-radius: 12px;
    background: #0a0d18;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.06), 0 20px 60px rgba(0,0,0,0.6);
    touch-action: none;
  }

  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 12px;
    background: rgba(6, 8, 16, 0.86);
    backdrop-filter: blur(3px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s ease;
  }

  .overlay.show {
    opacity: 1;
    pointer-events: auto;
  }

  .overlay-card {
    text-align: center;
    padding: 28px 36px;
    animation: popIn 0.4s cubic-bezier(.2,1.4,.4,1);
  }

  @keyframes popIn {
    from { transform: scale(0.85) translateY(10px); opacity: 0; }
    to { transform: scale(1) translateY(0); opacity: 1; }
  }

  .overlay-card h2 {
    margin: 0 0 6px;
    font-size: 30px;
    background: linear-gradient(90deg, var(--gold), #fde68a);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .overlay-card .sub {
    color: var(--muted);
    margin-bottom: 18px;
    font-size: 14px;
  }

  .result-grid {
    display: flex;
    gap: 18px;
    justify-content: center;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .result-item {
    background: rgba(255,255,255,0.04);
    border-radius: 10px;
    padding: 10px 18px;
    min-width: 90px;
  }

  .result-item .v { font-size: 20px; font-weight: 700; }
  .result-item .l { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

  .bonus-badge {
    display: inline-block;
    margin: 4px 0 16px;
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }

  .bonus-perfect {
    background: linear-gradient(135deg, var(--gold), #f59e0b);
    color: #3b2406;
    box-shadow: 0 0 24px rgba(251, 191, 36, 0.45);
  }

  .bonus-good {
    background: rgba(94, 234, 212, 0.15);
    color: var(--accent);
    border: 1px solid rgba(94, 234, 212, 0.3);
  }

  .bonus-ok {
    background: rgba(167, 139, 250, 0.15);
    color: var(--accent2);
    border: 1px solid rgba(167, 139, 250, 0.3);
  }

  .overlay-actions {
    display: flex;
    gap: 10px;
    justify-content: center;
  }

  .overlay-actions button {
    padding: 10px 22px;
    border-radius: 9px;
    border: none;
    font-weight: 700;
    cursor: pointer;
    font-size: 14px;
  }

  .mobile-controls {
    display: none;
    margin-top: 16px;
    user-select: none;
  }

  .mobile-controls .row { display: flex; justify-content: center; gap: 8px; }

  .mobile-controls button {
    width: 56px;
    height: 56px;
    border-radius: 12px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text);
    font-size: 22px;
    margin: 4px;
    cursor: pointer;
  }

  .mobile-controls button:active { background: rgba(94,234,212,0.25); }

  .hint {
    margin-top: 14px;
    color: var(--muted);
    font-size: 13px;
    text-align: center;
  }

  .hint kbd {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 12px;
  }

  @media (max-width: 720px) {
    .layout { flex-direction: column; align-items: center; }
    .stats-panel { width: 100%; max-width: 360px; order: 2; }
    .maze-wrap { order: 1; }
    .mobile-controls { display: block; }
  }
</style>
</head>
<body>

<div class="title">
  <h1>ESCAPE THE MAZE</h1>
  <p>Find the fastest path from start to finish</p>
</div>

<div class="layout">
  <div class="panel stats-panel">
    <div class="stat">
      <div class="stat-label">Time</div>
      <div class="stat-value timer" id="timerDisplay">00:00.0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Moves</div>
      <div class="stat-value moves" id="movesDisplay">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Shortest Path</div>
      <div class="stat-value best" id="bestDisplay">—</div>
    </div>

    <div>
      <div class="stat-label" style="margin-bottom:6px;">Difficulty</div>
      <div class="difficulty-row" id="difficultyRow">
        <div class="diff-btn" data-size="11">Easy</div>
        <div class="diff-btn active" data-size="17">Normal</div>
        <div class="diff-btn" data-size="25">Hard</div>
        <div class="diff-btn" data-size="35">Insane</div>
      </div>
    </div>

    <button class="action btn-replay" id="replayBtn">↻ Replay This Maze</button>
    <button class="action btn-new" id="newBtn">⚡ New Maze</button>

    <div class="legend">
      <div><span class="dot" style="background:#34d399;"></span>Start</div>
      <div><span class="dot" style="background:#f87171;"></span>Goal</div>
      <div><span class="dot" style="background:#5eead4;"></span>Your trail</div>
    </div>
  </div>

  <div class="maze-wrap">
    <canvas id="maze"></canvas>
    <div class="overlay" id="winOverlay">
      <div class="overlay-card">
        <h2>🎉 Maze Escaped!</h2>
        <div class="sub" id="winSub">You made it out</div>
        <div class="result-grid">
          <div class="result-item"><div class="v" id="finalTime">0.0s</div><div class="l">Time</div></div>
          <div class="result-item"><div class="v" id="finalMoves">0</div><div class="l">Moves</div></div>
          <div class="result-item"><div class="v" id="finalShortest">0</div><div class="l">Shortest</div></div>
        </div>
        <div id="bonusBadge" class="bonus-badge bonus-good">Nice run!</div>
        <div class="overlay-actions">
          <button class="btn-replay" id="overlayReplay">↻ Replay</button>
          <button class="btn-new" id="overlayNew">⚡ New Maze</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="mobile-controls" id="mobileControls">
  <div class="row"><button data-dir="up">↑</button></div>
  <div class="row">
    <button data-dir="left">←</button>
    <button data-dir="down">↓</button>
    <button data-dir="right">→</button>
  </div>
</div>

<div class="hint">Use <kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd> or <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> to move. Reach the red goal as fast as possible!</div>

<script>
(function () {
  'use strict';

  // ----------------------------- Maze generation -----------------------------
  // Each cell stores which walls are present: top, right, bottom, left
  function generateMaze(size) {
    const cells = [];
    for (let y = 0; y < size; y++) {
      const row = [];
      for (let x = 0; x < size; x++) {
        row.push({ top: true, right: true, bottom: true, left: true, visited: false });
      }
      cells.push(row);
    }

    // Iterative randomized DFS (recursive backtracker)
    const stack = [];
    let current = { x: 0, y: 0 };
    cells[0][0].visited = true;
    let visitedCount = 1;
    const total = size * size;

    function neighbors(cx, cy) {
      const list = [];
      if (cy > 0 && !cells[cy - 1][cx].visited) list.push({ x: cx, y: cy - 1, dir: 'top' });
      if (cx < size - 1 && !cells[cy][cx + 1].visited) list.push({ x: cx + 1, y: cy, dir: 'right' });
      if (cy < size - 1 && !cells[cy + 1][cx].visited) list.push({ x: cx, y: cy + 1, dir: 'bottom' });
      if (cx > 0 && !cells[cy][cx - 1].visited) list.push({ x: cx - 1, y: cy, dir: 'left' });
      return list;
    }

    const opposite = { top: 'bottom', right: 'left', bottom: 'top', left: 'right' };

    while (visitedCount < total) {
      const ns = neighbors(current.x, current.y);
      if (ns.length > 0) {
        const pick = ns[Math.floor(Math.random() * ns.length)];
        cells[current.y][current.x][pick.dir] = false;
        cells[pick.y][pick.x][opposite[pick.dir]] = false;
        cells[pick.y][pick.x].visited = true;
        visitedCount++;
        stack.push(current);
        current = { x: pick.x, y: pick.y };
      } else if (stack.length > 0) {
        current = stack.pop();
      } else {
        break;
      }
    }

    // Add a few extra random connections to create loops (more interesting, multiple paths)
    const extraConnections = Math.floor(size * size * 0.04);
    for (let i = 0; i < extraConnections; i++) {
      const rx = Math.floor(Math.random() * size);
      const ry = Math.floor(Math.random() * size);
      const dirs = ['top', 'right', 'bottom', 'left'];
      const dir = dirs[Math.floor(Math.random() * dirs.length)];
      let nx = rx, ny = ry;
      if (dir === 'top') ny--;
      if (dir === 'bottom') ny++;
      if (dir === 'left') nx--;
      if (dir === 'right') nx++;
      if (nx >= 0 && nx < size && ny >= 0 && ny < size) {
        cells[ry][rx][dir] = false;
        cells[ny][nx][opposite[dir]] = false;
      }
    }

    return cells;
  }

  function shortestPathLength(cells, size, start, goal) {
    const dist = Array.from({ length: size }, () => new Array(size).fill(-1));
    const queue = [start];
    dist[start.y][start.x] = 0;
    let head = 0;
    while (head < queue.length) {
      const { x, y } = queue[head++];
      const cell = cells[y][x];
      const moves = [];
      if (!cell.top) moves.push({ x, y: y - 1 });
      if (!cell.right) moves.push({ x: x + 1, y });
      if (!cell.bottom) moves.push({ x, y: y + 1 });
      if (!cell.left) moves.push({ x: x - 1, y });
      for (const m of moves) {
        if (dist[m.y][m.x] === -1) {
          dist[m.y][m.x] = dist[y][x] + 1;
          queue.push(m);
        }
      }
    }
    return dist[goal.y][goal.x];
  }

  // ----------------------------- Game state -----------------------------
  const canvas = document.getElementById('maze');
  const ctx = canvas.getContext('2d');

  let mazeSize = 17;
  let cellPx = 0;
  let cells = null;
  let player = { x: 0, y: 0 };
  let start = { x: 0, y: 0 };
  let goal = { x: 0, y: 0 };
  let trail = [];
  let moves = 0;
  let shortest = 0;
  let timerStart = null;
  let timerInterval = null;
  let elapsed = 0;
  let gameWon = false;
  let gameStarted = false;
  let particles = [];

  const timerDisplay = document.getElementById('timerDisplay');
  const movesDisplay = document.getElementById('movesDisplay');
  const bestDisplay = document.getElementById('bestDisplay');
  const winOverlay = document.getElementById('winOverlay');

  function computeCanvasSize() {
    const maxDim = Math.min(window.innerWidth - 32, 640);
    const available = Math.min(maxDim, window.innerHeight - 280);
    return Math.max(280, Math.min(640, available));
  }

  function setupCanvas() {
    const total = computeCanvasSize();
    cellPx = Math.floor(total / mazeSize);
    const px = cellPx * mazeSize;
    const dpr = window.devicePixelRatio || 1;
    canvas.width = px * dpr;
    canvas.height = px * dpr;
    canvas.style.width = px + 'px';
    canvas.style.height = px + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function newMaze(size) {
    if (size) mazeSize = size;
    cells = generateMaze(mazeSize);
    start = { x: 0, y: 0 };
    goal = { x: mazeSize - 1, y: mazeSize - 1 };
    shortest = shortestPathLength(cells, mazeSize, start, goal);
    bestDisplay.textContent = shortest;
    resetRun(true);
    setupCanvas();
    draw();
  }

  function resetRun(freshMaze) {
    player = { x: start.x, y: start.y };
    trail = [{ x: start.x, y: start.y }];
    moves = 0;
    elapsed = 0;
    gameWon = false;
    gameStarted = false;
    particles = [];
    clearInterval(timerInterval);
    timerInterval = null;
    timerStart = null;
    updateStatsDisplay();
    winOverlay.classList.remove('show');
    draw();
  }

  function updateStatsDisplay() {
    const mins = Math.floor(elapsed / 60000);
    const secs = ((elapsed % 60000) / 1000).toFixed(1);
    timerDisplay.textContent = `${String(mins).padStart(2, '0')}:${secs.padStart(4, '0')}`;
    movesDisplay.textContent = moves;
  }

  function startTimerIfNeeded() {
    if (!gameStarted) {
      gameStarted = true;
      timerStart = performance.now();
      timerInterval = setInterval(() => {
        elapsed = performance.now() - timerStart;
        updateStatsDisplay();
      }, 50);
    }
  }

  function tryMove(dx, dy) {
    if (gameWon || !cells) return;
    const cell = cells[player.y][player.x];
    let allowed = false;
    if (dx === 1 && !cell.right) allowed = true;
    if (dx === -1 && !cell.left) allowed = true;
    if (dy === 1 && !cell.bottom) allowed = true;
    if (dy === -1 && !cell.top) allowed = true;
    if (!allowed) {
      bumpEffect(dx, dy);
      return;
    }
    startTimerIfNeeded();
    player = { x: player.x + dx, y: player.y + dy };
    moves++;
    trail.push({ x: player.x, y: player.y });
    updateStatsDisplay();
    spawnTrailParticle();
    draw();

    if (player.x === goal.x && player.y === goal.y) {
      win();
    }
  }

  let bumpAnim = null;
  function bumpEffect(dx, dy) {
    bumpAnim = { dx, dy, t: 0 };
    requestAnimationFrame(animateBump);
  }

  function animateBump() {
    if (!bumpAnim) return;
    bumpAnim.t += 1;
    draw();
    if (bumpAnim.t < 6) {
      requestAnimationFrame(animateBump);
    } else {
      bumpAnim = null;
      draw();
    }
  }

  function spawnTrailParticle() {
    particles.push({ x: player.x, y: player.y, life: 1 });
  }

  function win() {
    gameWon = true;
    clearInterval(timerInterval);
    elapsed = performance.now() - timerStart;
    updateStatsDisplay();
    showWinOverlay();
  }

  function showWinOverlay() {
    const finalTime = document.getElementById('finalTime');
    const finalMoves = document.getElementById('finalMoves');
    const finalShortest = document.getElementById('finalShortest');
    const bonusBadge = document.getElementById('bonusBadge');
    const winSub = document.getElementById('winSub');

    finalTime.textContent = (elapsed / 1000).toFixed(1) + 's';
    finalMoves.textContent = moves;
    finalShortest.textContent = shortest;

    const ratio = moves / shortest;
    bonusBadge.className = 'bonus-badge';
    if (moves === shortest) {
      bonusBadge.textContent = '⭐ PERFECT — Shortest Path Bonus!';
      bonusBadge.classList.add('bonus-perfect');
      winSub.textContent = 'Flawless! You found the optimal route.';
    } else if (ratio <= 1.25) {
      bonusBadge.textContent = '🔥 Excellent — Nearly Optimal!';
      bonusBadge.classList.add('bonus-good');
      winSub.textContent = 'Very close to the shortest possible path.';
    } else if (ratio <= 1.75) {
      bonusBadge.textContent = '👍 Good Run';
      bonusBadge.classList.add('bonus-ok');
      winSub.textContent = 'Solid effort — try to shave off some moves!';
    } else {
      bonusBadge.textContent = '🧭 Escaped — Room to Improve';
      bonusBadge.classList.add('bonus-ok');
      winSub.textContent = `Optimal path was only ${shortest} moves.`;
    }

    winOverlay.classList.add('show');
  }

  // ----------------------------- Rendering -----------------------------
  function draw() {
    if (!cells) return;
    const w = cellPx * mazeSize;
    ctx.clearRect(0, 0, w, w);

    // background grid subtle
    ctx.fillStyle = '#0a0d18';
    ctx.fillRect(0, 0, w, w);

    // Draw trail
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    if (trail.length > 1) {
      ctx.beginPath();
      ctx.strokeStyle = 'rgba(94, 234, 212, 0.55)';
      ctx.lineWidth = Math.max(2, cellPx * 0.18);
      for (let i = 0; i < trail.length; i++) {
        const px = trail[i].x * cellPx + cellPx / 2;
        const py = trail[i].y * cellPx + cellPx / 2;
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.stroke();
    }

    // Draw goal glow
    drawCellGlow(goal.x, goal.y, '#f87171');
    // Draw start marker
    drawCellGlow(start.x, start.y, '#34d399');

    // Draw walls
    ctx.strokeStyle = '#4a5694';
    ctx.lineWidth = Math.max(2, cellPx * 0.09);
    ctx.lineCap = 'round';
    ctx.beginPath();
    for (let y = 0; y < mazeSize; y++) {
      for (let x = 0; x < mazeSize; x++) {
        const c = cells[y][x];
        const px = x * cellPx;
        const py = y * cellPx;
        if (c.top) { ctx.moveTo(px, py); ctx.lineTo(px + cellPx, py); }
        if (c.left) { ctx.moveTo(px, py); ctx.lineTo(px, py + cellPx); }
        if (y === mazeSize - 1 && c.bottom) { ctx.moveTo(px, py + cellPx); ctx.lineTo(px + cellPx, py + cellPx); }
        if (x === mazeSize - 1 && c.right) { ctx.moveTo(px + cellPx, py); ctx.lineTo(px + cellPx, py + cellPx); }
      }
    }
    ctx.stroke();

    // outer border highlight
    ctx.strokeStyle = '#6b78c4';
    ctx.lineWidth = Math.max(2, cellPx * 0.1);
    ctx.strokeRect(1, 1, w - 2, w - 2);

    // goal flag icon
    drawGoalIcon();

    // Draw player avatar
    let offsetX = 0, offsetY = 0;
    if (bumpAnim) {
      const intensity = Math.sin((bumpAnim.t / 6) * Math.PI) * cellPx * 0.18;
      offsetX = bumpAnim.dx * intensity;
      offsetY = bumpAnim.dy * intensity;
    }
    drawPlayer(offsetX, offsetY);
  }

  function drawCellGlow(cx, cy, color) {
    const px = cx * cellPx + cellPx / 2;
    const py = cy * cellPx + cellPx / 2;
    const r = cellPx * 0.62;
    const grad = ctx.createRadialGradient(px, py, 0, px, py, r);
    grad.addColorStop(0, color + 'AA');
    grad.addColorStop(1, color + '00');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(px, py, r, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawGoalIcon() {
    const px = goal.x * cellPx + cellPx / 2;
    const py = goal.y * cellPx + cellPx / 2;
    const s = cellPx * 0.28;
    ctx.save();
    ctx.translate(px, py);
    ctx.fillStyle = '#f87171';
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.5;
    // flag pole
    ctx.beginPath();
    ctx.moveTo(-s * 0.3, s * 0.9);
    ctx.lineTo(-s * 0.3, -s * 0.9);
    ctx.strokeStyle = '#cbd5e1';
    ctx.lineWidth = Math.max(1.5, cellPx * 0.06);
    ctx.stroke();
    // flag
    ctx.beginPath();
    ctx.moveTo(-s * 0.3, -s * 0.9);
    ctx.lineTo(s * 0.7, -s * 0.55);
    ctx.lineTo(-s * 0.3, -s * 0.2);
    ctx.closePath();
    ctx.fillStyle = '#f87171';
    ctx.fill();
    ctx.restore();
  }

  function drawPlayer(offsetX, offsetY) {
    const px = player.x * cellPx + cellPx / 2 + offsetX;
    const py = player.y * cellPx + cellPx / 2 + offsetY;
    const r = cellPx * 0.32;

    // glow
    const grad = ctx.createRadialGradient(px, py, 0, px, py, r * 2.2);
    grad.addColorStop(0, 'rgba(94, 234, 212, 0.55)');
    grad.addColorStop(1, 'rgba(94, 234, 212, 0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(px, py, r * 2.2, 0, Math.PI * 2);
    ctx.fill();

    // body
    const bodyGrad = ctx.createRadialGradient(px - r * 0.3, py - r * 0.3, r * 0.1, px, py, r);
    bodyGrad.addColorStop(0, '#a7fff0');
    bodyGrad.addColorStop(1, '#14b8a6');
    ctx.fillStyle = bodyGrad;
    ctx.beginPath();
    ctx.arc(px, py, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#0f766e';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // ----------------------------- Animation loop for subtle pulsing -----------------------------
  let pulseT = 0;
  function loop() {
    pulseT += 0.02;
    if (cells && !bumpAnim) draw();
    requestAnimationFrame(loop);
  }

  // ----------------------------- Input handling -----------------------------
  const keyMap = {
    ArrowUp: [0, -1], ArrowDown: [0, 1], ArrowLeft: [-1, 0], ArrowRight: [1, 0],
    w: [0, -1], s: [0, 1], a: [-1, 0], d: [1, 0],
    W: [0, -1], S: [0, 1], A: [-1, 0], D: [1, 0]
  };

  window.addEventListener('keydown', (e) => {
    if (keyMap[e.key]) {
      e.preventDefault();
      const [dx, dy] = keyMap[e.key];
      tryMove(dx, dy);
    }
  });

  document.getElementById('mobileControls').addEventListener('click', (e) => {
    const btn = e.target.closest('button');
    if (!btn) return;
    const dir = btn.getAttribute('data-dir');
    const map = { up: [0, -1], down: [0, 1], left: [-1, 0], right: [1, 0] };
    if (map[dir]) tryMove(map[dir][0], map[dir][1]);
  });

  // Swipe support
  let touchStart = null;
  canvas.addEventListener('touchstart', (e) => {
    const t = e.touches[0];
    touchStart = { x: t.clientX, y: t.clientY };
  }, { passive: true });
  canvas.addEventListener('touchend', (e) => {
    if (!touchStart) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - touchStart.x;
    const dy = t.clientY - touchStart.y;
    if (Math.abs(dx) > Math.abs(dy)) {
      if (Math.abs(dx) > 20) tryMove(dx > 0 ? 1 : -1, 0);
    } else {
      if (Math.abs(dy) > 20) tryMove(0, dy > 0 ? 1 : -1);
    }
    touchStart = null;
  }, { passive: true });

  // ----------------------------- Buttons -----------------------------
  document.getElementById('replayBtn').addEventListener('click', () => resetRun(false));
  document.getElementById('overlayReplay').addEventListener('click', () => resetRun(false));
  document.getElementById('newBtn').addEventListener('click', () => newMaze());
  document.getElementById('overlayNew').addEventListener('click', () => newMaze());

  document.getElementById('difficultyRow').addEventListener('click', (e) => {
    const btn = e.target.closest('.diff-btn');
    if (!btn) return;
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const size = parseInt(btn.getAttribute('data-size'), 10);
    newMaze(size);
  });

  window.addEventListener('resize', () => {
    setupCanvas();
    draw();
  });

  // ----------------------------- Init -----------------------------
  newMaze(mazeSize);
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
