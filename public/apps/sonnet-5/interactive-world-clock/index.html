<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive World Clock</title>
<style>
  :root {
    --bg: #0b0d17;
    --card-radius: 20px;
    --font: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    min-height: 100%;
    font-family: var(--font);
    background: radial-gradient(ellipse at top, #1b1f3a 0%, #0b0d17 60%, #060710 100%);
    color: #fff;
    overflow-x: hidden;
  }

  body {
    padding: 32px 20px 80px;
  }

  .app {
    max-width: 1200px;
    margin: 0 auto;
  }

  header {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 28px;
  }

  .title-block h1 {
    margin: 0;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 0.3px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .title-block h1 .globe {
    font-size: 30px;
    animation: spin 14s linear infinite;
    display: inline-block;
  }

  @keyframes spin {
    from { transform: rotateY(0deg); }
    to { transform: rotateY(360deg); }
  }

  .title-block p {
    margin: 4px 0 0;
    color: #9aa0c0;
    font-size: 14px;
  }

  .controls {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .toggle-group {
    display: flex;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 999px;
    padding: 4px;
    gap: 4px;
  }

  .toggle-group button {
    border: none;
    background: transparent;
    color: #b8bcd9;
    padding: 8px 18px;
    border-radius: 999px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.25s ease;
  }

  .toggle-group button.active {
    background: linear-gradient(135deg, #6e8cff, #a06bff);
    color: #fff;
    box-shadow: 0 4px 14px rgba(110, 140, 255, 0.4);
  }

  .add-city-btn {
    background: linear-gradient(135deg, #ff7a59, #ff5da2);
    border: none;
    color: white;
    font-weight: 700;
    font-size: 14px;
    padding: 10px 20px;
    border-radius: 999px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 6px 18px rgba(255, 90, 130, 0.35);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }

  .add-city-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 22px rgba(255, 90, 130, 0.5);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
  }

  .card {
    position: relative;
    border-radius: var(--card-radius);
    padding: 22px;
    overflow: hidden;
    isolation: isolate;
    min-height: 230px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    border: 1px solid rgba(255,255,255,0.08);
    transition: transform 0.35s ease, box-shadow 0.35s ease;
    animation: cardIn 0.5s ease backwards;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(16px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .card:hover {
    transform: translateY(-6px);
    box-shadow: 0 16px 40px rgba(0,0,0,0.45);
  }

  .card::before {
    content: "";
    position: absolute;
    inset: 0;
    z-index: -2;
    background: var(--card-bg);
    transition: background 1s ease;
  }

  .card::after {
    content: "";
    position: absolute;
    inset: 0;
    z-index: -1;
    background: rgba(0,0,0,0.18);
    backdrop-filter: blur(0px);
  }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .city-name {
    font-size: 19px;
    font-weight: 700;
    line-height: 1.2;
    text-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }

  .city-country {
    font-size: 12px;
    opacity: 0.8;
    margin-top: 2px;
    font-weight: 500;
  }

  .remove-btn {
    background: rgba(0,0,0,0.25);
    border: none;
    color: #fff;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.7;
    transition: all 0.2s ease;
    flex-shrink: 0;
  }

  .remove-btn:hover {
    opacity: 1;
    background: rgba(255,60,60,0.55);
    transform: rotate(90deg);
  }

  .icon-row {
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 6px 0;
  }

  .period-icon {
    font-size: 52px;
    filter: drop-shadow(0 4px 10px rgba(0,0,0,0.35));
    animation: float 4s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  .time-block {
    text-align: center;
  }

  .time {
    font-size: 42px;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    letter-spacing: 1px;
    text-shadow: 0 2px 12px rgba(0,0,0,0.35);
  }

  .time .secs {
    font-size: 22px;
    opacity: 0.75;
    font-weight: 600;
  }

  .meta-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12.5px;
    margin-top: 14px;
    font-weight: 600;
  }

  .date-text {
    opacity: 0.9;
  }

  .period-badge {
    background: rgba(255,255,255,0.18);
    padding: 4px 12px;
    border-radius: 999px;
    text-transform: uppercase;
    font-size: 10.5px;
    letter-spacing: 0.6px;
    backdrop-filter: blur(4px);
  }

  .offset-tag {
    position: absolute;
    top: 18px;
    right: 56px;
    font-size: 11px;
    background: rgba(0,0,0,0.25);
    padding: 4px 10px;
    border-radius: 999px;
    font-weight: 600;
    opacity: 0.85;
  }

  .sun-track {
    margin-top: 10px;
    height: 4px;
    border-radius: 4px;
    background: rgba(255,255,255,0.2);
    position: relative;
    overflow: visible;
  }

  .sun-dot {
    position: absolute;
    top: 50%;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 0 8px rgba(255,255,255,0.9);
    transform: translate(-50%, -50%);
    transition: left 1s linear;
  }

  /* Modal */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(5,6,15,0.7);
    backdrop-filter: blur(6px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
  }

  .modal-backdrop.open {
    opacity: 1;
    pointer-events: auto;
  }

  .modal {
    background: #161a2e;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 18px;
    padding: 24px;
    width: 92%;
    max-width: 420px;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    transform: translateY(20px) scale(0.96);
    transition: transform 0.25s ease;
    box-shadow: 0 30px 60px rgba(0,0,0,0.5);
  }

  .modal-backdrop.open .modal {
    transform: translateY(0) scale(1);
  }

  .modal h2 {
    margin: 0 0 14px;
    font-size: 18px;
  }

  .modal input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.06);
    color: #fff;
    font-size: 14px;
    margin-bottom: 12px;
    outline: none;
  }

  .modal input:focus {
    border-color: #8fa6ff;
  }

  .city-options {
    overflow-y: auto;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin: 0 -6px;
    padding: 0 6px;
  }

  .city-option {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 12px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s ease;
    font-size: 14px;
  }

  .city-option:hover {
    background: rgba(255,255,255,0.08);
  }

  .city-option span.tz {
    font-size: 11px;
    opacity: 0.6;
  }

  .city-option.added {
    opacity: 0.4;
    pointer-events: none;
  }

  .modal-close {
    margin-top: 14px;
    background: rgba(255,255,255,0.08);
    border: none;
    color: #fff;
    padding: 10px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 600;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #8a8fb0;
  }

  .empty-state .big {
    font-size: 48px;
    margin-bottom: 10px;
  }

  footer {
    text-align: center;
    color: #6a6f93;
    font-size: 12px;
    margin-top: 50px;
  }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 8px; }

  @media (max-width: 520px) {
    .time { font-size: 34px; }
    .period-icon { font-size: 42px; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="title-block">
      <h1><span class="globe">🌍</span> Interactive World Clock</h1>
      <p>Live local times around the globe, at a glance.</p>
    </div>
    <div class="controls">
      <div class="toggle-group" id="formatToggle">
        <button data-fmt="12" class="active">12h</button>
        <button data-fmt="24">24h</button>
      </div>
      <button class="add-city-btn" id="openModalBtn">
        <span>＋</span> Add City
      </button>
    </div>
  </header>

  <div class="grid" id="grid"></div>
  <div class="empty-state" id="emptyState" style="display:none;">
    <div class="big">🕰️</div>
    <div>No cities yet. Click "Add City" to start tracking time around the world.</div>
  </div>

  <footer>Times update every second &middot; Powered by your browser's Intl timezone engine</footer>
</div>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal">
    <h2>Add a City</h2>
    <input type="text" id="citySearch" placeholder="Search cities or timezones..." autocomplete="off">
    <div class="city-options" id="cityOptions"></div>
    <button class="modal-close" id="closeModalBtn">Cancel</button>
  </div>
</div>

<script>
(function () {
  "use strict";

  // ---- City catalog ----------------------------------------------------
  const CATALOG = [
    { name: "New York", country: "USA", tz: "America/New_York", flag: "🇺🇸" },
    { name: "Los Angeles", country: "USA", tz: "America/Los_Angeles", flag: "🇺🇸" },
    { name: "Chicago", country: "USA", tz: "America/Chicago", flag: "🇺🇸" },
    { name: "Toronto", country: "Canada", tz: "America/Toronto", flag: "🇨🇦" },
    { name: "Mexico City", country: "Mexico", tz: "America/Mexico_City", flag: "🇲🇽" },
    { name: "São Paulo", country: "Brazil", tz: "America/Sao_Paulo", flag: "🇧🇷" },
    { name: "Buenos Aires", country: "Argentina", tz: "America/Argentina/Buenos_Aires", flag: "🇦🇷" },
    { name: "London", country: "UK", tz: "Europe/London", flag: "🇬🇧" },
    { name: "Paris", country: "France", tz: "Europe/Paris", flag: "🇫🇷" },
    { name: "Berlin", country: "Germany", tz: "Europe/Berlin", flag: "🇩🇪" },
    { name: "Madrid", country: "Spain", tz: "Europe/Madrid", flag: "🇪🇸" },
    { name: "Rome", country: "Italy", tz: "Europe/Rome", flag: "🇮🇹" },
    { name: "Moscow", country: "Russia", tz: "Europe/Moscow", flag: "🇷🇺" },
    { name: "Istanbul", country: "Turkey", tz: "Europe/Istanbul", flag: "🇹🇷" },
    { name: "Dubai", country: "UAE", tz: "Asia/Dubai", flag: "🇦🇪" },
    { name: "Mumbai", country: "India", tz: "Asia/Kolkata", flag: "🇮🇳" },
    { name: "New Delhi", country: "India", tz: "Asia/Kolkata", flag: "🇮🇳" },
    { name: "Karachi", country: "Pakistan", tz: "Asia/Karachi", flag: "🇵🇰" },
    { name: "Dhaka", country: "Bangladesh", tz: "Asia/Dhaka", flag: "🇧🇩" },
    { name: "Bangkok", country: "Thailand", tz: "Asia/Bangkok", flag: "🇹🇭" },
    { name: "Jakarta", country: "Indonesia", tz: "Asia/Jakarta", flag: "🇮🇩" },
    { name: "Singapore", country: "Singapore", tz: "Asia/Singapore", flag: "🇸🇬" },
    { name: "Hong Kong", country: "China", tz: "Asia/Hong_Kong", flag: "🇭🇰" },
    { name: "Shanghai", country: "China", tz: "Asia/Shanghai", flag: "🇨🇳" },
    { name: "Beijing", country: "China", tz: "Asia/Shanghai", flag: "🇨🇳" },
    { name: "Seoul", country: "South Korea", tz: "Asia/Seoul", flag: "🇰🇷" },
    { name: "Tokyo", country: "Japan", tz: "Asia/Tokyo", flag: "🇯🇵" },
    { name: "Manila", country: "Philippines", tz: "Asia/Manila", flag: "🇵🇭" },
    { name: "Sydney", country: "Australia", tz: "Australia/Sydney", flag: "🇦🇺" },
    { name: "Melbourne", country: "Australia", tz: "Australia/Melbourne", flag: "🇦🇺" },
    { name: "Perth", country: "Australia", tz: "Australia/Perth", flag: "🇦🇺" },
    { name: "Auckland", country: "New Zealand", tz: "Pacific/Auckland", flag: "🇳🇿" },
    { name: "Honolulu", country: "USA", tz: "Pacific/Honolulu", flag: "🇺🇸" },
    { name: "Anchorage", country: "USA", tz: "America/Anchorage", flag: "🇺🇸" },
    { name: "Cairo", country: "Egypt", tz: "Africa/Cairo", flag: "🇪🇬" },
    { name: "Lagos", country: "Nigeria", tz: "Africa/Lagos", flag: "🇳🇬" },
    { name: "Nairobi", country: "Kenya", tz: "Africa/Nairobi", flag: "🇰🇪" },
    { name: "Johannesburg", country: "South Africa", tz: "Africa/Johannesburg", flag: "🇿🇦" },
    { name: "Reykjavik", country: "Iceland", tz: "Atlantic/Reykjavik", flag: "🇮🇸" },
    { name: "Lisbon", country: "Portugal", tz: "Europe/Lisbon", flag: "🇵🇹" },
    { name: "Amsterdam", country: "Netherlands", tz: "Europe/Amsterdam", flag: "🇳🇱" },
    { name: "Zurich", country: "Switzerland", tz: "Europe/Zurich", flag: "🇨🇭" },
    { name: "Athens", country: "Greece", tz: "Europe/Athens", flag: "🇬🇷" },
    { name: "Tel Aviv", country: "Israel", tz: "Asia/Jerusalem", flag: "🇮🇱" },
    { name: "Riyadh", country: "Saudi Arabia", tz: "Asia/Riyadh", flag: "🇸🇦" },
    { name: "Vancouver", country: "Canada", tz: "America/Vancouver", flag: "🇨🇦" },
    { name: "Denver", country: "USA", tz: "America/Denver", flag: "🇺🇸" },
    { name: "Lima", country: "Peru", tz: "America/Lima", flag: "🇵🇪" },
    { name: "Santiago", country: "Chile", tz: "America/Santiago", flag: "🇨🇱" },
    { name: "Bogotá", country: "Colombia", tz: "America/Bogota", flag: "🇨🇴" },
    { name: "Helsinki", country: "Finland", tz: "Europe/Helsinki", flag: "🇫🇮" },
  ];

  // ---- Period theming ----------------------------------------------------
  // hour -> { key, label, icon, gradient }
  function periodForHour(h) {
    if (h >= 5 && h < 8) {
      return { key: "dawn", label: "Dawn", icon: "🌅", grad: "linear-gradient(135deg, #ff9966 0%, #ff5e7e 45%, #6a5acd 100%)" };
    }
    if (h >= 8 && h < 17) {
      return { key: "day", label: "Day", icon: "☀️", grad: "linear-gradient(135deg, #4facfe 0%, #00c6fb 50%, #4cc9f0 100%)" };
    }
    if (h >= 17 && h < 20) {
      return { key: "evening", label: "Evening", icon: "🌇", grad: "linear-gradient(135deg, #ff7e5f 0%, #feb47b 40%, #6a3093 100%)" };
    }
    return { key: "night", label: "Night", icon: "🌙", grad: "linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%)" };
  }

  // ---- State ----------------------------------------------------------
  const STORAGE_KEY = "world-clock-cities";
  const FORMAT_KEY = "world-clock-format";

  let format = localStorage.getItem(FORMAT_KEY) || "12";
  let cities = loadCities();

  function loadCities() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        if (Array.isArray(parsed) && parsed.length) return parsed;
      }
    } catch (e) {}
    // Defaults: a nice spread across the globe
    return [
      CATALOG.find(c => c.name === "New York"),
      CATALOG.find(c => c.name === "London"),
      CATALOG.find(c => c.name === "Dubai"),
      CATALOG.find(c => c.name === "Tokyo"),
      CATALOG.find(c => c.name === "Sydney"),
    ];
  }

  function saveCities() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(cities));
  }

  // ---- DOM refs ---------------------------------------------------------
  const grid = document.getElementById("grid");
  const emptyState = document.getElementById("emptyState");
  const modalBackdrop = document.getElementById("modalBackdrop");
  const cityOptionsEl = document.getElementById("cityOptions");
  const citySearch = document.getElementById("citySearch");
  const openModalBtn = document.getElementById("openModalBtn");
  const closeModalBtn = document.getElementById("closeModalBtn");
  const formatToggle = document.getElementById("formatToggle");

  // ---- Rendering ----------------------------------------------------------
  function cityId(city) {
    return city.tz + "|" + city.name;
  }

  function getZonedParts(tz) {
    const now = new Date();
    const fmt = new Intl.DateTimeFormat("en-US", {
      timeZone: tz,
      hour12: false,
      year: "numeric", month: "short", day: "2-digit", weekday: "short",
      hour: "2-digit", minute: "2-digit", second: "2-digit"
    });
    const parts = {};
    fmt.formatToParts(now).forEach(p => { parts[p.type] = p.value; });
    return parts;
  }

  function formatTime(parts) {
    let h = parseInt(parts.hour, 10);
    const m = parts.minute;
    const s = parts.second;
    if (format === "12") {
      const suffix = h >= 12 ? "PM" : "AM";
      let h12 = h % 12;
      if (h12 === 0) h12 = 12;
      return { main: `${h12}:${m}`, secs: s, suffix };
    }
    return { main: `${parts.hour}:${m}`, secs: s, suffix: "" };
  }

  function getOffsetLabel(tz) {
    const now = new Date();
    const fmt = new Intl.DateTimeFormat("en-US", { timeZone: tz, timeZoneName: "shortOffset" });
    const parts = fmt.formatToParts(now);
    const tzPart = parts.find(p => p.type === "timeZoneName");
    return tzPart ? tzPart.value.replace("GMT", "UTC") : "";
  }

  function buildCard(city, index) {
    const parts = getZonedParts(city.tz);
    const hour = parseInt(parts.hour, 10);
    const minute = parseInt(parts.minute, 10);
    const period = periodForHour(hour);
    const time = formatTime(parts);
    const offset = getOffsetLabel(city.tz);

    const card = document.createElement("div");
    card.className = "card";
    card.style.setProperty("--card-bg", period.grad);
    card.style.animationDelay = (index * 0.05) + "s";
    card.dataset.id = cityId(city);

    const dayProgress = ((hour * 60 + minute) / 1440) * 100;

    card.innerHTML = `
      <div class="offset-tag">${offset}</div>
      <div class="card-top">
        <div>
          <div class="city-name">${city.flag ? city.flag + " " : ""}${city.name}</div>
          <div class="city-country">${city.country}</div>
        </div>
        <button class="remove-btn" title="Remove ${city.name}" aria-label="Remove ${city.name}">✕</button>
      </div>
      <div class="icon-row"><div class="period-icon">${period.icon}</div></div>
      <div class="time-block">
        <div class="time">${time.main}<span class="secs">:${time.secs}${time.suffix ? " " + time.suffix : ""}</span></div>
      </div>
      <div>
        <div class="meta-row">
          <span class="date-text">${parts.weekday}, ${parts.month} ${parts.day}</span>
          <span class="period-badge">${period.label}</span>
        </div>
        <div class="sun-track"><div class="sun-dot" style="left:${dayProgress}%"></div></div>
      </div>
    `;

    card.querySelector(".remove-btn").addEventListener("click", () => {
      cities = cities.filter(c => cityId(c) !== cityId(city));
      saveCities();
      renderGrid();
    });

    return card;
  }

  function renderGrid() {
    grid.innerHTML = "";
    if (!cities.length) {
      emptyState.style.display = "block";
      grid.style.display = "none";
      return;
    }
    emptyState.style.display = "none";
    grid.style.display = "grid";
    cities.forEach((city, i) => grid.appendChild(buildCard(city, i)));
  }

  function tick() {
    // Re-render only the dynamic bits for performance + smooth seconds
    cities.forEach(city => {
      const card = grid.querySelector(`[data-id="${CSS.escape(cityId(city))}"]`);
      if (!card) return;
      const parts = getZonedParts(city.tz);
      const hour = parseInt(parts.hour, 10);
      const minute = parseInt(parts.minute, 10);
      const period = periodForHour(hour);
      const time = formatTime(parts);

      card.style.setProperty("--card-bg", period.grad);
      card.querySelector(".period-icon").textContent = period.icon;
      card.querySelector(".time").innerHTML = `${time.main}<span class="secs">:${time.secs}${time.suffix ? " " + time.suffix : ""}</span>`;
      card.querySelector(".period-badge").textContent = period.label;
      card.querySelector(".date-text").textContent = `${parts.weekday}, ${parts.month} ${parts.day}`;
      const dayProgress = ((hour * 60 + minute) / 1440) * 100;
      card.querySelector(".sun-dot").style.left = dayProgress + "%";
      card.querySelector(".offset-tag").textContent = getOffsetLabel(city.tz);
    });
  }

  // ---- Modal / add city --------------------------------------------------
  function isAdded(city) {
    return cities.some(c => cityId(c) === cityId(city));
  }

  function renderCityOptions(filter) {
    const q = (filter || "").trim().toLowerCase();
    cityOptionsEl.innerHTML = "";
    const matches = CATALOG.filter(c =>
      !q || c.name.toLowerCase().includes(q) || c.country.toLowerCase().includes(q) || c.tz.toLowerCase().includes(q)
    );

    if (!matches.length) {
      cityOptionsEl.innerHTML = `<div style="opacity:0.6; padding: 14px; text-align:center; font-size: 13px;">No matches found.</div>`;
      return;
    }

    matches.forEach(city => {
      const added = isAdded(city);
      const opt = document.createElement("div");
      opt.className = "city-option" + (added ? " added" : "");
      opt.innerHTML = `
        <span>${city.flag ? city.flag + " " : ""}${city.name}, ${city.country}</span>
        <span class="tz">${added ? "Added" : city.tz.split("/").pop().replace(/_/g, " ")}</span>
      `;
      if (!added) {
        opt.addEventListener("click", () => {
          cities.push(city);
          saveCities();
          renderGrid();
          closeModal();
        });
      }
      cityOptionsEl.appendChild(opt);
    });
  }

  function openModal() {
    modalBackdrop.classList.add("open");
    citySearch.value = "";
    renderCityOptions("");
    setTimeout(() => citySearch.focus(), 50);
  }

  function closeModal() {
    modalBackdrop.classList.remove("open");
  }

  openModalBtn.addEventListener("click", openModal);
  closeModalBtn.addEventListener("click", closeModal);
  modalBackdrop.addEventListener("click", (e) => {
    if (e.target === modalBackdrop) closeModal();
  });
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") closeModal();
  });
  citySearch.addEventListener("input", () => renderCityOptions(citySearch.value));

  // ---- Format toggle ------------------------------------------------------
  formatToggle.addEventListener("click", (e) => {
    const btn = e.target.closest("button[data-fmt]");
    if (!btn) return;
    format = btn.dataset.fmt;
    localStorage.setItem(FORMAT_KEY, format);
    [...formatToggle.querySelectorAll("button")].forEach(b => b.classList.toggle("active", b === btn));
    tick();
  });
  [...formatToggle.querySelectorAll("button")].forEach(b => b.classList.toggle("active", b.dataset.fmt === format));

  // ---- Boot ---------------------------------------------------------------
  renderGrid();
  setInterval(tick, 1000);
})();
</script>
</body>
</html>
