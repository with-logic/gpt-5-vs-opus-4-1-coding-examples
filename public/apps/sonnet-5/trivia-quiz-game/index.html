<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Civics Quiz — Know Your Country</title>
<style>
  :root{
    --navy:#1b2a4a;
    --navy-dark:#101a30;
    --red:#b22234;
    --red-dark:#8c1b29;
    --white:#f8f7f4;
    --gold:#d4af37;
    --green:#2ecc71;
    --gray:#6b7280;
  }

  *{box-sizing:border-box;}

  html,body{
    margin:0;
    padding:0;
    height:100%;
    font-family:'Segoe UI', system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif;
  }

  body{
    min-height:100vh;
    background:
      radial-gradient(circle at 15% 20%, rgba(212,175,55,0.10), transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(178,34,52,0.18), transparent 45%),
      linear-gradient(160deg, var(--navy-dark) 0%, var(--navy) 55%, #233b66 100%);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    position:relative;
    overflow-x:hidden;
  }

  /* subtle star field background */
  .stars{
    position:fixed;
    inset:0;
    pointer-events:none;
    background-image:
      radial-gradient(2px 2px at 10% 10%, rgba(255,255,255,0.5) 0, transparent 50%),
      radial-gradient(1.5px 1.5px at 25% 35%, rgba(255,255,255,0.4) 0, transparent 50%),
      radial-gradient(2px 2px at 40% 15%, rgba(255,255,255,0.3) 0, transparent 50%),
      radial-gradient(1.5px 1.5px at 60% 60%, rgba(255,255,255,0.4) 0, transparent 50%),
      radial-gradient(2px 2px at 75% 25%, rgba(255,255,255,0.3) 0, transparent 50%),
      radial-gradient(1.5px 1.5px at 90% 45%, rgba(255,255,255,0.4) 0, transparent 50%),
      radial-gradient(2px 2px at 50% 80%, rgba(255,255,255,0.3) 0, transparent 50%),
      radial-gradient(1.5px 1.5px at 15% 70%, rgba(255,255,255,0.35) 0, transparent 50%),
      radial-gradient(2px 2px at 85% 90%, rgba(255,255,255,0.3) 0, transparent 50%);
    opacity:0.7;
  }

  .app{
    width:100%;
    max-width:640px;
    position:relative;
    z-index:1;
  }

  header.brand{
    text-align:center;
    margin-bottom:22px;
    color:var(--white);
  }

  header.brand .badge{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:56px;
    height:56px;
    border-radius:50%;
    background:linear-gradient(145deg, var(--gold), #b9912a);
    box-shadow:0 4px 18px rgba(0,0,0,0.35);
    font-size:28px;
    margin-bottom:10px;
  }

  header.brand h1{
    margin:0;
    font-size:1.7rem;
    letter-spacing:0.5px;
    font-weight:700;
  }

  header.brand p{
    margin:6px 0 0;
    color:rgba(248,247,244,0.75);
    font-size:0.95rem;
  }

  .card{
    background:var(--white);
    border-radius:20px;
    box-shadow:0 20px 60px rgba(0,0,0,0.35), 0 2px 0 rgba(255,255,255,0.4) inset;
    overflow:hidden;
    position:relative;
  }

  /* progress bar */
  .progress-wrap{
    padding:18px 24px 0;
  }

  .progress-meta{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:0.82rem;
    color:var(--gray);
    margin-bottom:8px;
    font-weight:600;
  }

  .progress-meta .score-pill{
    background:var(--navy);
    color:var(--white);
    padding:3px 10px;
    border-radius:999px;
    font-size:0.78rem;
  }

  .progress-track{
    height:10px;
    background:#e7e5e0;
    border-radius:999px;
    overflow:hidden;
  }

  .progress-fill{
    height:100%;
    width:0%;
    border-radius:999px;
    background:linear-gradient(90deg, var(--red), var(--gold));
    transition:width 0.5s cubic-bezier(.65,.05,.36,1);
  }

  .quiz-body{
    padding:28px 28px 30px;
  }

  .question-tag{
    display:inline-block;
    background:rgba(178,34,52,0.1);
    color:var(--red);
    font-weight:700;
    font-size:0.75rem;
    letter-spacing:0.08em;
    text-transform:uppercase;
    padding:5px 12px;
    border-radius:999px;
    margin-bottom:14px;
  }

  .question-text{
    font-size:1.5rem;
    line-height:1.35;
    color:var(--navy-dark);
    font-weight:700;
    margin:0 0 24px;
    min-height:2.7em;
  }

  .answers{
    display:grid;
    gap:12px;
  }

  .answer-btn{
    display:flex;
    align-items:center;
    gap:12px;
    width:100%;
    text-align:left;
    padding:16px 18px;
    border-radius:14px;
    border:2px solid #e3e1db;
    background:#fdfdfc;
    font-size:1.05rem;
    font-weight:600;
    color:var(--navy-dark);
    cursor:pointer;
    transition:transform 0.15s ease, border-color 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
    font-family:inherit;
  }

  .answer-btn .letter{
    display:flex;
    align-items:center;
    justify-content:center;
    width:30px;
    height:30px;
    min-width:30px;
    border-radius:8px;
    background:var(--navy);
    color:var(--white);
    font-size:0.85rem;
    font-weight:700;
  }

  .answer-btn:hover:not(:disabled){
    border-color:var(--gold);
    transform:translateY(-2px);
    box-shadow:0 6px 16px rgba(0,0,0,0.08);
  }

  .answer-btn:disabled{
    cursor:default;
  }

  .answer-btn.correct{
    border-color:var(--green);
    background:rgba(46,204,113,0.13);
    animation:pop 0.35s ease;
  }

  .answer-btn.correct .letter{
    background:var(--green);
  }

  .answer-btn.incorrect{
    border-color:var(--red);
    background:rgba(178,34,52,0.1);
    animation:shake 0.4s ease;
  }

  .answer-btn.incorrect .letter{
    background:var(--red);
  }

  .answer-btn.dim{
    opacity:0.45;
  }

  @keyframes pop{
    0%{transform:scale(1);}
    40%{transform:scale(1.03);}
    100%{transform:scale(1);}
  }

  @keyframes shake{
    0%,100%{transform:translateX(0);}
    20%{transform:translateX(-6px);}
    40%{transform:translateX(6px);}
    60%{transform:translateX(-4px);}
    80%{transform:translateX(4px);}
  }

  /* feedback overlay icon */
  .feedback-icon{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(0);
    width:110px;
    height:110px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:56px;
    color:#fff;
    pointer-events:none;
    z-index:5;
    box-shadow:0 10px 40px rgba(0,0,0,0.3);
  }

  .feedback-icon.show{
    animation:icon-pop 0.6s cubic-bezier(.34,1.56,.64,1) forwards;
  }

  .feedback-icon.correct{ background:var(--green); }
  .feedback-icon.incorrect{ background:var(--red); }

  @keyframes icon-pop{
    0%{transform:translate(-50%,-50%) scale(0); opacity:0;}
    50%{transform:translate(-50%,-50%) scale(1.15); opacity:1;}
    70%{transform:translate(-50%,-50%) scale(0.95);}
    100%{transform:translate(-50%,-50%) scale(1); opacity:1;}
  }

  .next-row{
    margin-top:22px;
    display:flex;
    justify-content:flex-end;
    min-height:46px;
  }

  .next-btn{
    background:var(--navy);
    color:var(--white);
    border:none;
    padding:12px 26px;
    border-radius:12px;
    font-size:1rem;
    font-weight:700;
    cursor:pointer;
    opacity:0;
    transform:translateY(8px);
    transition:opacity 0.3s ease, transform 0.3s ease, background 0.2s ease;
    pointer-events:none;
  }

  .next-btn.visible{
    opacity:1;
    transform:translateY(0);
    pointer-events:auto;
  }

  .next-btn:hover{
    background:var(--red);
  }

  /* results screen */
  .results{
    padding:40px 30px 36px;
    text-align:center;
  }

  .results .trophy{
    font-size:62px;
    margin-bottom:6px;
  }

  .results h2{
    margin:0 0 6px;
    color:var(--navy-dark);
    font-size:1.6rem;
  }

  .results .score-big{
    font-size:3.2rem;
    font-weight:800;
    color:var(--red);
    margin:6px 0 2px;
  }

  .results .score-sub{
    color:var(--gray);
    font-weight:600;
    margin-bottom:18px;
  }

  .results .remark{
    background:rgba(27,42,74,0.06);
    border-radius:14px;
    padding:14px 18px;
    color:var(--navy-dark);
    font-weight:600;
    margin-bottom:24px;
  }

  .results .flag-row{
    font-size:1.6rem;
    letter-spacing:6px;
    margin-bottom:22px;
  }

  .restart-btn{
    background:linear-gradient(135deg, var(--red), var(--red-dark));
    color:#fff;
    border:none;
    padding:14px 32px;
    border-radius:12px;
    font-size:1.05rem;
    font-weight:700;
    cursor:pointer;
    box-shadow:0 8px 22px rgba(178,34,52,0.35);
    transition:transform 0.15s ease;
  }

  .restart-btn:hover{
    transform:translateY(-2px);
  }

  footer.credit{
    text-align:center;
    margin-top:18px;
    color:rgba(248,247,244,0.55);
    font-size:0.78rem;
  }

  @media (max-width:480px){
    .quiz-body{padding:22px 18px 26px;}
    .question-text{font-size:1.25rem;}
    .results .score-big{font-size:2.6rem;}
  }
</style>
</head>
<body>
<div class="stars"></div>
<div class="app">
  <header class="brand">
    <div class="badge">🦅</div>
    <h1>U.S. Civics Quiz</h1>
    <p>10 basic questions every citizen should know</p>
  </header>

  <div class="card" id="card">
    <!-- Quiz view -->
    <div id="quizView">
      <div class="progress-wrap">
        <div class="progress-meta">
          <span id="questionCounter">Question 1 of 10</span>
          <span class="score-pill" id="scorePill">Score: 0</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>
      <div class="quiz-body">
        <span class="question-tag" id="categoryTag">Government</span>
        <h2 class="question-text" id="questionText">Loading...</h2>
        <div class="answers" id="answers"></div>
        <div class="next-row">
          <button class="next-btn" id="nextBtn">Next Question →</button>
        </div>
      </div>
      <div class="feedback-icon" id="feedbackIcon"></div>
    </div>

    <!-- Results view -->
    <div id="resultsView" style="display:none;">
      <div class="results">
        <div class="trophy" id="trophyIcon">🏆</div>
        <h2>Quiz Complete!</h2>
        <div class="score-big" id="finalScore">0/10</div>
        <div class="score-sub" id="finalPercent">0% correct</div>
        <div class="remark" id="remark">Great effort!</div>
        <div class="flag-row">🇺🇸🇺🇸🇺🇸</div>
        <button class="restart-btn" id="restartBtn">Try Again</button>
      </div>
    </div>
  </div>

  <footer class="credit">Randomized order each attempt · Basic U.S. citizenship knowledge</footer>
</div>

<script>
(function(){
  "use strict";

  // Built-in quiz bank: 10 basic-level US civics questions
  const QUIZ_BANK = [
    {
      category: "Government",
      question: "What is the supreme law of the land in the United States?",
      answers: ["The Constitution", "The Declaration of Independence", "The Bill of Rights", "The Federalist Papers"],
      correct: 0
    },
    {
      category: "Government",
      question: "How many amendments does the U.S. Constitution have?",
      answers: ["10", "27", "13", "50"],
      correct: 1
    },
    {
      category: "Government",
      question: "What are the three branches of the U.S. government?",
      answers: [
        "Federal, State, Local",
        "Executive, Legislative, Judicial",
        "Senate, House, Supreme Court",
        "President, Congress, Police"
      ],
      correct: 1
    },
    {
      category: "Government",
      question: "Who is the Commander in Chief of the U.S. military?",
      answers: ["The Secretary of Defense", "The Speaker of the House", "The President", "The Chief Justice"],
      correct: 2
    },
    {
      category: "History",
      question: "In what year was the Declaration of Independence adopted?",
      answers: ["1492", "1776", "1812", "1865"],
      correct: 1
    },
    {
      category: "History",
      question: "Who is known as the \"Father of Our Country\" and first U.S. President?",
      answers: ["Thomas Jefferson", "Abraham Lincoln", "George Washington", "Benjamin Franklin"],
      correct: 2
    },
    {
      category: "Symbols",
      question: "What are the colors of the American flag?",
      answers: ["Red, white, and blue", "Red, white, and gold", "Blue, white, and green", "Red, black, and white"],
      correct: 0
    },
    {
      category: "Symbols",
      question: "How many stars are on the American flag today?",
      answers: ["13", "48", "50", "52"],
      correct: 2
    },
    {
      category: "Geography",
      question: "What is the capital of the United States?",
      answers: ["New York City", "Washington, D.C.", "Los Angeles", "Philadelphia"],
      correct: 1
    },
    {
      category: "Civics",
      question: "How many U.S. Senators does each state have?",
      answers: ["1", "2", "4", "It depends on population"],
      correct: 1
    },
    {
      category: "Civics",
      question: "What is the name of the national anthem of the United States?",
      answers: ["America the Beautiful", "God Bless America", "The Star-Spangled Banner", "My Country, 'Tis of Thee"],
      correct: 2
    },
    {
      category: "History",
      question: "From which country did the United States declare independence?",
      answers: ["France", "Spain", "Great Britain", "Germany"],
      correct: 2
    }
  ];

  const letters = ["A", "B", "C", "D"];

  let quizQuestions = [];
  let currentIndex = 0;
  let score = 0;
  let answered = false;

  const questionText = document.getElementById("questionText");
  const answersEl = document.getElementById("answers");
  const progressFill = document.getElementById("progressFill");
  const questionCounter = document.getElementById("questionCounter");
  const scorePill = document.getElementById("scorePill");
  const categoryTag = document.getElementById("categoryTag");
  const nextBtn = document.getElementById("nextBtn");
  const feedbackIcon = document.getElementById("feedbackIcon");
  const quizView = document.getElementById("quizView");
  const resultsView = document.getElementById("resultsView");
  const finalScore = document.getElementById("finalScore");
  const finalPercent = document.getElementById("finalPercent");
  const remark = document.getElementById("remark");
  const trophyIcon = document.getElementById("trophyIcon");
  const restartBtn = document.getElementById("restartBtn");

  function shuffle(arr){
    const a = arr.slice();
    for(let i = a.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function buildQuestionSet(){
    // Pick 10 random questions from the bank, then shuffle each question's
    // answer order so the correct answer position varies too.
    const picked = shuffle(QUIZ_BANK).slice(0, 10);
    return picked.map(q => {
      const order = shuffle(q.answers.map((_, i) => i));
      const newAnswers = order.map(i => q.answers[i]);
      const newCorrect = order.indexOf(q.correct);
      return {
        category: q.category,
        question: q.question,
        answers: newAnswers,
        correct: newCorrect
      };
    });
  }

  function startQuiz(){
    quizQuestions = buildQuestionSet();
    currentIndex = 0;
    score = 0;
    resultsView.style.display = "none";
    quizView.style.display = "block";
    renderQuestion();
  }

  function renderQuestion(){
    answered = false;
    const q = quizQuestions[currentIndex];
    categoryTag.textContent = q.category;
    questionText.textContent = q.question;
    questionCounter.textContent = `Question ${currentIndex + 1} of ${quizQuestions.length}`;
    scorePill.textContent = `Score: ${score}`;
    progressFill.style.width = `${(currentIndex / quizQuestions.length) * 100}%`;

    nextBtn.classList.remove("visible");
    feedbackIcon.classList.remove("show", "correct", "incorrect");
    feedbackIcon.textContent = "";

    answersEl.innerHTML = "";
    q.answers.forEach((answer, idx) => {
      const btn = document.createElement("button");
      btn.className = "answer-btn";
      btn.innerHTML = `<span class="letter">${letters[idx]}</span><span>${answer}</span>`;
      btn.addEventListener("click", () => handleAnswer(idx, btn));
      answersEl.appendChild(btn);
    });
  }

  function handleAnswer(selectedIdx, btnEl){
    if(answered) return;
    answered = true;

    const q = quizQuestions[currentIndex];
    const isCorrect = selectedIdx === q.correct;
    const allBtns = answersEl.querySelectorAll(".answer-btn");

    allBtns.forEach((b, idx) => {
      b.disabled = true;
      if(idx === q.correct){
        b.classList.add("correct");
      } else if(idx === selectedIdx && !isCorrect){
        b.classList.add("incorrect");
      } else {
        b.classList.add("dim");
      }
    });

    feedbackIcon.classList.remove("correct", "incorrect", "show");
    void feedbackIcon.offsetWidth; // restart animation
    if(isCorrect){
      score++;
      feedbackIcon.textContent = "✓";
      feedbackIcon.classList.add("correct");
    } else {
      feedbackIcon.textContent = "✕";
      feedbackIcon.classList.add("incorrect");
    }
    feedbackIcon.classList.add("show");

    scorePill.textContent = `Score: ${score}`;
    progressFill.style.width = `${((currentIndex + 1) / quizQuestions.length) * 100}%`;

    nextBtn.textContent = (currentIndex === quizQuestions.length - 1) ? "See Results →" : "Next Question →";
    setTimeout(() => nextBtn.classList.add("visible"), 350);
  }

  function nextQuestion(){
    if(currentIndex < quizQuestions.length - 1){
      currentIndex++;
      renderQuestion();
    } else {
      showResults();
    }
  }

  function showResults(){
    quizView.style.display = "none";
    resultsView.style.display = "block";
    const total = quizQuestions.length;
    const pct = Math.round((score / total) * 100);
    finalScore.textContent = `${score}/${total}`;
    finalPercent.textContent = `${pct}% correct`;

    let msg, trophy;
    if(pct === 100){
      msg = "Perfect score! You'd pass the citizenship test with flying colors.";
      trophy = "🏆";
    } else if(pct >= 80){
      msg = "Excellent! You know your civics well.";
      trophy = "🥇";
    } else if(pct >= 60){
      msg = "Good job! A little review and you'll be golden.";
      trophy = "🥈";
    } else if(pct >= 40){
      msg = "Not bad — brush up on the basics and try again.";
      trophy = "🥉";
    } else {
      msg = "Time to hit the civics books! Give it another shot.";
      trophy = "📖";
    }
    remark.textContent = msg;
    trophyIcon.textContent = trophy;
  }

  nextBtn.addEventListener("click", nextQuestion);
  restartBtn.addEventListener("click", startQuiz);

  startQuiz();
})();
</script>
</body>
</html>
