<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎄 Make-Your-Own Holiday Card! 🎄</title>
<style>
  :root{
    --card-w: min(96vw, 1100px);
    --card-h: min(78vh, 700px);
  }
  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html,body{
    margin:0; padding:0; height:100%;
    font-family: 'Comic Sans MS', 'Chalkboard SE', 'Marker Felt', cursive, sans-serif;
    background: radial-gradient(ellipse at top, #1b2a52 0%, #0c1330 60%, #060912 100%);
    overflow: hidden;
    user-select: none;
    touch-action: none;
  }

  /* ---------- Background twinkling stars ---------- */
  #starfield{
    position: fixed; inset: 0; z-index: 0; pointer-events:none;
  }
  .star{
    position:absolute; background:#fff; border-radius:50%;
    animation: twinkle linear infinite;
    opacity:.8;
  }
  @keyframes twinkle{
    0%,100%{ opacity:.15; transform: scale(.7);}
    50%{ opacity:1; transform: scale(1.2);}
  }

  /* ---------- Title ---------- */
  #title{
    position: relative; z-index: 5;
    text-align:center;
    color:#fff7e0;
    font-size: clamp(22px, 4vw, 40px);
    text-shadow: 0 0 10px #ffd76b, 0 0 22px #ff5e5e, 2px 2px 0 #00000055;
    margin: 10px 0 4px 0;
    letter-spacing: 1px;
    animation: bob 3s ease-in-out infinite;
  }
  @keyframes bob{
    0%,100%{ transform: translateY(0) rotate(-1deg); }
    50%{ transform: translateY(-6px) rotate(1deg); }
  }
  #subtitle{
    position:relative; z-index:5;
    text-align:center;
    color:#cfe3ff;
    font-size: clamp(11px, 1.8vw, 15px);
    margin-bottom: 8px;
    opacity:.9;
  }

  /* ---------- Layout ---------- */
  #app{
    position:relative; z-index:2;
    display:flex; flex-direction:column; align-items:center;
    height:100%;
    padding: 6px 10px 10px;
  }

  #stage-wrap{
    position:relative;
    width: var(--card-w);
    height: var(--card-h);
    margin: 0 auto;
  }

  /* ---------- The card itself ---------- */
  #card{
    position:relative;
    width:100%; height:100%;
    border-radius: 22px;
    background: linear-gradient(180deg,#0d3258 0%,#155487 45%,#1c6694 75%,#2a7aa3 100%);
    box-shadow:
      0 0 0 10px #fff,
      0 0 0 14px #b6273e,
      0 25px 60px rgba(0,0,0,.55),
      inset 0 0 80px rgba(255,255,255,.08);
    overflow: hidden;
    cursor: default;
  }
  #card::before{ /* snowy ground */
    content:"";
    position:absolute; left:0; right:0; bottom:0; height:18%;
    background: linear-gradient(180deg, #eaf6ff 0%, #cfe9ff 60%, #b9dcf7 100%);
    border-radius: 0 0 12px 12px;
    box-shadow: 0 -2px 12px rgba(255,255,255,.6) inset;
  }
  #card::after{ /* moon glow */
    content:"";
    position:absolute; top:8%; right:10%;
    width: 70px; height:70px; border-radius:50%;
    background: radial-gradient(circle at 35% 35%, #fffdf2, #ffe9a8 60%, transparent 75%);
    box-shadow: 0 0 60px 20px rgba(255,238,170,.45);
  }

  .hill{
    position:absolute; bottom:14%; width:60%; height:90px;
    background:#cfe9ff;
    border-radius: 50% 50% 0 0/100% 100% 0 0;
    opacity:.55;
  }
  .hill.h1{ left:-10%; background:#d8eeff; }
  .hill.h2{ right:-15%; bottom:13%; height:70px; background:#bfe1ff; }

  /* greeting text on the card */
  #greeting{
    position:absolute; top:6%; left:0; right:0;
    text-align:center;
    font-size: clamp(20px, 3.4vw, 38px);
    color:#fff;
    text-shadow: 0 0 12px #6cf, 0 0 4px #fff, 2px 2px 0 rgba(0,0,30,.4);
    z-index: 6;
    pointer-events:none;
    font-weight:bold;
  }
  #greeting span{
    display:inline-block;
    animation: wiggle 2.4s ease-in-out infinite;
  }

  @keyframes wiggle{
    0%,100%{ transform: translateY(0) rotate(0deg); }
    25%{ transform: translateY(-4px) rotate(-3deg); }
    75%{ transform: translateY(2px) rotate(3deg); }
  }

  /* ---------- Snow ---------- */
  #snow-layer{
    position:absolute; inset:0; overflow:hidden; pointer-events:none; z-index:4; border-radius: 12px;
  }
  .snowflake{
    position:absolute; top:-5%;
    color:#fff;
    opacity:.85;
    user-select:none;
    text-shadow: 0 0 4px rgba(255,255,255,.8);
    animation-name: fall, sway;
    animation-timing-function: linear, ease-in-out;
    animation-iteration-count: infinite, infinite;
  }
  @keyframes fall{
    from{ transform: translateY(-10%); }
    to{ transform: translateY(700px); }
  }
  @keyframes sway{
    0%,100%{ margin-left:0px; }
    50%{ margin-left: 30px; }
  }

  /* ---------- Draggable items dropped on the card ---------- */
  .placed-item{
    position:absolute;
    font-size: 46px;
    cursor: grab;
    z-index: 7;
    filter: drop-shadow(0 4px 6px rgba(0,0,0,.35));
    touch-action:none;
    transition: filter .15s;
  }
  .placed-item:active{ cursor: grabbing; }
  .placed-item.bouncing{ animation: pop-in .35s ease; }
  @keyframes pop-in{
    0%{ transform: scale(0) rotate(-20deg); }
    60%{ transform: scale(1.25) rotate(8deg); }
    100%{ transform: scale(1) rotate(0deg); }
  }
  .placed-item.wiggling{ animation: tap-wiggle .5s ease; }
  @keyframes tap-wiggle{
    0%,100%{ transform: rotate(0deg) scale(1); }
    25%{ transform: rotate(-15deg) scale(1.1); }
    75%{ transform: rotate(15deg) scale(1.1); }
  }
  .twinkle-light{
    animation: lightpulse 1.4s ease-in-out infinite;
  }
  @keyframes lightpulse{
    0%,100%{ filter: drop-shadow(0 0 2px gold) brightness(1); }
    50%{ filter: drop-shadow(0 0 14px gold) brightness(1.5); }
  }

  /* delete hint */
  .del-x{
    position:absolute; top:-10px; right:-10px;
    width:20px; height:20px; border-radius:50%;
    background:#ff5252; color:#fff; font-size:13px; line-height:20px; text-align:center;
    box-shadow: 0 2px 4px rgba(0,0,0,.4);
    display:none;
    z-index:9;
  }
  .placed-item:hover .del-x{ display:block; }

  /* ---------- Tray of draggable stickers ---------- */
  #tray-wrap{
    width: var(--card-w);
    margin-top: 8px;
  }
  #tray{
    display:flex; gap:8px; overflow-x:auto; overflow-y:hidden;
    padding: 10px 12px;
    background: rgba(255,255,255,.12);
    border-radius: 16px;
    backdrop-filter: blur(6px);
    border: 2px solid rgba(255,255,255,.25);
    scrollbar-width: thin;
  }
  #tray::-webkit-scrollbar{ height:6px; }
  #tray::-webkit-scrollbar-thumb{ background:#ffffff66; border-radius:3px; }

  .tray-item{
    flex: 0 0 auto;
    width:56px; height:56px;
    font-size: 32px;
    display:flex; align-items:center; justify-content:center;
    background: rgba(255,255,255,.9);
    border-radius: 14px;
    cursor: grab;
    box-shadow: 0 3px 6px rgba(0,0,0,.25);
    transition: transform .15s;
    touch-action:none;
  }
  .tray-item:hover{ transform: scale(1.12) rotate(-4deg); background:#fff; }
  .tray-item:active{ cursor:grabbing; }

  /* ---------- Controls row ---------- */
  #controls{
    width: var(--card-w);
    display:flex; flex-wrap:wrap; gap:8px;
    justify-content:center;
    margin-top: 8px;
    z-index: 5;
  }
  .ctrl-btn{
    font-family: inherit;
    font-size: 14px;
    padding: 8px 14px;
    border-radius: 999px;
    border: none;
    cursor:pointer;
    background: linear-gradient(180deg, #ff8a8a, #e0455a);
    color:#fff;
    font-weight:bold;
    box-shadow: 0 4px 0 #a8283a, 0 6px 10px rgba(0,0,0,.3);
    transition: transform .1s, box-shadow .1s;
  }
  .ctrl-btn:active{ transform: translateY(3px); box-shadow: 0 1px 0 #a8283a, 0 2px 6px rgba(0,0,0,.3); }
  .ctrl-btn.green{ background: linear-gradient(180deg,#7ce0a0,#2f9e5f); box-shadow: 0 4px 0 #1f6e40, 0 6px 10px rgba(0,0,0,.3); }
  .ctrl-btn.green:active{ box-shadow: 0 1px 0 #1f6e40, 0 2px 6px rgba(0,0,0,.3); }
  .ctrl-btn.blue{ background: linear-gradient(180deg,#7cc4ff,#2f7ed1); box-shadow: 0 4px 0 #1f4e8e, 0 6px 10px rgba(0,0,0,.3); }
  .ctrl-btn.blue:active{ box-shadow: 0 1px 0 #1f4e8e, 0 2px 6px rgba(0,0,0,.3); }
  .ctrl-btn.purple{ background: linear-gradient(180deg,#caa8ff,#8a4fe0); box-shadow: 0 4px 0 #582f96, 0 6px 10px rgba(0,0,0,.3); }
  .ctrl-btn.purple:active{ box-shadow: 0 1px 0 #582f96, 0 2px 6px rgba(0,0,0,.3); }

  /* ---------- Floating emoji burst (click feedback) ---------- */
  .burst-emoji{
    position:absolute; pointer-events:none; z-index: 50;
    font-size: 24px;
    animation: burst-up 1s ease-out forwards;
  }
  @keyframes burst-up{
    0%{ transform: translate(0,0) scale(.6); opacity:1; }
    100%{ transform: translate(var(--dx), -90px) scale(1.3); opacity:0; }
  }

  /* mute button */
  #mute-btn{
    position:absolute; top:10px; left:10px; z-index: 20;
    background: rgba(255,255,255,.85);
    border:none; border-radius:50%;
    width:38px; height:38px; font-size:18px;
    cursor:pointer;
    box-shadow: 0 3px 6px rgba(0,0,0,.3);
  }

  footer{
    color:#9fb3d8; font-size:11px; text-align:center; margin-top:6px; opacity:.7;
  }

  @media (max-width:600px){
    .placed-item{ font-size: 36px; }
    .tray-item{ width:46px; height:46px; font-size:26px; }
  }
</style>
</head>
<body>

<div id="starfield"></div>

<div id="app">
  <h1 id="title">🎄 Holly Jolly Card Maker! 🎅</h1>
  <p id="subtitle">✨ Drag the stickers onto the card below to decorate it! Tap things for surprises! ✨</p>

  <div id="stage-wrap">
    <div id="card">
      <button id="mute-btn" title="Mute/Unmute sounds">🔊</button>
      <div class="hill h1"></div>
      <div class="hill h2"></div>
      <div id="greeting"><span>H</span><span>a</span><span>p</span><span>p</span><span>y</span>&nbsp;<span>H</span><span>o</span><span>l</span><span>i</span><span>d</span><span>a</span><span>y</span><span>s</span><span>!</span> 🎁</div>
      <div id="snow-layer"></div>
      <!-- placed items get injected here -->
    </div>
  </div>

  <div id="tray-wrap">
    <div id="tray">
      <!-- tray items injected by JS -->
    </div>
  </div>

  <div id="controls">
    <button class="ctrl-btn" id="btn-snow">❄️ Toggle Snow</button>
    <button class="ctrl-btn green" id="btn-jingle">🔔 Jingle Bells!</button>
    <button class="ctrl-btn blue" id="btn-clear">🧹 Clear Card</button>
    <button class="ctrl-btn purple" id="btn-surprise">🎉 Surprise Me!</button>
  </div>

  <footer>Made with 💖 for the holidays — click, drag, and have fun!</footer>
</div>

<script>
(function(){
  "use strict";

  /* ===================== Web Audio: tiny synth, no files needed ===================== */
  let actx = null;
  let muted = false;
  function ctx(){
    if(!actx){ actx = new (window.AudioContext || window.webkitAudioContext)(); }
    if(actx.state === 'suspended') actx.resume();
    return actx;
  }
  function tone(freq, dur, type, vol, delay){
    if(muted) return;
    type = type || 'sine';
    vol = vol === undefined ? 0.25 : vol;
    delay = delay || 0;
    const c = ctx();
    const t0 = c.currentTime + delay;
    const osc = c.createOscillator();
    const gain = c.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t0);
    gain.gain.setValueAtTime(0.0001, t0);
    gain.gain.exponentialRampToValueAtTime(vol, t0 + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(gain).connect(c.destination);
    osc.start(t0);
    osc.stop(t0 + dur + 0.05);
  }
  function chime(){
    [880, 1108, 1320].forEach((f,i)=> tone(f, 0.5, 'sine', 0.2, i*0.06));
  }
  function pop(){
    tone(520 + Math.random()*200, 0.12, 'triangle', 0.22);
    tone(1040 + Math.random()*200, 0.08, 'sine', 0.12, 0.03);
  }
  function jingleBells(){
    // simple melody: E E E  E E E  E G C D E
    const seq = [
      [659.25,0.18],[659.25,0.18],[659.25,0.34],
      [659.25,0.18],[659.25,0.18],[659.25,0.34],
      [659.25,0.18],[783.99,0.18],[523.25,0.18],[587.33,0.18],[659.25,0.6]
    ];
    let t = 0;
    seq.forEach(([f,d])=>{
      tone(f, d*0.9, 'square', 0.18, t);
      t += d;
    });
  }
  function hohoho(){
    [220,196,174].forEach((f,i)=> tone(f, 0.35, 'sawtooth', 0.15, i*0.32));
  }
  function jingleShake(){
    for(let i=0;i<6;i++){
      tone(1800+Math.random()*900, 0.06, 'square', 0.06, i*0.07);
    }
  }
  function jump(){
    const c = ctx();
    if(muted) return;
    const t0 = c.currentTime;
    const osc = c.createOscillator();
    const gain = c.createGain();
    osc.type='sine';
    osc.frequency.setValueAtTime(300, t0);
    osc.frequency.exponentialRampToValueAtTime(700, t0+0.18);
    gain.gain.setValueAtTime(0.2, t0);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0+0.2);
    osc.connect(gain).connect(c.destination);
    osc.start(t0); osc.stop(t0+0.22);
  }

  const SOUND_FOR = {
    '🎅':hohoho, '🦌':()=>tone(180,0.3,'sawtooth',0.2), '⛄':()=>{tone(300,0.15,'triangle',0.2);tone(250,0.15,'triangle',0.15,0.1);},
    '🎄':chime, '🔔':jingleShake, '🎁':pop, '⭐':()=>tone(1500,0.25,'sine',0.2),
    '🕯️':()=>tone(440,0.4,'sine',0.15), '🧦':()=>tone(380,0.15,'triangle',0.18),
    '🍪':()=>tone(600,0.1,'square',0.15), '🥛':()=>tone(500,0.12,'sine',0.15),
    '❤️':()=>tone(700,0.3,'sine',0.18), '🍬':()=>tone(900,0.1,'square',0.15),
    '🐧':()=>tone(700,0.1,'square',0.18), '🐻‍❄️':()=>tone(220,0.25,'sawtooth',0.18),
    '🦊':()=>tone(650,0.12,'triangle',0.15), '🐇':jump,
    '🌟':()=>tone(1700,0.2,'sine',0.2), '🎀':()=>tone(820,0.12,'triangle',0.15),
    '🔥':()=>tone(150,0.3,'sawtooth',0.12), '🍫':()=>tone(400,0.1,'square',0.15)
  };
  function soundFor(emoji){
    return SOUND_FOR[emoji] || pop;
  }

  /* ===================== Starfield ===================== */
  const starfield = document.getElementById('starfield');
  const starCount = 90;
  for(let i=0;i<starCount;i++){
    const s = document.createElement('div');
    s.className='star';
    const size = Math.random()*2.5+1;
    s.style.width = size+'px';
    s.style.height = size+'px';
    s.style.left = Math.random()*100+'%';
    s.style.top = Math.random()*70+'%';
    s.style.animationDuration = (1.5+Math.random()*3)+'s';
    s.style.animationDelay = (Math.random()*3)+'s';
    starfield.appendChild(s);
  }

  /* ===================== Snow ===================== */
  const snowLayer = document.getElementById('snow-layer');
  let snowOn = true;
  let snowFlakes = [];
  const SNOW_CHARS = ['❄','❅','❆','•'];
  function spawnSnowflake(){
    if(!snowOn) return;
    const el = document.createElement('div');
    el.className = 'snowflake';
    el.textContent = SNOW_CHARS[Math.floor(Math.random()*SNOW_CHARS.length)];
    const size = 10 + Math.random()*18;
    el.style.fontSize = size+'px';
    el.style.left = Math.random()*100+'%';
    const fallDur = 6 + Math.random()*8;
    const swayDur = 2 + Math.random()*3;
    el.style.animationDuration = fallDur+'s, '+swayDur+'s';
    el.style.opacity = 0.4 + Math.random()*0.6;
    snowLayer.appendChild(el);
    snowFlakes.push(el);
    setTimeout(()=>{
      el.remove();
      snowFlakes = snowFlakes.filter(f=>f!==el);
    }, fallDur*1000+100);
  }
  let snowInterval = setInterval(spawnSnowflake, 220);
  for(let i=0;i<15;i++) setTimeout(spawnSnowflake, i*100);

  document.getElementById('btn-snow').addEventListener('click', function(){
    snowOn = !snowOn;
    this.textContent = snowOn ? '❄️ Toggle Snow' : '☀️ Snow Off';
    if(!snowOn){
      snowFlakes.forEach(f=>f.remove());
      snowFlakes = [];
    }
  });

  /* ===================== Card / Tray setup ===================== */
  const card = document.getElementById('card');
  const tray = document.getElementById('tray');

  // Sticker palette: emoji + label
  const STICKERS = [
    '🎅','🤶','🦌','⛄','🎄','🔔','🎁','⭐','🕯️','🧦',
    '🍪','🥛','❤️','🍬','🐧','🐻‍❄️','🦊','🐇','🌟','🎀','🔥','🍫','🛷','🧣','🦃'
  ];

  STICKERS.forEach(emoji=>{
    const item = document.createElement('div');
    item.className = 'tray-item';
    item.textContent = emoji;
    item.setAttribute('draggable','false');
    tray.appendChild(item);

    // start drag from tray -> create placed item that follows pointer
    item.addEventListener('pointerdown', (e)=>{
      e.preventDefault();
      startDragNew(emoji, e.clientX, e.clientY);
    });
  });

  let zCounter = 10;

  function placeItem(emoji, x, y, animate){
    const rect = card.getBoundingClientRect();
    const el = document.createElement('div');
    el.className = 'placed-item' + (animate ? ' bouncing' : '');
    el.textContent = emoji;
    if(emoji === '⭐' || emoji === '🌟' || emoji === '🕯️') el.classList.add('twinkle-light');
    el.style.zIndex = ++zCounter;
    // clamp inside the card
    let left = x - rect.left - 23;
    let top = y - rect.top - 23;
    left = Math.max(0, Math.min(rect.width-46, left));
    top = Math.max(0, Math.min(rect.height-46, top));
    el.style.left = left+'px';
    el.style.top = top+'px';

    const del = document.createElement('div');
    del.className='del-x';
    del.textContent='✕';
    del.addEventListener('pointerdown', (e)=>{
      e.stopPropagation();
      pop();
      el.remove();
    });
    el.appendChild(del);

    card.appendChild(el);
    makeMovable(el);

    el.addEventListener('pointerdown', (e)=>{
      if(e.target === del) return;
      // small delay distinguishes tap vs drag handled in makeMovable
    });

    return el;
  }

  function makeMovable(el){
    let dragging = false;
    let offsetX=0, offsetY=0;
    let moved = false;
    let downX=0, downY=0;

    el.addEventListener('pointerdown', (e)=>{
      if(e.target.classList.contains('del-x')) return;
      e.stopPropagation();
      el.setPointerCapture(e.pointerId);
      dragging = true;
      moved = false;
      downX = e.clientX; downY = e.clientY;
      const r = el.getBoundingClientRect();
      offsetX = e.clientX - r.left;
      offsetY = e.clientY - r.top;
      el.style.zIndex = ++zCounter;
    });

    el.addEventListener('pointermove', (e)=>{
      if(!dragging) return;
      if(Math.abs(e.clientX-downX) > 4 || Math.abs(e.clientY-downY) > 4) moved = true;
      const cardRect = card.getBoundingClientRect();
      let left = e.clientX - cardRect.left - offsetX;
      let top = e.clientY - cardRect.top - offsetY;
      left = Math.max(0, Math.min(cardRect.width-46, left));
      top = Math.max(0, Math.min(cardRect.height-46, top));
      el.style.left = left+'px';
      el.style.top = top+'px';
    });

    function endDrag(e){
      if(!dragging) return;
      dragging = false;
      if(!moved){
        // it's a tap -> wiggle + sound + maybe burst
        el.classList.remove('wiggling');
        void el.offsetWidth;
        el.classList.add('wiggling');
        soundFor(el.firstChild.textContent || el.textContent)();
        burstEmoji(el);
      }
    }
    el.addEventListener('pointerup', endDrag);
    el.addEventListener('pointercancel', endDrag);
  }

  function burstEmoji(el){
    const r = el.getBoundingClientRect();
    const cardRect = card.getBoundingClientRect();
    const emojis = ['✨','💫','⭐','🎉'];
    for(let i=0;i<4;i++){
      const b = document.createElement('div');
      b.className = 'burst-emoji';
      b.textContent = emojis[Math.floor(Math.random()*emojis.length)];
      b.style.left = (r.left - cardRect.left + 18) + 'px';
      b.style.top = (r.top - cardRect.top + 10) + 'px';
      b.style.setProperty('--dx', (Math.random()*60-30)+'px');
      card.appendChild(b);
      setTimeout(()=>b.remove(), 1050);
    }
  }

  /* Dragging a brand-new sticker from the tray */
  function startDragNew(emoji, clientX, clientY){
    const ghost = document.createElement('div');
    ghost.textContent = emoji;
    ghost.style.position = 'fixed';
    ghost.style.left = (clientX-23)+'px';
    ghost.style.top = (clientY-23)+'px';
    ghost.style.fontSize = '46px';
    ghost.style.pointerEvents = 'none';
    ghost.style.zIndex = 9999;
    ghost.style.filter = 'drop-shadow(0 4px 6px rgba(0,0,0,.4))';
    document.body.appendChild(ghost);

    function onMove(e){
      const cx = e.touches ? e.touches[0].clientX : e.clientX;
      const cy = e.touches ? e.touches[0].clientY : e.clientY;
      ghost.style.left = (cx-23)+'px';
      ghost.style.top = (cy-23)+'px';
    }
    function onUp(e){
      const cx = e.changedTouches ? e.changedTouches[0].clientX : e.clientX;
      const cy = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;
      ghost.remove();
      document.removeEventListener('pointermove', onMove);
      document.removeEventListener('pointerup', onUp);
      const cardRect = card.getBoundingClientRect();
      if(cx >= cardRect.left && cx <= cardRect.right && cy >= cardRect.top && cy <= cardRect.bottom){
        placeItem(emoji, cx, cy, true);
        pop();
      }
    }
    document.addEventListener('pointermove', onMove);
    document.addEventListener('pointerup', onUp);
  }

  /* ===================== Default scene ===================== */
  function setupDefaultScene(){
    const cardRect = card.getBoundingClientRect();
    const w = cardRect.width, h = cardRect.height;
    const defaults = [
      ['🎄', 0.14, 0.42],
      ['🎄', 0.85, 0.40],
      ['⛄', 0.5, 0.55],
      ['🎅', 0.28, 0.6],
      ['🦌', 0.68, 0.62],
      ['🎁', 0.42, 0.78],
      ['🎁', 0.58, 0.8],
      ['⭐', 0.14, 0.18],
      ['⭐', 0.5, 0.1],
      ['🧦', 0.78, 0.72],
    ];
    defaults.forEach(([emoji, fx, fy], i)=>{
      setTimeout(()=>{
        placeItem(emoji, cardRect.left + fx*w, cardRect.top + fy*h, true);
      }, i*120);
    });
  }
  // wait for layout
  requestAnimationFrame(()=> requestAnimationFrame(setupDefaultScene));

  /* ===================== Controls ===================== */
  document.getElementById('btn-jingle').addEventListener('click', ()=>{
    jingleBells();
    document.getElementById('title').style.animation='none';
    void document.getElementById('title').offsetWidth;
    document.getElementById('title').style.animation='bob 0.6s ease-in-out 4';
  });

  document.getElementById('btn-clear').addEventListener('click', ()=>{
    pop();
    document.querySelectorAll('.placed-item').forEach(el=>{
      el.style.transition='transform .3s, opacity .3s';
      el.style.transform='scale(0) rotate(45deg)';
      el.style.opacity='0';
      setTimeout(()=>el.remove(), 300);
    });
  });

  document.getElementById('btn-surprise').addEventListener('click', ()=>{
    chime();
    const cardRect = card.getBoundingClientRect();
    for(let i=0;i<6;i++){
      setTimeout(()=>{
        const emoji = STICKERS[Math.floor(Math.random()*STICKERS.length)];
        const x = cardRect.left + Math.random()*cardRect.width;
        const y = cardRect.top + cardRect.height*0.2 + Math.random()*cardRect.height*0.6;
        placeItem(emoji, x, y, true);
      }, i*150);
    }
  });

  document.getElementById('mute-btn').addEventListener('click', function(){
    muted = !muted;
    this.textContent = muted ? '🔇' : '🔊';
  });

  /* Resume/create audio context on first interaction (autoplay policies) */
  document.addEventListener('pointerdown', function initAudio(){
    ctx();
    document.removeEventListener('pointerdown', initAudio);
  }, {once:true});

})();
</script>
</body>
</html>
