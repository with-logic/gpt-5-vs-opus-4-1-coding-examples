<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Festival Lights Show</title>
<style>
  :root{
    --bg-1:#0a0a14;
    --bg-2:#150a24;
    --panel:#15101fcc;
    --panel-border:#ffffff14;
    --accent:#ff2fd0;
    --accent2:#2fe9ff;
    --text:#f4f1ff;
    --muted:#b6acd6;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    background:#000;
    font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,Roboto,sans-serif;
    color:var(--text);
    overflow:hidden;
  }

  /* ===================== STAGE ===================== */
  #stage{
    position:fixed;
    inset:0;
    background:radial-gradient(ellipse at 50% 20%, #1a0a2e 0%, #050208 70%);
    overflow:hidden;
    transition:background 0.6s ease;
  }
  #stage.flash::after{
    content:'';
    position:absolute;
    inset:0;
    background:#fff;
    opacity:0;
    pointer-events:none;
    animation:flashpop 120ms ease-out;
  }
  @keyframes flashpop{
    0%{opacity:0.85;}
    100%{opacity:0;}
  }

  /* Haze / glow wash layer behind everything */
  #glowWash{
    position:absolute;
    inset:-20%;
    filter:blur(60px);
    opacity:0.55;
    pointer-events:none;
    transition:background 0.4s ease;
    mix-blend-mode:screen;
  }

  /* Truss bar holding fixtures */
  #truss{
    position:absolute;
    top:6%;
    left:0;
    right:0;
    height:14px;
    background:linear-gradient(90deg,#1c1c24,#3a3a46,#1c1c24);
    box-shadow:0 0 18px #000a, 0 2px 8px #000;
    border-radius:3px;
  }
  #truss::before, #truss::after{
    content:'';
    position:absolute;
    top:0;bottom:0;
    width:14px;
    background:repeating-linear-gradient(45deg,#222 0 4px,#444 4px 8px);
  }
  #truss::before{left:0;}
  #truss::after{right:0;}

  .fixturesRow{
    position:absolute;
    top:6%;
    left:0;
    right:0;
    height:0;
    display:flex;
    justify-content:space-evenly;
    z-index:5;
  }

  .fixture{
    position:absolute;
    top:14px;
    width:34px;
    transform:translateX(-50%);
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  .fixture .yoke{
    width:6px;
    height:14px;
    background:#2b2b33;
  }
  .fixture .head{
    width:30px;
    height:38px;
    border-radius:6px 6px 14px 14px;
    background:linear-gradient(180deg,#2a2a33,#111116);
    box-shadow:inset 0 0 4px #000, 0 2px 6px #0008;
    position:relative;
    transform-origin:top center;
  }
  .fixture .lens{
    position:absolute;
    bottom:-4px;
    left:50%;
    transform:translateX(-50%);
    width:18px;
    height:18px;
    border-radius:50%;
    background:radial-gradient(circle at 35% 35%, #fff, var(--lens-color,#ff2fd0) 60%, #000 100%);
    box-shadow:0 0 10px 3px var(--lens-color,#ff2fd0), 0 0 24px 8px var(--lens-color,#ff2fd0);
  }

  /* Light beams */
  .beam{
    position:absolute;
    top:9.4%;
    width:140px;
    height:90vh;
    left:50%;
    transform-origin:top center;
    background:linear-gradient(180deg, var(--beam-color,#ff2fd0) 0%, transparent 80%);
    opacity:0.32;
    mix-blend-mode:screen;
    clip-path:polygon(46% 0, 54% 0, 100% 100%, 0% 100%);
    filter:blur(2px);
    pointer-events:none;
    z-index:2;
  }

  /* Disco / mirror ball */
  #ballRig{
    position:absolute;
    top:6%;
    left:50%;
    transform:translateX(-50%);
    width:2px;
    height:60px;
    background:#444;
    z-index:6;
  }
  #discoBall{
    position:absolute;
    top:58px;
    left:50%;
    transform:translateX(-50%);
    width:56px;
    height:56px;
    border-radius:50%;
    background:
      repeating-linear-gradient(45deg, #ddd 0 4px, #999 4px 8px),
      repeating-linear-gradient(-45deg, #fff3 0 4px, #0003 4px 8px);
    box-shadow:0 0 20px #fff8, inset -6px -6px 14px #0008, inset 4px 4px 10px #fff8;
    animation:spinBall 6s linear infinite;
  }
  @keyframes spinBall{ to{ background-position:200px 0; } }

  .sparkle{
    position:absolute;
    width:3px;height:3px;
    border-radius:50%;
    background:#fff;
    box-shadow:0 0 6px 2px #fff;
    pointer-events:none;
    z-index:6;
    opacity:0;
  }

  /* Dance floor / crowd silhouette */
  #floor{
    position:absolute;
    bottom:0;
    left:0;
    right:0;
    height:30%;
    background:linear-gradient(180deg, transparent, #000 90%);
    z-index:7;
  }
  #floorGrid{
    position:absolute;
    bottom:0;left:0;right:0;
    height:100%;
    background-image:
      linear-gradient(var(--accent2) 1px, transparent 1px),
      linear-gradient(90deg, var(--accent2) 1px, transparent 1px);
    background-size:60px 30px;
    opacity:0.18;
    transform:perspective(300px) rotateX(60deg);
    transform-origin:bottom;
    animation:gridmove 1.2s linear infinite;
  }
  @keyframes gridmove{ from{background-position:0 0,0 0;} to{background-position:60px 0,0 0;} }

  .silhouette{
    position:absolute;
    bottom:0;
    width:40px;
    height:90px;
    background:#000;
    border-radius:40% 40% 0 0 / 20% 20% 0 0;
    z-index:8;
  }

  /* Particle confetti / lasers canvas */
  #fxCanvas{
    position:absolute;
    inset:0;
    z-index:9;
    pointer-events:none;
  }

  /* Strobe overlay */
  #strobeOverlay{
    position:fixed;
    inset:0;
    background:#fff;
    opacity:0;
    pointer-events:none;
    z-index:50;
  }

  /* ===================== HUD / TITLE ===================== */
  #title{
    position:absolute;
    top:18px;
    left:50%;
    transform:translateX(-50%);
    text-align:center;
    z-index:20;
    pointer-events:none;
  }
  #title h1{
    margin:0;
    font-size:clamp(20px,4vw,34px);
    letter-spacing:4px;
    font-weight:800;
    background:linear-gradient(90deg,#ff2fd0,#ffd02f,#2fe9ff,#ff2fd0);
    background-size:300% auto;
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    animation:titleShift 6s linear infinite;
    text-shadow:0 0 30px #ff2fd055;
  }
  @keyframes titleShift{ to{ background-position:300% center; } }
  #title p{
    margin:2px 0 0;
    font-size:11px;
    letter-spacing:3px;
    color:var(--muted);
    text-transform:uppercase;
  }

  /* ===================== CONTROL PANEL ===================== */
  #controls{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    z-index:30;
    display:flex;
    justify-content:center;
    padding:10px 12px 14px;
    pointer-events:none;
  }
  #panelInner{
    pointer-events:auto;
    width:100%;
    max-width:1180px;
    background:var(--panel);
    backdrop-filter:blur(16px) saturate(160%);
    -webkit-backdrop-filter:blur(16px) saturate(160%);
    border:1px solid var(--panel-border);
    border-radius:20px;
    padding:14px 18px;
    box-shadow:0 -10px 40px #0008, 0 0 0 1px #ffffff08 inset;
    display:grid;
    grid-template-columns:1.3fr 1.6fr 1.3fr 1fr;
    gap:18px;
    align-items:start;
  }

  .group{
    display:flex;
    flex-direction:column;
    gap:8px;
    min-width:0;
  }
  .group h3{
    margin:0 0 2px;
    font-size:10px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--muted);
    display:flex;
    align-items:center;
    gap:6px;
  }
  .group h3::before{
    content:'';
    width:6px;height:6px;
    border-radius:50%;
    background:var(--accent2);
    box-shadow:0 0 8px var(--accent2);
  }

  /* Color swatches */
  #swatches{
    display:grid;
    grid-template-columns:repeat(8,1fr);
    gap:6px;
  }
  .swatch{
    aspect-ratio:1;
    border-radius:8px;
    border:2px solid #ffffff22;
    cursor:pointer;
    position:relative;
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .swatch:hover{ transform:scale(1.12); }
  .swatch.active{
    border-color:#fff;
    box-shadow:0 0 0 2px #fff4, 0 0 14px currentColor;
    transform:scale(1.1);
  }

  .colorRow{
    display:flex;
    align-items:center;
    gap:10px;
  }
  input[type="color"]{
    -webkit-appearance:none;
    appearance:none;
    width:42px;height:42px;
    border:none;
    border-radius:50%;
    overflow:hidden;
    cursor:pointer;
    background:none;
    padding:0;
  }
  input[type="color"]::-webkit-color-swatch-wrapper{padding:0;}
  input[type="color"]::-webkit-color-swatch{border:3px solid #fff3;border-radius:50%;}

  .miniLabel{
    font-size:11px;
    color:var(--muted);
  }

  /* Pattern buttons */
  #patterns{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:6px;
  }
  button.patternBtn{
    font-family:inherit;
    font-size:11px;
    font-weight:600;
    letter-spacing:0.5px;
    padding:8px 4px;
    border-radius:10px;
    border:1px solid #ffffff22;
    background:#ffffff0d;
    color:var(--text);
    cursor:pointer;
    transition:all .15s ease;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  button.patternBtn:hover{ background:#ffffff1f; transform:translateY(-1px); }
  button.patternBtn.active{
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:#0a0a14;
    border-color:transparent;
    box-shadow:0 0 16px #ff2fd066;
  }

  /* sliders */
  .sliderRow{
    display:flex;
    align-items:center;
    gap:10px;
  }
  .sliderRow .miniLabel{ width:62px; flex-shrink:0; }
  input[type="range"]{
    -webkit-appearance:none;
    appearance:none;
    flex:1;
    height:6px;
    border-radius:4px;
    background:linear-gradient(90deg,var(--accent2),var(--accent));
    outline:none;
  }
  input[type="range"]::-webkit-slider-thumb{
    -webkit-appearance:none;
    width:18px;height:18px;
    border-radius:50%;
    background:#fff;
    box-shadow:0 0 8px #fff, 0 0 0 4px #ffffff22;
    cursor:pointer;
    margin-top:-1px;
  }
  input[type="range"]::-moz-range-thumb{
    width:18px;height:18px;
    border-radius:50%;
    background:#fff;
    box-shadow:0 0 8px #fff, 0 0 0 4px #ffffff22;
    cursor:pointer;
    border:none;
  }
  .sliderVal{
    width:34px;
    text-align:right;
    font-size:11px;
    color:var(--accent2);
    font-variant-numeric:tabular-nums;
  }

  /* Big action buttons */
  .bigBtnRow{ display:flex; gap:8px; }
  button.bigBtn{
    flex:1;
    font-family:inherit;
    font-weight:700;
    font-size:12px;
    letter-spacing:1px;
    padding:12px 6px;
    border-radius:12px;
    border:none;
    cursor:pointer;
    color:#fff;
    transition:all .15s ease;
    position:relative;
    overflow:hidden;
  }
  button.bigBtn:active{ transform:scale(0.96); }
  #strobeBtn{ background:linear-gradient(135deg,#3a3a46,#1c1c24); border:1px solid #ffffff2a;}
  #strobeBtn.active{ background:linear-gradient(135deg,#fff,#ccc); color:#000; box-shadow:0 0 20px #fff; }
  #blackoutBtn{ background:linear-gradient(135deg,#3a3a46,#1c1c24); border:1px solid #ffffff2a;}
  #blackoutBtn.active{ background:#000; border-color:#ff2fd0; color:#ff2fd0; box-shadow:0 0 16px #ff2fd066;}

  /* music sync toggle + bpm */
  #musicToggle{
    background:linear-gradient(135deg,#1f8f5f,#0e3d29);
    width:100%;
  }
  #musicToggle.active{
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:#0a0a14;
    box-shadow:0 0 18px #2fe9ff66;
  }
  #micPermNote{
    font-size:10px;
    color:var(--muted);
    line-height:1.4;
  }

  .bpmDisplay{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    font-size:11px;
    color:var(--muted);
  }
  .bpmDisplay b{
    font-size:20px;
    color:var(--accent2);
    font-variant-numeric:tabular-nums;
  }
  #beatDot{
    width:10px;height:10px;
    border-radius:50%;
    background:#333;
    box-shadow:none;
    transition:background .05s, box-shadow .05s;
  }
  #beatDot.hit{
    background:var(--accent);
    box-shadow:0 0 14px 4px var(--accent);
  }

  #vizBars{
    display:flex;
    align-items:flex-end;
    gap:2px;
    height:30px;
    width:100%;
  }
  #vizBars div{
    flex:1;
    background:linear-gradient(180deg,var(--accent2),var(--accent));
    border-radius:2px;
    height:4%;
    transition:height .06s linear;
  }

  @media (max-width:880px){
    #panelInner{ grid-template-columns:1fr 1fr; }
  }
  @media (max-width:520px){
    #panelInner{ grid-template-columns:1fr; max-height:46vh; overflow-y:auto; }
    #title p{ display:none; }
  }

  ::-webkit-scrollbar{ width:6px; }
  ::-webkit-scrollbar-thumb{ background:#ffffff33; border-radius:3px; }
</style>
</head>
<body>

<div id="stage">
  <div id="glowWash"></div>

  <div id="truss"></div>
  <div id="ballRig"></div>
  <div id="discoBall"></div>

  <div id="fixturesRow"></div>
  <div id="beamsLayer"></div>

  <div id="floor">
    <div id="floorGrid"></div>
  </div>

  <canvas id="fxCanvas"></canvas>
  <div id="title">
    <h1>✦ FESTIVAL LIGHTS SHOW ✦</h1>
    <p>Virtual Stage Lighting Console</p>
  </div>
</div>

<div id="strobeOverlay"></div>

<div id="controls">
  <div id="panelInner">

    <!-- COLOR -->
    <div class="group">
      <h3>Color</h3>
      <div id="swatches"></div>
      <div class="colorRow">
        <input type="color" id="customColor" value="#ff2fd0">
        <span class="miniLabel">Custom color picker</span>
      </div>
    </div>

    <!-- PATTERNS -->
    <div class="group">
      <h3>Pattern</h3>
      <div id="patterns"></div>
      <div class="sliderRow">
        <span class="miniLabel">Speed</span>
        <input type="range" id="speedSlider" min="1" max="20" value="8">
        <span class="sliderVal" id="speedVal">8</span>
      </div>
      <div class="sliderRow">
        <span class="miniLabel">Brightness</span>
        <input type="range" id="brightSlider" min="5" max="100" value="85">
        <span class="sliderVal" id="brightVal">85</span>
      </div>
    </div>

    <!-- MUSIC SYNC -->
    <div class="group">
      <h3>Music Sync</h3>
      <button class="bigBtn" id="musicToggle">🎙 ENABLE MIC SYNC</button>
      <div class="bpmDisplay">
        <span>Tap tempo / auto BPM</span>
        <b id="bpmVal">120</b>
        <span id="beatDot"></span>
      </div>
      <div id="vizBars"></div>
      <button class="bigBtn" id="tapTempo" style="background:linear-gradient(135deg,#3a3a46,#1c1c24);">TAP TEMPO</button>
      <div id="micPermNote">Mic sync reacts live to ambient sound. Falls back to simulated beat if mic access is denied.</div>
    </div>

    <!-- ACTIONS -->
    <div class="group">
      <h3>Master</h3>
      <div class="bigBtnRow">
        <button class="bigBtn" id="strobeBtn">⚡ STROBE</button>
      </div>
      <div class="bigBtnRow">
        <button class="bigBtn" id="blackoutBtn">⏻ BLACKOUT</button>
      </div>
      <div class="sliderRow">
        <span class="miniLabel">Fixtures</span>
        <input type="range" id="fixtureSlider" min="4" max="14" value="9">
        <span class="sliderVal" id="fixtureVal">9</span>
      </div>
    </div>

  </div>
</div>

<script>
(function(){
  "use strict";

  /* ============================================================
     STATE
  ============================================================= */
  const state = {
    color: '#ff2fd0',
    palette: ['#ff2fd0','#2fe9ff','#ffd02f','#2fff7a','#ff5c2f','#9d2fff','#ff2f5c','#2f6cff'],
    pattern: 'rainbow',
    speed: 8,
    brightness: 85,
    fixtureCount: 9,
    strobeOn: false,
    blackout: false,
    musicOn: false,
    bpm: 120,
    beatPhase: 0,
    lastBeatTime: 0,
  };

  const PATTERNS = [
    {id:'static',   label:'Static Color'},
    {id:'rainbow',  label:'Rainbow Cycle'},
    {id:'chase',    label:'Chase'},
    {id:'strobe',   label:'Strobe Pulse'},
    {id:'pulse',    label:'Soft Pulse'},
    {id:'alternate',label:'Alternate'},
    {id:'sparkle',  label:'Sparkle'},
    {id:'wave',     label:'Wave Sweep'},
    {id:'fire',     label:'Fire Flicker'},
  ];

  /* ============================================================
     BUILD FIXTURES / BEAMS
  ============================================================= */
  const fixturesRow = document.getElementById('fixturesRow');
  const beamsLayer = document.getElementById('beamsLayer');
  let fixtures = []; // {el, lens, beamEl, hue}

  function buildFixtures(n){
    fixturesRow.innerHTML = '';
    beamsLayer.innerHTML = '';
    fixtures = [];
    for(let i=0;i<n;i++){
      const pct = (i+0.5)/n*100;

      const fx = document.createElement('div');
      fx.className = 'fixture';
      fx.style.left = pct+'%';
      fx.innerHTML = `<div class="yoke"></div><div class="head"><div class="lens"></div></div>`;
      fixturesRow.appendChild(fx);

      const beam = document.createElement('div');
      beam.className = 'beam';
      beam.style.left = pct+'%';
      beamsLayer.appendChild(beam);

      fixtures.push({
        fxEl: fx,
        head: fx.querySelector('.head'),
        lens: fx.querySelector('.lens'),
        beam: beam,
        hueOffset: (360/n)*i,
        phase: Math.random()*Math.PI*2,
      });
    }
  }
  buildFixtures(state.fixtureCount);

  /* Dance floor silhouettes */
  const floorEl = document.getElementById('floor');
  function buildCrowd(){
    const n = 14;
    for(let i=0;i<n;i++){
      const s = document.createElement('div');
      s.className = 'silhouette';
      const leftPct = (i+0.5)/n*100 + (Math.random()*4-2);
      s.style.left = leftPct+'%';
      s.style.width = (28+Math.random()*18)+'px';
      s.style.height = (60+Math.random()*40)+'px';
      s.style.animation = `bob ${0.5+Math.random()*0.6}s ease-in-out ${Math.random()}s infinite alternate`;
      floorEl.appendChild(s);
    }
  }
  const styleSheet = document.createElement('style');
  styleSheet.textContent = `@keyframes bob{ from{ transform:translateY(0) } to{ transform:translateY(-10px) } }`;
  document.head.appendChild(styleSheet);
  buildCrowd();

  /* ============================================================
     COLOR SWATCHES
  ============================================================= */
  const swatchesEl = document.getElementById('swatches');
  function buildSwatches(){
    swatchesEl.innerHTML = '';
    state.palette.forEach(c=>{
      const sw = document.createElement('div');
      sw.className = 'swatch';
      sw.style.background = c;
      sw.style.color = c;
      if(c.toLowerCase()===state.color.toLowerCase()) sw.classList.add('active');
      sw.addEventListener('click', ()=>{
        state.color = c;
        document.getElementById('customColor').value = c;
        refreshSwatchActive();
      });
      swatchesEl.appendChild(sw);
    });
  }
  function refreshSwatchActive(){
    [...swatchesEl.children].forEach((sw,i)=>{
      sw.classList.toggle('active', state.palette[i].toLowerCase()===state.color.toLowerCase());
    });
  }
  buildSwatches();

  document.getElementById('customColor').addEventListener('input', e=>{
    state.color = e.target.value;
    refreshSwatchActive();
  });

  /* ============================================================
     PATTERN BUTTONS
  ============================================================= */
  const patternsEl = document.getElementById('patterns');
  function buildPatternButtons(){
    PATTERNS.forEach(p=>{
      const btn = document.createElement('button');
      btn.className = 'patternBtn' + (p.id===state.pattern ? ' active':'');
      btn.textContent = p.label;
      btn.dataset.id = p.id;
      btn.addEventListener('click', ()=>{
        state.pattern = p.id;
        [...patternsEl.children].forEach(b=>b.classList.toggle('active', b.dataset.id===p.id));
      });
      patternsEl.appendChild(btn);
    });
  }
  buildPatternButtons();

  /* ============================================================
     SLIDERS
  ============================================================= */
  const speedSlider = document.getElementById('speedSlider');
  const speedVal = document.getElementById('speedVal');
  speedSlider.addEventListener('input', e=>{
    state.speed = +e.target.value;
    speedVal.textContent = state.speed;
  });

  const brightSlider = document.getElementById('brightSlider');
  const brightVal = document.getElementById('brightVal');
  brightSlider.addEventListener('input', e=>{
    state.brightness = +e.target.value;
    brightVal.textContent = state.brightness;
  });

  const fixtureSlider = document.getElementById('fixtureSlider');
  const fixtureVal = document.getElementById('fixtureVal');
  fixtureSlider.addEventListener('input', e=>{
    state.fixtureCount = +e.target.value;
    fixtureVal.textContent = state.fixtureCount;
    buildFixtures(state.fixtureCount);
  });

  /* ============================================================
     MASTER BUTTONS
  ============================================================= */
  const strobeBtn = document.getElementById('strobeBtn');
  strobeBtn.addEventListener('click', ()=>{
    state.strobeOn = !state.strobeOn;
    strobeBtn.classList.toggle('active', state.strobeOn);
    if(state.strobeOn) state.blackout=false, blackoutBtn.classList.remove('active');
  });

  const blackoutBtn = document.getElementById('blackoutBtn');
  blackoutBtn.addEventListener('click', ()=>{
    state.blackout = !state.blackout;
    blackoutBtn.classList.toggle('active', state.blackout);
    if(state.blackout) state.strobeOn=false, strobeBtn.classList.remove('active');
  });

  /* ============================================================
     MUSIC SYNC (mic input via Web Audio API, with simulated fallback)
  ============================================================= */
  const musicToggle = document.getElementById('musicToggle');
  const bpmValEl = document.getElementById('bpmVal');
  const beatDot = document.getElementById('beatDot');
  const vizBarsEl = document.getElementById('vizBars');
  const NUM_BARS = 28;
  let bars = [];
  for(let i=0;i<NUM_BARS;i++){
    const b = document.createElement('div');
    vizBarsEl.appendChild(b);
    bars.push(b);
  }

  let audioCtx=null, analyser=null, dataArray=null, micStream=null;
  let simulateAudio = true;
  let energyHistory = [];
  let lastEnergyBeatTime = 0;

  async function enableMic(){
    try{
      micStream = await navigator.mediaDevices.getUserMedia({audio:true});
      audioCtx = new (window.AudioContext||window.webkitAudioContext)();
      const src = audioCtx.createMediaStreamSource(micStream);
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 256;
      analyser.smoothingTimeConstant = 0.75;
      src.connect(analyser);
      dataArray = new Uint8Array(analyser.frequencyBinCount);
      simulateAudio = false;
    }catch(err){
      simulateAudio = true;
      console.warn('Mic unavailable, using simulated beat:', err.message);
    }
  }

  function disableMic(){
    if(micStream){ micStream.getTracks().forEach(t=>t.stop()); micStream=null; }
    if(audioCtx){ audioCtx.close(); audioCtx=null; }
    analyser=null; dataArray=null;
    simulateAudio = true;
  }

  musicToggle.addEventListener('click', async ()=>{
    state.musicOn = !state.musicOn;
    musicToggle.classList.toggle('active', state.musicOn);
    musicToggle.textContent = state.musicOn ? '🎙 SYNC ACTIVE' : '🎙 ENABLE MIC SYNC';
    if(state.musicOn){
      await enableMic();
    } else {
      disableMic();
      bars.forEach(b=> b.style.height = '4%');
    }
  });

  // Tap tempo
  let tapTimes = [];
  document.getElementById('tapTempo').addEventListener('click', ()=>{
    const now = performance.now();
    tapTimes.push(now);
    tapTimes = tapTimes.filter(t => now - t < 4000);
    if(tapTimes.length>1){
      const intervals = [];
      for(let i=1;i<tapTimes.length;i++) intervals.push(tapTimes[i]-tapTimes[i-1]);
      const avg = intervals.reduce((a,b)=>a+b,0)/intervals.length;
      state.bpm = Math.round(60000/avg);
      bpmValEl.textContent = state.bpm;
    }
    flashBeatDot();
  });

  function flashBeatDot(){
    beatDot.classList.add('hit');
    setTimeout(()=>beatDot.classList.remove('hit'), 90);
  }

  /* Simulated audio energy (used when no mic / as base layer) */
  function getSimulatedEnergy(t){
    const beatInterval = 60000/state.bpm;
    const phase = (t % beatInterval)/beatInterval;
    const beatPulse = Math.pow(1-phase, 3); // sharp decay after beat
    const sub = (Math.sin(t/130)+1)/2 * 0.25;
    return Math.min(1, beatPulse*0.85 + sub + 0.08);
  }

  function updateAudioReactivity(t){
    let levels = new Array(NUM_BARS).fill(0);
    let overallEnergy = 0;

    if(state.musicOn && analyser && dataArray){
      analyser.getByteFrequencyData(dataArray);
      const bucket = Math.floor(dataArray.length/NUM_BARS);
      for(let i=0;i<NUM_BARS;i++){
        let sum=0;
        for(let j=0;j<bucket;j++) sum += dataArray[i*bucket+j];
        levels[i] = (sum/bucket)/255;
      }
      overallEnergy = levels.reduce((a,b)=>a+b,0)/NUM_BARS;

      // simple beat detection via short energy history
      energyHistory.push(overallEnergy);
      if(energyHistory.length>43) energyHistory.shift();
      const avgEnergy = energyHistory.reduce((a,b)=>a+b,0)/energyHistory.length;
      if(overallEnergy > avgEnergy*1.35 && overallEnergy>0.12 && (t-lastEnergyBeatTime)>200){
        lastEnergyBeatTime = t;
        flashBeatDot();
        triggerBeatPulse();
      }
    } else {
      // simulated
      const base = getSimulatedEnergy(t);
      for(let i=0;i<NUM_BARS;i++){
        const n = Math.sin(t/90 + i*0.7) * 0.5 + 0.5;
        levels[i] = Math.min(1, base*0.7 + n*0.4);
      }
      overallEnergy = base;
      const beatInterval = 60000/state.bpm;
      const phase = t % beatInterval;
      if(phase < 16 && (t-lastEnergyBeatTime) > beatInterval*0.6){
        lastEnergyBeatTime = t;
        flashBeatDot();
        if(state.musicOn) triggerBeatPulse();
      }
    }

    bars.forEach((b,i)=>{
      b.style.height = Math.max(4, levels[i]*100)+'%';
    });

    return overallEnergy;
  }

  let beatPulseStrength = 0;
  function triggerBeatPulse(){
    beatPulseStrength = 1;
  }

  /* ============================================================
     COLOR HELPERS
  ============================================================= */
  function hexToHsl(hex){
    let r=parseInt(hex.slice(1,3),16)/255, g=parseInt(hex.slice(3,5),16)/255, b=parseInt(hex.slice(5,7),16)/255;
    const max=Math.max(r,g,b), min=Math.min(r,g,b);
    let h,s,l=(max+min)/2;
    if(max===min){ h=s=0; }
    else{
      const d=max-min;
      s = l>0.5 ? d/(2-max-min) : d/(max+min);
      switch(max){
        case r: h=(g-b)/d+(g<b?6:0); break;
        case g: h=(b-r)/d+2; break;
        case b: h=(r-g)/d+4; break;
      }
      h*=60;
    }
    return {h,s:s*100,l:l*100};
  }
  function hsl(h,s,l){ return `hsl(${h%360},${s}%,${l}%)`; }

  /* ============================================================
     MAIN RENDER LOOP
  ============================================================= */
  const stageEl = document.getElementById('stage');
  const glowWash = document.getElementById('glowWash');
  const strobeOverlay = document.getElementById('strobeOverlay');
  const baseHsl = ()=>hexToHsl(state.color);

  let lastStrobeToggle = 0;
  let strobeState = false;

  function render(t){
    const energy = updateAudioReactivity(t);
    beatPulseStrength *= 0.9;

    const speedFactor = state.speed/8;
    const brightnessFactor = state.brightness/100;
    const musicBoost = state.musicOn ? (energy*0.6 + beatPulseStrength*0.5) : 0;

    if(state.blackout){
      fixtures.forEach(f=>{
        f.lens.style.setProperty('--lens-color', '#050505');
        f.lens.style.boxShadow = 'none';
        f.beam.style.opacity = 0;
        f.head.style.transform = 'rotate(0deg)';
      });
      glowWash.style.background = 'transparent';
      stageEl.style.background = 'radial-gradient(ellipse at 50% 20%, #050505 0%, #000 70%)';
      strobeOverlay.style.opacity = 0;
      requestAnimationFrame(render);
      return;
    }

    if(state.strobeOn || state.pattern==='strobe'){
      const stamp = Math.floor(t / (90/speedFactor));
      if(stamp !== lastStrobeToggle){
        lastStrobeToggle = stamp;
        strobeState = !strobeState;
      }
      strobeOverlay.style.opacity = strobeState ? (0.85*brightnessFactor) : 0;
    } else {
      strobeOverlay.style.opacity = 0;
    }

    let avgColorForWash = state.color;

    fixtures.forEach((f, i) => {
      let h, s=85, l=55, headAngle=0, beamOpacity=0.3, lensExtra=1;
      const base = baseHsl();

      switch(state.pattern){
        case 'static':
          h = base.h; l = base.l;
          headAngle = Math.sin(t/2000)*4;
          break;
        case 'rainbow':
          h = (base.h + t*0.03*speedFactor + i*(360/fixtures.length)) % 360;
          headAngle = Math.sin(t/1500*speedFactor + f.phase)*18;
          break;
        case 'chase': {
          const cyclePos = (t*0.002*speedFactor) % fixtures.length;
          const dist = Math.min(Math.abs(i-cyclePos), fixtures.length-Math.abs(i-cyclePos));
          h = base.h;
          l = Math.max(8, 60 - dist*22);
          beamOpacity = Math.max(0.04, 0.5 - dist*0.18);
          headAngle = Math.sin(t/1000 + i)*6;
          break;
        }
        case 'strobe':
          h = base.h; l = strobeState ? 92 : 6;
          beamOpacity = strobeState ? 0.55 : 0.03;
          break;
        case 'pulse': {
          const p = (Math.sin(t/600*speedFactor + f.phase)+1)/2;
          h = base.h; l = 20 + p*55;
          beamOpacity = 0.15 + p*0.35;
          headAngle = 0;
          break;
        }
        case 'alternate': {
          const on = (Math.floor(t/(260/speedFactor)) + i) % 2 === 0;
          h = on ? base.h : (base.h+180)%360;
          l = 55;
          headAngle = on ? 10 : -10;
          break;
        }
        case 'sparkle': {
          const r = Math.sin(i*999 + Math.floor(t/(120/speedFactor)))*0.5+0.5;
          h = base.h + (i*37 % 360)*0.0; // keep hue near base, vary lightness
          l = r>0.7 ? 90 : 25;
          beamOpacity = r>0.7 ? 0.5 : 0.05;
          headAngle = Math.sin(t/2000+i)*8;
          break;
        }
        case 'wave': {
          const w = Math.sin(t/700*speedFactor - i*0.9);
          h = (base.h + i*8) % 360;
          l = 30 + ((w+1)/2)*45;
          headAngle = w*22;
          beamOpacity = 0.15 + ((w+1)/2)*0.35;
          break;
        }
        case 'fire': {
          h = (10 + Math.sin(t/150+i)*12 + 360)%360;
          s = 90;
          l = 35 + Math.random()*25;
          beamOpacity = 0.2 + Math.random()*0.2;
          headAngle = Math.sin(t/300+i)*5;
          break;
        }
        default:
          h = base.h; l = base.l;
      }

      // music reactivity layered on top
      l = Math.min(95, l + musicBoost*25);
      beamOpacity = Math.min(0.9, beamOpacity + musicBoost*0.3);
      const finalL = l * brightnessFactor + (1-brightnessFactor)*4;
      const color = hsl(h, s, Math.max(3,Math.min(96,finalL)));

      f.lens.style.setProperty('--lens-color', color);
      f.beam.style.setProperty('--beam-color', color);
      f.beam.style.opacity = beamOpacity * brightnessFactor;
      f.head.style.transform = `rotate(${headAngle}deg)`;

      if(i===0) avgColorForWash = color;
    });

    // ambient wash + bg pulse with the music
    const washColor = hsl(baseHsl().h, 90, 50);
    glowWash.style.background = `radial-gradient(circle at 50% 0%, ${washColor}, transparent 70%)`;
    glowWash.style.opacity = (0.35 + musicBoost*0.35) * brightnessFactor;

    requestAnimationFrame(render);
  }
  requestAnimationFrame(render);

  /* ============================================================
     PARTICLE FX CANVAS (confetti + lasers on beat)
  ============================================================= */
  const canvas = document.getElementById('fxCanvas');
  const ctx = canvas.getContext('2d');
  function resizeCanvas(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  let particles = [];
  function spawnConfetti(n){
    for(let i=0;i<n;i++){
      particles.push({
        x: Math.random()*canvas.width,
        y: -10,
        vx: (Math.random()-0.5)*2,
        vy: 2+Math.random()*3,
        size: 3+Math.random()*4,
        color: state.palette[Math.floor(Math.random()*state.palette.length)],
        rot: Math.random()*Math.PI*2,
        vrot: (Math.random()-0.5)*0.2,
        life: 1,
      });
    }
  }

  let lastConfettiBeat = 0;
  function fxLoop(t){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    if(beatPulseStrength>0.85 && t-lastConfettiBeat>250 && !state.blackout){
      lastConfettiBeat = t;
      spawnConfetti(18);
    }

    particles.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.rot+=p.vrot; p.life-=0.004;
      ctx.save();
      ctx.translate(p.x,p.y);
      ctx.rotate(p.rot);
      ctx.globalAlpha = Math.max(0,p.life);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size);
      ctx.restore();
    });
    particles = particles.filter(p=>p.life>0 && p.y<canvas.height+20);

    requestAnimationFrame(fxLoop);
  }
  requestAnimationFrame(fxLoop);

  /* ============================================================
     DISCO BALL SPARKLES
  ============================================================= */
  const stage = document.getElementById('stage');
  function spawnSparkle(){
    const ball = document.getElementById('discoBall');
    const rect = ball.getBoundingClientRect();
    const stageRect = stage.getBoundingClientRect();
    const sp = document.createElement('div');
    sp.className='sparkle';
    const angle = Math.random()*Math.PI*2;
    const dist = 40 + Math.random()*Math.min(window.innerWidth, window.innerHeight)*0.35;
    const startX = rect.left - stageRect.left + rect.width/2;
    const startY = rect.top - stageRect.top + rect.height/2;
    sp.style.left = startX+'px';
    sp.style.top = startY+'px';
    stage.appendChild(sp);

    const endX = startX + Math.cos(angle)*dist;
    const endY = startY + Math.sin(angle)*dist*0.6 + 100;

    sp.animate([
      { transform:'translate(0,0)', opacity:0.9 },
      { transform:`translate(${endX-startX}px, ${endY-startY}px)`, opacity:0 }
    ], { duration: 900+Math.random()*500, easing:'ease-out' });

    setTimeout(()=>sp.remove(), 1500);
  }
  setInterval(()=>{ if(!document.hidden) spawnSparkle(); }, 140);

  /* ============================================================
     INIT DEFAULT PATTERN BUTTON ACTIVE STATE FIX
  ============================================================= */
  // ensure rainbow is marked active even if markup order changes
  [...patternsEl.children].forEach(b=>b.classList.toggle('active', b.dataset.id===state.pattern));

})();
</script>
</body>
