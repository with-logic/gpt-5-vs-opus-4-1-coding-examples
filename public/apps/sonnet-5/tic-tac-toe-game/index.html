<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>TIC · TAC · TOE — SPQR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;500;600;700;800&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --gold: #cda64a;
    --gold-bright: #f3d27a;
    --gold-dim: #8a6f2e;
    --marble-1: #f4f1ea;
    --marble-2: #e6e0d2;
    --marble-3: #d8d0bb;
    --ink: #2b2620;
    --ink-soft: #5a5142;
    --board-bg: #efe9da;
    --cell-bg: #f8f5ec;
    --shadow-col: 222, 32%, 8%;
    --x-color: #7a1f1f;
    --o-color: #1f3a5f;
    --accent-line: #b9a06a;
    --bg-deep: #1b1712;
    --surface: #fffaf0;
    --radius-lg: 22px;
    --radius-md: 14px;
    --radius-sm: 9px;
  }

  html[data-theme="night"]{
    --gold: #e2c168;
    --gold-bright: #ffe49a;
    --gold-dim: #a3852f;
    --marble-1: #2a2620;
    --marble-2: #211e19;
    --marble-3: #171411;
    --ink: #ece4d2;
    --ink-soft: #c9bd9f;
    --board-bg: #221f1a;
    --cell-bg: #2b261f;
    --shadow-col: 0, 0%, 0%;
    --x-color: #e08b6b;
    --o-color: #7fb0e6;
    --accent-line: #6b5b34;
    --bg-deep: #0d0b09;
    --surface: #1c1814;
  }

  *,*::before,*::after{ box-sizing: border-box; }

  html,body{
    height: 100%;
    margin: 0;
    overscroll-behavior: none;
  }

  body{
    font-family: 'EB Garamond', Georgia, serif;
    color: var(--ink);
    background:
      radial-gradient(ellipse at 20% -10%, rgba(255,255,255,0.5), transparent 60%),
      linear-gradient(160deg, var(--marble-1) 0%, var(--marble-2) 45%, var(--marble-3) 100%);
    min-height: 100%;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    overflow-x: hidden;
    transition: background 0.5s ease, color 0.5s ease;
  }

  /* Marble veining texture */
  body::before{
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    opacity: 0.5;
    background-image:
      repeating-linear-gradient(115deg, transparent 0px, transparent 60px, rgba(120,110,90,0.05) 62px, transparent 90px),
      repeating-linear-gradient(35deg, transparent 0px, transparent 80px, rgba(120,110,90,0.04) 83px, transparent 130px),
      repeating-linear-gradient(170deg, transparent 0px, transparent 40px, rgba(255,255,255,0.05) 41px, transparent 70px);
    transition: opacity 0.5s ease;
  }
  html[data-theme="night"] body::before{ opacity: 0.35; }

  /* subtle colosseum arch silhouette footer vibe */
  .colosseum-strip{
    position: fixed;
    left: 0; right: 0; bottom: 0;
    height: min(14vh, 110px);
    pointer-events: none;
    z-index: 0;
    opacity: 0.35;
    background:
      repeating-linear-gradient(
        90deg,
        transparent 0, transparent 2px,
        var(--bg-deep) 2px, var(--bg-deep) calc(2px + min(4vw,34px))
      );
    -webkit-mask-image: radial-gradient(ellipse 16px 28px at center bottom, transparent 60%, black 62%);
    mask-image: radial-gradient(ellipse 16px 28px at center bottom, transparent 60%, black 62%);
    -webkit-mask-repeat: repeat-x;
    mask-repeat: repeat-x;
    -webkit-mask-size: min(8vw, 68px) 100%;
    mask-size: min(8vw, 68px) 100%;
    filter: blur(0.3px);
    transition: opacity 0.5s ease;
  }
  html[data-theme="night"] .colosseum-strip{ opacity: 0.55; }

  .app{
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100%;
    width: 100%;
    padding: max(10px, 1.6vh) max(10px, 2vw) max(16px, 2vh);
    gap: clamp(8px, 1.4vh, 16px);
  }

  /* ===== Header / Crest ===== */
  .crest-row{
    display:flex;
    align-items:center;
    justify-content:center;
    gap: clamp(8px,1.6vw,18px);
    margin-top: clamp(2px, 0.6vh, 8px);
  }

  .crest{
    width: clamp(34px, 6vmin, 56px);
    height: clamp(34px, 6vmin, 56px);
    flex-shrink: 0;
    filter: drop-shadow(0 2px 3px rgba(0,0,0,0.35));
  }

  .title-block{ text-align: center; }

  h1.brand{
    font-family: 'Cinzel Decorative', 'Cinzel', serif;
    font-weight: 700;
    font-size: clamp(1.3rem, 4.4vmin, 2.5rem);
    letter-spacing: 0.12em;
    margin: 0;
    line-height: 1.05;
    background: linear-gradient(180deg, var(--gold-bright), var(--gold) 55%, var(--gold-dim));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 1px 0 rgba(255,255,255,0.15);
    white-space: nowrap;
  }

  .subtitle{
    font-family: 'Cinzel', serif;
    font-size: clamp(0.55rem, 1.5vmin, 0.8rem);
    letter-spacing: 0.4em;
    color: var(--ink-soft);
    margin: 2px 0 0;
    text-transform: uppercase;
  }

  /* ===== Top bar ===== */
  .toolbar{
    display: flex;
    gap: clamp(6px, 1.4vw, 14px);
    flex-wrap: wrap;
    justify-content: center;
    width: 100%;
    max-width: 640px;
  }

  .btn{
    font-family: 'Cinzel', serif;
    font-weight: 600;
    font-size: clamp(0.62rem, 1.7vmin, 0.95rem);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink);
    background: linear-gradient(180deg, var(--surface), var(--marble-2));
    border: 1.5px solid var(--gold-dim);
    border-radius: var(--radius-md);
    padding: clamp(8px, 1.6vmin, 13px) clamp(12px, 2.6vmin, 22px);
    cursor: pointer;
    box-shadow:
      0 1px 0 rgba(255,255,255,0.6) inset,
      0 3px 8px hsla(var(--shadow-col), 0.25);
    transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.2s ease, color 0.3s ease, border-color 0.3s ease;
    white-space: nowrap;
  }
  .btn:hover{
    transform: translateY(-2px);
    box-shadow: 0 2px 0 rgba(255,255,255,0.6) inset, 0 6px 14px hsla(var(--shadow-col), 0.3);
    border-color: var(--gold);
  }
  .btn:active{
    transform: translateY(0px);
    box-shadow: 0 1px 0 rgba(255,255,255,0.4) inset, 0 2px 4px hsla(var(--shadow-col), 0.3);
  }
  .btn:focus-visible{
    outline: 2px solid var(--gold);
    outline-offset: 2px;
  }
  .btn.primary{
    color: #2b2008;
    background: linear-gradient(180deg, var(--gold-bright), var(--gold) 70%, var(--gold-dim));
    border-color: var(--gold-dim);
  }
  .btn.primary:hover{ filter: brightness(1.06); }

  /* ===== Scoreboard ===== */
  .scoreboard{
    display: grid;
    grid-template-columns: repeat(3, minmax(0,1fr));
    gap: clamp(6px, 1.4vw, 14px);
    width: 100%;
    max-width: 560px;
  }
  .score-card{
    background: linear-gradient(180deg, var(--surface), var(--marble-2));
    border: 1px solid var(--accent-line);
    border-radius: var(--radius-md);
    padding: clamp(6px, 1.2vh, 12px) 4px;
    text-align: center;
    box-shadow: 0 2px 6px hsla(var(--shadow-col), 0.18);
    position: relative;
    overflow: hidden;
  }
  .score-card::after{
    content:"";
    position:absolute; inset:0;
    border: 1px solid rgba(205,166,74,0.25);
    border-radius: inherit;
    margin: 3px;
    pointer-events:none;
  }
  .score-card .label{
    font-family:'Cinzel', serif;
    font-size: clamp(0.55rem, 1.3vmin, 0.78rem);
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
  .score-card .value{
    font-family:'Cinzel Decorative', serif;
    font-size: clamp(1.1rem, 3.2vmin, 1.9rem);
    color: var(--gold-dim);
    font-weight: 700;
    line-height: 1.2;
  }
  html[data-theme="night"] .score-card .value{ color: var(--gold-bright); }
  .score-card.active{
    border-color: var(--gold);
    box-shadow: 0 0 0 2px var(--gold), 0 4px 10px hsla(var(--shadow-col),0.25);
  }

  /* ===== Board area (relative container for banner overlay placement) ===== */
  .stage{
    position: relative;
    display:flex;
    flex-direction:column;
    align-items:center;
    width:100%;
    flex: 1 1 auto;
    justify-content: center;
    min-height: 0;
    gap: clamp(6px, 1.2vh, 12px);
  }

  .status-line{
    font-family:'Cinzel', serif;
    font-size: clamp(0.75rem, 2.2vmin, 1.15rem);
    letter-spacing: 0.05em;
    color: var(--ink-soft);
    text-align:center;
    min-height: 1.4em;
    padding: 2px 10px;
  }
  .status-line .turn-x{ color: var(--x-color); font-weight:700; }
  .status-line .turn-o{ color: var(--o-color); font-weight:700; }

  /* Victory banner reserves its own slot so nothing overlaps */
  .banner-slot{
    width: 100%;
    max-width: 540px;
    min-height: clamp(40px, 6vh, 58px);
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .banner{
    font-family:'Cinzel Decorative', serif;
    font-size: clamp(0.85rem, 2.6vmin, 1.4rem);
    letter-spacing: 0.08em;
    text-align:center;
    padding: clamp(8px,1.6vh,14px) clamp(14px,3vw,26px);
    border-radius: var(--radius-md);
    background: linear-gradient(180deg, var(--gold-bright), var(--gold) 60%, var(--gold-dim));
    color: #2b2008;
    box-shadow: 0 4px 18px hsla(var(--shadow-col), 0.35), 0 0 0 2px rgba(255,255,255,0.4) inset;
    opacity: 0;
    transform: translateY(-8px) scale(0.96);
    transition: opacity 0.35s ease, transform 0.35s ease;
    max-width: 100%;
  }
  .banner.show{
    opacity: 1;
    transform: translateY(0) scale(1);
  }

  /* ===== Board ===== */
  .board-wrap{
    position: relative;
    width: min(86vmin, 560px);
    max-width: 92vw;
    aspect-ratio: 1/1;
  }

  .board{
    position: relative;
    width: 100%;
    height: 100%;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: clamp(6px, 1.6vmin, 14px);
    background: linear-gradient(160deg, var(--board-bg), var(--marble-3));
    border-radius: var(--radius-lg);
    padding: clamp(6px, 1.6vmin, 14px);
    border: 2px solid var(--gold-dim);
    box-shadow:
      0 10px 30px hsla(var(--shadow-col), 0.35),
      0 0 0 6px var(--surface) inset,
      0 0 0 8px var(--gold) inset;
  }

  .cell{
    position: relative;
    background: linear-gradient(160deg, var(--cell-bg), var(--marble-2));
    border-radius: var(--radius-sm);
    border: 1px solid var(--accent-line);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor: pointer;
    box-shadow: 0 2px 5px hsla(var(--shadow-col), 0.15), 0 1px 0 rgba(255,255,255,0.5) inset;
    transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.2s ease;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .cell:hover:not(.filled){
    transform: translateY(-2px);
    box-shadow: 0 5px 12px hsla(var(--shadow-col), 0.25), 0 1px 0 rgba(255,255,255,0.5) inset;
    background: linear-gradient(160deg, var(--surface), var(--marble-2));
  }
  .cell:active:not(.filled){ transform: translateY(0); }
  .cell:focus-visible{
    outline: 2px solid var(--gold);
    outline-offset: 3px;
  }
  .cell.filled{ cursor: default; }

  .cell .mark{
    font-size: clamp(2.2rem, 11vmin, 5.2rem);
    line-height: 1;
    font-family:'Cinzel', serif;
    font-weight: 800;
    user-select: none;
    transform: scale(0.4);
    opacity: 0;
    animation: markIn 0.28s cubic-bezier(.2,1.4,.4,1) forwards;
  }
  .mark.x{ color: var(--x-color); text-shadow: 0 2px 4px hsla(var(--shadow-col),0.25); }
  .mark.o{ color: var(--o-color); text-shadow: 0 2px 4px hsla(var(--shadow-col),0.25); }

  .mark.glyph{ font-family: 'EB Garamond', serif; }

  @keyframes markIn{
    to{ transform: scale(1); opacity: 1; }
  }

  .cell.win{
    background: linear-gradient(160deg, var(--gold-bright), var(--gold));
    box-shadow: 0 0 0 2px var(--gold-bright), 0 6px 18px hsla(40,80%,40%,0.5);
    animation: winPulse 1.4s ease-in-out infinite;
  }
  @keyframes winPulse{
    0%,100%{ filter: brightness(1); }
    50%{ filter: brightness(1.18); }
  }

  .cell.win .mark{ color: #2b2008; text-shadow: 0 1px 1px rgba(255,255,255,0.5); }

  /* laurel divider */
  .divider{
    width: min(86vmin, 560px);
    max-width: 92vw;
    display:flex;
    align-items:center;
    gap: 10px;
    color: var(--gold-dim);
    opacity: 0.7;
    user-select:none;
  }
  .divider::before, .divider::after{
    content:"";
    flex:1;
    height:1px;
    background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
  }
  .divider span{ font-size: clamp(0.9rem, 2vmin, 1.2rem); }

  /* sr-only */
  .sr-only{
    position:absolute; width:1px;height:1px;
    padding:0;margin:-1px;overflow:hidden;
    clip:rect(0,0,0,0); white-space:nowrap; border:0;
  }

  /* ===== Dialog ===== */
  dialog{
    border: none;
    border-radius: var(--radius-lg);
    padding: 0;
    background: transparent;
    max-width: min(92vw, 480px);
    width: 100%;
    color: var(--ink);
  }
  dialog::backdrop{
    background: rgba(10,8,5,0.55);
    backdrop-filter: blur(2px);
  }
  .dialog-card{
    background: linear-gradient(170deg, var(--surface), var(--marble-2));
    border: 2px solid var(--gold);
    border-radius: var(--radius-lg);
    padding: clamp(16px, 3vh, 28px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    max-height: 86vh;
    overflow-y: auto;
  }
  .dialog-card h2{
    font-family:'Cinzel Decorative', serif;
    font-size: clamp(1.1rem, 2.6vmin, 1.5rem);
    margin: 0 0 4px;
    color: var(--gold-dim);
    text-align:center;
    letter-spacing: 0.08em;
  }
  html[data-theme="night"] .dialog-card h2{ color: var(--gold-bright); }
  .dialog-sub{
    text-align:center;
    font-size: clamp(0.7rem, 1.6vmin, 0.85rem);
    color: var(--ink-soft);
    margin: 0 0 18px;
    letter-spacing: 0.05em;
  }

  .option-group{
    margin-bottom: 16px;
  }
  .option-group > .opt-label{
    display:block;
    font-family:'Cinzel', serif;
    font-size: clamp(0.65rem, 1.5vmin, 0.8rem);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 7px;
  }

  .seg{
    display:flex;
    border-radius: var(--radius-md);
    overflow:hidden;
    border: 1.5px solid var(--gold-dim);
  }
  .seg button{
    flex:1;
    background: var(--cell-bg);
    border: none;
    color: var(--ink);
    font-family:'Cinzel', serif;
    font-size: clamp(0.62rem, 1.5vmin, 0.82rem);
    letter-spacing: 0.04em;
    padding: clamp(8px, 1.6vh, 12px) 6px;
    cursor: pointer;
    border-right: 1px solid var(--gold-dim);
    transition: background 0.15s ease, color 0.15s ease;
  }
  .seg button:last-child{ border-right:none; }
  .seg button[aria-pressed="true"]{
    background: linear-gradient(180deg, var(--gold-bright), var(--gold));
    color: #2b2008;
    font-weight: 700;
  }
  .seg button:hover:not([aria-pressed="true"]){
    background: var(--marble-3);
  }
  .seg button:focus-visible{ outline: 2px solid var(--gold); outline-offset: -2px; }

  #aiOptionGroup{ transition: opacity 0.2s ease; }
  #aiOptionGroup.hidden-opt{ opacity: 0.35; pointer-events: none; }

  .dialog-actions{
    display:flex;
    justify-content: center;
    margin-top: 18px;
  }

  /* ===== Confetti canvas ===== */
  #confettiCanvas{
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 50;
  }

  footer.credit{
    position: relative;
    text-align:center;
    font-family:'Cinzel', serif;
    font-size: clamp(0.55rem, 1.2vmin, 0.7rem);
    letter-spacing: 0.2em;
    color: var(--ink-soft);
    opacity: 0.6;
    margin-top: auto;
    padding-top: 6px;
    text-transform: uppercase;
  }

  @media (max-width: 420px){
    .toolbar{ gap: 6px; }
    .btn{ padding: 9px 10px; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; }
  }
</style>
</head>
<body>
<div class="colosseum-strip" aria-hidden="true"></div>

<div class="app">

  <div class="crest-row">
    <svg class="crest" viewBox="0 0 100 100" aria-hidden="true">
      <defs>
        <radialGradient id="crestGrad" cx="35%" cy="30%" r="75%">
          <stop offset="0%" stop-color="var(--gold-bright)"/>
          <stop offset="60%" stop-color="var(--gold)"/>
          <stop offset="100%" stop-color="var(--gold-dim)"/>
        </radialGradient>
      </defs>
      <circle cx="50" cy="50" r="46" fill="url(#crestGrad)" stroke="var(--gold-dim)" stroke-width="2.5"/>
      <circle cx="50" cy="50" r="38" fill="none" stroke="#fffaf0" stroke-width="1.5" opacity="0.6"/>
      <text x="50" y="58" text-anchor="middle" font-family="Cinzel, serif" font-weight="800" font-size="28" fill="#3a2c0c">SPQR</text>
      <path d="M20 70 Q15 50 22 32" stroke="#3a2c0c" stroke-width="2.5" fill="none" opacity="0.55"/>
      <path d="M80 70 Q85 50 78 32" stroke="#3a2c0c" stroke-width="2.5" fill="none" opacity="0.55"/>
    </svg>
    <div class="title-block">
      <h1 class="brand">Tic&nbsp;·&nbsp;Tac&nbsp;·&nbsp;Toe</h1>
      <p class="subtitle">Senatus&nbsp;Populusque&nbsp;Romanus</p>
    </div>
    <svg class="crest" viewBox="0 0 100 100" aria-hidden="true">
      <circle cx="50" cy="50" r="46" fill="url(#crestGrad)" stroke="var(--gold-dim)" stroke-width="2.5"/>
      <circle cx="50" cy="50" r="38" fill="none" stroke="#fffaf0" stroke-width="1.5" opacity="0.6"/>
      <text x="50" y="58" text-anchor="middle" font-family="Cinzel, serif" font-weight="800" font-size="28" fill="#3a2c0c">SPQR</text>
      <path d="M20 70 Q15 50 22 32" stroke="#3a2c0c" stroke-width="2.5" fill="none" opacity="0.55"/>
      <path d="M80 70 Q85 50 78 32" stroke="#3a2c0c" stroke-width="2.5" fill="none" opacity="0.55"/>
    </svg>
  </div>

  <nav class="toolbar" aria-label="Game controls">
    <button class="btn primary" id="btnNewRound" type="button">New Round</button>
    <button class="btn" id="btnCustomize" type="button">Customize</button>
    <button class="btn" id="btnResetScores" type="button">Reset Scores</button>
  </nav>

  <div class="scoreboard" role="group" aria-label="Scoreboard">
    <div class="score-card" id="scoreCardX">
      <div class="label" id="labelX">Legion&nbsp;X</div>
      <div class="value" id="scoreX">0</div>
    </div>
    <div class="score-card" id="scoreCardDraw">
      <div class="label">Stalemate</div>
      <div class="value" id="scoreDraw">0</div>
    </div>
    <div class="score-card" id="scoreCardO">
      <div class="label" id="labelO">Legion&nbsp;O</div>
      <div class="value" id="scoreO">0</div>
    </div>
  </div>

  <div class="stage">
    <p class="status-line" id="statusLine" role="status" aria-live="polite">Legion <span class="turn-x">X</span> advances first</p>

    <div class="banner-slot">
      <div class="banner" id="victoryBanner"></div>
    </div>

    <div class="board-wrap">
      <div class="board" id="board" role="grid" aria-label="Tic Tac Toe board, 3 by 3">
        <!-- cells injected by JS -->
      </div>
    </div>

    <div class="divider" aria-hidden="true"><span>❧</span></div>
  </div>

  <footer class="credit">Per Aspera Ad Astra</footer>
</div>

<canvas id="confettiCanvas" aria-hidden="true"></canvas>

<div class="sr-only" id="srAnnounce" aria-live="assertive"></div>

<!-- Customize Dialog -->
<dialog id="customizeDialog">
  <form class="dialog-card" method="dialog">
    <h2>Customize the Campaign</h2>
    <p class="dialog-sub">Set the rules of engagement</p>

    <div class="option-group">
      <span class="opt-label" id="themeLabel">Theme</span>
      <div class="seg" role="group" aria-labelledby="themeLabel" id="themeSeg">
        <button type="button" data-value="day" aria-pressed="true">Marble Day</button>
        <button type="button" data-value="night" aria-pressed="false">Night Legion</button>
      </div>
    </div>

    <div class="option-group">
      <span class="opt-label" id="glyphLabel">Glyphs</span>
      <div class="seg" role="group" aria-labelledby="glyphLabel" id="glyphSeg">
        <button type="button" data-value="classic" aria-pressed="true">Standard X / O</button>
        <button type="button" data-value="roman" aria-pressed="false">Gladius / Laurel</button>
      </div>
    </div>

    <div class="option-group">
      <span class="opt-label" id="modeLabel">Mode</span>
      <div class="seg" role="group" aria-labelledby="modeLabel" id="modeSeg">
        <button type="button" data-value="pvp" aria-pressed="true">2 Player</button>
        <button type="button" data-value="ai" aria-pressed="false">Vs. AI</button>
      </div>
    </div>

    <div class="option-group">
      <span class="opt-label" id="firstLabel">First Move</span>
      <div class="seg" role="group" aria-labelledby="firstLabel" id="firstSeg">
        <button type="button" data-value="X" aria-pressed="true">X</button>
        <button type="button" data-value="O" aria-pressed="false">O</button>
      </div>
    </div>

    <div class="option-group" id="aiOptionGroup">
      <span class="opt-label" id="aiLabel">AI Discipline</span>
      <div class="seg" role="group" aria-labelledby="aiLabel" id="aiSeg">
        <button type="button" data-value="perfect" aria-pressed="true">Perfect</button>
        <button type="button" data-value="pragmatic" aria-pressed="false">Pragmatic</button>
        <button type="button" data-value="reckless" aria-pressed="false">Reckless</button>
      </div>
    </div>

    <div class="dialog-actions">
      <button class="btn primary" id="btnApply" value="default">Seal Decree</button>
    </div>
  </form>
</dialog>

<script>
(function(){
  "use strict";

  /* ============ State ============ */
  const state = {
    board: Array(9).fill(null),
    current: 'X',
    firstMove: 'X',
    mode: 'pvp',          // 'pvp' | 'ai'
    aiLevel: 'perfect',   // 'perfect' | 'pragmatic' | 'reckless'
    theme: 'day',
    glyph: 'classic',
    gameOver: false,
    winLine: null,
    scores: { X: 0, O: 0, D: 0 },
    locked: false,
    aiSide: 'O'
  };

  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  const LINES = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  /* ============ DOM refs ============ */
  const boardEl = document.getElementById('board');
  const statusLine = document.getElementById('statusLine');
  const victoryBanner = document.getElementById('victoryBanner');
  const srAnnounce = document.getElementById('srAnnounce');
  const scoreXEl = document.getElementById('scoreX');
  const scoreOEl = document.getElementById('scoreO');
  const scoreDrawEl = document.getElementById('scoreDraw');
  const labelX = document.getElementById('labelX');
  const labelO = document.getElementById('labelO');
  const scoreCardX = document.getElementById('scoreCardX');
  const scoreCardO = document.getElementById('scoreCardO');

  const dialog = document.getElementById('customizeDialog');
  const btnCustomize = document.getElementById('btnCustomize');
  const btnApply = document.getElementById('btnApply');
  const btnNewRound = document.getElementById('btnNewRound');
  const btnResetScores = document.getElementById('btnResetScores');
  const aiOptionGroup = document.getElementById('aiOptionGroup');

  const segGroups = {
    theme: document.getElementById('themeSeg'),
    glyph: document.getElementById('glyphSeg'),
    mode: document.getElementById('modeSeg'),
    first: document.getElementById('firstSeg'),
    ai: document.getElementById('aiSeg')
  };

  // pending selections (applied on "Seal Decree")
  const pending = {
    theme: state.theme,
    glyph: state.glyph,
    mode: state.mode,
    first: state.firstMove,
    ai: state.aiLevel
  };

  /* ============ Build board cells ============ */
  const cellEls = [];
  for(let i=0;i<9;i++){
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.setAttribute('role','gridcell');
    cell.setAttribute('tabindex','0');
    cell.dataset.index = i;
    const row = Math.floor(i/3)+1, col = (i%3)+1;
    cell.setAttribute('aria-label', `Row ${row}, column ${col}, empty`);
    cell.addEventListener('click', () => onCellActivate(i));
    cell.addEventListener('keydown', (e) => {
      if(e.key === 'Enter' || e.key === ' '){
        e.preventDefault();
        onCellActivate(i);
      } else {
        handleArrowNav(e, i);
      }
    });
    boardEl.appendChild(cell);
    cellEls.push(cell);
  }

  function handleArrowNav(e, i){
    const map = { ArrowRight: 1, ArrowLeft: -1, ArrowDown: 3, ArrowUp: -3 };
    if(!(e.key in map)) return;
    e.preventDefault();
    let next = i + map[e.key];
    const row = Math.floor(i/3), col = i%3;
    if(e.key === 'ArrowRight' && col === 2) return;
    if(e.key === 'ArrowLeft' && col === 0) return;
    if(next < 0 || next > 8) return;
    cellEls[next].focus();
  }

  /* ============ Glyph rendering ============ */
  function glyphFor(mark){
    if(state.glyph === 'classic') return { text: mark, cls: '' };
    if(mark === 'X') return { text: '⚔', cls: 'glyph' }; // gladius (crossed swords)
    return { text: '🌿', cls: 'glyph' }; // laurel
  }

  function markLabel(mark){
    if(state.glyph === 'classic') return mark;
    return mark === 'X' ? 'Gladius' : 'Laurel';
  }

  /* ============ Rendering ============ */
  function render(){
    state.board.forEach((mark, i) => {
      const cell = cellEls[i];
      cell.innerHTML = '';
      cell.classList.toggle('filled', !!mark);
      const row = Math.floor(i/3)+1, col = (i%3)+1;
      if(mark){
        const g = glyphFor(mark);
        const span = document.createElement('span');
        span.className = `mark ${mark.toLowerCase()} ${g.cls}`;
        span.textContent = g.text;
        if(reduceMotion) span.style.animation = 'none';
        cell.appendChild(span);
        cell.setAttribute('aria-label', `Row ${row}, column ${col}, ${markLabel(mark)}`);
      } else {
        cell.setAttribute('aria-label', `Row ${row}, column ${col}, empty`);
      }
      cell.classList.toggle('win', !!(state.winLine && state.winLine.includes(i)));
    });

    labelX.textContent = `Legion ${markLabel('X')}`;
    labelO.textContent = `Legion ${markLabel('O')}`;
    scoreXEl.textContent = state.scores.X;
    scoreOEl.textContent = state.scores.O;
    scoreDrawEl.textContent = state.scores.D;
    scoreCardX.classList.toggle('active', state.current === 'X' && !state.gameOver);
    scoreCardO.classList.toggle('active', state.current === 'O' && !state.gameOver);
  }

  function updateStatus(text, isHtml){
    if(isHtml) statusLine.innerHTML = text;
    else statusLine.textContent = text;
    srAnnounce.textContent = statusLine.textContent;
  }

  function turnStatusText(){
    const mark = state.current;
    const cls = mark === 'X' ? 'turn-x' : 'turn-o';
    const isAiTurn = state.mode === 'ai' && mark === state.aiSide;
    const label = markLabel(mark);
    return `Legion <span class="${cls}">${label}</span>${isAiTurn ? ' (the Senate deliberates…)' : ' advances'}`;
  }

  /* ============ Game logic ============ */
  function checkWinner(board){
    for(const line of LINES){
      const [a,b,c] = line;
      if(board[a] && board[a] === board[b] && board[a] === board[c]){
        return { winner: board[a], line };
      }
    }
    if(board.every(c => c)) return { winner: 'D', line: null };
    return null;
  }

  function onCellActivate(i){
    if(state.locked || state.gameOver) return;
    if(state.board[i]) return;
    if(state.mode === 'ai' && state.current === state.aiSide) return;
    placeMark(i, state.current);
  }

  function placeMark(i, mark){
    state.board[i] = mark;
    render();
    const result = checkWinner(state.board);
    if(result){
      endRound(result);
      return;
    }
    state.current = mark === 'X' ? 'O' : 'X';
    updateStatus(turnStatusText(), true);
    render();
    maybeTriggerAI();
  }

  function maybeTriggerAI(){
    if(state.gameOver) return;
    if(state.mode !== 'ai') return;
    if(state.current !== state.aiSide) return;
    state.locked = true;
    const delay = 380 + Math.random()*260;
    setTimeout(() => {
      const move = chooseAIMove();
      state.locked = false;
      if(move !== null && !state.gameOver){
        placeMark(move, state.aiSide);
      }
    }, delay);
  }

  function endRound(result){
    state.gameOver = true;
    state.locked = false;
    if(result.winner === 'D'){
      state.scores.D++;
      updateStatus('The legions are evenly matched — a stalemate.');
      showBanner('STALEMATE — HONOR IS SATISFIED', false);
    } else {
      state.winLine = result.line;
      state.scores[result.winner]++;
      const label = markLabel(result.winner);
      updateStatus(`Legion ${label} claims victory!`);
      showBanner(`VICTORY TO LEGION ${label.toUpperCase()}!`, true);
      launchConfetti();
    }
    render();
  }

  function showBanner(text, gold){
    victoryBanner.textContent = text;
    victoryBanner.classList.add('show');
  }

  function hideBanner(){
    victoryBanner.classList.remove('show');
    victoryBanner.textContent = '';
  }

  /* ============ AI: minimax with handicaps ============ */
  function emptyIndices(board){
    const out = [];
    for(let i=0;i<9;i++) if(!board[i]) out.push(i);
    return out;
  }

  function minimax(board, mark, aiMark, humanMark, depth){
    const result = checkWinner(board);
    if(result){
      if(result.winner === 'D') return { score: 0 };
      if(result.winner === aiMark) return { score: 10 - depth };
      return { score: depth - 10 };
    }
    const moves = [];
    for(const i of emptyIndices(board)){
      board[i] = mark;
      const { score } = minimax(board, mark === aiMark ? humanMark : aiMark, aiMark, humanMark, depth+1);
      board[i] = null;
      moves.push({ index: i, score });
    }
    if(mark === aiMark){
      return moves.reduce((best, m) => m.score > best.score ? m : best);
    } else {
      return moves.reduce((best, m) => m.score < best.score ? m : best);
    }
  }

  function bestMove(board, aiMark, humanMark){
    const moves = [];
    for(const i of emptyIndices(board)){
      board[i] = aiMark;
      const { score } = minimax(board, humanMark, aiMark, humanMark, 1);
      board[i] = null;
      moves.push({ index: i, score });
    }
    const maxScore = Math.max(...moves.map(m => m.score));
    const best = moves.filter(m => m.score === maxScore);
    return best[Math.floor(Math.random()*best.length)].index;
  }

  function worstMove(board, aiMark, humanMark){
    const moves = [];
    for(const i of emptyIndices(board)){
      board[i] = aiMark;
      const { score } = minimax(board, humanMark, aiMark, humanMark, 1);
      board[i] = null;
      moves.push({ index: i, score });
    }
    const minScore = Math.min(...moves.map(m => m.score));
    const worst = moves.filter(m => m.score === minScore);
    return worst[Math.floor(Math.random()*worst.length)].index;
  }

  function randomMove(board){
    const choices = emptyIndices(board);
    return choices[Math.floor(Math.random()*choices.length)];
  }

  function chooseAIMove(){
    const board = state.board.slice();
    const aiMark = state.aiSide;
    const humanMark = aiMark === 'X' ? 'O' : 'X';
    const empties = emptyIndices(board);
    if(empties.length === 0) return null;

    if(state.aiLevel === 'perfect'){
      return bestMove(board, aiMark, humanMark);
    }
    if(state.aiLevel === 'reckless'){
      // Mostly random, occasionally a real move; never deliberately the worst.
      const r = Math.random();
      if(r < 0.75) return randomMove(board);
      return bestMove(board, aiMark, humanMark);
    }
    // pragmatic: strong but fallible — mostly best move, sometimes a random one
    const r = Math.random();
    if(r < 0.65) return bestMove(board, aiMark, humanMark);
    if(r < 0.9) return randomMove(board);
    return worstMove(board, aiMark, humanMark);
  }

  /* ============ Round / Score control ============ */
  function newRound(){
    state.board = Array(9).fill(null);
    state.gameOver = false;
    state.winLine = null;
    state.locked = false;
    state.current = state.firstMove;
    hideBanner();
    updateStatus(turnStatusText(), true);
    render();
    maybeTriggerAI();
  }

  function resetScores(){
    state.scores = { X: 0, O: 0, D: 0 };
    render();
  }

  /* ============ Confetti (canvas, respects reduced motion) ============ */
  const confettiCanvas = document.getElementById('confettiCanvas');
  const ctx = confettiCanvas.getContext('2d');
  let confettiParticles = [];
  let confettiRAF = null;
  let dpr = Math.max(1, window.devicePixelRatio || 1);

  function resizeCanvas(){
    dpr = Math.max(1, window.devicePixelRatio || 1);
    confettiCanvas.width = window.innerWidth * dpr;
    confettiCanvas.height = window.innerHeight * dpr;
    confettiCanvas.style.width = window.innerWidth + 'px';
    confettiCanvas.style.height = window.innerHeight + 'px';
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  const goldPalette = ['#f3d27a', '#cda64a', '#8a6f2e', '#fff3d0', '#b9a06a'];

  function launchConfetti(){
    if(reduceMotion) return;
    const W = window.innerWidth, H = window.innerHeight;
    const count = 140;
    confettiParticles = [];
    for(let i=0;i<count;i++){
      confettiParticles.push({
        x: W/2 + (Math.random()-0.5)*W*0.3,
        y: H*0.25 + (Math.random()-0.5)*40,
        vx: (Math.random()-0.5)*6,
        vy: Math.random()*-6 - 3,
        gravity: 0.18 + Math.random()*0.08,
        size: 4 + Math.random()*6,
        color: goldPalette[Math.floor(Math.random()*goldPalette.length)],
        rot: Math.random()*Math.PI*2,
        vrot: (Math.random()-0.5)*0.3,
        life: 0,
        maxLife: 110 + Math.random()*50,
        shape: Math.random() < 0.5 ? 'rect' : 'circle'
      });
    }
    if(confettiRAF) cancelAnimationFrame(confettiRAF);
    animateConfetti();
  }

  function animateConfetti(){
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.clearRect(0,0,window.innerWidth, window.innerHeight);
    let alive = false;
    for(const p of confettiParticles){
      if(p.life >= p.maxLife) continue;
      alive = true;
      p.vy += p.gravity;
      p.x += p.vx;
      p.y += p.vy;
      p.rot += p.vrot;
      p.life++;
      const fade = 1 - Math.max(0, (p.life - p.maxLife*0.7) / (p.maxLife*0.3));
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.globalAlpha = Math.max(0, Math.min(1, fade));
      ctx.fillStyle = p.color;
      if(p.shape === 'rect'){
        ctx.fillRect(-p.size/2, -p.size/3, p.size, p.size*0.66);
      } else {
        ctx.beginPath();
        ctx.arc(0,0,p.size/2,0,Math.PI*2);
        ctx.fill();
      }
      ctx.restore();
    }
    if(alive){
      confettiRAF = requestAnimationFrame(animateConfetti);
    } else {
      ctx.clearRect(0,0,window.innerWidth, window.innerHeight);
      confettiRAF = null;
    }
  }

  /* ============ Theme / Settings application ============ */
  function applyTheme(theme){
    document.documentElement.setAttribute('data-theme', theme === 'night' ? 'night' : 'day');
  }

  function setSegPressed(group, value){
    [...group.children].forEach(btn => {
      btn.setAttribute('aria-pressed', String(btn.dataset.value === value));
    });
  }

  function initSegGroup(group, key, onChange){
    group.addEventListener('click', (e) => {
      const btn = e.target.closest('button');
      if(!btn) return;
      const value = btn.dataset.value;
      pending[key] = value;
      setSegPressed(group, value);
      if(onChange) onChange(value);
    });
  }

  initSegGroup(segGroups.theme, 'theme');
  initSegGroup(segGroups.glyph, 'glyph');
  initSegGroup(segGroups.mode, 'mode', (value) => {
    aiOptionGroup.classList.toggle('hidden-opt', value !== 'ai');
  });
  initSegGroup(segGroups.first, 'first');
  initSegGroup(segGroups.ai, 'ai');

  function syncDialogFromState(){
    pending.theme = state.theme;
    pending.glyph = state.glyph;
    pending.mode = state.mode;
    pending.first = state.firstMove;
    pending.ai = state.aiLevel;
    setSegPressed(segGroups.theme, state.theme);
    setSegPressed(segGroups.glyph, state.glyph);
    setSegPressed(segGroups.mode, state.mode);
    setSegPressed(segGroups.first, state.firstMove);
    setSegPressed(segGroups.ai, state.aiLevel);
    aiOptionGroup.classList.toggle('hidden-opt', state.mode !== 'ai');
  }

  btnCustomize.addEventListener('click', () => {
    syncDialogFromState();
    dialog.showModal();
  });

  btnApply.addEventListener('click', (e) => {
    e.preventDefault();
    const modeChanged = pending.mode !== state.mode;
    const firstChanged = pending.first !== state.firstMove;
    const glyphChanged = pending.glyph !== state.glyph;

    state.theme = pending.theme;
    state.glyph = pending.glyph;
    state.mode = pending.mode;
    state.firstMove = pending.first;
    state.aiLevel = pending.ai;
    applyTheme(state.theme);
    dialog.close();

    if(modeChanged || firstChanged || glyphChanged){
      newRound();
    } else {
      render();
      updateStatus(turnStatusText(), true);
    }
  });

  dialog.addEventListener('cancel', () => { /* allow ESC close without applying */ });

  /* ============ AI side determination ============ */
  // The human always plays X; the AI always plays O. "First move" only
  // controls which mark moves first this round, independent of who plays it.
  state.aiSide = 'O';

  /* ============ Top bar actions ============ */
  btnNewRound.addEventListener('click', newRound);
  btnResetScores.addEventListener('click', resetScores);

  /* ============ Init ============ */
  applyTheme(state.theme);
  syncDialogFromState();
  newRound();

})();
</script>
</body>
</html>
