<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Virtual Drum Kit</title>
<style>
  :root{
    --bg-1:#0d0b10;
    --bg-2:#1a151f;
    --panel:#211b27;
    --panel-2:#2a2231;
    --gold:#d9a441;
    --gold-bright:#f3c869;
    --red:#e0473f;
    --teal:#3fd9c8;
    --blue:#5b8cff;
    --purple:#b67cff;
    --pink:#ff6fa5;
    --text:#f1e9da;
    --text-dim:#a89cab;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0;padding:0;height:100%;
    background:
      radial-gradient(circle at 20% 0%, #2a1f33 0%, transparent 45%),
      radial-gradient(circle at 80% 100%, #1f2a33 0%, transparent 45%),
      linear-gradient(160deg, var(--bg-1), var(--bg-2) 60%, #0a0810);
    color:var(--text);
    font-family:'Segoe UI', system-ui, -apple-system, Roboto, sans-serif;
    overflow-x:hidden;
    user-select:none;
  }
  .wood-strip{
    position:fixed; top:0; left:0; right:0; height:6px;
    background:repeating-linear-gradient(90deg, #6b3f24, #8a5630 10px, #6b3f24 20px);
    z-index:5;
    opacity:.6;
  }
  .stage{
    max-width:1100px;
    margin:0 auto;
    padding:18px 16px 60px;
    position:relative;
    z-index:1;
  }
  header{
    text-align:center;
    margin-bottom:18px;
  }
  header h1{
    font-family: 'Georgia', serif;
    font-size:2.1rem;
    margin:6px 0 2px;
    letter-spacing:2px;
    background:linear-gradient(180deg, var(--gold-bright), var(--gold) 60%, #8a6a2a);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    text-shadow:0 2px 18px rgba(217,164,65,.25);
  }
  header p{
    margin:0;
    color:var(--text-dim);
    font-size:.85rem;
    letter-spacing:1px;
    text-transform:uppercase;
  }
  .spotlight{
    position:fixed;
    top:-200px; left:50%; transform:translateX(-50%);
    width:900px; height:600px;
    background:radial-gradient(ellipse at center, rgba(255,235,180,.08), transparent 60%);
    pointer-events:none;
    z-index:0;
  }

  /* Controls bar */
  .controls{
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    justify-content:center;
    gap:10px;
    background:linear-gradient(180deg, var(--panel), var(--panel-2));
    border:1px solid rgba(255,255,255,.06);
    border-radius:16px;
    padding:12px 16px;
    margin-bottom:22px;
    box-shadow:0 10px 30px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.05);
  }
  .btn{
    appearance:none;
    border:none;
    cursor:pointer;
    font-family:inherit;
    font-weight:600;
    font-size:.85rem;
    letter-spacing:.5px;
    padding:10px 16px;
    border-radius:10px;
    color:var(--text);
    background:linear-gradient(180deg,#3a3142,#2a2330);
    border:1px solid rgba(255,255,255,.08);
    box-shadow:0 3px 0 rgba(0,0,0,.35), 0 6px 12px rgba(0,0,0,.25);
    transition:transform .08s ease, box-shadow .08s ease, filter .15s ease;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .btn:active{ transform:translateY(2px); box-shadow:0 1px 0 rgba(0,0,0,.35), 0 2px 6px rgba(0,0,0,.25); }
  .btn:hover{ filter:brightness(1.15); }
  .btn.record{ background:linear-gradient(180deg,#6e2723,var(--red)); }
  .btn.record.active{
    background:linear-gradient(180deg,#ff7a72,var(--red));
    box-shadow:0 0 0 2px rgba(224,71,63,.5), 0 0 18px rgba(224,71,63,.6), 0 3px 0 rgba(0,0,0,.35);
    animation:pulse-rec 1s infinite;
  }
  @keyframes pulse-rec{
    0%,100%{ box-shadow:0 0 0 2px rgba(224,71,63,.5), 0 0 10px rgba(224,71,63,.5), 0 3px 0 rgba(0,0,0,.35);}
    50%{ box-shadow:0 0 0 4px rgba(224,71,63,.25), 0 0 24px rgba(224,71,63,.8), 0 3px 0 rgba(0,0,0,.35);}
  }
  .btn.play{ background:linear-gradient(180deg,#1f6e4f,var(--teal)); color:#06231d;}
  .btn.play.active{ filter:brightness(1.2); }
  .btn[disabled]{ opacity:.4; cursor:not-allowed; filter:none; }
  .dot{ width:9px; height:9px; border-radius:50%; background:#777; display:inline-block; }
  .dot.live{ background:#ff5550; box-shadow:0 0 8px #ff5550; }

  .status-line{
    display:flex; align-items:center; gap:10px;
    font-size:.8rem; color:var(--text-dim);
    padding:6px 10px;
  }

  /* knobs */
  .knob-group{ display:flex; align-items:center; gap:8px; padding:0 6px;}
  .knob-label{ font-size:.7rem; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px;}
  input[type=range]{
    -webkit-appearance:none; appearance:none;
    width:90px; height:4px;
    background:linear-gradient(90deg, var(--gold), #444);
    border-radius:4px;
    outline:none;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;
    width:16px; height:16px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #fff, var(--gold-bright) 60%, #8a6a2a);
    border:1px solid rgba(0,0,0,.3);
    cursor:pointer;
    box-shadow:0 2px 4px rgba(0,0,0,.5);
  }

  /* Drum kit layout */
  .kit{
    position:relative;
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:16px;
    padding:26px;
    border-radius:24px;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(217,164,65,.07), transparent 60%),
      linear-gradient(180deg, #18131c, #110d14);
    border:1px solid rgba(255,255,255,.05);
    box-shadow:inset 0 2px 20px rgba(0,0,0,.6), 0 20px 50px rgba(0,0,0,.5);
  }
  @media (max-width:680px){
    .kit{ grid-template-columns:repeat(2,1fr); gap:12px; padding:16px;}
  }

  .pad{
    position:relative;
    aspect-ratio:1/1;
    border-radius:50%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    border:none;
    outline:none;
    font-family:inherit;
    color:#fff;
    transition:transform .05s ease, box-shadow .1s ease, filter .1s ease;
    -webkit-tap-highlight-color: transparent;
    touch-action:manipulation;
  }
  .pad .ring{
    position:absolute; inset:0; border-radius:50%;
    box-shadow:
      inset 0 0 0 6px rgba(255,255,255,.05),
      inset 0 8px 18px rgba(0,0,0,.45),
      inset 0 -6px 14px rgba(255,255,255,.06),
      0 10px 18px rgba(0,0,0,.55);
    pointer-events:none;
  }
  .pad .lugs{
    position:absolute; inset:0; border-radius:50%;
    pointer-events:none;
  }
  .pad .lugs span{
    position:absolute;
    width:8%; height:8%;
    border-radius:50%;
    background:rgba(255,230,180,.15);
    box-shadow:inset 0 1px 2px rgba(0,0,0,.5);
    top:50%; left:50%;
    transform-origin:0 0;
  }
  .pad .label{
    font-weight:700;
    font-size:1.05rem;
    letter-spacing:.5px;
    text-shadow:0 2px 6px rgba(0,0,0,.6);
    z-index:2;
  }
  .pad .key{
    margin-top:4px;
    font-size:.7rem;
    font-weight:700;
    background:rgba(0,0,0,.35);
    border:1px solid rgba(255,255,255,.25);
    border-radius:6px;
    padding:2px 8px;
    z-index:2;
    letter-spacing:1px;
  }
  .pad.hit{ transform:scale(.93); filter:brightness(1.5) saturate(1.3); }
  .pad .shine{
    position:absolute; top:8%; left:18%; width:35%; height:22%;
    background:radial-gradient(ellipse at center, rgba(255,255,255,.35), transparent 70%);
    border-radius:50%;
    pointer-events:none;
    transform:rotate(-20deg);
  }
  .pad.playback-hit{
    animation:flashring .3s ease;
  }
  @keyframes flashring{
    0%{ box-shadow:0 0 0 0 rgba(255,255,255,.8);}
    100%{ box-shadow:0 0 0 16px rgba(255,255,255,0);}
  }

  /* color themes per drum */
  .pad.snare{ background:radial-gradient(circle at 35% 30%, #fdf6e3, #e3d6ad 45%, #b89a5a 100%); color:#2a2010;}
  .pad.snare .key{ color:#2a2010; background:rgba(255,255,255,.4); border-color:rgba(0,0,0,.2);}
  .pad.kick{ background:radial-gradient(circle at 35% 30%, #4a3326, #2a1c14 60%, #140d09 100%); }
  .pad.hihat{ background:radial-gradient(circle at 35% 30%, #f4e9c1, #cdb96a 50%, #8a7530 100%); color:#2a2010;}
  .pad.hihat .key{ color:#2a2010; background:rgba(255,255,255,.4); border-color:rgba(0,0,0,.2);}
  .pad.crash{ background:radial-gradient(circle at 35% 30%, #fff2c4, #d9a441 50%, #8a5a16 100%); color:#2a2010;}
  .pad.crash .key{ color:#2a2010; background:rgba(255,255,255,.4); border-color:rgba(0,0,0,.2);}
  .pad.tom1{ background:radial-gradient(circle at 35% 30%, #6fb8ff, var(--blue) 55%, #1c3a73 100%); }
  .pad.tom2{ background:radial-gradient(circle at 35% 30%, #ffb0cf, var(--pink) 55%, #7a1f44 100%); }
  .pad.tom3{ background:radial-gradient(circle at 35% 30%, #c9a3ff, var(--purple) 55%, #4a2073 100%); }
  .pad.ride{ background:radial-gradient(circle at 35% 30%, #b9fff0, var(--teal) 55%, #115e51 100%); color:#08231d;}
  .pad.ride .key{ color:#08231d; background:rgba(255,255,255,.4); border-color:rgba(0,0,0,.2);}

  .glow-active{
    box-shadow:0 0 0 6px rgba(255,255,255,.15), 0 0 40px 6px currentColor;
  }

  /* footer info */
  footer{
    text-align:center;
    margin-top:24px;
    color:var(--text-dim);
    font-size:.78rem;
    line-height:1.6;
  }
  footer b{ color:var(--gold-bright); }

  .toast{
    position:fixed;
    bottom:22px; left:50%; transform:translateX(-50%) translateY(20px);
    background:rgba(20,16,24,.95);
    border:1px solid rgba(255,255,255,.1);
    color:var(--text);
    padding:10px 18px;
    border-radius:10px;
    font-size:.85rem;
    opacity:0;
    transition:opacity .25s ease, transform .25s ease;
    pointer-events:none;
    z-index:50;
    box-shadow:0 10px 30px rgba(0,0,0,.5);
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  .badge-count{
    font-variant-numeric: tabular-nums;
    min-width:2ch;
    text-align:center;
  }
</style>
</head>
<body>
<div class="wood-strip"></div>
<div class="spotlight"></div>

<div class="stage">
  <header>
    <p>Music Studio</p>
    <h1>🥁 Virtual Drum Kit</h1>
    <p>Click pads or use your keyboard — record a beat and play it back</p>
  </header>

  <div class="controls">
    <button class="btn record" id="recordBtn" title="Record (R)">
      <span class="dot" id="recDot"></span> Record
    </button>
    <button class="btn play" id="playBtn" disabled title="Play (Space)">
      ▶ Play
    </button>
    <button class="btn" id="stopBtn" disabled title="Stop">
      ■ Stop
    </button>
    <button class="btn" id="clearBtn" disabled title="Clear recording">
      ✕ Clear
    </button>
    <button class="btn" id="metroBtn" title="Toggle metronome">
      ⏱ Metronome
    </button>

    <div class="knob-group">
      <span class="knob-label">Volume</span>
      <input type="range" id="volume" min="0" max="100" value="80">
    </div>
    <div class="knob-group">
      <span class="knob-label">Tempo</span>
      <input type="range" id="tempo" min="60" max="180" value="120">
      <span class="knob-label" id="tempoVal">120 BPM</span>
    </div>

    <div class="status-line">
      <span id="statusText">Ready</span>
      <span class="badge-count" id="noteCount"></span>
    </div>
  </div>

  <div class="kit" id="kit">
    <!-- pads injected by JS -->
  </div>

  <footer>
    Keys: <b>A S D F</b> toms &amp; snare · <b>J K L</b> hats &amp; crash · <b>Space</b> kick · <b>;</b> ride<br>
    Press <b>R</b> to start/stop recording, <b>P</b> to play back your recording.
  </footer>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";

  // ---------- Audio Engine (fully synthesized, no external samples) ----------
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  let actx = null;
  function ensureCtx(){
    if(!actx){
      actx = new AudioCtx();
    }
    if(actx.state === 'suspended') actx.resume();
    return actx;
  }

  let masterVol = 0.8;

  function masterGain(){
    const g = actx.createGain();
    g.gain.value = masterVol;
    g.connect(actx.destination);
    return g;
  }

  function noiseBuffer(duration){
    const ctx = actx;
    const bufferSize = Math.floor(ctx.sampleRate * duration);
    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for(let i=0;i<bufferSize;i++){ data[i] = Math.random()*2-1; }
    return buffer;
  }

  // Each synth returns a function(time, gainNode) that schedules the sound at `time`.
  const synths = {
    kick(time, dest){
      const ctx = actx;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(150, time);
      osc.frequency.exponentialRampToValueAtTime(45, time + 0.15);
      gain.gain.setValueAtTime(1.0, time);
      gain.gain.exponentialRampToValueAtTime(0.001, time + 0.35);
      osc.connect(gain).connect(dest);
      osc.start(time);
      osc.stop(time + 0.4);

      // click transient
      const clickSrc = ctx.createBufferSource();
      clickSrc.buffer = noiseBuffer(0.01);
      const clickGain = ctx.createGain();
      clickGain.gain.setValueAtTime(0.5, time);
      clickGain.gain.exponentialRampToValueAtTime(0.001, time + 0.02);
      clickSrc.connect(clickGain).connect(dest);
      clickSrc.start(time);
    },
    snare(time, dest){
      const ctx = actx;
      // noise body
      const noise = ctx.createBufferSource();
      noise.buffer = noiseBuffer(0.3);
      const bp = ctx.createBiquadFilter();
      bp.type = 'bandpass';
      bp.frequency.value = 1800;
      bp.Q.value = 0.6;
      const ng = ctx.createGain();
      ng.gain.setValueAtTime(0.9, time);
      ng.gain.exponentialRampToValueAtTime(0.001, time + 0.18);
      noise.connect(bp).connect(ng).connect(dest);
      noise.start(time);

      // tonal snap
      const osc = ctx.createOscillator();
      osc.type='triangle';
      osc.frequency.setValueAtTime(200, time);
      osc.frequency.exponentialRampToValueAtTime(90, time+0.1);
      const og = ctx.createGain();
      og.gain.setValueAtTime(0.6, time);
      og.gain.exponentialRampToValueAtTime(0.001, time+0.12);
      osc.connect(og).connect(dest);
      osc.start(time);
      osc.stop(time+0.15);
    },
    hihat(time, dest, open){
      const ctx = actx;
      const dur = open ? 0.5 : 0.08;
      const noise = ctx.createBufferSource();
      noise.buffer = noiseBuffer(dur);
      const hp = ctx.createBiquadFilter();
      hp.type='highpass';
      hp.frequency.value = 7000;
      const bp = ctx.createBiquadFilter();
      bp.type = 'bandpass';
      bp.frequency.value = 10000;
      const g = ctx.createGain();
      g.gain.setValueAtTime(0.5, time);
      g.gain.exponentialRampToValueAtTime(0.001, time+dur);
      noise.connect(hp).connect(bp).connect(g).connect(dest);
      noise.start(time);
    },
    crash(time, dest){
      const ctx = actx;
      const noise = ctx.createBufferSource();
      noise.buffer = noiseBuffer(1.6);
      const hp = ctx.createBiquadFilter();
      hp.type='highpass';
      hp.frequency.value = 4000;
      const g = ctx.createGain();
      g.gain.setValueAtTime(0.7, time);
      g.gain.exponentialRampToValueAtTime(0.001, time+1.5);
      noise.connect(hp).connect(g).connect(dest);
      noise.start(time);
    },
    ride(time, dest){
      const ctx = actx;
      const noise = ctx.createBufferSource();
      noise.buffer = noiseBuffer(0.9);
      const bp = ctx.createBiquadFilter();
      bp.type='bandpass';
      bp.frequency.value = 6000;
      bp.Q.value = 0.8;
      const g = ctx.createGain();
      g.gain.setValueAtTime(0.45, time);
      g.gain.exponentialRampToValueAtTime(0.001, time+0.8);
      noise.connect(bp).connect(g).connect(dest);
      noise.start(time);

      const osc = ctx.createOscillator();
      osc.type='sine';
      osc.frequency.value = 800;
      const og = ctx.createGain();
      og.gain.setValueAtTime(0.15, time);
      og.gain.exponentialRampToValueAtTime(0.001, time+0.5);
      osc.connect(og).connect(dest);
      osc.start(time);
      osc.stop(time+0.5);
    },
    tom(time, dest, freq){
      const ctx = actx;
      const osc = ctx.createOscillator();
      osc.type='sine';
      osc.frequency.setValueAtTime(freq, time);
      osc.frequency.exponentialRampToValueAtTime(freq*0.5, time+0.25);
      const g = ctx.createGain();
      g.gain.setValueAtTime(0.9, time);
      g.gain.exponentialRampToValueAtTime(0.001, time+0.35);
      osc.connect(g).connect(dest);
      osc.start(time);
      osc.stop(time+0.4);
    }
  };

  function playSound(id, time){
    const ctx = ensureCtx();
    const dest = masterGain();
    const t = time !== undefined ? time : ctx.currentTime;
    switch(id){
      case 'kick': synths.kick(t, dest); break;
      case 'snare': synths.snare(t, dest); break;
      case 'hihat': synths.hihat(t, dest, false); break;
      case 'hihat-open': synths.hihat(t, dest, true); break;
      case 'crash': synths.crash(t, dest); break;
      case 'ride': synths.ride(t, dest); break;
      case 'tom1': synths.tom(t, dest, 180); break;
      case 'tom2': synths.tom(t, dest, 140); break;
      case 'tom3': synths.tom(t, dest, 100); break;
    }
  }

  // ---------- Pad definitions ----------
  const PADS = [
    { id:'tom3',  label:'Tom (Low)',  key:'A', cls:'tom3' },
    { id:'tom2',  label:'Tom (Mid)',  key:'S', cls:'tom2' },
    { id:'tom1',  label:'Tom (Hi)',   key:'D', cls:'tom1' },
    { id:'snare', label:'Snare',      key:'F', cls:'snare' },
    { id:'hihat', label:'Hi-Hat',     key:'J', cls:'hihat' },
    { id:'hihat-open', label:'Open Hat', key:'K', cls:'hihat' },
    { id:'crash', label:'Crash',      key:'L', cls:'crash' },
    { id:'ride',  label:'Ride',       key:';', cls:'ride' },
  ];
  // Kick gets its own special wide pad triggered by spacebar, placed in flow too
  const KICK = { id:'kick', label:'Kick Drum', key:'Space', cls:'kick' };

  const kitEl = document.getElementById('kit');

  function makeLugs(){
    const wrap = document.createElement('div');
    wrap.className = 'lugs';
    const n = 8;
    for(let i=0;i<n;i++){
      const a = (i/n) * Math.PI*2;
      const r = 44; // percent radius approx
      const span = document.createElement('span');
      span.style.left = (50 + r*Math.cos(a)*0.46) + '%';
      span.style.top = (50 + r*Math.sin(a)*0.46) + '%';
      wrap.appendChild(span);
    }
    return wrap;
  }

  function buildPad(def){
    const btn = document.createElement('button');
    btn.className = 'pad ' + def.cls;
    btn.dataset.id = def.id;
    btn.setAttribute('aria-label', def.label);

    const ring = document.createElement('div');
    ring.className = 'ring';
    btn.appendChild(ring);

    btn.appendChild(makeLugs());

    const shine = document.createElement('div');
    shine.className = 'shine';
    btn.appendChild(shine);

    const label = document.createElement('div');
    label.className = 'label';
    label.textContent = def.label;
    btn.appendChild(label);

    const key = document.createElement('div');
    key.className = 'key';
    key.textContent = def.key;
    btn.appendChild(key);

    return btn;
  }

  // Build grid: 8 pads + kick spanning full width at end visually via order
  PADS.forEach(def => kitEl.appendChild(buildPad(def)));
  const kickPad = buildPad(KICK);
  kickPad.style.gridColumn = 'span 4';
  kickPad.style.aspectRatio = '4/1';
  kickPad.style.borderRadius = '50px';
  // override ring radius for pill shape
  kitEl.appendChild(kickPad);

  const padEls = {};
  document.querySelectorAll('.pad').forEach(p => { padEls[p.dataset.id] = p; });

  // adjust kick pad lugs/ring for pill shape via CSS override
  const style2 = document.createElement('style');
  style2.textContent = `
    .pad[data-id="kick"] .ring{ border-radius:50px; }
    .pad[data-id="kick"] .lugs span{ display:none; }
    @media (max-width:680px){ .pad[data-id="kick"]{ grid-column: span 2; } }
  `;
  document.head.appendChild(style2);

  // ---------- Recording / Playback ----------
  let isRecording = false;
  let isPlaying = false;
  let recordStart = 0;
  let events = []; // {id, t} t = ms offset from recordStart
  let playbackTimers = [];

  const recordBtn = document.getElementById('recordBtn');
  const playBtn = document.getElementById('playBtn');
  const stopBtn = document.getElementById('stopBtn');
  const clearBtn = document.getElementById('clearBtn');
  const metroBtn = document.getElementById('metroBtn');
  const recDot = document.getElementById('recDot');
  const statusText = document.getElementById('statusText');
  const noteCount = document.getElementById('noteCount');
  const toast = document.getElementById('toast');
  const volumeSlider = document.getElementById('volume');
  const tempoSlider = document.getElementById('tempo');
  const tempoVal = document.getElementById('tempoVal');

  let metronomeOn = false;
  let metroInterval = null;
  let bpm = 120;

  function showToast(msg){
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(()=>toast.classList.remove('show'), 1800);
  }

  function updateStatus(){
    if(isRecording){
      statusText.textContent = 'Recording…';
      recDot.classList.add('live');
    } else if(isPlaying){
      statusText.textContent = 'Playing back…';
      recDot.classList.remove('live');
    } else {
      statusText.textContent = 'Ready';
      recDot.classList.remove('live');
    }
    noteCount.textContent = events.length ? events.length + ' hits' : '';
  }

  function triggerPad(id, fromPlayback){
    const ctx = ensureCtx();
    playSound(id);
    const el = padEls[id];
    if(el){
      el.classList.add(fromPlayback ? 'playback-hit' : 'hit');
      setTimeout(()=>{
        el.classList.remove('hit');
        el.classList.remove('playback-hit');
      }, fromPlayback ? 300 : 120);
    }
    if(isRecording){
      events.push({ id, t: performance.now() - recordStart });
    }
  }

  function startRecording(){
    if(isPlaying) stopPlayback();
    isRecording = true;
    events = [];
    recordStart = performance.now();
    recordBtn.classList.add('active');
    recordBtn.innerHTML = '<span class="dot live" id="recDot"></span> Stop Rec';
    playBtn.disabled = true;
    clearBtn.disabled = true;
    updateStatus();
    showToast('Recording started — play some drums!');
  }

  function stopRecording(){
    isRecording = false;
    recordBtn.classList.remove('active');
    recordBtn.innerHTML = '<span class="dot" id="recDot"></span> Record';
    playBtn.disabled = events.length === 0;
    clearBtn.disabled = events.length === 0;
    updateStatus();
    if(events.length){
      showToast('Recording saved: ' + events.length + ' hits');
    } else {
      showToast('No hits recorded');
    }
  }

  function startPlayback(){
    if(!events.length || isPlaying) return;
    isPlaying = true;
    playBtn.classList.add('active');
    stopBtn.disabled = false;
    recordBtn.disabled = true;
    updateStatus();
    const ctx = ensureCtx();
    const startCtxTime = ctx.currentTime + 0.05;
    events.forEach(ev => {
      const timer = setTimeout(()=>{
        triggerPad(ev.id, true);
      }, ev.t);
      playbackTimers.push(timer);
    });
    const totalDuration = events[events.length-1].t + 500;
    const endTimer = setTimeout(()=>{
      stopPlayback();
    }, totalDuration);
    playbackTimers.push(endTimer);
  }

  function stopPlayback(){
    isPlaying = false;
    playbackTimers.forEach(t => clearTimeout(t));
    playbackTimers = [];
    playBtn.classList.remove('active');
    stopBtn.disabled = true;
    recordBtn.disabled = false;
    updateStatus();
  }

  function clearRecording(){
    events = [];
    playBtn.disabled = true;
    clearBtn.disabled = true;
    updateStatus();
    showToast('Recording cleared');
  }

  recordBtn.addEventListener('click', ()=>{
    ensureCtx();
    if(isRecording) stopRecording(); else startRecording();
  });
  playBtn.addEventListener('click', ()=>{
    ensureCtx();
    if(!isPlaying) startPlayback();
  });
  stopBtn.addEventListener('click', stopPlayback);
  clearBtn.addEventListener('click', clearRecording);

  metroBtn.addEventListener('click', ()=>{
    metronomeOn = !metronomeOn;
    metroBtn.classList.toggle('active', metronomeOn);
    if(metronomeOn){
      metroBtn.style.filter = 'brightness(1.3)';
      startMetronome();
      showToast('Metronome on');
    } else {
      metroBtn.style.filter = '';
      stopMetronome();
      showToast('Metronome off');
    }
  });

  function startMetronome(){
    stopMetronome();
    const tick = ()=>{
      const ctx = ensureCtx();
      const dest = masterGain();
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = 1500;
      g.gain.setValueAtTime(0.25, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.05);
      osc.connect(g).connect(dest);
      osc.start();
      osc.stop(ctx.currentTime+0.06);
    };
    const interval = 60000/bpm;
    tick();
    metroInterval = setInterval(tick, interval);
  }
  function stopMetronome(){
    if(metroInterval){ clearInterval(metroInterval); metroInterval = null; }
  }

  volumeSlider.addEventListener('input', (e)=>{
    masterVol = e.target.value/100;
  });
  tempoSlider.addEventListener('input', (e)=>{
    bpm = parseInt(e.target.value,10);
    tempoVal.textContent = bpm + ' BPM';
    if(metronomeOn) startMetronome();
  });

  // ---------- Input handling: click/tap ----------
  function bindPadEvents(el, id){
    const handler = (e)=>{
      e.preventDefault();
      ensureCtx();
      triggerPad(id, false);
    };
    el.addEventListener('pointerdown', handler);
  }
  Object.keys(padEls).forEach(id => bindPadEvents(padEls[id], id));

  // ---------- Keyboard mapping ----------
  const keyMap = {
    'a':'tom3','s':'tom2','d':'tom1','f':'snare',
    'j':'hihat','k':'hihat-open','l':'crash',';':'ride',
    ' ':'kick'
  };
  const heldKeys = new Set();

  window.addEventListener('keydown', (e)=>{
    const key = e.key.toLowerCase();

    if(key === 'r' && !e.repeat){
      e.preventDefault();
      ensureCtx();
      if(isRecording) stopRecording(); else startRecording();
      return;
    }
    if(key === 'p' && !e.repeat){
      e.preventDefault();
      ensureCtx();
      if(!isPlaying && events.length) startPlayback();
      return;
    }

    if(keyMap.hasOwnProperty(key)){
      e.preventDefault();
      if(heldKeys.has(key)) return; // avoid retrigger spam on key repeat
      heldKeys.add(key);
      ensureCtx();
      triggerPad(keyMap[key], false);
    }
  });
  window.addEventListener('keyup', (e)=>{
    heldKeys.delete(e.key.toLowerCase());
  });

  // init
  updateStatus();
  tempoVal.textContent = bpm + ' BPM';

  // unlock audio context on first interaction (mobile)
  ['pointerdown','keydown'].forEach(evt=>{
    window.addEventListener(evt, ()=>ensureCtx(), { once:true });
  });

})();
</script>
</body>
