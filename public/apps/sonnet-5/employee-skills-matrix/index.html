<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Skills Matrix</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
        },
        colors: {
          brand: {
            50: '#eef4ff',
            100: '#dce7ff',
            200: '#b9cfff',
            300: '#8fb1ff',
            400: '#5f8bff',
            500: '#3a63f5',
            600: '#2b48d6',
            700: '#2338ad',
            800: '#1f308a',
            900: '#1d2b6e',
          },
        },
        boxShadow: {
          soft: '0 1px 2px rgba(16,24,40,0.04), 0 1px 3px rgba(16,24,40,0.06)',
          card: '0 1px 3px rgba(16,24,40,0.06), 0 4px 12px rgba(16,24,40,0.06)',
        }
      }
    }
  }
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }
  ::-webkit-scrollbar { height: 10px; width: 10px; }
  ::-webkit-scrollbar-track { background: #f1f3f9; }
  ::-webkit-scrollbar-thumb { background: #c7cde0; border-radius: 8px; }
  ::-webkit-scrollbar-thumb:hover { background: #aab2cf; }

  .matrix-scroll { scrollbar-width: thin; }

  .cell-btn {
    transition: transform .12s ease, box-shadow .12s ease, background-color .12s ease;
  }
  .cell-btn:hover {
    transform: scale(1.08);
    z-index: 5;
  }
  .cell-btn:active {
    transform: scale(0.96);
  }

  .sticky-col {
    position: sticky;
    left: 0;
    z-index: 10;
  }
  .sticky-head {
    position: sticky;
    top: 0;
    z-index: 20;
  }
  .sticky-corner {
    position: sticky;
    top: 0;
    left: 0;
    z-index: 30;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-in { animation: fadeIn .25s ease both; }

  @keyframes popIn {
    from { opacity: 0; transform: scale(.85); }
    to { opacity: 1; transform: scale(1); }
  }
  .pop-in { animation: popIn .18s ease both; }

  .modal-backdrop {
    backdrop-filter: blur(2px);
  }

  .legend-swatch { width: 14px; height: 14px; border-radius: 4px; display: inline-block; }

  [data-tooltip] { position: relative; }
  [data-tooltip]:hover::after {
    content: attr(data-tooltip);
    position: absolute;
    bottom: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
    background: #1f2937;
    color: white;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
    z-index: 50;
    pointer-events: none;
    box-shadow: 0 4px 10px rgba(0,0,0,.15);
  }
  [data-tooltip]:hover::before {
    content: '';
    position: absolute;
    bottom: calc(100% + 3px);
    left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-top-color: #1f2937;
    z-index: 50;
    pointer-events: none;
  }

  .progress-track { background: #eef1f8; }
</style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">

<div id="app"></div>

<script>
(function(){
  "use strict";

  /* ----------------------------- Seed Data ----------------------------- */

  const PROFICIENCY = [
    { level: 0, label: 'None',         short: '—', color: '#e5e7eb', text: '#9ca3af' },
    { level: 1, label: 'Beginner',     short: '1', color: '#fde68a', text: '#92400e' },
    { level: 2, label: 'Intermediate', short: '2', color: '#93c5fd', text: '#1e3a8a' },
    { level: 3, label: 'Advanced',     short: '3', color: '#86efac', text: '#14532d' },
    { level: 4, label: 'Expert',       short: '4', color: '#3a63f5', text: '#ffffff' },
  ];

  const CATEGORIES = ['Engineering', 'Design', 'Product', 'Data', 'Soft Skills'];

  const SKILLS = [
    { id: 's1',  name: 'JavaScript',          category: 'Engineering' },
    { id: 's2',  name: 'Python',               category: 'Engineering' },
    { id: 's3',  name: 'Cloud Infrastructure', category: 'Engineering' },
    { id: 's4',  name: 'System Design',        category: 'Engineering' },
    { id: 's5',  name: 'SQL & Databases',      category: 'Data' },
    { id: 's6',  name: 'Data Visualization',   category: 'Data' },
    { id: 's7',  name: 'Machine Learning',     category: 'Data' },
    { id: 's8',  name: 'UI/UX Design',         category: 'Design' },
    { id: 's9',  name: 'Prototyping',          category: 'Design' },
    { id: 's10', name: 'Product Strategy',     category: 'Product' },
    { id: 's11', name: 'Roadmapping',          category: 'Product' },
    { id: 's12', name: 'Public Speaking',      category: 'Soft Skills' },
    { id: 's13', name: 'Project Management',   category: 'Soft Skills' },
    { id: 's14', name: 'Mentorship',           category: 'Soft Skills' },
  ];

  const EMPLOYEES = [
    { id: 'e1',  name: 'Ava Thompson',     role: 'Senior Engineer',     team: 'Platform',  avatarColor: '#3a63f5', initials: 'AT' },
    { id: 'e2',  name: 'Liam Carter',      role: 'Product Designer',   team: 'Design',    avatarColor: '#f59e0b', initials: 'LC' },
    { id: 'e3',  name: 'Sofia Nguyen',     role: 'Data Scientist',     team: 'Data',      avatarColor: '#10b981', initials: 'SN' },
    { id: 'e4',  name: 'Noah Patel',       role: 'Product Manager',    team: 'Product',   avatarColor: '#ef4444', initials: 'NP' },
    { id: 'e5',  name: 'Emma Rodriguez',   role: 'Frontend Engineer',  team: 'Platform',  avatarColor: '#8b5cf6', initials: 'ER' },
    { id: 'e6',  name: 'Mason Lee',        role: 'Backend Engineer',   team: 'Platform',  avatarColor: '#06b6d4', initials: 'ML' },
    { id: 'e7',  name: 'Olivia Brooks',    role: 'UX Researcher',      team: 'Design',    avatarColor: '#ec4899', initials: 'OB' },
    { id: 'e8',  name: 'Ethan Walker',     role: 'Engineering Lead',   team: 'Platform',  avatarColor: '#2563eb', initials: 'EW' },
    { id: 'e9',  name: 'Isabella Kim',     role: 'Data Analyst',       team: 'Data',      avatarColor: '#65a30d', initials: 'IK' },
    { id: 'e10', name: 'James Wilson',     role: 'Product Designer',   team: 'Design',    avatarColor: '#d97706', initials: 'JW' },
  ];

  // Deterministic pseudo-random generator so the seed is stable across reloads.
  function seededRandom(seed) {
    let s = seed % 2147483647;
    if (s <= 0) s += 2147483646;
    return function() {
      s = (s * 16807) % 2147483647;
      return (s - 1) / 2147483646;
    };
  }

  function buildSeedMatrix() {
    const rand = seededRandom(42);
    const matrix = {};
    EMPLOYEES.forEach(emp => {
      SKILLS.forEach(skill => {
        const r = rand();
        let level;
        // Bias toward relevant categories based on role/team for realism
        const relevant =
          (emp.team === 'Platform' && skill.category === 'Engineering') ||
          (emp.team === 'Design' && skill.category === 'Design') ||
          (emp.team === 'Data' && skill.category === 'Data') ||
          (emp.team === 'Product' && skill.category === 'Product') ||
          skill.category === 'Soft Skills';

        if (relevant) {
          if (r < 0.05) level = 1;
          else if (r < 0.25) level = 2;
          else if (r < 0.65) level = 3;
          else level = 4;
        } else {
          if (r < 0.45) level = 0;
          else if (r < 0.75) level = 1;
          else if (r < 0.93) level = 2;
          else level = 3;
        }
        matrix[`${emp.id}__${skill.id}`] = level;
      });
    });
    return matrix;
  }

  /* ------------------------------- State -------------------------------- */

  const state = {
    matrix: buildSeedMatrix(),
    search: '',
    teamFilter: 'All',
    categoryFilter: 'All',
    gapOnly: false,
    selectedCell: null, // {empId, skillId}
  };

  const STORAGE_KEY = 'skills-matrix-state-v1';

  function persist() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.matrix));
    } catch (e) { /* ignore storage errors */ }
  }

  function loadPersisted() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        Object.assign(state.matrix, parsed);
      }
    } catch (e) { /* ignore */ }
  }
  loadPersisted();

  /* ------------------------------ Helpers -------------------------------- */

  function profFor(level) {
    return PROFICIENCY.find(p => p.level === level) || PROFICIENCY[0];
  }

  function getLevel(empId, skillId) {
    return state.matrix[`${empId}__${skillId}`] ?? 0;
  }

  function setLevel(empId, skillId, level) {
    state.matrix[`${empId}__${skillId}`] = level;
    persist();
  }

  function teamsList() {
    return ['All', ...Array.from(new Set(EMPLOYEES.map(e => e.team))).sort()];
  }

  function categoriesList() {
    return ['All', ...CATEGORIES];
  }

  function filteredEmployees() {
    return EMPLOYEES.filter(emp => {
      if (state.teamFilter !== 'All' && emp.team !== state.teamFilter) return false;
      if (state.search.trim()) {
        const q = state.search.trim().toLowerCase();
        if (!emp.name.toLowerCase().includes(q) && !emp.role.toLowerCase().includes(q)) return false;
      }
      return true;
    });
  }

  function filteredSkills() {
    let skills = SKILLS.filter(sk => {
      if (state.categoryFilter !== 'All' && sk.category !== state.categoryFilter) return false;
      return true;
    });
    if (state.gapOnly) {
      const emps = filteredEmployees();
      skills = skills.filter(sk => {
        const avg = average(emps.map(e => getLevel(e.id, sk.id)));
        return avg < 2;
      });
    }
    return skills;
  }

  function average(arr) {
    if (!arr.length) return 0;
    return arr.reduce((a, b) => a + b, 0) / arr.length;
  }

  function coveragePercent(skillId, emps) {
    const list = emps || EMPLOYEES;
    const proficient = list.filter(e => getLevel(e.id, skillId) >= 2).length;
    return list.length ? Math.round((proficient / list.length) * 100) : 0;
  }

  function teamAverage(empId) {
    const levels = SKILLS.map(sk => getLevel(empId, sk.id));
    return average(levels);
  }

  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, ch => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[ch]));
  }

  /* ------------------------------ Rendering ------------------------------ */

  const app = document.getElementById('app');

  function render() {
    const emps = filteredEmployees();
    const skills = filteredSkills();

    app.innerHTML = `
      ${renderHeader()}
      <main class="max-w-[1600px] mx-auto px-4 sm:px-6 lg:px-8 py-6 space-y-6">
        ${renderStatCards(emps)}
        ${renderToolbar()}
        ${renderMatrix(emps, skills)}
      </main>
      ${renderLegend()}
      ${state.selectedCell ? renderModal() : ''}
      ${renderFooter()}
    `;

    attachEvents();
  }

  function renderHeader() {
    return `
    <header class="bg-white border-b border-slate-200 sticky top-0 z-40">
      <div class="max-w-[1600px] mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-16">
          <div class="flex items-center gap-3">
            <div class="w-9 h-9 rounded-lg bg-brand-500 flex items-center justify-center shadow-soft">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            </div>
            <div>
              <h1 class="text-lg font-bold text-slate-900 leading-tight">Employee Skills Matrix</h1>
              <p class="text-xs text-slate-500 leading-tight">Team skills coverage &amp; proficiency tracker</p>
            </div>
          </div>
          <div class="hidden md:flex items-center gap-2">
            <span class="text-xs font-medium text-slate-400 mr-1">HR Workspace</span>
            <div class="w-8 h-8 rounded-full bg-brand-100 text-brand-700 flex items-center justify-center text-xs font-semibold">HR</div>
          </div>
        </div>
      </div>
    </header>
    `;
  }

  function renderStatCards(emps) {
    const totalEmployees = EMPLOYEES.length;
    const totalSkills = SKILLS.length;
    const allLevels = [];
    EMPLOYEES.forEach(e => SKILLS.forEach(s => allLevels.push(getLevel(e.id, s.id))));
    const avgProficiency = average(allLevels);
    const expertCount = allLevels.filter(l => l === 4).length;
    const gapSkills = SKILLS.filter(sk => coveragePercent(sk.id) < 40).length;

    function card(label, value, sub, icon, accent) {
      return `
      <div class="bg-white rounded-xl border border-slate-200 shadow-soft p-4 flex items-center gap-4">
        <div class="w-11 h-11 rounded-lg flex items-center justify-center shrink-0" style="background:${accent}1a;color:${accent}">
          ${icon}
        </div>
        <div class="min-w-0">
          <p class="text-xs font-medium text-slate-500 truncate">${label}</p>
          <p class="text-xl font-bold text-slate-900 leading-tight">${value}</p>
          <p class="text-xs text-slate-400 truncate">${sub}</p>
        </div>
      </div>`;
    }

    return `
    <section class="grid grid-cols-2 lg:grid-cols-4 gap-4">
      ${card('Team Members', totalEmployees, 'Across all teams',
        `<svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`,
        '#3a63f5')}
      ${card('Tracked Skills', totalSkills, `${CATEGORIES.length} categories`,
        `<svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>`,
        '#8b5cf6')}
      ${card('Avg. Proficiency', avgProficiency.toFixed(2) + ' / 4', 'Org-wide average',
        `<svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M18.7 8l-5.1 5.1-2.8-2.8L7 14"/></svg>`,
        '#10b981')}
      ${card('Coverage Gaps', gapSkills, 'Skills under 40% coverage',
        `<svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
        '#ef4444')}
    </section>
    `;
  }

  function renderToolbar() {
    return `
    <section class="bg-white rounded-xl border border-slate-200 shadow-soft p-4">
      <div class="flex flex-col lg:flex-row lg:items-center gap-3 lg:gap-4">
        <div class="relative flex-1 min-w-[200px]">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input id="search-input" type="text" placeholder="Search by name or role..." value="${escapeHtml(state.search)}"
            class="w-full pl-9 pr-3 py-2 text-sm border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-400 focus:border-transparent bg-slate-50 focus:bg-white transition" />
        </div>

        <div class="flex flex-wrap items-center gap-3">
          <select id="team-filter" class="text-sm border border-slate-200 rounded-lg px-3 py-2 bg-slate-50 focus:outline-none focus:ring-2 focus:ring-brand-400 cursor-pointer">
            ${teamsList().map(t => `<option value="${escapeHtml(t)}" ${state.teamFilter === t ? 'selected' : ''}>${t === 'All' ? 'All Teams' : t}</option>`).join('')}
          </select>

          <select id="category-filter" class="text-sm border border-slate-200 rounded-lg px-3 py-2 bg-slate-50 focus:outline-none focus:ring-2 focus:ring-brand-400 cursor-pointer">
            ${categoriesList().map(c => `<option value="${escapeHtml(c)}" ${state.categoryFilter === c ? 'selected' : ''}>${c === 'All' ? 'All Categories' : c}</option>`).join('')}
          </select>

          <label class="flex items-center gap-2 text-sm text-slate-600 cursor-pointer select-none bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 hover:bg-slate-100 transition">
            <input id="gap-only" type="checkbox" ${state.gapOnly ? 'checked' : ''} class="rounded text-brand-500 focus:ring-brand-400" />
            Gaps only
          </label>

          ${(state.search || state.teamFilter !== 'All' || state.categoryFilter !== 'All' || state.gapOnly) ? `
          <button id="clear-filters" class="text-sm text-brand-600 hover:text-brand-700 font-medium px-2 py-2">Clear filters</button>
          ` : ''}
        </div>
      </div>
    </section>
    `;
  }

  function renderMatrix(emps, skills) {
    if (!emps.length || !skills.length) {
      return `
      <section class="bg-white rounded-xl border border-slate-200 shadow-soft p-12 text-center">
        <p class="text-slate-400 text-sm">No results match your filters. Try adjusting search or filter criteria.</p>
      </section>`;
    }

    const rows = skills.map(skill => {
      const cov = coveragePercent(skill.id, emps);
      const covColor = cov >= 70 ? '#10b981' : cov >= 40 ? '#f59e0b' : '#ef4444';

      const cells = emps.map(emp => {
        const level = getLevel(emp.id, skill.id);
        const p = profFor(level);
        return `
        <td class="p-1.5 text-center border-b border-slate-100">
          <button
            class="cell-btn w-9 h-9 rounded-lg flex items-center justify-center text-xs font-bold border border-black/5 shadow-sm"
            style="background:${p.color};color:${p.text}"
            data-emp="${emp.id}" data-skill="${skill.id}"
            data-tooltip="${escapeHtml(emp.name)} · ${escapeHtml(p.label)}"
            aria-label="${escapeHtml(emp.name)} proficiency in ${escapeHtml(skill.name)}: ${escapeHtml(p.label)}"
          >${p.short}</button>
        </td>`;
      }).join('');

      return `
      <tr class="hover:bg-slate-50/60 transition-colors">
        <td class="sticky-col bg-white px-4 py-2 border-b border-r border-slate-100 min-w-[220px]">
          <div class="flex flex-col">
            <span class="text-sm font-semibold text-slate-800">${escapeHtml(skill.name)}</span>
            <span class="text-[11px] text-slate-400">${escapeHtml(skill.category)}</span>
          </div>
        </td>
        ${cells}
        <td class="px-3 py-2 border-b border-l border-slate-100 min-w-[120px]">
          <div class="flex items-center gap-2">
            <div class="flex-1 h-1.5 rounded-full progress-track overflow-hidden">
              <div class="h-full rounded-full" style="width:${cov}%;background:${covColor}"></div>
            </div>
            <span class="text-xs font-semibold tabular-nums w-9 text-right" style="color:${covColor}">${cov}%</span>
          </div>
        </td>
      </tr>`;
    }).join('');

    const headerCells = emps.map(emp => `
      <th class="sticky-head bg-white px-1.5 py-3 border-b border-slate-200 text-center min-w-[60px]">
        <div class="flex flex-col items-center gap-1.5" data-tooltip="${escapeHtml(emp.name)} · ${escapeHtml(emp.role)}">
          <div class="w-8 h-8 rounded-full flex items-center justify-center text-[11px] font-bold text-white shrink-0" style="background:${emp.avatarColor}">${emp.initials}</div>
          <span class="text-[10px] font-medium text-slate-500 max-w-[64px] truncate">${escapeHtml(emp.name.split(' ')[0])}</span>
        </div>
      </th>
    `).join('');

    return `
    <section class="bg-white rounded-xl border border-slate-200 shadow-soft overflow-hidden">
      <div class="flex items-center justify-between px-5 py-3 border-b border-slate-100">
        <div>
          <h2 class="text-sm font-bold text-slate-800">Skills &times; Employees Grid</h2>
          <p class="text-xs text-slate-400">Click any cell to view or edit proficiency level</p>
        </div>
        <span class="text-xs font-medium text-slate-400">${skills.length} skill${skills.length !== 1 ? 's' : ''} &middot; ${emps.length} member${emps.length !== 1 ? 's' : ''}</span>
      </div>
      <div class="matrix-scroll overflow-auto max-h-[60vh]">
        <table class="w-full border-collapse">
          <thead>
            <tr>
              <th class="sticky-corner bg-white px-4 py-3 border-b border-r border-slate-200 text-left min-w-[220px]">
                <span class="text-xs font-bold text-slate-500 uppercase tracking-wide">Skill</span>
              </th>
              ${headerCells}
              <th class="sticky-head bg-white px-3 py-3 border-b border-l border-slate-200 text-left min-w-[120px]">
                <span class="text-xs font-bold text-slate-500 uppercase tracking-wide">Coverage</span>
              </th>
            </tr>
          </thead>
          <tbody>
            ${rows}
          </tbody>
        </table>
      </div>
    </section>
    `;
  }

  function renderLegend() {
    return `
    <div class="max-w-[1600px] mx-auto px-4 sm:px-6 lg:px-8 pb-4">
      <div class="bg-white rounded-xl border border-slate-200 shadow-soft px-5 py-3 flex flex-wrap items-center gap-x-6 gap-y-2">
        <span class="text-xs font-bold text-slate-500 uppercase tracking-wide">Proficiency legend</span>
        ${PROFICIENCY.map(p => `
          <span class="flex items-center gap-1.5 text-xs text-slate-600">
            <span class="legend-swatch" style="background:${p.color}"></span>
            ${p.label}
          </span>
        `).join('')}
      </div>
    </div>
    `;
  }

  function renderModal() {
    const { empId, skillId } = state.selectedCell;
    const emp = EMPLOYEES.find(e => e.id === empId);
    const skill = SKILLS.find(s => s.id === skillId);
    if (!emp || !skill) return '';
    const currentLevel = getLevel(empId, skillId);

    return `
    <div id="modal-backdrop" class="fixed inset-0 bg-slate-900/40 modal-backdrop z-50 flex items-center justify-center p-4 fade-in">
      <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm pop-in overflow-hidden">
        <div class="px-5 py-4 border-b border-slate-100 flex items-start justify-between">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full flex items-center justify-center text-sm font-bold text-white shrink-0" style="background:${emp.avatarColor}">${emp.initials}</div>
            <div>
              <p class="text-sm font-bold text-slate-900">${escapeHtml(emp.name)}</p>
              <p class="text-xs text-slate-400">${escapeHtml(emp.role)}</p>
            </div>
          </div>
          <button id="modal-close" class="text-slate-400 hover:text-slate-600 p-1 -mt-1 -mr-1">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="px-5 py-4 space-y-4">
          <div>
            <p class="text-xs font-bold text-slate-400 uppercase tracking-wide mb-1">Skill</p>
            <p class="text-sm font-semibold text-slate-800">${escapeHtml(skill.name)}</p>
            <p class="text-xs text-slate-400">${escapeHtml(skill.category)}</p>
          </div>
          <div>
            <p class="text-xs font-bold text-slate-400 uppercase tracking-wide mb-2">Set proficiency level</p>
            <div class="grid grid-cols-5 gap-2">
              ${PROFICIENCY.map(p => `
                <button class="level-btn flex flex-col items-center gap-1 py-2 rounded-lg border-2 transition"
                  data-level="${p.level}"
                  style="border-color:${currentLevel === p.level ? p.color : '#e5e7eb'}; background:${currentLevel === p.level ? p.color + '22' : 'white'}">
                  <span class="w-6 h-6 rounded-md flex items-center justify-center text-xs font-bold" style="background:${p.color};color:${p.text}">${p.short}</span>
                  <span class="text-[10px] font-medium text-slate-500">${p.label}</span>
                </button>
              `).join('')}
            </div>
          </div>
        </div>
        <div class="px-5 py-3 bg-slate-50 text-xs text-slate-400 text-center">Changes save automatically</div>
      </div>
    </div>
    `;
  }

  function renderFooter() {
    return `
    <footer class="max-w-[1600px] mx-auto px-4 sm:px-6 lg:px-8 pb-10">
      <p class="text-center text-xs text-slate-400">Employee Skills Matrix &middot; Internal HR Tool &middot; Data stored locally in your browser</p>
    </footer>
    `;
  }

  /* ------------------------------- Events -------------------------------- */

  function attachEvents() {
    const searchInput = document.getElementById('search-input');
    if (searchInput) {
      searchInput.addEventListener('input', (e) => {
        state.search = e.target.value;
        const caret = e.target.selectionStart;
        render();
        const newInput = document.getElementById('search-input');
        if (newInput) {
          newInput.focus();
          newInput.setSelectionRange(caret, caret);
        }
      });
    }

    const teamFilter = document.getElementById('team-filter');
    if (teamFilter) {
      teamFilter.addEventListener('change', (e) => {
        state.teamFilter = e.target.value;
        render();
      });
    }

    const categoryFilter = document.getElementById('category-filter');
    if (categoryFilter) {
      categoryFilter.addEventListener('change', (e) => {
        state.categoryFilter = e.target.value;
        render();
      });
    }

    const gapOnly = document.getElementById('gap-only');
    if (gapOnly) {
      gapOnly.addEventListener('change', (e) => {
        state.gapOnly = e.target.checked;
        render();
      });
    }

    const clearBtn = document.getElementById('clear-filters');
    if (clearBtn) {
      clearBtn.addEventListener('click', () => {
        state.search = '';
        state.teamFilter = 'All';
        state.categoryFilter = 'All';
        state.gapOnly = false;
        render();
      });
    }

    document.querySelectorAll('.cell-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        state.selectedCell = { empId: btn.dataset.emp, skillId: btn.dataset.skill };
        render();
      });
    });

    const modalBackdrop = document.getElementById('modal-backdrop');
    if (modalBackdrop) {
      modalBackdrop.addEventListener('click', (e) => {
        if (e.target === modalBackdrop) {
          state.selectedCell = null;
          render();
        }
      });
    }

    const modalClose = document.getElementById('modal-close');
    if (modalClose) {
      modalClose.addEventListener('click', () => {
        state.selectedCell = null;
        render();
      });
    }

    document.querySelectorAll('.level-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (!state.selectedCell) return;
        const level = parseInt(btn.dataset.level, 10);
        setLevel(state.selectedCell.empId, state.selectedCell.skillId, level);
        render();
      });
    });

    document.addEventListener('keydown', escListener);
  }

  function escListener(e) {
    if (e.key === 'Escape' && state.selectedCell) {
      state.selectedCell = null;
      render();
    }
  }

  render();
})();
</script>
</body>
</html>
