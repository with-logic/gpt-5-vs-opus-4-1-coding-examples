<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Company Acronym List</title>
<style>
  :root{
    --bg: #f5f6f8;
    --surface: #ffffff;
    --surface-alt: #fafbfc;
    --border: #e3e6ea;
    --text: #1a1d23;
    --text-soft: #5b6270;
    --text-faint: #8a909c;
    --brand: #3a5ddb;
    --brand-dark: #2c46ad;
    --brand-soft: #ebf0ff;
    --danger: #e0473e;
    --success: #1f9d63;
    --radius: 12px;
    --shadow-sm: 0 1px 2px rgba(20,24,32,0.04), 0 1px 1px rgba(20,24,32,0.03);
    --shadow-md: 0 4px 14px rgba(20,24,32,0.08);
    --shadow-lg: 0 12px 32px rgba(20,24,32,0.14);
  }

  *, *::before, *::after { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  button { font-family: inherit; }

  /* ---------- Layout shell ---------- */
  .app {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header.topbar {
    position: sticky;
    top: 0;
    z-index: 30;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .topbar-inner {
    max-width: 1080px;
    margin: 0 auto;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 700;
    font-size: 17px;
    letter-spacing: -0.01em;
    color: var(--text);
    white-space: nowrap;
  }

  .brand .mark {
    width: 32px;
    height: 32px;
    border-radius: 9px;
    background: linear-gradient(135deg, var(--brand), #6c8cff);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 14px;
    flex-shrink: 0;
  }

  nav.tabs {
    display: flex;
    gap: 4px;
    background: var(--surface-alt);
    border: 1px solid var(--border);
    padding: 4px;
    border-radius: 10px;
  }

  nav.tabs button {
    border: none;
    background: transparent;
    padding: 8px 16px;
    border-radius: 7px;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-soft);
    cursor: pointer;
    transition: background .15s ease, color .15s ease;
  }

  nav.tabs button:hover { color: var(--text); }

  nav.tabs button.active {
    background: var(--surface);
    color: var(--brand-dark);
    box-shadow: var(--shadow-sm);
  }

  main {
    flex: 1;
    width: 100%;
    max-width: 1080px;
    margin: 0 auto;
    padding: 28px 24px 64px;
  }

  /* ---------- Library view ---------- */
  .library-head {
    margin-bottom: 22px;
  }

  .library-head h1 {
    font-size: 26px;
    margin: 0 0 6px;
    letter-spacing: -0.015em;
  }

  .library-head p {
    margin: 0;
    color: var(--text-soft);
    font-size: 14.5px;
  }

  .controls {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-bottom: 22px;
    position: sticky;
    top: 73px;
    z-index: 20;
    background: var(--bg);
    padding-top: 6px;
    padding-bottom: 4px;
  }

  .search-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }

  .search-wrap svg {
    position: absolute;
    left: 14px;
    width: 18px;
    height: 18px;
    color: var(--text-faint);
    pointer-events: none;
  }

  #searchInput {
    width: 100%;
    padding: 12px 40px 12px 42px;
    font-size: 15px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    color: var(--text);
    outline: none;
    transition: border-color .15s ease, box-shadow .15s ease;
  }

  #searchInput:focus {
    border-color: var(--brand);
    box-shadow: 0 0 0 3px rgba(58,93,219,0.12);
  }

  .clear-btn {
    position: absolute;
    right: 8px;
    border: none;
    background: var(--surface-alt);
    color: var(--text-faint);
    width: 26px;
    height: 26px;
    border-radius: 50%;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }
  .clear-btn.visible { display: flex; }
  .clear-btn:hover { background: var(--border); color: var(--text); }

  .filter-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
  }

  .chip {
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-soft);
    padding: 6px 13px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: all .15s ease;
    white-space: nowrap;
  }

  .chip:hover { border-color: var(--brand); color: var(--brand-dark); }

  .chip.active {
    background: var(--brand);
    border-color: var(--brand);
    color: white;
  }

  .chip .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .result-count {
    font-size: 13px;
    color: var(--text-faint);
    margin: 2px 2px 14px;
  }

  .acro-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .acro-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    display: flex;
    gap: 16px;
    align-items: flex-start;
    transition: box-shadow .15s ease, border-color .15s ease, transform .1s ease;
  }

  .acro-card:hover {
    box-shadow: var(--shadow-md);
    border-color: #d7dce4;
  }

  .acro-badge {
    flex-shrink: 0;
    min-width: 64px;
    text-align: center;
    background: var(--brand-soft);
    color: var(--brand-dark);
    font-weight: 800;
    font-size: 15px;
    letter-spacing: 0.02em;
    padding: 9px 10px;
    border-radius: 9px;
    line-height: 1.1;
  }

  .acro-body { flex: 1; min-width: 0; }

  .acro-top-row {
    display: flex;
    align-items: baseline;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 4px;
  }

  .acro-expansion {
    font-weight: 700;
    font-size: 15.5px;
    color: var(--text);
  }

  .acro-def {
    color: var(--text-soft);
    font-size: 14px;
    line-height: 1.5;
    margin: 4px 0 10px;
  }

  .tag-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .tag {
    font-size: 11.5px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    padding: 3px 9px;
    border-radius: 6px;
  }

  .star-btn {
    border: none;
    background: transparent;
    cursor: pointer;
    color: var(--text-faint);
    font-size: 18px;
    padding: 4px;
    flex-shrink: 0;
    line-height: 1;
    transition: color .15s ease, transform .1s ease;
  }
  .star-btn:hover { transform: scale(1.15); }
  .star-btn.starred { color: #f0a93c; }

  mark {
    background: #fff1b8;
    color: inherit;
    border-radius: 3px;
    padding: 0 1px;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-faint);
  }
  .empty-state .icon { font-size: 38px; margin-bottom: 10px; }
  .empty-state strong { display: block; color: var(--text-soft); font-size: 15px; margin-bottom: 4px; }

  /* ---------- Quiz view ---------- */
  .quiz-shell {
    max-width: 620px;
    margin: 0 auto;
  }

  .quiz-intro {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 36px 32px;
    text-align: center;
  }

  .quiz-intro h2 {
    margin: 0 0 8px;
    font-size: 22px;
  }

  .quiz-intro p {
    color: var(--text-soft);
    font-size: 14.5px;
    margin: 0 0 24px;
    line-height: 1.6;
  }

  .quiz-options {
    display: flex;
    flex-direction: column;
    gap: 10px;
    text-align: left;
    margin-bottom: 26px;
  }

  .quiz-option-label {
    display: flex;
    align-items: center;
    gap: 10px;
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 11px 14px;
    cursor: pointer;
    font-size: 14px;
    color: var(--text-soft);
    transition: border-color .15s ease, background .15s ease;
  }
  .quiz-option-label:hover { border-color: var(--brand); }
  .quiz-option-label input { accent-color: var(--brand); }
  .quiz-option-label.checked {
    border-color: var(--brand);
    background: var(--brand-soft);
    color: var(--brand-dark);
    font-weight: 600;
  }

  .btn {
    border: none;
    border-radius: 9px;
    padding: 12px 26px;
    font-size: 14.5px;
    font-weight: 700;
    cursor: pointer;
    transition: background .15s ease, transform .1s ease, box-shadow .15s ease;
  }
  .btn:active { transform: scale(0.98); }

  .btn-primary {
    background: var(--brand);
    color: white;
    box-shadow: 0 2px 8px rgba(58,93,219,0.3);
  }
  .btn-primary:hover { background: var(--brand-dark); }
  .btn-primary:disabled {
    background: #c7cfe0;
    cursor: not-allowed;
    box-shadow: none;
  }

  .btn-ghost {
    background: var(--surface-alt);
    color: var(--text-soft);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: var(--border); color: var(--text); }

  .quiz-progress-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 22px;
  }

  .quiz-progress-bar {
    flex: 1;
    height: 7px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .quiz-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--brand), #6c8cff);
    transition: width .25s ease;
  }
  .quiz-progress-label {
    font-size: 12.5px;
    font-weight: 700;
    color: var(--text-faint);
    white-space: nowrap;
  }

  .quiz-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 30px 32px;
  }

  .quiz-score-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--surface-alt);
    border: 1px solid var(--border);
    padding: 5px 12px;
    border-radius: 999px;
    font-size: 12.5px;
    font-weight: 700;
    color: var(--text-soft);
  }

  .quiz-question-label {
    font-size: 12.5px;
    font-weight: 700;
    color: var(--brand-dark);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 10px;
  }

  .quiz-question-text {
    font-size: 21px;
    font-weight: 800;
    letter-spacing: -0.01em;
    margin-bottom: 24px;
    line-height: 1.3;
  }

  .quiz-option-btn {
    display: block;
    width: 100%;
    text-align: left;
    border: 1.5px solid var(--border);
    background: var(--surface);
    border-radius: 10px;
    padding: 13px 16px;
    margin-bottom: 10px;
    font-size: 14.5px;
    color: var(--text);
    cursor: pointer;
    transition: border-color .12s ease, background .12s ease, transform .08s ease;
  }
  .quiz-option-btn:hover:not(:disabled) {
    border-color: var(--brand);
    background: var(--brand-soft);
  }
  .quiz-option-btn:disabled { cursor: default; }
  .quiz-option-btn.correct {
    border-color: var(--success);
    background: #e9f9f0;
    color: #166c43;
    font-weight: 700;
  }
  .quiz-option-btn.incorrect {
    border-color: var(--danger);
    background: #fdecea;
    color: #a8332b;
    font-weight: 700;
  }

  .quiz-feedback {
    margin-top: 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .quiz-feedback-text {
    font-size: 13.5px;
    font-weight: 600;
  }
  .quiz-feedback-text.correct { color: var(--success); }
  .quiz-feedback-text.incorrect { color: var(--danger); }

  .quiz-result {
    text-align: center;
    padding: 8px 0 0;
  }

  .quiz-result .big-score {
    font-size: 48px;
    font-weight: 800;
    letter-spacing: -0.02em;
    margin: 6px 0;
    background: linear-gradient(135deg, var(--brand), #6c8cff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .quiz-result-msg {
    color: var(--text-soft);
    font-size: 14.5px;
    margin-bottom: 24px;
  }

  .review-list {
    text-align: left;
    margin: 0 0 26px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .review-item {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    font-size: 13.5px;
    padding: 10px 12px;
    border-radius: 8px;
    background: var(--surface-alt);
    border: 1px solid var(--border);
  }
  .review-item .icon { flex-shrink: 0; margin-top: 1px; }
  .review-item.ok .icon { color: var(--success); }
  .review-item.bad .icon { color: var(--danger); }
  .review-item .meta { color: var(--text-faint); }

  .result-actions {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }

  /* category color variables assigned via JS using data attrs */
  footer.app-footer {
    text-align: center;
    color: var(--text-faint);
    font-size: 12.5px;
    padding: 18px 24px 28px;
  }

  @media (max-width: 600px) {
    .topbar-inner { padding: 14px 16px; }
    .brand span.label { display: none; }
    main { padding: 20px 14px 48px; }
    .controls { top: 65px; }
    .acro-card { padding: 14px; gap: 12px; }
    .acro-badge { min-width: 54px; font-size: 13px; padding: 8px; }
    .quiz-card, .quiz-intro { padding: 22px 18px; }
    .quiz-question-text { font-size: 18px; }
    nav.tabs button { padding: 8px 12px; font-size: 13px; }
  }
</style>
</head>
<body>
<div class="app">

  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <div class="mark">CA</div>
        <span class="label">Company Acronym List</span>
      </div>
      <nav class="tabs">
        <button id="tabBrowse" class="active" onclick="setView('browse')">Browse</button>
        <button id="tabQuiz" onclick="setView('quiz')">Quiz Mode</button>
      </nav>
    </div>
  </header>

  <main id="mainContent"></main>

  <footer class="app-footer">Company Acronym List — internal reference tool. 38 acronyms indexed.</footer>
</div>

<script>
/* ---------------------------------------------------------------
   Data
--------------------------------------------------------------- */
const CATEGORIES = {
  team:    { label: "Team",    color: "#3a5ddb", bg: "#ebf0ff" },
  project: { label: "Project", color: "#9333ea", bg: "#f3e8ff" },
  process: { label: "Process", color: "#0f9d8f", bg: "#e3f9f6" },
  tech:    { label: "Tech",    color: "#c2410c", bg: "#fef0e6" },
  hr:      { label: "People",  color: "#be185d", bg: "#fde6f0" }
};

const ACRONYMS = [
  { acro: "OKR",  expansion: "Objectives and Key Results", def: "Goal-setting framework used company-wide each quarter to align teams around measurable outcomes.", cats: ["process"] },
  { acro: "KPI",  expansion: "Key Performance Indicator", def: "A measurable value used to track progress toward business objectives.", cats: ["process"] },
  { acro: "PRD",  expansion: "Product Requirements Document", def: "The document product managers write to define what a feature should do before engineering starts.", cats: ["process", "project"] },
  { acro: "RFC",  expansion: "Request for Comments", def: "A written proposal circulated for engineering feedback before a technical decision is finalized.", cats: ["process", "tech"] },
  { acro: "SLA",  expansion: "Service Level Agreement", def: "A committed standard of service (e.g. uptime or response time) promised to customers or internal teams.", cats: ["process"] },
  { acro: "SLO",  expansion: "Service Level Objective", def: "An internal target for reliability or performance that supports the broader SLA.", cats: ["process", "tech"] },
  { acro: "SRE",  expansion: "Site Reliability Engineering", def: "The team responsible for system uptime, incident response, and infrastructure reliability.", cats: ["team", "tech"] },
  { acro: "PE",   expansion: "Platform Engineering", def: "The team that builds and maintains internal developer tooling and infrastructure.", cats: ["team", "tech"] },
  { acro: "GTM",  expansion: "Go-To-Market", def: "The cross-functional plan for launching and selling a product to customers.", cats: ["project", "process"] },
  { acro: "ELT",  expansion: "Executive Leadership Team", def: "The group of senior executives who set overall company strategy.", cats: ["team", "hr"] },
  { acro: "EOQ",  expansion: "End of Quarter", def: "Shorthand for the final weeks of a fiscal quarter, often tied to sales pushes and OKR reviews.", cats: ["process"] },
  { acro: "QBR",  expansion: "Quarterly Business Review", def: "A recurring meeting where teams present results, learnings, and plans for the upcoming quarter.", cats: ["process"] },
  { acro: "PIP",  expansion: "Performance Improvement Plan", def: "A formal, time-boxed plan HR and managers use to address performance concerns.", cats: ["hr"] },
  { acro: "PTO",  expansion: "Paid Time Off", def: "Time away from work that employees can take while still being paid.", cats: ["hr"] },
  { acro: "ATS",  expansion: "Applicant Tracking System", def: "The software recruiting uses to manage job postings and candidate pipelines.", cats: ["hr", "tech"] },
  { acro: "NPS",  expansion: "Net Promoter Score", def: "A customer loyalty metric based on how likely customers are to recommend the product.", cats: ["process"] },
  { acro: "CSAT", expansion: "Customer Satisfaction Score", def: "A survey-based metric measuring how satisfied customers are with a specific interaction.", cats: ["process"] },
  { acro: "CS",   expansion: "Customer Success", def: "The team responsible for onboarding, retaining, and growing existing customer accounts.", cats: ["team"] },
  { acro: "BD",   expansion: "Business Development", def: "The team focused on forming partnerships and new business opportunities.", cats: ["team"] },
  { acro: "PMM",  expansion: "Product Marketing Manager", def: "The role bridging product, marketing, and sales to craft positioning and launch messaging.", cats: ["team", "hr"] },
  { acro: "IC",   expansion: "Individual Contributor", def: "An employee role focused on hands-on work rather than people management.", cats: ["hr"] },
  { acro: "EM",   expansion: "Engineering Manager", def: "The role responsible for managing an engineering team's people and delivery.", cats: ["hr", "team"] },
  { acro: "TPM",  expansion: "Technical Program Manager", def: "The role that coordinates cross-team technical programs and removes delivery blockers.", cats: ["hr", "project"] },
  { acro: "MVP",  expansion: "Minimum Viable Product", def: "The smallest version of a product that can be released to validate an idea with real users.", cats: ["project", "process"] },
  { acro: "POC",  expansion: "Proof of Concept", def: "A small-scale exercise used to validate that an idea or technology is technically feasible.", cats: ["project", "tech"] },
  { acro: "UAT",  expansion: "User Acceptance Testing", def: "The final testing phase where real users validate a feature before it ships.", cats: ["process", "project"] },
  { acro: "CI",   expansion: "Continuous Integration", def: "The practice of automatically building and testing code changes as they're merged.", cats: ["tech", "process"] },
  { acro: "CD",   expansion: "Continuous Deployment", def: "The practice of automatically releasing code changes to production once they pass CI.", cats: ["tech", "process"] },
  { acro: "API",  expansion: "Application Programming Interface", def: "A defined contract that lets one piece of software talk to another.", cats: ["tech"] },
  { acro: "SDK",  expansion: "Software Development Kit", def: "A packaged set of tools and libraries that helps developers build on a platform.", cats: ["tech"] },
  { acro: "IAM",  expansion: "Identity and Access Management", def: "The system that controls who can access which internal tools and data.", cats: ["tech"] },
  { acro: "DRI",  expansion: "Directly Responsible Individual", def: "The single named person accountable for a project's outcome or an incident's resolution.", cats: ["process", "project"] },
  { acro: "RCA",  expansion: "Root Cause Analysis", def: "The structured write-up produced after an incident to explain what happened and why.", cats: ["process", "tech"] },
  { acro: "P0",   expansion: "Priority Zero", def: "The highest urgency label for a bug or incident — drop everything and fix it now.", cats: ["process", "tech"] },
  { acro: "WFH",  expansion: "Work From Home", def: "Shorthand used in calendars and Slack statuses to indicate remote work for the day.", cats: ["hr"] },
  { acro: "AMA",  expansion: "Ask Me Anything", def: "An open Q&A session, often hosted by leadership, where any question is fair game.", cats: ["process", "hr"] },
  { acro: "EOD",  expansion: "End of Day", def: "A common deadline shorthand meaning by the close of the current business day.", cats: ["process"] },
  { acro: "FYI",  expansion: "For Your Information", def: "Used to flag a message as informational only, with no action required.", cats: ["process"] }
];

/* ---------------------------------------------------------------
   State
--------------------------------------------------------------- */
let state = {
  view: "browse",
  query: "",
  activeCategory: null,
  starred: new Set(JSON.parse(localStorage.getItem("acro_starred") || "[]")),
};

let quizState = null; // built fresh each time quiz starts

const main = document.getElementById("mainContent");

/* ---------------------------------------------------------------
   Utilities
--------------------------------------------------------------- */
function escapeHtml(str) {
  return str.replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}

function highlight(text, query) {
  if (!query) return escapeHtml(text);
  const escaped = escapeHtml(text);
  const safeQuery = query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  const re = new RegExp("(" + safeQuery + ")", "ig");
  return escaped.replace(re, "<mark>$1</mark>");
}

function matchesQuery(item, q) {
  if (!q) return true;
  const hay = (item.acro + " " + item.expansion + " " + item.def).toLowerCase();
  return hay.includes(q.toLowerCase());
}

function getFiltered() {
  return ACRONYMS.filter(item => {
    const inCategory = !state.activeCategory || item.cats.includes(state.activeCategory);
    return inCategory && matchesQuery(item, state.query);
  });
}

function toggleStar(acro) {
  if (state.starred.has(acro)) state.starred.delete(acro);
  else state.starred.add(acro);
  localStorage.setItem("acro_starred", JSON.stringify([...state.starred]));
  renderBrowse();
}

function setView(view) {
  state.view = view;
  document.getElementById("tabBrowse").classList.toggle("active", view === "browse");
  document.getElementById("tabQuiz").classList.toggle("active", view === "quiz");
  if (view === "browse") renderBrowse();
  else renderQuizIntro();
}

/* ---------------------------------------------------------------
   Browse View
--------------------------------------------------------------- */
function renderBrowse() {
  const items = getFiltered();

  const chips = Object.entries(CATEGORIES).map(([key, c]) => `
    <button class="chip ${state.activeCategory === key ? 'active' : ''}" data-cat="${key}">
      <span class="dot" style="background:${c.color}"></span>${c.label}
    </button>
  `).join("");

  const starChip = `
    <button class="chip ${state.activeCategory === '__starred' ? 'active' : ''}" data-cat="__starred">
      ★ Starred
    </button>
  `;

  const listHtml = items.length ? items.map(item => {
    const isStarred = state.starred.has(item.acro);
    const tags = item.cats.map(c => {
      const cat = CATEGORIES[c];
      return `<span class="tag" style="background:${cat.bg};color:${cat.color}">${cat.label}</span>`;
    }).join("");
    return `
      <div class="acro-card">
        <div class="acro-badge">${highlight(item.acro, state.query)}</div>
        <div class="acro-body">
          <div class="acro-top-row">
            <div class="acro-expansion">${highlight(item.expansion, state.query)}</div>
          </div>
          <p class="acro-def">${highlight(item.def, state.query)}</p>
          <div class="tag-row">${tags}</div>
        </div>
        <button class="star-btn ${isStarred ? 'starred' : ''}" data-star="${item.acro}" title="${isStarred ? 'Remove star' : 'Star this acronym'}">${isStarred ? '★' : '☆'}</button>
      </div>
    `;
  }).join("") : `
    <div class="empty-state">
      <div class="icon">🔍</div>
      <strong>No acronyms found</strong>
      Try a different search term or clear your filters.
    </div>
  `;

  main.innerHTML = `
    <div class="library-head">
      <h1>Company Acronym List</h1>
      <p>Search, browse, and master the acronyms used across the company.</p>
    </div>
    <div class="controls">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="searchInput" type="text" placeholder="Search by acronym, meaning, or keyword…" value="${escapeHtml(state.query)}" autocomplete="off" />
        <button class="clear-btn ${state.query ? 'visible' : ''}" id="clearSearch">✕</button>
      </div>
      <div class="filter-row">
        ${chips}
        ${starChip}
      </div>
    </div>
    <div class="result-count">${items.length} acronym${items.length === 1 ? '' : 's'}${state.activeCategory === '__starred' ? ' starred' : state.activeCategory ? ' in ' + CATEGORIES[state.activeCategory].label : ''}${state.query ? ' matching “' + escapeHtml(state.query) + '”' : ''}</div>
    <div class="acro-list">${listHtml}</div>
  `;

  // Wire up events
  const input = document.getElementById("searchInput");
  input.addEventListener("input", e => {
    state.query = e.target.value;
    renderBrowse();
    // restore focus + caret since we re-render
    const el = document.getElementById("searchInput");
    el.focus();
    el.setSelectionRange(el.value.length, el.value.length);
  });

  document.getElementById("clearSearch").addEventListener("click", () => {
    state.query = "";
    renderBrowse();
    document.getElementById("searchInput").focus();
  });

  main.querySelectorAll("[data-cat]").forEach(btn => {
    btn.addEventListener("click", () => {
      const cat = btn.getAttribute("data-cat");
      state.activeCategory = state.activeCategory === cat ? null : cat;
      renderBrowse();
    });
  });

  main.querySelectorAll("[data-star]").forEach(btn => {
    btn.addEventListener("click", () => toggleStar(btn.getAttribute("data-star")));
  });
}

// override category filter to support starred pseudo-category
function getFiltered() {
  return ACRONYMS.filter(item => {
    let inCategory = true;
    if (state.activeCategory === "__starred") inCategory = state.starred.has(item.acro);
    else if (state.activeCategory) inCategory = item.cats.includes(state.activeCategory);
    return inCategory && matchesQuery(item, state.query);
  });
}

/* ---------------------------------------------------------------
   Quiz Mode
--------------------------------------------------------------- */
const QUIZ_LENGTHS = [5, 10, 15];

function renderQuizIntro() {
  main.innerHTML = `
    <div class="quiz-shell">
      <div class="quiz-intro">
        <h2>🧠 Quiz Mode</h2>
        <p>Test how well you know the company's acronyms. Pick a length below — each question shows an acronym and four possible meanings.</p>
        <div class="quiz-options" id="quizLenOptions">
          ${QUIZ_LENGTHS.map(n => `
            <label class="quiz-option-label" data-len="${n}">
              <input type="radio" name="quizLen" value="${n}" ${n === 10 ? 'checked' : ''}/>
              ${n} questions
            </label>
          `).join("")}
        </div>
        <button class="btn btn-primary" id="startQuizBtn">Start Quiz</button>
      </div>
    </div>
  `;

  let selectedLen = 10;
  main.querySelectorAll(".quiz-option-label").forEach(label => {
    const len = parseInt(label.getAttribute("data-len"), 10);
    if (len === selectedLen) label.classList.add("checked");
    label.addEventListener("click", () => {
      selectedLen = len;
      main.querySelectorAll(".quiz-option-label").forEach(l => l.classList.remove("checked"));
      label.classList.add("checked");
      label.querySelector("input").checked = true;
    });
  });

  document.getElementById("startQuizBtn").addEventListener("click", () => startQuiz(selectedLen));
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildQuestions(n) {
  const pool = shuffle(ACRONYMS).slice(0, Math.min(n, ACRONYMS.length));
  return pool.map(item => {
    const distractors = shuffle(ACRONYMS.filter(o => o.acro !== item.acro))
      .slice(0, 3)
      .map(o => o.expansion);
    const options = shuffle([item.expansion, ...distractors]);
    return {
      acro: item.acro,
      def: item.def,
      correct: item.expansion,
      options
    };
  });
}

function startQuiz(len) {
  quizState = {
    questions: buildQuestions(len),
    index: 0,
    score: 0,
    answered: null, // selected option text for current question
    history: [] // {acro, correct, chosen, wasCorrect}
  };
  renderQuizQuestion();
}

function renderQuizQuestion() {
  const q = quizState.questions[quizState.index];
  const total = quizState.questions.length;
  const pct = Math.round((quizState.index / total) * 100);

  main.innerHTML = `
    <div class="quiz-shell">
      <div class="quiz-progress-wrap">
        <div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:${pct}%"></div></div>
        <div class="quiz-progress-label">${quizState.index + 1} / ${total}</div>
      </div>
      <div class="quiz-card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;">
          <div class="quiz-question-label">What does this stand for?</div>
          <div class="quiz-score-pill">⭐ ${quizState.score} correct</div>
        </div>
        <div class="quiz-question-text">${escapeHtml(q.acro)}</div>
        <div id="quizOptions">
          ${q.options.map((opt, i) => `<button class="quiz-option-btn" data-opt="${i}">${escapeHtml(opt)}</button>`).join("")}
        </div>
        <div id="quizFeedback"></div>
      </div>
    </div>
  `;

  main.querySelectorAll(".quiz-option-btn").forEach(btn => {
    btn.addEventListener("click", () => handleAnswer(parseInt(btn.getAttribute("data-opt"), 10)));
  });
}

function handleAnswer(optIndex) {
  if (quizState.answered !== null) return;
  const q = quizState.questions[quizState.index];
  const chosen = q.options[optIndex];
  const wasCorrect = chosen === q.correct;
  quizState.answered = chosen;
  if (wasCorrect) quizState.score++;
  quizState.history.push({ acro: q.acro, correct: q.correct, def: q.def, chosen, wasCorrect });

  const buttons = main.querySelectorAll(".quiz-option-btn");
  buttons.forEach((btn, i) => {
    btn.disabled = true;
    const opt = q.options[i];
    if (opt === q.correct) btn.classList.add("correct");
    else if (opt === chosen) btn.classList.add("incorrect");
  });

  const isLast = quizState.index === quizState.questions.length - 1;
  const feedback = document.getElementById("quizFeedback");
  feedback.innerHTML = `
    <div class="quiz-feedback">
      <div class="quiz-feedback-text ${wasCorrect ? 'correct' : 'incorrect'}">
        ${wasCorrect ? '✓ Correct!' : '✕ Not quite — correct answer highlighted above.'}
      </div>
      <button class="btn btn-primary" id="nextBtn">${isLast ? 'See Results' : 'Next Question →'}</button>
    </div>
  `;
  document.getElementById("nextBtn").addEventListener("click", () => {
    if (isLast) {
      renderQuizResults();
    } else {
      quizState.index++;
      quizState.answered = null;
      renderQuizQuestion();
    }
  });
}

function renderQuizResults() {
  const total = quizState.questions.length;
  const score = quizState.score;
  const pct = Math.round((score / total) * 100);

  let msg;
  if (pct === 100) msg = "Perfect score! You know your acronyms cold.";
  else if (pct >= 80) msg = "Great work — you clearly know your way around the company glossary.";
  else if (pct >= 50) msg = "Decent! A bit more review and you'll have these locked in.";
  else msg = "Worth another pass — browse the list and try again.";

  const reviewItems = quizState.history.map(h => `
    <div class="review-item ${h.wasCorrect ? 'ok' : 'bad'}">
      <span class="icon">${h.wasCorrect ? '✓' : '✕'}</span>
      <div>
        <div><strong>${escapeHtml(h.acro)}</strong> — ${escapeHtml(h.correct)}</div>
        ${!h.wasCorrect ? `<div class="meta">You answered: ${escapeHtml(h.chosen)}</div>` : ''}
      </div>
    </div>
  `).join("");

  main.innerHTML = `
    <div class="quiz-shell">
      <div class="quiz-card quiz-result">
        <div class="quiz-question-label" style="text-align:center;">Quiz Complete</div>
        <div class="big-score">${score} / ${total}</div>
        <div class="quiz-result-msg">${msg}</div>
        <div class="review-list">${reviewItems}</div>
        <div class="result-actions">
          <button class="btn btn-ghost" id="retryBtn">Try Again</button>
          <button class="btn btn-primary" id="browseBtn">Browse Acronyms</button>
        </div>
      </div>
    </div>
  `;

  document.getElementById("retryBtn").addEventListener("click", renderQuizIntro);
  document.getElementById("browseBtn").addEventListener("click", () => setView("browse"));
}

/* ---------------------------------------------------------------
   Init
--------------------------------------------------------------- */
renderBrowse();
</script>
</body>
</html>
