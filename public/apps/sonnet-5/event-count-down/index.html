<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown — Make every moment count</title>
<style>
  :root{
    --accent: #7dd3fc;
    --accent2: #f472b6;
    --bg-overlay: rgba(10, 12, 20, 0.55);
    --glass: rgba(255,255,255,0.08);
    --glass-border: rgba(255,255,255,0.18);
    --text: #f5f7fa;
    --text-dim: rgba(245,247,250,0.7);
  }

  *{ box-sizing: border-box; }

  html,body{
    margin:0;
    padding:0;
    width:100%;
    min-height:100%;
    height:100%;
    font-family: 'Outfit', 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: var(--text);
    overflow-x:hidden;
    background: #0a0c14;
  }

  @font-face{
    font-family:'Outfit';
    src: local('Outfit');
  }

  /* ---------- Background layers ---------- */
  #bg-layer{
    position: fixed;
    inset: -40px;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    z-index: -3;
    transition: background-image 0.6s ease, filter 0.4s ease;
    filter: saturate(1.05) brightness(0.78);
    will-change: transform;
    background-image:
      radial-gradient(circle at 20% 20%, #1e2a4a 0%, transparent 60%),
      radial-gradient(circle at 80% 30%, #3a1f4d 0%, transparent 55%),
      radial-gradient(circle at 50% 90%, #122036 0%, transparent 60%),
      linear-gradient(135deg, #0f1424, #1a1030 60%, #0a0c14);
  }

  #bg-overlay{
    position: fixed;
    inset:0;
    z-index:-2;
    background: var(--bg-overlay);
    pointer-events:none;
  }

  #stars{
    position: fixed;
    inset:0;
    z-index:-1;
    pointer-events:none;
    opacity: 0.6;
  }
  #stars span{
    position:absolute;
    width:2px;height:2px;
    background:#fff;
    border-radius:50%;
    opacity:0.6;
    animation: twinkle 4s ease-in-out infinite;
  }
  @keyframes twinkle{
    0%,100%{ opacity:0.15; }
    50%{ opacity:0.9; }
  }

  /* ---------- Layout ---------- */
  .app{
    position:relative;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding: 32px 20px 60px;
  }

  .topbar{
    width:100%;
    max-width: 1100px;
    display:flex;
    justify-content:flex-end;
    gap:10px;
  }

  .icon-btn{
    background: var(--glass);
    border:1px solid var(--glass-border);
    backdrop-filter: blur(12px);
    color: var(--text);
    width:44px;height:44px;
    border-radius:14px;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    transition: transform .2s ease, background .2s ease;
    font-size:18px;
  }
  .icon-btn:hover{ transform: translateY(-2px); background: rgba(255,255,255,0.16); }

  .hero{
    margin-top: 4vh;
    text-align:center;
    max-width: 900px;
    width:100%;
  }

  .eyebrow{
    text-transform: uppercase;
    letter-spacing: 0.35em;
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 14px;
    opacity:0;
    animation: fadeUp .8s ease forwards .1s;
  }

  #event-title-display{
    font-size: clamp(2.2rem, 6vw, 4.2rem);
    font-weight: 700;
    margin: 0 0 10px;
    background: linear-gradient(90deg, #fff, var(--accent) 50%, var(--accent2));
    background-size: 200% auto;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: fadeUp .8s ease forwards .2s, sheen 6s linear infinite;
    opacity:0;
    line-height:1.1;
  }

  @keyframes sheen{
    0%{ background-position: 0% center; }
    100%{ background-position: 200% center; }
  }

  .meta-row{
    display:flex;
    flex-wrap:wrap;
    gap: 18px;
    justify-content:center;
    color: var(--text-dim);
    font-size: 15px;
    margin-bottom: 36px;
    opacity:0;
    animation: fadeUp .8s ease forwards .3s;
  }
  .meta-row span{
    display:flex;
    align-items:center;
    gap:6px;
  }

  @keyframes fadeUp{
    from{ opacity:0; transform: translateY(14px); }
    to{ opacity:1; transform: translateY(0); }
  }

  /* ---------- Countdown ---------- */
  .countdown{
    display:flex;
    gap: clamp(10px, 2.5vw, 28px);
    justify-content:center;
    flex-wrap: wrap;
    margin-bottom: 30px;
    opacity:0;
    animation: fadeUp .9s ease forwards .4s;
  }

  .unit{
    background: var(--glass);
    border:1px solid var(--glass-border);
    backdrop-filter: blur(16px);
    border-radius: 20px;
    padding: clamp(14px,2.4vw,28px) clamp(10px,2.6vw,30px);
    min-width: clamp(78px, 18vw, 140px);
    text-align:center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.12);
    position:relative;
    overflow:hidden;
  }
  .unit::before{
    content:"";
    position:absolute;
    inset:0;
    background: linear-gradient(160deg, rgba(125,211,252,0.18), transparent 60%);
    pointer-events:none;
  }

  .digit-wrap{
    position:relative;
    height: clamp(2.4rem, 8vw, 4.6rem);
    overflow:hidden;
  }

  .unit .value{
    font-size: clamp(2.4rem, 8vw, 4.6rem);
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    display:block;
    line-height:1;
    letter-spacing: -1px;
    text-shadow: 0 0 30px rgba(125,211,252,0.35);
  }

  .value.flip{
    animation: flipIn .5s cubic-bezier(.2,.8,.3,1);
  }
  @keyframes flipIn{
    0%{ transform: translateY(-100%) scale(0.9); opacity:0; filter: blur(4px); }
    60%{ transform: translateY(8%) scale(1.02); opacity:1; filter: blur(0); }
    100%{ transform: translateY(0) scale(1); }
  }

  .unit .label{
    margin-top: 8px;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    font-size: clamp(10px, 1.6vw, 12px);
    color: var(--text-dim);
  }

  .colon{
    display:flex;
    align-items:center;
    font-size: clamp(1.6rem, 5vw, 3rem);
    color: var(--text-dim);
    opacity:0.5;
    padding-bottom: 22px;
  }

  .finished-banner{
    display:none;
    font-size: clamp(1.6rem, 5vw, 2.6rem);
    font-weight:700;
    text-align:center;
    margin-bottom: 30px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }

  /* ---------- Actions ---------- */
  .actions{
    display:flex;
    gap: 14px;
    flex-wrap:wrap;
    justify-content:center;
    opacity:0;
    animation: fadeUp .9s ease forwards .5s;
  }

  .btn{
    border:none;
    cursor:pointer;
    padding: 14px 26px;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 600;
    display:flex;
    align-items:center;
    gap:8px;
    transition: transform .2s ease, box-shadow .2s ease, background .2s ease;
    font-family:inherit;
  }
  .btn:active{ transform: scale(0.96); }

  .btn-primary{
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #0a0c14;
    box-shadow: 0 8px 30px rgba(125,211,252,0.35);
  }
  .btn-primary:hover{ transform: translateY(-2px); box-shadow: 0 12px 36px rgba(244,114,182,0.4); }

  .btn-secondary{
    background: var(--glass);
    border:1px solid var(--glass-border);
    color: var(--text);
    backdrop-filter: blur(10px);
  }
  .btn-secondary:hover{ background: rgba(255,255,255,0.16); transform: translateY(-2px); }

  /* ---------- Settings panel ---------- */
  .panel-overlay{
    position: fixed;
    inset:0;
    background: rgba(5,6,10,0.6);
    backdrop-filter: blur(4px);
    z-index: 50;
    display:none;
    align-items:center;
    justify-content:center;
    padding: 20px;
  }
  .panel-overlay.open{ display:flex; }

  .panel{
    width: 100%;
    max-width: 440px;
    max-height: 88vh;
    overflow-y:auto;
    background: rgba(18,20,30,0.92);
    border: 1px solid var(--glass-border);
    border-radius: 22px;
    padding: 28px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5);
    animation: panelIn .3s ease;
  }
  @keyframes panelIn{
    from{ opacity:0; transform: scale(0.95) translateY(10px); }
    to{ opacity:1; transform: scale(1) translateY(0); }
  }

  .panel h2{
    margin:0 0 20px;
    font-size: 20px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .panel h2 button{
    background:none;
    border:none;
    color: var(--text-dim);
    font-size: 22px;
    cursor:pointer;
    line-height:1;
  }

  .field{
    margin-bottom: 18px;
  }
  .field label{
    display:block;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  .field input[type="text"],
  .field input[type="datetime-local"]{
    width:100%;
    padding: 12px 14px;
    border-radius: 12px;
    border: 1px solid var(--glass-border);
    background: rgba(255,255,255,0.06);
    color: var(--text);
    font-size: 15px;
    font-family: inherit;
  }
  .field input:focus{
    outline:none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(125,211,252,0.2);
  }

  .file-drop{
    border: 1.5px dashed var(--glass-border);
    border-radius: 14px;
    padding: 18px;
    text-align:center;
    cursor:pointer;
    color: var(--text-dim);
    font-size: 14px;
    transition: border-color .2s ease, background .2s ease;
    position:relative;
  }
  .file-drop:hover{ border-color: var(--accent); background: rgba(125,211,252,0.06); }
  .file-drop input{
    position:absolute;
    inset:0;
    opacity:0;
    cursor:pointer;
  }

  .thumb-preview{
    margin-top:10px;
    width:100%;
    height:90px;
    border-radius:10px;
    background-size:cover;
    background-position:center;
    display:none;
    border: 1px solid var(--glass-border);
  }

  .panel-actions{
    display:flex;
    gap:10px;
    margin-top: 6px;
  }
  .panel-actions .btn{ flex:1; justify-content:center; }

  .preset-row{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-top:8px;
  }
  .preset-chip{
    background: rgba(255,255,255,0.07);
    border:1px solid var(--glass-border);
    color: var(--text-dim);
    font-size:12px;
    padding: 6px 12px;
    border-radius: 999px;
    cursor:pointer;
    transition: background .2s;
  }
  .preset-chip:hover{ background: rgba(255,255,255,0.16); color:var(--text); }

  footer{
    margin-top: auto;
    padding-top: 40px;
    color: var(--text-dim);
    font-size: 12px;
    opacity:0.6;
    text-align:center;
  }

  @media (max-width: 480px){
    .unit{ min-width: 70px; padding: 14px 10px; }
  }
</style>
</head>
<body>

<div id="bg-layer"></div>
<div id="bg-overlay"></div>
<div id="stars"></div>

<div class="app">

  <div class="topbar">
    <button class="icon-btn" id="open-settings" title="Edit event" aria-label="Edit event">&#9998;</button>
    <button class="icon-btn" id="fullscreen-btn" title="Fullscreen" aria-label="Fullscreen">&#10021;</button>
  </div>

  <div class="hero">
    <div class="eyebrow">Counting down to</div>
    <h1 id="event-title-display">Your Big Event</h1>
    <div class="meta-row">
      <span id="event-date-display">📅 Set a date to begin</span>
      <span id="event-location-display" style="display:none;">📍 </span>
    </div>
  </div>

  <div class="countdown" id="countdown">
    <div class="unit">
      <div class="digit-wrap"><span class="value" id="d-days">00</span></div>
      <div class="label">Days</div>
    </div>
    <div class="colon">:</div>
    <div class="unit">
      <div class="digit-wrap"><span class="value" id="d-hours">00</span></div>
      <div class="label">Hours</div>
    </div>
    <div class="colon">:</div>
    <div class="unit">
      <div class="digit-wrap"><span class="value" id="d-mins">00</span></div>
      <div class="label">Minutes</div>
    </div>
    <div class="colon">:</div>
    <div class="unit">
      <div class="digit-wrap"><span class="value" id="d-secs">00</span></div>
      <div class="label">Seconds</div>
    </div>
  </div>

  <div class="finished-banner" id="finished-banner">🎉 It's happening — enjoy the moment!</div>

  <div class="actions">
    <button class="btn btn-primary" id="calendar-btn">
      <span>📆</span> Save to Calendar
    </button>
    <button class="btn btn-secondary" id="share-btn">
      <span>🔗</span> Copy Link
    </button>
  </div>

  <footer>Crafted countdown · runs entirely in your browser</footer>
</div>

<!-- Settings Panel -->
<div class="panel-overlay" id="panel-overlay">
  <div class="panel">
    <h2>Event details <button id="close-settings" aria-label="Close">&times;</button></h2>

    <div class="field">
      <label for="input-name">Event name</label>
      <input type="text" id="input-name" placeholder="e.g. Sarah & Tom's Wedding" maxlength="80">
    </div>

    <div class="field">
      <label for="input-date">Date & time</label>
      <input type="datetime-local" id="input-date">
      <div class="preset-row">
        <span class="preset-chip" data-preset="1">+1 day</span>
        <span class="preset-chip" data-preset="7">+1 week</span>
        <span class="preset-chip" data-preset="30">+1 month</span>
        <span class="preset-chip" data-preset="365">+1 year</span>
      </div>
    </div>

    <div class="field">
      <label for="input-location">Location (optional)</label>
      <input type="text" id="input-location" placeholder="e.g. Central Park, NYC" maxlength="100">
    </div>

    <div class="field">
      <label>Background image (optional)</label>
      <div class="file-drop">
        <span id="file-drop-label">Click or drop an image here</span>
        <input type="file" id="input-image" accept="image/*">
      </div>
      <div class="thumb-preview" id="thumb-preview"></div>
    </div>

    <div class="panel-actions">
      <button class="btn btn-secondary" id="reset-bg-btn">Remove image</button>
      <button class="btn btn-primary" id="save-settings-btn">Save</button>
    </div>
  </div>
</div>

<script>
(function(){
  "use strict";

  var STORAGE_KEY = "countdown-app-state-v1";

  var state = {
    name: "Your Big Event",
    dateISO: null,
    location: "",
    bgImage: null
  };

  // ---------- Default date: 30 days from now ----------
  function defaultDate(){
    var d = new Date();
    d.setDate(d.getDate() + 30);
    d.setHours(18,0,0,0);
    return d.toISOString();
  }

  // ---------- Persistence ----------
  function loadState(){
    try{
      var raw = localStorage.getItem(STORAGE_KEY);
      if(raw){
        var parsed = JSON.parse(raw);
        state = Object.assign(state, parsed);
      } else {
        state.dateISO = defaultDate();
      }
    }catch(e){
      state.dateISO = defaultDate();
    }
    if(!state.dateISO){ state.dateISO = defaultDate(); }
  }

  function saveState(){
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }catch(e){ /* storage full or unavailable — ignore, app still works in-memory */ }
  }

  // ---------- DOM refs ----------
  var els = {
    titleDisplay: document.getElementById("event-title-display"),
    dateDisplay: document.getElementById("event-date-display"),
    locationDisplay: document.getElementById("event-location-display"),
    bgLayer: document.getElementById("bg-layer"),
    finishedBanner: document.getElementById("finished-banner"),
    countdown: document.getElementById("countdown"),

    days: document.getElementById("d-days"),
    hours: document.getElementById("d-hours"),
    mins: document.getElementById("d-mins"),
    secs: document.getElementById("d-secs"),

    openSettings: document.getElementById("open-settings"),
    closeSettings: document.getElementById("close-settings"),
    panelOverlay: document.getElementById("panel-overlay"),
    saveBtn: document.getElementById("save-settings-btn"),
    resetBgBtn: document.getElementById("reset-bg-btn"),

    inputName: document.getElementById("input-name"),
    inputDate: document.getElementById("input-date"),
    inputLocation: document.getElementById("input-location"),
    inputImage: document.getElementById("input-image"),
    fileDropLabel: document.getElementById("file-drop-label"),
    thumbPreview: document.getElementById("thumb-preview"),

    calendarBtn: document.getElementById("calendar-btn"),
    shareBtn: document.getElementById("share-btn"),
    fullscreenBtn: document.getElementById("fullscreen-btn")
  };

  // ---------- Stars background ----------
  function buildStars(){
    var container = document.getElementById("stars");
    var frag = document.createDocumentFragment();
    var count = window.innerWidth < 600 ? 50 : 100;
    for(var i=0;i<count;i++){
      var s = document.createElement("span");
      s.style.left = (Math.random()*100) + "%";
      s.style.top = (Math.random()*100) + "%";
      s.style.animationDelay = (Math.random()*4) + "s";
      s.style.width = s.style.height = (Math.random()*2 + 1) + "px";
      frag.appendChild(s);
    }
    container.appendChild(frag);
  }

  // ---------- Format helpers ----------
  function pad(n){ return String(n).padStart(2,"0"); }

  function fmtDateDisplay(iso){
    var d = new Date(iso);
    if(isNaN(d.getTime())) return "📅 Set a date to begin";
    var opts = { weekday:'long', year:'numeric', month:'long', day:'numeric', hour:'numeric', minute:'2-digit' };
    return "📅 " + d.toLocaleString(undefined, opts);
  }

  function toLocalInputValue(iso){
    var d = new Date(iso);
    if(isNaN(d.getTime())) return "";
    var tzOffset = d.getTimezoneOffset() * 60000;
    var local = new Date(d.getTime() - tzOffset);
    return local.toISOString().slice(0,16);
  }

  // ---------- Render static info ----------
  function renderInfo(){
    els.titleDisplay.textContent = state.name || "Your Big Event";
    els.dateDisplay.textContent = fmtDateDisplay(state.dateISO);

    if(state.location && state.location.trim()){
      els.locationDisplay.style.display = "flex";
      els.locationDisplay.textContent = "📍 " + state.location;
    } else {
      els.locationDisplay.style.display = "none";
    }

    if(state.bgImage){
      els.bgLayer.style.backgroundImage = "url('" + state.bgImage + "')";
    } else {
      els.bgLayer.style.backgroundImage = "";
    }

    document.title = (state.name || "Countdown") + " — Countdown";
  }

  // ---------- Countdown tick ----------
  var lastValues = { d: null, h: null, m: null, s: null };

  function setValue(el, val, key){
    var str = pad(val);
    if(lastValues[key] !== val){
      el.textContent = str;
      el.classList.remove("flip");
      // force reflow to restart animation
      void el.offsetWidth;
      el.classList.add("flip");
      lastValues[key] = val;
    }
  }

  function tick(){
    var target = new Date(state.dateISO).getTime();
    var now = Date.now();
    var diff = target - now;

    if(isNaN(target)){
      return;
    }

    if(diff <= 0){
      els.countdown.style.display = "none";
      els.finishedBanner.style.display = "block";
      setValue(els.days, 0, 'd');
      setValue(els.hours, 0, 'h');
      setValue(els.mins, 0, 'm');
      setValue(els.secs, 0, 's');
      return;
    } else {
      els.countdown.style.display = "flex";
      els.finishedBanner.style.display = "none";
    }

    var totalSeconds = Math.floor(diff/1000);
    var days = Math.floor(totalSeconds / 86400);
    var hours = Math.floor((totalSeconds % 86400)/3600);
    var mins = Math.floor((totalSeconds % 3600)/60);
    var secs = totalSeconds % 60;

    setValue(els.days, days, 'd');
    setValue(els.hours, hours, 'h');
    setValue(els.mins, mins, 'm');
    setValue(els.secs, secs, 's');
  }

  var tickInterval = null;
  function startTicking(){
    if(tickInterval) clearInterval(tickInterval);
    tick();
    tickInterval = setInterval(tick, 1000);
  }

  // ---------- Parallax ----------
  var parallaxX = 0, parallaxY = 0, targetX = 0, targetY = 0;

  function onPointerMove(e){
    var x, y;
    if(e.touches && e.touches[0]){
      x = e.touches[0].clientX; y = e.touches[0].clientY;
    } else {
      x = e.clientX; y = e.clientY;
    }
    var w = window.innerWidth, h = window.innerHeight;
    targetX = ((x / w) - 0.5) * 2; // -1..1
    targetY = ((y / h) - 0.5) * 2;
  }

  function onDeviceOrient(e){
    if(e.gamma == null || e.beta == null) return;
    targetX = Math.max(-1, Math.min(1, e.gamma / 30));
    targetY = Math.max(-1, Math.min(1, (e.beta - 45) / 30));
  }

  function animateParallax(){
    parallaxX += (targetX - parallaxX) * 0.04;
    parallaxY += (targetY - parallaxY) * 0.04;
    var moveX = parallaxX * 18;
    var moveY = parallaxY * 18;
    els.bgLayer.style.transform = "translate3d(" + (-moveX) + "px," + (-moveY) + "px,0) scale(1.08)";
    requestAnimationFrame(animateParallax);
  }

  // ---------- Settings panel ----------
  function openPanel(){
    els.inputName.value = state.name === "Your Big Event" ? "" : state.name;
    els.inputDate.value = toLocalInputValue(state.dateISO);
    els.inputLocation.value = state.location || "";
    if(state.bgImage){
      els.thumbPreview.style.backgroundImage = "url('" + state.bgImage + "')";
      els.thumbPreview.style.display = "block";
    } else {
      els.thumbPreview.style.display = "none";
    }
    els.panelOverlay.classList.add("open");
  }

  function closePanel(){
    els.panelOverlay.classList.remove("open");
  }

  function applySettings(){
    var name = els.inputName.value.trim();
    state.name = name || "Your Big Event";

    var dateVal = els.inputDate.value;
    if(dateVal){
      var d = new Date(dateVal);
      if(!isNaN(d.getTime())){
        state.dateISO = d.toISOString();
      }
    }

    state.location = els.inputLocation.value.trim();

    saveState();
    renderInfo();
    lastValues = { d: null, h: null, m: null, s: null };
    startTicking();
    closePanel();
  }

  function handleImageFile(file){
    if(!file || !file.type.startsWith("image/")) return;
    var reader = new FileReader();
    reader.onload = function(e){
      state.bgImage = e.target.result;
      els.thumbPreview.style.backgroundImage = "url('" + state.bgImage + "')";
      els.thumbPreview.style.display = "block";
      try{ saveState(); }catch(err){ /* image too large for localStorage — keep in-memory only */ }
      renderInfo();
    };
    reader.readAsDataURL(file);
  }

  // ---------- ICS calendar generation ----------
  function pad2(n){ return String(n).padStart(2,"0"); }

  function toICSDate(d){
    return d.getUTCFullYear() +
      pad2(d.getUTCMonth()+1) +
      pad2(d.getUTCDate()) + "T" +
      pad2(d.getUTCHours()) +
      pad2(d.getUTCMinutes()) +
      pad2(d.getUTCSeconds()) + "Z";
  }

  function escapeICS(str){
    return String(str || "").replace(/\\/g,"\\\\").replace(/;/g,"\\;").replace(/,/g,"\\,").replace(/\n/g,"\\n");
  }

  function downloadICS(){
    var start = new Date(state.dateISO);
    if(isNaN(start.getTime())) return;
    var end = new Date(start.getTime() + 60*60*1000); // default 1hr

    var uid = "countdown-" + Date.now() + "@local";
    var nowStamp = toICSDate(new Date());

    var lines = [
      "BEGIN:VCALENDAR",
      "VERSION:2.0",
      "PRODID:-//Countdown App//EN",
      "CALSCALE:GREGORIAN",
      "BEGIN:VEVENT",
      "UID:" + uid,
      "DTSTAMP:" + nowStamp,
      "DTSTART:" + toICSDate(start),
      "DTEND:" + toICSDate(end),
      "SUMMARY:" + escapeICS(state.name),
      state.location ? "LOCATION:" + escapeICS(state.location) : null,
      "DESCRIPTION:" + escapeICS("Countdown to " + state.name),
      "END:VEVENT",
      "END:VCALENDAR"
    ].filter(Boolean);

    var icsContent = lines.join("\r\n");
    var blob = new Blob([icsContent], { type: "text/calendar;charset=utf-8" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    var safeName = (state.name || "event").replace(/[^a-z0-9]+/gi,"-").toLowerCase();
    a.download = safeName + ".ics";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
  }

  // ---------- Share / copy state ----------
  function copyShareLink(){
    try{
      var params = new URLSearchParams();
      params.set("name", state.name);
      params.set("date", state.dateISO);
      if(state.location) params.set("loc", state.location);
      var url = location.origin + location.pathname + "#" + params.toString();

      if(navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(url).then(function(){
          flashButton(els.shareBtn, "Copied!");
        }).catch(function(){
          flashButton(els.shareBtn, "Copy failed");
        });
      } else {
        flashButton(els.shareBtn, "Not supported");
      }
    }catch(e){
      flashButton(els.shareBtn, "Copy failed");
    }
  }

  function flashButton(btn, text){
    var original = btn.innerHTML;
    btn.innerHTML = "<span>✓</span> " + text;
    setTimeout(function(){ btn.innerHTML = original; }, 1800);
  }

  // ---------- Read share link on load ----------
  function loadFromHash(){
    if(!location.hash || location.hash.length < 2) return false;
    try{
      var params = new URLSearchParams(location.hash.slice(1));
      var name = params.get("name");
      var date = params.get("date");
      var loc = params.get("loc");
      if(name && date){
        var d = new Date(date);
        if(!isNaN(d.getTime())){
          state.name = name;
          state.dateISO = d.toISOString();
          state.location = loc || "";
          saveState();
          return true;
        }
      }
    }catch(e){ /* malformed hash — ignore */ }
    return false;
  }

  // ---------- Fullscreen ----------
  function toggleFullscreen(){
    if(!document.fullscreenElement){
      document.documentElement.requestFullscreen && document.documentElement.requestFullscreen().catch(function(){});
    } else {
      document.exitFullscreen && document.exitFullscreen();
    }
  }

  // ---------- Preset buttons ----------
  function wirePresets(){
    var chips = document.querySelectorAll(".preset-chip");
    chips.forEach(function(chip){
      chip.addEventListener("click", function(){
        var days = parseInt(chip.getAttribute("data-preset"), 10);
        var d = new Date();
        d.setDate(d.getDate() + days);
        d.setHours(18,0,0,0);
        els.inputDate.value = toLocalInputValue(d.toISOString());
      });
    });
  }

  // ---------- Event wiring ----------
  function wireEvents(){
    els.openSettings.addEventListener("click", openPanel);
    els.closeSettings.addEventListener("click", closePanel);
    els.panelOverlay.addEventListener("click", function(e){
      if(e.target === els.panelOverlay) closePanel();
    });
    document.addEventListener("keydown", function(e){
      if(e.key === "Escape") closePanel();
    });

    els.saveBtn.addEventListener("click", applySettings);

    els.inputImage.addEventListener("change", function(e){
      var file = e.target.files && e.target.files[0];
      if(file){
        handleImageFile(file);
        els.fileDropLabel.textContent = file.name;
      }
    });

    var dropZone = document.querySelector(".file-drop");
    dropZone.addEventListener("dragover", function(e){ e.preventDefault(); dropZone.style.borderColor = "var(--accent)"; });
    dropZone.addEventListener("dragleave", function(){ dropZone.style.borderColor = ""; });
    dropZone.addEventListener("drop", function(e){
      e.preventDefault();
      dropZone.style.borderColor = "";
      var file = e.dataTransfer.files && e.dataTransfer.files[0];
      if(file){
        handleImageFile(file);
        els.fileDropLabel.textContent = file.name;
      }
    });

    els.resetBgBtn.addEventListener("click", function(){
      state.bgImage = null;
      els.thumbPreview.style.display = "none";
      els.inputImage.value = "";
      els.fileDropLabel.textContent = "Click or drop an image here";
      saveState();
      renderInfo();
    });

    els.calendarBtn.addEventListener("click", downloadICS);
    els.shareBtn.addEventListener("click", copyShareLink);
    els.fullscreenBtn.addEventListener("click", toggleFullscreen);

    window.addEventListener("mousemove", onPointerMove, { passive:true });
    window.addEventListener("touchmove", onPointerMove, { passive:true });
    window.addEventListener("deviceorientation", onDeviceOrient);

    wirePresets();
  }

  // ---------- Init ----------
  function init(){
    loadState();
    var fromShare = loadFromHash();
    renderInfo();
    startTicking();
    buildStars();
    wireEvents();
    requestAnimationFrame(animateParallax);

    if(fromShare){
      history.replaceState(null, "", location.pathname);
    }

    // If user has no saved state at all (first ever visit), invite them to edit
    if(!localStorage.getItem(STORAGE_KEY) && !fromShare){
      setTimeout(openPanel, 900);
    }
  }

  if(document.readyState === "loading"){
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
