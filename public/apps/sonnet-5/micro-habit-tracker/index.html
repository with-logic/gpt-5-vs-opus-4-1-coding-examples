<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover">
<title>Micro Habit Tracker</title>
<meta name="color-scheme" content="dark light">
<style>
  :root{
    --bg:#0f1115;
    --bg-soft:#15181f;
    --card:#1b1f29;
    --card-hover:#222733;
    --border:#2a3040;
    --text:#eef1f7;
    --muted:#8a90a3;
    --muted-2:#5d6376;
    --accent:#7c5cff;
    --accent-2:#22d3ee;
    --good:#34d399;
    --warn:#fbbf24;
    --bad:#f87171;
    --skip:#5d6376;
    --radius:16px;
    --radius-sm:10px;
    --shadow: 0 8px 24px rgba(0,0,0,0.35);
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, Helvetica, Arial, sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;
    background:radial-gradient(1200px 800px at 10% -10%, #1d2030 0%, var(--bg) 55%) , var(--bg);
    color:var(--text);
    font-family:var(--font);
    -webkit-font-smoothing:antialiased;
    min-height:100%;
  }
  body{padding-bottom:60px;}
  ::selection{background:var(--accent);color:white;}
  a{color:inherit;}
  button{font-family:inherit;}

  .wrap{
    max-width:920px;
    margin:0 auto;
    padding:24px 16px 0;
  }

  /* Header */
  header.app-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    margin-bottom:18px;
    flex-wrap:wrap;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:10px;
  }
  .brand .logo{
    width:38px;height:38px;border-radius:11px;
    background:linear-gradient(135deg, var(--accent), var(--accent-2));
    display:flex;align-items:center;justify-content:center;
    font-size:20px;
    box-shadow:0 4px 14px rgba(124,92,255,0.45);
    flex-shrink:0;
  }
  .brand h1{
    font-size:19px;
    margin:0;
    font-weight:800;
    letter-spacing:-0.02em;
  }
  .brand .sub{
    font-size:12px;
    color:var(--muted);
    margin-top:1px;
  }
  .header-actions{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
  }

  .btn{
    background:var(--card);
    border:1px solid var(--border);
    color:var(--text);
    padding:9px 14px;
    border-radius:10px;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
    display:inline-flex;
    align-items:center;
    gap:6px;
    transition:background .15s, transform .1s, border-color .15s;
    white-space:nowrap;
  }
  .btn:hover{background:var(--card-hover); border-color:#3a4156;}
  .btn:active{transform:scale(0.96);}
  .btn-primary{
    background:linear-gradient(135deg, var(--accent), #6a4ce0);
    border-color:transparent;
    box-shadow:0 4px 14px rgba(124,92,255,0.35);
  }
  .btn-primary:hover{filter:brightness(1.08);}
  .btn-ghost{
    background:transparent;
    border-color:var(--border);
  }
  .btn-sm{
    padding:6px 10px;
    font-size:12px;
    border-radius:8px;
  }
  .btn-icon{
    width:34px;height:34px;
    padding:0;
    justify-content:center;
    border-radius:9px;
  }
  .btn-danger{color:var(--bad);}
  input[type=file]{display:none;}

  /* Motivation banner */
  .motivation{
    background:linear-gradient(120deg, rgba(124,92,255,0.14), rgba(34,211,238,0.10));
    border:1px solid rgba(124,92,255,0.28);
    border-radius:var(--radius);
    padding:16px 18px;
    margin-bottom:20px;
    display:flex;
    align-items:center;
    gap:14px;
    justify-content:space-between;
    flex-wrap:wrap;
  }
  .motivation .msg{
    font-size:15px;
    font-weight:600;
    flex:1;
    min-width:200px;
  }
  .motivation .msg .emoji{font-size:20px;margin-right:6px;}
  .stat-pills{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
  }
  .stat-pill{
    background:rgba(255,255,255,0.05);
    border:1px solid var(--border);
    padding:6px 12px;
    border-radius:999px;
    font-size:12px;
    font-weight:700;
    display:flex;
    align-items:center;
    gap:6px;
  }
  .stat-pill b{font-size:14px;}
  .stat-pill .lbl{color:var(--muted);font-weight:500;}

  /* Today date row */
  .date-row{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin-bottom:12px;
    padding:0 2px;
  }
  .date-row h2{
    font-size:15px;
    margin:0;
    color:var(--muted);
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:.06em;
  }
  .date-row .today-date{
    font-size:13px;
    color:var(--muted-2);
  }

  /* Habit list */
  #habit-list{
    display:flex;
    flex-direction:column;
    gap:10px;
    margin-bottom:26px;
  }
  .habit-card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:14px 16px;
    display:flex;
    align-items:center;
    gap:14px;
    transition:border-color .15s, transform .15s;
    position:relative;
    overflow:hidden;
  }
  .habit-card.done-today{
    border-color:rgba(52,211,153,0.45);
    background:linear-gradient(120deg, rgba(52,211,153,0.08), var(--card) 60%);
  }
  .habit-card.skip-today{
    border-color:rgba(251,191,36,0.4);
    background:linear-gradient(120deg, rgba(251,191,36,0.08), var(--card) 60%);
  }
  .habit-icon{
    width:42px;height:42px;
    border-radius:12px;
    display:flex;align-items:center;justify-content:center;
    font-size:21px;
    flex-shrink:0;
  }
  .habit-main{
    flex:1;
    min-width:0;
  }
  .habit-name{
    font-weight:700;
    font-size:15px;
    margin:0 0 3px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .habit-meta{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:12px;
    color:var(--muted);
    flex-wrap:wrap;
  }
  .streak-badge{
    display:inline-flex;
    align-items:center;
    gap:3px;
    font-weight:700;
    color:var(--warn);
  }
  .best-badge{
    color:var(--muted-2);
  }
  .mini-chart{
    display:flex;
    gap:3px;
    align-items:flex-end;
    height:22px;
  }
  .mini-chart .bar{
    width:5px;
    border-radius:2px;
    background:var(--border);
  }
  .mini-chart .bar.done{background:var(--good);}
  .mini-chart .bar.skip{background:var(--warn);}

  .habit-actions{
    display:flex;
    align-items:center;
    gap:6px;
    flex-shrink:0;
  }
  .check-btn{
    width:46px;height:46px;
    border-radius:50%;
    border:2px solid var(--border);
    background:var(--bg-soft);
    color:var(--muted);
    font-size:20px;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:all .15s;
    flex-shrink:0;
  }
  .check-btn:hover{border-color:var(--good);transform:scale(1.06);}
  .check-btn.checked{
    background:linear-gradient(135deg, var(--good), #10b981);
    border-color:transparent;
    color:#06281d;
    box-shadow:0 4px 16px rgba(52,211,153,0.4);
  }
  .check-btn.checked:hover{transform:scale(1.06);}
  .skip-btn{
    width:36px;height:36px;
    border-radius:50%;
    border:2px solid var(--border);
    background:var(--bg-soft);
    color:var(--muted);
    font-size:14px;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:all .15s;
    flex-shrink:0;
  }
  .skip-btn:hover{border-color:var(--warn); color:var(--warn);}
  .skip-btn.skipped{
    background:rgba(251,191,36,0.18);
    border-color:var(--warn);
    color:var(--warn);
  }
  .edit-btn, .del-btn{
    width:30px;height:30px;
    border-radius:8px;
    border:none;
    background:transparent;
    color:var(--muted-2);
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    font-size:14px;
    transition:background .15s,color .15s;
  }
  .edit-btn:hover{background:var(--bg-soft);color:var(--accent-2);}
  .del-btn:hover{background:rgba(248,113,113,0.12);color:var(--bad);}
  .card-menu{
    display:flex;
    flex-direction:column;
    gap:2px;
  }

  .empty-state{
    text-align:center;
    padding:60px 20px;
    color:var(--muted);
    border:1.5px dashed var(--border);
    border-radius:var(--radius);
  }
  .empty-state .big-emoji{font-size:42px;margin-bottom:10px;}
  .empty-state h3{margin:0 0 6px;color:var(--text);}

  /* Section heading */
  .section-title{
    font-size:14px;
    font-weight:800;
    text-transform:uppercase;
    letter-spacing:.06em;
    color:var(--muted);
    margin:8px 2px 12px;
    display:flex;
    align-items:center;
    gap:8px;
  }

  /* Weekly overview grid */
  .overview-card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:18px;
    margin-bottom:26px;
    overflow-x:auto;
  }
  table.grid-table{
    border-collapse:collapse;
    width:100%;
    min-width:520px;
  }
  table.grid-table th{
    font-size:11px;
    color:var(--muted);
    font-weight:600;
    padding:4px 6px;
    text-align:center;
  }
  table.grid-table td{
    text-align:center;
    padding:4px 6px;
  }
  table.grid-table th:first-child, table.grid-table td:first-child{
    text-align:left;
    padding-left:4px;
    font-size:13px;
    font-weight:600;
    max-width:140px;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .cell-dot{
    width:24px;height:24px;
    border-radius:7px;
    background:var(--bg-soft);
    border:1px solid var(--border);
    display:inline-flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    margin:0 auto;
  }
  .cell-dot.done{background:rgba(52,211,153,0.22);border-color:rgba(52,211,153,0.5);color:var(--good);}
  .cell-dot.skip{background:rgba(251,191,36,0.18);border-color:rgba(251,191,36,0.45);color:var(--warn);}
  .cell-dot.future{opacity:0.25;}

  footer.app-footer{
    text-align:center;
    color:var(--muted-2);
    font-size:12px;
    padding:20px 0 8px;
  }

  /* Modal */
  .modal-overlay{
    position:fixed;inset:0;
    background:rgba(8,9,14,0.6);
    backdrop-filter:blur(4px);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:100;
    padding:16px;
  }
  .modal-overlay.open{display:flex;}
  .modal{
    background:var(--bg-soft);
    border:1px solid var(--border);
    border-radius:18px;
    width:100%;
    max-width:420px;
    padding:22px;
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
    animation:pop .15s ease-out;
    max-height:88vh;
    overflow-y:auto;
  }
  @keyframes pop{from{transform:scale(0.94);opacity:0;}to{transform:scale(1);opacity:1;}}
  .modal h3{margin:0 0 16px;font-size:17px;}
  .field{margin-bottom:14px;}
  .field label{
    display:block;
    font-size:12px;
    font-weight:700;
    color:var(--muted);
    margin-bottom:6px;
    text-transform:uppercase;
    letter-spacing:.04em;
  }
  .field input[type=text]{
    width:100%;
    background:var(--card);
    border:1px solid var(--border);
    color:var(--text);
    padding:11px 12px;
    border-radius:10px;
    font-size:14px;
  }
  .field input[type=text]:focus{outline:none;border-color:var(--accent);}
  .icon-grid{
    display:grid;
    grid-template-columns:repeat(8,1fr);
    gap:6px;
  }
  .icon-opt{
    aspect-ratio:1;
    border-radius:9px;
    border:1.5px solid var(--border);
    background:var(--card);
    display:flex;align-items:center;justify-content:center;
    font-size:17px;
    cursor:pointer;
  }
  .icon-opt.selected{border-color:var(--accent);background:rgba(124,92,255,0.18);}
  .color-grid{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
  }
  .color-opt{
    width:30px;height:30px;
    border-radius:50%;
    cursor:pointer;
    border:2px solid transparent;
  }
  .color-opt.selected{border-color:white;}
  .modal-actions{
    display:flex;
    gap:10px;
    margin-top:18px;
  }
  .modal-actions .btn{flex:1;justify-content:center;}

  .toast{
    position:fixed;
    bottom:24px;
    left:50%;
    transform:translateX(-50%) translateY(20px);
    background:var(--card);
    border:1px solid var(--border);
    padding:12px 20px;
    border-radius:12px;
    font-size:13px;
    font-weight:600;
    box-shadow:var(--shadow);
    opacity:0;
    pointer-events:none;
    transition:all .25s;
    z-index:200;
    max-width:90vw;
    text-align:center;
  }
  .toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }

  /* confetti */
  .confetti-piece{
    position:fixed;
    top:-10px;
    width:8px;height:8px;
    border-radius:2px;
    z-index:300;
    pointer-events:none;
    animation:fall linear forwards;
  }
  @keyframes fall{
    to{ transform:translateY(105vh) rotate(360deg); opacity:0.3; }
  }

  @media (max-width:560px){
    .wrap{padding:16px 12px 0;}
    .brand h1{font-size:17px;}
    .motivation{padding:14px;}
    .habit-card{padding:12px;gap:10px;}
    .mini-chart{display:none;}
    .check-btn{width:42px;height:42px;font-size:18px;}
    .header-actions .btn span.label{display:none;}
    .header-actions .btn{padding:9px;}
  }
</style>
</head>
<body>

<div class="wrap">
  <header class="app-header">
    <div class="brand">
      <div class="logo">🔥</div>
      <div>
        <h1>Micro Habit Tracker</h1>
        <div class="sub">Tiny actions, every day</div>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn btn-ghost btn-sm" id="export-btn" title="Export JSON">⬇️ <span class="label">Export</span></button>
      <button class="btn btn-ghost btn-sm" id="import-btn" title="Import JSON">⬆️ <span class="label">Import</span></button>
      <input type="file" id="import-file" accept="application/json">
      <button class="btn btn-primary btn-sm" id="add-habit-btn">＋ <span class="label">Add Habit</span></button>
    </div>
  </header>

  <div class="motivation" id="motivation-banner">
    <div class="msg" id="motivation-msg"><span class="emoji">✨</span>Let's get started today.</div>
    <div class="stat-pills">
      <div class="stat-pill">🎯 <b id="stat-today">0/0</b><span class="lbl">today</span></div>
      <div class="stat-pill">🔥 <b id="stat-streak">0</b><span class="lbl">best streak</span></div>
      <div class="stat-pill">📅 <b id="stat-week">0%</b><span class="lbl">7-day rate</span></div>
    </div>
  </div>

  <div class="date-row">
    <h2>Today</h2>
    <div class="today-date" id="today-date-label"></div>
  </div>

  <div id="habit-list"></div>

  <div class="section-title">📊 Last 14 Days</div>
  <div class="overview-card">
    <table class="grid-table" id="grid-table"></table>
  </div>

  <footer class="app-footer">Data is stored locally in your browser · No account needed</footer>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3 id="modal-title">Add Habit</h3>
    <div class="field">
      <label>Habit name</label>
      <input type="text" id="habit-name-input" maxlength="40" placeholder="e.g. Drink water">
    </div>
    <div class="field">
      <label>Icon</label>
      <div class="icon-grid" id="icon-grid"></div>
    </div>
    <div class="field">
      <label>Color</label>
      <div class="color-grid" id="color-grid"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="modal-cancel">Cancel</button>
      <button class="btn btn-primary" id="modal-save">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";

  var STORAGE_KEY = "microHabitTracker.v1";
  var MAX_HABITS = 7;
  var ICONS = ["💧","🏃","📖","🧘","🥗","😴","✍️","💪","🚭","🧹","🎯","🌱","🦷","☀️","🎨","🙏"];
  var COLORS = ["#7c5cff","#22d3ee","#34d399","#fbbf24","#f87171","#f472b6","#60a5fa","#a78bfa"];

  function uid(){ return 'h_' + Math.random().toString(36).slice(2,10) + Date.now().toString(36); }

  function fmtDate(d){
    var y=d.getFullYear(), m=("0"+(d.getMonth()+1)).slice(-2), day=("0"+d.getDate()).slice(-2);
    return y+"-"+m+"-"+day;
  }
  function dateFromKey(key){
    var parts = key.split("-").map(Number);
    return new Date(parts[0], parts[1]-1, parts[2]);
  }
  function todayKey(){ return fmtDate(new Date()); }
  function addDays(dateObj, n){
    var d = new Date(dateObj);
    d.setDate(d.getDate()+n);
    return d;
  }
  function keyOffset(n){ return fmtDate(addDays(new Date(), n)); }

  // ---------- Default demo data ----------
  function buildDemoData(){
    var habits = [
      {id: uid(), name:"Drink Water", icon:"💧", color:"#22d3ee", createdAt: keyOffset(-9)},
      {id: uid(), name:"Read 10 pages", icon:"📖", color:"#7c5cff", createdAt: keyOffset(-9)},
      {id: uid(), name:"Morning Stretch", icon:"🧘", color:"#34d399", createdAt: keyOffset(-9)},
      {id: uid(), name:"No Sugar", icon:"🥗", color:"#fbbf24", createdAt: keyOffset(-9)}
    ];
    var logs = {}; // habitId -> { dateKey: 'done'|'skip' }
    habits.forEach(function(h, idx){ logs[h.id] = {}; });

    // Fill last 9 days with a plausible pattern, leaving today untouched
    var pattern = [
      [1,1,1,0,1,1,1,1,1], // water - strong streak, one miss
      [1,1,0,1,1,1,1,1,1], // reading
      [0,1,1,1,1,'s',1,1,1], // stretch with a skip day
      [1,0,0,1,1,1,1,1,1] // no sugar
    ];
    for(var hIdx=0; hIdx<habits.length; hIdx++){
      var h = habits[hIdx];
      for(var i=9;i>=1;i--){
        var key = keyOffset(-i);
        var val = pattern[hIdx][9-i];
        if(val === 1) logs[h.id][key] = 'done';
        else if(val === 's') logs[h.id][key] = 'skip';
        // 0 -> no entry (missed)
      }
    }
    return { habits: habits, logs: logs };
  }

  function loadState(){
    try{
      var raw = localStorage.getItem(STORAGE_KEY);
      if(raw){
        var parsed = JSON.parse(raw);
        if(parsed && parsed.habits) return parsed;
      }
    }catch(e){}
    var demo = buildDemoData();
    saveState(demo);
    return demo;
  }
  function saveState(state){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  var state = loadState();
  var editingHabitId = null;
  var selectedIcon = ICONS[0];
  var selectedColor = COLORS[0];

  // ---------- Derived calculations ----------
  function getLog(habitId, key){
    return (state.logs[habitId] || {})[key];
  }
  function setLog(habitId, key, value){
    if(!state.logs[habitId]) state.logs[habitId] = {};
    if(value === null){ delete state.logs[habitId][key]; }
    else { state.logs[habitId][key] = value; }
  }

  function computeStreak(habitId){
    // count back from today (or yesterday if today not done yet) consecutive done/skip days
    var streak = 0;
    var cursor = new Date();
    var key = fmtDate(cursor);
    var todayStatus = getLog(habitId, key);
    if(todayStatus !== 'done' && todayStatus !== 'skip'){
      cursor = addDays(cursor, -1); // today not yet logged, look from yesterday
    }
    while(true){
      var k = fmtDate(cursor);
      var status = getLog(habitId, k);
      if(status === 'done' || status === 'skip'){
        if(status === 'done') streak++;
        cursor = addDays(cursor, -1);
      } else {
        break;
      }
    }
    return streak;
  }

  function computeBestStreak(habitId){
    var logs = state.logs[habitId] || {};
    var keys = Object.keys(logs).sort();
    if(keys.length===0) return 0;
    var best=0, current=0, prevDate=null;
    keys.forEach(function(k){
      var status = logs[k];
      var d = dateFromKey(k);
      if(prevDate){
        var diffDays = Math.round((d-prevDate)/86400000);
        if(diffDays !== 1){ current = 0; }
      }
      if(status === 'done'){
        current++;
        if(current>best) best=current;
      } else if(status === 'skip'){
        // skip preserves but doesn't increment "done" streak count
      } else {
        current = 0;
      }
      prevDate = d;
    });
    return best;
  }

  function last14Keys(){
    var arr=[];
    for(var i=13;i>=0;i--) arr.push(keyOffset(-i));
    return arr;
  }

  function weeklyRate(habitId){
    var keys = last14Keys().slice(7); // last 7 days
    var total=0, done=0;
    keys.forEach(function(k){
      var status = getLog(habitId, k);
      if(status === 'done'){ done++; total++; }
      else if(status === 'skip'){ total++; }
      else { total++; }
    });
    return total ? Math.round((done/total)*100) : 0;
  }

  // ---------- Rendering ----------
  function renderAll(){
    renderMotivation();
    renderHabitList();
    renderGrid();
    document.getElementById("today-date-label").textContent = new Date().toLocaleDateString(undefined, {weekday:'long', month:'short', day:'numeric'});
  }

  var MOTIVATIONS_FULL = [
    "Every checkmark is a vote for who you're becoming.","Small steps, big momentum.",
    "Consistency beats intensity — show up today.","You're building something that compounds.",
    "Progress, not perfection.","One more day, one more brick in the wall.",
    "Future you is thanking you right now."
  ];
  var MOTIVATIONS_PARTIAL = [
    "Keep going — you've got this.","Halfway there. Finish strong!",
    "Don't break the chain.","A few more and today's a win."
  ];
  var MOTIVATIONS_NONE = [
    "Fresh day, fresh start. Let's go!","Today is a blank streak waiting to grow.",
    "Pick one habit and just start.","The hardest part is starting — you're already here."
  ];

  function pick(arr){ return arr[Math.floor(Math.random()*arr.length) % arr.length]; }

  function renderMotivation(){
    var habits = state.habits;
    var key = todayKey();
    var doneCount = 0, skipCount=0;
    habits.forEach(function(h){
      var s = getLog(h.id, key);
      if(s === 'done') doneCount++;
      if(s === 'skip') skipCount++;
    });
    document.getElementById("stat-today").textContent = doneCount + "/" + habits.length;

    var bestOverall = 0;
    habits.forEach(function(h){ bestOverall = Math.max(bestOverall, computeBestStreak(h.id)); });
    document.getElementById("stat-streak").textContent = bestOverall;

    var avgRate = habits.length ? Math.round(habits.reduce(function(sum,h){return sum+weeklyRate(h.id);},0)/habits.length) : 0;
    document.getElementById("stat-week").textContent = avgRate + "%";

    var msgEl = document.getElementById("motivation-msg");
    var msg, emoji;
    if(habits.length===0){
      emoji="👋"; msg="Add your first habit to get started.";
    } else if(doneCount + skipCount >= habits.length){
      emoji="🎉"; msg = pick(MOTIVATIONS_FULL);
    } else if(doneCount > 0){
      emoji="💪"; msg = pick(MOTIVATIONS_PARTIAL);
    } else {
      emoji="🌅"; msg = pick(MOTIVATIONS_NONE);
    }
    msgEl.innerHTML = '<span class="emoji">'+emoji+'</span>'+msg;
  }

  function sparkline(habitId){
    var keys = last14Keys();
    var html = '<div class="mini-chart">';
    keys.forEach(function(k){
      var status = getLog(habitId, k);
      var cls = status === 'done' ? 'done' : (status === 'skip' ? 'skip' : '');
      var h = status === 'done' ? 100 : (status === 'skip' ? 55 : 25);
      html += '<div class="bar '+cls+'" style="height:'+h+'%"></div>';
    });
    html += '</div>';
    return html;
  }

  function renderHabitList(){
    var list = document.getElementById("habit-list");
    list.innerHTML = "";
    if(state.habits.length === 0){
      list.innerHTML = '<div class="empty-state"><div class="big-emoji">🌱</div><h3>No habits yet</h3><p>Tap "Add Habit" to start your first streak.</p></div>';
      return;
    }
    var key = todayKey();
    state.habits.forEach(function(h){
      var status = getLog(h.id, key);
      var streak = computeStreak(h.id);
      var best = computeBestStreak(h.id);
      var card = document.createElement("div");
      card.className = "habit-card" + (status==='done' ? " done-today" : "") + (status==='skip' ? " skip-today" : "");
      card.innerHTML =
        '<div class="habit-icon" style="background:'+h.color+'22;color:'+h.color+';border:1px solid '+h.color+'55;">'+h.icon+'</div>'+
        '<div class="habit-main">'+
          '<p class="habit-name">'+escapeHtml(h.name)+'</p>'+
          '<div class="habit-meta">'+
            '<span class="streak-badge">🔥 '+streak+'</span>'+
            '<span class="best-badge">best '+best+'</span>'+
            sparkline(h.id)+
          '</div>'+
        '</div>'+
        '<div class="habit-actions">'+
          '<button class="skip-btn'+(status==='skip'?' skipped':'')+'" title="Skip today" data-action="skip" data-id="'+h.id+'">⏭</button>'+
          '<button class="check-btn'+(status==='done'?' checked':'')+'" title="Mark done" data-action="check" data-id="'+h.id+'">'+(status==='done'?'✓':'')+'</button>'+
          '<div class="card-menu">'+
            '<button class="edit-btn" title="Edit" data-action="edit" data-id="'+h.id+'">✎</button>'+
            '<button class="del-btn" title="Delete" data-action="delete" data-id="'+h.id+'">✕</button>'+
          '</div>'+
        '</div>';
      list.appendChild(card);
    });
  }

  function renderGrid(){
    var table = document.getElementById("grid-table");
    var keys = last14Keys();
    var todayK = todayKey();
    var html = "<thead><tr><th>Habit</th>";
    keys.forEach(function(k){
      var d = dateFromKey(k);
      html += '<th>'+d.toLocaleDateString(undefined,{weekday:'narrow'})+'<br>'+d.getDate()+'</th>';
    });
    html += "</tr></thead><tbody>";
    if(state.habits.length===0){
      html += '<tr><td colspan="'+(keys.length+1)+'" style="color:var(--muted);padding:20px;">No data yet</td></tr>';
    }
    state.habits.forEach(function(h){
      html += "<tr><td>"+h.icon+" "+escapeHtml(h.name)+"</td>";
      keys.forEach(function(k){
        var status = getLog(h.id, k);
        var isFuture = k > todayK;
        var cls = status==='done' ? 'done' : (status==='skip' ? 'skip' : '');
        var content = status==='done' ? '✓' : (status==='skip' ? '–' : '');
        html += '<td><div class="cell-dot '+cls+(isFuture?' future':'')+'">'+content+'</div></td>';
      });
      html += "</tr>";
    });
    html += "</tbody>";
    table.innerHTML = html;
  }

  function escapeHtml(str){
    var div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  // ---------- Toast ----------
  var toastTimer;
  function showToast(msg){
    var t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ t.classList.remove("show"); }, 2200);
  }

  // ---------- Confetti ----------
  function burstConfetti(){
    var colors = COLORS;
    for(var i=0;i<28;i++){
      var p = document.createElement("div");
      p.className = "confetti-piece";
      p.style.left = (Math.random()*100)+"vw";
      p.style.background = colors[Math.floor(Math.random()*colors.length)];
      p.style.animationDuration = (1.6+Math.random()*1.2)+"s";
      p.style.opacity = (0.7+Math.random()*0.3).toString();
      document.body.appendChild(p);
      (function(piece){
        setTimeout(function(){ piece.remove(); }, 3200);
      })(p);
    }
  }

  // ---------- Actions ----------
  function toggleDone(habitId){
    var key = todayKey();
    var status = getLog(habitId, key);
    if(status === 'done'){
      setLog(habitId, key, null);
    } else {
      setLog(habitId, key, 'done');
      burstConfetti();
      showToast("Nice work! Habit logged for today.");
    }
    saveState(state);
    renderAll();
  }
  function toggleSkip(habitId){
    var key = todayKey();
    var status = getLog(habitId, key);
    if(status === 'skip'){
      setLog(habitId, key, null);
    } else {
      setLog(habitId, key, 'skip');
      showToast("Day skipped — streak protected.");
    }
    saveState(state);
    renderAll();
  }
  function deleteHabit(habitId){
    var h = state.habits.find(function(x){return x.id===habitId;});
    if(!h) return;
    if(!confirm('Delete "'+h.name+'"? This will remove its history.')) return;
    state.habits = state.habits.filter(function(x){return x.id!==habitId;});
    delete state.logs[habitId];
    saveState(state);
    renderAll();
  }

  // ---------- Modal ----------
  var overlay = document.getElementById("modal-overlay");
  var modalTitle = document.getElementById("modal-title");
  var nameInput = document.getElementById("habit-name-input");
  var iconGrid = document.getElementById("icon-grid");
  var colorGrid = document.getElementById("color-grid");

  function buildPickers(){
    iconGrid.innerHTML = "";
    ICONS.forEach(function(ic){
      var div = document.createElement("div");
      div.className = "icon-opt" + (ic===selectedIcon ? " selected" : "");
      div.textContent = ic;
      div.addEventListener("click", function(){
        selectedIcon = ic;
        buildPickers();
      });
      iconGrid.appendChild(div);
    });
    colorGrid.innerHTML = "";
    COLORS.forEach(function(c){
      var div = document.createElement("div");
      div.className = "color-opt" + (c===selectedColor ? " selected" : "");
      div.style.background = c;
      div.addEventListener("click", function(){
        selectedColor = c;
        buildPickers();
      });
      colorGrid.appendChild(div);
    });
  }

  function openAddModal(){
    if(state.habits.length >= MAX_HABITS){
      showToast("Limit reached: max " + MAX_HABITS + " habits.");
      return;
    }
    editingHabitId = null;
    modalTitle.textContent = "Add Habit";
    nameInput.value = "";
    selectedIcon = ICONS[Math.floor(Math.random()*ICONS.length)];
    selectedColor = COLORS[state.habits.length % COLORS.length];
    buildPickers();
    overlay.classList.add("open");
    setTimeout(function(){nameInput.focus();}, 50);
  }
  function openEditModal(habitId){
    var h = state.habits.find(function(x){return x.id===habitId;});
    if(!h) return;
    editingHabitId = habitId;
    modalTitle.textContent = "Edit Habit";
    nameInput.value = h.name;
    selectedIcon = h.icon;
    selectedColor = h.color;
    buildPickers();
    overlay.classList.add("open");
    setTimeout(function(){nameInput.focus();}, 50);
  }
  function closeModal(){
    overlay.classList.remove("open");
  }
  function saveModal(){
    var name = nameInput.value.trim();
    if(!name){
      nameInput.focus();
      return;
    }
    if(editingHabitId){
      var h = state.habits.find(function(x){return x.id===editingHabitId;});
      h.name = name; h.icon = selectedIcon; h.color = selectedColor;
      showToast("Habit updated.");
    } else {
      state.habits.push({id: uid(), name: name, icon: selectedIcon, color: selectedColor, createdAt: todayKey()});
      state.logs[state.habits[state.habits.length-1].id] = {};
      showToast("Habit added!");
    }
    saveState(state);
    closeModal();
    renderAll();
  }

  // ---------- Export / Import ----------
  function exportData(){
    var blob = new Blob([JSON.stringify(state, null, 2)], {type:"application/json"});
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "micro-habit-tracker-" + todayKey() + ".json";
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    showToast("Exported your data.");
  }
  function importData(file){
    var reader = new FileReader();
    reader.onload = function(e){
      try{
        var parsed = JSON.parse(e.target.result);
        if(!parsed || !Array.isArray(parsed.habits) || typeof parsed.logs !== 'object'){
          throw new Error("invalid");
        }
        state = parsed;
        saveState(state);
        renderAll();
        showToast("Import successful.");
      }catch(err){
        showToast("Import failed: invalid file.");
      }
    };
    reader.readAsText(file);
  }

  // ---------- Event wiring ----------
  document.getElementById("habit-list").addEventListener("click", function(e){
    var btn = e.target.closest("button[data-action]");
    if(!btn) return;
    var id = btn.getAttribute("data-id");
    var action = btn.getAttribute("data-action");
    if(action === "check") toggleDone(id);
    else if(action === "skip") toggleSkip(id);
    else if(action === "edit") openEditModal(id);
    else if(action === "delete") deleteHabit(id);
  });

  document.getElementById("add-habit-btn").addEventListener("click", openAddModal);
  document.getElementById("modal-cancel").addEventListener("click", closeModal);
  document.getElementById("modal-save").addEventListener("click", saveModal);
  overlay.addEventListener("click", function(e){ if(e.target === overlay) closeModal(); });
  nameInput.addEventListener("keydown", function(e){ if(e.key === "Enter") saveModal(); });
  document.addEventListener("keydown", function(e){ if(e.key === "Escape") closeModal(); });

  document.getElementById("export-btn").addEventListener("click", exportData);
  document.getElementById("import-btn").addEventListener("click", function(){
    document.getElementById("import-file").click();
  });
  document.getElementById("import-file").addEventListener("change", function(e){
    if(e.target.files && e.target.files[0]) importData(e.target.files[0]);
    e.target.value = "";
  });

  renderAll();
})();
</script>
</body>
</html>
