<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Basecamp — Camping Gear Checklist</title>
<style>
  :root{
    --bark: #3e2f23;
    --bark-dark: #2a2018;
    --forest: #2f4d3a;
    --forest-dark: #21372a;
    --forest-light: #4a7860;
    --moss: #7a9b6e;
    --sand: #e8dcc3;
    --sand-light: #f5efdd;
    --ember: #c1542c;
    --ember-dark: #a23f1f;
    --sky: #6f97a8;
    --ink: #2a2018;
    --paper: #fbf6ea;
    --line: #d8cba8;
    --shadow: 0 10px 30px rgba(20,15,8,0.18);
  }

  *{ box-sizing: border-box; }

  html,body{
    margin:0; padding:0;
    min-height:100vh;
    font-family: 'Segoe UI', Verdana, Tahoma, sans-serif;
    color: var(--ink);
    background:
      radial-gradient(circle at 15% 10%, rgba(255,255,255,0.05), transparent 40%),
      linear-gradient(180deg, #1c2b22 0%, #243d2e 40%, #2f4d3a 100%);
    background-attachment: fixed;
  }

  body::before{
    content:"";
    position: fixed;
    inset:0;
    pointer-events:none;
    background-image:
      radial-gradient(rgba(255,255,255,0.035) 1px, transparent 1px);
    background-size: 3px 3px;
    z-index: 0;
  }

  /* Mountain silhouette banner */
  .skyline{
    position: relative;
    height: 130px;
    overflow: hidden;
    background: linear-gradient(180deg, #4a6f7d 0%, #6f97a8 60%, #9ec1bd 100%);
  }
  .skyline svg{
    position:absolute;
    bottom:-2px;
    left:0;
    width:100%;
    height:110px;
  }
  .skyline .sun{
    position:absolute;
    top: 22px; right: 9%;
    width: 46px; height: 46px;
    border-radius:50%;
    background: radial-gradient(circle at 35% 35%, #fff3cf, #f4c05a 60%, #e2a13c 100%);
    box-shadow: 0 0 40px 10px rgba(244,192,90,0.45);
  }

  header.app-title{
    text-align:center;
    margin-top: -38px;
    position: relative;
    z-index: 3;
  }
  header.app-title h1{
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 2.6rem;
    margin: 0;
    color: var(--sand-light);
    letter-spacing: 1px;
    text-shadow: 0 3px 0 rgba(0,0,0,0.35), 0 6px 18px rgba(0,0,0,0.4);
  }
  header.app-title h1 .pin{
    color: var(--ember);
    filter: drop-shadow(0 2px 2px rgba(0,0,0,0.4));
  }
  header.app-title p{
    margin: 6px 0 0;
    color: var(--sand);
    font-size: 0.95rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    opacity: 0.85;
  }

  .wrap{
    max-width: 1100px;
    margin: 0 auto;
    padding: 28px 20px 80px;
    position: relative;
    z-index: 1;
  }

  /* Trip bar */
  .trip-bar{
    display:flex;
    flex-wrap: wrap;
    gap: 14px;
    align-items: center;
    background: rgba(0,0,0,0.18);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 14px 18px;
    margin-bottom: 22px;
    backdrop-filter: blur(2px);
  }
  .trip-bar label{
    color: var(--sand-light);
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-right: 6px;
  }
  .trip-bar input[type="text"], .trip-bar select{
    font-family: inherit;
    font-size: 0.95rem;
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: var(--paper);
    color: var(--ink);
  }
  #tripName{ min-width: 220px; font-weight: 600; }
  .trip-bar .spacer{ flex:1; }

  .btn{
    cursor:pointer;
    border:none;
    font-family: inherit;
    font-weight: 600;
    font-size: 0.9rem;
    padding: 9px 16px;
    border-radius: 9px;
    transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.12s ease;
    display:inline-flex;
    align-items:center;
    gap: 7px;
    white-space: nowrap;
  }
  .btn:active{ transform: translateY(1px) scale(0.98); }
  .btn-ember{ background: linear-gradient(180deg, var(--ember), var(--ember-dark)); color: #fff8ec; box-shadow: 0 4px 0 #7c2c14, 0 6px 14px rgba(0,0,0,0.3);}
  .btn-ember:hover{ filter: brightness(1.07); }
  .btn-forest{ background: linear-gradient(180deg, var(--forest-light), var(--forest)); color: #f3fbf3; box-shadow: 0 4px 0 #182c20, 0 6px 14px rgba(0,0,0,0.3);}
  .btn-forest:hover{ filter: brightness(1.08); }
  .btn-outline{ background: transparent; color: var(--sand-light); border: 1.5px solid rgba(245,239,221,0.5); box-shadow:none;}
  .btn-outline:hover{ background: rgba(255,255,255,0.08); }
  .btn-small{ padding: 5px 10px; font-size: 0.78rem; border-radius: 7px;}
  .btn-danger{ background: #8a3a2c; color: #fff0ea; }
  .btn-danger:hover{ filter: brightness(1.1); }

  /* Layout grid */
  .grid{
    display:grid;
    grid-template-columns: 1fr 360px;
    gap: 22px;
    align-items: start;
  }
  @media (max-width: 880px){
    .grid{ grid-template-columns: 1fr; }
  }

  .card{
    background: var(--paper);
    border-radius: 16px;
    box-shadow: var(--shadow);
    border: 1px solid rgba(0,0,0,0.06);
    overflow: hidden;
  }
  .card-header{
    background: linear-gradient(180deg, var(--forest-light), var(--forest));
    color: var(--sand-light);
    padding: 14px 20px;
    display:flex;
    align-items:center;
    justify-content: space-between;
    gap: 10px;
  }
  .card-header h2{
    margin:0;
    font-size: 1.15rem;
    font-family: Georgia, serif;
    letter-spacing: 0.5px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .card-body{ padding: 18px 20px 22px; }

  /* Add item form */
  .add-form{
    display:flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 18px;
    padding-bottom: 18px;
    border-bottom: 2px dashed var(--line);
  }
  .add-form input, .add-form select{
    font-family: inherit;
    padding: 9px 11px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: #fff;
    font-size: 0.92rem;
  }
  #newItemName{ flex: 2 1 180px; }
  #newItemWeight{ flex: 0 1 90px; }
  #newItemUnit{ flex: 0 1 68px; }
  #newItemCategory{ flex: 1 1 130px; }
  #newItemQty{ flex: 0 1 62px; }

  /* Category groups */
  .category-group{ margin-bottom: 22px; }
  .category-head{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom: 8px;
    cursor:pointer;
    user-select:none;
  }
  .category-head .tag{
    font-size: 1.3rem;
    width: 34px; height:34px;
    display:flex; align-items:center; justify-content:center;
    border-radius: 9px;
    background: var(--moss);
    color: #fff;
    box-shadow: inset 0 -3px 0 rgba(0,0,0,0.15);
  }
  .category-head h3{
    margin:0;
    font-size: 1rem;
    color: var(--forest-dark);
    letter-spacing: 0.4px;
    text-transform: uppercase;
    flex:1;
  }
  .category-head .cat-meta{
    font-size: 0.8rem;
    color: #6b6042;
    font-weight: 600;
    background: var(--sand);
    padding: 3px 10px;
    border-radius: 999px;
  }
  .category-progress{
    height: 6px;
    background: var(--line);
    border-radius: 999px;
    margin: 0 0 12px 44px;
    overflow:hidden;
  }
  .category-progress > div{
    height: 100%;
    background: linear-gradient(90deg, var(--moss), var(--forest-light));
    border-radius: 999px;
    transition: width 0.3s ease;
  }

  ul.item-list{
    list-style: none;
    margin: 0 0 0 44px;
    padding: 0;
    display:flex;
    flex-direction: column;
    gap: 6px;
  }
  .item{
    display:flex;
    align-items:center;
    gap: 10px;
    background: rgba(0,0,0,0.025);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 9px 12px;
    transition: background 0.15s ease;
  }
  .item:hover{ background: rgba(122,155,110,0.12); }
  .item.checked{
    opacity: 0.55;
  }
  .item.checked .item-name{
    text-decoration: line-through;
    color: #7a7460;
  }
  .item input[type="checkbox"]{
    width: 20px; height:20px;
    accent-color: var(--forest);
    cursor:pointer;
    flex-shrink:0;
  }
  .item .item-name{
    flex: 1;
    font-weight: 600;
    font-size: 0.95rem;
  }
  .item .item-qty{
    font-size: 0.78rem;
    color: #6b6042;
    background: var(--sand);
    padding: 2px 8px;
    border-radius: 999px;
    font-weight: 700;
  }
  .item .item-weight{
    font-size: 0.82rem;
    color: var(--forest-dark);
    font-weight: 700;
    min-width: 64px;
    text-align:right;
  }
  .item .remove-btn{
    background: none;
    border:none;
    color: #b35a47;
    cursor:pointer;
    font-size: 1.1rem;
    line-height:1;
    padding: 2px 6px;
    border-radius: 6px;
    flex-shrink:0;
  }
  .item .remove-btn:hover{ background: rgba(179,90,71,0.15); }

  .empty-state{
    text-align:center;
    padding: 40px 20px;
    color: #6b6042;
  }
  .empty-state .big-icon{ font-size: 2.6rem; margin-bottom: 10px; }

  /* Sidebar: weight calculator */
  .weight-total{
    text-align:center;
    padding: 6px 0 16px;
  }
  .weight-total .num{
    font-size: 2.6rem;
    font-weight: 800;
    color: var(--forest-dark);
    font-family: Georgia, serif;
  }
  .weight-total .unit-toggle{
    display:flex;
    justify-content:center;
    gap: 6px;
    margin-top: 8px;
  }
  .unit-toggle button{
    border: 1px solid var(--line);
    background: #fff;
    padding: 4px 12px;
    border-radius: 999px;
    font-size: 0.78rem;
    font-weight: 700;
    cursor:pointer;
    color: #6b6042;
  }
  .unit-toggle button.active{
    background: var(--forest);
    color: #fff;
    border-color: var(--forest);
  }

  .gauge-wrap{
    margin: 6px 0 18px;
  }
  .gauge-bar{
    height: 22px;
    border-radius: 999px;
    background: var(--line);
    overflow:hidden;
    position:relative;
    border: 1px solid rgba(0,0,0,0.08);
  }
  .gauge-fill{
    height:100%;
    border-radius: 999px;
    transition: width 0.4s ease, background 0.4s ease;
  }
  .gauge-label{
    display:flex;
    justify-content: space-between;
    font-size: 0.74rem;
    color: #6b6042;
    margin-top: 6px;
    font-weight: 600;
  }

  .breakdown-row{
    display:flex;
    align-items:center;
    gap: 8px;
    font-size: 0.85rem;
    padding: 5px 0;
    border-bottom: 1px solid var(--line);
  }
  .breakdown-row:last-child{ border-bottom:none; }
  .breakdown-row .swatch{
    width: 11px; height:11px; border-radius:3px; flex-shrink:0;
  }
  .breakdown-row .cat-name{ flex:1; color: var(--ink); font-weight:600; }
  .breakdown-row .cat-weight{ color: #6b6042; font-weight:700; }

  .stat-row{
    display:flex;
    justify-content: space-between;
    padding: 8px 0;
    font-size: 0.88rem;
    border-bottom: 1px dashed var(--line);
  }
  .stat-row:last-child{ border-bottom:none; }
  .stat-row .label{ color:#6b6042; }
  .stat-row .val{ font-weight:700; color: var(--forest-dark); }

  /* Saved lists */
  .saved-list-item{
    display:flex;
    align-items:center;
    gap: 8px;
    padding: 10px 12px;
    border: 1px solid var(--line);
    border-radius: 10px;
    margin-bottom: 8px;
    background: #fff;
  }
  .saved-list-item .info{ flex:1; min-width:0; }
  .saved-list-item .info .name{ font-weight:700; font-size:0.9rem; display:block; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .saved-list-item .info .meta{ font-size:0.74rem; color:#6b6042; }
  .saved-empty{
    color:#6b6042;
    font-size: 0.85rem;
    text-align:center;
    padding: 14px 0;
  }

  .toast{
    position: fixed;
    bottom: 26px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--bark-dark);
    color: var(--sand-light);
    padding: 12px 22px;
    border-radius: 10px;
    font-size: 0.9rem;
    font-weight: 600;
    box-shadow: 0 10px 28px rgba(0,0,0,0.4);
    opacity:0;
    pointer-events:none;
    transition: opacity 0.25s ease, transform 0.25s ease;
    z-index: 50;
    border: 1px solid rgba(255,255,255,0.1);
    display:flex;
    align-items:center;
    gap:8px;
  }
  .toast.show{
    opacity:1;
    transform: translateX(-50%) translateY(0);
  }

  ::placeholder{ color:#9a9277; }

  .footer-note{
    text-align:center;
    color: rgba(245,239,221,0.55);
    font-size: 0.78rem;
    margin-top: 30px;
  }

  /* small scrollbars for saved lists */
  #savedListsContainer{
    max-height: 260px;
    overflow-y:auto;
    padding-right: 2px;
  }
</style>
</head>
<body>

<div class="skyline">
  <div class="sun"></div>
  <svg viewBox="0 0 1200 200" preserveAspectRatio="none">
    <polygon points="0,200 0,120 150,40 300,120 420,70 600,150 760,60 900,130 1050,80 1200,140 1200,200" fill="#3a5a52" opacity="0.55"/>
    <polygon points="0,200 0,150 180,90 350,160 500,100 650,170 820,95 1000,165 1200,110 1200,200" fill="#274238" opacity="0.85"/>
  </svg>
</div>

<header class="app-title">
  <h1><span class="pin">&#9650;</span> Basecamp</h1>
  <p>Camping Gear Checklist &amp; Pack Weight Tracker</p>
</header>

<div class="wrap">

  <div class="trip-bar">
    <div>
      <label for="tripName">Trip</label>
      <input type="text" id="tripName" placeholder="e.g. Lost Lake — 3 nights" />
    </div>
    <div>
      <label for="filterSelect">Show</label>
      <select id="filterSelect">
        <option value="all">All items</option>
        <option value="unpacked">Unpacked only</option>
        <option value="packed">Packed only</option>
      </select>
    </div>
    <div class="spacer"></div>
    <button class="btn btn-forest" id="saveListBtn">&#128190; Save List</button>
    <button class="btn btn-outline" id="clearCheckedBtn">&#10003; Reset checks</button>
    <button class="btn btn-outline" id="newListBtn">&#9961; New List</button>
  </div>

  <div class="grid">
    <!-- LEFT: Checklist -->
    <div class="card">
      <div class="card-header">
        <h2>&#127968; Gear Checklist</h2>
        <span id="overallCount" style="font-size:0.85rem; opacity:0.9;"></span>
      </div>
      <div class="card-body">

        <div class="add-form">
          <input type="text" id="newItemName" placeholder="Item name (e.g. Headlamp)" />
          <input type="number" id="newItemQty" min="1" value="1" title="Quantity" />
          <input type="number" id="newItemWeight" min="0" step="0.1" placeholder="Wt" title="Weight" />
          <select id="newItemUnit">
            <option value="oz">oz</option>
            <option value="lb">lb</option>
            <option value="g">g</option>
            <option value="kg">kg</option>
          </select>
          <select id="newItemCategory"></select>
          <button class="btn btn-ember" id="addItemBtn">+ Add Item</button>
        </div>

        <div id="checklistContainer"></div>

      </div>
    </div>

    <!-- RIGHT: Sidebar -->
    <div style="display:flex; flex-direction:column; gap:18px;">

      <div class="card">
        <div class="card-header"><h2>&#9878; Pack Weight</h2></div>
        <div class="card-body">
          <div class="weight-total">
            <div class="num" id="totalWeightDisplay">0.0</div>
            <div style="color:#6b6042; font-size:0.85rem; font-weight:600;" id="totalWeightUnit">pounds total</div>
            <div class="unit-toggle">
              <button data-unit="lb" class="active">lb</button>
              <button data-unit="kg">kg</button>
            </div>
          </div>

          <div class="gauge-wrap">
            <div class="gauge-bar"><div class="gauge-fill" id="gaugeFill" style="width:0%; background:#7a9b6e;"></div></div>
            <div class="gauge-label">
              <span id="gaugeText">0% of target</span>
              <span id="gaugeTargetText">Target: 20 lb</span>
            </div>
          </div>

          <div style="display:flex; gap:8px; align-items:center; margin-bottom:14px;">
            <label style="font-size:0.78rem; color:#6b6042; text-transform:uppercase; letter-spacing:0.5px;">Target weight</label>
            <input type="number" id="targetWeightInput" value="20" min="1" style="width:70px; padding:6px 8px; border-radius:7px; border:1px solid var(--line);" />
            <span style="font-size:0.8rem; color:#6b6042;" id="targetUnitLabel">lb</span>
          </div>

          <div class="stat-row"><span class="label">Items packed</span><span class="val" id="statPacked">0 / 0</span></div>
          <div class="stat-row"><span class="label">Packed weight</span><span class="val" id="statPackedWeight">0.0 lb</span></div>
          <div class="stat-row"><span class="label">Remaining weight</span><span class="val" id="statRemainingWeight">0.0 lb</span></div>

          <div style="margin-top:14px;">
            <div style="font-size:0.78rem; text-transform:uppercase; letter-spacing:0.5px; color:#6b6042; margin-bottom:8px; font-weight:700;">By category</div>
            <div id="categoryBreakdown"></div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header"><h2>&#128190; Saved Lists</h2></div>
        <div class="card-body">
          <div id="savedListsContainer"></div>
        </div>
      </div>

    </div>
  </div>

  <div class="footer-note">Pack light, camp happy. Your lists are saved locally in this browser.</div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";

  var STORAGE_KEY = "basecamp_camping_lists_v1";
  var ACTIVE_KEY = "basecamp_active_state_v1";

  var CATEGORIES = [
    { id: "shelter", label: "Shelter & Sleep", icon: "&#9978;" },
    { id: "kitchen", label: "Kitchen & Food", icon: "&#127859;" },
    { id: "clothing", label: "Clothing", icon: "&#129509;" },
    { id: "navigation", label: "Navigation & Safety", icon: "&#129517;" },
    { id: "tools", label: "Tools & Repair", icon: "&#128296;" },
    { id: "personal", label: "Personal & Hygiene", icon: "&#129529;" },
    { id: "other", label: "Other", icon: "&#127755;" }
  ];

  var CATEGORY_COLORS = {
    shelter: "#4a7860",
    kitchen: "#c1542c",
    clothing: "#6f97a8",
    navigation: "#7a9b6e",
    tools: "#a07d3f",
    personal: "#8a6f9b",
    other: "#9b9180"
  };

  var DEFAULT_ITEMS = [
    { id: uid(), name: "Tent", qty: 1, weight: 4.5, unit: "lb", category: "shelter", checked: false },
    { id: uid(), name: "Sleeping bag", qty: 1, weight: 2.8, unit: "lb", category: "shelter", checked: false },
    { id: uid(), name: "Sleeping pad", qty: 1, weight: 1.2, unit: "lb", category: "shelter", checked: false },
    { id: uid(), name: "Camp stove", qty: 1, weight: 14, unit: "oz", category: "kitchen", checked: false },
    { id: uid(), name: "Fuel canister", qty: 1, weight: 8, unit: "oz", category: "kitchen", checked: false },
    { id: uid(), name: "Cookware set", qty: 1, weight: 1.1, unit: "lb", category: "kitchen", checked: false },
    { id: uid(), name: "Water filter", qty: 1, weight: 3, unit: "oz", category: "kitchen", checked: false },
    { id: uid(), name: "Rain jacket", qty: 1, weight: 12, unit: "oz", category: "clothing", checked: false },
    { id: uid(), name: "Wool socks", qty: 3, weight: 2.5, unit: "oz", category: "clothing", checked: false },
    { id: uid(), name: "Headlamp", qty: 1, weight: 3, unit: "oz", category: "navigation", checked: false },
    { id: uid(), name: "First aid kit", qty: 1, weight: 10, unit: "oz", category: "navigation", checked: false },
    { id: uid(), name: "Map & compass", qty: 1, weight: 4, unit: "oz", category: "navigation", checked: false },
    { id: uid(), name: "Multi-tool", qty: 1, weight: 4, unit: "oz", category: "tools", checked: false },
    { id: uid(), name: "Paracord (50ft)", qty: 1, weight: 3, unit: "oz", category: "tools", checked: false },
    { id: uid(), name: "Toothbrush & toiletries", qty: 1, weight: 6, unit: "oz", category: "personal", checked: false }
  ];

  function uid(){ return 'id-' + Math.floor(Math.random()*1e9) + '-' + (uidCounter++); }
  var uidCounter = 1;

  // ---------- conversion helpers ----------
  function toGrams(weight, unit){
    switch(unit){
      case "g": return weight;
      case "kg": return weight * 1000;
      case "oz": return weight * 28.3495;
      case "lb": return weight * 453.592;
      default: return weight;
    }
  }
  function gramsToLb(g){ return g / 453.592; }
  function gramsToKg(g){ return g / 1000; }

  // ---------- state ----------
  var state = {
    tripName: "",
    items: DEFAULT_ITEMS.slice(),
    displayUnit: "lb",
    targetWeightLb: 20,
    filter: "all"
  };

  function loadActiveState(){
    try{
      var raw = localStorage.getItem(ACTIVE_KEY);
      if(raw){
        var parsed = JSON.parse(raw);
        if(parsed && Array.isArray(parsed.items)){
          state.tripName = parsed.tripName || "";
          state.items = parsed.items;
          state.displayUnit = parsed.displayUnit || "lb";
          state.targetWeightLb = parsed.targetWeightLb || 20;
          state.filter = parsed.filter || "all";
        }
      }
    }catch(e){ /* ignore corrupt storage */ }
  }

  function persistActiveState(){
    try{
      localStorage.setItem(ACTIVE_KEY, JSON.stringify({
        tripName: state.tripName,
        items: state.items,
        displayUnit: state.displayUnit,
        targetWeightLb: state.targetWeightLb,
        filter: state.filter
      }));
    }catch(e){ /* storage full or unavailable */ }
  }

  function getSavedLists(){
    try{
      var raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : [];
    }catch(e){ return []; }
  }
  function setSavedLists(lists){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(lists));
  }

  // ---------- DOM refs ----------
  var el = {
    tripName: document.getElementById("tripName"),
    filterSelect: document.getElementById("filterSelect"),
    saveListBtn: document.getElementById("saveListBtn"),
    clearCheckedBtn: document.getElementById("clearCheckedBtn"),
    newListBtn: document.getElementById("newListBtn"),
    newItemName: document.getElementById("newItemName"),
    newItemQty: document.getElementById("newItemQty"),
    newItemWeight: document.getElementById("newItemWeight"),
    newItemUnit: document.getElementById("newItemUnit"),
    newItemCategory: document.getElementById("newItemCategory"),
    addItemBtn: document.getElementById("addItemBtn"),
    checklistContainer: document.getElementById("checklistContainer"),
    overallCount: document.getElementById("overallCount"),
    totalWeightDisplay: document.getElementById("totalWeightDisplay"),
    totalWeightUnit: document.getElementById("totalWeightUnit"),
    gaugeFill: document.getElementById("gaugeFill"),
    gaugeText: document.getElementById("gaugeText"),
    gaugeTargetText: document.getElementById("gaugeTargetText"),
    targetWeightInput: document.getElementById("targetWeightInput"),
    targetUnitLabel: document.getElementById("targetUnitLabel"),
    statPacked: document.getElementById("statPacked"),
    statPackedWeight: document.getElementById("statPackedWeight"),
    statRemainingWeight: document.getElementById("statRemainingWeight"),
    categoryBreakdown: document.getElementById("categoryBreakdown"),
    savedListsContainer: document.getElementById("savedListsContainer"),
    unitToggleBtns: document.querySelectorAll(".unit-toggle button"),
    toast: document.getElementById("toast")
  };

  // populate category select
  CATEGORIES.forEach(function(c){
    var opt = document.createElement("option");
    opt.value = c.id;
    opt.innerHTML = c.label;
    el.newItemCategory.appendChild(opt);
  });

  var collapsedCategories = {};

  // ---------- rendering ----------
  function render(){
    el.tripName.value = state.tripName;
    el.filterSelect.value = state.filter;
    el.targetWeightInput.value = state.displayUnit === "kg"
      ? round(state.targetWeightLb * 0.453592, 1)
      : round(state.targetWeightLb, 1);
    el.targetUnitLabel.textContent = state.displayUnit;

    el.unitToggleBtns.forEach(function(btn){
      btn.classList.toggle("active", btn.getAttribute("data-unit") === state.displayUnit);
    });

    renderChecklist();
    renderWeightPanel();
    renderSavedLists();
    persistActiveState();
  }

  function round(n, d){
    var f = Math.pow(10, d);
    return Math.round(n*f)/f;
  }

  function formatWeight(grams){
    if(state.displayUnit === "kg"){
      return round(gramsToKg(grams), 2).toFixed(2) + " kg";
    }
    return round(gramsToLb(grams), 2).toFixed(2) + " lb";
  }

  function itemWeightGrams(item){
    return toGrams(item.weight || 0, item.unit || "oz") * (item.qty || 1);
  }

  function renderChecklist(){
    var items = state.items;
    var filtered = items.filter(function(it){
      if(state.filter === "packed") return it.checked;
      if(state.filter === "unpacked") return !it.checked;
      return true;
    });

    var totalCount = items.length;
    var checkedCount = items.filter(function(i){ return i.checked; }).length;
    el.overallCount.textContent = totalCount ? (checkedCount + " / " + totalCount + " packed") : "";

    el.checklistContainer.innerHTML = "";

    if(items.length === 0){
      el.checklistContainer.innerHTML =
        '<div class="empty-state"><div class="big-icon">&#127966;</div>' +
        '<div>No gear yet. Add your first item above, or start a new list.</div></div>';
      return;
    }

    var anyVisible = false;

    CATEGORIES.forEach(function(cat){
      var catItems = filtered.filter(function(i){ return i.category === cat.id; });
      var catItemsAll = items.filter(function(i){ return i.category === cat.id; });
      if(catItemsAll.length === 0) return;
      if(catItems.length === 0 && state.filter !== "all") return;

      anyVisible = true;
      var group = document.createElement("div");
      group.className = "category-group";

      var catChecked = catItemsAll.filter(function(i){ return i.checked; }).length;
      var pct = catItemsAll.length ? Math.round((catChecked/catItemsAll.length)*100) : 0;
      var isCollapsed = !!collapsedCategories[cat.id];

      var head = document.createElement("div");
      head.className = "category-head";
      head.innerHTML =
        '<span class="tag" style="background:'+ (CATEGORY_COLORS[cat.id]||'#7a9b6e') +'">'+cat.icon+'</span>' +
        '<h3>'+cat.label+' <span style="opacity:0.55; font-weight:400;">'+(isCollapsed ? '&#9656;' : '&#9662;')+'</span></h3>' +
        '<span class="cat-meta">'+catChecked+' / '+catItemsAll.length+'</span>';
      head.addEventListener("click", function(){
        collapsedCategories[cat.id] = !collapsedCategories[cat.id];
        renderChecklist();
      });
      group.appendChild(head);

      var prog = document.createElement("div");
      prog.className = "category-progress";
      prog.innerHTML = '<div style="width:'+pct+'%;"></div>';
      group.appendChild(prog);

      if(!isCollapsed){
        var list = document.createElement("ul");
        list.className = "item-list";

        catItems.forEach(function(item){
          var li = document.createElement("li");
          li.className = "item" + (item.checked ? " checked" : "");

          var cb = document.createElement("input");
          cb.type = "checkbox";
          cb.checked = item.checked;
          cb.addEventListener("change", function(){
            item.checked = cb.checked;
            render();
          });

          var name = document.createElement("span");
          name.className = "item-name";
          name.textContent = item.name;

          var qty = document.createElement("span");
          qty.className = "item-qty";
          qty.textContent = "x" + (item.qty || 1);

          var weight = document.createElement("span");
          weight.className = "item-weight";
          weight.textContent = formatWeight(itemWeightGrams(item));

          var removeBtn = document.createElement("button");
          removeBtn.className = "remove-btn";
          removeBtn.innerHTML = "&#10005;";
          removeBtn.title = "Remove item";
          removeBtn.addEventListener("click", function(){
            state.items = state.items.filter(function(i){ return i.id !== item.id; });
            render();
            showToast("Removed \"" + item.name + "\"");
          });

          li.appendChild(cb);
          li.appendChild(name);
          li.appendChild(qty);
          li.appendChild(weight);
          li.appendChild(removeBtn);
          list.appendChild(li);
        });

        group.appendChild(list);
      }

      el.checklistContainer.appendChild(group);
    });

    if(!anyVisible){
      el.checklistContainer.innerHTML =
        '<div class="empty-state"><div class="big-icon">&#128269;</div>' +
        '<div>Nothing matches this filter.</div></div>';
    }
  }

  function renderWeightPanel(){
    var totalGrams = 0, packedGrams = 0;
    var catTotals = {};

    state.items.forEach(function(item){
      var g = itemWeightGrams(item);
      totalGrams += g;
      if(item.checked) packedGrams += g;
      catTotals[item.category] = (catTotals[item.category]||0) + g;
    });

    var remainingGrams = totalGrams - packedGrams;

    var totalDisplay = state.displayUnit === "kg" ? gramsToKg(totalGrams) : gramsToLb(totalGrams);
    el.totalWeightDisplay.textContent = round(totalDisplay, 2).toFixed(2);
    el.totalWeightUnit.textContent = (state.displayUnit === "kg" ? "kilograms" : "pounds") + " total";

    var targetGrams = state.targetWeightLb * 453.592;
    var pctOfTarget = targetGrams > 0 ? Math.min(150, Math.round((totalGrams/targetGrams)*100)) : 0;
    el.gaugeFill.style.width = Math.min(100, pctOfTarget) + "%";

    var gaugeColor = "#7a9b6e";
    if(pctOfTarget > 100) gaugeColor = "#c1542c";
    else if(pctOfTarget > 85) gaugeColor = "#cf9b3e";
    el.gaugeFill.style.background = gaugeColor;

    el.gaugeText.textContent = pctOfTarget + "% of target";
    el.gaugeTargetText.textContent = "Target: " + round(state.displayUnit === "kg" ? state.targetWeightLb*0.453592 : state.targetWeightLb, 1) + " " + state.displayUnit;

    var checkedCount = state.items.filter(function(i){return i.checked;}).length;
    el.statPacked.textContent = checkedCount + " / " + state.items.length;
    el.statPackedWeight.textContent = formatWeight(packedGrams);
    el.statRemainingWeight.textContent = formatWeight(remainingGrams);

    el.categoryBreakdown.innerHTML = "";
    var catEntries = CATEGORIES
      .map(function(c){ return { cat: c, grams: catTotals[c.id] || 0 }; })
      .filter(function(e){ return e.grams > 0; })
      .sort(function(a,b){ return b.grams - a.grams; });

    if(catEntries.length === 0){
      el.categoryBreakdown.innerHTML = '<div style="font-size:0.82rem; color:#6b6042;">No weighted items yet.</div>';
    } else {
      catEntries.forEach(function(e){
        var row = document.createElement("div");
        row.className = "breakdown-row";
        row.innerHTML =
          '<span class="swatch" style="background:'+(CATEGORY_COLORS[e.cat.id]||'#999')+'"></span>' +
          '<span class="cat-name">'+e.cat.label+'</span>' +
          '<span class="cat-weight">'+formatWeight(e.grams)+'</span>';
        el.categoryBreakdown.appendChild(row);
      });
    }
  }

  function renderSavedLists(){
    var lists = getSavedLists();
    el.savedListsContainer.innerHTML = "";
    if(lists.length === 0){
      el.savedListsContainer.innerHTML = '<div class="saved-empty">No saved lists yet. Name your trip and hit "Save List".</div>';
      return;
    }
    lists.slice().reverse().forEach(function(list){
      var row = document.createElement("div");
      row.className = "saved-list-item";
      var totalG = (list.items||[]).reduce(function(sum, it){
        return sum + toGrams(it.weight||0, it.unit||"oz") * (it.qty||1);
      }, 0);
      row.innerHTML =
        '<div class="info">' +
          '<span class="name">'+escapeHtml(list.tripName || "Untitled trip")+'</span>' +
          '<span class="meta">'+(list.items? list.items.length : 0)+' items &middot; '+round(gramsToLb(totalG),1)+' lb &middot; '+list.savedAt+'</span>' +
        '</div>' +
        '<button class="btn btn-forest btn-small" data-action="load" data-id="'+list.id+'">Load</button>' +
        '<button class="btn btn-danger btn-small" data-action="delete" data-id="'+list.id+'">Delete</button>';
      el.savedListsContainer.appendChild(row);
    });

    el.savedListsContainer.querySelectorAll('[data-action="load"]').forEach(function(btn){
      btn.addEventListener("click", function(){
        var id = btn.getAttribute("data-id");
        var found = getSavedLists().find(function(l){ return l.id === id; });
        if(found){
          state.tripName = found.tripName;
          state.items = JSON.parse(JSON.stringify(found.items));
          render();
          showToast("Loaded \"" + (found.tripName || "Untitled trip") + "\"");
        }
      });
    });
    el.savedListsContainer.querySelectorAll('[data-action="delete"]').forEach(function(btn){
      btn.addEventListener("click", function(){
        var id = btn.getAttribute("data-id");
        var lists2 = getSavedLists().filter(function(l){ return l.id !== id; });
        setSavedLists(lists2);
        renderSavedLists();
        showToast("Deleted saved list");
      });
    });
  }

  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, function(ch){
      return ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" })[ch];
    });
  }

  // ---------- toast ----------
  var toastTimer = null;
  function showToast(msg){
    el.toast.textContent = msg;
    el.toast.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){
      el.toast.classList.remove("show");
    }, 2200);
  }

  // ---------- event wiring ----------
  el.tripName.addEventListener("input", function(){
    state.tripName = el.tripName.value;
    persistActiveState();
  });

  el.filterSelect.addEventListener("change", function(){
    state.filter = el.filterSelect.value;
    renderChecklist();
    persistActiveState();
  });

  el.addItemBtn.addEventListener("click", addItemFromForm);
  el.newItemName.addEventListener("keydown", function(e){
    if(e.key === "Enter") addItemFromForm();
  });
  el.newItemWeight.addEventListener("keydown", function(e){
    if(e.key === "Enter") addItemFromForm();
  });

  function addItemFromForm(){
    var name = el.newItemName.value.trim();
    if(!name){
      el.newItemName.focus();
      return;
    }
    var qty = parseFloat(el.newItemQty.value) || 1;
    var weight = parseFloat(el.newItemWeight.value) || 0;
    var unit = el.newItemUnit.value;
    var category = el.newItemCategory.value;

    state.items.push({
      id: uid(),
      name: name,
      qty: qty,
      weight: weight,
      unit: unit,
      category: category,
      checked: false
    });

    el.newItemName.value = "";
    el.newItemWeight.value = "";
    el.newItemQty.value = "1";
    el.newItemName.focus();

    render();
    showToast("Added \"" + name + "\" to your pack");
  }

  el.clearCheckedBtn.addEventListener("click", function(){
    state.items.forEach(function(i){ i.checked = false; });
    render();
    showToast("All items reset to unpacked");
  });

  el.newListBtn.addEventListener("click", function(){
    if(!confirm("Start a new blank list? Unsaved changes to the current list will be lost unless you've saved it.")) return;
    state.tripName = "";
    state.items = [];
    state.filter = "all";
    render();
    showToast("Started a fresh list");
  });

  el.saveListBtn.addEventListener("click", function(){
    var name = state.tripName.trim() || ("Trip " + new Date().toLocaleDateString());
    var lists = getSavedLists();
    var now = new Date();
    var savedAt = now.toLocaleDateString() + " " + now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

    var existingIdx = lists.findIndex(function(l){ return l.tripName === name; });
    var record = {
      id: existingIdx >= 0 ? lists[existingIdx].id : uid(),
      tripName: name,
      items: JSON.parse(JSON.stringify(state.items)),
      savedAt: savedAt
    };

    if(existingIdx >= 0){
      lists[existingIdx] = record;
    } else {
      lists.push(record);
    }
    setSavedLists(lists);
    renderSavedLists();
    showToast("Saved \"" + name + "\"");
  });

  el.targetWeightInput.addEventListener("input", function(){
    var val = parseFloat(el.targetWeightInput.value) || 0;
    state.targetWeightLb = state.displayUnit === "kg" ? val / 0.453592 : val;
    renderWeightPanel();
    persistActiveState();
  });

  el.unitToggleBtns.forEach(function(btn){
    btn.addEventListener("click", function(){
      state.displayUnit = btn.getAttribute("data-unit");
      render();
    });
  });

  // ---------- init ----------
  loadActiveState();
  render();

})();
</script>

</body>
</html>
