<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tea Dunkability Simulator</title>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>

<style>
  :root{
    --bg-a: #eef2ff;
    --bg-b: #fdf6ec;
    --ink: #1d1b2e;
    --ink-soft: rgba(29,27,46,0.65);
    --glass-bg: rgba(255,255,255,0.45);
    --glass-bg-strong: rgba(255,255,255,0.65);
    --glass-border: rgba(255,255,255,0.65);
    --shadow: 0 8px 32px rgba(31,38,135,0.12);
    --accent: #b9772f;
    --accent2: #d4945a;
    --good: #3fae6a;
    --warn: #e0a526;
    --bad: #d9504c;
    --crumb: #a9763f;
  }
  html.dark{
    --bg-a: #11101c;
    --bg-b: #1b1430;
    --ink: #f3f1fb;
    --ink-soft: rgba(243,241,251,0.65);
    --glass-bg: rgba(40,36,64,0.45);
    --glass-bg-strong: rgba(46,40,72,0.62);
    --glass-border: rgba(255,255,255,0.12);
    --shadow: 0 8px 32px rgba(0,0,0,0.45);
    --accent: #e3a25c;
    --accent2: #f0bd84;
    --good: #5fd394;
    --warn: #f0c14b;
    --bad: #f47a76;
    --crumb: #c79360;
  }

  *{ box-sizing: border-box; }
  html,body{ height:100%; }
  body{
    margin:0;
    font-family: 'Segoe UI', ui-sans-serif, system-ui, -apple-system, sans-serif;
    color: var(--ink);
    background:
      radial-gradient(1200px 800px at 10% -10%, var(--bg-b), transparent 60%),
      radial-gradient(1000px 700px at 110% 10%, var(--bg-b), transparent 55%),
      linear-gradient(160deg, var(--bg-a), var(--bg-a));
    background-attachment: fixed;
    transition: color .35s ease, background .35s ease;
    overflow-x:hidden;
  }
  #root{ min-height:100vh; position:relative; }

  /* ---------- Layout ---------- */
  .wrap{
    max-width: 1180px;
    margin: 0 auto;
    padding: 28px 22px 80px;
    position:relative;
    z-index: 2;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    margin-bottom: 22px;
    flex-wrap: wrap;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:12px;
  }
  .brand .logo{
    width:42px;height:42px;border-radius:14px;
    display:flex;align-items:center;justify-content:center;
    font-size:22px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    box-shadow: 0 6px 18px rgba(185,119,47,0.35);
  }
  .brand h1{
    font-size: 1.45rem;
    margin:0;
    letter-spacing: -0.02em;
    font-weight: 800;
  }
  .brand p{
    margin:2px 0 0;
    font-size: .8rem;
    color: var(--ink-soft);
    font-weight: 500;
  }

  .toolbar-buttons{ display:flex; gap:10px; align-items:center; }
  .icon-btn{
    border:1px solid var(--glass-border);
    background: var(--glass-bg);
    backdrop-filter: blur(14px) saturate(140%);
    -webkit-backdrop-filter: blur(14px) saturate(140%);
    color: var(--ink);
    width:42px;height:42px;
    border-radius: 12px;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    font-size:1.1rem;
    transition: transform .15s ease, box-shadow .15s ease, background .2s ease;
    box-shadow: var(--shadow);
  }
  .icon-btn:hover{ transform: translateY(-2px); }
  .icon-btn:active{ transform: translateY(0px) scale(.96); }

  .help-pill{
    border:1px solid var(--glass-border);
    background: var(--glass-bg);
    backdrop-filter: blur(14px) saturate(140%);
    -webkit-backdrop-filter: blur(14px) saturate(140%);
    padding: 8px 14px;
    border-radius: 999px;
    font-size: .75rem;
    color: var(--ink-soft);
    box-shadow: var(--shadow);
    display:flex;
    gap:10px;
    align-items:center;
  }
  .help-pill kbd{
    background: var(--glass-bg-strong);
    border: 1px solid var(--glass-border);
    border-radius: 6px;
    padding: 1px 6px;
    font-family: inherit;
    font-weight:700;
    color: var(--ink);
  }

  /* ---------- Glass card ---------- */
  .glass{
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(20px) saturate(150%);
    -webkit-backdrop-filter: blur(20px) saturate(150%);
    border-radius: 22px;
    box-shadow: var(--shadow);
    position: relative;
    overflow:hidden;
  }
  .glass::before{
    content:"";
    position:absolute; inset:0;
    background: linear-gradient(135deg, rgba(255,255,255,0.35), rgba(255,255,255,0) 40%);
    pointer-events:none;
  }
  html.dark .glass::before{
    background: linear-gradient(135deg, rgba(255,255,255,0.07), rgba(255,255,255,0) 40%);
  }

  .grid{
    display:grid;
    grid-template-columns: 1.05fr 1fr;
    gap: 22px;
    align-items:start;
  }
  @media (max-width: 900px){
    .grid{ grid-template-columns: 1fr; }
  }

  .panel{
    padding: 22px 24px;
  }
  .panel h2{
    font-size: 1rem;
    margin: 0 0 4px;
    font-weight: 800;
    letter-spacing: -0.01em;
  }
  .panel .sub{
    font-size: .78rem;
    color: var(--ink-soft);
    margin: 0 0 18px;
  }

  /* ---------- Sliders ---------- */
  .control{ margin-bottom: 20px; }
  .control:last-child{ margin-bottom:0; }
  .control-label{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    margin-bottom: 8px;
    font-size: .82rem;
    font-weight: 700;
  }
  .control-label .val{
    font-variant-numeric: tabular-nums;
    color: var(--accent);
    font-weight: 800;
  }
  .control-label .key-hint{
    font-size: .65rem;
    color: var(--ink-soft);
    font-weight: 600;
    margin-left:6px;
  }

  input[type="range"]{
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 8px;
    border-radius: 999px;
    background: linear-gradient(90deg, var(--accent2), var(--accent) var(--fill,50%), rgba(120,120,140,0.18) var(--fill,50%));
    outline:none;
    cursor:pointer;
  }
  input[type="range"]::-webkit-slider-thumb{
    -webkit-appearance:none;
    width:20px;height:20px;
    border-radius:50%;
    background: #fff;
    border: 3px solid var(--accent);
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    cursor:grab;
    transition: transform .12s ease;
  }
  input[type="range"]::-webkit-slider-thumb:hover{ transform: scale(1.15); }
  input[type="range"]::-moz-range-thumb{
    width:16px;height:16px;border-radius:50%;
    background:#fff; border: 3px solid var(--accent);
    cursor:grab;
  }

  .biscuit-row{
    display:flex; gap:8px; flex-wrap:wrap;
  }
  .biscuit-chip{
    border: 1px solid var(--glass-border);
    background: var(--glass-bg-strong);
    padding: 8px 12px;
    border-radius: 12px;
    font-size: .78rem;
    font-weight:700;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:6px;
    transition: all .15s ease;
    color: var(--ink);
  }
  .biscuit-chip:hover{ transform: translateY(-1px); }
  .biscuit-chip.active{
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    box-shadow: 0 6px 16px rgba(185,119,47,0.35);
    border-color: transparent;
  }

  /* ---------- Stage (teacup) ---------- */
  .stage{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    padding: 26px 18px 18px;
    position:relative;
    min-height: 380px;
  }
  .stage-status{
    text-align:center;
    margin-bottom: 6px;
  }
  .stage-status .verdict{
    font-size: 1.05rem;
    font-weight: 800;
    letter-spacing: -0.01em;
  }
  .stage-status .verdict-sub{
    font-size: .76rem;
    color: var(--ink-soft);
    margin-top:2px;
  }

  .cup-scene{
    position: relative;
    width: 260px;
    height: 250px;
    margin-top: 6px;
  }

  .steam-wrap{
    position:absolute;
    top: -56px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 70px;
    pointer-events:none;
  }
  .steam{
    position:absolute;
    bottom:0;
    width: 14px;
    height: 40px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.85), rgba(255,255,255,0));
    filter: blur(3px);
    opacity: 0;
    animation: steamRise 3.2s ease-in infinite;
  }
  html.dark .steam{
    background: radial-gradient(circle, rgba(255,255,255,0.5), rgba(255,255,255,0));
  }
  @keyframes steamRise{
    0%{ opacity:0; transform: translateY(0) translateX(0) scale(.6) rotate(0deg); }
    15%{ opacity: .55; }
    50%{ opacity:.4; transform: translateY(-30px) translateX(6px) scale(1.1) rotate(8deg); }
    100%{ opacity:0; transform: translateY(-65px) translateX(-4px) scale(1.6) rotate(-6deg); }
  }

  .saucer{
    position:absolute;
    bottom: 6px;
    left: 50%;
    transform: translateX(-50%);
    width: 230px;
    height: 26px;
    border-radius: 50%;
    background: linear-gradient(180deg, #ffffff, #d8dce6);
    box-shadow: 0 10px 18px rgba(0,0,0,0.18), inset 0 -2px 4px rgba(0,0,0,0.08);
  }
  html.dark .saucer{
    background: linear-gradient(180deg, #423a5c, #2a2440);
    box-shadow: 0 10px 18px rgba(0,0,0,0.45), inset 0 -2px 4px rgba(0,0,0,0.25);
  }

  .cup{
    position:absolute;
    bottom: 22px;
    left: 50%;
    transform: translateX(-50%);
    width: 168px;
    height: 140px;
  }
  .cup-handle{
    position:absolute;
    right: -34px;
    top: 36px;
    width: 46px;
    height: 56px;
    border: 11px solid #fff;
    border-left-color: transparent;
    border-radius: 50%;
    box-shadow: 2px 2px 5px rgba(0,0,0,0.12);
  }
  html.dark .cup-handle{ border-color: #463c64; border-left-color: transparent; }

  .cup-body{
    position:absolute;
    inset:0;
    border-radius: 0 0 60px 60px / 0 0 70px 70px;
    background: linear-gradient(180deg, #ffffff, #eef0f5 60%, #dfe3ec);
    box-shadow: inset 0 -10px 18px rgba(0,0,0,0.07), 0 14px 22px rgba(0,0,0,0.15);
    overflow:hidden;
    border: 1px solid rgba(0,0,0,0.05);
  }
  html.dark .cup-body{
    background: linear-gradient(180deg, #4a4068, #382f54 60%, #2a2440);
    box-shadow: inset 0 -10px 18px rgba(0,0,0,0.3), 0 14px 22px rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.06);
  }

  .tea-surface-wrap{
    position:absolute;
    left: 6px; right:6px; bottom: 6px;
    height: 78%;
    border-radius: 0 0 56px 56px / 0 0 64px 64px;
    overflow:hidden;
  }
  .tea-liquid{
    position:absolute;
    left:0; right:0; bottom:0;
    height: 100%;
    background: linear-gradient(180deg, var(--tea-top), var(--tea-bottom));
    transition: background .3s ease;
  }
  .tea-shine{
    position:absolute;
    top:6px; left:10%;
    width:30%; height:14px;
    background: rgba(255,255,255,0.35);
    border-radius: 50%;
    filter: blur(3px);
  }
  .ripple{
    position:absolute;
    left:50%; top: 8px;
    width: 10px; height: 10px;
    border: 2px solid rgba(255,255,255,0.55);
    border-radius: 50%;
    transform: translate(-50%,-50%) scale(0);
    animation: rippleGo 1.4s ease-out infinite;
  }
  @keyframes rippleGo{
    0%{ transform: translate(-50%,-50%) scale(0); opacity:.8; }
    100%{ transform: translate(-50%,-50%) scale(7); opacity:0; }
  }

  .cup-rim{
    position:absolute;
    top: -7px; left: -4px; right:-4px;
    height: 16px;
    border-radius: 50%;
    background: linear-gradient(180deg, #ffffff, #d7dbe4);
    box-shadow: 0 3px 4px rgba(0,0,0,0.1);
  }
  html.dark .cup-rim{ background: linear-gradient(180deg, #574b7c, #463c64); }

  /* Biscuit */
  .biscuit{
    position:absolute;
    left:50%;
    width: 86px;
    height: 30px;
    margin-left: -43px;
    border-radius: 6px;
    background:
      repeating-linear-gradient(90deg, rgba(0,0,0,0.05) 0 2px, transparent 2px 10px),
      linear-gradient(180deg, #d9a35e, #c08641);
    box-shadow: 0 3px 6px rgba(0,0,0,0.25), inset 0 1px 1px rgba(255,255,255,0.4);
    z-index: 5;
    transform-origin: 50% 100%;
    transition: filter .25s ease;
  }
  .biscuit.choc::after{
    content:"";
    position:absolute;
    left:6px; right:6px; top: 4px; height: 9px;
    background: linear-gradient(180deg,#5b3a25,#3c2515);
    border-radius:3px;
  }
  .biscuit.cream::after{
    content:"";
    position:absolute;
    left:8px; right:8px; top:50%; height:5px;
    transform: translateY(-50%);
    background: #f3e3c0;
    border-radius:3px;
  }
  .biscuit-soggy-overlay{
    position:absolute; left:0; right:0; bottom:0;
    background: linear-gradient(180deg, rgba(90,55,20,0) 0%, rgba(74,43,14,0.85) 100%);
    border-radius: 0 0 6px 6px;
    transition: height .25s ease, opacity .25s ease;
  }
  .biscuit.crumbling{
    filter: blur(0.3px);
  }
  .biscuit.fallen{
    opacity:0;
  }

  .crumb{
    position:absolute;
    width: var(--s,5px); height: var(--s,5px);
    background: var(--crumb);
    border-radius: 1.5px;
    transform: rotate(var(--r,0deg));
    animation: crumbFall var(--dur,1.1s) cubic-bezier(.4,.6,.4,1) forwards;
    opacity:.95;
  }
  @keyframes crumbFall{
    0%{ transform: translate(0,0) rotate(0deg); opacity:1; }
    100%{ transform: translate(var(--dx,0px), var(--dy,90px)) rotate(var(--rEnd,180deg)); opacity:0; }
  }

  .splash{
    position:absolute;
    bottom: 30%;
    left:50%;
    width:8px;height:8px;
    margin-left:-4px;
    border-radius:50%;
    border:2px solid rgba(255,255,255,0.7);
    animation: splashGo .5s ease-out forwards;
  }
  @keyframes splashGo{
    0%{ transform: scale(0); opacity:1; }
    100%{ transform: scale(4); opacity:0; }
  }

  /* ---------- Sliders panel labels icons ---------- */
  .meta-row{
    display:flex;
    gap: 10px;
    margin-top: 18px;
    flex-wrap:wrap;
  }
  .meta-chip{
    flex:1;
    min-width: 120px;
    background: var(--glass-bg-strong);
    border: 1px solid var(--glass-border);
    border-radius: 14px;
    padding: 10px 12px;
  }
  .meta-chip .lbl{
    font-size: .65rem;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--ink-soft);
    font-weight: 700;
  }
  .meta-chip .v{
    font-size: 1rem;
    font-weight: 800;
    margin-top:2px;
  }

  /* ---------- Crumble-o-meter ---------- */
  .meter-card{ padding: 22px 24px; margin-top: 22px; }
  .meter-head{
    display:flex; justify-content:space-between; align-items:center; margin-bottom: 14px;
  }
  .meter-head h2{ margin:0; font-size:1rem; font-weight:800; }
  .meter-badge{
    font-size: .72rem;
    font-weight: 800;
    padding: 5px 12px;
    border-radius: 999px;
    color:white;
  }
  .graph-wrap{
    position:relative;
    width:100%;
    height: 170px;
  }
  svg.graph{ width:100%; height:100%; overflow:visible; }
  .graph-grid line{ stroke: var(--ink); opacity:.08; }
  .graph-area{ opacity:.18; }
  .graph-line{ fill:none; stroke-width:3; stroke-linecap:round; stroke-linejoin:round; }
  .graph-dot{ filter: drop-shadow(0 2px 4px rgba(0,0,0,0.25)); }
  .graph-now-line{ stroke: var(--ink); stroke-opacity:.35; stroke-dasharray: 4 4; }
  .axis-label{
    font-size: 9px;
    fill: var(--ink);
    opacity:.5;
    font-weight:600;
  }

  .zone-legend{
    display:flex; gap:14px; margin-top:10px; flex-wrap:wrap;
  }
  .zone-legend .item{
    display:flex; align-items:center; gap:6px;
    font-size:.72rem; color: var(--ink-soft); font-weight:600;
  }
  .zone-legend .dot{ width:9px;height:9px;border-radius:50%; }

  footer.app-footer{
    text-align:center;
    margin-top: 26px;
    font-size: .72rem;
    color: var(--ink-soft);
  }

  /* shortcut toast */
  .toast{
    position: fixed;
    bottom: 22px; left:50%;
    transform: translateX(-50%) translateY(0);
    background: var(--glass-bg-strong);
    border:1px solid var(--glass-border);
    backdrop-filter: blur(16px);
    padding: 10px 18px;
    border-radius: 999px;
    font-size: .8rem;
    font-weight:700;
    box-shadow: var(--shadow);
    z-index: 50;
    opacity:0;
    pointer-events:none;
    transition: opacity .25s ease, transform .25s ease;
  }
  .toast.show{ opacity:1; transform: translateX(-50%) translateY(-6px); }

  .shortcuts-modal-backdrop{
    position:fixed; inset:0;
    background: rgba(10,8,20,0.35);
    backdrop-filter: blur(3px);
    display:flex; align-items:center; justify-content:center;
    z-index: 100;
    animation: fadeIn .15s ease;
  }
  @keyframes fadeIn{ from{opacity:0;} to{opacity:1;} }
  .shortcuts-modal{
    width: min(420px, 90vw);
    padding: 26px 26px 22px;
  }
  .shortcuts-modal h3{ margin:0 0 14px; font-size:1.05rem; }
  .shortcuts-modal .row{
    display:flex; justify-content:space-between; align-items:center;
    padding: 8px 0;
    font-size:.85rem;
    border-bottom: 1px solid var(--glass-border);
  }
  .shortcuts-modal .row:last-child{ border-bottom:none; }
  .shortcuts-modal kbd{
    background: var(--glass-bg-strong);
    border:1px solid var(--glass-border);
    border-radius:6px;
    padding:2px 8px;
    font-weight:800;
  }
  .close-x{
    position:absolute; top:14px; right:14px;
    cursor:pointer;
    width:30px;height:30px;
    border-radius:8px;
    display:flex;align-items:center;justify-content:center;
    border: 1px solid var(--glass-border);
    background: var(--glass-bg-strong);
  }

  /* scrollbar tidy */
  ::-webkit-scrollbar{ width:10px; height:10px; }
  ::-webkit-scrollbar-thumb{ background: rgba(120,100,80,0.3); border-radius:8px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react,env">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

/* ---------------- Biscuit definitions ---------------- */
const BISCUITS = {
  rich_tea: {
    name: "Rich Tea",
    icon: "🟤",
    style: "plain",
    durability: 0.55,   // lower = crumbles faster
    optimalWindow: [2.2, 4.0],
    desc: "Classic & elegant. Fast collapse — the tightrope walk of biscuits.",
  },
  digestive: {
    name: "Digestive",
    icon: "🟫",
    style: "plain",
    durability: 0.85,
    optimalWindow: [3.5, 6.5],
    desc: "Sturdy and forgiving. The reliable daily-driver biscuit.",
  },
  hobnob: {
    name: "Hobnob",
    icon: "🌾",
    style: "oaty",
    durability: 1.15,
    optimalWindow: [4.5, 8.0],
    desc: "Oats give it grit. Can take a proper long soak.",
  },
  bourbon: {
    name: "Bourbon",
    icon: "🍫",
    style: "choc",
    durability: 0.95,
    optimalWindow: [3.0, 5.5],
    desc: "Choc-sandwiched. Risk of cream-layer separation at depth.",
  },
  custard_cream: {
    name: "Custard Cream",
    icon: "🟡",
    style: "cream",
    durability: 1.0,
    optimalWindow: [3.2, 6.0],
    desc: "Vanilla-cream core adds a touch of extra structure.",
  },
  ginger_nut: {
    name: "Ginger Nut",
    icon: "🟠",
    style: "plain",
    durability: 1.45,
    optimalWindow: [6.0, 11.0],
    desc: "Nearly indestructible. The tank of the biscuit tin.",
  },
};

const TOAST_DURATION = 1500;

function clamp(v, lo, hi){ return Math.max(lo, Math.min(hi, v)); }
function lerp(a,b,t){ return a + (b-a)*t; }

/* Crumble model: 0 (pristine) -> 100 (total collapse) */
function computeCrumble(tempC, dunkTime, durability, structuralIntegrity){
  // temp factor: hotter tea softens biscuit faster (normalized around 70-100C)
  const tempFactor = clamp((tempC - 55) / 45, 0, 1.6);
  // structural integrity slider (0-100) directly scales effective durability
  const integrityMult = lerp(0.45, 1.7, structuralIntegrity/100);
  const effectiveDurability = durability * integrityMult;
  // exponential-ish soak curve
  const soakRate = (0.55 + tempFactor*0.9) / effectiveDurability;
  const raw = 100 * (1 - Math.exp(-soakRate * dunkTime / 3.1));
  // small extra acceleration after long soaks (terminal collapse)
  const overSoak = Math.max(0, dunkTime - 7) * 3.2 / effectiveDurability;
  return clamp(raw + overSoak, 0, 100);
}

function crumbleSeries(tempC, durability, structuralIntegrity, maxTime){
  const pts = [];
  const steps = 36;
  for(let i=0;i<=steps;i++){
    const t = (i/steps)*maxTime;
    pts.push({ t, c: computeCrumble(tempC, t, durability, structuralIntegrity) });
  }
  return pts;
}

function verdictFor(crumble){
  if(crumble < 18) return { label: "Understeeped", color: "var(--warn)", sub: "Barely softened — give it a few more seconds." };
  if(crumble < 70) return { label: "Perfectly Dunked", color: "var(--good)", sub: "Peak structural-flavor equilibrium achieved." };
  if(crumble < 92) return { label: "Critical Softening", color: "var(--warn)", sub: "Living dangerously. Lift it now." };
  return { label: "Total Structural Failure", color: "var(--bad)", sub: "Rest in pieces, at the bottom of the cup." };
}

function teaGradientFor(tempC){
  // cooler -> lighter, hotter -> darker amber/red
  const t = clamp((tempC-40)/60, 0, 1);
  const top = `hsl(${lerp(34, 22, t)}, ${lerp(55,70,t)}%, ${lerp(58,30,t)}%)`;
  const bottom = `hsl(${lerp(28,16,t)}, ${lerp(60,75,t)}%, ${lerp(38,16,t)}%)`;
  return { top, bottom };
}

/* ---------------- Slider component ---------------- */
function Slider({ label, value, min, max, step, unit, onChange, keyHint, format }){
  const pct = ((value - min) / (max - min)) * 100;
  return (
    <div className="control">
      <div className="control-label">
        <span>{label}{keyHint && <span className="key-hint">{keyHint}</span>}</span>
        <span className="val">{format ? format(value) : value}{unit||""}</span>
      </div>
      <input
        type="range"
        min={min} max={max} step={step} value={value}
        style={{ "--fill": pct + "%" }}
        onChange={e => onChange(parseFloat(e.target.value))}
      />
    </div>
  );
}

/* ---------------- Crumb particles ---------------- */
function CrumbBurst({ active, seed }){
  const crumbs = useMemo(() => {
    if(!active) return [];
    const n = 14;
    return Array.from({length:n}, (_,i) => {
      const angle = (Math.random()*2-1) * 50;
      const dist = 18 + Math.random()*34;
      const rad = angle * Math.PI/180;
      return {
        id: seed + "-" + i,
        left: 50 + (Math.random()*70-35),
        size: 3 + Math.random()*5,
        dx: Math.sin(rad)*dist,
        dy: 60 + Math.random()*50,
        dur: 0.8 + Math.random()*0.9,
        rot: Math.random()*360,
        rotEnd: Math.random()*360 + 180,
        delay: Math.random()*0.3,
      };
    });
  }, [active, seed]);

  if(!active) return null;
  return crumbs.map(c => (
    <div key={c.id} className="crumb" style={{
      left: c.left + "%",
      top: "10%",
      "--s": c.size + "px",
      "--dx": c.dx + "px",
      "--dy": c.dy + "px",
      "--r": c.rot + "deg",
      "--rEnd": c.rotEnd + "deg",
      "--dur": c.dur + "s",
      animationDelay: c.delay + "s",
    }} />
  ));
}

/* ---------------- Main App ---------------- */
function App(){
  const [dark, setDark] = useState(() => window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
  const [temp, setTemp] = useState(85);
  const [dunkTime, setDunkTime] = useState(3.5);
  const [biscuitKey, setBiscuitKey] = useState("digestive");
  const [integrity, setIntegrity] = useState(60);
  const [playing, setPlaying] = useState(true);
  const [animT, setAnimT] = useState(0); // 0..dunkTime, loops
  const [showShortcuts, setShowShortcuts] = useState(false);
  const [toast, setToast] = useState("");
  const toastTimer = useRef(null);
  const [crumbSeed, setCrumbSeed] = useState(0);
  const wasOverRef = useRef(false);

  const biscuit = BISCUITS[biscuitKey];

  useEffect(() => {
    document.documentElement.classList.toggle('dark', dark);
  }, [dark]);

  const flashToast = useCallback((msg) => {
    setToast(msg);
    clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(""), TOAST_DURATION);
  }, []);

  // Animation loop: a "dunk cycle" of length (dunkTime + 1.2s lift/pause), looping
  const rafRef = useRef(null);
  const lastTsRef = useRef(null);
  const cycleLen = dunkTime + 1.6;

  useEffect(() => {
    if(!playing){ lastTsRef.current = null; return; }
    function step(ts){
      if(lastTsRef.current == null) lastTsRef.current = ts;
      const dt = (ts - lastTsRef.current)/1000;
      lastTsRef.current = ts;
      setAnimT(prev => {
        let next = prev + dt;
        if(next > cycleLen) next = next % cycleLen;
        return next;
      });
      rafRef.current = requestAnimationFrame(step);
    }
    rafRef.current = requestAnimationFrame(step);
    return () => cancelAnimationFrame(rafRef.current);
  }, [playing, cycleLen]);

  // dunk progress 0..1 over dunkTime within the cycle (then holds up out of liquid)
  const inLiquid = animT <= dunkTime;
  const elapsedDunk = clamp(animT, 0, dunkTime);
  const liveCrumble = computeCrumble(temp, elapsedDunk, biscuit.durability, integrity);

  // detect crossing into "over-dunk" zone -> trigger crumb burst
  useEffect(() => {
    const over = liveCrumble > 92 && inLiquid;
    if(over && !wasOverRef.current){
      setCrumbSeed(s => s+1);
    }
    wasOverRef.current = over;
  }, [liveCrumble, inLiquid]);

  const verdict = verdictFor(liveCrumble);
  const teaColors = teaGradientFor(temp);

  const series = useMemo(
    () => crumbleSeries(temp, biscuit.durability, integrity, Math.max(dunkTime*1.6, 10)),
    [temp, biscuit.durability, integrity, dunkTime]
  );

  // biscuit visual state
  const dunkDepthPct = inLiquid ? clamp((elapsedDunk/Math.max(dunkTime,0.001)), 0, 1) : 0;
  // when lifted (animT>dunkTime), animate biscuit rising out
  const liftProgress = inLiquid ? 0 : clamp((animT - dunkTime) / 1.6, 0, 1);
  const submergeDepth = inLiquid ? lerp(2, 26, dunkDepthPct) : lerp(26, -6, liftProgress);
  const fallen = !inLiquid && liftProgress > 0.55 && liveCrumble > 92;

  const sogPct = clamp(liveCrumble/100, 0, 1);

  /* ---------- Keyboard shortcuts ---------- */
  useEffect(() => {
    function onKey(e){
      if(e.target.tagName === 'INPUT') return;
      switch(e.key){
        case ' ': {
          e.preventDefault();
          setPlaying(p => { flashToast(!p ? "Resumed" : "Paused"); return !p; });
          break;
        }
        case 'd': case 'D': {
          setDark(d => { flashToast(!d ? "Dark mode" : "Light mode"); return !d; });
          break;
        }
        case 'ArrowUp': {
          e.preventDefault();
          setTemp(t => { const v = clamp(t+2,40,100); flashToast("Temp " + v + "°C"); return v; });
          break;
        }
        case 'ArrowDown': {
          e.preventDefault();
          setTemp(t => { const v = clamp(t-2,40,100); flashToast("Temp " + v + "°C"); return v; });
          break;
        }
        case 'ArrowRight': {
          e.preventDefault();
          setDunkTime(t => { const v = clamp(+(t+0.5).toFixed(1),0,12); flashToast("Dunk " + v + "s"); return v; });
          break;
        }
        case 'ArrowLeft': {
          e.preventDefault();
          setDunkTime(t => { const v = clamp(+(t-0.5).toFixed(1),0,12); flashToast("Dunk " + v + "s"); return v; });
          break;
        }
        case '1': case '2': case '3': case '4': case '5': case '6': {
          const idx = parseInt(e.key,10) - 1;
          const keys = Object.keys(BISCUITS);
          if(keys[idx]){ setBiscuitKey(keys[idx]); flashToast(BISCUITS[keys[idx]].name); }
          break;
        }
        case '?': {
          setShowShortcuts(s => !s);
          break;
        }
        case 'r': case 'R': {
          setTemp(85); setDunkTime(3.5); setIntegrity(60); setBiscuitKey('digestive');
          flashToast("Reset to defaults");
          break;
        }
        case 'Escape': {
          setShowShortcuts(false);
          break;
        }
        default: break;
      }
    }
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [flashToast]);

  const graphW = 600, graphH = 150;
  const maxTime = series[series.length-1].t;
  const xFor = t => (t/maxTime) * graphW;
  const yFor = c => graphH - (c/100)*graphH;
  const linePath = series.map((p,i) => `${i===0?'M':'L'} ${xFor(p.t).toFixed(1)} ${yFor(p.c).toFixed(1)}`).join(' ');
  const areaPath = linePath + ` L ${graphW} ${graphH} L 0 ${graphH} Z`;
  const nowX = xFor(clamp(elapsedDunk,0,maxTime));

  const lineColor = liveCrumble < 18 ? 'var(--warn)' : liveCrumble < 70 ? 'var(--good)' : liveCrumble < 92 ? 'var(--warn)' : 'var(--bad)';

  return (
    <div className="wrap">
      <div className="topbar">
        <div className="brand">
          <div className="logo">🍵</div>
          <div>
            <h1>Tea Dunkability Simulator</h1>
            <p>Empirical biscuit-collapse modeling, in real time</p>
          </div>
        </div>
        <div className="toolbar-buttons">
          <div className="help-pill">
            <span><kbd>space</kbd> play/pause</span>
            <span><kbd>?</kbd> shortcuts</span>
          </div>
          <button className="icon-btn" onClick={() => setPlaying(p=>!p)} title="Play/Pause (space)">
            {playing ? "⏸" : "▶"}
          </button>
          <button className="icon-btn" onClick={() => setDark(d=>!d)} title="Toggle dark mode (D)">
            {dark ? "☀️" : "🌙"}
          </button>
          <button className="icon-btn" onClick={() => setShowShortcuts(true)} title="Keyboard shortcuts (?)">
            ⌨
          </button>
        </div>
      </div>

      <div className="grid">
        {/* Controls panel */}
        <div className="glass panel">
          <h2>Dunk Parameters</h2>
          <p className="sub">Tune the variables. Physics (mostly fictional) updates instantly.</p>

          <Slider
            label="Tea Temperature" value={temp} min={40} max={100} step={1} unit="°C"
            keyHint="↑↓" onChange={setTemp}
          />
          <Slider
            label="Dunk Duration" value={dunkTime} min={0} max={12} step={0.1} unit="s"
            keyHint="←→" onChange={setDunkTime}
            format={v => v.toFixed(1)}
          />
          <Slider
            label="Structural Integrity" value={integrity} min={0} max={100} step={1} unit="%"
            onChange={setIntegrity}
          />

          <div className="control">
            <div className="control-label"><span>Biscuit Type<span className="key-hint">1-6</span></span></div>
            <div className="biscuit-row">
              {Object.entries(BISCUITS).map(([key, b]) => (
                <div
                  key={key}
                  className={"biscuit-chip" + (key===biscuitKey ? " active" : "")}
                  onClick={() => setBiscuitKey(key)}
                >
                  <span>{b.icon}</span><span>{b.name}</span>
                </div>
              ))}
            </div>
          </div>

          <div className="meta-row">
            <div className="meta-chip">
              <div className="lbl">Durability</div>
              <div className="v">{biscuit.durability.toFixed(2)}×</div>
            </div>
            <div className="meta-chip">
              <div className="lbl">Optimal Window</div>
              <div className="v">{biscuit.optimalWindow[0]}–{biscuit.optimalWindow[1]}s</div>
            </div>
            <div className="meta-chip">
              <div className="lbl">Live Crumble</div>
              <div className="v" style={{color: lineColor}}>{liveCrumble.toFixed(0)}%</div>
            </div>
          </div>
          <p className="sub" style={{marginTop:14, marginBottom:0}}>{biscuit.desc}</p>
        </div>

        {/* Stage panel */}
        <div className="glass stage">
          <div className="stage-status">
            <div className="verdict" style={{color: verdict.color}}>{verdict.label}</div>
            <div className="verdict-sub">{verdict.sub}</div>
          </div>

          <div className="cup-scene">
            <div className="steam-wrap">
              <div className="steam" style={{left:'30px', animationDelay:'0s', opacity: temp>60?1:0.15}}></div>
              <div className="steam" style={{left:'55px', animationDelay:'1.1s', opacity: temp>60?1:0.15}}></div>
              <div className="steam" style={{left:'80px', animationDelay:'2.1s', opacity: temp>60?1:0.15}}></div>
            </div>

            <div className="cup">
              <div className="cup-handle"></div>
              <div className="cup-rim"></div>
              <div className="cup-body">
                <div className="tea-surface-wrap">
                  <div className="tea-liquid" style={{"--tea-top": teaColors.top, "--tea-bottom": teaColors.bottom}}>
                    <div className="tea-shine"></div>
                    <div className="ripple" style={{animationDelay:'0s'}}></div>
                    <div className="ripple" style={{animationDelay:'0.7s'}}></div>
                  </div>

                  {/* biscuit, dunked depth controlled by translateY */}
                  {!fallen && (
                    <div
                      className={"biscuit " + biscuit.style + (liveCrumble>70 ? " crumbling" : "")}
                      style={{
                        top: "-18px",
                        transform: `translateY(${submergeDepth}px) rotate(${liveCrumble>80 ? (Math.sin(animT*9)*3) : 0}deg)`,
                        opacity: liveCrumble>92 ? Math.max(0, 1-(liveCrumble-92)/10) : 1,
                      }}
                    >
                      <div className="biscuit-soggy-overlay" style={{ height: (sogPct*100)+"%", opacity: sogPct }} />
                    </div>
                  )}

                  <CrumbBurst active={crumbSeed>0} seed={crumbSeed} />
                </div>
              </div>
            </div>
            <div className="saucer"></div>
          </div>
        </div>
      </div>

      {/* Crumble-o-meter */}
      <div className="glass meter-card">
        <div className="meter-head">
          <h2>Crumble-o-Meter™</h2>
          <span className="meter-badge" style={{background: lineColor}}>
            {liveCrumble.toFixed(0)}% collapsed
          </span>
        </div>
        <div className="graph-wrap">
          <svg className="graph" viewBox={`0 0 ${graphW} ${graphH}`} preserveAspectRatio="none">
            <defs>
              <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor={lineColor} stopOpacity="0.6" />
                <stop offset="100%" stopColor={lineColor} stopOpacity="0" />
              </linearGradient>
            </defs>
            <g className="graph-grid">
              <line x1="0" y1={graphH*0.18} x2={graphW} y2={graphH*0.18} />
              <line x1="0" y1={graphH*0.7} x2={graphW} y2={graphH*0.7} />
              <line x1="0" y1={graphH*0.92} x2={graphW} y2={graphH*0.92} />
            </g>
            <path d={areaPath} fill="url(#areaGrad)" className="graph-area" />
            <path d={linePath} className="graph-line" stroke={lineColor} />
            <line x1={nowX} y1="0" x2={nowX} y2={graphH} className="graph-now-line" />
            <circle className="graph-dot" cx={nowX} cy={yFor(liveCrumble)} r="6" fill={lineColor} stroke="white" strokeWidth="2" />
            <text x={graphW-4} y={graphH*0.18-4} textAnchor="end" className="axis-label">soggy</text>
            <text x={graphW-4} y={graphH*0.7-4} textAnchor="end" className="axis-label">optimal</text>
            <text x={graphW-4} y={graphH*0.92-4} textAnchor="end" className="axis-label">collapse</text>
          </svg>
        </div>
        <div className="zone-legend">
          <div className="item"><span className="dot" style={{background:'var(--warn)'}}></span> Understeeped (&lt;18%)</div>
          <div className="item"><span className="dot" style={{background:'var(--good)'}}></span> Perfect zone (18–70%)</div>
          <div className="item"><span className="dot" style={{background:'var(--warn)'}}></span> Critical (70–92%)</div>
          <div className="item"><span className="dot" style={{background:'var(--bad)'}}></span> Collapse (&gt;92%)</div>
        </div>
      </div>

      <footer className="app-footer">
        Crumble physics are simulated for entertainment purposes. No biscuits were harmed (most survived).
      </footer>

      <div className={"toast" + (toast ? " show" : "")}>{toast}</div>

      {showShortcuts && (
        <div className="shortcuts-modal-backdrop" onClick={() => setShowShortcuts(false)}>
          <div className="glass shortcuts-modal" onClick={e => e.stopPropagation()}>
            <div className="close-x" onClick={() => setShowShortcuts(false)}>✕</div>
            <h3>Keyboard Shortcuts</h3>
            <div className="row"><span>Play / pause dunk loop</span><kbd>space</kbd></div>
            <div className="row"><span>Temperature ± 2°C</span><kbd>↑ / ↓</kbd></div>
            <div className="row"><span>Dunk duration ± 0.5s</span><kbd>← / →</kbd></div>
            <div className="row"><span>Select biscuit</span><kbd>1–6</kbd></div>
            <div className="row"><span>Toggle dark mode</span><kbd>D</kbd></div>
            <div className="row"><span>Reset to defaults</span><kbd>R</kbd></div>
            <div className="row"><span>Toggle this panel</span><kbd>?</kbd></div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
