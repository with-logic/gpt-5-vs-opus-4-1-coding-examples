<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Poll Board</title>
<style>
  :root {
    --bg-1: #fff7ec;
    --bg-2: #ffe9f3;
    --bg-3: #eaf6ff;
    --ink: #2d2a3d;
    --muted: #8a8499;
    --card: #ffffff;
    --shadow: 0 10px 30px rgba(94, 67, 140, 0.08);
    --shadow-hover: 0 16px 40px rgba(94, 67, 140, 0.14);
    --radius: 20px;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    min-height: 100%;
  }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif;
    color: var(--ink);
    background:
      radial-gradient(1200px 600px at 10% -10%, #ffe3c7 0%, transparent 60%),
      radial-gradient(1000px 700px at 110% 10%, #d9f0ff 0%, transparent 55%),
      radial-gradient(900px 600px at 50% 120%, #ffd9ec 0%, transparent 55%),
      linear-gradient(180deg, var(--bg-1), var(--bg-3) 60%, var(--bg-2));
    background-attachment: fixed;
    min-height: 100vh;
    padding-bottom: 80px;
  }

  /* Floating background shapes */
  .bg-shapes {
    position: fixed;
    inset: 0;
    overflow: hidden;
    z-index: 0;
    pointer-events: none;
  }
  .shape {
    position: absolute;
    border-radius: 50%;
    opacity: 0.35;
    filter: blur(2px);
    animation: float 14s ease-in-out infinite;
  }
  .shape.s1 { width: 90px; height: 90px; background: #ffd1ec; top: 8%; left: 5%; animation-duration: 16s; }
  .shape.s2 { width: 50px; height: 50px; background: #c8ecff; top: 60%; left: 88%; animation-duration: 12s; animation-delay: -3s; }
  .shape.s3 { width: 70px; height: 70px; background: #fff3bf; top: 80%; left: 12%; animation-duration: 18s; animation-delay: -6s; }
  .shape.s4 { width: 40px; height: 40px; background: #d6ffe0; top: 20%; left: 92%; animation-duration: 10s; animation-delay: -1s; }
  .shape.s5 { width: 60px; height: 60px; background: #e3d9ff; top: 40%; left: 2%; animation-duration: 15s; animation-delay: -8s; }

  @keyframes float {
    0%, 100% { transform: translateY(0) translateX(0) scale(1); }
    33% { transform: translateY(-30px) translateX(20px) scale(1.08); }
    66% { transform: translateY(20px) translateX(-15px) scale(0.95); }
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 880px;
    margin: 0 auto;
    padding: 48px 20px 0;
  }

  header.top {
    text-align: center;
    margin-bottom: 36px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--card);
    padding: 6px 16px;
    border-radius: 999px;
    box-shadow: var(--shadow);
    font-size: 13px;
    font-weight: 600;
    color: #c2659a;
    margin-bottom: 18px;
    letter-spacing: 0.02em;
  }
  .badge .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #4ade80;
    box-shadow: 0 0 0 4px rgba(74, 222, 128, 0.25);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 4px rgba(74, 222, 128, 0.25); }
    50% { box-shadow: 0 0 0 7px rgba(74, 222, 128, 0.1); }
  }

  h1.title {
    font-size: 42px;
    font-weight: 800;
    margin: 0 0 10px;
    background: linear-gradient(95deg, #ff8fb1, #a78bfa 50%, #60a5fa);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    letter-spacing: -0.02em;
  }

  p.subtitle {
    color: var(--muted);
    font-size: 16px;
    max-width: 480px;
    margin: 0 auto;
    line-height: 1.5;
  }

  .stats-row {
    display: flex;
    justify-content: center;
    gap: 28px;
    margin-top: 28px;
    flex-wrap: wrap;
  }
  .stat-pill {
    background: var(--card);
    border-radius: 16px;
    padding: 12px 22px;
    box-shadow: var(--shadow);
    text-align: center;
    min-width: 110px;
  }
  .stat-pill .num {
    font-size: 22px;
    font-weight: 800;
    color: #7c5cff;
  }
  .stat-pill .label {
    font-size: 12px;
    color: var(--muted);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .poll-list {
    display: flex;
    flex-direction: column;
    gap: 24px;
    margin-top: 40px;
  }

  .poll-card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 26px 28px 24px;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
    position: relative;
    overflow: hidden;
  }
  .poll-card::before {
    content: "";
    position: absolute;
    top: 0; left: 0;
    width: 6px; height: 100%;
    background: linear-gradient(180deg, var(--accent-a, #ff8fb1), var(--accent-b, #7c5cff));
  }
  .poll-card:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow-hover);
  }

  .poll-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
    margin-bottom: 4px;
  }

  .poll-category {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 4px 10px;
    border-radius: 999px;
    margin-bottom: 10px;
    color: #fff;
    background: var(--accent-a, #ff8fb1);
  }

  .poll-question {
    font-size: 19px;
    font-weight: 700;
    margin: 0 0 4px;
    line-height: 1.35;
  }

  .poll-meta {
    font-size: 13px;
    color: var(--muted);
    white-space: nowrap;
    text-align: right;
    flex-shrink: 0;
  }

  .total-votes {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 18px;
  }
  .total-votes b { color: var(--ink); }

  .options {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .option {
    position: relative;
    border-radius: 14px;
    border: 2px solid #f1edf7;
    background: #fbfaff;
    cursor: pointer;
    overflow: hidden;
    transition: border-color 0.2s ease, transform 0.15s ease;
    user-select: none;
  }
  .option:hover:not(.voted) {
    border-color: var(--accent-a, #ff8fb1);
    transform: translateX(2px);
  }
  .option:active:not(.voted) {
    transform: scale(0.99);
  }

  .option .fill {
    position: absolute;
    top: 0; left: 0; bottom: 0;
    width: 0%;
    background: linear-gradient(90deg, var(--accent-a, #ffd6e6), var(--accent-b, #e3d9ff));
    transition: width 1.1s cubic-bezier(0.16, 1, 0.3, 1);
    z-index: 0;
  }

  .option .row {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 13px 16px;
    gap: 10px;
  }

  .option .opt-label {
    font-weight: 600;
    font-size: 14.5px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .option .check {
    width: 19px;
    height: 19px;
    border-radius: 50%;
    border: 2px solid #d8d2e6;
    background: #fff;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.25s ease;
  }
  .option.voted .check {
    border-color: var(--accent-b, #7c5cff);
    background: var(--accent-b, #7c5cff);
  }
  .option.voted .check::after {
    content: "✓";
    color: #fff;
    font-size: 11px;
    font-weight: 900;
  }

  .option .opt-right {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .option .pct {
    font-weight: 800;
    font-size: 14px;
    min-width: 40px;
    text-align: right;
    color: var(--ink);
    font-variant-numeric: tabular-nums;
  }

  .option .votecount {
    font-size: 12px;
    color: var(--muted);
    min-width: 56px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  .option.winner .check {
    border-color: #f5a623;
  }
  .option.winner.voted .check {
    background: #f5a623;
    border-color: #f5a623;
  }
  .option.winner .pct {
    color: #e08c00;
  }
  .crown {
    font-size: 13px;
    margin-left: 4px;
  }

  .poll-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 18px;
    padding-top: 14px;
    border-top: 1px dashed #ece7f5;
  }

  .reset-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 12.5px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 6px 10px;
    border-radius: 8px;
    transition: background 0.2s ease, color 0.2s ease;
  }
  .reset-btn:hover {
    background: #f6f2fc;
    color: #7c5cff;
  }

  .live-indicator {
    font-size: 12px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .live-indicator .live-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #4ade80;
  }

  .floater {
    position: absolute;
    font-weight: 800;
    font-size: 15px;
    color: #7c5cff;
    pointer-events: none;
    animation: rise 1s ease-out forwards;
    z-index: 5;
  }
  @keyframes rise {
    0% { opacity: 0; transform: translateY(0) scale(0.8); }
    15% { opacity: 1; transform: translateY(-6px) scale(1.1); }
    100% { opacity: 0; transform: translateY(-46px) scale(1); }
  }

  .confetti-piece {
    position: fixed;
    top: -10px;
    border-radius: 2px;
    pointer-events: none;
    z-index: 50;
    animation: confetti-fall linear forwards;
  }
  @keyframes confetti-fall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(540deg); opacity: 0.3; }
  }

  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #2d2a3d;
    color: #fff;
    padding: 12px 22px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    box-shadow: 0 12px 30px rgba(0,0,0,0.25);
    opacity: 0;
    transition: opacity 0.3s ease, transform 0.3s ease;
    z-index: 100;
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  footer.app-footer {
    text-align: center;
    margin-top: 56px;
    color: var(--muted);
    font-size: 13px;
  }
  footer.app-footer span {
    color: #c2659a;
    font-weight: 700;
  }

  @media (max-width: 560px) {
    h1.title { font-size: 32px; }
    .poll-card { padding: 20px 18px; }
    .poll-head { flex-direction: column; }
    .poll-meta { text-align: left; }
    .stats-row { gap: 14px; }
  }
</style>
</head>
<body>

<div class="bg-shapes">
  <div class="shape s1"></div>
  <div class="shape s2"></div>
  <div class="shape s3"></div>
  <div class="shape s4"></div>
  <div class="shape s5"></div>
</div>

<div class="wrap">
  <header class="top">
    <div class="badge"><span class="dot"></span> Live voting open now</div>
    <h1 class="title">Online Poll Board</h1>
    <p class="subtitle">Pick your favorites, watch the bars race in real time, and see what everyone else thinks. One vote per poll — make it count!</p>

    <div class="stats-row">
      <div class="stat-pill">
        <div class="num" id="statPolls">0</div>
        <div class="label">Polls</div>
      </div>
      <div class="stat-pill">
        <div class="num" id="statVotes">0</div>
        <div class="label">Total Votes</div>
      </div>
      <div class="stat-pill">
        <div class="num" id="statVoted">0</div>
        <div class="label">You Voted In</div>
      </div>
    </div>
  </header>

  <main class="poll-list" id="pollList"></main>

  <footer class="app-footer">
    Made with <span>♥</span> for curious minds — votes are simulated locally and reset on reload.
  </footer>
</div>

<div class="toast" id="toast"></div>

<script>
(function () {
  const ACCENTS = [
    ['#ff8fb1', '#7c5cff'],
    ['#60a5fa', '#34d399'],
    ['#fbbf24', '#fb7185'],
    ['#a78bfa', '#22d3ee'],
    ['#f472b6', '#818cf8'],
  ];

  const initialPolls = [
    {
      id: 'p1',
      category: 'Food',
      question: '🍕 What\'s the ultimate pizza topping?',
      options: [
        { label: 'Pepperoni', votes: 412 },
        { label: 'Mushroom & Truffle', votes: 187 },
        { label: 'Pineapple (fight me)', votes: 256 },
        { label: 'Extra Cheese', votes: 333 },
      ],
    },
    {
      id: 'p2',
      category: 'Tech',
      question: '💻 Which language sparks the most joy?',
      options: [
        { label: 'JavaScript', votes: 540 },
        { label: 'Python', votes: 612 },
        { label: 'Rust', votes: 298 },
        { label: 'Go', votes: 221 },
      ],
    },
    {
      id: 'p3',
      category: 'Lifestyle',
      question: '☕ How do you take your coffee?',
      options: [
        { label: 'Black, no nonsense', votes: 198 },
        { label: 'Oat milk latte', votes: 341 },
        { label: 'Iced, year-round', votes: 289 },
        { label: 'I don\'t drink coffee', votes: 102 },
      ],
    },
    {
      id: 'p4',
      category: 'Entertainment',
      question: '🎬 Best way to spend a Friday night?',
      options: [
        { label: 'Movie marathon', votes: 276 },
        { label: 'Out with friends', votes: 358 },
        { label: 'Video games', votes: 301 },
        { label: 'Early to bed', votes: 144 },
      ],
    },
    {
      id: 'p5',
      category: 'Travel',
      question: '✈️ Dream vacation vibe?',
      options: [
        { label: 'Tropical beach', votes: 389 },
        { label: 'Mountain cabin', votes: 244 },
        { label: 'Big city lights', votes: 267 },
        { label: 'Backpacking adventure', votes: 198 },
      ],
    },
  ];

  const STORAGE_KEY = 'pollboard_votes_v1';
  let votedMap = {};
  try {
    const saved = sessionStorage.getItem(STORAGE_KEY);
    if (saved) votedMap = JSON.parse(saved);
  } catch (e) { votedMap = {}; }

  const pollListEl = document.getElementById('pollList');
  const toastEl = document.getElementById('toast');
  const statPolls = document.getElementById('statPolls');
  const statVotes = document.getElementById('statVotes');
  const statVoted = document.getElementById('statVoted');

  let toastTimer = null;
  function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2200);
  }

  function totalVotes(poll) {
    return poll.options.reduce((s, o) => s + o.votes, 0);
  }

  function winnerIndex(poll) {
    let maxV = -1, idx = -1;
    poll.options.forEach((o, i) => {
      if (o.votes > maxV) { maxV = o.votes; idx = i; }
    });
    return idx;
  }

  function updateStats() {
    const totalPolls = initialPolls.length;
    const totalAllVotes = initialPolls.reduce((s, p) => s + totalVotes(p), 0);
    const votedCount = Object.keys(votedMap).length;
    animateNumber(statPolls, totalPolls);
    animateNumber(statVotes, totalAllVotes);
    animateNumber(statVoted, votedCount);
  }

  const numCache = new WeakMap();
  function animateNumber(el, target) {
    const from = numCache.get(el) ?? 0;
    numCache.set(el, target);
    if (from === target) { el.textContent = target.toLocaleString(); return; }
    const duration = 500;
    const start = performance.now();
    function step(now) {
      const t = Math.min(1, (now - start) / duration);
      const eased = 1 - Math.pow(1 - t, 3);
      const val = Math.round(from + (target - from) * eased);
      el.textContent = val.toLocaleString();
      if (t < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

  function buildPollCard(poll, accentIdx) {
    const [a, b] = ACCENTS[accentIdx % ACCENTS.length];
    const card = document.createElement('div');
    card.className = 'poll-card';
    card.style.setProperty('--accent-a', a);
    card.style.setProperty('--accent-b', b);
    card.dataset.pollId = poll.id;

    const userVote = votedMap[poll.id];
    const tv = totalVotes(poll);
    const wIdx = winnerIndex(poll);

    card.innerHTML = `
      <div class="poll-head">
        <div>
          <span class="poll-category" style="background:${a}">${poll.category}</span>
          <h2 class="poll-question">${poll.question}</h2>
        </div>
        <div class="poll-meta">
          <div class="live-indicator"><span class="live-dot"></span>Live</div>
        </div>
      </div>
      <div class="total-votes"><b class="tv-count">${tv.toLocaleString()}</b> votes so far</div>
      <div class="options"></div>
      <div class="poll-footer">
        <span style="font-size:12px;color:var(--muted)">${userVote !== undefined ? 'Thanks for voting! 🎉' : 'Tap an option to vote'}</span>
        <button class="reset-btn" data-action="reset">↺ Reset my vote</button>
      </div>
    `;

    const optsEl = card.querySelector('.options');
    poll.options.forEach((opt, i) => {
      const optEl = document.createElement('div');
      optEl.className = 'option';
      optEl.dataset.idx = i;
      if (userVote !== undefined) optEl.classList.add('voted');
      if (i === wIdx && tv > 0) optEl.classList.add('winner');

      const pct = tv > 0 ? Math.round((opt.votes / tv) * 100) : 0;

      optEl.innerHTML = `
        <div class="fill" style="width:${userVote !== undefined ? pct : 0}%"></div>
        <div class="row">
          <span class="opt-label"><span class="check"></span>${opt.label}${i === wIdx && tv > 0 ? '<span class="crown">👑</span>' : ''}</span>
          <span class="opt-right">
            <span class="votecount">${opt.votes.toLocaleString()} votes</span>
            <span class="pct">${userVote !== undefined ? pct + '%' : ''}</span>
          </span>
        </div>
      `;
      optsEl.appendChild(optEl);
    });

    return card;
  }

  function renderAll() {
    pollListEl.innerHTML = '';
    initialPolls.forEach((poll, i) => {
      pollListEl.appendChild(buildPollCard(poll, i));
    });
    updateStats();
  }

  function spawnFloater(targetEl, text) {
    const rect = targetEl.getBoundingClientRect();
    const f = document.createElement('div');
    f.className = 'floater';
    f.textContent = text;
    f.style.left = (rect.right - 50) + 'px';
    f.style.top = (rect.top + window.scrollY + 8) + 'px';
    f.style.position = 'absolute';
    document.body.appendChild(f);
    setTimeout(() => f.remove(), 1000);
  }

  function burstConfetti(originEl) {
    const colors = ['#ff8fb1', '#7c5cff', '#60a5fa', '#fbbf24', '#34d399', '#f472b6'];
    const rect = originEl.getBoundingClientRect();
    const count = 22;
    for (let i = 0; i < count; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      const size = 6 + Math.random() * 6;
      piece.style.width = size + 'px';
      piece.style.height = (size * 0.4) + 'px';
      piece.style.background = colors[Math.floor(Math.random() * colors.length)];
      piece.style.left = (rect.left + rect.width / 2 + (Math.random() - 0.5) * 200) + 'px';
      piece.style.animationDuration = (1.4 + Math.random() * 1.2) + 's';
      piece.style.top = (rect.top - 10) + 'px';
      document.body.appendChild(piece);
      setTimeout(() => piece.remove(), 2800);
    }
  }

  function handleVote(pollId, optIdx) {
    const poll = initialPolls.find(p => p.id === pollId);
    if (!poll) return;
    if (votedMap[pollId] !== undefined) return;

    poll.options[optIdx].votes += 1;
    votedMap[pollId] = optIdx;
    try { sessionStorage.setItem(STORAGE_KEY, JSON.stringify(votedMap)); } catch (e) {}

    const card = pollListEl.querySelector(`[data-poll-id="${pollId}"]`);
    const optEls = card.querySelectorAll('.option');
    const tv = totalVotes(poll);
    const wIdx = winnerIndex(poll);

    optEls.forEach((el, i) => {
      const opt = poll.options[i];
      const pct = tv > 0 ? Math.round((opt.votes / tv) * 100) : 0;
      el.classList.add('voted');
      el.classList.toggle('winner', i === wIdx);
      el.querySelector('.fill').style.width = pct + '%';
      el.querySelector('.pct').textContent = pct + '%';
      el.querySelector('.votecount').textContent = opt.votes.toLocaleString() + ' votes';
      const labelEl = el.querySelector('.opt-label');
      const existingCrown = labelEl.querySelector('.crown');
      if (i === wIdx && tv > 0 && !existingCrown) {
        labelEl.insertAdjacentHTML('beforeend', '<span class="crown">👑</span>');
      } else if (!(i === wIdx && tv > 0) && existingCrown) {
        existingCrown.remove();
      }
    });

    card.querySelector('.tv-count').textContent = tv.toLocaleString();
    card.querySelector('.poll-footer span').textContent = 'Thanks for voting! 🎉';

    spawnFloater(optEls[optIdx], '+1');
    burstConfetti(optEls[optIdx]);
    showToast(`Vote counted for "${poll.options[optIdx].label}"!`);
    updateStats();
  }

  function handleReset(pollId) {
    const poll = initialPolls.find(p => p.id === pollId);
    if (!poll) return;
    const prevIdx = votedMap[pollId];
    if (prevIdx === undefined) return;

    poll.options[prevIdx].votes = Math.max(0, poll.options[prevIdx].votes - 1);
    delete votedMap[pollId];
    try { sessionStorage.setItem(STORAGE_KEY, JSON.stringify(votedMap)); } catch (e) {}

    const card = pollListEl.querySelector(`[data-poll-id="${pollId}"]`);
    const newCard = buildPollCard(poll, initialPolls.indexOf(poll));
    card.replaceWith(newCard);
    showToast('Your vote was reset.');
    updateStats();
  }

  pollListEl.addEventListener('click', (e) => {
    const resetBtn = e.target.closest('[data-action="reset"]');
    const card = e.target.closest('.poll-card');
    if (!card) return;
    const pollId = card.dataset.pollId;

    if (resetBtn) {
      handleReset(pollId);
      return;
    }

    const optEl = e.target.closest('.option');
    if (optEl && !optEl.classList.contains('voted')) {
      handleVote(pollId, Number(optEl.dataset.idx));
    }
  });

  renderAll();
})();
</script>
</body>
</html>
