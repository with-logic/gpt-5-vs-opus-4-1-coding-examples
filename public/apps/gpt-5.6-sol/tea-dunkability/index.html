<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0d100f" />
  <title>Steep Risk — Tea Dunkability Simulator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Manrope:wght@400;500;600;700&family=Newsreader:opsz,wght@6..72,400;6..72,500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #eef0e8;
      --bg-soft: #e7e9df;
      --surface: rgba(255, 255, 251, .62);
      --surface-strong: rgba(255, 255, 251, .84);
      --line: rgba(31, 39, 34, .13);
      --line-strong: rgba(31, 39, 34, .22);
      --ink: #19201c;
      --muted: #687068;
      --faint: #8e958d;
      --tea: #b96826;
      --tea-bright: #e2a24d;
      --cream: #fff6df;
      --safe: #67876d;
      --danger: #be5743;
      --cup: #f9f5e9;
      --cup-shadow: #d8d3c4;
      --shadow: 0 20px 70px rgba(30, 38, 31, .10);
      --radius: 24px;
    }

    [data-theme="dark"] {
      --bg: #0c100e;
      --bg-soft: #121713;
      --surface: rgba(29, 35, 31, .62);
      --surface-strong: rgba(35, 42, 37, .78);
      --line: rgba(239, 235, 219, .12);
      --line-strong: rgba(239, 235, 219, .22);
      --ink: #f1eee3;
      --muted: #a3aba3;
      --faint: #6f786f;
      --tea: #dc8538;
      --tea-bright: #f2b65d;
      --cream: #fff3d4;
      --safe: #8dad8e;
      --danger: #ed806a;
      --cup: #ede8da;
      --cup-shadow: #beb8aa;
      --shadow: 0 24px 90px rgba(0, 0, 0, .34);
    }

    * { box-sizing: border-box; }
    html { min-height: 100%; background: var(--bg); }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at 72% 28%, rgba(218, 133, 52, .14), transparent 28%),
        radial-gradient(circle at 18% 82%, rgba(97, 135, 108, .13), transparent 25%),
        var(--bg);
      font-family: "Manrope", sans-serif;
      transition: background-color .35s ease, color .35s ease;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .32;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 160 160' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.08'/%3E%3C/svg%3E");
      mix-blend-mode: soft-light;
      z-index: 20;
    }

    button, input { font: inherit; }
    button { color: inherit; }
    button:focus-visible, input:focus-visible {
      outline: 2px solid var(--tea-bright);
      outline-offset: 3px;
    }

    .app {
      width: min(1480px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      padding: 24px clamp(18px, 3vw, 48px) 36px;
      position: relative;
      z-index: 1;
    }

    .topbar {
      height: 62px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--line);
      margin-bottom: clamp(28px, 4vw, 58px);
    }

    .brand { display: flex; align-items: center; gap: 13px; }
    .brand-mark {
      width: 35px; height: 35px; border: 1px solid var(--line-strong); border-radius: 50%;
      position: relative; display: grid; place-items: center; background: var(--surface);
    }
    .brand-mark::before {
      content: ""; width: 13px; height: 10px; border: 1.5px solid var(--ink); border-radius: 2px 2px 7px 7px;
    }
    .brand-mark::after {
      content: ""; position: absolute; right: 6px; width: 6px; height: 6px; border: 1.5px solid var(--ink); border-left: 0; border-radius: 0 5px 5px 0;
    }
    .brand-name { font-weight: 700; letter-spacing: -.02em; font-size: 15px; }
    .brand-sub { color: var(--muted); font-size: 11px; margin-top: 1px; }

    .top-actions { display: flex; align-items: center; gap: 9px; }
    .icon-button, .shortcuts-button {
      border: 1px solid var(--line); background: var(--surface); height: 38px; border-radius: 99px;
      cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
      transition: transform .2s ease, background .2s ease, border-color .2s ease;
    }
    .icon-button { width: 38px; }
    .shortcuts-button { gap: 8px; padding: 0 14px; font-size: 11px; color: var(--muted); }
    .icon-button:hover, .shortcuts-button:hover { transform: translateY(-2px); background: var(--surface-strong); border-color: var(--line-strong); }

    .hero-intro {
      display: flex; align-items: flex-end; justify-content: space-between; gap: 30px;
      margin-bottom: clamp(24px, 3vw, 38px);
      animation: rise .7s cubic-bezier(.2,.8,.2,1) both;
    }
    .eyebrow { font: 500 10px/1.2 "DM Mono", monospace; letter-spacing: .18em; text-transform: uppercase; color: var(--tea); margin-bottom: 12px; }
    h1 { font: 500 clamp(44px, 6vw, 82px)/.88 "Newsreader", serif; letter-spacing: -.055em; margin: 0; max-width: 800px; }
    h1 em { font-weight: 400; color: var(--muted); }
    .intro-copy { max-width: 320px; color: var(--muted); font-size: 13px; line-height: 1.65; margin: 0 0 3px; }

    .workspace {
      display: grid;
      grid-template-columns: minmax(300px, .78fr) minmax(500px, 1.55fr);
      gap: clamp(18px, 2.5vw, 34px);
      align-items: stretch;
    }

    .glass {
      background: var(--surface);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px) saturate(1.1);
      -webkit-backdrop-filter: blur(20px) saturate(1.1);
      border-radius: var(--radius);
    }

    .controls {
      padding: clamp(22px, 2.5vw, 32px);
      animation: rise .7s .08s cubic-bezier(.2,.8,.2,1) both;
      display: flex; flex-direction: column;
    }
    .panel-kicker { display: flex; align-items: center; justify-content: space-between; margin-bottom: 26px; }
    .panel-title { font: 500 12px "DM Mono", monospace; text-transform: uppercase; letter-spacing: .12em; }
    .live-dot { font: 500 9px "DM Mono", monospace; text-transform: uppercase; letter-spacing: .08em; color: var(--safe); display: flex; align-items: center; gap: 7px; }
    .live-dot::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: var(--safe); box-shadow: 0 0 0 4px color-mix(in srgb, var(--safe) 15%, transparent); animation: blink 2s infinite; }

    .control-block + .control-block { margin-top: 26px; padding-top: 25px; border-top: 1px solid var(--line); }
    .label-row { display: flex; align-items: baseline; justify-content: space-between; gap: 15px; margin-bottom: 14px; }
    .label-row label, .control-label { font-size: 12px; font-weight: 600; }
    .value { font: 500 12px "DM Mono", monospace; color: var(--tea); }
    .range-meta { display: flex; justify-content: space-between; font: 400 9px "DM Mono", monospace; color: var(--faint); margin-top: 8px; }

    input[type="range"] {
      width: 100%; height: 4px; appearance: none; border-radius: 99px; outline: none;
      background: linear-gradient(to right, var(--tea) 0 var(--fill), var(--line-strong) var(--fill) 100%);
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--cream);
      border: 5px solid var(--tea); box-shadow: 0 2px 10px rgba(75, 42, 18, .25); transition: transform .15s ease;
    }
    input[type="range"]::-moz-range-thumb { width: 9px; height: 9px; border-radius: 50%; background: var(--cream); border: 5px solid var(--tea); }
    input[type="range"]:active::-webkit-slider-thumb { transform: scale(1.22); }

    .biscuits { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; margin-top: 14px; }
    .biscuit-option {
      min-width: 0; height: 68px; padding: 8px 3px 7px; border-radius: 13px; border: 1px solid var(--line);
      background: transparent; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: space-between;
      transition: background .2s, border-color .2s, transform .2s;
    }
    .biscuit-option:hover { transform: translateY(-2px); background: var(--surface-strong); }
    .biscuit-option.active { background: var(--surface-strong); border-color: color-mix(in srgb, var(--tea) 60%, var(--line)); box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--tea) 22%, transparent); }
    .mini-biscuit { width: 26px; height: 26px; background: #c98a4c; border: 2px solid #a56631; box-shadow: inset 0 0 0 2px rgba(255,255,255,.13); position: relative; }
    .mini-biscuit.round { border-radius: 50%; }
    .mini-biscuit.rect { border-radius: 4px; width: 30px; height: 23px; }
    .mini-biscuit.finger { border-radius: 7px; width: 17px; height: 29px; }
    .mini-biscuit.choco { border-radius: 4px; background: linear-gradient(90deg, #b77238 49%, #69432d 50%); }
    .mini-biscuit::after { content: "···"; position: absolute; inset: 0; display: grid; place-items: center; font: 700 10px serif; color: #86542e; letter-spacing: 1px; overflow: hidden; }
    .biscuit-option span:last-child { font-size: 9px; color: var(--muted); white-space: nowrap; }

    .preset-row { margin-top: auto; padding-top: 25px; display: flex; gap: 9px; }
    .reset-button, .dunk-button {
      height: 46px; border-radius: 13px; cursor: pointer; transition: transform .2s, filter .2s;
    }
    .reset-button { width: 46px; flex: 0 0 46px; border: 1px solid var(--line); background: transparent; font-size: 17px; }
    .dunk-button { flex: 1; border: 0; background: var(--ink); color: var(--bg); font-weight: 700; font-size: 12px; letter-spacing: .02em; display: flex; align-items: center; justify-content: center; gap: 9px; }
    .dunk-button:hover, .reset-button:hover { transform: translateY(-2px); filter: brightness(1.08); }
    .dunk-button kbd { font: 500 9px "DM Mono"; opacity: .58; padding: 3px 5px; border: 1px solid currentColor; border-radius: 4px; }

    .stage-card {
      min-height: 565px; overflow: hidden; position: relative;
      animation: rise .7s .16s cubic-bezier(.2,.8,.2,1) both;
      background: linear-gradient(145deg, var(--surface-strong), var(--surface));
    }
    .stage-card::after { content: ""; position: absolute; inset: 0; pointer-events: none; border-radius: inherit; box-shadow: inset 0 1px rgba(255,255,255,.18); }
    .stage-head { position: absolute; top: 25px; left: 28px; right: 28px; display: flex; justify-content: space-between; align-items: flex-start; z-index: 5; }
    .stage-label { font: 500 10px "DM Mono", monospace; letter-spacing: .16em; text-transform: uppercase; color: var(--muted); }
    .risk-badge { padding: 8px 11px; border: 1px solid var(--line); border-radius: 99px; display: flex; align-items: center; gap: 7px; background: var(--surface); font: 500 9px "DM Mono", monospace; text-transform: uppercase; letter-spacing: .08em; }
    .risk-badge i { width: 6px; height: 6px; border-radius: 50%; background: var(--risk-color); box-shadow: 0 0 12px var(--risk-color); }

    .stage {
      position: absolute; inset: 0; overflow: hidden;
      background:
        radial-gradient(circle at 50% 62%, rgba(218, 133, 52, .11), transparent 23%),
        linear-gradient(180deg, transparent 70%, rgba(25, 32, 28, .04));
    }
    .stage-grid { position: absolute; inset: 0; opacity: .34; background-image: linear-gradient(var(--line) 1px, transparent 1px), linear-gradient(90deg, var(--line) 1px, transparent 1px); background-size: 42px 42px; mask-image: linear-gradient(to bottom, transparent, black 45%, black); }

    .steam-field { position: absolute; width: 240px; height: 190px; left: 50%; top: 100px; transform: translateX(-50%); filter: blur(.2px); }
    .steam { position: absolute; bottom: 0; width: 24px; height: 100px; border-left: 2px solid color-mix(in srgb, var(--ink) 22%, transparent); border-radius: 50%; opacity: 0; animation: steam 3.4s infinite ease-in-out; }
    .steam.s1 { left: 58px; animation-delay: -1.1s; }
    .steam.s2 { left: 112px; height: 125px; animation-delay: -2.4s; }
    .steam.s3 { left: 164px; height: 90px; animation-delay: -.2s; }

    .string { position: absolute; width: 1px; height: 145px; background: color-mix(in srgb, var(--ink) 35%, transparent); top: -35px; left: 50%; z-index: 3; transform-origin: top; animation: stringLoop var(--dunk-cycle) ease-in-out infinite; }
    .dunker {
      position: absolute; left: 50%; top: 93px; transform: translateX(-50%); z-index: 4;
      animation: dunkLoop var(--dunk-cycle) cubic-bezier(.55,.05,.3,1) infinite;
      filter: drop-shadow(0 14px 14px rgba(40, 23, 10, .18));
    }
    .dunker.manual { animation: manualDunk .85s cubic-bezier(.4,0,.25,1); }
    .hero-biscuit { position: relative; background: #c88647; border: 4px solid #a96532; box-shadow: inset 0 0 0 3px rgba(255,255,255,.1), inset 0 -7px 10px rgba(99,48,18,.14); overflow: hidden; }
    .hero-biscuit.round { width: 82px; height: 82px; border-radius: 50%; }
    .hero-biscuit.rect { width: 105px; height: 72px; border-radius: 9px; }
    .hero-biscuit.finger { width: 60px; height: 100px; border-radius: 15px; }
    .hero-biscuit.choco { width: 104px; height: 72px; border-radius: 9px; background: linear-gradient(90deg, #bd773e 49%, #65422d 50%); }
    .hero-biscuit::before { content: ""; position: absolute; inset: 13px; border: 1px dashed rgba(116,66,31,.45); border-radius: inherit; }
    .hero-biscuit::after { content: "•  •  •\A •  •  •"; white-space: pre; position: absolute; inset: 0; display: grid; place-items: center; text-align: center; font: 700 16px/1.3 serif; color: rgba(102,56,26,.58); letter-spacing: 4px; }
    .hero-biscuit.choco::after { color: rgba(244,193,122,.45); }
    .wet-line { position: absolute; bottom: 0; left: 0; right: 0; height: var(--wet); background: rgba(92, 43, 19, .38); mix-blend-mode: multiply; transition: height .5s ease; z-index: 2; }

    .cup-wrap { position: absolute; width: 390px; height: 245px; left: 50%; bottom: 48px; transform: translateX(-50%); z-index: 2; }
    .saucer { position: absolute; width: 350px; height: 42px; left: 11px; bottom: 1px; border-radius: 50%; background: linear-gradient(#d5d0c2, var(--cup)); box-shadow: 0 19px 34px rgba(20,24,21,.18); }
    .cup { position: absolute; width: 270px; height: 174px; left: 47px; bottom: 25px; background: linear-gradient(105deg, var(--cup-shadow), var(--cup) 27%, var(--cup) 70%, var(--cup-shadow)); border-radius: 16px 16px 112px 112px; box-shadow: inset 0 -5px 12px rgba(80,70,50,.1), 0 10px 18px rgba(20,24,21,.12); }
    .cup-rim { position: absolute; width: 272px; height: 62px; left: 46px; top: 30px; border-radius: 50%; background: var(--cup); box-shadow: inset 0 -3px 4px rgba(60,54,45,.14), 0 2px 3px rgba(60,54,45,.14); z-index: 3; }
    .tea { position: absolute; inset: 8px 11px 10px; border-radius: 50%; background: radial-gradient(circle at 43% 40%, #e9a24b, #a84f19 65%, #713313); overflow: hidden; box-shadow: inset 0 2px 9px rgba(57,24,5,.5); }
    .tea::after { content: ""; position: absolute; inset: 0; background: linear-gradient(110deg, transparent 32%, rgba(255,231,177,.38) 43%, transparent 52%); transform: translateX(-70%); animation: shimmer 4s infinite; }
    .ripple { position: absolute; border: 1px solid rgba(255,225,175,.55); width: 42px; height: 13px; border-radius: 50%; left: 50%; top: 50%; transform: translate(-50%,-50%); opacity: 0; animation: ripple var(--dunk-cycle) infinite; }
    .handle { position: absolute; width: 104px; height: 105px; right: 0; top: 62px; border: 21px solid var(--cup-shadow); border-left: 10px solid var(--cup); border-radius: 50%; transform: rotate(-5deg); z-index: -1; }
    .cup-monogram { position: absolute; left: 50%; top: 102px; transform: translateX(-50%); font: 500 13px "Newsreader"; color: #938c7a; letter-spacing: .17em; }

    .crumbs { position: absolute; inset: 0; pointer-events: none; z-index: 8; }
    .crumb { position: absolute; left: 50%; top: 180px; width: var(--size); height: var(--size); border-radius: 45% 55% 60% 40%; background: #ad682f; opacity: 0; animation: crumbFall 1.3s var(--delay) cubic-bezier(.2,.5,.5,1) forwards; }

    .stage-readout { position: absolute; left: 26px; bottom: 25px; z-index: 7; }
    .readout-number { font: 500 29px/1 "Newsreader", serif; letter-spacing: -.03em; }
    .readout-label { font: 500 8px "DM Mono", monospace; color: var(--muted); text-transform: uppercase; letter-spacing: .12em; margin-top: 6px; }
    .temp-gauge { position: absolute; right: 25px; bottom: 27px; z-index: 7; text-align: right; }

    .analysis-strip {
      grid-column: 1 / -1;
      display: grid; grid-template-columns: minmax(0, 1.45fr) minmax(250px, .7fr);
      gap: clamp(18px, 2.5vw, 34px);
      animation: rise .7s .24s cubic-bezier(.2,.8,.2,1) both;
    }
    .graph-card { padding: 24px 27px 20px; min-height: 220px; position: relative; overflow: hidden; }
    .graph-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 15px; position: relative; z-index: 2; }
    .graph-title { font-size: 12px; font-weight: 700; }
    .graph-sub { font-size: 10px; color: var(--muted); margin-top: 4px; }
    .legend { display: flex; align-items: center; gap: 12px; font: 400 8px "DM Mono"; color: var(--muted); }
    .legend span { display: flex; align-items: center; gap: 5px; }
    .legend i { width: 13px; height: 2px; background: var(--tea); display: block; }
    .legend .threshold i { background: var(--danger); opacity: .65; border-top: 1px dashed var(--danger); height: 1px; }
    .graph { width: 100%; height: 140px; margin-top: 7px; overflow: visible; }
    .graph-grid line { stroke: var(--line); stroke-width: 1; }
    .graph-area { fill: url(#areaGradient); }
    .graph-line { fill: none; stroke: var(--tea-bright); stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; filter: drop-shadow(0 3px 5px rgba(192,110,39,.25)); transition: d .3s ease; }
    .threshold-line { stroke: var(--danger); stroke-width: 1; stroke-dasharray: 4 5; opacity: .7; }
    .graph-point { fill: var(--cream); stroke: var(--tea); stroke-width: 3; transition: cx .2s ease, cy .2s ease; }
    .axis-text { font: 8px "DM Mono"; fill: var(--faint); }

    .verdict-card { padding: 25px 27px; position: relative; overflow: hidden; display: flex; flex-direction: column; justify-content: space-between; }
    .verdict-card::before { content: ""; position: absolute; width: 160px; height: 160px; right: -60px; bottom: -70px; border: 28px solid color-mix(in srgb, var(--risk-color) 12%, transparent); border-radius: 50%; }
    .verdict-top { position: relative; z-index: 1; }
    .verdict-label { font: 500 9px "DM Mono"; text-transform: uppercase; letter-spacing: .14em; color: var(--muted); }
    .verdict { font: 500 clamp(28px, 3vw, 42px)/1 "Newsreader"; letter-spacing: -.035em; margin: 12px 0 8px; }
    .verdict-copy { color: var(--muted); font-size: 11px; line-height: 1.55; max-width: 320px; }
    .score-row { display: flex; align-items: flex-end; justify-content: space-between; position: relative; z-index: 1; margin-top: 20px; }
    .score-number { font: 500 34px/1 "DM Mono"; color: var(--risk-color); }
    .score-number small { font-size: 11px; color: var(--muted); }
    .score-bars { display: flex; gap: 3px; align-items: flex-end; height: 28px; }
    .score-bars i { width: 4px; height: var(--h); background: var(--line-strong); border-radius: 3px; transition: background .25s; }
    .score-bars i.on { background: var(--risk-color); }

    .toast { position: fixed; left: 50%; bottom: 25px; transform: translate(-50%, 25px); opacity: 0; z-index: 30; background: var(--ink); color: var(--bg); padding: 11px 16px; border-radius: 99px; font: 500 10px "DM Mono"; letter-spacing: .03em; pointer-events: none; transition: .3s ease; box-shadow: 0 10px 35px rgba(0,0,0,.22); }
    .toast.show { opacity: 1; transform: translate(-50%, 0); }

    .modal-backdrop { position: fixed; inset: 0; background: rgba(3,5,4,.52); backdrop-filter: blur(8px); z-index: 40; display: grid; place-items: center; padding: 20px; animation: fadeIn .2s ease; }
    .modal { width: min(440px, 100%); padding: 28px; border-radius: 22px; background: var(--bg-soft); border: 1px solid var(--line-strong); box-shadow: 0 30px 100px rgba(0,0,0,.35); }
    .modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
    .modal h2 { font: 500 28px "Newsreader"; margin: 0; }
    .close-button { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--line); background: transparent; cursor: pointer; }
    .shortcut-list { display: grid; gap: 10px; }
    .shortcut-item { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--line); padding-top: 10px; font-size: 11px; color: var(--muted); }
    .keys { display: flex; gap: 4px; }
    kbd { min-width: 25px; height: 25px; display: grid; place-items: center; padding: 0 7px; border: 1px solid var(--line-strong); background: var(--surface); border-radius: 6px; color: var(--ink); font: 500 9px "DM Mono"; box-shadow: 0 2px 0 var(--line); }

    @keyframes rise { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } }
    @keyframes blink { 50% { opacity: .35; } }
    @keyframes steam { 0% { transform: translate(0, 15px) scale(.8); opacity: 0; } 25% { opacity: .45; } 65% { opacity: .2; } 100% { transform: translate(28px, -78px) scale(1.4); opacity: 0; } }
    @keyframes dunkLoop { 0%, 18%, 82%, 100% { transform: translate(-50%, 0) rotate(-2deg); } 39%, 61% { transform: translate(-50%, 164px) rotate(2deg); } }
    @keyframes stringLoop { 0%,18%,82%,100% { height: 145px; } 39%,61% { height: 309px; } }
    @keyframes manualDunk { 0%,100% { transform: translate(-50%, 0); } 48%,66% { transform: translate(-50%, 164px) rotate(3deg); } }
    @keyframes ripple { 0%,30% { transform: translate(-50%,-50%) scale(.2); opacity: 0; } 40% { opacity: .8; } 65% { transform: translate(-50%,-50%) scale(3.2); opacity: 0; } 100% { opacity: 0; } }
    @keyframes shimmer { 0%,25% { transform: translateX(-80%); } 65%,100% { transform: translateX(100%); } }
    @keyframes crumbFall { 0% { opacity: 0; transform: translate(var(--x0), var(--y0)) rotate(0); } 12% { opacity: 1; } 100% { opacity: 0; transform: translate(var(--x1), 360px) rotate(var(--rot)); } }

    @media (max-width: 900px) {
      .hero-intro { align-items: flex-start; flex-direction: column; }
      .intro-copy { max-width: 520px; }
      .workspace { grid-template-columns: 1fr; }
      .stage-card { min-height: 560px; }
      .analysis-strip { grid-template-columns: 1fr; }
      .controls { order: 2; }
      .stage-card { order: 1; }
      .analysis-strip { order: 3; }
    }
    @media (max-width: 560px) {
      .app { padding: 12px 12px 24px; }
      .topbar { margin-bottom: 30px; }
      .brand-sub, .shortcuts-button span { display: none; }
      .shortcuts-button { width: 38px; padding: 0; }
      h1 { font-size: 48px; }
      .hero-intro { margin-left: 6px; }
      .stage-card { min-height: 510px; }
      .cup-wrap { transform: translateX(-50%) scale(.82); transform-origin: bottom center; bottom: 35px; }
      .dunker { top: 83px; transform-origin: center; }
      .stage-readout { bottom: 18px; left: 18px; }
      .temp-gauge { bottom: 20px; right: 18px; }
      .biscuits { gap: 5px; }
      .biscuit-option span:last-child { font-size: 8px; }
      .graph-card, .verdict-card { padding: 21px 19px; }
      .legend { display: none; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .01ms !important; animation-iteration-count: 1 !important; scroll-behavior: auto !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useEffect, useMemo, useCallback } = React;

    const BISCUITS = [
      { id: 'digestive', name: 'Digestive', shape: 'round', resilience: 62, porosity: 66 },
      { id: 'richtea', name: 'Rich Tea', shape: 'round', resilience: 43, porosity: 82 },
      { id: 'hobnob', name: 'Hobnob', shape: 'rect', resilience: 82, porosity: 47 },
      { id: 'bourbon', name: 'Bourbon', shape: 'choco', resilience: 73, porosity: 39 }
    ];

    const clamp = (n, min, max) => Math.min(max, Math.max(min, n));

    function scoreSimulation(temp, time, integrity, biscuit) {
      const heatLoad = Math.pow((temp - 45) / 55, 1.35) * 32;
      const timeLoad = Math.pow(time / 12, 1.55) * 57;
      const porousLoad = biscuit.porosity * .23;
      const protection = biscuit.resilience * .34 + integrity * .32;
      return clamp(Math.round(heatLoad + timeLoad + porousLoad + 27 - protection), 3, 99);
    }

    function getStatus(score) {
      if (score < 30) return { name: 'Barely steeped', badge: 'Structurally sound', color: 'var(--safe)', copy: 'A conservative dunk. Crisp core, light tea uptake, minimal jeopardy.' };
      if (score < 55) return { name: 'Prime dunk', badge: 'Optimal window', color: 'var(--safe)', copy: 'The biscuit yields at the edge while the centre holds. Eat immediately.' };
      if (score < 76) return { name: 'Living dangerously', badge: 'Fracture likely', color: 'var(--tea-bright)', copy: 'Saturation is climbing fast. Retrieve with confidence and a steady wrist.' };
      return { name: 'Biscuit catastrophe', badge: 'Crumble alert', color: 'var(--danger)', copy: 'Structural failure is imminent. Ready the teaspoon for a rescue mission.' };
    }

    function Icon({ name }) {
      const common = { width: 16, height: 16, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 1.7, strokeLinecap: 'round', strokeLinejoin: 'round', 'aria-hidden': true };
      if (name === 'moon') return <svg {...common}><path d="M20.4 15.2A8.5 8.5 0 1 1 8.8 3.6a7 7 0 0 0 11.6 11.6Z"/></svg>;
      if (name === 'sun') return <svg {...common}><circle cx="12" cy="12" r="3.8"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>;
      if (name === 'keyboard') return <svg {...common}><rect x="3" y="6" width="18" height="12" rx="2"/><path d="M7 10h.01M11 10h.01M15 10h.01M18 10h.01M8 14h8"/></svg>;
      return <svg {...common}><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg>;
    }

    function RangeControl({ label, value, setValue, min, max, step, suffix, low, high }) {
      const fill = ((value - min) / (max - min)) * 100 + '%';
      return <div className="control-block">
        <div className="label-row"><label>{label}</label><span className="value">{value}{suffix}</span></div>
        <input aria-label={label} type="range" min={min} max={max} step={step} value={value} onChange={e => setValue(Number(e.target.value))} style={{'--fill': fill}} />
        <div className="range-meta"><span>{low}</span><span>{high}</span></div>
      </div>;
    }

    function Crumbs({ burst }) {
      const pieces = useMemo(() => Array.from({length: 30}, (_, i) => ({
        id: burst + '-' + i,
        x0: (Math.random() * 90 - 45) + 'px',
        y0: (Math.random() * 30 - 10) + 'px',
        x1: (Math.random() * 370 - 185) + 'px',
        size: (Math.random() * 6 + 3) + 'px',
        delay: (Math.random() * .35) + 's',
        rot: (Math.random() * 720 - 360) + 'deg'
      })), [burst]);
      if (!burst) return null;
      return <div className="crumbs">{pieces.map(p => <i className="crumb" key={p.id} style={{'--x0':p.x0,'--y0':p.y0,'--x1':p.x1,'--size':p.size,'--delay':p.delay,'--rot':p.rot}} />)}</div>;
    }

    function Graph({ temp, time, integrity, biscuit, score }) {
      const points = useMemo(() => {
        const arr = [];
        for (let i = 0; i <= 24; i++) {
          const sec = i / 2;
          const s = scoreSimulation(temp, sec, integrity, biscuit);
          arr.push([36 + (i / 24) * 604, 126 - (s / 100) * 100]);
        }
        return arr;
      }, [temp, integrity, biscuit]);
      const line = points.map((p,i) => (i === 0 ? 'M' : 'L') + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ');
      const area = line + ' L640,126 L36,126 Z';
      const cx = 36 + (time / 12) * 604;
      const cy = 126 - (score / 100) * 100;
      return <svg className="graph" viewBox="0 0 680 155" preserveAspectRatio="none" role="img" aria-label={'Crumble risk curve, current risk ' + score + ' percent'}>
        <defs><linearGradient id="areaGradient" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stopColor="var(--tea-bright)" stopOpacity=".24"/><stop offset="1" stopColor="var(--tea-bright)" stopOpacity="0"/></linearGradient></defs>
        <g className="graph-grid"><line x1="36" y1="26" x2="640" y2="26"/><line x1="36" y1="76" x2="640" y2="76"/><line x1="36" y1="126" x2="640" y2="126"/><line x1="36" y1="26" x2="36" y2="126"/><line x1="338" y1="26" x2="338" y2="126"/><line x1="640" y1="26" x2="640" y2="126"/></g>
        <line className="threshold-line" x1="36" y1="51" x2="640" y2="51"/>
        <path className="graph-area" d={area}/><path className="graph-line" d={line}/>
        <line x1={cx} y1={cy} x2={cx} y2="126" stroke="var(--tea)" strokeWidth="1" strokeDasharray="3 4" opacity=".45"/>
        <circle className="graph-point" cx={cx} cy={cy} r="5"/>
        <text className="axis-text" x="8" y="29">100</text><text className="axis-text" x="14" y="79">50</text><text className="axis-text" x="20" y="129">0</text>
        <text className="axis-text" x="33" y="148">0s</text><text className="axis-text" x="332" y="148">6s</text><text className="axis-text" x="628" y="148">12s</text>
      </svg>;
    }

    function Shortcuts({ close }) {
      return <div className="modal-backdrop" onMouseDown={e => e.target === e.currentTarget && close()}>
        <section className="modal" role="dialog" aria-modal="true" aria-labelledby="shortcut-title">
          <div className="modal-head"><h2 id="shortcut-title">Quick controls</h2><button className="close-button" onClick={close} aria-label="Close shortcuts">×</button></div>
          <div className="shortcut-list">
            <div className="shortcut-item"><span>Run a fresh dunk</span><div className="keys"><kbd>Space</kbd></div></div>
            <div className="shortcut-item"><span>Adjust dunk time</span><div className="keys"><kbd>←</kbd><kbd>→</kbd></div></div>
            <div className="shortcut-item"><span>Cycle biscuit</span><div className="keys"><kbd>B</kbd></div></div>
            <div className="shortcut-item"><span>Toggle dark mode</span><div className="keys"><kbd>D</kbd></div></div>
            <div className="shortcut-item"><span>Reset experiment</span><div className="keys"><kbd>R</kbd></div></div>
            <div className="shortcut-item"><span>Open this panel</span><div className="keys"><kbd>?</kbd></div></div>
          </div>
        </section>
      </div>;
    }

    function App() {
      const [theme, setTheme] = useState('dark');
      const [temp, setTemp] = useState(82);
      const [time, setTime] = useState(5.2);
      const [integrity, setIntegrity] = useState(72);
      const [biscuitId, setBiscuitId] = useState('digestive');
      const [manual, setManual] = useState(false);
      const [burst, setBurst] = useState(0);
      const [toast, setToast] = useState('');
      const [showShortcuts, setShowShortcuts] = useState(false);
      const biscuit = BISCUITS.find(b => b.id === biscuitId);
      const score = scoreSimulation(temp, time, integrity, biscuit);
      const status = getStatus(score);
      const cycle = clamp(8.2 - time * .25, 4.8, 7.4) + 's';
      const wet = clamp(score * .72, 12, 72) + '%';

      useEffect(() => { document.documentElement.dataset.theme = theme; }, [theme]);

      const showToast = useCallback(msg => {
        setToast(msg);
        window.clearTimeout(window.__toastTimer);
        window.__toastTimer = window.setTimeout(() => setToast(''), 1800);
      }, []);

      const runDunk = useCallback(() => {
        setManual(false);
        requestAnimationFrame(() => setManual(true));
        window.setTimeout(() => setManual(false), 900);
        if (score >= 70) setBurst(Date.now());
        showToast(score >= 76 ? 'CRUMB EVENT RECORDED' : score >= 50 ? 'DUNK COMPLETE — HANDLE WITH CARE' : 'DUNK COMPLETE — INTACT');
      }, [score, showToast]);

      const reset = useCallback(() => {
        setTemp(82); setTime(5.2); setIntegrity(72); setBiscuitId('digestive'); setBurst(0);
        showToast('EXPERIMENT RESET');
      }, [showToast]);

      useEffect(() => {
        const key = e => {
          if (e.target.tagName === 'INPUT') return;
          if (e.key === ' ' ) { e.preventDefault(); runDunk(); }
          else if (e.key === 'ArrowRight') setTime(v => clamp(Math.round((v + .5) * 10) / 10, .5, 12));
          else if (e.key === 'ArrowLeft') setTime(v => clamp(Math.round((v - .5) * 10) / 10, .5, 12));
          else if (e.key.toLowerCase() === 'd') setTheme(v => v === 'dark' ? 'light' : 'dark');
          else if (e.key.toLowerCase() === 'r') reset();
          else if (e.key.toLowerCase() === 'b') setBiscuitId(v => BISCUITS[(BISCUITS.findIndex(b => b.id === v) + 1) % BISCUITS.length].id);
          else if (e.key === '?') setShowShortcuts(true);
          else if (e.key === 'Escape') setShowShortcuts(false);
        };
        window.addEventListener('keydown', key); return () => window.removeEventListener('keydown', key);
      }, [runDunk, reset]);

      useEffect(() => {
        if (score < 70) return;
        const timer = window.setInterval(() => setBurst(Date.now()), 5200);
        return () => window.clearInterval(timer);
      }, [score]);

      const riskStyle = {'--risk-color': status.color};

      return <main className="app" style={{'--dunk-cycle': cycle}}>
        <header className="topbar">
          <div className="brand"><div className="brand-mark"></div><div><div className="brand-name">Steep Risk</div><div className="brand-sub">Biscuit Integrity Laboratory</div></div></div>
          <div className="top-actions">
            <button className="shortcuts-button" onClick={() => setShowShortcuts(true)} aria-label="View keyboard shortcuts"><Icon name="keyboard"/><span>Shortcuts</span></button>
            <button className="icon-button" onClick={() => setTheme(theme === 'dark' ? 'light' : 'dark')} aria-label={'Switch to ' + (theme === 'dark' ? 'light' : 'dark') + ' mode'}><Icon name={theme === 'dark' ? 'sun' : 'moon'}/></button>
          </div>
        </header>

        <section className="hero-intro">
          <div><div className="eyebrow">Field experiment № 014</div><h1>How far will you<br/><em>push your biscuit?</em></h1></div>
          <p className="intro-copy">Model the perilous moment where tea, time and texture meet. Tune your dunk, then watch the crumb threshold.</p>
        </section>

        <section className="workspace" aria-label="Dunkability simulator">
          <aside className="controls glass">
            <div className="panel-kicker"><span className="panel-title">Experiment setup</span><span className="live-dot">Live model</span></div>
            <div className="control-block" style={{marginTop:0}}>
              <div className="control-label">Biscuit specimen</div>
              <div className="biscuits" role="radiogroup" aria-label="Biscuit type">
                {BISCUITS.map(b => <button key={b.id} role="radio" aria-checked={b.id === biscuitId} className={'biscuit-option ' + (b.id === biscuitId ? 'active' : '')} onClick={() => setBiscuitId(b.id)}><i className={'mini-biscuit ' + b.shape}></i><span>{b.name}</span></button>)}
              </div>
            </div>
            <RangeControl label="Tea temperature" value={temp} setValue={setTemp} min={45} max={100} step={1} suffix="°C" low="TEPID 45°" high="SCALDING 100°" />
            <RangeControl label="Dunk duration" value={time} setValue={setTime} min={.5} max={12} step={.1} suffix="s" low="GLANCE 0.5s" high="ABANDONED 12s" />
            <RangeControl label="Structural integrity" value={integrity} setValue={setIntegrity} min={10} max={100} step={1} suffix="%" low="CRACKED" high="PRISTINE" />
            <div className="preset-row"><button className="reset-button" onClick={reset} aria-label="Reset experiment"><Icon name="reset"/></button><button className="dunk-button" onClick={runDunk}>Dunk it <kbd>Space</kbd></button></div>
          </aside>

          <article className="stage-card glass" style={riskStyle}>
            <div className="stage-head"><span className="stage-label">Live immersion chamber</span><span className="risk-badge"><i></i>{status.badge}</span></div>
            <div className="stage">
              <div className="stage-grid"></div>
              <div className="steam-field"><i className="steam s1"></i><i className="steam s2"></i><i className="steam s3"></i></div>
              <div className="string"></div>
              <div className={'dunker ' + (manual ? 'manual' : '')}><div className={'hero-biscuit ' + biscuit.shape}><div className="wet-line" style={{'--wet': wet}}></div></div></div>
              <div className="cup-wrap">
                <div className="saucer"></div><div className="cup"><span className="cup-monogram">S · R</span></div><div className="cup-rim"><div className="tea"><i className="ripple"></i></div></div><div className="handle"></div>
              </div>
              <Crumbs burst={burst}/>
              <div className="stage-readout"><div className="readout-number">{time.toFixed(1)}s</div><div className="readout-label">Immersion time</div></div>
              <div className="temp-gauge"><div className="readout-number">{temp}°</div><div className="readout-label">Tea temperature</div></div>
            </div>
          </article>

          <div className="analysis-strip">
            <section className="graph-card glass">
              <div className="graph-head"><div><div className="graph-title">Crumble-o-meter</div><div className="graph-sub">Failure probability over immersion time</div></div><div className="legend"><span><i></i>Current curve</span><span className="threshold"><i></i>Danger line</span></div></div>
              <Graph temp={temp} time={time} integrity={integrity} biscuit={biscuit} score={score}/>
            </section>
            <section className="verdict-card glass" style={riskStyle}>
              <div className="verdict-top"><div className="verdict-label">Lab verdict</div><div className="verdict">{status.name}</div><div className="verdict-copy">{status.copy}</div></div>
              <div className="score-row"><div className="score-number">{score}<small>/100 risk</small></div><div className="score-bars" aria-hidden="true">{Array.from({length:10},(_,i) => <i key={i} className={i < Math.ceil(score/10) ? 'on' : ''} style={{'--h': (8 + i*2.1) + 'px'}}></i>)}</div></div>
            </section>
          </div>
        </section>
        <div className={'toast ' + (toast ? 'show' : '')} role="status">{toast}</div>
        {showShortcuts && <Shortcuts close={() => setShowShortcuts(false)}/>} 
      </main>;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
