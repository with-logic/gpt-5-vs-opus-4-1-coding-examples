<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#10100f">
  <title>Virtual Drum Kit</title>
  <style>
    :root {
      --ink: #f0ebdf;
      --muted: #9d998e;
      --black: #0b0c0b;
      --panel: #171816;
      --panel-2: #20211e;
      --line: rgba(240,235,223,.13);
      --brass: #d3a951;
      --brass-light: #f2d587;
      --hot: #ff5e45;
      --hot-glow: rgba(255,94,69,.32);
      --green: #9eca89;
      --radius: 18px;
      --shadow: 0 24px 60px rgba(0,0,0,.42);
    }

    * { box-sizing: border-box; }

    html, body { min-height: 100%; }

    body {
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 50% 34%, rgba(211,169,81,.09), transparent 30%),
        linear-gradient(115deg, transparent 0 49.7%, rgba(255,255,255,.018) 49.9% 50.1%, transparent 50.3%),
        #0d0e0d;
      font-family: "Avenir Next", "Century Gothic", sans-serif;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .27;
      background-image:
        linear-gradient(90deg, rgba(255,255,255,.016) 1px, transparent 1px),
        linear-gradient(rgba(255,255,255,.012) 1px, transparent 1px);
      background-size: 4px 4px;
      mix-blend-mode: screen;
    }

    button, input { font: inherit; }
    button { color: inherit; }

    .app {
      width: min(1180px, calc(100% - 36px));
      min-height: 100vh;
      margin: 0 auto;
      padding: max(22px, env(safe-area-inset-top)) 0 max(26px, env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 70px;
      border-bottom: 1px solid var(--line);
      animation: arrive .65s ease-out both;
    }

    .brand { display: flex; align-items: center; gap: 14px; }

    .brand-mark {
      width: 42px;
      height: 42px;
      border: 1px solid rgba(211,169,81,.48);
      border-radius: 50%;
      position: relative;
      display: grid;
      place-items: center;
      color: var(--brass-light);
      font: 700 9px/1 "Arial Narrow", sans-serif;
      letter-spacing: .18em;
    }

    .brand-mark::before, .brand-mark::after {
      content: "";
      position: absolute;
      width: 1px;
      height: 25px;
      background: currentColor;
      top: 5px;
      transform-origin: bottom;
    }

    .brand-mark::before { transform: rotate(39deg); }
    .brand-mark::after { transform: rotate(-39deg); }

    h1 {
      margin: 0;
      font: 800 clamp(17px, 2vw, 23px)/1 "Arial Narrow", "Avenir Next Condensed", sans-serif;
      text-transform: uppercase;
      letter-spacing: .11em;
    }

    .brand small {
      display: block;
      color: var(--muted);
      margin-top: 6px;
      font: 600 9px/1 monospace;
      letter-spacing: .22em;
      text-transform: uppercase;
    }

    .header-status {
      display: flex;
      align-items: center;
      gap: 24px;
      color: var(--muted);
      font: 600 10px/1 monospace;
      letter-spacing: .14em;
      text-transform: uppercase;
    }

    .power { display: flex; align-items: center; gap: 8px; }
    .power-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 14px rgba(158,202,137,.7);
    }

    .shortcuts { display: flex; gap: 4px; }
    .mini-key {
      display: grid; place-items: center;
      width: 23px; height: 23px;
      border: 1px solid var(--line); border-bottom-color: rgba(240,235,223,.3);
      border-radius: 4px; color: #cbc6bb;
      background: rgba(255,255,255,.035);
    }

    main {
      flex: 1;
      display: grid;
      grid-template-rows: auto auto;
      align-content: center;
      padding: 22px 0 12px;
    }

    .studio {
      position: relative;
      min-height: 510px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 26px 26px 8px 8px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.025), transparent 28%),
        repeating-linear-gradient(90deg, transparent 0 78px, rgba(255,255,255,.018) 79px 80px),
        #121311;
      box-shadow: var(--shadow), inset 0 1px rgba(255,255,255,.04);
      animation: arrive .75s .08s ease-out both;
    }

    .studio::before {
      content: "";
      position: absolute; left: 0; right: 0; bottom: 0; height: 135px;
      background:
        linear-gradient(160deg, transparent 49.5%, rgba(255,255,255,.04) 50%, transparent 50.5%) 0 0/90px 45px,
        linear-gradient(20deg, transparent 49.5%, rgba(255,255,255,.03) 50%, transparent 50.5%) 0 0/90px 45px,
        #191916;
      border-top: 1px solid rgba(255,255,255,.05);
      transform: perspective(260px) rotateX(12deg);
      transform-origin: bottom;
    }

    .studio-heading {
      position: absolute;
      left: 25px; top: 21px;
      z-index: 3;
      color: var(--muted);
      font: 600 10px/1 monospace;
      letter-spacing: .16em;
      text-transform: uppercase;
    }

    .studio-heading b { color: var(--brass-light); font-weight: 600; }

    .kit {
      width: min(830px, 88%);
      height: 460px;
      position: absolute;
      left: 50%; bottom: 8px;
      transform: translateX(-50%);
    }

    .hardware {
      position: absolute;
      z-index: 0;
      background: linear-gradient(90deg, #74736c, #d9d5c8 48%, #5b5b57);
      width: 4px;
      border-radius: 4px;
      transform-origin: bottom;
      opacity: .62;
    }

    .stand-left { height: 300px; left: 13%; bottom: 25px; transform: rotate(8deg); }
    .stand-right { height: 300px; right: 13%; bottom: 25px; transform: rotate(-8deg); }
    .stand-mid { height: 220px; left: 50%; bottom: 80px; }

    .stand-left::after, .stand-right::after, .stand-mid::after {
      content: ""; position: absolute; bottom: 0; left: -30px;
      width: 64px; height: 3px; background: inherit;
      box-shadow: 0 -1px rgba(255,255,255,.2);
    }

    .pad {
      appearance: none;
      border: 0;
      cursor: pointer;
      position: absolute;
      z-index: 2;
      padding: 0;
      outline: none;
      touch-action: manipulation;
      transform: translateZ(0);
    }

    .drum {
      --size: 126px;
      width: var(--size); height: var(--size);
      border-radius: 50%;
      background:
        radial-gradient(circle at 42% 34%, rgba(255,255,255,.11), transparent 13%),
        radial-gradient(circle, #2a2b28 0 60%, #0a0b0a 61% 66%, #c7c3b8 67% 70%, #55554f 71% 73%, #151614 74%);
      box-shadow: 0 12px 20px rgba(0,0,0,.4), inset 0 0 20px rgba(0,0,0,.4);
      transition: transform .08s ease, filter .08s ease, box-shadow .08s ease;
    }

    .drum::after {
      content: ""; position: absolute; inset: 8px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,.08);
      pointer-events: none;
    }

    .kick {
      --size: 194px;
      left: calc(50% - 97px); bottom: 17px; z-index: 3;
      background:
        radial-gradient(circle at 45% 40%, rgba(255,255,255,.07), transparent 17%),
        radial-gradient(circle, #171816 0 57%, #090a09 58% 63%, #d2cec0 64% 67%, #5d5d56 68% 71%, #10110f 72%);
    }

    .kick::before {
      content: "DD";
      position: absolute; inset: 29px; border-radius: 50%;
      display: grid; place-items: center;
      color: rgba(240,235,223,.12);
      border: 1px solid rgba(255,255,255,.04);
      font: 900 37px/1 Georgia, serif;
      letter-spacing: -.17em;
      padding-right: 5px;
    }

    .snare { --size: 150px; left: 18%; bottom: 83px; }
    .floor { --size: 158px; right: 17%; bottom: 66px; }
    .tom-1 { --size: 126px; left: 35%; top: 135px; }
    .tom-2 { --size: 134px; right: 33%; top: 129px; }

    .cymbal {
      width: 184px; height: 78px;
      border-radius: 50%;
      background:
        radial-gradient(ellipse at center, #9f7734 0 5%, #ebcc79 6% 8%, transparent 9%),
        repeating-radial-gradient(ellipse at center, transparent 0 10px, rgba(74,50,13,.16) 11px 12px),
        radial-gradient(ellipse at 47% 36%, #f7dc91, #c39640 41%, #72501e 78%, #d0a652);
      border: 1px solid rgba(255,236,174,.5);
      box-shadow: 0 16px 22px rgba(0,0,0,.34), inset 0 2px 3px rgba(255,248,210,.35);
      transition: transform .09s ease, filter .08s ease;
      transform-origin: 50% 50%;
    }

    .cymbal::after {
      content: ""; position: absolute; width: 8px; height: 8px; border-radius: 50%;
      left: calc(50% - 4px); top: calc(50% - 4px); background: #453519;
      box-shadow: 0 0 0 3px rgba(255,221,139,.3);
    }

    .crash { left: 5%; top: 55px; transform: rotate(-5deg); }
    .ride { right: 4%; top: 68px; transform: rotate(5deg); }
    .hat { width: 137px; height: 59px; left: 18%; top: 196px; transform: rotate(-4deg); }

    .label {
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%,-50%);
      pointer-events: none;
      display: flex; flex-direction: column; align-items: center; gap: 5px;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,.8));
    }

    .label strong {
      font: 800 10px/1 "Arial Narrow", sans-serif;
      letter-spacing: .16em; text-transform: uppercase;
      color: #ebe6da;
    }

    .label kbd {
      min-width: 28px; height: 25px; padding: 0 6px;
      display: grid; place-items: center;
      border: 1px solid rgba(255,255,255,.22);
      border-bottom-color: rgba(255,255,255,.36);
      border-radius: 5px;
      background: rgba(6,7,6,.68);
      color: var(--brass-light);
      font: 700 11px/1 monospace;
      box-shadow: 0 3px 8px rgba(0,0,0,.3);
    }

    .cymbal .label { top: 44%; }
    .cymbal .label strong { color: #241b0e; text-shadow: 0 1px rgba(255,255,255,.25); }

    .pad:hover { filter: brightness(1.12); }
    .pad:focus-visible { box-shadow: 0 0 0 3px var(--black), 0 0 0 5px var(--brass-light); }
    .drum.active { transform: scale(.94); filter: brightness(1.4); box-shadow: 0 2px 7px rgba(0,0,0,.4), 0 0 28px var(--hot-glow), inset 0 0 18px var(--hot-glow); }
    .cymbal.active { animation: wobble .32s ease-out; filter: brightness(1.35); }
    .crash.active { animation-name: wobbleLeft; }
    .ride.active { animation-name: wobbleRight; }

    .transport {
      position: relative;
      z-index: 5;
      width: calc(100% - 46px);
      margin: -11px auto 0;
      min-height: 104px;
      padding: 17px 19px;
      display: grid;
      grid-template-columns: auto minmax(180px, 1fr) auto;
      align-items: center;
      gap: 24px;
      background: rgba(29,30,27,.96);
      border: 1px solid rgba(255,255,255,.12);
      border-top-color: rgba(255,255,255,.2);
      border-radius: 12px;
      box-shadow: 0 15px 40px rgba(0,0,0,.42), inset 0 1px rgba(255,255,255,.04);
      animation: arrive .65s .2s ease-out both;
    }

    .transport-buttons { display: flex; align-items: center; gap: 9px; }

    .control {
      height: 49px;
      border-radius: 9px;
      border: 1px solid var(--line);
      background: #151614;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 9px;
      transition: .18s ease;
      outline: none;
      box-shadow: inset 0 1px rgba(255,255,255,.035), 0 4px 10px rgba(0,0,0,.18);
    }

    .control:hover { border-color: rgba(240,235,223,.28); background: #1a1b18; transform: translateY(-1px); }
    .control:active { transform: translateY(1px); }
    .control:focus-visible { box-shadow: 0 0 0 2px var(--brass-light); }
    .control:disabled { opacity: .38; cursor: not-allowed; transform: none; }

    .record-btn { width: 116px; text-transform: uppercase; font: 700 10px/1 monospace; letter-spacing: .12em; }
    .record-dot { width: 13px; height: 13px; border-radius: 50%; background: var(--hot); box-shadow: 0 0 0 4px rgba(255,94,69,.1); }
    .record-btn.recording { color: #fff; border-color: rgba(255,94,69,.6); background: rgba(255,94,69,.11); }
    .record-btn.recording .record-dot { animation: blink 1s infinite; }

    .square-control { width: 49px; }
    .play-icon { width: 0; height: 0; border-top: 7px solid transparent; border-bottom: 7px solid transparent; border-left: 11px solid var(--ink); margin-left: 2px; }
    .stop-icon { width: 12px; height: 12px; background: var(--ink); border-radius: 2px; }
    .trash-icon { width: 12px; height: 14px; border: 1.5px solid currentColor; border-radius: 0 0 2px 2px; position: relative; color: var(--muted); }
    .trash-icon::before { content: ""; position: absolute; width: 16px; height: 1.5px; background: currentColor; left: -3.5px; top: -4px; box-shadow: 5px -3px 0 -0.25px currentColor; }

    .timeline-wrap { min-width: 0; }
    .timeline-meta { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 10px; }
    .take-name { color: #d5d0c4; font: 700 10px/1 monospace; text-transform: uppercase; letter-spacing: .14em; }
    .take-name span { color: var(--muted); font-weight: 500; }
    .time { color: var(--brass-light); font: 600 12px/1 monospace; letter-spacing: .08em; }

    .timeline {
      height: 30px; border-radius: 5px; overflow: hidden; position: relative;
      border: 1px solid rgba(255,255,255,.08);
      background:
        linear-gradient(90deg, transparent 24.8%, rgba(255,255,255,.05) 25%, transparent 25.2%, transparent 49.8%, rgba(255,255,255,.05) 50%, transparent 50.2%, transparent 74.8%, rgba(255,255,255,.05) 75%, transparent 75.2%),
        #111210;
    }

    .timeline-empty { position: absolute; inset: 0; display: grid; place-items: center; color: #5f605a; font: 500 9px/1 monospace; text-transform: uppercase; letter-spacing: .15em; }
    .beats { position: absolute; inset: 0; }
    .beat { position: absolute; bottom: 3px; width: 3px; min-height: 8px; border-radius: 1px; background: var(--brass); box-shadow: 0 0 5px rgba(211,169,81,.28); transform-origin: bottom; animation: beatIn .18s ease-out; }
    .playhead { position: absolute; z-index: 2; top: 0; bottom: 0; left: 0; width: 2px; background: var(--hot); box-shadow: 0 0 8px var(--hot); opacity: 0; }
    .playhead.running { opacity: 1; }

    .master { display: grid; grid-template-columns: auto 54px; align-items: center; gap: 15px; }
    .master-copy { text-align: right; }
    .master-copy strong { display: block; font: 700 9px/1 monospace; letter-spacing: .15em; text-transform: uppercase; }
    .master-copy span { display: block; color: var(--muted); margin-top: 6px; font: 500 9px/1 monospace; }

    .knob-wrap { width: 54px; height: 54px; position: relative; display: grid; place-items: center; }
    .knob-ticks { position: absolute; inset: 0; border-radius: 50%; background: conic-gradient(from 135deg, rgba(211,169,81,.9) 0deg 227deg, rgba(255,255,255,.13) 228deg 270deg, transparent 271deg); -webkit-mask: radial-gradient(circle, transparent 0 72%, #000 73% 78%, transparent 79%); mask: radial-gradient(circle, transparent 0 72%, #000 73% 78%, transparent 79%); }
    .knob { appearance: none; width: 39px; height: 39px; border-radius: 50%; border: 1px solid rgba(255,255,255,.16); background: radial-gradient(circle at 36% 30%, #43443f, #171815 70%); box-shadow: 0 5px 11px rgba(0,0,0,.4), inset 0 1px rgba(255,255,255,.12); cursor: pointer; position: relative; }
    .knob::after { content: ""; position: absolute; top: 5px; left: calc(50% - 1px); width: 2px; height: 10px; border-radius: 2px; background: var(--brass-light); transform-origin: 1px 14px; transform: rotate(var(--knob-angle, 45deg)); }
    input[type="range"] { position: absolute; width: 58px; height: 58px; opacity: 0; cursor: pointer; }

    footer {
      display: flex; align-items: center; justify-content: space-between;
      padding: 17px 5px 0;
      color: #70716b;
      font: 500 9px/1 monospace;
      letter-spacing: .1em;
      text-transform: uppercase;
      animation: arrive .6s .28s ease-out both;
    }

    footer span:last-child { color: #85867f; }

    .toast {
      position: fixed; z-index: 20; left: 50%; top: 22px;
      transform: translate(-50%, -80px);
      padding: 11px 16px; border-radius: 8px;
      background: #eee9dd; color: #181916;
      font: 700 10px/1 monospace; letter-spacing: .1em; text-transform: uppercase;
      box-shadow: 0 12px 34px rgba(0,0,0,.4);
      opacity: 0; transition: .35s cubic-bezier(.2,.8,.2,1);
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translate(-50%, 0); }

    @keyframes arrive { from { opacity: 0; transform: translateY(13px); } to { opacity: 1; transform: none; } }
    @keyframes blink { 50% { opacity: .35; box-shadow: 0 0 0 7px rgba(255,94,69,.07); } }
    @keyframes beatIn { from { transform: scaleY(0); } }
    @keyframes wobble { 0% { transform: rotate(0) scale(.97); } 30% { transform: rotateX(24deg) rotate(2deg); } 65% { transform: rotateX(-10deg) rotate(-1deg); } 100% { transform: rotate(0); } }
    @keyframes wobbleLeft { 0% { transform: rotate(-5deg) scale(.97); } 30% { transform: rotateX(24deg) rotate(-2deg); } 65% { transform: rotateX(-10deg) rotate(-6deg); } 100% { transform: rotate(-5deg); } }
    @keyframes wobbleRight { 0% { transform: rotate(5deg) scale(.97); } 30% { transform: rotateX(24deg) rotate(8deg); } 65% { transform: rotateX(-10deg) rotate(4deg); } 100% { transform: rotate(5deg); } }

    @media (max-width: 760px) {
      .app { width: min(100% - 20px, 620px); padding-top: 12px; }
      header { min-height: 59px; }
      .brand-mark { width: 36px; height: 36px; }
      .brand small, .shortcuts { display: none; }
      .header-status { gap: 12px; font-size: 9px; }
      main { padding-top: 11px; align-content: start; }
      .studio { min-height: 495px; border-radius: 20px 20px 7px 7px; }
      .studio-heading { left: 16px; top: 15px; }
      .kit { width: 100%; height: 455px; bottom: 6px; transform: translateX(-50%) scale(.9); }
      .transport { width: calc(100% - 14px); grid-template-columns: 1fr auto; gap: 14px; padding: 14px; }
      .transport-buttons { order: 1; }
      .timeline-wrap { order: 3; grid-column: 1 / -1; }
      .master { order: 2; }
      .master-copy { display: none; }
      footer { padding-left: 2px; padding-right: 2px; }
    }

    @media (max-width: 520px) {
      .app { width: 100%; padding-left: 8px; padding-right: 8px; }
      h1 { font-size: 16px; letter-spacing: .08em; }
      .power span:last-child { display: none; }
      .studio { min-height: 480px; }
      .kit { width: 550px; height: 450px; transform: translateX(-50%) scale(.82); transform-origin: 50% 100%; }
      .transport { min-height: 151px; margin-top: -8px; }
      .record-btn { width: 105px; height: 46px; }
      .square-control { width: 46px; height: 46px; }
      footer span:first-child { display: none; }
      footer { justify-content: center; padding-top: 13px; }
    }

    @media (max-height: 760px) and (min-width: 761px) {
      .app { padding-top: 12px; padding-bottom: 12px; }
      header { min-height: 54px; }
      main { padding-top: 10px; }
      .studio { min-height: 455px; }
      .kit { transform: translateX(-50%) scale(.9); transform-origin: 50% 100%; bottom: 0; }
      .transport { min-height: 90px; padding-top: 12px; padding-bottom: 12px; }
      footer { display: none; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .001ms !important; animation-iteration-count: 1 !important; scroll-behavior: auto !important; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">VDK</div>
        <div>
          <h1>Virtual Drum Kit</h1>
          <small>Room 01 / Live session</small>
        </div>
      </div>
      <div class="header-status">
        <div class="power"><span class="power-dot"></span><span>Audio ready</span></div>
        <div class="shortcuts" aria-label="Keyboard shortcuts">
          <span class="mini-key">A</span><span class="mini-key">S</span><span class="mini-key">D</span><span class="mini-key">F</span><span class="mini-key">J</span><span class="mini-key">K</span><span class="mini-key">L</span><span class="mini-key">;</span>
        </div>
      </div>
    </header>

    <main>
      <section class="studio" aria-labelledby="kit-title">
        <div id="kit-title" class="studio-heading"><b>Studio kit</b> &nbsp;•&nbsp; 8 pieces</div>
        <div class="kit" aria-label="Playable drum kit">
          <i class="hardware stand-left"></i><i class="hardware stand-mid"></i><i class="hardware stand-right"></i>

          <button class="pad cymbal crash" data-sound="crash" aria-label="Crash cymbal, keyboard A">
            <span class="label"><strong>Crash</strong><kbd>A</kbd></span>
          </button>
          <button class="pad cymbal ride" data-sound="ride" aria-label="Ride cymbal, keyboard semicolon">
            <span class="label"><strong>Ride</strong><kbd>;</kbd></span>
          </button>
          <button class="pad cymbal hat" data-sound="hat" aria-label="Hi-hat, keyboard S">
            <span class="label"><strong>Hi-hat</strong><kbd>S</kbd></span>
          </button>

          <button class="pad drum snare" data-sound="snare" aria-label="Snare drum, keyboard D">
            <span class="label"><strong>Snare</strong><kbd>D</kbd></span>
          </button>
          <button class="pad drum tom-1" data-sound="tom1" aria-label="High tom, keyboard F">
            <span class="label"><strong>High tom</strong><kbd>F</kbd></span>
          </button>
          <button class="pad drum kick" data-sound="kick" aria-label="Kick drum, keyboard J">
            <span class="label"><strong>Kick</strong><kbd>J</kbd></span>
          </button>
          <button class="pad drum tom-2" data-sound="tom2" aria-label="Mid tom, keyboard K">
            <span class="label"><strong>Mid tom</strong><kbd>K</kbd></span>
          </button>
          <button class="pad drum floor" data-sound="floor" aria-label="Floor tom, keyboard L">
            <span class="label"><strong>Floor tom</strong><kbd>L</kbd></span>
          </button>
        </div>
      </section>

      <section class="transport" aria-label="Recording controls">
        <div class="transport-buttons">
          <button id="record" class="control record-btn" aria-label="Start recording"><span class="record-dot"></span><span>Record</span></button>
          <button id="play" class="control square-control" aria-label="Play recording" disabled><span class="play-icon"></span></button>
          <button id="stop" class="control square-control" aria-label="Stop recording or playback" disabled><span class="stop-icon"></span></button>
          <button id="clear" class="control square-control" aria-label="Clear recording" disabled><span class="trash-icon"></span></button>
        </div>

        <div class="timeline-wrap">
          <div class="timeline-meta">
            <div class="take-name">Take 01 <span id="hitCount">— no hits</span></div>
            <time class="time" id="timer">00:00.000</time>
          </div>
          <div class="timeline" id="timeline">
            <div class="timeline-empty" id="timelineEmpty">Press record, then play the kit</div>
            <div class="beats" id="beats"></div>
            <div class="playhead" id="playhead"></div>
          </div>
        </div>

        <div class="master">
          <div class="master-copy"><strong>Master</strong><span id="volumeReadout">82%</span></div>
          <div class="knob-wrap">
            <div class="knob-ticks"></div>
            <div class="knob" id="knob" style="--knob-angle: 45deg"></div>
            <input id="volume" type="range" min="0" max="100" value="82" aria-label="Master volume">
          </div>
        </div>
      </section>
    </main>

    <footer>
      <span>Keyboard or touch enabled</span>
      <span>Tip: use two hands for the best groove</span>
    </footer>
  </div>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    (() => {
      'use strict';

      const keyMap = { a: 'crash', s: 'hat', d: 'snare', f: 'tom1', j: 'kick', k: 'tom2', l: 'floor', ';': 'ride' };
      const padEls = [...document.querySelectorAll('.pad')];
      const padMap = Object.fromEntries(padEls.map(el => [el.dataset.sound, el]));
      const recordBtn = document.getElementById('record');
      const playBtn = document.getElementById('play');
      const stopBtn = document.getElementById('stop');
      const clearBtn = document.getElementById('clear');
      const timerEl = document.getElementById('timer');
      const beatsEl = document.getElementById('beats');
      const timelineEmpty = document.getElementById('timelineEmpty');
      const playhead = document.getElementById('playhead');
      const hitCount = document.getElementById('hitCount');
      const volume = document.getElementById('volume');
      const volumeReadout = document.getElementById('volumeReadout');
      const knob = document.getElementById('knob');
      const toast = document.getElementById('toast');

      let ctx, master;
      let recording = false;
      let playing = false;
      let events = [];
      let recordStarted = 0;
      let takeDuration = 0;
      let timerFrame = 0;
      let playbackTimers = [];
      let toastTimer = 0;

      function ensureAudio() {
        if (!ctx) {
          ctx = new (window.AudioContext || window.webkitAudioContext)();
          master = ctx.createGain();
          const compressor = ctx.createDynamicsCompressor();
          compressor.threshold.value = -15;
          compressor.knee.value = 18;
          compressor.ratio.value = 5;
          compressor.attack.value = .003;
          compressor.release.value = .18;
          master.gain.value = Number(volume.value) / 100;
          master.connect(compressor).connect(ctx.destination);
        }
        if (ctx.state === 'suspended') ctx.resume();
      }

      function envelope(gain, now, peak, decay) {
        gain.gain.cancelScheduledValues(now);
        gain.gain.setValueAtTime(.0001, now);
        gain.gain.exponentialRampToValueAtTime(peak, now + .003);
        gain.gain.exponentialRampToValueAtTime(.0001, now + decay);
      }

      function oscillatorHit(freq, endFreq, decay, type = 'sine', gainAmount = .85) {
        const now = ctx.currentTime;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, now);
        osc.frequency.exponentialRampToValueAtTime(endFreq, now + decay * .8);
        envelope(gain, now, gainAmount, decay);
        osc.connect(gain).connect(master);
        osc.start(now); osc.stop(now + decay + .06);
      }

      function noiseBuffer(seconds = 1) {
        const length = Math.floor(ctx.sampleRate * seconds);
        const buffer = ctx.createBuffer(1, length, ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < length; i++) data[i] = Math.random() * 2 - 1;
        return buffer;
      }

      function noiseHit({ decay, gainAmount, highpass = 0, lowpass = 20000, bandpass = 0, start = 0 }) {
        const now = ctx.currentTime + start;
        const source = ctx.createBufferSource();
        const gain = ctx.createGain();
        source.buffer = noiseBuffer(Math.max(decay, .1));
        let node = source;
        if (highpass) { const f = ctx.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = highpass; node.connect(f); node = f; }
        if (lowpass < 20000) { const f = ctx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = lowpass; node.connect(f); node = f; }
        if (bandpass) { const f = ctx.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = bandpass; f.Q.value = .7; node.connect(f); node = f; }
        envelope(gain, now, gainAmount, decay);
        node.connect(gain).connect(master);
        source.start(now); source.stop(now + decay + .05);
      }

      const sounds = {
        kick() {
          oscillatorHit(150, 46, .48, 'sine', 1.1);
          noiseHit({ decay: .025, gainAmount: .22, lowpass: 900 });
        },
        snare() {
          oscillatorHit(190, 115, .16, 'triangle', .42);
          noiseHit({ decay: .28, gainAmount: .68, highpass: 700, lowpass: 11000 });
        },
        hat() {
          noiseHit({ decay: .075, gainAmount: .42, highpass: 6500 });
        },
        crash() {
          noiseHit({ decay: 1.65, gainAmount: .54, highpass: 2100, lowpass: 15500 });
          oscillatorHit(420, 310, .7, 'square', .035);
        },
        ride() {
          noiseHit({ decay: 1.05, gainAmount: .34, highpass: 3800, bandpass: 7600 });
          oscillatorHit(690, 600, .55, 'triangle', .07);
        },
        tom1() { oscillatorHit(210, 112, .42, 'sine', .72); },
        tom2() { oscillatorHit(155, 84, .48, 'sine', .8); },
        floor() { oscillatorHit(112, 58, .58, 'sine', .9); }
      };

      function animatePad(sound) {
        const el = padMap[sound];
        if (!el) return;
        el.classList.remove('active');
        void el.offsetWidth;
        el.classList.add('active');
        setTimeout(() => el.classList.remove('active'), el.classList.contains('cymbal') ? 330 : 105);
      }

      function hit(sound, shouldRecord = true) {
        ensureAudio();
        sounds[sound]?.();
        animatePad(sound);
        if (recording && shouldRecord) {
          const at = performance.now() - recordStarted;
          events.push({ sound, at });
          takeDuration = Math.max(takeDuration, at);
          updateTakeInfo();
          drawBeats();
        }
      }

      padEls.forEach(pad => {
        pad.addEventListener('pointerdown', e => {
          e.preventDefault();
          hit(pad.dataset.sound);
        });
      });

      window.addEventListener('keydown', e => {
        if (e.repeat || e.metaKey || e.ctrlKey || e.altKey) return;
        const sound = keyMap[e.key.toLowerCase()];
        if (sound) {
          e.preventDefault();
          hit(sound);
        }
        if (e.code === 'Space' && document.activeElement?.tagName !== 'BUTTON') {
          e.preventDefault();
          playing ? stopAll() : events.length ? playTake() : toggleRecording();
        }
      });

      function formatTime(ms) {
        const total = Math.max(0, Math.floor(ms));
        const mins = Math.floor(total / 60000).toString().padStart(2, '0');
        const secs = Math.floor(total % 60000 / 1000).toString().padStart(2, '0');
        const millis = (total % 1000).toString().padStart(3, '0');
        return `${mins}:${secs}.${millis}`;
      }

      function tickTimer() {
        if (!recording) return;
        takeDuration = performance.now() - recordStarted;
        timerEl.textContent = formatTime(takeDuration);
        drawBeats();
        timerFrame = requestAnimationFrame(tickTimer);
      }

      function updateTakeInfo() {
        const n = events.length;
        hitCount.textContent = n ? `— ${n} hit${n === 1 ? '' : 's'}` : '— no hits';
        playBtn.disabled = !n || recording || playing;
        clearBtn.disabled = !n || recording || playing;
        stopBtn.disabled = !(recording || playing);
        timelineEmpty.hidden = n > 0;
      }

      function drawBeats() {
        if (!events.length) { beatsEl.innerHTML = ''; return; }
        const scale = Math.max(takeDuration, events[events.length - 1].at + 400, 1800);
        beatsEl.innerHTML = events.map((event, i) => {
          const x = Math.min(99.2, event.at / scale * 100);
          const heights = { kick: 23, snare: 19, hat: 10, crash: 26, ride: 21, tom1: 16, tom2: 17, floor: 20 };
          return `<i class="beat" style="left:${x}%;height:${heights[event.sound]}px;opacity:${.62 + (i % 3) * .15}"></i>`;
        }).join('');
      }

      function toggleRecording() {
        if (recording) { finishRecording(); return; }
        stopAll();
        ensureAudio();
        events = [];
        takeDuration = 0;
        beatsEl.innerHTML = '';
        recording = true;
        recordStarted = performance.now();
        recordBtn.classList.add('recording');
        recordBtn.querySelector('span:last-child').textContent = 'Recording';
        recordBtn.setAttribute('aria-label', 'Stop recording');
        timerEl.textContent = '00:00.000';
        updateTakeInfo();
        tickTimer();
        showToast('Recording started');
      }

      function finishRecording() {
        if (!recording) return;
        recording = false;
        cancelAnimationFrame(timerFrame);
        takeDuration = Math.max(performance.now() - recordStarted, events.at(-1)?.at + 350 || 0);
        timerEl.textContent = formatTime(takeDuration);
        recordBtn.classList.remove('recording');
        recordBtn.querySelector('span:last-child').textContent = 'Record';
        recordBtn.setAttribute('aria-label', 'Start recording');
        drawBeats();
        updateTakeInfo();
        showToast(events.length ? `Take saved · ${events.length} hits` : 'Empty take');
      }

      function playTake() {
        if (!events.length || playing) return;
        ensureAudio();
        playing = true;
        recordBtn.disabled = true;
        playBtn.disabled = true;
        clearBtn.disabled = true;
        stopBtn.disabled = false;
        playhead.classList.add('running');
        const started = performance.now();

        events.forEach(event => {
          playbackTimers.push(setTimeout(() => hit(event.sound, false), event.at));
        });

        const updateHead = () => {
          if (!playing) return;
          const elapsed = performance.now() - started;
          const progress = Math.min(1, elapsed / Math.max(takeDuration, 1));
          playhead.style.left = `${progress * 100}%`;
          timerEl.textContent = formatTime(elapsed);
          if (progress < 1) timerFrame = requestAnimationFrame(updateHead);
        };
        updateHead();
        playbackTimers.push(setTimeout(() => stopAll(true), takeDuration + 80));
      }

      function stopAll(naturalEnd = false) {
        if (recording) { finishRecording(); return; }
        playbackTimers.forEach(clearTimeout);
        playbackTimers = [];
        cancelAnimationFrame(timerFrame);
        if (playing) {
          playing = false;
          playhead.classList.remove('running');
          playhead.style.left = '0';
          timerEl.textContent = formatTime(takeDuration);
          recordBtn.disabled = false;
          updateTakeInfo();
          if (naturalEnd) showToast('Playback complete');
        }
      }

      function clearTake() {
        stopAll();
        events = [];
        takeDuration = 0;
        beatsEl.innerHTML = '';
        timerEl.textContent = '00:00.000';
        playhead.style.left = '0';
        updateTakeInfo();
        showToast('Take cleared');
      }

      function showToast(message) {
        toast.textContent = message;
        toast.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove('show'), 1700);
      }

      recordBtn.addEventListener('click', toggleRecording);
      playBtn.addEventListener('click', playTake);
      stopBtn.addEventListener('click', () => stopAll());
      clearBtn.addEventListener('click', clearTake);

      volume.addEventListener('input', () => {
        const value = Number(volume.value);
        volumeReadout.textContent = `${value}%`;
        knob.style.setProperty('--knob-angle', `${-135 + value * 2.7}deg`);
        if (master && ctx) master.gain.setTargetAtTime(value / 100, ctx.currentTime, .015);
      });
      knob.style.setProperty('--knob-angle', `${-135 + Number(volume.value) * 2.7}deg`);

      updateTakeInfo();
    })();
  </script>
</body>
</html>
