<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f2efe7">
  <title>Interactive World Clock</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #f2efe7;
      --paper-deep: #e7e1d5;
      --ink: #17201f;
      --muted: #6f756f;
      --line: rgba(23, 32, 31, .16);
      --accent: #ed5d3b;
      --shadow: 0 20px 48px rgba(37, 32, 25, .10);
      --radius: 24px;
    }

    * { box-sizing: border-box; }

    html { min-width: 320px; background: var(--paper); }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% -10%, rgba(255,255,255,.92), transparent 30rem),
        linear-gradient(rgba(23,32,31,.026) 1px, transparent 1px),
        var(--paper);
      background-size: auto, 100% 48px, auto;
      font-family: "Manrope", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    button, input { font: inherit; }
    button { color: inherit; }

    .app-shell {
      width: min(1500px, 100%);
      margin: 0 auto;
      padding: 20px clamp(18px, 3vw, 52px) 48px;
    }

    .topbar {
      min-height: 68px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 24px;
      border-bottom: 1px solid var(--line);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 700;
      letter-spacing: -.03em;
      font-size: 15px;
    }

    .brand-mark {
      width: 32px;
      height: 32px;
      position: relative;
      display: grid;
      place-items: center;
      border: 1px solid var(--ink);
      border-radius: 50%;
    }

    .brand-mark::before,
    .brand-mark::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      border: 1px solid var(--ink);
    }

    .brand-mark::before { width: 12px; height: 30px; }
    .brand-mark::after { width: 30px; height: 12px; }

    .date-line {
      font-family: "DM Mono", monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .15em;
      color: var(--muted);
    }

    .top-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
    }

    .format-toggle {
      display: inline-flex;
      align-items: center;
      padding: 3px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,.3);
    }

    .format-toggle button {
      min-width: 46px;
      height: 32px;
      padding: 0 12px;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      font-family: "DM Mono", monospace;
      font-size: 11px;
      letter-spacing: .06em;
      cursor: pointer;
      transition: background .2s, color .2s, transform .2s;
    }

    .format-toggle button[aria-pressed="true"] {
      background: var(--ink);
      color: var(--paper);
      box-shadow: 0 2px 10px rgba(23,32,31,.18);
    }

    .icon-button, .add-button, .close-dialog {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.3);
      cursor: pointer;
      transition: transform .2s, background .2s, border-color .2s;
    }

    .icon-button:hover, .add-button:hover, .close-dialog:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,.72);
      border-color: rgba(23,32,31,.32);
    }

    .icon-button:focus-visible, .add-button:focus-visible, .close-dialog:focus-visible,
    .format-toggle button:focus-visible, .remove-city:focus-visible, .city-option:focus-visible,
    .search-input:focus-visible {
      outline: 3px solid rgba(237,93,59,.35);
      outline-offset: 2px;
    }

    .add-button {
      min-height: 40px;
      border-radius: 999px;
      padding: 0 16px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 700;
    }

    .add-button svg { width: 15px; height: 15px; }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(300px, .65fr);
      min-height: 300px;
      border-bottom: 1px solid var(--line);
      overflow: hidden;
    }

    .hero-time {
      padding: clamp(34px, 5vw, 68px) 30px clamp(30px, 4vw, 56px) 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 0;
    }

    .eyebrow {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-family: "DM Mono", monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .16em;
    }

    .live-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 0 rgba(237,93,59,.35);
      animation: live 2s infinite;
    }

    @keyframes live {
      50% { box-shadow: 0 0 0 7px rgba(237,93,59,0); }
    }

    .local-clock {
      margin: 9px 0 2px;
      font-family: "DM Mono", monospace;
      font-size: clamp(64px, 9.2vw, 138px);
      font-weight: 300;
      letter-spacing: -.085em;
      line-height: .98;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .local-clock .seconds {
      color: var(--accent);
      font-size: .38em;
      letter-spacing: -.04em;
      margin-left: .17em;
      vertical-align: .16em;
    }

    .local-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: clamp(13px, 1.2vw, 16px);
      color: var(--muted);
    }

    .local-meta strong { color: var(--ink); font-weight: 600; }
    .meta-separator { width: 20px; height: 1px; background: var(--line); }

    .orbit-stage {
      position: relative;
      min-height: 300px;
      display: grid;
      place-items: center;
      isolation: isolate;
    }

    .orbit-stage::before {
      content: "";
      position: absolute;
      width: min(30vw, 350px);
      aspect-ratio: 1;
      border: 1px solid var(--line);
      border-radius: 50%;
      opacity: .85;
    }

    .orbit-stage::after {
      content: "";
      position: absolute;
      height: 1px;
      width: 130%;
      background: var(--line);
      transform: rotate(-28deg);
      z-index: -1;
    }

    .phase-orb {
      width: clamp(116px, 13vw, 190px);
      aspect-ratio: 1;
      border-radius: 50%;
      position: relative;
      background: var(--orb, #f4b74e);
      box-shadow: 0 20px 60px var(--orb-glow, rgba(244,183,78,.35));
      transition: background 1.2s, box-shadow 1.2s;
      animation: float 6s ease-in-out infinite;
    }

    .phase-orb::before {
      content: "";
      position: absolute;
      inset: 14%;
      border: 1px solid rgba(255,255,255,.35);
      border-radius: 50%;
    }

    .phase-orb::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(115deg, rgba(255,255,255,.42), transparent 42%, rgba(0,0,0,.12));
    }

    @keyframes float { 50% { transform: translateY(-8px); } }

    .orbit-label {
      position: absolute;
      right: 1px;
      bottom: 28px;
      width: 135px;
      font-family: "DM Mono", monospace;
      font-size: 9px;
      line-height: 1.6;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .city-section { padding-top: 30px; }

    .section-heading {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 16px;
    }

    .section-heading h1 {
      margin: 0;
      font-size: clamp(20px, 2.3vw, 32px);
      letter-spacing: -.05em;
      line-height: 1;
    }

    .section-count {
      color: var(--muted);
      font-family: "DM Mono", monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .12em;
    }

    .city-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .city-card {
      --sky-a: #58a5d8;
      --sky-b: #86d0d0;
      --card-ink: #102026;
      position: relative;
      min-height: 250px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      color: var(--card-ink);
      background: linear-gradient(145deg, var(--sky-a), var(--sky-b));
      border-radius: var(--radius);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.14), var(--shadow);
      animation: card-in .55s cubic-bezier(.2,.85,.25,1) both;
      animation-delay: calc(var(--i, 0) * 70ms);
      transition: transform .3s cubic-bezier(.2,.8,.2,1), box-shadow .3s;
    }

    .city-card:hover {
      transform: translateY(-5px);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.22), 0 26px 55px rgba(37,32,25,.17);
    }

    @keyframes card-in {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .city-card.morning { --sky-a: #f7c86e; --sky-b: #f49a82; --card-ink: #392d26; }
    .city-card.afternoon { --sky-a: #67b8d8; --sky-b: #80d0bd; --card-ink: #133039; }
    .city-card.evening { --sky-a: #b36569; --sky-b: #48436d; --card-ink: #fff8ec; }
    .city-card.night { --sky-a: #122038; --sky-b: #273857; --card-ink: #f4eee3; }

    .sky-grain {
      position: absolute;
      inset: 0;
      opacity: .14;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.35'/%3E%3C/svg%3E");
      pointer-events: none;
      mix-blend-mode: soft-light;
    }

    .city-top, .card-bottom {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .city-name { margin: 0; font-size: 17px; line-height: 1.2; letter-spacing: -.03em; }

    .city-zone {
      margin-top: 4px;
      font-family: "DM Mono", monospace;
      font-size: 9px;
      letter-spacing: .11em;
      text-transform: uppercase;
      opacity: .64;
    }

    .remove-city {
      width: 30px;
      height: 30px;
      flex: 0 0 30px;
      display: grid;
      place-items: center;
      padding: 0;
      border: 1px solid currentColor;
      border-radius: 50%;
      color: inherit;
      background: transparent;
      opacity: .42;
      cursor: pointer;
      transition: opacity .2s, transform .2s, background .2s;
    }

    .remove-city:hover { opacity: 1; transform: rotate(90deg); background: rgba(255,255,255,.13); }
    .remove-city svg { width: 13px; height: 13px; }

    .celestial {
      position: absolute;
      z-index: 1;
      width: 98px;
      height: 98px;
      right: 28px;
      top: 62px;
      color: currentColor;
      opacity: .86;
      filter: drop-shadow(0 10px 24px rgba(0,0,0,.08));
    }

    .city-time {
      position: relative;
      z-index: 2;
      margin: auto 0 16px;
      font-family: "DM Mono", monospace;
      font-size: clamp(35px, 3.1vw, 52px);
      font-weight: 300;
      letter-spacing: -.075em;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .city-time small {
      margin-left: .16em;
      font-family: "Manrope", sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .09em;
      text-transform: uppercase;
      opacity: .65;
    }

    .card-bottom { align-items: flex-end; }

    .city-date, .phase-name {
      font-family: "DM Mono", monospace;
      font-size: 9px;
      line-height: 1.45;
      letter-spacing: .08em;
      text-transform: uppercase;
      opacity: .68;
    }

    .phase-name { text-align: right; }

    .day-progress {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 4px;
      background: rgba(255,255,255,.18);
    }

    .day-progress span {
      display: block;
      width: var(--progress);
      height: 100%;
      background: currentColor;
      opacity: .62;
      transition: width 1s linear;
    }

    .empty-card {
      min-height: 250px;
      border: 1px dashed rgba(23,32,31,.28);
      border-radius: var(--radius);
      display: grid;
      place-items: center;
      background: rgba(255,255,255,.13);
      text-align: center;
      cursor: pointer;
      transition: background .2s, border-color .2s, transform .2s;
    }

    .empty-card:hover { background: rgba(255,255,255,.48); border-color: var(--accent); transform: translateY(-3px); }
    .empty-card .plus { font: 300 40px/1 "DM Mono", monospace; color: var(--accent); }
    .empty-card strong { display: block; margin-top: 8px; font-size: 13px; }
    .empty-card span { display: block; margin-top: 5px; color: var(--muted); font-size: 11px; }

    .footer {
      margin-top: 28px;
      padding-top: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-family: "DM Mono", monospace;
      font-size: 9px;
      letter-spacing: .1em;
      text-transform: uppercase;
    }

    dialog {
      width: min(620px, calc(100% - 28px));
      max-height: min(720px, calc(100vh - 30px));
      padding: 0;
      border: 0;
      border-radius: 28px;
      color: var(--ink);
      background: #f8f5ed;
      box-shadow: 0 40px 100px rgba(12,16,15,.28);
      overflow: hidden;
    }

    dialog::backdrop { background: rgba(17,22,21,.5); backdrop-filter: blur(7px); }
    dialog[open] { animation: dialog-in .25s cubic-bezier(.2,.8,.2,1); }

    @keyframes dialog-in { from { opacity: 0; transform: translateY(12px) scale(.98); } }

    .dialog-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      padding: 26px 26px 20px;
    }

    .dialog-head h2 { margin: 0; font-size: 26px; letter-spacing: -.05em; }
    .dialog-head p { margin: 5px 0 0; color: var(--muted); font-size: 12px; }

    .close-dialog {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      padding: 0;
    }

    .close-dialog svg { width: 15px; }

    .search-wrap { padding: 0 26px 16px; position: relative; }
    .search-wrap svg { position: absolute; width: 17px; left: 43px; top: 17px; color: var(--muted); }

    .search-input {
      width: 100%;
      height: 52px;
      padding: 0 16px 0 46px;
      border: 1px solid var(--line);
      border-radius: 14px;
      color: var(--ink);
      background: #fffdf8;
      font-size: 14px;
      outline: none;
    }

    .search-input::placeholder { color: #92958f; }

    .city-options {
      max-height: 430px;
      overflow-y: auto;
      padding: 0 14px 18px;
      scrollbar-color: rgba(23,32,31,.25) transparent;
    }

    .city-option {
      width: 100%;
      min-height: 62px;
      padding: 10px 13px;
      display: grid;
      grid-template-columns: 38px 1fr auto;
      align-items: center;
      gap: 12px;
      border: 0;
      border-bottom: 1px solid rgba(23,32,31,.09);
      background: transparent;
      text-align: left;
      cursor: pointer;
      transition: background .15s, transform .15s;
    }

    .city-option:hover { background: white; transform: translateX(3px); }
    .option-icon { width: 34px; height: 34px; display: grid; place-items: center; border-radius: 50%; background: var(--paper-deep); }
    .option-icon svg { width: 18px; height: 18px; }
    .option-name strong { display: block; font-size: 13px; }
    .option-name span, .option-time { color: var(--muted); font-family: "DM Mono", monospace; font-size: 9px; letter-spacing: .06em; text-transform: uppercase; }
    .option-time { color: var(--ink); font-size: 12px; }
    .no-results { padding: 50px 20px; text-align: center; color: var(--muted); font-size: 13px; }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      z-index: 20;
      padding: 12px 16px;
      border-radius: 999px;
      color: white;
      background: var(--ink);
      font-size: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,.2);
      transform: translate(-50%, 25px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s, transform .25s;
    }

    .toast.show { opacity: 1; transform: translate(-50%, 0); }

    @media (max-width: 1100px) {
      .city-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .city-time { font-size: clamp(42px, 6vw, 62px); }
      .orbit-label { display: none; }
    }

    @media (max-width: 700px) {
      .app-shell { padding-top: 10px; }
      .topbar { grid-template-columns: 1fr auto; min-height: 62px; }
      .date-line { display: none; }
      .add-button .button-label { display: none; }
      .add-button { width: 40px; padding: 0; justify-content: center; }
      .hero { grid-template-columns: 1fr; min-height: 0; }
      .hero-time { padding: 40px 0 32px; }
      .local-clock { font-size: clamp(54px, 17vw, 98px); }
      .orbit-stage { display: none; }
      .city-grid { grid-template-columns: 1fr; }
      .city-card, .empty-card { min-height: 228px; }
      .city-time { font-size: clamp(44px, 14vw, 62px); }
      .section-heading { align-items: center; }
      .footer { flex-direction: column; align-items: flex-start; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .01ms !important; animation-iteration-count: 1 !important; scroll-behavior: auto !important; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand" aria-label="Interactive World Clock">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>World Clock</span>
      </div>
      <div class="date-line" id="globalDate">—</div>
      <div class="top-actions">
        <div class="format-toggle" aria-label="Time format">
          <button type="button" data-format="12" aria-pressed="true">12H</button>
          <button type="button" data-format="24" aria-pressed="false">24H</button>
        </div>
        <button class="add-button" id="openAdd" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
          <span class="button-label">Add city</span>
        </button>
      </div>
    </header>

    <main>
      <section class="hero" aria-labelledby="localLabel">
        <div class="hero-time">
          <div class="eyebrow" id="localLabel"><span class="live-dot"></span>Your local time · live</div>
          <div class="local-clock" id="localClock" aria-live="off">--:--<span class="seconds">--</span></div>
          <div class="local-meta">
            <strong id="localPlace">Local</strong>
            <span class="meta-separator"></span>
            <span id="localDate">—</span>
          </div>
        </div>
        <div class="orbit-stage" aria-hidden="true">
          <div class="phase-orb" id="phaseOrb"></div>
          <div class="orbit-label" id="orbitLabel">Current solar phase<br>Calculating position</div>
        </div>
      </section>

      <section class="city-section" aria-labelledby="cityHeading">
        <div class="section-heading">
          <h1 id="cityHeading">Around the world</h1>
          <div class="section-count" id="cityCount">— locations</div>
        </div>
        <div class="city-grid" id="cityGrid"></div>
      </section>
    </main>

    <footer class="footer">
      <span>Synced to your device · Updates every second</span>
      <span id="utcStamp">UTC —</span>
    </footer>
  </div>

  <dialog id="cityDialog" aria-labelledby="dialogTitle">
    <div class="dialog-head">
      <div>
        <h2 id="dialogTitle">Add a city</h2>
        <p>Choose another place to keep in view.</p>
      </div>
      <button class="close-dialog" id="closeDialog" type="button" aria-label="Close city picker">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6L6 18"/></svg>
      </button>
    </div>
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m20 20-4-4"/></svg>
      <input class="search-input" id="citySearch" type="search" placeholder="Search city or country…" autocomplete="off">
    </div>
    <div class="city-options" id="cityOptions" role="listbox" aria-label="Available cities"></div>
  </dialog>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const CITY_CATALOG = [
      { id: 'new-york', city: 'New York', country: 'United States', zone: 'America/New_York' },
      { id: 'los-angeles', city: 'Los Angeles', country: 'United States', zone: 'America/Los_Angeles' },
      { id: 'mexico-city', city: 'Mexico City', country: 'Mexico', zone: 'America/Mexico_City' },
      { id: 'sao-paulo', city: 'São Paulo', country: 'Brazil', zone: 'America/Sao_Paulo' },
      { id: 'vancouver', city: 'Vancouver', country: 'Canada', zone: 'America/Vancouver' },
      { id: 'toronto', city: 'Toronto', country: 'Canada', zone: 'America/Toronto' },
      { id: 'honolulu', city: 'Honolulu', country: 'United States', zone: 'Pacific/Honolulu' },
      { id: 'london', city: 'London', country: 'United Kingdom', zone: 'Europe/London' },
      { id: 'paris', city: 'Paris', country: 'France', zone: 'Europe/Paris' },
      { id: 'lisbon', city: 'Lisbon', country: 'Portugal', zone: 'Europe/Lisbon' },
      { id: 'berlin', city: 'Berlin', country: 'Germany', zone: 'Europe/Berlin' },
      { id: 'rome', city: 'Rome', country: 'Italy', zone: 'Europe/Rome' },
      { id: 'athens', city: 'Athens', country: 'Greece', zone: 'Europe/Athens' },
      { id: 'reykjavik', city: 'Reykjavík', country: 'Iceland', zone: 'Atlantic/Reykjavik' },
      { id: 'cairo', city: 'Cairo', country: 'Egypt', zone: 'Africa/Cairo' },
      { id: 'lagos', city: 'Lagos', country: 'Nigeria', zone: 'Africa/Lagos' },
      { id: 'cape-town', city: 'Cape Town', country: 'South Africa', zone: 'Africa/Johannesburg' },
      { id: 'dubai', city: 'Dubai', country: 'United Arab Emirates', zone: 'Asia/Dubai' },
      { id: 'mumbai', city: 'Mumbai', country: 'India', zone: 'Asia/Kolkata' },
      { id: 'delhi', city: 'New Delhi', country: 'India', zone: 'Asia/Kolkata' },
      { id: 'bangkok', city: 'Bangkok', country: 'Thailand', zone: 'Asia/Bangkok' },
      { id: 'singapore', city: 'Singapore', country: 'Singapore', zone: 'Asia/Singapore' },
      { id: 'hong-kong', city: 'Hong Kong', country: 'China', zone: 'Asia/Hong_Kong' },
      { id: 'shanghai', city: 'Shanghai', country: 'China', zone: 'Asia/Shanghai' },
      { id: 'seoul', city: 'Seoul', country: 'South Korea', zone: 'Asia/Seoul' },
      { id: 'tokyo', city: 'Tokyo', country: 'Japan', zone: 'Asia/Tokyo' },
      { id: 'perth', city: 'Perth', country: 'Australia', zone: 'Australia/Perth' },
      { id: 'sydney', city: 'Sydney', country: 'Australia', zone: 'Australia/Sydney' },
      { id: 'auckland', city: 'Auckland', country: 'New Zealand', zone: 'Pacific/Auckland' }
    ];

    const DEFAULT_CITIES = ['new-york', 'london', 'tokyo', 'sydney'];
    const $ = (selector, root = document) => root.querySelector(selector);
    const $$ = (selector, root = document) => [...root.querySelectorAll(selector)];
    const grid = $('#cityGrid');
    const dialog = $('#cityDialog');
    const search = $('#citySearch');
    const options = $('#cityOptions');
    const localZone = Intl.DateTimeFormat().resolvedOptions().timeZone || 'UTC';
    let hourFormat = localStorage.getItem('world-clock-format') || '12';
    let activeIds;

    try {
      const stored = JSON.parse(localStorage.getItem('world-clock-cities'));
      activeIds = Array.isArray(stored) && stored.length ? stored.filter(id => CITY_CATALOG.some(c => c.id === id)) : DEFAULT_CITIES;
    } catch { activeIds = DEFAULT_CITIES; }
    if (!activeIds.length) activeIds = DEFAULT_CITIES;

    function escapeHTML(value) {
      return value.replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
    }

    function partsFor(date, zone) {
      const parts = new Intl.DateTimeFormat('en-US', {
        timeZone: zone, hour: 'numeric', minute: '2-digit', second: '2-digit', hourCycle: 'h23'
      }).formatToParts(date).reduce((acc, part) => (acc[part.type] = part.value, acc), {});
      return { hour: Number(parts.hour), minute: Number(parts.minute), second: Number(parts.second) };
    }

    function phaseFor(hour) {
      if (hour >= 5 && hour < 12) return { key: 'morning', label: 'Morning light', icon: 'sunrise' };
      if (hour >= 12 && hour < 17) return { key: 'afternoon', label: 'Afternoon', icon: 'sun' };
      if (hour >= 17 && hour < 21) return { key: 'evening', label: 'Evening glow', icon: 'sunset' };
      return { key: 'night', label: 'Night time', icon: 'moon' };
    }

    function iconSVG(type) {
      if (type === 'moon') return `<svg class="celestial" viewBox="0 0 100 100" fill="none" aria-hidden="true"><path d="M73 70.5A36 36 0 0 1 37 19a36 36 0 1 0 36 51.5Z" fill="currentColor"/><circle cx="25" cy="22" r="2" fill="currentColor"/><circle cx="79" cy="35" r="1.5" fill="currentColor"/><path d="m80 15 1.5 4.5L86 21l-4.5 1.5L80 27l-1.5-4.5L74 21l4.5-1.5L80 15Z" fill="currentColor"/></svg>`;
      if (type === 'sun') return `<svg class="celestial" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="50" cy="50" r="25" fill="currentColor" stroke="none"/><path d="M50 4v13M50 83v13M4 50h13M83 50h13M17.5 17.5l9 9M73.5 73.5l9 9M82.5 17.5l-9 9M26.5 73.5l-9 9"/></svg>`;
      if (type === 'sunrise') return `<svg class="celestial" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 66a29 29 0 0 1 58 0" fill="currentColor" stroke="none" opacity=".9"/><path d="M8 67h84M50 13v14M19 29l10 10M81 29 71 39"/><path d="M18 77h64M29 87h42" opacity=".65"/></svg>`;
      return `<svg class="celestial" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 60a29 29 0 0 1 58 0" fill="currentColor" stroke="none" opacity=".9"/><path d="M8 61h84M50 8v14M19 24l10 10M81 24 71 34"/><path d="M13 72h74M23 82h54M35 92h30" opacity=".65"/></svg>`;
    }

    function offsetLabel(date, zone) {
      try {
        const label = new Intl.DateTimeFormat('en-US', { timeZone: zone, timeZoneName: 'shortOffset' })
          .formatToParts(date).find(p => p.type === 'timeZoneName')?.value || 'UTC';
        return label.replace('GMT', 'UTC');
      } catch { return 'UTC'; }
    }

    function renderGrid() {
      const now = new Date();
      grid.innerHTML = activeIds.map((id, index) => {
        const city = CITY_CATALOG.find(c => c.id === id);
        const p = partsFor(now, city.zone);
        const phase = phaseFor(p.hour);
        return `<article class="city-card ${phase.key}" data-id="${city.id}" style="--i:${index}">
          <div class="sky-grain"></div>
          <div class="city-top">
            <div><h2 class="city-name">${escapeHTML(city.city)}</h2><div class="city-zone">${escapeHTML(city.country)} · <span class="offset">${offsetLabel(now, city.zone)}</span></div></div>
            <button class="remove-city" type="button" data-remove="${city.id}" aria-label="Remove ${escapeHTML(city.city)}">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6 6 18"/></svg>
            </button>
          </div>
          <div class="icon-slot">${iconSVG(phase.icon)}</div>
          <div class="city-time">--:--</div>
          <div class="card-bottom"><div class="city-date">—</div><div class="phase-name">${phase.label}</div></div>
          <div class="day-progress" aria-hidden="true"><span></span></div>
        </article>`;
      }).join('') + `<button class="empty-card" type="button" id="gridAdd"><div><div class="plus">+</div><strong>Add another city</strong><span>29 locations available</span></div></button>`;

      $('#cityCount').textContent = `${activeIds.length} ${activeIds.length === 1 ? 'location' : 'locations'}`;
      $$('[data-remove]').forEach(button => button.addEventListener('click', () => removeCity(button.dataset.remove)));
      $('#gridAdd').addEventListener('click', openDialog);
      updateClocks();
    }

    function formatTime(date, zone, includeSeconds = false) {
      const options = {
        timeZone: zone,
        hour: 'numeric', minute: '2-digit',
        hour12: hourFormat === '12'
      };
      if (includeSeconds) options.second = '2-digit';
      return new Intl.DateTimeFormat('en-US', options).formatToParts(date);
    }

    function timeMarkup(date, zone) {
      const parts = formatTime(date, zone);
      const hour = parts.find(p => p.type === 'hour')?.value || '00';
      const minute = parts.find(p => p.type === 'minute')?.value || '00';
      const dayPeriod = parts.find(p => p.type === 'dayPeriod')?.value || '';
      return `${hour}:${minute}${dayPeriod ? `<small>${dayPeriod}</small>` : ''}`;
    }

    function updateClocks() {
      const now = new Date();
      const local = partsFor(now, localZone);
      const heroParts = formatTime(now, localZone, true);
      const hh = heroParts.find(p => p.type === 'hour')?.value || '00';
      const mm = heroParts.find(p => p.type === 'minute')?.value || '00';
      const ss = heroParts.find(p => p.type === 'second')?.value || '00';
      const period = heroParts.find(p => p.type === 'dayPeriod')?.value || '';
      $('#localClock').innerHTML = `${hh}:${mm}<span class="seconds">${ss}${period ? ' ' + period : ''}</span>`;
      $('#localDate').textContent = new Intl.DateTimeFormat('en-US', { weekday: 'long', month: 'long', day: 'numeric' }).format(now);
      $('#globalDate').textContent = new Intl.DateTimeFormat('en-US', { weekday: 'short', month: 'short', day: '2-digit', year: 'numeric' }).format(now);
      $('#utcStamp').textContent = `UTC ${now.toISOString().slice(11,19)}`;

      const localName = localZone === 'UTC' ? 'UTC' : localZone.split('/').pop().replaceAll('_', ' ');
      $('#localPlace').textContent = localName;
      const localPhase = phaseFor(local.hour);
      const orbColors = {
        morning: ['#f5a84d', 'rgba(245,168,77,.42)'],
        afternoon: ['#f2cb55', 'rgba(242,203,85,.38)'],
        evening: ['#e66d4d', 'rgba(230,109,77,.38)'],
        night: ['#7488ad', 'rgba(42,63,98,.36)']
      };
      $('#phaseOrb').style.setProperty('--orb', orbColors[localPhase.key][0]);
      $('#phaseOrb').style.setProperty('--orb-glow', orbColors[localPhase.key][1]);
      $('#orbitLabel').innerHTML = `Current solar phase<br>${localPhase.label} · ${offsetLabel(now, localZone)}`;

      $$('.city-card').forEach(card => {
        const city = CITY_CATALOG.find(c => c.id === card.dataset.id);
        const p = partsFor(now, city.zone);
        const phase = phaseFor(p.hour);
        const currentPhase = ['morning','afternoon','evening','night'].find(x => card.classList.contains(x));
        if (currentPhase !== phase.key) {
          card.classList.remove('morning','afternoon','evening','night');
          card.classList.add(phase.key);
          $('.icon-slot', card).innerHTML = iconSVG(phase.icon);
        }
        $('.city-time', card).innerHTML = timeMarkup(now, city.zone);
        $('.city-date', card).innerHTML = new Intl.DateTimeFormat('en-US', { timeZone: city.zone, weekday: 'short', month: 'short', day: 'numeric' }).format(now).replace(', ', '<br>');
        $('.phase-name', card).textContent = phase.label;
        $('.offset', card).textContent = offsetLabel(now, city.zone);
        const progress = ((p.hour * 3600 + p.minute * 60 + p.second) / 86400) * 100;
        card.style.setProperty('--progress', `${progress}%`);
      });
    }

    function openDialog() {
      renderOptions('');
      dialog.showModal();
      requestAnimationFrame(() => search.focus());
    }

    function closeDialog() { dialog.close(); search.value = ''; }

    function renderOptions(query) {
      const normalized = query.trim().toLocaleLowerCase();
      const matches = CITY_CATALOG.filter(city => !activeIds.includes(city.id) &&
        (`${city.city} ${city.country} ${city.zone}`).toLocaleLowerCase().includes(normalized));
      const now = new Date();
      options.innerHTML = matches.length ? matches.map(city => {
        const phase = phaseFor(partsFor(now, city.zone).hour);
        return `<button class="city-option" type="button" role="option" data-add="${city.id}">
          <span class="option-icon">${iconSVG(phase.icon).replace('class="celestial"', '')}</span>
          <span class="option-name"><strong>${escapeHTML(city.city)}</strong><span>${escapeHTML(city.country)} · ${offsetLabel(now, city.zone)}</span></span>
          <span class="option-time">${new Intl.DateTimeFormat('en-US', { timeZone: city.zone, hour: 'numeric', minute: '2-digit', hour12: hourFormat === '12' }).format(now)}</span>
        </button>`;
      }).join('') : `<div class="no-results">${normalized ? 'No matching cities found.' : 'All available cities are already on your board.'}</div>`;
      $$('[data-add]', options).forEach(button => button.addEventListener('click', () => addCity(button.dataset.add)));
    }

    function addCity(id) {
      if (activeIds.includes(id)) return;
      const city = CITY_CATALOG.find(c => c.id === id);
      activeIds.push(id);
      persist();
      renderGrid();
      closeDialog();
      showToast(`${city.city} added to your clock`);
      setTimeout(() => document.querySelector(`[data-id="${id}"]`)?.scrollIntoView({ behavior: 'smooth', block: 'center' }), 120);
    }

    function removeCity(id) {
      const city = CITY_CATALOG.find(c => c.id === id);
      activeIds = activeIds.filter(item => item !== id);
      if (!activeIds.length) {
        activeIds = [id];
        showToast('Keep at least one city in view');
        return;
      }
      persist();
      renderGrid();
      showToast(`${city.city} removed`);
    }

    function persist() { localStorage.setItem('world-clock-cities', JSON.stringify(activeIds)); }

    let toastTimer;
    function showToast(message) {
      const toast = $('#toast');
      toast.textContent = message;
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
    }

    $$('.format-toggle button').forEach(button => {
      button.setAttribute('aria-pressed', String(button.dataset.format === hourFormat));
      button.addEventListener('click', () => {
        hourFormat = button.dataset.format;
        localStorage.setItem('world-clock-format', hourFormat);
        $$('.format-toggle button').forEach(b => b.setAttribute('aria-pressed', String(b === button)));
        updateClocks();
        if (dialog.open) renderOptions(search.value);
      });
    });

    $('#openAdd').addEventListener('click', openDialog);
    $('#closeDialog').addEventListener('click', closeDialog);
    search.addEventListener('input', () => renderOptions(search.value));
    dialog.addEventListener('click', event => {
      const rect = dialog.getBoundingClientRect();
      if (event.clientX < rect.left || event.clientX > rect.right || event.clientY < rect.top || event.clientY > rect.bottom) closeDialog();
    });

    renderGrid();
    updateClocks();
    setInterval(updateClocks, 1000);
  </script>
</body>
</html>
