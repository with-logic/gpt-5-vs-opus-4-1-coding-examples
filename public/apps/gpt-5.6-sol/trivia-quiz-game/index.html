<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f3efe5">
  <title>Common Ground — American Trivia</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Newsreader:opsz,wght@6..72,500;6..72,650;6..72,750&display=swap');

    :root {
      --ink: #17253f;
      --ink-2: #465064;
      --paper: #f7f3e9;
      --card: #fffdf8;
      --red: #d94a43;
      --red-soft: #f8dfda;
      --green: #187b56;
      --green-soft: #d9efe5;
      --line: rgba(23, 37, 63, .17);
      --shadow: 0 24px 60px rgba(30, 39, 55, .12), 0 2px 0 rgba(23, 37, 63, .08);
      --serif: "Newsreader", Georgia, serif;
      --mono: "DM Mono", ui-monospace, SFMono-Regular, monospace;
    }

    * { box-sizing: border-box; }

    html, body { min-height: 100%; }

    body {
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(rgba(23,37,63,.028) 1px, transparent 1px),
        linear-gradient(90deg, rgba(23,37,63,.028) 1px, transparent 1px),
        var(--paper);
      background-size: 32px 32px;
      font-family: var(--serif);
      overflow-x: hidden;
    }

    body::before, body::after {
      content: "";
      position: fixed;
      z-index: -1;
      border-radius: 50%;
      filter: blur(2px);
      opacity: .55;
      pointer-events: none;
    }

    body::before {
      width: 410px;
      height: 410px;
      right: -210px;
      top: -180px;
      background: rgba(217, 74, 67, .13);
    }

    body::after {
      width: 380px;
      height: 380px;
      left: -230px;
      bottom: -180px;
      background: rgba(23, 37, 63, .10);
    }

    button { font: inherit; }

    .skip-link {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 100;
      padding: 10px 14px;
      color: white;
      background: var(--ink);
      border-radius: 8px;
      transform: translateY(-150%);
      transition: transform .2s ease;
    }

    .skip-link:focus { transform: translateY(0); }

    .shell {
      width: min(1040px, calc(100% - 40px));
      min-height: 100vh;
      margin: 0 auto;
      padding: 34px 0 28px;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
    }

    .masthead {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--line);
    }

    .brand { display: flex; align-items: center; gap: 13px; }

    .seal {
      width: 42px;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      color: var(--paper);
      background: var(--ink);
      border-radius: 50%;
      font: 500 15px/1 var(--mono);
      letter-spacing: -.05em;
      box-shadow: inset 0 0 0 3px var(--ink), inset 0 0 0 4px rgba(247,243,233,.5);
    }

    .brand-copy { display: grid; gap: 1px; }

    .brand-name {
      font-size: 22px;
      font-weight: 750;
      letter-spacing: -.02em;
    }

    .brand-sub, .round-label, .eyebrow, .progress-count, .shortcut, .footer-note {
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: .09em;
    }

    .brand-sub { color: var(--ink-2); font-size: 9px; }

    .round-label {
      color: var(--ink-2);
      font-size: 10px;
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .round-label::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--red);
      box-shadow: 0 0 0 4px rgba(217,74,67,.12);
    }

    .progress-wrap { padding: 23px 0 0; }

    .progress-meta {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 9px;
    }

    .progress-count { font-size: 10px; color: var(--ink-2); }
    .progress-count strong { color: var(--ink); font-weight: 500; }

    .score-mini {
      font: 500 10px/1 var(--mono);
      letter-spacing: .05em;
      color: var(--ink-2);
    }

    .progress-track {
      height: 7px;
      overflow: hidden;
      background: rgba(23,37,63,.1);
      border-radius: 99px;
    }

    .progress-bar {
      height: 100%;
      width: 0;
      background: var(--red);
      border-radius: inherit;
      transition: width .65s cubic-bezier(.22,1,.36,1);
    }

    main {
      width: 100%;
      display: grid;
      place-items: center;
      padding: 34px 0 38px;
    }

    .quiz-card {
      position: relative;
      width: min(780px, 100%);
      min-height: 540px;
      padding: clamp(30px, 5.5vw, 58px);
      background: var(--card);
      border: 1px solid rgba(23,37,63,.13);
      border-radius: 3px 3px 24px 3px;
      box-shadow: var(--shadow);
      isolation: isolate;
    }

    .quiz-card::before {
      content: "";
      position: absolute;
      top: 11px;
      left: 11px;
      right: 11px;
      bottom: 11px;
      z-index: -1;
      border: 1px solid rgba(23,37,63,.06);
      border-radius: 1px 1px 17px 1px;
      pointer-events: none;
    }

    .question-view { animation: arrive .48s cubic-bezier(.22,1,.36,1) both; }

    .eyebrow {
      margin: 0 0 16px;
      color: var(--red);
      font-size: 10px;
      font-weight: 500;
    }

    h1 {
      max-width: 680px;
      margin: 0 0 34px;
      font-size: clamp(34px, 5.3vw, 57px);
      line-height: .99;
      letter-spacing: -.04em;
      text-wrap: balance;
    }

    .answers {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .answer {
      min-height: 74px;
      padding: 15px 17px;
      display: grid;
      grid-template-columns: 35px 1fr 25px;
      align-items: center;
      gap: 12px;
      color: var(--ink);
      background: transparent;
      border: 1px solid var(--line);
      border-radius: 11px;
      text-align: left;
      cursor: pointer;
      transition: transform .18s ease, border-color .18s ease, background .18s ease, box-shadow .18s ease;
    }

    .answer:hover:not(:disabled) {
      transform: translateY(-2px);
      border-color: rgba(23,37,63,.52);
      background: rgba(23,37,63,.025);
      box-shadow: 0 7px 18px rgba(23,37,63,.07);
    }

    .answer:focus-visible, .next-btn:focus-visible, .restart-btn:focus-visible {
      outline: 3px solid rgba(217,74,67,.3);
      outline-offset: 3px;
    }

    .answer:disabled { cursor: default; }

    .choice-letter {
      width: 35px;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 50%;
      font: 500 11px/1 var(--mono);
      transition: inherit;
    }

    .answer-text { font-size: 19px; line-height: 1.15; font-weight: 650; }

    .status-icon {
      width: 24px;
      height: 24px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      opacity: 0;
      transform: scale(.35) rotate(-20deg);
      transition: opacity .2s ease, transform .35s cubic-bezier(.34,1.56,.64,1);
      font: 500 14px/1 var(--mono);
    }

    .answer.correct {
      border-color: var(--green);
      background: var(--green-soft);
      box-shadow: inset 4px 0 0 var(--green);
    }

    .answer.correct .choice-letter { color: white; background: var(--green); border-color: var(--green); }
    .answer.correct .status-icon { color: white; background: var(--green); }

    .answer.wrong {
      border-color: var(--red);
      background: var(--red-soft);
      box-shadow: inset 4px 0 0 var(--red);
      animation: shake .38s ease;
    }

    .answer.wrong .choice-letter { color: white; background: var(--red); border-color: var(--red); }
    .answer.wrong .status-icon { color: white; background: var(--red); }
    .answer.correct .status-icon, .answer.wrong .status-icon { opacity: 1; transform: scale(1) rotate(0); }
    .answer.dimmed { opacity: .48; }

    .feedback {
      min-height: 76px;
      margin-top: 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      border-top: 1px solid transparent;
      opacity: 0;
      transform: translateY(7px);
      transition: opacity .3s ease, transform .3s ease, border-color .3s ease;
      pointer-events: none;
    }

    .feedback.visible {
      opacity: 1;
      transform: none;
      border-color: var(--line);
      pointer-events: auto;
    }

    .feedback-message { display: grid; gap: 3px; }
    .feedback-title { font-size: 22px; line-height: 1; font-weight: 750; }
    .feedback-note { color: var(--ink-2); font-size: 14px; }

    .next-btn, .restart-btn {
      flex: 0 0 auto;
      border: 0;
      color: white;
      background: var(--ink);
      border-radius: 9px;
      cursor: pointer;
      box-shadow: 0 4px 0 #091225;
      transition: transform .15s ease, box-shadow .15s ease, background .15s ease;
      font: 500 11px/1 var(--mono);
      text-transform: uppercase;
      letter-spacing: .07em;
    }

    .next-btn { padding: 17px 19px; }
    .restart-btn { padding: 18px 24px; margin-top: 25px; }
    .next-btn:hover, .restart-btn:hover { background: #263b61; transform: translateY(-1px); }
    .next-btn:active, .restart-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #091225; }

    .results {
      min-height: 420px;
      display: none;
      place-items: center;
      text-align: center;
      animation: arrive .55s cubic-bezier(.22,1,.36,1) both;
    }

    .results.show { display: grid; }

    .result-seal {
      width: 88px;
      height: 88px;
      margin: 0 auto 24px;
      display: grid;
      place-items: center;
      color: var(--paper);
      background: var(--red);
      border-radius: 50%;
      box-shadow: 0 0 0 8px var(--red-soft), 0 0 0 9px rgba(217,74,67,.3);
      font: 500 29px/1 var(--mono);
      transform: rotate(-6deg);
    }

    .results h2 {
      margin: 0;
      font-size: clamp(44px, 8vw, 76px);
      line-height: .95;
      letter-spacing: -.045em;
    }

    .result-copy {
      max-width: 480px;
      margin: 15px auto 0;
      color: var(--ink-2);
      font-size: 19px;
      line-height: 1.45;
    }

    .score-line {
      margin-top: 24px;
      font: 500 11px/1 var(--mono);
      letter-spacing: .09em;
      text-transform: uppercase;
    }

    footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
    }

    .footer-note { color: var(--ink-2); font-size: 9px; }
    .shortcut { color: var(--ink-2); font-size: 9px; }
    .shortcut kbd {
      padding: 3px 6px;
      color: var(--ink);
      background: rgba(255,255,255,.52);
      border: 1px solid var(--line);
      border-radius: 4px;
      box-shadow: 0 1px 0 rgba(23,37,63,.15);
      font: inherit;
    }

    .confetti { position: fixed; inset: 0; z-index: 50; overflow: hidden; pointer-events: none; }
    .confetti i {
      position: absolute;
      top: -20px;
      width: 8px;
      height: 15px;
      background: var(--c);
      transform: rotate(var(--r));
      animation: fall var(--d) var(--delay) cubic-bezier(.18,.74,.38,1) forwards;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @keyframes arrive {
      from { opacity: 0; transform: translateY(18px) scale(.985); }
      to { opacity: 1; transform: none; }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      50% { transform: translateX(4px); }
      75% { transform: translateX(-2px); }
    }

    @keyframes fall {
      to { transform: translate3d(var(--drift), 110vh, 0) rotate(760deg); }
    }

    @media (max-width: 680px) {
      .shell { width: min(100% - 24px, 1040px); padding-top: 18px; }
      .masthead { padding-bottom: 14px; }
      .brand-sub, .round-label { display: none; }
      .seal { width: 37px; }
      .brand-name { font-size: 19px; }
      .progress-wrap { padding-top: 16px; }
      main { padding: 18px 0 22px; align-items: start; }
      .quiz-card { min-height: 0; padding: 29px 22px 22px; border-radius: 2px 2px 19px 2px; }
      .eyebrow { margin-bottom: 12px; }
      h1 { margin-bottom: 24px; font-size: clamp(31px, 10vw, 44px); }
      .answers { grid-template-columns: 1fr; gap: 9px; }
      .answer { min-height: 62px; padding: 11px 13px; grid-template-columns: 31px 1fr 23px; }
      .choice-letter { width: 31px; }
      .answer-text { font-size: 17px; }
      .feedback { align-items: stretch; flex-direction: column; gap: 14px; padding-top: 17px; }
      .next-btn { width: 100%; }
      .results { min-height: 440px; }
      footer { justify-content: center; }
      .shortcut { display: none; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { scroll-behavior: auto !important; animation-duration: .01ms !important; animation-iteration-count: 1 !important; transition-duration: .01ms !important; }
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#quiz">Skip to question</a>
  <div class="shell">
    <header class="masthead">
      <div class="brand" aria-label="Common Ground American Trivia">
        <span class="seal" aria-hidden="true">CG</span>
        <span class="brand-copy">
          <span class="brand-name">Common Ground</span>
          <span class="brand-sub">A little quiz about the place we call home</span>
        </span>
      </div>
      <span class="round-label">Civics · Culture · Geography</span>
    </header>

    <section class="progress-wrap" aria-label="Quiz progress">
      <div class="progress-meta">
        <span class="progress-count" id="progressText"><strong>Question 01</strong> / 10</span>
        <span class="score-mini" id="scoreMini">Score 00</span>
      </div>
      <div class="progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="10" aria-valuenow="0" aria-label="Questions completed">
        <div class="progress-bar" id="progressBar"></div>
      </div>
    </section>

    <main id="quiz" tabindex="-1">
      <article class="quiz-card">
        <section class="question-view" id="questionView" aria-labelledby="questionText">
          <p class="eyebrow" id="category">American basics</p>
          <h1 id="questionText">Loading your question…</h1>
          <div class="answers" id="answers" role="group" aria-label="Answer choices"></div>
          <div class="feedback" id="feedback">
            <div class="feedback-message" aria-live="polite">
              <span class="feedback-title" id="feedbackTitle"></span>
              <span class="feedback-note" id="feedbackNote"></span>
            </div>
            <button class="next-btn" id="nextButton" type="button">Next question →</button>
          </div>
        </section>

        <section class="results" id="results" aria-labelledby="resultTitle">
          <div>
            <div class="result-seal" id="resultSeal" aria-hidden="true">10</div>
            <p class="eyebrow">The tally is in</p>
            <h2 id="resultTitle">Nicely done.</h2>
            <p class="result-copy" id="resultCopy"></p>
            <p class="score-line" id="scoreLine"></p>
            <button class="restart-btn" id="restartButton" type="button">Shuffle &amp; play again</button>
          </div>
        </section>
      </article>
    </main>

    <footer>
      <span class="footer-note">10 questions · No timer · Just for fun</span>
      <span class="shortcut"><kbd>1</kbd>–<kbd>4</kbd> choose &nbsp; <kbd>Enter</kbd> continue</span>
    </footer>
  </div>
  <div class="confetti" id="confetti" aria-hidden="true"></div>
  <div class="sr-only" id="announcement" aria-live="assertive"></div>

  <script>
    (() => {
      const QUESTION_BANK = [
        {
          category: "Civics · National symbols",
          question: "How many stars are on the United States flag?",
          answers: ["48", "50", "51", "52"],
          correct: "50",
          note: "One star represents each of the 50 states."
        },
        {
          category: "Civics · Government",
          question: "What are the first ten amendments called?",
          answers: ["The Federalist Papers", "The Bill of Rights", "The Preamble", "The Articles"],
          correct: "The Bill of Rights",
          note: "They protect fundamental rights and freedoms."
        },
        {
          category: "Geography · Capitals",
          question: "What is the capital of the United States?",
          answers: ["New York City", "Philadelphia", "Washington, D.C.", "Boston"],
          correct: "Washington, D.C.",
          note: "It has served as the nation’s capital since 1800."
        },
        {
          category: "History · Independence",
          question: "On what date is Independence Day celebrated?",
          answers: ["June 14", "July 4", "September 17", "November 11"],
          correct: "July 4",
          note: "It marks the adoption of the Declaration of Independence in 1776."
        },
        {
          category: "Civics · Government",
          question: "Which branch of government makes federal laws?",
          answers: ["Congress", "The President", "The Supreme Court", "State governors"],
          correct: "Congress",
          note: "Congress is the legislative branch: the Senate and House."
        },
        {
          category: "Geography · States",
          question: "Which is the largest U.S. state by area?",
          answers: ["Texas", "California", "Montana", "Alaska"],
          correct: "Alaska",
          note: "Alaska is more than twice the size of Texas."
        },
        {
          category: "Culture · National pastime",
          question: "Which sport is traditionally called America’s pastime?",
          answers: ["Basketball", "Baseball", "Football", "Hockey"],
          correct: "Baseball",
          note: "The nickname became popular in the 19th century."
        },
        {
          category: "History · Presidents",
          question: "Who was the first president of the United States?",
          answers: ["Thomas Jefferson", "Abraham Lincoln", "George Washington", "John Adams"],
          correct: "George Washington",
          note: "George Washington served from 1789 to 1797."
        },
        {
          category: "Geography · Landmarks",
          question: "The Grand Canyon is located in which state?",
          answers: ["Arizona", "Colorado", "Utah", "Nevada"],
          correct: "Arizona",
          note: "The Colorado River carved the canyon over millions of years."
        },
        {
          category: "Civics · Constitution",
          question: "What is the highest law of the United States?",
          answers: ["The Declaration of Independence", "The Constitution", "The Bill of Rights", "The Civil Code"],
          correct: "The Constitution",
          note: "The Constitution establishes the framework of the federal government."
        }
      ];

      const letters = ["A", "B", "C", "D"];
      const el = {
        questionView: document.getElementById("questionView"),
        category: document.getElementById("category"),
        questionText: document.getElementById("questionText"),
        answers: document.getElementById("answers"),
        feedback: document.getElementById("feedback"),
        feedbackTitle: document.getElementById("feedbackTitle"),
        feedbackNote: document.getElementById("feedbackNote"),
        nextButton: document.getElementById("nextButton"),
        progressText: document.getElementById("progressText"),
        progressBar: document.getElementById("progressBar"),
        progressTrack: document.querySelector(".progress-track"),
        scoreMini: document.getElementById("scoreMini"),
        results: document.getElementById("results"),
        resultTitle: document.getElementById("resultTitle"),
        resultCopy: document.getElementById("resultCopy"),
        resultSeal: document.getElementById("resultSeal"),
        scoreLine: document.getElementById("scoreLine"),
        restartButton: document.getElementById("restartButton"),
        announcement: document.getElementById("announcement"),
        confetti: document.getElementById("confetti")
      };

      let questions = [];
      let index = 0;
      let score = 0;
      let answered = false;

      function shuffle(list) {
        const copy = [...list];
        for (let i = copy.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [copy[i], copy[j]] = [copy[j], copy[i]];
        }
        return copy;
      }

      function startQuiz() {
        questions = shuffle(QUESTION_BANK).map(q => ({ ...q, answers: shuffle(q.answers) }));
        index = 0;
        score = 0;
        answered = false;
        el.results.classList.remove("show");
        el.questionView.style.display = "block";
        el.progressBar.style.width = "0%";
        el.progressTrack.setAttribute("aria-valuenow", "0");
        el.confetti.innerHTML = "";
        renderQuestion();
      }

      function renderQuestion() {
        answered = false;
        const q = questions[index];
        el.questionView.style.animation = "none";
        void el.questionView.offsetWidth;
        el.questionView.style.animation = "";
        el.category.textContent = q.category;
        el.questionText.textContent = q.question;
        el.answers.innerHTML = "";
        el.feedback.classList.remove("visible");
        el.feedbackTitle.textContent = "";
        el.feedbackNote.textContent = "";
        el.progressText.innerHTML = `<strong>Question ${String(index + 1).padStart(2, "0")}</strong> / 10`;
        el.scoreMini.textContent = `Score ${String(score).padStart(2, "0")}`;
        el.nextButton.textContent = index === questions.length - 1 ? "See my score →" : "Next question →";

        q.answers.forEach((answer, i) => {
          const button = document.createElement("button");
          button.className = "answer";
          button.type = "button";
          button.dataset.answer = answer;
          button.setAttribute("aria-label", `${letters[i]}. ${answer}`);
          button.innerHTML = `
            <span class="choice-letter" aria-hidden="true">${letters[i]}</span>
            <span class="answer-text">${answer}</span>
            <span class="status-icon" aria-hidden="true"></span>`;
          button.addEventListener("click", () => chooseAnswer(button));
          el.answers.appendChild(button);
        });

        requestAnimationFrame(() => el.answers.querySelector("button")?.focus({ preventScroll: true }));
      }

      function chooseAnswer(selected) {
        if (answered) return;
        answered = true;
        const q = questions[index];
        const isCorrect = selected.dataset.answer === q.correct;
        if (isCorrect) score++;

        [...el.answers.children].forEach(button => {
          button.disabled = true;
          const icon = button.querySelector(".status-icon");
          if (button.dataset.answer === q.correct) {
            button.classList.add("correct");
            icon.textContent = "✓";
          } else if (button === selected) {
            button.classList.add("wrong");
            icon.textContent = "×";
          } else {
            button.classList.add("dimmed");
          }
        });

        el.feedbackTitle.textContent = isCorrect ? "That’s right." : "Not quite.";
        el.feedbackNote.textContent = q.note;
        el.feedback.classList.add("visible");
        el.scoreMini.textContent = `Score ${String(score).padStart(2, "0")}`;
        const completed = index + 1;
        el.progressBar.style.width = `${completed * 10}%`;
        el.progressTrack.setAttribute("aria-valuenow", String(completed));
        el.announcement.textContent = isCorrect ? `Correct. ${q.note}` : `Incorrect. The correct answer is ${q.correct}. ${q.note}`;
        setTimeout(() => el.nextButton.focus({ preventScroll: true }), 260);
      }

      function next() {
        if (!answered) return;
        if (index < questions.length - 1) {
          index++;
          renderQuestion();
        } else {
          showResults();
        }
      }

      function showResults() {
        el.questionView.style.display = "none";
        el.results.classList.add("show");
        el.progressText.innerHTML = "<strong>Quiz complete</strong> / 10";
        el.resultSeal.textContent = String(score);
        el.scoreLine.textContent = `${score} correct · ${10 - score} missed · ${score * 10}%`;

        if (score === 10) {
          el.resultTitle.textContent = "A perfect ten.";
          el.resultCopy.textContent = "From the flag to the Constitution, you know the basics inside and out.";
        } else if (score >= 8) {
          el.resultTitle.textContent = "Strong showing.";
          el.resultCopy.textContent = "You have a great handle on the places, people, and ideas that shape the country.";
        } else if (score >= 6) {
          el.resultTitle.textContent = "Nicely done.";
          el.resultCopy.textContent = "A solid score—and a few fresh facts to carry into the next round.";
        } else {
          el.resultTitle.textContent = "Good first round.";
          el.resultCopy.textContent = "Every question is a chance to learn something new. Shuffle the deck and give it another go.";
        }

        el.announcement.textContent = `Quiz complete. You scored ${score} out of 10.`;
        if (score >= 8) celebrate();
        setTimeout(() => el.restartButton.focus({ preventScroll: true }), 300);
      }

      function celebrate() {
        const colors = ["#d94a43", "#17253f", "#d7a834", "#187b56"];
        const pieces = document.createDocumentFragment();
        for (let i = 0; i < 42; i++) {
          const piece = document.createElement("i");
          piece.style.left = `${Math.random() * 100}%`;
          piece.style.setProperty("--c", colors[i % colors.length]);
          piece.style.setProperty("--r", `${Math.random() * 180}deg`);
          piece.style.setProperty("--d", `${2.2 + Math.random() * 1.8}s`);
          piece.style.setProperty("--delay", `${Math.random() * .65}s`);
          piece.style.setProperty("--drift", `${-90 + Math.random() * 180}px`);
          pieces.appendChild(piece);
        }
        el.confetti.appendChild(pieces);
        setTimeout(() => { el.confetti.innerHTML = ""; }, 5000);
      }

      el.nextButton.addEventListener("click", next);
      el.restartButton.addEventListener("click", startQuiz);
      document.addEventListener("keydown", event => {
        if (!answered && !el.results.classList.contains("show") && /^[1-4]$/.test(event.key)) {
          el.answers.children[Number(event.key) - 1]?.click();
        } else if (answered && event.key === "Enter") {
          event.preventDefault();
          next();
        }
      });

      startQuiz();
    })();
  </script>
</body>
</html>
