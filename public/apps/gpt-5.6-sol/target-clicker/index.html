<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#f5f1e8">
  <title>Target Clicker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Racing+Sans+One&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #171714;
      --paper: #f5f1e8;
      --coral: #ff5b3f;
      --yellow: #ffcf3f;
      --blue: #5f8cff;
      --green: #42d29a;
      --panel: rgba(255, 253, 247, .84);
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--paper);
      color: var(--ink);
      font-family: "DM Mono", monospace;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    button { font: inherit; }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .42;
      background-image:
        linear-gradient(rgba(23, 23, 20, .055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(23, 23, 20, .055) 1px, transparent 1px);
      background-size: 46px 46px;
      mask-image: linear-gradient(to bottom, #000, transparent 80%);
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 100;
      pointer-events: none;
      opacity: .06;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.6'/%3E%3C/svg%3E");
    }

    .app {
      position: relative;
      width: 100%;
      height: 100%;
      isolation: isolate;
    }

    .brand {
      position: fixed;
      top: 28px;
      left: 34px;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: .17em;
      text-transform: uppercase;
    }

    .brand-mark {
      position: relative;
      width: 29px;
      height: 29px;
      border: 2px solid var(--ink);
      border-radius: 50%;
    }

    .brand-mark::before,
    .brand-mark::after {
      content: "";
      position: absolute;
      background: var(--ink);
    }
    .brand-mark::before { width: 2px; height: 37px; left: 12px; top: -6px; }
    .brand-mark::after { height: 2px; width: 37px; top: 12px; left: -6px; }

    .arena {
      position: absolute;
      inset: 0;
      overflow: hidden;
      cursor: crosshair;
      touch-action: manipulation;
    }

    .arena.ready { cursor: default; }

    .decor-type {
      position: absolute;
      left: 50%;
      bottom: -3.5vw;
      z-index: -1;
      transform: translateX(-50%);
      color: transparent;
      -webkit-text-stroke: 1px rgba(23, 23, 20, .055);
      font-family: "Racing Sans One", sans-serif;
      font-size: clamp(145px, 27vw, 460px);
      line-height: .7;
      letter-spacing: -.05em;
      white-space: nowrap;
      pointer-events: none;
    }

    .scoreboard {
      position: fixed;
      top: 20px;
      left: 50%;
      z-index: 25;
      display: grid;
      grid-template-columns: 104px 1px 104px;
      align-items: center;
      gap: 13px;
      min-width: 250px;
      padding: 13px 18px 11px;
      transform: translateX(-50%);
      border: 1.5px solid rgba(23, 23, 20, .9);
      border-radius: 18px;
      background: var(--panel);
      box-shadow: 6px 6px 0 var(--ink);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      transition: transform .4s cubic-bezier(.2,.8,.2,1), opacity .3s;
    }

    .scoreboard.hidden {
      opacity: 0;
      transform: translate(-50%, -18px);
      pointer-events: none;
    }

    .score-block {
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: end;
      gap: 8px;
    }

    .score-block:last-child { text-align: right; }

    .metric-label {
      grid-column: 1 / -1;
      color: rgba(23, 23, 20, .56);
      font-size: 9px;
      line-height: 1;
      letter-spacing: .16em;
      text-transform: uppercase;
    }

    .metric-value {
      font-family: "Racing Sans One", sans-serif;
      font-size: 30px;
      line-height: .85;
      letter-spacing: -.02em;
      font-variant-numeric: tabular-nums;
    }

    .metric-unit {
      padding-bottom: 1px;
      color: rgba(23, 23, 20, .5);
      font-size: 9px;
      letter-spacing: .06em;
    }

    .divider { width: 1px; height: 34px; background: rgba(23, 23, 20, .22); }

    .timer-track {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 30;
      width: 100%;
      height: 5px;
      background: rgba(23, 23, 20, .09);
    }

    .timer-fill {
      width: 100%;
      height: 100%;
      transform-origin: left;
      background: var(--coral);
    }

    .sound-toggle {
      position: fixed;
      top: 26px;
      right: 32px;
      z-index: 30;
      display: grid;
      place-items: center;
      width: 40px;
      height: 40px;
      padding: 0;
      border: 1.5px solid var(--ink);
      border-radius: 50%;
      background: var(--paper);
      color: var(--ink);
      cursor: pointer;
      transition: transform .16s ease, box-shadow .16s ease, background .16s ease;
    }

    .sound-toggle:hover { transform: translate(-2px,-2px); box-shadow: 3px 3px 0 var(--ink); }
    .sound-toggle:active { transform: translate(0,0); box-shadow: none; }
    .sound-toggle:focus-visible, .primary-btn:focus-visible, .target:focus-visible { outline: 4px solid var(--blue); outline-offset: 4px; }
    .sound-toggle svg { width: 17px; height: 17px; }

    .center-panel {
      position: absolute;
      top: 50%;
      left: 50%;
      z-index: 15;
      width: min(610px, calc(100% - 40px));
      transform: translate(-50%, -50%);
      text-align: center;
      transition: opacity .25s ease, transform .35s cubic-bezier(.2,.8,.2,1);
    }

    .center-panel.out {
      opacity: 0;
      transform: translate(-50%, -46%) scale(.97);
      pointer-events: none;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 19px;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: .18em;
      text-transform: uppercase;
    }

    .eyebrow::before, .eyebrow::after {
      content: "";
      width: 26px;
      height: 1px;
      background: currentColor;
    }

    h1 {
      margin: 0;
      font-family: "Racing Sans One", sans-serif;
      font-size: clamp(72px, 10vw, 142px);
      font-weight: 400;
      line-height: .74;
      letter-spacing: -.055em;
      text-transform: uppercase;
    }

    h1 .accent {
      display: inline-block;
      color: var(--coral);
      -webkit-text-stroke: 2px var(--ink);
      text-shadow: 5px 5px 0 var(--yellow);
      transform: rotate(-2deg);
    }

    .intro-copy {
      max-width: 430px;
      margin: 30px auto 26px;
      color: rgba(23, 23, 20, .68);
      font-size: 12px;
      line-height: 1.8;
    }

    .primary-btn {
      position: relative;
      min-width: 196px;
      padding: 16px 26px;
      overflow: hidden;
      border: 2px solid var(--ink);
      border-radius: 100px;
      background: var(--ink);
      color: var(--paper);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .15em;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 6px 6px 0 var(--coral);
      transition: transform .18s ease, box-shadow .18s ease;
    }

    .primary-btn::after {
      content: "→";
      display: inline-block;
      margin-left: 12px;
      font-size: 18px;
      line-height: 0;
      transition: transform .2s ease;
    }

    .primary-btn:hover { transform: translate(-2px,-2px); box-shadow: 9px 9px 0 var(--coral); }
    .primary-btn:hover::after { transform: translateX(4px); }
    .primary-btn:active { transform: translate(4px,4px); box-shadow: 2px 2px 0 var(--coral); }

    .microcopy {
      margin-top: 20px;
      color: rgba(23, 23, 20, .43);
      font-size: 9px;
      letter-spacing: .1em;
      text-transform: uppercase;
    }

    .target {
      --size: 84px;
      --target-color: var(--coral);
      position: absolute;
      z-index: 10;
      width: var(--size);
      height: var(--size);
      padding: 0;
      border: 0;
      border-radius: 50%;
      background: transparent;
      cursor: crosshair;
      will-change: transform, opacity;
      animation: target-in .28s cubic-bezier(.15, .9, .25, 1.45) both;
    }

    .target::before {
      content: "";
      position: absolute;
      inset: 0;
      border: 3px solid var(--ink);
      border-radius: 50%;
      background:
        radial-gradient(circle, var(--ink) 0 7%, transparent 8% 19%, var(--ink) 20% 23%, transparent 24% 39%, var(--ink) 40% 43%, transparent 44%),
        var(--target-color);
      box-shadow: 6px 6px 0 var(--ink);
    }

    .target::after {
      content: "";
      position: absolute;
      inset: -8px;
      border: 2px dashed var(--ink);
      border-radius: 50%;
      animation: spin 2.8s linear infinite;
    }

    .target .life {
      position: absolute;
      inset: -15px;
      border: 3px solid transparent;
      border-top-color: var(--target-color);
      border-right-color: var(--target-color);
      border-radius: 50%;
      animation: life-spin var(--life, 1000ms) linear both;
    }

    .target.expire { animation: target-out .16s ease-in both; pointer-events: none; }
    .target.hit { animation: target-hit .22s ease-out both; pointer-events: none; }

    .countdown {
      position: absolute;
      top: 50%;
      left: 50%;
      z-index: 40;
      transform: translate(-50%, -50%);
      font-family: "Racing Sans One", sans-serif;
      font-size: min(35vw, 260px);
      line-height: 1;
      color: var(--ink);
      text-shadow: 8px 8px 0 var(--yellow);
      pointer-events: none;
      animation: count-pop .7s cubic-bezier(.2,.8,.2,1) both;
    }

    .hit-label {
      position: absolute;
      z-index: 11;
      color: var(--ink);
      font-family: "Racing Sans One", sans-serif;
      font-size: 25px;
      text-shadow: 2px 2px 0 var(--paper);
      pointer-events: none;
      animation: float-score .6s ease-out both;
    }

    .particle {
      --dx: 0px;
      --dy: 0px;
      position: absolute;
      z-index: 9;
      width: 9px;
      height: 9px;
      border: 2px solid var(--ink);
      background: var(--p-color, var(--yellow));
      pointer-events: none;
      animation: burst .55s cubic-bezier(.1,.65,.25,1) both;
    }

    .miss-ring {
      position: absolute;
      z-index: 8;
      width: 24px;
      height: 24px;
      border: 2px solid rgba(23,23,20,.5);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: miss .45s ease-out both;
    }

    .result-card {
      width: min(470px, calc(100vw - 40px));
      margin: 0 auto;
      padding: 36px 38px 34px;
      border: 2px solid var(--ink);
      border-radius: 28px;
      background: rgba(255,253,247,.92);
      box-shadow: 10px 10px 0 var(--ink);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .result-title {
      margin: 1px 0 24px;
      font-family: "Racing Sans One", sans-serif;
      font-size: clamp(48px, 8vw, 72px);
      font-weight: 400;
      line-height: .9;
      letter-spacing: -.04em;
      text-transform: uppercase;
    }

    .result-grid {
      display: grid;
      grid-template-columns: 1fr 1px 1fr;
      align-items: center;
      gap: 20px;
      margin: 0 0 28px;
    }

    .result-grid .divider { height: 54px; }
    .result-number {
      font-family: "Racing Sans One", sans-serif;
      font-size: 54px;
      line-height: 1;
      color: var(--coral);
      font-variant-numeric: tabular-nums;
    }

    .result-label {
      margin-top: 5px;
      color: rgba(23,23,20,.5);
      font-size: 9px;
      letter-spacing: .15em;
      text-transform: uppercase;
    }

    .result-note {
      margin: -10px 0 24px;
      color: rgba(23,23,20,.58);
      font-size: 10px;
      line-height: 1.6;
    }

    @keyframes target-in {
      from { opacity: 0; transform: scale(.15) rotate(-24deg); }
      to { opacity: 1; transform: scale(1) rotate(var(--tilt)); }
    }
    @keyframes target-out {
      to { opacity: 0; transform: scale(.65) rotate(var(--tilt)); }
    }
    @keyframes target-hit {
      45% { opacity: 1; transform: scale(1.2) rotate(var(--tilt)); }
      to { opacity: 0; transform: scale(.15) rotate(calc(var(--tilt) + 30deg)); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes life-spin {
      from { transform: rotate(-45deg); }
      to { transform: rotate(675deg); opacity: .1; }
    }
    @keyframes count-pop {
      0% { opacity: 0; transform: translate(-50%,-50%) scale(.4) rotate(-7deg); }
      25% { opacity: 1; transform: translate(-50%,-50%) scale(1) rotate(0); }
      75% { opacity: 1; }
      100% { opacity: 0; transform: translate(-50%,-50%) scale(1.18); }
    }
    @keyframes float-score {
      0% { opacity: 0; transform: translate(-50%, 5px) scale(.7); }
      20% { opacity: 1; }
      100% { opacity: 0; transform: translate(-50%, -42px) scale(1.15) rotate(-5deg); }
    }
    @keyframes burst {
      from { opacity: 1; transform: translate(-50%,-50%) scale(.4) rotate(0); }
      to { opacity: 0; transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1) rotate(240deg); }
    }
    @keyframes miss {
      to { opacity: 0; width: 56px; height: 56px; }
    }
    @keyframes pulse-score {
      50% { color: var(--coral); transform: scale(1.22) rotate(-3deg); }
    }
    @keyframes confetti {
      0% { transform: translateY(-10vh) rotate(0); opacity: 1; }
      100% { transform: translateY(115vh) rotate(720deg); opacity: .9; }
    }

    .score-pulse { animation: pulse-score .24s ease-out; }
    .confetti {
      position: absolute;
      top: -20px;
      z-index: 13;
      width: 10px;
      height: 18px;
      border: 1.5px solid var(--ink);
      background: var(--c);
      pointer-events: none;
      animation: confetti var(--duration) cubic-bezier(.2,.7,.2,1) var(--delay) both;
    }

    @media (max-width: 650px) {
      .brand { top: 22px; left: 20px; }
      .brand-name { display: none; }
      .scoreboard {
        top: 14px;
        grid-template-columns: 74px 1px 74px;
        min-width: 190px;
        padding: 11px 13px 9px;
        border-radius: 15px;
        box-shadow: 4px 4px 0 var(--ink);
      }
      .metric-value { font-size: 25px; }
      .score-block { gap: 5px; }
      .sound-toggle { top: 18px; right: 18px; width: 36px; height: 36px; }
      h1 { font-size: clamp(62px, 22vw, 100px); }
      .intro-copy { width: 88%; margin-top: 25px; font-size: 11px; }
      .target { --size: 70px; }
      .result-card { padding: 30px 22px 28px; border-radius: 23px; box-shadow: 7px 7px 0 var(--ink); }
      .result-number { font-size: 47px; }
    }

    @media (max-height: 620px) {
      .center-panel { top: 54%; }
      h1 { font-size: clamp(58px, 15vh, 96px); }
      .intro-copy { margin: 18px auto; }
      .microcopy { display: none; }
      .result-card { padding-top: 23px; padding-bottom: 23px; }
      .result-title { font-size: 46px; margin-bottom: 17px; }
      .result-grid { margin-bottom: 20px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .01ms !important; animation-iteration-count: 1 !important; scroll-behavior: auto !important; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="brand" aria-label="Target Clicker">
      <span class="brand-mark" aria-hidden="true"></span>
      <span class="brand-name">Target Clicker</span>
    </header>

    <div class="timer-track" aria-hidden="true"><div class="timer-fill" id="timerFill"></div></div>

    <section class="scoreboard hidden" id="scoreboard" aria-label="Game statistics">
      <div class="score-block">
        <span class="metric-label">Score</span>
        <span class="metric-value" id="scoreValue">00</span>
        <span class="metric-unit">PTS</span>
      </div>
      <span class="divider" aria-hidden="true"></span>
      <div class="score-block">
        <span class="metric-label">Time left</span>
        <span class="metric-value" id="timeValue">20.0</span>
        <span class="metric-unit">SEC</span>
      </div>
    </section>

    <button class="sound-toggle" id="soundToggle" aria-label="Mute sound" title="Toggle sound">
      <svg id="soundIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M11 5 6 9H3v6h3l5 4V5Z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M18 6a8.5 8.5 0 0 1 0 12"/>
      </svg>
    </button>

    <section class="arena ready" id="arena" aria-label="Target clicking game area">
      <div class="decor-type" aria-hidden="true">CLICK!</div>

      <div class="center-panel" id="centerPanel">
        <div class="eyebrow">20-second reflex test</div>
        <h1>Hit the<br><span class="accent">target.</span></h1>
        <p class="intro-copy">Targets vanish fast. Click with precision, build your score, and keep those misses to a minimum.</p>
        <button class="primary-btn" id="startButton">Start challenge</button>
        <div class="microcopy">Press space to start · sound on</div>
      </div>
    </section>
  </main>

  <script>
    (() => {
      "use strict";

      const GAME_DURATION = 20000;
      const COLORS = ["#ff5b3f", "#ffcf3f", "#5f8cff", "#42d29a"];
      const arena = document.getElementById("arena");
      const centerPanel = document.getElementById("centerPanel");
      const startButton = document.getElementById("startButton");
      const scoreboard = document.getElementById("scoreboard");
      const scoreValue = document.getElementById("scoreValue");
      const timeValue = document.getElementById("timeValue");
      const timerFill = document.getElementById("timerFill");
      const soundToggle = document.getElementById("soundToggle");
      const soundIcon = document.getElementById("soundIcon");

      let state = "ready";
      let score = 0;
      let attempts = 0;
      let startTime = 0;
      let rafId = null;
      let spawnTimeout = null;
      let targetTimeout = null;
      let activeTarget = null;
      let muted = false;
      let audioCtx = null;

      function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === "suspended") audioCtx.resume();
      }

      function tone(frequency, duration = .08, type = "sine", volume = .04, delay = 0) {
        if (muted || !audioCtx) return;
        const now = audioCtx.currentTime + delay;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(frequency, now);
        gain.gain.setValueAtTime(volume, now);
        gain.gain.exponentialRampToValueAtTime(.0001, now + duration);
        osc.connect(gain).connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + duration);
      }

      function playHitSound() {
        tone(540 + Math.min(score, 20) * 12, .08, "triangle", .06);
        tone(810 + Math.min(score, 20) * 16, .09, "sine", .035, .035);
      }

      function playMissSound() { tone(135, .06, "square", .018); }

      function setScore(value) {
        scoreValue.textContent = String(value).padStart(2, "0");
        scoreValue.classList.remove("score-pulse");
        void scoreValue.offsetWidth;
        scoreValue.classList.add("score-pulse");
      }

      function clearTarget() {
        clearTimeout(targetTimeout);
        if (activeTarget) {
          activeTarget.remove();
          activeTarget = null;
        }
      }

      function beginCountdown() {
        if (state !== "ready" && state !== "ended") return;
        initAudio();
        state = "countdown";
        score = 0;
        attempts = 0;
        setScore(0);
        timeValue.textContent = "20.0";
        timerFill.style.transform = "scaleX(1)";
        centerPanel.classList.add("out");
        arena.classList.remove("ready");
        scoreboard.classList.remove("hidden");
        document.querySelectorAll(".confetti").forEach(el => el.remove());

        let count = 3;
        const showCount = () => {
          const el = document.createElement("div");
          el.className = "countdown";
          el.textContent = count > 0 ? count : "GO!";
          arena.appendChild(el);
          tone(count > 0 ? 300 + (3 - count) * 90 : 680, count > 0 ? .1 : .18, "triangle", .045);
          setTimeout(() => el.remove(), 720);
          if (count-- > 0) setTimeout(showCount, 720);
          else setTimeout(startGame, 520);
        };
        showCount();
      }

      function startGame() {
        if (state !== "countdown") return;
        state = "playing";
        startTime = performance.now();
        spawnTarget();
        rafId = requestAnimationFrame(updateTimer);
      }

      function updateTimer(now) {
        if (state !== "playing") return;
        const elapsed = now - startTime;
        const remaining = Math.max(0, GAME_DURATION - elapsed);
        timeValue.textContent = (remaining / 1000).toFixed(1);
        timerFill.style.transform = `scaleX(${remaining / GAME_DURATION})`;
        timerFill.style.background = remaining < 5000 ? "#ff5b3f" : "#171714";
        if (remaining <= 0) endGame();
        else rafId = requestAnimationFrame(updateTimer);
      }

      function spawnTarget() {
        if (state !== "playing") return;
        clearTarget();

        const target = document.createElement("button");
        target.className = "target";
        target.type = "button";
        target.setAttribute("aria-label", "Hit target");

        const isMobile = innerWidth <= 650;
        const size = Math.round((isMobile ? 64 : 70) + Math.random() * (isMobile ? 14 : 28));
        const life = Math.max(620, 1080 - score * 13 + Math.random() * 180);
        const topSafe = innerWidth <= 650 ? 92 : 105;
        const pad = 25;
        const maxX = Math.max(pad, innerWidth - size - pad - 10);
        const maxY = Math.max(topSafe, innerHeight - size - pad - 12);
        const x = pad + Math.random() * Math.max(0, maxX - pad);
        const y = topSafe + Math.random() * Math.max(0, maxY - topSafe);
        const color = COLORS[Math.floor(Math.random() * COLORS.length)];

        target.style.cssText = `left:${x}px;top:${y}px;--size:${size}px;--target-color:${color};--tilt:${-8 + Math.random() * 16}deg;--life:${life}ms`;
        target.innerHTML = '<span class="life" aria-hidden="true"></span>';
        target.addEventListener("pointerdown", hitTarget);
        target.addEventListener("click", hitTarget);
        arena.appendChild(target);
        activeTarget = target;

        targetTimeout = setTimeout(() => {
          if (state !== "playing" || activeTarget !== target) return;
          target.classList.add("expire");
          activeTarget = null;
          setTimeout(() => target.remove(), 180);
          spawnTimeout = setTimeout(spawnTarget, 90 + Math.random() * 120);
        }, life);
      }

      function hitTarget(event) {
        event.preventDefault();
        event.stopPropagation();
        if (state !== "playing" || event.currentTarget !== activeTarget) return;
        const target = event.currentTarget;
        const rect = target.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;

        clearTimeout(targetTimeout);
        activeTarget = null;
        attempts++;
        score++;
        setScore(score);
        playHitSound();
        target.classList.add("hit");
        createBurst(cx, cy);
        createHitLabel(cx, cy, score % 5 === 0 ? "+1 HOT!" : "+1");
        setTimeout(() => target.remove(), 240);
        spawnTimeout = setTimeout(spawnTarget, Math.max(90, 230 - score * 3));
      }

      function createBurst(x, y) {
        for (let i = 0; i < 11; i++) {
          const angle = (Math.PI * 2 * i / 11) + Math.random() * .25;
          const distance = 35 + Math.random() * 50;
          const p = document.createElement("span");
          p.className = "particle";
          p.style.cssText = `left:${x}px;top:${y}px;--dx:${Math.cos(angle) * distance}px;--dy:${Math.sin(angle) * distance}px;--p-color:${COLORS[i % COLORS.length]};border-radius:${i % 2 ? "50%" : "1px"}`;
          arena.appendChild(p);
          setTimeout(() => p.remove(), 600);
        }
      }

      function createHitLabel(x, y, text) {
        const label = document.createElement("span");
        label.className = "hit-label";
        label.textContent = text;
        label.style.left = `${x}px`;
        label.style.top = `${y}px`;
        arena.appendChild(label);
        setTimeout(() => label.remove(), 650);
      }

      function registerMiss(event) {
        if (state !== "playing") return;
        attempts++;
        playMissSound();
        const ring = document.createElement("span");
        ring.className = "miss-ring";
        ring.style.left = `${event.clientX}px`;
        ring.style.top = `${event.clientY}px`;
        arena.appendChild(ring);
        setTimeout(() => ring.remove(), 500);
      }

      function endGame() {
        if (state !== "playing") return;
        state = "ended";
        cancelAnimationFrame(rafId);
        clearTimeout(spawnTimeout);
        clearTarget();
        timeValue.textContent = "0.0";
        timerFill.style.transform = "scaleX(0)";
        arena.classList.add("ready");
        tone(420, .16, "triangle", .045);
        tone(570, .18, "triangle", .04, .12);
        tone(760, .28, "triangle", .04, .24);

        const accuracy = attempts ? Math.round((score / attempts) * 100) : 0;
        const rating = score >= 20 && accuracy >= 90 ? "Bullseye energy. That was surgical." :
          score >= 14 ? "Sharp reflexes. One more run?" :
          score >= 8 ? "Nicely done. You’re warming up." : "Every sharp shooter starts somewhere.";

        centerPanel.innerHTML = `
          <div class="result-card">
            <div class="eyebrow">Challenge complete</div>
            <h2 class="result-title">Time's up!</h2>
            <div class="result-grid">
              <div><div class="result-number">${score}</div><div class="result-label">Targets hit</div></div>
              <span class="divider" aria-hidden="true"></span>
              <div><div class="result-number">${accuracy}%</div><div class="result-label">Accuracy</div></div>
            </div>
            <p class="result-note">${rating}</p>
            <button class="primary-btn" id="replayButton">Play again</button>
          </div>`;
        centerPanel.classList.remove("out");
        document.getElementById("replayButton").addEventListener("click", beginCountdown);
        if (score >= 10) createConfetti();
      }

      function createConfetti() {
        for (let i = 0; i < 34; i++) {
          const c = document.createElement("span");
          c.className = "confetti";
          c.style.cssText = `left:${Math.random() * 100}%;--c:${COLORS[i % COLORS.length]};--duration:${2.4 + Math.random() * 2}s;--delay:${Math.random() * .8}s;transform:rotate(${Math.random() * 180}deg)`;
          arena.appendChild(c);
          setTimeout(() => c.remove(), 5200);
        }
      }

      function toggleSound(event) {
        event.stopPropagation();
        muted = !muted;
        soundToggle.setAttribute("aria-label", muted ? "Enable sound" : "Mute sound");
        soundIcon.innerHTML = muted
          ? '<path d="M11 5 6 9H3v6h3l5 4V5Z"/><path d="m16 9 5 5"/><path d="m21 9-5 5"/>'
          : '<path d="M11 5 6 9H3v6h3l5 4V5Z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M18 6a8.5 8.5 0 0 1 0 12"/>';
        if (!muted) { initAudio(); tone(520, .08, "sine", .03); }
      }

      startButton.addEventListener("click", beginCountdown);
      soundToggle.addEventListener("click", toggleSound);
      arena.addEventListener("pointerdown", registerMiss);
      window.addEventListener("keydown", event => {
        if (event.code === "Space" && (state === "ready" || state === "ended")) {
          event.preventDefault();
          beginCountdown();
        }
      });
      window.addEventListener("resize", () => {
        if (activeTarget) { clearTarget(); spawnTarget(); }
      });
    })();
  </script>
</body>
</html>
