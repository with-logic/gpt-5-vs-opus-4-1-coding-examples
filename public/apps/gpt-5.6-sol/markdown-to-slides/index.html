<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>Markdown → Slides</title>
  <style>
    :root {
      --bg: #e9e8e2;
      --panel: #f5f4ef;
      --panel-strong: #fcfbf7;
      --ink: #15171a;
      --muted: #686a6b;
      --faint: #929390;
      --line: rgba(21, 23, 26, .13);
      --accent: #1748e7;
      --accent-soft: #dfe6ff;
      --shadow: 0 24px 70px rgba(25, 27, 30, .14), 0 3px 10px rgba(25, 27, 30, .08);
      --slide-bg: #fbfaf5;
      --slide-ink: #111317;
      --slide-muted: #686a6b;
      --editor-width: 39%;
    }

    body.dark {
      --bg: #15171b;
      --panel: #1c1f24;
      --panel-strong: #22252b;
      --ink: #f3f1ea;
      --muted: #aaa9a3;
      --faint: #777873;
      --line: rgba(255, 255, 255, .12);
      --accent: #6e8fff;
      --accent-soft: #253464;
      --shadow: 0 26px 80px rgba(0, 0, 0, .38), 0 3px 12px rgba(0, 0, 0, .25);
      --slide-bg: #171a20;
      --slide-ink: #f4f1e8;
      --slide-muted: #aaa9a3;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      margin: 0;
      overflow: hidden;
      color: var(--ink);
      background: var(--bg);
      font-family: "Avenir Next", Avenir, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
      transition: background-color .35s ease, color .35s ease;
    }

    button, textarea { font: inherit; }
    button { color: inherit; }

    button:focus-visible, textarea:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .app {
      min-height: 100%;
      height: 100%;
      display: grid;
      grid-template-rows: 72px minmax(0, 1fr);
      padding: 0 20px 20px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .brand, .top-actions, .button, .panel-heading, .slide-controls,
    .editor-meta, .shortcut-list, .progress-copy { display: flex; align-items: center; }

    .brand { gap: 13px; min-width: 0; }

    .brand-mark {
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      color: #fff;
      background: var(--ink);
      border-radius: 9px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.14);
      transition: background .3s ease, transform .3s ease;
    }

    body.dark .brand-mark { color: #14161a; background: #f4f1e8; }
    .brand-mark:hover { transform: rotate(-4deg); }
    .brand-mark svg { width: 17px; height: 17px; }

    .brand-copy { min-width: 0; }
    .brand-copy h1 { margin: 0; font-size: 15px; line-height: 1.1; letter-spacing: -.02em; }
    .brand-copy p { margin: 4px 0 0; color: var(--muted); font-size: 10px; letter-spacing: .12em; text-transform: uppercase; }

    .top-actions { gap: 8px; }

    .button {
      height: 36px;
      gap: 8px;
      padding: 0 13px;
      border: 1px solid var(--line);
      border-radius: 9px;
      background: rgba(255,255,255,.18);
      font-size: 12px;
      font-weight: 650;
      cursor: pointer;
      transition: transform .18s ease, background .18s ease, border-color .18s ease;
    }

    .button:hover { transform: translateY(-1px); background: var(--panel-strong); border-color: rgba(21,23,26,.25); }
    body.dark .button:hover { border-color: rgba(255,255,255,.25); }
    .button svg { width: 15px; height: 15px; }

    .button.primary { color: #fff; border-color: var(--accent); background: var(--accent); box-shadow: 0 7px 18px rgba(23,72,231,.2); }
    .button.primary:hover { background: #103dd0; border-color: #103dd0; }
    body.dark .button.primary { color: #101217; }
    body.dark .button.primary:hover { background: #8aa4ff; border-color: #8aa4ff; }

    .icon-button { width: 36px; padding: 0; justify-content: center; }

    .workspace {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(310px, var(--editor-width)) 7px minmax(0, 1fr);
      border: 1px solid var(--line);
      border-radius: 15px;
      background: var(--panel);
      overflow: hidden;
      box-shadow: 0 1px 0 rgba(255,255,255,.35);
    }

    .panel { min-width: 0; min-height: 0; display: flex; flex-direction: column; }

    .panel-header {
      height: 52px;
      flex: 0 0 auto;
      padding: 0 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .panel-heading { gap: 9px; min-width: 0; }
    .panel-heading h2 { margin: 0; font-size: 12px; letter-spacing: .02em; }

    .live-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #23a36d;
      box-shadow: 0 0 0 4px rgba(35,163,109,.1);
    }

    .panel-note { color: var(--muted); font-family: "SFMono-Regular", Consolas, monospace; font-size: 10px; }

    .editor-actions { display: flex; gap: 4px; }

    .mini-button {
      height: 28px;
      padding: 0 9px;
      border: 0;
      border-radius: 7px;
      color: var(--muted);
      background: transparent;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .03em;
      cursor: pointer;
    }

    .mini-button:hover { color: var(--ink); background: var(--accent-soft); }

    .editor-shell { position: relative; min-height: 0; flex: 1; }

    #markdownInput {
      width: 100%;
      height: 100%;
      display: block;
      resize: none;
      border: 0;
      outline: 0;
      padding: 22px 22px 70px;
      color: var(--ink);
      background: var(--panel-strong);
      caret-color: var(--accent);
      font: 12px/1.75 "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      tab-size: 2;
    }

    #markdownInput::selection { color: var(--ink); background: var(--accent-soft); }

    .editor-footer {
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: 12px;
      min-height: 36px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 9px;
      background: color-mix(in srgb, var(--panel-strong) 88%, transparent);
      box-shadow: 0 8px 24px rgba(20,22,24,.08);
      backdrop-filter: blur(12px);
      pointer-events: none;
    }

    .editor-meta { gap: 8px; color: var(--muted); font-size: 9px; letter-spacing: .06em; text-transform: uppercase; }
    .editor-meta span + span::before { content: "·"; margin-right: 8px; }
    .shortcut-list { gap: 6px; color: var(--muted); font-size: 9px; }

    kbd {
      min-width: 20px;
      height: 20px;
      display: inline-grid;
      place-items: center;
      border: 1px solid var(--line);
      border-bottom-width: 2px;
      border-radius: 5px;
      background: var(--panel);
      font: 9px "SFMono-Regular", Consolas, monospace;
    }

    .divider {
      position: relative;
      z-index: 5;
      cursor: col-resize;
      background: var(--panel);
      border-left: 1px solid var(--line);
      border-right: 1px solid var(--line);
    }

    .divider::after {
      content: "";
      position: absolute;
      top: 50%;
      left: 2px;
      width: 1px;
      height: 34px;
      transform: translateY(-50%);
      border-left: 1px solid var(--faint);
      border-right: 1px solid var(--faint);
      opacity: .5;
    }

    .divider:hover { background: var(--accent-soft); }

    .preview-panel { background: var(--panel); }
    .preview-header { padding-left: 18px; }

    .slide-progress { width: 92px; height: 2px; overflow: hidden; border-radius: 2px; background: var(--line); }
    .slide-progress > span { display: block; height: 100%; width: 0; background: var(--accent); transition: width .3s ease; }
    .progress-copy { gap: 10px; }
    .progress-copy span { min-width: 34px; color: var(--muted); font: 10px "SFMono-Regular", Consolas, monospace; }

    .presentation {
      position: relative;
      min-height: 0;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px 42px 72px;
      overflow: hidden;
      background:
        radial-gradient(circle at 75% 25%, color-mix(in srgb, var(--accent) 7%, transparent), transparent 35%),
        var(--panel);
    }

    .presentation::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: .24;
      background-image: linear-gradient(var(--line) 1px, transparent 1px), linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(to bottom, transparent, #000 38%, #000 70%, transparent);
    }

    .stage-wrap { position: relative; z-index: 1; width: min(100%, calc((100vh - 238px) * 16 / 9)); }

    .slide {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      color: var(--slide-ink);
      background: var(--slide-bg);
      box-shadow: var(--shadow);
      container-type: inline-size;
      transition: color .35s ease, background .35s ease;
    }

    .slide-content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 10.5% 10.5% 11%;
    }

    .slide-content::before {
      content: "";
      position: absolute;
      top: 7%;
      left: 10.5%;
      width: 5.5%;
      height: 4px;
      background: var(--accent);
    }

    .slide-content::after {
      content: "";
      position: absolute;
      right: -10%;
      bottom: -31%;
      width: 47%;
      aspect-ratio: 1;
      border: 1px solid color-mix(in srgb, var(--accent) 32%, transparent);
      border-radius: 50%;
      box-shadow: 0 0 0 4.5cqw color-mix(in srgb, var(--accent) 4%, transparent), 0 0 0 9cqw color-mix(in srgb, var(--accent) 3%, transparent);
      pointer-events: none;
    }

    .slide-body { position: relative; z-index: 1; max-width: 86%; }
    .slide-body > :first-child { margin-top: 0; }
    .slide-body > :last-child { margin-bottom: 0; }

    .slide h1, .slide h2, .slide h3 { font-family: Georgia, "Times New Roman", serif; font-weight: 500; letter-spacing: -.045em; }
    .slide h1 { max-width: 90%; margin: 0 0 3.2cqw; font-size: clamp(24px, 5.6cqw, 68px); line-height: .98; }
    .slide h2 { max-width: 90%; margin: 0 0 3cqw; font-size: clamp(22px, 4.15cqw, 50px); line-height: 1.05; }
    .slide h3 { margin: 2.3cqw 0 1.1cqw; font-size: clamp(14px, 2.1cqw, 25px); line-height: 1.1; }
    .slide p { max-width: 78%; margin: 0 0 1.5cqw; color: var(--slide-muted); font-size: clamp(9px, 1.55cqw, 19px); line-height: 1.55; }
    .slide strong { color: var(--slide-ink); font-weight: 700; }
    .slide em { font-family: Georgia, serif; }
    .slide a { color: var(--accent); text-decoration: none; border-bottom: 1px solid currentColor; }

    .slide ul, .slide ol {
      max-width: 82%;
      margin: 1.2cqw 0 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 1.05cqw;
      counter-reset: slide-list;
    }

    .slide li {
      position: relative;
      padding-left: 2.2cqw;
      color: var(--slide-ink);
      font-size: clamp(9px, 1.48cqw, 18px);
      line-height: 1.4;
    }

    .slide ul li::before { content: ""; position: absolute; left: 0; top: .58em; width: .55cqw; height: .55cqw; min-width: 4px; min-height: 4px; border-radius: 50%; background: var(--accent); }
    .slide ol li { counter-increment: slide-list; padding-left: 3cqw; }
    .slide ol li::before { content: counter(slide-list, decimal-leading-zero); position: absolute; left: 0; top: .03em; color: var(--accent); font: 700 clamp(7px, 1cqw, 12px) "SFMono-Regular", monospace; letter-spacing: .02em; }

    .slide blockquote {
      max-width: 83%;
      margin: .8cqw 0;
      padding: .3cqw 0 .3cqw 2.6cqw;
      border-left: 4px solid var(--accent);
    }

    .slide blockquote p { max-width: 100%; margin: 0; color: var(--slide-ink); font-family: Georgia, serif; font-size: clamp(15px, 2.8cqw, 34px); line-height: 1.28; letter-spacing: -.02em; }

    .slide code { padding: .18em .35em; border-radius: .25em; color: var(--accent); background: color-mix(in srgb, var(--accent) 10%, transparent); font-family: "SFMono-Regular", Consolas, monospace; font-size: .86em; }
    .slide pre { max-width: 88%; margin: 1.2cqw 0 0; padding: 1.7cqw 2cqw; overflow: hidden; color: #e9ecf5; background: #171b24; border-radius: .5cqw; font-size: clamp(7px, 1.1cqw, 13px); line-height: 1.6; }
    .slide pre code { padding: 0; color: inherit; background: none; }
    .slide hr { width: 100%; border: 0; border-top: 1px solid color-mix(in srgb, var(--slide-ink) 18%, transparent); }

    .slide-kicker { margin-bottom: 1.8cqw; color: var(--accent); font-size: clamp(7px, .95cqw, 12px); font-weight: 800; letter-spacing: .18em; text-transform: uppercase; }
    .slide.title-slide .slide-body { max-width: 88%; }
    .slide.title-slide .slide-content { justify-content: flex-end; padding-bottom: 14%; }
    .slide.title-slide h1 { font-size: clamp(30px, 6.7cqw, 82px); }
    .slide.title-slide p { max-width: 63%; font-size: clamp(9px, 1.55cqw, 19px); }
    .slide.title-slide .slide-content::after { right: -6%; bottom: -20%; width: 58%; }

    .slide-footer {
      position: absolute;
      z-index: 2;
      left: 10.5%;
      right: 7.5%;
      bottom: 6.7%;
      display: flex;
      justify-content: space-between;
      color: var(--slide-muted);
      font-size: clamp(5px, .68cqw, 9px);
      font-weight: 750;
      letter-spacing: .13em;
      text-transform: uppercase;
    }

    .slide-footer span:last-child { color: var(--accent); }

    .slide.animate-next .slide-body { animation: slideInNext .38s cubic-bezier(.2,.7,.2,1) both; }
    .slide.animate-prev .slide-body { animation: slideInPrev .38s cubic-bezier(.2,.7,.2,1) both; }
    @keyframes slideInNext { from { opacity: 0; transform: translateX(18px); } to { opacity: 1; transform: none; } }
    @keyframes slideInPrev { from { opacity: 0; transform: translateX(-18px); } to { opacity: 1; transform: none; } }

    .floating-controls {
      position: absolute;
      z-index: 4;
      left: 50%;
      bottom: 19px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px;
      transform: translateX(-50%);
      border: 1px solid var(--line);
      border-radius: 11px;
      background: color-mix(in srgb, var(--panel-strong) 90%, transparent);
      box-shadow: 0 10px 25px rgba(20,22,24,.1);
      backdrop-filter: blur(14px);
    }

    .nav-button {
      width: 30px;
      height: 30px;
      display: grid;
      place-items: center;
      border: 0;
      border-radius: 7px;
      color: var(--muted);
      background: transparent;
      cursor: pointer;
      transition: color .18s, background .18s;
    }

    .nav-button:hover:not(:disabled) { color: var(--ink); background: var(--accent-soft); }
    .nav-button:disabled { opacity: .28; cursor: not-allowed; }
    .nav-button svg { width: 14px; height: 14px; }
    .nav-count { min-width: 72px; text-align: center; color: var(--muted); font: 10px "SFMono-Regular", Consolas, monospace; }

    .toast {
      position: fixed;
      z-index: 99;
      left: 50%;
      top: 16px;
      padding: 10px 14px;
      transform: translate(-50%, -12px);
      opacity: 0;
      border-radius: 8px;
      color: #fff;
      background: #16191e;
      box-shadow: 0 12px 30px rgba(0,0,0,.24);
      font-size: 11px;
      font-weight: 650;
      pointer-events: none;
      transition: opacity .22s, transform .22s;
    }

    .toast.show { opacity: 1; transform: translate(-50%, 0); }

    .presentation:fullscreen {
      padding: 4vh 4vw;
      color: #fff;
      background: #0e1014;
    }

    .presentation:fullscreen::before { display: none; }
    .presentation:fullscreen .stage-wrap { width: min(92vw, calc(92vh * 16 / 9)); }
    .presentation:fullscreen .floating-controls {
      bottom: 2vh;
      color: #f2f2ef;
      border-color: rgba(255,255,255,.14);
      background: rgba(20,22,27,.72);
      opacity: .18;
      transition: opacity .25s;
    }
    .presentation:fullscreen:hover .floating-controls,
    .presentation:fullscreen .floating-controls:focus-within { opacity: 1; }
    .presentation:fullscreen .nav-button:hover:not(:disabled) { color: #fff; background: rgba(255,255,255,.12); }

    @media (max-width: 850px) {
      body { overflow: auto; }
      .app { height: auto; min-height: 100%; padding: 0 12px 12px; grid-template-rows: 64px auto; }
      .brand-copy p, .button .button-label, .shortcut-list { display: none; }
      .button { padding: 0 10px; }
      .workspace { min-height: calc(100vh - 76px); display: flex; flex-direction: column; }
      .editor-panel { height: 42vh; min-height: 280px; }
      .preview-panel { height: 58vh; min-height: 390px; border-top: 1px solid var(--line); }
      .divider { display: none; }
      .presentation { padding: 24px 18px 64px; }
      .stage-wrap { width: min(100%, calc((58vh - 138px) * 16 / 9)); }
      .slide-progress { width: 52px; }
    }

    @media (max-width: 520px) {
      .button.secondary-action { display: none; }
      .brand { gap: 9px; }
      .brand-mark { width: 29px; height: 29px; }
      .top-actions { gap: 5px; }
      .panel-header { padding: 0 12px; }
      #markdownInput { padding: 16px 16px 66px; font-size: 11px; }
      .preview-header .panel-note { display: none; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { scroll-behavior: auto !important; animation-duration: .01ms !important; transition-duration: .01ms !important; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand" aria-label="Markdown to Slides">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 6.5h16M4 11.5h10M4 16.5h7"/><path d="m16 15 2.5 2.5L21 15"/>
          </svg>
        </div>
        <div class="brand-copy">
          <h1>Markdown → Slides</h1>
          <p>Presentation workbench</p>
        </div>
      </div>

      <nav class="top-actions" aria-label="Deck actions">
        <button class="button icon-button" id="themeButton" type="button" aria-label="Switch to dark theme" aria-pressed="false" title="Toggle theme">
          <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="3.5"/><path d="M12 2v2M12 20v2M4.93 4.93l1.42 1.42M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.42-1.42M17.66 6.34l1.41-1.41"/></svg>
        </button>
        <button class="button secondary-action" id="sampleButton" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16v16H4z"/><path d="M8 8h8M8 12h5M8 16h7"/></svg>
          <span class="button-label">Load sample</span>
        </button>
        <button class="button primary" id="presentButton" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16v12H4z"/><path d="m9 21 3-5 3 5M8 8h8"/></svg>
          <span class="button-label">Present</span>
        </button>
      </nav>
    </header>

    <main class="workspace" id="workspace">
      <section class="panel editor-panel" aria-labelledby="editorTitle">
        <header class="panel-header">
          <div class="panel-heading">
            <span class="live-dot" aria-hidden="true"></span>
            <h2 id="editorTitle">Markdown</h2>
            <span class="panel-note">LIVE</span>
          </div>
          <div class="editor-actions">
            <button class="mini-button" id="newSlideButton" type="button">+ SLIDE</button>
          </div>
        </header>
        <div class="editor-shell">
          <textarea id="markdownInput" aria-label="Markdown source" spellcheck="false"></textarea>
          <div class="editor-footer" aria-hidden="true">
            <div class="editor-meta"><span id="wordCount">0 words</span><span id="charCount">0 chars</span></div>
            <div class="shortcut-list"><kbd>⌘</kbd><kbd>↵</kbd><span>new slide</span></div>
          </div>
        </div>
      </section>

      <div class="divider" id="divider" role="separator" aria-orientation="vertical" aria-label="Resize editor"></div>

      <section class="panel preview-panel" aria-labelledby="previewTitle">
        <header class="panel-header preview-header">
          <div class="panel-heading">
            <h2 id="previewTitle">Preview</h2>
            <span class="panel-note">16 : 9</span>
          </div>
          <div class="progress-copy">
            <div class="slide-progress" aria-hidden="true"><span id="progressBar"></span></div>
            <span id="progressText">01 / 01</span>
          </div>
        </header>

        <div class="presentation" id="presentation">
          <div class="stage-wrap">
            <article class="slide" id="slide" aria-live="polite">
              <div class="slide-content"><div class="slide-body" id="slideBody"></div></div>
              <footer class="slide-footer"><span id="deckName">Untitled deck</span><span id="slideNumber">01</span></footer>
            </article>
          </div>

          <div class="floating-controls" aria-label="Slide navigation">
            <button class="nav-button" id="prevButton" type="button" aria-label="Previous slide">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            </button>
            <div class="nav-count" id="navCount">01 — 01</div>
            <button class="nav-button" id="nextButton" type="button" aria-label="Next slide">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
            </button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    (() => {
      'use strict';

      const sampleDeck = `# The next chapter of focused work

**Northstar / Strategy 2026**

Turning fragmented attention into measurable momentum.

---

## A clearer operating model

Our plan centers the business on three durable advantages:

1. **Focus** — fewer priorities, finished exceptionally well
2. **Velocity** — shorter loops from signal to decision
3. **Trust** — quality customers can feel at every touchpoint

---

## The opportunity is hiding in the handoffs

> Teams don't need more activity. They need a cleaner path from intent to impact.

Today, knowledge work loses momentum between tools, owners, and decisions.

---

## Three moves, one system

### 01 / Align the work
Make priorities visible and tradeoffs explicit.

### 02 / Tighten the loop
Bring evidence closer to every decision.

### 03 / Scale what works
Turn repeatable wins into the default way of working.

---

## What success looks like

- **2× faster** from insight to shipped decision
- **30% fewer** meetings without a clear outcome
- **One shared view** of priorities, owners, and progress

---

## Build the company that compounds

Start small. Learn quickly. Make the better way repeatable.

**Q1 2026 · NORTHSTAR LEADERSHIP OFFSITE**`;

      const input = document.getElementById('markdownInput');
      const slide = document.getElementById('slide');
      const slideBody = document.getElementById('slideBody');
      const deckName = document.getElementById('deckName');
      const slideNumber = document.getElementById('slideNumber');
      const progressBar = document.getElementById('progressBar');
      const progressText = document.getElementById('progressText');
      const navCount = document.getElementById('navCount');
      const prevButton = document.getElementById('prevButton');
      const nextButton = document.getElementById('nextButton');
      const presentation = document.getElementById('presentation');
      const workspace = document.getElementById('workspace');
      const divider = document.getElementById('divider');
      const toast = document.getElementById('toast');
      const wordCount = document.getElementById('wordCount');
      const charCount = document.getElementById('charCount');

      let slides = [];
      let current = 0;
      let toastTimer;
      let isDragging = false;

      const pad = number => String(number).padStart(2, '0');

      function escapeHtml(value) {
        return value.replace(/[&<>"']/g, char => ({
          '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'
        })[char]);
      }

      function inlineMarkdown(text) {
        let safe = escapeHtml(text);
        const codeTokens = [];
        safe = safe.replace(/`([^`]+)`/g, (_, code) => {
          codeTokens.push(`<code>${code}</code>`);
          return `\u0000CODE${codeTokens.length - 1}\u0000`;
        });
        safe = safe
          .replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
          .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
          .replace(/__([^_]+)__/g, '<strong>$1</strong>')
          .replace(/(^|[^*])\*([^*]+)\*/g, '$1<em>$2</em>')
          .replace(/(^|[^_])_([^_]+)_/g, '$1<em>$2</em>');
        return safe.replace(/\u0000CODE(\d+)\u0000/g, (_, index) => codeTokens[Number(index)]);
      }

      function renderMarkdown(markdown) {
        const lines = markdown.replace(/\r/g, '').split('\n');
        const output = [];
        let paragraph = [];
        let listType = null;
        let inCode = false;
        let codeLines = [];
        let blockquote = [];

        const flushParagraph = () => {
          if (paragraph.length) {
            output.push(`<p>${inlineMarkdown(paragraph.join(' '))}</p>`);
            paragraph = [];
          }
        };
        const closeList = () => {
          if (listType) { output.push(`</${listType}>`); listType = null; }
        };
        const flushQuote = () => {
          if (blockquote.length) {
            output.push(`<blockquote><p>${inlineMarkdown(blockquote.join(' '))}</p></blockquote>`);
            blockquote = [];
          }
        };

        for (const line of lines) {
          if (/^```/.test(line)) {
            flushParagraph(); closeList(); flushQuote();
            if (inCode) {
              output.push(`<pre><code>${escapeHtml(codeLines.join('\n'))}</code></pre>`);
              codeLines = [];
            }
            inCode = !inCode;
            continue;
          }
          if (inCode) { codeLines.push(line); continue; }

          const heading = line.match(/^(#{1,3})\s+(.+)$/);
          const unordered = line.match(/^\s*[-*+]\s+(.+)$/);
          const ordered = line.match(/^\s*\d+[.)]\s+(.+)$/);
          const quote = line.match(/^>\s?(.*)$/);

          if (heading) {
            flushParagraph(); closeList(); flushQuote();
            const level = heading[1].length;
            output.push(`<h${level}>${inlineMarkdown(heading[2])}</h${level}>`);
          } else if (unordered || ordered) {
            flushParagraph(); flushQuote();
            const wanted = unordered ? 'ul' : 'ol';
            if (listType !== wanted) { closeList(); listType = wanted; output.push(`<${wanted}>`); }
            output.push(`<li>${inlineMarkdown((unordered || ordered)[1])}</li>`);
          } else if (quote) {
            flushParagraph(); closeList();
            blockquote.push(quote[1]);
          } else if (/^\s*$/.test(line)) {
            flushParagraph(); closeList(); flushQuote();
          } else if (/^\s*([-*_])\1\1+\s*$/.test(line)) {
            flushParagraph(); closeList(); flushQuote(); output.push('<hr>');
          } else {
            closeList(); flushQuote(); paragraph.push(line.trim());
          }
        }

        flushParagraph(); closeList(); flushQuote();
        if (inCode && codeLines.length) output.push(`<pre><code>${escapeHtml(codeLines.join('\n'))}</code></pre>`);
        return output.join('');
      }

      function parseDeck(source) {
        const parsed = source.split(/^\s*---\s*$/m).map(part => part.trim()).filter(Boolean);
        return parsed.length ? parsed : ['# Untitled slide\n\nStart writing in the editor.'];
      }

      function getDeckTitle() {
        const title = (slides[0] || '').match(/^#\s+(.+)$/m);
        if (!title) return 'Untitled deck';
        return title[1].replace(/[*_`]/g, '').split(/\s+/).slice(0, 4).join(' ');
      }

      function showSlide(index, direction = 'next') {
        current = Math.max(0, Math.min(index, slides.length - 1));
        const raw = slides[current];
        const firstLine = raw.split('\n').find(line => line.trim()) || '';
        const minimal = raw.split('\n').filter(line => line.trim()).length <= 4;
        const isTitle = /^#\s/.test(firstLine) && (current === 0 || minimal);

        slide.className = `slide ${isTitle ? 'title-slide ' : ''}animate-${direction}`;
        const kicker = current === 0 ? '<div class="slide-kicker">Executive brief</div>' : `<div class="slide-kicker">${pad(current + 1)} / ${pad(slides.length)}</div>`;
        slideBody.innerHTML = kicker + renderMarkdown(raw);
        deckName.textContent = getDeckTitle();
        slideNumber.textContent = pad(current + 1);
        progressText.textContent = `${pad(current + 1)} / ${pad(slides.length)}`;
        navCount.textContent = `${pad(current + 1)} — ${pad(slides.length)}`;
        progressBar.style.width = `${((current + 1) / slides.length) * 100}%`;
        prevButton.disabled = current === 0;
        nextButton.disabled = current === slides.length - 1;
        document.title = `${current + 1}/${slides.length} · Markdown → Slides`;
      }

      function updateDeck({ preserveSlide = true } = {}) {
        slides = parseDeck(input.value);
        if (!preserveSlide) current = 0;
        current = Math.min(current, slides.length - 1);
        const words = input.value.trim() ? input.value.trim().split(/\s+/).length : 0;
        wordCount.textContent = `${words} word${words === 1 ? '' : 's'}`;
        charCount.textContent = `${input.value.length} chars`;
        showSlide(current, 'next');
      }

      function navigate(delta) {
        const next = current + delta;
        if (next < 0 || next >= slides.length) return;
        showSlide(next, delta > 0 ? 'next' : 'prev');
      }

      function notify(message) {
        toast.textContent = message;
        toast.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove('show'), 1800);
      }

      function insertSlideBreak() {
        const start = input.selectionStart;
        const end = input.selectionEnd;
        const prefix = input.value.slice(0, start);
        const suffix = input.value.slice(end);
        const separator = `${prefix.endsWith('\n') || !prefix ? '' : '\n'}\n---\n\n`;
        input.value = prefix + separator + suffix;
        const caret = prefix.length + separator.length;
        input.setSelectionRange(caret, caret);
        input.focus();
        updateDeck();
      }

      async function toggleFullscreen() {
        try {
          if (!document.fullscreenElement) await presentation.requestFullscreen();
          else await document.exitFullscreen();
        } catch (error) {
          notify('Full-screen is not available in this browser');
        }
      }

      input.addEventListener('input', () => updateDeck());
      prevButton.addEventListener('click', () => navigate(-1));
      nextButton.addEventListener('click', () => navigate(1));
      document.getElementById('newSlideButton').addEventListener('click', insertSlideBreak);
      document.getElementById('presentButton').addEventListener('click', toggleFullscreen);

      document.getElementById('sampleButton').addEventListener('click', () => {
        input.value = sampleDeck;
        updateDeck({ preserveSlide: false });
        notify('Sample deck loaded');
      });

      document.getElementById('themeButton').addEventListener('click', event => {
        const dark = document.body.classList.toggle('dark');
        event.currentTarget.setAttribute('aria-pressed', String(dark));
        event.currentTarget.setAttribute('aria-label', dark ? 'Switch to light theme' : 'Switch to dark theme');
        notify(dark ? 'Midnight theme' : 'Paper theme');
      });

      document.addEventListener('keydown', event => {
        const editing = event.target === input;
        if (editing && (event.metaKey || event.ctrlKey) && event.key === 'Enter') {
          event.preventDefault(); insertSlideBreak(); return;
        }
        if (editing && !document.fullscreenElement) return;

        if (['ArrowRight', 'ArrowDown', 'PageDown', ' '].includes(event.key)) {
          event.preventDefault(); navigate(1);
        } else if (['ArrowLeft', 'ArrowUp', 'PageUp'].includes(event.key)) {
          event.preventDefault(); navigate(-1);
        } else if (event.key === 'Home') {
          event.preventDefault(); showSlide(0, 'prev');
        } else if (event.key === 'End') {
          event.preventDefault(); showSlide(slides.length - 1, 'next');
        } else if ((event.key === 'f' || event.key === 'F') && !editing) {
          event.preventDefault(); toggleFullscreen();
        }
      });

      divider.addEventListener('pointerdown', event => {
        isDragging = true;
        divider.setPointerCapture(event.pointerId);
        document.body.style.userSelect = 'none';
        document.body.style.cursor = 'col-resize';
      });
      divider.addEventListener('pointermove', event => {
        if (!isDragging) return;
        const rect = workspace.getBoundingClientRect();
        const percent = ((event.clientX - rect.left) / rect.width) * 100;
        document.documentElement.style.setProperty('--editor-width', `${Math.max(28, Math.min(57, percent))}%`);
      });
      const endDrag = () => {
        isDragging = false;
        document.body.style.userSelect = '';
        document.body.style.cursor = '';
      };
      divider.addEventListener('pointerup', endDrag);
      divider.addEventListener('pointercancel', endDrag);

      document.addEventListener('fullscreenchange', () => {
        const active = document.fullscreenElement === presentation;
        document.getElementById('presentButton').setAttribute('aria-pressed', String(active));
      });

      input.value = sampleDeck;
      updateDeck({ preserveSlide: false });
    })();
  </script>
</body>
</html>
