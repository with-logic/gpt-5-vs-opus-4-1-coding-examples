<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#141114" />
  <title>Weather Theatre</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Italiana&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink:#171216; --paper:#e8d9b9; --cream:#f7edda; --gold:#c7a35a;
      --red:#711d2c; --deep-red:#3d101b; --night:#121624; --muted:#aa9d88;
      --cosy:52; --eerie:28; --heroic:38;
    }
    *{box-sizing:border-box}
    html,body,#root{width:100%;height:100%;margin:0}
    body{overflow:hidden;background:#0c0b0d;color:var(--cream);font-family:"DM Mono",monospace}
    button,input{font:inherit}
    button{color:inherit}
    .app{position:relative;min-height:100%;height:100%;display:grid;grid-template-rows:auto minmax(0,1fr) auto;overflow:hidden;
      background:radial-gradient(circle at 50% 25%,#352326 0,#181317 43%,#0c0b0d 100%)}
    .grain{position:fixed;inset:0;pointer-events:none;z-index:50;opacity:.13;mix-blend-mode:soft-light;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.95' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.48'/%3E%3C/svg%3E")}
    header{height:72px;padding:16px clamp(18px,4vw,60px);display:flex;align-items:center;justify-content:space-between;position:relative;z-index:20}
    .brand{display:flex;align-items:center;gap:13px}
    .brand-mark{width:35px;height:35px;border:1px solid #d6bd7e;border-radius:50%;display:grid;place-items:center;color:#d6bd7e;box-shadow:inset 0 0 0 3px #21181a,0 0 20px #b67f4130}
    .brand-mark svg{width:21px;height:21px}
    .brand-copy{display:flex;flex-direction:column}
    .brand-name{font-family:"Italiana",serif;font-size:22px;letter-spacing:.05em;line-height:1}
    .brand-kicker{font-size:8px;letter-spacing:.27em;text-transform:uppercase;color:#aa987f;margin-top:5px}
    .date{display:flex;align-items:center;gap:11px;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:#b3a58e}
    .date:before,.date:after{content:"";display:block;width:23px;height:1px;background:#705c44}
    main{min-height:0;padding:0 clamp(12px,3.2vw,48px);position:relative;z-index:2}
    .theatre{position:relative;height:100%;max-width:1440px;margin:auto;display:flex;align-items:stretch;justify-content:center}
    .proscenium{position:absolute;inset:0 0 -5px;border:clamp(12px,1.4vw,21px) solid #251a18;border-radius:120px 120px 12px 12px/42px 42px 12px 12px;z-index:8;pointer-events:none;
      box-shadow:inset 0 0 0 2px #ad8442,inset 0 0 0 6px #503619,inset 0 0 0 8px #d0a75c,0 10px 55px #000b}
    .proscenium:before{content:"✦  W E A T H E R   T H E A T R E  ✦";position:absolute;top:-17px;left:50%;transform:translateX(-50%);white-space:nowrap;padding:4px 28px 5px;border:1px solid #aa783b;background:#291a17;color:#dab870;font-family:"Italiana",serif;font-size:clamp(10px,1vw,14px);letter-spacing:.18em;border-radius:50%;box-shadow:inset 0 0 0 2px #422b20}
    .proscenium:after{content:"";position:absolute;inset:-9px;border:1px solid #79542d;border-radius:110px 110px 8px 8px/33px 33px 8px 8px;opacity:.8}
    .stage{position:absolute;inset:12px 15px 8px;overflow:hidden;border-radius:91px 91px 2px 2px/26px 26px 2px 2px;background:#151824;isolation:isolate}
    canvas{position:absolute;inset:0;width:100%;height:100%;z-index:0}
    .vignette{position:absolute;inset:0;z-index:3;pointer-events:none;background:radial-gradient(ellipse at 50% 44%,transparent 32%,#09070a22 64%,#070507c9 100%)}
    .stage-floor{position:absolute;left:0;right:0;bottom:0;height:18%;z-index:2;transform:perspective(500px) rotateX(62deg);transform-origin:bottom;background:repeating-linear-gradient(90deg,#1c1312 0 8%,#291a16 8% 8.4%,#130e0e 8.4% 16%);box-shadow:inset 0 14px 35px #000b}
    .stage-floor:after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,#0009,transparent 35% 65%,#0009),repeating-linear-gradient(0deg,transparent 0 20px,#0005 21px)}
    .forecast{position:absolute;left:clamp(30px,6vw,96px);top:14%;z-index:5;display:flex;flex-direction:column;align-items:flex-start;text-shadow:0 3px 15px #0009;transition:transform .2s ease-out}
    .scene-no{font-size:9px;letter-spacing:.28em;text-transform:uppercase;color:#e2c889;margin-bottom:15px;display:flex;align-items:center;gap:11px}
    .scene-no:before{content:"";width:28px;height:1px;background:currentColor}
    h1{font-family:"Italiana",serif;font-weight:400;font-size:clamp(64px,10vw,148px);line-height:.72;letter-spacing:-.045em;margin:0;color:#f7ecd2}
    .degrees{font-size:.45em;vertical-align:top;display:inline-block;transform:translateY(-.16em);letter-spacing:0}
    .condition{font-family:"Italiana",serif;font-size:clamp(23px,3.2vw,47px);font-style:italic;margin:19px 0 0 5px;color:#ecd49f;letter-spacing:.02em}
    .metrics{display:flex;gap:clamp(18px,3vw,42px);margin:28px 0 0 6px;padding-top:15px;border-top:1px solid #e9d6aa59}
    .metric{display:flex;flex-direction:column;gap:4px}
    .metric b{font-family:"Italiana",serif;font-size:17px;font-weight:400;color:#f2dfba}
    .metric span{font-size:7px;letter-spacing:.22em;color:#bda985;text-transform:uppercase}
    .subtitle-wrap{position:absolute;z-index:5;left:50%;bottom:8%;transform:translateX(-50%);width:min(80%,720px);text-align:center;pointer-events:none}
    .subtitle{display:inline-block;min-height:32px;padding:9px 18px 8px;background:#080708c9;border:1px solid #a78b5a70;color:#fff1ce;font-family:"Italiana",serif;font-size:clamp(13px,1.45vw,19px);letter-spacing:.065em;box-shadow:0 6px 26px #0007}
    .caret{display:inline-block;width:1px;height:.9em;margin-left:4px;background:#edcf8a;vertical-align:-.06em;animation:blink .8s steps(1) infinite}
    @keyframes blink{50%{opacity:0}}
    .curtain{position:absolute;top:-1%;bottom:0;width:53%;z-index:7;pointer-events:none;transition:transform 1.9s cubic-bezier(.76,0,.2,1);background-color:#681a2b;
      background-image:linear-gradient(90deg,#310915 0%,#7f2338 9%,#3e0b19 18%,#8e2940 28%,#3d0a18 40%,#7c2034 51%,#3d0a18 64%,#8c2940 77%,#3a0a17 89%,#6b182c 100%);filter:drop-shadow(0 9px 18px #000b)}
    .curtain:after{content:"";position:absolute;inset:0;background:linear-gradient(#c2636a20,transparent 24%,#22050db5 100%)}
    .curtain.left{left:0;border-bottom-right-radius:55% 12%;transform-origin:top left}
    .curtain.right{right:0;border-bottom-left-radius:55% 12%;transform-origin:top right}
    .revealed .curtain.left{transform:translateX(-88%) skewX(-3deg)}
    .revealed .curtain.right{transform:translateX(88%) skewX(3deg)}
    .valance{position:absolute;z-index:9;left:-2%;right:-2%;top:-4px;height:17%;pointer-events:none;background:repeating-radial-gradient(ellipse at 50% -25%,#922a40 0 8%,#4d0e20 18% 22%,#7b1f35 35% 39%);border-radius:0 0 50% 50%/0 0 35% 35%;filter:drop-shadow(0 10px 12px #0007);transition:transform 1.3s ease}
    .valance:after{content:"";position:absolute;left:0;right:0;bottom:-8px;height:10px;background:repeating-linear-gradient(90deg,#c4994f 0 3px,transparent 3px 12px);border-top:2px solid #d0a85b}
    .revealed .valance{transform:translateY(-42%)}
    .opening-note{position:absolute;z-index:10;inset:0;display:grid;place-items:center;pointer-events:none;opacity:1;transition:opacity .5s ease .55s}
    .revealed .opening-note{opacity:0}
    .opening-note span{font-family:"Italiana",serif;font-size:20px;letter-spacing:.25em;text-transform:uppercase;color:#e6c376;text-shadow:0 3px 10px #000}
    footer{height:134px;padding:12px clamp(18px,4vw,60px) 18px;position:relative;z-index:20;display:grid;grid-template-columns:1fr minmax(460px,720px) 1fr;align-items:center;gap:30px;background:linear-gradient(#0c0b0d00,#0c0b0d 25%)}
    .now-playing{justify-self:start}
    .eyebrow{font-size:7px;letter-spacing:.25em;text-transform:uppercase;color:#897d6c;margin-bottom:7px}
    .now-title{font-family:"Italiana",serif;font-size:18px;color:#d8c39b}
    .mixer{display:grid;grid-template-columns:repeat(3,1fr);gap:28px;position:relative}
    .control{display:grid;grid-template-columns:1fr auto;grid-template-rows:auto auto;gap:7px 10px;align-items:center}
    .control label{font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:#d5c4a6}
    .control output{font-size:8px;color:#8f8372}
    input[type=range]{grid-column:1/-1;width:100%;height:16px;margin:0;background:transparent;appearance:none;cursor:pointer}
    input[type=range]::-webkit-slider-runnable-track{height:2px;background:linear-gradient(90deg,#bd8e49 var(--pct),#4b4238 var(--pct));border-radius:2px}
    input[type=range]::-webkit-slider-thumb{appearance:none;width:13px;height:13px;margin-top:-5.5px;border-radius:50%;background:#171215;border:2px solid #d4b06b;box-shadow:0 0 0 3px #171215,0 2px 7px #000}
    input[type=range]::-moz-range-track{height:2px;background:#4b4238}
    input[type=range]::-moz-range-progress{height:2px;background:#bd8e49}
    input[type=range]::-moz-range-thumb{width:11px;height:11px;border-radius:50%;background:#171215;border:2px solid #d4b06b}
    input:focus-visible,button:focus-visible{outline:2px solid #edc473;outline-offset:5px}
    .mode-wrap{justify-self:end;display:flex;align-items:center;gap:11px}
    .mode-label{font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:#786f64;transition:color .3s}.mode-label.active{color:#e2ceb0}
    .toggle{width:48px;height:25px;padding:2px;border:1px solid #806b4d;background:#181317;border-radius:30px;cursor:pointer;position:relative;box-shadow:inset 0 2px 7px #0008}
    .toggle-knob{display:grid;place-items:center;width:19px;height:19px;border-radius:50%;background:#d8bd82;color:#201716;transition:transform .45s cubic-bezier(.2,.8,.2,1),background .3s}
    .toggle.night .toggle-knob{transform:translateX(23px);background:#aeb5cf}
    .toggle svg{width:11px;height:11px}
    .sound-note{position:absolute;right:25px;bottom:8px;font-size:7px;color:#524b43;letter-spacing:.12em}
    @media(max-width:760px){
      header{height:58px;padding:12px 17px}.brand-name{font-size:18px}.brand-kicker{display:none}.date{font-size:7px}.date:before,.date:after{display:none}
      main{padding:0 8px}.proscenium{border-width:11px}.proscenium:before{top:-14px;padding:3px 16px;font-size:8px}.stage{inset:8px 10px 5px}
      .forecast{left:28px;top:18%}h1{font-size:76px}.condition{font-size:25px;margin-top:14px}.metrics{margin-top:20px;gap:20px}.subtitle-wrap{bottom:9%;width:88%}
      footer{height:166px;padding:11px 18px 17px;grid-template-columns:1fr auto;grid-template-rows:auto 1fr;gap:4px 16px}.mixer{grid-row:2;grid-column:1/-1;width:100%;gap:15px}.now-playing{align-self:end}.mode-wrap{align-self:end}.sound-note{display:none}
    }
    @media(max-height:680px){header{height:52px}.brand-mark{width:30px;height:30px}.brand-name{font-size:17px}footer{height:112px}.forecast{top:12%}.metrics{margin-top:18px}.subtitle-wrap{bottom:7%}}
    @media(prefers-reduced-motion:reduce){.curtain,.valance{transition-duration:.01ms}.caret{animation:none}}
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script>
  (() => {
    const {useEffect,useRef,useState,useMemo} = React;
    const h = React.createElement;
    const clamp=(n,a,b)=>Math.max(a,Math.min(b,n));
    const lerp=(a,b,t)=>a+(b-a)*t;
    const mixColor=(a,b,t)=>a.map((v,i)=>Math.round(lerp(v,b[i],t)));
    const rgb=a=>`rgb(${a.join(',')})`;

    function WeatherCanvas({cosy,eerie,heroic,night,pointer}){
      const ref=useRef(null), values=useRef({cosy,eerie,heroic,night,pointer});
      values.current={cosy,eerie,heroic,night,pointer};
      useEffect(()=>{
        const canvas=ref.current,ctx=canvas.getContext('2d'); let frame=0,raf,particles=[];
        for(let i=0;i<120;i++) particles.push({x:Math.random(),y:Math.random(),s:Math.random(),p:Math.random()*6.28});
        const resize=()=>{const r=canvas.getBoundingClientRect(),d=Math.min(devicePixelRatio||1,2);canvas.width=r.width*d;canvas.height=r.height*d;ctx.setTransform(d,0,0,d,0,0)};
        resize(); new ResizeObserver(resize).observe(canvas);
        function cloud(x,y,s,dark,W){
          ctx.save();ctx.translate(x,y);ctx.scale(s,s);ctx.fillStyle=dark;ctx.beginPath();ctx.ellipse(-30,6,34,16,0,0,7);ctx.ellipse(0,-2,32,25,0,0,7);ctx.ellipse(31,7,40,18,0,0,7);ctx.fill();ctx.restore();
        }
        function hill(y,amp,color,shift,W,H,seed){
          ctx.fillStyle=color;ctx.beginPath();ctx.moveTo(0,H);ctx.lineTo(0,y);for(let x=0;x<=W+20;x+=20){const yy=y+Math.sin(x*.008+seed+shift)*amp+Math.sin(x*.019+seed)*amp*.35;ctx.lineTo(x,yy)}ctx.lineTo(W,H);ctx.closePath();ctx.fill();
        }
        function draw(){
          const r=canvas.getBoundingClientRect(),W=r.width,H=r.height,v=values.current,c=v.cosy/100,e=v.eerie/100,he=v.heroic/100,n=v.night?1:0,t=frame*.016,px=v.pointer.x,py=v.pointer.y;
          frame++;
          const top=mixColor(mixColor([78,105,119],[12,16,31],n),[35,22,44],e*.68);
          const bot=mixColor(mixColor([232,161,92],[41,44,66],n),[81,36,47],e*.55);
          const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,rgb(top));g.addColorStop(.68,rgb(bot));g.addColorStop(1,'#1b1619');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
          // stars and drifting motes
          particles.forEach((p,i)=>{const star=n*.72+e*.24;const x=((p.x*W+t*(2+p.s)*(.08+c*.12))%W);const y=p.y*H*.7;ctx.globalAlpha=star*(.18+.65*Math.abs(Math.sin(t*(.7+p.s)+p.p)));ctx.fillStyle=i%7?'#f5dfb0':'#cdd9ef';ctx.beginPath();ctx.arc(x,y,.4+p.s*1.15,0,7);ctx.fill()});ctx.globalAlpha=1;
          // moon / sun
          const orbX=W*(.76+px*.018),orbY=H*(.23+py*.014),orbR=Math.min(W,H)*(.07+he*.018);ctx.save();ctx.shadowBlur=45+he*55;ctx.shadowColor=n?'#c9d6ec':'#ffd783';ctx.fillStyle=n?'#d9dfdb':'#ffe3a1';ctx.beginPath();ctx.arc(orbX,orbY,orbR,0,7);ctx.fill();if(n){ctx.fillStyle=rgb(top);ctx.beginPath();ctx.arc(orbX-orbR*.27,orbY-orbR*.17,orbR*.93,0,7);ctx.fill()}ctx.restore();
          // heroic rays
          ctx.save();ctx.globalAlpha=he*(n?.09:.19);ctx.fillStyle='#ffe7a1';for(let i=0;i<7;i++){const a=-2.9+i*.27+Math.sin(t*.2)*.03;ctx.beginPath();ctx.moveTo(orbX,orbY);ctx.lineTo(orbX+Math.cos(a)*W*1.2,orbY+Math.sin(a)*W*1.2);ctx.lineTo(orbX+Math.cos(a+.10)*W*1.2,orbY+Math.sin(a+.10)*W*1.2);ctx.fill()}ctx.restore();
          cloud(W*(.20+px*.025)+Math.sin(t*.12)*18,H*.22,1.1+W/1400,`rgba(32,34,45,${.24+e*.38})`,W);
          cloud(W*(.59+px*.014)+Math.sin(t*.09+2)*25,H*.34,.75+W/1700,`rgba(47,42,51,${.21+e*.31})`,W);
          hill(H*.61,35,'#403b3c',px*18,W,H,1.2);hill(H*.69,46,'#292526',px*28,W,H,3.4);
          // town silhouette
          ctx.save();ctx.translate(px*38,0);ctx.fillStyle='#181719';let base=H*.79;for(let i=-2;i<30;i++){let x=i*W/24,w=W/20,hh=22+((i*17)%5)*9;ctx.fillRect(x,base-hh,w,hh);if(i%4===0){ctx.beginPath();ctx.moveTo(x-3,base-hh);ctx.lineTo(x+w/2,base-hh-18-he*12);ctx.lineTo(x+w+3,base-hh);ctx.fill()} if(c>.1){ctx.fillStyle=`rgba(255,190,91,${c*.78})`;for(let j=0;j<2;j++)ctx.fillRect(x+9+j*15,base-hh+9,5,8);ctx.fillStyle='#181719'}}ctx.restore();
          // rain for eerie
          if(e>.12){ctx.strokeStyle=`rgba(174,196,215,${e*.44})`;ctx.lineWidth=1;particles.slice(0,70).forEach(p=>{let x=(p.x*W+t*70*(.6+p.s))%W,y=(p.y*H+t*145*(.7+p.s))%H;ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x-5-e*6,y+12+e*10);ctx.stroke()})}
          // cosy fireflies
          if(c>.12){particles.slice(0,34).forEach(p=>{let x=p.x*W,y=H*(.52+p.y*.36)+Math.sin(t+p.p)*9;ctx.globalAlpha=c*(.25+.6*Math.abs(Math.sin(t*1.4+p.p)));ctx.shadowBlur=10;ctx.shadowColor='#ffc75f';ctx.fillStyle='#ffe39b';ctx.beginPath();ctx.arc(x,y,1.4,0,7);ctx.fill()});ctx.shadowBlur=0;ctx.globalAlpha=1}
          // sweeping theatrical spotlights
          ctx.save();ctx.globalCompositeOperation='screen';for(let k=0;k<2;k++){let sx=k?W*.84:W*.16,ang=(k?2.12:1.03)+Math.sin(t*.52+k*2)*.12,ex=sx+Math.cos(ang)*H*1.1,ey=Math.sin(ang)*H*1.1;let lg=ctx.createLinearGradient(sx,0,ex,ey);lg.addColorStop(0,`rgba(255,227,173,${.10+he*.10})`);lg.addColorStop(1,'rgba(255,227,173,0)');ctx.fillStyle=lg;ctx.beginPath();ctx.moveTo(sx-5,0);ctx.lineTo(ex-90,ey);ctx.lineTo(ex+90,ey);ctx.lineTo(sx+5,0);ctx.fill()}ctx.restore();
          // lightning flash
          if(e>.62 && Math.sin(t*.83)>0.994){ctx.fillStyle=`rgba(220,225,255,${e*.25})`;ctx.fillRect(0,0,W,H)}
          raf=requestAnimationFrame(draw);
        } draw();return()=>cancelAnimationFrame(raf)
      },[]);
      return h('canvas',{ref,'aria-hidden':'true'});
    }

    function Icon({type}){
      const common={viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:'1.5',strokeLinecap:'round'};
      if(type==='sun')return h('svg',common,h('circle',{cx:12,cy:12,r:3}),h('path',{d:'M12 2v3m0 14v3M2 12h3m14 0h3M4.9 4.9 7 7m10 10 2.1 2.1M19.1 4.9 17 7M7 17l-2.1 2.1'}));
      if(type==='moon')return h('svg',common,h('path',{d:'M20 15.5A8.5 8.5 0 0 1 8.5 4 8.5 8.5 0 1 0 20 15.5Z'}));
      return h('svg',common,h('path',{d:'M4 14.5A4.5 4.5 0 0 1 8.5 10h.2A6 6 0 0 1 20 13c0 3-2.2 5-5.2 5H7.5A3.5 3.5 0 0 1 4 14.5Z'}),h('path',{d:'M8 5V2m-3 4L3 4m10 2 2-2'}));
    }
    function Slider({name,value,setValue}){return h('div',{className:'control'},h('label',{htmlFor:name},name),h('output',{htmlFor:name},String(value).padStart(2,'0')),h('input',{id:name,type:'range',min:0,max:100,value,onChange:e=>setValue(+e.target.value),style:{'--pct':value+'%'},'aria-label':name+' atmosphere'}))}
    function Typewriter({text}){const [shown,setShown]=useState('');useEffect(()=>{setShown('');let i=0;const timer=setInterval(()=>{i++;setShown(text.slice(0,i));if(i>=text.length)clearInterval(timer)},34);return()=>clearInterval(timer)},[text]);return h('span',null,shown,h('i',{className:'caret'}))}

    function App(){
      const [cosy,setCosy]=useState(52),[eerie,setEerie]=useState(28),[heroic,setHeroic]=useState(38),[night,setNight]=useState(true),[revealed,setRevealed]=useState(false),[pointer,setPointer]=useState({x:0,y:0}),[settled,setSettled]=useState({cosy,eerie,heroic,night});
      useEffect(()=>{const id=setTimeout(()=>setRevealed(true),480);return()=>clearTimeout(id)},[]);
      useEffect(()=>{const id=setTimeout(()=>setSettled({cosy,eerie,heroic,night}),220);return()=>clearTimeout(id)},[cosy,eerie,heroic,night]);
      const subtitle=useMemo(()=>{
        const {cosy:c,eerie:e,heroic:he,night:n}=settled;
        if(e>70)return n?'Thunder rehearses beyond the sleeping chimneys.':'A strange hush passes over the noon-lit hills.';
        if(he>70)return n?'Moonlight rallies the rooftops for one last act.':'The clouds part — and the whole valley takes a bow.';
        if(c>70)return n?'Lamplight gathers warmly beneath a silver sky.':'A soft breeze carries the scent of rain and tea.';
        if(e>he&&e>c)return 'Low cloud wanders in, dramatic and undecided.';
        if(he>c)return 'A brave bright break is forming in the west.';
        return n?'Clouds drift gently over the lantern-lit town.':'Mild skies, with a golden clearing after three.';
