<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#39b8e8">
  <title>Fruity Fall — Catch the Good Stuff!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #20323c;
      --cream: #fff9df;
      --yellow: #ffd83d;
      --orange: #ff8a35;
      --red: #ff4d52;
      --blue: #48c6ef;
      --green: #42ba6c;
      --brown: #8b4b29;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      overscroll-behavior: none;
      background: #1b8cb7;
      color: var(--ink);
      font-family: "Nunito", ui-rounded, sans-serif;
    }

    button { font: inherit; }

    body {
      display: grid;
      place-items: center;
      padding: clamp(0px, 1.4vw, 18px);
      background:
        radial-gradient(circle at 18% 12%, rgba(255,255,255,.34) 0 8%, transparent 22%),
        linear-gradient(160deg, #18a4d4, #55cbe8 50%, #1595c2);
    }

    .game-shell {
      position: relative;
      width: min(1040px, 100%);
      height: min(800px, 100%);
      min-height: 420px;
      overflow: hidden;
      border: clamp(0px, .7vw, 8px) solid rgba(255,249,223,.94);
      border-radius: clamp(0px, 2.4vw, 28px);
      background: #83dcf5;
      box-shadow: 0 28px 70px rgba(8, 71, 96, .32), inset 0 0 0 3px rgba(35,85,72,.13);
      isolation: isolate;
      touch-action: none;
    }

    .game-shell::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 8;
      border-radius: inherit;
      box-shadow: inset 0 0 70px rgba(11,73,70,.08);
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .hud {
      position: absolute;
      z-index: 10;
      top: max(14px, env(safe-area-inset-top));
      left: 50%;
      width: calc(100% - clamp(22px, 5vw, 60px));
      transform: translateX(-50%);
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 12px;
      pointer-events: none;
    }

    .brand {
      justify-self: start;
      display: flex;
      align-items: center;
      gap: 9px;
      color: #fff;
      font-family: "Baloo 2", ui-rounded, sans-serif;
      font-weight: 800;
      font-size: clamp(17px, 2.5vw, 27px);
      line-height: 1;
      letter-spacing: -.03em;
      text-shadow: 0 3px 0 rgba(24,102,116,.24);
    }

    .brand-fruit {
      width: clamp(34px, 5vw, 48px);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border-radius: 50% 48% 52% 45%;
      background: var(--orange);
      box-shadow: inset -7px -8px 0 rgba(207,70,27,.18), 0 4px 0 rgba(28,97,96,.18);
      transform: rotate(-8deg);
      font-size: .7em;
      color: #fff4c5;
    }

    .scoreboard {
      position: relative;
      min-width: clamp(126px, 20vw, 184px);
      padding: 7px 22px 8px;
      border: 4px solid rgba(255,255,255,.88);
      border-radius: 21px;
      background: #fff6d1;
      text-align: center;
      box-shadow: 0 7px 0 rgba(35,117,109,.22), inset 0 -3px 0 rgba(234,181,55,.14);
    }

    .score-label {
      display: block;
      margin-bottom: -5px;
      color: #c46a2a;
      font-size: 10px;
      font-weight: 900;
      letter-spacing: .19em;
      text-transform: uppercase;
    }

    #score {
      display: block;
      color: #20323c;
      font-family: "Baloo 2", ui-rounded, sans-serif;
      font-size: clamp(30px, 4.8vw, 47px);
      line-height: .93;
      font-weight: 800;
      letter-spacing: -.04em;
      font-variant-numeric: tabular-nums;
    }

    #score.pop { animation: scorePop .26s cubic-bezier(.2,1.8,.5,1); }

    .lives {
      justify-self: end;
      display: flex;
      align-items: center;
      gap: clamp(4px, 1vw, 9px);
      padding: 7px 10px;
      border: 3px solid rgba(255,255,255,.82);
      border-radius: 18px;
      background: rgba(255,249,223,.9);
      box-shadow: 0 5px 0 rgba(35,117,109,.19);
    }

    .heart {
      width: clamp(19px, 3.4vw, 29px);
      color: var(--red);
      filter: drop-shadow(0 2px 0 rgba(158,49,44,.2));
      transform-origin: center;
      transition: .25s ease;
    }

    .heart.empty { color: #d9cfb4; transform: scale(.78); filter: none; }
    .heart.lost { animation: heartLost .55s ease both; }

    .corner-actions {
      position: absolute;
      z-index: 12;
      right: clamp(12px, 2.8vw, 28px);
      bottom: clamp(13px, 2.7vw, 25px);
      display: flex;
      gap: 8px;
    }

    .icon-button {
      width: 43px;
      height: 43px;
      display: grid;
      place-items: center;
      padding: 0;
      border: 3px solid rgba(255,255,255,.84);
      border-radius: 50%;
      background: rgba(36,61,54,.7);
      color: #fff;
      cursor: pointer;
      box-shadow: 0 4px 0 rgba(26,55,50,.24);
      pointer-events: auto;
      transition: transform .16s ease, background .16s ease;
    }

    .icon-button:hover { transform: translateY(-2px) rotate(-4deg); background: rgba(36,61,54,.88); }
    .icon-button:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(26,55,50,.24); }
    .icon-button:focus-visible, .play-button:focus-visible { outline: 4px solid #fff; outline-offset: 4px; }
    .icon-button svg { width: 20px; height: 20px; fill: currentColor; }

    .overlay {
      position: absolute;
      z-index: 20;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(14,93,108,.15);
      backdrop-filter: blur(2px);
      opacity: 1;
      visibility: visible;
      transition: opacity .3s ease, visibility .3s ease;
    }

    .overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

    .intro-card {
      position: relative;
      width: min(520px, 92%);
      padding: clamp(28px, 5.4vh, 49px) clamp(22px, 5vw, 48px) clamp(24px, 4.7vh, 41px);
      border: 6px solid #fffdf0;
      border-radius: 38px 34px 42px 30px;
      background: #fff7d5;
      text-align: center;
      box-shadow: 0 16px 0 rgba(44,100,84,.25), 0 30px 70px rgba(23,78,78,.22), inset 0 -8px 0 rgba(235,184,63,.14);
      animation: cardIn .55s cubic-bezier(.18,1.2,.4,1) both;
    }

    .intro-card::before,
    .intro-card::after {
      content: "";
      position: absolute;
      z-index: -1;
      width: 72px;
      height: 84px;
      border-radius: 70% 10% 70% 20%;
      background: #46bd6b;
      border: 5px solid #fffdf0;
    }

    .intro-card::before { top: -30px; left: -24px; transform: rotate(-35deg); }
    .intro-card::after { right: -22px; bottom: -20px; transform: rotate(145deg); }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 4px;
      color: #dc632c;
      font-size: clamp(10px, 1.6vw, 13px);
      font-weight: 900;
      letter-spacing: .16em;
      text-transform: uppercase;
    }

    .eyebrow::before, .eyebrow::after { content: "✦"; color: #f3b51f; }

    h1 {
      margin: 0;
      color: #244538;
      font-family: "Baloo 2", ui-rounded, sans-serif;
      font-size: clamp(49px, 9vw, 86px);
      line-height: .84;
      font-weight: 800;
      letter-spacing: -.06em;
      text-wrap: balance;
    }

    h1 span { color: #ff5b44; text-shadow: 0 5px 0 #ffd264; }

    .subtitle {
      max-width: 370px;
      margin: clamp(15px, 3vh, 24px) auto clamp(18px, 3.6vh, 29px);
      color: #546459;
      font-size: clamp(14px, 2.2vw, 18px);
      line-height: 1.35;
      font-weight: 800;
    }

    .play-button {
      min-width: min(270px, 90%);
      padding: 14px 25px 12px;
      border: 4px solid #fff;
      border-radius: 21px;
      background: #ff6948;
      color: #fff;
      font-family: "Baloo 2", ui-rounded, sans-serif;
      font-size: clamp(21px, 3.5vw, 29px);
      line-height: 1.1;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 8px 0 #c94534, 0 12px 25px rgba(151,62,39,.18);
      transition: transform .16s ease, box-shadow .16s ease, background .16s ease;
    }

    .play-button:hover { transform: translateY(-3px) scale(1.02); background: #ff7752; box-shadow: 0 11px 0 #c94534, 0 16px 28px rgba(151,62,39,.18); }
    .play-button:active { transform: translateY(5px); box-shadow: 0 3px 0 #c94534; }

    .controls-hint {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 9px;
      margin-top: 18px;
      color: #798277;
      font-size: clamp(11px, 1.8vw, 14px);
      font-weight: 900;
    }

    .key {
      min-width: 29px;
      height: 27px;
      display: inline-grid;
      place-items: center;
      border: 2px solid #c5b992;
      border-bottom-width: 4px;
      border-radius: 7px;
      background: #fffdf2;
      color: #456054;
      line-height: 1;
    }

    .final-score {
      display: none;
      margin: 13px auto 24px;
      color: #526258;
      font-size: 17px;
      font-weight: 900;
    }

    .final-score strong {
      display: block;
      margin-top: -7px;
      color: #ff6548;
      font-family: "Baloo 2", ui-rounded, sans-serif;
      font-size: clamp(55px, 10vw, 86px);
      line-height: 1;
    }

    .overlay.game-over .eyebrow { color: #9a582b; }
    .overlay.game-over .subtitle { display: none; }
    .overlay.game-over .final-score { display: block; }
    .overlay.game-over h1 { font-size: clamp(46px, 8vw, 72px); }

    .pause-label {
      position: absolute;
      z-index: 15;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) scale(.8) rotate(-2deg);
      padding: 11px 27px;
      border: 5px solid #fff;
      border-radius: 19px;
      background: #ffcf38;
      color: #344f42;
      font-family: "Baloo 2", ui-rounded, sans-serif;
      font-size: clamp(32px, 7vw, 60px);
      font-weight: 800;
      box-shadow: 0 9px 0 rgba(139,91,31,.3);
      opacity: 0;
      pointer-events: none;
      transition: .2s ease;
    }

    .pause-label.show { opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(-2deg); }

    @keyframes cardIn { from { opacity: 0; transform: translateY(25px) scale(.88) rotate(2deg); } to { opacity: 1; transform: none; } }
    @keyframes scorePop { 50% { transform: scale(1.35) rotate(-4deg); color: #ff5b44; } }
    @keyframes heartLost { 35% { transform: scale(1.4) rotate(-15deg); } 100% { transform: scale(.78); color: #d9cfb4; } }

    @media (max-width: 520px) {
      body { padding: 0; }
      .game-shell { border: 0; border-radius: 0; }
      .brand span { display: none; }
      .hud { grid-template-columns: 48px auto 1fr; top: 10px; }
      .scoreboard { padding-inline: 14px; border-width: 3px; }
      .intro-card { border-width: 5px; }
      .controls-hint { margin-top: 14px; }
      .corner-actions { bottom: 11px; right: 11px; }
      .icon-button { width: 39px; height: 39px; }
    }

    @media (max-height: 580px) {
      .intro-card { padding-top: 22px; padding-bottom: 21px; }
      h1 { font-size: clamp(42px, 11vh, 64px); }
      .subtitle { margin: 10px auto 14px; font-size: 13px; }
      .controls-hint { margin-top: 11px; }
      .hud { top: 8px; }
      .scoreboard { padding-top: 4px; padding-bottom: 5px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .01ms !important; animation-iteration-count: 1 !important; transition-duration: .01ms !important; }
    }
  </style>
</head>
<body>
  <main class="game-shell" id="gameShell" aria-label="Fruity Fall catching game">
    <canvas id="gameCanvas" aria-label="Falling fruits and basket game area"></canvas>

    <header class="hud" aria-live="polite">
      <div class="brand" aria-label="Fruity Fall">
        <span class="brand-fruit" aria-hidden="true">✦</span>
        <span>Fruity Fall</span>
      </div>
      <div class="scoreboard">
        <span class="score-label">Score</span>
        <span id="score">0</span>
      </div>
      <div class="lives" aria-label="3 chances remaining">
        <svg class="heart" viewBox="0 0 32 29" aria-hidden="true"><path fill="currentColor" d="M16 28S1 19.2 1 9.8C1 3.4 8.8-1.8 16 5.5 23.2-1.8 31 3.4 31 9.8 31 19.2 16 28 16 28Z"/></svg>
        <svg class="heart" viewBox="0 0 32 29" aria-hidden="true"><path fill="currentColor" d="M16 28S1 19.2 1 9.8C1 3.4 8.8-1.8 16 5.5 23.2-1.8 31 3.4 31 9.8 31 19.2 16 28 16 28Z"/></svg>
        <svg class="heart" viewBox="0 0 32 29" aria-hidden="true"><path fill="currentColor" d="M16 28S1 19.2 1 9.8C1 3.4 8.8-1.8 16 5.5 23.2-1.8 31 3.4 31 9.8 31 19.2 16 28 16 28Z"/></svg>
      </div>
    </header>

    <div class="corner-actions">
      <button class="icon-button" id="soundBtn" type="button" aria-label="Mute sound" title="Sound on">
        <svg viewBox="0 0 24 24"><path id="soundIcon" d="M3 9v6h4l5 4V5L7 9H3zm13.5 3a4.5 4.5 0 0 0-2.5-4.03v8.05A4.5 4.5 0 0 0 16.5 12zm-2.5-9v2.06a7 7 0 0 1 0 13.88V21a9 9 0 0 0 0-18z"/></svg>
      </button>
      <button class="icon-button" id="pauseBtn" type="button" aria-label="Pause game" title="Pause">
        <svg viewBox="0 0 24 24"><path id="pauseIcon" d="M6 5h4v14H6zm8 0h4v14h-4z"/></svg>
      </button>
    </div>

    <div class="pause-label" id="pauseLabel">Paused</div>

    <section class="overlay" id="overlay" aria-labelledby="gameTitle">
      <div class="intro-card">
        <div class="eyebrow" id="eyebrow">A basketful of fun</div>
        <h1 id="gameTitle">Fruity<br><span>Fall!</span></h1>
        <p class="subtitle">Scoot your basket, catch the juicy fruit, and don’t let three hit the grass!</p>
        <div class="final-score">Your basket held<strong id="finalScore">0</strong><span id="bestText">fruit!</span></div>
        <button class="play-button" id="playButton" type="button">Let’s catch! <span aria-hidden="true">→</span></button>
        <div class="controls-hint"><span class="key">←</span><span class="key">→</span><span>or move your mouse / finger</span></div>
      </div>
    </section>
  </main>

  <script>
    (() => {
      "use strict";

      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");
      const shell = document.getElementById("gameShell");
      const overlay = document.getElementById("overlay");
      const playButton = document.getElementById("playButton");
      const pauseBtn = document.getElementById("pauseBtn");
      const pauseLabel = document.getElementById("pauseLabel");
      const soundBtn = document.getElementById("soundBtn");
      const scoreEl = document.getElementById("score");
      const finalScoreEl = document.getElementById("finalScore");
      const bestText = document.getElementById("bestText");
      const eyebrow = document.getElementById("eyebrow");
      const hearts = [...document.querySelectorAll(".heart")];
      const livesEl = document.querySelector(".lives");

      let W = 0, H = 0, dpr = 1;
      let state = "ready";
      let score = 0, misses = 0, elapsed = 0, spawnTimer = 0;
      let lastTime = performance.now();
      let shake = 0, catchFlash = 0, basketBounce = 0;
      let fruits = [], particles = [], floaters = [], clouds = [];
      let muted = false, audioCtx = null;
      const keys = { left: false, right: false };
      const basket = { x: 0, targetX: 0, width: 150, height: 62 };
      const fruitKinds = ["apple", "orange", "pear", "strawberry", "watermelon"];

      function resize() {
        const rect = shell.getBoundingClientRect();
        W = rect.width; H = rect.height;
        dpr = Math.min(window.devicePixelRatio || 1, 2);
        canvas.width = Math.round(W * dpr);
        canvas.height = Math.round(H * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        basket.width = Math.max(116, Math.min(170, W * .18));
        basket.height = basket.width * .42;
        if (!basket.x) basket.x = basket.targetX = W / 2;
        basket.x = clamp(basket.x, basket.width / 2, W - basket.width / 2);
        basket.targetX = clamp(basket.targetX, basket.width / 2, W - basket.width / 2);
        createClouds();
      }

      function createClouds() {
        clouds = [
          { x: W*.08, y: H*.19, s: Math.max(.6, W/1000), a: .74 },
          { x: W*.69, y: H*.21, s: Math.max(.65, W/920), a: .63 },
          { x: W*.43, y: H*.35, s: Math.max(.4, W/1500), a: .34 }
        ];
      }

      function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
      function rand(min, max) { return min + Math.random() * (max - min); }

      function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === "suspended") audioCtx.resume();
      }

      function tone(freq, duration, type = "sine", volume = .07, delay = 0) {
        if (muted) return;
        initAudio();
        const t = audioCtx.currentTime + delay;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, t);
        osc.frequency.exponentialRampToValueAtTime(freq * 1.18, t + duration);
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(volume, t + .012);
        gain.gain.exponentialRampToValueAtTime(.001, t + duration);
        osc.connect(gain).connect(audioCtx.destination);
        osc.start(t); osc.stop(t + duration);
      }

      function playCatch() {
        tone(440 + Math.min(score, 16) * 10, .12, "sine", .07);
        tone(670 + Math.min(score, 16) * 12, .16, "triangle", .055, .055);
      }

      function playMiss() { tone(190, .28, "sawtooth", .035); }

      function resetGame() {
        score = 0; misses = 0; elapsed = 0; spawnTimer = .3;
        fruits = []; particles = []; floaters = [];
        basket.x = basket.targetX = W / 2;
        scoreEl.textContent = "0";
        hearts.forEach(h => { h.classList.remove("empty", "lost"); });
        livesEl.setAttribute("aria-label", "3 chances remaining");
        state = "playing";
        overlay.classList.add("hidden");
        overlay.classList.remove("game-over");
        pauseLabel.classList.remove("show");
        playButton.textContent = "Let’s catch! →";
        initAudio();
        tone(330, .12, "triangle", .05);
        tone(440, .14, "triangle", .05, .1);
        tone(660, .18, "triangle", .05, .2);
      }

      function endGame() {
        state = "gameover";
        const stored = Number(localStorage.getItem("fruityFallBest") || 0);
        const isBest = score > stored;
        if (isBest) localStorage.setItem("fruityFallBest", score);
        finalScoreEl.textContent = score;
        bestText.textContent = isBest && score > 0 ? "New best! ⭐" : score === 1 ? "fruit!" : "fruits!";
        eyebrow.textContent = score >= 15 ? "Super catcher!" : score >= 7 ? "Juicy work!" : "Nice try, catcher!";
        playButton.textContent = "Play again! →";
        overlay.classList.add("game-over");
        setTimeout(() => overlay.classList.remove("hidden"), 450);
        tone(320, .16, "triangle", .05);
        tone(245, .2, "triangle", .045, .13);
        tone(190, .28, "triangle", .04, .28);
      }

      function togglePause() {
        if (state === "playing") {
          state = "paused";
          pauseLabel.classList.add("show");
          pauseBtn.setAttribute("aria-label", "Resume game");
          document.getElementById("pauseIcon").setAttribute("d", "M8 5v14l11-7z");
        } else if (state === "paused") {
          state = "playing";
          pauseLabel.classList.remove("show");
          pauseBtn.setAttribute("aria-label", "Pause game");
          document.getElementById("pauseIcon").setAttribute("d", "M6 5h4v14H6zm8 0h4v14h-4z");
          lastTime = performance.now();
        }
      }

      function spawnFruit() {
        const r = clamp(Math.min(W, H) * rand(.041, .054), 29, 45);
        const margin = r + 15;
        let x = rand(margin, W - margin);
        if (Math.abs(x - basket.x) > W * .47 && Math.random() < .5) x = rand(W*.18, W*.82);
        fruits.push({
          x, y: -r - 15, r,
          kind: fruitKinds[Math.floor(Math.random() * fruitKinds.length)],
          speed: rand(145, 205) + elapsed * 4.15,
          rotation: rand(-.35, .35), spin: rand(-1.15, 1.15),
          wobble: rand(0, Math.PI*2), wobbleSpeed: rand(1.2, 2.4),
          scaleX: 1, scaleY: 1
        });
      }

      function catchFruit(f) {
        score++;
        scoreEl.textContent = score;
        scoreEl.classList.remove("pop");
        void scoreEl.offsetWidth;
        scoreEl.classList.add("pop");
        basketBounce = 1;
        catchFlash = 1;
        playCatch();
        const colors = fruitColors(f.kind);
        for (let i = 0; i < 19; i++) {
          const a = rand(Math.PI, Math.PI * 2);
          const sp = rand(80, 270);
          particles.push({ x: f.x, y: f.y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp - 30, life: 1, size: rand(4,10), color: i%4===0 ? "#fff4a8" : colors[0], shape: i%3 });
        }
        floaters.push({ x: f.x, y: f.y - 20, life: 1, text: score % 5 === 0 ? "JUICY! +1" : "+1" });
      }

      function missFruit(f) {
        misses++;
        shake = 1;
        playMiss();
        const heart = hearts[misses - 1];
        if (heart) { heart.classList.add("lost"); setTimeout(() => heart.classList.add("empty"), 450); }
        const left = Math.max(0, 3 - misses);
        livesEl.setAttribute("aria-label", `${left} chance${left === 1 ? "" : "s"} remaining`);
        for (let i = 0; i < 12; i++) particles.push({ x: f.x, y: H*.86, vx: rand(-130,130), vy: rand(-150,-45), life: 1, size: rand(3,8), color: "#7eaa4f", shape: 1 });
        if (misses >= 3) endGame();
      }

      function fruitColors(kind) {
        return {
          apple: ["#f34c45", "#bd2933"], orange: ["#ff9838", "#dc5a2a"],
          pear: ["#aedc46", "#65aa48"], strawberry: ["#ff4d62", "#c92e47"],
          watermelon: ["#53bd64", "#23884c"]
        }[kind];
      }

      function update(dt) {
        if (state !== "playing") return;
        elapsed += dt;
        const moveSpeed = Math.max(430, W * .68);
        if (keys.left) basket.targetX -= moveSpeed * dt;
        if (keys.right) basket.targetX += moveSpeed * dt;
        basket.targetX = clamp(basket.targetX, basket.width/2 + 5, W - basket.width/2 - 5);
        basket.x += (basket.targetX - basket.x) * Math.min(1, dt * 13);
        basketBounce = Math.max(0, basketBounce - dt * 5.2);
        shake = Math.max(0, shake - dt * 3.8);
        catchFlash = Math.max(0, catchFlash - dt * 4);

        spawnTimer -= dt;
        if (spawnTimer <= 0) {
          spawnFruit();
          const interval = Math.max(.43, 1.02 - elapsed * .008);
          spawnTimer = interval * rand(.8, 1.17);
        }

        const basketTop = H - Math.max(63, H*.085) - basket.height*.48;
        for (let i = fruits.length - 1; i >= 0; i--) {
          const f = fruits[i];
          f.y += f.speed * dt;
          f.rotation += f.spin * dt;
          f.wobble += f.wobbleSpeed * dt;
          f.x += Math.sin(f.wobble) * 14 * dt;
          const withinX = f.x + f.r*.62 > basket.x - basket.width*.48 && f.x - f.r*.62 < basket.x + basket.width*.48;
          const touchingTop = f.y + f.r*.65 >= basketTop && f.y < basketTop + basket.height*.38;
          if (withinX && touchingTop) {
            catchFruit(f); fruits.splice(i, 1);
          } else if (f.y - f.r > H*.91) {
            missFruit(f); fruits.splice(i, 1);
            if (state === "gameover") break;
          }
        }

        particles.forEach(p => { p.x += p.vx*dt; p.y += p.vy*dt; p.vy += 330*dt; p.vx *= .985; p.life -= dt*1.35; });
        particles = particles.filter(p => p.life > 0);
        floaters.forEach(f => { f.y -= 55*dt; f.life -= dt*1.25; });
        floaters = floaters.filter(f => f.life > 0);
      }

      function roundedRect(x, y, w, h, r) {
        ctx.beginPath();
        ctx.roundRect(x, y, w, h, r);
      }

      function drawBackground(t) {
        const sky = ctx.createLinearGradient(0,0,0,H);
        sky.addColorStop(0, "#54c9ef"); sky.addColorStop(.72, "#b9edf5"); sky.addColorStop(1, "#e8f6d0");
        ctx.fillStyle = sky; ctx.fillRect(0,0,W,H);

        ctx.save(); ctx.globalAlpha = .84;
        ctx.fillStyle = "#fff5bb"; ctx.beginPath(); ctx.arc(W*.12, H*.16, Math.max(35,W*.055), 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = .18; ctx.beginPath(); ctx.arc(W*.12, H*.16, Math.max(55,W*.085), 0, Math.PI*2); ctx.fill();
        ctx.restore();

        clouds.forEach((c, i) => drawCloud(c.x + Math.sin(t*.00008+i)*8, c.y, c.s, c.a));

        const horizon = H*.69;
        ctx.fillStyle = "#85ce58";
        ctx.beginPath(); ctx.moveTo(0,horizon+20);
        ctx.quadraticCurveTo(W*.22,horizon-60,W*.45,horizon+4);
        ctx.quadraticCurveTo(W*.72,horizon-55,W,horizon+12);
        ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.closePath(); ctx.fill();

        ctx.fillStyle = "#51ae4d";
        ctx.beginPath(); ctx.moveTo(0,horizon+70);
        ctx.quadraticCurveTo(W*.3,horizon+10,W*.55,horizon+58);
        ctx.quadraticCurveTo(W*.77,horizon+13,W,horizon+48);
        ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.fill();

        drawTree(-W*.02, H*.42, Math.max(.68,W/950));
        drawTree(W*.88, H*.45, Math.max(.62,W/1050));

        ctx.fillStyle = "rgba(38,111,60,.24)";
        for (let i=0;i<18;i++) {
          const x = (i*83 + 41) % (W+70) - 35;
          const y = H*.86 + (i%4)*12;
          ctx.beginPath(); ctx.ellipse(x,y,10+(i%3)*3,3,0,0,Math.PI*2); ctx.fill();
        }
      }

      function drawCloud(x,y,s,a) {
        ctx.save(); ctx.globalAlpha = a; ctx.fillStyle = "#fff";
        ctx.beginPath(); ctx.ellipse(x,y,55*s,22*s,0,0,Math.PI*2); ctx.ellipse(x-35*s,y+3*s,30*s,17*s,0,0,Math.PI*2); ctx.ellipse(x+35*s,y+4*s,35*s,18*s,0,0,Math.PI*2); ctx.ellipse(x-5*s,y-14*s,31*s,25*s,0,0,Math.PI*2); ctx.fill();
        ctx.restore();
      }

      function drawTree(x,y,s) {
        ctx.save(); ctx.translate(x,y); ctx.scale(s,s);
        ctx.fillStyle = "#87512f"; roundedRect(52,90,34,210,14); ctx.fill();
        ctx.fillStyle = "#3d9d4d";
        [[15,80,74],[73,58,82],[126,96,70],[54,125,82]].forEach(([a,b,r]) => { ctx.beginPath(); ctx.arc(a,b,r,0,Math.PI*2); ctx.fill(); });
        [[20,85],[96,47],[140,105],[67,131]].forEach(([a,b],i) => { ctx.fillStyle = i%2 ? "#ff9540" : "#f35a45"; ctx.beginPath(); ctx.arc(a,b,10,0,Math.PI*2); ctx.fill(); });
        ctx.restore();
      }

      function drawFruit(f) {
        ctx.save();
        ctx.translate(f.x, f.y);
        ctx.rotate(f.rotation);
        const r = f.r;
        ctx.shadowColor = "rgba(44,71,48,.2)"; ctx.shadowBlur = 8; ctx.shadowOffsetY = 7;
        const [main, dark] = fruitColors(f.kind);
        if (f.kind === "apple") {
          ctx.fillStyle = main; ctx.beginPath();
          ctx.moveTo(0,-r*.58); ctx.bezierCurveTo(-r*.84,-r*.92,-r*1.05,-r*.12,-r*.76,r*.47); ctx.bezierCurveTo(-r*.48,r*1.03,-r*.13,r*.83,0,r*.72); ctx.bezierCurveTo(r*.15,r*.84,r*.52,r*1.01,r*.78,r*.42); ctx.bezierCurveTo(r*1.05,-r*.19,r*.78,-r*.91,0,-r*.58); ctx.fill();
          drawLeafStem(r);
        } else if (f.kind === "orange") {
          ctx.fillStyle = main; ctx.beginPath(); ctx.arc(0,0,r*.86,0,Math.PI*2); ctx.fill();
          ctx.fillStyle = "rgba(255,228,117,.45)"; for(let i=0;i<7;i++){ const a=i*2.4; ctx.beginPath();ctx.arc(Math.cos(a)*r*.55,Math.sin(a)*r*.55,1.5,0,Math.PI*2);ctx.fill(); }
          drawLeafStem(r*.8);
        } else if (f.kind === "pear") {
          ctx.fillStyle = main; ctx.beginPath(); ctx.moveTo(0,-r*.82); ctx.bezierCurveTo(-r*.08,-r*.42,-r*.8,-r*.16,-r*.78,r*.45); ctx.bezierCurveTo(-r*.76,r*1.05,r*.76,r*1.05,r*.78,r*.45); ctx.bezierCurveTo(r*.8,-r*.15,r*.1,-r*.43,0,-r*.82); ctx.fill(); drawLeafStem(r);
        } else if (f.kind === "strawberry") {
          ctx.fillStyle = main; ctx.beginPath(); ctx.moveTo(-r*.8,-r*.5); ctx.quadraticCurveTo(-r*.82,r*.28,0,r*.95); ctx.quadraticCurveTo(r*.82,r*.28,r*.8,-r*.5); ctx.quadraticCurveTo(0,-r*.82,-r*.8,-r*.5); ctx.fill();
          ctx.fillStyle = "#ffe37b"; [[-.38,-.2],[.1,-.28],[.42,.02],[-.25,.25],[.12,.43]].forEach(([x,y])=>{ctx.beginPath();ctx.ellipse(x*r,y*r,2.2,3.7,.25,0,Math.PI*2);ctx.fill();});
          ctx.fillStyle="#48a94e"; for(let i=0;i<5;i++){ctx.save();ctx.rotate(i*Math.PI*.4);ctx.beginPath();ctx.ellipse(0,-r*.56,r*.17,r*.38,0,0,Math.PI*2);ctx.fill();ctx.restore();}
        } else {
          ctx.fillStyle = main; ctx.beginPath(); ctx.arc(0,0,r*.89,0,Math.PI*2); ctx.fill();
          ctx.strokeStyle = dark; ctx.lineWidth = r*.11; for(let i=-2;i<=2;i++){ctx.beginPath();ctx.moveTo(i*r*.25,-r*.75);ctx.quadraticCurveTo(i*r*.43,0,i*r*.25,r*.75);ctx.stroke();}
        }
        ctx.shadowColor = "transparent";
        ctx.fillStyle = "rgba(255,255,255,.35)"; ctx.beginPath(); ctx.ellipse(-r*.31,-r*.28,r*.16,r*.26,-.55,0,Math.PI*2); ctx.fill();
        ctx.restore();
      }

      function drawLeafStem(r) {
        ctx.strokeStyle="#714528";ctx.lineWidth=Math.max(4,r*.11);ctx.lineCap="round";ctx.beginPath();ctx.moveTo(0,-r*.56);ctx.quadraticCurveTo(-r*.08,-r*.95,r*.1,-r*1.08);ctx.stroke();
        ctx.fillStyle="#3ba354";ctx.beginPath();ctx.ellipse(r*.29,-r*.88,r*.29,r*.13,-.42,0,Math.PI*2);ctx.fill();
      }

      function drawBasket() {
        const x = basket.x, ground = H - Math.max(35,H*.045), w=basket.width, h=basket.height;
        const bounce = Math.sin(basketBounce*Math.PI) * 8;
        ctx.save(); ctx.translate(x, ground-bounce);
        ctx.fillStyle="rgba(33,96,49,.23)";ctx.beginPath();ctx.ellipse(0,8,w*.58,9,0,0,Math.PI*2);ctx.fill();
        ctx.strokeStyle="#754127";ctx.lineWidth=Math.max(8,w*.075);ctx.lineCap="round";ctx.beginPath();ctx.arc(0,-h*.53,w*.38,Math.PI,0);ctx.stroke();
        ctx.strokeStyle="#d99143";ctx.lineWidth=Math.max(3,w*.025);ctx.beginPath();ctx.arc(0,-h*.53,w*.38,Math.PI,0);ctx.stroke();
        const grad=ctx.createLinearGradient(0,-h,0,0);grad.addColorStop(0,"#f4ad50");grad.addColorStop(1,"#b86632");
        ctx.fillStyle=grad;ctx.beginPath();ctx.moveTo(-w*.52,-h*.55);ctx.quadraticCurveTo(-w*.45,-h*.03,-w*.32,0);ctx.quadraticCurveTo(0,h*.12,w*.32,0);ctx.quadraticCurveTo(w*.45,-h*.03,w*.52,-h*.55);ctx.closePath();ctx.fill();
        ctx.strokeStyle="#814524";ctx.lineWidth=Math.max(3,w*.027);ctx.lineCap="round";
        [-.28,-.08,.12,.32].forEach(v=>{ctx.beginPath();ctx.moveTo(v*w,-h*.48);ctx.lineTo(v*w*.78,-h*.03);ctx.stroke();});
        [-.37,-.17].forEach(v=>{ctx.beginPath();ctx.moveTo(-w*.46,v*h);ctx.quadraticCurveTo(0,(v+.11)*h,w*.46,v*h);ctx.stroke();});
        ctx.fillStyle="#8e4c29";roundedRect(-w*.57,-h*.65,w*1.14,h*.19,h*.1);ctx.fill();
        ctx.fillStyle="#f4ad50";roundedRect(-w*.54,-h*.62,w*1.08,h*.09,h*.05);ctx.fill();
        ctx.restore();
      }

      function drawParticles() {
        particles.forEach(p=>{ctx.save();ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.color;ctx.translate(p.x,p.y);ctx.rotate(p.x*.03);if(p.shape===0){ctx.beginPath();ctx.arc(0,0,p.size*.6,0,Math.PI*2);ctx.fill();}else{roundedRect(-p.size/2,-p.size/2,p.size,p.size,p.size*.3);ctx.fill();}ctx.restore();});
        floaters.forEach(f=>{ctx.save();ctx.globalAlpha=Math.min(1,f.life*2);ctx.fillStyle="#fff";ctx.strokeStyle="#da6638";ctx.lineWidth=5;ctx.font=`900 ${f.text.length>3?24:31}px 'Baloo 2', sans-serif`;ctx.textAlign="center";ctx.strokeText(f.text,f.x,f.y);ctx.fillText(f.text,f.x,f.y);ctx.restore();});
      }

      function draw(t) {
        ctx.save();
        if (shake > 0) ctx.translate(rand(-7,7)*shake, rand(-5,5)*shake);
        drawBackground(t);
        fruits.forEach(drawFruit);
        drawParticles();
        drawBasket();
        if (catchFlash > 0) { ctx.fillStyle=`rgba(255,246,166,${catchFlash*.1})`;ctx.fillRect(0,0,W,H); }
        ctx.restore();
      }

      function frame(now) {
        const dt = Math.min(.032, (now-lastTime)/1000 || 0);
        lastTime = now;
        update(dt); draw(now);
        requestAnimationFrame(frame);
      }

      function pointerMove(e) {
        const rect = canvas.getBoundingClientRect();
        basket.targetX = clamp(e.clientX - rect.left, basket.width/2+5, W-basket.width/2-5);
      }

      shell.addEventListener("pointermove", pointerMove);
      shell.addEventListener("pointerdown", e => { if (state === "playing") pointerMove(e); });
      playButton.addEventListener("click", resetGame);
      pauseBtn.addEventListener("click", togglePause);
      soundBtn.addEventListener("click", () => {
        muted = !muted;
        soundBtn.setAttribute("aria-label", muted ? "Turn sound on" : "Mute sound");
        soundBtn.title = muted ? "Sound off" : "Sound on";
        document.getElementById("soundIcon").setAttribute("d", muted ? "M3 9v6h4l5 4V5L7 9H3zm13.6 3 3.2-3.2-1.4-1.4-3.2 3.2L12 7.4 10.6 8.8l3.2 3.2-3.2 3.2 1.4 1.4 3.2-3.2 3.2 3.2 1.4-1.4-3.2-3.2z" : "M3 9v6h4l5 4V5L7 9H3zm13.5 3a4.5 4.5 0 0 0-2.5-4.03v8.05A4.5 4.5 0 0 0 16.5 12zm-2.5-9v2.06a7 7 0 0 1 0 13.88V21a9 9 0 0 0 0-18z");
      });

      window.addEventListener("keydown", e => {
        if (["ArrowLeft","ArrowRight"," ","a","d","A","D","p","P"].includes(e.key)) e.preventDefault();
        if (e.key === "ArrowLeft" || e.key.toLowerCase() === "a") keys.left = true;
        if (e.key === "ArrowRight" || e.key.toLowerCase() === "d") keys.right = true;
        if ((e.key === "p" || e.key === "P") && !e.repeat) togglePause();
        if (e.key === " " && !e.repeat && (state === "ready" || state === "gameover")) resetGame();
      });
      window.addEventListener("keyup", e => {
        if (e.key === "ArrowLeft" || e.key.toLowerCase() === "a") keys.left = false;
        if (e.key === "ArrowRight" || e.key.toLowerCase() === "d") keys.right = false;
      });
      window.addEventListener("resize", resize);
      document.addEventListener("visibilitychange", () => { if (document.hidden && state === "playing") togglePause(); });

      resize();
      requestAnimationFrame(frame);
    })();
  </script>
</body>
</html>
