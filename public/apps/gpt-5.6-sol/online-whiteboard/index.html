<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#f7f4ec" />
  <title>Online Whiteboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #f8f6ef;
      --ink: #191a18;
      --muted: #77776f;
      --line: rgba(25, 26, 24, .12);
      --accent: #ff6047;
      --panel: rgba(255, 254, 249, .92);
      --shadow: 0 14px 42px rgba(45, 42, 31, .12), 0 3px 10px rgba(45, 42, 31, .08);
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--paper);
      color: var(--ink);
      font-family: "Manrope", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body { touch-action: none; }

    button, input { font: inherit; }

    button {
      color: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      position: relative;
      width: 100%;
      height: 100%;
      isolation: isolate;
      background-color: var(--paper);
      background-image: radial-gradient(circle, rgba(37, 38, 34, .13) 1px, transparent 1.2px);
      background-size: 24px 24px;
      transition: background-image .25s ease;
    }

    .app.grid-off { background-image: none; }

    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      cursor: none;
      touch-action: none;
      z-index: 1;
    }

    .topbar {
      position: absolute;
      z-index: 5;
      top: 0;
      left: 0;
      right: 0;
      height: 82px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      pointer-events: none;
      background: linear-gradient(to bottom, rgba(248,246,239,.92), rgba(248,246,239,0));
    }

    .brand, .status-cluster { pointer-events: auto; }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      user-select: none;
    }

    .brand-mark {
      position: relative;
      width: 35px;
      height: 35px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: var(--ink);
      color: #fffdf6;
      transform: rotate(-5deg);
      box-shadow: 0 3px 0 rgba(25,26,24,.15);
    }

    .brand-mark::after {
      content: "";
      position: absolute;
      right: -3px;
      top: -2px;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--paper);
    }

    .brand-mark svg { width: 19px; height: 19px; }

    .brand-copy { display: flex; flex-direction: column; gap: 1px; }

    .brand h1 {
      margin: 0;
      font-size: 15px;
      line-height: 1.1;
      font-weight: 700;
      letter-spacing: -.03em;
    }

    .brand p {
      margin: 0;
      font: 500 9px/1.2 "DM Mono", monospace;
      color: var(--muted);
      letter-spacing: .11em;
      text-transform: uppercase;
    }

    .status-cluster {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .save-state {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 7px 10px;
      border: 1px solid var(--line);
      border-radius: 99px;
      background: rgba(255,254,249,.68);
      color: var(--muted);
      font: 500 10px/1 "DM Mono", monospace;
      backdrop-filter: blur(10px);
    }

    .save-state::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #3faa78;
      box-shadow: 0 0 0 3px rgba(63,170,120,.12);
    }

    .icon-button, .tool-button, .action-button, .download-button {
      border: 0;
      outline: none;
      cursor: pointer;
      transition: transform .16s ease, background .16s ease, color .16s ease, opacity .16s ease;
    }

    .icon-button:focus-visible, .tool-button:focus-visible, .action-button:focus-visible,
    .download-button:focus-visible, .swatch:focus-visible, .color-input:focus-visible, input[type="range"]:focus-visible {
      outline: 3px solid rgba(255,96,71,.28);
      outline-offset: 2px;
    }

    .icon-button {
      position: relative;
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 50%;
      background: rgba(255,254,249,.76);
      backdrop-filter: blur(10px);
    }

    .icon-button:hover { background: #fffefa; transform: translateY(-1px); }
    .icon-button svg { width: 16px; height: 16px; }
    .icon-button.active { background: var(--ink); color: white; }

    .toolbar-wrap {
      position: absolute;
      z-index: 10;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      width: min(calc(100vw - 32px), 1040px);
      display: flex;
      justify-content: center;
      pointer-events: none;
    }

    .toolbar {
      pointer-events: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      border: 1px solid rgba(25,26,24,.11);
      border-radius: 18px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px) saturate(130%);
      animation: toolbar-in .55s cubic-bezier(.2,.8,.2,1) both;
    }

    @keyframes toolbar-in {
      from { opacity: 0; transform: translateY(14px) scale(.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .group {
      display: flex;
      align-items: center;
      gap: 4px;
      min-height: 44px;
    }

    .divider {
      width: 1px;
      height: 30px;
      margin: 0 3px;
      background: var(--line);
    }

    .tool-button {
      position: relative;
      min-width: 48px;
      height: 44px;
      padding: 0 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      border-radius: 11px;
      background: transparent;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: -.01em;
    }

    .tool-button svg { width: 18px; height: 18px; flex: none; }
    .tool-button:hover { background: rgba(25,26,24,.055); }
    .tool-button.active { background: var(--ink); color: #fff; }
    .tool-button.active::after {
      content: "";
      position: absolute;
      top: 5px;
      right: 5px;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
    }

    .colors { padding: 0 4px; gap: 7px; }

    .swatch, .color-input {
      width: 24px;
      height: 24px;
      flex: none;
      padding: 0;
      border: 0;
      border-radius: 50%;
      cursor: pointer;
      transition: transform .16s ease, box-shadow .16s ease;
    }

    .swatch {
      background: var(--color);
      box-shadow: inset 0 0 0 1px rgba(25,26,24,.12);
    }

    .swatch:hover { transform: scale(1.12); }
    .swatch.active { box-shadow: 0 0 0 2px #fff, 0 0 0 4px var(--ink); transform: scale(.9); }

    .color-input {
      position: relative;
      appearance: none;
      -webkit-appearance: none;
      overflow: hidden;
      background: conic-gradient(#ff5a47, #f6cc45, #4ca97d, #3f78d4, #9d5bd2, #ff5a47);
      box-shadow: inset 0 0 0 2px rgba(255,255,255,.75), 0 0 0 1px rgba(25,26,24,.15);
    }

    .color-input::-webkit-color-swatch-wrapper { padding: 0; }
    .color-input::-webkit-color-swatch { border: 0; opacity: 0; }
    .color-input::-moz-color-swatch { border: 0; opacity: 0; }

    .size-control {
      width: 118px;
      padding: 0 8px;
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .size-dot {
      width: 6px;
      height: 6px;
      flex: none;
      border-radius: 50%;
      background: currentColor;
      transition: width .12s, height .12s;
    }

    input[type="range"] {
      width: 78px;
      height: 18px;
      margin: 0;
      appearance: none;
      -webkit-appearance: none;
      background: transparent;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-runnable-track {
      height: 3px;
      border-radius: 3px;
      background: #d9d7cf;
    }

    input[type="range"]::-webkit-slider-thumb {
      width: 14px;
      height: 14px;
      margin-top: -5.5px;
      appearance: none;
      -webkit-appearance: none;
      border: 3px solid #fffefa;
      border-radius: 50%;
      background: var(--ink);
      box-shadow: 0 0 0 1px rgba(25,26,24,.22);
    }

    input[type="range"]::-moz-range-track { height: 3px; border: 0; border-radius: 3px; background: #d9d7cf; }
    input[type="range"]::-moz-range-thumb { width: 10px; height: 10px; border: 3px solid #fffefa; border-radius: 50%; background: var(--ink); }

    .action-button {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 10px;
      background: transparent;
    }

    .action-button svg { width: 17px; height: 17px; }
    .action-button:hover:not(:disabled) { background: rgba(25,26,24,.06); transform: translateY(-1px); }
    .action-button:disabled { opacity: .25; cursor: default; }
    .action-button.danger:hover:not(:disabled) { color: #df4834; background: rgba(255,96,71,.1); }

    .download-button {
      height: 44px;
      padding: 0 15px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-radius: 11px;
      background: var(--accent);
      color: #1f1714;
      box-shadow: inset 0 -2px 0 rgba(133,33,19,.18);
      font-size: 11px;
      font-weight: 800;
    }

    .download-button svg { width: 17px; height: 17px; }
    .download-button:hover { transform: translateY(-2px); background: #ff6a53; }
    .download-button:active { transform: translateY(0); }

    .cursor-preview {
      position: fixed;
      z-index: 20;
      top: 0;
      left: 0;
      width: 10px;
      height: 10px;
      border: 1.5px solid var(--ink);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      opacity: 0;
      mix-blend-mode: multiply;
      transition: width .1s ease, height .1s ease, opacity .12s ease, border-color .12s ease;
    }

    .cursor-preview.visible { opacity: .68; }
    .cursor-preview.eraser { background: rgba(255,255,255,.75); border-style: dashed; }

    .empty-state {
      position: absolute;
      z-index: 0;
      left: 50%;
      top: 46%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: rgba(25,26,24,.34);
      text-align: center;
      user-select: none;
      pointer-events: none;
      transition: opacity .35s ease, transform .35s ease;
    }

    .empty-state.hidden { opacity: 0; transform: translate(-50%, -44%); }
    .empty-state svg { width: 42px; height: 42px; margin-bottom: 3px; color: var(--accent); opacity: .75; }
    .empty-state strong { color: rgba(25,26,24,.47); font-size: 14px; letter-spacing: -.02em; }
    .empty-state span { font: 400 10px/1.5 "DM Mono", monospace; }

    .toast {
      position: fixed;
      z-index: 30;
      left: 50%;
      top: 22px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 13px;
      border-radius: 10px;
      background: var(--ink);
      color: white;
      box-shadow: 0 8px 24px rgba(25,26,24,.18);
      font: 500 11px/1 "DM Mono", monospace;
      transform: translate(-50%, -16px);
      opacity: 0;
      pointer-events: none;
      transition: transform .25s ease, opacity .25s ease;
    }

    .toast.show { transform: translate(-50%, 0); opacity: 1; }
    .toast svg { width: 15px; height: 15px; color: var(--accent); }

    [data-tooltip]::before {
      content: attr(data-tooltip);
      position: absolute;
      left: 50%;
      bottom: calc(100% + 11px);
      transform: translate(-50%, 4px);
      padding: 6px 8px;
      border-radius: 6px;
      background: var(--ink);
      color: white;
      white-space: nowrap;
      font: 500 9px/1 "DM Mono", monospace;
      opacity: 0;
      pointer-events: none;
      transition: .16s ease;
    }

    [data-tooltip]:hover::before { opacity: 1; transform: translate(-50%, 0); }
    .topbar [data-tooltip]::before { top: calc(100% + 8px); bottom: auto; }

    @media (max-width: 850px) {
      .tool-label { display: none; }
      .tool-button { min-width: 42px; padding: 0 8px; }
      .size-control { width: 102px; padding: 0 4px; }
      .size-control input { width: 68px; }
      .download-button span { display: none; }
      .download-button { width: 44px; padding: 0; }
    }

    @media (max-width: 680px) {
      .topbar { height: 68px; padding: 0 16px; }
      .brand-copy p, .save-state { display: none; }
      .toolbar-wrap { bottom: max(12px, env(safe-area-inset-bottom)); width: calc(100vw - 20px); }
      .toolbar { width: 100%; justify-content: space-between; gap: 2px; padding: 6px; border-radius: 16px; overflow: visible; }
      .group { gap: 2px; }
      .colors .swatch:nth-of-type(3), .colors .swatch:nth-of-type(4) { display: none; }
      .colors { gap: 6px; }
      .size-control { width: 75px; gap: 6px; padding: 0 2px; }
      .size-control input { width: 57px; }
      .action-button { width: 34px; }
      .divider { margin: 0 1px; }
    }

    @media (max-width: 440px) {
      .colors .swatch:nth-of-type(2) { display: none; }
      .size-control { display: none; }
      .divider:nth-of-type(3) { display: none; }
      .tool-button { min-width: 38px; height: 40px; padding: 0 7px; }
      .action-button { width: 32px; height: 36px; }
      .download-button { width: 40px; height: 40px; }
      .toolbar { min-width: 0; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .01ms !important; animation-iteration-count: 1 !important; transition-duration: .01ms !important; }
    }
  </style>
</head>
<body>
  <main class="app" id="app" aria-label="Online Whiteboard drawing area">
    <canvas id="canvas" aria-label="Whiteboard canvas. Draw using a pointer or touch."></canvas>

    <header class="topbar">
      <div class="brand" aria-label="Online Whiteboard">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none"><path d="M5 16.5c3-6.5 5.5 3 8-5s4 1 6-4" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </span>
        <span class="brand-copy">
          <h1>Online Whiteboard</h1>
          <p>Your local canvas</p>
        </span>
      </div>

      <div class="status-cluster">
        <span class="save-state" id="saveState">Saved locally</span>
        <button class="icon-button active" id="gridButton" aria-label="Toggle dot grid" aria-pressed="true" data-tooltip="Dot grid (G)">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><circle cx="6" cy="6" r="1.4"/><circle cx="12" cy="6" r="1.4"/><circle cx="18" cy="6" r="1.4"/><circle cx="6" cy="12" r="1.4"/><circle cx="12" cy="12" r="1.4"/><circle cx="18" cy="12" r="1.4"/><circle cx="6" cy="18" r="1.4"/><circle cx="12" cy="18" r="1.4"/><circle cx="18" cy="18" r="1.4"/></svg>
        </button>
      </div>
    </header>

    <div class="empty-state" id="emptyState" aria-hidden="true">
      <svg viewBox="0 0 48 48" fill="none"><path d="M10 34c6-18 12 9 18-10 3-9 6-7 10-11" stroke="currentColor" stroke-width="3" stroke-linecap="round"/><path d="M35 11l4-1-1 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <strong>Make your first mark</strong>
      <span>Drag anywhere to draw · P for pen</span>
    </div>

    <section class="toolbar-wrap" aria-label="Drawing controls">
      <div class="toolbar">
        <div class="group" role="group" aria-label="Tools">
          <button class="tool-button active" data-tool="pen" aria-label="Pen tool" aria-pressed="true" data-tooltip="Pen (P)">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M14.7 5.3l4 4M5 19l3.2-.6L18.4 8.2a2.1 2.1 0 0 0 0-3l-.6-.6a2.1 2.1 0 0 0-3 0L4.6 14.8 4 18z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span class="tool-label">Pen</span>
          </button>
          <button class="tool-button" data-tool="marker" aria-label="Highlighter tool" aria-pressed="false" data-tooltip="Highlighter (H)">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M6.5 14.5L14.8 6a2 2 0 0 1 2.8 0l.4.4a2 2 0 0 1 0 2.8l-8.4 8.3M5 14l5 5M4 20h8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span class="tool-label">Mark</span>
          </button>
          <button class="tool-button" data-tool="eraser" aria-label="Eraser tool" aria-pressed="false" data-tooltip="Eraser (E)">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M4.8 15.2l8.8-9a2 2 0 0 1 2.8 0l2.4 2.3a2 2 0 0 1 0 2.8L11.2 19H8l-3.2-3.2a.4.4 0 0 1 0-.6zM13.5 16.5L8.2 11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M11 19h9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            <span class="tool-label">Erase</span>
          </button>
        </div>

        <span class="divider" aria-hidden="true"></span>

        <div class="group colors" role="group" aria-label="Ink color">
          <button class="swatch active" style="--color:#1d1e1b" data-color="#1d1e1b" aria-label="Black ink" aria-pressed="true"></button>
          <button class="swatch" style="--color:#ff6047" data-color="#ff6047" aria-label="Coral ink" aria-pressed="false"></button>
          <button class="swatch" style="--color:#2f6bd3" data-color="#2f6bd3" aria-label="Blue ink" aria-pressed="false"></button>
          <button class="swatch" style="--color:#32a174" data-color="#32a174" aria-label="Green ink" aria-pressed="false"></button>
          <input class="color-input" id="colorInput" type="color" value="#1d1e1b" aria-label="Custom ink color" />
        </div>

        <span class="divider" aria-hidden="true"></span>

        <label class="size-control" aria-label="Brush size">
          <span class="size-dot" id="sizeDot" aria-hidden="true"></span>
          <input type="range" id="sizeRange" min="2" max="32" step="1" value="5" aria-label="Brush size" />
        </label>

        <span class="divider" aria-hidden="true"></span>

        <div class="group" role="group" aria-label="Edit actions">
          <button class="action-button" id="undoButton" aria-label="Undo" data-tooltip="Undo (⌘Z)" disabled>
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M9 7l-5 4 5 4M5 11h8a6 6 0 0 1 6 6" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <button class="action-button" id="redoButton" aria-label="Redo" data-tooltip="Redo (⇧⌘Z)" disabled>
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M15 7l5 4-5 4M19 11h-8a6 6 0 0 0-6 6" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <button class="action-button danger" id="clearButton" aria-label="Clear canvas" data-tooltip="Clear canvas" disabled>
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 7h14M9 7V4h6v3M8 10v7M12 10v7M16 10v7M7 7l1 13h8l1-13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>

        <button class="download-button" id="downloadButton" aria-label="Save whiteboard as PNG">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 4v11M8 11l4 4 4-4M5 19h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>Save PNG</span>
        </button>
      </div>
    </section>

    <div class="cursor-preview" id="cursorPreview" aria-hidden="true"></div>
    <div class="toast" id="toast" role="status" aria-live="polite">
      <svg viewBox="0 0 24 24" fill="none"><path d="M5 12.5l4 4L19 7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span id="toastText">Saved</span>
    </div>
  </main>

  <script>
    (() => {
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d', { alpha: true });
      const app = document.getElementById('app');
      const emptyState = document.getElementById('emptyState');
      const cursor = document.getElementById('cursorPreview');
      const sizeRange = document.getElementById('sizeRange');
      const sizeDot = document.getElementById('sizeDot');
      const colorInput = document.getElementById('colorInput');
      const undoButton = document.getElementById('undoButton');
      const redoButton = document.getElementById('redoButton');
      const clearButton = document.getElementById('clearButton');
      const downloadButton = document.getElementById('downloadButton');
      const gridButton = document.getElementById('gridButton');
      const saveState = document.getElementById('saveState');
      const toast = document.getElementById('toast');
      const toastText = document.getElementById('toastText');

      const STORAGE_KEY = 'online-whiteboard-v1';
      const state = {
        tool: 'pen',
        color: '#1d1e1b',
        size: 5,
        strokes: [],
        undo: [],
        redo: [],
        drawing: false,
        currentStroke: null,
        dpr: Math.min(window.devicePixelRatio || 1, 2),
        grid: true
      };

      const deepCopy = value => JSON.parse(JSON.stringify(value));

      function resizeCanvas() {
        state.dpr = Math.min(window.devicePixelRatio || 1, 2);
        const rect = canvas.getBoundingClientRect();
        canvas.width = Math.round(rect.width * state.dpr);
        canvas.height = Math.round(rect.height * state.dpr);
        ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);
        redraw();
      }

      function renderStroke(stroke) {
        const points = stroke.points;
        if (!points.length) return;

        ctx.save();
        ctx.globalCompositeOperation = stroke.tool === 'eraser' ? 'destination-out' : 'source-over';
        ctx.strokeStyle = stroke.tool === 'marker' ? hexToRgba(stroke.color, .28) : stroke.color;
        ctx.fillStyle = ctx.strokeStyle;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        const baseSize = stroke.tool === 'marker' ? stroke.size * 2.8 : stroke.tool === 'eraser' ? stroke.size * 2.3 : stroke.size;

        if (points.length === 1) {
          const pressure = points[0].p || .5;
          const radius = Math.max(1, baseSize * (.72 + pressure * .28) / 2);
          ctx.beginPath();
          ctx.arc(points[0].x, points[0].y, radius, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
          return;
        }

        ctx.beginPath();
        ctx.moveTo(points[0].x, points[0].y);
        for (let i = 1; i < points.length - 1; i++) {
          const midX = (points[i].x + points[i + 1].x) / 2;
          const midY = (points[i].y + points[i + 1].y) / 2;
          ctx.quadraticCurveTo(points[i].x, points[i].y, midX, midY);
        }
        const last = points[points.length - 1];
        ctx.lineTo(last.x, last.y);
        const avgPressure = points.reduce((sum, p) => sum + (p.p || .5), 0) / points.length;
        ctx.lineWidth = Math.max(1, baseSize * (.78 + avgPressure * .22));
        ctx.stroke();
        ctx.restore();
      }

      function redraw() {
        const width = canvas.width / state.dpr;
        const height = canvas.height / state.dpr;
        ctx.clearRect(0, 0, width, height);
        state.strokes.forEach(renderStroke);
        if (state.currentStroke) renderStroke(state.currentStroke);
        updateUI();
      }

      function hexToRgba(hex, alpha) {
        const value = hex.replace('#', '');
        const full = value.length === 3 ? value.split('').map(x => x + x).join('') : value;
        const number = parseInt(full, 16);
        return `rgba(${number >> 16}, ${(number >> 8) & 255}, ${number & 255}, ${alpha})`;
      }

      function pointerPoint(event) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: event.clientX - rect.left,
          y: event.clientY - rect.top,
          p: event.pointerType === 'pen' ? Math.max(.15, event.pressure) : .5
        };
      }

      function beginStroke(event) {
        if (event.button !== undefined && event.button !== 0 && event.pointerType === 'mouse') return;
        event.preventDefault();
        canvas.setPointerCapture(event.pointerId);
        state.drawing = true;
        state.currentStroke = {
          tool: state.tool,
          color: state.color,
          size: state.size,
          points: [pointerPoint(event)]
        };
        redraw();
      }

      function moveStroke(event) {
        moveCursor(event);
        if (!state.drawing || !state.currentStroke) return;
        event.preventDefault();
        const next = pointerPoint(event);
        const previous = state.currentStroke.points[state.currentStroke.points.length - 1];
        if (Math.hypot(next.x - previous.x, next.y - previous.y) < 1.2) return;
        state.currentStroke.points.push(next);
        redraw();
      }

      function endStroke(event) {
        if (!state.drawing || !state.currentStroke) return;
        event.preventDefault();
        state.drawing = false;
        state.undo.push(deepCopy(state.strokes));
        if (state.undo.length > 40) state.undo.shift();
        state.redo = [];
        state.strokes.push(state.currentStroke);
        state.currentStroke = null;
        redraw();
        persist();
      }

      function moveCursor(event) {
        if (event.pointerType === 'touch') return;
        cursor.style.left = `${event.clientX}px`;
        cursor.style.top = `${event.clientY}px`;
      }

      function setTool(tool) {
        state.tool = tool;
        document.querySelectorAll('[data-tool]').forEach(button => {
          const active = button.dataset.tool === tool;
          button.classList.toggle('active', active);
          button.setAttribute('aria-pressed', active);
        });
        cursor.classList.toggle('eraser', tool === 'eraser');
        updateCursorSize();
      }

      function setColor(color) {
        state.color = color;
        colorInput.value = color;
        document.querySelectorAll('.swatch').forEach(button => {
          const active = button.dataset.color.toLowerCase() === color.toLowerCase();
          button.classList.toggle('active', active);
          button.setAttribute('aria-pressed', active);
        });
        if (state.tool === 'eraser') setTool('pen');
      }

      function updateCursorSize() {
        const factor = state.tool === 'marker' ? 2.8 : state.tool === 'eraser' ? 2.3 : 1;
        const diameter = Math.max(5, state.size * factor);
        cursor.style.width = `${diameter}px`;
        cursor.style.height = `${diameter}px`;
        cursor.style.borderColor = state.tool === 'eraser' ? '#191a18' : state.color;
        sizeDot.style.width = `${Math.min(14, Math.max(4, state.size * .45))}px`;
        sizeDot.style.height = sizeDot.style.width;
      }

      function updateUI() {
        emptyState.classList.toggle('hidden', state.strokes.length > 0 || !!state.currentStroke);
        undoButton.disabled = state.undo.length === 0;
        redoButton.disabled = state.redo.length === 0;
        clearButton.disabled = state.strokes.length === 0;
      }

      function undo() {
        if (!state.undo.length) return;
        state.redo.push(deepCopy(state.strokes));
        state.strokes = state.undo.pop();
        redraw();
        persist();
      }

      function redo() {
        if (!state.redo.length) return;
        state.undo.push(deepCopy(state.strokes));
        state.strokes = state.redo.pop();
        redraw();
        persist();
      }

      function clearCanvas() {
        if (!state.strokes.length) return;
        state.undo.push(deepCopy(state.strokes));
        state.redo = [];
        state.strokes = [];
        redraw();
        persist();
        showToast('Canvas cleared · Undo available');
      }

      function persist() {
        saveState.textContent = 'Saving…';
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify({ strokes: state.strokes, grid: state.grid }));
          window.setTimeout(() => { saveState.textContent = 'Saved locally'; }, 220);
        } catch (error) {
          saveState.textContent = 'Local save unavailable';
        }
      }

      function restore() {
        try {
          const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
          if (saved && Array.isArray(saved.strokes)) state.strokes = saved.strokes;
          if (saved && typeof saved.grid === 'boolean') state.grid = saved.grid;
        } catch (_) {}
        app.classList.toggle('grid-off', !state.grid);
        gridButton.classList.toggle('active', state.grid);
        gridButton.setAttribute('aria-pressed', state.grid);
      }

      function toggleGrid() {
        state.grid = !state.grid;
        app.classList.toggle('grid-off', !state.grid);
        gridButton.classList.toggle('active', state.grid);
        gridButton.setAttribute('aria-pressed', state.grid);
        persist();
      }

      function downloadImage() {
        const exportCanvas = document.createElement('canvas');
        const scale = Math.min(2, window.devicePixelRatio || 1);
        exportCanvas.width = Math.round(canvas.clientWidth * scale);
        exportCanvas.height = Math.round(canvas.clientHeight * scale);
        const exportCtx = exportCanvas.getContext('2d');
        exportCtx.fillStyle = '#f8f6ef';
        exportCtx.fillRect(0, 0, exportCanvas.width, exportCanvas.height);

        if (state.grid) {
          exportCtx.fillStyle = 'rgba(37,38,34,.13)';
          const spacing = 24 * scale;
          for (let x = 0; x < exportCanvas.width; x += spacing) {
            for (let y = 0; y < exportCanvas.height; y += spacing) {
              exportCtx.beginPath();
              exportCtx.arc(x, y, Math.max(1, scale), 0, Math.PI * 2);
              exportCtx.fill();
            }
          }
        }

        exportCtx.drawImage(canvas, 0, 0, exportCanvas.width, exportCanvas.height);
        const link = document.createElement('a');
        const stamp = new Date().toISOString().slice(0, 10);
        link.download = `whiteboard-${stamp}.png`;
        link.href = exportCanvas.toDataURL('image/png');
        link.click();
        showToast('Whiteboard saved as PNG');
      }

      let toastTimer;
      function showToast(message) {
        toastText.textContent = message;
        toast.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
      }

      canvas.addEventListener('pointerdown', beginStroke);
      canvas.addEventListener('pointermove', moveStroke);
      canvas.addEventListener('pointerup', endStroke);
      canvas.addEventListener('pointercancel', endStroke);
      canvas.addEventListener('pointerenter', event => {
        if (event.pointerType !== 'touch') cursor.classList.add('visible');
        moveCursor(event);
      });
      canvas.addEventListener('pointerleave', () => cursor.classList.remove('visible'));

      document.querySelectorAll('[data-tool]').forEach(button => button.addEventListener('click', () => setTool(button.dataset.tool)));
      document.querySelectorAll('.swatch').forEach(button => button.addEventListener('click', () => setColor(button.dataset.color)));
      colorInput.addEventListener('input', event => setColor(event.target.value));
      sizeRange.addEventListener('input', event => {
        state.size = Number(event.target.value);
        updateCursorSize();
      });
      undoButton.addEventListener('click', undo);
      redoButton.addEventListener('click', redo);
      clearButton.addEventListener('click', clearCanvas);
      downloadButton.addEventListener('click', downloadImage);
      gridButton.addEventListener('click', toggleGrid);

      window.addEventListener('keydown', event => {
        if (event.target.matches('input[type="color"], input[type="range"]')) return;
        const modifier = event.metaKey || event.ctrlKey;
        if (modifier && event.key.toLowerCase() === 'z') {
          event.preventDefault();
          event.shiftKey ? redo() : undo();
          return;
        }
        const key = event.key.toLowerCase();
        if (key === 'p') setTool('pen');
        else if (key === 'h') setTool('marker');
        else if (key === 'e') setTool('eraser');
        else if (key === 'g') toggleGrid();
        else if (key === '[') {
          state.size = Math.max(2, state.size - 2);
          sizeRange.value = state.size;
          updateCursorSize();
        } else if (key === ']') {
          state.size = Math.min(32, state.size + 2);
          sizeRange.value = state.size;
          updateCursorSize();
        }
      });

      let resizeTimer;
      window.addEventListener('resize', () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(resizeCanvas, 100);
      });

      restore();
      updateCursorSize();
      resizeCanvas();
    })();
  </script>
</body>
</html>
