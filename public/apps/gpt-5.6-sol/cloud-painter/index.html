<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <meta name="theme-color" content="#87cef4" />
  <title>Cloud Painter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --ink:#285171; --sky:#91d5f7; --cream:#fffaf0; --coral:#ff7d68;
      --panel:rgba(255,250,240,.91); --shadow:0 12px 30px rgba(48,105,141,.16),0 3px 8px rgba(48,105,141,.11);
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;overflow:hidden}
    body{font-family:"Nunito",sans-serif;color:var(--ink);background:#8bd3f7;touch-action:none;user-select:none;-webkit-user-select:none}
    button,input{font:inherit}
    button{color:inherit}
    canvas{position:fixed;inset:0;width:100%;height:100%;display:block;cursor:none}
    .grain{position:fixed;inset:0;pointer-events:none;opacity:.24;mix-blend-mode:soft-light;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.18'/%3E%3C/svg%3E")}
    .topbar{position:fixed;z-index:5;left:24px;right:24px;top:20px;display:flex;align-items:center;justify-content:space-between;pointer-events:none}
    .brand{display:flex;align-items:center;gap:12px;pointer-events:auto;filter:drop-shadow(0 3px 0 rgba(255,255,255,.35))}
    .logo{width:52px;height:42px;position:relative;animation:bob 4s ease-in-out infinite}
    .logo:before{content:"";position:absolute;left:3px;bottom:3px;width:46px;height:25px;background:#fff;border:3px solid var(--ink);border-radius:50px;box-shadow:inset 0 -5px #eef7f9}
    .logo:after{content:"";position:absolute;left:13px;top:1px;width:23px;height:25px;background:#fff;border:3px solid var(--ink);border-bottom:0;border-radius:50% 50% 20% 20%}
    .brand h1{font:700 clamp(21px,3vw,30px)/1 "Fredoka",sans-serif;margin:0;letter-spacing:-.8px;color:#244c6a}
    .brand small{display:block;color:#477695;font-weight:800;font-size:11px;letter-spacing:.11em;text-transform:uppercase;margin-top:4px}
    .actions{display:flex;gap:9px;pointer-events:auto}
    .soft-btn{height:44px;border:2px solid rgba(255,255,255,.84);border-radius:16px;background:rgba(255,255,255,.83);box-shadow:var(--shadow);display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:0 15px;font-weight:900;cursor:pointer;transition:transform .18s ease,background .18s ease,box-shadow .18s ease;backdrop-filter:blur(10px)}
    .soft-btn:hover{transform:translateY(-2px) rotate(-1deg);background:#fff;box-shadow:0 15px 30px rgba(48,105,141,.2)}
    .soft-btn:active{transform:translateY(1px) scale(.96)}
    .soft-btn:focus-visible,.tool:focus-visible,.swatch:focus-visible{outline:4px solid rgba(255,217,91,.85);outline-offset:3px}
    .soft-btn.primary{background:var(--coral);border-color:#ffad9f;color:#fff;text-shadow:0 1px 0 rgba(140,51,40,.18)}
    .soft-btn svg{width:20px;height:20px;stroke-width:2.4}
    .hint{position:fixed;z-index:3;left:50%;top:22%;transform:translate(-50%,-50%);text-align:center;color:rgba(40,81,113,.72);pointer-events:none;transition:opacity .7s ease,transform .7s ease;animation:arrive .9s .25s both}
    .hint strong{display:block;font:700 clamp(26px,4vw,48px)/1.05 "Fredoka",sans-serif;letter-spacing:-1px;color:#fff;text-shadow:0 3px 0 rgba(50,112,150,.22)}
    .hint span{display:inline-block;margin-top:9px;padding:7px 13px;border-radius:99px;background:rgba(255,255,255,.48);font-weight:900;font-size:13px;backdrop-filter:blur(4px)}
    .hint.hide{opacity:0;transform:translate(-50%,-65%)}
    .dock-wrap{position:fixed;z-index:6;bottom:18px;left:50%;transform:translateX(-50%);width:min(850px,calc(100% - 28px));animation:rise .65s cubic-bezier(.2,.9,.25,1.15) both}
    .dock{background:var(--panel);border:2px solid rgba(255,255,255,.9);border-radius:25px;box-shadow:0 18px 45px rgba(39,94,129,.2),inset 0 1px rgba(255,255,255,.9);backdrop-filter:blur(14px);padding:10px 12px;display:flex;align-items:center;gap:12px}
    .tool-group{display:flex;align-items:center;gap:7px}
    .tool-group.shapes{flex:1}
    .divider{width:2px;height:40px;border-radius:2px;background:#dcecf0}
    .group-label{font-size:10px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:#7394a8;margin:0 3px;display:none}
    .tool{height:50px;min-width:68px;border:0;border-radius:16px;background:transparent;padding:4px 9px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:10px;font-weight:900;color:#557a91;cursor:pointer;position:relative;transition:.17s ease}
    .tool:hover{background:#edf7f7;transform:translateY(-2px)}
    .tool.active{background:#dff2f3;color:#26536f;box-shadow:inset 0 -3px 0 #b7e2e5}
    .tool.active:after{content:"";position:absolute;right:7px;top:7px;width:7px;height:7px;border-radius:50%;background:var(--coral);box-shadow:0 0 0 3px #fff}
    .brush-icon{width:42px;height:25px;overflow:visible}
    .swatches{display:flex;gap:6px;align-items:center}
    .swatch{width:31px;height:31px;border-radius:50%;border:3px solid #fff;background:var(--c);box-shadow:0 2px 0 #bdd4da;cursor:pointer;transition:.16s ease;position:relative}
    .swatch:hover{transform:translateY(-3px) scale(1.08)}
    .swatch.active{box-shadow:0 0 0 3px var(--ink),0 3px 0 #bdd4da;transform:scale(.9)}
    .size-wrap{width:104px;display:flex;align-items:center;gap:7px;padding:0 4px}
    .size-dot{border-radius:50%;background:#87a8b9;flex:none}
    input[type=range]{appearance:none;-webkit-appearance:none;width:100%;height:6px;border-radius:9px;background:#cde1e6;outline:none}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:#fff;border:3px solid var(--coral);box-shadow:0 2px 4px #aac1c8;cursor:pointer}
    .mini-btn{width:44px;height:44px;padding:0;border-radius:14px}
    .toast{position:fixed;z-index:10;left:50%;top:88px;transform:translate(-50%,-20px);opacity:0;background:#244f6e;color:#fff;padding:10px 16px;border-radius:99px;font-weight:900;font-size:13px;box-shadow:var(--shadow);pointer-events:none;transition:.28s ease}
    .toast.show{opacity:1;transform:translate(-50%,0)}
    .cursor{position:fixed;z-index:8;border:2px dashed rgba(40,81,113,.68);border-radius:50%;pointer-events:none;transform:translate(-50%,-50%);display:none;animation:spin 8s linear infinite}
    .cursor:after{content:"";position:absolute;left:50%;top:50%;width:5px;height:5px;border-radius:50%;background:var(--coral);transform:translate(-50%,-50%)}
    @keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg)}}
    @keyframes bob{50%{transform:translateY(-4px) rotate(2deg)}}
    @keyframes arrive{from{opacity:0;transform:translate(-50%,-38%)}to{opacity:1;transform:translate(-50%,-50%)}}
    @keyframes rise{from{opacity:0;transform:translate(-50%,30px)}to{opacity:1;transform:translate(-50%,0)}}
    @media(max-width:720px){
      .topbar{left:14px;right:14px;top:12px}.brand small{display:none}.brand h1{font-size:22px}.logo{width:43px;height:35px;transform:scale(.85);transform-origin:left center}.logo:before{transform:scale(.85);transform-origin:left bottom}.logo:after{transform:scale(.85);transform-origin:left top}
      .soft-btn{height:40px;padding:0 12px;border-radius:14px}.soft-btn .label{display:none}
      .dock-wrap{bottom:10px;width:calc(100% - 16px)}.dock{border-radius:21px;padding:8px;gap:6px;overflow-x:auto;scrollbar-width:none}.dock::-webkit-scrollbar{display:none}
      .tool{min-width:57px;height:48px;padding:3px 5px}.brush-icon{width:36px}.divider{height:35px;flex:none}.swatches{gap:4px}.swatch{width:27px;height:27px}.size-wrap{width:82px;flex:none}.mini-btn{width:40px;min-width:40px}.hint{top:22%}
    }
    @media(max-width:450px){.tool-group.shapes{flex:none}.tool{min-width:53px}.dock{gap:4px}.divider:nth-of-type(2){display:none}.size-wrap{display:none}.swatch:nth-child(4){display:none}}
    @media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}}
  </style>
</head>
<body>
  <canvas id="sky" aria-label="Cloud painting canvas"></canvas>
  <div class="grain"></div>
  <header class="topbar">
    <div class="brand" aria-label="Cloud Painter">
      <span class="logo" aria-hidden="true"></span>
      <div><h1>Cloud Painter</h1><small>make the sky smile</small></div>
    </div>
    <nav class="actions" aria-label="Painting actions">
      <button class="soft-btn" id="planeBtn" title="Fly an airplane">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M22 2 9.6 14.4M22 2l-7.9 20-4.5-7.6L2 10 22 2Z" stroke-linecap="round" stroke-linejoin="round"/></svg><span class="label">Fly a plane</span>
      </button>
      <button class="soft-btn primary" id="saveBtn" title="Save your sky">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 3v12m0 0 4-4m-4 4-4-4M5 21h14" stroke-linecap="round" stroke-linejoin="round"/></svg><span class="label">Save sky</span>
      </button>
    </nav>
  </header>
  <div class="hint" id="hint"><strong>Paint something fluffy!</strong><span>Drag anywhere in the sky</span></div>
  <div class="dock-wrap">
    <section class="dock" aria-label="Cloud painting tools">
      <div class="tool-group shapes" id="shapeTools">
        <span class="group-label">Brush</span>
        <button class="tool active" data-shape="puff" aria-label="Puffy cloud brush">
          <svg class="brush-icon" viewBox="0 0 50 28"><path d="M7 24c-4 0-6-3-5-7s4-6 8-5c1-6 6-10 12-8 3-4 10-3 12 2 6-1 10 3 10 8 5 1 6 9 1 10Z" fill="#fff" stroke="#57809a" stroke-width="2"/></svg><span>Puffy</span>
        </button>
        <button class="tool" data-shape="swirl" aria-label="Wispy cloud brush">
          <svg class="brush-icon" viewBox="0 0 50 28"><path d="M4 19c7-9 20-10 25-4 4 5-4 9-8 5-2-2 1-5 4-3m-15 7h34" fill="none" stroke="#57809a" stroke-width="3" stroke-linecap="round"/></svg><span>Wispy</span>
        </button>
        <button class="tool" data-shape="dots" aria-label="Dappled cloud brush">
          <svg class="brush-icon" viewBox="0 0 50 28" fill="#fff" stroke="#57809a" stroke-width="2"><circle cx="11" cy="16" r="7"/><circle cx="23" cy="10" r="8"/><circle cx="36" cy="17" r="7"/></svg><span>Dapple</span>
        </button>
      </div>
      <div class="divider"></div>
      <div class="swatches" id="swatches" aria-label="Cloud colors">
        <button class="swatch active" style="--c:#fffdf7" data-color="#fffdf7" aria-label="Vanilla white"></button>
        <button class="swatch" style="--c:#ffe2de" data-color="#ffe2de" aria-label="Blush pink"></button>
        <button class="swatch" style="--c:#fff0b8" data-color="#fff0b8" aria-label="Sunbeam yellow"></button>
        <button class="swatch" style="--c:#cadde8" data-color="#cadde8" aria-label="Rainy blue"></button>
      </div>
      <div class="divider"></div>
      <label class="size-wrap" title="Brush size"><span class="size-dot" style="width:7px;height:7px"></span><input id="size" type="range" min="34" max="112" value="68" aria-label="Brush size"><span class="size-dot" style="width:16px;height:16px"></span></label>
      <button class="soft-btn mini-btn" id="undoBtn" title="Undo last stroke" aria-label="Undo last stroke">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 7 4 12l5 5M5 12h8a6 6 0 0 1 6 6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button class="soft-btn mini-btn" id="clearBtn" title="Clear the sky" aria-label="Clear the sky">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m8 6 1-2h6l1 2m-10 0h12M9 10v7m6-7v7M7 6l1 15h8l1-15" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </section>
  </div>
  <div class="toast" id="toast" role="status"></div>
  <div class="cursor" id="cursor"></div>
  <script>
  (()=>{
    const canvas=document.getElementById('sky'),ctx=canvas.getContext('2d');
    const hint=document.getElementById('hint'),cursor=document.getElementById('cursor'),toast=document.getElementById('toast');
    let W=innerWidth,H=innerHeight,DPR=Math.min(devicePixelRatio||1,2),last=performance.now();
    let marks=[],planes=[],stroke=[],painting=false,hasPainted=false,strokeGroup=0;
    let brush={shape:'puff',color:'#fffdf7',size:68};
    let toastTimer,planeColor=0;
    const planePalette=['#ff7d68','#ffd44f','#4f9ac5','#f08daf'];
    const rand=n=>{const x=Math.sin(n*999.17)*43758.5453;return x-Math.floor(x)};
    function resize(){W=innerWidth;H=innerHeight;DPR=Math.min(devicePixelRatio||1,2);canvas.width=W*DPR;canvas.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0)}
    addEventListener('resize',resize);resize();
    function skyBackground(c,w,h){
      const g=c.createLinearGradient(0,0,0,h);g.addColorStop(0,'#78c9f4');g.addColorStop(.63,'#b9e6f6');g.addColorStop(1,'#f4dca4');c.fillStyle=g;c.fillRect(0,0,w,h);
      const sun=c.createRadialGradient(w*.84,h*.16,5,w*.84,h*.16,Math.min(w,h)*.28);sun.addColorStop(0,'rgba(255,244,175,.78)');sun.addColorStop(.24,'rgba(255,240,163,.23)');sun.addColorStop(1,'rgba(255,255,255,0)');c.fillStyle=sun;c.fillRect(0,0,w,h);
      c.save();c.globalAlpha=.34;c.fillStyle='#fff';for(let i=0;i<14;i++){let x=(rand(i+50)*w),y=rand(i+90)*h*.72,r=rand(i+5)*1.4+1;c.beginPath();c.arc(x,y,r,0,7);c.fill()}c.restore();
    }
    function ellipse(c,x,y,rx,ry,rot=0){c.beginPath();c.ellipse(x,y,rx,ry,rot,0,Math.PI*2);c.fill()}
    function drawPuff(c,x,y,s,color,seed,alpha=1){
      c.save();c.translate(x,y);c.globalAlpha=alpha;c.fillStyle='rgba(89,132,153,.13)';ellipse(c,2,s*.17,s*.44,s*.16);
      c.fillStyle=color;const parts=[[-.29,.05,.22,.22],[-.12,-.11,.25,.29],[.10,-.17,.29,.34],[.32,.01,.23,.24],[.10,.08,.43,.22]];
      parts.forEach((p,i)=>ellipse(c,p[0]*s+(rand(seed+i)-.5)*s*.04,p[1]*s,p[2]*s,p[3]*s,(rand(seed+i+20)-.5)*.25));
      c.globalAlpha=alpha*.22;c.fillStyle='#fff';ellipse(c,-s*.04,-s*.22,s*.20,s*.08,-.2);c.restore();
    }
    function drawDots(c,x,y,s,color,seed,alpha=1){
      c.save();c.translate(x,y);c.globalAlpha=alpha;c.fillStyle=color;
      for(let i=0;i<7;i++){const a=rand(seed+i)*6.28,r=rand(seed+i+9)*s*.28,rr=s*(.11+rand(seed+i+30)*.14);ellipse(c,Math.cos(a)*r,Math.sin(a)*r*.52,rr,rr*(.78+rand(seed+i+4)*.3))}
      c.globalAlpha=alpha*.18;c.fillStyle='#497b94';ellipse(c,0,s*.15,s*.37,s*.10);c.restore();
    }
    function drawSwirl(c,x,y,s,color,seed,alpha=1){
      c.save();c.translate(x,y);c.globalAlpha=alpha;c.strokeStyle=color;c.lineCap='round';c.lineJoin='round';c.shadowColor='rgba(44,99,129,.12)';c.shadowBlur=s*.08;
      for(let i=0;i<3;i++){let yy=(i-1)*s*.16;c.lineWidth=s*(.11-i*.015);c.beginPath();c.moveTo(-s*.45,yy);c.bezierCurveTo(-s*.2-s*.1*rand(seed+i),yy-s*.22,s*.24,yy-s*.18,s*.34,yy);c.bezierCurveTo(s*.43,yy+s*.15,s*.14,yy+s*.22,s*.10,yy+s*.08);c.stroke()}
      c.shadowBlur=0;c.globalAlpha=alpha*.35;c.strokeStyle='#fff';c.lineWidth=s*.025;c.beginPath();c.moveTo(-s*.32,-s*.13);c.quadraticCurveTo(0,-s*.30,s*.24,-s*.12);c.stroke();c.restore();
    }
    function drawMark(c,m,w=W,h=H,scale=1){
      let x=(m.x+m.drift)%1;if(x<-.1)x+=1.2;const px=x*w,py=m.y*h,s=m.size*scale;
      (m.shape==='puff'?drawPuff:m.shape==='swirl'?drawSwirl:drawDots)(c,px,py,s,m.color,m.seed,m.alpha);
    }
    function drawPlane(c,p,w=W,h=H,forExport=false){
      const x=p.x*w,y=p.y*h,s=p.size*(w/1000);c.save();c.translate(x,y);c.rotate(p.angle);if(p.dir<0)c.scale(-1,1);
      c.globalAlpha=Math.max(0,Math.min(1,p.life*2));
      c.strokeStyle='rgba(255,255,255,.73)';c.lineWidth=Math.max(2,s*.055);c.setLineDash([s*.12,s*.11]);c.beginPath();c.moveTo(-s*2.45,s*.17);c.quadraticCurveTo(-s*1.45,s*.1,-s*.72,s*.03);c.stroke();c.setLineDash([]);
      c.fillStyle=p.color;c.strokeStyle='#285171';c.lineWidth=Math.max(1.5,s*.034);c.lineJoin='round';
      c.beginPath();c.moveTo(s*.68,0);c.quadraticCurveTo(s*.2,-s*.18,-s*.58,-s*.10);c.lineTo(-s*.81,-s*.27);c.lineTo(-s*.68,-s*.02);c.lineTo(-s*.82,s*.20);c.lineTo(-s*.56,s*.13);c.quadraticCurveTo(s*.25,s*.2,s*.68,0);c.closePath();c.fill();c.stroke();
      c.fillStyle='#fff9e9';c.beginPath();c.moveTo(s*.12,-s*.08);c.lineTo(-s*.12,-s*.52);c.lineTo(-s*.35,-s*.51);c.lineTo(-s*.25,-s*.05);c.closePath();c.fill();c.stroke();
      c.fillStyle='#8fd8f4';ellipse(c,s*.27,-s*.06,s*.08,s*.07);c.restore();
    }
    function render(t){
      const dt=Math.min((t-last)/1000,.04);last=t;ctx.setTransform(DPR,0,0,DPR,0,0);skyBackground(ctx,W,H);
      for(const m of marks){m.drift+=m.speed*dt;drawMark(ctx,m)}
      planes=planes.filter(p=>p.life>0&&p.x>-1&&p.x<2);
      for(const p of planes){p.x+=p.vx*dt;p.phase+=dt;p.y+=Math.sin(p.phase*2.2)*dt*.012;p.life-=dt*(p.x>1.25||p.x<-.25?.8:0);drawPlane(ctx,p)}
      requestAnimationFrame(render)
    }
    requestAnimationFrame(render);
    function point(e){const r=canvas.getBoundingClientRect(),q=e.touches?e.touches[0]:e;return{x:q.clientX-r.left,y:q.clientY-r.top}}
    function stamp(x,y){
      if(y>H-92)return;const lastMark=stroke[stroke.length-1];if(lastMark){const dx=x-lastMark.px,dy=y-lastMark.py;if(Math.hypot(dx,dy)<brush.size*.25)return}
      const m={x:x/W,y:y/H,px:x,py:y,size:brush.size,shape:brush.shape,color:brush.color,seed:Math.random()*1000,group:strokeGroup,alpha:.90+Math.random()*.1,drift:0,speed:.0014+Math.random()*.0022};marks.push(m);stroke.push(m);
      if(!hasPainted){hasPainted=true;hint.classList.add('hide')}
    }
    canvas.addEventListener('pointerdown',e=>{if(e.button!==0)return;painting=true;stroke=[];strokeGroup++;canvas.setPointerCapture(e.pointerId);const p=point(e);stamp(p.x,p.y)});
    canvas.addEventListener('pointermove',e=>{const p=point(e);cursor.style.left=p.x+'px';cursor.style.top=p.y+'px';if(p.y<H-80)cursor.style.display='block';else cursor.style.display='none';if(painting)stamp(p.x,p.y)});
    canvas.addEventListener('pointerup',()=>painting=false);canvas.addEventListener('pointercancel',()=>painting=false);canvas.addEventListener('pointerleave',()=>cursor.style.display='none');canvas.addEventListener('pointerenter',()=>cursor.style.display='block');
    function updateCursor(){const s=brush.size;cursor.style.width=s+'px';cursor.style.height=s+'px'}updateCursor();
    document.getElementById('shapeTools').addEventListener('click',e=>{const b=e.target.closest('[data-shape]');if(!b)return;brush.shape=b.dataset.shape;document.querySelectorAll('[data-shape]').forEach(x=>x.classList.toggle('active',x===b));pop(b)});
    document.getElementById('swatches').addEventListener('click',e=>{const b=e.target.closest('[data-color]');if(!b)return;brush.color=b.dataset.color;document.querySelectorAll('[data-color]').forEach(x=>x.classList.toggle('active',x===b));pop(b)});
    document.getElementById('size').addEventListener('input',e=>{brush.size=+e.target.value;updateCursor()});
    function pop(el){el.animate([{transform:'scale(.88)'},{transform:'scale(1.08)'},{transform:''}],{duration:260,easing:'ease-out'})}
    function say(msg){toast.textContent=msg;toast.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>toast.classList.remove('show'),1800)}
    document.getElementById('undoBtn').onclick=()=>{if(!marks.length)return say('The sky is already fresh!');let group=marks[marks.length-1].group;marks=marks.filter(m=>m.group!==group);say('That stroke floated away')};
    document.getElementById('clearBtn').onclick=()=>{marks=[];planes=[];hasPainted=false;hint.classList.remove('hide');say('A brand-new sky!')};
    function launchPlane(){
      const dir=Math.random()>.5?1:-1;planes.push({x:dir>0?-.12:1.12,y:.28+Math.random()*.35,vx:dir*(.095+Math.random()*.055),dir,size:62+Math.random()*15,color:planePalette[planeColor++%planePalette.length],angle:(Math.random()-.5)*.12,phase:Math.random()*6,life:10});say('Wheee! A plane is flying!')
    }
    document.getElementById('planeBtn').onclick=launchPlane;
    function drawExport(){
      const out=document.createElement('canvas'),w=1600,h=1000;out.width=w;out.height=h;const c=out.getContext('2d');skyBackground(c,w,h);
      for(const m of marks)drawMark(c,m,w,h,w/W);
      for(const p of planes)drawPlane(c,p,w,h,true);
      c.fillStyle='rgba(255,255,255,.86)';c.font='700 34px Fredoka, sans-serif';c.fillText('Cloud Painter',55,h-54);c.fillStyle='rgba(40,81,113,.58)';c.font='800 16px Nunito, sans-serif';c.fillText('MY VERY OWN SKY',58,h-27);
      return out;
    }
    document.getElementById('saveBtn').onclick=()=>{const a=document.createElement('a');a.download='my-cloud-painting.png';a.href=drawExport().toDataURL('image/png');a.click();say('Your sky is saved!')};
    setTimeout(()=>{if(!hasPainted)launchPlane()},3800);
  })();
  </script>
</body>
</html>
