<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#07090c" />
  <title>Festival Lights Show</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Manrope:wght@400;500;600;700;800&display=swap');

    :root {
      --bg: #07090c;
      --panel: #101419;
      --panel-2: #151a20;
      --line: rgba(255,255,255,.10);
      --muted: #89929d;
      --text: #f7f8fa;
      --lime: #c9ff38;
      --cyan: #41e9ff;
      --coral: #ff476f;
      --violet: #a76dff;
      --active: #ff476f;
      --active-rgb: 255,71,111;
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    html { background: var(--bg); }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background: var(--bg);
      font-family: "Manrope", ui-sans-serif, sans-serif;
      overflow-x: hidden;
    }
    button, input { font: inherit; }
    button { color: inherit; }
    button:focus-visible, input:focus-visible {
      outline: 2px solid var(--cyan);
      outline-offset: 3px;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto minmax(385px, 1fr) auto;
      position: relative;
      isolation: isolate;
    }

    .app::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -2;
      pointer-events: none;
      opacity: .4;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 140 140' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.09'/%3E%3C/svg%3E");
    }

    .topbar {
      height: 72px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 0 32px;
      border-bottom: 1px solid var(--line);
      background: rgba(7,9,12,.86);
      backdrop-filter: blur(22px);
      z-index: 20;
    }

    .brand { display: flex; align-items: center; gap: 13px; }
    .brand-mark {
      width: 34px; height: 34px;
      position: relative;
      display: grid; place-items: center;
      background: var(--lime);
      color: #07090c;
      border-radius: 50% 50% 48% 52% / 42% 48% 52% 58%;
      box-shadow: 0 0 28px rgba(201,255,56,.25);
      transform: rotate(-8deg);
    }
    .brand-mark svg { width: 19px; transform: rotate(8deg); }
    .brand-copy { display: flex; flex-direction: column; line-height: 1.05; }
    .brand-copy strong { font-size: 13px; letter-spacing: .12em; text-transform: uppercase; }
    .brand-copy span { font-family: "DM Mono", monospace; font-size: 9px; color: var(--muted); margin-top: 5px; letter-spacing: .08em; }

    .show-title {
      font-size: 12px;
      letter-spacing: .2em;
      text-transform: uppercase;
      font-weight: 700;
      color: #c7cbd0;
    }
    .top-actions { display: flex; justify-content: flex-end; align-items: center; gap: 13px; }
    .status-dot {
      display: inline-flex; align-items: center; gap: 8px;
      color: #b7bec6; font: 500 10px/1 "DM Mono", monospace;
      letter-spacing: .08em; text-transform: uppercase;
    }
    .status-dot::before {
      content: ""; width: 7px; height: 7px; border-radius: 50%;
      background: var(--lime); box-shadow: 0 0 10px var(--lime);
      animation: blink 2.1s infinite;
    }
    .icon-btn {
      width: 36px; height: 36px; border-radius: 50%;
      border: 1px solid var(--line); background: rgba(255,255,255,.035);
      display: grid; place-items: center; cursor: pointer;
      transition: .2s ease;
    }
    .icon-btn:hover { background: rgba(255,255,255,.09); transform: translateY(-1px); }
    .icon-btn svg { width: 16px; height: 16px; }

    .stage {
      position: relative;
      min-height: 385px;
      overflow: hidden;
      background: #05070a;
      border-bottom: 1px solid var(--line);
    }
    #showCanvas { position: absolute; inset: 0; width: 100%; height: 100%; }
    .stage-vignette {
      position: absolute; inset: 0; pointer-events: none;
      background:
        linear-gradient(90deg, rgba(5,7,10,.75), transparent 24%, transparent 76%, rgba(5,7,10,.75)),
        linear-gradient(180deg, rgba(5,7,10,.25), transparent 35%, rgba(5,7,10,.5));
    }
    .stage-scanlines {
      position: absolute; inset: 0; opacity: .12; pointer-events: none;
      background: repeating-linear-gradient(0deg, transparent 0 3px, rgba(255,255,255,.035) 3px 4px);
      mix-blend-mode: overlay;
    }

    .stage-meta {
      position: absolute; inset: 0;
      padding: 30px 32px 27px;
      display: flex; flex-direction: column; justify-content: space-between;
      pointer-events: none;
    }
    .meta-top { display: flex; align-items: flex-start; justify-content: space-between; }
    .live-label {
      display: inline-flex; align-items: center; gap: 9px;
      padding: 8px 11px;
      background: rgba(7,9,12,.45); border: 1px solid rgba(255,255,255,.16);
      border-radius: 999px; backdrop-filter: blur(10px);
      font: 500 9px/1 "DM Mono", monospace; letter-spacing: .13em; text-transform: uppercase;
    }
    .live-label i { width: 6px; height: 6px; border-radius: 50%; background: var(--coral); box-shadow: 0 0 9px var(--coral); }
    .fps { font: 400 9px/1.4 "DM Mono", monospace; color: rgba(255,255,255,.55); text-align: right; }
    .fps b { color: white; font-weight: 500; }
    .stage-bottom { display: flex; align-items: flex-end; justify-content: space-between; }
    .cue-copy { transform: translateY(4px); }
    .eyebrow { font: 500 9px/1 "DM Mono", monospace; color: rgba(255,255,255,.55); text-transform: uppercase; letter-spacing: .17em; }
    .cue-title { margin: 9px 0 0; font-size: clamp(30px, 4.3vw, 64px); line-height: .9; letter-spacing: -.055em; font-weight: 800; }
    .cue-title span { color: transparent; -webkit-text-stroke: 1px rgba(255,255,255,.58); }
    .stage-readouts { display: flex; gap: 28px; }
    .readout { min-width: 68px; }
    .readout span { display: block; font: 500 8px/1 "DM Mono", monospace; color: rgba(255,255,255,.5); text-transform: uppercase; letter-spacing: .14em; margin-bottom: 8px; }
    .readout strong { font: 500 18px/1 "DM Mono", monospace; }
    .readout strong small { font-size: 8px; color: var(--muted); margin-left: 3px; }

    .transport {
      position: absolute; left: 50%; bottom: 24px; transform: translateX(-50%);
      display: flex; align-items: center; gap: 8px;
      pointer-events: auto;
    }
    .play-btn {
      width: 52px; height: 52px; border: 0; border-radius: 50%;
      display: grid; place-items: center; cursor: pointer;
      background: var(--lime); color: #080a0d;
      box-shadow: 0 8px 32px rgba(0,0,0,.4), 0 0 0 6px rgba(201,255,56,.08);
      transition: transform .2s ease, box-shadow .2s ease;
    }
    .play-btn:hover { transform: scale(1.06); box-shadow: 0 8px 32px rgba(0,0,0,.4), 0 0 0 9px rgba(201,255,56,.1); }
    .play-btn:active { transform: scale(.95); }
    .play-btn svg { width: 20px; height: 20px; fill: currentColor; }
    .transport-side {
      height: 36px; padding: 0 12px; border-radius: 999px;
      border: 1px solid rgba(255,255,255,.15); background: rgba(7,9,12,.5);
      backdrop-filter: blur(12px); cursor: pointer;
      font: 500 9px/1 "DM Mono", monospace; text-transform: uppercase; letter-spacing: .08em;
      transition: .2s ease;
    }
    .transport-side:hover { background: rgba(255,255,255,.12); }

    .control-deck {
      min-height: 280px;
      display: grid;
      grid-template-columns: minmax(300px, 1.1fr) minmax(320px, 1.2fr) minmax(300px, 1fr);
      background: var(--panel);
      z-index: 10;
    }
    .deck-section {
      padding: 24px 28px 25px;
      min-width: 0;
      position: relative;
    }
    .deck-section + .deck-section { border-left: 1px solid var(--line); }
    .section-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
    .section-head h2 { margin: 0; font-size: 10px; letter-spacing: .15em; text-transform: uppercase; font-weight: 700; color: #e7eaed; }
    .section-num { font: 500 9px/1 "DM Mono", monospace; color: #68717b; }

    .patterns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .pattern-btn {
      min-height: 78px; padding: 10px 9px;
      border: 1px solid var(--line); border-radius: 11px;
      background: #13181e; cursor: pointer; text-align: left;
      display: flex; flex-direction: column; justify-content: space-between;
      transition: border-color .2s, background .2s, transform .2s;
      overflow: hidden; position: relative;
    }
    .pattern-btn::after {
      content: ""; position: absolute; inset: auto -20% -70% -20%; height: 100%;
      background: radial-gradient(circle, rgba(var(--active-rgb),.22), transparent 68%);
      opacity: 0; transition: opacity .25s;
    }
    .pattern-btn:hover { transform: translateY(-2px); border-color: rgba(255,255,255,.22); background: #171d24; }
    .pattern-btn.active { border-color: rgba(var(--active-rgb),.65); background: rgba(var(--active-rgb),.09); }
    .pattern-btn.active::after { opacity: 1; }
    .pattern-icon { height: 24px; display: flex; align-items: center; gap: 3px; opacity: .72; }
    .pattern-icon i { display: block; width: 3px; border-radius: 2px; background: currentColor; }
    .pattern-icon i:nth-child(1) { height: 9px; }
    .pattern-icon i:nth-child(2) { height: 18px; }
    .pattern-icon i:nth-child(3) { height: 12px; }
    .pattern-icon i:nth-child(4) { height: 22px; }
    .pattern-icon i:nth-child(5) { height: 7px; }
    .pattern-btn.active .pattern-icon { color: var(--active); opacity: 1; }
    .pattern-btn span:last-child { font-size: 10px; font-weight: 700; letter-spacing: .02em; }

    .palette-row { display: flex; gap: 9px; align-items: center; margin-bottom: 22px; }
    .swatch {
      width: 34px; height: 34px; padding: 0; border-radius: 50%; border: 2px solid transparent;
      background: var(--swatch); cursor: pointer; position: relative; transition: .2s ease;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.16);
    }
    .swatch:hover { transform: scale(1.1); }
    .swatch.active { border-color: #fff; box-shadow: 0 0 0 3px rgba(255,255,255,.1), 0 0 22px var(--swatch); }
    .swatch-duo { background: linear-gradient(135deg, var(--s1) 0 48%, var(--s2) 52% 100%); }
    .color-wheel {
      width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--line); cursor: pointer; padding: 0;
      background: conic-gradient(#ff476f, #ffce45, #4dff8e, #41e9ff, #a76dff, #ff476f);
      position: relative;
    }
    .color-wheel::after { content:""; position:absolute; inset:7px; border-radius:50%; background:#171b20; }
    #customColor { position:absolute; opacity:0; width:1px; height:1px; }

    .slider-group { display: grid; gap: 17px; }
    .slider-line { display: grid; grid-template-columns: 70px 1fr 40px; align-items: center; gap: 11px; }
    .slider-line label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
    .slider-value { font: 500 9px/1 "DM Mono", monospace; text-align: right; color: #d8dce0; }
    input[type="range"] {
      appearance: none; height: 2px; background: linear-gradient(90deg, var(--active) var(--fill,50%), #343b43 var(--fill,50%));
      border-radius: 3px; cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      appearance: none; width: 13px; height: 13px; border-radius: 50%;
      background: #f7f8fa; border: 3px solid var(--panel); box-shadow: 0 0 0 1px rgba(255,255,255,.35);
    }

    .sync-card {
      display: grid; grid-template-columns: 1fr 64px; gap: 18px; align-items: center;
      margin-bottom: 19px;
    }
    .sync-title { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .sync-title span { font-size: 11px; font-weight: 700; }
    .sync-status { font: 500 8px/1 "DM Mono", monospace; color: var(--lime); letter-spacing: .1em; text-transform: uppercase; }
    .spectrum { height: 35px; display: flex; align-items: end; gap: 3px; }
    .spectrum i { flex: 1; min-width: 2px; height: 20%; background: linear-gradient(to top, var(--coral), var(--lime)); border-radius: 2px 2px 0 0; transition: height .08s linear; }
    .toggle {
      width: 55px; height: 30px; border: 0; border-radius: 999px; padding: 3px;
      background: #2a3037; cursor: pointer; transition: .25s;
    }
    .toggle::before { content:""; display:block; width:24px; height:24px; border-radius:50%; background:#8b949e; transition:.25s; }
    .toggle.on { background: rgba(201,255,56,.18); box-shadow: inset 0 0 0 1px rgba(201,255,56,.35); }
    .toggle.on::before { transform: translateX(25px); background: var(--lime); box-shadow:0 0 14px rgba(201,255,56,.45); }

    .bpm-row { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
    .bpm-box {
      height: 61px; border: 1px solid var(--line); border-radius: 11px; background: #13181e;
      display: flex; align-items: center; justify-content: space-between; padding: 0 14px;
    }
    .bpm-copy small { display:block; font:500 8px/1 "DM Mono",monospace; color:var(--muted); letter-spacing:.1em; text-transform:uppercase; margin-bottom:7px; }
    .bpm-copy strong { font:500 17px/1 "DM Mono",monospace; }
    .stepper { display:flex; flex-direction:column; gap:2px; }
    .stepper button { width:21px; height:19px; border:0; background:transparent; color:#7d8791; cursor:pointer; line-height:1; padding:0; }
    .stepper button:hover { color:white; }
    .tap-btn {
      height:61px; border:1px solid var(--line); border-radius:11px; background:#13181e; cursor:pointer;
      font:500 9px/1 "DM Mono",monospace; text-transform:uppercase; letter-spacing:.13em; transition:.15s;
    }
    .tap-btn:hover { border-color:var(--lime); color:var(--lime); }
    .tap-btn.flash { background:rgba(201,255,56,.15); transform:scale(.97); }

    .randomize {
      position: absolute; right: 28px; top: 19px;
      border: 0; background: transparent; color: #7f8994; cursor: pointer; padding: 5px;
      font: 500 8px/1 "DM Mono", monospace; text-transform: uppercase; letter-spacing: .08em;
      display: flex; align-items: center; gap: 6px;
    }
    .randomize:hover { color: white; }
    .randomize svg { width: 13px; }

    .toast {
      position: fixed; top: 88px; left: 50%; transform: translate(-50%, -16px);
      z-index: 50; padding: 10px 15px; border-radius: 999px;
      background: rgba(18,23,28,.9); border: 1px solid var(--line); backdrop-filter: blur(18px);
      font: 500 9px/1 "DM Mono",monospace; color:#dce1e5; letter-spacing:.06em;
      opacity: 0; pointer-events: none; transition: .3s ease;
    }
    .toast.show { opacity:1; transform:translate(-50%,0); }

    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:.3; } }
    @keyframes enter { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:none; } }
    .topbar { animation: enter .6s ease both; }
    .stage { animation: enter .65s .08s ease both; }
    .control-deck { animation: enter .65s .16s ease both; }

    @media (max-width: 980px) {
      .app { grid-template-rows: auto 440px auto; }
      .control-deck { grid-template-columns: 1fr 1fr; }
      .deck-section:last-child { grid-column: 1 / -1; border-left: 0; border-top: 1px solid var(--line); }
      .sync-card { grid-template-columns: 1fr 64px; }
      .stage-readouts { gap: 18px; }
    }
    @media (max-width: 660px) {
      .app { display:block; }
      .topbar { height:62px; grid-template-columns: 1fr auto; padding:0 17px; }
      .show-title { display:none; }
      .status-dot { display:none; }
      .stage { height: 475px; }
      .stage-meta { padding: 20px 17px; }
      .stage-bottom { display:block; }
      .cue-title { font-size: 42px; }
      .stage-readouts { margin-top:18px; gap:20px; }
      .readout strong { font-size:15px; }
      .transport { bottom:26px; left:auto; right:17px; transform:none; }
      .transport-side { display:none; }
      .control-deck { display:block; }
      .deck-section { padding:23px 17px 25px; border-top:1px solid var(--line); }
      .deck-section + .deck-section { border-left:0; }
      .patterns { grid-template-columns:repeat(3,1fr); }
      .pattern-btn { min-height:72px; }
      .palette-row { gap:8px; overflow-x:auto; padding:3px; }
      .swatch,.color-wheel { flex:0 0 34px; }
      .slider-line { grid-template-columns:64px 1fr 36px; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .01ms !important; animation-iteration-count: 1 !important; scroll-behavior: auto !important; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none"><path d="M5 15.5 9.6 8l2.8 4 2.3-6 4.3 9.5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/><path d="M6 18h12" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
        </div>
        <div class="brand-copy"><strong>Festival Lights</strong><span>SHOW CONTROL / 01</span></div>
      </div>
      <div class="show-title">Neon Horizon — Main Stage</div>
      <div class="top-actions">
        <span class="status-dot">System ready</span>
        <button class="icon-btn" id="helpBtn" aria-label="Show keyboard shortcuts">
          <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.7"/><path d="M9.8 9.5a2.3 2.3 0 1 1 3.3 2.1c-.8.4-1.1.9-1.1 1.6" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><circle cx="12" cy="16.7" r="1" fill="currentColor"/></svg>
        </button>
      </div>
    </header>

    <section class="stage" aria-label="Live festival light show preview">
      <canvas id="showCanvas"></canvas>
      <div class="stage-vignette"></div>
      <div class="stage-scanlines"></div>
      <div class="stage-meta">
        <div class="meta-top">
          <span class="live-label"><i></i> Live preview</span>
          <div class="fps"><b id="fps">60</b> FPS<br>DMX UNIVERSE 01</div>
        </div>
        <div class="stage-bottom">
          <div class="cue-copy">
            <div class="eyebrow">Now running · Cue <span id="cueNumber">04</span></div>
            <h1 class="cue-title" id="cueTitle">CHROMA<br><span>WAVE</span></h1>
          </div>
          <div class="transport">
            <button class="transport-side" id="prevBtn" aria-label="Previous pattern">Prev</button>
            <button class="play-btn" id="playBtn" aria-label="Pause show">
              <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5h3v14H8zM13 5h3v14h-3z"/></svg>
            </button>
            <button class="transport-side" id="nextBtn" aria-label="Next pattern">Next</button>
          </div>
          <div class="stage-readouts">
            <div class="readout"><span>Master</span><strong id="masterReadout">82<small>%</small></strong></div>
            <div class="readout"><span>Tempo</span><strong id="tempoReadout">128<small>BPM</small></strong></div>
            <div class="readout"><span>Fixtures</span><strong>48<small>ON</small></strong></div>
          </div>
        </div>
      </div>
    </section>

    <section class="control-deck" aria-label="Light show controls">
      <section class="deck-section">
        <div class="section-head"><h2>Pattern bank</h2><span class="section-num">01 — 06</span></div>
        <div class="patterns" id="patterns">
          <button class="pattern-btn" data-pattern="pulse"><span class="pattern-icon"><i></i><i></i><i></i><i></i><i></i></span><span>Pulse</span></button>
          <button class="pattern-btn active" data-pattern="wave"><span class="pattern-icon"><i></i><i></i><i></i><i></i><i></i></span><span>Wave</span></button>
          <button class="pattern-btn" data-pattern="chase"><span class="pattern-icon"><i></i><i></i><i></i><i></i><i></i></span><span>Chase</span></button>
          <button class="pattern-btn" data-pattern="prism"><span class="pattern-icon"><i></i><i></i><i></i><i></i><i></i></span><span>Prism</span></button>
          <button class="pattern-btn" data-pattern="strobe"><span class="pattern-icon"><i></i><i></i><i></i><i></i><i></i></span><span>Strobe</span></button>
          <button class="pattern-btn" data-pattern="aurora"><span class="pattern-icon"><i></i><i></i><i></i><i></i><i></i></span><span>Aurora</span></button>
        </div>
      </section>

      <section class="deck-section">
        <button class="randomize" id="randomBtn" aria-label="Randomize show"><svg viewBox="0 0 24 24" fill="none"><path d="M16 3h5v5M4 20l6-6m0-4L4 4m12 17h5v-5m0 5-7-7m0-4 7-7" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg> Surprise me</button>
        <div class="section-head"><h2>Color & energy</h2><span class="section-num">Live</span></div>
        <div class="palette-row" id="palette">
          <button class="swatch swatch-duo active" style="--s1:#ff476f;--s2:#41e9ff" data-colors="#ff476f,#41e9ff" aria-label="Coral and cyan"></button>
          <button class="swatch swatch-duo" style="--s1:#c9ff38;--s2:#41e9ff" data-colors="#c9ff38,#41e9ff" aria-label="Lime and cyan"></button>
          <button class="swatch swatch-duo" style="--s1:#ffb627;--s2:#ff476f" data-colors="#ffb627,#ff476f" aria-label="Amber and coral"></button>
          <button class="swatch swatch-duo" style="--s1:#a76dff;--s2:#ff5dc8" data-colors="#a76dff,#ff5dc8" aria-label="Violet and pink"></button>
          <button class="swatch swatch-duo" style="--s1:#f4f5ff;--s2:#7486ff" data-colors="#f4f5ff,#7486ff" aria-label="White and blue"></button>
          <button class="swatch swatch-duo" style="--s1:#ff3d2e;--s2:#ffef5a" data-colors="#ff3d2e,#ffef5a" aria-label="Red and yellow"></button>
          <button class="color-wheel" id="colorWheel" aria-label="Choose custom color"></button>
          <input type="color" id="customColor" value="#41e9ff" aria-label="Custom color" />
        </div>
        <div class="slider-group">
          <div class="slider-line"><label for="intensity">Intensity</label><input type="range" id="intensity" min="10" max="100" value="82" style="--fill:82%"><output class="slider-value" id="intensityVal">82%</output></div>
          <div class="slider-line"><label for="speed">Motion</label><input type="range" id="speed" min="10" max="100" value="56" style="--fill:56%"><output class="slider-value" id="speedVal">56%</output></div>
          <div class="slider-line"><label for="haze">Haze</label><input type="range" id="haze" min="0" max="100" value="64" style="--fill:64%"><output class="slider-value" id="hazeVal">64%</output></div>
        </div>
      </section>

      <section class="deck-section">
        <div class="section-head"><h2>Music sync</h2><span class="section-num">Audio engine</span></div>
        <div class="sync-card">
          <div>
            <div class="sync-title"><span>Beat reactive</span><span class="sync-status" id="syncStatus">Linked</span></div>
            <div class="spectrum" id="spectrum" aria-hidden="true"></div>
          </div>
          <button class="toggle on" id="syncToggle" role="switch" aria-checked="true" aria-label="Toggle beat sync"></button>
        </div>
        <div class="bpm-row">
          <div class="bpm-box">
            <div class="bpm-copy"><small>Tempo</small><strong><span id="bpmValue">128</span> BPM</strong></div>
            <div class="stepper"><button id="bpmUp" aria-label="Increase BPM">⌃</button><button id="bpmDown" aria-label="Decrease BPM">⌄</button></div>
          </div>
          <button class="tap-btn" id="tapBtn">Tap tempo</button>
        </div>
      </section>
    </section>
  </main>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    (() => {
      const canvas = document.getElementById('showCanvas');
      const ctx = canvas.getContext('2d');
      const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;
      const state = {
        pattern: 'wave', colors: ['#ff476f','#41e9ff'], intensity: .82,
        speed: .56, haze: .64, bpm: 128, playing: true, sync: true,
        beat: 0, transition: 1, lastPattern: 'wave', audioStarted: false
      };
      const patternNames = {
        pulse:['SOLAR','PULSE'], wave:['CHROMA','WAVE'], chase:['LASER','CHASE'],
        prism:['PRISM','BREAK'], strobe:['WHITE','STROBE'], aurora:['AURORA','VEIL']
      };
      const patterns = Object.keys(patternNames);
      let W=0,H=0,dpr=1,last=performance.now(), elapsed=0, frameCount=0, fpsTime=0;
      let particles=[], crowd=[], audioCtx=null, masterGain=null, nextNote=0, beatIndex=0, scheduler=null;

      function resize() {
        const r = canvas.getBoundingClientRect(); dpr = Math.min(devicePixelRatio || 1, 2);
        W = r.width; H = r.height; canvas.width = Math.round(W*dpr); canvas.height=Math.round(H*dpr);
        ctx.setTransform(dpr,0,0,dpr,0,0);
        buildScene();
      }
      function buildScene(){
        crowd = Array.from({length: Math.floor(W/5)}, (_,i) => ({
          x: Math.random()*W, y: H*.72+Math.random()*H*.28, r: 1+Math.random()*2.5,
          h: 5+Math.random()*16, phase:Math.random()*6.28
        }));
        particles = Array.from({length: 90},()=>({x:Math.random()*W,y:Math.random()*H*.8,z:Math.random(),v:.1+Math.random()*.6}));
      }
      addEventListener('resize',resize); resize();

      function hexRgb(hex){ const n=parseInt(hex.slice(1),16); return [(n>>16)&255,(n>>8)&255,n&255]; }
      function rgba(hex,a){ const [r,g,b]=hexRgb(hex); return `rgba(${r},${g},${b},${a})`; }
      function lerp(a,b,t){return a+(b-a)*t}

      function beam(xTop,yTop,xBottom,width,color,alpha){
        const g=ctx.createLinearGradient(xTop,yTop,xBottom,H);
        g.addColorStop(0,rgba(color,alpha*.82)); g.addColorStop(.58,rgba(color,alpha*.2)); g.addColorStop(1,rgba(color,0));
        ctx.beginPath(); ctx.moveTo(xTop-3,yTop); ctx.lineTo(xTop+3,yTop); ctx.lineTo(xBottom+width,H); ctx.lineTo(xBottom-width,H); ctx.closePath();
        ctx.fillStyle=g; ctx.fill();
        ctx.beginPath();ctx.moveTo(xTop,yTop);ctx.lineTo(xBottom,H*.87);ctx.strokeStyle=rgba(color,alpha*.8);ctx.lineWidth=.65;ctx.stroke();
      }

      function drawRig(t){
        const rigY=H*.17;
        ctx.strokeStyle='rgba(255,255,255,.14)';ctx.lineWidth=1;
        ctx.beginPath();ctx.moveTo(W*.1,rigY);ctx.lineTo(W*.9,rigY);ctx.stroke();
        for(let i=0;i<17;i++){
          const x=W*.1+(W*.8/16)*i;
          ctx.fillStyle='rgba(8,10,13,.95)';ctx.fillRect(x-7,rigY-4,14,9);
          const active=(i+Math.floor(t*3))%3!==0;
          ctx.fillStyle=active?rgba(state.colors[i%2],.9):'rgba(255,255,255,.16)';
          ctx.beginPath();ctx.arc(x,rigY+6,2.2,0,6.28);ctx.fill();
        }
        ctx.strokeStyle='rgba(255,255,255,.08)';
        for(let i=0;i<5;i++){ const x=W*(.18+i*.16);ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,rigY);ctx.stroke(); }
      }

      function drawStage(t, energy){
        const horizon=H*.68;
        ctx.fillStyle='rgba(0,0,0,.52)';ctx.fillRect(W*.17,horizon-18,W*.66,H*.22);
        ctx.strokeStyle='rgba(255,255,255,.08)';ctx.strokeRect(W*.17,horizon-18,W*.66,H*.22);
        for(let i=0;i<7;i++){
          const x=W*.25+i*(W*.5/6), y=horizon-4-Math.abs(i-3)*2;
          const c=state.colors[i%2];
          const gr=ctx.createRadialGradient(x,y,0,x,y,35+energy*18);
          gr.addColorStop(0,rgba(c,.75*state.intensity));gr.addColorStop(.2,rgba(c,.16));gr.addColorStop(1,rgba(c,0));
          ctx.fillStyle=gr;ctx.fillRect(x-60,y-60,120,120);
          ctx.fillStyle='rgba(2,3,4,.95)';ctx.fillRect(x-8,y-26,16,28);
          ctx.fillStyle=rgba(c,.8);ctx.fillRect(x-5,y-29,10,3);
        }
      }

      function drawCrowd(t,energy){
        ctx.fillStyle='rgba(0,0,0,.92)';ctx.fillRect(0,H*.79,W,H*.21);
        crowd.forEach((p,i)=>{
          const jump=(state.pattern==='pulse'||state.sync)?Math.sin(t*7+p.phase)*energy*3:0;
          ctx.fillStyle=i%18===0?rgba(state.colors[i%2],.35+energy*.35):'rgba(1,2,3,.96)';
          ctx.beginPath();ctx.arc(p.x,p.y+jump,p.r,0,6.28);ctx.fill();
          ctx.fillRect(p.x-p.r*.65,p.y+p.r+jump,p.r*1.3,p.h);
          if(i%23===0){ctx.strokeStyle=rgba(state.colors[(i+1)%2],.28+energy*.3);ctx.beginPath();ctx.moveTo(p.x,p.y+4);ctx.lineTo(p.x+Math.sin(t*2+p.phase)*6,p.y-9);ctx.stroke();}
        });
      }

      function drawParticles(t){
        if(state.haze<.12)return;
        particles.forEach((p,i)=>{
          p.y-=p.v*(.2+state.speed); if(p.y<0){p.y=H*.8;p.x=Math.random()*W;}
          const a=(.05+p.z*.22)*state.haze;
          ctx.fillStyle=rgba(state.colors[i%2],a);ctx.beginPath();ctx.arc(p.x+Math.sin(t+p.z*8)*8,p.y,.4+p.z*1.4,0,6.28);ctx.fill();
        });
      }

      function drawPattern(t,energy){
        const c1=state.colors[0], c2=state.colors[1];
        const base=.08+.24*state.haze;
        ctx.globalCompositeOperation='lighter';
        if(state.pattern==='wave'){
          for(let i=0;i<12;i++){
            const x=W*(.08+i/11*.84); const sway=Math.sin(t*(.7+state.speed*1.5)+i*.58);
            beam(x,H*.17,W*.5+sway*W*.5,W*.025+(i%3)*4,i%2?c2:c1,(base+energy*.13)*state.intensity);
          }
          ctx.lineWidth=2; for(let j=0;j<3;j++){ctx.beginPath();for(let x=0;x<W;x+=8){const y=H*(.45+j*.075)+Math.sin(x*.012+t*2.2+j)*28;if(x===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)}ctx.strokeStyle=rgba(j%2?c1:c2,.18*state.intensity);ctx.stroke();}
        } else if(state.pattern==='pulse'){
          for(let i=0;i<10;i++){const x=W*(.1+i/9*.8);beam(x,H*.17,x+(i-4.5)*10,25+energy*70,i%2?c2:c1,(base+energy*.28)*state.intensity);}
          for(let r=0;r<4;r++){ctx.beginPath();ctx.arc(W/2,H*.63,(40+r*55)*(1+energy*.18),Math.PI,Math.PI*2);ctx.strokeStyle=rgba(r%2?c1:c2,(.18-r*.025)*state.intensity);ctx.lineWidth=3;ctx.stroke();}
        } else if(state.pattern==='chase'){
          for(let i=0;i<14;i++){const phase=(i-Math.floor(t*(4+state.speed*8)))%14; const on=(phase+14)%14<4; beam(W*(.06+i/13*.88),H*.17,W*(.08+i/13*.84),on?38:12,i%2?c2:c1,(on?.38:.045)*state.intensity);}
          const lx=(t*(140+state.speed*300))%(W+300)-150;beam(lx,H*.07,W-lx,44,c1,.38*state.intensity);
        } else if(state.pattern==='prism'){
          const rainbow=['#ff476f','#ffb627','#c9ff38','#41e9ff','#7486ff','#c36cff','#ff5dc8'];
          rainbow.forEach((c,i)=>{const a=t*(.25+state.speed*.35)+i*.45;beam(W/2,H*.12,W/2+Math.sin(a)*W*.7,28,c,.24*state.intensity);});
          ctx.translate(W/2,H*.5);ctx.rotate(t*.12);for(let i=0;i<6;i++){ctx.rotate(Math.PI/3);ctx.strokeStyle=rgba(rainbow[i],.16);ctx.strokeRect(25,25,150+energy*30,150+energy*30)}ctx.setTransform(dpr,0,0,dpr,0,0);
        } else if(state.pattern==='strobe'){
          const flash=(Math.sin(t*(14+state.speed*30))>.55)?(.28+.45*state.intensity):.02;
          ctx.fillStyle=`rgba(255,255,255,${flash})`;ctx.fillRect(0,0,W,H);
          for(let i=0;i<12;i++){const x=W*(i/11);beam(x,H*.17,W-x,18,i%2?c2:c1,.14*state.intensity);}
        } else if(state.pattern==='aurora'){
          for(let band=0;band<7;band++){
            ctx.beginPath();ctx.moveTo(-30,H);
            for(let x=-30;x<=W+30;x+=18){const y=H*.2+band*16+Math.sin(x*.006+t*(.35+state.speed*.5)+band*.8)*H*.18;ctx.lineTo(x,y)}
            ctx.lineTo(W+30,H);ctx.closePath();const g=ctx.createLinearGradient(0,H*.2,0,H);g.addColorStop(0,rgba(band%2?c2:c1,.05));g.addColorStop(.55,rgba(band%2?c2:c1,.13*state.intensity));g.addColorStop(1,rgba(c1,0));ctx.fillStyle=g;ctx.fill();
          }
          for(let i=0;i<8;i++){const x=W*(.08+i/7*.84);beam(x,H*.17,W*.5+Math.sin(t*.4+i)*W*.35,50,i%2?c2:c1,.12*state.intensity);}
        }
        ctx.globalCompositeOperation='source-over';
      }

      function render(now){
        const dt=Math.min((now-last)/1000,.05);last=now;if(state.playing)elapsed+=dt*(reduceMotion?.12:1);
        const t=elapsed*(.35+state.speed*1.45);
        const beatPhase=((elapsed*state.bpm/60)%1); const synthetic=Math.pow(Math.max(0,1-beatPhase*4),3);
        state.beat=lerp(state.beat,state.sync&&state.playing?synthetic:0,.2);
        const energy=.12+state.beat*.88;
        const bg=ctx.createLinearGradient(0,0,0,H);bg.addColorStop(0,'#04060a');bg.addColorStop(.62,'#0a0d12');bg.addColorStop(1,'#030405');ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
        const glow=ctx.createRadialGradient(W/2,H*.52,0,W/2,H*.52,W*.55);glow.addColorStop(0,rgba(state.colors[1],(.035+energy*.025)*state.haze));glow.addColorStop(1,rgba(state.colors[0],0));ctx.fillStyle=glow;ctx.fillRect(0,0,W,H);
        drawPattern(t,energy);drawRig(t);drawStage(t,energy);drawParticles(t);drawCrowd(t,energy);
        if(state.transition<1){state.transition=Math.min(1,state.transition+dt*3);ctx.fillStyle=`rgba(255,255,255,${(1-state.transition)*.16})`;ctx.fillRect(0,0,W,H);}
        frameCount++;fpsTime+=dt;if(fpsTime>.5){document.getElementById('fps').textContent=Math.round(frameCount/fpsTime);frameCount=0;fpsTime=0;}
        updateSpectrum(energy,t);requestAnimationFrame(render);
      }

      function setPattern(name, notify=true){
        if(!patternNames[name])return;state.lastPattern=state.pattern;state.pattern=name;state.transition=0;
        document.querySelectorAll('.pattern-btn').forEach(b=>b.classList.toggle('active',b.dataset.pattern===name));
        const [a,b]=patternNames[name];document.getElementById('cueTitle').innerHTML=`${a}<br><span>${b}</span>`;
        document.getElementById('cueNumber').textContent=String(patterns.indexOf(name)+1).padStart(2,'0');
        if(notify) toast(`${a} ${b} loaded`);
      }
      document.getElementById('patterns').addEventListener('click',e=>{const b=e.target.closest('.pattern-btn');if(b)setPattern(b.dataset.pattern)});
      function stepPattern(dir){let i=patterns.indexOf(state.pattern);setPattern(patterns[(i+dir+patterns.length)%patterns.length]);}
      document.getElementById('prevBtn').onclick=()=>stepPattern(-1); document.getElementById('nextBtn').onclick=()=>stepPattern(1);

      function setColors(colors, el){
        state.colors=colors; const rgb=hexRgb(colors[0]);
        document.documentElement.style.setProperty('--active',colors[0]);document.documentElement.style.setProperty('--active-rgb',rgb.join(','));
        document.querySelectorAll('.swatch').forEach(s=>s.classList.toggle('active',s===el));
      }
      document.getElementById('palette').addEventListener('click',e=>{const sw=e.target.closest('.swatch');if(sw){setColors(sw.dataset.colors.split(','),sw);toast('Color scene updated')}});
      document.getElementById('colorWheel').onclick=()=>document.getElementById('customColor').click();
      document.getElementById('customColor').oninput=e=>{const c=e.target.value;setColors([c,state.colors[1]],null)};

      [['intensity','intensityVal','intensity'],['speed','speedVal','speed'],['haze','hazeVal','haze']].forEach(([id,out,key])=>{
        const input=document.getElementById(id);input.oninput=()=>{const v=+input.value;state[key]=v/100;input.style.setProperty('--fill',v+'%');document.getElementById(out).textContent=v+'%';if(id==='intensity')document.getElementById('masterReadout').innerHTML=`${v}<small>%</small>`;};
      });

      const playBtn=document.getElementById('playBtn'), playIcon=document.getElementById('playIcon');
      playBtn.onclick=async()=>{
        state.playing=!state.playing; playBtn.setAttribute('aria-label',state.playing?'Pause show':'Play show');
        playIcon.innerHTML=state.playing?'<path d="M8 5h3v14H8zM13 5h3v14h-3z"/>':'<path d="m8 5 11 7-11 7z"/>';
        if(state.playing){await startAudio();toast('Show running · audio armed')}else{if(masterGain)masterGain.gain.setTargetAtTime(0,audioCtx.currentTime,.04);toast('Show paused')}
      };

      function makeKick(time){ if(!audioCtx||!state.playing)return; const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.frequency.setValueAtTime(125,time);o.frequency.exponentialRampToValueAtTime(42,time+.12);g.gain.setValueAtTime(.24,time);g.gain.exponentialRampToValueAtTime(.001,time+.18);o.connect(g).connect(masterGain);o.start(time);o.stop(time+.2); }
      function makeHat(time){ if(!audioCtx||!state.playing)return; const n=audioCtx.createBufferSource(),buf=audioCtx.createBuffer(1,audioCtx.sampleRate*.025,audioCtx.sampleRate),d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;n.buffer=buf;const f=audioCtx.createBiquadFilter(),g=audioCtx.createGain();f.type='highpass';f.frequency.value=6500;g.gain.setValueAtTime(.018,time);g.gain.exponentialRampToValueAtTime(.001,time+.03);n.connect(f).connect(g).connect(masterGain);n.start(time); }
      function scheduleAudio(){ if(!audioCtx)return; while(nextNote<audioCtx.currentTime+.1){if(beatIndex%4===0)makeKick(nextNote);makeHat(nextNote);beatIndex++;nextNote+=60/state.bpm/2;} }
      async function startAudio(){
        if(!audioCtx){audioCtx=new (AudioContext||webkitAudioContext)();masterGain=audioCtx.createGain();masterGain.gain.value=.14;masterGain.connect(audioCtx.destination);nextNote=audioCtx.currentTime+.05;scheduler=setInterval(scheduleAudio,25);state.audioStarted=true;}
        await audioCtx.resume();masterGain.gain.setTargetAtTime(.14,audioCtx.currentTime,.04);
      }

      const syncToggle=document.getElementById('syncToggle');
      syncToggle.onclick=()=>{state.sync=!state.sync;syncToggle.classList.toggle('on',state.sync);syncToggle.setAttribute('aria-checked',state.sync);document.getElementById('syncStatus').textContent=state.sync?'Linked':'Free';document.getElementById('syncStatus').style.color=state.sync?'var(--lime)':'var(--muted)';toast(state.sync?'Beat sync linked':'Running free')};
      function setBpm(v){state.bpm=Math.max(70,Math.min(180,Math.round(v)));document.getElementById('bpmValue').textContent=state.bpm;document.getElementById('tempoReadout').innerHTML=`${state.bpm}<small>BPM</small>`;}
      document.getElementById('bpmUp').onclick=()=>setBpm(state.bpm+1);document.getElementById('bpmDown').onclick=()=>setBpm(state.bpm-1);
      let taps=[];document.getElementById('tapBtn').onclick=e=>{const n=performance.now();taps=taps.filter(x=>n-x<2500);taps.push(n);if(taps.length>1){const gaps=taps.slice(1).map((x,i)=>x-taps[i]);setBpm(60000/(gaps.reduce((a,b)=>a+b,0)/gaps.length));}e.currentTarget.classList.add('flash');setTimeout(()=>e.currentTarget.classList.remove('flash'),120)};

      const bars=document.getElementById('spectrum');
      for(let i=0;i<28;i++)bars.appendChild(document.createElement('i'));
      function updateSpectrum(energy,t){[...bars.children].forEach((bar,i)=>{const wave=(Math.sin(t*4+i*.72)+1)/2;const fall=1-Math.abs(i-9)/24;bar.style.height=(10+(wave*.48+energy*.72)*Math.max(.2,fall)*32)+'px';});}

      document.getElementById('randomBtn').onclick=()=>{
        setPattern(patterns[Math.floor(Math.random()*patterns.length)],false);
        const scenes=[['#ff476f','#41e9ff'],['#c9ff38','#41e9ff'],['#ffb627','#ff476f'],['#a76dff','#ff5dc8'],['#f4f5ff','#7486ff'],['#ff3d2e','#ffef5a']];
        const c=scenes[Math.floor(Math.random()*scenes.length)];setColors(c,null);
        const s=35+Math.floor(Math.random()*60);document.getElementById('speed').value=s;document.getElementById('speed').dispatchEvent(new Event('input'));toast('Fresh show scene generated');
      };
      document.getElementById('helpBtn').onclick=()=>toast('Space play · ← → patterns · R randomize');
      addEventListener('keydown',e=>{if(e.target.matches('input'))return;if(e.code==='Space'){e.preventDefault();playBtn.click()}if(e.key==='ArrowRight')stepPattern(1);if(e.key==='ArrowLeft')stepPattern(-1);if(e.key.toLowerCase()==='r')document.getElementById('randomBtn').click();});
      let toastTimer;function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),1800)}

      requestAnimationFrame(render);
    })();
  </script>
</body>
</html>
