<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f2efe6">
  <title>Tiny Kanban — Standup Board</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #f2efe6;
      --surface: #fbfaf5;
      --surface-strong: #ffffff;
      --ink: #17201d;
      --muted: #68716d;
      --line: #cfd1c9;
      --line-strong: #aeb3ab;
      --coral: #ff5a3d;
      --coral-dark: #d93b20;
      --yellow: #ffc847;
      --blue: #5d83e8;
      --green: #2f9b68;
      --shadow: 0 12px 28px rgba(23, 32, 29, .10), 0 2px 5px rgba(23, 32, 29, .08);
      --radius: 14px;
    }

    * { box-sizing: border-box; }

    html, body { min-height: 100%; }

    body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: "Manrope", sans-serif;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
    }

    button, input, select, textarea { font: inherit; }

    button { color: inherit; }

    button, [draggable="true"] { -webkit-tap-highlight-color: transparent; }

    ::selection { background: var(--yellow); color: var(--ink); }

    .app-shell { min-height: 100vh; display: flex; flex-direction: column; }

    .topbar {
      min-height: 84px;
      padding: 18px clamp(20px, 3vw, 48px);
      display: grid;
      grid-template-columns: auto minmax(260px, 520px) auto;
      align-items: center;
      gap: 28px;
      border-bottom: 1px solid var(--line-strong);
      background: rgba(242, 239, 230, .94);
      position: sticky;
      top: 0;
      z-index: 30;
      backdrop-filter: blur(14px);
    }

    .brand { display: flex; align-items: center; gap: 12px; min-width: max-content; }

    .brand-mark {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border: 2px solid var(--ink);
      border-radius: 12px;
      background: var(--coral);
      box-shadow: 3px 3px 0 var(--ink);
      font-family: "IBM Plex Mono", monospace;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -.06em;
    }

    .brand-copy strong { display: block; font-size: 17px; letter-spacing: -.04em; line-height: 1.1; }
    .brand-copy span { display: block; margin-top: 4px; color: var(--muted); font: 500 10px/1 "IBM Plex Mono", monospace; letter-spacing: .12em; text-transform: uppercase; }

    .search-wrap { position: relative; width: 100%; }

    .search-wrap svg {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      width: 19px;
      color: var(--muted);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      height: 48px;
      padding: 0 54px 0 46px;
      border: 1.5px solid var(--line-strong);
      border-radius: 12px;
      outline: none;
      background: var(--surface);
      color: var(--ink);
      transition: border-color .18s ease, box-shadow .18s ease, background .18s ease;
    }

    .search-input::placeholder { color: #868d89; }
    .search-input:focus { border-color: var(--ink); background: #fff; box-shadow: 0 0 0 4px rgba(23, 32, 29, .09); }

    .shortcut {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      min-width: 28px;
      height: 26px;
      padding: 0 7px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-bottom-width: 2px;
      border-radius: 6px;
      background: #fff;
      color: var(--muted);
      font: 600 11px/1 "IBM Plex Mono", monospace;
    }

    .top-actions { display: flex; align-items: center; gap: 10px; justify-self: end; }

    .icon-btn, .ghost-btn, .primary-btn, .timer-btn, .delete-btn, .move-btn, .close-btn {
      border: 0;
      cursor: pointer;
    }

    .primary-btn {
      min-height: 46px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      padding: 0 18px;
      border: 1.5px solid var(--ink);
      border-radius: 11px;
      background: var(--ink);
      color: #fff;
      font-weight: 700;
      box-shadow: 3px 3px 0 var(--coral);
      transition: transform .15s ease, box-shadow .15s ease, background .15s ease;
    }

    .primary-btn:hover { background: #29332f; transform: translate(-1px, -1px); box-shadow: 5px 5px 0 var(--coral); }
    .primary-btn:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 var(--coral); }
    .primary-btn svg { width: 18px; }

    .mobile-search-btn { display: none; }

    button:focus-visible, [draggable="true"]:focus-visible { outline: 3px solid var(--blue); outline-offset: 3px; }

    .standup-strip {
      margin: 0 clamp(20px, 3vw, 48px);
      padding: 24px 0 22px;
      display: grid;
      grid-template-columns: minmax(260px, 1.25fr) minmax(260px, .9fr) auto;
      align-items: center;
      gap: clamp(24px, 4vw, 64px);
      border-bottom: 1px solid var(--line-strong);
    }

    .meeting-kicker { margin: 0 0 5px; color: var(--coral-dark); font: 600 11px/1.2 "IBM Plex Mono", monospace; letter-spacing: .13em; text-transform: uppercase; }
    .meeting-title { margin: 0; font-size: clamp(24px, 2.4vw, 36px); line-height: 1.08; letter-spacing: -.055em; }
    .meeting-title span { color: var(--muted); font-weight: 500; }

    .progress-block { min-width: 0; }
    .progress-meta { display: flex; align-items: end; justify-content: space-between; gap: 16px; margin-bottom: 9px; }
    .progress-meta span:first-child { font-weight: 700; font-size: 13px; }
    .progress-meta strong { font: 600 12px/1 "IBM Plex Mono", monospace; }
    .progress-track { width: 100%; height: 9px; overflow: hidden; border: 1px solid var(--ink); border-radius: 999px; background: var(--surface); }
    .progress-fill { height: 100%; width: 0; background: var(--green); border-right: 1px solid var(--ink); transition: width .5s cubic-bezier(.2, .8, .2, 1); }

    .timer { display: flex; align-items: center; gap: 12px; }
    .timer-label { text-align: right; }
    .timer-label span { display: block; color: var(--muted); font: 500 9px/1.2 "IBM Plex Mono", monospace; text-transform: uppercase; letter-spacing: .12em; }
    .timer-label strong { display: block; margin-top: 4px; font: 600 21px/1 "IBM Plex Mono", monospace; letter-spacing: -.05em; }
    .timer-btn {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border: 1.5px solid var(--ink);
      border-radius: 50%;
      background: var(--yellow);
      transition: transform .15s ease, background .15s ease;
    }
    .timer-btn:hover { transform: scale(1.06); }
    .timer-btn.active { background: var(--coral); }
    .timer-btn svg { width: 16px; height: 16px; fill: currentColor; }
    .timer-btn .pause-icon { display: none; }
    .timer-btn.active .play-icon { display: none; }
    .timer-btn.active .pause-icon { display: block; }

    .board {
      width: 100%;
      flex: 1;
      display: grid;
      grid-template-columns: repeat(3, minmax(290px, 1fr));
      gap: 16px;
      padding: 20px clamp(20px, 3vw, 48px) 38px;
      overflow-x: auto;
    }

    .column {
      min-height: 520px;
      padding: 15px;
      border: 1.5px solid var(--line-strong);
      border-radius: 18px;
      background: rgba(251, 250, 245, .62);
      transition: border-color .18s ease, background .18s ease, transform .18s ease;
    }

    .column.drag-over { border-color: var(--ink); background: rgba(255,255,255,.9); transform: translateY(-2px); box-shadow: inset 0 0 0 2px var(--yellow); }
    .column.limit-hit { animation: shake .36s ease; box-shadow: inset 0 0 0 2px var(--coral); }

    @keyframes shake { 25% { transform: translateX(-5px); } 50% { transform: translateX(5px); } 75% { transform: translateX(-2px); } }

    .column-header { display: flex; align-items: center; gap: 10px; min-height: 48px; padding: 0 4px 13px; border-bottom: 1px solid var(--line); }
    .status-dot { width: 10px; height: 10px; border: 2px solid var(--ink); border-radius: 50%; background: #fff; }
    .column[data-column="doing"] .status-dot { background: var(--yellow); }
    .column[data-column="done"] .status-dot { background: var(--green); }
    .column-title { margin: 0; font-size: 18px; letter-spacing: -.035em; }
    .column-count { display: grid; place-items: center; min-width: 27px; height: 24px; padding: 0 7px; border: 1px solid var(--line-strong); border-radius: 999px; background: var(--surface-strong); font: 600 11px/1 "IBM Plex Mono", monospace; }
    .limit { margin-left: auto; color: var(--muted); font: 500 10px/1 "IBM Plex Mono", monospace; letter-spacing: .04em; text-transform: uppercase; }
    .limit b { color: var(--ink); }
    .limit.at-limit { color: var(--coral-dark); }

    .card-list { min-height: 440px; display: flex; flex-direction: column; gap: 11px; padding-top: 13px; }

    .task-card {
      position: relative;
      padding: 17px 16px 14px 18px;
      border: 1.5px solid #bfc3bb;
      border-radius: var(--radius);
      background: var(--surface-strong);
      box-shadow: 0 2px 0 rgba(23, 32, 29, .05);
      cursor: grab;
      animation: cardIn .34s both cubic-bezier(.2, .8, .2, 1);
      transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease, opacity .16s ease;
    }

    .task-card::before { content: ""; position: absolute; left: -1.5px; top: 15px; bottom: 15px; width: 5px; border-radius: 0 4px 4px 0; background: var(--blue); }
    .task-card[data-priority="high"]::before { background: var(--coral); }
    .task-card[data-priority="medium"]::before { background: var(--yellow); }
    .task-card[data-priority="low"]::before { background: var(--blue); }
    .task-card:hover { transform: translateY(-3px) rotate(-.2deg); border-color: var(--ink); box-shadow: var(--shadow); z-index: 2; }
    .task-card.dragging { opacity: .32; transform: rotate(2deg) scale(.98); }
    .task-card.drop-before { box-shadow: 0 -5px 0 var(--coral); }

    @keyframes cardIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .priority-pill { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); font: 600 9px/1 "IBM Plex Mono", monospace; letter-spacing: .09em; text-transform: uppercase; }
    .priority-pill::before { content: ""; width: 7px; height: 7px; border-radius: 50%; background: var(--blue); }
    .task-card[data-priority="high"] .priority-pill::before { background: var(--coral); }
    .task-card[data-priority="medium"] .priority-pill::before { background: var(--yellow); border: 1px solid #b98300; }

    .card-actions { margin-left: auto; display: flex; align-items: center; gap: 2px; opacity: 0; transition: opacity .15s ease; }
    .task-card:hover .card-actions, .task-card:focus-within .card-actions { opacity: 1; }
    .move-btn, .delete-btn { width: 28px; height: 28px; display: grid; place-items: center; border-radius: 7px; background: transparent; color: var(--muted); }
    .move-btn:hover { background: var(--paper); color: var(--ink); }
    .delete-btn:hover { background: #fff0ed; color: var(--coral-dark); }
    .move-btn svg, .delete-btn svg { width: 15px; height: 15px; }
    .move-btn[disabled] { opacity: .25; cursor: not-allowed; }

    .card-title { margin: 0; font-size: 16px; line-height: 1.35; letter-spacing: -.025em; }
    .card-desc { margin: 7px 0 0; color: var(--muted); font-size: 12px; line-height: 1.45; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .card-footer { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-top: 16px; }
    .assignee { display: flex; align-items: center; gap: 8px; min-width: 0; }
    .avatar { width: 29px; height: 29px; flex: 0 0 auto; display: grid; place-items: center; border: 1.5px solid var(--ink); border-radius: 50%; background: var(--avatar, var(--yellow)); font-size: 9px; font-weight: 800; }
    .assignee-name { overflow: hidden; color: var(--muted); font-size: 11px; font-weight: 600; text-overflow: ellipsis; white-space: nowrap; }
    .card-id { color: #969c98; font: 500 9px/1 "IBM Plex Mono", monospace; }

    .empty-state { min-height: 180px; display: grid; place-items: center; align-content: center; gap: 10px; border: 1.5px dashed var(--line-strong); border-radius: var(--radius); color: var(--muted); text-align: center; }
    .empty-state svg { width: 30px; opacity: .7; }
    .empty-state p { margin: 0; font-size: 12px; }

    .add-column-btn { width: 100%; min-height: 43px; margin-top: 11px; border: 1.5px dashed var(--line-strong); border-radius: 11px; background: transparent; color: var(--muted); cursor: pointer; font-size: 12px; font-weight: 700; transition: border-color .15s, color .15s, background .15s; }
    .add-column-btn:hover { border-color: var(--ink); color: var(--ink); background: rgba(255,255,255,.65); }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      place-items: center;
      padding: 20px;
      background: rgba(23, 32, 29, .42);
      backdrop-filter: blur(5px);
    }
    .modal-backdrop.open { display: grid; animation: fadeIn .18s ease; }
    @keyframes fadeIn { from { opacity: 0; } }

    .modal {
      width: min(560px, 100%);
      max-height: calc(100vh - 40px);
      overflow-y: auto;
      padding: 25px;
      border: 1.5px solid var(--ink);
      border-radius: 20px;
      background: var(--surface);
      box-shadow: 8px 8px 0 var(--ink);
      animation: modalIn .24s cubic-bezier(.2,.8,.2,1);
    }
    @keyframes modalIn { from { opacity: 0; transform: translateY(18px) scale(.98); } }

    .modal-head { display: flex; justify-content: space-between; align-items: start; gap: 20px; margin-bottom: 24px; }
    .modal-kicker { margin: 0 0 7px; color: var(--coral-dark); font: 600 10px/1 "IBM Plex Mono", monospace; letter-spacing: .1em; text-transform: uppercase; }
    .modal-title { margin: 0; font-size: 27px; letter-spacing: -.055em; }
    .close-btn { width: 38px; height: 38px; display: grid; place-items: center; border: 1px solid var(--line); border-radius: 10px; background: #fff; }
    .close-btn:hover { border-color: var(--ink); }
    .close-btn svg { width: 18px; }

    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; margin-bottom: 7px; font-size: 11px; font-weight: 800; letter-spacing: .04em; text-transform: uppercase; }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%;
      padding: 12px 13px;
      border: 1.5px solid var(--line-strong);
      border-radius: 10px;
      outline: none;
      background: #fff;
      color: var(--ink);
      transition: border .15s, box-shadow .15s;
    }
    .form-group textarea { min-height: 88px; resize: vertical; line-height: 1.45; }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--ink); box-shadow: 0 0 0 3px rgba(23,32,29,.08); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    .priority-picker { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .priority-option { position: relative; }
    .priority-option input { position: absolute; opacity: 0; pointer-events: none; }
    .priority-option label { height: 43px; margin: 0; display: flex; align-items: center; justify-content: center; gap: 7px; border: 1.5px solid var(--line); border-radius: 10px; background: #fff; cursor: pointer; font-size: 10px; }
    .priority-option label::before { content: ""; width: 8px; height: 8px; border-radius: 50%; background: var(--dot); }
    .priority-option input:checked + label { border-color: var(--ink); box-shadow: inset 0 -3px 0 var(--dot); }
    .priority-option input:focus-visible + label { outline: 3px solid var(--blue); outline-offset: 2px; }

    .modal-actions { display: flex; align-items: center; justify-content: flex-end; gap: 10px; margin-top: 5px; padding-top: 18px; border-top: 1px solid var(--line); }
    .ghost-btn { min-height: 44px; padding: 0 16px; border: 1px solid var(--line-strong); border-radius: 10px; background: transparent; font-weight: 700; }
    .ghost-btn:hover { background: #fff; border-color: var(--ink); }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 26px;
      z-index: 150;
      min-width: min(380px, calc(100vw - 32px));
      max-width: calc(100vw - 32px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 13px 14px 13px 17px;
      border: 1.5px solid #000;
      border-radius: 11px;
      background: var(--ink);
      color: #fff;
      box-shadow: 5px 5px 0 var(--coral);
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, 18px);
      transition: opacity .2s ease, transform .2s ease;
    }
    .toast.show { opacity: 1; transform: translate(-50%, 0); pointer-events: auto; }
    .toast-message { font-size: 12px; font-weight: 600; }
    .toast-action { padding: 6px 9px; border: 1px solid #6d7772; border-radius: 7px; background: transparent; color: var(--yellow); cursor: pointer; font: 600 10px/1 "IBM Plex Mono", monospace; text-transform: uppercase; }
    .toast-action:empty { display: none; }

    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }

    @media (max-width: 900px) {
      .topbar { grid-template-columns: auto 1fr auto; gap: 16px; }
      .search-wrap { grid-row: 2; grid-column: 1 / -1; }
      .topbar:has(.search-wrap) { padding-bottom: 14px; }
      .standup-strip { grid-template-columns: 1fr auto; }
      .progress-block { grid-row: 2; grid-column: 1 / -1; }
      .board { grid-template-columns: repeat(3, minmax(310px, 82vw)); }
    }

    @media (max-width: 560px) {
      .topbar { min-height: 70px; padding: 12px 16px; }
      .brand-mark { width: 39px; height: 39px; }
      .brand-copy span { display: none; }
      .primary-btn { width: 43px; min-height: 43px; padding: 0; box-shadow: 2px 2px 0 var(--coral); }
      .primary-btn span { display: none; }
      .standup-strip { margin: 0 16px; padding: 18px 0; gap: 20px; }
      .meeting-title { font-size: 24px; }
      .timer-label span { display: none; }
      .board { padding: 16px 16px 30px; grid-template-columns: repeat(3, minmax(285px, 88vw)); }
      .column { min-height: 480px; }
      .form-row { grid-template-columns: 1fr; gap: 0; }
      .modal { padding: 20px; box-shadow: 5px 5px 0 var(--ink); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { scroll-behavior: auto !important; animation-duration: .01ms !important; animation-iteration-count: 1 !important; transition-duration: .01ms !important; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand" aria-label="Tiny Kanban">
        <div class="brand-mark" aria-hidden="true">TK</div>
        <div class="brand-copy"><strong>Tiny Kanban</strong><span>Team workspace</span></div>
      </div>

      <label class="search-wrap">
        <span class="sr-only">Search cards</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="7"></circle><path d="m20 20-3.4-3.4"></path></svg>
        <input class="search-input" id="searchInput" type="search" placeholder="Search cards or teammates…" autocomplete="off">
        <span class="shortcut" aria-hidden="true">/</span>
      </label>

      <div class="top-actions">
        <button class="primary-btn" id="newCardBtn" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true"><path d="M12 5v14M5 12h14"></path></svg>
          <span>New card</span>
        </button>
      </div>
    </header>

    <section class="standup-strip" aria-label="Standup overview">
      <div>
        <p class="meeting-kicker" id="todayLabel">Today’s standup</p>
        <h1 class="meeting-title">Good morning, team. <span>Let’s sync.</span></h1>
      </div>
      <div class="progress-block">
        <div class="progress-meta"><span>Board progress</span><strong id="progressText">0 / 0 done</strong></div>
        <div class="progress-track" role="progressbar" aria-label="Board progress" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"><div class="progress-fill" id="progressFill"></div></div>
      </div>
      <div class="timer">
        <div class="timer-label"><span>Standup clock</span><strong id="timerDisplay">00:00</strong></div>
        <button class="timer-btn" id="timerBtn" type="button" aria-label="Start standup timer" title="Start / pause timer">
          <svg class="play-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5.3v13.4L19 12 8 5.3Z"></path></svg>
          <svg class="pause-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M7 5h4v14H7zM13 5h4v14h-4z"></path></svg>
        </button>
      </div>
    </section>

    <main class="board" id="board" aria-label="Kanban board"></main>
  </div>

  <div class="modal-backdrop" id="modalBackdrop" role="presentation">
    <section class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-head">
        <div><p class="modal-kicker" id="modalKicker">Create task</p><h2 class="modal-title" id="modalTitle">Add a new card</h2></div>
        <button class="close-btn" id="closeModalBtn" type="button" aria-label="Close dialog"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="m6 6 12 12M18 6 6 18"></path></svg></button>
      </div>
      <form id="cardForm">
        <input type="hidden" id="editingId">
        <div class="form-group">
          <label for="titleInput">Card title</label>
          <input id="titleInput" required maxlength="80" placeholder="What needs to happen?">
        </div>
        <div class="form-group">
          <label for="descriptionInput">Notes <span style="color:var(--muted);font-weight:600;text-transform:none">(optional)</span></label>
          <textarea id="descriptionInput" maxlength="180" placeholder="Add the context your team needs…"></textarea>
        </div>
        <div class="form-group">
          <label>Priority</label>
          <div class="priority-picker">
            <div class="priority-option" style="--dot:var(--coral)"><input type="radio" name="priority" id="priorityHigh" value="high"><label for="priorityHigh">High</label></div>
            <div class="priority-option" style="--dot:var(--yellow)"><input type="radio" name="priority" id="priorityMedium" value="medium" checked><label for="priorityMedium">Medium</label></div>
            <div class="priority-option" style="--dot:var(--blue)"><input type="radio" name="priority" id="priorityLow" value="low"><label for="priorityLow">Low</label></div>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group"><label for="assigneeInput">Assignee</label><select id="assigneeInput"></select></div>
          <div class="form-group"><label for="columnInput">Status</label><select id="columnInput"><option value="todo">Todo</option><option value="doing">Doing</option><option value="done">Done</option></select></div>
        </div>
        <div class="modal-actions">
          <button class="ghost-btn" id="cancelModalBtn" type="button">Cancel</button>
          <button class="primary-btn" type="submit"><span id="submitLabel">Create card</span></button>
        </div>
      </form>
    </section>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"><span class="toast-message" id="toastMessage"></span><button class="toast-action" id="toastAction" type="button"></button></div>

  <script>
    (() => {
      'use strict';

      const STORAGE_KEY = 'tiny-kanban-board-v1';
      const columns = [
        { id: 'todo', title: 'Todo', limit: 6 },
        { id: 'doing', title: 'Doing', limit: 3 },
        { id: 'done', title: 'Done', limit: Infinity }
      ];
      const people = {
        maya: { name: 'Maya Chen', initials: 'MC', color: '#ffc847' },
        theo: { name: 'Theo Grant', initials: 'TG', color: '#80b8f0' },
        lina: { name: 'Lina Park', initials: 'LP', color: '#f79d86' },
        sam: { name: 'Sam Ortiz', initials: 'SO', color: '#8dd2aa' }
      };
      const defaults = [
        { id: 'TK-104', title: 'Tighten onboarding checklist', description: 'Trim setup steps and add the missing workspace invite.', priority: 'high', assignee: 'maya', column: 'todo' },
        { id: 'TK-105', title: 'Confirm analytics events', description: 'Audit the new activation funnel before release.', priority: 'medium', assignee: 'theo', column: 'todo' },
        { id: 'TK-106', title: 'Draft release notes', description: 'Keep the update crisp and customer-facing.', priority: 'low', assignee: 'lina', column: 'todo' },
        { id: 'TK-107', title: 'Polish empty states', description: 'Final copy pass for projects and search.', priority: 'medium', assignee: 'sam', column: 'todo' },
        { id: 'TK-101', title: 'QA mobile navigation', description: 'One last pass on small screens and touch targets.', priority: 'high', assignee: 'maya', column: 'doing' },
        { id: 'TK-102', title: 'Harden billing webhooks', description: 'Add retry logging and verify idempotency.', priority: 'high', assignee: 'theo', column: 'doing' },
        { id: 'TK-103', title: 'Run design review', description: 'Resolve remaining comments on the settings flow.', priority: 'low', assignee: 'sam', column: 'doing' },
        { id: 'TK-098', title: 'Ship profile photos', description: 'Avatar upload is live in account settings.', priority: 'medium', assignee: 'lina', column: 'done' },
        { id: 'TK-099', title: 'Fix export formatting', description: 'CSV dates now respect workspace locale.', priority: 'low', assignee: 'theo', column: 'done' },
        { id: 'TK-100', title: 'Write support handoff', description: 'Known issues and rollout notes are documented.', priority: 'medium', assignee: 'maya', column: 'done' }
      ];

      const board = document.getElementById('board');
      const searchInput = document.getElementById('searchInput');
      const modalBackdrop = document.getElementById('modalBackdrop');
      const form = document.getElementById('cardForm');
      const toast = document.getElementById('toast');
      const toastMessage = document.getElementById('toastMessage');
      const toastAction = document.getElementById('toastAction');
      let tasks = loadTasks();
      let draggedId = null;
      let deletedSnapshot = null;
      let toastTimer = null;
      let timerSeconds = 0;
      let timerInterval = null;

      function loadTasks() {
        try {
          const stored = JSON.parse(localStorage.getItem(STORAGE_KEY));
          return Array.isArray(stored) ? stored : defaults;
        } catch (_) { return defaults; }
      }

      function saveTasks() {
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); } catch (_) {}
      }

      function escapeHtml(value = '') {
        return String(value).replace(/[&<>'"]/g, char => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' })[char]);
      }

      function icon(name) {
        const paths = {
          trash: '<path d="M4 7h16M9 7V4h6v3m3 0-1 13H7L6 7m4 4v5m4-5v5"></path>',
          left: '<path d="m15 18-6-6 6-6"></path>',
          right: '<path d="m9 18 6-6-6-6"></path>',
          inbox: '<path d="M4 5h16v14H4zM4 14h5l1.5 2h3l1.5-2h5"></path>'
        };
        return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">${paths[name]}</svg>`;
      }

      function render() {
        const query = searchInput.value.trim().toLowerCase();
        board.innerHTML = columns.map((col, colIndex) => {
          const allInColumn = tasks.filter(task => task.column === col.id);
          const visible = allInColumn.filter(task => {
            const person = people[task.assignee];
            return !query || `${task.title} ${task.description || ''} ${person?.name || ''} ${task.priority}`.toLowerCase().includes(query);
          });
          const countLabel = query ? `${visible.length}/${allInColumn.length}` : `${allInColumn.length}`;
          const atLimit = Number.isFinite(col.limit) && allInColumn.length >= col.limit;
          const limitLabel = Number.isFinite(col.limit) ? `<span class="limit ${atLimit ? 'at-limit' : ''}"><b>${allInColumn.length}</b> / ${col.limit} WIP</span>` : '<span class="limit">No limit</span>';
          const cards = visible.length ? visible.map((task, i) => cardTemplate(task, colIndex, i)).join('') : emptyTemplate(query);
          return `
            <section class="column" data-column="${col.id}" aria-labelledby="heading-${col.id}">
              <header class="column-header">
                <span class="status-dot" aria-hidden="true"></span>
                <h2 class="column-title" id="heading-${col.id}">${col.title}</h2>
                <span class="column-count" aria-label="${visible.length} visible cards">${countLabel}</span>
                ${limitLabel}
              </header>
              <div class="card-list" data-column="${col.id}">${cards}</div>
              <button class="add-column-btn" type="button" data-add-to="${col.id}">+ Add to ${col.title}</button>
            </section>`;
        }).join('');
        updateProgress();
        bindDragEvents();
      }

      function cardTemplate(task, colIndex, index) {
        const person = people[task.assignee] || people.maya;
        const previousDisabled = colIndex === 0;
        const nextDisabled = colIndex === columns.length - 1;
        return `
          <article class="task-card" draggable="true" tabindex="0" data-id="${escapeHtml(task.id)}" data-priority="${escapeHtml(task.priority)}" style="animation-delay:${Math.min(index * 35, 180)}ms" aria-label="${escapeHtml(task.title)}, ${task.priority} priority, assigned to ${person.name}">
            <div class="card-top">
              <span class="priority-pill">${escapeHtml(task.priority)}</span>
              <div class="card-actions">
                <button class="move-btn" type="button" data-move="-1" ${previousDisabled ? 'disabled' : ''} aria-label="Move ${escapeHtml(task.title)} left">${icon('left')}</button>
                <button class="move-btn" type="button" data-move="1" ${nextDisabled ? 'disabled' : ''} aria-label="Move ${escapeHtml(task.title)} right">${icon('right')}</button>
                <button class="delete-btn" type="button" data-delete aria-label="Delete ${escapeHtml(task.title)}">${icon('trash')}</button>
              </div>
            </div>
            <h3 class="card-title">${escapeHtml(task.title)}</h3>
            ${task.description ? `<p class="card-desc">${escapeHtml(task.description)}</p>` : ''}
            <footer class="card-footer">
              <div class="assignee"><span class="avatar" style="--avatar:${person.color}">${person.initials}</span><span class="assignee-name">${person.name}</span></div>
              <span class="card-id">${escapeHtml(task.id)}</span>
            </footer>
          </article>`;
      }

      function emptyTemplate(isSearching) {
        return `<div class="empty-state">${icon('inbox')}<p>${isSearching ? 'No matching cards here.' : 'Clear lane. Nice work.'}</p></div>`;
      }

      function updateProgress() {
        const done = tasks.filter(task => task.column === 'done').length;
        const total = tasks.length;
        const percent = total ? Math.round(done / total * 100) : 0;
        document.getElementById('progressText').textContent = `${done} / ${total} done`;
        document.getElementById('progressFill').style.width = `${percent}%`;
        document.querySelector('.progress-track').setAttribute('aria-valuenow', percent);
      }

      function bindDragEvents() {
        document.querySelectorAll('.task-card').forEach(card => {
          card.addEventListener('dragstart', event => {
            draggedId = card.dataset.id;
            event.dataTransfer.effectAllowed = 'move';
            event.dataTransfer.setData('text/plain', draggedId);
            requestAnimationFrame(() => card.classList.add('dragging'));
          });
          card.addEventListener('dragend', () => {
            draggedId = null;
            document.querySelectorAll('.dragging, .drag-over, .drop-before').forEach(el => el.classList.remove('dragging', 'drag-over', 'drop-before'));
          });
        });

        document.querySelectorAll('.column').forEach(column => {
          column.addEventListener('dragover', event => {
            event.preventDefault();
            event.dataTransfer.dropEffect = 'move';
            document.querySelectorAll('.column.drag-over').forEach(el => { if (el !== column) el.classList.remove('drag-over'); });
            column.classList.add('drag-over');
            document.querySelectorAll('.drop-before').forEach(el => el.classList.remove('drop-before'));
            const hovered = event.target.closest('.task-card:not(.dragging)');
            if (hovered && event.clientY < hovered.getBoundingClientRect().top + hovered.offsetHeight / 2) hovered.classList.add('drop-before');
          });
          column.addEventListener('dragleave', event => {
            if (!column.contains(event.relatedTarget)) column.classList.remove('drag-over');
          });
          column.addEventListener('drop', event => {
            event.preventDefault();
            const id = event.dataTransfer.getData('text/plain') || draggedId;
            const targetColumn = column.dataset.column;
            const targetCard = event.target.closest('.task-card:not(.dragging)');
            const before = targetCard && event.clientY < targetCard.getBoundingClientRect().top + targetCard.offsetHeight / 2;
            moveTask(id, targetColumn, before ? targetCard.dataset.id : null);
          });
        });
      }

      function moveTask(id, targetColumn, beforeId = null) {
        const task = tasks.find(item => item.id === id);
        if (!task) return;
        if (task.column !== targetColumn && !canEnter(targetColumn)) {
          flashLimit(targetColumn);
          showToast(`${columnTitle(targetColumn)} is at its WIP limit.`);
          render();
          return;
        }
        const from = task.column;
        tasks = tasks.filter(item => item.id !== id);
        task.column = targetColumn;
        if (beforeId) {
          const index = tasks.findIndex(item => item.id === beforeId);
          tasks.splice(index < 0 ? tasks.length : index, 0, task);
        } else {
          const lastIndex = tasks.reduce((last, item, index) => item.column === targetColumn ? index : last, -1);
          tasks.splice(lastIndex + 1, 0, task);
        }
        saveTasks();
        render();
        if (from !== targetColumn) showToast(`Moved to ${columnTitle(targetColumn)}.`);
      }

      function canEnter(columnId, excludingId = null) {
        const col = columns.find(item => item.id === columnId);
        if (!col || !Number.isFinite(col.limit)) return true;
        return tasks.filter(task => task.column === columnId && task.id !== excludingId).length < col.limit;
      }

      function flashLimit(columnId) {
        setTimeout(() => {
          const el = document.querySelector(`[data-column="${columnId}"]`);
          if (el) { el.classList.add('limit-hit'); setTimeout(() => el.classList.remove('limit-hit'), 500); }
        }, 20);
      }

      function columnTitle(id) { return columns.find(col => col.id === id)?.title || id; }

      function openModal(column = 'todo', task = null) {
        form.reset();
        document.getElementById('priorityMedium').checked = true;
        document.getElementById('editingId').value = task?.id || '';
        document.getElementById('titleInput').value = task?.title || '';
        document.getElementById('descriptionInput').value = task?.description || '';
        document.getElementById('assigneeInput').value = task?.assignee || 'maya';
        document.getElementById('columnInput').value = task?.column || column;
        if (task) document.querySelector(`input[name="priority"][value="${task.priority}"]`).checked = true;
        document.getElementById('modalKicker').textContent = task ? task.id : 'Create task';
        document.getElementById('modalTitle').textContent = task ? 'Edit card' : 'Add a new card';
        document.getElementById('submitLabel').textContent = task ? 'Save changes' : 'Create card';
        modalBackdrop.classList.add('open');
        document.body.style.overflow = 'hidden';
        setTimeout(() => document.getElementById('titleInput').focus(), 50);
      }

      function closeModal() {
        modalBackdrop.classList.remove('open');
        document.body.style.overflow = '';
      }

      function generateId() {
        const max = tasks.reduce((n, task) => Math.max(n, parseInt(String(task.id).replace(/\D/g, ''), 10) || 0), 107);
        return `TK-${max + 1}`;
      }

      function showToast(message, actionText = '', action = null) {
        clearTimeout(toastTimer);
        toastMessage.textContent = message;
        toastAction.textContent = actionText;
        toastAction.onclick = action;
        toast.classList.add('show');
        toastTimer = setTimeout(() => toast.classList.remove('show'), 3600);
      }

      function deleteTask(id) {
        const index = tasks.findIndex(task => task.id === id);
        if (index < 0) return;
        deletedSnapshot = { task: tasks[index], index };
        tasks.splice(index, 1);
        saveTasks();
        render();
        showToast('Card deleted.', 'Undo', () => {
          if (!deletedSnapshot) return;
          tasks.splice(deletedSnapshot.index, 0, deletedSnapshot.task);
          deletedSnapshot = null;
          saveTasks();
          render();
          toast.classList.remove('show');
        });
      }

      board.addEventListener('click', event => {
        const addBtn = event.target.closest('[data-add-to]');
        if (addBtn) return openModal(addBtn.dataset.addTo);
        const card = event.target.closest('.task-card');
        if (!card) return;
        if (event.target.closest('[data-delete]')) return deleteTask(card.dataset.id);
        const moveBtn = event.target.closest('[data-move]');
        if (moveBtn) {
          const task = tasks.find(item => item.id === card.dataset.id);
          const currentIndex = columns.findIndex(col => col.id === task.column);
          const target = columns[currentIndex + Number(moveBtn.dataset.move)];
          if (target) moveTask(task.id, target.id);
          return;
        }
        openModal(undefined, tasks.find(item => item.id === card.dataset.id));
      });

      board.addEventListener('keydown', event => {
        const card = event.target.closest('.task-card');
        if (card && (event.key === 'Enter' || event.key === ' ')) {
          event.preventDefault();
          openModal(undefined, tasks.find(item => item.id === card.dataset.id));
        }
      });

      form.addEventListener('submit', event => {
        event.preventDefault();
        const editingId = document.getElementById('editingId').value;
        const targetColumn = document.getElementById('columnInput').value;
        const existing = tasks.find(task => task.id === editingId);
        if ((!existing || existing.column !== targetColumn) && !canEnter(targetColumn, editingId)) {
          showToast(`${columnTitle(targetColumn)} is at its WIP limit.`);
          return;
        }
        const values = {
          title: document.getElementById('titleInput').value.trim(),
          description: document.getElementById('descriptionInput').value.trim(),
          priority: document.querySelector('input[name="priority"]:checked').value,
          assignee: document.getElementById('assigneeInput').value,
          column: targetColumn
        };
        if (!values.title) return;
        if (existing) Object.assign(existing, values);
        else tasks.push({ id: generateId(), ...values });
        saveTasks();
        closeModal();
        render();
        showToast(existing ? 'Card updated.' : 'Card created.');
      });

      searchInput.addEventListener('input', render);
      document.getElementById('newCardBtn').addEventListener('click', () => openModal('todo'));
      document.getElementById('closeModalBtn').addEventListener('click', closeModal);
      document.getElementById('cancelModalBtn').addEventListener('click', closeModal);
      modalBackdrop.addEventListener('mousedown', event => { if (event.target === modalBackdrop) closeModal(); });

      document.addEventListener('keydown', event => {
        if (event.key === 'Escape' && modalBackdrop.classList.contains('open')) closeModal();
        if (event.key === '/' && !modalBackdrop.classList.contains('open') && !['INPUT', 'TEXTAREA', 'SELECT'].includes(document.activeElement.tagName)) {
          event.preventDefault(); searchInput.focus();
        }
        if (event.key.toLowerCase() === 'n' && !modalBackdrop.classList.contains('open') && !['INPUT', 'TEXTAREA', 'SELECT'].includes(document.activeElement.tagName)) openModal('todo');
      });

      document.getElementById('timerBtn').addEventListener('click', () => {
        const button = document.getElementById('timerBtn');
        if (timerInterval) {
          clearInterval(timerInterval);
          timerInterval = null;
          button.classList.remove('active');
          button.setAttribute('aria-label', 'Resume standup timer');
          showToast('Standup timer paused.');
        } else {
          timerInterval = setInterval(() => { timerSeconds += 1; updateTimer(); }, 1000);
          button.classList.add('active');
          button.setAttribute('aria-label', 'Pause standup timer');
        }
      });

      function updateTimer() {
        const minutes = String(Math.floor(timerSeconds / 60)).padStart(2, '0');
        const seconds = String(timerSeconds % 60).padStart(2, '0');
        document.getElementById('timerDisplay').textContent = `${minutes}:${seconds}`;
      }

      const date = new Intl.DateTimeFormat('en-US', { weekday: 'long', month: 'long', day: 'numeric' }).format(new Date());
      document.getElementById('todayLabel').textContent = `${date} · Daily standup`;
      document.getElementById('assigneeInput').innerHTML = Object.entries(people).map(([id, person]) => `<option value="${id}">${person.name}</option>`).join('');
      render();
    })();
  </script>
</body>
</html>
