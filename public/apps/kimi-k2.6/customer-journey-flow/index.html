<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Journey Flow</title>
  <style>
    :root {
      --bg: #f8fafc;
      --canvas-bg: #f1f5f9;
      --grid-dot: #cbd5e1;
      --text: #1e293b;
      --text-secondary: #64748b;
      --border: #e2e8f0;
      --accent: #3b82f6;
      --node-bg: #ffffff;
      --node-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.08), 0 2px 4px -2px rgb(0 0 0 / 0.06);
      --node-shadow-hover: 0 12px 20px -4px rgb(0 0 0 / 0.1), 0 4px 8px -4px rgb(0 0 0 / 0.08);
      --sidebar-width: 300px;
      --header-height: 60px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100vw;
    }

    header {
      height: var(--header-height);
      background: var(--node-bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      flex-shrink: 0;
      z-index: 10;
      gap: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      flex-shrink: 0;
    }

    .brand-icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, var(--accent), #60a5fa);
      border-radius: 8px;
      display: grid;
      place-items: center;
    }

    .brand-icon svg {
      width: 16px;
      height: 16px;
      color: white;
    }

    .header-hints {
      font-size: 12px;
      color: var(--text-secondary);
      font-weight: 500;
      display: none;
    }

    @media (min-width: 960px) {
      .header-hints { display: block; }
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--node-bg);
      color: var(--text);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
      font-family: inherit;
      white-space: nowrap;
    }

    .btn:hover {
      background: var(--bg);
      border-color: var(--text-secondary);
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .btn-primary:hover {
      background: #2563eb;
      border-color: #2563eb;
    }

    .btn-danger {
      color: #ef4444;
      border-color: #fecaca;
    }

    .btn-danger:hover {
      background: #fef2f2;
      border-color: #fca5a5;
    }

    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    .canvas-container {
      flex: 1;
      position: relative;
      overflow: hidden;
      background-color: var(--canvas-bg);
      background-image: radial-gradient(circle, var(--grid-dot) 1.2px, transparent 1.2px);
      background-size: 24px 24px;
      cursor: grab;
    }

    .canvas-container:active {
      cursor: grabbing;
    }

    .viewport {
      position: absolute;
      top: 0;
      left: 0;
      width: 0;
      height: 0;
      transform-origin: 0 0;
      will-change: transform;
    }

    .connections-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 1px;
      height: 1px;
      overflow: visible;
      pointer-events: none;
      z-index: 1;
    }

    .nodes-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 1px;
      height: 1px;
      overflow: visible;
      z-index: 2;
    }

    .node {
      position: absolute;
      width: 240px;
      min-height: 110px;
      background: var(--node-bg);
      border-radius: 12px;
      box-shadow: var(--node-shadow);
      cursor: grab;
      user-select: none;
      transition: box-shadow 0.2s ease, transform 0.15s ease;
      overflow: hidden;
      border: 2px solid transparent;
      z-index: 2;
    }

    .node:hover {
      box-shadow: var(--node-shadow-hover);
      transform: translateY(-2px);
      z-index: 3;
    }

    .node:active {
      cursor: grabbing;
    }

    .node.selected {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12), var(--node-shadow-hover);
      z-index: 4;
    }

    .node-color-strip {
      height: 5px;
      width: 100%;
      flex-shrink: 0;
    }

    .node-body {
      padding: 14px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .node-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
      outline: none;
      border-radius: 4px;
      padding: 2px 4px;
      margin: -2px -4px;
      cursor: text;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .node-title:focus {
      background: #f8fafc;
      white-space: normal;
    }

    .node-desc {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.45;
      outline: none;
      border-radius: 4px;
      padding: 2px 4px;
      margin: -2px -4px;
      cursor: text;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .node-desc:focus {
      background: #f8fafc;
      -webkit-line-clamp: unset;
      overflow: visible;
    }

    .port {
      position: absolute;
      width: 14px;
      height: 14px;
      background: white;
      border: 2.5px solid #94a3b8;
      border-radius: 50%;
      cursor: crosshair;
      opacity: 0;
      transition: opacity 0.2s, transform 0.15s, border-color 0.15s, background 0.15s;
      z-index: 5;
    }

    .node:hover .port,
    .node.selected .port {
      opacity: 1;
    }

    .port:hover {
      border-color: var(--accent);
      background: var(--accent);
      transform: scale(1.3);
    }

    .port-left { left: -8px; top: 50%; transform: translateY(-50%); }
    .port-left:hover { transform: translateY(-50%) scale(1.3); }
    .port-right { right: -8px; top: 50%; transform: translateY(-50%); }
    .port-right:hover { transform: translateY(-50%) scale(1.3); }

    .sidebar {
      width: var(--sidebar-width);
      background: var(--node-bg);
      border-left: 1px solid var(--border);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      overflow-y: auto;
      z-index: 5;
      flex-shrink: 0;
    }

    .sidebar h3 {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-secondary);
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
    }

    .field input,
    .field textarea,
    .field select {
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      width: 100%;
    }

    .field input:focus,
    .field textarea:focus,
    .field select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    .field textarea {
      resize: vertical;
      min-height: 72px;
    }

    .color-swatches {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .swatch {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.15s;
      position: relative;
    }

    .swatch:hover { transform: scale(1.15); }

    .swatch.active {
      border-color: var(--text);
      box-shadow: 0 0 0 2px white, 0 0 0 4px var(--text);
    }

    .empty-state {
      text-align: center;
      color: var(--text-secondary);
      font-size: 14px;
      line-height: 1.5;
      padding: 40px 0;
    }

    .toast-container {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 100;
      pointer-events: none;
    }

    .toast {
      background: var(--text);
      color: white;
      padding: 10px 18px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.2);
      animation: toastIn 0.25s ease, toastOut 0.25s ease 2.5s forwards;
      pointer-events: none;
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translate(-50%, 10px); }
      to { opacity: 1; transform: translate(-50%, 0); }
    }

    @keyframes toastOut {
      from { opacity: 1; transform: translate(-50%, 0); }
      to { opacity: 0; transform: translate(-50%, 10px); }
    }

    .connection-group { cursor: pointer; }

    path.connection {
      pointer-events: stroke;
      transition: stroke-width 0.15s, filter 0.15s;
    }

    .connection-group:hover path.connection {
      stroke-width: 3.5px;
    }

    .connection-group.selected path.connection {
      stroke-width: 3.5px;
      filter: drop-shadow(0 0 5px currentColor);
    }

    path.connection-flow {
      animation: flowDash 1.2s linear infinite;
      pointer-events: none;
    }

    @keyframes flowDash {
      to { stroke-dashoffset: -18; }
    }

    .connection-label {
      font-size: 12px;
      font-weight: 600;
      fill: #475569;
      text-anchor: middle;
      dominant-baseline: middle;
      pointer-events: none;
      paint-order: stroke;
      stroke: rgba(255,255,255,0.9);
      stroke-width: 3px;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    #temp-connection {
      pointer-events: none;
      opacity: 0.6;
    }
  </style>
</head>
<body>

  <div class="app">
    <header>
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
        </div>
        Customer Journey Flow
      </div>
      <div class="header-hints">Drag stages to move &middot; Drag ports to connect &middot; Scroll to zoom</div>
      <div class="toolbar">
        <button class="btn btn-primary" id="btnAdd">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
          Add Stage
        </button>
        <button class="btn" id="btnDelete" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          Delete
        </button>
        <button class="btn" id="btnLayout">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
          Auto Layout
        </button>
        <button class="btn" id="btnFit">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"/><path d="M9 21H3v-6"/><path d="M21 3l-7 7"/><path d="M3 21l7-7"/></svg>
          Fit View
        </button>
      </div>
    </header>

    <div class="main">
      <div class="canvas-container" id="canvasContainer">
        <div class="viewport" id="viewport">
          <svg class="connections-layer" id="connectionsLayer">
            <defs>
              <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9.5" refY="3.5" orient="auto-start-reverse">
                <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
              </marker>
            </defs>
          </svg>
          <div class="nodes-layer" id="nodesLayer"></div>
        </div>
      </div>

      <aside class="sidebar" id="sidebar">
        <div class="empty-state">Select a stage or connection to edit its properties</div>
      </aside>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    (function() {
      const NS = 'http://www.w3.org/2000/svg';

      const COLORS = ['#3b82f6','#8b5cf6','#f59e0b','#f97316','#ef4444','#10b981','#06b6d4','#ec4899','#6366f1','#84cc16'];

      const defaultNodes = [
        { id:'n1', x:120, y:260, width:240, height:110, title:'Awareness', description:'Customer discovers your brand via social media, ads, or organic search.', color:'#3b82f6' },
        { id:'n2', x:520, y:260, width:240, height:110, title:'Interest', description:'Visitor engages with content, browses products, and learns more.', color:'#8b5cf6' },
        { id:'n3', x:920, y:170, width:240, height:110, title:'Consideration', description:'Prospect compares options, reads reviews, and evaluates pricing.', color:'#f59e0b' },
        { id:'n4', x:920, y:390, width:240, height:110, title:'Intent', description:'User adds items to cart, signs up for a trial, or books a demo.', color:'#f97316' },
        { id:'n5', x:1320, y:280, width:240, height:110, title:'Purchase', description:'Customer completes checkout, payment, and order confirmation.', color:'#10b981' },
        { id:'n6', x:1720, y:280, width:240, height:110, title:'Retention', description:'Post-purchase support, loyalty programs, and referral advocacy.', color:'#06b6d4' }
      ];

      const defaultConnections = [
        { id:'c1', from:'n1', to:'n2', label:'' },
        { id:'c2', from:'n2', to:'n3', label:'40% drop-off' },
        { id:'c3', from:'n2', to:'n4', label:'' },
        { id:'c4', from:'n3', to:'n5', label:'Direct' },
        { id:'c5', from:'n4', to:'n5', label:'' },
        { id:'c6', from:'n5', to:'n6', label:'Repeat buyers' }
      ];

      function esc(str) {
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
      }

      const App = {
        nodes: [],
        connections: [],
        selectedType: null,
        selectedId: null,
        pan: { x: 0, y: 0 },
        zoom: 1,

        dragType: null,
        dragStart: null,
        dragOffset: null,
        draggedNodeId: null,
        panOrigin: null,
        connectSource: null,
        connectSourceSide: 'right',

        saveTimer: null,

        init() {
          this.viewport = document.getElementById('viewport');
          this.nodesLayer = document.getElementById('nodesLayer');
          this.connectionsLayer = document.getElementById('connectionsLayer');
          this.sidebar = document.getElementById('sidebar');
          this.canvasContainer = document.getElementById('canvasContainer');
          this.btnDelete = document.getElementById('btnDelete');
          this.toastContainer = document.getElementById('toastContainer');

          if (!this.loadFromStorage()) {
            this.nodes = JSON.parse(JSON.stringify(defaultNodes));
            this.connections = JSON.parse(JSON.stringify(defaultConnections));
          }

          this.bindEvents();
          this.renderNodes();
          this.syncNodeHeights();
          this.renderConnections();
          this.fitView();
        },

        bindEvents() {
          this.canvasContainer.addEventListener('mousedown', e => this.onMouseDown(e));
          window.addEventListener('mousemove', e => this.onMouseMove(e));
          window.addEventListener('mouseup', e => this.onMouseUp(e));
          this.canvasContainer.addEventListener('wheel', e => this.onWheel(e), { passive: false });
          window.addEventListener('keydown', e => this.onKeyDown(e));

          document.getElementById('btnAdd').addEventListener('click', () => this.addNode());
          this.btnDelete.addEventListener('click', () => this.deleteSelected());
          document.getElementById('btnLayout').addEventListener('click', () => this.autoLayout());
          document.getElementById('btnFit').addEventListener('click', () => this.fitView());
        },

        getMousePos(e) {
          const rect = this.canvasContainer.getBoundingClientRect();
          return {
            x: (e.clientX - rect.left - this.pan.x) / this.zoom,
            y: (e.clientY - rect.top - this.pan.y) / this.zoom
          };
        },

        onMouseDown(e) {
          if (e.button !== 0) return;

          const portEl = e.target.closest('.port');
          const nodeEl = e.target.closest('.node');
          const connEl = e.target.closest('.connection');
          const pos = this.getMousePos(e);

          if (portEl) {
            this.dragType = 'connect';
            this.connectSource = portEl.dataset.nodeId;
            this.connectSourceSide = portEl.dataset.side || 'right';
            e.preventDefault();
          } else if (nodeEl && !e.target.isContentEditable && !['INPUT','TEXTAREA'].includes(e.target.tagName)) {
            this.dragType = 'node';
            this.draggedNodeId = nodeEl.dataset.id;
            const node = this.nodes.find(n => n.id === this.draggedNodeId);
            this.dragOffset = { x: pos.x - node.x, y: pos.y - node.y };
            this.select('node', this.draggedNodeId);
            e.preventDefault();
          } else if (connEl) {
            this.select('connection', connEl.dataset.id);
            e.preventDefault();
          } else {
            this.dragType = 'pan';
            this.dragStart = { x: e.clientX, y: e.clientY };
            this.panOrigin = { ...this.pan };
            this.select(null);
            e.preventDefault();
          }
        },

        onMouseMove(e) {
          if (!this.dragType) return;

          if (this.dragType === 'node') {
            const pos = this.getMousePos(e);
            const node = this.nodes.find(n => n.id === this.draggedNodeId);
            if (node) {
              const grid = 20;
              node.x = Math.round((pos.x - this.dragOffset.x) / grid) * grid;
              node.y = Math.round((pos.y - this.dragOffset.y) / grid) * grid;
              this.renderNodes(false);
              this.renderConnections();
            }
          } else if (this.dragType === 'pan') {
            const dx = e.clientX - this.dragStart.x;
            const dy = e.clientY - this.dragStart.y;
            this.pan.x = this.panOrigin.x + dx;
            this.pan.y = this.panOrigin.y + dy;
            this.updateTransform();
          } else if (this.dragType === 'connect') {
            const pos = this.getMousePos(e);
            this.updateTempConnection(pos);
          }
        },

        onMouseUp(e) {
          if (this.dragType === 'connect') {
            const targetPort = e.target.closest('.port');
            if (targetPort) {
              const targetId = targetPort.dataset.nodeId;
              if (targetId !== this.connectSource) {
                const exists = this.connections.some(c => c.from === this.connectSource && c.to === targetId);
                if (!exists) {
                  this.connections.push({ id: 'c' + Date.now(), from: this.connectSource, to: targetId, label: '' });
                  this.showToast('Connection created');
                  this.scheduleSave();
                } else {
                  this.showToast('Connection already exists');
                }
              }
            }
            this.clearTempConnection();
            this.renderConnections();
          } else if (this.dragType === 'node') {
            this.scheduleSave();
          }

          this.dragType = null;
          this.draggedNodeId = null;
          this.connectSource = null;
        },

        onWheel(e) {
          e.preventDefault();
          const rect = this.canvasContainer.getBoundingClientRect();
          const mx = e.clientX - rect.left;
          const my = e.clientY - rect.top;

          const worldX = (mx - this.pan.x) / this.zoom;
          const worldY = (my - this.pan.y) / this.zoom;

          const factor = e.deltaY < 0 ? 1.12 : 0.88;
          const newZoom = Math.max(0.2, Math.min(2.5, this.zoom * factor));

          this.pan.x = mx - worldX * newZoom;
          this.pan.y = my - worldY * newZoom;
          this.zoom = newZoom;
          this.updateTransform();
          this.scheduleSave();
        },

        onKeyDown(e) {
          if (e.key === 'Delete' || e.key === 'Backspace') {
            if (!e.target.isContentEditable && !['INPUT','TEXTAREA'].includes(e.target.tagName)) {
              this.deleteSelected();
            }
          }
          if (e.key === 'Escape') {
            if (this.dragType === 'connect') this.clearTempConnection();
            this.dragType = null;
            this.select(null);
            this.renderConnections();
          }
          if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'd') {
            e.preventDefault();
            if (this.selectedType === 'node') this.duplicateNode();
          }
        },

        updateTransform() {
          this.viewport.style.transform = `translate(${this.pan.x.toFixed(2)}px, ${this.pan.y.toFixed(2)}px) scale(${this.zoom.toFixed(4)})`;
        },

        select(type, id) {
          this.selectedType = type;
          this.selectedId = id;
          this.btnDelete.disabled = !type;
          this.renderNodes(false);
          this.renderConnections();
          this.renderSidebar();
        },

        addNode() {
          const rect = this.canvasContainer.getBoundingClientRect();
          const cx = (rect.width / 2 - this.pan.x) / this.zoom;
          const cy = (rect.height / 2 - this.pan.y) / this.zoom;
          const id = 'n' + Date.now();
          this.nodes.push({
            id,
            x: Math.round((cx - 120) / 20) * 20,
            y: Math.round((cy - 55) / 20) * 20,
            width: 240,
            height: 110,
            title: 'New Stage',
            description: 'Describe this step of the customer journey...',
            color: COLORS[0]
          });
          this.renderNodes();
          this.syncNodeHeights();
          this.renderConnections();
          this.select('node', id);
          this.scheduleSave();
        },

        duplicateNode() {
          const orig = this.nodes.find(n => n.id === this.selectedId);
          if (!orig) return;
          const id = 'n' + Date.now();
          this.nodes.push({
            ...JSON.parse(JSON.stringify(orig)),
            id,
            x: orig.x + 40,
            y: orig.y + 40
          });
          this.renderNodes();
          this.syncNodeHeights();
          this.renderConnections();
          this.select('node', id);
          this.scheduleSave();
          this.showToast('Stage duplicated');
        },

        deleteSelected() {
          if (this.selectedType === 'node') {
            this.connections = this.connections.filter(c => c.from !== this.selectedId && c.to !== this.selectedId);
            this.nodes = this.nodes.filter(n => n.id !== this.selectedId);
            this.select(null);
            this.renderNodes();
            this.renderConnections();
            this.scheduleSave();
            this.showToast('Stage deleted');
          } else if (this.selectedType === 'connection') {
            this.connections = this.connections.filter(c => c.id !== this.selectedId);
            this.select(null);
            this.renderConnections();
            this.scheduleSave();
            this.showToast('Connection deleted');
          }
        },

        getPortPosition(node, side) {
          if (side === 'right') return { x: node.x + node.width, y: node.y + node.height / 2 };
          if (side === 'left') return { x: node.x, y: node.y + node.height / 2 };
          if (side === 'bottom') return { x: node.x + node.width / 2, y: node.y + node.height };
          return { x: node.x + node.width / 2, y: node.y };
        },

        getBestPorts(fromNode, toNode) {
          const dx = toNode.x - fromNode.x;
          return dx >= 0 ? ['right', 'left'] : ['left', 'right'];
        },

        bezierPath(x1, y1, x2, y2, side1, side2) {
          const dx = Math.abs(x2 - x1);
          const dy = Math.abs(y2 - y1);
          const offset = Math.min(100, Math.max(40, dx * 0.4, dy * 0.4));
          let cp1x, cp1y, cp2x, cp2y;

          if (side1 === 'right') { cp1x = x1 + offset; cp1y = y1; }
          else if (side1 === 'left') { cp1x = x1 - offset; cp1y = y1; }
          else if (side1 === 'bottom') { cp1x = x1; cp1y = y1 + offset; }
          else { cp1x = x1; cp1y = y1 - offset; }

          if (side2 === 'right') { cp2x = x2 + offset; cp2y = y2; }
          else if (side2 === 'left') { cp2x = x2 - offset; cp2y = y2; }
          else if (side2 === 'bottom') { cp2x = x2; cp2y = y2 + offset; }
          else { cp2x = x2; cp2y = y2 - offset; }

          return `M${x1.toFixed(1)},${y1.toFixed(1)} C${cp1x.toFixed(1)},${cp1y.toFixed(1)} ${cp2x.toFixed(1)},${cp2y.toFixed(1)} ${x2.toFixed(1)},${y2.toFixed(1)}`;
        },

        bezierMidpoint(x1, y1, x2, y2, side1, side2) {
          const dx = Math.abs(x2 - x1);
          const dy = Math.abs(y2 - y1);
          const offset = Math.min(100, Math.max(40, dx * 0.4, dy * 0.4));
          let cp1x, cp1y, cp2x, cp2y;

          if (side1 === 'right') { cp1x = x1 + offset; cp1y = y1; }
          else if (side1 === 'left') { cp1x = x1 - offset; cp1y = y1; }
          else if (side1 === 'bottom') { cp1x = x1; cp1y = y1 + offset; }
          else { cp1x = x1; cp1y = y1 - offset; }

          if (side2 === 'right') { cp2x = x2 + offset; cp2y = y2; }
          else if (side2 === 'left') { cp2x = x2 - offset; cp2y = y2; }
          else if (side2 === 'bottom') { cp2x = x2; cp2y = y2 + offset; }
          else { cp2x = x2; cp2y = y2 - offset; }

          const t = 0.5, mt = 0.5;
          return {
            x: mt*mt*mt*x1 + 3*mt*mt*t*cp1x + 3*mt*t*t*cp2x + t*t*t*x2,
            y: mt*mt*mt*y1 + 3*mt*mt*t*cp1y + 3*mt*t*t*cp2y + t*t*t*y2
          };
        },

        renderNodes(full = true) {
          const existing = new Map();
          this.nodesLayer.querySelectorAll('.node').forEach(el => existing.set(el.dataset.id, el));

          this.nodes.forEach(node => {
            let el = existing.get(node.id);
            const isSelected = this.selectedType === 'node' && this.selectedId === node.id;

            if (!el) {
              el = document.createElement('div');
              el.className = 'node';
              if (isSelected) el.classList.add('selected');
              el.dataset.id = node.id;
              el.innerHTML = `
                <div class="node-color-strip" style="background:${esc(node.color)}"></div>
                <div class="node-body">
                  <div class="node-title" contenteditable="true" spellcheck="false">${esc(node.title)}</div>
                  <div class="node-desc" contenteditable="true" spellcheck="false">${esc(node.description)}</div>
                </div>
                <div class="port port-left" data-node-id="${esc(node.id)}" data-side="left"></div>
                <div class="port port-right" data-node-id="${esc(node.id)}" data-side="right"></div>
              `;

              const titleEl = el.querySelector('.node-title');
              const descEl = el.querySelector('.node-desc');

              titleEl.addEventListener('blur', () => {
                node.title = titleEl.innerText.trim() || 'Untitled';
                this.renderSidebar();
                this.scheduleSave();
              });
              descEl.addEventListener('blur', () => {
                node.description = descEl.innerText.trim();
                this.scheduleSave();
              });
              titleEl.addEventListener('focus', () => this.select('node', node.id));
              descEl.addEventListener('focus', () => this.select('node', node.id));

              this.nodesLayer.appendChild(el);
              if (full) requestAnimationFrame(() => this.syncNodeHeights());
            } else {
              el.classList.toggle('selected', isSelected);
              el.style.left = node.x + 'px';
              el.style.top = node.y + 'px';

              const strip = el.querySelector('.node-color-strip');
              if (strip && strip.style.backgroundColor !== node.color) {
                strip.style.backgroundColor = node.color;
              }

              const titleEl = el.querySelector('.node-title');
              const descEl = el.querySelector('.node-desc');
              if (document.activeElement !== titleEl && titleEl.innerText !== node.title) {
                titleEl.innerText = node.title;
              }
              if (document.activeElement !== descEl && descEl.innerText !== node.description) {
                descEl.innerText = node.description;
              }
            }

            el.style.left = node.x + 'px';
            el.style.top = node.y + 'px';
          });

          existing.forEach((el, id) => {
            if (!this.nodes.find(n => n.id === id)) el.remove();
          });
        },

        syncNodeHeights() {
          let changed = false;
          this.nodes.forEach(node => {
            const el = this.nodesLayer.querySelector(`.node[data-id="${CSS.escape(node.id)}"]`);
            if (el) {
              const h = el.offsetHeight;
              if (Math.abs(h - node.height) > 1) {
                node.height = h;
                changed = true;
              }
            }
          });
          if (changed) this.renderConnections();
        },

        renderConnections() {
          const svg = this.connectionsLayer;
          svg.querySelectorAll('.connection-group, #temp-connection').forEach(el => el.remove());

          this.connections.forEach(conn => {
            const fromNode = this.nodes.find(n => n.id === conn.from);
            const toNode = this.nodes.find(n => n.id === conn.to);
            if (!fromNode || !toNode) return;

            const [fromSide, toSide] = this.getBestPorts(fromNode, toNode);
            const p1 = this.getPortPosition(fromNode, fromSide);
            const p2 = this.getPortPosition(toNode, toSide);
            const d = this.bezierPath(p1.x, p1.y, p2.x, p2.y, fromSide, toSide);
            const isSelected = this.selectedType === 'connection' && this.selectedId === conn.id;

            const g = document.createElementNS(NS, 'g');
            g.classList.add('connection-group');
            if (isSelected) g.classList.add('selected');
            g.dataset.id = conn.id;

            const shadow = document.createElementNS(NS, 'path');
            shadow.setAttribute('d', d);
            shadow.setAttribute('stroke', fromNode.color);
            shadow.setAttribute('stroke-width', '8');
            shadow.setAttribute('stroke-opacity', '0.08');
            shadow.setAttribute('fill', 'none');
            shadow.style.pointerEvents = 'none';

            const path = document.createElementNS(NS, 'path');
            path.setAttribute('d', d);
            path.setAttribute('class', 'connection');
            path.setAttribute('stroke', fromNode.color);
            path.setAttribute('stroke-width', '2.5');
            path.setAttribute('fill', 'none');
            path.setAttribute('marker-end', 'url(#arrowhead)');
            path.style.pointerEvents = 'stroke';

            const flow = document.createElementNS(NS, 'path');
            flow.setAttribute('d', d);
            flow.setAttribute('class', 'connection-flow');
            flow.setAttribute('stroke', 'white');
            flow.setAttribute('stroke-width', '2');
            flow.setAttribute('fill', 'none');
            flow.setAttribute('stroke-dasharray', '5 10');
            flow.style.pointerEvents = 'none';
            flow.style.mixBlendMode = 'overlay';

            g.appendChild(shadow);
            g.appendChild(path);
            g.appendChild(flow);

            if (conn.label) {
              const mid = this.bezierMidpoint(p1.x, p1.y, p2.x, p2.y, fromSide, toSide);
              const text = document.createElementNS(NS, 'text');
              text.setAttribute('x', mid.x.toFixed(1));
              text.setAttribute('y', mid.y.toFixed(1));
              text.setAttribute('class', 'connection-label');
              text.textContent = conn.label;
              g.appendChild(text);
            }

            svg.appendChild(g);
          });
        },

        updateTempConnection(pos) {
          let temp = document.getElementById('temp-connection');
          if (!temp) {
            temp = document.createElementNS(NS, 'path');
            temp.id = 'temp-connection';
            temp.setAttribute('stroke', '#94a3b8');
            temp.setAttribute('stroke-width', '2');
            temp.setAttribute('stroke-dasharray', '6 4');
            temp.setAttribute('fill', 'none');
            this.connectionsLayer.appendChild(temp);
          }
          const sourceNode = this.nodes.find(n => n.id === this.connectSource);
          if (!sourceNode) return;
          const p1 = this.getPortPosition(sourceNode, this.connectSourceSide || 'right');
          const cpX = (p1.x + pos.x) / 2;
          const d = `M${p1.x.toFixed(1)},${p1.y.toFixed(1)} Q${cpX.toFixed(1)},${pos.y.toFixed(1)} ${pos.x.toFixed(1)},${pos.y.toFixed(1)}`;
          temp.setAttribute('d', d);
        },

        clearTempConnection() {
          const temp = document.getElementById('temp-connection');
          if (temp) temp.remove();
        },

        renderSidebar() {
          if (!this.selectedType) {
            this.sidebar.innerHTML = `<div class="empty-state">Select a stage or connection to edit its properties</div>`;
            return;
          }

          if (this.selectedType === 'node') {
            const node = this.nodes.find(n => n.id === this.selectedId);
            if (!node) return;
            this.sidebar.innerHTML = `
              <h3>Stage Properties</h3>
              <div class="field">
                <label>Title</label>
                <input id="inpTitle" value="${esc(node.title)}">
              </div>
              <div class="field">
                <label>Description</label>
                <textarea id="inpDesc">${esc(node.description)}</textarea>
              </div>
              <div class="field">
                <label>Color</label>
                <div class="color-swatches">
                  ${COLORS.map(c => `<div class="swatch ${node.color === c ? 'active' : ''}" style="background:${c}" data-color="${c}"></div>`).join('')}
                </div>
              </div>
              <div style="margin-top:8px">
                <button class="btn btn-danger" id="btnDelete" style="width:100%;justify-content:center">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                  Delete Stage
                </button>
              </div>
            `;

            const inpTitle = this.sidebar.querySelector('#inpTitle');
            const inpDesc = this.sidebar.querySelector('#inpDesc');
            inpTitle.addEventListener('input', e => this.updateNode('title', e.target.value));
            inpDesc.addEventListener('input', e => this.updateNode('description', e.target.value));
            this.sidebar.querySelectorAll('.swatch').forEach(s => {
              s.addEventListener('click', () => this.updateNode('color', s.dataset.color));
            });
            this.sidebar.querySelector('#btnDelete').addEventListener('click', () => this.deleteSelected());
          } else {
            const conn = this.connections.find(c => c.id === this.selectedId);
            if (!conn) return;
            this.sidebar.innerHTML = `
              <h3>Connection Properties</h3>
              <div class="field">
                <label>Label</label>
                <input id="inpLabel" value="${esc(conn.label)}">
              </div>
              <div style="margin-top:8px">
                <button class="btn btn-danger" id="btnDelete" style="width:100%;justify-content:center">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                  Delete Connection
                </button>
              </div>
            `;
            const inpLabel = this.sidebar.querySelector('#inpLabel');
            inpLabel.addEventListener('input', e => this.updateConnection('label', e.target.value));
            this.sidebar.querySelector('#btnDelete').addEventListener('click', () => this.deleteSelected());
          }
        },

        updateNode(key, value) {
          const node = this.nodes.find(n => n.id === this.selectedId);
          if (!node) return;
          node[key] = value;
          if (key === 'color') {
            this.renderSidebar();
            this.renderConnections();
          }
          this.renderNodes(false);
          this.scheduleSave();
        },

        updateConnection(key, value) {
          const conn = this.connections.find(c => c.id === this.selectedId);
          if (!conn) return;
          conn[key] = value;
          this.renderConnections();
          this.scheduleSave();
        },

        autoLayout() {
          const nodesById = Object.fromEntries(this.nodes.map(n => [n.id, n]));
          const incoming = {};
          this.nodes.forEach(n => incoming[n.id] = 0);
          this.connections.forEach(c => incoming[c.to]++);

          const queue = this.nodes.filter(n => incoming[n.id] === 0).map(n => n.id);
          const levels = {};
          queue.forEach(id => levels[id] = 0);

          const adj = {};
          this.nodes.forEach(n => adj[n.id] = []);
          this.connections.forEach(c => adj[c.from].push(c.to));

          const processed = new Set();
          while (queue.length) {
            const id = queue.shift();
            processed.add(id);
            for (const next of adj[id]) {
              levels[next] = Math.max(levels[next] || 0, levels[id] + 1);
              incoming[next]--;
              if (incoming[next] === 0) queue.push(next);
            }
          }

          this.nodes.forEach(n => {
            if (!processed.has(n.id)) levels[n.id] = 0;
          });

          const groups = {};
          Object.entries(levels).forEach(([id, lvl]) => {
            groups[lvl] = groups[lvl] || [];
            groups[lvl].push(id);
          });

          const hSpacing = 340;
          const vSpacing = 170;
          const startX = 100;
          const startY = 300;

          Object.entries(groups).forEach(([lvl, ids]) => {
            const levelIndex = parseInt(lvl);
            const x = startX + levelIndex * hSpacing;
            const totalHeight = (ids.length - 1) * vSpacing;
            ids.forEach((id, i) => {
              const node = nodesById[id];
              node.x = x;
              node.y = startY + i * vSpacing - totalHeight / 2;
            });
          });

          this.renderNodes(false);
          this.renderConnections();
          this.fitView();
          this.showToast('Auto layout applied');
          this.scheduleSave();
        },

        fitView() {
          if (this.nodes.length === 0) return;
          const pad = 80;
          const xs = this.nodes.map(n => n.x);
          const ys = this.nodes.map(n => n.y);
          const minX = Math.min(...xs) - pad;
          const minY = Math.min(...ys) - pad;
          const maxX = Math.max(...xs) + pad + 240;
          const maxY = Math.max(...ys) + pad + 120;

          const cw = this.canvasContainer.clientWidth;
          const ch = this.canvasContainer.clientHeight;
          const scale = Math.min(cw / (maxX - minX), ch / (maxY - minY), 1.4);
          const newZoom = Math.max(0.3, Math.min(scale * 0.9, 2));

          this.zoom = newZoom;
          this.pan.x = (cw - (maxX - minX) * this.zoom) / 2 - minX * this.zoom;
          this.pan.y = (ch - (maxY - minY) * this.zoom) / 2 - minY * this.zoom;
          this.updateTransform();
          this.scheduleSave();
        },

        centerView() {
          this.fitView();
        },

        showToast(msg) {
          const el = document.createElement('div');
          el.className = 'toast';
          el.textContent = msg;
          this.toastContainer.appendChild(el);
          setTimeout(() => el.remove(), 3000);
        },

        scheduleSave() {
          clearTimeout(this.saveTimer);
          this.saveTimer = setTimeout(() => this.saveToStorage(), 400);
        },

        saveToStorage() {
          try {
            localStorage.setItem('customerJourneyFlow_data', JSON.stringify({
              nodes: this.nodes,
              connections: this.connections,
              pan: this.pan,
              zoom: this.zoom
            }));
          } catch (e) {}
        },

        loadFromStorage() {
          try {
            const raw = localStorage.getItem('customerJourneyFlow_data');
            if (raw) {
              const data = JSON.parse(raw);
              if (Array.isArray(data.nodes) && Array.isArray(data.connections)) {
                this.nodes = data.nodes;
                this.connections = data.connections;
                if (data.pan) this.pan = data.pan;
                if (typeof data.zoom === 'number') this.zoom = data.zoom;
                return true;
              }
            }
          } catch (e) {}
          return false;
        }
      };

      App.init();
    })();
  </script>
</body>
</html>
