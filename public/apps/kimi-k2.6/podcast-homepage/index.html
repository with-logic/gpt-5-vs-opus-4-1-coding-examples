<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resonance — A Podcast</title>
<style>
  :root {
    --bg: #0b0c10;
    --surface: #15161a;
    --surface-2: #1e1f26;
    --text: #e6e6e6;
    --text-muted: #8a8b91;
    --accent: #ff6b35;
    --accent-2: #f7c548;
    --glass: rgba(30,31,38,0.7);
    --glass-border: rgba(255,255,255,0.06);
    --shadow: 0 8px 32px rgba(0,0,0,0.4);
    --radius: 16px;
    --radius-sm: 10px;
    --transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    overflow-x: hidden;
    padding-bottom: 140px;
  }

  /* Animated background grain */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    opacity: 0.03;
    pointer-events: none;
    z-index: 9999;
  }

  /* Hero */
  .hero {
    position: relative;
    padding: 80px 24px 60px;
    text-align: center;
    overflow: hidden;
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(255,107,53,0.15), transparent),
      radial-gradient(ellipse 60% 40% at 80% 20%, rgba(247,197,72,0.08), transparent);
    pointer-events: none;
  }

  .hero-content { position: relative; z-index: 1; max-width: 680px; margin: 0 auto; }

  .cover-art {
    width: 180px; height: 180px;
    margin: 0 auto 28px;
    border-radius: var(--radius);
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    box-shadow: 0 20px 60px rgba(255,107,53,0.3), 0 0 0 1px var(--glass-border);
    display: flex; align-items: center; justify-content: center;
    font-size: 72px; font-weight: 800; color: #fff;
    position: relative; overflow: hidden;
    animation: float 6s ease-in-out infinite;
  }

  .cover-art::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(45deg, transparent 40%, rgba(255,255,255,0.1) 50%, transparent 60%);
    animation: shimmer 4s infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }
  @keyframes shimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }

  h1 {
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    margin-bottom: 8px;
    background: linear-gradient(90deg, #fff, #ccc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .tagline {
    color: var(--text-muted);
    font-size: 1.1rem;
    margin-bottom: 32px;
  }

  .subscribe-bar {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    border-radius: 100px;
    border: 1px solid var(--glass-border);
    background: var(--surface);
    color: var(--text);
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
    text-decoration: none;
    backdrop-filter: blur(10px);
  }

  .btn:hover {
    background: var(--surface-2);
    border-color: rgba(255,255,255,0.15);
    transform: translateY(-2px);
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #e85a2b);
    border: none;
    color: #fff;
  }

  .btn-primary:hover {
    box-shadow: 0 8px 24px rgba(255,107,53,0.35);
  }

  .btn svg { width: 18px; height: 18px; }

  /* Search & Filters */
  .controls {
    max-width: 900px;
    margin: 0 auto 32px;
    padding: 0 24px;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    align-items: center;
  }

  .search-wrap {
    flex: 1 1 300px;
    position: relative;
  }

  .search-wrap input {
    width: 100%;
    padding: 14px 18px 14px 44px;
    border-radius: 100px;
    border: 1px solid var(--glass-border);
    background: var(--surface);
    color: var(--text);
    font-size: 1rem;
    outline: none;
    transition: var(--transition);
  }

  .search-wrap input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(255,107,53,0.15);
  }

  .search-wrap input::placeholder { color: var(--text-muted); }

  .search-wrap svg {
    position: absolute;
    left: 16px; top: 50%; transform: translateY(-50%);
    width: 18px; height: 18px;
    color: var(--text-muted);
    pointer-events: none;
  }

  .count-pill {
    padding: 6px 14px;
    border-radius: 100px;
    background: var(--surface);
    border: 1px solid var(--glass-border);
    color: var(--text-muted);
    font-size: 0.85rem;
    font-weight: 600;
    white-space: nowrap;
  }

  /* Episodes */
  .episodes {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 24px 40px;
  }

  .section-title {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    margin-bottom: 16px;
    font-weight: 700;
  }

  .episode {
    display: flex;
    gap: 16px;
    align-items: center;
    padding: 16px;
    border-radius: var(--radius-sm);
    background: var(--surface);
    border: 1px solid var(--glass-border);
    margin-bottom: 10px;
    cursor: pointer;
    transition: var(--transition);
    position: relative;
    overflow: hidden;
  }

  .episode::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: linear-gradient(180deg, var(--accent), var(--accent-2));
    opacity: 0;
    transition: opacity 0.3s;
  }

  .episode:hover {
    background: var(--surface-2);
    transform: translateX(4px);
    border-color: rgba(255,255,255,0.1);
  }

  .episode:hover::before { opacity: 1; }

  .episode.active {
    background: var(--surface-2);
    border-color: var(--accent);
    box-shadow: 0 0 20px rgba(255,107,53,0.08);
  }

  .episode.active::before { opacity: 1; }

  .ep-thumb {
    width: 56px; height: 56px;
    border-radius: var(--radius-sm);
    background: linear-gradient(135deg, var(--surface-2), var(--surface));
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--accent);
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }

  .ep-thumb .play-icon {
    position: absolute;
    inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(255,107,53,0.9);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .episode:hover .ep-thumb .play-icon { opacity: 1; }

  .ep-thumb .play-icon svg { width: 20px; height: 20px; color: #fff; }

  .ep-info { flex: 1; min-width: 0; }

  .ep-title {
    font-weight: 600;
    font-size: 1rem;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .ep-meta {
    display: flex;
    gap: 12px;
    color: var(--text-muted);
    font-size: 0.82rem;
    align-items: center;
  }

  .ep-meta .dot {
    width: 3px; height: 3px;
    border-radius: 50%;
    background: var(--text-muted);
  }

  .ep-duration {
    padding: 2px 8px;
    border-radius: 4px;
    background: rgba(255,255,255,0.05);
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--accent-2);
  }

  .ep-desc {
    color: var(--text-muted);
    font-size: 0.85rem;
    margin-top: 4px;
    display: -webkit-box;
    -webkit-line-clamp: 1;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .ep-status {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: var(--transition);
  }

  .ep-status svg { width: 18px; height: 18px; color: var(--accent); }

  .episode.active .ep-status { background: rgba(255,107,53,0.15); }

  /* Audio Player */
  .player {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: rgba(11,12,16,0.92);
    backdrop-filter: blur(20px) saturate(1.5);
    border-top: 1px solid var(--glass-border);
    padding: 16px 24px;
    z-index: 1000;
    transform: translateY(0);
    transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
  }

  .player.hidden { transform: translateY(120%); }

  .player-inner {
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    gap: 16px;
    align-items: center;
  }

  .player-thumb {
    width: 52px; height: 52px;
    border-radius: var(--radius-sm);
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
    animation: none;
  }

  .player-thumb.playing {
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,107,53,0.4); }
    50% { box-shadow: 0 0 0 10px rgba(255,107,53,0); }
  }

  .player-center { flex: 1; min-width: 0; }

  .player-title {
    font-weight: 600;
    font-size: 0.95rem;
    margin-bottom: 6px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .time {
    font-size: 0.72rem;
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
    min-width: 38px;
    text-align: center;
  }

  .progress-track {
    flex: 1;
    height: 5px;
    border-radius: 3px;
    background: var(--surface-2);
    position: relative;
    cursor: pointer;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    width: 0%;
    transition: width 0.1s linear;
    position: relative;
  }

  .progress-fill::after {
    content: '';
    position: absolute;
    right: -6px; top: 50%; transform: translateY(-50%);
    width: 12px; height: 12px;
    border-radius: 50%;
    background: #fff;
    opacity: 0;
    transition: opacity 0.2s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }

  .progress-track:hover .progress-fill::after { opacity: 1; }

  .player-controls {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .ctrl-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: var(--text);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: var(--transition);
  }

  .ctrl-btn:hover { background: var(--surface-2); }

  .ctrl-btn svg { width: 20px; height: 20px; }

  .ctrl-btn.play {
    width: 48px; height: 48px;
    background: linear-gradient(135deg, var(--accent), #e85a2b);
    color: #fff;
  }

  .ctrl-btn.play:hover {
    transform: scale(1.05);
    box-shadow: 0 8px 24px rgba(255,107,53,0.35);
  }

  .ctrl-btn.play svg { width: 22px; height: 22px; }

  .volume-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }

  .volume-slider {
    width: 80px;
    height: 4px;
    -webkit-appearance: none;
    appearance: none;
    background: var(--surface-2);
    border-radius: 2px;
    outline: none;
  }

  .volume-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: #fff;
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
  }

  /* No results */
  .no-results {
    text-align: center;
    padding: 60px 24px;
    color: var(--text-muted);
  }

  .no-results svg {
    width: 48px; height: 48px;
    margin-bottom: 16px;
    opacity: 0.5;
  }

  /* Footer */
  .footer {
    text-align: center;
    padding: 40px 24px;
    color: var(--text-muted);
    font-size: 0.85rem;
  }

  .footer a { color: var(--accent); text-decoration: none; }

  /* Responsive */
  @media (max-width: 640px) {
    .player-inner { flex-wrap: wrap; }
    .player-center { order: 3; width: 100%; flex: none; }
    .volume-wrap { display: none; }
    .hero { padding: 48px 24px 40px; }
    .cover-art { width: 140px; height: 140px; font-size: 56px; }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--surface-2); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #2a2b33; }

  /* Entry animation */
  .episode {
    opacity: 0;
    animation: slideIn 0.5s ease forwards;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>

  ];

  let currentEpisode = null;
  let isPlaying = false;
  let audioContext = null;
  let oscillator = null;
  let gainNode = null;
  let progressInterval = null;
  let currentTime = 0;
  let currentVolume = 0.8;
  let filteredEpisodes = [...episodes];

  // DOM refs
  const episodesContainer = document.getElementById('episodes');
  const searchInput = document.getElementById('search');
  const countPill = document.getElementById('count');
  const player = document.getElementById('player');
  const playerTitle = document.getElementById('playerTitle');
  const playerThumb = document.getElementById('playerThumb');
  const playBtn = document.getElementById('playBtn');
  const playIcon = document.getElementById('playIcon');
  const pauseIcon = document.getElementById('pauseIcon');
  const progressFill = document.getElementById('progressFill');
  const progressTrack = document.getElementById('progressTrack');
  const currentTimeEl = document.getElementById('currentTime');
  const totalTimeEl = document.getElementById('totalTime');
  const volumeSlider = document.getElementById('volume');

  function formatTime(sec) {
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60);
    return `${m}:${s.toString().padStart(2, '0')}`;
  }

  function renderEpisodes() {
    episodesContainer.innerHTML = '';

    if (filteredEpisodes.length === 0) {
      episodesContainer.innerHTML = `
        <div class="no-results">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <p>No episodes match your search.</p>
        </div>`;
      return;
    }

    const title = document.createElement('div');
    title.className = 'section-title';
    title.textContent = 'All Episodes';
    episodesContainer.appendChild(title);

    filteredEpisodes.forEach((ep, i) => {
      const el = document.createElement('div');
      el.className = 'episode' + (currentEpisode?.id === ep.id ? ' active' : '');
      el.style.animationDelay = `${i * 0.05}s`;
      el.innerHTML = `
        <div class="ep-thumb">
          ${ep.emoji}
          <div class="play-icon">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          </div>
        </div>
        <div class="ep-info">
          <div class="ep-title">${ep.title}</div>
          <div class="ep-meta">
            <span>Episode ${ep.number}</span>
            <span class="dot"></span>
            <span>${ep.date}</span>
            <span class="dot"></span>
            <span class="ep-duration">${ep.duration}</span>
          </div>
          <div class="ep-desc">${ep.desc}</div>
        </div>
        <div class="ep-status">
          ${currentEpisode?.id === ep.id && isPlaying
            ? '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>'
            : '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>'}
        </div>
      `;
      el.addEventListener('click', () => playEpisode(ep));
      episodesContainer.appendChild(el);
    });
  }

  function playEpisode(ep) {
    if (!audioContext) {
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
    }

    const wasSame = currentEpisode?.id === ep.id;
    currentEpisode = ep;
    currentTime = wasSame && isPlaying ? currentTime : 0;

    playerTitle.textContent = ep.title;
    playerThumb.textContent = ep.emoji;
    totalTimeEl.textContent = ep.duration;
    updateProgress();

    player.classList.remove('hidden');

    if (wasSame && isPlaying) {
      pauseAudio();
    } else {
      startAudio();
    }

    renderEpisodes();
  }

  function startAudio() {
    if (!audioContext) return;
    if (audioContext.state === 'suspended') audioContext.resume();

    stopAudio();

    // Create a pleasant chord progression
    const frequencies = getChordFrequencies(currentEpisode.id);
    const now = audioContext.currentTime;

    gainNode = audioContext.createGain();
    gainNode.gain.setValueAtTime(0, now);
    gainNode.gain.linearRampToValueAtTime(0.08 * currentVolume, now + 0.5);
    gainNode.connect(audioContext.destination);

    const frequenciesToUse = isFinite(currentTime) && currentTime > 0
      ? [frequencies[currentEpisode.id % frequencies.length]]
      : frequencies;

    frequenciesToUse.forEach((freq, idx) => {
      const osc = audioContext.createOscillator();
      osc.type = idx === 0 ? 'sine' : 'triangle';
      osc.frequency.setValueAtTime(freq, now);
      osc.connect(gainNode);
      osc.start(now);
      oscillator = osc;
    });

    isPlaying = true;
    updatePlayButton();
    playerThumb.classList.add('playing');

    progressInterval = setInterval(() => {
      if (!isPlaying) return;
      currentTime += 1;
      if (currentTime >= currentEpisode.durationSec) {
        nextEpisode();
        return;
      }
      updateProgress();
    }, 1000);
  }

  function getChordFrequencies(seed) {
    const chords = [
      [261.63, 329.63, 392.00],
      [293.66, 369.99, 440.00],
      [246.94, 311.13, 392.00],
      [220.00, 277.18, 329.63],
      [196.00, 246.94, 293.66],
      [174.61, 220.00, 261.63],
      [233.08, 293.66, 349.23],
      [207.65, 261.63, 311.13]
    ];
    return chords[seed % chords.length];
  }

  function stopAudio() {
    if (oscillator) {
      try { oscillator.stop(); } catch(e){}
      oscillator = null;
    }
    if (gainNode) {
      try { gainNode.disconnect(); } catch(e){}
      gainNode = null;
    }
    if (progressInterval) {
      clearInterval(progressInterval);
      progressInterval = null;
    }
  }

  function pauseAudio() {
    stopAudio();
    isPlaying = false;
    updatePlayButton();
    playerThumb.classList.remove('playing');
  }

  function togglePlay() {
    if (!currentEpisode) return;
    if (isPlaying) pauseAudio();
    else startAudio();
    renderEpisodes();
  }

  function updatePlayButton() {
    playIcon.style.display = isPlaying ? 'none' : 'block';
    pauseIcon.style.display = isPlaying ? 'block' : 'none';
  }

  function updateProgress() {
    if (!currentEpisode) return;
    const pct = Math.min((currentTime / currentEpisode.durationSec) * 100, 100);
    progressFill.style.width = pct + '%';
    currentTimeEl.textContent = formatTime(currentTime);
  }

  function prevEpisode() {
    if (!currentEpisode) return;
    const idx = filteredEpisodes.findIndex(e => e.id === currentEpisode.id);
    if (idx > 0) playEpisode(filteredEpisodes[idx - 1]);
    else playEpisode(filteredEpisodes[filteredEpisodes.length - 1]);
  }

  function nextEpisode() {
    if (!currentEpisode) return;
    const idx = filteredEpisodes.findIndex(e => e.id === currentEpisode.id);
    if (idx < filteredEpisodes.length - 1) playEpisode(filteredEpisodes[idx + 1]);
    else playEpisode(filteredEpisodes[0]);
  }

  // Progress bar click
  progressTrack.addEventListener('click', (e) => {
    if (!currentEpisode) return;
    const rect = progressTrack.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    currentTime = Math.floor(pct * currentEpisode.durationSec);
    updateProgress();
  });

  // Volume
  volumeSlider.addEventListener('input', (e) => {
    currentVolume = parseFloat(e.target.value);
    if (gainNode) {
      gainNode.gain.setValueAtTime(0.08 * currentVolume, audioContext.currentTime);
    }
  });

  // Search
  searchInput.addEventListener('input', (e) => {
    const q = e.target.value.toLowerCase().trim();
    if (!q) {
      filteredEpisodes = [...episodes];
    } else {
      filteredEpisodes = episodes.filter(ep =>
        ep.title.toLowerCase().includes(q) ||
        ep.desc.toLowerCase().includes(q) ||
        ep.date.toLowerCase().includes(q)
      );
    }
    countPill.textContent = `${filteredEpisodes.length} episode${filteredEpisodes.length !== 1 ? 's' : ''}`;
    renderEpisodes();
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT') return;
    if (e.code === 'Space') {
      e.preventDefault();
      togglePlay();
    } else if (e.code === 'ArrowRight') {
      nextEpisode();
    } else if (e.code === 'ArrowLeft') {
      prevEpisode();
    }
  });

  // Subscribe
  window.subscribe = function(platform) {
    const messages = {
      apple: 'Opening Apple Podcasts...',
      spotify: 'Opening Spotify...',
      rss: 'RSS Feed: https://resonance.fm/feed.xml'
    };

    const el = document.createElement('div');
    el.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--surface-2);border:1px solid var(--glass-border);padding:12px 24px;border-radius:100px;color:var(--text);font-size:0.9rem;z-index:10000;backdrop-filter:blur(10px);animation:slideIn 0.3s ease;';
    el.textContent = messages[platform] || 'Subscribing...';
    document.body.appendChild(el);
    setTimeout(() => {
      el.style.opacity = '0';
      el.style.transition = 'opacity 0.3s';
      setTimeout(() => el.remove(), 300);
    }, 2000);
  };

  window.togglePlay = togglePlay;
  window.prevEpisode = prevEpisode;
  window.nextEpisode = nextEpisode;

  // Init
  renderEpisodes();

  // Animate hero cover art on load
  setTimeout(() => {
    document.querySelector('.cover-art').style.opacity = '1';
  }, 100);
})();
</script>
</body>
</html>
