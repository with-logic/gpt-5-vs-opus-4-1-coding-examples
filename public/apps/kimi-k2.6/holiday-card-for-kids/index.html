<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magical Holiday Card!</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700&display=swap');

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    user-select: none;
    -webkit-user-select: none;
  }

  body {
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
    background: #1a3a5c;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  #canvas-bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  .scene-container {
    position: relative;
    flex: 1;
    overflow: hidden;
    z-index: 1;
  }

  /* Sky and ground */
  .sky {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 65%;
    background: linear-gradient(180deg, #0d2b45 0%, #1a4a6e 40%, #2d6a8f 70%, #4a8db8 100%);
    z-index: 1;
  }

  .ground {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 35%;
    background: linear-gradient(180deg, #e8f4f8 0%, #d0e8f0 30%, #b8dce8 100%);
    border-radius: 50% 50% 0 0 / 60px 60px 0 0;
    z-index: 2;
    transform: scaleX(1.2);
  }

  /* Moon and stars */
  .moon {
    position: absolute;
    top: 40px;
    right: 80px;
    width: 80px;
    height: 80px;
    background: #fff8dc;
    border-radius: 50%;
    box-shadow: 0 0 30px 10px rgba(255, 248, 220, 0.4);
    z-index: 1;
    animation: moonGlow 3s ease-in-out infinite alternate;
  }

  @keyframes moonGlow {
    from { box-shadow: 0 0 30px 10px rgba(255, 248, 220, 0.4); }
    to { box-shadow: 0 0 50px 20px rgba(255, 248, 220, 0.6); }
  }

  .star {
    position: absolute;
    color: #fff;
    font-size: 14px;
    z-index: 1;
    animation: twinkle 2s ease-in-out infinite;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.3; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1.2); }
  }

  /* Mountains */
  .mountain {
    position: absolute;
    bottom: 30%;
    z-index: 1;
  }

  .mountain-1 {
    left: -50px;
    width: 0;
    height: 0;
    border-left: 200px solid transparent;
    border-right: 200px solid transparent;
    border-bottom: 250px solid #1e3a5f;
  }

  .mountain-1::after {
    content: '';
    position: absolute;
    top: 0;
    left: -60px;
    width: 0;
    height: 0;
    border-left: 60px solid transparent;
    border-right: 60px solid transparent;
    border-bottom: 80px solid #fff;
  }

  .mountain-2 {
    right: 80px;
    width: 0;
    height: 0;
    border-left: 160px solid transparent;
    border-right: 160px solid transparent;
    border-bottom: 200px solid #234b7a;
  }

  .mountain-2::after {
    content: '';
    position: absolute;
    top: 0;
    left: -50px;
    width: 0;
    height: 0;
    border-left: 50px solid transparent;
    border-right: 50px solid transparent;
    border-bottom: 60px solid #fff;
  }

  /* Tree */
  .tree {
    position: absolute;
    bottom: 28%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 3;
    width: 200px;
    height: 280px;
  }

  .tree-trunk {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 30px;
    height: 50px;
    background: #5d3a1a;
    border-radius: 3px;
  }

  .tree-leaves {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
  }

  .tree-layer {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: solid transparent;
    border-right: solid transparent;
    border-bottom: solid #1a5c2e;
  }

  .tree-layer-1 {
    bottom: 0;
    border-left-width: 100px;
    border-right-width: 100px;
    border-bottom-width: 80px;
  }

  .tree-layer-2 {
    bottom: 50px;
    border-left-width: 80px;
    border-right-width: 80px;
    border-bottom-width: 70px;
  }

  .tree-layer-3 {
    bottom: 95px;
    border-left-width: 60px;
    border-right-width: 60px;
    border-bottom-width: 60px;
  }

  .tree-star {
    position: absolute;
    bottom: 160px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 28px;
    z-index: 4;
    animation: starSpin 4s linear infinite;
    cursor: pointer;
  }

  @keyframes starSpin {
    from { transform: translateX(-50%) rotate(0deg); }
    to { transform: translateX(-50%) rotate(360deg); }
  }

  /* Snowman */
  .snowman {
    position: absolute;
    bottom: 32%;
    left: 15%;
    z-index: 3;
    cursor: pointer;
  }

  .snowman-body {
    width: 60px;
    height: 60px;
    background: #fff;
    border-radius: 50%;
    position: relative;
    box-shadow: inset -5px -5px 10px rgba(0,0,0,0.1);
  }

  .snowman-head {
    width: 40px;
    height: 40px;
    background: #fff;
    border-radius: 50%;
    position: absolute;
    top: -35px;
    left: 10px;
    box-shadow: inset -3px -3px 8px rgba(0,0,0,0.1);
  }

  .snowman-eye {
    width: 5px;
    height: 5px;
    background: #333;
    border-radius: 50%;
    position: absolute;
    top: 12px;
  }

  .snowman-eye-left { left: 10px; }
  .snowman-eye-right { right: 10px; }

  .snowman-nose {
    width: 0;
    height: 0;
    border-left: 8px solid transparent;
    border-right: 8px solid transparent;
    border-top: 12px solid #ff6600;
    position: absolute;
    top: 18px;
    left: 12px;
  }

  .snowman-mouth {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 3px;
  }

  .snowman-mouth-dot {
    width: 3px;
    height: 3px;
    background: #333;
    border-radius: 50%;
  }

  .snowman-scarf {
    width: 44px;
    height: 10px;
    background: #e63946;
    border-radius: 5px;
    position: absolute;
    top: -2px;
    left: -2px;
  }

  .snowman-hat {
    position: absolute;
    top: -50px;
    left: 5px;
    width: 30px;
    height: 20px;
    background: #2c1810;
    border-radius: 2px;
  }

  .snowman-hat::before {
    content: '';
    position: absolute;
    bottom: 0;
    left: -5px;
    width: 40px;
    height: 5px;
    background: #2c1810;
    border-radius: 2px;
  }

  /* House */
  .house {
    position: absolute;
    bottom: 32%;
    right: 10%;
    z-index: 3;
    cursor: pointer;
  }

  .house-body {
    width: 100px;
    height: 70px;
    background: #8b4513;
    border-radius: 2px;
  }

  .house-roof {
    width: 0;
    height: 0;
    border-left: 60px solid transparent;
    border-right: 60px solid transparent;
    border-bottom: 50px solid #c0392b;
    position: absolute;
    top: -50px;
    left: -10px;
  }

  .house-window {
    width: 20px;
    height: 20px;
    background: #ffeaa7;
    border: 2px solid #5d3a1a;
    position: absolute;
    top: 15px;
    box-shadow: 0 0 10px rgba(255, 234, 167, 0.5);
  }

  .house-window-left { left: 15px; }
  .house-window-right { right: 15px; }

  .house-door {
    width: 20px;
    height: 35px;
    background: #5d3a1a;
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    border-radius: 10px 10px 0 0;
  }

  .house-chimney {
    width: 12px;
    height: 20px;
    background: #7f8c8d;
    position: absolute;
    top: -45px;
    right: 15px;
  }

  .smoke {
    position: absolute;
    top: -60px;
    right: 10px;
    width: 8px;
    height: 8px;
    background: rgba(200, 200, 200, 0.6);
    border-radius: 50%;
    animation: smokeRise 2s ease-out infinite;
  }

  @keyframes smokeRise {
    0% { transform: translateY(0) scale(1); opacity: 0.6; }
    100% { transform: translateY(-30px) scale(2); opacity: 0; }
  }

  /* Draggable items */
  .draggable-item {
    position: absolute;
    cursor: grab;
    z-index: 10;
    transition: transform 0.1s;
    font-size: 40px;
    filter: drop-shadow(2px 4px 4px rgba(0,0,0,0.2));
  }

  .draggable-item:active {
    cursor: grabbing;
    transform: scale(1.2);
  }

  .draggable-item.bounce {
    animation: itemBounce 0.5s ease;
  }

  @keyframes itemBounce {
    0%, 100% { transform: scale(1); }
    30% { transform: scale(1.3); }
    60% { transform: scale(0.9); }
  }

  .draggable-item.spin {
    animation: itemSpin 0.6s ease;
  }

  @keyframes itemSpin {
    from { transform: rotate(0deg) scale(1.2); }
    to { transform: rotate(360deg) scale(1); }
  }

  /* Palette */
  .palette-container {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 100;
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(10px);
    border-top: 4px solid #e74c3c;
    padding: 10px 20px;
    box-shadow: 0 -5px 20px rgba(0,0,0,0.2);
  }

  .palette-title {
    font-family: 'Fredoka One', cursive;
    color: #c0392b;
    font-size: 16px;
    text-align: center;
    margin-bottom: 8px;
  }

  .palette-items {
    display: flex;
    justify-content: center;
    gap: 15px;
    flex-wrap: wrap;
    padding: 5px;
  }

  .palette-item {
    font-size: 36px;
    cursor: grab;
    padding: 8px;
    border-radius: 12px;
    background: #fff;
    border: 3px solid #ddd;
    transition: all 0.2s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }

  .palette-item:hover {
    transform: scale(1.15) translateY(-5px);
    border-color: #e74c3c;
    box-shadow: 0 5px 15px rgba(231, 76, 60, 0.3);
  }

  .palette-item:active {
    cursor: grabbing;
  }

  /* Controls */
  .controls {
    position: absolute;
    top: 15px;
    left: 15px;
    z-index: 100;
    display: flex;
    gap: 10px;
  }

  .control-btn {
    font-family: 'Fredoka One', cursive;
    padding: 10px 18px;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.2s;
    box-shadow: 0 3px 10px rgba(0,0,0,0.2);
    color: white;
  }

  .control-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
  }

  .btn-music { background: #27ae60; }
  .btn-snow { background: #3498db; }
  .btn-clear { background: #e67e22; }
  .btn-wish { background: #e74c3c; }

  .title {
    position: absolute;
    top: 15px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 50;
    font-family: 'Fredoka One', cursive;
    font-size: clamp(24px, 5vw, 48px);
    color: #fff;
    text-shadow: 0 0 20px rgba(255,255,255,0.5), 2px 2px 4px rgba(0,0,0,0.3);
    animation: titleGlow 2s ease-in-out infinite alternate;
    pointer-events: none;
    text-align: center;
    white-space: nowrap;
  }

  @keyframes titleGlow {
    from { text-shadow: 0 0 20px rgba(255,255,255,0.5), 2px 2px 4px rgba(0,0,0,0.3); }
    to { text-shadow: 0 0 40px rgba(255,255,255,0.8), 2px 2px 4px rgba(0,0,0,0.3); }
  }

  /* Confetti */
  .confetti {
    position: fixed;
    z-index: 9999;
    pointer-events: none;
  }

  /* Floating text */
  .floating-text {
    position: absolute;
    font-family: 'Fredoka One', cursive;
    font-size: 20px;
    color: #f1c40f;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    pointer-events: none;
    z-index: 999;
    animation: floatUp 1.5s ease-out forwards;
  }

  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-80px) scale(1.5); }
  }

  /* Preset decorations on tree */
  .tree-decor {
    position: absolute;
    font-size: 16px;
    z-index: 4;
    animation: treeDecorPulse 2s ease-in-out infinite;
  }

  @keyframes treeDecorPulse {
    0%, 100% { transform: scale(1); filter: brightness(1); }
    50% { transform: scale(1.2); filter: brightness(1.3); }
  }

  /* Garland on tree */
  .garland {
    position: absolute;
    z-index: 3;
    width: 2px;
    background: #f1c40f;
    opacity: 0.8;
  }

  /* Instruction hint */
  .hint {
    position: absolute;
    top: 70px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 50;
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    color: rgba(255,255,255,0.7);
    pointer-events: none;
    text-align: center;
  }

  /* Sparkle effect */
  .sparkle {
    position: absolute;
    width: 4px;
    height: 4px;
    background: #fff;
    border-radius: 50%;
    pointer-events: none;
    z-index: 998;
    animation: sparkleAnim 0.8s ease-out forwards;
  }

  @keyframes sparkleAnim {
    0% { opacity: 1; transform: scale(0); }
    50% { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(0); }
  }

  /* Audio hint */
  .audio-hint {
    position: fixed;
    bottom: 120px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.7);
    color: #fff;
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 12px;
    z-index: 200;
    opacity: 0;
    transition: opacity 0.5s;
    pointer-events: none;
  }

  .audio-hint.show {
    opacity: 1;
  }

  /* Reindeer */
  .reindeer {
    position: absolute;
    bottom: 32%;
    right: 35%;
    font-size: 50px;
    z-index: 3;
    cursor: pointer;
    animation: reindeerBob 2s ease-in-out infinite;
  }

  @keyframes reindeerBob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
  }

  /* Gift under tree */
  .gift {
    position: absolute;
    font-size: 30px;
    z-index: 3;
    cursor: pointer;
    animation: giftWiggle 3s ease-in-out infinite;
  }

  @keyframes giftWiggle {
    0%, 100% { transform: rotate(-3deg); }
    50% { transform: rotate(3deg); }
  }
</style>
</head>
<body>

<canvas id="canvas-bg"></canvas>

<div class="scene-container" id="scene">
  <div class="title">Happy Holidays!</div>
  <div class="hint">Drag items from below to decorate! Click things for fun surprises!</div>

  <div class="controls">
    <button class="control-btn btn-music" id="btnMusic" onclick="toggleMusic()">Music: Off</button>
    <button class="control-btn btn-snow" onclick="moreSnow()">More Snow!</button>
    <button class="control-btn btn-clear" onclick="clearItems()">Clear All</button>
    <button class="control-btn btn-wish" onclick="sendWishes()">Send Wishes!</button>
  </div>

  <div class="sky"></div>
  <div class="ground"></div>

  <div class="moon"></div>

  <!-- Stars generated by JS -->
  <div id="stars-container"></div>

  <div class="mountain mountain-1"></div>
  <div class="mountain mountain-2"></div>

  <!-- Tree -->
  <div class="tree" id="tree">
    <div class="tree-trunk"></div>
    <div class="tree-leaves">
      <div class="tree-layer tree-layer-1"></div>
      <div class="tree-layer tree-layer-2"></div>
      <div class="tree-layer tree-layer-3"></div>
    </div>
    <div class="tree-star" onclick="clickStar()">⭐</div>
    <!-- Preset ornaments -->
    <div class="tree-decor" style="bottom: 50px; left: -10px;">🔴</div>
    <div class="tree-decor" style="bottom: 80px; right: -5px; animation-delay: 0.5s;">🔵</div>
    <div class="tree-decor" style="bottom: 110px; left: 0; animation-delay: 1s;">🟡</div>
    <div class="tree-decor" style="bottom: 60px; left: 30px; animation-delay: 0.3s;">🟢</div>
    <div class="tree-decor" style="bottom: 95px; right: 15px; animation-delay: 0.7s;">🟣</div>
  </div>

  <!-- Snowman -->
  <div class="snowman" onclick="clickSnowman()">
    <div class="snowman-hat"></div>
    <div class="snowman-head">
      <div class="snowman-eye snowman-eye-left"></div>
      <div class="snowman-eye snowman-eye-right"></div>
      <div class="snowman-nose"></div>
      <div class="snowman-mouth">
        <div class="snowman-mouth-dot"></div>
        <div class="snowman-mouth-dot"></div>
        <div class="snowman-mouth-dot"></div>
      </div>
    </div>
    <div class="snowman-scarf"></div>
    <div class="snowman-body"></div>
  </div>

  <!-- House -->
  <div class="house" onclick="clickHouse()">
    <div class="house-roof"></div>
    <div class="house-chimney"></div>
    <div class="smoke"></div>
    <div class="smoke" style="animation-delay: 1s; right: 12px;"></div>
    <div class="house-body">
      <div class="house-window house-window-left"></div>
      <div class="house-window house-window-right"></div>
      <div class="house-door"></div>
    </div>
  </div>

  <!-- Reindeer -->
  <div class="reindeer" onclick="clickReindeer()">🦌</div>

  <!-- Gifts under tree -->
  <div class="gift" style="bottom: 28%; left: 48%;" onclick="clickGift(this)">🎁</div>
  <div class="gift" style="bottom: 27%; left: 52%; animation-delay: 1.5s;" onclick="clickGift(this)">🎀</div>

  <!-- Container for dragged items -->
  <div id="items-container"></div>
</div>

<!-- Palette -->
<div class="palette-container">
  <div class="palette-title">Drag these to decorate your holiday scene!</div>
  <div class="palette-items" id="palette">
    <div class="palette-item" draggable="false" data-emoji="🎄">🎄</div>
    <div class="palette-item" draggable="false" data-emoji="🎅">🎅</div>
    <div class="palette-item" draggable="false" data-emoji="🤶">🤶</div>
    <div class="palette-item" draggable="false" data-emoji="🧝">🧝</div>
    <div class="palette-item" draggable="false" data-emoji="🦌">🦌</div>
    <div class="palette-item" draggable="false" data-emoji="⛄">⛄</div>
    <div class="palette-item" draggable="false" data-emoji="🎁">🎁</div>
    <div class="palette-item" draggable="false" data-emoji="🎀">🎀</div>
    <div class="palette-item" draggable="false" data-emoji="🔔">🔔</div>
    <div class="palette-item" draggable="false" data-emoji="🕯️">🕯️</div>
    <div class="palette-item" draggable="false" data-emoji="🍪">🍪</div>
    <div class="palette-item" draggable="false" data-emoji="🍬">🍬</div>
    <div class="palette-item" draggable="false" data-emoji="❄️">❄️</div>
    <div class="palette-item" draggable="false" data-emoji="⭐">⭐</div>
    <div class="palette-item" draggable="false" data-emoji="🧦">🧦</div>
    <div class="palette-item" draggable="false" data-emoji="🕎">🕎</div>
    <div class="palette-item" draggable="false" data-emoji="🕊️">🕊️</div>
    <div class="palette-item" draggable="false" data-emoji="🌟">🌟</div>
    <div class="palette-item" draggable="false" data-emoji="🎊">🎊</div>
    <div class="palette-item" draggable="false" data-emoji="🎈">🎈</div>
    <div class="palette-item" draggable="false" data-emoji="🎉">🎉</div>
    <div class="palette-item" draggable="false" data-emoji="🧁">🧁</div>
    <div class="palette-item" draggable="false" data-emoji="🍫">🍫</div>
    <div class="palette-item" draggable="false" data-emoji="🍭">🍭</div>
  </div>
</div>

<div class="audio-hint" id="audioHint">Click "Music: Off" to hear holiday sounds!</div>

<script>
// ===== AUDIO =====
let audioContextStarted = false;
let musicPlaying = false;
let musicLoop = null;

const synth = new Tone.PolySynth(Tone.Synth, {
  oscillator: { type: "triangle" },
  envelope: { attack: 0.02, decay: 0.1, sustain: 0.3, release: 1 }
}).toDestination();

const bell = new Tone.MetalSynth({
  harmonicity: 12,
  resonance: 800,
  modulationIndex: 20,
  envelope: { decay: 0.4, release: 0.2 },
  volume: -10
}).toDestination();

const sparkleSynth = new Tone.Synth({
  oscillator: { type: "sine" },
  envelope: { attack: 0.01, decay: 0.3, sustain: 0, release: 0.3 },
  volume: -8
}).toDestination();

async function startAudio() {
  if (!audioContextStarted) {
    await Tone.start();
    audioContextStarted = true;
  }
}

function playBell() {
  if (!audioContextStarted) return;
  bell.triggerAttackRelease("C6", "8n");
  setTimeout(() => bell.triggerAttackRelease("E6", "8n"), 100);
}

function playSparkle() {
  if (!audioContextStarted) return;
  const notes = ["C6", "E6", "G6", "B6", "C7"];
  notes.forEach((note, i) => {
    setTimeout(() => sparkleSynth.triggerAttackRelease(note, "16n"), i * 60);
  });
}

function playBounce() {
  if (!audioContextStarted) return;
  const bounceSynth = new Tone.MembraneSynth({ volume: -10 }).toDestination();
  bounceSynth.triggerAttackRelease("C3", "32n");
}

function playWishes() {
  if (!audioContextStarted) return;
  const now = Tone.now();
  synth.triggerAttackRelease(["C4", "E4", "G4"], "4n", now);
  synth.triggerAttackRelease(["D4", "F4", "A4"], "4n", now + 0.3);
  synth.triggerAttackRelease(["E4", "G4", "B4"], "4n", now + 0.6);
  synth.triggerAttackRelease(["C5", "E5", "G5", "C6"], "2n", now + 0.9);
}

async function toggleMusic() {
  await startAudio();
  musicPlaying = !musicPlaying;
  const btn = document.getElementById('btnMusic');

  if (musicPlaying) {
    btn.textContent = 'Music: On';
    btn.style.background = '#c0392b';
    let melodyStartTime = Tone.now();
    let melodyIndex = 0;

    function playNext() {
      if (!musicPlaying) return;
      const m = melody;
      const now = Tone.now();

      m.forEach(evt => {
        synth.triggerAttackRelease(evt.note, evt.dur, now + evt.time);
      });

      const totalDuration = 15;
      setTimeout(playNext, totalDuration * 1000);
    }

    playNext();
  } else {
    btn.textContent = 'Music: Off';
    btn.style.background = '#27ae60';
  }
}

// ===== SNOW CANVAS =====
const canvas = document.getElementById('canvas-bg');
const ctx = canvas.getContext('2d');
let snowflakes = [];
let snowIntensity = 1;

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

class Snowflake {
  constructor() {
    this.reset();
  }

  reset() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * -canvas.height;
    this.size = Math.random() * 3 + 1;
    this.speed = Math.random() * 1.5 + 0.5;
    this.sway = Math.random() * 0.02 - 0.01;
    this.swayOffset = Math.random() * Math.PI * 2;
    this.opacity = Math.random() * 0.5 + 0.3;
  }

  update() {
    this.y += this.speed * snowIntensity;
    this.x += Math.sin(this.y * 0.01 + this.swayOffset) * 0.5;

    if (this.y > canvas.height) {
      this.reset();
    }
  }

  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
    ctx.fill();
  }
}

function initSnow() {
  snowflakes = [];
  for (let i = 0; i < 200; i++) {
    snowflakes.push(new Snowflake());
  }
}
initSnow();

function animateSnow() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  snowflakes.forEach(flake => {
    flake.update();
    flake.draw();
  });
  requestAnimationFrame(animateSnow);
}
animateSnow();

function moreSnow() {
  snowIntensity = snowIntensity === 1 ? 3 : 1;
  if (!audioContextStarted) startAudio();
  playSparkle();
  showFloatingText('Let it snow!', canvas.width / 2, canvas.height / 2);
}

// ===== DRAG AND DROP =====
let draggedItem = null;
let dragOffset = { x: 0, y: 0 };
let activeDragEl = null;

function createDraggableItem(emoji, x, y) {
  const el = document.createElement('div');
  el.className = 'draggable-item';
  el.textContent = emoji;
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  el.dataset.emoji = emoji;

  el.addEventListener('mousedown', startDrag);
  el.addEventListener('touchstart', startDrag, { passive: false });
  el.addEventListener('click', (e) => {
    if (!el.dataset.wasDragged) {
      clickItem(el);
    }
    delete el.dataset.wasDragged;
  });

  document.getElementById('items-container').appendChild(el);
  return el;
}

// Pre-placed items
const preplaced = [
  { emoji: '🎁', x: 0.48, y: 0.72 },
  { emoji: '🎄', x: 0.25, y: 0.55 },
  { emoji: '⛄', x: 0.75, y: 0.60 },
  { emoji: '🦌', x: 0.60, y: 0.50 },
  { emoji: '🔔', x: 0.40, y: 0.45 },
  { emoji: '🎅', x: 0.55, y: 0.65 },
  { emoji: '⭐', x: 0.15, y: 0.40 },
  { emoji: '🍪', x: 0.85, y: 0.70 },
  { emoji: '🎀', x: 0.35, y: 0.70 },
  { emoji: '❄️', x: 0.70, y: 0.45 },
];

preplaced.forEach(item => {
  const scene = document.getElementById('scene');
  const rect = scene.getBoundingClientRect();
  createDraggableItem(item.emoji, rect.width * item.x, rect.height * item.y);
});

function startDrag(e) {
  e.preventDefault();
  const isTouch = e.type === 'touchstart';
  const clientX = isTouch ? e.touches[0].clientX : e.clientX;
  const clientY = isTouch ? e.touches[0].clientY : e.clientY;

  if (e.target.classList.contains('palette-item')) {
    const emoji = e.target.dataset.emoji;
    const rect = document.getElementById('scene').getBoundingClientRect();
    activeDragEl = createDraggableItem(emoji, clientX - rect.left - 20, clientY - rect.top - 20);
    activeDragEl.style.zIndex = 1000;
  } else {
    activeDragEl = e.target;
    activeDragEl.dataset.wasDragged = 'true';
  }

  dragOffset.x = 20;
  dragOffset.y = 20;

  if (!audioContextStarted) startAudio();
  playBounce();
}

function onMove(e) {
  if (!activeDragEl) return;
  e.preventDefault();
  const isTouch = e.type === 'touchmove';
  const clientX = isTouch ? e.touches[0].clientX : e.clientX;
  const clientY = isTouch ? e.touches[0].clientY : e.clientY;

  const scene = document.getElementById('scene');
  const rect = scene.getBoundingClientRect();
  let x = clientX - rect.left - dragOffset.x;
  let y = clientY - rect.top - dragOffset.y;

  x = Math.max(0, Math.min(x, rect.width - 50));
  y = Math.max(0, Math.min(y, rect.height - 50));

  activeDragEl.style.left = x + 'px';
  activeDragEl.style.top = y + 'px';
}

function onEnd(e) {
  if (activeDragEl) {
    activeDragEl.style.zIndex = 10;
    activeDragEl.classList.remove('bounce');
    void activeDragEl.offsetWidth;
    activeDragEl.classList.add('bounce');
    playBell();
    createSparkles(
      parseFloat(activeDragEl.style.left) + 20,
      parseFloat(activeDragEl.style.top) + 20
    );
    activeDragEl = null;
  }
}

// Palette events
const paletteItems = document.querySelectorAll('.palette-item');
paletteItems.forEach(item => {
  item.addEventListener('mousedown', startDrag);
  item.addEventListener('touchstart', startDrag, { passive: false });
});

document.addEventListener('mousemove', onMove);
document.addEventListener('touchmove', onMove, { passive: false });
document.addEventListener('mouseup', onEnd);
document.addEventListener('touchend', onEnd);

// ===== CLICK INTERACTIONS =====
function clickItem(el) {
  el.classList.remove('spin');
  void el.offsetWidth;
  el.classList.add('spin');
  playSparkle();
  createSparkles(parseFloat(el.style.left) + 20, parseFloat(el.style.top) + 20);

  const messages = ['Yay!', 'Cool!', 'Nice!', 'Wow!', 'Fun!', 'Sweet!', 'Ho ho ho!', 'Magical!'];
  showFloatingText(
    messages[Math.floor(Math.random() * messages.length)],
    parseFloat(el.style.left) + 20,
    parseFloat(el.style.top)

}

// ===== VISUAL EFFECTS =====
function createSparkles(x, y) {
  const scene = document.getElementById('scene');
  for (let i = 0; i < 8; i++) {
    const sparkle = document.createElement('div');
    sparkle.className = 'sparkle';
    sparkle.style.left = x + 'px';
    sparkle.style.top = y + 'px';
    sparkle.style.transform = `rotate(${Math.random() * 360}deg)`;
    const dist = 30;
    const angle = (Math.PI * 2 * i) / 8;
    const tx = Math.cos(angle) * dist;
    const ty = Math.sin(angle) * dist;
    sparkle.style.setProperty('--tx', tx + 'px');
    sparkle.style.setProperty('--ty', ty + 'px');
    sparkle.style.animation = `sparkleAnim 0.8s ease-out forwards`;
    sparkle.style.marginLeft = tx + 'px';
    sparkle.style.marginTop = ty + 'px';
    scene.appendChild(sparkle);
    setTimeout(() => sparkle.remove(), 800);
  }
}

function showFloatingText(text, x, y) {
  const scene = document.getElementById('scene');
  const el = document.createElement('div');
  el.className = 'floating-text';
  el.textContent = text;
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  scene.appendChild(el);
  setTimeout(() => el.remove(), 1500);
}

function sendWishes() {
  startAudio();
  playWishes();
  launchConfetti();
  const scene = document.getElementById('scene');
  const rect = scene.getBoundingClientRect();
  showFloatingText('Happy Holidays! 🎉', rect.width / 2 - 60, rect.height / 2);
  showFloatingText('Best Wishes! ⭐', rect.width / 2 - 50, rect.height / 2 - 40);
}

function clearItems() {
  const container = document.getElementById('items-container');
  container.innerHTML = '';
  if (audioContextStarted) playBounce();
  const scene = document.getElementById('scene');
  const rect = scene.getBoundingClientRect();
  showFloatingText('Cleared!', rect.width / 2, rect.height / 2);
}

// ===== CONFETTI =====
function launchConfetti() {
  const colors = ['#e74c3c', '#f1c40f', '#2ecc71', '#3498db', '#9b59b6', '#e67e22', '#fff'];
  for (let i = 0; i < 100; i++) {
    const confetti = document.createElement('div');
    confetti.className = 'confetti';
    confetti.style.left = Math.random() * 100 + 'vw';
    confetti.style.top = '-10px';
    confetti.style.width = Math.random() * 10 + 5 + 'px';
    confetti.style.height = Math.random() * 10 + 5 + 'px';
    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
    confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    confetti.style.transform = `rotate(${Math.random() * 360}deg)`;

    const duration = Math.random() * 3 + 2;
    const delay = Math.random() * 1;
    confetti.style.transition = `top ${duration}s ease-in, transform ${duration}s linear`;

    document.body.appendChild(confetti);

    setTimeout(() => {
      confetti.style.top = '110vh';
      confetti.style.transform = `rotate(${Math.random() * 720}deg)`;
    }, delay * 100);

    setTimeout(() => confetti.remove(), (duration + delay) * 1000 + 500);
  }
}
