<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Online Whiteboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            overflow: hidden;
            background: #f0f0f0;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        #app {
            width: 100vw;
            height: 100vh;
            position: relative;
            overflow: hidden;
        }

        canvas {
            display: block;
            cursor: crosshair;
            touch-action: none;
        }

        /* Toolbar */
        .toolbar {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 4px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 8px 12px;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08), 0 1px 3px rgba(0, 0, 0, 0.05);
            z-index: 1000;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .toolbar.hidden {
            opacity: 0;
            transform: translateX(-50%) translateY(-20px);
            pointer-events: none;
        }

        .tool-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: transparent;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            color: #555;
            position: relative;
        }

        .tool-btn:hover {
            background: rgba(0, 0, 0, 0.05);
            color: #000;
        }

        .tool-btn.active {
            background: #007AFF;
            color: white;
        }

        .tool-btn.active:hover {
            background: #0056CC;
        }

        .tool-btn svg {
            width: 22px;
            height: 22px;
        }

        .divider {
            width: 1px;
            height: 28px;
            background: rgba(0, 0, 0, 0.1);
            margin: 0 4px;
        }

        /* Color Palette */
        .color-palette {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .color-btn {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .color-btn:hover {
            transform: scale(1.15);
        }

        .color-btn.active {
            border-color: #007AFF;
            box-shadow: 0 0 0 2px rgba(0, 122, 255, 0.2);
        }

        .color-btn.custom {
            background: conic-gradient(red, yellow, lime, cyan, blue, magenta, red);
            position: relative;
            overflow: hidden;
        }

        .color-btn.custom::after {
            content: '+';
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            color: white;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }

        #colorPicker {
            position: absolute;
            visibility: hidden;
            width: 0;
            height: 0;
        }

        /* Size Slider */
        .size-control {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 4px;
        }

        .size-slider {
            width: 80px;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: #ddd;
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }

        .size-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #007AFF;
            cursor: pointer;
            box-shadow: 0 1px 4px rgba(0,0,0,0.2);
        }

        .size-slider::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #007AFF;
            cursor: pointer;
            border: none;
            box-shadow: 0 1px 4px rgba(0,0,0,0.2);
        }

        .size-preview {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .size-dot {
            background: #333;
            border-radius: 50%;
            transition: all 0.2s ease;
        }

        /* Bottom Info */
        .info-bar {
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 12px;
            color: #666;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            z-index: 1000;
            transition: opacity 0.3s ease;
        }

        .info-bar.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .kbd {
            background: #eee;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 11px;
            border: 1px solid #ddd;
        }

        /* Zoom/Canvas Controls */
        .canvas-controls {
            position: fixed;
            right: 16px;
            bottom: 60px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 4px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            z-index: 1000;
        }

        .canvas-controls .tool-btn {
            width: 36px;
            height: 36px;
        }

        /* Clear confirmation modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .modal-overlay.show {
            opacity: 1;
            pointer-events: all;
        }

        .modal {
            background: white;
            border-radius: 16px;
            padding: 24px;
            width: 320px;
            max-width: 90vw;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            transform: scale(0.95);
            transition: transform 0.2s ease;
        }

        .modal-overlay.show .modal {
            transform: scale(1);
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .modal-text {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .modal-buttons {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .modal-btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .modal-btn.secondary {
            background: #f0f0f0;
            color: #333;
        }

        .modal-btn.secondary:hover {
            background: #e0e0e0;
        }

        .modal-btn.danger {
            background: #FF3B30;
            color: white;
        }

        .modal-btn.danger:hover {
            background: #d63025;
        }

        /* Toast notification */
        .toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 14px;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
            z-index: 2000;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Tooltips */
        .tool-btn[title]::before {
            content: attr(title);
            position: absolute;
            bottom: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%) translateY(4px);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: all 0.2s ease;
        }

        .tool-btn:hover[title]::before {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Shape preview */
        .shape-preview-canvas {
            position: fixed;
            pointer-events: none;
            z-index: 500;
        }

        /* Loading/Start Screen */
        .start-screen {
            position: fixed;
            inset: 0;
            background: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            transition: opacity 0.5s ease;
        }

        .start-screen.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        .start-screen h1 {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #007AFF, #5856D6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .start-screen p {
            color: #666;
            font-size: 16px;
        }

        .start-btn {
            margin-top: 32px;
            padding: 12px 32px;
            background: #007AFF;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .start-btn:hover {
            background: #0056CC;
            transform: scale(1.05);
        }

        /* Mobile responsive */
        @media (max-width: 768px) {
            .toolbar {
                top: 8px;
                padding: 6px 8px;
                gap: 2px;
                border-radius: 12px;
                max-width: calc(100vw - 32px);
                flex-wrap: wrap;
                justify-content: center;
            }

            .tool-btn {
                width: 36px;
                height: 36px;
            }

            .color-btn {
                width: 20px;
                height: 20px;
            }

            .size-slider {
                width: 60px;
            }

            .info-bar {
                display: none;
            }

            .canvas-controls {
                right: 8px;
                bottom: 8px;
                flex-direction: row;
            }
        }

        @media (max-width: 480px) {
            .toolbar .divider:nth-of-type(2) {
                display: none;
            }

            .size-control {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <canvas id="mainCanvas"></canvas>
        <canvas id="previewCanvas" class="shape-preview-canvas"></canvas>
    </div>

    <!-- Toolbar -->
    <div class="toolbar" id="toolbar">
        <!-- Drawing Tools -->
        <button class="tool-btn active" data-tool="pen" title="Pen (P)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>
            </svg>
        </button>
        <button class="tool-btn" data-tool="eraser" title="Eraser (E)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 20H7L3 16C2 15 2 13 3 12L13 2L22 11L20 20Z"/>
                <path d="M17 17L7 7"/>
            </svg>
        </button>
        <button class="tool-btn" data-tool="line" title="Line (L)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="5" y1="19" x2="19" y2="5"/>
            </svg>
        </button>
        <button class="tool-btn" data-tool="rect" title="Rectangle (R)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
            </svg>
        </button>
        <button class="tool-btn" data-tool="circle" title="Circle (C)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="9"/>
            </svg>
        </button>
        <button class="tool-btn" data-tool="arrow" title="Arrow (A)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="5" y1="12" x2="19" y2="12"/>
                <polyline points="12 5 19 12 12 19"/>
            </svg>
        </button>

        <div class="divider"></div>

        <!-- Colors -->
        <div class="color-palette">
            <div class="color-btn active" data-color="#000000" style="background: #000000;"></div>
            <div class="color-btn" data-color="#FF3B30" style="background: #FF3B30;"></div>
            <div class="color-btn" data-color="#007AFF" style="background: #007AFF;"></div>
            <div class="color-btn" data-color="#34C759" style="background: #34C759;"></div>
            <div class="color-btn" data-color="#FFCC00" style="background: #FFCC00;"></div>
            <div class="color-btn" data-color="#5856D6" style="background: #5856D6;"></div>
            <div class="color-btn custom" id="customColorBtn" title="Custom Color"></div>
        </div>
        <input type="color" id="colorPicker" value="#000000">

        <div class="divider"></div>

        <!-- Size Control -->
        <div class="size-control">
            <input type="range" class="size-slider" id="sizeSlider" min="1" max="50" value="3">
            <div class="size-preview">
                <div class="size-dot" id="sizeDot" style="width: 3px; height: 3px;"></div>
            </div>
        </div>

        <div class="divider"></div>

        <!-- Actions -->
        <button class="tool-btn" id="undoBtn" title="Undo (Ctrl+Z)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 7v6h6"/>
                <path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/>
            </svg>
        </button>
        <button class="tool-btn" id="redoBtn" title="Redo (Ctrl+Y)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 7v6h-6"/>
                <path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3L21 13"/>
            </svg>
        </button>
        <button class="tool-btn" id="clearBtn" title="Clear All">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
            </svg>
        </button>
        <button class="tool-btn" id="saveBtn" title="Save Image">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
        </button>
    </div>

    <!-- Canvas Controls (Zoom/Pan) -->
    <div class="canvas-controls">
        <button class="tool-btn" id="zoomInBtn" title="Zoom In">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/>
                <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                <line x1="11" y1="8" x2="11" y2="14"/>
                <line x1="8" y1="11" x2="14" y2="11"/>
            </svg>
        </button>
        <button class="tool-btn" id="zoomOutBtn" title="Zoom Out">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/>
                <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                <line x1="8" y1="11" x2="14" y2="11"/>
            </svg>
        </button>
        <button class="tool-btn" id="resetZoomBtn" title="Reset View">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
        </button>
    </div>

    <!-- Info Bar -->
    <div class="info-bar" id="infoBar">
        <span>Draw freely on the canvas</span>
        <span style="margin: 0 4px;">|</span>
        <span><span class="kbd">Ctrl</span>+<span class="kbd">Z</span> Undo</span>
        <span style="margin: 0 4px;">|</span>
        <span><span class="kbd">Ctrl</span>+<span class="kbd">Y</span> Redo</span>
        <span style="margin: 0 4px;">|</span>
        <span><span class="kbd">Ctrl</span>+<span class="kbd">S</span> Save</span>
    </div>

    <!-- Clear Confirmation Modal -->
    <div class="modal-overlay" id="clearModal">
        <div class="modal">
            <div class="modal-title">Clear Canvas?</div>
            <div class="modal-text">This will erase all your drawings. This action cannot be undone.</div>
            <div class="modal-buttons">
                <button class="modal-btn secondary" id="cancelClear">Cancel</button>
                <button class="modal-btn danger" id="confirmClear">Clear All</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Start Screen -->
    <div class="start-screen" id="startScreen">
        <h1>Whiteboard</h1>
        <p>Draw, sketch, and collaborate visually</p>
        <button class="start-btn" id="startBtn">Start Drawing</button>
    </div>

    <script>
        (function() {
            // ========== Canvas Setup ==========
            const mainCanvas = document.getElementById('mainCanvas');
            const previewCanvas = document.getElementById('previewCanvas');
            const ctx = mainCanvas.getContext('2d');
            const previewCtx = previewCanvas.getContext('2d');

            let canvasWidth = window.innerWidth;
            let canvasHeight = window.innerHeight;
            let zoom = 1;
            let panX = 0;
            let panY = 0;

            function resizeCanvas() {
                canvasWidth = window.innerWidth;
                canvasHeight = window.innerHeight;

                // Save current content
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = mainCanvas.width || canvasWidth;
                tempCanvas.height = mainCanvas.height || canvasHeight;
                const tempCtx = tempCanvas.getContext('2d');
                if (mainCanvas.width) {
                    tempCtx.drawImage(mainCanvas, 0, 0);
                }

                // Resize main canvas (keep content)
                const oldWidth = mainCanvas.width || 1;
                const oldHeight = mainCanvas.height || 1;
                mainCanvas.width = Math.max(canvasWidth, mainCanvas.width || 0);
                mainCanvas.height = Math.max(canvasHeight, mainCanvas.height || 0);

                // Restore content
                if (tempCanvas.width > 1) {
                    ctx.drawImage(tempCanvas, 0, 0);
                }

                // Resize preview canvas
                previewCanvas.width = canvasWidth;
                previewCanvas.height = canvasHeight;
                previewCanvas.style.width = canvasWidth + 'px';
                previewCanvas.style.height = canvasHeight + 'px';

                // Fill white background if empty
                if (!hasDrawn) {
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, 0, mainCanvas.width, mainCanvas.height);
                }
            }

            // ========== State ==========
            let currentTool = 'pen';
            let currentColor = '#000000';
            let currentSize = 3;
            let isDrawing = false;
            let hasDrawn = false;
            let startX = 0;
            let startY = 0;
            let lastX = 0;
            let lastY = 0;

            // History for undo/redo
            const history = [];
            let historyStep = -1;
            const MAX_HISTORY = 50;

            function saveHistory() {
                historyStep++;
                if (historyStep < history.length) {
                    history.length = historyStep;
                }
                history.push(mainCanvas.toDataURL());
                if (history.length > MAX_HISTORY) {
                    history.shift();
                    historyStep--;
                }
                updateUndoRedoButtons();
            }

            function undo() {
                if (historyStep > 0) {
                    historyStep--;
                    restoreHistory();
                    showToast('Undo');
                }
            }

            function redo() {
                if (historyStep < history.length - 1) {
                    historyStep++;
                    restoreHistory();
                    showToast('Redo');
                }
            }

            function restoreHistory() {
                const img = new Image();
                img.onload = () => {
                    ctx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
                    ctx.drawImage(img, 0, 0);
                };
                img.src = history[historyStep];
                updateUndoRedoButtons();
            }

            function updateUndoRedoButtons() {
                document.getElementById('undoBtn').style.opacity = historyStep > 0 ? '1' : '0.3';
                document.getElementById('redoBtn').style.opacity = historyStep < history.length - 1 ? '1' : '0.3';
            }

            // ========== Drawing Functions ==========
            function getCoordinates(e) {
                const rect = mainCanvas.getBoundingClientRect();
                let clientX, clientY;
                if (e.touches && e.touches.length > 0) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }
                return {
                    x: (clientX - rect.left - panX) / zoom,
                    y: (clientY - rect.top - panY) / zoom
                };
            }

            function beginStroke(x, y) {
                ctx.beginPath();
                ctx.moveTo(x, y);
            }

            function drawStroke(x, y) {
                ctx.lineTo(x, y);
                ctx.stroke();
            }

            function setStrokeStyle(color, size, isEraser = false) {
                ctx.lineWidth = size;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.strokeStyle = isEraser ? '#ffffff' : color;
            }

            function startDrawing(e) {
                if (e.button === 1 || (e.button === 0 && e.altKey)) {
                    // Pan mode
                    isPanning = true;
                    panStartX = e.clientX - panX;
                    panStartY = e.clientY - panY;
                    return;
                }
                if (e.button !== 0 && !e.touches) return;

                isDrawing = true;
                hasDrawn = true;
                const coords = getCoordinates(e);
                startX = coords.x;
                startY = coords.y;
                lastX = coords.x;
                lastY = coords.y;

                if (currentTool === 'pen' || currentTool === 'eraser') {
                    setStrokeStyle(currentColor, currentSize, currentTool === 'eraser');
                    beginStroke(startX, startY);
                }
            }

            function draw(e) {
                if (isPanning) {
                    panX = e.clientX - panStartX;
                    panY = e.clientY - panStartY;
                    updateCanvasTransform();
                    return;
                }
                if (!isDrawing) return;
                e.preventDefault();

                const coords = getCoordinates(e);
                const x = coords.x;
                const y = coords.y;

                if (currentTool === 'pen' || currentTool === 'eraser') {
                    // Smooth line using quadratic curves
                    const midX = (lastX + x) / 2;
                    const midY = (lastY + y) / 2;
                    ctx.quadraticCurveTo(lastX, lastY, midX, midY);
                    ctx.stroke();
                    lastX = x;
                    lastY = y;
                } else {
                    // Shape preview
                    previewCtx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);
                    previewCtx.lineWidth = currentSize;
                    previewCtx.lineCap = 'round';
                    previewCtx.lineJoin = 'round';
                    previewCtx.strokeStyle = currentColor;
                    previewCtx.fillStyle = currentColor + '20';

                    const sx = startX * zoom + panX;
                    const sy = startY * zoom + panY;
                    const ex = x * zoom + panX;
                    const ey = y * zoom + panY;

                    previewCtx.beginPath();
                    switch (currentTool) {
                        case 'line':
                            previewCtx.moveTo(sx, sy);
                            previewCtx.lineTo(ex, ey);
                            break;
                        case 'rect':
                            previewCtx.rect(sx, sy, ex - sx, ey - sy);
                            previewCtx.fill();
                            break;
                        case 'circle':
                            const radius = Math.sqrt(Math.pow(ex - sx, 2) + Math.pow(ey - sy, 2));
                            previewCtx.arc(sx, sy, radius, 0, Math.PI * 2);
                            previewCtx.fill();
                            break;
                        case 'arrow':
                            drawArrow(previewCtx, sx, sy, ex, ey, currentSize);
                            break;
                    }
                    previewCtx.stroke();
                }
            }

            function drawArrow(context, fromX, fromY, toX, toY, width) {
                const headLength = width * 4 + 10;
                const angle = Math.atan2(toY - fromY, toX - fromX);

                context.moveTo(fromX, fromY);
                context.lineTo(toX, toY);

                // Arrow head
                context.moveTo(toX, toY);
                context.lineTo(
                    toX - headLength * Math.cos(angle - Math.PI / 6),
                    toY - headLength * Math.sin(angle - Math.PI / 6)
                );
                context.moveTo(toX, toY);
                context.lineTo(
                    toX - headLength * Math.cos(angle + Math.PI / 6),
                    toY - headLength * Math.sin(angle + Math.PI / 6)
                );
            }

            function stopDrawing() {
                if (isPanning) {
                    isPanning = false;
                    return;
                }
                if (!isDrawing) return;
                isDrawing = false;

                if (currentTool === 'pen' || currentTool === 'eraser') {
                    ctx.lineTo(lastX, lastY);
                    ctx.stroke();
                } else if (currentTool !== 'pen' && currentTool !== 'eraser') {
                    // Commit shape to main canvas
                    previewCtx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);

                    setStrokeStyle(currentColor, currentSize);
                    ctx.fillStyle = currentColor + '20';

                    ctx.beginPath();
                    switch (currentTool) {
                        case 'line':
                            ctx.moveTo(startX, startY);
                            ctx.lineTo(lastX, lastY);
                            break;
                        case 'rect':
                            ctx.rect(startX, startY, lastX - startX, lastY - startY);
                            ctx.fill();
                            break;
                        case 'circle':
                            const radius = Math.sqrt(Math.pow(lastX - startX, 2) + Math.pow(lastY - startY, 2));
                            ctx.arc(startX, startY, radius, 0, Math.PI * 2);
                            ctx.fill();
                            break;
                        case 'arrow':
                            drawArrow(ctx, startX, startY, lastX, lastY, currentSize);
                            break;
                    }
                    ctx.stroke();
                }

                saveHistory();
            }

            // ========== Pan & Zoom ==========
            let isPanning = false;
            let panStartX = 0;
            let panStartY = 0;

            function updateCanvasTransform() {
                mainCanvas.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
                mainCanvas.style.transformOrigin = '0 0';
            }

            function zoomIn() {
                zoom = Math.min(zoom * 1.2, 5);
                updateCanvasTransform();
                showToast(`Zoom: ${Math.round(zoom * 100)}%`);
            }

            function zoomOut() {
                zoom = Math.max(zoom / 1.2, 0.2);
                updateCanvasTransform();
                showToast(`Zoom: ${Math.round(zoom * 100)}%`);
            }

            function resetZoom() {
                zoom = 1;
                panX = 0;
                panY = 0;
                updateCanvasTransform();
                showToast('View reset');
            }

            // ========== Tool Selection ==========
            document.querySelectorAll('.tool-btn[data-tool]').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.tool-btn[data-tool]').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentTool = btn.dataset.tool;
                    updateCursor();
                });
            });

            function updateCursor() {
                if (currentTool === 'pen') {
                    mainCanvas.style.cursor = 'crosshair';
                } else if (currentTool === 'eraser') {
                    mainCanvas.style.cursor = 'cell';
                } else {
                    mainCanvas.style.cursor = 'crosshair';
                }
            }

            // ========== Color Selection ==========
            document.querySelectorAll('.color-btn[data-color]').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentColor = btn.dataset.color;
                    document.getElementById('sizeDot').style.background = currentColor;
                });
            });

            const colorPicker = document.getElementById('colorPicker');
            document.getElementById('customColorBtn').addEventListener('click', () => {
                colorPicker.click();
            });

            colorPicker.addEventListener('change', (e) => {
                currentColor = e.target.value;
                document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                document.getElementById('customColorBtn').classList.add('active');
                document.getElementById('customColorBtn').style.background = currentColor;
                document.getElementById('sizeDot').style.background = currentColor;
            });

            // ========== Size Control ==========
            const sizeSlider = document.getElementById('sizeSlider');
            const sizeDot = document.getElementById('sizeDot');

            sizeSlider.addEventListener('input', (e) => {
                currentSize = parseInt(e.target.value);
                sizeDot.style.width = currentSize + 'px';
                sizeDot.style.height = currentSize + 'px';
            });

            // ========== Actions ==========
            document.getElementById('undoBtn').addEventListener('click', undo);
            document.getElementById('redoBtn').addEventListener('click', redo);
            document.getElementById('zoomInBtn').addEventListener('click', zoomIn);
            document.getElementById('zoomOutBtn').addEventListener('click', zoomOut);
            document.getElementById('resetZoomBtn').addEventListener('click', resetZoom);

            const clearModal = document.getElementById('clearModal');
            document.getElementById('clearBtn').addEventListener('click', () => {
                clearModal.classList.add('show');
            });
            document.getElementById('cancelClear').addEventListener('click', () => {
                clearModal.classList.remove('show');
            });
            document.getElementById('confirmClear').addEventListener('click', () => {
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, mainCanvas.width, mainCanvas.height);
                saveHistory();
                clearModal.classList.remove('show');
                showToast('Canvas cleared');
            });
            clearModal.addEventListener('click', (e) => {
                if (e.target === clearModal) clearModal.classList.remove('show');
            });

            document.getElementById('saveBtn').addEventListener('click', saveImage);

            function saveImage() {
                // Create a temporary canvas with white background
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = mainCanvas.width;
                tempCanvas.height = mainCanvas.height;
                const tempCtx = tempCanvas.getContext('2d');

                // Fill white background
                tempCtx.fillStyle = '#ffffff';
                tempCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);

                // Draw the canvas content
                tempCtx.drawImage(mainCanvas, 0, 0);

                const link = document.createElement('a');
                const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
                link.download = `whiteboard-${timestamp}.png`;
                link.href = tempCanvas.toDataURL('image/png');
                link.click();
                showToast('Image saved!');
            }

            // ========== Toast ==========
            let toastTimeout;
            function showToast(message) {
                const toast = document.getElementById('toast');
                toast.textContent = message;
                toast.classList.add('show');
                clearTimeout(toastTimeout);
                toastTimeout = setTimeout(() => {
                    toast.classList.remove('show');
                }, 2000);
            }

            // ========== Keyboard Shortcuts ==========
            document.addEventListener('keydown', (e) => {
                if (e.target.tagName === 'INPUT') return;

                if (e.ctrlKey || e.metaKey) {
                    switch (e.key.toLowerCase()) {
                        case 'z':
                            e.preventDefault();
                            if (e.shiftKey) redo();
                            else undo();
                            break;
                        case 'y':
                            e.preventDefault();
                            redo();
                            break;
                        case 's':
                            e.preventDefault();
                            saveImage();
                            break;
                    }
                } else {
                    switch (e.key.toLowerCase()) {
                        case 'p':
                            selectTool('pen');
                            break;
                        case 'e':
                            selectTool('eraser');
                            break;
                        case 'l':
                            selectTool('line');
                            break;
                        case 'r':
                            selectTool('rect');
                            break;
                        case 'c':
                            if (!e.ctrlKey && !e.metaKey) selectTool('circle');
                            break;
                        case 'a':
                            if (!e.ctrlKey && !e.metaKey) selectTool('arrow');
                            break;
                        case '[':
                            currentSize = Math.max(1, currentSize - 1);
                            sizeSlider.value = currentSize;
                            sizeDot.style.width = currentSize + 'px';
                            sizeDot.style.height = currentSize + 'px';
                            showToast(`Size: ${currentSize}px`);
                            break;
                        case ']':
                            currentSize = Math.min(50, currentSize + 1);
                            sizeSlider.value = currentSize;
                            sizeDot.style.width = currentSize + 'px';
                            sizeDot.style.height = currentSize + 'px';
                            showToast(`Size: ${currentSize}px`);
                            break;
                        case 'escape':
                            clearModal.classList.remove('show');
                            break;
                    }
                }
            });

            function selectTool(tool) {
                document.querySelectorAll('.tool-btn[data-tool]').forEach(b => {
                    b.classList.toggle('active', b.dataset.tool === tool);
                });
                currentTool = tool;
                updateCursor();
            }

            // ========== Event Listeners ==========
            mainCanvas.addEventListener('mousedown', startDrawing);
            mainCanvas.addEventListener('mousemove', draw);
            mainCanvas.addEventListener('mouseup', stopDrawing);
            mainCanvas.addEventListener('mouseleave', stopDrawing);

            mainCanvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                startDrawing(e);
            }, { passive: false });
            mainCanvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                draw(e);
            }, { passive: false });
            mainCanvas.addEventListener('touchend', (e) => {
                e.preventDefault();
                stopDrawing();
            }, { passive: false });

            // Wheel zoom
            mainCanvas.addEventListener('wheel', (e) => {
                if (e.ctrlKey || e.metaKey) {
                    e.preventDefault();
                    const delta = e.deltaY > 0 ? 0.9 : 1.1;
                    zoom = Math.max(0.2, Math.min(5, zoom * delta));
                    updateCanvasTransform();
                    showToast(`Zoom: ${Math.round(zoom * 100)}%`);
                }
            }, { passive: false });

            // Window resize
            window.addEventListener('resize', () => {
                resizeCanvas();
            });

            // ========== Start Screen ==========
            document.getElementById('startBtn').addEventListener('click', () => {
                document.getElementById('startScreen').classList.add('fade-out');
                setTimeout(() => {
                    document.getElementById('startScreen').style.display = 'none';
                }, 500);
            });

            // ========== Initialization ==========
            resizeCanvas();
            saveHistory();
            updateUndoRedoButtons();

            // Auto-hide toolbar on inactivity
            let toolbarTimeout;
            const toolbar = document.getElementById('toolbar');
            const infoBar = document.getElementById('infoBar');

            function resetToolbarTimeout() {
                toolbar.classList.remove('hidden');
                infoBar.classList.remove('hidden');
                clearTimeout(toolbarTimeout);
                toolbarTimeout = setTimeout(() => {
                    if (!isDrawing && !isPanning) {
                        toolbar.classList.add('hidden');
                        infoBar.classList.add('hidden');
                    }
                }, 5000);
            }

            document.addEventListener('mousemove', resetToolbarTimeout);
            document.addEventListener('mousedown', resetToolbarTimeout);
            document.addEventListener('touchstart', resetToolbarTimeout);
            document.addEventListener('keydown', resetToolbarTimeout);

            resetToolbarTimeout();

        })();
    </script>
</body>
</html>
