<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>US Citizenship Trivia Quiz</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #7e8ba3 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .quiz-container {
            width: 100%;
            max-width: 700px;
            position: relative;
        }

        .progress-container {
            margin-bottom: 25px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 5px;
            backdrop-filter: blur(10px);
        }

        .progress-bar {
            height: 12px;
            background: linear-gradient(90deg, #4CAF50, #8BC34A);
            border-radius: 10px;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 2px 8px rgba(76, 175, 80, 0.4);
        }

        .progress-text {
            text-align: center;
            color: white;
            font-size: 14px;
            margin-top: 8px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
            min-height: 400px;
            display: flex;
            flex-direction: column;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #1e3c72, #2a5298, #4CAF50);
        }

        .question-number {
            color: #2a5298;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        .question-text {
            font-size: 26px;
            color: #1a1a2e;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 35px;
        }

        .answers-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
            flex: 1;
        }

        .answer-btn {
            padding: 18px 22px;
            border: 2px solid #e0e0e0;
            border-radius: 16px;
            background: white;
            cursor: pointer;
            font-size: 17px;
            color: #333;
            font-weight: 500;
            transition: all 0.25s ease;
            text-align: left;
            position: relative;
            overflow: hidden;
        }

        .answer-btn:hover:not(.disabled) {
            border-color: #2a5298;
            background: #f0f4ff;
            transform: translateX(5px);
            box-shadow: 0 4px 12px rgba(42, 82, 152, 0.15);
        }

        .answer-btn.disabled {
            cursor: default;
            opacity: 0.7;
        }

        .answer-btn.correct {
            border-color: #4CAF50;
            background: #e8f5e9;
            color: #2e7d32;
            animation: correctPulse 0.6s ease;
        }

        .answer-btn.incorrect {
            border-color: #f44336;
            background: #ffebee;
            color: #c62828;
            animation: shake 0.5s ease;
        }

        @keyframes correctPulse {
            0%, 100% { transform: scale(1); }
            25% { transform: scale(1.02); }
            50% { transform: scale(1.05); box-shadow: 0 0 20px rgba(76, 175, 80, 0.4); }
            75% { transform: scale(1.02); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        .feedback-icon {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 24px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .answer-btn.correct .feedback-icon,
        .answer-btn.incorrect .feedback-icon {
            opacity: 1;
        }

        .next-btn {
            margin-top: 25px;
            padding: 16px 40px;
            background: linear-gradient(135deg, #2a5298, #1e3c72);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            align-self: flex-end;
            transition: all 0.3s ease;
            opacity: 0;
            transform: translateY(10px);
            pointer-events: none;
        }

        .next-btn.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .next-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(30, 60, 114, 0.4);
        }

        /* Score Screen */
        .score-screen {
            text-align: center;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 400px;
        }

        .score-screen.active {
            display: flex;
            animation: fadeInUp 0.8s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .trophy {
            font-size: 80px;
            margin-bottom: 20px;
            animation: bounceIn 0.8s ease;
        }

        @keyframes bounceIn {
            0% { transform: scale(0); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .score-title {
            font-size: 32px;
            color: #1a1a2e;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .score-subtitle {
            color: #666;
            font-size: 18px;
            margin-bottom: 30px;
        }

        .score-circle {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(30, 60, 114, 0.3);
            position: relative;
        }

        .score-number {
            font-size: 48px;
            font-weight: 800;
            color: white;
        }

        .score-label {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.9);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .score-message {
            font-size: 20px;
            color: #2a5298;
            font-weight: 600;
            margin-bottom: 25px;
            padding: 0 20px;
        }

        .restart-btn {
            padding: 16px 50px;
            background: linear-gradient(135deg, #4CAF50, #8BC34A);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .restart-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(76, 175, 80, 0.4);
        }

        .question-screen {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .question-screen.hidden {
            display: none;
        }

        /* Confetti */
        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
            overflow: hidden;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            animation: confettiFall linear forwards;
        }

        @keyframes confettiFall {
            0% {
                transform: translateY(-100px) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        .stars-decoration {
            position: absolute;
            top: -30px;
            right: -30px;
            font-size: 120px;
            opacity: 0.05;
            transform: rotate(15deg);
        }

        @media (max-width: 600px) {
            .card {
                padding: 25px;
                min-height: 350px;
            }
            .question-text {
                font-size: 20px;
            }
            .answer-btn {
                font-size: 15px;
                padding: 14px 18px;
            }
            .score-title {
                font-size: 26px;
            }
        }
    </style>
</head>
<body>
    <div class="confetti-container" id="confettiContainer"></div>

    <div class="quiz-container">
        <div class="progress-container">
            <div class="progress-bar" id="progressBar" style="width: 0%"></div>
            <div class="progress-text" id="progressText">Question 1 of 10</div>
        </div>

        <div class="card">
            <div class="stars-decoration">&#9733;</div>

            <div class="question-screen" id="questionScreen">
                <div class="question-number" id="questionNumber">Question 1</div>
                <div class="question-text" id="questionText">Loading...</div>
                <div class="answers-container" id="answersContainer"></div>
                <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next Question &rarr;</button>
            </div>

            <div class="score-screen" id="scoreScreen">
                <div class="trophy" id="trophyIcon">🏆</div>
                <div class="score-title">Quiz Complete!</div>
                <div class="score-subtitle">Here's how you did</div>
                <div class="score-circle">
                    <div class="score-number" id="scoreNumber">0/10</div>
                    <div class="score-label">Correct</div>
                </div>
                <div class="score-message" id="scoreMessage">Great job!</div>
                <button class="restart-btn" onclick="restartQuiz()">Try Again ↺</button>
            </div>
        </div>
    </div>

    <script>
        const allQuestions = [
            {
                question: "What is the capital of the United States?",
                answers: ["New York City", "Washington, D.C.", "Philadelphia", "Boston"],
                correct: 1
            },
            {
                question: "How many stars are on the current American flag?",
                answers: ["48", "49", "50", "52"],
                correct: 2
            },
            {
                question: "Who was the first President of the United States?",
                answers: ["Thomas Jefferson", "John Adams", "Benjamin Franklin", "George Washington"],
                correct: 3
            },
            {
                question: "On what date is Independence Day celebrated in the US?",
                answers: ["July 4th", "June 14th", "September 17th", "December 25th"],
                correct: 0
            },
            {
                question: "How many branches of government does the US have?",
                answers: ["Two", "Three", "Four", "Five"],
                correct: 1
            },
            {
                question: "What is the national anthem of the United States?",
                answers: ["America the Beautiful", "My Country, 'Tis of Thee", "The Star-Spangled Banner", "God Bless America"],
                correct: 2
            },
            {
                question: "Which state is known as the 'Sunshine State'?",
                answers: ["California", "Texas", "Hawaii", "Florida"],
                correct: 3
            },
            {
                question: "What is the largest state by area in the United States?",
                answers: ["Texas", "California", "Alaska", "Montana"],
                correct: 2
            },
            {
                question: "How many amendments are in the Bill of Rights?",
                answers: ["5", "10", "15", "27"],
                correct: 1
            },
            {
                question: "Which US document begins with 'We the People'?",
                answers: ["The Declaration of Independence", "The Constitution", "The Bill of Rights", "The Gettysburg Address"],
                correct: 1
            },
            {
                question: "What are the two main political parties in the United States?",
                answers: ["Republican and Libertarian", "Democratic and Green", "Republican and Democratic", "Conservative and Liberal"],
                correct: 2
            },
            {
                question: "Which ocean is on the East Coast of the United States?",
                answers: ["Pacific Ocean", "Atlantic Ocean", "Gulf of Mexico", "Arctic Ocean"],
                correct: 1
            },
            {
                question: "Who is known as the 'Father of Our Country'?",
                answers: ["Abraham Lincoln", "Thomas Jefferson", "George Washington", "John F. Kennedy"],
                correct: 2
            },
            {
                question: "What do the 13 stripes on the American flag represent?",
                answers: ["The 13 founding fathers", "The 13 original colonies", "The 13 first presidents", "The 13 largest states"],
                correct: 1
            },
            {
                question: "What is the longest river in the United States?",
                answers: ["Missouri River", "Mississippi River", "Colorado River", "Rio Grande"],
                correct: 0
            }
        ];

        let questions = [];
        let currentQuestion = 0;
        let score = 0;
        let answered = false;

        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function initQuiz() {
            questions = shuffleArray(allQuestions).slice(0, 10);
            currentQuestion = 0;
            score = 0;
            answered = false;
            document.getElementById('questionScreen').classList.remove('hidden');
            document.getElementById('scoreScreen').classList.remove('active');
            document.getElementById('confettiContainer').innerHTML = '';
            showQuestion();
        }

        function showQuestion() {
            answered = false;
            const q = questions[currentQuestion];

            document.getElementById('questionNumber').textContent = `Question ${currentQuestion + 1}`;
            document.getElementById('questionText').textContent = q.question;

            const container = document.getElementById('answersContainer');
            container.innerHTML = '';

            q.answers.forEach((answer, index) => {
                const btn = document.createElement('button');
                btn.className = 'answer-btn';
                btn.innerHTML = `${answer}<span class="feedback-icon" id="icon-${index}"></span>`;
                btn.onclick = () => selectAnswer(index);
                container.appendChild(btn);
            });

            document.getElementById('nextBtn').classList.remove('visible');
            updateProgress();
        }

        function updateProgress() {
            const pct = ((currentQuestion) / questions.length) * 100;
            document.getElementById('progressBar').style.width = pct + '%';
            document.getElementById('progressText').textContent = `Question ${currentQuestion + 1} of ${questions.length}`;
        }

        function selectAnswer(selectedIndex) {
            if (answered) return;
            answered = true;

            const q = questions[currentQuestion];
            const buttons = document.querySelectorAll('.answer-btn');

            buttons.forEach((btn, index) => {
                btn.classList.add('disabled');
                btn.onclick = null;

                if (index === q.correct) {
                    btn.classList.add('correct');
                    document.getElementById(`icon-${index}`).textContent = '✓';
                } else if (index === selectedIndex) {
                    btn.classList.add('incorrect');
                    document.getElementById(`icon-${index}`).textContent = '✗';
                }
            });

            if (selectedIndex === q.correct) {
                score++;
            }

            setTimeout(() => {
                document.getElementById('nextBtn').classList.add('visible');
            }, 600);
        }

        function nextQuestion() {
            currentQuestion++;

            if (currentQuestion >= questions.length) {
                showScore();
            } else {
                // Fade out effect
                const screen = document.getElementById('questionScreen');
                screen.style.opacity = '0';
                screen.style.transform = 'translateX(-20px)';
                screen.style.transition = 'all 0.3s ease';

                setTimeout(() => {
                    showQuestion();
                    screen.style.opacity = '1';
                    screen.style.transform = 'translateX(0)';
                }, 300);
            }
        }

        function showScore() {
            document.getElementById('questionScreen').classList.add('hidden');
            document.getElementById('scoreScreen').classList.add('active');
            document.getElementById('progressBar').style.width = '100%';
            document.getElementById('progressText').textContent = 'Quiz Complete!';

            document.getElementById('scoreNumber').textContent = `${score}/${questions.length}`;

            let message = '';
            let trophy = '';
            if (score === 10) {
                message = 'Perfect score! You are a true patriot! 🇺🇸';
                trophy = '🥇';
                launchConfetti();
            } else if (score >= 8) {
                message = 'Excellent! You really know your stuff!';
                trophy = '🏆';
                launchConfetti();
            } else if (score >= 6) {
                message = 'Good job! Solid knowledge of US trivia!';
                trophy = '🎖️';
            } else if (score >= 4) {
                message = 'Not bad! Room for improvement though.';
                trophy = '📚';
            } else {
                message = 'Time to brush up on your US history!';
                trophy = '💪';
            }

            document.getElementById('scoreMessage').textContent = message;
            document.getElementById('trophyIcon').textContent = trophy;
        }

        function launchConfetti() {
            const container = document.getElementById('confettiContainer');
            const colors = ['#ff0000', '#ffffff', '#0000ff', '#ffd700', '#ff69b4', '#00ff00'];

            for (let i = 0; i < 80; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDuration = (Math.random() * 3 + 2) + 's';
                confetti.style.animationDelay = (Math.random() * 2) + 's';
                confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                confetti.style.width = (Math.random() * 10 + 5) + 'px';
                confetti.style.height = (Math.random() * 10 + 5) + 'px';
                container.appendChild(confetti);
            }
        }

        function restartQuiz() {
            initQuiz();
        }

        // Start the quiz
        initQuiz();
    </script>
</body>
</html>
