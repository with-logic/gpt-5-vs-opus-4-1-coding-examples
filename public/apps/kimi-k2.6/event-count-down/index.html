<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Countdown</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #6366f1;
      --primary-glow: rgba(99, 102, 241, 0.5);
      --accent: #f472b6;
      --accent-glow: rgba(244, 114, 182, 0.5);
      --bg-dark: #0f0f1a;
      --bg-card: rgba(255, 255, 255, 0.03);
      --border: rgba(255, 255, 255, 0.08);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-dark);
      min-height: 100vh;
      overflow-x: hidden;
      color: #fff;
    }

    /* Animated background mesh */
    .bg-mesh {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse at 20% 80%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(244, 114, 182, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(99, 102, 241, 0.05) 0%, transparent 70%);
      animation: meshMove 20s ease-in-out infinite;
    }

    @keyframes meshMove {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(-2%, 2%) scale(1.05); }
      50% { transform: translate(2%, -2%) scale(0.95); }
      75% { transform: translate(-1%, -1%) scale(1.02); }
    }

    /* Background image layer */
    .bg-image-layer {
      position: fixed;
      inset: -20px;
      z-index: 1;
      background-size: cover;
      background-position: center;
      opacity: 0;
      transition: opacity 1.2s ease;
      will-change: transform;
    }

    .bg-image-layer.active {
      opacity: 0.35;
    }

    .bg-image-layer::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(15, 15, 26, 0.4) 0%, rgba(15, 15, 26, 0.8) 100%);
    }

    /* Particle canvas */
    #particles {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }

    /* Main content */
    .main-content {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    /* Glass card */
    .glass-card {
      background: var(--bg-card);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .glass-card:hover {
      border-color: rgba(255, 255, 255, 0.12);
      box-shadow:
        0 12px 48px rgba(0, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    /* Form styles */
    .input-group {
      position: relative;
      margin-bottom: 1.5rem;
    }

    .input-field {
      width: 100%;
      padding: 1rem 1.25rem;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: 16px;
      color: #fff;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      transition: all 0.3s ease;
      outline: none;
    }

    .input-field:focus {
      border-color: var(--primary);
      background: rgba(99, 102, 241, 0.05);
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
    }

    .input-field::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    .input-label {
      position: absolute;
      left: 1.25rem;
      top: 1rem;
      color: rgba(255, 255, 255, 0.4);
      font-size: 1rem;
      pointer-events: none;
      transition: all 0.3s ease;
      background: transparent;
      padding: 0 0.25rem;
    }

    .input-field:focus + .input-label,
    .input-field:not(:placeholder-shown) + .input-label {
      top: -0.6rem;
      left: 1rem;
      font-size: 0.75rem;
      color: var(--primary);
      background: var(--bg-dark);
    }

    /* Upload zone */
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: 16px;
      padding: 2rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .upload-zone:hover {
      border-color: var(--primary);
      background: rgba(99, 102, 241, 0.03);
    }

    .upload-zone.has-image {
      border-style: solid;
      border-color: var(--primary);
      padding: 0;
      min-height: 180px;
    }

    .upload-preview {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 14px;
      display: none;
    }

    .upload-zone.has-image .upload-preview {
      display: block;
    }

    .upload-zone.has-image .upload-text {
      display: none;
    }

    /* Buttons */
    .btn-primary {
      position: relative;
      padding: 1rem 2rem;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border: none;
      border-radius: 16px;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      overflow: hidden;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px var(--primary-glow);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px var(--primary-glow), 0 4px 20px var(--accent-glow);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-secondary {
      padding: 0.875rem 1.5rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: #fff;
      font-size: 0.875rem;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.2);
    }

    /* Countdown display */
    .countdown-container {
      display: none;
      opacity: 0;
      transform: translateY(40px) scale(0.95);
      transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .countdown-container.active {
      display: flex;
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .countdown-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.5rem;
      width: 100%;
      max-width: 900px;
    }

    @media (max-width: 768px) {
      .countdown-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 1rem;
      }
    }

    .countdown-item {
      position: relative;
      text-align: center;
      padding: 2rem 1rem;
    }

    .countdown-number {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(3rem, 8vw, 6rem);
      font-weight: 700;
      line-height: 1;
      background: linear-gradient(135deg, #fff, rgba(255, 255, 255, 0.7));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      position: relative;
      display: inline-block;
      min-width: 2ch;
    }

    .countdown-number.animate {
      animation: numberPop 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes numberPop {
      0% { transform: scale(1); }
      30% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }

    .countdown-label {
      margin-top: 0.75rem;
      font-size: 0.875rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.5);
    }

    /* Separator glow */
    .countdown-separator {
      position: absolute;
      right: -0.75rem;
      top: 50%;
      transform: translateY(-50%);
      width: 1px;
      height: 60%;
      background: linear-gradient(180deg, transparent, rgba(255, 255, 255, 0.2), transparent);
    }

    @media (max-width: 768px) {
      .countdown-separator {
        display: none;
      }
    }

    /* Event info */
    .event-info {
      text-align: center;
      margin-bottom: 3rem;
    }

    .event-name {
      font-size: clamp(2rem, 5vw, 4rem);
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #fff 0%, rgba(255, 255, 255, 0.7) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .event-meta {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      flex-wrap: wrap;
      color: rgba(255, 255, 255, 0.6);
      font-size: 1rem;
    }

    .event-meta-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .event-meta svg {
      width: 18px;
      height: 18px;
      opacity: 0.7;
    }

    /* Progress ring */
    .progress-ring-container {
      position: relative;
      width: 200px;
      height: 200px;
      margin: 0 auto 2rem;
    }

    .progress-ring-svg {
      transform: rotate(-90deg);
    }

    .progress-ring-bg {
      fill: none;
      stroke: rgba(255, 255, 255, 0.05);
      stroke-width: 4;
    }

    .progress-ring-fill {
      fill: none;
      stroke: url(#progressGradient);
      stroke-width: 4;
      stroke-linecap: round;
      transition: stroke-dashoffset 1s ease;
    }

    .progress-ring-text {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .progress-percent {
      font-family: 'JetBrains Mono', monospace;
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .progress-label {
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.4);
      margin-top: 0.25rem;
    }

    /* Form view transitions */
    .form-view {
      transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .form-view.hidden {
      opacity: 0;
      transform: translateY(-30px);
      pointer-events: none;
    }

    /* Floating shapes */
    .floating-shape {
      position: fixed;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.15;
      z-index: 1;
      pointer-events: none;
      animation: float 15s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      33% { transform: translate(30px, -30px) rotate(120deg); }
      66% { transform: translate(-20px, 20px) rotate(240deg); }
    }

    /* Confetti canvas */
    #confetti {
      position: fixed;
      inset: 0;
      z-index: 100;
      pointer-events: none;
      display: none;
    }

    /* Completed state */
    .completed-message {
      display: none;
      text-align: center;
    }

    .completed-message.active {
      display: block;
    }

    .completed-message h2 {
      font-size: clamp(2.5rem, 6vw, 5rem);
      font-weight: 800;
      margin-bottom: 1rem;
    }

    .completed-message p {
      font-size: 1.25rem;
      color: rgba(255, 255, 255, 0.6);
    }

    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      padding: 1rem 1.5rem;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 16px;
      color: #fff;
      font-size: 0.875rem;
      z-index: 1000;
      transform: translateX(150%);
      transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .toast.show {
      transform: translateX(0);
    }

    /* Edit button */
    .edit-btn {
      position: fixed;
      top: 2rem;
      right: 2rem;
      z-index: 50;
      opacity: 0;
      pointer-events: none;
      transition: all 0.5s ease;
    }

    .edit-btn.visible {
      opacity: 1;
      pointer-events: all;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-dark);
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    /* SVG defs */
    .svg-defs {
      position: absolute;
      width: 0;
      height: 0;
    }

    /* Input hide default date picker icon */
    input[type="datetime-local"]::-webkit-calendar-picker-indicator {
      filter: invert(1);
      opacity: 0.5;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <!-- Background layers -->
  <div class="bg-mesh"></div>
  <div class="bg-image-layer" id="bgImageLayer"></div>

  <!-- Floating shapes -->
  <div class="floating-shape" style="width: 300px; height: 300px; background: var(--primary); top: 10%; left: 10%; animation-delay: 0s;"></div>
  <div class="floating-shape" style="width: 250px; height: 250px; background: var(--accent); bottom: 20%; right: 15%; animation-delay: -5s;"></div>
  <div class="floating-shape" style="width: 200px; height: 200px; background: #8b5cf6; top: 50%; left: 60%; animation-delay: -10s;"></div>

  <!-- Particles canvas -->
  <canvas id="particles"></canvas>

  <!-- Confetti canvas -->
  <canvas id="confetti"></canvas>

  <!-- SVG defs -->
  <svg class="svg-defs">
    <defs>
      <linearGradient id="progressGradient" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" style="stop-color:#6366f1" />
        <stop offset="100%" style="stop-color:#f472b6" />
      </linearGradient>
    </defs>
  </svg>

  <!-- Edit button -->
  <button class="btn-secondary edit-btn" id="editBtn" onclick="showForm()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
      <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
    </svg>
    Edit Event
  </button>

  <!-- Main content -->
  <div class="main-content">

    <!-- Form View -->
    <div class="form-view" id="formView">
      <div class="glass-card p-8 md:p-12 w-full max-w-lg">
        <div class="text-center mb-8">
          <h1 class="text-3xl md:text-4xl font-bold mb-2" style="background: linear-gradient(135deg, #fff, rgba(255,255,255,0.7)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">
            Event Countdown
          </h1>
          <p class="text-white/40 text-sm">Create a live countdown for your special moment</p>
        </div>

        <form id="eventForm" onsubmit="startCountdown(event)">
          <div class="input-group">
            <input type="text" id="eventName" class="input-field" placeholder=" " required>
            <label class="input-label" for="eventName">Event Name</label>
          </div>

          <div class="input-group">
            <input type="datetime-local" id="eventDate" class="input-field" placeholder=" " required>
            <label class="input-label" for="eventDate">Date & Time</label>
          </div>

          <div class="input-group">
            <input type="text" id="eventLocation" class="input-field" placeholder=" ">
            <label class="input-label" for="eventLocation">Location (optional)</label>
          </div>

          <div class="mb-6">
            <div class="upload-zone" id="uploadZone" onclick="document.getElementById('bgImage').click()">
              <img class="upload-preview" id="uploadPreview" alt="">
              <div class="upload-text">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="mx-auto mb-2 text-white/30">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                  <polyline points="17 8 12 3 7 8"></polyline>
                  <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                <p class="text-white/40 text-sm">Click to upload background image</p>
                <p class="text-white/20 text-xs mt-1">JPG, PNG, WebP supported</p>
              </div>
            </div>
            <input type="file" id="bgImage" accept="image/*" style="display: none;" onchange="handleImageUpload(event)">
          </div>

          <button type="submit" class="btn-primary w-full">
            Start Countdown
          </button>
        </form>
      </div>
    </div>

    <!-- Countdown View -->
    <div class="countdown-container" id="countdownView">
      <div class="event-info">
        <h1 class="event-name" id="displayEventName">Event Name</h1>
        <div class="event-meta">
          <div class="event-meta-item" id="displayDate">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="16" y1="2" x2="16" y2="6"></line>
              <line x1="8" y1="2" x2="8" y2="6"></line>
              <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
            <span id="displayDateText">Date</span>
          </div>
          <div class="event-meta-item" id="displayLocation">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
              <circle cx="12" cy="10" r="3"></circle>
            </svg>
            <span id="displayLocationText">Location</span>
          </div>
        </div>
      </div>

      <!-- Progress Ring -->
      <div class="progress-ring-container" id="progressRing">
        <svg class="progress-ring-svg" width="200" height="200" viewBox="0 0 200 200">
          <circle class="progress-ring-bg" cx="100" cy="100" r="90"></circle>
          <circle class="progress-ring-fill" id="progressCircle" cx="100" cy="100" r="90" stroke-dasharray="565.48" stroke-dashoffset="565.48"></circle>
        </svg>
        <div class="progress-ring-text">
          <span class="progress-percent" id="progressPercent">0%</span>
          <span class="progress-label">Time Remaining</span>
        </div>
      </div>

      <!-- Countdown Numbers -->
      <div class="countdown-grid">
        <div class="glass-card countdown-item">
          <div class="countdown-number" id="days">00</div>
          <div class="countdown-separator"></div>
          <div class="countdown-label">Days</div>
        </div>
        <div class="glass-card countdown-item">
          <div class="countdown-number" id="hours">00</div>
          <div class="countdown-separator"></div>
          <div class="countdown-label">Hours</div>
        </div>
        <div class="glass-card countdown-item">
          <div class="countdown-number" id="minutes">00</div>
          <div class="countdown-separator"></div>
          <div class="countdown-label">Minutes</div>
        </div>
        <div class="glass-card countdown-item">
          <div class="countdown-number" id="seconds">00</div>
          <div class="countdown-label">Seconds</div>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="flex gap-4 mt-8 justify-center flex-wrap">
        <button class="btn-secondary" onclick="saveToCalendar()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="16" y1="2" x2="16" y2="6"></line>
            <line x1="8" y1="2" x2="8" y2="6"></line>
            <line x1="3" y1="10" x2="21" y2="10"></line>
            <path d="M8 14h.01"></path>
            <path d="M12 14h.01"></path>
            <path d="M16 14h.01"></path>
            <path d="M8 18h.01"></path>
            <path d="M12 18h.01"></path>
            <path d="M16 18h.01"></path>
          </svg>
          Save to Calendar
        </button>
        <button class="btn-secondary" onclick="shareEvent()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="18" cy="5" r="3"></circle>
            <circle cx="6" cy="12" r="3"></circle>
            <circle cx="18" cy="19" r="3"></circle>
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
            <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
          </svg>
          Share
        </button>
      </div>

      <!-- Completed Message -->
      <div class="completed-message mt-12" id="completedMessage">
        <h2 style="background: linear-gradient(135deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">
          The Wait is Over!
        </h2>
        <p id="completedText">Your event has started</p>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast">Event saved to calendar!</div>

  <script>
    // ==================== STATE ====================
    let eventData = {
      name: '',
      date: null,
      location: '',
      bgImage: null,
      originalDuration: 0
    };
    let countdownInterval = null;
    let previousValues = { days: -1, hours: -1, minutes: -1, seconds: -1 };

    // ==================== PARTICLE SYSTEM ====================
    const particlesCanvas = document.getElementById('particles');
    const particlesCtx = particlesCanvas.getContext('2d');
    let particles = [];

    function resizeParticles() {
      particlesCanvas.width = window.innerWidth;
      particlesCanvas.height = window.innerHeight;
    }
    resizeParticles();
    window.addEventListener('resize', resizeParticles);

    class Particle {
      constructor() {
        this.reset();
      }

      reset() {
        this.x = Math.random() * particlesCanvas.width;
        this.y = Math.random() * particlesCanvas.height;
        this.size = Math.random() * 2 + 0.5;
        this.speedX = (Math.random() - 0.5) * 0.5;
        this.speedY = (Math.random() - 0.5) * 0.5;
        this.opacity = Math.random() * 0.5 + 0.1;
        this.hue = Math.random() > 0.5 ? 240 : 330; // blue or pink
      }

      update() {
        this.x += this.speedX;
        this.y += this.speedY;

        if (this.x < 0 || this.x > particlesCanvas.width ||
            this.y < 0 || this.y > particlesCanvas.height) {
          this.reset();
        }
      }

      draw() {
        particlesCtx.beginPath();
        particlesCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        particlesCtx.fillStyle = `hsla(${this.hue}, 70%, 70%, ${this.opacity})`;
        particlesCtx.fill();
      }
    }

    for (let i = 0; i < 80; i++) {
      particles.push(new Particle());
    }

    function animateParticles() {
      particlesCtx.clearRect(0, 0, particlesCanvas.width, particlesCanvas.height);
      particles.forEach(p => {
        p.update();
        p.draw();
      });
      requestAnimationFrame(animateParticles);
    }
    animateParticles();

    // ==================== CONFETTI ====================
    const confettiCanvas = document.getElementById('confetti');
    const confettiCtx = confettiCanvas.getContext('2d');
    let confettiPieces = [];
    let confettiActive = false;

    function resizeConfetti() {
      confettiCanvas.width = window.innerWidth;
      confettiCanvas.height = window.innerHeight;
    }
    resizeConfetti();
    window.addEventListener('resize', resizeConfetti);

    class ConfettiPiece {
      constructor() {
        this.x = Math.random() * confettiCanvas.width;
        this.y = -20;
        this.size = Math.random() * 10 + 5;
        this.color = `hsl(${Math.random() * 360}, 70%, 60%)`;
        this.speedY = Math.random() * 3 + 2;
        this.speedX = (Math.random() - 0.5) * 4;
        this.rotation = Math.random() * 360;
        this.rotationSpeed = (Math.random() - 0.5) * 10;
        this.gravity = 0.05;
      }

      update() {
        this.y += this.speedY;
        this.x += this.speedX;
        this.speedY += this.gravity;
        this.rotation += this.rotationSpeed;
      }

      draw() {
        confettiCtx.save();
        confettiCtx.translate(this.x, this.y);
        confettiCtx.rotate(this.rotation * Math.PI / 180);
        confettiCtx.fillStyle = this.color;
        confettiCtx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);
        confettiCtx.restore();
      }
    }

    function startConfetti() {
      confettiCanvas.style.display = 'block';
      confettiActive = true;
      confettiPieces = [];
      for (let i = 0; i < 150; i++) {
        setTimeout(() => confettiPieces.push(new ConfettiPiece()), i * 20);
      }
      animateConfetti();
    }

    function animateConfetti() {
      if (!confettiActive) return;
      confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
      confettiPieces.forEach(p => {
        p.update();
        p.draw();
      });
      confettiPieces = confettiPieces.filter(p => p.y < confettiCanvas.height + 50);
      if (confettiPieces.length > 0) {
        requestAnimationFrame(animateConfetti);
      } else {
        confettiActive = false;
        confettiCanvas.style.display = 'none';
      }
    }

    // ==================== PARALLAX ====================
    document.addEventListener('mousemove', (e) => {
      const x = (e.clientX / window.innerWidth - 0.5) * 2;
      const y = (e.clientY / window.innerHeight - 0.5) * 2;

      const bgLayer = document.getElementById('bgImageLayer');
      if (bgLayer.classList.contains('active')) {
        bgLayer.style.transform = `translate(${x * 15}px, ${y * 15}px) scale(1.05)`;
      }

      // Move floating shapes slightly
      document.querySelectorAll('.floating-shape').forEach((shape, i) => {
        const factor = (i + 1) * 5;
        shape.style.transform = `translate(${x * factor}px, ${y * factor}px)`;
      });
    });

    // ==================== IMAGE UPLOAD ====================
    function handleImageUpload(e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (event) => {
        eventData.bgImage = event.target.result;
        const preview = document.getElementById('uploadPreview');
        preview.src = event.target.result;
        document.getElementById('uploadZone').classList.add('has-image');
      };
      reader.readAsDataURL(file);
    }

    // ==================== FORM HANDLING ====================
    function startCountdown(e) {
      e.preventDefault();

      const name = document.getElementById('eventName').value.trim();
      const dateStr = document.getElementById('eventDate').value;
      const location = document.getElementById('eventLocation').value.trim();

      if (!name || !dateStr) return;

      const targetDate = new Date(dateStr);
      const now = new Date();

      if (targetDate <= now) {
        showToast('Please select a future date and time');
        return;
      }

      eventData = {
        name,
        date: targetDate,
        location,
        bgImage: eventData.bgImage,
        originalDuration: targetDate - now
      };

      // Set background image
      if (eventData.bgImage) {
        const bgLayer = document.getElementById('bgImageLayer');
        bgLayer.style.backgroundImage = `url(${eventData.bgImage})`;
        bgLayer.classList.add('active');
      }

      // Update display
      document.getElementById('displayEventName').textContent = name;

      const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' };
      document.getElementById('displayDateText').textContent = targetDate.toLocaleDateString('en-US', dateOptions);

      const locationEl = document.getElementById('displayLocation');
      if (location) {
        document.getElementById('displayLocationText').textContent = location;
        locationEl.style.display = 'flex';
      } else {
        locationEl.style.display = 'none';
      }

      // Hide form, show countdown
      document.getElementById('formView').classList.add('hidden');
      setTimeout(() => {
        document.getElementById('formView').style.display = 'none';
        const countdownView = document.getElementById('countdownView');
        countdownView.style.display = 'flex';
        setTimeout(() => countdownView.classList.add('active'), 50);
      }, 600);

      document.getElementById('editBtn').classList.add('visible');

      // Start countdown
      updateCountdown();
      countdownInterval = setInterval(updateCountdown, 1000);
    }

    function showForm() {
      clearInterval(countdownInterval);
      document.getElementById('countdownView').classList.remove('active');
      document.getElementById('editBtn').classList.remove('visible');

      setTimeout(() => {
        document.getElementById('countdownView').style.display = 'none';
        const formView = document.getElementById('formView');
        formView.style.display = 'block';
        setTimeout(() => formView.classList.remove('hidden'), 50);
      }, 600);

      // Reset completed state
      document.getElementById('completedMessage').classList.remove('active');
      document.getElementById('progressRing').style.display = 'block';
      document.querySelector('.countdown-grid').style.display = 'grid';
    }

    // ==================== COUNTDOWN LOGIC ====================
    function updateCountdown() {
      const now = new Date().getTime();
      const target = eventData.date.getTime();
      const diff = target - now;

      if (diff <= 0) {
        completeCountdown();
        return;
      }

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((diff % (1000 * 60)) / 1000);

      updateNumber('days', days);
      updateNumber('hours', hours);
      updateNumber('minutes', minutes);
      updateNumber('seconds', seconds);

      // Update progress ring
      const totalSeconds = eventData.originalDuration / 1000;
      const remainingSeconds = diff / 1000;
      const progress = remainingSeconds / totalSeconds;
      const circumference = 2 * Math.PI * 90;
      const offset = circumference * (1 - progress);

      document.getElementById('progressCircle').style.strokeDashoffset = offset;
      document.getElementById('progressPercent').textContent = Math.round(progress * 100) + '%';
    }

    function updateNumber(id, value) {
      const el = document.getElementById(id);
      const str = String(value).padStart(2, '0');

      if (previousValues[id] !== value) {
        el.textContent = str;
        el.classList.remove('animate');
        void el.offsetWidth; // Force reflow
        el.classList.add('animate');
        previousValues[id] = value;
      }
    }

    function completeCountdown() {
      clearInterval(countdownInterval);

      document.getElementById('days').textContent = '00';
      document.getElementById('hours').textContent = '00';
      document.getElementById('minutes').textContent = '00';
      document.getElementById('seconds').textContent = '00';

      document.getElementById('progressRing').style.display = 'none';
      document.querySelector('.countdown-grid').style.display = 'none';
      document.getElementById('completedMessage').classList.add('active');
      document.getElementById('completedText').textContent = `${eventData.name} has started!`;

      startConfetti();
      showToast('Your event has started!');
    }

    // ==================== CALENDAR ====================
    function saveToCalendar() {
      const eventName = eventData.name;
      const eventDate = eventData.date;
      const location = eventData.location || '';

      const startDate = eventDate.toISOString().replace(/[-:]/g, '').replace(/\.\d{3}/, '');
      const endDate = new Date(eventDate.getTime() + 60 * 60 * 1000).toISOString().replace(/[-:]/g, '').replace(/\.\d{3}/, '');

      const icsContent = [
        'BEGIN:VCALENDAR',
        'VERSION:2.0',
        'PRODID:-//EventCountdown//EN',
        'BEGIN:VEVENT',
        `DTSTART:${startDate}`,
        `DTEND:${endDate}`,
        `SUMMARY:${eventName}`,
        location ? `LOCATION:${location}` : '',
        'END:VEVENT',
        'END:VCALENDAR'
      ].filter(Boolean).join('\r\n');

      const blob = new Blob([icsContent], { type: 'text/calendar;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `${eventName.replace(/\s+/g, '_')}.ics`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);

      showToast('Calendar file downloaded!');
    }

    // ==================== SHARE ====================
    async function shareEvent() {
      const shareData = {
        title: eventData.name,
        text: `Countdown to ${eventData.name}!`,
        url: window.location.href
      };

      if (navigator.share) {
        try {
          await navigator.share(shareData);
        } catch (err) {
          if (err.name !== 'AbortError') {
            copyToClipboard();
          }
        }
      } else {
        copyToClipboard();
      }
    }

    function copyToClipboard() {
      const text = `Countdown to ${eventData.name} on ${eventData.date.toLocaleDateString()}!`;
      navigator.clipboard.writeText(text).then(() => {
        showToast('Link copied to clipboard!');
      });
    }

    // ==================== TOAST ====================
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // ==================== INIT ====================
    // Set min datetime to now
    const now = new Date();
    now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
    document.getElementById('eventDate').min = now.toISOString().slice(0, 16);
  </script>
</body>
