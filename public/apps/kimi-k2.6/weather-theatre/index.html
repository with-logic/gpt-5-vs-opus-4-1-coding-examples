<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Weather Theatre</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@300;400;700&display=swap');

  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  :root {
    --gold: #d4af37;
    --deep-red: #6b0f1a;
    --velvet: #2a0a12;
    --stage-black: #0d0407;
    --cream: #f5e6d3;
  }

  body {
    background: var(--stage-black);
    color: var(--cream);
    font-family: 'Lato', sans-serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
  }

  #root {
    width: 100%;
    height: 100%;
  }

  .theatre-stage {
    position: relative;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  /* Curtain layers */
  .curtain {
    position: absolute;
    top: 0;
    width: 50%;
    height: 100%;
    z-index: 50;
    transition: transform 1.8s cubic-bezier(0.25, 1, 0.5, 1);
    pointer-events: none;
  }

  .curtain-left {
    left: 0;
    transform-origin: left center;
    background: linear-gradient(90deg, #1a0508 0%, #4a0e18 15%, #6b0f1a 40%, #4a0e18 85%, #1a0508 100%);
  }

  .curtain-left::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(0,0,0,0.3) 40px, rgba(0,0,0,0.3) 42px);
  }

  .curtain-right {
    right: 0;
    transform-origin: right center;
    background: linear-gradient(-90deg, #1a0508 0%, #4a0e18 15%, #6b0f1a 40%, #4a0e18 85%, #1a0508 100%);
  }

  .curtain-right::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(0,0,0,0.3) 40px, rgba(0,0,0,0.3) 42px);
  }

  .curtain-tie {
    position: absolute;
    bottom: 15%;
    width: 80px;
    height: 120px;
    background: radial-gradient(ellipse at center, #d4af37 0%, #8a6e1c 70%, transparent 100%);
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    opacity: 0.8;
  }

  .curtain-tie-left {
    right: -40px;
  }

  .curtain-tie-right {
    left: -40px;
  }

  .curtain.open-left {
    transform: translateX(-85%) scaleX(0.3);
  }

  .curtain.open-right {
    transform: translateX(85%) scaleX(0.3);
  }

  /* Gold trim on curtains */
  .curtain-trim {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 12px;
    background: linear-gradient(90deg, #6b0f1a, #d4af37, #6b0f1a);
    z-index: 51;
  }

  /* Proscenium arch */
  .proscenium {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 40;
    pointer-events: none;
    box-shadow: inset 0 0 80px rgba(0,0,0,0.9), inset 0 0 20px rgba(212,175,55,0.1);
    border: 24px solid transparent;
    border-image: linear-gradient(135deg, #3d1e1e 0%, #6b0f1a 20%, #d4af37 50%, #6b0f1a 80%, #3d1e1e 100%) 1;
  }

  .proscenium::before {
    content: '';
    position: absolute;
    top: -24px;
    left: -24px;
    right: -24px;
    height: 8px;
    background: linear-gradient(90deg, #3d1e1e, #d4af37, #3d1e1e);
  }

  /* Canvas layers */
  .backdrop-canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
  }

  .spotlight-canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 30;
    mix-blend-mode: screen;
    pointer-events: none;
  }

  /* UI overlay */
  .ui-layer {
    position: absolute;
    z-index: 60;
    width: 100%;
    height: 100%;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 40px;
  }

  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    pointer-events: auto;
  }

  .theatre-title {
    font-family: 'Cinzel', serif;
    font-size: 2.2rem;
    font-weight: 700;
    color: var(--gold);
    text-shadow: 0 0 20px rgba(212,175,55,0.4), 0 2px 4px rgba(0,0,0,0.8);
    letter-spacing: 0.15em;
    opacity: 0;
    transform: translateY(-20px);
    transition: all 1s ease 1.5s;
  }

  .theatre-title.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .subtitle {
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    color: rgba(245,230,211,0.7);
    letter-spacing: 0.1em;
    margin-top: 6px;
    min-height: 1.5em;
  }

  .toggle-btn {
    background: rgba(212,175,55,0.15);
    border: 1px solid var(--gold);
    color: var(--gold);
    padding: 8px 24px;
    font-family: 'Cinzel', serif;
    font-size: 0.85rem;
    cursor: pointer;
    border-radius: 4px;
    letter-spacing: 0.1em;
    transition: all 0.4s ease;
    backdrop-filter: blur(10px);
  }

  .toggle-btn:hover {
    background: rgba(212,175,55,0.3);
    box-shadow: 0 0 15px rgba(212,175,55,0.3);
  }

  /* Weather forecast cards */
  .forecast-stage {
    display: flex;
    justify-content: center;
    gap: 20px;
    pointer-events: auto;
    opacity: 0;
    transform: translateY(30px);
    transition: all 1.2s ease 2s;
  }

  .forecast-stage.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .weather-card {
    background: rgba(13,4,7,0.7);
    border: 1px solid rgba(212,175,55,0.3);
    border-radius: 12px;
    padding: 24px 20px;
    width: 160px;
    text-align: center;
    backdrop-filter: blur(12px);
    transition: all 0.5s ease;
    position: relative;
    overflow: hidden;
  }

  .weather-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity: 0.5;
  }

  .weather-card:hover {
    transform: translateY(-6px);
    border-color: rgba(212,175,55,0.6);
    box-shadow: 0 8px 32px rgba(212,175,55,0.15);
  }

  .card-day {
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    color: var(--gold);
    letter-spacing: 0.15em;
    margin-bottom: 12px;
  }

  .card-icon {
    font-size: 2.5rem;
    margin: 8px 0;
    filter: drop-shadow(0 0 8px rgba(212,175,55,0.3));
  }

  .card-temp {
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--cream);
    margin: 8px 0;
  }

  .card-desc {
    font-size: 0.8rem;
    color: rgba(245,230,211,0.6);
    text-transform: capitalize;
  }

  /* Controls */
  .controls-panel {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 60;
    pointer-events: auto;
    background: rgba(13,4,7,0.8);
    border: 1px solid rgba(212,175,55,0.2);
    border-radius: 16px;
    padding: 24px 36px;
    backdrop-filter: blur(16px);
    display: flex;
    gap: 40px;
    align-items: center;
    opacity: 0;
    transition: all 1s ease 2.2s;
  }

  .controls-panel.visible {
    opacity: 1;
  }

  .slider-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .slider-label {
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    color: var(--gold);
    letter-spacing: 0.1em;
  }

  .slider-track {
    -webkit-appearance: none;
    appearance: none;
    width: 140px;
    height: 4px;
    border-radius: 2px;
    outline: none;
    cursor: pointer;
    background: rgba(212,175,55,0.2);
  }

  .slider-track::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid var(--gold);
    background: var(--velvet);
    box-shadow: 0 0 10px rgba(212,175,55,0.4);
    transition: transform 0.2s ease;
  }

  .slider-track::-webkit-slider-thumb:hover {
    transform: scale(1.2);
  }

  .slider-track::-moz-range-thumb {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid var(--gold);
    background: var(--velvet);
    box-shadow: 0 0 10px rgba(212,175,55,0.4);
  }

  .mood-cosy::-webkit-slider-thumb { background: #8b5e3c; }
  .mood-eerie::-webkit-slider-thumb { background: #2d1b69; }
  .mood-heroic::-webkit-slider-thumb { background: #c41e3a; }

  .mood-cosy { accent-color: #d4a574; }
  .mood-eerie { accent-color: #7b68ee; }
  .mood-heroic { accent-color: #c41e3a; }

  /* Scene subtitle */
  .scene-subtitle {
    position: absolute;
    bottom: 160px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 60;
    font-family: 'Cinzel', serif;
    font-size: 1.1rem;
    color: rgba(245,230,211,0.85);
    letter-spacing: 0.08em;
    text-align: center;
    max-width: 600px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.8);
    pointer-events: none;
  }

  .cursor-blink {
    display: inline-block;
    width: 2px;
    height: 1em;
    background: var(--gold);
    margin-left: 2px;
    animation: blink 1s step-end infinite;
    vertical-align: text-bottom;
  }

  @keyframes blink {
    50% { opacity: 0; }
  }

  /* Dust particles overlay */
  .dust-layer {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 25;
    pointer-events: none;
    opacity: 0.4;
    mix-blend-mode: screen;
  }

  /* Vignette */
  .vignette {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 35;
    pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.6) 100%);
  }

  /* Responsive */
  @media (max-width: 768px) {
    .forecast-stage { flex-wrap: wrap; gap: 10px; }
    .weather-card { width: 130px; padding: 16px 12px; }
    .controls-panel { flex-direction: column; gap: 16px; padding: 20px; }
    .theatre-title { font-size: 1.5rem; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// Mock forecast data
const FORECAST = [
  { day: 'Mon', temp: 18, desc: 'gentle rain', icon: '🌧️' },
  { day: 'Tue', temp: 22, desc: 'partly cloudy', icon: '⛅' },
  { day: 'Wed', temp: 25, desc: 'clear skies', icon: '☀️' },
  { day: 'Thu', temp: 20, desc: 'misty dawn', icon: '🌫️' },
  { day: 'Fri', temp: 17, desc: 'thunderous', icon: '⛈️' },
];

// Scene descriptions based on mood blend
function getSceneDescription(cosy, eerie, heroic, isNight) {
  const time = isNight ? 'under moonlit velvet' : 'beneath golden rafters';

  if (cosy > 0.6 && eerie < 0.3 && heroic < 0.3) {
    return `A hearth-lit sanctuary ${time}, where warm rain taps the windowpane and tea steams in porcelain cups.`;
  }
  if (eerie > 0.6 && cosy < 0.3 && heroic < 0.3) {
    return `A spectral auditorium ${time}, fog coils between the seats, and the forecast whispers of forgotten storms.`;
  }
  if (heroic > 0.6 && cosy < 0.3 && eerie < 0.3) {
    return `A grand coliseum ${time}, thunder applauds your arrival, and the elements bow before the stage.`;
  }
  if (cosy > 0.4 && eerie > 0.4) {
    return `A candlelit mystery ${time}, cozy corners flicker with shadows that seem almost alive.`;
  }
  if (cosy > 0.4 && heroic > 0.4) {
    return `A valiant hearth ${time}, where warmth and courage mingle in the rising steam.`;
  }
  if (eerie > 0.4 && heroic > 0.4) {
    return `A dramatic haunting ${time}, spectral spotlights sweep across banners of ancient glory.`;
  }
  return `The stage awaits ${time}, moods intertwine like spotlights crossing in the dark.`;
}

// Color interpolation
function lerp(a, b, t) {
  return a + (b - a) * t;
}

function lerpColor(c1, c2, t) {
  const r = Math.round(lerp(c1[0], c2[0], t));
  const g = Math.round(lerp(c1[1], c2[1], t));
  const b = Math.round(lerp(c1[2], c2[2], t));
  return `rgb(${r},${g},${b})`;
}

function blendMoodColor(cosy, eerie, heroic, isNight) {
  // Normalize
  const sum = cosy + eerie + heroic;
  if (sum === 0) return isNight ? [20, 15, 35] : [135, 180, 220];
  const nc = cosy / sum;
  const ne = eerie / sum;
  const nh = heroic / sum;

  const cosyColor = isNight ? [60, 35, 25] : [200, 160, 120];
  const eerieColor = isNight ? [25, 20, 60] : [120, 130, 160];
  const heroicColor = isNight ? [50, 20, 30] : [180, 200, 230];

  const r = cosyColor[0] * nc + eerieColor[0] * ne + heroicColor[0] * nh;
  const g = cosyColor[1] * nc + eerieColor[1] * ne + heroicColor[1] * nh;
  const b = cosyColor[2] * nc + eerieColor[2] * ne + heroicColor[2] * nh;
  return [Math.round(r), Math.round(g), Math.round(b)];
}

// Backdrop Canvas Component
function BackdropCanvas({ cosy, eerie, heroic, isNight, mouseX }) {
  const canvasRef = useRef(null);
  const animRef = useRef(null);
  const timeRef = useRef(0);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');

    const resize = () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    };
    resize();
    window.addEventListener('resize', resize);

    // Generate layers
    const stars = Array.from({ length: 150 }, () => ({
      x: Math.random(),
      y: Math.random() * 0.6,
      size: Math.random() * 2 + 0.5,
      twinkleSpeed: Math.random() * 2 + 1,
      phase: Math.random() * Math.PI * 2,
    }));

    const clouds = Array.from({ length: 8 }, (_, i) => ({
      x: Math.random(),
      y: 0.1 + Math.random() * 0.3,
      width: 0.15 + Math.random() * 0.25,
      speed: 0.02 + Math.random() * 0.03,
      opacity: 0.3 + Math.random() * 0.4,
      layer: i % 3,
    }));

    const hills = Array.from({ length: 5 }, (_, i) => ({
      points: Array.from({ length: 8 }, () => Math.random() * 0.3 + 0.3),
      color: i,
      yOffset: 0.55 + i * 0.08,
      parallax: 0.02 + i * 0.015,
    }));

    const raindrops = Array.from({ length: 100 }, () => ({
      x: Math.random(),
      y: Math.random(),
      speed: 0.3 + Math.random() * 0.5,
      length: 10 + Math.random() * 20,
    }));

    const particles = Array.from({ length: 60 }, () => ({
      x: Math.random(),
      y: Math.random(),
      size: Math.random() * 3 + 1,
      speedY: -0.02 - Math.random() * 0.03,
      speedX: (Math.random() - 0.5) * 0.01,
      life: Math.random(),
    }));

    const draw = () => {
      timeRef.current += 0.016;
      const t = timeRef.current;
      const w = canvas.width;
      const h = canvas.height;
      const mx = (mouseX.current / w - 0.5) * 2;

      // Normalize moods
      const sum = cosy + eerie + heroic;
      const nc = sum === 0 ? 0.33 : cosy / sum;
      const ne = sum === 0 ? 0.33 : eerie / sum;
      const nh = sum === 0 ? 0.33 : heroic / sum;

      // Sky gradient
      const baseColor = blendMoodColor(cosy, eerie, heroic, isNight);
      const skyTop = isNight
        ? lerpColor([5, 5, 15], baseColor, 0.3)
        : lerpColor([100, 140, 200], baseColor, 0.4);
      const skyBot = isNight
        ? lerpColor([15, 10, 30], baseColor, 0.5)
        : lerpColor([180, 200, 230], baseColor, 0.5);

      const grad = ctx.createLinearGradient(0, 0, 0, h);
      grad.addColorStop(0, skyTop);
      grad.addColorStop(1, skyBot);
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, w, h);

      // Stars (visible more at night and eerie)
      const starVisibility = (isNight ? 1 : 0.15) * (1 + ne * 0.5);
      if (starVisibility > 0.05) {
        stars.forEach(star => {
          const twinkle = Math.sin(t * star.twinkleSpeed + star.phase) * 0.5 + 0.5;
          const alpha = twinkle * star.size * 0.5 * starVisibility;
          ctx.fillStyle = `rgba(255, 255, 230, ${alpha})`;
          ctx.beginPath();
          const sx = star.x * w + mx * 5;
          const sy = star.y * h;
          ctx.arc(sx, sy, star.size, 0, Math.PI * 2);
          ctx.fill();
        });
      }

      // Moon / Sun
      if (isNight) {
        const moonX = w * 0.75 + mx * 15;
        const moonY = h * 0.15;
        const moonGlow = ctx.createRadialGradient(moonX, moonY, 0, moonX, moonY, 120);
        moonGlow.addColorStop(0, 'rgba(255, 250, 220, 0.15)');
        moonGlow.addColorStop(0.5, 'rgba(255, 250, 220, 0.05)');
        moonGlow.addColorStop(1, 'rgba(255, 250, 220, 0)');
        ctx.fillStyle = moonGlow;
        ctx.beginPath();
        ctx.arc(moonX, moonY, 120, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = 'rgba(255, 252, 235, 0.9)';
        ctx.beginPath();
        ctx.arc(moonX, moonY, 35, 0, Math.PI * 2);
        ctx.fill();
        // Crater
        ctx.fillStyle = 'rgba(200, 200, 180, 0.2)';
        ctx.beginPath();
        ctx.arc(moonX - 8, moonY + 4, 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(moonX + 10, moonY - 6, 5, 0, Math.PI * 2);
        ctx.fill();
      } else {
        const sunX = w * 0.2 + mx * 20;
        const sunY = h * 0.12;
        const sunGlow = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, 150);
        sunGlow.addColorStop(0, 'rgba(255, 240, 200, 0.3)');
        sunGlow.addColorStop(0.5, 'rgba(255, 220, 150, 0.1)');
        sunGlow.addColorStop(1, 'rgba(255, 200, 100, 0)');
        ctx.fillStyle = sunGlow;
        ctx.beginPath();
        ctx.arc(sunX, sunY, 150, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = 'rgba(255, 248, 220, 0.95)';
        ctx.beginPath();
        ctx.arc(sunX, sunY, 40, 0, Math.PI * 2);
        ctx.fill();
      }

      // Clouds
      clouds.forEach(cloud => {
        const parallax = cloud.layer === 0 ? 0.01 : cloud.layer === 1 ? 0.03 : 0.05;
        const cx = ((cloud.x + t * cloud.speed * 0.01) % 1.4 - 0.2) * w + mx * parallax * w;
        const cy = cloud.y * h;
        const cw = cloud.width * w;

        const cloudColor = isNight
          ? `rgba(${60 + ne * 40}, ${55 + ne * 30}, ${70 + ne * 50}, ${cloud.opacity * 0.5})`
          : `rgba(${220 + ne * 20}, ${220 + ne * 10}, ${230 - ne * 20}, ${cloud.opacity * 0.6})`;

        ctx.fillStyle = cloudColor;
        // Draw cloud as overlapping circles
        for (let i = 0; i < 5; i++) {
          const ox = (i - 2) * cw * 0.18;
          const oy = -Math.abs(i - 2) * cw * 0.06;
          const r = cw * (0.12 + Math.abs(i - 2) * 0.03);
          ctx.beginPath();
          ctx.arc(cx + ox, cy + oy, r, 0, Math.PI * 2);
          ctx.fill();
        }
      });

      // Parallax hills
      hills.forEach((hill, idx) => {
        const parallax = hill.parallax;
        const baseY = hill.yOffset * h;
        const hillColor = isNight
          ? [15 + idx * 8 + ne * 10, 10 + idx * 6 + ne * 5, 20 + idx * 10 + ne * 15]
          : [60 + idx * 20 + nc * 30, 80 + idx * 15 + nc * 20, 50 + idx * 10 + nc * 10];

        ctx.fillStyle = `rgb(${hillColor[0]}, ${hillColor[1]}, ${hillColor[2]})`;
        ctx.beginPath();
        ctx.moveTo(0, h);
        hill.points.forEach((p, i) => {
          const px = (i / (hill.points.length - 1)) * w + mx * parallax * w * (1 + idx * 0.5);
          const py = baseY - p * h * 0.25;
          if (i === 0) ctx.lineTo(px, py);
          else {
            const prevX = ((i - 1) / (hill.points.length - 1)) * w + mx * parallax * w * (1 + idx * 0.5);
            const prevY = baseY - hill.points[i - 1] * h * 0.25;
            const cpX = (prevX + px) / 2;
            ctx.quadraticCurveTo(prevX, prevY, cpX, (prevY + py) / 2);
            ctx.quadraticCurveTo(cpX, (prevY + py) / 2, px, py);
          }
        });
        ctx.lineTo(w, h);
        ctx.closePath();
        ctx.fill();

        // Trees on hill tops for cosy
        if (nc > 0.3 && idx === hills.length - 1) {
          ctx.fillStyle = isNight ? `rgba(30, 25, 20, ${nc * 0.8})` : `rgba(50, 70, 40, ${nc * 0.8})`;
          hill.points.forEach((p, i) => {
            if (i % 2 === 0) {
              const tx = (i / (hill.points.length - 1)) * w + mx * parallax * w * (1 + idx * 0.5);
              const ty = baseY - p * h * 0.25;
              // Simple pine tree
              ctx.beginPath();
              ctx.moveTo(tx, ty - 20);
              ctx.lineTo(tx - 8, ty + 5);
              ctx.lineTo(tx + 8, ty + 5);
              ctx.closePath();
              ctx.fill();
              ctx.beginPath();
              ctx.moveTo(tx, ty - 35);
              ctx.lineTo(tx - 6, ty - 10);
              ctx.lineTo(tx + 6, ty - 10);
              ctx.closePath();
              ctx.fill();
            }
          });
        }
      });

      // Rain (eerie + cosy mix)
      const rainIntensity = (ne * 0.8 + nc * 0.3) * (isNight ? 1 : 0.6);
      if (rainIntensity > 0.1) {
        ctx.strokeStyle = isNight
          ? `rgba(180, 180, 200, ${rainIntensity * 0.4})`
          : `rgba(150, 160, 180, ${rainIntensity * 0.3})`;
        ctx.lineWidth = 1.5;
        raindrops.forEach(drop => {
          const dx = drop.x * w;
          const dy = ((drop.y + t * drop.speed * 0.05) % 1) * h;
          ctx.beginPath();
          ctx.moveTo(dx, dy);
          ctx.lineTo(dx - 2, dy + drop.length * rainIntensity);
          ctx.stroke();
        });
      }

      // Floating particles (cosy = warm embers, eerie = fog, heroic = sparkles)
      particles.forEach(p => {
        p.life += 0.005;
        if (p.life > 1) {
          p.life = 0;
          p.x = Math.random();
          p.y = 1;
        }
        const px = p.x * w + mx * 8;
        const py = p.y * h + p.life * p.speedY * h;

        if (nc > 0.3) {
          // Warm ember
          const alpha = (1 - p.life) * nc * 0.6;
          ctx.fillStyle = `rgba(255, ${180 + p.life * 40}, ${100 + p.life * 60}, ${alpha})`;
        } else if (ne > 0.3) {
          // Eerie fog
          const alpha = (1 - p.life) * ne * 0.3;
          ctx.fillStyle = `rgba(200, 200, 220, ${alpha})`;
        } else if (nh > 0.3) {
          // Heroic spark
          const alpha = (1 - p.life) * nh * 0.5;
          ctx.fillStyle = `rgba(255, 220, ${100 + p.life * 50}, ${alpha})`;
        } else {
          return;
        }

        ctx.beginPath();
        ctx.arc(px, py, p.size * (1 - p.life * 0.5), 0, Math.PI * 2);
        ctx.fill();
      });

      // Lightning for heroic + eerie
      const lightningChance = (nh * 0.5 + ne * 0.3) * (isNight ? 1.5 : 0.5);
      if (Math.random() < lightningChance * 0.01) {
        const lx = Math.random() * w;
        ctx.strokeStyle = `rgba(255, 255, 240, ${0.3 + Math.random() * 0.4})`;
        ctx.lineWidth = 2 + Math.random() * 2;
        ctx.beginPath();
        ctx.moveTo(lx, 0);
        let ly = 0;
        let lcx = lx;
        while (ly < h * 0.4) {
          ly += 20 + Math.random() * 40;
          lcx += (Math.random() - 0.5) * 60;
          ctx.lineTo(lcx, ly);
        }
        ctx.stroke();

        // Flash
        ctx.fillStyle = `rgba(255, 255, 230, ${0.05 + Math.random() * 0.08})`;
        ctx.fillRect(0, 0, w, h);
      }

      animRef.current = requestAnimationFrame(draw);
    };

    animRef.current = requestAnimationFrame(draw);

    return () => {
      cancelAnimationFrame(animRef.current);
      window.removeEventListener('resize', resize);
    };
  }, [cosy, eerie, heroic, isNight, mouseX]);

  return <canvas ref={canvasRef} className="backdrop-canvas" />;
}

// Spotlight Canvas Component
function SpotlightCanvas({ isNight, cosy, eerie, heroic }) {
  const canvasRef = useRef(null);
  const animRef = useRef(null);
  const timeRef = useRef(0);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');

    const resize = () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    };
    resize();
    window.addEventListener('resize', resize);

    const draw = () => {
      timeRef.current += 0.016;
      const t = timeRef.current;
      const w = canvas.width;
      const h = canvas.height;

      ctx.clearRect(0, 0, w, h);

      const sum = cosy + eerie + heroic;
      const nc = sum === 0 ? 0.33 : cosy / sum;
      const ne = sum === 0 ? 0.33 : eerie / sum;
      const nh = sum === 0 ? 0.33 : heroic / sum;

      // Main spotlight sweep
      const spotX = w * 0.5 + Math.sin(t * 0.3) * w * 0.25 + Math.sin(t * 0.7) * w * 0.1;
      const spotY = h * 0.3 + Math.sin(t * 0.4) * h * 0.1;
      const spotRadius = 180 + Math.sin(t * 0.5) * 40;

      const spotColor = ne > 0.4
        ? `rgba(180, 170, 255, ${isNight ? 0.12 : 0.06})`
        : nh > 0.4
          ? `rgba(255, 220, 180, ${isNight ? 0.15 : 0.08})`
          : `rgba(255, 240, 220, ${isNight ? 0.12 : 0.07})`;

      const spotGrad = ctx.createRadialGradient(spotX, spotY, 0, spotX, spotY, spotRadius);
      spotGrad.addColorStop(0, spotColor);
      spotGrad.addColorStop(0.5, spotColor.replace(/[\d.]+\)$/, '0.05)'));
      spotGrad.addColorStop(1, 'rgba(0,0,0,0)');

      ctx.fillStyle = spotGrad;
      ctx.beginPath();
      ctx.arc(spotX, spotY, spotRadius, 0, Math.PI * 2);
      ctx.fill();

      // Secondary spot (crossing)
      const spot2X = w * 0.5 + Math.sin(t * 0.25 + 2) * w * 0.2;
      const spot2Y = h * 0.4 + Math.sin(t * 0.35 + 1) * h * 0.08;
      const spot2Grad = ctx.createRadialGradient(spot2X, spot2Y, 0, spot2X, spot2Y, 120);
      spot2Grad.addColorStop(0, `rgba(255, 250, 240, ${isNight ? 0.06 : 0.03})`);
      spot2Grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = spot2Grad;
      ctx.beginPath();
      ctx.arc(spot2X, spot2Y, 120, 0, Math.PI * 2);
      ctx.fill();

      // Beam cone effect
      ctx.save();
      ctx.globalCompositeOperation = 'screen';
      const beamGrad = ctx.createLinearGradient(spotX, -50, spotX, spotY);
      beamGrad.addColorStop(0, 'rgba(255, 255, 240, 0)');
      beamGrad.addColorStop(1, `rgba(255, 255, 240, ${isNight ? 0.03 : 0.015})`);
      ctx.fillStyle = beamGrad;
      ctx.beginPath();
      ctx.moveTo(spotX - spotRadius * 0.3, spotY);
      ctx.lineTo(spotX + spotRadius * 0.3, spotY);
      ctx.lineTo(spotX + spotRadius * 1.5, -50);
      ctx.lineTo(spotX - spotRadius * 1.5, -50);
      ctx.closePath();
      ctx.fill();
      ctx.restore();

      // Dust in spotlight
      if (nc > 0.2 || ne > 0.2) {
        for (let i = 0; i < 30; i++) {
          const dx = spotX + (Math.random() - 0.5) * spotRadius * 1.5;
          const dy = spotY + (Math.random() - 0.5) * spotRadius * 0.8;
          const dist = Math.sqrt((dx - spotX) ** 2 + (dy - spotY) ** 2);
          if (dist < spotRadius) {
            const alpha = (1 - dist / spotRadius) * 0.3 * (isNight ? 1 : 0.5);
            ctx.fillStyle = ne > nc
              ? `rgba(200, 200, 255, ${alpha})`
              : `rgba(255, 240, 220, ${alpha})`;
            ctx.beginPath();
            ctx.arc(dx, dy, Math.random() * 2 + 0.5, 0, Math.PI * 2);
            ctx.fill();
          }
        }
      }

      animRef.current = requestAnimationFrame(draw);
    };

    animRef.current = requestAnimationFrame(draw);

    return () => {
      cancelAnimationFrame(animRef.current);
      window.removeEventListener('resize', resize);
    };
  }, [isNight, cosy, eerie, heroic]);

  return <canvas ref={canvasRef} className="spotlight-canvas" />;
}

// Typewriter hook
function useTypewriter(text, speed = 45) {
  const [displayed, setDisplayed] = useState('');
  const [done, setDone] = useState(false);
  const timeoutRef = useRef(null);

  useEffect(() => {
    setDisplayed('');
    setDone(false);
    let i = 0;

    const type = () => {
      if (i < text.length) {
        setDisplayed(text.slice(0, i + 1));
        i++;
        const delay = text[i - 1] === ' ' ? speed * 0.5 : speed + (Math.random() - 0.5) * 20;
        timeoutRef.current = setTimeout(type, delay);
      } else {
        setDone(true);
      }
    };

    const startDelay = setTimeout(type, 300);
    return () => {
      clearTimeout(timeoutRef.current);
      clearTimeout(startDelay);
    };
  }, [text, speed]);

  return { displayed, done };
}

// Main App
function WeatherTheatre() {
  const [curtainsOpen, setCurtainsOpen] = useState(false);
  const [cosy, setCosy] = useState(0.5);
  const [eerie, setEerie] = useState(0.2);
  const [heroic, setHeroic] = useState(0.3);
  const [isNight, setIsNight] = useState(false);
  const [visible, setVisible] = useState(false);
  const mouseX = useRef(window.innerWidth / 2);

  useEffect(() => {
    // Open curtains after a moment
    const t1 = setTimeout(() => setCurtainsOpen(true), 800);
    const t2 = setTimeout(() => setVisible(true), 1500);
    return () => { clearTimeout(t1); clearTimeout(t2); };
  }, []);

  useEffect(() => {
    const handleMouseMove = (e) => {
      mouseX.current = e.clientX;
    };
    window.addEventListener('mousemove', handleMouseMove);
    return () => window.removeEventListener('mousemove', handleMouseMove);
  }, []);

  const sceneText = getSceneDescription(cosy, eerie, heroic, isNight);
  const { displayed: subtitleText, done: subtitleDone } = useTypewriter(sceneText, 40);

  return (
    <div className="theatre-stage">
      {/* Background layers */}
      <BackdropCanvas
        cosy={cosy}
        eerie={eerie}
        heroic={heroic}
        isNight={isNight}
        mouseX={mouseX}
      />

      <SpotlightCanvas
        isNight={isNight}
        cosy={cosy}
        eerie={eerie}
        heroic={heroic}
      />

      <div className="vignette" />

      {/* Proscenium frame */}
      <div className="proscenium" />

      {/* Curtains */}
      <div className={`curtain curtain-left ${curtainsOpen ? 'open-left' : ''}`}>
        <div className="curtain-trim" />
        <div className="curtain-tie curtain-tie-left" />
      </div>
      <div className={`curtain curtain-right ${curtainsOpen ? 'open-right' : ''}`}>
        <div className="curtain-trim" />
        <div className="curtain-tie curtain-tie-right" />
      </div>

      {/* UI Layer */}
      <div className="ui-layer">
        <div className="top-bar">
          <div>
            <div className={`theatre-title ${visible ? 'visible' : ''}`}>
              Weather Theatre
            </div>
            <div className="subtitle">A forecast in three acts</div>
          </div>
          <button
            className="toggle-btn"
            onClick={() => setIsNight(!isNight)}
          >
            {isNight ? 'Matinée' : 'Night'}
          </button>
        </div>

        <div className={`forecast-stage ${visible ? 'visible' : ''}`}>
          {FORECAST.map((f, i) => (
            <div
              key={f.day}
              className="weather-card"
              style={{ transitionDelay: `${2.2 + i * 0.15}s` }}
            >
              <div className="card-day">{f.day}</div>
              <div className="card-icon">{f.icon}</div>
              <div className="card-temp">{f.temp}°C</div>
              <div className="card-desc">{f.desc}</div>
            </div>
          ))}
        </div>

        <div />
      </div>

      {/* Scene subtitle */}
      <div className="scene-subtitle">
        {subtitleText}{!subtitleDone && <span className="cursor-blink" />}
      </div>

      {/* Controls */}
      <div className={`controls-panel ${visible ? 'visible' : ''}`}>
        <div className="slider-group">
          <label className="slider-label">Cosy</label>
          <input
            type="range"
            min="0"
            max="100"
            value={cosy * 100}
            onChange={e => setCosy(Number(e.target.value) / 100)}
            className="slider-track mood-cosy"
          />
        </div>
        <div className="slider-group">
          <label className="slider-label">Eerie</label>
          <input
            type="range"
            min="0"
            max="100"
            value={eerie * 100}
            onChange={e => setEerie(Number(e.target.value) / 100)}
            className="slider-track mood-eerie"
          />
        </div>
        <div className="slider-group">
          <label className="slider-label">Heroic</label>
          <input
            type="range"
            min="0"
            max="100"
            value={heroic * 100}
            onChange={e => setHeroic(Number(e.target.value) / 100)}
            className="slider-track mood-heroic"
          />
        </div>
      </div>
    </div>
  );
}

root.render(<WeatherTheatre />);
