<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tea Dunkability Simulator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --bg: #080c14;
      --card-bg: rgba(255, 255, 255, 0.04);
      --card-border: rgba(255, 255, 255, 0.08);
      --card-hover: rgba(255, 255, 255, 0.06);
      --accent: #f59e0b;
      --accent-glow: rgba(245, 158, 11, 0.25);
      --accent-dim: rgba(245, 158, 11, 0.12);
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --danger: #ef4444;
      --danger-glow: rgba(239, 68, 68, 0.25);
      --success: #22c55e;
      --info: #3b82f6;
      --warning: #f97316;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background-color: var(--bg);
      background-image:
        radial-gradient(ellipse 800px 600px at 10% 20%, rgba(30, 58, 138, 0.18) 0%, transparent 60%),
        radial-gradient(ellipse 600px 500px at 90% 80%, rgba(120, 53, 15, 0.15) 0%, transparent 60%),
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 100% 100%, 100% 100%, 48px 48px, 48px 48px;
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }

    #root {
      height: 100%;
      overflow-y: auto;
      padding: 28px;
    }

    .app-container {
      max-width: 1160px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 22px;
      min-height: 100%;
    }

    header.app-header {
      text-align: center;
      padding-bottom: 8px;
    }

    header.app-header h1 {
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #fbbf24, #f59e0b, #f97316);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header.app-header p {
      color: var(--text-muted);
      font-size: 0.92rem;
      margin-top: 4px;
      font-weight: 400;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 380px;
      grid-template-rows: auto auto;
      gap: 20px;
      flex: 1;
    }

    @media (max-width: 960px) {
      .grid { grid-template-columns: 1fr; grid-template-rows: auto; }
      #root { padding: 16px; }
    }

    .glass-card {
      background: var(--card-bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 24px;
      box-shadow:
        0 8px 32px rgba(0,0,0,0.25),
        inset 0 1px 0 rgba(255,255,255,0.04);
      transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .glass-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 24px;
      padding: 1.4px;
      background: linear-gradient(160deg, rgba(255,255,255,0.12), rgba(255,255,255,0.02) 40%, transparent 60%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .glass-card:hover {
      transform: translateY(-2px);
      box-shadow:
        0 16px 48px rgba(0,0,0,0.3),
        inset 0 1px 0 rgba(255,255,255,0.06);
    }

    .dunk-chamber {
      grid-row: 1 / 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 520px;
      position: relative;
    }

    .dunk-scene {
      position: relative;
      width: 100%;
      max-width: 380px;
      aspect-ratio: 1 / 1;
    }

    .dunk-svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Steam */
    .steam-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    @keyframes steam-rise {
      0% { transform: translateY(0) scale(0.4); opacity: 0; }
      15% { opacity: 0.55; }
      85% { opacity: 0.2; }
      100% { transform: translateY(-90px) scale(1.6); opacity: 0; }
    }

    .steam-particle {
      position: absolute;
      background: rgba(255,255,255,0.45);
      border-radius: 50%;
      filter: blur(8px);
      pointer-events: none;
    }

    /* Bobbing cup */
    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    .bobbing {
      animation: bob 4s ease-in-out infinite;
      transform-origin: center bottom;
    }

    /* Biscuit */
    .biscuit-group {
      transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
      transform-origin: center center;
    }

    .biscuit-piece {
      transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
    }

    /* Shake on crumble */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-4px) rotate(-1deg); }
      40% { transform: translateX(4px) rotate(1deg); }
      60% { transform: translateX(-3px); }
      80% { transform: translateX(3px); }
    }

    .shake-active {
      animation: shake 0.35s ease-in-out;
    }

    /* Controls */
    .controls-card h3,
    .graph-card h3,
    .stats-card h3 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 18px;
      font-weight: 600;
    }

    .control-row {
      margin-bottom: 20px;
      transition: background 0.2s, padding 0.2s, margin 0.2s, border-radius 0.2s;
      padding: 2px;
      border-radius: 14px;
    }

    .control-row.focused {
      background: var(--accent-dim);
      padding: 10px 12px;
      margin: -8px -12px 12px -12px;
      border: 1px solid var(--accent-glow);
    }

    .control-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .control-header label {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .key-hint {
      font-size: 0.65rem;
      color: var(--accent);
      background: rgba(245, 158, 11, 0.1);
      padding: 1px 5px;
      border-radius: 4px;
      border: 1px solid rgba(245, 158, 11, 0.15);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .value-display {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 5px;
      background: rgba(255,255,255,0.08);
      border-radius: 3px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      background: var(--accent);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 0 4px var(--accent-glow), 0 2px 8px rgba(0,0,0,0.3);
      border: 2px solid rgba(255,255,255,0.8);
      transition: transform 0.15s, box-shadow 0.15s;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.1);
      box-shadow: 0 0 0 6px var(--accent-glow), 0 4px 12px rgba(0,0,0,0.4);
    }

    input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      background: var(--accent);
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid rgba(255,255,255,0.8);
      box-shadow: 0 0 0 4px var(--accent-glow);
    }

    .biscuit-selector {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .biscuit-pill {
      flex: 1;
      min-width: 80px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--text-muted);
      padding: 8px 10px;
      border-radius: 10px;
      font-size: 0.72rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      font-family: inherit;
    }

    .biscuit-pill:hover {
      background: rgba(255,255,255,0.08);
      color: var(--text);
      border-color: rgba(255,255,255,0.14);
    }

    .biscuit-pill.active {
      background: var(--accent-dim);
      color: var(--accent);
      border-color: var(--accent-glow);
      box-shadow: 0 0 12px var(--accent-glow);
    }

    .action-row {
      display: flex;
      gap: 10px;
      margin-top: 8px;
    }

    .action-btn {
      flex: 1;
      padding: 10px;
      border-radius: 12px;
      border: 1px solid var(--card-border);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .action-btn:hover {
      background: rgba(255,255,255,0.08);
      transform: translateY(-1px);
    }

    .action-btn.primary {
      background: linear-gradient(135deg, #f59e0b, #f97316);
      color: #1a0f00;
      border: none;
      box-shadow: 0 4px 16px rgba(245, 158, 11, 0.25);
    }

    .action-btn.primary:hover {
      box-shadow: 0 6px 24px rgba(245, 158, 11, 0.35);
      transform: translateY(-1px);
    }

    .action-btn.primary.active {
      background: linear-gradient(135deg, #ef4444, #f97316);
      color: white;
      box-shadow: 0 4px 16px var(--danger-glow);
    }

    /* Graph */
    .graph-svg {
      width: 100%;
      height: auto;
      display: block;
    }

    @keyframes pulse-dot {
      0%, 100% { r: 4; opacity: 1; }
      50% { r: 6.5; opacity: 0.7; }
    }

    .pulse-dot {
      animation: pulse-dot 2s ease-in-out infinite;
    }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .stat-item {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 12px;
    }

    .stat-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 1.1rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .verdict-banner {
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 0.8rem;
      font-weight: 600;
      text-align: center;
      border: 1px solid transparent;
      transition: all 0.3s;
    }

    .verdict-banner.perfect { background: rgba(34, 197, 94, 0.1); color: var(--success); border-color: rgba(34,197,94,0.2); }
    .verdict-banner.decent { background: rgba(59, 130, 246, 0.1); color: var(--info); border-color: rgba(59,130,246,0.2); }
    .verdict-banner.risky { background: rgba(249, 115, 22, 0.1); color: var(--warning); border-color: rgba(249,115,22,0.2); }
    .verdict-banner.critical { background: rgba(239, 68, 68, 0.1); color: var(--danger); border-color: rgba(239,68,68,0.2); }
    .verdict-banner.dry { background: rgba(148, 163, 184, 0.1); color: var(--text-muted); border-color: rgba(148,163,184,0.2); }

    /* Canvas */
    #crumb-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 50;
    }

    /* Shortcuts */
    .shortcuts-bar {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(8, 12, 20, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      padding: 8px 18px;
      font-size: 0.72rem;
      color: var(--text-muted);
      z-index: 100;
      white-space: nowrap;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }

    .shortcuts-bar kbd {
      display: inline-block;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 4px;
      padding: 1px 5px;
      font-family: inherit;
      font-size: 0.65rem;
      color: var(--text);
      margin: 0 2px;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <canvas id="crumb-canvas"></canvas>
  <div id="root"></div>
  <div class="shortcuts-bar">
    <kbd>1-5</kbd> Biscuit &nbsp;<kbd>T</kbd> Temp &nbsp;<kbd>D</kbd> Dunk &nbsp;<kbd>I</kbd> Integrity &nbsp;<kbd>Space</kbd> Auto-Dunk &nbsp;<kbd>R</kbd> Reset
  </div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo, useCallback } = React;

    const BISCUITS = [
      { id: 'richTea', name: 'Rich Tea', fragility: 8.2, shape: 'rect', color: '#E8D0B0', darkColor: '#7A5E3F', pattern: 'lines', desc: 'Classic. Looks sturdy, lies about it.' },
      { id: 'digestive', name: 'Digestive', fragility: 4.0, shape: 'circle', color: '#C68E56', darkColor: '#5C3A1E', pattern: 'dots', desc: 'The reliable choice. A crowd pleaser.' },
      { id: 'hobnob', name: 'Hobnob', fragility: 2.6, shape: 'circle', color: '#B87333', darkColor: '#4A2511', pattern: 'holes', desc: 'Oaty resilience. Built for the long haul.' },
      { id: 'gingerNut', name: 'Ginger Nut', fragility: 1.3, shape: 'circle', color: '#D2691E', darkColor: '#6B2D0F', pattern: 'smooth', desc: 'So hard it could survive a dishwasher.' },
      { id: 'custardCream', name: 'Custard Cream', fragility: 6.5, shape: 'rect', color: '#F5E6D3', darkColor: '#8B7355', pattern: 'sandwich', desc: 'Sandwich architecture. Cream is a weakness.' },
    ];

    function interpolateColor(hex1, hex2, factor) {
      const parse = (c) => parseInt(c.slice(1), 16);
      const c1 = parse(hex1), c2 = parse(hex2);
      const r1 = (c1 >> 16) & 255, g1 = (c1 >> 8) & 255, b1 = c1 & 255;
      const r2 = (c2 >> 16) & 255, g2 = (c2 >> 8) & 255, b2 = c2 & 255;
      const r = Math.round(r1 + (r2 - r1) * factor);
      const g = Math.round(g1 + (g2 - g1) * factor);
      const b = Math.round(b1 + (b2 - b1) * factor);
      return `rgb(${r},${g},${b})`;
    }

    function teaColor(temp) {
      if (temp < 50) return '#C49A6C';
      if (temp < 75) return '#A06A3B';
      if (temp < 90) return '#7A4518';
      return '#5D2906';
    }

    function SteamParticles({ temp }) {
      const particles = useMemo(() => {
        const count = Math.max(3, Math.floor(temp / 14));
        return Array.from({ length: count }).map((_, i) => ({
          id: i,
          left: 46 + Math.random() * 8,
          size: 6 + Math.random() * 9,
          delay: i * 0.45 + Math.random() * 0.6,
          duration: 2.2 + Math.random() * 1.8,
        }));
      }, [temp]);

      return (
        <div className="steam-container">
          {particles.map(p => (
            <div
              key={p.id}
              className="steam-particle"
              style={{
                left: `${p.left}%`,
                bottom: '58%',
                width: `${p.size}px`,
                height: `${p.size}px`,
                animationName: 'steam-rise',
                animationDuration: `${p.duration}s`,
                animationDelay: `${p.delay}s`,
                animationIterationCount: 'infinite',
                animationTimingFunction: 'ease-out',
              }}
            />
          ))}
        </div>
      );
    }

    function BiscuitTexture({ pattern }) {
      if (pattern === 'lines') {
        return (
          <g opacity="0.2">
            {[0,1,2,3].map(i => (
              <line key={i} x1="-30" y1={-8 + i*5.5} x2="30" y2={-8 + i*5.5} stroke="#000" strokeWidth="1.2" strokeLinecap="round" />
            ))}
          </g>
        );
      }
      if (pattern === 'dots') {
        const dots = [];
        for (let r = -1; r <= 1; r++) {
          for (let c = -2; c <= 2; c++) {
            dots.push({ cx: c*12, cy: r*9, r: 1.4 });
          }
        }
        return (
          <g opacity="0.18">
            {dots.map((d,i) => <circle key={i} cx={d.cx} cy={d.cy} r={d.r} fill="#000" />)}
          </g>
        );
      }
      if (pattern === 'holes') {
        const holes = [];
        for (let i = 0; i < 7; i++) {
          const angle = (i / 7) * Math.PI * 2;
          holes.push({ cx: Math.cos(angle)*18, cy: Math.sin(angle)*18, r: 2.2 });
        }
        holes.push({ cx: 0, cy: 0, r: 2.5 });
        return (
          <g opacity="0.15">
            {holes.map((h,i) => <circle key={i} cx={h.cx} cy={h.cy} r={h.r} fill="#000" />)}
          </g>
        );
      }
      if (pattern === 'sandwich') {
        return (
          <g>
            <rect x="-35" y="-4" width="70" height="8" rx="2" fill="#FFF8E7" opacity="0.9" />
            <rect x="-35" y="-18" width="70" height="14" rx="3" fill="none" stroke="rgba(0,0,0,0.1)" strokeWidth="0.8" />
            <rect x="-35" y="4" width="70" height="14" rx="3" fill="none" stroke="rgba(0,0,0,0.1)" strokeWidth="0.8" />
          </g>
        );
      }
      return null;
    }

    function DunkScene({ teaTemp, dunkTime, biscuit, integrity, wetness, crumbled, justCrumbled, isAutoDunking }) {
      const dunkOffset = Math.min(85, (dunkTime / 30) * 90);
      const sag = crumbled ? 0 : (1 - integrity / 100) * 18;
      const tilt = crumbled ? 0 : (dunkTime / 30) * -12;
      const color = crumbled ? biscuit.darkColor : interpolateColor(biscuit.color, biscuit.darkColor, wetness * 0.7);
      const baseColor = crumbled ? biscuit.darkColor : biscuit.color;

      const wetGradientId = `wet-${biscuit.id}`;
      const teaGradId = `tea-${Math.round(teaTemp)}`;

      const biscuitY = 195 - dunkOffset;

      return (
        <div className={`dunk-scene ${justCrumbled ? 'shake-active' : ''}`}>
          <svg className="dunk-svg" viewBox="0 0 400 400">
            <defs>
              <linearGradient id={teaGradId} x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor={teaColor(teaTemp)} stopOpacity="0.85" />
                <stop offset="100%" stopColor={teaColor(teaTemp)} stopOpacity="1" />
              </linearGradient>
              <linearGradient id={wetGradientId} x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor={baseColor} />
                <stop offset={`${Math.max(0, (1 - wetness*0.8))*100}%`} stopColor={baseColor} />
                <stop offset={`${Math.max(0, (1 - wetness*0.8))*100}%`} stopColor={biscuit.darkColor} />
                <stop offset="100%" stopColor={biscuit.darkColor} />
              </linearGradient>
              <clipPath id="cup-clip">
                <path d="M142,220 Q142,338 200,338 Q258,338 258,220 Z" />
              </clipPath>
            </defs>

            {/* Saucer */}
            <ellipse cx="200" cy="345" rx="110" ry="18" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" strokeWidth="1" />
            <ellipse cx="200" cy="342" rx="70" ry="8" fill="rgba(255,255,255,0.04)" />

            {/* Cup back */}
            <path d="M142,220 Q142,338 200,338 Q258,338 258,220" fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth="2" />

            {/* Tea liquid */}
            <g clipPath="url(#cup-clip)">
              <ellipse cx="200" cy="228" rx="56" ry="11" fill={`url(#${teaGradId})`} />
              <rect x="144" y="228" width="112" height="115" fill={`url(#${teaGradId})`} opacity="0.85" />
              {/* Bubbles if hot */}
              {teaTemp > 80 && [0,1,2].map(i => (
                <circle key={i} cx={185 + i*10} cy={250 + i*8} r={1.5 + i*0.5} fill="rgba(255,255,255,0.15)">
                  <animate attributeName="cy" values={`${250 + i*8};${235 + i*8}`} dur={`${1.5 + i*0.5}s`} repeatCount="indefinite" />
                  <animate attributeName="opacity" values="0.2;0;0.2" dur={`${1.5 + i*0.5}s`} repeatCount="indefinite" />
                </circle>
              ))}
            </g>

            {/* Biscuit */}
            <g className="biscuit-group" style={{ transform: `translate(200px, ${biscuitY}px) rotate(${tilt}deg) scaleY(${1 - sag/60})` }}>
              {!crumbled ? (
                <g>
                  {biscuit.shape === 'rect' ? (
                    <>
                      <rect x="-36" y="-17" width="72" height="34" rx="5" fill={wetness > 0 ? `url(#${wetGradientId})` : baseColor} stroke="rgba(0,0,0,0.15)" strokeWidth="1" />
                      {biscuit.pattern === 'sandwich' && <BiscuitTexture pattern="sandwich" />}
                      {biscuit.pattern === 'lines' && <BiscuitTexture pattern="lines" />}
                    </>
                  ) : (
                    <>
                      <circle cx="0" cy="0" r="34" fill={wetness > 0 ? `url(#${wetGradientId})` : baseColor} stroke="rgba(0,0,0,0.15)" strokeWidth="1" />
                      <BiscuitTexture pattern={biscuit.pattern} />
                    </>
                  )}
                  {/* Highlight */}
                  {biscuit.pattern === 'smooth' && <ellipse cx="-10" cy="-10" rx="12" ry="8" fill="rgba(255,255,255,0.12)" transform="rotate(-20)" />}
                </g>
              ) : (
                <g>
                  <g className="biscuit-piece" style={{ transform: 'translate(-22px, -4px) rotate(-22deg)' }}>
                    {biscuit.shape === 'rect' ? (
                      <path d="M-36,-17 L-6,-17 L-6,17 L-36,17 Z" fill={color} />
                    ) : (
                      <path d="M-34,0 A34,34 0 0,1 0,-34 L0,0 Z" fill={color} />
                    )}
                  </g>
                  <g className="biscuit-piece" style={{ transform: 'translate(20px, 6px) rotate(28deg)' }}>
                    {biscuit.shape === 'rect' ? (
                      <path d="M-4,-17 L34,-17 L34,17 L-4,17 Z" fill={color} />
                    ) : (
                      <path d="M34,0 A34,34 0 0,0 0,34 L0,0 Z" fill={color} />
                    )}
                  </g>
                </g>
              )}
            </g>

            {/* Cup front / rim */}
            <g className="bobbing">
              <path d="M140,220 Q140,340 200,340 Q260,340 260,220" fill="none" stroke="rgba(255,255,255,0.2)" strokeWidth="2.5" strokeLinecap="round" />
              <ellipse cx="200" cy="220" rx="60" ry="12" fill="none" stroke="rgba(255,255,255,0.25)" strokeWidth="2" />
              {/* Handle */}
              <path d="M260,238 C295,238 295,302 260,302" fill="none" stroke="rgba(255,255,255,0.18)" strokeWidth="7" strokeLinecap="round" />
              <path d="M260,238 C295,238 295,302 260,302" fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth="7" strokeLinecap="round" transform="translate(1,1)" />
            </g>
          </svg>
          <SteamParticles temp={teaTemp} />
        </div>
      );
    }

    function CrumbleOMeter({ maxIntegrity, teaTemp, biscuit, currentTime, currentIntegrity }) {
      const width = 340;
      const height = 160;
      const pad = 30;

      const { areaPath, linePath, currentPoint } = useMemo(() => {
        const pts = [];
        for (let t = 0; t <= 30; t += 0.5) {
          const integ = Math.max(0, maxIntegrity - (teaTemp / 100) * t * biscuit.fragility);
          const x = pad + (t / 30) * (width - 2 * pad);
          const y = pad + (1 - integ / 100) * (height - 2 * pad);
          pts.push({ x, y, t });
        }
        const line = pts.map((p, i) => `${i === 0 ? 'M' : 'L'}${p.x},${p.y}`).join(' ');
        const area = `${line} L${width - pad},${height - pad} L${pad},${height - pad} Z`;
        const cx = pad + (currentTime / 30) * (width - 2 * pad);
        const cy = pad + (1 - Math.min(100, currentIntegrity) / 100) * (height - 2 * pad);
        return { areaPath: area, linePath: line, currentPoint: { x: cx, y: cy } };
      }, [maxIntegrity, teaTemp, biscuit, currentTime, currentIntegrity]);

      const critical = maxIntegrity / ((teaTemp / 100) * biscuit.fragility);

      return (
        <div>
          <h3>Crumble-O-Meter</h3>
          <svg className="graph-svg" viewBox={`0 0 ${width} ${height}`}>
            <defs>
              <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor={currentIntegrity > 50 ? 'rgba(34,197,94,0.35)' : 'rgba(249,115,22,0.35)'} />
                <stop offset="100%" stopColor={currentIntegrity > 0 ? 'rgba(59,130,246,0.08)' : 'rgba(239,68,68,0.12)'} />
              </linearGradient>
            </defs>
            {/* Grid */}
            {[0, 25, 50, 75, 100].map(v => {
              const y = pad + (1 - v / 100) * (height - 2 * pad);
              return (
                <g key={v}>
                  <line x1={pad} y1={y} x2={width - pad} y2={y} stroke="rgba(255,255,255,0.06)" strokeWidth="1" />
                  <text x={pad - 6} y={y + 3} textAnchor="end" fill="rgba(255,255,255,0.3)" fontSize="9" fontFamily="Inter, sans-serif">{v}</text>
                </g>
              );
            })}
            {[0, 10, 20, 30].map(v => {
              const x = pad + (v / 30) * (width - 2 * pad);
              return (
                <g key={v}>
                  <line x1={x} y1={pad} x2={x} y2={height - pad} stroke="rgba(255,255,255,0.06)" strokeWidth="1" />
                  <text x={x} y={height - pad + 14} textAnchor="middle" fill="rgba(255,255,255,0.3)" fontSize="9" fontFamily="Inter, sans-serif">{v}s</text>
                </g>
              );
            })}
            {/* Critical line */}
            {critical < 30 && (
              <line
                x1={pad + (critical / 30) * (width - 2 * pad)}
                y1={pad}
                x2={pad + (critical / 30) * (width - 2 * pad)}
                y2={height - pad}
                stroke="var(--danger)"
                strokeWidth="1.5"
                strokeDasharray="4 4"
                opacity="0.6"
              />
            )}
            <path d={areaPath} fill="url(#areaGrad)" />
            <path d={linePath} fill="none" stroke={currentIntegrity <= 0 ? 'var(--danger)' : 'var(--accent)'} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
            {/* Current point */}
            <circle cx={currentPoint.x} cy={currentPoint.y} r="5" fill={currentIntegrity <= 0 ? 'var(--danger)' : 'var(--accent)'} className="pulse-dot" />
            <circle cx={currentPoint.x} cy={currentPoint.y} r="12" fill={currentIntegrity <= 0 ? 'var(--danger)' : 'var(--accent)'} opacity="0.15" className="pulse-dot" />
          </svg>
          {critical < 30 ? (
            <div style={{ marginTop: '10px', fontSize: '0.75rem', color: 'var(--danger)', fontWeight: 600, textAlign: 'center' }}>
              Structural failure predicted at {critical.toFixed(1)}s
            </div>
          ) : (
            <div style={{ marginTop: '10px', fontSize: '0.75rem', color: 'var(--success)', fontWeight: 600, textAlign: 'center' }}>
              Survives full 30s dunk
            </div>
          )}
        </div>
      );
    }

    function StatsPanel({ biscuit, integrity, wetness, crumbled, score, verdict }) {
      return (
        <div className="stats-card">
          <h3>Diagnostics</h3>
          <div className="stats-grid">
            <div className="stat-item">
              <div className="stat-label">Integrity</div>
              <div className="stat-value" style={{ color: integrity > 50 ? 'var(--success)' : integrity > 20 ? 'var(--warning)' : 'var(--danger)' }}>
                {integrity.toFixed(0)}%
              </div>
            </div>
            <div className="stat-item">
              <div className="stat-label">Wetness</div>
              <div className="stat-value" style={{ color: wetness > 0.4 ? 'var(--info)' : 'var(--text-muted)' }}>
                {(wetness * 100).toFixed(0)}%
              </div>
            </div>
            <div className="stat-item">
              <div className="stat-label">Dunk Score</div>
              <div className="stat-value" style={{ color: score > 70 ? 'var(--success)' : score > 40 ? 'var(--warning)' : 'var(--danger)' }}>
                {score}
              </div>
            </div>
            <div className="stat-item">
              <div className="stat-label">Biscuit</div>
              <div className="stat-value" style={{ fontSize: '0.85rem', lineHeight: '1.3' }}>
                {biscuit.name}
              </div>
            </div>
          </div>
          <div className={`verdict-banner ${verdict.class}`}>
            {verdict.text}
          </div>
          <p style={{ marginTop: '10px', fontSize: '0.75rem', color: 'var(--text-muted)', lineHeight: '1.4', fontStyle: 'italic' }}>
            {biscuit.desc}
          </p>
        </div>
      );
    }

    function Controls({ teaTemp, setTeaTemp, dunkTime, setDunkTime, biscuitIndex, setBiscuitIndex, maxIntegrity, setMaxIntegrity, activeSlider, setActiveSlider, isAutoDunking, setIsAutoDunking, reset }) {
      const sliders = [
        { id: 'temp', label: 'Tea Temperature', value: teaTemp, min: 20, max: 100, unit: '°C', setter: setTeaTemp, step: 1, key: 'T' },
        { id: 'time', label: 'Dunk Time', value: dunkTime, min: 0, max: 30, unit: 's', setter: setDunkTime, step: 0.5, key: 'D' },
        { id: 'integrity', label: 'Structural Integrity', value: maxIntegrity, min: 0, max: 100, unit: '%', setter: setMaxIntegrity, step: 1, key: 'I' },
      ];

      const setFocus = (id) => {
        setActiveSlider(id);
      };

      return (
        <div className="controls-card">
          <h3>Controls</h3>
          {sliders.map(s => (
            <div key={s.id} className={`control-row ${activeSlider === s.id ? 'focused' : ''}`}>
              <div className="control-header">
                <label>
                  {s.label}
                  <span className="key-hint">{s.key}</span>
                </label>
                <span className="value-display">{s.value}{s.unit}</span>
              </div>
              <input
                type="range"
                min={s.min}
                max={s.max}
                step={s.step}
                value={s.value}
                onChange={e => s.setter(Number(e.target.value))}
                onFocus={() => setFocus(s.id)}
                aria-label={s.label}
              />
            </div>
          ))}
          <div className={`control-row ${activeSlider === 'biscuit' ? 'focused' : ''}`}>
            <div className="control-header">
              <label>
                Biscuit Type
                <span className="key-hint">1-5</span>
              </label>
            </div>
            <div className="biscuit-selector">
              {BISCUITS.map((b, i) => (
                <button
                  key={b.id}
                  className={`biscuit-pill ${biscuitIndex === i ? 'active' : ''}`}
                  onClick={() => { setBiscuitIndex(i); setFocus('biscuit'); }}
                  title={b.name}
                >
                  {b.name}
                </button>
              ))}
            </div>
          </div>
          <div className="action-row">
            <button className={`action-btn primary ${isAutoDunking ? 'active' : ''}`} onClick={() => setIsAutoDunking(v => !v)}>
              {isAutoDunking ? 'Stop Auto-Dunk' : 'Auto Dunk'}
            </button>
            <button className="action-btn" onClick={reset}>
              Reset
            </button>
          </div>
        </div>
      );
    }

    function useCrumbCanvas({ integrity, crumbled, spawnOriginRef }) {
      const canvasRef = useRef(null);
      const particlesRef = useRef([]);

      useEffect(() => {
        const canvas = document.getElementById('crumb-canvas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        let dpr = window.devicePixelRatio || 1;

        const resize = () => {
          dpr = window.devicePixelRatio || 1;
          canvas.width = window.innerWidth * dpr;
          canvas.height = window.innerHeight * dpr;
          canvas.style.width = window.innerWidth + 'px';
          canvas.style.height = window.innerHeight + 'px';
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        };
        resize();
        window.addEventListener('resize', resize);

        let raf;
        const loop = () => {
          ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

          const shouldSpawn = crumbled || (integrity < 15 && integrity > 0);
          if (shouldSpawn) {
            const rate = crumbled ? 6 : 1;
            let originX = window.innerWidth / 2;
            let originY = window.innerHeight / 2;
            if (spawnOriginRef?.current) {
              const rect = spawnOriginRef.current.getBoundingClientRect();
              originX = rect.left + rect.width / 2;
              originY = rect.top + rect.height / 2 - 40;
            }
            for (let i = 0; i < rate; i++) {
              const angle = (Math.random() - 0.5) * Math.PI * 1.2;
              const speed = 1 + Math.random() * 3;
              particlesRef.current.push({
                x: originX + (Math.random() - 0.5) * 60,
                y: originY + (Math.random() - 0.5) * 40,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed - 1,
                size: 2 + Math.random() * 3.5,
                life: 1,
                decay: 0.004 + Math.random() * 0.006,
                color: `rgba(${190 + Math.random()*40}, ${140 + Math.random()*30}, ${90 + Math.random()*30}, ${0.5 + Math.random()*0.5})`,
                rotation: Math.random() * Math.PI * 2,
                rotSpeed: (Math.random() - 0.5) * 0.15,
              });
            }
          }

          particlesRef.current = particlesRef.current.filter(p => {
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.12; // gravity
            p.vx *= 0.995; // air resistance
            p.life -= p.decay;
            p.rotation += p.rotSpeed;

            if (p.life <= 0) return false;
            if (p.y > window.innerHeight + 20) return false;

            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rotation);
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
            ctx.restore();
            return true;
          });

          raf = requestAnimationFrame(loop);
        };
        loop();

        return () => {
          cancelAnimationFrame(raf);
          window.removeEventListener('resize', resize);
        };
      }, [integrity, crumbled, spawnOriginRef]);
    }

    function App() {
      const [teaTemp, setTeaTemp] = useState(85);
      const [dunkTime, setDunkTime] = useState(3);
      const [biscuitIndex, setBiscuitIndex] = useState(1);
      const [maxIntegrity, setMaxIntegrity] = useState(100);
      const [isAutoDunking, setIsAutoDunking] = useState(false);
      const [activeSlider, setActiveSlider] = useState('time');
      const [justCrumbled, setJustCrumbled] = useState(false);
      const prevCrumbled = useRef(false);
      const sceneRef = useRef(null);

      const biscuit = BISCUITS[biscuitIndex];

      const degradation = (teaTemp / 100) * dunkTime * biscuit.fragility;
      const currentIntegrity = Math.max(0, Math.min(100, maxIntegrity - degradation));
      const wetness = Math.min(1, (teaTemp / 100) * (dunkTime / 12));
      const crumbled = currentIntegrity <= 0;

      useEffect(() => {
        if (crumbled && !prevCrumbled.current) {
          setJustCrumbled(true);
          const t = setTimeout(() => setJustCrumbled(false), 400);
          prevCrumbled.current = true;
          return () => clearTimeout(t);
        }
        if (!crumbled) {
          prevCrumbled.current = false;
        }
      }, [crumbled]);

      // Score: rewards moderate wetness (0.35-0.6) with high integrity
      const score = useMemo(() => {
        const wetScore = 100 - Math.abs(wetness - 0.45) * 180;
        const integScore = currentIntegrity * 1.2;
        return Math.max(0, Math.min(100, Math.round((wetScore * 0.4 + integScore * 0.6))));
      }, [wetness, currentIntegrity]);

      const verdict = useMemo(() => {
        if (crumbled) return { text: 'CATASTROPHIC FAILURE', class: 'critical' };
        if (currentIntegrity < 20) return { text: 'CRITICAL — ABORT DUNK', class: 'critical' };
        if (wetness > 0.55 && currentIntegrity > 40) return { text: 'PERFECT DUNK', class: 'perfect' };
        if (wetness > 0.3 && currentIntegrity > 25) return { text: 'DECENT DUNK', class: 'decent' };
        if (wetness > 0.15) return { text: 'RISKY DUNK', class: 'risky' };
        return { text: 'DRY AS A BONE', class: 'dry' };
      }, [crumbled, currentIntegrity, wetness]);

      // Auto-dunk
      useEffect(() => {
        if (!isAutoDunking) return;
        const interval = setInterval(() => {
          setDunkTime(t => {
            if (t >= 30) {
              setIsAutoDunking(false);
              return 30;
            }
            return Math.min(30, t + 0.15);
          });
        }, 60);
        return () => clearInterval(interval);
      }, [isAutoDunking]);

      const reset = useCallback(() => {
        setTeaTemp(85);
        setDunkTime(3);
        setBiscuitIndex(1);
        setMaxIntegrity(100);
        setIsAutoDunking(false);
        setJustCrumbled(false);
      }, []);

      // Keyboard
      useEffect(() => {
        const handler = (e) => {
          if (e.target.tagName === 'INPUT' && e.key !== 'Escape') return;
          const step = e.shiftKey ? 5 : 1;

          if (['ArrowLeft','ArrowDown'].includes(e.key)) {
            e.preventDefault();
            if (activeSlider === 'temp') setTeaTemp(v => Math.max(20, v - step));
            if (activeSlider === 'time') setDunkTime(v => Math.max(0, v - step * 0.5));
            if (activeSlider === 'integrity') setMaxIntegrity(v => Math.max(0, v - step));
          }
          if (['ArrowRight','ArrowUp'].includes(e.key)) {
            e.preventDefault();
            if (activeSlider === 'temp') setTeaTemp(v => Math.min(100, v + step));
            if (activeSlider === 'time') setDunkTime(v => Math.min(30, v + step * 0.5));
            if (activeSlider === 'integrity') setMaxIntegrity(v => Math.min(100, v + step));
          }

          switch (e.key) {
            case ' ': e.preventDefault(); setIsAutoDunking(p => !p); break;
            case 't': case 'T': setActiveSlider('temp'); break;
            case 'd': case 'D': setActiveSlider('time'); break;
            case 'i': case 'I': setActiveSlider('integrity'); break;
            case 'b': case 'B': setActiveSlider('biscuit'); break;
            case 'r': case 'R': reset(); break;
            case '1': case '2': case '3': case '4': case '5':
              setBiscuitIndex(parseInt(e.key, 10) - 1);
              setActiveSlider('biscuit');
              break;
          }
        };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
      }, [activeSlider, reset]);

      useCrumbCanvas({ integrity: currentIntegrity, crumbled, spawnOriginRef: sceneRef });

      return (
        <div className="app-container">
          <header className="app-header">
            <h1>Tea Dunkability Simulator</h1>
            <p>Calibrate your dunk. Respect the biscuit.</p>
          </header>

          <div className="grid">
            <div className="glass-card dunk-chamber" ref={sceneRef}>
              <DunkScene
                teaTemp={teaTemp}
                dunkTime={dunkTime}
                biscuit={biscuit}
                integrity={currentIntegrity}
                wetness={wetness}
                crumbled={crumbled}
                justCrumbled={justCrumbled}
                isAutoDunking={isAutoDunking}
              />
            </div>

            <div className="glass-card controls-card">
              <Controls
                teaTemp={teaTemp}
                setTeaTemp={setTeaTemp}
                dunkTime={dunkTime}
                setDunkTime={setDunkTime}
                biscuitIndex={biscuitIndex}
                setBiscuitIndex={setBiscuitIndex}
                maxIntegrity={maxIntegrity}
                setMaxIntegrity={setMaxIntegrity}
                activeSlider={activeSlider}
                setActiveSlider={setActiveSlider}
                isAutoDunking={isAutoDunking}
                setIsAutoDunking={setIsAutoDunking}
                reset={reset}
              />
            </div>

            <div className="glass-card graph-card">
              <CrumbleOMeter
                maxIntegrity={maxIntegrity}
                teaTemp={teaTemp}
                biscuit={biscuit}
                currentTime={dunkTime}
                currentIntegrity={currentIntegrity}
              />
            </div>
          </div>

          <div className="glass-card stats-card" style={{ marginTop: '4px' }}>
            <StatsPanel
              biscuit={biscuit}
              integrity={currentIntegrity}
              wetness={wetness}
              crumbled={crumbled}
              score={score}
              verdict={verdict}
            />
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
