<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Farewell Message Board</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
  <style>
    :root {
      --warm-cream: #FFFBF5;
      --warm-sand: #F5EDE0;
      --coral: #E8927C;
      --coral-dark: #D67A65;
      --sage: #A8B5A0;
      --charcoal: #2D2D2D;
      --warm-gray: #6B6560;
      --light-coral: #FDF1EE;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--warm-cream);
      background-image: radial-gradient(circle at 20% 50%, rgba(232, 146, 124, 0.06) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(168, 181, 160, 0.08) 0%, transparent 50%);
    }

    .font-display {
      font-family: 'Playfair Display', serif;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
    }

    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.92) translateY(20px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    @keyframes backdropIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .card-animate {
      animation: fadeInUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      opacity: 0;
    }

    .modal-animate {
      animation: modalIn 0.35s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .backdrop-animate {
      animation: backdropIn 0.25s ease forwards;
    }

    .card-hover {
      transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.3s ease;
    }

    .card-hover:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 40px -12px rgba(232, 146, 124, 0.18), 0 8px 16px -8px rgba(0, 0, 0, 0.06);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--coral) 0%, var(--coral-dark) 100%);
      transition: all 0.25s ease;
      box-shadow: 0 4px 14px -4px rgba(232, 146, 124, 0.45);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px -6px rgba(232, 146, 124, 0.55);
      filter: brightness(1.05);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-secondary {
      transition: all 0.2s ease;
    }

    .btn-secondary:hover {
      background-color: var(--light-coral);
      color: var(--coral-dark);
    }

    .fab {
      animation: float 4s ease-in-out infinite;
      box-shadow: 0 8px 28px -6px rgba(232, 146, 124, 0.6);
    }

    .image-mask {
      mask-image: linear-gradient(to bottom, black 60%, transparent 100%);
      -webkit-mask-image: linear-gradient(to bottom, black 60%, transparent 100%);
    }

    .message-text {
      line-height: 1.75;
      color: var(--charcoal);
    }

    .heart-beat:hover svg {
      animation: heartbeat 1s ease-in-out;
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      14% { transform: scale(1.15); }
      28% { transform: scale(1); }
      42% { transform: scale(1.15); }
      70% { transform: scale(1); }
    }

    .input-field {
      transition: all 0.2s ease;
      border: 1.5px solid #E8E0D8;
    }

    .input-field:focus {
      border-color: var(--coral);
      box-shadow: 0 0 0 3px rgba(232, 146, 124, 0.12);
      outline: none;
    }

    .tag {
      background: linear-gradient(135deg, #FDF1EE 0%, #F5EDE0 100%);
      color: var(--coral-dark);
    }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cream: '#FFFBF5',
            sand: '#F5EDE0',
            coral: '#E8927C',
            'coral-dark': '#D67A65',
            sage: '#A8B5A0',
            charcoal: '#2D2D2D',
            'warm-gray': '#6B6560',
          }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen text-charcoal antialiased">

  <!-- Header -->
  <header class="sticky top-0 z-40 backdrop-blur-xl bg-cream/80 border-b border-sand/60">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-coral to-coral-dark flex items-center justify-center shadow-lg shadow-coral/20">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z" />
          </svg>
        </div>
        <h1 class="font-display text-xl sm:text-2xl font-semibold tracking-tight text-charcoal">Farewell Board</h1>
      </div>
      <button onclick="openLoginModal()" class="btn-secondary flex items-center gap-2 px-4 py-2 rounded-full text-sm font-medium text-warm-gray hover:text-coral-dark border border-sand/80 bg-white/60 hover:bg-light-coral">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
        </svg>
        <span>Sign In</span>
      </button>
    </div>
  </header>

  <!-- Hero -->
  <section class="relative pt-12 pb-8 px-4 sm:px-6">
    <div class="max-w-3xl mx-auto text-center">
      <span class="inline-block px-4 py-1.5 rounded-full text-xs font-semibold tracking-wide uppercase text-coral-dark tag mb-5">A New Chapter Begins</span>
      <h2 class="font-display text-4xl sm:text-5xl lg:text-6xl font-semibold text-charcoal leading-tight mb-5">
        Wishing You the<br class="hidden sm:block"> Best, <span class="text-coral italic">Sarah</span>
      </h2>
      <p class="text-warm-gray text-base sm:text-lg max-w-xl mx-auto leading-relaxed">
        After five wonderful years together, it is time to say goodbye. Leave a message to celebrate the memories, the laughter, and the journey ahead.
      </p>
    </div>
  </section>

  <!-- Messages Grid -->
  <main class="max-w-6xl mx-auto px-4 sm:px-6 pb-32 pt-4">
    <div id="messagesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
  </main>

  <!-- Floating Write Button -->
  <button onclick="openWriteModal()" class="fab fixed bottom-6 right-6 z-30 w-14 h-14 rounded-full btn-primary flex items-center justify-center text-white" aria-label="Write a message">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0115.75 21H5.25A2.25 2.25 0 013 18.75V8.25A2.25 2.25 0 015.25 6H10" />
    </svg>
  </button>

  <!-- Write Modal -->
  <div id="writeModal" class="fixed inset-0 z-50 hidden">
    <div class="absolute inset-0 bg-charcoal/30 backdrop-blur-sm backdrop-animate" onclick="closeWriteModal()"></div>
    <div class="absolute inset-0 flex items-center justify-center p-4 pointer-events-none">
      <div class="modal-animate bg-cream rounded-2xl shadow-2xl w-full max-w-lg pointer-events-auto overflow-hidden border border-sand/60">
        <div class="px-6 py-5 border-b border-sand/60 flex items-center justify-between bg-white/40">
          <h3 class="font-display text-xl font-semibold text-charcoal">Write a Message</h3>
          <button onclick="closeWriteModal()" class="w-8 h-8 rounded-full hover:bg-sand/60 flex items-center justify-center transition-colors text-warm-gray">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
          </button>
        </div>
        <form id="writeForm" class="p-6 space-y-5">
          <div>
            <label class="block text-sm font-medium text-charcoal mb-1.5">Your Name</label>
            <input type="text" id="writerName" required placeholder="e.g., Alex Johnson" class="input-field w-full px-4 py-2.5 rounded-xl bg-white text-charcoal placeholder-warm-gray/50 text-sm" />
          </div>
          <div>
            <label class="block text-sm font-medium text-charcoal mb-1.5">Your Message</label>
            <textarea id="writerMessage" required rows="4" placeholder="Share a memory, wish them luck, or say thank you..." class="input-field w-full px-4 py-2.5 rounded-xl bg-white text-charcoal placeholder-warm-gray/50 text-sm resize-none"></textarea>
          </div>
          <div>
            <label class="block text-sm font-medium text-charcoal mb-1.5">Image URL (optional)</label>
            <input type="url" id="writerImage" placeholder="https://..." class="input-field w-full px-4 py-2.5 rounded-xl bg-white text-charcoal placeholder-warm-gray/50 text-sm" />
          </div>
          <div class="pt-2 flex gap-3">
            <button type="button" onclick="closeWriteModal()" class="flex-1 px-4 py-2.5 rounded-xl border border-sand/80 text-warm-gray font-medium text-sm hover:bg-sand/40 transition-colors">Cancel</button>
            <button type="submit" class="flex-1 px-4 py-2.5 rounded-xl btn-primary text-white font-medium text-sm">Post Message</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Login Modal -->
  <div id="loginModal" class="fixed inset-0 z-50 hidden">
    <div class="absolute inset-0 bg-charcoal/30 backdrop-blur-sm backdrop-animate" onclick="closeLoginModal()"></div>
    <div class="absolute inset-0 flex items-center justify-center p-4 pointer-events-none">
      <div class="modal-animate bg-cream rounded-2xl shadow-2xl w-full max-w-sm pointer-events-auto overflow-hidden border border-sand/60 text-center">
        <div class="p-8">
          <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-coral to-coral-dark flex items-center justify-center shadow-lg shadow-coral/20 mx-auto mb-4">
            <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
            </svg>
          </div>
          <h3 class="font-display text-xl font-semibold text-charcoal mb-2">Welcome Back</h3>
          <p class="text-warm-gray text-sm mb-6">This is a demo login. Enter any email to continue.</p>
          <form id="loginForm" class="space-y-4 text-left">
            <div>
              <label class="block text-sm font-medium text-charcoal mb-1.5">Email Address</label>
              <input type="email" id="loginEmail" required placeholder="you@example.com" class="input-field w-full px-4 py-2.5 rounded-xl bg-white text-charcoal placeholder-warm-gray/50 text-sm" />
            </div>
            <div>
              <label class="block text-sm font-medium text-charcoal mb-1.5">Password</label>
              <input type="password" required placeholder="••••••••" class="input-field w-full px-4 py-2.5 rounded-xl bg-white text-charcoal placeholder-warm-gray/50 text-sm" />
            </div>
            <button type="submit" class="w-full px-4 py-2.5 rounded-xl btn-primary text-white font-medium text-sm mt-2">Sign In</button>
          </form>
          <button onclick="closeLoginModal()" class="mt-4 text-sm text-warm-gray hover:text-coral-dark transition-colors">Maybe later</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const initialMessages = [
      {
        name: "Marcus Chen",
        message: "Sarah, working alongside you for the past three years has been an absolute privilege. Your calm leadership during the product redesign last spring taught me so much about grace under pressure. The team will not be the same without your early-morning coffee runs and legendary spreadsheet color-coding system. Wishing you boundless success in Seattle!",
        image: "https://images.unsplash.com/photo-1522071820081-009f0129c71c?w=400&h=300&fit=crop&q=80",
        avatar: "MC",
        color: "from-amber-100 to-orange-50",
        tag: "Teammate",
        date: "2 hours ago"
      },
      {
        name: "Priya Nair",
        message: "I still remember my first day when you found me nervously hovering by the coffee machine and introduced me to everyone. That small kindness set the tone for my entire time here. Thank you for being the heart of this office. Go make the West Coast brighter!",
        image: "https://images.unsplash.com/photo-1491438590914-bc09fcaaf77a?w=400&h=300&fit=crop&q=80",
        avatar: "PN",
        color: "from-rose-100 to-pink-50",
        tag: "Friend",
        date: "4 hours ago"
      },
      {
        name: "James & The Design Team",
        message: "Five years of late-night brainstorms, whiteboard sessions that looked like abstract art, and the occasional ping-pong tournament rivalry. You pushed our creative boundaries in ways we did not know we needed. The new team is lucky to get you. Do not forget about us little people!",
        image: "https://images.unsplash.com/photo-1531545514256-b1400bc00f31?w=400&h=300&fit=crop&q=80",
        avatar: "JD",
        color: "from-sky-100 to-blue-50",
        tag: "Design Team",
        date: "5 hours ago"
      },
      {
        name: "Elena Rodriguez",
        message: "Your mentorship changed the trajectory of my career. The way you advocated for me during the senior review meant more than you will ever know. I promise to pay it forward. Enjoy the Pacific Northwest — you have earned every mountain view and cup of artisanal coffee coming your way.",
        image: "https://images.unsplash.com/photo-1573497019940-1c28c88b4f3e?w=400&h=300&fit=crop&q=80",
        avatar: "ER",
        color: "from-emerald-100 to-green-50",
        tag: "Mentee",
        date: "Yesterday"
      },
      {
        name: "David Park",
        message: "I am going to miss our Friday lunch ritual more than I can say. From debating the best taco spots to solving half the company problems over guacamole, those conversations kept me sane. Keep in touch, and save me a seat at whatever amazing place you discover next.",
        image: "https://images.unsplash.com/photo-1517245386807-bb43f82c33c4?w=400&h=300&fit=crop&q=80",
        avatar: "DP",
        color: "from-violet-100 to-purple-50",
        tag: "Lunch Buddy",
        date: "Yesterday"
      },
      {
        name: "Amara Okafor",
        message: "The annual retreat planning will never be the same without your secret weapon spreadsheet and your ability to find incredible venues within budget. But more importantly, this place will miss your warmth, your wisdom, and your absolutely terrible dad jokes. Best of luck, Sarah!",
        image: "https://images.unsplash.com/photo-1529156069898-49953e39b3ac?w=400&h=300&fit=crop&q=80",
        avatar: "AO",
        color: "from-teal-100 to-cyan-50",
        tag: "Event Partner",
        date: "2 days ago"
      },
      {
        name: "Tom & Rachel Williams",
        message: "We have been through two product launches, one all-nighter fueled entirely by donuts, and countless shared commutes. Our dog Biscuit is going to miss you at our weekend hikes more than we will (and that is saying something). Come visit us soon!",
        image: "https://images.unsplash.com/photo-1551632436-cbf8dd354ca8?w=400&h=300&fit=crop&q=80",
        avatar: "TW",
        color: "from-yellow-100 to-amber-50",
        tag: "Friends",
        date: "2 days ago"
      },
      {
        name: "Yuki Tanaka",
        message: "You were the first person to make me feel truly welcome when I relocated from Tokyo. Your patience as I navigated unfamiliar processes, and your genuine interest in sharing cultures, made this city feel like home. I hope Seattle gives you back even a fraction of the warmth you gave me.",
        image: "https://images.unsplash.com/photo-1486312338219-ce68d2c6f44d?w=400&h=300&fit=crop&q=80",
        avatar: "YT",
        color: "from-indigo-100 to-blue-50",
        tag: "Colleague",
        date: "3 days ago"
      },
      {
        name: "Helen & Robert (Your Second Family)",
        message: "From our first team barbecue to the holiday potlucks where you somehow convinced everyone to try your experimental recipes, you have woven yourself into our lives. Our group chat will be quieter without your memes and morning motivation quotes. We love you, kiddo.",
        image: "https://images.unsplash.com/photo-1517457373958-b7bdd4587205?w=400&h=300&fit=crop&q=80",
        avatar: "HR",
        color: "from-fuchsia-100 to-pink-50",
        tag: "Work Family",
        date: "3 days ago"
      },
      {
        name: "Oliver Bennett",
        message: "I will never forget the time you stayed three hours past close to help me debug that production issue on my first solo deployment. You did not just fix the code — you taught me how to think through problems systematically. That lesson has saved me more times than I can count. Thank you, Sarah.",
        image: "https://images.unsplash.com/photo-1519389950473-47ba0277781c?w=400&h=300&fit=crop&q=80",
        avatar: "OB",
        color: "from-lime-100 to-green-50",
        tag: "Engineering",
        date: "4 days ago"
      }
    ];

    let messages = [...initialMessages];

    function createCard(msg, index) {
      const initials = msg.name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
      const hasImage = msg.image && msg.image.trim().length > 0;
      return `
        <article class="card-animate card-hover bg-white rounded-2xl border border-sand/50 overflow-hidden flex flex-col" style="animation-delay: ${index * 90}ms">
          ${hasImage ? `
          <div class="relative h-44 overflow-hidden shrink-0">
            <img src="${msg.image}" alt="Memory from ${msg.name}" class="w-full h-full object-cover image-mask" loading="lazy" />
            <div class="absolute inset-0 bg-gradient-to-t from-white via-white/20 to-transparent"></div>
          </div>
          ` : ''}
          <div class="p-5 sm:p-6 flex flex-col flex-1 ${hasImage ? '-mt-10 relative' : ''}">
            <div class="flex items-start gap-3 mb-3">
              <div class="w-10 h-10 rounded-full bg-gradient-to-br ${msg.color || 'from-coral to-coral-dark'} flex items-center justify-center text-xs font-bold text-charcoal/70 shadow-sm shrink-0">
                ${msg.avatar || initials}
              </div>
              <div class="min-w-0">
                <h4 class="font-semibold text-sm text-charcoal truncate">${msg.name}</h4>
                <div class="flex items-center gap-2 mt-0.5">
                  <span class="text-[11px] text-coral-dark font-medium px-2 py-0.5 rounded-full tag">${msg.tag || 'Friend'}</span>
                  <span class="text-[11px] text-warm-gray/70">${msg.date || 'Recently'}</span>
                </div>
              </div>
            </div>
            <p class="message-text text-sm flex-1">${msg.message}</p>
            <div class="mt-4 pt-3 border-t border-sand/40 flex items-center justify-between">
              <button class="heart-beat flex items-center gap-1.5 text-xs text-warm-gray hover:text-coral transition-colors group" onclick="this.classList.toggle('text-coral'); this.querySelector('svg').classList.toggle('fill-coral');">
                <svg class="w-4 h-4 transition-transform group-hover:scale-110" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z" />
                </svg>
                <span>Love this</span>
              </button>
              <button class="text-[11px] text-warm-gray hover:text-charcoal transition-colors font-medium">Reply</button>
            </div>
          </div>
        </article>
      `;
    }

    function renderMessages() {
      const grid = document.getElementById('messagesGrid');
      grid.innerHTML = messages.map((msg, i) => createCard(msg, i)).join('');
    }

    function openWriteModal() {
      const modal = document.getElementById('writeModal');
      modal.classList.remove('hidden');
      document.getElementById('writerName').focus();
      document.body.style.overflow = 'hidden';
    }

    function closeWriteModal() {
      const modal = document.getElementById('writeModal');
      modal.classList.add('hidden');
      document.getElementById('writeForm').reset();
      document.body.style.overflow = '';
    }

    function openLoginModal() {
      const modal = document.getElementById('loginModal');
      modal.classList.remove('hidden');
      document.getElementById('loginEmail').focus();
      document.body.style.overflow = 'hidden';
    }

    function closeLoginModal() {
      const modal = document.getElementById('loginModal');
      modal.classList.add('hidden');
      document.getElementById('loginForm').reset();
      document.body.style.overflow = '';
    }

    document.getElementById('writeForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const name = document.getElementById('writerName').value.trim();
      const message = document.getElementById('writerMessage').value.trim();
      const image = document.getElementById('writerImage').value.trim();

      if (!name || !message) return;

      const initials = name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
      const colors = [
        "from-amber-100 to-orange-50",
        "from-rose-100 to-pink-50",
        "from-sky-100 to-blue-50",
        "from-emerald-100 to-green-50",
        "from-violet-100 to-purple-50",
        "from-teal-100 to-cyan-50",
        "from-yellow-100 to-amber-50",
        "from-indigo-100 to-blue-50",
        "from-fuchsia-100 to-pink-50",
        "from-lime-100 to-green-50"
      ];

      messages.unshift({
        name,
        message,
        image: image || `https://images.unsplash.com/photo-1493612276216-ee3925520721?w=400&h=300&fit=crop&q=80`,
        avatar: initials,
        color: colors[Math.floor(Math.random() * colors.length)],
        tag: "New Message",
        date: "Just now"
      });

      renderMessages();
      closeWriteModal();

      // Scroll to top smoothly
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      closeLoginModal();
      const btn = document.querySelector('header button');
      btn.innerHTML = `
        <div class="w-7 h-7 rounded-full bg-gradient-to-br from-coral to-coral-dark flex items-center justify-center text-[10px] font-bold text-white">ME</div>
        <span class="hidden sm:inline">My Account</span>
      `;
      btn.classList.add('border-coral/30', 'text-coral-dark');
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeWriteModal();
        closeLoginModal();
      }
    });

    renderMessages();
  </script>
</body>
</html>
