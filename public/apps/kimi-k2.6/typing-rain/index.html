<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Typing Rain</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #020617;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }
  canvas { display: block; }
  #ui {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  #hud {
    display: flex;
    justify-content: space-between;
    padding: 20px 30px;
    font-size: 18px;
    color: #e2e8f0;
    text-shadow: 0 0 8px rgba(56, 189, 248, 0.6);
    font-weight: 600;
    letter-spacing: 1px;
  }
  .hud-item {
    background: rgba(15, 23, 42, 0.6);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(56, 189, 248, 0.25);
    border-radius: 12px;
    padding: 10px 20px;
    min-width: 120px;
    text-align: center;
  }
  .hud-label {
    font-size: 11px;
    text-transform: uppercase;
    color: #94a3b8;
    margin-bottom: 4px;
    letter-spacing: 2px;
  }
  .hud-value {
    font-size: 22px;
    color: #38bdf8;
  }
  #center-screen {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: auto;
    color: #e2e8f0;
  }
  #center-screen h1 {
    font-size: 64px;
    font-weight: 800;
    letter-spacing: 4px;
    text-shadow: 0 0 20px rgba(56, 189, 248, 0.8), 0 0 40px rgba(56, 189, 248, 0.4);
    margin-bottom: 10px;
  }
  #center-screen .subtitle {
    font-size: 18px;
    color: #94a3b8;
    margin-bottom: 40px;
    letter-spacing: 2px;
  }
  .btn {
    display: inline-block;
    padding: 14px 40px;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #020617;
    background: linear-gradient(135deg, #38bdf8, #0ea5e9);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
    transition: transform 0.15s, box-shadow 0.15s;
    pointer-events: auto;
  }
  .btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 30px rgba(56, 189, 248, 0.6);
  }
  .btn:active { transform: scale(0.98); }
  #game-over-stats {
    display: flex;
    gap: 20px;
    justify-content: center;
    margin: 20px 0;
  }
  .stat-box {
    background: rgba(15, 23, 42, 0.7);
    border: 1px solid rgba(56, 189, 248, 0.3);
    border-radius: 10px;
    padding: 14px 24px;
    min-width: 100px;
  }
  .stat-box .val { font-size: 24px; color: #38bdf8; font-weight: 700; }
  .stat-box .lbl { font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }
  #combo-display {
    position: absolute;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 28px;
    font-weight: 800;
    color: #fbbf24;
    text-shadow: 0 0 16px rgba(251, 191, 36, 0.8);
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .hidden { display: none !important; }
  #input-capture {
    position: absolute;
    top: -1000px;
    opacity: 0;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<input type="text" id="input-capture" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">

<div id="ui">
  <div id="hud" class="hidden">
    <div class="hud-item"><div class="hud-label">Score</div><div class="hud-value" id="score">0</div></div>
    <div class="hud-item"><div class="hud-label">Level</div><div class="hud-value" id="level">1</div></div>
    <div class="hud-item"><div class="hud-label">Accuracy</div><div class="hud-value" id="accuracy">100%</div></div>
    <div class="hud-item"><div class="hud-label">Lives</div><div class="hud-value" id="lives">3</div></div>
  </div>
  <div id="combo-display">COMBO x<span id="combo-val">0</span></div>
</div>

<div id="center-screen">
  <div id="start-screen">
    <h1>TYPING RAIN</h1>
    <div class="subtitle">Type the falling words before they hit the city</div>
    <button class="btn" id="start-btn">Start Game</button>
  </div>
  <div id="game-over-screen" class="hidden">
    <h1 style="font-size: 48px; color: #f87171; text-shadow: 0 0 20px rgba(248,113,113,0.8);">GAME OVER</h1>
    <div class="subtitle" id="go-reason">The city has been flooded...</div>
    <div id="game-over-stats">
      <div class="stat-box"><div class="val" id="final-score">0</div><div class="lbl">Score</div></div>
      <div class="stat-box"><div class="val" id="final-level">1</div><div class="lbl">Level</div></div>
      <div class="stat-box"><div class="val" id="final-accuracy">0%</div><div class="lbl">Accuracy</div></div>
      <div class="stat-box"><div class="val" id="final-words">0</div><div class="lbl">Words</div></div>
    </div>
    <button class="btn" id="restart-btn">Play Again</button>
  </div>
</div>

<script>
(function() {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const input = document.getElementById('input-capture');

  let W, H;
  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  // --- Audio ---
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  let audioCtx = null;
  function ensureAudio() {
    if (!audioCtx) audioCtx = new AudioCtx();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }
  function playTone(freq, dur, vol, type = 'sine') {
    if (!audioCtx) return;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, audioCtx.currentTime);
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.connect(g).connect(audioCtx.destination);
    o.start();
    o.stop(audioCtx.currentTime + dur);
  }
  function playType() { playTone(880, 0.05, 0.03, 'sine'); }
  function playDestroy() {
    playTone(600, 0.1, 0.06, 'square');
    setTimeout(() => playTone(900, 0.15, 0.05, 'square'), 60);
    setTimeout(() => playTone(1200, 0.2, 0.04, 'sine'), 120);
  }
  function playMiss() { playTone(200, 0.3, 0.05, 'sawtooth'); }
  function playLevelUp() {
    [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => playTone(f, 0.2, 0.05, 'sine'), i * 100));
  }
  function playGameOver() {
    [400, 350, 300, 200].forEach((f, i) => setTimeout(() => playTone(f, 0.3, 0.06, 'sawtooth'), i * 180));
  }

  // --- Words database ---
  const wordBank = [
    'rain','storm','cloud','thunder','lightning','flood','drop','wet','puddle','umbrella',
    'city','street','tower','building','neon','night','glow','window','roof','sidewalk',
    'code','type','data','pixel','screen','keyboard','mouse','click','scroll','link',
    'blue','cyan','azure','indigo','navy','slate','steel','sky','ocean','wave',
    'fast','quick','swift','rapid','haste','speed','rush','zoom','dart','bolt',
    'dark','dim','faint','shadow','shade','dusk','dawn','moon','star','space',
    'flow','stream','river','current','tide','surge','splash','spray','mist','fog',
    'ring','tone','sound','noise','beat','pulse','rhythm','song','note','chord',
    'heat','warm','cold','cool','chill','freeze','burn','melt','ice','fire',
    'jump','leap','hop','skip','bounce','fall','drop','dive','soar','fly',
    'web','net','grid','mesh','line','node','path','route','way','road',
    'time','clock','hour','minute','second','date','year','month','week','day',
    'mind','thought','idea','dream','hope','wish','will','aim','goal','plan',
    'work','task','job','duty','role','skill','craft','art','trade','field',
    'book','page','text','word','letter','sign','mark','label','tag','name',
    'ship','boat','sail','crew','port','dock','bay','coast','shore','beach',
    'wind','breeze','gale','gust','draft','air','breath','puff','blow','whirl'
  ];
  function randomWord() {
    return wordBank[Math.floor(Math.random() * wordBank.length)];
  }

  // --- Game State ---
  const state = {
    screen: 'start', // start, playing, gameover
    score: 0,
    level: 1,
    lives: 3,
    wordsTyped: 0,
    charsTyped: 0,
    charsCorrect: 0,
    combo: 0,
    maxCombo: 0,
    words: [],
    particles: [],
    raindrops: [],
    buildings: [],
    spawnTimer: 0,
    spawnInterval: 2000,
    lastTime: 0,
    shake: 0,
    time: 0,
    flash: 0,
    targetedWord: null,
    difficulty: 1
  };

  function initBuildings() {
    state.buildings = [];
    let x = 0;
    while (x < W) {
      const bw = 40 + Math.random() * 80;
      const bh = 80 + Math.random() * (H * 0.35);
      const windows = [];
      const cols = Math.floor(bw / 14);
      const rows = Math.floor(bh / 18);
      for (let r = 1; r < rows - 1; r++) {
        for (let c = 1; c < cols - 1; c++) {
          if (Math.random() > 0.45) {
            windows.push({
              x: x + c * 14 + 4,
              y: H - bh + r * 18 + 4,
              on: Math.random() > 0.15,
              flicker: Math.random() > 0.9 ? Math.random() * 0.5 + 0.2 : 0
            });
          }
        }
      }
      state.buildings.push({ x, w: bw, h: bh, windows });
      x += bw - 2;
    }
  }

  function initRain() {
    state.raindrops = [];
    for (let i = 0; i < 120; i++) {
      state.raindrops.push({
        x: Math.random() * W,
        y: Math.random() * H,
        speed: 4 + Math.random() * 10,
        len: 6 + Math.random() * 14,
        opacity: 0.05 + Math.random() * 0.15
      });
    }
  }

  function spawnWord() {
    const margin = 40;
    let text = randomWord();
    // Increase word length with difficulty
    if (state.difficulty > 2 && Math.random() > 0.6) {
      text = randomWord() + randomWord();
    }
    if (state.difficulty > 4 && Math.random() > 0.7) {
      text = randomWord() + randomWord() + randomWord();
    }
    const w = ctx.measureText(text).width;
    const x = margin + Math.random() * (W - margin * 2 - w);
    const baseSpeed = 0.8 + state.difficulty * 0.25;
    const speed = baseSpeed + Math.random() * baseSpeed * 0.5;
    state.words.push({
      text,
      x,
      y: -30,
      speed,
      typed: 0,
      w,
      h: 24,
      glow: 0,
      id: Math.random()
    });
  }

  function spawnParticles(x, y, color, count = 12) {
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 1 + Math.random() * 4;
      state.particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 1,
        life: 1,
        decay: 0.02 + Math.random() * 0.03,
        color,
        size: 2 + Math.random() * 3
      });
    }
  }

  function updateDifficulty() {
    const newLevel = Math.floor(state.score / 500) + 1;
    if (newLevel > state.level) {
      state.level = newLevel;
      state.difficulty = state.level;
      state.spawnInterval = Math.max(600, 2000 - state.level * 180);
      state.flash = 1;
      playLevelUp();
      showCombo(`LEVEL ${state.level}!`, '#fbbf24');
    }
  }

  function showCombo(text, color) {
    const el = document.getElementById('combo-display');
    el.textContent = text;
    el.style.color = color || '#fbbf24';
    el.style.opacity = '1';
    el.style.transform = 'translateX(-50%) scale(1.2)';
    setTimeout(() => {
      el.style.opacity = '0';
      el.style.transform = 'translateX(-50%) scale(1)';
    }, 800);
  }

  function update(dt) {
    state.time += dt;
    if (state.shake > 0) state.shake *= 0.9;
    if (state.flash > 0) state.flash -= dt * 0.0015;
    if (state.flash < 0) state.flash = 0;

    // Rain
    for (const r of state.raindrops) {
      r.y += r.speed;
      if (r.y > H) {
        r.y = -r.len;
        r.x = Math.random() * W;
      }
    }

    if (state.screen !== 'playing') return;

    // Spawn
    state.spawnTimer += dt;
    if (state.spawnTimer >= state.spawnInterval) {
      state.spawnTimer = 0;
      spawnWord();
      if (state.difficulty > 3 && Math.random() > 0.5) {
        setTimeout(spawnWord, 300);
      }
    }

    // Words
    for (let i = state.words.length - 1; i >= 0; i--) {
      const word = state.words[i];
      word.y += word.speed;
      word.glow = Math.max(0, word.glow - dt * 0.005);

      // Check hit bottom (city level)
      const cityTop = H - 80;
      if (word.y + word.h >= cityTop) {
        state.words.splice(i, 1);
        state.lives--;
        state.combo = 0;
        state.shake = 12;
        playMiss();
        spawnParticles(word.x + word.w / 2, word.y, '#f87171', 20);
        if (state.lives <= 0) {
          gameOver();
        }
      }
    }

    // Particles
    for (let i = state.particles.length - 1; i >= 0; i--) {
      const p = state.particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.1;
      p.life -= p.decay;
      if (p.life <= 0) state.particles.splice(i, 1);
    }

    // Update HUD
    document.getElementById('score').textContent = state.score;
    document.getElementById('level').textContent = state.level;
    document.getElementById('lives').textContent = state.lives;
    const acc = state.charsTyped > 0 ? Math.round((state.charsCorrect / state.charsTyped) * 100) : 100;
    document.getElementById('accuracy').textContent = acc + '%';
  }

  function draw() {
    // Background
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#020617');
    grad.addColorStop(0.6, '#0f172a');
    grad.addColorStop(1, '#1e293b');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Stars
    ctx.fillStyle = '#e2e8f0';
    for (let i = 0; i < 40; i++) {
      const sx = (i * 137.5) % W;
      const sy = (i * 89.7) % (H * 0.5);
      const twinkle = Math.sin(state.time * 0.002 + i) * 0.5 + 0.5;
      ctx.globalAlpha = twinkle * 0.6;
      ctx.beginPath();
      ctx.arc(sx, sy, 1, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Moon
    ctx.shadowColor = '#f8fafc';
    ctx.shadowBlur = 30;
    ctx.fillStyle = '#f1f5f9';
    ctx.beginPath();
    ctx.arc(W * 0.85, H * 0.12, 30, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Rain
    ctx.strokeStyle = '#38bdf8';
    ctx.lineWidth = 1;
    for (const r of state.raindrops) {
      ctx.globalAlpha = r.opacity;
      ctx.beginPath();
      ctx.moveTo(r.x, r.y);
      ctx.lineTo(r.x - 1, r.y + r.len);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;

    // Screen shake
    ctx.save();
    if (state.shake > 0.5) {
      ctx.translate((Math.random() - 0.5) * state.shake, (Math.random() - 0.5) * state.shake);
    }

    // Buildings
    for (const b of state.buildings) {
      ctx.fillStyle = '#0f172a';
      ctx.fillRect(b.x, H - b.h, b.w, b.h);
      ctx.strokeStyle = '#1e293b';
      ctx.lineWidth = 1;
      ctx.strokeRect(b.x, H - b.h, b.w, b.h);
      // Roof detail
      ctx.fillStyle = '#1e293b';
      ctx.fillRect(b.x + 4, H - b.h - 4, b.w - 8, 4);
      // Antennas
      if (b.w > 60) {
        ctx.strokeStyle = '#334155';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(b.x + b.w / 2, H - b.h);
        ctx.lineTo(b.x + b.w / 2, H - b.h - 15 - Math.random() * 10);
        ctx.stroke();
        // Blinking light
        const blink = Math.sin(state.time * 0.005 + b.x) > 0;
        if (blink) {
          ctx.fillStyle = '#f87171';
          ctx.shadowColor = '#f87171';
          ctx.shadowBlur = 8;
          ctx.beginPath();
          ctx.arc(b.x + b.w / 2, H - b.h - 15, 2, 0, Math.PI * 2);
          ctx.fill();
          ctx.shadowBlur = 0;
        }
      }
      // Windows
      for (const w of b.windows) {
        if (w.flicker) {
          ctx.globalAlpha = Math.sin(state.time * w.flicker) > 0 ? 0.8 : 0.2;
        }
        ctx.fillStyle = w.on ? '#fbbf24' : '#1e293b';
        ctx.shadowColor = w.on ? '#fbbf24' : 'transparent';
        ctx.shadowBlur = w.on ? 4 : 0;
        ctx.fillRect(w.x, w.y, 8, 10);
        ctx.globalAlpha = 1;
        ctx.shadowBlur = 0;
      }
    }

    // Ground
    ctx.fillStyle = '#020617';
    ctx.fillRect(0, H - 4, W, 4);

    // Flash effect on level up
    if (state.flash > 0) {
      ctx.fillStyle = `rgba(56, 189, 248, ${state.flash * 0.15})`;
      ctx.fillRect(0, 0, W, H);
    }

    // Words
    ctx.font = 'bold 22px "Segoe UI", monospace';
    ctx.textBaseline = 'middle';
    for (const word of state.words) {
      const isTargeted = state.targetedWord === word;
      const typedPart = word.text.slice(0, word.typed);
      const untypedPart = word.text.slice(word.typed);
      const typedW = ctx.measureText(typedPart).width;

      // Glow
      ctx.shadowColor = isTargeted ? '#22d3ee' : '#38bdf8';
      ctx.shadowBlur = isTargeted ? 20 + word.glow * 10 : 12;

      // Typed portion (green)
      ctx.fillStyle = '#4ade80';
      ctx.fillText(typedPart, word.x, word.y);

      // Untyped portion (cyan)
      ctx.fillStyle = isTargeted ? '#e0f2fe' : '#7dd3fc';
      ctx.fillText(untypedPart, word.x + typedW, word.y);

      // Connecting line to city (like a rain trail)
      if (isTargeted) {
        ctx.strokeStyle = `rgba(34, 211, 238, ${0.1 + Math.sin(state.time * 0.01) * 0.05})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(word.x + typedW + ctx.measureText(untypedPart).width / 2, word.y + 12);
        ctx.lineTo(word.x + typedW + ctx.measureText(untypedPart).width / 2, H - 80);
        ctx.stroke();
      }

      ctx.shadowBlur = 0;

      // Box highlight for targeted
      if (isTargeted) {
        const totalW = ctx.measureText(word.text).width;
        ctx.strokeStyle = `rgba(34, 211, 238, ${0.4 + Math.sin(state.time * 0.008) * 0.2})`;
        ctx.lineWidth = 2;
        ctx.strokeRect(word.x - 6, word.y - 14, totalW + 12, 28);
      }
    }

    // Particles
    for (const p of state.particles) {
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 6;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;

    ctx.restore();
  }

  function loop(ts) {
    if (!state.lastTime) state.lastTime = ts;
    const dt = ts - state.lastTime;
    state.lastTime = ts;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  function startGame() {
    ensureAudio();
    state.screen = 'playing';
    state.score = 0;
    state.level = 1;
    state.lives = 3;
    state.wordsTyped = 0;
    state.charsTyped = 0;
    state.charsCorrect = 0;
    state.combo = 0;
    state.maxCombo = 0;
    state.words = [];
    state.particles = [];
    state.spawnTimer = 0;
    state.spawnInterval = 2000;
    state.shake = 0;
    state.flash = 0;
    state.targetedWord = null;
    state.difficulty = 1;
    initBuildings();
    initRain();
    document.getElementById('start-screen').classList.add('hidden');
    document.getElementById('game-over-screen').classList.add('hidden');
    document.getElementById('hud').classList.remove('hidden');
    input.focus();
  }

  function gameOver() {
    state.screen = 'gameover';
    playGameOver();
    document.getElementById('hud').classList.add('hidden');
    document.getElementById('game-over-screen').classList.remove('hidden');
    document.getElementById('final-score').textContent = state.score;
    document.getElementById('final-level').textContent = state.level;
    const acc = state.charsTyped > 0 ? Math.round((state.charsCorrect / state.charsTyped) * 100) : 0;
    document.getElementById('final-accuracy').textContent = acc + '%';
    document.getElementById('final-words').textContent = state.wordsTyped;
  }

  // --- Input handling ---
  function handleChar(ch) {
    if (state.screen !== 'playing') return;
    ch = ch.toLowerCase();
    state.charsTyped++;

    if (state.targetedWord) {
      const w = state.targetedWord;
      if (w.text[w.typed] === ch) {
        w.typed++;
        state.charsCorrect++;
        playType();
        w.glow = 1;
        if (w.typed >= w.text.length) {
          // Destroy word
          const pts = w.text.length * 10 + state.combo * 5;
          state.score += pts;
          state.wordsTyped++;
          state.combo++;
          if (state.combo > state.maxCombo) state.maxCombo = state.combo;
          playDestroy();
          spawnParticles(w.x + w.w / 2, w.y, '#4ade80', 16);
          if (state.combo >= 3) {
            showCombo(`COMBO x${state.combo}`, '#fbbf24');
          }
          state.words = state.words.filter(x => x !== w);
          state.targetedWord = null;
          updateDifficulty();
        }
      } else {
        state.combo = 0;
        state.targetedWord = null;
        // Try to find a new word starting with this char
        tryStartNewWord(ch);
      }
    } else {
      tryStartNewWord(ch);
    }
  }

  function tryStartNewWord(ch) {
    // Find word starting with this char, prefer lowest (most urgent)
    const candidates = state.words.filter(w => w.text[0] === ch && w.typed === 0);
    if (candidates.length > 0) {
      candidates.sort((a, b) => b.y - a.y);
      const w = candidates[0];
      w.typed = 1;
      state.charsCorrect++;
      state.targetedWord = w;
      playType();
      w.glow = 1;
      if (w.text.length === 1) {
        const pts = 10 + state.combo * 5;
        state.score += pts;
        state.wordsTyped++;
        state.combo++;
        playDestroy();
        spawnParticles(w.x + w.w / 2, w.y, '#4ade80', 12);
        state.words = state.words.filter(x => x !== w);
        state.targetedWord = null;
        updateDifficulty();
      }
    } else {
      // Wrong char typed
    }
  }

  // Capture input
  document.addEventListener('keydown', e => {
    if (state.screen === 'playing') {
      input.focus();
    }
    // Prevent default for game keys to avoid page scroll etc
    if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) {
      e.preventDefault();
    }
  });

  input.addEventListener('input', e => {
    const val = input.value;
    if (val.length > 0) {
      for (let i = 0; i < val.length; i++) {
        const ch = val[i];
        if (/[a-zA-Z]/.test(ch)) {
          handleChar(ch);
        }
      }
      input.value = '';
    }
  });

  // Click to focus
  document.addEventListener('click', () => {
    if (state.screen === 'playing') input.focus();
  });

  document.getElementById('start-btn').addEventListener('click', startGame);
  document.getElementById('restart-btn').addEventListener('click', startGame);

  // Init visuals for start screen
  initBuildings();
  initRain();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
