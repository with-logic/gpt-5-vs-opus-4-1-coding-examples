<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloud Painter for Kids</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&display=swap');

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    user-select: none;
    -webkit-user-select: none;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: 'Nunito', sans-serif;
  }

  #app {
    width: 100%;
    height: 100%;
    position: relative;
    background: linear-gradient(180deg, #87CEEB 0%, #B0E0E6 40%, #E0F6FF 100%);
    overflow: hidden;
  }

  #skyCanvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
  }

  #paintCanvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 2;
    cursor: crosshair;
    touch-action: none;
  }

  #planeCanvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 3;
    pointer-events: none;
  }

  .sun {
    position: absolute;
    top: 40px;
    right: 60px;
    width: 80px;
    height: 80px;
    background: radial-gradient(circle, #FFFACD 0%, #FFE4B5 60%, transparent 70%);
    border-radius: 50%;
    z-index: 0;
    animation: sunPulse 4s ease-in-out infinite;
  }

  .sun::after {
    content: '';
    position: absolute;
    top: -10px;
    left: -10px;
    right: -10px;
    bottom: -10px;
    background: radial-gradient(circle, rgba(255,250,205,0.3) 0%, transparent 70%);
    border-radius: 50%;
  }

  @keyframes sunPulse {
    0%, 100% { transform: scale(1); opacity: 0.9; }
    50% { transform: scale(1.1); opacity: 1; }
  }

  .toolbar {
    position: absolute;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 14px 24px;
    border-radius: 24px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.1), 0 2px 8px rgba(0,0,0,0.05);
    border: 2px solid rgba(255,255,255,0.6);
    flex-wrap: wrap;
    justify-content: center;
    max-width: 90vw;
  }

  .toolbar-title {
    position: absolute;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    font-family: 'Fredoka One', cursive;
    font-size: 28px;
    color: #4A90A4;
    text-shadow: 2px 2px 0px rgba(255,255,255,0.8), 0 0 20px rgba(255,255,255,0.5);
    letter-spacing: 1px;
    pointer-events: none;
  }

  .tool-btn {
    width: 48px;
    height: 48px;
    border-radius: 16px;
    border: 2px solid transparent;
    background: rgba(255,255,255,0.9);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  .tool-btn:hover {
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 6px 16px rgba(0,0,0,0.12);
  }

  .tool-btn.active {
    border-color: #4A90A4;
    background: #E8F4F8;
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(74,144,164,0.2);
  }

  .tool-btn svg {
    width: 24px;
    height: 24px;
    fill: #6B8E9F;
    transition: fill 0.2s;
  }

  .tool-btn.active svg {
    fill: #4A90A4;
  }

  .tool-btn.color-btn {
    border-radius: 50%;
    width: 40px;
    height: 40px;
    border: 3px solid white;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    padding: 0;
    overflow: hidden;
  }

  .tool-btn.color-btn::after {
    content: '';
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: var(--color);
    display: block;
  }

  .tool-btn.color-btn.active {
    border-color: #4A90A4;
    border-width: 3px;
    box-shadow: 0 0 0 2px white, 0 4px 12px rgba(0,0,0,0.15);
  }

  .divider {
    width: 1px;
    height: 36px;
    background: rgba(74,144,164,0.2);
    margin: 0 4px;
  }

  .size-slider-container {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 4px;
  }

  .size-label {
    font-size: 12px;
    color: #6B8E9F;
    font-weight: 700;
    min-width: 32px;
  }

  .size-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 80px;
    height: 6px;
    border-radius: 3px;
    background: rgba(74,144,164,0.2);
    outline: none;
  }

  .size-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #4A90A4;
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    transition: transform 0.15s;
  }

  .size-slider::-webkit-slider-thumb:hover {
    transform: scale(1.2);
  }

  .save-btn {
    background: linear-gradient(135deg, #4A90A4, #5BA3B8);
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 16px;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
    box-shadow: 0 4px 12px rgba(74,144,164,0.3);
  }

  .save-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(74,144,164,0.4);
  }

  .save-btn svg {
    fill: white;
    width: 18px;
    height: 18px;
  }

  .clear-btn {
    background: rgba(255,107,107,0.1);
    color: #FF6B6B;
    border: 2px solid rgba(255,107,107,0.3);
  }

  .clear-btn:hover {
    background: rgba(255,107,107,0.2);
  }

  .clear-btn svg {
    fill: #FF6B6B;
  }

  .tool-btn::before {
    content: attr(data-tooltip);
    position: absolute;
    bottom: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%) translateY(4px);
    background: rgba(74,144,164,0.9);
    color: white;
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 8px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: all 0.2s;
    font-family: 'Nunito', sans-serif;
  }

  .tool-btn:hover::before {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .hint {
    position: absolute;
    top: 70px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(8px);
    padding: 8px 18px;
    border-radius: 20px;
    font-size: 13px;
    color: #6B8E9F;
    font-weight: 700;
    pointer-events: none;
    animation: hintFade 5s ease-in-out forwards;
    box-shadow: 0 2px 12px rgba(0,0,0,0.05);
  }

  @keyframes hintFade {
    0% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
    10% { opacity: 1; transform: translateX(-50%) translateY(0); }
    80% { opacity: 1; transform: translateX(-50%) translateY(0); }
    100% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
  }

  #cursorPreview {
    position: absolute;
    pointer-events: none;
    z-index: 20;
    border-radius: 50%;
    border: 2px solid rgba(74,144,164,0.4);
    background: rgba(255,255,255,0.2);
    transform: translate(-50%, -50%);
    transition: width 0.1s, height 0.1s;
    display: none;
  }

  @keyframes confetti {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(-200px) rotate(720deg); opacity: 0; }
  }

  .confetti-piece {
    position: absolute;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    animation: confetti 1.5s ease-out forwards;
    z-index: 100;
  }

  @media (max-width: 640px) {
    .toolbar {
      padding: 10px 14px;
      gap: 8px;
      border-radius: 20px;
    }
    .tool-btn {
      width: 40px;
      height: 40px;
      border-radius: 12px;
    }
    .tool-btn svg {
      width: 20px;
      height: 20px;
    }
    .size-slider {
      width: 60px;
    }
    .toolbar-title {
      font-size: 22px;
    }
  }
</style>
</head>
<body>

<div id="app">
  <div class="sun"></div>

  <div class="toolbar-title">Cloud Painter</div>
  <div class="hint" id="hint">Touch and drag to paint fluffy clouds!</div>

  <canvas id="skyCanvas"></canvas>
  <canvas id="paintCanvas"></canvas>
  <canvas id="planeCanvas"></canvas>

  <div id="cursorPreview"></div>

  <div class="toolbar">
    <button class="tool-btn active" data-brush="round" data-tooltip="Round Cloud" id="btnRound">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8" fill="currentColor" opacity="0.6"/><circle cx="12" cy="12" r="5" fill="white"/></svg>
    </button>
    <button class="tool-btn" data-brush="fluffy" data-tooltip="Fluffy Cloud" id="btnFluffy">
      <svg viewBox="0 0 24 24"><ellipse cx="12" cy="13" rx="9" ry="6" fill="currentColor" opacity="0.6"/><ellipse cx="12" cy="13" rx="6" ry="4" fill="white"/></svg>
    </button>
    <button class="tool-btn" data-brush="streak" data-tooltip="Cloud Streak" id="btnStreak">
      <svg viewBox="0 0 24 24"><rect x="3" y="10" width="18" height="5" rx="2.5" fill="currentColor" opacity="0.6"/><rect x="5" y="11" width="14" height="3" rx="1.5" fill="white"/></svg>
    </button>
    <button class="tool-btn" data-brush="puff" data-tooltip="Little Puffs" id="btnPuff">
      <svg viewBox="0 0 24 24"><circle cx="8" cy="14" r="4" fill="currentColor" opacity="0.6"/><circle cx="16" cy="14" r="4" fill="currentColor" opacity="0.6"/><circle cx="12" cy="10" r="4" fill="currentColor" opacity="0.6"/><circle cx="8" cy="14" r="2" fill="white"/><circle cx="16" cy="14" r="2" fill="white"/><circle cx="12" cy="10" r="2" fill="white"/></svg>
    </button>

    <div class="divider"></div>

    <button class="tool-btn color-btn active" data-color="white" data-tooltip="White" style="--color: #FFFFFF;" id="btnWhite"></button>
    <button class="tool-btn color-btn" data-color="cream" data-tooltip="Cream" style="--color: #FFF8DC;" id="btnCream"></button>
    <button class="tool-btn color-btn" data-color="lightblue" data-tooltip="Light Blue" style="--color: #E0F0FF;" id="btnLightBlue"></button>
    <button class="tool-btn color-btn" data-color="pink" data-tooltip="Pink" style="--color: #FFE4E1;" id="btnPink"></button>
    <button class="tool-btn color-btn" data-color="lavender" data-tooltip="Lavender" style="--color: #E6E6FA;" id="btnLavender"></button>
    <button class="tool-btn color-btn" data-color="gray" data-tooltip="Stormy" style="--color: #D3D3D3;" id="btnGray"></button>

    <div class="divider"></div>

    <div class="size-slider-container">
      <span class="size-label">Size</span>
      <input type="range" class="size-slider" id="sizeSlider" min="10" max="120" value="40">
    </div>

    <div class="divider"></div>

    <button class="tool-btn clear-btn" data-tooltip="Clear Sky" id="btnClear">
      <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
    </button>

    <button class="save-btn" id="btnSave">
      <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
      Save
    </button>
  </div>
</div>

<script>
(function() {
  'use strict';

  const skyCanvas = document.getElementById('skyCanvas');
  const paintCanvas = document.getElementById('paintCanvas');
  const planeCanvas = document.getElementById('planeCanvas');
  const skyCtx = skyCanvas.getContext('2d');
  const paintCtx = paintCanvas.getContext('2d');
  const planeCtx = planeCanvas.getContext('2d');

  function resizeCanvases() {
    const w = window.innerWidth;
    const h = window.innerHeight;
    const dpr = window.devicePixelRatio || 1;

    [skyCanvas, paintCanvas, planeCanvas].forEach(canvas => {
      canvas.width = w * dpr;
      canvas.height = h * dpr;
      canvas.style.width = w + 'px';
      canvas.style.height = h + 'px';
      const ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);
    });

    drawSkyBackground();
  }

  window.addEventListener('resize', resizeCanvases);
  resizeCanvases();

  function drawSkyBackground() {
    const w = window.innerWidth;
    const h = window.innerHeight;
    skyCtx.clearRect(0, 0, w, h);

    skyCtx.fillStyle = 'rgba(144, 238, 144, 0.15)';
    skyCtx.beginPath();
    skyCtx.moveTo(0, h);
    for (let x = 0; x <= w; x += 50) {
      skyCtx.lineTo(x, h - 30 - Math.sin(x * 0.01) * 15 - Math.cos(x * 0.02) * 10);
    }
    skyCtx.lineTo(w, h);
    skyCtx.closePath();
    skyCtx.fill();

    skyCtx.fillStyle = 'rgba(100, 200, 100, 0.1)';
    skyCtx.beginPath();
    skyCtx.moveTo(0, h);
    for (let x = 0; x <= w; x += 60) {
      skyCtx.lineTo(x, h - 20 - Math.sin(x * 0.008 + 1) * 12);
    }
    skyCtx.lineTo(w, h);
    skyCtx.closePath();
    skyCtx.fill();
  }

  const driftingClouds = [];

  function createDriftingCloud() {
    const w = window.innerWidth;
    const h = window.innerHeight;
    return {
      x: -200,
      y: Math.random() * (h * 0.5) + 30,
      scale: 0.3 + Math.random() * 0.7,
      speed: 0.2 + Math.random() * 0.5,
      opacity: 0.15 + Math.random() * 0.25,
      puffs: Array.from({length: 5 + Math.floor(Math.random() * 4)}, () => ({
        dx: (Math.random() - 0.5) * 60,
        dy: (Math.random() - 0.5) * 25,
        r: 20 + Math.random() * 25
      }))
    };
  }

  for (let i = 0; i < 5; i++) {
    const cloud = createDriftingCloud();
    cloud.x = Math.random() * window.innerWidth;
    driftingClouds.push(cloud);
  }

  function drawDriftingClouds() {
    const w = window.innerWidth;
    const h = window.innerHeight;

    drawSkyBackground();

    driftingClouds.forEach(cloud => {
      skyCtx.save();
      skyCtx.globalAlpha = cloud.opacity;
      skyCtx.translate(cloud.x, cloud.y);
      skyCtx.scale(cloud.scale, cloud.scale);

      skyCtx.fillStyle = '#FFFFFF';
      cloud.puffs.forEach(puff => {
        skyCtx.beginPath();
        skyCtx.arc(puff.dx, puff.dy, puff.r, 0, Math.PI * 2);
        skyCtx.fill();
      });

      skyCtx.restore();

      cloud.x += cloud.speed;
      if (cloud.x > w + 200) {
        cloud.x = -200;
        cloud.y = Math.random() * (h * 0.5) + 30;
      }
    });
  }

  const planes = [];

  function createPlane() {
    const h = window.innerHeight;
    const startLeft = Math.random() > 0.5;
    return {
      x: startLeft ? -80 : window.innerWidth + 80,
      y: 60 + Math.random() * (h * 0.35),
      speed: (1.5 + Math.random() * 2) * (startLeft ? 1 : -1),
      size: 0.6 + Math.random() * 0.4,
      direction: startLeft ? 1 : -1,
      contrail: [],
      color: ['#FFFFFF', '#F0F0F0', '#E8E8E8', '#D0D0D0'][Math.floor(Math.random() * 4)]
    };
  }

  function drawPlane(plane) {
    planeCtx.save();
    planeCtx.translate(plane.x, plane.y);
    planeCtx.scale(plane.size, plane.size);

    if (plane.direction === -1) {
      planeCtx.scale(-1, 1);
    }

    plane.contrail.push({x: 0, y: 2});
    if (plane.contrail.length > 30) plane.contrail.shift();

    planeCtx.save();
    for (let i = 0; i < plane.contrail.length; i++) {
      const pt = plane.contrail[i];
      const alpha = (i / plane.contrail.length) * 0.2;
      planeCtx.fillStyle = `rgba(255,255,255,${alpha})`;
      planeCtx.beginPath();
      planeCtx.arc(pt.x - i * 2, pt.y, 1 + (i / plane.contrail.length) * 2, 0, Math.PI * 2);
      planeCtx.fill();
    }
    planeCtx.restore();

    planeCtx.fillStyle = plane.color;
    planeCtx.beginPath();
    planeCtx.ellipse(15, 0, 22, 5, 0, 0, Math.PI * 2);
    planeCtx.fill();

    planeCtx.fillStyle = '#B0D4E8';
    planeCtx.beginPath();
    planeCtx.ellipse(28, -3, 6, 4, -0.2, 0, Math.PI * 2);
    planeCtx.fill();

    planeCtx.fillStyle = '#E0E0E0';
    planeCtx.beginPath();
    planeCtx.moveTo(12, -2);
    planeCtx.lineTo(22, -14);
    planeCtx.lineTo(26, -14);
    planeCtx.lineTo(20, -2);
    planeCtx.closePath();
    planeCtx.fill();

    planeCtx.fillStyle = '#E0E0E0';
    planeCtx.beginPath();
    planeCtx.moveTo(0, -2);
    planeCtx.lineTo(-4, -12);
    planeCtx.lineTo(2, -12);
    planeCtx.lineTo(6, -2);
    planeCtx.closePath();
    planeCtx.fill();

    planeCtx.fillStyle = '#D5D5D5';
    planeCtx.beginPath();
    planeCtx.moveTo(2, 2);
    planeCtx.lineTo(-2, 6);
    planeCtx.lineTo(6, 6);
    planeCtx.lineTo(8, 2);
    planeCtx.closePath();
    planeCtx.fill();

    planeCtx.restore();

    plane.x += plane.speed;

    for (let i = plane.contrail.length - 1; i >= 0; i--) {
      plane.contrail[i].x -= plane.speed / plane.size;
    }
  }

  function updatePlanes() {
    planeCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);

    if (Math.random() < 0.003 && planes.length < 3) {
      planes.push(createPlane());
    }

    for (let i = planes.length - 1; i >= 0; i--) {
      drawPlane(planes[i]);
      if (planes[i].x > window.innerWidth + 150 || planes[i].x < -150) {
        planes.splice(i, 1);
      }
    }
  }

  let isDrawing = false;
  let lastX = 0;
  let lastY = 0;
  let brushSize = 40;
  let brushShape = 'round';
  let brushColor = 'white';

  const colors = {
    white: '#FFFFFF',
    cream: '#FFF8DC',
    lightblue: '#E0F0FF',
    pink: '#FFE4E1',
    lavender: '#E6E6FA',
    gray: '#D3D3D3'
  };

  function getPointerPos(e) {
    if (e.touches && e.touches.length > 0) {
      return { x: e.touches[0].clientX, y: e.touches[0].clientY };
    }
    return { x: e.clientX, y: e.clientY };
  }

  function drawBrush(x, y, size, color, shape) {
    paintCtx.save();
    paintCtx.globalAlpha = 0.85;

    const baseColor = colors[color] || colors.white;

    switch (shape) {
      case 'round':
        paintCtx.fillStyle = baseColor;
        paintCtx.beginPath();
        paintCtx.arc(x, y, size * 0.5, 0, Math.PI * 2);
        paintCtx.fill();
        paintCtx.fillStyle = lighten(baseColor, 20);
        paintCtx.globalAlpha = 0.3;
        paintCtx.beginPath();
        paintCtx.arc(x - size * 0.1, y - size * 0.1, size * 0.25, 0, Math.PI * 2);
        paintCtx.fill();
        break;

      case 'fluffy':
        paintCtx.fillStyle = baseColor;
        const puffs = [
          {dx: 0, dy: -size * 0.15, r: size * 0.35},
          {dx: -size * 0.25, dy: size * 0.1, r: size * 0.3},
          {dx: size * 0.25, dy: size * 0.1, r: size * 0.3},
          {dx: 0, dy: size * 0.15, r: size * 0.28},
          {dx: -size * 0.15, dy: -size * 0.05, r: size * 0.25},
          {dx: size * 0.15, dy: -size * 0.05, r: size * 0.25}
        ];
        puffs.forEach(p => {
          paintCtx.beginPath();
          paintCtx.arc(x + p.dx, y + p.dy, p.r, 0, Math.PI * 2);
          paintCtx.fill();
        });
        paintCtx.fillStyle = lighten(baseColor, 20);
        paintCtx.globalAlpha = 0.3;
        paintCtx.beginPath();
        paintCtx.arc(x - size * 0.05, y - size * 0.1, size * 0.18, 0, Math.PI * 2);
        paintCtx.fill();
        break;

      case 'streak':
        paintCtx.fillStyle = baseColor;
        paintCtx.beginPath();
        paintCtx.ellipse(x, y, size * 0.7, size * 0.18, 0, 0, Math.PI * 2);
        paintCtx.fill();
        paintCtx.fillStyle = lighten(baseColor, 20);
        paintCtx.globalAlpha = 0.3;
        paintCtx.beginPath();
        paintCtx.ellipse(x - size * 0.1, y - size * 0.04, size * 0.4, size * 0.08, 0, 0, Math.PI * 2);
        paintCtx.fill();
        break;

      case 'puff':
        paintCtx.fillStyle = baseColor;
        const smallPuffs = [
          {dx: -size * 0.2, dy: 0, r: size * 0.2},
          {dx: size * 0.2, dy: 0, r: size * 0.2},
          {dx: 0, dy: -size * 0.15, r: size * 0.22},
          {dx: 0, dy: size * 0.15, r: size * 0.18}
        ];
        smallPuffs.forEach(p => {
          paintCtx.beginPath();
          paintCtx.arc(x + p.dx, y + p.dy, p.r, 0, Math.PI * 2);
          paintCtx.fill();
        });
        break;
    }

    paintCtx.restore();
  }

  function lighten(hex, percent) {
    const num = parseInt(hex.replace('#', ''), 16);
    const r = Math.min(255, ((num >> 16) & 0xFF) + percent);
    const g = Math.min(255, ((num >> 8) & 0xFF) + percent);
    const b = Math.min(255, (num & 0xFF) + percent);
    return `rgb(${r},${g},${b})`;
  }

  function interpolateBrush(x1, y1, x2, y2, size, color, shape) {
    const dist = Math.hypot(x2 - x1, y2 - y1);
    const steps = Math.max(1, Math.floor(dist / (size * 0.3)));

    for (let i = 0; i <= steps; i++) {
      const t = i / steps;
      const x = x1 + (x2 - x1) * t;
      const y = y1 + (y2 - y1) * t;
      const jitter = shape === 'fluffy' || shape === 'puff' ? (Math.random() - 0.5) * size * 0.15 : 0;
      drawBrush(x + jitter, y + jitter, size, color, shape);
    }
  }

  function startDrawing(e) {
    e.preventDefault();
    isDrawing = true;
    const pos = getPointerPos(e);
    lastX = pos.x;
    lastY = pos.y;
    drawBrush(lastX, lastY, brushSize, brushColor, brushShape);
  }

  function moveDrawing(e) {
    const pos = getPointerPos(e);

    const cursor = document.getElementById('cursorPreview');
    cursor.style.display = 'block';
    cursor.style.left = pos.x + 'px';
    cursor.style.top = pos.y + 'px';
    cursor.style.width = brushSize + 'px';
    cursor.style.height = brushSize + 'px';
    cursor.style.background = (colors[brushColor] || '#fff') + '33';
    cursor.style.borderColor = (colors[brushColor] || '#fff') + '88';

    if (!isDrawing) return;
    e.preventDefault();

    interpolateBrush(lastX, lastY, pos.x, pos.y, brushSize, brushColor, brushShape);
    lastX = pos.x;
    lastY = pos.y;
  }

  function stopDrawing() {
    isDrawing = false;
  }

  function hideCursor() {
    document.getElementById('cursorPreview').style.display = 'none';
  }

  paintCanvas.addEventListener('mousedown', startDrawing);
  paintCanvas.addEventListener('mousemove', moveDrawing);
  paintCanvas.addEventListener('mouseup', stopDrawing);
  paintCanvas.addEventListener('mouseleave', () => { stopDrawing(); hideCursor(); });

  paintCanvas.addEventListener('touchstart', startDrawing, {passive: false});
  paintCanvas.addEventListener('touchmove', moveDrawing, {passive: false});
  paintCanvas.addEventListener('touchend', stopDrawing);

  document.querySelectorAll('[data-brush]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-brush]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      brushShape = btn.dataset.brush;
    });
  });

  document.querySelectorAll('[data-color]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-color]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      brushColor = btn.dataset.color;
    });
  });

  document.getElementById('sizeSlider').addEventListener('input', (e) => {
    brushSize = parseInt(e.target.value);
  });

  document.getElementById('btnClear').addEventListener('click', () => {
    paintCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);
  });

  document.getElementById('btnSave').addEventListener('click', () => {
    const combined = document.createElement('canvas');
    const w = window.innerWidth;
    const h = window.innerHeight;
    const dpr = window.devicePixelRatio || 1;
    combined.width = w * dpr;
    combined.height = h * dpr;
    const ctx = combined.getContext('2d');
    ctx.scale(dpr, dpr);

    const gradient = ctx.createLinearGradient(0, 0, 0, h);
    gradient.addColorStop(0, '#87CEEB');
    gradient.addColorStop(0.4, '#B0E0E6');
    gradient.addColorStop(1, '#E0F6FF');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, w, h);

    const sunGrad = ctx.createRadialGradient(w - 60, 80, 10, w - 60, 80, 60);
    sunGrad.addColorStop(0, 'rgba(255,250,205,0.8)');
    sunGrad.addColorStop(1, 'rgba(255,250,205,0)');
    ctx.fillStyle = sunGrad;
    ctx.beginPath();
    ctx.arc(w - 60, 80, 60, 0, Math.PI * 2);
    ctx.fill();

    ctx.drawImage(skyCanvas, 0, 0, w, h);
    ctx.drawImage(paintCanvas, 0, 0, w, h);
    ctx.drawImage(planeCanvas, 0, 0, w, h);

    const link = document.createElement('a');
    link.download = 'my-cloud-painting-' + new Date().toISOString().slice(0, 10) + '.png';
    link.href = combined.toDataURL('image/png');
    link.click();

    createConfetti(w / 2, h - 80);
  });

  function createConfetti(x, y) {
    const colors = ['#4A90A4', '#FFE4B5', '#FFB6C1', '#E0F0FF', '#90EE90', '#FFFACD'];
    for (let i = 0; i < 30; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      piece.style.left = (x + (Math.random() - 0.5) * 100) + 'px';
      piece.style.top = y + 'px';
      piece.style.background = colors[Math.floor(Math.random() * colors.length)];
      piece.style.width = (6 + Math.random() * 8) + 'px';
      piece.style.height = (6 + Math.random() * 8) + 'px';
      piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      piece.style.animationDuration = (1 + Math.random() * 0.8) + 's';
      document.getElementById('app').appendChild(piece);
      setTimeout(() => piece.remove(), 2000);
    }
  }

  let lastTime = 0;
  function animate(timestamp) {
    if (timestamp - lastTime > 33) {
      drawDriftingClouds();
      updatePlanes();
      lastTime = timestamp;
    }
    requestAnimationFrame(animate);
  }

  requestAnimationFrame(animate);

  setTimeout(() => {
    const hint = document.getElementById('hint');
    if (hint) hint.style.display = 'none';
  }, 6000);

})();
</script>
