<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Festival Lights Show</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --neon-cyan: #00f0ff;
      --neon-pink: #ff00aa;
      --neon-purple: #aa00ff;
      --neon-green: #00ff88;
      --neon-yellow: #ffee00;
      --neon-orange: #ff5500;
      --neon-blue: #0055ff;
      --bg-dark: #0a0a12;
      --panel-bg: rgba(15, 15, 30, 0.75);
      --border-glow: rgba(0, 240, 255, 0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg-dark);
      color: white;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    #stage-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    #ui-layer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .panel {
      pointer-events: auto;
      background: var(--panel-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-glow);
      border-radius: 16px;
      box-shadow:
        0 4px 24px rgba(0,0,0,0.4),
        0 0 40px rgba(0, 240, 255, 0.05),
        inset 0 1px 0 rgba(255,255,255,0.05);
      transition: all 0.3s ease;
    }

    .panel:hover {
      border-color: rgba(0, 240, 255, 0.5);
      box-shadow:
        0 4px 24px rgba(0,0,0,0.4),
        0 0 60px rgba(0, 240, 255, 0.1),
        inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .glow-text {
      text-shadow:
        0 0 10px rgba(0, 240, 255, 0.5),
        0 0 40px rgba(0, 240, 255, 0.3),
        0 0 80px rgba(0, 240, 255, 0.1);
    }

    .section-title {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      margin-bottom: 12px;
    }

    /* Color swatches */
    .color-swatch {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.2s ease;
      position: relative;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .color-swatch:hover {
      transform: scale(1.15);
      border-color: white;
    }

    .color-swatch.active {
      border-color: white;
      box-shadow: 0 0 0 3px rgba(255,255,255,0.3), 0 0 20px currentColor;
      transform: scale(1.1);
    }

    .color-swatch.active::after {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 2px solid currentColor;
      opacity: 0.5;
      animation: pulse-ring 1.5s ease-out infinite;
    }

    @keyframes pulse-ring {
      0% { transform: scale(1); opacity: 0.5; }
      100% { transform: scale(1.5); opacity: 0; }
    }

    /* Buttons */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 16px;
      border-radius: 12px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.8);
      transition: all 0.2s ease;
      white-space: nowrap;
      pointer-events: auto;
    }

    .btn:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.2);
      color: white;
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn.active {
      background: linear-gradient(135deg, rgba(0, 240, 255, 0.2), rgba(170, 0, 255, 0.2));
      border-color: var(--neon-cyan);
      color: white;
      box-shadow: 0 0 20px rgba(0, 240, 255, 0.15), inset 0 1px 0 rgba(255,255,255,0.1);
    }

    .btn-primary {
      background: linear-gradient(135deg, #00f0ff, #aa00ff);
      border: none;
      color: white;
      font-weight: 700;
    }

    .btn-primary:hover {
      box-shadow: 0 0 30px rgba(0, 240, 255, 0.3);
    }

    /* Range slider */
    .slider-container {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .slider-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.5);
    }

    .slider-value {
      color: var(--neon-cyan);
      font-weight: 600;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: rgba(255,255,255,0.1);
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: white;
      cursor: pointer;
      box-shadow: 0 0 10px var(--neon-cyan), 0 2px 4px rgba(0,0,0,0.3);
      border: 2px solid var(--neon-cyan);
      transition: transform 0.1s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: white;
      cursor: pointer;
      box-shadow: 0 0 10px var(--neon-cyan);
      border: 2px solid var(--neon-cyan);
    }

    /* Visualizer bars */
    .viz-bars {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 50px;
    }

    .viz-bar {
      flex: 1;
      background: linear-gradient(to top, var(--neon-cyan), var(--neon-pink));
      border-radius: 2px 2px 0 0;
      transition: height 0.05s ease;
      min-height: 2px;
    }

    /* Beat indicator */
    .beat-indicator {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--neon-cyan);
      box-shadow: 0 0 10px var(--neon-cyan);
      transition: all 0.05s ease;
    }

    .beat-indicator.on {
      transform: scale(1.5);
      box-shadow: 0 0 30px var(--neon-cyan), 0 0 60px var(--neon-pink);
    }

    /* Preset cards */
    .preset-card {
      padding: 14px 12px;
      border-radius: 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: center;
      font-size: 0.8rem;
      font-weight: 600;
      color: rgba(255,255,255,0.7);
      position: relative;
      overflow: hidden;
    }

    .preset-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
      transition: left 0.5s ease;
    }

    .preset-card:hover::before {
      left: 100%;
    }

    .preset-card:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.15);
      color: white;
      transform: translateY(-2px);
    }

    .preset-card.active {
      background: linear-gradient(135deg, rgba(0, 240, 255, 0.15), rgba(170, 0, 255, 0.15));
      border-color: var(--neon-cyan);
      color: white;
      box-shadow: 0 0 20px rgba(0, 240, 255, 0.1);
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255,255,255,0.2);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .panel {
        border-radius: 12px;
      }
    }

    /* Animation for the title */
    @keyframes title-glow {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.8; }
    }

    .title-anim {
      animation: title-glow 3s ease-in-out infinite;
    }
  </style>
</head>
<body>
  <div id="canvas-container">
    <canvas id="stage-canvas"></canvas>
  </div>

  <div id="ui-layer">
    <!-- Header -->
    <div class="flex justify-between items-start p-4 md:p-6">
      <div class="panel p-4 md:p-5">
        <h1 class="text-2xl md:text-3xl font-black glow-text title-anim tracking-tight" style="background: linear-gradient(135deg, #00f0ff, #ff00aa, #aa00ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">
          FESTIVAL LIGHTS
        </h1>
        <div class="flex items-center gap-3 mt-2">
          <div class="beat-indicator" id="beat-indicator"></div>
          <span class="text-xs font-semibold tracking-widest uppercase" style="color: rgba(255,255,255,0.4);" id="status-text">Ready</span>
        </div>
      </div>

      <div class="panel p-3 md:p-4 flex flex-col gap-3">
        <div class="slider-container" style="width: 160px;">
          <div class="slider-label">
            <span>BPM</span>
            <span class="slider-value" id="bpm-display">120</span>
          </div>
          <input type="range" id="bpm-slider" min="60" max="180" value="120" step="1">
        </div>
        <div class="slider-container" style="width: 160px;">
          <div class="slider-label">
            <span>Intensity</span>
            <span class="slider-value" id="intensity-display">80%</span>
          </div>
          <input type="range" id="intensity-slider" min="0" max="100" value="80" step="1">
        </div>
      </div>
    </div>

    <!-- Middle section - Visualizer -->
    <div class="flex-1 flex items-center justify-center pointer-events-none px-4">
      <div class="panel p-4 pointer-events-auto" style="max-width: 500px; width: 100%;">
        <div class="section-title">Music Visualizer</div>
        <div class="viz-bars" id="viz-bars"></div>
      </div>
    </div>

    <!-- Bottom Controls -->
    <div class="p-4 md:p-6 flex flex-col md:flex-row gap-4 overflow-x-auto">
      <!-- Patterns -->
      <div class="panel p-4 flex-1 min-w-[280px]">
        <div class="section-title">Light Patterns</div>
        <div class="grid grid-cols-4 gap-2">
          <button class="btn active" data-pattern="wave" onclick="setPattern('wave')">Wave</button>
          <button class="btn" data-pattern="strobe" onclick="setPattern('strobe')">Strobe</button>
          <button class="btn" data-pattern="chase" onclick="setPattern('chase')">Chase</button>
          <button class="btn" data-pattern="pulse" onclick="setPattern('pulse')">Pulse</button>
          <button class="btn" data-pattern="laser" onclick="setPattern('laser')">Laser</button>
          <button class="btn" data-pattern="rain" onclick="setPattern('rain')">Rain</button>
          <button class="btn" data-pattern="orbit" onclick="setPattern('orbit')">Orbit</button>
          <button class="btn" data-pattern="matrix" onclick="setPattern('matrix')">Matrix</button>
        </div>
      </div>

      <!-- Colors -->
      <div class="panel p-4 flex-1 min-w-[220px]">
        <div class="section-title">Color Palette</div>
        <div class="flex flex-wrap gap-3" id="color-palette">
          <!-- Populated by JS -->
        </div>
        <div class="flex gap-2 mt-3">
          <button class="btn flex-1 text-xs" id="btn-random" onclick="randomizeColors()">Random</button>
          <button class="btn flex-1 text-xs" id="btn-cycle" onclick="toggleColorCycle()">Cycle</button>
        </div>
      </div>

      <!-- Presets -->
      <div class="panel p-4 flex-1 min-w-[220px]">
        <div class="section-title">Quick Presets</div>
        <div class="grid grid-cols-2 gap-2">
          <button class="preset-card active" data-preset="club" onclick="loadPreset('club')">Club Night</button>
          <button class="preset-card" data-preset="edm" onclick="loadPreset('edm')">EDM Fest</button>
          <button class="preset-card" data-preset="chill" onclick="loadPreset('chill')">Chill Vibe</button>
          <button class="preset-card" data-preset="rave" onclick="loadPreset('rave')">Rave Mode</button>
          <button class="preset-card" data-preset="romantic" onclick="loadPreset('romantic')">Romantic</button>
          <button class="preset-card" data-preset="cyber" onclick="loadPreset('cyber')">Cyberpunk</button>
        </div>
      </div>

      <!-- Main Actions -->
      <div class="panel p-4 flex flex-col gap-3 min-w-[140px]">
        <button class="btn btn-primary w-full py-3" id="btn-play" onclick="togglePlay()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
          Start Show
        </button>
        <button class="btn w-full" id="btn-sync" onclick="toggleSync()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
          Music Sync
        </button>
        <button class="btn w-full" onclick="flashEffect()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
          Flash
        </button>
      </div>
    </div>
  </div>

  <script>
    // ==================== CONFIGURATION ====================
    const CONFIG = {
      spotlights: 8,
      particles: 200,
      laserBeams: 12,
      matrixColumns: 20,
      maxTrails: 5,
    };

    const PALETTES = {
      neon: ['#00f0ff', '#ff00aa', '#aa00ff', '#00ff88', '#ffee00'],
      warm: ['#ff5500', '#ff8800', '#ffcc00', '#ff2244', '#ff6699'],
      cool: ['#0055ff', '#00aaff', '#00ffcc', '#6600ff', '#aa00ff'],
      classic: ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff'],
      sunset: ['#ff0044', '#ff5500', '#ffaa00', '#ffcc66', '#ff8866'],
      forest: ['#00ff44', '#44ff88', '#88ffaa', '#00aa44', '#aaffaa'],
      ocean: ['#0044ff', '#0088ff', '#00ccff', '#44aaff', '#88ccff'],
      fire: ['#ff0000', '#ff4400', '#ff8800', '#ffaa00', '#ffcc00'],
    };

    const PRESETS = {
      club: { pattern: 'wave', palette: 'neon', bpm: 128, intensity: 90, sync: true },
      edm: { pattern: 'strobe', palette: 'neon', bpm: 140, intensity: 100, sync: true },
      chill: { pattern: 'pulse', palette: 'ocean', bpm: 90, intensity: 50, sync: false },
      rave: { pattern: 'matrix', palette: 'classic', bpm: 160, intensity: 100, sync: true },
      romantic: { pattern: 'orbit', palette: 'sunset', bpm: 80, intensity: 60, sync: false },
      cyber: { pattern: 'laser', palette: 'cool', bpm: 130, intensity: 85, sync: true },
    };

    // ==================== STATE ====================
    let state = {
      playing: false,
      pattern: 'wave',
      palette: 'neon',
      bpm: 120,
      intensity: 0.8,
      musicSync: false,
      colorCycle: false,
      currentColors: [...PALETTES.neon],
      beatPhase: 0,
      lastBeatTime: 0,
      flashIntensity: 0,
    };

    // ==================== CANVAS SETUP ====================
    const canvas = document.getElementById('stage-canvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    let animationId;
    let time = 0;

    function resize() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width * window.devicePixelRatio;
      canvas.height = height * window.devicePixelRatio;
      ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
    }

    window.addEventListener('resize', resize);
    resize();

    // ==================== LIGHT ENGINE ====================
    class SpotLight {
      constructor(index, total) {
        this.index = index;
        this.total = total;
        this.angle = (index / total) * Math.PI * 2;
        this.baseAngle = this.angle;
        this.radius = 0;
        this.color = '#ffffff';
        this.intensity = 1;
        this.panSpeed = 0;
        this.tiltAngle = 0;
        this.beamWidth = 0.3;
        this.targetColor = '#ffffff';
        this.colorLerp = 0;
      }

      update(dt, beat, pattern) {
        this.colorLerp += dt * 3;
        if (this.colorLerp > 1) this.colorLerp = 1;

        const speed = state.bpm / 60;

        switch (pattern) {
          case 'wave':
            this.panSpeed = Math.sin(time * speed + this.index * 0.8) * 2;
            this.angle = this.baseAngle + Math.sin(time * speed * 0.5 + this.index * 0.5) * 1.5;
            this.intensity = 0.5 + Math.sin(time * speed * 2 + this.index) * 0.5;
            this.beamWidth = 0.2 + Math.sin(time * speed + this.index * 0.3) * 0.15;
            break;
          case 'strobe':
            this.intensity = beat > 0.7 ? 1 : (beat > 0.3 ? 0.3 : 0);
            this.angle = this.baseAngle + Math.random() * 0.2;
            this.beamWidth = 0.15;
            break;
          case 'chase':
            const chasePhase = (time * speed * 2 + this.index / this.total) % 1;
            this.intensity = Math.exp(-chasePhase * 5) * (1 - chasePhase);
            this.angle = this.baseAngle + chasePhase * 0.5;
            this.beamWidth = 0.15;
            break;
          case 'pulse':
            this.intensity = 0.3 + beat * 0.7;
            this.angle = this.baseAngle;
            this.beamWidth = 0.2 + beat * 0.2;
            break;
          case 'laser':
            this.intensity = beat > 0.5 ? 1 : 0.1;
            this.angle = this.baseAngle + Math.sin(time * speed * 3 + this.index) * 2;
            this.beamWidth = 0.02;
            break;
          case 'rain':
            this.intensity = Math.random() * 0.5 + 0.2;
            this.angle = this.baseAngle + Math.sin(time + this.index) * 0.3;
            this.beamWidth = 0.1;
            break;
          case 'orbit':
            this.angle = time * speed * 0.3 + (this.index / this.total) * Math.PI * 2;
            this.intensity = 0.6 + Math.sin(time * speed + this.index * 0.5) * 0.4;
            this.beamWidth = 0.15;
            break;
          case 'matrix':
            this.intensity = Math.sin(time * speed * 4 + this.index * 2) > 0 ? 1 : 0;
            this.angle = this.baseAngle;
            this.beamWidth = 0.1;
            break;
        }

        this.intensity *= state.intensity;
        this.color = this.getColor(this.index);
      }

      getColor(index) {
        const colors = state.currentColors;
        return colors[index % colors.length];
      }

      draw(ctx) {
        if (this.intensity < 0.01) return;

        const cx = width / 2;
        const cy = height * 0.85;
        const beamLen = height * 0.9;

        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(this.angle);

        // Beam gradient
        const grad = ctx.createLinearGradient(0, 0, 0, -beamLen);
        const rgb = this.hexToRgb(this.color);
        const alpha = this.intensity * 0.6;

        grad.addColorStop(0, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${alpha})`);
        grad.addColorStop(0.3, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${alpha * 0.5})`);
        grad.addColorStop(1, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, 0)`);

        // Draw beam
        ctx.beginPath();
        ctx.moveTo(-beamLen * this.beamWidth * 0.5, 0);
        ctx.lineTo(0, -beamLen);
        ctx.lineTo(beamLen * this.beamWidth * 0.5, 0);
        ctx.closePath();
        ctx.fillStyle = grad;
        ctx.fill();

        // Core beam
        const coreGrad = ctx.createLinearGradient(0, 0, 0, -beamLen * 0.5);
        coreGrad.addColorStop(0, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${this.intensity * 0.9})`);
        coreGrad.addColorStop(1, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, 0)`);

        ctx.beginPath();
        ctx.moveTo(-beamLen * this.beamWidth * 0.15, 0);
        ctx.lineTo(0, -beamLen * 0.5);
        ctx.lineTo(beamLen * this.beamWidth * 0.15, 0);
        ctx.closePath();
        ctx.fillStyle = coreGrad;
        ctx.fill();

        // Glow at source
        const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, 60);
        glow.addColorStop(0, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${this.intensity})`);
        glow.addColorStop(0.5, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${this.intensity * 0.3})`);
        glow.addColorStop(1, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, 0)`);
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(0, 0, 60, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();

        // Spot on ceiling/floor
        const spotX = cx + Math.cos(this.angle - Math.PI / 2) * beamLen * 0.7;
        const spotY = cy - beamLen * 0.7;
        const spotGrad = ctx.createRadialGradient(spotX, spotY, 0, spotX, spotY, 100);
        spotGrad.addColorStop(0, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${this.intensity * 0.4})`);
        spotGrad.addColorStop(1, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, 0)`);
        ctx.fillStyle = spotGrad;
        ctx.beginPath();
        ctx.arc(spotX, spotY, 100 + this.intensity * 50, 0, Math.PI * 2);
        ctx.fill();
      }

      hexToRgb(hex) {
        const n = parseInt(hex.slice(1), 16);
        return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
      }
    }

    class Particle {
      constructor() {
        this.reset();
      }

      reset() {
        this.x = Math.random() * width;
        this.y = Math.random() * height;
        this.vx = (Math.random() - 0.5) * 2;
        this.vy = (Math.random() - 0.5) * 2;
        this.size = Math.random() * 3 + 1;
        this.life = Math.random();
        this.maxLife = 0.5 + Math.random() * 1;
        this.color = state.currentColors[Math.floor(Math.random() * state.currentColors.length)];
        this.alpha = Math.random() * 0.5 + 0.2;
      }

      update(dt, beat) {
        const speed = state.bpm / 120;
        this.x += this.vx * speed * (1 + beat);
        this.y += this.vy * speed * (1 + beat);
        this.life += dt;

        if (this.life > this.maxLife || this.x < -50 || this.x > width + 50 || this.y < -50 || this.y > height + 50) {
          this.reset();
        }
      }

      draw(ctx) {
        const lifeRatio = 1 - (this.life / this.maxLife);
        const alpha = this.alpha * lifeRatio * state.intensity;
        if (alpha < 0.01) return;

        const rgb = this.hexToRgb(this.color);
        ctx.fillStyle = `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${alpha})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * lifeRatio, 0, Math.PI * 2);
        ctx.fill();
      }

      hexToRgb(hex) {
        const n = parseInt(hex.slice(1), 16);
        return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
      }
    }

    class Laser {
      constructor(index) {
        this.index = index;
        this.active = false;
        this.x = 0;
        this.y = 0;
        this.angle = 0;
        this.color = '#00f0ff';
        this.width = 2;
        this.life = 0;
      }

      update(dt, beat, pattern) {
        const speed = state.bpm / 60;

        if (pattern === 'laser') {
          this.active = true;
          const t = time * speed + this.index * 0.5;
          this.x = width / 2 + Math.sin(t * 2) * width * 0.3;
          this.y = height * 0.9;
          this.angle = -Math.PI / 2 + Math.sin(t * 3 + this.index) * 0.5;
          this.color = state.currentColors[this.index % state.currentColors.length];
          this.width = 1 + beat * 3;
        } else if (pattern === 'matrix' && Math.random() < 0.02 * speed) {
          this.active = true;
          this.x = Math.random() * width;
          this.y = height * 0.9;
          this.angle = -Math.PI / 2 + (Math.random() - 0.5) * 0.2;
          this.color = state.currentColors[Math.floor(Math.random() * state.currentColors.length)];
          this.width = 2;
          this.life = 0.3;
        } else if (pattern === 'strobe' && beat > 0.8) {
          this.active = true;
          this.x = width / 2 + (Math.random() - 0.5) * width;
          this.y = height * 0.9;
          this.angle = -Math.PI / 2 + (Math.random() - 0.5);
          this.color = '#ffffff';
          this.width = 1 + Math.random() * 2;
          this.life = 0.1;
        } else {
          this.life -= dt;
          if (this.life <= 0) this.active = false;
        }
      }

      draw(ctx) {
        if (!this.active || this.life <= 0) return;

        const len = height * 1.2;
        const endX = this.x + Math.cos(this.angle) * len;
        const endY = this.y + Math.sin(this.angle) * len;

        const rgb = this.hexToRgb(this.color);
        const alpha = Math.min(this.life * 3, 1) * state.intensity;

        // Core beam
        ctx.strokeStyle = `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${alpha})`;
        ctx.lineWidth = this.width;
        ctx.beginPath();
        ctx.moveTo(this.x, this.y);
        ctx.lineTo(endX, endY);
        ctx.stroke();

        // Glow
        ctx.strokeStyle = `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${alpha * 0.3})`;
        ctx.lineWidth = this.width * 4;
        ctx.beginPath();
        ctx.moveTo(this.x, this.y);
        ctx.lineTo(endX, endY);
        ctx.stroke();
      }

      hexToRgb(hex) {
        const n = parseInt(hex.slice(1), 16);
        return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
      }
    }

    class MatrixDrop {
      constructor(col) {
        this.col = col;
        this.reset();
      }

      reset() {
        this.x = (this.col / CONFIG.matrixColumns) * width;
        this.y = -Math.random() * height;
        this.speed = 100 + Math.random() * 300;
        this.length = 5 + Math.random() * 15;
        this.color = state.currentColors[Math.floor(Math.random() * state.currentColors.length)];
        this.chars = [];
        for (let i = 0; i < this.length; i++) {
          this.chars.push(Math.random() > 0.5 ? '1' : '0');
        }
      }

      update(dt) {
        this.y += this.speed * dt;
        if (this.y > height + 200) {
          this.reset();
        }
      }

      draw(ctx) {
        const rgb = this.hexToRgb(this.color);
        const cellH = 20;

        for (let i = 0; i < this.chars.length; i++) {
          const y = this.y - i * cellH;
          if (y < -20 || y > height + 20) continue;

          const alpha = (1 - i / this.length) * 0.8 * state.intensity;
          ctx.fillStyle = `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${alpha})`;
          ctx.font = 'bold 14px monospace';
          ctx.fillText(this.chars[i], this.x, y);
        }
      }

      hexToRgb(hex) {
        const n = parseInt(hex.slice(1), 16);
        return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
      }
    }

    // ==================== INITIALIZE ENTITIES ====================
    const spotlights = Array.from({ length: CONFIG.spotlights }, (_, i) => new SpotLight(i, CONFIG.spotlights));
    const particles = Array.from({ length: CONFIG.particles }, () => new Particle());
    const lasers = Array.from({ length: CONFIG.laserBeams }, (_, i) => new Laser(i));
    const matrixDrops = Array.from({ length: CONFIG.matrixColumns }, (_, i) => new MatrixDrop(i));

    // ==================== AUDIO / BEAT SIMULATION ====================
    let vizBars = [];
    const NUM_BARS = 32;

    function initViz() {
      const container = document.getElementById('viz-bars');
      for (let i = 0; i < NUM_BARS; i++) {
        const bar = document.createElement('div');
        bar.className = 'viz-bar';
        bar.style.height = '2px';
        container.appendChild(bar);
        vizBars.push(bar);
      }
    }

    function updateViz(beat, time) {
      const bpmScale = state.bpm / 120;
      for (let i = 0; i < NUM_BARS; i++) {
        const freq = (i / NUM_BARS) * 10;
        let val = Math.sin(time * bpmScale * 5 + freq * 3) * 0.5 + 0.5;
        val = val * val;
        val *= beat * 0.7 + 0.3;
        val *= state.intensity;
        const h = Math.max(2, val * 50);
        vizBars[i].style.height = h + 'px';

        // Color based on height
        const hue = (i / NUM_BARS) * 180 + 160;
        vizBars[i].style.background = `linear-gradient(to top, hsl(${hue}, 100%, 50%), hsl(${hue + 40}, 100%, 60%))`;
      }
    }

    // ==================== RENDER LOOP ====================
    let lastTime = 0;

    function render(now) {
      const dt = Math.min((now - lastTime) / 1000, 0.05);
      lastTime = now;

      if (state.playing) {
        time += dt;
      }

      // Beat calculation
      const beatPeriod = 60 / state.bpm;
      const beatPhase = (time % beatPeriod) / beatPeriod;
      const beatEnvelope = Math.exp(-beatPhase * 10);
      const beat = state.musicSync ? beatEnvelope : 0.5;

      // Flash decay
      state.flashIntensity *= 0.92;

      // Color cycling
      if (state.colorCycle && state.playing) {
        const cycleSpeed = state.bpm / 60;
        const cycleTime = time * cycleSpeed;
        state.currentColors = state.currentColors.map((_, i) => {
          const hue = ((cycleTime * 30 + i * (360 / state.currentColors.length)) % 360);
          return hslToHex(hue, 100, 50);
        });
      }

      // Clear canvas
      ctx.fillStyle = `rgba(10, 10, 18, ${0.15 + state.flashIntensity * 0.3})`;
      ctx.fillRect(0, 0, width, height);

      // Flash overlay
      if (state.flashIntensity > 0.01) {
        ctx.fillStyle = `rgba(255, 255, 255, ${state.flashIntensity * 0.3})`;
        ctx.fillRect(0, 0, width, height);
      }

      // Beat flash
      if (state.musicSync && beat > 0.7) {
        ctx.fillStyle = `rgba(255, 255, 255, ${(beat - 0.7) * 0.15 * state.intensity})`;
        ctx.fillRect(0, 0, width, height);
      }

      // Draw stage floor
      const floorY = height * 0.85;
      const floorGrad = ctx.createLinearGradient(0, floorY, 0, height);
      floorGrad.addColorStop(0, 'rgba(20, 20, 35, 0.8)');
      floorGrad.addColorStop(1, 'rgba(5, 5, 10, 0.95)');
      ctx.fillStyle = floorGrad;
      ctx.fillRect(0, floorY, width, height - floorY);

      // Grid lines on floor
      ctx.strokeStyle = 'rgba(0, 240, 255, 0.03)';
      ctx.lineWidth = 1;
      for (let i = -10; i <= 10; i++) {
        const x = width / 2 + i * 80;
        ctx.beginPath();
        ctx.moveTo(x, floorY);
        ctx.lineTo(width / 2 + i * 200, height);
        ctx.stroke();
      }

      // Matrix drops
      if (state.pattern === 'matrix') {
        matrixDrops.forEach(drop => {
          if (state.playing) drop.update(dt);
          drop.draw(ctx);
        });
      }

      // Lasers
      lasers.forEach(laser => {
        if (state.playing) laser.update(dt, beat, state.pattern);
        laser.draw(ctx);
      });

      // Spotlights
      spotlights.forEach(spot => {
        if (state.playing) spot.update(dt, beat, state.pattern);
        spot.draw(ctx);
      });

      // Particles
      particles.forEach(p => {
        if (state.playing) p.update(dt, beat);
        p.draw(ctx);
      });

      // Beat indicator
      const indicator = document.getElementById('beat-indicator');
      if (beat > 0.6) {
        indicator.classList.add('on');
      } else {
        indicator.classList.remove('on');
      }

      // Update viz
      updateViz(beat, time);

      animationId = requestAnimationFrame(render);
    }

    // ==================== UTILITIES ====================
    function hslToHex(h, s, l) {
      s /= 100;
      l /= 100;
      const a = s * Math.min(l, 1 - l);
      const f = n => {
        const k = (n + h / 30) % 12;
        const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
        return Math.round(255 * color).toString(16).padStart(2, '0');
      };
      return `#${f(0)}${f(8)}${f(4)}`;
    }

    // ==================== UI CONTROLS ====================
    function setPattern(pattern) {
      state.pattern = pattern;
      document.querySelectorAll('[data-pattern]').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.pattern === pattern);
      });
    }

    function setPalette(paletteName) {
      state.palette = paletteName;
      state.currentColors = [...PALETTES[paletteName]];
      renderColorPalette();
    }

    function renderColorPalette() {
      const container = document.getElementById('color-palette');
      container.innerHTML = '';

      Object.keys(PALETTES).forEach(name => {
        const colors = PALETTES[name];
        const swatch = document.createElement('div');
        swatch.className = 'color-swatch' + (state.palette === name ? ' active' : '');
        swatch.style.background = `linear-gradient(135deg, ${colors[0]}, ${colors[1]})`;
        swatch.style.color = colors[0];
        swatch.onclick = () => setPalette(name);
        swatch.title = name.charAt(0).toUpperCase() + name.slice(1);
        container.appendChild(swatch);
      });
    }

    function randomizeColors() {
      state.currentColors = Array.from({ length: 5 }, () => {
        const h = Math.floor(Math.random() * 360);
        return hslToHex(h, 80 + Math.random() * 20, 50 + Math.random() * 20);
      });
      state.palette = 'custom';
      renderColorPalette();
    }

    function toggleColorCycle() {
      state.colorCycle = !state.colorCycle;
      const btn = document.getElementById('btn-cycle');
      btn.classList.toggle('active', state.colorCycle);
      btn.textContent = state.colorCycle ? 'Cycling' : 'Cycle';
    }

    function loadPreset(name) {
      const preset = PRESETS[name];
      if (!preset) return;

      setPattern(preset.pattern);
      setPalette(preset.palette);
      state.bpm = preset.bpm;
      state.intensity = preset.intensity / 100;
      state.musicSync = preset.sync;

      document.getElementById('bpm-slider').value = preset.bpm;
      document.getElementById('bpm-display').textContent = preset.bpm;
      document.getElementById('intensity-slider').value = preset.intensity;
      document.getElementById('intensity-display').textContent = preset.intensity + '%';

      const syncBtn = document.getElementById('btn-sync');
      syncBtn.classList.toggle('active', state.musicSync);

      document.querySelectorAll('[data-preset]').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.preset === name);
      });
    }

    function togglePlay() {
      state.playing = !state.playing;
      const btn = document.getElementById('btn-play');
      const status = document.getElementById('status-text');

      if (state.playing) {
        btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> Stop Show';
        status.textContent = 'Running';
        status.style.color = 'var(--neon-cyan)';
      } else {
        btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg> Start Show';
        status.textContent = 'Paused';
        status.style.color = 'rgba(255,255,255,0.4)';
      }
    }

    function toggleSync() {
      state.musicSync = !state.musicSync;
      const btn = document.getElementById('btn-sync');
      btn.classList.toggle('active', state.musicSync);
    }

    function flashEffect() {
      state.flashIntensity = 1;
    }

    // ==================== EVENT LISTENERS ====================
    document.getElementById('bpm-slider').addEventListener('input', (e) => {
      state.bpm = parseInt(e.target.value);
      document.getElementById('bpm-display').textContent = state.bpm;
    });

    document.getElementById('intensity-slider').addEventListener('input', (e) => {
      state.intensity = parseInt(e.target.value) / 100;
      document.getElementById('intensity-display').textContent = e.target.value + '%';
    });

    // ==================== INIT ====================
    initViz();
    renderColorPalette();
    animationId = requestAnimationFrame(render);
  </script>
</body>
</html>
