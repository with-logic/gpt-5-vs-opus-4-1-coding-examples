<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Poll Board</title>
<style>
  :root {
    --bg: #f0f9f4;
    --card-bg: #ffffff;
    --text: #1a2e35;
    --text-secondary: #5a7a82;
    --accent: #3b8d7f;
    --accent-light: #e8f5f1;
    --border: #d4ece4;
    --shadow: rgba(59, 141, 127, 0.08);
    --shadow-hover: rgba(59, 141, 127, 0.14);
    --bar-1: #3b8d7f;
    --bar-2: #6bb3a8;
    --bar-3: #f2a93b;
    --bar-4: #e87a5d;
    --bar-5: #8b9dc3;
    --success: #2ecc71;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background blobs */
  .bg-decor {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.4;
    animation: blobFloat 20s ease-in-out infinite;
  }
  .blob-1 {
    width: 400px; height: 400px;
    background: #c2f0e4;
    top: -100px; left: -100px;
    animation-delay: 0s;
  }
  .blob-2 {
    width: 350px; height: 350px;
    background: #f5e6c8;
    bottom: -80px; right: -80px;
    animation-delay: -7s;
  }
  .blob-3 {
    width: 300px; height: 300px;
    background: #e8d5f2;
    top: 40%; left: 60%;
    animation-delay: -14s;
  }
  @keyframes blobFloat {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(30px, -40px) scale(1.05); }
    66% { transform: translate(-20px, 20px) scale(0.95); }
  }

  /* Confetti canvas */
  #confetti-canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1000;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 720px;
    margin: 0 auto;
    padding: 40px 20px 60px;
  }

  header {
    text-align: center;
    margin-bottom: 40px;
  }

  header h1 {
    font-size: 2.4rem;
    font-weight: 800;
    letter-spacing: -0.03em;
    margin-bottom: 8px;
    background: linear-gradient(135deg, var(--accent) 0%, #2a6b60 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  header p {
    color: var(--text-secondary);
    font-size: 1.1rem;
  }

  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }

  .stat-pill {
    background: var(--card-bg);
    border: 1px solid var(--border);
    padding: 10px 22px;
    border-radius: 100px;
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--text-secondary);
    box-shadow: 0 2px 8px var(--shadow);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .stat-pill:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 16px var(--shadow-hover);
  }
  .stat-pill span {
    color: var(--accent);
    font-weight: 700;
  }

  .poll-card {
    background: var(--card-bg);
    border-radius: 20px;
    padding: 28px;
    margin-bottom: 24px;
    box-shadow: 0 4px 24px var(--shadow);
    border: 1px solid var(--border);
    transition: transform 0.3s, box-shadow 0.3s;
    animation: cardEnter 0.6s ease-out backwards;
  }
  .poll-card:nth-child(2) { animation-delay: 0.08s; }
  .poll-card:nth-child(3) { animation-delay: 0.16s; }
  .poll-card:nth-child(4) { animation-delay: 0.24s; }
  .poll-card:nth-child(5) { animation-delay: 0.32s; }

  .poll-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 32px var(--shadow-hover);
  }

  @keyframes cardEnter {
    from {
      opacity: 0;
      transform: translateY(20px) scale(0.98);
    }
    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }

  .poll-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 4px;
  }
  .poll-badge {
    font-size: 0.65rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 3px 10px;
    border-radius: 6px;
    background: var(--accent-light);
    color: var(--accent);
  }
  .poll-date {
    font-size: 0.75rem;
    color: var(--text-secondary);
  }

  .poll-question {
    font-size: 1.25rem;
    font-weight: 700;
    margin-bottom: 20px;
    line-height: 1.35;
    letter-spacing: -0.01em;
  }

  .option {
    position: relative;
    background: #f8fbfa;
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 14px 18px;
    margin-bottom: 10px;
    cursor: pointer;
    overflow: hidden;
    transition: border-color 0.25s, background 0.25s, transform 0.15s;
  }
  .option:hover {
    border-color: #a8dcd0;
    background: #f0f9f6;
    transform: scale(1.01);
  }
  .option:active {
    transform: scale(0.99);
  }
  .option.voted {
    border-color: var(--success);
    background: #f0fdf4;
  }
  .option.disabled {
    cursor: default;
  }
  .option.disabled:hover {
    transform: none;
    border-color: var(--border);
    background: #f8fbfa;
  }
  .option.voted.disabled:hover {
    border-color: var(--success);
    background: #f0fdf4;
  }

  .option-bg {
    position: absolute;
    top: 0; left: 0; bottom: 0;
    border-radius: 12px;
    transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
    opacity: 0.15;
    z-index: 0;
  }
  .option-bg-0 { background: var(--bar-1); }
  .option-bg-1 { background: var(--bar-2); }
  .option-bg-2 { background: var(--bar-3); }
  .option-bg-3 { background: var(--bar-4); }
  .option-bg-4 { background: var(--bar-5); }

  .option-content {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .option-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .option-radio {
    width: 20px;
    height: 20px;
    border: 2.5px solid var(--border);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.25s, background 0.25s;
    flex-shrink: 0;
  }
  .option:hover .option-radio {
    border-color: #8cc9bd;
  }
  .option.voted .option-radio {
    border-color: var(--success);
    background: var(--success);
  }
  .option-radio::after {
    content: '';
    width: 8px;
    height: 8px;
    background: white;
    border-radius: 50%;
    transform: scale(0);
    transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .option.voted .option-radio::after {
    transform: scale(1);
  }

  .option-text {
    font-weight: 500;
    font-size: 0.95rem;
    transition: color 0.2s;
  }

  .option-right {
    display: flex;
    align-items: center;
    gap: 8px;
    opacity: 0;
    transition: opacity 0.4s;
  }
  .poll-card.revealed .option-right {
    opacity: 1;
  }

  .vote-count {
    font-weight: 700;
    font-size: 0.9rem;
    color: var(--text);
    min-width: 28px;
    text-align: right;
    transition: color 0.2s;
  }
  .option.voted .vote-count {
    color: var(--success);
  }

  .vote-pct {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--text-secondary);
    min-width: 42px;
    text-align: right;
  }

  /* Floating +1 animation */
  .plus-one {
    position: absolute;
    right: 60px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--success);
    font-weight: 800;
    font-size: 1.1rem;
    pointer-events: none;
    z-index: 2;
    opacity: 0;
    animation: floatUp 1s ease-out forwards;
  }
  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(-50%) scale(0.5); }
    20% { opacity: 1; transform: translateY(-70%) scale(1.2); }
    100% { opacity: 0; transform: translateY(-140%) scale(1); }
  }

  .poll-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 16px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }
  .total-votes {
    font-size: 0.8rem;
    color: var(--text-secondary);
    font-weight: 500;
  }
  .total-votes .num {
    color: var(--accent);
    font-weight: 700;
    display: inline-block;
    min-width: 14px;
    text-align: center;
  }

  .reset-btn {
    background: none;
    border: none;
    color: var(--text-secondary);
    font-size: 0.78rem;
    font-weight: 500;
    cursor: pointer;
    padding: 4px 10px;
    border-radius: 8px;
    transition: color 0.2s, background 0.2s;
  }
  .reset-btn:hover {
    color: var(--accent);
    background: var(--accent-light);
  }

  /* New Poll Button */
  .new-poll-wrap {
    text-align: center;
    margin-top: 16px;
  }
  .new-poll-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, var(--accent) 0%, #2a6b60 100%);
    color: white;
    border: none;
    padding: 14px 28px;
    border-radius: 14px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(59, 141, 127, 0.3);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .new-poll-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 28px rgba(59, 141, 127, 0.4);
  }
  .new-poll-btn:active {
    transform: translateY(0);
  }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(26, 46, 53, 0.45);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .modal-overlay.open {
    opacity: 1;
    pointer-events: auto;
  }
  .modal {
    background: var(--card-bg);
    border-radius: 20px;
    padding: 32px;
    width: 90%;
    max-width: 460px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    transform: scale(0.9) translateY(10px);
    transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .modal-overlay.open .modal {
    transform: scale(1) translateY(0);
  }
  .modal h2 {
    font-size: 1.3rem;
    margin-bottom: 20px;
    letter-spacing: -0.01em;
  }
  .modal-input {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid var(--border);
    border-radius: 12px;
    font-size: 1rem;
    font-family: inherit;
    color: var(--text);
    margin-bottom: 10px;
    outline: none;
    transition: border-color 0.2s;
  }
  .modal-input:focus {
    border-color: var(--accent);
  }
  .modal-input::placeholder {
    color: #abc4be;
  }
  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 18px;
  }
  .modal-btn {
    padding: 10px 20px;
    border-radius: 10px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: transform 0.15s, opacity 0.15s;
  }
  .modal-btn:hover {
    transform: scale(1.03);
  }
  .modal-btn.secondary {
    background: #f0f3f2;
    color: var(--text-secondary);
  }
  .modal-btn.primary {
    background: var(--accent);
    color: white;
  }
  .modal-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }
  .modal-opts {
    margin-top: 6px;
  }
  .add-opt-row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-top: 8px;
  }
  .add-opt-btn {
    background: none;
    border: none;
    color: var(--accent);
    font-weight: 600;
    font-size: 0.85rem;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
    transition: background 0.2s;
  }
  .add-opt-btn:hover {
    background: var(--accent-light);
  }
  .remove-opt {
    background: none;
    border: none;
    color: #c0392b;
    font-size: 1.1rem;
    cursor: pointer;
    padding: 4px;
    line-height: 1;
    border-radius: 6px;
    transition: background 0.2s;
  }
  .remove-opt:hover {
    background: #fdeaea;
  }

  @media (max-width: 540px) {
    header h1 { font-size: 1.8rem; }
    .poll-card { padding: 20px; }
    .poll-question { font-size: 1.1rem; }
    .container { padding: 24px 14px 40px; }
  }
</style>
</head>
<body>

<div class="bg-decor">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>

<canvas id="confetti-canvas"></canvas>

<div class="container">
  <header>
    <h1>Poll Board</h1>
    <p>Cast your vote and see what others think</p>
  </header>

  <div class="stats-bar">
    <div class="stat-pill"><span id="total-polls">0</span> polls</div>
    <div class="stat-pill"><span id="total-cast">0</span> votes cast</div>
    <div class="stat-pill"><span id="your-votes">0</span> your votes</div>
  </div>

  <div id="polls"></div>

  <div class="new-poll-wrap">
    <button class="new-poll-btn" onclick="openModal()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
      Create New Poll
    </button>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h2>Create a New Poll</h2>
    <input class="modal-input" id="poll-q" placeholder="Ask a question..." maxlength="140">
    <div class="modal-opts" id="modal-opts">
      <input class="modal-input" placeholder="Option 1" maxlength="80">
      <input class="modal-input" placeholder="Option 2" maxlength="80">
    </div>
    <button class="add-opt-btn" onclick="addOpt()">+ Add another option</button>
    <div class="modal-actions">
      <button class="modal-btn secondary" onclick="closeModal()">Cancel</button>
      <button class="modal-btn primary" id="create-btn" onclick="createPoll()">Create Poll</button>
    </div>
  </div>
</div>

<script>
/* ===================== DATA ===================== */
const initialPolls = [
  {
    id: 1,
    question: "What's the best time to drink coffee?",
    category: "Lifestyle",
    date: "Apr 22, 2026",
    options: [
      { text: "First thing in the morning", votes: 342 },
      { text: "Mid-morning (9-11am)", votes: 518 },
      { text: "After lunch", votes: 267 },
      { text: "I don't drink coffee", votes: 98 }
    ],
    userVote: null
  },
  {
    id: 2,
    question: "Which superpower would you choose?",
    category: "Fun",
    date: "Apr 21, 2026",
    options: [
      { text: "Invisibility", votes: 412 },
      { text: "Flying", votes: 689 },
      { text: "Super strength", votes: 234 },
      { text: "Teleportation", votes: 556 },
      { text: "Time travel", votes: 478 }
    ],
    userVote: null
  },
  {
    id: 3,
    question: "Preferred work environment?",
    category: "Work",
    date: "Apr 20, 2026",
    options: [
      { text: "Fully remote", votes: 920 },
      { text: "Hybrid (2-3 days office)", votes: 754 },
      { text: "Fully in-office", votes: 198 },
      { text: "Coworking space", votes: 134 }
    ],
    userVote: null
  },
  {
    id: 4,
    question: "Best weekend activity?",
    category: "Leisure",
    date: "Apr 19, 2026",
    options: [
      { text: "Hiking outdoors", votes: 445 },
      { text: "Binge-watching shows", votes: 612 },
      { text: "Reading a book", votes: 389 },
      { text: "Socializing with friends", votes: 521 }
    ],
    userVote: null
  }
];

let polls = JSON.parse(JSON.stringify(initialPolls));
let nextId = 5;

/* ===================== CONFETTI ===================== */
const canvas = document.getElementById('confetti-canvas');
const ctx = canvas.getContext('2d');
let particles = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function spawnConfetti(x, y) {
  const colors = ['#3b8d7f','#6bb3a8','#f2a93b','#e87a5d','#8b9dc3','#2ecc71','#9b59b6','#1abc9c'];
  for (let i = 0; i < 60; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 12,
      vy: (Math.random() - 1.2) * 10 - 2,
      life: 1,
      decay: 0.015 + Math.random() * 0.02,
      size: 3 + Math.random() * 5,
      color: colors[Math.floor(Math.random() * colors.length)],
      rotation: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.3,
      gravity: 0.25 + Math.random() * 0.15
    });
  }
}

function updateConfetti() {
  if (particles.length === 0) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += p.gravity;
    p.vx *= 0.98;
    p.life -= p.decay;
    p.rotation += p.rotSpeed;
    if (p.life <= 0) {
      particles.splice(i, 1);
      continue;
    }
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rotation);
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
    ctx.restore();
  }
  if (particles.length > 0) requestAnimationFrame(updateConfetti);
}

/* ===================== RENDERING ===================== */
function totalVotes(poll) {
  return poll.options.reduce((s, o) => s + o.votes, 0);
}

function renderPolls() {
  const container = document.getElementById('polls');
  container.innerHTML = '';

  let allVotes = 0, yourVotes = 0;

  polls.forEach((poll, pIdx) => {
    const t = totalVotes(poll);
    allVotes += t;
    if (poll.userVote !== null) yourVotes++;

    const card = document.createElement('div');
    card.className = 'poll-card' + (poll.userVote !== null ? ' revealed' : '');
    card.style.animationDelay = (pIdx * 0.08) + 's';

    let optsHtml = '';
    poll.options.forEach((opt, i) => {
      const pct = t > 0 ? Math.round((opt.votes / t) * 100) : 0;
      const isVoted = poll.userVote === i;
      const disabled = poll.userVote !== null ? ' disabled' : '';
      const votedCls = isVoted ? ' voted' : '';
      optsHtml += `
        <div class="option${votedCls}${disabled}" data-pid="${poll.id}" data-oid="${i}" onclick="handleVote(this)">
          <div class="option-bg option-bg-${i % 5}" style="width: ${poll.userVote !== null ? pct : 0}%"></div>
          <div class="option-content">
            <div class="option-left">
              <div class="option-radio"></div>
              <span class="option-text">${escapeHtml(opt.text)}</span>
            </div>
            <div class="option-right">
              <span class="vote-count" data-target="${opt.votes}">${opt.votes}</span>
              <span class="vote-pct">${poll.userVote !== null ? pct + '%' : ''}</span>
            </div>
          </div>
        </div>
      `;
    });

    card.innerHTML = `
      <div class="poll-header">
        <span class="poll-badge">${escapeHtml(poll.category)}</span>
        <span class="poll-date">${escapeHtml(poll.date)}</span>
      </div>
      <div class="poll-question">${escapeHtml(poll.question)}</div>
      ${optsHtml}
      <div class="poll-footer">
        <div class="total-votes">
          <span class="num" id="tv-${poll.id}">${t.toLocaleString()}</span> total votes
        </div>
        ${poll.userVote !== null ? `<button class="reset-btn" onclick="resetVote(${poll.id})">Change vote</button>` : ''}
      </div>
    `;

    container.appendChild(card);
  });

  document.getElementById('total-polls').textContent = polls.length;
  document.getElementById('total-cast').textContent = allVotes.toLocaleString();
  document.getElementById('your-votes').textContent = yourVotes;
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

/* ===================== VOTING ===================== */
function handleVote(el) {
  const pid = parseInt(el.dataset.pid);
  const oid = parseInt(el.dataset.oid);
  const poll = polls.find(p => p.id === pid);
  if (!poll || poll.userVote !== null) return;

  poll.userVote = oid;
  poll.options[oid].votes++;

  const rect = el.getBoundingClientRect();
  const centerX = rect.left + rect.width / 2;
  const centerY = rect.top + rect.height / 2;
  spawnConfetti(centerX, centerY);
  updateConfetti();

  renderPolls();

  // Animate bar widths after a tiny delay for DOM to settle
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      const card = document.querySelector(`.option[data-pid="${pid}"]`)?.closest('.poll-card');
      if (card) card.classList.add('revealed');
      document.querySelectorAll(`.option[data-pid="${pid}"] .option-bg`).forEach(bg => {
        const p = polls.find(x => x.id === pid);
        const t = totalVotes(p);
        const i = parseInt(bg.closest('.option').dataset.oid);
        const pct = t > 0 ? Math.round((p.options[i].votes / t) * 100) : 0;
        bg.style.width = pct + '%';
      });
    });
  });

  // Animate vote count
  const countEl = el.querySelector('.vote-count');
  if (countEl) {
    const target = poll.options[oid].votes;
    animateCounter(countEl, target - 1, target, 600);
  }

  // Show +1 float
  const plus = document.createElement('div');
  plus.className = 'plus-one';
  plus.textContent = '+1';
  el.appendChild(plus);
  setTimeout(() => plus.remove(), 1000);
}

function animateCounter(el, from, to, duration) {
  const start = performance.now();
  function step(now) {
    const p = Math.min((now - start) / duration, 1);
    const ease = 1 - Math.pow(1 - p, 3);
    const val = Math.round(from + (to - from) * ease);
    el.textContent = val;
    if (p < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function resetVote(pid) {
  const poll = polls.find(p => p.id === pid);
  if (!poll || poll.userVote === null) return;
  poll.options[poll.userVote].votes--;
  poll.userVote = null;
  renderPolls();
}

/* ===================== MODAL ===================== */
function openModal() {
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('poll-q').value = '';
  const opts = document.getElementById('modal-opts');
  opts.innerHTML = `
    <input class="modal-input" placeholder="Option 1" maxlength="80">
    <input class="modal-input" placeholder="Option 2" maxlength="80">
  `;
  updateCreateBtn();
}

function closeModal(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('modal-overlay').classList.remove('open');
}

function addOpt() {
  const opts = document.getElementById('modal-opts');
  const n = opts.children.length + 1;
  if (n > 6) return;
  const wrap = document.createElement('div');
  wrap.className = 'add-opt-row';
  wrap.innerHTML = `
    <input class="modal-input" placeholder="Option ${n}" maxlength="80" style="margin-bottom:0">
    <button class="remove-opt" onclick="this.parentElement.remove(); updateCreateBtn();">&times;</button>
  `;
  opts.appendChild(wrap);
  updateCreateBtn();
}

function createPoll() {
  const q = document.getElementById('poll-q').value.trim();
  const optEls = document.querySelectorAll('#modal-opts input');
  const options = [];
  optEls.forEach(el => {
    const v = el.value.trim();
    if (v) options.push({ text: v, votes: 0 });
  });
  if (!q || options.length < 2) return;

  polls.unshift({
    id: nextId++,
    question: q,
    category: "New",
    date: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }),
    options: options,
    userVote: null
  });

  closeModal();
  renderPolls();
}

function updateCreateBtn() {
  const q = document.getElementById('poll-q').value.trim();
  const optEls = document.querySelectorAll('#modal-opts input');
  let optCount = 0;
  optEls.forEach(el => { if (el.value.trim()) optCount++; });
  document.getElementById('create-btn').disabled = !(q && optCount >= 2);
}

document.getElementById('poll-q').addEventListener('input', updateCreateBtn);
document.getElementById('modal-opts').addEventListener('input', updateCreateBtn);

/* ===================== INIT ===================== */
renderPolls();
</script>

</body>
