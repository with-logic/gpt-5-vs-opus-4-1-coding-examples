<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Alea Iacta Est — Roman Tic Tac Toe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cinzel+Decorative:wght@700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #C5A059;
  --gold-light: #E8D5A3;
  --gold-dark: #8B7355;
  --marble: #F5F0E8;
  --marble-dark: #E8E0D0;
  --marble-stripe: #DDD5C5;
  --text: #3A3530;
  --text-light: #6B6560;
  --accent: #8B1A1A;
  --accent-dark: #5C1010;
  --win-gold: #FFD700;
  --board-line: rgba(139,26,26,0.25);
  --shadow-soft: 0 4px 20px rgba(58,53,48,0.15);
  --shadow-gold: 0 0 30px rgba(197,160,89,0.3);
}

[data-theme="night"] {
  --marble: #1A1A24;
  --marble-dark: #252532;
  --marble-stripe: #303040;
  --text: #E0D8C8;
  --text-light: #A09888;
  --board-line: rgba(197,160,89,0.3);
  --shadow-soft: 0 4px 20px rgba(0,0,0,0.4);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  overflow: hidden;
  font-family: 'Lato', sans-serif;
  background: var(--marble);
  color: var(--text);
  transition: background 0.5s ease, color 0.5s ease;
}

body {
  display: flex;
  flex-direction: column;
  align-items: center;
  background-image:
    repeating-linear-gradient(90deg, transparent, transparent 60px, var(--marble-stripe) 60px, var(--marble-stripe) 61px),
    repeating-linear-gradient(0deg, transparent, transparent 80px, var(--marble-stripe) 80px, var(--marble-stripe) 81px);
  background-size: 100% 100%;
}

/* --- Header --- */
.header {
  width: 100%;
  padding: 2vh 3vw;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: relative;
  z-index: 10;
}

.brand {
  display: flex;
  align-items: center;
  gap: 1vw;
  flex-shrink: 0;
}

.spqr {
  width: clamp(36px, 5vw, 60px);
  height: clamp(36px, 5vw, 60px);
  border: 2px solid var(--gold);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Cinzel', serif;
  font-weight: 900;
  font-size: clamp(10px, 1.4vw, 16px);
  color: var(--gold);
  background: radial-gradient(circle at 30% 30%, var(--gold-light) 0%, var(--gold) 60%, var(--gold-dark) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  position: relative;
  box-shadow: inset 0 0 8px rgba(197,160,89,0.2), 0 0 15px rgba(197,160,89,0.15);
  flex-shrink: 0;
}

.spqr::before {
  content: '';
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  border: 1px solid var(--gold);
  opacity: 0.3;
}

.title-group {
  display: flex;
  flex-direction: column;
}

.title-group h1 {
  font-family: 'Cinzel Decorative', 'Cinzel', serif;
  font-size: clamp(16px, 2.2vw, 28px);
  font-weight: 700;
  color: var(--gold);
  line-height: 1.1;
  text-shadow: 0 2px 8px rgba(197,160,89,0.2);
}

.title-group span {
  font-size: clamp(9px, 1vw, 12px);
  color: var(--text-light);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  font-weight: 300;
}

.controls {
  display: flex;
  gap: clamp(6px, 1vw, 12px);
  flex-shrink: 0;
}

.btn {
  font-family: 'Cinzel', serif;
  font-size: clamp(11px, 1.1vw, 14px);
  font-weight: 700;
  padding: clamp(8px, 1.2vh, 14px) clamp(14px, 1.8vw, 24px);
  border: 1.5px solid var(--gold-dark);
  background: var(--marble-dark);
  color: var(--gold-dark);
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s ease;
  box-shadow: var(--shadow-soft);
  white-space: nowrap;
  position: relative;
  overflow: hidden;
}

.btn::after {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(197,160,89,0.1), transparent);
  transition: left 0.4s ease;
}

.btn:hover::after { left: 100%; }

.btn:hover {
  border-color: var(--gold);
  color: var(--gold);
  transform: translateY(-2px);
  box-shadow: var(--shadow-gold);
}

.btn:active { transform: translateY(0) scale(0.98); }

.btn-primary {
  background: var(--accent);
  color: var(--marble);
  border-color: var(--accent);
}

.btn-primary:hover {
  background: var(--accent-dark);
  border-color: var(--gold);
  color: var(--gold-light);
}

/* --- Victory Banner --- */
.banner {
  width: 100%;
  text-align: center;
  padding: 1vh 0;
  min-height: 3.5vh;
  position: relative;
  z-index: 5;
}

.banner-text {
  font-family: 'Cinzel Decorative', 'Cinzel', serif;
  font-size: clamp(14px, 2vw, 22px);
  color: var(--gold);
  opacity: 0;
  transform: translateY(-10px);
  transition: opacity 0.5s ease, transform 0.5s ease;
  text-shadow: 0 0 20px rgba(197,160,89,0.4);
}

.banner-text.show {
  opacity: 1;
  transform: translateY(0);
}

.banner-decor {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 1vw;
  margin-top: 0.5vh;
  opacity: 0;
  transition: opacity 0.5s ease 0.2s;
}

.banner-decor.show { opacity: 1; }

.banner-decor .line {
  width: clamp(30px, 6vw, 80px);
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}

.banner-decor .diamond {
  width: 6px; height: 6px;
  background: var(--gold);
  transform: rotate(45deg);
  box-shadow: 0 0 8px var(--gold);
}

/* --- Scoreboard --- */
.scoreboard {
  display: flex;
  gap: clamp(12px, 2vw, 30px);
  margin-bottom: 1.5vh;
  position: relative;
  z-index: 5;
}

.score-pill {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: clamp(8px, 1.2vh, 14px) clamp(14px, 2vw, 28px);
  background: var(--marble-dark);
  border: 1px solid var(--marble-stripe);
  border-radius: 12px;
  box-shadow: var(--shadow-soft);
  min-width: clamp(60px, 8vw, 100px);
  transition: border-color 0.3s ease, box-shadow 0.3s ease;
}

.score-pill.active {
  border-color: var(--gold);
  box-shadow: 0 0 20px rgba(197,160,89,0.2);
}

.score-label {
  font-family: 'Cinzel', serif;
  font-size: clamp(10px, 1vw, 13px);
  color: var(--text-light);
  letter-spacing: 0.1em;
}

.score-value {
  font-family: 'Cinzel Decorative', 'Cinzel', serif;
  font-size: clamp(20px, 2.5vw, 32px);
  font-weight: 700;
  color: var(--gold);
  line-height: 1.2;
}

/* --- Game Area --- */
.game-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 100%;
  padding: 0 3vw;
  position: relative;
  z-index: 5;
}

.board-wrapper {
  position: relative;
  width: min(80vmin, 520px);
  height: min(80vmin, 520px);
  margin: 0 auto;
}

.board {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(3, 1fr);
  width: 100%;
  height: 100%;
  gap: clamp(4px, 1vmin, 8px);
  position: relative;
}

.cell {
  background: var(--marble-dark);
  border-radius: clamp(6px, 1.2vmin, 14px);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  position: relative;
  border: 1px solid var(--marble-stripe);
  box-shadow: inset 0 1px 2px rgba(255,255,255,0.05), 0 2px 8px rgba(0,0,0,0.08);
  transition: background 0.2s ease, border-color 0.2s ease, transform 0.15s ease;
  user-select: none;
  -webkit-user-select: none;
  touch-action: manipulation;
  overflow: hidden;
}

.cell::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 30% 30%, rgba(197,160,89,0.08) 0%, transparent 70%);
  opacity: 0;
  transition: opacity 0.3s ease;
}

.cell:hover:not(.taken)::before { opacity: 1; }

.cell:hover:not(.taken) {
  border-color: var(--gold-dark);
  transform: scale(1.02);
}

.cell:active:not(.taken) { transform: scale(0.97); }

.cell.taken { cursor: default; }

.cell.win {
  background: rgba(197,160,89,0.15);
  border-color: var(--gold);
  box-shadow: 0 0 25px rgba(197,160,89,0.25), inset 0 0 20px rgba(197,160,89,0.1);
  animation: winPulse 1.5s ease-in-out infinite;
}

@keyframes winPulse {
  0%, 100% { box-shadow: 0 0 20px rgba(197,160,89,0.2), inset 0 0 15px rgba(197,160,89,0.08); }
  50% { box-shadow: 0 0 35px rgba(197,160,89,0.35), inset 0 0 25px rgba(197,160,89,0.15); }
}

.cell-content {
  font-family: 'Cinzel Decorative', 'Cinzel', serif;
  font-size: clamp(36px, 10vmin, 80px);
  font-weight: 700;
  color: var(--text);
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s ease;
  opacity: 0;
  transform: scale(0.3);
  pointer-events: none;
}

.cell-content.show {
  opacity: 1;
  transform: scale(1);
}

.cell-content.x { color: var(--accent); }
.cell-content.o { color: var(--gold); }

.cell-content.gladius { color: var(--accent); }
.cell-content.laurel { color: var(--gold); }

/* Board decorative frame */
.board-frame {
  position: absolute;
  inset: -12px;
  border: 2px solid var(--gold-dark);
  border-radius: clamp(12px, 2vmin, 24px);
  opacity: 0.3;
  pointer-events: none;
}

.board-frame::before,
.board-frame::after {
  content: '';
  position: absolute;
  width: 12px; height: 12px;
  border: 2px solid var(--gold);
}

.board-frame::before { top: -6px; left: -6px; border-right: none; border-bottom: none; }
.board-frame::after { bottom: -6px; right: -6px; border-left: none; border-top: none; }

/* --- Status --- */
.status {
  margin-top: 2vh;
  font-family: 'Cinzel', serif;
  font-size: clamp(12px, 1.5vw, 16px);
  color: var(--text-light);
  letter-spacing: 0.05em;
  min-height: 2em;
  text-align: center;
}

.status strong {
  color: var(--gold);
  font-weight: 700;
}

/* --- Modal --- */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}

.modal-overlay.open {
  opacity: 1;
  pointer-events: all;
}

.modal {
  background: var(--marble);
  border: 1px solid var(--gold-dark);
  border-radius: 16px;
  padding: clamp(20px, 3vh, 32px) clamp(20px, 3vw, 36px);
  width: min(90vw, 420px);
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3), 0 0 0 1px rgba(197,160,89,0.2);
  transform: translateY(20px) scale(0.96);
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.modal-overlay.open .modal {
  transform: translateY(0) scale(1);
}

.modal h2 {
  font-family: 'Cinzel Decorative', 'Cinzel', serif;
  font-size: clamp(18px, 2.2vw, 24px);
  color: var(--gold);
  text-align: center;
  margin-bottom: clamp(16px, 2vh, 24px);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

.modal h2::before,
.modal h2::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-dark));
}

.modal h2::after {
  background: linear-gradient(90deg, var(--gold-dark), transparent);
}

.option-group {
  margin-bottom: clamp(14px, 2vh, 20px);
}

.option-label {
  font-family: 'Cinzel', serif;
  font-size: clamp(11px, 1.1vw, 13px);
  color: var(--text-light);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 8px;
  display: block;
}

.option-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.option-btn {
  flex: 1;
  min-width: 80px;
  padding: 10px 12px;
  border: 1.5px solid var(--marble-stripe);
  background: var(--marble-dark);
  color: var(--text-light);
  border-radius: 8px;
  cursor: pointer;
  font-family: 'Lato', sans-serif;
  font-size: clamp(12px, 1vw, 14px);
  font-weight: 700;
  transition: all 0.2s ease;
  text-align: center;
}

.option-btn:hover {
  border-color: var(--gold-dark);
  color: var(--text);
}

.option-btn.active {
  border-color: var(--gold);
  color: var(--gold);
  background: rgba(197,160,89,0.08);
  box-shadow: 0 0 12px rgba(197,160,89,0.1);
}

.modal-actions {
  display: flex;
  gap: 10px;
  margin-top: clamp(16px, 2vh, 24px);
}

.modal-actions .btn { flex: 1; justify-content: center; }

/* --- Canvas confetti overlay --- */
#confetti-canvas {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 50;
}

/* --- Reduced motion --- */
@media (prefers-reduced-motion: reduce) {
  * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  .cell-content { opacity: 1; transform: scale(1); }
}

/* --- Responsive tweaks --- */
@media (max-width: 480px) {
  .header { padding: 1.5vh 4vw; }
  .controls { gap: 6px; }
  .btn { padding: 8px 12px; font-size: 11px; }
  .board-wrapper { width: 92vmin; height: 92vmin; }
  .scoreboard { gap: 8px; }
  .score-pill { padding: 6px 12px; min-width: 55px; }
}

@media (min-width: 1024px) {
  .board-wrapper { width: min(55vmin, 520px); height: min(55vmin, 520px); }
}

/* --- Focus for keyboard --- */
.cell:focus-visible {
  outline: 2px solid var(--gold);
  outline-offset: 2px;
}

.btn:focus-visible {
  outline: 2px solid var(--gold);
  outline-offset: 2px;
}

.option-btn:focus-visible {
  outline: 2px solid var(--gold);
  outline-offset: 2px;
}

/* Hidden */
.sr-only {
  position: absolute;
  width: 1px; height: 1px;
  padding: 0; margin: -1px;
  overflow: hidden;
  clip: rect(0,0,0,0);
  white-space: nowrap;
  border: 0;
}
</style>
</head>
<body>

<!-- Confetti Canvas -->
<canvas id="confetti-canvas" aria-hidden="true"></canvas>

<!-- Header -->
<header class="header" role="banner">
  <div class="brand">
    <div class="spqr" aria-hidden="true">SPQR</div>
    <div class="title-group">
      <h1>Alea Iacta Est</h1>
      <span>The die is cast</span>
    </div>
  </div>
  <nav class="controls" aria-label="Game controls">
    <button class="btn" id="btn-new-round" aria-label="Start new round">New Round</button>
    <button class="btn" id="btn-customize" aria-label="Open customize dialog">Customize</button>
    <button class="btn btn-primary" id="btn-reset-scores" aria-label="Reset all scores">Reset Scores</button>
  </nav>
</header>

<!-- Victory Banner -->
<div class="banner" aria-live="polite" aria-atomic="true">
  <div class="banner-text" id="banner-text"></div>
  <div class="banner-decor" id="banner-decor" aria-hidden="true">
    <div class="line"></div>
    <div class="diamond"></div>
    <div class="line"></div>
  </div>
</div>

<!-- Scoreboard -->
<div class="scoreboard" role="region" aria-label="Score board">
  <div class="score-pill" id="score-x-pill" aria-label="X wins">
    <span class="score-label" id="score-x-label">X</span>
    <span class="score-value" id="score-x">0</span>
  </div>
  <div class="score-pill" id="score-draw-pill" aria-label="Draws">
    <span class="score-label">Draws</span>
    <span class="score-value" id="score-draw">0</span>
  </div>
  <div class="score-pill" id="score-o-pill" aria-label="O wins">
    <span class="score-label" id="score-o-label">O</span>
    <span class="score-value" id="score-o">0</span>
  </div>
</div>

<!-- Game Area -->
<main class="game-area" role="main">
  <div class="board-wrapper">
    <div class="board-frame" aria-hidden="true"></div>
    <div class="board" id="board" role="grid" aria-label="Tic tac toe board">
      <div class="cell" role="gridcell" tabindex="0" aria-label="Cell 1, empty" data-index="0"></div>
      <div class="cell" role="gridcell" tabindex="0" aria-label="Cell 2, empty" data-index="1"></div>
      <div class="cell" role="gridcell" tabindex="0" aria-label="Cell 3, empty" data-index="2"></div>
      <div class="cell" role="gridcell" tabindex="0" aria-label="Cell 4, empty" data-index="3"></div>
      <div class="cell" role="gridcell" tabindex="0" aria-label="Cell 5, empty" data-index="4"></div>
      <div class="cell" role="gridcell" tabindex="0" aria-label="Cell 6, empty" data-index="5"></div>
      <div class="cell" role="gridcell" tabindex="0" aria-label="Cell 7, empty" data-index="6"></div>
      <div class="cell" role="gridcell" tabindex="0" aria-label="Cell 8, empty" data-index="7"></div>
      <div class="cell" role="gridcell" tabindex="0" aria-label="Cell 9, empty" data-index="8"></div>
    </div>
  </div>
  <div class="status" id="status" aria-live="polite" aria-atomic="true">X's turn to move</div>
</main>

<!-- Customize Modal -->
<div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title" tabindex="-1">
  <div class="modal">
    <h2 id="modal-title">Legion Settings</h2>

    <div class="option-group">
      <span class="option-label">Theme</span>
      <div class="option-row" role="radiogroup" aria-label="Theme selection">
        <button class="option-btn active" data-option="theme" data-value="day" role="radio" aria-checked="true">Marble Day</button>
        <button class="option-btn" data-option="theme" data-value="night" role="radio" aria-checked="false">Night Legion</button>
      </div>
    </div>

    <div class="option-group">
      <span class="option-label">Glyphs</span>
      <div class="option-row" role="radiogroup" aria-label="Glyph selection">
        <button class="option-btn active" data-option="glyphs" data-value="standard" role="radio" aria-checked="true">Standard X/O</button>
        <button class="option-btn" data-option="glyphs" data-value="roman" role="radio" aria-checked="false">Gladius/Laurel</button>
      </div>
    </div>

    <div class="option-group">
      <span class="option-label">Mode</span>
      <div class="option-row" role="radiogroup" aria-label="Game mode">
        <button class="option-btn active" data-option="mode" data-value="pvp" role="radio" aria-checked="true">2 Players</button>
        <button class="option-btn" data-option="mode" data-value="ai" role="radio" aria-checked="false">vs AI</button>
      </div>
    </div>

    <div class="option-group">
      <span class="option-label">First Move</span>
      <div class="option-row" role="radiogroup" aria-label="First move selection">
        <button class="option-btn active" data-option="first" data-value="X" role="radio" aria-checked="true">X</button>
        <button class="option-btn" data-option="first" data-value="O" role="radio" aria-checked="false">O</button>
      </div>
    </div>

    <div class="option-group" id="ai-options">
      <span class="option-label">AI Discipline</span>
      <div class="option-row" role="radiogroup" aria-label="AI difficulty">
        <button class="option-btn" data-option="ai" data-value="perfect" role="radio" aria-checked="false">Perfect</button>
        <button class="option-btn active" data-option="ai" data-value="pragmatic" role="radio" aria-checked="true">Pragmatic</button>
        <button class="option-btn" data-option="ai" data-value="reckless" role="radio" aria-checked="false">Reckless</button>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn" id="btn-close">Close</button>
      <button class="btn btn-primary" id="btn-apply">Apply & New Round</button>
    </div>
  </div>
</div>

<script>
// ===================== STATE =====================
const state = {
  board: Array(9).fill(null),
  current: 'X',
  scores: { X: 0, O: 0, draw: 0 },
  gameOver: false,
  theme: 'day',
  glyphs: 'standard',
  mode: 'pvp',
  firstMove: 'X',
  aiDiscipline: 'pragmatic',
  winningLine: null,
  aiThinking: false,
};

const WIN_LINES = [
  [0,1,2],[3,4,5],[6,7,8],
  [0,3,6],[1,4,7],[2,5,8],
  [0,4,8],[2,4,6]
];

const GLYPH_MAP = {
  standard: { X: 'X', O: 'O' },
  roman: { X: '⚔', O: '\u{1F3F5}' } // ⚔ 🏵
};

// ===================== DOM REFS =====================
const els = {
  cells: document.querySelectorAll('.cell'),
  status: document.getElementById('status'),
  bannerText: document.getElementById('banner-text'),
  bannerDecor: document.getElementById('banner-decor'),
  scoreX: document.getElementById('score-x'),
  scoreO: document.getElementById('score-o'),
  scoreDraw: document.getElementById('score-draw'),
  scoreXPill: document.getElementById('score-x-pill'),
  scoreOPill: document.getElementById('score-o-pill'),
  scoreXLabel: document.getElementById('score-x-label'),
  scoreOLabel: document.getElementById('score-o-label'),
  modal: document.getElementById('modal-overlay'),
  aiOptions: document.getElementById('ai-options'),
  confetti: document.getElementById('confetti-canvas'),
};

// ===================== INITIALIZATION =====================
function init() {
  updateScoreLabels();
  bindEvents();
  updateTurnIndicator();
  resizeConfetti();
  window.addEventListener('resize', resizeConfetti);
}

function bindEvents() {
  els.cells.forEach(cell => {
    cell.addEventListener('click', () => handleCellClick(cell));
    cell.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        handleCellClick(cell);
      }
      handleArrowNav(e, cell);
    });
    cell.addEventListener('touchstart', e => {
      cell.style.transform = 'scale(0.97)';
    }, { passive: true });
    cell.addEventListener('touchend', () => {
      cell.style.transform = '';
    }, { passive: true });
  });

  document.getElementById('btn-new-round').addEventListener('click', newRound);
  document.getElementById('btn-reset-scores').addEventListener('click', resetScores);
  document.getElementById('btn-customize').addEventListener('click', openModal);
  document.getElementById('btn-close').addEventListener('click', closeModal);
  document.getElementById('btn-apply').addEventListener('click', applySettings);

  els.modal.addEventListener('click', e => {
    if (e.target === els.modal) closeModal();
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && els.modal.classList.contains('open')) closeModal();
  });

  document.querySelectorAll('.option-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const option = btn.dataset.option;
      const value = btn.dataset.value;
      document.querySelectorAll(`.option-btn[data-option="${option}"]`).forEach(b => {
        b.classList.remove('active');
        b.setAttribute('aria-checked', 'false');
      });
      btn.classList.add('active');
      btn.setAttribute('aria-checked', 'true');
      if (option === 'mode') {
        els.aiOptions.style.display = value === 'ai' ? 'block' : 'none';
      }
      if (option === 'theme') {
        document.documentElement.setAttribute('data-theme', value === 'night' ? 'night' : '');
      }
    });
  });
}

function handleArrowNav(e, cell) {
  const idx = parseInt(cell.dataset.index);
  let next = null;
  switch(e.key) {
    case 'ArrowRight': next = (idx % 3 < 2) ? idx + 1 : idx - 2; break;
    case 'ArrowLeft': next = (idx % 3 > 0) ? idx - 1 : idx + 2; break;
    case 'ArrowDown': next = (idx < 6) ? idx + 3 : idx - 6; break;
    case 'ArrowUp': next = (idx > 2) ? idx - 3 : idx + 6; break;
  }
  if (next !== null && next >= 0 && next < 9) {
    e.preventDefault();
    els.cells[next].focus();
  }
}

// ===================== GAME LOGIC =====================
function handleCellClick(cell) {
  if (state.gameOver || state.aiThinking) return;
  const idx = parseInt(cell.dataset.index);
  if (state.board[idx]) return;
  if (state.mode === 'ai' && state.current !== state.firstMove) return;

  makeMove(idx);

  if (!state.gameOver && state.mode === 'ai') {
    state.aiThinking = true;
    setTimeout(() => {
      const aiMove = getAIMove();
      if (aiMove !== null) makeMove(aiMove);
      state.aiThinking = false;
    }, 350);
  }
}

function makeMove(idx) {
  state.board[idx] = state.current;
  renderCell(idx);
  checkEnd();
  if (!state.gameOver) {
    state.current = state.current === 'X' ? 'O' : 'X';
    updateStatus();
    updateTurnIndicator();
  }
}

function renderCell(idx) {
  const cell = els.cells[idx];
  const glyph = GLYPH_MAP[state.glyphs][state.current];
  cell.classList.add('taken');
  cell.setAttribute('aria-label', `Cell ${idx+1}, ${glyph}`);
  cell.innerHTML = `<span class="cell-content ${state.glyphs === 'roman' ? (state.current==='X'?'gladius':'laurel') : state.current.toLowerCase()}">${glyph}</span>`;
  requestAnimationFrame(() => {
    cell.querySelector('.cell-content').classList.add('show');
  });
}

function checkEnd() {
  for (const line of WIN_LINES) {
    const [a,b,c] = line;
    if (state.board[a] && state.board[a] === state.board[b] && state.board[a] === state.board[c]) {
      endGame(state.board[a], line);
      return;
    }
  }
  if (state.board.every(Boolean)) {
    endGame('draw');
  }
}

function endGame(winner, line) {
  state.gameOver = true;
  if (winner === 'draw') {
    state.scores.draw++;
    els.scoreDraw.textContent = state.scores.draw;
    showBanner('A Stalemate — The Eagles Rest');
    updateStatus('Draw! The battle ends in stalemate.');
  } else {
    state.scores[winner]++;
    els[winner === 'X' ? 'scoreX' : 'scoreO'].textContent = state.scores[winner];
    state.winningLine = line;
    line.forEach(i => els.cells[i].classList.add('win'));
    const name = state.mode === 'ai' && winner !== state.firstMove ? 'The Legion' : `Player ${GLYPH_MAP[state.glyphs][winner]}`;
    showBanner(`${name} is Victorious!`);
    updateStatus(`${name} wins the battle!`);
    if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      launchConfetti();
    }
  }
  updateTurnIndicator();
}

function newRound() {
  state.board.fill(null);
  state.gameOver = false;
  state.winningLine = null;
  state.current = state.firstMove;
  state.aiThinking = false;

  els.cells.forEach((cell, i) => {
    cell.classList.remove('taken', 'win');
    cell.innerHTML = '';
    cell.setAttribute('aria-label', `Cell ${i+1}, empty`);
  });

  hideBanner();
  updateStatus();
  updateTurnIndicator();

  if (state.mode === 'ai' && state.firstMove === 'O') {
    state.aiThinking = true;
    setTimeout(() => {
      const aiMove = getAIMove();
      if (aiMove !== null) makeMove(aiMove);
      state.aiThinking = false;
    }, 400);
  }
}

function resetScores() {
  state.scores = { X: 0, O: 0, draw: 0 };
  els.scoreX.textContent = '0';
  els.scoreO.textContent = '0';
  els.scoreDraw.textContent = '0';
  newRound();
}

// ===================== UI UPDATES =====================
function updateStatus(msg) {
  if (msg) {
    els.status.innerHTML = msg;
    return;
  }
  if (state.gameOver) return;
  const name = state.mode === 'ai' && state.current !== state.firstMove
    ? 'The Legion'
    : `Player <strong>${GLYPH_MAP[state.glyphs][state.current]}</strong>`;
  els.status.innerHTML = `${name}'s turn to move`;
}

function updateTurnIndicator() {
  els.scoreXPill.classList.toggle('active', state.current === 'X' && !state.gameOver);
  els.scoreOPill.classList.toggle('active', state.current === 'O' && !state.gameOver);
}

function updateScoreLabels() {
  const map = GLYPH_MAP[state.glyphs];
  els.scoreXLabel.textContent = map.X;
  els.scoreOLabel.textContent = map.O;
}

function showBanner(text) {
  els.bannerText.textContent = text;
  els.bannerText.classList.add('show');
  els.bannerDecor.classList.add('show');
}

function hideBanner() {
  els.bannerText.classList.remove('show');
  els.bannerDecor.classList.remove('show');
  setTimeout(() => { els.bannerText.textContent = ''; }, 500);
}

// ===================== MODAL =====================
function openModal() {
  els.modal.classList.add('open');
  els.modal.focus();
  document.getElementById('btn-close').focus();
}

function closeModal() {
  els.modal.classList.remove('open');
}

function applySettings() {
  document.querySelectorAll('.option-btn.active').forEach(btn => {
    const opt = btn.dataset.option;
    const val = btn.dataset.value;
    if (opt === 'theme') state.theme = val;
    if (opt === 'glyphs') state.glyphs = val;
    if (opt === 'mode') state.mode = val;
    if (opt === 'first') state.firstMove = val;
    if (opt === 'ai') state.aiDiscipline = val;
  });
  document.documentElement.setAttribute('data-theme', state.theme === 'night' ? 'night' : '');
  updateScoreLabels();
  closeModal();
  newRound();
}

// ===================== AI (MINIMAX) =====================
function getAIMove() {
  const ai = state.current;
  const human = ai === 'X' ? 'O' : 'X';
  const board = state.board;

  // Perfect: pure minimax
  if (state.aiDiscipline === 'perfect') {
    return minimaxMove(board, ai, human);
  }

  // Reckless: mostly random with occasional good move
  if (state.aiDiscipline === 'reckless') {
    if (Math.random() < 0.55) {
      const empties = board.map((v,i) => v?null:i).filter(i=>i!==null);
      return empties.length ? empties[Math.floor(Math.random()*empties.length)] : null;
    }
    return minimaxMove(board, ai, human);
  }

  // Pragmatic: mix minimax with occasional suboptimal
  if (state.aiDiscipline === 'pragmatic') {
    if (Math.random() < 0.22) {
      const empties = board.map((v,i) => v?null:i).filter(i=>i!==null);
      return empties.length ? empties[Math.floor(Math.random()*empties.length)] : null;
    }
    return minimaxMove(board, ai, human);
  }

  return minimaxMove(board, ai, human);
}

function minimaxMove(board, ai, human) {
  let bestScore = -Infinity;
  let move = null;
  for (let i = 0; i < 9; i++) {
    if (!board[i]) {
      board[i] = ai;
      const score = minimax(board, 0, false, ai, human);
      board[i] = null;
      if (score > bestScore) { bestScore = score; move = i; }
    }
  }
  return move;
}

function minimax(board, depth, isMaximizing, ai, human) {
  const result = checkWinner(board);
  if (result === ai) return 10 - depth;
  if (result === human) return depth - 10;
  if (result === 'draw') return 0;

  if (isMaximizing) {
    let best = -Infinity;
    for (let i = 0; i < 9; i++) {
      if (!board[i]) {
        board[i] = ai;
        best = Math.max(best, minimax(board, depth+1, false, ai, human));
        board[i] = null;
      }
    }
    return best;
  } else {
    let best = Infinity;
    for (let i = 0; i < 9; i++) {
      if (!board[i]) {
        board[i] = human;
        best = Math.min(best, minimax(board, depth+1, true, ai, human));
        board[i] = null;
      }
    }
    return best;
  }
}

function checkWinner(board) {
  for (const [a,b,c] of WIN_LINES) {
    if (board[a] && board[a] === board[b] && board[a] === board[c]) return board[a];
  }
  if (board.every(Boolean)) return 'draw';
  return null;
}

// ===================== CONFETTI =====================
const ctx = els.confetti.getContext('2d');
let particles = [];
let animating = false;

function resizeConfetti() {
  els.confetti.width = window.innerWidth;
  els.confetti.height = window.innerHeight;
}

function launchConfetti() {
  particles = [];
  const colors = ['#C5A059','#E8D5A3','#FFD700','#8B1A1A','#FFFFFF','#D4AF37'];
  for (let i = 0; i < 180; i++) {
    particles.push({
      x: window.innerWidth / 2,
      y: window.innerHeight / 2,
      vx: (Math.random() - 0.5) * 16,
      vy: (Math.random() - 1.2) * 14,
      size: Math.random() * 6 + 2,
      color: colors[Math.floor(Math.random()*colors.length)],
      rotation: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.2,
      life: 1,
      decay: 0.003 + Math.random() * 0.005,
      gravity: 0.15 + Math.random() * 0.1,
      shape: Math.random() > 0.5 ? 'rect' : 'circle'
    });
  }
  if (!animating) {
    animating = true;
    requestAnimationFrame(drawConfetti);
  }
}

function drawConfetti() {
  ctx.clearRect(0, 0, els.confetti.width, els.confetti.height);
  let alive = false;
  for (const p of particles) {
    if (p.life <= 0) continue;
    alive = true;
    p.x += p.vx;
    p.y += p.vy;
    p.vy += p.gravity;
    p.vx *= 0.99;
    p.rotation += p.rotSpeed;
    p.life -= p.decay;

    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rotation);
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    if (p.shape === 'rect') {
      ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size*0.6);
    } else {
      ctx.beginPath();
      ctx.arc(0, 0, p.size/2, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  }
  if (alive) {
    requestAnimationFrame(drawConfetti);
  } else {
    animating = false;
    ctx.clearRect(0, 0, els.confetti.width, els.confetti.height);
  }
}

// ===================== START =====================
init();
</script>
</body>
</html>
