<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Falling Fruit Catcher</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(180deg, #87CEEB 0%, #E0F7FA 100%);
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .ui-overlay.active {
            pointer-events: all;
        }

        .start-screen, .game-over-screen {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 50px 60px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 90vw;
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        h1 {
            font-size: 3.5rem;
            color: #FF6B35;
            margin-bottom: 10px;
            text-shadow: 3px 3px 0px #FFE66D;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 1.3rem;
            color: #4ECDC4;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .btn {
            background: linear-gradient(135deg, #FF6B35, #FF8E53);
            color: white;
            border: none;
            padding: 18px 50px;
            font-size: 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 8px 20px rgba(255, 107, 53, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            pointer-events: all;
            letter-spacing: 1px;
        }

        .btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 12px 30px rgba(255, 107, 53, 0.5);
        }

        .btn:active {
            transform: translateY(0) scale(0.98);
        }

        .instructions {
            margin-top: 25px;
            color: #666;
            font-size: 1rem;
            line-height: 1.6;
        }

        .instructions kbd {
            background: #f0f0f0;
            border: 2px solid #ccc;
            border-radius: 6px;
            padding: 3px 10px;
            font-family: monospace;
            font-size: 0.9rem;
        }

        .score-display {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9);
            padding: 12px 40px;
            border-radius: 50px;
            font-size: 2rem;
            font-weight: bold;
            color: #FF6B35;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            z-index: 10;
            display: none;
        }

        .lives-display {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 8px;
            z-index: 10;
            display: none;
        }

        .life {
            font-size: 2.5rem;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
            transition: transform 0.3s;
        }

        .life.lost {
            transform: scale(0) rotate(180deg);
            opacity: 0;
        }

        .final-score {
            font-size: 4rem;
            color: #FF6B35;
            font-weight: bold;
            margin: 15px 0;
        }

        .high-score {
            color: #4ECDC4;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        .combo-display {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.5rem;
            font-weight: bold;
            color: #FFD93D;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.2);
            z-index: 10;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
        }

        .combo-display.show {
            opacity: 1;
            transform: translateX(-50%) scale(1.2);
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            .start-screen, .game-over-screen { padding: 35px 30px; }
            .btn { padding: 15px 40px; font-size: 1.2rem; }
            .score-display { font-size: 1.5rem; padding: 10px 30px; }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div class="score-display" id="scoreDisplay">Score: 0</div>
    <div class="lives-display" id="livesDisplay">
        <div class="life">❤️</div>
        <div class="life">❤️</div>
        <div class="life">❤️</div>
    </div>
    <div class="combo-display" id="comboDisplay">Combo x2!</div>

    <div class="ui-overlay active" id="uiOverlay">
        <div class="start-screen" id="startScreen">
            <h1>🍎 Fruit Catcher 🍌</h1>
            <div class="subtitle">Catch the falling fruits!</div>
            <button class="btn" id="startBtn">Play!</button>
            <div class="instructions">
                <p>Move basket with <kbd>←</kbd> <kbd>→</kbd> or Mouse/Touch</p>
                <p>Don't let fruits fall! ❤️❤️❤️</p>
            </div>
        </div>
        <div class="game-over-screen" id="gameOverScreen" style="display: none;">
            <h1>Game Over!</h1>
            <div class="final-score" id="finalScore">0</div>
            <div class="high-score" id="highScore">Best: 0</div>
            <button class="btn" id="restartBtn">Play Again!</button>
        </div>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const scoreDisplay = document.getElementById('scoreDisplay');
            const livesDisplay = document.getElementById('livesDisplay');
            const comboDisplay = document.getElementById('comboDisplay');
            const uiOverlay = document.getElementById('uiOverlay');
            const startScreen = document.getElementById('startScreen');
            const gameOverScreen = document.getElementById('gameOverScreen');
            const startBtn = document.getElementById('startBtn');
            const restartBtn = document.getElementById('restartBtn');
            const finalScoreEl = document.getElementById('finalScore');
            const highScoreEl = document.getElementById('highScore');

            let W, H;
            function resize() {
                W = canvas.width = window.innerWidth;
                H = canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', resize);

            // Audio context for sound effects
            let audioCtx = null;
            function getAudioCtx() {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                return audioCtx;
            }

            function playSound(type) {
                try {
                    const ctx = getAudioCtx();
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);

                    if (type === 'catch') {
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(523, ctx.currentTime);
                        osc.frequency.exponentialRampToValueAtTime(784, ctx.currentTime + 0.1);
                        gain.gain.setValueAtTime(0.3, ctx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
                        osc.start(ctx.currentTime);
                        osc.stop(ctx.currentTime + 0.15);
                    } else if (type === 'miss') {
                        osc.type = 'sawtooth';
                        osc.frequency.setValueAtTime(200, ctx.currentTime);
                        osc.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.3);
                        gain.gain.setValueAtTime(0.2, ctx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                        osc.start(ctx.currentTime);
                        osc.stop(ctx.currentTime + 0.3);
                    } else if (type === 'gameover') {
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(400, ctx.currentTime);
                        osc.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.5);
                        gain.gain.setValueAtTime(0.3, ctx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.6);
                        osc.start(ctx.currentTime);
                        osc.stop(ctx.currentTime + 0.6);
                    }
                } catch(e) {}
            }

            // Game state
            let gameState = 'menu'; // menu, playing, gameover
            let score = 0;
            let lives = 3;
            let combo = 0;
            let comboTimer = 0;
            let highScore = parseInt(localStorage.getItem('fruitCatcherHighScore') || '0');
            let difficulty = 1;
            let gameTime = 0;
            let spawnTimer = 0;
            let baseSpawnRate = 120;

            // Basket
            const basket = {
                x: W / 2,
                y: H - 80,
                width: 120,
                height: 50,
                targetX: W / 2,
                velX: 0,
                tilt: 0
            };

            // Input
            let keys = {};
            let mouseX = W / 2;
            let useMouse = false;

            window.addEventListener('keydown', e => {
                keys[e.key] = true;
                if (['ArrowLeft', 'ArrowRight', ' '].includes(e.key)) e.preventDefault();
            });
            window.addEventListener('keyup', e => keys[e.key] = false);

            window.addEventListener('mousemove', e => {
                mouseX = e.clientX;
                useMouse = true;
            });
            window.addEventListener('touchmove', e => {
                mouseX = e.touches[0].clientX;
                useMouse = true;
                e.preventDefault();
            }, { passive: false });
            window.addEventListener('touchstart', e => {
                mouseX = e.touches[0].clientX;
                useMouse = true;
            }, { passive: true });

            // Fruit types
            const fruitTypes = [
                { emoji: '🍎', color: '#FF6B6B', score: 10 },
                { emoji: '🍌', color: '#FFE66D', score: 15 },
                { emoji: '🍊', color: '#FF9F43', score: 10 },
                { emoji: '🍇', color: '#A29BFE', score: 20 },
                { emoji: '🍓', color: '#FF4757', score: 15 },
                { emoji: '🍑', color: '#FF9FF3', score: 20 },
                { emoji: '🍉', color: '#FF6B81', score: 25 },
                { emoji: '🥝', color: '#7BED9F', score: 15 },
                { emoji: '🍐', color: '#C7E76C', score: 10 },
                { emoji: '🫐', color: '#74B9FF', score: 25 }
            ];

            let fruits = [];
            let particles = [];
            let clouds = [];
            let floatingTexts = [];

            // Initialize clouds
            for (let i = 0; i < 6; i++) {
                clouds.push({
                    x: Math.random() * W,
                    y: 30 + Math.random() * 120,
                    size: 40 + Math.random() * 40,
                    speed: 0.2 + Math.random() * 0.4
                });
            }

            function spawnFruit() {
                const type = fruitTypes[Math.floor(Math.random() * fruitTypes.length)];
                const size = 35 + Math.random() * 15 + difficulty * 2;
                fruits.push({
                    x: 50 + Math.random() * (W - 100),
                    y: -size - 10,
                    size: Math.min(size, 70),
                    type: type,
                    rotation: Math.random() * Math.PI * 2,
                    rotSpeed: (Math.random() - 0.5) * 0.08,
                    speed: 2 + Math.random() * 2 + difficulty * 0.5,
                    wobble: Math.random() * Math.PI * 2,
                    wobbleSpeed: 2 + Math.random() * 2
                });
            }

            function createParticles(x, y, color) {
                for (let i = 0; i < 12; i++) {
                    const angle = (Math.PI * 2 / 12) * i + Math.random() * 0.5;
                    const speed = 2 + Math.random() * 4;
                    particles.push({
                        x: x,
                        y: y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed - 2,
                        size: 4 + Math.random() * 6,
                        color: color,
                        life: 1,
                        decay: 0.02 + Math.random() * 0.02
                    });
                }
            }

            function createFloatingText(x, y, text, color) {
                floatingTexts.push({
                    x: x,
                    y: y,
                    text: text,
                    color: color,
                    life: 1,
                    vy: -2
                });
            }

            function resetGame() {
                score = 0;
                lives = 3;
                combo = 0;
                comboTimer = 0;
                difficulty = 1;
                gameTime = 0;
                spawnTimer = 0;
                fruits = [];
                particles = [];
                floatingTexts = [];
                basket.x = W / 2;
                basket.targetX = W / 2;
                basket.velX = 0;
                basket.tilt = 0;

                scoreDisplay.textContent = 'Score: 0';
                updateLivesDisplay();
                comboDisplay.classList.remove('show');

                scoreDisplay.style.display = 'block';
                livesDisplay.style.display = 'flex';
            }

            function updateLivesDisplay() {
                const lifeEls = livesDisplay.querySelectorAll('.life');
                lifeEls.forEach((el, i) => {
                    if (i < lives) {
                        el.classList.remove('lost');
                        el.style.opacity = '1';
                        el.style.transform = 'scale(1)';
                    } else {
                        el.classList.add('lost');
                    }
                });
            }

            function startGame() {
                resetGame();
                gameState = 'playing';
                startScreen.style.display = 'none';
                gameOverScreen.style.display = 'none';
                uiOverlay.classList.remove('active');
                getAudioCtx().resume().catch(() => {});
            }

            function endGame() {
                gameState = 'gameover';
                playSound('gameover');
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('fruitCatcherHighScore', highScore.toString());
                }
                finalScoreEl.textContent = score;
                highScoreEl.textContent = 'Best: ' + highScore;
                gameOverScreen.style.display = 'block';
                uiOverlay.classList.add('active');
                scoreDisplay.style.display = 'none';
                livesDisplay.style.display = 'none';
                comboDisplay.classList.remove('show');
            }

            startBtn.addEventListener('click', startGame);
            restartBtn.addEventListener('click', startGame);

            // Click on canvas to start if on menu
            canvas.addEventListener('click', () => {
                if (gameState === 'menu') startGame();
            });

            function update() {
                if (gameState !== 'playing') return;

                gameTime++;

                // Increase difficulty over time
                difficulty = 1 + Math.floor(gameTime / 600) * 0.5;

                // Basket movement
                if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
                    basket.targetX -= 12;
                    useMouse = false;
                }
                if (keys['ArrowRight'] || keys['d'] || keys['D']) {
                    basket.targetX += 12;
                    useMouse = false;
                }

                if (useMouse) {
                    basket.targetX = mouseX;
                }

                // Clamp basket position
                basket.targetX = Math.max(basket.width/2, Math.min(W - basket.width/2, basket.targetX));

                // Smooth movement
                const dx = basket.targetX - basket.x;
                basket.x += dx * 0.25;
                basket.tilt = dx * 0.003;
                basket.tilt = Math.max(-0.3, Math.min(0.3, basket.tilt));

                // Spawn fruits
                spawnTimer++;
                const spawnRate = Math.max(30, baseSpawnRate - difficulty * 10);
                if (spawnTimer >= spawnRate) {
                    spawnTimer = 0;
                    spawnFruit();
                    // Occasionally spawn double
                    if (Math.random() < difficulty * 0.1) {
                        setTimeout(spawnFruit, 300);
                    }
                }

                // Update fruits
                for (let i = fruits.length - 1; i >= 0; i--) {
                    const f = fruits[i];
                    f.y += f.speed;
                    f.rotation += f.rotSpeed;
                    f.wobble += f.wobbleSpeed * 0.05;
                    f.x += Math.sin(f.wobble) * 0.5;

                    // Check collision with basket
                    const basketTop = basket.y - basket.height/2;
                    const basketBottom = basket.y + basket.height/2;
                    const basketLeft = basket.x - basket.width/2 + 10;
                    const basketRight = basket.x + basket.width/2 - 10;

                    if (f.y + f.size/2 > basketTop && f.y - f.size/2 < basketBottom &&
                        f.x > basketLeft && f.x < basketRight) {
                        // Caught!
                        score += f.type.score * (combo > 0 ? Math.min(1 + combo * 0.5, 3) : 1);
                        score = Math.floor(score);
                        scoreDisplay.textContent = 'Score: ' + score;

                        combo++;
                        comboTimer = 90;
                        if (combo >= 2) {
                            comboDisplay.textContent = `Combo x${Math.min(1 + combo * 0.5, 3).toFixed(1)}!`;
                            comboDisplay.classList.add('show');
                        }

                        createParticles(f.x, f.y, f.type.color);
                        createFloatingText(f.x, f.y - 20, '+' + f.type.score, f.type.color);
                        playSound('catch');

                        fruits.splice(i, 1);
                        continue;
                    }

                    // Missed
                    if (f.y - f.size > H) {
                        fruits.splice(i, 1);
                        lives--;
                        combo = 0;
                        comboTimer = 0;
                        comboDisplay.classList.remove('show');
                        updateLivesDisplay();
                        playSound('miss');

                        // Screen shake effect
                        canvas.style.transform = 'translate(5px, 5px)';
                        setTimeout(() => canvas.style.transform = '', 100);

                        if (lives <= 0) {
                            endGame();
                            return;
                        }
                    }
                }

                // Update combo timer
                if (comboTimer > 0) {
                    comboTimer--;
                    if (comboTimer <= 0) {
                        combo = 0;
                        comboDisplay.classList.remove('show');
                    }
                }

                // Update particles
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.15;
                    p.life -= p.decay;
                    if (p.life <= 0) particles.splice(i, 1);
                }

                // Update floating texts
                for (let i = floatingTexts.length - 1; i >= 0; i--) {
                    const ft = floatingTexts[i];
                    ft.y += ft.vy;
                    ft.life -= 0.02;
                    if (ft.life <= 0) floatingTexts.splice(i, 1);
                }

                // Update clouds
                clouds.forEach(c => {
                    c.x += c.speed;
                    if (c.x - c.size > W) c.x = -c.size;
                });
            }

            function drawRoundedRect(ctx, x, y, w, h, r) {
                ctx.beginPath();
                ctx.moveTo(x + r, y);
                ctx.lineTo(x + w - r, y);
                ctx.quadraticCurveTo(x + w, y, x + w, y + r);
                ctx.lineTo(x + w, y + h - r);
                ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                ctx.lineTo(x + r, y + h);
                ctx.quadraticCurveTo(x, y + h, x, y + h - r);
                ctx.lineTo(x, y + r);
                ctx.quadraticCurveTo(x, y, x + r, y);
                ctx.closePath();
            }

            function drawBasket() {
                const x = basket.x;
                const y = basket.y;
                const w = basket.width;
                const h = basket.height;

                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(basket.tilt);

                // Basket shadow
                ctx.fillStyle = 'rgba(0,0,0,0.15)';
                ctx.beginPath();
                ctx.ellipse(5, h/2 + 5, w/2, 12, 0, 0, Math.PI * 2);
                ctx.fill();

                // Basket body
                const grad = ctx.createLinearGradient(-w/2, -h/2, w/2, h/2);
                grad.addColorStop(0, '#D4A373');
                grad.addColorStop(0.5, '#E9C46A');
                grad.addColorStop(1, '#D4A373');
                ctx.fillStyle = grad;
                drawRoundedRect(ctx, -w/2, -h/2, w, h, 15);
                ctx.fill();

                // Basket weave pattern
                ctx.strokeStyle = '#B08968';
                ctx.lineWidth = 2;
                for (let i = -w/2 + 15; i < w/2; i += 20) {
                    ctx.beginPath();
                    ctx.moveTo(i, -h/2 + 5);
                    ctx.lineTo(i + 10, h/2 - 5);
                    ctx.stroke();
                }

                // Basket rim
                ctx.fillStyle = '#B08968';
                drawRoundedRect(ctx, -w/2 - 5, -h/2 - 5, w + 10, 12, 6);
                ctx.fill();

                ctx.restore();
            }

            function drawCloud(ctx, x, y, size) {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.arc(x + size * 0.7, y - size * 0.3, size * 0.8, 0, Math.PI * 2);
                ctx.arc(x + size * 1.3, y, size * 0.9, 0, Math.PI * 2);
                ctx.arc(x + size * 0.6, y + size * 0.2, size * 0.7, 0, Math.PI * 2);
                ctx.fill();
            }

            function draw() {
                // Clear
                ctx.clearRect(0, 0, W, H);

                // Background - already CSS gradient, but add some grass at bottom
                const grassGrad = ctx.createLinearGradient(0, H - 100, 0, H);
                grassGrad.addColorStop(0, '#A8E6CF');
                grassGrad.addColorStop(1, '#7FCDBB');
                ctx.fillStyle = grassGrad;
                ctx.fillRect(0, H - 80, W, 80);

                // Draw clouds
                clouds.forEach(c => drawCloud(ctx, c.x, c.y, c.size));

                if (gameState === 'menu') {
                    // Draw some idle fruits falling in background
                    if (Math.random() < 0.02) {
                        spawnFruit();
                    }
                    fruits.forEach(f => {
                        f.y += f.speed * 0.5;
                        f.rotation += f.rotSpeed;
                        if (f.y > H + 50) f.y = -50;
                    });
                }

                // Draw fruits
                fruits.forEach(f => {
                    ctx.save();
                    ctx.translate(f.x, f.y);
                    ctx.rotate(f.rotation);

                    // Fruit shadow
                    ctx.fillStyle = 'rgba(0,0,0,0.1)';
                    ctx.beginPath();
                    ctx.ellipse(3, f.size/2 + 3, f.size/2.5, f.size/5, 0, 0, Math.PI * 2);
                    ctx.fill();

                    // Fruit body (circle with color)
                    ctx.fillStyle = f.type.color;
                    ctx.beginPath();
                    ctx.arc(0, 0, f.size/2, 0, Math.PI * 2);
                    ctx.fill();

                    // Highlight
                    ctx.fillStyle = 'rgba(255,255,255,0.3)';
                    ctx.beginPath();
                    ctx.arc(-f.size/6, -f.size/6, f.size/5, 0, Math.PI * 2);
                    ctx.fill();

                    // Draw emoji
                    ctx.font = `${f.size}px serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(f.type.emoji, 0, 2);

                    ctx.restore();
                });

                // Draw particles
                particles.forEach(p => {
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                    ctx.fill();
                });
                ctx.globalAlpha = 1;

                // Draw floating texts
                floatingTexts.forEach(ft => {
                    ctx.globalAlpha = ft.life;
                    ctx.font = 'bold 24px sans-serif';
                    ctx.fillStyle = ft.color;
                    ctx.strokeStyle = 'white';
                    ctx.lineWidth = 3;
                    ctx.textAlign = 'center';
                    ctx.strokeText(ft.text, ft.x, ft.y);
                    ctx.fillText(ft.text, ft.x, ft.y);
                });
                ctx.globalAlpha = 1;

                // Draw basket
                if (gameState === 'playing' || gameState === 'gameover') {
                    drawBasket();
                }

                // Grass tufts decoration
                ctx.strokeStyle = '#55A38B';
                ctx.lineWidth = 3;
                for (let i = 0; i < W; i += 40) {
                    const h = 10 + Math.sin(i * 0.1 + gameTime * 0.02) * 5;
                    ctx.beginPath();
                    ctx.moveTo(i, H - 80);
                    ctx.quadraticCurveTo(i + 8, H - 80 - h - 5, i + 12, H - 80 - h);
                    ctx.stroke();
                }
            }

            function loop() {
                update();
                draw();
                requestAnimationFrame(loop);
            }

            // Start loop
            loop();

        })();
    </script>
</body>
</html>
