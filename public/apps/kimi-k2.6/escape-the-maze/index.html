<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Escape the Maze</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  body {
    background: #0f172a;
    color: #f1f5f9;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    touch-action: none;
  }
  #game-container {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  #header {
    position: absolute;
    top: 10px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    gap: 32px;
    z-index: 10;
    pointer-events: none;
  }
  .stat-box {
    background: rgba(15, 23, 42, 0.85);
    border: 1px solid #334155;
    border-radius: 12px;
    padding: 8px 18px;
    text-align: center;
    backdrop-filter: blur(6px);
    min-width: 100px;
  }
  .stat-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #94a3b8;
    margin-bottom: 2px;
  }
  .stat-value {
    font-size: 22px;
    font-weight: 700;
    color: #38bdf8;
    font-variant-numeric: tabular-nums;
  }
  #steps-display { color: #a78bfa; }
  #best-display { color: #34d399; }

  canvas {
    border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px #1e293b;
    background: #020617;
  }

  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(2, 6, 23, 0.92);
    z-index: 20;
    border-radius: 12px;
    transition: opacity 0.4s ease;
  }
  #overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }
  #overlay h1 {
    font-size: 48px;
    font-weight: 800;
    margin-bottom: 12px;
    background: linear-gradient(90deg, #38bdf8, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
  }
  #overlay p {
    color: #94a3b8;
    font-size: 16px;
    margin-bottom: 28px;
    max-width: 360px;
    text-align: center;
    line-height: 1.5;
  }
  #overlay .hint {
    font-size: 13px;
    color: #64748b;
    margin-bottom: 6px;
  }
  .btn {
    background: linear-gradient(135deg, #38bdf8, #2563eb);
    border: none;
    color: white;
    padding: 14px 36px;
    font-size: 17px;
    font-weight: 700;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(37, 99, 235, 0.35);
    transition: transform 0.15s, box-shadow 0.15s;
    pointer-events: auto;
  }
  .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(37, 99, 235, 0.45);
  }
  .btn:active {
    transform: translateY(0);
  }

  #victory-stats {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
  }
  .victory-row {
    display: flex;
    gap: 20px;
  }
  .victory-card {
    background: rgba(30, 41, 59, 0.7);
    border: 1px solid #334155;
    border-radius: 10px;
    padding: 12px 20px;
    min-width: 120px;
    text-align: center;
  }
  .victory-card .val {
    font-size: 26px;
    font-weight: 800;
    color: #f8fafc;
  }
  .victory-card .lbl {
    font-size: 11px;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 2px;
  }
  #bonus-msg {
    font-size: 18px;
    font-weight: 700;
    color: #fbbf24;
    margin-bottom: 8px;
    display: none;
  }

  #d-pad {
    position: absolute;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    display: none;
    grid-template-columns: 60px 60px 60px;
    grid-template-rows: 60px 60px;
    gap: 4px;
    z-index: 15;
  }
  .dpad-btn {
    width: 60px;
    height: 60px;
    background: rgba(30, 41, 59, 0.8);
    border: 1px solid #475569;
    border-radius: 10px;
    color: #e2e8f0;
    font-size: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }
  .dpad-btn:active { background: rgba(56, 189, 248, 0.25); }
  @media (max-width: 600px) {
    #header { gap: 12px; top: 6px; }
    .stat-box { padding: 6px 12px; min-width: 80px; }
    .stat-value { font-size: 18px; }
    #d-pad { display: grid; }
  }
</style>
</head>
<body>

<div id="game-container">
  <div id="header">
    <div class="stat-box">
      <div class="stat-label">Time</div>
      <div class="stat-value" id="time-display">0.0s</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Steps</div>
      <div class="stat-value" id="steps-display">0</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Best</div>
      <div class="stat-value" id="best-display">-</div>
    </div>
  </div>

  <canvas id="maze-canvas"></canvas>

  <div id="overlay">
    <h1 id="overlay-title">Escape the Maze</h1>
    <p id="overlay-desc">Navigate from start to finish as fast as you can.<br>Arrow keys or WASD to move.</p>
    <div id="victory-stats">
      <div id="bonus-msg">Perfect Path! +100 Bonus</div>
      <div class="victory-row">
        <div class="victory-card">
          <div class="val" id="victory-time">0.0s</div>
          <div class="lbl">Time</div>
        </div>
        <div class="victory-card">
          <div class="val" id="victory-steps">0</div>
          <div class="lbl">Steps</div>
        </div>
        <div class="victory-card">
          <div class="val" id="victory-score">0</div>
          <div class="lbl">Score</div>
        </div>
      </div>
    </div>
    <div class="hint" id="overlay-hint">Press Space or click below to start</div>
    <button class="btn" id="start-btn">Start Game</button>
  </div>

  <div id="d-pad">
    <div></div>
    <div class="dpad-btn" data-dir="up">&#9650;</div>
    <div></div>
    <div class="dpad-btn" data-dir="left">&#9664;</div>
    <div class="dpad-btn" data-dir="down">&#9660;</div>
    <div class="dpad-btn" data-dir="right">&#9654;</div>
  </div>
</div>

<script>
(function() {
  'use strict';

  // --- Configuration ---
  const COLS = 21;
  const ROWS = 15;
  const WALL_THICKNESS = 3;
  const PATH_WIDTH = 0.75; // fraction of cell
  const WALL_COLOR = '#1e3a8a';
  const PATH_COLOR = '#020617';
  const START_COLOR = '#34d399';
  const END_COLOR = '#f87171';
  const AVATAR_COLOR = '#38bdf8';
  const AVATAR_GLOW = 'rgba(56,189,248,0.35)';
  const TRAIL_COLOR = 'rgba(56,189,248,0.12)';
  const BEST_PATH_COLOR = 'rgba(251,191,36,0.08)';
  const CELL_SIZE_BASE = 40;

  // --- State ---
  let canvas, ctx;
  let cellSize, offsetX, offsetY;
  let maze = [];
  let player = { c: 0, r: 0 };
  let goal = { c: COLS - 1, r: ROWS - 1 };
  let startTime = 0;
  let elapsed = 0;
  let steps = 0;
  let running = false;
  let finished = false;
  let animId = null;
  let trail = [];
  let bestPath = [];
  let shortestLen = 0;
  let showBestPath = false;
  let highScore = parseInt(localStorage.getItem('maze_highscore') || '0', 10);

  // --- DOM refs ---
  const timeEl = document.getElementById('time-display');
  const stepsEl = document.getElementById('steps-display');
  const bestEl = document.getElementById('best-display');
  const overlay = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlay-title');
  const overlayDesc = document.getElementById('overlay-desc');
  const overlayHint = document.getElementById('overlay-hint');
  const startBtn = document.getElementById('start-btn');
  const victoryStats = document.getElementById('victory-stats');
  const bonusMsg = document.getElementById('bonus-msg');
  const vTime = document.getElementById('victory-time');
  const vSteps = document.getElementById('victory-steps');
  const vScore = document.getElementById('victory-score');

  if (highScore > 0) bestEl.textContent = highScore.toString();

  // --- Maze Generation (Recursive Backtracker) ---
  function generateMaze(cols, rows) {
    const grid = [];
    for (let r = 0; r < rows; r++) {
      grid[r] = [];
      for (let c = 0; c < cols; c++) {
        grid[r][c] = { c, r, walls: { top: true, right: true, bottom: true, left: true }, visited: false };
      }
    }
    const stack = [];
    const start = grid[0][0];
    start.visited = true;
    stack.push(start);

    while (stack.length) {
      const current = stack[stack.length - 1];
      const neighbors = [];
      const { c, r } = current;
      if (r > 0 && !grid[r - 1][c].visited) neighbors.push({ cell: grid[r - 1][c], dir: 'top' });
      if (c < cols - 1 && !grid[r][c + 1].visited) neighbors.push({ cell: grid[r][c + 1], dir: 'right' });
      if (r < rows - 1 && !grid[r + 1][c].visited) neighbors.push({ cell: grid[r + 1][c], dir: 'bottom' });
      if (c > 0 && !grid[r][c - 1].visited) neighbors.push({ cell: grid[r][c - 1], dir: 'left' });

      if (neighbors.length) {
        const pick = neighbors[Math.floor(Math.random() * neighbors.length)];
        const next = pick.cell;
        const dir = pick.dir;
        if (dir === 'top') { current.walls.top = false; next.walls.bottom = false; }
        else if (dir === 'right') { current.walls.right = false; next.walls.left = false; }
        else if (dir === 'bottom') { current.walls.bottom = false; next.walls.top = false; }
        else if (dir === 'left') { current.walls.left = false; next.walls.right = false; }
        next.visited = true;
        stack.push(next);
      } else {
        stack.pop();
      }
    }
    return grid;
  }

  // --- Shortest Path (BFS) ---
  function shortestPath(grid, start, end) {
    const queue = [{ c: start.c, r: start.r, path: [] }];
    const visited = new Set();
    visited.add(`${start.c},${start.r}`);
    while (queue.length) {
      const curr = queue.shift();
      const key = `${curr.c},${curr.r}`;
      const cell = grid[curr.r][curr.c];
      const newPath = curr.path.concat({ c: curr.c, r: curr.r });
      if (curr.c === end.c && curr.r === end.r) return newPath;

      if (!cell.walls.top) {
        const nxt = `${curr.c},${curr.r - 1}`;
        if (!visited.has(nxt)) { visited.add(nxt); queue.push({ c: curr.c, r: curr.r - 1, path: newPath }); }
      }
      if (!cell.walls.right) {
        const nxt = `${curr.c + 1},${curr.r}`;
        if (!visited.has(nxt)) { visited.add(nxt); queue.push({ c: curr.c + 1, r: curr.r, path: newPath }); }
      }
      if (!cell.walls.bottom) {
        const nxt = `${curr.c},${curr.r + 1}`;
        if (!visited.has(nxt)) { visited.add(nxt); queue.push({ c: curr.c, r: curr.r + 1, path: newPath }); }
      }
      if (!cell.walls.left) {
        const nxt = `${curr.c - 1},${curr.r}`;
        if (!visited.has(nxt)) { visited.add(nxt); queue.push({ c: curr.c - 1, r: curr.r, path: newPath }); }
      }
    }
    return [];
  }

  // --- Resize ---
  function resize() {
    canvas = document.getElementById('maze-canvas');
    ctx = canvas.getContext('2d');
    const maxW = window.innerWidth - 24;
    const maxH = window.innerHeight - 120;
    const pad = window.innerWidth <= 600 ? 12 : 24;
    const availableW = Math.min(maxW, 900);
    const availableH = Math.min(maxH, 640);
    cellSize = Math.min(Math.floor((availableW - pad * 2) / COLS), Math.floor((availableH - pad * 2) / ROWS), CELL_SIZE_BASE);
    const mazeW = cellSize * COLS;
    const mazeH = cellSize * ROWS;
    canvas.width = mazeW;
    canvas.height = mazeH;
    offsetX = 0;
    offsetY = 0;
    draw();
  }

  // --- Drawing ---
  function drawCell(cell) {
    const x = cell.c * cellSize + offsetX;
    const y = cell.r * cellSize + offsetY;
    const s = cellSize;
    const wt = Math.max(2, Math.floor(cellSize / 10));

    // subtle floor shading
    ctx.fillStyle = PATH_COLOR;
    ctx.fillRect(x + 1, y + 1, s - 2, s - 2);

    ctx.lineWidth = wt;
    ctx.lineCap = 'round';
    ctx.strokeStyle = WALL_COLOR;
    ctx.beginPath();
    if (cell.walls.top) { ctx.moveTo(x, y); ctx.lineTo(x + s, y); }
    if (cell.walls.right) { ctx.moveTo(x + s, y); ctx.lineTo(x + s, y + s); }
    if (cell.walls.bottom) { ctx.moveTo(x + s, y + s); ctx.lineTo(x, y + s); }
    if (cell.walls.left) { ctx.moveTo(x, y + s); ctx.lineTo(x, y); }
    ctx.stroke();
  }

  function drawBestPath() {
    if (!showBestPath || !bestPath.length) return;
    ctx.save();
    ctx.strokeStyle = BEST_PATH_COLOR;
    ctx.lineWidth = Math.max(2, cellSize * 0.18);
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    for (let i = 0; i < bestPath.length; i++) {
      const p = bestPath[i];
      const px = p.c * cellSize + cellSize / 2 + offsetX;
      const py = p.r * cellSize + cellSize / 2 + offsetY;
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.stroke();
    ctx.restore();
  }

  function drawTrail() {
    if (!trail.length) return;
    ctx.save();
    ctx.strokeStyle = TRAIL_COLOR;
    ctx.lineWidth = Math.max(1, cellSize * 0.12);
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    for (let i = 0; i < trail.length; i++) {
      const p = trail[i];
      const px = p.c * cellSize + cellSize / 2 + offsetX;
      const py = p.r * cellSize + cellSize / 2 + offsetY;
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.stroke();
    ctx.restore();
  }

  function drawGoal() {
    const x = goal.c * cellSize + cellSize / 2 + offsetX;
    const y = goal.r * cellSize + cellSize / 2 + offsetY;
    const r = cellSize * 0.28;

    // pulsing ring
    const pulse = 1 + Math.sin(Date.now() / 300) * 0.12;
    ctx.save();
    ctx.beginPath();
    ctx.arc(x, y, r * pulse, 0, Math.PI * 2);
    ctx.fillStyle = END_COLOR;
    ctx.globalAlpha = 0.25;
    ctx.fill();
    ctx.restore();

    ctx.save();
    ctx.beginPath();
    ctx.arc(x, y, r * 0.7, 0, Math.PI * 2);
    ctx.fillStyle = END_COLOR;
    ctx.shadowColor = END_COLOR;
    ctx.shadowBlur = 14;
    ctx.fill();
    ctx.restore();

    // inner icon
    ctx.save();
    ctx.fillStyle = '#7f1d1d';
    ctx.beginPath();
    ctx.arc(x, y, r * 0.35, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawPlayer() {
    const x = player.c * cellSize + cellSize / 2 + offsetX;
    const y = player.r * cellSize + cellSize / 2 + offsetY;
    const r = cellSize * 0.28;

    ctx.save();
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = AVATAR_COLOR;
    ctx.shadowColor = AVATAR_GLOW;
    ctx.shadowBlur = 18;
    ctx.fill();
    ctx.restore();

    // highlight
    ctx.save();
    ctx.beginPath();
    ctx.arc(x - r * 0.25, y - r * 0.25, r * 0.3, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.fill();
    ctx.restore();
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    // background
    ctx.fillStyle = PATH_COLOR;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        drawCell(maze[r][c]);
      }
    }

    drawBestPath();
    drawTrail();
    drawGoal();
    drawPlayer();
  }

  function loop() {
    if (running && !finished) {
      elapsed = (performance.now() - startTime) / 1000;
      timeEl.textContent = elapsed.toFixed(1) + 's';
    }
    draw();
    animId = requestAnimationFrame(loop);
  }

  // --- Movement ---
  function move(dir) {
    if (!running || finished) return;
    const cell = maze[player.r][player.c];
    let moved = false;
    if (dir === 'up' && !cell.walls.top) { player.r--; moved = true; }
    else if (dir === 'right' && !cell.walls.right) { player.c++; moved = true; }
    else if (dir === 'down' && !cell.walls.bottom) { player.r++; moved = true; }
    else if (dir === 'left' && !cell.walls.left) { player.c--; moved = true; }

    if (moved) {
      steps++;
      stepsEl.textContent = steps.toString();
      trail.push({ c: player.c, r: player.r });
      if (player.c === goal.c && player.r === goal.r) {
        finishGame();
      }
    }
  }

  function finishGame() {
    finished = true;
    running = false;
    const timeBonus = Math.max(0, Math.round(300 - elapsed * 3));
    const stepBonus = steps === shortestLen ? 100 : Math.max(0, Math.round(50 - (steps - shortestLen) * 2));
    const totalScore = timeBonus + stepBonus;
    if (totalScore > highScore) {
      highScore = totalScore;
      localStorage.setItem('maze_highscore', highScore.toString());
      bestEl.textContent = highScore.toString();
    }

    overlayTitle.textContent = 'Escaped!';
    overlayDesc.style.display = 'none';
    overlayHint.textContent = 'Press Space or click below to replay';
    startBtn.textContent = 'Replay';
    victoryStats.style.display = 'flex';
    vTime.textContent = elapsed.toFixed(2) + 's';
    vSteps.textContent = steps.toString();
    vScore.textContent = totalScore.toString();
    if (steps === shortestLen) {
      bonusMsg.style.display = 'block';
    } else {
      bonusMsg.style.display = 'none';
    }
    overlay.classList.remove('hidden');
    showBestPath = true;
  }

  // --- Game Lifecycle ---
  function initGame() {
    maze = generateMaze(COLS, ROWS);
    player = { c: 0, r: 0 };
    goal = { c: COLS - 1, r: ROWS - 1 };
    trail = [{ c: 0, r: 0 }];
    bestPath = shortestPath(maze, { c: 0, r: 0 }, goal);
    shortestLen = bestPath.length - 1; // edges count
    steps = 0;
    elapsed = 0;
    finished = false;
    running = false;
    showBestPath = false;
    timeEl.textContent = '0.0s';
    stepsEl.textContent = '0';
    overlay.classList.add('hidden');
    resize();
  }

  function startGame() {
    initGame();
    running = true;
    startTime = performance.now();
    overlay.classList.add('hidden');
  }

  // --- Input ---
  window.addEventListener('keydown', (e) => {
    if (e.key === ' ' || e.key === 'Enter') {
      e.preventDefault();
      if (!running && !finished) startGame();
      else if (finished) startGame();
      return;
    }
    const key = e.key;
    if (key === 'ArrowUp' || key === 'w' || key === 'W') { e.preventDefault(); move('up'); }
    else if (key === 'ArrowRight' || key === 'd' || key === 'D') { e.preventDefault(); move('right'); }
    else if (key === 'ArrowDown' || key === 's' || key === 'S') { e.preventDefault(); move('down'); }
    else if (key === 'ArrowLeft' || key === 'a' || key === 'A') { e.preventDefault(); move('left'); }
  });

  document.querySelectorAll('.dpad-btn').forEach(btn => {
    const fire = () => move(btn.dataset.dir);
    btn.addEventListener('touchstart', (e) => { e.preventDefault(); fire(); });
    btn.addEventListener('mousedown', (e) => { e.preventDefault(); fire(); });
  });

  startBtn.addEventListener('click', () => {
    startGame();
  });

  window.addEventListener('resize', () => {
    resize();
  });

  // --- Boot ---
  initGame();
  loop();
})();
</script>
</body>
</html>
