<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Fun Game - Jump to Survive!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        body {
            overflow: hidden;
            background: #2d2d3a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        #gameContainer {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 1200px;
            max-height: 800px;
            background: #87CEEB;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
        }

        #scoreBoard {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .score-box {
            background: rgba(255,255,255,0.9);
            border-radius: 16px;
            padding: 12px 24px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            text-align: center;
            min-width: 120px;
        }

        .score-label {
            font-size: 14px;
            color: #666;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .score-value {
            font-size: 32px;
            font-weight: 900;
            color: #ff6b35;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.1);
        }

        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.65);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: all;
            opacity: 0;
            transition: opacity 0.3s;
            visibility: hidden;
        }

        #gameOverScreen.active {
            opacity: 1;
            visibility: visible;
        }

        .game-over-title {
            font-size: 64px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 4px 20px rgba(255,0,0,0.5);
            margin-bottom: 10px;
            animation: bounceIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .game-over-subtitle {
            font-size: 24px;
            color: #ffcc00;
            margin-bottom: 30px;
            font-weight: 700;
        }

        .final-score {
            font-size: 48px;
            color: #fff;
            font-weight: 900;
            margin-bottom: 10px;
        }

        .high-score-display {
            font-size: 20px;
            color: #aaa;
            margin-bottom: 30px;
        }

        #retryBtn {
            background: #ff6b35;
            color: white;
            border: none;
            padding: 16px 48px;
            font-size: 24px;
            font-weight: 900;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 0 #d45527, 0 10px 20px rgba(0,0,0,0.3);
            transition: transform 0.1s, box-shadow 0.1s;
            pointer-events: all;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #retryBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 0 #d45527, 0 12px 25px rgba(0,0,0,0.3);
        }

        #retryBtn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #d45527, 0 4px 10px rgba(0,0,0,0.3);
        }

        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: all;
            z-index: 10;
        }

        .start-title {
            font-size: 72px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 4px 0 #ff6b35, 0 8px 20px rgba(0,0,0,0.3);
            margin-bottom: 10px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .start-subtitle {
            font-size: 20px;
            color: #ffcc00;
            margin-bottom: 40px;
            font-weight: 700;
            text-align: center;
            padding: 0 20px;
        }

        .controls-hint {
            font-size: 16px;
            color: rgba(255,255,255,0.8);
            margin-top: 20px;
        }

        #startBtn {
            background: #4ecdc4;
            color: white;
            border: none;
            padding: 18px 56px;
            font-size: 28px;
            font-weight: 900;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 0 #3ba99e, 0 10px 20px rgba(0,0,0,0.3);
            transition: transform 0.1s, box-shadow 0.1s;
            pointer-events: all;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        #startBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 0 #3ba99e, 0 12px 25px rgba(0,0,0,0.3);
        }

        #startBtn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #3ba99e, 0 4px 10px rgba(0,0,0,0.3);
        }

        @keyframes bounceIn {
            0% { transform: scale(0); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @media (max-width: 600px) {
            .start-title { font-size: 48px; }
            .game-over-title { font-size: 42px; }
            .score-value { font-size: 24px; }
            .score-box { padding: 8px 16px; min-width: 90px; }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="ui">
            <div id="scoreBoard">
                <div class="score-box">
                    <div class="score-label">Score</div>
                    <div class="score-value" id="score">0</div>
                </div>
                <div class="score-box">
                    <div class="score-label">Best</div>
                    <div class="score-value" id="highScore">0</div>
                </div>
            </div>
        </div>
        <div id="startScreen">
            <div class="start-title">FUN GAME</div>
            <div class="start-subtitle">Jump over silly obstacles!<br>Survive as long as you can!</div>
            <button id="startBtn">PLAY!</button>
            <div class="controls-hint">Click, Tap, or Press Space to Jump</div>
        </div>
        <div id="gameOverScreen">
            <div class="game-over-title">OUCH!</div>
            <div class="game-over-subtitle">You hit something silly!</div>
            <div class="final-score" id="finalScore">0</div>
            <div class="high-score-display" id="finalHighScore">Best: 0</div>
            <button id="retryBtn">TRY AGAIN</button>
        </div>
    </div>

    <script>
    (function() {
        // ============ AUDIO ENGINE ============
        class SoundEngine {
            constructor() {
                this.ctx = null;
                this.initialized = false;
            }

            init() {
                if (this.initialized) return;
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                this.initialized = true;
            }

            playTone(freq, duration, type, volume) {
                if (!this.initialized) return;
                type = type || 'square';
                volume = volume !== undefined ? volume : 0.3;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                gain.gain.setValueAtTime(volume, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + duration);
            }

            slideTone(startFreq, endFreq, duration, type, volume) {
                if (!this.initialized) return;
                type = type || 'square';
                volume = volume !== undefined ? volume : 0.3;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(startFreq, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(endFreq, this.ctx.currentTime + duration);
                gain.gain.setValueAtTime(volume, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + duration);
            }

            boing() {
                this.slideTone(200, 600, 0.15, 'sine', 0.4);
                var self = this;
                setTimeout(function() { self.slideTone(400, 200, 0.1, 'sine', 0.3); }, 100);
            }

            crash() {
                this.slideTone(400, 100, 0.3, 'sawtooth', 0.4);
                var self = this;
                setTimeout(function() { self.slideTone(300, 80, 0.4, 'square', 0.3); }, 100);
                setTimeout(function() { self.playTone(120, 0.5, 'sawtooth', 0.2); }, 250);
            }

            scoreMilestone() {
                this.playTone(523, 0.1, 'sine', 0.3);
                var self = this;
                setTimeout(function() { self.playTone(659, 0.1, 'sine', 0.3); }, 100);
                setTimeout(function() { self.playTone(784, 0.2, 'sine', 0.3); }, 200);
            }

            newHighScore() {
                var notes = [523, 659, 784, 1047, 784, 1047];
                var self = this;
                notes.forEach(function(n, i) {
                    setTimeout(function() { self.playTone(n, 0.15, 'sine', 0.25); }, i * 100);
                });
            }

            startGame() {
                this.playTone(440, 0.1, 'sine', 0.3);
                var self = this;
                setTimeout(function() { self.playTone(554, 0.1, 'sine', 0.3); }, 100);
                setTimeout(function() { self.playTone(659, 0.2, 'sine', 0.3); }, 200);
            }
        }

        var audio = new SoundEngine();

        // ============ GAME SETUP ============
        var canvas = document.getElementById('gameCanvas');
        var ctx = canvas.getContext('2d');
        var container = document.getElementById('gameContainer');

        var W, H;
        var scale = 1;

        function resize() {
            var rect = container.getBoundingClientRect();
            W = rect.width;
            H = rect.height;
            canvas.width = W;
            canvas.height = H;
            scale = W / 800;
        }

        window.addEventListener('resize', resize);
        resize();

        // ============ GAME STATE ============
        var gameState = 'start';
        var score = 0;
        var highScore = parseInt(localStorage.getItem('funGameHighScore')) || 0;
        var speed = 5;
        var baseSpeed = 5;
        var gameTime = 0;
        var lastTime = 0;
        var groundY = 0;

        document.getElementById('highScore').textContent = highScore;

        // ============ PLAYER ============
        var player = {
            x: 100,
            y: 0,
            width: 50,
            height: 60,
            vy: 0,
            jumping: false,
            grounded: true,
            jumpPower: -18,
            gravity: 0.8,
            rotation: 0,
            blinkTimer: 0,
            isBlinking: false,
            legAngle: 0,
            runFrame: 0,
            squash: 1,
            stretch: 1
        };

        // ============ OBSTACLES ============
        var obstacles = [];
        var obstacleTimer = 0;
        var obstacleInterval = 120;

        var obstacleTypes = [
            { type: 'box', width: 40, height: 40, color: '#ff6b6b', draw: drawSillyBox },
            { type: 'tall', width: 30, height: 70, color: '#4ecdc4', draw: drawSillyTall },
            { type: 'rolling', width: 45, height: 45, color: '#ffe66d', draw: drawSillyBall },
            { type: 'wide', width: 70, height: 35, color: '#a29bfe', draw: drawSillyWide },
            { type: 'spiky', width: 50, height: 50, color: '#fd79a8', draw: drawSillySpiky }
        ];

        // ============ BACKGROUND LAYERS ============
        var clouds = [];
        var hills = [];
        var trees = [];
        var flowers = [];
        var particles = [];

        function initBackground() {
            clouds = [];
            for (var i = 0; i < 8; i++) {
                clouds.push({
                    x: Math.random() * W,
                    y: Math.random() * H * 0.4,
                    size: 30 + Math.random() * 50,
                    speed: 0.3 + Math.random() * 0.5,
                    puffCount: 3 + Math.floor(Math.random() * 3)
                });
            }

            hills = [];
            for (var i = 0; i < 5; i++) {
                hills.push({
                    x: i * (W / 3),
                    height: 80 + Math.random() * 100,
                    width: 300 + Math.random() * 200,
                    color: i % 2 === 0 ? '#6bcb77' : '#4aa556',
                    parallax: 0.3
                });
            }

            trees = [];
            for (var i = 0; i < 10; i++) {
                trees.push({
                    x: Math.random() * W * 2,
                    y: 0,
                    size: 30 + Math.random() * 40,
                    parallax: 0.6,
                    type: Math.random() > 0.5 ? 'round' : 'pine',
                    wobble: Math.random() * Math.PI * 2
                });
            }

            flowers = [];
            for (var i = 0; i < 15; i++) {
                flowers.push({
                    x: Math.random() * W * 2,
                    color: ['#ff6b6b', '#ffe66d', '#ff9ff3', '#54a0ff'][Math.floor(Math.random() * 4)],
                    size: 5 + Math.random() * 8,
                    parallax: 1,
                    wobble: Math.random() * Math.PI * 2
                });
            }
        }

        initBackground();

        // ============ DRAWING FUNCTIONS ============
        function drawCloud(x, y, size, puffs) {
            ctx.fillStyle = 'rgba(255,255,255,0.9)';
            for (var i = 0; i < puffs; i++) {
                var px = x + (i - puffs/2) * size * 0.5;
                var py = y + Math.sin(i) * size * 0.15;
                var r = size * (0.6 + Math.random() * 0.2);
                ctx.beginPath();
                ctx.arc(px, py, r, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawHill(hill, offsetX) {
            var x = hill.x + offsetX;
            ctx.fillStyle = hill.color;
            ctx.beginPath();
            ctx.moveTo(x - hill.width/2, groundY);
            ctx.quadraticCurveTo(x, groundY - hill.height, x + hill.width/2, groundY);
            ctx.lineTo(x + hill.width/2, H);
            ctx.lineTo(x - hill.width/2, H);
            ctx.closePath();
            ctx.fill();
        }

        function drawTree(tree, offsetX) {
            var x = tree.x + offsetX;
            var y = groundY;
            var s = tree.size * scale;

            ctx.fillStyle = '#8b4513';
            ctx.fillRect(x - s*0.1, y - s, s*0.2, s);

            if (tree.type === 'round') {
                ctx.fillStyle = '#2d8a4e';
                ctx.beginPath();
                ctx.arc(x, y - s*1.2, s*0.7, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#3cb371';
                ctx.beginPath();
                ctx.arc(x - s*0.3, y - s*0.9, s*0.4, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(x + s*0.3, y - s*1.0, s*0.35, 0, Math.PI * 2);
                ctx.fill();
            } else {
                ctx.fillStyle = '#2d8a4e';
                ctx.beginPath();
                ctx.moveTo(x, y - s*1.8);
                ctx.lineTo(x - s*0.6, y - s*0.5);
                ctx.lineTo(x + s*0.6, y - s*0.5);
                ctx.closePath();
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(x, y - s*1.4);
                ctx.lineTo(x - s*0.5, y - s*0.3);
                ctx.lineTo(x + s*0.5, y - s*0.3);
                ctx.closePath();
                ctx.fill();
            }
        }

        function drawFlower(flower, offsetX) {
            var x = flower.x + offsetX;
            var y = groundY - 5;
            var s = flower.size * scale;

            ctx.strokeStyle = '#2d8a4e';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.quadraticCurveTo(x + Math.sin(flower.wobble) * 5, y - s * 1.5, x, y - s * 2);
            ctx.stroke();

            ctx.fillStyle = flower.color;
            for (var i = 0; i < 5; i++) {
                var angle = (i / 5) * Math.PI * 2 + flower.wobble * 0.1;
                ctx.beginPath();
                ctx.ellipse(
                    x + Math.cos(angle) * s * 0.6,
                    y - s * 2 + Math.sin(angle) * s * 0.6,
                    s * 0.4, s * 0.25, angle, 0, Math.PI * 2
                );
                ctx.fill();
            }

            ctx.fillStyle = '#ffe66d';
            ctx.beginPath();
            ctx.arc(x, y - s * 2, s * 0.3, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawGround() {
            ctx.fillStyle = '#e8d5b7';
            ctx.fillRect(0, groundY, W, H - groundY);

            ctx.fillStyle = '#6bcb77';
            ctx.fillRect(0, groundY - 8, W, 10);

            ctx.strokeStyle = '#4aa556';
            ctx.lineWidth = 2;
            for (var x = -((gameTime * speed) % 20); x < W; x += 15) {
                var bladeH = 5 + Math.sin(x * 0.5 + gameTime * 0.05) * 4;
                ctx.beginPath();
                ctx.moveTo(x, groundY - 8);
                ctx.lineTo(x + 3, groundY - 8 - bladeH);
                ctx.lineTo(x + 6, groundY - 8);
                ctx.stroke();
            }

            ctx.fillStyle = '#d4c4a8';
            for (var x = 0; x < W; x += 40) {
                for (var y = groundY + 20; y < H; y += 40) {
                    var dx = (x + y * 3) % 40;
                    var dy = (x * 2 + y) % 40;
                    ctx.beginPath();
                    ctx.arc(x + dx, y + dy, 2, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        function drawSillyBox(obs) {
            var x = obs.x;
            var y = obs.y;
            var w = obs.width;
            var h = obs.height;

            ctx.fillStyle = obs.color;
            ctx.fillRect(x, y, w, h);

            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            ctx.fillRect(x, y, w * 0.3, h);

            ctx.fillStyle = '#fff';
            ctx.fillRect(x + w*0.2, y + h*0.2, w*0.15, h*0.15);
            ctx.fillRect(x + w*0.55, y + h*0.2, w*0.15, h*0.15);

            ctx.fillStyle = '#000';
            ctx.fillRect(x + w*0.25, y + h*0.25, w*0.06, h*0.06);
            ctx.fillRect(x + w*0.6, y + h*0.25, w*0.06, h*0.06);

            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(x + w*0.45, y + h*0.55, w*0.15, 0.2, Math.PI - 0.2);
            ctx.stroke();
        }

        function drawSillyTall(obs) {
            var x = obs.x;
            var y = obs.y;
            var w = obs.width;
            var h = obs.height;

            ctx.fillStyle = obs.color;
            ctx.beginPath();
            ctx.moveTo(x + w*0.2, y);
            ctx.lineTo(x + w*0.8, y);
            ctx.quadraticCurveTo(x + w, y + h*0.5, x + w*0.5, y + h);
            ctx.quadraticCurveTo(x, y + h*0.5, x + w*0.2, y);
            ctx.fill();

            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(x + w*0.3, y + h*0.25, w*0.12, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x + w*0.6, y + h*0.25, w*0.12, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(x + w*0.3, y + h*0.27, w*0.05, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x + w*0.6, y + h*0.27, w*0.05, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.ellipse(x + w*0.45, y + h*0.45, w*0.1, w*0.15, 0, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawSillyBall(obs) {
            var x = obs.x + obs.width/2;
            var y = obs.y + obs.height/2;
            var r = obs.width/2;

            ctx.fillStyle = obs.color;
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.beginPath();
            ctx.arc(x - r*0.3, y - r*0.3, r*0.3, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.ellipse(x - r*0.25, y - r*0.15, r*0.2, r*0.25, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(x + r*0.25, y - r*0.15, r*0.2, r*0.25, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(x - r*0.25, y - r*0.15, r*0.08, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x + r*0.25, y - r*0.15, r*0.08, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(x, y + r*0.1, r*0.3, 0.1, Math.PI - 0.1);
            ctx.stroke();

            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(obs.rotation || 0);
            ctx.strokeStyle = 'rgba(0,0,0,0.1)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(-r*0.7, 0);
            ctx.lineTo(r*0.7, 0);
            ctx.stroke();
            ctx.restore();
        }

        function drawSillyWide(obs) {
            var x = obs.x;
            var y = obs.y;
            var w = obs.width;
            var h = obs.height;

            ctx.fillStyle = obs.color;
            ctx.beginPath();
            ctx.ellipse(x + w/2, y + h/2, w/2, h/2, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.ellipse(x + w*0.3, y + h*0.35, w*0.12, h*0.2, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(x + w*0.7, y + h*0.35, w*0.12, h*0.2, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.ellipse(x + w*0.3, y + h*0.38, w*0.05, h*0.1, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(x + w*0.7, y + h*0.38, w*0.05, h*0.1, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.ellipse(x + w*0.5, y + h*0.65, w*0.25, h*0.2, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.ellipse(x + w*0.5, y + h*0.75, w*0.15, h*0.1, 0, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawSillySpiky(obs) {
            var x = obs.x + obs.width/2;
            var y = obs.y + obs.height/2;
            var r = obs.width/2;

            ctx.fillStyle = obs.color;
            ctx.beginPath();
            for (var i = 0; i < 8; i++) {
                var angle = (i / 8) * Math.PI * 2 + (obs.rotation || 0);
                var spikeLen = r * 1.3;
                ctx.moveTo(x, y);
                ctx.lineTo(x + Math.cos(angle) * spikeLen, y + Math.sin(angle) * spikeLen);
                ctx.arc(x, y, r, angle + 0.1, angle + Math.PI * 2 / 8 - 0.1);
            }
            ctx.fill();

            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(x, y, r*0.5, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.moveTo(x - r*0.2, y - r*0.1);
            ctx.lineTo(x - r*0.05, y);
            ctx.lineTo(x - r*0.2, y + r*0.05);
            ctx.fill();

            ctx.beginPath();
            ctx.moveTo(x + r*0.2, y - r*0.1);
            ctx.lineTo(x + r*0.05, y);
            ctx.lineTo(x + r*0.2, y + r*0.05);
            ctx.fill();

            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(x - r*0.15, y + r*0.2);
            ctx.lineTo(x + r*0.15, y + r*0.2);
            ctx.stroke();
        }

        function drawPlayer() {
            var p = player;
            var cx = p.x + p.width/2;
            var cy = p.y + p.height/2;
            var s = scale;

            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(p.rotation);
            ctx.scale(p.squash * s, p.stretch * s);

            var w = p.width;
            var h = p.height;

            if (!p.grounded) {
                var shadowAlpha = 1 - (p.y - (groundY - 150)) / 200;
                ctx.fillStyle = 'rgba(0,0,0,' + Math.max(0, shadowAlpha * 0.2) + ')';
                ctx.beginPath();
                ctx.ellipse(0, groundY - cy, w*0.8, w*0.2, 0, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.fillStyle = '#ff6b35';
            ctx.beginPath();
            ctx.ellipse(0, 0, w/2, h/2, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = 'rgba(255,255,255,0.2)';
            ctx.beginPath();
            ctx.ellipse(-w*0.15, -h*0.2, w*0.25, h*0.3, -0.3, 0, Math.PI * 2);
            ctx.fill();

            if (p.isBlinking) {
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(-w*0.22, -h*0.1);
                ctx.lineTo(-w*0.08, -h*0.1);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(w*0.08, -h*0.1);
                ctx.lineTo(w*0.22, -h*0.1);
                ctx.stroke();
            } else {
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.ellipse(-w*0.15, -h*0.12, w*0.15, h*0.18, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(w*0.15, -h*0.12, w*0.15, h*0.18, 0, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#2d3436';
                ctx.beginPath();
                ctx.ellipse(-w*0.12, -h*0.08, w*0.06, h*0.1, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(w*0.18, -h*0.08, w*0.06, h*0.1, 0, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(-w*0.1, -h*0.15, w*0.03, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(w*0.2, -h*0.15, w*0.03, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            if (p.grounded) {
                ctx.beginPath();
                ctx.arc(0, h*0.1, w*0.18, 0.2, Math.PI - 0.2);
                ctx.stroke();
            } else {
                ctx.fillStyle = '#333';
                ctx.beginPath();
                ctx.ellipse(0, h*0.15, w*0.08, h*0.12, 0, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.strokeStyle = '#ff6b35';
            ctx.lineWidth = 8;
            ctx.lineCap = 'round';

            if (p.grounded) {
                var legOffset = Math.sin(p.runFrame) * 15;
                ctx.beginPath();
                ctx.moveTo(-w*0.2, h*0.35);
                ctx.lineTo(-w*0.2 + legOffset, h*0.5);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(w*0.2, h*0.35);
                ctx.lineTo(w*0.2 - legOffset, h*0.5);
                ctx.stroke();
            } else {
                ctx.beginPath();
                ctx.moveTo(-w*0.2, h*0.35);
                ctx.quadraticCurveTo(-w*0.3, h*0.5, -w*0.15, h*0.4);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(w*0.2, h*0.35);
                ctx.quadraticCurveTo(w*0.3, h*0.5, w*0.15, h*0.4);
                ctx.stroke();
            }

            ctx.strokeStyle = '#ff6b35';
            ctx.lineWidth = 7;
            ctx.lineCap = 'round';
            if (p.grounded) {
                var armOffset = Math.sin(p.runFrame + Math.PI) * 10;
                ctx.beginPath();
                ctx.moveTo(-w*0.4, 0);
                ctx.lineTo(-w*0.5 - armOffset, h*0.2);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(w*0.4, 0);
                ctx.lineTo(w*0.5 + armOffset, -h*0.1);
                ctx.stroke();
            } else {
                ctx.beginPath();
                ctx.moveTo(-w*0.4, 0);
                ctx.lineTo(-w*0.5, -h*0.3);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(w*0.4, 0);
                ctx.lineTo(w*0.5, -h*0.3);
                ctx.stroke();
            }

            ctx.restore();
        }

        function drawParticles() {
            for (var i = particles.length - 1; i >= 0; i--) {
                var p = particles[i];
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * scale, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        function spawnParticles(x, y, count, colors) {
            for (var i = 0; i < count; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 1) * 8,
                    size: 3 + Math.random() * 6,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    life: 1,
                    decay: 0.02 + Math.random() * 0.03
                });
            }
        }

        // ============ GAME LOGIC ============
        function resetGame() {
            player.y = groundY - player.height;
            player.vy = 0;
            player.jumping = false;
            player.grounded = true;
            player.rotation = 0;
            player.squash = 1;
            player.stretch = 1;

            obstacles = [];
            particles = [];
            score = 0;
            speed = baseSpeed;
            gameTime = 0;
            obstacleTimer = 0;
            obstacleInterval = 120;

            document.getElementById('score').textContent = '0';
            document.getElementById('gameOverScreen').classList.remove('active');
            document.getElementById('startScreen').style.display = 'none';

            gameState = 'playing';
            audio.startGame();
        }

        function gameOver() {
            gameState = 'gameover';
            audio.crash();

            spawnParticles(
                player.x + player.width/2,
                player.y + player.height/2,
                30,
                ['#ff6b35', '#ffcc00', '#ff6b6b', '#fff']
            );

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('funGameHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
                audio.newHighScore();
            }

            document.getElementById('finalScore').textContent = 'Score: ' + score;
            document.getElementById('finalHighScore').textContent = 'Best: ' + highScore;
            document.getElementById('gameOverScreen').classList.add('active');
        }

        function jump() {
            if (gameState !== 'playing') return;
            if (player.grounded) {
                player.vy = player.jumpPower * scale;
                player.jumping = true;
                player.grounded = false;
                player.squash = 0.7;
                player.stretch = 1.3;
                audio.boing();

                spawnParticles(
                    player.x + player.width/2,
                    groundY,
                    8,
                    ['#d4c4a8', '#e8d5b7', '#aaa']
                );
            }
        }

        function update(dt) {
            if (gameState !== 'playing') {
                updateParticles();
                return;
            }

            gameTime += 1;
            speed = baseSpeed + Math.floor(score / 50) * 0.5;

            player.vy += player.gravity * scale;
            player.y += player.vy;

            var groundLevel = groundY - player.height;
            if (player.y >= groundLevel) {
                player.y = groundLevel;
                player.vy = 0;
                player.jumping = false;
                if (!player.grounded) {
                    player.squash = 1.3;
                    player.stretch = 0.7;
                    player.grounded = true;
                    spawnParticles(
                        player.x + player.width/2,
                        groundY,
                        5,
                        ['#d4c4a8', '#e8d5b7']
                    );
                }
            }

            player.squash += (1 - player.squash) * 0.15;
            player.stretch += (1 - player.stretch) * 0.15;

            if (player.grounded) {
                player.runFrame += 0.3;
                player.rotation = Math.sin(player.runFrame) * 0.05;
            } else {
                player.rotation = Math.min(player.rotation + 0.05, 0.3);
            }

            player.blinkTimer -= dt;
            if (player.blinkTimer <= 0) {
                player.isBlinking = true;
                if (player.blinkTimer <= -0.15) {
                    player.isBlinking = false;
                    player.blinkTimer = 2 + Math.random() * 4;
                }
            }

            obstacleTimer++;
            if (obstacleTimer >= obstacleInterval) {
                obstacleTimer = 0;
                var type = obstacleTypes[Math.floor(Math.random() * obstacleTypes.length)];
                var obs = {
                    x: W + 50,
                    y: groundY - type.height,
                    width: type.width * scale,
                    height: type.height * scale,
                    color: type.color,
                    draw: type.draw,
                    rotation: 0,
                    passed: false,
                    type: type.type
                };
                obstacles.push(obs);
                obstacleInterval = Math.max(40, 100 - speed * 3);
            }

            for (var i = obstacles.length - 1; i >= 0; i--) {
                var obs = obstacles[i];
                obs.x -= speed;

                if (obs.type === 'rolling') {
                    obs.rotation += 0.1;
                } else if (obs.type === 'spiky') {
                    obs.rotation += 0.05;
                }

                if (!obs.passed && obs.x + obs.width < player.x) {
                    obs.passed = true;
                    score += 10;
                    document.getElementById('score').textContent = score;

                    if (score % 100 === 0) {
                        audio.scoreMilestone();
                        spawnParticles(player.x, player.y, 15, ['#ffcc00', '#ff6b6b', '#4ecdc4']);
                    }
                }

                if (obs.x + obs.width < -50) {
                    obstacles.splice(i, 1);
                    continue;
                }

                var px = player.x + 8 * scale;
                var py = player.y + 5 * scale;
                var pw = player.width - 16 * scale;
                var ph = player.height - 10 * scale;

                if (px < obs.x + obs.width &&
                    px + pw > obs.x &&
                    py < obs.y + obs.height &&
                    py + ph > obs.y) {
                    gameOver();
                }
            }

            updateParticles();
        }

        function updateParticles() {
            for (var i = particles.length - 1; i >= 0; i--) {
                var p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.3;
                p.life -= p.decay;

                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            }
        }

        // ============ RENDER ============
        function render() {
            groundY = H - 80 * scale;

            var skyGrad = ctx.createLinearGradient(0, 0, 0, groundY);
            skyGrad.addColorStop(0, '#87CEEB');
            skyGrad.addColorStop(1, '#b3e0ff');
            ctx.fillStyle = skyGrad;
            ctx.fillRect(0, 0, W, groundY);

            ctx.fillStyle = '#ffe66d';
            ctx.beginPath();
            ctx.arc(W - 80, 80, 40, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = 'rgba(255,230,109,0.3)';
            ctx.lineWidth = 3;
            for (var i = 0; i < 8; i++) {
                var angle = (i / 8) * Math.PI * 2 + gameTime * 0.01;
                ctx.beginPath();
                ctx.moveTo(W - 80 + Math.cos(angle) * 50, 80 + Math.sin(angle) * 50);
                ctx.lineTo(W - 80 + Math.cos(angle) * 70, 80 + Math.sin(angle) * 70);
                ctx.stroke();
            }

            for (var i = 0; i < clouds.length; i++) {
                var cloud = clouds[i];
                if (gameState === 'playing') {
                    cloud.x -= cloud.speed;
                    if (cloud.x < -100) cloud.x = W + 100;
                }
                drawCloud(cloud.x, cloud.y, cloud.size, cloud.puffCount);
            }

            for (var i = 0; i < hills.length; i++) {
                var hill = hills[i];
                var offsetX = -(gameTime * speed * hill.parallax) % (W/3);
                drawHill(hill, offsetX);
                drawHill(hill, offsetX + W/3 * 3);
            }

            for (var i = 0; i < trees.length; i++) {
                var tree = trees[i];
                if (gameState === 'playing') {
                    tree.x -= speed * tree.parallax;
                    tree.wobble += 0.02;
                    if (tree.x < -100) tree.x = W + 50 + Math.random() * 200;
                }
                drawTree(tree, 0);
            }

            drawGround();

            for (var i = 0; i < flowers.length; i++) {
                var flower = flowers[i];
                if (gameState === 'playing') {
                    flower.x -= speed;
                    flower.wobble += 0.05;
                    if (flower.x < -20) flower.x = W + Math.random() * 200;
                }
                drawFlower(flower, 0);
            }

            for (var i = 0; i < obstacles.length; i++) {
                obstacles[i].draw(obstacles[i]);
            }

            if (gameState !== 'gameover') {
                drawPlayer();
            }

            drawParticles();

            if (gameState === 'playing' && score > 0) {
                ctx.fillStyle = 'rgba(255,255,255,0.7)';
                ctx.font = 'bold 14px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('Speed: ' + speed.toFixed(1) + 'x', W/2, 30);
            }
        }

        // ============ GAME LOOP ============
        var accumulator = 0;
        var fixedDt = 1000 / 60;

        function gameLoop(timestamp) {
            if (!lastTime) lastTime = timestamp;
            var delta = timestamp - lastTime;
            lastTime = timestamp;

            accumulator += delta;
            while (accumulator >= fixedDt) {
                update(fixedDt / 1000);
                accumulator -= fixedDt;
            }

            render();
            requestAnimationFrame(gameLoop);
        }

        // ============ INPUT ============
        function handleInput(e) {
            if (e.type === 'keydown' && e.code !== 'Space' && e.code !== 'ArrowUp') return;
            if (e.type === 'keydown') e.preventDefault();

            if (gameState === 'start') {
                audio.init();
                resetGame();
            } else if (gameState === 'playing') {
                jump();
            } else if (gameState === 'gameover') {
                if (document.getElementById('gameOverScreen').classList.contains('active')) {
                    resetGame();
                }
            }
        }

        document.addEventListener('keydown', handleInput);
        document.addEventListener('touchstart', function(e) {
            e.preventDefault();
            handleInput(e);
        }, { passive: false });
        document.addEventListener('mousedown', handleInput);

        document.getElementById('startBtn').addEventListener('click', function(e) {
            e.stopPropagation();
            audio.init();
            resetGame();
        });

        document.getElementById('retryBtn').addEventListener('click', function(e) {
            e.stopPropagation();
            resetGame();
        });

        requestAnimationFrame(gameLoop);
    })();
    </script>
</body>
</html>
