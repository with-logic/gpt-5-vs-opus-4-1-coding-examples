    <style>
        * { font-family: 'Inter', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }

        /* Time Period Themes */
        .period-morning {
            background: linear-gradient(135deg, #fef9c3 0%, #fde047 30%, #fbbf24 100%);
            color: #854d0e;
        }
        .period-morning .card-bg { background: rgba(255, 255, 255, 0.45); }
        .period-morning .text-secondary { color: rgba(133, 77, 14, 0.7); }
        .period-morning .border-subtle { border-color: rgba(133, 77, 14, 0.15); }

        .period-afternoon {
            background: linear-gradient(135deg, #bae6fd 0%, #38bdf8 50%, #0ea5e9 100%);
            color: #0c4a6e;
        }
        .period-afternoon .card-bg { background: rgba(255, 255, 255, 0.4); }
        .period-afternoon .text-secondary { color: rgba(12, 74, 110, 0.7); }
        .period-afternoon .border-subtle { border-color: rgba(12, 74, 110, 0.15); }

        .period-evening {
            background: linear-gradient(135deg, #fed7aa 0%, #fb923c 40%, #e11d48 100%);
            color: #881337;
        }
        .period-evening .card-bg { background: rgba(255, 255, 255, 0.35); }
        .period-evening .text-secondary { color: rgba(136, 19, 55, 0.75); }
        .period-evening .border-subtle { border-color: rgba(136, 19, 55, 0.15); }

        .period-night {
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 40%, #1e3a8a 100%);
            color: #e0e7ff;
        }
        .period-night .card-bg { background: rgba(255, 255, 255, 0.08); }
        .period-night .text-secondary { color: rgba(224, 231, 255, 0.6); }
        .period-night .border-subtle { border-color: rgba(224, 231, 255, 0.1); }

        /* Animations */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
        }
        @keyframes pulse-glow {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .animate-float { animation: float 4s ease-in-out infinite; }
        .animate-slide-in { animation: slideIn 0.4s ease-out forwards; }
        .animate-spin-slow { animation: spin-slow 20s linear infinite; }

        .clock-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .clock-card:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }

        /* Analog Clock SVG */
        .clock-face { transform-origin: center; }
        .hand { transform-origin: center; transition: transform 0.1s cubic-bezier(0.4, 2, 0.6, 1); }
        .hand-hour { stroke-linecap: round; }
        .hand-minute { stroke-linecap: round; }
        .hand-second { stroke-linecap: round; }

        /* Toggle Switch */
        .toggle-track {
            transition: background-color 0.3s ease;
        }
        .toggle-thumb {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(128, 128, 128, 0.3); border-radius: 3px; }

        /* Search dropdown */
        .search-dropdown {
            max-height: 300px;
            overflow-y: auto;
            scrollbar-width: thin;
        }

        /* Background decoration */
        .bg-decoration {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            opacity: 0.03;
        }

        /* Period indicator pulse */
        .period-indicator {
            animation: pulse-glow 3s ease-in-out infinite;
        }
    </style>
</head>

        // ==================== UTILS ====================
        function getTimeInZone(timezone) {
            const now = new Date();
            return new Date(now.toLocaleString('en-US', { timeZone: timezone }));
        }

        function getLocalTimeInZone(timezone) {
            const now = new Date();
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            // Get timezone offset by comparing UTC timestamps
            const tzDate = new Date(now.toLocaleString('en-US', { timeZone: timezone }));
            const localDate = new Date(now.toLocaleString('en-US', { timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone }));
            const diffMs = tzDate.getTime() - localDate.getTime();
            const diffHours = diffMs / (1000 * 60 * 60);
            return diffHours;
        }

        function getPeriod(hour) {
            if (hour >= 5 && hour < 12) return { name: 'morning', icon: '☀️', label: 'Morning' };
            if (hour >= 12 && hour < 17) return { name: 'afternoon', icon: '☀️', label: 'Afternoon' };
            if (hour >= 17 && hour < 21) return { name: 'evening', icon: '🌅', label: 'Evening' };
            return { name: 'night', icon: '🌙', label: 'Night' };
        }

        function formatTime(date, use24Hour) {
            let hours = date.getHours();
            const minutes = String(date.getMinutes()).padStart(2, '0');
            const seconds = String(date.getSeconds()).padStart(2, '0');

            if (!use24Hour) {
                const ampm = hours >= 12 ? 'PM' : 'AM';
                hours = hours % 12 || 12;
                return { time: `${hours}:${minutes}`, seconds, ampm };
            }
            return { time: `${String(hours).padStart(2, '0')}:${minutes}`, seconds, ampm: null };
        }

        function formatDate(date) {
            return new Intl.DateTimeFormat('en-US', {
                weekday: 'long',
                month: 'short',
                day: 'numeric'
            }).format(date);
        }

        function formatOffset(hours) {
            const sign = hours >= 0 ? '+' : '';
            const whole = Math.floor(Math.abs(hours));
            const frac = Math.abs(hours) - whole;
            const mins = Math.round(frac * 60);
            if (mins === 0) return `${sign}${whole}h`;
            return `${sign}${whole}:${String(mins).padStart(2, '0')}`;
        }

        class WorldClockApp {
            constructor() {
                this.cities = this.loadCities();
                this.use24Hour = this.loadFormat();
                this.searchOpen = false;
                this.init();
            }

            loadCities() {
                try {
                    const stored = localStorage.getItem('worldclock_cities');
                    if (stored) return JSON.parse(stored);
                } catch (e) {}
                return [...DEFAULT_CITIES];
            }

            saveCities() {
                localStorage.setItem('worldclock_cities', JSON.stringify(this.cities));
            }

            loadFormat() {
                try {
                    return localStorage.getItem('worldclock_format') === '24';
                } catch (e) {
                    return false;
                }
            }

            saveFormat() {
                localStorage.setItem('worldclock_format', this.use24Hour ? '24' : '12');
            }

            init() {
                this.setupEventListeners();
                this.updateToggleUI();
                this.render();
                this.startTick();
            }

            setupEventListeners() {
                // Toggle format
                document.getElementById('format-toggle').addEventListener('click', () => {
                    this.use24Hour = !this.use24Hour;
                    this.saveFormat();
                    this.updateToggleUI();
                    this.render();
                });

                // Add city button
                document.getElementById('add-btn').addEventListener('click', () => this.openSearch());

                // Search modal
                document.getElementById('search-backdrop').addEventListener('click', () => this.closeSearch());

                // Search input
                const searchInput = document.getElementById('search-input');
                searchInput.addEventListener('input', (e) => this.handleSearch(e.target.value));
                searchInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') this.closeSearch();
                });
            }

            updateToggleUI() {
                const track = document.getElementById('toggle-track');
                const thumb = document.getElementById('toggle-thumb');
                if (this.use24Hour) {
                    track.classList.remove('bg-slate-600');
                    track.classList.add('bg-indigo-500');
                    thumb.style.transform = 'translateX(18px)';
                } else {
                    track.classList.add('bg-slate-600');
                    track.classList.remove('bg-indigo-500');
                    thumb.style.transform = 'translateX(0)';
                }
            }

            openSearch() {
                this.searchOpen = true;
                document.getElementById('search-modal').classList.remove('hidden');
                document.getElementById('search-input').value = '';
                document.getElementById('search-input').focus();
                document.getElementById('search-results').innerHTML = '';
                this.showPopularCities();
            }

            closeSearch() {
                this.searchOpen = false;
                document.getElementById('search-modal').classList.add('hidden');
            }

            showPopularCities() {
                const results = document.getElementById('search-results');
                const popular = ['New York', 'London', 'Tokyo', 'Paris', 'Sydney', 'Dubai', 'Singapore', 'Berlin', 'Rome', 'Hong Kong'];
                const cities = popular.map(name => CITIES_DB.find(c => c.name === name)).filter(Boolean);

                results.innerHTML = `
                    <div class="px-3 py-2 text-xs font-semibold text-slate-500 uppercase tracking-wider">Popular Cities</div>
                    ${cities.map(city => this.renderSearchResult(city)).join('')}
                `;
            }

            handleSearch(query) {
                const results = document.getElementById('search-results');
                if (!query.trim()) {
                    this.showPopularCities();
                    return;
                }

                const q = query.toLowerCase();
                const matches = CITIES_DB.filter(c =>
                    c.name.toLowerCase().includes(q) ||
                    c.country.toLowerCase().includes(q) ||
                    c.region.toLowerCase().includes(q)
                ).slice(0, 20);

                if (matches.length === 0) {
                    results.innerHTML = `<div class="px-4 py-6 text-center text-slate-500 text-sm">No cities found for "${query}"</div>`;
                    return;
                }

                results.innerHTML = matches.map(city => this.renderSearchResult(city)).join('');
            }

            renderSearchResult(city) {
                const alreadyAdded = this.cities.some(c => c.name === city.name && c.timezone === city.timezone);
                return `
                    <button class="w-full flex items-center justify-between px-3 py-2.5 rounded-lg hover:bg-slate-800/80 transition-colors text-left group ${alreadyAdded ? 'opacity-50 cursor-not-allowed' : ''}"
                        onclick="${alreadyAdded ? '' : `app.addCity('${city.name.replace(/'/g, "\\'")}', '${city.country.replace(/'/g, "\\'")}', '${city.timezone}')`}"
                        ${alreadyAdded ? 'disabled' : ''}>
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-lg bg-slate-800 flex items-center justify-center text-sm">${this.getFlag(city.country)}</div>
                            <div>
                                <div class="text-sm font-medium text-white">${city.name}</div>
                                <div class="text-xs text-slate-400">${city.country} · ${city.region}</div>
                            </div>
                        </div>
                        ${alreadyAdded
                            ? '<span class="text-xs text-slate-500 font-medium">Added</span>'

            addCity(name, country, timezone) {
                if (this.cities.some(c => c.name === name && c.timezone === timezone)) return;
                this.cities.push({ name, country, timezone });
                this.saveCities();
                this.closeSearch();
                this.render();
            }

            removeCity(index) {
                this.cities.splice(index, 1);
                this.saveCities();
                this.render();
            }

            getAnalogClockSVG(hour, minute, second, period) {
                const cx = 50, cy = 50, r = 42;
                const hourAngle = (hour % 12) * 30 + minute * 0.5;
                const minuteAngle = minute * 6 + second * 0.1;
                const secondAngle = second * 6;

                const handColor = period === 'night' ? '#e0e7ff' : '#1e293b';
                const tickColor = period === 'night' ? 'rgba(224, 231, 255, 0.3)' : 'rgba(30, 41, 59, 0.3)';

                let ticks = '';
                for (let i = 0; i < 12; i++) {
                    const a = i * 30 * Math.PI / 180;
                    const isMajor = i % 3 === 0;
                    const len = isMajor ? 6 : 3;
                    const width = isMajor ? 2 : 1;
                    const x1 = cx + (r - len) * Math.sin(a);
                    const y1 = cy - (r - len) * Math.cos(a);
                    const x2 = cx + r * Math.sin(a);
                    const y2 = cy - r * Math.cos(a);
                    ticks += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${tickColor}" stroke-width="${width}" stroke-linecap="round"/>`;
                }

                return `
                    <svg class="w-full h-full" viewBox="0 0 100 100">
                        <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${tickColor}" stroke-width="1"/>
                        ${ticks}
                        <line x1="${cx}" y1="${cy}" x2="${cx + 24 * Math.sin(hourAngle * Math.PI / 180)}" y2="${cy - 24 * Math.cos(hourAngle * Math.PI / 180)}"
                            stroke="${handColor}" stroke-width="3" stroke-linecap="round" class="hand hand-hour"/>
                        <line x1="${cx}" y1="${cy}" x2="${cx + 34 * Math.sin(minuteAngle * Math.PI / 180)}" y2="${cy - 34 * Math.cos(minuteAngle * Math.PI / 180)}"
                            stroke="${handColor}" stroke-width="2" stroke-linecap="round" class="hand hand-minute"/>
                        <line x1="${cx}" y1="${cy}" x2="${cx + 38 * Math.sin(secondAngle * Math.PI / 180)}" y2="${cy - 38 * Math.cos(secondAngle * Math.PI / 180)}"
                            stroke="#ef4444" stroke-width="1" stroke-linecap="round" class="hand hand-second"/>
                        <circle cx="${cx}" cy="${cy}" r="2" fill="#ef4444"/>
                    </svg>
                `;
            }

            render() {
                const grid = document.getElementById('clock-grid');
                const emptyState = document.getElementById('empty-state');

                if (this.cities.length === 0) {
                    grid.classList.add('hidden');
                    emptyState.classList.remove('hidden');
                    return;
                }

                grid.classList.remove('hidden');
                emptyState.classList.add('hidden');

                const now = new Date();

                grid.innerHTML = this.cities.map((city, index) => {
                    const cityTime = getTimeInZone(city.timezone);
                    const hour = cityTime.getHours();
                    const minute = cityTime.getMinutes();
                    const second = cityTime.getSeconds();
                    const period = getPeriod(hour);
                    const formatted = formatTime(cityTime, this.use24Hour);
                    const offset = getLocalTimeInZone(city.timezone);
                    const offsetStr = formatOffset(offset);
                    const isNextDay = cityTime.getDate() !== now.getDate();
                    const isPrevDay = cityTime.getDate() < now.getDate() ||
                        (cityTime.getMonth() !== now.getMonth() && cityTime.getDate() < now.getDate());
                    const dayIndicator = isNextDay ? '+1 day' : isPrevDay ? '-1 day' : 'Today';
                    const dateStr = formatDate(cityTime);

                    return `
                        <div class="clock-card period-${period.name} rounded-2xl overflow-hidden shadow-xl animate-slide-in relative group"
                             style="animation-delay: ${index * 50}ms">
                            <div class="card-bg p-5 h-full flex flex-col">
                                <div class="flex items-start justify-between mb-4">
                                    <div class="flex items-center gap-3">
                                        <div class="text-2xl">${this.getFlag(city.country)}</div>
                                        <div>
                                            <h3 class="font-bold text-lg leading-tight">${city.name}</h3>
                                            <p class="text-secondary text-xs font-medium">${city.country}</p>
                                        </div>
                                    </div>
                                    <div class="flex items-center gap-2">
                                        <div class="period-indicator text-xl animate-float" style="animation-delay: ${index * 0.5}s">${period.icon}</div>
                                        <button onclick="app.removeCity(${index})"
                                            class="opacity-0 group-hover:opacity-100 transition-opacity p-1.5 rounded-lg hover:bg-black/10 active:scale-90"
                                            title="Remove city">
                                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                                        </button>
                                    </div>
                                </div>

                                <div class="flex items-center gap-4 mb-4">
                                    <div class="w-20 h-20 flex-shrink-0">
                                        ${this.getAnalogClockSVG(hour, minute, second, period.name)}
                                    </div>
                                    <div class="flex-1">
                                        <div class="flex items-baseline gap-1">
                                            <span class="mono text-4xl font-semibold tracking-tight leading-none">${formatted.time}</span>
                                            <span class="mono text-lg font-medium opacity-70">${formatted.seconds}</span>
                                        </div>
                                        ${!this.use24Hour && formatted.ampm ? `<span class="text-sm font-medium opacity-60 ml-1">${formatted.ampm}</span>` : ''}
                                    </div>
                                </div>

                                <div class="mt-auto pt-3 border-t border-subtle flex items-center justify-between text-xs font-medium">
                                    <span class="text-secondary">${dateStr}</span>
                                    <div class="flex items-center gap-2">
                                        <span class="text-secondary">${dayIndicator}</span>
                                        <span class="px-2 py-0.5 rounded-full card-bg border border-subtle font-mono text-xs">${offsetStr}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            }

            startTick() {
                const tick = () => {
                    // Update header date
                    const now = new Date();
                    document.getElementById('header-date').textContent = now.toLocaleDateString('en-US', {
                        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
                    });

                    // Update each clock's time text without full re-render for performance
                    const cards = document.querySelectorAll('.clock-card');
                    this.cities.forEach((city, index) => {
                        const card = cards[index];
                        if (!card) return;

                        const cityTime = getTimeInZone(city.timezone);
                        const hour = cityTime.getHours();
                        const minute = cityTime.getMinutes();
                        const second = cityTime.getSeconds();
                        const formatted = formatTime(cityTime, this.use24Hour);

                        // Update digital time
                        const timeEl = card.querySelector('.mono.text-4xl');
                        if (timeEl) timeEl.textContent = formatted.time;

                        const secEl = card.querySelector('.mono.text-lg');
                        if (secEl) secEl.textContent = formatted.seconds;

                        const ampmEl = card.querySelector('.text-sm.font-medium.opacity-60');
                        if (ampmEl && !this.use24Hour) ampmEl.textContent = formatted.ampm || '';
                        else if (ampmEl && this.use24Hour) ampmEl.textContent = '';

                        // Update analog clock
                        const svg = card.querySelector('svg');
                        if (svg) {
                            const hourAngle = (hour % 12) * 30 + minute * 0.5;
                            const minuteAngle = minute * 6 + second * 0.1;
                            const secondAngle = second * 6;

                            const hands = svg.querySelectorAll('.hand');
                            if (hands[0]) hands[0].setAttribute('x2', 50 + 24 * Math.sin(hourAngle * Math.PI / 180));
                            if (hands[0]) hands[0].setAttribute('y2', 50 - 24 * Math.cos(hourAngle * Math.PI / 180));
                            if (hands[1]) hands[1].setAttribute('x2', 50 + 34 * Math.sin(minuteAngle * Math.PI / 180));
                            if (hands[1]) hands[1].setAttribute('y2', 50 - 34 * Math.cos(minuteAngle * Math.PI / 180));
                            if (hands[2]) hands[2].setAttribute('x2', 50 + 38 * Math.sin(secondAngle * Math.PI / 180));
                            if (hands[2]) hands[2].setAttribute('y2', 50 - 38 * Math.cos(secondAngle * Math.PI / 180));
                        }
                    });

                    requestAnimationFrame(tick);
                };
                requestAnimationFrame(tick);
            }
        }

        // ==================== INIT ====================
        const app = new WorldClockApp();
        window.app = app; // Expose for onclick handlers
    })();
    </script>
