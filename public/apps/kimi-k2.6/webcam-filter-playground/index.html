<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Webcam Filter Playground</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface-2: #1a1a25;
    --accent: #8b5cf6;
    --accent-2: #ec4899;
    --text: #e2e2e8;
    --text-muted: #6b6b7b;
    --border: #2a2a3a;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    height: 100%;
    overflow: hidden;
  }
  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    flex-shrink: 0;
    z-index: 10;
  }
  .logo {
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 18px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.5px;
  }
  .main {
    flex: 1;
    display: flex;
    overflow: hidden;
    position: relative;
  }
  .viewport {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    position: relative;
    padding: 24px;
  }
  .canvas-wrapper {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px var(--border);
    background: #000;
    max-width: 100%;
    max-height: 100%;
  }
  #outputCanvas {
    display: block;
    max-width: 100%;
    max-height: calc(100vh - 200px);
    border-radius: 16px;
  }
  .flash-overlay {
    position: absolute;
    inset: 0;
    background: white;
    opacity: 0;
    pointer-events: none;
    border-radius: 16px;
    transition: opacity 0.1s ease-out;
  }
  .flash-overlay.active {
    opacity: 0.8;
    transition: none;
  }
  .sidebar {
    width: 320px;
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    flex-shrink: 0;
  }
  .panel {
    padding: 20px;
    border-bottom: 1px solid var(--border);
  }
  .panel-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-muted);
    margin-bottom: 14px;
    font-weight: 600;
  }
  .filter-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .filter-btn {
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 8px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s ease;
    text-align: center;
    position: relative;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
  }
  .filter-btn:hover {
    border-color: var(--accent);
    background: #1f1f2e;
  }
  .filter-btn.active {
    border-color: var(--accent);
    background: linear-gradient(135deg, rgba(139,92,246,0.15), rgba(236,72,153,0.1));
    box-shadow: 0 0 20px rgba(139,92,246,0.15);
  }
  .filter-btn .icon {
    font-size: 18px;
    display: block;
    margin-bottom: 4px;
  }
  .controls {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .control-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .control-label {
    font-size: 12px;
    color: var(--text-muted);
    min-width: 70px;
  }
  input[type="range"] {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 4px;
    background: var(--surface-2);
    border-radius: 2px;
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    background: var(--accent);
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 0 10px rgba(139,92,246,0.4);
  }
  input[type="range"]::-moz-range-thumb {
    width: 14px;
    height: 14px;
    background: var(--accent);
    border-radius: 50%;
    cursor: pointer;
    border: none;
  }
  .value-badge {
    font-size: 11px;
    color: var(--accent);
    font-family: 'Space Mono', monospace;
    min-width: 32px;
    text-align: right;
  }
  .action-btns {
    display: flex;
    gap: 8px;
    margin-top: 4px;
  }
  .btn {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s ease;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-family: 'Inter', sans-serif;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: white;
    box-shadow: 0 4px 20px rgba(139,92,246,0.3);
  }
  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 24px rgba(139,92,246,0.4);
  }
  .btn-primary:active {
    transform: translateY(0);
  }
  .btn-secondary {
    background: var(--surface-2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover {
    background: #252536;
    border-color: #3a3a50;
  }
  .start-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    transition: opacity 0.5s ease, visibility 0.5s ease;
  }
  .start-screen.hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }
  .start-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 40px;
    text-align: center;
    max-width: 420px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .start-icon {
    font-size: 56px;
    margin-bottom: 20px;
    display: block;
  }
  .start-title {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .start-desc {
    color: var(--text-muted);
    font-size: 14px;
    line-height: 1.6;
    margin-bottom: 28px;
  }
  .start-btn {
    padding: 14px 32px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: white;
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(139,92,246,0.3);
    transition: all 0.2s ease;
    font-family: 'Inter', sans-serif;
  }
  .start-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(139,92,246,0.4);
  }
  .error-msg {
    color: #ef4444;
    font-size: 12px;
    margin-top: 12px;
    display: none;
  }
  .gallery-strip {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    z-index: 5;
    background: rgba(10,10,15,0.8);
    backdrop-filter: blur(12px);
    padding: 8px;
    border-radius: 12px;
    border: 1px solid var(--border);
    max-width: 90%;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .gallery-strip::-webkit-scrollbar { display: none; }
  .gallery-thumb {
    width: 56px;
    height: 56px;
    border-radius: 8px;
    object-fit: cover;
    cursor: pointer;
    border: 2px solid transparent;
    transition: all 0.2s ease;
    flex-shrink: 0;
  }
  .gallery-thumb:hover {
    border-color: var(--accent);
    transform: scale(1.05);
  }
  .gallery-thumb .remove {
    position: absolute;
    top: 2px;
    right: 2px;
    width: 16px;
    height: 16px;
    background: rgba(239,68,68,0.9);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: white;
    opacity: 0;
    transition: opacity 0.15s;
    cursor: pointer;
  }
  .thumb-wrap { position: relative; }
  .thumb-wrap:hover .remove { opacity: 1; }
  .recording-dot {
    width: 8px;
    height: 8px;
    background: #ef4444;
    border-radius: 50%;
    display: inline-block;
    margin-right: 6px;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .fps-counter {
    position: absolute;
    top: 12px;
    left: 12px;
    background: rgba(10,10,15,0.7);
    backdrop-filter: blur(4px);
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    color: var(--text-muted);
    border: 1px solid var(--border);
    z-index: 5;
  }
  .filter-badge {
    position: absolute;
    top: 12px;
    right: 12px;
    background: rgba(10,10,15,0.7);
    backdrop-filter: blur(4px);
    padding: 4px 12px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    border: 1px solid var(--border);
    z-index: 5;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .hidden-video {
    position: absolute;
    opacity: 0;
    pointer-events: none;
    width: 1px;
    height: 1px;
  }
  /* Scrollbar styling for sidebar */
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  @media (max-width: 768px) {
    .main { flex-direction: column; }
    .sidebar {
      width: 100%;
      border-left: none;
      border-top: 1px solid var(--border);
      max-height: 35vh;
    }
    .viewport { padding: 12px; }
  }
</style>
</head>
<body>

<div id="startScreen" class="start-screen">
  <div class="start-card">
    <span class="start-icon">📷</span>
    <div class="start-title">Webcam Filter Playground</div>
    <p class="start-desc">Apply stunning real-time filters to your webcam feed. Capture snapshots and save your creations instantly.</p>
    <button class="start-btn" id="startBtn">Enable Camera</button>
    <div class="error-msg" id="startError"></div>
  </div>
</div>

<div id="app" style="display:none;">
  <header>
    <div style="display:flex;align-items:center;gap:10px;">
      <span style="font-size:20px;">📷</span>
      <span class="logo">Filter Playground</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-muted);">
      <span class="recording-dot"></span>
      <span>Live</span>
    </div>
  </header>

  <div class="main">
    <div class="viewport">
      <div class="canvas-wrapper" id="canvasWrapper">
        <video id="video" class="hidden-video" autoplay playsinline muted></video>
        <canvas id="outputCanvas"></canvas>
        <div class="flash-overlay" id="flashOverlay"></div>
        <div class="fps-counter" id="fpsCounter">-- FPS</div>
        <div class="filter-badge" id="filterBadge">Normal</div>
      </div>
      <div class="gallery-strip" id="galleryStrip"></div>
    </div>

    <div class="sidebar">
      <div class="panel">
        <div class="panel-title">Filters</div>
        <div class="filter-grid" id="filterGrid"></div>
      </div>

      <div class="panel">
        <div class="panel-title">Adjustments</div>
        <div class="controls">
          <div class="control-row">
            <span class="control-label">Intensity</span>
            <input type="range" id="intensity" min="0" max="100" value="50">
            <span class="value-badge" id="intensityVal">50</span>
          </div>
          <div class="control-row">
            <span class="control-label">Pixel Size</span>
            <input type="range" id="pixelSize" min="2" max="40" value="12">
            <span class="value-badge" id="pixelSizeVal">12</span>
          </div>
          <div class="control-row">
            <span class="control-label">Speed</span>
            <input type="range" id="speed" min="0" max="100" value="30">
            <span class="value-badge" id="speedVal">30</span>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">Capture</div>
        <div class="action-btns">
          <button class="btn btn-primary" id="snapBtn">
            <span>📸</span> Snap
          </button>
          <button class="btn btn-secondary" id="saveBtn">
            <span>💾</span> Save
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  const video = document.getElementById('video');
  const canvas = document.getElementById('outputCanvas');
  const ctx = canvas.getContext('2d', { willReadFrequently: true });
  const startScreen = document.getElementById('startScreen');
  const app = document.getElementById('app');
  const startBtn = document.getElementById('startBtn');
  const startError = document.getElementById('startError');
  const flashOverlay = document.getElementById('flashOverlay');
  const fpsCounter = document.getElementById('fpsCounter');
  const filterBadge = document.getElementById('filterBadge');
  const galleryStrip = document.getElementById('galleryStrip');

  let stream = null;
  let animId = null;
  let lastTime = 0;
  let frameCount = 0;
  let fps = 0;
  let currentFilter = 'normal';
  let intensity = 0.5;
  let pixelSize = 12;
  let speed = 0.3;
  let time = 0;
  let snapshots = [];

  // Offscreen canvases for processing
  const tempCanvas = document.createElement('canvas');
  const tempCtx = tempCanvas.getContext('2d', { willReadFrequently: true });
  const smallCanvas = document.createElement('canvas');
  const smallCtx = smallCanvas.getContext('2d');

  const filters = [
    { id: 'normal', name: 'Normal', icon: '✨' },
    { id: 'mirror', name: 'Mirror', icon: '🪞' },
    { id: 'pixelate', name: 'Pixelate', icon: '👾' },
    { id: 'ascii', name: 'ASCII', icon: '⌨️' },
    { id: 'thermal', name: 'Thermal', icon: '🌡️' },
    { id: 'xray', name: 'X-Ray', icon: '🦴' },
    { id: 'glitch', name: 'Glitch', icon: '⚡' },
    { id: 'kaleidoscope', name: 'Kaleido', icon: '🔮' },
    { id: 'vhs', name: 'VHS', icon: '📼' },
    { id: 'edges', name: 'Edges', icon: '✏️' },
    { id: 'rgbshift', name: 'RGB Shift', icon: '🌈' },
    { id: 'duotone', name: 'Duotone', icon: '🎨' },
  ];

  function buildFilterGrid() {
    const grid = document.getElementById('filterGrid');
    filters.forEach(f => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn' + (f.id === currentFilter ? ' active' : '');
      btn.innerHTML = `<span class="icon">${f.icon}</span>${f.name}`;
      btn.onclick = () => setFilter(f.id);
      grid.appendChild(btn);
    });
  }

  function setFilter(id) {
    currentFilter = id;
    filterBadge.textContent = filters.find(f => f.id === id)?.name || id;
    document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
    const idx = filters.findIndex(f => f.id === id);
    if (idx >= 0) document.querySelectorAll('.filter-btn')[idx].classList.add('active');
  }

  buildFilterGrid();

  // Sliders
  const intensitySlider = document.getElementById('intensity');
  const pixelSlider = document.getElementById('pixelSize');
  const speedSlider = document.getElementById('speed');
  intensitySlider.addEventListener('input', e => { intensity = e.target.value / 100; document.getElementById('intensityVal').textContent = e.target.value; });
  pixelSlider.addEventListener('input', e => { pixelSize = +e.target.value; document.getElementById('pixelSizeVal').textContent = e.target.value; });
  speedSlider.addEventListener('input', e => { speed = e.target.value / 100; document.getElementById('speedVal').textContent = e.target.value; });

  async function startCamera() {
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: 'user' }
      });
      video.srcObject = stream;
      await new Promise((resolve, reject) => {
        video.onloadedmetadata = resolve;
        video.onerror = reject;
      });
      video.play();
      canvas.width = video.videoWidth || 640;
      canvas.height = video.videoHeight || 480;
      tempCanvas.width = canvas.width;
      tempCanvas.height = canvas.height;
      startScreen.classList.add('hidden');
      app.style.display = 'flex';
      requestAnimationFrame(renderLoop);
    } catch (err) {
      startError.style.display = 'block';
      startError.textContent = 'Camera access denied or unavailable. Please check permissions.';
    }
  }

  startBtn.addEventListener('click', startCamera);

  // ---------- FILTER IMPLEMENTATIONS ----------

  function getFrameData() {
    tempCtx.drawImage(video, 0, 0, tempCanvas.width, tempCanvas.height);
    return tempCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);
  }

  function putFrameData(data) {
    const img = ctx.createImageData(canvas.width, canvas.height);
    // If sizes match just put; if not, we already drew to tempCanvas at same size
    if (data.width === canvas.width && data.height === canvas.height) {
      ctx.putImageData(data, 0, 0);
    } else {
      ctx.putImageData(data, 0, 0);
    }
  }

  function applyNormal() {
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  }

  function applyMirror() {
    ctx.save();
    ctx.translate(canvas.width, 0);
    ctx.scale(-1, 1);
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    ctx.restore();
  }

  function applyPixelate() {
    const w = canvas.width;
    const h = canvas.height;
    const ps = Math.max(2, Math.floor(pixelSize * (1 + intensity)));
    smallCanvas.width = Math.ceil(w / ps);
    smallCanvas.height = Math.ceil(h / ps);
    smallCtx.drawImage(video, 0, 0, smallCanvas.width, smallCanvas.height);
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(smallCanvas, 0, 0, smallCanvas.width, smallCanvas.height, 0, 0, w, h);
    ctx.imageSmoothingEnabled = true;
  }

  // ASCII characters from dark to light
  const ASCII_CHARS = " .:-=+*#%@";
  let asciiCache = null;
  function applyAscii() {
    const w = canvas.width;
    const h = canvas.height;
    const sampleW = Math.floor(120 * (1 + intensity));
    const sampleH = Math.floor(sampleW * (h / w));
    smallCanvas.width = sampleW;
    smallCanvas.height = sampleH;
    smallCtx.drawImage(video, 0, 0, sampleW, sampleH);
    const data = smallCtx.getImageData(0, 0, sampleW, sampleH).data;

    const fontSize = Math.max(6, Math.floor(w / sampleW));
    ctx.fillStyle = '#0a0a0f';
    ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = `rgba(139, 92, 246, ${0.7 + intensity * 0.3})`;
    ctx.font = `${fontSize}px "Space Mono", monospace`;
    ctx.textBaseline = 'top';

    for (let y = 0; y < sampleH; y++) {
      let line = '';
      for (let x = 0; x < sampleW; x++) {
        const i = (y * sampleW + x) * 4;
        const brightness = (data[i] + data[i+1] + data[i+2]) / 3;
        const idx = Math.floor((brightness / 255) * (ASCII_CHARS.length - 1));
        line += ASCII_CHARS[idx] || ' ';
      }
      ctx.fillText(line, 0, y * fontSize);
    }
  }

  function applyThermal() {
    const imgData = getFrameData();
    const data = imgData.data;
    const intensityFactor = intensity;
    for (let i = 0; i < data.length; i += 4) {
      const r = data[i], g = data[i+1], b = data[i+2];
      const lum = 0.299*r + 0.587*g + 0.114*b;
      const t = lum / 255;
      // Thermal gradient: black -> blue -> cyan -> green -> yellow -> red -> white
      let rr, gg, bb;
      if (t < 0.2) { rr = 0; gg = 0; bb = t * 5 * 200; }
      else if (t < 0.4) { rr = 0; gg = (t-0.2)*5*255; bb = 200 + (t-0.2)*5*55; }
      else if (t < 0.6) { rr = (t-0.4)*5*255; gg = 255; bb = 0; }
      else if (t < 0.8) { rr = 255; gg = 255 - (t-0.6)*5*128; bb = 0; }
      else { rr = 255; gg = 127 + (t-0.8)*5*128; bb = (t-0.8)*5*255; }
      data[i] = data[i] * (1-intensityFactor) + rr * intensityFactor;
      data[i+1] = data[i+1] * (1-intensityFactor) + gg * intensityFactor;
      data[i+2] = data[i+2] * (1-intensityFactor) + bb * intensityFactor;
    }
    putFrameData(imgData);
  }

  function applyXray() {
    const imgData = getFrameData();
    const data = imgData.data;
    for (let i = 0; i < data.length; i += 4) {
      const avg = (data[i] + data[i+1] + data[i+2]) / 3;
      const inv = 255 - avg;
      const boost = Math.min(255, inv * (1 + intensity * 0.5));
      data[i] = boost * 0.9;
      data[i+1] = boost * 0.95;
      data[i+2] = boost;
    }
    putFrameData(imgData);
  }

  function applyGlitch() {
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const sliceHeight = Math.floor(4 + intensity * 20);
    const numSlices = Math.floor(5 + intensity * 25);
    const maxOffset = Math.floor(10 + intensity * 60);
    for (let i = 0; i < numSlices; i++) {
      const y = Math.floor(Math.random() * canvas.height);
      const h = Math.min(sliceHeight, canvas.height - y);
      const offset = Math.floor((Math.random() - 0.5) * 2 * maxOffset);
      const sx = Math.max(0, Math.min(canvas.width - 1, offset > 0 ? 0 : -offset));
      const sw = canvas.width - Math.abs(offset);
      const dx = Math.max(0, offset);
      ctx.drawImage(canvas, sx, y, sw, h, dx, y, sw, h);
    }
    // Occasional color channel split
    if (Math.random() < intensity * 0.8) {
      const offset = Math.floor((Math.random() - 0.5) * 2 * maxOffset * 0.5);
      ctx.globalCompositeOperation = 'screen';
      ctx.drawImage(canvas, offset, 0, canvas.width, canvas.height);
      ctx.globalCompositeOperation = 'source-over';
    }
    // Scanlines
    ctx.fillStyle = 'rgba(0,0,0,0.08)';
    for (let y = 0; y < canvas.height; y += 2) {
      ctx.fillRect(0, y, canvas.width, 1);
    }
  }

  function applyKaleidoscope() {
    const w = canvas.width;
    const h = canvas.height;
    const cx = w / 2;
    const cy = h / 2;
    const segments = Math.max(3, Math.floor(3 + intensity * 9));
    ctx.save();
    ctx.fillStyle = '#0a0a0f';
    ctx.fillRect(0, 0, w, h);
    ctx.translate(cx, cy);
    for (let i = 0; i < segments; i++) {
      ctx.save();
      ctx.rotate((Math.PI * 2 / segments) * i + time * speed * 0.5);
      ctx.scale(1, -1);
      ctx.drawImage(video, -cx, -cy, w, h);
      ctx.restore();
    }
    ctx.restore();
    // Vignette
    const grad = ctx.createRadialGradient(cx, cy, w*0.2, cx, cy, w*0.8);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(1, 'rgba(10,10,15,0.6)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);
  }

  function applyVhs() {
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const w = canvas.width;
    const h = canvas.height;

    // Scanlines
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    for (let y = 0; y < h; y += 2) {
      ctx.fillRect(0, y, w, 1);
    }

    // Tracking lines
    const trackY = Math.floor(h * 0.3 + Math.sin(time * 3) * h * 0.2);
    const trackH = Math.floor(2 + intensity * 8);
    ctx.fillStyle = `rgba(50, 20, 80, ${0.1 + intensity * 0.3})`;
    ctx.fillRect(0, trackY, w, trackH);

    // Chromatic aberration
    const shift = Math.floor(2 + intensity * 6);
    ctx.globalCompositeOperation = 'screen';
    ctx.drawImage(canvas, shift, 0, w, h);
    ctx.globalCompositeOperation = 'source-over';

    // Noise
    const imgData = ctx.getImageData(0, 0, w, h);
    const data = imgData.data;
    for (let i = 0; i < data.length; i += 4) {
      if (Math.random() < 0.03 + intensity * 0.07) {
        const noise = (Math.random() - 0.5) * 40;
        data[i] += noise;
        data[i+1] += noise;
        data[i+2] += noise;
      }
    }
    ctx.putImageData(imgData, 0, 0);

    // Date overlay
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.font = '14px "Space Mono", monospace';
    const now = new Date();
    ctx.fillText(now.toLocaleDateString() + ' ' + now.toLocaleTimeString(), 14, h - 14);
  }

  function applyEdges() {
    const imgData = getFrameData();
    const w = imgData.width;
    const h = imgData.height;
    const src = imgData.data;
    const out = ctx.createImageData(w, h);
    const dst = out.data;
    const threshold = 30 + (1-intensity) * 100;
    for (let y = 1; y < h - 1; y++) {
      for (let x = 1; x < w - 1; x++) {
        const i = (y * w + x) * 4;
        const li = ((y - 1) * w + x) * 4;
        const ri = ((y + 1) * w + x) * 4;
        const ti = (y * w + (x - 1)) * 4;
        const bi = (y * w + (x + 1)) * 4;
        const gy = (src[li] + src[li+1] + src[li+2]) - (src[ri] + src[ri+1] + src[ri+2]);
        const gx = (src[ti] + src[ti+1] + src[ti+2]) - (src[bi] + src[bi+1] + src[bi+2]);
        const edge = Math.sqrt(gx*gx + gy*gy);
        const v = edge > threshold ? Math.min(255, edge) : 0;
        dst[i] = v;
        dst[i+1] = v;
        dst[i+2] = v;
        dst[i+3] = 255;
      }
    }
    putFrameData(out);
  }

  function applyRgbShift() {
    const w = canvas.width;
    const h = canvas.height;
    const shift = Math.floor(2 + intensity * 12);

    tempCtx.drawImage(video, 0, 0, w, h);
    const frame = tempCtx.getImageData(0, 0, w, h);
    const out = ctx.createImageData(w, h);
    const src = frame.data;
    const dst = out.data;

    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const i = (y * w + x) * 4;
        const ri = Math.min(w-1, x + shift);
        const li = Math.max(0, x - shift);
        const rIdx = (y * w + ri) * 4;
        const bIdx = (y * w + li) * 4;
        dst[i] = src[rIdx];
        dst[i+1] = src[i+1];
        dst[i+2] = src[bIdx+2];
        dst[i+3] = 255;
      }
    }
    putFrameData(out);

    // Bloom
    ctx.globalCompositeOperation = 'screen';
    ctx.globalAlpha = 0.3 * intensity;
    ctx.drawImage(canvas, 0, 0, w, h);
    ctx.globalAlpha = 1;
    ctx.globalCompositeOperation = 'source-over';
  }

  function applyDuotone() {
    const imgData = getFrameData();
    const data = imgData.data;
    const color1 = { r: 236, g: 72, b: 153 }; // pink
    const color2 = { r: 139, g: 92, b: 246 }; // purple
    for (let i = 0; i < data.length; i += 4) {
      const lum = (data[i] + data[i+1] + data[i+2]) / 3;
      const t = lum / 255;
      const tt = t * t * (3 - 2 * t); // smoothstep
      const r = color1.r * (1 - tt) + color2.r * tt;
      const g = color1.g * (1 - tt) + color2.g * tt;
      const b = color1.b * (1 - tt) + color2.b * tt;
      data[i] = r;
      data[i+1] = g;
      data[i+2] = b;
    }
    putFrameData(imgData);
  }

  const filterMap = {
    normal: applyNormal,
    mirror: applyMirror,
    pixelate: applyPixelate,
    ascii: applyAscii,
    thermal: applyThermal,
    xray: applyXray,
    glitch: applyGlitch,
    kaleidoscope: applyKaleidoscope,
    vhs: applyVhs,
    edges: applyEdges,
    rgbshift: applyRgbShift,
    duotone: applyDuotone,
  };

  function renderLoop(timestamp) {
    time = timestamp / 1000;

    // FPS
    frameCount++;
    if (timestamp - lastTime >= 1000) {
      fps = frameCount;
      frameCount = 0;
      lastTime = timestamp;
      fpsCounter.textContent = fps + ' FPS';
    }

    if (video.readyState >= 2) {
      const filterFn = filterMap[currentFilter] || applyNormal;
      filterFn();
    }

    animId = requestAnimationFrame(renderLoop);
  }

  // Snapshot
  document.getElementById('snapBtn').addEventListener('click', () => {
    flashOverlay.classList.add('active');
    setTimeout(() => flashOverlay.classList.remove('active'), 80);

    const snapCanvas = document.createElement('canvas');
    snapCanvas.width = canvas.width;
    snapCanvas.height = canvas.height;
    const sctx = snapCanvas.getContext('2d');
    sctx.drawImage(canvas, 0, 0);

    const dataUrl = snapCanvas.toDataURL('image/png');
    snapshots.unshift(dataUrl);
    if (snapshots.length > 20) snapshots.pop();
    updateGallery();
  });

  function updateGallery() {
    galleryStrip.innerHTML = '';
    snapshots.forEach((url, idx) => {
      const wrap = document.createElement('div');
      wrap.className = 'thumb-wrap';
      const img = document.createElement('img');
      img.className = 'gallery-thumb';
      img.src = url;
      img.onclick = () => downloadUrl(url, `snapshot-${Date.now()}.png`);
      const remove = document.createElement('div');
      remove.className = 'remove';
      remove.textContent = '×';
      remove.onclick = (e) => { e.stopPropagation(); snapshots.splice(idx, 1); updateGallery(); };
      wrap.appendChild(img);
      wrap.appendChild(remove);
      galleryStrip.appendChild(wrap);
    });
  }

  function downloadUrl(url, filename) {
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
  }

  // Save current frame
  document.getElementById('saveBtn').addEventListener('click', () => {
    const url = canvas.toDataURL('image/png');
    downloadUrl(url, `webcam-filter-${Date.now()}.png`);
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    if (e.key === ' ' && !e.repeat) {
      e.preventDefault();
      document.getElementById('snapBtn').click();
    }
    if (e.key === 'ArrowLeft') {
      const idx = filters.findIndex(f => f.id === currentFilter);
      if (idx > 0) setFilter(filters[idx - 1].id);
    }
    if (e.key === 'ArrowRight') {
      const idx = filters.findIndex(f => f.id === currentFilter);
      if (idx < filters.length - 1) setFilter(filters[idx + 1].id);
    }
  });

  // Handle window resize / canvas sizing
  function fitCanvas() {
    if (!video.videoWidth) return;
    const wrapper = document.getElementById('canvasWrapper');
    const maxW = wrapper.parentElement.clientWidth - 48;
    const maxH = wrapper.parentElement.clientHeight - 48;
    const aspect = video.videoWidth / video.videoHeight;
    let w = maxW;
    let h = w / aspect;
    if (h > maxH) { h = maxH; w = h * aspect; }
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
  }
  window.addEventListener('resize', fitCanvas);
  // Fit after video starts
  video.addEventListener('loadeddata', fitCanvas);

})();
</script>
</body>
</html>
