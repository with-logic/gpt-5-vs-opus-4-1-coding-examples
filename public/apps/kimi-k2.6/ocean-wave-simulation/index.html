<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ocean Wave Simulation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap');

        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            background: #0f172a;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .ui-panel {
            position: fixed;
            top: 24px;
            right: 24px;
            width: 300px;
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 28px;
            z-index: 10;
            transition: transform 0.3s ease, opacity 0.3s ease;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
        }

        .ui-panel.collapsed {
            transform: translateX(calc(100% + 40px));
            opacity: 0;
        }

        .toggle-btn {
            position: fixed;
            top: 24px;
            right: 24px;
            width: 44px;
            height: 44px;
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 11;
            transition: all 0.2s ease;
            color: rgba(255, 255, 255, 0.7);
        }

        .toggle-btn:hover {
            background: rgba(15, 23, 42, 0.85);
            color: rgba(255, 255, 255, 0.95);
        }

        .slider-container {
            margin-bottom: 24px;
        }

        .slider-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 13px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 0.02em;
        }

        .slider-value {
            font-variant-numeric: tabular-nums;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.9);
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.15s ease, background 0.15s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            background: #ffffff;
        }

        input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .panel-title {
            font-size: 18px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.95);
            margin-bottom: 28px;
            letter-spacing: -0.01em;
        }

        .divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.08);
            margin: 20px 0;
        }

        .presets {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .preset-btn {
            flex: 1;
            padding: 8px 0;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .preset-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            color: rgba(255, 255, 255, 0.85);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .preset-btn.active {
            background: rgba(56, 189, 248, 0.2);
            color: rgba(56, 189, 248, 0.9);
            border-color: rgba(56, 189, 248, 0.3);
        }

        .info-overlay {
            position: fixed;
            bottom: 28px;
            left: 28px;
            z-index: 5;
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
            font-weight: 300;
            pointer-events: none;
            line-height: 1.6;
        }

        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0f172a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 1s ease;
        }

        .loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-text {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            font-weight: 300;
            margin-top: 20px;
            letter-spacing: 0.05em;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top-color: rgba(56, 189, 248, 0.6);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loading-screen" id="loading">
        <div class="spinner"></div>
        <div class="loading-text">Generating Ocean...</div>
    </div>

    <div id="canvas-container"></div>

    <div class="toggle-btn" id="toggleBtn" onclick="togglePanel()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="4" y1="21" x2="4" y2="14"></line>
            <line x1="4" y1="10" x2="4" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="12"></line>
            <line x1="12" y1="8" x2="12" y2="3"></line>
            <line x1="20" y1="21" x2="20" y2="16"></line>
            <line x1="20" y1="12" x2="20" y2="3"></line>
            <line x1="1" y1="14" x2="7" y2="14"></line>
            <line x1="9" y1="8" x2="15" y2="8"></line>
            <line x1="17" y1="16" x2="23" y2="16"></line>
        </svg>
    </div>

    <div class="ui-panel" id="uiPanel">
        <div class="panel-title">Ocean Settings</div>

        <div class="slider-container">
            <div class="slider-label">
                <span>Wind Speed</span>
                <span class="slider-value" id="windValue">1.0</span>
            </div>
            <input type="range" min="0" max="3" step="0.01" value="1.0" id="windSlider">
        </div>

        <div class="slider-container">
            <div class="slider-label">
                <span>Wave Height</span>
                <span class="slider-value" id="waveValue">1.0</span>
            </div>
            <input type="range" min="0" max="3" step="0.01" value="1.0" id="waveSlider">
        </div>

        <div class="slider-container">
            <div class="slider-label">
                <span>Light Intensity</span>
                <span class="slider-value" id="lightValue">1.0</span>
            </div>
            <input type="range" min="0" max="2" step="0.01" value="1.0" id="lightSlider">
        </div>

        <div class="slider-container">
            <div class="slider-label">
                <span>Sun Position</span>
                <span class="slider-value" id="sunValue">45°</span>
            </div>
            <input type="range" min="0" max="180" step="1" value="45" id="sunSlider">
        </div>

        <div class="divider"></div>

        <div class="slider-label">
            <span>Presets</span>
        </div>
        <div class="presets">
            <div class="preset-btn active" onclick="setPreset('calm')">Calm</div>
            <div class="preset-btn" onclick="setPreset('breezy')">Breezy</div>
            <div class="preset-btn" onclick="setPreset('stormy')">Stormy</div>
        </div>
    </div>

    <div class="info-overlay">
        <div>Ocean Wave Simulation</div>
        <div>Drag to orbit &middot; Scroll to zoom</div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // Scene setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 10000);
        camera.position.set(0, 18, 55);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2.1;
        controls.minPolarAngle = 0.1;
        controls.minDistance = 15;
        controls.maxDistance = 120;
        controls.target.set(0, 0, 0);
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.3;

        // Sky gradient
        const skyGeo = new THREE.SphereGeometry(4000, 32, 32);
        const skyMat = new THREE.ShaderMaterial({
            uniforms: {
                sunPosition: { value: new THREE.Vector3(100, 100, 100) },
                topColor: { value: new THREE.Color(0x4a90d9) },
                bottomColor: { value: new THREE.Color(0xc8dff5) }
            },
            vertexShader: `
                varying vec3 vWorldPosition;
                void main() {
                    vec4 worldPosition = modelMatrix * vec4(position, 1.0);
                    vWorldPosition = worldPosition.xyz;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform vec3 topColor;
                uniform vec3 bottomColor;
                uniform vec3 sunPosition;
                varying vec3 vWorldPosition;

                void main() {
                    float h = normalize(vWorldPosition).y;
                    vec3 color = mix(bottomColor, topColor, max(0.0, h));

                    // Sun glow
                    vec3 viewDir = normalize(vWorldPosition);
                    vec3 sunDir = normalize(sunPosition);
                    float sunDot = max(dot(viewDir, sunDir), 0.0);
                    float sunGlow = pow(sunDot, 256.0) * 2.0 + pow(sunDot, 64.0) * 0.5 + pow(sunDot, 8.0) * 0.1;
                    color += vec3(1.0, 0.95, 0.85) * sunGlow;

                    gl_FragColor = vec4(color, 1.0);
                }
            `,
            side: THREE.BackSide,
            depthWrite: false
        });
        const sky = new THREE.Mesh(skyGeo, skyMat);
        scene.add(sky);

        // Sun
        const sunGeo = new THREE.SphereGeometry(8, 32, 32);
        const sunMat = new THREE.MeshBasicMaterial({ color: 0xfff8e7 });
        const sunMesh = new THREE.Mesh(sunGeo, sunMat);
        scene.add(sunMesh);

        // Sun glow
        const glowGeo = new THREE.SphereGeometry(25, 32, 32);
        const glowMat = new THREE.MeshBasicMaterial({
            color: 0xfff0c8,
            transparent: true,
            opacity: 0.15
        });
        const glowMesh = new THREE.Mesh(glowGeo, glowMat);
        scene.add(glowMesh);

        // Directional light
        const sunLight = new THREE.DirectionalLight(0xfff8e7, 1.5);
        sunLight.position.set(100, 100, 100);
        sunLight.castShadow = false;
        scene.add(sunLight);

        const ambientLight = new THREE.AmbientLight(0x406080, 0.4);
        scene.add(ambientLight);

        const hemiLight = new THREE.HemisphereLight(0x87ceeb, 0x1a3a5c, 0.3);
        scene.add(hemiLight);

        // Ocean vertex shader - multiple Gerstner-like waves for realistic motion
        const oceanVertexShader = `
            uniform float uTime;
            uniform float uWindSpeed;
            uniform float uWaveHeight;

            varying vec3 vWorldPosition;
            varying vec3 vNormal;
            varying vec2 vUv;

            // Pseudo-random hash
            vec2 hash22(vec2 p) {
                vec3 p3 = fract(vec3(p.xyx) * vec3(0.1031, 0.1030, 0.0973));
                p3 += dot(p3, p3.yzx + 33.33);
                return fract((p3.xx + p3.yz) * p3.zy);
            }

            float noise(vec2 p) {
                vec2 i = floor(p);
                vec2 f = fract(p);
                f = f * f * (3.0 - 2.0 * f);
                float a = dot(hash22(i), vec2(1.0, 1.0));
                float b = dot(hash22(i + vec2(1.0, 0.0)), vec2(1.0, 1.0));
                float c = dot(hash22(i + vec2(0.0, 1.0)), vec2(1.0, 1.0));
                float d = dot(hash22(i + vec2(1.0, 1.0)), vec2(1.0, 1.0));
                return mix(mix(a, b, f.x), mix(c, d, f.x), f.y) * 0.5 + 0.5;
            }

            // Gerstner-style wave
            vec3 gerstnerWave(vec2 pos, float time, float steepness, float wavelength, vec2 direction, float speed, inout vec3 normal) {
                float k = 2.0 * 3.14159265359 / wavelength;
                float c = sqrt(9.81 / k) * speed;
                vec2 d = normalize(direction);
                float f = k * (dot(d, pos) - c * time);
                float a = steepness / k;

                normal.x += d.x * steepness * cos(f);
                normal.z += d.y * steepness * cos(f);
                normal.y -= steepness * sin(f);

                return vec3(
                    d.x * a * cos(f),
                    a * sin(f),
                    d.y * a * cos(f)
                );
            }

            void main() {
                vUv = uv;
                vec3 pos = position;

                float t = uTime * uWindSpeed;
                float h = uWaveHeight;

                vec3 accumulated = vec3(0.0);
                vec3 normal = vec3(0.0, 1.0, 0.0);

                // Wave 1 - dominant swell
                accumulated += gerstnerWave(pos.xz, t, 0.12 * h, 40.0, vec2(1.0, 0.3), 0.8, normal);

                // Wave 2 - secondary swell
                accumulated += gerstnerWave(pos.xz, t, 0.08 * h, 25.0, vec2(0.8, 0.6), 0.7, normal);

                // Wave 3 - cross swell
                accumulated += gerstnerWave(pos.xz, t, 0.06 * h, 15.0, vec2(-0.4, 0.9), 0.6, normal);

                // Wave 4 - smaller chop
                accumulated += gerstnerWave(pos.xz, t, 0.04 * h, 8.0, vec2(0.2, -0.8), 0.5, normal);

                // Wave 5 - fine detail
                accumulated += gerstnerWave(pos.xz, t, 0.03 * h, 4.0, vec2(-0.7, -0.3), 0.4, normal);

                // Wave 6 - micro detail
                accumulated += gerstnerWave(pos.xz, t, 0.02 * h, 2.0, vec2(0.5, 0.5), 0.3, normal);

                // Add some noise-based variation
                float noiseVal = noise(pos.xz * 0.05 + t * 0.1) * 0.3 * h;
                accumulated.y += noiseVal;
                normal.x += (noise(pos.xz * 0.1 + 0.1) - 0.5) * 0.1 * h;
                normal.z += (noise(pos.xz * 0.1 + 0.2) - 0.5) * 0.1 * h;

                pos += accumulated;

                vNormal = normalize(normal);
                vWorldPosition = (modelMatrix * vec4(pos, 1.0)).xyz;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
            }
        `;

        // Ocean fragment shader with realistic water shading
        const oceanFragmentShader = `
            uniform vec3 uSunPosition;
            uniform vec3 uCameraPosition;
            uniform float uLightIntensity;
            uniform float uTime;

            varying vec3 vWorldPosition;
            varying vec3 vNormal;
            varying vec2 vUv;

            void main() {
                vec3 worldNormal = normalize(vNormal);
                vec3 viewDir = normalize(uCameraPosition - vWorldPosition);
                vec3 sunDir = normalize(uSunPosition);

                // Fresnel reflection
                float fresnel = pow(1.0 - max(dot(worldNormal, viewDir), 0.0), 3.0);
                fresnel = mix(0.02, 1.0, fresnel);

                // Deep water color
                vec3 deepColor = vec3(0.02, 0.12, 0.25);
                vec3 shallowColor = vec3(0.05, 0.25, 0.40);
                vec3 foamColor = vec3(0.92, 0.96, 1.0);

                // Base water color based on viewing angle
                float facing = max(dot(worldNormal, viewDir), 0.0);
                vec3 waterColor = mix(deepColor, shallowColor, facing * 0.5 + 0.3);

                // Specular reflection of sun
                vec3 halfVector = normalize(sunDir + viewDir);
                float specAngle = max(dot(worldNormal, halfVector), 0.0);
                float specular = pow(specAngle, 128.0) * 2.0;

                // Broad specular highlight
                float broadSpec = pow(specAngle, 16.0) * 0.3;

                // Sun reflection color
                vec3 sunColor = vec3(1.0, 0.95, 0.85) * uLightIntensity;

                // Environment reflection approximation
                vec3 envReflect = mix(
                    vec3(0.4, 0.6, 0.8) * 0.5,
                    vec3(0.8, 0.9, 1.0),
                    worldNormal.y * 0.5 + 0.5
                );

                // Combine reflection
                vec3 reflection = mix(waterColor, envReflect, fresnel);
                reflection += sunColor * (specular + broadSpec) * fresnel;

                // Foam on wave tips
                float foam = max(vWorldPosition.y - 0.5, 0.0);
                foam = smoothstep(0.0, 0.8, foam) * 0.4;

                // Subsurface scattering approximation
                float ss = max(dot(-sunDir, viewDir), 0.0);
                vec3 subsurface = vec3(0.1, 0.3, 0.5) * ss * 0.2;

                vec3 finalColor = reflection + foamColor * foam + subsurface;

                // Distance fog
                float dist = length(uCameraPosition - vWorldPosition);
                float fog = 1.0 - exp(-dist * 0.001);
                vec3 fogColor = vec3(0.78, 0.87, 0.96);
                finalColor = mix(finalColor, fogColor, fog);

                gl_FragColor = vec4(finalColor, 1.0);
            }
        `;

        // Create ocean mesh
        const oceanSize = 400;
        const oceanSegments = 256;
        const oceanGeo = new THREE.PlaneGeometry(oceanSize, oceanSize, oceanSegments, oceanSegments);
        oceanGeo.rotateX(-Math.PI / 2);

        const oceanUniforms = {
            uTime: { value: 0.0 },
            uWindSpeed: { value: 1.0 },
            uWaveHeight: { value: 1.0 },
            uSunPosition: { value: new THREE.Vector3(100, 100, 100) },
            uCameraPosition: { value: camera.position },
            uLightIntensity: { value: 1.0 }
        };

        const oceanMat = new THREE.ShaderMaterial({
            uniforms: oceanUniforms,
            vertexShader: oceanVertexShader,
            fragmentShader: oceanFragmentShader,
            side: THREE.DoubleSide,
            transparent: false
        });

        const ocean = new THREE.Mesh(oceanGeo, oceanMat);
        scene.add(ocean);

        // Seabed/horizon haze plane for depth
        const horizonGeo = new THREE.PlaneGeometry(2000, 2000);
        const horizonMat = new THREE.MeshBasicMaterial({
            color: 0x1a3a5c,
            transparent: true,
            opacity: 0.3
        });
        const horizonPlane = new THREE.Mesh(horizonGeo, horizonMat);
        horizonPlane.rotation.x = -Math.PI / 2;
        horizonPlane.position.y = -15;
        scene.add(horizonPlane);

        // Animation state
        let time = 0;
        let windSpeed = 1.0;
        let waveHeight = 1.0;
        let lightIntensity = 1.0;
        let sunAngle = 45;

        // UI handlers
        const windSlider = document.getElementById('windSlider');
        const waveSlider = document.getElementById('waveSlider');
        const lightSlider = document.getElementById('lightSlider');
        const sunSlider = document.getElementById('sunSlider');

        const windValue = document.getElementById('windValue');
        const waveValue = document.getElementById('waveValue');
        const lightValue = document.getElementById('lightValue');
        const sunValue = document.getElementById('sunValue');

        function updateSunPosition() {
            const angle = sunAngle * Math.PI / 180;
            const radius = 200;
            const x = Math.cos(angle) * radius;
            const y = Math.sin(angle) * radius;
            const z = 50;

            const pos = new THREE.Vector3(x, y, z);
            sunMesh.position.copy(pos);
            glowMesh.position.copy(pos);
            sunLight.position.copy(pos);
            skyMat.uniforms.sunPosition.value.copy(pos);
            oceanUniforms.uSunPosition.value.copy(pos);

            // Adjust sky colors based on sun height
            const height = Math.max(y / radius, 0);
            const topColor = new THREE.Color();
            const bottomColor = new THREE.Color();

            if (height > 0.3) {
                topColor.setHSL(0.58, 0.6, 0.65 - (1.0 - height) * 0.2);
                bottomColor.setHSL(0.55, 0.5, 0.85 - (1.0 - height) * 0.2);
            } else {
                // Sunset colors
                topColor.setHSL(0.65, 0.4, 0.3);
                bottomColor.setHSL(0.08, 0.6, 0.6);
            }

            skyMat.uniforms.topColor.value.copy(topColor);
            skyMat.uniforms.bottomColor.value.copy(bottomColor);

            // Adjust sun color
            const sunBrightness = Math.max(height, 0.2);
            sunMat.color.setHSL(0.12, 0.3, 0.9 + sunBrightness * 0.1);
            glowMat.color.setHSL(0.12, 0.3, 0.8 + sunBrightness * 0.1);
            sunLight.color.setHSL(0.12, 0.2, 0.9 + sunBrightness * 0.1);

            // Ambient light adjustment
            ambientLight.intensity = 0.2 + sunBrightness * 0.3;
            hemiLight.intensity = 0.2 + sunBrightness * 0.3;
        }

        windSlider.addEventListener('input', (e) => {
            windSpeed = parseFloat(e.target.value);
            windValue.textContent = windSpeed.toFixed(1);
            oceanUniforms.uWindSpeed.value = windSpeed;
            updatePresetButtons();
        });

        waveSlider.addEventListener('input', (e) => {
            waveHeight = parseFloat(e.target.value);
            waveValue.textContent = waveHeight.toFixed(1);
            oceanUniforms.uWaveHeight.value = waveHeight;
            updatePresetButtons();
        });

        lightSlider.addEventListener('input', (e) => {
            lightIntensity = parseFloat(e.target.value);
            lightValue.textContent = lightIntensity.toFixed(1);
            oceanUniforms.uLightIntensity.value = lightIntensity;
            sunLight.intensity = 1.5 * lightIntensity;
        });

        sunSlider.addEventListener('input', (e) => {
            sunAngle = parseFloat(e.target.value);
            sunValue.textContent = sunAngle.toFixed(0) + '°';
            updateSunPosition();
        });

        // Presets
        window.setPreset = function(preset) {
            const presets = {
                calm: { wind: 0.3, wave: 0.3 },
                breezy: { wind: 1.0, wave: 1.0 },
                stormy: { wind: 2.5, wave: 2.5 }
            };

            const p = presets[preset];
            windSpeed = p.wind;
            waveHeight = p.wave;

            windSlider.value = windSpeed;
            waveSlider.value = waveHeight;
            windValue.textContent = windSpeed.toFixed(1);
            waveValue.textContent = waveHeight.toFixed(1);
            oceanUniforms.uWindSpeed.value = windSpeed;
            oceanUniforms.uWaveHeight.value = waveHeight;

            document.querySelectorAll('.preset-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        };

        function updatePresetButtons() {
            document.querySelectorAll('.preset-btn').forEach(btn => btn.classList.remove('active'));
        }

        window.togglePanel = function() {
            const panel = document.getElementById('uiPanel');
            panel.classList.toggle('collapsed');
        };

        // Resize handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Mouse interaction for camera sway
        let mouseX = 0, mouseY = 0;
        window.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
            mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
        });

        // Initial sun position
        updateSunPosition();

        // Hide loading screen
        setTimeout(() => {
            document.getElementById('loading').classList.add('hidden');
        }, 1500);

        // Animation loop
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            time += delta;

            oceanUniforms.uTime.value = time;
            oceanUniforms.uCameraPosition.value.copy(camera.position);

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
