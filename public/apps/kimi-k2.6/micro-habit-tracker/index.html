<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micro Habit Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9',
                            600: '#0284c7',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4edf5 100%);
            min-height: 100vh;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.9); }
            70% { transform: scale(1.02); }
            100% { opacity: 1; transform: scale(1); }
        }
        @keyframes checkPop {
            0% { transform: scale(0) rotate(-45deg); }
            50% { transform: scale(1.2) rotate(0deg); }
            100% { transform: scale(1) rotate(0deg); }
        }
        @keyframes flame {
            0%, 100% { transform: scale(1) rotate(0deg); }
            25% { transform: scale(1.1) rotate(-2deg); }
            75% { transform: scale(1.1) rotate(2deg); }
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .animate-slide-up { animation: slideUp 0.5s ease-out forwards; }
        .animate-pop-in { animation: popIn 0.4s ease-out forwards; }
        .animate-float { animation: float 3s ease-in-out infinite; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }

        .card-hover {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.15);
        }

        .check-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .check-btn:active { transform: scale(0.92); }

        .check-btn.checked .check-icon {
            animation: checkPop 0.4s ease-out forwards;
        }

        .streak-flame {
            animation: flame 2s ease-in-out infinite;
        }

        .glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .modal-overlay {
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        .progress-ring-circle {
            transition: stroke-dashoffset 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .bar-fill {
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }

        .skip-btn {
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        .habit-card:hover .skip-btn,
        .skip-btn.visible {
            opacity: 1;
        }

        @media (max-width: 640px) {
            .skip-btn { opacity: 1; }
        }
    </style>
</head>
<body class="text-slate-800">

    <!-- Header -->
    <header class="sticky top-0 z-40 glass border-b border-white/50">
        <div class="max-w-3xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-orange-400 to-pink-500 flex items-center justify-center text-white shadow-lg animate-float">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/>
                    </svg>
                </div>
                <div>
                    <h1 class="text-lg font-bold tracking-tight text-slate-900 leading-tight">Micro Habit Tracker</h1>
                    <p class="text-xs text-slate-500 font-medium" id="headerDate">Today</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="app.showDatePicker()" class="p-2.5 rounded-xl bg-white/80 hover:bg-white border border-slate-200 hover:border-slate-300 transition-all shadow-sm text-slate-600" title="Change date">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                        <line x1="16" y1="2" x2="16" y2="6"/>
                        <line x1="8" y1="2" x2="8" y2="6"/>
                        <line x1="3" y1="10" x2="21" y2="10"/>
                    </svg>
                </button>
                <button onclick="app.toggleMenu()" class="p-2.5 rounded-xl bg-white/80 hover:bg-white border border-slate-200 hover:border-slate-300 transition-all shadow-sm text-slate-600" title="Menu">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="1"/>
                        <circle cx="19" cy="12" r="1"/>
                        <circle cx="5" cy="12" r="1"/>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-3xl mx-auto px-4 py-6 pb-32">

        <!-- Motivation Banner -->
        <div class="mb-6 animate-slide-up" style="animation-delay: 0.05s">
            <div class="relative overflow-hidden rounded-2xl bg-gradient-to-r from-violet-500 via-purple-500 to-pink-500 p-5 text-white shadow-lg">
                <div class="absolute top-0 right-0 w-32 h-32 bg-white/10 rounded-full -translate-y-1/2 translate-x-1/2"></div>
                <div class="absolute bottom-0 left-0 w-24 h-24 bg-white/10 rounded-full translate-y-1/2 -translate-x-1/2"></div>
                <p class="relative text-sm font-medium opacity-90 mb-1">Your daily mission</p>
                <p class="relative text-lg font-bold" id="motivationText">Small steps every day build extraordinary lives.</p>
            </div>
        </div>

        <!-- Overall Progress -->
        <div class="mb-6 animate-slide-up" style="animation-delay: 0.1s">
            <div class="glass rounded-2xl p-5 shadow-sm border border-white/60">
                <div class="flex items-center justify-between mb-3">
                    <h2 class="font-semibold text-slate-700">Today's Progress</h2>
                    <span class="text-sm font-bold text-slate-500" id="progressText">0/0</span>
                </div>
                <div class="w-full h-3 bg-slate-200 rounded-full overflow-hidden">
                    <div id="progressBar" class="bar-fill h-full bg-gradient-to-r from-emerald-400 to-teal-500 rounded-full" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <!-- Habits List -->
        <div id="habitsList" class="space-y-3">
            <!-- Habits rendered here -->
        </div>

        <!-- Weekly Chart -->
        <div class="mt-6 animate-slide-up" style="animation-delay: 0.3s">
            <div class="glass rounded-2xl p-5 shadow-sm border border-white/60">
                <h2 class="font-semibold text-slate-700 mb-4">This Week</h2>
                <div id="weeklyChart" class="flex items-end justify-between gap-1 h-32">
                    <!-- Chart rendered here -->
                </div>
            </div>
        </div>

        <!-- Add Button -->
        <div class="mt-6 animate-slide-up" style="animation-delay: 0.35s">
            <button onclick="app.showAddModal()" id="addBtn" class="w-full py-4 rounded-2xl border-2 border-dashed border-slate-300 hover:border-slate-400 text-slate-500 hover:text-slate-700 font-medium transition-all flex items-center justify-center gap-2 hover:bg-white/50">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"/>
                    <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                Add a habit
            </button>
        </div>
    </main>

    <!-- Add/Edit Modal -->
    <div id="habitModal" class="fixed inset-0 z-50 hidden">
        <div class="modal-overlay absolute inset-0 bg-black/30" onclick="app.closeModal()"></div>
        <div class="absolute inset-x-0 bottom-0 sm:inset-0 sm:flex sm:items-center sm:justify-center">
            <div class="glass w-full sm:w-[420px] sm:rounded-2xl rounded-t-2xl shadow-2xl p-6 animate-pop-in">
                <h3 class="text-lg font-bold mb-4" id="modalTitle">New Habit</h3>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1.5">Habit name</label>
                        <input type="text" id="habitName" placeholder="e.g., Read 10 pages" maxlength="40"
                            class="w-full px-4 py-3 rounded-xl bg-white border border-slate-200 focus:border-violet-400 focus:ring-2 focus:ring-violet-100 outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1.5">Color</label>
                        <div class="flex gap-2 flex-wrap" id="colorPicker">
                            <!-- Colors rendered here -->
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1.5">Icon</label>
                        <div class="flex gap-2 flex-wrap" id="iconPicker">
                            <!-- Icons rendered here -->
                        </div>
                    </div>
                </div>
                <div class="flex gap-3 mt-6">
                    <button onclick="app.closeModal()" class="flex-1 py-3 rounded-xl bg-slate-100 hover:bg-slate-200 text-slate-700 font-medium transition-colors">
                        Cancel
                    </button>
                    <button onclick="app.saveHabit()" class="flex-1 py-3 rounded-xl bg-gradient-to-r from-violet-500 to-purple-500 hover:from-violet-600 hover:to-purple-600 text-white font-medium transition-all shadow-md">
                        Save
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Date Picker Modal -->
    <div id="dateModal" class="fixed inset-0 z-50 hidden">
        <div class="modal-overlay absolute inset-0 bg-black/30" onclick="app.closeDateModal()"></div>
        <div class="absolute inset-x-0 bottom-0 sm:inset-0 sm:flex sm:items-center sm:justify-center">
            <div class="glass w-full sm:w-[360px] sm:rounded-2xl rounded-t-2xl shadow-2xl p-6 animate-pop-in">
                <h3 class="text-lg font-bold mb-4">Pick a Date</h3>
                <input type="date" id="dateInput" class="w-full px-4 py-3 rounded-xl bg-white border border-slate-200 focus:border-violet-400 focus:ring-2 focus:ring-violet-100 outline-none transition-all mb-4">
                <div class="flex gap-3">
                    <button onclick="app.closeDateModal()" class="flex-1 py-3 rounded-xl bg-slate-100 hover:bg-slate-200 text-slate-700 font-medium transition-colors">
                        Cancel
                    </button>
                    <button onclick="app.confirmDate()" class="flex-1 py-3 rounded-xl bg-gradient-to-r from-violet-500 to-purple-500 hover:from-violet-600 hover:to-purple-600 text-white font-medium transition-all shadow-md">
                        Go
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Menu Modal -->
    <div id="menuModal" class="fixed inset-0 z-50 hidden">
        <div class="modal-overlay absolute inset-0 bg-black/30" onclick="app.closeMenu()"></div>
        <div class="absolute top-16 right-4 sm:right-8 w-56 glass rounded-2xl shadow-2xl overflow-hidden animate-pop-in border border-white/60">
            <button onclick="app.exportData()" class="w-full px-4 py-3 flex items-center gap-3 hover:bg-white/60 transition-colors text-left text-sm font-medium text-slate-700">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                Export JSON
            </button>
            <button onclick="app.importData()" class="w-full px-4 py-3 flex items-center gap-3 hover:bg-white/60 transition-colors text-left text-sm font-medium text-slate-700">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="17 8 12 3 7 8"/>
                    <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
                Import JSON
            </button>
            <div class="border-t border-slate-200/60"></div>
            <button onclick="app.resetDemo()" class="w-full px-4 py-3 flex items-center gap-3 hover:bg-white/60 transition-colors text-left text-sm font-medium text-orange-600">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="1 4 1 10 7 10"/>
                    <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
                </svg>
                Reset Demo Data
            </button>
        </div>
    </div>

    <!-- Import Modal -->
    <div id="importModal" class="fixed inset-0 z-50 hidden">
        <div class="modal-overlay absolute inset-0 bg-black/30" onclick="app.closeImportModal()"></div>
        <div class="absolute inset-x-0 bottom-0 sm:inset-0 sm:flex sm:items-center sm:justify-center">
            <div class="glass w-full sm:w-[420px] sm:rounded-2xl rounded-t-2xl shadow-2xl p-6 animate-pop-in">
                <h3 class="text-lg font-bold mb-2">Import Data</h3>
                <p class="text-sm text-slate-500 mb-4">Paste your exported JSON below. This will replace all current data.</p>
                <textarea id="importText" rows="6" placeholder="Paste JSON here..."
                    class="w-full px-4 py-3 rounded-xl bg-white border border-slate-200 focus:border-violet-400 focus:ring-2 focus:ring-violet-100 outline-none transition-all text-xs font-mono resize-none custom-scrollbar"></textarea>
                <div class="flex gap-3 mt-4">
                    <button onclick="app.closeImportModal()" class="flex-1 py-3 rounded-xl bg-slate-100 hover:bg-slate-200 text-slate-700 font-medium transition-colors">
                        Cancel
                    </button>
                    <button onclick="app.confirmImport()" class="flex-1 py-3 rounded-xl bg-gradient-to-r from-violet-500 to-purple-500 hover:from-violet-600 hover:to-purple-600 text-white font-medium transition-all shadow-md">
                        Import
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 hidden">
        <div class="glass px-6 py-3 rounded-full shadow-lg border border-white/60 text-sm font-medium text-slate-700 animate-pop-in">
            <span id="toastMsg"></span>
        </div>
    </div>

    <input type="file" id="importFile" accept=".json" class="hidden" onchange="app.handleFileImport(event)">

    <script>
        const COLORS = [
            { bg: 'bg-emerald-500', light: 'bg-emerald-100', text: 'text-emerald-600', border: 'border-emerald-200', gradient: 'from-emerald-400 to-teal-500' },
            { bg: 'bg-blue-500', light: 'bg-blue-100', text: 'text-blue-600', border: 'border-blue-200', gradient: 'from-blue-400 to-indigo-500' },
            { bg: 'bg-violet-500', light: 'bg-violet-100', text: 'text-violet-600', border: 'border-violet-200', gradient: 'from-violet-400 to-purple-500' },
            { bg: 'bg-rose-500', light: 'bg-rose-100', text: 'text-rose-600', border: 'border-rose-200', gradient: 'from-rose-400 to-pink-500' },
            { bg: 'bg-amber-500', light: 'bg-amber-100', text: 'text-amber-600', border: 'border-amber-200', gradient: 'from-amber-400 to-orange-500' },
            { bg: 'bg-cyan-500', light: 'bg-cyan-100', text: 'text-cyan-600', border: 'border-cyan-200', gradient: 'from-cyan-400 to-blue-500' },
            { bg: 'bg-lime-500', light: 'bg-lime-100', text: 'text-lime-600', border: 'border-lime-200', gradient: 'from-lime-400 to-green-500' },
        ];

        const ICONS = [
            { name: 'book', svg: '<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>' },
            { name: 'droplet', svg: '<path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/>' },
            { name: 'footprints', svg: '<path d="M4 16v-2.38C4 11.5 2.97 10.5 3 8c.03-2.72 1.49-6 4.5-6C9.37 2 10 3.8 10 5.5c0 3.11-2 5.66-2 8.68V16a2 2 0 1 1-4 0z"/><path d="M20 20v-2.38c0-2.12 1.03-3.12 1-5.62-.03-2.72-1.49-6-4.5-6C14.63 6 14 7.8 14 9.5c0 3.11 2 5.66 2 8.68V20a2 2 0 1 0 4 0z"/>' },
            { name: 'moon', svg: '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>' },
            { name: 'sun', svg: '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>' },
            { name: 'heart', svg: '<path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>' },
            { name: 'zap', svg: '<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>' },
            { name: 'coffee', svg: '<path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/>' },
            { name: 'music', svg: '<path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>' },
            { name: 'pen', svg: '<path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>' },
            { name: 'dumbbell', svg: '<path d="M6.5 6.5h11"/><path d="M6.5 17.5h11"/><path d="M6 20v-3.5a2 2 0 0 1 4 0V20"/><path d="M14 20v-3.5a2 2 0 0 1 4 0V20"/><path d="M4 10v4"/><path d="M20 10v4"/>' },
        ];

        const QUOTES = [
            "Small steps every day build extraordinary lives.",
            "You don't have to be extreme, just consistent.",
            "Progress, not perfection.",
            "Your future is created by what you do today.",
            "One day at a time. One habit at a time.",
        ];

        function generateId() {
            return 'h_' + Math.random().toString(36).substr(2, 9);
        }

        function formatDate(d) {
            return d.toISOString().split('T')[0];
        }

        function getDateOffset(base, offset) {
            const d = new Date(base);
            d.setDate(d.getDate() + offset);
            return formatDate(d);
        }

        function dayName(d) {
            return ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'][new Date(d).getDay()];
        }

        function streakFor(habit, upToDate) {
            let streak = 0;
            let d = new Date(upToDate);
            while (true) {
                const ds = formatDate(d);
                if (habit.history[ds] === 'done') {
                    streak++;
                } else if (ds === upToDate && !habit.history[ds]) {
                    // Today not checked yet, check yesterday
                } else if (habit.history[ds] === 'skipped') {
                    // Skipped days don't break streak
                } else {
                    break;
                }
                d.setDate(d.getDate() - 1);
            }
            return streak;
        }

        function getDemoData() {
            const today = new Date();
            const habits = [
                { id: generateId(), name: 'Read 10 pages', color: 0, icon: 0, createdAt: formatDate(today), history: {} },
                { id: generateId(), name: 'Drink 2L water', color: 1, icon: 1, createdAt: formatDate(today), history: {} },
                { id: generateId(), name: 'Walk 5,000 steps', color: 2, icon: 2, createdAt: formatDate(today), history: {} },
                { id: generateId(), name: 'Meditate 10 min', color: 4, icon: 3, createdAt: formatDate(today), history: {} },
                { id: generateId(), name: 'No screens after 9pm', color: 5, icon: 4, createdAt: formatDate(today), history: {} },
            ];

            // Generate 14 days of history
            for (let i = -13; i <= 0; i++) {
                const date = getDateOffset(today, i);
                habits[0].history[date] = Math.random() > 0.2 ? 'done' : (Math.random() > 0.5 ? 'skipped' : null);
                habits[1].history[date] = Math.random() > 0.15 ? 'done' : null;
                habits[2].history[date] = Math.random() > 0.25 ? 'done' : 'skipped';
                habits[3].history[date] = Math.random() > 0.3 ? 'done' : null;
                habits[4].history[date] = Math.random() > 0.2 ? 'done' : null;
            }

            return { habits, version: 1 };
        }

        const app = {
            data: { habits: [], version: 1 },
            currentDate: formatDate(new Date()),
            editingId: null,
            selectedColor: 0,
            selectedIcon: 0,

            init() {
                const saved = localStorage.getItem('microHabitTracker');
                if (saved) {
                    try {
                        this.data = JSON.parse(saved);
                    } catch (e) {
                        this.data = getDemoData();
                    }
                } else {
                    this.data = getDemoData();
                }
                this.updateHeaderDate();
                this.renderHabits();
                this.renderProgress();
                this.renderWeeklyChart();
                this.renderColorPicker();
                this.renderIconPicker();
                document.getElementById('motivationText').textContent = QUOTES[Math.floor(Math.random() * QUOTES.length)];
            },

            save() {
                localStorage.setItem('microHabitTracker', JSON.stringify(this.data));
            },

            updateHeaderDate() {
                const d = new Date(this.currentDate);
                const today = formatDate(new Date());
                const isToday = this.currentDate === today;
                const options = { weekday: 'long', month: 'short', day: 'numeric' };
                document.getElementById('headerDate').textContent = isToday
                    ? 'Today, ' + d.toLocaleDateString('en-US', options)
                    : d.toLocaleDateString('en-US', options);
            },

            getHabitColor(idx) {
                return COLORS[idx % COLORS.length];
            },

            renderHabits() {
                const container = document.getElementById('habitsList');
                if (this.data.habits.length === 0) {
                    container.innerHTML = '';
                    return;
                }

                container.innerHTML = this.data.habits.map((habit, i) => {
                    const color = this.getHabitColor(habit.color);
                    const status = habit.history[this.currentDate];
                    const isDone = status === 'done';
                    const isSkipped = status === 'skipped';
                    const streak = streakFor(habit, this.currentDate);
                    const totalDone = Object.values(habit.history).filter(v => v === 'done').length;
                    const totalDays = Object.keys(habit.history).length || 1;
                    const rate = Math.round((totalDone / totalDays) * 100);

                    return `
                        <div class="habit-card card-hover glass rounded-2xl p-4 shadow-sm border border-white/60 animate-slide-up" style="animation-delay: ${0.15 + i * 0.05}s">
                            <div class="flex items-center gap-4">
                                <div class="w-12 h-12 rounded-xl ${color.light} flex items-center justify-center flex-shrink-0 ${color.text}">
                                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        ${ICONS[habit.icon % ICONS.length].svg}
                                    </svg>
                                </div>
                                <div class="flex-1 min-w-0">
                                    <div class="flex items-center gap-2">
                                        <h3 class="font-semibold text-slate-800 truncate">${this.escapeHtml(habit.name)}</h3>
                                    </div>
                                    <div class="flex items-center gap-3 mt-1">
                                        ${streak > 0 ? `
                                            <span class="inline-flex items-center gap-1 text-xs font-bold ${streak >= 7 ? 'text-orange-500' : 'text-slate-500'}">
                                                <svg class="w-3.5 h-3.5 ${streak >= 7 ? 'streak-flame' : ''}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                                    <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/>
                                                </svg>
                                                ${streak} day${streak !== 1 ? 's' : ''}
                                            </span>
                                        ` : '<span class="text-xs text-slate-400">Start today!</span>'}
                                        <div class="w-16 h-1.5 bg-slate-100 rounded-full overflow-hidden">
                                            <div class="h-full rounded-full bg-gradient-to-r ${color.gradient}" style="width: ${rate}%"></div>
                                        </div>
                                    </div>
                                </div>
                                <div class="flex items-center gap-2">
                                    <button onclick="app.skipHabit('${habit.id}')" class="skip-btn p-2 rounded-lg hover:bg-slate-100 text-slate-400 hover:text-slate-600 transition-all ${isSkipped ? 'visible text-amber-500 bg-amber-50' : ''}" title="Skip day">
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                            <circle cx="12" cy="12" r="10"/>
                                            <line x1="8" y1="12" x2="16" y2="12"/>
                                        </svg>
                                    </button>
                                    <button onclick="app.toggleHabit('${habit.id}')" class="check-btn w-11 h-11 rounded-xl flex items-center justify-center transition-all shadow-sm ${isDone ? 'checked bg-gradient-to-br ' + color.gradient + ' text-white shadow-md' : 'bg-white border-2 border-slate-200 hover:border-slate-300 text-transparent'}">
                                        <svg class="check-icon w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                                            <polyline points="20 6 9 17 4 12"/>
                                        </svg>
                                    </button>
                                </div>
                            </div>
                            <div class="flex items-center justify-between mt-3 pt-3 border-t border-slate-100">
                                <div class="flex items-center gap-1">
                                    ${[-6,-5,-4,-3,-2,-1,0].map(offset => {
                                        const d = getDateOffset(this.currentDate, offset);
                                        const s = habit.history[d];
                                        const isPast = offset < 0;
                                        const isCurrent = offset === 0;
                                        return `<div class="w-7 h-7 rounded-lg flex items-center justify-center text-[10px] font-bold ${isCurrent ? 'ring-2 ring-offset-1 ' + color.border + ' ' + color.light + ' ' + color.text : s === 'done' ? color.bg + ' text-white' : s === 'skipped' ? 'bg-amber-100 text-amber-600' : 'bg-slate-50 text-slate-300'}"
                                            title="${d}">
                                            ${s === 'done' ? '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>' : s === 'skipped' ? '-' : dayName(d).charAt(0)}
                                        </div>`;
                                    }).join('')}
                                </div>
                                <div class="flex items-center gap-1">
                                    <button onclick="app.editHabit('${habit.id}')" class="p-1.5 rounded-lg hover:bg-slate-100 text-slate-400 hover:text-slate-600 transition-all">
                                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                            <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>
                                        </svg>
                                    </button>
                                    <button onclick="app.deleteHabit('${habit.id}')" class="p-1.5 rounded-lg hover:bg-slate-100 text-slate-400 hover:text-rose-500 transition-all">
                                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                            <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                                        </svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            },

            renderProgress() {
                const habits = this.data.habits;
                const total = habits.length;
                const done = habits.filter(h => h.history[this.currentDate] === 'done').length;
                const pct = total > 0 ? (done / total) * 100 : 0;
                document.getElementById('progressText').textContent = `${done}/${total} completed`;
                document.getElementById('progressBar').style.width = `${pct}%`;
            },

            renderWeeklyChart() {
                const container = document.getElementById('weeklyChart');
                const days = [-6, -5, -4, -3, -2, -1, 0];
                const labels = days.map(d => dayName(getDateOffset(this.currentDate, d)));

                container.innerHTML = days.map((offset, i) => {
                    const date = getDateOffset(this.currentDate, offset);
                    const total = this.data.habits.length;
                    const done = this.data.habits.filter(h => h.history[date] === 'done').length;
                    const skipped = this.data.habits.filter(h => h.history[date] === 'skipped').length;
                    const height = total > 0 ? (done / total) * 100 : 0;
                    const isToday = offset === 0;

                    return `
                        <div class="flex-1 flex flex-col items-center gap-1.5">
                            <div class="relative w-full flex-1 flex items-end rounded-t-lg overflow-hidden bg-slate-100">
                                <div class="bar-fill w-full rounded-t-lg ${isToday ? 'bg-gradient-to-t from-violet-500 to-purple-400' : 'bg-gradient-to-t from-slate-400 to-slate-300'}"
                                    style="height: ${height}%; opacity: ${height > 0 ? 1 : 0.3}"></div>
                            </div>
                            <span class="text-[10px] font-semibold ${isToday ? 'text-violet-600' : 'text-slate-400'}">${labels[i]}</span>
                        </div>
                    `;
                }).join('');
            },

            renderColorPicker() {
                const container = document.getElementById('colorPicker');
                container.innerHTML = COLORS.map((c, i) => `
                    <button onclick="app.selectColor(${i})" class="w-9 h-9 rounded-lg ${c.bg} transition-all ${this.selectedColor === i ? 'ring-2 ring-offset-2 ring-slate-400 scale-110' : 'hover:scale-105'}"></button>
                `).join('');
            },

            renderIconPicker() {
                const container = document.getElementById('iconPicker');
                container.innerHTML = ICONS.map((icon, i) => `
                    <button onclick="app.selectIcon(${i})" class="w-10 h-10 rounded-lg flex items-center justify-center border-2 transition-all ${this.selectedIcon === i ? 'border-violet-400 bg-violet-50 text-violet-600' : 'border-slate-200 hover:border-slate-300 text-slate-500'}">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            ${icon.svg}
                        </svg>
                    </button>
                `).join('');
            },

            toggleHabit(id) {
                const habit = this.data.habits.find(h => h.id === id);
                if (!habit) return;
                const current = habit.history[this.currentDate];
                if (current === 'done') {
                    delete habit.history[this.currentDate];
                } else {
                    habit.history[this.currentDate] = 'done';
                }
                this.save();
                this.renderHabits();
                this.renderProgress();
                this.renderWeeklyChart();
            },

            skipHabit(id) {
                const habit = this.data.habits.find(h => h.id === id);
                if (!habit) return;
                const current = habit.history[this.currentDate];
                if (current === 'skipped') {
                    delete habit.history[this.currentDate];
                } else {
                    habit.history[this.currentDate] = 'skipped';
                }
                this.save();
                this.renderHabits();
                this.renderProgress();
                this.renderWeeklyChart();
            },

            showAddModal() {
                if (this.data.habits.length >= 7) {
                    this.showToast('Maximum 7 habits allowed. Delete one first!');
                    return;
                }
                this.editingId = null;
                this.selectedColor = this.data.habits.length % COLORS.length;
                this.selectedIcon = this.data.habits.length % ICONS.length;
                document.getElementById('modalTitle').textContent = 'New Habit';
                document.getElementById('habitName').value = '';
                this.renderColorPicker();
                this.renderIconPicker();
                document.getElementById('habitModal').classList.remove('hidden');
                setTimeout(() => document.getElementById('habitName').focus(), 100);
            },

            editHabit(id) {
                const habit = this.data.habits.find(h => h.id === id);
                if (!habit) return;
                this.editingId = id;
                this.selectedColor = habit.color;
                this.selectedIcon = habit.icon;
                document.getElementById('modalTitle').textContent = 'Edit Habit';
                document.getElementById('habitName').value = habit.name;
                this.renderColorPicker();
                this.renderIconPicker();
                document.getElementById('habitModal').classList.remove('hidden');
            },

            saveHabit() {
                const name = document.getElementById('habitName').value.trim();
                if (!name) {
                    this.showToast('Please enter a habit name');
                    return;
                }
                if (this.editingId) {
                    const habit = this.data.habits.find(h => h.id === this.editingId);
                    if (habit) {
                        habit.name = name;
                        habit.color = this.selectedColor;
                        habit.icon = this.selectedIcon;
                    }
                } else {
                    this.data.habits.push({
                        id: generateId(),
                        name,
                        color: this.selectedColor,
                        icon: this.selectedIcon,
                        createdAt: formatDate(new Date()),
                        history: {}
                    });
                }
                this.save();
                this.closeModal();
                this.renderHabits();
                this.renderProgress();
                this.renderWeeklyChart();
                this.showToast(this.editingId ? 'Habit updated' : 'Habit added!');
            },

            deleteHabit(id) {
                if (!confirm('Delete this habit and all its history?')) return;
                this.data.habits = this.data.habits.filter(h => h.id !== id);
                this.save();
                this.renderHabits();
                this.renderProgress();
                this.renderWeeklyChart();
                this.showToast('Habit deleted');
            },

            selectColor(i) {
                this.selectedColor = i;
                this.renderColorPicker();
            },

            selectIcon(i) {
                this.selectedIcon = i;
                this.renderIconPicker();
            },

            closeModal() {
                document.getElementById('habitModal').classList.add('hidden');
            },

            showDatePicker() {
                document.getElementById('dateInput').value = this.currentDate;
                document.getElementById('dateModal').classList.remove('hidden');
            },

            closeDateModal() {
                document.getElementById('dateModal').classList.add('hidden');
            },

            confirmDate() {
                const val = document.getElementById('dateInput').value;
                if (val) {
                    this.currentDate = val;
                    this.updateHeaderDate();
                    this.renderHabits();
                    this.renderProgress();
                    this.renderWeeklyChart();
                }
                this.closeDateModal();
            },

            toggleMenu() {
                const modal = document.getElementById('menuModal');
                modal.classList.toggle('hidden');
            },

            closeMenu() {
                document.getElementById('menuModal').classList.add('hidden');
            },

            exportData() {
                const json = JSON.stringify(this.data, null, 2);
                const blob = new Blob([json], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `micro-habit-tracker-${formatDate(new Date())}.json`;
                a.click();
                URL.revokeObjectURL(url);
                this.closeMenu();
                this.showToast('Data exported!');
            },

            importData() {
                this.closeMenu();
                document.getElementById('importModal').classList.remove('hidden');
            },

            closeImportModal() {
                document.getElementById('importModal').classList.add('hidden');
                document.getElementById('importText').value = '';
            },

            confirmImport() {
                const text = document.getElementById('importText').value.trim();
                if (!text) {
                    this.showToast('Please paste JSON data');
                    return;
                }
                try {
                    const data = JSON.parse(text);
                    if (!Array.isArray(data.habits)) throw new Error('Invalid format');
                    if (data.habits.length > 7) data.habits = data.habits.slice(0, 7);
                    this.data = data;
                    this.save();
                    this.closeImportModal();
                    this.currentDate = formatDate(new Date());
                    this.updateHeaderDate();
                    this.renderHabits();
                    this.renderProgress();
                    this.renderWeeklyChart();
                    this.showToast('Data imported successfully!');
                } catch (e) {
                    this.showToast('Invalid JSON data');
                }
            },

            handleFileImport(event) {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('importText').value = e.target.result;
                };
                reader.readAsText(file);
            },

            resetDemo() {
                this.closeMenu();
                if (!confirm('Reset to demo data? This will erase all your data.')) return;
                this.data = getDemoData();
                this.save();
                this.currentDate = formatDate(new Date());
                this.updateHeaderDate();
                this.renderHabits();
                this.renderProgress();
                this.renderWeeklyChart();
                this.showToast('Demo data restored');
            },

            showToast(msg) {
                const toast = document.getElementById('toast');
                document.getElementById('toastMsg').textContent = msg;
                toast.classList.remove('hidden');
                setTimeout(() => toast.classList.add('hidden'), 2500);
            },

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
        };

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                app.closeModal();
                app.closeDateModal();
                app.closeMenu();
                app.closeImportModal();
            }
        });

        // Initialize
        app.init();
    </script>
</body>
</html>
