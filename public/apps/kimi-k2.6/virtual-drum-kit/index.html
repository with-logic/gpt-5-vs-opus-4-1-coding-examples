<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Virtual Drum Kit</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap');

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: #0a0a0f;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
    touch-action: manipulation;
  }

  /* Studio background with subtle grid */
  .studio-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(139, 92, 246, 0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(236, 72, 153, 0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 100%, rgba(59, 130, 246, 0.08) 0%, transparent 50%),
      linear-gradient(180deg, #0c0c14 0%, #0a0a0f 100%);
  }

  .studio-grid {
    position: fixed;
    inset: 0;
    z-index: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .app-container {
    position: relative;
    z-index: 1;
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 16px;
    max-width: 1200px;
    margin: 0 auto;
    width: 100%;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 12px;
    padding-top: 8px;
  }

  .header h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(1.5rem, 5vw, 2.5rem);
    font-weight: 900;
    letter-spacing: 0.08em;
    background: linear-gradient(135deg, #f0f0f0 0%, #a0a0b0 50%, #f0f0f0 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: 0 0 60px rgba(139, 92, 246, 0.3);
    margin-bottom: 4px;
  }

  .header p {
    font-size: 0.85rem;
    color: #6b6b7b;
    letter-spacing: 0.05em;
  }

  /* Controls bar */
  .controls-bar {
    display: flex;
    gap: 8px;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 16px;
    padding: 12px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    backdrop-filter: blur(10px);
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 18px;
    border-radius: 12px;
    border: none;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s ease;
    color: #fff;
    position: relative;
    overflow: hidden;
  }

  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 50%);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .btn:hover::before {
    opacity: 1;
  }

  .btn:active {
    transform: scale(0.95);
  }

  .btn-record {
    background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%);
    box-shadow: 0 4px 20px rgba(220, 38, 38, 0.3);
  }

  .btn-record.recording {
    animation: pulse-red 1s infinite;
  }

  @keyframes pulse-red {
    0%, 100% { box-shadow: 0 4px 20px rgba(220, 38, 38, 0.3); }
    50% { box-shadow: 0 4px 30px rgba(220, 38, 38, 0.6); }
  }

  .btn-play {
    background: linear-gradient(135deg, #059669 0%, #047857 100%);
    box-shadow: 0 4px 20px rgba(5, 150, 105, 0.3);
  }

  .btn-clear {
    background: linear-gradient(135deg, #4b5563 0%, #374151 100%);
    box-shadow: 0 4px 20px rgba(75, 85, 99, 0.2);
  }

  .btn-stop {
    background: linear-gradient(135deg, #d97706 0%, #b45309 100%);
    box-shadow: 0 4px 20px rgba(217, 119, 6, 0.3);
  }

  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none !important;
  }

  .btn svg {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
  }

  .recording-indicator {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 0.8rem;
    color: #dc2626;
    font-weight: 600;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .recording-indicator.active {
    opacity: 1;
  }

  .recording-dot {
    width: 10px;
    height: 10px;
    background: #dc2626;
    border-radius: 50%;
    animation: blink 1s infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .recording-time {
    font-family: 'Orbitron', monospace;
    font-size: 0.85rem;
    color: #a0a0b0;
    min-width: 50px;
    text-align: center;
  }

  /* Drum Kit Layout */
  .drum-kit {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    flex: 1;
    padding-bottom: 20px;
  }

  @media (max-width: 640px) {
    .drum-kit {
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    .controls-bar {
      padding: 8px;
    }
    .btn {
      padding: 10px 14px;
      font-size: 0.8rem;
    }
  }

  /* Drum Pad */
  .drum-pad {
    position: relative;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.1s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 130px;
    padding: 16px;
    overflow: hidden;
    border: 2px solid transparent;
  }

  @media (max-width: 640px) {
    .drum-pad {
      min-height: 110px;
      border-radius: 16px;
      padding: 12px;
    }
  }

  .drum-pad:active, .drum-pad.active {
    transform: scale(0.96);
  }

  .pad-inner {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    width: 100%;
  }

  .pad-icon {
    width: 48px;
    height: 48px;
    opacity: 0.7;
    transition: all 0.15s ease;
  }

  @media (max-width: 640px) {
    .pad-icon {
      width: 40px;
      height: 40px;
    }
  }

  .drum-pad:active .pad-icon, .drum-pad.active .pad-icon {
    opacity: 1;
    transform: scale(1.15);
  }

  .pad-label {
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .pad-key {
    font-family: 'Orbitron', monospace;
    font-size: 0.75rem;
    opacity: 0.5;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 6px;
    background: rgba(0,0,0,0.2);
  }

  /* Drum-specific styling */
  .pad-kick {
    background: linear-gradient(145deg, #1a1a2e 0%, #0f0f1a 100%);
    border-color: rgba(59, 130, 246, 0.25);
    box-shadow: 0 8px 32px rgba(59, 130, 246, 0.15), inset 0 1px 0 rgba(255,255,255,0.05);
  }
  .pad-kick .pad-label { color: #60a5fa; }
  .pad-kick:active, .pad-kick.active {
    border-color: rgba(59, 130, 246, 0.8);
    box-shadow: 0 8px 40px rgba(59, 130, 246, 0.4), inset 0 1px 0 rgba(255,255,255,0.1);
  }

  .pad-snare {
    background: linear-gradient(145deg, #1e1b2e 0%, #12101a 100%);
    border-color: rgba(168, 85, 247, 0.25);
    box-shadow: 0 8px 32px rgba(168, 85, 247, 0.15), inset 0 1px 0 rgba(255,255,255,0.05);
  }
  .pad-snare .pad-label { color: #c084fc; }
  .pad-snare:active, .pad-snare.active {
    border-color: rgba(168, 85, 247, 0.8);
    box-shadow: 0 8px 40px rgba(168, 85, 247, 0.4), inset 0 1px 0 rgba(255,255,255,0.1);
  }

  .pad-hihat {
    background: linear-gradient(145deg, #1e2e1e 0%, #101a10 100%);
    border-color: rgba(34, 197, 94, 0.25);
    box-shadow: 0 8px 32px rgba(34, 197, 94, 0.15), inset 0 1px 0 rgba(255,255,255,0.05);
  }
  .pad-hihat .pad-label { color: #4ade80; }
  .pad-hihat:active, .pad-hihat.active {
    border-color: rgba(34, 197, 94, 0.8);
    box-shadow: 0 8px 40px rgba(34, 197, 94, 0.4), inset 0 1px 0 rgba(255,255,255,0.1);
  }

  .pad-hihat-open {
    background: linear-gradient(145deg, #1e2e1e 0%, #101a10 100%);
    border-color: rgba(34, 197, 94, 0.25);
    box-shadow: 0 8px 32px rgba(34, 197, 94, 0.15), inset 0 1px 0 rgba(255,255,255,0.05);
  }
  .pad-hihat-open .pad-label { color: #86efac; }
  .pad-hihat-open:active, .pad-hihat-open.active {
    border-color: rgba(34, 197, 94, 0.8);
    box-shadow: 0 8px 40px rgba(34, 197, 94, 0.4), inset 0 1px 0 rgba(255,255,255,0.1);
  }

  .pad-tom-high {
    background: linear-gradient(145deg, #2e1e1e 0%, #1a1010 100%);
    border-color: rgba(239, 68, 68, 0.25);
    box-shadow: 0 8px 32px rgba(239, 68, 68, 0.15), inset 0 1px 0 rgba(255,255,255,0.05);
  }
  .pad-tom-high .pad-label { color: #f87171; }
  .pad-tom-high:active, .pad-tom-high.active {
    border-color: rgba(239, 68, 68, 0.8);
    box-shadow: 0 8px 40px rgba(239, 68, 68, 0.4), inset 0 1px 0 rgba(255,255,255,0.1);
  }

  .pad-tom-mid {
    background: linear-gradient(145deg, #2e1e1e 0%, #1a1010 100%);
    border-color: rgba(249, 115, 22, 0.25);
    box-shadow: 0 8px 32px rgba(249, 115, 22, 0.15), inset 0 1px 0 rgba(255,255,255,0.05);
  }
  .pad-tom-mid .pad-label { color: #fb923c; }
  .pad-tom-mid:active, .pad-tom-mid.active {
    border-color: rgba(249, 115, 22, 0.8);
    box-shadow: 0 8px 40px rgba(249, 115, 22, 0.4), inset 0 1px 0 rgba(255,255,255,0.1);
  }

  .pad-tom-floor {
    background: linear-gradient(145deg, #2e1e1e 0%, #1a1010 100%);
    border-color: rgba(234, 179, 8, 0.25);
    box-shadow: 0 8px 32px rgba(234, 179, 8, 0.15), inset 0 1px 0 rgba(255,255,255,0.05);
  }
  .pad-tom-floor .pad-label { color: #facc15; }
  .pad-tom-floor:active, .pad-tom-floor.active {
    border-color: rgba(234, 179, 8, 0.8);
    box-shadow: 0 8px 40px rgba(234, 179, 8, 0.4), inset 0 1px 0 rgba(255,255,255,0.1);
  }

  .pad-crash {
    background: linear-gradient(145deg, #1e2a2e 0%, #10181a 100%);
    border-color: rgba(6, 182, 212, 0.25);
    box-shadow: 0 8px 32px rgba(6, 182, 212, 0.15), inset 0 1px 0 rgba(255,255,255,0.05);
  }
  .pad-crash .pad-label { color: #22d3ee; }
  .pad-crash:active, .pad-crash.active {
    border-color: rgba(6, 182, 212, 0.8);
    box-shadow: 0 8px 40px rgba(6, 182, 212, 0.4), inset 0 1px 0 rgba(255,255,255,0.1);
  }

  .pad-ride {
    background: linear-gradient(145deg, #1e2a2e 0%, #10181a 100%);
    border-color: rgba(147, 197, 253, 0.25);
    box-shadow: 0 8px 32px rgba(147, 197, 253, 0.15), inset 0 1px 0 rgba(255,255,255,0.05);
  }
  .pad-ride .pad-label { color: #93c5fd; }
  .pad-ride:active, .pad-ride.active {
    border-color: rgba(147, 197, 253, 0.8);
    box-shadow: 0 8px 40px rgba(147, 197, 253, 0.4), inset 0 1px 0 rgba(255,255,255,0.1);
  }

  /* Visual hit flash */
  .hit-flash {
    position: absolute;
    inset: 0;
    border-radius: 20px;
    opacity: 0;
    pointer-events: none;
    z-index: 3;
  }

  .drum-pad.active .hit-flash {
    animation: flash 0.15s ease-out;
  }

  @keyframes flash {
    0% { opacity: 0.4; }
    100% { opacity: 0; }
  }

  .pad-kick .hit-flash { background: radial-gradient(circle, rgba(59,130,246,0.5) 0%, transparent 70%); }
  .pad-snare .hit-flash { background: radial-gradient(circle, rgba(168,85,247,0.5) 0%, transparent 70%); }
  .pad-hihat .hit-flash { background: radial-gradient(circle, rgba(34,197,94,0.5) 0%, transparent 70%); }
  .pad-hihat-open .hit-flash { background: radial-gradient(circle, rgba(34,197,94,0.5) 0%, transparent 70%); }
  .pad-tom-high .hit-flash { background: radial-gradient(circle, rgba(239,68,68,0.5) 0%, transparent 70%); }
  .pad-tom-mid .hit-flash { background: radial-gradient(circle, rgba(249,115,22,0.5) 0%, transparent 70%); }
  .pad-tom-floor .hit-flash { background: radial-gradient(circle, rgba(234,179,8,0.5) 0%, transparent 70%); }
  .pad-crash .hit-flash { background: radial-gradient(circle, rgba(6,182,212,0.5) 0%, transparent 70%); }
  .pad-ride .hit-flash { background: radial-gradient(circle, rgba(147,197,253,0.5) 0%, transparent 70%); }

  /* Ripple effect */
  .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    transform: scale(0);
    animation: ripple-anim 0.5s linear;
    pointer-events: none;
    z-index: 1;
  }

  @keyframes ripple-anim {
    to {
      transform: scale(4);
      opacity: 0;
    }
  }

  /* Volume/Settings */
  .settings-panel {
    display: flex;
    gap: 16px;
    justify-content: center;
    align-items: center;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .volume-control {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.8rem;
    color: #6b6b7b;
  }

  .volume-control input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100px;
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    outline: none;
  }

  .volume-control input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: linear-gradient(135deg, #a78bfa 0%, #7c3aed 100%);
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(124, 58, 237, 0.4);
  }

  .volume-control input[type="range"]::-moz-range-thumb {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: linear-gradient(135deg, #a78bfa 0%, #7c3aed 100%);
    cursor: pointer;
    border: none;
    box-shadow: 0 2px 8px rgba(124, 58, 237, 0.4);
  }

  /* Visualizer canvas */
  .visualizer-container {
    width: 100%;
    height: 60px;
    margin-bottom: 12px;
    border-radius: 12px;
    overflow: hidden;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.05);
  }

  #visualizer {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* Footer hint */
  .footer-hint {
    text-align: center;
    font-size: 0.75rem;
    color: #4b4b5b;
    padding: 8px;
    letter-spacing: 0.03em;
  }

  /* Recording track display */
  .track-display {
    display: flex;
    gap: 3px;
    align-items: center;
    height: 30px;
    padding: 0 8px;
    background: rgba(0,0,0,0.3);
    border-radius: 8px;
    overflow-x: auto;
    overflow-y: hidden;
    flex: 1;
    min-width: 120px;
    max-width: 300px;
  }

  .track-display::-webkit-scrollbar {
    height: 2px;
  }
  .track-display::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.2);
    border-radius: 1px;
  }

  .track-beat {
    width: 6px;
    height: 14px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .track-beat.kick { background: #3b82f6; }
  .track-beat.snare { background: #a855f7; }
  .track-beat.hihat { background: #22c55e; }
  .track-beat.hihat-open { background: #86efac; }
  .track-beat.tom-high { background: #ef4444; }
  .track-beat.tom-mid { background: #f97316; }
  .track-beat.tom-floor { background: #eab308; }
  .track-beat.crash { background: #06b6d4; }
  .track-beat.ride { background: #93c5fd; }

  .track-label {
    font-size: 0.7rem;
    color: #4b4b5b;
    white-space: nowrap;
  }

  /* Playback progress */
  .progress-bar {
    width: 100%;
    height: 3px;
    background: rgba(255,255,255,0.06);
    border-radius: 2px;
    margin-top: 4px;
    overflow: hidden;
    display: none;
  }

  .progress-bar.active {
    display: block;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #a78bfa, #7c3aed);
    border-radius: 2px;
    width: 0%;
    transition: width 0.1s linear;
  }

  /* Init overlay */
  .init-overlay {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(10, 10, 15, 0.95);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    backdrop-filter: blur(10px);
  }

  .init-overlay h2 {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.5rem;
    color: #e0e0e0;
  }

  .init-btn {
    padding: 16px 40px;
    font-size: 1rem;
    border-radius: 16px;
    border: none;
    background: linear-gradient(135deg, #7c3aed 0%, #5b21b6 100%);
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 8px 32px rgba(124, 58, 237, 0.4);
    transition: all 0.2s ease;
  }

  .init-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 40px rgba(124, 58, 237, 0.5);
  }

  .init-btn:active {
    transform: translateY(0);
  }

  .hidden {
    display: none !important;
  }
</style>
</head>
<body>

<div class="studio-bg"></div>
<div class="studio-grid"></div>

<div class="init-overlay" id="initOverlay">
  <h2>Virtual Drum Kit</h2>
  <button class="init-btn" id="initBtn">Tap to Start</button>
  <p style="color: #4b4b5b; font-size: 0.85rem;">Click or press keys to play drums</p>
</div>

<div class="app-container">
  <div class="header">
    <h1>VIRTUAL DRUM KIT</h1>
    <p>Music Studio Edition</p>
  </div>

  <div class="visualizer-container">
    <canvas id="visualizer"></canvas>
  </div>

  <div class="settings-panel">
    <div class="volume-control">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
      <input type="range" id="masterVolume" min="0" max="100" value="80">
      <span id="volLabel">80%</span>
    </div>
  </div>

  <div class="controls-bar">
    <button class="btn btn-record" id="recordBtn">
      <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="6"/></svg>
      Record
    </button>
    <button class="btn btn-play" id="playBtn" disabled>
      <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      Play
    </button>
    <button class="btn btn-stop" id="stopBtn" disabled>
      <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12"/></svg>
      Stop
    </button>
    <button class="btn btn-clear" id="clearBtn" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
      Clear
    </button>
    <div class="recording-indicator" id="recordingIndicator">
      <div class="recording-dot"></div>
      <span>REC</span>
    </div>
    <div class="recording-time" id="recordingTime">0.0s</div>
    <div class="track-display" id="trackDisplay">
      <span class="track-label">No recording</span>
    </div>
  </div>

  <div class="progress-bar" id="progressBar">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <div class="drum-kit" id="drumKit">
    <!-- Kick -->
    <div class="drum-pad pad-kick" data-sound="kick" data-key="a">
      <div class="hit-flash"></div>
      <div class="pad-inner">
        <svg class="pad-icon" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="32" cy="32" r="24" stroke-width="3"/><circle cx="32" cy="32" r="14" stroke-width="2"/><line x1="32" y1="8" x2="32" y2="14"/><line x1="32" y1="50" x2="32" y2="56"/><line x1="8" y1="32" x2="14" y2="32"/><line x1="50" y1="32" x2="56" y2="32"/></svg>
        <span class="pad-label">Kick</span>
        <span class="pad-key">A</span>
      </div>
    </div>

    <!-- Snare -->
    <div class="drum-pad pad-snare" data-sound="snare" data-key="s">
      <div class="hit-flash"></div>
      <div class="pad-inner">
        <svg class="pad-icon" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="32" cy="32" r="22" stroke-width="3"/><circle cx="32" cy="32" r="8"/><line x1="14" y1="14" x2="18" y2="18"/><line x1="50" y1="14" x2="46" y2="18"/><line x1="14" y1="50" x2="18" y2="46"/><line x1="50" y1="50" x2="46" y2="46"/></svg>
        <span class="pad-label">Snare</span>
        <span class="pad-key">S</span>
      </div>
    </div>

    <!-- Hi-Hat -->
    <div class="drum-pad pad-hihat" data-sound="hihat" data-key="d">
      <div class="hit-flash"></div>
      <div class="pad-inner">
        <svg class="pad-icon" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="32" cy="30" rx="20" ry="6" stroke-width="3"/><ellipse cx="32" cy="30" rx="12" ry="3"/><line x1="32" y1="30" x2="32" y2="14" stroke-width="3"/><path d="M26 14 Q32 8 38 14"/></svg>
        <span class="pad-label">Hi-Hat</span>
        <span class="pad-key">D</span>
      </div>
    </div>

    <!-- Hi-Hat Open -->
    <div class="drum-pad pad-hihat-open" data-sound="hihatOpen" data-key="f">
      <div class="hit-flash"></div>
      <div class="pad-inner">
        <svg class="pad-icon" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="32" cy="30" rx="20" ry="6" stroke-width="3"/><ellipse cx="32" cy="30" rx="12" ry="3"/><line x1="32" y1="30" x2="32" y2="14" stroke-width="3"/><path d="M24 14 Q32 6 40 14"/><path d="M20 10 L24 14 M44 10 L40 14"/></svg>
        <span class="pad-label">Open HH</span>
        <span class="pad-key">F</span>
      </div>
    </div>

    <!-- Tom High -->
    <div class="drum-pad pad-tom-high" data-sound="tomHigh" data-key="g">
      <div class="hit-flash"></div>
      <div class="pad-inner">
        <svg class="pad-icon" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="32" cy="26" rx="18" ry="8" stroke-width="3"/><path d="M14 26 Q14 42 32 42 Q50 42 50 26"/><line x1="18" y1="34" x2="18" y2="46"/><line x1="46" y1="34" x2="46" y2="46"/></svg>
        <span class="pad-label">Tom 1</span>
        <span class="pad-key">G</span>
      </div>
    </div>

    <!-- Tom Mid -->
    <div class="drum-pad pad-tom-mid" data-sound="tomMid" data-key="h">
      <div class="hit-flash"></div>
      <div class="pad-inner">
        <svg class="pad-icon" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="32" cy="26" rx="20" ry="9" stroke-width="3"/><path d="M12 26 Q12 44 32 44 Q52 44 52 26"/><line x1="16" y1="36" x2="16" y2="48"/><line x1="48" y1="36" x2="48" y2="48"/></svg>
        <span class="pad-label">Tom 2</span>
        <span class="pad-key">H</span>
      </div>
    </div>

    <!-- Tom Floor -->
    <div class="drum-pad pad-tom-floor" data-sound="tomFloor" data-key="j">
      <div class="hit-flash"></div>
      <div class="pad-inner">
        <svg class="pad-icon" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="32" cy="28" rx="22" ry="10" stroke-width="3"/><path d="M10 28 Q10 48 32 48 Q54 48 54 28"/><line x1="14" y1="40" x2="14" y2="52"/><line x1="50" y1="40" x2="50" y2="52"/></svg>
        <span class="pad-label">Floor</span>
        <span class="pad-key">J</span>
      </div>
    </div>

    <!-- Crash -->
    <div class="drum-pad pad-crash" data-sound="crash" data-key="k">
      <div class="hit-flash"></div>
      <div class="pad-inner">
        <svg class="pad-icon" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="32" cy="32" r="18" stroke-width="3"/><circle cx="32" cy="32" r="6"/><line x1="32" y1="14" x2="32" y2="4" stroke-width="3"/><path d="M18 18 L12 12 M46 18 L52 12 M18 46 L12 52 M46 46 L52 52 M32 50 L32 60 M14 32 L4 32 M60 32 L50 32"/></svg>
        <span class="pad-label">Crash</span>
        <span class="pad-key">K</span>
      </div>
    </div>
  </div>

  <div class="footer-hint">
    Press keys A-K or tap pads to play. Record your beat and play it back.
  </div>
</div>

<script>
(function() {
  'use strict';

  // ===== AUDIO ENGINE =====
  let audioCtx = null;
  let masterGain = null;
  let analyser = null;
  let volume = 0.8;
  let isPlaying = false;

  function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = volume;
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    masterGain.connect(analyser);
    analyser.connect(audioCtx.destination);
  }

  function ensureAudio() {
    if (!audioCtx) initAudio();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }

  // Sound synthesis functions
  const sounds = {
    kick: function(time) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(masterGain);

      osc.frequency.setValueAtTime(150, time);
      osc.frequency.exponentialRampToValueAtTime(0.01, time + 0.5);
      gain.gain.setValueAtTime(1, time);
      gain.gain.exponentialRampToValueAtTime(0.01, time + 0.5);

      osc.start(time);
      osc.stop(time + 0.5);

      // Click component
      const noise = audioCtx.createBufferSource();
      const noiseGain = audioCtx.createGain();
      const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.01, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
      noise.buffer = buffer;
      noise.connect(noiseGain);
      noiseGain.connect(masterGain);
      noiseGain.gain.setValueAtTime(0.5, time);
      noiseGain.gain.exponentialRampToValueAtTime(0.01, time + 0.02);
      noise.start(time);
      noise.stop(time + 0.02);
    },

    snare: function(time) {
      const noise = audioCtx.createBufferSource();
      const noiseGain = audioCtx.createGain();
      const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.2, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
      noise.buffer = buffer;

      const filter = audioCtx.createBiquadFilter();
      filter.type = 'highpass';
      filter.frequency.value = 1000;

      noise.connect(filter);
      filter.connect(noiseGain);
      noiseGain.connect(masterGain);

      noiseGain.gain.setValueAtTime(0.8, time);
      noiseGain.gain.exponentialRampToValueAtTime(0.01, time + 0.2);
      noise.start(time);
      noise.stop(time + 0.2);

      // Tone body
      const osc = audioCtx.createOscillator();
      const oscGain = audioCtx.createGain();
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(180, time);
      osc.connect(oscGain);
      oscGain.connect(masterGain);
      oscGain.gain.setValueAtTime(0.4, time);
      oscGain.gain.exponentialRampToValueAtTime(0.01, time + 0.1);
      osc.start(time);
      osc.stop(time + 0.1);
    },

    hihat: function(time) {
      const noise = audioCtx.createBufferSource();
      const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.05, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
      noise.buffer = buffer;

      const filter = audioCtx.createBiquadFilter();
      filter.type = 'highpass';
      filter.frequency.value = 7000;
      filter.Q.value = 1;

      const gain = audioCtx.createGain();
      noise.connect(filter);
      filter.connect(gain);
      gain.connect(masterGain);

      gain.gain.setValueAtTime(0.35, time);
      gain.gain.exponentialRampToValueAtTime(0.01, time + 0.05);
      noise.start(time);
      noise.stop(time + 0.05);
    },

    hihatOpen: function(time) {
      const noise = audioCtx.createBufferSource();
      const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.3, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
      noise.buffer = buffer;

      const filter = audioCtx.createBiquadFilter();
      filter.type = 'highpass';
      filter.frequency.value = 6000;
      filter.Q.value = 1;

      const gain = audioCtx.createGain();
      noise.connect(filter);
      filter.connect(gain);
      gain.connect(masterGain);

      gain.gain.setValueAtTime(0.35, time);
      gain.gain.exponentialRampToValueAtTime(0.01, time + 0.3);
      noise.start(time);
      noise.stop(time + 0.3);
    },

    tomHigh: function(time) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(300, time);
      osc.frequency.exponentialRampToValueAtTime(150, time + 0.15);
      gain.gain.setValueAtTime(0.7, time);
      gain.gain.exponentialRampToValueAtTime(0.01, time + 0.2);
      osc.connect(gain);
      gain.connect(masterGain);
      osc.start(time);
      osc.stop(time + 0.2);
    },

    tomMid: function(time) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(220, time);
      osc.frequency.exponentialRampToValueAtTime(110, time + 0.2);
      gain.gain.setValueAtTime(0.7, time);
      gain.exponentialRampToValueAtTime(0.01, time + 0.25);
      osc.connect(gain);
      gain.connect(masterGain);
      osc.start(time);
      osc.stop(time + 0.25);
    },

    tomFloor: function(time) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(130, time);
      osc.frequency.exponentialRampToValueAtTime(65, time + 0.3);
      gain.gain.setValueAtTime(0.8, time);
      gain.gain.exponentialRampToValueAtTime(0.01, time + 0.4);
      osc.connect(gain);
      gain.connect(masterGain);
      osc.start(time);
      osc.stop(time + 0.4);
    },

    crash: function(time) {
      const noise = audioCtx.createBufferSource();
      const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 2, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
      noise.buffer = buffer;

      const filter = audioCtx.createBiquadFilter();
      filter.type = 'bandpass';
      filter.frequency.value = 5000;
      filter.Q.value = 0.5;

      const gain = audioCtx.createGain();
      noise.connect(filter);
      filter.connect(gain);
      gain.connect(masterGain);

      gain.gain.setValueAtTime(0.5, time);
      gain.gain.exponentialRampToValueAtTime(0.01, time + 2);
      noise.start(time);
      noise.stop(time + 2);
    },

    ride: function(time) {
      const noise = audioCtx.createBufferSource();
      const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 1.5, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
      noise.buffer = buffer;

      const filter = audioCtx.createBiquadFilter();
      filter.type = 'bandpass';
      filter.frequency.value = 4000;
      filter.Q.value = 0.8;

      const gain = audioCtx.createGain();
      noise.connect(filter);
      filter.connect(gain);
      gain.connect(masterGain);

      gain.gain.setValueAtTime(0.35, time);
      gain.gain.exponentialRampToValueAtTime(0.01, time + 1.5);
      noise.start(time);
      noise.stop(time + 1.5);
    }
  };

  function playSound(name) {
    ensureAudio();
    const time = audioCtx.currentTime;
    if (sounds[name]) {
      sounds[name](time);
      addVisualHit(name);
    }
  }

  // ===== VISUALIZER =====
  const canvas = document.getElementById('visualizer');
  const ctx = canvas.getContext('2d');
  let animationId = null;

  function resizeCanvas() {
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width * window.devicePixelRatio;
    canvas.height = rect.height * window.devicePixelRatio;
    ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  function drawVisualizer() {
    if (!analyser) {
      animationId = requestAnimationFrame(drawVisualizer);
      return;
    }
    const bufferLength = analyser.frequencyBinCount;
    const dataArray = new Uint8Array(bufferLength);
    analyser.getByteFrequencyData(dataArray);

    const width = canvas.width / window.devicePixelRatio;
    const height = canvas.height / window.devicePixelRatio;

    ctx.clearRect(0, 0, width, height);

    const barWidth = (width / bufferLength) * 2.5;
    let x = 0;

    for (let i = 0; i < bufferLength; i++) {
      const barHeight = (dataArray[i] / 255) * height;
      const r = 124 + (dataArray[i] / 255) * 100;
      const g = 58 + (dataArray[i] / 255) * 80;
      const b = 237;

      ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${0.3 + (dataArray[i] / 255) * 0.5})`;
      ctx.fillRect(x, height - barHeight, barWidth, barHeight);
      x += barWidth + 1;
    }

    animationId = requestAnimationFrame(drawVisualizer);
  }
  drawVisualizer();

  // ===== RECORDING =====
  let isRecording = false;
  let recordingStartTime = 0;
  let recordedNotes = [];
  let playbackTimeouts = [];
  let recordingTimerInterval = null;

  const recordBtn = document.getElementById('recordBtn');
  const playBtn = document.getElementById('playBtn');
  const stopBtn = document.getElementById('stopBtn');
  const clearBtn = document.getElementById('clearBtn');
  const recordingIndicator = document.getElementById('recordingIndicator');
  const recordingTime = document.getElementById('recordingTime');
  const trackDisplay = document.getElementById('trackDisplay');
  const progressBar = document.getElementById('progressBar');
  const progressFill = document.getElementById('progressFill');

  function updateTrackDisplay() {
    if (recordedNotes.length === 0) {
      trackDisplay.innerHTML = '<span class="track-label">No recording</span>';
      return;
    }
    trackDisplay.innerHTML = '';
    const totalDuration = recordedNotes[recordedNotes.length - 1].time;
    const segments = Math.min(80, Math.max(20, Math.floor(totalDuration * 10)));
    const segmentDuration = totalDuration / segments;

    for (let i = 0; i < segments; i++) {
      const start = i * segmentDuration;
      const end = (i + 1) * segmentDuration;
      const notesInSegment = recordedNotes.filter(n => n.time >= start && n.time < end);
      const beat = document.createElement('div');
      beat.className = 'track-beat';
      if (notesInSegment.length > 0) {
        beat.classList.add(notesInSegment[0].sound);
      }
      trackDisplay.appendChild(beat);
    }
  }

  recordBtn.addEventListener('click', () => {
    ensureAudio();
    if (isRecording) {
      stopRecording();
    } else {
      startRecording();
    }
  });

  function startRecording() {
    isRecording = true;
    recordedNotes = [];
    recordingStartTime = audioCtx ? audioCtx.currentTime : 0;
    recordBtn.classList.add('recording');
    recordBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12"/></svg> Stop';
    recordingIndicator.classList.add('active');
    playBtn.disabled = true;
    stopBtn.disabled = true;
    clearBtn.disabled = true;
    progressBar.classList.remove('active');

    recordingTimerInterval = setInterval(() => {
      if (audioCtx) {
        const elapsed = (audioCtx.currentTime - recordingStartTime).toFixed(1);
        recordingTime.textContent = elapsed + 's';
      }
    }, 100);
  }

  function stopRecording() {
    isRecording = false;
    recordBtn.classList.remove('recording');
    recordBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="6"/></svg> Record';
    recordingIndicator.classList.remove('active');
    clearInterval(recordingTimerInterval);

    if (recordedNotes.length > 0) {
      playBtn.disabled = false;
      clearBtn.disabled = false;
      updateTrackDisplay();
    }
  }

  playBtn.addEventListener('click', () => {
    if (recordedNotes.length === 0) return;
    ensureAudio();
    playbackRecorded();
  });

  function playbackRecorded() {
    if (isPlaying) return;
    isPlaying = true;
    playBtn.disabled = true;
    recordBtn.disabled = true;
    stopBtn.disabled = false;
    clearBtn.disabled = true;

    const totalDuration = recordedNotes[recordedNotes.length - 1].time;
    progressBar.classList.add('active');
    progressFill.style.width = '0%';

    recordedNotes.forEach(note => {
      const timeout = setTimeout(() => {
        playSound(note.sound);
        highlightPad(note.sound);
      }, note.time * 1000);
      playbackTimeouts.push(timeout);
    });

    // Progress bar
    const progressStart = performance.now();
    function updateProgress() {
      if (!isPlaying) return;
      const elapsed = (performance.now() - progressStart) / 1000;
      const pct = Math.min(100, (elapsed / totalDuration) * 100);
      progressFill.style.width = pct + '%';
      if (pct < 100) {
        requestAnimationFrame(updateProgress);
      }
    }
    requestAnimationFrame(updateProgress);

    const endTimeout = setTimeout(() => {
      stopPlayback();
    }, totalDuration * 1000 + 200);
    playbackTimeouts.push(endTimeout);
  }

  stopBtn.addEventListener('click', stopPlayback);

  function stopPlayback() {
    isPlaying = false;
    playbackTimeouts.forEach(t => clearTimeout(t));
    playbackTimeouts = [];
    playBtn.disabled = false;
    recordBtn.disabled = false;
    stopBtn.disabled = true;
    clearBtn.disabled = false;
    progressBar.classList.remove('active');
    progressFill.style.width = '0%';
  }

  clearBtn.addEventListener('click', () => {
    recordedNotes = [];
    playBtn.disabled = true;
    clearBtn.disabled = true;
    trackDisplay.innerHTML = '<span class="track-label">No recording</span>';
    recordingTime.textContent = '0.0s';
    progressBar.classList.remove('active');
    progressFill.style.width = '0%';
  });

  // ===== DRUM PADS =====
  const pads = document.querySelectorAll('.drum-pad');
  const keyMap = {};

  pads.forEach(pad => {
    const sound = pad.dataset.sound;
    const key = pad.dataset.key;
    keyMap[key] = sound;

    function trigger(e) {
      if (e) {
        e.preventDefault();
        e.stopPropagation();
      }
      ensureAudio();
      playSound(sound);
      animatePad(pad);

      if (isRecording && audioCtx) {
        const time = audioCtx.currentTime - recordingStartTime;
        recordedNotes.push({ sound, time });
      }
    }

    pad.addEventListener('mousedown', trigger);
    pad.addEventListener('touchstart', trigger, { passive: false });
  });

  function animatePad(pad) {
    pad.classList.add('active');
    setTimeout(() => pad.classList.remove('active'), 150);

    // Ripple
    const ripple = document.createElement('div');
    ripple.className = 'ripple';
    const rect = pad.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height);
    ripple.style.width = ripple.style.height = size + 'px';
    ripple.style.left = (rect.width / 2 - size / 2) + 'px';
    ripple.style.top = (rect.height / 2 - size / 2) + 'px';
    pad.appendChild(ripple);
    setTimeout(() => ripple.remove(), 500);
  }

  function highlightPad(soundName) {
    const pad = document.querySelector(`.drum-pad[data-sound="${soundName}"]`);
    if (pad) animatePad(pad);
  }

  // Add visual hit to track display during recording
  function addVisualHit(sound) {
    if (!isRecording) return;
  }

  // Keyboard
  const activeKeys = new Set();

  document.addEventListener('keydown', (e) => {
    const key = e.key.toLowerCase();
    if (activeKeys.has(key)) return;
    activeKeys.add(key);

    if (keyMap[key]) {
      e.preventDefault();
      ensureAudio();
      playSound(keyMap[key]);
      const pad = document.querySelector(`.drum-pad[data-sound="${keyMap[key]}"]`);
      if (pad) animatePad(pad);

      if (isRecording && audioCtx) {
        const time = audioCtx.currentTime - recordingStartTime;
        recordedNotes.push({ sound: keyMap[key], time });
      }
    }
  });

  document.addEventListener('keyup', (e) => {
    activeKeys.delete(e.key.toLowerCase());
  });

  // Volume
  const volSlider = document.getElementById('masterVolume');
  const volLabel = document.getElementById('volLabel');
  volSlider.addEventListener('input', (e) => {
    volume = e.target.value / 100;
    volLabel.textContent = e.target.value + '%';
    if (masterGain) masterGain.gain.value = volume;
  });

  // Init overlay
  const initOverlay = document.getElementById('initOverlay');
  const initBtn = document.getElementById('initBtn');

  function dismissOverlay() {
    initOverlay.classList.add('hidden');
    ensureAudio();
  }

  initBtn.addEventListener('click', dismissOverlay);
  initOverlay.addEventListener('click', (e) => {
    if (e.target === initOverlay) dismissOverlay();
  });

  // Pre-init on first interaction attempt
  document.addEventListener('click', () => {
    if (initOverlay.classList.contains('hidden')) {
      ensureAudio();
    }
  }, { once: true });

  // Stop all on page visibility change
  document.addEventListener('visibilitychange', () => {
    if (document.hidden && isPlaying) {
      stopPlayback();
    }
  });

})();
</script>
</body>
</html>
