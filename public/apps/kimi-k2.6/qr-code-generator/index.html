<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custom QR Code Generator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <style>
    input[type="color"] {
      -webkit-appearance: none;
      appearance: none;
      border: none;
      width: 2.5rem;
      height: 2.5rem;
      border-radius: 9999px;
      overflow: hidden;
      cursor: pointer;
      padding: 0;
      background: none;
    }
    input[type="color"]::-webkit-color-swatch-wrapper {
      padding: 0;
    }
    input[type="color"]::-webkit-color-swatch {
      border: 2px solid #e5e7eb;
      border-radius: 9999px;
    }
    input[type="color"]::-moz-color-swatch {
      border: 2px solid #e5e7eb;
      border-radius: 9999px;
    }
    .fade-in {
      animation: fadeIn 0.4s ease-out both;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4 font-sans text-gray-900">
  <main class="bg-white rounded-2xl shadow-xl w-full max-w-xl p-6 md:p-8 space-y-6 fade-in">
    <div class="text-center space-y-1">
      <h1 class="text-2xl md:text-3xl font-bold tracking-tight">Custom QR Code Generator</h1>
      <p class="text-sm text-gray-500">Generate, customize, and download QR codes instantly.</p>
    </div>

    <div class="relative w-full aspect-square bg-gray-50 rounded-xl border border-gray-100 overflow-hidden">
      <canvas id="qr-canvas" width="800" height="800" class="w-full h-full block"></canvas>
      <div id="qr-error" class="absolute inset-0 flex items-center justify-center hidden">
        <span class="text-red-600 font-medium bg-white/95 px-4 py-2 rounded-lg shadow-sm border border-red-100">Text too long for QR code</span>
      </div>
    </div>

    <div class="space-y-4">
      <div>
        <label for="text-input" class="block text-sm font-medium text-gray-700 mb-1">Text or URL</label>
        <input type="text" id="text-input" placeholder="https://example.com"
               class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none transition text-base"
               value="https://example.com">
      </div>

      <div class="flex items-center justify-between gap-4">
        <div class="flex items-center gap-4">
          <div class="flex flex-col items-center gap-1">
            <label for="fg-color" class="text-[10px] font-semibold text-gray-400 uppercase tracking-wider">Foreground</label>
            <input type="color" id="fg-color" value="#000000" title="Foreground Color">
          </div>
          <div class="flex flex-col items-center gap-1">
            <label for="bg-color" class="text-[10px] font-semibold text-gray-400 uppercase tracking-wider">Background</label>
            <input type="color" id="bg-color" value="#ffffff" title="Background Color">
          </div>
        </div>

        <button id="download-btn" class="py-3 px-6 bg-gray-900 hover:bg-gray-800 active:bg-gray-950 text-white font-semibold rounded-lg shadow-md hover:shadow-lg transition-all duration-200 flex items-center justify-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
          </svg>
          Download PNG
        </button>
      </div>
    </div>
  </main>

  <script>
    (function() {
      const canvas = document.getElementById('qr-canvas');
      const ctx = canvas.getContext('2d');
      const textInput = document.getElementById('text-input');
      const fgColor = document.getElementById('fg-color');
      const bgColor = document.getElementById('bg-color');
      const downloadBtn = document.getElementById('download-btn');
      const errorOverlay = document.getElementById('qr-error');

      let debounceTimer;

      function drawQR() {
        const text = textInput.value;
        const fg = fgColor.value;
        const bg = bgColor.value;

        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        if (!text) {
          ctx.fillStyle = '#9ca3af';
          ctx.font = 'bold 28px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('Enter text to generate QR code', canvas.width / 2, canvas.height / 2);
          errorOverlay.classList.add('hidden');
          return;
        }

        try {
          const qr = qrcode(0, 'M');
          qr.addData(text);
          qr.make();

          const count = qr.getModuleCount();
          const margin = 4;
          const totalModules = count + margin * 2;
          const cellSize = Math.floor(canvas.width / totalModules);
          const offset = Math.floor((canvas.width - cellSize * totalModules) / 2);

          ctx.fillStyle = fg;
          for (let r = 0; r < count; r++) {
            for (let c = 0; c < count; c++) {
              if (qr.isDark(r, c)) {
                ctx.fillRect(
                  offset + (c + margin) * cellSize,
                  offset + (r + margin) * cellSize,
                  cellSize,
                  cellSize
                );
              }
            }
          }
          errorOverlay.classList.add('hidden');
        } catch (e) {
          errorOverlay.classList.remove('hidden');
          ctx.fillStyle = bg;
          ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
      }

      function debouncedDraw() {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(drawQR, 120);
      }

      function downloadPNG() {
        const link = document.createElement('a');
        link.download = 'qr-code.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      }

      textInput.addEventListener('input', debouncedDraw);
      fgColor.addEventListener('input', drawQR);
      bgColor.addEventListener('input', drawQR);
      downloadBtn.addEventListener('click', downloadPNG);

      drawQR();
    })();
  </script>
</body>
</html>
