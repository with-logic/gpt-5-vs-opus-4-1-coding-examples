<html lang="en">
<head>

<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;overscroll-behavior:none}
body{font-family:'Fredoka','Comic Sans MS','Chalkboard SE',ui-rounded,sans-serif;background:#0a1130;color:#fff;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;touch-action:manipulation}
#scene{position:fixed;inset:0;overflow:hidden;background:linear-gradient(180deg,#0a0f2e 0%,#151c48 28%,#28376f 52%,#49629f 74%,#7d95cf 100%)}
#scene::before{content:'';position:absolute;inset:0;background:radial-gradient(60% 40% at 50% 80%,rgba(255,186,120,.16),transparent 70%);pointer-events:none;z-index:1}
.aur{position:absolute;width:60vw;height:36vh;border-radius:50%;filter:blur(70px);opacity:.42;pointer-events:none;z-index:1}
.a1{left:-10%;top:-8%;background:radial-gradient(closest-side,#34d399,transparent 70%);animation:aurA 16s ease-in-out infinite alternate}
.a2{right:-8%;top:-6%;background:radial-gradient(closest-side,#8b5cf6,transparent 70%);animation:aurB 20s ease-in-out infinite alternate}
@keyframes aurA{to{transform:translate(7vw,4vh) scale(1.2)}}
@keyframes aurB{to{transform:translate(-6vw,5vh) scale(1.15) rotate(6deg)}}
#stars{position:absolute;inset:0;z-index:1;pointer-events:none}
.st{position:absolute;border-radius:50%;background:#fff;box-shadow:0 0 6px rgba(255,255,255,.9);animation:tw var(--d,3s) ease-in-out var(--dl,0s) infinite}
@keyframes tw{0%,100%{opacity:.15;transform:scale(.6)}50%{opacity:1;transform:scale(1.15)}}
#moon{position:absolute;top:7%;right:5%;font-size:clamp(54px,8.5vw,92px);z-index:2;pointer-events:none;filter:drop-shadow(0 0 18px rgba(255,244,200,.85)) drop-shadow(0 0 60px rgba(255,238,170,.45));animation:bob 7s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
#hills{position:absolute;left:0;right:0;bottom:0;width:100%;height:36%;z-index:3;pointer-events:none}
.win{animation:winTw 3.6s ease-in-out infinite}
@keyframes winTw{0%,100%{opacity:1}50%{opacity:.5}}
#garland{position:absolute;top:0;left:0;width:100%;height:110px;z-index:4;pointer-events:none}
.bulb{transform-box:fill-box;transform-origin:center;animation:bulb 1.7s ease-in-out infinite alternate}
@keyframes bulb{from{opacity:.5;transform:scale(.8)}to{opacity:1;transform:scale(1.12)}}
.gsp{position:absolute;border-radius:50%;background:#fff;box-shadow:0 0 6px 1px rgba(255,255,255,.9);z-index:4;pointer-events:none;animation:tw 2.8s ease-in-out infinite}
.vignette{position:absolute;inset:0;pointer-events:none;z-index:5;background:radial-gradient(120% 90% at 50% 45%,transparent 55%,rgba(4,7,24,.5))}
#title{position:absolute;top:10px;left:50%;transform:translateX(-50%);display:flex;align-items:baseline;z-index:30;white-space:nowrap}
.tl{pointer-events:auto;cursor:pointer;font-weight:700;font-size:clamp(22px,4.6vw,44px);animation:floaty 2.8s ease-in-out infinite;text-shadow:0 3px 0 rgba(8,10,36,.4),0 0 18px rgba(255,255,255,.28)}
.tl.deco{pointer-events:none;font-size:clamp(18px,3.6vw,34px)}
.tl.sp{width:.45em}
@keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.tl.jump{animation:jump .45s ease}
@keyframes jump{30%{transform:translateY(-18px) scale(1.25) rotate(-7deg)}}
#itemsLayer{position:absolute;inset:0;z-index:10;pointer-events:none}
.item{position:absolute;width:1em;height:1em;pointer-events:auto;cursor:grab;touch-action:none;transform:translate(-50%,-50%) rotate(var(--rot,0deg));filter:drop-shadow(0 6px 6px rgba(3,8,30,.45));transition:filter .2s}
.em{display:block;font-size:inherit;line-height:1;transform-origin:50% 62%}
.item:hover .em{transform:scale(1.09)}
.item.lifting{cursor:grabbing;filter:drop-shadow(0 18px 16px rgba(3,8,30,.55))}
.item.lifting .em{transform:scale(1.16)}
.wiggle{animation:wig .55s ease}
@keyframes wig{0%{transform:rotate(0)}20%{transform:rotate(-12deg) scale(1.15)}45%{transform:rotate(10deg) scale(1.1)}70%{transform:rotate(-6deg) scale(1.05)}100%{transform:rotate(0)}}
.a-swing{animation:swing 2.6s ease-in-out infinite;transform-origin:50% 6%}
@keyframes swing{0%,100%{transform:rotate(-11deg)}50%{transform:rotate(11deg)}}
.a-pulse{animation:pulse 2.4s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1);filter:brightness(1)}50%{transform:scale(1.13);filter:brightness(1.3)}}
.a-spin{animation:spin 15s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.a-flicker{animation:flick 1.9s ease-in-out infinite}
@keyframes flick{0%,100%{filter:brightness(1) drop-shadow(0 0 5px rgba(255,176,60,.55))}50%{filter:brightness(1.18) drop-shadow(0 0 14px rgba(255,190,80,.95))}}
.lights{position:absolute;inset:0;pointer-events:none}
.light{position:absolute;width:7.5%;height:6%;border-radius:50%;background:var(--c);box-shadow:0 0 8px 2px var(--c);animation:tw 1.5s ease-in-out infinite}
.steam{position:absolute;bottom:80%;width:9%;height:26%;border-radius:999px;background:linear-gradient(to top,rgba(255,255,255,0),rgba(255,255,255,.9));filter:blur(1.5px);opacity:0;animation:steam 2.3s ease-in-out infinite;pointer-events:none}
@keyframes steam{0%{transform:translateY(8px) scaleX(1);opacity:0}35%{opacity:.85}100%{transform:translateY(-16px) translateX(4px) scaleX(.55);opacity:0}}
#snow{position:absolute;inset:0;z-index:500;pointer-events:none}
.shoot{position:absolute;width:120px;height:2.5px;border-radius:2px;background:linear-gradient(90deg,#fff,rgba(255,255,255,0));box-shadow:0 0 10px #fff;z-index:2;pointer-events:none}
#count{position:fixed;top:12px;left:12px;z-index:900;background:rgba(8,12,34,.55);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.18);padding:7px 14px;border-radius:999px;font-size:14px;font-weight:600;pointer-events:none}
#controls{position:fixed;top:12px;right:12px;display:flex;gap:8px;z-index:1000}
.cbtn{width:48px;height:48px;border-radius:15px;border:1px solid rgba(255,255,255,.25);background:rgba(10,15,40,.55);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);color:#fff;font-size:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:transform .15s,box-shadow .25s,background .2s;font-family:inherit;padding:0}
.cbtn small{font-size:8px;letter-spacing:.4px;opacity:.85;margin-top:-1px;text-transform:uppercase}
.cbtn:hover{transform:scale(1.12)}
.cbtn:active{transform:scale(.95)}
.cbtn.on{box-shadow:0 0 0 2px #7dd3fc,0 0 20px rgba(125,211,252,.65);background:rgba(30,90,150,.65)}
#tray{position:fixed;left:50%;transform:translateX(-50%);bottom:10px;max-width:96vw;display:flex;gap:2px;overflow-x:auto;padding:8px 10px;background:rgba(8,12,34,.62);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.18);border-radius:22px;z-index:1000;scrollbar-width:none}
#tray::-webkit-scrollbar{display:none}
.tray-item{flex:0 0 auto;width:64px;padding:6px 2px 5px;border:none;background:transparent;border-radius:15px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:grab;touch-action:none;transition:background .15s,transform .15s;font-family:inherit;color:#fff}
.tray-item:hover{background:rgba(255,255,255,.13)}
.tray-item:hover .ti-em{transform:translateY(-3px) scale(1.14)}
.tray-item.dragging{opacity:.35}
.ti-em{font-size:32px;line-height:1;filter:drop-shadow(0 3px 3px rgba(0,0,0,.45));pointer-events:none;transition:transform .15s}
.ti-name{font-size:9px;color:#c7d4ff;pointer-events:none;font-weight:600;letter-spacing:.2px}
#hint{position:fixed;left:50%;bottom:96px;transform:translateX(-50%);background:rgba(8,12,34,.55);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);padding:7px 16px;border-radius:999px;font-size:12.5px;color:#dfe7ff;border:1px solid rgba(255,255,255,.15);z-index:900;transition:opacity .7s;white-space:nowrap;max-width:94vw;overflow:hidden;text-overflow:ellipsis;pointer-events:none}
#hint.fade{opacity:0}
#ghost{position:fixed;z-index:1600;pointer-events:none;font-size:58px;transform:translate(-50%,-50%);display:none;filter:drop-shadow(0 12px 12px rgba(0,0,0,.5))}
.bp{position:fixed;z-index:2000;pointer-events:none;will-change:transform,opacity}
@media (max-width:640px){
 #title{left:10px;transform:none}
 #title .tl{font-size:21px}
 #title .tl.deco{font-size:16px}
 #count{top:62px;font-size:12px;padding:5px 11px}
 #controls{width:84px;flex-wrap:wrap;justify-content:flex-end}
 .cbtn{width:38px;height:38px;font-size:16px;border-radius:12px}
 .tray-item{width:54px}
 .ti-em{font-size:27px}
 #hint{font-size:11px;bottom:90px}
 #moon{top:11%}
}
</style>
</head>
<body>
<div id="scene">
  <div class="aur a1"></div><div class="aur a2"></div>

  <div id="moon">🌝</div>
  <svg id="hills" viewBox="0 0 1440 320" preserveAspectRatio="none">
    <path d="M0 130 Q360 50 720 120 T1440 100 V320 H0 Z" fill="#b9cbf0" opacity=".9"/>

      <g transform="translate(810,162) scale(.9)"><polygon points="0,36 17,0 34,36"/><polygon points="3,52 17,22 31,52"/><rect x="14" y="50" width="6" height="14" fill="#101a3c"/></g>
      <g transform="translate(1240,152) scale(1.2)"><polygon points="0,36 17,0 34,36"/><polygon points="3,52 17,22 31,52"/><rect x="14" y="50" width="6" height="14" fill="#101a3c"/></g>
      <g transform="translate(1355,168) scale(.8)"><polygon points="0,36 17,0 34,36"/><polygon points="3,52 17,22 31,52"/><rect x="14" y="50" width="6" height="14" fill="#101a3c"/></g>
    </g>

  <div id="title"></div>

</div>

  <button class="cbtn" id="btnMusic" title="Music on/off">🎵<small>music</small></button>
  <button class="cbtn" id="btnSnow" title="Snow amount">❄️<small id="snowLbl">cozy</small></button>

<script>
'use strict';
const $=s=>document.querySelector(s);
const rand=(a,b)=>a+Math.random()*(b-a);
const clamp=(v,a,b)=>Math.min(b,Math.max(a,v));
const scene=$('#scene'), itemsLayer=$('#itemsLayer'), tray=$('#tray'), ghost=$('#ghost');
const btnMusic=$('#btnMusic'), btnSnow=$('#btnSnow'), btnMagic=$('#btnMagic'), btnClear=$('#btnClear');
const snowLbl=$('#snowLbl'), countEl=$('#count'), hintEl=$('#hint');

/* ================= AUDIO ================= */
let AC=null, master=null, noiseBuf=null;
function audio(){
  if(!AC){
    try{
      AC=new (window.AudioContext||window.webkitAudioContext)();
      master=AC.createGain(); master.gain.value=.85; master.connect(AC.destination);
      noiseBuf=AC.createBuffer(1,AC.sampleRate*0.5,AC.sampleRate);
      const d=noiseBuf.getChannelData(0);
      for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
    }catch(e){ AC=null; }
  }
  if(AC&&AC.state==='suspended')AC.resume();
  return AC;
}
function tone(o){
  if(!AC)return;
  const {f=440,f2=null,t=0,d=.25,type='sine',v=.2}=o;
  const t0=AC.currentTime+Math.max(0,t);
  const osc=AC.createOscillator(), g=AC.createGain();
  osc.type=type; osc.frequency.setValueAtTime(Math.max(1,f),t0);
  if(f2)osc.frequency.exponentialRampToValueAtTime(Math.max(1,f2),t0+d);
  g.gain.setValueAtTime(.0001,t0);
  g.gain.linearRampToValueAtTime(v,t0+.012);
  g.gain.exponentialRampToValueAtTime(.0001,t0+d);
  osc.connect(g); g.connect(master);
  osc.start(t0); osc.stop(t0+d+.1);
}
function noise(o){
  if(!AC)return;
  const {t=0,d=.25,v=.2,hp=null,lp=null,lp2=null}=o;
  const t0=AC.currentTime+Math.max(0,t);
  const src=AC.createBufferSource(); src.buffer=noiseBuf; src.loop=true;
  const g=AC.createGain();
  g.gain.setValueAtTime(.0001,t0);
  g.gain.linearRampToValueAtTime(v,t0+.008);
  g.gain.exponentialRampToValueAtTime(.0001,t0+d);
  let n=src;
  if(hp){const f=AC.createBiquadFilter();f.type='highpass';f.frequency.value=hp;n.connect(f);n=f;}
  if(lp){const f=AC.createBiquadFilter();f.type='lowpass';f.frequency.setValueAtTime(lp,t0);if(lp2)f.frequency.exponentialRampToValueAtTime(Math.max(20,lp2),t0+d);n.connect(f);n=f;}
  n.connect(g); g.connect(master);
  src.start(t0); src.stop(t0+d+.1);
}
function xylo(i){
  const steps=[0,2,4,7,9];
  const s=Math.floor(i/5)*12+steps[i%5];
  const f=523.25*Math.pow(2,s/12);
  tone({f,d:.4,v:.2}); tone({f:f*2,d:.25,v:.05,type:'triangle'});
}
const SFX={
  pop(){tone({f:520,f2:170,d:.13,v:.3});},
  poplow(){tone({f:380,f2:130,d:.14,v:.3});},
  place(){SFX.pop(); tone({f:1046,t:.03,d:.18,type:'triangle',v:.14});},
  thud(){tone({f:150,f2:60,d:.12,v:.3}); noise({d:.08,v:.12,lp:400});},
  jingle(){for(let i=0;i<3;i++){tone({f:2100+Math.random()*400,t:i*.07,d:.45,type:'triangle',v:.12}); noise({t:i*.07,d:.05,v:.05,hp:6500});}},
  bell(){tone({f:880,d:1.2,v:.22}); tone({f:1318,d:.9,v:.1}); tone({f:1760,d:.5,v:.05});},
  boing(){tone({f:300,f2:70,d:.3,v:.28}); tone({f:150,f2:340,t:.16,d:.18,v:.12});},
  sparkle(){[523.25,659.25,783.99,1046.5].forEach((f,i)=>tone({f,t:i*.06,d:.3,type:'triangle',v:.14}));},
  poof(){noise({d:.28,v:.28,lp:900,lp2:80}); tone({f:220,f2:60,d:.2,v:.15});},
  chirp(){tone({f:1350,d:.07,type:'square',v:.07}); tone({f:1750,t:.1,d:.08,type:'square',v:.07});},
  clop(){[0,.13,.32,.45].forEach((t,i)=>tone({f:i%2?260:300,f2:110,t,d:.06,v:.25}));},
  hoho(){[0,.16,.32].forEach((t,i)=>tone({f:170-i*15,f2:120-i*10,t,d:.14,type:'triangle',v:.3}));},
  whoosh(){noise({d:.4,v:.16,lp:2500,lp2:250});},
  whoosh2(){noise({d:.22,v:.14,lp:3000,lp2:400});},
  chime(){tone({f:1568,d:1.1,v:.1}); tone({f:2093,d:.9,v:.05});},
  pling(){tone({f:1976,d:.3,type:'triangle',v:.18}); tone({f:2637,t:.05,d:.25,type:'triangle',v:.08});},
  low(){tone({f:120,d:.3,type:'triangle',v:.3}); tone({f:90,t:.05,d:.3,type:'triangle',v:.15});},
  warm(){tone({f:392,d:.5,type:'triangle',v:.14}); tone({f:523.25,t:.06,d:.5,type:'triangle',v:.14});},
  warm2(){tone({f:175,f2:150,d:.25,type:'triangle',v:.25}); tone({f:262,t:.12,d:.2,type:'triangle',v:.12});},
  crunch(){noise({d:.12,v:.22,lp:1800}); tone({f:180,f2:90,d:.1,v:.12});},
  knock(){[0,.15].forEach(t=>{tone({f:220,f2:90,t,d:.08,v:.3}); noise({t,d:.05,v:.1,lp:700});});},
  twinkle(){tone({f:2500,f2:3400,d:.18,v:.06});},
  twinkleHi(){tone({f:3100,f2:3900,d:.2,v:.05});},
  xylo
};

/* ================= MUSIC: Jingle Bells ================= */
const NOTES={C4:261.63,D4:293.66,E4:329.63,F4:349.23,G4:392.0};
const BEAT=.4;
const SONG=[
 ['E4',1],['E4',1],['E4',2],['E4',1],['E4',1],['E4',2],
 ['E4',1],['G4',1],['C4',1.5],['D4',.5],['E4',4],
 ['F4',1],['F4',1],['F4',1.5],['F4',.5],['F4',1],['E4',1],['E4',1],['E4',.5],['E4',.5],
 ['E4',1],['D4',1],['D4',1],['E4',1],['D4',2],['G4',2],
 ['E4',1],['E4',1],['E4',2],['E4',1],['E4',1],['E4',2],
 ['E4',1],['G4',1],['C4',1.5],['D4',.5],['E4',4],
 ['F4',1],['F4',1],['F4',1.5],['F4',.5],['F4',1],['E4',1],['E4',1],['E4',.5],['E4',.5],
 ['G4',1],['G4',1],['F4',1],['D4',1],['C4',4]
];
let musicOn=false, mTimer=null, mNext=0, mIdx=0;
function musicTick(){
  if(!AC)return;
  while(mNext<AC.currentTime+.7){
    const [n,b]=SONG[mIdx]; const dur=b*BEAT; const off=Math.max(0,mNext-AC.currentTime);
    tone({f:NOTES[n],t:off,d:dur*.9,type:'triangle',v:.13});
    tone({f:NOTES[n]*2,t:off,d:dur*.5,v:.03});
    for(let k=0;k<b;k++)noise({t:off+k*BEAT,d:.03,v:.025,hp:7500});
    mNext+=dur; mIdx=(mIdx+1)%SONG.length;
  }
}
function startMusic(){
  if(musicOn)return;
  if(!audio())return;
  musicOn=true; mNext=AC.currentTime+.2; mIdx=0;
  mTimer=setInterval(musicTick,180);
  btnMusic.classList.add('on');
}
function stopMusic(){
  musicOn=false; clearInterval(mTimer); mTimer=null;
  btnMusic.classList.remove('on');
}

/* ================= ITEMS ================= */
const ITEMS=[
 {id:'tree',     emoji:'🎄',  name:'Tree',      size:104, sound:'jingle',   lights:true},
 {id:'snowman',  emoji:'⛄',  name:'Snowman',   size:82,  sound:'boing'},
 {id:'santa',    emoji:'🎅',  name:'Santa',     size:76,  sound:'hoho'},
 {id:'reindeer', emoji:'🦌',  name:'Reindeer',  size:74,  sound:'clop'},
 {id:'penguin',  emoji:'🐧',  name:'Penguin',   size:58,  sound:'chirp'},
 {id:'bear',     emoji:'🐻‍❄️', name:'Polar Bear',size:72, sound:'low'},
 {id:'present',  emoji:'🎁',  name:'Gift',      size:54,  sound:'pop'},
 {id:'bell',     emoji:'🔔',  name:'Bell',      size:50,  sound:'bell',     anim:'a-swing'},
 {id:'star',     emoji:'⭐',  name:'Star',      size:52,  sound:'sparkle',  anim:'a-pulse'},
 {id:'star2',    emoji:'🌟',  name:'Glow Star', size:52,  sound:'sparkle',  anim:'a-pulse'},

const TREE_LIGHTS=[[50,20],[42,32],[58,33],[36,45],[50,42],[64,47],[31,58],[45,56],[59,60],[71,62],[26,71],[40,70],[54,73],[68,74],[34,82],[50,84],[63,84]];
const LCOLORS=['#ffd23f','#ff5d5d','#60a5fa','#f472b6','#4ade80'];
const placed=new Map();

function setDepth(el,y){ el.style.zIndex=100+Math.round(y); }
function updateCount(){ countEl.textContent='🎨 '+placed.size; }

function makeItem(def,x,y,opts={}){
  const el=document.createElement('div');
  el.className='item'; el.dataset.id=def.id;
  el.style.left=x+'%'; el.style.top=y+'%';
  el.style.setProperty('--rot',(opts.rot!==undefined?opts.rot:rand(-7,7)).toFixed(1)+'deg');
  el.style.fontSize=(opts.size||def.size||60)+'px';
  const em=document.createElement('span');
  em.className='em'+(def.anim?' '+def.anim:'');
  em.textContent=def.emoji;
  el.appendChild(em);
  if(def.lights){
    const L=document.createElement('div'); L.className='lights';
    TREE_LIGHTS.forEach((c,i)=>{
      const d=document.createElement('span'); d.className='light';
      d.style.left=(c[0]+rand(-2,2))+'%'; d.style.top=(c[1]+rand(-1.5,1.5))+'%';
      d.style.setProperty('--c',LCOLORS[i%LCOLORS.length]);
      d.style.animationDelay=(Math.random()*1.4).toFixed(2)+'s';
      L.appendChild(d);
    });
    el.appendChild(L);
  }
  if(def.steam){
    [['38%','0s'],['56%','1.1s']].forEach(([l,dl])=>{
      const s=document.createElement('span'); s.className='steam';
      s.style.left=l; s.style.animationDelay=dl; el.appendChild(s);
    });
  }
  attachItem(el);
  itemsLayer.appendChild(el);
  setDepth(el,y);
  placed.set(el,def);
  return el;
}
function land(el){
  const em=el.querySelector('.em');
  em.animate([{transform:'scale(1.4,.55)'},{transform:'scale(.85,1.2)'},{transform:'scale(1,1)'}],{duration:380,easing:'ease-out'});
}
function wiggle(el){
  const em=el.querySelector('.em');
  em.classList.remove('wiggle'); void em.offsetWidth; em.classList.add('wiggle');
}
function burst(x,y,n=10,chars=['✨','⭐','✦','💫','🌟']){
  for(let i=0;i<n;i++){
    const s=document.createElement('span');
    s.className='bp'; s.textContent=chars[Math.floor(Math.random()*chars.length)];
    s.style.left=x+'px'; s.style.top=y+'px';
    s.style.fontSize=rand(10,20)+'px';
    document.body.appendChild(s);
    const a=Math.random()*Math.PI*2, d=rand(30,95);
    s.animate([
      {transform:'translate(-50%,-50%) scale(.4) rotate(0deg)',opacity:1},
      {transform:`translate(calc(-50% + ${Math.cos(a)*d}px), calc(-50% + ${Math.sin(a)*d+22}px)) scale(1.1) rotate(${rand(-100,100)}deg)`,opacity:0}
    ],{duration:rand(450,820),easing:'cubic-bezier(.15,.7,.3,1)'}).onfinish=()=>s.remove();
  }
}
function playItemSound(el){
  const def=placed.get(el);
  if(def&&SFX[def.sound])SFX[def.sound]();
}
function hideHint(){ hintEl.classList.add('fade'); }
function place(def,x,y,opts){
  const el=makeItem(def,x,y,opts);
  const r=scene.getBoundingClientRect();
  burst(r.left+x/100*r.width, r.top+y/100*r.height, 10);
  land(el);
  SFX.place();
  setTimeout(()=>playItemSound(el),90);
  updateCount(); hideHint();
  return el;
}
function poof(el){
  if(!placed.has(el))return;
  const r=el.getBoundingClientRect();
  burst(r.left+r.width/2, r.top+r.height/2, 10, ['💨','✨','⭐']);
  SFX.poof();
  el.remove(); placed.delete(el); updateCount();
}
function attachItem(el){
  let pid=null, sx=0, sy=0, ox=0, oy=0, moved=false, lastTap=0;
  el.addEventListener('pointerdown',e=>{
    e.preventDefault(); audio();
    if(pid!==null)return;
    pid=e.pointerId;
    try{el.setPointerCapture(pid);}catch(_){}
    sx=e.clientX; sy=e.clientY;
    ox=parseFloat(el.style.left); oy=parseFloat(el.style.top);
    moved=false;
    el.classList.add('lifting'); el.style.zIndex=1500;
  });
  el.addEventListener('pointermove',e=>{
    if(e.pointerId!==pid)return;
    const dx=e.clientX-sx, dy=e.clientY-sy;
    if(Math.hypot(dx,dy)>7)moved=true;
    if(!moved)return;
    const r=scene.getBoundingClientRect();
    el.style.left=clamp(ox+dx/r.width*100,3,97)+'%';
    el.style.top=clamp(oy+dy/r.height*100,12,96)+'%';
  });
  const end=e=>{
    if(e.pointerId!==pid)return;
    pid=null;
    el.classList.remove('lifting');
    if(moved){
      setDepth(el,parseFloat(el.style.top));
      SFX.thud();
      const r=el.getBoundingClientRect();
      burst(r.left+r.width/2, r.top+r.height/2, 5, ['❄️','✨']);
    }else{
      setDepth(el,parseFloat(el.style.top));
      const now=performance.now();
      if(now-lastTap<330){ lastTap=0; poof(el); return; }
      lastTap=now;
      wiggle(el); playItemSound(el);
    }
  };
  el.addEventListener('pointerup',end);
  el.addEventListener('pointercancel',end);
}

/* ================= TRAY ================= */
ITEMS.forEach(def=>{
  const b=document.createElement('button');
  b.className='tray-item';
  b.title=def.name+' — drag or tap!';
  const e1=document.createElement('span'); e1.className='ti-em'; e1.textContent=def.emoji;
  const e2=document.createElement('span'); e2.className='ti-name'; e2.textContent=def.name;
  b.appendChild(e1); b.appendChild(e2);
  tray.appendChild(b);
  b.addEventListener('pointerdown',e=>{ e.preventDefault(); audio(); startTrayDrag(def,b,e); });
});
function moveGhost(x,y){ ghost.style.left=x+'px'; ghost.style.top=y+'px'; }
function startTrayDrag(def,btn,e){
  const pid=e.pointerId, sx=e.clientX, sy=e.clientY;
  let moved=false;
  ghost.textContent=def.emoji; ghost.style.display='block'; moveGhost(sx,sy);
  btn.classList.add('dragging');
  const mv=ev=>{
    if(ev.pointerId!==pid)return;
    if(Math.hypot(ev.clientX-sx,ev.clientY-sy)>8)moved=true;
    moveGhost(ev.clientX,ev.clientY);
  };
  const up=ev=>{
    if(ev.pointerId!==pid)return;
    window.removeEventListener('pointermove',mv);
    window.removeEventListener('pointerup',up);
    window.removeEventListener('pointercancel',up);
    ghost.style.display='none';
    btn.classList.remove('dragging');
    const r=scene.getBoundingClientRect();
    const under=document.elementFromPoint(ev.clientX,ev.clientY);
    const inUI=under&&under.closest('#tray,#controls');
    const inside=ev.clientX>=r.left&&ev.clientX<=r.right&&ev.clientY>=r.top&&ev.clientY<=r.bottom&&!inUI;
    if(moved&&inside){
      place(def, clamp((ev.clientX-r.left)/r.width*100,4,96), clamp((ev.clientY-r.top)/r.height*100,14,95));
    }else if(!moved){
      place(def, rand(12,86), rand(52,88));
    }
  };
  window.addEventListener('pointermove',mv,{passive:false});
  window.addEventListener('pointerup',up);
  window.addEventListener('pointercancel',up);
}

/* ================= CONTROLS ================= */
btnMusic.addEventListener('click',()=>{ audio(); musicOn?stopMusic():startMusic(); });
const LEVELS=[0,70,150,280], LNAMES=['off','light','cozy','blizzard'];
let snowLi=2;
btnSnow.addEventListener('click',()=>{ audio(); snowLi=(snowLi+1)%4; setSnow(snowLi); SFX.twinkle(); });
btnMagic.addEventListener('click',()=>{
  audio(); SFX.sparkle();
  burst(innerWidth/2, innerHeight*.38, 16, ['✨','🌟','💫','⭐']);
  const picks=[...ITEMS].sort(()=>Math.random()-.5).slice(0,4);
  picks.forEach((def,i)=>setTimeout(()=>place(def,rand(12,86),rand(38,84)),i*180));
});
btnClear.addEventListener('click',()=>{
  audio();
  const els=[...placed.keys()];
  if(!els.length){SFX.pop();return;}
  els.forEach((el,i)=>setTimeout(()=>poof(el),i*90));
});

/* ================= TITLE ================= */
(function buildTitle(){
  const WORD='Happy Holidays!';
  const COLORS=['#ff6b6b','#ffd23f','#4ade80','#60a5fa','#f472b6','#c084fc'];
  const titleEl=$('#title');
  const decoL=document.createElement('span'); decoL.className='tl deco'; decoL.textContent='🎄 ';
  const decoR=document.createElement('span'); decoR.className='tl deco'; decoR.textContent=' ⭐';
  titleEl.appendChild(decoL);
  let li=0;
  [...WORD].forEach(ch=>{
    const s=document.createElement('span');
    if(ch===' '){ s.className='tl sp'; }
    else{
      s.className='tl'; s.textContent=ch;
      s.style.color=COLORS[li%COLORS.length];
      s.style.animationDelay=(li*.09)+'s';
      const idx=li;
      s.addEventListener('pointerdown',e=>{
        e.stopPropagation(); audio(); SFX.xylo(idx);
        s.classList.remove('jump'); void s.offsetWidth; s.classList.add('jump');
      });
      li++;
    }
    titleEl.appendChild(s);
  });
  titleEl.appendChild(decoR);
})();

(function buildStars(){
  const box=$('#stars');
  for(let i=0;i<90;i++){
    const s=document.createElement('span'); s.className='st';
    const sz=rand(1,3);
    s.style.left=rand(0,100)+'%'; s.style.top=rand(0,58)+'%';
    s.style.width=sz+'px'; s.style.height=sz+'px';
    s.style.setProperty('--d',rand(2,5)+'s');
    s.style.setProperty('--dl',rand(0,4)+'s');
    box.appendChild(s);
  }
  for(let i=0;i<14;i++){
    const s=document.createElement('span'); s.className='gsp';
    const sz=rand(2,3.5);
    s.style.left=rand(2,98)+'%'; s.style.top=rand(80,96)+'%';
    s.style.width=sz+'px'; s.style.height=sz+'px';
    s.style.animationDelay=rand(0,3)+'s';
    scene.appendChild(s);
  }
})();
(function buildBulbs(){
  const svg=$('#garland'), wire=$('#wire');
  const L=wire.getTotalLength(), n=22;
  const cols=['#ff5d5d','#ffd23f','#4ade80','#60a5fa','#f472b6'];
  for(let i=0;i<n;i++){
    const p=wire.getPointAtLength(L*(i+.5)/n);
    const c=document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('cx',p.x); c.setAttribute('cy',p.y+5); c.setAttribute('r',6.5);
    c.setAttribute('fill',cols[i%5]); c.setAttribute('class','bulb');
    c.style.animationDelay=(Math.random()*1.6)+'s';
    c.style.filter='drop-shadow(0 0 5px '+cols[i%5]+')';
    svg.appendChild(c);
  }
})();

/* ================= SNOWFALL ================= */
const cv=$('#snow'), cx=cv.getContext('2d');
let W=innerWidth, H=innerHeight, flakes=[];
function resize(){
  const dpr=Math.min(2,window.devicePixelRatio||1);
  W=innerWidth; H=innerHeight;
  cv.width=W*dpr; cv.height=H*dpr;
  cx.setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener('resize',resize); resize();
function mkFlake(scatter){
  return {x:Math.random()*W, y:scatter?Math.random()*H:-6, r:rand(1,3.2), s:rand(.35,1.25), ph:rand(0,6.28), sw:rand(.2,.9), o:rand(.35,.95)};
}
function setSnow(li){
  snowLi=li; snowLbl.textContent=LNAMES[li];
  flakes=[];
  for(let i=0;i<LEVELS[li];i++)flakes.push(mkFlake(true));
}
setSnow(2);
(function loop(t){
  cx.clearRect(0,0,W,H);
  if(flakes.length){
    const wind=Math.sin((t||0)/5000)*.3;
    for(const f of flakes){
      f.y+=f.s;
      f.x+=Math.sin((t||0)/900+f.ph)*f.sw*.35+wind;
      if(f.y>H+6){f.y=-6; f.x=Math.random()*W;}
      if(f.x>W+6)f.x=-6; else if(f.x<-6)f.x=W+6;
      cx.globalAlpha=f.o;
      cx.beginPath(); cx.arc(f.x,f.y,f.r,0,6.3); cx.fillStyle='#fff'; cx.fill();
    }
    cx.globalAlpha=1;
  }
  requestAnimationFrame(loop);
})(0);

/* ================= SHOOTING STARS ================= */
function shoot(){
  const el=document.createElement('div'); el.className='shoot';
  el.style.left=rand(20,80)+'%'; el.style.top=rand(4,22)+'%';
  scene.appendChild(el);
  el.animate([
    {transform:'translate(0,0) rotate(155deg)',opacity:0},
    {opacity:1,offset:.15},
    {transform:`translate(${-rand(200,320)}px, ${rand(80,140)}px) rotate(155deg)`,opacity:0}
  ],{duration:rand(900,1300),easing:'ease-out'}).onfinish=()=>el.remove();
  if(AC&&Math.random()<.6)tone({f:2093,d:1.4,v:.035});
  setTimeout(shoot,rand(7000,15000));
}
setTimeout(shoot,2500);

scene.addEventListener('pointerdown',e=>{
  if(e.target.closest('.item'))return;
  audio();
  burst(e.clientX,e.clientY,8);
  SFX.twinkle();
});
document.addEventListener('contextmenu',e=>{ if(e.target.closest('#scene'))e.preventDefault(); });
