<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta name="color-scheme" content="dark light"/>
<meta name="description" content="A rigorous scientific instrument for measuring the dunkability of classic biscuits in tea."/>
<title>Tea Dunkability Simulator ☕</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E☕%3C/text%3E%3C/svg%3E"/>
<script>
try{var t=localStorage.getItem('tds-theme');if(!t){t=(window.matchMedia&&matchMedia('(prefers-color-scheme: light)').matches)?'light':'dark';}document.documentElement.setAttribute('data-theme',t);}catch(e){}
</script>
<style>
/* ============ THEME TOKENS ============ */
:root, [data-theme="dark"]{
  color-scheme: dark;
  --bg:#0b0e13;
  --bg-grad:
    radial-gradient(1100px 640px at 82% -12%, rgba(242,166,65,.14), transparent 55%),
    radial-gradient(880px 640px at 4% 108%, rgba(70,140,170,.11), transparent 55%);
  --card:rgba(255,255,255,.055);
  --card2:rgba(255,255,255,.09);
  --border:rgba(255,255,255,.11);
  --border2:rgba(255,255,255,.2);
  --text:#f4efe7;
  --muted:#9aa2af;
  --accent:#f2a641;
  --accent2:#e2703a;
  --accent-soft:rgba(242,166,65,.16);
  --track:rgba(255,255,255,.13);
  --thumb:#fff7ea;
  --good:#4ade80; --warn:#fbbf24; --danger:#fb923c; --bad:#f87171;
  --glass-stroke:rgba(255,255,255,.30);
  --glass-fill:rgba(255,255,255,.06);
  --saucer-in:rgba(0,0,0,.18);
  --steam:rgba(255,255,255,.8);
  --shadow:0 24px 60px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.07);
  --kbd-bg:rgba(255,255,255,.08);
  --kbd-border:rgba(255,255,255,.22);
}
[data-theme="light"]{
  color-scheme: light;
  --bg:#f4ecdc;
  --bg-grad:
    radial-gradient(1100px 640px at 82% -12%, rgba(240,175,70,.32), transparent 55%),
    radial-gradient(880px 640px at 4% 108%, rgba(185,150,100,.22), transparent 55%);
  --card:rgba(255,255,255,.6);
  --card2:rgba(255,255,255,.85);
  --border:rgba(94,64,28,.14);
  --border2:rgba(94,64,28,.26);
  --text:#33261a;
  --muted:#8a7a66;
  --accent:#c47d1d;
  --accent2:#b5501f;
  --accent-soft:rgba(196,125,29,.16);
  --track:rgba(60,40,20,.14);
  --thumb:#fffdf8;
  --good:#16a34a; --warn:#b45309; --danger:#c2410c; --bad:#dc2626;
  --glass-stroke:rgba(120,80,30,.4);
  --glass-fill:rgba(255,255,255,.28);
  --saucer-in:rgba(94,64,28,.10);
  --steam:rgba(110,100,88,.65);
  --shadow:0 20px 50px rgba(94,64,28,.18), inset 0 1px 0 rgba(255,255,255,.7);
  --kbd-bg:rgba(255,255,255,.7);
  --kbd-border:rgba(94,64,28,.28);
}
/* ============ BASE ============ */
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  min-height:100vh;
  background:var(--bg);
  background-image:var(--bg-grad);
  color:var(--text);
  font-family:ui-rounded,"SF Pro Rounded","Segoe UI",system-ui,-apple-system,sans-serif;
  -webkit-font-smoothing:antialiased;
  transition:background .35s ease,color .35s ease;
}
.app{max-width:1240px;margin:0 auto;padding:26px 22px 40px}
h1,h2,h3{font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif}
/* ============ HEADER ============ */
header.site{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:22px}
.brand{display:flex;align-items:center;gap:14px}
.logo-badge{
  width:52px;height:52px;border-radius:16px;display:grid;place-items:center;font-size:27px;
  background:linear-gradient(145deg,var(--accent-soft),transparent 70%),var(--card);
  border:1px solid var(--border);box-shadow:var(--shadow);backdrop-filter:blur(12px);
}
h1{font-size:26px;margin:0;letter-spacing:.3px;font-weight:700}
h1 .grad{background:linear-gradient(92deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent}
.tagline{margin:2px 0 0;font-size:12.5px;color:var(--muted);letter-spacing:.4px}
.actions{display:flex;gap:9px}
.icon-btn{
  width:42px;height:42px;border-radius:13px;border:1px solid var(--border);cursor:pointer;
  background:var(--card);color:var(--text);display:grid;place-items:center;
  backdrop-filter:blur(12px);box-shadow:var(--shadow);transition:transform .15s ease,border-color .15s ease,background .15s ease;
}
.icon-btn:hover{transform:translateY(-2px);border-color:var(--border2);background:var(--card2)}
.icon-btn:active{transform:translateY(0)}
.icon-btn.off{color:var(--muted)}
.icon-btn svg{width:19px;height:19px}
.icon-btn .q{font-weight:700;font-size:17px;font-family:Georgia,serif}
/* ============ LAYOUT ============ */
main.grid{display:grid;grid-template-columns:minmax(350px,400px) 1fr;gap:18px;align-items:start}
.col{display:flex;flex-direction:column;gap:18px;min-width:0}
.card{
  background:var(--card);border:1px solid var(--border);border-radius:20px;
  backdrop-filter:blur(18px) saturate(1.35);-webkit-backdrop-filter:blur(18px) saturate(1.35);
  box-shadow:var(--shadow);padding:18px 20px;position:relative;
}
.card-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px}
.card-title{font-size:12px;font-weight:700;letter-spacing:2.2px;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:8px}
.card-sub{font-size:10.5px;color:var(--muted);letter-spacing:.5px}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--bad);display:inline-block;animation:pulse 1.6s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.8)}}
/* ============ SLIDERS ============ */
.slider-row{margin:16px 0}
.slider-row:first-of-type{margin-top:4px}
.slider-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.slider-label{display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:600;letter-spacing:.3px}
.slider-label svg{width:15px;height:15px;color:var(--accent);flex:none}
.slider-value{font-family:ui-monospace,"SF Mono",Menlo,monospace;font-size:13px;font-weight:700;padding:3px 10px;border-radius:99px;background:var(--accent-soft);border:1px solid var(--border);white-space:nowrap;max-width:62%;overflow:hidden;text-overflow:ellipsis}
.slider-hint{font-size:10.5px;color:var(--muted);margin-top:6px;letter-spacing:.3px}
input[type=range]{
  -webkit-appearance:none;appearance:none;width:100%;height:8px;border-radius:99px;cursor:pointer;
  background:linear-gradient(90deg,var(--accent) var(--p,50%),var(--track) var(--p,50%));
  transition:box-shadow .15s ease;
}
input[type=range]:focus-visible{outline:2px solid var(--accent);outline-offset:4px}
input[type=range]::-webkit-slider-runnable-track{height:8px;background:transparent}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;width:22px;height:22px;border-radius:50%;margin-top:-7px;
  background:var(--thumb);border:2.5px solid var(--accent);
  box-shadow:0 3px 10px rgba(0,0,0,.35),inset 0 -2px 4px rgba(0,0,0,.12);
  transition:transform .12s ease;
}
input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.14)}
input[type=range]::-moz-range-track{height:8px;border-radius:99px;background:var(--track)}
input[type=range]::-moz-range-progress{height:8px;border-radius:99px;background:var(--accent)}
input[type=range]::-moz-range-thumb{width:17px;height:17px;border-radius:50%;background:var(--thumb);border:2.5px solid var(--accent);box-shadow:0 3px 10px rgba(0,0,0,.35)}
/* ============ BISCUIT CHIPS ============ */
.chips{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.chip{
  display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:13px;cursor:pointer;
  background:var(--card);border:1px solid var(--border);color:var(--text);
  font-size:12px;font-weight:600;letter-spacing:.2px;transition:all .15s ease;text-align:left;
}
.chip:hover{background:var(--card2);transform:translateY(-1px)}
.chip.selected{border-color:var(--accent);background:var(--accent-soft);box-shadow:0 0 0 1px var(--accent),0 6px 18px -6px var(--accent-soft)}
.chip-ic{width:26px;height:32px;flex:none;filter:drop-shadow(0 2px 2px rgba(0,0,0,.25))}
.chip-key{margin-left:auto;font-size:9px;color:var(--muted);font-family:ui-monospace,monospace}
.blurb{margin-top:12px;font-size:12.5px;font-style:italic;color:var(--muted);line-height:1.5;border-left:3px solid var(--accent);padding-left:10px;min-height:36px}
/* ============ FORECAST ============ */
.verdict{
  display:inline-flex;align-items:center;gap:8px;font-weight:800;font-size:13px;letter-spacing:1.6px;
  padding:7px 16px;border-radius:99px;border:1px solid;
}
.verdict::before{content:"";width:8px;height:8px;border-radius:50%;background:currentColor;animation:pulse 1.8s infinite}
.lvl-safe{color:var(--good);border-color:var(--good);background:color-mix(in srgb,var(--good) 12%,transparent)}
.lvl-risky{color:var(--warn);border-color:var(--warn);background:color-mix(in srgb,var(--warn) 12%,transparent)}
.lvl-danger{color:var(--danger);border-color:var(--danger);background:color-mix(in srgb,var(--danger) 13%,transparent)}
.lvl-fatal{color:var(--bad);border-color:var(--bad);background:color-mix(in srgb,var(--bad) 14%,transparent)}
.f-msg{font-size:12.5px;color:var(--muted);margin:10px 0 14px;line-height:1.5}
.f-row{display:flex;justify-content:space-between;align-items:center;font-size:12.5px;padding:7px 0;border-top:1px dashed var(--border)}
.f-label{color:var(--muted);letter-spacing:.3px}
.f-val{font-family:ui-monospace,monospace;font-weight:700;font-size:12.5px}
.meters{display:flex;gap:3px}
.blk{width:14px;height:7px;border-radius:3px;background:var(--track)}
.blk.on{background:var(--accent)}
.riskbar{height:8px;border-radius:99px;background:var(--track);overflow:hidden;margin-top:6px}
.riskbar>i{display:block;height:100%;border-radius:99px;transition:width .3s ease,background .3s ease}
.f-note{margin-top:12px;font-size:11.5px;padding:8px 12px;border-radius:10px;background:var(--accent-soft);border:1px solid var(--border);color:var(--text)}
/* ============ CUP STAGE ============ */
.cup-card{padding:14px 18px 16px;overflow:hidden}
.stage{position:relative;width:100%;max-width:560px;margin:0 auto;aspect-ratio:420/400}
svg.tea-stage{position:absolute;inset:0;width:100%;height:100%;display:block}
canvas.fx-canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.overlay-tl{position:absolute;top:10px;left:10px;display:flex;gap:8px;z-index:3}
.overlay-tr{position:absolute;top:10px;right:10px;display:flex;gap:8px;z-index:3}
.pill{font-size:10.5px;font-weight:800;letter-spacing:1.4px;padding:6px 13px;border-radius:99px;border:1px solid;backdrop-filter:blur(8px);background:var(--card)}
.chip-stat{font-size:11px;font-weight:700;font-family:ui-monospace,monospace;padding:6px 11px;border-radius:99px;border:1px solid var(--border);background:var(--card);backdrop-filter:blur(8px);color:var(--text)}
.paused-overlay{
  position:absolute;inset:0;display:grid;place-items:center;z-index:4;
  background:color-mix(in srgb,var(--bg) 42%,transparent);backdrop-filter:blur(3px);border-radius:12px;
}
.paused-pill{font-size:14px;font-weight:700;padding:12px 24px;border-radius:99px;background:var(--card2);border:1px solid var(--border2);box-shadow:var(--shadow)}
/* status bar */
.status-bar{display:flex;align-items:center;gap:12px;margin-top:12px;flex-wrap:wrap}
.status-left{display:flex;align-items:center;gap:10px;min-width:0;flex:1}
.phase-pill{font-size:10px;font-weight:800;letter-spacing:1.6px;padding:5px 12px;border-radius:99px;background:var(--accent-soft);border:1px solid var(--border);white-space:nowrap;color:var(--accent)}
.phase-pill.hot{animation:pulse 1s infinite}
.phase-pill.dead{color:var(--bad);border-color:var(--bad);background:color-mix(in srgb,var(--bad) 14%,transparent)}
.status-detail{font-size:11.5px;color:var(--muted);font-family:ui-monospace,monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dunk-progress{flex:1.2;min-width:90px;height:6px;border-radius:99px;background:var(--track);overflow:hidden}
.dunk-progress>i{display:block;height:100%;background:var(--accent);border-radius:99px;transition:width .08s linear}
.status-btns{display:flex;gap:8px}
.mini-btn{
  font-size:11px;font-weight:700;letter-spacing:.4px;padding:7px 13px;border-radius:10px;cursor:pointer;
  background:var(--card2);border:1px solid var(--border);color:var(--text);transition:all .15s ease;font-family:inherit;
}
.mini-btn:hover{border-color:var(--border2);transform:translateY(-1px)}
/* SVG scene theme classes */
.glass-stroke{stroke:var(--glass-stroke)}
.glass-fill{fill:var(--glass-fill)}
.saucer-in{fill:var(--saucer-in)}
.steam-p{fill:none;stroke:var(--steam);stroke-width:7;stroke-linecap:round;filter:blur(3.5px);opacity:0;animation:steamRise 3.8s ease-in-out infinite;transform-box:fill-box;transform-origin:50% 100%}
@keyframes steamRise{0%{transform:translateY(12px) scaleY(.85);opacity:0}35%{opacity:.55}100%{transform:translateY(-26px) scaleY(1.14);opacity:0}}
.wave-a{animation:drift 7s linear infinite}
.wave-b{animation:drift 11s linear infinite reverse}
@keyframes drift{from{transform:translateX(0)}to{transform:translateX(-40px)}}
/* ============ GRAPH ============ */
.g-reads{display:flex;gap:16px}
.g-read{font-size:11px;color:var(--muted);letter-spacing:.4px}
.g-read b{font-family:ui-monospace,monospace;font-size:15px;margin-left:5px}
.g-axis{stroke:var(--border2);stroke-width:1}
.g-grid{stroke:var(--border);stroke-width:1;stroke-dasharray:2 5}
.g-label{fill:var(--muted);font-size:9px;font-family:ui-monospace,monospace}
.g-band{fill:var(--bad);opacity:.07}
.g-thresh{stroke:var(--bad);stroke-width:1.2;stroke-dasharray:5 4;opacity:.55}
.g-thresh-label{fill:var(--bad);font-size:9px;font-family:ui-monospace,monospace;opacity:.85}
.g-line-i{stroke:var(--accent);stroke-width:2.4;fill:none;stroke-linejoin:round;stroke-linecap:round}
.g-line-s{stroke:var(--muted);stroke-width:1.4;fill:none;stroke-dasharray:3 4;opacity:.65}
.g-dot{fill:var(--accent);stroke:var(--bg);stroke-width:2}
.g-legend{display:flex;gap:18px;margin-top:8px;font-size:10.5px;color:var(--muted)}
.g-legend i{display:inline-block;width:16px;height:3px;border-radius:2px;vertical-align:middle;margin-right:6px}
/* ============ LOG ============ */
.log-list{max-height:150px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;padding-right:6px}
.log-list::-webkit-scrollbar{width:5px}
.log-list::-webkit-scrollbar-thumb{background:var(--track);border-radius:99px}
.log-item{display:flex;gap:9px;font-size:11.5px;line-height:1.45;color:var(--text)}
.log-time{font-family:ui-monospace,monospace;color:var(--muted);flex:none;font-size:10.5px;padding-top:1px;width:44px}
.log-dot{width:7px;height:7px;border-radius:50%;flex:none;margin-top:4px}
.k-info{background:var(--muted)} .k-ok{background:var(--good)} .k-bad{background:var(--bad)} .k-warn{background:var(--warn)}
/* ============ FOOTER / KBD ============ */
footer.foot{margin-top:22px;display:flex;flex-wrap:wrap;gap:8px 14px;justify-content:center;align-items:center}
.sc-group{display:flex;align-items:center;gap:6px;font-size:10.5px;color:var(--muted);letter-spacing:.3px}
.kbd{
  font-family:ui-monospace,"SF Mono",Menlo,monospace;font-size:10px;font-weight:700;color:var(--text);
  background:var(--kbd-bg);border:1px solid var(--kbd-border);border-bottom-width:2.5px;border-radius:6px;padding:2.5px 7px;
}
.foot-note{width:100%;text-align:center;font-size:10.5px;color:var(--muted);margin-top:8px;font-style:italic}
/* ============ MODAL ============ */
.modal-back{position:fixed;inset:0;z-index:50;background:rgba(5,8,12,.55);backdrop-filter:blur(6px);display:grid;place-items:center;padding:20px}
.modal{max-width:520px;width:100%;max-height:84vh;overflow-y:auto;padding:26px 28px}
.modal h2{margin:0 0 4px;font-size:21px}
.modal p.sub{margin:0 0 18px;font-size:12.5px;color:var(--muted)}
.sc-table{display:grid;grid-template-columns:auto 1fr;gap:10px 18px;align-items:center;font-size:12.5px}
.sc-table .keys{display:flex;gap:4px}
.close-x{position:absolute;top:14px;right:14px;width:32px;height:32px;border-radius:10px;border:1px solid var(--border);background:var(--card2);color:var(--text);cursor:pointer;font-size:15px}
.close-x:hover{border-color:var(--border2)}
/* ============ RESPONSIVE ============ */
@media (max-width:1020px){
  main.grid{grid-template-columns:1fr}
  h1{font-size:22px}
}
@media (prefers-reduced-motion:reduce){
  .steam-p,.wave-a,.wave-b,.live-dot,.verdict::before,.phase-pill.hot{animation:none !important;opacity:.5}
  .steam-p{opacity:.4}
}
</style>

<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js" integrity="sha384-AISI5AuDG6E8DeEiFMVB3rGQxhZt24OU0avMp+GMV64+tpnA3+Z6F5MT0f96iPva" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">

  {key:"gingernut", name:"Ginger Nut", absorb:5.5, k2:25, h:58,

/* ================= PHYSICS ================= */
function tempFactor(temp){ return clamp((temp-10)/90, 0.05, 1.05); }
function stepPhysics(sim, p, dt){
  const b=BISCUITS[p.bi]; const tf=tempFactor(p.temp);
  sim.S=clamp(sim.S + b.absorb*tf*dt, 0, 100);
  const stress=Math.max(0, sim.S-30)/70;
  const freshF=clamp((130-p.integrity)/100, 0.25, 1.3);
  sim.I=sim.I - Math.pow(stress,2)*tf*b.k2*freshF*dt;
  return sim.I<=0;
}
function predictLife(p){
  const sim={S:0,I:p.integrity}; const dt=0.05;
  for(let dunks=0; dunks<300; dunks++){
    let ts=0;
    while(ts<p.dunkTime-1e-9){
      const d=Math.min(dt,p.dunkTime-ts); ts+=d;
      if(stepPhysics(sim,p,d)) return {collapsed:true,dunks:dunks,inDunk:ts};
    }
    sim.S*=0.9; /* drip-off between dunks */
  }
  return {collapsed:false,dunks:300};
}
function singleDunkFail(p){
  const sim={S:0,I:p.integrity}; const dt=0.05; let t=0;
  while(t<90){ t+=dt; if(stepPhysics(sim,p,dt)) return t; }
  return null;
}

const Sfx=(()=>{
  let ctx=null, master=null, enabled=true;
  function ensure(){
    if(!ctx){
      const AC=window.AudioContext||window.webkitAudioContext;
      if(!AC) return false;
      ctx=new AC(); master=ctx.createGain(); master.gain.value=0.16; master.connect(ctx.destination);
    }
    if(ctx.state==="suspended") ctx.resume();
    return true;
  }
  function noiseBuf(dur){ const n=Math.floor(ctx.sampleRate*dur); const b=ctx.createBuffer(1,n,ctx.sampleRate); const d=b.getChannelData(0); for(let i=0;i<n;i++) d[i]=Math.random()*2-1; return b; }
  function plop(hi){
    if(!enabled||!ensure()) return; const t=ctx.currentTime;
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.type="sine"; o.frequency.setValueAtTime(hi?380:240,t); o.frequency.exponentialRampToValueAtTime(hi?140:70,t+0.16);
    g.gain.setValueAtTime(0.5,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.2);
    o.connect(g); g.connect(master); o.start(t); o.stop(t+0.22);
    const s=ctx.createBufferSource(); s.buffer=noiseBuf(0.12);
    const f=ctx.createBiquadFilter(); f.type="bandpass"; f.frequency.value=1100;
    const g2=ctx.createGain(); g2.gain.setValueAtTime(0.16,t); g2.gain.exponentialRampToValueAtTime(0.001,t+0.12);
    s.connect(f); f.connect(g2); g2.connect(master); s.start(t);
  }
  function crunch(){
    if(!enabled||!ensure()) return; const t=ctx.currentTime;
    const s=ctx.createBufferSource(); s.buffer=noiseBuf(0.3);
    const f=ctx.createBiquadFilter(); f.type="lowpass";
    f.frequency.setValueAtTime(3200,t); f.frequency.exponentialRampToValueAtTime(300,t+0.28);
    const g=ctx.createGain(); g.gain.setValueAtTime(0.7,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.3);
    s.connect(f); f.connect(g); g.connect(master); s.start(t);
    const o=ctx.createOscillator(), g2=ctx.createGain();
    o.type="triangle"; o.frequency.setValueAtTime(160,t); o.frequency.exponentialRampToValueAtTime(50,t+0.25);
    g2.gain.setValueAtTime(0.3,t); g2.gain.exponentialRampToValueAtTime(0.001,t+0.28);
    o.connect(g2); g2.connect(master); o.start(t); o.stop(t+0.3);
  }
  function bloop(){
    if(!enabled||!ensure()) return; const t=ctx.currentTime;
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.type="sine"; const f0=420+Math.random()*260;
    o.frequency.setValueAtTime(f0,t); o.frequency.exponentialRampToValueAtTime(f0*1.8,t+0.07);
    g.gain.setValueAtTime(0.07,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.09);
    o.connect(g); g.connect(master); o.start(t); o.stop(t+0.1);
  }
  function plink(){
    if(!enabled||!ensure()) return; const t=ctx.currentTime;
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.type="sine"; o.frequency.value=900+Math.random()*500;
    g.gain.setValueAtTime(0.05,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.08);
    o.connect(g); g.connect(master); o.start(t); o.stop(t+0.09);
  }
  return {plop,crunch,bloop,plink,unlock:ensure,set enabled(v){enabled=v;},get enabled(){return enabled;}};
})();

          ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
          ctx.globalAlpha=p.st===1?Math.min(1,p.life/2):1;
          ctx.fillStyle=p.col; ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*0.72);
          ctx.restore();
        } else if(p.t==="f"){
          ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
          ctx.globalAlpha=Math.min(0.9,p.life/2.2);
          ctx.fillStyle=p.col; ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*0.7);
          ctx.restore();
        } else if(p.t==="s"||p.t==="d"){
          ctx.globalAlpha=Math.min(1,p.life); ctx.fillStyle=p.col;
          ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,6.2832); ctx.fill();
        } else if(p.t==="b"){
          ctx.globalAlpha=0.55; ctx.strokeStyle="rgba(255,255,255,.8)"; ctx.lineWidth=0.9;
          ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,6.2832); ctx.stroke();
        }
      }
      ctx.globalAlpha=1;
      raf=requestAnimationFrame(loop);
    };
    raf=requestAnimationFrame(loop);
    return ()=>{cancelAnimationFrame(raf); ro.disconnect();};
  },[simRef]);
  return <canvas ref={ref} className="fx-canvas"/>;
});

function CrumbGraph({simRef}){
  const s=simRef.current; const now=s.simTime;
  const W=640,H=210,padL=36,padR=12,padT=16,padB=24;
  const win=30, t0=Math.max(0,now-win), t1=Math.max(win,now);
  const X=t=>padL+(t-t0)/(t1-t0)*(W-padL-padR);
  const Y=v=>padT+(1-v/100)*(H-padT-padB);
  const pts=s.history.filter(p=>p.t>=t0-0.2);
  let lineI="",lineS="",area="";
  if(pts.length){
    lineI=pts.map((p,i)=>(i?"L":"M")+X(p.t).toFixed(1)+" "+Y(p.I).toFixed(1)).join(" ");
    lineS=pts.map((p,i)=>(i?"L":"M")+X(p.t).toFixed(1)+" "+Y(p.S).toFixed(1)).join(" ");
    area=lineI+" L"+X(pts[pts.length-1].t).toFixed(1)+" "+Y(0)+" L"+X(pts[0].t).toFixed(1)+" "+Y(0)+" Z";
  }
  const xticks=[]; const step=5;
  for(let t=Math.ceil(t0/step)*step; t<=t1; t+=step) xticks.push(t);
  const last=pts[pts.length-1];
  return (
    <svg viewBox={"0 0 "+W+" "+H} style={{width:"100%",display:"block"}}>
      <defs>
        <linearGradient id="gArea" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" style={{stopColor:"var(--accent)",stopOpacity:.32}}/>
          <stop offset="1" style={{stopColor:"var(--accent)",stopOpacity:0}}/>
        </linearGradient>
      </defs>
      <rect x={padL} y={Y(30)} width={W-padL-padR} height={Y(0)-Y(30)} className="g-band"/>
      {[0,25,50,75,100].map(v=>(
        <g key={v}>
          <line x1={padL} y1={Y(v)} x2={W-padR} y2={Y(v)} className="g-grid"/>
          <text x={padL-6} y={Y(v)+3} textAnchor="end" className="g-label">{v}</text>
        </g>
      ))}
      {xticks.map(t=>(
        <text key={t} x={X(t)} y={H-8} textAnchor="middle" className="g-label">{Math.round(t)}s</text>
      ))}
      <line x1={padL} y1={Y(30)} x2={W-padR} y2={Y(30)} className="g-thresh"/>
      <text x={W-padR-4} y={Y(30)-5} textAnchor="end" className="g-thresh-label">crumble threshold</text>
      <line x1={padL} y1={padT} x2={padL} y2={Y(0)} className="g-axis"/>
      <line x1={padL} y1={Y(0)} x2={W-padR} y2={Y(0)} className="g-axis"/>
      {area && <path d={area} fill="url(#gArea)"/>}
      {lineS && <path d={lineS} className="g-line-s"/>}
      {lineI && <path d={lineI} className="g-line-i"/>}
      {s.events.filter(e=>e.t>=t0).map((e,i)=>(
        <text key={i} x={X(e.t)} y={Y(4)} textAnchor="middle" fontSize="13">💀</text>
      ))}
      {last && <circle cx={X(last.t)} cy={Y(last.I)} r="4.5" className="g-dot"/>}
    </svg>
  );
}

function freshSim(integrity){
  return {
    phase:"rest", phaseT:0, y:0, S:0, I:integrity, h:62,
    simTime:0, dunkElapsed:0, dunks:0, lost:0, blip:0, shake:0,
    history:[{t:0,I:integrity,S:0}], events:[], lastSample:0, fx:[],
    log:[
      {t:0,msg:"Kettle boiled. Dunking rig calibrated.",kind:"info"},
      {t:0,msg:"Press H for shortcuts. Space pauses science.",kind:"info"}
    ]
  };
}
function addLog(s,msg,kind){ s.log.unshift({t:s.simTime,msg:msg,kind:kind||"info"}); if(s.log.length>42) s.log.pop(); }

const TRAVEL=160, TS=3;
const DUR={descend:0.5, ascend:0.55, rest:1.0, crumble:1.5, respawn:0.7};

function doCollapse(s,p,predictor){
  const b=BISCUITS[p.bi];
  s.lost++; s.events.push({t:s.simTime}); s.shake=1;
  const over=predictor && predictor.single!=null && p.dunkTime>predictor.single;
  s.fx.push({kind:"collapse", big:over});
  s.fx.push({kind:"ripple", x:210, y:164});
  Sfx.crunch();
  addLog(s, b.name+": "+pick(CRUMBLE_MSGS), "bad");
  if(over) addLog(s, "Forecast predicted this. Science feels vindicated.", "warn");
  s.phase="crumble"; s.phaseT=0;
}
function advance(s,p,dt,predictor){
  s.simTime+=dt*TS; s.phaseT+=dt;
  s.shake=Math.max(0,s.shake-dt*1.8);
  s.h=BISCUITS[p.bi].h;
  const go=ph=>{s.phase=ph;s.phaseT=0;};
  switch(s.phase){
    case "rest":
      s.y=0;
      if(s.phaseT>=DUR.rest) go("descend");
      break;
    case "descend":{
      const q=Math.min(1,s.phaseT/DUR.descend); s.y=easeIO(q)*TRAVEL;
      if(q>=1){ go("submerged"); s.dunkElapsed=0;
        s.fx.push({kind:"splash",x:210,y:164,power:1});
        s.fx.push({kind:"ripple",x:210,y:164});
        Sfx.plop(false);
      }
      break; }
    case "submerged":{
      s.y=TRAVEL+Math.sin(s.simTime*2.6)*1.6;
      const dSim=dt*TS; s.dunkElapsed+=dSim;
      s.blip+=dt; if(s.blip>0.4){ s.blip=0; if(Math.random()<0.6) Sfx.bloop(); }
      if(stepPhysics(s,p,dSim)){ doCollapse(s,p,predictor); }
      else if(s.dunkElapsed>=p.dunkTime){
        s.dunks++; s.S*=0.9; go("ascend");
        s.fx.push({kind:"splash",x:210,y:164,power:0.6});
        s.fx.push({kind:"ripple",x:210,y:164});
        Sfx.plop(true); if(s.S>25) Sfx.plink();
      }
      break; }
    case "ascend":{
      const q=Math.min(1,s.phaseT/DUR.ascend); s.y=TRAVEL*(1-easeIO(q));
      if(q>=1) go("rest");
      break; }
    case "crumble":
      s.y=TRAVEL;
      if(s.phaseT>=DUR.crumble){ s.S=0; s.I=p.integrity; go("respawn"); }
      break;
    case "respawn":
      s.y=0;
      if(s.phaseT>=DUR.respawn) go("rest");
      break;
  }
  if(s.simTime-s.lastSample>=0.1){
    s.history.push({t:s.simTime, I:Math.max(0,s.I), S:s.S});
    s.lastSample=s.simTime;
    while(s.history.length>2 && s.history[0].t<s.simTime-45) s.history.shift();
    while(s.events.length && s.events[0].t<s.simTime-45) s.events.shift();
  }
}

function App(){
  const [temp,setTemp]=useState(82);
  const [dunkTime,setDunk]=useState(3);
  const [bi,setBi]=useState(0);
  const [integrity,setIntegrity]=useState(80);
  const [running,setRunning]=useState(true);
  const [theme,setTheme]=useState(()=>document.documentElement.getAttribute("data-theme")||"dark");
  const [sound,setSound]=useState(()=>{try{return localStorage.getItem("tds-sound")!=="0";}catch(e){return true;}});
  const [help,setHelp]=useState(false);
  const [,setFrame]=useState(0);

  const simRef=useRef(null);
  if(!simRef.current) simRef.current=freshSim(80);
  const paramsRef=useRef({});
  paramsRef.current={temp,dunkTime,bi,integrity,running,sound};

  const predictor=useMemo(()=>{
    const p={temp,dunkTime,bi,integrity};
    return {single:singleDunkFail(p), life:predictLife(p)};
  },[temp,dunkTime,bi,integrity]);
  const predictorRef=useRef(predictor);
  predictorRef.current=predictor;

  /* main loop */
  useEffect(()=>{
    let raf=0, last=performance.now(), lastRender=0;
    const tick=(now)=>{
      const dt=clamp((now-last)/1000,0,0.1); last=now;
      const p=paramsRef.current; const s=simRef.current;
      if(p.running) advance(s,p,dt,predictorRef.current);
      if(now-lastRender>25){ lastRender=now; setFrame(f=>f+1); }
      raf=requestAnimationFrame(tick);
    };
    raf=requestAnimationFrame(tick);
    return ()=>cancelAnimationFrame(raf);
  },[]);

  /* theme + sound */
  useEffect(()=>{ document.documentElement.setAttribute("data-theme",theme);
    try{localStorage.setItem("tds-theme",theme);}catch(e){} },[theme]);
  useEffect(()=>{ Sfx.enabled=sound;
    try{localStorage.setItem("tds-sound",sound?"1":"0");}catch(e){} },[sound]);

  /* fresh biscuit when type changes */
  const firstBi=useRef(true);
  useEffect(()=>{
    if(firstBi.current){firstBi.current=false;return;}
    const s=simRef.current; if(!s) return;
    s.S=0; s.I=paramsRef.current.integrity; s.phase="respawn"; s.phaseT=0;
    addLog(s,"Fresh "+BISCUITS[bi].name+" loaded onto the rig.","ok");
  },[bi]);

  /* integrity clamp (staleness applies immediately, healing does not) */
  useEffect(()=>{ const s=simRef.current; if(s) s.I=Math.min(s.I,integrity); },[integrity]);

  const resetSim=()=>{ simRef.current=freshSim(integrity); setFrame(f=>f+1); };
  const deployFresh=()=>{ const s=simRef.current;
    s.S=0; s.I=integrity; s.phase="respawn"; s.phaseT=0;
    addLog(s,"Fresh "+BISCUITS[bi].name+" deployed on demand.","ok"); };

  /* keyboard */
  useEffect(()=>{
    const onKey=(e)=>{
      Sfx.unlock();
      const tag=(e.target&&e.target.tagName)||"";
      if(tag==="INPUT"||tag==="TEXTAREA"){ if(e.key==="Escape") e.target.blur(); return; }
      const k=e.key;
      const num="1234567890".indexOf(k);
      if(num>=0){ e.preventDefault(); setBi(num); return; }
      switch(k){
        case " ": e.preventDefault(); setRunning(r=>!r); break;
        case "ArrowRight": e.preventDefault(); setDunk(v=>clamp(v+0.5,0.5,15)); break;
        case "ArrowLeft": e.preventDefault(); setDunk(v=>clamp(v-0.5,0.5,15)); break;
        case "ArrowUp": e.preventDefault(); setTemp(v=>clamp(v+5,15,100)); break;
        case "ArrowDown": e.preventDefault(); setTemp(v=>clamp(v-5,15,100)); break;
        case "=": case "+": e.preventDefault(); setIntegrity(v=>clamp(v+5,10,100)); break;
        case "-": case "_": e.preventDefault(); setIntegrity(v=>clamp(v-5,10,100)); break;
        case "b": e.preventDefault(); setBi(i=>(i+1)%10); break;
        case "B": e.preventDefault(); setBi(i=>(i+9)%10); break;
        case "n": case "N": e.preventDefault(); deployFresh(); break;
        case "t": case "T": e.preventDefault(); setTheme(t=>t==="dark"?"light":"dark"); break;
        case "m": case "M": e.preventDefault(); setSound(sx=>!sx); break;
        case "r": case "R": e.preventDefault(); resetSim(); break;
        case "h": case "H": case "?": e.preventDefault(); setHelp(h=>!h); break;
        case "Escape": setHelp(false); break;
      }
    };
    window.addEventListener("keydown",onKey);
    const pd=()=>Sfx.unlock();
    window.addEventListener("pointerdown",pd);
    return ()=>{window.removeEventListener("keydown",onKey);window.removeEventListener("pointerdown",pd);};
  },[integrity]);

  /* derived forecast */
  const life=predictor.life, single=predictor.single;
  let lvl,lvlMsg,lvlLabel;
  if(!life.collapsed){ lvl="safe"; lvlLabel="SAFE TO DUNK"; lvlMsg="Effectively indestructible at these settings. The kettle salutes you."; }
  else if(life.dunks===0){ lvl="fatal"; lvlLabel="FATAL OVER-DUNK"; lvlMsg="Crumbles ≈"+life.inDunk.toFixed(1)+"s into the very first dunk. The tea will eat it."; }
  else if(life.dunks<=1){ lvl="danger"; lvlLabel="DANGER"; lvlMsg="Survives one dunk. The second is fatal. Have a spoon on standby."; }
  else if(life.dunks<=4){ lvl="risky"; lvlLabel="RISKY"; lvlMsg="Good for about "+(life.dunks+1)+" dunks. Thrilling, in a crumbly way."; }
  else { lvl="safe"; lvlLabel="SAFE TO DUNK"; lvlMsg="Survives ≈"+(life.dunks+1)+" dunks. Certified dunkable."; }
  const riskPct=single?clamp(dunkTime/single,0,1):0;
  const riskColor=riskPct<0.5?"var(--good)":riskPct<0.8?"var(--warn)":riskPct<1?"var(--danger)":"var(--bad)";

  /* live sim values */
  const s=simRef.current;

  const crumQ=s.phase==="crumble"?clamp(s.phaseT/DUR.crumble,0,1):0;

  /* status */
  let phaseLabel,phaseDetail,phaseCls="phase-pill";
  if(!running){ phaseLabel="PAUSED"; phaseDetail="press Space to resume science"; }
  else if(s.phase==="rest"){ phaseLabel="RESTING"; phaseDetail="drip-off complete · next dunk imminent"; }
  else if(s.phase==="descend"){ phaseLabel="DESCENDING"; phaseDetail="approaching the tea…"; }
  else if(s.phase==="submerged"){ phaseLabel="DUNKING"; phaseDetail=s.dunkElapsed.toFixed(1)+"s / "+dunkTime.toFixed(1)+"s · soak "+Math.round(Sv)+"%"; phaseCls+=" hot"; }
  else if(s.phase==="ascend"){ phaseLabel="EXTRACTING"; phaseDetail="dunk #"+s.dunks+" survived · integrity "+Math.round(Iv)+"%"; }
  else if(s.phase==="crumble"){ phaseLabel="CRUMBLE"; phaseDetail="structural failure · deploying replacement"; phaseCls+=" dead"; }
  else { phaseLabel="DEPLOYING"; phaseDetail="fresh biscuit on the rig…"; }
  const dunkPct=s.phase==="submerged"?clamp(s.dunkElapsed/dunkTime*100,0,100):0;
  const dunkBarColor=(single && s.dunkElapsed>single)?"var(--bad)":"var(--accent)";

  const absorbLvl=clamp(Math.round(b.absorb/2.6),1,5);

          <button className={"icon-btn"+(sound?"":" off")} onClick={()=>setSound(x=>!x)} title={"Sound (M): "+(sound?"on":"off")}>{sound?ICONS.sndOn:ICONS.sndOff}</button>
          <button className="icon-btn" onClick={()=>setTheme(t=>t==="dark"?"light":"dark")} title="Toggle theme (T)">{theme==="dark"?ICONS.sun:ICONS.moon}</button>
          <button className="icon-btn" onClick={()=>setHelp(true)} title="Help (H)"><span className="q">?</span></button>
        </div>
      </header>

      <main className="grid">
        <section className="col">
          <div className="card">
            <div className="card-head"><span className="card-title">Brew Parameters</span><span className="card-sub">drive with ← → ↑ ↓ − +</span></div>
            <Slider icon={ICONS.thermo} label="Tea Temperature" value={temp} min={15} max={100} step={1}
              onChange={setTemp} format={v=><span style={{color:tempColor(v)}}>{v}°C</span>}
              hint={temp<40?"Lukewarm. Barbaric, but structurally gentle.":temp>92?"Near-boiling: maximum crumble velocity.":"Optimal brewing territory."}/>
            <Slider icon={ICONS.clock} label="Dunk Duration" value={dunkTime} min={0.5} max={15} step={0.5}
              onChange={setDunk} format={v=>v.toFixed(1)+"s"}
              hint={single?("Predicted failure at ≈"+single.toFixed(1)+"s submerged"):"No failure predicted within 90s"}/>
            <Slider icon={ICONS.shield} label="Structural Integrity" value={integrity} min={10} max={100} step={5}

                    <stop offset="0" stopColor="#c07a24"/><stop offset="1" stopColor="#5f340b"/>
                  </linearGradient>
                  <linearGradient id="metalGrad" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0" stopColor="#9aa4b2"/><stop offset="1" stopColor="#5c6675"/>
                  </linearGradient>
                  <clipPath id="cupClip">
                    <path d="M80 160 A130 30 0 0 1 340 160 C340 252 308 312 268 320 Q210 332 152 320 C112 312 80 252 80 160 Z"/>
                  </clipPath>
                  <clipPath id="rimClip"><ellipse cx="210" cy="164" rx="124" ry="27"/></clipPath>
                  <clipPath id="halfL"><polygon points="-60,-100 0,-100 7,-84 -6,-70 6,-56 -7,-42 6,-28 -6,-14 7,0 -6,14 6,28 -7,42 6,56 -6,70 7,84 0,100 -60,100"/></clipPath>
                  <clipPath id="halfR"><polygon points="60,-100 0,-100 7,-84 -6,-70 6,-56 -7,-42 6,-28 -6,-14 7,0 -6,14 6,28 -7,42 6,56 -6,70 7,84 0,100 60,100"/></clipPath>
                </defs>
                <CupBack/>
                <TeaLayer lost={s.lost}/>
                {s.phase!=="crumble" ? (
                  <g transform={"translate(0 "+s.y+")"} opacity={rigOpacity}>
                    <rect x="205.5" y="-160" width="9" height="210" rx="4.5" fill="url(#metalGrad)"/>
                    <rect x="186" y="42" width="48" height="13" rx="6.5" fill="url(#metalGrad)"/>
                    <circle cx="196" cy="48.5" r="1.8" fill="rgba(0,0,0,.35)"/>
                    <circle cx="224" cy="48.5" r="1.8" fill="rgba(0,0,0,.35)"/>
                    <g transform={"rotate("+wob+" 210 48)"}>
                      <g transform={"translate(210 "+cy+")"}>
                        {b.shape(Sv/100)}
                        {Sv>40 && <ellipse cx="-10" cy={-s.h*0.2} rx="4" ry="12" fill="#fff" opacity=".14"/>}
                      </g>
                    </g>
                  </g>
                ) : (
                  <g transform={"translate(0 "+s.y+")"}>
                    <rect x="205.5" y="-160" width="9" height="210" rx="4.5" fill="url(#metalGrad)"/>
                    <rect x="186" y="42" width="48" height="13" rx="6.5" fill="url(#metalGrad)"/>
                    <g transform={"translate(210 "+cy+")"}>
                      <g transform={"translate("+(-30*crumQ*crumQ)+" "+(46*crumQ)+") rotate("+(-38*crumQ)+")"} opacity={crumQ>0.55?1-(crumQ-0.55)/0.45:1}>
                        <g clipPath="url(#halfL)">{b.shape(Sv/100)}</g>
                      </g>
                      <g transform={"translate("+(30*crumQ*crumQ)+" "+(52*crumQ)+") rotate("+(38*crumQ)+")"} opacity={crumQ>0.55?1-(crumQ-0.55)/0.45:1}>
                        <g clipPath="url(#halfR)">{b.shape(Sv/100)}</g>
                      </g>
                    </g>
                  </g>
                )}
                <CupFront/>
                <SteamLayer opacity={steamOp}/>
              </svg>
              <CrumbCanvas simRef={simRef}/>
              <div className="overlay-tl"><span className={"pill lvl-"+lvl}>{lvlLabel}</span></div>
              <div className="overlay-tr">
                <span className="chip-stat">dunks {s.dunks}</span>
                <span className="chip-stat" style={{color:s.lost?"var(--bad)":"inherit"}}>lost {s.lost}</span>
              </div>
              {!running && <div className="paused-overlay"><span className="paused-pill">⏸ Paused — press Space to resume</span></div>}
            </div>
            <div className="status-bar">
              <div className="status-left">
                <span className={phaseCls}>{phaseLabel}</span>
                <span className="status-detail">{phaseDetail}</span>
              </div>
              <div className="dunk-progress"><i style={{width:dunkPct+"%",background:dunkBarColor}}/></div>
              <div className="status-btns">
                <button className="mini-btn" onClick={()=>setRunning(r=>!r)}>{running?"⏸ Pause":"▶ Resume"}</button>
                <button className="mini-btn" onClick={deployFresh}>🍪 Fresh biscuit</button>
              </div>
            </div>
          </div>

          <div className="card graph-card">
            <div className="card-head">
              <span className="card-title">Crumble-O-Meter <span className="live-dot"></span> LIVE</span>
              <div className="g-reads">
                <span className="g-read">Integrity<b style={{color:iColor}}>{Math.round(Iv)}%</b></span>
                <span className="g-read">Saturation<b>{Math.round(Sv)}%</b></span>
              </div>
            </div>
            <CrumbGraph simRef={simRef}/>
            <div className="g-legend">
              <span><i style={{background:"var(--accent)"}}></i>Structural integrity</span>
              <span><i style={{background:"var(--muted)"}}></i>Tea saturation</span>
              <span style={{marginLeft:"auto"}}>sim time ×3</span>
            </div>
          </div>
        </section>
      </main>

      <footer className="foot">
        <span className="sc-group"><span className="kbd">Space</span> pause</span>
        <span className="sc-group"><span className="kbd">←</span><span className="kbd">→</span> dunk time</span>
        <span className="sc-group"><span className="kbd">↑</span><span className="kbd">↓</span> temp</span>
        <span className="sc-group"><span className="kbd">−</span><span className="kbd">+</span> integrity</span>
        <span className="sc-group"><span className="kbd">B</span> biscuit</span>
        <span className="sc-group"><span className="kbd">N</span> fresh</span>
        <span className="sc-group"><span className="kbd">R</span> reset</span>
        <span className="sc-group"><span className="kbd">T</span> theme</span>
        <span className="sc-group"><span className="kbd">M</span> sound</span>
        <span className="sc-group"><span className="kbd">H</span> help</span>
        <div className="foot-note">No biscuits were wasted. They were donated to the tea.</div>
      </footer>

      {help && <HelpModal onClose={()=>setHelp(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
