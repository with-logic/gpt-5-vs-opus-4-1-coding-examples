<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PULSE//GRID MK-16 — Audio Step Sequencer</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%2304060e'/%3E%3Crect x='6' y='6' width='8' height='8' rx='2' fill='%232ee6ff'/%3E%3Crect x='18' y='6' width='8' height='8' rx='2' fill='%23222'/%3E%3Crect x='6' y='18' width='8' height='8' rx='2' fill='%23222'/%3E%3Crect x='18' y='18' width='8' height='8' rx='2' fill='%23ff2ea6'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700;800;900&family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#04060e;
  --panel:rgba(9,14,32,.78);
  --panel2:rgba(13,20,44,.66);
  --line:rgba(94,166,255,.18);
  --line2:rgba(94,166,255,.34);
  --cyan:#2ee6ff;
  --mag:#ff2ea6;
  --amber:#ffb02e;
  --green:#3dff9e;
  --txt:#d7e9ff;
  --dim:#617ea6;
  --glow-c:0 0 12px rgba(46,230,255,.55),0 0 34px rgba(46,230,255,.18);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:
    radial-gradient(1200px 600px at 15% -10%, rgba(46,120,255,.13), transparent 60%),
    radial-gradient(1000px 700px at 95% 10%, rgba(255,46,166,.10), transparent 55%),
    radial-gradient(900px 900px at 50% 120%, rgba(46,230,255,.08), transparent 60%),
    var(--bg);
  color:var(--txt);
  font-family:'Rajdhani',sans-serif;
  min-height:100%;
  overflow-x:hidden;
}
/* animated background grid */
body::before{
  content:"";position:fixed;inset:-50%;z-index:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(80,150,255,.05) 1px,transparent 1px),
    linear-gradient(90deg,rgba(80,150,255,.05) 1px,transparent 1px);
  background-size:44px 44px;
  transform:perspective(600px) rotateX(38deg) translateY(8%);
  transform-origin:top;
  animation:gridDrift 26s linear infinite;
  mask-image:linear-gradient(180deg,transparent,black 30%,black 78%,transparent);
  -webkit-mask-image:linear-gradient(180deg,transparent,black 30%,black 78%,transparent);
}
@keyframes gridDrift{from{background-position:0 0}to{background-position:0 440px}}
/* scanlines + vignette */
body::after{
  content:"";position:fixed;inset:0;z-index:60;pointer-events:none;
  background:
    repeating-linear-gradient(0deg,rgba(255,255,255,.022) 0 1px,transparent 1px 3px),
    radial-gradient(120% 90% at 50% 40%,transparent 55%,rgba(0,0,5,.55) 100%);
  mix-blend-mode:overlay;
}
#app{position:relative;z-index:2;max-width:1240px;margin:0 auto;padding:18px 18px 30px}

/* ============ HEADER / TRANSPORT ============ */
header{
  display:flex;flex-wrap:wrap;align-items:center;gap:16px 26px;
  padding:14px 20px;border:1px solid var(--line);border-radius:14px;
  background:linear-gradient(180deg,rgba(16,26,56,.72),rgba(8,12,28,.72));
  box-shadow:0 10px 40px rgba(0,0,10,.5),inset 0 1px 0 rgba(140,200,255,.12);
  backdrop-filter:blur(8px);
}
.logo{display:flex;align-items:center;gap:12px;font-family:'Orbitron';font-weight:900;font-size:22px;letter-spacing:.12em;color:#eaf7ff;text-shadow:0 0 18px rgba(46,230,255,.55)}
.logo .accent{color:var(--mag);text-shadow:0 0 16px rgba(255,46,166,.7)}
.logo .mk{font-size:10px;font-weight:700;letter-spacing:.3em;color:var(--dim);border:1px solid var(--line2);border-radius:4px;padding:3px 6px;margin-left:2px}
#logoDot{width:14px;height:14px;border-radius:50%;background:var(--cyan);box-shadow:0 0 12px var(--cyan),0 0 30px rgba(46,230,255,.5);flex:none}
#logoDot.beat{animation:beat .32s ease-out}
@keyframes beat{0%{transform:scale(1.9);filter:brightness(2)}100%{transform:scale(1)}}
.transport{display:flex;flex-wrap:wrap;align-items:center;gap:14px 22px;margin-left:auto}
#playBtn{
  width:60px;height:60px;flex:none;cursor:pointer;border:none;border-radius:14px;
  background:linear-gradient(135deg,#3ff0ff,#1899d6 55%,#7a2bff);
  clip-path:polygon(12px 0,100% 0,100% calc(100% - 12px),calc(100% - 12px) 100%,0 100%,0 12px);
  display:grid;place-items:center;position:relative;transition:filter .15s,transform .1s;
  box-shadow:0 0 22px rgba(46,230,255,.35);
}
#playBtn:hover{filter:brightness(1.18)}
#playBtn:active{transform:scale(.95)}
#playBtn.beat{animation:ring .38s ease-out}
@keyframes ring{0%{box-shadow:0 0 0 0 rgba(46,230,255,.55)}100%{box-shadow:0 0 0 22px rgba(46,230,255,0)}}
.picon{width:0;height:0;border-left:20px solid #041019;border-top:12px solid transparent;border-bottom:12px solid transparent;margin-left:4px}
.sicon{width:17px;height:17px;background:#041019;border-radius:3px;display:none}
#playBtn.playing .picon{display:none}
#playBtn.playing .sicon{display:block}
.ctrl{display:flex;flex-direction:column;gap:5px;min-width:130px}
.ctrl label{font-family:'Orbitron';font-size:10px;font-weight:700;letter-spacing:.22em;color:var(--dim);display:flex;justify-content:space-between;gap:8px}
.ctrl label b{color:var(--cyan);font-weight:700;text-shadow:0 0 8px rgba(46,230,255,.6)}
.ctrlrow{display:flex;align-items:center;gap:8px}
#statusPill{font-family:'Orbitron';font-size:10px;font-weight:700;letter-spacing:.26em;color:var(--dim);border:1px solid var(--line);border-radius:20px;padding:8px 14px;display:flex;align-items:center;gap:8px;white-space:nowrap}
#statusPill::before{content:"";width:8px;height:8px;border-radius:50%;background:var(--dim)}
#statusPill.live{color:#7dffb0;border-color:rgba(125,255,176,.45);text-shadow:0 0 10px rgba(125,255,176,.6)}
#statusPill.live::before{background:#7dffb0;box-shadow:0 0 10px #7dffb0;animation:blink 1s steps(2) infinite}
@keyframes blink{50%{opacity:.25}}

/* ============ SLIDERS ============ */
input[type=range]{-webkit-appearance:none;appearance:none;background:transparent;height:18px;width:100%;cursor:pointer}
input[type=range]::-webkit-slider-runnable-track{height:4px;border-radius:2px;background:linear-gradient(90deg,var(--cyan),var(--mag));box-shadow:0 0 8px rgba(46,230,255,.35)}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;margin-top:-4.5px;background:#eaffff;border:1px solid var(--cyan);transform:rotate(45deg);border-radius:3px;box-shadow:0 0 10px var(--cyan)}
input[type=range]::-moz-range-track{height:4px;border-radius:2px;background:linear-gradient(90deg,var(--cyan),var(--mag))}
input[type=range]::-moz-range-thumb{width:12px;height:12px;background:#eaffff;border:1px solid var(--cyan);transform:rotate(45deg);border-radius:3px;box-shadow:0 0 10px var(--cyan)}
.vol{height:12px}
.vol::-webkit-slider-runnable-track{background:rgba(120,170,255,.3);box-shadow:none}
.vol::-webkit-slider-thumb{width:9px;height:9px;margin-top:-2.5px;box-shadow:0 0 6px var(--cyan)}

/* ============ BUTTONS ============ */
.btn{
  font-family:'Orbitron';font-weight:700;font-size:11px;letter-spacing:.18em;
  color:var(--cyan);background:rgba(46,230,255,.06);border:1px solid rgba(46,230,255,.4);
  padding:10px 16px;cursor:pointer;text-transform:uppercase;
  clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px);
  transition:all .15s;
}
.btn:hover{background:rgba(46,230,255,.16);box-shadow:var(--glow-c);color:#eafcff}
.btn:active{transform:translateY(1px)}
.btn.mag{color:#ffb9dd;border-color:rgba(255,46,166,.45);background:rgba(255,46,166,.07)}
.btn.mag:hover{background:rgba(255,46,166,.18);box-shadow:0 0 12px rgba(255,46,166,.5),0 0 30px rgba(255,46,166,.2)}
.btn.amb{color:#ffd9a0;border-color:rgba(255,176,46,.45);background:rgba(255,176,46,.07)}
.btn.amb:hover{background:rgba(255,176,46,.18);box-shadow:0 0 12px rgba(255,176,46,.5)}
.btn.sm{padding:7px 11px;font-size:10px}
.btn:disabled{opacity:.5;cursor:wait}
select,.txtin{
  font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--txt);
  background:rgba(6,10,24,.9);border:1px solid var(--line2);border-radius:6px;padding:9px 10px;outline:none;
}
select:focus,.txtin:focus{border-color:var(--cyan);box-shadow:0 0 10px rgba(46,230,255,.3)}
select option{background:#0a1030}

/* ============ VISUALIZER ============ */
#vis{width:100%;height:74px;display:block;margin:14px 0;border:1px solid var(--line);border-radius:12px;background:linear-gradient(180deg,rgba(8,14,32,.75),rgba(5,8,20,.85));box-shadow:inset 0 0 30px rgba(0,10,30,.6)}

/* ============ GRID ============ */
.grid-panel{
  border:1px solid var(--line);border-radius:14px;padding:16px 18px 20px;
  background:var(--panel);backdrop-filter:blur(8px);
  box-shadow:0 14px 50px rgba(0,0,12,.55),inset 0 1px 0 rgba(140,200,255,.1);
}
.gscroll{overflow-x:auto;padding-bottom:4px}
.ginner{min-width:920px}
.rows{display:flex;flex-direction:column;gap:8px}
.row{display:flex;gap:10px;align-items:stretch;transition:opacity .2s}
.row.muted .cells,.row.silenced .cells{opacity:.28}
.tlabel{
  width:196px;flex:none;display:flex;flex-direction:column;justify-content:center;gap:7px;
  background:rgba(255,255,255,.025);border:1px solid var(--line);border-left:3px solid var(--c,#2ee6ff);
  padding:7px 10px;border-radius:9px;
}
.aud{display:flex;align-items:center;gap:9px;background:none;border:none;color:var(--txt);font-family:'Orbitron';font-weight:700;font-size:12.5px;letter-spacing:.16em;cursor:pointer;text-align:left;padding:0}
.aud:hover{color:#fff;text-shadow:0 0 10px var(--c)}
.chip{width:10px;height:10px;border-radius:2px;background:var(--c);box-shadow:0 0 9px var(--c);flex:none}
.tctl{display:flex;align-items:center;gap:6px}
.ms{
  width:24px;height:19px;flex:none;font-family:'Orbitron';font-weight:700;font-size:9px;letter-spacing:.05em;
  color:var(--dim);background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:4px;cursor:pointer;transition:all .12s;
}
.ms:hover{color:var(--txt);border-color:var(--line2)}
.ms.on-mute{color:#ffd9a0;border-color:rgba(255,176,46,.6);background:rgba(255,176,46,.16);box-shadow:0 0 8px rgba(255,176,46,.4)}
.ms.on-solo{color:#9fffc8;border-color:rgba(61,255,158,.6);background:rgba(61,255,158,.14);box-shadow:0 0 8px rgba(61,255,158,.4)}
.cells{flex:1;display:flex;gap:6px}
.cell{
  position:relative;flex:1;min-width:0;height:48px;border-radius:7px;padding:0;
  border:1px solid rgba(110,170,255,.14);
  background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.014));
  cursor:pointer;transition:transform .07s,border-color .15s,background .15s;
  touch-action:none;-webkit-tap-highlight-color:transparent;
}
.cell.bs{margin-left:13px}
.cell.beat4{background:linear-gradient(180deg,rgba(120,180,255,.07),rgba(120,180,255,.02))}
.cell:hover{border-color:var(--c,#2ee6ff);transform:translateY(-2px)}
.cell .dot{position:absolute;inset:17%;border-radius:5px;transition:all .13s;pointer-events:none}
.cell.on{border-color:rgba(255,255,255,.22)}
.cell.on .dot{background:var(--c);box-shadow:0 0 10px var(--c),0 0 26px -2px var(--c)}
.cell.ghost .dot{inset:31%;opacity:.6}
.cell.now{background:rgba(150,225,255,.1);border-color:rgba(170,230,255,.45)}
.cell.hit .dot{animation:hitflash .22s ease-out}
@keyframes hitflash{0%{filter:brightness(2.4);transform:scale(1.45)}100%{filter:brightness(1);transform:scale(1)}}
.nums{display:flex;gap:6px;flex:1;margin-bottom:8px}
.num{flex:1;text-align:center;font-family:'Share Tech Mono';font-size:10.5px;color:var(--dim);transition:color .1s,text-shadow .1s;user-select:none}
.num.bs{margin-left:13px}
.num.on{color:var(--cyan);text-shadow:0 0 10px var(--cyan)}
.spacer{width:196px;flex:none}

/* ============ BOTTOM PANELS ============ */
.panels{display:grid;grid-template-columns:1.25fr .85fr;gap:14px;margin-top:14px}
@media(max-width:900px){.panels{grid-template-columns:1fr}}
.panel{border:1px solid var(--line);border-radius:14px;padding:16px 18px;background:var(--panel2);backdrop-filter:blur(8px);box-shadow:0 10px 36px rgba(0,0,10,.45)}
.panel h3{font-family:'Orbitron';font-size:12px;font-weight:800;letter-spacing:.3em;color:#9fd8ff;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.panel h3::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,var(--line2),transparent)}
.prow{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:12px}
.prow:last-child{margin-bottom:0}
.prow .lbl{font-family:'Orbitron';font-size:9.5px;font-weight:700;letter-spacing:.2em;color:var(--dim)}
#bankList{display:flex;flex-wrap:wrap;gap:8px;min-height:34px}
.bankchip{display:flex;align-items:center;gap:0;border:1px solid rgba(255,46,166,.35);border-radius:6px;overflow:hidden;background:rgba(255,46,166,.06)}
.bankchip .load{background:none;border:none;color:#ffc2e4;font-family:'Share Tech Mono';font-size:12.5px;padding:8px 12px;cursor:pointer;letter-spacing:.06em}
.bankchip .load:hover{background:rgba(255,46,166,.18);color:#fff}
.bankchip .del{background:none;border:none;border-left:1px solid rgba(255,46,166,.25);color:#a86f96;padding:8px 9px;cursor:pointer;font-size:12px}
.bankchip .del:hover{color:#ff5c7a;background:rgba(255,60,110,.15)}
.emptybank{font-family:'Share Tech Mono';font-size:12px;color:var(--dim);padding:8px 2px}
footer{margin-top:16px;text-align:center;font-family:'Share Tech Mono';font-size:11.5px;letter-spacing:.08em;color:var(--dim);line-height:1.9}
footer b{color:#8fc9ff}
#toast{
  position:fixed;left:50%;bottom:26px;transform:translate(-50%,20px);z-index:80;
  font-family:'Orbitron';font-size:11px;font-weight:700;letter-spacing:.22em;color:#04121c;
  background:linear-gradient(90deg,var(--cyan),#7df3ff);padding:11px 22px;border-radius:8px;
  box-shadow:0 0 26px rgba(46,230,255,.55);opacity:0;pointer-events:none;transition:all .3s;
  clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px);
}
#toast.show{opacity:1;transform:translate(-50%,0)}
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="logo"><span id="logoDot"></span>PULSE<span class="accent">//</span>GRID<span class="mk">MK-16</span></div>
    <div class="transport">
      <div id="statusPill">READY</div>
      <button id="playBtn" title="Play / Stop (Space)"><span class="picon"></span><span class="sicon"></span></button>
      <div class="ctrl">
        <label>TEMPO <b><span id="bpmVal">126</span> BPM</b></label>
        <div class="ctrlrow">
          <input id="bpm" type="range" min="60" max="200" value="126">
          <button id="tapBtn" class="btn sm" title="Tap tempo">TAP</button>
        </div>
      </div>
      <div class="ctrl">
        <label>SWING <b><span id="swingVal">12</span>%</b></label>
        <input id="swing" type="range" min="0" max="60" value="12">
      </div>
      <div class="ctrl">
        <label>MASTER <b><span id="masterVal">90</span></b></label>
        <input id="master" type="range" min="0" max="100" value="90">
      </div>
    </div>
  </header>

  <canvas id="vis"></canvas>

  <main class="grid-panel">
    <div class="gscroll">
      <div class="ginner">
        <div class="row" style="--c:#2ee6ff">
          <div class="spacer"></div>
          <div class="nums" id="nums"></div>
        </div>
        <div class="rows" id="grid"></div>
      </div>
    </div>
  </main>

  <section class="panels">
    <div class="panel">
      <h3>PATTERN BANK</h3>
      <div class="prow">
        <span class="lbl">PRESET</span>
        <select id="presetSel"><option value="">— LOAD FACTORY PRESET —</option></select>
      </div>
      <div class="prow">
        <span class="lbl">SAVE&nbsp;AS</span>
        <input id="patName" class="txtin" type="text" maxlength="24" placeholder="PATTERN NAME" style="flex:1;min-width:140px">
        <button id="saveBtn" class="btn mag sm">SAVE</button>
      </div>
      <div id="bankList"></div>
    </div>

    <div class="panel">
      <h3>SEQUENCE TOOLS</h3>
      <div class="prow">
        <button id="randBtn" class="btn amb">⚄ RANDOMIZE</button>
        <button id="clearBtn" class="btn">CLEAR</button>
      </div>
      <div class="prow">
        <span class="lbl">EXPORT</span>
        <select id="barsSel">
          <option value="1">1 BAR</option>
          <option value="2" selected>2 BARS</option>
          <option value="4">4 BARS</option>
        </select>
        <button id="exportBtn" class="btn mag">⬇ RENDER WAV</button>
      </div>
    </div>
  </section>

  <footer>
    <b>SPACE</b> play/stop &nbsp;·&nbsp; <b>CLICK</b> toggle step &nbsp;·&nbsp; <b>DRAG</b> paint &nbsp;·&nbsp; <b>SHIFT+CLICK</b> ghost note &nbsp;·&nbsp; <b>RIGHT-CLICK</b> erase &nbsp;·&nbsp; <b>TRACK NAME</b> audition sound
  </footer>
</div>
<div id="toast"></div>
<script>
(() => {
'use strict';

/* ================= CONFIG & STATE ================= */
const STEPS = 16;
const GHOST = 0.55;
const TRACKS = [
  {id:'kick',  name:'KICK',    color:'#ff2d78', vol:1.00},
  {id:'snare', name:'SNARE',   color:'#ffb02e', vol:0.90},
  {id:'clap',  name:'CLAP',    color:'#c44dff', vol:0.90},
  {id:'chat',  name:'HAT·CL',  color:'#2ee6ff', vol:0.70},
  {id:'ohat',  name:'HAT·OP',  color:'#5f8bff', vol:0.70},
  {id:'tom',   name:'TOM',     color:'#3dff9e', vol:0.90},
  {id:'rim',   name:'RIM',     color:'#ff6b4d', vol:0.80},
  {id:'bell',  name:'BELL',    color:'#ffe14d', vol:0.70},
];
const state = {
  bpm:126, swing:0.12, master:0.9,
  grid: TRACKS.map(()=>Array(STEPS).fill(0)),
  vol:{}, mute:{}, solo:{},
};
TRACKS.forEach(t=>{ state.vol[t.id]=t.vol; state.mute[t.id]=false; state.solo[t.id]=false; });

const $ = id => document.getElementById(id);
const gridEl=$('grid'), numsEl=$('nums'), playBtn=$('playBtn'), statusPill=$('statusPill'), logoDot=$('logoDot');

/* ================= PRESETS ================= */
const PRESETS = [
  {name:'NEON DRIVE', bpm:128, swing:0, tracks:[
    "X---X---X---X---","----X-------X---","----------------",
    "x-x-x-x-x-x-x-x-","--X---X---X---X-","--------------X-",
    "------x-------x-","----------------"]},
  {name:'BOOM BAP', bpm:92, swing:28, tracks:[
    "X------x--X---x-","----X-------X---","----------------",
    "X-x-X-x-X-x-X-x-","--------------X-","----------------",
    "----------x-----","----------------"]},
  {name:'TRAP ZONE', bpm:140, swing:8, tracks:[
    "X------X--X-----","--------X-------","--------x-------",
    "XxXxXxXXxXxXxXxX","----------------","----------------",
    "----x-----------","X-------X-------"]},
  {name:'FUNK CIRCUIT', bpm:104, swing:18, tracks:[
    "X--X----X--X----","----X--x----X--x","----------------",
    "XxXxXxXxXxXxXxXx","------x-------x-","----------x-----",
    "--x-------x-----","----------------"]},
  {name:'ACID RAIN', bpm:172, swing:6, tracks:[
    "X-----x---X-----","----X-------X---","----------------",
    "XxXxXxXxXxXxXxXx","--x-------x-----","--------------xx",
    "----------------","X---------------"]},
  {name:'HOUSE PARTY', bpm:124, swing:10, tracks:[
    "X---X---X---X---","----------------","----X-------X---",
    "x-x-x-x-x-x-x-x-","--X---X---X---X-","----------------",
    "------x-------x-","X-------X-------"]},
];
const parsePat = s => s.split('').map(c => c==='X' ? 1 : c==='x' ? 0.6 : 0);

/* ================= AUDIO ENGINE ================= */
let AC=null, mixer=null, kit=null, analyser=null;

function noiseBuffer(ac){
  const len = ac.sampleRate*2, buf = ac.createBuffer(1,len,ac.sampleRate), d = buf.getChannelData(0);
  for(let i=0;i<len;i++) d[i]=Math.random()*2-1;
  return buf;
}
function buildMixer(ac, withComp){
  const master = ac.createGain(); master.gain.value = state.master;
  const tr = {};
  TRACKS.forEach(t=>{ const g=ac.createGain(); g.gain.value=state.vol[t.id]; g.connect(master); tr[t.id]=g; });
  let out = master;
  if(withComp){
    const c = ac.createDynamicsCompressor();
    c.threshold.value=-16; c.knee.value=18; c.ratio.value=8; c.attack.value=0.003; c.release.value=0.22;
    master.connect(c); out = c;
  }
  return {master, tr, out};
}
function makeKit(ac, out){
  const noise = noiseBuffer(ac);
  const nsrc=(t,dur)=>{const s=ac.createBufferSource();s.buffer=noise;s.loop=true;s.start(t);s.stop(t+dur+0.05);return s;};
  const genv=(t,peak,dec)=>{const g=ac.createGain();g.gain.setValueAtTime(Math.max(peak,0.0001),t);g.gain.exponentialRampToValueAtTime(0.0001,t+decay);return g;};
  const osc=(type,f0,f1,t,dur)=>{const o=ac.createOscillator();o.type=type;o.frequency.setValueAtTime(Math.max(f0,1),t);
    if(f1&&f1!==f0)o.frequency.exponentialRampToValueAtTime(Math.max(f1,1),t+dur*0.45);
    o.start(t);o.stop(t+dur+0.05);return o;};
  const filt=(type,f,q)=>{const fl=ac.createBiquadFilter();fl.type=type;fl.frequency.value=f;if(q)fl.Q.value=q;return fl;};
  return {
    kick(t,v){
      const o=osc('sine',155,44,t,0.5), g=genv(t,Math.min(1.05,v*1.05),0.42);
      o.connect(g); g.connect(out.kick);
      const n=nsrc(t,0.03), hf=filt('highpass',3200), ng=genv(t,0.3*v,0.028);
      n.connect(hf); hf.connect(ng); ng.connect(out.kick);
    },
    snare(t,v){
      const n=nsrc(t,0.25), bp=filt('bandpass',1700,0.9), ng=genv(t,0.75*v,0.18);
      n.connect(bp); bp.connect(ng); ng.connect(out.snare);
      const o=osc('triangle',195,150,t,0.12), og=genv(t,0.5*v,0.11);
      o.connect(og); og.connect(out.snare);
      const o2=osc('sine',330,285,t,0.06), og2=genv(t,0.22*v,0.05);
      o2.connect(og2); og2.connect(out.snare);
    },
    clap(t,v){
      const n=nsrc(t,0.4), bp=filt('bandpass',1200,1.4), g=ac.createGain();
      g.gain.setValueAtTime(0.0001,t);
      [0,0.018,0.036].forEach(d=>{ g.gain.setValueAtTime(0.9*v,t+d); g.gain.exponentialRampToValueAtTime(0.12*v,t+d+0.014); });
      g.gain.setValueAtTime(0.9*v,t+0.055); g.gain.exponentialRampToValueAtTime(0.0001,t+0.28);
      n.connect(bp); bp.connect(g); g.connect(out.clap);
    },
    chat(t,v){
      const n=nsrc(t,0.07), hf=filt('highpass',7800), g=genv(t,0.5*v,0.045);
      n.connect(hf); hf.connect(g); g.connect(out.chat);
    },
    ohat(t,v){
      const n=nsrc(t,0.4), hf=filt('highpass',7600), g=genv(t,0.45*v,0.32);
      n.connect(hf); hf.connect(g); g.connect(out.ohat);
    },
    tom(t,v){
      const o=osc('sine',175,68,t,0.32), g=genv(t,0.85*v,0.3);
      o.connect(g); g.connect(out.tom);
      const n=nsrc(t,0.05), lp=filt('lowpass',900), ng=genv(t,0.15*v,0.04);
      n.connect(lp); lp.connect(ng); ng.connect(out.tom);
    },
    rim(t,v){
      const o=osc('square',1740,1590,t,0.03), og=genv(t,0.4*v,0.025);
      o.connect(og); og.connect(out.rim);
      const n=nsrc(t,0.05), bp=filt('bandpass',3400,2), ng=genv(t,0.5*v,0.035);
      n.connect(bp); bp.connect(ng); ng.connect(out.rim);
    },
    bell(t,v){
      const o1=osc('square',542,542,t,0.3), o2=osc('square',845,845,t,0.3);
      const bp=filt('bandpass',950,1.1), g=genv(t,0.5*v,0.26);
      o1.connect(bp); o2.connect(bp); bp.connect(g); g.connect(out.bell);
    },
  };
}
function ensureAudio(){
  if(AC){ if(AC.state==='suspended') AC.resume(); return; }
  const Ctx = window.AudioContext || window.webkitAudioContext;
  AC = new Ctx();
  mixer = buildMixer(AC, true);
  analyser = AC.createAnalyser();
  analyser.fftSize = 256; analyser.smoothingTimeConstant = 0.8;
  mixer.out.connect(analyser); analyser.connect(AC.destination);
  kit = makeKit(AC, mixer.tr);
}

/* ================= SEQUENCER CORE ================= */
let playing=false, curStep=0, nextTime=0, timer=null, stepQueue=[];
const LOOKAHEAD=0.12, TICK=25;

function stepDur(){ return 60/state.bpm/4; }
function isAudible(id){
  const soloAny = TRACKS.some(t=>state.solo[t.id]);
  return soloAny ? state.solo[id] : !state.mute[id];
}
function play(){
  ensureAudio();
  playing=true; curStep=0; nextTime=AC.currentTime+0.08; stepQueue.length=0;
  timer=setInterval(scheduler,TICK);
  playBtn.classList.add('playing');
  statusPill.textContent='PLAYING'; statusPill.classList.add('live');
}
function stop(){
  playing=false; clearInterval(timer); stepQueue.length=0;
  clearPlayhead();
  playBtn.classList.remove('playing');
  statusPill.textContent='READY'; statusPill.classList.remove('live');
}
function togglePlay(){ playing ? stop() : play(); }
function scheduler(){
  while(nextTime < AC.currentTime + LOOKAHEAD){
    scheduleStep(curStep,nextTime);
    nextTime += stepDur();
    curStep = (curStep+1)%STEPS;
  }
}
function scheduleStep(s,t){
  const tt = t + (s%2===1 ? state.swing*stepDur() : 0);
  stepQueue.push({step:s,time:tt});
  TRACKS.forEach((tr,i)=>{
    const v=state.grid[i][s];
    if(v>0 && isAudible(tr.id)) kit[tr.id](tt,v);
  });
}

const visEl=$('vis'), vx=visEl.getContext('2d');
const visArr=new Uint8Array(128), smooth=new Float32Array(72);
function drawVis(){
  const dpr=Math.min(2,window.devicePixelRatio||1);
  const w=visEl.clientWidth*dpr, h=visEl.clientHeight*dpr;
  if(visEl.width!==w||visEl.height!==h){ visEl.width=w; visEl.height=h; }
  vx.clearRect(0,0,w,h);
  let data=null;
  if(analyser && playing){ analyser.getByteFrequencyData(visArr); data=visArr; }
  const N=72, bw=w/N;
  for(let i=0;i<N;i++){
    const v = data ? data[Math.floor(i*88/N)]/255 : 0;
    smooth[i]=Math.max(smooth[i]*0.90, v);
    const bh=Math.max(1.4*dpr, smooth[i]*h*0.9);
    const hue=188+(i/N)*128;
    vx.fillStyle=`hsla(${hue},100%,${52+smooth[i]*22}%,${0.3+smooth[i]*0.65})`;
    vx.fillRect(i*bw+bw*0.18, h-bh-dpr, bw*0.64, bh);
  }
  vx.fillStyle='rgba(90,210,255,.22)';
  vx.fillRect(0,h-dpr,w,dpr);
}
function raf(){
  requestAnimationFrame(raf);
  if(AC && playing && stepQueue.length){
    const now=AC.currentTime;
    let latest=null;
    while(stepQueue.length && stepQueue[0].time<=now) latest=stepQueue.shift();
    if(latest) onStepUI(latest.step);
  }
  drawVis();
}

function clearGrid(){

function randomize(){
  const R=Math.random, g=TRACKS.map(()=>Array(STEPS).fill(0));
  for(let s=0;s<16;s+=4) if(R()<0.92) g[0][s]=0.95+R()*0.05;
  for(let s=2;s<16;s+=4) if(R()<0.14) g[0][s]=0.8;
  if(R()<0.4) g[0][10]=0.9;
  [4,12].forEach(s=>{ if(R()<0.95) g[1][s]=1; if(R()<0.3) g[1][(s+15)%16]=GHOST; });
  for(let s=0;s<16;s++){ const p=s%2===0?0.7:0.45; if(R()<p) g[3][s]=s%4===0?0.9:0.55+R()*0.25; }
  [2,6,10,14].forEach(s=>{ if(R()<0.4) g[4][s]=0.85; });
  [4,12].forEach(s=>{ if(R()<0.3) g[2][s]=0.9; });
  for(let s=0;s<16;s++){
    if(R()<0.07) g[5][s]=0.8;
    if(s%2===1 && R()<0.1) g[6][s]=0.75;
  }
  if(R()<0.5) g[7][0]=0.8; if(R()<0.3) g[7][8]=0.7;
  state.grid=g; refreshAllCells(); saveSessionSoon(); toast('RANDOM PATTERN GENERATED');
}

/* ================= WAV EXPORT ================= */
function wavBlob(buf){
  const ch=buf.numberOfChannels, sr=buf.sampleRate, len=buf.length;
  const bytes=44+len*ch*2, ab=new ArrayBuffer(bytes), dv=new DataView(ab);
  let p=0;
  const ws=s=>{for(let i=0;i<s.length;i++)dv.setUint8(p++,s.charCodeAt(i));};
  const u32=v=>{dv.setUint32(p,v,true);p+=4;};
  const u16=v=>{dv.setUint16(p,v,true);p+=2;};
  ws('RIFF'); u32(bytes-8); ws('WAVE'); ws('fmt '); u32(16); u16(1); u16(ch);
  u32(sr); u32(sr*ch*2); u16(ch*2); u16(16); ws('data'); u32(len*ch*2);
  const chans=[]; for(let c=0;c<ch;c++) chans.push(buf.getChannelData(c));
  for(let i=0;i<len;i++) for(let c=0;c<ch;c++){
    let v=Math.max(-1,Math.min(1,chans[c][i]));
    dv.setInt16(p, v<0 ? v*0x8000 : v*0x7FFF, true); p+=2;
  }
  return new Blob([ab],{type:'audio/wav'});
}
async function exportWav(){
  const bars=+$('barsSel').value;
  const btn=$('exportBtn');
  btn.disabled=true; btn.textContent='RENDERING…';
  try{
    const sr=44100, sd=stepDur(), dur=STEPS*bars*sd+0.7;
    const OC = window.OfflineAudioContext || window.webkitOfflineAudioContext;
    const oc=new OC(2, Math.ceil(dur*sr), sr);
    const m=buildMixer(oc,true);
    m.out.connect(oc.destination);
    const k=makeKit(oc,m.tr);
    const soloAny=TRACKS.some(t=>state.solo[t.id]);
    for(let bar=0;bar<bars;bar++){
      for(let s=0;s<STEPS;s++){
        const t=bar*STEPS*sd + s*sd + (s%2===1 ? state.swing*sd : 0);
        TRACKS.forEach((tr,i)=>{
          const v=state.grid[i][s];
          if(v>0 && (soloAny ? state.solo[tr.id] : !state.mute[tr.id])) k[tr.id](t,v);
        });
      }
    }
    const buf=await oc.startRendering();
    const blob=wavBlob(buf);
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=`pulsegrid_${state.bpm}bpm_${bars}bar.wav`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(a.href),4000);
    toast('WAV EXPORTED ✓');
  }catch(err){
    console.error(err); toast('EXPORT FAILED');
  }
  btn.disabled=false; btn.textContent='⬇ RENDER WAV';
}
$('exportBtn').addEventListener('click',exportWav);

/* ================= TOAST ================= */
let toastT=null;
function toast(msg){
  const t=$('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2200);
}

/* ================= INIT ================= */
buildNums();
buildGrid();
renderBank();
if(!loadSession()) applyPreset(PRESETS[0]);
refreshAllCells();
refreshRowStates();
raf();

})();
</script>
