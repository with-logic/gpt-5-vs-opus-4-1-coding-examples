<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="LingoFlip — interactive travel phrase flashcards for English, Spanish, French and Japanese.">
<meta name="theme-color" content="#070b16">
<title>LingoFlip · Travel Flashcards</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎴</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ============ RESET & BASE ============ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
[hidden]{display:none!important}
html{scroll-behavior:smooth}
body{
  font-family:'Sora','Noto Sans JP',system-ui,-apple-system,sans-serif;
  background:#070b16;
  color:#eef1ff;
  min-height:100vh;min-height:100dvh;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  -webkit-tap-highlight-color:transparent;
}
:root{
  --a1:#6366f1;
  --a2:#a855f7;
  --ink:#0d1226;
  --muted:#9aa3c7;
  --flip-ease:cubic-bezier(.4,.05,.2,1);
}
body[data-target="es"]{--a1:#f59e0b;--a2:#ef4444}
body[data-target="fr"]{--a1:#3b82f6;--a2:#f43f5e}
body[data-target="ja"]{--a1:#e11d48;--a2:#f472b6}
::selection{background:var(--a2);color:#fff}
button{font-family:inherit;touch-action:manipulation;user-select:none}
button:focus-visible,[tabindex]:focus-visible,select:focus-visible{outline:2px solid var(--a2);outline-offset:3px;border-radius:8px}

/* ============ BACKGROUND ============ */
.bg{position:fixed;inset:0;z-index:-1;overflow:hidden;background:radial-gradient(1100px 700px at 75% -10%,#131a33 0%,#070b16 60%)}
.blob{position:absolute;border-radius:50%;filter:blur(90px);pointer-events:none}
.b1{width:55vw;height:55vw;top:-20vw;left:-15vw;background:radial-gradient(circle at 35% 35%,var(--a1),transparent 70%);opacity:.4;animation:drift1 26s ease-in-out infinite alternate}
.b2{width:48vw;height:48vw;bottom:-22vw;right:-12vw;background:radial-gradient(circle at 60% 60%,var(--a2),transparent 70%);opacity:.35;animation:drift2 32s ease-in-out infinite alternate}
.b3{width:26vw;height:26vw;top:38%;left:55%;background:radial-gradient(circle,#38bdf8,transparent 70%);opacity:.12;animation:drift1 38s ease-in-out infinite alternate-reverse}
@keyframes drift1{from{transform:translate(0,0) scale(1)}to{transform:translate(6vw,4vh) scale(1.12)}}
@keyframes drift2{from{transform:translate(0,0) scale(1.08)}to{transform:translate(-5vw,-5vh) scale(.95)}}

/* ============ TOPBAR ============ */
.topbar{
  position:sticky;top:0;z-index:40;
  display:flex;align-items:center;justify-content:space-between;gap:1rem;
  padding:.9rem clamp(1rem,4vw,2.5rem);
  background:rgba(7,11,22,.55);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(255,255,255,.07);
}
.brand{display:flex;align-items:center;gap:.6rem;cursor:pointer}
.logo{font-size:1.5rem;filter:drop-shadow(0 4px 10px rgba(0,0,0,.5));transition:transform .3s}
.brand:hover .logo{transform:rotate(-14deg) scale(1.12)}
.wordmark{font-weight:800;font-size:1.1rem;letter-spacing:-.02em;background:linear-gradient(90deg,#fff,var(--a2));-webkit-background-clip:text;background-clip:text;color:transparent}
.top-actions{display:flex;align-items:center;gap:.6rem}
.ghost-btn{
  display:inline-flex;align-items:center;gap:.45rem;
  padding:.55rem 1rem;border-radius:999px;cursor:pointer;
  border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.05);color:#e6eaff;
  font-size:.82rem;font-weight:600;transition:all .25s;
}
.ghost-btn:hover{background:rgba(255,255,255,.12);transform:translateY(-1px)}
.icon-btn{
  width:38px;height:38px;border-radius:50%;cursor:pointer;font-size:1.05rem;line-height:1;
  border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.05);color:#e6eaff;
  transition:all .25s;display:grid;place-items:center;
}
.icon-btn:hover{background:rgba(255,255,255,.12);transform:rotate(-40deg)}
.ui-lang{
  display:inline-flex;align-items:center;gap:.4rem;padding:.5rem .8rem;border-radius:999px;
  border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.05);font-size:.82rem;
}
.ui-lang select{
  appearance:none;-webkit-appearance:none;border:none;background:transparent;color:#e6eaff;
  font:600 .82rem 'Sora',sans-serif;cursor:pointer;
}
.ui-lang select option{background:#131a33;color:#e6eaff}

/* ============ SCREENS ============ */
main{max-width:1060px;margin:0 auto;padding:clamp(1rem,3vw,2rem)}
.screen{display:none}
.screen.active{display:block;animation:screenIn .5s cubic-bezier(.2,.8,.2,1) both}
@keyframes screenIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

/* ---- Select screen ---- */
.hero{text-align:center;padding:clamp(1.5rem,5vh,3.5rem) 0 2rem}
.hero h1{
  font-size:clamp(1.9rem,5.2vw,3.1rem);font-weight:800;letter-spacing:-.03em;line-height:1.1;
  background:linear-gradient(100deg,#ffffff 35%,var(--a2));-webkit-background-clip:text;background-clip:text;color:transparent;
  margin-bottom:.7rem;
}
.hero p{color:var(--muted);max-width:48ch;margin:0 auto;font-size:clamp(.9rem,2vw,1.02rem);line-height:1.55}
.lang-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem;max-width:680px;margin:0 auto}
@media(max-width:560px){.lang-grid{grid-template-columns:1fr}}
.lang-tile{
  position:relative;display:flex;flex-direction:column;gap:.35rem;overflow:hidden;
  padding:1.5rem 1.6rem;border-radius:20px;text-align:left;cursor:pointer;color:#fff;
  background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.1);
  transition:transform .3s cubic-bezier(.2,.8,.2,1),box-shadow .3s,border-color .3s;
  animation:tileIn .55s cubic-bezier(.2,.8,.2,1) both;
}
@keyframes tileIn{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:none}}
.lang-tile:hover{transform:translateY(-5px);border-color:var(--ta1);box-shadow:0 20px 45px -18px var(--ta1)}
.lang-tile:active{transform:translateY(-2px) scale(.98)}
.tile-glow{position:absolute;inset:0;background:radial-gradient(300px 140px at 20% -20%,var(--ta1),transparent 70%);opacity:.18;transition:opacity .3s;pointer-events:none}
.lang-tile:hover .tile-glow{opacity:.4}
.tile-flag{font-size:2.1rem;filter:drop-shadow(0 4px 8px rgba(0,0,0,.45))}
.tile-native{font-size:1.3rem;font-weight:800;letter-spacing:-.02em}
.tile-local{font-size:.85rem;color:var(--muted)}
.tile-meta{display:flex;gap:.5rem;margin-top:.5rem;flex-wrap:wrap}
.tile-chip{background:rgba(255,255,255,.09);border-radius:999px;padding:.28rem .7rem;font-size:.7rem;font-weight:700;letter-spacing:.03em}
.tile-chip.done{background:rgba(16,185,129,.2);color:#6ee7b7}
.tile-bar{height:4px;border-radius:99px;background:rgba(255,255,255,.08);overflow:hidden;margin-top:.55rem}
.tile-bar span{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--ta1),var(--ta2));transition:width .6s cubic-bezier(.2,.8,.2,1)}
.tagline{text-align:center;color:#6b7494;font-size:.85rem;margin-top:2.4rem}

/* ---- Deck screen ---- */
.deck-meta{max-width:560px;margin:.4rem auto 0;text-align:center}
.deck-title{display:flex;align-items:center;justify-content:center;gap:.55rem;font-weight:700;font-size:1.05rem}
.deck-title .df{font-size:1.4rem}
.progress{height:8px;border-radius:99px;background:rgba(255,255,255,.08);overflow:hidden;margin:.75rem 0 .45rem}
.progress-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--a1),var(--a2));width:0;transition:width .55s cubic-bezier(.2,.8,.2,1)}
.progress-text{font-size:.83rem;color:var(--muted)}

.card-stage{position:relative;display:grid;place-items:center;padding:1.8rem 0 .4rem;min-height:330px}
.stack-layer{
  position:absolute;left:50%;top:50%;width:min(88vw,460px);aspect-ratio:8/5;border-radius:26px;
  background:linear-gradient(150deg,var(--a1),var(--a2));pointer-events:none;z-index:0;
}
.stack-layer.l1{opacity:.26;transform:translate(-50%,-50%) rotate(-4deg) translateY(8px) scale(.97)}
.stack-layer.l2{opacity:.13;transform:translate(-50%,-50%) rotate(3deg) translateY(15px) scale(.94)}

.card-wrap{position:relative;z-index:2;transition:transform .3s cubic-bezier(.2,.8,.2,1),opacity .3s;transform-style:preserve-3d;perspective:1600px}
.card-wrap.exit-left{transform:translateX(-70px) rotate(-5deg);opacity:0}
.card-wrap.exit-right{transform:translateX(70px) rotate(5deg);opacity:0}
.card-wrap.enter-from-right{transform:translateX(70px) rotate(5deg);opacity:0}
.card-wrap.enter-from-left{transform:translateX(-70px) rotate(-5deg);opacity:0}
.card-wrap.enter-from-bottom{transform:translateY(28px);opacity:0}
.card-wrap.pop{animation:popK .45s cubic-bezier(.34,1.56,.64,1)}
@keyframes popK{0%{scale:1}35%{scale:1.05}100%{scale:1}}
.card-wrap.pulsing{animation:flipPulse .6s ease}
@keyframes flipPulse{0%{scale:1}40%{scale:1.035}100%{scale:1}}

.card-tilt{transform-style:preserve-3d;transition:transform .18s ease-out;perspective:1600px}
.card{
  position:relative;width:min(88vw,460px);aspect-ratio:8/5;cursor:pointer;user-select:none;
  transform-style:preserve-3d;transition:transform .65s var(--flip-ease);
}
.card.flipped{transform:rotateY(180deg)}
.face{
  position:absolute;inset:0;border-radius:26px;overflow:hidden;
  display:flex;flex-direction:column;align-items:center;
  padding:1.1rem 1.5rem 1.2rem;text-align:center;
  backface-visibility:hidden;-webkit-backface-visibility:hidden;
}
.face.front{
  background:linear-gradient(165deg,#ffffff 0%,#edf0fb 100%);color:var(--ink);
  box-shadow:0 30px 70px -18px rgba(0,0,0,.6),inset 0 0 0 1px rgba(255,255,255,.6);
  transition:box-shadow .4s;
}
.face.front::before{content:'';position:absolute;top:0;left:0;right:0;height:6px;background:linear-gradient(90deg,var(--a1),var(--a2))}
.face.back{
  transform:rotateY(180deg);color:#fff;
  background:linear-gradient(150deg,var(--a1),var(--a2));
  box-shadow:0 30px 70px -18px rgba(0,0,0,.6);
}
.face.back::after{content:'';position:absolute;inset:0;background:radial-gradient(600px 220px at 50% -70px,rgba(255,255,255,.32),transparent 70%);pointer-events:none}
.card-wrap.is-learned .face.front{box-shadow:0 0 0 3px #10b981,0 30px 70px -16px rgba(16,185,129,.5)}

.row{align-self:stretch;display:flex;align-items:center;justify-content:space-between}
.row.bottom{justify-content:center}
.mid{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.3rem;position:relative;z-index:1}
.chip{background:rgba(13,18,38,.09);color:#3a4266;border-radius:999px;padding:.3rem .75rem;font-size:.72rem;font-weight:700;letter-spacing:.03em}
.chip.light{background:rgba(255,255,255,.22);color:#fff;font-size:1rem;padding:.15rem .6rem}
.badge-learned{
  background:linear-gradient(135deg,#059669,#34d399);color:#fff;
  font-size:.62rem;font-weight:800;letter-spacing:.1em;padding:.4rem .65rem;border-radius:999px;
  box-shadow:0 6px 16px -4px rgba(16,185,129,.6);
  transform:scale(0);transition:transform .4s cubic-bezier(.34,1.56,.64,1);
}
.card-wrap.is-learned .badge-learned{transform:scale(1)}
.emoji{font-size:1.9rem;filter:drop-shadow(0 3px 6px rgba(0,0,0,.18))}
.kicker{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.16em;color:#8a93b8}
.phrase{font-weight:800;letter-spacing:-.02em;line-height:1.18;font-size:clamp(1.55rem,5.6vw,2.35rem);overflow-wrap:break-word;max-width:100%}
.phrase.long{font-size:clamp(1.15rem,4vw,1.65rem)}
.face.back .phrase{color:#fff;text-shadow:0 2px 14px rgba(0,0,0,.25)}
.romaji{font-style:italic;color:#707a9e;font-size:.95rem;margin-top:.25rem}
.back-label{font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.2em;color:rgba(255,255,255,.85)}
.back-original{margin-top:.8rem;font-size:.95rem;font-style:italic;color:rgba(255,255,255,.85)}
.hint{font-size:.76rem;color:#98a0c3;display:inline-flex;align-items:center;gap:.4rem;animation:hintPulse 2.6s ease-in-out infinite}
.hint.light{color:rgba(255,255,255,.82)}
.hint::before{content:'⟳';font-size:.95em;opacity:.8}
@keyframes hintPulse{0%,100%{opacity:.65}50%{opacity:1}}

/* ---- Controls ---- */
.controls{display:flex;flex-wrap:wrap;justify-content:center;gap:.7rem;margin-top:1.4rem}
.ctrl{
  display:inline-flex;align-items:center;gap:.5rem;padding:.8rem 1.35rem;border-radius:999px;cursor:pointer;
  border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);color:#fff;
  font-size:.92rem;font-weight:600;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  transition:transform .22s,background .22s,box-shadow .22s;
}
.ctrl:hover{transform:translateY(-2px);background:rgba(255,255,255,.13)}
.ctrl:active{transform:translateY(0) scale(.97)}
.ctrl.nav{padding:.8rem 1.1rem;font-size:1rem}
.ctrl.primary{
  background:linear-gradient(135deg,var(--a1),var(--a2));border:none;
  box-shadow:0 10px 26px -10px var(--a1);
}
.ctrl.primary:hover{box-shadow:0 14px 32px -10px var(--a1)}
.ctrl.primary.is-learned{background:linear-gradient(135deg,#059669,#10b981);box-shadow:0 10px 26px -10px #10b981}
@media(max-width:520px){
  .ctrl{padding:.72rem 1rem;font-size:.85rem}
  .ctrl.nav span{display:none}
  .ctrl.nav{padding:.72rem .95rem}
}
.kbd-hints{display:flex;justify-content:center;align-items:center;gap:.45rem;margin-top:1.1rem;color:#6b7494;font-size:.72rem}
.kbd-hints kbd{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-bottom-width:2px;border-radius:6px;padding:.12rem .45rem;font:600 .68rem 'Sora',sans-serif;color:#aeb6d8}
@media(hover:none){.kbd-hints{display:none}}

/* ---- Done overlay ---- */
.overlay{
  position:fixed;inset:0;z-index:50;display:grid;place-items:center;padding:1.5rem;
  background:rgba(4,6,12,.62);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  opacity:0;pointer-events:none;transition:opacity .35s;
}
.overlay.open{opacity:1;pointer-events:auto}
.done-card{
  background:linear-gradient(180deg,rgba(255,255,255,.1),rgba(255,255,255,.04));
  border:1px solid rgba(255,255,255,.15);border-radius:26px;padding:2.4rem 2.2rem;text-align:center;
  max-width:430px;width:100%;box-shadow:0 40px 90px -30px rgba(0,0,0,.8);
  transform:translateY(24px) scale(.94);transition:transform .45s cubic-bezier(.2,.9,.3,1.25);
}
.overlay.open .done-card{transform:none}
.done-emoji{font-size:3.2rem;animation:bounce 1.1s ease infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}40%{transform:translateY(-14px)}}
.done-card h2{font-size:1.6rem;font-weight:800;letter-spacing:-.02em;margin:.6rem 0 .5rem}
.done-card p{color:var(--muted);font-size:.95rem;line-height:1.55;margin-bottom:1.5rem}
.done-actions{display:flex;flex-direction:column;gap:.7rem}
.done-actions .ctrl{justify-content:center}

/* ---- Shuffle animations ---- */
@keyframes riffle{0%{transform:none}18%{transform:translate(-16px,4px) rotate(-5deg)}38%{transform:translate(14px,-2px) rotate(4deg)}58%{transform:translate(-10px,2px) rotate(-3deg)}78%{transform:translate(8px,-1px) rotate(2deg)}100%{transform:none}}
.shuffling .card-wrap{animation:riffle .55s ease-in-out}
@keyframes riffleL1{0%,100%{transform:translate(-50%,-50%) rotate(-4deg) translateY(8px) scale(.97)}50%{transform:translate(-53%,-50%) rotate(-9deg) translateY(8px) scale(.97)}}
@keyframes riffleL2{0%,100%{transform:translate(-50%,-50%) rotate(3deg) translateY(15px) scale(.94)}50%{transform:translate(-47%,-50%) rotate(8deg) translateY(15px) scale(.94)}}
.shuffling .l1{animation:riffleL1 .55s ease-in-out}
.shuffling .l2{animation:riffleL2 .55s ease-in-out}

#confetti{position:fixed;inset:0;z-index:60;pointer-events:none;width:100vw;height:100vh}

@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}
}
</style>
</head>
<body data-target="">

<div class="bg" aria-hidden="true">
  <div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div>
</div>

<header class="topbar">
  <div class="brand" id="brand">
    <span class="logo">🎴</span>
    <span class="wordmark">LingoFlip</span>
  </div>
  <div class="top-actions">
    <button class="ghost-btn" id="btnChangeLang" hidden>‹ <span data-i18n="changeLang"></span></button>
    <button class="icon-btn" id="btnReset" hidden>↺</button>
    <label class="ui-lang" title="UI language">🌐
      <select id="uiLangSel" aria-label="UI language">
        <option value="en">English</option>
        <option value="es">Español</option>
        <option value="fr">Français</option>
        <option value="ja">日本語</option>
      </select>
    </label>
  </div>
</header>

<main>
  <!-- ===== LANGUAGE SELECT ===== -->
  <section class="screen active" id="screenSelect">
    <div class="hero">
      <h1 data-i18n="chooseTitle"></h1>
      <p data-i18n="chooseSub"></p>
    </div>
    <div class="lang-grid" id="langGrid"></div>
    <p class="tagline" data-i18n="tagline"></p>
  </section>

  <!-- ===== FLASHCARD DECK ===== -->
  <section class="screen" id="screenDeck">
    <div class="deck-meta">
      <div class="deck-title"><span class="df" id="deckFlag"></span><span id="deckName"></span></div>
      <div class="progress"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText"></div>
    </div>

    <div class="card-stage" id="cardStage">
      <div class="stack-layer l1"></div>
      <div class="stack-layer l2"></div>
      <div class="card-wrap" id="cardWrap">
        <div class="card-tilt" id="cardTilt">
          <div class="card" id="card" role="button" tabindex="0" aria-pressed="false" aria-label="flashcard">
            <div class="face front">
              <div class="row">
                <span class="chip" id="counterChip">1 / 10</span>
                <span class="badge-learned" data-i18n="learnedBadge"></span>
              </div>
              <div class="mid">
                <div class="emoji" id="phraseEmoji"></div>
                <div class="kicker" data-i18n="frontKicker"></div>
                <div class="phrase" id="frontPhrase"></div>
                <div class="romaji" id="frontRomaji"></div>
              </div>
              <div class="row bottom"><span class="hint" data-i18n="flipHint"></span></div>
            </div>
            <div class="face back">
              <div class="row">
                <span class="chip light" id="backChip"></span>
                <span></span>
              </div>
              <div class="mid">
                <div class="back-label" data-i18n="translation"></div>
                <div class="phrase" id="backPhrase"></div>
                <div class="back-original" id="backOriginal"></div>
              </div>
              <div class="row bottom"><span class="hint light" data-i18n="flipBack"></span></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="controls">
      <button class="ctrl nav" id="btnPrev" aria-label="Previous">‹ <span data-i18n="prev"></span></button>
      <button class="ctrl" id="btnShuffle">🔀 <span data-i18n="shuffle"></span></button>
      <button class="ctrl primary" id="btnMark"><span id="markIcon">✓</span> <span id="markLabel"></span></button>
      <button class="ctrl nav" id="btnNext" aria-label="Next"><span data-i18n="next"></span> ›</button>
    </div>

    <div class="kbd-hints" aria-hidden="true">
      <kbd>←</kbd><kbd>→</kbd><span>·</span><kbd>Space</kbd><span>·</span><kbd>S</kbd><span>·</span><kbd>L</kbd>
    </div>
  </section>
</main>

<!-- ===== COMPLETION OVERLAY ===== -->
<div class="overlay" id="doneOverlay" hidden>
  <div class="done-card">
    <div class="done-emoji">🎉</div>
    <h2 data-i18n="doneTitle"></h2>
    <p data-i18n="doneSub"></p>
    <div class="done-actions">
      <button class="ctrl primary" id="btnReview" data-i18n="review"></button>
      <button class="ctrl" id="btnAnother" data-i18n="another"></button>
    </div>
  </div>
</div>

<canvas id="confetti"></canvas>

<script>
(() => {
'use strict';

/* ================= DATA ================= */
const PHRASES = [
  {emoji:'👋', en:'Hello',                     es:'Hola',                  fr:'Bonjour',               ja:'こんにちは',           romaji:'Konnichiwa'},
  {emoji:'🚪', en:'Goodbye',                   es:'Adiós',                 fr:'Au revoir',             ja:'さようなら',           romaji:'Sayōnara'},

const LANGS = {

  fr:{flag:'🇫🇷', native:'Français', a1:'#3b82f6', a2:'#f43f5e'},
  ja:{flag:'🇯🇵', native:'日本語',    a1:'#e11d48', a2:'#f472b6'}
};

    shuffle:'シャッフル', mark:'覚えた！', marked:'習得済み ✓',
    prev:'前へ', next:'次へ',
    changeLang:'言語を変更', reset:'進捗をリセット',
    doneTitle:'デッキ完了！', doneSub:'10のフレーズをすべて習得しました。旅行の準備は万端です。✈️',
    review:'もう一度復習', another:'別の言語を選ぶ',
    learnedBadge:'習得済み',

/* ================= STATE ================= */
const STORE_KEY = 'lingoflip.v1';
function loadStore(){ try{ return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; }catch(e){ return {}; } }
function detectLocale(){
  const l = (navigator.language || 'en').slice(0,2).toLowerCase();
  return ['en','es','fr','ja'].includes(l) ? l : 'en';
}
const saved = loadStore();
const state = {
  screen:'select',
  ui: saved.ui || detectLocale(),
  target:null,
  order: PHRASES.map((_,i)=>i),
  pos:0,
  flipped:false,
  busy:false,
  learned:{
    en:new Set(saved.learned && saved.learned.en || []),
    es:new Set(saved.learned && saved.learned.es || []),
    fr:new Set(saved.learned && saved.learned.fr || []),
    ja:new Set(saved.learned && saved.learned.ja || [])
  }
};
function persist(){
  try{
    localStorage.setItem(STORE_KEY, JSON.stringify({
      ui:state.ui,
      learned:{en:[...state.learned.en],es:[...state.learned.es],fr:[...state.learned.fr],ja:[...state.learned.ja]}
    }));
  }catch(e){}
}
const t = k => (I18N[state.ui] && I18N[state.ui][k]) || I18N.en[k] || k;

/* ================= DOM ================= */
const $ = id => document.getElementById(id);
const screenSelect=$('screenSelect'), screenDeck=$('screenDeck'), langGrid=$('langGrid'),
      brand=$('brand'), btnChangeLang=$('btnChangeLang'), btnReset=$('btnReset'), uiLangSel=$('uiLangSel'),
      deckFlag=$('deckFlag'), deckName=$('deckName'), progressFill=$('progressFill'), progressText=$('progressText'),
      cardStage=$('cardStage'), cardWrap=$('cardWrap'), cardTilt=$('cardTilt'), card=$('card'),
      counterChip=$('counterChip'), phraseEmoji=$('phraseEmoji'), frontPhrase=$('frontPhrase'), frontRomaji=$('frontRomaji'),
      backChip=$('backChip'), backPhrase=$('backPhrase'), backOriginal=$('backOriginal'),
      btnPrev=$('btnPrev'), btnNext=$('btnNext'), btnShuffle=$('btnShuffle'), btnMark=$('btnMark'), markLabel=$('markLabel'),
      doneOverlay=$('doneOverlay'), btnReview=$('btnReview'), btnAnother=$('btnAnother');

/* ================= CONFETTI ================= */
const confetti = (() => {
  const cvs = $('confetti'), ctx = cvs.getContext('2d');
  let parts = [], raf = null;
  function resize(){
    const dpr = Math.min(2, window.devicePixelRatio || 1);
    cvs.width = window.innerWidth * dpr;
    cvs.height = window.innerHeight * dpr;
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize', resize); resize();
  function themeColors(){
    const cs = getComputedStyle(document.body);
    return [cs.getPropertyValue('--a1').trim() || '#6366f1',
            cs.getPropertyValue('--a2').trim() || '#a855f7',
            '#ffffff','#fbbf24','#34d399'];
  }
  function burst(x,y,n,colors,spread){
    spread = spread || 1;
    for(let i=0;i<n;i++){
      const a = Math.random()*Math.PI*2, sp = (2+Math.random()*7)*spread;
      parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-3,g:.16+Math.random()*.08,
                  s:3+Math.random()*5,r:Math.random()*Math.PI,vr:(Math.random()-.5)*.35,
                  l:1,d:.006+Math.random()*.008,c:colors[i%colors.length],sh:Math.random()<.6?0:1});
    }
    if(!raf) tick();
  }
  function tick(){
    ctx.clearRect(0,0,window.innerWidth,window.innerHeight);
    parts = parts.filter(p => p.l > 0 && p.y < window.innerHeight + 40);
    for(const p of parts){
      p.vy += p.g; p.vx *= .985; p.vy *= .995; p.x += p.vx; p.y += p.vy; p.r += p.vr; p.l -= p.d;
      ctx.save();
      ctx.globalAlpha = Math.max(0, Math.min(1, p.l*1.4));
      ctx.translate(p.x, p.y); ctx.rotate(p.r); ctx.fillStyle = p.c;
      if(p.sh === 0) ctx.fillRect(-p.s/2, -p.s/2, p.s, p.s*.62);
      else { ctx.beginPath(); ctx.arc(0,0,p.s/2,0,Math.PI*2); ctx.fill(); }
      ctx.restore();
    }
    if(parts.length){ raf = requestAnimationFrame(tick); }
    else { raf = null; ctx.clearRect(0,0,window.innerWidth,window.innerHeight); }
  }
  function celebrateBlast(){
    const w = window.innerWidth, h = window.innerHeight, c = themeColors();
    burst(w*.5, h*.32, 90, c, 1.4);
    setTimeout(() => burst(w*.22, h*.4, 60, c, 1.2), 220);
    setTimeout(() => burst(w*.78, h*.4, 60, c, 1.2), 420);
    setTimeout(() => burst(w*.5, h*.2, 70, c, 1.6), 650);
  }
  return {burst, celebrateBlast, themeColors};
})();

/* ================= RENDERING ================= */
function applyI18n(){
  document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.dataset.i18n); });
  btnReset.title = t('reset');
  btnReset.setAttribute('aria-label', t('reset'));
  if(state.target){ renderMeta(); renderCard(); }
}

function renderSelect(){
  langGrid.innerHTML = '';
  Object.keys(LANGS).forEach((code, i) => {
    const meta = LANGS[code];
    const learnedCount = state.learned[code].size;
    const pct = learnedCount / PHRASES.length * 100;
    const localName = I18N[state.ui].langNames[code];
    const btn = document.createElement('button');
    btn.className = 'lang-tile';
    btn.style.setProperty('--ta1', meta.a1);
    btn.style.setProperty('--ta2', meta.a2);
    btn.style.animationDelay = (i * 80) + 'ms';
    btn.innerHTML =
      '<span class="tile-glow"></span>' +
      '<span class="tile-flag">' + meta.flag + '</span>' +
      '<span class="tile-native">' + meta.native + '</span>' +
      (localName !== meta.native ? '<span class="tile-local">' + localName + '</span>' : '') +
      '<span class="tile-meta"><span class="tile-chip">' + t('phrasesCount') + '</span>' +
      (learnedCount ? '<span class="tile-chip done">' + learnedCount + '/' + PHRASES.length + ' ✓</span>' : '') +
      '</span>' +
      '<span class="tile-bar"><span style="width:' + pct + '%"></span></span>';
    btn.addEventListener('click', () => startDeck(code));
    langGrid.appendChild(btn);
  });
}

function renderMeta(){
  const n = state.learned[state.target].size, total = PHRASES.length;
  progressFill.style.width = (n/total*100) + '%';
  progressText.textContent = t('progress').replace('{a}', n).replace('{b}', total);
  deckFlag.textContent = LANGS[state.target].flag;
  deckName.textContent = I18N[state.ui].langNames[state.target];
}

function renderBadgeAndMark(){
  const isLearned = state.learned[state.target].has(state.order[state.pos]);
  cardWrap.classList.toggle('is-learned', isLearned);
  btnMark.classList.toggle('is-learned', isLearned);
  markLabel.textContent = isLearned ? t('marked') : t('mark');
}

function renderCard(){
  const p = PHRASES[state.order[state.pos]];
  const tr = state.ui === state.target ? 'en' : state.ui; // fallback if learning your UI language
  // reset flip instantly (no visible reverse animation during content swap)
  card.style.transition = 'none';
  card.classList.remove('flipped');
  state.flipped = false;
  card.setAttribute('aria-pressed','false');
  counterChip.textContent = (state.pos + 1) + ' / ' + state.order.length;
  phraseEmoji.textContent = p.emoji;
  frontPhrase.textContent = p[state.target];
  frontPhrase.classList.toggle('long', p[state.target].length > 16);
  frontRomaji.textContent = state.target === 'ja' ? p.romaji : '';
  frontRomaji.style.display = state.target === 'ja' ? '' : 'none';
  backPhrase.textContent = p[tr];
  backPhrase.classList.toggle('long', p[tr].length > 16);
  backOriginal.textContent = p[state.target] + (state.target === 'ja' ? ' · ' + p.romaji : '');
  backChip.textContent = LANGS[state.target].flag;
  void card.offsetWidth;
  card.style.transition = '';
  renderBadgeAndMark();
}

/* ================= NAVIGATION / ANIMATION ================= */
function enterFrom(cls){
  cardWrap.style.transition = 'none';
  cardWrap.classList.add(cls);
  void cardWrap.offsetWidth;
  cardWrap.style.transition = '';
  requestAnimationFrame(() => cardWrap.classList.remove(cls));
}

function goTo(newPos, dir){
  if(state.busy) return;
  state.busy = true;
  const out = dir === 'prev' ? 'exit-right' : 'exit-left';
  const inn = dir === 'prev' ? 'enter-from-left' : 'enter-from-right';
  cardWrap.classList.add(out);
  setTimeout(() => {
    state.pos = newPos;
    renderCard();
    cardWrap.style.transition = 'none';
    cardWrap.classList.remove(out);
    cardWrap.classList.add(inn);
    void cardWrap.offsetWidth;
    cardWrap.style.transition = '';
    requestAnimationFrame(() => {
      cardWrap.classList.remove(inn);
      setTimeout(() => { state.busy = false; }, 320);
    });
  }, 300);
}

function next(){ goTo((state.pos + 1) % state.order.length, 'next'); }
function prev(){ goTo((state.pos - 1 + state.order.length) % state.order.length, 'prev'); }

function flip(){
  if(state.busy) return;
  state.flipped = !state.flipped;
  card.classList.toggle('flipped', state.flipped);
  card.setAttribute('aria-pressed', String(state.flipped));
  cardWrap.classList.remove('pulsing');
  void cardWrap.offsetWidth;
  cardWrap.classList.add('pulsing');
}

function shuffleDeck(){
  if(state.busy) return;
  state.busy = true;
  cardStage.classList.add('shuffling');
  setTimeout(() => {
    for(let i = state.order.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      const tmp = state.order[i]; state.order[i] = state.order[j]; state.order[j] = tmp;
    }
    state.pos = 0;
    renderCard();
  }, 280);
  setTimeout(() => { cardStage.classList.remove('shuffling'); state.busy = false; }, 620);
}

function findNextUnlearned(){
  const n = state.order.length;
  for(let i = 1; i <= n; i++){
    const p = (state.pos + i) % n;
    if(!state.learned[state.target].has(state.order[p])) return p;
  }
  return state.pos;
}

function toggleLearned(){
  if(state.busy) return;
  const idx = state.order[state.pos];
  const set = state.learned[state.target];
  if(set.has(idx)){
    set.delete(idx); persist(); renderMeta(); renderBadgeAndMark();
    return;
  }
  set.add(idx); persist(); renderMeta(); renderBadgeAndMark();
  state.busy = true;
  cardWrap.classList.add('pop');
  const r = cardWrap.getBoundingClientRect();
  const cols = ['#10b981','#34d399', confetti.themeColors()[0], confetti.themeColors()[1], '#ffffff'];
  confetti.burst(r.left + r.width/2, r.top + r.height/2, 26, cols, .9);
  setTimeout(() => cardWrap.classList.remove('pop'), 500);
  setTimeout(() => {
    state.busy = false;
    if(set.size === PHRASES.length) celebrate();
    else goTo(findNextUnlearned(), 'next');
  }, 650);
}

/* ================= SCREENS ================= */
function showScreen(name){
  state.screen = name;
  screenSelect.classList.toggle('active', name === 'select');
  screenDeck.classList.toggle('active', name === 'deck');
  btnChangeLang.hidden = name !== 'deck';
  btnReset.hidden = name !== 'deck';
  window.scrollTo({top:0});
}

function startDeck(code){
  state.target = code;
  document.body.dataset.target = code;
  state.order = PHRASES.map((_,i)=>i);
  state.pos = 0;
  state.flipped = false;
  state.busy = false;
  renderMeta();
  renderCard();
  showScreen('deck');
  enterFrom('enter-from-bottom');
}

function celebrate(){
  doneOverlay.hidden = false;
  requestAnimationFrame(() => doneOverlay.classList.add('open'));
  if(!window.matchMedia('(prefers-reduced-motion: reduce)').matches) confetti.celebrateBlast();
}
function hideOverlay(){
  doneOverlay.classList.remove('open');
  setTimeout(() => { doneOverlay.hidden = true; }, 380);
}

/* ================= EVENTS ================= */
card.addEventListener('click', flip);
btnPrev.addEventListener('click', prev);
btnNext.addEventListener('click', next);
btnShuffle.addEventListener('click', shuffleDeck);
btnMark.addEventListener('click', toggleLearned);
brand.addEventListener('click', () => { if(state.screen === 'deck'){ renderSelect(); showScreen('select'); } });

btnChangeLang.addEventListener('click', () => { renderSelect(); showScreen('select'); });
btnReset.addEventListener('click', () => {
  if(!state.target) return;
  state.learned[state.target].clear();
  persist(); renderMeta(); renderBadgeAndMark();
});

btnReview.addEventListener('click', () => {
  hideOverlay();
  setTimeout(() => {
    state.learned[state.target].clear(); persist();
    for(let i = state.order.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      const tmp = state.order[i]; state.order[i] = state.order[j]; state.order[j] = tmp;
    }
    renderMeta();
    goTo(0, 'next');
  }, 300);
});
btnAnother.addEventListener('click', () => {
  hideOverlay();
  document.body.dataset.target = '';
  setTimeout(() => { renderSelect(); showScreen('select'); }, 200);
});

uiLangSel.addEventListener('change', () => {
  state.ui = uiLangSel.value;
  persist();
  document.documentElement.lang = state.ui;
  applyI18n();
  renderSelect();
});

document.addEventListener('keydown', e => {
  if(state.screen !== 'deck' || !doneOverlay.hidden) return;
  if(e.target.matches('select,input,textarea')) return;
  const k = e.key;
  if(k === ' ' || k === 'Spacebar' || k === 'Enter'){
    if(e.target.closest('button')) return; // let native button activation work
    e.preventDefault(); flip();
  } else if(k === 'ArrowRight'){ e.preventDefault(); next(); }
  else if(k === 'ArrowLeft'){ e.preventDefault(); prev(); }
  else if(k === 's' || k === 'S'){ shuffleDeck(); }
  else if(k === 'l' || k === 'L'){ toggleLearned(); }
});

/* subtle 3D tilt on pointer (desktop only) */
if(window.matchMedia('(hover:hover) and (pointer:fine)').matches){
  cardStage.addEventListener('pointermove', e => {
    if(state.busy) return;
    const r = cardWrap.getBoundingClientRect();
    const dx = (e.clientX - (r.left + r.width/2)) / r.width;
    const dy = (e.clientY - (r.top + r.height/2)) / r.height;
    cardTilt.style.transform = 'rotateX(' + (-dy*8).toFixed(2) + 'deg) rotateY(' + (dx*10).toFixed(2) + 'deg)';
  });
  cardStage.addEventListener('pointerleave', () => { cardTilt.style.transform = ''; });
}

/* ================= INIT ================= */
document.documentElement.lang = state.ui;
uiLangSel.value = state.ui;
applyI18n();
renderSelect();
showScreen('select');
})();
</script>
