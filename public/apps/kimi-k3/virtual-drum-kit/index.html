<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0b0d12">
<title>Virtual Drum Kit — Browser Studio</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🥁</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0d12; --line:#272e3b; --txt:#e9edf5; --dim:#8b93a7;
  --amber:#fbbf24; --red:#ef4444;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:'Rajdhani',system-ui,sans-serif; color:var(--txt);
  background:
    radial-gradient(1100px 520px at 50% -8%, rgba(59,70,99,.35), transparent 60%),
    radial-gradient(900px 500px at 88% 112%, rgba(30,58,95,.25), transparent 55%),
    var(--bg);
  min-height:100vh; overscroll-behavior:none;
}
body::before{content:'';position:fixed;inset:0;pointer-events:none;opacity:.05;
  background:repeating-linear-gradient(0deg,transparent 0 2px,#fff 2px 3px);mix-blend-mode:overlay}
.app{max-width:1040px;margin:0 auto;padding:18px clamp(10px,3vw,26px) 34px;display:flex;flex-direction:column;gap:16px}
.rack{background:linear-gradient(180deg,#1c212c,#14171f);border:1px solid var(--line);border-radius:16px;
  box-shadow:0 14px 34px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.05)}

/* ---------- header ---------- */
.head{display:flex;align-items:center;gap:16px;padding:14px 18px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:12px}
.logo{width:52px;height:52px;border-radius:14px;display:grid;place-items:center;font-size:27px;
  background:linear-gradient(145deg,#3a2b12,#221a0c);border:1px solid rgba(251,191,36,.45);
  box-shadow:0 0 18px rgba(251,191,36,.25), inset 0 1px 0 rgba(255,255,255,.12)}
h1{font-family:'Audiowide',cursive;font-size:clamp(15px,2.4vw,23px);letter-spacing:2px;
  background:linear-gradient(180deg,#ffe9b0,#f5a623);-webkit-background-clip:text;background-clip:text;color:transparent}
.brand p{font-size:10px;letter-spacing:4px;color:var(--dim);font-weight:600;margin-top:2px}
#spec{flex:1 1 220px;height:64px;min-width:140px;background:#07090d;border:1px solid #20262f;border-radius:10px;
  box-shadow:inset 0 2px 10px rgba(0,0,0,.8)}
.vol{display:flex;flex-direction:column;gap:6px;align-items:flex-end}
.vol label{font-size:9px;letter-spacing:3px;color:var(--dim);font-weight:700}

input[type=range]{-webkit-appearance:none;appearance:none;width:130px;height:6px;border-radius:4px;
  background:#0c0f14;border:1px solid #262c38;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#f5f7fb,#9aa3b5 60%,#5b6474);border:1px solid #11141a;
  box-shadow:0 2px 6px rgba(0,0,0,.6),0 0 0 3px rgba(251,191,36,.15)}
input[type=range]::-moz-range-thumb{width:18px;height:18px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#f5f7fb,#9aa3b5 60%,#5b6474);border:1px solid #11141a}

/* ---------- pads ---------- */
.pads{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.pad{position:relative;border-radius:18px;aspect-ratio:4/3;cursor:pointer;user-select:none;-webkit-user-select:none;
  touch-action:none;overflow:hidden;
  background:radial-gradient(130% 130% at 50% 18%, #2d333f 0%, #21252f 52%, #181b23 100%);
  border:1px solid #333a49;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.07), inset 0 -16px 26px rgba(0,0,0,.5), 0 10px 22px rgba(0,0,0,.45);
  transition:transform .06s ease, box-shadow .12s ease, border-color .12s ease}
.pad::before{content:'';position:absolute;inset:9px;border-radius:12px;border:2px solid rgba(var(--c),.30);
  box-shadow:inset 0 0 22px rgba(var(--c),.10);transition:.12s;pointer-events:none}
.pad .key{position:absolute;top:10px;left:10px;font-family:'Share Tech Mono',monospace;font-size:13px;line-height:1;
  padding:4px 7px 3px;border-radius:6px;background:rgba(0,0,0,.5);border:1px solid rgba(var(--c),.6);color:rgb(var(--c));z-index:2}
.pad .cat{position:absolute;top:13px;right:12px;font-size:9px;letter-spacing:2.5px;color:var(--dim);font-weight:600;z-index:2}
.pad .name{position:absolute;left:6px;right:6px;top:50%;transform:translateY(-50%);text-align:center;font-weight:700;
  font-size:clamp(14px,1.9vw,21px);letter-spacing:2px;text-transform:uppercase;color:#dfe5ef;
  text-shadow:0 2px 6px rgba(0,0,0,.6);z-index:2;pointer-events:none}
.pad.hit,.pad.held{transform:translateY(2px) scale(.975);border-color:rgb(var(--c));
  box-shadow:0 0 26px rgba(var(--c),.5), inset 0 0 34px rgba(var(--c),.30), inset 0 1px 0 rgba(255,255,255,.1)}
.pad.hit::before,.pad.held::before{border-color:rgba(var(--c),.85);box-shadow:inset 0 0 26px rgba(var(--c),.35)}
.ripple{position:absolute;inset:0;border-radius:18px;border:3px solid rgba(var(--c),.75);pointer-events:none;
  animation:rip .45s ease-out forwards;z-index:1}
@keyframes rip{0%{opacity:.9;transform:scale(.82)}100%{opacity:0;transform:scale(1.18)}}

/* ---------- console ---------- */
.console{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:14px 20px;padding:14px 18px}
.transport{display:flex;align-items:center;gap:10px}
.tbtn{width:46px;height:46px;border-radius:50%;border:1px solid #363e4e;cursor:pointer;color:#a7b0c2;
  display:grid;place-items:center;background:radial-gradient(circle at 34% 28%,#3b4252,#22262f 72%);
  box-shadow:0 5px 12px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.09);transition:.15s}
.tbtn:hover{color:#fff;border-color:#4b5568}
.tbtn:active{transform:translateY(1px)}
.tbtn svg{width:19px;height:19px;fill:currentColor}
.tbtn.rec{color:#f87171}
.tbtn.rec.on{color:#ff5252;border-color:#7f2d2d;animation:pulse 1.1s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 16px rgba(239,68,68,.5), inset 0 1px 0 rgba(255,255,255,.1)}
  50%{box-shadow:0 0 34px rgba(239,68,68,.9), inset 0 1px 0 rgba(255,255,255,.1)}}
.tbtn.play.on{color:#34d399;border-color:#14532d;box-shadow:0 0 20px rgba(52,211,153,.5)}
.tbtn.pill{width:auto;height:40px;border-radius:11px;padding:0 15px;font:700 13px 'Rajdhani',sans-serif;letter-spacing:2px}
.tbtn.pill.on{color:var(--amber);border-color:rgba(251,191,36,.6);box-shadow:0 0 16px rgba(251,191,36,.35)}
.lcdwrap{display:flex;align-items:center;gap:10px;flex:1;justify-content:center;min-width:230px}
.led{width:11px;height:11px;border-radius:50%;background:#3a1518;border:1px solid #551f24;flex:none}
.led.on{background:#ff3b30;box-shadow:0 0 12px #ff3b30;animation:blink .9s steps(2) infinite}
@keyframes blink{50%{opacity:.25}}
.lcd{flex:1;max-width:330px;text-align:center;font-family:'Share Tech Mono',monospace;font-size:15px;letter-spacing:1px;
  color:#8df0a9;background:#060a07;border:1px solid #1c2a20;border-radius:9px;padding:10px 12px;
  white-space:nowrap;overflow:hidden;text-shadow:0 0 8px rgba(141,240,169,.5);
  box-shadow:inset 0 2px 9px rgba(0,0,0,.85)}
.lcd.rec{color:#ff8a8a;text-shadow:0 0 8px rgba(255,100,100,.55)}
.metro{display:flex;align-items:center;gap:10px}
.metro input{width:100px}
.bpm{font-family:'Share Tech Mono',monospace;color:var(--amber);font-size:17px;min-width:34px;text-align:right}
.bpmlabel{font-size:9px;letter-spacing:2px;color:var(--dim);font-weight:700}
.beats{display:flex;gap:6px}
.beats i{width:9px;height:9px;border-radius:50%;background:#2b303c;transition:background .05s}
.beats i.on{background:var(--amber);box-shadow:0 0 9px var(--amber)}
.beats i.on.first{background:var(--red);box-shadow:0 0 9px var(--red)}
.kits{display:flex;background:#0f1218;border:1px solid #242a35;border-radius:13px;padding:4px;gap:4px}
.kit-btn{padding:9px 14px;border-radius:9px;border:1px solid transparent;background:transparent;color:var(--dim);
  font:700 13px 'Rajdhani',sans-serif;letter-spacing:1.5px;cursor:pointer;transition:.15s;white-space:nowrap}
.kit-btn:hover{color:#cdd5e3}
.kit-btn.on{color:#ffd98a;background:linear-gradient(180deg,#2b2415,#1a160d);border-color:rgba(251,191,36,.5);
  box-shadow:0 0 14px rgba(251,191,36,.22)}

/* ---------- timeline ---------- */
.tl{padding:12px 14px}
.tlhead{display:flex;justify-content:space-between;font-size:9px;letter-spacing:3px;color:var(--dim);font-weight:700;margin-bottom:8px}
#tl{width:100%;height:98px;display:block;background:#07090d;border:1px solid #20262f;border-radius:10px}

footer{text-align:center;color:var(--dim);font-size:13px;letter-spacing:1px;line-height:2.1}
.kbd{font-family:'Share Tech Mono',monospace;font-size:11px;color:#b8c1d2;background:#171b23;
  border:1px solid #2c3340;border-bottom-width:2px;border-radius:6px;padding:2px 7px;margin:0 1px}
#toast{position:fixed;top:16px;left:50%;transform:translate(-50%,-8px);background:#12151d;border:1px solid #2e3542;
  color:#e7ecf5;padding:9px 18px;border-radius:999px;font-weight:600;letter-spacing:1px;font-size:14px;
  opacity:0;pointer-events:none;transition:.25s;z-index:50;box-shadow:0 10px 30px rgba(0,0,0,.6)}
#toast.show{opacity:1;transform:translate(-50%,0)}

@media(max-width:680px){
  .head{gap:12px}
  #spec{order:3;flex-basis:100%;height:52px}
  .vol{margin-left:auto}
  .pads{grid-template-columns:repeat(3,1fr);gap:10px}
  .pad{aspect-ratio:1}
  .console{justify-content:center}
  .lcdwrap{width:100%}
  .lcd{max-width:100%}
}
@media(max-width:380px){.pad .name{font-size:13px;letter-spacing:1px}}
</style>
</head>
<body>
<div class="app">

  <header class="rack head">
    <div class="brand">
      <div class="logo">🥁</div>
      <div>
        <h1>VIRTUAL DRUM KIT</h1>
        <p>BROWSER STUDIO · 12-PIECE KIT</p>
      </div>
    </div>
    <canvas id="spec"></canvas>
    <div class="vol">
      <label>MASTER</label>
      <input id="vol" type="range" min="0" max="1" step="0.01" value="0.85">
    </div>
  </header>

  <main><div id="pads" class="pads"></div></main>

  <section class="rack console">
    <div class="transport">
      <button id="recBtn" class="tbtn rec" title="Record"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="7"/></svg></button>
      <button id="playBtn" class="tbtn play" title="Play"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
      <button id="stopBtn" class="tbtn" title="Stop"><svg viewBox="0 0 24 24"><rect x="6.5" y="6.5" width="11" height="11" rx="1.5"/></svg></button>
      <button id="loopBtn" class="tbtn pill" title="Loop playback">LOOP</button>
      <button id="clearBtn" class="tbtn pill" title="Clear track">CLR</button>
    </div>
    <div class="lcdwrap">
      <div class="led" id="recLed"></div>
      <div class="lcd" id="lcd">READY</div>
    </div>
    <div class="metro">
      <button id="metroBtn" class="tbtn pill" title="Metronome">CLICK</button>
      <input id="bpm" type="range" min="40" max="220" value="100">
      <span class="bpm" id="bpmVal">100</span><span class="bpmlabel">BPM</span>
      <div class="beats" id="beats"></div>
    </div>
    <div class="kits" id="kits"></div>
  </section>

  <section class="rack tl">
    <div class="tlhead"><span>SESSION TIMELINE</span><span id="tlInfo">NO TRACK</span></div>
    <canvas id="tl"></canvas>
  </section>

  <footer>
    <div>
      Tap the pads or use your keyboard:
      <span class="kbd">Q</span><span class="kbd">W</span><span class="kbd">E</span><span class="kbd">R</span> ·
      <span class="kbd">A</span><span class="kbd">S</span><span class="kbd">D</span><span class="kbd">F</span> ·
      <span class="kbd">Z</span><span class="kbd">X</span><span class="kbd">C</span><span class="kbd">V</span> ·
      <span class="kbd">SPACE</span> kick
    </div>
    <div style="opacity:.65">Drag across pads for rolls · tap higher on a pad for softer hits · REC captures, ▶ plays back, LOOP repeats</div>
  </footer>
</div>
<div id="toast"></div>

<script>
(function(){
'use strict';

/* ================= KIT & PAD DATA ================= */
const PADS=[
  {id:'crash',    name:'Crash',     code:'CR', key:'Q', cat:'CYMBAL', c:'251,191,36',  pan:-0.35},
  {id:'ride',     name:'Ride',      code:'RD', key:'W', cat:'CYMBAL', c:'245,158,11',  pan: 0.35},
  {id:'hatOpen',  name:'Open Hat',  code:'OH', key:'E', cat:'HI-HAT', c:'226,232,240', pan: 0.22},
  {id:'hatClosed',name:'Clsd Hat',  code:'CH', key:'R', cat:'HI-HAT', c:'148,163,184', pan: 0.15},
  {id:'tomHi',    name:'Hi Tom',    code:'HT', key:'A', cat:'TOM',    c:'56,189,248',  pan:-0.18},
  {id:'tomMid',   name:'Mid Tom',   code:'MT', key:'S', cat:'TOM',    c:'14,165,233',  pan:-0.02},
  {id:'tomFloor', name:'Floor Tom', code:'FT', key:'D', cat:'TOM',    c:'2,132,199',   pan: 0.18},
  {id:'clap',     name:'Clap',      code:'CL', key:'F', cat:'PERC',   c:'167,139,250', pan: 0.06},
  {id:'kick',     name:'Kick',      code:'KK', key:'Z', cat:'DRUM',   c:'251,146,60',  pan: 0},
  {id:'snare',    name:'Snare',     code:'SN', key:'X', cat:'DRUM',   c:'251,113,133', pan:-0.06},
  {id:'rim',      name:'Rimshot',   code:'RM', key:'C', cat:'PERC',   c:'52,211,153',  pan:-0.25},
  {id:'cowbell',  name:'Cowbell',   code:'CB', key:'V', cat:'PERC',   c:'244,114,182', pan: 0.30}
];
const PADIDX={}, PAN={}, KEYMAP={};
PADS.forEach((p,i)=>{ PADIDX[p.id]=i; PAN[p.id]=p.pan; KEYMAP[p.key.toLowerCase()]=p.id; });
KEYMAP[' ']='kick';

const KITS={
  studio:{ label:'STUDIO', icon:'🎙️', filt:{f:19000,q:0.5}, rev:0.22, drive:0, vinyl:0,
    kick:{f0:150,f1:47,pd:0.085,dec:0.42,vel:1.05,click:0.40,wet:0.06},
    snare:{bp:1900,q:0.9,nd:0.20,nv:0.85,tone:192,td:0.09,tv:0.50,wet:0.22},
    hatC:{hp:7600,dec:0.06,v:0.45,metal:0,mf:[2631,4471,5873],wet:0.10},
    hatO:{hp:7100,dec:0.45,v:0.50,metal:0,mf:[2631,4471,5873],wet:0.16},
    crash:{hp:4200,dec:1.80,v:0.55,metal:0.05,mf:[4100,5900,8300],wet:0.38},
    ride:{hp:6100,dec:1.15,v:0.45,metal:0.05,mf:[5000,7200],ping:3050,pv:0.16,wet:0.30},
    tomHi:{f0:196,f1:93,pd:0.15,dec:0.34,v:0.90,wet:0.18},
    tomMid:{f0:156,f1:75,pd:0.16,dec:0.40,v:0.92,wet:0.18},
    tomFloor:{f0:120,f1:56,pd:0.18,dec:0.48,v:0.95,wet:0.20},
    clap:{bp:1150,q:1.3,v:0.80,dec:0.24,wet:0.30},
    rim:{f:1750,bp:2450,v:0.70,wet:0.12},
    cowbell:{bpf:960,q:1.1,dec:0.28,v:0.50,wet:0.12} },
  e808:{ label:'808', icon:'⚡', filt:{f:17500,q:0.5}, rev:0.10, drive:0.55, vinyl:0,
    kick:{f0:172,f1:41,pd:0.15,dec:0.80,vel:1.20,click:0.12,wet:0.02},
    snare:{bp:2050,q:0.8,nd:0.27,nv:0.95,tone:258,td:0.12,tv:0.50,wet:0.14},
    hatC:{hp:8400,dec:0.05,v:0.50,metal:0.12,mf:[2631,4471,5873,7200],wet:0.05},
    hatO:{hp:7900,dec:0.55,v:0.55,metal:0.14,mf:[2631,4471,5873,7200],wet:0.07},
    crash:{hp:4600,dec:1.50,v:0.50,metal:0.15,mf:[4100,5900,8300],wet:0.30},
    ride:{hp:6600,dec:0.95,v:0.42,metal:0.13,mf:[5000,7200],ping:3350,pv:0.14,wet:0.25},
    tomHi:{f0:215,f1:82,pd:0.22,dec:0.42,v:0.85,wet:0.10},
    tomMid:{f0:170,f1:66,pd:0.24,dec:0.48,v:0.88,wet:0.10},
    tomFloor:{f0:128,f1:50,pd:0.26,dec:0.55,v:0.90,wet:0.12},
    clap:{bp:1350,q:1.1,v:0.85,dec:0.28,wet:0.22},
    rim:{f:1720,bp:2600,v:0.75,wet:0.08},
    cowbell:{bpf:1000,q:1.2,dec:0.32,v:0.60,wet:0.08} },
  lofi:{ label:'LO-FI', icon:'📼', filt:{f:5200,q:0.7}, rev:0.28, drive:0.18, vinyl:0.02,
    kick:{f0:132,f1:45,pd:0.07,dec:0.32,vel:0.95,click:0.18,wet:0.08},
    snare:{bp:1550,q:1.0,nd:0.17,nv:0.80,tone:178,td:0.08,tv:0.45,wet:0.26},
    hatC:{hp:6800,dec:0.045,v:0.42,metal:0,mf:[2631,4471],wet:0.12},
    hatO:{hp:6400,dec:0.30,v:0.45,metal:0,mf:[2631,4471],wet:0.18},
    crash:{hp:3800,dec:1.40,v:0.50,metal:0.03,mf:[4100,5900],wet:0.42},
    ride:{hp:5400,dec:0.90,v:0.40,metal:0.03,mf:[5000],ping:2850,pv:0.13,wet:0.34},
    tomHi:{f0:180,f1:88,pd:0.14,dec:0.30,v:0.85,wet:0.22},
    tomMid:{f0:145,f1:70,pd:0.15,dec:0.36,v:0.88,wet:0.22},
    tomFloor:{f0:112,f1:53,pd:0.17,dec:0.44,v:0.90,wet:0.24},
    clap:{bp:1000,q:1.4,v:0.75,dec:0.22,wet:0.34},
    rim:{f:1600,bp:2200,v:0.65,wet:0.18},
    cowbell:{bpf:880,q:1.1,dec:0.24,v:0.45,wet:0.16} }
};
let kit='studio';
const KP=()=>KITS[kit];

/* ================= AUDIO CORE ================= */
let ctx=null, kitFilter, master, comp, analyser, convolver, revGain, noiseBuf, vinylGain=null;
let voices=[], hatEnv=null;
const driveCurves={};

function makeNoise(sec){
  const len=Math.floor(ctx.sampleRate*sec), buf=ctx.createBuffer(1,len,ctx.sampleRate), d=buf.getChannelData(0);
  for(let i=0;i<len;i++) d[i]=Math.random()*2-1;
  return buf;
}
function makeImpulse(dur,dec){
  const rate=ctx.sampleRate, len=Math.floor(rate*dur), buf=ctx.createBuffer(2,len,rate);
  for(let ch=0;ch<2;ch++){ const d=buf.getChannelData(ch);
    for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,dec); }
  return buf;
}
function driveCurve(a){
  if(driveCurves[a]) return driveCurves[a];
  const n=1024, c=new Float32Array(n), k=1+a*10;
  for(let i=0;i<n;i++){ const x=i/(n-1)*2-1; c[i]=Math.tanh(k*x)/Math.tanh(k); }
  driveCurves[a]=c; return c;
}
function initAudio(){
  const AC=window.AudioContext||window.webkitAudioContext; if(!AC) return;
  ctx=new AC();
  kitFilter=ctx.createBiquadFilter(); kitFilter.type='lowpass';
  master=ctx.createGain(); master.gain.value=+volEl.value;
  comp=ctx.createDynamicsCompressor();
  comp.threshold.value=-16; comp.knee.value=20; comp.ratio.value=5; comp.attack.value=0.004; comp.release.value=0.25;
  analyser=ctx.createAnalyser(); analyser.fftSize=256; analyser.smoothingTimeConstant=0.82;
  kitFilter.connect(master); master.connect(analyser); analyser.connect(comp); comp.connect(ctx.destination);
  convolver=ctx.createConvolver(); convolver.buffer=makeImpulse(2.2,2.7);
  revGain=ctx.createGain(); convolver.connect(revGain); revGain.connect(kitFilter);
  noiseBuf=makeNoise(2);
  applyKit(kit,true);
}
function ensureCtx(){ if(!ctx) initAudio(); if(ctx && ctx.state==='suspended') ctx.resume(); }
document.addEventListener('pointerdown',ensureCtx);
window.addEventListener('keydown',ensureCtx);

/* ---------- helpers ---------- */
function bp(f,q){ const b=ctx.createBiquadFilter(); b.type='bandpass'; b.frequency.value=f; b.Q.value=q; return b; }
function hpF(f){ const b=ctx.createBiquadFilter(); b.type='highpass'; b.frequency.value=f; return b; }
function noiseVoice(t,dur){ const s=ctx.createBufferSource(); s.buffer=noiseBuf; s.loop=true; s.start(t); s.stop(t+dur+0.1); return s; }
function envGainNode(t,peak,dec,atk){
  const g=ctx.createGain(), a=atk||0.004;
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(Math.max(peak,0.0002),t+a);
  g.gain.exponentialRampToValueAtTime(0.0001,t+Math.max(dec,a+0.01));
  return g;
}
function route(node,pan,wet){
  let out=node;
  if(pan && ctx.createStereoPanner){ const pn=ctx.createStereoPanner(); pn.pan.value=pan; node.connect(pn); out=pn; }
  out.connect(kitFilter);
  if(wet>0.001){ const wg=ctx.createGain(); wg.gain.value=wet; node.connect(wg); wg.connect(convolver); }
}
function voiceBus(pan,wet,t,dur){
  const m=ctx.createGain(); route(m,pan,wet);
  voices.push({m:m, until:(t||ctx.currentTime)+dur+0.4});
  return m;
}
function chokeHat(g){
  const now=ctx.currentTime;
  if(hatEnv){ try{ hatEnv.gain.cancelScheduledValues(now); hatEnv.gain.setTargetAtTime(0.0001,now,0.006); }catch(e){} }
  hatEnv=g;
}

/* ---------- instrument voices (all synthesized, no samples) ---------- */
function vKick(t,vel){
  const p=KP().kick, mix=voiceBus(PAN.kick,p.wet,t,p.dec+0.2);
  const o=ctx.createOscillator(); o.type='sine';
  o.frequency.setValueAtTime(p.f0,t);
  o.frequency.exponentialRampToValueAtTime(Math.max(p.f1,1),t+p.pd);
  const g=envGainNode(t,p.vel*vel,p.dec,0.005);
  const d=KP().drive;
  if(d>0){ const sh=ctx.createWaveShaper(); sh.curve=driveCurve(d); o.connect(sh); sh.connect(g); }
  else o.connect(g);
  g.connect(mix); o.start(t); o.stop(t+p.dec+0.2);
  if(p.click>0){
    const n=noiseVoice(t,0.03), hf=hpF(1200), ng=envGainNode(t,p.click*vel,0.025,0.0015);
    n.connect(hf); hf.connect(ng); ng.connect(mix);
  }
}
function vSnare(t,vel){
  const p=KP().snare, mix=voiceBus(PAN.snare,p.wet,t,p.nd+0.1);
  const n=noiseVoice(t,p.nd+0.1), f=bp(p.bp,p.q), ng=envGainNode(t,p.nv*vel,p.nd,0.002);
  n.connect(f); f.connect(ng); ng.connect(mix);
  const o=ctx.createOscillator(); o.type='triangle';
  o.frequency.setValueAtTime(p.tone,t);
  o.frequency.exponentialRampToValueAtTime(p.tone*0.8,t+p.td);
  const og=envGainNode(t,p.tv*vel,p.td,0.003);
  o.connect(og); og.connect(mix); o.start(t); o.stop(t+p.td+0.05);
}
function vMetal(t,vel,p,pan,choke){
  const mix=voiceBus(pan,p.wet,t,p.dec+0.2);
  const hp=hpF(p.hp), g=envGainNode(t,p.v*vel,p.dec,0.002);
  hp.connect(g); g.connect(mix);
  const n=noiseVoice(t,p.dec+0.2); n.connect(hp);
  if(p.metal>0 && p.mf){
    p.mf.forEach(fr=>{
      const o=ctx.createOscillator(); o.type='square'; o.frequency.value=fr;
      const og=envGainNode(t,p.v*vel*p.metal,p.dec*0.6,0.002);
      o.connect(og); og.connect(hp); o.start(t); o.stop(t+p.dec);
    });
  }
  if(choke) chokeHat(g);
}
function vRide(t,vel){
  const p=KP().ride;
  vMetal(t,vel,p,PAN.ride,false);
  const mix=voiceBus(PAN.ride,p.wet*0.5,t,p.dec*0.4+0.2);
  const o=ctx.createOscillator(); o.type='sine'; o.frequency.value=p.ping;
  const g=envGainNode(t,p.pv*vel,p.dec*0.4,0.003);
  o.connect(g); g.connect(mix); o.start(t); o.stop(t+p.dec*0.4+0.1);
}
function vTom(t,vel,p,pan){
  const mix=voiceBus(pan,p.wet,t,p.dec+0.1);
  const o=ctx.createOscillator(); o.type='sine';
  o.frequency.setValueAtTime(p.f0,t);
  o.frequency.exponentialRampToValueAtTime(Math.max(p.f1,1),t+p.pd);
  const g=envGainNode(t,p.v*vel,p.dec,0.004);
  o.connect(g); g.connect(mix); o.start(t); o.stop(t+p.dec+0.1);
  const n=noiseVoice(t,0.04), hf=hpF(900), ng=envGainNode(t,0.15*vel,0.03,0.002);
  n.connect(hf); hf.connect(ng); ng.connect(mix);
}
function vClap(t,vel){
  const p=KP().clap, mix=voiceBus(PAN.clap,p.wet,t,p.dec+0.15);
  const f=bp(p.bp,p.q); f.connect(mix);
  [0,0.013,0.026].forEach(off=>{
    const n=noiseVoice(t+off,0.05), g=envGainNode(t+off,0.7*vel,0.02,0.002);
    n.connect(g); g.connect(f);
  });
  const n2=noiseVoice(t+0.03,p.dec+0.1), g2=envGainNode(t+0.03,p.v*vel,p.dec,0.002);
  n2.connect(g2); g2.connect(f);
}
function vRim(t,vel){
  const p=KP().rim, mix=voiceBus(PAN.rim,p.wet,t,0.15);
  const o=ctx.createOscillator(); o.type='sine'; o.frequency.value=p.f;
  const g=envGainNode(t,0.5*vel,0.03,0.0015);
  o.connect(g); g.connect(mix); o.start(t); o.stop(t+0.08);
  const n=noiseVoice(t,0.06), f=bp(p.bp,4), g2=envGainNode(t,p.v*vel,0.045,0.0015);
  n.connect(f); f.connect(g2); g2.connect(mix);
}
function vCowbell(t,vel){
  const p=KP().cowbell, mix=voiceBus(PAN.cowbell,p.wet,t,p.dec+0.1);
  const f=bp(p.bpf,p.q), g=envGainNode(t,p.v*vel,p.dec,0.003);
  f.connect(g); g.connect(mix);
  [560,845].forEach(fr=>{
    const o=ctx.createOscillator(); o.type='square'; o.frequency.value=fr;
    o.connect(f); o.start(t); o.stop(t+p.dec+0.05);
  });
}
const VOICES={
  kick:vKick, snare:vSnare, rim:vRim, clap:vClap, cowbell:vCowbell, ride:vRide,
  crash:(t,v)=>vMetal(t,v,KP().crash,PAN.crash,false),
  hatOpen:(t,v)=>vMetal(t,v,KP().hatO,PAN.hatOpen,true),
  hatClosed:(t,v)=>vMetal(t,v,KP().hatC,PAN.hatClosed,true),
  tomHi:(t,v)=>vTom(t,v,KP().tomHi,PAN.tomHi),
  tomMid:(t,v)=>vTom(t,v,KP().tomMid,PAN.tomMid),
  tomFloor:(t,v)=>vTom(t,v,KP().tomFloor,PAN.tomFloor)
};

/* ================= TRANSPORT STATE ================= */
let events=[], recording=false, recStart=0, playing=false, playStart=0, playIdx=0, loopOn=false;
const LOOP_PAD=0.35;
const duration=()=>events.length?events[events.length-1].t:0;
const loopDur=()=>duration()+LOOP_PAD;

/* ================= UI BUILD ================= */
const $=s=>document.querySelector(s);
const padsEl=$('#pads'), lcdEl=$('#lcd'), recLed=$('#recLed'), tlInfo=$('#tlInfo');
const recBtn=$('#recBtn'), playBtn=$('#playBtn'), stopBtn=$('#stopBtn'),
      loopBtn=$('#loopBtn'), clearBtn=$('#clearBtn'), metroBtn=$('#metroBtn'),
      bpmEl=$('#bpm'), bpmVal=$('#bpmVal'), volEl=$('#vol'), beatsEl=$('#beats'), kitsEl=$('#kits');

const padEls={};
PADS.forEach(p=>{
  const el=document.createElement('div');
  el.className='pad'; el.style.setProperty('--c',p.c); el.dataset.id=p.id;
  el.innerHTML='<span class="key">'+p.key+'</span><span class="cat">'+p.cat+'</span><span class="name">'+p.name+'</span>';
  padsEl.appendChild(el); padEls[p.id]=el;
  el.addEventListener('pointerdown',e=>{
    e.preventDefault();
    const r=el.getBoundingClientRect();
    const relY=Math.min(1,Math.max(0,(e.clientY-r.top)/r.height));
    const vel=Math.min(1.2,Math.max(0.6,1.18-relY*0.55));
    el.classList.add('held');
    hit(p.id,vel);
  });
  ['pointerup','pointerleave','pointercancel'].forEach(ev=>el.addEventListener(ev,()=>el.classList.remove('held')));
  el.addEventListener('pointerenter',e=>{ if(e.buttons>0){ el.classList.add('held'); hit(p.id,1); } });
  el.addEventListener('contextmenu',e=>e.preventDefault());
});

Object.keys(KITS).forEach(k=>{
  const b=document.createElement('button');
  b.className='kit-btn'+(k===kit?' on':''); b.dataset.kit=k;
  b.textContent=KITS[k].icon+' '+KITS[k].label;
  b.addEventListener('click',()=>{ ensureCtx(); applyKit(k,false); });
  kitsEl.appendChild(b);
});

const beatDots=[];
for(let i=0;i<4;i++){ const d=document.createElement('i'); beatsEl.appendChild(d); beatDots.push(d); }

/* ================= INTERACTION ================= */
function animatePad(id){
  const el=padEls[id]; if(!el) return;
  el.classList.remove('hit'); void el.offsetWidth; el.classList.add('hit');
  clearTimeout(el._ht); el._ht=setTimeout(()=>el.classList.remove('hit'),170);
  const s=document.createElement('span'); s.className='ripple'; el.appendChild(s);
  setTimeout(()=>s.remove(),480);
}
function hit(id,vel){
  ensureCtx(); if(!ctx) return;
  vel=vel||1;
  VOICES[id](ctx.currentTime,vel);
  animatePad(id);
  if(recording){ events.push({t:ctx.currentTime-recStart, id:id, v:vel}); tlDirty=true; }
}
window.addEventListener('keydown',e=>{
  if(e.repeat) return;
  const id=KEYMAP[e.key.toLowerCase()];
  if(!id) return;
  e.preventDefault();
  padEls[id].classList.add('held');
  hit(id,1);
});
window.addEventListener('keyup',e=>{
  const id=KEYMAP[e.key.toLowerCase()];
  if(id) padEls[id].classList.remove('held');
});
window.addEventListener('blur',()=>PADS.forEach(p=>padEls[p.id].classList.remove('held')));

/* ================= TRANSPORT ================= */
function killVoices(){
  if(!ctx) return;
  const now=ctx.currentTime;
  voices.forEach(v=>{ try{ v.m.gain.cancelScheduledValues(now); v.m.gain.setTargetAtTime(0.0001,now,0.015); }catch(e){} });
  voices.length=0; hatEnv=null;
}
function startRecord(){
  events=[]; recording=true; recStart=ctx.currentTime;
  recBtn.classList.add('on'); recLed.classList.add('on');
  tlDirty=true; toast('● Recording');
}
function stopRecord(){
  recording=false;
  recBtn.classList.remove('on'); recLed.classList.remove('on');
  tlDirty=true;
  toast(events.length?('Track ready • '+events.length+' hits'):'Nothing recorded');
}
function scheduleAll(base){ events.forEach(ev=>VOICES[ev.id](base+ev.t,ev.v||1)); }
function startPlayback(base){
  playing=true; playStart=base; playIdx=0;
  playBtn.classList.add('on');
  scheduleAll(base);
}
function stopPlayback(){
  playing=false; playBtn.classList.remove('on');
  killVoices();
}
recBtn.addEventListener('click',()=>{
  ensureCtx();
  if(recording){ stopRecord(); return; }
  if(playing) stopPlayback();
  startRecord();
});
playBtn.addEventListener('click',()=>{
  ensureCtx();
  if(playing){ stopPlayback(); return; }
  if(recording){ toast('Stop recording first'); return; }
  if(!events.length){ toast('Record something first'); return; }
  startPlayback(ctx.currentTime+0.06);
});
stopBtn.addEventListener('click',()=>{
  if(recording) stopRecord();
  if(playing) stopPlayback();
});
loopBtn.addEventListener('click',()=>{
  loopOn=!loopOn; loopBtn.classList.toggle('on',loopOn);
  toast(loopOn?'Loop on':'Loop off');
});
clearBtn.addEventListener('click',()=>{
  if(recording) stopRecord();
  if(playing) stopPlayback();
  events=[]; tlDirty=true; toast('Track cleared');
});

/* ================= METRONOME ================= */
let metro=false, bpm=+bpmEl.value, nextT=0, beatCount=0, metroInt=null, pendBeats=[];
function clickAt(t,acc){
  const o=ctx.createOscillator(); o.type='square'; o.frequency.value=acc?2400:1700;
  const g=ctx.createGain();
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(acc?0.32:0.20,t+0.002);
  g.gain.exponentialRampToValueAtTime(0.0001,t+0.06);
  o.connect(g); g.connect(kitFilter); o.start(t); o.stop(t+0.08);
}
function metroTick(){
  if(!ctx) return;
  while(nextT<ctx.currentTime+0.12){
    clickAt(nextT,beatCount%4===0);
    pendBeats.push({t:nextT,b:beatCount%4});
    nextT+=60/bpm; beatCount++;
  }
}
metroBtn.addEventListener('click',()=>{
  ensureCtx(); metro=!metro; metroBtn.classList.toggle('on',metro);
  if(metro){
    beatCount=0; nextT=ctx.currentTime+0.06; pendBeats.length=0;
    metroInt=setInterval(metroTick,25);
    toast('Metronome on');
  }else{
    clearInterval(metroInt); pendBeats.length=0;
    beatDots.forEach(d=>d.classList.remove('on','first'));
  }
});
bpmEl.addEventListener('input',()=>{ bpm=+bpmEl.value; bpmVal.textContent=bpm; });
volEl.addEventListener('input',()=>{ if(master) master.gain.setTargetAtTime(+volEl.value,ctx.currentTime,0.02); });

/* ================= KITS ================= */
function applyKit(k,quiet){
  kit=k;
  document.querySelectorAll('.kit-btn').forEach(b=>b.classList.toggle('on',b.dataset.kit===k));
  if(!ctx) return;
  const p=KITS[k], now=ctx.currentTime;
  kitFilter.frequency.setTargetAtTime(p.filt.f,now,0.05);
  kitFilter.Q.setTargetAtTime(p.filt.q,now,0.05);
  revGain.gain.setTargetAtTime(p.rev,now,0.1);
  if(!vinylGain){
    const s=ctx.createBufferSource(); s.buffer=noiseBuf; s.loop=true;
    const lp=ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=2400;
    vinylGain=ctx.createGain(); vinylGain.gain.value=0;
    s.connect(lp); lp.connect(vinylGain); vinylGain.connect(kitFilter); s.start();
  }
  vinylGain.gain.setTargetAtTime(p.vinyl,now,0.25);
  if(!quiet) toast(p.icon+' '+p.label+' kit');
}

/* ================= CANVASES ================= */
const specC=$('#spec'), tlC=$('#tl');
const specCtx=specC.getContext('2d'), tlCtx=tlC.getContext('2d');
let specSize={w:0,h:0}, tlSize={w:0,h:0}, peaks=new Float32Array(0), specData=null, tlDirty=true;
function fit(c,g){
  const dpr=window.devicePixelRatio||1, r=c.getBoundingClientRect();
  c.width=Math.max(1,Math.round(r.width*dpr));
  c.height=Math.max(1,Math.round(r.height*dpr));
  g.setTransform(dpr,0,0,dpr,0,0);
  return {w:r.width,h:r.height};
}
function resizeAll(){ specSize=fit(specC,specCtx); tlSize=fit(tlC,tlCtx); tlDirty=true; }
window.addEventListener('resize',resizeAll);

function drawSpectrum(){
  const g=specCtx, w=specSize.w, h=specSize.h;
  if(w<2) return;
  g.clearRect(0,0,w,h);
  const bars=Math.max(24,Math.floor(w/9));
  if(peaks.length!==bars) peaks=new Float32Array(bars);
  let data=null;
  if(analyser){
    if(!specData) specData=new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(specData); data=specData;
  }
  const t=performance.now()/1000, bw=w/bars;
  for(let i=0;i<bars;i++){
    let v;
    if(data){ const idx=Math.floor(Math.pow(i/bars,1.6)*data.length*0.82); v=data[idx]/255; }
    else v=0.035+0.03*(0.5+0.5*Math.sin(t*2.2+i*0.55));
    const bh=Math.max(2,v*(h-4));
    peaks[i]=Math.max(peaks[i]-h*0.02,bh);
    const seg=5,gap=2,unit=seg+gap, n=Math.min(Math.floor(h/unit),Math.floor(bh/unit));
    for(let s=0;s<n;s++){
      const r=(s*unit)/h;
      g.fillStyle=r<0.55?'#22c55e':r<0.8?'#facc15':'#ef4444';
      g.globalAlpha=data?0.92:0.3;
      g.fillRect(i*bw+1,h-(s+1)*unit+gap,bw-2,seg);
    }
    g.globalAlpha=0.85; g.fillStyle='#e8edf5';
    g.fillRect(i*bw+1,Math.max(0,h-peaks[i]-3),bw-2,2);
    g.globalAlpha=1;
  }
}
function drawTimeline(){
  if(!tlDirty && !recording && !playing) return;
  tlDirty=false;
  const g=tlCtx, w=tlSize.w, h=tlSize.h;
  if(w<2) return;
  g.clearRect(0,0,w,h);
  const lanes=PADS.length, laneH=h/lanes, gutter=30, pad=6;
  g.font='8px "Share Tech Mono", monospace'; g.textBaseline='middle';
  for(let i=0;i<lanes;i++){
    const y=i*laneH;
    g.fillStyle='rgba(139,147,167,.65)';
    g.fillText(PADS[i].code,7,y+laneH/2);
    g.strokeStyle='rgba(39,46,59,.55)'; g.lineWidth=1;
    g.beginPath(); g.moveTo(gutter,y+laneH+0.5); g.lineTo(w-pad,y+laneH+0.5); g.stroke();
  }
  let el=0;
  if(recording && ctx) el=ctx.currentTime-recStart;
  const total=Math.max(duration(),el,4);
  const X=t=>gutter+Math.min(1,t/total)*(w-gutter-pad-2);
  for(let i=0;i<events.length;i++){
    const ev=events[i], li=PADIDX[ev.id];
    const hgt=Math.min(laneH*0.8, laneH*0.62*(0.55+0.45*(ev.v||1)));
    g.fillStyle='rgb('+PADS[li].c+')';
    g.fillRect(X(ev.t)-1.5, li*laneH+(laneH-hgt)/2, 3, hgt);
  }
  if(playing && ctx){
    const pos=ctx.currentTime-playStart, x=X(Math.min(pos,total));
    g.strokeStyle='rgba(226,232,240,.9)'; g.lineWidth=1.5;
    g.beginPath(); g.moveTo(x,2); g.lineTo(x,h-2); g.stroke();
  }
  if(recording && ctx){
    const x=X(el);
    g.strokeStyle='rgba(239,68,68,.9)'; g.lineWidth=1.5;
    g.beginPath(); g.moveTo(x,2); g.lineTo(x,h-2); g.stroke();
  }
  tlInfo.textContent=events.length?(events.length+' HITS • '+fmt(total)):'NO TRACK';
}

/* ================= MISC / MAIN LOOP ================= */
function fmt(t){
  const m=Math.floor(t/60), s=t-m*60;
  return m+':'+(s<10?'0':'')+s.toFixed(1);
}
let lastLcd='';
function setLcd(txt,rec){
  if(txt===lastLcd) return;
  lastLcd=txt;
  lcdEl.textContent=txt;
  lcdEl.classList.toggle('rec',!!rec);
}
let toastT;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastT);
  toastT=setTimeout(()=>el.classList.remove('show'),1600);
}
function tick(){
  requestAnimationFrame(tick);
  drawSpectrum();
  if(ctx){
    const now=ctx.currentTime;
    if(recording){
      const el=now-recStart;
      setLcd('● REC  '+fmt(el),true);
      tlDirty=true;
      if(el>=60){ stopRecord(); toast('Max length reached (60s)'); }
    }else if(playing){
      let pos=now-playStart;
      while(playIdx<events.length && events[playIdx].t<=pos){ animatePad(events[playIdx].id); playIdx++; }
      if(pos>=loopDur()){
        if(loopOn && events.length){ startPlayback(now+0.04); pos=0; }
        else stopPlayback();
      }
      if(playing) setLcd('▶ '+fmt(Math.max(0,pos))+' / '+fmt(loopDur()));
    }else{
      setLcd(events.length?('TRK '+fmt(duration())+'  •  '+events.length+' HITS'):'READY — TAP A PAD');
    }
    while(pendBeats.length && pendBeats[0].t<=now){
      const b=pendBeats.shift().b;
      beatDots.forEach((d,i)=>{ d.classList.toggle('on',i===b); d.classList.toggle('first',i===b&&b===0); });
    }
    if(voices.length>160) voices=voices.filter(v=>v.until>now-0.5);
  }else{
    setLcd('READY — TAP A PAD');
  }
  drawTimeline();
}

resizeAll();
tick();
setTimeout(()=>{ if(!ctx) toast('👆 Tap any pad to power up the kit'); },700);
})();
</script>
</body>
