<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Falling Fruit Catcher 🍎</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden}
  body{
    font-family:'Fredoka','Comic Sans MS',sans-serif;
    background:#7ec8f7;
    touch-action:none;
    user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;
  }
  #game{position:fixed;inset:0}
  canvas{display:block}

  /* ---------- HUD ---------- */
  #hud{position:fixed;top:0;left:0;right:0;display:flex;align-items:center;gap:10px;padding:12px 14px;z-index:20;pointer-events:none}
  .pill{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.88);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
        border-radius:999px;padding:8px 18px;font-weight:700;font-size:20px;color:#3d405b;
        box-shadow:0 4px 12px rgba(30,60,120,.15);border:3px solid rgba(255,255,255,.9)}
  #score{color:#fb8500;font-size:24px;min-width:36px;text-align:center;display:inline-block}
  #score.pop{animation:pop .35s ease}
  @keyframes pop{40%{transform:scale(1.4) rotate(-4deg)}}
  #comboPill{background:linear-gradient(180deg,#ffb703,#ff9f1c);color:#fff;display:none;border-color:rgba(255,255,255,.7)}
  #comboPill.on{display:flex;animation:pop .3s ease}
  .heart{width:24px;height:24px;fill:#ff4d6d;stroke:#e01e37;stroke-width:1.4px;transition:all .3s;filter:drop-shadow(0 2px 2px rgba(224,30,55,.35))}
  .heart.lost{fill:#d5dde1;stroke:#b0bec5;transform:scale(.82);filter:none}
  .icon-btn{pointer-events:auto;width:46px;height:46px;border-radius:50%;border:3px solid rgba(255,255,255,.9);
            background:rgba(255,255,255,.88);font-size:20px;cursor:pointer;box-shadow:0 4px 12px rgba(30,60,120,.15);
            transition:transform .12s;display:flex;align-items:center;justify-content:center;line-height:1}
  .icon-btn:hover{transform:scale(1.12)}
  .icon-btn:active{transform:scale(.94)}

  /* ---------- Overlays ---------- */
  .overlay{position:fixed;inset:0;z-index:30;display:flex;align-items:center;justify-content:center;
           background:rgba(25,50,90,.28);backdrop-filter:blur(7px);-webkit-backdrop-filter:blur(7px);
           opacity:0;visibility:hidden;transition:opacity .3s,visibility .3s}
  .overlay.show{opacity:1;visibility:visible}
  .card{position:relative;max-width:min(92vw,560px);background:rgba(255,255,255,.95);border:5px solid #fff;
        border-radius:32px;padding:34px 40px 30px;text-align:center;box-shadow:0 24px 60px rgba(20,40,90,.3)}
  .overlay.show .card{animation:cardIn .55s cubic-bezier(.2,1.5,.35,1)}
  @keyframes cardIn{from{transform:scale(.6) translateY(40px);opacity:0}}
  h1.title{font-weight:800;font-size:clamp(28px,6.4vw,52px);line-height:1.15;margin-bottom:6px}
  .tl{display:inline-block;animation:bob 1.8s ease-in-out infinite;text-shadow:0 3px 0 rgba(0,0,0,.06)}
  @keyframes bob{50%{transform:translateY(-9px) rotate(3deg)}}
  .sub{color:#5f6b7a;font-weight:600;font-size:clamp(15px,2.6vw,19px);margin-bottom:16px}
  .how{display:flex;flex-direction:column;gap:8px;background:#f2f8ff;border-radius:18px;padding:14px 18px;
       margin-bottom:20px;font-size:clamp(14px,2.4vw,17px);color:#3d405b;font-weight:600}
  .big-btn{font-family:inherit;font-weight:800;font-size:clamp(20px,3.4vw,26px);color:#fff;
           background:linear-gradient(180deg,#ffb703,#fb8500);border:none;border-radius:999px;padding:14px 52px;
           cursor:pointer;box-shadow:0 7px 0 #d96c06,0 16px 26px rgba(217,108,6,.35);
           transition:transform .12s,box-shadow .12s;letter-spacing:.5px}
  .big-btn:hover{transform:translateY(-2px) scale(1.05)}
  .big-btn:active{transform:translateY(4px);box-shadow:0 2px 0 #d96c06,0 8px 14px rgba(217,108,6,.3)}
  .big-btn.green{background:linear-gradient(180deg,#2fe6a7,#06c195);box-shadow:0 7px 0 #059b78,0 16px 26px rgba(6,193,149,.35)}
  .big-btn.green:active{box-shadow:0 2px 0 #059b78,0 8px 14px rgba(6,193,149,.3)}
  .best{margin-top:16px;font-weight:700;color:#8a94a6;font-size:16px}
  .badge{display:inline-block;background:linear-gradient(180deg,#ffe066,#ffb703);color:#7a4a00;font-weight:800;
         border-radius:999px;padding:5px 18px;margin-top:12px;animation:badgePulse 1s ease-in-out infinite;font-size:15px}
  @keyframes badgePulse{50%{transform:scale(1.1)}}
  #finalScore{font-size:clamp(48px,10vw,76px);font-weight:800;color:#fb8500;line-height:1.05;text-shadow:0 4px 0 rgba(0,0,0,.06)}
  .over-label{color:#8a94a6;font-weight:700;letter-spacing:2px;font-size:14px;text-transform:uppercase;margin-top:8px}
  #floaters{position:absolute;inset:0;overflow:hidden;pointer-events:none}
  #floaters span{position:absolute;bottom:-70px;animation:floatUp linear infinite;opacity:.9;filter:drop-shadow(0 4px 6px rgba(0,0,0,.15))}
  @keyframes floatUp{to{transform:translateY(-115vh) rotate(340deg)}}
  .pause-emoji{font-size:64px;animation:bob 1.6s ease-in-out infinite;display:inline-block}

  @media (max-width:560px){
    .pill{padding:6px 12px;font-size:15px;border-width:2px}
    #score{font-size:18px;min-width:26px}
    .heart{width:19px;height:19px}
    .icon-btn{width:38px;height:38px;font-size:16px;border-width:2px}
    #hud{gap:6px;padding:8px}
    .card{padding:26px 20px 22px}
  }
</style>
</head>
<body>
<div id="game">
  <canvas id="cv"></canvas>

  <div id="hud">
    <div class="pill">🍎 <span id="score">0</span></div>
    <div class="pill" id="comboPill">🔥 <span id="combo">x3</span></div>
    <div style="flex:1"></div>
    <div class="pill">⭐ Lv <span id="level">1</span></div>
    <div class="pill" id="hearts">
      <svg class="heart" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
      <svg class="heart" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
      <svg class="heart" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
    </div>
    <button class="icon-btn" id="pauseBtn" title="Pause (P)">⏸</button>
    <button class="icon-btn" id="muteBtn" title="Mute (M)">🔊</button>
  </div>

  <div class="overlay show" id="startOverlay">
    <div id="floaters"></div>
    <div class="card">
      <h1 class="title" id="title">Falling Fruit Catcher</h1>
      <p class="sub">Catch the yummy falling fruit in your basket!</p>
      <div class="how">
        <div>🧺 Move with <b>← →</b> keys, <b>mouse</b>, or <b>touch</b></div>
        <div>🍉 Catch fruit to score — <b>⭐ golden star = +5!</b></div>
        <div>🤢 Don't catch the <b>rotten</b> ones & don't drop <b>3</b>!</div>
      </div>
      <button class="big-btn green" id="playBtn">▶&nbsp; Play!</button>
      <div class="best" id="bestStart"></div>
    </div>
  </div>

  <div class="overlay" id="overOverlay">
    <div class="card">
      <h1 class="title" id="overTitle">Game Over!</h1>
      <div class="over-label">Your Score</div>
      <div id="finalScore">0</div>
      <div class="badge" id="newBest" style="display:none">🏆 New Best!</div>
      <div class="best" id="bestOver">Best: 0</div>
      <br>
      <button class="big-btn" id="againBtn">↻&nbsp; Play Again</button>
    </div>
  </div>

  <div class="overlay" id="pauseOverlay">
    <div class="card">
      <span class="pause-emoji">🧺</span>
      <h1 class="title" style="color:#4cc9f0">Paused</h1>
      <p class="sub">Take a fruit break!</p>
      <button class="big-btn green" id="resumeBtn">▶&nbsp; Resume</button>
    </div>
  </div>
</div>

<script>
'use strict';
/* ============================================================
   Falling Fruit Catcher — a juicy little game for kids 🍓
   ============================================================ */
const $ = s => document.querySelector(s);
const rand = (a,b) => a + Math.random()*(b-a);
const clamp = (v,a,b) => Math.max(a, Math.min(b, v));
const TAU = Math.PI*2;
const easeOutCubic = p => 1 - Math.pow(1-p, 3);
const easeOutBack = p => { const c=1.70158; return 1 + (c+1)*Math.pow(p-1,3) + c*Math.pow(p-1,2); };

const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');

let W=0, H=0, S=1, DPR=1;
let state = 'start';            // start | playing | paused | over
let time = 0;

const store = {
  get(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } },
  set(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }
};
let score=0, lives=3, level=1, combo=0, catches=0;
let best = parseInt(store.get('ffcBest')||'0', 10) || 0;
let muted = store.get('ffcMuted')==='1';

let fruits=[], particles=[], texts=[];
let spawnTimer=0.9, sinceStar=0;
let shake=0, flash=0;

const basket = { x:0, y:0, w:130, h:60, vx:0, tilt:0, squash:0, speed:560 };
const keys = { left:false, right:false };
let pointerX = innerWidth/2, inputMode='pointer';

/* DOM refs */
const scoreEl=$('#score'), comboEl=$('#combo'), comboPill=$('#comboPill'),
      levelEl=$('#level'), heartsEl=$('#hearts'),
      startOverlay=$('#startOverlay'), overOverlay=$('#overOverlay'), pauseOverlay=$('#pauseOverlay'),
      finalScoreEl=$('#finalScore'), bestOverEl=$('#bestOver'), newBestEl=$('#newBest'),
      bestStartEl=$('#bestStart'), muteBtn=$('#muteBtn'), pauseBtn=$('#pauseBtn');

/* ============================================================
   Audio (tiny WebAudio synth)
   ============================================================ */
let AC=null;
function ac(){
  if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
  if(AC && AC.state==='suspended') AC.resume();
  return AC;
}
function tone(f, d, type='sine', v=0.15, delay=0, slide){
  if(muted) return;
  const a=ac(); if(!a) return;
  const o=a.createOscillator(), g=a.createGain();
  const t0=a.currentTime+delay;
  o.type=type; o.frequency.setValueAtTime(f, t0);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(1,slide), t0+d);
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(v, t0+0.015);
  g.gain.exponentialRampToValueAtTime(0.0001, t0+d);
  o.connect(g); g.connect(a.destination);
  o.start(t0); o.stop(t0+d+0.05);
}
const sfxClick = ()=>tone(700,.07,'square',.12);
const sfxStart = ()=>[523,659,784].forEach((f,i)=>tone(f,.12,'triangle',.18,i*.07));
const sfxCatch = c=>{ const p=Math.min(c,10)*30; tone(520+p,.1,'triangle',.22); tone(790+p,.12,'sine',.18,.05); };
const sfxGold  = ()=>[660,880,1174,1568].forEach((f,i)=>tone(f,.12,'triangle',.2,i*.06));
const sfxMiss  = ()=>tone(200,.28,'sawtooth',.16,0,80);
const sfxRotten= ()=>{ tone(140,.3,'square',.16,0,60); tone(90,.25,'square',.12,.08); };
const sfxLevel = ()=>[523,659,784,1046].forEach((f,i)=>tone(f,.14,'triangle',.2,i*.08));
const sfxOver  = ()=>[392,330,262,196].forEach((f,i)=>tone(f,.32,'sine',.2,i*.22));

/* ============================================================
   Fruit drawing (all with cute faces!)
   ============================================================ */
function drawFace(r, opts={}){
  const scale = opts.scale||1, yOff = opts.yOff||0, col = opts.col||'#3a2e2e';
  const ex=r*0.34*scale, ey=yOff-r*0.10*scale, er=r*0.115*scale;
  ctx.fillStyle=col;
  for(const s of [-1,1]){ ctx.beginPath(); ctx.ellipse(s*ex,ey,er*0.85,er*1.15,0,0,TAU); ctx.fill(); }
  ctx.fillStyle='#fff';
  for(const s of [-1,1]){ ctx.beginPath(); ctx.arc(s*ex-er*0.3, ey-er*0.4, er*0.34, 0, TAU); ctx.fill(); }
  ctx.strokeStyle=col; ctx.lineWidth=Math.max(1.5, r*0.07*scale); ctx.lineCap='round';
  ctx.beginPath(); ctx.arc(0, yOff+r*0.10*scale, r*0.20*scale, Math.PI*0.15, Math.PI*0.85); ctx.stroke();
  ctx.fillStyle='rgba(255,110,130,0.45)';
  for(const s of [-1,1]){ ctx.beginPath(); ctx.ellipse(s*r*0.52*scale, yOff+r*0.14*scale, r*0.13*scale, r*0.09*scale, 0,0,TAU); ctx.fill(); }
}
function gloss(r, x, y, rx, ry, rot, a=0.35){
  ctx.fillStyle=`rgba(255,255,255,${a})`;
  ctx.beginPath(); ctx.ellipse(x,y,rx,ry,rot,0,TAU); ctx.fill();
}

function drawApple(r){
  const g=ctx.createRadialGradient(-r*0.35,-r*0.4,r*0.1, 0,0,r*1.15);
  g.addColorStop(0,'#ff8fa3'); g.addColorStop(0.5,'#ff5964'); g.addColorStop(1,'#e5383b');
  ctx.fillStyle=g;
  ctx.beginPath(); ctx.ellipse(0, r*0.06, r*0.98, r*0.92, 0, 0, TAU); ctx.fill();
  gloss(r, -r*0.38,-r*0.35, r*0.26,r*0.15, -0.6);
  ctx.strokeStyle='#8b5e34'; ctx.lineWidth=r*0.11; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(0,-r*0.78); ctx.quadraticCurveTo(r*0.02,-r*1.02, r*0.12,-r*1.14); ctx.stroke();
  ctx.fillStyle='#43aa8b';
  ctx.beginPath(); ctx.ellipse(r*0.34,-r*1.0, r*0.30,r*0.15, -0.45, 0, TAU); ctx.fill();
  drawFace(r*0.92,{yOff:r*0.14});
}

function drawOrange(r){
  const g=ctx.createRadialGradient(-r*0.3,-r*0.35,r*0.1, 0,0,r*1.1);
  g.addColorStop(0,'#ffd6a5'); g.addColorStop(0.45,'#ffa94d'); g.addColorStop(1,'#f76707');
  ctx.fillStyle=g;
  ctx.beginPath(); ctx.arc(0,0,r*0.97,0,TAU); ctx.fill();
  ctx.fillStyle='rgba(216,100,0,0.22)';
  const dots=[[-.5,-.2],[-.15,-.55],[.35,-.4],[.55,.1],[-.45,.35],[.1,.55],[.45,.45],[-.02,-.02]];
  for(const d of dots){ ctx.beginPath(); ctx.arc(d[0]*r, d[1]*r, r*0.05, 0, TAU); ctx.fill(); }
  gloss(r, -r*0.36,-r*0.4, r*0.24,r*0.14, -0.6, 0.4);
  ctx.strokeStyle='#8b5e34'; ctx.lineWidth=r*0.09; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(0,-r*0.92); ctx.lineTo(0,-r*1.06); ctx.stroke();
  ctx.fillStyle='#57cc99';
  ctx.beginPath(); ctx.ellipse(r*0.2,-r*1.02, r*0.27,r*0.13, -0.3, 0, TAU); ctx.fill();
  drawFace(r*0.9,{yOff:r*0.06});
}

function drawStrawberry(r){
  const g=ctx.createLinearGradient(0,-r,0,r);
  g.addColorStop(0,'#ff6b8a'); g.addColorStop(1,'#e5383b');
  ctx.fillStyle=g;
  ctx.beginPath();
  ctx.moveTo(0,-r*0.52);
  ctx.bezierCurveTo(r*0.85,-r*0.85, r*1.0,-r*0.05, 0, r*0.95);
  ctx.bezierCurveTo(-r*1.0,-r*0.05, -r*0.85,-r*0.85, 0,-r*0.52);
  ctx.fill();
  ctx.fillStyle='#ffe8a3';
  const seeds=[[-.45,-.15],[.45,-.15],[0,-.3],[-.26,.18],[.26,.18],[0,.48],[-.6,.08],[.6,.08]];
  for(const s of seeds){ ctx.beginPath(); ctx.ellipse(s[0]*r, s[1]*r, r*0.045, r*0.08, 0, 0, TAU); ctx.fill(); }
  gloss(r, -r*0.4,-r*0.3, r*0.18,r*0.1, -0.7, 0.3);
  ctx.strokeStyle='#2d9d5b'; ctx.lineWidth=r*0.08; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(0,-r*0.6); ctx.lineTo(r*0.05,-r*0.8); ctx.stroke();
  ctx.fillStyle='#43aa8b';
  for(const s of [-2,-1,0,1,2]){
    ctx.beginPath(); ctx.ellipse(s*r*0.18, -r*0.58, r*0.16, r*0.10, s*0.5, 0, TAU); ctx.fill();
  }
  drawFace(r*0.78,{yOff:r*0.05});
}

function drawBanana(r){
  const g=ctx.createLinearGradient(0,-r*0.4,0,r);
  g.addColorStop(0,'#ffe066'); g.addColorStop(1,'#ffb703');
  ctx.fillStyle=g;
  ctx.beginPath();
  ctx.moveTo(-r*0.85,-r*0.30);
  ctx.quadraticCurveTo(0, r*1.0, r*0.85,-r*0.30);
  ctx.quadraticCurveTo(0, r*0.28, -r*0.85,-r*0.30);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle='rgba(214,140,0,0.45)'; ctx.lineWidth=r*0.05; ctx.lineJoin='round'; ctx.stroke();
  ctx.strokeStyle='rgba(255,240,170,0.8)'; ctx.lineWidth=r*0.06; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-r*0.55,-r*0.05); ctx.quadraticCurveTo(0, r*0.62, r*0.55,-r*0.05); ctx.stroke();
  ctx.fillStyle='#8b5e34';
  for(const s of [-1,1]){ ctx.beginPath(); ctx.arc(s*r*0.85,-r*0.30, r*0.11, 0, TAU); ctx.fill(); }
  drawFace(r,{scale:0.6, yOff:r*0.17});
}

function drawMelon(r){
  ctx.fillStyle='#2d9d5b';
  ctx.beginPath(); ctx.moveTo(r,0); ctx.arc(0,0,r,0,Math.PI,false); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#f1faee';
  ctx.beginPath(); ctx.moveTo(r*0.84,0); ctx.arc(0,0,r*0.84,0,Math.PI,false); ctx.closePath(); ctx.fill();
  const g=ctx.createLinearGradient(0,0,0,r);
  g.addColorStop(0,'#ff5d73'); g.addColorStop(1,'#e5383b');
  ctx.fillStyle=g;
  ctx.beginPath(); ctx.moveTo(r*0.72,0); ctx.arc(0,0,r*0.72,0,Math.PI,false); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#2b2d42';
  for(const deg of [28,62,90,118,152]){
    const a=deg*Math.PI/180;
    ctx.beginPath(); ctx.ellipse(Math.cos(a)*r*0.42, Math.sin(a)*r*0.42, r*0.05, r*0.09, Math.PI/2-a, 0, TAU); ctx.fill();
  }
  drawFace(r*0.78,{yOff:r*0.36});
}

function drawGrapes(r){
  ctx.strokeStyle='#8b5e34'; ctx.lineWidth=r*0.09; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(0,-r*0.5); ctx.quadraticCurveTo(r*0.05,-r*0.8, r*0.12,-r*1.0); ctx.stroke();
  ctx.fillStyle='#43aa8b';
  ctx.beginPath(); ctx.ellipse(r*0.36,-r*0.84, r*0.26,r*0.12, -0.4, 0, TAU); ctx.fill();
  const gp=[[0,-0.5],[-0.42,-0.14],[0.42,-0.14],[-0.21,0.26],[0.21,0.26],[0,0.62]];
  for(const p of gp){
    ctx.fillStyle='#9d4edd';
    ctx.beginPath(); ctx.arc(p[0]*r, p[1]*r, r*0.40, 0, TAU); ctx.fill();
    ctx.fillStyle='rgba(199,125,255,0.85)';
    ctx.beginPath(); ctx.arc(p[0]*r-r*0.1, p[1]*r-r*0.12, r*0.16, 0, TAU); ctx.fill();
  }
  // face across the cluster
  const col='#3a2e2e', er=r*0.10;
  ctx.fillStyle=col;
  for(const s of [-1,1]){ ctx.beginPath(); ctx.ellipse(s*r*0.30, -r*0.16, er*0.85, er*1.15, 0,0,TAU); ctx.fill(); }
  ctx.fillStyle='#fff';
  for(const s of [-1,1]){ ctx.beginPath(); ctx.arc(s*r*0.30-er*0.3, -r*0.16-er*0.4, er*0.34, 0, TAU); ctx.fill(); }
  ctx.strokeStyle=col; ctx.lineWidth=r*0.06; ctx.lineCap='round';
  ctx.beginPath(); ctx.arc(0, r*0.08, r*0.17, Math.PI*0.15, Math.PI*0.85); ctx.stroke();
  ctx.fillStyle='rgba(255,110,130,0.45)';
  for(const s of [-1,1]){ ctx.beginPath(); ctx.ellipse(s*r*0.22, r*0.34, r*0.10, r*0.07, 0,0,TAU); ctx.fill(); }
}

function leafBlade(angle, len, wdt, col){
  ctx.save(); ctx.rotate(angle); ctx.fillStyle=col;
  ctx.beginPath(); ctx.moveTo(0,0);
  ctx.quadraticCurveTo(wdt, -len*0.55, 0, -len);
  ctx.quadraticCurveTo(-wdt, -len*0.55, 0, 0);
  ctx.fill(); ctx.restore();
}
function drawPineapple(r){
  ctx.save(); ctx.translate(0,-r*0.72);
  leafBlade(-0.5, r*0.9, r*0.14, '#2d9d5b');
  leafBlade(0,    r*1.05,r*0.15, '#43aa8b');
  leafBlade(0.5,  r*0.9, r*0.14, '#2d9d5b');
  ctx.restore();
  const g=ctx.createRadialGradient(-r*0.25,-r*0.35,r*0.1, 0,0,r*1.1);
  g.addColorStop(0,'#ffe066'); g.addColorStop(0.5,'#ffd60a'); g.addColorStop(1,'#f77f00');
  ctx.fillStyle=g;
  ctx.beginPath(); ctx.ellipse(0, r*0.05, r*0.72, r*0.92, 0, 0, TAU); ctx.fill();
  ctx.save();
  ctx.beginPath(); ctx.ellipse(0, r*0.05, r*0.72, r*0.92, 0, 0, TAU); ctx.clip();
  ctx.strokeStyle='rgba(150,80,0,0.30)'; ctx.lineWidth=r*0.05;
  for(let k=-6;k<=6;k++){
    ctx.beginPath(); ctx.moveTo(k*r*0.3 - r*0.8, -r); ctx.lineTo(k*r*0.3 + r*0.8, r); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(k*r*0.3 + r*0.8, -r); ctx.lineTo(k*r*0.3 - r*0.8, r); ctx.stroke();
  }
  ctx.restore();
  ctx.strokeStyle='rgba(146,64,14,0.45)'; ctx.lineWidth=r*0.045;
  ctx.beginPath(); ctx.ellipse(0, r*0.05, r*0.72, r*0.92, 0, 0, TAU); ctx.stroke();
  gloss(r, -r*0.28,-r*0.4, r*0.16,r*0.1, -0.6, 0.35);
  drawFace(r*0.85,{yOff:r*0.05});
}

function starPath(R, r2){
  ctx.beginPath();
  for(let i=0;i<10;i++){
    const rad = i%2 ? r2 : R, a = i*Math.PI/5 - Math.PI/2;
    const px=Math.cos(a)*rad, py=Math.sin(a)*rad;
    i ? ctx.lineTo(px,py) : ctx.moveTo(px,py);
  }
  ctx.closePath();
}
function drawStar(r){
  const g=ctx.createRadialGradient(-r*0.2,-r*0.2,r*0.1, 0,0,r*1.1);
  g.addColorStop(0,'#fff3b0'); g.addColorStop(0.5,'#ffd60a'); g.addColorStop(1,'#ff9f1c');
  ctx.fillStyle=g;
  starPath(r, r*0.48); ctx.fill();
  ctx.strokeStyle='#e09f3e'; ctx.lineWidth=r*0.05; ctx.lineJoin='round'; ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,0.35)';
  starPath(r*0.55, r*0.26); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.9)'; ctx.lineWidth=r*0.045; ctx.lineCap='round';
  const tw = 1 + Math.sin(time*6)*0.25;
  for(const p of [[0.5,-0.45,0.16],[-0.48,0.4,0.11]]){
    const s=r*p[2]*tw;
    ctx.beginPath();
    ctx.moveTo(p[0]*r-s, p[1]*r); ctx.lineTo(p[0]*r+s, p[1]*r);
    ctx.moveTo(p[0]*r, p[1]*r-s); ctx.lineTo(p[0]*r, p[1]*r+s);
    ctx.stroke();
  }
  drawFace(r*0.78,{yOff:r*0.08});
}

function drawRotten(r){
  ctx.fillStyle='#8a8f6a';
  ctx.beginPath(); ctx.arc(-r*0.42,-r*0.25, r*0.55, 0, TAU); ctx.fill();
  ctx.beginPath(); ctx.arc(r*0.45, r*0.15, r*0.48, 0, TAU); ctx.fill();
  const g=ctx.createRadialGradient(-r*0.3,-r*0.35,r*0.1, 0,0,r*1.15);
  g.addColorStop(0,'#c9c9b0'); g.addColorStop(0.55,'#8a8f6a'); g.addColorStop(1,'#6b705c');
  ctx.fillStyle=g;
  ctx.beginPath(); ctx.arc(0,0,r*0.95,0,TAU); ctx.fill();
  ctx.fillStyle='rgba(86,91,63,0.55)';
  const spots=[[-.3,.3,.18],[.4,-.25,.14],[.1,.52,.12],[-.55,-.05,.12],[.55,.35,.1]];
  for(const s of spots){ ctx.beginPath(); ctx.arc(s[0]*r, s[1]*r, s[2]*r, 0, TAU); ctx.fill(); }
  // X eyes
  ctx.strokeStyle='#33351f'; ctx.lineWidth=r*0.08; ctx.lineCap='round';
  for(const s of [-1,1]){
    const ex=s*r*0.32, ey=-r*0.14, k=r*0.10;
    ctx.beginPath(); ctx.moveTo(ex-k,ey-k); ctx.lineTo(ex+k,ey+k); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(ex-k,ey+k); ctx.lineTo(ex+k,ey-k); ctx.stroke();
  }
  // squiggle mouth
  ctx.beginPath(); ctx.moveTo(-r*0.26, r*0.28);
  for(let i=1;i<=4;i++) ctx.lineTo(-r*0.26 + i*r*0.13, r*0.28 + (i%2 ? -1:1)*r*0.06);
  ctx.stroke();
  // stink waves
  ctx.strokeStyle='rgba(110,120,80,0.75)'; ctx.lineWidth=r*0.05;
  for(const s of [-0.6,0,0.6]){
    const x=s*r;
    ctx.beginPath(); ctx.moveTo(x, -r*1.0);
    ctx.bezierCurveTo(x-r*0.14, -r*1.18, x+r*0.14, -r*1.34, x, -r*1.5);
    ctx.stroke();
  }
  // flies
  for(const k of [0,1]){
    const a=time*3.2+k*Math.PI;
    const fx=Math.cos(a)*r*1.2, fy=-r*0.4+Math.sin(a*1.4)*r*0.5;
    ctx.fillStyle='#222';
    ctx.beginPath(); ctx.arc(fx,fy,r*0.06,0,TAU); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.75)';
    ctx.beginPath(); ctx.ellipse(fx-r*0.05, fy-r*0.06, r*0.05, r*0.03, -0.6, 0, TAU); ctx.fill();
    ctx.beginPath(); ctx.ellipse(fx+r*0.05, fy-r*0.06, r*0.05, r*0.03, 0.6, 0, TAU); ctx.fill();
  }
}

const TYPES = {
  apple:      { w:20, pts:1, r:1.00, juice:'#ff5964', draw:drawApple },
  orange:     { w:16, pts:1, r:0.98, juice:'#ffa94d', draw:drawOrange },
  strawberry: { w:16, pts:1, r:1.00, juice:'#ff4d6d', draw:drawStrawberry },
  banana:     { w:13, pts:1, r:1.05, juice:'#f4b400', draw:drawBanana },
  melon:      { w:12, pts:2, r:1.08, juice:'#ff4d6d', draw:drawMelon },
  grapes:     { w:9,  pts:2, r:1.02, juice:'#9d4edd', draw:drawGrapes },
  pineapple:  { w:7,  pts:3, r:1.06, juice:'#f4b400', draw:drawPineapple },
  star:       { w:0,  pts:5, r:1.05, juice:'#ffb703', draw:drawStar },
  rotten:     { w:0,  pts:0, r:1.00, juice:'#8a8f6a', draw:drawRotten },
};
const NORMAL = ['apple','orange','strawberry','banana','melon','grapes','pineapple'];

/* ============================================================
   Scenery
   ============================================================ */
const gh = () => 64*S;
let clouds=[], flowers=[], blades=[], motes=[];

function genScenery(){
  flowers=[]; blades=[]; motes=[];
  const nf=Math.max(4, Math.floor(W/150));
  const cols=['#ff7bac','#ffd60a','#ffffff','#c77dff','#ff9f1c'];
  for(let i=0;i<nf;i++){
    flowers.push({ x:(i+0.5)*(W/nf)+rand(-30,30)*S, y:H-rand(2, gh()*0.42),
                   c:cols[i%cols.length], s:rand(0.7,1.2)*S, ph:rand(0,TAU) });
  }
  for(let i=0;i<26;i++) blades.push({ x:rand(0,W), h:rand(6,14)*S, lean:rand(-5,5)*S });
  for(let i=0;i<16;i++) motes.push({ x:rand(0,W), y:rand(0,H), r:rand(1.5,3.2)*S, sp:rand(8,22)*S, ph:rand(0,TAU) });
  if(!clouds.length){
    for(let i=0;i<5;i++) clouds.push({ fx:Math.random(), fy:rand(0.05,0.3), s:rand(0.6,1.3), sp:rand(6,18) });
  }
}

function drawSun(){
  const sx=W-100*S-16, sy=95*S;
  ctx.save(); ctx.translate(sx,sy); ctx.rotate(time*0.12);
  ctx.strokeStyle='rgba(255,200,10,0.85)'; ctx.lineWidth=6*S; ctx.lineCap='round';
  for(let i=0;i<12;i++){
    ctx.rotate(Math.PI/6);
    ctx.beginPath(); ctx.moveTo(54*S,0); ctx.lineTo((66+Math.sin(time*2+i)*3)*S,0); ctx.stroke();
  }
  ctx.restore();
  const g=ctx.createRadialGradient(sx-12*S,sy-12*S,6*S, sx,sy,52*S);
  g.addColorStop(0,'#fff3b0'); g.addColorStop(1,'#ffd60a');
  ctx.fillStyle=g;
  ctx.beginPath(); ctx.arc(sx,sy,46*S,0,TAU); ctx.fill();
  ctx.save(); ctx.translate(sx,sy); drawFace(30*S,{yOff:2*S}); ctx.restore();
}

function drawCloud(x,y,s){
  ctx.fillStyle='rgba(255,255,255,0.92)';
  ctx.beginPath(); ctx.ellipse(x,y,34*s,22*s,0,0,TAU); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x-28*s,y+6*s,24*s,16*s,0,0,TAU); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x+30*s,y+8*s,26*s,17*s,0,0,TAU); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x+2*s,y-13*s,24*s,16*s,0,0,TAU); ctx.fill();
}

function drawBG(){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#6ec3f7'); g.addColorStop(0.55,'#aee1ff'); g.addColorStop(1,'#e8f9ff');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  drawSun();
  for(const c of clouds){
    const x=((c.fx*(W+320) + time*c.sp) % (W+320)) - 160;
    drawCloud(x, c.fy*H, c.s*S*1.2);
  }
  ctx.fillStyle='#8fd96a';
  ctx.beginPath(); ctx.ellipse(W*0.18, H-gh()+52*S, W*0.42, 130*S, 0,0,TAU); ctx.fill();
  ctx.fillStyle='#79cf54';
  ctx.beginPath(); ctx.ellipse(W*0.86, H-gh()+66*S, W*0.45, 150*S, 0,0,TAU); ctx.fill();
  // grass with bumpy top
  const G=gh();
  const gg=ctx.createLinearGradient(0,H-G,0,H);
  gg.addColorStop(0,'#8fe05f'); gg.addColorStop(1,'#57b03c');
  ctx.fillStyle=gg;
  ctx.beginPath(); ctx.moveTo(0, H-G+6*S);
  const step=46*S;
  for(let x=0;x<W+step;x+=step) ctx.quadraticCurveTo(x+step*0.5, H-G-8*S, x+step, H-G+6*S);
  ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.closePath(); ctx.fill();
  ctx.strokeStyle='rgba(46,125,50,0.5)'; ctx.lineWidth=2*S; ctx.lineCap='round';
  for(const b of blades){
    ctx.beginPath(); ctx.moveTo(b.x, H-G+8*S);
    ctx.quadraticCurveTo(b.x+b.lean*0.5, H-G+8*S-b.h*0.6, b.x+b.lean, H-G+8*S-b.h);
    ctx.stroke();
  }
  for(const f of flowers){
    const swayX=Math.sin(time*1.4+f.ph)*3*S;
    const hx=f.x+swayX, hy=f.y-16*f.s;
    ctx.strokeStyle='#3e9e4f'; ctx.lineWidth=2.2*S;
    ctx.beginPath(); ctx.moveTo(f.x,f.y); ctx.quadraticCurveTo(f.x, f.y-8*f.s, hx, hy); ctx.stroke();
    ctx.fillStyle=f.c;
    for(let p=0;p<5;p++){
      const a=p/5*TAU - Math.PI/2;
      ctx.beginPath(); ctx.ellipse(hx+Math.cos(a)*5*f.s, hy+Math.sin(a)*5*f.s, 4*f.s, 4*f.s, 0,0,TAU); ctx.fill();
    }
    ctx.fillStyle='#ffd60a';
    ctx.beginPath(); ctx.arc(hx,hy,3*f.s,0,TAU); ctx.fill();
  }
  // floating motes
  ctx.fillStyle='rgba(255,255,255,0.28)';
  for(const m of motes){ ctx.beginPath(); ctx.arc(m.x, m.y, m.r, 0, TAU); ctx.fill(); }
}

/* ============================================================
   Basket
   ============================================================ */
function rr(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}
function drawBasket(){
  const b=basket, w=b.w, h=b.h;
  // shadow
  ctx.fillStyle='rgba(0,0,0,0.14)';
  ctx.beginPath(); ctx.ellipse(b.x, H-gh()*0.3, w*0.45, 8*S, 0, 0, TAU); ctx.fill();
  ctx.save();
  ctx.translate(b.x, b.y);
  ctx.rotate(b.tilt);
  ctx.translate(0, Math.sin(time*2.3)*1.2*S);
  ctx.scale(1+b.squash*0.12, 1-b.squash*0.14);
  // dark inner opening
  ctx.fillStyle='#4a2f18';
  ctx.beginPath(); ctx.ellipse(0,0,w*0.47,h*0.16,0,0,TAU); ctx.fill();
  // body
  const g=ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,'#e0a458'); g.addColorStop(1,'#a97a45');
  ctx.fillStyle=g;
  ctx.beginPath();
  ctx.moveTo(-w/2, 0);
  ctx.lineTo(-w*0.34, h*0.88);
  ctx.quadraticCurveTo(0, h*1.1, w*0.34, h*0.88);
  ctx.lineTo(w/2, 0);
  ctx.closePath(); ctx.fill();
  // weave
  ctx.save(); ctx.clip();
  ctx.strokeStyle='rgba(110,66,30,0.35)'; ctx.lineWidth=3*S;
  for(let i=1;i<=3;i++){
    ctx.beginPath(); ctx.moveTo(-w/2, h*0.22*i);
    ctx.quadraticCurveTo(0, h*0.22*i+h*0.06, w/2, h*0.22*i); ctx.stroke();
  }
  for(let i=-3;i<=3;i++){
    ctx.beginPath(); ctx.moveTo(i*w*0.12, 0); ctx.lineTo(i*w*0.09, h); ctx.stroke();
  }
  ctx.restore();
  // rim
  const rimH=15*S;
  const rg=ctx.createLinearGradient(0,-rimH/2,0,rimH/2);
  rg.addColorStop(0,'#f0bd7f'); rg.addColorStop(1,'#c68a4b');
  ctx.fillStyle=rg;
  rr(-w/2-6*S, -rimH/2, w+12*S, rimH, rimH/2); ctx.fill();
  ctx.strokeStyle='rgba(120,70,30,0.35)'; ctx.lineWidth=2*S; ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,0.28)';
  rr(-w/2-6*S, -rimH/2, w+12*S, rimH*0.42, rimH*0.2); ctx.fill();
  ctx.restore();
}

/* ============================================================
   Particles & floating texts
   ============================================================ */
function burst(x,y,color,n=14,spread=240*S,up=-100*S){
  for(let i=0;i<n;i++){
    const a=rand(0,TAU), sp=rand(0.25,1)*spread;
    particles.push({type:'dot',x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp*0.6+up,
                    g:950*S,t:0,life:rand(.35,.7),size:rand(2.5,6)*S,color});
  }
}
function sparkleBurst(x,y,color,n=10){
  for(let i=0;i<n;i++){
    particles.push({type:'spark',x:x+rand(-14,14)*S,y:y+rand(-14,14)*S,
                    vx:rand(-30,30)*S,vy:rand(-60,-10)*S,t:0,life:rand(.4,.8),
                    size:rand(3,7)*S,color});
  }
}
function ring(x,y,color){
  particles.push({type:'ring',x,y,t:0,life:.32,r0:basket.w*0.25,r1:basket.w*0.62,color});
}
function confetti(){
  const cols=['#ff5964','#ffb703','#06c195','#4cc9f0','#9d4edd','#ff7bac'];
  for(let i=0;i<30;i++){
    particles.push({type:'rect',x:rand(W*0.15,W*0.85),y:rand(-30,-5),
                    vx:rand(-70,70)*S,vy:rand(40,120)*S,g:260*S,
                    rot:rand(0,TAU),rotV:rand(-6,6),w:rand(6,10)*S,h:rand(4,6)*S,
                    t:0,life:rand(1.2,2),color:cols[i%cols.length]});
  }
}
function addText(text,x,y,color,size=26*S,life=0.9){
  texts.push({text,x,y0:y,t:0,life,color,size});
}
function drawParticles(){
  for(const p of particles){
    const a=clamp(1-p.t/p.life,0,1);
    ctx.save(); ctx.globalAlpha=a;
    if(p.type==='dot'){
      ctx.fillStyle=p.color;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,TAU); ctx.fill();
    } else if(p.type==='spark'){
      ctx.strokeStyle=p.color; ctx.lineWidth=2.5*S; ctx.lineCap='round';
      ctx.beginPath();
      ctx.moveTo(p.x-p.size,p.y); ctx.lineTo(p.x+p.size,p.y);
      ctx.moveTo(p.x,p.y-p.size); ctx.lineTo(p.x,p.y+p.size);
      ctx.stroke();
    } else if(p.type==='ring'){
      const pr=p.r0+(p.r1-p.r0)*(p.t/p.life);
      ctx.strokeStyle=p.color; ctx.lineWidth=4*S*a;
      ctx.beginPath(); ctx.ellipse(p.x,p.y,pr,pr*0.35,0,0,TAU); ctx.stroke();
    } else if(p.type==='rect'){
      ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      ctx.fillStyle=p.color; ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
    }
    ctx.restore();
  }
}
function drawTexts(){
  for(const T of texts){
    const p=T.t/T.life;
    const y=T.y0 - easeOutCubic(Math.min(p*1.2,1))*46*S;
    const a = p>0.7 ? 1-(p-0.7)/0.3 : 1;
    const sc = p<0.18 ? 0.6+0.4*(p/0.18) : 1;
    ctx.save();
    ctx.globalAlpha=a; ctx.translate(T.x,y); ctx.scale(sc,sc);
    ctx.font=`800 ${T.size}px Fredoka,'Comic Sans MS',sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.lineWidth=T.size*0.18; ctx.strokeStyle='rgba(255,255,255,0.92)'; ctx.lineJoin='round';
    ctx.strokeText(T.text,0,0);
    ctx.fillStyle=T.color; ctx.fillText(T.text,0,0);
    ctx.restore();
  }
}

/* ============================================================
   Game logic
   ============================================================ */
function pickType(){
  sinceStar++;
  if(sinceStar>=14 || Math.random()<0.045){ sinceStar=0; return 'star'; }
  if(level>=2 && Math.random()<0.11) return 'rotten';
  let total=0;
  for(const k of NORMAL) total+=TYPES[k].w;
  let v=Math.random()*total;
  for(const k of NORMAL){ v-=TYPES[k].w; if(v<=0) return k; }
  return 'apple';
}
function spawnFruit(){
  const type=pickType(), def=TYPES[type];
  const r=36*S*def.r*rand(0.92,1.08);
  const swayA=rand(6,26)*S;
  const speedMul=Math.min(2.8, 1+(level-1)*0.12);
  fruits.push({
    type, def, r,
    baseX: rand(r+swayA+8, Math.max(r+swayA+9, W-r-swayA-8)),
    x:0, y:-r-12,
    vy: rand(150,225)*S*speedMul,
    rot: rand(-0.3,0.3), rotV: rand(-0.8,0.8),
    swayA, swayS: rand(1,2.2), ph: rand(0,TAU), born: time
  });
}
function levelUpFx(){
  sfxLevel();
  addText('LEVEL '+level+'!', W/2, H*0.3, '#06c195', 54*S, 1.5);
  confetti();
}
function handleCatch(f){
  catches++; combo++;
  const topY=basket.y-8*S;
  basket.squash=1;
  if(f.type==='star'){
    score+=5; sfxGold();
    burst(f.x,f.y,'#ffd60a',16,300*S);
    sparkleBurst(f.x,f.y,'#fff3b0',10);
    ring(basket.x, topY, '#ffd60a');
    addText('+5 ⭐', f.x, f.y-10*S, '#ffb703', 34*S);
  } else {
    const gained=f.def.pts+Math.floor(combo/5);
    score+=gained; sfxCatch(combo);
    burst(f.x, f.y, f.def.juice, 14, 240*S);
    ring(basket.x, topY, f.def.juice);
    addText('+'+gained, f.x, f.y-6*S, f.def.juice, 28*S);
    if(combo>=5 && combo%5===0)
      addText('COMBO x'+combo+'!', basket.x, basket.y-80*S, '#ff9f1c', 30*S, 1.1);
  }
  updateScoreHUD(); comboHUD();
  const nl=Math.floor(catches/10)+1;
  if(nl>level){ level=nl; levelEl.textContent=level; levelUpFx(); }
}
function handleMiss(f){
  combo=0; comboHUD();
  lives--; renderHearts();
  shake=9; flash=0.85; sfxMiss();
  burst(f.x, H-gh()*0.35, f.def.juice, 12, 200*S, -160*S);
  addText('Oops!', f.x, H-gh()*0.35-30*S, '#ff5964', 30*S);
  if(lives<=0) gameOver();
}
function handleRottenCatch(f){
  combo=0; comboHUD();
  lives--; renderHearts();
  shake=10; flash=0.9; sfxRotten();
  burst(f.x, f.y, '#8a8f6a', 16, 220*S);
  addText('YUCK!', f.x, f.y, '#7a7f5a', 32*S);
  basket.squash=0.6;
  if(lives<=0) gameOver();
}
function startGame(){
  ac(); sfxStart();
  fruits.length=0; particles.length=0; texts.length=0;
  score=0; lives=3; level=1; combo=0; catches=0;
  spawnTimer=0.8; sinceStar=0; shake=0; flash=0;
  basket.x=W/2; basket.vx=0; basket.tilt=0; pointerX=W/2;
  state='playing';
  hideOverlays();
  pauseBtn.textContent='⏸';
  updateScoreHUD(); renderHearts(); comboHUD(); levelEl.textContent=level;
}
function gameOver(){
  state='over'; sfxOver();
  const prevBest=best;
  if(score>best){ best=score; store.set('ffcBest', String(best)); }
  finalScoreEl.textContent=score;
  bestOverEl.textContent='Best: '+best;
  newBestEl.style.display=(score>prevBest && score>0)?'inline-block':'none';
  show(overOverlay);
}
function togglePause(){
  if(state==='playing'){
    state='paused'; pauseBtn.textContent='▶'; show(pauseOverlay);
  } else if(state==='paused'){
    state='playing'; pauseBtn.textContent='⏸'; hide(pauseOverlay);
  }
}

/* ============================================================
   Update
   ============================================================ */
function update(dt){
  // motes drift (always)
  for(const m of motes){
    m.y-=m.sp*dt; m.x+=Math.sin(time+m.ph)*6*S*dt;
    if(m.y<-10){ m.y=H+10; m.x=rand(0,W); }
  }
  // basket
  const b=basket, prevX=b.x;
  if(state==='playing'){
    if(inputMode==='key'){
      const dir=(keys.right?1:0)-(keys.left?1:0);
      b.vx += (dir*b.speed - b.vx)*Math.min(1, dt*12);
      b.x += b.vx*dt;
    } else {
      const tx=clamp(pointerX, b.w*0.34, W-b.w*0.34);
      b.x += (tx-b.x)*Math.min(1, dt*16);
    }
  } else {
    b.x += (W/2 - b.x)*Math.min(1, dt*2);
  }
  b.x=clamp(b.x, b.w*0.34, W-b.w*0.34);
  b.vx=(b.x-prevX)/Math.max(dt,1e-4);
  b.tilt += (clamp(b.vx*0.0004,-0.16,0.16) - b.tilt)*Math.min(1, dt*10);
  b.squash=Math.max(0, b.squash-dt*5);

  // spawning
  spawnTimer-=dt;
  if(spawnTimer<=0){
    if(fruits.length<36){
      spawnFruit();
      if(state==='playing' && level>=4 && Math.random()<0.22) spawnFruit();
    }
    const base = state==='playing' ? Math.max(0.42, 1.05-(level-1)*0.07) : 1.5;
    spawnTimer = base*rand(0.75,1.25);
  }

  // fruits
  const topY=basket.y-8*S;
  for(let i=fruits.length-1;i>=0;i--){
    const f=fruits[i];
    f.y += f.vy*dt;
    f.x = f.baseX + Math.sin(time*f.swayS+f.ph)*f.swayA;
    f.rot += f.rotV*dt;
    if(state==='playing'){
      if(f.y + f.r*0.35 >= topY && f.y < basket.y + basket.h*0.75 &&
         Math.abs(f.x-basket.x) < basket.w/2 + f.r*0.28){
        fruits.splice(i,1);
        if(f.type==='rotten') handleRottenCatch(f); else handleCatch(f);
        continue;
      }
      if(f.y - f.r*0.2 >= H - gh()*0.35){
        fruits.splice(i,1);
        if(f.type==='rotten') burst(f.x, H-gh()*0.35, '#8a8f6a', 8, 150*S, -120*S);
        else if(f.type==='star') sparkleBurst(f.x, H-gh()*0.4, '#ffd60a', 6);
        else handleMiss(f);
        continue;
      }
    } else if(f.y - f.r > H+30){
      fruits.splice(i,1);
    }
  }

  // particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i]; p.t+=dt;
    if(p.t>=p.life){ particles.splice(i,1); continue; }
    if(p.type==='dot'){ p.vy+=p.g*dt; p.x+=p.vx*dt; p.y+=p.vy*dt; }
    else if(p.type==='spark'){ p.x+=p.vx*dt; p.y+=p.vy*dt; }
    else if(p.type==='rect'){ p.vy+=p.g*dt; p.x+=p.vx*dt; p.y+=p.vy*dt; p.rot+=p.rotV*dt; }
  }
  // texts
  for(let i=texts.length-1;i>=0;i--){
    texts[i].t+=dt;
    if(texts[i].t>=texts[i].life) texts.splice(i,1);
  }
  shake=Math.max(0, shake-dt*30);
  flash=Math.max(0, flash-dt*2.2);
}

/* ============================================================
   Render
   ============================================================ */
function drawFruit(f){
  const age=time-f.born;
  const pop = age<0.25 ? Math.max(0.01, easeOutBack(age/0.25)) : 1;
  ctx.save();
  ctx.translate(f.x, f.y);
  ctx.rotate(f.rot + Math.sin(time*f.swayS+f.ph)*0.15);
  ctx.scale(pop,pop);
  ctx.shadowColor='rgba(60,30,0,0.18)'; ctx.shadowOffsetY=4*S; ctx.shadowBlur=0;
  f.def.draw(f.r);
  ctx.restore();
}
function render(){
  ctx.save();
  if(shake>0.2) ctx.translate(rand(-shake,shake)*0.5, rand(-shake,shake)*0.5);
  drawBG();
  for(const f of fruits) drawFruit(f);
  drawBasket();
  drawParticles();
  drawTexts();
  ctx.restore();
  if(flash>0.01){
    ctx.fillStyle=`rgba(255,70,70,${flash*0.28})`;
    ctx.fillRect(0,0,W,H);
  }
}

/* ============================================================
   HUD & overlays
   ============================================================ */
function updateScoreHUD(){
  scoreEl.textContent=score;
  scoreEl.classList.remove('pop'); void scoreEl.offsetWidth; scoreEl.classList.add('pop');
}
function renderHearts(){
  [...heartsEl.children].forEach((h,i)=>h.classList.toggle('lost', i>=lives));
}
function comboHUD(){
  if(combo>=3){ comboPill.classList.add('on'); comboEl.textContent='x'+combo; }
  else comboPill.classList.remove('on');
}
function show(el){ el.classList.add('show'); }
function hide(el){ el.classList.remove('show'); }
function hideOverlays(){ [startOverlay,overOverlay,pauseOverlay].forEach(hide); }
function refreshBest(){
  bestStartEl.textContent = best>0 ? '🏆 Best Score: '+best : 'Can you score 50 points?';
}
function toggleMute(){
  muted=!muted;
  store.set('ffcMuted', muted?'1':'0');
  muteBtn.textContent = muted ? '🔇' : '🔊';
  if(!muted) sfxClick();
}

/* ============================================================
   Input
   ============================================================ */
addEventListener('keydown', e=>{
  const k=e.code;
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Space'].includes(k)) e.preventDefault();
  if(k==='ArrowLeft'||k==='KeyA'){ keys.left=true; inputMode='key'; }
  if(k==='ArrowRight'||k==='KeyD'){ keys.right=true; inputMode='key'; }
  if(k==='KeyM') toggleMute();
  if(k==='KeyP'||k==='Escape'){ if(state==='playing'||state==='paused') togglePause(); }
  if(k==='Space'||k==='Enter'){
    if(state==='start'||state==='over') startGame();
    else if(state==='paused') togglePause();
  }
});
addEventListener('keyup', e=>{
  if(e.code==='ArrowLeft'||e.code==='KeyA') keys.left=false;
  if(e.code==='ArrowRight'||e.code==='KeyD') keys.right=false;
});
addEventListener('pointermove', e=>{ pointerX=e.clientX; inputMode='pointer'; });
addEventListener('pointerdown', e=>{ pointerX=e.clientX; inputMode='pointer'; });
document.getElementById('game').addEventListener('touchmove', e=>e.preventDefault(), {passive:false});
document.addEventListener('visibilitychange', ()=>{
  if(document.hidden && state==='playing') togglePause();
});
function on(btn, fn){
  btn.addEventListener('click', ()=>{ ac(); sfxClick(); fn(); btn.blur(); });
}
on($('#playBtn'), startGame);
on($('#againBtn'), startGame);
on($('#resumeBtn'), togglePause);
on(pauseBtn, ()=>{ if(state==='playing'||state==='paused') togglePause(); });
on(muteBtn, toggleMute);

/* ============================================================
   Resize & init
   ============================================================ */
function resize(){
  DPR=Math.min(window.devicePixelRatio||1, 2);
  W=window.innerWidth; H=window.innerHeight;
  cv.width=Math.round(W*DPR); cv.height=Math.round(H*DPR);
  cv.style.width=W+'px'; cv.style.height=H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  S=clamp(Math.min(W,H)/650, 0.55, 1.45);
  basket.w=134*S; basket.h=60*S; basket.speed=560*S;
  basket.y=H - gh()*0.42 - basket.h;
  basket.x=clamp(basket.x, basket.w*0.34, W-basket.w*0.34);
  genScenery();
}
addEventListener('resize', resize);

/* decorative floaters on the start screen */
(function(){
  const cont=document.getElementById('floaters');
  const em=['🍎','🍌','🍓','🍊','🍇','🍉','🍍','⭐'];
  let html='';
  for(let i=0;i<12;i++){
    html+=`<span style="left:${(i*8.3+Math.random()*6).toFixed(1)}%;font-size:${(26+Math.random()*30).toFixed(0)}px;animation-duration:${(7+Math.random()*7).toFixed(1)}s;animation-delay:${(-Math.random()*12).toFixed(1)}s">${em[i%em.length]}</span>`;
  }
  cont.innerHTML=html;
})();
/* rainbow bouncing title letters */
(function(){
  const el=document.getElementById('title');
  const text='Falling Fruit Catcher';
  const cols=['#ff5964','#ff9f1c','#ffc300','#06c195','#4cc9f0','#9d4edd'];
  el.innerHTML=[...text].map((c,i)=> c===' '
    ? '<span class="tl">&nbsp;</span>'
    : `<span class="tl" style="color:${cols[i%cols.length]};animation-delay:${(i*0.07).toFixed(2)}s">${c}</span>`
  ).join('');
})();

muteBtn.textContent = muted ? '🔇' : '🔊';
refreshBest();
renderHearts();
if(document.fonts && document.fonts.load){
  document.fonts.load('800 30px Fredoka').catch(()=>{});
}
resize();
basket.x=W/2;

let lastT=performance.now();
function loop(t){
  requestAnimationFrame(loop);
  const dt=clamp((t-lastT)/1000, 0, 0.033);
  lastT=t;
  time+=dt;
  if(state!=='paused') update(dt);
  render();
}
requestAnimationFrame(loop);
</script>
</body>
