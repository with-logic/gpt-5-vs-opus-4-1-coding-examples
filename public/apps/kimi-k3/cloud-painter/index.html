<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Cloud Painter ☁️</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☁️</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{ --ink:#5b4a68; }
*{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
html,body{height:100%; overflow:hidden;}
body{font-family:'Fredoka',ui-rounded,system-ui,sans-serif; background:#9fd9fb; color:var(--ink); user-select:none; -webkit-user-select:none;}
#sky{position:fixed; inset:0; display:block; cursor:none; touch-action:none;}

/* ---------- header ---------- */
header{position:fixed; top:16px; left:20px; z-index:5; pointer-events:none;}
header h1{font-weight:700; font-size:clamp(22px,3.2vw,34px); color:#fff; letter-spacing:.5px; text-shadow:0 2px 0 rgba(93,140,200,.45), 0 8px 22px rgba(93,140,200,.4);}
header h1 .fl{display:inline-block; animation:floaty 3.2s ease-in-out infinite;}
header p{color:rgba(255,255,255,.95); font-weight:500; font-size:clamp(12px,1.5vw,15px); text-shadow:0 1px 0 rgba(93,140,200,.35); margin-top:2px;}
@keyframes floaty{0%,100%{transform:translateY(0) rotate(-4deg);}50%{transform:translateY(-6px) rotate(5deg);}}

/* ---------- toolbar ---------- */
#toolbar{position:fixed; left:50%; bottom:14px; transform:translateX(-50%); z-index:6; display:flex; align-items:center; justify-content:center; gap:8px; flex-wrap:wrap; max-width:min(97vw,1080px); padding:10px 12px; background:rgba(255,255,255,.74); backdrop-filter:blur(14px) saturate(1.2); -webkit-backdrop-filter:blur(14px) saturate(1.2); border:2.5px solid #fff; border-radius:26px; box-shadow:0 14px 40px rgba(90,130,190,.28);}
.tb-group{display:flex; align-items:center; gap:6px;}
.tb-sep{width:2px; align-self:stretch; margin:4px 2px; background:linear-gradient(rgba(120,150,200,0),rgba(120,150,200,.25),rgba(120,150,200,0)); border-radius:2px;}
.tb-emoji{display:grid; place-items:center; width:22px; height:22px;}
.ibtn{width:46px; height:46px; border-radius:16px; border:2.5px solid transparent; background:#fff; font-size:21px; display:grid; place-items:center; cursor:pointer; box-shadow:0 3px 9px rgba(90,130,190,.16); transition:transform .18s cubic-bezier(.34,1.56,.64,1), background .18s, border-color .18s, box-shadow .18s; touch-action:manipulation;}
.ibtn:hover{transform:translateY(-3px) scale(1.08); box-shadow:0 8px 16px rgba(90,130,190,.22);}
.ibtn:active{transform:scale(.94);}
.ibtn.sel{background:linear-gradient(160deg,#e4f4ff,#cde9ff); border-color:#7ec8f7; transform:scale(1.06);}
.ibtn.tog.on{background:linear-gradient(160deg,#fff1d6,#ffe3ad); border-color:#ffcf6b;}
.ibtn.danger.armed{background:linear-gradient(160deg,#ffe0e0,#ffc4c4); border-color:#ff8a8a; animation:armedPulse .7s ease-in-out infinite;}
@keyframes armedPulse{0%,100%{box-shadow:0 3px 9px rgba(255,120,120,.25);}50%{box-shadow:0 0 0 7px rgba(255,138,138,.35);}}
.swatch{width:26px; height:26px; border-radius:50%; border:3px solid #fff; background:var(--c); cursor:pointer; box-shadow:0 2px 6px rgba(90,130,190,.28), inset 0 -3px 5px rgba(90,130,190,.12); transition:transform .16s cubic-bezier(.34,1.56,.64,1), box-shadow .16s; touch-action:manipulation;}
.swatch:hover{transform:scale(1.18);}
.swatch.sel{transform:scale(1.28); box-shadow:0 0 0 3px #7ec8f7, 0 3px 8px rgba(90,130,190,.3);}
input[type=range]{-webkit-appearance:none; appearance:none; width:110px; height:10px; border-radius:999px; background:linear-gradient(90deg,#dff1ff,#8fd0ff); border:2px solid #fff; outline:none; box-shadow:inset 0 1px 3px rgba(90,130,190,.2); cursor:pointer;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none; width:22px; height:22px; border-radius:50%; background:#fff; border:3.5px solid #7ec8f7; box-shadow:0 3px 8px rgba(90,130,190,.3); cursor:grab; transition:transform .15s;}
input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.15);}
input[type=range]::-moz-range-thumb{width:18px; height:18px; border-radius:50%; background:#fff; border:3.5px solid #7ec8f7; box-shadow:0 3px 8px rgba(90,130,190,.3); cursor:grab;}
#wind-slider{width:84px;}
#size-preview{width:30px; height:30px; display:grid; place-items:center;}
#size-dot{background:radial-gradient(circle at 35% 30%, #fff, #dbefff); border:2px solid #9ccdf5; border-radius:50%; transition:width .15s, height .15s;}

/* ---------- plane popover ---------- */
#plane-pop{position:fixed; left:50%; bottom:96px; transform:translateX(-50%); z-index:7; display:flex; align-items:center; gap:8px; padding:10px 12px; background:rgba(255,255,255,.96); border:2.5px solid #dff0ff; border-radius:20px; box-shadow:0 12px 30px rgba(90,130,190,.3); transition:opacity .22s, transform .22s cubic-bezier(.34,1.56,.64,1);}
#plane-pop.hidden{opacity:0; pointer-events:none; transform:translateX(-50%) translateY(14px) scale(.95);}
#banner-input{border:2.5px solid #cfe4ff; border-radius:14px; padding:9px 13px; font-family:inherit; font-weight:500; font-size:15px; color:var(--ink); width:180px; outline:none; transition:border-color .15s;}
#banner-input:focus{border-color:#7ec8f7;}
#fly-go{border:none; border-radius:14px; padding:10px 18px; font-family:inherit; font-weight:600; font-size:15px; color:#fff; background:linear-gradient(160deg,#8fd0ff,#5fb3f5); box-shadow:0 5px 14px rgba(110,170,240,.45); cursor:pointer; transition:transform .16s cubic-bezier(.34,1.56,.64,1); touch-action:manipulation;}
#fly-go:hover{transform:scale(1.07);}

/* ---------- toasts ---------- */
#toasts{position:fixed; left:50%; top:16px; transform:translateX(-50%); z-index:8; display:flex; flex-direction:column; align-items:center; gap:8px; pointer-events:none;}
.toast{background:rgba(255,255,255,.95); color:var(--ink); padding:10px 20px; border-radius:999px; font-size:14.5px; font-weight:500; border:2.5px solid #e8f4ff; box-shadow:0 8px 22px rgba(90,130,190,.28); animation:toastIn .4s cubic-bezier(.34,1.56,.64,1); white-space:nowrap;}
.toast.out{animation:toastOut .3s ease forwards;}
@keyframes toastIn{from{opacity:0; transform:translateY(-16px) scale(.85);}}
@keyframes toastOut{to{opacity:0; transform:translateY(-10px) scale(.9);}}

/* ---------- cursor tag ---------- */
#cursor-tag{position:fixed; z-index:9; left:0; top:0; pointer-events:none; font-size:19px; transform:translate(-50%,-140%); filter:drop-shadow(0 2px 3px rgba(90,130,190,.4)); transition:opacity .15s; opacity:0;}
#cursor-tag.show{opacity:1;}

/* ---------- intro ---------- */
#intro{position:fixed; inset:0; z-index:20; display:grid; place-items:center; background:linear-gradient(180deg,rgba(160,210,250,.5),rgba(215,240,255,.5)); backdrop-filter:blur(7px) saturate(1.15); -webkit-backdrop-filter:blur(7px) saturate(1.15); transition:opacity .5s; overflow:hidden;}
#intro.gone{opacity:0; pointer-events:none;}
#intro .flcloud{position:absolute; animation:driftX linear infinite; filter:drop-shadow(0 6px 12px rgba(90,130,190,.25)); pointer-events:none;}
@keyframes driftX{from{left:-16%;} to{left:108%;}}
#intro-card{position:relative; background:rgba(255,255,255,.87); border:3px solid #fff; border-radius:34px; padding:36px 44px; text-align:center; box-shadow:0 24px 70px rgba(90,130,190,.35); animation:cardIn .6s cubic-bezier(.34,1.56,.64,1); max-width:min(92vw,470px);}
@keyframes cardIn{from{opacity:0; transform:scale(.8) translateY(30px);}}
#intro-card .big{font-size:54px; animation:floaty 3s ease-in-out infinite;}
#intro-card h1{font-size:clamp(28px,5vw,40px); font-weight:700; color:#4a6fa5; margin:8px 0 6px;}
#intro-card p{font-size:15.5px; font-weight:500; color:#7a6a8a; line-height:1.55;}
#intro-card .tip{margin-top:14px; font-size:13px; color:#9a8aaa; font-weight:500;}
#start-btn{margin-top:20px; border:none; border-radius:999px; padding:15px 38px; font-family:inherit; font-weight:700; font-size:19px; color:#fff; background:linear-gradient(160deg,#8fd0ff,#5fb3f5); box-shadow:0 10px 24px rgba(110,170,240,.5), inset 0 -3px 0 rgba(0,0,0,.08); cursor:pointer; transition:transform .18s cubic-bezier(.34,1.56,.64,1), box-shadow .18s; touch-action:manipulation;}
#start-btn:hover{transform:scale(1.07) translateY(-2px); box-shadow:0 14px 30px rgba(110,170,240,.55);}
#start-btn:active{transform:scale(.96);}

@media (max-width:640px){
  .ibtn{width:42px; height:42px; font-size:19px; border-radius:14px;}
  .swatch{width:23px; height:23px;}
  #toolbar{gap:6px; padding:8px;}
  header{left:14px; top:12px;}
  input[type=range]{width:88px;}
  #toasts{top:64px;}
}
</style>
</head>
<body>
<canvas id="sky"></canvas>

<header>
  <h1><span class="fl">☁️</span> Cloud Painter</h1>
  <p>paint a happy sky!</p>
</header>

<div id="toolbar" role="toolbar" aria-label="Painting tools">
  <div class="tb-group" id="brushes">
    <button class="ibtn brush-btn sel" data-brush="puffy" title="Puffy cloud">☁️</button>
    <button class="ibtn brush-btn" data-brush="flat" title="Flat cloud">🌫️</button>
    <button class="ibtn brush-btn" data-brush="heart" title="Heart cloud">💗</button>
    <button class="ibtn brush-btn" data-brush="star" title="Star cloud">⭐</button>
    <button class="ibtn brush-btn" data-brush="rainbow" title="Rainbow — drag to place">🌈</button>
    <button class="ibtn brush-btn" data-brush="sun" title="Sunshine — drag to place">🌞</button>
    <button class="ibtn brush-btn" data-brush="birds" title="Birds — drag to place">🐦</button>
    <button class="ibtn brush-btn" data-brush="eraser" title="Eraser">🧽</button>
  </div>
  <div class="tb-sep"></div>
  <div class="tb-group" title="Brush size">
    <span class="tb-emoji" id="size-icon"></span>
    <input id="size-slider" type="range" min="24" max="160" value="72" aria-label="Brush size">
    <div id="size-preview"><div id="size-dot"></div></div>
  </div>
  <div class="tb-sep"></div>
  <div class="tb-group" id="colors"></div>
  <div class="tb-sep"></div>
  <div class="tb-group" title="Wind speed">
    <span class="tb-emoji" id="wind-icon"></span>
    <input id="wind-slider" type="range" min="0" max="220" value="100" aria-label="Wind speed">
  </div>
  <div class="tb-sep"></div>
  <div class="tb-group">
    <button id="face-btn" class="ibtn tog on" title="Happy cloud faces">😊</button>
    <button id="plane-btn" class="ibtn" title="Fly an airplane">✈️</button>
    <button id="save-btn" class="ibtn" title="Save picture">💾</button>
    <button id="clear-btn" class="ibtn danger" title="Clear the sky">🧹</button>
    <button id="sound-btn" class="ibtn tog on" title="Sound on/off">🔊</button>
  </div>
</div>

<div id="plane-pop" class="hidden">
  <input id="banner-input" maxlength="14" placeholder="Banner text…">
  <button id="fly-go">Fly! 🛫</button>
</div>

<div id="toasts"></div>
<div id="cursor-tag">☁️</div>

<div id="intro">
  <span class="flcloud" style="top:9%;  font-size:70px; animation-duration:30s; animation-delay:-6s;">☁️</span>
  <span class="flcloud" style="top:22%; font-size:44px; animation-duration:38s; animation-delay:-22s;">⛅</span>
  <span class="flcloud" style="top:64%; font-size:56px; animation-duration:34s; animation-delay:-13s;">☁️</span>
  <span class="flcloud" style="top:80%; font-size:38px; animation-duration:26s; animation-delay:-2s;">🌥️</span>
  <span class="flcloud" style="top:42%; font-size:62px; animation-duration:46s; animation-delay:-31s;">☁️</span>
  <div id="intro-card">
    <div class="big">🎨 ☁️</div>
    <h1>Cloud Painter</h1>
    <p>Paint fluffy clouds, rainbows and sunshine.<br>Launch airplanes and watch them fly by!</p>
    <button id="start-btn">Start Painting 🖌️</button>
    <div class="tip">Psst… gray clouds make rain! 🌧️</div>
  </div>
</div>

<script>
'use strict';
/* ================= helpers ================= */
const $ = s => document.querySelector(s);
const rand = (a,b) => a + Math.random()*(b-a);
const pick = a => a[(Math.random()*a.length)|0];
const clamp = (v,a,b) => Math.max(a, Math.min(b, v));
const TAU = Math.PI*2;
const nowSec = () => performance.now()/1000;
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function shade(hex,amt){const n=parseInt(hex.slice(1),16);const r=clamp((n>>16)+amt,0,255),g=clamp((n>>8&255)+amt,0,255),b=clamp((n&255)+amt,0,255);return `rgb(${r},${g},${b})`;}
function easeOutBack(k){const c1=1.70158,c3=c1+1;return 1+c3*Math.pow(k-1,3)+c1*Math.pow(k-1,2);}

/* ================= sound (all synthesized) ================= */
const Snd = { ctx:null, master:null, on:true, noiseBuf:null,
  init(){ try{
    if(!this.ctx){ const AC=window.AudioContext||window.webkitAudioContext; if(!AC)return;
      this.ctx=new AC(); this.master=this.ctx.createGain(); this.master.gain.value=0.5; this.master.connect(this.ctx.destination);
      const len=this.ctx.sampleRate; this.noiseBuf=this.ctx.createBuffer(1,len,this.ctx.sampleRate);
      const d=this.noiseBuf.getChannelData(0); for(let i=0;i<len;i++) d[i]=Math.random()*2-1; }
    if(this.ctx.state==='suspended') this.ctx.resume();
  }catch(e){} },
  env(g,t0,peak,dur){ g.gain.setValueAtTime(0.0001,t0); g.gain.exponentialRampToValueAtTime(peak,t0+0.015); g.gain.exponentialRampToValueAtTime(0.0001,t0+dur); },
  tone(freq,o={}){ if(!this.on||!this.ctx)return; const{type='sine',dur=0.2,vol=0.2,slide=null,delay=0}=o;
    const t0=this.ctx.currentTime+delay; const osc=this.ctx.createOscillator(),g=this.ctx.createGain();
    osc.type=type; osc.frequency.setValueAtTime(freq,t0); if(slide)osc.frequency.exponentialRampToValueAtTime(slide,t0+dur);
    this.env(g,t0,vol,dur); osc.connect(g); g.connect(this.master); osc.start(t0); osc.stop(t0+dur+0.05); },
  noise(o={}){ if(!this.on||!this.ctx||!this.noiseBuf)return; const{dur=0.3,vol=0.25,from=800,to=300,delay=0}=o;
    const t0=this.ctx.currentTime+delay; const src=this.ctx.createBufferSource(); src.buffer=this.noiseBuf; src.loop=true;
    const f=this.ctx.createBiquadFilter(); f.type='lowpass'; f.frequency.setValueAtTime(from,t0); f.frequency.exponentialRampToValueAtTime(Math.max(40,to),t0+dur);
    const g=this.ctx.createGain(); this.env(g,t0,vol,dur); src.connect(f); f.connect(g); g.connect(this.master); src.start(t0); src.stop(t0+dur+0.05); },
  poof(){ this.noise({dur:0.2, vol:0.2, from:950, to:260}); },
  bigPoof(){ this.noise({dur:0.5, vol:0.28, from:1200, to:150}); },
  pop(){ this.tone(430,{type:'triangle',dur:0.09,vol:0.2,slide:780}); },
  twinkle(){ [660,880,1174,1568].forEach((f,i)=>this.tone(f,{dur:0.3,vol:0.12,delay:i*0.06})); },
  sunny(){ [523,659,784].forEach((f,i)=>this.tone(f,{type:'triangle',dur:0.4,vol:0.12,delay:i*0.05})); },
  chirp(){ this.tone(1500,{dur:0.09,vol:0.13,slide:2100}); this.tone(1750,{dur:0.1,vol:0.11,slide:1250,delay:0.11}); },
  whoosh(){ this.noise({dur:0.85,vol:0.15,from:350,to:1700}); },
  erase(){ this.noise({dur:0.14,vol:0.13,from:1500,to:600}); },
  shutter(){ this.tone(1150,{type:'square',dur:0.05,vol:0.08}); this.tone(850,{type:'square',dur:0.06,vol:0.08,delay:0.08});
    [1046,1318,1568].forEach((f,i)=>this.tone(f,{dur:0.25,vol:0.09,delay:0.16+i*0.06})); }
};

/* ================= canvas & state ================= */
const canvas = $('#sky'), ctx = canvas.getContext('2d');
let W=0, H=0, DPR=1, skyGrad=null;
function resize(){
  DPR=Math.min(2, window.devicePixelRatio||1);
  W=window.innerWidth; H=window.innerHeight;
  canvas.width=W*DPR; canvas.height=H*DPR;
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  skyGrad=ctx.createLinearGradient(0,0,0,H);
  skyGrad.addColorStop(0,'#6ec2f5'); skyGrad.addColorStop(.45,'#9fd9fb');
  skyGrad.addColorStop(.8,'#d5efff'); skyGrad.addColorStop(1,'#ecf8ff');
}
window.addEventListener('resize', resize); resize();

const STORM = '#b9c2d4';
const BRUSHES = {
  puffy:  {emoji:'☁️', spacing:0.5,  kind:'cloud'},
  flat:   {emoji:'🌫️', spacing:0.55, kind:'cloud'},
  heart:  {emoji:'💗', spacing:0.95, kind:'cloud'},
  star:   {emoji:'⭐', spacing:0.95, kind:'cloud'},
  rainbow:{emoji:'🌈', kind:'place'},
  sun:    {emoji:'🌞', kind:'place'},
  birds:  {emoji:'🐦', kind:'place'},
  eraser: {emoji:'🧽', kind:'erase'}
};
const COLORS = [
  ['#ffffff','Snow White'], ['#ffd9e8','Bubblegum'], ['#ffe3c2','Peachy'], ['#fff4bd','Lemon Drop'],
  ['#d9f6e3','Minty'], ['#d8ecff','Baby Sky'], ['#e9defc','Lilac'], [STORM,'Stormy — makes rain!']
];
const PLANE_COLORS = ['#ffb3c1','#ffc49b','#fff1a8','#b8efc0','#a8d8ff','#d9c2f7'];
const PLANE_WORDS  = ['HI!','WOW!','YAY!','ZOOM!','WHEEE!','HELLO ☁','SO HIGH!','♥ ♥ ♥','GOOD DAY!','☁ ☁ ☁','PEEP!'];

const Prefs = {
  get(k,d){ try{ const v=localStorage.getItem('cp-'+k); return v===null?d:v==='1'; }catch(e){ return d; } },
  set(k,v){ try{ localStorage.setItem('cp-'+k, v?'1':'0'); }catch(e){} }
};

const state = {
  brush:'puffy', size:72, color:'#ffffff', faces:Prefs.get('faces',true), wind:1,
  objects:[], planes:[], balloons:[], particles:[], ambient:[], stormHinted:false
};
Snd.on = Prefs.get('sound', true);
const pointer = {x:0, y:0, down:false, inside:false};
let stroke=null, planeTimer=10, balloonTimer=9, lastPoofSnd=0, lastEraseSnd=0;

/* ================= sprite builders ================= */
function puffLayout(shape, seed){
  const rnd = mulberry32(seed), puffs=[];
  const j = a => (rnd()*2-1)*a;
  const sx = shape==='flat'?1.55:1, sy = shape==='flat'?0.52:1;
  const base = [[0,0,.34],[-.3,.07,.26],[.3,.07,.26],[-.16,-.15,.24],[.17,-.16,.25],[0,.15,.27],[-.42,.12,.18],[.42,.12,.18]];
  for(const [x,y,r] of base) puffs.push({x:(x+j(.03))*sx, y:(y+j(.03))*sy, r:Math.max(.08, r*(1+j(.12)))});
  return puffs;
}

/* heart & star clouds: solid filled shape with a puffy bumpy rim */
function normalizePts(pts){
  let minX=1e9,maxX=-1e9,minY=1e9,maxY=-1e9;
  for(const p of pts){ minX=Math.min(minX,p[0]);maxX=Math.max(maxX,p[0]);minY=Math.min(minY,p[1]);maxY=Math.max(maxY,p[1]); }
  const sc=1/Math.max(maxX-minX,maxY-minY), cx=(minX+maxX)/2, cy=(minY+maxY)/2;
  return pts.map(p=>[(p[0]-cx)*sc,(p[1]-cy)*sc]);
}
function shapeOutline(shape){
  if(shape==='heart'){
    const pts=[];
    for(let i=0;i<48;i++){ const t=i/48*TAU;
      pts.push([16*Math.pow(Math.sin(t),3), -(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))]); }
    return normalizePts(pts);
  }
  const pts=[]; // 5-point star
  for(let i=0;i<10;i++){ const ang=-Math.PI/2+i*Math.PI/5, rad=i%2===0?0.5:0.28;
    pts.push([Math.cos(ang)*rad, Math.sin(ang)*rad]); }
  return pts;
}
function buildShapedSprite(shape,size,color,face,seed){
  const SS=Math.min(2,window.devicePixelRatio||1), rnd=mulberry32(seed);
  const outline=shapeOutline(shape).map(p=>({x:p[0]*size*0.92, y:p[1]*size*0.92}));
  const puffR=size*(shape==='heart'?0.115:0.10), puffs=[];
  if(shape==='heart'){
    for(let i=0;i<outline.length;i+=3){ const p=outline[i];
      puffs.push({x:p.x,y:p.y,r:puffR*(0.9+rnd()*0.3)}); }
    puffs.push({x:0,y:-size*0.08,r:size*0.16},{x:-size*0.14,y:size*0.05,r:size*0.13},{x:size*0.14,y:size*0.05,r:size*0.13});
  } else {
    for(let i=0;i<outline.length;i++){ const a=outline[i], b=outline[(i+1)%outline.length];
      puffs.push({x:a.x,y:a.y,r:puffR*(i%2===0?1.1:0.9)*(0.9+rnd()*0.2)});
      puffs.push({x:(a.x+b.x)/2,y:(a.y+b.y)/2,r:puffR*0.72*(0.9+rnd()*0.2)});
    }
    puffs.push({x:0,y:0,r:size*0.16});
  }
  let minX=1e9,minY=1e9,maxX=-1e9,maxY=-1e9;
  for(const p of outline){ minX=Math.min(minX,p.x);maxX=Math.max(maxX,p.x);minY=Math.min(minY,p.y);maxY=Math.max(maxY,p.y); }
  for(const p of puffs){ minX=Math.min(minX,p.x-p.r);maxX=Math.max(maxX,p.x+p.r);minY=Math.min(minY,p.y-p.r);maxY=Math.max(maxY,p.y+p.r); }
  const pad=size*0.2+8;
  const w=Math.ceil(maxX-minX+pad*2), h=Math.ceil(maxY-minY+pad*2);
  const cvs=document.createElement('canvas'); cvs.width=w*SS; cvs.height=h*SS;
  const c=cvs.getContext('2d'); c.scale(SS,SS);
  const body=document.createElement('canvas'); body.width=w*SS; body.height=h*SS;
  const b=body.getContext('2d'); b.scale(SS,SS); b.translate(-minX+pad,-minY+pad);
  b.fillStyle=color;
  b.beginPath();
  outline.forEach((p,i)=> i? b.lineTo(p.x,p.y) : b.moveTo(p.x,p.y));
  b.closePath(); b.fill();
  for(const p of puffs){ b.beginPath(); b.arc(p.x,p.y,p.r,0,TAU); b.fill(); }
  c.shadowColor='rgba(88,112,165,0.35)'; c.shadowBlur=size*0.14; c.shadowOffsetY=size*0.07;
  c.drawImage(body,0,0,w,h);
  c.shadowColor='transparent'; c.shadowBlur=0; c.shadowOffsetY=0;
  c.drawImage(body,0,0,w,h);
  c.translate(-minX+pad,-minY+pad);
  c.fillStyle='rgba(255,255,255,0.4)';
  for(const p of puffs){ if(p.y<-size*0.08){ c.beginPath(); c.arc(p.x-p.r*0.2,p.y-p.r*0.25,p.r*0.55,0,TAU); c.fill(); } }
  if(face){
    const s=size, fx=0, fy=shape==='heart'?-s*0.02:s*0.02;
    c.strokeStyle='rgba(95,74,110,0.9)'; c.lineWidth=Math.max(1.8,s*0.032); c.lineCap='round';
    for(const sgn of [-1,1]){ c.beginPath(); c.arc(fx+sgn*s*0.13, fy, s*0.05, Math.PI*0.15, Math.PI*0.85); c.stroke(); }
    c.beginPath(); c.arc(fx, fy+s*0.085, s*0.07, Math.PI*0.2, Math.PI*0.8); c.stroke();
    c.fillStyle='rgba(255,158,170,0.5)';
    for(const sgn of [-1,1]){ c.beginPath(); c.ellipse(fx+sgn*s*0.2, fy+s*0.06, s*0.045, s*0.03, 0, 0, TAU); c.fill(); }
  }
  return {canvas:cvs, w, h, ox:(-minX+pad), oy:(-minY+pad)};
}

function buildCloudSprite(shape, size, color, face, seed){
  const SS=Math.min(2, window.devicePixelRatio||1);
  const puffs=puffLayout(shape,seed).map(p=>({x:p.x*size,y:p.y*size,r:p.r*size}));
  let minX=1e9,minY=1e9,maxX=-1e9,maxY=-1e9;
  for(const p of puffs){ minX=Math.min(minX,p.x-p.r);maxX=Math.max(maxX,p.x+p.r);minY=Math.min(minY,p.y-p.r);maxY=Math.max(maxY,p.y+p.r); }
  const pad=size*0.22+8;
  const w=Math.ceil(maxX-minX+pad*2), h=Math.ceil(maxY-minY+pad*2);
  const cvs=document.createElement('canvas'); cvs.width=w*SS; cvs.height=h*SS;
  const c=cvs.getContext('2d'); c.scale(SS,SS);
  // merged silhouette layer (so the drop shadow hugs the whole cloud)
  const body=document.createElement('canvas'); body.width=w*SS; body.height=h*SS;
  const b=body.getContext('2d'); b.scale(SS,SS); b.translate(-minX+pad,-minY+pad);
  b.fillStyle=color;
  for(const p of puffs){ b.beginPath(); b.arc(p.x,p.y,p.r,0,TAU); b.fill(); }
  c.shadowColor='rgba(88,112,165,0.35)'; c.shadowBlur=size*0.14; c.shadowOffsetY=size*0.07;
  c.drawImage(body,0,0,w,h);
  c.shadowColor='transparent'; c.shadowBlur=0; c.shadowOffsetY=0;
  c.drawImage(body,0,0,w,h);
  // highlights + lowlights
  c.translate(-minX+pad,-minY+pad);
  for(const p of puffs){
    if(p.y < -size*0.02){ c.fillStyle='rgba(255,255,255,0.45)';
      c.beginPath(); c.arc(p.x-p.r*0.22,p.y-p.r*0.28,p.r*0.55,0,TAU); c.fill(); }
    else if(p.y > size*0.08){ c.fillStyle='rgba(120,150,205,0.15)';
      c.beginPath(); c.arc(p.x,p.y+p.r*0.25,p.r*0.6,0,TAU); c.fill(); }
  }
  // kawaii face
  if(face){
    const s=size, fx=0, fy=s*0.02;
    c.strokeStyle='rgba(95,74,110,0.9)'; c.lineWidth=Math.max(1.8,s*0.032); c.lineCap='round';
    for(const sgn of [-1,1]){ c.beginPath(); c.arc(fx+sgn*s*0.135, fy, s*0.05, Math.PI*0.15, Math.PI*0.85); c.stroke(); }
    c.beginPath(); c.arc(fx, fy+s*0.085, s*0.07, Math.PI*0.2, Math.PI*0.8); c.stroke();
    c.fillStyle='rgba(255,158,170,0.5)';
    for(const sgn of [-1,1]){ c.beginPath(); c.ellipse(fx+sgn*s*0.21, fy+s*0.06, s*0.045, s*0.03, 0, 0, TAU); c.fill(); }
  }
  return {canvas:cvs, w, h, ox:(-minX+pad), oy:(-minY+pad)};
}

function buildRainbowSprite(size){
  const SS=Math.min(2, window.devicePixelRatio||1);
  const R=size*1.05, band=Math.min(R/6.2, Math.max(4.5,size*0.085));
  const cols=['#ff8a8a','#ffbe76','#fff3a0','#a5efb0','#9be0f7','#c9b6f7'];
  const puffR=band*1.7, pad=puffR+10;
  const w=Math.ceil(2*R+pad*2), h=Math.ceil(R+puffR+pad*1.5);
  const cx=pad+R, cy=pad+R;
  const cvs=document.createElement('canvas'); cvs.width=w*SS; cvs.height=h*SS;
  const c=cvs.getContext('2d'); c.scale(SS,SS);
  for(let i=0;i<6;i++){ const r=R-i*band;
    c.beginPath(); c.arc(cx,cy,r-band/2,Math.PI,TAU); c.lineWidth=band; c.strokeStyle=cols[i]; c.stroke(); }
  // puffy cloud ends
  const rm=R-2.5*band;
  for(const ex of [cx-rm, cx+rm]){
    const ep=[[0,0,1],[ -.85,.15,.75],[ .85,.15,.75],[ -.35,-.45,.7],[ .35,-.5,.72]];
    c.fillStyle='#ffffff';
    c.shadowColor='rgba(88,112,165,0.3)'; c.shadowBlur=6; c.shadowOffsetY=2;
    for(const [dx,dy,k] of ep){ c.beginPath(); c.arc(ex+dx*puffR, cy+dy*puffR, puffR*k, 0, TAU); c.fill(); }
    c.shadowColor='transparent'; c.shadowBlur=0; c.shadowOffsetY=0;
  }
  return {canvas:cvs, w, h, ox:cx, oy:cy};
}

/* ================= procedural toolbar icons ================= */
function roundRectPath(x,px,py,w,h,r){
  x.beginPath(); x.moveTo(px+r,py);
  x.arcTo(px+w,py,px+w,py+h,r); x.arcTo(px+w,py+h,px,py+h,r);
  x.arcTo(px,py+h,px,py,r); x.arcTo(px,py,px+w,py,r); x.closePath();
}
function iconFromSprite(sprite, box=30){
  const c=document.createElement('canvas'), SS=2;
  c.width=box*SS; c.height=box*SS;
  const x=c.getContext('2d'); x.scale(SS,SS);
  const k=Math.min((box-3)/sprite.w,(box-3)/sprite.h);
  const dw=sprite.w*k, dh=sprite.h*k;
  x.drawImage(sprite.canvas,(box-dw)/2,(box-dh)/2,dw,dh);
  return c.toDataURL();
}
function iconCustom(fn, box=30){
  const c=document.createElement('canvas'), SS=2;
  c.width=box*SS; c.height=box*SS;
  const x=c.getContext('2d'); x.scale(SS,SS); fn(x,box);
  return c.toDataURL();
}
function drawSpeakerIcon(x,b,waves){
  x.fillStyle='#7ec8f7';
  x.beginPath(); x.moveTo(5,12); x.lineTo(10,12); x.lineTo(15,7); x.lineTo(15,23); x.lineTo(10,18); x.lineTo(5,18); x.closePath(); x.fill();
  x.lineCap='round';
  if(waves){
    x.strokeStyle='#7ec8f7'; x.lineWidth=2;
    x.beginPath(); x.arc(16.5,15,4.5,-0.9,0.9); x.stroke();
    x.beginPath(); x.arc(16.5,15,8,-0.85,0.85); x.stroke();
  } else {
    x.strokeStyle='#ff8a8a'; x.lineWidth=2.6;
    x.beginPath(); x.moveTo(18,9); x.lineTo(25,21); x.stroke();
    x.beginPath(); x.moveTo(25,9); x.lineTo(18,21); x.stroke();
  }
}
const brushIcons={}, actionIcons={};
function buildIcons(){
  // brush icons sit on a little sky-disc so white clouds stay visible
  const disc=(content,box=30)=>{
    const c=document.createElement('canvas'), SS=2;
    c.width=box*SS; c.height=box*SS;
    const x=c.getContext('2d'); x.scale(SS,SS);
    const g=x.createLinearGradient(0,2,0,box-2);
    g.addColorStop(0,'#a9d9f8'); g.addColorStop(1,'#e2f3ff');
    x.fillStyle=g; x.beginPath(); x.arc(box/2,box/2,box/2-1,0,TAU); x.fill();
    x.strokeStyle='rgba(255,255,255,0.9)'; x.lineWidth=1.5; x.stroke();
    content(x,box);
    return c.toDataURL();
  };
  const spriteOnDisc=sprite=>disc((x,b)=>{
    const k=Math.min((b-6)/sprite.w,(b-6)/sprite.h);
    const dw=sprite.w*k, dh=sprite.h*k;
    x.drawImage(sprite.canvas,(b-dw)/2,(b-dh)/2+0.5,dw,dh);
  });
  brushIcons.puffy  = spriteOnDisc(buildCloudSprite('puffy',26,'#ffffff',true,7));
  brushIcons.flat   = spriteOnDisc(buildCloudSprite('flat',24,'#ffffff',true,9));
  brushIcons.heart  = spriteOnDisc(buildShapedSprite('heart',24,'#ffb3c7',true,5));
  brushIcons.star   = spriteOnDisc(buildShapedSprite('star',24,'#ffe066',true,5));
  brushIcons.rainbow= spriteOnDisc(buildRainbowSprite(14));
  brushIcons.sun    = disc((x,b)=>drawSun(x,b/2,b/2,8.5,1.2,0));
  brushIcons.birds  = disc((x,b)=>{ drawBird(x,b*0.36,b*0.58,6,0.75,1); drawBird(x,b*0.68,b*0.34,4.6,0.6,1); });
  brushIcons.eraser = disc((x,b)=>{
    x.save(); x.translate(b/2,b/2+1); x.rotate(-0.45);
    x.fillStyle='#ffd166'; roundRectPath(x,-9,-2,18,8,3); x.fill();
    x.fillStyle='#ff9db8'; roundRectPath(x,-9,-6.5,18,7,3); x.fill();
    x.strokeStyle='rgba(255,255,255,0.85)'; x.lineWidth=1.1;
    x.beginPath(); x.moveTo(-9,-2.2); x.lineTo(9,-2.2); x.stroke();
    x.restore();
  });
  actionIcons.face = iconCustom((x,b)=>{
    x.fillStyle='#ffdf6b'; x.beginPath(); x.arc(b/2,b/2,11,0,TAU); x.fill();
    x.strokeStyle='#8a5a3b'; x.lineWidth=1.7; x.lineCap='round';
    for(const sgn of [-1,1]){ x.beginPath(); x.arc(b/2+sgn*4.2, b/2-2, 2.2, Math.PI*0.15, Math.PI*0.85); x.stroke(); }
    x.beginPath(); x.arc(b/2, b/2+2, 4.6, Math.PI*0.2, Math.PI*0.8); x.stroke();
    x.fillStyle='rgba(255,140,140,0.6)';
    x.beginPath(); x.arc(b/2-7.5,b/2+2,1.7,0,TAU); x.arc(b/2+7.5,b/2+2,1.7,0,TAU); x.fill();
  });
  actionIcons.plane = iconCustom((x,b)=>{
    x.save(); x.translate(b/2,b/2);
    x.fillStyle='#5fa8d8';
    x.beginPath(); x.moveTo(-8,-1); x.lineTo(-12.5,-6); x.lineTo(-9.5,0.5); x.closePath(); x.fill();
    x.beginPath(); x.ellipse(-8.5,2,4,1.6,-0.15,0,TAU); x.fill();
    x.fillStyle='#8fd0ff'; x.beginPath(); x.ellipse(0,0,11,4.2,0,0,TAU); x.fill();
    x.fillStyle='#5fa8d8'; x.beginPath(); x.ellipse(0.5,2.4,6.5,2.4,-0.18,0,TAU); x.fill();
    x.fillStyle='#e3f5ff'; x.beginPath(); x.arc(3,-1.4,2.1,0,TAU); x.fill();
    x.restore();
  });
  actionIcons.save = iconCustom((x,b)=>{
    const cx=b/2;
    x.strokeStyle='#7ec8f7'; x.lineWidth=2.6; x.lineCap='round'; x.lineJoin='round';
    x.beginPath(); x.moveTo(cx,4.5); x.lineTo(cx,14.5); x.stroke();
    x.beginPath(); x.moveTo(cx-5,10.5); x.lineTo(cx,15.5); x.lineTo(cx+5,10.5); x.stroke();
    x.beginPath(); x.moveTo(5.5,18.5); x.lineTo(5.5,23); x.lineTo(b-5.5,23); x.lineTo(b-5.5,18.5); x.stroke();
  });
  actionIcons.clear = iconCustom((x,b)=>{
    x.save(); x.translate(b/2,b/2); x.rotate(0.55);
    x.strokeStyle='#c68a5e'; x.lineWidth=3; x.lineCap='round';
    x.beginPath(); x.moveTo(0,-11); x.lineTo(0,0); x.stroke();
    x.fillStyle='#ffd166';
    x.beginPath(); x.moveTo(-5.5,1); x.lineTo(5.5,1); x.lineTo(8,10.5); x.lineTo(-8,10.5); x.closePath(); x.fill();
    x.strokeStyle='#e8a93b'; x.lineWidth=1.3;
    for(const dx of [-3.5,0,3.5]){ x.beginPath(); x.moveTo(dx,2.5); x.lineTo(dx*1.4,9.5); x.stroke(); }
    x.restore();
  });
  actionIcons.soundOn  = iconCustom((x,b)=>drawSpeakerIcon(x,b,true));
  actionIcons.soundOff = iconCustom((x,b)=>drawSpeakerIcon(x,b,false));
  const setBtn=(el,url)=>{
    if(!el) return;
    el.innerHTML='';
    const img=new Image(); img.src=url; img.alt=''; img.draggable=false;
    img.style.width='26px'; img.style.height='26px'; img.style.pointerEvents='none'; img.style.display='block';
    el.appendChild(img);
  };
  for(const k in brushIcons) setBtn(document.querySelector(`[data-brush="${k}"]`), brushIcons[k]);
  setBtn($('#face-btn'), actionIcons.face);
  setBtn($('#plane-btn'), actionIcons.plane);
  setBtn($('#save-btn'), actionIcons.save);
  setBtn($('#clear-btn'), actionIcons.clear);
  setBtn($('#sound-btn'), Snd.on?actionIcons.soundOn:actionIcons.soundOff);
  const setSpan=(id,url)=>{
    const el=document.getElementById(id); if(!el) return;
    el.innerHTML='';
    const img=new Image(); img.src=url; img.alt=''; img.draggable=false;
    img.style.width='18px'; img.style.height='18px'; img.style.display='block';
    el.appendChild(img);
  };
  setSpan('size-icon', iconCustom((x,b)=>{
    x.fillStyle='#7ec8f7';
    x.beginPath(); x.arc(7,20,3.2,0,TAU); x.fill();
    x.beginPath(); x.arc(15.5,15,4.6,0,TAU); x.fill();
    x.beginPath(); x.arc(24,9,6,0,TAU); x.fill();
  }));
  setSpan('wind-icon', iconCustom((x,b)=>{
    x.strokeStyle='#7ec8f7'; x.lineWidth=2.2; x.lineCap='round';
    x.beginPath(); x.moveTo(4,10); x.lineTo(17,10); x.arc(17,10,3,-Math.PI/2,0); x.stroke();
    x.beginPath(); x.moveTo(4,17); x.lineTo(21,17); x.arc(21,17,3,0,Math.PI/2); x.stroke();
    x.beginPath(); x.moveTo(4,24); x.lineTo(13,24); x.stroke();
  }));
  setTagIcon(brushIcons[state.brush]);
}
function setTagIcon(url){
  cursorTag.innerHTML='';
  const img=new Image(); img.src=url; img.alt=''; img.draggable=false;

/* ================= object creation ================= */
function initDrops(o){
  const n=clamp(Math.round(o.size/8),4,16); o.drops=[];
  for(let i=0;i<n;i++) o.drops.push({dx:rand(-o.rainW,o.rainW), y:rand(-20,o.size), speed:rand(180,300)*(o.size/70+0.6), len:rand(8,14)});
}
function createCloud(shape,x,y,size,color){
  const o={type:'cloud',shape,x,y,size,color,seed:(Math.random()*2**31)|0,face:state.faces,
    born:nowSec(),bobPhase:rand(0,TAU),bobSpeed:rand(.5,1.05),bobAmp:size*rand(.03,.055),
    drift:rand(7,15)*Math.pow(72/size,.4)};
  o.sprite=(shape==='heart'||shape==='star')
    ? buildShapedSprite(shape,size,color,o.face,o.seed)
    : buildCloudSprite(shape,size,color,o.face,o.seed);
  o.wrap=o.sprite.w*0.5+24;
  if(color.toLowerCase()===STORM){ o.rain=true; o.rainW=size*(shape==='flat'?1.05:0.7); initDrops(o); }
  return o;
}
function stampCloud(x,y){
  if(state.objects.length>=700) state.objects.shift();
  const o=createCloud(state.brush,x,y,state.size*rand(.92,1.08),state.color);
  state.objects.push(o);
  sparkle(x,y, o.color==='#ffffff' ? '#eaf6ff' : o.color);
  const n=nowSec(); if(n-lastPoofSnd>0.09){ Snd.poof(); lastPoofSnd=n; }
}
function placeObject(kind,x,y){
  if(state.objects.length>=700) state.objects.shift();
  let o=null;
  if(kind==='rainbow'){
    o={type:'rainbow',x,y,size:state.size,drift:3.5,born:nowSec(),phase:rand(0,TAU)};
    o.sprite=buildRainbowSprite(state.size); o.wrap=o.sprite.w*0.5+10; Snd.twinkle();
  } else if(kind==='sun'){
    o={type:'sun',x,y,size:state.size*0.95,drift:6,born:nowSec(),phase:rand(0,TAU)};
    o.wrap=o.size; Snd.sunny();
  } else if(kind==='birds'){
    const dir=Math.random()<0.5?1:-1;
    o={type:'birds',x,y,size:state.size*0.35,dir,vx:dir*rand(26,42),drift:2,born:nowSec(),
      members:[{dx:0,dy:0,s:1,ph:rand(0,TAU)},{dx:-17,dy:10,s:0.8,ph:rand(0,TAU)},{dx:-31,dy:-8,s:0.65,ph:rand(0,TAU)}]};
    o.k=o.size/25; Snd.chirp();
  }
  if(o){ state.objects.push(o); sparkle(x,y,'#ffffff'); }
  return o;
}
function eraseAt(x,y){
  const r=state.size*0.65; let hit=false;
  for(let i=state.objects.length-1;i>=0;i--){
    const o=state.objects[i], orad=(o.size||60)*0.5;
    if(Math.hypot(o.x-x,o.y-y) < r+orad){ poof(o.x,o.y,Math.min(90,orad*1.2)); state.objects.splice(i,1); hit=true; }
  }
  if(hit && nowSec()-lastEraseSnd>0.12){ Snd.erase(); lastEraseSnd=nowSec(); }
}

/* ================= planes & balloons ================= */
function launchPlane(text){
  if(state.planes.length>=3){ showToast('Three planes is a busy sky! ✈️'); return; }
  const dir=Math.random()<0.5?1:-1;
  state.planes.push({ dir, x:dir>0?-170:W+170, y:rand(70,Math.max(120,H*0.42)),
    vx:dir*rand(120,160), color:pick(PLANE_COLORS), text:(text||pick(PLANE_WORDS)).slice(0,14), phase:rand(0,TAU) });
  Snd.whoosh();
}
function spawnBalloon(){
  if(state.balloons.length>=2) return;
  state.balloons.push({ x:rand(W*0.12,W*0.88), y:H+90, vy:rand(12,20), ph:rand(0,TAU),
    c1:pick(['#ff9db0','#ffb37a','#a5d8ff','#c9b6f7','#9fe6b0']), c2:'#ffffff' });
}

/* ================= particles ================= */
function sparkle(x,y,col){
  for(let i=0;i<7;i++){ const a=rand(0,TAU), sp=rand(20,70);
    state.particles.push({type:'spark',x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-14,size:rand(1.8,3.6),col:col||'#ffffff',t:0,life:rand(.35,.6)}); }
}
function poof(x,y,size){
  state.particles.push({type:'ring',x,y,size:size*0.7,t:0,life:.4});
  for(let i=0;i<6;i++){ const a=rand(0,TAU),sp=rand(15,55);
    state.particles.push({type:'spark',x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-20,size:rand(2,4),col:'#ffffff',t:0,life:rand(.3,.55)}); }
}
function confetti(){
  const cols=['#ff9db0','#ffd166','#8ce99a','#74c0fc','#c9b6f7','#fff3a0'];
  for(let i=0;i<90;i++) state.particles.push({type:'conf',x:W/2+rand(-140,140),y:rand(-160,-10),
    vx:rand(-30,30),vy:rand(50,130),rot:rand(0,6),vr:rand(-4,4),w:rand(6,10),h:rand(9,14),col:pick(cols),ph:rand(0,6),t:0,life:rand(2.2,3.2)});
}

/* ================= background drawing ================= */
function drawSun(c,x,y,R,t,phase){
  c.save(); c.translate(x,y);
  const g=c.createRadialGradient(0,0,R*0.4,0,0,R*1.7);
  g.addColorStop(0,'rgba(255,226,130,0.5)'); g.addColorStop(1,'rgba(255,226,130,0)');
  c.fillStyle=g; c.beginPath(); c.arc(0,0,R*1.7,0,TAU); c.fill();
  c.strokeStyle='rgba(255,200,80,0.9)'; c.lineCap='round'; c.lineWidth=R*0.12;
  const rot=t*0.15+phase;
  for(let i=0;i<12;i++){ const a=rot+i*Math.PI/6;
    c.beginPath(); c.moveTo(Math.cos(a)*R*1.18,Math.sin(a)*R*1.18); c.lineTo(Math.cos(a)*R*1.5,Math.sin(a)*R*1.5); c.stroke(); }
  const bg=c.createRadialGradient(-R*0.25,-R*0.25,R*0.1,0,0,R);
  bg.addColorStop(0,'#ffe680'); bg.addColorStop(1,'#ffc94d');
  c.fillStyle=bg; c.beginPath(); c.arc(0,0,R,0,TAU); c.fill();
  const s=R;
  c.fillStyle='#8a5a3b';
  c.beginPath(); c.arc(-s*0.32,-s*0.12,s*0.09,0,TAU); c.fill();
  c.beginPath(); c.arc(s*0.32,-s*0.12,s*0.09,0,TAU); c.fill();
  c.strokeStyle='#8a5a3b'; c.lineWidth=s*0.09; c.lineCap='round';
  c.beginPath(); c.arc(0,s*0.05,s*0.42,Math.PI*0.18,Math.PI*0.82); c.stroke();
  c.fillStyle='rgba(255,140,140,0.55)';
  c.beginPath(); c.ellipse(-s*0.55,s*0.16,s*0.14,s*0.09,0,0,TAU); c.fill();
  c.beginPath(); c.ellipse(s*0.55,s*0.16,s*0.14,s*0.09,0,0,TAU); c.fill();
  c.restore();
}
function drawHouse(c,x,y,t){
  c.save(); c.translate(x,y);
  // chimney smoke
  for(let i=0;i<3;i++){ const k=((t*0.3+i/3)%1);
    c.globalAlpha=(1-k)*0.5; c.fillStyle='#ffffff';
    c.beginPath(); c.arc(16+Math.sin(k*5+i)*4+k*7, -56-k*34, 3.5+k*5, 0, TAU); c.fill(); }
  c.globalAlpha=1;
  c.fillStyle='#d99a6c'; c.fillRect(12,-52,9,14);
  c.fillStyle='#fff6e8'; c.fillRect(-26,-34,52,34);
  c.fillStyle='#ff8a7a';
  c.beginPath(); c.moveTo(-32,-34); c.lineTo(32,-34); c.lineTo(0,-58); c.closePath(); c.fill();
  c.fillStyle='#c68a5e'; c.fillRect(-6,-16,12,16);
  c.fillStyle='#8a5a3b'; c.beginPath(); c.arc(2,-8,1.4,0,TAU); c.fill();
  c.fillStyle='#bfe6ff'; c.strokeStyle='#ffffff'; c.lineWidth=1.5;
  c.beginPath(); c.arc(13,-22,5,0,TAU); c.fill(); c.stroke();
  c.restore();
}
function drawFlower(c,x,y,col,t,ph){
  const sway=Math.sin(t*1.5+ph*9)*2;
  c.strokeStyle='#5fae5a'; c.lineWidth=2; c.lineCap='round';
  c.beginPath(); c.moveTo(x,y); c.quadraticCurveTo(x+sway*0.5,y-7,x+sway,y-14); c.stroke();
  const fx=x+sway, fy=y-14;
  c.fillStyle=col;
  for(let i=0;i<5;i++){ const a=i/5*TAU-Math.PI/2;
    c.beginPath(); c.arc(fx+Math.cos(a)*4.2, fy+Math.sin(a)*4.2, 3.2, 0, TAU); c.fill(); }
  c.fillStyle='#ffcf5e'; c.beginPath(); c.arc(fx,fy,2.6,0,TAU); c.fill();
}
function drawHills(c,t){
  const back={x:W*0.24, y:H+165, rx:Math.max(300,W*0.62), ry:225};
  const front={x:W*0.78, y:H+185, rx:Math.max(280,W*0.58), ry:235};
  c.fillStyle='#b7e9a8';
  c.beginPath(); c.ellipse(back.x,back.y,back.rx,back.ry,0,0,TAU); c.fill();
  const hx=W*0.17, hy=back.y-back.ry*Math.sqrt(Math.max(0,1-((hx-back.x)/back.rx)**2));
  drawHouse(c,hx,hy+6,t);
  c.fillStyle='#98dc8d';
  c.beginPath(); c.ellipse(front.x,front.y,front.rx,front.ry,0,0,TAU); c.fill();
  const fl=[['#ffb3c7',.30],['#fff3a0',.45],['#ffc49b',.58],['#e3b7ff',.68],['#ffd9e8',.82],['#ffffff',.9]];
  for(const [col,fx] of fl){ const x=W*fx;
    const q=1-((x-front.x)/front.rx)**2; if(q<0) continue;
    const y=front.y-front.ry*Math.sqrt(q);
    drawFlower(c,x,y+2,col,t,fx); }
}
function initAmbient(){
  state.ambient=[];
  for(let i=0;i<5;i++){
    const size=rand(90,190);
    const sp=buildCloudSprite(Math.random()<0.5?'flat':'puffy', size, '#ffffff', false, (Math.random()*2**31)|0);
    state.ambient.push({x:rand(0,W), y:rand(20,H*0.45), sp, speed:rand(8,18)*(140/size), alpha:rand(0.45,0.7)});
  }
}
function drawAmbient(c){
  for(const a of state.ambient){
    c.globalAlpha=a.alpha;
    c.drawImage(a.sp.canvas, a.x-a.sp.ox, a.y-a.sp.oy, a.sp.w, a.sp.h);

/* ================= object drawing ================= */
function drawRain(c,o){
  c.save();
  c.strokeStyle='rgba(110,165,225,0.85)'; c.lineCap='round'; c.lineWidth=Math.max(1.4,o.size*0.022);
  for(const d of o.drops){
    const yy=o.y+o.size*0.2+d.y, fade=clamp(1-d.y/(o.size*1.15),0,1);
    c.globalAlpha=fade*0.9;
    c.beginPath(); c.moveTo(o.x+d.dx,yy); c.lineTo(o.x+d.dx-2,yy+d.len); c.stroke();
  }
  c.restore();
}
function drawBird(c,x,y,s,flap,dir){
  c.save(); c.translate(x,y); c.scale(dir,1);
  c.strokeStyle='rgba(84,102,138,0.9)'; c.lineWidth=Math.max(1.6,s*0.16); c.lineCap='round';
  c.beginPath(); c.moveTo(-s,0); c.quadraticCurveTo(-s*0.45,-s*flap,0,0); c.quadraticCurveTo(s*0.45,-s*flap,s,0); c.stroke();
  c.restore();
}
function drawBirds(c,o,t,k){
  for(const m of o.members){
    const flap=0.3+0.55*Math.abs(Math.sin(t*8+m.ph));
    drawBird(c, o.x+m.dx*o.k, o.y+m.dy*o.k+Math.sin(t*2.5+m.ph)*3, o.size*m.s*k, flap, o.dir);
  }
}
function drawObjects(c,t){
  for(const o of state.objects){
    const k=o.born!==undefined ? easeOutBack(clamp((t-o.born)*3.2,0,1)) : 1;
    if(k<0.02) continue;
    if(o.type==='cloud'){
      const bobY=Math.sin(t*o.bobSpeed+o.bobPhase)*o.bobAmp, s=o.sprite;
      c.drawImage(s.canvas, o.x-s.ox*k, o.y+bobY-s.oy*k, s.w*k, s.h*k);
      if(o.rain && k>0.85) drawRain(c,o);
    } else if(o.type==='rainbow'){
      const s=o.sprite;
      c.globalAlpha=(0.9+0.1*Math.sin(t*2+o.phase))*Math.min(1,k);
      c.drawImage(s.canvas, o.x-s.ox*k, o.y-s.oy*k, s.w*k, s.h*k);
      c.globalAlpha=1;
    } else if(o.type==='sun'){
      drawSun(c, o.x, o.y+Math.sin(t*1.2+o.phase)*5, o.size*0.5*k, t, o.phase);
    } else if(o.type==='birds'){
      drawBirds(c,o,t,k);
    }
  }
}
function drawPlane(c,p,t){
  const bobY=Math.sin(t*2.1+p.phase)*5, x=p.x, y=p.y+bobY;
  c.font='600 17px Fredoka, ui-rounded, sans-serif';
  const bw=clamp(c.measureText(p.text).width+38, 86, 240), bh=32;
  const tailX=x-p.dir*46;
  const bx=p.dir>0 ? tailX-58-bw : tailX+58;
  const by=y+2+Math.sin(t*2.6+p.phase)*3.5, wave=Math.sin(t*3.2+p.phase)*3;
  c.strokeStyle='rgba(120,110,140,0.75)'; c.lineWidth=1.6;
  c.beginPath(); c.moveTo(tailX,y-2); c.lineTo(p.dir>0?bx+bw:bx, by+5); c.stroke();
  c.beginPath();
  c.moveTo(bx,by);
  c.quadraticCurveTo(bx+bw/2, by-5-wave, bx+bw, by);
  c.lineTo(bx+bw, by+bh);
  c.quadraticCurveTo(bx+bw/2, by+bh+5+wave, bx, by+bh);
  c.closePath();
  c.fillStyle='#fff8ea'; c.fill();
  c.strokeStyle='rgba(200,170,130,0.55)'; c.lineWidth=1.5; c.stroke();
  c.fillStyle='rgba(255,183,197,0.8)';
  c.beginPath(); c.arc(bx+13,by+bh/2,3,0,TAU); c.arc(bx+bw-13,by+bh/2,3,0,TAU); c.fill();
  c.fillStyle='#6b5670'; c.textAlign='center'; c.textBaseline='middle';
  c.fillText(p.text, bx+bw/2, by+bh/2+1);
  // plane body
  c.save(); c.translate(x,y); c.scale(p.dir,1); c.rotate(Math.sin(t*1.8+p.phase)*0.05);
  const col=p.color, dark=shade(col,-30);
  c.fillStyle='rgba(225,235,248,0.4)';
  c.beginPath(); c.ellipse(45,0,5,17,0,0,TAU); c.fill();
  c.fillStyle=dark;
  c.beginPath(); c.moveTo(-32,-5); c.lineTo(-50,-21); c.lineTo(-43,-1); c.closePath(); c.fill();
  c.beginPath(); c.ellipse(-37,4,13,5,-0.15,0,TAU); c.fill();
  c.fillStyle=col;
  c.beginPath(); c.ellipse(0,0,40,14,0,0,TAU); c.fill();
  c.fillStyle=dark;
  c.beginPath(); c.ellipse(2,7,24,8,-0.18,0,TAU); c.fill();
  c.fillStyle=shade(col,-14);
  c.beginPath(); c.ellipse(33,0,11,11,0,0,TAU); c.fill();
  c.fillStyle='#d8f1ff'; c.strokeStyle='#ffffff'; c.lineWidth=2;
  c.beginPath(); c.arc(11,-4.5,6.5,0,TAU); c.fill(); c.stroke();
  c.fillStyle='#5b4a68';
  c.beginPath(); c.arc(23,-3,2.4,0,TAU); c.fill();
  c.strokeStyle='#5b4a68'; c.lineWidth=1.8; c.lineCap='round';
  c.beginPath(); c.arc(25,2.5,4.5,Math.PI*0.15,Math.PI*0.85); c.stroke();
  c.save(); c.translate(45,0); c.rotate(t*26+p.phase);
  c.strokeStyle='#8a97ad'; c.lineWidth=3;
  c.beginPath(); c.moveTo(0,-15); c.lineTo(0,15); c.stroke(); c.restore();
  c.fillStyle='#f2f5fa';
  c.beginPath(); c.arc(45,0,3.6,0,TAU); c.fill();
  c.restore();
}
function drawPlanes(c,t){ for(const p of state.planes) drawPlane(c,p,t); }
function drawBalloons(c,t){
  for(const b of state.balloons){
    const x=b.x+Math.sin(t*0.7+b.ph)*12, y=b.y;
    c.save();
    c.beginPath(); c.ellipse(x,y,30,33,0,0,TAU); c.clip();
    c.fillStyle=b.c1; c.fillRect(x-32,y-35,64,70);
    c.fillStyle=b.c2; for(const k of [-2,0,2]) c.fillRect(x+k*10-4,y-35,8,70);
    c.fillStyle='rgba(255,255,255,0.3)'; c.fillRect(x-30,y-35,10,70);
    c.restore();
    c.fillStyle=b.c1;
    c.beginPath(); c.moveTo(x-13,y+26); c.lineTo(x+13,y+26); c.lineTo(x+7,y+42); c.lineTo(x-7,y+42); c.closePath(); c.fill();
    c.strokeStyle='rgba(120,90,70,0.8)'; c.lineWidth=1.5;
    c.beginPath(); c.moveTo(x-7,y+42); c.lineTo(x-8,y+50); c.moveTo(x+7,y+42); c.lineTo(x+8,y+50); c.stroke();
    c.fillStyle='#b5876d'; c.fillRect(x-9,y+50,18,13);
    c.fillStyle='#a1765f'; c.fillRect(x-9,y+50,18,3);
  }
}
function drawParticles(c){
  for(const p of state.particles){
    const k=p.t/p.life;
    if(p.type==='spark'){
      c.globalAlpha=(1-k)*0.95; c.fillStyle=p.col;
      c.beginPath(); c.arc(p.x,p.y,p.size*(1-k*0.6),0,TAU); c.fill();
    } else if(p.type==='ring'){
      c.globalAlpha=(1-k)*0.85; c.strokeStyle='#ffffff'; c.lineWidth=3.5*(1-k)+1;
      c.beginPath(); c.arc(p.x,p.y,p.size*(0.25+k),0,TAU); c.stroke();
    } else if(p.type==='conf'){
      c.save(); c.translate(p.x,p.y); c.rotate(p.rot); c.scale(Math.sin(p.t*7+p.ph),1);
      c.globalAlpha=clamp(1.2-k,0,1); c.fillStyle=p.col; c.fillRect(-p.w/2,-p.h/2,p.w,p.h); c.restore();
    }
  }
  c.globalAlpha=1;
}
function drawCursor(c){
  if(!pointer.inside || pointer.down) return;
  const meta=BRUSHES[state.brush];
  let r=state.size*0.5;
  if(meta.kind==='erase') r=state.size*0.65;
  if(state.brush==='rainbow') r=state.size*1.05;
  c.save();
  c.beginPath(); c.arc(pointer.x,pointer.y,r,0,TAU);
  c.fillStyle=meta.kind==='erase' ? 'rgba(255,150,150,0.10)' : 'rgba(255,255,255,0.14)'; c.fill();
  c.setLineDash([7,7]); c.lineWidth=2; c.strokeStyle='rgba(255,255,255,0.9)'; c.stroke();
  c.restore();
}

/* ================= scene ================= */
function drawScene(c,t,forSave){
  c.fillStyle=skyGrad; c.fillRect(0,0,W,H);
  drawSun(c, W-104, 92, 44, t, 0);
  drawAmbient(c);
  drawHills(c,t);
  drawObjects(c,t);
  drawBalloons(c,t);
  drawPlanes(c,t);
  if(!forSave){ drawParticles(c); drawCursor(c); }
}

/* ================= update ================= */
function update(dt){
  const wind=state.wind;
  for(const o of state.objects){
    if(o.drift) o.x+=o.drift*wind*dt;
    if(o.type==='birds'){
      o.x+=o.vx*Math.max(0.3,wind)*dt;
      if(o.dir>0 && o.x-90>W) o.x=-90;
      if(o.dir<0 && o.x+90<0) o.x=W+90;
    } else if(o.wrap){
      if(o.x-o.wrap>W) o.x=-o.wrap;
    }
    if(o.rain && o.drops){
      for(const d of o.drops){ d.y+=d.speed*dt;
        if(d.y>o.size*1.15){ d.y=-10; d.dx=rand(-o.rainW,o.rainW); } }
    }
  }
  for(const a of state.ambient){ a.x+=a.speed*(0.3+wind*0.7)*dt; if(a.x-a.sp.w>W) a.x=-a.sp.w; }
  for(let i=state.planes.length-1;i>=0;i--){ const p=state.planes[i]; p.x+=p.vx*dt;
    if(p.dir>0 && p.x-420>W) state.planes.splice(i,1);
    else if(p.dir<0 && p.x+420<0) state.planes.splice(i,1); }
  for(let i=state.balloons.length-1;i>=0;i--){ const b=state.balloons[i]; b.y-=b.vy*dt;
    if(b.y<-110) state.balloons.splice(i,1); }
  for(let i=state.particles.length-1;i>=0;i--){ const p=state.particles[i]; p.t+=dt;
    if(p.type==='conf'){ p.vy+=24*dt; p.x+=p.vx*dt+Math.sin(p.t*4+p.ph)*0.8; p.y+=p.vy*dt; p.rot+=p.vr*dt;
      if(p.y>H+30 || p.t>p.life) state.particles.splice(i,1); }
    else { p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy-=40*dt;
      if(p.t>p.life) state.particles.splice(i,1); } }
  planeTimer-=dt;  if(planeTimer<=0){ planeTimer=rand(16,26); launchPlane(); }
  balloonTimer-=dt; if(balloonTimer<=0){ balloonTimer=rand(24,40); spawnBalloon(); }
}

/* ================= main loop ================= */
let lastT=performance.now();
function frame(now){
  const dt=Math.min(.05,(now-lastT)/1000); lastT=now;
  update(dt);
  drawScene(ctx, now/1000, false);
  requestAnimationFrame(frame);
}

/* ================= save ================= */
function saveImage(){
  const scale=2, off=document.createElement('canvas');
  off.width=W*scale; off.height=H*scale;
  const oc=off.getContext('2d'); oc.setTransform(scale,0,0,scale,0,0);
  drawScene(oc, nowSec(), true);
  off.toBlob(blob=>{
    if(!blob) return;
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob); a.download='my-sky-painting.png';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(a.href), 5000);
    confetti(); Snd.shutter(); showToast('Picture saved! 🌟');
  });
}

/* ================= input ================= */
const cursorTag=$('#cursor-tag');
function getPt(e){ const r=canvas.getBoundingClientRect(); return {x:e.clientX-r.left, y:e.clientY-r.top}; }
function moveTag(cx,cy){ cursorTag.style.left=cx+'px'; cursorTag.style.top=cy+'px'; }
function strokeWalk(pt){
  const meta=BRUSHES[state.brush], sp=Math.max(12, meta.spacing*state.size);
  let dx=pt.x-stroke.last.x, dy=pt.y-stroke.last.y, dist=Math.hypot(dx,dy);
  while(dist>=sp){
    const k=sp/dist;
    stroke.last.x+=dx*k; stroke.last.y+=dy*k;
    stampCloud(stroke.last.x, stroke.last.y);
    dx=pt.x-stroke.last.x; dy=pt.y-stroke.last.y; dist=Math.hypot(dx,dy);
  }
}
canvas.addEventListener('pointerdown', e=>{
  if(e.pointerType==='mouse' && e.button!==0) return;
  Snd.init();
  try{ canvas.setPointerCapture(e.pointerId); }catch(err){}
  const pt=getPt(e);
  pointer.down=true; pointer.x=pt.x; pointer.y=pt.y;
  cursorTag.classList.remove('show');
  const meta=BRUSHES[state.brush];
  if(meta.kind==='cloud'){ stroke={type:'cloud',last:pt}; stampCloud(pt.x,pt.y); }
  else if(meta.kind==='erase'){ stroke={type:'erase'}; eraseAt(pt.x,pt.y); }
  else { stroke={type:'place', obj:placeObject(state.brush,pt.x,pt.y)}; }
});
canvas.addEventListener('pointermove', e=>{
  const pt=getPt(e);
  pointer.x=pt.x; pointer.y=pt.y; pointer.inside=true;
  moveTag(e.clientX, e.clientY);
  if(!pointer.down) cursorTag.classList.add('show');
  if(!stroke) return;
  if(stroke.type==='erase') eraseAt(pt.x,pt.y);
  else if(stroke.type==='cloud') strokeWalk(pt);
  else if(stroke.type==='place' && stroke.obj){ stroke.obj.x=pt.x; stroke.obj.y=pt.y; }
});
function endStroke(){ stroke=null; pointer.down=false; if(pointer.inside) cursorTag.classList.add('show'); }
canvas.addEventListener('pointerup', endStroke);
canvas.addEventListener('pointercancel', endStroke);
canvas.addEventListener('pointerleave', ()=>{ pointer.inside=false; cursorTag.classList.remove('show'); });
canvas.addEventListener('contextmenu', e=>e.preventDefault());

  state.faces=!state.faces; Prefs.set('faces',state.faces); syncToggles();
  Snd.init(); Snd.pop();
  showToast(state.faces?'Happy faces on! 😊':'Faces off');
});
soundBtn.addEventListener('click', ()=>{
  Snd.on=!Snd.on; Prefs.set('sound',Snd.on); Snd.init(); syncToggles(); Snd.pop();
});
let clearArmed=false, clearTimer=null;
clearBtn.addEventListener('click', ()=>{
  if(!clearArmed){
    clearArmed=true; clearBtn.classList.add('armed');
    showToast('Tap 🧹 again to clear the sky');
    clearTimer=setTimeout(()=>{ clearArmed=false; clearBtn.classList.remove('armed'); }, 2600);
  } else {
    clearTimeout(clearTimer); clearArmed=false; clearBtn.classList.remove('armed');
    const objs=state.objects.slice(); state.objects=[];
    for(let i=0;i<Math.min(24,objs.length);i++){ const o=pick(objs); poof(o.x,o.y,Math.min(90,(o.size||60)*0.7)); }
    Snd.bigPoof(); showToast('A fresh new sky! 🌤️');
  }
});
$('#save-btn').addEventListener('click', ()=>{ Snd.init(); saveImage(); });

const planePop=$('#plane-pop'), bannerInput=$('#banner-input');
$('#plane-btn').addEventListener('click', ()=>{
  Snd.init(); Snd.pop();
  planePop.classList.toggle('hidden');
  if(!planePop.classList.contains('hidden')) bannerInput.focus();
});
function flyFromInput(){
  const txt=bannerInput.value.trim().slice(0,14);
  launchPlane(txt||undefined);
  bannerInput.value=''; planePop.classList.add('hidden');
}
$('#fly-go').addEventListener('click', flyFromInput);
bannerInput.addEventListener('keydown', e=>{ if(e.key==='Enter') flyFromInput(); });

function autoStamp(){
  state.objects.push(createCloud('puffy', W*0.28, H*0.24, 92, '#ffffff'));
  state.objects.push(createCloud('flat',  W*0.60, H*0.34, 110, '#ffffff'));
  state.objects.push(createCloud('heart', W*0.80, H*0.18, 66, '#ffd9e8'));
}
$('#start-btn').addEventListener('click', ()=>{
  Snd.init(); Snd.pop();
  const intro=$('#intro');
  intro.classList.add('gone');
  setTimeout(()=>intro.remove(), 550);
  showToast('Drag on the sky to paint clouds! ☁️');
  setTimeout(()=>{ if(!state.objects.length) autoStamp(); }, 350);
  setTimeout(()=>launchPlane('HI!'), 2000);
});

/* ================= go! ================= */
function layoutOverlays(){
  $('#plane-pop').style.bottom=($('#toolbar').offsetHeight+18)+'px';
}
window.addEventListener('resize', layoutOverlays);
if(document.fonts && document.fonts.load){ document.fonts.load('600 17px Fredoka').catch(()=>{}); }
buildIcons();
syncToggles();
initAmbient();
layoutOverlays();
setTimeout(layoutOverlays, 600);
requestAnimationFrame(frame);
</script>
</body>
</html>
