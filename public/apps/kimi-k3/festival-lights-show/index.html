<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#05030d">
<title>Festival Lights Show</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --pink:#ff2ea6; --cyan:#22e6ff; --yellow:#ffd319; --purple:#9b30ff;
  --bg:#05030d; --text:#eceaff; --dim:#9b93c9;
  --panel:rgba(13,10,26,.62); --line:rgba(255,255,255,.09);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{
  background:var(--bg); color:var(--text);
  font-family:'Rajdhani',system-ui,-apple-system,'Segoe UI',sans-serif;
  user-select:none;-webkit-user-select:none;touch-action:manipulation;
}
#stage{position:fixed;inset:0;display:block;cursor:crosshair}

/* ---------- top bar ---------- */
#topbar{
  position:fixed;top:0;left:0;right:0;z-index:20;pointer-events:none;
  display:flex;justify-content:space-between;align-items:flex-start;padding:14px 20px;
}
#brand h1{
  font-family:'Orbitron',sans-serif;font-weight:900;font-size:clamp(17px,2.6vw,26px);
  letter-spacing:4px;line-height:1;
  background:linear-gradient(92deg,var(--cyan),var(--pink) 55%,var(--yellow));
  -webkit-background-clip:text;background-clip:text;color:transparent;
  filter:drop-shadow(0 0 12px rgba(255,46,166,.45));
}
#brand .sub{
  margin-top:5px;font-family:'Orbitron',sans-serif;font-size:9px;font-weight:500;
  letter-spacing:6px;color:var(--dim);
}
.flick{animation:flick 7s infinite}
@keyframes flick{
  0%,6.5%,8%,100%{opacity:1}
  7%{opacity:.35}
  58%,58.6%,59.4%,60%{opacity:1}
  58.8%,59.2%{opacity:.3}
}
.live-chip{
  display:inline-flex;align-items:center;gap:7px;margin-bottom:7px;
  font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:3px;color:#ff5b6e;
  border:1px solid rgba(255,91,110,.35);border-radius:99px;padding:4px 10px;
  background:rgba(255,91,110,.07);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
}
.live-chip .dot{width:7px;height:7px;border-radius:50%;background:#ff3b52;box-shadow:0 0 10px #ff3b52;animation:blink 1.4s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
#hint{
  font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:2px;color:var(--dim);
  text-align:right;line-height:1.9;opacity:.85;
  padding:8px 12px;border:1px solid var(--line);border-radius:10px;
  background:rgba(10,8,20,.35);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
#hint b{color:var(--cyan);font-weight:700}

/* ---------- banner / toast ---------- */
#banner{
  position:fixed;left:0;right:0;top:34%;z-index:15;pointer-events:none;text-align:center;
  font-family:'Orbitron',sans-serif;font-weight:900;font-size:clamp(22px,4.4vw,44px);
  letter-spacing:8px;color:#fff;opacity:0;
  text-shadow:0 0 22px rgba(34,230,255,.8),0 0 60px rgba(255,46,166,.5);
}
#banner.show{animation:bannerIn 1.7s cubic-bezier(.2,.8,.2,1) forwards}
@keyframes bannerIn{
  0%{opacity:0;transform:scale(.8) translateY(14px);filter:blur(8px)}
  14%{opacity:1;transform:scale(1) translateY(0);filter:blur(0)}
  72%{opacity:1}
  100%{opacity:0;transform:scale(1.06) translateY(-12px);filter:blur(4px)}
}
#toast{
  position:fixed;left:50%;bottom:210px;transform:translateX(-50%) translateY(10px);z-index:40;
  font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:3px;color:#fff;
  background:rgba(16,12,32,.85);border:1px solid rgba(34,230,255,.35);border-radius:99px;
  padding:9px 18px;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;
  box-shadow:0 0 24px rgba(34,230,255,.2);
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ---------- control deck ---------- */
#deck{
  position:fixed;left:50%;bottom:14px;transform:translateX(-50%);z-index:30;
  width:min(1220px,96vw);
  background:var(--panel);border:1px solid var(--line);border-radius:18px;
  backdrop-filter:blur(16px) saturate(1.5);-webkit-backdrop-filter:blur(16px) saturate(1.5);
  box-shadow:0 18px 60px rgba(0,0,0,.65),inset 0 1px 0 rgba(255,255,255,.07);
  transition:transform .45s cubic-bezier(.2,.9,.25,1);
}
#deck::before{
  content:"";position:absolute;top:-1px;left:24px;right:24px;height:2px;border-radius:2px;
  background:linear-gradient(90deg,transparent,var(--cyan),var(--pink),var(--yellow),transparent);
  background-size:200% 100%;animation:flow 6s linear infinite;opacity:.9;
}
@keyframes flow{to{background-position:200% 0}}
#deck.collapsed{transform:translateX(-50%) translateY(calc(100% - 30px))}
#grip{height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer}
#grip span{width:52px;height:5px;border-radius:99px;background:rgba(255,255,255,.22);transition:all .25s}
#grip:hover span{background:var(--cyan);box-shadow:0 0 12px var(--cyan);width:70px}
.deck-inner{padding:2px 18px 16px}
.row{display:flex;align-items:center;gap:10px}
.label-row{justify-content:space-between;margin-bottom:8px}
.lbl{
  font-family:'Orbitron',sans-serif;font-size:9px;font-weight:700;letter-spacing:3px;color:var(--dim);
}
.lbl.right{color:var(--cyan)}
#status.on{color:#7dffb0;text-shadow:0 0 10px rgba(125,255,176,.7)}

/* pattern buttons */
#patterns{
  display:grid;grid-template-columns:repeat(10,1fr);gap:8px;margin-bottom:12px;
}
.pat{
  display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px 7px;
  background:rgba(255,255,255,.035);border:1px solid var(--line);border-radius:11px;
  color:var(--dim);cursor:pointer;transition:all .18s;font-family:'Orbitron',sans-serif;
}
.pat .ic{font-size:17px;line-height:1;filter:grayscale(.4);transition:all .18s}
.pat .nm{font-size:8px;font-weight:700;letter-spacing:1.5px}
.pat:hover{color:#fff;border-color:rgba(255,255,255,.3);transform:translateY(-2px)}
.pat.active{
  color:#fff;border-color:var(--cyan);
  background:linear-gradient(135deg,rgba(255,46,166,.22),rgba(34,230,255,.2));
  box-shadow:0 0 18px rgba(34,230,255,.35),inset 0 0 14px rgba(255,46,166,.14);
}
.pat.active .ic{filter:none;transform:scale(1.15)}

/* deck grid */
.deck-grid{
  display:grid;grid-template-columns:auto auto 1fr auto;gap:22px;align-items:start;
}
.group{display:flex;flex-direction:column;gap:8px;min-width:0}
.group>.lbl{margin-bottom:1px}

/* palettes */
#palettes{display:flex;gap:7px;flex-wrap:wrap}
.pal{
  width:30px;height:30px;border-radius:50%;cursor:pointer;border:2px solid transparent;
  transition:all .18s;position:relative;flex:none;
}
.pal:hover{transform:scale(1.14)}
.pal.active{border-color:#fff;box-shadow:0 0 14px rgba(255,255,255,.55);transform:scale(1.12)}

/* sliders */
.sliders{display:flex;flex-direction:column;gap:9px}
.sld{display:flex;align-items:center;gap:9px}
.sld .k{font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:2px;color:var(--dim);width:52px;flex:none}
.sld .v{font-family:'Orbitron',sans-serif;font-size:9px;color:var(--cyan);width:34px;text-align:right;flex:none}
input[type=range]{
  -webkit-appearance:none;appearance:none;width:120px;height:4px;border-radius:99px;
  background:linear-gradient(90deg,var(--purple),var(--pink));outline:none;cursor:pointer;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#fff;
  box-shadow:0 0 10px var(--pink),0 0 4px #fff;border:none;transition:transform .15s;
}
input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.25)}
input[type=range]::-moz-range-thumb{
  width:14px;height:14px;border-radius:50%;background:#fff;border:none;
  box-shadow:0 0 10px var(--pink);
}
.cyan-track input[type=range]{background:linear-gradient(90deg,#0b6b7a,var(--cyan))}
.cyan-track input[type=range]::-webkit-slider-thumb{box-shadow:0 0 10px var(--cyan),0 0 4px #fff}

/* music cluster */
.music-cluster{display:flex;align-items:center;gap:14px}
#playBtn{
  width:56px;height:56px;border-radius:50%;flex:none;cursor:pointer;
  border:1px solid rgba(34,230,255,.5);color:var(--cyan);font-size:19px;
  background:radial-gradient(circle at 35% 30%,rgba(34,230,255,.18),rgba(34,230,255,.03));
  transition:all .2s;display:flex;align-items:center;justify-content:center;
  font-family:'Orbitron',sans-serif;
}
#playBtn:hover{transform:scale(1.06);box-shadow:0 0 22px rgba(34,230,255,.4)}
#playBtn.playing{
  color:#fff;background:radial-gradient(circle at 35% 30%,rgba(255,46,166,.4),rgba(255,46,166,.08));
  border-color:var(--pink);box-shadow:0 0 26px rgba(255,46,166,.55);
}
#playBtn.attn{animation:attn 1.6s infinite}
@keyframes attn{
  0%,100%{box-shadow:0 0 8px rgba(34,230,255,.3)}
  50%{box-shadow:0 0 30px rgba(34,230,255,.9);transform:scale(1.07)}
}
.music-mid{display:flex;flex-direction:column;gap:8px}
.music-right{display:flex;flex-direction:column;gap:7px;align-items:center;flex:none}
#spectrum{
  width:150px;height:40px;border-radius:8px;background:rgba(0,0,0,.35);
  border:1px solid var(--line);
}
.beatline{display:flex;align-items:center;gap:7px}
#beatDot{
  width:11px;height:11px;border-radius:50%;background:var(--pink);
  box-shadow:0 0 12px var(--pink);transition:transform .05s;
}
.beatline .lbl{font-size:8px}

/* small buttons */
.sbtn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  font-family:'Orbitron',sans-serif;font-size:9px;font-weight:700;letter-spacing:2px;
  padding:8px 12px;border-radius:10px;cursor:pointer;color:var(--dim);
  background:rgba(255,255,255,.04);border:1px solid var(--line);transition:all .18s;
}
.sbtn:hover{color:#fff;border-color:rgba(255,255,255,.3)}
.sbtn.on{color:#0b0514;background:linear-gradient(135deg,var(--cyan),var(--pink));
  border-color:transparent;box-shadow:0 0 16px rgba(255,46,166,.5)}
.fx-row{display:flex;gap:8px;flex-wrap:wrap}
.fx{
  width:86px;padding:10px 4px;flex-direction:column;gap:3px;font-size:9px;
}
.fx .ic{font-size:16px}
.fx.holding{color:#0b0514;background:linear-gradient(135deg,#fff,var(--yellow));
  border-color:transparent;box-shadow:0 0 24px rgba(255,211,25,.8);transform:scale(.97)}
#fxBlack.holding{background:linear-gradient(135deg,#3a3a4a,#0a0a12);color:#fff;box-shadow:0 0 24px rgba(0,0,0,.9)}

@media (max-width:1060px){
  .deck-grid{grid-template-columns:1fr 1fr;gap:14px}
  #patterns{grid-template-columns:repeat(5,1fr)}
  #hint{display:none}
  #toast{bottom:auto;top:110px}
}
@media (max-width:620px){
  #patterns{grid-template-columns:repeat(5,1fr)}
  .deck-grid{grid-template-columns:1fr;gap:12px}
  #spectrum{width:120px}
}
</style>
</head>
<body>

<canvas id="stage"></canvas>

<div id="topbar">
  <div id="brand">
    <div class="live-chip"><span class="dot"></span>ON AIR</div>
    <h1>FESTIVAL <span class="flick">LIGHTS</span></h1>
    <div class="sub">LIVE SHOW CONTROL</div>
  </div>
  <div id="hint">
    <b>CLICK SKY</b> fireworks &nbsp;·&nbsp; <b>SPACE</b> music<br>
    <b>&larr;&rarr;</b> pattern &nbsp;·&nbsp; <b>&uarr;&darr;</b> palette<br>
    <b>A</b> autopilot &nbsp;·&nbsp; <b>H</b> hide panel
  </div>
</div>

<div id="banner"></div>
<div id="toast"></div>

<div id="deck">
  <div id="grip"><span></span></div>
  <div class="deck-inner">
    <div class="row label-row">
      <span class="lbl">◆ LIGHT PROGRAM</span>
      <span class="lbl right" id="status">STANDBY</span>
    </div>
    <div id="patterns"></div>
    <div class="deck-grid">
      <div class="group">
        <div class="lbl">COLOR PALETTE</div>
        <div id="palettes"></div>
      </div>
      <div class="group">
        <div class="lbl">SHOW</div>
        <div class="sliders">
          <div class="sld"><span class="k">SPEED</span><input type="range" id="speed" min="20" max="240" value="100"><span class="v" id="speedV">1.0×</span></div>
          <div class="sld"><span class="k">GLOW</span><input type="range" id="glow" min="30" max="140" value="100"><span class="v" id="glowV">100%</span></div>
          <div class="sld"><button class="sbtn on" id="autoBtn">◉ AUTOPILOT</button></div>
        </div>
      </div>
      <div class="group">
        <div class="lbl">MUSIC SYNC</div>
        <div class="music-cluster">
          <button id="playBtn" class="attn" title="Play / Stop music">▶</button>
          <div class="music-mid">
            <div class="sld cyan-track"><span class="k">BPM</span><input type="range" id="bpm" min="100" max="142" value="126"><span class="v" id="bpmV">126</span></div>
            <div class="sld cyan-track"><span class="k">VOLUME</span><input type="range" id="vol" min="0" max="100" value="80"><span class="v" id="volV">80</span></div>
            <div class="beatline"><span id="beatDot"></span><span class="lbl" id="beatLbl">SYNC READY</span></div>
          </div>
          <div class="music-right">
            <canvas id="spectrum" width="300" height="80"></canvas>
            <button class="sbtn" id="micBtn">🎙 MIC SYNC</button>
          </div>
        </div>
      </div>
      <div class="group">
        <div class="lbl">LIVE FX · HOLD</div>
        <div class="fx-row">
          <button class="sbtn fx" id="fxStrobe"><span class="ic">⚡</span>STROBE</button>
          <button class="sbtn fx" id="fxFlash"><span class="ic">✸</span>FLASH</button>
          <button class="sbtn fx" id="fxBlack"><span class="ic">◼</span>BLACKOUT</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
'use strict';
/* ============================== utils ============================== */
const TAU=Math.PI*2;
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const lerp=(a,b,t)=>a+(b-a)*t;
const rand=(a,b)=>b===undefined?Math.random()*a:a+Math.random()*(b-a);
const fract=v=>v-Math.floor(v);
const hash=(x,y)=>{const s=Math.sin(x*127.1+y*311.7)*43758.5453;return s-Math.floor(s);};
function vnoise(x,y){
  const xi=Math.floor(x),yi=Math.floor(y),xf=x-xi,yf=y-yi;
  const u=xf*xf*(3-2*xf),v=yf*yf*(3-2*yf);
  const a=hash(xi,yi),b=hash(xi+1,yi),c=hash(xi,yi+1),d=hash(xi+1,yi+1);
  return a+(b-a)*u+(c-a)*v+(a-b-c+d)*u*v;
}
function roundRect(g,x,y,w,h,r){
  r=Math.min(r,w/2,h/2);
  g.beginPath();g.moveTo(x+r,y);
  g.arcTo(x+w,y,x+w,y+h,r);g.arcTo(x+w,y+h,x,y+h,r);
  g.arcTo(x,y+h,x,y,r);g.arcTo(x,y,x+w,y,r);g.closePath();
}

/* ============================== palettes ============================== */
const PALETTES=[
  {name:'Neon Rave',    c:[[318,100,62],[186,100,55],[264,100,66],[46,100,58],[350,100,64]]},
  {name:'Sunset Blvd',  c:[[340,95,62],[14,100,60],[36,100,58],[280,85,62],[52,100,60]]},
  {name:'Deep Ocean',   c:[[230,90,62],[210,100,60],[190,100,55],[168,95,50],[250,80,68]]},
  {name:'Acid Jungle',  c:[[150,100,45],[120,100,55],[85,100,55],[60,100,58],[100,95,42]]},
  {name:'Inferno',      c:[[350,95,42],[8,100,54],[25,100,55],[45,100,60],[0,90,48]]},
  {name:'Cotton Candy', c:[[300,100,72],[330,100,70],[200,100,75],[265,90,75],[0,0,95]]},
  {name:'Glacier',      c:[[220,100,72],[195,100,70],[185,90,85],[245,70,80],[0,0,96]]},
  {name:'Ultraviolet',  c:[[255,100,62],[275,100,60],[290,100,58],[315,95,62],[300,100,72]]}
];
let palIdx=0;
function hueLerp(h1,h2,t){let d=((h2-h1+540)%360)-180;return (h1+d*t+360)%360;}
function samplePal(t){
  t=fract(t);const cs=PALETTES[palIdx].c,n=cs.length;
  const i=Math.floor(t*n),f=t*n-i,c1=cs[i%n],c2=cs[(i+1)%n];
  return [hueLerp(c1[0],c2[0],f),lerp(c1[1],c2[1],f),lerp(c1[2],c2[2],f)];
}

/* ============================== glow sprites ============================== */
const sprites=new Map();
function glow(h,s,l){
  h=((Math.round(h/8)*8)%360+360)%360;s=Math.round(s/10)*10;l=Math.round(l/10)*10;
  const key=h+'/'+s+'/'+l;
  let c=sprites.get(key);
  if(!c){
    if(sprites.size>700)sprites.clear();
    c=document.createElement('canvas');c.width=c.height=64;
    const g=c.getContext('2d');
    const gr=g.createRadialGradient(32,32,0,32,32,32);
    gr.addColorStop(0,'hsla('+h+','+s+'%,'+Math.min(l+12,92)+'%,.95)');
    gr.addColorStop(.26,'hsla('+h+','+s+'%,'+l+'%,.5)');
    gr.addColorStop(1,'hsla('+h+','+s+'%,'+l+'%,0)');
    g.fillStyle=gr;g.fillRect(0,0,64,64);
    sprites.set(key,c);
  }
  return c;
}

/* ============================== state ============================== */
const S={t:0,pattern:0,speed:1,intensity:1,beat:0,bass:0.25,level:0.3,energy:0.72,beatCount:0,cols:26,rows:14,forceWhite:false};
let beatPulse=0,dim=1,flashA=0,dropShake=0;
let holdStrobe=false,holdFlash=false,holdBlack=false,autopilot=true;
const mouse={x:-9999,y:-9999};

/* ============================== canvas ============================== */
const cvs=document.getElementById('stage'),ctx=cvs.getContext('2d');
let W=0,H=0,DPR=1,bgCvs=null;
const grid={cols:26,rows:14,x:0,y:0,w:0,h:0,gap:36,r:11};
let strands=[],motes=[],beamFx=[];
const rockets=[],sparks=[];

function resize(){
  DPR=Math.min(window.devicePixelRatio||1,1.75);
  W=window.innerWidth;H=window.innerHeight;
  cvs.width=W*DPR;cvs.height=H*DPR;
  cvs.style.width=W+'px';cvs.style.height=H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  layout();buildBG();buildStrings();buildBeams();buildMotes();
}
function layout(){
  const cols=clamp(Math.round(W/52),18,34),rows=clamp(Math.round(H/60),10,16);
  let gap=Math.min((W*0.86)/cols,(H*0.58)/rows,46);
  grid.cols=cols;grid.rows=rows;grid.gap=gap;
  grid.w=gap*(cols-1);grid.h=gap*(rows-1);
  grid.x=(W-grid.w)/2;grid.y=Math.max(H*0.17,96);grid.r=gap*0.3;
  S.cols=cols;S.rows=rows;
}
function buildBG(){
  bgCvs=document.createElement('canvas');bgCvs.width=W*DPR;bgCvs.height=H*DPR;
  const g=bgCvs.getContext('2d');g.setTransform(DPR,0,0,DPR,0,0);
  const lg=g.createLinearGradient(0,0,0,H);
  lg.addColorStop(0,'#0c0718');lg.addColorStop(.5,'#070412');lg.addColorStop(1,'#03020a');
  g.fillStyle=lg;g.fillRect(0,0,W,H);
  const rg=g.createRadialGradient(W/2,H*0.36,0,W/2,H*0.36,Math.max(W,H)*0.62);
  rg.addColorStop(0,'rgba(60,40,120,0.22)');rg.addColorStop(.6,'rgba(30,16,70,0.10)');rg.addColorStop(1,'rgba(0,0,0,0)');
  g.fillStyle=rg;g.fillRect(0,0,W,H);
  const vg=g.createRadialGradient(W/2,H/2,Math.min(W,H)*0.35,W/2,H/2,Math.max(W,H)*0.78);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,0.55)');
  g.fillStyle=vg;g.fillRect(0,0,W,H);
}
function buildStrings(){
  strands=[];
  for(let i=0;i<3;i++){
    const y0=20+i*26,sag=52-i*9,pts=[],bulbs=[];
    const n=Math.ceil(W/8);
    for(let k=0;k<=n;k++){
      const x=k/n*W,y=y0+Math.sin(k/n*Math.PI)*sag;
      pts.push([x,y]);
    }
    const nb=Math.floor(W/30);
    for(let k=1;k<nb;k++){
      const x=k/nb*W,y=y0+Math.sin(k/nb*Math.PI)*sag+3;
      bulbs.push([x,y,hash(k,i*7)]);
    }
    strands.push({pts:pts,bulbs:bulbs});
  }
}
function buildMotes(){
  motes=[];
  for(let i=0;i<34;i++)motes.push({x:rand(W),y:rand(H),s:rand(1.5,4),vx:rand(-6,6),vy:rand(-14,-4),p:rand(TAU)});
}
function buildBeams(){
  beamFx=[];
  const n=6;
  for(let i=0;i<n;i++){
    const fx=W*(i+0.5)/n;
    const base=lerp(-0.42,0.42,n===1?0.5:i/(n-1));
    beamFx.push({x:fx,base:base,cur:base,target:base,w:rand(0.3,0.7),ph:rand(TAU),hueT:i/n});
  }
}
window.addEventListener('resize',resize);

/* ============================== audio core ============================== */
const audio={ctx:null,master:null,comp:null,analyser:null,freq:null,sc:null,delay:null,delaySend:null,
  playing:false,micOn:false,micStream:null,micAnalyser:null,micFreq:null,micHist:[],lastMicBeat:0};
let actx=null;
const midi=n=>440*Math.pow(2,(n-69)/12);

function ensureAudio(){
  if(audio.ctx){if(audio.ctx.state==='suspended')audio.ctx.resume();return;}
  const AC=window.AudioContext||window.webkitAudioContext;
  if(!AC)return;
  actx=audio.ctx=new AC();
  audio.master=actx.createGain();audio.master.gain.value=volSlider.value/100*0.9;
  audio.comp=actx.createDynamicsCompressor();
  audio.comp.threshold.value=-16;audio.comp.ratio.value=5;
  audio.comp.attack.value=0.004;audio.comp.release.value=0.22;
  audio.analyser=actx.createAnalyser();audio.analyser.fftSize=256;audio.analyser.smoothingTimeConstant=0.78;
  audio.master.connect(audio.comp);audio.comp.connect(actx.destination);audio.comp.connect(audio.analyser);
  audio.freq=new Uint8Array(audio.analyser.frequencyBinCount);
  // sidechain pump node
  audio.sc=actx.createGain();audio.sc.gain.value=1;audio.sc.connect(audio.master);
  // noise buffer
  const buf=actx.createBuffer(1,actx.sampleRate,actx.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
  Music.noiseBuf=buf;
  // dotted-eighth delay
  audio.delay=actx.createDelay(2);audio.delay.delayTime.value=(60/Music.bpm)*0.75;
  const fb=actx.createGain();fb.gain.value=0.34;
  const dlp=actx.createBiquadFilter();dlp.type='lowpass';dlp.frequency.value=2400;
  const wet=actx.createGain();wet.gain.value=0.42;
  audio.delaySend=actx.createGain();audio.delaySend.gain.value=1;
  audio.delaySend.connect(audio.delay);
  audio.delay.connect(dlp);dlp.connect(fb);fb.connect(audio.delay);
  audio.delay.connect(wet);wet.connect(audio.master);
}
function osc(type,f,t){const o=actx.createOscillator();o.type=type;o.frequency.setValueAtTime(f,t);return o;}
function gEnv(t,a,peak,dec){
  const g=actx.createGain();
  g.gain.setValueAtTime(0.0001,t);
  g.gain.linearRampToValueAtTime(peak,t+a);
  g.gain.exponentialRampToValueAtTime(0.0001,t+a+dec);
  return g;
}
function noiseHit(t,o){
  o=o||{};
  const src=actx.createBufferSource();src.buffer=Music.noiseBuf;src.loop=true;
  let node=src;
  if(o.bp){const f=actx.createBiquadFilter();f.type='bandpass';f.frequency.value=o.bp;f.Q.value=o.q||1;node.connect(f);node=f;}
  if(o.hp){const f=actx.createBiquadFilter();f.type='highpass';f.frequency.value=o.hp;node.connect(f);node=f;}
  const g=gEnv(t,o.a||0.002,o.g||0.3,o.d||0.1);
  node.connect(g);g.connect(o.dest||audio.master);
  src.start(t);src.stop(t+(o.a||0.002)+(o.d||0.1)+0.08);
}

/* ============================== music engine ============================== */
const Music={
  bpm:126,step:0,bar:0,nextTime:0,timer:null,beatQ:[],dropQ:[],noiseBuf:null,
  root:45,prog:[0,-4,3,-2],minor:[true,false,false,false],
  start(){
    ensureAudio();if(!actx){toast('AUDIO NOT SUPPORTED');return;}
    if(audio.playing)return;
    audio.playing=true;
    this.step=0;this.bar=0;this.nextTime=actx.currentTime+0.09;
    this.beatQ.length=0;this.dropQ.length=0;
    audio.energy=0.55;
    this.timer=setInterval(function(){Music.tick();},27);
    updatePlayUI();toast('MUSIC LIVE — LIGHTS SYNCED');
  },
  stop(){
    audio.playing=false;
    if(this.timer)clearInterval(this.timer);
    this.timer=null;this.beatQ.length=0;this.dropQ.length=0;
    updatePlayUI();
  },
  tick(){
    const spb=60/this.bpm/4,ct=actx.currentTime;
    let guard=0;
    while(this.nextTime<ct+0.15&&guard++<80){
      this.schedule(this.step,this.nextTime);
      if(this.step%4===0)this.beatQ.push(this.nextTime);
      this.nextTime+=spb;this.step++;
      if(this.step>=16){this.step=0;this.bar++;}
    }
  },
  section(){
    const b=this.bar%32;
    if(b<4)return['intro',0.5];
    if(b<12)return['groove',0.72];
    if(b<16)return['build',0.82+(b-12)*0.045];
    if(b<24)return['drop',1];
    return['break',0.42];
  },
  schedule(s,t){
    const sec=this.section(),spb=60/this.bpm;
    audio.energy=sec[1];
    const bar4=this.bar%4,chordRoot=this.root+this.prog[bar4];
    const third=this.minor[bar4]?3:4;
    const b32=this.bar%32;
    // pads
    if(s===0&&sec[0]!=='drop')this.pad(t,[chordRoot+12,chordRoot+12+third,chordRoot+19],spb*4);
    // riser + crash
    if(b32===12&&s===0)this.riser(t,spb*64);
    if(b32===16&&s===0){this.crash(t);this.dropQ.push(t);}
    // kick
    if((sec[0]==='groove'||sec[0]==='build'||sec[0]==='drop')&&s%4===0)this.kick(t,sec[0]==='drop'?1:0.92);
    // clap
    if((sec[0]==='groove'||sec[0]==='drop')&&(s===4||s===12))this.clap(t);
    // build snare roll
    if(sec[0]==='build'&&b32>=14&&s%2===0)this.snare(t,0.2+0.5*(s/16));
    // hats
    const hat16=sec[0]==='build'||sec[0]==='drop';
    if(hat16||s%2===0)this.hat(t,s===14,s%4===2?0.5:(s%2===0?0.4:0.27));
    if((sec[0]==='intro'||sec[0]==='break')&&s%4===2)this.hat(t,false,0.22);
    // bass
    if(sec[0]==='groove'||sec[0]==='build'||sec[0]==='drop'){
      if(s%2===0)this.bass(t,chordRoot-12+(s%8===6?12:0),spb*0.46);
    }
    // arp
    const scale=[0,third,7,12,12+third];
    const every=(sec[0]==='intro'||sec[0]==='break')?4:2;
    if(s%every===0){
      const n=chordRoot+24+scale[(s*3+this.bar*2)%scale.length]+(sec[0]==='drop'&&s%8>=4?12:0);
      this.arp(t,n,sec[0]==='drop'?0.30:0.21);
    }
    // stabs on drop
    if(sec[0]==='drop'&&(s===2||s===7||s===10))this.stab(t,[chordRoot+12,chordRoot+12+third,chordRoot+19]);
  },
  kick(t,v){
    const o=osc('sine',155,t),g=actx.createGain();
    o.frequency.exponentialRampToValueAtTime(42,t+0.11);
    g.gain.setValueAtTime(0.0001,t);
    g.gain.linearRampToValueAtTime(0.95*v,t+0.004);
    g.gain.exponentialRampToValueAtTime(0.0001,t+0.4);
    o.connect(g);g.connect(audio.master);
    o.start(t);o.stop(t+0.42);
    const sc=audio.sc.gain;
    sc.cancelScheduledValues(t);
    sc.setValueAtTime(1,t);
    sc.linearRampToValueAtTime(0.35,t+0.02);
    sc.linearRampToValueAtTime(1,t+0.27);
  },
  clap(t){
    for(let i=0;i<3;i++)noiseHit(t+i*0.012,{bp:1600,q:1.1,d:i===2?0.17:0.025,g:0.26});
  },
  snare(t,v){
    noiseHit(t,{bp:1900,q:0.9,d:0.15,g:0.4*v});
    const o=osc('triangle',190,t),g=gEnv(t,0.002,0.3*v,0.09);
    o.connect(g);g.connect(audio.master);o.start(t);o.stop(t+0.12);
  },
  hat(t,open,v){noiseHit(t,{hp:7600,d:open?0.26:0.04,g:0.16*v});},
  bass(t,n,dur){
    const o=osc('sawtooth',midi(n),t),f=actx.createBiquadFilter(),g=actx.createGain();
    f.type='lowpass';f.Q.value=6;
    f.frequency.setValueAtTime(950,t);
    f.frequency.exponentialRampToValueAtTime(230,t+0.16);
    g.gain.setValueAtTime(0.0001,t);
    g.gain.linearRampToValueAtTime(0.3,t+0.006);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(f);f.connect(g);g.connect(audio.sc);
    o.start(t);o.stop(t+dur+0.05);
  },
  arp(t,n,v){
    const o=osc('square',midi(n),t),f=actx.createBiquadFilter(),g=gEnv(t,0.004,v,0.19);
    f.type='lowpass';f.frequency.value=2500;
    o.connect(f);f.connect(g);g.connect(audio.sc);
    const send=actx.createGain();send.gain.value=0.5;g.connect(send);send.connect(audio.delaySend);
    o.start(t);o.stop(t+0.3);
  },
  stab(t,notes){
    const f=actx.createBiquadFilter();f.type='lowpass';f.frequency.value=1700;
    const g=gEnv(t,0.005,0.14,0.3);
    f.connect(g);g.connect(audio.sc);
    const send=actx.createGain();send.gain.value=0.4;g.connect(send);send.connect(audio.delaySend);
    notes.forEach(function(n,i){
      const o=osc('sawtooth',midi(n),t);o.detune.value=i%2?7:-7;
      o.connect(f);o.start(t);o.stop(t+0.4);
    });
  },
  pad(t,notes,dur){
    const f=actx.createBiquadFilter();f.type='lowpass';f.frequency.value=780;
    const g=actx.createGain();
    g.gain.setValueAtTime(0.0001,t);
    g.gain.linearRampToValueAtTime(0.05,t+dur*0.3);
    g.gain.setValueAtTime(0.05,t+dur*0.75);
    g.gain.linearRampToValueAtTime(0.0001,t+dur*1.05);
    f.connect(g);g.connect(audio.sc);
    notes.forEach(function(n){
      [-7,7].forEach(function(det){
        const o=actx.createOscillator();o.type='sawtooth';o.frequency.value=midi(n);o.detune.value=det;
        o.connect(f);o.start(t);o.stop(t+dur*1.1);
      });
    });
  },
  riser(t,dur){
    const src=actx.createBufferSource();src.buffer=this.noiseBuf;src.loop=true;
    const f=actx.createBiquadFilter();f.type='bandpass';f.Q.value=1.2;
    f.frequency.setValueAtTime(320,t);
    f.frequency.exponentialRampToValueAtTime(6800,t+dur);
    const g=actx.createGain();
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(0.34,t+dur*0.97);
    g.gain.linearRampToValueAtTime(0.0001,t+dur+0.03);
    src.connect(f);f.connect(g);g.connect(audio.master);
    src.start(t);src.stop(t+dur+0.1);
  },
  crash(t){noiseHit(t,{hp:3800,d:1.5,g:0.3,a:0.004});}
};

/* ============================== audio analysis ============================== */
function freqAt(p){
  let arr=null;
  if(audio.playing&&audio.analyser)arr=audio.freq;
  else if(audio.micOn&&audio.micAnalyser)arr=audio.micFreq;
  if(arr){
    const i=Math.min(arr.length-1,Math.floor(Math.pow(p,1.5)*arr.length*0.72));
    return arr[i]/255;
  }
  return clamp(0.5+0.32*Math.sin(S.t*2.2+p*7)+0.25*Math.sin(S.t*3.7+p*13+1.7),0,1)*(0.45+0.55*beatPulse);
}
function readAudio(){
  let arr=null,an=null;
  if(audio.playing&&audio.analyser){an=audio.analyser;arr=audio.freq;}
  else if(audio.micOn&&audio.micAnalyser){an=audio.micAnalyser;arr=audio.micFreq;}
  if(an){
    an.getByteFrequencyData(arr);
    let lo=0;for(let i=1;i<=6;i++)lo+=arr[i];lo/=6*255;
    let all=0;for(let i=0;i<arr.length;i++)all+=arr[i];all/=arr.length*255;
    S.bass=lerp(S.bass,clamp(lo*1.6,0,1),0.4);
    S.level=lerp(S.level,clamp(all*2.4,0,1),0.35);
    if(audio.micOn&&!audio.playing){
      audio.micHist.push(lo);if(audio.micHist.length>43)audio.micHist.shift();
      const avg=audio.micHist.reduce(function(a,b){return a+b;},0)/audio.micHist.length;
      const now=performance.now()/1000;
      if(lo>avg*1.4&&lo>0.09&&now-audio.lastMicBeat>0.26){audio.lastMicBeat=now;onBeat();}
      S.energy=lerp(S.energy,clamp(all*4,0.3,1),0.1);
    }else if(audio.playing){
      S.energy=lerp(S.energy,audio.energy,0.12);
    }
  }else{
    S.bass=lerp(S.bass,0.28+0.14*Math.sin(S.t*2),0.05);
    S.level=lerp(S.level,0.3,0.05);
    S.energy=lerp(S.energy,0.72,0.03);
  }
}

/* ============================== beats ============================== */
let lastVirtualBeat=0;
function onBeat(){
  beatPulse=1;S.beatCount++;
  beamSnap();
  if(autopilot)autopilotBeat();
  if(S.beatCount%8===0&&S.energy>0.85&&Math.random()<0.55)spawnFirework();
  if(S.beatCount%16===8&&S.energy>0.6&&Math.random()<0.3)spawnFirework();
}
function consumeBeats(now){
  if(audio.playing&&actx){
    const ct=actx.currentTime;let n=0;
    while(Music.beatQ.length&&Music.beatQ[0]<=ct){Music.beatQ.shift();onBeat();if(++n>4){Music.beatQ.length=0;break;}}
    while(Music.dropQ.length&&Music.dropQ[0]<=ct){
      Music.dropQ.shift();
      spawnFirework();spawnFirework();spawnFirework();
      flashA=0.4;dropShake=0.6;showBanner('🔥 DROP 🔥');
    }
  }else{
    const bl=60/Music.bpm;
    if(now-lastVirtualBeat>=bl){lastVirtualBeat=now;onBeat();}
  }
}
function autopilotBeat(){
  if(S.beatCount%16===0)selectPattern((S.pattern+1+Math.floor(rand(0,3)))%PATTERNS.length,true);
  if(S.beatCount%32===16)selectPalette((palIdx+1+Math.floor(rand(0,2)))%PALETTES.length,true);
}

/* ============================== patterns ============================== */
const PATTERNS=[
 {name:'WAVE',icon:'🌈',fn:function(x,y){
    const p=x/S.cols;
    const h=(p*360+S.t*36*S.speed+Math.sin(y*0.6+S.t*1.3)*28+720)%360;
    const b=0.42+0.55*(0.5+0.5*Math.sin(S.t*2.2*S.speed+p*6.8+y*0.45));
    return [h,100,58,b*(0.65+0.5*S.beat)];
 }},
 {name:'CHASE',icon:'🚥',fn:function(x,y){
    const k=Math.floor(S.t*7*S.speed);
    const v=(((x+(y%2?-k:k))%6)+6)%6;
    const on=v<2;
    const c=samplePal(x/S.cols*0.8+S.t*0.05+y*0.03);
    return [c[0],c[1],c[2],on?(0.72+0.35*S.beat):0.06];
 }},
 {name:'PULSE',icon:'💓',fn:function(x,y){
    const dx=x-S.cols/2+0.5,dy=(y-S.rows/2+0.5)*1.4;
    const r=Math.sqrt(dx*dx+dy*dy)/(S.cols*0.5);
    const w=0.5+0.5*Math.sin(S.t*3*S.speed-r*9);
    const c=samplePal(r*0.9-S.t*0.08);
    return [c[0],c[1],c[2],(0.1+0.9*w)*(0.5+0.65*S.beat)];
 }},
 {name:'STROBE',icon:'⚡',fn:function(x,y){
    let on;
    if(audio.playing)on=S.beat>0.45;
    else on=Math.floor(S.t*8*S.speed)%2===0;
    if(S.beatCount%8>=4){const c=samplePal(0.4);return [c[0],c[1],c[2]+30,on?1:0.03];}
    return [0,0,96,on?1:0.03];
 }},
 {name:'SPARKLE',icon:'✨',fn:function(x,y){
    const s=hash(x*3.1+11,y*7.7+3);
    const tw=Math.sin(S.t*(1.5+s*3.5)*S.speed+s*40);
    let b=tw>0.55?Math.pow((tw-0.55)/0.45,2):0.05;
    const fl=fract(s*7+S.t*0.25*S.speed)<0.03?1:0;
    b=Math.max(b,fl);
    const c=samplePal(s+S.t*0.02);
    return [c[0],c[1],c[2],b];
 }},
 {name:'FIRE',icon:'🔥',fn:function(x,y){
    const n=vnoise(x*0.42,y*0.55-S.t*2.6*S.speed)*0.65+vnoise(x*0.9+31,y*1.3-S.t*4.2*S.speed)*0.35;
    const gr=1-y/(S.rows-1);
    const heat=clamp(n*1.35*gr*1.15+gr*0.15-0.12,0,1);
    const c=samplePal(heat*0.85);
    return [c[0],c[1],c[2],Math.pow(heat,1.35)];
 }},
 {name:'RIPPLE',icon:'🌀',fn:function(x,y){
    const cx=S.cols/2-0.5,cy=S.rows/2-0.5;
    const d=Math.hypot(x-cx,(y-cy)*1.5);
    let b=0.06;
    for(let k=0;k<3;k++){
      const R=fract(S.t*0.35*S.speed+k/3)*(S.cols*0.75);
      const dd=Math.abs(d-R);
      b+=Math.exp(-dd*dd*0.55)*(1-R/(S.cols*0.85));
    }
    const c=samplePal(d*0.06-S.t*0.1);
    return [c[0],c[1],c[2],clamp(b,0,1)*(0.6+0.5*S.beat)];
 }},
 {name:'RAIN',icon:'🌧️',fn:function(x,y){
    const sp=0.25+hash(x,1)*0.75;
    const head=fract(S.t*sp*0.5*S.speed+hash(x,2))*(S.rows+7)-3;
    const d=head-y;
    let b=d>=0&&d<5?(1-d/5)*0.85:0.045;
    if(d>=0&&d<1)b=1;
    const c=samplePal(hash(x,3)*0.4+S.t*0.03);
    return [c[0],c[1],c[2],b];
 }},
 {name:'EQ',icon:'📊',fn:function(x,y){
    const f=freqAt(x/(S.cols-1));
    const lvl=Math.max(0.6,f*(S.rows-1));
    const yy=S.rows-1-y;
    let b;
    if(yy<lvl)b=0.3+0.65*(yy/Math.max(1,lvl));
    else b=Math.abs(yy-lvl)<0.9?1:0.04;
    const c=samplePal(yy/S.rows*0.7+0.08+S.t*0.02);
    return [c[0],c[1],c[2],b];
 }},
 {name:'CHECKER',icon:'🏁',fn:function(x,y){
    const q=((x>>1)+(y>>1)+Math.floor(S.t*1.6*S.speed)+(audio.playing?S.beatCount:0))%2;
    const c=samplePal(q?0.15:0.65);
    return [c[0],c[1],c[2],q?(0.7+0.35*S.beat):0.1];
 }}
];

/* ============================== beams ============================== */
function beamSnap(){
  for(let i=0;i<beamFx.length;i++){
    if(i%2===S.beatCount%2)beamFx[i].target=beamFx[i].base+rand(-0.55,0.55);
  }
}
function drawBeams(dt){
  if(dim<0.05)return;
  ctx.globalCompositeOperation='lighter';
  const L=H*1.15;
  for(let i=0;i<beamFx.length;i++){
    const b=beamFx[i];
    b.cur=lerp(b.cur,b.target+Math.sin(S.t*b.w+b.ph)*0.16,1-Math.exp(-dt*3.2));
    const c=samplePal(S.t*0.03+b.hueT);
    const a=(0.10+0.20*S.level)*(0.55+0.65*beatPulse)*S.intensity*dim;
    if(a<0.012)continue;
    ctx.save();
    ctx.translate(b.x,6);ctx.rotate(b.cur);
    let g=ctx.createLinearGradient(0,0,0,L);
    g.addColorStop(0,'hsla('+c[0]+','+c[1]+'%,'+(c[2]+8)+'%,'+a+')');
    g.addColorStop(1,'hsla('+c[0]+','+c[1]+'%,'+c[2]+'%,0)');
    ctx.fillStyle=g;
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(-L*0.085,L);ctx.lineTo(L*0.085,L);ctx.closePath();ctx.fill();
    ctx.globalAlpha=0.5;
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(-L*0.15,L);ctx.lineTo(L*0.15,L);ctx.closePath();ctx.fill();
    ctx.globalAlpha=1;ctx.restore();
    // fixture head
    ctx.globalCompositeOperation='source-over';
    ctx.fillStyle='#0b0a14';
    roundRect(ctx,b.x-13,-4,26,15,4);ctx.fill();
    ctx.globalCompositeOperation='lighter';
    const ls=22+beatPulse*20;
    ctx.globalAlpha=0.7*dim;
    ctx.drawImage(glow(c[0],c[1],c[2]),b.x-ls/2,8-ls/2,ls,ls);
    ctx.globalAlpha=1;
  }
  ctx.globalCompositeOperation='source-over';
}

/* ============================== particles ============================== */
function spawnFirework(tx,ty){
  rockets.push({x:tx!==undefined?tx:rand(W*0.15,W*0.85),y:H+10,
    vy:-(H*0.011+rand(0,2.5)),ty:ty!==undefined?ty:rand(H*0.14,H*0.45),pt:rand(1)});
}
function explode(x,y,pt){
  const c1=samplePal(pt+S.t*0.05),c2=samplePal(pt+0.35);
  const n=90;
  for(let i=0;i<n;i++){
    const ang=rand(TAU),sp=Math.pow(Math.random(),0.6)*rand(4,7.5);
    const cc=Math.random()<0.5?c1:c2;
    sparks.push({x:x,y:y,vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp,
      life:1,dec:rand(0.008,0.02),h:cc[0],s:cc[1],l:cc[2],sz:rand(14,30)});
  }
  if(sparks.length>520)sparks.splice(0,sparks.length-520);
}
function updateParticles(dt){
  const k=dt*60;
  for(let i=motes.length-1;i>=0;i--){
    const m=motes[i];
    m.x+=m.vx*dt;m.y+=m.vy*dt;
    if(m.y<-10){m.y=H+10;m.x=rand(W);}
    if(m.x<-10)m.x=W+10;if(m.x>W+10)m.x=-10;
  }
  for(let i=rockets.length-1;i>=0;i--){
    const r=rockets[i];
    r.y+=r.vy*k;r.vy*=Math.pow(0.995,k);
    sparks.push({x:r.x+rand(-1,1),y:r.y+rand(0,4),vx:rand(-0.4,0.4),vy:rand(0.5,1.5),
      life:0.6,dec:0.06,h:45,s:90,l:75,sz:9});
    if(r.y<=r.ty){explode(r.x,r.y,r.pt);rockets.splice(i,1);}
  }
  for(let i=sparks.length-1;i>=0;i--){
    const s=sparks[i];
    s.vx*=Math.pow(0.985,k);s.vy*=Math.pow(0.985,k);s.vy+=0.045*k;
    s.x+=s.vx*k;s.y+=s.vy*k;s.life-=s.dec*k;
    if(s.life<=0)sparks.splice(i,1);
  }
}
function drawParticles(){
  ctx.globalCompositeOperation='lighter';
  for(let i=0;i<motes.length;i++){
    const m=motes[i];
    const tw=0.25+0.35*(0.5+0.5*Math.sin(S.t*1.4+m.p));
    ctx.globalAlpha=tw*dim;
    const sz=m.s*3;
    ctx.drawImage(glow(200,60,85),m.x-sz/2,m.y-sz/2,sz,sz);
  }
  for(let i=0;i<sparks.length;i++){
    const s=sparks[i];
    ctx.globalAlpha=clamp(s.life,0,1)*dim;
    const sz=s.sz*(0.4+s.life*0.8);
    ctx.drawImage(glow(s.h,s.s,s.l),s.x-sz/2,s.y-sz/2,sz,sz);
  }
  ctx.globalAlpha=1;
  ctx.globalCompositeOperation='source-over';
}

/* ============================== scene drawing ============================== */
function drawStrings(){
  for(let i=0;i<strands.length;i++){
    const st=strands[i];
    ctx.strokeStyle='rgba(255,255,255,0.10)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(st.pts[0][0],st.pts[0][1]);
    for(let k=1;k<st.pts.length;k++)ctx.lineTo(st.pts[k][0],st.pts[k][1]);
    ctx.stroke();
    ctx.globalCompositeOperation='lighter';
    for(let k=0;k<st.bulbs.length;k++){
      const b=st.bulbs[k];
      const tw=0.3+0.7*(0.5+0.5*Math.sin(S.t*(1+b[2]*2)+b[2]*40));
      ctx.globalAlpha=tw*0.8*dim;
      const sz=9+tw*9;
      ctx.drawImage(glow(45,90,72),b[0]-sz/2,b[1]-sz/2,sz,sz);
    }
    ctx.globalAlpha=1;
    ctx.globalCompositeOperation='source-over';
  }
}
function drawSpeakers(){
  const gapNeed=64;
  const lx=grid.x-gapNeed*0.72,rx=grid.x+grid.w+gapNeed*0.72;
  if(grid.x<gapNeed)return;
  const sy=grid.y+grid.h*0.08,sh=grid.h*0.84;
  const pump=1+S.bass*0.22*(0.4+beatPulse);
  [lx,rx].forEach(function(cx){
    ctx.fillStyle='rgba(10,10,18,0.92)';
    roundRect(ctx,cx-27,sy,54,sh,10);ctx.fill();
    ctx.strokeStyle='rgba(140,150,220,0.16)';ctx.lineWidth=1;ctx.stroke();
    for(let i=0;i<3;i++){
      const cy=sy+sh*(0.2+i*0.3),rr=16*pump;
      ctx.strokeStyle='rgba(170,180,255,0.28)';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(cx,cy,rr,0,TAU);ctx.stroke();
      ctx.strokeStyle='rgba(170,180,255,0.14)';ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(cx,cy,rr*0.62,0,TAU);ctx.stroke();
      ctx.globalCompositeOperation='lighter';
      const c=samplePal(0.2+S.t*0.04);
      ctx.globalAlpha=(0.12+S.bass*0.5)*dim;
      const gs=rr*2.4;
      ctx.drawImage(glow(c[0],c[1],c[2]),cx-gs/2,cy-gs/2,gs,gs);
      ctx.globalAlpha=1;
      ctx.globalCompositeOperation='source-over';
    }
  });
}
function drawWall(){
  const g=grid,pad=g.gap*0.85;
  // housing
  ctx.fillStyle='rgba(7,7,15,0.92)';
  roundRect(ctx,g.x-pad,g.y-pad,g.w+pad*2,g.h+pad*2,14);ctx.fill();
  ctx.strokeStyle='rgba(130,140,220,0.18)';ctx.lineWidth=1.5;ctx.stroke();
  // truss legs
  ctx.fillStyle='rgba(20,20,32,0.9)';
  ctx.fillRect(g.x-pad+6,g.y+g.h+pad,10,H*0.2);
  ctx.fillRect(g.x+g.w+pad-16,g.y+g.h+pad,10,H*0.2);

  const fn=PATTERNS[S.pattern].fn;
  const pump=0.82+0.4*S.bass;
  const glowM=S.intensity*pump*(0.62+0.5*S.energy)*dim;
  const strobePhase=Math.floor(S.t*16)%2===0;
  S.forceWhite=holdFlash||(holdStrobe&&strobePhase);

  ctx.globalCompositeOperation='lighter';
  for(let y=0;y<g.rows;y++){
    for(let x=0;x<g.cols;x++){
      const cx=g.x+x*g.gap,cy=g.y+y*g.gap;
      let r;
      if(S.forceWhite)r=[0,0,100,1];
      else if(holdStrobe)r=[0,0,100,0.04];
      else r=fn(x,y);
      let b=clamp(r[3]*glowM,0,1.3);
      // mouse spotlight boost
      const mdx=cx-mouse.x,mdy=cy-mouse.y;
      const md=Math.sqrt(mdx*mdx+mdy*mdy);
      if(md<130)b=clamp(b+(1-md/130)*0.55*dim,0,1.3);
      if(b>0.025){
        const sz=g.gap*(2.0+b*3.2);
        ctx.globalAlpha=Math.min(1,b);
        ctx.drawImage(glow(r[0],r[1],r[2]),cx-sz/2,cy-sz/2,sz,sz);
        ctx.globalAlpha=Math.min(1,b*1.35);
        ctx.fillStyle='hsl('+Math.round(r[0])+','+Math.round(r[1])+'%,'+Math.min(96,Math.round(r[2])+32)+'%)';
        ctx.beginPath();ctx.arc(cx,cy,g.r*(0.4+Math.min(b,1)*0.62),0,TAU);ctx.fill();
      }else{
        ctx.globalAlpha=1;
        ctx.fillStyle='rgba(255,255,255,0.05)';
        ctx.beginPath();ctx.arc(cx,cy,g.r*0.32,0,TAU);ctx.fill();
      }
    }
  }
  ctx.globalAlpha=1;
  ctx.globalCompositeOperation='source-over';
}
function drawFloor(){
  const fy=grid.y+grid.h+grid.gap*0.85;
  const c=samplePal(S.t*0.05);
  const a=(0.10+0.22*beatPulse)*(0.5+S.level)*S.intensity*dim;
  const lg=ctx.createLinearGradient(0,fy,0,H);
  lg.addColorStop(0,'hsla('+c[0]+','+c[1]+'%,'+c[2]+'%,'+clamp(a,0,0.5)+')');
  lg.addColorStop(1,'hsla('+c[0]+','+c[1]+'%,'+c[2]+'%,0)');
  ctx.fillStyle=lg;ctx.fillRect(0,fy,W,H-fy);
  ctx.globalCompositeOperation='lighter';
  const hl=ctx.createLinearGradient(grid.x-grid.gap*2,0,grid.x+grid.w+grid.gap*2,0);
  hl.addColorStop(0,'hsla('+c[0]+','+c[1]+'%,70%,0)');
  hl.addColorStop(0.5,'hsla('+c[0]+','+c[1]+'%,75%,'+clamp(a*0.9,0,0.6)+')');
  hl.addColorStop(1,'hsla('+c[0]+','+c[1]+'%,70%,0)');
  ctx.fillStyle=hl;ctx.fillRect(grid.x-grid.gap*2,fy-1,grid.w+grid.gap*4,2);
  ctx.globalCompositeOperation='source-over';
}

/* ============================== main loop ============================== */
let lastT=performance.now()/1000;
const spc=document.getElementById('spectrum'),spg=spc.getContext('2d');
const beatDot=document.getElementById('beatDot');
const titleH1=document.querySelector('#brand h1');
let lastGlowB=-1;

function frame(){
  const now=performance.now()/1000;
  let dt=Math.min(0.05,now-lastT);lastT=now;
  S.t+=dt;
  consumeBeats(now);
  readAudio();
  beatPulse=Math.max(0,beatPulse-dt*(Music.bpm/60)*1.05);
  S.beat=beatPulse;
  dim=lerp(dim,holdBlack?0:1,1-Math.exp(-dt*18));
  flashA=Math.max(0,flashA-dt*2.4);
  dropShake=Math.max(0,dropShake-dt*1.4);

  /* ---- draw ---- */
  ctx.drawImage(bgCvs,0,0,W,H);
  ctx.save();
  const punch=1+beatPulse*0.011*S.energy;
  const shx=dropShake>0?rand(-1,1)*dropShake*7:0;
  const shy=dropShake>0?rand(-1,1)*dropShake*7:0;
  ctx.translate(W/2+shx,H/2+shy);ctx.scale(punch,punch);ctx.translate(-W/2,-H/2);
  drawFloor();
  drawStrings();
  drawSpeakers();
  drawWall();
  drawBeams(dt);
  updateParticles(dt);
  drawParticles();
  ctx.restore();

  if(holdStrobe&&S.forceWhite){ctx.fillStyle='rgba(255,255,255,0.10)';ctx.fillRect(0,0,W,H);}
  if(holdFlash){ctx.fillStyle='rgba(255,255,255,0.14)';ctx.fillRect(0,0,W,H);}
  if(flashA>0){ctx.fillStyle='rgba(255,255,255,'+flashA+')';ctx.fillRect(0,0,W,H);}
  if(dim<0.999){ctx.fillStyle='rgba(0,0,0,'+((1-dim)*0.97)+')';ctx.fillRect(0,0,W,H);}

  /* ---- deck extras ---- */
  drawSpectrum();
  const bp=beatPulse;
  beatDot.style.transform='scale('+(1+bp*0.6)+')';
  beatDot.style.boxShadow='0 0 '+(6+bp*18)+'px var(--pink)';
  if(Math.abs(bp-lastGlowB)>0.06){
    lastGlowB=bp;
    titleH1.style.filter='drop-shadow(0 0 '+(8+bp*16)+'px rgba(255,46,166,'+(0.35+bp*0.5)+'))';
  }
  requestAnimationFrame(frame);
}
function drawSpectrum(){
  const w=spc.width,h=spc.height;
  spg.clearRect(0,0,w,h);
  const n=26,bw=w/n;
  const grad=spg.createLinearGradient(0,0,w,0);
  grad.addColorStop(0,'#ff2ea6');grad.addColorStop(0.5,'#9b30ff');grad.addColorStop(1,'#22e6ff');
  spg.fillStyle=grad;
  for(let i=0;i<n;i++){
    const v=freqAt(i/(n-1));
    const bh=Math.max(3,v*h*0.94);
    roundRect(spg,i*bw+1.5,h-bh,bw-3,bh,2);spg.fill();
  }
}

/* ============================== UI ============================== */
const bannerEl=document.getElementById('banner');
const toastEl=document.getElementById('toast');
let toastTimer=null;
function showBanner(txt){
  bannerEl.textContent=txt;
  bannerEl.classList.remove('show');
  void bannerEl.offsetWidth;
  bannerEl.classList.add('show');
}
function toast(msg){
  toastEl.textContent=msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){toastEl.classList.remove('show');},2200);
}

const patWrap=document.getElementById('patterns');
PATTERNS.forEach(function(p,i){
  const b=document.createElement('button');
  b.className='pat';b.innerHTML='<span class="ic">'+p.icon+'</span><span class="nm">'+p.name+'</span>';
  b.addEventListener('click',function(){selectPattern(i);});
  patWrap.appendChild(b);
});
function selectPattern(i,quiet){
  S.pattern=i;
  const kids=patWrap.children;
  for(let k=0;k<kids.length;k++)kids[k].classList.toggle('active',k===i);
  showBanner(PATTERNS[i].icon+' '+PATTERNS[i].name);
  if(!quiet&&autopilot){/* manual override still allowed */}
}

const palWrap=document.getElementById('palettes');
PALETTES.forEach(function(p,i){
  const b=document.createElement('button');
  b.className='pal';b.title=p.name;
  const g='linear-gradient(135deg,hsl('+p.c[0][0]+','+p.c[0][1]+'%,'+p.c[0][2]+'%),hsl('+p.c[2][0]+','+p.c[2][1]+'%,'+p.c[2][2]+'%),hsl('+p.c[4][0]+','+p.c[4][1]+'%,'+p.c[4][2]+'%))';
  b.style.background=g;
  b.addEventListener('click',function(){selectPalette(i);});
  palWrap.appendChild(b);
});
function selectPalette(i,quiet){
  palIdx=i;
  const kids=palWrap.children;
  for(let k=0;k<kids.length;k++)kids[k].classList.toggle('active',k===i);
  if(!quiet)toast('PALETTE · '+PALETTES[i].name.toUpperCase());
}

const speedSlider=document.getElementById('speed'),speedV=document.getElementById('speedV');
speedSlider.addEventListener('input',function(){
  S.speed=speedSlider.value/100;
  speedV.textContent=S.speed.toFixed(1)+'×';
});
const glowSlider=document.getElementById('glow'),glowV=document.getElementById('glowV');
glowSlider.addEventListener('input',function(){
  S.intensity=glowSlider.value/100;
  glowV.textContent=glowSlider.value+'%';
});
const bpmSlider=document.getElementById('bpm'),bpmV=document.getElementById('bpmV');
bpmSlider.addEventListener('input',function(){
  Music.bpm=+bpmSlider.value;bpmV.textContent=bpmSlider.value;
  if(actx&&audio.delay)audio.delay.delayTime.setTargetAtTime((60/Music.bpm)*0.75,actx.currentTime,0.1);
});
const volSlider=document.getElementById('vol'),volV=document.getElementById('volV');
volSlider.addEventListener('input',function(){
  volV.textContent=volSlider.value;
  if(actx)audio.master.gain.setTargetAtTime(volSlider.value/100*0.9,actx.currentTime,0.05);
});

const playBtn=document.getElementById('playBtn');
const statusEl=document.getElementById('status');
const beatLbl=document.getElementById('beatLbl');
function updatePlayUI(){
  playBtn.classList.toggle('playing',audio.playing);
  playBtn.classList.remove('attn');
  playBtn.textContent=audio.playing?'❚❚':'▶';
  if(audio.playing){statusEl.textContent='● MUSIC LIVE';statusEl.classList.add('on');beatLbl.textContent='BEAT SYNC';}
  else if(audio.micOn){statusEl.textContent='● MIC LIVE';statusEl.classList.add('on');beatLbl.textContent='MIC SYNC';}
  else{statusEl.textContent='STANDBY';statusEl.classList.remove('on');beatLbl.textContent='SYNC READY';}
}
playBtn.addEventListener('click',function(){
  if(audio.playing){Music.stop();toast('MUSIC STOPPED');}
  else Music.start();
});

const micBtn=document.getElementById('micBtn');
micBtn.addEventListener('click',async function(){
  if(audio.micOn){
    if(audio.micStream)audio.micStream.getTracks().forEach(function(tr){tr.stop();});
    audio.micOn=false;audio.micAnalyser=null;audio.micStream=null;
    micBtn.classList.remove('on');updatePlayUI();toast('MIC SYNC OFF');
    return;
  }
  try{
    ensureAudio();
    if(!actx)throw 0;
    const stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false}});
    audio.micStream=stream;
    const src=actx.createMediaStreamSource(stream);
    audio.micAnalyser=actx.createAnalyser();
    audio.micAnalyser.fftSize=256;audio.micAnalyser.smoothingTimeConstant=0.6;
    src.connect(audio.micAnalyser);
    audio.micFreq=new Uint8Array(audio.micAnalyser.frequencyBinCount);
    audio.micHist.length=0;
    audio.micOn=true;
    micBtn.classList.add('on');updatePlayUI();
    toast('MIC SYNC ON — PLAY SOME MUSIC!');
  }catch(e){
    toast('MICROPHONE UNAVAILABLE');
  }
});

const autoBtn=document.getElementById('autoBtn');
autoBtn.addEventListener('click',function(){
  autopilot=!autopilot;
  autoBtn.classList.toggle('on',autopilot);
  autoBtn.textContent=autopilot?'◉ AUTOPILOT':'○ AUTOPILOT';
  toast(autopilot?'AUTOPILOT ON':'AUTOPILOT OFF');
});

/* hold FX buttons */
function bindHold(el,set){
  const on=function(e){e.preventDefault();set(true);el.classList.add('holding');};
  const off=function(){set(false);el.classList.remove('holding');};
  el.addEventListener('pointerdown',on);
  el.addEventListener('pointerup',off);
  el.addEventListener('pointerleave',off);
  el.addEventListener('pointercancel',off);
  el.addEventListener('contextmenu',function(e){e.preventDefault();});
}
bindHold(document.getElementById('fxStrobe'),function(v){holdStrobe=v;});
bindHold(document.getElementById('fxFlash'),function(v){holdFlash=v;});
bindHold(document.getElementById('fxBlack'),function(v){holdBlack=v;});

/* deck collapse */
const deck=document.getElementById('deck');
document.getElementById('grip').addEventListener('click',function(){deck.classList.toggle('collapsed');});

/* pointer interaction */
cvs.addEventListener('pointermove',function(e){mouse.x=e.clientX;mouse.y=e.clientY;});
cvs.addEventListener('pointerleave',function(){mouse.x=-9999;mouse.y=-9999;});
cvs.addEventListener('pointerdown',function(e){
  spawnFirework(e.clientX,Math.max(80,e.clientY));
  ensureAudio(); /* unlock audio contexts on gesture */
});

/* keyboard */
window.addEventListener('keydown',function(e){
  if(e.repeat)return;
  const k=e.key;
  if(k===' '){e.preventDefault();playBtn.click();}
  else if(k==='ArrowRight')selectPattern((S.pattern+1)%PATTERNS.length);
  else if(k==='ArrowLeft')selectPattern((S.pattern+PATTERNS.length-1)%PATTERNS.length);
  else if(k==='ArrowUp'){e.preventDefault();selectPalette((palIdx+1)%PALETTES.length);}
  else if(k==='ArrowDown'){e.preventDefault();selectPalette((palIdx+PALETTES.length-1)%PALETTES.length);}
  else if(k==='a'||k==='A')autoBtn.click();
  else if(k==='h'||k==='H')deck.classList.toggle('collapsed');
  else if(k>='1'&&k<='9'){const i=+k-1;if(i<PATTERNS.length)selectPattern(i);}
  else if(k==='0'){if(PATTERNS.length>=10)selectPattern(9);}
  else if(k==='s'||k==='S'){holdStrobe=true;document.getElementById('fxStrobe').classList.add('holding');}
  else if(k==='f'||k==='F'){holdFlash=true;document.getElementById('fxFlash').classList.add('holding');}
  else if(k==='b'||k==='B'){holdBlack=true;document.getElementById('fxBlack').classList.add('holding');}
});
window.addEventListener('keyup',function(e){
  const k=e.key;
  if(k==='s'||k==='S'){holdStrobe=false;document.getElementById('fxStrobe').classList.remove('holding');}
  if(k==='f'||k==='F'){holdFlash=false;document.getElementById('fxFlash').classList.remove('holding');}
  if(k==='b'||k==='B'){holdBlack=false;document.getElementById('fxBlack').classList.remove('holding');}
});

/* ============================== init ============================== */
resize();
selectPattern(0,true);
selectPalette(0,true);
lastVirtualBeat=performance.now()/1000;
requestAnimationFrame(frame);
setTimeout(function(){showBanner('🎪 FESTIVAL LIGHTS');},400);
setTimeout(function(){if(!audio.playing)toast('PRESS ▶ FOR SYNCED MUSIC');},2600);
})();
</script>
