<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fun Game!</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%A4%AA%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden;background:#79c5f2;
    font-family:'Fredoka','Comic Sans MS','Chalkboard SE',cursive,sans-serif;
    -webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent}
  #game-container{position:fixed;inset:0;touch-action:none;overflow:hidden}
  canvas{display:block;width:100%;height:100%}
  .hidden{display:none!important}

  /* ---------- HUD ---------- */
  #hud{position:absolute;top:12px;left:0;right:0;display:flex;justify-content:center;z-index:15;pointer-events:none}
  #score{font-size:clamp(34px,6vw,56px);font-weight:700;color:#fff;min-width:220px;text-align:center;
    text-shadow:-3px -3px 0 #2e2a33,3px -3px 0 #2e2a33,-3px 3px 0 #2e2a33,3px 3px 0 #2e2a33,0 8px 0 rgba(46,42,51,.28)}
  #score.pop{animation:scorepop .45s cubic-bezier(.2,1.8,.4,1)}
  @keyframes scorepop{40%{transform:scale(1.4) rotate(-4deg)}}
  #highScore{position:absolute;right:18px;top:16px;font-size:clamp(15px,2.4vw,22px);font-weight:700;color:#fff;
    text-shadow:-2px -2px 0 #2e2a33,2px -2px 0 #2e2a33,-2px 2px 0 #2e2a33,2px 2px 0 #2e2a33,0 4px 0 rgba(46,42,51,.25)}
  #muteBtn{position:absolute;left:14px;top:14px;z-index:40;width:54px;height:54px;border-radius:50%;
    border:4px solid #2e2a33;background:#fffdf5;font-size:23px;cursor:pointer;box-shadow:0 4px 0 #2e2a33;
    display:flex;align-items:center;justify-content:center;transition:transform .08s,box-shadow .08s}
  #muteBtn:active{transform:translateY(3px);box-shadow:0 1px 0 #2e2a33}
  #hint{position:absolute;bottom:17%;left:0;right:0;text-align:center;color:#fff;font-weight:700;
    font-size:clamp(16px,3vw,25px);letter-spacing:1px;pointer-events:none;z-index:14;
    text-shadow:-2px -2px 0 #2e2a33,2px -2px 0 #2e2a33,-2px 2px 0 #2e2a33,2px 2px 0 #2e2a33;
    animation:hintpulse 1.1s ease-in-out infinite;transition:opacity .5s}
  #hint.fade{opacity:0}
  @keyframes hintpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}

  /* ---------- Panels ---------- */
  .panel{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:25;padding:12px}
  #gameOverPanel{background:rgba(28,18,64,.35);backdrop-filter:blur(2px)}
  .panel-card{background:linear-gradient(#fffdf7,#ffefc9);border:6px solid #2e2a33;border-radius:34px;
    box-shadow:0 12px 0 rgba(46,42,51,.28),0 30px 60px rgba(0,0,0,.28);
    padding:clamp(18px,4vw,34px) clamp(22px,5vw,48px);text-align:center;max-width:min(94vw,540px);
    animation:pop .5s cubic-bezier(.2,1.6,.4,1)}
  @keyframes pop{0%{transform:scale(.35) rotate(-4deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}
  .title{font-weight:700;letter-spacing:2px;line-height:1;margin-bottom:6px;white-space:nowrap}
  .title span{display:inline-block;font-size:clamp(38px,7.4vw,72px);color:var(--c,#fff);
    text-shadow:-3px -3px 0 #2e2a33,3px -3px 0 #2e2a33,-3px 3px 0 #2e2a33,3px 3px 0 #2e2a33,0 8px 0 rgba(46,42,51,.30);
    animation:bounce 1.7s ease-in-out infinite;animation-delay:calc(var(--i)*.09s)}
  @keyframes bounce{0%,100%{transform:translateY(0) rotate(-2.5deg)}50%{transform:translateY(-15px) rotate(2.5deg)}}
  .go-title{font-size:clamp(36px,7.5vw,64px);color:#ff5d5d;
    text-shadow:-3px -3px 0 #2e2a33,3px -3px 0 #2e2a33,-3px 3px 0 #2e2a33,3px 3px 0 #2e2a33,0 8px 0 rgba(46,42,51,.30)}
  .tagline{font-size:clamp(15px,2.6vw,21px);color:#6b5d4f;margin:8px 0 12px;font-weight:600;min-height:1.4em}
  .emoji-row{font-size:clamp(20px,4vw,30px);letter-spacing:8px;margin-bottom:12px;animation:hintpulse 2.2s ease-in-out infinite}
  .best-line{font-size:clamp(16px,2.6vw,20px);font-weight:700;color:#8a6d3b;background:#ffe9a8;
    border:3px solid #e0b84f;border-radius:999px;display:inline-block;padding:6px 20px;margin-bottom:16px}
  .btn{font-family:inherit;font-weight:700;font-size:clamp(20px,3.2vw,27px);color:#fff;border:4px solid #2e2a33;
    border-radius:999px;padding:13px 42px;cursor:pointer;letter-spacing:1px;
    transition:transform .08s,box-shadow .08s;box-shadow:0 7px 0 #2e2a33;margin:6px}
  .btn:hover{transform:translateY(-2px) scale(1.04)}
  .btn:active{transform:translateY(5px);box-shadow:0 2px 0 #2e2a33}
  .btn-play{background:linear-gradient(#5ce37e,#2fbb55)}
  .btn-retry{background:linear-gradient(#ffb84d,#ff8a3d)}
  .btn-menu{background:linear-gradient(#6ec6ff,#3d8bff);font-size:clamp(15px,2.4vw,19px);padding:10px 28px}
  .controls{margin-top:12px;color:#8a7a68;font-weight:600;font-size:clamp(11px,2vw,14px)}
  .badge{display:inline-block;background:linear-gradient(#ffe45c,#ffb52e);border:4px solid #2e2a33;color:#7a3b00;
    font-weight:700;padding:8px 22px;border-radius:999px;font-size:clamp(16px,3vw,21px);margin:2px 0 8px;
    animation:wiggle .7s ease-in-out infinite}
  @keyframes wiggle{0%,100%{transform:rotate(-4deg) scale(1)}50%{transform:rotate(4deg) scale(1.09)}}
  .score-row{display:flex;gap:34px;justify-content:center;margin:6px 0 14px}
  .score-row div{display:flex;flex-direction:column;font-size:13px;font-weight:700;color:#8a7a68;letter-spacing:3px}
  .score-row b{font-size:clamp(32px,6vw,44px);color:#2e2a33;letter-spacing:0;line-height:1.1}
</style>
</head>
<body>
<div id="game-container">
  <canvas id="game"></canvas>

  <div id="hud" class="hidden">
    <div id="score">0</div>
    <div id="highScore">BEST 0</div>
  </div>
  <button id="muteBtn" title="Mute (M)">🔊</button>
  <div id="hint" class="hidden">SPACE / TAP TO JUMP</div>

  <div id="startPanel" class="panel">
    <div class="panel-card">
      <h1 class="title"><span style="--i:0;--c:#ff5d8f">F</span><span style="--i:1;--c:#ffa02e">U</span><span style="--i:2;--c:#ffd23f">N</span><span style="--i:3">&nbsp;</span><span style="--i:4;--c:#37d67a">G</span><span style="--i:5;--c:#3db6ff">A</span><span style="--i:6;--c:#b388ff">M</span><span style="--i:7;--c:#ff6b6b">E</span><span style="--i:8;--c:#ffd23f">!</span></h1>
      <p class="tagline">Jump the wacky obstacles. Survive the zoomies!</p>
      <div class="emoji-row">🌵 💨 🪨 😤 🐦</div>
      <div class="best-line">🏆 BEST: <span id="menuBest">0</span></div><br>
      <button id="playBtn" class="btn btn-play">▶&nbsp;PLAY</button>
      <p class="controls">SPACE / TAP — jump &nbsp;•&nbsp; hold = higher jump &nbsp;•&nbsp; M — mute</p>
    </div>
  </div>

  <div id="gameOverPanel" class="panel hidden">
    <div class="panel-card">
      <h1 class="title go-title">GAME OVER</h1>
      <p id="funnyMsg" class="tagline">Ouch!</p>
      <div id="newBestBadge" class="badge hidden">🎉 NEW BEST! 🎉</div>
      <div class="score-row">
        <div>SCORE<b id="finalScore">0</b></div>
        <div>BEST<b id="finalBest">0</b></div>
      </div>
      <button id="retryBtn" class="btn btn-retry">↻&nbsp;RETRY</button>
      <button id="menuBtn" class="btn btn-menu">MENU</button>
      <p class="controls">or press SPACE / R to retry</p>
    </div>
  </div>
</div>
<script>
'use strict';
/* ============================================================
   FUN GAME! — a silly little endless runner
   ============================================================ */

// ---------- DOM ----------
const container = document.getElementById('game-container');
const canvas    = document.getElementById('game');
const ctx       = canvas.getContext('2d');
const hudEl     = document.getElementById('hud');
const scoreEl   = document.getElementById('score');
const highEl    = document.getElementById('highScore');
const hintEl    = document.getElementById('hint');
const startPanel= document.getElementById('startPanel');
const overPanel = document.getElementById('gameOverPanel');
const playBtn   = document.getElementById('playBtn');
const retryBtn  = document.getElementById('retryBtn');
const menuBtn   = document.getElementById('menuBtn');
const muteBtn   = document.getElementById('muteBtn');
const menuBestEl= document.getElementById('menuBest');
const funnyMsgEl= document.getElementById('funnyMsg');
const finalScoreEl = document.getElementById('finalScore');
const finalBestEl  = document.getElementById('finalBest');
const newBestBadge = document.getElementById('newBestBadge');

// ---------- Utils ----------
const TAU = Math.PI * 2;
const rand  = (a, b) => a + Math.random() * (b - a);
const clamp = (v, a, b) => v < a ? a : v > b ? b : v;
const lerp  = (a, b, t) => a + (b - a) * t;
const mod   = (a, n) => ((a % n) + n) % n;
const smooth= t => t * t * (3 - 2 * t);
const DARK  = '#2e2a33';

function hexRgb(h){ h = h.replace('#',''); return [parseInt(h.slice(0,2),16), parseInt(h.slice(2,4),16), parseInt(h.slice(4,6),16)]; }
function lerpColor(a, b, t){
  const A = hexRgb(a), B = hexRgb(b);
  return 'rgb(' + A.map((v,i)=>Math.round(v+(B[i]-v)*t)).join(',') + ')';
}
function rr(x, y, w, h, r){           // rounded-rect path
  r = Math.min(r, w/2, h/2);
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y,   x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x,   y+h, r);
  ctx.arcTo(x,   y+h, x,   y,   r);
  ctx.arcTo(x,   y,   x+w, y,   r);
  ctx.closePath();
}
function circle(x, y, r){ ctx.beginPath(); ctx.arc(x, y, r, 0, TAU); }
function ellipse(x, y, rx, ry){ ctx.beginPath(); ctx.ellipse(x, y, rx, ry, 0, 0, TAU); }

/* ============================================================
   AUDIO — goofy synthesized SFX + bouncy chiptune loop
   ============================================================ */
let AC = null, master = null, sfxG = null, musG = null, noiseBuf = null;
let muted = false;
try { muted = localStorage.getItem('funGameMuted') === '1'; } catch(e){}

function initAudio(){
  if (AC){ if (AC.state === 'suspended') AC.resume(); return; }
  const Ctor = window.AudioContext || window.webkitAudioContext;
  if (!Ctor) return;
  AC = new Ctor();
  master = AC.createGain(); master.gain.value = muted ? 0 : 1; master.connect(AC.destination);
  sfxG = AC.createGain(); sfxG.gain.value = 0.9;  sfxG.connect(master);
  musG = AC.createGain(); musG.gain.value = 0.40; musG.connect(master);
  noiseBuf = AC.createBuffer(1, AC.sampleRate, AC.sampleRate);
  const d = noiseBuf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
}

function tone(o){
  if (!AC || muted) return;
  const t0 = AC.currentTime + (o.when || 0);
  const osc = AC.createOscillator(), g = AC.createGain();
  osc.type = o.type || 'sine';
  osc.frequency.setValueAtTime(Math.max(1, o.f), t0);
  if (o.f2) osc.frequency.exponentialRampToValueAtTime(Math.max(1, o.f2), t0 + o.t);
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.linearRampToValueAtTime(o.v || 0.2, t0 + (o.attack || 0.012));
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + o.t);
  let head = osc;
  if (o.fc){ const f = AC.createBiquadFilter(); f.type='lowpass'; f.frequency.value=o.fc; osc.connect(f); head = f; }
  head.connect(g); g.connect(o.dest || sfxG);
  osc.start(t0); osc.stop(t0 + o.t + 0.05);
}
function noise(o){
  if (!AC || muted) return;
  const t0 = AC.currentTime + (o.when || 0);
  const src = AC.createBufferSource(); src.buffer = noiseBuf;
  src.playbackRate.value = o.rate || 1;
  const f = AC.createBiquadFilter(); f.type = o.type || 'lowpass';
  f.frequency.value = o.fc || 1000; f.Q.value = o.q || 0.8;
  const g = AC.createGain();
  g.gain.setValueAtTime(o.v || 0.3, t0);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + o.t);
  src.connect(f); f.connect(g); g.connect(o.dest || sfxG);
  src.start(t0); src.stop(t0 + o.t + 0.05);
}

// --- goofy sound effects ---
function sfxJump(){
  const r = 1 + Math.random() * 0.18;
  tone({f:300*r, f2:820*r, t:0.16, type:'triangle', v:0.22});
  tone({f:520*r, f2:1150*r, t:0.12, type:'sine', v:0.10, when:0.02});
}
function sfxWhee(){
  tone({f:650, f2:1350, t:0.13, type:'sine', v:0.11});
  tone({f:1350, f2:800, t:0.15, type:'sine', v:0.09, when:0.12});
}
function sfxLand(){
  noise({t:0.09, v:0.22, fc:260});
  tone({f:115, f2:55, t:0.10, type:'sine', v:0.22});
}
function sfxBonk(){
  tone({f:190, f2:65, t:0.15, type:'square', v:0.26});
  tone({f:95,  f2:48, t:0.22, type:'sine', v:0.30, when:0.02});
  noise({t:0.12, v:0.28, fc:520});
}
function sfxSlideWhistle(){ tone({f:980, f2:160, t:0.6, type:'sine', v:0.20, when:0.06}); }
function sfxMilestone(){
  [523.25, 659.25, 783.99, 1046.5].forEach((f,i)=>tone({f, t:0.13, type:'triangle', v:0.17, when:i*0.07}));
  noise({t:0.15, v:0.05, fc:6500, type:'highpass', when:0.2});
}
function sfxClick(){ tone({f:620, f2:980, t:0.06, type:'square', v:0.11}); }
function sfxTrombone(){   // the classic "womp womp womp womppp"
  const N = [[220,0,.26],[207.65,.30,.26],[196,.60,.26],[185,.90,1.05,150]];
  N.forEach(([f,w,t,f2])=>{
    tone({f, f2, t, type:'sawtooth', v:0.15, when:w, fc:850, attack:0.03});
    tone({f:f*0.5, f2:f2?f2*0.5:0, t, type:'triangle', v:0.08, when:w, attack:0.03});
  });
}
function sfxFanfare(){
  [392,523.25,659.25,783.99].forEach((f,i)=>tone({f, t:0.11, type:'sawtooth', v:0.10, fc:2200, when:i*0.09}));
  tone({f:1046.5, t:0.4, type:'sawtooth', v:0.12, fc:2400, when:0.38});
  tone({f:1046.5, t:0.4, type:'triangle', v:0.10, when:0.38});
  noise({t:0.2, v:0.06, fc:6000, type:'highpass', when:0.38});
}

// --- music: cheerful 32-step loop ---
const SCALE = {C:0,'C#':1,D:2,'D#':3,E:4,F:5,'F#':6,G:7,'G#':8,A:9,'A#':10,B:11};
function nf(n){ const m = /^([A-G]#?)(\d)$/.exec(n); return 440 * Math.pow(2, ((SCALE[m[1]] + 12*(+m[2]+1)) - 69) / 12); }
const MEL = ['C5','E5','G5','E5','A5','G5','E5','C5',
             'F5','A5','F5','D5','G5','F5','E5','D5',
             'C5','E5','G5','E5','A5','G5','A5','C6',
             'B5','G5','D5','E5','C5', 0 ,'G4', 0 ];
const BAS = ['C3', 0 ,'G2', 0 ,'C3', 0 ,'E3', 0 ,
             'F2', 0 ,'C3', 0 ,'G2', 0 ,'B2', 0 ,
             'C3', 0 ,'G2', 0 ,'C3', 0 ,'F3', 0 ,
             'G2', 0 ,'B2', 0 ,'C3', 0 ,'G2', 0 ];
const Music = {
  playing:false, step:0, nextTime:0, bpm:140,
  start(){ if (!AC) return; this.playing = true; this.step = 0; this.nextTime = AC.currentTime + 0.08; },
  stop(){ this.playing = false; },
  tick(){
    if (!this.playing || !AC) return;
    if (this.nextTime < AC.currentTime - 0.25) this.nextTime = AC.currentTime + 0.05; // resync after tab switch
    const spb = 60 / this.bpm / 2;
    while (this.nextTime < AC.currentTime + 0.18){
      const st = this.step, when = Math.max(0, this.nextTime - AC.currentTime);
      if (MEL[st]) tone({f:nf(MEL[st]), t:0.21, type:'triangle', v:0.14, when, dest:musG});
      if (BAS[st]) tone({f:nf(BAS[st]), t:0.19, type:'square',   v:0.055, when, dest:musG, fc:520});
      if (st % 4 === 2) noise({t:0.04, v:0.028, fc:7000, type:'highpass', when, dest:musG});
      this.nextTime += spb;
      this.step = (this.step + 1) % 32;
    }
  }
};
setInterval(() => Music.tick(), 40);

function toggleMute(){
  muted = !muted;
  try { localStorage.setItem('funGameMuted', muted ? '1' : '0'); } catch(e){}
  muteBtn.textContent = muted ? '🔇' : '🔊';
  if (master) master.gain.value = muted ? 0 : 1;
}
muteBtn.textContent = muted ? '🔇' : '🔊';

/* ============================================================
   GAME STATE
   ============================================================ */
let W = 0, H = 0, DPR = 1, S = 1, groundY = 0, groundH = 80;
let state = 'MENU';                 // MENU | PLAYING | CRASHING | GAMEOVER
let score = 0, best = 0, speed = 0, crashSpeed = 0;
const baseSpeed = 400, maxBonus = 720;
let dayTime = 0.06, timeSec = 0;
let spawnT = 1.5, milestoneNext = 100;
let holding = false, hasJumped = false, hintShows = 0;
let shakeT = 0, shakeDur = 1, shakeMag = 0;
let hitOb = null, firstHighBirdShown = false;
let lastScoreShown = -1;

try { best = parseInt(localStorage.getItem('funGameHighScore') || '0', 10) || 0; } catch(e){}
function saveBest(){ try { localStorage.setItem('funGameHighScore', String(best)); } catch(e){} }

const obstacles = [], particles = [], floaters = [];
let clouds = [], trees = [], groundBits = [], stars = [], mountains = [], hills = [];
let mOff = 0, hOff = 0, gOff = 0, mSpan = 2000, hSpan = 2000;
let dustT = 0;

const WHEE = ['whee!', 'weee!', 'yahoo!', 'wheee!'];
const MILE_MSGS = ['SPEED UP!', 'ZOOM ZOOM!', 'WHEEE!', 'FASTER!', 'ZOOOOOM!', 'UNSTOPPABLE!'];
const OVER_MSGS = [
  'Ouch! Right in the blob!',
  "That cactus came out of nowhere! (It didn't.)",
  'Gravity wins again!',
  'You have been thoroughly bonked.',
  'The obstacle sends its regards.',
  'So close! (Not really.)',
  'Your jumping license has been revoked.',
  'Plot twist: the cactus was faster.',
  '10/10 for the dramatic tumble!',
  'That was a world-class faceplant.'
];

// ---------- Player ----------
const PALETTES = [
  {a:'#5ef2e4', b:'#17b8a6', belly:'#c8fff6', accent:'#ff5d8f'},
  {a:'#ffc46b', b:'#ff8f3d', belly:'#ffe9c9', accent:'#4d96ff'},
  {a:'#d8a7ff', b:'#9d4edd', belly:'#f3e4ff', accent:'#ffd23f'},
  {a:'#b5f27a', b:'#62c24a', belly:'#ecffd6', accent:'#ff6b6b'},
  {a:'#ffb3d9', b:'#ff6fb1', belly:'#ffe4f2', accent:'#3ddad7'}
];
let player = null;
function newPlayer(){
  return {
    x: Math.max(100*S, W*0.2), y: groundY, vy: 0, vx: 0,
    rot: 0, spin: 0, sx: 1, sy: 1, grounded: true,
    runPhase: 0, blinkT: rand(2, 4), blink: 0, ant: 0,
    pal: PALETTES[(Math.random()*PALETTES.length)|0],
    dead: false, bounced: false, settled: false, settleT: 0
  };
}

// ---------- Scenery generation ----------
function genScenery(){
  stars = [];
  for (let i = 0; i < 90; i++) stars.push({fx: Math.random(), fy: Math.random()*0.62, r: rand(1, 2.6), p: rand(0, 7)});
  clouds = [];
  for (let i = 0; i < 6; i++) clouds.push({x: rand(0, W), y: rand(28, H*0.30), s: rand(0.7, 1.5), spd: rand(6, 18), face: Math.random() < 0.65, seed: rand(0, 9)});
  trees = [];
  let tx = 0;
  for (let i = 0; i < 8; i++){ tx += rand(150, 380)*S; trees.push(newTree(tx)); }
  groundBits = [];
  for (let i = 0; i < 15; i++) groundBits.push(newGroundBit(rand(0, W)));
  // mountains & hills use repeating patterns
  mSpan = W + 700; mountains = [];
  let mx = rand(0, 100);
  while (mx < mSpan){ const w = rand(220, 420)*S; mountains.push({x: mx, w, h: rand(120, 250)*S, c: Math.random() < 0.5 ? '#7f74c9' : '#6e63b8'}); mx += w * rand(0.55, 0.8); }
  hSpan = W + 600; hills = [];
  let hx = 0;
  while (hx < hSpan){ const w = rand(280, 520)*S; hills.push({x: hx, w, h: rand(60, 130)*S, c: Math.random() < 0.5 ? '#63cf57' : '#52bd4f'}); hx += w * rand(0.5, 0.75); }
}
function newTree(x){
  const r = Math.random();
  const type = r < 0.45 ? 'tree' : r < 0.7 ? 'bush' : r < 0.88 ? 'flower' : 'mushroom';
  return {x, type, s: rand(0.8, 1.3), face: Math.random() < 0.5, seed: rand(0, 9),
          petal: ['#ff6b9d','#ffd23f','#ff8a5c','#b388ff'][(Math.random()*4)|0]};
}
function newGroundBit(x){
  const r = Math.random();
  return {x, type: r < 0.5 ? 'tuft' : r < 0.8 ? 'stone' : 'flower', s: rand(0.7, 1.2), seed: rand(0, 9),
          yy: rand(0.1, 0.85)}; // yy: fraction down into the dirt area
}

/* ============================================================
   PARTICLES & FLOATING TEXT
   ============================================================ */
function puff(x, y, n, col){
  for (let i = 0; i < n; i++) particles.push({type:'poof', x: x+rand(-14,14)*S, y: y+rand(-4,4)*S,
    vx: rand(-50,50)*S, vy: rand(-60,-10)*S, r: rand(7,13)*S, life: rand(.3,.5), max: .5, col: col || 'rgba(255,255,255,.85)'});
}
function dust(x, y){
  particles.push({type:'dust', x: x+rand(-6,6)*S, y: y-rand(0,4)*S, vx: rand(-90,-40)*S, vy: rand(-70,-20)*S,
    r: rand(3,6.5)*S, life: rand(.35,.55), max: .55, col:'rgba(230,225,215,.8)'});
}
function ring(x, y){ particles.push({type:'ring', x, y, r: 10*S, life: .32, max: .32}); }
function starBurst(x, y){
  for (let i = 0; i < 12; i++) particles.push({type:'star', x, y: y-40*S, vx: rand(-260,340)*S, vy: rand(-560,-120)*S,
    rot: rand(0,7), vr: rand(-9,9), r: rand(6,12)*S, life: rand(.7,1.1), max: 1.1});
  puff(x, y, 8, 'rgba(255,240,200,.9)');
}
function trailBit(x, y){
  particles.push({type:'trail', x: x+rand(-6,6)*S, y: y-rand(10,60)*S, vx: -speed*0.25, vy: rand(-15,15)*S,
    r: rand(3,6)*S, life: .3, max: .3, hue: (timeSec*420)%360});
}
function confettiBurst(){
  for (let i = 0; i < 130; i++) particles.push({type:'confetti', x: W/2+rand(-60,60), y: rand(-30,-5),
    vx: rand(-420,420), vy: rand(60,360), rot: rand(0,7), vr: rand(-10,10), w: rand(5,9), h: rand(7,13),
    hue: (Math.random()*360)|0, life: rand(2.2,3.4), max: 3.4, seed: rand(0,9)});
}
function floater(text, x, y, color, size){
  floaters.push({text, x, y, vy: -55*S, life: 1.25, max: 1.25, color: color||'#fff', size: size||30*S});
}

/* ============================================================
   OBSTACLES
   ============================================================ */
function spawnObstacle(){
  const x = W + 90;
  const r = Math.random();
  let type = 'cactus';
  if (score > 350 && r < 0.20) type = 'birdHigh';
  else if (score > 150 && r < 0.42) type = 'birdLow';
  else if (score > 80 && r < 0.60) type = 'rock';

  if (type === 'cactus'){
    const dbl = score > 200 && Math.random() < 0.3;
    obstacles.push({type, x, y: groundY, w: (dbl?76:44)*S, h: rand(55,96)*S,
      hat: Math.random() < 0.16, flower: Math.random() < 0.45, blinkT: rand(1,4), blink: 0, seed: rand(0,9), smug:false});
  } else if (type === 'rock'){
    obstacles.push({type, x, y: groundY, w: rand(50,68)*S, h: rand(38,54)*S,
      blinkT: rand(1,4), blink: 0, seed: rand(0,9), smug:false});
  } else {
    const low = type === 'birdLow';
    obstacles.push({type:'bird', low, x, y: groundY - (low ? 40 : rand(165,195))*S, r: 24*S,
      flap: rand(0,7), bob: rand(0,7), blinkT: rand(1,4), blink: 0, seed: rand(0,9), smug:false});
    if (!low && !firstHighBirdShown){
      firstHighBirdShown = true;
      floater('STAY LOW!', W*0.62, groundY - 235*S, '#ffe45c', 34*S);
    }
  }
  const gapPx = rand(330, 660)*S + speed*0.22;
  spawnT = Math.max(0.5, gapPx / Math.max(1, speed));
}

function obHitRect(o){
  if (o.type === 'cactus' || o.type === 'rock'){
    const w = o.w*0.72, h = o.h*0.88;
    return {x: o.x - w/2, y: o.y - h, w, h};
  }
  return null;
}
function checkCollision(){
  const px = player.x, py = player.y - 42*S*player.sy, pr = 26*S;
  for (const o of obstacles){
    if (o.type === 'bird'){
      const bx = o.x, by = o.y + Math.sin(o.bob)*7*S;
      const dx = px-bx, dy = py-by, rr2 = (pr + o.r*0.72);
      if (dx*dx + dy*dy < rr2*rr2) return o;
    } else {
      const r = obHitRect(o);
      const cx = clamp(px, r.x, r.x+r.w), cy = clamp(py, r.y, r.y+r.h);
      const dx = px-cx, dy = py-cy;
      if (dx*dx + dy*dy < pr*pr) return o;
    }
  }
  return null;
}

   FLOW CONTROL
   ============================================================ */
function doJump(){
  if (state !== 'PLAYING' || !player.grounded) return;
  player.grounded = false;
  player.vy = -1050*S;
  player.sy = 1.17; player.sx = 0.86;
  sfxJump();
  ring(player.x, groundY);
  puff(player.x, groundY, 4);
  if (!hasJumped){ hasJumped = true; hintEl.classList.add('fade'); setTimeout(()=>hintEl.classList.add('hidden'), 600); }
  if (speed > 740*S && Math.random() < 0.4){
    floater(WHEE[(Math.random()*WHEE.length)|0], player.x + 30*S, player.y - 120*S, '#fff', 26*S);
    sfxWhee();
  }
}
function endJump(){
  holding = false;
  if (state === 'PLAYING' && !player.grounded && player.vy < -360*S) player.vy = -360*S;
}
function shake(dur, mag){ shakeT = dur; shakeDur = dur; shakeMag = mag; }

function startCrash(o){
  state = 'CRASHING';
  hitOb = o; o.smug = true;
  crashSpeed = speed;
  player.grounded = false; player.dead = true;
  player.vy = -680*S; player.vx = speed*0.5; player.spin = 7.5;
  player.bounced = false; player.settled = false; player.settleT = 0;
  holding = false;
  shake(0.5, 13);
  starBurst(player.x, player.y);
  sfxBonk(); sfxSlideWhistle();
  Music.stop();
}
function finishGameOver(){
  state = 'GAMEOVER';
  const sc = Math.floor(score);
  const isBest = sc > best;
  if (isBest){ best = sc; saveBest(); }
  finalScoreEl.textContent = sc;
  finalBestEl.textContent = best;
  funnyMsgEl.textContent = OVER_MSGS[(Math.random()*OVER_MSGS.length)|0];
  newBestBadge.classList.toggle('hidden', !isBest || sc === 0);
  highEl.textContent = 'BEST ' + best;
  menuBestEl.textContent = best;
  overPanel.classList.remove('hidden');
  sfxTrombone();
  if (isBest && sc > 0) setTimeout(()=>{ if (state === 'GAMEOVER'){ sfxFanfare(); confettiBurst(); } }, 1000);
}
function startGame(){
  obstacles.length = 0; particles.length = 0; floaters.length = 0;
  score = 0; milestoneNext = 100; spawnT = 1.6; dayTime = 0.06;
  hitOb = null; lastScoreShown = -1;
  player = newPlayer();
  state = 'PLAYING';
  startPanel.classList.add('hidden');
  overPanel.classList.add('hidden');
  hudEl.classList.remove('hidden');
  if (hintShows < 2 && !hasJumped){ hintEl.classList.remove('hidden','fade'); hintShows++; }
  playBtn.blur(); retryBtn.blur(); menuBtn.blur();
  initAudio(); Music.start();
}
function toMenu(){
  state = 'MENU';
  obstacles.length = 0; particles.length = 0; floaters.length = 0;
  player = newPlayer();
  overPanel.classList.add('hidden');
  hudEl.classList.add('hidden');
  hintEl.classList.add('hidden');
  startPanel.classList.remove('hidden');

  menuBtn.blur();

}

/* ============================================================
   UPDATE
   ============================================================ */
function update(dt){
  // --- speed by state ---
  if (state === 'PLAYING'){
    speed = (baseSpeed + Math.min(score*2.2, maxBonus)) * S;
    score += speed * dt * 0.025 / S;
    if (score >= milestoneNext){
      milestoneNext += 100;
      sfxMilestone();
      floater(MILE_MSGS[(Math.random()*MILE_MSGS.length)|0], W/2, H*0.30, '#fff', 46*S);
      scoreEl.classList.remove('pop'); void scoreEl.offsetWidth; scoreEl.classList.add('pop');
      shake(0.15, 3);
    }
    dayTime = mod(0.06 + score*0.0016, 1);
  } else if (state === 'MENU'){
    speed = 250*S;
    dayTime = mod(dayTime + dt*0.008, 1);
  } else if (state === 'CRASHING'){
    crashSpeed = Math.max(0, crashSpeed - 1700*S*dt);
    speed = crashSpeed;
  } else speed = 0;

  // --- parallax layers ---
  mOff = mod(mOff + speed*0.22*dt, mSpan);
  hOff = mod(hOff + speed*0.42*dt, hSpan);
  gOff += speed*dt;
  for (const c of clouds){ c.x -= (speed*0.12 + c.spd)*dt; if (c.x < -220*c.s){ c.x = W + rand(60, 320); c.y = rand(28, H*0.30); } }
  for (const t of trees){ t.x -= speed*0.7*dt; if (t.x < -120*S){ let m = 0; for (const o of trees) m = Math.max(m, o.x); t.x = m + rand(150, 400)*S; Object.assign(t, newTree(t.x)); } }
  for (const b of groundBits){ b.x -= speed*dt; if (b.x < -40){ b.x = W + rand(0, 300); Object.assign(b, newGroundBit(b.x)); } }

  // --- player animation helpers ---
  const p = player;
  p.ant += ((Math.sin(timeSec*2.3)*0.15 + clamp(p.vy*0.00045, -0.5, 0.5)) - p.ant) * Math.min(1, 8*dt);
  p.blinkT -= dt;
  if (p.blinkT < 0){ p.blink = 0.13; p.blinkT = rand(2.2, 4.6); }
  p.blink = Math.max(0, p.blink - dt);
  if (p.grounded && speed > 20) p.runPhase += speed*dt*0.055/S;

  // squash & stretch targets
  let tsx = 1, tsy = 1;
  if (!p.grounded && state === 'PLAYING'){
    const st = clamp(Math.abs(p.vy)/(2600*S), 0, 0.16);
    tsy = 1 + st; tsx = 1 - st*0.55;
  }
  p.sx += (tsx - p.sx) * Math.min(1, 12*dt);
  p.sy += (tsy - p.sy) * Math.min(1, 12*dt);

  // --- state logic ---
  if (state === 'PLAYING'){
    spawnT -= dt;
    if (spawnT <= 0) spawnObstacle();
    const g = 3000*S * (holding && p.vy < 0 ? 0.55 : 1);
    p.vy += g*dt; p.y += p.vy*dt;
    if (p.y >= groundY){
      p.y = groundY;
      if (!p.grounded){
        p.grounded = true; p.vy = 0;
        p.sx = 1.22; p.sy = 0.74;
        sfxLand(); puff(p.x, groundY, 6); shake(0.08, 2);
      } else p.vy = 0;
    }
    dustT -= dt;
    if (p.grounded && dustT <= 0){ dust(p.x - 20*S, groundY); dustT = 0.07; }
    if ((speed/S - baseSpeed)/maxBonus > 0.5){ trailBit(p.x - 26*S, p.y); if (Math.random() < 0.6) trailBit(p.x - 10*S, p.y); }
    const hit = checkCollision();
    if (hit) startCrash(hit);
  }
  else if (state === 'MENU'){
    dustT -= dt;
    if (dustT <= 0){ dust(p.x - 20*S, groundY); dustT = 0.09; }
  }
  else if (state === 'CRASHING'){
    p.vy += 3000*S*dt; p.y += p.vy*dt; p.x += p.vx*dt;
    p.vx *= Math.max(0, 1 - 1.8*dt);
    if (!p.settled) p.rot += p.spin*dt;
    if (p.y >= groundY){
      p.y = groundY;
      if (!p.bounced && Math.abs(p.vy) > 260*S){
        p.bounced = true; p.vy *= -0.32; p.spin *= 0.35; p.vx *= 0.55;
        sfxLand(); shake(0.25, 6); puff(p.x, groundY, 7);
      } else if (!p.settled){ p.settled = true; p.vy = 0; p.vx = 0; }
    }
    if (p.settled){
      p.rot += (-1.15 - p.rot) * Math.min(1, 10*dt);
      p.settleT += dt;
      if (p.settleT > 0.95) finishGameOver();
    }
  }

  // --- obstacles scroll ---
  for (let i = obstacles.length - 1; i >= 0; i--){
    const o = obstacles[i];
    o.x -= speed*dt;
    if (o.type === 'bird'){ o.flap += dt*16; o.bob += dt*6; }
    o.blinkT -= dt;
    if (o.blinkT < 0){ o.blink = 0.12; o.blinkT = rand(1.5, 4); }
    o.blink = Math.max(0, (o.blink||0) - dt);
    if (o.x < -180 && state === 'PLAYING') obstacles.splice(i, 1);
  }

  // --- particles & floaters ---
  for (let i = particles.length - 1; i >= 0; i--){
    const q = particles[i];
    q.life -= dt;
    if (q.life <= 0){ particles.splice(i, 1); continue; }
    if (q.type === 'confetti'){
      q.vy += 500*dt; q.vx += Math.sin(timeSec*8 + q.seed)*300*dt;
      q.x += q.vx*dt; q.y += q.vy*dt; q.rot += q.vr*dt;
    } else if (q.type === 'star'){
      q.vy += 900*dt; q.x += q.vx*dt; q.y += q.vy*dt; q.rot += q.vr*dt;
      if (q.y > groundY + 4 && q.vy > 0){ q.y = groundY + 4; q.vy *= -0.4; q.vx *= 0.6; }
    } else if (q.type === 'ring'){ q.r += 300*S*dt; }
    else { q.x += (q.vx||0)*dt; q.y += (q.vy||0)*dt; if (q.type === 'poof' || q.type === 'dust') q.vy -= 30*dt; }
  }
  for (let i = floaters.length - 1; i >= 0; i--){
    const f = floaters[i];
    f.life -= dt; f.y += f.vy*dt;
    if (f.life <= 0) floaters.splice(i, 1);
  }
  shakeT = Math.max(0, shakeT - dt);

  // --- HUD ---
  const si = Math.floor(score);
  if (si !== lastScoreShown){ lastScoreShown = si; scoreEl.textContent = si; }
}

/* ============================================================
   RENDER
   ============================================================ */
const DAY_KEYS = [
  [0.00,'#8ec9ff','#e8f7ff'], [0.20,'#4db3ff','#d3f0ff'], [0.42,'#6f9dff','#ffe3ae'],
  [0.55,'#5b5bd6','#ff9d76'], [0.68,'#20204f','#543a7a'], [0.85,'#2a2f6b','#a56ab0'],
  [0.93,'#7f8fd8','#ffc2a1'], [1.00,'#8ec9ff','#e8f7ff']
];
function skyColors(t){
  for (let i = 0; i < DAY_KEYS.length - 1; i++){
    const a = DAY_KEYS[i], b = DAY_KEYS[i+1];
    if (t >= a[0] && t <= b[0]){
      const f = (t - a[0]) / (b[0] - a[0]);
      return [lerpColor(a[1], b[1], f), lerpColor(a[2], b[2], f)];
    }
  }
  return [DAY_KEYS[0][1], DAY_KEYS[0][2]];
}
function nightAmt(t){
  const d = Math.min(Math.abs(t - 0.72), 1 - Math.abs(t - 0.72));
  return smooth(clamp(1 - d/0.17, 0, 1));
}

function drawSun(t){
  if (t >= 0.58) return;
  const prog = t/0.58;
  const x = W*(0.12 + 0.76*prog), y = H*0.62 - Math.sin(Math.PI*prog)*H*0.42;
  const r = 44*S;
  ctx.save();
  ctx.translate(x, y);
  ctx.strokeStyle = '#ffd93b'; ctx.lineWidth = 6*S; ctx.lineCap = 'round';
  for (let i = 0; i < 12; i++){
    const a = timeSec*0.25 + i*Math.PI/6;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a)*r*1.28, Math.sin(a)*r*1.28);
    ctx.lineTo(Math.cos(a)*r*1.62, Math.sin(a)*r*1.62);
    ctx.stroke();
  }
  const g = ctx.createRadialGradient(0, -r*0.3, r*0.2, 0, 0, r);
  g.addColorStop(0, '#fff6b8'); g.addColorStop(1, '#ffd93b');
  circle(0, 0, r); ctx.fillStyle = g; ctx.fill();
  ctx.lineWidth = 4*S; ctx.strokeStyle = DARK; ctx.stroke();
  const fast = state === 'PLAYING' && (speed/S - baseSpeed)/maxBonus > 0.5;
  if (fast){
    // sunglasses!
    ctx.fillStyle = DARK;
    rr(-r*0.62, -r*0.28, r*0.55, r*0.34, r*0.12); ctx.fill();
    rr(r*0.07, -r*0.28, r*0.55, r*0.34, r*0.12); ctx.fill();
    ctx.lineWidth = 4*S; ctx.strokeStyle = DARK;
    ctx.beginPath(); ctx.moveTo(-r*0.07, -r*0.12); ctx.lineTo(r*0.07, -r*0.12); ctx.stroke();
    ctx.strokeStyle = 'rgba(255,255,255,.75)'; ctx.lineWidth = 3*S;
    ctx.beginPath(); ctx.moveTo(-r*0.5, -r*0.2); ctx.lineTo(-r*0.3, -r*0.05); ctx.stroke();
  } else {
    ctx.fillStyle = DARK;
    circle(-r*0.32, -r*0.1, r*0.09); ctx.fill();
    circle(r*0.32, -r*0.1, r*0.09); ctx.fill();
  }
  ctx.strokeStyle = DARK; ctx.lineWidth = 4*S; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.arc(0, r*0.12, r*0.4, 0.25, Math.PI - 0.25); ctx.stroke();
  ctx.fillStyle = 'rgba(255,120,120,.5)';
  circle(-r*0.55, r*0.18, r*0.14); ctx.fill();
  circle(r*0.55, r*0.18, r*0.14); ctx.fill();
  ctx.restore();
}
function drawMoon(t, night){
  if (t <= 0.55 || night <= 0.02) return;
  const prog = (t - 0.55)/0.45;
  const x = W*(0.12 + 0.76*prog), y = H*0.62 - Math.sin(Math.PI*prog)*H*0.42;
  const r = 36*S;
  ctx.save();
  ctx.translate(x, y);
  ctx.globalAlpha = night;
  const halo = ctx.createRadialGradient(0, 0, r*0.5, 0, 0, r*2.6);
  halo.addColorStop(0, 'rgba(255,250,210,.5)'); halo.addColorStop(1, 'rgba(255,250,210,0)');
  circle(0, 0, r*2.6); ctx.fillStyle = halo; ctx.fill();
  circle(0, 0, r); ctx.fillStyle = '#fdf3c9'; ctx.fill();
  ctx.lineWidth = 3.5*S; ctx.strokeStyle = DARK; ctx.stroke();
  ctx.fillStyle = 'rgba(210,195,150,.7)';
  circle(-r*0.4, r*0.35, r*0.16); ctx.fill();
  circle(r*0.45, -r*0.3, r*0.12); ctx.fill();
  circle(r*0.1, r*0.55, r*0.1); ctx.fill();
  // sleepy face
  ctx.strokeStyle = DARK; ctx.lineWidth = 3.5*S; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.arc(-r*0.3, -r*0.1, r*0.16, 0.3, Math.PI - 0.3); ctx.stroke();
  ctx.beginPath(); ctx.arc(r*0.3, -r*0.1, r*0.16, 0.3, Math.PI - 0.3); ctx.stroke();
  ctx.fillStyle = '#c99';
  ellipse(0, r*0.28, r*0.1, r*0.13); ctx.fill(); ctx.stroke();
  ctx.restore();
}
function drawStars(night){
  if (night <= 0.02) return;
  ctx.save();
  for (const s of stars){
    const a = night * (0.45 + 0.55*Math.sin(timeSec*2.5 + s.p));
    if (a <= 0.03) continue;
    ctx.globalAlpha = a;
    ctx.strokeStyle = '#fff'; ctx.lineWidth = s.r*0.7; ctx.lineCap = 'round';
    const x = s.fx*W, y = s.fy*H, r = s.r*2.2;
    ctx.beginPath();
    ctx.moveTo(x - r, y); ctx.lineTo(x + r, y);
    ctx.moveTo(x, y - r); ctx.lineTo(x, y + r);
    ctx.stroke();
  }
  ctx.restore();
}
function drawClouds(){
  for (const c of clouds){
    ctx.save();
    ctx.translate(c.x, c.y + Math.sin(timeSec*0.7 + c.seed)*4);
    ctx.scale(c.s*S, c.s*S);
    ctx.fillStyle = 'rgba(255,255,255,.95)';
    ellipse(0, 0, 42, 24); ctx.fill();
    ellipse(-30, 8, 26, 17); ctx.fill();
    ellipse(30, 8, 28, 18); ctx.fill();
    ellipse(0, 12, 34, 16); ctx.fill();
    ctx.fillStyle = 'rgba(190,215,235,.5)';
    ellipse(0, 14, 34, 13); ctx.fill();
    if (c.face){
      ctx.fillStyle = DARK;
      circle(-10, -2, 2.6); ctx.fill();
      circle(10, -2, 2.6); ctx.fill();
      ctx.strokeStyle = DARK; ctx.lineWidth = 2.4; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.arc(0, 3, 7, 0.3, Math.PI - 0.3); ctx.stroke();
      ctx.fillStyle = 'rgba(255,140,160,.55)';
      circle(-18, 3, 4); ctx.fill(); circle(18, 3, 4); ctx.fill();
    }
    ctx.restore();
  }
}
function drawMountains(){
  for (const m of mountains){
    const x = mod(m.x - mOff, mSpan) - m.w;
    if (x > W + 50 || x + m.w < -50) continue;
    ctx.fillStyle = m.c;
    ctx.beginPath();
    ctx.moveTo(x, groundY + 2);
    ctx.lineTo(x + m.w/2, groundY - m.h);
    ctx.lineTo(x + m.w, groundY + 2);
    ctx.closePath(); ctx.fill();
    // snow cap
    ctx.fillStyle = '#f4f6ff';
    ctx.beginPath();
    ctx.moveTo(x + m.w*0.36, groundY - m.h*0.72);
    ctx.lineTo(x + m.w/2, groundY - m.h);
    ctx.lineTo(x + m.w*0.64, groundY - m.h*0.72);
    ctx.lineTo(x + m.w*0.56, groundY - m.h*0.66);
    ctx.lineTo(x + m.w*0.5, groundY - m.h*0.72);
    ctx.lineTo(x + m.w*0.44, groundY - m.h*0.66);
    ctx.closePath(); ctx.fill();
  }
}
function drawHills(){
  for (const h of hills){
    const x = mod(h.x - hOff, hSpan) - h.w;
    if (x > W + 50 || x + h.w < -50) continue;
    ctx.fillStyle = h.c;
    ctx.beginPath();
    ctx.ellipse(x + h.w/2, groundY + 4, h.w/2, h.h, 0, Math.PI, TAU);
    ctx.fill();
  }
}
function drawTrees(){
  for (const t of trees){
    const s = t.s*S, x = t.x;
    if (x < -140*s || x > W + 140*s) continue;
    ctx.save();
    ctx.translate(x, groundY);
    ctx.lineWidth = 3*S; ctx.strokeStyle = DARK;
    if (t.type === 'tree'){
      ctx.fillStyle = '#8a5a3b';
      rr(-6*s, -52*s, 12*s, 54*s, 5*s); ctx.fill(); ctx.stroke();
      ctx.fillStyle = '#3fae5a';
      circle(-18*s, -62*s, 20*s); ctx.fill(); ctx.stroke();
      circle(18*s, -62*s, 20*s); ctx.fill(); ctx.stroke();
      circle(0, -80*s, 24*s); ctx.fill(); ctx.stroke();
      if (t.face){
        ctx.fillStyle = DARK;
        circle(-8*s, -72*s, 2.4*s); ctx.fill();
        circle(8*s, -72*s, 2.4*s); ctx.fill();
        ctx.lineWidth = 2.2*s; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.arc(0, -66*s, 6*s, 0.3, Math.PI - 0.3); ctx.stroke();
      }
    } else if (t.type === 'bush'){
      ctx.fillStyle = '#5cc25a';
      circle(-14*s, -12*s, 14*s); ctx.fill(); ctx.stroke();
      circle(12*s, -11*s, 13*s); ctx.fill(); ctx.stroke();
      circle(0, -20*s, 15*s); ctx.fill(); ctx.stroke();
      if (t.face){
        ctx.fillStyle = DARK;
        circle(-5*s, -18*s, 2*s); ctx.fill();
        circle(6*s, -18*s, 2*s); ctx.fill();
      }
    } else if (t.type === 'flower'){
      const sway = Math.sin(timeSec*2 + t.seed)*3*s;
      ctx.strokeStyle = '#3f9e4d'; ctx.lineWidth = 3.4*s; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(0, 0); ctx.quadraticCurveTo(sway*0.5, -16*s, sway, -30*s); ctx.stroke();
      ctx.fillStyle = '#3f9e4d';
      ellipse(sway*0.4 - 5*s, -14*s, 6*s, 3*s); ctx.fill();
      ctx.save();
      ctx.translate(sway, -30*s);
      ctx.fillStyle = t.petal;
      for (let i = 0; i < 5; i++){
        const a = i*TAU/5 - Math.PI/2;
        ellipse(Math.cos(a)*8*s, Math.sin(a)*8*s, 6*s, 6*s); ctx.fill();
      }
      ctx.fillStyle = '#fff3b0';
      circle(0, 0, 5.5*s); ctx.fill();
      ctx.strokeStyle = DARK; ctx.lineWidth = 2*s; ctx.stroke();
      ctx.restore();
    } else { // mushroom
      ctx.fillStyle = '#ffe8c9';
      rr(-8*s, -20*s, 16*s, 22*s, 6*s); ctx.fill(); ctx.stroke();
      ctx.fillStyle = '#ff5d5d';
      ctx.beginPath(); ctx.ellipse(0, -20*s, 20*s, 14*s, 0, Math.PI, TAU); ctx.closePath(); ctx.fill(); ctx.stroke();
      ctx.fillStyle = '#fff';
      circle(-8*s, -26*s, 3*s); ctx.fill();
      circle(6*s, -30*s, 2.6*s); ctx.fill();
      circle(10*s, -23*s, 2*s); ctx.fill();
      // grumpy face
      ctx.fillStyle = DARK;
      circle(-4*s, -10*s, 1.8*s); ctx.fill();
      circle(4*s, -10*s, 1.8*s); ctx.fill();
      ctx.strokeStyle = DARK; ctx.lineWidth = 1.8*s; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(-7*s, -14*s); ctx.lineTo(-2*s, -12.6*s); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(7*s, -14*s); ctx.lineTo(2*s, -12.6*s); ctx.stroke();
      ctx.beginPath(); ctx.arc(0, -4*s, 3.4*s, Math.PI + 0.4, TAU - 0.4); ctx.stroke();
    }
    ctx.restore();
  }
}
function drawGround(){
  ctx.fillStyle = '#cf8f5a';
  ctx.fillRect(0, groundY, W, groundH + 2);
  ctx.fillStyle = '#b57745';
  ctx.fillRect(0, groundY + groundH*0.62, W, groundH*0.4);
  // dirt bits
  for (const b of groundBits){
    const s = b.s*S;
    const y = groundY + 30*S + b.yy*(groundH - 40*S);
    if (b.type === 'stone'){
      ctx.fillStyle = '#a0693f';
      ellipse(b.x, y, 6*s, 4*s); ctx.fill();
    }
  }
  // grass strip
  ctx.fillStyle = '#7ed957';
  ctx.fillRect(0, groundY, W, 20*S);
  const sp = 26*S, off = mod(gOff, sp);
  for (let x = -off - sp; x < W + sp; x += sp){ circle(x, groundY + 19*S, 12.5*S); ctx.fill(); }
  ctx.fillStyle = '#8ee366';
  ctx.fillRect(0, groundY, W, 5*S);
  // moving dashes on grass
  ctx.strokeStyle = 'rgba(46,125,50,.45)'; ctx.lineWidth = 3*S; ctx.lineCap = 'round';
  const dsp = 90*S, doff = mod(gOff, dsp);
  for (let x = -doff; x < W + dsp; x += dsp){
    ctx.beginPath(); ctx.moveTo(x, groundY + 12*S); ctx.lineTo(x + 16*S, groundY + 12*S); ctx.stroke();
  }
  // tufts & tiny flowers on grass edge
  for (const b of groundBits){
    const s = b.s*S;
    if (b.type === 'tuft'){
      ctx.strokeStyle = '#4ea53f'; ctx.lineWidth = 2.6*s; ctx.lineCap = 'round';
      const y = groundY + 20*S;
      ctx.beginPath(); ctx.moveTo(b.x, y); ctx.lineTo(b.x - 4*s, y - 9*s); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(b.x + 3*s, y); ctx.lineTo(b.x + 3*s, y - 11*s); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(b.x + 6*s, y); ctx.lineTo(b.x + 10*s, y - 8*s); ctx.stroke();
    } else if (b.type === 'flower'){
      const y = groundY + 20*S;
      ctx.strokeStyle = '#3f9e4d'; ctx.lineWidth = 2.2*s;
      ctx.beginPath(); ctx.moveTo(b.x, y); ctx.lineTo(b.x, y - 10*s); ctx.stroke();
      ctx.fillStyle = '#ffdf3f';
      circle(b.x, y - 12*s, 3.6*s); ctx.fill();
      ctx.fillStyle = '#ff9d3f';
      circle(b.x, y - 12*s, 1.6*s); ctx.fill();
    }
  }
}

/* ---------- Obstacles ---------- */
function faceEyes(x1, y1, x2, y2, r, blink, closed){
  ctx.fillStyle = '#fff';
  if (closed || blink > 0){
    ctx.strokeStyle = DARK; ctx.lineWidth = 2.6*S; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.arc(x1, y1, r*0.8, 0.3, Math.PI - 0.3); ctx.stroke();
    ctx.beginPath(); ctx.arc(x2, y2, r*0.8, 0.3, Math.PI - 0.3); ctx.stroke();
  } else {
    circle(x1, y1, r); ctx.fill(); ctx.strokeStyle = DARK; ctx.lineWidth = 2.4*S; ctx.stroke();
    circle(x2, y2, r); ctx.fill(); ctx.stroke();
    ctx.fillStyle = DARK;
    circle(x1 + r*0.25, y1, r*0.42); ctx.fill();
    circle(x2 + r*0.25, y2, r*0.42); ctx.fill();
  }
}
function drawObstacle(o){
  ctx.save();
  if (o.type === 'cactus'){
    ctx.translate(o.x, o.y);
    const w = o.w, h = o.h;
    const g = ctx.createLinearGradient(-w/2, 0, w/2, 0);
    g.addColorStop(0, '#4cb354'); g.addColorStop(1, '#35913f');
    ctx.fillStyle = g;
    rr(-w/2, -h, w, h, w*0.42); ctx.fill();
    ctx.lineWidth = 4*S; ctx.strokeStyle = DARK; ctx.stroke();
    // arms
    ctx.fillStyle = '#35913f';
    rr(-w/2 - 16*S, -h*0.72, 13*S, h*0.34, 6*S); ctx.fill(); ctx.stroke();
    rr(-w/2 - 16*S, -h*0.46, 18*S, 12*S, 6*S); ctx.fill(); ctx.stroke();
    rr(w/2 + 3*S, -h*0.60, 13*S, h*0.3, 6*S); ctx.fill(); ctx.stroke();
    rr(w/2 - 2*S, -h*0.36, 18*S, 12*S, 6*S); ctx.fill(); ctx.stroke();
    // stripes
    ctx.strokeStyle = 'rgba(24,80,35,.35)'; ctx.lineWidth = 3*S;
    for (let i = -1; i <= 1; i++){
      ctx.beginPath(); ctx.moveTo(i*w*0.22, -h + 8*S); ctx.lineTo(i*w*0.22, -6*S); ctx.stroke();
    }
    // face
    const fy = -h*0.62;
    if (o.smug){
      faceEyes(-w*0.2, fy, w*0.2, fy, 6*S, 0, false);
      ctx.strokeStyle = DARK; ctx.lineWidth = 3*S; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.arc(0, fy + 12*S, 8*S, 0.2, Math.PI - 0.2); ctx.stroke();
      ctx.fillStyle = '#ff8fb3';
      ellipse(4*S, fy + 17*S, 4*S, 6*S); ctx.fill(); ctx.stroke();
    } else {
      faceEyes(-w*0.2, fy, w*0.2, fy, 6*S, o.blink, false);
      // unibrow
      ctx.strokeStyle = DARK; ctx.lineWidth = 4*S; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(-w*0.34, fy - 10*S); ctx.lineTo(w*0.34, fy - 6*S); ctx.stroke();
      ctx.lineWidth = 3*S;
      ctx.beginPath(); ctx.arc(0, fy + 16*S, 7*S, Math.PI + 0.5, TAU - 0.5); ctx.stroke();
    }
    if (o.flower && !o.hat){
      ctx.fillStyle = '#ff8fb3';
      for (let i = 0; i < 5; i++){ const a = i*TAU/5; ellipse(Math.cos(a)*6*S, -h + Math.sin(a)*6*S - 4*S, 4.5*S, 4.5*S); ctx.fill(); }
      ctx.fillStyle = '#ffd23f'; circle(0, -h - 4*S, 4*S); ctx.fill();
    }
    if (o.hat){
      // tiny sombrero!
      ctx.fillStyle = '#f4c04a';
      ellipse(0, -h - 2*S, w*0.85, 8*S); ctx.fill();
      ctx.strokeStyle = DARK; ctx.lineWidth = 3*S; ctx.stroke();
      ctx.beginPath(); ctx.ellipse(0, -h - 4*S, w*0.36, 12*S, 0, Math.PI, TAU); ctx.closePath(); ctx.fill(); ctx.stroke();
      ctx.strokeStyle = '#e05252'; ctx.lineWidth = 3.4*S;
      ctx.beginPath(); ctx.moveTo(-w*0.34, -h - 6*S); ctx.lineTo(w*0.34, -h - 6*S); ctx.stroke();
    }
  }
  else if (o.type === 'rock'){
    ctx.translate(o.x, o.y);
    const w = o.w, h = o.h;
    const g = ctx.createLinearGradient(0, -h, 0, 0);
    g.addColorStop(0, '#aab4bd'); g.addColorStop(1, '#8b939b');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.moveTo(-w/2, 0);
    ctx.quadraticCurveTo(-w/2 - 4*S, -h*0.7, -w*0.2, -h*0.92);
    ctx.quadraticCurveTo(0, -h*1.06, w*0.25, -h*0.9);
    ctx.quadraticCurveTo(w/2 + 5*S, -h*0.6, w/2, 0);
    ctx.closePath(); ctx.fill();
    ctx.lineWidth = 4*S; ctx.strokeStyle = DARK; ctx.stroke();
    // moss
    ctx.fillStyle = '#6fbf4a';
    ellipse(-w*0.22, -h*0.86, 9*S, 5*S); ctx.fill();
    // cracks
    ctx.strokeStyle = 'rgba(60,66,72,.5)'; ctx.lineWidth = 2*S;
    ctx.beginPath(); ctx.moveTo(w*0.1, -h*0.7); ctx.lineTo(w*0.22, -h*0.45); ctx.lineTo(w*0.12, -h*0.25); ctx.stroke();
    // sleepy face
    const fy = -h*0.45;
    if (o.smug){
      faceEyes(-w*0.16, fy, w*0.16, fy, 5.5*S, 0, false);
      ctx.strokeStyle = DARK; ctx.lineWidth = 3*S; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.arc(0, fy + 10*S, 7*S, 0.2, Math.PI - 0.2); ctx.stroke();
    } else {
      faceEyes(-w*0.16, fy, w*0.16, fy, 5.5*S, 1, true); // always snoozing
      ctx.fillStyle = '#7ec8f7';
      circle(w*0.3, fy + 6*S, 3*S); ctx.fill(); // drool bubble
      // floating Zzz
      const zz = (timeSec*18 + o.seed*20) % 34;
      ctx.globalAlpha = clamp(1 - zz/34, 0, 1);
      ctx.fillStyle = DARK;
      ctx.font = '700 ' + (13*S) + 'px Fredoka, sans-serif';
      ctx.fillText('z', w*0.32, fy - 14*S - zz*S*0.9);
      ctx.font = '700 ' + (10*S) + 'px Fredoka, sans-serif';
      ctx.fillText('z', w*0.42, fy - 24*S - zz*S*0.9);
      ctx.globalAlpha = 1;
    }
  }
  else { // bird
    const bob = Math.sin(o.bob)*7*S;
    ctx.translate(o.x, o.y + bob);
    const r = o.r;
    const body = o.low ? '#ff6b6b' : '#b388ff';
    const wing = o.low ? '#e05252' : '#9a6ff0';
    const belly = o.low ? '#ffd9d9' : '#e6dbff';
    // tail
    ctx.fillStyle = wing;
    ctx.beginPath();
    ctx.moveTo(-r*0.9, -r*0.1); ctx.lineTo(-r*1.5, -r*0.5); ctx.lineTo(-r*1.4, r*0.15); ctx.closePath();
    ctx.fill(); ctx.lineWidth = 3*S; ctx.strokeStyle = DARK; ctx.stroke();
    // body
    ctx.fillStyle = body;
    ellipse(0, 0, r*1.05, r*0.82); ctx.fill();
    ctx.lineWidth = 3.5*S; ctx.stroke();
    ctx.fillStyle = belly;
    ellipse(r*0.1, r*0.28, r*0.55, r*0.36); ctx.fill();
    // wing flapping
    const wa = Math.sin(o.flap)*0.9 - 0.2;
    ctx.save();
    ctx.translate(-r*0.15, -r*0.1);
    ctx.rotate(wa);
    ctx.fillStyle = wing;
    ellipse(0, -r*0.55, r*0.42, r*0.62); ctx.fill();
    ctx.lineWidth = 3*S; ctx.stroke();
    ctx.restore();
    // feet
    ctx.strokeStyle = '#ffb703'; ctx.lineWidth = 3*S; ctx.lineCap = 'round';
    const kick = Math.sin(o.flap*0.5)*3*S;
    ctx.beginPath(); ctx.moveTo(-r*0.2, r*0.75); ctx.lineTo(-r*0.2 + kick, r*1.05); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(r*0.15, r*0.75); ctx.lineTo(r*0.15 - kick, r*1.05); ctx.stroke();
    // beak
    ctx.fillStyle = '#ffb703';
    ctx.beginPath();
    ctx.moveTo(r*0.85, -r*0.12); ctx.lineTo(r*1.45, r*0.08); ctx.lineTo(r*0.82, r*0.3); ctx.closePath();
    ctx.fill(); ctx.lineWidth = 3*S; ctx.strokeStyle = DARK; ctx.stroke();
    // face
    if (o.smug){
      faceEyes(r*0.25, -r*0.25, r*0.62, -r*0.22, 5*S, 0, true);
      ctx.strokeStyle = DARK; ctx.lineWidth = 2.6*S; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.arc(r*0.42, r*0.02, 6*S, 0.3, Math.PI - 0.5); ctx.stroke();
    } else if (o.low){
      faceEyes(r*0.25, -r*0.25, r*0.62, -r*0.22, 5.5*S, o.blink, false);
      ctx.strokeStyle = DARK; ctx.lineWidth = 3.4*S; ctx.lineCap = 'round'; // angry brows
      ctx.beginPath(); ctx.moveTo(r*0.05, -r*0.55); ctx.lineTo(r*0.42, -r*0.4); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(r*0.82, -r*0.5); ctx.lineTo(r*0.5, -r*0.38); ctx.stroke();
    } else {
      faceEyes(r*0.25, -r*0.25, r*0.62, -r*0.22, 5*S, 1, true); // smug sleepy high bird
    }
    ctx.restore();
    return;
  }
  ctx.restore();
}

/* ---------- Player (Bloo the blob) ---------- */
function drawPlayer(){
  const p = player, pal = p.pal;
  // shadow
  const hgt = Math.max(0, groundY - p.y);
  const shk = clamp(1 - hgt/(380*S), 0.3, 1);
  ctx.save();
  ctx.globalAlpha = 0.16*shk + 0.03;
  ctx.fillStyle = '#1b2a1b';
  ellipse(p.x, groundY + 9*S, 34*S*shk, 8.5*S*shk); ctx.fill();
  ctx.restore();

  ctx.save();
  ctx.translate(p.x, p.y);
  if (p.rot) ctx.rotate(p.rot);
  ctx.scale(S*p.sx, S*p.sy);
  // ---- unit space, feet at (0,0) ----
  const running = p.grounded && speed > 20 && !p.dead;
  const ph = p.runPhase;
  const air = !p.grounded && !p.dead;

  // legs
  function leg(hipX, lift, swing){
    const fx = hipX + swing, fy = -3 - lift;
    ctx.strokeStyle = DARK; ctx.lineWidth = 11; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(hipX, -16); ctx.lineTo(fx, fy - 3); ctx.stroke();
    ctx.strokeStyle = pal.b; ctx.lineWidth = 7;
    ctx.beginPath(); ctx.moveTo(hipX, -16); ctx.lineTo(fx, fy - 3); ctx.stroke();
    ctx.fillStyle = '#ff4d4d';
    ctx.beginPath(); ctx.ellipse(fx + 2, fy - 2, 8, 6, 0, 0, TAU); ctx.fill();
    ctx.lineWidth = 3; ctx.strokeStyle = DARK; ctx.stroke();
  }
  if (p.dead){
    const wig = Math.sin(timeSec*9)*3;
    leg(-10, 8 + wig, -2);
    leg(10, 14 - wig, 2);
  } else if (air){
    leg(-11, 11, -4);
    leg(11, 15, 2);
  } else if (running){
    leg(-12, Math.max(0, Math.sin(ph))*13, Math.cos(ph)*10);
    leg(12, Math.max(0, Math.sin(ph + Math.PI))*13, Math.cos(ph + Math.PI)*10);
  } else {
    leg(-11, 0, 0); leg(11, 0, 0);
  }

  // body
  const wob = running ? Math.sin(timeSec*11)*1.4 : Math.sin(timeSec*2)*0.8;
  const g = ctx.createLinearGradient(0, -86, 0, -8);
  g.addColorStop(0, pal.a); g.addColorStop(1, pal.b);
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.ellipse(0, -46, 36, 34 + wob, 0, 0, TAU); ctx.fill();
  ctx.lineWidth = 4.5; ctx.strokeStyle = DARK; ctx.stroke();
  ctx.fillStyle = pal.belly;
  ctx.globalAlpha = 0.9;
  ctx.beginPath(); ctx.ellipse(0, -32, 21, 15, 0, 0, TAU); ctx.fill();
  ctx.globalAlpha = 1;

  // arms
  function arm(side, ang){
    ctx.save();
    ctx.translate(side*32, -48);
    ctx.rotate(ang);
    ctx.strokeStyle = DARK; ctx.lineWidth = 10; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, 14); ctx.stroke();
    ctx.strokeStyle = pal.b; ctx.lineWidth = 6;
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, 14); ctx.stroke();
    ctx.fillStyle = pal.accent;
    circle(0, 17, 5.5); ctx.fill(); ctx.lineWidth = 2.5; ctx.strokeStyle = DARK; ctx.stroke();
    ctx.restore();
  }
  if (p.dead){ arm(-1, -2.6); arm(1, 2.6); }
  else if (air){ arm(-1, -2.5 + Math.sin(timeSec*14)*0.15); arm(1, 2.5 - Math.sin(timeSec*14)*0.15); }
  else if (running){ arm(-1, Math.sin(ph)*0.55 - 0.2); arm(1, -Math.sin(ph)*0.55 + 0.2); }
  else { arm(-1, -0.35); arm(1, 0.35); }

  // face
  const lookY = air ? clamp(p.vy*0.004, -3.5, 3.5) : 0;
  ctx.fillStyle = '#fff';
  if (p.dead){
    // X X eyes
    ctx.strokeStyle = DARK; ctx.lineWidth = 4; ctx.lineCap = 'round';
    for (const ex of [-13, 15]){
      ctx.beginPath(); ctx.moveTo(ex - 6, -62); ctx.lineTo(ex + 6, -50); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(ex + 6, -62); ctx.lineTo(ex - 6, -50); ctx.stroke();
    }
  } else if (p.blink > 0){
    ctx.strokeStyle = DARK; ctx.lineWidth = 4; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.arc(-13, -56, 8, 0.25, Math.PI - 0.25); ctx.stroke();
    ctx.beginPath(); ctx.arc(15, -57, 8.5, 0.25, Math.PI - 0.25); ctx.stroke();
  } else {
    circle(-13, -58, 10.5); ctx.fill(); ctx.lineWidth = 3.5; ctx.strokeStyle = DARK; ctx.stroke();
    circle(15, -59, 11.5); ctx.fill(); ctx.stroke();
    ctx.fillStyle = DARK;
    circle(-13 + 3.5, -58 + lookY, 4.6); ctx.fill();
    circle(15 + 3.5, -59 + lookY, 5); ctx.fill();
    ctx.fillStyle = '#fff';
    circle(-11.5, -60 + lookY, 1.6); ctx.fill();
    circle(16.5, -61 + lookY, 1.7); ctx.fill();
  }
  // cheeks
  ctx.fillStyle = 'rgba(255,120,150,.5)';
  circle(-25, -41, 5.5); ctx.fill();
  circle(26, -42, 5.5); ctx.fill();
  // mouth
  if (p.dead){
    ctx.fillStyle = '#8e2f3c';
    ellipse(2, -40, 6, 7.5); ctx.fill(); ctx.lineWidth = 3; ctx.strokeStyle = DARK; ctx.stroke();
  } else if (air){
    ctx.fillStyle = '#8e2f3c';
    ellipse(2, -42, 6.5, 8.5); ctx.fill(); ctx.lineWidth = 3; ctx.strokeStyle = DARK; ctx.stroke();
    ctx.fillStyle = '#ff8fa3';
    ellipse(2, -38.5, 4, 3.2); ctx.fill();
  } else {
    ctx.strokeStyle = DARK; ctx.lineWidth = 4; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.arc(2, -46, 9, 0.25, Math.PI - 0.25); ctx.stroke();
  }

  // antenna with bouncy ball
  const tipX = p.ant*24, tipY = -99 + Math.abs(p.ant)*7;
  ctx.strokeStyle = DARK; ctx.lineWidth = 4; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(0, -78);
  ctx.quadraticCurveTo(p.ant*10, -90, tipX, tipY); ctx.stroke();
  ctx.fillStyle = pal.accent;
  circle(tipX, tipY, 7); ctx.fill(); ctx.lineWidth = 3; ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,.8)';
  circle(tipX - 2.2, tipY - 2.2, 2); ctx.fill();

  // dizzy stars when knocked out
  if (p.dead && p.settled){
    for (let i = 0; i < 3; i++){
      const a = timeSec*4 + i*TAU/3;
      const sx = Math.cos(a)*30, sy = -66 + Math.sin(a)*9;
      drawSparkle(sx, sy, 6 + Math.sin(timeSec*8 + i)*1.5, '#ffd23f');
    }
  }
  ctx.restore();
}
function drawSparkle(x, y, r, col){
  ctx.save();
  ctx.translate(x, y);
  ctx.fillStyle = col;
  ctx.strokeStyle = DARK; ctx.lineWidth = 1.6;
  ctx.beginPath();
  for (let i = 0; i < 4; i++){
    const a = i*Math.PI/2;
    ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
    ctx.lineTo(Math.cos(a + Math.PI/4)*r*0.38, Math.sin(a + Math.PI/4)*r*0.38);
  }
  ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.restore();
}

/* ---------- Particles / floaters ---------- */
function drawParticles(){
  for (const q of particles){
    const a = clamp(q.life/q.max, 0, 1);
    if (q.type === 'confetti'){
      ctx.save();
      ctx.globalAlpha = a;
      ctx.translate(q.x, q.y); ctx.rotate(q.rot);
      ctx.fillStyle = 'hsl(' + q.hue + ',90%,60%)';
      ctx.fillRect(-q.w/2, -q.h/2, q.w, q.h);
      ctx.restore();
    } else if (q.type === 'star'){
      ctx.save(); ctx.globalAlpha = a; ctx.translate(q.x, q.y); ctx.rotate(q.rot);
      drawSparkle(0, 0, q.r, '#ffd23f');
      ctx.restore();
    } else if (q.type === 'ring'){
      ctx.save(); ctx.globalAlpha = a*0.8;
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 4*S;
      circle(q.x, q.y - 4*S, q.r); ctx.stroke();
      ctx.restore();
    } else if (q.type === 'trail'){
      ctx.save(); ctx.globalAlpha = a*0.75;
      ctx.fillStyle = 'hsl(' + q.hue + ',95%,62%)';
      circle(q.x, q.y, q.r*a + 1); ctx.fill();
      ctx.restore();
    } else { // dust / poof
      ctx.save(); ctx.globalAlpha = a*(q.type === 'poof' ? 0.7 : 0.55);
      ctx.fillStyle = q.col;
      circle(q.x, q.y, q.r*(1.6 - a*0.6)); ctx.fill();
      ctx.restore();
    }
  }
}
function drawFloaters(){
  for (const f of floaters){
    const a = clamp(f.life/f.max, 0, 1);
    const pop = f.life > f.max - 0.18 ? 1 + (f.life - (f.max - 0.18))*2.2 : 1;
    ctx.save();
    ctx.globalAlpha = Math.min(1, a*1.6);
    ctx.translate(f.x, f.y);
    ctx.scale(pop, pop);
    ctx.font = '700 ' + f.size + 'px Fredoka, sans-serif';
    ctx.textAlign = 'center';
    ctx.lineWidth = Math.max(3, f.size*0.16);
    ctx.strokeStyle = DARK;
    ctx.strokeText(f.text, 0, 0);
    ctx.fillStyle = f.color;
    ctx.fillText(f.text, 0, 0);
    ctx.restore();
  }
}

/* ---------- Main render ---------- */
function render(){
  ctx.save();
  if (shakeT > 0){
    const m = shakeMag * (shakeT/shakeDur);
    ctx.translate(rand(-m, m), rand(-m, m));
  }
  // sky
  const cols = skyColors(dayTime);
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, cols[0]); grad.addColorStop(1, cols[1]);
  ctx.fillStyle = grad;
  ctx.fillRect(-30, -30, W + 60, H + 60);

  drawSun(dayTime);
  drawClouds();
  drawMountains();
  drawHills();
  drawTrees();
  drawGround();
  for (const o of obstacles) drawObstacle(o);
  drawPlayer();
  drawParticles();

  // night overlay
  const night = nightAmt(dayTime);
  if (night > 0.01){
    ctx.fillStyle = 'rgba(22,16,60,' + (night*0.30).toFixed(3) + ')';
    ctx.fillRect(-30, -30, W + 60, H + 60);
  }
  drawStars(night);
  drawMoon(dayTime, night);
  drawFloaters();
  ctx.restore();
}

/* ============================================================
   RESIZE + MAIN LOOP
   ============================================================ */
function resize(){
  DPR = Math.min(2, window.devicePixelRatio || 1);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = Math.round(W*DPR); canvas.height = Math.round(H*DPR);
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  S = clamp(H/720, 0.55, 1.35);
  groundH = Math.max(64, H*0.115);
  groundY = H - groundH;
  if (player){
    player.x = Math.max(100*S, W*0.2);
    if (player.grounded) player.y = groundY;
    else player.y = Math.min(player.y, groundY);
  }
  genScenery();
}
window.addEventListener('resize', resize);

resize();
player = newPlayer();
menuBestEl.textContent = best;
highEl.textContent = 'BEST ' + best;

// tiny testing handle (harmless)
window.__fg = { obstacles, player: () => player, getState: () => state, getScore: () => score, getSpeed: () => speed, getS: () => S };

let last = performance.now();
function frame(now){
  let dt = (now - last)/1000;
  last = now;
  dt = Math.min(dt, 0.033);
  timeSec += dt;
  update(dt);
  render();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
