<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Event Feedback Dashboard</title>
<style>
  :root{
    --bg:#f4f5f8;
    --card:#ffffff;
    --border:#e5e7ee;
    --border-strong:#d7dae4;
    --text:#1c2333;
    --muted:#687084;
    --faint:#9aa1b3;
    --accent:#4f46e5;
    --accent-dark:#4338ca;
    --accent-soft:#eef0ff;
    --amber:#f59e0b;
    --star-empty:#e3e6ee;
    --green:#15803d;
    --green-soft:#e7f6ec;
    --red:#b91c1c;
    --red-soft:#fdecec;
    --radius:14px;
    --shadow:0 1px 2px rgba(16,24,40,.05),0 1px 3px rgba(16,24,40,.06);
    --shadow-lg:0 8px 24px rgba(16,24,40,.10);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    background:var(--bg);
    color:var(--text);
    line-height:1.5;
    min-height:100vh;
  }

  /* ---------- Top bar ---------- */
  .topbar{
    background:linear-gradient(120deg,#1e1b4b 0%,#312e81 55%,#4338ca 100%);
    color:#fff;
    padding:26px 24px 66px;
  }
  .topbar-inner{max-width:1180px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:14px}
  .brand-mark{
    width:44px;height:44px;border-radius:12px;flex:0 0 auto;
    background:rgba(255,255,255,.14);
    border:1px solid rgba(255,255,255,.22);
    display:flex;align-items:center;justify-content:center;
  }
  .brand h1{font-size:21px;font-weight:700;letter-spacing:-.01em}
  .brand p{font-size:13px;color:rgba(255,255,255,.72);margin-top:2px}
  .topbar-meta{
    font-size:12.5px;color:rgba(255,255,255,.85);
    background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);
    padding:7px 13px;border-radius:999px;display:flex;align-items:center;gap:7px;
  }
  .dot-live{width:7px;height:7px;border-radius:50%;background:#4ade80;box-shadow:0 0 0 3px rgba(74,222,128,.25)}

  /* ---------- Layout ---------- */
  main{max-width:1180px;margin:0 auto;padding:0 24px 56px}
  .lift{margin-top:-42px}

  /* ---------- Stat cards ---------- */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
  .stat{
    background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:16px 18px;display:flex;gap:14px;align-items:center;
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .stat:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
  .stat-icon{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
  .stat-icon.indigo{background:var(--accent-soft);color:var(--accent)}
  .stat-icon.amber{background:#fef4e0;color:#d97706}
  .stat-icon.green{background:var(--green-soft);color:var(--green)}
  .stat-icon.red{background:var(--red-soft);color:var(--red)}
  .stat-label{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
  .stat-value{font-size:22px;font-weight:700;letter-spacing:-.02em;line-height:1.2;margin-top:2px}
  .stat-sub{font-size:12px;color:var(--faint)}

  /* ---------- AI summary ---------- */
  .ai-card{
    margin-top:20px;background:var(--card);border:1px solid var(--border);
    border-radius:var(--radius);box-shadow:var(--shadow);position:relative;overflow:hidden;
    transition:opacity .25s ease, transform .25s ease;
  }
  .ai-card::before{
    content:"";position:absolute;inset:0 0 auto 0;height:3px;
    background:linear-gradient(90deg,#6366f1,#8b5cf6,#c084fc);
  }
  .ai-card.closing{opacity:0;transform:translateY(-8px)}
  .ai-head{display:flex;align-items:center;gap:10px;padding:18px 20px 0}
  .ai-badge{
    width:30px;height:30px;border-radius:9px;flex:0 0 auto;
    background:linear-gradient(135deg,#6366f1,#8b5cf6);
    display:flex;align-items:center;justify-content:center;color:#fff;
  }
  .ai-title{font-size:15px;font-weight:700}
  .ai-tag{font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#7c3aed;background:#f3efff;border:1px solid #e4dcff;padding:2px 8px;border-radius:999px}
  .ai-close{
    margin-left:auto;width:30px;height:30px;border-radius:8px;border:1px solid var(--border);
    background:#fff;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;
    transition:background .15s,color .15s;
  }
  .ai-close:hover{background:#f3f4f8;color:var(--text)}
  .ai-body{padding:12px 20px 6px}
  .ai-body ul{list-style:none;display:flex;flex-direction:column;gap:9px}
  .ai-body li{display:flex;gap:11px;font-size:13.8px;color:#3a4157;align-items:flex-start}
  .ai-body li b{color:var(--text)}
  .ai-dot{width:7px;height:7px;border-radius:50%;margin-top:7px;flex:0 0 auto}
  .ai-dot.c1{background:#6366f1}.ai-dot.c2{background:#16a34a}.ai-dot.c3{background:#d97706}.ai-dot.c4{background:#8b5cf6}
  .ai-foot{
    display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
    padding:12px 20px 16px;margin-top:8px;border-top:1px dashed var(--border);
    font-size:12px;color:var(--faint);
  }
  .btn-ghost{
    border:1px solid var(--border-strong);background:#fff;color:var(--accent-dark);
    font-size:12.5px;font-weight:600;padding:6px 13px;border-radius:8px;cursor:pointer;
    display:inline-flex;align-items:center;gap:6px;transition:background .15s,border-color .15s;
  }
  .btn-ghost:hover{background:var(--accent-soft);border-color:#c7c9f5}

  .ai-reopen{
    display:none;align-items:center;gap:7px;
    border:1px solid #e4dcff;background:#f6f4ff;color:#6d28d9;
    font-size:12.5px;font-weight:600;padding:7px 13px;border-radius:999px;cursor:pointer;
    transition:background .15s;
  }
  .ai-reopen:hover{background:#efeaff}
  .ai-reopen.visible{display:inline-flex}

  /* ---------- Controls ---------- */
  .controls{margin-top:20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .search{
    position:relative;flex:1 1 320px;max-width:460px;
  }
  .search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--faint);pointer-events:none}
  .search input{
    width:100%;padding:11px 38px 11px 40px;font-size:14px;color:var(--text);
    border:1px solid var(--border-strong);border-radius:10px;background:#fff;outline:none;
    transition:border-color .15s, box-shadow .15s;
  }
  .search input::placeholder{color:var(--faint)}
  .search input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,70,229,.14)}
  .search-clear{
    position:absolute;right:9px;top:50%;transform:translateY(-50%);
    width:22px;height:22px;border:none;border-radius:6px;background:transparent;color:var(--faint);
    cursor:pointer;display:none;align-items:center;justify-content:center;
  }
  .search-clear:hover{background:#eef0f5;color:var(--text)}
  .search-clear.visible{display:flex}

  .chips{display:flex;gap:8px;flex-wrap:wrap}
  .chip{
    border:1px solid var(--border-strong);background:#fff;color:var(--muted);
    font-size:12.5px;font-weight:600;padding:8px 14px;border-radius:999px;cursor:pointer;
    transition:all .15s;display:inline-flex;align-items:center;gap:6px;
  }
  .chip:hover{border-color:#c3c8f0;color:var(--accent-dark)}
  .chip.active{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(79,70,229,.3)}

  .result-count{margin-left:auto;font-size:12.5px;color:var(--muted);white-space:nowrap}
  .result-count b{color:var(--text)}

  /* ---------- Table ---------- */
  .table-card{
    margin-top:16px;background:var(--card);border:1px solid var(--border);
    border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;
  }
  .table-wrap{overflow:auto;max-height:640px}
  table{width:100%;border-collapse:separate;border-spacing:0;min-width:900px}
  thead th{
    position:sticky;top:0;z-index:5;
    background:#f8f9fc;border-bottom:1px solid var(--border-strong);
    font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);
    padding:13px 16px;text-align:left;white-space:nowrap;user-select:none;
  }
  thead th.sortable{cursor:pointer;transition:color .15s,background .15s}
  thead th.sortable:hover{color:var(--accent-dark);background:#f2f3fb}
  th .th-inner{display:inline-flex;align-items:center;gap:6px}
  th .si{display:inline-flex;color:#c0c5d4}
  th.sorted .si{color:var(--accent)}
  th.sorted{color:var(--accent-dark)}
  tbody td{
    padding:14px 16px;border-bottom:1px solid var(--border);
    font-size:13.8px;vertical-align:top;
  }
  tbody tr{transition:background .12s}
  tbody tr:hover{background:#f8f9fd}
  tbody tr:last-child td{border-bottom:none}

  .col-date{width:120px}
  .col-event{width:190px}
  .col-person{width:190px}
  .col-rating{width:130px}
  .col-feedback{min-width:340px}

  .date-main{font-weight:600;font-size:13.5px}
  .date-sub{font-size:11.5px;color:var(--faint)}
  .event-name{font-weight:600;color:var(--text)}
  .person{display:flex;align-items:center;gap:10px}
  .avatar{
    width:32px;height:32px;border-radius:50%;flex:0 0 auto;
    display:flex;align-items:center;justify-content:center;
    font-size:11.5px;font-weight:700;
  }
  .person-name{font-weight:600;font-size:13.5px}
  .person-role{font-size:11.5px;color:var(--faint)}

  .rating-cell{display:flex;flex-direction:column;gap:4px}
  .stars{display:flex;gap:1.5px}
  .rating-pill{
    display:inline-flex;align-items:center;gap:4px;width:fit-content;
    font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;
  }
  .rating-pill.high{background:var(--green-soft);color:var(--green)}
  .rating-pill.mid{background:#fef4e0;color:#b45309}
  .rating-pill.low{background:var(--red-soft);color:var(--red)}

  .feedback-text{
    color:#454c60;font-size:13.5px;line-height:1.55;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  }
  .feedback-text.expanded{-webkit-line-clamp:unset;display:block}
  .more-btn{
    border:none;background:none;color:var(--accent);font-size:12.5px;font-weight:600;
    cursor:pointer;padding:4px 0 0;display:inline-flex;align-items:center;gap:3px;
  }
  .more-btn:hover{color:var(--accent-dark);text-decoration:underline}

  mark{background:#fde68a;color:inherit;border-radius:2px;padding:0 1px}

  .empty-state{padding:64px 24px;text-align:center;color:var(--muted)}
  .empty-state .icon{width:52px;height:52px;border-radius:14px;background:#f1f2f8;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;color:var(--faint)}
  .empty-state h3{font-size:15px;color:var(--text);margin-bottom:4px}
  .empty-state p{font-size:13px}

  .card-foot{
    padding:11px 18px;border-top:1px solid var(--border);background:#fafbfd;
    font-size:12px;color:var(--faint);display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;
  }

  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#cfd3e0;border-radius:8px;border:2px solid #f4f5f8}
  ::-webkit-scrollbar-track{background:transparent}

  @media (max-width:920px){
    .stats{grid-template-columns:repeat(2,1fr)}
  }
  @media (max-width:640px){
    .topbar{padding:20px 16px 58px}
    main{padding:0 14px 40px}
    .result-count{margin-left:0;width:100%}
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <div class="brand-mark">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="17" rx="2"/><path d="M8 2v4M16 2v4M3 9h18"/>
          <path d="M9.5 14.5l1.7 1.7 3.3-3.4"/>
        </svg>
      </div>
      <div>
        <h1>Event Feedback Dashboard</h1>
        <p>Participant responses across all company events</p>
      </div>
    </div>
    <div class="topbar-meta"><span class="dot-live"></span> Data refreshed Jul 17, 2026</div>
  </div>
</header>

<main class="lift">

  <!-- Stat cards -->
  <section class="stats" id="stats"></section>

  <!-- AI Summary -->
  <section class="ai-card" id="aiCard" aria-label="AI summary">
    <div class="ai-head">
      <div class="ai-badge">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2l1.9 5.6L19.5 9l-5.6 1.9L12 16.5l-1.9-5.6L4.5 9l5.6-1.4L12 2zm7 11l.95 2.8 2.8.95-2.8.95L19 20.5l-.95-2.8-2.8-.95 2.8-.95L19 13zM5.5 15l.75 2.2 2.2.75-2.2.75-.75 2.2-.75-2.2-2.2-.75 2.2-.75L5.5 15z"/>
        </svg>
      </div>
      <span class="ai-title">AI Summary</span>
      <span class="ai-tag">Beta</span>
      <button class="ai-close" id="aiClose" title="Close summary" aria-label="Close AI summary">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
      </button>
    </div>
    <div class="ai-body"><ul id="aiBullets"></ul></div>
    <div class="ai-foot">
      <span id="aiMeta"></span>
      <button class="btn-ghost" id="aiRegen">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36M21 3v6h-6"/></svg>
        Regenerate
      </button>
    </div>
  </section>

  <!-- Controls -->
  <section class="controls">
    <div class="search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.8-3.8"/></svg>
      <input type="text" id="searchInput" placeholder="Search events, participants, or feedback…" autocomplete="off" />
      <button class="search-clear" id="searchClear" aria-label="Clear search">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
      </button>
    </div>

    <button class="ai-reopen" id="aiReopen">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l1.9 5.6L19.5 9l-5.6 1.9L12 16.5l-1.9-5.6L4.5 9l5.6-1.4L12 2zm7 11l.95 2.8 2.8.95-2.8.95L19 20.5l-.95-2.8-2.8-.95 2.8-.95L19 13z"/></svg>
      AI Summary
    </button>

    <div class="chips" id="chips">
      <button class="chip active" data-chip="all">All ratings</button>
      <button class="chip" data-chip="positive">Positive · 4–5★</button>
      <button class="chip" data-chip="neutral">Neutral · 3★</button>
      <button class="chip" data-chip="negative">Negative · 1–2★</button>
    </div>

    <span class="result-count" id="resultCount"></span>
  </section>

  <!-- Table -->
  <section class="table-card">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th class="sortable col-date" data-key="date"><span class="th-inner">Date <span class="si"></span></span></th>
            <th class="sortable col-event" data-key="event"><span class="th-inner">Event <span class="si"></span></span></th>
            <th class="sortable col-person" data-key="participant"><span class="th-inner">Participant <span class="si"></span></span></th>
            <th class="sortable col-rating" data-key="rating"><span class="th-inner">Rating <span class="si"></span></span></th>
            <th class="sortable col-feedback" data-key="feedback"><span class="th-inner">Feedback <span class="si"></span></span></th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="card-foot">
      <span>Click a column header to sort · click again to reverse order</span>
      <span>Demonstration dataset · 30 generated responses</span>
    </div>
  </section>

</main>

<script>
(function(){
  "use strict";

  /* ============ Deterministic RNG ============ */
  function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;var t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
  const rnd = mulberry32(20260717);
  const pick = arr => arr[Math.floor(rnd()*arr.length)];

  /* ============ Data pools ============ */
  const EVENTS = [
    "Annual Leadership Summit","Product Roadmap Webinar","Customer Success Workshop",
    "Developer Relations Meetup","Q2 Sales Kickoff","UX Design Masterclass",
    "Data & AI Conference","Onboarding Bootcamp","Partner Enablement Day",
    "Cybersecurity Awareness Training","Marketing Analytics Deep Dive","Agile Transformation Offsite"
  ];
  const FIRST = ["Alex","Jordan","Priya","Marcus","Sofia","Daniel","Elena","Tom","Aisha","Robert","Mei","Carlos","Hannah","David","Nadia","Oliver","Grace","Liam","Ines","Victor","Rachel","Sam","Yuki","Ben","Clara","Omar","Julia","Ethan","Zara","Felix"];
  const LAST  = ["Carter","Nguyen","Patel","Thompson","Rossi","Kim","Novak","Baker","Haddad","Silva","Chen","Alvarez","Schmidt","Okafor","Johansson","Meyer","Dubois","Walsh","Kowalski","Tanaka","Reed","Moreau","Lindqvist","Costa","Weber","Ali","Brooks","Sato","Fontaine","Marsh"];
  const ROLES = ["Marketing Manager","Software Engineer","Sales Lead","Product Designer","HR Business Partner","Data Analyst","Account Executive","Operations Lead","UX Researcher","Solutions Architect","Customer Support Rep","Finance Manager"];

  const POS_OPEN = [
    "Overall, {e} exceeded my expectations.",
    "I genuinely enjoyed {e} from start to finish.",
    "{e} was one of the better sessions I've attended this year.",
    "Kudos to the organizing team — {e} was very well executed."
  ];
  const POS_DET = [
    "The speakers were well-prepared, and the material felt directly relevant to my day-to-day work.",
    "The pacing was excellent, and the breakout discussions gave everyone a chance to contribute.",
    "The venue, catering, and scheduling were all handled professionally, which made it easy to focus on the content.",
    "The mix of presentations and hands-on exercises kept the energy high throughout the day.",
    "Real-world case studies made the concepts easy to grasp and apply immediately."
  ];
  const POS_CLOSE = [
    "I would absolutely attend again and recommend it to my colleagues.",
    "Looking forward to the next edition.",
    "Great job to everyone involved in putting this together.",
    "Please keep this on the calendar for next year."
  ];
  const MID_OPEN = [
    "{e} was a solid event, though there is room for improvement.",
    "I had a decent experience at {e}, but a few things held it back.",
    "{e} delivered on some fronts and fell short on others."
  ];
  const MID_DET = [
    "Some sessions ran over time, which cut into the Q&A segments I was most looking forward to.",
    "The content was good but a bit too high-level for attendees already familiar with the topic.",
    "The morning sessions were stronger than the afternoon ones, which felt somewhat rushed.",
    "Networking opportunities were limited, and the room layout made mingling between sessions awkward."
  ];
  const MID_CLOSE = [
    "With a few tweaks, this could be excellent.",
    "I'd attend again if the agenda were tightened up.",
    "Hoping to see these points addressed next time."
  ];
  const NEG_OPEN = [
    "I left {e} feeling disappointed.",
    "Unfortunately, {e} did not meet my expectations.",
    "{e} fell short of what was promised in the published agenda."
  ];
  const NEG_DET = [
    "The sessions felt disorganized, and a couple of speakers appeared unprepared.",
    "Registration was chaotic, and the venue Wi-Fi failed repeatedly during live demos.",
    "Too much of the content was a sales pitch rather than actionable material.",
    "The Q&A was cut short both times I tried to ask a question, which was frustrating."
  ];
  const NEG_CLOSE = [
    "I hope the organizers take this feedback seriously.",
    "I likely won't return without significant changes.",
    "This one needs a rethink before the next run."
  ];
  const SUGG = [
    "One suggestion: sharing the slides in advance would help attendees follow along.",
    "Adding a dedicated networking block would make the day even more valuable.",
    "More hands-on exercises would help the material stick.",
    "A short pre-event survey could better match sessions to the audience's level.",
    "Clearer signage at the venue would save a lot of confusion at check-in.",
    "Recording the sessions for later viewing would be a big plus."
  ];

  function fill(tpl, ev){ return tpl.replace("{e}", ev); }
  function buildFeedback(rating, ev){
    let open, det, close;
    if(rating >= 4){ open = pick(POS_OPEN); det = pick(POS_DET); close = pick(POS_CLOSE); }
    else if(rating === 3){ open = pick(MID_OPEN); det = pick(MID_DET); close = pick(MID_CLOSE); }
    else { open = pick(NEG_OPEN); det = pick(NEG_DET); close = pick(NEG_CLOSE); }
    let parts = [fill(open, ev), det];
    if(rnd() < 0.65) parts.push(pick(SUGG));
    else if(rating >= 4 && rnd() < 0.4) parts.push(pick(POS_DET));
    parts.push(close);
    return parts.join(" ");
  }

  const RATING_BAG = [5,5,5,5,5,5,5,5,4,4,4,4,4,4,3,3,3,2,2,1];
  const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const WDAYS  = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

  const usedNames = new Set();
  const data = [];
  for(let i=0;i<30;i++){
    let name, tries=0;
    do { name = pick(FIRST)+" "+pick(LAST); tries++; } while(usedNames.has(name) && tries<40);
    usedNames.add(name);
    const dayOffset = Math.floor(rnd()*58);           // May 20 – Jul 16, 2026
    const d = new Date(2026,4,20); d.setDate(d.getDate()+dayOffset);
    const rating = pick(RATING_BAG);
    const ev = pick(EVENTS);
    data.push({
      id:i+1,
      date:d,
      event:ev,
      participant:name,
      role:pick(ROLES),
      rating:rating,
      feedback:buildFeedback(rating, ev)
    });
  }

  /* ============ Helpers ============ */
  const $ = s => document.querySelector(s);
  const $$ = s => Array.from(document.querySelectorAll(s));

  function escapeHtml(str){
    return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }
  function escapeReg(s){ return s.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"); }

  let tokens = [];
  function highlight(text){
    let out = escapeHtml(text);
    /* skip tokens that would collide with HTML entities after escaping */
    tokens.filter(t=>!/[&<>"]/.test(t)).forEach(t=>{
      const re = new RegExp("("+escapeReg(escapeHtml(t))+")","gi");
      out = out.replace(re,"<mark>$1</mark>");
    });
    return out;
  }

  function fmtDate(d){ return MONTHS[d.getMonth()]+" "+d.getDate()+", "+d.getFullYear(); }
  function fmtDay(d){ return WDAYS[d.getDay()]; }

  function initials(name){
    return name.split(" ").map(p=>p[0]).join("").toUpperCase();
  }
  function avatarStyle(name){
    let h=0; for(let i=0;i<name.length;i++) h=(h*31+name.charCodeAt(i))>>>0;
    const hue = 215 + (h % 55);
    return "background:hsl("+hue+",55%,93%);color:hsl("+hue+",45%,36%)";
  }

  function starsSVG(r){
    let s = '<span class="stars" aria-label="'+r+' out of 5 stars">';
    for(let i=1;i<=5;i++){
      const c = i<=r ? "var(--amber)" : "var(--star-empty)";
      s += '<svg width="14" height="14" viewBox="0 0 24 24" fill="'+c+'"><path d="M12 2.6l2.85 5.78 6.38.93-4.62 4.5 1.09 6.36L12 17.1l-5.7 3.07 1.09-6.36-4.62-4.5 6.38-.93z"/></svg>';
    }
    return s + "</span>";
  }
  function ratingPill(r){
    const cls = r>=4 ? "high" : (r===3 ? "mid" : "low");
    const lbl = r>=4 ? "Positive" : (r===3 ? "Neutral" : "Negative");
    return '<span class="rating-pill '+cls+'">'+r+'.0 · '+lbl+'</span>';
  }

  /* ============ Stats ============ */
  function renderStats(){
    const total = data.length;
    const avg = (data.reduce((a,r)=>a+r.rating,0)/total).toFixed(1);
    const pos = Math.round(100*data.filter(r=>r.rating>=4).length/total);
    const neg = Math.round(100*data.filter(r=>r.rating<=2).length/total);
    const events = new Set(data.map(r=>r.event)).size;
    $("#stats").innerHTML =
      statCard("indigo", iconChat(), "Total Responses", total, events+" events covered") +
      statCard("amber", iconStar(), "Average Rating", avg+" / 5", "across all events") +
      statCard("green", iconUp(), "Positive Sentiment", pos+"%", "rated 4★ or higher") +
      statCard("red", iconDown(), "Needs Attention", neg+"%", "rated 2★ or lower");
  }
  function statCard(color, icon, label, value, sub){
    return '<div class="stat"><div class="stat-icon '+color+'">'+icon+'</div>'+
           '<div><div class="stat-label">'+label+'</div><div class="stat-value">'+value+'</div>'+
           '<div class="stat-sub">'+sub+'</div></div></div>';
  }
  function iconChat(){return '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a8 8 0 0 1-8 8H4l2-3a8 8 0 1 1 15-5z"/></svg>';}
  function iconStar(){return '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.6l2.85 5.78 6.38.93-4.62 4.5 1.09 6.36L12 17.1l-5.7 3.07 1.09-6.36-4.62-4.5 6.38-.93z"/></svg>';}
  function iconUp(){return '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17l6-6 4 4 8-8"/><path d="M14 7h7v7"/></svg>';}
  function iconDown(){return '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7l6 6 4-4 8 8"/><path d="M14 17h7v-7"/></svg>';}

  /* ============ AI Summary ============ */
  let aiVariant = 0;
  function buildAISummary(){
    const total = data.length;
    const avg = (data.reduce((a,r)=>a+r.rating,0)/total);
    const posPct = Math.round(100*data.filter(r=>r.rating>=4).length/total);
    const negPct = Math.round(100*data.filter(r=>r.rating<=2).length/total);

    const byEvent = {};
    data.forEach(r=>{ (byEvent[r.event] = byEvent[r.event] || []).push(r.rating); });
    const evStats = Object.entries(byEvent).map(([name,arr])=>({
      name, avg: arr.reduce((a,b)=>a+b,0)/arr.length, n: arr.length
    }));
    evStats.sort((a,b)=>b.avg-a.avg);
    const pool = evStats.filter(e=>e.n>=2);
    const use = pool.length>=2 ? pool : evStats;
    const top = use[0], low = use[use.length-1];
    const resp = n => n + (n===1 ? " response" : " responses");

    const THEMES = [
      {label:"the quality of the speakers", words:["speaker","presenter"]},
      {label:"venue & logistics", words:["venue","wi-fi","catering","signage","registration","check-in","room layout"]},
      {label:"content relevance", words:["content","material","sessions","agenda","case studies","high-level"]},
      {label:"networking opportunities", words:["networking","mingling","breakout"]},
      {label:"pacing & timing", words:["pacing","over time","rushed","q&a","cut short"]}
    ];
    function themeScore(subset){
      const txt = subset.map(r=>r.feedback.toLowerCase()).join(" ");
      return THEMES.map(t=>({label:t.label, score:t.words.reduce((a,w)=>a+(txt.split(w).length-1),0)}))
                   .sort((a,b)=>b.score-a.score);
    }
    const strengths = themeScore(data.filter(r=>r.rating>=4));
    const improve   = themeScore(data.filter(r=>r.rating<=3));
    const s1 = strengths[0].label, s2 = strengths[1].label;
    const i1 = improve[0].score>0 ? improve[0].label : "agenda structure";

    const ACTION_MAP = {
      "the quality of the speakers":"coach speakers on preparation and tighten the Q&A format",
      "venue & logistics":"audit venue logistics (Wi-Fi, signage, check-in flow) before the next event",
      "content relevance":"segment sessions by experience level so content lands for every audience",
      "networking opportunities":"add a dedicated networking block and rethink the room layout",
      "pacing & timing":"enforce stricter session timekeeping to protect Q&A segments"
    };
    const action = ACTION_MAP[i1] || "review the lowest-rated formats with their owners";

    const v = aiVariant % 2;
    const b1 = v===0
      ? 'Across <b>'+total+' responses</b>, the average rating is <b>'+avg.toFixed(1)+' / 5</b>. <b>'+posPct+'%</b> of attendees gave 4 stars or more, while <b>'+negPct+'%</b> rated their experience 2 stars or lower.'
      : 'Overall sentiment is healthy: <b>'+posPct+'%</b> of the <b>'+total+' responses</b> are positive and the average rating sits at <b>'+avg.toFixed(1)+' / 5</b>. Only <b>'+negPct+'%</b> of feedback is clearly negative.';
    const b2 = v===0
      ? '<b>'+top.name+'</b> is the standout performer ('+top.avg.toFixed(1)+' avg over '+resp(top.n)+'), while <b>'+low.name+'</b> trails the pack ('+low.avg.toFixed(1)+' avg) and may deserve a format review.'
      : 'Best-rated session: <b>'+top.name+'</b> ('+top.avg.toFixed(1)+' avg). Watch-list: <b>'+low.name+'</b> ('+low.avg.toFixed(1)+' avg over '+resp(low.n)+') — worth a retrospective with its organizers.';
    const b3 = 'Attendees most frequently praise <b>'+s1+'</b> and <b>'+s2+'</b>. The most common improvement requests touch on <b>'+i1+'</b>.';
    const b4 = v===0
      ? 'Suggested next step: <b>'+action+'</b>. Repeating what works at <b>'+top.name+'</b> across other events should lift overall scores.'
      : 'Recommendation: <b>'+action+'</b>, and consider templating the <b>'+top.name+'</b> format as the standard for future sessions.';

    const dots = ["c1","c2","c3","c4"];
    $("#aiBullets").innerHTML = [b1,b2,b3,b4].map((b,i)=>
      '<li><span class="ai-dot '+dots[i]+'"></span><span>'+b+'</span></li>').join("");
    $("#aiMeta").textContent = "Generated from "+total+" responses · just now";
  }

  const aiCard = $("#aiCard");
  $("#aiClose").addEventListener("click", ()=>{
    aiCard.classList.add("closing");
    setTimeout(()=>{ aiCard.style.display="none"; $("#aiReopen").classList.add("visible"); }, 240);
  });
  $("#aiReopen").addEventListener("click", ()=>{
    aiCard.style.display=""; $("#aiReopen").classList.remove("visible");
    requestAnimationFrame(()=>requestAnimationFrame(()=>aiCard.classList.remove("closing")));
  });
  $("#aiRegen").addEventListener("click", ()=>{
    aiVariant++;
    buildAISummary();
    $("#aiMeta").textContent = "Generated from "+data.length+" responses · regenerated";
  });

  /* ============ Filtering / Sorting / Rendering ============ */
  const state = { q:"", chip:"all", sortKey:"date", sortDir:"desc" };
  const DEFAULT_DIR = { date:"desc", rating:"desc", event:"asc", participant:"asc", feedback:"asc" };

  const ICONS = {
    none:'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M8 9l4-4 4 4"/><path d="M8 15l4 4 4-4"/></svg>',
    asc: '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6 15l6-6 6 6"/></svg>',
    desc:'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>'
  };

  function updateSortIndicators(){
    $$("thead th.sortable").forEach(th=>{
      const key = th.dataset.key;
      const si = th.querySelector(".si");
      if(key === state.sortKey){
        th.classList.add("sorted");
        si.innerHTML = state.sortDir === "asc" ? ICONS.asc : ICONS.desc;
        th.setAttribute("aria-sort", state.sortDir === "asc" ? "ascending" : "descending");
      } else {
        th.classList.remove("sorted");
        si.innerHTML = ICONS.none;
        th.removeAttribute("aria-sort");
      }
    });
  }

  function getVisible(){
    tokens = state.q.toLowerCase().split(/\s+/).filter(Boolean);
    let rows = data.filter(r=>{
      if(state.chip==="positive" && !(r.rating>=4)) return false;
      if(state.chip==="neutral"  && r.rating!==3)   return false;
      if(state.chip==="negative" && !(r.rating<=2)) return false;
      if(tokens.length){
        const hay = (r.event+" "+r.participant+" "+r.role+" "+r.feedback+" "+r.rating+" "+fmtDate(r.date)).toLowerCase();
        if(!tokens.every(t=>hay.includes(t))) return false;
      }
      return true;
    });
    const k = state.sortKey, dir = state.sortDir === "asc" ? 1 : -1;
    rows.sort((a,b)=>{
      let cmp;
      if(k==="date") cmp = a.date - b.date;
      else if(k==="rating") cmp = a.rating - b.rating;
      else cmp = a[k].localeCompare(b[k]);
      if(cmp===0) cmp = a.id - b.id;
      return cmp*dir;
    });
    return rows;
  }

  function render(){
    const rows = getVisible();
    const tbody = $("#tbody");
    if(rows.length===0){
      tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state">'+
        '<div class="icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.8-3.8M8.5 11h5"/></svg></div>'+
        '<h3>No matching entries</h3><p>Try a different keyword or clear the rating filter.</p></div></td></tr>';
    } else {
      tbody.innerHTML = rows.map(r=>{
        return '<tr>'+
          '<td><div class="date-main">'+fmtDate(r.date)+'</div><div class="date-sub">'+fmtDay(r.date)+'</div></td>'+
          '<td><span class="event-name">'+highlight(r.event)+'</span></td>'+
          '<td><div class="person"><span class="avatar" style="'+avatarStyle(r.participant)+'">'+initials(r.participant)+'</span>'+
              '<span><div class="person-name">'+highlight(r.participant)+'</div><div class="person-role">'+highlight(r.role)+'</div></span></div></td>'+
          '<td><div class="rating-cell">'+starsSVG(r.rating)+ratingPill(r.rating)+'</div></td>'+
          '<td><div class="feedback-text" data-fid="'+r.id+'">'+highlight(r.feedback)+'</div>'+
              '<button class="more-btn" data-more="'+r.id+'">Read more <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg></button></td>'+
        '</tr>';
      }).join("");
    }
    $("#resultCount").innerHTML = 'Showing <b>'+rows.length+'</b> of <b>'+data.length+'</b> entries';
    updateSortIndicators();
  }

  /* Expand / collapse long feedback (event delegation) */
  $("#tbody").addEventListener("click", e=>{
    const btn = e.target.closest("[data-more]");
    if(!btn) return;
    const cell = btn.parentElement.querySelector(".feedback-text");
    const expanded = cell.classList.toggle("expanded");
    btn.innerHTML = expanded
      ? 'Show less <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 15l6-6 6 6"/></svg>'
      : 'Read more <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>';
  });

  /* Sorting */
  $$("thead th.sortable").forEach(th=>{
    th.addEventListener("click", ()=>{
      const key = th.dataset.key;
      if(state.sortKey === key){
        state.sortDir = state.sortDir === "asc" ? "desc" : "asc";
      } else {
        state.sortKey = key;
        state.sortDir = DEFAULT_DIR[key] || "asc";
      }
      render();
    });
  });

  /* Search */
  const searchInput = $("#searchInput"), searchClear = $("#searchClear");
  searchInput.addEventListener("input", ()=>{
    state.q = searchInput.value.trim();
    searchClear.classList.toggle("visible", state.q.length>0);
    render();
  });
  searchClear.addEventListener("click", ()=>{
    searchInput.value=""; state.q="";
    searchClear.classList.remove("visible");
    searchInput.focus();
    render();
  });

  /* Rating chips */
  $("#chips").addEventListener("click", e=>{
    const chip = e.target.closest(".chip");
    if(!chip) return;
    $$("#chips .chip").forEach(c=>c.classList.remove("active"));
    chip.classList.add("active");
    state.chip = chip.dataset.chip;
    render();
  });

  /* ============ Init ============ */
  renderStats();
  buildAISummary();
  render();
})();
</script>
</body>
</html>
