<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>World Clock — Live times around the globe</title>
<meta name="description" content="Track live local times in cities around the world, with day/night themes, a 24-hour timeline and 12/24-hour formats." />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8C%8D%3C/text%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #070a13;
    --text: #eef2ff;
    --muted: #8b93a7;
    --panel: rgba(255, 255, 255, .05);
    --border: rgba(255, 255, 255, .1);
    --radius: 22px;
    --font-body: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    --font-disp: 'Space Grotesk', 'Inter', system-ui, sans-serif;
  }

  html { scroll-behavior: smooth; }

  body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: -1;
    pointer-events: none;
    background:
      radial-gradient(900px 520px at 12% -12%, rgba(99, 102, 241, .17), transparent 60%),
      radial-gradient(760px 480px at 92% -6%, rgba(34, 211, 238, .12), transparent 60%),
      radial-gradient(1000px 640px at 50% 118%, rgba(168, 85, 247, .13), transparent 62%);
  }

  button { font-family: inherit; }

  .container { max-width: 1180px; margin: 0 auto; padding: 0 22px; }

  /* ---------- Header ---------- */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 30;
    background: rgba(7, 10, 19, .72);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid rgba(255, 255, 255, .06);
  }
  .topbar-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    flex-wrap: wrap;
    padding-top: 14px;
    padding-bottom: 14px;
  }
  .brand { display: flex; align-items: center; gap: 13px; }
  .brand-icon {
    width: 42px; height: 42px;
    border-radius: 13px;
    display: grid; place-items: center;
    color: #fff;
    background: linear-gradient(135deg, #6366f1, #8b5cf6 55%, #22d3ee);
    box-shadow: 0 6px 18px rgba(99, 102, 241, .4), inset 0 1px 0 rgba(255, 255, 255, .35);
    flex-shrink: 0;
  }
  .brand-icon svg { width: 22px; height: 22px; }
  h1 { font-family: var(--font-disp); font-size: 21px; font-weight: 700; letter-spacing: -.3px; }
  h1 .grad {
    background: linear-gradient(90deg, #a5b4fc, #67e8f9);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .subtitle { font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; margin-top: 1px; }

  .controls { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

  .segmented {
    display: flex;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 4px;
  }
  .segmented button {
    border: 0;
    background: transparent;
    color: var(--muted);
    font-size: 12.5px;
    font-weight: 600;
    padding: 7px 15px;
    border-radius: 999px;
    cursor: pointer;
    transition: all .18s ease;
  }
  .segmented button:hover:not(.active) { color: var(--text); }
  .segmented button.active {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: #fff;
    box-shadow: 0 3px 10px rgba(124, 92, 246, .4);
  }

  .add-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 17px;
    border-radius: 999px;
    border: 0;
    cursor: pointer;
    background: linear-gradient(135deg, #6366f1, #8b5cf6 55%, #c026d3);
    color: #fff;
    font-weight: 600;
    font-size: 13.5px;
    letter-spacing: .1px;
    box-shadow: 0 6px 20px rgba(124, 92, 246, .35), inset 0 1px 0 rgba(255, 255, 255, .25);
    transition: transform .18s ease, box-shadow .18s ease;
  }
  .add-btn:hover { transform: translateY(-1px); box-shadow: 0 10px 28px rgba(124, 92, 246, .5), inset 0 1px 0 rgba(255,255,255,.25); }
  .add-btn:active { transform: translateY(0) scale(.97); }
  .add-btn svg { width: 15px; height: 15px; }

  /* ---------- Grid & cards ---------- */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 18px;
    padding-top: 26px;
    padding-bottom: 8px;
  }

  .card {
    position: relative;
    border-radius: var(--radius);
    padding: 20px 20px 16px;
    overflow: hidden;
    color: #fff;
    border: 1px solid rgba(255, 255, 255, .15);
    box-shadow: 0 12px 32px rgba(0, 0, 0, .38), inset 0 1px 0 rgba(255, 255, 255, .14);
    transition: transform .25s ease, box-shadow .25s ease, background 1s ease;
    animation: cardIn .55s cubic-bezier(.22, .8, .3, 1) both;
  }
  .card:hover { transform: translateY(-4px); box-shadow: 0 18px 44px rgba(0, 0, 0, .5), inset 0 1px 0 rgba(255,255,255,.14); }
  .card.removing { animation: cardOut .24s ease both; pointer-events: none; }

  .card > :not(.stars) { position: relative; z-index: 1; }

  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    transition: opacity .9s ease;
  }
  .card::after {
    content: '';
    position: absolute;
    top: 16px;
    right: 54px;
    width: 46px;
    height: 46px;
    border-radius: 50%;
    opacity: 0;
    pointer-events: none;
    z-index: 0;
    transition: opacity .9s ease;
  }

  /* Period themes */
  .period-night     { background: linear-gradient(160deg, #0a0f24 0%, #131a3a 55%, #1a2247 100%); }
  .period-dawn      { background: linear-gradient(160deg, #2e2a63 0%, #7c4472 45%, #d9735c 78%, #f0a05c 100%); }
  .period-morning   { background: linear-gradient(160deg, #1a6aa8 0%, #3f9fd2 55%, #7cc6e6 100%); }
  .period-afternoon { background: linear-gradient(160deg, #0b53a0 0%, #1e83d4 60%, #3ba3e2 100%); }
  .period-evening   { background: linear-gradient(160deg, #272052 0%, #6d3268 42%, #c04f54 72%, #ef8f42 100%); }

  .period-night::before     { background: radial-gradient(220px 160px at 85% 12%, rgba(190, 210, 255, .14), transparent 70%); }
  .period-dawn::before      { background: radial-gradient(280px 210px at 50% 115%, rgba(255, 190, 120, .55), transparent 70%); }
  .period-morning::before   { background: radial-gradient(260px 200px at 85% -5%, rgba(255, 246, 205, .5), transparent 70%); }
  .period-afternoon::before { background: radial-gradient(260px 200px at 85% -5%, rgba(255, 246, 205, .55), transparent 70%); }
  .period-evening::before   { background: radial-gradient(290px 220px at 78% 116%, rgba(255, 170, 90, .5), transparent 70%); }

  .period-morning::after,
  .period-afternoon::after {
    opacity: 1;
    background: radial-gradient(circle at 38% 34%, #fffbe8, #ffed9e 52%, #ffd23e 78%, #ffb61e);
    box-shadow: 0 0 26px 6px rgba(255, 214, 90, .55);
    animation: sunPulse 5s ease-in-out infinite;
  }
  .period-night::after {
    opacity: 1;
    background: radial-gradient(circle at 36% 34%, #f4f7ff, #cdd7f2 55%, #9fb0d8);
    box-shadow: 0 0 22px 4px rgba(190, 205, 255, .35);
  }

  /* Stars */
  .stars {
    position: absolute;
    inset: 0;
    z-index: 0;
    opacity: 0;
    transition: opacity 1.1s ease;
    pointer-events: none;
  }
  .period-night .stars { opacity: 1; }
  .stars span {
    position: absolute;
    width: 2px; height: 2px;
    border-radius: 50%;
    background: #fff;
    opacity: .6;
    animation: twinkle 3s ease-in-out infinite;
  }

  /* Card internals */
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
  .city { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
  .city-name {
    font-size: 16.5px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    text-shadow: 0 1px 8px rgba(0, 0, 0, .22);
  }
  .city-name .flag { font-size: 17px; }
  .city-sub { font-size: 12.5px; color: rgba(255, 255, 255, .8); font-weight: 500; font-variant-numeric: tabular-nums; }

  .remove {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 28px; height: 28px;
    border-radius: 50%;
    display: grid; place-items: center;
    background: rgba(8, 10, 20, .3);
    border: 1px solid rgba(255, 255, 255, .14);
    color: rgba(255, 255, 255, .9);
    cursor: pointer;
    opacity: 0;
    transform: scale(.85);
    transition: opacity .18s ease, transform .18s ease, background .18s ease;
    backdrop-filter: blur(4px);
    z-index: 2;
  }
  .card:hover .remove, .card:focus-within .remove { opacity: 1; transform: none; }
  .remove:hover { background: rgba(239, 68, 68, .9); }
  .remove svg { width: 13px; height: 13px; }
  @media (hover: none) { .remove { opacity: .85; transform: none; } }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 11px;
    border-radius: 999px;
    background: rgba(255, 255, 255, .16);
    border: 1px solid rgba(255, 255, 255, .2);
    backdrop-filter: blur(3px);
    font-size: 11.5px;
    font-weight: 600;
    letter-spacing: .3px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .badge svg { width: 13px; height: 13px; }

  .clock { display: flex; align-items: baseline; margin: 12px 0 6px; }
  .t-main {
    font-family: var(--font-disp);
    font-size: 52px;
    font-weight: 600;
    letter-spacing: -1.5px;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    text-shadow: 0 2px 16px rgba(0, 0, 0, .3);
  }
  .t-sec {
    font-family: var(--font-disp);
    font-size: 21px;
    font-weight: 500;
    opacity: .75;
    margin-left: 2px;
    font-variant-numeric: tabular-nums;
  }
  .t-ampm {
    margin-left: 9px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: .6px;
    padding: 3px 8px;
    border-radius: 7px;
    background: rgba(255, 255, 255, .22);
  }
  .t-ampm[hidden] { display: none; }

  .meta { display: flex; align-items: center; gap: 8px; margin-top: 2px; font-size: 12.5px; color: rgba(255, 255, 255, .88); }
  .meta .date { font-weight: 500; }
  .meta .rel { margin-left: auto; font-variant-numeric: tabular-nums; color: rgba(255, 255, 255, .78); font-size: 12px; text-align: right; }

  .chip {
    display: inline-flex;
    align-items: center;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: .4px;
    text-transform: uppercase;
  }
  .chip-local { background: linear-gradient(135deg, #34d399, #22d3ee); color: #04121a; }
  .chip-day { background: rgba(255, 255, 255, .22); color: #fff; letter-spacing: .3px; }
  .chip-day[hidden] { display: none; }

  /* 24h timeline */
  .timeline {
    margin-top: 18px;
    height: 6px;
    border-radius: 999px;
    position: relative;
    background: linear-gradient(90deg,
      #0e1430 0%, #16204a 17%, #7a4a72 24%, #e58a63 29%, #f4b267 33%,
      #79bce6 40%, #3f96d6 58%, #e5a55e 70%, #b04f6c 77%, #232050 86%, #0e1430 100%);
    box-shadow: inset 0 1px 2px rgba(0, 0, 0, .4);
  }
  .marker {
    position: absolute;
    top: 50%;
    left: 0;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: #fff;
    border: 2px solid rgba(10, 14, 30, .55);
    box-shadow: 0 0 0 3px rgba(255, 255, 255, .35), 0 0 12px rgba(255, 255, 255, .85);
    transform: translate(-50%, -50%);
    transition: left .45s linear;
  }
  .ticks {
    margin-top: 7px;
    display: flex;
    justify-content: space-between;
    font-size: 9.5px;
    letter-spacing: .5px;
    color: rgba(255, 255, 255, .58);
    font-variant-numeric: tabular-nums;
  }

  /* ---------- Empty state ---------- */
  .empty {
    margin-top: 38px;
    border: 1.5px dashed rgba(255, 255, 255, .16);
    border-radius: var(--radius);
    padding: 54px 24px;
    text-align: center;
    color: var(--muted);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .empty[hidden] { display: none; }
  .empty h2 { color: var(--text); font-size: 19px; font-family: var(--font-disp); }
  .empty p { font-size: 13.5px; max-width: 340px; }
  .empty-icon { font-size: 36px; animation: float 4s ease-in-out infinite; }
  .empty .add-btn { margin-top: 12px; }

  /* ---------- Footer ---------- */
  footer { padding: 36px 22px 42px; text-align: center; color: var(--muted); font-size: 12px; line-height: 1.7; }
  kbd {
    background: rgba(255, 255, 255, .08);
    border: 1px solid rgba(255, 255, 255, .16);
    border-bottom-width: 2px;
    padding: 1px 6px;
    border-radius: 6px;
    font-size: 11px;
    font-family: var(--font-disp);
  }

  /* ---------- Modal ---------- */
  .modal {
    position: fixed;
    inset: 0;
    z-index: 50;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background: rgba(4, 6, 12, .62);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    opacity: 0;
    transition: opacity .2s ease;
  }
  .modal[hidden] { display: none; }
  .modal.open { opacity: 1; }
  .modal-card {
    width: min(560px, 100%);
    max-height: min(640px, 86vh);
    display: flex;
    flex-direction: column;
    background: #0d1220;
    border: 1px solid rgba(255, 255, 255, .12);
    border-radius: 20px;
    box-shadow: 0 30px 80px rgba(0, 0, 0, .6);
    transform: translateY(12px) scale(.98);
    transition: transform .24s cubic-bezier(.2, .8, .3, 1.1);
    overflow: hidden;
  }
  .modal.open .modal-card { transform: none; }
  .modal-head { display: flex; align-items: center; justify-content: space-between; padding: 18px 18px 8px; }
  .modal-head h2 { font-size: 16.5px; font-family: var(--font-disp); letter-spacing: -.2px; }
  .icon-btn {
    width: 32px; height: 32px;
    border-radius: 10px;
    display: grid; place-items: center;
    background: rgba(255, 255, 255, .06);
    border: 1px solid rgba(255, 255, 255, .1);
    color: var(--muted);
    cursor: pointer;
    transition: all .15s ease;
  }
  .icon-btn:hover { color: var(--text); background: rgba(255, 255, 255, .12); }
  .icon-btn svg { width: 14px; height: 14px; }

  .search-box { position: relative; margin: 4px 18px 12px; }
  .search-box svg {
    position: absolute;
    left: 13px; top: 50%;
    transform: translateY(-50%);
    width: 15px; height: 15px;
    color: var(--muted);
    pointer-events: none;
  }
  .search-box input {
    width: 100%;
    height: 44px;
    padding: 0 14px 0 38px;
    border-radius: 13px;
    border: 1px solid rgba(255, 255, 255, .12);
    background: rgba(255, 255, 255, .05);
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color .15s ease, box-shadow .15s ease, background .15s ease;
  }
  .search-box input:focus {
    border-color: rgba(129, 140, 248, .7);
    box-shadow: 0 0 0 3px rgba(99, 102, 241, .22);
    background: rgba(255, 255, 255, .07);
  }
  .search-box input::placeholder { color: #626b80; }

  .city-list {
    padding: 2px 12px 14px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .city-list::-webkit-scrollbar { width: 8px; }
  .city-list::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, .14); border-radius: 8px; }
  .city-list::-webkit-scrollbar-track { background: transparent; }

  .city-row {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    text-align: left;
    padding: 10px 12px;
    border-radius: 14px;
    border: 1px solid transparent;
    background: transparent;
    color: var(--text);
    cursor: pointer;
    transition: background .15s ease, border-color .15s ease;
  }
  .city-row:hover:not(.added) { background: rgba(255, 255, 255, .06); border-color: rgba(255, 255, 255, .08); }
  .city-row.added { opacity: .5; cursor: default; }
  .city-row .flag { font-size: 21px; flex-shrink: 0; }
  .city-row .names { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .city-row .n { font-weight: 600; font-size: 14.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .city-row .c { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .row-right { display: flex; flex-direction: column; align-items: flex-end; gap: 1px; flex-shrink: 0; }
  .row-time { font-family: var(--font-disp); font-variant-numeric: tabular-nums; font-weight: 600; font-size: 14px; }
  .row-gmt { font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .row-action {
    width: 26px; height: 26px;
    border-radius: 50%;
    display: grid; place-items: center;
    background: rgba(99, 102, 241, .18);
    color: #a5b4fc;
    flex-shrink: 0;
  }
  .city-row.added .row-action { background: rgba(52, 211, 153, .15); color: #6ee7b7; }
  .row-action svg { width: 14px; height: 14px; }

  .no-results { padding: 30px 16px; text-align: center; color: var(--muted); font-size: 13.5px; }

  /* ---------- Animations ---------- */
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(14px) scale(.97); }
    to   { opacity: 1; transform: none; }
  }
  @keyframes cardOut {
    to { opacity: 0; transform: translateY(8px) scale(.95); }
  }
  @keyframes twinkle {
    0%, 100% { opacity: .15; transform: scale(.8); }
    50%      { opacity: .95; transform: scale(1.2); }
  }
  @keyframes sunPulse {
    50% { box-shadow: 0 0 40px 10px rgba(255, 214, 90, .8); }
  }
  @keyframes float {
    50% { transform: translateY(-7px); }
  }

  /* ---------- Responsive ---------- */
  @media (max-width: 560px) {
    .topbar-inner { justify-content: center; }
    .brand { width: 100%; justify-content: center; }
    .controls { width: 100%; justify-content: center; }
    .grid { grid-template-columns: 1fr; }
    .t-main { font-size: 46px; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: .01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: .01ms !important;
    }
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="container topbar-inner">
    <div class="brand">
      <div class="brand-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
      </div>
      <div>
        <h1>World<span class="grad">Clock</span></h1>
        <p class="subtitle" id="localInfo">Loading local time…</p>
      </div>
    </div>
    <div class="controls">
      <div class="segmented" role="group" aria-label="Time format">
        <button type="button" id="btn12" class="active" aria-pressed="true">12h</button>
        <button type="button" id="btn24" aria-pressed="false">24h</button>
      </div>
      <button type="button" class="add-btn" id="addBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add city
      </button>
    </div>
  </div>
</header>

<main class="container">
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" hidden>
    <div class="empty-icon" aria-hidden="true">🌍</div>
    <h2>No cities on your board</h2>
    <p>Add a city to start tracking the time anywhere in the world.</p>
    <button type="button" class="add-btn" id="emptyAddBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add your first city
    </button>
  </div>
</main>

<footer class="container">
  <p>Times use your browser's IANA timezone database (DST-aware) and tick live. Your board and format preference are saved on this device.<br/>Tip: press <kbd>A</kbd> to add a city.</p>
</footer>

<div class="modal" id="modal" hidden>

/* ================= City database ================= */

  ["Dhaka","Bangladesh","Asia/Dhaka","🇧🇩"],
  ["Yangon","Myanmar","Asia/Yangon","🇲🇲"],
  ["Bangkok","Thailand","Asia/Bangkok","🇹🇭"],
  ["Jakarta","Indonesia","Asia/Jakarta","🇮🇩"],
  ["Kuala Lumpur","Malaysia","Asia/Kuala_Lumpur","🇲🇾"],
  ["Singapore","Singapore","Asia/Singapore","🇸🇬"],
  ["Manila","Philippines","Asia/Manila","🇵🇭"],

  ["Brisbane","Australia","Australia/Brisbane","🇦🇺"],

  ["Auckland","New Zealand","Pacific/Auckland","🇳🇿"],
  ["Suva","Fiji","Pacific/Fiji","🇫🇯"]
];
const CITY_DB = RAW_CITIES
  .map(([city, country, tz, flag]) => ({ city, country, tz, flag }))
  .sort((a, b) => a.city.localeCompare(b.city));

/* ================= Time-of-day periods ================= */
const PERIODS = {
  dawn:      { label: 'Dawn',      icon: 'sunrise' },
  morning:   { label: 'Morning',   icon: 'sun' },
  afternoon: { label: 'Afternoon', icon: 'sun' },
  evening:   { label: 'Evening',   icon: 'sunset' },
  night:     { label: 'Night',     icon: 'moon' }
};
const PERIOD_KEYS = Object.keys(PERIODS);
function periodForHour(h) {
  if (h >= 5 && h < 8)  return 'dawn';
  if (h >= 8 && h < 12) return 'morning';
  if (h >= 12 && h < 17) return 'afternoon';
  if (h >= 17 && h < 20) return 'evening';
  return 'night';
}

/* ================= State & persistence ================= */
const LS_CITIES = 'worldclock.cities.v1';
const LS_HOUR12 = 'worldclock.hour12.v1';

const localTz = Intl.DateTimeFormat().resolvedOptions().timeZone || 'UTC';

const prettyTz = (tz) => tz.split('/').pop().replace(/_/g, ' ');
const isValidTz = (tz) => {
  try { new Intl.DateTimeFormat('en-US', { timeZone: tz }); return true; }
  catch (e) { return false; }
};

function synthesizeLocal() {
  return { city: prettyTz(localTz), country: 'Your location', tz: localTz, flag: '📍' };
}
function defaultCities() {
  const picks = ['America/New_York', 'Europe/London', 'Asia/Dubai', 'Asia/Tokyo', 'Australia/Sydney'];
  const out = [];
  const seen = new Set();
  const localEntry = CITY_DB.find(c => c.tz === localTz) || synthesizeLocal();
  out.push(localEntry);
  seen.add(keyOf(localEntry));
  for (const tz of picks) {
    const e = CITY_DB.find(c => c.tz === tz);
    if (e && !seen.has(keyOf(e))) { out.push(e); seen.add(keyOf(e)); }
  }
  return out;
}
function loadHour12() {
  try {
    const v = JSON.parse(localStorage.getItem(LS_HOUR12));
    return typeof v === 'boolean' ? v : true;
  } catch (e) { return true; }
}
function loadCities() {
  try {
    const raw = localStorage.getItem(LS_CITIES);
    if (raw !== null) {
      const arr = JSON.parse(raw);
      if (Array.isArray(arr)) {
        return arr
          .filter(c => c && typeof c.tz === 'string' && isValidTz(c.tz))
          .map(c => ({
            city: String(c.city || prettyTz(c.tz)),
            country: String(c.country || ''),
            tz: c.tz,
            flag: String(c.flag || '🏙️')
          }));
      }
    }
  } catch (e) { /* fall through to defaults */ }
  return defaultCities();
}

const state = { cities: [], hour12: loadHour12() };

function save() {
  try {
    localStorage.setItem(LS_CITIES, JSON.stringify(state.cities));
    localStorage.setItem(LS_HOUR12, JSON.stringify(state.hour12));
  } catch (e) { /* storage unavailable */ }
}

/* ================= Formatters & time math ================= */
let timeFmtCache = new Map();
let rowFmtCache = new Map();
const dateFmtCache = new Map();
const offFmtCache = new Map();

function timeFmt(tz) {
  const key = tz + '|' + state.hour12;
  if (!timeFmtCache.has(key)) {
    timeFmtCache.set(key, new Intl.DateTimeFormat('en-US', Object.assign(
      { timeZone: tz, hour: '2-digit', minute: '2-digit', second: '2-digit' },
      state.hour12 ? { hour12: true } : { hourCycle: 'h23' }
    )));
  }
  return timeFmtCache.get(key);
}
function rowTimeFmt(tz) {
  const key = tz + '|' + state.hour12;
  if (!rowFmtCache.has(key)) {
    rowFmtCache.set(key, new Intl.DateTimeFormat('en-US', Object.assign(
      { timeZone: tz, hour: 'numeric', minute: '2-digit' },
      state.hour12 ? { hour12: true } : { hourCycle: 'h23' }
    )));
  }
  return rowFmtCache.get(key);
}
function dateFmt(tz) {
  if (!dateFmtCache.has(tz)) {
    dateFmtCache.set(tz, new Intl.DateTimeFormat('en-US', { timeZone: tz, weekday: 'short', month: 'short', day: 'numeric' }));
  }
  return dateFmtCache.get(tz);
}
function offFmt(tz) {
  if (!offFmtCache.has(tz)) {
    offFmtCache.set(tz, new Intl.DateTimeFormat('en-US', {
      timeZone: tz, hourCycle: 'h23',
      year: 'numeric', month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit', second: '2-digit'
    }));
  }
  return offFmtCache.get(tz);
}

function partsOf(fmt, d) {
  const o = {};
  const parts = fmt.formatToParts(d);
  for (let i = 0; i < parts.length; i++) {
    if (parts[i].type !== 'literal') o[parts[i].type] = parts[i].value;
  }
  return o;
}
function offsetMinutes(tz, date) {
  const p = partsOf(offFmt(tz), date);
  const asUTC = Date.UTC(+p.year, +p.month - 1, +p.day, (+p.hour) % 24, +p.minute, +p.second);
  return Math.round((asUTC - date.getTime()) / 60000);
}
function gmtLabel(min) {
  if (min === 0) return 'GMT';
  const sign = min < 0 ? '−' : '+';
  const abs = Math.abs(min);
  const h = Math.floor(abs / 60);
  const m = abs % 60;
  return `GMT${sign}${h}${m ? ':' + String(m).padStart(2, '0') : ''}`;
}
function relLabel(diffMin) {
  if (diffMin === 0) return 'Same time as you';
  const ahead = diffMin > 0;
  const abs = Math.abs(diffMin);
  const h = Math.floor(abs / 60);
  const m = abs % 60;
  const core = m ? (h ? `${h}h ${m}m` : `${m}m`) : `${h}h`;
  return `${ahead ? '+' : '−'}${core} ${ahead ? 'ahead' : 'behind'}`;
}
function dayNumber(tz, date) {
  const p = partsOf(offFmt(tz), date);
  return Math.round(Date.UTC(+p.year, +p.month - 1, +p.day) / 86400000);
}

/* ================= DOM refs ================= */
const grid = document.getElementById('grid');
const emptyEl = document.getElementById('empty');
const addBtn = document.getElementById('addBtn');
const emptyAddBtn = document.getElementById('emptyAddBtn');
const btn12 = document.getElementById('btn12');
const btn24 = document.getElementById('btn24');
const modal = document.getElementById('modal');
const closeModalBtn = document.getElementById('closeModal');
const searchEl = document.getElementById('search');
const cityList = document.getElementById('cityList');
const localInfoEl = document.getElementById('localInfo');

const cards = new Map();
const keyOf = (e) => `${e.city}|${e.tz}`;
const escapeHtml = (s) => s.replace(/[&<>"']/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
const cssEscape = (s) => (window.CSS && CSS.escape) ? CSS.escape(s) : s.replace(/"/g, '\\"');

/* ================= Cards ================= */
function buildCard(entry, index) {
  const key = keyOf(entry);
  const el = document.createElement('article');
  el.className = 'card period-night';
  el.style.animationDelay = `${Math.min(index, 10) * 60}ms`;
  const isLocal = entry.tz === localTz;

  el.innerHTML = `
    <div class="stars" aria-hidden="true"></div>
    <button type="button" class="remove" aria-label="Remove ${escapeHtml(entry.city)}" title="Remove city">${icon('x', 13)}</button>
    <div class="card-top">
      <div class="city">
        <div class="city-name">
          <span class="flag">${escapeHtml(entry.flag)}</span>
          <span>${escapeHtml(entry.city)}</span>
          ${isLocal ? '<span class="chip chip-local">You</span>' : ''}
        </div>
        <div class="city-sub">${escapeHtml(entry.country)} · <span class="gmt">GMT</span></div>
      </div>
      <div class="badge"><span class="badge-icon">${icon('moon', 13)}</span><span class="badge-label">Night</span></div>
    </div>
    <div class="clock">
      <span class="t-main">--:--</span><span class="t-sec">:--</span><span class="t-ampm" hidden>AM</span>
    </div>
    <div class="meta">
      <span class="date">—</span>
      <span class="chip chip-day" hidden></span>
      <span class="rel"></span>
    </div>
    <div class="timeline" aria-hidden="true"><div class="marker"></div></div>
    <div class="ticks" aria-hidden="true"><span>00</span><span>06</span><span>12</span><span>18</span><span>24</span></div>`;

  const stars = el.querySelector('.stars');
  for (let i = 0; i < 14; i++) {
    const s = document.createElement('span');
    s.style.left = (Math.random() * 100).toFixed(1) + '%';
    s.style.top = (Math.random() * 60).toFixed(1) + '%';
    const sz = Math.random() < .25 ? 3 : 2;
    s.style.width = s.style.height = sz + 'px';
    s.style.animationDelay = (Math.random() * 3).toFixed(2) + 's';
    s.style.animationDuration = (2.2 + Math.random() * 2.5).toFixed(2) + 's';
    stars.appendChild(s);
  }

  const refs = {
    entry, el, period: '',
    gmt: el.querySelector('.gmt'),
    badgeIcon: el.querySelector('.badge-icon'),
    badgeLabel: el.querySelector('.badge-label'),
    tMain: el.querySelector('.t-main'),
    tSec: el.querySelector('.t-sec'),
    ampm: el.querySelector('.t-ampm'),
    date: el.querySelector('.date'),
    dayChip: el.querySelector('.chip-day'),
    rel: el.querySelector('.rel'),
    marker: el.querySelector('.marker')
  };

  el.querySelector('.remove').addEventListener('click', () => removeCity(key));
  grid.appendChild(el);
  cards.set(key, refs);
  return refs;
}

function removeCity(key) {
  const refs = cards.get(key);
  if (!refs) return;
  refs.el.classList.add('removing');
  setTimeout(() => {
    refs.el.remove();
    cards.delete(key);
    state.cities = state.cities.filter(c => keyOf(c) !== key);
    save();
    syncEmpty();
  }, 230);
}

function updateCard(refs, now, localOff, localDayNum) {
  const tz = refs.entry.tz;
  const p = partsOf(timeFmt(tz), now);
  let h24 = parseInt(p.hour, 10);
  if (state.hour12) h24 = (h24 % 12) + (p.dayPeriod === 'PM' ? 12 : 0);
  h24 = h24 % 24;

  refs.tMain.textContent = `${p.hour}:${p.minute}`;
  refs.tSec.textContent = `:${p.second}`;
  if (state.hour12) {
    refs.ampm.hidden = false;
    refs.ampm.textContent = p.dayPeriod || '';
  } else {
    refs.ampm.hidden = true;
  }

  refs.date.textContent = dateFmt(tz).format(now);

  const off = offsetMinutes(tz, now);
  refs.gmt.textContent = gmtLabel(off);
  refs.rel.textContent = relLabel(off - localOff);

  const dd = dayNumber(tz, now) - localDayNum;
  if (dd === 1) { refs.dayChip.hidden = false; refs.dayChip.textContent = 'Tomorrow'; }
  else if (dd === -1) { refs.dayChip.hidden = false; refs.dayChip.textContent = 'Yesterday'; }
  else refs.dayChip.hidden = true;

  const frac = ((h24 + parseInt(p.minute, 10) / 60 + parseInt(p.second, 10) / 3600) / 24) * 100;
  refs.marker.style.left = Math.min(100, Math.max(0, frac)).toFixed(2) + '%';

  const period = periodForHour(h24);
  if (period !== refs.period) {
    refs.period = period;
    for (const k of PERIOD_KEYS) refs.el.classList.remove('period-' + k);
    refs.el.classList.add('period-' + period);
    refs.badgeIcon.innerHTML = icon(PERIODS[period].icon, 13);
    refs.badgeLabel.textContent = PERIODS[period].label;
  }
}

function syncEmpty() {
  const isEmpty = state.cities.length === 0;
  emptyEl.hidden = !isEmpty;
  grid.style.display = isEmpty ? 'none' : '';
}

/* ================= Modal ================= */
let modalOpen = false;

function openModal() {
  modalOpen = true;
  modal.hidden = false;
  requestAnimationFrame(() => modal.classList.add('open'));
  searchEl.value = '';
  renderList('');
  document.body.style.overflow = 'hidden';
  setTimeout(() => searchEl.focus(), 60);
}
function closeModal() {
  modal.classList.remove('open');
  modalOpen = false;
  setTimeout(() => { modal.hidden = true; document.body.style.overflow = ''; }, 200);
  addBtn.focus();
}

function renderList(filter) {
  const q = (filter || '').trim().toLowerCase();
  const added = new Set(state.cities.map(keyOf));
  const matches = CITY_DB.filter(c =>
    !q || (c.city + ' ' + c.country + ' ' + c.tz).toLowerCase().includes(q)
  );
  cityList.innerHTML = '';
  if (!matches.length) {
    cityList.innerHTML = `<div class="no-results">No cities match “${escapeHtml(filter)}”.</div>`;
    return;
  }
  const now = new Date();
  const frag = document.createDocumentFragment();
  for (const c of matches) {
    const key = keyOf(c);
    const isAdded = added.has(key);
    const row = document.createElement('button');
    row.type = 'button';
    row.className = 'city-row' + (isAdded ? ' added' : '');
    row.dataset.key = key;
    row.setAttribute('aria-label', (isAdded ? 'Already added: ' : 'Add ') + c.city);
    row.innerHTML = `
      <span class="flag">${c.flag}</span>
      <span class="names"><span class="n">${escapeHtml(c.city)}</span><span class="c">${escapeHtml(c.country)}</span></span>
      <span class="row-right">
        <span class="row-time" data-tz="${c.tz}"></span>
        <span class="row-gmt">${gmtLabel(offsetMinutes(c.tz, now))}</span>
      </span>
      <span class="row-action">${icon(isAdded ? 'check' : 'plus', 14)}</span>`;
    if (!isAdded) row.addEventListener('click', () => addCity(c));
    frag.appendChild(row);
  }
  cityList.appendChild(frag);
  updateRowTimes(now);
}

function updateRowTimes(now) {
  const rows = cityList.querySelectorAll('.row-time');
  rows.forEach(r => {
    const p = partsOf(rowTimeFmt(r.dataset.tz), now);
    r.textContent = `${p.hour}:${p.minute}${state.hour12 ? ' ' + (p.dayPeriod || '') : ''}`;
  });
}

function addCity(entry) {
  const key = keyOf(entry);
  if (cards.has(key)) return;
  state.cities.push(entry);
  save();
  buildCard(entry, state.cities.length - 1);
  syncEmpty();
  tick();
  const row = cityList.querySelector(`[data-key="${cssEscape(key)}"]`);
  if (row) {
    row.classList.add('added');
    row.setAttribute('aria-label', 'Already added: ' + entry.city);
    row.querySelector('.row-action').innerHTML = icon('check', 14);
  }
}

/* ================= Tick loop ================= */
function tick() {
  const now = new Date();
  const localOff = offsetMinutes(localTz, now);
  const localDayNum = dayNumber(localTz, now);

  for (const refs of cards.values()) updateCard(refs, now, localOff, localDayNum);

  const lp = partsOf(timeFmt(localTz), now);
  localInfoEl.textContent =
    `${dateFmt(localTz).format(now)} · ${lp.hour}:${lp.minute}:${lp.second}` +
    `${state.hour12 ? ' ' + (lp.dayPeriod || '') : ''} · ${gmtLabel(localOff)} local`;
  document.title = `${lp.hour}:${lp.minute} · World Clock`;

  if (modalOpen) updateRowTimes(now);
}

/* ================= Events ================= */
function setFormat(use12) {
  if (use12 === state.hour12) return;
  state.hour12 = use12;
  save();
  timeFmtCache = new Map();
  rowFmtCache = new Map();
  btn12.classList.toggle('active', state.hour12);
  btn24.classList.toggle('active', !state.hour12);
  btn12.setAttribute('aria-pressed', String(state.hour12));
  btn24.setAttribute('aria-pressed', String(!state.hour12));
  tick();
}
btn12.addEventListener('click', () => setFormat(true));
btn24.addEventListener('click', () => setFormat(false));

addBtn.addEventListener('click', openModal);
emptyAddBtn.addEventListener('click', openModal);
closeModalBtn.addEventListener('click', closeModal);
modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
searchEl.addEventListener('input', () => renderList(searchEl.value));

document.addEventListener('keydown', (e) => {
  if (modalOpen) {
    if (e.key === 'Escape') closeModal();
    return;
  }
  if ((e.key === 'a' || e.key === 'A') && !e.metaKey && !e.ctrlKey && !e.altKey) {
    const t = e.target;
    if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA')) return;
    e.preventDefault();
    openModal();
  }
});
document.addEventListener('visibilitychange', () => { if (!document.hidden) tick(); });

/* ================= Init ================= */
state.cities = loadCities();
btn12.classList.toggle('active', state.hour12);
btn24.classList.toggle('active', !state.hour12);
btn12.setAttribute('aria-pressed', String(state.hour12));
btn24.setAttribute('aria-pressed', String(!state.hour12));

state.cities.forEach((c, i) => buildCard(c, i));
syncEmpty();
tick();
setInterval(tick, 250);

})();
</script>
</body>
</html>
