<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custom QR Code Generator</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <style>
    :root {
      --paper: #f6f3eb;
      --ink: #171512;
      --muted: #6c655a;
      --line: rgba(23, 21, 18, 0.16);
      --panel: rgba(255, 252, 244, 0.82);
      --panel-strong: #fffaf0;
      --accent: #0d766d;
      --accent-strong: #085d56;
      --accent-soft: rgba(13, 118, 109, 0.13);
      --danger: #a32929;
      --shadow: 0 28px 80px rgba(31, 24, 13, 0.18);
      --radius: 8px;
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--paper);
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      font-family: "Avenir Next", "Gill Sans", "Segoe UI", ui-sans-serif, system-ui, sans-serif;
      background:
        linear-gradient(135deg, rgba(13, 118, 109, 0.13), transparent 32%),
        linear-gradient(315deg, rgba(203, 75, 49, 0.10), transparent 28%),
        radial-gradient(circle at 20% 100%, rgba(244, 202, 110, 0.22), transparent 34%),
        var(--paper);
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .shell {
      width: min(1180px, calc(100% - 32px));
      min-height: 100vh;
      margin: 0 auto;
      padding: 34px 0;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 26px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 24px;
      animation: rise 620ms ease-out both;
    }

    .title-block {
      max-width: 640px;
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--accent-strong);
      font-size: 0.74rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2.4rem, 5vw, 5rem);
      line-height: 0.92;
      letter-spacing: 0;
    }

    .status-strip {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-height: 40px;
      padding: 8px 13px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 252, 244, 0.66);
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 700;
      white-space: nowrap;
      backdrop-filter: blur(14px);
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 5px var(--accent-soft);
    }

    main {
      display: grid;
      grid-template-columns: minmax(295px, 370px) minmax(0, 1fr);
      gap: 24px;
      align-items: stretch;
    }

    .controls,
    .preview-stage {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      animation: rise 700ms ease-out both;
    }

    .controls {
      padding: 22px;
      align-self: start;
    }

    .field {
      display: grid;
      gap: 9px;
      margin: 0 0 19px;
    }

    label,
    .label {
      color: #2a251f;
      font-size: 0.77rem;
      font-weight: 800;
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }

    textarea {
      width: 100%;
      min-height: 134px;
      resize: vertical;
      padding: 14px;
      border: 1px solid rgba(23, 21, 18, 0.22);
      border-radius: var(--radius);
      outline: none;
      background: rgba(255, 252, 244, 0.92);
      color: var(--ink);
      line-height: 1.45;
      transition: border-color 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    textarea:focus,
    input:focus,
    select:focus,
    button:focus-visible {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-soft);
      outline: none;
    }

    .color-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .color-control {
      display: grid;
      grid-template-columns: 40px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      padding: 10px;
      border: 1px solid rgba(23, 21, 18, 0.14);
      border-radius: var(--radius);
      background: rgba(255, 252, 244, 0.68);
    }

    .color-control input[type="color"] {
      width: 40px;
      height: 40px;
      padding: 0;
      border: 0;
      border-radius: 50%;
      background: transparent;
      appearance: none;
      -webkit-appearance: none;
    }

    .color-control input[type="color"]::-webkit-color-swatch-wrapper {
      padding: 0;
    }

    .color-control input[type="color"]::-webkit-color-swatch {
      border: 1px solid rgba(23, 21, 18, 0.24);
      border-radius: 50%;
    }

    .color-meta {
      min-width: 0;
      display: grid;
      gap: 2px;
    }

    .color-meta strong {
      font-size: 0.86rem;
    }

    .color-meta span {
      overflow: hidden;
      color: var(--muted);
      font-size: 0.75rem;
      font-weight: 700;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .swatches {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 9px;
      margin-top: 12px;
    }

    .swatch {
      position: relative;
      height: 36px;
      border: 1px solid rgba(23, 21, 18, 0.18);
      border-radius: 999px;
      background: linear-gradient(90deg, var(--swatch-ink) 0 50%, var(--swatch-bg) 50% 100%);
      transition: transform 140ms ease, box-shadow 140ms ease;
    }

    .swatch:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(31, 24, 13, 0.14);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 19px;
    }

    select,
    input[type="range"] {
      width: 100%;
    }

    select {
      min-height: 44px;
      padding: 0 12px;
      border: 1px solid rgba(23, 21, 18, 0.22);
      border-radius: var(--radius);
      background: rgba(255, 252, 244, 0.92);
      color: var(--ink);
      font-weight: 700;
    }

    .range-wrap {
      min-height: 44px;
      display: grid;
      grid-template-columns: 1fr 44px;
      gap: 10px;
      align-items: center;
      padding: 0 11px;
      border: 1px solid rgba(23, 21, 18, 0.18);
      border-radius: var(--radius);
      background: rgba(255, 252, 244, 0.72);
    }

    input[type="range"] {
      accent-color: var(--accent);
    }

    .range-value {
      color: var(--accent-strong);
      font-weight: 800;
      text-align: right;
    }

    .toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 20px;
      padding: 11px 0 1px;
    }

    .toggle span {
      color: var(--muted);
      font-size: 0.87rem;
      font-weight: 700;
    }

    .switch {
      position: relative;
      width: 52px;
      height: 30px;
      flex: 0 0 auto;
    }

    .switch input {
      position: absolute;
      inset: 0;
      opacity: 0;
    }

    .switch-track {
      position: absolute;
      inset: 0;
      border: 1px solid rgba(23, 21, 18, 0.18);
      border-radius: 999px;
      background: rgba(23, 21, 18, 0.12);
      transition: background 160ms ease, border-color 160ms ease;
    }

    .switch-track::after {
      content: "";
      position: absolute;
      top: 3px;
      left: 3px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--panel-strong);
      box-shadow: 0 3px 9px rgba(31, 24, 13, 0.22);
      transition: transform 160ms ease;
    }

    .switch input:checked + .switch-track {
      border-color: rgba(13, 118, 109, 0.26);
      background: var(--accent);
    }

    .switch input:checked + .switch-track::after {
      transform: translateX(22px);
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 48px;
      gap: 10px;
    }

    .button {
      min-height: 48px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      background: var(--accent);
      color: white;
      font-weight: 800;
      transition: transform 140ms ease, background 140ms ease, box-shadow 140ms ease;
    }

    .button:hover:not(:disabled) {
      transform: translateY(-2px);
      background: var(--accent-strong);
      box-shadow: 0 14px 30px rgba(13, 118, 109, 0.22);
    }

    .button:disabled {
      cursor: not-allowed;
      opacity: 0.48;
    }

    .icon-button {
      min-height: 48px;
      border: 1px solid rgba(23, 21, 18, 0.16);
      border-radius: var(--radius);
      background: rgba(255, 252, 244, 0.74);
      color: var(--ink);
      font-size: 1.18rem;
      font-weight: 900;
      transition: transform 140ms ease, background 140ms ease;
    }

    .icon-button:hover {
      transform: translateY(-2px);
      background: var(--panel-strong);
    }

    .message {
      min-height: 22px;
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 700;
      line-height: 1.45;
    }

    .message.error {
      color: var(--danger);
    }

    .preview-stage {
      min-height: 660px;
      position: relative;
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: clamp(18px, 3vw, 36px);
    }

    .preview-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      color: var(--muted);
      font-size: 0.87rem;
      font-weight: 800;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .size-readout {
      color: var(--accent-strong);
    }

    .preview-wrap {
      min-height: 0;
      display: grid;
      place-items: center;
      padding: clamp(18px, 4vw, 42px) 0;
    }

    .canvas-plinth {
      position: relative;
      width: min(100%, 560px);
      aspect-ratio: 1 / 1;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background:
        linear-gradient(45deg, rgba(23, 21, 18, 0.045) 25%, transparent 25% 75%, rgba(23, 21, 18, 0.045) 75%),
        linear-gradient(45deg, rgba(23, 21, 18, 0.045) 25%, transparent 25% 75%, rgba(23, 21, 18, 0.045) 75%);
      background-color: rgba(255, 252, 244, 0.65);
      background-position: 0 0, 12px 12px;
      background-size: 24px 24px;
      box-shadow: inset 0 0 0 1px rgba(23, 21, 18, 0.12);
    }

    canvas {
      width: min(84%, 470px);
      height: min(84%, 470px);
      border-radius: 6px;
      image-rendering: pixelated;
      filter: drop-shadow(0 18px 28px rgba(31, 24, 13, 0.14));
      transition: transform 220ms ease, filter 220ms ease;
    }

    .canvas-plinth:hover canvas {
      transform: scale(1.018);
      filter: drop-shadow(0 24px 34px rgba(31, 24, 13, 0.18));
    }

    .preview-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 700;
      line-height: 1.4;
    }

    .mini-metric {
      color: var(--ink);
      font-weight: 900;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
      }
    }

    @media (max-width: 860px) {
      .shell {
        width: min(100% - 24px, 620px);
        padding: 22px 0;
      }

      header {
        align-items: start;
        flex-direction: column;
      }

      .status-strip {
        white-space: normal;
      }

      main {
        grid-template-columns: 1fr;
      }

      .preview-stage {
        min-height: auto;
      }
    }

    @media (max-width: 520px) {
      .color-grid,
      .row,
      .actions {
        grid-template-columns: 1fr;
      }

      .icon-button {
        min-height: 44px;
      }

      .preview-top,
      .preview-bottom {
        align-items: start;
        flex-direction: column;
      }

      canvas {
        width: min(86%, 360px);
        height: min(86%, 360px);
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div class="title-block">
        <p class="eyebrow">Custom QR Code Generator</p>
        <h1>Create a QR code.</h1>
      </div>
      <div class="status-strip" aria-live="polite">
        <span class="status-dot" aria-hidden="true"></span>
        <span id="statusText">Ready to generate</span>
      </div>
    </header>

    <main>
      <section class="controls" aria-label="QR code controls">
        <div class="field">
          <label for="qrText">Text or URL</label>
          <textarea id="qrText" spellcheck="false">https://example.com</textarea>
        </div>

        <div class="field">
          <span class="label">Colors</span>
          <div class="color-grid">
            <label class="color-control" for="foregroundColor">
              <input id="foregroundColor" type="color" value="#171512" aria-label="QR foreground color">
              <span class="color-meta">
                <strong>Ink</strong>
                <span id="foregroundValue">#171512</span>
              </span>
            </label>
            <label class="color-control" for="backgroundColor">
              <input id="backgroundColor" type="color" value="#fffaf0" aria-label="QR background color">
              <span class="color-meta">
                <strong>Paper</strong>
                <span id="backgroundValue">#fffaf0</span>
              </span>
            </label>
          </div>
          <div class="swatches" aria-label="Color presets">
            <button class="swatch" type="button" style="--swatch-ink:#171512;--swatch-bg:#fffaf0" data-fg="#171512" data-bg="#fffaf0" title="Warm black on cream"></button>
            <button class="swatch" type="button" style="--swatch-ink:#0d766d;--swatch-bg:#f6f3eb" data-fg="#0d766d" data-bg="#f6f3eb" title="Teal on warm paper"></button>
            <button class="swatch" type="button" style="--swatch-ink:#10233f;--swatch-bg:#f4c96e" data-fg="#10233f" data-bg="#f4c96e" title="Navy on gold"></button>
            <button class="swatch" type="button" style="--swatch-ink:#ffffff;--swatch-bg:#1d3f36" data-fg="#ffffff" data-bg="#1d3f36" title="White on forest"></button>
            <button class="swatch" type="button" style="--swatch-ink:#22111a;--swatch-bg:#e7b7a6" data-fg="#22111a" data-bg="#e7b7a6" title="Plum on clay"></button>
          </div>
        </div>

        <div class="row">
          <div class="field" style="margin-bottom:0">
            <label for="errorLevel">Recovery</label>
            <select id="errorLevel" aria-label="Error correction level">
              <option value="M">Balanced</option>
              <option value="L">Smallest</option>
              <option value="Q">Durable</option>
              <option value="H">Maximum</option>
            </select>
          </div>
          <div class="field" style="margin-bottom:0">
            <label for="cornerRadius">Shape</label>
            <div class="range-wrap">
              <input id="cornerRadius" type="range" min="0" max="45" value="10" aria-label="Module roundness">
              <span class="range-value" id="radiusValue">10</span>
            </div>
          </div>
        </div>

        <label class="toggle" for="transparentBg">
          <span>Transparent background</span>
          <span class="switch">
            <input id="transparentBg" type="checkbox">
            <span class="switch-track" aria-hidden="true"></span>
          </span>
        </label>

        <div class="actions">
          <button class="button" id="downloadButton" type="button">Download PNG</button>
          <button class="icon-button" id="clearButton" type="button" aria-label="Clear text" title="Clear text">×</button>
        </div>

        <p class="message" id="message" role="status">Enter text or a URL, adjust the colors, then export a crisp PNG.</p>
      </section>

      <section class="preview-stage" aria-label="QR code preview">
        <div class="preview-top">
          <span>Live preview</span>
          <span class="size-readout" id="sizeReadout">1024 × 1024 PNG</span>
        </div>
        <div class="preview-wrap">
          <div class="canvas-plinth">
            <canvas id="qrCanvas" width="1024" height="1024" aria-label="Generated QR code preview"></canvas>
          </div>
        </div>
        <div class="preview-bottom">
          <span>Modules: <span class="mini-metric" id="moduleCount">-</span></span>
          <span>Characters: <span class="mini-metric" id="characterCount">0</span></span>
        </div>
      </section>
    </main>
  </div>

  <script>
    const canvas = document.getElementById("qrCanvas");
    const ctx = canvas.getContext("2d");
    const qrText = document.getElementById("qrText");
    const foregroundColor = document.getElementById("foregroundColor");
    const backgroundColor = document.getElementById("backgroundColor");
    const foregroundValue = document.getElementById("foregroundValue");
    const backgroundValue = document.getElementById("backgroundValue");
    const errorLevel = document.getElementById("errorLevel");
    const cornerRadius = document.getElementById("cornerRadius");
    const radiusValue = document.getElementById("radiusValue");
    const transparentBg = document.getElementById("transparentBg");
    const downloadButton = document.getElementById("downloadButton");
    const clearButton = document.getElementById("clearButton");
    const statusText = document.getElementById("statusText");
    const message = document.getElementById("message");
    const moduleCount = document.getElementById("moduleCount");
    const characterCount = document.getElementById("characterCount");
    const swatches = Array.from(document.querySelectorAll(".swatch"));

    const exportSize = 1024;
    let latestValidName = "custom-qr-code";
    let renderTimer = 0;

    function setMessage(text, isError = false) {
      message.textContent = text;
      message.classList.toggle("error", isError);
      statusText.textContent = isError ? "Needs attention" : "Preview updated";
      downloadButton.disabled = isError;
    }

    function roundedRect(context, x, y, width, height, radius) {
      const safeRadius = Math.min(radius, width / 2, height / 2);
      context.beginPath();
      context.moveTo(x + safeRadius, y);
      context.lineTo(x + width - safeRadius, y);
      context.quadraticCurveTo(x + width, y, x + width, y + safeRadius);
      context.lineTo(x + width, y + height - safeRadius);
      context.quadraticCurveTo(x + width, y + height, x + width - safeRadius, y + height);
      context.lineTo(x + safeRadius, y + height);
      context.quadraticCurveTo(x, y + height, x, y + height - safeRadius);
      context.lineTo(x, y + safeRadius);
      context.quadraticCurveTo(x, y, x + safeRadius, y);
      context.closePath();
    }

    function isInFinderPattern(size, row, col) {
      const inTop = row >= 0 && row < 7;
      const inBottom = row >= size - 7 && row < size;
      const inLeft = col >= 0 && col < 7;
      const inRight = col >= size - 7 && col < size;
      return (inTop && inLeft) || (inTop && inRight) || (inBottom && inLeft);
    }

    function drawFinderPattern(context, x, y, cell, fg, bg, transparent) {
      const unit = cell;
      context.fillStyle = fg;
      roundedRect(context, x, y, unit * 7, unit * 7, unit * 0.8);
      context.fill();

      context.fillStyle = transparent ? "rgba(255,255,255,0)" : bg;
      roundedRect(context, x + unit, y + unit, unit * 5, unit * 5, unit * 0.55);
      if (!transparent) {
        context.fill();
      } else {
        context.save();
        context.globalCompositeOperation = "destination-out";
        context.fill();
        context.restore();
      }

      context.fillStyle = fg;
      roundedRect(context, x + unit * 2, y + unit * 2, unit * 3, unit * 3, unit * 0.45);
      context.fill();
    }

    function drawQr() {
      const text = qrText.value.trim();
      const fg = foregroundColor.value;
      const bg = backgroundColor.value;
      const transparent = transparentBg.checked;
      const radiusPercent = Number(cornerRadius.value);

      foregroundValue.textContent = fg.toUpperCase();
      backgroundValue.textContent = transparent ? "Transparent" : bg.toUpperCase();
      radiusValue.textContent = String(radiusPercent);
      characterCount.textContent = String(text.length);

      ctx.clearRect(0, 0, exportSize, exportSize);

      if (!text) {
        ctx.fillStyle = "rgba(23, 21, 18, 0.06)";
        roundedRect(ctx, 96, 96, exportSize - 192, exportSize - 192, 18);
        ctx.fill();
        moduleCount.textContent = "-";
        setMessage("Enter text or a URL to generate a QR code.", true);
        return;
      }

      if (typeof QRCode === "undefined") {
        moduleCount.textContent = "-";
        setMessage("The QR library could not load. Check the network connection and refresh.", true);
        return;
      }

      try {
        const qr = QRCode.create(text, {
          errorCorrectionLevel: errorLevel.value,
          margin: 0
        });
        const size = qr.modules.size;
        const data = qr.modules.data;
        const quietZone = 4;
        const totalCells = size + quietZone * 2;
        const cell = exportSize / totalCells;
        const moduleRadius = cell * (radiusPercent / 100);

        ctx.clearRect(0, 0, exportSize, exportSize);
        if (!transparent) {
          ctx.fillStyle = bg;
          ctx.fillRect(0, 0, exportSize, exportSize);
        }

        ctx.fillStyle = fg;
        for (let row = 0; row < size; row += 1) {
          for (let col = 0; col < size; col += 1) {
            if (!data[row * size + col] || isInFinderPattern(size, row, col)) continue;

            const x = (col + quietZone) * cell;
            const y = (row + quietZone) * cell;
            roundedRect(ctx, x + cell * 0.07, y + cell * 0.07, cell * 0.86, cell * 0.86, moduleRadius);
            ctx.fill();
          }
        }

        drawFinderPattern(ctx, quietZone * cell, quietZone * cell, cell, fg, bg, transparent);
        drawFinderPattern(ctx, (quietZone + size - 7) * cell, quietZone * cell, cell, fg, bg, transparent);
        drawFinderPattern(ctx, quietZone * cell, (quietZone + size - 7) * cell, cell, fg, bg, transparent);

        moduleCount.textContent = String(size);
        latestValidName = slugify(text);
        setMessage("QR code is ready. PNG export uses the exact colors shown here.");
      } catch (error) {
        moduleCount.textContent = "-";
        setMessage("This content is too long for the selected recovery setting. Shorten it or choose a smaller recovery level.", true);
      }
    }

    function slugify(value) {
      try {
        const maybeUrl = new URL(value);
        return `${maybeUrl.hostname}${maybeUrl.pathname}`.replace(/[^a-z0-9]+/gi, "-").replace(/^-|-$/g, "").toLowerCase() || "custom-qr-code";
      } catch {
        return value.slice(0, 48).replace(/[^a-z0-9]+/gi, "-").replace(/^-|-$/g, "").toLowerCase() || "custom-qr-code";
      }
    }

    function scheduleRender() {
      window.clearTimeout(renderTimer);
      renderTimer = window.setTimeout(drawQr, 90);
    }

    function downloadPng() {
      drawQr();
      if (downloadButton.disabled) return;

      const link = document.createElement("a");
      link.download = `${latestValidName}-qr.png`;
      link.href = canvas.toDataURL("image/png");
      link.click();
    }

    [qrText, foregroundColor, backgroundColor, errorLevel, cornerRadius, transparentBg].forEach((control) => {
      control.addEventListener("input", scheduleRender);
      control.addEventListener("change", scheduleRender);
    });

    swatches.forEach((swatch) => {
      swatch.addEventListener("click", () => {
        foregroundColor.value = swatch.dataset.fg;
        backgroundColor.value = swatch.dataset.bg;
        transparentBg.checked = false;
        drawQr();
      });
    });

    downloadButton.addEventListener("click", downloadPng);
    clearButton.addEventListener("click", () => {
      qrText.value = "";
      qrText.focus();
      drawQr();
    });

    window.addEventListener("load", drawQr);
  </script>
</body>
</html>
