<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snowy Sticker Card</title>
  <style>
    :root {
      --ink: #253144;
      --night: #28446c;
      --sky: #bfe4f4;
      --snow: #fffaf0;
      --paper: #fff8e8;
      --berry: #c92d3b;
      --berry-dark: #8e1d2d;
      --pine: #126451;
      --mint: #8bd7bf;
      --gold: #f3b642;
      --cocoa: #6d3d2e;
      --shadow: rgba(31, 42, 60, 0.22);
      --focus: #143e7e;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      overflow-x: hidden;
      font-family: "Trebuchet MS", "Avenir Next Rounded", "Nunito", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 50% 5%, rgba(255, 248, 232, 0.82), transparent 23rem),
        linear-gradient(160deg, #314f7f 0%, #9dd2df 50%, #f8d59a 100%);
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      touch-action: manipulation;
    }

    button {
      font: inherit;
    }

    .app {
      position: relative;
      width: min(1180px, 100%);
      min-height: min(820px, calc(100vh - 36px));
      display: grid;
      grid-template-columns: minmax(280px, 1fr) minmax(230px, 296px);
      gap: 16px;
      align-items: stretch;
      isolation: isolate;
    }

    .snow-layer,
    .sparkle-layer {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .snowflake {
      --size: 8px;
      --left: 50vw;
      --delay: 0s;
      --duration: 11s;
      --drift: 34px;
      position: absolute;
      left: var(--left);
      top: -24px;
      width: var(--size);
      height: var(--size);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: 0 0 9px rgba(255, 255, 255, 0.72);
      opacity: 0.8;
      animation: fall var(--duration) linear var(--delay) infinite;
    }

    @keyframes fall {
      0% {
        transform: translate3d(0, -24px, 0) rotate(0deg);
      }
      50% {
        transform: translate3d(var(--drift), 52vh, 0) rotate(160deg);
      }
      100% {
        transform: translate3d(calc(var(--drift) * -0.45), 108vh, 0) rotate(360deg);
      }
    }

    .stage {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 12px;
      min-width: 0;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: #fffaf2;
      text-shadow: 0 2px 10px rgba(17, 37, 66, 0.28);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 11px;
      min-width: 0;
    }

    .badge {
      width: 50px;
      height: 50px;
      display: grid;
      place-items: center;
      border: 3px solid rgba(255, 255, 255, 0.88);
      border-radius: 8px;
      background: linear-gradient(145deg, #d93145, #f4b240);
      box-shadow: 0 9px 20px rgba(31, 42, 60, 0.18);
      font-size: 1.8rem;
      transform: rotate(-6deg);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.65rem, 3.2vw, 3rem);
      line-height: 0.96;
      letter-spacing: 0;
      font-family: Georgia, "Times New Roman", serif;
    }

    .subtitle {
      display: block;
      margin-top: 4px;
      font-size: clamp(0.78rem, 1.5vw, 1rem);
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #fff5c9;
    }

    .soundbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .icon-btn,
    .action-btn {
      min-width: 44px;
      min-height: 44px;
      border: 0;
      border-radius: 8px;
      background: rgba(255, 250, 240, 0.92);
      color: var(--berry-dark);
      box-shadow: 0 8px 18px rgba(31, 42, 60, 0.18), inset 0 -3px rgba(108, 61, 46, 0.08);
      cursor: pointer;
      transition: transform 150ms ease, box-shadow 150ms ease, background 150ms ease;
    }

    .icon-btn {
      display: grid;
      place-items: center;
      font-size: 1.33rem;
    }

    .action-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 13px;
      font-weight: 900;
      white-space: nowrap;
    }

    .icon-btn:hover,
    .action-btn:hover,
    .sticker-choice:hover {
      transform: translateY(-2px);
      box-shadow: 0 11px 22px rgba(31, 42, 60, 0.22), inset 0 -3px rgba(108, 61, 46, 0.08);
    }

    .icon-btn:active,
    .action-btn:active,
    .sticker-choice:active {
      transform: translateY(1px) scale(0.98);
    }

    .icon-btn:focus-visible,
    .action-btn:focus-visible,
    .sticker-choice:focus-visible,
    .placed-sticker:focus-visible {
      outline: 4px solid rgba(255, 255, 255, 0.9);
      outline-offset: 3px;
      box-shadow: 0 0 0 7px var(--focus);
    }

    .card-shell {
      position: relative;
      min-height: 0;
      padding: clamp(10px, 1.5vw, 18px);
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.34), rgba(255,255,255,0.06)),
        rgba(255, 248, 232, 0.36);
      box-shadow: 0 30px 70px rgba(31, 42, 60, 0.24);
      backdrop-filter: blur(8px);
    }

    .card {
      position: relative;
      width: 100%;
      height: min(620px, calc(100vh - 210px));
      min-height: 440px;
      overflow: hidden;
      border: 8px solid var(--paper);
      border-radius: 8px;
      background:
        linear-gradient(#96d7f0 0 44%, #dff4f8 44% 52%, #fff6e0 52% 100%);
      box-shadow:
        0 22px 46px rgba(37, 49, 68, 0.25),
        inset 0 0 0 2px rgba(116, 80, 51, 0.08);
      cursor: crosshair;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 78% 13%, #fff6bd 0 24px, transparent 25px),
        radial-gradient(circle at 16% 15%, rgba(255,255,255,.7) 0 2px, transparent 3px),
        radial-gradient(circle at 33% 9%, rgba(255,255,255,.72) 0 2px, transparent 3px),
        radial-gradient(circle at 56% 16%, rgba(255,255,255,.78) 0 2px, transparent 3px),
        radial-gradient(circle at 88% 25%, rgba(255,255,255,.8) 0 2px, transparent 3px);
      pointer-events: none;
      animation: skyTwinkle 4s ease-in-out infinite;
    }

    @keyframes skyTwinkle {
      50% { opacity: 0.64; }
    }

    .mountain {
      position: absolute;
      left: -5%;
      right: -5%;
      bottom: 36%;
      height: 27%;
      background:
        linear-gradient(135deg, transparent 0 29%, #6d91b4 29% 39%, transparent 39%) 0 100% / 33% 100%,
        linear-gradient(145deg, transparent 0 24%, #8fb1c9 24% 39%, transparent 39%) 24% 100% / 39% 100%,
        linear-gradient(135deg, transparent 0 28%, #5d82a9 28% 45%, transparent 45%) 56% 100% / 45% 100%;
      background-repeat: no-repeat;
      opacity: 0.95;
    }

    .snow-hill {
      position: absolute;
      left: -8%;
      right: -8%;
      bottom: -7%;
      height: 43%;
      border-radius: 50% 50% 0 0;
      background:
        radial-gradient(ellipse at 33% 26%, rgba(255,255,255,0.84) 0 11%, transparent 12%),
        linear-gradient(180deg, #fffefa 0%, #f2f0df 100%);
      box-shadow: inset 0 14px 22px rgba(160, 193, 199, 0.22);
    }

    .house {
      position: absolute;
      left: 8%;
      bottom: 28%;
      width: min(185px, 25%);
      aspect-ratio: 1.18 / 1;
      z-index: 1;
    }

    .house .roof {
      position: absolute;
      left: -7%;
      right: -7%;
      top: 0;
      height: 42%;
      clip-path: polygon(50% 0, 100% 84%, 88% 100%, 50% 35%, 12% 100%, 0 84%);
      background: linear-gradient(120deg, #7f2130, #db4050);
      box-shadow: 0 8px 0 #fff7e9;
    }

    .house .body {
      position: absolute;
      left: 8%;
      right: 8%;
      bottom: 0;
      height: 68%;
      border-radius: 8px 8px 5px 5px;
      background: linear-gradient(145deg, #f2bb6e, #d88548);
      border: 4px solid rgba(109, 61, 46, 0.17);
    }

    .house .door {
      position: absolute;
      left: 39%;
      bottom: 0;
      width: 23%;
      height: 41%;
      border-radius: 8px 8px 0 0;
      background: #5f382d;
    }

    .house .window {
      position: absolute;
      width: 20%;
      height: 19%;
      top: 51%;
      border-radius: 5px;
      background: #ffe77c;
      box-shadow: 0 0 15px #ffe77c;
    }

    .house .window.left { left: 17%; }
    .house .window.right { right: 17%; }

    .chimney {
      position: absolute;
      width: 13%;
      height: 30%;
      right: 18%;
      top: 2%;
      background: #8e3d35;
      border-radius: 3px 3px 0 0;
    }

    .smoke {
      position: absolute;
      width: 16px;
      height: 16px;
      right: 13%;
      top: -3%;
      border-radius: 50%;
      background: rgba(255,255,255,0.72);
      animation: smoke 3.5s ease-in-out infinite;
    }

    .smoke.two {
      animation-delay: 1.1s;
      transform: translate(-14px, 5px) scale(0.8);
    }

    @keyframes smoke {
      0% { opacity: 0; transform: translateY(10px) scale(0.55); }
      30% { opacity: 0.9; }
      100% { opacity: 0; transform: translate(-24px, -66px) scale(1.75); }
    }

    .pine-row {
      position: absolute;
      left: 32%;
      right: 3%;
      bottom: 31%;
      height: 20%;
      z-index: 1;
      display: flex;
      align-items: flex-end;
      justify-content: space-around;
      pointer-events: none;
    }

    .tree {
      position: relative;
      width: clamp(46px, 7vw, 86px);
      height: clamp(110px, 15vw, 158px);
      transform: scale(var(--scale, 1));
      transform-origin: bottom;
    }

    .tree::before,
    .tree::after {
      content: "";
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 88%;
      height: 45%;
      clip-path: polygon(50% 0, 100% 100%, 0 100%);
      background: linear-gradient(145deg, #0f6c53, #0b493f);
      border-radius: 2px;
    }

    .tree::before {
      top: 4%;
      width: 72%;
    }

    .tree::after {
      top: 29%;
    }

    .tree .tier {
      position: absolute;
      left: 50%;
      top: 55%;
      width: 108%;
      height: 44%;
      transform: translateX(-50%);
      clip-path: polygon(50% 0, 100% 100%, 0 100%);
      background: linear-gradient(145deg, #128b68, #0e5a48);
    }

    .tree .trunk {
      position: absolute;
      left: 42%;
      bottom: 0;
      width: 16%;
      height: 20%;
      background: #70412d;
      border-radius: 4px 4px 0 0;
    }

    .message {
      position: absolute;
      right: 3%;
      bottom: 5%;
      width: min(360px, 47%);
      padding: clamp(12px, 2vw, 18px);
      border-radius: 8px;
      background: rgba(255, 250, 240, 0.82);
      box-shadow: 0 14px 30px rgba(68, 57, 48, 0.16);
      backdrop-filter: blur(3px);
      z-index: 2;
    }

    .message h2 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(1.35rem, 3vw, 2.6rem);
      line-height: 0.95;
      letter-spacing: 0;
      color: var(--berry-dark);
    }

    .message p {
      margin: 8px 0 0;
      font-size: clamp(0.84rem, 1.55vw, 1.04rem);
      font-weight: 800;
      color: #385062;
    }

    .placed-sticker,
    .drag-ghost {
      position: absolute;
      width: var(--w, 74px);
      height: var(--w, 74px);
      border: 0;
      border-radius: 8px;
      background: transparent;
      display: grid;
      place-items: center;
      font-size: calc(var(--w, 74px) * 0.72);
      line-height: 1;
      cursor: grab;
      user-select: none;
      touch-action: none;
      z-index: 5;
      filter: drop-shadow(0 7px 5px rgba(54, 42, 38, 0.17));
      transform: rotate(var(--rot, 0deg));
      animation: stickerFloat var(--float, 5.5s) ease-in-out var(--delay, 0s) infinite;
      transition: transform 130ms ease, filter 130ms ease;
    }

    .placed-sticker:hover {
      transform: translateY(-3px) rotate(var(--rot, 0deg)) scale(1.08);
      filter: drop-shadow(0 10px 8px rgba(54, 42, 38, 0.24));
    }

    .placed-sticker.dragging {
      opacity: 0.35;
    }

    @keyframes stickerFloat {
      0%, 100% { margin-top: 0; }
      50% { margin-top: -5px; }
    }

    .spark {
      position: fixed;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--spark-color, #ffd95e);
      pointer-events: none;
      z-index: 20;
      animation: pop 720ms ease-out forwards;
    }

    @keyframes pop {
      0% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(0.45);
      }
      100% {
        opacity: 0;
        transform: translate(calc(-50% + var(--x)), calc(-50% + var(--y))) scale(0.05);
      }
    }

    .bottom-panel {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
      color: #fffaf2;
    }

    .status {
      min-height: 44px;
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 9px 12px;
      border-radius: 8px;
      background: rgba(37, 49, 68, 0.26);
      font-weight: 900;
      text-shadow: 0 2px 8px rgba(17, 37, 66, 0.28);
    }

    .counter {
      min-width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: var(--gold);
      color: #50341f;
      text-shadow: none;
      box-shadow: inset 0 -3px rgba(80, 52, 31, 0.14);
    }

    .side {
      position: relative;
      z-index: 1;
      min-height: 0;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 12px;
      padding: 14px;
      border-radius: 8px;
      background: rgba(255, 248, 232, 0.74);
      box-shadow: 0 26px 56px rgba(31, 42, 60, 0.22);
      backdrop-filter: blur(10px);
    }

    .side h2 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(1.25rem, 2vw, 1.8rem);
      line-height: 1;
      color: var(--berry-dark);
    }

    .sticker-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 9px;
      align-content: start;
      overflow-y: auto;
      padding: 3px 2px 6px;
      scrollbar-color: #c92d3b #fff2d1;
    }

    .sticker-choice {
      position: relative;
      min-height: 74px;
      border: 3px solid rgba(255,255,255,0.86);
      border-radius: 8px;
      background:
        linear-gradient(145deg, rgba(255,255,255,0.98), rgba(255,242,209,0.96));
      box-shadow: 0 8px 16px rgba(84, 55, 43, 0.13), inset 0 -3px rgba(109, 61, 46, 0.08);
      cursor: grab;
      font-size: clamp(1.9rem, 4vw, 2.55rem);
      line-height: 1;
      transition: transform 150ms ease, box-shadow 150ms ease, background 150ms ease;
      touch-action: none;
    }

    .sticker-choice::after {
      content: attr(aria-label);
      position: absolute;
      left: 6px;
      right: 6px;
      bottom: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 0.62rem;
      font-weight: 900;
      color: #74513e;
    }

    .palette-note {
      display: grid;
      gap: 9px;
    }

    .mini-controls {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .mini-controls .action-btn {
      padding-inline: 8px;
      font-size: 0.9rem;
    }

    .ribbon {
      position: absolute;
      top: -9px;
      right: 18px;
      width: 54px;
      height: 86px;
      background: linear-gradient(180deg, #c92d3b, #8e1d2d);
      clip-path: polygon(0 0, 100% 0, 100% 100%, 50% 75%, 0 100%);
      box-shadow: 0 10px 19px rgba(31, 42, 60, 0.16);
      z-index: 2;
    }

    .ribbon::before {
      content: "★";
      position: absolute;
      inset: 8px 0 auto;
      text-align: center;
      color: #ffe18a;
      font-size: 1.35rem;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      z-index: 50;
      transform: translateX(-50%) translateY(120px);
      max-width: min(520px, calc(100vw - 34px));
      padding: 12px 16px;
      border-radius: 8px;
      background: rgba(37, 49, 68, 0.92);
      color: #fffaf2;
      font-weight: 900;
      box-shadow: 0 18px 45px rgba(31, 42, 60, 0.22);
      transition: transform 260ms ease;
      pointer-events: none;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    .ghost {
      position: fixed;
      left: 0;
      top: 0;
      width: var(--w, 78px);
      height: var(--w, 78px);
      display: grid;
      place-items: center;
      font-size: calc(var(--w, 78px) * 0.72);
      z-index: 40;
      pointer-events: none;
      filter: drop-shadow(0 14px 14px rgba(31, 42, 60, 0.25));
      transform: translate(-50%, -50%) scale(1.08);
    }

    .snow-card-flake {
      position: absolute;
      top: -18px;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,0.9);
      animation: cardSnow var(--duration, 5s) linear var(--delay, 0s) infinite;
      pointer-events: none;
      z-index: 4;
    }

    @keyframes cardSnow {
      to {
        transform: translate3d(var(--drift, 10px), 690px, 0);
        opacity: 0.2;
      }
    }

    @media (max-width: 840px) {
      body {
        align-items: flex-start;
        padding: 10px;
      }

      .app {
        grid-template-columns: 1fr;
        min-height: auto;
      }

      .topbar {
        align-items: flex-start;
      }

      .brand {
        flex: 1 1 auto;
      }

      .soundbar {
        max-width: 170px;
      }

      .card {
        height: 62vh;
        min-height: 420px;
      }

      .side {
        min-height: 250px;
      }

      .sticker-grid {
        grid-template-columns: repeat(6, minmax(64px, 1fr));
        overflow-x: auto;
        overflow-y: hidden;
      }

      .message {
        left: 4%;
        right: 4%;
        width: auto;
        bottom: 3%;
      }

      .house {
        width: 32%;
      }
    }

    @media (max-width: 560px) {
      .topbar,
      .bottom-panel {
        display: grid;
        grid-template-columns: 1fr;
      }

      .soundbar {
        justify-content: start;
        max-width: none;
      }

      .badge {
        width: 44px;
        height: 44px;
        font-size: 1.5rem;
      }

      .card-shell {
        padding: 8px;
      }

      .card {
        min-height: 390px;
        height: 58vh;
        border-width: 6px;
      }

      .house {
        bottom: 36%;
      }

      .pine-row {
        left: 20%;
        right: -10%;
        bottom: 35%;
      }

      .message h2 {
        font-size: 1.35rem;
      }

      .message p {
        font-size: 0.8rem;
      }

      .sticker-grid {
        grid-template-columns: repeat(4, minmax(62px, 1fr));
      }

      .sticker-choice {
        min-height: 66px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <div class="snow-layer" aria-hidden="true" id="snowLayer"></div>
  <div class="sparkle-layer" aria-hidden="true" id="sparkleLayer"></div>

  <main class="app" aria-label="Interactive holiday card">
    <section class="stage" aria-label="Card maker">
      <header class="topbar">
        <div class="brand">
          <div class="badge" aria-hidden="true">🎁</div>
          <div>
            <h1>Snowy Sticker Card</h1>
            <span class="subtitle">Warm wishes from the little winter workshop</span>
          </div>
        </div>
        <div class="soundbar" aria-label="Sound controls">
          <button class="icon-btn" id="musicBtn" type="button" aria-label="Play jingle">🔔</button>
          <button class="icon-btn" id="sparkleBtn" type="button" aria-label="Play sparkle">✨</button>
          <button class="icon-btn" id="whooshBtn" type="button" aria-label="Play snowy whoosh">❄️</button>
        </div>
      </header>

      <div class="card-shell">
        <article class="card" id="card" aria-label="Holiday card canvas" tabindex="0">
          <div class="mountain" aria-hidden="true"></div>
          <div class="snow-hill" aria-hidden="true"></div>
          <div class="house" aria-hidden="true">
            <div class="chimney"></div>
            <div class="smoke"></div>
            <div class="smoke two"></div>
            <div class="roof"></div>
            <div class="body">
              <div class="window left"></div>
              <div class="window right"></div>
              <div class="door"></div>
            </div>
          </div>
          <div class="pine-row" aria-hidden="true">
            <div class="tree" style="--scale:.78"><span class="tier"></span><span class="trunk"></span></div>
            <div class="tree" style="--scale:1.05"><span class="tier"></span><span class="trunk"></span></div>
            <div class="tree" style="--scale:.68"><span class="tier"></span><span class="trunk"></span></div>
            <div class="tree" style="--scale:.92"><span class="tier"></span><span class="trunk"></span></div>
          </div>
          <div class="message" aria-label="Card message">
            <h2>Happy Holidays!</h2>
            <p>May your cocoa be marshmallowy and your snow day sparkle.</p>
          </div>
        </article>
      </div>

      <footer class="bottom-panel">
        <div class="status" aria-live="polite">
          <span class="counter" id="counter">0</span>
          <span id="statusText">Sticker magic is ready.</span>
        </div>
        <button class="action-btn" id="clearBtn" type="button"><span aria-hidden="true">🧤</span> Reset</button>
      </footer>
    </section>

    <aside class="side" aria-label="Sticker shelf">
      <div class="ribbon" aria-hidden="true"></div>
      <header>
        <h2>Sticker Shelf</h2>
      </header>
      <div class="sticker-grid" id="stickerGrid" aria-label="Available stickers"></div>
      <div class="palette-note">
        <div class="mini-controls">
          <button class="action-btn" id="confettiBtn" type="button"><span aria-hidden="true">🎉</span> Cheer</button>
          <button class="action-btn" id="randomBtn" type="button"><span aria-hidden="true">🎲</span> Surprise</button>
        </div>
      </div>
    </aside>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    (() => {
      const stickers = [
        { emoji: "⛄", name: "Snow Pal", sound: "boop", size: 82 },
        { emoji: "🎄", name: "Tree", sound: "chime", size: 84 },
        { emoji: "⭐", name: "Star", sound: "sparkle", size: 62 },
        { emoji: "🎁", name: "Present", sound: "pop", size: 70 },
        { emoji: "🦌", name: "Reindeer", sound: "hop", size: 82 },
        { emoji: "🐧", name: "Penguin", sound: "boop", size: 76 },
        { emoji: "🍪", name: "Cookie", sound: "crunch", size: 66 },
        { emoji: "🍭", name: "Candy", sound: "pop", size: 66 },
        { emoji: "🧸", name: "Bear", sound: "boop", size: 76 },
        { emoji: "🧦", name: "Stocking", sound: "chime", size: 68 },
        { emoji: "🛷", name: "Sled", sound: "slide", size: 78 },
        { emoji: "☃️", name: "Tiny Snowman", sound: "boop", size: 72 },
        { emoji: "🕯️", name: "Candle", sound: "sparkle", size: 66 },
        { emoji: "🔔", name: "Bell", sound: "jingle", size: 64 },
        { emoji: "🧁", name: "Cupcake", sound: "pop", size: 66 },
        { emoji: "💝", name: "Heart Gift", sound: "chime", size: 66 },
        { emoji: "🌟", name: "Glow Star", sound: "sparkle", size: 64 },
        { emoji: "❄️", name: "Snowflake", sound: "sparkle", size: 62 }
      ];

      const defaultPlacements = [
        { emoji: "⛄", name: "Snow Pal", sound: "boop", x: 18, y: 66, size: 86, rot: -4 },
        { emoji: "🎁", name: "Present", sound: "pop", x: 9, y: 78, size: 68, rot: 7 },
        { emoji: "🦌", name: "Reindeer", sound: "hop", x: 54, y: 61, size: 86, rot: 3 },
        { emoji: "⭐", name: "Star", sound: "sparkle", x: 80, y: 18, size: 62, rot: 10 },
        { emoji: "🐧", name: "Penguin", sound: "boop", x: 39, y: 73, size: 74, rot: -8 },
        { emoji: "🍭", name: "Candy", sound: "pop", x: 28, y: 54, size: 64, rot: 14 }
      ];

      const card = document.getElementById("card");
      const grid = document.getElementById("stickerGrid");
      const counter = document.getElementById("counter");
      const statusText = document.getElementById("statusText");
      const toast = document.getElementById("toast");
      const sparkleLayer = document.getElementById("sparkleLayer");
      const snowLayer = document.getElementById("snowLayer");
      let audioCtx;
      let placedCount = 0;
      let activeDrag = null;
      let ghost = null;
      let toastTimer;

      function createSnow() {
        for (let i = 0; i < 84; i++) {
          const flake = document.createElement("span");
          flake.className = "snowflake";
          flake.style.setProperty("--left", Math.random() * 100 + "vw");
          flake.style.setProperty("--size", (Math.random() * 7 + 3) + "px");
          flake.style.setProperty("--delay", (Math.random() * -14) + "s");
          flake.style.setProperty("--duration", (Math.random() * 9 + 8) + "s");
          flake.style.setProperty("--drift", (Math.random() * 90 - 45) + "px");
          snowLayer.appendChild(flake);
        }

        for (let i = 0; i < 42; i++) {
          const flake = document.createElement("span");
          flake.className = "snow-card-flake";
          flake.style.left = Math.random() * 100 + "%";
          flake.style.setProperty("--delay", (Math.random() * -7) + "s");
          flake.style.setProperty("--duration", (Math.random() * 5 + 4) + "s");
          flake.style.setProperty("--drift", (Math.random() * 70 - 35) + "px");
          flake.style.opacity = 0.35 + Math.random() * 0.55;
          card.appendChild(flake);
        }
      }

      function ensureAudio() {
        if (!audioCtx) {
          const Context = window.AudioContext || window.webkitAudioContext;
          audioCtx = new Context();
        }
        if (audioCtx.state === "suspended") {
          audioCtx.resume();
        }
      }

      function tone(freq, duration = 0.16, type = "sine", gainValue = 0.08, when = 0) {
        ensureAudio();
        const now = audioCtx.currentTime + when;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, now);
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(gainValue, now + 0.015);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + duration + 0.03);
      }

      function noise(duration = 0.35, gainValue = 0.055) {
        ensureAudio();
        const bufferSize = Math.max(1, Math.floor(audioCtx.sampleRate * duration));
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
          data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
        }
        const source = audioCtx.createBufferSource();
        const filter = audioCtx.createBiquadFilter();
        const gain = audioCtx.createGain();
        filter.type = "highpass";
        filter.frequency.value = 820;
        gain.gain.value = gainValue;
        source.buffer = buffer;
        source.connect(filter);
        filter.connect(gain);
        gain.connect(audioCtx.destination);
        source.start();
      }

      function playSound(kind) {
        try {
          if (kind === "jingle") {
            [659, 659, 659, 523, 659, 784].forEach((f, i) => tone(f, 0.12, "triangle", 0.07, i * 0.12));
          } else if (kind === "sparkle") {
            [880, 1175, 1568].forEach((f, i) => tone(f, 0.12, "sine", 0.055, i * 0.07));
          } else if (kind === "whoosh" || kind === "slide") {
            noise(0.42, 0.06);
            tone(196, 0.32, "sine", 0.025);
          } else if (kind === "hop") {
            tone(330, 0.08, "square", 0.045);
            tone(494, 0.11, "triangle", 0.055, 0.08);
          } else if (kind === "crunch") {
            noise(0.13, 0.04);
            tone(160, 0.07, "square", 0.025);
          } else if (kind === "chime") {
            tone(523, 0.16, "triangle", 0.055);
            tone(1047, 0.24, "sine", 0.04, 0.06);
          } else if (kind === "pop") {
            tone(247, 0.07, "square", 0.05);
            tone(740, 0.12, "triangle", 0.055, 0.05);
          } else {
            tone(392, 0.09, "triangle", 0.052);
            tone(587, 0.1, "sine", 0.04, 0.07);
          }
        } catch (error) {
          // Audio can be blocked in some embedded browsers until a direct gesture.
        }
      }

      function burst(x, y, amount = 16) {
        const colors = ["#ffd95e", "#fffaf0", "#e84352", "#8bd7bf", "#5fa8d8"];
        for (let i = 0; i < amount; i++) {
          const spark = document.createElement("span");
          spark.className = "spark";
          const angle = Math.random() * Math.PI * 2;
          const distance = 32 + Math.random() * 78;
          spark.style.left = x + "px";
          spark.style.top = y + "px";
          spark.style.setProperty("--x", Math.cos(angle) * distance + "px");
          spark.style.setProperty("--y", Math.sin(angle) * distance + "px");
          spark.style.setProperty("--spark-color", colors[i % colors.length]);
          sparkleLayer.appendChild(spark);
          spark.addEventListener("animationend", () => spark.remove());
        }
      }

      function showToast(text) {
        toast.textContent = text;
        toast.classList.add("show");
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove("show"), 1500);
      }

      function updateCounter() {
        placedCount = card.querySelectorAll(".placed-sticker").length;
        counter.textContent = placedCount;
      }

      function normalizeDrop(clientX, clientY, size) {
        const rect = card.getBoundingClientRect();
        const x = ((clientX - rect.left - size / 2) / rect.width) * 100;
        const y = ((clientY - rect.top - size / 2) / rect.height) * 100;
        const maxX = 100 - (size / rect.width) * 100;
        const maxY = 100 - (size / rect.height) * 100;
        return {
          x: Math.min(Math.max(x, 0), Math.max(maxX, 0)),
          y: Math.min(Math.max(y, 0), Math.max(maxY, 0))
        };
      }

      function placeSticker(data, x, y, fromPercent = false) {
        const button = document.createElement("button");
        const size = data.size || 72;
        const rot = data.rot ?? (Math.random() * 24 - 12);
        button.type = "button";
        button.className = "placed-sticker";
        button.textContent = data.emoji;
        button.dataset.emoji = data.emoji;
        button.dataset.name = data.name;
        button.dataset.sound = data.sound || "boop";
        button.dataset.size = size;
        button.setAttribute("aria-label", data.name + " sticker");
        button.style.setProperty("--w", size + "px");
        button.style.setProperty("--rot", rot + "deg");
        button.style.setProperty("--delay", (Math.random() * -4).toFixed(2) + "s");
        button.style.setProperty("--float", (4.2 + Math.random() * 2.4).toFixed(2) + "s");

        if (fromPercent) {
          button.style.left = x + "%";
          button.style.top = y + "%";
        } else {
          const pos = normalizeDrop(x, y, size);
          button.style.left = pos.x + "%";
          button.style.top = pos.y + "%";
        }

        button.addEventListener("pointerdown", (event) => beginDrag(event, {
          source: "placed",
          element: button,
          emoji: data.emoji,
          name: data.name,
          sound: data.sound || "boop",
          size,
          rot
        }));
        button.addEventListener("click", (event) => {
          if (button.dataset.dragged === "true") {
            button.dataset.dragged = "false";
            return;
          }
          playSound(button.dataset.sound);
          burst(event.clientX, event.clientY, 14);
          statusText.textContent = button.dataset.name + " says hello!";
        });
        card.appendChild(button);
        updateCounter();
        return button;
      }

      function buildShelf() {
        stickers.forEach((item) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "sticker-choice";
          button.textContent = item.emoji;
          button.setAttribute("aria-label", item.name);
          button.addEventListener("pointerdown", (event) => {
            button.dataset.pointerClick = "true";
            beginDrag(event, { source: "shelf", sourceElement: button, ...item });
          });
          button.addEventListener("click", () => {
            if (button.dataset.pointerClick === "true") {
              button.dataset.pointerClick = "false";
              return;
            }
            const rect = card.getBoundingClientRect();
            const x = rect.left + rect.width * (0.16 + Math.random() * 0.66);
            const y = rect.top + rect.height * (0.2 + Math.random() * 0.58);
            placeSticker(item, x, y);
            playSound(item.sound);
            burst(x, y, 18);
            statusText.textContent = item.name + " hopped onto the card.";
          });
          grid.appendChild(button);
        });
      }

      function beginDrag(event, data) {
        if (event.button !== undefined && event.button !== 0) return;
        event.preventDefault();
        ensureAudio();
        activeDrag = {
          data,
          pointerId: event.pointerId,
          startX: event.clientX,
          startY: event.clientY,
          moved: false
        };
        if (data.source === "placed") {
          data.element.classList.add("dragging");
        }
        ghost = document.createElement("div");
        ghost.className = "ghost";
        ghost.textContent = data.emoji;
        ghost.style.setProperty("--w", (data.size || 72) + "px");
        document.body.appendChild(ghost);
        moveGhost(event.clientX, event.clientY);
        window.addEventListener("pointermove", onDragMove);
        window.addEventListener("pointerup", endDrag, { once: true });
        window.addEventListener("pointercancel", cancelDrag, { once: true });
      }

      function moveGhost(x, y) {
        if (ghost) {
          ghost.style.transform = `translate(${x}px, ${y}px) translate(-50%, -50%) scale(1.08)`;
        }
      }

      function onDragMove(event) {
        if (!activeDrag || event.pointerId !== activeDrag.pointerId) return;
        const dx = event.clientX - activeDrag.startX;
        const dy = event.clientY - activeDrag.startY;
        if (Math.hypot(dx, dy) > 4) activeDrag.moved = true;
        moveGhost(event.clientX, event.clientY);
      }

      function endDrag(event) {
        if (!activeDrag || event.pointerId !== activeDrag.pointerId) return;
        const rect = card.getBoundingClientRect();
        const inside = event.clientX >= rect.left && event.clientX <= rect.right && event.clientY >= rect.top && event.clientY <= rect.bottom;
        const data = activeDrag.data;
        if (inside) {
          if (data.source === "placed") {
            const pos = normalizeDrop(event.clientX, event.clientY, data.size || 72);
            data.element.style.left = pos.x + "%";
            data.element.style.top = pos.y + "%";
            data.element.dataset.dragged = activeDrag.moved ? "true" : "false";
            data.element.classList.remove("dragging");
          } else {
            placeSticker(data, event.clientX, event.clientY);
          }
          playSound(data.sound || "boop");
          burst(event.clientX, event.clientY, 20);
          statusText.textContent = data.name + " landed in the snow.";
        } else if (data.source === "shelf" && !activeDrag.moved) {
          const cardRect = card.getBoundingClientRect();
          const x = cardRect.left + cardRect.width * (0.16 + Math.random() * 0.66);
          const y = cardRect.top + cardRect.height * (0.2 + Math.random() * 0.58);
          placeSticker(data, x, y);
          playSound(data.sound || "boop");
          burst(x, y, 18);
          statusText.textContent = data.name + " hopped onto the card.";
        } else if (data.source === "placed") {
          data.element.classList.remove("dragging");
          data.element.dataset.dragged = "false";
          statusText.textContent = data.name + " stayed on the card.";
        }
        if (data.sourceElement) {
          setTimeout(() => {
            data.sourceElement.dataset.pointerClick = "false";
          }, 0);
        }
        cleanupDrag();
      }

      function cancelDrag() {
        if (activeDrag?.data?.source === "placed") {
          activeDrag.data.element.classList.remove("dragging");
        }
        cleanupDrag();
      }

      function cleanupDrag() {
        window.removeEventListener("pointermove", onDragMove);
        if (ghost) ghost.remove();
        ghost = null;
        activeDrag = null;
        updateCounter();
      }

      function resetCard(silent = false) {
        card.querySelectorAll(".placed-sticker").forEach((node) => node.remove());
        defaultPlacements.forEach((item) => placeSticker(item, item.x, item.y, true));
        if (!silent) playSound("whoosh");
        statusText.textContent = "The card is cozy again.";
        if (!silent) {
          const rect = card.getBoundingClientRect();
          burst(rect.left + rect.width / 2, rect.top + rect.height / 2, 28);
        }
      }

      function randomSurprise() {
        const item = stickers[Math.floor(Math.random() * stickers.length)];
        const rect = card.getBoundingClientRect();
        const x = rect.left + rect.width * (0.1 + Math.random() * 0.78);
        const y = rect.top + rect.height * (0.13 + Math.random() * 0.72);
        placeSticker(item, x, y);
        playSound(item.sound);
        burst(x, y, 22);
        showToast(item.name + " surprise!");
        statusText.textContent = item.name + " surprise!";
      }

      function cheer() {
        const rect = card.getBoundingClientRect();
        playSound("jingle");
        for (let i = 0; i < 5; i++) {
          setTimeout(() => {
            burst(rect.left + Math.random() * rect.width, rect.top + Math.random() * rect.height, 18);
          }, i * 110);
        }
        showToast("Happy Holidays!");
        statusText.textContent = "The whole card is cheering.";
      }

      document.getElementById("musicBtn").addEventListener("click", () => {
        playSound("jingle");
        showToast("Jingle bells!");
      });
      document.getElementById("sparkleBtn").addEventListener("click", (event) => {
        playSound("sparkle");
        burst(event.clientX, event.clientY, 26);
        showToast("Sparkle time!");
      });
      document.getElementById("whooshBtn").addEventListener("click", () => {
        playSound("whoosh");
        const rect = card.getBoundingClientRect();
        for (let i = 0; i < 22; i++) {
          setTimeout(() => burst(rect.left + Math.random() * rect.width, rect.top + Math.random() * rect.height, 9), i * 22);
        }
      });
      document.getElementById("clearBtn").addEventListener("click", () => resetCard());
      document.getElementById("randomBtn").addEventListener("click", randomSurprise);
      document.getElementById("confettiBtn").addEventListener("click", cheer);
      card.addEventListener("click", (event) => {
        if (event.target !== card) return;
        playSound("sparkle");
        burst(event.clientX, event.clientY, 12);
      });

      createSnow();
      buildShelf();
      resetCard(true);
    })();
  </script>
</body>
</html>
