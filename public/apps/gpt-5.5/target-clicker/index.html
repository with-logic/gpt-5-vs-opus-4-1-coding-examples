<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Target Clicker</title>
  <style>
    :root {
      --ink: #162033;
      --muted: #667085;
      --panel: rgba(255, 255, 255, 0.78);
      --panel-strong: rgba(255, 255, 255, 0.94);
      --line: rgba(22, 32, 51, 0.12);
      --accent: #ff4f8b;
      --accent-2: #13b7a6;
      --good: #11a56f;
      --warn: #f07d21;
      --miss: #e24545;
      --shadow: 0 18px 50px rgba(50, 65, 92, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      overflow: hidden;
      color: var(--ink);
      font-family: ui-rounded, "Avenir Next", "Segoe UI", Verdana, sans-serif;
      background:
        radial-gradient(circle at 18% 18%, rgba(255, 202, 62, 0.22), transparent 24rem),
        radial-gradient(circle at 78% 12%, rgba(19, 183, 166, 0.17), transparent 25rem),
        radial-gradient(circle at 50% 92%, rgba(80, 135, 255, 0.18), transparent 28rem),
        linear-gradient(135deg, #fff9ee 0%, #edfaff 48%, #fff5fb 100%);
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    button {
      font: inherit;
    }

    .arena {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      cursor: crosshair;
    }

    .arena::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(24, 32, 51, 0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(24, 32, 51, 0.045) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: radial-gradient(circle at center, rgba(0, 0, 0, 0.9), rgba(0, 0, 0, 0.08) 78%);
      pointer-events: none;
    }

    .arena::after {
      content: "";
      position: absolute;
      inset: 16px;
      border: 1px solid rgba(22, 32, 51, 0.08);
      border-radius: 22px;
      pointer-events: none;
    }

    .topbar {
      position: fixed;
      z-index: 20;
      top: 18px;
      left: 18px;
      right: 18px;
      display: grid;
      grid-template-columns: minmax(160px, 1fr) auto minmax(160px, 1fr);
      align-items: start;
      gap: 14px;
      pointer-events: none;
    }

    .brand,
    .hud,
    .status-pill {
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px) saturate(1.2);
      -webkit-backdrop-filter: blur(18px) saturate(1.2);
    }

    .brand {
      width: max-content;
      min-width: 220px;
      padding: 13px 16px;
      border-radius: 18px;
    }

    .eyebrow {
      display: block;
      margin-bottom: 3px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 850;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(25px, 3.2vw, 38px);
      line-height: 0.95;
      font-weight: 800;
      letter-spacing: 0;
    }

    .hud {
      min-width: min(620px, calc(100vw - 36px));
      padding: 12px 14px 14px;
      border-radius: 20px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(70px, 1fr));
      gap: 8px;
      align-items: stretch;
    }

    .stat {
      min-height: 58px;
      padding: 8px 10px;
      border-radius: 13px;
      background: rgba(255, 255, 255, 0.58);
      border: 1px solid rgba(22, 32, 51, 0.075);
      text-align: center;
    }

    .label {
      display: block;
      color: var(--muted);
      font-size: 10px;
      font-weight: 850;
      letter-spacing: 0.11em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .value {
      display: block;
      margin-top: 3px;
      font-size: clamp(22px, 3vw, 33px);
      line-height: 1;
      font-weight: 950;
      font-variant-numeric: tabular-nums;
    }

    .meter {
      position: relative;
      height: 8px;
      margin-top: 11px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(22, 32, 51, 0.1);
    }

    .meter-fill {
      position: absolute;
      inset: 0 auto 0 0;
      width: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #13b7a6, #ffca3e 55%, #ff4f8b);
      box-shadow: 0 0 18px rgba(255, 79, 139, 0.32);
      transform-origin: left center;
    }

    .status-pill {
      justify-self: end;
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 12px 14px;
      border-radius: 999px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent-2);
      box-shadow: 0 0 0 5px rgba(19, 183, 166, 0.16);
    }

    .crosshair {
      position: fixed;
      z-index: 8;
      width: 38px;
      height: 38px;
      margin: -19px 0 0 -19px;
      border: 2px solid rgba(22, 32, 51, 0.22);
      border-radius: 50%;
      pointer-events: none;
      opacity: 0;
      transform: scale(0.6);
      transition: opacity 160ms ease, transform 160ms ease;
    }

    .arena.active .crosshair {
      opacity: 1;
      transform: scale(1);
    }

    .crosshair::before,
    .crosshair::after {
      content: "";
      position: absolute;
      background: rgba(22, 32, 51, 0.25);
    }

    .crosshair::before {
      left: 50%;
      top: -9px;
      bottom: -9px;
      width: 2px;
      transform: translateX(-50%);
    }

    .crosshair::after {
      top: 50%;
      left: -9px;
      right: -9px;
      height: 2px;
      transform: translateY(-50%);
    }

    .target {
      position: absolute;
      z-index: 10;
      width: var(--size);
      height: var(--size);
      left: var(--x);
      top: var(--y);
      border: 0;
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 50%, #ffffff 0 12%, transparent 13%),
        radial-gradient(circle at 50% 50%, var(--target-a) 0 30%, transparent 31%),
        radial-gradient(circle at 50% 50%, #ffffff 0 44%, transparent 45%),
        radial-gradient(circle at 50% 50%, var(--target-b) 0 61%, transparent 62%),
        radial-gradient(circle at 50% 50%, #ffffff 0 75%, transparent 76%),
        radial-gradient(circle at 30% 24%, rgba(255, 255, 255, 0.92), transparent 28%),
        var(--target-c);
      box-shadow:
        0 14px 34px rgba(24, 35, 61, 0.2),
        0 0 0 9px color-mix(in srgb, var(--target-b), transparent 78%),
        inset 0 0 0 2px rgba(255, 255, 255, 0.8);
      cursor: pointer;
      outline: none;
      transform: translate(-50%, -50%) scale(1);
      animation:
        targetIn 160ms cubic-bezier(.2, 1.35, .35, 1) forwards,
        targetPulse 720ms ease-in-out infinite 170ms,
        targetSpin var(--spin-speed) linear infinite;
    }

    .target::before,
    .target::after {
      content: "";
      position: absolute;
      inset: -12px;
      border: 3px solid color-mix(in srgb, var(--target-b), transparent 45%);
      border-radius: 50%;
      opacity: 0;
      animation: ringPulse 920ms ease-out infinite;
    }

    .target::after {
      inset: -22px;
      border-color: color-mix(in srgb, var(--target-a), transparent 56%);
      animation-delay: 190ms;
    }

    .target:focus-visible {
      box-shadow:
        0 14px 34px rgba(24, 35, 61, 0.2),
        0 0 0 5px #162033,
        0 0 0 12px rgba(255, 255, 255, 0.95);
    }

    .target.hit {
      pointer-events: none;
      animation: targetHit 230ms cubic-bezier(.18, .9, .2, 1) forwards;
    }

    .target.escape {
      pointer-events: none;
      animation: targetEscape 190ms ease-in forwards;
    }

    .burst {
      position: absolute;
      z-index: 12;
      left: var(--x);
      top: var(--y);
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--color);
      box-shadow: 0 0 12px var(--color);
      pointer-events: none;
      transform: translate(-50%, -50%);
      animation: burst 580ms cubic-bezier(.14, .78, .3, 1) forwards;
    }

    .ripple {
      position: absolute;
      z-index: 7;
      left: var(--x);
      top: var(--y);
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid var(--miss);
      opacity: 0.52;
      pointer-events: none;
      transform: translate(-50%, -50%);
      animation: missRipple 430ms ease-out forwards;
    }

    .float-score {
      position: absolute;
      z-index: 13;
      left: var(--x);
      top: var(--y);
      color: #0f6f55;
      font-size: 22px;
      font-weight: 950;
      text-shadow: 0 2px 0 rgba(255, 255, 255, 0.7);
      pointer-events: none;
      transform: translate(-50%, -80%);
      animation: floatScore 650ms ease-out forwards;
    }

    .overlay {
      position: fixed;
      z-index: 30;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(255, 250, 241, 0.28);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: opacity 180ms ease, visibility 180ms ease;
    }

    .overlay.hidden {
      visibility: hidden;
      opacity: 0;
      pointer-events: none;
    }

    .modal {
      width: min(620px, 100%);
      border: 1px solid rgba(22, 32, 51, 0.12);
      border-radius: 28px;
      background: var(--panel-strong);
      box-shadow: 0 28px 80px rgba(40, 51, 80, 0.22);
      overflow: hidden;
      transform: translateY(0) scale(1);
      animation: modalIn 320ms cubic-bezier(.2, 1.05, .35, 1) both;
    }

    .modal-hero {
      position: relative;
      min-height: 210px;
      padding: 28px;
      overflow: hidden;
      color: white;
      background:
        radial-gradient(circle at 75% 25%, rgba(255, 255, 255, 0.32), transparent 9rem),
        linear-gradient(135deg, #ff4f8b 0%, #ff9f1c 46%, #13b7a6 100%);
    }

    .modal-hero::before,
    .modal-hero::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      border: 18px solid rgba(255, 255, 255, 0.24);
    }

    .modal-hero::before {
      width: 150px;
      height: 150px;
      right: -35px;
      bottom: -35px;
      animation: heroPulse 1.5s ease-in-out infinite;
    }

    .modal-hero::after {
      width: 92px;
      height: 92px;
      right: 120px;
      top: 38px;
      animation: heroPulse 1.5s ease-in-out 220ms infinite;
    }

    .modal-hero .eyebrow {
      position: relative;
      color: rgba(255, 255, 255, 0.82);
    }

    .modal-title {
      position: relative;
      width: min(440px, 100%);
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(42px, 8vw, 78px);
      line-height: 0.88;
      letter-spacing: 0;
    }

    .modal-body {
      padding: 24px 28px 28px;
    }

    .intro {
      margin: 0 0 18px;
      color: #445066;
      font-size: 17px;
      line-height: 1.5;
      font-weight: 650;
    }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin: 0 0 20px;
    }

    .result {
      min-height: 88px;
      padding: 13px 10px;
      border: 1px solid rgba(22, 32, 51, 0.1);
      border-radius: 18px;
      background: #ffffff;
      text-align: center;
    }

    .result strong {
      display: block;
      margin-top: 7px;
      font-size: clamp(24px, 5vw, 39px);
      line-height: 1;
      font-weight: 950;
      font-variant-numeric: tabular-nums;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
    }

    .primary-btn,
    .ghost-btn {
      min-height: 48px;
      border-radius: 999px;
      border: 0;
      cursor: pointer;
      font-weight: 900;
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    .primary-btn {
      min-width: 190px;
      padding: 0 22px;
      color: white;
      background: #162033;
      box-shadow: 0 12px 25px rgba(22, 32, 51, 0.24);
    }

    .primary-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 28px rgba(22, 32, 51, 0.28);
    }

    .primary-btn:active {
      transform: translateY(0) scale(0.98);
    }

    .ghost-btn {
      padding: 0 16px;
      color: #374151;
      background: transparent;
    }

    .ghost-btn:hover {
      background: rgba(22, 32, 51, 0.06);
    }

    .primary-btn:focus-visible,
    .ghost-btn:focus-visible {
      outline: 3px solid rgba(19, 183, 166, 0.45);
      outline-offset: 3px;
    }

    .countdown {
      position: fixed;
      z-index: 32;
      inset: 0;
      display: grid;
      place-items: center;
      color: white;
      font-size: clamp(92px, 18vw, 220px);
      font-weight: 950;
      text-shadow: 0 22px 50px rgba(22, 32, 51, 0.28);
      pointer-events: none;
      opacity: 0;
      transform: scale(0.84);
    }

    .countdown.show {
      animation: countdownPop 780ms cubic-bezier(.2, 1.18, .35, 1) both;
    }

    @keyframes targetIn {
      from {
        transform: translate(-50%, -50%) scale(0.58);
      }
      to {
        transform: translate(-50%, -50%) scale(1);
      }
    }

    @keyframes targetPulse {
      0%,
      100% {
        transform: translate(-50%, -50%) scale(1);
      }
      50% {
        transform: translate(-50%, -50%) scale(1.08);
      }
    }

    @keyframes heroPulse {
      50% {
        transform: scale(1.07);
      }
    }

    @keyframes targetSpin {
      to {
        rotate: 360deg;
      }
    }

    @keyframes ringPulse {
      0% {
        opacity: 0;
        transform: scale(0.78);
      }
      28% {
        opacity: 0.76;
      }
      100% {
        opacity: 0;
        transform: scale(1.15);
      }
    }

    @keyframes targetHit {
      45% {
        transform: translate(-50%, -50%) scale(1.22);
        filter: brightness(1.1);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.12) rotate(25deg);
      }
    }

    @keyframes targetEscape {
      to {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.62);
        filter: saturate(0.4);
      }
    }

    @keyframes burst {
      to {
        opacity: 0;
        transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(0.18);
      }
    }

    @keyframes missRipple {
      to {
        width: 76px;
        height: 76px;
        opacity: 0;
      }
    }

    @keyframes floatScore {
      to {
        opacity: 0;
        transform: translate(-50%, -210%);
      }
    }

    @keyframes modalIn {
      from {
        opacity: 0;
        transform: translateY(14px) scale(0.97);
      }
    }

    @keyframes countdownPop {
      0% {
        opacity: 0;
        transform: scale(0.72);
      }
      22% {
        opacity: 1;
        transform: scale(1);
      }
      100% {
        opacity: 0;
        transform: scale(1.18);
      }
    }

    @media (max-width: 740px) {
      .topbar {
        top: 10px;
        left: 10px;
        right: 10px;
        grid-template-columns: 1fr;
        gap: 9px;
      }

      .brand {
        min-width: 0;
        width: 100%;
        padding: 11px 13px;
        border-radius: 16px;
      }

      .brand h1 {
        font-size: 27px;
      }

      .hud {
        min-width: 100%;
        order: 2;
        padding: 10px;
        border-radius: 16px;
      }

      .stats {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 6px;
      }

      .stat {
        min-height: 50px;
        padding: 7px 5px;
        border-radius: 10px;
      }

      .label {
        font-size: 8px;
      }

      .value {
        font-size: 22px;
      }

      .status-pill {
        display: none;
      }

      .arena::after {
        inset: 8px;
        border-radius: 16px;
      }

      .modal {
        border-radius: 22px;
      }

      .modal-hero {
        min-height: 185px;
        padding: 22px;
      }

      .modal-body {
        padding: 20px;
      }

      .result-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr;
      }

      .primary-btn,
      .ghost-btn {
        width: 100%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 1ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="arena" id="arena" aria-label="Target Clicker game arena">
    <section class="topbar" aria-label="Game status">
      <div class="brand" aria-hidden="true">
        <span class="eyebrow">20 second aim lab</span>
        <h1>Target Clicker</h1>
      </div>

      <div class="hud" aria-live="polite">
        <div class="stats">
          <div class="stat">
            <span class="label">Score</span>
            <span class="value" id="score">0</span>
          </div>
          <div class="stat">
            <span class="label">Time</span>
            <span class="value" id="time">20.0</span>
          </div>
          <div class="stat">
            <span class="label">Accuracy</span>
            <span class="value" id="accuracy">100%</span>
          </div>
          <div class="stat">
            <span class="label">Streak</span>
            <span class="value" id="streak">0</span>
          </div>
        </div>
        <div class="meter" aria-hidden="true">
          <div class="meter-fill" id="meterFill"></div>
        </div>
      </div>

      <div class="status-pill" id="statusPill" aria-hidden="true">
        <span class="status-dot"></span>
        <span id="statusText">Ready</span>
      </div>
    </section>

    <div class="crosshair" id="crosshair" aria-hidden="true"></div>
    <div class="countdown" id="countdown" aria-hidden="true">3</div>

    <section class="overlay" id="overlay" aria-labelledby="modalTitle" role="dialog" aria-modal="true">
      <div class="modal">
        <div class="modal-hero">
          <span class="eyebrow" id="modalKicker">Arcade precision test</span>
          <h2 class="modal-title" id="modalTitle">Click fast. Miss clean.</h2>
        </div>
        <div class="modal-body">
          <p class="intro" id="modalIntro">Targets flash around the arena for 20 seconds. Hit the bullseyes, avoid empty clicks, and keep your streak alive.</p>
          <div class="result-grid" id="results" hidden>
            <div class="result">
              <span class="label">Score</span>
              <strong id="finalScore">0</strong>
            </div>
            <div class="result">
              <span class="label">Accuracy</span>
              <strong id="finalAccuracy">0%</strong>
            </div>
            <div class="result">
              <span class="label">Hits</span>
              <strong id="finalHits">0</strong>
            </div>
            <div class="result">
              <span class="label">Best</span>
              <strong id="bestScore">0</strong>
            </div>
          </div>
          <div class="actions">
            <button class="primary-btn" id="startButton" type="button">Start challenge</button>
            <button class="ghost-btn" id="soundButton" type="button" aria-pressed="false">Sound off</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    (() => {
      "use strict";

      const GAME_LENGTH = 20;
      const palette = [
        ["#ff4f8b", "#ffca3e", "#7c3cff"],
        ["#13b7a6", "#64d94b", "#0e7fe5"],
        ["#ff6b35", "#ffd166", "#e63946"],
        ["#4d96ff", "#7b61ff", "#00c2a8"],
        ["#f15bb5", "#fee440", "#00bbf9"]
      ];

      const arena = document.getElementById("arena");
      const scoreEl = document.getElementById("score");
      const timeEl = document.getElementById("time");
      const accuracyEl = document.getElementById("accuracy");
      const streakEl = document.getElementById("streak");
      const meterFill = document.getElementById("meterFill");
      const statusText = document.getElementById("statusText");
      const crosshair = document.getElementById("crosshair");
      const overlay = document.getElementById("overlay");
      const modalKicker = document.getElementById("modalKicker");
      const modalTitle = document.getElementById("modalTitle");
      const modalIntro = document.getElementById("modalIntro");
      const results = document.getElementById("results");
      const finalScore = document.getElementById("finalScore");
      const finalAccuracy = document.getElementById("finalAccuracy");
      const finalHits = document.getElementById("finalHits");
      const bestScore = document.getElementById("bestScore");
      const startButton = document.getElementById("startButton");
      const soundButton = document.getElementById("soundButton");
      const countdown = document.getElementById("countdown");

      const state = {
        running: false,
        score: 0,
        hits: 0,
        misses: 0,
        escaped: 0,
        streak: 0,
        bestStreak: 0,
        startedAt: 0,
        target: null,
        targetTimer: 0,
        spawnTimer: 0,
        frame: 0,
        sound: false,
        audio: null
      };

      function pct() {
        const total = state.hits + state.misses + state.escaped;
        return total === 0 ? 100 : Math.round((state.hits / total) * 100);
      }

      function getBestScore() {
        try {
          return Number(localStorage.getItem("targetClickerBest") || 0);
        } catch (error) {
          return 0;
        }
      }

      function saveBestScore(value) {
        try {
          localStorage.setItem("targetClickerBest", String(value));
        } catch (error) {
          /* High score persistence is optional; gameplay should continue. */
        }
      }

      function renderHud() {
        scoreEl.textContent = state.score;
        streakEl.textContent = state.streak;
        accuracyEl.textContent = pct() + "%";

        if (state.running) {
          const elapsed = (performance.now() - state.startedAt) / 1000;
          const remaining = Math.max(0, GAME_LENGTH - elapsed);
          timeEl.textContent = remaining.toFixed(1);
          meterFill.style.transform = `scaleX(${remaining / GAME_LENGTH})`;
        } else {
          timeEl.textContent = GAME_LENGTH.toFixed(1);
          meterFill.style.transform = "scaleX(1)";
        }
      }

      function playTone(type) {
        if (!state.sound) return;
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        if (!state.audio) state.audio = new AudioContext();
        const ctx = state.audio;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        const now = ctx.currentTime;
        osc.type = type === "hit" ? "triangle" : "sine";
        osc.frequency.setValueAtTime(type === "hit" ? 720 : 180, now);
        osc.frequency.exponentialRampToValueAtTime(type === "hit" ? 1040 : 110, now + 0.08);
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(type === "hit" ? 0.08 : 0.045, now + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.12);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(now);
        osc.stop(now + 0.13);
      }

      function randomBetween(min, max) {
        return min + Math.random() * (max - min);
      }

      function getSafePoint(size) {
        const rect = arena.getBoundingClientRect();
        const margin = Math.max(size * 0.8, 54);
        const topReserve = window.innerWidth <= 740 ? 185 : 118;
        const minX = margin;
        const maxX = Math.max(minX, rect.width - margin);
        const minY = Math.min(rect.height - margin, topReserve);
        const maxY = Math.max(minY, rect.height - margin);
        return {
          x: randomBetween(minX, maxX),
          y: randomBetween(minY, maxY)
        };
      }

      function removeTarget(markEscaped) {
        if (!state.target) return;
        clearTimeout(state.targetTimer);
        const target = state.target;
        state.target = null;

        if (markEscaped && state.running) {
          state.escaped += 1;
          state.streak = 0;
          target.classList.add("escape");
          playTone("miss");
          renderHud();
        }

        setTimeout(() => target.remove(), 210);
      }

      function spawnTarget() {
        if (!state.running || state.target) return;

        const size = Math.round(randomBetween(42, Math.max(52, 76 - Math.min(state.hits, 18))));
        const point = getSafePoint(size);
        const colors = palette[Math.floor(Math.random() * palette.length)];
        const target = document.createElement("button");
        const life = Math.max(520, 1060 - state.hits * 16);

        target.type = "button";
        target.className = "target";
        target.setAttribute("aria-label", "Click target");
        target.style.setProperty("--size", size + "px");
        target.style.setProperty("--x", point.x + "px");
        target.style.setProperty("--y", point.y + "px");
        target.style.setProperty("--target-a", colors[0]);
        target.style.setProperty("--target-b", colors[1]);
        target.style.setProperty("--target-c", colors[2]);
        target.style.setProperty("--spin-speed", randomBetween(3.5, 6.2).toFixed(2) + "s");

        target.addEventListener("pointerdown", (event) => {
          event.preventDefault();
          event.stopPropagation();
          hitTarget(target, point.x, point.y, colors);
        });

        arena.appendChild(target);
        state.target = target;
        state.targetTimer = window.setTimeout(() => {
          removeTarget(true);
          queueSpawn(95);
        }, life);
      }

      function queueSpawn(delay) {
        clearTimeout(state.spawnTimer);
        if (!state.running) return;
        state.spawnTimer = window.setTimeout(spawnTarget, delay ?? randomBetween(90, 210));
      }

      function hitTarget(target, x, y, colors) {
        if (!state.running || target !== state.target) return;
        clearTimeout(state.targetTimer);
        state.target = null;
        state.hits += 1;
        state.streak += 1;
        state.bestStreak = Math.max(state.bestStreak, state.streak);
        state.score += 100 + Math.min(15, state.streak) * 12;
        target.classList.add("hit");
        emitBurst(x, y, colors);
        floatScore(x, y, 100 + Math.min(15, state.streak) * 12);
        playTone("hit");
        renderHud();
        setTimeout(() => target.remove(), 260);
        queueSpawn(Math.max(45, 155 - state.hits * 3));
      }

      function emitBurst(x, y, colors) {
        for (let i = 0; i < 18; i += 1) {
          const angle = (Math.PI * 2 * i) / 18 + randomBetween(-0.16, 0.16);
          const distance = randomBetween(34, 86);
          const particle = document.createElement("span");
          particle.className = "burst";
          particle.style.setProperty("--x", x + "px");
          particle.style.setProperty("--y", y + "px");
          particle.style.setProperty("--dx", Math.cos(angle) * distance + "px");
          particle.style.setProperty("--dy", Math.sin(angle) * distance + "px");
          particle.style.setProperty("--color", colors[i % colors.length]);
          arena.appendChild(particle);
          setTimeout(() => particle.remove(), 620);
        }
      }

      function floatScore(x, y, amount) {
        const label = document.createElement("span");
        label.className = "float-score";
        label.textContent = "+" + amount;
        label.style.setProperty("--x", x + "px");
        label.style.setProperty("--y", y + "px");
        arena.appendChild(label);
        setTimeout(() => label.remove(), 680);
      }

      function missAt(x, y) {
        if (!state.running) return;
        state.misses += 1;
        state.streak = 0;
        const ripple = document.createElement("span");
        ripple.className = "ripple";
        ripple.style.setProperty("--x", x + "px");
        ripple.style.setProperty("--y", y + "px");
        arena.appendChild(ripple);
        playTone("miss");
        renderHud();
        setTimeout(() => ripple.remove(), 460);
      }

      function resetState() {
        clearTimeout(state.spawnTimer);
        clearTimeout(state.targetTimer);
        cancelAnimationFrame(state.frame);
        document.querySelectorAll(".target, .burst, .ripple, .float-score").forEach((node) => node.remove());
        Object.assign(state, {
          running: false,
          score: 0,
          hits: 0,
          misses: 0,
          escaped: 0,
          streak: 0,
          bestStreak: 0,
          startedAt: 0,
          target: null,
          targetTimer: 0,
          spawnTimer: 0,
          frame: 0
        });
        renderHud();
      }

      function startCountdown() {
        overlay.classList.add("hidden");
        const steps = ["3", "2", "1", "Go"];
        let index = 0;

        function tick() {
          countdown.textContent = steps[index];
          countdown.classList.remove("show");
          void countdown.offsetWidth;
          countdown.classList.add("show");
          index += 1;
          if (index < steps.length) {
            setTimeout(tick, 760);
          } else {
            setTimeout(beginGame, 530);
          }
        }

        tick();
      }

      function beginGame() {
        resetState();
        state.running = true;
        state.startedAt = performance.now();
        arena.classList.add("active");
        statusText.textContent = "Live";
        queueSpawn(120);
        loop();
      }

      function loop() {
        if (!state.running) return;
        const elapsed = (performance.now() - state.startedAt) / 1000;
        if (elapsed >= GAME_LENGTH) {
          finishGame();
          return;
        }
        renderHud();
        state.frame = requestAnimationFrame(loop);
      }

      function finishGame() {
        state.running = false;
        arena.classList.remove("active");
        clearTimeout(state.spawnTimer);
        clearTimeout(state.targetTimer);
        cancelAnimationFrame(state.frame);
        removeTarget(false);
        renderHud();

        const previousBest = getBestScore();
        const best = Math.max(previousBest, state.score);
        saveBestScore(best);

        finalScore.textContent = state.score;
        finalAccuracy.textContent = pct() + "%";
        finalHits.textContent = state.hits;
        bestScore.textContent = best;
        modalKicker.textContent = "Round complete";
        modalTitle.textContent = state.score > previousBest && state.score > 0 ? "New high score." : "Time is up.";
        modalIntro.textContent = `You hit ${state.hits} targets, missed ${state.misses} clicks, and let ${state.escaped} targets expire. Best streak: ${state.bestStreak}.`;
        results.hidden = false;
        startButton.textContent = "Play again";
        statusText.textContent = "Ready";
        overlay.classList.remove("hidden");
        startButton.focus({ preventScroll: true });
      }

      function updateCrosshair(event) {
        crosshair.style.left = event.clientX + "px";
        crosshair.style.top = event.clientY + "px";
      }

      arena.addEventListener("pointermove", updateCrosshair);

      arena.addEventListener("pointerdown", (event) => {
        if (!state.running) return;
        if (event.target.closest(".target, .topbar, .overlay")) return;
        missAt(event.clientX, event.clientY);
      });

      startButton.addEventListener("click", () => {
        startCountdown();
      });

      soundButton.addEventListener("click", () => {
        state.sound = !state.sound;
        soundButton.textContent = state.sound ? "Sound on" : "Sound off";
        soundButton.setAttribute("aria-pressed", String(state.sound));
        if (state.sound) playTone("hit");
      });

      window.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && state.running) {
          finishGame();
        }
        if ((event.key === "Enter" || event.key === " ") && !state.running && !overlay.classList.contains("hidden")) {
          event.preventDefault();
          startCountdown();
        }
      });

      window.addEventListener("resize", () => {
        if (state.target) {
          removeTarget(false);
          queueSpawn(80);
        }
      });

      renderHud();
      bestScore.textContent = getBestScore();
      startButton.focus({ preventScroll: true });
    })();
  </script>
</body>
</html>
