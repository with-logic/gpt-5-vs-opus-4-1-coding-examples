<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown &rarr; Slides</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eceae3;
      --bg-2: #f7f5ef;
      --surface: rgba(255, 254, 249, 0.88);
      --surface-solid: #fffef9;
      --surface-muted: #f2f0e8;
      --ink: #20252a;
      --muted: #64707c;
      --faint: #8b949c;
      --line: rgba(38, 43, 49, 0.14);
      --line-strong: rgba(38, 43, 49, 0.25);
      --accent: #0c7c86;
      --accent-2: #c66f21;
      --accent-soft: rgba(12, 124, 134, 0.13);
      --danger: #a33b33;
      --shadow: 0 24px 70px rgba(31, 35, 39, 0.16);
      --shadow-soft: 0 14px 34px rgba(31, 35, 39, 0.11);
      --radius: 8px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      --sans: "Aptos", "Segoe UI", "Helvetica Neue", Helvetica, Arial, sans-serif;
      --serif: Georgia, "Times New Roman", serif;
    }

    [data-theme="dark"] {
      color-scheme: dark;
      --bg: #16191b;
      --bg-2: #202326;
      --surface: rgba(33, 37, 40, 0.88);
      --surface-solid: #24282b;
      --surface-muted: #1c2023;
      --ink: #f3f0e8;
      --muted: #a9b2b8;
      --faint: #7d8790;
      --line: rgba(245, 240, 229, 0.14);
      --line-strong: rgba(245, 240, 229, 0.28);
      --accent: #4fb7bd;
      --accent-2: #e2a55e;
      --accent-soft: rgba(79, 183, 189, 0.16);
      --danger: #ec8d82;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.38);
      --shadow-soft: 0 14px 34px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 14% 18%, rgba(198, 111, 33, 0.13), transparent 27rem),
        linear-gradient(132deg, var(--bg), var(--bg-2) 56%, var(--bg));
      color: var(--ink);
      font-family: var(--sans);
      letter-spacing: 0;
      transition: background-color 200ms ease, color 200ms ease;
    }

    button,
    textarea,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    button:focus-visible,
    textarea:focus-visible,
    input:focus-visible,
    .thumb:focus-visible {
      outline: 3px solid color-mix(in srgb, var(--accent) 55%, transparent);
      outline-offset: 2px;
    }

    .app {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      height: 100vh;
      min-height: 640px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 18px 24px 14px;
      border-bottom: 1px solid var(--line);
      background: color-mix(in srgb, var(--surface) 82%, transparent);
      backdrop-filter: blur(18px);
      position: relative;
      z-index: 3;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 13px;
      min-width: 0;
    }

    .mark {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      color: #fff;
      background:
        linear-gradient(135deg, var(--accent), color-mix(in srgb, var(--accent) 52%, #0e1c21)),
        var(--accent);
      border-radius: var(--radius);
      box-shadow: 0 10px 26px color-mix(in srgb, var(--accent) 28%, transparent);
      flex: 0 0 auto;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(1.28rem, 1.1vw + 1rem, 1.86rem);
      line-height: 1;
      font-weight: 760;
      letter-spacing: 0;
    }

    .brand p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 0.88rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 38px;
      padding: 0 13px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-solid);
      color: var(--ink);
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.3) inset;
      transition: transform 140ms ease, border-color 140ms ease, background-color 140ms ease;
      white-space: nowrap;
    }

    .btn:hover {
      transform: translateY(-1px);
      border-color: var(--line-strong);
      background: color-mix(in srgb, var(--surface-solid) 84%, var(--accent-soft));
    }

    .btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      box-shadow: 0 12px 24px color-mix(in srgb, var(--accent) 24%, transparent);
    }

    .btn.primary:hover {
      background: color-mix(in srgb, var(--accent) 88%, #000);
    }

    .icon {
      width: 17px;
      height: 17px;
      flex: 0 0 auto;
    }

    .workspace {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(320px, 0.95fr) minmax(460px, 1.35fr);
      gap: 18px;
      padding: 18px 24px 24px;
    }

    .panel {
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(18px);
      overflow: hidden;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      min-height: 59px;
    }

    .panel-title {
      display: flex;
      align-items: center;
      gap: 9px;
      font-weight: 700;
      color: var(--ink);
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 0.82rem;
      white-space: nowrap;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--accent-2);
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent-2) 16%, transparent);
    }

    .editor-wrap {
      position: relative;
      min-height: 0;
    }

    textarea {
      width: 100%;
      height: 100%;
      resize: none;
      border: 0;
      background:
        linear-gradient(90deg, color-mix(in srgb, var(--line) 42%, transparent) 1px, transparent 1px) 58px 0 / 1px 100% no-repeat,
        var(--surface-solid);
      color: var(--ink);
      padding: 22px 22px 22px 78px;
      line-height: 1.58;
      font-family: var(--mono);
      font-size: 0.93rem;
      tab-size: 2;
      caret-color: var(--accent);
    }

    .gutter-label {
      position: absolute;
      left: 18px;
      top: 22px;
      color: var(--faint);
      font-family: var(--mono);
      font-size: 0.76rem;
      writing-mode: vertical-rl;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      pointer-events: none;
    }

    .preview-panel {
      grid-template-rows: auto minmax(0, 1fr) auto;
    }

    .preview-body {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 128px;
      gap: 14px;
      padding: 16px;
    }

    .stage-shell {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      gap: 14px;
    }

    .stage {
      min-height: 0;
      display: grid;
      place-items: center;
      position: relative;
      border-radius: var(--radius);
      background:
        linear-gradient(135deg, rgba(32, 37, 42, 0.07), transparent 32%),
        color-mix(in srgb, var(--surface-muted) 70%, transparent);
      border: 1px solid var(--line);
      overflow: hidden;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.24);
    }

    .slide-frame {
      width: min(100%, calc((100vh - 214px) * 1.777));
      aspect-ratio: 16 / 9;
      max-height: 100%;
      padding: clamp(34px, 4.8vw, 70px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      background:
        linear-gradient(105deg, rgba(12, 124, 134, 0.11), transparent 38%),
        linear-gradient(0deg, rgba(198, 111, 33, 0.09), transparent 42%),
        var(--slide-bg, #fbfaf5);
      color: var(--slide-ink, #20252a);
      border-radius: 4px;
      overflow: hidden;
      box-shadow: var(--shadow);
      transform-origin: center;
      animation: slideIn 260ms ease both;
    }

    [data-theme="dark"] .slide-frame {
      --slide-bg: #f8f5ed;
      --slide-ink: #1f2529;
    }

    .slide-frame::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 11px;
      background: linear-gradient(180deg, #0c7c86, #c66f21);
    }

    .slide-frame::after {
      content: "";
      position: absolute;
      right: 28px;
      bottom: 24px;
      width: 96px;
      height: 3px;
      background: linear-gradient(90deg, #0c7c86, #c66f21);
      opacity: 0.75;
    }

    .slide-content {
      position: relative;
      z-index: 1;
      max-width: 90%;
    }

    .slide-content > *:first-child {
      margin-top: 0;
    }

    .slide-content > *:last-child {
      margin-bottom: 0;
    }

    .slide-content h1,
    .slide-content h2 {
      margin: 0 0 0.33em;
      font-family: var(--serif);
      font-weight: 650;
      letter-spacing: 0;
      line-height: 0.98;
      color: #172025;
    }

    .slide-content h1 {
      font-size: clamp(2rem, 5.4vw, 5.1rem);
    }

    .slide-content h2 {
      font-size: clamp(1.7rem, 4.2vw, 4rem);
    }

    .slide-content h3 {
      margin: 0 0 0.55em;
      color: #0c6972;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: clamp(0.86rem, 1.2vw, 1.1rem);
    }

    .slide-content p,
    .slide-content li,
    .slide-content td,
    .slide-content th {
      font-size: clamp(0.95rem, 1.8vw, 1.56rem);
      line-height: 1.35;
    }

    .slide-content p {
      margin: 0.55em 0;
      color: #38434a;
      max-width: 36ch;
    }

    .slide-content ul,
    .slide-content ol {
      margin: 0.7em 0 0;
      padding-left: 1.1em;
      max-width: 38ch;
    }

    .slide-content li {
      margin: 0.34em 0;
      padding-left: 0.15em;
      color: #2f3940;
    }

    .slide-content blockquote {
      margin: 0.8em 0;
      padding: 0.1em 0 0.1em 0.8em;
      border-left: 4px solid #c66f21;
      color: #223036;
      font-family: var(--serif);
      font-size: clamp(1.2rem, 2.6vw, 2.15rem);
      line-height: 1.18;
      max-width: 31ch;
    }

    .slide-content code {
      font-family: var(--mono);
      font-size: 0.82em;
      background: rgba(12, 124, 134, 0.1);
      border: 1px solid rgba(12, 124, 134, 0.15);
      border-radius: 4px;
      padding: 0.08em 0.28em;
    }

    .slide-content pre {
      max-width: 52ch;
      overflow: auto;
      padding: 1em;
      background: #172025;
      color: #f6f3ea;
      border-radius: 6px;
      font-size: clamp(0.7rem, 1vw, 1rem);
      line-height: 1.45;
    }

    .slide-content pre code {
      color: inherit;
      background: transparent;
      border: 0;
      padding: 0;
    }

    .slide-content table {
      border-collapse: collapse;
      margin-top: 1em;
      min-width: min(100%, 560px);
      font-size: 0.92em;
    }

    .slide-content th,
    .slide-content td {
      border-bottom: 1px solid rgba(32, 37, 42, 0.2);
      padding: 0.45em 0.7em 0.45em 0;
      text-align: left;
    }

    .slide-content th {
      color: #0c6972;
      font-weight: 750;
    }

    .slide-kicker {
      position: absolute;
      top: 23px;
      right: 28px;
      z-index: 2;
      color: rgba(32, 37, 42, 0.48);
      font-size: clamp(0.62rem, 1vw, 0.8rem);
      text-transform: uppercase;
      letter-spacing: 0.14em;
    }

    .navigator {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: center;
      gap: 12px;
      min-height: 40px;
    }

    .nav-btn {
      width: 40px;
      height: 40px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-solid);
      color: var(--ink);
      display: grid;
      place-items: center;
      transition: transform 140ms ease, border-color 140ms ease;
    }

    .nav-btn:hover {
      transform: translateY(-1px);
      border-color: var(--line-strong);
    }

    .nav-btn:disabled {
      opacity: 0.38;
      cursor: not-allowed;
      transform: none;
    }

    .progress-wrap {
      min-width: 0;
    }

    .counter {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 0.8rem;
    }

    .counter strong {
      color: var(--ink);
      font-size: 0.95rem;
    }

    .progress {
      height: 6px;
      border-radius: 999px;
      overflow: hidden;
      background: color-mix(in srgb, var(--line) 62%, transparent);
    }

    .progress span {
      display: block;
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transition: width 180ms ease;
    }

    .thumbs {
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 9px;
      overflow: auto;
      padding-right: 3px;
    }

    .thumb {
      width: 100%;
      aspect-ratio: 16 / 9;
      padding: 7px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--surface-solid);
      color: var(--ink);
      text-align: left;
      position: relative;
      overflow: hidden;
      transition: transform 140ms ease, border-color 140ms ease, background-color 140ms ease;
    }

    .thumb:hover {
      transform: translateY(-1px);
      border-color: var(--line-strong);
    }

    .thumb.active {
      border-color: var(--accent);
      background: color-mix(in srgb, var(--surface-solid) 82%, var(--accent-soft));
      box-shadow: inset 3px 0 0 var(--accent);
    }

    .thumb span {
      display: block;
      color: var(--faint);
      font-size: 0.66rem;
      margin-bottom: 4px;
    }

    .thumb strong {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      font-family: var(--serif);
      font-size: 0.86rem;
      line-height: 1.04;
    }

    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 48px;
      padding: 0 16px 14px;
      color: var(--muted);
      font-size: 0.78rem;
    }

    .kbd-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: flex-end;
    }

    kbd {
      min-width: 23px;
      height: 23px;
      display: inline-grid;
      place-items: center;
      padding: 0 6px;
      border-radius: 5px;
      border: 1px solid var(--line);
      background: var(--surface-solid);
      color: var(--ink);
      font-family: var(--mono);
      font-size: 0.72rem;
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.18) inset;
    }

    .presenter {
      position: fixed;
      inset: 0;
      display: none;
      grid-template-rows: minmax(0, 1fr) auto;
      padding: clamp(14px, 2vw, 28px);
      background:
        radial-gradient(circle at 20% 18%, rgba(79, 183, 189, 0.18), transparent 33rem),
        #090b0c;
      z-index: 20;
    }

    .presenter.active {
      display: grid;
    }

    .presenter-stage {
      min-height: 0;
      display: grid;
      place-items: center;
    }

    .presenter .slide-frame {
      width: min(96vw, calc(92vh * 1.777));
      max-height: 92vh;
      padding: clamp(38px, 6vw, 92px);
    }

    .presenter-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      color: rgba(255, 255, 255, 0.72);
      padding-top: 12px;
      font-size: 0.86rem;
    }

    .presenter-actions {
      display: flex;
      gap: 8px;
    }

    .ghost-btn {
      width: 40px;
      height: 36px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      transition: background-color 140ms ease, transform 140ms ease;
    }

    .ghost-btn:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: translateY(-1px);
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: scale(0.985) translateY(6px);
      }

      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    @media (max-width: 1040px) {
      body {
        overflow: auto;
      }

      .app {
        height: auto;
        min-height: 100vh;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .actions {
        justify-content: flex-start;
      }

      .workspace {
        grid-template-columns: 1fr;
      }

      .panel {
        min-height: 520px;
      }

      .preview-body {
        grid-template-columns: 1fr;
      }

      .thumbs {
        flex-direction: row;
        min-height: 100px;
      }

      .thumb {
        min-width: 150px;
        width: 150px;
      }

      .slide-frame {
        width: 100%;
      }
    }

    @media (max-width: 640px) {
      .topbar,
      .workspace {
        padding-left: 14px;
        padding-right: 14px;
      }

      .actions {
        width: 100%;
      }

      .btn {
        flex: 1 1 auto;
        padding: 0 10px;
      }

      .brand p {
        white-space: normal;
      }

      .panel-head,
      .footer {
        align-items: flex-start;
        flex-direction: column;
      }

      textarea {
        padding-left: 54px;
      }

      .gutter-label {
        left: 14px;
      }

      .preview-body {
        padding: 12px;
      }

      .slide-frame {
        padding: 28px;
      }

      .slide-frame::before {
        width: 7px;
      }

      .slide-content {
        max-width: 96%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        scroll-behavior: auto !important;
        transition-duration: 1ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="app" data-theme="light">
    <header class="topbar">
      <div class="brand">
        <div class="mark" aria-hidden="true">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 5h16"></path><path d="M7 9h10"></path><path d="M7 13h6"></path><path d="M5 19l4-4h10"></path>
          </svg>
        </div>
        <div>
          <h1>Markdown &rarr; Slides</h1>
          <p>Convert markdown separated by <code>---</code> into an executive-ready deck.</p>
        </div>
      </div>
      <div class="actions" aria-label="Deck actions">
        <button class="btn" id="sampleBtn" type="button" title="Load the sample deck">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><path d="M14 2v6h6"></path><path d="M9 13h6"></path><path d="M9 17h4"></path>
          </svg>
          Sample
        </button>
        <button class="btn" id="themeBtn" type="button" title="Toggle light or dark theme" aria-pressed="false">
          <svg class="icon" id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 3a6 6 0 1 0 9 9 8 8 0 1 1-9-9z"></path>
          </svg>
          Theme
        </button>
        <button class="btn primary" id="fullBtn" type="button" title="Present fullscreen">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M8 3H5a2 2 0 0 0-2 2v3"></path><path d="M16 3h3a2 2 0 0 1 2 2v3"></path><path d="M8 21H5a2 2 0 0 1-2-2v-3"></path><path d="M16 21h3a2 2 0 0 0 2-2v-3"></path>
          </svg>
          Present
        </button>
      </div>
    </header>

    <main class="workspace">
      <section class="panel editor-panel" aria-labelledby="editorTitle">
        <div class="panel-head">
          <div class="panel-title" id="editorTitle">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M12 20h9"></path><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"></path>
            </svg>
            Markdown Source
          </div>
          <div class="status"><span class="dot"></span><span id="wordCount">0 words</span></div>
        </div>
        <div class="editor-wrap">
          <span class="gutter-label">Slides</span>
          <textarea id="markdownInput" spellcheck="false" aria-label="Markdown deck source"></textarea>
        </div>
      </section>

      <section class="panel preview-panel" aria-labelledby="previewTitle">
        <div class="panel-head">
          <div class="panel-title" id="previewTitle">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="3" y="4" width="18" height="14" rx="2"></rect><path d="M8 21h8"></path><path d="M12 18v3"></path>
            </svg>
            Live Preview
          </div>
          <div class="status"><span id="slideCount">1 slide</span></div>
        </div>
        <div class="preview-body">
          <div class="stage-shell">
            <div class="stage" aria-live="polite">
              <article class="slide-frame" id="slideFrame"></article>
            </div>
            <div class="navigator" aria-label="Slide navigation">
              <button class="nav-btn" id="prevBtn" type="button" title="Previous slide" aria-label="Previous slide">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m15 18-6-6 6-6"></path></svg>
              </button>
              <div class="progress-wrap">
                <div class="counter">
                  <span><strong id="currentNum">1</strong> / <span id="totalNum">1</span></span>
                  <span id="slideTitle">Untitled</span>
                </div>
                <div class="progress" aria-hidden="true"><span id="progressBar"></span></div>
              </div>
              <button class="nav-btn" id="nextBtn" type="button" title="Next slide" aria-label="Next slide">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m9 18 6-6-6-6"></path></svg>
              </button>
            </div>
          </div>
          <nav class="thumbs" id="thumbs" aria-label="Slide thumbnails"></nav>
        </div>
        <div class="footer">
          <span>Use <code>---</code> on its own line to start a new slide.</span>
          <div class="kbd-row" aria-label="Keyboard shortcuts">
            <kbd>&larr;</kbd><kbd>&rarr;</kbd><kbd>Space</kbd><kbd>F</kbd><kbd>Esc</kbd>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div class="presenter" id="presenter" role="dialog" aria-modal="true" aria-label="Fullscreen slide preview">
    <div class="presenter-stage">
      <article class="slide-frame" id="presenterSlide"></article>
    </div>
    <div class="presenter-bar">
      <span id="presenterStatus">Slide 1 of 1</span>
      <div class="presenter-actions">
        <button class="ghost-btn" id="presentPrev" type="button" title="Previous slide" aria-label="Previous slide">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m15 18-6-6 6-6"></path></svg>
        </button>
        <button class="ghost-btn" id="presentNext" type="button" title="Next slide" aria-label="Next slide">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m9 18 6-6-6-6"></path></svg>
        </button>
        <button class="ghost-btn" id="closePresenter" type="button" title="Exit presentation" aria-label="Exit presentation">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg>
        </button>
      </div>
    </div>
  </div>

  <script>
    const sampleDeck = `# Q3 Growth Review
### Executive Briefing

Revenue expanded across enterprise accounts while operating discipline improved gross margin.

> The next quarter is about focus: expand the motions that compound and retire the work that does not.

---

## What Changed

- Enterprise pipeline increased **28%** quarter over quarter
- Net revenue retention moved from 112% to **119%**
- Sales cycle compressed by 9 days in strategic accounts
- Support deflection improved after the knowledge base launch

---

## Operating Scorecard

| Metric | Q2 | Q3 |
| --- | ---: | ---: |
| ARR | $18.4M | $22.1M |
| Gross margin | 71% | 76% |
| Activation | 43% | 52% |
| Expansion pipeline | $4.8M | $6.2M |

---

## Strategic Priorities

1. Move onboarding from services-led to product-led
2. Package analytics as a premium expansion lever
3. Consolidate three low-yield experiments into one focused bet

\`North star:\` profitable expansion from retained accounts.

---

## Decision Required

Approve the analytics packaging pilot for the top 40 enterprise accounts.

- 6-week pilot
- Existing sales engineering capacity
- Success gate: 15 qualified expansion conversations`;

    const app = document.querySelector(".app");
    const input = document.getElementById("markdownInput");
    const slideFrame = document.getElementById("slideFrame");
    const presenter = document.getElementById("presenter");
    const presenterSlide = document.getElementById("presenterSlide");
    const thumbs = document.getElementById("thumbs");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const presentPrev = document.getElementById("presentPrev");
    const presentNext = document.getElementById("presentNext");
    const closePresenter = document.getElementById("closePresenter");
    const fullBtn = document.getElementById("fullBtn");
    const sampleBtn = document.getElementById("sampleBtn");
    const themeBtn = document.getElementById("themeBtn");
    const themeIcon = document.getElementById("themeIcon");
    const wordCount = document.getElementById("wordCount");
    const slideCount = document.getElementById("slideCount");
    const currentNum = document.getElementById("currentNum");
    const totalNum = document.getElementById("totalNum");
    const slideTitle = document.getElementById("slideTitle");
    const progressBar = document.getElementById("progressBar");
    const presenterStatus = document.getElementById("presenterStatus");

    let slides = [];
    let currentIndex = 0;

    function escapeHtml(value) {
      return value
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function parseInline(value) {
      let text = escapeHtml(value);
      text = text.replace(/`([^`]+)`/g, "<code>$1</code>");
      text = text.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
      text = text.replace(/\*([^*]+)\*/g, "<em>$1</em>");
      text = text.replace(/\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noreferrer">$1</a>');
      return text;
    }

    function isTableDivider(line) {
      return /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/.test(line);
    }

    function parseTable(lines, startIndex) {
      const rows = [];
      let index = startIndex;
      while (index < lines.length && lines[index].includes("|") && lines[index].trim()) {
        if (!isTableDivider(lines[index])) {
          rows.push(lines[index].trim().replace(/^\||\|$/g, "").split("|").map(cell => parseInline(cell.trim())));
        }
        index++;
      }

      if (rows.length < 1) {
        return null;
      }

      const head = rows.shift();
      const bodyRows = rows.map(row => `<tr>${row.map(cell => `<td>${cell}</td>`).join("")}</tr>`).join("");
      const html = `<table><thead><tr>${head.map(cell => `<th>${cell}</th>`).join("")}</tr></thead><tbody>${bodyRows}</tbody></table>`;
      return { html, nextIndex: index };
    }

    function parseMarkdown(markdown) {
      const lines = markdown.split(/\r?\n/);
      let html = "";
      let i = 0;
      let inCode = false;
      let codeBuffer = [];

      function closeCode() {
        if (inCode) {
          html += `<pre><code>${escapeHtml(codeBuffer.join("\n"))}</code></pre>`;
          inCode = false;
          codeBuffer = [];
        }
      }

      while (i < lines.length) {
        const line = lines[i];
        const trimmed = line.trim();

        if (trimmed.startsWith("```")) {
          if (inCode) {
            closeCode();
          } else {
            inCode = true;
          }
          i++;
          continue;
        }

        if (inCode) {
          codeBuffer.push(line);
          i++;
          continue;
        }

        if (!trimmed) {
          i++;
          continue;
        }

        if (line.includes("|") && i + 1 < lines.length && isTableDivider(lines[i + 1])) {
          const table = parseTable(lines, i);
          if (table) {
            html += table.html;
            i = table.nextIndex;
            continue;
          }
        }

        const heading = trimmed.match(/^(#{1,6})\s+(.+)$/);
        if (heading) {
          const level = Math.min(heading[1].length, 3);
          html += `<h${level}>${parseInline(heading[2])}</h${level}>`;
          i++;
          continue;
        }

        if (/^>\s?/.test(trimmed)) {
          const quotes = [];
          while (i < lines.length && /^>\s?/.test(lines[i].trim())) {
            quotes.push(lines[i].trim().replace(/^>\s?/, ""));
            i++;
          }
          html += `<blockquote>${parseInline(quotes.join(" "))}</blockquote>`;
          continue;
        }

        if (/^[-*]\s+/.test(trimmed)) {
          const items = [];
          while (i < lines.length && /^[-*]\s+/.test(lines[i].trim())) {
            items.push(lines[i].trim().replace(/^[-*]\s+/, ""));
            i++;
          }
          html += `<ul>${items.map(item => `<li>${parseInline(item)}</li>`).join("")}</ul>`;
          continue;
        }

        if (/^\d+\.\s+/.test(trimmed)) {
          const items = [];
          while (i < lines.length && /^\d+\.\s+/.test(lines[i].trim())) {
            items.push(lines[i].trim().replace(/^\d+\.\s+/, ""));
            i++;
          }
          html += `<ol>${items.map(item => `<li>${parseInline(item)}</li>`).join("")}</ol>`;
          continue;
        }

        const paragraphs = [];
        while (
          i < lines.length &&
          lines[i].trim() &&
          !/^(#{1,6})\s+/.test(lines[i].trim()) &&
          !/^[-*]\s+/.test(lines[i].trim()) &&
          !/^\d+\.\s+/.test(lines[i].trim()) &&
          !/^>\s?/.test(lines[i].trim()) &&
          !lines[i].trim().startsWith("```") &&
          !(lines[i].includes("|") && i + 1 < lines.length && isTableDivider(lines[i + 1]))
        ) {
          paragraphs.push(lines[i].trim());
          i++;
        }
        html += `<p>${parseInline(paragraphs.join(" "))}</p>`;
      }

      closeCode();
      return html || "<h2>Untitled Slide</h2><p>Add markdown to begin.</p>";
    }

    function splitSlides(markdown) {
      return markdown
        .split(/^\s*---\s*$/m)
        .map(section => section.trim())
        .filter(Boolean)
        .map((source, index) => {
          const titleMatch = source.match(/^\s*#{1,6}\s+(.+)$/m);
          const fallback = source.split(/\r?\n/).find(line => line.trim()) || `Slide ${index + 1}`;
          const title = titleMatch ? titleMatch[1].replace(/[*_`]/g, "") : fallback.replace(/^[-*>#\d.\s]+/, "");
          return {
            source,
            title: title.slice(0, 54) || `Slide ${index + 1}`,
            html: `<span class="slide-kicker">Markdown &rarr; Slides</span><div class="slide-content">${parseMarkdown(source)}</div>`
          };
        });
    }

    function render() {
      slides = splitSlides(input.value);
      if (!slides.length) {
        slides = [{ source: "", title: "Untitled", html: '<span class="slide-kicker">Markdown &rarr; Slides</span><div class="slide-content"><h2>Untitled Slide</h2><p>Add markdown to begin.</p></div>' }];
      }
      currentIndex = Math.min(currentIndex, slides.length - 1);

      const current = slides[currentIndex];
      slideFrame.innerHTML = current.html;
      presenterSlide.innerHTML = current.html;
      slideFrame.style.animation = "none";
      requestAnimationFrame(() => {
        slideFrame.style.animation = "";
      });

      const plural = slides.length === 1 ? "slide" : "slides";
      slideCount.textContent = `${slides.length} ${plural}`;
      currentNum.textContent = String(currentIndex + 1);
      totalNum.textContent = String(slides.length);
      slideTitle.textContent = current.title;
      presenterStatus.textContent = `Slide ${currentIndex + 1} of ${slides.length}`;
      progressBar.style.width = `${((currentIndex + 1) / slides.length) * 100}%`;
      prevBtn.disabled = currentIndex === 0;
      nextBtn.disabled = currentIndex === slides.length - 1;
      presentPrev.disabled = currentIndex === 0;
      presentNext.disabled = currentIndex === slides.length - 1;

      const words = input.value.trim().match(/\b[\w'-]+\b/g);
      wordCount.textContent = `${words ? words.length : 0} words`;

      renderThumbs();
    }

    function renderThumbs() {
      thumbs.innerHTML = slides.map((slide, index) => `
        <button class="thumb ${index === currentIndex ? "active" : ""}" type="button" data-index="${index}" aria-label="Open slide ${index + 1}" ${index === currentIndex ? 'aria-current="true"' : ""}>
          <span>${String(index + 1).padStart(2, "0")}</span>
          <strong>${escapeHtml(slide.title)}</strong>
        </button>
      `).join("");
    }

    function goToSlide(index) {
      const next = Math.max(0, Math.min(slides.length - 1, index));
      if (next !== currentIndex) {
        currentIndex = next;
        render();
      }
    }

    function openPresenter() {
      presenter.classList.add("active");
      fullBtn.setAttribute("aria-expanded", "true");
      if (presenter.requestFullscreen) {
        presenter.requestFullscreen().catch(() => {});
      }
      closePresenter.focus({ preventScroll: true });
    }

    function closePresentation() {
      presenter.classList.remove("active");
      fullBtn.setAttribute("aria-expanded", "false");
      if (document.fullscreenElement && document.exitFullscreen) {
        document.exitFullscreen().catch(() => {});
      }
      fullBtn.focus({ preventScroll: true });
    }

    function toggleTheme() {
      const nextTheme = app.dataset.theme === "dark" ? "light" : "dark";
      app.dataset.theme = nextTheme;
      document.body.dataset.theme = nextTheme;
      themeBtn.setAttribute("aria-pressed", String(nextTheme === "dark"));
      themeIcon.innerHTML = nextTheme === "dark"
        ? '<circle cx="12" cy="12" r="4"></circle><path d="M12 2v2"></path><path d="M12 20v2"></path><path d="m4.93 4.93 1.41 1.41"></path><path d="m17.66 17.66 1.41 1.41"></path><path d="M2 12h2"></path><path d="M20 12h2"></path><path d="m6.34 17.66-1.41 1.41"></path><path d="m19.07 4.93-1.41 1.41"></path>'
        : '<path d="M12 3a6 6 0 1 0 9 9 8 8 0 1 1-9-9z"></path>';
    }

    input.addEventListener("input", render);
    prevBtn.addEventListener("click", () => goToSlide(currentIndex - 1));
    nextBtn.addEventListener("click", () => goToSlide(currentIndex + 1));
    presentPrev.addEventListener("click", () => goToSlide(currentIndex - 1));
    presentNext.addEventListener("click", () => goToSlide(currentIndex + 1));
    closePresenter.addEventListener("click", closePresentation);
    fullBtn.addEventListener("click", openPresenter);
    sampleBtn.addEventListener("click", () => {
      input.value = sampleDeck;
      currentIndex = 0;
      render();
      input.focus();
    });
    themeBtn.addEventListener("click", toggleTheme);

    thumbs.addEventListener("click", event => {
      const target = event.target.closest(".thumb");
      if (target) {
        goToSlide(Number(target.dataset.index));
      }
    });

    document.addEventListener("keydown", event => {
      const isTyping = document.activeElement === input;
      if (isTyping && !event.metaKey && !event.ctrlKey) {
        return;
      }

      if (event.key === "ArrowRight" || event.key === "PageDown" || event.key === " ") {
        event.preventDefault();
        goToSlide(currentIndex + 1);
      }

      if (event.key === "ArrowLeft" || event.key === "PageUp") {
        event.preventDefault();
        goToSlide(currentIndex - 1);
      }

      if (event.key.toLowerCase() === "f") {
        event.preventDefault();
        presenter.classList.contains("active") ? closePresentation() : openPresenter();
      }

      if (event.key === "Escape" && presenter.classList.contains("active")) {
        closePresentation();
      }
    });

    document.addEventListener("fullscreenchange", () => {
      if (!document.fullscreenElement && presenter.classList.contains("active")) {
        presenter.classList.remove("active");
      }
    });

    input.value = sampleDeck;
    render();
  </script>
</body>
</html>
