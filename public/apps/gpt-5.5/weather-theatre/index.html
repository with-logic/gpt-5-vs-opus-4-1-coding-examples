<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Theatre</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700;9..144,800&amp;family=Newsreader:opsz,wght@6..72,400;6..72,600&amp;display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #fff1cc;
      --ink: #1f1a16;
      --velvet: #8e1f2f;
      --velvet-deep: #3c0b18;
      --brass: #f0b94c;
      --mint: #8fd7c7;
      --storm: #26354a;
      --panel: rgba(31, 20, 18, .72);
      --line: rgba(255, 231, 179, .28);
      --shadow: rgba(3, 2, 6, .42);
      font-family: "Newsreader", Georgia, serif;
      color: var(--paper);
      background: #07060a;
    }

    * { box-sizing: border-box; }

    html, body, #root {
      width: 100%;
      min-height: 100%;
      margin: 0;
    }

    body {
      overflow-x: hidden;
      background:
        radial-gradient(circle at 50% 0%, rgba(225, 177, 85, .17), transparent 34rem),
        linear-gradient(180deg, #120711 0%, #05050a 72%);
    }

    button, input {
      font: inherit;
    }

    button:focus-visible,
    input:focus-visible {
      outline: 3px solid rgba(143, 215, 199, .95);
      outline-offset: 4px;
    }

    .app {
      position: relative;
      min-height: 100vh;
      overflow: hidden;
      isolation: isolate;
    }

    .theatre-canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
      z-index: 0;
      background: #09070d;
    }

    .proscenium {
      pointer-events: none;
      position: fixed;
      inset: 0;
      z-index: 2;
      border: clamp(10px, 2.1vw, 24px) solid rgba(111, 22, 31, .72);
      box-shadow:
        inset 0 0 0 2px rgba(247, 196, 94, .34),
        inset 0 0 0 clamp(16px, 3.3vw, 42px) rgba(56, 8, 19, .38),
        inset 0 0 74px rgba(1, 0, 2, .7);
    }

    .proscenium::before,
    .proscenium::after {
      content: "";
      position: absolute;
      left: clamp(16px, 4vw, 54px);
      right: clamp(16px, 4vw, 54px);
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 223, 151, .75), transparent);
    }

    .proscenium::before { top: clamp(16px, 3.8vw, 48px); }
    .proscenium::after { bottom: clamp(16px, 3.8vw, 48px); }

    .curtain-top,
    .curtain-left,
    .curtain-right {
      position: fixed;
      pointer-events: none;
      z-index: 4;
      background-color: var(--velvet);
      background-image:
        radial-gradient(ellipse at 50% 0%, rgba(255, 186, 104, .22), transparent 44%),
        repeating-linear-gradient(90deg, rgba(255,255,255,.07) 0 1px, transparent 1px 11px),
        linear-gradient(90deg, #4f0d1f, #a92d3e 13%, #5d1023 30%, #bd3144 48%, #611126 66%, #a82a3e 82%, #4b0d1e);
      filter: drop-shadow(0 18px 38px rgba(0,0,0,.42));
    }

    .curtain-top {
      top: 0;
      left: 0;
      right: 0;
      height: clamp(86px, 14vh, 148px);
      clip-path: polygon(0 0, 100% 0, 100% 78%, 91% 70%, 82% 82%, 72% 70%, 62% 84%, 52% 71%, 42% 84%, 32% 71%, 22% 82%, 12% 70%, 0 79%);
      animation: valanceDrop 1200ms cubic-bezier(.2,.78,.1,1) both;
    }

    .curtain-left,
    .curtain-right {
      top: 0;
      bottom: 0;
      width: 50vw;
      animation-duration: 1600ms;
      animation-delay: 240ms;
      animation-fill-mode: both;
      animation-timing-function: cubic-bezier(.65, 0, .15, 1);
    }

    .curtain-left {
      left: 0;
      transform-origin: left top;
      animation-name: openLeft;
      border-right: 1px solid rgba(255, 219, 142, .22);
    }

    .curtain-right {
      right: 0;
      transform-origin: right top;
      animation-name: openRight;
      border-left: 1px solid rgba(255, 219, 142, .22);
    }

    .curtain-left::after,
    .curtain-right::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,.3));
    }

    @keyframes openLeft {
      0% { transform: translateX(0) skewY(0deg); }
      100% { transform: translateX(-83%) skewY(-4deg); }
    }

    @keyframes openRight {
      0% { transform: translateX(0) skewY(0deg); }
      100% { transform: translateX(83%) skewY(4deg); }
    }

    @keyframes valanceDrop {
      0% { transform: translateY(-110%); }
      100% { transform: translateY(0); }
    }

    .content {
      position: relative;
      z-index: 3;
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(280px, 382px);
      gap: clamp(18px, 3vw, 42px);
      padding: clamp(92px, 14vh, 148px) clamp(18px, 5vw, 76px) clamp(28px, 6vh, 56px);
    }

    .marquee {
      align-self: end;
      max-width: 810px;
      padding-bottom: clamp(42px, 8vh, 92px);
    }

    .kicker {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border: 1px solid rgba(255, 232, 178, .34);
      background: rgba(29, 15, 14, .48);
      color: rgba(255, 239, 199, .88);
      text-transform: uppercase;
      letter-spacing: .12em;
      font-size: 12px;
      font-weight: 600;
      backdrop-filter: blur(14px);
    }

    .kicker::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--brass);
      box-shadow: 0 0 16px rgba(240, 185, 76, .8);
    }

    h1 {
      margin: 18px 0 12px;
      font-family: "Fraunces", Georgia, serif;
      font-size: clamp(48px, 9vw, 124px);
      line-height: .88;
      letter-spacing: 0;
      max-width: 9ch;
      text-shadow:
        0 3px 0 rgba(72, 21, 16, .48),
        0 22px 60px rgba(0,0,0,.45);
    }

    .subtitle {
      min-height: 3.9em;
      max-width: 670px;
      margin: 0;
      color: rgba(255, 238, 201, .92);
      font-size: clamp(19px, 2.1vw, 29px);
      line-height: 1.28;
      text-shadow: 0 2px 22px rgba(0,0,0,.68);
    }

    .caret {
      display: inline-block;
      width: .54em;
      color: var(--mint);
      animation: blink 950ms steps(2, start) infinite;
    }

    @keyframes blink { 50% { opacity: 0; } }

    .forecast-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 28px;
    }

    .forecast-pill {
      display: inline-flex;
      align-items: baseline;
      gap: 8px;
      min-height: 40px;
      padding: 9px 12px;
      color: rgba(255, 241, 204, .91);
      background: rgba(13, 10, 12, .45);
      border: 1px solid rgba(255, 224, 148, .22);
      box-shadow: 0 12px 30px rgba(0,0,0,.2);
      backdrop-filter: blur(10px);
    }

    .forecast-pill strong {
      font-family: "Fraunces", Georgia, serif;
      font-size: 18px;
      color: #ffe6aa;
    }

    .controls {
      align-self: end;
      justify-self: end;
      width: min(100%, 382px);
      color: rgba(255, 241, 210, .94);
      background:
        linear-gradient(180deg, rgba(38, 18, 22, .82), rgba(13, 10, 15, .78)),
        radial-gradient(circle at 20% 0%, rgba(240, 185, 76, .16), transparent 45%);
      border: 1px solid rgba(255, 226, 164, .26);
      box-shadow: 0 26px 80px rgba(0,0,0,.46);
      backdrop-filter: blur(18px) saturate(1.1);
    }

    .controls-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 18px 18px 14px;
      border-bottom: 1px solid rgba(255, 226, 164, .18);
    }

    .controls-title {
      margin: 0;
      font-family: "Fraunces", Georgia, serif;
      font-size: 26px;
      line-height: 1;
    }

    .mode-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      padding: 3px;
      background: rgba(6, 5, 9, .58);
      border: 1px solid rgba(255, 229, 167, .18);
    }

    .mode-toggle button {
      min-width: 72px;
      min-height: 36px;
      padding: 8px 10px;
      border: 0;
      color: rgba(255, 236, 191, .68);
      background: transparent;
      cursor: pointer;
      transition: background .22s ease, color .22s ease, transform .22s ease;
    }

    .mode-toggle button[aria-pressed="true"] {
      color: #1a120e;
      background: linear-gradient(180deg, #ffdf91, #e5a940);
      box-shadow: 0 8px 20px rgba(240, 185, 76, .23);
    }

    .mode-toggle button:hover { transform: translateY(-1px); }

    .slider-bank {
      display: grid;
      gap: 18px;
      padding: 18px;
    }

    .slider-row {
      display: grid;
      gap: 8px;
    }

    .slider-meta {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      font-size: 15px;
    }

    .slider-meta span:first-child {
      text-transform: uppercase;
      letter-spacing: .1em;
      font-size: 12px;
      font-weight: 600;
      color: rgba(255, 239, 201, .78);
    }

    .slider-meta output {
      font-family: "Fraunces", Georgia, serif;
      color: #ffdf91;
      font-size: 19px;
    }

    input[type="range"] {
      width: 100%;
      height: 34px;
      appearance: none;
      background: transparent;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-runnable-track {
      height: 8px;
      background: linear-gradient(90deg, rgba(143, 215, 199, .96), rgba(240, 185, 76, .95), rgba(174, 63, 86, .98));
      border-radius: 999px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.18);
    }

    input[type="range"]::-moz-range-track {
      height: 8px;
      background: linear-gradient(90deg, rgba(143, 215, 199, .96), rgba(240, 185, 76, .95), rgba(174, 63, 86, .98));
      border-radius: 999px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.18);
    }

    input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 24px;
      height: 24px;
      margin-top: -8px;
      border-radius: 50%;
      border: 2px solid #fff0ca;
      background: radial-gradient(circle at 35% 30%, #fff8db, #f0b94c 48%, #8e1f2f 100%);
      box-shadow: 0 5px 18px rgba(0,0,0,.42), 0 0 0 6px rgba(255, 225, 151, .1);
    }

    input[type="range"]::-moz-range-thumb {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid #fff0ca;
      background: radial-gradient(circle at 35% 30%, #fff8db, #f0b94c 48%, #8e1f2f 100%);
      box-shadow: 0 5px 18px rgba(0,0,0,.42), 0 0 0 6px rgba(255, 225, 151, .1);
    }

    .playbill {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 14px 18px 18px;
      border-top: 1px solid rgba(255, 226, 164, .18);
    }

    .playbill p {
      margin: 0;
      color: rgba(255, 239, 201, .76);
      line-height: 1.35;
      font-size: 15px;
    }

    .badge {
      width: 76px;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      text-align: center;
      border-radius: 50%;
      background: #f6c45c;
      color: #27130e;
      border: 2px solid rgba(255,255,255,.48);
      box-shadow: 0 14px 28px rgba(0,0,0,.32);
      font-family: "Fraunces", Georgia, serif;
      font-size: 17px;
      line-height: .95;
      transform: rotate(-6deg);
    }

    .stage-floor {
      pointer-events: none;
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: 26vh;
      z-index: 1;
      background:
        linear-gradient(180deg, transparent 0%, rgba(18, 8, 9, .78) 52%, rgba(8, 5, 6, .97) 100%),
        repeating-linear-gradient(90deg, rgba(255, 216, 143, .08) 0 1px, transparent 1px 68px);
      transform: perspective(700px) rotateX(61deg);
      transform-origin: bottom center;
    }

    .footlights {
      pointer-events: none;
      position: fixed;
      z-index: 5;
      left: 10vw;
      right: 10vw;
      bottom: clamp(16px, 3.2vh, 30px);
      display: flex;
      justify-content: space-between;
      opacity: .9;
    }

    .footlights span {
      width: clamp(12px, 1.5vw, 22px);
      aspect-ratio: 1;
      border-radius: 50%;
      background: radial-gradient(circle, #fff7d6 0 22%, #ffc457 42%, rgba(255, 187, 73, .05) 70%);
      box-shadow: 0 0 22px rgba(255, 190, 80, .72), 0 -36px 60px rgba(255, 179, 78, .18);
      animation: footlight 2200ms ease-in-out infinite;
    }

    .footlights span:nth-child(2n) { animation-delay: 320ms; }
    .footlights span:nth-child(3n) { animation-delay: 620ms; }

    @keyframes footlight {
      50% { transform: translateY(-2px); filter: brightness(1.25); }
    }

    @media (max-width: 860px) {
      .content {
        grid-template-columns: 1fr;
        align-items: end;
        padding-top: clamp(104px, 17vh, 140px);
      }

      .marquee {
        align-self: end;
        padding-bottom: 0;
      }

      h1 {
        max-width: 7.8ch;
      }

      .subtitle {
        min-height: 4.9em;
      }

      .controls {
        justify-self: stretch;
      }
    }

    @media (max-width: 520px) {
      .content {
        padding-left: 14px;
        padding-right: 14px;
        padding-bottom: 22px;
        gap: 18px;
      }

      .kicker {
        max-width: calc(100vw - 52px);
        font-size: 11px;
      }

      .forecast-strip {
        gap: 7px;
        margin-top: 18px;
      }

      .forecast-pill {
        min-height: 34px;
        padding: 7px 9px;
        font-size: 14px;
      }

      .controls-header {
        align-items: stretch;
        flex-direction: column;
      }

      .mode-toggle button {
        min-width: 0;
      }

      .playbill {
        grid-template-columns: 1fr;
      }

      .badge {
        width: 64px;
        justify-self: end;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.7/babel.min.js"></script>
  <script type="text/babel">
    const { useEffect, useMemo, useRef, useState } = React;

    const forecast = {
      temperature: "64°",
      wind: "NW 9",
      rain: "after dusk",
      pressure: "29.92",
    };

    const clamp = (value, min, max) => Math.max(min, Math.min(max, value));
    const lerp = (a, b, t) => a + (b - a) * t;
    const norm = value => value / 100;

    function colorToRgb(color) {
      if (color.startsWith("rgb")) {
        return color.match(/\d+(\.\d+)?/g).slice(0, 3).map(Number);
      }

      const clean = color.replace("#", "");
      return [
        parseInt(clean.slice(0, 2), 16),
        parseInt(clean.slice(2, 4), 16),
        parseInt(clean.slice(4, 6), 16)
      ];
    }

    function mixColor(a, b, amount) {
      const ca = colorToRgb(a);
      const cb = colorToRgb(b);
      const t = clamp(amount, 0, 1);
      return `rgb(${Math.round(lerp(ca[0], cb[0], t))}, ${Math.round(lerp(ca[1], cb[1], t))}, ${Math.round(lerp(ca[2], cb[2], t))})`;
    }

    function fillPath(ctx, points) {
      ctx.beginPath();
      ctx.moveTo(points[0][0], points[0][1]);
      for (let i = 1; i < points.length; i += 1) ctx.lineTo(points[i][0], points[i][1]);
      ctx.closePath();
      ctx.fill();
    }

    function drawHill(ctx, w, h, y, amplitude, color, speed, time, points = 9) {
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(0, h);
      for (let i = 0; i <= points; i += 1) {
        const x = (i / points) * w;
        const wave = Math.sin(i * 1.35 + time * speed) * amplitude;
        const wave2 = Math.cos(i * .72 + time * speed * .67) * amplitude * .38;
        ctx.lineTo(x, y + wave + wave2);
      }
      ctx.lineTo(w, h);
      ctx.closePath();
      ctx.fill();
    }

    function drawCloud(ctx, x, y, scale, alpha, tint) {
      ctx.save();
      ctx.translate(x, y);
      ctx.scale(scale, scale);
      ctx.fillStyle = tint;
      ctx.globalAlpha = alpha;
      ctx.beginPath();
      ctx.ellipse(-55, 12, 54, 21, 0, 0, Math.PI * 2);
      ctx.ellipse(-18, 2, 52, 31, 0, 0, Math.PI * 2);
      ctx.ellipse(25, 4, 48, 25, 0, 0, Math.PI * 2);
      ctx.ellipse(62, 15, 38, 18, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawStar(ctx, x, y, r, alpha) {
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = "#ffeabd";
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawSpotlight(ctx, w, h, x, sway, color, alpha) {
      const topX = x + Math.sin(sway) * w * .1;
      const bottomX = x + Math.cos(sway * .75) * w * .16;
      const grd = ctx.createLinearGradient(topX, 0, bottomX, h);
      grd.addColorStop(0, color.replace("ALPHA", alpha));
      grd.addColorStop(.72, color.replace("ALPHA", alpha * .22));
      grd.addColorStop(1, color.replace("ALPHA", 0));
      ctx.save();
      ctx.globalCompositeOperation = "screen";
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.moveTo(topX - w * .045, 0);
      ctx.lineTo(topX + w * .045, 0);
      ctx.lineTo(bottomX + w * .25, h * .92);
      ctx.quadraticCurveTo(bottomX, h, bottomX - w * .25, h * .92);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function drawRain(ctx, w, h, time, amount, heroic) {
      ctx.save();
      ctx.strokeStyle = `rgba(183, 224, 236, ${.18 + amount * .36})`;
      ctx.lineWidth = 1 + heroic * 1.7;
      ctx.globalCompositeOperation = "screen";
      const count = Math.floor(70 + amount * 210 + heroic * 60);
      const slant = lerp(10, 30, heroic);
      for (let i = 0; i < count; i += 1) {
        const seed = i * 137.5;
        const x = (seed * 19 + time * (86 + heroic * 90)) % (w + 160) - 80;
        const y = (seed * 43 + time * (220 + amount * 160)) % (h + 130) - 80;
        const len = lerp(14, 34, amount) + heroic * 14;
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x - slant, y + len);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawCanvas(ctx, canvas, state, time) {
      const w = canvas.width / devicePixelRatio;
      const h = canvas.height / devicePixelRatio;
      const cozy = norm(state.cozy);
      const eerie = norm(state.eerie);
      const heroic = norm(state.heroic);
      const night = state.mode === "night" ? 1 : 0;
      const storm = clamp(eerie * .72 + heroic * .18 + night * .22, 0, 1);
      const warmth = clamp(cozy * .78 + (1 - night) * .34, 0, 1);
      const drama = clamp(heroic * .72 + eerie * .34, 0, 1);

      ctx.clearRect(0, 0, w, h);

      const top = mixColor(mixColor("#253b5d", "#090912", night), "#39424d", eerie * .42);
      const mid = mixColor(mixColor("#e2a95b", "#1d2441", night), "#526066", eerie * .4);
      const bottom = mixColor(mixColor("#ffcf78", "#2b1021", night), "#6c2837", heroic * .28);
      const sky = ctx.createLinearGradient(0, 0, 0, h);
      sky.addColorStop(0, top);
      sky.addColorStop(.54, mid);
      sky.addColorStop(1, bottom);
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, w, h);

      ctx.save();
      ctx.globalCompositeOperation = "screen";
      const bloom = ctx.createRadialGradient(w * .5, h * .28, 0, w * .5, h * .32, w * .7);
      bloom.addColorStop(0, `rgba(255, 220, 132, ${.15 + warmth * .2})`);
      bloom.addColorStop(.42, `rgba(146, 213, 206, ${.05 + eerie * .08})`);
      bloom.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = bloom;
      ctx.fillRect(0, 0, w, h);
      ctx.restore();

      if (night > .5) {
        for (let i = 0; i < 66; i += 1) {
          const x = (i * 89.3) % w;
          const y = 42 + ((i * 47.1) % (h * .48));
          const pulse = .35 + Math.sin(time * 1.8 + i) * .22;
          drawStar(ctx, x, y, 1 + (i % 3) * .45, pulse * (1 - storm * .55));
        }
      }

      ctx.save();
      ctx.globalCompositeOperation = "screen";
      const orbX = w * (night ? .75 : .28) + Math.sin(time * .14) * 18;
      const orbY = h * (night ? .22 : .2);
      const orbRadius = lerp(50, 78, heroic);
      const orb = ctx.createRadialGradient(orbX, orbY, 0, orbX, orbY, orbRadius * 2.5);
      if (night) {
        orb.addColorStop(0, "rgba(236, 244, 255, .78)");
        orb.addColorStop(.18, "rgba(204, 223, 242, .38)");
        orb.addColorStop(1, "rgba(204, 223, 242, 0)");
      } else {
        orb.addColorStop(0, "rgba(255, 248, 210, .92)");
        orb.addColorStop(.22, `rgba(255, 193, 72, ${.38 + cozy * .25})`);
        orb.addColorStop(1, "rgba(255, 193, 72, 0)");
      }
      ctx.fillStyle = orb;
      ctx.beginPath();
      ctx.arc(orbX, orbY, orbRadius * 2.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      drawCloud(ctx, w * .2 + Math.sin(time * .14) * 28, h * .24, 1.1, .25 + cozy * .2, "#fff0c6");
      drawCloud(ctx, w * .66 + Math.cos(time * .11) * 36, h * .18, 1.45, .3 + eerie * .28, "#cad7de");
      drawCloud(ctx, w * .48 + Math.sin(time * .18 + 2) * 42, h * .34, 1.7, .26 + storm * .3, "#b0bac3");

      drawHill(ctx, w, h, h * .58, 38, mixColor("#40646a", "#1d2536", night), .21, time, 10);
      drawHill(ctx, w, h, h * .67, 54, mixColor("#29514a", "#161824", storm), .3, time + 1.2, 12);
      drawHill(ctx, w, h, h * .78, 46, mixColor("#452d30", "#140d15", night), .42, time + 3.8, 11);

      ctx.save();
      ctx.fillStyle = `rgba(18, 11, 13, ${.72 + night * .16})`;
      fillPath(ctx, [
        [w * .18, h * .82], [w * .22, h * .53], [w * .25, h * .82],
        [w * .31, h * .82], [w * .35, h * .47], [w * .39, h * .82],
        [w * .74, h * .82], [w * .79, h * .43], [w * .84, h * .82],
        [w, h], [0, h]
      ]);
      ctx.restore();

      ctx.save();
      ctx.globalCompositeOperation = "screen";
      for (let i = 0; i < 7; i += 1) {
        const x = w * (.08 + i * .15) + Math.sin(time * .2 + i) * 20;
        const y = h * (.76 + Math.sin(time * .33 + i) * .025);
        const fog = ctx.createRadialGradient(x, y, 0, x, y, w * .18);
        fog.addColorStop(0, `rgba(224, 232, 213, ${.05 + cozy * .08 + eerie * .05})`);
        fog.addColorStop(1, "rgba(224, 232, 213, 0)");
        ctx.fillStyle = fog;
        ctx.fillRect(x - w * .2, y - h * .13, w * .4, h * .25);
      }
      ctx.restore();

      drawRain(ctx, w, h, time, clamp(.28 + eerie * .56 + (night * .12), 0, 1), heroic);

      drawSpotlight(ctx, w, h, w * .27, time * .65, "rgba(255, 219, 126, ALPHA)", .18 + cozy * .2 + heroic * .08);
      drawSpotlight(ctx, w, h, w * .69, time * .72 + 2.3, "rgba(147, 219, 211, ALPHA)", .13 + eerie * .16);
      drawSpotlight(ctx, w, h, w * .5, time * .48 + 4.6, "rgba(255, 246, 207, ALPHA)", .1 + drama * .18);

      ctx.save();
      ctx.globalCompositeOperation = "multiply";
      const vignette = ctx.createRadialGradient(w * .5, h * .45, w * .18, w * .5, h * .5, w * .74);
      vignette.addColorStop(0, "rgba(255,255,255,0)");
      vignette.addColorStop(.7, `rgba(40, 15, 24, ${.12 + eerie * .1})`);
      vignette.addColorStop(1, "rgba(0,0,0,.58)");
      ctx.fillStyle = vignette;
      ctx.fillRect(0, 0, w, h);
      ctx.restore();
    }

    function WeatherCanvas({ mix }) {
      const canvasRef = useRef(null);
      const mixRef = useRef(mix);

      useEffect(() => {
        mixRef.current = mix;
      }, [mix]);

      useEffect(() => {
        const canvas = canvasRef.current;
        const ctx = canvas.getContext("2d");
        let frame = 0;

        function resize() {
          const ratio = window.devicePixelRatio || 1;
          canvas.width = Math.floor(window.innerWidth * ratio);
          canvas.height = Math.floor(window.innerHeight * ratio);
          canvas.style.width = `${window.innerWidth}px`;
          canvas.style.height = `${window.innerHeight}px`;
          ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
        }

        function tick(ms) {
          drawCanvas(ctx, canvas, mixRef.current, ms / 1000);
          frame = requestAnimationFrame(tick);
        }

        resize();
        frame = requestAnimationFrame(tick);
        window.addEventListener("resize", resize);
        return () => {
          cancelAnimationFrame(frame);
          window.removeEventListener("resize", resize);
        };
      }, []);

      return <canvas className="theatre-canvas" ref={canvasRef} aria-hidden="true" />;
    }

    function useTypewriter(text) {
      const [visible, setVisible] = useState("");

      useEffect(() => {
        setVisible("");
        let index = 0;
        const timer = window.setInterval(() => {
          index += 1;
          setVisible(text.slice(0, index));
          if (index >= text.length) window.clearInterval(timer);
        }, 24);
        return () => window.clearInterval(timer);
      }, [text]);

      return visible;
    }

    function createScene(mix) {
      const cozy = norm(mix.cozy);
      const eerie = norm(mix.eerie);
      const heroic = norm(mix.heroic);
      const modeWord = mix.mode === "night" ? "Night" : "Matinée";
      const winner = [
        ["cosy", cozy],
        ["eerie", eerie],
        ["heroic", heroic]
      ].sort((a, b) => b[1] - a[1])[0][0];

      const titles = {
        cosy: "Weather Theatre",
        eerie: "Weather Theatre",
        heroic: "Weather Theatre"
      };

      const scenes = {
        cosy: `${modeWord} scene: ${forecast.temperature} and soft rain ${forecast.rain}; the wind is ${forecast.wind}, but the clouds are being lit like velvet from the wings.`,
        eerie: `${modeWord} scene: ${forecast.temperature}, pressure ${forecast.pressure}, and rain ${forecast.rain}; the same forecast becomes a haunted scrim of mist and watchful lamps.`,
        heroic: `${modeWord} scene: ${forecast.temperature}, ${forecast.wind} wind, rain ${forecast.rain}; the forecast enters like an overture, with brass light and storm banners.`
      };

      const label = winner === "cosy" ? "Velvet drizzle" : winner === "eerie" ? "Phantom barometer" : "Storm overture";
      return { title: titles[winner], subtitle: scenes[winner], label };
    }

    function Slider({ label, value, onChange }) {
      return (
        <label className="slider-row">
          <span className="slider-meta">
            <span>{label}</span>
            <output>{value}</output>
          </span>
          <input
            type="range"
            min="0"
            max="100"
            value={value}
            onChange={event => onChange(Number(event.target.value))}
            aria-label={`${label} mood`}
          />
        </label>
      );
    }

    function App() {
      const [mix, setMix] = useState({ cozy: 62, eerie: 28, heroic: 44, mode: "matinee" });
      const scene = useMemo(() => createScene(mix), [mix]);
      const typed = useTypewriter(scene.subtitle);

      const update = (key, value) => setMix(current => ({ ...current, [key]: value }));

      return (
        <main className="app">
          <WeatherCanvas mix={mix} />
          <div className="stage-floor" />
          <div className="proscenium" />
          <div className="curtain-left" />
          <div className="curtain-right" />
          <div className="curtain-top" />
          <div className="footlights" aria-hidden="true">
            {Array.from({ length: 9 }).map((_, index) => <span key={index} />)}
          </div>

          <section className="content" aria-label="Weather Theatre controls">
            <div className="marquee">
              <div className="kicker">{scene.label} · Mock forecast remix</div>
              <h1>{scene.title}</h1>
              <p className="subtitle" aria-live="polite">
                {typed}<span className="caret">|</span>
              </p>
              <div className="forecast-strip" aria-label="Forecast used for every scene">
                <span className="forecast-pill"><strong>{forecast.temperature}</strong> temperature</span>
                <span className="forecast-pill"><strong>{forecast.wind}</strong> wind</span>
                <span className="forecast-pill"><strong>{forecast.rain}</strong> rain</span>
                <span className="forecast-pill"><strong>{forecast.pressure}</strong> pressure</span>
              </div>
            </div>

            <aside className="controls" aria-label="Stage controls">
              <div className="controls-header">
                <h2 className="controls-title">Stage Mix</h2>
                <div className="mode-toggle" role="group" aria-label="Performance time">
                  <button
                    type="button"
                    aria-pressed={mix.mode === "matinee"}
                    onClick={() => update("mode", "matinee")}
                  >
                    Matinée
                  </button>
                  <button
                    type="button"
                    aria-pressed={mix.mode === "night"}
                    onClick={() => update("mode", "night")}
                  >
                    Night
                  </button>
                </div>
              </div>

              <div className="slider-bank">
                <Slider label="Cosy" value={mix.cozy} onChange={value => update("cozy", value)} />
                <Slider label="Eerie" value={mix.eerie} onChange={value => update("eerie", value)} />
                <Slider label="Heroic" value={mix.heroic} onChange={value => update("heroic", value)} />
              </div>

              <div className="playbill">
                <p>The forecast stays fixed. The sliders restage it as warmth, suspense, or spectacle across canvas scenery, light, rain, and narration.</p>
                <div className="badge" aria-label="Live canvas weather stage">Live<br />Set</div>
              </div>
            </aside>
          </section>
        </main>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
