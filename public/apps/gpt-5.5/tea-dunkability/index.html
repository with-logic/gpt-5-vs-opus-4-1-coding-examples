<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tea Dunkability Simulator</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg-a: #12151f;
      --bg-b: #25202a;
      --bg-c: #493022;
      --surface: rgba(255, 255, 255, 0.105);
      --surface-strong: rgba(255, 255, 255, 0.16);
      --surface-soft: rgba(255, 255, 255, 0.075);
      --stroke: rgba(255, 255, 255, 0.2);
      --stroke-strong: rgba(255, 255, 255, 0.36);
      --text: #fff8ec;
      --muted: rgba(255, 248, 236, 0.7);
      --faint: rgba(255, 248, 236, 0.48);
      --tea: #bf7741;
      --tea-dark: #78452c;
      --accent: #7ed7c4;
      --warn: #ffb45d;
      --danger: #ff6b5e;
      --good: #91e98f;
      --shadow: rgba(0, 0, 0, 0.34);
      --radius: 8px;
      font-family: Avenir Next, Optima, Candara, Segoe UI, sans-serif;
    }

    [data-theme="light"] {
      color-scheme: light;
      --bg-a: #f3eadf;
      --bg-b: #dfe9e6;
      --bg-c: #dabd99;
      --surface: rgba(255, 255, 255, 0.56);
      --surface-strong: rgba(255, 255, 255, 0.74);
      --surface-soft: rgba(255, 255, 255, 0.38);
      --stroke: rgba(74, 52, 34, 0.16);
      --stroke-strong: rgba(74, 52, 34, 0.28);
      --text: #261f1b;
      --muted: rgba(38, 31, 27, 0.68);
      --faint: rgba(38, 31, 27, 0.46);
      --tea: #b36835;
      --tea-dark: #724226;
      --accent: #167e78;
      --warn: #bd681a;
      --danger: #b64032;
      --good: #367f37;
      --shadow: rgba(77, 55, 35, 0.2);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      overflow-x: hidden;
      background:
        radial-gradient(circle at 82% 15%, rgba(126, 215, 196, 0.18), transparent 28rem),
        radial-gradient(circle at 12% 78%, rgba(255, 180, 93, 0.18), transparent 24rem),
        linear-gradient(135deg, var(--bg-a) 0%, var(--bg-b) 52%, var(--bg-c) 100%);
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      color: inherit;
    }

    #root {
      min-height: 100vh;
    }

    .app-shell {
      position: relative;
      min-height: 100vh;
      padding: clamp(18px, 3vw, 36px);
      isolation: isolate;
    }

    .app-shell::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background-image:
        linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.028) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.85), transparent);
      pointer-events: none;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      max-width: 1260px;
      margin: 0 auto 18px;
    }

    .brand {
      min-width: 0;
    }

    .eyebrow {
      margin: 0 0 6px;
      color: var(--accent);
      font-size: 0.76rem;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-family: Georgia, Times New Roman, serif;
      font-size: clamp(2rem, 5vw, 4.8rem);
      line-height: 0.95;
      letter-spacing: 0;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-shrink: 0;
    }

    .icon-button {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border: 1px solid var(--stroke);
      border-radius: var(--radius);
      background: var(--surface);
      backdrop-filter: blur(18px);
      box-shadow: 0 14px 30px var(--shadow);
      cursor: pointer;
      transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
    }

    .icon-button:hover {
      transform: translateY(-2px);
      border-color: var(--stroke-strong);
      background: var(--surface-strong);
    }

    .icon-button:focus-visible,
    .shortcut-close:focus-visible,
    .preset:focus-visible,
    input:focus-visible {
      outline: 3px solid color-mix(in srgb, var(--accent) 72%, transparent);
      outline-offset: 3px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(300px, 0.86fr) minmax(360px, 1.14fr);
      gap: clamp(16px, 2vw, 24px);
      max-width: 1260px;
      margin: 0 auto;
      align-items: stretch;
    }

    .glass {
      position: relative;
      border: 1px solid var(--stroke);
      border-radius: var(--radius);
      background:
        linear-gradient(145deg, rgba(255,255,255,0.13), rgba(255,255,255,0.04)),
        var(--surface);
      box-shadow: 0 24px 65px var(--shadow), inset 0 1px 0 rgba(255,255,255,0.18);
      backdrop-filter: blur(22px) saturate(128%);
    }

    .control-panel {
      padding: clamp(16px, 2vw, 22px);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .status-strip {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .status {
      min-width: 0;
      padding: 12px;
      border: 1px solid var(--stroke);
      border-radius: var(--radius);
      background: var(--surface-soft);
    }

    .status small,
    .slider-head span,
    .meter-label,
    .graph-caption,
    .biscuit-trait {
      display: block;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .status strong {
      display: block;
      margin-top: 5px;
      color: var(--text);
      font-family: Georgia, Times New Roman, serif;
      font-size: clamp(1.2rem, 2.2vw, 1.85rem);
      line-height: 1;
      white-space: nowrap;
    }

    .slider-card {
      padding: 15px;
      border: 1px solid var(--stroke);
      border-radius: var(--radius);
      background: rgba(0,0,0,0.08);
    }

    [data-theme="light"] .slider-card {
      background: rgba(255,255,255,0.32);
    }

    .slider-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 11px;
      align-items: baseline;
    }

    .slider-head label {
      font-weight: 800;
      font-size: 0.96rem;
    }

    .slider-value {
      color: var(--accent);
      font-weight: 900;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    input[type="range"] {
      width: 100%;
      height: 28px;
      appearance: none;
      background: transparent;
      cursor: pointer;
      --fill: 50%;
    }

    input[type="range"]::-webkit-slider-runnable-track {
      height: 9px;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--accent) 0 var(--fill), rgba(255,255,255,0.2) var(--fill));
      border: 1px solid rgba(255,255,255,0.1);
    }

    input[type="range"]::-moz-range-track {
      height: 9px;
      border-radius: 99px;
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.1);
    }

    input[type="range"]::-moz-range-progress {
      height: 9px;
      border-radius: 99px;
      background: var(--accent);
    }

    input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 22px;
      height: 22px;
      margin-top: -7px;
      border-radius: 50%;
      background: var(--text);
      border: 5px solid var(--accent);
      box-shadow: 0 8px 16px var(--shadow);
    }

    input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--text);
      border: 5px solid var(--accent);
      box-shadow: 0 8px 16px var(--shadow);
    }

    .biscuit-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      margin-top: 8px;
    }

    .biscuit-name {
      font-family: Georgia, Times New Roman, serif;
      font-size: 1.22rem;
      font-weight: 800;
    }

    .biscuit-trait {
      color: var(--faint);
      letter-spacing: 0.03em;
      text-transform: none;
      font-weight: 700;
    }

    .preset {
      border: 1px solid var(--stroke);
      border-radius: var(--radius);
      background: var(--surface-soft);
      color: var(--text);
      padding: 9px 11px;
      cursor: pointer;
      font-weight: 800;
      transition: background 160ms ease, transform 160ms ease;
    }

    .preset:hover {
      background: var(--surface-strong);
      transform: translateY(-1px);
    }

    .stage {
      min-height: 545px;
      overflow: hidden;
      display: grid;
      grid-template-rows: 1fr auto;
    }

    .teacup-wrap {
      position: relative;
      min-height: 370px;
      display: grid;
      place-items: center;
      padding: 28px 22px 10px;
    }

    .tea-halo {
      position: absolute;
      width: min(55vw, 520px);
      aspect-ratio: 1;
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 48%, rgba(255, 191, 110, 0.28), transparent 37%),
        radial-gradient(circle at 56% 42%, rgba(126, 215, 196, 0.16), transparent 31%);
      filter: blur(4px);
      animation: haloPulse 4s ease-in-out infinite;
    }

    .dunk-scene {
      position: relative;
      width: min(100%, 430px);
      height: 330px;
    }

    .steam {
      position: absolute;
      left: 50%;
      top: 10px;
      width: 11px;
      height: 120px;
      border-radius: 999px;
      border-left: 3px solid rgba(255,255,255,0.35);
      transform-origin: bottom;
      filter: blur(1px);
      opacity: 0;
      animation: steamRise 3.1s ease-in-out infinite;
    }

    .steam.s2 {
      left: 42%;
      animation-delay: 0.8s;
      height: 92px;
      transform: scaleX(-1);
    }

    .steam.s3 {
      left: 59%;
      animation-delay: 1.45s;
      height: 104px;
    }

    .biscuit {
      position: absolute;
      z-index: 5;
      left: 46%;
      top: 42px;
      width: 68px;
      height: 142px;
      transform-origin: top center;
      transform: rotate(var(--angle, -9deg));
      animation: dunkLoop 3.6s ease-in-out infinite;
    }

    .biscuit.paused {
      animation-play-state: paused;
    }

    .biscuit-stick {
      position: absolute;
      inset: 0;
      border-radius: 16px 16px 10px 10px;
      background:
        radial-gradient(circle at 22% 24%, rgba(255,255,255,0.26) 0 3px, transparent 4px),
        radial-gradient(circle at 70% 18%, rgba(112,62,30,0.3) 0 3px, transparent 4px),
        radial-gradient(circle at 52% 58%, rgba(112,62,30,0.22) 0 3px, transparent 4px),
        linear-gradient(100deg, #e0ad69, #bf7d3b 48%, #9d592e);
      border: 2px solid rgba(88,48,23,0.45);
      box-shadow: inset 7px 0 15px rgba(255,255,255,0.18), 0 20px 30px rgba(0,0,0,0.24);
      overflow: hidden;
    }

    .biscuit-stick::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: var(--sog, 24%);
      background: linear-gradient(to top, rgba(98,50,25,0.66), rgba(98,50,25,0.14));
      transition: height 260ms ease;
    }

    .biscuit-chip {
      position: absolute;
      right: -6px;
      bottom: 14px;
      width: 20px;
      height: 18px;
      border-radius: 20px 12px 20px 9px;
      background: #8a4c29;
      opacity: var(--chip, 0);
      transform: rotate(18deg);
      transition: opacity 200ms ease;
    }

    .cup {
      position: absolute;
      left: 50%;
      bottom: 28px;
      width: 270px;
      height: 178px;
      transform: translateX(-50%);
      border-radius: 0 0 92px 92px;
      background:
        linear-gradient(110deg, rgba(255,255,255,0.82), rgba(255,255,255,0.34) 42%, rgba(255,255,255,0.12)),
        linear-gradient(#f7ede2, #c9d5d0);
      border: 2px solid rgba(255,255,255,0.48);
      box-shadow: inset 24px 0 42px rgba(255,255,255,0.26), inset -20px -10px 38px rgba(54,58,73,0.2), 0 32px 45px rgba(0,0,0,0.28);
      animation: cupBob 3.6s ease-in-out infinite;
    }

    .tea-line {
      position: absolute;
      left: 18px;
      right: 18px;
      top: 18px;
      height: 45px;
      border-radius: 50%;
      background:
        radial-gradient(ellipse at 48% 35%, rgba(255,214,142,0.72), transparent 28%),
        linear-gradient(90deg, var(--tea-dark), var(--tea), #d3914d);
      border: 2px solid rgba(105,55,29,0.26);
      overflow: hidden;
    }

    .tea-line::after {
      content: "";
      position: absolute;
      inset: 8px -16px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.24), transparent);
      transform: translateX(-55%);
      animation: teaShimmer 2.8s ease-in-out infinite;
    }

    .handle {
      position: absolute;
      right: -54px;
      top: 42px;
      width: 88px;
      height: 94px;
      border: 18px solid rgba(240,244,237,0.62);
      border-left: 0;
      border-radius: 0 60px 60px 0;
      filter: drop-shadow(10px 16px 18px rgba(0,0,0,0.2));
    }

    .saucer {
      position: absolute;
      left: 50%;
      bottom: 5px;
      width: 320px;
      height: 54px;
      transform: translateX(-50%);
      border-radius: 50%;
      background: linear-gradient(90deg, rgba(255,255,255,0.34), rgba(255,255,255,0.7), rgba(255,255,255,0.22));
      box-shadow: 0 22px 38px rgba(0,0,0,0.22);
    }

    .crumb {
      position: absolute;
      z-index: 7;
      left: var(--x);
      top: var(--y);
      width: var(--size);
      height: var(--size);
      border-radius: 45% 55% 52% 48%;
      background: #d69a57;
      box-shadow: inset -2px -2px 2px rgba(92,48,20,0.35);
      opacity: 0;
      animation: crumbFall var(--duration) linear var(--delay) forwards;
    }

    .readout-panel {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 0 18px 18px;
    }

    .meter-card,
    .graph-card {
      padding: 14px;
      border: 1px solid var(--stroke);
      border-radius: var(--radius);
      background: var(--surface-soft);
      min-width: 0;
    }

    .meter-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: baseline;
      margin-bottom: 10px;
    }

    .meter-score {
      font-family: Georgia, Times New Roman, serif;
      color: var(--meter-color);
      font-size: 1.8rem;
      line-height: 1;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
    }

    .meter-track {
      height: 18px;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid var(--stroke);
      background: rgba(255,255,255,0.12);
    }

    .meter-fill {
      height: 100%;
      width: var(--meter);
      background: linear-gradient(90deg, var(--good), var(--warn), var(--danger));
      border-radius: inherit;
      transition: width 220ms ease;
    }

    .diagnosis {
      margin: 10px 0 0;
      color: var(--muted);
      line-height: 1.45;
      font-size: 0.92rem;
    }

    .graph {
      width: 100%;
      height: 138px;
      display: block;
    }

    .graph-line {
      fill: none;
      stroke: var(--accent);
      stroke-width: 4;
      stroke-linecap: round;
      filter: drop-shadow(0 0 8px rgba(126, 215, 196, 0.35));
    }

    .graph-area {
      fill: url(#riskFill);
      opacity: 0.72;
    }

    .graph-grid {
      stroke: rgba(255,255,255,0.16);
      stroke-width: 1;
    }

    [data-theme="light"] .graph-grid {
      stroke: rgba(38,31,27,0.14);
    }

    .dot {
      fill: var(--meter-color);
      stroke: var(--text);
      stroke-width: 3;
    }

    .shortcut-modal {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(0,0,0,0.42);
      backdrop-filter: blur(10px);
    }

    .shortcut-box {
      width: min(480px, 100%);
      padding: 22px;
    }

    .shortcut-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 14px;
    }

    .shortcut-head h2 {
      margin: 0;
      font-family: Georgia, Times New Roman, serif;
      font-size: 1.7rem;
    }

    .shortcut-close {
      width: 38px;
      height: 38px;
      border: 1px solid var(--stroke);
      border-radius: var(--radius);
      background: var(--surface-soft);
      cursor: pointer;
      font-size: 1.25rem;
    }

    .shortcut-grid {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 9px 14px;
      align-items: center;
      color: var(--muted);
    }

    kbd {
      display: inline-grid;
      place-items: center;
      min-width: 34px;
      min-height: 28px;
      padding: 3px 8px;
      border-radius: 6px;
      border: 1px solid var(--stroke-strong);
      background: rgba(0,0,0,0.18);
      color: var(--text);
      box-shadow: inset 0 -2px 0 rgba(0,0,0,0.2);
      font-weight: 900;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @keyframes steamRise {
      0% { transform: translateY(32px) translateX(0) scale(0.78) rotate(5deg); opacity: 0; }
      28% { opacity: 0.55; }
      100% { transform: translateY(-34px) translateX(18px) scale(1.25) rotate(-12deg); opacity: 0; }
    }

    @keyframes cupBob {
      0%, 100% { transform: translateX(-50%) translateY(0) rotate(-0.4deg); }
      50% { transform: translateX(-50%) translateY(5px) rotate(0.45deg); }
    }

    @keyframes teaShimmer {
      0%, 100% { transform: translateX(-55%); }
      55% { transform: translateX(65%); }
    }

    @keyframes dunkLoop {
      0%, 100% { transform: rotate(var(--angle, -9deg)) translateY(0); }
      42% { transform: rotate(calc(var(--angle, -9deg) + 5deg)) translateY(var(--depth, 92px)); }
      62% { transform: rotate(calc(var(--angle, -9deg) + 2deg)) translateY(calc(var(--depth, 92px) - 9px)); }
    }

    @keyframes haloPulse {
      0%, 100% { transform: scale(0.96); opacity: 0.75; }
      50% { transform: scale(1.04); opacity: 1; }
    }

    @keyframes crumbFall {
      0% { transform: translate3d(0, 0, 0) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      100% { transform: translate3d(var(--drift), 185px, 0) rotate(var(--rot)); opacity: 0; }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
      }
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .stage {
        min-height: auto;
      }

      .teacup-wrap {
        min-height: 330px;
      }
    }

    @media (max-width: 620px) {
      .app-shell {
        padding: 14px;
      }

      .topbar {
        align-items: flex-start;
      }

      .toolbar {
        flex-direction: column;
      }

      .status-strip,
      .readout-panel {
        grid-template-columns: 1fr;
      }

      .dunk-scene {
        transform: scale(0.86);
      }

      .teacup-wrap {
        min-height: 292px;
        padding: 8px 0 0;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useEffect, useMemo, useRef, useState } = React;

    const biscuits = [
      { name: "Rich Tea", trait: "Fast saturation, clean snap", strength: 0.74, absorb: 1.36, snap: 6.6 },
      { name: "Digestive", trait: "Balanced crumb and grain", strength: 0.96, absorb: 1.03, snap: 8.8 },
      { name: "Hobnob", trait: "Oaty armour, stubborn bite", strength: 1.25, absorb: 0.84, snap: 11.2 },
      { name: "Custard Cream", trait: "Cream layer buys a second", strength: 1.05, absorb: 0.96, snap: 9.7 },
      { name: "Shortbread", trait: "Dense butter wall, sudden collapse", strength: 1.15, absorb: 0.74, snap: 10.4 },
      { name: "Bourbon", trait: "Chocolate shell, sneaky soak", strength: 0.9, absorb: 1.08, snap: 8.1 }
    ];

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function sigmoid(x) {
      return 1 / (1 + Math.exp(-x));
    }

    function computeModel({ temp, dunk, biscuitIndex, integrity }) {
      const biscuit = biscuits[biscuitIndex];
      const heat = Math.pow(temp / 70, 1.18);
      const integrityBoost = 0.45 + (integrity / 100) * 0.85;
      const tolerance = biscuit.snap * biscuit.strength * integrityBoost * Math.pow(73 / temp, 0.25);
      const saturation = dunk * biscuit.absorb * heat;
      const risk = clamp(sigmoid((saturation - tolerance) / 1.75), 0.015, 0.985);
      const soak = clamp((saturation / Math.max(tolerance, 0.1)) * 100, 0, 160);
      const score = clamp(100 - risk * 92 + Math.min(dunk, 8) * 1.3 - Math.abs(temp - 72) * 0.28, 0, 100);
      const crunch = clamp(100 - soak * 0.48 + integrity * 0.16, 0, 100);
      let verdict = "Prime dunking window";
      if (risk > 0.82) verdict = "Structural failure likely";
      else if (risk > 0.62) verdict = "Edge crumbling";
      else if (risk < 0.18 && dunk < 5) verdict = "Under-brewed biscuit";
      else if (score > 78) verdict = "Golden biscuit zone";
      return { biscuit, heat, tolerance, saturation, risk, soak, score, crunch, verdict };
    }

    function makePath(points) {
      return points.map((point, index) => `${index ? "L" : "M"} ${point.x.toFixed(2)} ${point.y.toFixed(2)}`).join(" ");
    }

    function Slider({ id, label, value, min, max, step = 1, unit = "", onChange, valueLabel }) {
      const fill = ((value - min) / (max - min)) * 100;
      return (
        <div className="slider-card">
          <div className="slider-head">
            <label htmlFor={id}>{label}</label>
            <span className="slider-value">{valueLabel || `${value}${unit}`}</span>
          </div>
          <input
            id={id}
            type="range"
            min={min}
            max={max}
            step={step}
            value={value}
            style={{ "--fill": `${fill}%` }}
            onChange={(event) => onChange(Number(event.target.value))}
          />
        </div>
      );
    }

    function CrumbleGraph({ temp, biscuitIndex, integrity, dunk, model }) {
      const width = 360;
      const height = 138;
      const pad = 16;
      const points = useMemo(() => {
        return Array.from({ length: 50 }, (_, i) => {
          const testDunk = 1 + (i / 49) * 19;
          const sample = computeModel({ temp, dunk: testDunk, biscuitIndex, integrity });
          return {
            x: pad + (i / 49) * (width - pad * 2),
            y: height - pad - sample.risk * (height - pad * 2)
          };
        });
      }, [temp, biscuitIndex, integrity]);
      const line = makePath(points);
      const area = `${line} L ${width - pad} ${height - pad} L ${pad} ${height - pad} Z`;
      const dotX = pad + ((dunk - 1) / 19) * (width - pad * 2);
      const dotY = height - pad - model.risk * (height - pad * 2);

      return (
        <div className="graph-card">
          <span className="graph-caption">Crumble curve</span>
          <svg className="graph" viewBox={`0 0 ${width} ${height}`} role="img" aria-label="Risk curve graph">
            <defs>
              <linearGradient id="riskFill" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor="var(--danger)" stopOpacity="0.48" />
                <stop offset="55%" stopColor="var(--warn)" stopOpacity="0.22" />
                <stop offset="100%" stopColor="var(--accent)" stopOpacity="0.04" />
              </linearGradient>
            </defs>
            {[0, 1, 2, 3].map((row) => (
              <line key={row} className="graph-grid" x1={pad} x2={width - pad} y1={pad + row * 34} y2={pad + row * 34} />
            ))}
            <path className="graph-area" d={area} />
            <path className="graph-line" d={line} />
            <circle className="dot" cx={dotX} cy={dotY} r="8" />
          </svg>
        </div>
      );
    }

    function App() {
      const [temp, setTemp] = useState(74);
      const [dunk, setDunk] = useState(8);
      const [biscuitIndex, setBiscuitIndex] = useState(1);
      const [integrity, setIntegrity] = useState(78);
      const [theme, setTheme] = useState("dark");
      const [showShortcuts, setShowShortcuts] = useState(false);
      const [paused, setPaused] = useState(false);
      const [crumbs, setCrumbs] = useState([]);
      const crumbId = useRef(0);

      const model = useMemo(() => computeModel({ temp, dunk, biscuitIndex, integrity }), [temp, dunk, biscuitIndex, integrity]);
      const riskPct = Math.round(model.risk * 100);
      const meterColor = model.risk > 0.72 ? "var(--danger)" : model.risk > 0.48 ? "var(--warn)" : "var(--good)";
      const dunkDepth = clamp(58 + dunk * 6.3 + (temp - 60) * 0.45, 60, 138);
      const sogHeight = clamp(model.soak * 0.7, 14, 94);
      const bestTime = clamp(Math.round((model.tolerance / (model.biscuit.absorb * model.heat)) * 10) / 10, 1, 20);

      function addCrumbs(count = 10) {
        setCrumbs((current) => {
          const next = Array.from({ length: count }, () => ({
            id: crumbId.current++,
            x: `${42 + Math.random() * 19}%`,
            y: `${28 + Math.random() * 28}%`,
            size: `${4 + Math.random() * 8}px`,
            delay: `${Math.random() * 0.3}s`,
            duration: `${1.25 + Math.random() * 1.1}s`,
            drift: `${-52 + Math.random() * 104}px`,
            rot: `${-210 + Math.random() * 420}deg`
          }));
          return [...current.slice(-42), ...next];
        });
      }

      useEffect(() => {
        document.documentElement.dataset.theme = theme;
      }, [theme]);

      useEffect(() => {
        if (model.risk < 0.62 || paused) return;
        addCrumbs(model.risk > 0.82 ? 13 : 7);
        const timer = setInterval(() => addCrumbs(model.risk > 0.82 ? 9 : 4), model.risk > 0.82 ? 1500 : 2400);
        return () => clearInterval(timer);
      }, [model.risk, paused]);

      useEffect(() => {
        const cleanup = setInterval(() => {
          setCrumbs((current) => current.slice(-52));
        }, 2600);
        return () => clearInterval(cleanup);
      }, []);

      useEffect(() => {
        function onKeyDown(event) {
          const target = event.target;
          const isFormControl = target && target.matches && target.matches("input, button");
          if (isFormControl && event.key !== "?") return;
          const key = event.key.toLowerCase();
          if (key === "?") {
            event.preventDefault();
            setShowShortcuts((value) => !value);
          } else if (key === "m") {
            setTheme((value) => value === "dark" ? "light" : "dark");
          } else if (key === " ") {
            event.preventDefault();
            setPaused((value) => !value);
          } else if (key === "t") {
            setTemp((value) => clamp(value + (event.shiftKey ? -2 : 2), 45, 95));
          } else if (key === "d") {
            setDunk((value) => clamp(Number((value + (event.shiftKey ? -0.5 : 0.5)).toFixed(1)), 1, 20));
          } else if (key === "i") {
            setIntegrity((value) => clamp(value + (event.shiftKey ? -5 : 5), 20, 100));
          } else if (key === "b") {
            setBiscuitIndex((value) => (value + (event.shiftKey ? biscuits.length - 1 : 1)) % biscuits.length);
          } else if (event.key === "Escape") {
            setShowShortcuts(false);
          }
        }
        window.addEventListener("keydown", onKeyDown);
        return () => window.removeEventListener("keydown", onKeyDown);
      }, []);

      return (
        <main className="app-shell" style={{ "--meter": `${riskPct}%`, "--meter-color": meterColor }}>
          <header className="topbar">
            <div className="brand">
              <p className="eyebrow">Breakfast physics desk</p>
              <h1>Tea Dunkability Simulator</h1>
            </div>
            <div className="toolbar" aria-label="Simulator tools">
              <button className="icon-button" type="button" onClick={() => setPaused((value) => !value)} title={paused ? "Resume animation" : "Pause animation"} aria-label={paused ? "Resume animation" : "Pause animation"}>
                {paused ? (
                  <svg width="21" height="21" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M8 5v14l11-7-11-7Z" fill="currentColor"/></svg>
                ) : (
                  <svg width="21" height="21" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M8 5h3v14H8V5Zm6 0h3v14h-3V5Z" fill="currentColor"/></svg>
                )}
              </button>
              <button className="icon-button" type="button" onClick={() => setTheme((value) => value === "dark" ? "light" : "dark")} title="Toggle dark mode" aria-label="Toggle dark mode">
                <svg width="21" height="21" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M12 3a9 9 0 1 0 9 9 6.7 6.7 0 0 1-9-9Z" stroke="currentColor" strokeWidth="2" strokeLinejoin="round"/>
                </svg>
              </button>
              <button className="icon-button" type="button" onClick={() => setShowShortcuts(true)} title="Keyboard shortcuts" aria-label="Keyboard shortcuts">
                <strong aria-hidden="true">?</strong>
              </button>
            </div>
          </header>

          <section className="layout" aria-label="Tea dunkability controls and simulation">
            <aside className="glass control-panel">
              <div className="status-strip">
                <div className="status">
                  <small>Risk</small>
                  <strong>{riskPct}%</strong>
                </div>
                <div className="status">
                  <small>Best pull</small>
                  <strong>{bestTime}s</strong>
                </div>
                <div className="status">
                  <small>Crunch</small>
                  <strong>{Math.round(model.crunch)}</strong>
                </div>
              </div>

              <Slider id="tea-temp" label="Tea temperature" value={temp} min={45} max={95} unit={"\u00B0C"} onChange={setTemp} />
              <Slider id="dunk-time" label="Dunk time" value={dunk} min={1} max={20} step={0.5} unit="s" onChange={setDunk} />
              <div className="slider-card">
                <div className="slider-head">
                  <label htmlFor="biscuit-type">Biscuit type</label>
                  <span className="slider-value">{biscuitIndex + 1}/{biscuits.length}</span>
                </div>
                <input
                  id="biscuit-type"
                  type="range"
                  min="0"
                  max={biscuits.length - 1}
                  step="1"
                  value={biscuitIndex}
                  style={{ "--fill": `${(biscuitIndex / (biscuits.length - 1)) * 100}%` }}
                  onChange={(event) => setBiscuitIndex(Number(event.target.value))}
                />
                <div className="biscuit-row">
                  <div>
                    <div className="biscuit-name">{model.biscuit.name}</div>
                    <span className="biscuit-trait">{model.biscuit.trait}</span>
                  </div>
                  <button className="preset" type="button" onClick={() => {
                    setTemp(72);
                    setDunk(bestTime);
                    setIntegrity(84);
                  }}>Tune</button>
                </div>
              </div>
              <Slider id="integrity" label="Structural integrity" value={integrity} min={20} max={100} unit="%" onChange={setIntegrity} />
            </aside>

            <section className="glass stage" aria-label="Live tea dunk simulation">
              <div className="teacup-wrap">
                <div className="tea-halo" aria-hidden="true"></div>
                <div className="dunk-scene">
                  <div className="steam s1" aria-hidden="true"></div>
                  <div className="steam s2" aria-hidden="true"></div>
                  <div className="steam s3" aria-hidden="true"></div>
                  <div
                    className={`biscuit ${paused ? "paused" : ""}`}
                    style={{
                      "--depth": `${dunkDepth}px`,
                      "--sog": `${sogHeight}%`,
                      "--chip": model.risk > 0.58 ? Math.min(1, (model.risk - 0.58) * 2.4) : 0,
                      "--angle": `${-15 + biscuitIndex * 3}deg`
                    }}
                    aria-hidden="true"
                  >
                    <div className="biscuit-stick"></div>
                    <div className="biscuit-chip"></div>
                  </div>
                  <div className="saucer" aria-hidden="true"></div>
                  <div className="cup" aria-hidden="true">
                    <div className="tea-line"></div>
                    <div className="handle"></div>
                  </div>
                  {crumbs.map((crumb) => (
                    <span
                      key={crumb.id}
                      className="crumb"
                      style={{
                        "--x": crumb.x,
                        "--y": crumb.y,
                        "--size": crumb.size,
                        "--delay": crumb.delay,
                        "--duration": crumb.duration,
                        "--drift": crumb.drift,
                        "--rot": crumb.rot
                      }}
                      aria-hidden="true"
                    />
                  ))}
                </div>
              </div>

              <div className="readout-panel">
                <div className="meter-card">
                  <div className="meter-top">
                    <span className="meter-label">Crumble-o-meter</span>
                    <strong className="meter-score">{riskPct}</strong>
                  </div>
                  <div className="meter-track" aria-hidden="true">
                    <div className="meter-fill"></div>
                  </div>
                  <p className="diagnosis">{model.verdict}. Saturation is {Math.round(model.soak)}% of the biscuit tolerance curve.</p>
                </div>
                <CrumbleGraph temp={temp} biscuitIndex={biscuitIndex} integrity={integrity} dunk={dunk} model={model} />
              </div>
            </section>
          </section>

          {showShortcuts && (
            <div className="shortcut-modal" role="dialog" aria-modal="true" aria-labelledby="shortcut-title">
              <div className="glass shortcut-box">
                <div className="shortcut-head">
                  <h2 id="shortcut-title">Shortcuts</h2>
                  <button className="shortcut-close" type="button" onClick={() => setShowShortcuts(false)} aria-label="Close shortcuts">x</button>
                </div>
                <div className="shortcut-grid">
                  <kbd>T</kbd><span>Raise temperature, Shift+T lowers it</span>
                  <kbd>D</kbd><span>Extend dunk time, Shift+D shortens it</span>
                  <kbd>B</kbd><span>Cycle biscuit type, Shift+B goes back</span>
                  <kbd>I</kbd><span>Increase integrity, Shift+I reduces it</span>
                  <kbd>M</kbd><span>Toggle dark mode</span>
                  <kbd>Space</kbd><span>Pause or resume the dunk loop</span>
                </div>
              </div>
            </div>
          )}
        </main>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
