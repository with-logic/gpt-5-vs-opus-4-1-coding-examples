<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Match Challenge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Manrope:wght@500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #17151d;
      --paper: #fff9ee;
      --panel: rgba(255, 255, 255, 0.78);
      --panel-strong: rgba(255, 255, 255, 0.92);
      --line: rgba(23, 21, 29, 0.14);
      --muted: #716c76;
      --shadow: 0 22px 80px rgba(23, 21, 29, 0.18);
      --danger: #f43f5e;
      --success: #18a873;
      --radius: 8px;
      --ease: cubic-bezier(.2, .9, .2, 1);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      align-items: stretch;
      background:
        radial-gradient(circle at 12% 18%, rgba(255, 213, 89, 0.38), transparent 26rem),
        radial-gradient(circle at 86% 14%, rgba(0, 174, 239, 0.24), transparent 25rem),
        linear-gradient(135deg, #fff9ee 0%, #f6eee0 40%, #eef7f1 100%);
      color: var(--ink);
      display: flex;
      font-family: Manrope, ui-sans-serif, system-ui, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      background-image:
        linear-gradient(rgba(23, 21, 29, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(23, 21, 29, 0.04) 1px, transparent 1px);
      background-size: 34px 34px;
      content: "";
      inset: 0;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.8), transparent 84%);
      pointer-events: none;
      position: fixed;
    }

    main {
      display: grid;
      min-height: 100vh;
      padding: clamp(18px, 3vw, 42px);
      place-items: center;
      position: relative;
      width: 100%;
    }

    .shell {
      display: grid;
      gap: clamp(18px, 3vw, 28px);
      max-width: 1080px;
      width: min(100%, 1080px);
    }

    .topbar {
      align-items: center;
      display: grid;
      gap: 14px;
      grid-template-columns: 1fr auto;
    }

    .brand {
      display: grid;
      gap: 4px;
    }

    h1 {
      font-family: Anton, Impact, sans-serif;
      font-size: clamp(2rem, 6vw, 4.75rem);
      font-weight: 400;
      letter-spacing: 0;
      line-height: .92;
      margin: 0;
      text-transform: uppercase;
    }

    .mode {
      color: var(--muted);
      font-size: clamp(.88rem, 1.5vw, 1rem);
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .stats {
      align-items: stretch;
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(3, minmax(86px, 1fr));
      min-width: min(100%, 346px);
    }

    .stat {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 8px 28px rgba(23, 21, 29, 0.08);
      padding: 12px 14px;
      text-align: center;
    }

    .stat span {
      color: var(--muted);
      display: block;
      font-size: .72rem;
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .stat strong {
      display: block;
      font-family: Anton, Impact, sans-serif;
      font-size: clamp(1.9rem, 4vw, 3rem);
      font-weight: 400;
      line-height: 1;
      margin-top: 8px;
    }

    .arena {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.86), rgba(255, 255, 255, 0.62));
      border: 1px solid rgba(23, 21, 29, 0.16);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: grid;
      gap: clamp(22px, 4vw, 36px);
      overflow: hidden;
      padding: clamp(22px, 4.7vw, 56px);
      position: relative;
    }

    .arena::before {
      background: linear-gradient(90deg, #f32d4f, #ffb703, #13a66f, #0d8bea, #7c3aed);
      content: "";
      height: 8px;
      inset: 0 0 auto 0;
      position: absolute;
    }

    .challenge {
      align-items: center;
      display: grid;
      gap: 24px;
      min-height: clamp(260px, 45vh, 430px);
      place-items: center;
      text-align: center;
    }

    .prompt-wrap {
      display: grid;
      gap: clamp(14px, 2vw, 22px);
      justify-items: center;
      min-width: 0;
      width: 100%;
    }

    .round-label {
      align-items: center;
      background: rgba(23, 21, 29, 0.06);
      border: 1px solid rgba(23, 21, 29, 0.08);
      border-radius: 999px;
      color: #4c4852;
      display: inline-flex;
      font-size: .75rem;
      font-weight: 900;
      gap: 8px;
      letter-spacing: .11em;
      padding: 9px 13px;
      text-transform: uppercase;
    }

    .pulse-dot {
      background: var(--success);
      border-radius: 999px;
      box-shadow: 0 0 0 0 rgba(24, 168, 115, 0.5);
      height: 9px;
      width: 9px;
    }

    .playing .pulse-dot {
      animation: pulse 1.1s infinite;
    }

    .word {
      align-items: center;
      display: flex;
      font-family: Anton, Impact, sans-serif;
      font-size: clamp(5.3rem, 20vw, 14rem);
      font-weight: 400;
      justify-content: center;
      letter-spacing: 0;
      line-height: .82;
      min-height: clamp(96px, 20vw, 205px);
      position: relative;
      text-transform: uppercase;
      text-shadow: 0 7px 0 rgba(23, 21, 29, 0.09);
      transform-origin: center;
      user-select: none;
      width: 100%;
      word-break: keep-all;
    }

    .word.swap {
      animation: swap .24s var(--ease);
    }

    .feedback {
      color: var(--muted);
      font-size: clamp(1rem, 2vw, 1.2rem);
      font-weight: 900;
      min-height: 1.55em;
      text-transform: uppercase;
    }

    .feedback.correct {
      color: var(--success);
    }

    .feedback.wrong {
      color: var(--danger);
    }

    .controls {
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    button {
      font: inherit;
    }

    .color-btn {
      --btn: #777;
      align-items: center;
      background: var(--btn);
      background: color-mix(in srgb, var(--btn) 92%, #ffffff);
      border: 0;
      border-radius: var(--radius);
      box-shadow: 0 10px 0 rgba(23, 21, 29, 0.38), 0 18px 34px rgba(23, 21, 29, 0.18);
      box-shadow: 0 10px 0 color-mix(in srgb, var(--btn) 58%, #17151d), 0 18px 34px rgba(23, 21, 29, 0.18);
      color: var(--label, #fff);
      cursor: pointer;
      display: flex;
      font-size: clamp(1rem, 2vw, 1.2rem);
      font-weight: 900;
      gap: 11px;
      justify-content: center;
      min-height: clamp(64px, 10vw, 86px);
      outline: none;
      padding: 14px 12px;
      position: relative;
      text-transform: uppercase;
      transform: translateY(0);
      transition: transform .12s var(--ease), box-shadow .12s var(--ease), filter .18s var(--ease);
    }

    .color-btn::before {
      background: rgba(255, 255, 255, 0.34);
      border-radius: 999px;
      content: "";
      height: 12px;
      width: 12px;
    }

    .color-btn:hover {
      filter: saturate(1.12) brightness(1.03);
      transform: translateY(-3px);
    }

    .color-btn:active,
    .color-btn.pressed {
      box-shadow: 0 4px 0 rgba(23, 21, 29, 0.38), 0 8px 18px rgba(23, 21, 29, 0.16);
      box-shadow: 0 4px 0 color-mix(in srgb, var(--btn) 58%, #17151d), 0 8px 18px rgba(23, 21, 29, 0.16);
      transform: translateY(6px) scale(.99);
    }

    .color-btn:focus-visible,
    .primary:focus-visible {
      box-shadow: 0 0 0 4px #fff, 0 0 0 8px rgba(23, 21, 29, .75), 0 10px 0 color-mix(in srgb, var(--btn, #17151d) 58%, #17151d);
    }

    .color-btn:disabled {
      cursor: not-allowed;
      filter: grayscale(.75) opacity(.52);
      transform: none;
    }

    .red { --btn: #ee2d4a; }
    .blue { --btn: #1479e8; }
    .green { --btn: #13a66f; }
    .yellow { --btn: #f7c72c; --label: #271f09; }
    .orange { --btn: #f97316; }
    .purple { --btn: #7c3aed; }

    .start-layer {
      align-items: center;
      background: rgba(255, 249, 238, 0.8);
      display: grid;
      inset: 8px;
      justify-items: center;
      padding: clamp(18px, 4vw, 42px);
      position: absolute;
      text-align: center;
      transition: opacity .22s var(--ease), visibility .22s var(--ease);
      z-index: 5;
    }

    .playing .start-layer {
      opacity: 0;
      pointer-events: none;
      visibility: hidden;
    }

    .start-panel {
      display: grid;
      gap: 18px;
      justify-items: center;
      max-width: 560px;
    }

    .start-panel h2 {
      font-family: Anton, Impact, sans-serif;
      font-size: clamp(3.1rem, 9vw, 7rem);
      font-weight: 400;
      line-height: .9;
      margin: 0;
      text-transform: uppercase;
    }

    .start-panel p {
      color: #4f4a55;
      font-size: clamp(1rem, 2vw, 1.22rem);
      font-weight: 800;
      line-height: 1.45;
      margin: 0;
      max-width: 34rem;
    }

    .primary {
      --btn: #17151d;
      background: var(--ink);
      border: 0;
      border-radius: var(--radius);
      box-shadow: 0 10px 0 #59515f, 0 18px 34px rgba(23, 21, 29, 0.18);
      color: #fff9ee;
      cursor: pointer;
      font-size: clamp(1rem, 2vw, 1.15rem);
      font-weight: 900;
      letter-spacing: .08em;
      margin-top: 6px;
      min-height: 58px;
      padding: 0 26px;
      text-transform: uppercase;
      transition: transform .12s var(--ease), box-shadow .12s var(--ease), background .18s var(--ease);
    }

    .primary:hover {
      background: #2a2630;
      transform: translateY(-2px);
    }

    .primary:active {
      box-shadow: 0 4px 0 #59515f, 0 8px 18px rgba(23, 21, 29, 0.16);
      transform: translateY(6px);
    }

    .meter {
      background: rgba(23, 21, 29, .09);
      border-radius: 999px;
      height: 12px;
      overflow: hidden;
      width: 100%;
    }

    .meter > span {
      background: linear-gradient(90deg, #13a66f, #f7c72c, #ee2d4a);
      border-radius: inherit;
      display: block;
      height: 100%;
      transform-origin: left;
      transition: transform .25s linear;
      width: 100%;
    }

    .urgent .stat:first-child strong,
    .urgent .feedback {
      color: var(--danger);
    }

    .shake {
      animation: shake .28s var(--ease);
    }

    .burst {
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      position: absolute;
    }

    .spark {
      animation: spark .72s var(--ease) forwards;
      background: var(--spark-color, #fff);
      border-radius: 999px;
      height: 10px;
      left: 50%;
      position: absolute;
      top: 50%;
      width: 10px;
    }

    @keyframes pulse {
      to {
        box-shadow: 0 0 0 10px rgba(24, 168, 115, 0);
      }
    }

    @keyframes swap {
      0% { opacity: .35; transform: translateY(12px) scale(.96); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      50% { transform: translateX(8px); }
      75% { transform: translateX(-4px); }
    }

    @keyframes spark {
      0% {
        opacity: 1;
        transform: translate(-50%, -50%) rotate(var(--angle)) translateY(0) scale(.8);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) rotate(var(--angle)) translateY(var(--distance)) scale(.15);
      }
    }

    @media (max-width: 760px) {
      main {
        padding: 14px;
      }

      .topbar {
        grid-template-columns: 1fr;
      }

      .stats {
        grid-template-columns: repeat(3, 1fr);
        min-width: 0;
      }

      .stat {
        padding: 10px 8px;
      }

      .controls {
        gap: 10px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .arena {
        padding: 24px 16px 18px;
      }

      .challenge {
        min-height: 330px;
      }

      .color-btn {
        min-height: 60px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: .01ms !important;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="shell" aria-label="Color Match Challenge game">
      <header class="topbar">
        <div class="brand">
          <div class="mode">Match the ink</div>
          <h1>Color Match Challenge</h1>
        </div>
        <div class="stats" aria-live="polite">
          <div class="stat">
            <span>Time</span>
            <strong id="time">30</strong>
          </div>
          <div class="stat">
            <span>Score</span>
            <strong id="score">0</strong>
          </div>
          <div class="stat">
            <span>Best</span>
            <strong id="best">0</strong>
          </div>
        </div>
      </header>

      <div class="arena" id="arena">
        <div class="meter" aria-hidden="true"><span id="meter"></span></div>

        <div class="challenge" id="challenge">
          <div class="prompt-wrap">
            <div class="round-label"><span class="pulse-dot"></span><span id="round-label">Ready</span></div>
            <div class="word" id="word" aria-live="assertive">GREEN</div>
            <div class="feedback" id="feedback">Tap the color you see</div>
          </div>
        </div>

        <div class="controls" id="controls" aria-label="Color choices"></div>
        <div class="burst" id="burst" aria-hidden="true"></div>

        <div class="start-layer" id="start-layer">
          <div class="start-panel">
            <h2 id="start-title">30 Seconds</h2>
            <p id="start-copy">Choose the printed color, not the word. Fast answers build streak bonus.</p>
            <button class="primary" id="start-btn" type="button">Start Game</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const COLORS = [
      { name: "Red", value: "#ee2d4a", className: "red" },
      { name: "Blue", value: "#1479e8", className: "blue" },
      { name: "Green", value: "#13a66f", className: "green" },
      { name: "Yellow", value: "#f7c72c", className: "yellow" },
      { name: "Orange", value: "#f97316", className: "orange" },
      { name: "Purple", value: "#7c3aed", className: "purple" }
    ];

    const DURATION = 30;
    const state = {
      active: false,
      timeLeft: DURATION,
      score: 0,
      streak: 0,
      round: 0,
      answer: COLORS[2],
      timer: null,
      lastWord: null,
      lastColor: null
    };

    const body = document.body;
    const arena = document.getElementById("arena");
    const challenge = document.getElementById("challenge");
    const wordEl = document.getElementById("word");
    const controls = document.getElementById("controls");
    const feedback = document.getElementById("feedback");
    const timeEl = document.getElementById("time");
    const scoreEl = document.getElementById("score");
    const bestEl = document.getElementById("best");
    const meter = document.getElementById("meter");
    const roundLabel = document.getElementById("round-label");
    const startBtn = document.getElementById("start-btn");
    const startTitle = document.getElementById("start-title");
    const startCopy = document.getElementById("start-copy");
    const burst = document.getElementById("burst");

    let memoryBest = 0;
    const getBest = () => {
      try {
        return Number(localStorage.getItem("color-match-best") || memoryBest);
      } catch {
        return memoryBest;
      }
    };
    const setBest = (value) => {
      memoryBest = value;
      try {
        localStorage.setItem("color-match-best", String(value));
      } catch {}
    };
    const sample = (items) => items[Math.floor(Math.random() * items.length)];

    function initControls() {
      controls.innerHTML = "";
      COLORS.forEach((color) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `color-btn ${color.className}`;
        button.textContent = color.name;
        button.dataset.color = color.name;
        button.setAttribute("aria-label", color.name);
        button.addEventListener("click", () => choose(color, button));
        controls.appendChild(button);
      });
    }

    function setControlsEnabled(enabled) {
      [...controls.children].forEach((button) => {
        button.disabled = !enabled;
      });
    }

    function updateStats() {
      timeEl.textContent = String(state.timeLeft);
      scoreEl.textContent = String(state.score);
      bestEl.textContent = String(getBest());
      meter.style.transform = `scaleX(${Math.max(state.timeLeft, 0) / DURATION})`;
      body.classList.toggle("urgent", state.active && state.timeLeft <= 7);
    }

    function nextRound() {
      let label = sample(COLORS);
      let ink = sample(COLORS);

      while (label.name === state.lastWord && COLORS.length > 1) label = sample(COLORS);
      while (ink.name === state.lastColor && COLORS.length > 1) ink = sample(COLORS);

      state.answer = ink;
      state.lastWord = label.name;
      state.lastColor = ink.name;
      state.round += 1;

      roundLabel.textContent = `Round ${state.round}`;
      wordEl.textContent = label.name.toUpperCase();
      wordEl.style.color = ink.value;
      wordEl.classList.remove("swap");
      void wordEl.offsetWidth;
      wordEl.classList.add("swap");
    }

    function startGame() {
      clearInterval(state.timer);
      state.active = true;
      state.timeLeft = DURATION;
      state.score = 0;
      state.streak = 0;
      state.round = 0;
      state.lastWord = null;
      state.lastColor = null;
      feedback.textContent = "Go";
      feedback.className = "feedback correct";
      body.classList.add("playing");
      setControlsEnabled(true);
      updateStats();
      nextRound();

      state.timer = setInterval(() => {
        state.timeLeft -= 1;
        updateStats();
        if (state.timeLeft <= 0) endGame();
      }, 1000);
    }

    function endGame() {
      clearInterval(state.timer);
      state.active = false;
      body.classList.remove("playing", "urgent");
      setControlsEnabled(false);

      const best = getBest();
      const isRecord = state.score > best;
      if (isRecord) setBest(state.score);
      updateStats();

      roundLabel.textContent = "Finished";
      feedback.className = "feedback";
      feedback.textContent = isRecord ? "New best" : `Streak ended at ${state.streak}`;
      startTitle.textContent = `${state.score} Points`;
      startCopy.textContent = isRecord ? "New personal best. Run it back." : `Best score: ${getBest()}. Run it back.`;
      startBtn.textContent = "Play Again";
    }

    function choose(color, button) {
      if (!state.active) return;

      button.classList.add("pressed");
      setTimeout(() => button.classList.remove("pressed"), 130);

      if (color.name === state.answer.name) {
        const bonus = Math.min(3, Math.floor(state.streak / 4));
        state.streak += 1;
        state.score += 1 + bonus;
        feedback.textContent = bonus ? `+${1 + bonus} streak` : "Correct";
        feedback.className = "feedback correct";
        sparks(state.answer.value);
        nextRound();
      } else {
        state.streak = 0;
        state.score = Math.max(0, state.score - 1);
        feedback.textContent = `${state.answer.name} ink`;
        feedback.className = "feedback wrong";
        challenge.classList.remove("shake");
        void challenge.offsetWidth;
        challenge.classList.add("shake");
      }

      updateStats();
    }

    function sparks(color) {
      for (let index = 0; index < 14; index += 1) {
        const spark = document.createElement("span");
        spark.className = "spark";
        spark.style.setProperty("--spark-color", color);
        spark.style.setProperty("--angle", `${index * (360 / 14)}deg`);
        spark.style.setProperty("--distance", `${90 + Math.random() * 70}px`);
        burst.appendChild(spark);
        setTimeout(() => spark.remove(), 760);
      }
    }

    document.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !state.active) {
        startGame();
        return;
      }

      const keyMap = {
        "1": "Red",
        "2": "Blue",
        "3": "Green",
        "4": "Yellow",
        "5": "Orange",
        "6": "Purple"
      };
      const colorName = keyMap[event.key];
      if (!colorName || !state.active) return;

      const color = COLORS.find((item) => item.name === colorName);
      const button = [...controls.children].find((item) => item.dataset.color === colorName);
      choose(color, button);
    });

    startBtn.addEventListener("click", startGame);

    initControls();
    setControlsEnabled(false);
    wordEl.style.color = COLORS[2].value;
    bestEl.textContent = String(getBest());
    updateStats();
  </script>
</body>
</html>
