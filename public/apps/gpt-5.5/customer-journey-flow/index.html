<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Customer Journey Flow</title>
  <style>
    :root {
      --bg: #eef2f3;
      --surface: #fbfcfc;
      --surface-2: #f4f7f7;
      --ink: #172024;
      --muted: #647276;
      --line: #d8e0e1;
      --strong-line: #aab8bb;
      --accent: #0b7f87;
      --accent-2: #e1a12d;
      --danger: #bc3d35;
      --shadow: 0 20px 70px rgba(29, 43, 48, .14);
      --small-shadow: 0 8px 30px rgba(29, 43, 48, .1);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      background:
        radial-gradient(circle at 20% 0%, rgba(11, 127, 135, .11), transparent 32rem),
        linear-gradient(145deg, #f8faf9 0%, var(--bg) 52%, #e8eef0 100%);
      color: var(--ink);
      font-family: Avenir Next, Avenir, Segoe UI, sans-serif;
      overflow: hidden;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    button:focus-visible,
    input:focus-visible,
    textarea:focus-visible,
    [contenteditable="true"]:focus-visible {
      outline: 3px solid rgba(11, 127, 135, .26);
      outline-offset: 3px;
    }

    .app {
      display: grid;
      grid-template-rows: 72px minmax(0, 1fr);
      height: 100%;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding: 0 24px;
      border-bottom: 1px solid rgba(162, 177, 181, .55);
      background: rgba(251, 252, 252, .82);
      backdrop-filter: blur(18px);
      z-index: 10;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 13px;
      min-width: 280px;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 38px;
      height: 38px;
      color: white;
      background: linear-gradient(145deg, #0c6870, #0b8a90);
      border-radius: 8px;
      box-shadow: 0 8px 22px rgba(11, 127, 135, .27);
    }

    .brand h1 {
      margin: 0;
      font-family: Charter, Georgia, serif;
      font-size: 23px;
      line-height: 1;
      letter-spacing: 0;
    }

    .brand small {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      min-width: 0;
    }

    .tool-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 38px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: #253237;
      background: var(--surface);
      box-shadow: 0 1px 0 rgba(255, 255, 255, .9) inset;
      transition: transform .16s ease, border-color .16s ease, background .16s ease, box-shadow .16s ease;
      white-space: nowrap;
    }

    .tool-button.icon-only {
      width: 38px;
      padding: 0;
    }

    .tool-button.primary {
      color: white;
      border-color: #08656c;
      background: #0b7f87;
      box-shadow: 0 9px 22px rgba(11, 127, 135, .21);
    }

    .tool-button.danger {
      color: var(--danger);
    }

    .tool-button:hover {
      transform: translateY(-1px);
      border-color: var(--strong-line);
      box-shadow: var(--small-shadow);
    }

    .tool-button.primary:hover {
      background: #086f77;
    }

    .workspace {
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr) 310px;
      min-height: 0;
    }

    aside {
      min-height: 0;
      border-right: 1px solid rgba(162, 177, 181, .55);
      background: rgba(248, 250, 250, .72);
      backdrop-filter: blur(18px);
    }

    .sidebar,
    .inspector {
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .panel-head {
      padding: 20px 18px 13px;
      border-bottom: 1px solid rgba(216, 224, 225, .8);
    }

    .panel-head h2,
    .section-title {
      margin: 0;
      color: #253237;
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .11em;
    }

    .panel-head p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .journey-list {
      display: grid;
      gap: 8px;
      padding: 14px;
      overflow: auto;
    }

    .stage-chip {
      display: grid;
      grid-template-columns: 11px minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 11px 10px;
      text-align: left;
      color: var(--ink);
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      transition: background .16s ease, border-color .16s ease, transform .16s ease;
    }

    .stage-chip:hover,
    .stage-chip.active {
      background: var(--surface);
      border-color: var(--line);
      transform: translateX(2px);
    }

    .stage-dot {
      width: 11px;
      height: 11px;
      border-radius: 999px;
      background: var(--node-color);
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--node-color) 18%, transparent);
    }

    .stage-chip strong {
      display: block;
      overflow: hidden;
      font-size: 13px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .stage-chip span {
      color: var(--muted);
      font-size: 11px;
      font-weight: 750;
      text-transform: uppercase;
      letter-spacing: .07em;
    }

    .canvas-frame {
      position: relative;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
      background:
        linear-gradient(rgba(121, 141, 146, .12) 1px, transparent 1px),
        linear-gradient(90deg, rgba(121, 141, 146, .12) 1px, transparent 1px),
        var(--surface-2);
      background-size: 32px 32px;
    }

    .canvas-scroll {
      width: 100%;
      height: 100%;
      overflow: auto;
      cursor: default;
    }

    .board {
      position: relative;
      width: 1540px;
      height: 900px;
      min-width: 100%;
      min-height: 100%;
      transform-origin: 0 0;
    }

    .connection-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: visible;
      pointer-events: none;
    }

    .connection-path {
      fill: none;
      stroke: #8ea1a5;
      stroke-width: 2.3;
      stroke-linecap: round;
      pointer-events: stroke;
      cursor: pointer;
      transition: stroke .15s ease, stroke-width .15s ease, filter .15s ease;
    }

    .connection-path:hover,
    .connection-path.selected {
      stroke: var(--accent);
      stroke-width: 3.7;
      filter: drop-shadow(0 5px 8px rgba(11, 127, 135, .2));
    }

    .connection-hit {
      fill: none;
      stroke: transparent;
      stroke-width: 18;
      pointer-events: stroke;
      cursor: pointer;
    }

    .draft-path {
      fill: none;
      stroke: var(--accent-2);
      stroke-width: 3;
      stroke-linecap: round;
      stroke-dasharray: 8 8;
      pointer-events: none;
      animation: dash 1s linear infinite;
    }

    @keyframes dash {
      to { stroke-dashoffset: -32; }
    }

    .node {
      position: absolute;
      width: 238px;
      min-height: 146px;
      border: 1px solid rgba(157, 174, 178, .78);
      border-top: 4px solid var(--node-color);
      border-radius: 8px;
      background: rgba(255, 255, 255, .96);
      box-shadow: 0 12px 34px rgba(30, 45, 50, .12);
      transition: box-shadow .16s ease, border-color .16s ease, transform .16s ease;
      user-select: none;
      animation: nodeIn .32s ease both;
    }

    @keyframes nodeIn {
      from {
        opacity: 0;
        transform: translateY(8px) scale(.985);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .node.selected {
      border-color: color-mix(in srgb, var(--node-color) 68%, #7f9296);
      box-shadow: 0 18px 46px rgba(30, 45, 50, .18), 0 0 0 4px color-mix(in srgb, var(--node-color) 18%, transparent);
    }

    .node.dragging {
      z-index: 5;
      box-shadow: 0 26px 60px rgba(30, 45, 50, .25);
      cursor: grabbing;
    }

    .node-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 13px 14px 8px;
      cursor: grab;
    }

    .node-index {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      width: 27px;
      height: 27px;
      color: #fff;
      background: var(--node-color);
      border-radius: 7px;
      font-size: 12px;
      font-weight: 850;
    }

    .node-title {
      flex: 1;
      min-width: 0;
      margin: 0;
      color: #162227;
      font-family: Charter, Georgia, serif;
      font-size: 18px;
      font-weight: 700;
      line-height: 1.12;
      letter-spacing: 0;
      cursor: text;
    }

    .node-body {
      padding: 0 14px 13px;
    }

    .node-note {
      min-height: 46px;
      color: #4a5a5f;
      font-size: 13px;
      line-height: 1.36;
      cursor: text;
    }

    .node-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: 13px;
      padding-top: 10px;
      border-top: 1px solid #edf1f2;
      color: var(--muted);
      font-size: 11px;
      font-weight: 780;
      text-transform: uppercase;
      letter-spacing: .07em;
    }

    .port {
      position: absolute;
      top: 58px;
      display: grid;
      place-items: center;
      width: 22px;
      height: 22px;
      border: 2px solid #fff;
      border-radius: 999px;
      background: var(--node-color);
      box-shadow: 0 4px 12px rgba(30, 45, 50, .22);
      cursor: crosshair;
      transition: transform .14s ease, box-shadow .14s ease;
    }

    .port::after {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: #fff;
      opacity: .88;
    }

    .port:hover,
    .port.hot {
      transform: scale(1.22);
      box-shadow: 0 0 0 7px color-mix(in srgb, var(--node-color) 18%, transparent), 0 6px 16px rgba(30, 45, 50, .22);
    }

    .port.in {
      left: -11px;
    }

    .port.out {
      right: -11px;
    }

    .mini-status {
      position: absolute;
      left: 22px;
      bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border: 1px solid rgba(181, 194, 197, .8);
      border-radius: 8px;
      color: #526468;
      background: rgba(255, 255, 255, .78);
      backdrop-filter: blur(14px);
      box-shadow: var(--small-shadow);
      font-size: 12px;
      font-weight: 750;
      pointer-events: none;
    }

    .pulse {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 0 5px rgba(11, 127, 135, .12);
    }

    .inspector {
      border-left: 1px solid rgba(162, 177, 181, .55);
      background: rgba(248, 250, 250, .78);
      backdrop-filter: blur(18px);
    }

    .inspector aside {
      border: 0;
    }

    .inspector-body {
      display: grid;
      align-content: start;
      gap: 18px;
      padding: 18px;
      overflow: auto;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    .field label {
      color: #39484d;
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .09em;
    }

    .field input,
    .field textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      background: var(--surface);
      box-shadow: 0 1px 0 rgba(255, 255, 255, .9) inset;
    }

    .field input {
      height: 40px;
      padding: 0 11px;
    }

    .field textarea {
      min-height: 96px;
      padding: 10px 11px;
      resize: vertical;
    }

    .swatches {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }

    .swatch {
      height: 34px;
      border: 2px solid transparent;
      border-radius: 8px;
      background: var(--swatch);
      box-shadow: 0 1px 0 rgba(255, 255, 255, .8) inset;
    }

    .swatch.active {
      border-color: #172024;
      box-shadow: 0 0 0 3px rgba(23, 32, 36, .11);
    }

    .split-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .connection-card {
      display: grid;
      gap: 8px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: 0 10px 24px rgba(30, 45, 50, .08);
    }

    .connection-card strong {
      font-size: 14px;
    }

    .connection-card span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.38;
    }

    .empty-state {
      padding: 16px;
      border: 1px dashed #bdc9cc;
      border-radius: 8px;
      color: var(--muted);
      background: rgba(255, 255, 255, .48);
      font-size: 13px;
      line-height: 1.45;
    }

    svg .arrow-marker {
      fill: #8ea1a5;
    }

    svg .arrow-marker.selected {
      fill: var(--accent);
    }

    .mobile-panel-toggle {
      display: none;
    }

    @media (max-width: 1080px) {
      .workspace {
        grid-template-columns: 220px minmax(0, 1fr);
      }

      .inspector {
        position: absolute;
        top: 72px;
        right: 0;
        bottom: 0;
        width: min(330px, 88vw);
        transform: translateX(calc(100% - 44px));
        transition: transform .2s ease;
        z-index: 9;
      }

      .inspector.open {
        transform: translateX(0);
      }

      .mobile-panel-toggle {
        position: absolute;
        top: 14px;
        left: -44px;
        display: grid;
        place-items: center;
        width: 44px;
        height: 44px;
        border: 1px solid rgba(162, 177, 181, .65);
        border-right: 0;
        border-radius: 8px 0 0 8px;
        color: var(--accent);
        background: rgba(251, 252, 252, .93);
      }
    }

    @media (max-width: 760px) {
      body {
        overflow: auto;
      }

      .app {
        min-height: 100%;
        height: auto;
        grid-template-rows: auto minmax(620px, 1fr);
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
        padding: 16px;
      }

      .brand {
        min-width: 0;
      }

      .toolbar {
        width: 100%;
        overflow-x: auto;
        justify-content: flex-start;
        padding-bottom: 2px;
      }

      .workspace {
        grid-template-columns: 1fr;
      }

      .sidebar {
        display: none;
      }

      .inspector {
        top: 116px;
      }

      .board {
        width: 1120px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand" aria-label="Customer Journey Flow">
        <div class="brand-mark" aria-hidden="true">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M4 7h5m0 0 2 2m-2-2 2-2M4 17h5m0 0 2 2m-2-2 2-2M14 7h6M14 17h6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div>
          <h1>Customer Journey Flow</h1>
          <small id="flow-count">6 stages, 6 links</small>
        </div>
      </div>
      <nav class="toolbar" aria-label="Journey actions">
        <button class="tool-button primary" id="add-stage" type="button" title="Add stage">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.3" stroke-linecap="round"/></svg>
          <span>Add stage</span>
        </button>
        <button class="tool-button" id="auto-layout" type="button" title="Auto arrange">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M4 6h5v5H4zM15 4h5v5h-5zM14 15h6v5h-6zM5 16h5M10 8h5M10 18h4" stroke="currentColor" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/></svg>
          <span>Auto arrange</span>
        </button>
        <button class="tool-button" id="save-flow" type="button" title="Save locally">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 4h12l2 2v14H5zM8 4v6h8V4M8 20v-6h8v6" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
          <span>Save</span>
        </button>
        <button class="tool-button icon-only" id="reset-flow" type="button" title="Reset">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 8a8 8 0 1 1 .5 8M5 8V3M5 8h5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </nav>
    </header>

    <main class="workspace">
      <aside class="sidebar" aria-label="Stages">
        <div class="panel-head">
          <h2>Stages</h2>
          <p>Awareness through purchase, with retention paths ready to adjust.</p>
        </div>
        <div class="journey-list" id="journey-list"></div>
      </aside>

      <section class="canvas-frame" aria-label="Journey canvas">
        <div class="canvas-scroll" id="canvas-scroll">
          <div class="board" id="board">
            <svg class="connection-layer" id="connection-layer" viewBox="0 0 1540 900" preserveAspectRatio="none" aria-hidden="true">
              <defs id="marker-defs">
                <marker id="arrow" viewBox="0 0 10 10" refX="8.7" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                  <path d="M 0 0 L 10 5 L 0 10 z" fill="#8ea1a5"></path>
                </marker>
                <marker id="arrow-selected" viewBox="0 0 10 10" refX="8.7" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                  <path d="M 0 0 L 10 5 L 0 10 z" fill="#0b7f87"></path>
                </marker>
              </defs>
              <g id="connections"></g>
              <path class="draft-path" id="draft-path" d="" hidden></path>
            </svg>
            <div id="nodes"></div>
          </div>
        </div>
        <div class="mini-status" id="mini-status"><span class="pulse"></span><span>Saved locally</span></div>
      </section>

      <section class="inspector open" id="inspector" aria-label="Inspector">
        <button class="mobile-panel-toggle" id="inspector-toggle" type="button" title="Inspector">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div class="panel-head">
          <h2 id="inspector-title">Inspector</h2>
          <p id="inspector-kicker">Select a stage or connection.</p>
        </div>
        <div class="inspector-body" id="inspector-body"></div>
      </section>
    </main>
  </div>

  <script>
    (function () {
      "use strict";

      const palette = ["#0b7f87", "#b65f22", "#4767a8", "#7f5b39", "#7d3f73", "#3d7a4f", "#9b7423", "#4f6973"];
      const defaults = {
        nodes: [
          { id: "n1", title: "Awareness", note: "First brand touch through search, referral, events, or social proof.", x: 78, y: 130, color: palette[0] },
          { id: "n2", title: "Interest", note: "The customer compares the promise with their immediate problem.", x: 368, y: 84, color: palette[1] },
          { id: "n3", title: "Consideration", note: "Pricing, fit, credibility, integrations, and internal timing become visible.", x: 658, y: 142, color: palette[2] },
          { id: "n4", title: "Decision", note: "A final evaluation narrows risks, stakeholders, and purchase terms.", x: 948, y: 92, color: palette[3] },
          { id: "n5", title: "Purchase", note: "Checkout, procurement, or sales handoff converts intent into revenue.", x: 1238, y: 150, color: palette[5] },
          { id: "n6", title: "Onboarding", note: "Setup, first value, support quality, and activation shape retention.", x: 950, y: 370, color: palette[4] }
        ],
        connections: [
          { id: "c1", from: "n1", to: "n2", label: "qualified visit" },
          { id: "c2", from: "n2", to: "n3", label: "product fit" },
          { id: "c3", from: "n3", to: "n4", label: "stakeholder approval" },
          { id: "c4", from: "n4", to: "n5", label: "purchase intent" },
          { id: "c5", from: "n5", to: "n6", label: "activation" },
          { id: "c6", from: "n6", to: "n3", label: "expansion signal" }
        ]
      };

      const storageKey = "customer-journey-flow-v1";
      const nodeSize = { width: 238, height: 146 };
      const els = {
        board: document.getElementById("board"),
        canvasScroll: document.getElementById("canvas-scroll"),
        nodes: document.getElementById("nodes"),
        connections: document.getElementById("connections"),
        draft: document.getElementById("draft-path"),
        list: document.getElementById("journey-list"),
        count: document.getElementById("flow-count"),
        inspector: document.getElementById("inspector"),
        inspectorTitle: document.getElementById("inspector-title"),
        inspectorKicker: document.getElementById("inspector-kicker"),
        inspectorBody: document.getElementById("inspector-body"),
        status: document.getElementById("mini-status")
      };

      let state = loadState();
      let selected = { type: "node", id: state.nodes[0]?.id || null };
      let draggingNode = null;
      let drawingConnection = null;
      let draftPoint = null;
      let saveTimer = null;

      function cloneDefaults() {
        return JSON.parse(JSON.stringify(defaults));
      }

      function loadState() {
        try {
          const saved = localStorage.getItem(storageKey);
          if (!saved) return cloneDefaults();
          const parsed = JSON.parse(saved);
          if (!Array.isArray(parsed.nodes) || !Array.isArray(parsed.connections)) return cloneDefaults();
          return parsed;
        } catch (error) {
          return cloneDefaults();
        }
      }

      function persist(message) {
        clearTimeout(saveTimer);
        saveTimer = setTimeout(() => {
          localStorage.setItem(storageKey, JSON.stringify(state));
          setStatus(message || "Saved locally");
        }, 140);
      }

      function setStatus(message) {
        els.status.querySelector("span:last-child").textContent = message;
      }

      function nodeById(id) {
        return state.nodes.find(node => node.id === id);
      }

      function connectionById(id) {
        return state.connections.find(connection => connection.id === id);
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function boardPoint(event) {
        const rect = els.board.getBoundingClientRect();
        return {
          x: event.clientX - rect.left,
          y: event.clientY - rect.top
        };
      }

      function anchorFor(node, side) {
        return {
          x: node.x + (side === "out" ? nodeSize.width : 0),
          y: node.y + 62
        };
      }

      function curvePath(fromNode, toNode) {
        const start = anchorFor(fromNode, "out");
        const end = anchorFor(toNode, "in");
        const gap = Math.max(90, Math.abs(end.x - start.x) * .42);
        const c1 = { x: start.x + gap, y: start.y };
        const c2 = { x: end.x - gap, y: end.y };
        return `M ${start.x} ${start.y} C ${c1.x} ${c1.y}, ${c2.x} ${c2.y}, ${end.x} ${end.y}`;
      }

      function draftCurve(fromNode, point) {
        const start = anchorFor(fromNode, "out");
        const gap = Math.max(90, Math.abs(point.x - start.x) * .42);
        return `M ${start.x} ${start.y} C ${start.x + gap} ${start.y}, ${point.x - gap} ${point.y}, ${point.x} ${point.y}`;
      }

      function render() {
        renderConnections();
        renderNodes();
        renderList();
        renderInspector();
        els.count.textContent = `${state.nodes.length} stage${state.nodes.length === 1 ? "" : "s"}, ${state.connections.length} link${state.connections.length === 1 ? "" : "s"}`;
      }

      function renderNodes() {
        els.nodes.innerHTML = state.nodes.map((node, index) => `
          <article class="node ${selected.type === "node" && selected.id === node.id ? "selected" : ""}" data-id="${node.id}" style="--node-color:${node.color}; left:${node.x}px; top:${node.y}px;">
            <button class="port in" data-port="in" title="Connection target" aria-label="Connection target"></button>
            <button class="port out" data-port="out" title="Connection source" aria-label="Connection source"></button>
            <div class="node-head">
              <span class="node-index">${String(index + 1).padStart(2, "0")}</span>
              <h3 class="node-title" contenteditable="true" spellcheck="false" data-field="title">${escapeHtml(node.title)}</h3>
            </div>
            <div class="node-body">
              <div class="node-note" contenteditable="true" spellcheck="true" data-field="note">${escapeHtml(node.note)}</div>
              <div class="node-meta">
                <span>${incomingCount(node.id)} in</span>
                <span>${outgoingCount(node.id)} out</span>
              </div>
            </div>
          </article>
        `).join("");
      }

      function renderConnections() {
        els.connections.innerHTML = "";
        for (const connection of state.connections) {
          const from = nodeById(connection.from);
          const to = nodeById(connection.to);
          if (!from || !to) continue;
          const selectedClass = selected.type === "connection" && selected.id === connection.id ? "selected" : "";
          const path = curvePath(from, to);
          const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
          const visible = document.createElementNS("http://www.w3.org/2000/svg", "path");
          const hit = document.createElementNS("http://www.w3.org/2000/svg", "path");
          visible.setAttribute("d", path);
          visible.setAttribute("class", `connection-path ${selectedClass}`);
          visible.setAttribute("marker-end", selectedClass ? "url(#arrow-selected)" : "url(#arrow)");
          hit.setAttribute("d", path);
          hit.setAttribute("class", "connection-hit");
          hit.dataset.id = connection.id;
          g.appendChild(visible);
          g.appendChild(hit);
          els.connections.appendChild(g);
        }
      }

      function renderList() {
        els.list.innerHTML = state.nodes.map((node, index) => `
          <button class="stage-chip ${selected.type === "node" && selected.id === node.id ? "active" : ""}" type="button" data-id="${node.id}" style="--node-color:${node.color}">
            <span class="stage-dot" aria-hidden="true"></span>
            <strong>${escapeHtml(node.title || "Untitled stage")}</strong>
            <span>${String(index + 1).padStart(2, "0")}</span>
          </button>
        `).join("");
      }

      function renderInspector() {
        if (selected.type === "node") {
          const node = nodeById(selected.id);
          if (!node) return renderEmptyInspector();
          els.inspectorTitle.textContent = "Stage";
          els.inspectorKicker.textContent = `${incomingCount(node.id)} inbound, ${outgoingCount(node.id)} outbound`;
          els.inspectorBody.innerHTML = `
            <div class="field">
              <label for="stage-title">Name</label>
              <input id="stage-title" data-edit="title" value="${escapeHtml(node.title)}">
            </div>
            <div class="field">
              <label for="stage-note">Customer step</label>
              <textarea id="stage-note" data-edit="note">${escapeHtml(node.note)}</textarea>
            </div>
            <div class="field">
              <label>Color</label>
              <div class="swatches">
                ${palette.map(color => `<button class="swatch ${color === node.color ? "active" : ""}" type="button" data-color="${color}" style="--swatch:${color}" title="${color}"></button>`).join("")}
              </div>
            </div>
            <div class="split-actions">
              <button class="tool-button" type="button" id="duplicate-node">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M8 8h11v11H8zM5 16V5h11" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
                Duplicate
              </button>
              <button class="tool-button danger" type="button" id="delete-node">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 7h14M10 11v6M14 11v6M9 7l1-3h4l1 3M7 7l1 13h8l1-13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Delete
              </button>
            </div>
          `;
          return;
        }

        if (selected.type === "connection") {
          const connection = connectionById(selected.id);
          if (!connection) return renderEmptyInspector();
          const from = nodeById(connection.from);
          const to = nodeById(connection.to);
          els.inspectorTitle.textContent = "Connection";
          els.inspectorKicker.textContent = `${from?.title || "Source"} to ${to?.title || "Target"}`;
          els.inspectorBody.innerHTML = `
            <div class="connection-card">
              <strong>${escapeHtml(from?.title || "Source")} -> ${escapeHtml(to?.title || "Target")}</strong>
              <span>${escapeHtml(connection.label || "Unlabeled path")}</span>
            </div>
            <div class="field">
              <label for="connection-label">Label</label>
              <input id="connection-label" data-connection-edit="label" value="${escapeHtml(connection.label || "")}">
            </div>
            <button class="tool-button danger" type="button" id="delete-connection">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 7h14M10 11v6M14 11v6M9 7l1-3h4l1 3M7 7l1 13h8l1-13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
              Delete connection
            </button>
          `;
          return;
        }

        renderEmptyInspector();
      }

      function renderEmptyInspector() {
        els.inspectorTitle.textContent = "Inspector";
        els.inspectorKicker.textContent = "No selection";
        els.inspectorBody.innerHTML = `<div class="empty-state">Select an item on the journey map.</div>`;
      }

      function incomingCount(id) {
        return state.connections.filter(connection => connection.to === id).length;
      }

      function outgoingCount(id) {
        return state.connections.filter(connection => connection.from === id).length;
      }

      function select(type, id) {
        selected = { type, id };
        render();
      }

      function updateNode(id, patch) {
        const node = nodeById(id);
        if (!node) return;
        Object.assign(node, patch);
        persist("Saved locally");
      }

      function makeId(prefix) {
        return `${prefix}${Math.random().toString(36).slice(2, 9)}`;
      }

      function addNode(base) {
        const last = state.nodes[state.nodes.length - 1];
        const node = {
          id: makeId("n"),
          title: base?.title || "New stage",
          note: base?.note || "Map the customer action, question, or barrier at this point.",
          x: Math.min((last?.x || 80) + 90, 1240),
          y: Math.min((last?.y || 120) + 120, 680),
          color: base?.color || palette[state.nodes.length % palette.length]
        };
        state.nodes.push(node);
        selected = { type: "node", id: node.id };
        render();
        persist("Stage added");
        requestAnimationFrame(() => scrollNodeIntoView(node.id));
      }

      function deleteNode(id) {
        state.nodes = state.nodes.filter(node => node.id !== id);
        state.connections = state.connections.filter(connection => connection.from !== id && connection.to !== id);
        selected = state.nodes[0] ? { type: "node", id: state.nodes[0].id } : { type: null, id: null };
        render();
        persist("Stage deleted");
      }

      function deleteConnection(id) {
        state.connections = state.connections.filter(connection => connection.id !== id);
        selected = state.nodes[0] ? { type: "node", id: state.nodes[0].id } : { type: null, id: null };
        render();
        persist("Connection deleted");
      }

      function connect(fromId, toId) {
        if (!fromId || !toId || fromId === toId) return;
        const exists = state.connections.some(connection => connection.from === fromId && connection.to === toId);
        if (exists) return setStatus("Connection already exists");
        const from = nodeById(fromId);
        const to = nodeById(toId);
        state.connections.push({
          id: makeId("c"),
          from: fromId,
          to: toId,
          label: `${from?.title || "Source"} to ${to?.title || "Target"}`
        });
        selected = { type: "connection", id: state.connections[state.connections.length - 1].id };
        render();
        persist("Connection added");
      }

      function autoLayout() {
        const columns = Math.min(5, Math.max(1, state.nodes.length));
        state.nodes.forEach((node, index) => {
          const col = index % columns;
          const row = Math.floor(index / columns);
          node.x = 76 + col * 290;
          node.y = 108 + row * 245 + (col % 2 ? 38 : 0);
        });
        render();
        persist("Layout arranged");
      }

      function scrollNodeIntoView(id) {
        const element = els.nodes.querySelector(`[data-id="${id}"]`);
        element?.scrollIntoView({ block: "center", inline: "center", behavior: "smooth" });
      }

      function startNodeDrag(event, nodeEl, node) {
        if (event.button !== 0) return;
        draggingNode = {
          id: node.id,
          pointerId: event.pointerId,
          offsetX: event.clientX - nodeEl.getBoundingClientRect().left,
          offsetY: event.clientY - nodeEl.getBoundingClientRect().top
        };
        nodeEl.classList.add("dragging");
        nodeEl.setPointerCapture(event.pointerId);
        selected = { type: "node", id: node.id };
        renderList();
        renderConnections();
        renderInspector();
      }

      function moveNode(event) {
        if (!draggingNode) return;
        const node = nodeById(draggingNode.id);
        if (!node) return;
        const point = boardPoint(event);
        node.x = Math.max(28, Math.min(els.board.offsetWidth - nodeSize.width - 28, point.x - draggingNode.offsetX));
        node.y = Math.max(28, Math.min(els.board.offsetHeight - nodeSize.height - 28, point.y - draggingNode.offsetY));
        const nodeEl = els.nodes.querySelector(`[data-id="${node.id}"]`);
        if (nodeEl) {
          nodeEl.style.left = `${node.x}px`;
          nodeEl.style.top = `${node.y}px`;
        }
        renderConnections();
      }

      function endNodeDrag(event) {
        if (!draggingNode) return;
        const nodeEl = els.nodes.querySelector(`[data-id="${draggingNode.id}"]`);
        nodeEl?.classList.remove("dragging");
        if (nodeEl?.hasPointerCapture(event.pointerId)) nodeEl.releasePointerCapture(event.pointerId);
        draggingNode = null;
        persist("Layout saved");
      }

      function startConnection(event, nodeId) {
        event.preventDefault();
        event.stopPropagation();
        drawingConnection = { from: nodeId, pointerId: event.pointerId };
        draftPoint = boardPoint(event);
        event.currentTarget.setPointerCapture(event.pointerId);
        updateDraft();
      }

      function updateDraft() {
        if (!drawingConnection || !draftPoint) {
          els.draft.hidden = true;
          return;
        }
        const from = nodeById(drawingConnection.from);
        if (!from) return;
        els.draft.hidden = false;
        els.draft.setAttribute("d", draftCurve(from, draftPoint));
      }

      function endConnection(event) {
        if (!drawingConnection) return;
        const target = document.elementFromPoint(event.clientX, event.clientY);
        const port = target?.closest?.(".port.in");
        const targetNode = port?.closest?.(".node")?.dataset.id;
        if (targetNode) connect(drawingConnection.from, targetNode);
        drawingConnection = null;
        draftPoint = null;
        els.draft.hidden = true;
        document.querySelectorAll(".port.hot").forEach(portEl => portEl.classList.remove("hot"));
      }

      function bindEvents() {
        document.getElementById("add-stage").addEventListener("click", () => addNode());
        document.getElementById("auto-layout").addEventListener("click", autoLayout);
        document.getElementById("save-flow").addEventListener("click", () => {
          localStorage.setItem(storageKey, JSON.stringify(state));
          setStatus("Saved locally");
        });
        document.getElementById("reset-flow").addEventListener("click", () => {
          state = cloneDefaults();
          selected = { type: "node", id: state.nodes[0].id };
          render();
          persist("Flow reset");
        });
        document.getElementById("inspector-toggle").addEventListener("click", () => {
          els.inspector.classList.toggle("open");
        });

        els.list.addEventListener("click", event => {
          const chip = event.target.closest(".stage-chip");
          if (!chip) return;
          select("node", chip.dataset.id);
          scrollNodeIntoView(chip.dataset.id);
        });

        els.nodes.addEventListener("pointerdown", event => {
          const nodeEl = event.target.closest(".node");
          if (!nodeEl) return;
          const node = nodeById(nodeEl.dataset.id);
          if (!node) return;
          const port = event.target.closest(".port");
          if (port?.dataset.port === "out") return startConnection(event, node.id);
          if (port?.dataset.port === "in") {
            event.stopPropagation();
            return select("node", node.id);
          }
          if (event.target.closest("[contenteditable='true']")) {
            selected = { type: "node", id: node.id };
            renderList();
            renderConnections();
            renderInspector();
            return;
          }
          startNodeDrag(event, nodeEl, node);
        });

        els.nodes.addEventListener("input", event => {
          const editable = event.target.closest("[contenteditable='true']");
          if (!editable) return;
          const nodeEl = editable.closest(".node");
          const node = nodeById(nodeEl.dataset.id);
          if (!node) return;
          node[editable.dataset.field] = editable.innerText.trim() || (editable.dataset.field === "title" ? "Untitled stage" : "");
          persist("Stage edited");
          renderList();
          renderInspector();
        });

        els.board.addEventListener("pointermove", event => {
          if (draggingNode) moveNode(event);
          if (drawingConnection) {
            draftPoint = boardPoint(event);
            updateDraft();
            document.querySelectorAll(".port.hot").forEach(portEl => portEl.classList.remove("hot"));
            const target = document.elementFromPoint(event.clientX, event.clientY);
            target?.closest?.(".port.in")?.classList.add("hot");
          }
        });

        window.addEventListener("pointerup", event => {
          if (draggingNode) endNodeDrag(event);
          if (drawingConnection) endConnection(event);
        });

        els.connections.addEventListener("click", event => {
          const hit = event.target.closest(".connection-hit");
          if (!hit) return;
          select("connection", hit.dataset.id);
        });

        els.inspectorBody.addEventListener("input", event => {
          if (selected.type === "node" && event.target.matches("[data-edit]")) {
            updateNode(selected.id, { [event.target.dataset.edit]: event.target.value });
            renderNodes();
            renderList();
            return;
          }
          if (selected.type === "connection" && event.target.matches("[data-connection-edit]")) {
            const connection = connectionById(selected.id);
            if (!connection) return;
            connection[event.target.dataset.connectionEdit] = event.target.value;
            persist("Connection edited");
          }
        });

        els.inspectorBody.addEventListener("click", event => {
          const swatch = event.target.closest(".swatch");
          if (swatch && selected.type === "node") {
            updateNode(selected.id, { color: swatch.dataset.color });
            render();
            return;
          }
          if (event.target.closest("#duplicate-node") && selected.type === "node") {
            const node = nodeById(selected.id);
            if (node) addNode({ title: `${node.title} copy`, note: node.note, color: node.color });
            return;
          }
          if (event.target.closest("#delete-node") && selected.type === "node") {
            deleteNode(selected.id);
            return;
          }
          if (event.target.closest("#delete-connection") && selected.type === "connection") {
            deleteConnection(selected.id);
          }
        });

        window.addEventListener("keydown", event => {
          const editing = document.activeElement?.matches("input, textarea, [contenteditable='true']");
          if (editing) return;
          if (event.key === "Delete" || event.key === "Backspace") {
            if (selected.type === "node") deleteNode(selected.id);
            if (selected.type === "connection") deleteConnection(selected.id);
          }
        });

        els.canvasScroll.addEventListener("click", event => {
          if (event.target === els.canvasScroll || event.target === els.board) {
            selected = { type: null, id: null };
            render();
          }
        });
      }

      bindEvents();
      render();
      requestAnimationFrame(() => {
        els.canvasScroll.scrollTo({ left: 30, top: 20 });
      });
    })();
  </script>
</body>
</html>
