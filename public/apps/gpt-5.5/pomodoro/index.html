<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pomodoro</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f2e8;
      --bg-2: #fffaf0;
      --ink: #17201c;
      --muted: #68736d;
      --line: rgba(23, 32, 28, 0.13);
      --panel: rgba(255, 250, 240, 0.78);
      --panel-strong: #fffdf7;
      --focus: #ef4f35;
      --short: #0f9f8f;
      --long: #4567d9;
      --gold: #f3b71c;
      --ok: #168653;
      --shadow: 0 22px 70px rgba(57, 43, 24, 0.16);
      --radius: 8px;
      --font-display: ui-serif, Georgia, Cambria, "Times New Roman", serif;
      --font-body: "Avenir Next", Avenir, "Segoe UI", Helvetica, Arial, sans-serif;
      --font-mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    }

    [data-theme="dark"] {
      color-scheme: dark;
      --bg: #111612;
      --bg-2: #1a211b;
      --ink: #f6f0df;
      --muted: #aab6ad;
      --line: rgba(246, 240, 223, 0.14);
      --panel: rgba(26, 33, 27, 0.79);
      --panel-strong: #20281f;
      --focus: #ff6a45;
      --short: #27d2ba;
      --long: #85a0ff;
      --gold: #ffd05a;
      --ok: #55d68e;
      --shadow: 0 28px 80px rgba(0, 0, 0, 0.33);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      background:
        radial-gradient(circle at 8% 12%, color-mix(in srgb, var(--gold), transparent 78%), transparent 29rem),
        radial-gradient(circle at 90% 8%, color-mix(in srgb, var(--short), transparent 80%), transparent 26rem),
        linear-gradient(135deg, var(--bg), var(--bg-2));
      color: var(--ink);
      font-family: var(--font-body);
      letter-spacing: 0;
      overflow-x: hidden;
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    button:focus-visible,
    input:focus-visible {
      outline: 3px solid color-mix(in srgb, var(--gold), white 10%);
      outline-offset: 3px;
    }

    .app {
      width: min(1180px, calc(100vw - 28px));
      margin: 0 auto;
      padding: 22px 0 28px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 54px;
      margin-bottom: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .mark {
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-strong);
      box-shadow: 0 12px 28px rgba(239, 79, 53, 0.16);
      color: var(--focus);
    }

    .mark svg {
      width: 25px;
      height: 25px;
    }

    h1 {
      margin: 0;
      font-family: var(--font-display);
      font-size: clamp(2rem, 6vw, 3.9rem);
      line-height: 0.9;
      letter-spacing: 0;
    }

    .today {
      margin-top: 5px;
      color: var(--muted);
      font-size: 0.88rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .icon-btn,
    .small-btn,
    .primary-btn,
    .mode-btn,
    .chip-btn {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: var(--ink);
      background: var(--panel-strong);
      transition: transform 160ms ease, background 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
    }

    .icon-btn:hover,
    .small-btn:hover,
    .primary-btn:hover,
    .mode-btn:hover,
    .chip-btn:hover {
      transform: translateY(-1px);
      border-color: color-mix(in srgb, currentColor, var(--line) 72%);
    }

    .icon-btn {
      display: inline-grid;
      place-items: center;
      width: 42px;
      height: 42px;
      padding: 0;
    }

    .icon-btn svg,
    .small-btn svg,
    .primary-btn svg {
      width: 18px;
      height: 18px;
      pointer-events: none;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1.42fr) minmax(320px, 0.78fr);
      gap: 18px;
      align-items: stretch;
    }

    .timer-board,
    .side-panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .timer-board {
      position: relative;
      min-height: 680px;
      padding: clamp(18px, 4vw, 34px);
      overflow: hidden;
    }

    .timer-board::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, color-mix(in srgb, var(--line), transparent 20%) 1px, transparent 1px),
        linear-gradient(0deg, color-mix(in srgb, var(--line), transparent 30%) 1px, transparent 1px);
      background-size: 54px 54px;
      mask-image: radial-gradient(circle at 50% 36%, black, transparent 72%);
      opacity: 0.35;
    }

    .timer-top,
    .timer-core,
    .controls,
    .quick-row,
    .stats-strip {
      position: relative;
      z-index: 1;
    }

    .timer-top {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
    }

    .status-kicker {
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .mode-title {
      margin: 6px 0 0;
      max-width: 620px;
      font-family: var(--font-display);
      font-size: clamp(2.1rem, 6.3vw, 5.2rem);
      line-height: 0.92;
      letter-spacing: 0;
    }

    .energy {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 148px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-strong);
      color: var(--muted);
      font-weight: 760;
      white-space: nowrap;
    }

    .energy-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--mode-color);
      box-shadow: 0 0 0 7px color-mix(in srgb, var(--mode-color), transparent 83%);
      animation: breathe 1700ms ease-in-out infinite;
    }

    @keyframes breathe {
      50% { transform: scale(0.72); }
    }

    .timer-core {
      display: grid;
      place-items: center;
      min-height: 405px;
      margin: 18px 0 8px;
    }

    .dial {
      position: relative;
      width: min(460px, 80vw);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border-radius: 50%;
      isolation: isolate;
    }

    .dial::before {
      content: "";
      position: absolute;
      inset: 9.5%;
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 42%, var(--panel-strong), color-mix(in srgb, var(--panel-strong), transparent 14%) 62%, transparent 63%),
        conic-gradient(from -40deg, color-mix(in srgb, var(--mode-color), transparent 72%), transparent, color-mix(in srgb, var(--gold), transparent 80%));
      box-shadow:
        inset 0 0 0 1px var(--line),
        0 30px 85px color-mix(in srgb, var(--mode-color), transparent 78%);
      z-index: -1;
    }

    .dial.running::after {
      content: "";
      position: absolute;
      inset: 2%;
      border-radius: 50%;
      border: 1px solid color-mix(in srgb, var(--mode-color), transparent 45%);
      animation: ripple 2300ms ease-in-out infinite;
      z-index: -2;
    }

    @keyframes ripple {
      0%, 100% { transform: scale(0.96); opacity: 0.2; }
      50% { transform: scale(1.035); opacity: 0.72; }
    }

    .progress-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .progress-track {
      fill: none;
      stroke: color-mix(in srgb, var(--ink), transparent 88%);
      stroke-width: 8;
    }

    .progress-ring {
      fill: none;
      stroke: var(--mode-color);
      stroke-width: 8;
      stroke-linecap: round;
      transition: stroke-dashoffset 320ms linear, stroke 180ms ease;
      filter: drop-shadow(0 0 7px color-mix(in srgb, var(--mode-color), transparent 52%));
    }

    .time {
      margin-top: 18px;
      font-family: var(--font-mono);
      font-size: clamp(4rem, 14vw, 8.5rem);
      font-weight: 850;
      line-height: 0.86;
      letter-spacing: 0;
      font-variant-numeric: tabular-nums;
    }

    .timer-label {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      margin-top: 18px;
      color: var(--muted);
      font-size: clamp(0.93rem, 2.5vw, 1.05rem);
      font-weight: 750;
    }

    .timer-label svg {
      width: 18px;
      height: 18px;
      color: var(--mode-color);
    }

    .controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .primary-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-width: 166px;
      height: 54px;
      padding: 0 22px;
      background: var(--mode-color);
      border-color: transparent;
      color: #fffdf7;
      font-weight: 860;
      box-shadow: 0 18px 35px color-mix(in srgb, var(--mode-color), transparent 72%);
    }

    .small-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 45px;
      padding: 0 14px;
      font-weight: 780;
    }

    .quick-row {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      margin: 22px auto 0;
    }

    .mode-btn {
      min-width: 105px;
      min-height: 42px;
      padding: 0 13px;
      color: var(--muted);
      font-weight: 820;
    }

    .mode-btn.active {
      background: color-mix(in srgb, var(--mode-color), transparent 84%);
      border-color: color-mix(in srgb, var(--mode-color), transparent 44%);
      color: var(--ink);
      box-shadow: inset 0 -3px 0 var(--mode-color);
    }

    .stats-strip {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 22px;
    }

    .stat {
      min-width: 0;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: color-mix(in srgb, var(--panel-strong), transparent 15%);
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 0.74rem;
      font-weight: 850;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .stat strong {
      display: block;
      margin-top: 7px;
      overflow-wrap: anywhere;
      font-family: var(--font-mono);
      font-size: clamp(1.2rem, 3vw, 1.7rem);
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .side-panel {
      display: flex;
      flex-direction: column;
      min-height: 680px;
      padding: 18px;
      gap: 16px;
    }

    .panel-section {
      border-top: 1px solid var(--line);
      padding-top: 16px;
    }

    .panel-section:first-child {
      border-top: 0;
      padding-top: 0;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    h2 {
      margin: 0;
      font-size: 0.95rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .hint {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 680;
    }

    .settings-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 9px;
    }

    .duration-control {
      min-width: 0;
    }

    .duration-control label,
    .long-row label {
      display: block;
      margin-bottom: 7px;
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 850;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .duration-control input,
    .long-row input {
      width: 100%;
      height: 44px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-strong);
      color: var(--ink);
      font-family: var(--font-mono);
      font-size: 1rem;
      font-weight: 820;
      font-variant-numeric: tabular-nums;
    }

    .long-row {
      margin-top: 10px;
    }

    .toggles {
      display: grid;
      grid-template-columns: 1fr;
      gap: 9px;
    }

    .toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 48px;
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: color-mix(in srgb, var(--panel-strong), transparent 12%);
      color: var(--ink);
      font-weight: 810;
      cursor: pointer;
      user-select: none;
    }

    .toggle small {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-weight: 650;
    }

    .switch {
      position: relative;
      flex: 0 0 auto;
      width: 47px;
      height: 26px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: color-mix(in srgb, var(--muted), transparent 80%);
      transition: background 160ms ease, border-color 160ms ease;
    }

    .switch::after {
      content: "";
      position: absolute;
      top: 3px;
      left: 3px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--panel-strong);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.18);
      transition: transform 160ms ease;
    }

    input[type="checkbox"] {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    input[type="checkbox"]:checked + .switch {
      background: var(--mode-color);
      border-color: transparent;
    }

    input[type="checkbox"]:checked + .switch::after {
      transform: translateX(21px);
    }

    .chart-wrap {
      min-height: 172px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: color-mix(in srgb, var(--panel-strong), transparent 10%);
      overflow: hidden;
    }

    #chart {
      display: block;
      width: 100%;
      height: 172px;
    }

    .chart-empty {
      display: grid;
      place-items: center;
      height: 172px;
      color: var(--muted);
      font-weight: 780;
      text-align: center;
      padding: 18px;
    }

    .log-actions {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .chip-btn {
      min-height: 32px;
      padding: 0 9px;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 820;
    }

    .log {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 240px;
      padding-right: 3px;
      overflow: auto;
      scrollbar-color: var(--mode-color) transparent;
    }

    .log-item {
      display: grid;
      grid-template-columns: 10px minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      min-height: 48px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: color-mix(in srgb, var(--panel-strong), transparent 14%);
      animation: slideIn 230ms ease both;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .log-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--item-color);
      box-shadow: 0 0 0 5px color-mix(in srgb, var(--item-color), transparent 82%);
    }

    .log-name {
      font-weight: 850;
      line-height: 1.1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .log-meta {
      margin-top: 3px;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 670;
    }

    .log-min {
      font-family: var(--font-mono);
      font-weight: 850;
      color: var(--muted);
      white-space: nowrap;
    }

    .empty-log {
      display: grid;
      place-items: center;
      min-height: 132px;
      padding: 18px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      color: var(--muted);
      font-weight: 760;
      text-align: center;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 18px;
      z-index: 10;
      transform: translate(-50%, 18px);
      min-width: min(420px, calc(100vw - 32px));
      padding: 13px 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-strong);
      box-shadow: var(--shadow);
      color: var(--ink);
      font-weight: 800;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    @media (max-width: 960px) {
      .workspace {
        grid-template-columns: 1fr;
      }

      .timer-board,
      .side-panel {
        min-height: auto;
      }
    }

    @media (max-width: 640px) {
      .app {
        width: min(100vw - 18px, 1180px);
        padding-top: 12px;
      }

      header,
      .timer-top {
        align-items: stretch;
      }

      header {
        flex-direction: column;
      }

      .header-actions {
        justify-content: space-between;
      }

      .timer-top {
        flex-direction: column;
      }

      .energy {
        width: 100%;
        justify-content: center;
      }

      .timer-board {
        padding: 16px 12px;
      }

      .timer-core {
        min-height: 310px;
      }

      .dial {
        width: min(330px, 86vw);
      }

      .stats-strip,
      .settings-grid {
        grid-template-columns: 1fr;
      }

      .primary-btn {
        width: 100%;
      }

      .small-btn {
        flex: 1 1 120px;
      }

      .mode-btn {
        flex: 1 1 30%;
        min-width: 0;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="app" id="app" style="--mode-color: var(--focus);">
    <header>
      <div class="brand">
        <div class="mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 8v5l3 2"></path>
            <path d="M9 2h6"></path>
            <path d="M12 5a8 8 0 1 1 0 16 8 8 0 0 1 0-16Z"></path>
          </svg>
        </div>
        <div>
          <h1>Pomodoro</h1>
          <div class="today" id="todayText">Daily focus timer</div>
        </div>
      </div>
      <div class="header-actions" aria-label="Global actions">
        <button class="icon-btn" id="themeBtn" type="button" aria-label="Toggle dark mode" title="Toggle dark mode">
          <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 3a6 6 0 0 0 9 7 9 9 0 1 1-9-7Z"></path>
          </svg>
        </button>
        <button class="icon-btn" id="testSoundBtn" type="button" aria-label="Test beep" title="Test beep">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M11 5 6 9H3v6h3l5 4V5Z"></path>
            <path d="M15.5 8.5a5 5 0 0 1 0 7"></path>
            <path d="M18 5a9 9 0 0 1 0 14"></path>
          </svg>
        </button>
      </div>
    </header>

    <main class="workspace">
      <section class="timer-board" aria-labelledby="modeTitle">
        <div class="timer-top">
          <div>
            <div class="status-kicker" id="statusKicker">Ready to focus</div>
            <h2 class="mode-title" id="modeTitle">Deep work sprint</h2>
          </div>
          <div class="energy" aria-live="polite">
            <span class="energy-dot" aria-hidden="true"></span>
            <span id="energyText">Focus mode</span>
          </div>
        </div>

        <div class="timer-core">
          <div class="dial" id="dial">
            <svg class="progress-svg" viewBox="0 0 120 120" aria-hidden="true">
              <circle class="progress-track" cx="60" cy="60" r="53"></circle>
              <circle class="progress-ring" id="progressRing" cx="60" cy="60" r="53"></circle>
            </svg>
            <div>
              <div class="time" id="timeText">25:00</div>
              <div class="timer-label" id="timerLabel">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M4 13a8 8 0 0 1 13.5-5.8"></path>
                  <path d="M18 3v5h-5"></path>
                  <path d="M20 11a8 8 0 0 1-13.5 5.8"></path>
                  <path d="M6 21v-5h5"></path>
                </svg>
                <span id="timerSubtext">25 minute focus session</span>
              </div>
            </div>
          </div>
        </div>

        <div class="controls" aria-label="Timer controls">
          <button class="primary-btn" id="startPauseBtn" type="button">
            <svg id="startPauseIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M8 5v14l11-7Z"></path>
            </svg>
            <span id="startPauseText">Start</span>
          </button>
          <button class="small-btn" id="resetBtn" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M3 12a9 9 0 1 0 3-6.7"></path>
              <path d="M3 3v6h6"></path>
            </svg>
            Reset
          </button>
          <button class="small-btn" id="skipBtn" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="m5 4 10 8-10 8V4Z"></path>
              <path d="M19 5v14"></path>
            </svg>
            Skip
          </button>
        </div>

        <div class="quick-row" aria-label="Timer modes">
          <button class="mode-btn active" id="mode-focus" type="button" data-mode="focus">Focus</button>
          <button class="mode-btn" id="mode-short" type="button" data-mode="short">Short break</button>
          <button class="mode-btn" id="mode-long" type="button" data-mode="long">Long break</button>
        </div>

        <div class="stats-strip" aria-label="Session statistics">
          <div class="stat">
            <span>Today</span>
            <strong id="todayMinutes">0m</strong>
          </div>
          <div class="stat">
            <span>Sessions</span>
            <strong id="todaySessions">0</strong>
          </div>
          <div class="stat">
            <span>Streak</span>
            <strong id="streakDays">0d</strong>
          </div>
        </div>
      </section>

      <aside class="side-panel" aria-label="Settings and session log">
        <section class="panel-section" aria-labelledby="settingsTitle">
          <div class="section-head">
            <h2 id="settingsTitle">Durations</h2>
            <span class="hint">minutes</span>
          </div>
          <div class="settings-grid">
            <div class="duration-control">
              <label for="focusInput">Focus</label>
              <input id="focusInput" type="number" min="1" max="180" step="1" inputmode="numeric">
            </div>
            <div class="duration-control">
              <label for="shortInput">Short</label>
              <input id="shortInput" type="number" min="1" max="60" step="1" inputmode="numeric">
            </div>
            <div class="duration-control">
              <label for="longInput">Long</label>
              <input id="longInput" type="number" min="1" max="120" step="1" inputmode="numeric">
            </div>
          </div>
          <div class="long-row">
            <label for="longEveryInput">Long break every focus sessions</label>
            <input id="longEveryInput" type="number" min="2" max="12" step="1" inputmode="numeric">
          </div>
        </section>

        <section class="panel-section" aria-labelledby="optionsTitle">
          <div class="section-head">
            <h2 id="optionsTitle">Options</h2>
          </div>
          <div class="toggles">
            <label class="toggle" for="autoStartInput">
              <span>Auto-start next<small>Move between focus and breaks without touching controls.</small></span>
              <input id="autoStartInput" type="checkbox">
              <span class="switch" aria-hidden="true"></span>
            </label>
            <label class="toggle" for="soundInput">
              <span>Sound alert<small>Play a short beep when a session ends.</small></span>
              <input id="soundInput" type="checkbox">
              <span class="switch" aria-hidden="true"></span>
            </label>
          </div>
        </section>

        <section class="panel-section" aria-labelledby="chartTitle">
          <div class="section-head">
            <h2 id="chartTitle">Last 7 days</h2>
            <span class="hint" id="weekTotal">0m total</span>
          </div>
          <div class="chart-wrap" id="chartWrap">
            <svg id="chart" viewBox="0 0 360 172" role="img" aria-label="Minutes completed over the last seven days"></svg>
          </div>
        </section>

        <section class="panel-section" aria-labelledby="logTitle">
          <div class="section-head">
            <h2 id="logTitle">Session log</h2>
            <div class="log-actions">
              <button class="chip-btn" id="addSessionBtn" type="button">+ focus</button>
              <button class="chip-btn" id="clearLogBtn" type="button">clear</button>
            </div>
          </div>
          <div class="log" id="logList" aria-live="polite"></div>
        </section>
      </aside>
    </main>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    (() => {
      "use strict";

      const STORAGE_KEY = "pomodoro.single.file.v1";
      const TAU = Math.PI * 2;
      const ringRadius = 53;
      const ringCircumference = TAU * ringRadius;

      const modes = {
        focus: {
          title: "Deep work sprint",
          label: "Focus mode",
          kickerReady: "Ready to focus",
          kickerRunning: "Focus sprint active",
          colorVar: "var(--focus)",
          colorHex: "#ef4f35",
          complete: "Focus session logged"
        },
        short: {
          title: "Quick reset",
          label: "Short break",
          kickerReady: "Breathe and reset",
          kickerRunning: "Short break active",
          colorVar: "var(--short)",
          colorHex: "#0f9f8f",
          complete: "Short break logged"
        },
        long: {
          title: "Full recharge",
          label: "Long break",
          kickerReady: "Take the long break",
          kickerRunning: "Long break active",
          colorVar: "var(--long)",
          colorHex: "#4567d9",
          complete: "Long break logged"
        }
      };

      const el = {
        app: document.getElementById("app"),
        body: document.body,
        todayText: document.getElementById("todayText"),
        themeBtn: document.getElementById("themeBtn"),
        themeIcon: document.getElementById("themeIcon"),
        testSoundBtn: document.getElementById("testSoundBtn"),
        statusKicker: document.getElementById("statusKicker"),
        modeTitle: document.getElementById("modeTitle"),
        energyText: document.getElementById("energyText"),
        dial: document.getElementById("dial"),
        progressRing: document.getElementById("progressRing"),
        timeText: document.getElementById("timeText"),
        timerSubtext: document.getElementById("timerSubtext"),
        startPauseBtn: document.getElementById("startPauseBtn"),
        startPauseIcon: document.getElementById("startPauseIcon"),
        startPauseText: document.getElementById("startPauseText"),
        resetBtn: document.getElementById("resetBtn"),
        skipBtn: document.getElementById("skipBtn"),
        modeButtons: Array.from(document.querySelectorAll(".mode-btn")),
        todayMinutes: document.getElementById("todayMinutes"),
        todaySessions: document.getElementById("todaySessions"),
        streakDays: document.getElementById("streakDays"),
        focusInput: document.getElementById("focusInput"),
        shortInput: document.getElementById("shortInput"),
        longInput: document.getElementById("longInput"),
        longEveryInput: document.getElementById("longEveryInput"),
        autoStartInput: document.getElementById("autoStartInput"),
        soundInput: document.getElementById("soundInput"),
        chart: document.getElementById("chart"),
        weekTotal: document.getElementById("weekTotal"),
        logList: document.getElementById("logList"),
        addSessionBtn: document.getElementById("addSessionBtn"),
        clearLogBtn: document.getElementById("clearLogBtn"),
        toast: document.getElementById("toast")
      };

      const defaults = {
        mode: "focus",
        durations: { focus: 25, short: 5, long: 15 },
        longEvery: 4,
        autoStart: false,
        sound: true,
        dark: window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches,
        sessions: [],
        focusCycle: 0
      };

      let state = loadState();
      let remaining = minutesToSeconds(state.durations[state.mode]);
      let running = false;
      let startedAt = 0;
      let endsAt = 0;
      let rafId = 0;
      let toastTimer = 0;
      let audioContext = null;

      el.progressRing.style.strokeDasharray = `${ringCircumference}`;
      el.progressRing.style.strokeDashoffset = "0";

      function loadState() {
        try {
          const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
          return {
            ...defaults,
            ...saved,
            durations: { ...defaults.durations, ...(saved.durations || {}) },
            sessions: Array.isArray(saved.sessions) ? saved.sessions.slice(0, 300) : [],
            mode: modes[saved.mode] ? saved.mode : defaults.mode,
            longEvery: clampInt(saved.longEvery, 2, 12, defaults.longEvery),
            focusCycle: clampInt(saved.focusCycle, 0, 999, 0)
          };
        } catch {
          return { ...defaults, durations: { ...defaults.durations }, sessions: [] };
        }
      }

      function saveState() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          mode: state.mode,
          durations: state.durations,
          longEvery: state.longEvery,
          autoStart: state.autoStart,
          sound: state.sound,
          dark: state.dark,
          sessions: state.sessions.slice(0, 300),
          focusCycle: state.focusCycle
        }));
      }

      function clampInt(value, min, max, fallback) {
        const number = Number.parseInt(value, 10);
        if (!Number.isFinite(number)) return fallback;
        return Math.max(min, Math.min(max, number));
      }

      function minutesToSeconds(minutes) {
        return Math.max(1, Math.round(minutes * 60));
      }

      function formatTime(seconds) {
        const safe = Math.max(0, Math.ceil(seconds));
        const minutes = Math.floor(safe / 60);
        const rest = safe % 60;
        return `${String(minutes).padStart(2, "0")}:${String(rest).padStart(2, "0")}`;
      }

      function modeMinutes(mode = state.mode) {
        return state.durations[mode];
      }

      function setMode(mode, keepRemaining = false) {
        if (!modes[mode]) return;
        stopTicker();
        running = false;
        state.mode = mode;
        if (!keepRemaining) remaining = minutesToSeconds(modeMinutes(mode));
        saveState();
        render();
      }

      function startTimer() {
        if (running) return;
        running = true;
        startedAt = Date.now();
        endsAt = startedAt + remaining * 1000;
        unlockAudio();
        tick();
        render();
      }

      function pauseTimer() {
        if (!running) return;
        remaining = Math.max(0, (endsAt - Date.now()) / 1000);
        running = false;
        stopTicker();
        render();
      }

      function resetTimer() {
        running = false;
        stopTicker();
        remaining = minutesToSeconds(modeMinutes());
        render();
      }

      function skipTimer() {
        completeSession(false);
      }

      function tick() {
        if (!running) return;
        remaining = Math.max(0, (endsAt - Date.now()) / 1000);
        renderTimerOnly();
        if (remaining <= 0) {
          completeSession(true);
          return;
        }
        rafId = requestAnimationFrame(tick);
      }

      function stopTicker() {
        if (rafId) cancelAnimationFrame(rafId);
        rafId = 0;
      }

      function completeSession(shouldLog) {
        const completedMode = state.mode;
        running = false;
        stopTicker();

        if (shouldLog) {
          addSession(completedMode, modeMinutes(completedMode));
          if (state.sound) playBeep();
          showToast(modes[completedMode].complete);
        }

        const nextMode = nextModeAfter(completedMode, shouldLog);
        state.mode = nextMode;
        remaining = minutesToSeconds(modeMinutes(nextMode));
        saveState();
        render();

        if (shouldLog && state.autoStart) {
          window.setTimeout(() => {
            if (!running && state.mode === nextMode) startTimer();
          }, 650);
        }
      }

      function nextModeAfter(completedMode, shouldAdvanceCycle) {
        if (completedMode === "focus") {
          if (!shouldAdvanceCycle) return "short";
          state.focusCycle += 1;
          return state.focusCycle % state.longEvery === 0 ? "long" : "short";
        }
        return "focus";
      }

      function addSession(type, minutes) {
        state.sessions.unshift({
          id: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
          type,
          minutes,
          at: new Date().toISOString()
        });
        state.sessions = state.sessions.slice(0, 300);
        saveState();
      }

      function manualAddFocus() {
        addSession("focus", modeMinutes("focus"));
        state.focusCycle += 1;
        saveState();
        render();
        showToast("Focus session added");
      }

      function clearLog() {
        if (!state.sessions.length) return;
        state.sessions = [];
        state.focusCycle = 0;
        saveState();
        render();
        showToast("Session log cleared");
      }

      function unlockAudio() {
        if (!audioContext) {
          const AudioCtor = window.AudioContext || window.webkitAudioContext;
          if (AudioCtor) audioContext = new AudioCtor();
        }
        if (audioContext && audioContext.state === "suspended") {
          audioContext.resume();
        }
      }

      function playBeep() {
        unlockAudio();
        if (!audioContext) return;
        const now = audioContext.currentTime;
        const gain = audioContext.createGain();
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(0.18, now + 0.015);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.42);
        gain.connect(audioContext.destination);

        [660, 880].forEach((freq, index) => {
          const osc = audioContext.createOscillator();
          osc.type = "sine";
          osc.frequency.setValueAtTime(freq, now + index * 0.12);
          osc.connect(gain);
          osc.start(now + index * 0.12);
          osc.stop(now + 0.42 + index * 0.03);
        });
      }

      function showToast(message) {
        window.clearTimeout(toastTimer);
        el.toast.textContent = message;
        el.toast.classList.add("show");
        toastTimer = window.setTimeout(() => {
          el.toast.classList.remove("show");
        }, 2200);
      }

      function render() {
        document.documentElement.dataset.theme = state.dark ? "dark" : "light";
        el.app.style.setProperty("--mode-color", modes[state.mode].colorVar);
        el.todayText.textContent = new Intl.DateTimeFormat(undefined, {
          weekday: "long",
          month: "short",
          day: "numeric"
        }).format(new Date());

        el.focusInput.value = state.durations.focus;
        el.shortInput.value = state.durations.short;
        el.longInput.value = state.durations.long;
        el.longEveryInput.value = state.longEvery;
        el.autoStartInput.checked = state.autoStart;
        el.soundInput.checked = state.sound;

        el.modeTitle.textContent = modes[state.mode].title;
        el.energyText.textContent = modes[state.mode].label;
        el.statusKicker.textContent = running ? modes[state.mode].kickerRunning : modes[state.mode].kickerReady;
        el.dial.classList.toggle("running", running);

        el.startPauseText.textContent = running ? "Pause" : "Start";
        el.startPauseIcon.innerHTML = running
          ? '<path d="M8 5v14"></path><path d="M16 5v14"></path>'
          : '<path d="M8 5v14l11-7Z"></path>';

        el.themeIcon.innerHTML = state.dark
          ? '<circle cx="12" cy="12" r="4"></circle><path d="M12 2v2"></path><path d="M12 20v2"></path><path d="m4.93 4.93 1.41 1.41"></path><path d="m17.66 17.66 1.41 1.41"></path><path d="M2 12h2"></path><path d="M20 12h2"></path><path d="m6.34 17.66-1.41 1.41"></path><path d="m19.07 4.93-1.41 1.41"></path>'
          : '<path d="M12 3a6 6 0 0 0 9 7 9 9 0 1 1-9-7Z"></path>';

        el.modeButtons.forEach((button) => {
          button.classList.toggle("active", button.dataset.mode === state.mode);
        });

        renderTimerOnly();
        renderStats();
        renderChart();
        renderLog();
      }

      function renderTimerOnly() {
        const total = minutesToSeconds(modeMinutes());
        const progress = total <= 0 ? 0 : 1 - remaining / total;
        const offset = ringCircumference * (1 - Math.max(0, Math.min(1, progress)));
        el.timeText.textContent = formatTime(remaining);
        el.timerSubtext.textContent = `${modeMinutes()} minute ${state.mode === "focus" ? "focus session" : "break"}`;
        el.progressRing.style.strokeDashoffset = `${offset}`;
        document.title = `${formatTime(remaining)} - Pomodoro`;
      }

      function renderStats() {
        const todayKey = dateKey(new Date());
        const focusSessionsToday = state.sessions.filter((session) => session.type === "focus" && dateKey(new Date(session.at)) === todayKey);
        const minutesToday = focusSessionsToday.reduce((sum, session) => sum + session.minutes, 0);
        el.todayMinutes.textContent = `${minutesToday}m`;
        el.todaySessions.textContent = `${focusSessionsToday.length}`;
        el.streakDays.textContent = `${calculateStreak()}d`;
      }

      function renderChart() {
        const days = lastDays(7);
        const values = days.map((day) => {
          const minutes = state.sessions
            .filter((session) => session.type === "focus" && dateKey(new Date(session.at)) === day.key)
            .reduce((sum, session) => sum + session.minutes, 0);
          return { ...day, minutes };
        });
        const total = values.reduce((sum, day) => sum + day.minutes, 0);
        el.weekTotal.textContent = `${total}m total`;

        if (!total) {
          el.chart.innerHTML = `
            <text x="180" y="74" text-anchor="middle" fill="currentColor" opacity="0.58" font-size="13" font-weight="800">No focus minutes yet</text>
            <text x="180" y="96" text-anchor="middle" fill="currentColor" opacity="0.45" font-size="11" font-weight="700">Complete a session to light up the week.</text>
          `;
          return;
        }

        const max = Math.max(30, ...values.map((day) => day.minutes));
        const chartHeight = 108;
        const baseY = 130;
        const barWidth = 26;
        const gap = 20;
        const startX = 24;
        const focusColor = getComputedStyle(document.documentElement).getPropertyValue("--focus").trim() || modes.focus.colorHex;
        const mutedColor = getComputedStyle(document.documentElement).getPropertyValue("--muted").trim() || "#68736d";
        const lineColor = getComputedStyle(document.documentElement).getPropertyValue("--line").trim() || "rgba(0,0,0,.14)";

        const bars = values.map((day, index) => {
          const height = Math.max(6, (day.minutes / max) * chartHeight);
          const x = startX + index * (barWidth + gap);
          const y = baseY - height;
          const opacity = day.minutes ? 1 : 0.3;
          return `
            <g>
              <rect x="${x}" y="${y}" width="${barWidth}" height="${height}" rx="5" fill="${focusColor}" opacity="${opacity}">
                <title>${day.label}: ${day.minutes} focus minutes</title>
              </rect>
              <text x="${x + barWidth / 2}" y="153" text-anchor="middle" fill="${mutedColor}" font-size="10" font-weight="800">${day.short}</text>
              <text x="${x + barWidth / 2}" y="${Math.max(15, y - 7)}" text-anchor="middle" fill="${mutedColor}" font-size="10" font-weight="800">${day.minutes || ""}</text>
            </g>
          `;
        }).join("");

        el.chart.innerHTML = `
          <line x1="18" y1="${baseY}" x2="340" y2="${baseY}" stroke="${lineColor}" stroke-width="1"></line>
          ${bars}
        `;
      }

      function renderLog() {
        if (!state.sessions.length) {
          el.logList.innerHTML = '<div class="empty-log">Completed sessions will appear here.</div>';
          return;
        }

        el.logList.innerHTML = state.sessions.slice(0, 12).map((session) => {
          const mode = modes[session.type] || modes.focus;
          const date = new Date(session.at);
          const when = new Intl.DateTimeFormat(undefined, {
            month: "short",
            day: "numeric",
            hour: "numeric",
            minute: "2-digit"
          }).format(date);
          return `
            <article class="log-item" style="--item-color: ${mode.colorVar};">
              <span class="log-dot" aria-hidden="true"></span>
              <div>
                <div class="log-name">${escapeHtml(mode.label)}</div>
                <div class="log-meta">${escapeHtml(when)}</div>
              </div>
              <div class="log-min">${session.minutes}m</div>
            </article>
          `;
        }).join("");
      }

      function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, (char) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#039;"
        }[char]));
      }

      function dateKey(date) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, "0");
        const day = String(date.getDate()).padStart(2, "0");
        return `${year}-${month}-${day}`;
      }

      function lastDays(count) {
        const formatter = new Intl.DateTimeFormat(undefined, { weekday: "short" });
        return Array.from({ length: count }, (_, index) => {
          const date = new Date();
          date.setHours(0, 0, 0, 0);
          date.setDate(date.getDate() - (count - 1 - index));
          return {
            key: dateKey(date),
            label: new Intl.DateTimeFormat(undefined, { month: "short", day: "numeric" }).format(date),
            short: formatter.format(date).slice(0, 3)
          };
        });
      }

      function calculateStreak() {
        const focusDays = new Set(state.sessions.filter((session) => session.type === "focus").map((session) => dateKey(new Date(session.at))));
        let streak = 0;
        const cursor = new Date();
        cursor.setHours(0, 0, 0, 0);
        while (focusDays.has(dateKey(cursor))) {
          streak += 1;
          cursor.setDate(cursor.getDate() - 1);
        }
        return streak;
      }

      function updateDuration(mode, value) {
        const max = mode === "focus" ? 180 : mode === "long" ? 120 : 60;
        const next = clampInt(value, 1, max, state.durations[mode]);
        state.durations[mode] = next;
        if (state.mode === mode && !running) {
          remaining = minutesToSeconds(next);
        }
        saveState();
        render();
      }

      el.startPauseBtn.addEventListener("click", () => running ? pauseTimer() : startTimer());
      el.resetBtn.addEventListener("click", resetTimer);
      el.skipBtn.addEventListener("click", skipTimer);
      el.themeBtn.addEventListener("click", () => {
        state.dark = !state.dark;
        saveState();
        render();
      });
      el.testSoundBtn.addEventListener("click", () => {
        playBeep();
        showToast("Beep tested");
      });
      el.addSessionBtn.addEventListener("click", manualAddFocus);
      el.clearLogBtn.addEventListener("click", clearLog);

      el.modeButtons.forEach((button) => {
        button.addEventListener("click", () => setMode(button.dataset.mode));
      });

      el.focusInput.addEventListener("change", (event) => updateDuration("focus", event.target.value));
      el.shortInput.addEventListener("change", (event) => updateDuration("short", event.target.value));
      el.longInput.addEventListener("change", (event) => updateDuration("long", event.target.value));
      el.longEveryInput.addEventListener("change", (event) => {
        state.longEvery = clampInt(event.target.value, 2, 12, state.longEvery);
        saveState();
        render();
      });
      el.autoStartInput.addEventListener("change", (event) => {
        state.autoStart = event.target.checked;
        saveState();
        render();
      });
      el.soundInput.addEventListener("change", (event) => {
        state.sound = event.target.checked;
        saveState();
        render();
      });

      window.addEventListener("keydown", (event) => {
        if (event.target instanceof HTMLInputElement) return;
        if (event.code === "Space") {
          event.preventDefault();
          running ? pauseTimer() : startTimer();
        }
        if (event.key.toLowerCase() === "r") resetTimer();
      });

      window.addEventListener("beforeunload", () => {
        if (running) {
          remaining = Math.max(0, (endsAt - Date.now()) / 1000);
        }
        saveState();
      });

      render();
    })();
  </script>
</body>
</html>
