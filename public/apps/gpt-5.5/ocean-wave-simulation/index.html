<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ocean Wave Simulation</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #eef8f4;
      --muted: rgba(238, 248, 244, 0.72);
      --line: rgba(255, 255, 255, 0.17);
      --panel: rgba(5, 24, 31, 0.48);
      --panel-strong: rgba(6, 31, 39, 0.68);
      --accent: #d7a868;
      --foam: #bce8df;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #071a20;
      color: var(--ink);
      font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", sans-serif;
    }

    body {
      min-height: 100svh;
    }

    .app {
      position: relative;
      width: 100%;
      height: 100svh;
      isolation: isolate;
      background:
        radial-gradient(circle at 76% 16%, rgba(218, 158, 83, 0.2), transparent 22rem),
        linear-gradient(180deg, #173946 0%, #0c2630 48%, #06191f 100%);
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
    }

    .vignette {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(2, 12, 18, 0.08), transparent 34%, rgba(2, 12, 18, 0.34)),
        radial-gradient(ellipse at center, transparent 42%, rgba(0, 7, 10, 0.36) 100%);
      z-index: 2;
    }

    .brand {
      position: absolute;
      left: clamp(18px, 4vw, 58px);
      top: clamp(16px, 4vh, 44px);
      z-index: 3;
      max-width: min(480px, calc(100vw - 36px));
      animation: settle 900ms cubic-bezier(.2, .8, .2, 1) both;
    }

    .brand h1 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-weight: 500;
      font-size: clamp(2.1rem, 5.8vw, 5.6rem);
      line-height: 0.95;
      letter-spacing: 0;
      text-wrap: balance;
      text-shadow: 0 2px 24px rgba(0, 12, 18, 0.55);
    }

    .brand p {
      max-width: 31rem;
      margin: 0.9rem 0 0;
      color: var(--muted);
      font-size: clamp(0.92rem, 1.4vw, 1.08rem);
      line-height: 1.55;
      text-shadow: 0 2px 18px rgba(0, 10, 14, 0.65);
    }

    .control-panel {
      position: absolute;
      left: clamp(14px, 4vw, 58px);
      bottom: clamp(14px, 4vh, 42px);
      z-index: 4;
      width: min(430px, calc(100vw - 28px));
      padding: 17px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: linear-gradient(180deg, var(--panel), var(--panel-strong));
      box-shadow: 0 22px 70px rgba(0, 11, 16, 0.38);
      backdrop-filter: blur(18px) saturate(1.12);
      animation: rise 950ms 150ms cubic-bezier(.2, .8, .2, 1) both;
    }

    .panel-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 14px;
    }

    .condition {
      display: grid;
      gap: 3px;
      min-width: 0;
    }

    .condition strong {
      overflow: hidden;
      font-size: 0.86rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .condition span {
      color: var(--muted);
      font-size: 0.82rem;
    }

    .reset {
      flex: 0 0 auto;
      width: 38px;
      height: 38px;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--ink);
      cursor: pointer;
      transition: transform 180ms ease, background 180ms ease, border-color 180ms ease;
    }

    .reset:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.13);
      border-color: rgba(255,255,255,0.28);
    }

    .reset:focus-visible,
    input[type="range"]:focus-visible {
      outline: 2px solid var(--foam);
      outline-offset: 3px;
    }

    .slider {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 7px 14px;
      padding: 13px 0;
      border-top: 1px solid rgba(255, 255, 255, 0.12);
    }

    .slider label {
      color: rgba(238, 248, 244, 0.88);
      font-size: 0.92rem;
    }

    .slider output {
      color: var(--ink);
      font-variant-numeric: tabular-nums;
      font-size: 0.9rem;
    }

    input[type="range"] {
      grid-column: 1 / -1;
      width: 100%;
      height: 24px;
      margin: 0;
      appearance: none;
      background: transparent;
      cursor: pointer;
      --fill: 50%;
    }

    input[type="range"]::-webkit-slider-runnable-track {
      height: 4px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent) 0 var(--fill), rgba(255,255,255,0.18) var(--fill) 100%);
    }

    input[type="range"]::-webkit-slider-thumb {
      width: 17px;
      height: 17px;
      margin-top: -6.5px;
      appearance: none;
      border: 2px solid rgba(255,255,255,0.9);
      border-radius: 50%;
      background: #102e35;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }

    input[type="range"]::-moz-range-track {
      height: 4px;
      border-radius: 999px;
      background: rgba(255,255,255,0.18);
    }

    input[type="range"]::-moz-range-progress {
      height: 4px;
      border-radius: 999px;
      background: var(--accent);
    }

    input[type="range"]::-moz-range-thumb {
      width: 15px;
      height: 15px;
      border: 2px solid rgba(255,255,255,0.9);
      border-radius: 50%;
      background: #102e35;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }

    .fallback {
      position: absolute;
      inset: auto 18px 18px auto;
      z-index: 5;
      display: none;
      max-width: 280px;
      padding: 10px 12px;
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 8px;
      background: rgba(5, 24, 31, 0.7);
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.45;
    }

    @keyframes settle {
      from { opacity: 0; transform: translateY(-12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 680px) {
      .brand p {
        display: none;
      }

      .control-panel {
        padding: 14px;
      }
    }
  </style>
</head>
<body>
  <main class="app" aria-label="Ocean Wave Simulation">
    <canvas id="ocean" aria-label="Animated realistic ocean waves"></canvas>
    <div class="vignette" aria-hidden="true"></div>

    <header class="brand">
      <h1>Ocean Wave Simulation</h1>
      <p id="sceneCopy">A quiet procedural sea with wind-shaped swells, crest foam, and shifting coastal light.</p>
    </header>

    <section class="control-panel" aria-label="Wave controls">
      <div class="panel-top">
        <div class="condition">
          <strong id="conditionLabel">Moderate breeze</strong>
          <span id="conditionDetail">Layered swell, low whitecaps</span>
        </div>
        <button class="reset" id="reset" type="button" title="Reset sea state" aria-label="Reset sea state">
          <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M20 6v5h-5" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"></path>
            <path d="M19.2 13a7 7 0 1 1-1.8-6.7L20 11" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
        </button>
      </div>

      <div class="slider">
        <label for="wind">Wind speed</label>
        <output id="windValue" for="wind">18 kt</output>
        <input id="wind" type="range" min="2" max="42" step="1" value="18">
      </div>

      <div class="slider">
        <label for="height">Wave height</label>
        <output id="heightValue" for="height">2.2 m</output>
        <input id="height" type="range" min="0.4" max="5.8" step="0.1" value="2.2">
      </div>

      <div class="slider">
        <label for="light">Lighting</label>
        <output id="lightValue" for="light">Late day</output>
        <input id="light" type="range" min="0" max="100" step="1" value="58">
      </div>
    </section>

    <p class="fallback" id="fallback">WebGL is unavailable, so a simplified canvas sea is running.</p>
  </main>

  <script>
    (() => {
      const canvas = document.getElementById("ocean");
      const fallbackNote = document.getElementById("fallback");
      const controls = {
        wind: document.getElementById("wind"),
        height: document.getElementById("height"),
        light: document.getElementById("light"),
        windValue: document.getElementById("windValue"),
        heightValue: document.getElementById("heightValue"),
        lightValue: document.getElementById("lightValue"),
        conditionLabel: document.getElementById("conditionLabel"),
        conditionDetail: document.getElementById("conditionDetail"),
        reset: document.getElementById("reset")
      };

      const state = {
        wind: Number(controls.wind.value),
        height: Number(controls.height.value),
        light: Number(controls.light.value) / 100,
        start: performance.now()
      };

      function setSliderFill(input) {
        const min = Number(input.min);
        const max = Number(input.max);
        const value = Number(input.value);
        input.style.setProperty("--fill", `${((value - min) / (max - min)) * 100}%`);
      }

      function lightingName(value) {
        if (value < 0.18) return "Moonlit";
        if (value < 0.38) return "First light";
        if (value < 0.66) return "Late day";
        if (value < 0.86) return "Clear noon";
        return "Bright sun";
      }

      function updateReadouts() {
        state.wind = Number(controls.wind.value);
        state.height = Number(controls.height.value);
        state.light = Number(controls.light.value) / 100;

        controls.windValue.textContent = `${state.wind.toFixed(0)} kt`;
        controls.heightValue.textContent = `${state.height.toFixed(1)} m`;
        controls.lightValue.textContent = lightingName(state.light);

        const whitecaps = state.wind > 26 || state.height > 3.8;
        if (state.wind < 8 && state.height < 1.2) {
          controls.conditionLabel.textContent = "Calm water";
          controls.conditionDetail.textContent = "Soft ripples, glassy reflection";
        } else if (state.wind < 18 && state.height < 2.5) {
          controls.conditionLabel.textContent = "Light breeze";
          controls.conditionDetail.textContent = "Long swell, small surface texture";
        } else if (whitecaps) {
          controls.conditionLabel.textContent = "Building sea";
          controls.conditionDetail.textContent = "Steeper sets, visible whitecaps";
        } else {
          controls.conditionLabel.textContent = "Moderate breeze";
          controls.conditionDetail.textContent = "Layered swell, low whitecaps";
        }

        Object.values(controls).forEach(el => {
          if (el && el.type === "range") setSliderFill(el);
        });
      }

      ["wind", "height", "light"].forEach(key => {
        controls[key].addEventListener("input", updateReadouts);
      });

      controls.reset.addEventListener("click", () => {
        controls.wind.value = 18;
        controls.height.value = 2.2;
        controls.light.value = 58;
        updateReadouts();
      });

      updateReadouts();

      const gl = canvas.getContext("webgl2", {
        antialias: true,
        alpha: false,
        powerPreference: "high-performance"
      });

      if (!gl) {
        fallbackNote.style.display = "block";
        runCanvasFallback();
        return;
      }

      const skyVertex = `#version 300 es
        in vec2 a_position;
        out vec2 v_uv;
        void main() {
          v_uv = a_position * 0.5 + 0.5;
          gl_Position = vec4(a_position, 0.0, 1.0);
        }
      `;

      const skyFragment = `#version 300 es
        precision highp float;
        in vec2 v_uv;
        uniform float u_time;
        uniform float u_light;
        uniform vec2 u_resolution;
        out vec4 outColor;

        float hash(vec2 p) {
          p = fract(p * vec2(123.34, 456.21));
          p += dot(p, p + 45.32);
          return fract(p.x * p.y);
        }

        float noise(vec2 p) {
          vec2 i = floor(p);
          vec2 f = fract(p);
          vec2 u = f * f * (3.0 - 2.0 * f);
          return mix(mix(hash(i), hash(i + vec2(1.0, 0.0)), u.x),
                     mix(hash(i + vec2(0.0, 1.0)), hash(i + vec2(1.0, 1.0)), u.x), u.y);
        }

        float fbm(vec2 p) {
          float v = 0.0;
          float a = 0.5;
          for (int i = 0; i < 5; i++) {
            v += a * noise(p);
            p *= 2.05;
            a *= 0.52;
          }
          return v;
        }

        void main() {
          vec2 uv = v_uv;
          float l = clamp(u_light, 0.0, 1.0);
          float low = 1.0 - smoothstep(0.12, 0.55, l);
          vec3 nightTop = vec3(0.015, 0.055, 0.082);
          vec3 nightBottom = vec3(0.090, 0.160, 0.178);
          vec3 dayTop = vec3(0.300, 0.570, 0.720);
          vec3 dayBottom = vec3(0.780, 0.880, 0.865);
          vec3 duskTop = vec3(0.135, 0.270, 0.335);
          vec3 duskBottom = vec3(0.805, 0.585, 0.395);
          vec3 top = mix(mix(nightTop, duskTop, smoothstep(0.06, 0.35, l)), dayTop, smoothstep(0.50, 0.92, l));
          vec3 bottom = mix(mix(nightBottom, duskBottom, smoothstep(0.06, 0.36, l)), dayBottom, smoothstep(0.52, 0.94, l));
          vec3 col = mix(bottom, top, pow(uv.y, 0.72));

          vec2 sunUv = vec2(0.69, mix(0.24, 0.76, l));
          float sunDisk = smoothstep(0.060, 0.012, length((uv - sunUv) * vec2(u_resolution.x / u_resolution.y, 1.0)));
          float glow = exp(-length((uv - sunUv) * vec2(1.35, 1.0)) * 4.6) * mix(0.55, 1.0, l);
          vec3 sunColor = mix(vec3(0.84, 0.88, 0.95), vec3(1.0, 0.70, 0.38), 1.0 - smoothstep(0.35, 0.9, l));
          col += sunColor * (sunDisk * 0.82 + glow * 0.28);

          float clouds = fbm(vec2(uv.x * 2.2 + u_time * 0.006, uv.y * 1.35 + 1.7));
          clouds = smoothstep(0.58, 0.86, clouds) * smoothstep(0.17, 0.86, uv.y) * (1.0 - smoothstep(0.92, 1.0, uv.y));
          col = mix(col, col + vec3(0.12, 0.14, 0.13), clouds * 0.22 * smoothstep(0.18, 0.72, l));

          float stars = step(0.9972, hash(floor(uv * u_resolution.xy * 0.45)));
          stars *= low * smoothstep(0.45, 0.95, uv.y);
          col += vec3(stars) * 0.65;

          outColor = vec4(col, 1.0);
        }
      `;

      const oceanVertex = `#version 300 es
        precision highp float;
        in vec2 a_xz;
        uniform mat4 u_projection;
        uniform mat4 u_view;
        uniform float u_time;
        uniform float u_wind;
        uniform float u_height;
        uniform vec3 u_camera;
        out vec3 v_world;
        out vec3 v_normal;
        out vec3 v_view;
        out float v_foam;

        const float PI = 3.14159265359;

        float wave(vec2 p, vec2 dir, float amp, float len, float speed, float phase) {
          float k = 2.0 * PI / len;
          return sin(dot(normalize(dir), p) * k + u_time * speed + phase) * amp;
        }

        float seaHeight(vec2 p) {
          float w = clamp(u_wind, 2.0, 42.0);
          float h = u_height;
          float gust = 0.72 + w * 0.026;
          float y = 0.0;
          y += wave(p, vec2(0.82, -0.56), h * 0.42, 34.0, 0.72 * gust, 0.0);
          y += wave(p, vec2(0.36, -0.93), h * 0.26, 18.5, 1.05 * gust, 1.7);
          y += wave(p, vec2(-0.18, -0.98), h * 0.19, 11.5, 1.52 * gust, 2.8);
          y += wave(p, vec2(0.98, 0.18), h * 0.11, 7.0, 2.10 * gust, 4.1);
          y += wave(p, vec2(-0.70, -0.45), h * 0.07, 4.2, 2.72 * gust, 5.0);
          return y;
        }

        void main() {
          vec2 p = a_xz;
          float windFactor = smoothstep(4.0, 42.0, u_wind);
          float mainPhase = dot(normalize(vec2(0.82, -0.56)), p) * (2.0 * PI / 34.0) + u_time * (0.72 + u_wind * 0.019);
          p += normalize(vec2(0.82, -0.56)) * cos(mainPhase) * u_height * mix(0.10, 0.34, windFactor);
          float y = seaHeight(p);
          float e = 0.38;
          float hx = seaHeight(p + vec2(e, 0.0)) - seaHeight(p - vec2(e, 0.0));
          float hz = seaHeight(p + vec2(0.0, e)) - seaHeight(p - vec2(0.0, e));
          vec3 normal = normalize(vec3(-hx, 2.0 * e, -hz));
          vec3 world = vec3(p.x, y, p.y);
          v_world = world;
          v_normal = normal;
          v_view = normalize(u_camera - world);
          v_foam = smoothstep(u_height * 0.36, u_height * 0.92, y) * smoothstep(0.18, 0.58, length(normal.xz)) * smoothstep(12.0, 28.0, u_wind);
          gl_Position = u_projection * u_view * vec4(world, 1.0);
        }
      `;

      const oceanFragment = `#version 300 es
        precision highp float;
        in vec3 v_world;
        in vec3 v_normal;
        in vec3 v_view;
        in float v_foam;
        uniform float u_time;
        uniform float u_wind;
        uniform float u_height;
        uniform float u_light;
        uniform vec3 u_sunDir;
        uniform vec3 u_camera;
        out vec4 outColor;

        float hash(vec2 p) {
          p = fract(p * vec2(127.1, 311.7));
          p += dot(p, p + 19.19);
          return fract(p.x * p.y);
        }

        float noise(vec2 p) {
          vec2 i = floor(p);
          vec2 f = fract(p);
          vec2 u = f * f * (3.0 - 2.0 * f);
          return mix(mix(hash(i), hash(i + vec2(1.0, 0.0)), u.x),
                     mix(hash(i + vec2(0.0, 1.0)), hash(i + vec2(1.0, 1.0)), u.x), u.y);
        }

        void main() {
          vec3 n = normalize(v_normal);
          vec3 view = normalize(v_view);
          float l = clamp(u_light, 0.0, 1.0);
          vec3 sun = normalize(u_sunDir);
          float ndl = max(dot(n, sun), 0.0);
          float fresnel = pow(1.0 - clamp(dot(n, view), 0.0, 1.0), 3.0);
          float distanceFade = smoothstep(36.0, 270.0, distance(v_world.xz, u_camera.xz));

          vec3 deep = mix(vec3(0.010, 0.060, 0.073), vec3(0.015, 0.145, 0.170), smoothstep(0.25, 0.9, l));
          vec3 green = mix(vec3(0.040, 0.180, 0.170), vec3(0.075, 0.340, 0.315), smoothstep(0.35, 1.0, l));
          vec3 sky = mix(vec3(0.060, 0.130, 0.160), vec3(0.590, 0.790, 0.840), smoothstep(0.3, 0.95, l));
          vec3 water = mix(deep, green, 0.34 + n.y * 0.28);
          water += ndl * mix(vec3(0.08, 0.09, 0.08), vec3(0.24, 0.31, 0.25), l);
          water = mix(water, sky, fresnel * mix(0.25, 0.60, l));

          vec3 halfVec = normalize(sun + view);
          float sparkleBase = pow(max(dot(n, halfVec), 0.0), mix(72.0, 180.0, l));
          float glitterMask = noise(v_world.xz * (0.85 + u_wind * 0.025) + u_time * vec2(0.65, -0.42));
          float sparkle = sparkleBase * smoothstep(0.45, 1.0, glitterMask) * (0.7 + 1.15 * l);
          vec3 warmLight = mix(vec3(0.85, 0.77, 0.92), vec3(1.0, 0.72, 0.36), 1.0 - smoothstep(0.42, 0.88, l));
          water += warmLight * sparkle * 1.35;

          float fineFoam = noise(v_world.xz * vec2(0.42, 1.2) + u_time * vec2(0.1, -0.55));
          float foam = v_foam * smoothstep(0.42, 0.88, fineFoam);
          foam += smoothstep(3.8, 5.8, u_height) * smoothstep(31.0, 42.0, u_wind) * smoothstep(0.55, 0.86, fineFoam) * 0.28;
          water = mix(water, vec3(0.82, 0.94, 0.91), clamp(foam, 0.0, 0.74));

          vec3 haze = mix(vec3(0.18, 0.31, 0.34), vec3(0.63, 0.78, 0.78), smoothstep(0.45, 1.0, l));
          water = mix(water, haze, distanceFade * mix(0.32, 0.53, l));
          water = pow(water, vec3(0.92));
          outColor = vec4(water, 1.0);
        }
      `;

      function createShader(type, source) {
        const shader = gl.createShader(type);
        gl.shaderSource(shader, source);
        gl.compileShader(shader);
        if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
          throw new Error(gl.getShaderInfoLog(shader) || "Shader compile failed");
        }
        return shader;
      }

      function createProgram(vertexSource, fragmentSource) {
        const program = gl.createProgram();
        gl.attachShader(program, createShader(gl.VERTEX_SHADER, vertexSource));
        gl.attachShader(program, createShader(gl.FRAGMENT_SHADER, fragmentSource));
        gl.linkProgram(program);
        if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
          throw new Error(gl.getProgramInfoLog(program) || "Program link failed");
        }
        return program;
      }

      const skyProgram = createProgram(skyVertex, skyFragment);
      const oceanProgram = createProgram(oceanVertex, oceanFragment);

      const skyVao = gl.createVertexArray();
      gl.bindVertexArray(skyVao);
      const skyBuffer = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, skyBuffer);
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
      const skyPos = gl.getAttribLocation(skyProgram, "a_position");
      gl.enableVertexAttribArray(skyPos);
      gl.vertexAttribPointer(skyPos, 2, gl.FLOAT, false, 0, 0);

      const oceanVao = gl.createVertexArray();
      gl.bindVertexArray(oceanVao);
      const cols = 190;
      const rows = 190;
      const vertices = new Float32Array(cols * rows * 2);
      let p = 0;
      for (let y = 0; y < rows; y++) {
        const v = y / (rows - 1);
        const z = 18 - Math.pow(v, 1.52) * 360;
        const width = 82 + v * 235;
        for (let x = 0; x < cols; x++) {
          const u = x / (cols - 1);
          vertices[p++] = (u * 2 - 1) * width;
          vertices[p++] = z;
        }
      }

      const indices = new Uint16Array((cols - 1) * (rows - 1) * 6);
      let k = 0;
      for (let y = 0; y < rows - 1; y++) {
        for (let x = 0; x < cols - 1; x++) {
          const a = y * cols + x;
          const b = a + 1;
          const c = a + cols;
          const d = c + 1;
          indices[k++] = a; indices[k++] = c; indices[k++] = b;
          indices[k++] = b; indices[k++] = c; indices[k++] = d;
        }
      }

      const oceanBuffer = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, oceanBuffer);
      gl.bufferData(gl.ARRAY_BUFFER, vertices, gl.STATIC_DRAW);
      const oceanPos = gl.getAttribLocation(oceanProgram, "a_xz");
      gl.enableVertexAttribArray(oceanPos);
      gl.vertexAttribPointer(oceanPos, 2, gl.FLOAT, false, 0, 0);
      const indexBuffer = gl.createBuffer();
      gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, indexBuffer);
      gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, indices, gl.STATIC_DRAW);
      gl.bindVertexArray(null);

      const uniforms = {
        sky: {
          time: gl.getUniformLocation(skyProgram, "u_time"),
          light: gl.getUniformLocation(skyProgram, "u_light"),
          resolution: gl.getUniformLocation(skyProgram, "u_resolution")
        },
        ocean: {
          projection: gl.getUniformLocation(oceanProgram, "u_projection"),
          view: gl.getUniformLocation(oceanProgram, "u_view"),
          time: gl.getUniformLocation(oceanProgram, "u_time"),
          wind: gl.getUniformLocation(oceanProgram, "u_wind"),
          height: gl.getUniformLocation(oceanProgram, "u_height"),
          light: gl.getUniformLocation(oceanProgram, "u_light"),
          sunDir: gl.getUniformLocation(oceanProgram, "u_sunDir"),
          camera: gl.getUniformLocation(oceanProgram, "u_camera")
        }
      };

      const projection = new Float32Array(16);
      const view = new Float32Array(16);
      let width = 0;
      let height = 0;

      function perspective(out, fovy, aspect, near, far) {
        const f = 1.0 / Math.tan(fovy / 2);
        out[0] = f / aspect; out[1] = 0; out[2] = 0; out[3] = 0;
        out[4] = 0; out[5] = f; out[6] = 0; out[7] = 0;
        out[8] = 0; out[9] = 0; out[10] = (far + near) / (near - far); out[11] = -1;
        out[12] = 0; out[13] = 0; out[14] = (2 * far * near) / (near - far); out[15] = 0;
      }

      function normalize(v) {
        const len = Math.hypot(v[0], v[1], v[2]) || 1;
        return [v[0] / len, v[1] / len, v[2] / len];
      }

      function cross(a, b) {
        return [
          a[1] * b[2] - a[2] * b[1],
          a[2] * b[0] - a[0] * b[2],
          a[0] * b[1] - a[1] * b[0]
        ];
      }

      function dot(a, b) {
        return a[0] * b[0] + a[1] * b[1] + a[2] * b[2];
      }

      function lookAt(out, eye, center, up) {
        const z = normalize([eye[0] - center[0], eye[1] - center[1], eye[2] - center[2]]);
        const x = normalize(cross(up, z));
        const y = cross(z, x);
        out[0] = x[0]; out[1] = y[0]; out[2] = z[0]; out[3] = 0;
        out[4] = x[1]; out[5] = y[1]; out[6] = z[1]; out[7] = 0;
        out[8] = x[2]; out[9] = y[2]; out[10] = z[2]; out[11] = 0;
        out[12] = -dot(x, eye); out[13] = -dot(y, eye); out[14] = -dot(z, eye); out[15] = 1;
      }

      function resize() {
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        const nextWidth = Math.max(1, Math.floor(canvas.clientWidth * dpr));
        const nextHeight = Math.max(1, Math.floor(canvas.clientHeight * dpr));
        if (nextWidth !== width || nextHeight !== height) {
          width = canvas.width = nextWidth;
          height = canvas.height = nextHeight;
          gl.viewport(0, 0, width, height);
          perspective(projection, Math.PI / 3.05, width / height, 0.1, 650);
        }
      }

      function render(now) {
        resize();
        const time = (now - state.start) * 0.001;
        const aspectLean = width / height < 0.9 ? 0.65 : 1;
        const camera = [
          Math.sin(time * 0.07) * 1.4 * aspectLean,
          8.2 + Math.sin(time * 0.28) * 0.22,
          31.0
        ];
        const target = [
          Math.sin(time * 0.05) * 2.0 * aspectLean,
          -1.0,
          -54.0
        ];
        lookAt(view, camera, target, [0, 1, 0]);

        const light = state.light;
        const sunDir = normalize([
          -0.44,
          0.07 + light * 0.92,
          -0.68 + (light - 0.5) * 0.16
        ]);

        gl.disable(gl.DEPTH_TEST);
        gl.useProgram(skyProgram);
        gl.bindVertexArray(skyVao);
        gl.uniform1f(uniforms.sky.time, time);
        gl.uniform1f(uniforms.sky.light, light);
        gl.uniform2f(uniforms.sky.resolution, width, height);
        gl.drawArrays(gl.TRIANGLES, 0, 3);

        gl.enable(gl.DEPTH_TEST);
        gl.depthFunc(gl.LEQUAL);
        gl.useProgram(oceanProgram);
        gl.bindVertexArray(oceanVao);
        gl.uniformMatrix4fv(uniforms.ocean.projection, false, projection);
        gl.uniformMatrix4fv(uniforms.ocean.view, false, view);
        gl.uniform1f(uniforms.ocean.time, time);
        gl.uniform1f(uniforms.ocean.wind, state.wind);
        gl.uniform1f(uniforms.ocean.height, state.height);
        gl.uniform1f(uniforms.ocean.light, light);
        gl.uniform3f(uniforms.ocean.sunDir, sunDir[0], sunDir[1], sunDir[2]);
        gl.uniform3f(uniforms.ocean.camera, camera[0], camera[1], camera[2]);
        gl.drawElements(gl.TRIANGLES, indices.length, gl.UNSIGNED_SHORT, 0);

        requestAnimationFrame(render);
      }

      requestAnimationFrame(render);

      function runCanvasFallback() {
        const ctx = canvas.getContext("2d");
        function fit2d() {
          const dpr = Math.min(window.devicePixelRatio || 1, 2);
          canvas.width = Math.floor(canvas.clientWidth * dpr);
          canvas.height = Math.floor(canvas.clientHeight * dpr);
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }
        window.addEventListener("resize", fit2d);
        fit2d();
        function draw(now) {
          const w = canvas.clientWidth;
          const h = canvas.clientHeight;
          const t = now * 0.001;
          const light = state.light;
          const sky = ctx.createLinearGradient(0, 0, 0, h);
          sky.addColorStop(0, light > 0.55 ? "#5f98b6" : "#173946");
          sky.addColorStop(0.52, light > 0.55 ? "#cad8d0" : "#9b7658");
          sky.addColorStop(1, "#062029");
          ctx.fillStyle = sky;
          ctx.fillRect(0, 0, w, h);
          const layers = 8;
          for (let i = 0; i < layers; i++) {
            const yBase = h * (0.46 + i * 0.065);
            const amp = (state.height * 4 + i * 4) * (1 + state.wind / 70);
            ctx.beginPath();
            ctx.moveTo(0, h);
            for (let x = 0; x <= w; x += 8) {
              const y = yBase + Math.sin(x * (0.012 + i * 0.002) + t * (0.5 + i * 0.13) + i) * amp;
              ctx.lineTo(x, y);
            }
            ctx.lineTo(w, h);
            ctx.closePath();
            ctx.fillStyle = `rgba(${8 + i * 5}, ${58 + i * 14}, ${70 + i * 12}, ${0.54 + i * 0.035})`;
            ctx.fill();
          }
          requestAnimationFrame(draw);
        }
        requestAnimationFrame(draw);
      }
    })();
  </script>
</body>
</html>
