<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>United States Trivia Quiz</title>
  <style>
    :root {
      --ink: #172033;
      --muted: #657084;
      --paper: #f9f6ef;
      --panel: #fffdfa;
      --navy: #1f3a5f;
      --red: #b23b3b;
      --red-soft: #fde7e4;
      --green: #237a4b;
      --green-soft: #e3f5eb;
      --gold: #c58a27;
      --blue-soft: #e5edf6;
      --line: rgba(31, 58, 95, 0.16);
      --shadow: 0 28px 70px rgba(23, 32, 51, 0.14);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--paper);
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Avenir Next", "Segoe UI", Verdana, sans-serif;
      background:
        linear-gradient(120deg, rgba(197, 138, 39, 0.10), transparent 34%),
        linear-gradient(230deg, rgba(178, 59, 59, 0.10), transparent 38%),
        var(--paper);
      letter-spacing: 0;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.46;
      background-image:
        linear-gradient(rgba(31, 58, 95, 0.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(31, 58, 95, 0.055) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(to bottom, black, transparent 78%);
    }

    button {
      font: inherit;
    }

    .app {
      position: relative;
      width: min(1080px, calc(100% - 32px));
      min-height: 100vh;
      margin: 0 auto;
      padding: 28px 0 34px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 22px;
    }

    .topbar {
      display: grid;
      gap: 14px;
      animation: slideDown 540ms ease both;
    }

    .brand-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .seal {
      width: 48px;
      height: 48px;
      border: 2px solid rgba(31, 58, 95, 0.28);
      border-radius: 50%;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at center, var(--panel) 0 38%, transparent 39%),
        conic-gradient(from 18deg, var(--red) 0 10%, var(--panel) 10% 20%, var(--navy) 20% 30%, var(--panel) 30% 40%, var(--red) 40% 50%, var(--panel) 50% 60%, var(--navy) 60% 70%, var(--panel) 70% 80%, var(--red) 80% 90%, var(--panel) 90% 100%);
      box-shadow: 0 10px 22px rgba(31, 58, 95, 0.12);
      flex: 0 0 auto;
    }

    .seal-star {
      position: relative;
      width: 22px;
      height: 22px;
      transform: rotate(18deg);
      background: var(--gold);
      clip-path: polygon(50% 0%, 61% 34%, 98% 35%, 68% 56%, 79% 91%, 50% 70%, 21% 91%, 32% 56%, 2% 35%, 39% 34%);
    }

    h1 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(1.5rem, 3vw, 2.35rem);
      line-height: 1;
      letter-spacing: 0;
    }

    .kicker {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 700;
    }

    .score-pill {
      min-width: 128px;
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 253, 250, 0.76);
      color: var(--navy);
      text-align: center;
      font-weight: 800;
      box-shadow: 0 8px 18px rgba(31, 58, 95, 0.08);
    }

    .progress-wrap {
      height: 12px;
      padding: 2px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 253, 250, 0.72);
      overflow: hidden;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--navy), var(--gold));
      transition: width 520ms cubic-bezier(.22, 1, .36, 1);
    }

    main {
      display: grid;
      place-items: center;
    }

    .quiz-card {
      width: min(820px, 100%);
      min-height: 600px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 22px;
      padding: clamp(22px, 4vw, 42px);
      border: 1px solid rgba(31, 58, 95, 0.18);
      border-radius: var(--radius);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.84), rgba(255, 253, 250, 0.96)),
        var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
      animation: cardIn 620ms cubic-bezier(.2, .8, .2, 1) both;
    }

    .quiz-card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 8px;
      background: linear-gradient(90deg, var(--red) 0 31%, var(--panel) 31% 38%, var(--navy) 38% 69%, var(--panel) 69% 76%, var(--gold) 76%);
    }

    .quiz-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    .topic-tag {
      color: var(--navy);
      background: var(--blue-soft);
      border: 1px solid rgba(31, 58, 95, 0.12);
      border-radius: 999px;
      padding: 7px 11px;
      white-space: nowrap;
    }

    .question-area {
      align-self: center;
      display: grid;
      gap: 24px;
    }

    .question {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2rem, 5.2vw, 4.25rem);
      line-height: 1.05;
      letter-spacing: 0;
      max-width: 13ch;
    }

    .answers {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .answer {
      position: relative;
      width: 100%;
      min-height: 86px;
      padding: 16px 18px 16px 64px;
      border: 1px solid rgba(31, 58, 95, 0.16);
      border-radius: var(--radius);
      background: #ffffff;
      color: var(--ink);
      text-align: left;
      font-size: clamp(1.05rem, 2vw, 1.25rem);
      font-weight: 800;
      line-height: 1.2;
      cursor: pointer;
      box-shadow: 0 12px 24px rgba(31, 58, 95, 0.07);
      transition: transform 170ms ease, border-color 170ms ease, background 170ms ease, box-shadow 170ms ease;
    }

    .answer::before {
      content: attr(data-label);
      position: absolute;
      left: 18px;
      top: 50%;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      transform: translateY(-50%);
      display: grid;
      place-items: center;
      background: var(--paper);
      color: var(--navy);
      font-size: 0.92rem;
      font-weight: 900;
      border: 1px solid rgba(31, 58, 95, 0.16);
    }

    .answer:hover:not(:disabled) {
      transform: translateY(-2px);
      border-color: rgba(31, 58, 95, 0.46);
      box-shadow: 0 18px 30px rgba(31, 58, 95, 0.12);
    }

    .answer:focus-visible,
    .next-btn:focus-visible,
    .restart-btn:focus-visible {
      outline: 4px solid rgba(197, 138, 39, 0.35);
      outline-offset: 3px;
    }

    .answer:disabled {
      cursor: default;
    }

    .answer.dimmed {
      opacity: 0.55;
      box-shadow: none;
    }

    .answer.correct {
      border-color: rgba(35, 122, 75, 0.45);
      background: var(--green-soft);
      color: #123d29;
      animation: answerPop 360ms ease both;
    }

    .answer.wrong {
      border-color: rgba(178, 59, 59, 0.48);
      background: var(--red-soft);
      color: #5a1e1e;
      animation: answerShake 420ms ease both;
    }

    .answer.correct::before {
      background: var(--green);
      color: #fff;
      border-color: var(--green);
    }

    .answer.wrong::before {
      background: var(--red);
      color: #fff;
      border-color: var(--red);
    }

    .feedback-row {
      min-height: 76px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      border-top: 1px solid var(--line);
      padding-top: 18px;
    }

    .feedback {
      display: flex;
      align-items: center;
      gap: 13px;
      min-width: 0;
      color: var(--muted);
      font-weight: 800;
      line-height: 1.25;
    }

    .feedback strong {
      color: var(--ink);
    }

    .mark {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: none;
      place-items: center;
      flex: 0 0 auto;
      position: relative;
    }

    .mark.show {
      display: grid;
      animation: markIn 520ms cubic-bezier(.18, .89, .32, 1.28) both;
    }

    .mark.correct {
      background: var(--green);
    }

    .mark.correct::after {
      content: "";
      width: 23px;
      height: 13px;
      border-left: 5px solid #fff;
      border-bottom: 5px solid #fff;
      transform: rotate(-45deg) translate(1px, -2px);
    }

    .mark.wrong {
      background: var(--red);
    }

    .mark.wrong::before,
    .mark.wrong::after {
      content: "";
      position: absolute;
      width: 28px;
      height: 5px;
      border-radius: 999px;
      background: #fff;
    }

    .mark.wrong::before {
      transform: rotate(45deg);
    }

    .mark.wrong::after {
      transform: rotate(-45deg);
    }

    .next-btn,
    .restart-btn {
      border: 0;
      border-radius: var(--radius);
      padding: 15px 22px;
      background: var(--navy);
      color: #fff;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 16px 24px rgba(31, 58, 95, 0.18);
      transition: transform 170ms ease, background 170ms ease, opacity 170ms ease;
    }

    .next-btn:hover,
    .restart-btn:hover {
      transform: translateY(-2px);
      background: #162b47;
    }

    .next-btn[hidden] {
      display: none;
    }

    .result-card {
      width: min(920px, 100%);
      padding: clamp(22px, 4vw, 42px);
      border: 1px solid rgba(31, 58, 95, 0.18);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
      animation: cardIn 620ms cubic-bezier(.2, .8, .2, 1) both;
    }

    .result-hero {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 24px;
      align-items: center;
      margin-bottom: 26px;
    }

    .score-ring {
      --score-angle: 0deg;
      width: clamp(128px, 18vw, 170px);
      aspect-ratio: 1;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle, var(--panel) 0 59%, transparent 60%),
        conic-gradient(var(--green) var(--score-angle), rgba(31, 58, 95, 0.13) 0);
      color: var(--ink);
      border: 1px solid var(--line);
      box-shadow: inset 0 0 0 9px rgba(255, 255, 255, 0.72), 0 16px 30px rgba(31, 58, 95, 0.10);
    }

    .score-ring span {
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2.6rem, 7vw, 4.8rem);
      font-weight: 800;
      line-height: 1;
    }

    .result-copy h2 {
      margin: 0 0 10px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2rem, 4.4vw, 4rem);
      line-height: 1.02;
      letter-spacing: 0;
    }

    .result-copy p {
      margin: 0;
      color: var(--muted);
      font-size: 1.05rem;
      font-weight: 700;
      line-height: 1.45;
      max-width: 48ch;
    }

    .review {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 20px;
    }

    .review-item {
      display: grid;
      grid-template-columns: 34px 1fr;
      gap: 12px;
      align-items: start;
      padding: 15px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.68);
    }

    .mini-mark {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      position: relative;
    }

    .mini-mark.ok {
      background: var(--green);
    }

    .mini-mark.miss {
      background: var(--red);
    }

    .mini-mark.ok::after {
      content: "";
      width: 13px;
      height: 8px;
      border-left: 3px solid #fff;
      border-bottom: 3px solid #fff;
      transform: rotate(-45deg) translate(1px, -1px);
    }

    .mini-mark.miss::before,
    .mini-mark.miss::after {
      content: "";
      position: absolute;
      width: 16px;
      height: 3px;
      border-radius: 999px;
      background: #fff;
    }

    .mini-mark.miss::before {
      transform: rotate(45deg);
    }

    .mini-mark.miss::after {
      transform: rotate(-45deg);
    }

    .review-item h3 {
      margin: 0 0 5px;
      font-size: 0.98rem;
      line-height: 1.28;
    }

    .review-item p {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.35;
      font-weight: 700;
    }

    .burst {
      position: fixed;
      width: 10px;
      height: 16px;
      border-radius: 2px;
      top: -24px;
      left: var(--x);
      background: var(--c);
      pointer-events: none;
      animation: fall var(--d) linear forwards;
      transform: rotate(var(--r));
      z-index: 8;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(18px) scale(0.985);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes answerPop {
      0% { transform: scale(1); }
      55% { transform: scale(1.025); }
      100% { transform: scale(1); }
    }

    @keyframes answerShake {
      0%, 100% { transform: translateX(0); }
      22% { transform: translateX(-7px); }
      44% { transform: translateX(7px); }
      66% { transform: translateX(-4px); }
      88% { transform: translateX(4px); }
    }

    @keyframes markIn {
      from {
        opacity: 0;
        transform: scale(0.42) rotate(-14deg);
      }
      to {
        opacity: 1;
        transform: scale(1) rotate(0deg);
      }
    }

    @keyframes fall {
      to {
        transform: translate3d(var(--drift), 110vh, 0) rotate(calc(var(--r) + 540deg));
        opacity: 0.9;
      }
    }

    @media (max-width: 760px) {
      .app {
        width: min(100% - 20px, 1080px);
        padding-top: 16px;
      }

      .brand-row,
      .feedback-row,
      .result-hero {
        align-items: stretch;
        flex-direction: column;
      }

      .brand-row {
        display: grid;
      }

      .score-pill {
        width: 100%;
      }

      .quiz-card {
        min-height: calc(100vh - 168px);
      }

      .quiz-meta {
        align-items: flex-start;
        flex-direction: column;
      }

      .question {
        max-width: none;
      }

      .answers,
      .review {
        grid-template-columns: 1fr;
      }

      .answer {
        min-height: 72px;
        padding-left: 58px;
      }

      .next-btn,
      .restart-btn {
        width: 100%;
      }

      .result-hero {
        grid-template-columns: 1fr;
      }

      .score-ring {
        margin: 0 auto;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 1ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar" aria-label="Quiz status">
      <div class="brand-row">
        <div class="brand">
          <div class="seal" aria-hidden="true"><div class="seal-star"></div></div>
          <div>
            <h1>United States Trivia</h1>
            <p class="kicker">Basic civics, history, geography, and symbols</p>
          </div>
        </div>
        <div class="score-pill" id="scorePill">Score 0 / 10</div>
      </div>
      <div class="progress-wrap" aria-hidden="true">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </header>

    <main id="app" aria-live="polite"></main>
  </div>

  <script>
    const quizBank = [
      {
        topic: "Government",
        question: "What is the supreme law of the land?",
        answers: ["The Constitution", "The Declaration of Independence", "The Bill of Rights", "The Federal Register"],
        correct: "The Constitution",
        fact: "The Constitution sets up the national government and its limits."
      },
      {
        topic: "Founding",
        question: "What are the first three words of the Constitution?",
        answers: ["We the People", "Life and Liberty", "In Congress Assembled", "One Nation Under"],
        correct: "We the People",
        fact: "The preamble begins with the source of the government's authority."
      },
      {
        topic: "Congress",
        question: "What are the two parts of the U.S. Congress?",
        answers: ["The Senate and House of Representatives", "The Cabinet and Supreme Court", "The Army and Navy", "The President and Vice President"],
        correct: "The Senate and House of Representatives",
        fact: "Congress is bicameral, meaning it has two chambers."
      },
      {
        topic: "Congress",
        question: "How many U.S. Senators are there?",
        answers: ["100", "50", "435", "538"],
        correct: "100",
        fact: "Each state has two senators, and there are 50 states."
      },
      {
        topic: "Rights",
        question: "Which freedom is protected by the First Amendment?",
        answers: ["Freedom of speech", "Freedom from taxes", "Freedom to ignore laws", "Freedom to serve forever"],
        correct: "Freedom of speech",
        fact: "The First Amendment also protects religion, press, assembly, and petition."
      },
      {
        topic: "Branches",
        question: "The President is in charge of which branch?",
        answers: ["The executive branch", "The legislative branch", "The judicial branch", "The state branch"],
        correct: "The executive branch",
        fact: "The executive branch carries out and enforces federal laws."
      },
      {
        topic: "Courts",
        question: "What is the highest court in the United States?",
        answers: ["The Supreme Court", "The Court of Appeals", "The Senate Court", "The National Court"],
        correct: "The Supreme Court",
        fact: "The Supreme Court is the top court in the federal judiciary."
      },
      {
        topic: "Geography",
        question: "What is the capital of the United States?",
        answers: ["Washington, D.C.", "New York City", "Philadelphia", "Boston"],
        correct: "Washington, D.C.",
        fact: "Washington, D.C. is a federal district, not a state."
      },
      {
        topic: "Symbols",
        question: "How many stars are on the U.S. flag?",
        answers: ["50", "13", "48", "52"],
        correct: "50",
        fact: "The stars represent the 50 states."
      },
      {
        topic: "History",
        question: "When do Americans celebrate Independence Day?",
        answers: ["July 4", "January 1", "November 11", "December 25"],
        correct: "July 4",
        fact: "Independence Day marks the adoption of the Declaration of Independence in 1776."
      }
    ];

    const app = document.getElementById("app");
    const progressFill = document.getElementById("progressFill");
    const scorePill = document.getElementById("scorePill");
    const labels = ["A", "B", "C", "D"];

    let quiz = [];
    let index = 0;
    let score = 0;
    let locked = false;
    let responses = [];

    function shuffle(items) {
      const copy = [...items];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function startQuiz() {
      quiz = shuffle(quizBank).map(item => ({
        ...item,
        answers: shuffle(item.answers)
      }));
      index = 0;
      score = 0;
      locked = false;
      responses = [];
      updateTopbar();
      renderQuestion();
    }

    function updateTopbar() {
      const total = quizBank.length;
      scorePill.textContent = `Score ${score} / ${total}`;
      progressFill.style.width = `${Math.round((index / total) * 100)}%`;
    }

    function renderQuestion() {
      const item = quiz[index];
      locked = false;
      updateTopbar();
      app.innerHTML = `
        <section class="quiz-card" aria-labelledby="questionText">
          <div class="quiz-meta">
            <span>Question ${index + 1} of ${quiz.length}</span>
            <span class="topic-tag">${item.topic}</span>
          </div>
          <div class="question-area">
            <h2 class="question" id="questionText">${escapeHtml(item.question)}</h2>
            <div class="answers" id="answers"></div>
          </div>
          <div class="feedback-row">
            <div class="feedback" id="feedback">
              <span class="mark" id="feedbackMark" aria-hidden="true"></span>
              <span>Choose the best answer.</span>
            </div>
            <button class="next-btn" id="nextBtn" type="button" hidden>Next question</button>
          </div>
        </section>
      `;

      const answers = document.getElementById("answers");
      item.answers.forEach((answer, answerIndex) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "answer";
        button.dataset.label = labels[answerIndex];
        button.textContent = answer;
        button.addEventListener("click", () => selectAnswer(button, answer));
        answers.appendChild(button);
      });

      document.getElementById("nextBtn").addEventListener("click", goNext);
    }

    function selectAnswer(button, answer) {
      if (locked) return;
      locked = true;

      const item = quiz[index];
      const isCorrect = answer === item.correct;
      if (isCorrect) score += 1;

      responses.push({
        question: item.question,
        chosen: answer,
        correct: item.correct,
        fact: item.fact,
        isCorrect
      });

      const answerButtons = [...document.querySelectorAll(".answer")];
      answerButtons.forEach(option => {
        option.disabled = true;
        if (option.textContent === item.correct) {
          option.classList.add("correct");
        } else if (option === button) {
          option.classList.add("wrong");
        } else {
          option.classList.add("dimmed");
        }
      });

      const mark = document.getElementById("feedbackMark");
      const feedback = document.getElementById("feedback");
      mark.className = `mark show ${isCorrect ? "correct" : "wrong"}`;
      feedback.lastElementChild.innerHTML = isCorrect
        ? `<strong>Correct.</strong> ${escapeHtml(item.fact)}`
        : `<strong>Not quite.</strong> Answer: ${escapeHtml(item.correct)}. ${escapeHtml(item.fact)}`;

      index += 1;
      updateTopbar();

      const nextBtn = document.getElementById("nextBtn");
      nextBtn.textContent = index === quiz.length ? "See final score" : "Next question";
      nextBtn.hidden = false;
      nextBtn.focus({ preventScroll: true });
    }

    function goNext() {
      if (index >= quiz.length) {
        renderResults();
      } else {
        renderQuestion();
      }
    }

    function renderResults() {
      const total = quiz.length;
      const percent = Math.round((score / total) * 100);
      progressFill.style.width = "100%";
      scorePill.textContent = `Final score ${score} / ${total}`;

      const headline = score === total
        ? "Perfect score"
        : score >= 8
          ? "Strong finish"
          : score >= 6
            ? "Good progress"
            : "Keep practicing";

      app.innerHTML = `
        <section class="result-card" aria-labelledby="resultTitle">
          <div class="result-hero">
            <div class="score-ring" style="--score-angle: ${percent * 3.6}deg" aria-label="${score} out of ${total}">
              <span>${score}</span>
            </div>
            <div class="result-copy">
              <h2 id="resultTitle">${headline}</h2>
              <p>You answered ${score} of ${total} basic United States trivia questions correctly. Review your answers below, then try a new random order.</p>
            </div>
            <button class="restart-btn" type="button" id="restartBtn">Play again</button>
          </div>
          <div class="review" aria-label="Answer review">
            ${responses.map((response, itemIndex) => `
              <article class="review-item">
                <span class="mini-mark ${response.isCorrect ? "ok" : "miss"}" aria-hidden="true"></span>
                <div>
                  <h3>${itemIndex + 1}. ${escapeHtml(response.question)}</h3>
                  <p>${response.isCorrect ? "Correct" : `Your answer: ${escapeHtml(response.chosen)}`}. Answer: ${escapeHtml(response.correct)}.</p>
                </div>
              </article>
            `).join("")}
          </div>
        </section>
      `;

      document.getElementById("restartBtn").addEventListener("click", startQuiz);
      if (score >= 8) launchBurst();
    }

    function launchBurst() {
      const colors = ["#1f3a5f", "#b23b3b", "#c58a27", "#237a4b", "#ffffff"];
      for (let i = 0; i < 34; i++) {
        const piece = document.createElement("span");
        piece.className = "burst";
        piece.style.setProperty("--x", `${Math.random() * 100}vw`);
        piece.style.setProperty("--c", colors[Math.floor(Math.random() * colors.length)]);
        piece.style.setProperty("--d", `${2.6 + Math.random() * 2.4}s`);
        piece.style.setProperty("--r", `${Math.random() * 180}deg`);
        piece.style.setProperty("--drift", `${-80 + Math.random() * 160}px`);
        document.body.appendChild(piece);
        setTimeout(() => piece.remove(), 5200);
      }
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    startQuiz();
  </script>
</body>
</html>
