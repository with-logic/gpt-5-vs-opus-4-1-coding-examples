<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Falling Fruit Catcher</title>
  <style>
    :root {
      --sky: #75d7ff;
      --sky-deep: #3eb7f0;
      --grass: #54c45f;
      --grass-dark: #229b50;
      --ink: #173047;
      --cream: #fff7d6;
      --orange: #ff9f1c;
      --red: #ff4d5e;
      --blue: #2176ff;
      --green: #35c46a;
      --shadow: rgba(23, 48, 71, .22);
      --panel: rgba(255, 255, 255, .72);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--sky);
      color: var(--ink);
      font-family: "Trebuchet MS", "Avenir Next", Verdana, sans-serif;
    }

    body {
      display: grid;
      place-items: stretch;
    }

    .game-shell {
      position: relative;
      width: 100vw;
      height: 100dvh;
      min-height: 500px;
      isolation: isolate;
      background:
        radial-gradient(circle at 18% 14%, rgba(255, 255, 255, .94) 0 4.5rem, transparent 4.7rem),
        radial-gradient(circle at 26% 12%, rgba(255, 255, 255, .82) 0 3.1rem, transparent 3.3rem),
        radial-gradient(circle at 77% 20%, rgba(255, 255, 255, .9) 0 4rem, transparent 4.2rem),
        radial-gradient(circle at 86% 18%, rgba(255, 255, 255, .74) 0 2.7rem, transparent 2.9rem),
        linear-gradient(180deg, #8fe4ff 0%, #5cc9fb 58%, #9be566 58.2%, #53bd54 100%);
    }

    .game-shell::before,
    .game-shell::after {
      content: "";
      position: absolute;
      left: -12vw;
      right: -12vw;
      height: 11rem;
      bottom: -3.5rem;
      z-index: -1;
      pointer-events: none;
      background:
        radial-gradient(ellipse at 10% 68%, #2ea94e 0 4.6rem, transparent 4.8rem),
        radial-gradient(ellipse at 26% 72%, #73d946 0 5.6rem, transparent 5.8rem),
        radial-gradient(ellipse at 43% 66%, #26a45b 0 4.5rem, transparent 4.7rem),
        radial-gradient(ellipse at 63% 72%, #7bdf4d 0 6rem, transparent 6.2rem),
        radial-gradient(ellipse at 84% 67%, #209b52 0 4.9rem, transparent 5.1rem);
      opacity: .85;
    }

    .game-shell::after {
      bottom: -4.4rem;
      filter: blur(12px);
      opacity: .34;
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
      cursor: none;
    }

    .hud {
      position: absolute;
      top: max(16px, env(safe-area-inset-top));
      left: 50%;
      z-index: 3;
      display: flex;
      width: min(720px, calc(100vw - 28px));
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      transform: translateX(-50%);
      pointer-events: none;
    }

    .meter {
      display: inline-flex;
      align-items: center;
      min-height: 58px;
      padding: 8px 14px;
      border: 3px solid rgba(23, 48, 71, .16);
      border-bottom-width: 6px;
      border-radius: 18px;
      background: var(--panel);
      box-shadow: 0 12px 28px rgba(23, 48, 71, .12);
      backdrop-filter: blur(10px);
    }

    .score {
      min-width: 138px;
      gap: 10px;
    }

    .label {
      display: block;
      margin-bottom: 1px;
      color: rgba(23, 48, 71, .72);
      font-size: .72rem;
      font-weight: 900;
      letter-spacing: .08em;
      line-height: 1;
      text-transform: uppercase;
    }

    #scoreValue {
      display: block;
      font-size: clamp(1.7rem, 4.5vw, 2.45rem);
      font-weight: 900;
      line-height: .9;
    }

    .fruit-mark {
      display: grid;
      width: 38px;
      height: 38px;
      place-items: center;
      border-radius: 50%;
      background: #ffcf31;
      box-shadow: inset -5px -7px 0 rgba(255, 122, 22, .22);
      font-size: 1.55rem;
    }

    .lives {
      gap: 6px;
    }

    .heart {
      position: relative;
      width: 28px;
      height: 28px;
      transform: rotate(-45deg);
      border-radius: 7px 7px 3px 7px;
      background: var(--red);
      box-shadow: inset -4px -5px 0 rgba(128, 0, 28, .16);
      transition: transform .18s ease, opacity .18s ease, filter .18s ease;
    }

    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: inherit;
    }

    .heart::before {
      top: -14px;
      left: 0;
    }

    .heart::after {
      top: 0;
      left: 14px;
    }

    .heart.lost {
      opacity: .25;
      filter: grayscale(1);
      transform: rotate(-45deg) scale(.72);
    }

    .combo {
      min-width: 88px;
      justify-content: center;
      font-size: 1.2rem;
      font-weight: 900;
      color: var(--blue);
      transform-origin: center;
      opacity: 0;
    }

    .combo.show {
      animation: pop .42s cubic-bezier(.2, 1.5, .42, 1) both;
    }

    .overlay {
      position: absolute;
      inset: 0;
      z-index: 4;
      display: grid;
      place-items: center;
      padding: 24px;
      background: linear-gradient(180deg, rgba(117, 215, 255, .18), rgba(52, 180, 87, .22));
      transition: opacity .25s ease, visibility .25s ease;
    }

    .overlay.hidden {
      visibility: hidden;
      opacity: 0;
      pointer-events: none;
    }

    .start-card {
      width: min(510px, 100%);
      padding: clamp(22px, 5vw, 36px);
      border: 4px solid rgba(23, 48, 71, .18);
      border-bottom-width: 8px;
      border-radius: 26px;
      background: rgba(255, 247, 214, .96);
      box-shadow: 0 26px 70px rgba(23, 48, 71, .22);
      text-align: center;
      animation: rise .55s cubic-bezier(.2, 1, .25, 1) both;
    }

    .title {
      margin: 0;
      color: #12324b;
      font-size: clamp(2.4rem, 9vw, 4.7rem);
      font-weight: 1000;
      letter-spacing: 0;
      line-height: .86;
      text-wrap: balance;
      text-shadow: 0 5px 0 rgba(255, 180, 38, .45);
    }

    .subtitle {
      max-width: 32ch;
      margin: 18px auto 22px;
      color: rgba(23, 48, 71, .82);
      font-size: clamp(1rem, 2.6vw, 1.25rem);
      font-weight: 800;
      line-height: 1.35;
    }

    .fruit-row {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 14px 0 18px;
    }

    .fruit-chip {
      display: grid;
      width: 46px;
      height: 46px;
      place-items: center;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 8px 0 rgba(23, 48, 71, .1);
      font-size: 1.7rem;
      animation: bob 1.8s ease-in-out infinite;
    }

    .fruit-chip:nth-child(2) { animation-delay: -.22s; }
    .fruit-chip:nth-child(3) { animation-delay: -.44s; }
    .fruit-chip:nth-child(4) { animation-delay: -.66s; }
    .fruit-chip:nth-child(5) { animation-delay: -.88s; }

    .primary-btn {
      appearance: none;
      min-width: 190px;
      padding: 17px 28px 15px;
      border: 0;
      border-radius: 999px;
      background: #ff9f1c;
      color: #12324b;
      box-shadow: inset 0 -6px 0 rgba(141, 69, 0, .2), 0 14px 24px rgba(255, 134, 13, .28);
      font: inherit;
      font-size: 1.25rem;
      font-weight: 1000;
      cursor: pointer;
      transition: transform .16s ease, box-shadow .16s ease, filter .16s ease;
    }

    .primary-btn:hover {
      transform: translateY(-2px) scale(1.02);
      filter: saturate(1.08);
      box-shadow: inset 0 -6px 0 rgba(141, 69, 0, .2), 0 18px 30px rgba(255, 134, 13, .35);
    }

    .primary-btn:active {
      transform: translateY(2px) scale(.98);
      box-shadow: inset 0 -3px 0 rgba(141, 69, 0, .2), 0 9px 16px rgba(255, 134, 13, .24);
    }

    .primary-btn:focus-visible {
      outline: 4px solid #2176ff;
      outline-offset: 5px;
    }

    .tip {
      margin: 16px 0 0;
      color: rgba(23, 48, 71, .66);
      font-size: .9rem;
      font-weight: 800;
    }

    .spark {
      position: absolute;
      z-index: 2;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #fff25a;
      pointer-events: none;
      animation: spark .58s ease-out forwards;
    }

    .screen-flash {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      opacity: 0;
      background: rgba(255, 255, 255, .72);
    }

    .screen-flash.on {
      animation: flash .18s ease-out;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(18px) scale(.96);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes bob {
      0%, 100% { transform: translateY(0) rotate(-3deg); }
      50% { transform: translateY(-8px) rotate(4deg); }
    }

    @keyframes pop {
      0% { opacity: 0; transform: scale(.6) translateY(8px); }
      45% { opacity: 1; transform: scale(1.14) translateY(-1px); }
      100% { opacity: 0; transform: scale(1) translateY(-14px); }
    }

    @keyframes spark {
      to {
        opacity: 0;
        transform: translate(var(--tx), var(--ty)) scale(.15);
      }
    }

    @keyframes flash {
      0% { opacity: .76; }
      100% { opacity: 0; }
    }

    @media (max-width: 620px) {
      .game-shell {
        min-height: 440px;
      }

      .hud {
        width: calc(100vw - 18px);
        gap: 6px;
      }

      .meter {
        min-height: 50px;
        padding: 7px 10px;
        border-radius: 15px;
      }

      .score {
        min-width: 116px;
      }

      .fruit-mark {
        width: 32px;
        height: 32px;
        font-size: 1.25rem;
      }

      .heart,
      .heart::before,
      .heart::after {
        width: 23px;
        height: 23px;
      }

      .heart::before { top: -11.5px; }
      .heart::after { left: 11.5px; }

      .combo {
        min-width: 58px;
        font-size: .95rem;
      }

      .start-card {
        border-radius: 22px;
      }

      .tip {
        font-size: .82rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: .01ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="game-shell" aria-label="Falling Fruit Catcher game">
    <canvas id="gameCanvas" aria-label="Falling fruits game area"></canvas>

    <section class="hud" aria-live="polite">
      <div class="meter score">
        <span class="fruit-mark" aria-hidden="true">🍊</span>
        <span>
          <span class="label">Score</span>
          <span id="scoreValue">0</span>
        </span>
      </div>
      <div id="combo" class="meter combo" aria-hidden="true">+1</div>
      <div class="meter lives" aria-label="Lives remaining">
        <span class="heart" data-life="1"></span>
        <span class="heart" data-life="2"></span>
        <span class="heart" data-life="3"></span>
      </div>
    </section>

    <div id="screenFlash" class="screen-flash" aria-hidden="true"></div>

    <section id="overlay" class="overlay">
      <div class="start-card">
        <h1 id="overlayTitle" class="title">Fruit Catcher</h1>
        <div class="fruit-row" aria-hidden="true">
          <span class="fruit-chip">🍎</span>
          <span class="fruit-chip">🍌</span>
          <span class="fruit-chip">🍐</span>
          <span class="fruit-chip">🍓</span>
          <span class="fruit-chip">🍉</span>
        </div>
        <p id="overlayText" class="subtitle">Catch the big fruit before it lands in the grass.</p>
        <button id="startButton" class="primary-btn" type="button">Start Game</button>
        <p class="tip">Mouse, touch, or arrow keys</p>
      </div>
    </section>
  </main>

  <script>
    (() => {
      "use strict";

      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");
      const scoreEl = document.getElementById("scoreValue");
      const comboEl = document.getElementById("combo");
      const overlay = document.getElementById("overlay");
      const overlayTitle = document.getElementById("overlayTitle");
      const overlayText = document.getElementById("overlayText");
      const startButton = document.getElementById("startButton");
      const screenFlash = document.getElementById("screenFlash");
      const hearts = Array.from(document.querySelectorAll(".heart"));

      const fruitTypes = [
        { name: "apple", color: "#ff4d5e", dark: "#d92e43", leaf: "#2fbf71", points: 1 },
        { name: "orange", color: "#ff9f1c", dark: "#e77700", leaf: "#3bc86e", points: 1 },
        { name: "pear", color: "#b6e84f", dark: "#79b737", leaf: "#249e54", points: 1 },
        { name: "berry", color: "#ef476f", dark: "#a6204c", leaf: "#2fbf71", points: 1 },
        { name: "watermelon", color: "#23c15f", dark: "#117d40", flesh: "#ff5a78", points: 1 },
        { name: "banana", color: "#ffd447", dark: "#d59518", points: 1 }
      ];

      const state = {
        width: 0,
        height: 0,
        dpr: 1,
        running: false,
        gameOver: false,
        score: 0,
        misses: 0,
        lastTime: 0,
        spawnTimer: 0,
        spawnInterval: 830,
        windTime: 0,
        fruit: [],
        particles: [],
        keys: { left: false, right: false },
        pointerActive: false,
        pointerX: 0,
        basket: {
          x: 0,
          y: 0,
          width: 152,
          height: 64,
          speed: 650,
          tilt: 0,
          squash: 1
        }
      };

      function resize() {
        const rect = canvas.getBoundingClientRect();
        state.width = Math.max(320, rect.width);
        state.height = Math.max(440, rect.height);
        state.dpr = Math.max(1, Math.min(window.devicePixelRatio || 1, 2));
        canvas.width = Math.round(state.width * state.dpr);
        canvas.height = Math.round(state.height * state.dpr);
        ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);

        const mobileScale = state.width < 560 ? .82 : 1;
        state.basket.width = Math.max(118, Math.min(174, state.width * .22)) * mobileScale;
        state.basket.height = Math.max(52, state.basket.width * .42);
        state.basket.y = state.height - state.basket.height - Math.max(22, state.height * .035);
        if (!state.basket.x) state.basket.x = state.width / 2;
        state.basket.x = clamp(state.basket.x, state.basket.width / 2, state.width - state.basket.width / 2);
      }

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function rand(min, max) {
        return Math.random() * (max - min) + min;
      }

      function resetGame() {
        state.running = true;
        state.gameOver = false;
        state.score = 0;
        state.misses = 0;
        state.spawnTimer = 220;
        state.spawnInterval = 820;
        state.fruit.length = 0;
        state.particles.length = 0;
        state.lastTime = performance.now();
        state.basket.x = state.width / 2;
        state.basket.tilt = 0;
        state.basket.squash = 1;
        scoreEl.textContent = "0";
        updateLives();
        overlay.classList.add("hidden");
        spawnFruit(true);
        requestAnimationFrame(loop);
      }

      function endGame() {
        state.running = false;
        state.gameOver = true;
        overlayTitle.textContent = "Great Catching!";
        overlayText.textContent = `You caught ${state.score} fruit${state.score === 1 ? "" : "s"}.`;
        startButton.textContent = "Play Again";
        overlay.classList.remove("hidden");
      }

      function updateLives() {
        hearts.forEach((heart, index) => {
          heart.classList.toggle("lost", index < state.misses);
        });
      }

      function updateScore(points) {
        state.score += points;
        scoreEl.textContent = String(state.score);
        comboEl.textContent = `+${points}`;
        comboEl.classList.remove("show");
        void comboEl.offsetWidth;
        comboEl.classList.add("show");
      }

      function spawnFruit(first = false) {
        const type = fruitTypes[Math.floor(Math.random() * fruitTypes.length)];
        const difficulty = Math.min(1, state.score / 45);
        const radius = rand(27, 42) * (state.width < 560 ? .88 : 1);
        const margin = radius + 12;
        const x = first ? state.width / 2 : rand(margin, state.width - margin);
        const speed = rand(120, 205) + difficulty * 125;
        const sway = rand(18, 58);

        state.fruit.push({
          type,
          x,
          y: -radius - rand(8, 80),
          baseX: x,
          radius,
          speed,
          rotation: rand(-.7, .7),
          spin: rand(-1.4, 1.4),
          sway,
          phase: rand(0, Math.PI * 2),
          caught: false
        });

        state.spawnInterval = Math.max(390, 835 - state.score * 8);
      }

      function loop(time) {
        if (!state.running) return;
        const dt = Math.min(32, time - state.lastTime) / 1000;
        state.lastTime = time;

        update(dt);
        draw();
        requestAnimationFrame(loop);
      }

      function update(dt) {
        state.windTime += dt;
        updateBasket(dt);

        state.spawnTimer -= dt * 1000;
        if (state.spawnTimer <= 0) {
          spawnFruit();
          state.spawnTimer = state.spawnInterval + rand(-130, 180);
        }

        const basket = state.basket;
        const basketTop = basket.y + basket.height * .12;
        const basketLeft = basket.x - basket.width * .48;
        const basketRight = basket.x + basket.width * .48;

        for (let i = state.fruit.length - 1; i >= 0; i--) {
          const fruit = state.fruit[i];
          fruit.y += fruit.speed * dt;
          fruit.rotation += fruit.spin * dt;
          fruit.x = fruit.baseX + Math.sin(state.windTime * 1.6 + fruit.phase) * fruit.sway;

          const catchY = fruit.y + fruit.radius * .62 >= basketTop && fruit.y - fruit.radius * .15 <= basket.y + basket.height * .7;
          const catchX = fruit.x > basketLeft - fruit.radius * .15 && fruit.x < basketRight + fruit.radius * .15;

          if (catchY && catchX && !fruit.caught) {
            fruit.caught = true;
            state.fruit.splice(i, 1);
            updateScore(fruit.type.points);
            burst(fruit.x, fruit.y, fruit.type.color);
            state.basket.squash = .82;
            state.basket.tilt += (fruit.x - basket.x) * .012;
            flash();
            continue;
          }

          if (fruit.y - fruit.radius > state.height + 10) {
            state.fruit.splice(i, 1);
            state.misses += 1;
            updateLives();
            splash(fruit.x, state.height - 36, fruit.type.color);
            if (state.misses >= 3) {
              endGame();
              return;
            }
          }
        }

        for (let i = state.particles.length - 1; i >= 0; i--) {
          const particle = state.particles[i];
          particle.life -= dt;
          particle.x += particle.vx * dt;
          particle.y += particle.vy * dt;
          particle.vy += 620 * dt;
          particle.rotation += particle.spin * dt;
          if (particle.life <= 0) state.particles.splice(i, 1);
        }
      }

      function updateBasket(dt) {
        const basket = state.basket;
        let targetVelocity = 0;

        if (state.keys.left) targetVelocity -= basket.speed;
        if (state.keys.right) targetVelocity += basket.speed;

        if (state.pointerActive) {
          const target = clamp(state.pointerX, basket.width / 2, state.width - basket.width / 2);
          const diff = target - basket.x;
          basket.x += diff * Math.min(1, dt * 12);
          basket.tilt += diff * .0009;
        } else if (targetVelocity !== 0) {
          basket.x += targetVelocity * dt;
          basket.tilt += targetVelocity * dt * .012;
        }

        basket.x = clamp(basket.x, basket.width / 2 + 6, state.width - basket.width / 2 - 6);
        basket.tilt *= Math.pow(.001, dt);
        basket.tilt = clamp(basket.tilt, -.22, .22);
        basket.squash += (1 - basket.squash) * Math.min(1, dt * 8);
      }

      function burst(x, y, color) {
        for (let i = 0; i < 18; i++) {
          const angle = rand(-Math.PI, 0);
          const speed = rand(130, 340);
          state.particles.push({
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - rand(20, 90),
            radius: rand(4, 9),
            color: i % 3 === 0 ? "#fff25a" : color,
            life: rand(.45, .85),
            maxLife: .85,
            rotation: rand(0, Math.PI),
            spin: rand(-8, 8)
          });
        }
      }

      function splash(x, y, color) {
        for (let i = 0; i < 10; i++) {
          state.particles.push({
            x,
            y,
            vx: rand(-160, 160),
            vy: rand(-220, -80),
            radius: rand(5, 10),
            color,
            life: rand(.38, .68),
            maxLife: .68,
            rotation: rand(0, Math.PI),
            spin: rand(-7, 7)
          });
        }
      }

      function flash() {
        screenFlash.classList.remove("on");
        void screenFlash.offsetWidth;
        screenFlash.classList.add("on");
      }

      function draw() {
        ctx.clearRect(0, 0, state.width, state.height);
        drawClouds();
        drawSun();
        drawFruit();
        drawParticles();
        drawBasket();
        drawGrassDetails();
      }

      function drawClouds() {
        ctx.save();
        ctx.globalAlpha = .34;
        const drift = (state.windTime * 16) % (state.width + 260);
        drawCloud(120 + drift, 118, 1.05);
        drawCloud(-180 + drift * .7, 238, .72);
        drawCloud(state.width - 80 - drift * .45, 176, .86);
        ctx.restore();
      }

      function drawCloud(x, y, scale) {
        ctx.save();
        ctx.translate(x, y);
        ctx.scale(scale, scale);
        ctx.fillStyle = "#ffffff";
        ctx.beginPath();
        ctx.arc(-54, 12, 28, 0, Math.PI * 2);
        ctx.arc(-25, -3, 39, 0, Math.PI * 2);
        ctx.arc(20, 3, 33, 0, Math.PI * 2);
        ctx.arc(54, 17, 23, 0, Math.PI * 2);
        ctx.rect(-58, 10, 114, 31);
        ctx.fill();
        ctx.restore();
      }

      function drawSun() {
        const x = state.width - 72;
        const y = 95;
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(state.windTime * .22);
        for (let i = 0; i < 12; i++) {
          ctx.rotate(Math.PI / 6);
          roundRect(ctx, -5, -66, 10, 25, 5);
          ctx.fillStyle = "rgba(255, 211, 49, .72)";
          ctx.fill();
        }
        ctx.beginPath();
        ctx.arc(0, 0, 42, 0, Math.PI * 2);
        ctx.fillStyle = "#ffd447";
        ctx.fill();
        ctx.beginPath();
        ctx.arc(-12, -10, 6, 0, Math.PI * 2);
        ctx.arc(13, -10, 6, 0, Math.PI * 2);
        ctx.fillStyle = "#173047";
        ctx.fill();
        ctx.beginPath();
        ctx.arc(0, 4, 18, .15, Math.PI - .15);
        ctx.lineWidth = 5;
        ctx.lineCap = "round";
        ctx.strokeStyle = "#173047";
        ctx.stroke();
        ctx.restore();
      }

      function drawFruit() {
        for (const fruit of state.fruit) {
          ctx.save();
          ctx.translate(fruit.x, fruit.y);
          ctx.rotate(fruit.rotation);
          const r = fruit.radius;
          if (fruit.type.name === "banana") drawBanana(r, fruit.type);
          else if (fruit.type.name === "watermelon") drawWatermelon(r, fruit.type);
          else if (fruit.type.name === "berry") drawBerry(r, fruit.type);
          else drawRoundFruit(r, fruit.type);
          ctx.restore();
        }
      }

      function drawRoundFruit(r, type) {
        ctx.save();
        ctx.shadowColor = "rgba(23, 48, 71, .22)";
        ctx.shadowBlur = 12;
        ctx.shadowOffsetY = 8;
        ctx.beginPath();
        if (type.name === "pear") {
          ctx.moveTo(0, -r * .92);
          ctx.bezierCurveTo(r * .76, -r * .66, r * .88, r * .3, r * .44, r * .77);
          ctx.bezierCurveTo(r * .12, r * 1.08, -r * .5, r, -r * .72, r * .43);
          ctx.bezierCurveTo(-r, -r * .25, -r * .48, -r * .78, 0, -r * .92);
        } else {
          ctx.arc(0, 0, r, 0, Math.PI * 2);
        }
        ctx.fillStyle = type.color;
        ctx.fill();
        ctx.shadowColor = "transparent";
        ctx.beginPath();
        ctx.ellipse(r * .28, r * .18, r * .46, r * .55, -.58, 0, Math.PI * 2);
        ctx.fillStyle = type.dark;
        ctx.globalAlpha = .18;
        ctx.fill();
        ctx.globalAlpha = 1;
        ctx.beginPath();
        ctx.ellipse(-r * .35, -r * .32, r * .18, r * .28, .7, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255,255,255,.58)";
        ctx.fill();
        ctx.strokeStyle = "#75481c";
        ctx.lineWidth = Math.max(4, r * .12);
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(0, -r * .78);
        ctx.quadraticCurveTo(r * .1, -r * 1.04, r * .22, -r * 1.16);
        ctx.stroke();
        ctx.beginPath();
        ctx.ellipse(r * .38, -r * 1.02, r * .28, r * .13, -.42, 0, Math.PI * 2);
        ctx.fillStyle = type.leaf;
        ctx.fill();
        ctx.restore();
      }

      function drawBerry(r, type) {
        ctx.save();
        ctx.shadowColor = "rgba(23, 48, 71, .22)";
        ctx.shadowBlur = 12;
        ctx.shadowOffsetY = 8;
        ctx.beginPath();
        ctx.moveTo(0, -r);
        ctx.bezierCurveTo(r * .9, -r * .7, r * .82, r * .3, 0, r * 1.05);
        ctx.bezierCurveTo(-r * .82, r * .3, -r * .9, -r * .7, 0, -r);
        ctx.fillStyle = type.color;
        ctx.fill();
        ctx.shadowColor = "transparent";
        ctx.fillStyle = "rgba(255,255,255,.72)";
        for (let row = 0; row < 4; row++) {
          for (let col = 0; col < 3; col++) {
            const x = (col - 1) * r * .32 + (row % 2 ? r * .14 : 0);
            const y = -r * .42 + row * r * .34;
            ctx.beginPath();
            ctx.ellipse(x, y, r * .07, r * .11, .4, 0, Math.PI * 2);
            ctx.fill();
          }
        }
        ctx.fillStyle = type.leaf;
        for (let i = 0; i < 5; i++) {
          ctx.save();
          ctx.rotate((i - 2) * .42);
          ctx.beginPath();
          ctx.ellipse(0, -r * .88, r * .13, r * .34, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
        ctx.restore();
      }

      function drawWatermelon(r, type) {
        ctx.save();
        ctx.shadowColor = "rgba(23, 48, 71, .22)";
        ctx.shadowBlur = 12;
        ctx.shadowOffsetY = 8;
        ctx.beginPath();
        ctx.arc(0, 0, r, 0, Math.PI * 2);
        ctx.fillStyle = type.color;
        ctx.fill();
        ctx.shadowColor = "transparent";
        ctx.beginPath();
        ctx.arc(0, 0, r * .74, 0, Math.PI * 2);
        ctx.fillStyle = type.flesh;
        ctx.fill();
        ctx.fillStyle = "#173047";
        for (let i = 0; i < 5; i++) {
          const a = i * Math.PI * .4 + .4;
          ctx.beginPath();
          ctx.ellipse(Math.cos(a) * r * .34, Math.sin(a) * r * .26, r * .055, r * .12, a, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.strokeStyle = "rgba(255,255,255,.5)";
        ctx.lineWidth = r * .1;
        ctx.beginPath();
        ctx.arc(0, 0, r * .86, .05, Math.PI * 2 - .05);
        ctx.stroke();
        ctx.restore();
      }

      function drawBanana(r, type) {
        ctx.save();
        ctx.shadowColor = "rgba(23, 48, 71, .22)";
        ctx.shadowBlur = 12;
        ctx.shadowOffsetY = 8;
        ctx.beginPath();
        ctx.moveTo(-r * .95, -r * .25);
        ctx.bezierCurveTo(-r * .25, r * .98, r * .92, r * .36, r * 1.05, -r * .52);
        ctx.bezierCurveTo(r * .5, r * .2, -r * .12, r * .18, -r * .6, -r * .5);
        ctx.closePath();
        ctx.fillStyle = type.color;
        ctx.fill();
        ctx.shadowColor = "transparent";
        ctx.strokeStyle = "rgba(117,72,28,.32)";
        ctx.lineWidth = r * .08;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(-r * .54, -r * .22);
        ctx.bezierCurveTo(-r * .08, r * .32, r * .55, r * .17, r * .78, -r * .32);
        ctx.stroke();
        ctx.fillStyle = "#75481c";
        ctx.beginPath();
        ctx.arc(-r * .9, -r * .28, r * .1, 0, Math.PI * 2);
        ctx.arc(r * 1.03, -r * .52, r * .1, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function drawParticles() {
        for (const particle of state.particles) {
          const alpha = clamp(particle.life / particle.maxLife, 0, 1);
          ctx.save();
          ctx.translate(particle.x, particle.y);
          ctx.rotate(particle.rotation);
          ctx.globalAlpha = alpha;
          ctx.fillStyle = particle.color;
          roundRect(ctx, -particle.radius, -particle.radius, particle.radius * 2, particle.radius * 1.45, particle.radius * .45);
          ctx.fill();
          ctx.restore();
        }
      }

      function drawBasket() {
        const b = state.basket;
        ctx.save();
        ctx.translate(b.x, b.y + b.height / 2);
        ctx.rotate(b.tilt);
        ctx.scale(1 + (1 - b.squash) * .2, b.squash);

        ctx.fillStyle = "rgba(23,48,71,.18)";
        ctx.beginPath();
        ctx.ellipse(0, b.height * .56, b.width * .46, b.height * .18, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.lineCap = "round";
        ctx.strokeStyle = "#8a5222";
        ctx.lineWidth = Math.max(8, b.height * .12);
        ctx.beginPath();
        ctx.arc(0, -b.height * .08, b.width * .34, Math.PI * 1.04, Math.PI * 1.96);
        ctx.stroke();

        const bodyHeight = b.height * .58;
        const topY = -b.height * .07;
        const bottomY = b.height * .42;
        ctx.beginPath();
        ctx.moveTo(-b.width * .47, topY);
        ctx.quadraticCurveTo(-b.width * .38, bottomY, -b.width * .25, bottomY);
        ctx.lineTo(b.width * .25, bottomY);
        ctx.quadraticCurveTo(b.width * .38, bottomY, b.width * .47, topY);
        ctx.closePath();
        ctx.fillStyle = "#b87333";
        ctx.fill();

        ctx.save();
        ctx.clip();
        ctx.strokeStyle = "rgba(255, 219, 145, .7)";
        ctx.lineWidth = 8;
        for (let x = -b.width * .5; x < b.width * .55; x += 24) {
          ctx.beginPath();
          ctx.moveTo(x, topY - 6);
          ctx.lineTo(x + b.width * .2, bottomY + 5);
          ctx.stroke();
        }
        ctx.strokeStyle = "rgba(96, 52, 23, .25)";
        for (let y = topY + 12; y < bottomY + 4; y += 19) {
          ctx.beginPath();
          ctx.moveTo(-b.width * .46, y);
          ctx.quadraticCurveTo(0, y + 10, b.width * .46, y);
          ctx.stroke();
        }
        ctx.restore();

        ctx.fillStyle = "#d99442";
        roundRect(ctx, -b.width * .51, topY - 13, b.width * 1.02, 21, 12);
        ctx.fill();
        ctx.strokeStyle = "rgba(23,48,71,.18)";
        ctx.lineWidth = 3;
        ctx.stroke();

        ctx.fillStyle = "#fff7d6";
        ctx.beginPath();
        ctx.ellipse(-b.width * .18, topY - 3, b.width * .16, 5, -.08, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function drawGrassDetails() {
        const baseY = state.height - 24;
        ctx.save();
        ctx.strokeStyle = "rgba(19, 98, 54, .3)";
        ctx.lineWidth = 3;
        ctx.lineCap = "round";
        for (let x = 8; x < state.width; x += 18) {
          const h = 10 + ((x * 13) % 19);
          ctx.beginPath();
          ctx.moveTo(x, baseY + 18);
          ctx.quadraticCurveTo(x + 4, baseY + 8, x + ((x % 3) - 1) * 5, baseY + 18 - h);
          ctx.stroke();
        }
        ctx.restore();
      }

      function roundRect(context, x, y, width, height, radius) {
        const r = Math.min(radius, width / 2, height / 2);
        context.beginPath();
        context.moveTo(x + r, y);
        context.arcTo(x + width, y, x + width, y + height, r);
        context.arcTo(x + width, y + height, x, y + height, r);
        context.arcTo(x, y + height, x, y, r);
        context.arcTo(x, y, x + width, y, r);
        context.closePath();
      }

      function setPointer(clientX) {
        const rect = canvas.getBoundingClientRect();
        state.pointerX = clientX - rect.left;
        state.pointerActive = true;
      }

      window.addEventListener("resize", resize);
      window.addEventListener("keydown", (event) => {
        if (event.key === "ArrowLeft" || event.key === "a" || event.key === "A") {
          state.keys.left = true;
          state.pointerActive = false;
          event.preventDefault();
        }
        if (event.key === "ArrowRight" || event.key === "d" || event.key === "D") {
          state.keys.right = true;
          state.pointerActive = false;
          event.preventDefault();
        }
        if ((event.key === "Enter" || event.key === " ") && !state.running) {
          event.preventDefault();
          resetGame();
        }
      });

      window.addEventListener("keyup", (event) => {
        if (event.key === "ArrowLeft" || event.key === "a" || event.key === "A") state.keys.left = false;
        if (event.key === "ArrowRight" || event.key === "d" || event.key === "D") state.keys.right = false;
      });

      canvas.addEventListener("pointerdown", (event) => {
        setPointer(event.clientX);
        canvas.setPointerCapture(event.pointerId);
      });

      canvas.addEventListener("pointermove", (event) => {
        setPointer(event.clientX);
      });

      canvas.addEventListener("pointerup", () => {
        state.pointerActive = false;
      });

      canvas.addEventListener("pointercancel", () => {
        state.pointerActive = false;
      });

      startButton.addEventListener("click", resetGame);

      document.addEventListener("visibilitychange", () => {
        if (!document.hidden && state.running) {
          state.lastTime = performance.now();
          requestAnimationFrame(loop);
        }
      });

      resize();
      draw();
    })();
  </script>
</body>
</html>
