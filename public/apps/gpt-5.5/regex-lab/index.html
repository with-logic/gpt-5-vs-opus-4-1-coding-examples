<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Regex Lab</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #070a0d;
      --panel: #0d1216;
      --panel-2: #111920;
      --panel-3: #18232c;
      --text: #e8f1f2;
      --muted: #91a4ad;
      --faint: #53656e;
      --line: #24323b;
      --line-strong: #334650;
      --accent: #58f4b8;
      --accent-2: #f2cd5d;
      --danger: #ff667c;
      --ok: #4dd990;
      --shadow: rgba(0, 0, 0, 0.38);
      --group-1: rgba(88, 244, 184, 0.30);
      --group-2: rgba(111, 191, 255, 0.30);
      --group-3: rgba(242, 205, 93, 0.34);
      --group-4: rgba(245, 132, 255, 0.28);
      --group-5: rgba(255, 151, 105, 0.28);
      --group-6: rgba(145, 245, 255, 0.26);
      --radius: 8px;
      --mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      --sans: "Aptos", "Segoe UI", sans-serif;
    }

    [data-theme="light"] {
      color-scheme: light;
      --bg: #eef2f0;
      --panel: #fbfcfa;
      --panel-2: #f3f6f4;
      --panel-3: #e8eeeb;
      --text: #122023;
      --muted: #586c73;
      --faint: #7e9096;
      --line: #d0dbd7;
      --line-strong: #b6c6c1;
      --accent: #0b8f68;
      --accent-2: #9b6a00;
      --danger: #bf263f;
      --ok: #0d8959;
      --shadow: rgba(24, 42, 39, 0.12);
      --group-1: rgba(11, 143, 104, 0.22);
      --group-2: rgba(0, 110, 190, 0.18);
      --group-3: rgba(181, 126, 0, 0.20);
      --group-4: rgba(164, 64, 183, 0.17);
      --group-5: rgba(202, 86, 37, 0.17);
      --group-6: rgba(0, 140, 154, 0.17);
    }

    * { box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      margin: 0;
      background:
        linear-gradient(180deg, rgba(88, 244, 184, 0.04), transparent 36rem),
        var(--bg);
      color: var(--text);
      font-family: var(--sans);
      letter-spacing: 0;
    }

    button, input, textarea {
      font: inherit;
      color: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: var(--panel-2);
      border-radius: 6px;
      cursor: pointer;
      transition: transform 140ms ease, border-color 140ms ease, background 140ms ease, color 140ms ease;
    }

    button:hover {
      border-color: var(--line-strong);
      background: var(--panel-3);
      transform: translateY(-1px);
    }

    button:focus-visible,
    input:focus-visible,
    textarea:focus-visible {
      outline: 2px solid color-mix(in srgb, var(--accent), transparent 20%);
      outline-offset: 2px;
    }

    .app {
      min-height: 100%;
      padding: 22px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 16px;
    }

    .terminal {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: 0 24px 80px var(--shadow);
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, var(--panel-2), var(--panel));
    }

    .title {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .lights {
      display: flex;
      gap: 6px;
      flex: 0 0 auto;
    }

    .light {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: var(--faint);
    }

    .light:nth-child(1) { background: #ff5f57; }
    .light:nth-child(2) { background: #ffbd2e; }
    .light:nth-child(3) { background: #28c840; }

    h1 {
      margin: 0;
      font-family: var(--mono);
      font-size: clamp(1.05rem, 1.6vw, 1.35rem);
      font-weight: 750;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .status-line {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.82rem;
    }

    .status-pill {
      color: var(--accent);
      border: 1px solid color-mix(in srgb, var(--accent), transparent 68%);
      background: color-mix(in srgb, var(--accent), transparent 92%);
      border-radius: 999px;
      padding: 4px 8px;
      white-space: nowrap;
    }

    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .control-button {
      min-height: 34px;
      padding: 7px 10px;
      font-size: 0.82rem;
      font-family: var(--mono);
      white-space: nowrap;
    }

    main {
      display: grid;
      grid-template-columns: minmax(320px, 0.95fr) minmax(420px, 1.35fr);
      gap: 0;
      min-height: calc(100vh - 104px);
    }

    .left,
    .right {
      min-width: 0;
      padding: 16px;
    }

    .left {
      border-right: 1px solid var(--line);
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 14px;
    }

    .right {
      display: grid;
      grid-template-rows: minmax(210px, 0.9fr) minmax(210px, 0.85fr) minmax(180px, 0.7fr);
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    label,
    .section-title {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 0.78rem;
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .input-shell {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: stretch;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #050709;
      overflow: hidden;
    }

    [data-theme="light"] .input-shell {
      background: #ffffff;
    }

    .slash {
      display: grid;
      place-items: center;
      padding: 0 11px;
      color: var(--accent);
      font-family: var(--mono);
      border-right: 1px solid var(--line);
      background: var(--panel-2);
    }

    #pattern {
      width: 100%;
      min-height: 44px;
      border: 0;
      background: transparent;
      padding: 10px 12px;
      font-family: var(--mono);
      font-size: 1rem;
    }

    #pattern:focus { outline: 0; }

    .flags {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .flag {
      position: relative;
      display: inline-grid;
      place-items: center;
      width: 38px;
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel-2);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.86rem;
      cursor: pointer;
      user-select: none;
      transition: border-color 140ms ease, color 140ms ease, background 140ms ease, transform 140ms ease;
    }

    .flag:hover {
      transform: translateY(-1px);
      border-color: var(--line-strong);
    }

    .flag input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .flag:has(input:checked) {
      color: #04100c;
      border-color: color-mix(in srgb, var(--accent), transparent 18%);
      background: var(--accent);
      font-weight: 800;
    }

    textarea {
      width: 100%;
      min-height: 280px;
      height: 100%;
      resize: none;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #050709;
      padding: 13px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.92rem;
      line-height: 1.55;
    }

    [data-theme="light"] textarea {
      background: #ffffff;
    }

    .quick-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 7px;
    }

    .quick {
      min-width: 0;
      height: 34px;
      padding: 0 7px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.78rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pane {
      min-height: 0;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: color-mix(in srgb, var(--panel-2), transparent 8%);
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .pane-head {
      min-height: 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 9px 11px;
      border-bottom: 1px solid var(--line);
      background: color-mix(in srgb, var(--panel-3), transparent 34%);
    }

    .pane-title {
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.82rem;
      font-weight: 700;
    }

    .metric {
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.76rem;
      white-space: nowrap;
    }

    .pane-body {
      min-height: 0;
      overflow: auto;
      padding: 12px;
    }

    .highlight {
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      font-family: var(--mono);
      font-size: 0.91rem;
      line-height: 1.7;
      color: var(--muted);
    }

    .match {
      position: relative;
      color: var(--text);
      background: color-mix(in srgb, var(--accent), transparent 80%);
      border-bottom: 2px solid var(--accent);
      border-radius: 3px;
      padding: 1px 0;
    }

    .group-1 { background: var(--group-1); box-shadow: inset 0 -2px 0 rgba(88, 244, 184, 0.72); }
    .group-2 { background: var(--group-2); box-shadow: inset 0 -2px 0 rgba(111, 191, 255, 0.72); }
    .group-3 { background: var(--group-3); box-shadow: inset 0 -2px 0 rgba(242, 205, 93, 0.72); }
    .group-4 { background: var(--group-4); box-shadow: inset 0 -2px 0 rgba(245, 132, 255, 0.72); }
    .group-5 { background: var(--group-5); box-shadow: inset 0 -2px 0 rgba(255, 151, 105, 0.72); }
    .group-6 { background: var(--group-6); box-shadow: inset 0 -2px 0 rgba(145, 245, 255, 0.72); }

    table {
      width: 100%;
      border-collapse: collapse;
      font-family: var(--mono);
      font-size: 0.79rem;
    }

    th, td {
      text-align: left;
      vertical-align: top;
      padding: 8px 9px;
      border-bottom: 1px solid var(--line);
    }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      color: var(--muted);
      background: var(--panel-2);
      font-weight: 700;
    }

    td {
      color: var(--text);
    }

    .cell-muted {
      color: var(--muted);
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .chip {
      max-width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 3px 6px;
      background: color-mix(in srgb, var(--panel-3), transparent 30%);
      color: var(--text);
      overflow-wrap: anywhere;
    }

    .empty,
    .error-box {
      display: grid;
      gap: 8px;
      align-content: start;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.86rem;
      line-height: 1.55;
    }

    .error-box {
      color: var(--danger);
      border: 1px solid color-mix(in srgb, var(--danger), transparent 50%);
      background: color-mix(in srgb, var(--danger), transparent 91%);
      border-radius: var(--radius);
      padding: 11px;
    }

    .caret-preview {
      color: var(--text);
      background: color-mix(in srgb, var(--bg), transparent 18%);
      border-radius: 6px;
      padding: 8px;
      overflow-x: auto;
      white-space: pre;
    }

    .explain-list {
      display: grid;
      gap: 8px;
      font-family: var(--mono);
    }

    .explain-row {
      display: grid;
      grid-template-columns: minmax(74px, auto) 1fr;
      gap: 10px;
      align-items: start;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: color-mix(in srgb, var(--panel), transparent 22%);
    }

    .token {
      color: var(--accent-2);
      overflow-wrap: anywhere;
      font-weight: 800;
    }

    .meaning {
      color: var(--muted);
      line-height: 1.45;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding-top: 10px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.75rem;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .swatch {
      width: 13px;
      height: 13px;
      border-radius: 3px;
      border: 1px solid var(--line-strong);
    }

    .toast {
      position: fixed;
      right: 20px;
      bottom: 20px;
      z-index: 20;
      max-width: min(360px, calc(100vw - 40px));
      border: 1px solid color-mix(in srgb, var(--accent), transparent 45%);
      border-radius: var(--radius);
      background: var(--panel);
      color: var(--text);
      box-shadow: 0 18px 50px var(--shadow);
      padding: 10px 12px;
      font-family: var(--mono);
      font-size: 0.82rem;
      transform: translateY(18px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 160ms ease, transform 160ms ease;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    @media (max-width: 980px) {
      .app { padding: 12px; }
      header { align-items: flex-start; flex-direction: column; }
      .controls { justify-content: flex-start; }
      main {
        grid-template-columns: 1fr;
        min-height: auto;
      }
      .left {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
      .right {
        grid-template-rows: minmax(220px, auto) minmax(210px, auto) minmax(180px, auto);
      }
      .quick-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
      textarea {
        min-height: 230px;
      }
    }

    @media (max-width: 540px) {
      .app { padding: 8px; }
      .left, .right { padding: 10px; }
      .quick-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .input-shell { grid-template-columns: auto 1fr; }
      .input-shell .slash:last-child { display: none; }
      .status-line { flex-wrap: wrap; }
      .pane-head { align-items: flex-start; flex-direction: column; gap: 4px; }
      th, td { padding: 7px 6px; }
      .explain-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body data-theme="dark">
  <div class="app">
    <div class="terminal">
      <header>
        <div class="title">
          <div class="lights" aria-hidden="true">
            <span class="light"></span>
            <span class="light"></span>
            <span class="light"></span>
          </div>
          <div>
            <h1>Regex Lab</h1>
            <div class="status-line">
              <span class="status-pill" id="compileStatus">READY</span>
              <span id="summary">Native JavaScript regular expressions</span>
            </div>
          </div>
        </div>
        <div class="controls" aria-label="Workspace controls">
          <button class="control-button" id="themeToggle" type="button">Light</button>
          <button class="control-button" id="copyLink" type="button">Copy link</button>
          <button class="control-button" id="clearAll" type="button">Clear</button>
        </div>
      </header>

      <main>
        <section class="left" aria-label="Regex inputs">
          <div class="field">
            <label for="pattern">
              <span>Pattern</span>
              <span id="patternLength">0 chars</span>
            </label>
            <div class="input-shell">
              <span class="slash" aria-hidden="true">/</span>
              <input id="pattern" autocomplete="off" spellcheck="false" value="(\w+)@([\w.-]+)\.(\w+)" aria-describedby="patternHelp">
              <span class="slash" aria-hidden="true">/</span>
            </div>
            <div id="patternHelp" class="status-line">Type a pattern without wrapping slashes.</div>
          </div>

          <div class="field">
            <label>
              <span>Flags</span>
              <span id="flagsReadout">g i</span>
            </label>
            <div class="flags" id="flags" aria-label="Regex flags">
              <label class="flag" title="g: find all matches"><input type="checkbox" value="g" checked>g</label>
              <label class="flag" title="i: ignore case"><input type="checkbox" value="i" checked>i</label>
              <label class="flag" title="m: multiline anchors"><input type="checkbox" value="m">m</label>
              <label class="flag" title="s: dot matches newlines"><input type="checkbox" value="s">s</label>
              <label class="flag" title="u: unicode mode"><input type="checkbox" value="u">u</label>
              <label class="flag" title="y: sticky match"><input type="checkbox" value="y">y</label>
            </div>
          </div>

          <div class="field">
            <label for="testText">
              <span>Test Text</span>
              <span id="textLength">0 chars</span>
            </label>
            <textarea id="testText" spellcheck="false">Contact ada@example.com, linus@kernel.org, and grace.hopper@navy.mil.
IDs: A-1024, B-2048, C-4096.
The quick brown fox jumps over 13 lazy dogs.</textarea>
          </div>

          <div class="field">
            <div class="section-title">
              <span>Quick Inserts</span>
              <span>at cursor</span>
            </div>
            <div class="quick-grid" id="quickGrid"></div>
          </div>
        </section>

        <section class="right" aria-label="Regex outputs">
          <article class="pane">
            <div class="pane-head">
              <span class="pane-title">Highlighted Matches</span>
              <span class="metric" id="matchMetric">0 matches</span>
            </div>
            <div class="pane-body">
              <div id="highlight" class="highlight"></div>
              <div id="legend" class="legend"></div>
            </div>
          </article>

          <article class="pane">
            <div class="pane-head">
              <span class="pane-title">Match Table</span>
              <span class="metric" id="groupMetric">0 capture groups</span>
            </div>
            <div class="pane-body" id="tablePane"></div>
          </article>

          <article class="pane">
            <div class="pane-head">
              <span class="pane-title">Pattern Explanation</span>
              <span class="metric" id="tokenMetric">0 tokens</span>
            </div>
            <div class="pane-body" id="explainPane"></div>
          </article>
        </section>
      </main>
    </div>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script>
    (function () {
      "use strict";

      var patternInput = document.getElementById("pattern");
      var testText = document.getElementById("testText");
      var flagsBox = document.getElementById("flags");
      var highlight = document.getElementById("highlight");
      var tablePane = document.getElementById("tablePane");
      var explainPane = document.getElementById("explainPane");
      var compileStatus = document.getElementById("compileStatus");
      var summary = document.getElementById("summary");
      var flagsReadout = document.getElementById("flagsReadout");
      var patternLength = document.getElementById("patternLength");
      var textLength = document.getElementById("textLength");
      var matchMetric = document.getElementById("matchMetric");
      var groupMetric = document.getElementById("groupMetric");
      var tokenMetric = document.getElementById("tokenMetric");
      var legend = document.getElementById("legend");
      var themeToggle = document.getElementById("themeToggle");
      var copyLink = document.getElementById("copyLink");
      var clearAll = document.getElementById("clearAll");
      var quickGrid = document.getElementById("quickGrid");
      var toast = document.getElementById("toast");
      var toastTimer = 0;
      var hashTimer = 0;
      var groupLabels = [];
      var supportsIndices = false;

      try {
        supportsIndices = Boolean(new RegExp(".", "d").exec("x").indices);
      } catch (err) {
        supportsIndices = false;
      }

      var quickInserts = [
        ["digit", "\\d"],
        ["word", "\\w"],
        ["space", "\\s"],
        ["not digit", "\\D"],
        ["letters", "[A-Z]"],
        ["number", "\\d+"],
        ["group", "(...)"],
        ["optional", "?"],
        ["one+", "+"],
        ["zero+", "*"],
        ["or", "|"],
        ["line start", "^"],
        ["line end", "$"],
        ["any", "."],
        ["lookahead", "(?=...)"],
        ["not ahead", "(?!...)"],
        ["noncap", "(?:...)"],
        ["named", "(?<name>...)"]
      ];

      var tokenMeanings = {
        "\\d": "digit, equivalent to [0-9]",
        "\\D": "non-digit",
        "\\w": "word character: letter, digit, or underscore",
        "\\W": "non-word character",
        "\\s": "whitespace character",
        "\\S": "non-whitespace character",
        "\\b": "word boundary",
        "\\B": "not a word boundary",
        "\\n": "newline",
        "\\t": "tab",
        "^": "start of input, or start of line with the m flag",
        "$": "end of input, or end of line with the m flag",
        ".": "any character except newline, or any character with the s flag",
        "|": "alternation, meaning left side or right side"
      };

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function getFlags() {
        return Array.from(flagsBox.querySelectorAll("input:checked"))
          .map(function (input) { return input.value; })
          .join("");
      }

      function showToast(message) {
        toast.textContent = message;
        toast.classList.add("show");
        clearTimeout(toastTimer);
        toastTimer = setTimeout(function () {
          toast.classList.remove("show");
        }, 1800);
      }

      function setTheme(theme) {
        document.body.setAttribute("data-theme", theme);
        themeToggle.textContent = theme === "dark" ? "Light" : "Dark";
        try { localStorage.setItem("regex-lab-theme", theme); } catch (err) {}
      }

      function initTheme() {
        var saved = "dark";
        try { saved = localStorage.getItem("regex-lab-theme") || "dark"; } catch (err) {}
        setTheme(saved === "light" ? "light" : "dark");
      }

      function insertAtCursor(text) {
        var start = patternInput.selectionStart || 0;
        var end = patternInput.selectionEnd || start;
        var current = patternInput.value;
        var markerIndex = text.indexOf("...");
        patternInput.value = current.slice(0, start) + text + current.slice(end);
        patternInput.focus();
        if (markerIndex >= 0) {
          patternInput.setSelectionRange(start + markerIndex, start + markerIndex + 3);
        } else {
          patternInput.setSelectionRange(start + text.length, start + text.length);
        }
        update();
      }

      function buildQuickInserts() {
        quickGrid.innerHTML = quickInserts.map(function (item) {
          return "<button class=\"quick\" type=\"button\" data-insert=\"" + escapeHtml(item[1]) + "\" title=\"" + escapeHtml(item[0] + ": " + item[1]) + "\">" + escapeHtml(item[1]) + "</button>";
        }).join("");
      }

      function parseHash() {
        if (!location.hash || location.hash.length < 2) return;
        try {
          var params = new URLSearchParams(location.hash.slice(1));
          if (params.has("p")) patternInput.value = params.get("p") || "";
          if (params.has("f")) {
            var flags = params.get("f") || "";
            flagsBox.querySelectorAll("input").forEach(function (input) {
              input.checked = flags.indexOf(input.value) >= 0;
            });
          }
          if (params.has("t")) testText.value = params.get("t") || "";
        } catch (err) {
          showToast("Could not read URL hash.");
        }
      }

      function updateHashSoon() {
        clearTimeout(hashTimer);
        hashTimer = setTimeout(function () {
          var params = new URLSearchParams();
          params.set("p", patternInput.value);
          params.set("f", getFlags());
          if (testText.value.length <= 1600) params.set("t", testText.value);
          history.replaceState(null, "", "#" + params.toString());
        }, 160);
      }

      function estimateErrorPosition(pattern, message) {
        var stack = [];
        var inClass = false;
        var classStart = -1;
        var escaped = false;
        for (var i = 0; i < pattern.length; i += 1) {
          var ch = pattern[i];
          if (escaped) {
            escaped = false;
            continue;
          }
          if (ch === "\\") {
            escaped = true;
            continue;
          }
          if (inClass) {
            if (ch === "]") inClass = false;
            continue;
          }
          if (ch === "[") {
            inClass = true;
            classStart = i;
            continue;
          }
          if (ch === "(") {
            stack.push(i);
            continue;
          }
          if (ch === ")") {
            if (!stack.length) return i;
            stack.pop();
          }
        }
        if (inClass) return classStart;
        if (stack.length) return stack[stack.length - 1];
        if (/nothing to repeat|quantifier/i.test(message)) {
          var q = pattern.search(/[+*?{]/);
          if (q >= 0) return q;
        }
        return Math.max(0, pattern.length - 1);
      }

      function renderError(err, pattern) {
        var pos = estimateErrorPosition(pattern, err.message);
        var marker = new Array(pos + 1).join(" ") + "^";
        compileStatus.textContent = "ERROR";
        compileStatus.style.color = "var(--danger)";
        summary.textContent = "Pattern did not compile";
        matchMetric.textContent = "invalid pattern";
        groupMetric.textContent = "no results";
        tokenMetric.textContent = "check syntax";
        legend.innerHTML = "";
        highlight.innerHTML = "<div class=\"error-box\"><strong>" + escapeHtml(err.message) + "</strong><span>Estimated caret: character " + pos + "</span><div class=\"caret-preview\">" + escapeHtml(pattern || " ") + "\n" + escapeHtml(marker) + "</div></div>";
        tablePane.innerHTML = "<div class=\"empty\">Fix the pattern to see matches and capture groups.</div>";
        explainPane.innerHTML = explainPattern(pattern);
      }

      function regexForScan(pattern, flags) {
        var scanFlags = flags;
        if (scanFlags.indexOf("g") < 0) scanFlags += "g";
        if (supportsIndices && scanFlags.indexOf("d") < 0) scanFlags += "d";
        return new RegExp(pattern, scanFlags);
      }

      function collectMatches(pattern, flags, text) {
        if (!pattern) return { matches: [], capCount: 0, named: [] };
        var regex = regexForScan(pattern, flags);
        var matches = [];
        var capCount = 0;
        var named = [];
        var guard = 0;
        var match;
        while ((match = regex.exec(text)) !== null) {
          guard += 1;
          if (guard > 2000) break;
          var start = match.index;
          var end = start + match[0].length;
          var groups = [];
          capCount = Math.max(capCount, match.length - 1);
          if (match.groups) named = Object.keys(match.groups);
          for (var i = 1; i < match.length; i += 1) {
            var value = match[i];
            var range = null;
            if (supportsIndices && match.indices && match.indices[i]) {
              range = match.indices[i];
            } else if (value !== undefined && value !== "") {
              var offset = match[0].indexOf(value);
              if (offset >= 0) range = [start + offset, start + offset + value.length];
            }
            groups.push({
              index: i,
              value: value,
              start: range ? range[0] : null,
              end: range ? range[1] : null,
              name: null
            });
          }
          if (match.indices && match.indices.groups) {
            Object.keys(match.indices.groups).forEach(function (name) {
              var namedRange = match.indices.groups[name];
              groups.forEach(function (group) {
                if (namedRange && group.start === namedRange[0] && group.end === namedRange[1]) {
                  group.name = name;
                }
              });
            });
          }
          matches.push({ value: match[0], start: start, end: end, groups: groups });
          if (!flags.includes("g")) break;
          if (match[0] === "") regex.lastIndex += 1;
        }
        return { matches: matches, capCount: capCount, named: named };
      }

      function renderHighlights(text, matches) {
        if (!text) {
          highlight.innerHTML = "<div class=\"empty\">Add test text to preview matches.</div>";
          return;
        }
        if (!matches.length) {
          highlight.innerHTML = "<span>" + escapeHtml(text) + "</span>";
          return;
        }
        var points = new Set([0, text.length]);
        matches.forEach(function (m) {
          points.add(m.start);
          points.add(m.end);
          m.groups.forEach(function (g) {
            if (g.start !== null && g.end !== null && g.start !== g.end) {
              points.add(g.start);
              points.add(g.end);
            }
          });
        });
        var sorted = Array.from(points).sort(function (a, b) { return a - b; });
        var html = "";
        for (var i = 0; i < sorted.length - 1; i += 1) {
          var a = sorted[i];
          var b = sorted[i + 1];
          if (a === b) continue;
          var chunk = text.slice(a, b);
          var owner = matches.find(function (m) { return a >= m.start && b <= m.end; });
          var cls = "";
          var title = "";
          if (owner) {
            cls = "match";
            title = "Match " + owner.start + "-" + owner.end;
            var group = owner.groups.filter(function (g) {
              return g.start !== null && g.end !== null && a >= g.start && b <= g.end;
            }).pop();
            if (group) {
              cls += " group-" + (((group.index - 1) % 6) + 1);
              title += ", group " + group.index + (group.name ? " <" + group.name + ">" : "");
            }
          }
          html += cls ? "<span class=\"" + cls + "\" title=\"" + escapeHtml(title) + "\">" + escapeHtml(chunk) + "</span>" : escapeHtml(chunk);
        }
        highlight.innerHTML = html;
      }

      function renderLegend(capCount) {
        if (!capCount) {
          legend.innerHTML = "";
          return;
        }
        var html = "";
        for (var i = 1; i <= Math.min(capCount, 6); i += 1) {
          html += "<span class=\"legend-item\"><span class=\"swatch group-" + i + "\"></span>Group " + i + "</span>";
        }
        if (capCount > 6) html += "<span class=\"legend-item\">Colors repeat after group 6</span>";
        legend.innerHTML = html;
      }

      function renderTable(data) {
        var matches = data.matches;
        if (!matches.length) {
          tablePane.innerHTML = "<div class=\"empty\">No matches found. Try enabling the g flag, loosening the pattern, or changing the test text.</div>";
          return;
        }
        var capCount = data.capCount;
        var head = "<tr><th>#</th><th>Match</th><th>Index</th>";
        for (var i = 1; i <= capCount; i += 1) head += "<th>Group " + i + "</th>";
        head += "</tr>";
        var rows = matches.map(function (m, rowIndex) {
          var row = "<tr><td class=\"cell-muted\">" + (rowIndex + 1) + "</td><td>" + escapeHtml(m.value || "(empty)") + "</td><td class=\"cell-muted\">" + m.start + "-" + m.end + "</td>";
          for (var i = 0; i < capCount; i += 1) {
            var g = m.groups[i];
            if (!g || g.value === undefined) {
              row += "<td class=\"cell-muted\">undefined</td>";
            } else {
              var label = g.name ? "<span class=\"cell-muted\">" + escapeHtml(g.name) + ": </span>" : "";
              var range = g.start === null ? "" : " <span class=\"cell-muted\">(" + g.start + "-" + g.end + ")</span>";
              row += "<td><div class=\"chips\"><span class=\"chip group-" + (((i) % 6) + 1) + "\">" + label + escapeHtml(g.value || "(empty)") + range + "</span></div></td>";
            }
          }
          return row + "</tr>";
        }).join("");
        tablePane.innerHTML = "<table><thead>" + head + "</thead><tbody>" + rows + "</tbody></table>";
      }

      function readGroup(pattern, i) {
        if (pattern.slice(i, i + 3) === "(?:") return ["(?:", "non-capturing group", i + 3];
        if (pattern.slice(i, i + 3) === "(?=") return ["(?=", "positive lookahead", i + 3];
        if (pattern.slice(i, i + 3) === "(?!") return ["(?!", "negative lookahead", i + 3];
        if (pattern.slice(i, i + 4) === "(?<=") return ["(?<=", "positive lookbehind", i + 4];
        if (pattern.slice(i, i + 4) === "(?<!") return ["(?<!", "negative lookbehind", i + 4];
        if (pattern.slice(i, i + 3) === "(?<") {
          var close = pattern.indexOf(">", i + 3);
          if (close > i) return [pattern.slice(i, close + 1), "named capture group", close + 1];
        }
        return ["(", "capture group", i + 1];
      }

      function explainPattern(pattern) {
        if (!pattern) {
          tokenMetric.textContent = "0 tokens";
          return "<div class=\"empty\">Enter a pattern to get a plain-language explanation.</div>";
        }
        var rows = [];
        var escaped = false;
        for (var i = 0; i < pattern.length; i += 1) {
          var ch = pattern[i];
          if (escaped) {
            var tok = "\\" + ch;
            rows.push([tok, tokenMeanings[tok] || "escaped literal " + ch]);
            escaped = false;
            continue;
          }
          if (ch === "\\") {
            escaped = true;
            continue;
          }
          if (ch === "[") {
            var start = i;
            i += 1;
            var classEscaped = false;
            while (i < pattern.length) {
              if (classEscaped) {
                classEscaped = false;
              } else if (pattern[i] === "\\") {
                classEscaped = true;
              } else if (pattern[i] === "]") {
                break;
              }
              i += 1;
            }
            var cls = pattern.slice(start, Math.min(i + 1, pattern.length));
            rows.push([cls, cls[1] === "^" ? "negated character set" : "character set"]);
            continue;
          }
          if (ch === "(") {
            var group = readGroup(pattern, i);
            rows.push([group[0], group[1]]);
            i = group[2] - 1;
            continue;
          }
          if (ch === ")") {
            rows.push([")", "end group"]);
            continue;
          }
          if (ch === "{") {
            var endBrace = pattern.indexOf("}", i + 1);
            if (endBrace > i) {
              rows.push([pattern.slice(i, endBrace + 1), "repeat count"]);
              i = endBrace;
              continue;
            }
          }
          if (ch === "*") rows.push(["*", "repeat zero or more times"]);
          else if (ch === "+") rows.push(["+", "repeat one or more times"]);
          else if (ch === "?") rows.push(["?", "optional, or makes a quantifier lazy after another quantifier"]);
          else if (tokenMeanings[ch]) rows.push([ch, tokenMeanings[ch]]);
          else rows.push([ch, "literal character"]);
        }
        if (escaped) rows.push(["\\", "trailing escape character"]);

        var flags = getFlags();
        if (flags) {
          var flagText = {
            g: "global search",
            i: "case-insensitive",
            m: "multiline anchors",
            s: "dot matches newline",
            u: "unicode mode",
            y: "sticky search from lastIndex"
          };
          flags.split("").forEach(function (flag) {
            rows.push([flag, "flag: " + flagText[flag]]);
          });
        }
        tokenMetric.textContent = rows.length + (rows.length === 1 ? " token" : " tokens");
        return "<div class=\"explain-list\">" + rows.map(function (row) {
          return "<div class=\"explain-row\"><div class=\"token\">" + escapeHtml(row[0]) + "</div><div class=\"meaning\">" + escapeHtml(row[1]) + "</div></div>";
        }).join("") + "</div>";
      }

      function update() {
        var pattern = patternInput.value;
        var flags = getFlags();
        var text = testText.value;
        flagsReadout.textContent = flags || "none";
        patternLength.textContent = pattern.length + (pattern.length === 1 ? " char" : " chars");
        textLength.textContent = text.length + (text.length === 1 ? " char" : " chars");

        try {
          new RegExp(pattern, flags);
          compileStatus.textContent = "OK";
          compileStatus.style.color = "var(--accent)";
          var data = collectMatches(pattern, flags, text);
          renderHighlights(text, data.matches);
          renderLegend(data.capCount);
          renderTable(data);
          explainPane.innerHTML = explainPattern(pattern);
          var count = data.matches.length;
          matchMetric.textContent = count + (count === 1 ? " match" : " matches");
          groupMetric.textContent = data.capCount + (data.capCount === 1 ? " capture group" : " capture groups");
          summary.textContent = flags.indexOf("g") >= 0 ? "Scanning all matches" : "Showing first match because g is off";
        } catch (err) {
          renderError(err, pattern);
        }
        updateHashSoon();
      }

      function copyPermalink() {
        var params = new URLSearchParams();
        params.set("p", patternInput.value);
        params.set("f", getFlags());
        params.set("t", testText.value);
        var link = location.origin + location.pathname + "#" + params.toString();
        var fallback = function () {
          var temp = document.createElement("textarea");
          temp.value = link;
          temp.setAttribute("readonly", "");
          temp.style.position = "fixed";
          temp.style.opacity = "0";
          document.body.appendChild(temp);
          temp.select();
          document.execCommand("copy");
          temp.remove();
          showToast("Permalink copied.");
        };
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(link).then(function () {
            showToast("Permalink copied.");
          }).catch(fallback);
        } else {
          fallback();
        }
      }

      flagsBox.addEventListener("change", update);
      patternInput.addEventListener("input", update);
      testText.addEventListener("input", update);
      quickGrid.addEventListener("click", function (event) {
        var button = event.target.closest("button[data-insert]");
        if (!button) return;
        insertAtCursor(button.getAttribute("data-insert"));
      });
      themeToggle.addEventListener("click", function () {
        setTheme(document.body.getAttribute("data-theme") === "dark" ? "light" : "dark");
      });
      copyLink.addEventListener("click", copyPermalink);
      clearAll.addEventListener("click", function () {
        patternInput.value = "";
        testText.value = "";
        flagsBox.querySelectorAll("input").forEach(function (input) { input.checked = false; });
        update();
        patternInput.focus();
      });

      buildQuickInserts();
      initTheme();
      parseHash();
      update();
    }());
  </script>
</body>
</html>
