<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Healthy Meal Tracker</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #21312a;
      --muted: #68766d;
      --paper: #fffdf7;
      --canvas: #f4f0e6;
      --line: #dfd8ca;
      --leaf: #236a4b;
      --leaf-2: #2f8c63;
      --mint: #dfeee4;
      --sage: #a8c2a6;
      --tomato: #d6543d;
      --gold: #dca443;
      --blue: #4e8394;
      --shadow: 0 22px 70px rgba(53, 45, 31, 0.12);
      --radius: 8px;
      --font-body: "Avenir Next", "Segoe UI", sans-serif;
      --font-display: Georgia, "Times New Roman", serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 16% 6%, rgba(168, 194, 166, 0.38), transparent 27rem),
        linear-gradient(135deg, #faf7ee 0%, #f0eadc 48%, #f7f3e9 100%);
      color: var(--ink);
      font-family: var(--font-body);
      letter-spacing: 0;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .shell {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 34px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .brand-mark {
      width: 52px;
      height: 52px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(35, 106, 75, 0.2);
      border-radius: 50%;
      background: linear-gradient(145deg, #ffffff, #dfeee4);
      box-shadow: 0 12px 28px rgba(35, 106, 75, 0.14);
      font-size: 26px;
      flex: 0 0 auto;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-family: var(--font-display);
      font-size: clamp(2rem, 5vw, 4.2rem);
      line-height: 0.92;
      letter-spacing: 0;
      max-width: 680px;
    }

    .brand p {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .date-control {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .date-control label {
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .date-control input {
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 253, 247, 0.82);
      color: var(--ink);
      padding: 0 12px;
      outline: none;
    }

    .date-control input:focus,
    input:focus,
    select:focus {
      border-color: var(--leaf);
      box-shadow: 0 0 0 4px rgba(35, 106, 75, 0.13);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(280px, 390px) minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: rgba(255, 253, 247, 0.9);
      border: 1px solid rgba(223, 216, 202, 0.92);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .logger {
      padding: 20px;
      position: sticky;
      top: 18px;
      animation: slideUp 650ms ease both;
    }

    .panel-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }

    .panel-heading h2 {
      font-family: var(--font-display);
      font-size: 1.6rem;
      font-weight: 600;
    }

    .icon-pill {
      min-width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: var(--mint);
      font-size: 20px;
    }

    form {
      display: grid;
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    .field label {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    input,
    select {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--ink);
      padding: 0 12px;
      outline: none;
      transition: border-color 180ms ease, box-shadow 180ms ease, background 180ms ease;
    }

    .inline-fields {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .macro-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .ingredient-builder {
      display: grid;
      grid-template-columns: 1fr 44px;
      gap: 8px;
    }

    .chip-button,
    .ghost-button,
    .primary-button,
    .icon-button {
      min-height: 44px;
      border-radius: var(--radius);
      transition: transform 180ms ease, background 180ms ease, color 180ms ease, box-shadow 180ms ease;
    }

    .icon-button {
      display: grid;
      place-items: center;
      background: var(--leaf);
      color: white;
      font-size: 22px;
      font-weight: 700;
    }

    .icon-button:hover,
    .primary-button:hover {
      transform: translateY(-1px);
      background: var(--leaf-2);
    }

    .icon-button:focus-visible,
    .primary-button:focus-visible,
    .ghost-button:focus-visible,
    .meal-action:focus-visible,
    .chip-button:focus-visible {
      outline: 4px solid rgba(35, 106, 75, 0.24);
      outline-offset: 2px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-height: 30px;
    }

    .chip,
    .chip-button {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      max-width: 100%;
      border: 1px solid rgba(35, 106, 75, 0.16);
      border-radius: 999px;
      background: #edf6ef;
      color: #24543f;
      padding: 6px 10px;
      font-size: 0.86rem;
      line-height: 1.15;
    }

    .chip button {
      width: 18px;
      height: 18px;
      display: inline-grid;
      place-items: center;
      border-radius: 50%;
      background: rgba(35, 106, 75, 0.12);
      color: #24543f;
      font-size: 14px;
      line-height: 1;
      flex: 0 0 auto;
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip-button {
      min-height: 0;
      cursor: pointer;
    }

    .primary-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      background: var(--leaf);
      color: white;
      font-weight: 800;
      padding: 0 16px;
      box-shadow: 0 12px 24px rgba(35, 106, 75, 0.19);
    }

    .ghost-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 1px solid var(--line);
      background: rgba(255, 253, 247, 0.72);
      color: var(--ink);
      font-weight: 700;
      padding: 0 14px;
    }

    .ghost-button:hover,
    .chip-button:hover {
      background: #fff;
      transform: translateY(-1px);
    }

    .workspace {
      display: grid;
      gap: 18px;
    }

    .summary {
      padding: 20px;
      animation: slideUp 650ms ease 90ms both;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: minmax(190px, 1.1fr) repeat(3, minmax(112px, 0.7fr));
      gap: 12px;
    }

    .metric {
      min-height: 112px;
      border-radius: var(--radius);
      background: #fffaf0;
      border: 1px solid rgba(223, 216, 202, 0.72);
      padding: 14px;
      overflow: hidden;
    }

    .metric.hero {
      background:
        linear-gradient(135deg, rgba(35, 106, 75, 0.13), rgba(220, 164, 67, 0.15)),
        #fffaf0;
    }

    .metric-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .metric strong {
      display: block;
      margin-top: 14px;
      font-family: var(--font-display);
      font-size: clamp(1.8rem, 4vw, 3.1rem);
      line-height: 0.95;
    }

    .metric span:last-child {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .progress {
      height: 10px;
      margin-top: 16px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(35, 106, 75, 0.12);
    }

    .progress > div {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--leaf), var(--gold));
      transition: width 450ms ease;
    }

    .macro-panel {
      padding: 18px 20px 20px;
      animation: slideUp 650ms ease 150ms both;
    }

    .macro-bars {
      display: grid;
      gap: 13px;
    }

    .macro-row {
      display: grid;
      grid-template-columns: 84px 1fr 56px;
      gap: 12px;
      align-items: center;
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 700;
    }

    .bar {
      height: 12px;
      border-radius: 999px;
      background: #ece5d7;
      overflow: hidden;
    }

    .bar > div {
      height: 100%;
      width: 0%;
      border-radius: inherit;
      transition: width 450ms ease;
    }

    .bar.protein > div {
      background: var(--blue);
    }

    .bar.carbs > div {
      background: var(--gold);
    }

    .bar.fat > div {
      background: var(--tomato);
    }

    .meals-panel {
      padding: 20px;
      animation: slideUp 650ms ease 210ms both;
    }

    .meal-tools {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .tab {
      min-height: 36px;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      padding: 0 12px;
      font-weight: 800;
    }

    .tab[aria-selected="true"] {
      background: var(--ink);
      color: #fff;
    }

    .meal-list {
      display: grid;
      gap: 10px;
    }

    .meal-card {
      display: grid;
      grid-template-columns: 48px minmax(0, 1fr) auto;
      gap: 14px;
      align-items: start;
      border: 1px solid rgba(223, 216, 202, 0.78);
      border-radius: var(--radius);
      background: #fff;
      padding: 14px;
      transform-origin: center;
      animation: popIn 260ms ease both;
    }

    .meal-icon {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: #f5ead8;
      font-size: 24px;
    }

    .meal-main {
      min-width: 0;
    }

    .meal-title {
      display: flex;
      align-items: center;
      gap: 9px;
      flex-wrap: wrap;
      margin-bottom: 6px;
    }

    .meal-title h3 {
      font-size: 1rem;
      line-height: 1.2;
    }

    .meal-type {
      border-radius: 999px;
      background: #f1efe7;
      color: var(--muted);
      padding: 4px 8px;
      font-size: 0.72rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .ingredient-line {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .macro-line {
      margin-top: 9px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      color: #567064;
      font-size: 0.82rem;
      font-weight: 800;
    }

    .calories {
      min-width: 82px;
      text-align: right;
      color: var(--leaf);
      font-weight: 900;
      font-size: 1rem;
    }

    .meal-action {
      margin-top: 10px;
      min-height: 30px;
      border-radius: 999px;
      background: #faeee8;
      color: #9a2e1c;
      padding: 0 9px;
      font-size: 0.78rem;
      font-weight: 900;
    }

    .empty-state {
      display: grid;
      place-items: center;
      min-height: 260px;
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      color: var(--muted);
      text-align: center;
      padding: 24px;
    }

    .empty-state .big-icon {
      display: block;
      margin-bottom: 12px;
      font-size: 38px;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 20;
      max-width: min(360px, calc(100% - 36px));
      border-radius: var(--radius);
      background: var(--ink);
      color: #fff;
      box-shadow: var(--shadow);
      padding: 12px 14px;
      font-size: 0.92rem;
      transform: translateY(18px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 220ms ease, transform 220ms ease;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(0.98) translateY(8px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    @media (max-width: 920px) {
      .topbar,
      .layout {
        grid-template-columns: 1fr;
      }

      .topbar {
        align-items: flex-start;
      }

      .date-control {
        justify-content: flex-start;
      }

      .layout {
        display: grid;
      }

      .logger {
        position: static;
      }

      .summary-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 620px) {
      .shell {
        width: min(100% - 20px, 1180px);
        padding: 16px 0 24px;
      }

      .topbar {
        display: grid;
        margin-bottom: 14px;
      }

      .brand {
        align-items: flex-start;
      }

      .brand-mark {
        width: 44px;
        height: 44px;
        font-size: 22px;
      }

      h1 {
        font-size: 2.25rem;
      }

      .panel {
        box-shadow: 0 14px 36px rgba(53, 45, 31, 0.1);
      }

      .inline-fields,
      .macro-grid,
      .summary-grid {
        grid-template-columns: 1fr;
      }

      .meal-card {
        grid-template-columns: 40px minmax(0, 1fr);
      }

      .meal-icon {
        width: 40px;
        height: 40px;
        font-size: 21px;
      }

      .calories {
        grid-column: 2;
        text-align: left;
      }

      .macro-row {
        grid-template-columns: 74px 1fr 48px;
        gap: 9px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">🥗</div>
        <div>
          <h1>Healthy Meal Tracker</h1>
          <p>Log meals, ingredients, calories, and daily nutrition at a glance.</p>
        </div>
      </div>
      <div class="date-control">
        <label for="dayPicker">Tracking day</label>
        <input id="dayPicker" type="date">
      </div>
    </header>

    <main class="layout">
      <section class="panel logger" aria-labelledby="loggerTitle">
        <div class="panel-heading">
          <h2 id="loggerTitle">Log a meal</h2>
          <div class="icon-pill" aria-hidden="true">🍽️</div>
        </div>

        <form id="mealForm">
          <div class="field">
            <label for="mealName">Meal name</label>
            <input id="mealName" type="text" placeholder="Greek yogurt bowl" autocomplete="off" required>
          </div>

          <div class="inline-fields">
            <div class="field">
              <label for="mealType">Meal</label>
              <select id="mealType" required>
                <option value="Breakfast">Breakfast</option>
                <option value="Lunch">Lunch</option>
                <option value="Dinner">Dinner</option>
                <option value="Snack">Snack</option>
              </select>
            </div>
            <div class="field">
              <label for="calories">Calories</label>
              <input id="calories" type="number" min="0" step="1" placeholder="420" required>
            </div>
          </div>

          <div class="macro-grid">
            <div class="field">
              <label for="protein">Protein g</label>
              <input id="protein" type="number" min="0" step="1" placeholder="28">
            </div>
            <div class="field">
              <label for="carbs">Carbs g</label>
              <input id="carbs" type="number" min="0" step="1" placeholder="46">
            </div>
            <div class="field">
              <label for="fat">Fat g</label>
              <input id="fat" type="number" min="0" step="1" placeholder="12">
            </div>
          </div>

          <div class="field">
            <label for="ingredientInput">Ingredients</label>
            <div class="ingredient-builder">
              <input id="ingredientInput" type="text" placeholder="Blueberries" autocomplete="off">
              <button class="icon-button" type="button" id="addIngredient" aria-label="Add ingredient">+</button>
            </div>
            <div class="chips" id="ingredientChips" aria-live="polite"></div>
            <div class="suggestions" aria-label="Ingredient suggestions">
              <button class="chip-button" type="button" data-suggestion="Spinach">🌿 Spinach</button>
              <button class="chip-button" type="button" data-suggestion="Avocado">🥑 Avocado</button>
              <button class="chip-button" type="button" data-suggestion="Quinoa">🌾 Quinoa</button>
              <button class="chip-button" type="button" data-suggestion="Salmon">🐟 Salmon</button>
            </div>
          </div>

          <button class="primary-button" type="submit">＋ Add meal</button>
        </form>
      </section>

      <div class="workspace">
        <section class="panel summary" aria-labelledby="summaryTitle">
          <div class="panel-heading">
            <h2 id="summaryTitle">Daily summary</h2>
            <button class="ghost-button" type="button" id="resetDay">Reset day</button>
          </div>
          <div class="summary-grid">
            <article class="metric hero">
              <div class="metric-label"><span>Calories</span><span>🔥</span></div>
              <strong id="totalCalories">0</strong>
              <span id="calorieGoalText">of 2,000 kcal goal</span>
              <div class="progress" aria-hidden="true"><div id="calorieProgress"></div></div>
            </article>
            <article class="metric">
              <div class="metric-label"><span>Meals</span><span>🍱</span></div>
              <strong id="mealCount">0</strong>
              <span>logged today</span>
            </article>
            <article class="metric">
              <div class="metric-label"><span>Ingredients</span><span>🥕</span></div>
              <strong id="ingredientCount">0</strong>
              <span>unique foods</span>
            </article>
            <article class="metric">
              <div class="metric-label"><span>Balance</span><span>🌱</span></div>
              <strong id="balanceScore">0%</strong>
              <span>macro coverage</span>
            </article>
          </div>
        </section>

        <section class="panel macro-panel" aria-labelledby="macroTitle">
          <div class="panel-heading">
            <h2 id="macroTitle">Nutrition mix</h2>
            <div class="icon-pill" aria-hidden="true">📊</div>
          </div>
          <div class="macro-bars">
            <div class="macro-row">
              <span>Protein</span>
              <div class="bar protein" aria-hidden="true"><div id="proteinBar"></div></div>
              <span id="proteinTotal">0g</span>
            </div>
            <div class="macro-row">
              <span>Carbs</span>
              <div class="bar carbs" aria-hidden="true"><div id="carbsBar"></div></div>
              <span id="carbsTotal">0g</span>
            </div>
            <div class="macro-row">
              <span>Fat</span>
              <div class="bar fat" aria-hidden="true"><div id="fatBar"></div></div>
              <span id="fatTotal">0g</span>
            </div>
          </div>
        </section>

        <section class="panel meals-panel" aria-labelledby="mealsTitle">
          <div class="panel-heading">
            <h2 id="mealsTitle">Meal log</h2>
            <div class="icon-pill" aria-hidden="true">🥘</div>
          </div>
          <div class="meal-tools">
            <div class="tabs" role="tablist" aria-label="Filter meals">
              <button class="tab" type="button" data-filter="All" aria-selected="true">All</button>
              <button class="tab" type="button" data-filter="Breakfast" aria-selected="false">Breakfast</button>
              <button class="tab" type="button" data-filter="Lunch" aria-selected="false">Lunch</button>
              <button class="tab" type="button" data-filter="Dinner" aria-selected="false">Dinner</button>
              <button class="tab" type="button" data-filter="Snack" aria-selected="false">Snack</button>
            </div>
            <button class="ghost-button" type="button" id="loadSample">Sample day</button>
          </div>
          <div class="meal-list" id="mealList" aria-live="polite"></div>
        </section>
      </div>
    </main>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    (function () {
      var STORAGE_KEY = "healthy-meal-tracker-v1";
      var GOAL = 2000;
      var meals = [];
      var ingredients = [];
      var activeFilter = "All";

      var icons = {
        Breakfast: "🍓",
        Lunch: "🥗",
        Dinner: "🍲",
        Snack: "🍎"
      };

      var sampleMeals = [
        {
          id: "sample-1",
          name: "Berry yogurt bowl",
          type: "Breakfast",
          calories: 410,
          protein: 31,
          carbs: 48,
          fat: 9,
          ingredients: ["Greek yogurt", "Blueberries", "Chia", "Walnuts"]
        },
        {
          id: "sample-2",
          name: "Avocado quinoa salad",
          type: "Lunch",
          calories: 560,
          protein: 22,
          carbs: 64,
          fat: 24,
          ingredients: ["Quinoa", "Avocado", "Spinach", "Cherry tomatoes"]
        },
        {
          id: "sample-3",
          name: "Salmon rice plate",
          type: "Dinner",
          calories: 690,
          protein: 44,
          carbs: 58,
          fat: 29,
          ingredients: ["Salmon", "Brown rice", "Broccoli", "Lemon"]
        }
      ];

      var els = {
        dayPicker: document.getElementById("dayPicker"),
        mealForm: document.getElementById("mealForm"),
        mealName: document.getElementById("mealName"),
        mealType: document.getElementById("mealType"),
        calories: document.getElementById("calories"),
        protein: document.getElementById("protein"),
        carbs: document.getElementById("carbs"),
        fat: document.getElementById("fat"),
        ingredientInput: document.getElementById("ingredientInput"),
        addIngredient: document.getElementById("addIngredient"),
        ingredientChips: document.getElementById("ingredientChips"),
        mealList: document.getElementById("mealList"),
        totalCalories: document.getElementById("totalCalories"),
        calorieGoalText: document.getElementById("calorieGoalText"),
        calorieProgress: document.getElementById("calorieProgress"),
        mealCount: document.getElementById("mealCount"),
        ingredientCount: document.getElementById("ingredientCount"),
        balanceScore: document.getElementById("balanceScore"),
        proteinTotal: document.getElementById("proteinTotal"),
        carbsTotal: document.getElementById("carbsTotal"),
        fatTotal: document.getElementById("fatTotal"),
        proteinBar: document.getElementById("proteinBar"),
        carbsBar: document.getElementById("carbsBar"),
        fatBar: document.getElementById("fatBar"),
        resetDay: document.getElementById("resetDay"),
        loadSample: document.getElementById("loadSample"),
        toast: document.getElementById("toast")
      };

      function today() {
        return new Date().toISOString().slice(0, 10);
      }

      function uid() {
        return "meal-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 8);
      }

      function sanitizeText(value) {
        return String(value || "").trim().replace(/\s+/g, " ");
      }

      function numberValue(input) {
        return Math.max(0, Number(input.value || 0));
      }

      function formatNumber(value) {
        return Math.round(value).toLocaleString();
      }

      function loadStore() {
        try {
          var raw = localStorage.getItem(STORAGE_KEY);
          var parsed = raw ? JSON.parse(raw) : {};
          if (!parsed.days) parsed.days = {};
          return parsed;
        } catch (error) {
          return { days: {} };
        }
      }

      function saveStore(store) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(store));
      }

      function loadDay(date) {
        var store = loadStore();
        if (!store.days[date]) {
          store.days[date] = { meals: cloneSampleMeals(date) };
          saveStore(store);
        }
        meals = store.days[date].meals || [];
      }

      function saveDay() {
        var store = loadStore();
        store.days[els.dayPicker.value] = { meals: meals };
        saveStore(store);
      }

      function cloneSampleMeals(date) {
        return sampleMeals.map(function (meal, index) {
          return Object.assign({}, meal, {
            id: uid() + "-" + index,
            date: date,
            ingredients: meal.ingredients.slice()
          });
        });
      }

      function addIngredient(value) {
        var ingredient = sanitizeText(value || els.ingredientInput.value);
        if (!ingredient) return;
        var exists = ingredients.some(function (item) {
          return item.toLowerCase() === ingredient.toLowerCase();
        });
        if (!exists) {
          ingredients.push(ingredient);
          renderIngredientChips();
        }
        els.ingredientInput.value = "";
        els.ingredientInput.focus();
      }

      function removeIngredient(index) {
        ingredients.splice(index, 1);
        renderIngredientChips();
      }

      function renderIngredientChips() {
        if (!ingredients.length) {
          els.ingredientChips.innerHTML = '<span class="ingredient-line">No ingredients added yet.</span>';
          return;
        }

        els.ingredientChips.innerHTML = ingredients.map(function (ingredient, index) {
          return '<span class="chip">' + escapeHtml(ingredient) +
            '<button type="button" aria-label="Remove ' + escapeAttr(ingredient) + '" data-remove-ingredient="' + index + '">×</button></span>';
        }).join("");
      }

      function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, function (char) {
          return {
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            '"': "&quot;",
            "'": "&#039;"
          }[char];
        });
      }

      function escapeAttr(value) {
        return escapeHtml(value).replace(/"/g, "&quot;");
      }

      function totalsFor(dayMeals) {
        return dayMeals.reduce(function (acc, meal) {
          acc.calories += Number(meal.calories || 0);
          acc.protein += Number(meal.protein || 0);
          acc.carbs += Number(meal.carbs || 0);
          acc.fat += Number(meal.fat || 0);
          meal.ingredients.forEach(function (ingredient) {
            acc.ingredients[ingredient.toLowerCase()] = ingredient;
          });
          return acc;
        }, { calories: 0, protein: 0, carbs: 0, fat: 0, ingredients: {} });
      }

      function renderSummary() {
        var totals = totalsFor(meals);
        var ingredientTotal = Object.keys(totals.ingredients).length;
        var progress = Math.min(100, Math.round((totals.calories / GOAL) * 100));
        var macroParts = [totals.protein, totals.carbs, totals.fat].filter(function (value) { return value > 0; }).length;
        var balance = meals.length ? Math.round((macroParts / 3) * 100) : 0;
        var maxMacro = Math.max(totals.protein, totals.carbs, totals.fat, 1);

        els.totalCalories.textContent = formatNumber(totals.calories);
        els.mealCount.textContent = meals.length;
        els.ingredientCount.textContent = ingredientTotal;
        els.balanceScore.textContent = balance + "%";
        els.calorieGoalText.textContent = "of " + formatNumber(GOAL) + " kcal goal";
        els.calorieProgress.style.width = progress + "%";

        els.proteinTotal.textContent = formatNumber(totals.protein) + "g";
        els.carbsTotal.textContent = formatNumber(totals.carbs) + "g";
        els.fatTotal.textContent = formatNumber(totals.fat) + "g";
        els.proteinBar.style.width = Math.round((totals.protein / maxMacro) * 100) + "%";
        els.carbsBar.style.width = Math.round((totals.carbs / maxMacro) * 100) + "%";
        els.fatBar.style.width = Math.round((totals.fat / maxMacro) * 100) + "%";
      }

      function renderMeals() {
        var visibleMeals = meals.filter(function (meal) {
          return activeFilter === "All" || meal.type === activeFilter;
        });

        if (!visibleMeals.length) {
          els.mealList.innerHTML = '<div class="empty-state"><div><span class="big-icon">🥬</span><strong>No meals here yet</strong><p>Meals that match this view will appear here.</p></div></div>';
          return;
        }

        els.mealList.innerHTML = visibleMeals.map(function (meal) {
          return '<article class="meal-card">' +
            '<div class="meal-icon" aria-hidden="true">' + (icons[meal.type] || "🍽️") + '</div>' +
            '<div class="meal-main">' +
              '<div class="meal-title"><h3>' + escapeHtml(meal.name) + '</h3><span class="meal-type">' + escapeHtml(meal.type) + '</span></div>' +
              '<p class="ingredient-line">' + escapeHtml(meal.ingredients.join(", ") || "No ingredients listed") + '</p>' +
              '<div class="macro-line"><span>' + formatNumber(meal.protein || 0) + 'g protein</span><span>' + formatNumber(meal.carbs || 0) + 'g carbs</span><span>' + formatNumber(meal.fat || 0) + 'g fat</span></div>' +
            '</div>' +
            '<div class="calories">' + formatNumber(meal.calories) + ' kcal<br><button class="meal-action" type="button" data-delete="' + escapeAttr(meal.id) + '">Delete</button></div>' +
          '</article>';
        }).join("");
      }

      function renderTabs() {
        document.querySelectorAll(".tab").forEach(function (tab) {
          tab.setAttribute("aria-selected", String(tab.dataset.filter === activeFilter));
        });
      }

      function render() {
        renderIngredientChips();
        renderSummary();
        renderTabs();
        renderMeals();
      }

      function showToast(message) {
        els.toast.textContent = message;
        els.toast.classList.add("show");
        window.clearTimeout(showToast.timer);
        showToast.timer = window.setTimeout(function () {
          els.toast.classList.remove("show");
        }, 2200);
      }

      els.addIngredient.addEventListener("click", function () {
        addIngredient();
      });

      els.ingredientInput.addEventListener("keydown", function (event) {
        if (event.key === "Enter") {
          event.preventDefault();
          addIngredient();
        }
      });

      document.querySelectorAll("[data-suggestion]").forEach(function (button) {
        button.addEventListener("click", function () {
          addIngredient(button.dataset.suggestion);
        });
      });

      els.ingredientChips.addEventListener("click", function (event) {
        var button = event.target.closest("[data-remove-ingredient]");
        if (!button) return;
        removeIngredient(Number(button.dataset.removeIngredient));
      });

      els.mealForm.addEventListener("submit", function (event) {
        event.preventDefault();
        var name = sanitizeText(els.mealName.value);
        var calories = numberValue(els.calories);

        if (!name || calories <= 0) {
          showToast("Add a meal name and calories.");
          return;
        }

        if (!ingredients.length) {
          showToast("Add at least one ingredient.");
          return;
        }

        meals.unshift({
          id: uid(),
          date: els.dayPicker.value,
          name: name,
          type: els.mealType.value,
          calories: calories,
          protein: numberValue(els.protein),
          carbs: numberValue(els.carbs),
          fat: numberValue(els.fat),
          ingredients: ingredients.slice()
        });

        ingredients = [];
        els.mealForm.reset();
        els.mealType.value = "Breakfast";
        saveDay();
        render();
        showToast("Meal added to today.");
        els.mealName.focus();
      });

      els.mealList.addEventListener("click", function (event) {
        var button = event.target.closest("[data-delete]");
        if (!button) return;
        meals = meals.filter(function (meal) {
          return meal.id !== button.dataset.delete;
        });
        saveDay();
        render();
        showToast("Meal removed.");
      });

      document.querySelectorAll(".tab").forEach(function (tab) {
        tab.addEventListener("click", function () {
          activeFilter = tab.dataset.filter;
          render();
        });
      });

      els.resetDay.addEventListener("click", function () {
        meals = [];
        saveDay();
        render();
        showToast("Daily log cleared.");
      });

      els.loadSample.addEventListener("click", function () {
        meals = cloneSampleMeals(els.dayPicker.value);
        saveDay();
        activeFilter = "All";
        render();
        showToast("Sample day loaded.");
      });

      els.dayPicker.addEventListener("change", function () {
        ingredients = [];
        activeFilter = "All";
        loadDay(els.dayPicker.value);
        render();
      });

      els.dayPicker.value = today();
      loadDay(els.dayPicker.value);
      render();
    })();
  </script>
</body>
</html>
