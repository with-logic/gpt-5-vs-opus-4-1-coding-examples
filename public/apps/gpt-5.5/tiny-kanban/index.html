<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tiny Kanban</title>
  <style>
    :root {
      --bg: #f4f1ea;
      --ink: #20201d;
      --muted: #6d6a61;
      --line: #d8d0c1;
      --line-strong: #b9af9e;
      --panel: #fffdf7;
      --panel-soft: #fbf7ec;
      --todo: #3d6f91;
      --doing: #a35e22;
      --done: #477356;
      --accent: #2e5566;
      --danger: #b23b30;
      --high: #d9573f;
      --medium: #c89128;
      --low: #4d8a66;
      --shadow: 0 18px 50px rgba(48, 40, 28, 0.12);
      --radius: 8px;
      --ease: cubic-bezier(.2, .8, .2, 1);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: ui-serif, Georgia, Cambria, "Times New Roman", serif;
      font-size: 16px;
    }

    body {
      min-height: 100vh;
      margin: 0;
      background:
        linear-gradient(90deg, rgba(32, 32, 29, .035) 1px, transparent 1px) 0 0 / 56px 56px,
        linear-gradient(0deg, rgba(32, 32, 29, .03) 1px, transparent 1px) 0 0 / 56px 56px,
        radial-gradient(circle at 12% 15%, rgba(196, 137, 37, .12), transparent 34%),
        var(--bg);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    button:focus-visible,
    input:focus-visible,
    select:focus-visible,
    textarea:focus-visible {
      outline: 3px solid rgba(46, 85, 102, .32);
      outline-offset: 2px;
    }

    .app {
      width: min(1540px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 24px 0 32px;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(250px, 1fr) minmax(320px, 520px);
      gap: 18px;
      align-items: end;
      margin-bottom: 18px;
    }

    .brand {
      display: flex;
      align-items: flex-end;
      gap: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.6rem, 6vw, 6.2rem);
      line-height: .86;
      letter-spacing: 0;
      font-weight: 800;
    }

    .date-line {
      min-width: 10rem;
      margin-bottom: .34rem;
      color: var(--muted);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: .82rem;
      text-transform: uppercase;
    }

    .toolbar {
      display: grid;
      gap: 10px;
      align-items: end;
    }

    .search-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
    }

    .search-wrap,
    .limit-wrap {
      position: relative;
    }

    .search-wrap svg,
    .limit-wrap svg {
      position: absolute;
      left: 13px;
      top: 50%;
      width: 18px;
      height: 18px;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    .search {
      width: 100%;
      height: 48px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 0 15px 0 42px;
      background: rgba(255, 253, 247, .82);
      color: var(--ink);
      font-size: 1rem;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .72);
    }

    .clear-btn,
    .add-btn,
    .icon-btn {
      height: 48px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      color: var(--ink);
      transition: transform .16s var(--ease), border-color .16s var(--ease), background .16s var(--ease);
    }

    .clear-btn {
      min-width: 48px;
      display: grid;
      place-items: center;
    }

    .clear-btn svg,
    .add-btn svg,
    .icon-btn svg {
      width: 19px;
      height: 19px;
    }

    .clear-btn:hover,
    .add-btn:hover,
    .icon-btn:hover {
      transform: translateY(-1px);
      border-color: var(--line-strong);
      background: #fffaf0;
    }

    .quick-add {
      display: grid;
      grid-template-columns: minmax(150px, 1.5fr) 126px 126px 54px;
      gap: 10px;
    }

    .quick-add input,
    .quick-add select {
      height: 48px;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 253, 247, .9);
      color: var(--ink);
      padding: 0 12px;
    }

    .add-btn {
      display: grid;
      place-items: center;
      background: var(--accent);
      color: #fffdf7;
      border-color: var(--accent);
    }

    .add-btn:hover {
      background: #244757;
      border-color: #244757;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 18px;
    }

    .stat {
      min-height: 76px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 253, 247, .62);
      padding: 11px 13px;
      box-shadow: 0 1px 0 rgba(255, 255, 255, .75) inset;
    }

    .stat b {
      display: block;
      font-size: 2rem;
      line-height: 1;
    }

    .stat span {
      color: var(--muted);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: .76rem;
      text-transform: uppercase;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, minmax(260px, 1fr));
      gap: 14px;
      min-height: 620px;
    }

    .column {
      position: relative;
      display: grid;
      grid-template-rows: auto 1fr;
      min-width: 0;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 253, 247, .72);
      box-shadow: var(--shadow);
    }

    .column::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 6px;
      background: var(--column-color);
    }

    .column-header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: start;
      padding: 18px 16px 14px 22px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 253, 247, .74);
    }

    .column-title {
      min-width: 0;
    }

    .column-title h2 {
      margin: 0;
      font-size: clamp(1.7rem, 3vw, 3.1rem);
      line-height: .95;
      letter-spacing: 0;
    }

    .column-title p {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: .95rem;
    }

    .column-meta {
      display: grid;
      justify-items: end;
      gap: 7px;
    }

    .count-pill {
      display: inline-flex;
      align-items: baseline;
      justify-content: center;
      min-width: 76px;
      height: 42px;
      border-radius: 999px;
      background: var(--ink);
      color: #fffdf7;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 1.35rem;
      font-weight: 800;
    }

    .limit-wrap {
      width: 112px;
    }

    .limit-wrap input {
      width: 100%;
      height: 36px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 0 8px 0 35px;
      background: rgba(244, 241, 234, .8);
      color: var(--ink);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: .9rem;
    }

    .limit-wrap svg {
      left: 11px;
      width: 16px;
      height: 16px;
    }

    .column.over-limit .count-pill {
      background: var(--danger);
    }

    .column.drop-target {
      border-color: var(--column-color);
      background: rgba(255, 253, 247, .92);
    }

    .column.locked {
      box-shadow: 0 0 0 3px rgba(178, 59, 48, .18), var(--shadow);
    }

    .cards {
      min-height: 480px;
      padding: 14px 14px 18px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow: auto;
      scrollbar-width: thin;
    }

    .empty {
      display: none;
      min-height: 160px;
      place-items: center;
      border: 1px dashed var(--line-strong);
      border-radius: var(--radius);
      color: var(--muted);
      font-size: 1.08rem;
      text-align: center;
      padding: 20px;
      background: rgba(244, 241, 234, .42);
    }

    .cards.is-empty .empty {
      display: grid;
    }

    .card {
      position: relative;
      display: grid;
      gap: 13px;
      min-height: 132px;
      border: 1px solid rgba(32, 32, 29, .12);
      border-left: 8px solid var(--priority-color);
      border-radius: var(--radius);
      background: var(--panel);
      padding: 14px 12px 12px 14px;
      box-shadow: 0 12px 28px rgba(48, 40, 28, .1);
      transition: transform .16s var(--ease), box-shadow .16s var(--ease), opacity .16s var(--ease);
      animation: cardIn .22s var(--ease) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(8px) scale(.99); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 34px rgba(48, 40, 28, .15);
    }

    .card.dragging {
      opacity: .45;
      transform: rotate(-1deg) scale(.98);
    }

    .card.filtered {
      display: none;
    }

    .card-title-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: start;
    }

    .card-title {
      margin: 0;
      min-width: 0;
      overflow-wrap: anywhere;
      font-size: clamp(1.08rem, 1.6vw, 1.34rem);
      line-height: 1.18;
      font-weight: 800;
    }

    .delete-btn {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border: 0;
      border-radius: var(--radius);
      background: transparent;
      color: var(--muted);
      transition: background .16s var(--ease), color .16s var(--ease), transform .16s var(--ease);
    }

    .delete-btn svg {
      width: 18px;
      height: 18px;
    }

    .delete-btn:hover {
      background: rgba(178, 59, 48, .1);
      color: var(--danger);
      transform: translateY(-1px);
    }

    .card-controls {
      display: grid;
      grid-template-columns: minmax(90px, 1fr) minmax(90px, 1fr);
      gap: 8px;
    }

    .card select {
      width: 100%;
      height: 38px;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel-soft);
      color: var(--ink);
      padding: 0 9px;
      font-size: .92rem;
    }

    .tag-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-width: 0;
      color: var(--muted);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: .76rem;
      text-transform: uppercase;
    }

    .priority-dot {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }

    .priority-dot::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--priority-color);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--priority-color) 18%, transparent);
    }

    .toast {
      position: fixed;
      right: 20px;
      bottom: 20px;
      z-index: 20;
      max-width: min(420px, calc(100vw - 40px));
      transform: translateY(18px);
      opacity: 0;
      pointer-events: none;
      border: 1px solid rgba(178, 59, 48, .2);
      border-radius: var(--radius);
      background: #fffdf7;
      color: var(--ink);
      padding: 13px 15px;
      box-shadow: 0 18px 44px rgba(48, 40, 28, .18);
      transition: opacity .18s var(--ease), transform .18s var(--ease);
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast b {
      display: block;
      margin-bottom: 3px;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 1040px) {
      .app {
        width: min(100% - 24px, 840px);
      }

      .topbar {
        grid-template-columns: 1fr;
      }

      .brand {
        align-items: flex-start;
        justify-content: space-between;
      }

      .board {
        grid-template-columns: 1fr;
        min-height: 0;
      }

      .cards {
        min-height: 250px;
        max-height: none;
      }
    }

    @media (max-width: 640px) {
      .app {
        width: min(100% - 18px, 100%);
        padding-top: 16px;
      }

      .brand {
        display: grid;
        gap: 8px;
      }

      .date-line {
        min-width: 0;
      }

      .quick-add,
      .search-row,
      .stats {
        grid-template-columns: 1fr;
      }

      .clear-btn,
      .add-btn {
        width: 100%;
      }

      .column-header {
        grid-template-columns: 1fr;
      }

      .column-meta {
        grid-template-columns: auto 112px;
        justify-items: start;
        align-items: center;
      }

      .card-controls {
        grid-template-columns: 1fr;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: .001ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: .001ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <h1>Tiny<br>Kanban</h1>
        <div class="date-line" id="dateLine">Standup board</div>
      </div>

      <form class="toolbar" id="addForm" autocomplete="off">
        <div class="search-row">
          <label class="search-wrap">
            <span class="sr-only">Search cards</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <circle cx="11" cy="11" r="7"></circle>
              <path d="m20 20-4.3-4.3"></path>
            </svg>
            <input class="search" id="searchInput" type="search" placeholder="Filter work, owner, or priority">
          </label>
          <button class="clear-btn" id="clearSearch" type="button" title="Clear search" aria-label="Clear search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M18 6 6 18"></path>
              <path d="m6 6 12 12"></path>
            </svg>
          </button>
        </div>

        <div class="quick-add">
          <label>
            <span class="sr-only">New card title</span>
            <input id="newTitle" maxlength="90" placeholder="Add discussion item">
          </label>
          <label>
            <span class="sr-only">Priority</span>
            <select id="newPriority">
              <option value="high">High</option>
              <option value="medium" selected>Medium</option>
              <option value="low">Low</option>
            </select>
          </label>
          <label>
            <span class="sr-only">Assignee</span>
            <select id="newAssignee"></select>
          </label>
          <button class="add-btn" type="submit" title="Add card" aria-label="Add card">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true">
              <path d="M12 5v14"></path>
              <path d="M5 12h14"></path>
            </svg>
          </button>
        </div>
      </form>
    </header>

    <section class="stats" aria-label="Board summary">
      <div class="stat"><b id="totalCount">0</b><span>Total cards</span></div>
      <div class="stat"><b id="doingCount">0</b><span>In progress</span></div>
      <div class="stat"><b id="doneCount">0</b><span>Done today</span></div>
      <div class="stat"><b id="visibleCount">0</b><span>Visible now</span></div>
    </section>

    <main class="board" id="board" aria-label="Tiny Kanban board"></main>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    (() => {
      const STORAGE_KEY = "tiny-kanban-state-v1";
      const PRIORITIES = {
        high: { label: "High", color: "#d9573f" },
        medium: { label: "Medium", color: "#c89128" },
        low: { label: "Low", color: "#4d8a66" }
      };
      const PEOPLE = ["Avery", "Blair", "Casey", "Devon", "Ellis"];
      const COLUMNS = [
        { id: "todo", title: "Todo", note: "Next up", color: "#3d6f91", defaultLimit: 7 },
        { id: "doing", title: "Doing", note: "WIP focus", color: "#a35e22", defaultLimit: 3 },
        { id: "done", title: "Done", note: "Closed out", color: "#477356", defaultLimit: 99 }
      ];

      const seedCards = [
        { id: makeId(), title: "Review customer escalations", status: "todo", priority: "high", assignee: "Avery", createdAt: Date.now() - 800000 },
        { id: makeId(), title: "Ship signup copy update", status: "todo", priority: "medium", assignee: "Blair", createdAt: Date.now() - 700000 },
        { id: makeId(), title: "Untangle flaky billing spec", status: "doing", priority: "high", assignee: "Casey", createdAt: Date.now() - 600000 },
        { id: makeId(), title: "Prep rollout notes", status: "doing", priority: "medium", assignee: "Devon", createdAt: Date.now() - 500000 },
        { id: makeId(), title: "Confirm analytics event names", status: "done", priority: "low", assignee: "Ellis", createdAt: Date.now() - 400000 }
      ];

      let state = loadState();
      let draggedId = null;
      let toastTimer = null;

      const board = document.getElementById("board");
      const addForm = document.getElementById("addForm");
      const newTitle = document.getElementById("newTitle");
      const newPriority = document.getElementById("newPriority");
      const newAssignee = document.getElementById("newAssignee");
      const searchInput = document.getElementById("searchInput");
      const clearSearch = document.getElementById("clearSearch");
      const toast = document.getElementById("toast");

      document.getElementById("dateLine").textContent = new Intl.DateTimeFormat(undefined, {
        weekday: "long",
        month: "short",
        day: "numeric"
      }).format(new Date());

      PEOPLE.forEach((person) => {
        const option = document.createElement("option");
        option.value = person;
        option.textContent = person;
        newAssignee.append(option);
      });

      addForm.addEventListener("submit", (event) => {
        event.preventDefault();
        const title = newTitle.value.trim();
        if (!title) {
          newTitle.focus();
          return;
        }

        if (!canAddToColumn("todo")) {
          showToast("Todo WIP limit reached", "Raise the Todo limit or move work forward first.");
          return;
        }

        state.cards.unshift({
          id: makeId(),
          title,
          status: "todo",
          priority: newPriority.value,
          assignee: newAssignee.value,
          createdAt: Date.now()
        });
        newTitle.value = "";
        saveAndRender();
      });

      searchInput.addEventListener("input", render);
      clearSearch.addEventListener("click", () => {
        searchInput.value = "";
        searchInput.focus();
        render();
      });

      render();

      function loadState() {
        try {
          const parsed = JSON.parse(localStorage.getItem(STORAGE_KEY));
          if (parsed && Array.isArray(parsed.cards) && parsed.limits) {
            return parsed;
          }
        } catch (error) {
          console.warn("Unable to load Tiny Kanban state", error);
        }

        return {
          cards: seedCards,
          limits: Object.fromEntries(COLUMNS.map((column) => [column.id, column.defaultLimit]))
        };
      }

      function saveAndRender() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        render();
      }

      function render() {
        const query = searchInput.value.trim().toLowerCase();
        board.innerHTML = "";

        COLUMNS.forEach((column) => {
          board.append(renderColumn(column, query));
        });

        const visible = state.cards.filter((card) => matchesQuery(card, query)).length;
        document.getElementById("totalCount").textContent = state.cards.length;
        document.getElementById("doingCount").textContent = countIn("doing");
        document.getElementById("doneCount").textContent = countIn("done");
        document.getElementById("visibleCount").textContent = visible;
      }

      function renderColumn(column, query) {
        const count = countIn(column.id);
        const limit = Number(state.limits[column.id] ?? column.defaultLimit);
        const section = document.createElement("section");
        section.className = "column";
        section.dataset.column = column.id;
        section.style.setProperty("--column-color", column.color);
        section.style.setProperty("--column-color-soft", column.color + "22");
        if (count > limit) section.classList.add("over-limit");

        section.addEventListener("dragover", (event) => {
          event.preventDefault();
          const targetStatus = section.dataset.column;
          const dragged = state.cards.find((card) => card.id === draggedId);
          if (!dragged) return;
          section.classList.toggle("locked", !canMoveToColumn(dragged, targetStatus));
          section.classList.add("drop-target");
        });

        section.addEventListener("dragleave", () => {
          section.classList.remove("drop-target", "locked");
        });

        section.addEventListener("drop", (event) => {
          event.preventDefault();
          section.classList.remove("drop-target", "locked");
          const card = state.cards.find((item) => item.id === draggedId);
          if (!card) return;

          const targetStatus = section.dataset.column;
          if (!canMoveToColumn(card, targetStatus)) {
            showToast(column.title + " WIP limit reached", "Move or delete a card before adding more work here.");
            return;
          }

          card.status = targetStatus;
          card.updatedAt = Date.now();
          saveAndRender();
        });

        const header = document.createElement("header");
        header.className = "column-header";
        header.innerHTML = `
          <div class="column-title">
            <h2>${escapeHTML(column.title)}</h2>
            <p>${escapeHTML(column.note)}</p>
          </div>
          <div class="column-meta">
            <span class="count-pill" aria-label="${count} cards">${count}/${limit}</span>
            <label class="limit-wrap" title="WIP limit">
              <span class="sr-only">${escapeHTML(column.title)} WIP limit</span>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M4 7h16"></path>
                <path d="M7 12h10"></path>
                <path d="M10 17h4"></path>
              </svg>
              <input type="number" min="1" max="99" value="${limit}" inputmode="numeric">
            </label>
          </div>
        `;

        const limitInput = header.querySelector("input");
        limitInput.addEventListener("change", () => {
          state.limits[column.id] = clamp(Number(limitInput.value), 1, 99);
          saveAndRender();
        });

        const list = document.createElement("div");
        list.className = "cards";
        list.dataset.column = column.id;

        const cards = state.cards
          .filter((card) => card.status === column.id)
          .sort(sortCards);

        let visibleCards = 0;
        cards.forEach((card) => {
          const cardElement = renderCard(card, query);
          if (!cardElement.classList.contains("filtered")) visibleCards += 1;
          list.append(cardElement);
        });

        if (visibleCards === 0) list.classList.add("is-empty");
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = query ? "No matching cards here." : "Drop work here.";
        list.append(empty);

        section.append(header, list);
        return section;
      }

      function renderCard(card, query) {
        const article = document.createElement("article");
        article.className = "card";
        article.draggable = true;
        article.dataset.id = card.id;
        article.style.setProperty("--priority-color", PRIORITIES[card.priority].color);
        if (!matchesQuery(card, query)) article.classList.add("filtered");

        article.addEventListener("dragstart", (event) => {
          draggedId = card.id;
          article.classList.add("dragging");
          event.dataTransfer.effectAllowed = "move";
          event.dataTransfer.setData("text/plain", card.id);
        });

        article.addEventListener("dragend", () => {
          draggedId = null;
          article.classList.remove("dragging");
          document.querySelectorAll(".drop-target, .locked").forEach((node) => {
            node.classList.remove("drop-target", "locked");
          });
        });

        const titleRow = document.createElement("div");
        titleRow.className = "card-title-row";
        titleRow.innerHTML = `
          <h3 class="card-title">${escapeHTML(card.title)}</h3>
          <button class="delete-btn" type="button" title="Delete card" aria-label="Delete ${escapeHTML(card.title)}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M3 6h18"></path>
              <path d="M8 6V4h8v2"></path>
              <path d="M19 6l-1 14H6L5 6"></path>
              <path d="M10 11v5"></path>
              <path d="M14 11v5"></path>
            </svg>
          </button>
        `;

        titleRow.querySelector("button").addEventListener("click", () => {
          state.cards = state.cards.filter((item) => item.id !== card.id);
          saveAndRender();
        });

        const controls = document.createElement("div");
        controls.className = "card-controls";

        const prioritySelect = document.createElement("select");
        prioritySelect.setAttribute("aria-label", "Priority for " + card.title);
        Object.entries(PRIORITIES).forEach(([value, meta]) => {
          const option = document.createElement("option");
          option.value = value;
          option.textContent = meta.label;
          option.selected = card.priority === value;
          prioritySelect.append(option);
        });
        prioritySelect.addEventListener("change", () => {
          card.priority = prioritySelect.value;
          card.updatedAt = Date.now();
          saveAndRender();
        });

        const assigneeSelect = document.createElement("select");
        assigneeSelect.setAttribute("aria-label", "Assignee for " + card.title);
        PEOPLE.forEach((person) => {
          const option = document.createElement("option");
          option.value = person;
          option.textContent = person;
          option.selected = card.assignee === person;
          assigneeSelect.append(option);
        });
        assigneeSelect.addEventListener("change", () => {
          card.assignee = assigneeSelect.value;
          card.updatedAt = Date.now();
          saveAndRender();
        });

        controls.append(prioritySelect, assigneeSelect);

        const tags = document.createElement("div");
        tags.className = "tag-row";
        tags.innerHTML = `
          <span class="priority-dot">${escapeHTML(PRIORITIES[card.priority].label)}</span>
          <span>${escapeHTML(card.assignee)}</span>
        `;

        article.append(titleRow, controls, tags);
        return article;
      }

      function canAddToColumn(status) {
        const limit = Number(state.limits[status] ?? 99);
        return countIn(status) < limit;
      }

      function canMoveToColumn(card, status) {
        if (card.status === status) return true;
        const limit = Number(state.limits[status] ?? 99);
        return countIn(status) < limit;
      }

      function countIn(status) {
        return state.cards.filter((card) => card.status === status).length;
      }

      function matchesQuery(card, query) {
        if (!query) return true;
        return [card.title, card.assignee, card.priority, PRIORITIES[card.priority].label, card.status]
          .join(" ")
          .toLowerCase()
          .includes(query);
      }

      function sortCards(a, b) {
        const priorityRank = { high: 0, medium: 1, low: 2 };
        return priorityRank[a.priority] - priorityRank[b.priority] || (b.updatedAt || b.createdAt) - (a.updatedAt || a.createdAt);
      }

      function showToast(title, message) {
        clearTimeout(toastTimer);
        toast.innerHTML = `<b>${escapeHTML(title)}</b><span>${escapeHTML(message)}</span>`;
        toast.classList.add("show");
        toastTimer = setTimeout(() => toast.classList.remove("show"), 2600);
      }

      function clamp(value, min, max) {
        if (Number.isNaN(value)) return min;
        return Math.max(min, Math.min(max, value));
      }

      function makeId() {
        return "card-" + Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
      }

      function escapeHTML(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }
    })();
  </script>
</body>
</html>
