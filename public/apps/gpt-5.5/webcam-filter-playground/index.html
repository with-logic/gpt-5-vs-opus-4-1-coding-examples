<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Webcam Filter Playground</title>
  <style>
    :root {
      --paper: #f5f7f2;
      --ink: #11130f;
      --muted: #64685e;
      --line: rgba(17, 19, 15, 0.14);
      --panel: #ffffff;
      --accent: #ff4d2d;
      --mint: #59dcbf;
      --lemon: #ffe156;
      --blue: #3157ff;
      --shadow: 0 24px 70px rgba(17, 19, 15, 0.16);
      --radius: 8px;
      color-scheme: light;
      font-family: ui-sans-serif, "Avenir Next", "Segoe UI", Helvetica, Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--paper);
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(89, 220, 191, 0.18), transparent 34%),
        linear-gradient(315deg, rgba(255, 77, 45, 0.14), transparent 28%),
        var(--paper);
      overflow-x: hidden;
    }

    button,
    input,
    a {
      font: inherit;
    }

    button,
    a.action {
      -webkit-tap-highlight-color: transparent;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    button:focus-visible,
    a:focus-visible,
    input:focus-visible {
      outline: 3px solid rgba(49, 87, 255, 0.55);
      outline-offset: 3px;
    }

    .app {
      width: min(1180px, calc(100vw - 32px));
      min-height: calc(100vh - 32px);
      margin: 16px auto;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 16px;
    }

    .topbar {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 18px;
      padding: 6px 2px 0;
      animation: riseIn 640ms cubic-bezier(0.2, 0.9, 0.2, 1) both;
    }

    .kicker {
      margin: 0 0 5px;
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 800;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-family: "Trebuchet MS", ui-sans-serif, sans-serif;
      font-size: clamp(2rem, 6vw, 5.6rem);
      line-height: 0.92;
      letter-spacing: 0;
      text-wrap: balance;
    }

    .status {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      min-height: 40px;
      gap: 10px;
      padding: 10px 13px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.66);
      backdrop-filter: blur(12px);
      color: #30342d;
      font-size: 0.92rem;
      font-weight: 750;
      box-shadow: 0 10px 30px rgba(17, 19, 15, 0.07);
    }

    .led {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--lemon);
      box-shadow: 0 0 0 4px rgba(255, 225, 86, 0.22);
    }

    .led.live {
      background: var(--mint);
      box-shadow: 0 0 0 4px rgba(89, 220, 191, 0.23), 0 0 18px rgba(89, 220, 191, 0.85);
    }

    .led.warn {
      background: var(--accent);
      box-shadow: 0 0 0 4px rgba(255, 77, 45, 0.2);
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 280px;
      gap: 16px;
      min-height: 0;
    }

    .stage {
      min-width: 0;
      display: grid;
      grid-template-rows: minmax(280px, 1fr) auto;
      gap: 12px;
    }

    .stage-frame {
      position: relative;
      overflow: hidden;
      min-height: 100%;
      aspect-ratio: 16 / 10;
      border-radius: var(--radius);
      background: #060705;
      box-shadow: var(--shadow);
      isolation: isolate;
      animation: riseIn 760ms 90ms cubic-bezier(0.2, 0.9, 0.2, 1) both;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #090a08;
    }

    video {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .badge {
      position: absolute;
      top: 14px;
      left: 14px;
      z-index: 3;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 11px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 999px;
      background: rgba(7, 8, 6, 0.62);
      color: #f7f8f1;
      font-size: 0.84rem;
      font-weight: 800;
      backdrop-filter: blur(13px);
      text-shadow: 0 1px 8px rgba(0, 0, 0, 0.35);
    }

    .badge::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--mint);
      box-shadow: 0 0 14px var(--mint);
    }

    .permission {
      position: absolute;
      inset: auto 18px 18px 18px;
      z-index: 4;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 12px;
      border: 1px solid rgba(255, 255, 255, 0.17);
      border-radius: var(--radius);
      background: rgba(7, 8, 6, 0.72);
      color: #f8f8f1;
      backdrop-filter: blur(18px);
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.22);
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .permission.hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateY(8px);
    }

    .permission strong {
      display: block;
      font-size: 0.96rem;
      line-height: 1.2;
    }

    .permission span {
      display: block;
      margin-top: 3px;
      color: rgba(248, 248, 241, 0.72);
      font-size: 0.82rem;
      line-height: 1.3;
    }

    .transport {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      animation: riseIn 760ms 160ms cubic-bezier(0.2, 0.9, 0.2, 1) both;
    }

    .action {
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      padding: 11px 15px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.72);
      color: var(--ink);
      font-weight: 850;
      text-decoration: none;
      box-shadow: 0 10px 26px rgba(17, 19, 15, 0.07);
      transition: transform 150ms ease, border-color 150ms ease, background 150ms ease, box-shadow 150ms ease;
    }

    .action:hover {
      transform: translateY(-1px);
      border-color: rgba(17, 19, 15, 0.26);
      background: #fff;
      box-shadow: 0 14px 34px rgba(17, 19, 15, 0.1);
    }

    .action:active {
      transform: translateY(0);
    }

    .action.primary {
      background: var(--ink);
      color: #fffef7;
      border-color: var(--ink);
    }

    .action.primary:hover {
      background: #24281f;
    }

    .action svg,
    .icon-only svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 2.15;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex: 0 0 auto;
    }

    .side {
      min-width: 0;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 12px;
      animation: riseIn 760ms 210ms cubic-bezier(0.2, 0.9, 0.2, 1) both;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.66);
      backdrop-filter: blur(12px);
      box-shadow: 0 18px 50px rgba(17, 19, 15, 0.09);
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 12px 10px;
      border-bottom: 1px solid var(--line);
    }

    .panel-title {
      margin: 0;
      font-size: 0.78rem;
      font-weight: 900;
      letter-spacing: 0;
      text-transform: uppercase;
      color: #3b4037;
    }

    .icon-only {
      width: 35px;
      height: 35px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius);
      color: var(--ink);
      background: rgba(17, 19, 15, 0.06);
      transition: transform 150ms ease, background 150ms ease;
    }

    .icon-only:hover {
      transform: rotate(-8deg) scale(1.04);
      background: rgba(255, 77, 45, 0.16);
    }

    .effects {
      display: grid;
      gap: 8px;
      padding: 10px;
    }

    .effect {
      position: relative;
      width: 100%;
      display: grid;
      grid-template-columns: 32px minmax(0, 1fr);
      align-items: center;
      gap: 10px;
      padding: 9px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      background: transparent;
      color: var(--ink);
      text-align: left;
      transition: background 150ms ease, border-color 150ms ease, transform 150ms ease;
    }

    .effect:hover {
      transform: translateX(2px);
      background: rgba(17, 19, 15, 0.045);
    }

    .effect[aria-checked="true"] {
      border-color: rgba(17, 19, 15, 0.2);
      background: #fff;
      box-shadow: 0 10px 22px rgba(17, 19, 15, 0.08);
    }

    .swatch {
      width: 32px;
      height: 32px;
      border-radius: 7px;
      border: 1px solid rgba(17, 19, 15, 0.12);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.35);
    }

    .s-natural { background: linear-gradient(135deg, #e7ebe6, #4e5454); }
    .s-thermal { background: linear-gradient(135deg, #0b1f52, #20e0d0 38%, #ffe156 66%, #ff351a); }
    .s-prism { background: linear-gradient(135deg, #ff294f, #38f4c5 50%, #3257ff); }
    .s-comic { background: linear-gradient(135deg, #11130f 0 26%, #fff 26% 44%, #ffe156 44% 72%, #ff4d2d 72%); }
    .s-tunnel { background: conic-gradient(from 20deg, #11130f, #59dcbf, #fff, #ff4d2d, #3157ff, #11130f); }
    .s-vhs { background: repeating-linear-gradient(0deg, #11130f 0 5px, #3157ff 5px 8px, #ff4d2d 8px 12px); }
    .s-pixel { background: linear-gradient(135deg, #11130f 0 24%, #59dcbf 24% 50%, #ffe156 50% 75%, #f5f7f2 75%); background-size: 14px 14px; }

    .effect b,
    .effect small {
      display: block;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .effect b {
      font-size: 0.95rem;
      line-height: 1.15;
    }

    .effect small {
      margin-top: 2px;
      color: var(--muted);
      font-size: 0.75rem;
      font-weight: 700;
    }

    .tuning {
      padding: 12px;
    }

    .range-row {
      display: grid;
      gap: 8px;
    }

    .range-label {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: #343930;
      font-size: 0.8rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    .shots {
      display: grid;
      gap: 10px;
      padding: 12px;
    }

    .shot-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .shot {
      position: relative;
      overflow: hidden;
      aspect-ratio: 1;
      border: 2px solid transparent;
      border-radius: var(--radius);
      background: rgba(17, 19, 15, 0.06);
      padding: 0;
    }

    .shot img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .shot.active {
      border-color: var(--accent);
    }

    .empty-shots {
      display: grid;
      place-items: center;
      min-height: 84px;
      border: 1px dashed rgba(17, 19, 15, 0.24);
      border-radius: var(--radius);
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 750;
      text-align: center;
    }

    .meter {
      height: 8px;
      overflow: hidden;
      border-radius: 99px;
      background: rgba(17, 19, 15, 0.09);
    }

    .meter span {
      display: block;
      width: 72%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--mint), var(--lemon), var(--accent));
      transition: width 180ms ease;
    }

    @keyframes riseIn {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 900px) {
      .app {
        width: min(100vw - 22px, 760px);
        min-height: auto;
      }

      .topbar {
        align-items: start;
        flex-direction: column;
      }

      .workspace {
        grid-template-columns: 1fr;
      }

      .side {
        grid-template-rows: auto;
      }

      .effects {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .shot-grid {
        grid-template-columns: repeat(6, minmax(44px, 1fr));
      }
    }

    @media (max-width: 560px) {
      body {
        background: var(--paper);
      }

      .app {
        width: calc(100vw - 16px);
        margin: 8px auto;
        gap: 12px;
      }

      .stage-frame {
        aspect-ratio: 4 / 5;
      }

      .permission {
        inset: auto 10px 10px 10px;
        align-items: stretch;
        flex-direction: column;
      }

      .permission .action {
        width: 100%;
      }

      .transport .action {
        flex: 1 1 140px;
      }

      .effects {
        grid-template-columns: 1fr;
      }

      .shot-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 1ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div>
        <p class="kicker">Live camera studio</p>
        <h1>Webcam Filter Playground</h1>
      </div>
      <div class="status" aria-live="polite">
        <span class="led" id="statusLed"></span>
        <span id="statusText">Demo feed ready</span>
      </div>
    </header>

    <main class="workspace">
      <section class="stage" aria-label="Live preview">
        <div class="stage-frame" id="stageFrame">
          <video id="video" playsinline muted></video>
          <canvas id="canvas" aria-label="Filtered webcam preview"></canvas>
          <div class="badge" id="effectBadge">Natural</div>
          <div class="permission" id="permissionPanel">
            <div>
              <strong>Camera feed</strong>
              <span>The demo source is running until camera access starts.</span>
            </div>
            <button class="action primary" id="startBtn" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 8.5A2.5 2.5 0 0 1 6.5 6h11A2.5 2.5 0 0 1 20 8.5v7a2.5 2.5 0 0 1-2.5 2.5h-11A2.5 2.5 0 0 1 4 15.5v-7Z"/><path d="m8.8 6 .9-1.7h4.6l.9 1.7"/><circle cx="12" cy="12" r="3.2"/></svg>
              Start camera
            </button>
          </div>
        </div>

        <div class="transport" aria-label="Capture actions">
          <button class="action" id="cameraBtn" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 8.5A2.5 2.5 0 0 1 6.5 6h11A2.5 2.5 0 0 1 20 8.5v7a2.5 2.5 0 0 1-2.5 2.5h-11A2.5 2.5 0 0 1 4 15.5v-7Z"/><path d="m8.8 6 .9-1.7h4.6l.9 1.7"/><circle cx="12" cy="12" r="3.2"/></svg>
            Start camera
          </button>
          <button class="action primary" id="captureBtn" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 8.5A2.5 2.5 0 0 1 6.5 6h11A2.5 2.5 0 0 1 20 8.5v7a2.5 2.5 0 0 1-2.5 2.5h-11A2.5 2.5 0 0 1 4 15.5v-7Z"/><circle cx="12" cy="12" r="3.7"/></svg>
            Capture
          </button>
          <button class="action" id="saveBtn" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v12"/><path d="m7.5 10.5 4.5 4.5 4.5-4.5"/><path d="M5 19h14"/></svg>
            Save image
          </button>
        </div>
      </section>

      <aside class="side" aria-label="Controls">
        <section class="panel">
          <div class="panel-head">
            <h2 class="panel-title">Effects</h2>
            <button class="icon-only" id="shuffleBtn" type="button" title="Random effect" aria-label="Random effect">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M16 3h5v5"/><path d="M4 20 21 3"/><path d="M21 16v5h-5"/><path d="m15 15 6 6"/><path d="M4 4l5 5"/></svg>
            </button>
          </div>
          <div class="effects" id="effects" role="radiogroup" aria-label="Filter effects"></div>
        </section>

        <section class="panel tuning">
          <label class="range-row" for="intensity">
            <span class="range-label"><span>Intensity</span><output id="intensityOut">72</output></span>
            <input id="intensity" type="range" min="0" max="100" value="72">
            <span class="meter" aria-hidden="true"><span id="intensityMeter"></span></span>
          </label>
        </section>

        <section class="panel shots" aria-label="Snapshots">
          <div class="panel-head" style="padding:0 0 10px;border-bottom:0;">
            <h2 class="panel-title">Snapshots</h2>
          </div>
          <div id="shotGrid" class="shot-grid"></div>
          <div class="empty-shots" id="emptyShots">Captured frames appear here</div>
        </section>
      </aside>
    </main>
  </div>

  <script>
    (() => {
      "use strict";

      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d", { willReadFrequently: true });
      const video = document.getElementById("video");
      const stageFrame = document.getElementById("stageFrame");
      const statusLed = document.getElementById("statusLed");
      const statusText = document.getElementById("statusText");
      const permissionPanel = document.getElementById("permissionPanel");
      const startBtn = document.getElementById("startBtn");
      const cameraBtn = document.getElementById("cameraBtn");
      const captureBtn = document.getElementById("captureBtn");
      const saveBtn = document.getElementById("saveBtn");
      const effectsEl = document.getElementById("effects");
      const shuffleBtn = document.getElementById("shuffleBtn");
      const effectBadge = document.getElementById("effectBadge");
      const intensity = document.getElementById("intensity");
      const intensityOut = document.getElementById("intensityOut");
      const intensityMeter = document.getElementById("intensityMeter");
      const shotGrid = document.getElementById("shotGrid");
      const emptyShots = document.getElementById("emptyShots");

      const base = document.createElement("canvas");
      const baseCtx = base.getContext("2d", { willReadFrequently: true });
      const scratch = document.createElement("canvas");
      const scratchCtx = scratch.getContext("2d", { willReadFrequently: true });

      const effects = [
        { id: "natural", name: "Natural", note: "Clean feed", swatch: "s-natural" },
        { id: "thermal", name: "Thermal Pop", note: "Heat-map glow", swatch: "s-thermal" },
        { id: "prism", name: "Prism Split", note: "RGB drift", swatch: "s-prism" },
        { id: "comic", name: "Comic Ink", note: "Bold edges", swatch: "s-comic" },
        { id: "tunnel", name: "Mirror Tunnel", note: "Kaleidoscope", swatch: "s-tunnel" },
        { id: "vhs", name: "VHS Melt", note: "Scanline jitter", swatch: "s-vhs" },
        { id: "pixel", name: "Pixel Bloom", note: "Chunky light", swatch: "s-pixel" }
      ];

      let activeEffect = "natural";
      let stream = null;
      let isCameraLive = false;
      let selectedShot = "";
      let shots = [];
      let lastTime = 0;
      let animationId = 0;

      function iconMarkup(name, note, swatch, checked) {
        return `
          <button class="effect" type="button" role="radio" aria-checked="${checked}" data-effect="${name}">
            <span class="swatch ${swatch}" aria-hidden="true"></span>
            <span><b>${effects.find(effect => effect.id === name).name}</b><small>${note}</small></span>
          </button>
        `;
      }

      function buildEffects() {
        effectsEl.innerHTML = effects
          .map(effect => iconMarkup(effect.id, effect.note, effect.swatch, effect.id === activeEffect ? "true" : "false"))
          .join("");
      }

      function setStatus(mode, text) {
        statusLed.className = "led" + (mode ? ` ${mode}` : "");
        statusText.textContent = text;
      }

      function setEffect(id) {
        activeEffect = id;
        const effect = effects.find(item => item.id === id);
        effectBadge.textContent = effect.name;
        effectsEl.querySelectorAll(".effect").forEach(button => {
          button.setAttribute("aria-checked", String(button.dataset.effect === id));
        });
      }

      function setCameraButtonLabel(text) {
        const markup = `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 8.5A2.5 2.5 0 0 1 6.5 6h11A2.5 2.5 0 0 1 20 8.5v7a2.5 2.5 0 0 1-2.5 2.5h-11A2.5 2.5 0 0 1 4 15.5v-7Z"/><path d="M8 12h8"/></svg>${text}`;
        startBtn.innerHTML = markup;
        cameraBtn.innerHTML = markup;
      }

      function resizeCanvas() {
        const rect = stageFrame.getBoundingClientRect();
        const dpr = Math.min(window.devicePixelRatio || 1, 1.6);
        const width = Math.max(420, Math.floor(rect.width * dpr));
        const height = Math.max(320, Math.floor(rect.height * dpr));
        if (canvas.width !== width || canvas.height !== height) {
          canvas.width = width;
          canvas.height = height;
          base.width = width;
          base.height = height;
          scratch.width = width;
          scratch.height = height;
        }
      }

      function drawVideoCover(target, source, width, height) {
        const sourceWidth = source.videoWidth || width;
        const sourceHeight = source.videoHeight || height;
        const sourceRatio = sourceWidth / sourceHeight;
        const targetRatio = width / height;
        let sx = 0;
        let sy = 0;
        let sw = sourceWidth;
        let sh = sourceHeight;

        if (sourceRatio > targetRatio) {
          sw = sourceHeight * targetRatio;
          sx = (sourceWidth - sw) / 2;
        } else {
          sh = sourceWidth / targetRatio;
          sy = (sourceHeight - sh) / 2;
        }

        target.drawImage(source, sx, sy, sw, sh, 0, 0, width, height);
      }

      function drawDemoFeed(time, width, height) {
        const t = time * 0.001;
        const cx = width / 2;
        const cy = height / 2;
        const gradient = baseCtx.createLinearGradient(0, 0, width, height);
        gradient.addColorStop(0, "#10130f");
        gradient.addColorStop(0.34 + Math.sin(t * 0.4) * 0.08, "#3157ff");
        gradient.addColorStop(0.68, "#ff4d2d");
        gradient.addColorStop(1, "#ffe156");
        baseCtx.fillStyle = gradient;
        baseCtx.fillRect(0, 0, width, height);

        baseCtx.save();
        baseCtx.globalCompositeOperation = "screen";
        for (let i = 0; i < 12; i += 1) {
          const angle = t * (0.32 + i * 0.01) + i * 0.75;
          const r = Math.min(width, height) * (0.12 + (i % 4) * 0.07);
          const x = cx + Math.cos(angle) * r;
          const y = cy + Math.sin(angle * 1.25) * r * 0.75;
          const size = Math.min(width, height) * (0.14 + (i % 5) * 0.024);
          const orb = baseCtx.createRadialGradient(x, y, 0, x, y, size);
          orb.addColorStop(0, i % 2 ? "rgba(89,220,191,0.65)" : "rgba(255,255,255,0.52)");
          orb.addColorStop(1, "rgba(255,255,255,0)");
          baseCtx.fillStyle = orb;
          baseCtx.beginPath();
          baseCtx.arc(x, y, size, 0, Math.PI * 2);
          baseCtx.fill();
        }
        baseCtx.restore();

        baseCtx.save();
        baseCtx.translate(cx, cy);
        baseCtx.rotate(Math.sin(t * 0.8) * 0.08);
        baseCtx.strokeStyle = "rgba(255,255,255,0.72)";
        baseCtx.lineWidth = Math.max(2, width * 0.004);
        for (let ring = 0; ring < 5; ring += 1) {
          baseCtx.beginPath();
          baseCtx.arc(0, 0, Math.min(width, height) * (0.15 + ring * 0.08), 0, Math.PI * 2);
          baseCtx.stroke();
        }
        baseCtx.fillStyle = "rgba(17,19,15,0.82)";
        baseCtx.fillRect(-width * 0.16, -height * 0.045, width * 0.32, height * 0.09);
        baseCtx.fillStyle = "#f5f7f2";
        baseCtx.font = `900 ${Math.max(18, width * 0.032)}px Trebuchet MS, sans-serif`;
        baseCtx.textAlign = "center";
        baseCtx.textBaseline = "middle";
        baseCtx.fillText("DEMO", 0, 0);
        baseCtx.restore();
      }

      function drawSource(time) {
        const width = base.width;
        const height = base.height;
        baseCtx.setTransform(1, 0, 0, 1, 0, 0);
        baseCtx.clearRect(0, 0, width, height);
        if (isCameraLive && video.readyState >= 2) {
          baseCtx.save();
          baseCtx.translate(width, 0);
          baseCtx.scale(-1, 1);
          drawVideoCover(baseCtx, video, width, height);
          baseCtx.restore();
        } else {
          drawDemoFeed(time, width, height);
        }
      }

      function lumaAt(data, index) {
        return data[index] * 0.2126 + data[index + 1] * 0.7152 + data[index + 2] * 0.0722;
      }

      function heatColor(value) {
        const stops = [
          [14, 19, 55],
          [36, 127, 226],
          [39, 224, 207],
          [255, 225, 86],
          [255, 77, 45],
          [255, 250, 226]
        ];
        const scaled = Math.max(0, Math.min(0.999, value)) * (stops.length - 1);
        const index = Math.floor(scaled);
        const mix = scaled - index;
        const a = stops[index];
        const b = stops[index + 1];
        return [
          a[0] + (b[0] - a[0]) * mix,
          a[1] + (b[1] - a[1]) * mix,
          a[2] + (b[2] - a[2]) * mix
        ];
      }

      function renderThermal(amount) {
        const width = canvas.width;
        const height = canvas.height;
        const src = baseCtx.getImageData(0, 0, width, height);
        const dst = ctx.createImageData(width, height);
        const data = src.data;
        const out = dst.data;
        for (let i = 0; i < data.length; i += 4) {
          const lum = lumaAt(data, i) / 255;
          const curve = Math.pow(lum, 0.78 + (1 - amount) * 0.45);
          const color = heatColor(curve);
          out[i] = data[i] * (1 - amount) + color[0] * amount;
          out[i + 1] = data[i + 1] * (1 - amount) + color[1] * amount;
          out[i + 2] = data[i + 2] * (1 - amount) + color[2] * amount;
          out[i + 3] = 255;
        }
        ctx.putImageData(dst, 0, 0);
      }

      function renderPrism(amount, time) {
        const width = canvas.width;
        const height = canvas.height;
        const src = baseCtx.getImageData(0, 0, width, height);
        const dst = ctx.createImageData(width, height);
        const data = src.data;
        const out = dst.data;
        const drift = Math.max(2, Math.floor(width * (0.006 + amount * 0.024)));
        const wave = Math.floor(Math.sin(time * 0.003) * drift * 0.45);
        for (let y = 0; y < height; y += 1) {
          const row = y * width;
          const rowShift = Math.floor(Math.sin(y * 0.025 + time * 0.004) * drift * amount);
          for (let x = 0; x < width; x += 1) {
            const i = (row + x) * 4;
            const rx = Math.max(0, Math.min(width - 1, x - drift + rowShift));
            const bx = Math.max(0, Math.min(width - 1, x + drift + wave - rowShift));
            const ri = (row + rx) * 4;
            const bi = (row + bx) * 4;
            out[i] = data[ri];
            out[i + 1] = data[i + 1];
            out[i + 2] = data[bi + 2];
            out[i + 3] = 255;
          }
        }
        ctx.putImageData(dst, 0, 0);
        ctx.save();
        ctx.globalCompositeOperation = "screen";
        ctx.globalAlpha = amount * 0.18;
        ctx.fillStyle = "#59dcbf";
        ctx.fillRect(0, 0, width, height);
        ctx.restore();
      }

      function renderComic(amount) {
        const width = canvas.width;
        const height = canvas.height;
        const src = baseCtx.getImageData(0, 0, width, height);
        const dst = ctx.createImageData(width, height);
        const data = src.data;
        const out = dst.data;
        const levels = 3 + Math.round((1 - amount) * 4);
        const edgeStrength = 38 - amount * 16;

        for (let y = 0; y < height; y += 1) {
          for (let x = 0; x < width; x += 1) {
            const i = (y * width + x) * 4;
            const right = (y * width + Math.min(width - 1, x + 2)) * 4;
            const down = (Math.min(height - 1, y + 2) * width + x) * 4;
            const edge = Math.abs(lumaAt(data, i) - lumaAt(data, right)) + Math.abs(lumaAt(data, i) - lumaAt(data, down));
            if (edge > edgeStrength) {
              out[i] = 12;
              out[i + 1] = 13;
              out[i + 2] = 11;
            } else {
              out[i] = Math.round(data[i] / 255 * levels) / levels * 255;
              out[i + 1] = Math.round(data[i + 1] / 255 * levels) / levels * 255;
              out[i + 2] = Math.round(data[i + 2] / 255 * levels) / levels * 255;
              const warm = lumaAt(data, i) > 144 ? amount * 34 : 0;
              out[i] = Math.min(255, out[i] + warm);
              out[i + 1] = Math.min(255, out[i + 1] + warm * 0.72);
            }
            out[i + 3] = 255;
          }
        }

        ctx.putImageData(dst, 0, 0);
      }

      function renderTunnel(amount, time) {
        const width = canvas.width;
        const height = canvas.height;
        const cx = width / 2;
        const cy = height / 2;
        const radius = Math.hypot(width, height);
        ctx.clearRect(0, 0, width, height);
        ctx.fillStyle = "#050604";
        ctx.fillRect(0, 0, width, height);
        const slices = 8 + Math.round(amount * 8);
        const wedge = Math.PI * 2 / slices;
        const zoom = 0.88 + Math.sin(time * 0.0016) * 0.035;

        for (let i = 0; i < slices; i += 1) {
          ctx.save();
          ctx.translate(cx, cy);
          ctx.rotate(i * wedge + Math.sin(time * 0.0006) * amount);
          if (i % 2) ctx.scale(1, -1);
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.lineTo(Math.cos(-wedge / 2) * radius, Math.sin(-wedge / 2) * radius);
          ctx.lineTo(Math.cos(wedge / 2) * radius, Math.sin(wedge / 2) * radius);
          ctx.closePath();
          ctx.clip();
          ctx.scale(zoom, zoom);
          ctx.drawImage(base, -width / 2 + Math.sin(time * 0.001 + i) * width * 0.03 * amount, -height / 2);
          ctx.restore();
        }

        ctx.save();
        ctx.globalCompositeOperation = "screen";
        ctx.strokeStyle = "rgba(255,225,86,0.26)";
        ctx.lineWidth = Math.max(1, width * 0.002);
        for (let r = 0; r < 5; r += 1) {
          ctx.beginPath();
          ctx.arc(cx, cy, Math.min(width, height) * (0.12 + r * 0.09 + amount * 0.03), 0, Math.PI * 2);
          ctx.stroke();
        }
        ctx.restore();
      }

      function renderVhs(amount, time) {
        const width = canvas.width;
        const height = canvas.height;
        ctx.clearRect(0, 0, width, height);
        const slice = Math.max(5, Math.floor(height / 46));
        for (let y = 0; y < height; y += slice) {
          const jitter = Math.sin(y * 0.08 + time * 0.01) * width * 0.012 * amount;
          const burst = Math.sin(time * 0.006 + y * 0.011) > 0.965 ? width * 0.05 * amount : 0;
          ctx.drawImage(base, 0, y, width, slice, jitter + burst, y, width, slice);
        }

        ctx.save();
        ctx.globalCompositeOperation = "screen";
        ctx.globalAlpha = amount * 0.38;
        ctx.drawImage(base, -width * 0.012 * amount, 0);
        ctx.globalAlpha = amount * 0.26;
        ctx.fillStyle = "#3157ff";
        ctx.fillRect(0, 0, width, height);
        ctx.globalAlpha = amount * 0.18;
        ctx.fillStyle = "#ff4d2d";
        ctx.fillRect(0, 0, width, height);
        ctx.restore();

        ctx.save();
        ctx.globalCompositeOperation = "multiply";
        ctx.fillStyle = "rgba(0,0,0,0.18)";
        const gap = Math.max(3, Math.floor(height / 170));
        for (let y = 0; y < height; y += gap * 2) ctx.fillRect(0, y, width, gap);
        ctx.restore();

        const noise = ctx.getImageData(0, 0, width, height);
        const data = noise.data;
        const grain = amount * 36;
        for (let i = 0; i < data.length; i += 16) {
          const n = (Math.random() - 0.5) * grain;
          data[i] += n;
          data[i + 1] += n;
          data[i + 2] += n;
        }
        ctx.putImageData(noise, 0, 0);
      }

      function renderPixel(amount) {
        const width = canvas.width;
        const height = canvas.height;
        const blocks = Math.round(88 - amount * 68);
        const smallW = Math.max(18, Math.round(width / blocks));
        const smallH = Math.max(18, Math.round(height / blocks));
        scratch.width = smallW;
        scratch.height = smallH;
        scratchCtx.imageSmoothingEnabled = true;
        scratchCtx.drawImage(base, 0, 0, smallW, smallH);

        ctx.save();
        ctx.imageSmoothingEnabled = false;
        ctx.drawImage(scratch, 0, 0, width, height);
        ctx.restore();

        ctx.save();
        ctx.globalCompositeOperation = "screen";
        ctx.filter = `blur(${Math.max(4, width * 0.018 * amount)}px) saturate(${1.1 + amount * 1.1})`;
        ctx.globalAlpha = 0.32 + amount * 0.28;
        ctx.drawImage(base, 0, 0, width, height);
        ctx.restore();
        ctx.filter = "none";
      }

      function renderFrame(time) {
        resizeCanvas();
        drawSource(time);
        const amount = Number(intensity.value) / 100;
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.globalAlpha = 1;
        ctx.globalCompositeOperation = "source-over";
        ctx.filter = "none";

        switch (activeEffect) {
          case "thermal":
            renderThermal(amount);
            break;
          case "prism":
            renderPrism(amount, time);
            break;
          case "comic":
            renderComic(amount);
            break;
          case "tunnel":
            renderTunnel(amount, time);
            break;
          case "vhs":
            renderVhs(amount, time);
            break;
          case "pixel":
            renderPixel(amount);
            break;
          default:
            ctx.drawImage(base, 0, 0);
        }

        lastTime = time;
        animationId = requestAnimationFrame(renderFrame);
      }

      async function startCamera() {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          setStatus("warn", "Camera unavailable");
          permissionPanel.classList.add("hidden");
          return;
        }

        try {
          setStatus("", "Requesting camera");
          if (stream) stream.getTracks().forEach(track => track.stop());
          stream = await navigator.mediaDevices.getUserMedia({
            video: {
              width: { ideal: 1280 },
              height: { ideal: 720 },
              facingMode: "user"
            },
            audio: false
          });
          video.srcObject = stream;
          await video.play();
          isCameraLive = true;
          permissionPanel.classList.add("hidden");
          setStatus("live", "Live camera");
          setCameraButtonLabel("Restart");
        } catch (error) {
          isCameraLive = false;
          permissionPanel.classList.add("hidden");
          setStatus("warn", "Demo feed active");
          setCameraButtonLabel("Try camera");
        }
      }

      function captureShot(selectNew = true) {
        const dataUrl = canvas.toDataURL("image/png");
        const shot = {
          id: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
          dataUrl
        };
        shots = [shot, ...shots].slice(0, 6);
        if (selectNew) selectedShot = dataUrl;
        renderShots();
        return dataUrl;
      }

      function renderShots() {
        shotGrid.innerHTML = "";
        emptyShots.style.display = shots.length ? "none" : "grid";
        shots.forEach((shot, index) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = `shot${shot.dataUrl === selectedShot ? " active" : ""}`;
          button.setAttribute("aria-label", `Snapshot ${index + 1}`);
          const img = document.createElement("img");
          img.src = shot.dataUrl;
          img.alt = "";
          button.appendChild(img);
          button.addEventListener("click", () => {
            selectedShot = shot.dataUrl;
            renderShots();
          });
          shotGrid.appendChild(button);
        });
      }

      function saveImage() {
        const dataUrl = selectedShot || captureShot(false);
        const link = document.createElement("a");
        const effect = effects.find(item => item.id === activeEffect);
        const stamp = new Date().toISOString().replace(/[:.]/g, "-");
        link.href = dataUrl;
        link.download = `webcam-filter-playground-${effect.id}-${stamp}.png`;
        document.body.appendChild(link);
        link.click();
        link.remove();
      }

      effectsEl.addEventListener("click", event => {
        const button = event.target.closest("[data-effect]");
        if (!button) return;
        setEffect(button.dataset.effect);
      });

      effectsEl.addEventListener("keydown", event => {
        const currentIndex = effects.findIndex(effect => effect.id === activeEffect);
        let nextIndex = currentIndex;
        if (event.key === "ArrowDown" || event.key === "ArrowRight") nextIndex = (currentIndex + 1) % effects.length;
        if (event.key === "ArrowUp" || event.key === "ArrowLeft") nextIndex = (currentIndex - 1 + effects.length) % effects.length;
        if (nextIndex !== currentIndex) {
          event.preventDefault();
          setEffect(effects[nextIndex].id);
          const nextButton = effectsEl.querySelector(`[data-effect="${effects[nextIndex].id}"]`);
          if (nextButton) nextButton.focus();
        }
      });

      shuffleBtn.addEventListener("click", () => {
        const pool = effects.filter(effect => effect.id !== activeEffect);
        const next = pool[Math.floor(Math.random() * pool.length)];
        setEffect(next.id);
        intensity.value = String(42 + Math.round(Math.random() * 58));
        updateIntensity();
      });

      function updateIntensity() {
        intensityOut.value = intensity.value;
        intensityMeter.style.width = `${intensity.value}%`;
      }

      intensity.addEventListener("input", updateIntensity);
      startBtn.addEventListener("click", startCamera);
      cameraBtn.addEventListener("click", startCamera);
      captureBtn.addEventListener("click", () => captureShot(true));
      saveBtn.addEventListener("click", saveImage);
      window.addEventListener("resize", resizeCanvas);
      window.addEventListener("beforeunload", () => {
        cancelAnimationFrame(animationId);
        if (stream) stream.getTracks().forEach(track => track.stop());
      });

      buildEffects();
      updateIntensity();
      resizeCanvas();
      renderShots();
      animationId = requestAnimationFrame(renderFrame);
    })();
  </script>
</body>
</html>
