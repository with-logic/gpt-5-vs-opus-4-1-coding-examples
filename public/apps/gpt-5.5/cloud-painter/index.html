<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloud Painter</title>
  <style>
    :root {
      --sky-top: #7cc8ff;
      --sky-mid: #aee3ff;
      --sky-low: #f8dca4;
      --ink: #28506f;
      --ink-soft: #4d6f88;
      --panel: rgba(255, 255, 255, 0.74);
      --panel-strong: rgba(255, 255, 255, 0.9);
      --line: rgba(64, 117, 151, 0.18);
      --sun: #ffd369;
      --peach: #ffaf87;
      --mint: #8ee6cb;
      --pink: #ff9cc8;
      --violet: #b7a4ff;
      --shadow: 0 18px 42px rgba(39, 85, 116, 0.18);
      --radius: 22px;
      --toolbar-height: 104px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      color: var(--ink);
      font-family: "Trebuchet MS", "Gill Sans", Verdana, sans-serif;
      background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 52%, var(--sky-low) 100%);
    }

    body {
      min-width: 320px;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    button:focus-visible,
    input:focus-visible {
      outline: 4px solid rgba(255, 211, 105, 0.8);
      outline-offset: 3px;
    }

    .app {
      position: relative;
      width: 100vw;
      height: 100vh;
      isolation: isolate;
    }

    .sky-glow {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 17% 18%, rgba(255, 255, 255, 0.95) 0 48px, rgba(255, 255, 255, 0.46) 49px 78px, transparent 80px),
        radial-gradient(circle at 88% 17%, rgba(255, 243, 184, 0.45), transparent 245px),
        linear-gradient(180deg, rgba(255, 255, 255, 0.16), transparent 52%);
    }

    .distant-hills {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 22vh;
      z-index: 0;
      pointer-events: none;
      opacity: 0.62;
      background:
        radial-gradient(130% 86% at 18% 100%, #8ecf9c 0 34%, transparent 35%),
        radial-gradient(122% 90% at 75% 100%, #74bf99 0 37%, transparent 38%),
        linear-gradient(180deg, transparent 10%, rgba(65, 141, 128, 0.42) 100%);
      filter: saturate(0.9);
    }

    #paintCanvas {
      position: absolute;
      inset: 0;
      z-index: 1;
      width: 100%;
      height: 100%;
      touch-action: none;
      cursor: crosshair;
    }

    .workspace-label {
      position: absolute;
      left: clamp(14px, 2.4vw, 32px);
      top: clamp(12px, 2.2vw, 28px);
      z-index: 3;
      display: flex;
      align-items: center;
      gap: 12px;
      pointer-events: none;
    }

    .sun-mark {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 34% 32%, #fff6b7 0 10px, transparent 11px),
        radial-gradient(circle, #ffe17e 0 50%, #ffc04e 72%);
      box-shadow:
        0 0 0 8px rgba(255, 215, 113, 0.24),
        0 12px 24px rgba(209, 127, 52, 0.18);
      animation: sunFloat 5.4s ease-in-out infinite;
    }

    .brand h1 {
      margin: 0;
      color: #244863;
      font-size: clamp(2rem, 4.8vw, 4.8rem);
      line-height: 0.86;
      letter-spacing: 0;
      text-shadow: 0 3px 0 rgba(255, 255, 255, 0.6);
    }

    .brand p {
      margin: 8px 0 0;
      color: rgba(36, 72, 99, 0.8);
      font-size: clamp(0.9rem, 1.25vw, 1.15rem);
      font-weight: 700;
    }

    .toolbar {
      position: absolute;
      left: clamp(10px, 2vw, 24px);
      right: clamp(10px, 2vw, 24px);
      bottom: clamp(10px, 2vw, 22px);
      z-index: 4;
      min-height: var(--toolbar-height);
      display: grid;
      grid-template-columns: minmax(210px, 1fr) minmax(280px, 1.55fr) minmax(220px, 0.95fr);
      gap: 12px;
      align-items: stretch;
      pointer-events: auto;
    }

    .tool-section {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px) saturate(1.25);
    }

    .tool-section.brushes {
      justify-content: center;
      flex-wrap: wrap;
    }

    .tool-section.sliders {
      flex-direction: column;
      justify-content: center;
      align-items: stretch;
      gap: 10px;
    }

    .tool-section.actions {
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .label {
      display: block;
      margin: 0 0 5px;
      font-size: 0.78rem;
      font-weight: 900;
      letter-spacing: 0.03em;
      color: rgba(40, 80, 111, 0.78);
      text-transform: uppercase;
    }

    .brush-button,
    .action-button,
    .color-button {
      min-height: 48px;
      border-radius: 17px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.72);
      box-shadow:
        inset 0 -3px 0 rgba(45, 95, 129, 0.08),
        0 8px 18px rgba(40, 80, 111, 0.12);
      transition: transform 150ms ease, box-shadow 150ms ease, background 150ms ease;
    }

    .brush-button:hover,
    .action-button:hover,
    .color-button:hover {
      transform: translateY(-2px);
      box-shadow:
        inset 0 -3px 0 rgba(45, 95, 129, 0.08),
        0 12px 22px rgba(40, 80, 111, 0.16);
    }

    .brush-button[aria-pressed="true"],
    .action-button[aria-pressed="true"],
    .color-button[aria-pressed="true"] {
      background: #fff7cf;
      box-shadow:
        inset 0 -4px 0 rgba(231, 162, 58, 0.18),
        0 9px 18px rgba(179, 118, 46, 0.16);
      transform: translateY(1px);
    }

    .brush-button {
      width: 74px;
      display: grid;
      place-items: center;
      padding: 6px;
    }

    .brush-icon {
      position: relative;
      width: 46px;
      height: 34px;
      display: block;
    }

    .brush-icon::before,
    .brush-icon::after,
    .brush-icon span {
      content: "";
      position: absolute;
      display: block;
      background: #fff;
      border: 2px solid rgba(84, 134, 164, 0.26);
      box-shadow: 0 3px 4px rgba(71, 113, 141, 0.1);
    }

    .icon-puff::before {
      left: 4px;
      bottom: 5px;
      width: 20px;
      height: 16px;
      border-radius: 50%;
    }

    .icon-puff::after {
      left: 16px;
      bottom: 6px;
      width: 26px;
      height: 21px;
      border-radius: 50%;
    }

    .icon-puff span {
      left: 9px;
      bottom: 13px;
      width: 21px;
      height: 18px;
      border-radius: 50%;
    }

    .icon-wisp::before {
      left: 3px;
      top: 8px;
      width: 39px;
      height: 10px;
      border-radius: 999px;
      transform: rotate(-10deg);
    }

    .icon-wisp::after {
      left: 11px;
      top: 18px;
      width: 30px;
      height: 8px;
      border-radius: 999px;
      transform: rotate(8deg);
      opacity: 0.8;
    }

    .icon-wisp span {
      left: 1px;
      top: 20px;
      width: 22px;
      height: 7px;
      border-radius: 999px;
      opacity: 0.7;
    }

    .icon-heart::before {
      left: 8px;
      top: 6px;
      width: 18px;
      height: 18px;
      border-radius: 50% 50% 42% 42%;
      transform: rotate(-38deg);
    }

    .icon-heart::after {
      left: 20px;
      top: 6px;
      width: 18px;
      height: 18px;
      border-radius: 50% 50% 42% 42%;
      transform: rotate(38deg);
    }

    .icon-heart span {
      left: 14px;
      top: 14px;
      width: 20px;
      height: 20px;
      border-radius: 4px 2px 8px 2px;
      transform: rotate(45deg);
    }

    .icon-star::before {
      left: 13px;
      top: 3px;
      width: 21px;
      height: 21px;
      clip-path: polygon(50% 0%, 61% 34%, 98% 35%, 68% 56%, 79% 91%, 50% 69%, 21% 91%, 32% 56%, 2% 35%, 39% 34%);
      border-radius: 0;
    }

    .icon-star::after {
      left: 4px;
      top: 21px;
      width: 36px;
      height: 9px;
      border-radius: 999px;
      opacity: 0.72;
    }

    .icon-star span {
      display: none;
    }

    .range-row {
      display: grid;
      grid-template-columns: 72px minmax(90px, 1fr) 46px;
      gap: 10px;
      align-items: center;
      min-width: 0;
    }

    .range-row .label {
      margin: 0;
    }

    input[type="range"] {
      width: 100%;
      min-width: 0;
      height: 28px;
      appearance: none;
      background: transparent;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-runnable-track {
      height: 12px;
      border-radius: 999px;
      background: linear-gradient(90deg, #ffffff, #dff5ff);
      box-shadow: inset 0 0 0 1px rgba(64, 117, 151, 0.14);
    }

    input[type="range"]::-moz-range-track {
      height: 12px;
      border-radius: 999px;
      background: linear-gradient(90deg, #ffffff, #dff5ff);
      box-shadow: inset 0 0 0 1px rgba(64, 117, 151, 0.14);
    }

    input[type="range"]::-webkit-slider-thumb {
      width: 26px;
      height: 26px;
      margin-top: -7px;
      appearance: none;
      border: 3px solid white;
      border-radius: 50%;
      background: var(--peach);
      box-shadow: 0 5px 12px rgba(121, 81, 56, 0.22);
    }

    input[type="range"]::-moz-range-thumb {
      width: 22px;
      height: 22px;
      border: 3px solid white;
      border-radius: 50%;
      background: var(--peach);
      box-shadow: 0 5px 12px rgba(121, 81, 56, 0.22);
    }

    .value-pill {
      min-width: 42px;
      padding: 5px 7px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.68);
      text-align: center;
      font-size: 0.86rem;
      font-weight: 900;
      color: rgba(40, 80, 111, 0.8);
    }

    .palette {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding-left: 6px;
      border-left: 1px solid var(--line);
    }

    .color-button {
      position: relative;
      width: 42px;
      min-height: 42px;
      padding: 4px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.64);
    }

    .color-button::after {
      content: "";
      display: block;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: var(--swatch);
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.82);
    }

    .color-button[aria-pressed="true"]::before {
      content: "";
      position: absolute;
      inset: -5px;
      border: 3px solid #ffd369;
      border-radius: 50%;
    }

    .action-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-width: 54px;
      padding: 0 14px;
      font-size: 0.92rem;
      font-weight: 900;
      white-space: nowrap;
    }

    .action-button.primary {
      color: #22445d;
      background: linear-gradient(180deg, #fff3a6, #ffd169);
    }

    .action-button.danger {
      background: rgba(255, 236, 236, 0.86);
      color: #7d3d4b;
    }

    .button-icon {
      width: 20px;
      height: 20px;
      display: inline-block;
    }

    .hint {
      position: absolute;
      left: 50%;
      top: 50%;
      z-index: 2;
      width: min(420px, calc(100vw - 36px));
      transform: translate(-50%, -50%);
      padding: 16px 20px;
      border: 1px solid rgba(255, 255, 255, 0.65);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.58);
      color: rgba(40, 80, 111, 0.68);
      font-size: clamp(1rem, 2.4vw, 1.34rem);
      font-weight: 900;
      text-align: center;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      pointer-events: none;
      transition: opacity 400ms ease, transform 400ms ease;
    }

    .hint.hidden {
      opacity: 0;
      transform: translate(-50%, calc(-50% + 12px));
    }

    .toast {
      position: absolute;
      top: clamp(18px, 4vw, 38px);
      right: clamp(12px, 2.5vw, 28px);
      z-index: 5;
      max-width: min(340px, calc(100vw - 28px));
      padding: 12px 16px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.86);
      color: rgba(40, 80, 111, 0.86);
      font-weight: 900;
      box-shadow: var(--shadow);
      transform: translateY(-18px);
      opacity: 0;
      pointer-events: none;
      transition: transform 220ms ease, opacity 220ms ease;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    .sparkle {
      position: absolute;
      z-index: 3;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #fff7b8;
      box-shadow: 0 0 0 5px rgba(255, 247, 184, 0.24);
      pointer-events: none;
      animation: sparklePop 620ms ease-out forwards;
    }

    @keyframes sunFloat {
      0%,
      100% {
        transform: translateY(0) rotate(0deg);
      }
      50% {
        transform: translateY(7px) rotate(5deg);
      }
    }

    @keyframes sparklePop {
      0% {
        transform: translate(-50%, -50%) scale(0.25);
        opacity: 0;
      }
      30% {
        opacity: 1;
      }
      100% {
        transform: translate(-50%, -50%) scale(1.8);
        opacity: 0;
      }
    }

    @media (max-width: 940px) {
      :root {
        --toolbar-height: 172px;
      }

      .toolbar {
        grid-template-columns: 1fr 1fr;
      }

      .tool-section.sliders {
        grid-column: 1 / -1;
        order: 3;
      }

      .tool-section.actions {
        justify-content: center;
      }
    }

    @media (max-width: 640px) {
      :root {
        --toolbar-height: 250px;
      }

      .workspace-label {
        gap: 8px;
      }

      .sun-mark {
        width: 44px;
        height: 44px;
      }

      .brand p {
        display: none;
      }

      .toolbar {
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .tool-section {
        border-radius: 18px;
        padding: 9px;
      }

      .tool-section.brushes {
        justify-content: space-between;
      }

      .brush-button {
        width: 58px;
        min-height: 44px;
      }

      .brush-icon {
        transform: scale(0.88);
      }

      .palette {
        padding-left: 0;
        border-left: 0;
      }

      .range-row {
        grid-template-columns: 62px minmax(86px, 1fr) 40px;
        gap: 8px;
      }

      .action-button {
        flex: 1 1 0;
        min-width: 0;
        min-height: 44px;
        padding: 0 10px;
        font-size: 0.84rem;
      }

      .action-label {
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0 0 0 0);
      }

      .hint {
        top: 44%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.001ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <div class="sky-glow" aria-hidden="true"></div>
    <div class="distant-hills" aria-hidden="true"></div>
    <canvas id="paintCanvas" aria-label="Cloud painting canvas"></canvas>

    <header class="workspace-label" aria-label="Cloud Painter">
      <div class="sun-mark" aria-hidden="true"></div>
      <div class="brand">
        <h1>Cloud Painter</h1>
        <p>Draw a soft sky, then let it drift.</p>
      </div>
    </header>

    <p class="hint" id="hint">Paint the sky with your finger or mouse</p>
    <div class="toast" id="toast" role="status" aria-live="polite">Saved</div>

    <nav class="toolbar" aria-label="Painting tools">
      <section class="tool-section brushes" aria-label="Brush shapes">
        <button class="brush-button" type="button" data-brush="puff" aria-label="Puffy cloud brush" aria-pressed="true" title="Puffy cloud">
          <span class="brush-icon icon-puff"><span></span></span>
        </button>
        <button class="brush-button" type="button" data-brush="wisp" aria-label="Wispy cloud brush" aria-pressed="false" title="Wispy cloud">
          <span class="brush-icon icon-wisp"><span></span></span>
        </button>
        <button class="brush-button" type="button" data-brush="heart" aria-label="Heart cloud brush" aria-pressed="false" title="Heart cloud">
          <span class="brush-icon icon-heart"><span></span></span>
        </button>
        <button class="brush-button" type="button" data-brush="star" aria-label="Star cloud brush" aria-pressed="false" title="Star cloud">
          <span class="brush-icon icon-star"><span></span></span>
        </button>

        <div class="palette" aria-label="Cloud color">
          <button class="color-button" type="button" data-color="#ffffff" style="--swatch: #ffffff;" aria-label="Snow cloud color" aria-pressed="true" title="Snow"></button>
          <button class="color-button" type="button" data-color="#ffe4ef" style="--swatch: #ffe4ef;" aria-label="Pink cloud color" aria-pressed="false" title="Pink"></button>
          <button class="color-button" type="button" data-color="#fff6c9" style="--swatch: #fff6c9;" aria-label="Sun cream cloud color" aria-pressed="false" title="Cream"></button>
          <button class="color-button" type="button" data-color="#d9fbff" style="--swatch: #d9fbff;" aria-label="Blue cloud color" aria-pressed="false" title="Blue"></button>
        </div>
      </section>

      <section class="tool-section sliders" aria-label="Brush settings">
        <label class="range-row">
          <span class="label">Brush</span>
          <input id="sizeRange" type="range" min="18" max="96" value="48" aria-label="Brush size">
          <span class="value-pill" id="sizeValue">48</span>
        </label>
        <label class="range-row">
          <span class="label">Drift</span>
          <input id="driftRange" type="range" min="0" max="100" value="34" aria-label="Cloud drift speed">
          <span class="value-pill" id="driftValue">34</span>
        </label>
      </section>

      <section class="tool-section actions" aria-label="Actions">
        <button class="action-button" type="button" id="planeButton" aria-pressed="true" aria-label="Toggle airplanes">
          <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path fill="currentColor" d="M21.8 3.9c.5.5.2 1.4-.4 1.7l-6.8 3.1 2.8 6.5c.1.3 0 .7-.3.9l-1.1.8c-.3.2-.8.2-1-.1l-4.3-5.3-3.6 1.7.8 2.4c.1.3 0 .6-.2.8l-.8.8c-.3.3-.8.2-1-.1l-2-3-3.1-2c-.3-.2-.4-.7-.1-1l.8-.8c.2-.2.5-.3.8-.2l2.4.8 1.7-3.6-5.3-4.3c-.3-.2-.3-.7-.1-1l.8-1.1c.2-.3.6-.4.9-.3l6.5 2.8L18.4 2c.3-.6 1.2-.8 1.7-.4l1.7 2.3Z"/>
          </svg>
          <span class="action-label">Planes</span>
        </button>
        <button class="action-button" type="button" id="undoButton" aria-label="Undo last stroke">
          <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path fill="currentColor" d="M8.4 7H17a5 5 0 0 1 0 10h-2a1.2 1.2 0 1 1 0-2.4h2a2.6 2.6 0 0 0 0-5.2H8.4l2 2a1.2 1.2 0 1 1-1.7 1.7L4.6 9a1.2 1.2 0 0 1 0-1.7l4.1-4.1a1.2 1.2 0 0 1 1.7 1.7L8.4 7Z"/>
          </svg>
          <span class="action-label">Undo</span>
        </button>
        <button class="action-button danger" type="button" id="clearButton" aria-label="Clear painting">
          <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path fill="currentColor" d="M7.5 4.4 6.4 3.3a1.2 1.2 0 0 1 1.7-1.7l14.3 14.3a1.2 1.2 0 0 1-1.7 1.7l-2.1-2.1-.3 4a2.5 2.5 0 0 1-2.5 2.3H8.2a2.5 2.5 0 0 1-2.5-2.3L4.8 7.7H4a1.2 1.2 0 0 1 0-2.4h9.5l-.2-.9H7.5Zm-.3 3.3.9 11.6c0 .1.1.2.2.2h7.5c.1 0 .2-.1.2-.2l.5-5.8-5.8-5.8H7.2Zm12 1.3-.2 2.3-3.6-3.6H20a1.2 1.2 0 0 1 0 2.4h-.8Z"/>
          </svg>
          <span class="action-label">Clear</span>
        </button>
        <button class="action-button primary" type="button" id="saveButton" aria-label="Save sky image">
          <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path fill="currentColor" d="M12 3a1.2 1.2 0 0 1 1.2 1.2v8l2.4-2.4a1.2 1.2 0 1 1 1.7 1.7l-4.4 4.4a1.2 1.2 0 0 1-1.7 0l-4.4-4.4a1.2 1.2 0 1 1 1.7-1.7l2.4 2.4v-8A1.2 1.2 0 0 1 12 3ZM5.2 16.8a1.2 1.2 0 0 1 1.2 1.2v1.1h11.2V18a1.2 1.2 0 1 1 2.4 0v1.3a2.2 2.2 0 0 1-2.2 2.2H6.2A2.2 2.2 0 0 1 4 19.3V18a1.2 1.2 0 0 1 1.2-1.2Z"/>
          </svg>
          <span class="action-label">Save</span>
        </button>
      </section>
    </nav>
  </div>

  <script>
    (() => {
      const app = document.getElementById("app");
      const canvas = document.getElementById("paintCanvas");
      const ctx = canvas.getContext("2d", { alpha: false });
      const hint = document.getElementById("hint");
      const toast = document.getElementById("toast");
      const sizeRange = document.getElementById("sizeRange");
      const driftRange = document.getElementById("driftRange");
      const sizeValue = document.getElementById("sizeValue");
      const driftValue = document.getElementById("driftValue");
      const planeButton = document.getElementById("planeButton");
      const undoButton = document.getElementById("undoButton");
      const clearButton = document.getElementById("clearButton");
      const saveButton = document.getElementById("saveButton");
      const brushButtons = Array.from(document.querySelectorAll("[data-brush]"));
      const colorButtons = Array.from(document.querySelectorAll("[data-color]"));

      const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      const state = {
        brush: "puff",
        color: "#ffffff",
        size: Number(sizeRange.value),
        drift: Number(driftRange.value) / 100,
        painting: false,
        activePointer: null,
        lastPoint: null,
        currentStroke: null,
        hasPainted: false,
        planesOn: true,
        time: 0
      };

      const clouds = [];
      const history = [];
      const planes = [];
      const breezeLines = [];
      let dpr = 1;
      let cssWidth = 0;
      let cssHeight = 0;
      let toastTimer = 0;
      let lastFrame = performance.now();

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function rand(min, max) {
        return min + Math.random() * (max - min);
      }

      function hexToRgb(hex) {
        const clean = hex.replace("#", "");
        return {
          r: parseInt(clean.slice(0, 2), 16),
          g: parseInt(clean.slice(2, 4), 16),
          b: parseInt(clean.slice(4, 6), 16)
        };
      }

      function rgba(hex, alpha) {
        const rgb = hexToRgb(hex);
        return `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${alpha})`;
      }

      function lerpColor(a, b, t) {
        const ca = hexToRgb(a);
        const cb = hexToRgb(b);
        const r = Math.round(ca.r + (cb.r - ca.r) * t);
        const g = Math.round(ca.g + (cb.g - ca.g) * t);
        const bl = Math.round(ca.b + (cb.b - ca.b) * t);
        return `rgb(${r}, ${g}, ${bl})`;
      }

      function resizeCanvas() {
        const rect = canvas.getBoundingClientRect();
        const oldWidth = cssWidth || rect.width;
        const oldHeight = cssHeight || rect.height;
        cssWidth = Math.max(320, Math.floor(rect.width));
        cssHeight = Math.max(360, Math.floor(rect.height));
        dpr = Math.min(2, window.devicePixelRatio || 1);
        canvas.width = Math.round(cssWidth * dpr);
        canvas.height = Math.round(cssHeight * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        if (oldWidth && oldHeight && (Math.abs(oldWidth - cssWidth) > 1 || Math.abs(oldHeight - cssHeight) > 1)) {
          const sx = cssWidth / oldWidth;
          const sy = cssHeight / oldHeight;
          clouds.forEach((cloud) => {
            cloud.x *= sx;
            cloud.y *= sy;
            cloud.rx *= (sx + sy) / 2;
            cloud.ry *= (sx + sy) / 2;
          });
          planes.forEach((plane) => {
            plane.x *= sx;
            plane.y *= sy;
          });
        }

        seedPlanes();
        seedBreezeLines();
      }

      function seedPlanes() {
        if (planes.length) return;
        const colors = ["#f97272", "#55b7e8", "#ffcf63"];
        for (let i = 0; i < 3; i += 1) {
          planes.push({
            x: rand(-cssWidth, cssWidth * 0.8),
            y: rand(cssHeight * 0.13, cssHeight * 0.47),
            size: rand(0.75, 1.15),
            speed: rand(28, 52),
            color: colors[i % colors.length],
            bob: rand(0, Math.PI * 2),
            trail: []
          });
        }
      }

      function seedBreezeLines() {
        if (breezeLines.length || !cssWidth) return;
        for (let i = 0; i < 9; i += 1) {
          breezeLines.push({
            x: rand(0, cssWidth),
            y: rand(cssHeight * 0.12, cssHeight * 0.76),
            length: rand(34, 92),
            speed: rand(5, 14),
            alpha: rand(0.08, 0.2)
          });
        }
      }

      function drawBackground(targetCtx, width, height) {
        const sky = targetCtx.createLinearGradient(0, 0, 0, height);
        sky.addColorStop(0, "#75c7ff");
        sky.addColorStop(0.48, "#b6e9ff");
        sky.addColorStop(1, "#f9d89b");
        targetCtx.fillStyle = sky;
        targetCtx.fillRect(0, 0, width, height);

        targetCtx.save();
        targetCtx.globalAlpha = 0.72;
        targetCtx.fillStyle = "#fff8c8";
        targetCtx.beginPath();
        targetCtx.arc(width * 0.16, height * 0.15, Math.max(36, Math.min(width, height) * 0.07), 0, Math.PI * 2);
        targetCtx.fill();
        targetCtx.globalAlpha = 0.2;
        targetCtx.beginPath();
        targetCtx.arc(width * 0.16, height * 0.15, Math.max(62, Math.min(width, height) * 0.105), 0, Math.PI * 2);
        targetCtx.fill();
        targetCtx.restore();

        targetCtx.save();
        targetCtx.globalAlpha = 0.42;
        targetCtx.fillStyle = "#7ac791";
        targetCtx.beginPath();
        targetCtx.ellipse(width * 0.16, height * 1.02, width * 0.5, height * 0.16, 0, Math.PI, Math.PI * 2);
        targetCtx.fill();
        targetCtx.fillStyle = "#69b891";
        targetCtx.beginPath();
        targetCtx.ellipse(width * 0.78, height * 1.03, width * 0.58, height * 0.18, 0, Math.PI, Math.PI * 2);
        targetCtx.fill();
        targetCtx.restore();
      }

      function drawBreeze(targetCtx, width, height, elapsed) {
        targetCtx.save();
        targetCtx.lineWidth = 2;
        targetCtx.lineCap = "round";
        breezeLines.forEach((line) => {
          const x = (line.x + elapsed * line.speed) % (width + line.length * 2) - line.length;
          targetCtx.strokeStyle = `rgba(255,255,255,${line.alpha})`;
          targetCtx.beginPath();
          targetCtx.moveTo(x, line.y);
          targetCtx.bezierCurveTo(x + line.length * 0.3, line.y - 8, x + line.length * 0.66, line.y + 9, x + line.length, line.y);
          targetCtx.stroke();
        });
        targetCtx.restore();
      }

      function cloudOffset(cloud, elapsed) {
        const driftStrength = prefersReducedMotion ? 0 : state.drift;
        const move = elapsed * cloud.drift * driftStrength;
        const wrap = cssWidth + cloud.rx * 8;
        const x = ((cloud.x + move + cloud.rx * 4) % wrap) - cloud.rx * 4;
        const y = cloud.y + Math.sin(elapsed * 0.42 + cloud.phase) * cloud.wobble * driftStrength;
        return { x, y };
      }

      function drawCloud(targetCtx, cloud, elapsed, scaleX = 1, scaleY = 1) {
        const base = targetCtx === ctx ? cloudOffset(cloud, elapsed) : {
          x: cloud.x * scaleX,
          y: cloud.y * scaleY
        };
        const rx = cloud.rx * scaleX;
        const ry = cloud.ry * scaleY;
        const rotation = cloud.rotation + Math.sin(elapsed * 0.18 + cloud.phase) * 0.025 * state.drift;

        targetCtx.save();
        targetCtx.translate(base.x, base.y);
        targetCtx.rotate(rotation);
        const gradient = targetCtx.createRadialGradient(-rx * 0.28, -ry * 0.55, 1, 0, 0, Math.max(rx, ry) * 1.18);
        gradient.addColorStop(0, rgba(cloud.color, clamp(cloud.alpha + 0.2, 0, 0.96)));
        gradient.addColorStop(0.62, rgba(cloud.color, cloud.alpha));
        gradient.addColorStop(1, rgba(cloud.shadow, cloud.alpha * 0.5));
        targetCtx.fillStyle = gradient;
        targetCtx.beginPath();
        targetCtx.ellipse(0, 0, rx, ry, 0, 0, Math.PI * 2);
        targetCtx.fill();

        if (cloud.kind === "spark") {
          targetCtx.globalCompositeOperation = "lighter";
          targetCtx.globalAlpha = cloud.alpha * 0.42;
          targetCtx.fillStyle = "#fffbe0";
          targetCtx.beginPath();
          for (let i = 0; i < 5; i += 1) {
            const angle = -Math.PI / 2 + i * (Math.PI * 2 / 5);
            const outer = rx * 1.2;
            const inner = rx * 0.46;
            targetCtx.lineTo(Math.cos(angle) * outer, Math.sin(angle) * outer);
            targetCtx.lineTo(Math.cos(angle + Math.PI / 5) * inner, Math.sin(angle + Math.PI / 5) * inner);
          }
          targetCtx.closePath();
          targetCtx.fill();
        }
        targetCtx.restore();
      }

      function drawPlane(targetCtx, plane, elapsed, scaleX = 1, scaleY = 1) {
        const x = plane.x * scaleX;
        const y = (plane.y + Math.sin(elapsed * 1.3 + plane.bob) * 7) * scaleY;
        const s = plane.size * Math.min(scaleX, scaleY);

        targetCtx.save();
        targetCtx.translate(x, y);
        targetCtx.scale(s, s);
        targetCtx.rotate(Math.sin(elapsed + plane.bob) * 0.03);

        targetCtx.strokeStyle = "rgba(255, 255, 255, 0.54)";
        targetCtx.lineWidth = 3;
        targetCtx.lineCap = "round";
        targetCtx.beginPath();
        targetCtx.moveTo(-65, 9);
        targetCtx.bezierCurveTo(-44, 2, -29, 17, -9, 7);
        targetCtx.stroke();

        targetCtx.fillStyle = "rgba(45, 85, 116, 0.16)";
        targetCtx.beginPath();
        targetCtx.ellipse(2, 10, 34, 8, 0, 0, Math.PI * 2);
        targetCtx.fill();

        targetCtx.fillStyle = "#ffffff";
        targetCtx.beginPath();
        targetCtx.moveTo(-27, 2);
        targetCtx.quadraticCurveTo(2, -12, 34, 0);
        targetCtx.quadraticCurveTo(14, 11, -27, 8);
        targetCtx.closePath();
        targetCtx.fill();

        targetCtx.fillStyle = plane.color;
        targetCtx.beginPath();
        targetCtx.moveTo(-2, 2);
        targetCtx.lineTo(-31, -16);
        targetCtx.quadraticCurveTo(-34, -18, -31, -10);
        targetCtx.lineTo(-17, 5);
        targetCtx.closePath();
        targetCtx.fill();

        targetCtx.beginPath();
        targetCtx.moveTo(4, 4);
        targetCtx.lineTo(-22, 24);
        targetCtx.quadraticCurveTo(-25, 28, -18, 24);
        targetCtx.lineTo(12, 8);
        targetCtx.closePath();
        targetCtx.fill();

        targetCtx.fillStyle = "#315672";
        targetCtx.beginPath();
        targetCtx.moveTo(-23, 2);
        targetCtx.lineTo(-39, -8);
        targetCtx.lineTo(-34, 7);
        targetCtx.closePath();
        targetCtx.fill();

        targetCtx.fillStyle = "#6fd4ff";
        for (let i = 0; i < 3; i += 1) {
          targetCtx.beginPath();
          targetCtx.ellipse(4 + i * 10, -2, 3.6, 2.4, -0.12, 0, Math.PI * 2);
          targetCtx.fill();
        }
        targetCtx.restore();
      }

      function render(now) {
        const delta = Math.min(0.04, (now - lastFrame) / 1000);
        lastFrame = now;
        state.time += delta;

        drawBackground(ctx, cssWidth, cssHeight);
        drawBreeze(ctx, cssWidth, cssHeight, state.time);

        clouds.forEach((cloud) => drawCloud(ctx, cloud, state.time));

        if (state.planesOn) {
          planes.forEach((plane) => {
            if (!prefersReducedMotion) {
              plane.x += plane.speed * delta;
              if (plane.x > cssWidth + 90) {
                plane.x = rand(-220, -80);
                plane.y = rand(cssHeight * 0.13, cssHeight * 0.48);
                plane.size = rand(0.75, 1.15);
              }
            }
            drawPlane(ctx, plane, state.time);
          });
        }

        requestAnimationFrame(render);
      }

      function addCloudParticle(particle) {
        clouds.push({
          x: particle.x,
          y: particle.y,
          rx: particle.rx,
          ry: particle.ry,
          color: particle.color || state.color,
          shadow: particle.shadow || "#d9edf5",
          alpha: particle.alpha,
          rotation: particle.rotation || 0,
          drift: particle.drift || rand(7, 20),
          phase: rand(0, Math.PI * 2),
          wobble: particle.wobble || rand(1, 5),
          kind: particle.kind || "puff"
        });
        if (state.currentStroke) {
          state.currentStroke.count += 1;
        }
      }

      function stampPuff(x, y, pressure) {
        const size = state.size * (0.72 + pressure * 0.34);
        const pieces = Math.round(clamp(size / 15, 3, 8));
        for (let i = 0; i < pieces; i += 1) {
          const angle = rand(0, Math.PI * 2);
          const distance = rand(0, size * 0.3);
          addCloudParticle({
            x: x + Math.cos(angle) * distance,
            y: y + Math.sin(angle) * distance * 0.58,
            rx: rand(size * 0.22, size * 0.43),
            ry: rand(size * 0.13, size * 0.28),
            alpha: rand(0.36, 0.68),
            rotation: rand(-0.28, 0.28),
            drift: rand(6, 18)
          });
        }
      }

      function stampWisp(x, y, pressure) {
        const size = state.size * (0.74 + pressure * 0.26);
        for (let i = 0; i < 4; i += 1) {
          addCloudParticle({
            x: x + rand(-size * 0.46, size * 0.46),
            y: y + rand(-size * 0.2, size * 0.2),
            rx: rand(size * 0.42, size * 0.86),
            ry: rand(size * 0.045, size * 0.11),
            alpha: rand(0.18, 0.38),
            rotation: rand(-0.28, 0.18),
            drift: rand(12, 27),
            wobble: rand(2, 8)
          });
        }
      }

      function stampHeart(x, y, pressure) {
        const size = state.size * (0.64 + pressure * 0.24);
        const points = [
          [-0.32, -0.16, 0.34, 0.3],
          [0.32, -0.16, 0.34, 0.3],
          [0, 0.03, 0.43, 0.34],
          [-0.14, 0.26, 0.34, 0.3],
          [0.14, 0.26, 0.34, 0.3],
          [0, 0.48, 0.24, 0.22]
        ];
        points.forEach(([px, py, rx, ry]) => {
          addCloudParticle({
            x: x + px * size,
            y: y + py * size,
            rx: size * rx,
            ry: size * ry,
            alpha: rand(0.34, 0.58),
            rotation: rand(-0.2, 0.2),
            drift: rand(6, 16)
          });
        });
      }

      function stampStar(x, y, pressure) {
        const size = state.size * (0.55 + pressure * 0.3);
        const arms = 5;
        addCloudParticle({
          x,
          y,
          rx: size * 0.32,
          ry: size * 0.24,
          alpha: 0.35,
          rotation: rand(-0.2, 0.2),
          drift: rand(8, 16),
          kind: "spark",
          color: lerpColor(state.color, "#fff7b8", 0.34)
        });
        for (let i = 0; i < arms; i += 1) {
          const angle = -Math.PI / 2 + i * (Math.PI * 2 / arms);
          addCloudParticle({
            x: x + Math.cos(angle) * size * 0.38,
            y: y + Math.sin(angle) * size * 0.32,
            rx: size * 0.25,
            ry: size * 0.13,
            alpha: rand(0.24, 0.44),
            rotation: angle,
            drift: rand(7, 18),
            kind: "spark",
            color: lerpColor(state.color, "#fff7b8", 0.22)
          });
        }
      }

      function stampAt(x, y, pressure = 0.5) {
        const toolbarTop = cssHeight - parseInt(getComputedStyle(document.documentElement).getPropertyValue("--toolbar-height"), 10) - 24;
        if (y > toolbarTop) return;

        if (state.brush === "puff") stampPuff(x, y, pressure);
        if (state.brush === "wisp") stampWisp(x, y, pressure);
        if (state.brush === "heart") stampHeart(x, y, pressure);
        if (state.brush === "star") stampStar(x, y, pressure);

        state.hasPainted = true;
        hint.classList.add("hidden");
      }

      function pointerPosition(event) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: event.clientX - rect.left,
          y: event.clientY - rect.top,
          pressure: event.pressure && event.pressure > 0 ? event.pressure : 0.55
        };
      }

      function beginStroke(event) {
        if (event.button !== undefined && event.button !== 0) return;
        state.painting = true;
        state.activePointer = event.pointerId;
        state.currentStroke = { count: 0 };
        state.lastPoint = pointerPosition(event);
        canvas.setPointerCapture(event.pointerId);
        stampAt(state.lastPoint.x, state.lastPoint.y, state.lastPoint.pressure);
        popSparkle(event.clientX, event.clientY);
      }

      function continueStroke(event) {
        if (!state.painting || event.pointerId !== state.activePointer) return;
        const point = pointerPosition(event);
        const last = state.lastPoint || point;
        const dx = point.x - last.x;
        const dy = point.y - last.y;
        const distance = Math.hypot(dx, dy);
        const step = clamp(state.size * 0.24, 8, 22);
        const steps = Math.max(1, Math.floor(distance / step));

        for (let i = 1; i <= steps; i += 1) {
          const t = i / steps;
          const x = last.x + dx * t;
          const y = last.y + dy * t;
          stampAt(x, y, point.pressure);
        }
        state.lastPoint = point;
      }

      function endStroke(event) {
        if (!state.painting || event.pointerId !== state.activePointer) return;
        if (state.currentStroke && state.currentStroke.count > 0) {
          history.push(state.currentStroke.count);
          if (history.length > 80) history.shift();
        }
        state.painting = false;
        state.activePointer = null;
        state.lastPoint = null;
        state.currentStroke = null;
      }

      function popSparkle(clientX, clientY) {
        const sparkle = document.createElement("span");
        sparkle.className = "sparkle";
        sparkle.style.left = `${clientX}px`;
        sparkle.style.top = `${clientY}px`;
        app.appendChild(sparkle);
        sparkle.addEventListener("animationend", () => sparkle.remove(), { once: true });
      }

      function setBrush(brush) {
        state.brush = brush;
        brushButtons.forEach((button) => {
          button.setAttribute("aria-pressed", button.dataset.brush === brush ? "true" : "false");
        });
      }

      function setColor(color) {
        state.color = color;
        colorButtons.forEach((button) => {
          button.setAttribute("aria-pressed", button.dataset.color === color ? "true" : "false");
        });
      }

      function showToast(message) {
        toast.textContent = message;
        toast.classList.add("show");
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove("show"), 1700);
      }

      function undo() {
        const count = history.pop();
        if (!count) {
          showToast("Nothing to undo yet");
          return;
        }
        clouds.splice(Math.max(0, clouds.length - count), count);
        showToast("Last cloud stroke floated away");
        if (!clouds.length) {
          state.hasPainted = false;
          hint.classList.remove("hidden");
        }
      }

      function clearPainting() {
        clouds.length = 0;
        history.length = 0;
        state.hasPainted = false;
        hint.classList.remove("hidden");
        showToast("Fresh sky");
      }

      function saveImage() {
        const exportCanvas = document.createElement("canvas");
        const exportCtx = exportCanvas.getContext("2d", { alpha: false });
        const width = Math.round(cssWidth * dpr);
        const height = Math.round(cssHeight * dpr);
        exportCanvas.width = width;
        exportCanvas.height = height;
        exportCtx.setTransform(dpr, 0, 0, dpr, 0, 0);

        drawBackground(exportCtx, cssWidth, cssHeight);
        drawBreeze(exportCtx, cssWidth, cssHeight, state.time);
        clouds.forEach((cloud) => {
          const saved = { ...cloud, x: cloudOffset(cloud, state.time).x, y: cloudOffset(cloud, state.time).y };
          drawCloud(exportCtx, saved, 0);
        });
        if (state.planesOn) {
          planes.forEach((plane) => drawPlane(exportCtx, plane, state.time));
        }

        const link = document.createElement("a");
        link.download = `cloud-painter-${new Date().toISOString().slice(0, 10)}.png`;
        link.href = exportCanvas.toDataURL("image/png");
        link.click();
        showToast("Sky saved as PNG");
      }

      function bindControls() {
        canvas.addEventListener("pointerdown", beginStroke);
        canvas.addEventListener("pointermove", continueStroke);
        canvas.addEventListener("pointerup", endStroke);
        canvas.addEventListener("pointercancel", endStroke);
        canvas.addEventListener("lostpointercapture", () => {
          if (state.currentStroke && state.currentStroke.count > 0) history.push(state.currentStroke.count);
          state.painting = false;
          state.activePointer = null;
          state.currentStroke = null;
        });

        brushButtons.forEach((button) => {
          button.addEventListener("click", () => setBrush(button.dataset.brush));
        });
        colorButtons.forEach((button) => {
          button.addEventListener("click", () => setColor(button.dataset.color));
        });

        sizeRange.addEventListener("input", () => {
          state.size = Number(sizeRange.value);
          sizeValue.textContent = sizeRange.value;
        });
        driftRange.addEventListener("input", () => {
          state.drift = Number(driftRange.value) / 100;
          driftValue.textContent = driftRange.value;
        });

        planeButton.addEventListener("click", () => {
          state.planesOn = !state.planesOn;
          planeButton.setAttribute("aria-pressed", state.planesOn ? "true" : "false");
          showToast(state.planesOn ? "Planes are flying" : "Planes are resting");
        });
        undoButton.addEventListener("click", undo);
        clearButton.addEventListener("click", clearPainting);
        saveButton.addEventListener("click", saveImage);

        window.addEventListener("resize", resizeCanvas);
        window.addEventListener("keydown", (event) => {
          const key = event.key.toLowerCase();
          if ((event.metaKey || event.ctrlKey) && key === "z") {
            event.preventDefault();
            undo();
          }
          if ((event.metaKey || event.ctrlKey) && key === "s") {
            event.preventDefault();
            saveImage();
          }
          if (key === "1") setBrush("puff");
          if (key === "2") setBrush("wisp");
          if (key === "3") setBrush("heart");
          if (key === "4") setBrush("star");
        });
      }

      function addStarterClouds() {
        const starter = [
          { x: 0.66, y: 0.18, s: 0.9, c: "#ffffff" },
          { x: 0.83, y: 0.32, s: 0.62, c: "#fff6c9" },
          { x: 0.28, y: 0.36, s: 0.52, c: "#d9fbff" }
        ];
        starter.forEach((item) => {
          const oldSize = state.size;
          const oldColor = state.color;
          state.size = Math.max(26, Math.min(72, cssWidth * 0.075 * item.s));
          state.color = item.c;
          state.currentStroke = null;
          stampPuff(cssWidth * item.x, cssHeight * item.y, 0.46);
          state.size = oldSize;
          state.color = oldColor;
        });
        state.hasPainted = false;
        hint.classList.remove("hidden");
        history.length = 0;
      }

      resizeCanvas();
      bindControls();
      addStarterClouds();
      requestAnimationFrame((now) => {
        lastFrame = now;
        render(now);
      });
    })();
  </script>
</body>
</html>
