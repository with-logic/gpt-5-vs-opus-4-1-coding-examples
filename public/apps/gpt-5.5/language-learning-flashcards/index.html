<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Travel Flashcards</title>
  <style>
    :root {
      --paper: #f6efe0;
      --paper-deep: #ead9bd;
      --ink: #263238;
      --muted: #6c6257;
      --line: rgba(38, 50, 56, 0.14);
      --teal: #1f8a84;
      --teal-deep: #14645f;
      --coral: #d8593f;
      --gold: #c8922f;
      --plum: #6d476a;
      --white: #fffaf0;
      --shadow: 0 28px 70px rgba(78, 59, 31, 0.22);
      --radius: 8px;
      color-scheme: light;
      font-family: ui-serif, Georgia, Cambria, "Times New Roman", Times, serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--paper);
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(31, 138, 132, 0.08) 1px, transparent 1px) 0 0 / 44px 44px,
        linear-gradient(0deg, rgba(216, 89, 63, 0.06) 1px, transparent 1px) 0 0 / 44px 44px,
        radial-gradient(circle at 12% 8%, rgba(200, 146, 47, 0.18), transparent 28%),
        linear-gradient(135deg, #fbf6ea 0%, #f1e1c7 55%, #e6d1b1 100%);
      overflow-x: hidden;
    }

    button, select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    button:focus-visible, select:focus-visible, .card-button:focus-visible {
      outline: 3px solid rgba(216, 89, 63, 0.72);
      outline-offset: 4px;
    }

    .shell {
      width: min(1180px, calc(100% - 32px));
      min-height: 100vh;
      margin: 0 auto;
      padding: 28px 0;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 24px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .mark {
      width: 42px;
      height: 42px;
      border: 2px solid rgba(38, 50, 56, 0.82);
      display: grid;
      place-items: center;
      background: var(--teal);
      color: #fff8e8;
      box-shadow: 5px 5px 0 rgba(38, 50, 56, 0.16);
      font-size: 22px;
      flex: 0 0 auto;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.85rem, 4vw, 3.9rem);
      line-height: 0.9;
      letter-spacing: 0;
      max-width: 12ch;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .locale-wrap {
      position: relative;
    }

    .locale-wrap::after {
      content: "▾";
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      font-size: 13px;
    }

    select {
      appearance: none;
      border: 1px solid rgba(38, 50, 56, 0.25);
      background: rgba(255, 250, 240, 0.72);
      color: var(--ink);
      border-radius: var(--radius);
      min-height: 42px;
      padding: 0 34px 0 12px;
      box-shadow: 0 12px 22px rgba(78, 59, 31, 0.08);
    }

    .app {
      align-self: center;
      display: grid;
      grid-template-columns: minmax(250px, 340px) minmax(0, 1fr);
      gap: 30px;
      align-items: stretch;
    }

    .panel {
      background: rgba(255, 250, 240, 0.62);
      border: 1px solid rgba(38, 50, 56, 0.16);
      border-radius: var(--radius);
      box-shadow: 0 18px 48px rgba(78, 59, 31, 0.15);
      backdrop-filter: blur(10px);
    }

    .side {
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    .eyebrow {
      margin: 0 0 8px;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--coral);
    }

    h2 {
      margin: 0;
      font-size: clamp(1.7rem, 3vw, 2.65rem);
      line-height: 0.95;
      letter-spacing: 0;
    }

    .muted {
      margin: 9px 0 0;
      color: var(--muted);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.45;
    }

    .language-grid {
      display: grid;
      gap: 10px;
    }

    .lang-btn {
      min-height: 58px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      color: var(--ink);
      background: rgba(255, 250, 240, 0.78);
      border: 1px solid rgba(38, 50, 56, 0.18);
      border-radius: var(--radius);
      text-align: left;
      transition: transform 180ms ease, border-color 180ms ease, background 180ms ease, box-shadow 180ms ease;
    }

    .lang-btn:hover {
      transform: translateY(-2px);
      border-color: rgba(31, 138, 132, 0.6);
      box-shadow: 0 10px 24px rgba(78, 59, 31, 0.11);
    }

    .lang-btn.active {
      background: #fff8e8;
      border-color: rgba(31, 138, 132, 0.95);
      box-shadow: inset 5px 0 0 var(--teal), 0 10px 24px rgba(78, 59, 31, 0.12);
    }

    .flag {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: var(--paper-deep);
      font-size: 1.25rem;
    }

    .lang-name {
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-weight: 800;
      letter-spacing: 0;
    }

    .check {
      color: var(--teal);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-weight: 900;
      opacity: 0;
      transform: translateX(-4px);
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .lang-btn.active .check {
      opacity: 1;
      transform: translateX(0);
    }

    .progress-wrap {
      display: grid;
      gap: 8px;
    }

    .progress-row {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      color: var(--muted);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
    }

    .track {
      height: 10px;
      border-radius: 999px;
      background: rgba(38, 50, 56, 0.12);
      overflow: hidden;
    }

    .bar {
      width: 0;
      height: 100%;
      background: linear-gradient(90deg, var(--teal), var(--gold), var(--coral));
      transition: width 420ms cubic-bezier(.2,.8,.2,1);
    }

    .learned-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-height: 35px;
      align-content: start;
    }

    .chip {
      max-width: 100%;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(31, 138, 132, 0.12);
      color: var(--teal-deep);
      border: 1px solid rgba(31, 138, 132, 0.18);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 0.78rem;
      font-weight: 800;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      animation: chipIn 320ms ease both;
    }

    .stage {
      position: relative;
      min-height: 620px;
      padding: clamp(16px, 4vw, 42px);
      display: grid;
      place-items: center;
      overflow: hidden;
      isolation: isolate;
    }

    .stage::before {
      content: "";
      position: absolute;
      inset: 22px;
      border: 2px dashed rgba(38, 50, 56, 0.14);
      border-radius: var(--radius);
      z-index: -1;
    }

    .card-stack {
      width: min(100%, 620px);
      display: grid;
      gap: 22px;
      justify-items: center;
      perspective: 1300px;
    }

    .card-button {
      width: min(100%, 560px);
      aspect-ratio: 1.32 / 1;
      padding: 0;
      border: 0;
      background: transparent;
      border-radius: 16px;
      perspective: inherit;
      cursor: pointer;
      position: relative;
      animation: dealIn 520ms cubic-bezier(.2,.8,.2,1) both;
    }

    .card-button::before,
    .card-button::after {
      content: "";
      position: absolute;
      inset: 12px;
      border-radius: 14px;
      background: rgba(255, 250, 240, 0.62);
      border: 1px solid rgba(38, 50, 56, 0.12);
      transform: translate(12px, 12px) rotate(2.4deg);
      z-index: -1;
      transition: transform 300ms ease;
    }

    .card-button::after {
      transform: translate(-10px, 16px) rotate(-2deg);
      background: rgba(234, 217, 189, 0.86);
    }

    .card-button:hover::before {
      transform: translate(16px, 14px) rotate(3.5deg);
    }

    .card-button:hover::after {
      transform: translate(-13px, 18px) rotate(-3deg);
    }

    .card {
      position: absolute;
      inset: 0;
      transform-style: preserve-3d;
      transition: transform 620ms cubic-bezier(.22,.74,.2,1), filter 280ms ease;
    }

    .card-button.flipped .card {
      transform: rotateY(180deg);
    }

    .card-button.leaving .card {
      animation: learnedOut 540ms cubic-bezier(.22,.74,.2,1) both;
    }

    .stage.shuffling .card-button {
      animation: shufflePulse 640ms cubic-bezier(.2,.8,.2,1) both;
    }

    .face {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 18px;
      padding: clamp(22px, 4.6vw, 46px);
      border-radius: 16px;
      border: 2px solid rgba(38, 50, 56, 0.78);
      backface-visibility: hidden;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .face::before {
      content: "";
      position: absolute;
      inset: 14px;
      border: 1px solid rgba(38, 50, 56, 0.13);
      border-radius: 10px;
      pointer-events: none;
    }

    .face.front {
      background:
        linear-gradient(135deg, rgba(31, 138, 132, 0.08), transparent 46%),
        linear-gradient(180deg, #fffaf0 0%, #f9ebd3 100%);
    }

    .face.back {
      transform: rotateY(180deg);
      color: #fffaf0;
      background:
        linear-gradient(135deg, rgba(200, 146, 47, 0.24), transparent 42%),
        linear-gradient(155deg, #14645f 0%, #1f8a84 52%, #405b54 100%);
      border-color: rgba(255, 250, 240, 0.86);
    }

    .face.back::before {
      border-color: rgba(255, 250, 240, 0.2);
    }

    .card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      min-width: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 0.82rem;
      font-weight: 900;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--coral);
    }

    .face.back .card-meta {
      color: #f5d58f;
    }

    .card-number {
      white-space: nowrap;
    }

    .learned-stamp {
      padding: 6px 9px;
      border-radius: 999px;
      color: var(--teal-deep);
      background: rgba(31, 138, 132, 0.12);
      border: 1px solid rgba(31, 138, 132, 0.2);
      opacity: 0;
      transform: scale(0.88);
      transition: opacity 200ms ease, transform 200ms ease;
      letter-spacing: 0.04em;
    }

    .card-button.is-learned .learned-stamp {
      opacity: 1;
      transform: scale(1);
    }

    .face.back .learned-stamp {
      color: #fff8e8;
      background: rgba(255, 250, 240, 0.12);
      border-color: rgba(255, 250, 240, 0.24);
    }

    .card-text {
      align-self: center;
      margin: 0;
      font-size: clamp(2rem, 6vw, 4.65rem);
      line-height: 0.95;
      letter-spacing: 0;
      text-wrap: balance;
      overflow-wrap: anywhere;
    }

    .card-text.jp {
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "Noto Serif JP", ui-serif, serif;
      line-height: 1.08;
    }

    .subline {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--muted);
      font-size: clamp(0.92rem, 2vw, 1.08rem);
      font-weight: 700;
      line-height: 1.4;
    }

    .face.back .subline {
      color: rgba(255, 250, 240, 0.78);
    }

    .actions {
      width: min(100%, 560px);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .action {
      min-height: 50px;
      border-radius: var(--radius);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 14px;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 0.94rem;
      font-weight: 900;
      color: var(--ink);
      background: rgba(255, 250, 240, 0.78);
      border: 1px solid rgba(38, 50, 56, 0.2);
      box-shadow: 0 12px 26px rgba(78, 59, 31, 0.1);
      transition: transform 180ms ease, box-shadow 180ms ease, background 180ms ease;
    }

    .action:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 30px rgba(78, 59, 31, 0.14);
      background: #fffaf0;
    }

    .action.primary {
      color: #fff8e8;
      background: var(--teal);
      border-color: var(--teal-deep);
    }

    .action.primary:hover {
      background: var(--teal-deep);
    }

    .action.done {
      color: #fff8e8;
      background: var(--coral);
      border-color: #ac3e2b;
    }

    .action:disabled {
      cursor: not-allowed;
      opacity: 0.5;
      transform: none;
    }

    .complete {
      display: none;
      width: min(100%, 560px);
      padding: clamp(24px, 5vw, 48px);
      background: #fffaf0;
      border: 2px solid rgba(38, 50, 56, 0.78);
      border-radius: 16px;
      box-shadow: var(--shadow);
      text-align: center;
      animation: dealIn 520ms ease both;
    }

    .complete.visible {
      display: grid;
      gap: 18px;
      justify-items: center;
    }

    .complete h3 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 4rem);
      line-height: 0.95;
    }

    .complete p {
      margin: 0;
      color: var(--muted);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.45;
      max-width: 38ch;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @keyframes dealIn {
      from {
        opacity: 0;
        transform: translateY(28px) rotateX(10deg) scale(0.96);
      }
      to {
        opacity: 1;
        transform: translateY(0) rotateX(0) scale(1);
      }
    }

    @keyframes shufflePulse {
      0% { transform: translateX(0) rotate(0); }
      18% { transform: translateX(-34px) rotate(-5deg); }
      38% { transform: translateX(32px) rotate(4deg); }
      62% { transform: translateX(-16px) rotate(-2deg); }
      100% { transform: translateX(0) rotate(0); }
    }

    @keyframes learnedOut {
      0% { transform: translateY(0) rotateY(var(--flip, 0deg)) scale(1); opacity: 1; }
      42% { transform: translateY(-10px) rotateY(var(--flip, 0deg)) scale(1.02); opacity: 1; }
      100% { transform: translateY(70px) rotateY(var(--flip, 0deg)) scale(0.9); opacity: 0; }
    }

    @keyframes chipIn {
      from { opacity: 0; transform: translateY(8px) scale(0.92); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @media (max-width: 860px) {
      .shell {
        width: min(100% - 22px, 680px);
        padding: 18px 0;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      h1 {
        max-width: none;
      }

      .toolbar {
        width: 100%;
        justify-content: stretch;
      }

      .locale-wrap, select {
        width: 100%;
      }

      .app {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .side {
        padding: 18px;
      }

      .language-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .lang-btn {
        grid-template-columns: auto 1fr;
      }

      .check {
        display: none;
      }

      .stage {
        min-height: auto;
        padding: 18px;
      }

      .stage::before {
        inset: 12px;
      }

      .card-button {
        aspect-ratio: 0.9 / 1;
      }

      .actions {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 480px) {
      .language-grid {
        grid-template-columns: 1fr;
      }

      .face {
        padding: 24px;
      }

      .card-text {
        font-size: clamp(1.85rem, 10vw, 3.25rem);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="mark" aria-hidden="true">✈</div>
        <h1 id="appTitle">Travel Flashcards</h1>
      </div>
      <div class="toolbar">
        <label class="sr-only" for="uiLanguage" id="uiLanguageLabel">Interface language</label>
        <div class="locale-wrap">
          <select id="uiLanguage" aria-labelledby="uiLanguageLabel">
            <option value="en">English UI</option>
            <option value="es">Interfaz en español</option>
            <option value="fr">Interface française</option>
            <option value="ja">日本語UI</option>
          </select>
        </div>
      </div>
    </header>

    <main class="app" aria-live="polite">
      <aside class="side panel" aria-label="Language and progress">
        <section>
          <p class="eyebrow" id="chooseEyebrow">Choose a language</p>
          <h2 id="chooseTitle">What do you want to learn?</h2>
          <p class="muted" id="chooseCopy">Ten travel phrases are ready for your next trip.</p>
        </section>

        <section class="language-grid" id="languageGrid" aria-label="Target language"></section>

        <section class="progress-wrap" aria-label="Progress">
          <div class="progress-row">
            <span id="progressLabel">Progress</span>
            <span id="progressValue">0 / 10</span>
          </div>
          <div class="track" aria-hidden="true"><div class="bar" id="progressBar"></div></div>
        </section>

        <section>
          <p class="eyebrow" id="learnedTitle">Learned</p>
          <div class="learned-list" id="learnedList"></div>
        </section>
      </aside>

      <section class="stage panel" id="stage" aria-label="Flashcard workspace">
        <div class="card-stack" id="cardStack">
          <button class="card-button" id="cardButton" type="button" aria-pressed="false">
            <span class="sr-only" id="cardButtonLabel">Flip card</span>
            <article class="card" id="card">
              <div class="face front">
                <div class="card-meta">
                  <span id="frontMeta">Question</span>
                  <span class="learned-stamp" id="frontStamp">Learned</span>
                </div>
                <p class="card-text" id="frontText"></p>
                <p class="subline" id="frontSubline"></p>
              </div>
              <div class="face back">
                <div class="card-meta">
                  <span id="backMeta">Translation</span>
                  <span class="learned-stamp" id="backStamp">Learned</span>
                </div>
                <p class="card-text" id="backText"></p>
                <p class="subline" id="backSubline"></p>
              </div>
            </article>
          </button>

          <div class="complete" id="completePanel" aria-hidden="true">
            <h3 id="completeTitle">Deck complete</h3>
            <p id="completeCopy">All ten phrases are marked as learned.</p>
            <button class="action primary" id="resetButton" type="button">↺ Reset</button>
          </div>

          <div class="actions" id="actions">
            <button class="action primary" id="flipButton" type="button">↻ Flip</button>
            <button class="action" id="shuffleButton" type="button">⇄ Shuffle</button>
            <button class="action done" id="learnButton" type="button">✓ Mark learned</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const ui = {
      en: {
        htmlLang: "en",
        appTitle: "Travel Flashcards",
        uiLanguageLabel: "Interface language",
        chooseEyebrow: "Choose a language",
        chooseTitle: "What do you want to learn?",
        chooseCopy: "Ten travel phrases are ready for your next trip.",
        progressLabel: "Progress",
        learnedTitle: "Learned",
        emptyLearned: "None yet",
        question: "Question",
        translation: "Translation",
        learned: "Learned",
        flip: "↻ Flip",
        shuffle: "⇄ Shuffle",
        markLearned: "✓ Mark learned",
        learnedMarked: "✓ Learned",
        reset: "↺ Reset",
        completeTitle: "Deck complete",
        completeCopy: "All ten phrases are marked as learned.",
        targetLabel: "Learning",
        phraseOf: "{current} of {total}",
        frontSubline: "Travel prompt",
        backSubline: "Phrase in {language}",
        names: { en: "English", es: "Spanish", fr: "French", ja: "Japanese" }
      },
      es: {
        htmlLang: "es",
        appTitle: "Tarjetas de viaje",
        uiLanguageLabel: "Idioma de la interfaz",
        chooseEyebrow: "Elige un idioma",
        chooseTitle: "¿Qué quieres aprender?",
        chooseCopy: "Diez frases de viaje listas para tu próxima salida.",
        progressLabel: "Progreso",
        learnedTitle: "Aprendidas",
        emptyLearned: "Todavía ninguna",
        question: "Pregunta",
        translation: "Traducción",
        learned: "Aprendida",
        flip: "↻ Voltear",
        shuffle: "⇄ Mezclar",
        markLearned: "✓ Marcar aprendida",
        learnedMarked: "✓ Aprendida",
        reset: "↺ Reiniciar",
        completeTitle: "Mazo completo",
        completeCopy: "Las diez frases están marcadas como aprendidas.",
        targetLabel: "Aprendiendo",
        phraseOf: "{current} de {total}",
        frontSubline: "Pregunta de viaje",
        backSubline: "Frase en {language}",
        names: { en: "Inglés", es: "Español", fr: "Francés", ja: "Japonés" }
      },
      fr: {

        uiLanguageLabel: "Langue de l'interface",
        chooseEyebrow: "Choisir une langue",
        chooseTitle: "Que voulez-vous apprendre ?",

        emptyLearned: "Pas encore",
        question: "Question",

        flip: "↻ Retourner",

        markLearned: "✓ Marquer apprise",
        learnedMarked: "✓ Apprise",
        reset: "↺ Réinitialiser",

        completeCopy: "Les dix phrases sont marquées comme apprises.",
        targetLabel: "Apprentissage",
        phraseOf: "{current} sur {total}",

        backSubline: "Phrase en {language}",
        names: { en: "Anglais", es: "Espagnol", fr: "Français", ja: "Japonais" }
      },
      ja: {
        htmlLang: "ja",
        appTitle: "旅のフラッシュカード",
        uiLanguageLabel: "インターフェース言語",
        chooseEyebrow: "言語を選択",
        chooseTitle: "どの言語を学びますか？",
        chooseCopy: "次の旅に使える10個のフレーズです。",
        progressLabel: "進み具合",
        learnedTitle: "覚えたもの",
        emptyLearned: "まだありません",
        question: "問題",
        translation: "翻訳",
        learned: "習得済み",
        flip: "↻ めくる",
        shuffle: "⇄ シャッフル",
        markLearned: "✓ 覚えた",
        learnedMarked: "✓ 習得済み",
        reset: "↺ リセット",
        completeTitle: "デッキ完了",
        completeCopy: "10個すべてのフレーズを習得済みにしました。",
        targetLabel: "学習中",
        phraseOf: "{current} / {total}",
        frontSubline: "旅行フレーズの問題",
        backSubline: "{language}のフレーズ",
        names: { en: "英語", es: "スペイン語", fr: "フランス語", ja: "日本語" }
      }
    };

    const languages = [
      { code: "en", flag: "EN" },
      { code: "es", flag: "ES" },
      { code: "fr", flag: "FR" },
      { code: "ja", flag: "日" }
    ];

    const phrases = [
      {
        id: "station",
        prompt: {
          en: "Ask where the train station is.",
          es: "Pregunta dónde está la estación de tren.",
          fr: "Demandez où se trouve la gare.",
          ja: "駅がどこにあるか尋ねる。"
        },
        phrase: {
          en: "Where is the train station?",
          es: "¿Dónde está la estación de tren?",
          fr: "Où est la gare ?",
          ja: "駅はどこですか？"
        },
        romanji: "Eki wa doko desu ka?"
      },
      {
        id: "ticket",
        prompt: {
          en: "Buy one ticket to the city center.",
          es: "Compra un boleto al centro de la ciudad.",
          fr: "Achetez un billet pour le centre-ville.",
          ja: "市内中心部までの切符を1枚買う。"
        },
        phrase: {
          en: "One ticket to the city center, please.",
          es: "Un boleto al centro de la ciudad, por favor.",
          fr: "Un billet pour le centre-ville, s'il vous plaît.",
          ja: "市内中心部までの切符を一枚ください。"
        },
        romanji: "Shinai chushinbu made no kippu o ichimai kudasai."
      },
      {
        id: "cost",
        prompt: {
          en: "Ask how much something costs.",
          es: "Pregunta cuánto cuesta algo.",
          fr: "Demandez combien coûte quelque chose.",
          ja: "値段を尋ねる。"
        },
        phrase: {
          en: "How much does this cost?",
          es: "¿Cuánto cuesta esto?",
          fr: "Combien ça coûte ?",
          ja: "これはいくらですか？"
        },
        romanji: "Kore wa ikura desu ka?"
      },
      {
        id: "bathroom",
        prompt: {
          en: "Ask where the bathroom is.",
          es: "Pregunta dónde está el baño.",
          fr: "Demandez où sont les toilettes.",
          ja: "トイレの場所を尋ねる。"
        },
        phrase: {
          en: "Where is the bathroom?",
          es: "¿Dónde está el baño?",
          fr: "Où sont les toilettes ?",
          ja: "トイレはどこですか？"
        },
        romanji: "Toire wa doko desu ka?"
      },
      {
        id: "help",
        prompt: {
          en: "Ask someone for help.",
          es: "Pide ayuda a alguien.",
          fr: "Demandez de l'aide à quelqu'un.",
          ja: "誰かに助けを求める。"
        },
        phrase: {
          en: "Can you help me, please?",
          es: "¿Puede ayudarme, por favor?",
          fr: "Pouvez-vous m'aider, s'il vous plaît ?",
          ja: "手伝っていただけますか？"
        },
        romanji: "Tetsudatte itadakemasu ka?"
      },
      {
        id: "hotel",
        prompt: {
          en: "Tell a driver you need to go to your hotel.",
          es: "Dile a un conductor que necesitas ir a tu hotel.",
          fr: "Dites à un chauffeur que vous devez aller à votre hôtel.",
          ja: "運転手にホテルへ行きたいと伝える。"
        },
        phrase: {
          en: "I need to go to my hotel.",
          es: "Necesito ir a mi hotel.",
          fr: "Je dois aller à mon hôtel.",
          ja: "ホテルに行きたいです。"
        },
        romanji: "Hoteru ni ikitai desu."
      },
      {
        id: "menu",
        prompt: {
          en: "Ask to see the menu.",
          es: "Pide ver el menú.",
          fr: "Demandez à voir le menu.",
          ja: "メニューを見せてもらう。"
        },
        phrase: {
          en: "May I see the menu?",
          es: "¿Puedo ver el menú?",
          fr: "Puis-je voir le menu ?",
          ja: "メニューを見てもいいですか？"
        },
        romanji: "Menyu o mite mo ii desu ka?"
      },
      {
        id: "allergy",
        prompt: {
          en: "Say that you have a food allergy.",
          es: "Di que tienes una alergia alimentaria.",
          fr: "Dites que vous avez une allergie alimentaire.",
          ja: "食物アレルギーがあると伝える。"
        },
        phrase: {
          en: "I have a food allergy.",
          es: "Tengo una alergia alimentaria.",
          fr: "J'ai une allergie alimentaire.",
          ja: "食物アレルギーがあります。"
        },
        romanji: "Shokumotsu arerugi ga arimasu."
      },
      {
        id: "lost",
        prompt: {
          en: "Say that you are lost.",
          es: "Di que estás perdido.",
          fr: "Dites que vous êtes perdu.",
          ja: "道に迷ったと伝える。"
        },
        phrase: {
          en: "I am lost.",
          es: "Estoy perdido.",
          fr: "Je suis perdu.",
          ja: "道に迷いました。"
        },
        romanji: "Michi ni mayoimashita."
      },
      {
        id: "english",
        prompt: {
          en: "Ask if the person speaks English.",
          es: "Pregunta si la persona habla inglés.",
          fr: "Demandez si la personne parle anglais.",
          ja: "相手が英語を話せるか尋ねる。"
        },
        phrase: {
          en: "Do you speak English?",
          es: "¿Habla inglés?",
          fr: "Parlez-vous anglais ?",
          ja: "英語を話せますか？"
        },
        romanji: "Eigo o hanasemasu ka?"
      }
    ];

    const state = {
      uiLang: detectUiLanguage(),
      targetLang: "es",
      order: phrases.map((phrase) => phrase.id),
      currentIndex: 0,
      flipped: false,
      learned: new Set()
    };

    const els = {
      html: document.documentElement,
      appTitle: document.getElementById("appTitle"),
      uiLanguage: document.getElementById("uiLanguage"),
      uiLanguageLabel: document.getElementById("uiLanguageLabel"),
      chooseEyebrow: document.getElementById("chooseEyebrow"),
      chooseTitle: document.getElementById("chooseTitle"),
      chooseCopy: document.getElementById("chooseCopy"),
      languageGrid: document.getElementById("languageGrid"),
      progressLabel: document.getElementById("progressLabel"),
      progressValue: document.getElementById("progressValue"),
      progressBar: document.getElementById("progressBar"),
      learnedTitle: document.getElementById("learnedTitle"),
      learnedList: document.getElementById("learnedList"),
      stage: document.getElementById("stage"),
      cardButton: document.getElementById("cardButton"),
      cardButtonLabel: document.getElementById("cardButtonLabel"),
      frontMeta: document.getElementById("frontMeta"),
      backMeta: document.getElementById("backMeta"),
      frontStamp: document.getElementById("frontStamp"),
      backStamp: document.getElementById("backStamp"),
      frontText: document.getElementById("frontText"),
      backText: document.getElementById("backText"),
      frontSubline: document.getElementById("frontSubline"),
      backSubline: document.getElementById("backSubline"),
      flipButton: document.getElementById("flipButton"),
      shuffleButton: document.getElementById("shuffleButton"),
      learnButton: document.getElementById("learnButton"),
      resetButton: document.getElementById("resetButton"),
      completePanel: document.getElementById("completePanel"),
      completeTitle: document.getElementById("completeTitle"),
      completeCopy: document.getElementById("completeCopy"),
      actions: document.getElementById("actions")
    };

    function detectUiLanguage() {
      const raw = (navigator.language || navigator.userLanguage || "en").slice(0, 2).toLowerCase();
      return ui[raw] ? raw : "en";
    }

    function t(key) {
      return ui[state.uiLang][key];
    }

    function phraseById(id) {
      return phrases.find((phrase) => phrase.id === id);
    }

    function currentPhrase() {
      return phraseById(state.order[state.currentIndex]) || phrases[0];
    }

    function nextUnlearnedIndex(fromIndex = 0) {
      for (let offset = 0; offset < state.order.length; offset++) {
        const index = (fromIndex + offset) % state.order.length;
        if (!state.learned.has(state.order[index])) return index;
      }
      return -1;
    }

    function format(template, values) {
      return template.replace(/\{(\w+)\}/g, (_, key) => values[key] ?? "");
    }

    function renderShellText() {
      const copy = ui[state.uiLang];
      els.html.lang = copy.htmlLang;
      document.title = copy.appTitle;
      els.appTitle.textContent = copy.appTitle;
      els.uiLanguageLabel.textContent = copy.uiLanguageLabel;
      els.chooseEyebrow.textContent = copy.chooseEyebrow;
      els.chooseTitle.textContent = copy.chooseTitle;
      els.chooseCopy.textContent = copy.chooseCopy;
      els.progressLabel.textContent = copy.progressLabel;
      els.learnedTitle.textContent = copy.learnedTitle;
      els.frontMeta.textContent = copy.question;
      els.backMeta.textContent = copy.translation;
      els.frontStamp.textContent = copy.learned;
      els.backStamp.textContent = copy.learned;
      els.flipButton.textContent = copy.flip;
      els.shuffleButton.textContent = copy.shuffle;
      els.resetButton.textContent = copy.reset;
      els.completeTitle.textContent = copy.completeTitle;
      els.completeCopy.textContent = copy.completeCopy;
      els.cardButtonLabel.textContent = copy.flip;
      els.uiLanguage.value = state.uiLang;
    }

    function renderLanguages() {
      els.languageGrid.innerHTML = "";
      languages.forEach((language) => {
        const button = document.createElement("button");
        const active = language.code === state.targetLang;
        button.type = "button";
        button.className = `lang-btn${active ? " active" : ""}`;
        button.setAttribute("aria-pressed", String(active));
        button.dataset.lang = language.code;
        button.innerHTML = `
          <span class="flag" aria-hidden="true">${language.flag}</span>
          <span>
            <span class="lang-name">${ui[state.uiLang].names[language.code]}</span>
            <span class="sr-only"> ${t("targetLabel")}</span>
          </span>
          <span class="check" aria-hidden="true">✓</span>
        `;
        button.addEventListener("click", () => setTargetLanguage(language.code));
        els.languageGrid.appendChild(button);
      });
    }

    function renderCard() {
      const complete = state.learned.size === phrases.length;
      const phrase = currentPhrase();
      const targetName = ui[state.uiLang].names[state.targetLang];
      const learned = state.learned.has(phrase.id);
      els.cardButton.hidden = complete;
      els.actions.hidden = complete;
      els.completePanel.classList.toggle("visible", complete);
      els.completePanel.setAttribute("aria-hidden", String(!complete));

      if (complete) return;

      els.cardButton.classList.toggle("flipped", state.flipped);
      els.cardButton.classList.toggle("is-learned", learned);
      els.cardButton.setAttribute("aria-pressed", String(state.flipped));
      els.cardButton.style.setProperty("--flip", state.flipped ? "180deg" : "0deg");
      els.frontText.textContent = phrase.prompt[state.uiLang] || phrase.prompt.en;
      els.backText.textContent = phrase.phrase[state.targetLang];
      els.backText.classList.toggle("jp", state.targetLang === "ja");
      els.frontText.classList.toggle("jp", state.uiLang === "ja");
      els.frontSubline.textContent = `${t("frontSubline")} · ${format(t("phraseOf"), { current: state.currentIndex + 1, total: phrases.length })}`;
      els.backSubline.textContent = state.targetLang === "ja"
        ? `${format(t("backSubline"), { language: targetName })} · ${phrase.romanji}`
        : format(t("backSubline"), { language: targetName });
      els.learnButton.textContent = learned ? t("learnedMarked") : t("markLearned");
      els.learnButton.disabled = learned;
    }

    function renderProgress() {
      const learnedCount = state.learned.size;
      els.progressValue.textContent = `${learnedCount} / ${phrases.length}`;
      els.progressBar.style.width = `${(learnedCount / phrases.length) * 100}%`;

      els.learnedList.innerHTML = "";
      if (!learnedCount) {
        const empty = document.createElement("span");
        empty.className = "chip";
        empty.textContent = t("emptyLearned");
        els.learnedList.appendChild(empty);
        return;
      }

      phrases
        .filter((phrase) => state.learned.has(phrase.id))
        .forEach((phrase) => {
          const chip = document.createElement("span");
          chip.className = "chip";
          chip.textContent = phrase.phrase[state.targetLang];
          els.learnedList.appendChild(chip);
        });
    }

    function render() {
      renderShellText();
      renderLanguages();
      renderCard();
      renderProgress();
    }

    function setTargetLanguage(lang) {
      state.targetLang = lang;
      state.learned.clear();
      state.order = phrases.map((phrase) => phrase.id);
      state.currentIndex = 0;
      state.flipped = false;
      render();
      redealCard();
    }

    function redealCard() {
      els.cardButton.style.animation = "none";
      requestAnimationFrame(() => {
        els.cardButton.style.animation = "";
      });
    }

    function flipCard() {
      if (state.learned.size === phrases.length) return;
      state.flipped = !state.flipped;
      renderCard();
    }

    function shuffleDeck() {
      const currentId = state.order[state.currentIndex];
      for (let i = state.order.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [state.order[i], state.order[j]] = [state.order[j], state.order[i]];
      }
      const next = nextUnlearnedIndex(state.order.indexOf(currentId));
      state.currentIndex = next >= 0 ? next : 0;
      state.flipped = false;
      els.stage.classList.add("shuffling");
      window.setTimeout(() => {
        els.stage.classList.remove("shuffling");
        render();
        redealCard();
      }, 430);
    }

    function markLearned() {
      if (state.learned.size === phrases.length) return;
      const phrase = currentPhrase();
      if (state.learned.has(phrase.id)) return;
      state.learned.add(phrase.id);
      els.cardButton.classList.add("leaving");
      renderProgress();

      window.setTimeout(() => {
        els.cardButton.classList.remove("leaving");
        const next = nextUnlearnedIndex(state.currentIndex + 1);
        if (next >= 0) {
          state.currentIndex = next;
          state.flipped = false;
        }
        render();
        redealCard();
      }, 540);
    }

    function resetDeck() {
      state.learned.clear();
      state.currentIndex = 0;
      state.flipped = false;
      render();
      redealCard();
    }

    els.uiLanguage.addEventListener("change", (event) => {
      state.uiLang = event.target.value;
      render();
    });

    els.cardButton.addEventListener("click", flipCard);
    els.flipButton.addEventListener("click", flipCard);
    els.shuffleButton.addEventListener("click", shuffleDeck);
    els.learnButton.addEventListener("click", markLearned);
    els.resetButton.addEventListener("click", resetDeck);

    document.addEventListener("keydown", (event) => {
      if (event.key === " " && document.activeElement === document.body) {
        event.preventDefault();
        flipCard();
      }
      if (event.key.toLowerCase() === "s") shuffleDeck();
      if (event.key.toLowerCase() === "l") markLearned();
    });

    render();
  </script>
