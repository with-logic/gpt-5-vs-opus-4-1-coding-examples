<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>SPQR Tic Tac Toe</title>
  <style>
    :root {
      --bg: #efe3cf;
      --bg-deep: #d5c09f;
      --surface: rgba(255, 250, 241, 0.78);
      --surface-strong: rgba(255, 253, 247, 0.93);
      --ink: #241a14;
      --muted: #6d5b49;
      --line: rgba(89, 62, 34, 0.22);
      --line-strong: rgba(111, 77, 35, 0.42);
      --gold: #c9952f;
      --gold-bright: #f3cf75;
      --gold-soft: rgba(218, 166, 55, 0.24);
      --ruby: #8c1f22;
      --blue: #1d4b5f;
      --shadow: 0 22px 60px rgba(72, 42, 15, 0.22);
      --shadow-tight: 0 12px 28px rgba(83, 50, 18, 0.18);
      --radius: 20px;
      --board-size: min(78vmin, 650px);
      --cell-gap: clamp(8px, 1.5vmin, 16px);
      --header-h: 76px;
      font-family: Georgia, "Times New Roman", serif;
    }

    [data-theme="night"] {
      --bg: #14100e;
      --bg-deep: #2a211b;
      --surface: rgba(28, 24, 22, 0.78);
      --surface-strong: rgba(35, 30, 27, 0.94);
      --ink: #f4e6cc;
      --muted: #c3ad88;
      --line: rgba(236, 197, 111, 0.2);
      --line-strong: rgba(243, 207, 117, 0.44);
      --gold: #ddb45f;
      --gold-bright: #ffe091;
      --gold-soft: rgba(221, 180, 95, 0.18);
      --ruby: #c74438;
      --blue: #69a2b3;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.46);
      --shadow-tight: 0 14px 36px rgba(0, 0, 0, 0.36);
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
    }

    body {
      overflow: auto;
      color: var(--ink);
      background:
        radial-gradient(circle at 18% 18%, rgba(255, 255, 255, 0.58), transparent 26%),
        radial-gradient(circle at 82% 14%, rgba(243, 207, 117, 0.22), transparent 24%),
        linear-gradient(125deg, transparent 0 35%, rgba(88, 56, 31, 0.08) 36% 37%, transparent 38% 100%),
        linear-gradient(23deg, transparent 0 43%, rgba(255, 255, 255, 0.25) 44% 45%, transparent 46% 100%),
        repeating-linear-gradient(101deg, rgba(68, 48, 32, 0.035) 0 2px, transparent 2px 42px),
        linear-gradient(135deg, var(--bg), var(--bg-deep));
      background-attachment: fixed;
    }

    body::before {
      content: "";
      position: fixed;
      inset: auto -8vmin -7vmin -8vmin;
      height: 42vmin;
      pointer-events: none;
      opacity: 0.28;
      background:
        repeating-radial-gradient(ellipse at 50% 100%, transparent 0 8.5vmin, rgba(91, 61, 31, 0.28) 8.7vmin 9.1vmin, transparent 9.4vmin 17vmin),
        linear-gradient(to top, rgba(80, 54, 31, 0.18), transparent 74%);
      mask-image: linear-gradient(to top, black, transparent);
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: radial-gradient(rgba(255, 255, 255, 0.34) 0.7px, transparent 0.7px);
      background-size: 5px 5px;
      mix-blend-mode: soft-light;
      opacity: 0.46;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 0;
      color: inherit;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    button:focus-visible,
    input:focus-visible {
      outline: 3px solid var(--gold-bright);
      outline-offset: 3px;
    }

    .app {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      height: 100dvh;
      min-height: 560px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 16px;
      padding: clamp(10px, 1.8vmin, 18px) clamp(12px, 3vmin, 34px);
      min-height: var(--header-h);
      background: linear-gradient(to bottom, rgba(255, 253, 247, 0.76), rgba(255, 253, 247, 0.42));
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(18px) saturate(1.08);
      box-shadow: 0 10px 30px rgba(80, 50, 23, 0.08);
    }

    [data-theme="night"] .topbar {
      background: linear-gradient(to bottom, rgba(28, 23, 21, 0.84), rgba(28, 23, 21, 0.52));
    }

    .brand {
      display: flex;
      align-items: center;
      min-width: 0;
      gap: 12px;
    }

    .crest {
      position: relative;
      flex: 0 0 auto;
      width: clamp(42px, 6vmin, 56px);
      height: clamp(48px, 7vmin, 64px);
      display: grid;
      place-items: center;
      color: #fff7de;
      font-family: Georgia, serif;
      font-weight: 800;
      font-size: clamp(0.72rem, 1.6vmin, 0.95rem);
      letter-spacing: 0.06em;
      text-shadow: 0 1px 1px rgba(0, 0, 0, 0.35);
      background: linear-gradient(145deg, #b52427, #6f1419 60%, #4c0c12);
      border: 2px solid var(--gold);
      border-radius: 12px 12px 18px 18px;
      box-shadow: inset 0 0 0 2px rgba(255, 237, 176, 0.22), 0 10px 24px rgba(92, 25, 17, 0.28);
      clip-path: polygon(0 0, 100% 0, 100% 76%, 50% 100%, 0 76%);
    }

    .crest::before,
    .crest::after {
      content: "";
      position: absolute;
      top: 14px;
      width: 17px;
      height: 24px;
      border-top: 2px solid rgba(255, 231, 161, 0.8);
      border-radius: 50%;
      opacity: 0.88;
    }

    .crest::before {
      left: 5px;
      transform: rotate(-28deg);
      border-left: 2px solid rgba(255, 231, 161, 0.72);
    }

    .crest::after {
      right: 5px;
      transform: rotate(28deg);
      border-right: 2px solid rgba(255, 231, 161, 0.72);
    }

    .title {
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.08rem, 2.5vmin, 1.72rem);
      line-height: 1;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .subtitle {
      margin-top: 5px;
      color: var(--muted);
      font-size: clamp(0.72rem, 1.45vmin, 0.86rem);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .scorebar {
      justify-self: center;
      display: grid;
      grid-template-columns: repeat(3, minmax(66px, 96px));
      gap: 8px;
      width: min(32vw, 312px);
      min-width: 232px;
    }

    .score {
      min-height: 50px;
      padding: 7px 9px;
      display: grid;
      place-items: center;
      gap: 1px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--surface);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.46);
    }

    .score .label {
      color: var(--muted);
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.13em;
      line-height: 1;
    }

    .score .value {
      font-size: clamp(1.05rem, 2.3vmin, 1.45rem);
      font-weight: 800;
      line-height: 1;
    }

    .actions {
      justify-self: end;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      min-width: 0;
    }

    .top-action,
    .dialog-action {
      min-height: 42px;
      padding: 0 14px;
      border: 1px solid var(--line-strong);
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.36), rgba(255, 255, 255, 0.1)), var(--surface);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.54), 0 8px 18px rgba(70, 43, 18, 0.1);
      font-size: 0.86rem;
      font-weight: 700;
      line-height: 1;
      white-space: nowrap;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease, box-shadow 160ms ease;
    }

    .top-action:hover,
    .dialog-action:hover {
      transform: translateY(-1px);
      border-color: var(--gold);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.6), 0 12px 22px rgba(70, 43, 18, 0.14);
    }

    .top-action:active,
    .dialog-action:active {
      transform: translateY(1px) scale(0.99);
    }

    .primary-action {
      color: #2a1a07;
      background: linear-gradient(180deg, var(--gold-bright), var(--gold));
      border-color: rgba(92, 62, 17, 0.28);
    }

    .arena {
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      padding: clamp(10px, 2vmin, 18px) clamp(12px, 3vmin, 34px) clamp(14px, 2.8vmin, 28px);
      gap: clamp(10px, 1.6vmin, 16px);
    }

    .status-wrap {
      display: grid;
      justify-items: center;
      gap: 8px;
      min-height: 72px;
    }

    .status {
      width: min(720px, 100%);
      min-height: 46px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px 18px;
      color: var(--ink);
      text-align: center;
      font-size: clamp(0.94rem, 2vmin, 1.08rem);
      font-weight: 700;
      line-height: 1.25;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--surface);
      box-shadow: var(--shadow-tight);
    }

    .status.win {
      color: #2d1c06;
      border-color: rgba(158, 107, 21, 0.52);
      background: linear-gradient(135deg, rgba(255, 228, 147, 0.98), rgba(207, 148, 43, 0.9));
      box-shadow: 0 0 0 1px rgba(255, 242, 187, 0.42) inset, 0 16px 34px rgba(173, 119, 24, 0.26);
    }

    .settings-summary {
      color: var(--muted);
      font-size: clamp(0.72rem, 1.55vmin, 0.84rem);
      line-height: 1.2;
      letter-spacing: 0.08em;
      text-align: center;
      text-transform: uppercase;
    }

    .stage {
      position: relative;
      min-height: 0;
      display: grid;
      place-items: center;
    }

    .board-shell {
      position: relative;
      width: var(--board-size);
      max-width: calc(100vw - 24px);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border-radius: clamp(20px, 4vmin, 34px);
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.42), rgba(255, 255, 255, 0.05)),
        repeating-linear-gradient(112deg, rgba(113, 79, 42, 0.045) 0 2px, transparent 2px 22px),
        var(--surface-strong);
      box-shadow: var(--shadow);
      border: 1px solid rgba(255, 255, 255, 0.36);
      overflow: hidden;
    }

    .board-shell::before {
      content: "";
      position: absolute;
      inset: 4.5%;
      border: clamp(7px, 1.6vmin, 13px) double var(--gold);
      border-radius: clamp(16px, 3.2vmin, 28px);
      opacity: 0.74;
      pointer-events: none;
    }

    .board-shell::after {
      content: "SPQR";
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: var(--gold);
      font-size: calc(var(--board-size) * 0.18);
      font-weight: 800;
      letter-spacing: 0.18em;
      opacity: 0.055;
      pointer-events: none;
    }

    .board {
      position: relative;
      z-index: 1;
      width: 82%;
      aspect-ratio: 1;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--cell-gap);
      padding: var(--cell-gap);
      border-radius: clamp(16px, 3vmin, 26px);
      background:
        linear-gradient(90deg, transparent calc(33.333% - var(--cell-gap) / 2), var(--line-strong) 0 calc(33.333% + var(--cell-gap) / 2), transparent 0 calc(66.666% - var(--cell-gap) / 2), var(--line-strong) 0 calc(66.666% + var(--cell-gap) / 2), transparent 0),
        linear-gradient(0deg, transparent calc(33.333% - var(--cell-gap) / 2), var(--line-strong) 0 calc(33.333% + var(--cell-gap) / 2), transparent 0 calc(66.666% - var(--cell-gap) / 2), var(--line-strong) 0 calc(66.666% + var(--cell-gap) / 2), transparent 0);
    }

    .cell {
      position: relative;
      display: grid;
      place-items: center;
      min-width: 0;
      aspect-ratio: 1;
      border-radius: clamp(12px, 2.3vmin, 22px);
      background:
        radial-gradient(circle at 30% 22%, rgba(255, 255, 255, 0.46), transparent 36%),
        linear-gradient(145deg, rgba(255, 255, 255, 0.42), rgba(178, 136, 78, 0.08));
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.44), inset 0 -10px 20px rgba(73, 49, 23, 0.05);
      transition: transform 140ms ease, background 160ms ease, box-shadow 160ms ease;
      isolation: isolate;
    }

    .cell:not(:disabled):hover {
      transform: translateY(-2px);
      background:
        radial-gradient(circle at 30% 22%, rgba(255, 255, 255, 0.62), transparent 38%),
        linear-gradient(145deg, rgba(255, 255, 255, 0.5), var(--gold-soft));
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.55), 0 10px 22px rgba(120, 83, 25, 0.16);
    }

    .cell:not(:disabled):active {
      transform: translateY(1px) scale(0.985);
    }

    .cell:disabled {
      cursor: default;
    }

    .cell.win-cell {
      background:
        radial-gradient(circle, rgba(255, 238, 168, 0.72), rgba(220, 162, 51, 0.28) 58%, rgba(255, 255, 255, 0.18));
      box-shadow: inset 0 0 0 3px rgba(255, 232, 143, 0.72), 0 0 30px rgba(218, 166, 55, 0.54);
      animation: aureate 900ms ease both;
    }

    .mark {
      display: grid;
      place-items: center;
      width: 78%;
      aspect-ratio: 1;
      font-size: calc(var(--board-size) * 0.13);
      font-weight: 900;
      line-height: 1;
      filter: drop-shadow(0 6px 9px rgba(48, 29, 10, 0.16));
      animation: carveIn 220ms cubic-bezier(.2, .8, .2, 1.2) both;
    }

    .mark.x {
      color: var(--ruby);
    }

    .mark.o {
      color: var(--blue);
    }

    .mark svg {
      display: block;
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .mark path,
    .mark circle {
      vector-effect: non-scaling-stroke;
    }

    .confetti {
      position: fixed;
      inset: 0;
      z-index: 4;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
    }

    .dialog {
      width: min(560px, calc(100vw - 24px));
      max-height: min(760px, calc(100dvh - 24px));
      padding: 0;
      color: var(--ink);
      border: 1px solid var(--line-strong);
      border-radius: 24px;
      background: var(--surface-strong);
      box-shadow: 0 28px 80px rgba(20, 12, 5, 0.4);
      overflow: hidden;
    }

    .dialog::backdrop {
      background: rgba(20, 13, 8, 0.46);
      backdrop-filter: blur(6px);
    }

    .dialog-inner {
      display: grid;
      gap: 18px;
      padding: clamp(18px, 4vmin, 28px);
      background:
        radial-gradient(circle at 100% 0, var(--gold-soft), transparent 34%),
        repeating-linear-gradient(115deg, rgba(90, 62, 36, 0.04) 0 2px, transparent 2px 28px);
    }

    .dialog header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
    }

    .dialog h2 {
      margin: 0;
      font-size: clamp(1.28rem, 4vmin, 1.78rem);
      line-height: 1.05;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .dialog p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.94rem;
      line-height: 1.35;
    }

    .close {
      width: 42px;
      height: 42px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 50%;
      background: var(--surface);
      font-size: 1.38rem;
      line-height: 1;
      transition: transform 150ms ease, border-color 150ms ease;
    }

    .close:hover {
      transform: rotate(8deg);
      border-color: var(--gold);
    }

    .option-group {
      display: grid;
      gap: 9px;
    }

    .group-label {
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .segmented {
      display: grid;
      grid-template-columns: repeat(var(--cols, 2), 1fr);
      gap: 8px;
    }

    .choice {
      position: relative;
      min-height: 46px;
      display: grid;
      place-items: center;
      padding: 8px 10px;
      text-align: center;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.2);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.34);
      font-size: 0.9rem;
      font-weight: 800;
      line-height: 1.08;
      cursor: pointer;
      transition: transform 150ms ease, background 150ms ease, border-color 150ms ease;
    }

    .choice:hover {
      transform: translateY(-1px);
      border-color: var(--gold);
    }

    .choice input {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .choice:has(input:checked) {
      color: #281a08;
      border-color: rgba(120, 79, 13, 0.44);
      background: linear-gradient(180deg, var(--gold-bright), var(--gold));
      box-shadow: 0 8px 20px rgba(174, 121, 26, 0.22), inset 0 1px 0 rgba(255, 255, 255, 0.56);
    }

    .dialog-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding-top: 4px;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @keyframes carveIn {
      from {
        opacity: 0;
        transform: scale(0.72) rotate(-5deg);
      }
      to {
        opacity: 1;
        transform: scale(1) rotate(0deg);
      }
    }

    @keyframes aureate {
      0% {
        transform: scale(1);
      }
      46% {
        transform: scale(1.035);
      }
      100% {
        transform: scale(1);
      }
    }

    @media (max-width: 880px) {
      :root {
        --board-size: min(86vmin, 620px);
      }

      .app {
        min-height: 620px;
      }

      .topbar {
        grid-template-columns: 1fr;
        justify-items: stretch;
        gap: 10px;
      }

      .brand {
        justify-content: center;
      }

      .scorebar {
        order: 3;
        width: min(440px, 100%);
        min-width: 0;
        grid-template-columns: repeat(3, 1fr);
      }

      .actions {
        justify-self: stretch;
        justify-content: center;
        flex-wrap: wrap;
      }

      .top-action {
        flex: 1 1 106px;
        min-width: 0;
        padding-inline: 10px;
      }

      .arena {
        grid-template-rows: auto minmax(0, 1fr);
      }
    }

    @media (max-width: 520px) {
      :root {
        --board-size: min(93vmin, 520px);
        --cell-gap: clamp(6px, 1.4vmin, 10px);
      }

      .app {
        min-height: 100dvh;
        height: auto;
      }

      .topbar {
        padding-inline: 10px;
      }

      .crest {
        width: 38px;
        height: 45px;
      }

      h1 {
        font-size: clamp(0.98rem, 5vw, 1.24rem);
      }

      .subtitle {
        font-size: 0.66rem;
      }

      .actions {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        width: 100%;
        gap: 6px;
      }

      .top-action {
        min-height: 40px;
        padding: 0 6px;
        border-radius: 14px;
        font-size: clamp(0.68rem, 3.25vw, 0.8rem);
        white-space: normal;
      }

      .score {
        min-height: 43px;
        border-radius: 12px;
      }

      .status-wrap {
        min-height: 66px;
      }

      .status {
        min-height: 42px;
        padding: 8px 10px;
      }

      .settings-summary {
        font-size: 0.64rem;
      }

      .board-shell {
        border-radius: 18px;
      }

      .board {
        width: 85%;
      }

      .segmented {
        grid-template-columns: 1fr;
      }

      .segmented.compact {
        grid-template-columns: repeat(var(--cols, 2), 1fr);
      }
    }

    @media (max-height: 700px) and (min-width: 700px) {
      :root {
        --board-size: min(68vmin, 560px);
      }

      .status-wrap {
        min-height: 58px;
      }

      .score {
        min-height: 44px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        animation-duration: 1ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 1ms !important;
      }
    }
  </style>
</head>
<body data-theme="day">
  <canvas class="confetti" id="confetti" aria-hidden="true"></canvas>

  <div class="app">
    <header class="topbar">
      <div class="brand" aria-label="SPQR Tic Tac Toe">
        <div class="crest" aria-hidden="true">SPQR</div>
        <div class="title">
          <h1>Tic Tac Toe</h1>
          <div class="subtitle">Roman Empire Edition</div>
        </div>
      </div>

      <section class="scorebar" aria-label="Scoreboard">
        <div class="score" aria-label="X score">
          <span class="label">X</span>
          <span class="value" id="score-x">0</span>
        </div>
        <div class="score" aria-label="Draw score">
          <span class="label">Draws</span>
          <span class="value" id="score-draw">0</span>
        </div>
        <div class="score" aria-label="O score">
          <span class="label">O</span>
          <span class="value" id="score-o">0</span>
        </div>
      </section>

      <nav class="actions" aria-label="Game controls">
        <button class="top-action primary-action" id="new-round" type="button">New Round</button>
        <button class="top-action" id="customize-open" type="button">Customize</button>
        <button class="top-action" id="reset-scores" type="button">Reset Scores</button>
      </nav>
    </header>

    <main class="arena">
      <div class="status-wrap">
        <div class="status" id="status" role="status" aria-live="polite">X commands the first move.</div>
        <div class="settings-summary" id="settings-summary">2-player · Marble Day · Standard X/O</div>
      </div>

      <section class="stage" aria-label="Game board">
        <div class="board-shell">
          <div class="board" id="board" role="grid" aria-label="Tic Tac Toe board"></div>
        </div>
      </section>
    </main>
  </div>

  <dialog class="dialog" id="customize-dialog" aria-labelledby="customize-title">
    <form method="dialog" class="dialog-inner">
      <header>
        <div>
          <h2 id="customize-title">Customize</h2>
          <p>Set the arena rules and visual regalia for the next move.</p>
        </div>
        <button class="close" type="submit" aria-label="Close customize dialog">×</button>
      </header>

      <section class="option-group" aria-labelledby="theme-label">
        <div class="group-label" id="theme-label">Theme</div>
        <div class="segmented compact" style="--cols: 2">
          <label class="choice"><input type="radio" name="theme" value="day" checked>Marble Day</label>
          <label class="choice"><input type="radio" name="theme" value="night">Night Legion</label>
        </div>
      </section>

      <section class="option-group" aria-labelledby="glyph-label">
        <div class="group-label" id="glyph-label">Glyphs</div>
        <div class="segmented compact" style="--cols: 2">
          <label class="choice"><input type="radio" name="glyphs" value="standard" checked>Standard X/O</label>
          <label class="choice"><input type="radio" name="glyphs" value="roman">Gladius/Laurel</label>
        </div>
      </section>

      <section class="option-group" aria-labelledby="mode-label">
        <div class="group-label" id="mode-label">Mode</div>
        <div class="segmented compact" style="--cols: 2">
          <label class="choice"><input type="radio" name="mode" value="two" checked>2-player</label>
          <label class="choice"><input type="radio" name="mode" value="ai">vs AI</label>
        </div>
      </section>

      <section class="option-group" aria-labelledby="first-label">
        <div class="group-label" id="first-label">First move</div>
        <div class="segmented compact" style="--cols: 2">
          <label class="choice"><input type="radio" name="first" value="X" checked>X</label>
          <label class="choice"><input type="radio" name="first" value="O">O</label>
        </div>
      </section>

      <section class="option-group" aria-labelledby="ai-label">
        <div class="group-label" id="ai-label">AI discipline</div>
        <div class="segmented" style="--cols: 3">
          <label class="choice"><input type="radio" name="discipline" value="perfect" checked>Perfect</label>
          <label class="choice"><input type="radio" name="discipline" value="pragmatic">Pragmatic</label>
          <label class="choice"><input type="radio" name="discipline" value="reckless">Reckless</label>
        </div>
      </section>

      <footer class="dialog-footer">
        <button class="dialog-action primary-action" value="default" type="submit">Done</button>
      </footer>
    </form>
  </dialog>

  <script>
    (() => {
      const wins = [
        [0, 1, 2], [3, 4, 5], [6, 7, 8],
        [0, 3, 6], [1, 4, 7], [2, 5, 8],
        [0, 4, 8], [2, 4, 6]
      ];

      const state = {
        board: Array(9).fill(""),
        current: "X",
        locked: false,
        gameOver: false,
        scores: { X: 0, O: 0, draw: 0 },
        options: {
          theme: "day",
          glyphs: "standard",
          mode: "two",
          first: "X",
          discipline: "perfect"
        },
        aiMark: "O",
        humanMark: "X"
      };

      const els = {
        board: document.getElementById("board"),
        status: document.getElementById("status"),
        summary: document.getElementById("settings-summary"),
        scoreX: document.getElementById("score-x"),
        scoreO: document.getElementById("score-o"),
        scoreDraw: document.getElementById("score-draw"),
        newRound: document.getElementById("new-round"),
        resetScores: document.getElementById("reset-scores"),
        customizeOpen: document.getElementById("customize-open"),
        dialog: document.getElementById("customize-dialog"),
        confetti: document.getElementById("confetti")
      };

      const mediaReduced = window.matchMedia("(prefers-reduced-motion: reduce)");
      let confettiFrame = 0;
      let confettiPieces = [];

      function buildBoard() {
        els.board.innerHTML = "";
        for (let i = 0; i < 9; i += 1) {
          const cell = document.createElement("button");
          cell.className = "cell";
          cell.type = "button";
          cell.id = `cell-${i}`;
          cell.dataset.index = String(i);
          cell.setAttribute("role", "gridcell");
          cell.setAttribute("aria-label", cellLabel(i));
          cell.addEventListener("click", () => playAt(i));
          cell.addEventListener("keydown", (event) => handleCellKey(event, i));
          els.board.appendChild(cell);
        }
      }

      function cellLabel(index) {
        const row = Math.floor(index / 3) + 1;
        const col = (index % 3) + 1;
        const value = state.board[index];
        return value ? `Row ${row}, column ${col}, occupied by ${value}` : `Row ${row}, column ${col}, empty`;
      }

      function handleCellKey(event, index) {
        const keys = ["ArrowRight", "ArrowLeft", "ArrowDown", "ArrowUp", "Home", "End"];
        if (!keys.includes(event.key)) return;
        event.preventDefault();
        const row = Math.floor(index / 3);
        const col = index % 3;
        let next = index;
        if (event.key === "ArrowRight") next = row * 3 + ((col + 1) % 3);
        if (event.key === "ArrowLeft") next = row * 3 + ((col + 2) % 3);
        if (event.key === "ArrowDown") next = ((row + 1) % 3) * 3 + col;
        if (event.key === "ArrowUp") next = ((row + 2) % 3) * 3 + col;
        if (event.key === "Home") next = 0;
        if (event.key === "End") next = 8;
        const target = document.getElementById(`cell-${next}`);
        if (target) target.focus();
      }

      function playAt(index) {
        if (state.locked || state.gameOver || state.board[index]) return;
        if (state.options.mode === "ai" && state.current === state.aiMark) return;
        place(index, state.current);
        resolveTurn();
      }

      function place(index, mark) {
        state.board[index] = mark;
        renderBoard();
      }

      function resolveTurn() {
        const result = getResult(state.board);
        if (result.over) {
          finishGame(result);
          return;
        }

        state.current = opposite(state.current);
        updateStatus();
        renderBoard();

        if (state.options.mode === "ai" && state.current === state.aiMark) {
          state.locked = true;
          renderBoard();
          updateStatus("The legion studies the board...");
          window.setTimeout(() => {
            if (state.gameOver) return;
            place(getAiMove(), state.aiMark);
            state.locked = false;
            resolveTurn();
          }, 360);
        }
      }

      function finishGame(result) {
        state.gameOver = true;
        state.locked = true;
        if (result.winner) {
          state.scores[result.winner] += 1;
          setStatus(`${nameFor(result.winner)} claims victory for Rome.`, true);
          highlightWin(result.line);
          burstConfetti();
        } else {
          state.scores.draw += 1;
          setStatus("The Senate declares a draw.", false);
        }
        renderScores();
        renderBoard();
      }

      function newRound() {
        stopConfetti();
        state.board = Array(9).fill("");
        state.current = state.options.first;
        state.gameOver = false;
        state.locked = false;
        state.aiMark = opposite(state.options.first);
        state.humanMark = state.options.first;
        els.status.classList.remove("win");
        renderBoard();
        updateStatus();
        if (state.options.mode === "ai" && state.current === state.aiMark) {
          state.locked = true;
          renderBoard();
          updateStatus("The legion opens the campaign...");
          window.setTimeout(() => {
            place(getAiMove(), state.aiMark);
            state.locked = false;
            resolveTurn();
          }, 420);
        }
      }

      function resetScores() {
        state.scores = { X: 0, O: 0, draw: 0 };
        renderScores();
        newRound();
      }

      function getResult(board) {
        for (const line of wins) {
          const [a, b, c] = line;
          if (board[a] && board[a] === board[b] && board[a] === board[c]) {
            return { over: true, winner: board[a], line };
          }
        }
        if (board.every(Boolean)) return { over: true, winner: "", line: [] };
        return { over: false, winner: "", line: [] };
      }

      function getAiMove() {
        const empty = availableMoves(state.board);
        if (empty.length === 9) return 4;

        const perfect = bestMove(state.board, state.aiMark);
        const discipline = state.options.discipline;

        if (discipline === "perfect") return perfect.index;

        const immediateWin = findTacticalMove(state.board, state.aiMark);
        const immediateBlock = findTacticalMove(state.board, state.humanMark);
        const roll = Math.random();

        if (discipline === "pragmatic") {
          if (immediateWin !== -1) return immediateWin;
          if (immediateBlock !== -1 && roll > 0.18) return immediateBlock;
          if (roll < 0.72) return perfect.index;
          return weightedImperfectMove();
        }

        if (immediateWin !== -1 && roll > 0.35) return immediateWin;
        if (immediateBlock !== -1 && roll > 0.58) return immediateBlock;
        if (roll < 0.34) return perfect.index;
        return randomMove(empty);
      }

      function weightedImperfectMove() {
        const scored = availableMoves(state.board)
          .map(index => ({ index, score: minimax(afterMove(state.board, index, state.aiMark), false, state.aiMark, 0) }))
          .sort((a, b) => b.score - a.score);
        const pool = scored.slice(0, Math.min(3, scored.length));
        return pool[Math.floor(Math.random() * pool.length)].index;
      }

      function findTacticalMove(board, mark) {
        for (const index of availableMoves(board)) {
          const test = afterMove(board, index, mark);
          const result = getResult(test);
          if (result.winner === mark) return index;
        }
        return -1;
      }

      function bestMove(board, aiMark) {
        let best = { index: -1, score: -Infinity };
        for (const index of availableMoves(board)) {
          const score = minimax(afterMove(board, index, aiMark), false, aiMark, 0);
          if (score > best.score) best = { index, score };
        }
        return best.index === -1 ? { index: availableMoves(board)[0], score: 0 } : best;
      }

      function minimax(board, isMax, aiMark, depth) {
        const result = getResult(board);
        if (result.over) {
          if (result.winner === aiMark) return 10 - depth;
          if (result.winner === opposite(aiMark)) return depth - 10;
          return 0;
        }

        const mark = isMax ? aiMark : opposite(aiMark);
        let best = isMax ? -Infinity : Infinity;
        for (const index of availableMoves(board)) {
          const score = minimax(afterMove(board, index, mark), !isMax, aiMark, depth + 1);
          best = isMax ? Math.max(best, score) : Math.min(best, score);
        }
        return best;
      }

      function afterMove(board, index, mark) {
        const copy = board.slice();
        copy[index] = mark;
        return copy;
      }

      function availableMoves(board) {
        return board.map((value, index) => value ? -1 : index).filter(index => index !== -1);
      }

      function randomMove(moves) {
        return moves[Math.floor(Math.random() * moves.length)];
      }

      function opposite(mark) {
        return mark === "X" ? "O" : "X";
      }

      function nameFor(mark) {
        if (state.options.glyphs === "roman") return mark === "X" ? "Gladius" : "Laurel";
        return mark;
      }

      function updateStatus(custom) {
        if (custom) {
          setStatus(custom, false);
          return;
        }
        const player = state.options.mode === "ai" && state.current === state.aiMark ? "AI" : nameFor(state.current);
        setStatus(`${player} to move.`, false);
      }

      function setStatus(message, isWin) {
        els.status.textContent = message;
        els.status.classList.toggle("win", Boolean(isWin));
      }

      function renderBoard() {
        [...els.board.children].forEach((cell, index) => {
          const mark = state.board[index];
          cell.innerHTML = mark ? glyphMarkup(mark) : "";
          cell.disabled = state.locked || state.gameOver || Boolean(mark);
          cell.classList.toggle("win-cell", false);
          cell.setAttribute("aria-label", cellLabel(index));
        });
      }

      function highlightWin(line) {
        line.forEach(index => {
          const cell = document.getElementById(`cell-${index}`);
          if (cell) cell.classList.add("win-cell");
        });
      }

      function glyphMarkup(mark) {
        if (state.options.glyphs === "roman") {
          return mark === "X" ? gladiusSvg() : laurelSvg();
        }
        return `<span class="mark ${mark.toLowerCase()}" aria-hidden="true">${mark}</span>`;
      }

      function gladiusSvg() {
        return `
          <span class="mark x" aria-hidden="true">
            <svg viewBox="0 0 100 100" focusable="false">
              <defs>
                <linearGradient id="blade" x1="0" x2="1">
                  <stop offset="0" stop-color="#f7e8c2"/>
                  <stop offset="0.5" stop-color="#b51f25"/>
                  <stop offset="1" stop-color="#6f1218"/>
                </linearGradient>
              </defs>
              <g stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 14 L50 43 L78 14 L86 22 L57 50 L86 78 L78 86 L50 57 L22 86 L14 78 L43 50 L14 22 Z" fill="url(#blade)" stroke="rgba(70,20,12,.42)" stroke-width="2"/>
                <path d="M31 20 L50 39 L69 20" fill="none" stroke="rgba(255,235,171,.62)" stroke-width="3"/>
                <path d="M31 80 L50 61 L69 80" fill="none" stroke="rgba(255,235,171,.52)" stroke-width="3"/>
              </g>
            </svg>
          </span>`;
      }

      function laurelSvg() {
        return `
          <span class="mark o" aria-hidden="true">
            <svg viewBox="0 0 100 100" focusable="false">
              <g fill="none" stroke="currentColor" stroke-linecap="round">
                <circle cx="50" cy="50" r="28" stroke-width="8" opacity=".18"/>
                <path d="M35 82 C12 61 15 29 39 15" stroke-width="7"/>
                <path d="M65 82 C88 61 85 29 61 15" stroke-width="7"/>
              </g>
              <g fill="currentColor">
                <ellipse cx="29" cy="72" rx="5" ry="10" transform="rotate(-38 29 72)"/>
                <ellipse cx="22" cy="60" rx="5" ry="10" transform="rotate(-58 22 60)"/>
                <ellipse cx="21" cy="46" rx="5" ry="10" transform="rotate(-78 21 46)"/>
                <ellipse cx="26" cy="32" rx="5" ry="10" transform="rotate(-118 26 32)"/>
                <ellipse cx="36" cy="21" rx="5" ry="10" transform="rotate(-138 36 21)"/>
                <ellipse cx="71" cy="72" rx="5" ry="10" transform="rotate(38 71 72)"/>
                <ellipse cx="78" cy="60" rx="5" ry="10" transform="rotate(58 78 60)"/>
                <ellipse cx="79" cy="46" rx="5" ry="10" transform="rotate(78 79 46)"/>
                <ellipse cx="74" cy="32" rx="5" ry="10" transform="rotate(118 74 32)"/>
                <ellipse cx="64" cy="21" rx="5" ry="10" transform="rotate(138 64 21)"/>
              </g>
            </svg>
          </span>`;
      }

      function renderScores() {
        els.scoreX.textContent = String(state.scores.X);
        els.scoreO.textContent = String(state.scores.O);
        els.scoreDraw.textContent = String(state.scores.draw);
      }

      function renderSummary() {
        const theme = state.options.theme === "day" ? "Marble Day" : "Night Legion";
        const mode = state.options.mode === "two" ? "2-player" : `vs AI · ${capitalize(state.options.discipline)}`;
        const glyphs = state.options.glyphs === "standard" ? "Standard X/O" : "Gladius/Laurel";
        els.summary.textContent = `${mode} · ${theme} · ${glyphs}`;
      }

      function capitalize(value) {
        return value.charAt(0).toUpperCase() + value.slice(1);
      }

      function syncOptionsFromDialog() {
        const data = new FormData(els.dialog.querySelector("form"));
        state.options.theme = data.get("theme");
        state.options.glyphs = data.get("glyphs");
        state.options.mode = data.get("mode");
        state.options.first = data.get("first");
        state.options.discipline = data.get("discipline");
        document.body.dataset.theme = state.options.theme;
        renderSummary();
        renderBoard();
        updateStatus();
        if (state.options.mode === "ai") {
          state.aiMark = opposite(state.options.first);
          state.humanMark = state.options.first;
        }
      }

      function burstConfetti() {
        if (mediaReduced.matches) return;
        const canvas = els.confetti;
        const context = canvas.getContext("2d");
        const ratio = window.devicePixelRatio || 1;
        canvas.width = Math.floor(window.innerWidth * ratio);
        canvas.height = Math.floor(window.innerHeight * ratio);
        context.setTransform(ratio, 0, 0, ratio, 0, 0);
        const colors = ["#f3cf75", "#c9952f", "#8c1f22", "#fff2bf", "#1d4b5f"];
        confettiPieces = Array.from({ length: 120 }, () => ({
          x: window.innerWidth / 2 + (Math.random() - 0.5) * 160,
          y: Math.max(100, window.innerHeight * 0.22),
          vx: (Math.random() - 0.5) * 9,
          vy: -Math.random() * 8 - 4,
          size: Math.random() * 7 + 4,
          rotation: Math.random() * Math.PI,
          vr: (Math.random() - 0.5) * 0.26,
          color: colors[Math.floor(Math.random() * colors.length)],
          life: Math.random() * 55 + 70
        }));
        cancelAnimationFrame(confettiFrame);

        const tick = () => {
          context.clearRect(0, 0, window.innerWidth, window.innerHeight);
          confettiPieces = confettiPieces.filter(piece => piece.life > 0);
          confettiPieces.forEach(piece => {
            piece.life -= 1;
            piece.x += piece.vx;
            piece.y += piece.vy;
            piece.vy += 0.18;
            piece.rotation += piece.vr;
            context.save();
            context.translate(piece.x, piece.y);
            context.rotate(piece.rotation);
            context.globalAlpha = Math.max(0, Math.min(1, piece.life / 40));
            context.fillStyle = piece.color;
            context.fillRect(-piece.size / 2, -piece.size / 2, piece.size, piece.size * 0.62);
            context.restore();
          });
          if (confettiPieces.length) {
            confettiFrame = requestAnimationFrame(tick);
          } else {
            context.clearRect(0, 0, window.innerWidth, window.innerHeight);
          }
        };

        tick();
      }

      function stopConfetti() {
        cancelAnimationFrame(confettiFrame);
        confettiPieces = [];
        const context = els.confetti.getContext("2d");
        context.clearRect(0, 0, els.confetti.width, els.confetti.height);
      }

      els.newRound.addEventListener("click", newRound);
      els.resetScores.addEventListener("click", resetScores);
      els.customizeOpen.addEventListener("click", () => els.dialog.showModal());
      els.dialog.addEventListener("change", syncOptionsFromDialog);
      els.dialog.addEventListener("close", () => {
        syncOptionsFromDialog();
        els.customizeOpen.focus();
      });
      window.addEventListener("resize", () => {
        if (confettiPieces.length) burstConfetti();
      });

      buildBoard();
      renderScores();
      renderSummary();
      newRound();
    })();
  </script>
</body>
</html>
