<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Micro Habit Tracker</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #15201f;
      --muted: #62706d;
      --faint: #e6ebe7;
      --paper: #fbfbf5;
      --panel: #ffffff;
      --teal: #0f8b82;
      --teal-dark: #0a635d;
      --coral: #ed6a5a;
      --amber: #f4b942;
      --blue: #3d70b2;
      --shadow: 0 22px 60px rgba(27, 47, 43, .14);
      --radius: 8px;
      font-family: ui-serif, Georgia, Cambria, "Times New Roman", serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(160deg, rgba(15, 139, 130, .13), transparent 34%),
        linear-gradient(24deg, rgba(237, 106, 90, .13), transparent 42%),
        var(--paper);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    button:focus-visible,
    input:focus-visible,
    textarea:focus-visible {
      outline: 3px solid rgba(15, 139, 130, .28);
      outline-offset: 2px;
    }

    .app {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 40px;
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 24px;
    }

    .brand {
      display: grid;
      gap: 8px;
    }

    .eyebrow {
      margin: 0;
      color: var(--teal-dark);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: .78rem;
      font-weight: 800;
      letter-spacing: .14em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.15rem, 6vw, 5.2rem);
      line-height: .9;
      letter-spacing: 0;
    }

    .today-label {
      margin: 0;
      color: var(--muted);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: .98rem;
      line-height: 1.5;
      max-width: 560px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
      min-width: 240px;
    }

    .btn {
      min-height: 42px;
      border: 1px solid rgba(21, 32, 31, .14);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .72);
      color: var(--ink);
      padding: 10px 13px;
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: .9rem;
      font-weight: 760;
      transition: transform .18s ease, border-color .18s ease, background .18s ease, color .18s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      border-color: rgba(15, 139, 130, .38);
      background: #fff;
    }

    .btn.primary {
      border-color: var(--teal);
      background: var(--teal);
      color: #fff;
    }

    .btn.danger {
      color: #9f2f25;
    }

    .btn.small {
      min-height: 34px;
      padding: 7px 10px;
      font-size: .8rem;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.12fr) minmax(320px, .88fr);
      gap: 18px;
      align-items: start;
    }

    .panel {
      border: 1px solid rgba(21, 32, 31, .1);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .83);
      box-shadow: var(--shadow);
      overflow: hidden;
      animation: rise .45s ease both;
    }

    .panel:nth-child(2) {
      animation-delay: .08s;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 18px 18px 0;
    }

    h2 {
      margin: 0;
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: .98rem;
      letter-spacing: 0;
    }

    .limit {
      color: var(--muted);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: .82rem;
      font-weight: 700;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      margin-top: 18px;
      background: rgba(21, 32, 31, .08);
      border-top: 1px solid rgba(21, 32, 31, .08);
      border-bottom: 1px solid rgba(21, 32, 31, .08);
    }

    .stat {
      background: rgba(251, 251, 245, .76);
      padding: 14px 16px;
    }

    .stat strong {
      display: block;
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: clamp(1.4rem, 4vw, 2.3rem);
      line-height: 1;
    }

    .stat span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: .77rem;
      font-weight: 760;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .habit-list {
      display: grid;
      gap: 10px;
      padding: 18px;
    }

    .habit-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      border: 1px solid rgba(21, 32, 31, .1);
      border-left: 7px solid var(--habit-color);
      border-radius: var(--radius);
      background: #fff;
      padding: 12px;
      transition: transform .18s ease, box-shadow .18s ease;
    }

    .habit-row:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 28px rgba(27, 47, 43, .1);
    }

    .habit-main {
      min-width: 0;
    }

    .habit-title-line {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .habit-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 1rem;
      font-weight: 820;
    }

    .streak-pill {
      flex: 0 0 auto;
      border-radius: 999px;
      background: #eef7f5;
      background: color-mix(in srgb, var(--habit-color) 18%, white);
      color: #17332f;
      padding: 3px 8px;
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: .73rem;
      font-weight: 820;
    }

    .mini-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 5px;
      width: min(280px, 100%);
      margin-top: 10px;
    }

    .day-dot {
      height: 12px;
      border-radius: 999px;
      background: #e9eee9;
      border: 1px solid rgba(21, 32, 31, .08);
    }

    .day-dot.done {
      background: var(--habit-color);
      border-color: transparent;
    }

    .day-dot.skip {
      background: repeating-linear-gradient(135deg, #d7ddd8 0 3px, #f3f5f1 3px 6px);
    }

    .habit-controls {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 7px;
      flex-wrap: wrap;
    }

    .mark {
      min-width: 84px;
    }

    .mark.done {
      border-color: var(--teal);
      background: var(--teal);
      color: #fff;
    }

    .mark.skip {
      border-color: #bac5bd;
      background: #edf0ec;
      color: #34423f;
    }

    .icon-btn {
      min-width: 34px;
      min-height: 34px;
      border: 1px solid rgba(21, 32, 31, .12);
      border-radius: var(--radius);
      background: #fff;
      color: var(--ink);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: .8rem;
      font-weight: 820;
      transition: transform .18s ease, background .18s ease;
    }

    .icon-btn:hover {
      transform: translateY(-1px);
      background: #f6faf7;
    }

    .add-form {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 48px auto;
      gap: 8px;
      padding: 0 18px 18px;
    }

    .field {
      width: 100%;
      min-height: 42px;
      border: 1px solid rgba(21, 32, 31, .16);
      border-radius: var(--radius);
      background: #fff;
      color: var(--ink);
      padding: 10px 12px;
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: .95rem;
    }

    input[type="color"].field {
      padding: 5px;
      min-width: 48px;
    }

    .chart-panel {
      display: grid;
      gap: 18px;
      padding: 18px;
    }

    .chart-wrap {
      border: 1px solid rgba(21, 32, 31, .1);
      border-radius: var(--radius);
      background: #fff;
      padding: 12px;
    }

    svg {
      display: block;
      width: 100%;
      height: auto;
      overflow: visible;
    }

    .bar {
      transform-origin: bottom;
      animation: grow .55s cubic-bezier(.2, .8, .2, 1) both;
    }

    .habit-ranks {
      display: grid;
      gap: 8px;
    }

    .rank-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: .9rem;
    }

    .rank-row span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .track {
      height: 8px;
      margin-top: 6px;
      border-radius: 999px;
      background: #e7ece8;
      overflow: hidden;
    }

    .fill {
      height: 100%;
      width: var(--pct);
      border-radius: inherit;
      background: var(--habit-color);
      transition: width .25s ease;
    }

    .empty {
      padding: 28px 18px;
      color: var(--muted);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      text-align: center;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      max-width: min(360px, calc(100vw - 36px));
      border: 1px solid rgba(21, 32, 31, .12);
      border-radius: var(--radius);
      background: #15201f;
      color: #fff;
      padding: 12px 14px;
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: .9rem;
      box-shadow: 0 18px 50px rgba(0, 0, 0, .24);
      opacity: 0;
      transform: translateY(14px);
      pointer-events: none;
      transition: opacity .18s ease, transform .18s ease;
      z-index: 20;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      background: rgba(21, 32, 31, .38);
      padding: 18px;
      z-index: 15;
    }

    .modal-backdrop.open {
      display: grid;
    }

    .modal {
      width: min(420px, 100%);
      border-radius: var(--radius);
      background: #fff;
      box-shadow: 0 24px 80px rgba(0, 0, 0, .28);
      padding: 18px;
      animation: rise .22s ease both;
    }

    .modal form {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 6px;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes grow {
      from {
        transform: scaleY(.15);
      }
      to {
        transform: scaleY(1);
      }
    }

    @media (max-width: 860px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .topbar {
        display: grid;
      }

      .actions {
        justify-content: flex-start;
        min-width: 0;
      }
    }

    @media (max-width: 620px) {
      .app {
        width: min(100% - 20px, 1180px);
        padding-top: 18px;
      }

      .stats {
        grid-template-columns: 1fr;
      }

      .habit-row {
        grid-template-columns: 1fr;
      }

      .habit-controls {
        justify-content: stretch;
      }

      .habit-controls .btn,
      .habit-controls .icon-btn {
        flex: 1 1 74px;
      }

      .add-form {
        grid-template-columns: 1fr 48px;
      }

      .add-form .primary {
        grid-column: 1 / -1;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: .001ms !important;
        scroll-behavior: auto !important;
        transition-duration: .001ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <p class="eyebrow">Daily momentum</p>
        <h1>Micro Habit Tracker</h1>
        <p class="today-label" id="todayLabel"></p>
      </div>
      <div class="actions" aria-label="Data actions">
        <button class="btn" id="exportBtn" type="button">Export JSON</button>
        <button class="btn" id="importBtn" type="button">Import JSON</button>
        <button class="btn danger" id="resetBtn" type="button">Reset demo</button>
        <input class="sr-only" id="importFile" type="file" accept="application/json,.json">
      </div>
    </header>

    <section class="layout" aria-label="Habit tracker workspace">
      <article class="panel" aria-labelledby="todayHeading">
        <div class="panel-header">
          <h2 id="todayHeading">Today</h2>
          <span class="limit" id="limitLabel"></span>
        </div>
        <div class="stats" aria-label="Today summary">
          <div class="stat">
            <strong id="doneCount">0</strong>
            <span>Done today</span>
          </div>
          <div class="stat">
            <strong id="skipCount">0</strong>
            <span>Skipped</span>
          </div>
          <div class="stat">
            <strong id="bestStreak">0</strong>
            <span>Best streak</span>
          </div>
        </div>
        <div class="habit-list" id="habitList"></div>
        <form class="add-form" id="addForm" autocomplete="off">
          <label class="sr-only" for="habitName">Habit name</label>
          <input class="field" id="habitName" maxlength="42" placeholder="Add a tiny daily habit" required>
          <label class="sr-only" for="habitColor">Habit color</label>
          <input class="field" id="habitColor" type="color" value="#0f8b82">
          <button class="btn primary" id="addBtn" type="submit">Add habit</button>
        </form>
      </article>

      <aside class="panel chart-panel" aria-labelledby="momentumHeading">
        <div class="panel-header" style="padding:0;">
          <h2 id="momentumHeading">Seven-day momentum</h2>
          <span class="limit" id="weekRange"></span>
        </div>
        <div class="chart-wrap" id="chartWrap"></div>
        <section aria-labelledby="streakHeading">
          <div class="panel-header" style="padding:0 0 10px;">
            <h2 id="streakHeading">Streaks</h2>
            <span class="limit">Skips keep streaks alive</span>
          </div>
          <div class="habit-ranks" id="rankList"></div>
        </section>
      </aside>
    </section>
  </main>

  <div class="modal-backdrop" id="modalBackdrop" role="dialog" aria-modal="true" aria-labelledby="editHeading">
    <div class="modal">
      <h2 id="editHeading">Edit habit</h2>
      <form id="editForm" autocomplete="off">
        <input type="hidden" id="editId">
        <label for="editName">Name</label>
        <input class="field" id="editName" maxlength="42" required>
        <label for="editColor">Color</label>
        <input class="field" id="editColor" type="color">
        <div class="modal-actions">
          <button class="btn" id="cancelEdit" type="button">Cancel</button>
          <button class="btn primary" type="submit">Save</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    (() => {
      "use strict";

      const MAX_HABITS = 7;
      const STORAGE_KEY = "micro-habit-tracker-v1";
      const palette = ["#0f8b82", "#ed6a5a", "#3d70b2", "#f4b942", "#7a5c99", "#2f855a", "#b45309"];

      const els = {
        todayLabel: document.getElementById("todayLabel"),
        limitLabel: document.getElementById("limitLabel"),
        doneCount: document.getElementById("doneCount"),
        skipCount: document.getElementById("skipCount"),
        bestStreak: document.getElementById("bestStreak"),
        habitList: document.getElementById("habitList"),
        addForm: document.getElementById("addForm"),
        habitName: document.getElementById("habitName"),
        habitColor: document.getElementById("habitColor"),
        addBtn: document.getElementById("addBtn"),
        chartWrap: document.getElementById("chartWrap"),
        rankList: document.getElementById("rankList"),
        weekRange: document.getElementById("weekRange"),
        exportBtn: document.getElementById("exportBtn"),
        importBtn: document.getElementById("importBtn"),
        importFile: document.getElementById("importFile"),
        resetBtn: document.getElementById("resetBtn"),
        modalBackdrop: document.getElementById("modalBackdrop"),
        editForm: document.getElementById("editForm"),
        editId: document.getElementById("editId"),
        editName: document.getElementById("editName"),
        editColor: document.getElementById("editColor"),
        cancelEdit: document.getElementById("cancelEdit"),
        toast: document.getElementById("toast")
      };

      let state = loadState();
      let toastTimer;

      function today() {
        return toIso(new Date());
      }

      function toIso(date) {
        const copy = new Date(date.getFullYear(), date.getMonth(), date.getDate());
        const year = copy.getFullYear();
        const month = String(copy.getMonth() + 1).padStart(2, "0");
        const day = String(copy.getDate()).padStart(2, "0");
        return year + "-" + month + "-" + day;
      }

      function addDays(iso, amount) {
        const date = new Date(iso + "T00:00:00");
        date.setDate(date.getDate() + amount);
        return toIso(date);
      }

      function lastSevenDates() {
        const now = today();
        return Array.from({ length: 7 }, (_, index) => addDays(now, index - 6));
      }

      function formatDate(iso, options) {
        const date = new Date(iso + "T00:00:00");
        return new Intl.DateTimeFormat(undefined, options).format(date);
      }

      function defaultState() {
        const dates = lastSevenDates();
        const names = [
          ["Morning stretch", "#0f8b82", ["done", "done", "skip", "done", "done", "done", "done"]],
          ["Read 5 pages", "#3d70b2", ["done", "", "done", "done", "skip", "done", ""]],
          ["Clear the counter", "#ed6a5a", ["", "done", "done", "done", "", "skip", "done"]],
          ["Step outside", "#f4b942", ["done", "done", "done", "", "done", "done", "done"]]
        ];

        return {
          version: 1,
          createdAt: new Date().toISOString(),
          habits: names.map(([name, color, statuses], index) => ({
            id: makeId(index),
            name,
            color,
            records: dates.reduce((memo, iso, dateIndex) => {
              if (statuses[dateIndex]) memo[iso] = statuses[dateIndex];
              return memo;
            }, {})
          }))
        };
      }

      function makeId(seed) {
        return "habit-" + Date.now().toString(36) + "-" + seed + "-" + Math.random().toString(36).slice(2, 8);
      }

      function loadState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return defaultState();
          return sanitizeState(JSON.parse(raw));
        } catch {
          return defaultState();
        }
      }

      function saveState() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

      function sanitizeState(input) {
        if (!input || !Array.isArray(input.habits)) throw new Error("Missing habits array");
        const habits = input.habits.slice(0, MAX_HABITS).map((habit, index) => {
          const records = {};
          if (habit.records && typeof habit.records === "object") {
            Object.entries(habit.records).forEach(([date, value]) => {
              if (/^\d{4}-\d{2}-\d{2}$/.test(date) && (value === "done" || value === "skip")) {
                records[date] = value;
              }
            });
          }
          return {
            id: String(habit.id || makeId(index)),
            name: String(habit.name || "Untitled habit").slice(0, 42),
            color: /^#[0-9a-fA-F]{6}$/.test(habit.color) ? habit.color : palette[index % palette.length],
            records
          };
        });
        return { version: 1, createdAt: input.createdAt || new Date().toISOString(), habits };
      }

      function render() {
        const todayIso = today();
        const dates = lastSevenDates();
        const doneToday = state.habits.filter(h => h.records[todayIso] === "done").length;
        const skipToday = state.habits.filter(h => h.records[todayIso] === "skip").length;
        const best = Math.max(0, ...state.habits.map(h => streakFor(h)));

        els.todayLabel.textContent = formatDate(todayIso, { weekday: "long", month: "long", day: "numeric" }) +
          " - mark what happened, skip what needs grace, and keep the chain honest.";
        els.limitLabel.textContent = state.habits.length + " / " + MAX_HABITS + " habits";
        els.doneCount.textContent = doneToday;
        els.skipCount.textContent = skipToday;
        els.bestStreak.textContent = best;
        els.addBtn.disabled = state.habits.length >= MAX_HABITS;
        els.habitName.disabled = state.habits.length >= MAX_HABITS;
        els.habitColor.disabled = state.habits.length >= MAX_HABITS;
        els.habitName.placeholder = state.habits.length >= MAX_HABITS ? "Limit reached" : "Add a tiny daily habit";

        renderHabits(dates, todayIso);
        renderChart(dates);
        renderRanks();
        saveState();
      }

      function renderHabits(dates, todayIso) {
        if (!state.habits.length) {
          els.habitList.innerHTML = '<p class="empty">Add one tiny habit to start tracking today.</p>';
          return;
        }

        els.habitList.innerHTML = state.habits.map(habit => {
          const status = habit.records[todayIso] || "";
          const dots = dates.map(iso => {
            const value = habit.records[iso] || "";
            const label = formatDate(iso, { weekday: "short", month: "short", day: "numeric" }) + ": " + (value || "open");
            return '<span class="day-dot ' + value + '" title="' + escapeHtml(label) + '" aria-label="' + escapeHtml(label) + '"></span>';
          }).join("");
          return `
            <article class="habit-row" style="--habit-color:${habit.color}" data-id="${habit.id}">
              <div class="habit-main">
                <div class="habit-title-line">
                  <span class="habit-name">${escapeHtml(habit.name)}</span>
                  <span class="streak-pill">${streakFor(habit)} day streak</span>
                </div>
                <div class="mini-days" aria-label="Last seven days for ${escapeHtml(habit.name)}">${dots}</div>
              </div>
              <div class="habit-controls">
                <button class="btn small mark ${status === "done" ? "done" : ""}" type="button" data-action="done">
                  ${status === "done" ? "Done" : "Mark"}
                </button>
                <button class="btn small mark ${status === "skip" ? "skip" : ""}" type="button" data-action="skip">
                  ${status === "skip" ? "Skipped" : "Skip"}
                </button>
                <button class="icon-btn" type="button" data-action="edit" aria-label="Edit ${escapeHtml(habit.name)}">Edit</button>
                <button class="icon-btn" type="button" data-action="delete" aria-label="Delete ${escapeHtml(habit.name)}">Del</button>
              </div>
            </article>
          `;
        }).join("");
      }

      function renderChart(dates) {
        const dayWidth = 46;
        const chartHeight = 168;
        const width = dayWidth * dates.length;
        const max = Math.max(1, state.habits.length);
        const bars = dates.map((iso, index) => {
          const done = state.habits.filter(h => h.records[iso] === "done").length;
          const skipped = state.habits.filter(h => h.records[iso] === "skip").length;
          const pct = done / max;
          const barHeight = Math.max(8, Math.round(pct * 108));
          const x = index * dayWidth + 10;
          const y = 124 - barHeight;
          const label = formatDate(iso, { weekday: "short" });
          return `
            <g>
              <rect class="bar" x="${x}" y="${y}" width="24" height="${barHeight}" rx="5" fill="#0f8b82" style="animation-delay:${index * 40}ms"></rect>
              ${skipped ? `<rect x="${x}" y="${Math.max(10, y - 10)}" width="24" height="6" rx="3" fill="#ed6a5a"></rect>` : ""}
              <text x="${x + 12}" y="145" text-anchor="middle" fill="#62706d" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="10" font-weight="700">${label}</text>
              <text x="${x + 12}" y="${Math.max(14, y - 8)}" text-anchor="middle" fill="#15201f" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="10" font-weight="800">${done}</text>
            </g>
          `;
        }).join("");

        els.weekRange.textContent = formatDate(dates[0], { month: "short", day: "numeric" }) + " - " +
          formatDate(dates[6], { month: "short", day: "numeric" });
        els.chartWrap.innerHTML = `
          <svg viewBox="0 0 ${width} ${chartHeight}" role="img" aria-label="Completed habits over the last seven days">
            <line x1="6" y1="125" x2="${width - 8}" y2="125" stroke="#dfe6e1" stroke-width="1"></line>
            ${bars}
          </svg>
        `;
      }

      function renderRanks() {
        if (!state.habits.length) {
          els.rankList.innerHTML = '<p class="empty">No streaks yet.</p>';
          return;
        }
        const max = Math.max(1, ...state.habits.map(h => streakFor(h)));
        els.rankList.innerHTML = [...state.habits]
          .sort((a, b) => streakFor(b) - streakFor(a))
          .map(habit => {
            const streak = streakFor(habit);
            const pct = Math.max(6, Math.round((streak / max) * 100));
            return `
              <div class="rank-row" style="--habit-color:${habit.color}; --pct:${pct}%">
                <div>
                  <span>${escapeHtml(habit.name)}</span>
                  <div class="track" aria-hidden="true"><div class="fill"></div></div>
                </div>
                <strong>${streak}d</strong>
              </div>
            `;
          }).join("");
      }

      function streakFor(habit) {
        let streak = 0;
        let cursor = today();
        for (let i = 0; i < 366; i++) {
          const status = habit.records[cursor];
          if (status === "done" || status === "skip") {
            streak += 1;
            cursor = addDays(cursor, -1);
          } else {
            break;
          }
        }
        return streak;
      }

      function setStatus(id, nextStatus) {
        const habit = state.habits.find(h => h.id === id);
        if (!habit) return;
        const date = today();
        if (habit.records[date] === nextStatus) {
          delete habit.records[date];
        } else {
          habit.records[date] = nextStatus;
        }
        render();
      }

      function openEdit(id) {
        const habit = state.habits.find(h => h.id === id);
        if (!habit) return;
        els.editId.value = habit.id;
        els.editName.value = habit.name;
        els.editColor.value = habit.color;
        els.modalBackdrop.classList.add("open");
        els.editName.focus();
      }

      function closeEdit() {
        els.modalBackdrop.classList.remove("open");
      }

      function deleteHabit(id) {
        const habit = state.habits.find(h => h.id === id);
        if (!habit) return;
        if (!confirm("Delete \"" + habit.name + "\" and its history?")) return;
        state.habits = state.habits.filter(h => h.id !== id);
        showToast("Habit deleted.");
        render();
      }

      function exportJson() {
        const payload = JSON.stringify(state, null, 2);
        const blob = new Blob([payload], { type: "application/json" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "micro-habit-tracker.json";
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(link.href);
        showToast("Export prepared.");
      }

      function importJson(file) {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          try {
            state = sanitizeState(JSON.parse(String(reader.result)));
            showToast("Imported " + state.habits.length + " habits.");
            render();
          } catch (error) {
            showToast("Import failed: " + error.message);
          } finally {
            els.importFile.value = "";
          }
        };
        reader.readAsText(file);
      }

      function showToast(message) {
        clearTimeout(toastTimer);
        els.toast.textContent = message;
        els.toast.classList.add("show");
        toastTimer = setTimeout(() => els.toast.classList.remove("show"), 2600);
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      els.addForm.addEventListener("submit", event => {
        event.preventDefault();
        const name = els.habitName.value.trim();
        if (!name || state.habits.length >= MAX_HABITS) return;
        state.habits.push({
          id: makeId(state.habits.length),
          name,
          color: els.habitColor.value,
          records: {}
        });
        els.habitName.value = "";
        els.habitColor.value = palette[state.habits.length % palette.length];
        showToast("Habit added.");
        render();
      });

      els.habitList.addEventListener("click", event => {
        const button = event.target.closest("button[data-action]");
        if (!button) return;
        const row = button.closest(".habit-row");
        if (!row) return;
        const id = row.dataset.id;
        const action = button.dataset.action;
        if (action === "done") setStatus(id, "done");
        if (action === "skip") setStatus(id, "skip");
        if (action === "edit") openEdit(id);
        if (action === "delete") deleteHabit(id);
      });

      els.editForm.addEventListener("submit", event => {
        event.preventDefault();
        const habit = state.habits.find(h => h.id === els.editId.value);
        if (!habit) return;
        habit.name = els.editName.value.trim() || habit.name;
        habit.color = els.editColor.value;
        closeEdit();
        showToast("Habit updated.");
        render();
      });

      els.cancelEdit.addEventListener("click", closeEdit);
      els.modalBackdrop.addEventListener("click", event => {
        if (event.target === els.modalBackdrop) closeEdit();
      });
      document.addEventListener("keydown", event => {
        if (event.key === "Escape") closeEdit();
      });

      els.exportBtn.addEventListener("click", exportJson);
      els.importBtn.addEventListener("click", () => els.importFile.click());
      els.importFile.addEventListener("change", event => importJson(event.target.files[0]));
      els.resetBtn.addEventListener("click", () => {
        if (!confirm("Reset to the demo data?")) return;
        state = defaultState();
        showToast("Demo data restored.");
        render();
      });

      render();
    })();
  </script>
</body>
</html>
