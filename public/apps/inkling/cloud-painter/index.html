<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloud Painter — Paint the Sky</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --sky-top: #87CEEB;
    --sky-mid: #A7D8FF;
    --sky-bot: #CDE8FF;
    --cloud: rgba(255,255,255,0.92);
    --sun: #FFE082;
    --pink: #FFC2D6;
    --lavender: #D6C4FF;
    --mint: #C2FFE8;
  }
  html, body { margin: 0; padding: 0; overflow: hidden; height: 100vh; background: linear-gradient(180deg, #87CEEB 0%, #A7D8FF 40%, #CDE8FF 70%, #FFE8D6 100%); font-family: 'Quicksand', sans-serif; user-select: none; }
  body { cursor: crosshair; }
  .font-fun { font-family: 'Fredoka One', cursive; letter-spacing: 0.04em; }
  /* Animated drifting clouds behind */
  .bg-cloud {
    position: absolute; border-radius: 50%; background: radial-gradient(circle at 40% 35%, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.7) 50%, rgba(255,255,255,0.0) 80%);
    filter: blur(2px);
    pointer-events: none;
    animation: drift linear infinite;
  }
  @keyframes drift {
    from { transform: translateX(-10vw); }
    to { transform: translateX(110vw); }
  }
  /* Brush buttons */
  .brush-btn {
    transition: all 0.2s ease; border: 3px solid rgba(255,255,255,0.4);
  }
  .brush-btn.active {
    border-color: #FFE082; background: rgba(255,224,130,0.25); transform: scale(1.1);
    box-shadow: 0 6px 20px rgba(255,224,130,0.35);
  }
  .brush-btn:hover:not(.active) { transform: scale(1.05); border-color: rgba(255,255,255,0.8); }
  /* Canvas container shadow */
  .canvas-wrap {
    box-shadow: 0 25px 60px rgba(100,140,200,0.25), inset 0 0 40px rgba(255,255,255,0.35);
    border-radius: 28px; overflow: hidden; border: 4px solid rgba(255,255,255,0.55);
  }
  /* Airplane */
  .airplane { animation: fly linear infinite; pointer-events: none; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }
  @keyframes fly {
    0% { left: -8vw; }
    100% { left: 108vw; }
  }
  /* Save pulse */
  @keyframes pulse-soft {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,200,210,0.5); }
    50% { box-shadow: 0 0 0 10px rgba(255,200,210,0.0); }
  }
  .btn-save { animation: pulse-soft 2.5s infinite; }
  /* Sparkles */
  @keyframes sparkle-rise {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-30px) scale(0.4); }
  }
  .sparkle { position: absolute; pointer-events: none; animation: sparkle-rise 0.8s ease-out forwards; font-size: 18px; }
</style>
</head>
<body class="h-screen w-full relative">

<!-- Background drifting clouds -->
<div id="bgClouds"></div>

<!-- Airplanes -->
<div id="airplanes"></div>

<!-- Main layout -->
<div class="relative z-10 flex flex-col h-full w-full items-center justify-center px-4 py-6">

  <!-- Title -->
  <header class="mb-3 text-center">
    <h1 class="font-fun text-5xl md:text-7xl text-white drop-shadow-[0_4px_8px_rgba(0,0,0,0.15)] tracking-tight">Cloud Painter</h1>
    <p class="text-white/90 text-lg md:text-xl font-semibold drop-shadow-md mt-1">Paint clouds, fly planes, save your sky!</p>
  </header>

  <!-- Canvas -->
  <main class="relative flex-1 w-full max-w-6xl flex items-center justify-center">
    <div class="canvas-wrap relative w-full h-full max-h-[65vh] bg-gradient-to-b from-[#B3E0FF] via-[#D6F0FF] to-[#EAF8FF]">
      <canvas id="paintCanvas" class="w-full h-full block rounded-2xl"></canvas>
    </div>
  </main>

  <!-- Controls -->
  <footer class="w-full max-w-3xl mt-4">
    <div class="bg-white/35 backdrop-blur-xl rounded-[30px] border border-white/50 shadow-[0_10px_40px_rgba(100,140,200,0.15)] px-6 py-4 flex flex-wrap items-center justify-between gap-4">
      
      <!-- Brush selector -->
      <div class="flex items-center gap-3">
        <span class="text-sky-800 font-bold text-sm tracking-wide hidden sm:inline">Brush:</span>
        <button onclick="setBrush('circle')" id="btn-circle" class="brush-btn active w-12 h-12 rounded-full bg-gradient-to-br from-sky-300 to-sky-500 shadow-md flex items-center justify-center text-xl text-white" aria-label="Circle brush" title="Cloud puff">☁</button>
        <button onclick="setBrush('star')" id="btn-star" class="brush-btn w-12 h-12 rounded-full bg-gradient-to-br from-amber-300 to-amber-400 shadow-md flex items-center justify-center text-xl text-white" aria-label="Star brush" title="Star">⭐</button>
        <button onclick="setBrush('heart')" id="btn-heart" class="brush-btn w-12 h-12 rounded-full bg-gradient-to-br from-rose-300 to-rose-400 shadow-md flex items-center justify-center text-xl text-white" aria-label="Heart brush" title="Heart">💗</button>
        <button onclick="setBrush('flower')" id="btn-flower" class="brush-btn w-12 h-12 rounded-full bg-gradient-to-br from-fuchsia-300 to-fuchsia-400 shadow-md flex items-center justify-center text-xl text-white" aria-label="Flower brush" title="Flower">🌸</button>
      </div>

      <!-- Color palette -->
      <div class="flex items-center gap-2">
        <span class="text-sky-800 font-bold text-sm tracking-wide hidden md:inline">Color:</span>
        <button onclick="setColor('#FFFFFF')" class="w-9 h-9 rounded-full border-2 border-white/80 shadow-md bg-white hover:scale-110 transition" aria-label="White" title="White"></button>
        <button onclick="setColor('#FFC2D6')" class="w-9 h-9 rounded-full border-2 border-white/80 shadow-md bg-[#FFC2D6] hover:scale-110 transition" aria-label="Pink" title="Pink"></button>
        <button onclick="setColor('#FFE082')" class="w-9 h-9 rounded-full border-2 border-white/80 shadow-md bg-[#FFE082] hover:scale-110 transition" aria-label="Sunny Yellow" title="Sunny Yellow"></button>
        <button onclick="setColor('#D6C4FF')" class="w-9 h-9 rounded-full border-2 border-white/80 shadow-md bg-[#D6C4FF] hover:scale-110 transition" aria-label="Lavender" title="Lavender"></button>
        <button onclick="setColor('#C2FFE8')" class="w-9 h-9 rounded-full border-2 border-white/80 shadow-md bg-[#C2FFE8] hover:scale-110 transition" aria-label="Mint" title="Mint"></button>
        <button onclick="setColor('#A7D8FF')" class="w-9 h-9 rounded-full border-2 border-white/80 shadow-md bg-[#A7D8FF] hover:scale-110 transition" aria-label="Sky Blue" title="Sky Blue"></button>
      </div>

      <!-- Actions -->
      <div class="flex items-center gap-3">
        <button onclick="clearCanvas()" class="px-4 py-2.5 rounded-full bg-white/50 hover:bg-white/80 text-sky-900 font-bold shadow-md transition text-sm border border-white/40" aria-label="Clear">Clear</button>
        <button onclick="saveImage()" class="btn-save px-5 py-2.5 rounded-full bg-gradient-to-r from-rose-200 to-amber-200 text-rose-800 font-extrabold shadow-lg hover:shadow-xl transition text-sm border border-white/40 flex items-center gap-2" aria-label="Save image">
          <span>💾</span> Save Sky
        </button>
      </div>
    </div>
  </footer>

</div>

<script>
/* ===== State ===== */
let currentBrush = 'circle';
let currentColor = '#FFFFFF';
let isDrawing = false;
let lastX = 0, lastY = 0;
const canvas = document.getElementById('paintCanvas');
const ctx = canvas.getContext('2d');

/* ===== Setup Canvas ===== */
function resizeCanvas() {
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * 2;
  canvas.height = rect.height * 2;
  ctx.scale(2, 2);
  // Redraw if needed or just keep current
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

/* ===== Brush Logic ===== */
function setBrush(name) {
  currentBrush = name;
  document.querySelectorAll('.brush-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + name).classList.add('active');
}
function setColor(hex) {
  currentColor = hex;
}

/* ===== Drawing ===== */
function getBrushShape(x, y, size) {
  const s = size;
  if (currentBrush === 'circle') {
    return { draw: () => {
      ctx.beginPath();
      ctx.arc(x, y, s, 0, Math.PI * 2);
      ctx.fill();
    }};
  }
  if (currentBrush === 'star') {
    return { draw: () => {
      const spikes = 5; const outer = s; const inner = s * 0.38;
      let rot = Math.PI / 2 * 3; let x1 = x, y1 = y;
      ctx.beginPath();
      ctx.moveTo(x + outer * Math.cos(rot), y + outer * Math.sin(rot));
      for (let i = 0; i < spikes; i++) {
        rot += Math.PI / spikes;
        ctx.lineTo(x + inner * Math.cos(rot + Math.PI / spikes / 2), y + inner * Math.sin(rot + Math.PI / spikes / 2));
        rot += Math.PI / spikes;
        ctx.lineTo(x + outer * Math.cos(rot), y + outer * Math.sin(rot));
      }
      ctx.lineTo(x + outer * Math.cos(Math.PI / 2 * 3), y + outer * Math.sin(Math.PI / 2 * 3));
      ctx.closePath();
      ctx.fill();
    }};
  }
  if (currentBrush === 'heart') {
    return { draw: () => {
      ctx.beginPath();
      const w = s, h = s;
      ctx.moveTo(x, y + h * 0.35);
      ctx.bezierCurveTo(x - w * 0.5, y - h * 0.15, x - w * 0.9, y + h * 0.1, x, y + h * 0.7);
      ctx.bezierCurveTo(x + w * 0.9, y + h * 0.1, x + w * 0.5, y - h * 0.15, x, y + h * 0.35);
      ctx.closePath();
      ctx.fill();
    }};
  }
  if (currentBrush === 'flower') {
    return { draw: () => {
      const petals = 6;
      for (let i = 0; i < petals; i++) {
        const a = (i / petals) * Math.PI * 2;
        ctx.beginPath();
        ctx.arc(x + Math.cos(a) * s * 0.35, y + Math.sin(a) * s * 0.35, s * 0.6, 0, Math.PI * 2);
        ctx.fill();
      }
      // Center
      ctx.beginPath();
      ctx.arc(x, y, s * 0.35, 0, Math.PI * 2);
      ctx.fill();
    }};
  }
  return { draw: () => {} };
}

function drawStroke(x1, y1, x2, y2) {
  // Interpolate points for smooth drawing
  const dx = x2 - x1, dy = y2 - y1;
  const dist = Math.sqrt(dx * dx + dy * dy);
  const steps = Math.max(1, Math.ceil(dist / 6));
  for (let i = 0; i <= steps; i++) {
    const t = i / steps;
    const x = x1 + dx * t;
    const y = y1 + dy * t;
    const size = 28 + Math.random() * 14;
    const shape = getBrushShape(x, y, size);
    ctx.fillStyle = currentColor;
    ctx.shadowColor = currentColor;
    ctx.shadowBlur = 20;
    shape.draw();
    ctx.shadowBlur = 0;
  }
}

function startDrawing(e) {
  isDrawing = true;
  [lastX, lastY] = [e.clientX - canvas.getBoundingClientRect().left, e.clientY - canvas.getBoundingClientRect().top];
  drawStroke(lastX, lastY, lastX, lastY);
}

function drawMove(e) {
  if (!isDrawing) return;
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  drawStroke(lastX, lastY, x, y);
  [lastX, lastY] = [x, y];
  spawnSparkle(x, y);
}

function endDrawing() { isDrawing = false; }

canvas.addEventListener('mousedown', startDrawing);
canvas.addEventListener('mousemove', drawMove);
canvas.addEventListener('mouseup', endDrawing);
canvas.addEventListener('mouseleave', endDrawing);

/* Touch */
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const touch = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  [lastX, lastY] = [touch.clientX - rect.left, touch.clientY - rect.top];
  isDrawing = true;
  drawStroke(lastX, lastY, lastX, lastY);
}, { passive: false });
canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (!isDrawing) return;
  const touch = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  const x = touch.clientX - rect.left;
  const y = touch.clientY - rect.top;
  drawStroke(lastX, lastY, x, y);
  [lastX, lastY] = [x, y];
  spawnSparkle(x, y);
}, { passive: false });
canvas.addEventListener('touchend', () => { isDrawing = false; });

/* ===== Sparkles ===== */
function spawnSparkle(x, y) {
  const sparkle = document.createElement('div');
  sparkle.className = 'sparkle';
  sparkle.textContent = ['✦','✧','✩','✪','❋'][Math.floor(Math.random() * 5)];
  sparkle.style.left = (x + Math.random() * 30 - 15) + 'px';
  sparkle.style.top = (y + Math.random() * 30 - 15) + 'px';
  sparkle.style.color = currentColor;
  sparkle.style.fontSize = (14 + Math.random() * 14) + 'px';
  sparkle.style.zIndex = 50;
  canvas.parentElement.appendChild(sparkle);
  setTimeout(() => sparkle.remove(), 900);
}

/* ===== Background Clouds ===== */
const bgClouds = document.getElementById('bgClouds');
function makeClouds() {
  for (let i = 0; i < 8; i++) {
    const c = document.createElement('div');
    c.className = 'bg-cloud';
    const size = 120 + Math.random() * 200;
    c.style.width = size + 'px';
    c.style.height = size * 0.6 + 'px';
    c.style.top = Math.random() * 60 + 'vh';
    c.style.animationDuration = (40 + Math.random() * 60) + 's';
    c.style.animationDelay = (Math.random() * 30) + 's';
    c.style.opacity = 0.4 + Math.random() * 0.4;
    bgClouds.appendChild(c);
  }
}
makeClouds();

/* ===== Airplanes ===== */
const airplanes = document.getElementById('airplanes');
function spawnAirplane() {
  const plane = document.createElement('div');
  plane.className = 'airplane absolute text-4xl z-0';
  plane.innerHTML = Math.random() > 0.5 ? '✈️' : '🛩️';
  plane.style.top = (10 + Math.random() * 50) + 'vh';
  plane.style.animationDuration = (18 + Math.random() * 18) + 's';
  plane.style.animationDelay = (Math.random() * 10) + 's';
  airplanes.appendChild(plane);
  setTimeout(() => plane.remove(), (20 + Math.random() * 20) * 1000);
}
setInterval(spawnAirplane, 7000);
// Initial
for (let i = 0; i < 2; i++) setTimeout(spawnAirplane, i * 5000);

/* ===== Save ===== */
function clearCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}
function saveImage() {
  const link = document.createElement('a');
  link.download = 'my-cloud-sky.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
  // Little visual feedback
  const btn = document.querySelector('.btn-save');
  btn.style.transform = 'scale(0.95)';
  setTimeout(() => btn.style.transform = '', 150);
}
</script>

</body>
</html>
