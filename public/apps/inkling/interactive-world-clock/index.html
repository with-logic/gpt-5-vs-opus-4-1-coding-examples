<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive World Clock</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['"Outfit"', 'system-ui', 'sans-serif'],
            serif: ['"Playfair Display"', 'Georgia', 'serif'],
          },
          colors: {
            dawn: { from: '#f6ad55', to: '#fbd38d', glow: '#f6ad55' },
            day: { from: '#38bdf8', to: '#818cf8', glow: '#38bdf8' },
            dusk: { from: '#c084fc', to: '#f472b6', glow: '#c084fc' },
            night: { from: '#1e3a8a', to: '#0f172a', glow: '#6366f1' },
          },
        },
      },
    };
  </script>

  <style>
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Outfit', system-ui, sans-serif;
      background-color: #0b0d12;
      color: #f0f0f5;
      overflow-x: hidden;
    }

    /* Animated mesh gradient background */
    .mesh-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(at 20% 10%, rgba(56, 189, 248, 0.18) 0%, transparent 50%),
        radial-gradient(at 80% 20%, rgba(192, 132, 252, 0.14) 0%, transparent 50%),
        radial-gradient(at 50% 80%, rgba(246, 173, 85, 0.1) 0%, transparent 50%),
        radial-gradient(at 10% 60%, rgba(99, 102, 241, 0.1) 0%, transparent 50%);
      animation: meshShift 30s ease-in-out infinite alternate;
    }
    @keyframes meshShift {
      0% { background-position: 0% 0%; }
      33% { background-position: 10% -10%; }
      66% { background-position: -10% 5%; }
      100% { background-position: 0% 0%; }
    }

    /* Glass card */
    .glass-card {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(20px) saturate(140%);
      -webkit-backdrop-filter: blur(20px) saturate(140%);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 28px;
      box-shadow:
        0 4px 30px rgba(0, 0, 0, 0.25),
        inset 0 1px 0 rgba(255, 255, 255, 0.04);
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
    }
    .glass-card:hover {
      transform: translateY(-4px);
      border-color: rgba(255, 255, 255, 0.14);
      box-shadow:
        0 12px 40px rgba(0, 0, 0, 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }

    /* City time-of-day color themes */
    .theme-dawn .time-glow { color: #f6ad55; text-shadow: 0 0 30px rgba(246,173,85,0.45); }
    .theme-day .time-glow { color: #38bdf8; text-shadow: 0 0 30px rgba(56,189,248,0.45); }
    .theme-dusk .time-glow { color: #c084fc; text-shadow: 0 0 30px rgba(192,132,252,0.45); }
    .theme-night .time-glow { color: #818cf8; text-shadow: 0 0 30px rgba(129,140,248,0.45); }

    /* Animated sun/moon icon glow */
    @keyframes pulseGlow {
      0%, 100% { filter: drop-shadow(0 0 8px currentColor); }
      50% { filter: drop-shadow(0 0 20px currentColor); }
    }
    .icon-glow { animation: pulseGlow 3s ease-in-out infinite; }

    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }

    /* Input glow focus */
    input:focus, select:focus {
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.25), 0 0 20px rgba(56, 189, 248, 0.15);
    }

    /* Subtle grid lines */
    .grid-lines {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 60px 60px;
    }
  </style>
</head>

<body class="min-h-screen relative">
  <div class="mesh-bg"></div>
  <div class="grid-lines"></div>

  <main class="relative z-10 max-w-6xl mx-auto px-6 py-14">

    <!-- Header -->
    <header class="mb-16 text-center">
      <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-white/5 border border-white/10 text-xs font-medium tracking-widest uppercase text-white/60 mb-6">
        <i class="fa-solid fa-globe text-[10px] text-cyan-400"></i> Global Time Explorer
      </div>
      <h1 class="font-display text-6xl md:text-8xl font-extrabold tracking-tight mb-4 leading-[0.92]">
        <span class="bg-gradient-to-br from-white via-cyan-100 to-purple-200 bg-clip-text text-transparent">Interactive</span><br />
        <span class="text-white/90">World Clock</span>
      </h1>
      <p class="font-serif italic text-xl md:text-2xl text-white/40 mt-4 tracking-wide">"Time moves differently across the horizon."</p>
    </header>

    <!-- Controls -->
    <section class="flex flex-wrap items-center justify-between gap-4 mb-12">
      <div class="glass-card p-2 flex items-center gap-2">
        <button onclick="addCity()" class="px-5 py-2.5 rounded-xl bg-gradient-to-r from-cyan-500 to-blue-500 text-white font-semibold text-sm shadow-lg shadow-cyan-900/30 hover:shadow-cyan-900/50 hover:scale-[1.03] transition-all active:scale-[0.97] flex items-center gap-2.5">
          <i class="fa-solid fa-plus"></i> Add City
        </button>
        <button onclick="toggleFormat()" id="formatBtn" class="px-5 py-2.5 rounded-xl bg-white/5 hover:bg-white/10 border border-white/10 text-white/80 font-medium text-sm hover:text-white transition-all flex items-center gap-2.5">
          <i class="fa-regular fa-clock"></i> <span id="formatLabel">Switch to 12h</span>
        </button>
      </div>
      <div class="text-sm text-white/30 font-light tracking-wide">
        <span id="totalCities">4</span> cities tracked
      </div>
    </section>

    <!-- City Cards Grid -->
    <section id="cityGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-16">
      <!-- Cards injected by JS -->
    </section>

    <!-- Footer -->
    <footer class="text-center text-white/20 text-xs tracking-[0.2em] uppercase pt-8 border-t border-white/5">
      Interactive World Clock &mdash; Self-contained HTML
    </footer>
  </main>

  <script>
    // ===== Data =====
    const cities = [
      { name: 'Tokyo', timezone: 'Asia/Tokyo', icon: 'fa-torii-gate', color: '#f472b6' },
      { name: 'London', timezone: 'Europe/London', icon: 'fa-landmark', color: '#38bdf8' },
      { name: 'New York', timezone: 'America/New_York', icon: 'fa-building-columns', color: '#c084fc' },
      { name: 'Sydney', timezone: 'Australia/Sydney', icon: 'fa-sun', color: '#f6ad55' },
    ];

    let is24h = true;

    // ===== Time Helpers =====
    function getPhase(hour) {
      if (hour >= 5 && hour < 11) return 'dawn';
      if (hour >= 11 && hour < 17) return 'day';
      if (hour >= 17 && hour < 21) return 'dusk';
      return 'night';
    }

    function getPhaseIcon(hour) {
      const p = getPhase(hour);
      if (p === 'dawn') return 'fa-solid fa-sun';
      if (p === 'day') return 'fa-solid fa-sun';
      if (p === 'dusk') return 'fa-solid fa-cloud-sun';
      return 'fa-solid fa-moon';
    }

    function getPhaseName(hour) {
      const p = getPhase(hour);
      if (p === 'dawn') return 'Morning';
      if (p === 'day') return 'Afternoon';
      if (p === 'dusk') return 'Evening';
      return 'Night';
    }

    function formatTime(date, timezone, use24) {
      const fmt = new Intl.DateTimeFormat('en-US', {
        hour: 'numeric', minute: '2-digit', second: '2-digit',
        hourCycle: use24 ? 'h23' : 'h12',
        timeZone: timezone,
      });
      return fmt.format(date);
    }

    // ===== Render =====
    function render() {
      const grid = document.getElementById('cityGrid');
      const now = new Date();
      grid.innerHTML = '';

      cities.forEach((city, idx) => {
        const local = new Date(now.toLocaleString('en-US', { timeZone: city.timezone }));
        const hour = local.getHours();
        const phase = getPhase(hour);
        const timeStr = formatTime(now, city.timezone, is24h);
        const timeLabel = timeStr.replace(/(AM|PM)/, '').trim();
        const ampm = is24h ? '' : (timeStr.includes('PM') ? 'PM' : 'AM');

        const card = document.createElement('article');
        card.className = `glass-card theme-${phase} p-7 relative overflow-hidden`;
        card.innerHTML = `
          <button onclick="removeCity(${idx})" aria-label="Remove ${city.name}" class="absolute top-4 right-4 w-8 h-8 rounded-full bg-white/5 hover:bg-red-500/20 hover:text-red-400 border border-white/5 text-white/30 hover:text-red-400 transition-all flex items-center justify-center z-20" title="Remove city">
            <i class="fa-solid fa-xmark text-xs"></i>
          </button>

          <div class="flex items-start justify-between mb-6">
            <div>
              <h3 class="font-display text-2xl font-bold text-white mb-0.5 tracking-tight">${city.name}</h3>
              <span class="text-xs font-medium text-white/30 tracking-wider uppercase">${city.timezone.replace('/', ' / ')}</span>
            </div>
            <div class="w-12 h-12 rounded-2xl bg-gradient-to-br ${phase === 'dawn' ? 'from-amber-400/20 to-amber-200/5' : phase === 'day' ? 'from-cyan-400/20 to-blue-300/5' : phase === 'dusk' ? 'from-purple-400/20 to-fuchsia-200/5' : 'from-indigo-400/20 to-blue-400/5'} flex items-center justify-center border border-white/5">
              <i class="${getPhaseIcon(hour)} text-lg ${phase === 'dawn' ? 'text-amber-300' : phase === 'day' ? 'text-cyan-300' : phase === 'dusk' ? 'text-purple-300' : 'text-indigo-300'} icon-glow"></i>
            </div>
          </div>

          <div class="mb-5">
            <div class="font-display text-5xl md:text-6xl font-extrabold leading-none time-glow tracking-tight">${timeLabel}</div>
            ${!is24h ? `<div class="text-xs font-medium text-white/40 tracking-widest mt-2">${ampm}</div>` : ''}
          </div>

          <div class="flex items-center justify-between pt-4 border-t border-white/5">
            <div class="flex items-center gap-2 text-xs font-medium text-white/40">
              <span class="w-1.5 h-1.5 rounded-full ${phase === 'dawn' ? 'bg-amber-400' : phase === 'day' ? 'bg-cyan-400' : phase === 'dusk' ? 'bg-purple-400' : 'bg-indigo-300'}"></span>
              <span>${getPhaseName(hour)}</span>
            </div>
            <span class="text-xs font-mono text-white/20">${local.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })}</span>
          </div>
        `;
        grid.appendChild(card);
      });

      document.getElementById('totalCities').textContent = cities.length;
    }

    function addCity() {
      const names = [
        { name: 'Paris', timezone: 'Europe/Paris', icon: 'fa-tower-eiffel' },
        { name: 'Dubai', timezone: 'Asia/Dubai', icon: 'fa-building' },
        { name: 'Singapore', timezone: 'Asia/Singapore', icon: 'fa-ship' },
        { name: 'Cape Town', timezone: 'Africa/Johannesburg', icon: 'fa-mountain-sun' },
        { name: 'Rio', timezone: 'America/Sao_Paulo', icon: 'fa-umbrella-beach' },
        { name: 'Mumbai', timezone: 'Asia/Kolkata', icon: 'fa-landmark-dome' },
      ];
      const pick = names[Math.floor(Math.random() * names.length)];
      if (!cities.find(c => c.name === pick.name)) {
        cities.push(pick);
        render();
      } else {
        addCity(); // retry
      }
    }

    function removeCity(idx) {
      cities.splice(idx, 1);
      render();
    }

    function toggleFormat() {
      is24h = !is24h;
      document.getElementById('formatLabel').textContent = is24h ? 'Switch to 12h' : 'Switch to 24h';
      render();
    }

    // Initialize & tick
    render();
    setInterval(render, 1000);
  </script>
</body>
</html>
