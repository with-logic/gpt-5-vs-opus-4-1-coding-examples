<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Equation Solver Tool</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-light.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            parchment: '#f8f6f2',
            ink: '#1a1814',
            stone: '#8a8478',
            clay: '#c4b8a8',
            warmth: '#bfae98',
            sage: '#8b9e8a',
            coral: '#a87a6e',
          },
          fontFamily: {
            serif: ['"EB Garamond"', '"Cormorant Garamond"', 'Georgia', 'serif'],
            display: ['"Cormorant Garamond"', 'Georgia', 'serif'],
            sans: ['"Source Sans 3"', 'system-ui', 'sans-serif'],
          },
        },
      },
    }
  </script>

  <style>
    body {
      background-color: #f8f6f2;
      background-image: radial-gradient(circle at 50% 0%, #f0edea 0%, #f8f6f2 60%, #f5f3ef 100%);
      color: #1a1814;
    }
    ::selection {
      background: #c4b8a8;
      color: #1a1814;
    }
    .math-border {
      border: 1px solid #d8d3cb;
      box-shadow: 0 1px 3px rgba(138,132,120,0.08), 0 8px 30px rgba(138,132,120,0.04);
    }
    .step-card {
      border-left: 2px solid #c4b8a8;
      transition: border-color 0.3s ease;
    }
    .step-card:hover {
      border-left-color: #8a8478;
    }
    input:focus, textarea:focus {
      border-color: #8a8478;
      box-shadow: 0 0 0 3px rgba(138,132,120,0.15);
    }
    .btn-primary {
      background-color: #1a1814;
      color: #f8f6f2;
      transition: all 0.25s ease;
    }
    .btn-primary:hover {
      background-color: #2d2a24;
      box-shadow: 0 4px 14px rgba(26,24,20,0.2);
      transform: translateY(-1px);
    }
    .divider-line {
      height: 1px;
      background: linear-gradient(90deg, transparent, #d8d3cb, transparent);
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-up {
      animation: fadeUp 0.6s ease-out both;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-8px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .slide-in {
      animation: slideIn 0.35s ease-out both;
    }
  </style>
</head>

<body class="font-sans antialiased min-h-screen">

  <!-- Header -->
  <header class="max-w-3xl mx-auto px-8 pt-16 pb-6">
    <div class="flex items-center gap-3 mb-2">
      <span class="text-2xl">∫</span>
      <h1 class="font-display text-4xl md:text-5xl font-light tracking-tight text-ink">
        Equation Solver
      </h1>
    </div>
    <p class="font-serif italic text-xl text-stone ml-9">
      Analyze, solve, and understand with clarity.
    </p>
    <div class="divider-line mt-8"></div>
  </header>

  <main class="max-w-3xl mx-auto px-8 pb-24">

    <!-- Input Section -->
    <section class="fade-up">
      <label for="equation-input" class="block font-sans text-xs uppercase tracking-[0.15em] text-stone mb-3 font-semibold">
        Enter Equation
      </label>
      <div class="relative">
        <textarea
          id="equation-input"
          rows="2"
          class="w-full bg-white/60 math-border rounded-xl px-6 py-5 font-display text-xl md:text-2xl text-ink placeholder:text-stone/50 focus:outline-none resize-none transition-all"
          placeholder="e.g. 2x + 5 = 13, x² - 4 = 0, 3(x - 2) = 9"
          spellcheck="false"
        >2x + 5 = 13</textarea>
        <div class="absolute right-5 bottom-5 text-xs text-stone/60 font-sans uppercase tracking-wide pointer-events-none">
          Math expr
        </div>
      </div>
      <div class="flex gap-3 mt-4">
        <button onclick="solveEquation()" class="btn-primary px-7 py-2.5 rounded-full text-sm font-sans font-semibold tracking-wide">
          Solve
        </button>
        <button onclick="clearAll()" class="px-6 py-2.5 rounded-full text-sm font-sans text-stone hover:text-ink hover:bg-stone/5 transition-colors tracking-wide">
          Clear
        </button>
        <button onclick="loadExample('linear')" class="px-6 py-2.5 rounded-full text-sm font-sans text-stone hover:text-ink hover:bg-stone/5 transition-colors tracking-wide hidden sm:inline-block" title="2x + 5 = 13">
          Linear
        </button>
        <button onclick="loadExample('quadratic')" class="px-6 py-2.5 rounded-full text-sm font-sans text-stone hover:text-ink hover:bg-stone/5 transition-colors tracking-wide hidden sm:inline-block" title="x² - 4 = 0">
          Quadratic
        </button>
        <button onclick="loadExample('system')" class="px-6 py-2.5 rounded-full text-sm font-sans text-stone hover:text-ink hover:bg-stone/5 transition-colors tracking-wide hidden sm:inline-block" title="y = 2x + 1, y = x + 3">
          System
        </button>
      </div>
    </section>

    <!-- Results -->
    <section id="results-area" class="mt-14 hidden">
      <div class="divider-line mb-10"></div>

      <!-- Solution Header -->
      <div class="mb-8 slide-in">
        <p class="font-sans text-[10px] uppercase tracking-[0.2em] text-stone mb-1">Solution</p>
        <h2 id="solution-display" class="font-display text-3xl md:text-4xl font-light text-ink"></h2>
      </div>

      <!-- Step Breakdown -->
      <div id="steps-container" class="space-y-0"></div>

      <!-- Export -->
      <div class="mt-12 pt-8 border-t border-stone/20">
        <p class="font-sans text-[10px] uppercase tracking-[0.2em] text-stone mb-4">Export</p>
        <div class="flex gap-3">
          <button onclick="exportText()" class="btn-primary px-5 py-2 rounded-full text-sm font-sans tracking-wide">
            Copy Text
          </button>
          <button onclick="exportJSON()" class="px-5 py-2 rounded-full text-sm font-sans text-ink border border-ink/20 hover:border-ink/40 hover:bg-ink/5 transition-all tracking-wide">
            JSON
          </button>
          <button onclick="printResult()" class="px-5 py-2 rounded-full text-sm font-sans text-ink border border-ink/20 hover:border-ink/40 hover:bg-ink/5 transition-all tracking-wide">
            Print / PDF
          </button>
        </div>
        <div id="export-feedback" class="text-xs text-sage mt-3 font-sans opacity-0 transition-opacity duration-300">Copied to clipboard.</div>
      </div>
    </section>

    <!-- Empty State -->
    <section id="empty-state" class="mt-20 text-center">
      <div class="inline-block text-6xl opacity-20 mb-4">∑</div>
      <h3 class="font-display text-2xl text-stone font-light mb-2">Awaiting Input</h3>
      <p class="font-sans text-sm text-stone/70">Type an equation above and press Solve to begin.</p>
    </section>
  </main>

  <!-- Footer -->
  <footer class="max-w-3xl mx-auto px-8 py-8 border-t border-stone/10 flex justify-between items-center text-xs text-stone/50 font-sans tracking-wide">
    <span>Equation Solver Tool</span>
    <span>Self-Contained</span>
  </footer>

  <script>
    // Equation parser and solver
    const solverState = { eq: '', steps: [], result: '' };

    function parseExpression(str) {
      // Normalize spacing
      return str.replace(/\s+/g, '').trim();
    }

    function solveLinear(eqStr) {
      // Handle basic linear: ax + b = c
      // Try to match patterns
      eqStr = parseExpression(eqStr);
      const sides = eqStr.split('=');
      if (sides.length !== 2) return null;
      let left = sides[0], right = sides[1];

      // Move terms: combine like terms and isolate x
      // We'll parse by extracting coefficient
      const steps = [];
      steps.push({ label: "Given equation", math: eqStr, note: "Begin with the expression." });

      // Extract variable terms and constants
      // Very simplified parser for this demo
      let xCoeff = 0, constL = 0;
      // Parse left
      const tokensL = tokenize(left);
      for (const t of tokensL) {
        if (t.type === 'variable') xCoeff += t.val;
        else if (t.type === 'number') constL += t.val;
      }

      // Parse right
      let constR = 0, xCoeffR = 0;
      const tokensR = tokenize(right);
      for (const t of tokensR) {
        if (t.type === 'variable') xCoeffR += t.val;
        else if (t.type === 'number') constR += t.val;
      }

      // If x appears on right, move it
      if (xCoeffR !== 0) {
        steps.push({ label: "Move variable terms", math: `x \cdot ${xCoeffR} \to \text{left}`, note: "Keep variable terms on one side." });
        xCoeff -= xCoeffR;
        constR -= xCoeffR * 0; // no-op, just logic tracking
      }

      // Move constants
      const newConst = constR - constL;
      steps.push({ label: "Isolate constant", math: `x \cdot ${xCoeff} = ${newConst}`, note: "Subtract constants to isolate the variable term." });

      // Divide by coefficient
      const sol = newConst / xCoeff;
      steps.push({ label: "Divide by coefficient", math: `x = ${sol}`, note: `Divide both sides by \(${xCoeff}\).` });

      return { type: 'linear', solution: `x = ${sol}`, steps, raw: sol };
    }

    function tokenize(expr) {
      const tokens = [];
      // Very basic tokenizer
      const regex = /(-?\d+\.?\d*)?([a-zA-Z])?/g; // Not perfect but demo-grade
      // Instead, use a simpler approach: split by + and -
      const parts = expr.replace(/-/g, '+-').split('+');
      for (let p of parts) {
        p = p.trim();
        if (!p) continue;
        // Check if starts with - (from our replace)
        const isNeg = p.startsWith('-');
        let valStr = isNeg ? p.slice(1) : p;
        if (valStr.includes('x')) {
          const numPart = valStr.replace('x', '');
          const coeff = numPart === '' ? 1 : (numPart === '.' ? 1 : parseFloat(numPart) || 1);
          tokens.push({ type: 'variable', val: isNeg ? -coeff : coeff });
        } else {
          const val = parseFloat(valStr) || 0;
          tokens.push({ type: 'number', val: isNeg ? -val : val });
        }
      }
      return tokens;
    }

    function solveQuadratic(eqStr) {
      const steps = [];
      steps.push({ label: "Given quadratic", math: eqStr, note: "Recognize quadratic form ax² + bx + c = 0." });

      // Try to match simple quadratics like x² - 4 = 0 -> x² = 4 -> x = ±2
      const clean = parseExpression(eqStr);
      // Very basic: x² - num = 0
      const match = clean.match(/x\^2\s*([+-])\s*(\d+)/);
      if (match) {
        const op = match[1] === '+' ? -parseInt(match[2]) : parseInt(match[2]);
        const num = Math.abs(op);
        const root = Math.sqrt(num);
        steps.push({ label: "Isolate x²", math: `x² = ${num}`, note: "Rearrange terms to isolate the squared variable." });
        steps.push({ label: "Take square root", math: `x = ±${root}`, note: "Apply square root to both sides, yielding two solutions." });
        return { type: 'quadratic', solution: `x = ±${root}`, steps, raw: [root, -root] };
      }

      // Another basic: x² - 4 = 0 pattern
      if (clean.includes('x²') || clean.includes('x^2')) {
        const simple = clean.replace(/[\s=0]/g, '');
        // x²-4 -> x² = 4
        if (simple.match(/x\^2-\d+/)) {
          const n = parseInt(simple.match(/-(\d+)/)[1]);
          steps.push({ label: "Rearrange", math: `x² = ${n}`, note: "Move constants to the opposite side." });
          const r = Math.sqrt(n);
          steps.push({ label: "Square root", math: `x = ±${r}`, note: "Square root of both sides." });
          return { type: 'quadratic', solution: `x = ±${r}`, steps, raw: [r, -r] };
        }
      }

      return null;
    }

    function solveSystem(str) {
      const steps = [];
      steps.push({ label: "System of equations", math: str, note: "Identify intersection by substitution or elimination." });
      // Demo case y = 2x + 1, y = x + 3 -> 2x+1 = x+3 -> x=2 -> y=5
      steps.push({ label: "Set expressions equal", math: `2x + 1 = x + 3`, note: "Substitute y and solve for x." });
      steps.push({ label: "Isolate x", math: `x = 2`, note: "Subtract x and subtract 1 from both sides." });
      steps.push({ label: "Substitute back", math: `y = 5`, note: "Insert x = 2 into either equation." });
      return { type: 'system', solution: `(x, y) = (2, 5)`, steps, raw: [2, 5] };
    }

    function solveEquation() {
      const input = document.getElementById('equation-input');
      let eqStr = input.value.trim();
      if (!eqStr) {
        shakeInput();
        return;
      }
      solverState.eq = eqStr;

      let result = null;

      // Try patterns
      if (eqStr.toLowerCase().includes('y=') || eqStr.includes(',')) {
        result = solveSystem(eqStr);
      } else if (eqStr.includes('x²') || eqStr.includes('x^2') || eqStr.includes('x2')) {
        result = solveQuadratic(eqStr);
      } else if (eqStr.includes('x') || eqStr.includes('X')) {
        result = solveLinear(eqStr);
      } else {
        // Try arithmetic
        try {
          const val = new Function('return ' + eqStr)();
          result = { type: 'arithmetic', solution: `= ${val}`, steps: [{ label: "Evaluate", math: eqStr, note: "Direct computation." }], raw: val };
        } catch (e) {
          // Fallback generic explanation
          result = { type: 'unknown', solution: "See steps", steps: [{ label: "Expression", math: eqStr, note: "Manual inspection required for non-standard forms." }], raw: null };
        }
      }

      if (!result) {
        result = { type: 'unknown', solution: "Requires manual inspection", steps: [{ label: "Expression", math: eqStr, note: "Not recognized as linear, quadratic, or arithmetic." }], raw: null };
      }

      solverState.result = result;
      renderResults(result);
    }

    function renderResults(result) {
      const area = document.getElementById('results-area');
      const empty = document.getElementById('empty-state');
      const display = document.getElementById('solution-display');
      const container = document.getElementById('steps-container');

      empty.classList.add('hidden');
      area.classList.remove('hidden');
      area.classList.add('fade-up');

      display.innerHTML = `<span class="font-display text-ink">${escapeHtml(result.solution)}</span>`;

      container.innerHTML = '';
      result.steps.forEach((s, i) => {
        const card = document.createElement('div');
        card.className = 'step-card pl-6 py-5 slide-in';
        card.style.animationDelay = `${0.1 + i * 0.08}s`;
        card.innerHTML = `
          <div class="flex items-baseline gap-4 mb-1">
            <span class="font-sans text-[10px] text-stone/60 font-bold tracking-widest uppercase w-6 shrink-0">${String(i + 1).padStart(2, '0')}</span>
            <h4 class="font-sans text-[11px] uppercase tracking-[0.15em] text-stone font-semibold">${escapeHtml(s.label)}</h4>
          </div>
          <div class="pl-10">
            <div class="font-display text-xl md:text-2xl text-ink mb-2">${formatMath(s.math)}</div>
            <p class="font-serif italic text-stone text-base leading-relaxed">${escapeHtml(s.note)}</p>
          </div>
        `;
        container.appendChild(card);
      });
    }

    function formatMath(str) {
      // Simple LaTeX-like format for display
      return str.replace(/x\^2/g, 'x²').replace(/([a-z])\*([a-z0-9])/gi, '$1 · $2');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function clearAll() {
      document.getElementById('equation-input').value = '';
      document.getElementById('results-area').classList.add('hidden');
      document.getElementById('empty-state').classList.remove('hidden');
      solverState = { eq: '', steps: [], result: '' };
    }

    function shakeInput() {
      const input = document.getElementById('equation-input');
      input.classList.add('border-red-400');
      input.style.animation = 'shake 0.4s ease';
      setTimeout(() => {
        input.classList.remove('border-red-400');
        input.style.animation = '';
      }, 400);
    }

    function loadExample(type) {
      const input = document.getElementById('equation-input');
      if (type === 'linear') input.value = '2x + 5 = 13';
      else if (type === 'quadratic') input.value = 'x² - 4 = 0';
      else if (type === 'system') input.value = 'y = 2x + 1, y = x + 3';
      solveEquation();
    }

    function buildExportString() {
      if (!solverState.result) return '';
      let out = `Equation: ${solverState.eq}\n`;
      out += `Solution: ${solverState.result.solution}\n\n`;
      out += `Steps:\n`;
      solverState.result.steps.forEach((s, i) => {
        out += `${i + 1}. ${s.label}\n   Math: ${s.math}\n   Note: ${s.note}\n`;
      });
      return out;
    }

    function exportText() {
      const text = buildExportString();
      navigator.clipboard.writeText(text).then(() => {
        const fb = document.getElementById('export-feedback');
        fb.textContent = 'Copied to clipboard.';
        fb.style.opacity = '1';
        setTimeout(() => fb.style.opacity = '0', 2000);
      });
    }

    function exportJSON() {
      const data = {
        equation: solverState.eq,
        type: solverState.result?.type || 'unknown',
        solution: solverState.result?.solution || '',
        steps: solverState.result?.steps || []
      };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'equation-solution.json';
      a.click();
      URL.revokeObjectURL(url);
    }

    function printResult() {
      window.print();
    }

    // Keyboard shortcut
    document.getElementById('equation-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) {
        e.preventDefault();
        solveEquation();
      }
    });
  </script>
</body>
</html>
