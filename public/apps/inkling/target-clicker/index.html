<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Target Clicker — Challenge</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Orbitron', 'sans-serif'],
            body: ['Inter', 'sans-serif'],
          },
          colors: {
            neon: {
              pink: '#ff2a6d',
              cyan: '#05f8f8',
              lime: '#ccff00',
              violet: '#a855f7',
              amber: '#ffb347',
            }
          }
        }
      }
    }
  </script>
  <style>
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #fdfcfb 0%, #e2e8f0 50%, #dbeafe 100%);
      background-size: 400% 400%;
      animation: bgShift 20s ease infinite;
    }
    @keyframes bgShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .glass {
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(18px) saturate(1.3);
      -webkit-backdrop-filter: blur(18px) saturate(1.3);
      border: 1px solid rgba(255,255,255,0.3);
    }
    .glass-dark {
      background: rgba(15,20,35,0.6);
      backdrop-filter: blur(22px) saturate(1.2);
      -webkit-backdrop-filter: blur(22px) saturate(1.2);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .target-ring {
      position: absolute;
      border-radius: 50%;
      pointer-events: auto;
      cursor: crosshair;
      will-change: transform, opacity;
      box-shadow:
        0 0 20px currentColor,
        0 0 60px currentColor,
        inset 0 0 12px rgba(255,255,255,0.4);
    }
    .target-ring::before {
      content: '';
      position: absolute;
      inset: 22%;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9), transparent 60%);
      opacity: 0.7;
    }
    .target-ring::after {
      content: '';
      position: absolute;
      inset: 10%;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.35);
    }

    @keyframes spawnPop {
      0% { transform: scale(0) rotate(-12deg); opacity: 0; }
      40% { transform: scale(1.15) rotate(6deg); opacity: 1; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 20px currentColor, 0 0 60px currentColor; }
      50% { box-shadow: 0 0 40px currentColor, 0 0 90px currentColor; }
    }
    @keyframes floatUp {
      0% { transform: translateY(0) scale(1); opacity: 0.8; }
      100% { transform: translateY(-60px) scale(1.1); opacity: 0; }
    }
    .score-float {
      animation: floatUp 0.9s ease-out forwards;
      pointer-events: none;
    }

    .progress-bar-fill {
      transition: width 0.15s linear;
    }
  </style>
</head>
<body class="text-slate-800 relative h-screen w-screen select-none">

  <!-- Background decorative blobs -->
  <div aria-hidden="true" class="fixed inset-0 overflow-hidden pointer-events-none z-0">
    <div class="absolute -top-[20%] -left-[10%] w-[70vw] h-[70vw] rounded-full bg-gradient-to-br from-rose-200 to-rose-50 opacity-70 blur-3xl"></div>
    <div class="absolute -bottom-[15%] -right-[10%] w-[60vw] h-[60vw] rounded-full bg-gradient-to-tl from-sky-200 to-indigo-50 opacity-70 blur-3xl"></div>
  </div>

  <!-- Game Area -->
  <main id="gameArea" class="relative z-10 w-full h-full overflow-hidden"></main>

  <!-- HUD -->
  <header class="fixed top-0 left-0 right-0 z-50 p-5 flex items-center justify-between pointer-events-none">
    <div class="glass rounded-2xl px-5 py-3 shadow-xl pointer-events-auto">
      <div class="flex items-center gap-3">
        <div class="w-3 h-3 rounded-full bg-rose-500 animate-pulse shadow-[0_0_8px_#f43f5e]"></div>
        <span class="text-xs font-semibold uppercase tracking-widest text-slate-400">Score</span>
        <span id="scoreEl" class="font-display text-2xl font-bold text-slate-900 tracking-tight leading-none">0</span>
      </div>
    </div>

    <div class="glass-dark rounded-2xl px-6 py-3 shadow-2xl pointer-events-auto flex items-center gap-4">
      <div class="text-center">
        <span class="block text-[10px] uppercase tracking-widest text-slate-400">Time</span>
        <span id="timerEl" class="font-display text-xl font-bold text-white leading-none">20.0</span>
      </div>
      <div class="w-px h-8 bg-white/10"></div>
      <div class="text-center">
        <span class="block text-[10px] uppercase tracking-widest text-slate-400">Hits</span>
        <span id="hitsEl" class="font-display text-xl font-bold text-emerald-300 leading-none">0</span>
      </div>
      <div class="w-px h-8 bg-white/10"></div>
      <div class="text-center">
        <span class="block text-[10px] uppercase tracking-widest text-slate-400">Misses</span>
        <span id="missesEl" class="font-display text-xl font-bold text-rose-300 leading-none">0</span>
      </div>
    </div>
  </header>

  <!-- Center overlay: Countdown / End -->
  <div id="centerOverlay" class="fixed inset-0 z-[60] flex items-center justify-center pointer-events-none">
    <div id="overlayCard" class="glass-dark rounded-[2rem] px-10 py-10 text-center shadow-[0_40px_80px_-20px_rgba(0,0,0,0.35)] max-w-md w-full mx-4 scale-0 opacity-0 transition-all duration-500 ease-[cubic-bezier(0.22,1,0.36,1)]">
      <h2 id="overlayTitle" class="font-display text-4xl md:text-5xl font-black text-white mb-2 tracking-tight">Ready?</h2>
      <p id="overlaySubtitle" class="text-slate-300 text-sm md:text-base mb-6">Hit every glowing target before it fades.</p>
      <button id="startBtn" onclick="startGame()" class="pointer-events-auto inline-flex items-center gap-2 px-8 py-3.5 rounded-full bg-gradient-to-r from-rose-500 via-fuchsia-500 to-cyan-500 text-white font-display font-bold text-lg shadow-[0_10px_30px_-10px_rgba(244,63,94,0.6)] hover:shadow-[0_20px_40px_-10px_rgba(244,63,94,0.8)] hover:-translate-y-0.5 transition-all active:translate-y-0">
        Start Challenge
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
      </button>
    </div>
  </div>

  <!-- Progress bar -->
  <div class="fixed bottom-6 left-6 right-6 z-40 flex items-end gap-4 pointer-events-none">
    <div class="glass rounded-full h-2.5 w-full overflow-hidden shadow-lg shadow-slate-200/40">
      <div id="progressBar" class="progress-bar-fill h-full rounded-full bg-gradient-to-r from-rose-400 via-amber-300 to-emerald-400 shadow-[0_0_12px_rgba(244,63,94,0.5)]" style="width: 100%"></div>
    </div>
  </div>

  <script>
    // Audio context for pleasant feedback sounds
    let audioCtx = null;
    function initAudio() {
      if (!audioCtx) {
        try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        catch { audioCtx = null; }
      }
      if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playSound(type) {
      if (!audioCtx) return;
      try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        const now = audioCtx.currentTime;
        if (type === 'hit') {
          osc.type = 'sine';
          osc.frequency.setValueAtTime(880, now);
          osc.frequency.exponentialRampToValueAtTime(1200, now + 0.15);
          gain.gain.setValueAtTime(0.15, now);
          gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
          osc.start(now);
          osc.stop(now + 0.3);
        } else if (type === 'miss') {
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(250, now);
          osc.frequency.linearRampToValueAtTime(80, now + 0.2);
          gain.gain.setValueAtTime(0.1, now);
          gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
          osc.start(now);
          osc.stop(now + 0.4);
        } else if (type === 'end') {
          osc.type = 'sine';
          osc.frequency.setValueAtTime(440, now);
          osc.frequency.setValueAtTime(554, now + 0.2);
          osc.frequency.setValueAtTime(660, now + 0.4);
          gain.gain.setValueAtTime(0.12, now);
          gain.gain.linearRampToValueAtTime(0.01, now + 0.8);
          osc.start(now);
          osc.stop(now + 0.9);
        }
      } catch (e) {}
    }

    const colors = [
      '#ff2a6d', '#05f8f8', '#ccff00', '#a855f7', '#ffb347', '#00ffa3', '#ff4d6d', '#7c3aed'
    ];
    const area = document.getElementById('gameArea');
    let score = 0, hits = 0, misses = 0, active = false, timerInterval = null, spawnInterval = null;
    const GAME_DURATION = 20; // seconds
    let timeLeft = GAME_DURATION;

    function setOverlay(title, subtitle, btnText, btnVisible) {
      document.getElementById('overlayTitle').textContent = title;
      document.getElementById('overlaySubtitle').textContent = subtitle;
      const btn = document.getElementById('startBtn');
      btn.innerHTML = (btnVisible ? btnText : '') + (btnVisible ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>' : '');
      btn.style.display = btnVisible ? 'inline-flex' : 'none';
      const card = document.getElementById('overlayCard');
      card.classList.remove('scale-0', 'opacity-0');
      card.classList.add('scale-100', 'opacity-100');
    }

    function spawnTarget() {
      if (!active) return;
      const color = colors[Math.floor(Math.random() * colors.length)];
      const size = 50 + Math.random() * 60; // 50-110px
      const lifetime = 800 + Math.random() * 1200; // 0.8 - 2.0s
      const x = Math.random() * (window.innerWidth - size - 40) + 20;
      const y = Math.random() * (window.innerHeight - size - 160) + 120; // keep below HUD

      const el = document.createElement('button');
      el.className = 'target-ring';
      el.style.width = size + 'px';
      el.style.height = size + 'px';
      el.style.left = x + 'px';
      el.style.top = y + 'px';
      el.style.color = color;
      el.style.animation = `spawnPop 0.35s ease-out, pulseGlow 2s ease-in-out infinite`;
      el.style.zIndex = 20 + Math.floor(Math.random() * 10);
      el.innerHTML = '<div style="position:absolute;inset:28%;border-radius:50%;border:2px solid rgba(255,255,255,0.35);"></div>';
      el.setAttribute('aria-label', 'Target');

      // Score value based on size (smaller = more points)
      const points = Math.round((140 - size) / 2) + 5;

      el.addEventListener('click', (e) => {
        e.stopPropagation();
        if (!active || el.dataset.hit === '1') return;
        el.dataset.hit = '1';
        hits++;
        score += points;
        playSound('hit');
        document.getElementById('hitsEl').textContent = hits;
        document.getElementById('scoreEl').textContent = score;

        // Float score indicator
        const float = document.createElement('div');
        float.className = 'absolute font-display font-black text-xl text-white drop-shadow-lg score-float';
        float.textContent = '+' + points;
        float.style.left = (e.clientX - 20) + 'px';
        float.style.top = (e.clientY - 30) + 'px';
        float.style.color = color;
        float.style.textShadow = `0 2px 12px ${color}`;
        area.appendChild(float);
        setTimeout(() => float.remove(), 900);

        // Explode animation
        el.style.transition = 'all 0.25s cubic-bezier(0.22,1,0.36,1)';
        el.style.transform = 'scale(0) rotate(180deg)';
        el.style.opacity = '0';
        setTimeout(() => el.remove(), 280);
      });

      area.appendChild(el);

      // Auto-remove after lifetime (miss)
      setTimeout(() => {
        if (el.isConnected && el.dataset.hit !== '1') {
          misses++;
          document.getElementById('missesEl').textContent = misses;
          playSound('miss');
          el.style.transition = 'all 0.5s ease-out';
          el.style.transform = 'scale(1.3)';
          el.style.opacity = '0';
          setTimeout(() => el.remove(), 500);
        }
      }, lifetime);
    }

    function startGame() {
      initAudio();
      active = true;
      score = 0; hits = 0; misses = 0; timeLeft = GAME_DURATION;
      document.getElementById('scoreEl').textContent = '0';
      document.getElementById('hitsEl').textContent = '0';
      document.getElementById('missesEl').textContent = '0';
      document.getElementById('timerEl').textContent = timeLeft.toFixed(1);
      document.getElementById('progressBar').style.width = '100%';
      setOverlay('', '', '', false);
      document.getElementById('overlayCard').classList.remove('scale-100', 'opacity-100');
      document.getElementById('overlayCard').classList.add('scale-0', 'opacity-0');

      // Clear existing targets
      document.querySelectorAll('.target-ring').forEach(t => t.remove());

      spawnInterval = setInterval(spawnTarget, 450);
      timerInterval = setInterval(() => {
        timeLeft -= 0.1;
        document.getElementById('timerEl').textContent = Math.max(0, timeLeft).toFixed(1);
        document.getElementById('progressBar').style.width = ((timeLeft / GAME_DURATION) * 100) + '%';
        if (timeLeft <= 0) endGame();
      }, 100);
    }

    function endGame() {
      active = false;
      clearInterval(spawnInterval);
      clearInterval(timerInterval);
      playSound('end');
      // Remove targets smoothly
      document.querySelectorAll('.target-ring').forEach(t => {
        t.style.transition = 'all 0.4s ease-out';
        t.style.transform = 'scale(0)';
        t.style.opacity = '0';
        setTimeout(() => t.remove(), 400);
      });

      const totalTargets = hits + misses;
      const accuracy = totalTargets > 0 ? Math.round((hits / totalTargets) * 100) : 0;
      const avgPoints = hits > 0 ? (score / hits).toFixed(1) : '0';

      setTimeout(() => {
        setOverlay(
          `Game Over`,
          `Accuracy: ${accuracy}% · Avg points: ${avgPoints}`,
          'Play Again',
          true
        );
        document.getElementById('startBtn').onclick = () => {
          startGame();
        };
      }, 600);
    }

    // Handle resize
    window.addEventListener('resize', () => {});

    // Initial ready state
    setTimeout(() => {
      setOverlay('Target Clicker', '20 seconds · Click glowing targets', 'Start Challenge', true);
    }, 300);
  </script>
</body>
</html>
