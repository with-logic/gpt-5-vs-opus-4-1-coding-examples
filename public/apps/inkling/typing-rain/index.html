<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Typing Rain</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300;1,600&family=JetBrains+Mono:wght@300;400;700&family=Outfit:wght@200;300;500;800&display=swap" rel="stylesheet">
  <style>
    @keyframes rainFall {
      0% { transform: translateY(-120px) translateX(0) rotate(0deg); opacity: 0.85; }
      50% { opacity: 0.4; }
      100% { transform: translateY(110vh) translateX(-20px) rotate(2deg); opacity: 0; }
    }
    @keyframes dropFall {
      0% { transform: translateY(-20px) translateX(0); opacity: 0.7; }
      100% { transform: translateY(110vh) translateX(var(--drift, 10px)); opacity: 0; }
    }
    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    @keyframes glowPulse {
      0%, 100% { text-shadow: 0 0 20px rgba(255,255,255,0.15), 0 0 60px rgba(139,92,246,0.25); }
      50% { text-shadow: 0 0 30px rgba(255,255,255,0.25), 0 0 80px rgba(139,92,246,0.4); }
    }
    @keyframes cityParallax {
      0% { transform: translateY(0); }
      100% { transform: translateY(10px); }
    }
    .rain-word {
      position: absolute;
      font-family: 'JetBrains Mono', monospace;
      pointer-events: none;
      user-select: none;
      white-space: nowrap;
      animation: rainFall linear forwards;
      will-change: transform, opacity;
      filter: blur(0.5px);
      letter-spacing: 0.02em;
    }
    .rain-drop {
      position: absolute;
      width: 2px;
      height: 24px;
      background: linear-gradient(to bottom, rgba(255,255,255,0.15), rgba(255,255,255,0));
      border-radius: 1px;
      animation: dropFall linear infinite;
    }
    body {
      font-family: 'Outfit', sans-serif;
      background: linear-gradient(180deg, #0a0e17 0%, #0f1323 30%, #1a1038 60%, #2a0a4a 85%, #1a0525 100%);
      overflow: hidden;
      color: #e8e0f0;
    }
    .glass-panel {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      backdrop-filter: blur(24px) saturate(120%);
      -webkit-backdrop-filter: blur(24px) saturate(120%);
    }
    input[type="text"] {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      color: #f0e8ff;
      caret-color: #b388ff;
      box-shadow: 0 0 30px rgba(139,92,246,0.08), inset 0 0 20px rgba(139,92,246,0.03);
    }
    input[type="text"]::placeholder {
      color: rgba(255,255,255,0.2);
    }
    input[type="text"]:focus {
      border-color: rgba(139,92,246,0.3);
      box-shadow: 0 0 40px rgba(139,92,246,0.15), inset 0 0 20px rgba(139,92,246,0.05);
      outline: none;
    }
    .city-silhouette path {
      fill: linear-gradient(to top, #050814, #0a0e1a 60%, transparent);
      opacity: 0.9;
    }
    .word-glow {
      text-shadow: 0 0 12px rgba(255,255,255,0.12), 0 0 30px rgba(155,135,245,0.3);
    }
    .gradient-text {
      background: linear-gradient(90deg, #e8d5ff, #b388ff, #7ec8e3, #e8d5ff);
      background-size: 300% auto;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 6s linear infinite;
    }
  </style>
</head>
<body class="h-screen w-full flex flex-col items-center justify-between relative">

  <!-- Background atmospheric gradient layers -->
  <div class="absolute inset-0 pointer-events-none z-0" style="background: radial-gradient(ellipse at 50% 10%, rgba(139,92,246,0.12) 0%, transparent 60%), radial-gradient(ellipse at 20% 90%, rgba(66,153,225,0.08) 0%, transparent 50%);"></div>

  <!-- Falling rain drops (decorative) -->
  <div id="rainDrops" class="absolute inset-0 pointer-events-none z-[1] overflow-hidden"></div>

  <!-- Main Game Area -->
  <main class="relative z-10 flex-1 flex flex-col items-center justify-center w-full px-8">
    <!-- Header / Stats -->
    <header class="w-full max-w-6xl mx-auto flex items-start justify-between pt-6 mb-12">
      <div>
        <h1 class="text-5xl md:text-7xl font-extrabold tracking-tight gradient-text leading-none mb-2" style="font-family:'Cormorant Garamond', serif; text-shadow: 0 0 60px rgba(139,92,246,0.3);">Typing Rain</h1>
        <p class="text-white/20 text-sm tracking-[0.3em] uppercase font-light" style="font-family:'JetBrains Mono', monospace;">Type before the storm reaches you</p>
      </div>
      <div class="glass-panel rounded-2xl px-6 py-4 text-right shadow-[0_0_60px_rgba(0,0,0,0.3)]">
        <div class="text-[10px] uppercase tracking-widest text-white/30 mb-1">Score</div>
        <div id="scoreDisplay" class="text-3xl font-bold text-white tracking-tight" style="font-family:'JetBrains Mono', monospace;">0</div>
        <div class="flex gap-4 mt-2 text-xs text-white/40">
          <span id="accuracyDisplay">Acc: --</span>
          <span id="streakDisplay">Streak: 0</span>
        </div>
      </div>
    </header>

    <!-- Active target word display -->
    <div id="targetArea" class="relative mb-20 text-center min-h-[120px] flex items-center justify-center">
      <div id="currentTarget" class="text-6xl md:text-8xl font-light tracking-tight text-white/90 word-glow opacity-30 scale-95 blur-sm transition-all duration-300" style="font-family:'Cormorant Garamond', serif;">rain</div>
    </div>
  </main>

  <!-- Input Area -->
  <section class="relative z-20 w-full max-w-2xl mx-auto px-6 pb-12">
    <div class="glass-panel rounded-3xl px-2 py-2 shadow-[0_20px_60px_rgba(0,0,0,0.4), 0_0_0_1px_rgba(255,255,255,0.05)] flex items-center gap-4 backdrop-blur-2xl">
      <input id="typeInput" type="text" autocomplete="off" spellcheck="false" class="flex-1 bg-transparent border-none rounded-2xl px-6 py-5 text-xl md:text-2xl font-light tracking-wide focus:outline-none placeholder:text-white/10 transition-all duration-300" placeholder="type here..." style="font-family:'JetBrains Mono', monospace;">
      <div id="feedback" class="text-xs font-medium tracking-wide uppercase px-3 py-1 rounded-full opacity-0 transition-all duration-200" style="font-family:'JetBrains Mono', monospace;"></div>
    </div>
    <div class="flex justify-between mt-3 px-2 text-[10px] text-white/20 tracking-[0.2em] uppercase" style="font-family:'JetBrains Mono', monospace;">
      <span>Difficulty <span id="levelDisplay" class="text-white/40">1</span></span>
      <span>Words <span id="wordsTyped" class="text-white/40">0</span></span>
    </div>
  </section>

  <!-- City Skyline -->
  <footer class="absolute bottom-0 left-0 right-0 z-0 pointer-events-none overflow-hidden h-[35vh]">
    <svg viewBox="0 0 1440 400" preserveAspectRatio="none" class="w-full h-full opacity-80">
      <defs>
        <linearGradient id="cityGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#0a0e1a" stop-opacity="0.6"/>
          <stop offset="100%" stop-color="#050814" stop-opacity="0.95"/>
        </linearGradient>
      </defs>
      <g class="city-silhouette" fill="url(#cityGrad)">
        <!-- Distant buildings -->
        <rect x="40" y="220" width="60" height="180" opacity="0.3"/>
        <rect x="120" y="160" width="80" height="240" opacity="0.45"/>
        <rect x="220" y="200" width="40" height="200" opacity="0.35"/>
        <rect x="280" y="140" width="100" height="260" opacity="0.55"/>
        <rect x="400" y="190" width="70" height="210" opacity="0.4"/>
        <rect x="490" y="130" width="90" height="270" opacity="0.6"/>
        <rect x="600" y="180" width="50" height="220" opacity="0.3"/>
        <rect x="670" y="150" width="110" height="250" opacity="0.5"/>
        <rect x="800" y="210" width="60" height="190" opacity="0.35"/>
        <rect x="880" y="120" width="120" height="280" opacity="0.65"/>
        <rect x="1020" y="170" width="80" height="230" opacity="0.45"/>
        <rect x="1120" y="140" width="100" height="260" opacity="0.55"/>
        <rect x="1240" y="200" width="50" height="200" opacity="0.3"/>
        <rect x="1310" y="160" width="70" height="240" opacity="0.45"/>
        <rect x="1400" y="220" width="40" height="180" opacity="0.25"/>
      </g>
    </svg>
  </footer>

  <!-- Game Over Overlay -->
  <div id="gameOverOverlay" class="fixed inset-0 z-[50] bg-black/60 backdrop-blur-md flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-700">
    <div class="glass-panel rounded-3xl p-10 text-center max-w-md shadow-[0_40px_100px_rgba(0,0,0,0.6)] scale-95 transition-transform duration-500" id="gameOverPanel">
      <h2 class="text-5xl font-extrabold text-white mb-2 tracking-tight" style="font-family:'Cormorant Garamond', serif;">Storm Over</h2>
      <p class="text-white/30 text-sm mb-8 tracking-[0.2em] uppercase">The rain won this time</p>
      <div class="grid grid-cols-3 gap-4 mb-8">
        <div class="rounded-xl bg-white/[0.03] p-3">
          <div class="text-[10px] text-white/20 uppercase mb-1">Score</div>
          <div id="finalScore" class="text-xl font-bold text-white">0</div>
        </div>
        <div class="rounded-xl bg-white/[0.03] p-3">
          <div class="text-[10px] text-white/20 uppercase mb-1">Words</div>
          <div id="finalWords" class="text-xl font-bold text-white">0</div>
        </div>
        <div class="rounded-xl bg-white/[0.03] p-3">
          <div class="text-[10px] text-white/20 uppercase mb-1">Accuracy</div>
          <div id="finalAcc" class="text-xl font-bold text-white">--</div>
        </div>
      </div>
      <button onclick="resetGame()" class="w-full py-4 rounded-2xl bg-gradient-to-r from-violet-600/40 to-indigo-600/40 border border-white/10 text-white font-medium tracking-wide hover:from-violet-600/60 hover:to-indigo-600/60 transition-all shadow-[0_0_30px_rgba(139,92,246,0.2)]">Play Again</button>
    </div>
  </div>

  <script>
    // Game state
    const wordBank = [
      "rain","storm","cloud","wind","thunder","lightning","drop","pour","mist","fog",
      "drizzle","torrent","spray","splash","puddle","flood","river","stream","lake","ocean",
      "wave","tide","current","flow","ripple","surf","foam","spray","spray","spindrift",
      "shimmer","glitter","glow","flicker","flash","spark","glint","gleam","shine","radiance",
      "dawn","dusk","night","twilight","midnight","noon","morning","evening","sunrise","sunset",
      "horizon","skyline","peak","summit","valley","canyon","ravine","gorge","cliff","ledge",
      "shadow","silhouette","outline","profile","figure","form","shape","curve","arch","spire",
      "temple","tower","spire","dome","arch","column","pillar","bridge","archway","gateway","arch"
    ];
    const longWords = ["thunderstorm","downpour","torrential","lightning","atmosphere","precipitation","meteorological","hydrological","cumulonimbus","stratocumulus","nimbostratus","evaporation","condensation","sublimation","transpiration","precipitation","intermittent","torrential"];
    
    let score = 0;
    let wordsTyped = 0;
    let correctWords = 0;
    let streak = 0;
    let maxStreak = 0;
    let difficulty = 1;
    let activeWords = [];
    let targetWordObj = null;
    let isGameOver = false;
    let gameStarted = false;
    let lastSpawnTime = 0;

    const input = document.getElementById('typeInput');
    const currentTargetEl = document.getElementById('currentTarget');
    const rainDropsContainer = document.getElementById('rainDrops');
    
    // Initialize decorative rain
    for (let i = 0; i < 120; i++) {
      const drop = document.createElement('div');
      drop.className = 'rain-drop';
      drop.style.left = Math.random() * 100 + '%';
      drop.style.animationDuration = (0.4 + Math.random() * 0.8) + 's';
      drop.style.animationDelay = (Math.random() * 2) + 's';
      drop.style.top = Math.random() * 100 + '%';
      drop.style.height = (15 + Math.random() * 40) + 'px';
      drop.style.opacity = 0.1 + Math.random() * 0.3;
      rainDropsContainer.appendChild(drop);
    }

    function getWordPool() {
      const pool = [...wordBank];
      if (difficulty >= 2) pool.push(...longWords);
      if (difficulty >= 4) pool.push("atmospheric","precipitation","meteorological","hydrometeor","cumulonimbus","nimbostratus","intermittent","torrential","hydrological","evaporative");
      return pool;
    }

    function spawnWord() {
      if (isGameOver) return;
      const pool = getWordPool();
      const text = pool[Math.floor(Math.random() * pool.length)];
      const duration = Math.max(4.5 - difficulty * 0.35, 1.8);
      const el = document.createElement('div');
      el.className = 'rain-word';
      el.textContent = text;
      
      const fontSize = 18 + Math.random() * 30 + (difficulty * 2);
      const left = Math.random() * 85 + 5;
      const hue = 230 + Math.random() * 80; // purple/blue range
      el.style.left = left + '%';
      el.style.fontSize = fontSize + 'px';
      el.style.color = `hsl(${hue}, 65%, 85%)`;
      el.style.animationDuration = duration + 's';
      el.style.animationName = 'rainFall';
      el.style.top = '-60px';
      el.style.opacity = 0.75 + Math.random() * 0.2;
      
      const wordObj = {
        el: el,
        text: text,
        position: { y: 0 },
        duration: duration,
        speed: 1 / duration,
        active: true
      };
      
      document.body.appendChild(el);
      activeWords.push(wordObj);
    }

    function spawnTarget() {
      if (targetWordObj && targetWordObj.active) return;
      const pool = getWordPool();
      const text = pool[Math.floor(Math.random() * pool.length)];
      targetWordObj = {
        text: text,
        el: currentTargetEl,
        active: true,
        startTime: Date.now()
      };
      currentTargetEl.textContent = text;
      currentTargetEl.style.opacity = '0.9';
      currentTargetEl.style.filter = 'blur(0px)';
      currentTargetEl.style.transform = 'scale(1)';
    }

    function updateDifficulty() {
      difficulty = Math.min(10, 1 + Math.floor(score / 300));
      document.getElementById('levelDisplay').textContent = difficulty;
    }

    function handleInput(e) {
      if (isGameOver) return;
      if (!gameStarted) {
        gameStarted = true;
        lastSpawnTime = Date.now();
      }
      
      const val = input.value.trim();
      if (!val) return;
      
      // Check against current target word
      if (targetWordObj && targetWordObj.active) {
        const target = targetWordObj.text.toLowerCase();
        if (val.toLowerCase() === target) {
          score += 10 * difficulty;
          wordsTyped++;
          correctWords++;
          streak++;
          maxStreak = Math.max(maxStreak, streak);
          input.value = '';
          
          // Visual feedback
          currentTargetEl.style.color = '#a78bfa';
          currentTargetEl.style.textShadow = '0 0 40px #a78bfa';
          setTimeout(() => {
            currentTargetEl.style.color = 'rgba(255,255,255,0.9)';
            currentTargetEl.style.textShadow = '0 0 12px rgba(255,255,255,0.12), 0 0 30px rgba(155,135,245,0.3)';
          }, 200);
          
          targetWordObj.active = false;
          spawnTarget();
          updateUI();
        } else {
          streak = 0;
        }
      }
      
      // Check against falling words (partial or full match)
      for (let i = activeWords.length - 1; i >= 0; i--) {
        const w = activeWords[i];
        if (!w.active) continue;
        
        if (val.toLowerCase() === w.text.toLowerCase()) {
          score += 25 * difficulty;
          wordsTyped++;
          correctWords++;
          streak++;
          maxStreak = Math.max(maxStreak, streak);
          w.active = false;
          
          // Animate removal
          w.el.style.transition = 'all 0.3s ease-out';
          w.el.style.transform = 'translateY(-30px) scale(1.3)';
          w.el.style.opacity = '0';
          w.el.style.color = '#c084fc';
          
          setTimeout(() => {
            if (w.el.parentNode) w.el.parentNode.removeChild(w.el);
          }, 300);
          
          activeWords.splice(i, 1);
          input.value = '';
          updateUI();
          break;
        }
      }
    }

    function updateUI() {
      document.getElementById('scoreDisplay').textContent = score.toLocaleString();
      document.getElementById('wordsTyped').textContent = wordsTyped;
      document.getElementById('streakDisplay').textContent = 'Streak: ' + streak;
      const acc = wordsTyped > 0 ? Math.round((correctWords / wordsTyped) * 100) : 0;
      document.getElementById('accuracyDisplay').textContent = 'Acc: ' + acc + '%';
      updateDifficulty();
    }

    function checkGameOver() {
      // End game if any active falling word reaches bottom
      for (let w of activeWords) {
        if (w.active && w.el) {
          const rect = w.el.getBoundingClientRect();
          if (rect.top > window.innerHeight - 100) {
            endGame();
            return;
          }
        }
      }
      
      // Also check target word timer
      if (targetWordObj && targetWordObj.active) {
        const elapsed = Date.now() - targetWordObj.startTime;
        if (elapsed > 5000 + (difficulty * 300)) {
          // Missed target
          streak = 0;
          targetWordObj.active = false;
          spawnTarget();
          updateUI();
        }
      }
    }

    function endGame() {
      isGameOver = true;
      document.getElementById('finalScore').textContent = score.toLocaleString();
      document.getElementById('finalWords').textContent = wordsTyped;
      const acc = wordsTyped > 0 ? Math.round((correctWords / wordsTyped) * 100) : 0;
      document.getElementById('finalAcc').textContent = acc + '%';
      
      const overlay = document.getElementById('gameOverOverlay');
      const panel = document.getElementById('gameOverPanel');
      overlay.style.opacity = '1';
      overlay.style.pointerEvents = 'auto';
      panel.style.transform = 'scale(1)';
    }

    function resetGame() {
      score = 0;
      wordsTyped = 0;
      correctWords = 0;
      streak = 0;
      maxStreak = 0;
      difficulty = 1;
      activeWords = [];
      targetWordObj = null;
      isGameOver = false;
      gameStarted = false;
      input.value = '';
      
      // Remove all falling words
      document.querySelectorAll('.rain-word').forEach(el => el.remove());
      
      const overlay = document.getElementById('gameOverOverlay');
      const panel = document.getElementById('gameOverPanel');
      overlay.style.opacity = '0';
      overlay.style.pointerEvents = 'none';
      panel.style.transform = 'scale(0.95)';
      
      spawnTarget();
      updateUI();
    }

    // Main loop
    let spawnInterval = 1200;
    function gameLoop() {
      if (!isGameOver && gameStarted) {
        const now = Date.now();
        if (now - lastSpawnTime > spawnInterval) {
          spawnWord();
          lastSpawnTime = now;
          spawnInterval = Math.max(450, 1200 - difficulty * 90);
        }
        checkGameOver();
      }
      requestAnimationFrame(gameLoop);
    }

    // Start
    spawnTarget();
    requestAnimationFrame(gameLoop);
    input.addEventListener('input', handleInput);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleInput();
    });
    input.focus();
  </script>
</body>
</html>
