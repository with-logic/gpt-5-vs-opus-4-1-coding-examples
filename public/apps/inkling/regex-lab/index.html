<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Regex Lab — Pattern Playground</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            ink: '#0b0c0f',
            paper: '#f0ede4',
            amber: '#f59e0b',
            lime: '#84cc16',
            cyan: '#22d3ee',
            rose: '#f43f5e',
            slate: '#94a3b8',
            surface: '#0f1115',
            surface2: '#16181f',
            surface3: '#1c1f2a',
          },
          fontFamily: {
            mono: ['"Fira Code"', '"JetBrains Mono"', 'monospace'],
            sans: ['system-ui', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;600;700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --shadow-color: rgba(245,158,11,0.08); }
    html { scrollbar-color: #334155 #0b0c0f; }
    body { font-family: 'Outfit', system-ui, sans-serif; background: #0b0c0f; color: #e2e8f0; }
    ::selection { background: rgba(245,158,11,0.25); color: #fff; }
    .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.06); }
    .glass:hover { border-color: rgba(255,255,255,0.12); }
    .code-font { font-family: 'Fira Code', 'JetBrains Mono', monospace; }
    .terminal-shadow { box-shadow: 0 0 0 1px rgba(245,158,11,0.08), 0 20px 60px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.03); }
    .match-0 { background: rgba(245,158,11,0.18); color: #fff; border-radius: 2px; padding: 0 1px; }
    .match-1 { background: rgba(132,204,22,0.18); color: #fff; border-radius: 2px; padding: 0 1px; }
    .match-2 { background: rgba(34,211,238,0.18); color: #fff; border-radius: 2px; padding: 0 1px; }
    .match-3 { background: rgba(244,63,94,0.18); color: #fff; border-radius: 2px; padding: 0 1px; }
    .match-4 { background: rgba(168,85,247,0.18); color: #fff; border-radius: 2px; padding: 0 1px; }
    .match-5 { background: rgba(251,146,60,0.18); color: #fff; border-radius: 2px; padding: 0 1px; }
    .match-6 { background: rgba(52,211,153,0.18); color: #fff; border-radius: 2px; padding: 0 1px; }
    .match-7 { background: rgba(250,204,21,0.18); color: #fff; border-radius: 2px; padding: 0 1px; }
    .scrollbar-thin::-webkit-scrollbar { height: 6px; width: 6px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    .scrollbar-thin::-webkit-scrollbar-thumb:hover { background: #475569; }
    .pulse-once { animation: pulseOnce 0.5s ease; }
    @keyframes pulseOnce { 0% { box-shadow: 0 0 0 0 rgba(245,158,11,0.4); } 50% { box-shadow: 0 0 0 8px rgba(245,158,11,0); } 100% { box-shadow: 0 0 0 0 rgba(245,158,11,0); } }
    input, textarea { caret-color: #f59e0b; }
    .token { font-family: 'Fira Code', monospace; letter-spacing: -0.01em; }
  </style>
</head>
<body class="min-h-screen flex flex-col">

  <!-- Background ambient -->
  <div aria-hidden="true" class="fixed inset-0 pointer-events-none">
    <div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vh] rounded-full opacity-30 bg-amber-500 blur-[120px]"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[40vw] h-[50vh] rounded-full opacity-20 bg-cyan-500 blur-[120px]"></div>
  </div>

  <!-- Header -->
  <header class="relative z-10 border-b border-white/5 bg-ink/60 backdrop-blur-md">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-amber-400 to-rose-500 flex items-center justify-center shadow-lg shadow-amber-500/20">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4l8 8-8 8m8-12l8 8"/></svg>
        </div>
        <div>
          <h1 class="text-xl font-bold tracking-tight leading-none">Regex Lab</h1>
          <p class="text-[11px] text-slate font-medium tracking-wide uppercase">Pattern Playground</p>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <button onclick="copyPermalink()" class="group relative inline-flex items-center gap-2 px-3 py-2 rounded-lg text-xs font-semibold bg-surface2 border border-white/10 hover:border-amber-400/60 hover:text-amber-400 transition shadow-inner" title="Copy permalink">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
          <span id="copy-label">Share</span>
        </button>
        <button onclick="clearAll()" class="inline-flex items-center gap-2 px-3 py-2 rounded-lg text-xs font-semibold bg-surface2 border border-white/10 hover:border-rose-400/60 hover:text-rose-400 transition shadow-inner" title="Clear all">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
          Clear
        </button>
        <button onclick="toggleTheme()" class="inline-flex items-center gap-2 px-3 py-2 rounded-lg text-xs font-semibold bg-surface2 border border-white/10 hover:border-cyan-400/60 hover:text-cyan-400 transition shadow-inner" title="Toggle theme">
          <svg id="theme-icon" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
          Theme
        </button>
      </div>
    </div>
  </header>

  <main class="relative z-10 flex-1 max-w-6xl mx-auto w-full px-6 py-8 grid grid-cols-1 lg:grid-cols-12 gap-6">

    <!-- LEFT: Inputs -->
    <section class="lg:col-span-5 space-y-5">

      <!-- Pattern -->
      <div class="glass rounded-2xl p-5 terminal-shadow relative overflow-hidden">
        <div class="absolute top-0 left-0 right-0 h-px bg-gradient-to-r from-transparent via-amber-400/40 to-transparent"></div>
        <div class="flex items-center justify-between mb-3">
          <label for="pattern" class="text-[11px] font-bold uppercase tracking-wider text-amber-400">Pattern</label>
          <span id="error-badge" class="hidden text-[10px] font-bold px-2 py-0.5 rounded-full bg-rose-500/10 text-rose-400 border border-rose-500/20">Invalid</span>
        </div>
        <div class="relative">
          <input id="pattern" type="text" value="(?&lt;name&gt;\\w+):\\s*(\\d+)" placeholder="Enter regex..." class="w-full bg-ink border border-white/10 rounded-xl px-4 py-3 text-lg code-font text-amber-200 placeholder:text-slate focus:outline-none focus:ring-2 focus:ring-amber-400/30 focus:border-amber-400/40 transition shadow-inner" oninput="runRegex()" onkeydown="if(event.key==='Enter'){event.preventDefault(); document.getElementById('testText').focus();}" />
          <span id="caret-pos" class="absolute right-3 top-1/2 -translate-y-1/2 text-[10px] text-slate font-mono pointer-events-none hidden">0</span>
        </div>
        <div class="mt-2 flex items-center gap-2 flex-wrap">
          <span class="text-[10px] text-slate font-medium">Quick tokens:</span>
          <button onclick="insert('\d')" class="token px-2 py-0.5 rounded bg-white/5 hover:bg-white/10 border border-white/5 text-[11px] text-cyan hover:text-cyan-300 transition">\d</button>
          <button onclick="insert('\\w')" class="token px-2 py-0.5 rounded bg-white/5 hover:bg-white/10 border border-white/5 text-[11px] text-cyan hover:text-cyan-300 transition">\w</button>
          <button onclick="insert('\\s')" class="token px-2 py-0.5 rounded bg-white/5 hover:bg-white/10 border border-white/5 text-[11px] text-cyan hover:text-cyan-300 transition">\s</button>
          <button onclick="insert('[A-Z]')" class="token px-2 py-0.5 rounded bg-white/5 hover:bg-white/10 border border-white/5 text-[11px] text-cyan hover:text-cyan-300 transition">[A-Z]</button>
          <button onclick="insert('(?=...)')" class="token px-2 py-0.5 rounded bg-white/5 hover:bg-white/10 border border-white/5 text-[11px] text-cyan hover:text-cyan-300 transition">(?=...)</button>
          <button onclick="insert('(?!)')" class="token px-2 py-0.5 rounded bg-white/5 hover:bg-white/10 border border-white/5 text-[11px] text-cyan hover:text-cyan-300 transition">(?!...)</button>
        </div>
      </div>

      <!-- Flags -->
      <div class="glass rounded-2xl p-5 terminal-shadow relative">
        <div class="absolute top-0 left-0 right-0 h-px bg-gradient-to-r from-transparent via-cyan-400/30 to-transparent"></div>
        <label class="text-[11px] font-bold uppercase tracking-wider text-cyan-400 mb-3 block">Flags</label>
        <div class="flex gap-2 flex-wrap" id="flags-row">
          <label class="inline-flex items-center gap-1.5 px-2.5 py-1.5 rounded-lg bg-ink border border-white/10 hover:border-cyan-400/30 cursor-pointer transition select-none">
            <input type="checkbox" value="g" onchange="runRegex()" class="w-3.5 h-3.5 rounded bg-surface border-white/20 text-cyan-400 focus:ring-cyan-400/40" checked />
            <span class="text-[11px] font-mono font-semibold text-cyan">g</span>
          </label>
          <label class="inline-flex items-center gap-1.5 px-2.5 py-1.5 rounded-lg bg-ink border border-white/10 hover:border-amber-400/30 cursor-pointer transition select-none">
            <input type="checkbox" value="i" onchange="runRegex()" class="w-3.5 h-3.5 rounded bg-surface border-white/20 text-amber-400 focus:ring-amber-400/40" />
            <span class="text-[11px] font-mono font-semibold text-amber">i</span>
          </label>
          <label class="inline-flex items-center gap-1.5 px-2.5 py-1.5 rounded-lg bg-ink border border-white/10 hover:border-lime-400/30 cursor-pointer transition select-none">
            <input type="checkbox" value="m" onchange="runRegex()" class="w-3.5 h-3.5 rounded bg-surface border-white/20 text-lime-400 focus:ring-lime-400/40" />
            <span class="text-[11px] font-mono font-semibold text-lime">m</span>
          </label>
          <label class="inline-flex items-center gap-1.5 px-2.5 py-1.5 rounded-lg bg-ink border border-white/10 hover:border-rose-400/30 cursor-pointer transition select-none">
            <input type="checkbox" value="s" onchange="runRegex()" class="w-3.5 h-3.5 rounded bg-surface border-white/20 text-rose-400 focus:ring-rose-400/40" />
            <span class="text-[11px] font-mono font-semibold text-rose">s</span>
          </label>
          <label class="inline-flex items-center gap-1.5 px-2.5 py-1.5 rounded-lg bg-ink border border-white/10 hover:border-cyan-300/30 cursor-pointer transition select-none">
            <input type="checkbox" value="u" onchange="runRegex()" class="w-3.5 h-3.5 rounded bg-surface border-white/20 text-cyan-300 focus:ring-cyan-300/40" />
            <span class="text-[11px] font-mono font-semibold text-cyan">u</span>
          </label>
          <label class="inline-flex items-center gap-1.5 px-2.5 py-1.5 rounded-lg bg-ink border border-white/10 hover:border-amber-300/30 cursor-pointer transition select-none">
            <input type="checkbox" value="y" onchange="runRegex()" class="w-3.5 h-3.5 rounded bg-surface border-white/20 text-amber-300 focus:ring-amber-300/40" />
            <span class="text-[11px] font-mono font-semibold text-amber">y</span>
          </label>
        </div>
      </div>

      <!-- Test text -->
      <div class="glass rounded-2xl p-5 terminal-shadow relative">
        <div class="absolute top-0 left-0 right-0 h-px bg-gradient-to-r from-transparent via-lime-400/30 to-transparent"></div>
        <label for="testText" class="text-[11px] font-bold uppercase tracking-wider text-lime-400 mb-3 block">Test Text</label>
        <textarea id="testText" rows="7" class="w-full bg-ink border border-white/10 rounded-xl px-4 py-3 text-sm code-font text-slate-200 placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-lime-400/20 focus:border-lime-400/30 transition shadow-inner scrollbar-thin resize-y" oninput="runRegex()">Alice: 42
Bob: 7
Charlie: 99
Diana: 0
Error: -1</textarea>
      </div>
    </section>

    <!-- RIGHT: Outputs -->
    <section class="lg:col-span-7 space-y-5">

      <!-- Highlighted text -->
      <div class="glass rounded-2xl p-5 terminal-shadow relative overflow-hidden">
        <div class="absolute top-0 left-0 right-0 h-px bg-gradient-to-r from-transparent via-amber-400/30 to-transparent"></div>
        <div class="flex items-center justify-between mb-3">
          <h3 class="text-[11px] font-bold uppercase tracking-wider text-amber-400">Highlighted Matches</h3>
          <span id="match-count" class="text-[10px] text-slate font-mono">0 matches</span>
        </div>
        <div id="highlighted" class="bg-ink border border-white/5 rounded-xl px-4 py-3 text-sm code-font leading-7 whitespace-pre-wrap break-words min-h-[80px] shadow-inner overflow-x-auto scrollbar-thin"></div>
      </div>

      <!-- Table -->
      <div class="glass rounded-2xl p-5 terminal-shadow relative">
        <div class="absolute top-0 left-0 right-0 h-px bg-gradient-to-r from-transparent via-cyan-400/30 to-transparent"></div>
        <h3 class="text-[11px] font-bold uppercase tracking-wider text-cyan-400 mb-3">Match Details</h3>
        <div class="overflow-x-auto rounded-xl border border-white/5 shadow-inner scrollbar-thin">
          <table class="w-full text-xs code-font border-collapse">
            <thead>
              <tr class="bg-surface3/80 text-slate font-semibold">
                <th class="text-left px-3 py-2.5">#</th>
                <th class="text-left px-3 py-2.5">Index</th>
                <th class="text-left px-3 py-2.5">Full Match</th>
                <th class="text-left px-3 py-2.5">Groups</th>
              </tr>
            </thead>
            <tbody id="match-table" class="divide-y divide-white/5 text-slate-200"></tbody>
          </table>
        </div>
      </div>

      <!-- Explanation -->
      <div class="glass rounded-2xl p-5 terminal-shadow relative">
        <div class="absolute top-0 left-0 right-0 h-px bg-gradient-to-r from-transparent via-rose-400/30 to-transparent"></div>
        <h3 class="text-[11px] font-bold uppercase tracking-wider text-rose-400 mb-3">Pattern Explanation</h3>
        <div id="explanation" class="grid gap-2 text-xs text-slate-200 leading-6"></div>
      </div>
    </section>
  </main>

  <footer class="relative z-10 border-t border-white/5 bg-ink/40 backdrop-blur text-center py-4">
    <p class="text-[10px] text-slate font-medium">Regex Lab — Terminal Playground</p>
  </footer>

  <script>
    // Theme
    let dark = true;
    function toggleTheme() {
      dark = !dark;
      document.documentElement.classList.toggle('dark', dark);
      document.body.classList.toggle('bg-[#0b0c0f]', dark);
      document.body.classList.toggle('text-[#e2e8f0]', dark);
      document.body.classList.toggle('bg-paper', !dark);
      document.body.classList.toggle('text-ink', !dark);
      document.getElementById('theme-icon').innerHTML = dark
        ? '<path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>'
        : '<path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l.707.707M6.343 17.657l.707.707M12 5a7 7 0 000 14 7 7 0 000-14z"/>';
      runRegex();
    }

    // Insert token
    function insert(str) {
      const input = document.getElementById('pattern');
      const start = input.selectionStart;
      const end = input.selectionEnd;
      const val = input.value;
      input.value = val.slice(0, start) + str + val.slice(end);
      input.focus();
      input.setSelectionRange(start + str.length, start + str.length);
      runRegex();
    }

    // Clear
    function clearAll() {
      document.getElementById('pattern').value = '';
      document.getElementById('testText').value = '';
      document.getElementById('flags-row').querySelectorAll('input').forEach(i => i.checked = false);
      document.getElementById('flags-row').querySelector('input[value="g"]').checked = true;
      document.getElementById('error-badge').classList.add('hidden');
      document.getElementById('caret-pos').classList.add('hidden');
      runRegex();
    }

    // Copy permalink
    function copyPermalink() {
      const p = document.getElementById('pattern').value;
      const flags = [...document.querySelectorAll('#flags-row input:checked')].map(i => i.value).join('');
      const text = document.getElementById('testText').value;
      const state = { p, flags, text };
      const hash = '#r=' + btoa(JSON.stringify(state)).replace(/=/g, '_');
      history.pushState(null, '', location.pathname + hash);
      const btn = document.querySelector('button[onclick="copyPermalink()"]');
      const label = document.getElementById('copy-label');
      label.textContent = 'Copied!';
      btn.classList.add('pulse-once');
      setTimeout(() => { label.textContent = 'Share'; btn.classList.remove('pulse-once'); }, 1200);
    }

    // Read hash
    function loadHash() {
      const m = location.hash.match(/#r=([A-Za-z0-9_]+)/);
      if (m) {
        try {
          const s = JSON.parse(atob(m[1].replace(/_/g, '=')));
          document.getElementById('pattern').value = s.p || '';
          document.getElementById('testText').value = s.text || '';
          document.querySelectorAll('#flags-row input').forEach(i => i.checked = false);
          if (s.flags) s.flags.split('').forEach(f => { const el = document.querySelector('#flags-row input[value="' + f + '"]'); if (el) el.checked = true; });
        } catch (e) {}
      }
    }
    window.addEventListener('popstate', () => { loadHash(); runRegex(); });

    // Token explanations
    const tokenInfo = [
      { regex: '\\\\.', desc: 'Literal dot', color: 'text-amber-400' },
      { regex: '\\\\w', desc: 'Word char [A-Za-z0-9_]', color: 'text-cyan-400' },
      { regex: '\\\\W', desc: 'Non-word char', color: 'text-cyan-400' },
      { regex: '\\\\d', desc: 'Digit [0-9]', color: 'text-lime-400' },
      { regex: '\\\\D', desc: 'Non-digit', color: 'text-lime-400' },
      { regex: '\\\\s', desc: 'Whitespace', color: 'text-rose-400' },
      { regex: '\\\\S', desc: 'Non-whitespace', color: 'text-rose-400' },
      { regex: '[A-Z]', desc: 'Character class', color: 'text-purple-400' },
      { regex: '(?=...)', desc: 'Positive lookahead', color: 'text-amber-300' },
      { regex: '(?!...)', desc: 'Negative lookahead', color: 'text-rose-300' },
      { regex: '(?&lt;name&gt;...)', desc: 'Named capture group', color: 'text-cyan-300' },
      { regex: '.+', desc: 'One or more of any char', color: 'text-slate-300' },
    ];

    function explainPattern(pat) {
      const el = document.getElementById('explanation');
      if (!pat) { el.innerHTML = '<span class="text-slate">Enter a pattern to see an explanation.</span>'; return; }
      const found = [];
      // Simple heuristic: scan tokens
      const tokens = [
        { text: '\\. (dot)', regex: /^\\\./ },
        { text: '\\w', regex: /^\\w/ },
        { text: '\\W', regex: /^\\W/ },
        { text: '\\d', regex: /^\\d/ },
        { text: '\\D', regex: /^\\D/ },
        { text: '\\s', regex: /^\\s/ },
        { text: '\\S', regex: /^\\S/ },
        { text: '[A-Z]', regex: /^\[A-Z\]/ },
        { text: '(?)', regex: /^\(\?[:=!]?[<=!]?[^)]*\)/ },
        { text: '.*?', regex: /^\.\*\?/ },
        { text: '.+', regex: /^\.\+/ },
        { text: '.?', regex: /^\.\?/ },
        { text: 'Quantifiers (*, +, ?, {n})', regex: /^(?:[*+?]|\{\d+[,}]?\})/ },
        { text: 'Literal', regex: /^[^\\.*+?^$\[\](){}|]/ },
      ];
      let html = '<div class="flex flex-wrap gap-2">';
      let i = 0;
      while (i < pat.length) {
        let matched = false;
        for (const tok of tokens) {
          const m = pat.slice(i).match(tok.regex);
          if (m) {
            html += `<span class="inline-block px-2 py-0.5 rounded bg-surface2 border border-white/5 text-[11px] font-mono text-cyan-300">${m[0]}</span>`;
            i += m[0].length;
            matched = true;
            break;
          }
        }
        if (!matched && pat[i] === ' ') {
          html += `<span class="inline-block px-0.5 text-slate-600">·</span>`;
          i++;
        } else if (!matched) {
          html += `<span class="inline-block px-2 py-0.5 rounded bg-rose-500/10 border border-rose-400/20 text-[11px] font-mono text-rose-300">${pat[i]}</span>`;
          i++;
        }
      }
      html += '</div>';
      // Add descriptions
      const descriptions = [];
      tokenInfo.forEach(t => {
        if (pat.includes(t.regex.replace('\\', '\\\\').replace('\\w', '\\w').replace('\\.', '\\.'))) {
          descriptions.push(`<div class="flex items-start gap-2"><span class="inline-block w-1.5 h-1.5 rounded-full mt-1.5 shrink-0 ${t.color.replace('text', 'bg').replace('-400','-400').replace('-300','-300')}"></span><span><b class="font-mono text-[11px] text-slate-300">${t.regex}</b> — <span class="text-slate-400">${t.desc}</span></span></div>`);
        }
      });
      // Named groups
      if (pat.includes('(?<')) {
        descriptions.push(`<div class="flex items-start gap-2"><span class="inline-block w-1.5 h-1.5 rounded-full mt-1.5 shrink-0 bg-cyan-300"></span><span><b class="font-mono text-[11px] text-slate-300">(?&lt;name&gt;...)</b> — <span class="text-slate-400">Named capture group (accessible via .groups.name)</span></span></div>`);
      }
      el.innerHTML = html + (descriptions.length ? '<div class="mt-3 pt-3 border-t border-white/5 space-y-1">' + descriptions.join('') + '</div>' : '');
    }

    // Main regex execution
    function runRegex() {
      const patInput = document.getElementById('pattern');
      const pat = patInput.value;
      const flags = [...document.querySelectorAll('#flags-row input:checked')].map(i => i.value).join('');
      const text = document.getElementById('testText').value;
      const badge = document.getElementById('error-badge');
      const caretPos = document.getElementById('caret-pos');
      const highlighted = document.getElementById('highlighted');
      const table = document.getElementById('match-table');
      const matchCount = document.getElementById('match-count');

      // Error / caret
      try {
        // Validate by compiling
        new RegExp(pat, flags);
        badge.classList.add('hidden');
        caretPos.classList.add('hidden');
      } catch (e) {
        badge.classList.remove('hidden');
        badge.textContent = 'Invalid';
        // Try to extract caret from error message
        const caretMatch = e.message && e.message.match(/position\s*(\d+)/i);
        let pos = caretMatch ? parseInt(caretMatch[1], 10) : null;
        if (pos === null) {
          const caret = patInput.selectionStart || patInput.selectionEnd || 0;
          pos = caret;
        }
        caretPos.textContent = pos;
        caretPos.classList.remove('hidden');
        highlighted.innerHTML = '<span class="text-slate-400">Fix pattern error to see matches.</span>';
        table.innerHTML = '';
        matchCount.textContent = '—';
        explainPattern(pat);
        return;
      }

      const regex = new RegExp(pat, flags);
      const matches = [];
      let match;
      let lastIndex = 0;
      // For global and sticky flags we iterate properly
      if (flags.includes('g') || flags.includes('y')) {
        regex.lastIndex = 0;
        while ((match = regex.exec(text)) !== null) {
          matches.push({ ...match, index: match.index, full: match[0] });
          if (match[0] === '') {
            regex.lastIndex++;
          } else {
            regex.lastIndex = match.index + match[0].length;
          }
          if (!flags.includes('g')) break;
        }
      } else {
        match = regex.exec(text);
        if (match) matches.push({ ...match, index: match.index, full: match[0] });
      }

      // Highlight
      let highlightedHtml = '';
      let pos = 0;
      if (matches.length === 0) {
        highlightedHtml = escapeHtml(text) || '<span class="text-slate-500">No matches found</span>';
      } else {
        for (let i = 0; i < matches.length; i++) {
          const m = matches[i];
          highlightedHtml += escapeHtml(text.slice(pos, m.index));
          // Full match highlight
          highlightedHtml += `<span class="match-0">${escapeHtml(m.full)}</span>`;
          if (m.length > 1) {
            let groupParts = [];
            for (let g = 1; g < m.length; g++) {
              const groupText = m[g] !== undefined ? m[g] : '';
              const groupClass = 'match-' + ((g % 7) + 1);
              groupParts.push(`<span class="${groupClass}">${escapeHtml(groupText)}</span>`);
            }
            highlightedHtml += `<div class="text-[10px] mt-0.5 opacity-80 flex flex-wrap gap-1">` + groupParts.join('') + `</div>`;
          }
          pos = m.index + m.full.length;
        }
        highlightedHtml += escapeHtml(text.slice(pos));
      }
      highlighted.innerHTML = highlightedHtml || '<span class="text-slate-500">No matches</span>';

      // Table
      if (matches.length === 0) {
        table.innerHTML = '<tr><td colspan="4" class="px-3 py-4 text-center text-slate-500">No matches</td></tr>';
      } else {
        table.innerHTML = matches.map((m, idx) => {
          const groups = [];
          for (let g = 1; g < m.length; g++) {
            groups.push(`<span class="font-mono text-[10px] px-1.5 py-0.5 rounded bg-surface2 border border-white/5 text-cyan-300">[${g}] ${escapeHtml(m[g] || '')}</span>`);
          }
          return `<tr class="hover:bg-white/[0.02] transition">
            <td class="px-3 py-2.5 font-bold text-amber-400">${idx + 1}</td>
            <td class="px-3 py-2.5 font-mono text-[11px] text-cyan-300">${m.index}</td>
            <td class="px-3 py-2.5 font-mono text-[11px] text-amber-200">${escapeHtml(m.full)}</td>
            <td class="px-3 py-2.5">${groups.length ? '<div class="flex flex-wrap gap-1">' + groups.join('') + '</div>' : '<span class="text-slate-500">—</span>'}</td>
          </tr>`;
        }).join('');
      }
      matchCount.textContent = matches.length + ' match' + (matches.length === 1 ? '' : 'es');
      explainPattern(pat);
    }

    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }

    // Init
    window.addEventListener('load', () => {
      loadHash();
      runRegex();
    });
  </script>
</body>
</html>
