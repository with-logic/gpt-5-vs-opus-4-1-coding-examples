<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio Step Sequencer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #060b14;
      --surface: #0d1425;
      --surface-2: #132240;
      --border: rgba(100, 220, 255, 0.15);
      --neon-cyan: #00eaff;
      --neon-magenta: #ff00aa;
      --neon-green: #00ffaa;
      --neon-purple: #aa00ff;
      --text: #e8f1ff;
      --text-dim: #8aa0c0;
      --accent-1: #00eaff;
      --accent-2: #ff00aa;
      --accent-3: #aa00ff;
      --shadow-glow: 0 0 15px rgba(0, 234, 255, 0.35);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 30%, rgba(0,234,255,0.06) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(255,0,170,0.06) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(170,0,255,0.04) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* Scanline overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        rgba(255,255,255,0.015) 0px,
        rgba(255,255,255,0.015) 1px,
        transparent 1px,
        transparent 2px
      );
      pointer-events: none;
      z-index: 9999;
      opacity: 0.5;
    }

    .app {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-shrink: 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .brand h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 28px;
      letter-spacing: 4px;
      text-transform: uppercase;
      background: linear-gradient(135deg, var(--neon-cyan) 0%, var(--neon-magenta) 50%, var(--neon-purple) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 8px rgba(0,234,255,0.4));
    }

    .brand .sub {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .logo-icon {
      width: 44px; height: 44px;
      border: 2px solid var(--neon-cyan);
      border-radius: 50%;
      display: grid;
      place-items: center;
      box-shadow: 0 0 15px rgba(0, 234, 255, 0.25), inset 0 0 10px rgba(0,234,255,0.1);
      animation: pulse-glow 3s ease-in-out infinite alternate;
    }

    @keyframes pulse-glow {
      from { box-shadow: 0 0 10px rgba(0,234,255,0.2), inset 0 0 5px rgba(0,234,255,0.05); }
      to { box-shadow: 0 0 25px rgba(0,234,255,0.45), inset 0 0 15px rgba(0,234,255,0.2); }
    }

    .logo-icon svg {
      width: 22px; height: 22px;
      stroke: var(--neon-cyan);
      stroke-width: 2.5;
      fill: none;
    }

    /* Main grid area */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 24px;
      overflow: hidden;
    }

    /* Sequencer */
    .sequencer {
      flex: 1;
      background: linear-gradient(180deg, rgba(0,234,255,0.03), rgba(170,0,255,0.02));
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: inset 0 0 40px rgba(0,234,255,0.03);
    }

    .sequencer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .label-row {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .label-row span {
      font-family: 'Orbitron', sans-serif;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-dim);
    }

    .label-row .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--neon-green);
      box-shadow: 0 0 8px var(--neon-green);
      animation: blink 1.2s infinite alternate;
    }

    @keyframes blink {
      from { opacity: 1; box-shadow: 0 0 8px var(--neon-green); }
      to { opacity: 0.4; box-shadow: 0 0 2px var(--neon-green); }
    }

    .step-num {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 1px;
    }

    /* Instruments */
    .grid {
      display: grid;
      grid-template-columns: 140px repeat(16, 1fr);
      gap: 6px;
      overflow-y: auto;
      padding-right: 6px;
    }

    .grid::-webkit-scrollbar { width: 8px; }
    .grid::-webkit-scrollbar-track { background: transparent; }
    .grid::-webkit-scrollbar-thumb { background: linear-gradient(180deg, var(--neon-cyan), var(--neon-magenta)); border-radius: 4px; }

    .inst-label {
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text);
      padding: 10px 8px;
      background: linear-gradient(90deg, var(--surface-2), transparent);
      border-radius: 8px 0 0 8px;
      border-right: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .inst-label::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      box-shadow: 0 0 6px currentColor;
    }

    .inst-label.kick::before { background: var(--neon-cyan); color: var(--neon-cyan); }
    .inst-label.snare::before { background: var(--neon-magenta); color: var(--neon-magenta); }
    .inst-label.hihat::before { background: var(--neon-green); color: var(--neon-green); }
    .inst-label.clap::before { background: var(--neon-purple); color: var(--neon-purple); }
    .inst-label.perc::before { background: #ffaa00; color: #ffaa00; }

    /* Steps */
    .step-cell {
      aspect-ratio: 1;
      min-height: 48px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
      cursor: pointer;
      transition: all 0.1s ease;
      position: relative;
      overflow: hidden;
    }

    .step-cell::before {
      content: '';
      position: absolute;
      inset: 2px;
      border-radius: 6px;
      border: 1px solid transparent;
      transition: all 0.15s ease;
    }

    .step-cell:hover {
      border-color: rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.05);
    }

    .step-cell.active {
      background: linear-gradient(135deg, rgba(0,234,255,0.15), rgba(170,0,255,0.15));
      border-color: var(--neon-cyan);
      box-shadow: 0 0 12px rgba(0,234,255,0.15);
    }

    .step-cell.active::before {
      border-color: rgba(0,234,255,0.25);
    }

    .step-cell.active.kick { border-color: var(--neon-cyan); box-shadow: 0 0 12px rgba(0,234,255,0.3); }
    .step-cell.active.snare { border-color: var(--neon-magenta); box-shadow: 0 0 12px rgba(255,0,170,0.3); }
    .step-cell.active.hihat { border-color: var(--neon-green); box-shadow: 0 0 12px rgba(0,255,170,0.3); }
    .step-cell.active.clap { border-color: var(--neon-purple); box-shadow: 0 0 12px rgba(170,0,255,0.3); }
    .step-cell.active.perc { border-color: #ffaa00; box-shadow: 0 0 12px rgba(255,170,0,0.3); }

    .step-cell.playhead {
      border-color: var(--text) !important;
      box-shadow: 0 0 0 2px rgba(255,255,255,0.1), 0 0 16px rgba(255,255,255,0.25);
      animation: playhead-pulse 0.15s ease-out;
    }

    @keyframes playhead-pulse {
      0% { transform: scale(0.92); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    .step-indicator {
      position: absolute;
      bottom: 4px;
      right: 4px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      opacity: 0.5;
    }

    /* Transport / Controls */
    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 16px 0;
      flex-shrink: 0;
    }

    .transport-group {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .btn {
      font-family: 'Orbitron', sans-serif;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s ease;
      background: linear-gradient(135deg, var(--surface-2), var(--surface));
      border: 1px solid var(--border);
      color: var(--text);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .btn:hover {
      border-color: var(--neon-cyan);
      box-shadow: 0 0 12px rgba(0,234,255,0.15);
      color: var(--neon-cyan);
    }

    .btn.play {
      background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
      color: #000;
      font-weight: 900;
      border-color: transparent;
      box-shadow: 0 0 15px rgba(0,234,255,0.35);
    }

    .btn.play:hover {
      box-shadow: 0 0 25px rgba(0,234,255,0.6);
    }

    .btn.stop {
      background: linear-gradient(135deg, var(--neon-magenta), #aa0055);
      color: #fff;
      font-weight: 900;
      border-color: transparent;
      box-shadow: 0 0 15px rgba(255,0,170,0.35);
    }

    .btn.stop:hover {
      box-shadow: 0 0 25px rgba(255,0,170,0.6);
    }

    /* Sliders */
    .slider-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 160px;
    }

    .slider-group label {
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .slider-group input[type="range"] {
      -webkit-appearance: none;
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(90deg, var(--surface-2), var(--surface));
      outline: none;
      border: 1px solid var(--border);
    }

    .slider-group input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
      cursor: pointer;
      box-shadow: 0 0 10px rgba(0,234,255,0.5);
    }

    .slider-value {
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      color: var(--neon-cyan);
      text-align: right;
    }

    /* Pattern manager */
    .pattern-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      background: linear-gradient(90deg, rgba(13,20,37,0.8), rgba(19,34,64,0.8));
      border: 1px solid var(--border);
      border-radius: 12px;
      flex-shrink: 0;
    }

    .pattern-bar h3 {
      font-family: 'Orbitron', sans-serif;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .pattern-select {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 12px;
      border-radius: 6px;
      font-family: inherit;
      font-size: 13px;
      min-width: 160px;
      outline: none;
      cursor: pointer;
    }

    .pattern-select:focus { border-color: var(--neon-cyan); }

    .pattern-bar input[type="text"] {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 10px;
      border-radius: 6px;
      font-family: inherit;
      font-size: 13px;
      width: 160px;
      outline: none;
    }

    .pattern-bar input[type="text"]:focus { border-color: var(--neon-cyan); }

    /* Footer / Info */
    footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 8px;
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 1px;
    }

    /* Modal overlay for save/load messages */
    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(-100px);
      background: linear-gradient(135deg, var(--surface-2), var(--surface));
      border: 1px solid var(--neon-cyan);
      padding: 12px 24px;
      border-radius: 8px;
      font-family: 'Orbitron', sans-serif;
      letter-spacing: 2px;
      color: var(--neon-cyan);
      box-shadow: 0 10px 30px rgba(0,234,255,0.2);
      z-index: 10000;
      transition: transform 0.4s ease;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* Responsive */
    @media (max-width: 900px) {
      .grid { grid-template-columns: 100px repeat(16, 1fr); }
      header { flex-direction: column; align-items: flex-start; gap: 12px; }
      .controls { flex-wrap: wrap; }
    }
  </style>
</head>
<body>

<div class="app">
  <header>
    <div class="brand">
      <div class="logo-icon" aria-label="Logo">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="12 2 2 22 22 22" />
          <circle cx="12" cy="9" r="3" />
        </svg>
      </div>
      <div>
        <h1>Audio Step Sequencer</h1>
        <div class="sub">16-Step Drum Grid • WebAudio</div>
      </div>
    </div>
    <div class="label-row">
      <span>LIVE</span>
      <div class="dot" id="liveDot"></div>
      <span id="bpmDisplay">120 BPM</span>
    </div>
  </header>

  <div class="main">
    <section class="sequencer" aria-label="Sequencer grid">
      <div class="sequencer-header">
        <div class="label-row">
          <span>Step Sequence</span>
          <span style="font-size:9px;color:#ffaa00;letter-spacing:1px;">● KICK  ● SNARE  ● HIHAT  ● CLAP  ● PERC</span>
        </div>
        <div style="font-size:10px;color:var(--text-dim);letter-spacing:1px;">CLICK STEP TO TOGGLE</div>
      </div>

      <div class="grid" id="grid" role="grid" aria-label="Drum steps"></div>
    </section>

    <div class="controls" aria-label="Transport controls">
      <div class="transport-group">
        <button class="btn play" id="btnPlay" aria-label="Play">▶ PLAY</button>
        <button class="btn stop" id="btnStop" aria-label="Stop">■ STOP</button>
      </div>

      <div class="slider-group">
        <label for="tempo">Tempo</label>
        <input type="range" id="tempo" min="60" max="240" value="120" step="1">
        <div class="slider-value" id="tempoVal">120 BPM</div>
      </div>

      <div class="slider-group">
        <label for="swing">Swing</label>
        <input type="range" id="swing" min="0" max="0.8" step="0.05" value="0">
        <div class="slider-value" id="swingVal">0.00</div>
      </div>

      <div class="transport-group">
        <button class="btn" id="btnClear" aria-label="Clear pattern">✕ CLEAR</button>
        <button class="btn" id="btnRandom" aria-label="Randomize">✦ RANDOM</button>
        <button class="btn" id="btnExport" aria-label="Export WAV">⬇ EXPORT WAV</button>
      </div>
    </div>

    <div class="pattern-bar" aria-label="Pattern manager">
      <h3>Patterns</h3>
      <select class="pattern-select" id="patternSelect" aria-label="Select pattern"></select>
      <button class="btn" id="btnSave" aria-label="Save pattern">💾 SAVE</button>
      <button class="btn" id="btnLoad" aria-label="Load pattern">📂 LOAD</button>
      <button class="btn" id="btnDelete" aria-label="Delete pattern">🗑 DELETE</button>
      <input type="text" id="patternName" placeholder="Pattern name..." aria-label="Pattern name" />
    </div>
  </div>

  <footer>
    <span>WebAudio API • Synthesized Drums</span>
    <span>Step 16 • Grid 5 Instruments</span>
  </footer>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
/* ========================
   AUDIO ENGINE
   ======================== */
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let ctx = null;

function ensureAudio() {
  if (!ctx) ctx = new AudioCtx();
  if (ctx.state === 'suspended') ctx.resume();
  return ctx;
}

const instruments = [
  { id: 'kick',  name: 'Kick',  color: 'cyan',    key: 'C2' },
  { id: 'snare', name: 'Snare', color: 'magenta', key: 'D2' },
  { id: 'hihat', name: 'Hi-Hat', color: 'green',  key: 'F#2' },
  { id: 'clap',  name: 'Clap',  color: 'purple', key: 'A2' },
  { id: 'perc',  name: 'Perc',  color: 'amber',  key: 'E2' },
];

function playSound(type, time) {
  const ac = ensureAudio();
  // Kick: pitch drop
  if (type === 'kick') {
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(150, time);
    osc.frequency.exponentialRampToValueAtTime(50, time + 0.3);
    gain.gain.setValueAtTime(1, time);
    gain.gain.exponentialRampToValueAtTime(0.01, time + 0.35);
    osc.connect(gain);
    gain.connect(ac.destination);
    osc.start(time);
    osc.stop(time + 0.35);
  }
  // Snare: noise burst
  if (type === 'snare') {
    const noise = ac.createBufferSource();
    const gain = ac.createGain();
    const buffer = ac.createBuffer(1, ac.sampleRate * 0.2, ac.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < buffer.length; i++) data[i] = Math.random() * 2 - 1;
    noise.buffer = buffer;
    gain.gain.setValueAtTime(0.8, time);
    gain.gain.exponentialRampToValueAtTime(0.01, time + 0.2);
    noise.connect(gain);
    gain.connect(ac.destination);
    noise.start(time);
    noise.stop(time + 0.2);
    // Add a quick pitch for body
    const osc = ac.createOscillator();
    const oscGain = ac.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(180, time);
    osc.frequency.linearRampToValueAtTime(80, time + 0.1);
    oscGain.gain.setValueAtTime(0.3, time);
    oscGain.gain.exponentialRampToValueAtTime(0.01, time + 0.15);
    osc.connect(oscGain);
    oscGain.connect(ac.destination);
    osc.start(time);
    osc.stop(time + 0.15);
  }
  // Hi-Hat: high noise
  if (type === 'hihat') {
    const noise = ac.createBufferSource();
    const gain = ac.createGain();
    const buffer = ac.createBuffer(1, ac.sampleRate * 0.1, ac.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < buffer.length; i++) data[i] = Math.random() * 2 - 1;
    noise.buffer = buffer;
    // Band pass via simple EQ approximation with filters
    const highpass = ac.createBiquadFilter();
    highpass.type = 'highpass';
    highpass.frequency.setValueAtTime(6000, time);
    highpass.Q.setValueAtTime(1, time);
    gain.gain.setValueAtTime(0.15, time);
    gain.gain.exponentialRampToValueAtTime(0.01, time + 0.08);
    noise.connect(highpass);
    highpass.connect(gain);
    gain.connect(ac.destination);
    noise.start(time);
    noise.stop(time + 0.1);
  }
  // Clap: layered noise + quick tone
  if (type === 'clap') {
    for (let i = 0; i < 3; i++) {
      const noise = ac.createBufferSource();
      const gain = ac.createGain();
      const buffer = ac.createBuffer(1, ac.sampleRate * 0.12, ac.sampleRate);
      const data = buffer.getChannelData(0);
      for (let j = 0; j < buffer.length; j++) data[j] = Math.random() * 2 - 1;
      noise.buffer = buffer;
      gain.gain.setValueAtTime(0.4 * (1 - i * 0.25), time + i * 0.01);
      gain.gain.exponentialRampToValueAtTime(0.01, time + 0.08 + i * 0.01);
      noise.connect(gain);
      gain.connect(ac.destination);
      noise.start(time + i * 0.01);
      noise.stop(time + 0.1 + i * 0.01);
    }
  }
  // Perc: quick bright noise hit
  if (type === 'perc') {
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(800, time);
    osc.frequency.linearRampToValueAtTime(1200, time + 0.02);
    gain.gain.setValueAtTime(0.15, time);
    gain.gain.exponentialRampToValueAtTime(0.01, time + 0.06);
    osc.connect(gain);
    gain.connect(ac.destination);
    osc.start(time);
    osc.stop(time + 0.06);
    // noise layer
    const noise = ac.createBufferSource();
    const nGain = ac.createGain();
    const buffer = ac.createBuffer(1, ac.sampleRate * 0.08, ac.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < buffer.length; i++) data[i] = Math.random() * 2 - 1;
    noise.buffer = buffer;
    nGain.gain.setValueAtTime(0.15, time);
    nGain.gain.exponentialRampToValueAtTime(0.01, time + 0.08);
    noise.connect(nGain);
    nGain.connect(ac.destination);
    noise.start(time);
    noise.stop(time + 0.08);
  }
}

/* ========================
   SEQUENCER STATE
   ======================== */
const totalSteps = 16;
const patterns = {};
let currentPatternName = 'Default';
let gridState = {}; // { instrument: { stepIndex: true } }
let isPlaying = false;
let currentStep = 0;
let tempo = 120;
let swing = 0;
let timerId = null;

instruments.forEach(i => gridState[i.id] = {});

/* ========================
   UI CONSTRUCTION
   ======================== */
const gridEl = document.getElementById('grid');
const selectEl = document.getElementById('patternSelect');

function initUI() {
  gridEl.innerHTML = '';
  // Header row for step numbers
  const headerCell = document.createElement('div');
  headerCell.style.gridColumn = '1';
  headerCell.style.height = '8px';
  gridEl.appendChild(headerCell);

  for (let s = 0; s < totalSteps; s++) {
    const num = document.createElement('div');
    num.className = 'step-num';
    num.textContent = (s + 1).toString().padStart(2, '0');
    num.style.gridColumn = (s + 2).toString();
    num.style.gridRow = '1';
    num.style.display = 'flex';
    num.style.alignItems = 'center';
    num.style.justifyContent = 'center';
    gridEl.appendChild(num);
  }

  instruments.forEach((inst, rowIdx) => {
    // Label
    const label = document.createElement('div');
    label.className = `inst-label ${inst.id}`;
    label.textContent = inst.name;
    label.style.gridColumn = '1';
    label.style.gridRow = (rowIdx + 2).toString();
    label.style.display = 'flex';
    label.style.alignItems = 'center';
    gridEl.appendChild(label);

    for (let s = 0; s < totalSteps; s++) {
      const cell = document.createElement('button');
      cell.className = 'step-cell ' + inst.id;
      cell.setAttribute('data-inst', inst.id);
      cell.setAttribute('data-step', s);
      cell.setAttribute('aria-label', `${inst.name} step ${s + 1}`);
      cell.style.gridColumn = (s + 2).toString();
      cell.style.gridRow = (rowIdx + 2).toString();
      cell.addEventListener('click', () => {
        const active = gridState[inst.id][s] || false;
        gridState[inst.id][s] = !active;
        cell.classList.toggle('active', gridState[inst.id][s]);
      });
      // Indicator dot for active
      const dot = document.createElement('div');
      dot.className = 'step-indicator';
      dot.style.background = {
        cyan: '#00eaff', magenta: '#ff00aa', green: '#00ffaa', purple: '#aa00ff', amber: '#ffaa00'
      }[inst.color];
      cell.appendChild(dot);
      gridEl.appendChild(cell);
    }
  });

  updateGridFromState();
}

function updateGridFromState() {
  instruments.forEach(inst => {
    for (let s = 0; s < totalSteps; s++) {
      const cell = gridEl.querySelector(`.step-cell[data-inst="${inst.id}"][data-step="${s}"]`);
      if (cell) {
        const active = !!gridState[inst.id][s];
        cell.classList.toggle('active', active);
        const dot = cell.querySelector('.step-indicator');
        if (dot) dot.style.opacity = active ? '1' : '0';
      }
    }
  });
}

/* ========================
   PATTERNS
   ======================== */
function getDefaultName() {
  return 'Pattern ' + (Object.keys(patterns).length + 1);
}

function saveToStorage() {
  try {
    localStorage.setItem('audio_sequencer_patterns', JSON.stringify(patterns));
    localStorage.setItem('audio_sequencer_current', currentPatternName);
  } catch(e) {}
}

function loadFromStorage() {
  try {
    const raw = localStorage.getItem('audio_sequencer_patterns');
    if (raw) {
      const saved = JSON.parse(raw);
      Object.assign(patterns, saved);
    }
    const cur = localStorage.getItem('audio_sequencer_current');
    if (cur && patterns[cur]) currentPatternName = cur;
  } catch(e) {}
}

function refreshPatternSelect() {
  selectEl.innerHTML = '';
  const names = Object.keys(patterns);
  if (names.length === 0) {
    patterns['Default'] = { state: JSON.parse(JSON.stringify(gridState)) };
    currentPatternName = 'Default';
    names.push('Default');
  }
  names.forEach(name => {
    const opt = document.createElement('option');
    opt.value = name;
    opt.textContent = name;
    if (name === currentPatternName) opt.selected = true;
    selectEl.appendChild(opt);
  });
  document.getElementById('patternName').value = currentPatternName;
}

function applyPattern(name) {
  if (!patterns[name]) return;
  currentPatternName = name;
  const savedState = patterns[name].state;
  instruments.forEach(inst => {
    gridState[inst.id] = {};
    Object.assign(gridState[inst.id], savedState[inst.id] || {});
  });
  updateGridFromState();
  refreshPatternSelect();
}

/* ========================
   SEQUENCER PLAYBACK
   ======================== */
function scheduleStep(stepIndex, offsetMs) {
  const time = ensureAudio().currentTime + (offsetMs ? offsetMs / 1000 : 0.02);
  instruments.forEach(inst => {
    if (gridState[inst.id][stepIndex]) {
      playSound(inst.id, time);
    }
  });
}

function tick() {
  const stepDuration = 60 / tempo / 4; // 16th notes at current tempo
  const swingOffset = swing > 0 ? stepDuration * swing : 0;
  
  scheduleStep(currentStep, 0);
  
  // Playhead highlight
  document.querySelectorAll('.step-cell').forEach(c => c.classList.remove('playhead'));
  instruments.forEach(inst => {
    const cell = gridEl.querySelector(`.step-cell[data-inst="${inst.id}"][data-step="${currentStep}"]`);
    if (cell) cell.classList.add('playhead');
  });
  
  currentStep = (currentStep + 1) % totalSteps;
  
  if (isPlaying) {
    const delay = swing > 0 && (currentStep % 2 === 1) ? (stepDuration + swingOffset) * 1000 : stepDuration * 1000;
    timerId = setTimeout(tick, delay);
  }
}

function startPlayback() {
  ensureAudio();
  isPlaying = true;
  currentStep = 0;
  tick();
  document.getElementById('btnPlay').textContent = '▶ PLAYING';
  document.getElementById('btnPlay').classList.add('play');
}

function stopPlayback() {
  isPlaying = false;
  clearTimeout(timerId);
  timerId = null;
  document.querySelectorAll('.step-cell').forEach(c => c.classList.remove('playhead'));
  document.getElementById('btnPlay').textContent = '▶ PLAY';
}

/* ========================
   WAV EXPORT (Offline rendering)
   ======================== */
async function exportWAV() {
  showToast('Rendering WAV...');
  try {
    const ac = new OfflineAudioContext(2, 44100 * 10, 44100);
    // Render a short 8-bar loop (16 steps * 4 beats = 4 beats, let's do 2 bars = 8 beats = 32 steps = 2 loops)
    const beatDur = 60 / tempo;
    const stepDur = beatDur / 4;
    const loopDur = stepDur * 16 * 2; // 2 loops of 16 steps
    
    // Schedule sounds on offline context
    instruments.forEach(inst => {
      for (let loop = 0; loop < 2; loop++) {
        for (let s = 0; s < totalSteps; s++) {
          if (gridState[inst.id][s]) {
            const time = loop * stepDur * 16 + s * stepDur;
            // Replicate playSound logic using offline context
            if (inst.id === 'kick') {
              const osc = ac.createOscillator();
              const gain = ac.createGain();
              osc.type = 'sine';
              osc.frequency.setValueAtTime(150, time);
              osc.frequency.exponentialRampToValueAtTime(50, time + 0.3);
              gain.gain.setValueAtTime(1, time);
              gain.gain.exponentialRampToValueAtTime(0.01, time + 0.35);
              osc.connect(gain); gain.connect(ac.destination);
              osc.start(time); osc.stop(time + 0.35);
            } else if (inst.id === 'snare') {
              const noise = ac.createBufferSource();
              const gain = ac.createGain();
              const buffer = ac.createBuffer(1, ac.sampleRate * 0.2, ac.sampleRate);
              const data = buffer.getChannelData(0);
              for (let i = 0; i < buffer.length; i++) data[i] = Math.random() * 2 - 1;
              noise.buffer = buffer;
              gain.gain.setValueAtTime(0.8, time);
              gain.gain.exponentialRampToValueAtTime(0.01, time + 0.2);
              noise.connect(gain); gain.connect(ac.destination);
              noise.start(time); noise.stop(time + 0.2);
              const osc = ac.createOscillator();
              const oscGain = ac.createGain();
              osc.type = 'triangle';
              osc.frequency.setValueAtTime(180, time);
              osc.frequency.linearRampToValueAtTime(80, time + 0.1);
              oscGain.gain.setValueAtTime(0.3, time);
              oscGain.gain.exponentialRampToValueAtTime(0.01, time + 0.15);
              osc.connect(oscGain); oscGain.connect(ac.destination);
              osc.start(time); osc.stop(time + 0.15);
            } else if (inst.id === 'hihat') {
              const noise = ac.createBufferSource();
              const gain = ac.createGain();
              const buffer = ac.createBuffer(1, ac.sampleRate * 0.1, ac.sampleRate);
              const data = buffer.getChannelData(0);
              for (let i = 0; i < buffer.length; i++) data[i] = Math.random() * 2 - 1;
              noise.buffer = buffer;
              const highpass = ac.createBiquadFilter();
              highpass.type = 'highpass'; highpass.frequency.setValueAtTime(6000, time);
              gain.gain.setValueAtTime(0.15, time);
              gain.gain.exponentialRampToValueAtTime(0.01, time + 0.08);
              noise.connect(highpass); highpass.connect(gain); gain.connect(ac.destination);
              noise.start(time); noise.stop(time + 0.1);
            } else if (inst.id === 'clap') {
              for (let i = 0; i < 3; i++) {
                const noise = ac.createBufferSource();
                const gain = ac.createGain();
                const buffer = ac.createBuffer(1, ac.sampleRate * 0.12, ac.sampleRate);
                const data = buffer.getChannelData(0);
                for (let j = 0; j < buffer.length; j++) data[j] = Math.random() * 2 - 1;
                noise.buffer = buffer;
                gain.gain.setValueAtTime(0.4 * (1 - i * 0.25), time + i * 0.01);
                gain.gain.exponentialRampToValueAtTime(0.01, time + 0.08 + i * 0.01);
                noise.connect(gain); gain.connect(ac.destination);
                noise.start(time + i * 0.01); noise.stop(time + 0.1 + i * 0.01);
              }
            } else if (inst.id === 'perc') {
              const osc = ac.createOscillator();
              const gain = ac.createGain();
              osc.type = 'square';
              osc.frequency.setValueAtTime(800, time);
              osc.frequency.linearRampToValueAtTime(1200, time + 0.02);
              gain.gain.setValueAtTime(0.15, time);
              gain.gain.exponentialRampToValueAtTime(0.01, time + 0.06);
              osc.connect(gain); gain.connect(ac.destination);
              osc.start(time); osc.stop(time + 0.06);
              const noise = ac.createBufferSource();
              const nGain = ac.createGain();
              const buffer = ac.createBuffer(1, ac.sampleRate * 0.08, ac.sampleRate);
              const data = buffer.getChannelData(0);
              for (let i = 0; i < buffer.length; i++) data[i] = Math.random() * 2 - 1;
              noise.buffer = buffer;
              nGain.gain.setValueAtTime(0.15, time);
              nGain.gain.exponentialRampToValueAtTime(0.01, time + 0.08);
              noise.connect(nGain); nGain.connect(ac.destination);
              noise.start(time); noise.stop(time + 0.08);
            }
          }
        }
      }
    });

    const buffer = await ac.startRendering();
    const wav = encodeWAV(buffer.getChannelData(0), buffer.getChannelData(1) || buffer.getChannelData(0));
    const blob = new Blob([wav], { type: 'audio/wav' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'step-sequencer.wav';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('WAV Exported!');
  } catch (e) {
    showToast('Export failed');
    console.error(e);
  }
}

function encodeWAV(left, right) {
  const numChannels = right && right !== left ? 2 : 1;
  const length = left.length;
  const buffer = new ArrayBuffer(44 + length * 2 * numChannels);
  const view = new DataView(buffer);
  const channels = numChannels === 2 ? [left, right] : [left];
  
  function writeString(str, offset) {
    for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i));
  }
  
  writeString('RIFF', 0);
  view.setUint32(4, 36 + length * 2 * numChannels, true);
  writeString('WAVE', 8);
  writeString('fmt ', 12);
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);
  view.setUint16(22, numChannels, true);
  view.setUint32(24, 44100, true);
  view.setUint32(28, 44100 * 2 * numChannels, true);
  view.setUint16(32, 2 * numChannels, true);
  view.setUint16(34, 16, true);
  writeString('data', 36);
  view.setUint32(40, length * 2 * numChannels, true);
  
  let offset = 44;
  for (let i = 0; i < length; i++) {
    for (let c = 0; c < numChannels; c++) {
      let sample = channels[c][i] || 0;
      sample = Math.max(-1, Math.min(1, sample));
      view.setInt16(offset, sample < 0 ? sample * 0x8000 : sample * 0x7FFF, true);
      offset += 2;
    }
  }
  return new Uint8Array(buffer);
}

/* ========================
   TOAST
   ======================== */
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

/* ========================
   EVENT BINDINGS
   ======================== */
document.getElementById('btnPlay').addEventListener('click', () => {
  if (!isPlaying) startPlayback();
});

document.getElementById('btnStop').addEventListener('click', () => {
  stopPlayback();
});

document.getElementById('tempo').addEventListener('input', e => {
  tempo = parseInt(e.target.value);
  document.getElementById('tempoVal').textContent = tempo + ' BPM';
  document.getElementById('bpmDisplay').textContent = tempo + ' BPM';
});

document.getElementById('swing').addEventListener('input', e => {
  swing = parseFloat(e.target.value);
  document.getElementById('swingVal').textContent = swing.toFixed(2);
});

document.getElementById('btnClear').addEventListener('click', () => {
  instruments.forEach(i => { gridState[i.id] = {}; });
  updateGridFromState();
  showToast('Pattern cleared');
});

document.getElementById('btnRandom').addEventListener('click', () => {
  instruments.forEach(i => {
    for (let s = 0; s < totalSteps; s++) {
      gridState[i.id][s] = Math.random() > 0.75;
    }
  });
  updateGridFromState();
  showToast('Randomized!');
});

document.getElementById('btnExport').addEventListener('click', () => {
  exportWAV();
});

document.getElementById('patternSelect').addEventListener('change', e => {
  applyPattern(e.target.value);
  showToast('Loaded ' + e.target.value);
});

document.getElementById('btnSave').addEventListener('click', () => {
  const name = document.getElementById('patternName').value.trim() || 'Pattern ' + Date.now();
  patterns[name] = { state: JSON.parse(JSON.stringify(gridState)) };
  currentPatternName = name;
  saveToStorage();
  refreshPatternSelect();
  showToast('Saved ' + name);
});

document.getElementById('btnLoad').addEventListener('click', () => {
  const name = document.getElementById('patternName').value.trim();
  if (name && patterns[name]) {
    applyPattern(name);
    showToast('Loaded ' + name);
  } else {
    showToast('Pattern not found');
  }
});

document.getElementById('btnDelete').addEventListener('click', () => {
  const name = document.getElementById('patternName').value.trim();
  if (name && patterns[name]) {
    delete patterns[name];
    currentPatternName = 'Default';
    if (!patterns[currentPatternName]) patterns[currentPatternName] = { state: JSON.parse(JSON.stringify(gridState)) };
    saveToStorage();
    refreshPatternSelect();
    applyPattern(currentPatternName);
    showToast('Deleted ' + name);
  } else {
    showToast('Pattern not found');
  }
});

/* Initialize */
loadFromStorage();
initUI();
refreshPatternSelect();
if (!patterns[currentPatternName]) {
  patterns[currentPatternName] = { state: JSON.parse(JSON.stringify(gridState)) };
  refreshPatternSelect();
}
</script>
