<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Theatre — A Climatic Stage</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&family=Instrument+Serif:ital@0;1&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --velvet: #1a0f12;
      --gold: #c8a96e;
      --ivory: #f3ead8;
      --rose: #8e2a3a;
      --fog: #3d2b36;
      --stage: #0f080c;
    }
    html, body { height: 100%; overflow: hidden; background: var(--stage); color: var(--ivory); }
    body { font-family: 'Cormorant Garamond', Georgia, serif; letter-spacing: 0.04em; }
    ::selection { background: var(--gold); color: var(--stage); }
    .font-mono { font-family: 'Space Mono', monospace; }
    .font-display { font-family: 'Instrument Serif', Georgia, serif; }
    .gold-glow { text-shadow: 0 0 30px rgba(200,169,110,0.35), 0 0 80px rgba(200,169,110,0.15); }
    .spotlight-mask {
      pointer-events: none;
      position: absolute; inset: 0;
      background: radial-gradient(circle at var(--cx, 50%) var(--cy, 40%), rgba(255,255,255,0.0) 10%, rgba(0,0,0,0.78) 55%);
      transition: background 0.3s ease;
    }
    .curtain-panel-left { clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%); }
    .curtain-panel-right { clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%); }
    .curtain-left { transform: translateX(calc(-50% + var(--openL, 0px))); }
    .curtain-right { transform: translateX(calc(50% - var(--openR, 0px))); }
    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    .shimmer-text {
      background: linear-gradient(90deg, var(--gold) 0%, #e8d5a3 30%, var(--gold) 60%, var(--gold) 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 3s linear infinite;
    }
    .glass-card {
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(12px) saturate(120%);
      border: 1px solid rgba(200,169,110,0.12);
      box-shadow: 0 25px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.04);
    }
    input[type="range"] {
      -webkit-appearance: none; height: 6px; border-radius: 3px; background: linear-gradient(90deg, var(--rose), var(--gold)); outline: none; cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--ivory); border: 2px solid var(--gold); box-shadow: 0 0 10px rgba(200,169,110,0.4); cursor: pointer;
    }
    input[type="range"]::-moz-range-thumb { width: 18px; height: 18px; border-radius: 50%; background: var(--ivory); border: 2px solid var(--gold); box-shadow: 0 0 10px rgba(200,169,110,0.4); cursor: pointer; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo, useCallback } = React;

    const SCENES = {
      cosy:  { label: "Cosy Afternoon",   weather: "Drizzle",    temp: 14,  desc: "A quiet matinee of amber light and gentle rain upon the glass." },
      eerie: { label: "Eerie Midnight",    weather: "Fog",        temp: 6,   desc: "The curtain rises on a silent, luminous fogbank drifting through the orchestra." },
      heroic:{ label: "Heroic Dawn",       weather: "Storm",      temp: 22,  desc: "Thunder rolls across a gilded sky as the overture swells toward sunrise." }
    };

    const TYPEWRITER_LINES = {
      cosy:  ["The rain writes poetry on the windows.",
             "A cup cools on the velvet ledge.",
             "Somewhere, a clock forgets to tick."],
      eerie: ["No one else is in the theatre.",
             "Your breath fogs the rail.",
             "The stage waits for a ghost."],
      heroic:["Every cloud holds a banner.",
             "The wind plays the brass section.",
             "Morning arrives like an encore."]
    };

    function CanvasRain({ mood, intensity, night }) {
      const canvasRef = useRef(null);
      useEffect(() => {
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        let w = canvas.width = window.innerWidth;
        let h = canvas.height = window.innerHeight;
        const drops = [];
        const count = mood === 'heroic' ? 600 : mood === 'eerie' ? 350 : 180;
        for (let i = 0; i < count; i++) {
          drops.push({
            x: Math.random() * w,
            y: Math.random() * h,
            len: 10 + Math.random() * 30,
            speed: 3 + Math.random() * 8,
            alpha: 0.15 + Math.random() * 0.35,
            thickness: 0.5 + Math.random() * 1.5,
            tilt: Math.random() * 0.4 - 0.2
          });
        }
        let frame = 0;
        let anim = 0;
        const draw = () => {
          ctx.clearRect(0, 0, w, h);
          const tint = night ? 'rgba(16,12,24,0.25)' : 'rgba(30,20,16,0.18)';
          ctx.fillStyle = tint;
          ctx.fillRect(0, 0, w, h);
          const color = mood === 'heroic' ? 'rgba(220,190,140,0.9)' : mood === 'eerie' ? 'rgba(160,200,230,0.7)' : 'rgba(200,170,130,0.75)';
          ctx.strokeStyle = color;
          ctx.lineWidth = 1;
          for (const d of drops) {
            const x = d.x + d.tilt * d.len;
            const y = d.y + d.len;
            ctx.beginPath();
            ctx.moveTo(d.x, d.y);
            ctx.lineTo(x, y);
            ctx.globalAlpha = d.alpha * intensity;
            ctx.lineWidth = d.thickness;
            ctx.stroke();
          }
          ctx.globalAlpha = 1;
          for (const d of drops) {
            d.y += d.speed * intensity;
            d.x += d.tilt * 0.5;
            if (d.y > h) { d.y = -d.len; d.x = Math.random() * w; }
            if (d.x > w) d.x = 0; if (d.x < 0) d.x = w;
          }
          frame++;
          anim = requestAnimationFrame(draw);
        };
        draw();
        const resize = () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; };
        window.addEventListener('resize', resize);
        return () => { cancelAnimationFrame(anim); window.removeEventListener('resize', resize); };
      }, [mood, intensity, night]);
      return <canvas ref={canvasRef} className="absolute inset-0 w-full h-full pointer-events-none z-0" style={{ mixBlendMode: mood === 'heroic' ? 'screen' : 'overlay' }} />;
    }

    function Spotlight() {
      const [pos, setPos] = useState({ x: 50, y: 35 });
      useEffect(() => {
        const move = (e) => { setPos({ x: (e.clientX / window.innerWidth) * 100, y: (e.clientY / window.innerHeight) * 100 }); };
        window.addEventListener('mousemove', move);
        return () => window.removeEventListener('mousemove', move);
      }, []);
      return <div className="spotlight-mask" style={{ '--cx': pos.x + '%', '--cy': pos.y + '%' }} />;
    }

    function Curtain({ open }) {
      const leftStyle = { '--openL': open ? '50vw' : '0px', transition: 'transform 1.2s cubic-bezier(0.25,1,0.5,1)' };
      const rightStyle = { '--openR': open ? '50vw' : '0px', transition: 'transform 1.2s cubic-bezier(0.25,1,0.5,1)' };
      return (
        <div className="absolute inset-0 z-50 pointer-events-none overflow-hidden">
          <div className="absolute top-0 left-0 w-1/2 h-full bg-gradient-to-r from-[#1a0f12] via-[#2a1016] to-[#3a1520] curtain-left shadow-2xl" style={leftStyle} />
          <div className="absolute top-0 right-0 w-1/2 h-full bg-gradient-to-l from-[#1a0f12] via-[#2a1016] to-[#3a1520] curtain-right shadow-2xl" style={rightStyle} />
          <div className="absolute top-0 left-1/2 w-1 h-full bg-gradient-to-b from-transparent via-[#c8a96e]/20 to-transparent -translate-x-1/2" />
        </div>
      );
    }

    function App() {
      const [mood, setMood] = useState('cosy');
      const [night, setNight] = useState(true);
      const [open, setOpen] = useState(true);
      const [intensity, setIntensity] = useState(0.65);
      const [sceneLine, setSceneLine] = useState(0);
      const sceneData = SCENES[mood];
      const lines = TYPEWRITER_LINES[mood];

      // Typewriter cycle
      useEffect(() => {
        const timer = setInterval(() => {
          setSceneLine(i => (i + 1) % lines.length);
        }, 4500);
        return () => clearInterval(timer);
      }, [mood]);

      const handleMood = (key) => { setMood(key); setSceneLine(0); };
      const sliderValue = mood === 'heroic' ? 80 : mood === 'eerie' ? 35 : 55;

      return (
        <div className="relative min-h-screen w-full overflow-hidden bg-[#0a0306]">
          {/* Deep background gradient */}
          <div className="absolute inset-0 z-[-2] bg-gradient-to-b from-[#14080c] via-[#1a0f12] to-[#0f060a]" />
          <div className="absolute inset-0 z-[-1] opacity-60" style={{ background: 'radial-gradient(ellipse at 50% 30%, rgba(200,169,110,0.08) 0%, transparent 60%), radial-gradient(ellipse at 80% 80%, rgba(142,42,58,0.15) 0%, transparent 50%)' }} />

          {/* Canvas weather */}
          <CanvasRain mood={mood} intensity={intensity / 100} night={night} />

          {/* Spotlight overlay */}
          <Spotlight />

          {/* Curtain */}
          <Curtain open={open} />

          {/* Main stage content */}
          <main className="relative z-10 h-screen flex flex-col items-center justify-center px-6 md:px-20">
            {/* Header / Title */}
            <header className="absolute top-8 md:top-14 left-0 right-0 flex items-center justify-between px-6 md:px-12 z-20">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 rounded-full border border-[#c8a96e]/30 flex items-center justify-center bg-[#c8a96e]/5 backdrop-blur-md shadow-[0_0_20px_rgba(200,169,110,0.15)]">
                  <span className="font-mono text-xs text-[#c8a96e] tracking-widest uppercase">WT</span>
                </div>
                <div className="flex flex-col">
                  <h1 className="font-display text-2xl md:text-3xl text-[#f3ead8] tracking-tight leading-none">Weather Theatre</h1>
                  <span className="font-mono text-[10px] text-[#c8a96e]/60 tracking-[0.25em] uppercase">A Climatic Stage</span>
                </div>
              </div>
              <button onClick={() => setOpen(o => !o)} className="group relative overflow-hidden rounded-full px-5 py-2.5 bg-[#c8a96e]/10 border border-[#c8a96e]/20 hover:bg-[#c8a96e]/20 transition-all duration-300 backdrop-blur-md shadow-[0_8px_30px_rgba(0,0,0,0.4)]">
                <span className="font-mono text-xs tracking-[0.15em] text-[#c8a96e] uppercase">{open ? 'Close Curtain' : 'Raise Curtain'}</span>
                <span className="absolute inset-0 pointer-events-none bg-gradient-to-r from-transparent via-[#c8a96e]/10 to-transparent translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-700" />
              </button>
            </header>

            {/* Centre stage */}
            <div className="flex-1 flex flex-col items-center justify-center text-center max-w-5xl">
              {/* Scene label */}
              <div className="mb-6 md:mb-10 flex items-center gap-4">
                <div className="w-12 md:w-16 h-px bg-gradient-to-r from-transparent via-[#c8a96e]/40 to-transparent" />
                <span className="font-mono text-[10px] md:text-xs text-[#c8a96e]/70 tracking-[0.35em] uppercase">Act {mood === 'cosy' ? 'I' : mood === 'eerie' ? 'II' : 'III'} — {sceneData.weather}</span>
                <div className="w-12 md:w-16 h-px bg-gradient-to-r from-transparent via-[#c8a96e]/40 to-transparent" />
              </div>

              <h2 className="font-display text-6xl md:text-9xl lg:text-[10rem] leading-[0.85] text-[#f3ead8] gold-glow mb-4 md:mb-6 tracking-tight">
                {night ? <span className="italic text-[#8e2a3a]">Nocturne</span> : <span>Matinée</span>}
              </h2>

              <p className="font-display text-2xl md:text-4xl lg:text-5xl text-[#c8a96e]/90 mb-8 md:mb-12">
                {sceneData.label}
              </p>

              <div className="relative min-h-[4rem] md:min-h-[6rem] w-full max-w-3xl mb-4 md:mb-6">
                <p key={(sceneLine + '-' + mood + '-' + (night ? 'n' : 'd'))} className="font-display italic text-xl md:text-3xl lg:text-4xl text-[#f3ead8]/90 absolute inset-0 text-center animate-[fadeIn_0.6s_ease-out]">
                  “{lines[sceneLine]}”
                </p>
              </div>

              <div className="glass-card rounded-2xl px-8 py-6 md:px-12 md:py-8 max-w-xl w-full mb-8 md:mb-12 shadow-[0_25px_60px_rgba(0,0,0,0.5)]">
                <div className="flex items-end justify-between mb-6">
                  <div>
                    <span className="font-mono text-[10px] text-[#c8a96e]/60 tracking-[0.2em] uppercase block mb-1">Forecast</span>
                    <span className="font-display text-4xl md:text-6xl text-[#f3ead8]">{sceneData.temp}°</span>
                  </div>
                  <div className="text-right">
                    <span className="font-mono text-xs text-[#c8a96e]/50 tracking-widest block">Wind</span>
                    <span className="font-display text-xl md:text-2xl text-[#f3ead8]/80">{mood === 'heroic' ? '28 kn' : mood === 'eerie' ? '6 kn' : '14 kn'}</span>
                  </div>
                </div>
                <div className="w-full h-px bg-gradient-to-r from-transparent via-[#c8a96e]/20 to-transparent mb-5" />
                <div className="flex items-center justify-between text-[#f3ead8]/60">
                  <span className="font-mono text-xs tracking-wide">Humidity {mood === 'heroic' ? 42 : mood === 'eerie' ? 88 : 72}%</span>
                  <span className="font-mono text-xs tracking-wide">Visibility {mood === 'heroic' ? 'High' : mood === 'eerie' ? 'Low' : 'Moderate'}</span>
                </div>
              </div>
            </div>

            {/* Controls */}
            <section className="absolute bottom-8 md:bottom-12 left-0 right-0 px-6 md:px-16 z-20">
              <div className="max-w-5xl mx-auto">
                {/* Mood sliders */}
                <div className="glass-card rounded-xl p-6 md:p-8 mb-5 shadow-[0_25px_60px_rgba(0,0,0,0.5)]">
                  <div className="flex items-center justify-between mb-5">
                    <h3 className="font-display text-xl md:text-2xl text-[#f3ead8]">Stage Direction</h3>
                    <div className="flex gap-2">
                      {Object.entries(SCENES).map(([k, s]) => (
                        <button key={k} onClick={() => handleMood(k)} className={`px-3 py-1.5 rounded-full text-[10px] md:text-xs font-mono tracking-widest uppercase border transition-all duration-300 ${mood === k ? 'bg-[#c8a96e]/20 border-[#c8a96e]/60 text-[#c8a96e]' : 'bg-transparent border-white/10 text-[#f3ead8]/40 hover:border-[#c8a96e]/30 hover:text-[#f3ead8]/70'}`}>
                          {s.weather}
                        </button>
                      ))}
                    </div>
                  </div>
                  <div className="grid grid-cols-1 md:grid-cols-3 gap-6 md:gap-10">
                    <div>
                      <div className="flex justify-between mb-2">
                        <span className="font-mono text-[10px] text-[#c8a96e]/70 tracking-[0.15em] uppercase">Cosy</span>
                        <span className="font-mono text-xs text-[#f3ead8]/80">{mood === 'cosy' ? 'Active' : 'Off'}</span>
                      </div>
                      <input type="range" min={0} max={100} value={mood === 'cosy' ? 100 : 0} onChange={() => handleMood('cosy')} readOnly={false} onMouseDown={() => handleMood('cosy')} className="w-full" />
                    </div>
                    <div>
                      <div className="flex justify-between mb-2">
                        <span className="font-mono text-[10px] text-[#8e68a0]/70 tracking-[0.15em] uppercase">Eerie</span>
                        <span className="font-mono text-xs text-[#f3ead8]/80">{mood === 'eerie' ? 'Active' : 'Off'}</span>
                      </div>
                      <input type="range" min={0} max={100} value={mood === 'eerie' ? 100 : 0} onChange={() => handleMood('eerie')} readOnly={false} onMouseDown={() => handleMood('eerie')} className="w-full" />
                    </div>
                    <div>
                      <div className="flex justify-between mb-2">
                        <span className="font-mono text-[10px] text-[#e2b07a]/70 tracking-[0.15em] uppercase">Heroic</span>
                        <span className="font-mono text-xs text-[#f3ead8]/80">{mood === 'heroic' ? 'Active' : 'Off'}</span>
                      </div>
                      <input type="range" min={0} max={100} value={mood === 'heroic' ? 100 : 0} onChange={() => handleMood('heroic')} readOnly={false} onMouseDown={() => handleMood('heroic')} className="w-full" />
                    </div>
                  </div>
                </div>

                {/* Toggle + Intensity row */}
                <div className="flex flex-col md:flex-row items-start md:items-center gap-6 md:gap-12">
                  <button onClick={() => setNight(n => !n)} className={`relative overflow-hidden rounded-full px-7 py-3.5 border transition-all duration-300 backdrop-blur-md shadow-[0_8px_30px_rgba(0,0,0,0.4)] ${night ? 'bg-[#8e2a3a]/15 border-[#8e2a3a]/40 hover:bg-[#8e2a3a]/25' : 'bg-[#c8a96e]/10 border-[#c8a96e]/30 hover:bg-[#c8a96e]/20'}`}>
                    <span className="font-mono text-xs tracking-[0.2em] uppercase text-[#f3ead8]/80">{night ? 'Matinée' : 'Night'} Show</span>
                    <span className="absolute inset-0 pointer-events-none bg-gradient-to-r from-transparent via-[#c8a96e]/5 to-transparent translate-x-[-100%] hover:translate-x-[100%] transition-transform duration-700" />
                  </button>

                  <div className="flex-1 w-full md:max-w-md">
                    <div className="flex justify-between mb-2">
                      <span className="font-mono text-[10px] text-[#c8a96e]/70 tracking-[0.15em] uppercase">Intensity</span>
                      <span className="font-mono text-xs text-[#f3ead8]/60">{Math.round(intensity)}%</span>
                    </div>
                    <input type="range" min={10} max={100} value={intensity} onChange={e => setIntensity(Number(e.target.value))} className="w-full" />
                  </div>
                </div>
              </div>
            </section>
          </main>

          {/* Parallax backdrop layers */}
          <div className="absolute inset-0 z-[-1] pointer-events-none overflow-hidden">
            <div className="absolute top-[10%] left-[5%] w-[60vw] h-[60vh] rounded-full bg-[#8e2a3a]/10 blur-[120px]" style={{ transform: `translate(${(sliderValue - 50) * -0.15}px, ${(sliderValue - 50) * -0.08}px)` }} />
            <div className="absolute bottom-[5%] right-[5%] w-[50vw] h-[40vh] rounded-full bg-[#c8a96e]/8 blur-[100px]" style={{ transform: `translate(${(sliderValue - 50) * 0.12}px, ${(sliderValue - 50) * 0.06}px)` }} />
          </div>

          {/* Footer */}
          <footer className="absolute bottom-2 left-0 right-0 text-center z-20 pointer-events-none">
            <p className="font-mono text-[9px] text-[#f3ead8]/20 tracking-[0.3em]">NO EXTERNAL DATA — PURE THEATRE</p>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</body>
</html>
