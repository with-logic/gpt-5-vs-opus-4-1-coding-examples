<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Holiday Card for Kids ❄️</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&family=Bubblegum+Sans&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            'fun': ['"Fredoka One"', 'cursive'],
            'kids': ['"Bubblegum Sans"', 'cursive'],
            'body': ['"Nunito"', 'sans-serif'],
          },
          colors: {
            'candy-red': '#FF6B6B',
            'candy-green': '#4ECDC4',
            'candy-yellow': '#FFE66D',
            'candy-pink': '#FF9FF3',
            'candy-purple': '#9B59B6',
            'frost-blue': '#A8E6FF',
            'snow-white': '#FFFEF8',
            'pine-green': '#2E7D32',
            'berry-red': '#C62828',
          }
        }
      }
    }
  </script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: linear-gradient(135deg, #0B1A2A 0%, #153A5B 40%, #1B3A6B 100%);
      height: 100vh;
      width: 100vw;
      user-select: none;
      -webkit-user-select: none;
    }

    /* Snow particles */
    .snowflake {
      position: fixed;
      top: -10px;
      color: rgba(255,255,255,0.9);
      pointer-events: none;
      z-index: 9999;
      animation: fall linear infinite;
      text-shadow: 0 0 8px rgba(255,255,255,0.8);
    }
    @keyframes fall {
      0% { transform: translateY(-10px) rotate(0deg); }
      100% { transform: translateY(110vh) rotate(720deg); }
    }

    /* Card glow */
    .card-glow {
      box-shadow:
        0 0 40px rgba(255,230,200,0.4),
        0 0 80px rgba(255,200,170,0.25),
        inset 0 0 60px rgba(255,245,230,0.15);
    }

    /* Ornament shimmer */
    @keyframes shimmer {
      0% { filter: drop-shadow(0 0 4px rgba(255,255,255,0.3)); }
      50% { filter: drop-shadow(0 0 12px rgba(255,255,255,0.7)); }
      100% { filter: drop-shadow(0 0 4px rgba(255,255,255,0.3)); }
    }

    /* Bouncy animation */
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      30% { transform: translateY(-8px); }
      60% { transform: translateY(-3px); }
    }
    .bounce-anim { animation: bounce 0.6s ease; }

    /* Wiggle */
    @keyframes wiggle {
      0% { transform: rotate(-3deg); }
      25% { transform: rotate(3deg); }
      50% { transform: rotate(-2deg); }
      75% { transform: rotate(2deg); }
      100% { transform: rotate(0); }
    }
    .wiggle { animation: wiggle 0.4s ease; }

    /* Twinkle stars */
    @keyframes twinkle {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.3); }
    }

    /* Draggable item hover */
    .draggable:hover {
      transform: scale(1.1) rotate(-2deg);
      filter: drop-shadow(0 8px 20px rgba(0,0,0,0.3));
      cursor: grab;
    }
    .draggable:active { cursor: grabbing; }

    /* Background decorative circles */
    .bg-bubble {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.35;
      pointer-events: none;
    }
  </style>
</head>

<body class="font-body text-slate-800 overflow-hidden relative">

  <!-- Background bubbles -->
  <div class="bg-bubble bg-candy-red w-[500px] h-[500px] -top-40 -left-32"></div>
  <div class="bg-bubble bg-candy-purple w-[400px] h-[400px] top-1/3 -right-20"></div>
  <div class="bg-bubble bg-candy-green w-[350px] h-[350px] bottom-10 left-20"></div>

  <!-- Snow -->
  <div id="snow-container"></div>

  <!-- Header -->
  <header class="absolute top-4 left-1/2 -translate-x-1/2 z-50 text-center pointer-events-none">
    <h1 class="font-fun text-5xl md:text-7xl text-transparent bg-clip-text bg-gradient-to-r from-candy-red via-candy-yellow via-candy-green to-candy-pink drop-shadow-[0_4px_20px_rgba(255,255,255,0.6)] tracking-wide leading-tight">
      Magic Holiday Card
    </h1>
    <p class="font-kids text-xl md:text-2xl text-white/90 mt-2 drop-shadow-md animate-pulse">
      ✨ Drag things onto the card! Click sounds! ✨
    </p>
  </header>

  <!-- Main Card Area -->
  <main class="absolute inset-0 flex items-center justify-center p-6 md:p-16">

    <!-- The Card -->
    <div id="card-area"
      class="relative w-full max-w-[960px] h-[78vh] md:h-[82vh] bg-gradient-to-br from-[#FFF8F0] via-[#FFF5E6] to-[#FFF0E0] rounded-[3rem] card-glow overflow-hidden shadow-2xl border-4 border-white/60"
      onclick="playJingle()"
    >

      <!-- Card decorative border pattern -->
      <div class="absolute inset-4 border-2 border-dashed border-candy-red/20 rounded-[2.5rem] pointer-events-none"></div>

      <!-- Background winter scene inside card -->
      <div class="absolute inset-0 overflow-hidden rounded-[2.5rem]">
        <!-- Sky -->
        <div class="absolute inset-0 bg-gradient-to-b from-[#B3E0FF] via-[#87CEEB] to-[#CBE8F8]"></div>
        <!-- Mountains -->
        <svg class="absolute bottom-0 left-0 w-full h-[40%] opacity-70" viewBox="0 0 960 300" preserveAspectRatio="none">
          <path d="M0,300 L80,120 L200,220 L320,50 L440,180 L580,60 L720,190 L880,40 L960,160 L960,300 Z" fill="#E0F7FA" opacity="0.7"/>
          <path d="M0,300 L120,200 L260,280 L400,130 L540,250 L680,100 L820,230 L960,140 L960,300 Z" fill="#B2DFDB" opacity="0.8"/>
        </svg>
        <!-- Sun -->
        <div class="absolute top-10 right-20 w-16 h-16 md:w-24 md:h-24 rounded-full bg-gradient-to-b from-candy-yellow to-candy-yellow/70 shadow-[0_0_40px_rgba(255,230,109,0.6)]"></div>
        <!-- Clouds -->
        <div class="absolute top-16 left-16 md:left-24 opacity-80 animate-[float_8s_ease-in-out_infinite]">
          <svg width="120" height="50" viewBox="0 0 120 50"><ellipse cx="30" cy="25" rx="30" ry="20" fill="#fff" opacity="0.85"/><ellipse cx="70" cy="20" rx="28" ry="18" fill="#fff" opacity="0.85"/><ellipse cx="100" cy="28" rx="22" ry="14" fill="#fff" opacity="0.85"/></svg>
        </div>
        <div class="absolute top-36 left-1/2 md:left-[60%] opacity-60 animate-[float_10s_ease-in-out_infinite_reverse]">
          <svg width="100" height="40" viewBox="0 0 100 40"><ellipse cx="25" cy="20" rx="25" ry="15" fill="#fff" opacity="0.8"/><ellipse cx="60" cy="18" rx="22" ry="12" fill="#fff" opacity="0.8"/></svg>
        </div>
      </div>

      <!-- Pre-placed decorations -->
      <div id="placed-items" class="absolute inset-0 pointer-events-none">
        <!-- Pre-placed cute tree -->
        <div class="absolute bottom-[22%] left-[8%] md:left-[12%] pointer-events-auto draggable" data-type="tree">
          <div class="text-7xl md:text-9xl filter drop-shadow-xl hover:scale-110 transition-transform duration-300 cursor-grab active:cursor-grabbing" onclick="playPop(event)">
            🎄
          </div>
        </div>
        <!-- Snowman -->
        <div class="absolute bottom-[18%] right-[10%] md:right-[16%] pointer-events-auto draggable" data-type="snowman">
          <div class="text-6xl md:text-8xl filter drop-shadow-xl hover:scale-110 transition-transform duration-300 cursor-grab active:cursor-grabbing" onclick="playPop(event)">
            ⛄
          </div>
        </div>
        <!-- Candy cane -->
        <div class="absolute top-[28%] left-[20%] md:left-[28%] pointer-events-auto draggable" data-type="candy">
          <div class="text-5xl md:text-7xl filter drop-shadow-xl hover:rotate-12 transition-transform duration-300 cursor-grab active:cursor-grabbing" onclick="playPop(event)">
            🍭
          </div>
        </div>
        <!-- Gift -->
        <div class="absolute top-[20%] right-[22%] md:right-[30%] pointer-events-auto draggable" data-type="gift">
          <div class="text-6xl md:text-8xl filter drop-shadow-xl hover:-rotate-6 transition-transform duration-300 cursor-grab active:cursor-grabbing" onclick="playPop(event)">
            🎁
          </div>
        </div>
      </div>

      <!-- Title inside card -->
      <div class="absolute top-8 left-0 right-0 text-center z-10 pointer-events-none">
        <h2 class="font-fun text-4xl md:text-6xl text-candy-red drop-shadow-[0_4px_10px_rgba(255,255,255,0.9)] tracking-wide">
          Happy Holidays!
        </h2>
        <p class="font-kids text-lg md:text-2xl text-pine-green mt-2 drop-shadow-sm">
          Wishing you snow much fun! ❄️
        </p>
      </div>

      <!-- Drop hint area -->
      <div class="absolute bottom-6 left-0 right-0 text-center z-20 pointer-events-none">
        <div class="inline-block bg-white/40 backdrop-blur-md rounded-full px-6 py-2 border border-white/40 shadow-lg">
          <p class="font-body text-sm md:text-base text-slate-700 font-bold tracking-wide">
            <i class="fa-solid fa-hand-pointer text-candy-red animate-bounce"></i>
            Drag decorations onto the card!
          </p>
        </div>
      </div>

    </div>
  </main>

  <!-- Decoration Palette (bottom) -->
  <aside id="palette"
    class="absolute bottom-4 left-1/2 -translate-x-1/2 z-40 bg-white/20 backdrop-blur-xl rounded-3xl p-4 md:p-5 shadow-2xl border border-white/30 flex gap-4 md:gap-6 items-center overflow-x-auto max-w-[95vw]"
  >
    <div class="text-xs md:text-sm font-fun text-white/90 shrink-0 whitespace-nowrap drop-shadow">Drag me! 👇</div>

    <!-- Draggable items -->
    <div draggable="true" ondragstart="drag(event)" onclick="playPop(event)" class="draggable bg-white/70 rounded-2xl p-2 md:p-3 shadow-lg hover:shadow-2xl transition-all shrink-0 flex flex-col items-center gap-1 cursor-grab active:cursor-grabbing group" data-emoji="🎅">
      <span class="text-4xl md:text-5xl group-hover:scale-125 transition-transform">🎅</span>
      <span class="text-[10px] md:text-xs font-bold text-slate-600">Santa</span>
    </div>
    <div draggable="true" ondragstart="drag(event)" onclick="playPop(event)" class="draggable bg-white/70 rounded-2xl p-2 md:p-3 shadow-lg hover:shadow-2xl transition-all shrink-0 flex flex-col items-center gap-1 cursor-grab active:cursor-grabbing group" data-emoji="🦌">
      <span class="text-4xl md:text-5xl group-hover:scale-125 transition-transform">🦌</span>
      <span class="text-[10px] md:text-xs font-bold text-slate-600">Reindeer</span>
    </div>
    <div draggable="true" ondragstart="drag(event)" onclick="playPop(event)" class="draggable bg-white/70 rounded-2xl p-2 md:p-3 shadow-lg hover:shadow-2xl transition-all shrink-0 flex flex-col items-center gap-1 cursor-grab active:cursor-grabbing group" data-emoji="⭐">
      <span class="text-4xl md:text-5xl group-hover:scale-125 transition-transform">⭐</span>
      <span class="text-[10px] md:text-xs font-bold text-slate-600">Star</span>
    </div>
    <div draggable="true" ondragstart="drag(event)" onclick="playPop(event)" class="draggable bg-white/70 rounded-2xl p-2 md:p-3 shadow-lg hover:shadow-2xl transition-all shrink-0 flex flex-col items-center gap-1 cursor-grab active:cursor-grabbing group" data-emoji="🎀">
      <span class="text-4xl md:text-5xl group-hover:scale-125 transition-transform">🎀</span>
      <span class="text-[10px] md:text-xs font-bold text-slate-600">Bow</span>
    </div>
    <div draggable="true" ondragstart="drag(event)" onclick="playPop(event)" class="draggable bg-white/70 rounded-2xl p-2 md:p-3 shadow-lg hover:shadow-2xl transition-all shrink-0 flex flex-col items-center gap-1 cursor-grab active:cursor-grabbing group" data-emoji="🧦">
      <span class="text-4xl md:text-5xl group-hover:scale-125 transition-transform">🧦</span>
      <span class="text-[10px] md:text-xs font-bold text-slate-600">Stocking</span>
    </div>
    <div draggable="true" ondragstart="drag(event)" onclick="playPop(event)" class="draggable bg-white/70 rounded-2xl p-2 md:p-3 shadow-lg hover:shadow-2xl transition-all shrink-0 flex flex-col items-center gap-1 cursor-grab active:cursor-grabbing group" data-emoji="🔔">
      <span class="text-4xl md:text-5xl group-hover:scale-125 transition-transform">🔔</span>
      <span class="text-[10px] md:text-xs font-bold text-slate-600">Bell</span>
    </div>
    <div draggable="true" ondragstart="drag(event)" onclick="playPop(event)" class="draggable bg-white/70 rounded-2xl p-2 md:p-3 shadow-lg hover:shadow-2xl transition-all shrink-0 flex flex-col items-center gap-1 cursor-grab active:cursor-grabbing group" data-emoji="🍪">
      <span class="text-4xl md:text-5xl group-hover:scale-125 transition-transform">🍪</span>
      <span class="text-[10px] md:text-xs font-bold text-slate-600">Cookie</span>
    </div>
    <div draggable="true" ondragstart="drag(event)" onclick="playPop(event)" class="draggable bg-white/70 rounded-2xl p-2 md:p-3 shadow-lg hover:shadow-2xl transition-all shrink-0 flex flex-col items-center gap-1 cursor-grab active:cursor-grabbing group" data-emoji="🕯️">
      <span class="text-4xl md:text-5xl group-hover:scale-125 transition-transform">🕯️</span>
      <span class="text-[10px] md:text-xs font-bold text-slate-600">Candle</span>
    </div>
  </aside>

  <script>
    // ====== AUDIO ======
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;
    let isAudioReady = false;

    function initAudio() {
      if (audioCtx) return;
      audioCtx = new AudioCtx();
      isAudioReady = true;
    }

    function playTone(freq, type, duration, gainVal = 0.15) {
      try {
        initAudio();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        gain.gain.setValueAtTime(gainVal, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
      } catch (e) { console.log('Audio error:', e); }
    }

    function playPop(e) {
      if (e && e.stopPropagation) e.stopPropagation();
      playTone(880, 'sine', 0.08, 0.12);
      setTimeout(() => playTone(1200, 'triangle', 0.12, 0.08), 60);
      const el = e ? e.currentTarget : document.activeElement;
      if (el) {
        el.classList.remove('bounce-anim');
        void el.offsetWidth;
        el.classList.add('bounce-anim');
        setTimeout(() => el.classList.remove('bounce-anim'), 600);
      }
    }

    function playJingle() {
      try {
        initAudio();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const notes = [
          { f: 523, t: 0.12, d: 0.2 }, // C5
          { f: 659, t: 0.12, d: 0.2 }, // E5
          { f: 784, t: 0.12, d: 0.2 }, // G5
          { f: 1047, t: 0.3, d: 0.35 }, // C6
        ];
        notes.forEach((n, i) => {
          setTimeout(() => playTone(n.f, 'triangle', n.d, 0.1), i * 150);
        });
      } catch (e) {}
    }

    function playDropSound() {
      playTone(440, 'sine', 0.1, 0.08);
      setTimeout(() => playTone(660, 'triangle', 0.15, 0.06), 80);
    }

    // ====== DRAG & DROP ======
    function drag(ev) {
      ev.dataTransfer.setData("text/plain", ev.target.getAttribute('data-emoji'));
      ev.dataTransfer.setData("text/html", ev.target.innerHTML);
      ev.dataTransfer.effectAllowed = "copy";
    }

    document.getElementById('card-area').addEventListener('dragover', function(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'copy';
    });

    document.getElementById('card-area').addEventListener('drop', function(e) {
      e.preventDefault();
      const emoji = e.dataTransfer.getData("text/plain");
      if (!emoji) return;
      playDropSound();

      const rect = this.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;

      const item = document.createElement('div');
      item.className = 'absolute pointer-events-auto draggable';
      item.style.left = Math.min(Math.max(x - 30, 10), rect.width - 80) + 'px';
      item.style.top = Math.min(Math.max(y - 30, 40), rect.height - 80) + 'px';
      item.innerHTML = `
        <div onclick="playPop(event)" class="text-5xl md:text-7xl filter drop-shadow-lg hover:scale-125 hover:rotate-6 transition-all duration-300 cursor-grab active:cursor-grabbing wiggle">
          ${emoji}
        </div>
      `;
      this.querySelector('#placed-items').appendChild(item);
    });

    // ====== SNOW ======
    function spawnSnow() {
      const container = document.getElementById('snow-container');
      const snowflake = document.createElement('div');
      snowflake.className = 'snowflake';
      snowflake.innerHTML = Math.random() > 0.5 ? '❄' : '❅';
      snowflake.style.left = Math.random() * 100 + 'vw';
      snowflake.style.fontSize = (10 + Math.random() * 18) + 'px';
      snowflake.style.animationDuration = (4 + Math.random() * 6) + 's';
      snowflake.style.animationDelay = Math.random() * 4 + 's';
      snowflake.style.opacity = 0.4 + Math.random() * 0.6;
      container.appendChild(snowflake);
      setTimeout(() => snowflake.remove(), 12000);
    }
    setInterval(spawnSnow, 250);
    for (let i = 0; i < 20; i++) setTimeout(spawnSnow, i * 300);

    // ====== INIT ======
    document.addEventListener('DOMContentLoaded', () => {
      // Pre-placed items get wiggle on load
      document.querySelectorAll('#placed-items .draggable > div').forEach(el => {
        setTimeout(() => {
          el.classList.add('wiggle');
          setTimeout(() => el.classList.remove('wiggle'), 400);
        }, 300 + Math.random() * 600);
      });
    });
  </script>
</body>
</html>
