<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <title>Virtual Drum Kit</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['"Bebas Neue"', 'sans-serif'],
            body: ['"Outfit"', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'monospace'],
          },
          colors: {
            studio: {
              bg: '#0b0c15',
              surface: '#12131f',
              panel: '#181a2e',
              card: '#1e2133',
              accent: '#e94560',
              gold: '#f0c040',
              cyan: '#00d4ff',
              purple: '#a855f7',
              green: '#00e676',
            }
          },
          boxShadow: {
            'glow-red': '0 0 40px rgba(233,69,96,0.35)',
            'glow-cyan': '0 0 40px rgba(0,212,255,0.35)',
            'glow-gold': '0 0 40px rgba(240,192,64,0.35)',
          }
        }
      }
    }
  </script>

  <style>
    html { scroll-behavior: smooth; }
    body {
      background-color: #0b0c15;
      background-image:
        radial-gradient(circle at 20% 30%, rgba(233,69,96,0.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(0,212,255,0.08) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(168,85,247,0.06) 0%, transparent 60%);
      color: #e8e9f0;
      overflow-x: hidden;
    }

    /* Subtle scanlines overlay */
    .scanlines {
      pointer-events: none;
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        rgba(255,255,255,0.015) 0px,
        rgba(255,255,255,0.015) 1px,
        transparent 1px,
        transparent 3px
      );
      z-index: 9999;
    }

    /* Pad shadow glow when active */
    .pad-active {
      box-shadow: 0 0 60px rgba(233,69,96,0.6), 0 0 120px rgba(233,69,96,0.25) !important;
      transform: scale(0.96) !important;
    }
    .pad-active-cyan { box-shadow: 0 0 60px rgba(0,212,255,0.6), 0 0 120px rgba(0,212,255,0.25) !important; transform: scale(0.96) !important; }
    .pad-active-gold { box-shadow: 0 0 60px rgba(240,192,64,0.6), 0 0 120px rgba(240,192,64,0.25) !important; transform: scale(0.96) !important; }
    .pad-active-purple { box-shadow: 0 0 60px rgba(168,85,247,0.6), 0 0 120px rgba(168,85,247,0.25) !important; transform: scale(0.96) !important; }
    .pad-active-green { box-shadow: 0 0 60px rgba(0,230,118,0.6), 0 0 120px rgba(0,230,118,0.25) !important; transform: scale(0.96) !important; }

    /* Ripple effect on click */
    .ripple-container { position: relative; overflow: hidden; }
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.35);
      transform: scale(0);
      animation: rippleAnim 0.6s ease-out forwards;
      pointer-events: none;
    }
    @keyframes rippleAnim {
      to { transform: scale(4); opacity: 0; }
    }

    /* Timeline bar animation */
    @keyframes playHead {
      from { left: 0%; }
      to { left: 100%; }
    }
    .playhead-anim {
      animation: playHead linear forwards;
      animation-play-state: running;
    }
    .playhead-paused {
      animation-play-state: paused;
    }

    /* Glowing text */
    .text-glow { text-shadow: 0 0 30px rgba(233,69,96,0.5); }

    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #0b0c15; }
    ::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #e94560, #a855f7); border-radius: 4px; }

    /* Key label style */
    .key-badge {
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.05em;
    }
  </style>
</head>

<body class="font-body min-h-screen flex flex-col">
  <div class="scanlines"></div>

  <!-- Header -->
  <header class="relative z-10 pt-10 pb-6 px-6 text-center">
    <div class="inline-block mb-2 px-3 py-1 rounded-full bg-studio-panel/60 border border-white/5 text-xs font-mono text-studio-cyan tracking-wider uppercase backdrop-blur-md">
      <i class="fa-solid fa-drum mr-2"></i>Live Studio
    </div>
    <h1 class="font-display text-6xl md:text-8xl tracking-tight text-white text-glow leading-none mb-2">
      VIRTUAL DRUM KIT
    </h1>
    <p class="text-studio-300/80 text-sm md:text-base font-light tracking-wide max-w-md mx-auto">
      Hit the pads. Feel the beat. Record your groove and play it back.
    </p>
  </header>

  <!-- Main Content -->
  <main class="flex-1 px-4 md:px-8 lg:px-12 pb-12">

    <!-- Drum Grid -->
    <section id="drumGrid" class="grid grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4 md:gap-6 max-w-6xl mx-auto mb-16" aria-label="Drum pads"></section>

    <!-- Controls & Info -->
    <section class="max-w-4xl mx-auto space-y-8">

      <!-- Status / Key Guide -->
      <div class="flex flex-wrap justify-center gap-2 md:gap-3 text-xs md:text-sm font-mono text-white/40">
        <span class="px-2 py-0.5 rounded bg-studio-surface border border-white/5">Q W E R A S D F</span>
        <span class="px-2 py-0.5 rounded bg-studio-surface border border-white/5">Z X C V</span>
        <span class="hidden md:inline text-studio-cyan">Click or tap pads</span>
      </div>

      <!-- Record / Playback -->
      <div class="bg-studio-panel/60 backdrop-blur-xl border border-white/[0.06] rounded-3xl p-6 md:p-8 shadow-2xl relative overflow-hidden">
        <!-- Decorative background glow -->
        <div class="absolute -top-20 -right-20 w-64 h-64 bg-studio-accent/10 rounded-full blur-[80px] pointer-events-none"></div>
        <div class="absolute -bottom-16 -left-16 w-48 h-48 bg-studio-cyan/10 rounded-full blur-[60px] pointer-events-none"></div>

        <div class="relative z-10 flex flex-col md:flex-row items-center justify-between gap-6">
          <!-- Mode Toggle -->
          <div class="flex items-center gap-3 bg-studio-bg rounded-2xl p-1.5 border border-white/[0.06] shadow-inner">
            <button onclick="setMode('live')" id="btnLive" class="px-5 py-2.5 rounded-xl text-sm font-semibold transition-all bg-studio-accent text-white shadow-glow-red">
              <i class="fa-solid fa-bolt mr-2"></i>Live
            </button>
            <button onclick="setMode('record')" id="btnRecord" class="px-5 py-2.5 rounded-xl text-sm font-semibold transition-all text-studio-300 hover:text-white hover:bg-white/5">
              <i class="fa-solid fa-circle mr-2 text-xs"></i>Record
            </button>
            <button onclick="setMode('playback')" id="btnPlayback" class="px-5 py-2.5 rounded-xl text-sm font-semibold transition-all text-studio-300 hover:text-white hover:bg-white/5">
              <i class="fa-solid fa-play mr-2"></i>Playback
            </button>
          </div>

          <!-- Timer / Status -->
          <div class="flex items-center gap-6 text-sm">
            <div class="text-center">
              <div id="timerDisplay" class="font-mono text-2xl font-bold text-white tracking-tight">00:00</div>
              <div class="text-xs text-studio-300/50 font-mono mt-0.5">DURATION</div>
            </div>
            <div class="w-px h-10 bg-white/10"></div>
            <div class="text-center">
              <div id="eventCount" class="font-mono text-2xl font-bold text-studio-cyan">0</div>
              <div class="text-xs text-studio-300/50 font-mono mt-0.5">EVENTS</div>
            </div>
            <div class="w-px h-10 bg-white/10 hidden md:block"></div>
            <div class="hidden md:block text-center">
              <div id="recStatus" class="text-xs text-studio-300/40 font-mono">READY</div>
            </div>
          </div>
        </div>

        <!-- Timeline -->
        <div class="mt-6 relative h-10 bg-studio-surface/60 rounded-xl overflow-hidden border border-white/[0.05] shadow-inner">
          <div id="timelineTrack" class="absolute top-0 left-0 h-full w-full"></div>
          <div id="playhead" class="absolute top-0 h-full w-0.5 bg-gradient-to-b from-transparent via-studio-cyan to-transparent shadow-[0_0_10px_#00d4ff] z-20" style="left: 0%; display: none;"></div>
          <div class="absolute inset-0 flex items-center justify-center text-[10px] text-white/20 font-mono tracking-widest">TIMELINE</div>
        </div>

        <!-- Playback Controls -->
        <div class="mt-6 flex items-center justify-center gap-4">
          <button onclick="startPlayback()" id="btnPlay" disabled class="px-6 py-3 rounded-full bg-studio-cyan text-studio-bg font-extrabold text-sm shadow-glow-cyan hover:scale-105 active:scale-95 transition-transform disabled:opacity-30 disabled:pointer-events-none disabled:hover:scale-100">
            <i class="fa-solid fa-play mr-2"></i>Play Back
          </button>
          <button onclick="clearRecording()" class="px-5 py-3 rounded-full bg-studio-surface border border-white/10 text-studio-300 hover:text-white hover:border-white/20 transition-colors text-sm font-semibold">
            <i class="fa-solid fa-trash-can mr-2"></i>Clear
          </button>
        </div>
      </div>

      <!-- Legend -->
      <div class="grid grid-cols-2 md:grid-cols-4 gap-3 max-w-3xl mx-auto text-xs md:text-sm">
        <div class="bg-studio-card/40 border border-white/[0.05] rounded-2xl p-4 flex items-center gap-3 hover:border-studio-accent/30 transition-colors">
          <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-studio-accent to-rose-700 flex items-center justify-center shadow-glow-red flex-shrink-0">
            <i class="fa-solid fa-cube text-white"></i>
          </div>
          <div>
            <div class="font-bold text-white">Kick</div>
            <div class="text-studio-300/50 font-mono text-xs">Q</div>
          </div>
        </div>
        <div class="bg-studio-card/40 border border-white/[0.05] rounded-2xl p-4 flex items-center gap-3 hover:border-studio-cyan/30 transition-colors">
          <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-studio-cyan to-blue-700 flex items-center justify-center shadow-glow-cyan flex-shrink-0">
            <i class="fa-solid fa-bolt text-white"></i>
          </div>
          <div>
            <div class="font-bold text-white">Snare</div>
            <div class="text-studio-300/50 font-mono text-xs">W</div>
          </div>
        </div>
        <div class="bg-studio-card/40 border border-white/[0.05] rounded-2xl p-4 flex items-center gap-3 hover:border-studio-gold/30 transition-colors">
          <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-studio-gold to-amber-700 flex items-center justify-center shadow-glow-gold flex-shrink-0">
            <i class="fa-solid fa-star text-white"></i>
          </div>
          <div>
            <div class="font-bold text-white">Hi-Hat</div>
            <div class="text-studio-300/50 font-mono text-xs">E</div>
          </div>
        </div>
        <div class="bg-studio-card/40 border border-white/[0.05] rounded-2xl p-4 flex items-center gap-3 hover:border-studio-purple/30 transition-colors">
          <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-studio-purple to-fuchsia-700 flex items-center justify-center shadow-glow-cyan flex-shrink-0">
            <i class="fa-solid fa-meteor text-white"></i>
          </div>
          <div>
            <div class="font-bold text-white">Tom</div>
            <div class="text-studio-300/50 font-mono text-xs">R</div>
          </div>
        </div>
      </div>

    </section>

  </main>

  <!-- Footer -->
  <footer class="text-center text-[10px] md:text-xs text-studio-300/20 font-mono pb-6 select-none">
    VIRTUAL DRUM KIT • SYNTHESIZED AUDIO • NO EXTERNAL FILES
  </footer>

  <script>
    // =====================================================
    // Drum Definitions
    // =====================================================
    const drums = [
      { id: 'kick', name: 'Kick Drum', label: 'KICK', key: 'Q', color: 'from-rose-600 to-red-900', glow: 'red', icon: 'fa-cube', desc: 'Deep low-end thump' },
      { id: 'snare', name: 'Snare', label: 'SNARE', key: 'W', color: 'from-cyan-500 to-blue-800', glow: 'cyan', icon: 'fa-bolt', desc: 'Crisp snap' },
      { id: 'hihat-closed', name: 'Closed Hi-Hat', label: 'CLOSED HI-HAT', key: 'E', color: 'from-amber-400 to-yellow-700', glow: 'gold', icon: 'fa-star', desc: 'Tight metallic tick' },
      { id: 'hihat-open', name: 'Open Hi-Hat', label: 'OPEN HI-HAT', key: 'R', color: 'from-yellow-300 to-orange-600', glow: 'gold', icon: 'fa-star', desc: 'Sizzling cymbal' },
      { id: 'tom-high', name: 'High Tom', label: 'HIGH TOM', key: 'A', color: 'from-violet-500 to-purple-800', glow: 'purple', icon: 'fa-drum', desc: 'Tuned percussion' },
      { id: 'tom-mid', name: 'Mid Tom', label: 'MID TOM', key: 'S', color: 'from-indigo-500 to-blue-900', glow: 'cyan', icon: 'fa-drum', desc: 'Punchy tone' },
      { id: 'tom-low', name: 'Low Tom', label: 'LOW TOM', key: 'D', color: 'from-rose-500 to-red-800', glow: 'red', icon: 'fa-drum', desc: 'Deep resonance' },
      { id: 'crash', name: 'Crash Cymbal', label: 'CRASH', key: 'F', color: 'from-amber-300 to-amber-600', glow: 'gold', icon: 'fa-bell', desc: 'Bright explosion' },
      { id: 'ride', name: 'Ride Cymbal', label: 'RIDE', key: 'Z', color: 'from-teal-300 to-cyan-700', glow: 'cyan', icon: 'fa-bell', desc: 'Sustained shimmer' },
      { id: 'clap', name: 'Hand Clap', label: 'CLAP', key: 'X', color: 'from-rose-300 to-rose-600', glow: 'red', icon: 'fa-hand', desc: 'Sharp transient' },
      { id: 'cowbell', name: 'Cowbell', label: 'COWBELL', key: 'C', color: 'from-orange-300 to-amber-600', glow: 'gold', icon: 'fa-cow', desc: 'Metallic clang' },
      { id: 'rimshot', name: 'Rimshot', label: 'RIMSHOT', key: 'V', color: 'from-fuchsia-400 to-pink-700', glow: 'purple', icon: 'fa-crosshairs', desc: 'Tight crack' },
    ];

    // =====================================================
    // Audio Context & Synthesizers
    // =====================================================
    let audioCtx;
    let masterGain;

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain();
        masterGain.gain.value = 0.85;
        masterGain.connect(audioCtx.destination);
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    // Drum sound generators using Web Audio API
    function playDrum(type) {
      initAudio();
      const now = audioCtx.currentTime;
      const out = masterGain;

      switch (type) {
        case 'kick': {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(150, now);
          osc.frequency.exponentialRampToValueAtTime(40, now + 0.15);
          gain.gain.setValueAtTime(1.2, now);
          gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
          osc.connect(gain);
          gain.connect(out);
          osc.start(now);
          osc.stop(now + 0.35);
          // Add click
          const clickOsc = audioCtx.createOscillator();
          const clickGain = audioCtx.createGain();
          clickOsc.type = 'triangle';
          clickOsc.frequency.setValueAtTime(1200, now);
          clickGain.gain.setValueAtTime(0.3, now);
          clickGain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
          clickOsc.connect(clickGain);
          clickGain.connect(out);
          clickOsc.start(now);
          clickOsc.stop(now + 0.05);
          break;
        }
        case 'snare': {
          const noise = audioCtx.createBufferSource();
          const noiseGain = audioCtx.createGain();
          const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.15, audioCtx.sampleRate);
          const data = buffer.getChannelData(0);
          for (let i = 0; i < buffer.length; i++) data[i] = Math.random() * 2 - 1;
          noise.buffer = buffer;
          noiseGain.gain.setValueAtTime(0.6, now);
          noiseGain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
          noise.connect(noiseGain);
          noiseGain.connect(out);
          noise.start(now);
          // Snare tone
          const osc = audioCtx.createOscillator();
          const oscGain = audioCtx.createGain();
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(200, now);
          osc.frequency.linearRampToValueAtTime(150, now + 0.05);
          oscGain.gain.setValueAtTime(0.3, now);
          oscGain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
          osc.connect(oscGain);
          oscGain.connect(out);
          osc.start(now);
          osc.stop(now + 0.12);
          noise.start(now);
          break;
        }
        case 'hihat-closed': {
          const noise = audioCtx.createBufferSource();
          const noiseGain = audioCtx.createGain();
          const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.08, audioCtx.sampleRate);
          const data = buffer.getChannelData(0);
          for (let i = 0; i < buffer.length; i++) data[i] = Math.random() * 2 - 1;
          noise.buffer = buffer;
          // Highpass filter feel via rapid decay
          noiseGain.gain.setValueAtTime(0.18, now);
          noiseGain.gain.linearRampToValueAtTime(0.01, now + 0.05);
          noise.connect(noiseGain);
          noiseGain.connect(out);
          noise.start(now);
          break;
        }
        case 'hihat-open': {
          const noise = audioCtx.createBufferSource();
          const noiseGain = audioCtx.createGain();
          const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.6, audioCtx.sampleRate);
          const data = buffer.getChannelData(0);
          for (let i = 0; i < buffer.length; i++) data[i] = (Math.random() * 2 - 1) * 0.3;
          noise.buffer = buffer;
          noiseGain.gain.setValueAtTime(0.4, now);
          noiseGain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
          noise.connect(noiseGain);
          noiseGain.connect(out);
          noise.start(now);
          break;
        }
        case 'tom-high':
        case 'tom-mid':
        case 'tom-low': {
          const freqs = { 'tom-high': 320, 'tom-mid': 200, 'tom-low': 90 };
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(freqs[type], now);
          osc.frequency.exponentialRampToValueAtTime(freqs[type] * 0.4, now + 0.12);
          gain.gain.setValueAtTime(0.6, now);
          gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
          osc.connect(gain);
          gain.connect(out);
          osc.start(now);
          osc.stop(now + 0.28);
          break;
        }
        case 'crash': {
          const noise = audioCtx.createBufferSource();
          const noiseGain = audioCtx.createGain();
          const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 1.2, audioCtx.sampleRate);
          const data = buffer.getChannelData(0);
          for (let i = 0; i < buffer.length; i++) data[i] = Math.random() * 2 - 1;
          noise.buffer = buffer;
          noiseGain.gain.setValueAtTime(0.7, now);
          noiseGain.gain.exponentialRampToValueAtTime(0.01, now + 1.0);
          noise.connect(noiseGain);
          noiseGain.connect(out);
          noise.start(now);
          break;
        }
        case 'ride': {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(3500, now);
          gain.gain.setValueAtTime(0.15, now);
          gain.gain.exponentialRampToValueAtTime(0.01, now + 0.8);
          osc.connect(gain);
          gain.connect(out);
          osc.start(now);
          osc.stop(now + 0.85);
          break;
        }
        case 'clap': {
          const noise = audioCtx.createBufferSource();
          const noiseGain = audioCtx.createGain();
          const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.1, audioCtx.sampleRate);
          const data = buffer.getChannelData(0);
          for (let i = 0; i < buffer.length; i++) data[i] = Math.random() * 2 - 1;
          noise.buffer = buffer;
          noiseGain.gain.setValueAtTime(0.5, now);
          noiseGain.gain.exponentialRampToValueAtTime(0.01, now + 0.08);
          noise.connect(noiseGain);
          noiseGain.connect(out);
          noise.start(now);
          break;
        }
        case 'cowbell': {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.type = 'square';
          osc.frequency.setValueAtTime(800, now);
          gain.gain.setValueAtTime(0.3, now);
          gain.gain.linearRampToValueAtTime(0.01, now + 0.1);
          osc.connect(gain);
          gain.connect(out);
          osc.start(now);
          osc.stop(now + 0.12);
          break;
        }
        case 'rimshot': {
          const noise = audioCtx.createBufferSource();
          const noiseGain = audioCtx.createGain();
          const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.08, audioCtx.sampleRate);
          const data = buffer.getChannelData(0);
          for (let i = 0; i < buffer.length; i++) data[i] = Math.random() * 2 - 1;
          noise.buffer = buffer;
          noiseGain.gain.setValueAtTime(0.35, now);
          noiseGain.gain.exponentialRampToValueAtTime(0.01, now + 0.06);
          noise.connect(noiseGain);
          noiseGain.connect(out);
          noise.start(now);
          break;
        }
      }
    }

    // =====================================================
    // UI Building
    // =====================================================
    const grid = document.getElementById('drumGrid');

    drums.forEach(d => {
      const card = document.createElement('button');
      card.className = `ripple-container group relative bg-studio-card/50 border border-white/[0.08] hover:border-white/20 rounded-3xl p-4 md:p-6 transition-all duration-200 hover:-translate-y-1 active:scale-[0.97] overflow-hidden select-none`;
      card.setAttribute('aria-label', d.name);
      card.setAttribute('data-id', d.id);
      card.setAttribute('data-key', d.key);

      card.innerHTML = `
        <div class="absolute top-0 right-0 p-3 opacity-10 group-hover:opacity-20 transition-opacity">
          <i class="fa-solid ${d.icon} text-5xl"></i>
        </div>
        <div class="absolute inset-0 bg-gradient-to-b ${d.color} opacity-[0.08] group-hover:opacity-[0.15] transition-opacity"></div>
        <div class="relative z-10 flex flex-col items-center gap-3">
          <div class="w-16 h-16 md:w-20 md:h-20 rounded-2xl bg-gradient-to-br ${d.color} shadow-lg flex items-center justify-center text-white/90 text-xl md:text-2xl shadow-glow-red transition-transform duration-150 group-hover:scale-105">
            <i class="fa-solid ${d.icon}"></i>
          </div>
          <div class="text-center">
            <h3 class="font-display text-xl md:text-2xl text-white leading-tight tracking-tight">${d.label}</h3>
            <div class="text-[10px] md:text-xs text-studio-300/40 font-mono uppercase tracking-widest mt-1">${d.desc}</div>
          </div>
          <span class="key-badge mt-1 px-2.5 py-0.5 rounded-md bg-studio-bg/80 border border-white/10 text-xs text-studio-cyan font-bold">${d.key}</span>
        </div>
      `;

      card.addEventListener('click', (e) => {
        hitPad(d.id, e);
      });

      grid.appendChild(card);
    });

    // =====================================================
    // Interaction
    // =====================================================
    let mode = 'live'; // live | record | playback
    let recordings = [];
    let playbackInterval = null;
    let playbackStartTime = 0;
    let recordingStart = 0;
    let timelineInterval = null;

    function setMode(m) {
      mode = m;
      document.getElementById('btnLive').className = `px-5 py-2.5 rounded-xl text-sm font-semibold transition-all ${m === 'live' ? 'bg-studio-accent text-white shadow-glow-red' : 'text-studio-300 hover:text-white hover:bg-white/5'}`;
      document.getElementById('btnRecord').className = `px-5 py-2.5 rounded-xl text-sm font-semibold transition-all ${m === 'record' ? 'bg-studio-accent text-white shadow-glow-red' : 'text-studio-300 hover:text-white hover:bg-white/5'}`;
      document.getElementById('btnPlayback').className = `px-5 py-2.5 rounded-xl text-sm font-semibold transition-all ${m === 'playback' ? 'bg-studio-cyan text-studio-bg shadow-glow-cyan' : 'text-studio-300 hover:text-white hover:bg-white/5'}`;
      document.getElementById('btnPlay').disabled = recordings.length === 0 || m !== 'playback';
      document.getElementById('recStatus').textContent = m === 'record' ? 'RECORDING' : (m === 'live' ? 'READY' : 'READY');
      document.getElementById('recStatus').className = `text-xs font-mono ${m === 'record' ? 'text-red-400 animate-pulse' : 'text-studio-300/40'}`;
      if (m === 'record') {
        recordings = [];
        recordingStart = Date.now();
        document.getElementById('eventCount').textContent = '0';
      }
    }

    function hitPad(id, event) {
      const d = drums.find(x => x.id === id);
      if (!d) return;

      // Play audio
      playDrum(id);

      // Visual ripple
      const btn = event ? event.currentTarget : document.querySelector(`[data-id="${id}"]`);
      const rect = btn.getBoundingClientRect();
      const ripple = document.createElement('span');
      ripple.className = 'ripple';
      ripple.style.width = ripple.style.height = '60px';
      ripple.style.left = (event ? event.clientX - rect.left - 30 : rect.width / 2 - 30) + 'px';
      ripple.style.top = (event ? event.clientY - rect.top - 30 : rect.height / 2 - 30) + 'px';
      btn.appendChild(ripple);
      setTimeout(() => ripple.remove(), 600);

      // Active class
      btn.classList.add('pad-active');
      setTimeout(() => btn.classList.remove('pad-active'), 150);

      // Record
      if (mode === 'record') {
        recordings.push({ time: Date.now() - recordingStart, drum: id });
        document.getElementById('eventCount').textContent = recordings.length;
        renderTimelineDots();
      }
    }

    function renderTimelineDots() {
      const track = document.getElementById('timelineTrack');
      track.innerHTML = '';
      recordings.forEach(r => {
        const dot = document.createElement('div');
        dot.className = 'absolute top-1/2 -translate-y-1/2 w-2.5 h-2.5 rounded-full bg-gradient-to-b from-studio-cyan to-blue-500 shadow-[0_0_8px_rgba(0,212,255,0.6)]';
        dot.style.left = Math.min(100, Math.max(0, (r.time / 30000) * 100)) + '%'; // scale for display
        track.appendChild(dot);
      });
    }

    function startPlayback() {
      if (recordings.length === 0) return;
      if (playbackInterval) return;

      setMode('playback');
      document.getElementById('btnPlay').disabled = true;
      document.getElementById('playhead').style.display = 'block';

      const duration = Math.max(...recordings.map(r => r.time)) + 500;
      let start = Date.now();
      document.getElementById('timerDisplay').textContent = '00:00';

      playbackInterval = setInterval(() => {
        const elapsed = Date.now() - start;
        document.getElementById('timerDisplay').textContent = formatTime(elapsed);
        document.getElementById('playhead').style.left = Math.min(100, (elapsed / duration) * 100) + '%';

        recordings.forEach(r => {
          if (Math.abs(elapsed - r.time) < 60) {
            const d = drums.find(x => x.id === r.drum);
            if (d) {
              playDrum(r.drum);
              const btn = document.querySelector(`[data-id="${r.drum}"]`);
              if (btn) {
                btn.classList.add('pad-active');
                setTimeout(() => btn.classList.remove('pad-active'), 150);
              }
            }
          }
        });

        if (elapsed > duration) {
          clearInterval(playbackInterval);
          playbackInterval = null;
          document.getElementById('btnPlay').disabled = false;
          document.getElementById('playhead').style.display = 'none';
        }
      }, 30);
    }

    function clearRecording() {
      recordings = [];
      document.getElementById('eventCount').textContent = '0';
      document.getElementById('timelineTrack').innerHTML = '';
      document.getElementById('timerDisplay').textContent = '00:00';
      document.getElementById('btnPlay').disabled = true;
      document.getElementById('playhead').style.display = 'none';
      if (playbackInterval) {
        clearInterval(playbackInterval);
        playbackInterval = null;
      }
      document.getElementById('btnPlay').disabled = true;
    }

    function formatTime(ms) {
      const s = Math.floor(ms / 1000);
      const m = Math.floor(s / 60);
      const sec = s % 60;
      return `${m.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
    }

    // =====================================================
    // Keyboard Handling
    // =====================================================
    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.repeat) return;
      const key = e.key.toUpperCase();
      const d = drums.find(x => x.key === key);
      if (d) {
        e.preventDefault();
        hitPad(d.id, { currentTarget: document.querySelector(`[data-id="${d.id}"]`) });
      }
    });

    // =====================================================
    // Init
    // =====================================================
    setMode('live');
    document.getElementById('timerDisplay').textContent = '00:00';
  </script>
</body>
</html>
