<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>US Citizenship Trivia Quiz</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['"Cormorant Garamond"', 'Georgia', 'serif'],
            body: ['"Outfit"', 'system-ui', 'sans-serif'],
          },
          colors: {
            parchment: '#f7f3e8',
            ink: '#1a1a2e',
            inkLight: '#2d2d44',
            gold: '#c9a84c',
            goldLight: '#e8d58b',
            sage: '#8fa68f',
            crimson: '#b85450',
          }
        }
      }
    }
  </script>

  <style>
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Outfit', system-ui, sans-serif;
      background-color: #f7f3e8;
      background-image:
        radial-gradient(circle at 20% 30%, rgba(201, 168, 76, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(201, 168, 76, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(201, 168, 76, 0.03) 0%, transparent 70%);
      color: #1a1a2e;
      overflow-x: hidden;
    }

    .card-glass {
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(24px) saturate(140%);
      -webkit-backdrop-filter: blur(24px) saturate(140%);
      border: 1px solid rgba(255, 255, 255, 0.35);
      box-shadow:
        0 25px 50px -12px rgba(26, 26, 46, 0.1),
        0 8px 24px -8px rgba(26, 26, 46, 0.05),
        inset 0 1px 0 rgba(255, 255, 255, 0.6);
      border-radius: 28px;
    }

    .progress-fill {
      transition: width 0.7s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .fade-in-up {
      animation: fadeInUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .fade-in {
      animation: fadeIn 0.5s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .choice-btn {
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
      border: 1.5px solid rgba(26, 26, 46, 0.08);
    }
    .choice-btn::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(135deg, rgba(201,168,76,0.06) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .choice-btn:hover::before { opacity: 1; }
    .choice-btn:hover {
      border-color: rgba(201,168,76,0.4);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(26,26,46,0.06);
    }
    .choice-btn.selected {
      border-color: #1a1a2e;
      background: rgba(26,26,46,0.03);
    }

    .check-anim {
      animation: checkPop 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    @keyframes checkPop {
      0% { opacity: 0; transform: scale(0) rotate(-15deg); }
      60% { opacity: 1; transform: scale(1.2) rotate(5deg); }
      100% { opacity: 1; transform: scale(1) rotate(0); }
    }

    .x-anim {
      animation: xPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    @keyframes xPop {
      0% { opacity: 0; transform: scale(0) rotate(-10deg); }
      50% { opacity: 1; transform: scale(1.15) rotate(5deg); }
      100% { opacity: 1; transform: scale(1) rotate(0); }
    }

    .score-ring {
      background: conic-gradient(var(--color) calc(var(--pct) * 1%), #eae5dc 0);
    }

    ::selection {
      background: rgba(201, 168, 76, 0.25);
      color: inherit;
    }
  </style>
</head>

<body class="min-h-screen flex flex-col items-center">

  <!-- Header -->
  <header class="w-full max-w-3xl px-6 pt-10 pb-4 text-center relative z-10">
    <div class="inline-flex items-center gap-2 mb-3 px-4 py-1.5 rounded-full bg-white/60 backdrop-blur border border-white/40 shadow-sm text-xs font-semibold tracking-widest uppercase text-inkLight/70">
      <i class="fa-solid fa-landmark text-gold"></i> U.S. Citizenship
    </div>
    <h1 class="font-display text-5xl md:text-7xl font-semibold text-ink leading-[0.92] tracking-tight mb-2">
      The <span class="italic text-gold">Civic</span> Quiz
    </h1>
    <p class="text-ink/50 text-sm md:text-base max-w-md mx-auto leading-relaxed">
      Ten essential questions for U.S. citizens. Test your knowledge with style.
    </p>
  </header>

  <!-- Main App -->
  <main id="app" class="w-full max-w-3xl px-6 flex-1 flex flex-col items-center">

    <!-- Progress Bar -->
    <div class="w-full mb-6">
      <div class="flex justify-between items-end mb-2.5">
        <span class="text-xs font-semibold tracking-widest uppercase text-ink/40">Progress</span>
        <span id="progress-text" class="text-xs font-bold text-ink/80">1 / 10</span>
      </div>
      <div class="h-1.5 w-full rounded-full bg-white/50 border border-white/40 overflow-hidden shadow-inner">
        <div id="progress-bar" class="progress-fill h-full rounded-full bg-gradient-to-r from-gold to-goldLight shadow-[0_0_12px_rgba(201,168,76,0.35)]" style="width: 10%"></div>
      </div>
    </div>

    <!-- Quiz Card -->
    <article id="quiz-card" class="card-glass w-full p-8 md:p-14 relative overflow-hidden">
      <!-- Decorative corner ornament -->
      <div class="absolute top-0 right-0 w-32 h-32 opacity-[0.06] pointer-events-none select-none">
        <svg viewBox="0 0 100 100" fill="none" stroke="#1a1a2e" stroke-width="0.5"><path d="M0 0 Q50 50 100 0 M0 20 Q50 70 100 20 M0 40 Q50 90 100 40"/></svg>
      </div>

      <div id="question-area" class="fade-in-up">
        <div class="flex items-center gap-3 mb-8">
          <span id="q-number" class="font-display text-6xl md:text-7xl font-semibold text-gold/20 leading-none select-none">01</span>
          <div class="h-px flex-1 bg-gradient-to-r from-transparent via-ink/10 to-transparent"></div>
        </div>

        <h2 id="question-text" class="font-display text-3xl md:text-[2.75rem] leading-[1.15] text-ink font-semibold mb-10">
          What is the supreme law of the land?
        </h2>

        <div id="choices" class="grid gap-4"></div>
      </div>

      <!-- Feedback overlay -->
      <div id="feedback" class="hidden absolute inset-0 z-20 flex flex-col items-center justify-center bg-white/80 backdrop-blur-md rounded-[28px]">
        <div id="feedback-icon"></div>
        <h3 id="feedback-title" class="font-display text-3xl md:text-4xl font-semibold mt-5 mb-2"></h3>
        <p id="feedback-sub" class="text-ink/50 text-sm md:text-base"></p>
      </div>
    </article>

    <!-- Footer -->
    <footer class="w-full text-center mt-10 text-ink/20 text-[11px] tracking-wide">
      Civic Trivia &mdash; 10 Questions &mdash; Basic U.S. Citizenship Level
    </footer>
  </main>

  <!-- Final Score Screen -->
  <section id="final-screen" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-parchment/90 backdrop-blur-sm">
    <div class="w-full max-w-lg px-6 text-center">
      <div class="card-glass p-10 md:p-14 relative overflow-hidden">
        <div class="absolute -top-8 -right-8 w-40 h-40 rounded-full bg-gold/5 blur-2xl"></div>
        <div class="absolute -bottom-12 -left-12 w-48 h-48 rounded-full bg-gold/5 blur-3xl"></div>

        <div class="relative z-10">
          <div class="mb-6 inline-block">
            <div id="score-ring" class="score-ring w-36 h-36 rounded-full mx-auto flex items-center justify-center shadow-[inset_0_0_30px_rgba(0,0,0,0.03)]" style="--pct: 0; --color: #c9a84c;">
              <div class="w-28 h-28 rounded-full bg-parchment flex items-center justify-center">
                <span id="final-percent" class="font-display text-5xl font-bold text-ink">0%</span>
              </div>
            </div>
          </div>

          <h2 class="font-display text-4xl md:text-5xl font-semibold text-ink mb-1">Quiz Complete</h2>
          <p class="text-ink/40 text-sm mb-8">Your civic literacy score</p>

          <div class="flex justify-center gap-8 md:gap-14 mb-8">
            <div class="text-center">
              <span id="final-correct" class="block font-display text-3xl md:text-4xl font-semibold text-ink">0</span>
              <span class="text-[10px] uppercase tracking-widest text-ink/30 font-semibold">Correct</span>
            </div>
            <div class="w-px bg-ink/10"></div>
            <div class="text-center">
              <span id="final-total" class="block font-display text-3xl md:text-4xl font-semibold text-ink/20">10</span>
              <span class="text-[10px] uppercase tracking-widest text-ink/30 font-semibold">Total</span>
            </div>
          </div>

          <div id="final-message" class="text-base md:text-lg text-ink/70 leading-relaxed mb-8 max-w-sm mx-auto"></div>

          <button onclick="resetQuiz()" class="inline-flex items-center gap-3 px-8 py-3.5 rounded-full bg-ink text-parchment font-semibold tracking-wide hover:bg-inkLight hover:-translate-y-0.5 transition-all shadow-[0_8px_30px_rgba(26,26,46,0.2)] hover:shadow-[0_12px_40px_rgba(26,26,46,0.3)]">
            <i class="fa-solid fa-rotate-right"></i> Try Again
          </button>
        </div>
      </div>
    </div>
  </section>

  <script>
    // 10 built-in US citizenship level questions
    const questions = [
      {
        q: "What is the supreme law of the land?",
        choices: ["The Declaration of Independence", "The Constitution", "The Articles of Confederation", "The Bill of Rights"],
        correct: 1
      },
      {
        q: "How many amendments does the Constitution have?",
        choices: ["10", "27", "15", "21"],
        correct: 1
      },
      {
        q: "What are the two parts of the U.S. Congress?",
        choices: ["The Senate and the House of Representatives", "The President and the Vice President", "The Supreme Court and the Senate", "The House and the Cabinet"],
        correct: 0
      },
      {
        q: "Who is in charge of the executive branch?",
        choices: ["The Chief Justice", "The Speaker of the House", "The President", "The Secretary of State"],
        correct: 2
      },
      {
        q: "How many U.S. Senators are there?",
        choices: ["50", "100", "435", "535"],
        correct: 1
      },
      {
        q: "Who makes federal laws?",
        choices: ["The President", "The Supreme Court", "Congress", "The Cabinet"],
        correct: 2
      },
      {
        q: "What is one right or freedom from the First Amendment?",
        choices: ["Right to bear arms", "Right to vote", "Freedom of speech", "Right to a trial by jury"],
        correct: 2
      },
      {
        q: "What do we call the first ten amendments to the Constitution?",
        choices: ["The Articles", "The Bill of Rights", "The Civil War Amendments", "The Preamble"],
        correct: 1
      },
      {
        q: "Who was the first President of the United States?",
        choices: ["Thomas Jefferson", "Abraham Lincoln", "George Washington", "John Adams"],
        correct: 2
      },
      {
        q: "What is the economic system in the United States?",
        choices: ["Socialist", "Communist", "Capitalist", "Feudal"],
        correct: 2
      }
    ];

    let shuffled = [];
    let current = 0;
    let score = 0;
    let answered = false;

    function shuffleArray(array) {
      const arr = array.slice();
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function resetQuiz() {
      shuffled = shuffleArray(questions);
      current = 0;
      score = 0;
      answered = false;
      document.getElementById('final-screen').classList.add('hidden');
      document.body.style.overflow = '';
      renderQuestion();
    }

    function renderQuestion() {
      answered = false;
      const q = shuffled[current];
      const card = document.getElementById('quiz-card');
      const feedback = document.getElementById('feedback');
      const area = document.getElementById('question-area');

      // Reset card
      feedback.classList.add('hidden');
      area.classList.remove('fade-in-up');
      void area.offsetWidth; // trigger reflow
      area.classList.add('fade-in-up');

      // Number
      document.getElementById('q-number').textContent = String(current + 1).padStart(2, '0');
      document.getElementById('question-text').textContent = q.q;

      // Choices
      const container = document.getElementById('choices');
      container.innerHTML = '';
      q.choices.forEach((text, idx) => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn text-left px-6 py-5 rounded-2xl bg-white/50 text-ink font-medium text-base md:text-lg leading-relaxed shadow-[0_2px_12px_rgba(26,26,46,0.03)]';
        btn.innerHTML = `<span class="inline-block w-7 h-7 rounded-full bg-ink/[0.06] text-ink/60 text-xs font-bold flex items-center justify-center mr-3 shrink-0">${String.fromCharCode(65 + idx)}</span><span>${text}</span>`;
        btn.onclick = () => selectAnswer(idx);
        container.appendChild(btn);
      });

      // Progress
      const pct = ((current + 1) / 10) * 100;
      document.getElementById('progress-bar').style.width = pct + '%';
      document.getElementById('progress-text').textContent = `${current + 1} / 10`;
    }

    function selectAnswer(idx) {
      if (answered) return;
      answered = true;
      const q = shuffled[current];
      const isCorrect = idx === q.correct;

      // Highlight selected
      const buttons = document.getElementById('choices').children;
      for (let b of buttons) {
        b.style.pointerEvents = 'none';
        if (b.querySelector('span:last-child').textContent === q.choices[idx]) {
          b.classList.add('selected');
        }
      }

      // Show correct choice highlight briefly
      setTimeout(() => {
        for (let b of buttons) {
          const btnText = b.querySelector('span:last-child').textContent;
          if (btnText === q.choices[q.correct]) {
            b.style.borderColor = isCorrect ? '#8fa68f' : 'rgba(201,168,76,0.4)';
            b.style.background = isCorrect ? 'rgba(143,166,143,0.08)' : 'rgba(201,168,76,0.06)';
          }
        }
      }, 50);

      if (isCorrect) score++;

      // Feedback overlay
      const fb = document.getElementById('feedback');
      const icon = document.getElementById('feedback-icon');
      const title = document.getElementById('feedback-title');
      const sub = document.getElementById('feedback-sub');

      fb.classList.remove('hidden');
      if (isCorrect) {
        icon.innerHTML = '<i class="fa-solid fa-check-circle text-[5rem] text-sage check-anim"></i>';
        title.textContent = 'Correct!';
        title.className = 'font-display text-3xl md:text-4xl font-semibold mt-5 mb-2 text-ink';
        sub.textContent = 'Great work — keep it going.';
      } else {
        icon.innerHTML = '<i class="fa-solid fa-xmark-circle text-[5rem] text-crimson x-anim"></i>';
        title.textContent = 'Not quite';
        title.className = 'font-display text-3xl md:text-4xl font-semibold mt-5 mb-2 text-ink';
        sub.textContent = `The answer was: ${q.choices[q.correct]}`;
      }

      setTimeout(() => {
        current++;
        if (current >= 10) {
          showFinal();
        } else {
          renderQuestion();
        }
      }, 1600);
    }

    function showFinal() {
      document.getElementById('final-screen').classList.remove('hidden');
      document.body.style.overflow = 'hidden';

      const pct = Math.round((score / 10) * 100);
      document.getElementById('final-percent').textContent = pct + '%';
      document.getElementById('final-correct').textContent = score;
      document.getElementById('final-total').textContent = '10';

      // Ring animation
      const ring = document.getElementById('score-ring');
      ring.style.setProperty('--pct', pct);
      ring.style.setProperty('--color', pct >= 70 ? '#8fa68f' : pct >= 40 ? '#c9a84c' : '#b85450');

      // Message
      const msg = document.getElementById('final-message');
      if (pct === 100) msg.textContent = 'Flawless. You are a model citizen.';
      else if (pct >= 80) msg.textContent = 'Excellent — you know your civics well.';
      else if (pct >= 50) msg.textContent = 'Good effort. A little review goes a long way.';
      else msg.textContent = 'Keep studying — citizenship is a journey.';
    }

    // Initialize
    resetQuiz();
  </script>
</body>
</html>
