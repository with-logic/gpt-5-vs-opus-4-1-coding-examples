<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kinetic Typography Studio</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@300;400;700&family=Bebas+Neue&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        fontFamily: {
          display: ['"Playfair Display"', 'Georgia', 'serif'],
          body: ['"Inter"', 'system-ui', 'sans-serif'],
          mono: ['"JetBrains Mono"', 'monospace'],
          kinetic: ['"Bebas Neue"', 'sans-serif'],
          space: ['"Space Grotesk"', 'sans-serif'],
        },
        colors: {
          ink: '#0b0c15',
          surface: '#121220',
          panel: '#181828',
          card: '#1e1e33',
          border: '#2a2a40',
          muted: '#8a8a9a',
          accent: '#c9a84c',
          accent2: '#6ee7b7',
          glow: '#3b82f6',
          danger: '#f87171',
        },
      },
    },
  };
</script>
<style>
  html { scroll-behavior: smooth; }
  body { font-family: 'Inter', system-ui, sans-serif; background: #0b0c15; color: #e8e8f0; overflow: hidden; -webkit-font-smoothing: antialiased; }

  /* Glass surfaces */
  .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(14px) saturate(120%); border: 1px solid rgba(255,255,255,0.06); }
  .glass-strong { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px) saturate(140%); border: 1px solid rgba(255,255,255,0.1); }

  /* Custom scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #3a3a55; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #555; }

  /* Animations */
  @keyframes shimmer {
    0% { background-position: -200% center; }
    100% { background-position: 200% center; }
  }
  .shimmer-text {
    background: linear-gradient(90deg, #e8e8f0 40%, #c9a84c 50%, #e8e8f0 60%) no-repeat;
    background-size: 200% auto;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    animation: shimmer 3s linear infinite;
  }

  @keyframes pulse-ring {
    0%, 100% { box-shadow: 0 0 0 0 rgba(201,168,76,0.3); }
    50% { box-shadow: 0 0 0 8px rgba(201,168,76,0); }
  }
  .pulse-ring { animation: pulse-ring 2s infinite ease-out; }

  /* Canvas text rendering */
  .kinetic-text { letter-spacing: 0; line-height: 1; white-space: pre-wrap; word-break: break-word; }
  .kinetic-text span { display: inline-block; will-change: transform, opacity; backface-visibility: hidden; }

  /* Keyframe markers */
  .key-marker { width: 12px; height: 12px; border-radius: 50%; border: 2px solid currentColor; position: absolute; top: -5px; cursor: pointer; transition: transform .15s ease; }
  .key-marker:hover { transform: scale(1.3); }

  /* Timeline track */
  .timeline-track { position: relative; height: 48px; background: linear-gradient(to bottom, rgba(255,255,255,0.02), rgba(255,255,255,0)); border-top: 1px solid rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.08); }

  /* Gradient text support */
  .grad-text { -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

  /* Motion blur simulation */
  .motion-blur { filter: blur(3px) brightness(1.1); opacity: 0.9; }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce) {
    .kinetic-text span { animation: none !important; transition: none !important; }
    .pulse-ring { animation: none !important; }
  }

  /* Range slider styling */
  input[type="range"] { -webkit-appearance: none; height: 6px; border-radius: 3px; background: #2a2a40; outline: none; }
  input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #c9a84c; cursor: pointer; border: 2px solid #1e1e33; box-shadow: 0 0 6px rgba(201,168,76,0.4); }
  input[type="range"]::-moz-range-thumb { width: 14px; height: 14px; border-radius: 50%; background: #c9a84c; cursor: pointer; border: 2px solid #1e1e33; box-shadow: 0 0 6px rgba(201,168,76,0.4); }
</style>
</head>
<body class="h-screen w-screen overflow-hidden flex flex-col bg-ink text-[#e8e8f0] select-none">

<!-- Top toolbar -->
<header class="h-14 flex-none glass-strong flex items-center justify-between px-4 gap-3 z-30 shrink-0" aria-label="Main toolbar">
  <div class="flex items-center gap-3">
    <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-accent to-amber-600 flex items-center justify-center shadow-lg shadow-amber-900/20">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M4 9l8-7 8 7"/><path d="M12 17V9"/><rect x="4" y="4" width="16" height="20" rx="2"/></svg>
    </div>
    <h1 class="font-kinetic text-xl tracking-tight leading-none shimmer-text">KINETIC <span class="font-body font-light text-sm tracking-[0.2em] text-muted">STUDIO</span></h1>
  </div>

  <div class="flex items-center gap-2">
    <button onclick="setAspect(1)" class="px-2.5 py-1 text-[11px] font-mono rounded-md hover:bg-white/5 border border-transparent hover:border-white/10 transition" aria-label="Square aspect" title="1:1">1:1</button>
    <button onclick="setAspect(9/16)" class="px-2.5 py-1 text-[11px] font-mono rounded-md hover:bg-white/5 border border-transparent hover:border-white/10 transition" aria-label="Portrait aspect" title="9:16">9:16</button>
    <button onclick="setAspect(16/9)" class="px-2.5 py-1 text-[11px] font-mono rounded-md hover:bg-white/5 border border-transparent hover:border-white/10 transition" aria-label="Landscape aspect" title="16:9">16:9</button>
    <div class="w-px h-4 bg-border mx-1"></div>

    <button onclick="toggleGuide('safe')" class="px-2 py-1 text-[11px] rounded hover:bg-white/5 transition" aria-label="Toggle safe area" title="Safe Area">Safe</button>
    <button onclick="toggleGuide('grid')" class="px-2 py-1 text-[11px] rounded hover:bg-white/5 transition" aria-label="Toggle grid" title="Grid">Grid</button>
    <button onclick="toggleGuide('margin')" class="px-2 py-1 text-[11px] rounded hover:bg-white/5 transition" aria-label="Toggle margins" title="Margins">Margin</button>

    <div class="w-px h-4 bg-border mx-1"></div>

    <button onclick="applyPreset('bounce')" class="px-2.5 py-1 text-[11px] rounded-md bg-white/5 hover:bg-white/10 border border-white/10 transition" aria-label="Animation preset bounce">Bounce</button>
    <button onclick="applyPreset('typewriter')" class="px-2.5 py-1 text-[11px] rounded-md bg-white/5 hover:bg-white/10 border border-white/10 transition" aria-label="Animation preset typewriter">Typewriter</button>
    <button onclick="applyPreset('glitch')" class="px-2.5 py-1 text-[11px] rounded-md bg-white/5 hover:bg-white/10 border border-white/10 transition" aria-label="Animation preset glitch">Glitch</button>
    <button onclick="applyPreset('cascade')" class="px-2.5 py-1 text-[11px] rounded-md bg-white/5 hover:bg-white/10 border border-white/10 transition" aria-label="Animation preset cascade">Cascade</button>

    <div class="w-px h-4 bg-border mx-1"></div>

    <label class="relative inline-flex items-center gap-2 px-2.5 py-1 rounded-md bg-white/5 hover:bg-white/10 border border-white/10 cursor-pointer transition text-[11px]" aria-label="Load audio file">
      <input type="file" accept="audio/*" onchange="loadAudio(this)" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      <span>Audio</span>
    </label>

    <button onclick="renderExport('gif')" class="px-3 py-1.5 text-[11px] font-semibold rounded-md bg-gradient-to-r from-amber-700/40 to-amber-500/30 hover:from-amber-700/60 hover:to-amber-500/50 border border-amber-500/20 shadow-[0_0_15px_rgba(201,168,76,0.15)] transition" aria-label="Export animation">Export</button>
  </div>
</header>

<!-- Main workspace -->
<main class="flex-1 flex overflow-hidden relative" aria-label="Workspace">

  <!-- Left sidebar: Content & Style -->
  <aside class="w-72 flex-none glass-strong border-r border-border/50 flex flex-col overflow-y-auto z-20" aria-label="Content and style panel">
    <div class="p-4 space-y-5">
      <section aria-label="Text content">
        <h2 class="text-[10px] font-mono uppercase tracking-[0.15em] text-muted mb-2">Content</h2>
        <textarea id="textInput" class="w-full h-24 bg-card border border-border rounded-lg px-3 py-2.5 text-sm font-body resize-none focus:outline-none focus:border-accent/50 transition leading-relaxed" placeholder="Enter kinetic text..." oninput="updateText(this.value)">KINETIC</textarea>
        <div class="flex gap-1 mt-2">
          <button onclick="setText('TYPEWRITER')" class="px-2 py-0.5 text-[10px] font-mono bg-card border border-border rounded hover:bg-white/5">TYPEWRITER</button>
          <button onclick="setText('GLITCH')" class="px-2 py-0.5 text-[10px] font-mono bg-card border border-border rounded hover:bg-white/5">GLITCH</button>
          <button onclick="setText('CASCADE')" class="px-2 py-0.5 text-[10px] font-mono bg-card border border-border rounded hover:bg-white/5">CASCADE</button>
        </div>
      </section>

      <section aria-label="Typography">
        <h2 class="text-[10px] font-mono uppercase tracking-[0.15em] text-muted mb-2">Typography</h2>
        <div class="grid grid-cols-2 gap-2">
          <button onclick="setFont('Playfair Display')" class="text-xs px-2 py-1.5 rounded bg-card border border-border hover:border-accent/40 transition text-left font-display">Playfair</button>
          <button onclick="setFont('Inter')" class="text-xs px-2 py-1.5 rounded bg-card border border-border hover:border-accent/40 transition text-left font-body">Inter</button>
          <button onclick="setFont('Bebas Neue')" class="text-xs px-2 py-1.5 rounded bg-card border border-border hover:border-accent/40 transition text-left font-kinetic">Bebas</button>
          <button onclick="setFont('JetBrains Mono')" class="text-xs px-2 py-1.5 rounded bg-card border border-border hover:border-accent/40 transition text-left font-mono">Mono</button>
        </div>
        <div class="flex gap-3 mt-2">
          <label class="flex flex-col gap-1 text-[10px] text-muted">
            Weight
            <select onchange="setProp('fontWeight', this.value)" class="bg-card border border-border rounded px-2 py-1 text-xs focus:outline-none focus:border-accent/50">
              <option>300</option><option selected>400</option><option>700</option><option>900</option>
            </select>
          </label>
          <label class="flex flex-col gap-1 text-[10px] text-muted">
            Italic
            <select onchange="setProp('italic', this.value)" class="bg-card border border-border rounded px-2 py-1 text-xs focus:outline-none focus:border-accent/50">
              <option selected>normal</option><option>italic</option>
            </select>
          </label>
        </div>
        <div class="mt-2 flex gap-2">
          <button onclick="setProp('outline', !style.outline)" class="flex-1 text-[10px] py-1 rounded border border-border bg-card hover:bg-white/5 transition" aria-label="Toggle outline text">Outline</button>
          <button onclick="setProp('gradient', !style.gradient)" class="flex-1 text-[10px] py-1 rounded border border-border bg-card hover:bg-white/5 transition" aria-label="Toggle gradient text">Gradient</button>
        </div>
      </section>

      <section aria-label="Color and fill">
        <h2 class="text-[10px] font-mono uppercase tracking-[0.15em] text-muted mb-2">Color</h2>
        <div class="flex gap-2">
          <label class="flex-1">
            <span class="text-[10px] text-muted block mb-1">Fill</span>
            <input type="color" value="#e8e8f0" oninput="setProp('fill', this.value)" class="w-full h-8 rounded bg-transparent border-0 p-0 cursor-pointer" aria-label="Text fill color" />
          </label>
          <label class="flex-1">
            <span class="text-[10px] text-muted block mb-1">Outline</span>
            <input type="color" value="#c9a84c" oninput="setProp('outlineColor', this.value)" class="w-full h-8 rounded bg-transparent border-0 p-0 cursor-pointer" aria-label="Text outline color" />
          </label>
          <label class="flex-1">
            <span class="text-[10px] text-muted block mb-1">Shadow</span>
            <input type="color" value="#3b82f6" oninput="setProp('shadowColor', this.value)" class="w-full h-8 rounded bg-transparent border-0 p-0 cursor-pointer" aria-label="Text shadow color" />
          </label>
        </div>
        <div class="mt-2 flex items-center gap-2 text-[10px] text-muted">
          <span>Gradient</span>
          <input type="text" value="#6ee7b7,#3b82f6" oninput="setProp('gradientColors', this.value)" class="flex-1 bg-card border border-border rounded px-2 py-0.5 text-xs font-mono focus:outline-none focus:border-accent/50" aria-label="Gradient color stops" />
        </div>
      </section>

      <section aria-label="Effects">
        <h2 class="text-[10px] font-mono uppercase tracking-[0.15em] text-muted mb-2">Effects</h2>
        <label class="flex items-center gap-2 text-xs cursor-pointer">
          <input type="checkbox" checked onchange="setProp('motionBlur', this.checked)" class="w-4 h-4 accent-accent" aria-label="Enable motion blur" />
          Motion Blur
        </label>
        <label class="flex items-center gap-2 text-xs mt-1 cursor-pointer">
          <input type="checkbox" checked onchange="setProp('shadow', this.checked)" class="w-4 h-4 accent-accent" aria-label="Enable text shadow" />
          Drop Shadow
        </label>
        <label class="flex items-center gap-2 text-xs mt-1 cursor-pointer">
          <input type="checkbox" checked onchange="setProp('outline', this.checked)" class="w-4 h-4 accent-accent" aria-label="Enable outline" />
          Stroke Outline
        </label>
      </section>
    </div>
  </aside>

  <!-- Center canvas -->
  <section class="flex-1 relative bg-gradient-to-b from-ink via-[#0f0f17] to-[#13131e] overflow-hidden flex items-center justify-center" aria-label="Animation preview" id="previewArea">
    <!-- Background image -->
    <img id="bgImage" src="" class="absolute inset-0 w-full h-full object-cover opacity-20 pointer-events-none" alt="" style="display:none" />

    <!-- Grid overlay -->
    <svg id="gridOverlay" class="absolute inset-0 w-full h-full pointer-events-none opacity-[0.08]" aria-hidden="true"></svg>

    <!-- Safe area guides -->
    <div id="safeArea" class="absolute top-[5%] left-[5%] right-[5%] bottom-[5%] border border-white/10 pointer-events-none rounded opacity-40" aria-hidden="true"></div>

    <!-- Margin guides -->
    <div id="marginGuide" class="absolute inset-[10%] border border-dashed border-white/10 pointer-events-none rounded opacity-30" aria-hidden="true"></div>

    <!-- Main kinetic text -->
    <div id="kineticCanvas" class="relative z-10 kinetic-text font-kinetic text-[10vw] leading-[0.85] text-center tracking-[-0.04em]" aria-live="polite" aria-label="Animated text preview"></div>

    <!-- Audio visualizer overlay -->
    <div id="audioVisualizer" class="absolute bottom-8 left-1/2 -translate-x-1/2 flex items-end gap-[2px] h-12 opacity-60 pointer-events-none" aria-hidden="true"></div>
  </section>

  <!-- Right sidebar: Keyframes & Animation -->
  <aside class="w-80 flex-none glass-strong border-l border-border/50 flex flex-col overflow-y-auto z-20" aria-label="Animation controls">
    <div class="p-4 space-y-6">
      <section aria-label="Animation presets">
        <h2 class="text-[10px] font-mono uppercase tracking-[0.15em] text-muted mb-2">Animation</h2>
        <div class="grid grid-cols-3 gap-1.5">
          <button onclick="applyPreset('typewriter')" class="text-[10px] px-2 py-1.5 rounded bg-card border border-border hover:border-accent/40 transition">Typewriter</button>
          <button onclick="applyPreset('bounce')" class="text-[10px] px-2 py-1.5 rounded bg-card border border-border hover:border-accent/40 transition">Bounce</button>
          <button onclick="applyPreset('fadeup')" class="text-[10px] px-2 py-1.5 rounded bg-card border border-border hover:border-accent/40 transition">Fade Up</button>
          <button onclick="applyPreset('liquid')" class="text-[10px] px-2 py-1.5 rounded bg-card border border-border hover:border-accent/40 transition">Liquid</button>
          <button onclick="applyPreset('glitch')" class="text-[10px] px-2 py-1.5 rounded bg-card border border-border hover:border-accent/40 transition">Glitch</button>
          <button onclick="applyPreset('cascade')" class="text-[10px] px-2 py-1.5 rounded bg-card border border-border hover:border-accent/40 transition">Cascade</button>
        </div>
        <div class="mt-2 flex gap-2">
          <label class="flex-1 text-[10px] text-muted">
            Duration
            <input type="number" id="animDuration" value="2000" min="200" max="10000" step="100" oninput="setProp('duration', this.value)" class="w-full bg-card border border-border rounded px-2 py-1 text-xs mt-0.5 focus:outline-none focus:border-accent/50 font-mono" aria-label="Animation duration in milliseconds" />
          </label>
          <label class="flex-1 text-[10px] text-muted">
            Delay
            <input type="number" id="animDelay" value="0" min="0" max="2000" step="50" oninput="setProp('delay', this.value)" class="w-full bg-card border border-border rounded px-2 py-1 text-xs mt-0.5 focus:outline-none focus:border-accent/50 font-mono" aria-label="Animation delay in milliseconds" />
          </label>
        </div>
      </section>

      <section aria-label="Keyframe editor">
        <h2 class="text-[10px] font-mono uppercase tracking-[0.15em] text-muted mb-2">Keyframes</h2>
        <div class="bg-card border border-border rounded-lg p-3 space-y-3">
          <div class="grid grid-cols-2 gap-2">
            <label class="text-[10px] text-muted">
              X Offset <input type="range" min="-200" max="200" value="0" oninput="updateKeyframe('x', this.value)" aria-label="X offset" /></label>
            <label class="text-[10px] text-muted">
              Y Offset <input type="range" min="-200" max="200" value="0" oninput="updateKeyframe('y', this.value)" aria-label="Y offset" /></label>
            <label class="text-[10px] text-muted">
              Scale <input type="range" min="0.2" max="3" step="0.1" value="1" oninput="updateKeyframe('scale', this.value)" aria-label="Scale" /></label>
            <label class="text-[10px] text-muted">
              Rotation <input type="range" min="-180" max="180" value="0" oninput="updateKeyframe('rotate', this.value)" aria-label="Rotation" /></label>
          </div>
          <div class="grid grid-cols-3 gap-2">
            <label class="text-[10px] text-muted">
              Opacity <input type="range" min="0" max="1" step="0.05" value="1" oninput="updateKeyframe('opacity', this.value)" aria-label="Opacity" /></label>
            <label class="text-[10px] text-muted">
              Tracking <input type="range" min="-20" max="40" value="0" oninput="updateKeyframe('tracking', this.value)" aria-label="Letter spacing" /></label>
            <label class="text-[10px] text-muted">
              Stagger <input type="range" min="0" max="200" value="50" oninput="updateKeyframe('stagger', this.value)" aria-label="Stagger delay" /></label>
          </div>
          <label class="text-[10px] text-muted block">
            Easing <select onchange="updateKeyframe('easing', this.value)" class="w-full bg-ink border border-border rounded px-2 py-1 text-xs mt-0.5 focus:outline-none focus:border-accent/50 font-mono" aria-label="Easing curve">
              <option>ease</option><option>ease-in</option><option>ease-out</option><option>ease-in-out</option><option>linear</option><option>cubic-bezier(0.25, 0.46, 0.45, 0.94)</option><option>cubic-bezier(0.68, -0.55, 0.265, 1.55)</option><option>cubic-bezier(0.175, 0.885, 0.32, 1.275)</option>
            </select>
          </label>
        </div>
      </section>

      <section aria-label="Per letter and word controls">
        <h2 class="text-[10px] font-mono uppercase tracking-[0.15em] text-muted mb-2">Split</h2>
        <div class="flex gap-2">
          <button onclick="setSplit('word')" class="flex-1 text-[10px] py-1.5 rounded bg-card border border-border hover:border-accent/40 transition" aria-label="Split by word">Word</button>
          <button onclick="setSplit('letter')" class="flex-1 text-[10px] py-1.5 rounded bg-card border border-border hover:border-accent/40 transition" aria-label="Split by letter">Letter</button>
          <button onclick="setSplit('line')" class="flex-1 text-[10px] py-1.5 rounded bg-card border border-border hover:border-accent/40 transition" aria-label="Split by line">Line</button>
        </div>
        <label class="text-[10px] text-muted mt-2 block">
          Per-glyph stagger
          <input type="range" min="0" max="300" step="10" value="60" oninput="updateStagger(this.value)" aria-label="Stagger delay between glyphs" />
        </label>
      </section>

      <section aria-label="Layout and guides">
        <h2 class="text-[10px] font-mono uppercase tracking-[0.15em] text-muted mb-2">Layout</h2>
        <label class="text-[10px] text-muted block">
          Margin %
          <input type="range" min="0" max="40" value="5" oninput="updateMargin(this.value)" aria-label="Margin percentage" />
        </label>
        <label class="text-[10px] text-muted block mt-2">
          Grid Opacity <input type="range" min="0" max="1" step="0.05" value="0.08" oninput="updateGridOpacity(this.value)" aria-label="Grid overlay opacity" /></label>
      </section>
    </div>
  </aside>

</main>

<!-- Bottom timeline -->
<footer class="h-28 flex-none glass-strong border-t border-border/50 z-30 flex flex-col" aria-label="Animation timeline">
  <div class="px-4 pt-2 pb-1 flex items-center justify-between">
    <div class="flex items-center gap-2">
      <button onclick="scrub(-0.5)" class="w-7 h-7 rounded-full bg-card border border-border hover:border-accent/40 flex items-center justify-center transition" aria-label="Go back half second">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <button onclick="togglePlay()" id="playBtn" class="w-9 h-9 rounded-full bg-gradient-to-br from-amber-600 to-amber-700 border border-amber-400/30 shadow-[0_0_15px_rgba(201,168,76,0.25)] flex items-center justify-center hover:brightness-110 transition pulse-ring" aria-label="Play animation">
        <svg id="playIcon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        <svg id="pauseIcon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>
      </button>
      <button onclick="scrub(0.5)" class="w-7 h-7 rounded-full bg-card border border-border hover:border-accent/40 flex items-center justify-center transition" aria-label="Go forward half second">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
      </button>
    </div>
    <div class="flex items-center gap-3 text-[10px] font-mono text-muted">
      <span id="timeDisplay">0:00</span>
      <span id="durationDisplay">/ 2.0s</span>
      <span id="fpsDisplay" class="hidden sm:inline">30fps</span>
    </div>
    <div class="flex items-center gap-2">
      <label class="text-[10px] text-muted">FPS <input type="number" value="30" min="15" max="120" step="15" oninput="setProp('fps', parseInt(this.value))" class="w-12 bg-card border border-border rounded px-1 py-0.5 text-xs font-mono focus:outline-none focus:border-accent/50" aria-label="Frames per second" /></label>
      <label class="text-[10px] text-muted">Res <select onchange="setProp('resolution', this.value)" class="bg-card border border-border rounded px-1 py-0.5 text-xs font-mono focus:outline-none focus:border-accent/50" aria-label="Export resolution">
        <option>720p</option><option selected>1080p</option><option>4K</option>
      </select></label>
    </div>
  </div>

  <div class="flex-1 px-4 relative timeline-track" id="timeline" aria-label="Keyframe timeline track">
    <!-- Tick marks -->
    <div id="timelineTicks" class="absolute inset-0 pointer-events-none" aria-hidden="true"></div>
    <!-- Keyframes -->
    <div id="keyframeMarkers" class="absolute inset-0 pointer-events-none" aria-label="Keyframe markers"></div>
  </div>
</footer>

<script>
/* ============================================================
   KINETIC TYPOGRAPHY STUDIO
   ============================================================ */

// State
const state = {
  text: 'KINETIC',
  font: 'Bebas Neue',
  fontWeight: '400',
  italic: 'normal',
  split: 'letter',
  duration: 2000,
  delay: 0,
  fps: 30,
  resolution: '1080p',
  aspect: 16/9,
  playing: false,
  time: 0,
  keyframes: [
    { t: 0, x: 0, y: 0, scale: 1, rotate: 0, opacity: 1, tracking: 0, stagger: 50, easing: 'ease' },
    { t: 1000, x: 20, y: -30, scale: 1.15, rotate: 3, opacity: 1, tracking: 8, stagger: 50, easing: 'ease-in-out' },
    { t: 2000, x: 0, y: 0, scale: 1, rotate: 0, opacity: 1, tracking: 0, stagger: 50, easing: 'ease' },
  ],
  style: {
    fill: '#e8e8f0',
    outline: false,
    outlineColor: '#c9a84c',
    gradient: false,
    gradientColors: '#6ee7b7,#3b82f6',
    shadow: true,
    shadowColor: '#3b82f6',
    motionBlur: true,
  },
  guides: { safe: true, grid: false, margin: true },
  audio: null,
  audioContext: null,
  analyser: null,
  beatTimes: [],
  reducedMotion: window.matchMedia('(prefers-reduced-motion: reduce)').matches,
};

function setText(t) { state.text = t; document.getElementById('textInput').value = t; rebuildCanvas(); }
function setFont(f) { state.font = f; document.getElementById('kineticCanvas').style.fontFamily = `"${f}"`; rebuildCanvas(); }
function setProp(k, v) { if (k === 'outline') state.style.outline = v; else if (k === 'gradient') state.style.gradient = v; else if (k === 'outlineColor') state.style.outlineColor = v; else if (k === 'gradientColors') state.style.gradientColors = v; else if (k === 'shadowColor') state.style.shadowColor = v; else if (k === 'shadow') state.style.shadow = v; else if (k === 'motionBlur') state.style.motionBlur = v; else if (k === 'duration') state.duration = Number(v); else if (k === 'delay') state.delay = Number(v); else if (k === 'fontWeight') { state.fontWeight = v; rebuildCanvas(); } else if (k === 'italic') { state.italic = v; rebuildCanvas(); } else if (k === 'fps') state.fps = parseInt(v); else if (k === 'resolution') state.resolution = v; else state[k] = v; applyStyle(); }
function setSplit(s) { state.split = s; rebuildCanvas(); }
function setAspect(r) { state.aspect = r; document.getElementById('previewArea').style.aspectRatio = r; }
function applyPreset(name) { if (name === 'bounce') { state.split='letter'; state.duration=2000; state.keyframes=[{t:0,x:0,y:60,scale:.3,rotate:-10,opacity:0,tracking:0,stagger:30,easing:'ease-in'},{t:600,x:-10,y:-20,scale:1.1,rotate:5,opacity:1,tracking:5,stagger:30,easing:'ease-out'},{t:1400,x:10,y:10,scale:.95,rotate:-3,opacity:1,tracking:2,stagger:30,easing:'ease-in-out'},{t:2000,x:0,y:0,scale:1,rotate:0,opacity:1,tracking:0,stagger:30,easing:'ease-in-out'}]; } else if (name === 'typewriter') { state.split='letter'; state.duration=2500; state.keyframes=[{t:0,x:0,y:0,scale:1,rotate:0,opacity:0,tracking:0,stagger:80,easing:'ease'},{t:2500,x:0,y:0,scale:1,rotate:0,opacity:1,tracking:0,stagger:80,easing:'linear'}]; } else if (name === 'glitch') { state.split='letter'; state.duration=1500; state.keyframes=[{t:0,x:0,y:0,scale:1,rotate:0,opacity:1,tracking:0,stagger:20,easing:'linear'},{t:200,x:15,y:-5,scale:1.05,rotate:2,opacity:1,tracking:5,stagger:20,easing:'steps(2)'},{t:400,x:-12,y:5,scale:.98,rotate:-1,opacity:.8,tracking:-3,stagger:20,easing:'steps(2)'},{t:600,x:8,y:-8,scale:1.02,rotate:1,opacity:1,tracking:2,stagger:20,easing:'steps(2)'},{t:800,x:-5,y:10,scale:.99,rotate:0,opacity:.9,tracking:0,stagger:20,easing:'steps(1)'},{t:1200,x:0,y:0,scale:1,rotate:0,opacity:1,tracking:0,stagger:20,easing:'ease'}]; } else if (name === 'cascade') { state.split='word'; state.duration=1800; state.keyframes=[{t:0,x:-50,y:0,scale:.9,rotate:-2,opacity:0,tracking:-5,stagger:150,easing:'ease-in'},{t:1800,x:0,y:0,scale:1,rotate:0,opacity:1,tracking:2,stagger:150,easing:'ease-out'}]; } else if (name === 'fadeup') { state.split='letter'; state.duration=1600; state.keyframes=[{t:0,x:0,y:40,scale:.85,rotate:0,opacity:0,tracking:0,stagger:40,easing:'ease-in'},{t:1600,x:0,y:0,scale:1,rotate:0,opacity:1,tracking:4,stagger:40,easing:'ease-out'}]; } else if (name === 'liquid') { state.split='letter'; state.duration=2200; state.keyframes=[{t:0,x:0,y:0,scale:1,rotate:0,opacity:1,tracking:0,stagger:60,easing:'ease'},{t:700,x:-15,y:20,scale:1.2,rotate:8,opacity:.9,tracking:8,stagger:60,easing:'ease-in-out'},{t:1400,x:15,y:-15,scale:.9,rotate:-6,opacity:.95,tracking:-4,stagger:60,easing:'ease-in-out'},{t:2200,x:0,y:0,scale:1,rotate:0,opacity:1,tracking:0,stagger:60,easing:'ease'}]; } rebuildCanvas(); updateTimeline(); }
function toggleGuide(g) { state.guides[g] = !state.guides[g]; document.getElementById('safeArea').style.display = (g==='safe' && state.guides.safe)? 'block':'none'; document.getElementById('gridOverlay').style.display = (g==='grid' && state.guides.grid)? 'block':'none'; document.getElementById('marginGuide').style.display = (g==='margin' && state.guides.margin)? 'block':'none'; }
function updateKeyframe(prop, val) { /* Adjust current active keyframe for demo */ const i = Math.min(state.time / state.duration * state.keyframes.length | 0, state.keyframes.length-1); if (!state.keyframes[i]) return; const k = state.keyframes[i]; if (prop === 'x') k.x = Number(val); else if (prop === 'y') k.y = Number(val); else if (prop === 'scale') k.scale = parseFloat(val); else if (prop === 'rotate') k.rotate = Number(val); else if (prop === 'opacity') k.opacity = parseFloat(val); else if (prop === 'tracking') k.tracking = Number(val); else if (prop === 'stagger') k.stagger = Number(val); else if (prop === 'easing') k.easing = val; rebuildCanvas(); }
function updateStagger(v) { state.stagger = Number(v); rebuildCanvas(); }
function updateMargin(v) { document.getElementById('marginGuide').style.inset = (v) + '%'; }
function updateGridOpacity(v) { document.getElementById('gridOverlay').style.opacity = v; if (v < 0.01) document.getElementById('gridOverlay').style.display = 'none'; else document.getElementById('gridOverlay').style.display = 'block'; }

function applyStyle() {
  const canvas = document.getElementById('kineticCanvas');
  const txt = state.text;
  // Build split
  let pieces = [];
  if (state.split === 'word') pieces = txt.split(/\s+/);
  else if (state.split === 'line') pieces = txt.split(/\n/);
  else pieces = txt.split('');

  let html = '';
  pieces.forEach((p, i) => {
    if (state.split === 'line') {
      html += `<span style="display:block;">${p}</span>`;
    } else {
      // Per-letter or per-word: wrap each in span
      const chars = state.split === 'letter' ? p.split('') : [p];
      chars.forEach(ch => {
        if (ch === ' ') { html += '<span>&nbsp;</span>'; return; }
        html += `<span>${ch === '\n' ? '<br>' : ch}</span>`;
      });
    }
  });
  canvas.innerHTML = html;

  // Styles
  const spans = canvas.querySelectorAll('span');
  spans.forEach(s => {
    s.style.display = (state.split === 'line') ? 'block' : 'inline-block';
    s.style.transition = 'none'; // We animate via keyframe interpolation
  });
}

function rebuildCanvas() {
  applyStyle();
  // Apply base font styles
  const canvas = document.getElementById('kineticCanvas');
  canvas.style.fontFamily = `"${state.font}", sans-serif`;
  canvas.style.fontWeight = state.fontWeight;
  canvas.style.fontStyle = state.italic;
  renderFrame();
  updateTimeline();
}

// Simple cubic-bezier interpolation
function cubicBezier(t, p0, p1, p2, p3) {
  const cx = 3 * (p0.x - p1.x);
  const bx = 3 * (p2.x - p1.x) - cx;
  const ax = p3.x - p0.x - cx - bx;
  const cy = 3 * (p0.y - p1.y);
  const by = 3 * (p2.y - p1.y) - cy;
  const ay = p3.y - p0.y - cy - by;
  const t2 = t * t;
  const t3 = t2 * t;
  return { x: ax * t3 + bx * t2 + cx * t + p0.x, y: ay * t3 + by * t2 + cy * t + p0.y };
}

function ease(t, kind) {
  if (kind === 'ease-in') return t * t;
  if (kind === 'ease-out') return 1 - (1 - t) * (1 - t);
  if (kind === 'ease-in-out') return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
  if (kind === 'linear') return t;
  // Approximate cubic-bezier ease
  return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
}

function interpolateKeyframes(t) {
  // Find surrounding keyframes
  const kfs = state.keyframes.sort((a, b) => a.t - b.t);
  let before = kfs[0], after = kfs[kfs.length - 1];
  for (let i = 0; i < kfs.length - 1; i++) {
    if (t >= kfs[i].t && t <= kfs[i + 1].t) { before = kfs[i]; after = kfs[i + 1]; break; }
  }
  const range = after.t - before.t || 1;
  const localT = (t - before.t) / range;
  const e = (kind) => ease(localT, kind);
  const eBefore = e(before.easing), eAfter = e(after.easing); // simplified
  // We'll just interpolate with ease-in-out approximation
  const mix = ease(localT, 'ease-in-out');
  return {
    x: before.x + (after.x - before.x) * mix,
    y: before.y + (after.y - before.y) * mix,
    scale: before.scale + (after.scale - before.scale) * mix,
    rotate: before.rotate + (after.rotate - before.rotate) * mix,
    opacity: before.opacity + (after.opacity - before.opacity) * mix,
    tracking: before.tracking + (after.tracking - before.tracking) * mix,
    stagger: before.stagger + (after.stagger - before.stagger) * mix,
  };
}

function renderFrame() {
  const t = state.time;
  const kf = interpolateKeyframes(t);
  const canvas = document.getElementById('kineticCanvas');
  const spans = canvas.querySelectorAll('span');

  spans.forEach((span, i) => {
    const delay = i * (kf.stagger / 1000); // seconds
    let localT = Math.max(0, t - delay * 1000);
    // Clamp for per-item animation
    const itemDur = state.duration + (spans.length * kf.stagger);
    const progress = Math.min(1, Math.max(0, localT / itemDur));
    const interp = interpolateKeyframes(progress * state.duration);

    // Transform
    span.style.transform = `translate(${interp.x}px, ${interp.y}px) rotate(${interp.rotate}deg) scale(${interp.scale})`;
    span.style.opacity = interp.opacity;
    span.style.letterSpacing = interp.tracking + 'px';

    // Gradient / color
    if (state.style.gradient) {
      const colors = state.style.gradientColors.split(',');
      span.style.background = `linear-gradient(90deg, ${colors[0].trim()}, ${colors[1]?.trim() || colors[0].trim()})`;
      span.style.webkitBackgroundClip = 'text';
      span.style.webkitTextFillColor = 'transparent';
      span.style.backgroundClip = 'text';
    } else {
      span.style.color = state.style.fill;
      span.style.webkitTextFillColor = state.style.fill;
      span.style.background = 'none';
    }

    // Outline
    if (state.style.outline) {
      span.style.webkitTextStroke = '1.5px ' + state.style.outlineColor;
    } else {
      span.style.webkitTextStroke = '0';
    }

    // Shadow
    if (state.style.shadow) {
      span.style.textShadow = `0 8px 30px ${state.style.shadowColor}40, 0 2px 8px ${state.style.shadowColor}60`;
    } else {
      span.style.textShadow = 'none';
    }

    // Motion blur
    if (state.style.motionBlur) {
      span.classList.add('motion-blur');
    } else {
      span.classList.remove('motion-blur');
    }
  });
}

function animateLoop() {
  if (state.playing) {
    state.time = (state.time + (1000 / state.fps)) % (state.duration + state.delay + (state.text.length * 60));
    renderFrame();
    document.getElementById('timeDisplay').textContent = (state.time / 1000).toFixed(2) + 's';
  }
  requestAnimationFrame(animateLoop);
}

function togglePlay() {
  state.playing = !state.playing;
  document.getElementById('playBtn').classList.toggle('pulse-ring', state.playing);
  document.getElementById('playIcon').style.display = state.playing ? 'none' : 'block';
  document.getElementById('pauseIcon').style.display = state.playing ? 'block' : 'none';
}
function scrub(delta) { state.time = Math.max(0, Math.min(state.duration + 500, state.time + delta * 1000)); renderFrame(); document.getElementById('timeDisplay').textContent = (state.time / 1000).toFixed(2) + 's'; }

// Timeline
function updateTimeline() {
  const tl = document.getElementById('timeline');
  const ticks = document.getElementById('timelineTicks');
  const markers = document.getElementById('keyframeMarkers');
  ticks.innerHTML = '';
  markers.innerHTML = '';

  // Ticks every 200ms
  const steps = Math.ceil((state.duration + 500) / 200);
  for (let i = 0; i <= steps; i++) {
    const div = document.createElement('div');
    div.className = 'absolute top-0 bottom-0 w-px bg-white/10';
    div.style.left = (i / steps * 100) + '%';
    ticks.appendChild(div);
  }

  // Keyframe markers
  state.keyframes.forEach(k => {
    const m = document.createElement('div');
    m.className = 'key-marker';
    m.style.left = (k.t / (state.duration + 200) * 100) + '%';
    m.style.color = '#c9a84c';
    m.title = `t=${k.t}ms`;
    markers.appendChild(m);
  });
}

// Audio
function loadAudio(input) {
  const file = input.files[0];
  if (!file) return;
  const url = URL.createObjectURL(file);
  if (state.audio) { state.audio.pause(); state.audio.src = ''; }
  state.audio = new Audio(url);
  state.audio.addEventListener('loadedmetadata', () => {
    detectBeats(state.audio);
    setupVisualizer();
  });
  state.audio.play();
}

function detectBeats(audio) {
  if (!state.audioContext) state.audioContext = new (window.AudioContext || window.webkitAudioContext)();
  state.audioContext.resume();
  const src = state.audioContext.createMediaElementSource(audio);
  state.analyser = state.audioContext.createAnalyser();
  state.analyser.fftSize = 1024;
  src.connect(state.analyser);
  state.analyser.connect(state.audioContext.destination);
  // Simple beat detection using frequency peaks
  const dataArray = new Uint8Array(state.analyser.frequencyBinCount);
  state.beatTimes = [];
  let lastPeak = 0;
  function detect() {
    state.analyser.getByteFrequencyData(dataArray);
    const avg = dataArray.reduce((a,b)=>a+b,0) / dataArray.length;
    const now = audio.currentTime * 1000;
    if (avg > 60 && avg > lastPeak * 0.7 && now - lastPeak > 200) { state.beatTimes.push(now); lastPeak = now; }
    lastPeak = Math.max(lastPeak, avg);
    if (audio.paused || audio.ended) return;
    requestAnimationFrame(detect);
  }
  detect();
}

function setupVisualizer() {
  const viz = document.getElementById('audioVisualizer');
  viz.innerHTML = '';
  for (let i = 0; i < 32; i++) {
    const bar = document.createElement('div');
    bar.className = 'w-1 bg-gradient-to-t from-amber-600/30 to-amber-400/70 rounded-full';
    bar.style.height = '4px';
    viz.appendChild(bar);
  }
  function draw() {
    if (!state.analyser || !state.audio) return;
    const data = new Uint8Array(state.analyser.frequencyBinCount);
    state.analyser.getByteFrequencyData(data);
    const bars = viz.children;
    for (let i = 0; i < bars.length; i++) {
      const val = data[i * 8] || 0;
      bars[i].style.height = Math.max(4, val / 3) + 'px';
    }
    requestAnimationFrame(draw);
  }
  draw();
}

// Export
function renderExport(type) {
  alert('Export simulation: Would render ' + state.text + ' as ' + type.toUpperCase() + ' at ' + state.resolution + ' / ' + state.fps + 'fps.\nIn a full implementation this captures the canvas to MP4/WebM/GIF/PNG sequence.');
}

// Init
window.addEventListener('load', () => {
  rebuildCanvas();
  animateLoop();
  document.getElementById('durationDisplay').textContent = '/ ' + (state.duration/1000).toFixed(1) + 's';

  // Keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    if (e.key === ' ' || e.key === 'k') { e.preventDefault(); togglePlay(); }
    if (e.key === 'ArrowLeft') { scrub(-0.2); }
    if (e.key === 'ArrowRight') { scrub(0.2); }
    if (e.key === 'r') { rebuildCanvas(); }
    if (e.key === '1') { setAspect(1); }
    if (e.key === '2') { setAspect(9/16); }
    if (e.key === '3') { setAspect(16/9); }
  });

  // Reduced motion listener
  window.matchMedia('(prefers-reduced-motion: reduce)').addEventListener('change', (e) => {
    state.reducedMotion = e.matches;
    document.body.style.setProperty('--reduced', e.matches ? '1' : '0');
  });
});
</script>
