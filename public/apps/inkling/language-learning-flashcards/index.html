<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flashcards — Learn Languages</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&family=Outfit:wght@300;400;500;600;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            serif: ['"Cormorant Garamond"', 'Georgia', 'serif'],
            sans: ['"Outfit"', 'system-ui', 'sans-serif'],
            jp: ['"Noto Serif JP"', 'serif'],
          },
          colors: {
            ink: '#0f172a',
            parchment: '#fdf8f3',
            gold: '#c5a065',
            rose: '#d48c8c',
            sage: '#8ba888',
            dusk: '#3e3b5c',
          }
        }
      }
    }
  </script>
  <style>
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Outfit', system-ui, sans-serif;
      background: linear-gradient(135deg, #fdf8f3 0%, #f0ebe5 50%, #ebe6de 100%);
      min-height: 100vh;
      color: #0f172a;
    }
    .glass {
      background: rgba(255,255,255,0.65);
      backdrop-filter: blur(24px) saturate(1.2);
      -webkit-backdrop-filter: blur(24px) saturate(1.2);
      border: 1px solid rgba(255,255,255,0.35);
      box-shadow: 0 20px 50px rgba(63,59,92,0.08), 0 8px 24px rgba(63,59,92,0.06);
    }
    .glass-card {
      background: linear-gradient(160deg, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0.75) 100%);
      backdrop-filter: blur(30px);
      border: 1px solid rgba(255,255,255,0.5);
      box-shadow: 0 24px 60px rgba(63,59,92,0.1), inset 0 1px 0 rgba(255,255,255,0.6);
    }
    .flip-container { perspective: 1200px; }
    .flip-card { transition: transform 0.85s cubic-bezier(0.34, 1.56, 0.64, 1); transform-style: preserve-3d; }
    .flip-card.flipped { transform: rotateY(180deg); }
    .flip-front, .flip-back { backface-visibility: hidden; -webkit-backface-visibility: hidden; }
    .flip-back { transform: rotateY(180deg); }
    @keyframes floatUp {
      from { opacity: 0; transform: translateY(30px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .anim-up { animation: floatUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) both; }
    @keyframes fadeIn {
      from { opacity: 0; } to { opacity: 1; }
    }
    .fade-in { animation: fadeIn 0.5s ease both; }
    .text-gradient {
      background: linear-gradient(135deg, #3e3b5c 0%, #8ba888 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .gold-gradient {
      background: linear-gradient(135deg, #c5a065 0%, #d4b37a 60%, #c5a065 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .btn-glow:hover {
      box-shadow: 0 0 30px rgba(197,160,101,0.35), 0 10px 30px rgba(63,59,92,0.15);
    }
    .card-shadow-hover:hover {
      box-shadow: 0 32px 70px rgba(63,59,92,0.14), 0 16px 32px rgba(63,59,92,0.08);
      transform: translateY(-4px);
    }
    ::selection { background: rgba(197,160,101,0.25); color: #0f172a; }
  </style>
</head>
<body class="min-h-screen flex flex-col">

  <!-- Main App -->
  <main id="app" class="flex-1 flex flex-col items-center px-4 sm:px-8 py-12 sm:py-20">

    <!-- Language Selection -->
    <section id="selection" class="w-full max-w-2xl mx-auto anim-up">
      <div class="text-center mb-12">
        <div class="inline-flex items-center gap-2 mb-6 px-4 py-1.5 rounded-full bg-white/60 border border-white/40 text-xs font-semibold tracking-widest uppercase text-dusk shadow-sm">
          <span class="w-1.5 h-1.5 rounded-full bg-sage animate-pulse"></span>
          Interactive Flashcards
        </div>
        <h1 class="font-serif text-5xl sm:text-7xl font-light tracking-tight mb-5 leading-[0.92]">
          <span class="text-gradient">Learn</span><br>
          <span class="italic font-light text-dusk/80">any language</span>
        </h1>
        <p class="text-dusk/60 text-base sm:text-lg font-light max-w-md mx-auto leading-relaxed">
          Select a language and practice essential travel phrases with beautiful flip cards.
        </p>
      </div>

      <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 sm:gap-6">
        <!-- English -->
        <button onclick="startApp('en')" class="group relative overflow-hidden rounded-3xl p-6 sm:p-8 glass card-shadow-hover transition-all duration-500 text-left">
          <div class="absolute top-0 right-0 w-24 h-24 bg-gradient-to-br from-rose/10 to-transparent rounded-full -translate-y-1/3 translate-x-1/4 pointer-events-none"></div>
          <div class="relative z-10">
            <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-rose/20 to-rose/5 flex items-center justify-center mb-5 shadow-inner border border-rose/10">
              <span class="text-2xl">🇬🇧</span>
            </div>
            <h3 class="font-serif text-2xl sm:text-3xl font-semibold mb-1 text-ink">English</h3>
            <p class="text-xs text-dusk/40 font-medium tracking-wide uppercase">For travel</p>
          </div>
        </button>

        <!-- Spanish -->
        <button onclick="startApp('es')" class="group relative overflow-hidden rounded-3xl p-6 sm:p-8 glass card-shadow-hover transition-all duration-500 text-left">
          <div class="absolute top-0 right-0 w-24 h-24 bg-gradient-to-br from-gold/10 to-transparent rounded-full -translate-y-1/3 translate-x-1/4 pointer-events-none"></div>
          <div class="relative z-10">
            <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-gold/20 to-gold/5 flex items-center justify-center mb-5 shadow-inner border border-gold/10">
              <span class="text-2xl">🇪🇸</span>
            </div>
            <h3 class="font-serif text-2xl sm:text-3xl font-semibold mb-1 text-ink">Spanish</h3>
            <p class="text-xs text-dusk/40 font-medium tracking-wide uppercase">Para viajar</p>
          </div>
        </button>

        <!-- French -->
        <button onclick="startApp('fr')" class="group relative overflow-hidden rounded-3xl p-6 sm:p-8 glass card-shadow-hover transition-all duration-500 text-left">
          <div class="absolute top-0 right-0 w-24 h-24 bg-gradient-to-br from-sage/15 to-transparent rounded-full -translate-y-1/3 translate-x-1/4 pointer-events-none"></div>
          <div class="relative z-10">
            <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-sage/20 to-sage/5 flex items-center justify-center mb-5 shadow-inner border border-sage/15">
              <span class="text-2xl">🇫🇷</span>
            </div>
            <h3 class="font-serif text-2xl sm:text-3xl font-semibold mb-1 text-ink">French</h3>
            <p class="text-xs text-dusk/40 font-medium tracking-wide uppercase">Pour voyager</p>
          </div>
        </button>

        <!-- Japanese -->
        <button onclick="startApp('ja')" class="group relative overflow-hidden rounded-3xl p-6 sm:p-8 glass card-shadow-hover transition-all duration-500 text-left">
          <div class="absolute top-0 right-0 w-24 h-24 bg-gradient-to-br from-ink/10 to-transparent rounded-full -translate-y-1/3 translate-x-1/4 pointer-events-none"></div>
          <div class="relative z-10">
            <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-dusk/15 to-dusk/5 flex items-center justify-center mb-5 shadow-inner border border-dusk/10">
              <span class="text-2xl">🇯🇵</span>
            </div>
            <h3 class="font-serif text-2xl sm:text-3xl font-semibold mb-1 text-ink">Japanese</h3>
            <p class="font-jp text-xs text-dusk/40 tracking-wide">旅行用</p>
          </div>
        </button>
      </div>
    </section>

    <!-- Flashcard Area -->
    <section id="flashcards" class="hidden w-full max-w-xl mx-auto">
      <div class="flex items-center justify-between mb-6">
        <button onclick="backToSelection()" class="group flex items-center gap-2 text-dusk/50 hover:text-ink transition-colors text-sm font-medium">
          <svg class="w-4 h-4 transition-transform group-hover:-translate-x-0.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
          Back
        </button>
        <div class="flex items-center gap-3 text-xs font-medium text-dusk/40">
          <span id="learnedCount" class="text-gold">0</span>
          <span>/</span>
          <span id="totalCount">10</span>
          <span>learned</span>
        </div>
      </div>

      <div class="text-center mb-6">
        <h2 id="languageTitle" class="font-serif text-3xl sm:text-4xl font-semibold text-gradient mb-1"></h2>
        <p id="languageSubtitle" class="text-sm text-dusk/40 font-light"></p>
      </div>

      <!-- Card -->
      <div class="flip-container relative h-[22rem] sm:h-[26rem] mb-8 cursor-pointer" onclick="flipCard()" id="flipContainer">
        <div id="flipCard" class="flip-card relative w-full h-full">
          <!-- Front -->
          <div class="flip-front absolute inset-0 rounded-[2rem] glass-card flex flex-col items-center justify-center p-8 text-center overflow-hidden">
            <div class="absolute inset-0 bg-gradient-to-br from-white/30 to-transparent pointer-events-none"></div>
            <div class="relative z-10 flex flex-col items-center">
              <span id="cardNumber" class="text-[10px] font-bold tracking-[0.2em] uppercase text-dusk/20 mb-4">01 / 10</span>
              <h3 id="frontText" class="font-serif text-3xl sm:text-5xl font-light text-ink leading-tight mb-3"></h3>
              <p id="frontHint" class="text-xs text-dusk/30 tracking-widest uppercase"></p>
            </div>
            <div class="absolute bottom-6 left-0 right-0 text-center">
              <span class="inline-block text-[10px] tracking-[0.15em] uppercase text-dusk/20 font-medium">Click to reveal</span>
            </div>
          </div>
          <!-- Back -->
          <div class="flip-back absolute inset-0 rounded-[2rem] glass-card flex flex-col items-center justify-center p-8 text-center overflow-hidden bg-gradient-to-br from-white/95 via-white/85 to-rose/5">
            <div class="relative z-10 flex flex-col items-center">
              <span id="backNumber" class="text-[10px] font-bold tracking-[0.2em] uppercase text-dusk/20 mb-4">01 / 10</span>
              <h3 id="backText" class="font-serif text-3xl sm:text-5xl font-light text-ink leading-tight mb-6"></h3>
              <div class="flex gap-2 mb-6">
                <button id="btnGotIt" onclick="event.stopPropagation(); markLearned(true);" class="px-5 py-2.5 rounded-full bg-gradient-to-r from-sage/20 to-sage/10 text-dusk/60 text-xs font-semibold tracking-wide border border-sage/20 hover:bg-sage/30 hover:text-ink transition-all shadow-sm hover:shadow-md">
                  Got it
                </button>
                <button id="btnAgain" onclick="event.stopPropagation(); markLearned(false);" class="px-5 py-2.5 rounded-full bg-dusk/5 text-dusk/40 text-xs font-semibold tracking-wide border border-dusk/10 hover:bg-dusk/10 hover:text-ink transition-all shadow-sm hover:shadow-md">
                  Again
                </button>
              </div>
              <p id="backHint" class="text-[10px] text-dusk/20 tracking-widest uppercase"></p>
            </div>
            <div class="absolute bottom-6 left-0 right-0 text-center">
              <span class="inline-block text-[10px] tracking-[0.15em] uppercase text-dusk/20 font-medium">Click to flip back</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Controls -->
      <div class="flex items-center justify-between gap-4">
        <button onclick="shuffleCards()" class="flex-1 group relative overflow-hidden rounded-2xl px-6 py-4 glass card-shadow-hover transition-all duration-300 text-sm font-semibold text-ink hover:text-dusk">
          <div class="absolute inset-0 bg-gradient-to-r from-gold/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
          <div class="relative z-10 flex items-center justify-center gap-2.5">
            <svg class="w-4 h-4 text-gold transition-transform group-hover:rotate-[-15deg]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 0012 21a8.001 8.001 0 00-7.582-9.586M20 11V7h-5.582m0 0H7"/></svg>
            <span>Shuffle</span>
          </div>
        </button>
        <button onclick="nextCard()" class="flex-1 rounded-2xl px-6 py-4 bg-gradient-to-r from-dusk to-ink text-white text-sm font-semibold shadow-xl shadow-dusk/20 hover:shadow-2xl hover:shadow-dusk/30 transition-all btn-glow hover:-translate-y-0.5 active:translate-y-0">
          Next Card
        </button>
      </div>

      <!-- Progress Bar -->
      <div class="mt-8">
        <div class="flex justify-between text-[10px] font-medium text-dusk/20 mb-2 tracking-wide uppercase">
          <span>Progress</span>
          <span id="progressText">0%</span>
        </div>
        <div class="h-1.5 w-full rounded-full bg-dusk/5 overflow-hidden">
          <div id="progressBar" class="h-full rounded-full bg-gradient-to-r from-gold via-gold/80 to-gold transition-all duration-700 ease-out w-0"></div>
        </div>
      </div>
    </section>

  </main>

  <!-- Footer -->
  <footer class="w-full py-6 text-center text-[10px] text-dusk/20 tracking-widest uppercase font-medium">
    <span>Language Flashcards</span> <span class="mx-2">·</span> <span>Self-contained</span>
  </footer>

  <script>
    const data = {
      en: {
        title: 'English',
        subtitle: 'Essential travel phrases',
        cards: [
          { q: 'Where is the nearest train station?', hint: 'Asking for directions' },
          { q: 'How much does this cost?', hint: 'Shopping' },
          { q: 'Can I have the menu, please?', hint: 'Restaurant' },
          { q: 'I would like a room for two nights.', hint: 'Hotel check-in' },
          { q: 'Is there a pharmacy nearby?', hint: 'Health' },
          { q: 'What time does the museum open?', hint: 'Sightseeing' },
          { q: 'Could you help me, please?', hint: 'General help' },
          { q: 'Where can I exchange currency?', hint: 'Money' },
          { q: 'I need a taxi to the airport.', hint: 'Transport' },
          { q: 'Can you recommend a good restaurant?', hint: 'Dining' }
        ],
        backLabels: {
          answer: 'Translation',
          gotIt: 'Got it',
          again: 'Again',
          clickBack: 'Click to flip back',
          clickReveal: 'Click to reveal'
        }
      },
      es: {
        title: 'Español',
        subtitle: 'Frases esenciales de viaje',
        cards: [
          { q: '¿Dónde está la estación de tren más cercana?', hint: 'Direcciones' },
          { q: '¿Cuánto cuesta esto?', hint: 'Compras' },
          { q: '¿Me puede dar el menú, por favor?', hint: 'Restaurante' },
          { q: 'Quisiera una habitación por dos noches.', hint: 'Hotel' },
          { q: '¿Hay una farmacia cerca?', hint: 'Salud' },
          { q: '¿A qué hora abre el museo?', hint: 'Turismo' },
          { q: '¿Podría ayudarme, por favor?', hint: 'Ayuda general' },
          { q: '¿Dónde puedo cambiar dinero?', hint: 'Dinero' },
          { q: 'Necesito un taxi al aeropuerto.', hint: 'Transporte' },
          { q: '¿Me puede recomendar un buen restaurante?', hint: 'Comida' }
        ],
        backLabels: {
          answer: 'Traducción (Inglés)',
          gotIt: 'Entendido',
          again: 'Otra vez',
          clickBack: 'Haz clic para voltear',
          clickReveal: 'Haz clic para revelar'
        }
      },
      fr: {
        title: 'Français',
        subtitle: 'Phrases essentielles pour voyager',
        cards: [
          { q: 'Où est la gare la plus proche ?', hint: 'Directions' },
          { q: 'Combien ça coûte ?', hint: 'Achats' },
          { q: 'Puis-je avoir le menu, s\'il vous plaît ?', hint: 'Restaurant' },
          { q: 'Je voudrais une chambre pour deux nuits.', hint: 'Hôtel' },
          { q: 'Y a-t-il une pharmacie à proximité ?', hint: 'Santé' },
          { q: 'À quelle heure ouvre le musée ?', hint: 'Visite' },
          { q: 'Pourriez-vous m\'aider, s\'il vous plaît ?', hint: 'Aide générale' },
          { q: 'Où puis-je changer de l\'argent ?', hint: 'Argent' },
          { q: 'J\'ai besoin d\'un taxi pour l\'aéroport.', hint: 'Transport' },
          { q: 'Pouvez-vous recommander un bon restaurant ?', hint: 'Restauration' }
        ],
        backLabels: {
          answer: 'Traduction (Anglais)',
          gotIt: 'Compris',
          again: 'Encore',
          clickBack: 'Cliquez pour retourner',
          clickReveal: 'Cliquez pour révéler'
        }
      },
      ja: {
        title: '日本語',
        subtitle: '旅行に役立つ基本フレーズ',
        cards: [
          { q: '最寄りの駅はどこですか？', hint: '道を尋ねる' },
          { q: 'これはいくらですか？', hint: '買い物' },
          { q: 'メニューをください。', hint: 'レストラン' },
          { q: '2泊の部屋をお願いします。', hint: 'ホテル' },
          { q: '近くに薬局はありますか？', hint: '健康' },
          { q: '美術館は何時に開きますか？', hint: '観光' },
          { q: '手伝っていただけますか？', hint: '一般的な助け' },
          { q: '両替はどこでできますか？', hint: 'お金' },
          { q: '空港までタクシーをお願いします。', hint: '交通' },
          { q: 'おすすめのレストランはありますか？', hint: '食事' }
        ],
        backLabels: {
          answer: '英語訳',
          gotIt: '理解しました',
          again: 'もう一度',
          clickBack: 'クリックで裏返す',
          clickReveal: 'クリックで表示'
        }
      }
    };

    let currentLang = 'en';
    let cards = [];
    let index = 0;
    let learned = new Set();

    function getLocaleLang() {
      const locale = navigator.language || navigator.userLanguage || 'en';
      const code = locale.toLowerCase().split('-')[0];
      if (['es','fr','ja'].includes(code)) return code;
      return 'en';
    }

    function startApp(lang) {
      currentLang = lang;
      cards = [...data[lang].cards];
      index = 0;
      learned = new Set();
      document.getElementById('selection').classList.add('hidden');
      const fc = document.getElementById('flashcards');
      fc.classList.remove('hidden');
      fc.classList.add('anim-up');
      document.getElementById('languageTitle').textContent = data[lang].title;
      document.getElementById('languageSubtitle').textContent = data[lang].subtitle;
      document.getElementById('totalCount').textContent = cards.length;
      renderCard();
      updateProgress();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function backToSelection() {
      document.getElementById('selection').classList.remove('hidden');
      document.getElementById('selection').classList.add('anim-up');
      document.getElementById('flashcards').classList.add('hidden');
      document.getElementById('flipCard').classList.remove('flipped');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderCard() {
      const card = cards[index];
      const labels = data[currentLang].backLabels;
      document.getElementById('frontText').textContent = card.q;
      document.getElementById('frontHint').textContent = card.hint;
      document.getElementById('backText').textContent = card.q; // Translation shown via label or we can show English equivalent
      // For a real translation experience, we'll show the English phrase on the back for non-English, and native phrase for English
      const backTextEl = document.getElementById('backText');
      if (currentLang === 'en') {
        backTextEl.textContent = card.q; // English card: back shows same with extra context maybe
        document.getElementById('backHint').textContent = 'Practice this phrase';
      } else {
        // Show English translation for other languages
        const enData = data.en.cards[index];
        backTextEl.textContent = enData ? enData.q : card.q;
        document.getElementById('backHint').textContent = 'English translation';
      }
      document.getElementById('cardNumber').textContent = `${String(index + 1).padStart(2, '0')} / ${String(cards.length).padStart(2, '0')}`;
      document.getElementById('backNumber').textContent = document.getElementById('cardNumber').textContent;
      document.getElementById('btnGotIt').textContent = data[currentLang].backLabels.gotIt;
      document.getElementById('btnAgain').textContent = data[currentLang].backLabels.again;
      document.getElementById('flipCard').classList.remove('flipped');
    }

    function flipCard() {
      document.getElementById('flipCard').classList.toggle('flipped');
    }

    function markLearned(learnedYes) {
      if (learnedYes) learned.add(index);
      else learned.delete(index);
      updateProgress();
      nextCard();
    }

    function nextCard() {
      index = (index + 1) % cards.length;
      renderCard();
    }

    function shuffleCards() {
      for (let i = cards.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [cards[i], cards[j]] = [cards[j], cards[i]];
      }
      index = 0;
      renderCard();
    }

    function updateProgress() {
      const pct = Math.round((learned.size / cards.length) * 100);
      document.getElementById('learnedCount').textContent = learned.size;
      document.getElementById('totalCount').textContent = cards.length;
      document.getElementById('progressText').textContent = pct + '%';
      document.getElementById('progressBar').style.width = pct + '%';
    }

    // Auto-select based on locale on first load (optional visual hint)
    window.addEventListener('DOMContentLoaded', () => {
      const localeLang = getLocaleLang();
      if (localeLang !== 'en') {
        // Subtly highlight the recommended card
        const btn = document.querySelector(`button[onclick="startApp('${localeLang}')"]`);
        if (btn) {
          btn.classList.add('ring-2', 'ring-gold/30', 'ring-offset-2');
          btn.querySelector('h3').classList.add('text-dusk');
        }
      }
    });
  </script>
</body>
</html>
