<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Math Practice Drills</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['"Outfit"', 'sans-serif'],
            mono: ['"Space Mono"', 'monospace'],
          },
          colors: {
            ink: '#0a0e17',
            slate: '#8b95a5',
            pearl: '#f4f1ea',
            coral: '#ff6b5b',
            sea: '#2ec4b6',
            gold: '#ffb703',
          }
        }
      }
    }
  </script>
  <style>
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Outfit', sans-serif;
      background-color: #0a0e17;
      color: #f4f1ea;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    ::selection { background: rgba(46,196,182,0.25); color: #fff; }

    /* Animated gradient mesh background */
    .mesh-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(at 20% 10%, rgba(46,196,182,0.18) 0%, transparent 50%),
        radial-gradient(at 80% 80%, rgba(255,107,91,0.12) 0%, transparent 50%),
        radial-gradient(at 50% 50%, rgba(255,183,3,0.08) 0%, transparent 60%);
    }
    .mesh-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(45deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 1px, transparent 1px, transparent 20px);
      opacity: 0.4;
    }

    /* Glowing orb */
    .glow-orb {
      position: absolute;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.35;
      animation: floatOrb 18s ease-in-out infinite alternate;
    }
    @keyframes floatOrb {
      0% { transform: translate(0,0) scale(1); }
      33% { transform: translate(30px,-20px) scale(1.05); }
      66% { transform: translate(-20px,15px) scale(0.95); }
      100% { transform: translate(10px,10px) scale(1.02); }
    }

    /* Card glass */
    .glass {
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(24px) saturate(1.3);
      -webkit-backdrop-filter: blur(24px) saturate(1.3);
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow: 0 25px 60px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.06);
    }

    /* Number shimmer */
    .shimmer {
      background: linear-gradient(90deg, #f4f1ea, #ffb703, #f4f1ea);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 3s linear infinite;
    }
    @keyframes shimmer {
      to { background-position: -200% center; }
    }

    /* Progress ring */
    .ring-track { stroke: rgba(255,255,255,0.06); }
    .ring-fill { transition: stroke-dashoffset 0.3s ease; stroke-linecap: round; }

    /* Input styling */
    input[type="number"] {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      color: #f4f1ea;
      font-family: 'Space Mono', monospace;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input[type="number"]:focus {
      outline: none;
      border-color: rgba(46,196,182,0.5);
      box-shadow: 0 0 0 3px rgba(46,196,182,0.15);
    }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

    /* Button press effect */
    .btn-press:active { transform: scale(0.97); }

    /* Result card slide in */
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .anim-slide { animation: slideUp 0.6s ease-out both; }
  </style>
</head>
<body class="min-h-screen relative">
  <!-- Background mesh -->
  <div class="mesh-bg" aria-hidden="true"></div>
  <div class="glow-orb bg-sea" style="top:-80px;left:-60px; animation-delay:0s;"></div>
  <div class="glow-orb bg-coral" style="bottom:-100px;right:-80px; animation-delay:-6s;"></div>

  <main class="relative z-10 max-w-2xl mx-auto px-6 py-12 md:py-20 min-h-screen flex flex-col">

    <!-- Header -->
    <header class="text-center mb-16">
      <h1 class="font-display text-5xl md:text-7xl font-black tracking-tight leading-[0.92] mb-4">
        <span class="shimmer">Math Practice</span><br>
        <span class="text-slate/60 font-extralight">Drills</span>
      </h1>
      <p class="text-slate/50 text-lg md:text-xl font-light max-w-md mx-auto">Speed. Accuracy. Mastery.</p>
    </header>

    <!-- Main Card -->
    <section id="app-card" class="glass rounded-[2.5rem] p-8 md:p-12 relative overflow-hidden anim-slide">

      <!-- Difficulty Selector -->
      <div id="setup" class="text-center">
        <h2 class="font-display text-3xl md:text-4xl font-bold mb-2">Choose Difficulty</h2>
        <p class="text-slate/40 mb-8">Select the level that challenges you most.</p>

        <div class="grid grid-cols-3 gap-4 max-w-lg mx-auto mb-8">
          <button onclick="startQuiz('easy')" class="group relative rounded-2xl p-6 bg-white/[0.03] border border-white/[0.06] hover:border-sea/40 hover:bg-white/[0.06] transition-all btn-press">
            <div class="text-3xl mb-2">🌱</div>
            <h3 class="font-display font-bold text-xl mb-1">Easy</h3>
            <p class="text-xs text-slate/30">Single-digit</p>
          </button>
          <button onclick="startQuiz('medium')" class="group relative rounded-2xl p-6 bg-white/[0.03] border border-white/[0.06] hover:border-gold/40 hover:bg-white/[0.06] transition-all btn-press">
            <div class="text-3xl mb-2">🔥</div>
            <h3 class="font-display font-bold text-xl mb-1">Medium</h3>
            <p class="text-xs text-slate/30">Two-digit</p>
          </button>
          <button onclick="startQuiz('hard')" class="group relative rounded-2xl p-6 bg-white/[0.03] border border-white/[0.06] hover:border-coral/40 hover:bg-white/[0.06] transition-all btn-press">
            <div class="text-3xl mb-2">⚡</div>
            <h3 class="font-display font-bold text-xl mb-1">Hard</h3>
            <p class="text-xs text-slate/30">Three-digit</p>
          </button>
        </div>

        <div class="flex justify-center items-center gap-6 text-sm text-slate/30">
          <span>10 Problems</span>
          <span class="w-1 h-1 rounded-full bg-slate/20"></span>
          <span>60 Seconds</span>
        </div>
      </div>

      <!-- Quiz Area -->
      <div id="quiz" class="hidden text-center">
        <!-- Timer Ring + Score -->
        <div class="flex justify-between items-start mb-8">
          <div class="text-left">
            <div class="text-xs uppercase tracking-[0.2em] text-slate/30 mb-1">Score</div>
            <div class="font-display text-4xl font-black text-pearl" id="score">0</div>
          </div>
          <div class="relative w-20 h-20 md:w-24 md:h-24">
            <svg class="w-full h-full -rotate-90" viewBox="0 0 100 100">
              <circle cx="50" cy="50" r="42" class="ring-track" stroke-width="6" fill="none"/>
              <circle id="timer-ring" cx="50" cy="50" r="42" class="ring-fill" stroke="#2ec4b6" stroke-width="6" fill="none" stroke-dasharray="264" stroke-dashoffset="264"/>
            </svg>
            <div class="absolute inset-0 flex items-center justify-center">
              <span id="timer" class="font-mono text-xl md:text-2xl font-bold text-pearl">60</span>
            </div>
          </div>
        </div>

        <div class="mb-10">
          <div class="text-xs uppercase tracking-[0.2em] text-slate/30 mb-4">Problem</div>
          <div class="font-mono text-7xl md:text-9xl font-bold tracking-tighter leading-none select-none">
            <span id="problem" class="text-pearl">8 + 5</span>
          </div>
        </div>

        <form onsubmit="event.preventDefault(); submitAnswer();" class="max-w-xs mx-auto">
          <input id="answer-input" type="number" autocomplete="off" inputmode="numeric" placeholder="?" class="w-full text-center text-5xl md:text-7xl font-mono font-bold py-4 rounded-2xl bg-white/[0.03] border border-white/[0.08] text-pearl placeholder:text-slate/10 focus:outline-none focus:border-sea/50 focus:ring-2 focus:ring-sea/10 transition-all btn-press" autofocus>
        </form>

        <div class="mt-10 flex justify-center gap-3">
          <button onclick="skipProblem()" class="px-5 py-2.5 rounded-full text-sm font-medium text-slate/30 hover:text-pearl hover:bg-white/[0.05] transition-colors">Skip</button>
          <button onclick="submitAnswer()" class="px-8 py-2.5 rounded-full text-sm font-bold bg-pearl text-ink hover:bg-white transition-colors btn-press">Enter</button>
        </div>
      </div>

      <!-- Results -->
      <div id="results" class="hidden text-center">
        <div class="mb-6">
          <h2 class="font-display text-4xl md:text-5xl font-black mb-2">Drill Complete</h2>
          <p class="text-slate/30">Let's see how you did.</p>
        </div>

        <div class="grid grid-cols-3 gap-3 max-w-lg mx-auto mb-10">
          <div class="glass rounded-2xl p-5 md:p-6">
            <div class="text-3xl mb-1">🎯</div>
            <div class="text-xs text-slate/30 mb-1">Correct</div>
            <div class="font-display text-3xl font-black" id="res-correct">0</div>
          </div>
          <div class="glass rounded-2xl p-5 md:p-6">
            <div class="text-3xl mb-1">⚡</div>
            <div class="text-xs text-slate/30 mb-1">Avg/Min</div>
            <div class="font-display text-3xl font-black" id="res-time">0</div>
          </div>
          <div class="glass rounded-2xl p-5 md:p-6">
            <div class="text-3xl mb-1">📊</div>
            <div class="text-xs text-slate/30 mb-1">Accuracy</div>
            <div class="font-display text-3xl font-black" id="res-acc">0%</div>
          </div>
        </div>

        <div class="max-w-md mx-auto mb-8 text-left glass rounded-2xl p-6">
          <h3 class="font-display font-bold text-lg mb-4">Performance</h3>
          <div class="space-y-3" id="res-details"></div>
        </div>

        <button onclick="resetApp()" class="px-10 py-4 rounded-full text-lg font-bold bg-gradient-to-r from-sea to-coral text-ink hover:brightness-110 transition-all btn-press shadow-[0_0_40px_rgba(46,196,182,0.2)]">
          Drill Again
        </button>
      </div>

    </section>

    <footer class="mt-16 text-center text-slate/20 text-sm font-light">
      <p>Practice makes perfect.</p>
    </footer>
  </main>

  <script>
    // State
    let difficulty = 'easy';
    let currentAnswer = 0;
    let score = 0;
    let timeLeft = 60;
    let timerInterval = null;
    let problemCount = 0;
    let totalTimeUsed = 0;
    let correctCount = 0;
    let answers = []; // {problem, yourAnswer, correct, time}

    const ops = ['+', '-', '×', '÷'];

    function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

    function generateProblem() {
      const op = ops[rand(0, ops.length - 1)];
      let a, b, ans;
      if (difficulty === 'easy') {
        a = rand(1, 9); b = rand(1, 9);
      } else if (difficulty === 'medium') {
        a = rand(10, 99); b = rand(10, 99);
      } else {
        a = rand(100, 999); b = rand(10, 99); // division avoids huge results
      }

      switch (op) {
        case '+': ans = a + b; break;
        case '-': if (b > a) { const t = a; a = b; b = t; } ans = a - b; break;
        case '×': ans = a * b; break;
        case '÷':
          // Make division clean (no decimals for simplicity)
          a = b * rand(2, 12); // multiply first then divide
          ans = a / b;
          break;
      }
      currentAnswer = ans;
      return `${a} ${op} ${b}`;
    }

    function startQuiz(level) {
      difficulty = level;
      score = 0; timeLeft = 60; problemCount = 0;
      totalTimeUsed = 0; correctCount = 0; answers = [];
      document.getElementById('setup').classList.add('hidden');
      document.getElementById('quiz').classList.remove('hidden');
      document.getElementById('results').classList.add('hidden');
      document.getElementById('score').textContent = '0';
      document.getElementById('timer').textContent = '60';
      document.getElementById('timer-ring').style.strokeDashoffset = '264';
      document.getElementById('answer-input').value = '';
      document.getElementById('answer-input').focus();
      loadProblem();
      startTimer();
    }

    function loadProblem() {
      document.getElementById('problem').textContent = generateProblem();
      document.getElementById('answer-input').value = '';
      document.getElementById('answer-input').focus();
    }

    function submitAnswer() {
      const input = document.getElementById('answer-input');
      const val = parseInt(input.value, 10);
      if (isNaN(val)) return;

      const isCorrect = val === currentAnswer;
      const timeSpent = 60 - timeLeft + totalTimeUsed; // approximate
      answers.push({
        problem: document.getElementById('problem').textContent,
        yourAnswer: val,
        correct: isCorrect,
        time: timeLeft,
      });

      if (isCorrect) {
        score += 10 + Math.max(0, Math.floor(timeLeft / 60 * 10));
        correctCount++;
      }
      document.getElementById('score').textContent = score;
      problemCount++;
      loadProblem();
    }

    function skipProblem() {
      answers.push({
        problem: document.getElementById('problem').textContent,
        yourAnswer: '—',
        correct: false,
        time: timeLeft,
      });
      problemCount++;
      loadProblem();
    }

    function startTimer() {
      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        timeLeft--;
        document.getElementById('timer').textContent = Math.max(0, timeLeft);
        // Update ring
        const circumference = 2 * Math.PI * 42;
        const offset = circumference - (timeLeft / 60) * circumference;
        document.getElementById('timer-ring').style.strokeDashoffset = Math.max(0, offset);
        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          finishQuiz();
        }
      }, 1000);
    }

    function finishQuiz() {
      document.getElementById('quiz').classList.add('hidden');
      document.getElementById('results').classList.remove('hidden');
      document.getElementById('results').classList.add('anim-slide');
      document.getElementById('res-correct').textContent = correctCount + ' / ' + problemCount;
      const avgTime = problemCount ? Math.round((problemCount * 60 - (60 - timeLeft) * 60) / problemCount) : 60; // rough
      document.getElementById('res-time').textContent = Math.round((60 - timeLeft) / Math.max(1, problemCount)) + 's';
      const acc = problemCount ? Math.round((correctCount / problemCount) * 100) : 0;
      document.getElementById('res-acc').textContent = acc + '%';

      // Details
      const details = document.getElementById('res-details');
      details.innerHTML = answers.map(a => {
        const color = a.correct ? 'text-sea' : 'text-coral';
        const icon = a.correct ? '✓' : (a.yourAnswer === '—' ? '⏭' : '✗');
        return `<div class="flex justify-between items-center text-sm ${a.correct ? 'text-pearl/80' : 'text-slate/50'}"><span class="font-mono text-xs">${a.problem}</span><span class="font-mono font-bold ${color}">${icon} ${a.yourAnswer === '—' ? '—' : a.yourAnswer}</span></div>`;
      }).join('');
    }

    function resetApp() {
      document.getElementById('results').classList.add('hidden');
      document.getElementById('setup').classList.remove('hidden');
      document.getElementById('results').classList.remove('anim-slide');
    }

    // Enter key support and focus management
    document.getElementById('answer-input')?.addEventListener('keydown', e => {
      if (e.key === 'Enter') submitAnswer();
    });

    // Initialize focus
    setTimeout(() => {
      const el = document.getElementById('answer-input');
      if (el) el.focus();
    }, 100);
  </script>
</body>
</html>
