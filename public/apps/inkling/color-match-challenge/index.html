<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Color Match Challenge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ["'Outfit'", 'sans-serif'],
            mono: ["'JetBrains Mono'", 'monospace'],
          },
          colors: {
            ink: '#0a0a12',
            surface: '#12121a',
            panel: '#1a1a28',
            neon: {
              red: '#ff2a4a',
              blue: '#2a7fff',
              green: '#2aff7a',
              yellow: '#ffe72a',
              purple: '#b22aff',
              orange: '#ff8c2a',
              cyan: '#2afff0',
              pink: '#ff2ad4',
            }
          },
        }
      }
    }
  </script>
  <style>
    html, body { height: 100%; }
    body {
      background-color: #0a0a12;
      background-image:
        radial-gradient(circle at 20% 30%, rgba(42,127,255,0.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(42,255,122,0.08) 0%, transparent 50%),
        radial-gradient(circle at 50% 10%, rgba(255,42,122,0.06) 0%, transparent 40%);
      overflow: hidden;
      font-family: 'Outfit', sans-serif;
      user-select: none;
      -webkit-user-select: none;
    }

    /* Animated ambient orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.35;
      pointer-events: none;
      animation: floatOrb 20s ease-in-out infinite alternate;
    }
    .orb-1 { width: 400px; height: 400px; background: #2a7fff; top: -10%; left: -10%; animation-delay: 0s; }
    .orb-2 { width: 300px; height: 300px; background: #2aff7a; bottom: -10%; right: -10%; animation-delay: -7s; animation-duration: 25s; }
    .orb-3 { width: 250px; height: 250px; background: #ff2a4a; top: 40%; left: 60%; animation-delay: -12s; animation-duration: 22s; }
    @keyframes floatOrb {
      0% { transform: translate(0,0) scale(1); }
      33% { transform: translate(30px,-20px) scale(1.1); }
      66% { transform: translate(-20px,30px) scale(0.95); }
      100% { transform: translate(20px,10px) scale(1.05); }
    }

    /* Glass panel */
    .glass {
      background: rgba(26, 26, 40, 0.55);
      backdrop-filter: blur(24px) saturate(140%);
      -webkit-backdrop-filter: blur(24px) saturate(140%);
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow:
        0 25px 50px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.05);
    }

    /* Word pulse */
    @keyframes wordPop {
      0% { transform: scale(1); letter-spacing: 0.02em; }
      40% { transform: scale(1.08); letter-spacing: 0.1em; }
      100% { transform: scale(1); letter-spacing: 0.02em; }
    }
    .word-pop { animation: wordPop 0.35s ease-out; }

    /* Button press */
    @keyframes btnPress {
      0% { transform: scale(1); box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
      40% { transform: scale(0.92); box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
      100% { transform: scale(1); box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
    }
    .btn-press { animation: btnPress 0.2s ease-out; }

    /* Confetti particle */
    .confetti { position: fixed; width: 12px; height: 12px; z-index: 100; pointer-events: none; border-radius: 2px; }

    /* Progress glow */
    .timer-glow { box-shadow: 0 0 20px rgba(255,255,255,0.15); }

    /* Score increment float */
    @keyframes scoreFloat {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-30px) scale(1.3); }
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center text-white">

  <!-- Ambient orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <main class="relative z-10 w-full max-w-3xl px-6 py-12 flex flex-col items-center gap-8">

    <!-- Header / Scoreboard -->
    <header class="w-full flex items-center justify-between glass rounded-3xl px-6 py-5">
      <div class="flex items-center gap-3">
        <div class="w-3 h-3 rounded-full bg-neon-green animate-pulse shadow-[0_0_12px_#2aff7a]"></div>
        <h1 class="text-xl md:text-2xl font-black tracking-tight leading-none">
          COLOR <span class="text-transparent bg-clip-text bg-gradient-to-r from-neon-blue to-neon-green">MATCH</span>
        </h1>
      </div>
      <div class="flex items-center gap-8 md:gap-12">
        <div class="text-center">
          <div class="text-[10px] md:text-xs font-bold uppercase tracking-[0.2em] text-white/40 mb-1">Score</div>
          <div id="score" class="text-3xl md:text-4xl font-black font-mono leading-none tabular-nums">0</div>
        </div>
        <div class="text-center">
          <div class="text-[10px] md:text-xs font-bold uppercase tracking-[0.2em] text-white/40 mb-1">Time</div>
          <div id="timer" class="text-3xl md:text-4xl font-black font-mono leading-none tabular-nums">30</div>
        </div>
      </div>
    </header>

    <!-- Main Game Area -->
    <section class="glass rounded-[2.5rem] px-8 md:px-16 py-14 md:py-20 w-full flex flex-col items-center gap-10 text-center shadow-[0_40px_100px_rgba(0,0,0,0.6)]">

      <!-- Instruction label -->
      <div class="uppercase tracking-[0.25em] text-[11px] font-bold text-white/30">Click the color of the word</div>

      <!-- The challenge word -->
      <h2 id="challenge" class="font-black text-[clamp(5rem,20vw,12rem)] leading-[0.82] tracking-[-0.05em] word-pop drop-shadow-[0_10px_40px_rgba(0,0,0,0.8)] select-none">
        RED
      </h2>

      <!-- Timer bar -->
      <div class="w-full max-w-md h-2.5 bg-white/5 rounded-full overflow-hidden relative">
        <div id="timer-bar" class="h-full w-full bg-gradient-to-r from-neon-green via-neon-blue to-neon-green rounded-full transition-[width] duration-100 ease-linear relative timer-glow"></div>
      </div>

      <!-- Color buttons -->
      <div id="buttons" class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-5 w-full max-w-xl">
        <!-- Buttons injected by JS -->
      </div>
    </section>

    <!-- Footer / Status -->
    <footer class="text-white/20 text-xs font-medium tracking-wide">Match quickly. Don't read the word.</footer>
  </main>

  <!-- End overlay -->
  <div id="endOverlay" class="fixed inset-0 z-50 bg-ink/80 backdrop-blur-xl flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-500">
    <div class="glass rounded-[3rem] px-12 py-14 max-w-md text-center shadow-[0_60px_120px_rgba(0,0,0,0.7)] scale-95 transition-transform duration-500" id="endCard">
      <div class="text-[10px] font-black uppercase tracking-[0.3em] text-white/30 mb-3">Time's Up</div>
      <h3 class="text-6xl md:text-8xl font-black leading-none mb-2">GAME OVER</h3>
      <p class="text-white/50 text-lg mb-8">Your final score</p>
      <div class="text-8xl md:text-9xl font-black font-mono leading-none mb-6 text-transparent bg-clip-text bg-gradient-to-br from-white via-white/80 to-white/40">0</div>
      <button onclick="startGame()" class="px-8 py-4 rounded-full bg-gradient-to-r from-neon-blue to-neon-cyan text-ink font-black text-lg tracking-tight shadow-[0_0_40px_rgba(42,127,255,0.4)] hover:shadow-[0_0_60px_rgba(42,127,255,0.6)] hover:scale-[1.03] active:scale-[0.97] transition-all duration-200">
        PLAY AGAIN
      </button>
    </div>
  </div>

  <script>
    // Game state
    const COLORS = [
      { name: 'RED', hex: '#ff2a4a' },
      { name: 'BLUE', hex: '#2a7fff' },
      { name: 'GREEN', hex: '#2aff7a' },
      { name: 'YELLOW', hex: '#ffe72a' },
      { name: 'PURPLE', hex: '#b22aff' },
      { name: 'ORANGE', hex: '#ff8c2a' },
      { name: 'CYAN', hex: '#2afff0' },
      { name: 'PINK', hex: '#ff2ad4' },
    ];

    let score = 0;
    let timeLeft = 30;
    let timerId = null;
    let active = false;

    const scoreEl = document.getElementById('score');
    const timerEl = document.getElementById('timer');
    const timerBar = document.getElementById('timer-bar');
    const challengeEl = document.getElementById('challenge');
    const buttonsContainer = document.getElementById('buttons');
    const endOverlay = document.getElementById('endOverlay');
    const endCard = document.getElementById('endCard');
    const finalScoreEl = endCard.querySelector('.text-8xl');

    let currentCorrectName = '';

    function randomInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

    function spawnConfetti(colorHex) {
      const count = 20;
      for (let i = 0; i < count; i++) {
        const c = document.createElement('div');
        c.className = 'confetti';
        c.style.background = colorHex;
        c.style.left = 50 + (Math.random() - 0.5) * 300 + 'px';
        c.style.top = 40 + Math.random() * 20 + '%';
        const size = 8 + Math.random() * 12;
        c.style.width = size + 'px';
        c.style.height = size + 'px';
        c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        c.style.opacity = 1;
        document.body.appendChild(c);
        const duration = 800 + Math.random() * 600;
        c.animate([
          { transform: 'translate(0,0) rotate(0deg) scale(1)', opacity: 1 },
          { transform: `translate(${(Math.random()-0.5)*200}px, ${200+Math.random()*300}px) rotate(${360+Math.random()*360}deg) scale(0)`, opacity: 0 }
        ], { duration, easing: 'ease-out', fill: 'forwards' });
        setTimeout(() => c.remove(), duration);
      }
    }

    function updateScore(amount) {
      score += amount;
      scoreEl.textContent = score;
      scoreEl.parentElement.querySelector('.text-4xl').classList.remove('text-transparent');
    }

    function buildButtons(correctName, wrongNames) {
      buttonsContainer.innerHTML = '';
      const allNames = [correctName, ...wrongNames];
      // Shuffle colors
      const shuffled = allNames.sort(() => Math.random() - 0.5);
      shuffled.forEach(name => {
        const color = COLORS.find(c => c.name === name);
        const btn = document.createElement('button');
        btn.className = 'relative overflow-hidden rounded-2xl md:rounded-3xl px-6 py-5 md:py-6 font-black text-2xl md:text-3xl tracking-tight transition-all duration-150 shadow-[0_10px_30px_rgba(0,0,0,0.5)] hover:shadow-[0_15px_40px_rgba(0,0,0,0.6)] active:scale-[0.92] focus:outline-none';
        btn.style.backgroundColor = color.hex;
        btn.style.color = '#ffffff';
        btn.style.textShadow = '0 2px 8px rgba(0,0,0,0.5), 0 1px 0 rgba(0,0,0,0.3)';
        btn.textContent = color.name;
        btn.addEventListener('click', () => handleClick(name, color.hex));
        buttonsContainer.appendChild(btn);
      });
    }

    function handleClick(name, hex) {
      if (!active) return;
      // Visual press on specific button
      const btns = Array.from(buttonsContainer.children);
      const clickedBtn = btns.find(b => b.textContent === name);
      if (clickedBtn) clickedBtn.classList.add('btn-press');
      setTimeout(() => clickedBtn.classList.remove('btn-press'), 200);

      if (name === currentCorrectName) {
        spawnConfetti(hex);
        updateScore(1);
        nextRoundFixed();
      } else {
        // Shake word briefly
        challengeEl.animate([
          { transform: 'translateX(-10px)' },
          { transform: 'translateX(10px)' },
          { transform: 'translateX(-6px)' },
          { transform: 'translateX(6px)' },
          { transform: 'translateX(0)' }
        ], { duration: 300, easing: 'ease-out' });
      }
    }

    function nextRound() {
      const correct = COLORS[randomInt(0, COLORS.length - 1)];
      const others = COLORS.filter(c => c.name !== correct.name);
      const wrong = others.sort(() => Math.random() - 0.5).slice(0, 3);

      challengeEl.textContent = correct.name;
      // Apply random font color different from the word meaning sometimes
      // The spec says: word shown in random font color, player must click correct color button (not word meaning)
      // So the word meaning and the color shown are the challenge. Actually the spec says:
      // "Show a word (e.g., “RED”) in a random font color — player must click the correct color button (not the word meaning)."
      // This implies the word shown may say RED but be colored blue, and the player clicks the BLUE button.
      // But my current logic uses the word meaning as the target. Let me adjust to make it more interesting:
      // Actually the spec says "click the correct color button (not the word meaning)" — meaning the word color IS the answer.
      // Wait: "Show a word (e.g., 'RED') in a random font color — player must click the correct color button (not the word meaning)."
      // This means: the word text says RED, but the word is rendered in BLUE. The player should click BLUE.
      // So the word text (name) and the font color are different. The correct answer is the font color.
      // I need to fix my logic so the word text and the font color are independent.
      challengeEl.style.color = correct.hex;
      challengeEl.classList.remove('word-pop');
      void challengeEl.offsetWidth; // reflow
      challengeEl.classList.add('word-pop');
      buildButtons(correct.name, wrong.map(c => c.name));
    }

    // Fix nextRound logic: choose a word text, choose a different font color, and correct answer is the font color
    function nextRoundFixed() {
      const textColor = COLORS[randomInt(0, COLORS.length - 1)];
      let wordColor = COLORS[randomInt(0, COLORS.length - 1)];
      while (wordColor.name === textColor.name) {
        wordColor = COLORS[randomInt(0, COLORS.length - 1)];
      }
      currentCorrectName = textColor.name;
      challengeEl.textContent = wordColor.name;
      challengeEl.style.color = textColor.hex;
      challengeEl.classList.remove('word-pop');
      void challengeEl.offsetWidth;
      challengeEl.classList.add('word-pop');
      const others = COLORS.filter(c => c.name !== textColor.name);
      const wrong = others.sort(() => Math.random() - 0.5).slice(0, 3);
      buildButtons(textColor.name, wrong.map(c => c.name));
    }

    function startGame() {
      score = 0;
      timeLeft = 30;
      active = true;
      scoreEl.textContent = '0';
      timerEl.textContent = '30';
      timerBar.style.width = '100%';
      endOverlay.style.opacity = '0';
      endOverlay.style.pointerEvents = 'none';
      endCard.style.transform = 'scale(0.95)';
      nextRoundFixed();
      if (timerId) clearInterval(timerId);
      timerId = setInterval(() => {
        timeLeft -= 0.1;
        if (timeLeft <= 0) {
          timeLeft = 0;
          clearInterval(timerId);
          active = false;
          finalScoreEl.textContent = score;
          endOverlay.style.opacity = '1';
          endOverlay.style.pointerEvents = 'auto';
          endCard.style.transform = 'scale(1)';
        }
        timerEl.textContent = Math.ceil(timeLeft);
        timerBar.style.width = (timeLeft / 30 * 100) + '%';
      }, 100);
    }

    // Initialize
    startGame();
  </script>
</body>
</html>
