<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Online Poll Board</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['"Cormorant Garamond"', 'Georgia', 'serif'],
            body: ['"Outfit"', 'system-ui', 'sans-serif'],
          },
          colors: {
            cream: '#fdf8f3',
            peach: '#ffe4d6',
            coral: '#ff8a6e',
            mint: '#c8f0e4',
            sage: '#e8f5e9',
            lavender: '#e6e6fa',
            sky: '#e0f2fe',
            rose: '#ffe4e1',
            ink: '#2d3436',
          },
          animation: {
            'float': 'float 6s ease-in-out infinite',
            'float-delayed': 'float 7s ease-in-out 2s infinite',
            'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-8px)' },
            }
          }
        }
      }
    }
  </script>

  <style>
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Outfit', system-ui, sans-serif;
      background-color: #fdf8f3;
      color: #2d3436;
      overflow-x: hidden;
    }

    /* Delightful background blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
      animation: float 12s ease-in-out infinite;
    }
    .blob-1 {
      width: 600px; height: 600px;
      top: -100px; left: -100px;
      background: linear-gradient(135deg, #ffd6c5, #ffb7a8);
      animation-delay: 0s;
    }
    .blob-2 {
      width: 500px; height: 500px;
      top: 20%; right: -80px;
      background: linear-gradient(135deg, #c8f0e4, #a8e6cf);
      animation-delay: -4s;
    }
    .blob-3 {
      width: 550px; height: 550px;
      bottom: -80px; left: 30%;
      background: linear-gradient(135deg, #e6e6fa, #d6d6ff);
      animation-delay: -8s;
    }
    .blob-4 {
      width: 450px; height: 450px;
      top: 50%; left: -120px;
      background: linear-gradient(135deg, #ffe4d6, #ffd1b3);
      animation-delay: -3s;
    }

    /* Glass card */
    .glass-card {
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(24px) saturate(140%);
      -webkit-backdrop-filter: blur(24px) saturate(140%);
      border: 1px solid rgba(255, 255, 255, 0.35);
      box-shadow: 0 8px 32px rgba(45, 52, 54, 0.06), 0 1px 3px rgba(45,52,54,0.04);
      transition: all 0.35s cubic-bezier(0.23, 1, 0.32, 1);
    }
    .glass-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 48px rgba(45, 52, 54, 0.10), 0 4px 12px rgba(45,52,54,0.04);
      border-color: rgba(255,255,255,0.55);
    }

    /* Progress bar animation */
    .bar-fill {
      transition: width 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* Vote button press */
    .vote-btn:active {
      transform: scale(0.96);
    }
    .vote-btn {
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }
    .vote-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at var(--mx, 50%) var(--my, 50%), rgba(255,255,255,0.25) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .vote-btn:hover::after { opacity: 1; }

    /* Confetti particles */
    .confetti-piece {
      position: fixed;
      width: 10px; height: 10px;
      border-radius: 2px;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.9;
      animation: confetti-fall 1.4s ease-out forwards;
    }
    @keyframes confetti-fall {
      0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 0.9; }
      100% { transform: translateY(700px) rotate(720deg) scale(0.3); opacity: 0; }
    }

    /* Shine shimmer on progress */
    .shimmer-bar {
      position: relative;
      overflow: hidden;
    }
    .shimmer-bar::before {
      content: '';
      position: absolute;
      top: 0; left: -50%;
      width: 50%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.45), transparent);
      animation: shimmer 2.5s infinite;
    }
    @keyframes shimmer {
      0% { left: -50%; }
      50% { left: 120%; }
      100% { left: -50%; }
    }

    /* Text reveal */
    .hero-text {
      background: linear-gradient(135deg, #2d3436 0%, #ff8a6e 50%, #c8f0e4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #ffb7a8, #c8f0e4); border-radius: 20px; }
    ::-webkit-scrollbar-thumb:hover { background: linear-gradient(180deg, #ff8a6e, #a8e6cf); }
  </style>
</head>

<body class="min-h-screen relative">

  <!-- Background blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="blob blob-4"></div>

  <main class="relative z-10 max-w-6xl mx-auto px-6 py-14 md:py-20">

    <!-- Header -->
    <header class="text-center mb-16 md:mb-20">
      <div class="inline-block mb-5">
        <span class="inline-flex items-center gap-2.5 px-4 py-1.5 rounded-full bg-white/50 border border-white/40 text-xs font-semibold tracking-widest uppercase text-coral shadow-sm backdrop-blur-md">
          <span class="w-1.5 h-1.5 rounded-full bg-coral animate-pulse"></span>
          Live Voting
        </span>
      </div>
      <h1 class="font-display text-5xl sm:text-7xl md:text-8xl font-bold tracking-tight hero-text mb-5 leading-[0.92]">
        Online Poll Board
      </h1>
      <p class="text-lg md:text-xl text-ink/60 font-light max-w-lg mx-auto leading-relaxed">
        Cast your vote on today's most interesting questions. See real-time results unfold.
      </p>
    </header>

    <!-- Stats ribbon -->
    <div class="grid grid-cols-3 gap-4 max-w-2xl mx-auto mb-14 md:mb-16">
      <div class="glass-card rounded-2xl p-5 text-center">
        <div class="font-display text-3xl md:text-4xl font-bold hero-text" id="stat-total">0</div>
        <div class="text-xs uppercase tracking-widest text-ink/40 mt-1.5 font-medium">Total Votes</div>
      </div>
      <div class="glass-card rounded-2xl p-5 text-center">
        <div class="font-display text-3xl md:text-4xl font-bold text-coral" id="stat-polls">4</div>
        <div class="text-xs uppercase tracking-widest text-ink/40 mt-1.5 font-medium">Active Polls</div>
      </div>
      <div class="glass-card rounded-2xl p-5 text-center">
        <div class="font-display text-3xl md:text-4xl font-bold text-ink" id="stat-voters">0</div>
        <div class="text-xs uppercase tracking-widest text-ink/40 mt-1.5 font-medium">Voters</div>
      </div>
    </div>

    <!-- Poll Grid -->
    <div class="grid md:grid-cols-2 gap-7 md:gap-8" id="poll-grid">
    </div>

    <!-- Footer -->
    <footer class="mt-16 md:mt-20 text-center">
      <div class="inline-flex items-center gap-6 text-xs text-ink/30 font-medium tracking-wide">
        <span>Built with delight</span>
        <span class="w-1 h-1 rounded-full bg-ink/15"></span>
        <span>Mock interactive demo</span>
      </div>
    </footer>

  </main>

  <script>
    // Poll data
    const polls = [
      {
        id: 1,
        title: "Best Weekend Activity?",
        subtitle: "How do you recharge after a long week?",
        options: [
          { label: "Reading in nature", votes: 142, emoji: "🌲", color: "#c8f0e4" },
          { label: "Baking something new", votes: 98, emoji: "🍪", color: "#ffe4d6" },
          { label: "Early morning hike", votes: 67, emoji: "⛰️", color: "#e0f2fe" },
          { label: "Movie marathon", votes: 115, emoji: "🎬", color: "#e6e6fa" },
        ],
        totalVotes: 422,
      },
      {
        id: 2,
        title: "Coffee vs. Tea?",
        subtitle: "The eternal morning debate continues.",
        options: [
          { label: "Rich dark roast", votes: 312, emoji: "☕", color: "#8d6e63" },
          { label: "Matcha latte", votes: 178, emoji: "🍵", color: "#a8e6cf" },
          { label: "Herbal blend", votes: 94, emoji: "🌸", color: "#ffe4e1" },
        ],
        totalVotes: 584,
      },
      {
        id: 3,
        title: "Favorite Season?",
        subtitle: "Each has its own kind of magic.",
        options: [
          { label: "Spring bloom", votes: 201, emoji: "🌸", color: "#ffe4e1" },
          { label: "Summer warmth", votes: 256, emoji: "☀️", color: "#ffe4b5" },
          { label: "Autumn colors", votes: 89, emoji: "🍂", color: "#f4a261" },
          { label: "Winter snow", votes: 134, emoji: "❄️", color: "#e0f2fe" },
        ],
        totalVotes: 680,
      },
      {
        id: 4,
        title: "Design Aesthetic?",
        subtitle: "What speaks to your visual soul?",
        options: [
          { label: "Minimalist calm", votes: 178, emoji: "◻️", color: "#f0f0f0" },
          { label: "Vintage warmth", votes: 223, emoji: "📻", color: "#c8905c" },
          { label: "Bold color", votes: 145, emoji: "🎨", color: "#ff8a6e" },
          { label: "Natural textures", votes: 167, emoji: "🌾", color: "#c8c0a0" },
        ],
        totalVotes: 713,
      },
    ];

    // Render polls
    function renderPolls() {
      const grid = document.getElementById('poll-grid');
      grid.innerHTML = '';

      polls.forEach(poll => {
        const total = poll.options.reduce((s, o) => s + o.votes, 0);
        const max = Math.max(...poll.options.map(o => o.votes));

        const optionsHTML = poll.options.map(opt => {
          const pct = total > 0 ? Math.round((opt.votes / total) * 100) : 0;
          const isTop = opt.votes === max && max > 0;
          return `
            <button onclick="vote(${poll.id}, ${poll.options.indexOf(opt)})"
                    class="vote-btn group relative w-full text-left rounded-2xl p-4 md:p-5 border border-ink/5 bg-white/50 hover:bg-white/90 transition-all duration-300 hover:-translate-y-0.5 shadow-[0_2px_8px_rgba(45,52,54,0.02)] hover:shadow-[0_6px_20px_rgba(45,52,54,0.06)] overflow-hidden"
                    style="--mx:50%; --my:50%"
                    onmousemove="this.style.setProperty('--mx', (event.offsetX/this.offsetWidth*100)+'%'); this.style.setProperty('--my', (event.offsetY/this.offsetHeight*100)+'%')">
              <div class="flex items-center gap-4 mb-3">
                <span class="text-2xl filter drop-shadow-sm">${opt.emoji}</span>
                <h4 class="font-body text-[15px] md:text-base font-medium text-ink leading-snug">${opt.label}</h4>
                ${isTop ? '<span class="ml-auto text-[10px] font-extrabold tracking-widest uppercase text-coral">Top</span>' : ''}
              </div>
              <div class="relative h-2.5 rounded-full bg-ink/[0.04] shimmer-bar overflow-hidden">
                <div class="bar-fill h-full rounded-full" style="width: ${pct}%; background: linear-gradient(90deg, ${opt.color}, ${opt.color}cc);"></div>
              </div>
              <div class="flex items-center justify-between mt-2.5">
                <span class="text-sm font-display font-semibold text-ink/80">${opt.votes.toLocaleString()} votes</span>
                <span class="text-xs font-bold text-ink/30">${pct}%</span>
              </div>
            </button>
          `;
        }).join('');

        grid.insertAdjacentHTML('beforeend', `
          <article class="glass-card rounded-3xl p-7 md:p-9 relative overflow-hidden">
            <div class="relative z-10">
              <div class="flex items-start justify-between mb-6">
                <div>
                  <h2 class="font-display text-2xl md:text-3xl font-bold text-ink mb-1.5 leading-tight">${poll.title}</h2>
                  <p class="text-sm text-ink/50 font-light">${poll.subtitle}</p>
                </div>
                <span class="text-xs font-extrabold tracking-[0.15em] uppercase text-coral bg-coral/8 px-3 py-1 rounded-full whitespace-nowrap">Poll #${poll.id}</span>
              </div>
              <div class="space-y-3">${optionsHTML}</div>
            </div>
            <div class="absolute top-0 right-0 w-64 h-64 rounded-full -translate-y-1/3 translate-x-1/3 opacity-[0.08] pointer-events-none" style="background:${poll.options[0].color}"></div>
          </article>
        `);
      });
    }

    // Vote handler with animation
    function vote(pollId, optionIndex) {
      const poll = polls.find(p => p.id === pollId);
      if (!poll) return;
      const opt = poll.options[optionIndex];
      opt.votes += Math.floor(Math.random() * 5) + 1; // fun mock increment
      poll.totalVotes = poll.options.reduce((s, o) => s + o.votes, 0);

      // Confetti burst
      spawnConfetti();

      // Re-render
      renderPolls();
      updateStats();
    }

    // Confetti
    function spawnConfetti() {
      const colors = ['#ff8a6e', '#c8f0e4', '#ffe4d6', '#e6e6fa', '#ffd6c5', '#a8e6cf'];
      for (let i = 0; i < 35; i++) {
        const c = document.createElement('div');
        c.className = 'confetti-piece';
        c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        c.style.left = Math.random() * 100 + 'vw';
        c.style.top = '-10px';
        c.style.animationDuration = (0.8 + Math.random() * 0.8) + 's';
        c.style.animationDelay = (Math.random() * 0.4) + 's';
        c.style.width = (6 + Math.random() * 8) + 'px';
        c.style.height = (6 + Math.random() * 8) + 'px';
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 1600);
      }
    }

    // Update stats
    function updateStats() {
      const total = polls.reduce((s, p) => s + p.totalVotes, 0);
      const voters = Math.floor(total * 0.72); // mock active voter count
      document.getElementById('stat-total').textContent = total.toLocaleString();
      document.getElementById('stat-voters').textContent = voters.toLocaleString();
    }

    // Initialize
    renderPolls();
    updateStats();
  </script>
</body>
</html>
