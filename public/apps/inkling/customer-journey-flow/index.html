<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer Journey Flow</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ink: '#0b0f19',
            paper: '#f4f3f0',
            slate: '#8896b3',
            gold: '#e4a853',
            coral: '#e07a5f',
            sage: '#81b29a',
            lavender: '#8fa3c5',
          },
          fontFamily: {
            display: ['"Outfit"', 'sans-serif'],
            body: ['"Inter"', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <style>
    html, body { height: 100%; overflow: hidden; }
    body {
      background: linear-gradient(135deg, #0b0f19 0%, #15192b 60%, #1a2035 100%);
      color: #f4f3f0;
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    ::selection { background: rgba(228, 168, 83, 0.2); color: #fff; }
    .glass {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      backdrop-filter: blur(18px) saturate(120%);
      -webkit-backdrop-filter: blur(18px) saturate(120%);
    }
    .glass-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 8px 32px 0 rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.04);
      backdrop-filter: blur(16px);
    }
    .node-glow:hover {
      box-shadow: 0 0 25px rgba(228,168,83,0.35), 0 0 60px rgba(228,168,83,0.15);
    }
    .line-draw { stroke-dasharray: 6 4; animation: dashMove 1.2s linear infinite; }
    @keyframes dashMove { to { stroke-dashoffset: -20; } }
    .fade-in { animation: fadeUp .6s ease-out both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    input:focus, textarea:focus { outline: none; box-shadow: 0 0 0 2px rgba(228,168,83,0.3); }
    .node-ring.active-ring { stroke: #e4a853; stroke-width: 2.5; stroke-opacity: 1; }
  </style>
</head>
<body class="min-h-screen flex flex-col">

  <!-- Header -->
  <header class="glass shrink-0 z-20 h-16 flex items-center justify-between px-6 md:px-10 border-b border-white/5">
    <div class="flex items-center gap-4">
      <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-gold/20 to-coral/30 border border-white/10 flex items-center justify-center shadow-[0_4px_20px_rgba(228,168,83,0.15)]">
        <i class="fa-solid fa-route text-gold text-sm"></i>
      </div>
      <div>
        <h1 class="font-display font-semibold text-[17px] tracking-tight text-white leading-none">Customer Journey Flow</h1>
        <p class="text-[11px] text-slate/70 font-body mt-0.5">Interactive journey mapping</p>
      </div>
    </div>
    <div class="flex items-center gap-3">
      <button onclick="addStage()" class="group flex items-center gap-2.5 px-4 py-2 rounded-full bg-gradient-to-r from-gold/15 to-coral/15 border border-white/10 hover:border-gold/40 transition-all shadow-[0_2px_12px_rgba(228,168,83,0.08)] hover:shadow-[0_4px_20px_rgba(228,168,83,0.2)] text-[13px] font-medium text-white/90 hover:text-white">
        <i class="fa-solid fa-plus text-[10px] text-gold"></i>
        <span class="hidden sm:inline">Add Stage</span>
      </button>
      <button onclick="resetLayout()" class="group flex items-center gap-2.5 px-4 py-2 rounded-full glass hover:bg-white/5 transition-all text-[13px] font-medium text-slate hover:text-white" title="Reset layout">
        <i class="fa-solid fa-rotate-right text-[10px]"></i>
        <span class="hidden sm:inline">Reset</span>
      </button>
    </div>
  </header>

  <!-- Main workspace -->
  <main class="flex-1 relative overflow-hidden">
    <!-- Subtle radial glow behind canvas -->
    <div class="absolute top-1/4 left-1/3 w-[600px] h-[600px] rounded-full bg-gold/5 blur-[120px] pointer-events-none"></div>
    <div class="absolute bottom-1/4 right-1/3 w-[400px] h-[400px] rounded-full bg-coral/5 blur-[100px] pointer-events-none"></div>

    <!-- SVG connections overlay -->
    <svg id="connections" class="absolute inset-0 w-full h-full pointer-events-none z-0">
      <defs>
        <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#e4a853" opacity="0.9" />
        </marker>
      </defs>
    </svg>

    <!-- Canvas -->
    <div id="canvas" class="relative w-full h-full z-10 overflow-hidden select-none"></div>

    <!-- Mode indicator -->
    <div id="modeBadge" class="absolute top-5 left-1/2 -translate-x-1/2 z-30 glass-card rounded-full px-4 py-1.5 text-xs font-medium text-gold tracking-wide shadow-xl pointer-events-none transition-all duration-300 opacity-0 translate-y-[-10px]">
      <i class="fa-solid fa-link mr-1.5"></i> Click nodes to connect
    </div>

    <!-- Legend / Mini instructions -->
    <div class="absolute bottom-5 left-6 z-30 glass-card rounded-xl px-4 py-3 shadow-2xl max-w-xs pointer-events-none opacity-70 hover:opacity-100 transition-opacity">
      <div class="flex items-center gap-3 mb-2">
        <span class="w-2 h-2 rounded-full bg-gold"></span>
        <span class="text-[11px] font-semibold text-white/90 uppercase tracking-wider">Legend</span>
      </div>
      <div class="space-y-1.5 text-[11px] text-slate/70">
        <div class="flex items-center gap-2"><span class="w-1 h-1 rounded-full bg-white/40"></span> Drag nodes freely</div>
        <div class="flex items-center gap-2"><span class="w-1 h-1 rounded-full bg-white/40"></span> Click node, click another to link</div>
        <div class="flex items-center gap-2"><span class="w-1 h-1 rounded-full bg-white/40"></span> Double-click to edit name</div>
        <div class="flex items-center gap-2"><span class="w-1 h-1 rounded-full bg-white/40"></span> Click link to delete it</div>
      </div>
    </div>
  </main>

  <script>
    // ===== DATA =====
    const initialStages = [
      { id: 'aw', title: 'Awareness', desc: 'Ads, social, word-of-mouth.', color: '#e4a853', x: 160, y: 140 },
      { id: 'int', title: 'Interest', desc: 'Website visits, content engagement.', color: '#81b29a', x: 400, y: 140 },
      { id: 'con', title: 'Consideration', desc: 'Comparing options, reviews.', color: '#8fa3c5', x: 640, y: 140 },
      { id: 'int2', title: 'Intent', desc: 'Adding to cart, signing up.', color: '#e07a5f', x: 880, y: 140 },
      { id: 'eval', title: 'Evaluation', desc: 'Checkout process, final checks.', color: '#8896b3', x: 560, y: 340 },
      { id: 'pur', title: 'Purchase', desc: 'Transaction completed.', color: '#e4a853', x: 800, y: 340 },
    ];
    let stages = JSON.parse(JSON.stringify(initialStages));
    let connections = [
      { from: 'aw', to: 'int' },
      { from: 'int', to: 'con' },
      { from: 'con', to: 'int2' },
      { from: 'int2', to: 'eval' },
      { from: 'eval', to: 'pur' },
    ];

    // ===== STATE =====
    let selectedId = null;
    let connectMode = false;
    let dragging = null;
    let dragOffset = { x: 0, y: 0 };
    let editId = null;

    // ===== DOM REFS =====
    const canvas = document.getElementById('canvas');
    const svg = document.getElementById('connections');
    const modeBadge = document.getElementById('modeBadge');

    // ===== INIT =====
    function init() {
      renderNodes();
      renderConnections();
      updateModeBadge();
    }

    // ===== RENDER NODES =====
    function renderNodes() {
      // Keep existing nodes in DOM to preserve focus
      const existing = new Map();
      Array.from(canvas.children).forEach(el => {
        if (el.dataset.id) existing.set(el.dataset.id, el);
      });

      stages.forEach(s => {
        let node = existing.get(s.id);
        if (!node) {
          node = document.createElement('div');
          node.className = 'absolute z-20 fade-in';
          node.dataset.id = s.id;
          node.innerHTML = buildNodeHTML(s);
          canvas.appendChild(node);
          attachNodeEvents(node);
        }
        // Update position
        node.style.left = s.x + 'px';
        node.style.top = s.y + 'px';
        // Update content
        const inner = node.querySelector('.node-inner');
        inner.innerHTML = buildNodeHTML(s, true);
      });

      // Remove deleted nodes
      Array.from(existing.keys()).forEach(id => {
        if (!stages.find(s => s.id === id)) {
          const el = existing.get(id);
          if (el) {
            el.style.opacity = '0';
            el.style.transform = 'scale(0.8)';
            setTimeout(() => el.remove(), 300);
          }
        }
      });
    }

    function buildNodeHTML(s, innerOnly = false) {
      const active = selectedId === s.id ? 'ring-2 ring-offset-2 ring-offset-ink ring-gold/40' : '';
      const ringClass = selectedId === s.id ? 'node-ring active-ring' : 'node-ring';
      const content = `
        <div class="node-inner relative w-[180px] h-[130px] glass-card rounded-2xl p-5 flex flex-col items-start shadow-xl transition-shadow duration-300 node-glow ${active}">
          <div class="absolute -top-2 -right-2 w-3 h-3 rounded-full shadow-[0_0_8px]" style="background:${s.color}; box-shadow: 0 0 8px ${s.color}"></div>
          <h3 class="font-display font-semibold text-[15px] text-white leading-tight mb-1 truncate w-full" onclick="startEdit('${s.id}')">${escapeHtml(s.title)}</h3>
          <p class="text-[11px] text-slate/60 leading-relaxed mb-3 flex-1 truncate-3-lines">${escapeHtml(s.desc)}</p>
          <span class="text-[10px] text-slate/40 font-medium tracking-wide uppercase">Stage</span>
        </div>
        <svg width="0" height="0" class="absolute -z-10">
          <circle r="72" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1" class="node-ring ${ringClass}" />
        </svg>
      `;
      if (innerOnly) return content;
      return content;
    }

    function attachNodeEvents(node) {
      const id = node.dataset.id;
      node.addEventListener('mousedown', e => {
        // Don't drag if clicking text to edit
        if (e.target.closest('.node-inner h3') && e.detail === 2) return;
        if (e.target.closest('h3') && e.detail !== 2) {
          // Normal click on title: select node for connection
          e.stopPropagation();
          selectNode(id);
          return;
        }
        startDrag(id, e);
      });
      node.addEventListener('dblclick', e => {
        e.stopPropagation();
        startEdit(id);
      });
      // Double click anywhere else on card selects/connects
      node.addEventListener('click', e => {
        if (!dragging && e.target.closest('.node-inner')) {
          selectNode(id);
        }
      });
    }

    // ===== SELECT / CONNECT =====
    function selectNode(id) {
      // Toggle selection
      if (selectedId === id) {
        selectedId = null;
        connectMode = false;
        updateModeBadge();
      } else if (selectedId && selectedId !== id) {
        // Create or toggle connection
        const exists = connections.find(c => c.from === selectedId && c.to === id);
        if (exists) {
          connections = connections.filter(c => !(c.from === selectedId && c.to === id));
        } else {
          connections.push({ from: selectedId, to: id });
        }
        selectedId = id;
        connectMode = false;
        updateModeBadge();
      } else {
        selectedId = id;
        connectMode = true;
        updateModeBadge();
      }
      renderNodes();
      renderConnections();
    }

    function updateModeBadge() {
      if (connectMode && selectedId) {
        modeBadge.textContent = 'Click another node to connect';
        modeBadge.style.opacity = '1';
        modeBadge.style.transform = 'translateX(-50%) translateY(0)';
      } else {
        modeBadge.style.opacity = '0';
        modeBadge.style.transform = 'translateX(-50%) translateY(-10px)';
      }
    }

    // ===== DRAG =====
    function startDrag(id, e) {
      dragging = id;
      const s = stages.find(st => st.id === id);
      const rect = canvas.getBoundingClientRect();
      dragOffset.x = e.clientX - rect.left - s.x;
      dragOffset.y = e.clientY - rect.top - s.y;
      document.body.style.cursor = 'grabbing';
      e.preventDefault();
    }

    document.addEventListener('mousemove', e => {
      if (!dragging) return;
      const s = stages.find(st => st.id === dragging);
      const rect = canvas.getBoundingClientRect();
      s.x = e.clientX - rect.left - dragOffset.x;
      s.y = e.clientY - rect.top - dragOffset.y;
      // Clamp inside canvas loosely
      s.x = Math.max(20, Math.min(s.x, rect.width - 200));
      s.y = Math.max(20, Math.min(s.y, rect.height - 150));
      // Update DOM positions without full re-render for performance
      const node = canvas.querySelector(`[data-id="${dragging}"]`);
      if (node) {
        node.style.left = s.x + 'px';
        node.style.top = s.y + 'px';
      }
      renderConnections();
    });

    document.addEventListener('mouseup', () => {
      if (dragging) {
        dragging = null;
        document.body.style.cursor = '';
      }
    });

    // ===== EDIT =====
    function startEdit(id) {
      editId = id;
      const s = stages.find(st => st.id === id);
      const node = canvas.querySelector(`[data-id="${id}"]`);
      const inner = node.querySelector('.node-inner');
      const h3 = inner.querySelector('h3');
      const p = inner.querySelector('p');
      h3.innerHTML = `<input type="text" value="${escapeHtml(s.title)}" class="w-full bg-transparent text-[15px] font-semibold text-white border-b border-white/20 pb-0.5 focus:border-gold transition-colors" onkeydown="handleEditKey(event, '${id}')" onblur="endEdit('${id}')" autofocus />`;
      p.innerHTML = `<textarea class="w-full bg-transparent text-[11px] text-slate/60 resize-none focus:text-white border-b border-white/10 focus:border-gold transition-colors h-[36px] leading-relaxed" onkeydown="handleEditKey(event, '${id}')" onblur="endEdit('${id}')">${escapeHtml(s.desc)}</textarea>`;
      setTimeout(() => {
        const input = inner.querySelector('input');
        if (input) input.select();
      }, 10);
      selectedId = null;
      connectMode = false;
      renderConnections();
      renderNodes();
    }

    function handleEditKey(e, id) {
      if (e.key === 'Enter') {
        e.preventDefault();
        endEdit(id);
      } else if (e.key === 'Escape') {
        editId = null;
        renderNodes();
      }
    }

    function endEdit(id) {
      const s = stages.find(st => st.id === id);
      const node = canvas.querySelector(`[data-id="${id}"]`);
      if (!node) { editId = null; return; }
      const inner = node.querySelector('.node-inner');
      const input = inner.querySelector('input');
      const textarea = inner.querySelector('textarea');
      if (input) s.title = input.value.trim() || s.title;
      if (textarea) s.desc = textarea.value.trim() || s.desc;
      editId = null;
      renderNodes();
    }

    // ===== CONNECTIONS =====
    function renderConnections() {
      // Remove old paths
      svg.querySelectorAll('path.connection').forEach(p => p.remove());

      connections.forEach((c, i) => {
        const from = stages.find(s => s.id === c.from);
        const to = stages.find(s => s.id === c.to);
        if (!from || !to) return;

        const fromX = from.x + 90;
        const fromY = from.y + 65;
        const toX = to.x + 90;
        const toY = to.y + 65;

        // Curve
        const midX = (fromX + toX) / 2;
        const d = `M ${fromX} ${fromY} Q ${midX} ${(fromY + toY) / 2 - 20} ${toX} ${toY}`;

        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', d);
        path.setAttribute('fill', 'none');
        path.setAttribute('stroke', c.from === selectedId || c.to === selectedId ? '#e4a853' : 'rgba(228,168,83,0.45)');
        path.setAttribute('stroke-width', c.from === selectedId || c.to === selectedId ? '2.5' : '1.5');
        path.setAttribute('stroke-linecap', 'round');
        path.setAttribute('marker-end', 'url(#arrowhead)');
        path.classList.add('connection');
        path.style.cursor = 'pointer';

        // Click to delete
        path.addEventListener('click', e => {
          e.stopPropagation();
          connections = connections.filter((_, idx) => idx !== i);
          renderConnections();
        });

        // Tooltip
        path.title = 'Click to delete connection';
        path.addEventListener('mouseenter', () => {
          path.setAttribute('stroke', '#e07a5f');
          path.setAttribute('stroke-width', '3');
        });
        path.addEventListener('mouseleave', () => {
          path.setAttribute('stroke', c.from === selectedId || c.to === selectedId ? '#e4a853' : 'rgba(228,168,83,0.45)');
          path.setAttribute('stroke-width', c.from === selectedId || c.to === selectedId ? '2.5' : '1.5');
        });

        svg.appendChild(path);
      });
    }

    // ===== ADD STAGE =====
    function addStage() {
      const colors = ['#e4a853', '#81b29a', '#8fa3c5', '#e07a5f', '#8896b3', '#e2a3c7', '#a8c686'];
      const names = ['Discovery', 'Engagement', 'Retention', 'Advocacy', 'Re-engagement', 'Conversion'];
      const descs = ['Initial touchpoint.', 'Active interaction.', 'Long-term loyalty.', 'Word of mouth.', 'Win-back efforts.', 'Key milestone reached.'];
      const id = 'stage_' + Math.random().toString(36).substr(2, 5);
      const s = {
        id,
        title: names[Math.floor(Math.random() * names.length)],
        desc: descs[Math.floor(Math.random() * descs.length)],
        color: colors[Math.floor(Math.random() * colors.length)],
        x: Math.random() * 600 + 200,
        y: Math.random() * 300 + 150,
      };
      stages.push(s);
      renderNodes();
    }

    // ===== RESET =====
    function resetLayout() {
      stages = JSON.parse(JSON.stringify(initialStages));
      connections = [
        { from: 'aw', to: 'int' },
        { from: 'int', to: 'con' },
        { from: 'con', to: 'int2' },
        { from: 'int2', to: 'eval' },
        { from: 'eval', to: 'pur' },
      ];
      selectedId = null;
      connectMode = false;
      updateModeBadge();
      renderNodes();
      renderConnections();
    }

    // ===== UTILS =====
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // ===== EVENT LISTENERS =====
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        selectedId = null;
        connectMode = false;
        editId = null;
        updateModeBadge();
        renderNodes();
        renderConnections();
      }
    });

    document.addEventListener('click', e => {
      if (e.target === canvas || e.target.closest('#canvas') && !e.target.closest('[data-id]')) {
        selectedId = null;
        connectMode = false;
        updateModeBadge();
        renderNodes();
        renderConnections();
      }
    });

    // ===== START =====
    init();
    window.addEventListener('resize', () => renderConnections());
  </script>
</body>
</html>
