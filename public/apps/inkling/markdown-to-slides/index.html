<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown → Slides</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.2/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            ink: '#0a0f1a',
            paper: '#faf8f5',
            parchment: '#f4f1ea',
            gold: '#c5a065',
            goldDeep: '#9a7a45',
            slateDeep: '#1e293b',
            inkSoft: '#334155',
            inkMuted: '#64748b',
            inkFaint: '#94a3b8',
          },
          fontFamily: {
            display: ['"Cormorant Garamond"', 'Georgia', 'serif'],
            body: ['"Instrument Sans"', 'system-ui', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'monospace'],
          },
          letterSpacing: {
            'tighter-plus': '-0.035em',
          }
        }
      }
    }
  </script>

  <style>
    html, body { font-family: "Instrument Sans", system-ui, sans-serif; }
    ::selection { background: rgba(197,160,101,0.18); color: inherit; }

    /* Slide card shadows */
    .slide-card {
      box-shadow:
        0 1px 3px rgba(10,15,26,0.06),
        0 10px 30px rgba(10,15,26,0.08),
        0 30px 60px rgba(10,15,26,0.05);
    }
    .dark .slide-card {
      box-shadow:
        0 1px 3px rgba(255,255,255,0.04),
        0 10px 30px rgba(255,255,255,0.06),
        0 30px 60px rgba(255,255,255,0.04);
    }

    /* Subtle texture overlay for slides */
    .texture-overlay::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 10;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #c5a06555; border-radius: 999px; }
    ::-webkit-scrollbar-thumb:hover { background: #c5a06588; }
    .dark ::-webkit-scrollbar-thumb { background: #c5a06533; }
    .dark ::-webkit-scrollbar-thumb:hover { background: #c5a06555; }

    /* Slide transition */
    .slide-enter {
      animation: rise 0.55s ease-out both;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(16px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Typography refinements */
    .prose-slide h1 { line-height: 0.92; letter-spacing: -0.035em; }
    .prose-slide h2 { line-height: 1.05; letter-spacing: -0.025em; }
    .prose-slide h3 { line-height: 1.15; letter-spacing: -0.015em; }

    /* Editor caret glow */
    textarea:focus { box-shadow: 0 0 0 3px rgba(197,160,101,0.18); border-color: rgba(197,160,101,0.4); }
  </style>
</head>

<body class="bg-parchment text-ink dark:bg-ink dark:text-parchment min-h-screen transition-colors duration-500">

  <!-- Header -->
  <header class="sticky top-0 z-40 backdrop-blur-xl bg-parchment/80 dark:bg-ink/80 border-b border-ink/5 dark:border-white/5 transition-colors duration-500">
    <div class="max-w-7xl mx-auto px-6 lg:px-10 h-16 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-gold to-goldDeep flex items-center justify-center shadow-lg shadow-gold/20">
          <i class="fa-solid fa-layer-group text-white text-sm"></i>
        </div>
        <div>
          <h1 class="text-[15px] font-body font-bold tracking-tight leading-none text-ink dark:text-parchment">Markdown → Slides</h1>
          <span class="text-[10px] font-mono text-inkMuted dark:text-inkFaint tracking-wide uppercase">Live Presentation Engine</span>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <button onclick="loadSample()" class="hidden sm:inline-flex items-center gap-2 px-3.5 py-2 rounded-full text-[11px] font-semibold tracking-wide uppercase bg-ink/5 dark:bg-white/5 text-inkMuted dark:text-inkFaint hover:bg-ink/10 dark:hover:bg-white/10 hover:text-ink dark:hover:text-parchment transition-all duration-300" title="Load sample deck">
          <i class="fa-solid fa-bolt text-gold text-[10px]"></i>
          <span>Sample</span>
        </button>
        <button onclick="toggleTheme()" class="w-9 h-9 rounded-full flex items-center justify-center bg-ink/5 dark:bg-white/5 hover:bg-ink/10 dark:hover:bg-white/10 text-inkMuted dark:text-inkFaint hover:text-ink dark:hover:text-parchment transition-all duration-300" title="Toggle theme">
          <i class="fa-solid fa-moon dark:hidden text-xs"></i>
          <i class="fa-solid fa-sun hidden dark:inline text-xs text-gold"></i>
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-6 lg:px-10 py-10 lg:py-14">
    <div class="grid lg:grid-cols-12 gap-10 items-start">

      <!-- Editor Panel -->
      <section class="lg:col-span-5 lg:sticky lg:top-28 lg:self-start space-y-6">
        <div class="flex items-center justify-between">
          <div>
            <h2 class="font-display text-3xl font-light text-ink dark:text-parchment tracking-tighter-plus">Editor</h2>
            <p class="text-sm text-inkMuted dark:text-inkFaint mt-1">Write with <code class="font-mono text-[10px] bg-ink/5 dark:bg-white/5 px-1 rounded text-goldDeep">---</code> to split slides</p>
          </div>
          <span id="slideCount" class="font-mono text-[10px] font-medium bg-ink/5 dark:bg-white/5 text-inkMuted dark:text-inkFaint px-2.5 py-1 rounded-md uppercase tracking-wider">0 slides</span>
        </div>

        <div class="relative group">
          <textarea id="mdInput" class="w-full h-[520px] lg:h-[560px] rounded-2xl bg-white dark:bg-slateDeep/60 border border-ink/8 dark:border-white/8 p-6 font-mono text-[13px] leading-[1.85] text-ink dark:text-parchment resize-none focus:outline-none shadow-sm hover:shadow-md transition-shadow duration-300" spellcheck="false" placeholder="# Welcome
---
# Slide 2
---
# Final Slide"></textarea>
          <div class="absolute top-4 right-4 pointer-events-none opacity-0 group-hover:opacity-100 transition-opacity">
            <span class="text-[9px] font-mono text-inkFaint uppercase tracking-widest">Markdown</span>
          </div>
        </div>
      </section>

      <!-- Preview Panel -->
      <section class="lg:col-span-7 space-y-6">
        <div class="flex items-center justify-between">
          <div>
            <h2 class="font-display text-3xl font-light text-ink dark:text-parchment tracking-tighter-plus">Preview</h2>
            <p class="text-sm text-inkMuted dark:text-inkFaint mt-1">Live rendered deck</p>
          </div>
          <div class="flex items-center gap-2">
            <button onclick="prevSlide()" class="w-9 h-9 rounded-full flex items-center justify-center bg-ink/5 dark:bg-white/5 hover:bg-ink/10 dark:hover:bg-white/10 text-inkMuted dark:text-inkFaint hover:text-ink dark:hover:text-parchment transition-all duration-300" title="Previous">
              <i class="fa-solid fa-arrow-left text-xs"></i>
            </button>
            <span id="slideCounter" class="font-mono text-[11px] font-semibold text-inkMuted dark:text-inkFaint px-2 min-w-[3rem] text-center">1 / 1</span>
            <button onclick="nextSlide()" class="w-9 h-9 rounded-full flex items-center justify-center bg-ink/5 dark:bg-white/5 hover:bg-ink/10 dark:hover:bg-white/10 text-inkMuted dark:text-inkFaint hover:text-ink dark:hover:text-parchment transition-all duration-300" title="Next">
              <i class="fa-solid fa-arrow-right text-xs"></i>
            </button>
            <button onclick="toggleFullscreen()" class="w-9 h-9 rounded-full flex items-center justify-center bg-ink/5 dark:bg-white/5 hover:bg-ink/10 dark:hover:bg-white/10 text-inkMuted dark:text-inkFaint hover:text-ink dark:hover:text-parchment transition-all duration-300" title="Fullscreen presentation">
              <i class="fa-solid fa-expand text-xs"></i>
            </button>
          </div>
        </div>

        <!-- Slide Viewport -->
        <div id="viewport" class="relative rounded-3xl overflow-hidden bg-gradient-to-br from-parchment to-parchment/60 dark:from-slateDeep dark:to-ink shadow-xl ring-1 ring-ink/5 dark:ring-white/5 transition-colors duration-500 min-h-[520px] flex items-center justify-center p-10 lg:p-14">
          <div id="slideContainer" class="w-full"></div>
        </div>

        <!-- Keyboard hint -->
        <div class="flex items-center justify-center gap-6 text-[10px] font-mono text-inkFaint uppercase tracking-[0.12em]">
          <span><kbd class="font-mono px-1.5 py-0.5 rounded bg-ink/5 dark:bg-white/5 text-inkMuted dark:text-inkFaint">←</kbd> <kbd class="font-mono px-1.5 py-0.5 rounded bg-ink/5 dark:bg-white/5 text-inkMuted dark:text-inkFaint">→</kbd> Navigate</span>
          <span><kbd class="font-mono px-1.5 py-0.5 rounded bg-ink/5 dark:bg-white/5 text-inkMuted dark:text-inkFaint">Space</kbd> Next</span>
          <span><kbd class="font-mono px-1.5 py-0.5 rounded bg-ink/5 dark:bg-white/5 text-inkMuted dark:text-inkFaint">F</kbd> Fullscreen</span>
        </div>
      </section>
    </div>
  </main>

  <!-- Fullscreen Presentation Overlay -->
  <div id="fullscreenOverlay" onclick="toggleFullscreen()" class="fixed inset-0 z-[60] bg-ink dark:bg-ink hidden flex-col items-center justify-center p-10 transition-colors duration-500 cursor-default">
    <div onclick="event.stopPropagation()" id="fullscreenSlides" class="w-full max-w-[1200px] h-[80vh] flex items-center justify-center"></div>
    <div class="absolute bottom-8 left-1/2 -translate-x-1/2 flex items-center gap-6 text-parchment/50 font-mono text-xs tracking-wider">
      <span>Press <kbd class="text-parchment/30">Esc</kbd> to exit</span>
      <span>•</span>
      <span id="fullscreenCounter">1 / 1</span>
    </div>
  </div>

  <script>
    // Sample deck
    const sampleMarkdown = `# Strategic Vision 2026

## Building Tomorrow's Markets

---

## Key Priorities

### Innovation
- Launch AI-powered analytics platform
- Expand into Southeast Asia markets
- Reduce operational carbon footprint by 30%

---

## Q3 Milestones

| Quarter | Revenue | Growth |
|---------|---------|--------|
| Q1      | $4.2M   | +12%   |
| Q2      | $5.1M   | +21%   |
| Q3      | $6.8M   | +33%   |`;

    const mdInput = document.getElementById('mdInput');
    mdInput.value = sampleMarkdown;

    let slides = [];
    let currentSlide = 0;
    let isFullscreen = false;

    function parseSlides(md) {
      const parts = md.split(/\n---\n/);
      return parts.map(p => p.trim()).filter(p => p.length > 0);
    }

    function renderSlide(md) {
      // Convert markdown to HTML
      const html = marked.parse(md, {
        breaks: true,
        gfm: true,
      });
      return `<article class="slide-card texture-overlay relative bg-gradient-to-br from-white/90 to-parchment/80 dark:from-slateDeep/80 dark:to-ink/60 rounded-3xl p-10 lg:p-14 shadow-2xl shadow-ink/5 dark:shadow-black/20 ring-1 ring-ink/[0.04] dark:ring-white/[0.04] slide-enter prose-slide">
        <div class="relative z-20 max-w-3xl mx-auto">${html}</div>
      </article>`;
    }

    function updateUI() {
      slides = parseSlides(mdInput.value);
      const count = slides.length || 1;
      document.getElementById('slideCount').textContent = count + ' slide' + (count !== 1 ? 's' : '');

      const container = document.getElementById('slideContainer');
      if (slides.length === 0) {
        container.innerHTML = `<div class="text-center text-inkMuted dark:text-inkFaint font-display text-2xl italic">No slides found</div>`;
      } else {
        currentSlide = Math.min(currentSlide, slides.length - 1);
        container.innerHTML = renderSlide(slides[currentSlide]);
      }
      document.getElementById('slideCounter').textContent = (currentSlide + 1) + ' / ' + count;
      document.getElementById('fullscreenCounter').textContent = (currentSlide + 1) + ' / ' + count;

      // Update fullscreen content if open
      const fsContainer = document.getElementById('fullscreenSlides');
      if (isFullscreen) {
        fsContainer.innerHTML = renderSlide(slides[currentSlide]);
      }
    }

    mdInput.addEventListener('input', () => {
      updateUI();
    });

    function loadSample() {
      mdInput.value = sampleMarkdown;
      currentSlide = 0;
      updateUI();
      mdInput.focus();
    }

    function nextSlide() {
      if (currentSlide < slides.length - 1) {
        currentSlide++;
        updateUI();
      } else if (slides.length > 0) {
        // loop back
        currentSlide = 0;
        updateUI();
      }
    }

    function prevSlide() {
      if (currentSlide > 0) {
        currentSlide--;
        updateUI();
      } else if (slides.length > 0) {
        currentSlide = slides.length - 1;
        updateUI();
      }
    }

    function toggleTheme() {
      document.documentElement.classList.toggle('dark');
    }

    function toggleFullscreen() {
      isFullscreen = !isFullscreen;
      const overlay = document.getElementById('fullscreenOverlay');
      if (isFullscreen) {
        overlay.classList.remove('hidden');
        overlay.classList.add('flex');
        document.body.style.overflow = 'hidden';
        // Render current slide in fullscreen
        const fsContainer = document.getElementById('fullscreenSlides');
        fsContainer.innerHTML = renderSlide(slides[currentSlide] || '');
      } else {
        overlay.classList.add('hidden');
        overlay.classList.remove('flex');
        document.body.style.overflow = '';
      }
    }

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (e.target === mdInput) return;
      if (e.key === 'ArrowRight' || e.key === ' ') {
        e.preventDefault();
        nextSlide();
      } else if (e.key === 'ArrowLeft') {
        e.preventDefault();
        prevSlide();
      } else if (e.key === 'f' || e.key === 'F') {
        e.preventDefault();
        toggleFullscreen();
      } else if (e.key === 'Escape') {
        if (isFullscreen) {
          toggleFullscreen();
        }
      }
    });

    // Initialize
    updateUI();
  </script>
</body>
</html>
