<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tic Tac Toe — Roman Empire</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Spectral:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
:root{
  --marble:#e8dcc8; --marble-dark:#cbbfa3; --marble-deep:#b0a28a;
  --gold:#c9a84c; --gold-light:#e8cf7a; --gold-deep:#9a7e2a;
  --gold-glow:rgba(201,168,76,0.22);
  --ink:#2b2118; --ink-dim:#5c4d3c;
  --stone:#f4efe8; --stone-dark:#d8d2c3;
  --win:#bfa23e; --win-soft:#eadd94;
  --shadow-color:rgba(43,33,24,0.22);
}

*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}

html,body{margin:0; padding:0; height:100vh; width:100vw; overflow:hidden; background:#1a1610;}

/* Marble background */
.marble-bg{
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background:
    radial-gradient(ellipse at 20% 30%, rgba(232,220,200,0.65) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 70%, rgba(200,188,160,0.55) 0%, transparent 60%),
    radial-gradient(ellipse at 50% 50%, rgba(176,162,138,0.35) 0%, transparent 70%),
    radial-gradient(ellipse at 10% 80%, rgba(217,210,190,0.4) 0%, transparent 50%),
    linear-gradient(135deg, #2a241a 0%, #1a1610 60%, #140f0b 100%);
}
.marble-bg::after{
  content:""; position:absolute; inset:0;
  background:
    repeating-linear-gradient(90deg, transparent 0 2px, rgba(255,255,255,0.015) 2px 4px),
    repeating-linear-gradient(0deg, transparent 0 2px, rgba(255,255,255,0.015) 2px 4px);
  opacity:0.7;
}

/* Colosseum arch silhouette */
.colosseum{
  position:fixed; bottom:-12vh; left:50%; transform:translateX(-50%); z-index:1; pointer-events:none;
  width:120vmax; height:40vh; opacity:0.06;
  background:radial-gradient(ellipse at 50% 100%, #fff 0%, transparent 70%);
  mask-image:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120"><path d="M10 120v-40a30 30 0 0 1 60 0v40m20-50v-30a25 25 0 0 1 50 0v30m20-40v-20a20 20 0 0 1 40 0v20m30 10v60m-10-60v60m-10-60v60m20 0v60m20 0v60" stroke="%23fff" stroke-width="4" fill="none"/></svg>');
  -webkit-mask-image:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120"><path d="M10 120v-40a30 30 0 0 1 60 0v40m20-50v-30a25 25 0 0 1 50 0v30m20-40v-20a20 20 0 0 1 40 0v20m30 10v60m-10-60v60m-10-60v60m20 0v60m20 0v60" stroke="%23fff" stroke-width="4" fill="none"/></svg>');
  mask-size:100% 100%; -webkit-mask-size:100% 100%; mask-repeat:no-repeat; -webkit-mask-repeat:no-repeat;
}

/* SPQR crest */
.spqr{
  font-family:"Playfair Display", serif; font-weight:700; letter-spacing:0.35em; color:var(--gold); font-size:clamp(0.7rem,1.5vw,1rem);
  text-shadow:0 2px 10px var(--gold-glow), 0 1px 0 rgba(255,255,255,0.1);
  user-select:none;
}

/* Layout */
.wrapper{position:relative; z-index:2; height:100vh; width:100vw; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:clamp(1rem,3vmin,2.5rem);}

/* Header */
.header{display:flex; flex-direction:column; align-items:center; gap:0.35rem; margin-bottom:clamp(1rem,3vmin,2rem);}
.header h1{font-family:"Playfair Display", serif; font-weight:700; font-size:clamp(2.2rem,7vmin,4.5rem); color:var(--stone); letter-spacing:0.05em; margin:0; text-shadow:0 4px 30px rgba(0,0,0,0.5), 0 1px 0 rgba(255,255,255,0.08); line-height:1.05;}
.header h1 .accent{color:var(--gold); text-shadow:0 2px 20px var(--gold-glow);}
.header .subtitle{font-family:"Spectral", serif; font-style:italic; font-weight:300; color:var(--marble-deep); font-size:clamp(0.9rem,2vmin,1.15rem); letter-spacing:0.15em; margin:0;}

/* Top buttons bar (clean, only 3 buttons) */
.top-bar{display:flex; gap:clamp(0.5rem,2vmin,1rem); margin-bottom:clamp(0.8rem,2.5vmin,1.5rem); flex-wrap:wrap; justify-content:center;}
.btn{
  font-family:"Spectral", serif; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; font-size:clamp(0.65rem,1.2vmin,0.9rem);
  background:linear-gradient(180deg, rgba(201,168,76,0.12) 0%, rgba(201,168,76,0.05) 100%);
  border:1.5px solid rgba(201,168,76,0.35);
  color:var(--gold-light);
  padding:clamp(0.45rem,1vmin,0.7rem) clamp(1rem,3vmin,1.6rem);
  border-radius:0.35em;
  cursor:pointer; transition:all 0.25s ease; box-shadow:0 4px 15px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.08);
  position:relative; overflow:hidden;
}
.btn::after{content:""; position:absolute; top:0; left:-100%; width:100%; height:100%; background:linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent); transition:left 0.5s ease;}
.btn:hover{border-color:rgba(201,168,76,0.7); color:#fff; box-shadow:0 6px 20px rgba(201,168,76,0.2), 0 0 0 1px rgba(201,168,76,0.35); transform:translateY(-2px);}
.btn:hover::after{left:100%;}
.btn:active{transform:translateY(0); box-shadow:inset 0 2px 5px rgba(0,0,0,0.3);}

/* Board */
.board-wrap{position:relative; z-index:2;}
.board{
  display:grid; grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(3,1fr); gap:clamp(0.35rem,1.2vmin,0.6rem);
  width:min(80vmin, 420px); height:min(80vmin, 420px);
  padding:clamp(0.4rem,1.5vmin,0.8rem);
  border-radius:1rem;
  background:linear-gradient(180deg, rgba(232,220,200,0.08) 0%, rgba(184,169,130,0.12) 100%);
  border:1.5px solid rgba(201,168,76,0.2);
  box-shadow:
    0 20px 60px rgba(0,0,0,0.5),
    inset 0 1px 0 rgba(255,255,255,0.06),
    0 0 0 1px rgba(201,168,76,0.08);
  backdrop-filter:blur(8px);
}

.cell{
  background:linear-gradient(180deg, #f6f2e8 0%, #eaddc5 60%, #d8cfb8 100%);
  border-radius:0.6rem;
  border:1.5px solid rgba(201,168,76,0.18);
  box-shadow:
    inset 0 -4px 12px rgba(184,169,130,0.35),
    inset 0 2px 6px rgba(255,255,255,0.5),
    0 2px 8px rgba(0,0,0,0.15);
  display:flex; align-items:center; justify-content:center;
  font-family:"Playfair Display", serif; font-weight:700; font-size:clamp(2.5rem,10vmin,5rem); color:#8a7345; line-height:1;
  cursor:pointer; user-select:none; transition:all 0.2s ease; position:relative; overflow:hidden;
}
.cell::before{
  content:""; position:absolute; inset:0; background:radial-gradient(circle at 30% 30%, rgba(255,255,255,0.35), transparent 60%); pointer-events:none;
}
.cell:hover:not(.taken){background:linear-gradient(180deg, #fff8eb 0%, #f0e6cf 60%, #e6dcc8 100%); box-shadow:inset 0 -3px 10px rgba(201,168,76,0.25), 0 0 20px rgba(201,168,76,0.15); border-color:rgba(201,168,76,0.45); transform:scale(1.02);}
.cell.taken{cursor:default;}
.cell.taken:hover{transform:none;}
.cell.win{background:linear-gradient(135deg, #eadd94 0%, #c9a84c 100%) !important; border-color:var(--gold-deep) !important; box-shadow:0 0 25px var(--gold-glow), inset 0 -2px 8px rgba(0,0,0,0.15) !important; animation:winPulse 1.2s ease infinite alternate; color:#5c4300;}
@keyframes winPulse{from{box-shadow:0 0 15px var(--gold-glow), inset 0 -2px 8px rgba(0,0,0,0.15);} to{box-shadow:0 0 35px var(--gold-glow), inset 0 -2px 8px rgba(0,0,0,0.15);}}

/* Glyphs */
.cell.gladius::after{content:"✕"; font-family:"Spectral", serif; letter-spacing:-0.15em;}
.cell.gladius::before{content:none;}
.cell.gladius.taken{color:#7a4a2a;}
.cell.gladius.taken.win{color:#4a2a0a;}

.cell.laurel::after{content:"❖"; font-family:"Spectral", serif;}
.cell.laurel.taken{color:#5a7a3a;}
.cell.laurel.taken.win{color:#2a4a0a;}

/* Scoreboard */
.scoreboard{
  display:flex; justify-content:center; gap:clamp(0.8rem,3vmin,2rem); margin-top:clamp(0.8rem,2.5vmin,1.5rem);
  font-family:"Spectral", serif; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; font-size:clamp(0.75rem,1.5vmin,1.1rem);
}
.score-item{display:flex; align-items:center; gap:0.4rem; color:var(--marble); text-shadow:0 1px 3px rgba(0,0,0,0.4);}
.score-item .label{opacity:0.7; font-size:0.85em;}
.score-item .value{color:var(--gold-light); font-weight:700; min-width:1.5em; text-align:center; font-family:"Playfair Display", serif; font-size:1.1em;}

/* Victory banner */
.victory-banner{
  position:absolute; top:-3.2rem; left:50%; transform:translateX(-50%);
  background:linear-gradient(135deg, rgba(201,168,76,0.92) 0%, rgba(154,126,42,0.95) 100%);
  color:#2b2118; padding:0.35rem 1.5rem; border-radius:2rem;
  font-family:"Playfair Display", serif; font-weight:700; font-size:clamp(0.85rem,1.8vmin,1.1rem); letter-spacing:0.15em;
  box-shadow:0 4px 20px rgba(201,168,76,0.35), 0 0 0 1px rgba(255,255,255,0.1);
  white-space:nowrap; pointer-events:none; opacity:0; transition:opacity 0.5s ease, top 0.5s ease;
}
.victory-banner.show{opacity:1; top:-3.8rem;}

/* Status */
.status{font-family:"Spectral", serif; font-weight:400; font-style:italic; color:var(--marble-deep); font-size:clamp(0.85rem,1.8vmin,1.1rem); letter-spacing:0.05em; height:1.5rem; text-align:center; text-shadow:0 1px 4px rgba(0,0,0,0.3);}

/* Customize dialog */
.dialog-overlay{
  position:fixed; inset:0; z-index:50; background:rgba(20,15,11,0.85);
  backdrop-filter:blur(12px) saturate(1.3);
  display:flex; align-items:center; justify-content:center; padding:1rem;
  opacity:0; pointer-events:none; transition:opacity 0.35s ease;
}
.dialog-overlay.open{opacity:1; pointer-events:auto;}

.dialog{
  background:linear-gradient(180deg, #2a2318 0%, #1a1610 100%);
  border:1px solid rgba(201,168,76,0.3);
  border-radius:1rem;
  padding:clamp(1.2rem,3vmin,2.2rem);
  max-width:480px; width:100%;
  box-shadow:0 30px 80px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.05), 0 0 0 1px rgba(201,168,76,0.1);
  transform:translateY(20px); transition:transform 0.4s ease;
}
.dialog-overlay.open .dialog{transform:translateY(0);}

.dialog h2{font-family:"Playfair Display", serif; color:var(--gold-light); margin:0 0 1.2rem; font-size:clamp(1.2rem,3vmin,1.6rem); letter-spacing:0.12em; text-align:center; text-shadow:0 2px 10px var(--gold-glow);}
.dialog h3{font-family:"Spectral", serif; color:var(--stone-dark); font-weight:600; font-size:0.8rem; letter-spacing:0.12em; text-transform:uppercase; margin:0.9rem 0 0.4rem; border-bottom:1px solid rgba(201,168,76,0.2); padding-bottom:0.2rem;}

.option-row{display:flex; gap:0.5rem; flex-wrap:wrap; margin-bottom:0.1rem;}
.option-btn{
  flex:1 1 120px; background:rgba(232,220,200,0.06); border:1px solid rgba(201,168,76,0.2); border-radius:0.4rem;
  padding:0.55rem 0.6rem; color:var(--stone); font-family:"Spectral", serif; font-size:0.85rem; cursor:pointer; text-align:center; transition:all 0.2s ease;
}
.option-btn:hover{border-color:rgba(201,168,76,0.4); background:rgba(201,168,76,0.08); color:var(--gold-light);}
.option-btn.active{border-color:var(--gold); background:rgba(201,168,76,0.18); color:var(--gold-light); box-shadow:inset 0 1px 4px rgba(0,0,0,0.3);}

.dialog .close-btn{margin-top:1rem; width:100%; background:linear-gradient(180deg, rgba(201,168,76,0.15), rgba(201,168,76,0.05)); border:1px solid rgba(201,168,76,0.4); color:var(--gold); padding:0.7rem; border-radius:0.5rem; font-family:"Spectral", serif; font-weight:600; letter-spacing:0.1em; cursor:pointer; transition:all 0.2s ease;}
.dialog .close-btn:hover{background:rgba(201,168,76,0.25); border-color:var(--gold); color:#fff;}

/* Confetti canvas */
#confetti{position:fixed; inset:0; z-index:100; pointer-events:none; opacity:0; transition:opacity 0.3s ease;}
#confetti.active{opacity:1;}

/* Keyboard focus */
*:focus-visible{outline:2px solid var(--gold); outline-offset:2px;}

/* Reduced motion */
@media (prefers-reduced-motion: reduce){
  *, *::before, *::after{animation-duration:0.01ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important;}
  .cell.win{animation:none;}
}
</style>
</head>
<body>

<div class="marble-bg"></div>
<div class="colosseum"></div>

<div class="wrapper" role="main" aria-label="Roman Tic Tac Toe">

  <header class="header" aria-label="Game header">
    <div class="spqr" aria-hidden="true">SPQR</div>
    <h1>Tic <span class="accent">Tac</span> Toe</h1>
    <p class="subtitle">In the shadow of the Colosseum</p>
  </header>

  <nav class="top-bar" aria-label="Game controls">
    <button class="btn" onclick="startRound()" aria-label="Start a new round">New Round</button>
    <button class="btn" onclick="openCustomize()" aria-label="Open customize options">Customize</button>
    <button class="btn" onclick="resetScores()" aria-label="Reset all scores">Reset Scores</button>
  </nav>

  <div class="status" id="status" aria-live="polite" aria-atomic="true">X to move — choose a square</div>

  <div class="board-wrap" aria-label="Game board">
    <div class="victory-banner" id="victoryBanner" aria-live="assertive"></div>
    <div class="board" id="board" role="grid" aria-label="Tic Tac Toe grid" aria-rowcount="3" aria-colcount="3"></div>
  </div>

  <div class="scoreboard" aria-label="Scoreboard">
    <div class="score-item" aria-label="X wins"><span class="label">X</span> <span class="value" id="scoreX" aria-live="polite">0</span></div>
    <div class="score-item" aria-label="Draws"><span class="label">✦</span> <span class="value" id="scoreD" aria-live="polite">0</span></div>
    <div class="score-item" aria-label="O wins"><span class="label">O</span> <span class="value" id="scoreO" aria-live="polite">0</span></div>
  </div>

</div>

<canvas id="confetti" aria-hidden="true"></canvas>

<div class="dialog-overlay" id="dialogOverlay" onclick="if(event.target===this)closeCustomize()" aria-modal="true" role="dialog" aria-label="Customize game">
  <div class="dialog" onclick="event.stopPropagation()">
    <h2>Customize</h2>

    <h3>Theme</h3>
    <div class="option-row">
      <button class="option-btn active" onclick="setTheme('light')" id="btn-theme-light">Marble Day</button>
      <button class="option-btn" onclick="setTheme('dark')" id="btn-theme-dark">Night Legion</button>
    </div>

    <h3>Glyphs</h3>
    <div class="option-row">
      <button class="option-btn active" onclick="setGlyphs('standard')" id="btn-glyphs-standard">Standard X / O</button>
      <button class="option-btn" onclick="setGlyphs('roman')" id="btn-glyphs-roman">Gladius / Laurel</button>
    </div>

    <h3>Mode</h3>
    <div class="option-row">
      <button class="option-btn active" onclick="setMode('2p')" id="btn-mode-2p">2-Player</button>
      <button class="option-btn" onclick="setMode('ai')" id="btn-mode-ai">vs AI</button>
    </div>

    <h3>First Move</h3>
    <div class="option-row">
      <button class="option-btn active" onclick="setFirst('X')" id="btn-first-X">X</button>
      <button class="option-btn" onclick="setFirst('O')" id="btn-first-O">O</button>
    </div>

    <h3>AI Discipline</h3>
    <div class="option-row">
      <button class="option-btn active" onclick="setAI('perfect')" id="btn-ai-perfect">Perfect</button>
      <button class="option-btn" onclick="setAI('pragmatic')" id="btn-ai-pragmatic">Pragmatic</button>
      <button class="option-btn" onclick="setAI('reckless')" id="btn-ai-reckless">Reckless</button>
    </div>

    <button class="close-btn" onclick="closeCustomize()">Confirm Settings</button>
  </div>
</div>

<script>
// ===== State =====
let board = Array(9).fill(null);
let currentPlayer = 'X';
let scores = { X:0, O:0, Draw:0 };
let theme = 'light';
let glyphs = 'standard';
let mode = '2p';
let firstMove = 'X';
let aiDiscipline = 'perfect';
let gameOver = false;
let winningLine = [];

const STATUS = document.getElementById('status');
const BOARD = document.getElementById('board');
const VICTORY = document.getElementById('victoryBanner');

// ===== Board Build =====
function buildBoard(){
  BOARD.innerHTML = '';
  for(let i=0;i<9;i++){
    const cell = document.createElement('button');
    cell.className = 'cell';
    cell.setAttribute('role','gridcell');
    cell.setAttribute('aria-rowindex', Math.floor(i/3)+1);
    cell.setAttribute('aria-colindex', (i%3)+1);
    cell.setAttribute('aria-label', 'Cell '+(i+1)+', empty');
    cell.setAttribute('tabindex', '0');
    cell.addEventListener('click', () => makeMove(i));
    cell.addEventListener('keydown', (e) => {
      if(e.key==='Enter'||e.key===' '){ e.preventDefault(); makeMove(i); }
    });
    BOARD.appendChild(cell);
  }
  renderBoard();
}

function renderBoard(){
  const cells = BOARD.querySelectorAll('.cell');
  for(let i=0;i<9;i++){
    const cell = cells[i];
    const val = board[i];
    cell.classList.remove('taken', 'win');
    if(val){
      cell.classList.add('taken');
      cell.setAttribute('aria-label', 'Cell '+(i+1)+', occupied by '+val);
      cell.textContent = '';
      if(glyphs==='roman'){
        cell.classList.add(val==='X' ? 'gladius' : 'laurel');
      } else {
        cell.textContent = val;
      }
    } else {
      cell.classList.remove('gladius', 'laurel');
      cell.textContent = '';
      cell.setAttribute('aria-label', 'Cell '+(i+1)+', empty');
    }
  }
  winningLine.forEach(i => {
    BOARD.children[i].classList.add('win');
  });
}

// ===== Game Logic =====
const WIN_LINES = [
  [0,1,2],[3,4,5],[6,7,8],
  [0,3,6],[1,4,7],[2,5,8],
  [0,4,8],[2,4,6]
];

function checkWin(b, p){
  for(const line of WIN_LINES){
    if(line.every(i => b[i]===p)) return line;
  }
  return null;
}

function isDraw(b){ return b.every(c => c !== null); }

function makeMove(i){
  if(gameOver || board[i]) return;
  board[i] = currentPlayer;
  const winLine = checkWin(board, currentPlayer);
  if(winLine){
    winningLine = winLine;
    scores[currentPlayer]++;
    gameOver = true;
    renderBoard();
    updateScoreboard();
    showVictory(currentPlayer);
    STATUS.textContent = currentPlayer + ' wins!';
    if(mode==='ai' && currentPlayer==='O') triggerConfetti();
    else if(mode==='2p') triggerConfetti();
    return;
  }
  if(isDraw(board)){
    scores.Draw++;
    gameOver = true;
    renderBoard();
    updateScoreboard();
    VICTORY.textContent = 'Stalemate — Draw';
    VICTORY.classList.add('show');
    STATUS.textContent = 'Draw — a stalemate in the arena';
    setTimeout(() => VICTORY.classList.remove('show'), 3000);
    return;
  }
  currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
  renderBoard();
  STATUS.textContent = (currentPlayer === 'X' ? 'X' : 'O') + " to move — choose a square";

  if(mode==='ai' && currentPlayer==='O' && !gameOver){
    setTimeout(() => aiMove(), 350);
  }
}

function aiMove(){
  if(gameOver) return;
  const m = minimax(board, 0, true);
  let bestMove = -1;
  if(aiDiscipline === 'perfect'){
    bestMove = m.index;
  } else if(aiDiscipline === 'pragmatic'){
    // 60% best, 25% second, 15% random
    const scoresMoves = getMovesWithScores(board, true);
    const sorted = scoresMoves.sort((a,b) => b.score - a.score);
    const roll = Math.random();
    if(roll < 0.6) bestMove = sorted[0].index;
    else if(roll < 0.85) bestMove = sorted[1] ? sorted[1].index : sorted[0].index;
    else bestMove = sorted[Math.floor(Math.random()*sorted.length)].index;
  } else {
    // reckless: 30% best, 70% random
    const scoresMoves = getMovesWithScores(board, true);
    const sorted = scoresMoves.sort((a,b) => b.score - a.score);
    const roll = Math.random();
    if(roll < 0.3) bestMove = sorted[0].index;
    else bestMove = sorted[Math.floor(Math.random()*sorted.length)].index;
  }
  makeMove(bestMove);
}

function getMovesWithScores(b, isMax){
  const moves = [];
  for(let i=0;i<9;i++){
    if(b[i]===null){
      const copy = b.slice();
      copy[i] = isMax ? 'O' : 'X';
      const score = minimaxScore(copy, 0, !isMax, -Infinity, Infinity);
      moves.push({index:i, score});
    }
  }
  return moves;
}

function minimax(b, depth, isMaximizing){
  const result = minimaxScore(b, depth, isMaximizing, -Infinity, Infinity);
  return { index: result.index, score: result.score };
}

function minimaxScore(b, depth, isMaximizing, alpha, beta){
  const winLine = checkWin(b, 'O');
  if(winLine) return { score: 10 - depth, index: -1 };
  const winLineX = checkWin(b, 'X');
  if(winLineX) return { score: depth - 10, index: -1 };
  if(isDraw(b)) return { score: 0, index: -1 };

  let bestIndex = -1;
  let bestScore = isMaximizing ? -Infinity : Infinity;

  for(let i=0;i<9;i++){
    if(b[i]===null){
      b[i] = isMaximizing ? 'O' : 'X';
      const scoreObj = minimaxScore(b, depth+1, !isMaximizing, alpha, beta);
      b[i] = null;
      if(isMaximizing){
        if(scoreObj.score > bestScore){ bestScore = scoreObj.score; bestIndex = i; }
        alpha = Math.max(alpha, bestScore);
      } else {
        if(scoreObj.score < bestScore){ bestScore = scoreObj.score; bestIndex = i; }
        beta = Math.min(beta, bestScore);
      }
      if(beta <= alpha) break;
    }
  }
  return { score: bestScore, index: bestIndex };
}

function startRound(){
  board = Array(9).fill(null);
  winningLine = [];
  currentPlayer = firstMove;
  gameOver = false;
  VICTORY.classList.remove('show');
  buildBoard();
  STATUS.textContent = (currentPlayer === 'X' ? 'X' : 'O') + " to move — choose a square";
  if(mode==='ai' && currentPlayer==='O' && !gameOver){
    setTimeout(() => aiMove(), 500);
  }
}

function resetScores(){
  scores = { X:0, O:0, Draw:0 };
  updateScoreboard();
  VICTORY.classList.remove('show');
  startRound();
}

function updateScoreboard(){
  document.getElementById('scoreX').textContent = scores.X;
  document.getElementById('scoreO').textContent = scores.O;
  document.getElementById('scoreD').textContent = scores.Draw;
}

function showVictory(p){
  winningLine.forEach(i => BOARD.children[i].classList.add('win'));
  VICTORY.textContent = p + ' Wins — Glory to the Victor';
  VICTORY.classList.add('show');
  setTimeout(() => VICTORY.classList.remove('show'), 3500);
  triggerConfetti();
}

// ===== Confetti =====
const canvas = document.getElementById('confetti');
const ctx = canvas.getContext('2d');
let confettiParticles = [];
let confettiActive = false;

function resizeCanvas(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function triggerConfetti(){
  if(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  confettiActive = true;
  canvas.classList.add('active');
  confettiParticles = [];
  const colors = ['#c9a84c','#bfa23e','#eadd94','#5c4d3c','#f0e6cf','#8a7345','#d8cfb8'];
  for(let i=0;i<120;i++){
    confettiParticles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * -canvas.height,
      vx: (Math.random()-0.5)*4,
      vy: Math.random()*3+2,
      r: Math.random()*6+4,
      color: colors[Math.floor(Math.random()*colors.length)],
      angle: Math.random()*Math.PI*2,
      spin: (Math.random()-0.5)*0.2,
      opacity: 1,
    });
  }
  requestAnimationFrame(animateConfetti);
  setTimeout(() => {
    confettiActive = false;
    canvas.classList.remove('active');
    confettiParticles = [];
    ctx.clearRect(0,0,canvas.width,canvas.height);
  }, 2800);
}

function animateConfetti(){
  if(!confettiActive) return;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(let p of confettiParticles){
    p.x += p.vx; p.y += p.vy; p.angle += p.spin; p.opacity -= 0.008;
    if(p.opacity <= 0) p.opacity = 0;
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.angle);
    ctx.beginPath();
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.opacity;
    ctx.arc(0,0,p.r,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
  if(confettiActive) requestAnimationFrame(animateConfetti);
}

buildBoard();
startRound();
updateScoreboard();
