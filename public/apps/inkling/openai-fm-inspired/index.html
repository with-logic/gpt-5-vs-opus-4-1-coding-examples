<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenAI.fm — Sonic Intelligence</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            serif: ['"Cormorant Garamond"', 'Georgia', 'serif'],
            sans: ['"Space Grotesk"', 'system-ui', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'monospace'],
          },
          colors: {
            ink: '#0b0c10',
            charcoal: '#111318',
            slate: '#161820',
            ash: '#e6e2dc',
            pearl: '#f0eeeb',
            gold: '#c8a96e',
            goldDim: '#8a7345',
            mist: '#8893a5',
          },
        }
      }
    }
  </script>

  <style>
    html { scroll-behavior: smooth; }
    body {
      background-color: #0b0c10;
      color: #f0eeeb;
      overflow: hidden;
      font-family: 'Space Grotesk', system-ui, sans-serif;
    }

    /* Subtle grain overlay */
    .grain::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.028;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px;
    }

    /* Canvas */
    #viz-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      opacity: 0.55;
    }

    /* Glowing text */
    .glow-text {
      text-shadow: 0 0 60px rgba(200,169,110,0.12), 0 0 120px rgba(200,169,110,0.06);
    }

    /* Custom scrollbar for side content */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(200,169,110,0.2); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(200,169,110,0.35); }

    /* Progress bar */
    .track-bar {
      background: linear-gradient(90deg, rgba(200,169,110,0.15) 0%, rgba(200,169,110,0.05) 100%);
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.3);
    }
    .track-fill {
      background: linear-gradient(90deg, #c8a96e 0%, #e0cfa0 60%, #c8a96e 100%);
      box-shadow: 0 0 12px rgba(200,169,110,0.35);
    }

    /* Play button ring */
    @keyframes ringPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(200,169,110,0.3); }
      50% { box-shadow: 0 0 0 20px rgba(200,169,110,0); }
    }
    .ring-anim {
      animation: ringPulse 3s ease-in-out infinite;
    }

    /* Fade in up */
    @keyframes riseUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .anim-rise {
      animation: riseUp 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      opacity: 0;
    }
    .anim-delay-1 { animation-delay: 0.15s; }
    .anim-delay-2 { animation-delay: 0.35s; }
    .anim-delay-3 { animation-delay: 0.55s; }
    .anim-delay-4 { animation-delay: 0.75s; }
    .anim-delay-5 { animation-delay: 0.95s; }

    /* Spectrum bars */
    @keyframes barDance {
      0%, 100% { height: 20%; }
      20% { height: 80%; }
      40% { height: 40%; }
      60% { height: 95%; }
      80% { height: 55%; }
    }
    .spectrum-bar {
      animation: barDance 2.5s ease-in-out infinite;
      background: linear-gradient(to top, #c8a96e 0%, #e8d9a8 100%);
      border-radius: 2px;
    }
  </style>
</head>

<body class="grain min-h-screen flex flex-col items-center justify-center relative">

  <!-- Three.js Canvas -->
  <canvas id="viz-canvas"></canvas>

  <!-- Main Content -->
  <main class="relative z-10 w-full max-w-5xl px-8 flex flex-col items-center text-center">

    <!-- Header -->
    <header class="w-full flex justify-between items-start mb-16 pt-6 anim-rise">
      <div class="text-left">
        <h2 class="font-mono text-[0.65rem] tracking-[0.35em] uppercase text-mist/50">OpenAI.fm</h2>
        <p class="font-sans text-[0.7rem] text-mist/30 mt-1">Sonic Intelligence</p>
      </div>
      <div class="text-right">
        <span class="inline-block w-1.5 h-1.5 rounded-full bg-gold animate-pulse"></span>
        <span class="font-mono text-[0.65rem] tracking-[0.2em] text-ash/40 ml-2">LIVE</span>
      </div>
    </header>

    <!-- Title -->
    <section class="mb-12 anim-rise anim-delay-1">
      <h1 class="font-serif text-5xl md:text-7xl lg:text-8xl font-light tracking-tight text-pearl glow-text leading-[0.92] italic">
        Resonance
      </h1>
      <p class="font-sans text-sm md:text-base text-mist/60 mt-6 tracking-wide font-light">
        A generative audio experience guided by artificial intelligence.
      </p>
    </section>

    <!-- Visualizer / Waveform -->
    <section class="w-full max-w-2xl mb-14 anim-rise anim-delay-2 flex items-end justify-between gap-1.5 h-24" id="spectrum">
      <!-- Generated by JS -->
    </section>

    <!-- Player Card -->
    <section class="anim-rise anim-delay-3 bg-slate/40 backdrop-blur-xl border border-white/[0.06] rounded-3xl px-10 py-8 md:px-14 md:py-10 shadow-2xl shadow-black/40 w-full max-w-lg relative overflow-hidden group">
      <!-- Subtle radial glow behind card -->
      <div class="absolute -inset-20 bg-gradient-radial from-gold/10 via-transparent to-transparent pointer-events-none"></div>

      <!-- Track info -->
      <div class="relative z-10 mb-8">
        <p class="font-mono text-[0.6rem] tracking-[0.3em] text-goldDim uppercase mb-2">Now Playing</p>
        <h3 class="font-serif text-2xl md:text-3xl text-pearl font-light tracking-tight" id="track-title">Emergent Harmonics</h3>
        <p class="font-sans text-sm text-mist/50 mt-2 font-light">Generated in real-time • Neural synthesis</p>
      </div>

      <!-- Progress -->
      <div class="relative z-10 mb-8">
        <div class="track-bar w-full h-[2px] rounded-full overflow-hidden relative cursor-pointer group/bar" onclick="seek(event, this)">
          <div id="track-fill" class="track-fill h-full rounded-full" style="width: 0%;"></div>
        </div>
        <div class="flex justify-between mt-2.5 font-mono text-[0.6rem] text-mist/30 tracking-wider">
          <span id="current-time">00:00</span>
          <span id="total-time">04:32</span>
        </div>
      </div>

      <!-- Controls -->
      <div class="relative z-10 flex items-center justify-center gap-6 md:gap-8">
        <button onclick="prevTrack()" aria-label="Previous" class="text-mist/40 hover:text-ash transition-colors duration-300 hover:scale-110">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>

        <button onclick="togglePlay()" id="play-btn" aria-label="Play" class="relative w-16 h-16 md:w-[72px] md:h-[72px] rounded-full bg-gradient-to-br from-gold/90 to-goldDim flex items-center justify-center shadow-[0_0_40px_rgba(200,169,110,0.25)] hover:shadow-[0_0_60px_rgba(200,169,110,0.35)] transition-all duration-300 hover:scale-[1.06] ring-anim group-hover:shadow-[0_0_60px_rgba(200,169,110,0.3)] active:scale-[0.98]">
          <svg id="play-icon" width="28" height="28" viewBox="0 0 24 24" fill="currentColor" class="text-ink ml-1"><polygon points="5,3 19,12 5,21"/></svg>
          <svg id="pause-icon" width="28" height="28" viewBox="0 0 24 24" fill="currentColor" class="text-ink hidden"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>
        </button>

        <button onclick="nextTrack()" aria-label="Next" class="text-mist/40 hover:text-ash transition-colors duration-300 hover:scale-110">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
        </button>
      </div>
    </section>

    <!-- Track List -->
    <section class="w-full max-w-2xl mt-12 anim-rise anim-delay-4">
      <div class="border-t border-white/[0.05] pt-6">
        <h4 class="font-mono text-[0.6rem] tracking-[0.3em] text-mist/30 uppercase text-left mb-4">Library</h4>
        <div class="space-y-0" id="track-list">
          <!-- Generated by JS -->
        </div>
      </div>
    </section>

    <!-- Footer -->
    <footer class="mt-20 mb-6 anim-rise anim-delay-5 flex flex-col items-center gap-2">
      <div class="w-8 h-[1px] bg-gradient-to-r from-transparent via-gold/30 to-transparent"></div>
      <p class="font-mono text-[0.6rem] text-mist/20 tracking-[0.2em]">OpenAI.fm · 2026</p>
    </footer>
  </main>

  <script>
    // ===== STATE =====
    let isPlaying = false;
    let progress = 0;
    let progressInterval = null;
    const duration = 272; // seconds (4:32)

    const tracks = [
      { title: "Emergent Harmonics", desc: "Generative chord clusters driven by latent diffusion", length: "04:32" },
      { title: "Neural Drift", desc: "Ambient textures trained on oceanic field recordings", length: "03:58" },
      { title: "Resonance Fields", desc: "Spatial audio mapping of electromagnetic spectra", length: "05:14" },
      { title: "Synthetic Dawn", desc: "Granular synthesis from solar wind data", length: "04:05" },
      { title: "Quantum Echo", desc: "Stochastic rhythms from particle collision patterns", length: "03:47" },
    ];
    let currentIndex = 0;

    // ===== THREE.JS VISUALIZATION =====
    const canvas = document.getElementById('viz-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0, 12);

    // Create particle system
    const particleCount = 1800;
    const positions = new Float32Array(particleCount * 3);
    const colors = new Float32Array(particleCount * 3);
    const colorA = new THREE.Color('#c8a96e');
    const colorB = new THREE.Color('#8893a5');

    for (let i = 0; i < particleCount; i++) {
      positions[i * 3 + 0] = (Math.random() - 0.5) * 18;
      positions[i * 3 + 1] = (Math.random() - 0.5) * 14;
      positions[i * 3 + 2] = (Math.random() - 0.5) * 10;
      const mix = Math.random();
      colors[i * 3 + 0] = colorA.r * mix + colorB.r * (1 - mix);
      colors[i * 3 + 1] = colorA.g * mix + colorB.g * (1 - mix);
      colors[i * 3 + 2] = colorA.b * mix + colorB.b * (1 - mix);
    }

    const geometry = new THREE.BufferGeometry();
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

    const material = new THREE.PointsMaterial({
      size: 0.08,
      sizeAttenuation: true,
      vertexColors: true,
      transparent: true,
      opacity: 0.7,
      depthWrite: false,
    });

    const points = new THREE.Points(geometry, material);
    scene.add(points);

    // Additional fog sphere for ambient glow
    const fogGeo = new THREE.SphereGeometry(6, 32, 32);
    const fogMat = new THREE.MeshBasicMaterial({
      color: 0xc8a96e,
      transparent: true,
      opacity: 0.04,
    });
    const fogSphere = new THREE.Mesh(fogGeo, fogMat);
    scene.add(fogSphere);

    // Animation variables
    let time = 0;

    function animate() {
      requestAnimationFrame(animate);
      time += 0.003 * (isPlaying ? 1.8 : 0.6);

      // Rotate points slowly
      points.rotation.y = time * 0.15;
      points.rotation.x = Math.sin(time * 0.08) * 0.05;

      // Pulse positions with audio intensity
      const posArray = points.geometry.attributes.position.array;
      for (let i = 0; i < particleCount; i++) {
        const ix = i * 3;
        const baseY = Math.sin(i * 0.03 + time * 3) * 0.3;
        posArray[ix + 1] += Math.sin(i * 0.1 + time * 4) * 0.002 * (isPlaying ? 1.5 : 0.3);
        posArray[ix] += Math.sin(i * 0.07 + time * 2) * 0.0015 * (isPlaying ? 1.5 : 0.3);
      }
      points.geometry.attributes.position.needsUpdate = true;

      fogSphere.rotation.y = time * 0.08;
      fogSphere.scale.setScalar(1 + Math.sin(time * 2) * 0.05);

      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ===== SPECTRUM BARS =====
    const spectrum = document.getElementById('spectrum');
    const barCount = 32;
    for (let i = 0; i < barCount; i++) {
      const bar = document.createElement('div');
      bar.className = 'spectrum-bar flex-1 mx-[1px] rounded-full';
      bar.style.animationDelay = `${i * 0.08}s`;
      bar.style.animationDuration = `${1.5 + Math.random() * 1.5}s`;
      spectrum.appendChild(bar);
    }

    // ===== TRACK LIST =====
    const trackListEl = document.getElementById('track-list');
    tracks.forEach((track, idx) => {
      const row = document.createElement('button');
      row.className = `w-full text-left px-4 py-3.5 rounded-xl transition-all duration-300 flex items-center justify-between group/item hover:bg-white/[0.03] ${currentIndex === idx ? 'bg-white/[0.04]' : ''}`;
      row.onclick = () => selectTrack(idx);
      row.innerHTML = `
        <div class="flex items-center gap-4">
          <span class="font-mono text-[0.6rem] text-mist/20 w-5 text-right tabular-nums">${String(idx + 1).padStart(2, '0')}</span>
          <div>
            <h5 class="font-sans text-[0.95rem] text-ash font-light tracking-tight group-hover/item:text-pearl transition-colors">${track.title}</h5>
            <p class="font-sans text-[0.7rem] text-mist/30 font-light">${track.desc}</p>
          </div>
        </div>
        <span class="font-mono text-[0.6rem] text-mist/20 tracking-wider">${track.length}</span>
      `;
      trackListEl.appendChild(row);
    });

    // ===== FUNCTIONS =====
    function selectTrack(idx) {
      currentIndex = idx;
      document.getElementById('track-title').textContent = tracks[idx].title;
      progress = 0;
      document.getElementById('track-fill').style.width = '0%';
      document.getElementById('current-time').textContent = '00:00';
      updateTrackListUI();
      if (!isPlaying) {
        togglePlay();
      }
    }

    function nextTrack() {
      currentIndex = (currentIndex + 1) % tracks.length;
      document.getElementById('track-title').textContent = tracks[currentIndex].title;
      progress = 0;
      document.getElementById('track-fill').style.width = '0%';
      document.getElementById('current-time').textContent = '00:00';
      updateTrackListUI();
    }

    function prevTrack() {
      currentIndex = (currentIndex - 1 + tracks.length) % tracks.length;
      document.getElementById('track-title').textContent = tracks[currentIndex].title;
      progress = 0;
      document.getElementById('track-fill').style.width = '0%';
      document.getElementById('current-time').textContent = '00:00';
      updateTrackListUI();
    }

    function updateTrackListUI() {
      const rows = trackListEl.querySelectorAll('button');
      rows.forEach((row, idx) => {
        if (idx === currentIndex) {
          row.classList.add('bg-white/[0.04]');
        } else {
          row.classList.remove('bg-white/[0.04]');
        }
      });
    }

    function togglePlay() {
      isPlaying = !isPlaying;
      const playBtn = document.getElementById('play-btn');
      const playIcon = document.getElementById('play-icon');
      const pauseIcon = document.getElementById('pause-icon');

      if (isPlaying) {
        playIcon.classList.add('hidden');
        pauseIcon.classList.remove('hidden');
        playBtn.classList.add('shadow-[0_0_60px_rgba(200,169,110,0.35)]');
        progressInterval = setInterval(() => {
          progress += 1;
          if (progress >= duration) {
            progress = 0;
            nextTrack();
          }
          document.getElementById('track-fill').style.width = `${(progress / duration) * 100}%`;
          document.getElementById('current-time').textContent = formatTime(progress);
        }, 1000);
      } else {
        playIcon.classList.remove('hidden');
        pauseIcon.classList.add('hidden');
        playBtn.classList.remove('shadow-[0_0_60px_rgba(200,169,110,0.35)]');
        clearInterval(progressInterval);
      }
    }

    function seek(event, bar) {
      const rect = bar.getBoundingClientRect();
      const x = event.clientX - rect.left;
      const ratio = Math.max(0, Math.min(1, x / rect.width));
      progress = Math.floor(ratio * duration);
      document.getElementById('track-fill').style.width = `${ratio * 100}%`;
      document.getElementById('current-time').textContent = formatTime(progress);
    }

    function formatTime(sec) {
      const mins = Math.floor(sec / 60);
      const secs = sec % 60;
      return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
    }

  </script>
</body>
</html>
