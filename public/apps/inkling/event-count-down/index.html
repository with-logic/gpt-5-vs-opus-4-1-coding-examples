<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Event Countdown</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300;1,600&family=Outfit:wght@200;300;500;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            serif: ['"Cormorant Garamond"', 'Georgia', 'serif'],
            display: ['"Outfit"', 'system-ui', 'sans-serif'],
            mono: ['"Space Mono"', 'monospace'],
          },
          colors: {
            ink: '#0a0a0f',
            parchment: '#f7f4f0',
            gold: '#c5a065',
            goldDeep: '#9a7448',
          },
        },
      },
    }
  </script>
  <style>
    html { scroll-behavior: smooth; }
    body {
      background-color: #0a0a0f;
      color: #f7f4f0;
      overflow-x: hidden;
    }
    ::selection { background: rgba(197,160,101,0.25); color: #fff; }

    /* Animated grain overlay */
    .grain::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px 256px;
    }

    /* Soft radial glow behind content */
    .glow-radial {
      background: radial-gradient(circle at 50% 30%, rgba(197,160,101,0.12) 0%, transparent 70%);
    }

    /* Countdown digit card */
    .digit-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.01) 100%);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
      transition: transform 0.15s ease-out;
    }

    /* Flip/scale on tick */
    @keyframes tickPulse {
      0% { transform: scale(1); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05); }
      40% { transform: scale(1.04); box-shadow: 0 35px 60px -12px rgba(197,160,101,0.25), inset 0 1px 0 rgba(255,255,255,0.1); }
      100% { transform: scale(1); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05); }
    }
    .pulse-on-tick { animation: tickPulse 0.6s ease-out; }

    /* Parallax layers */
    .parallax-layer {
      position: absolute;
      inset: -10%;
      will-change: transform;
      pointer-events: none;
    }
    .parallax-layer img,
    .parallax-layer .bg-img {
      width: 100%; height: 100%; object-fit: cover;
    }

    /* Input glow focus */
    .glow-input:focus-within {
      box-shadow: 0 0 0 2px rgba(197,160,101,0.3), 0 0 30px rgba(197,160,101,0.15);
      border-color: rgba(197,160,101,0.5);
    }

    /* Save button hover shimmer */
    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    .btn-shimmer {
      background-size: 200% auto;
      background-image: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
      animation: shimmer 2s linear infinite;
    }
  </style>
</head>
<body class="grain min-h-screen relative">

  <!-- Background image upload preview layer -->
  <div id="bgContainer" class="fixed inset-0 z-0 overflow-hidden">
    <div id="parallaxWrap" class="parallax-layer">
      <img id="bgImage" src="" alt="" class="bg-img opacity-30 scale-110" style="filter: blur(2px) saturate(0.6);" />
      <div class="absolute inset-0 bg-gradient-to-b from-ink/70 via-ink/40 to-ink/90"></div>
      <div class="absolute inset-0 bg-[radial-gradient(circle_at_50%_40%,rgba(197,160,101,0.1),transparent_70%)]"></div>
    </div>
  </div>

  <!-- Main content -->
  <main class="relative z-10 max-w-6xl mx-auto px-6 py-16 md:py-24 flex flex-col gap-16 md:gap-28">

    <!-- Header / Inputs -->
    <section class="text-center space-y-8 md:space-y-10">
      <div class="space-y-3">
        <p class="font-mono text-xs md:text-sm tracking-[0.35em] text-gold/80 uppercase">Live Countdown</p>
        <h1 class="font-display text-5xl md:text-8xl font-extrabold tracking-tight leading-[0.9] text-parchment drop-shadow-2xl">
          <span class="italic font-serif font-light text-4xl md:text-6xl text-gold">the</span><br />
          <span id="eventTitle" class="bg-gradient-to-b from-parchment via-parchment to-parchment/70 bg-clip-text text-transparent">Countdown</span>
        </h1>
      </div>

      <div class="max-w-xl mx-auto bg-white/[0.03] border border-white/[0.08] rounded-3xl p-6 md:p-8 backdrop-blur-md shadow-2xl">
        <form id="eventForm" class="space-y-5 text-left" onsubmit="event.preventDefault(); updateCountdown();">
          <div class="grid md:grid-cols-2 gap-5">
            <label class="glow-input flex flex-col gap-2 rounded-2xl border border-white/[0.06] bg-white/[0.02] px-4 py-3 transition-all">
              <span class="font-mono text-[10px] uppercase tracking-widest text-parchment/50">Event Name</span>
              <input id="eventName" type="text" value="Midnight Gala" class="bg-transparent outline-none font-display text-lg text-parchment placeholder:text-parchment/20" placeholder="Name your event" required />
            </label>
            <label class="glow-input flex flex-col gap-2 rounded-2xl border border-white/[0.06] bg-white/[0.02] px-4 py-3 transition-all">
              <span class="font-mono text-[10px] uppercase tracking-widest text-parchment/50">Location</span>
              <input id="eventLocation" type="text" value="Tokyo, Japan" class="bg-transparent outline-none font-display text-lg text-parchment placeholder:text-parchment/20" placeholder="Where" />
            </label>
          </div>
          <label class="glow-input flex flex-col gap-2 rounded-2xl border border-white/[0.06] bg-white/[0.02] px-4 py-3 transition-all">
            <span class="font-mono text-[10px] uppercase tracking-widest text-parchment/50">Date & Time</span>
            <input id="eventDate" type="datetime-local" class="bg-transparent outline-none font-display text-lg text-parchment" required />
          </label>
          <label class="glow-input flex flex-col gap-2 rounded-2xl border border-white/[0.06] bg-white/[0.02] px-4 py-3 transition-all">
            <span class="font-mono text-[10px] uppercase tracking-widest text-parchment/50">Background Image</span>
            <input id="bgUpload" type="file" accept="image/*" class="bg-transparent outline-none font-display text-sm text-parchment file:mr-3 file:rounded-full file:border-0 file:bg-gold/20 file:text-gold file:px-4 file:py-1 file:text-xs file:font-mono file:tracking-wider hover:file:bg-gold/30 transition-colors cursor-pointer" />
          </label>
          <div class="flex items-center justify-between pt-2">
            <span id="locationDisplay" class="font-serif italic text-parchment/60 text-base md:text-lg">Tokyo, Japan</span>
            <button type="submit" class="relative overflow-hidden rounded-full bg-gradient-to-r from-gold to-goldDeep px-6 py-3 font-display font-bold text-ink shadow-[0_0_30px_rgba(197,160,101,0.4)] hover:shadow-[0_0_40px_rgba(197,160,101,0.6)] hover:-translate-y-0.5 transition-all btn-shimmer">Update Event</button>
          </div>
        </form>
      </div>
    </section>

    <!-- Countdown -->
    <section class="glow-radial rounded-[3rem] px-6 md:px-12 py-14 md:py-20 flex flex-col items-center gap-8 md:gap-12">
      <div class="flex items-center gap-3 md:gap-4">
        <span class="h-px w-12 md:w-20 bg-gradient-to-r from-transparent via-gold/40 to-transparent"></span>
        <h2 class="font-display text-2xl md:text-4xl font-extrabold tracking-tight text-parchment/90">Until It Begins</h2>
        <span class="h-px w-12 md:w-20 bg-gradient-to-r from-transparent via-gold/40 to-transparent"></span>
      </div>

      <div id="countdown" class="flex flex-wrap justify-center gap-4 md:gap-6 lg:gap-8">
        <!-- Days -->
        <div class="flex flex-col items-center gap-3 md:gap-4">
          <div class="digit-card relative w-20 h-28 md:w-28 md:h-36 rounded-3xl flex items-center justify-center overflow-hidden" aria-label="Days">
            <span id="days" class="font-display text-5xl md:text-7xl font-extrabold text-parchment tabular-nums leading-none tracking-tighter">00</span>
            <div class="absolute bottom-3 md:bottom-4 font-mono text-[10px] md:text-xs uppercase tracking-[0.2em] text-parchment/40">Days</div>
          </div>
        </div>
        <span class="self-center text-parchment/10 text-4xl md:text-6xl font-extralight leading-none -mt-4 md:-mt-6">:</span>
        <!-- Hours -->
        <div class="flex flex-col items-center gap-3 md:gap-4">
          <div class="digit-card relative w-20 h-28 md:w-28 md:h-36 rounded-3xl flex items-center justify-center overflow-hidden" aria-label="Hours">
            <span id="hours" class="font-display text-5xl md:text-7xl font-extrabold text-parchment tabular-nums leading-none tracking-tighter">00</span>
            <div class="absolute bottom-3 md:bottom-4 font-mono text-[10px] md:text-xs uppercase tracking-[0.2em] text-parchment/40">Hours</div>
          </div>
        </div>
        <span class="self-center text-parchment/10 text-4xl md:text-6xl font-extralight leading-none -mt-4 md:-mt-6">:</span>
        <!-- Minutes -->
        <div class="flex flex-col items-center gap-3 md:gap-4">
          <div class="digit-card relative w-20 h-28 md:w-28 md:h-36 rounded-3xl flex items-center justify-center overflow-hidden" aria-label="Minutes">
            <span id="minutes" class="font-display text-5xl md:text-7xl font-extrabold text-parchment tabular-nums leading-none tracking-tighter">00</span>
            <div class="absolute bottom-3 md:bottom-4 font-mono text-[10px] md:text-xs uppercase tracking-[0.2em] text-parchment/40">Minutes</div>
          </div>
        </div>
        <span class="self-center text-parchment/10 text-4xl md:text-6xl font-extralight leading-none -mt-4 md:-mt-6">:</span>
        <!-- Seconds -->
        <div class="flex flex-col items-center gap-3 md:gap-4">
          <div class="digit-card relative w-20 h-28 md:w-28 md:h-36 rounded-3xl flex items-center justify-center overflow-hidden" aria-label="Seconds">
            <span id="seconds" class="font-display text-5xl md:text-7xl font-extrabold text-parchment tabular-nums leading-none tracking-tighter">00</span>
            <div class="absolute bottom-3 md:bottom-4 font-mono text-[10px] md:text-xs uppercase tracking-[0.2em] text-parchment/40">Seconds</div>
          </div>
        </div>
      </div>

      <!-- Save to Calendar -->
      <a id="calendarBtn" href="#" download="event.ics" class="group relative overflow-hidden rounded-full border border-gold/30 bg-gradient-to-b from-white/[0.06] to-transparent px-8 py-4 font-display font-bold text-parchment tracking-wide shadow-[0_0_40px_rgba(197,160,101,0.15)] hover:shadow-[0_0_60px_rgba(197,160,101,0.35)] hover:-translate-y-0.5 transition-all flex items-center gap-3">
        <span class="btn-shimmer absolute inset-0 pointer-events-none"></span>
        <span class="relative z-10">Save to Calendar</span>
        <svg class="relative z-10 w-5 h-5 text-gold group-hover:translate-y-0.5 transition-transform" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
      </a>
    </section>

    <!-- Footer -->
    <footer class="text-center space-y-2">
      <p class="font-serif italic text-parchment/30 text-lg">Every second is a promise.</p>
      <p class="font-mono text-[10px] text-parchment/20 tracking-[0.3em] uppercase">Built with intention</p>
    </footer>
  </main>

  <script>
    // --- State ---
    let targetDate = new Date();
    targetDate.setDate(targetDate.getDate() + 7);
    targetDate.setHours(20, 0, 0, 0);

    const inputs = {
      name: document.getElementById('eventName'),
      date: document.getElementById('eventDate'),
      location: document.getElementById('eventLocation'),
      bgUpload: document.getElementById('bgUpload'),
      bgImage: document.getElementById('bgImage'),
      title: document.getElementById('eventTitle'),
      locationDisplay: document.getElementById('locationDisplay'),
      form: document.getElementById('eventForm'),
    };

    // Initialize datetime input
    const toLocalISO = (d) => {
      const tz = d.getTimezoneOffset() * 60000;
      return new Date(d - tz).toISOString().slice(0, 16);
    };
    inputs.date.value = toLocalISO(targetDate);

    // --- Background image upload ---
    inputs.bgUpload.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        inputs.bgImage.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    });

    // --- Form update ---
    function updateCountdown() {
      const nameVal = inputs.name.value.trim() || 'Countdown';
      const locVal = inputs.location.value.trim() || '';
      const dateVal = inputs.date.value;

      inputs.title.textContent = nameVal || 'Countdown';
      inputs.locationDisplay.textContent = locVal;

      if (dateVal) {
        targetDate = new Date(dateVal);
      }

      // Regenerate calendar link
      generateCalendarLink();
    }

    // --- Countdown logic ---
    const el = {
      days: document.getElementById('days'),
      hours: document.getElementById('hours'),
      minutes: document.getElementById('minutes'),
      seconds: document.getElementById('seconds'),
    };

    function tick() {
      const now = new Date();
      const diff = Math.max(0, targetDate - now);

      const d = Math.floor(diff / 1000 / 60 / 60 / 24);
      const h = Math.floor((diff / 1000 / 60 / 60) % 24);
      const m = Math.floor((diff / 1000 / 60) % 60);
      const s = Math.floor((diff / 1000) % 60);

      const fmt = (n) => String(n).padStart(2, '0');
      el.days.textContent = fmt(d);
      el.hours.textContent = fmt(h);
      el.minutes.textContent = fmt(m);
      el.seconds.textContent = fmt(s);

      // Add pulse to seconds card on every change
      const secCard = el.seconds.closest('.digit-card');
      secCard.classList.remove('pulse-on-tick');
      void secCard.offsetWidth; // force reflow
      secCard.classList.add('pulse-on-tick');
      setTimeout(() => secCard.classList.remove('pulse-on-tick'), 600);
    }

    // --- Calendar .ics generation ---
    function generateCalendarLink() {
      const btn = document.getElementById('calendarBtn');
      const start = targetDate.toISOString().replace(/[-:]/g, '').split('.')[0] + 'Z';
      const end = new Date(targetDate.getTime() + 2 * 60 * 60 * 1000).toISOString().replace(/[-:]/g, '').split('.')[0] + 'Z';
      const name = inputs.name.value.trim() || 'Event';
      const loc = inputs.location.value.trim() || '';

      const ics = `BEGIN:VCALENDAR
VERSION:2.0
PRODID:-//Event Countdown//EN
BEGIN:VEVENT
UID:${Date.now()}@countdown
DTSTAMP:${start}
DTSTART:${start}
DTEND:${end}
SUMMARY:${name}
LOCATION:${loc}
DESCRIPTION:Live countdown event.
END:VEVENT
END:VCALENDAR`;

      const blob = new Blob([ics], { type: 'text/calendar' });
      btn.href = URL.createObjectURL(blob);
      btn.download = `${name.replace(/\s+/g, '_')}.ics`;
    }

    // --- Parallax effect ---
    document.addEventListener('mousemove', (e) => {
      const cx = e.clientX / window.innerWidth - 0.5;
      const cy = e.clientY / window.innerHeight - 0.5;
      document.getElementById('parallaxWrap').style.transform = `translate(${cx * -20}px, ${cy * -20}px) scale(1.1)`;
    });

    // --- Initialize ---
    updateCountdown();
    tick();
    setInterval(tick, 1000);
    generateCalendarLink();
    inputs.form.addEventListener('submit', (e) => { e.preventDefault(); updateCountdown(); });
    inputs.name.addEventListener('input', () => { inputs.title.textContent = inputs.name.value || 'Countdown'; generateCalendarLink(); });
    inputs.location.addEventListener('input', () => { inputs.locationDisplay.textContent = inputs.location.value; generateCalendarLink(); });
  </script>
</body>
</html>
