<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Festival Lights Show</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;500;700&display=swap" rel="stylesheet" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;500;700&display=swap');
    :root {
      --glow: 0 0 20px rgba(255,255,255,0.15);
    }
    body {
      background: radial-gradient(circle at 50% 40%, #0a0a18 0%, #02020a 100%);
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      color: #fff;
    }
    h1, h2, h3, .brand {
      font-family: 'Orbitron', sans-serif;
      letter-spacing: 0.08em;
    }
    .glass {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(18px) saturate(140%);
      -webkit-backdrop-filter: blur(18px) saturate(140%);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 25px 50px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
    }
    .glass-strong {
      background: rgba(255,255,255,0.10);
      backdrop-filter: blur(22px) saturate(160%);
      -webkit-backdrop-filter: blur(22px) saturate(160%);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 30px 60px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.08);
    }
    .btn {
      transition: all 0.25s ease;
      box-shadow: 0 4px 15px rgba(0,0,0,0.4);
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(255,255,255,0.15);
    }
    .btn.active {
      box-shadow: 0 0 0 2px rgba(255,255,255,0.4), 0 8px 25px rgba(255,255,255,0.25);
      background: linear-gradient(135deg, rgba(255,255,255,0.2), rgba(255,255,255,0.05));
    }
    .slider {
      -webkit-appearance: none;
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(90deg, rgba(255,255,255,0.15), rgba(255,255,255,0.4));
      outline: none;
    }
    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: linear-gradient(135deg, #fff, #ddd);
      cursor: pointer;
      box-shadow: 0 0 10px rgba(255,255,255,0.6);
      border: none;
    }
    @keyframes breathe {
      0%, 100% { opacity: 0.9; }
      50% { opacity: 1; }
    }
    @keyframes pulse-glow {
      0%, 100% { text-shadow: 0 0 20px rgba(255,255,255,0.3), 0 0 40px rgba(255,255,255,0.1); }
      50% { text-shadow: 0 0 30px rgba(255,255,255,0.5), 0 0 60px rgba(255,255,255,0.2); }
    }
    .title-glow {
      animation: pulse-glow 4s ease-in-out infinite, breathe 3s ease-in-out infinite;
    }
    .visualizer-bar {
      transition: height 0.05s ease-out;
      border-radius: 2px 2px 4px 4px;
    }
    .pattern-card.active {
      border-color: rgba(255,255,255,0.4);
      background: rgba(255,255,255,0.12);
    }
    .theme-dot.active {
      box-shadow: 0 0 0 3px rgba(255,255,255,0.4), 0 0 15px currentColor;
    }
  </style>
</head>
<body class="h-screen w-screen flex items-center justify-center relative">

  <!-- Canvas -->
  <canvas id="showCanvas" class="absolute inset-0 z-0 w-full h-full block"></canvas>

  <!-- Header -->
  <header class="absolute top-0 left-0 right-0 z-20 flex items-center justify-between px-8 py-6 pointer-events-none">
    <div class="pointer-events-auto">
      <h1 class="text-3xl md:text-5xl font-black tracking-widest text-white drop-shadow-2xl title-glow">
        FESTIVAL <span class="text-transparent bg-clip-text bg-gradient-to-r from-fuchsia-400 via-cyan-300 to-amber-300">LIGHTS</span>
      </h1>
      <p class="text-xs md:text-sm text-white/60 tracking-[0.3em] mt-1 uppercase font-medium">Interactive Light Show</p>
    </div>
    <div class="glass-strong rounded-2xl px-6 py-3 flex items-center gap-4 pointer-events-auto shadow-2xl">
      <div class="flex gap-1.5 items-end h-6" id="visualizer">
        <span class="visualizer-bar w-1 bg-gradient-to-t from-fuchsia-500 to-cyan-300" style="height: 12%"></span>
        <span class="visualizer-bar w-1 bg-gradient-to-t from-amber-400 to-rose-400" style="height: 35%"></span>
        <span class="visualizer-bar w-1 bg-gradient-to-t from-cyan-400 to-violet-400" style="height: 22%"></span>
        <span class="visualizer-bar w-1 bg-gradient-to-t from-rose-400 to-amber-400" style="height: 45%"></span>
        <span class="visualizer-bar w-1 bg-gradient-to-t from-violet-400 to-fuchsia-500" style="height: 30%"></span>
        <span class="visualizer-bar w-1 bg-gradient-to-t from-amber-300 to-cyan-300" style="height: 18%"></span>
        <span class="visualizer-bar w-1 bg-gradient-to-t from-fuchsia-400 to-rose-300" style="height: 55%"></span>
      </div>
      <div class="text-xs text-white/70 font-semibold tracking-wide">
        <span id="beatLabel">SYNC</span>
        <span id="bpmDisplay" class="block text-lg font-black text-white">128 BPM</span>
      </div>
    </div>
  </header>

  <!-- Main Control Panel -->
  <main class="absolute bottom-8 left-1/2 -translate-x-1/2 z-20 w-[92%] max-w-5xl">
    <div class="glass rounded-3xl p-6 md:p-8 shadow-2xl">
      <div class="flex flex-col lg:flex-row gap-8">
        
        <!-- Left: Patterns -->
        <section class="flex-1 min-w-0">
          <h2 class="text-xs uppercase tracking-[0.25em] text-white/40 mb-4 font-bold">Pattern</h2>
          <div class="grid grid-cols-2 md:grid-cols-4 gap-3" id="patternGrid">
            <button onclick="setPattern('waves')" class="pattern-card active glass rounded-xl p-4 text-left hover:bg-white/10 transition border border-transparent" aria-label="Waves pattern">
              <div class="w-8 h-8 rounded-full bg-gradient-to-br from-cyan-400 to-blue-600 mb-3 shadow-lg shadow-cyan-500/30"></div>
              <h3 class="text-sm font-bold text-white">Waves</h3>
              <p class="text-[11px] text-white/50 mt-0.5">Flowing light</p>
            </button>
            <button onclick="setPattern('spiral')" class="pattern-card glass rounded-xl p-4 text-left hover:bg-white/10 transition border border-transparent" aria-label="Spiral pattern">
              <div class="w-8 h-8 rounded-full bg-gradient-to-br from-fuchsia-400 to-violet-600 mb-3 shadow-lg shadow-fuchsia-500/30"></div>
              <h3 class="text-sm font-bold text-white">Spiral</h3>
              <p class="text-[11px] text-white/50 mt-0.5">Vortex motion</p>
            </button>
            <button onclick="setPattern('pulse')" class="pattern-card glass rounded-xl p-4 text-left hover:bg-white/10 transition border border-transparent" aria-label="Pulse pattern">
              <div class="w-8 h-8 rounded-full bg-gradient-to-br from-amber-400 to-rose-600 mb-3 shadow-lg shadow-amber-500/30"></div>
              <h3 class="text-sm font-bold text-white">Pulse</h3>
              <p class="text-[11px] text-white/50 mt-0.5">Rhythmic beats</p>
            </button>
            <button onclick="setPattern('matrix')" class="pattern-card glass rounded-xl p-4 text-left hover:bg-white/10 transition border border-transparent" aria-label="Matrix pattern">
              <div class="w-8 h-8 rounded-full bg-gradient-to-br from-emerald-400 to-teal-700 mb-3 shadow-lg shadow-emerald-500/30"></div>
              <h3 class="text-sm font-bold text-white">Matrix</h3>
              <p class="text-[11px] text-white/50 mt-0.5">Digital rain</p>
            </button>
          </div>
        </section>

        <!-- Center: Themes + Sliders -->
        <section class="flex-1 min-w-0 flex flex-col gap-6">
          <div>
            <h2 class="text-xs uppercase tracking-[0.25em] text-white/40 mb-3 font-bold">Color Theme</h2>
            <div class="flex gap-3">
              <button onclick="setTheme('neon')" class="theme-dot active relative w-8 h-8 rounded-full bg-gradient-to-br from-cyan-400 via-fuchsia-500 to-amber-400 ring-2 ring-white/20 transition hover:scale-110" title="Neon" aria-label="Neon theme"></button>
              <button onclick="setTheme('sunset')" class="theme-dot relative w-8 h-8 rounded-full bg-gradient-to-br from-rose-400 via-amber-400 to-violet-500 ring-2 ring-white/20 transition hover:scale-110" title="Sunset" aria-label="Sunset theme"></button>
              <button onclick="setTheme('aurora')" class="theme-dot relative w-8 h-8 rounded-full bg-gradient-to-br from-emerald-400 via-cyan-300 to-violet-400 ring-2 ring-white/20 transition hover:scale-110" title="Aurora" aria-label="Aurora theme"></button>
              <button onclick="setTheme('cyber')" class="theme-dot relative w-8 h-8 rounded-full bg-gradient-to-br from-fuchsia-600 via-violet-700 to-rose-600 ring-2 ring-white/20 transition hover:scale-110" title="Cyberpunk" aria-label="Cyberpunk theme"></button>
            </div>
          </div>

          <div class="flex gap-4">
            <div class="flex-1">
              <label for="speedRange" class="text-[10px] uppercase tracking-wider text-white/50 font-bold mb-2 block">Speed</label>
              <input id="speedRange" type="range" min="0.2" max="3" step="0.1" value="1" class="slider w-full" oninput="setSpeed(this.value)">
            </div>
            <div class="flex-1">
              <label for="intensityRange" class="text-[10px] uppercase tracking-wider text-white/50 font-bold mb-2 block">Intensity</label>
              <input id="intensityRange" type="range" min="0.3" max="2" step="0.1" value="1" class="slider w-full" oninput="setIntensity(this.value)">
            </div>
          </div>
        </section>

        <!-- Right: Sync + Actions -->
        <section class="flex-1 min-w-0 flex flex-col gap-4">
          <div class="glass rounded-2xl p-4">
            <h2 class="text-xs uppercase tracking-[0.25em] text-white/40 mb-3 font-bold">Music Sync</h2>
            <button onclick="toggleSync()" id="syncBtn" class="btn w-full py-3 rounded-xl bg-gradient-to-r from-fuchsia-600 to-violet-600 text-white font-black tracking-widest uppercase text-sm relative overflow-hidden">
              <span class="relative z-10">Enable Sync</span>
              <span class="absolute inset-0 bg-gradient-to-r from-cyan-400/20 to-fuchsia-400/20 translate-y-full transition-transform duration-300" id="syncShine"></span>
            </button>
            <p id="syncStatus" class="text-[10px] text-white/40 mt-2 text-center">Simulated beat analysis</p>
          </div>
          <div class="glass rounded-2xl p-4">
            <h2 class="text-xs uppercase tracking-[0.25em] text-white/40 mb-3 font-bold">Quick Actions</h2>
            <div class="grid grid-cols-2 gap-2">
              <button onclick="triggerBurst()" class="btn glass rounded-lg py-3 text-xs font-bold text-white hover:bg-white/10 uppercase tracking-wide">Burst</button>
              <button onclick="randomize()" class="btn glass rounded-lg py-3 text-xs font-bold text-white hover:bg-white/10 uppercase tracking-wide">Randomize</button>
            </div>
          </div>
        </section>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="absolute bottom-3 left-0 right-0 z-10 text-center text-[10px] text-white/20 tracking-widest pointer-events-none">
    FESTIVAL LIGHTS SHOW • INTERACTIVE CANVAS • NO LIBRARIES REQUIRED
  </footer>

  <script>
    // Canvas setup
    const canvas = document.getElementById('showCanvas');
    const ctx = canvas.getContext('2d');
    let W, H, cx, cy;

    function resize() {
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width = W;
      canvas.height = H;
      cx = W / 2;
      cy = H / 2;
    }
    window.addEventListener('resize', resize);
    resize();

    // State
    let currentPattern = 'waves';
    let currentTheme = 'neon';
    let speed = 1;
    let intensity = 1;
    let syncEnabled = false;
    let time = 0;
    let particles = [];
    let beams = [];
    let matrixChars = [];
    let visualizerHeights = [];
    let burstActive = false;
    let burstTimer = 0;

    // Themes
    const themes = {
      neon: { primary: '#00f0ff', secondary: '#ff00aa', accent: '#ffee00', bgGrad: ['#0a0a18', '#02020a'] },
      sunset: { primary: '#ff5e78', secondary: '#ffb86c', accent: '#ff9a8b', bgGrad: ['#1a0a10', '#040204'] },
      aurora: { primary: '#4deeea', secondary: '#a18fff', accent: '#7bed9f', bgGrad: ['#080a14', '#020308'] },
      cyber: { primary: '#ff00aa', secondary: '#6600cc', accent: '#00ffaa', bgGrad: ['#0a0210', '#040008'] }
    };

    // Initialize particles
    function initParticles() {
      particles = [];
      const count = 300;
      for (let i = 0; i < count; i++) {
        particles.push({
          x: Math.random() * W,
          y: Math.random() * H,
          vx: (Math.random() - 0.5) * 0.8 * speed,
          vy: (Math.random() - 0.5) * 0.8 * speed,
          size: Math.random() * 2 + 0.5,
          color: getThemeColor(i),
          life: Math.random()
        });
      }
    }

    function getThemeColor(i) {
      const t = themes[currentTheme];
      const colors = [t.primary, t.secondary, t.accent];
      return colors[i % colors.length];
    }

    // Beams for patterns
    function initBeams() {
      beams = [];
      const count = 16;
      for (let i = 0; i < count; i++) {
        beams.push({
          angle: (i / count) * Math.PI * 2,
          length: 200 + Math.random() * 300,
          width: 4 + Math.random() * 8,
          phase: Math.random() * Math.PI * 2,
          color: getThemeColor(i)
        });
      }
    }

    // Matrix chars
    function initMatrix() {
      matrixChars = [];
      const cols = Math.floor(W / 20);
      for (let i = 0; i < cols; i++) {
        matrixChars.push({
          x: i * 20,
          y: Math.random() * H,
          speed: 2 + Math.random() * 4,
          char: String.fromCharCode(0x30A0 + Math.floor(Math.random() * 96)),
          color: themes[currentTheme].primary
        });
      }
    }

    // Visualizer bars
    function updateVisualizer() {
      const bars = document.querySelectorAll('.visualizer-bar');
      bars.forEach((bar, i) => {
        let h = 10 + Math.random() * 40;
        if (syncEnabled) {
          h = 10 + Math.sin(time * 0.1 + i * 1.2) * 30 + Math.random() * 30;
          h = Math.max(10, Math.min(90, h));
        } else {
          h = 10 + Math.sin(time * 0.05 + i * 0.8) * 15 + Math.sin(time * 0.2 + i) * 15;
          h = Math.max(10, Math.min(70, h));
        }
        bar.style.height = h + '%';
      });
    }

    // Pattern functions
    function drawWaves() {
      const t = themes[currentTheme];
      const lines = 60;
      for (let i = 0; i < lines; i++) {
        const yBase = cy + Math.sin(time * 0.02 * speed + i * 0.1) * 120 * intensity;
        const radius = 100 + i * 15 + Math.sin(time * 0.03 + i) * 80;
        ctx.beginPath();
        ctx.moveTo(cx - radius, yBase);
        ctx.quadraticCurveTo(cx, yBase - radius * 0.5, cx + radius, yBase);
        ctx.strokeStyle = i % 3 === 0 ? t.primary : i % 3 === 1 ? t.secondary : t.accent;
        ctx.lineWidth = 1 + (intensity * 2);
        ctx.shadowColor = ctx.strokeStyle;
        ctx.shadowBlur = 15;
        ctx.stroke();
        ctx.shadowBlur = 0;
      }
    }

    function drawSpiral() {
      const t = themes[currentTheme];
      const points = 120;
      for (let j = 0; j < 3; j++) {
        ctx.beginPath();
        for (let i = 0; i <= points; i++) {
          const angle = (i / points) * Math.PI * 6 + time * 0.02 * speed + j * 2.1;
          const r = 30 + i * 3 + Math.sin(time * 0.05 + j) * 40;
          const x = cx + Math.cos(angle) * r;
          const y = cy + Math.sin(angle) * r;
          if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.strokeStyle = j === 0 ? t.primary : j === 1 ? t.secondary : t.accent;
        ctx.lineWidth = 2 + intensity * 3;
        ctx.shadowColor = ctx.strokeStyle;
        ctx.shadowBlur = 20;
        ctx.stroke();
        ctx.shadowBlur = 0;
      }
    }

    function drawPulse() {
      const t = themes[currentTheme];
      const rings = 5;
      for (let i = 0; i < rings; i++) {
        const r = (time * 0.05 * speed + i * 0.5) % (Math.PI * 4);
        const radius = Math.abs(Math.sin(r)) * 300 * intensity + 50;
        ctx.beginPath();
        ctx.arc(cx, cy, radius, 0, Math.PI * 2);
        ctx.strokeStyle = i % 2 === 0 ? t.primary : i % 2 === 1 ? t.secondary : t.accent;
        ctx.lineWidth = 3 + intensity * 4;
        ctx.shadowColor = ctx.strokeStyle;
        ctx.shadowBlur = 25;
        ctx.stroke();
        ctx.shadowBlur = 0;
      }
    }

    function drawMatrix() {
      const t = themes[currentTheme];
      matrixChars.forEach((c) => {
        c.y += c.speed * speed;
        if (c.y > H) { c.y = 0; c.x = Math.random() * W; }
        ctx.font = '14px monospace';
        ctx.fillStyle = t.primary;
        ctx.shadowColor = t.primary;
        ctx.shadowBlur = 10;
        ctx.fillText(c.char, c.x, c.y);
        ctx.shadowBlur = 0;
      });
      // Falling particles
      for (let i = 0; i < 30; i++) {
        const x = Math.random() * W;
        const y = (time * 30 + i * 100) % H;
        const char = String.fromCharCode(0x30A0 + Math.floor(Math.random() * 96));
        ctx.font = '10px monospace';
        ctx.fillStyle = `rgba(0, 240, 255, ${0.3 + 0.3 * Math.sin(i)})`;
        ctx.fillText(char, x, y);
      }
    }

    // Main draw loop
    function loop() {
      time += 1;
      const t = themes[currentTheme];

      // Background gradient
      const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(W, H));
      grad.addColorStop(0, t.bgGrad[0]);
      grad.addColorStop(0.5, '#050510');
      grad.addColorStop(1, '#020208');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);

      // Dynamic beams
      beams.forEach(b => {
        b.phase += 0.02 * speed;
        const x = cx + Math.cos(b.angle + b.phase) * (W * 0.4);
        const y = cy + Math.sin(b.angle + b.phase) * (H * 0.4);
        const endX = cx + Math.cos(b.angle + b.phase) * 600 * intensity;
        const endY = cy + Math.sin(b.angle + b.phase) * 600 * intensity;
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(endX, endY);
        ctx.strokeStyle = b.color;
        ctx.lineWidth = b.width * intensity;
        ctx.shadowColor = b.color;
        ctx.shadowBlur = 30;
        ctx.stroke();
        ctx.shadowBlur = 0;
      });

      // Pattern
      ctx.save();
      if (currentPattern === 'waves') drawWaves();
      else if (currentPattern === 'spiral') drawSpiral();
      else if (currentPattern === 'pulse') drawPulse();
      else if (currentPattern === 'matrix') drawMatrix();
      ctx.restore();

      // Particles
      for (let p of particles) {
        p.x += p.vx;
        p.y += p.vy;
        p.life += 0.01;
        if (p.x < 0 || p.x > W || p.y < 0 || p.y > H) {
          p.x = cx;
          p.y = cy;
        }
        const alpha = 0.3 + 0.7 * Math.sin(p.life);
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * (1 + intensity), 0, Math.PI * 2);
        ctx.fillStyle = p.color + Math.floor(alpha * 255).toString(16).padStart(2, '0');
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 5;
        ctx.fill();
        ctx.shadowBlur = 0;
      }

      // Burst effect
      if (burstActive) {
        burstTimer++;
        const radius = (burstTimer / 2) * 20;
        const alpha = Math.max(0, 1 - burstTimer / 60);
        ctx.beginPath();
        ctx.arc(cx, cy, radius, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${alpha * 0.1})`;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(cx, cy, radius * 0.7, 0, Math.PI * 2);
        ctx.strokeStyle = themes[currentTheme].primary + Math.floor(alpha * 255).toString(16).padStart(2, '0');
        ctx.lineWidth = 10 * alpha;
        ctx.stroke();
        if (burstTimer > 60) { burstActive = false; burstTimer = 0; }
      }

      // Update visualizer
      updateVisualizer();

      // Sync effects
      if (syncEnabled && Math.random() > 0.8) {
        const bar = document.getElementById('beatLabel');
        bar.style.color = themes[currentTheme].accent;
        setTimeout(() => { bar.style.color = ''; }, 100);
      }

      requestAnimationFrame(loop);
    }

    // Controls
    function setPattern(name) {
      currentPattern = name;
      document.querySelectorAll('.pattern-card').forEach(c => c.classList.remove('active'));
      const btn = Array.from(document.querySelectorAll('.pattern-card')).find(b => b.getAttribute('onclick').includes(name));
      if (btn) btn.classList.add('active');
      if (name === 'matrix') initMatrix();
    }

    function setTheme(name) {
      currentTheme = name;
      document.querySelectorAll('.theme-dot').forEach(d => d.classList.remove('active'));
      const btn = Array.from(document.querySelectorAll('.theme-dot')).find(b => b.getAttribute('onclick').includes(name));
      if (btn) btn.classList.add('active');
      particles.forEach(p => p.color = getThemeColor(Math.floor(Math.random() * 3)));
      beams.forEach(b => b.color = getThemeColor(Math.floor(Math.random() * 3)));
    }

    function setSpeed(v) {
      speed = parseFloat(v);
    }

    function setIntensity(v) {
      intensity = parseFloat(v);
    }

    function toggleSync() {
      syncEnabled = !syncEnabled;
      const btn = document.getElementById('syncBtn');
      const shine = document.getElementById('syncShine');
      const status = document.getElementById('syncStatus');
      if (syncEnabled) {
        btn.classList.add('from-fuchsia-400', 'to-violet-400');
        btn.querySelector('span').textContent = 'Sync Active';
        status.textContent = 'Analyzing beat • 128 BPM';
        shine.style.transform = 'translateY(0)';
      } else {
        btn.classList.remove('from-fuchsia-400', 'to-violet-400');
        btn.querySelector('span').textContent = 'Enable Sync';
        status.textContent = 'Simulated beat analysis';
        shine.style.transform = 'translateY(100%)';
      }
    }

    function triggerBurst() {
      burstActive = true;
      burstTimer = 0;
    }

    function randomize() {
      const patterns = ['waves', 'spiral', 'pulse', 'matrix'];
      const themesArr = ['neon', 'sunset', 'aurora', 'cyber'];
      setPattern(patterns[Math.floor(Math.random() * patterns.length)]);
      setTheme(themesArr[Math.floor(Math.random() * themesArr.length)]);
    }

    // Initialize
    initParticles();
    initBeams();
    initMatrix();
    loop();
  </script>
</body>
</html>
