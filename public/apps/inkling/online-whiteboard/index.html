<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Online Whiteboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['"Outfit"', 'system-ui', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'monospace'],
          },
          colors: {
            ink: '#0f172a',
            surface: '#f8fafc',
            canvas: '#ffffff',
            glass: 'rgba(255,255,255,0.72)',
            glassBorder: 'rgba(255,255,255,0.35)',
            accent: '#6366f1',
            coral: '#f87171',
            mint: '#34d399',
            amber: '#fbbf24',
            violet: '#8b5cf6',
            cyan: '#22d3ee',
          },
          boxShadow: {
            'glass': '0 8px 32px 0 rgba(31, 41, 55, 0.12)',
            'soft': '0 1px 3px rgba(0,0,0,0.05), 0 10px 30px rgba(0,0,0,0.08)',
          }
        }
      }
    }
  </script>

  <style>
    html, body { height: 100%; overflow: hidden; }
    body { font-family: 'Outfit', system-ui, sans-serif; background: linear-gradient(135deg, #e0e7ff 0%, #c7d2fe 40%, #a5b4fc 100%); }
    canvas { touch-action: none; user-select: none; -webkit-user-select: none; }
    ::selection { background: #a5b4fc; color: #0f172a; }
    .glass-card {
      backdrop-filter: blur(18px) saturate(140%);
      -webkit-backdrop-filter: blur(18px) saturate(140%);
      background: rgba(255,255,255,0.68);
      border: 1px solid rgba(255,255,255,0.45);
      box-shadow: 0 8px 32px rgba(15,23,42,0.08), inset 0 1px 0 rgba(255,255,255,0.6);
    }
    .glass-card-dark {
      backdrop-filter: blur(18px) saturate(140%);
      -webkit-backdrop-filter: blur(18px) saturate(140%);
      background: rgba(15,23,42,0.78);
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    .btn-glass {
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }
    .btn-glass::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, transparent 60%);
      pointer-events: none;
    }
    .btn-glass:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(99,102,241,0.25); }
    .btn-glass.active { box-shadow: inset 0 2px 8px rgba(0,0,0,0.15), 0 0 0 2px #6366f1; }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      height: 16px; width: 16px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(99,102,241,0.4);
    }
    input[type="range"] { -webkit-appearance: none; height: 6px; border-radius: 3px; background: rgba(15,23,42,0.08); }
    .color-ring { box-shadow: 0 0 0 3px rgba(255,255,255,0.9), 0 2px 8px rgba(0,0,0,0.15); transition: transform 0.15s ease; }
    .color-ring:hover { transform: scale(1.15); }
    .color-ring.active { box-shadow: 0 0 0 3px #6366f1, 0 0 0 5px rgba(255,255,255,0.9), 0 4px 12px rgba(99,102,241,0.35); transform: scale(1.05); }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .anim-fade-up { animation: fadeUp 0.4s ease-out both; }
  </style>
</head>

<body class="h-full w-full relative text-ink antialiased">

  <!-- Background ambient blobs -->
  <div class="fixed inset-0 pointer-events-none overflow-hidden z-0">
    <div class="absolute -top-[20%] -left-[10%] w-[70vw] h-[70vw] rounded-full opacity-40 blur-[120px] bg-gradient-to-br from-indigo-300 to-violet-300"></div>
    <div class="absolute -bottom-[20%] -right-[10%] w-[70vw] h-[70vw] rounded-full opacity-30 blur-[120px] bg-gradient-to-tr from-rose-200 to-amber-200"></div>
    <div class="absolute top-[30%] left-[40%] w-[40vw] h-[40vw] rounded-full opacity-30 blur-[100px] bg-gradient-to-r from-cyan-200 to-teal-200"></div>
  </div>

  <!-- Header -->
  <header class="fixed top-0 left-0 right-0 z-50 px-6 py-4 flex items-center justify-between pointer-events-none">
    <div class="pointer-events-auto">
      <div class="glass-card rounded-2xl px-5 py-3 flex items-center gap-3 shadow-glass">
        <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-indigo-500 to-violet-500 flex items-center justify-center shadow-md shadow-indigo-200/60">
          <i class="fa-solid fa-pen-nib text-white text-sm"></i>
        </div>
        <div>
          <h1 class="font-display font-extrabold text-base leading-none tracking-tight text-ink">Online Whiteboard</h1>
          <span class="text-[10px] font-mono text-slate-400 tracking-widest uppercase">Draw freely</span>
        </div>
      </div>
    </div>

    <div class="pointer-events-auto flex items-center gap-3">
      <button onclick="clearCanvas()" class="glass-card rounded-xl px-4 py-3 text-sm font-semibold text-rose-500 hover:text-rose-600 hover:bg-rose-50/60 shadow-glass transition-colors flex items-center gap-2" title="Clear all">
        <i class="fa-solid fa-trash-can"></i>
        <span class="hidden sm:inline">Clear</span>
      </button>
      <button onclick="saveImage()" class="glass-card rounded-xl px-4 py-3 text-sm font-semibold text-indigo-600 hover:text-indigo-700 hover:bg-indigo-50/60 shadow-glass transition-colors flex items-center gap-2" title="Save as PNG">
        <i class="fa-solid fa-download"></i>
        <span class="hidden sm:inline">Save</span>
      </button>
    </div>
  </header>

  <!-- Canvas -->
  <main class="absolute inset-0 z-10 flex items-center justify-center">
    <canvas id="board" class="rounded-3xl shadow-[0_20px_60px_-15px_rgba(15,23,42,0.15)] ring-1 ring-white/60 bg-canvas"></canvas>
  </main>

  <!-- Floating Toolbar -->
  <aside id="toolbar" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-40 anim-fade-up">
    <div class="glass-card rounded-[2rem] px-2 py-3 flex items-center gap-1 shadow-glass">

      <!-- Tools -->
      <div class="flex items-center gap-1 px-1">
        <button onclick="setTool('pen')" id="btn-pen" class="btn-glass active rounded-xl p-3 text-indigo-600 hover:text-indigo-700 bg-white/40" title="Pen" aria-label="Pen">
          <i class="fa-solid fa-pen text-[18px]"></i>
        </button>
        <button onclick="setTool('highlighter')" id="btn-highlighter" class="btn-glass rounded-xl p-3 text-amber-500 hover:text-amber-600 hover:bg-amber-50/50" title="Highlighter" aria-label="Highlighter">
          <i class="fa-solid fa-highlighter text-[18px]"></i>
        </button>
        <button onclick="setTool('eraser')" id="btn-eraser" class="btn-glass rounded-xl p-3 text-rose-500 hover:text-rose-600 hover:bg-rose-50/50" title="Eraser" aria-label="Eraser">
          <i class="fa-solid fa-eraser text-[18px]"></i>
        </button>
      </div>

      <div class="w-px h-7 bg-slate-200/60 mx-1"></div>

      <!-- Size -->
      <div class="flex items-center gap-2 px-2">
        <span class="text-[10px] font-mono text-slate-400 uppercase tracking-wide">Size</span>
        <div class="w-24 flex items-center gap-1.5">
          <input type="range" id="sizeRange" min="1" max="60" value="4" oninput="updateSize(this.value)" class="w-full">
        </div>
        <span id="sizeValue" class="text-[11px] font-mono font-bold text-slate-600 w-6 text-center">4</span>
      </div>

      <div class="w-px h-7 bg-slate-200/60 mx-1"></div>

      <!-- Colors -->
      <div class="flex items-center gap-1.5 px-1.5">
        <button onclick="setColor('#0f172a')" class="color-ring active w-7 h-7 rounded-full bg-[#0f172a] border border-white/40" title="Ink" aria-label="Ink color"></button>
        <button onclick="setColor('#f87171')" class="color-ring w-7 h-7 rounded-full bg-[#f87171] border border-white/40" title="Coral" aria-label="Coral"></button>
        <button onclick="setColor('#34d399')" class="color-ring w-7 h-7 rounded-full bg-[#34d399] border border-white/40" title="Mint" aria-label="Mint"></button>
        <button onclick="setColor('#6366f1')" class="color-ring w-7 h-7 rounded-full bg-[#6366f1] border border-white/40" title="Indigo" aria-label="Indigo"></button>
        <button onclick="setColor('#fbbf24')" class="color-ring w-7 h-7 rounded-full bg-[#fbbf24] border border-white/40" title="Amber" aria-label="Amber"></button>
        <button onclick="setColor('#22d3ee')" class="color-ring w-7 h-7 rounded-full bg-[#22d3ee] border border-white/40" title="Cyan" aria-label="Cyan"></button>
        <button onclick="setColor('#8b5cf6')" class="color-ring w-7 h-7 rounded-full bg-[#8b5cf6] border border-white/40" title="Violet" aria-label="Violet"></button>
      </div>

      <div class="w-px h-7 bg-slate-200/60 mx-1"></div>

      <!-- Custom color picker hidden but functional -->
      <label class="btn-glass rounded-xl p-2.5 text-slate-500 hover:text-indigo-600 hover:bg-indigo-50/50 cursor-pointer" title="Custom color">
        <i class="fa-solid fa-palette text-[16px]"></i>
        <input type="color" id="customColor" value="#0f172a" onchange="setColor(this.value)" class="absolute opacity-0 w-0 h-0 pointer-events-none" aria-label="Custom color picker">
      </label>

    </div>
  </aside>

  <script>
    const canvas = document.getElementById('board');
    const ctx = canvas.getContext('2d');

    let drawing = false;
    let lastX = 0, lastY = 0;
    let currentTool = 'pen';
    let currentColor = '#0f172a';
    let currentSize = 4;
    let strokeHistory = [];
    let strokes = [];
    let activeStroke = null;

    // Resize canvas to fill screen with padding
    function resize() {
      const pad = 24;
      const w = window.innerWidth - pad * 2;
      const h = window.innerHeight - 180; // header + toolbar
      canvas.width = Math.max(320, w);
      canvas.height = Math.max(240, h);
      canvas.style.width = canvas.width + 'px';
      canvas.style.height = canvas.height + 'px';
      redrawAll();
    }
    window.addEventListener('resize', resize);
    resize();

    // Canvas background
    function initCanvas() {
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
    }
    initCanvas();

    function setTool(tool) {
      currentTool = tool;
      document.querySelectorAll('[id^="btn-"]').forEach(btn => btn.classList.remove('active'));
      document.getElementById('btn-' + tool).classList.add('active');
    }

    function setColor(color) {
      currentColor = color;
      document.getElementById('customColor').value = color;
      document.querySelectorAll('.color-ring').forEach(r => r.classList.remove('active'));
      // Find and activate matching ring by background color
      document.querySelectorAll('.color-ring').forEach(r => {
        const bg = r.style.backgroundColor || getComputedStyle(r).backgroundColor;
        if (bg === color || (r.style.backgroundColor === '' && r.classList.contains('bg-\\[#0f172a\\]') && color === '#0f172a')) {
          // simplistic match; skip complex CSS parsing
        }
      });
      // More robust: just highlight the closest visual ring manually
      const map = { '#0f172a':0, '#f87171':1, '#34d399':2, '#6366f1':3, '#fbbf24':4, '#22d3ee':5, '#8b5cf6':6 };
      const idx = map[color];
      if (idx !== undefined) {
        document.querySelectorAll('.color-ring').forEach((r, i) => r.classList.toggle('active', i === idx));
      } else {
        document.querySelectorAll('.color-ring').forEach(r => r.classList.remove('active'));
      }
    }

    function updateSize(val) {
      currentSize = parseInt(val);
      document.getElementById('sizeValue').textContent = currentSize;
    }

    // Drawing state

    function beginStroke(x, y) {
      drawing = true;
      lastX = x; lastY = y;
      activeStroke = {
        tool: currentTool,
        color: currentColor,
        size: currentSize,
        points: [{x, y}]
      };
    }

    function moveStroke(x, y) {
      if (!drawing || !activeStroke) return;
      activeStroke.points.push({x, y});
      lastX = x; lastY = y;
      drawLive();
    }

    function endStroke() {
      if (drawing && activeStroke) {
        strokes.push(activeStroke);
        activeStroke = null;
      }
      drawing = false;
    }

    function drawLive() {
      if (!activeStroke || activeStroke.points.length < 2) return;
      const pts = activeStroke.points;
      const p1 = pts[pts.length - 2];
      const p2 = pts[pts.length - 1];

      ctx.beginPath();
      ctx.moveTo(p1.x, p1.y);
      ctx.lineTo(p2.x, p2.y);

      if (currentTool === 'highlighter') {
        ctx.strokeStyle = activeStroke.color + '60'; // semi-transparent
        ctx.lineWidth = activeStroke.size * 2;
        ctx.globalCompositeOperation = 'multiply';
      } else if (currentTool === 'eraser') {
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = activeStroke.size * 1.5;
        ctx.globalCompositeOperation = 'destination-out';
      } else {
        ctx.strokeStyle = activeStroke.color;
        ctx.lineWidth = activeStroke.size;
        ctx.globalCompositeOperation = 'source-over';
      }
      ctx.stroke();
      ctx.globalCompositeOperation = 'source-over';
    }

    function redrawAll() {
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      strokes.forEach(s => {
        if (s.points.length < 2) return;
        ctx.beginPath();
        ctx.moveTo(s.points[0].x, s.points[0].y);
        for (let i = 1; i < s.points.length; i++) {
          ctx.lineTo(s.points[i].x, s.points[i].y);
        }
        if (s.tool === 'highlighter') {
          ctx.strokeStyle = s.color + '60';
          ctx.lineWidth = s.size * 2;
          ctx.globalCompositeOperation = 'multiply';
        } else if (s.tool === 'eraser') {
          ctx.strokeStyle = '#ffffff';
          ctx.lineWidth = s.size * 1.5;
          ctx.globalCompositeOperation = 'destination-out';
        } else {
          ctx.strokeStyle = s.color;
          ctx.lineWidth = s.size;
          ctx.globalCompositeOperation = 'source-over';
        }
        ctx.stroke();
        ctx.globalCompositeOperation = 'source-over';
      });
    }

    // Event handlers
    function getPos(e) {
      const rect = canvas.getBoundingClientRect();
      if (e.touches && e.touches.length) {
        return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
      }
      return { x: e.clientX - rect.left, y: e.clientY - rect.top };
    }

    canvas.addEventListener('mousedown', e => {
      const p = getPos(e);
      beginStroke(p.x, p.y);
    });

    canvas.addEventListener('mousemove', e => {
      if (drawing) {
        const p = getPos(e);
        moveStroke(p.x, p.y);
      }
    });

    canvas.addEventListener('mouseup', () => endStroke());
    canvas.addEventListener('mouseleave', () => endStroke());

    // Touch
    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      const p = getPos(e);
      beginStroke(p.x, p.y);
    }, { passive: false });

    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      if (drawing) {
        const p = getPos(e);
        moveStroke(p.x, p.y);
      }
    }, { passive: false });

    canvas.addEventListener('touchend', e => {
      e.preventDefault();
      endStroke();
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') { drawing = false; activeStroke = null; }
      if (e.ctrlKey && e.key === 'z') { strokes.pop(); redrawAll(); }
      if (e.ctrlKey && e.key === 's') { e.preventDefault(); saveImage(); }
    });

    function clearCanvas() {
      if (!confirm('Clear the whiteboard?')) return;
      strokes = [];
      initCanvas();
    }

    function saveImage() {
      const link = document.createElement('a');
      link.download = 'whiteboard-' + new Date().toISOString().slice(0,19).replace(/:/g,'-') + '.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }
  </script>
</body>
</html>
