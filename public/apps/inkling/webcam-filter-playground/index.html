<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Webcam Filter Playground</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Mono:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #06060a;
    --surface: rgba(255,255,255,0.04);
    --surface-2: rgba(255,255,255,0.07);
    --accent: #f0f;
    --text: #f4f4f8;
  }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    background-image:
      radial-gradient(circle at 20% 30%, rgba(255,0,255,0.08) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(0,255,255,0.08) 0%, transparent 50%),
      radial-gradient(circle at 50% 50%, rgba(255,255,0,0.03) 0%, transparent 70%);
  }
  .mono { font-family: 'Space Mono', monospace; }
  .glass {
    background: var(--surface);
    backdrop-filter: blur(24px) saturate(140%);
    -webkit-backdrop-filter: blur(24px) saturate(140%);
    border: 1px solid rgba(255,255,255,0.06);
  }
  .glass-strong {
    background: var(--surface-2);
    backdrop-filter: blur(32px) saturate(160%);
    -webkit-backdrop-filter: blur(32px) saturate(160%);
    border: 1px solid rgba(255,255,255,0.08);
  }
  .shadow-glow { box-shadow: 0 0 40px rgba(255,255,255,0.04), 0 0 0 1px rgba(255,255,255,0.06); }
  .text-gradient {
    background: linear-gradient(135deg, #fff 0%, #f0f 50%, #0ff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .btn-filter {
    transition: all 0.2s ease;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.03);
  }
  .btn-filter:hover, .btn-filter.active {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.2);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(255,255,255,0.06);
  }
  .video-wrap {
    position: relative;
    overflow: hidden;
    border-radius: 1.5rem;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.06),
      0 25px 60px rgba(0,0,0,0.6),
      inset 0 0 60px rgba(0,0,0,0.4);
  }
  .video-wrap::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 1.5rem;
    pointer-events: none;
    box-shadow: inset 0 0 80px rgba(0,0,0,0.35);
  }
  video, canvas { display: block; width: 100%; height: 100%; object-fit: cover; }
  .overlay-text {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 10;
  }
  @keyframes shimmer {
    0% { background-position: -200% center; }
    100% { background-position: 200% center; }
  }
  .shimmer {
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
    background-size: 200% auto;
    animation: shimmer 3s infinite linear;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-up { animation: fadeUp 0.5s ease-out both; }
  .snap-flash {
    position: absolute; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 50;
    animation: flash 0.25s ease-out;
  }
  @keyframes flash { 0% { opacity: 0.6; } 100% { opacity: 0; } }
  .filter-scroll::-webkit-scrollbar { height: 6px; }
  .filter-scroll::-webkit-scrollbar-track { background: transparent; }
  .filter-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
  .filter-scroll::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }
</style>
</head>
<body class="min-h-screen flex flex-col">

<header class="fixed top-0 left-0 right-0 z-40 glass shadow-glow fade-up">
  <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-fuchsia-500 via-violet-500 to-cyan-500 flex items-center justify-center shadow-lg shadow-fuchsia-500/20">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-white"><circle cx="12" cy="12" r="3"/><path d="M12 2v4m0 12v4m-8-8h4m12 0h4m-9-7l-2 2m8 8l-2 2m-8-2l2 2m8-8l-2-2"/></svg>
      </div>
      <div>
        <h1 class="text-xl font-extrabold tracking-tight leading-none text-gradient">Webcam Filter Playground</h1>
        <p class="text-[11px] text-white/40 mono tracking-wide mt-0.5">LIVE FILTER ENGINE</p>
      </div>
    </div>
    <div class="flex items-center gap-3">
      <button onclick="captureSnapshot()" class="relative overflow-hidden px-4 py-2 rounded-full glass-strong text-sm font-semibold text-white hover:text-cyan-200 transition-colors shadow-glow group">
        <span class="relative z-10 flex items-center gap-2">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="12" cy="12" r="5"/></svg>
          Snapshot
        </span>
        <span class="absolute inset-0 shimmer"></span>
      </button>
      <a id="downloadBtn" href="#" download="webcam-filter.png" class="hidden px-4 py-2 rounded-full bg-gradient-to-r from-cyan-500 to-fuchsia-600 text-white text-sm font-bold shadow-lg shadow-cyan-500/25 hover:shadow-cyan-500/40 hover:scale-[1.03] transition-all">Download</a>
    </div>
  </div>
</header>

<main class="flex-1 flex flex-col items-center justify-center px-6 pt-28 pb-8 gap-8">

  <div class="relative w-full max-w-5xl">
    <div class="video-wrap aspect-video bg-black/60 relative" id="videoWrap">
      <video id="video" autoplay playsinline muted class="absolute inset-0 w-full h-full"></video>
      <canvas id="canvas" class="absolute inset-0 w-full h-full"></canvas>
      <div class="snap-flash" id="flash"></div>
      <div class="overlay-text" id="statusOverlay">
        <div class="px-4 py-2 rounded-full glass-strong text-xs font-bold tracking-widest uppercase text-white/80">Initializing...</div>
      </div>
      <div class="absolute bottom-4 left-4 z-20">
        <div class="glass px-3 py-1.5 rounded-full flex items-center gap-2 text-xs font-bold text-white/60 mono">
          <span class="w-1.5 h-1.5 rounded-full bg-rose-400 animate-pulse"></span>
          LIVE
        </div>
      </div>
    </div>
  </div>

  <section class="w-full max-w-5xl fade-up" style="animation-delay:0.1s">
    <div class="flex items-center justify-between mb-3 px-1">
      <h2 class="text-sm font-extrabold tracking-tight text-white/80">Effects</h2>
      <span id="filterName" class="mono text-xs text-fuchsia-300 font-bold tracking-wide uppercase">Normal</span>
    </div>
    <div class="filter-scroll flex gap-2 overflow-x-auto pb-2 snap-x snap-mandatory" id="filterBar">
      <!-- Filters injected by JS -->
    </div>
  </section>

  <section class="w-full max-w-5xl grid grid-cols-2 md:grid-cols-4 gap-3 fade-up" style="animation-delay:0.2s">
    <div onclick="setFilter('normal')" class="glass rounded-2xl p-4 cursor-pointer hover:bg-white/5 transition-all hover:-translate-y-1 hover:shadow-xl shadow-glow group">
      <div class="text-2xl mb-2">✨</div>
      <h3 class="font-bold text-sm">Normal</h3>
      <p class="text-xs text-white/40 mt-1">Clean feed</p>
    </div>
    <div onclick="setFilter('glitch')" class="glass rounded-2xl p-4 cursor-pointer hover:bg-white/5 transition-all hover:-translate-y-1 hover:shadow-xl shadow-glow group">
      <div class="text-2xl mb-2">💥</div>
      <h3 class="font-bold text-sm">Data Glitch</h3>
      <p class="text-xs text-white/40 mt-1">RGB split + noise</p>
    </div>
    <div onclick="setFilter('pixel')" class="glass rounded-2xl p-4 cursor-pointer hover:bg-white/5 transition-all hover:-translate-y-1 hover:shadow-xl shadow-glow group">
      <div class="text-2xl mb-2">🟣</div>
      <h3 class="font-bold text-sm">Pixel Bloom</h3>
      <p class="text-xs text-white/40 mt-1">Large pixelation</p>
    </div>
    <div onclick="setFilter('invert')" class="glass rounded-2xl p-4 cursor-pointer hover:bg-white/5 transition-all hover:-translate-y-1 hover:shadow-xl shadow-glow group">
      <div class="text-2xl mb-2">🌓</div>
      <h3 class="font-bold text-sm">Inverted</h3>
      <p class="text-xs text-white/40 mt-1">Negative colors</p>
    </div>
  </section>

</main>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const videoWrap = document.getElementById('videoWrap');
const filterNameEl = document.getElementById('filterName');
const filterBar = document.getElementById('filterBar');
const statusOverlay = document.getElementById('statusOverlay');
const flashEl = document.getElementById('flash');
const downloadBtn = document.getElementById('downloadBtn');

const filters = {
  normal: { label: 'Normal', btnClass: 'bg-white/10' },
  glitch: { label: 'Data Glitch', btnClass: 'bg-gradient-to-br from-rose-500/20 to-amber-500/20' },
  pixel: { label: 'Pixel Bloom', btnClass: 'bg-gradient-to-br from-violet-500/20 to-fuchsia-500/20' },
  invert: { label: 'Inverted', btnClass: 'bg-gradient-to-br from-cyan-500/20 to-emerald-500/20' },
  thermal: { label: 'Thermal', btnClass: 'bg-gradient-to-br from-rose-500/20 to-amber-500/20' },
  kaleido: { label: 'Kaleidoscope', btnClass: 'bg-gradient-to-br from-amber-500/20 to-rose-500/20' },
  edges: { label: 'Edges', btnClass: 'bg-gradient-to-br from-cyan-500/20 to-violet-500/20' },
  duotone: { label: 'Duotone', btnClass: 'bg-gradient-to-br from-violet-500/20 to-cyan-500/20' },
};

let activeFilter = 'normal';
let lastFrameTime = 0;
let glitchOffset = 0;

function resizeCanvas() {
  const rect = videoWrap.getBoundingClientRect();
  canvas.width = rect.width;
  canvas.height = rect.height;
  video.width = rect.width;
  video.height = rect.height;
}
window.addEventListener('resize', resizeCanvas);

function initCamera() {
  if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } } })
      .then(stream => {
        video.srcObject = stream;
        video.onloadedmetadata = () => {
          resizeCanvas();
          statusOverlay.innerHTML = '<div class="px-4 py-2 rounded-full glass-strong text-xs font-bold tracking-widest uppercase text-emerald-300">Ready</div>';
          setTimeout(() => { statusOverlay.style.opacity = '0'; statusOverlay.style.transition = 'opacity 0.8s'; }, 1200);
          requestAnimationFrame(drawLoop);
        };
      })
      .catch(err => {
        statusOverlay.innerHTML = '<div class="px-4 py-2 rounded-full glass-strong text-xs font-bold tracking-widest uppercase text-rose-300">Camera access denied</div>';
        // Suppress console error for denied permission
        // console.error(err.message || err);
      });
  } else {
    statusOverlay.innerHTML = '<div class="px-4 py-2 rounded-full glass-strong text-xs font-bold tracking-widest uppercase text-rose-300">Webcam not supported</div>';
  }
}

function buildFilterBar() {
  filterBar.innerHTML = '';
  Object.entries(filters).forEach(([key, info]) => {
    const btn = document.createElement('button');
    btn.className = `btn-filter snap-start flex-shrink-0 px-5 py-2.5 rounded-full text-sm font-bold tracking-tight text-white/80 ${key === activeFilter ? 'active ring-1 ring-white/20' : ''}`;
    btn.textContent = info.label;
    btn.onclick = () => setFilter(key);
    filterBar.appendChild(btn);
  });
}

function setFilter(key) {
  activeFilter = key;
  filterNameEl.textContent = filters[key].label;
  document.querySelectorAll('#filterBar button').forEach(b => b.classList.remove('active', 'ring-1', 'ring-white/20'));
  const idx = Object.keys(filters).indexOf(key);
  document.querySelectorAll('#filterBar button')[idx]?.classList.add('active', 'ring-1', 'ring-white/20');
}

function drawLoop(timestamp) {
  if (video.readyState >= 2) {
    resizeCanvas(); // keep in sync
    ctx.save();
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Scale to cover
    const vw = video.videoWidth || 1280;
    const vh = video.videoHeight || 720;

    // Fill background black
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    if (activeFilter === 'normal') {
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    } else if (activeFilter === 'glitch') {
      glitchOffset = (timestamp / 50) % 40;
      // Red channel offset
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      ctx.filter = `brightness(1.1) contrast(1.2)`;
      ctx.drawImage(video, glitchOffset - 10, -2, canvas.width + 10, canvas.height + 4);
      ctx.globalAlpha = 0.7;
      ctx.fillStyle = '#ff0044';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.restore();
      ctx.save();
      ctx.globalCompositeOperation = 'screen';
      ctx.drawImage(video, -glitchOffset * 0.5 + 10, 0, canvas.width, canvas.height);
      ctx.restore();
      ctx.save();
      ctx.globalAlpha = 0.15;
      ctx.drawImage(video, glitchOffset * 0.3, -glitchOffset * 0.2, canvas.width, canvas.height);
      ctx.restore();
    } else if (activeFilter === 'pixel') {
      const px = 24;
      const w = Math.ceil(canvas.width / px);
      const h = Math.ceil(canvas.height / px);
      const tmp = document.createElement('canvas');
      tmp.width = w; tmp.height = h;
      const tctx = tmp.getContext('2d');
      tctx.drawImage(video, 0, 0, w, h);
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(tmp, 0, 0, canvas.width, canvas.height);
      ctx.imageSmoothingEnabled = true;
    } else if (activeFilter === 'invert') {
      ctx.filter = 'invert(1) hue-rotate(180deg)';
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      ctx.filter = 'none';
    } else if (activeFilter === 'thermal') {
      ctx.filter = 'contrast(1.5) brightness(0.9)';
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      ctx.filter = 'none';
      // Apply pseudo-thermal gradient
      const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
      grad.addColorStop(0, '#ff0044');
      grad.addColorStop(0.5, '#ffaa00');
      grad.addColorStop(1, '#ffee44');
      ctx.globalCompositeOperation = 'color';
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.globalCompositeOperation = 'source-over';
    } else if (activeFilter === 'kaleido') {
      const sliceW = canvas.width / 4;
      const sliceH = canvas.height / 4;
      // Draw small tiles rotated
      ctx.save();
      for (let y = 0; y < 4; y++) {
        for (let x = 0; x < 4; x++) {
          ctx.save();
          ctx.translate(x * sliceW + sliceW / 2, y * sliceH + sliceH / 2);
          const rot = ((x + y) % 4) * 90 + 45;
          ctx.rotate((rot * Math.PI) / 180);
          ctx.drawImage(video, -sliceW / 2, -sliceH / 2, sliceW, sliceH);
          ctx.restore();
        }
      }
      ctx.restore();
    } else if (activeFilter === 'edges') {
      // Draw video first so getImageData can read it
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      // Edge detection via Sobel-like approximation
      const imgData = getImageDataSafe();
      if (imgData) {
        const w = imgData.width;
        const h = imgData.height;
        const out = ctx.createImageData(w, h);
        const data = imgData.data;
        const od = out.data;

        const getGray = (i) => {
          const r = data[i];
          const g = data[i + 1];
          const b = data[i + 2];
          return 0.299 * r + 0.587 * g + 0.114 * b;
        };

        for (let y = 1; y < h - 1; y++) {
          for (let x = 1; x < w - 1; x++) {
            const i = (y * w + x) * 4;
            const gx = getGray(i - w*4 - 4) - getGray(i - w*4 + 4) + 2 * (getGray(i - 4) - getGray(i + 4)) + getGray(i + w*4 - 4) - getGray(i + w*4 + 4);
            const gy = getGray(i + w*4 - 4) - getGray(i + w*4 + 4) + 2 * (getGray(i - w*4) - getGray(i + w*4)) + getGray(i - w*4 + 4) - getGray(i + w*4 - 4);
            const val = Math.sqrt(gx * gx + gy * gy);
            const c = Math.min(255, val * 2);
            od[i] = od[i+1] = od[i+2] = c;
            od[i+3] = 255;
          }
        }
        ctx.putImageData(out, 0, 0);
      } else {
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      }
    } else if (activeFilter === 'duotone') {
      ctx.filter = 'grayscale(1) contrast(1.3)';
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      ctx.filter = 'none';
      const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
      grad.addColorStop(0, '#4c1d95');
      grad.addColorStop(1, '#0ea5e9');
      ctx.globalCompositeOperation = 'multiply';
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.globalCompositeOperation = 'source-over';
    }

    ctx.restore();
  }
  requestAnimationFrame(drawLoop);
}

function getImageDataSafe() {
  try {
    return ctx.getImageData(0, 0, canvas.width, canvas.height);
  } catch (e) {
    return null;
  }
}

function captureSnapshot() {
  // Flash effect
  flashEl.style.animation = 'none';
  void flashEl.offsetWidth; // trigger reflow
  flashEl.style.animation = 'flash 0.25s ease-out';

  // Draw current frame to a temp canvas for snap
  const snapCanvas = document.createElement('canvas');
  snapCanvas.width = canvas.width;
  snapCanvas.height = canvas.height;
  const sctx = snapCanvas.getContext('2d');
  sctx.drawImage(canvas, 0, 0);
  const url = snapCanvas.toDataURL('image/png');
  downloadBtn.href = url;
  downloadBtn.classList.remove('hidden');
  downloadBtn.classList.add('fade-up');
}

buildFilterBar();
initCamera();
</script>
</body>
</html>
