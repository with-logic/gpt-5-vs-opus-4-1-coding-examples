const el = {
  editor: document.getElementById('editor'),
  content: document.getElementById('slideContent'),
  canvas: document.getElementById('slideCanvas'),
  stage: document.getElementById('stage'),
  root: document.getElementById('deckRoot'),
  cur: document.getElementById('curLabel'),
  tot: document.getElementById('totLabel'),
  progress: document.getElementById('progress'),
  footerPage: document.getElementById('footerPage'),
  dots: document.getElementById('dotNav'),
  thumbs: document.getElementById('thumbs'),
  stats: document.getElementById('stats'),
  lineNums: document.getElementById('lineNums')

let state = { slidesRaw: [], slidesHtml: [], at: 0 }

function esc(s){return s.replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function inline(md){
  let out = esc(md)
  out = out.replace(/`([^`]+)`/g,'<code>$1</code>')
  out = out.replace(/\*\*([^*]+)\*\*/g,'<strong style="color:var(--ink)">$1</strong>')
  out = out.replace(/__([^_]+)__/g,'<strong style="color:var(--ink)">$1</strong>')
  out = out.replace(/\*([^*]+)\*/g,'<em>$1</em>')
  out = out.replace(/_([^_]+)_/g,'<em>$1</em>')
  out = out.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" style="color:var(--accent);text-decoration:underline;text-underline-offset:3px">$1</a>')
  return out
}

function parseParagraphs(txt){
  const lines = txt.split('\n')
  let html = ''
  let i=0
  let inCode=false, codeBuf=[], codeLang=''
  const isBlockStart = (l)=>{
    const t = l.trim()
    if(!t) return false
    if(t.startsWith('```')) return true
    if(t.startsWith('# ')) return true
    if(t.startsWith('## ')) return true
    if(t.startsWith('### ')) return true
    if(t.startsWith('> ')) return true
    if(/^\s*[-*]\s+/.test(l)) return true
    if(/^\s*\d+\.\s+/.test(l)) return true
    if(/^\|.*\|$/.test(t)) return true
    return false
  }
  while(i<lines.length){
    let line = lines[i]
    if(line.trim().startsWith('```')){
      if(!inCode){ inCode=true; codeLang=line.trim().slice(3); codeBuf=[]; }
      else { inCode=false; html+=`<pre><code>${esc(codeBuf.join('\n'))}</code></pre>` }
      i++; continue
    }
    if(inCode){ codeBuf.push(line); i++; continue }

    if(!line.trim()){ i++; continue }

    if(line.startsWith('# ')){ html+=`<h1 class="text-[46px] md:text-[58px] mt-1 mb-3">${inline(line.slice(2))}</h1>`; i++; continue }
    if(line.startsWith('## ')){ html+=`<h2 class="text-[30px] md:text-[36px] -tracking-[.01em] mt-3 mb-2" style="color:var(--ink2)">${inline(line.slice(3))}</h2>`; i++; continue }
    if(line.startsWith('### ')){ html+=`<h3 class="mb-4 opacity-80">${inline(line.slice(4))}</h3>`; i++; continue }
    if(line.startsWith('> ')){ html+=`<blockquote class="my-6">${inline(line.slice(2))}</blockquote>`; i++; continue }
    if(/^\s*[-*]\s+/.test(line)){
      let lis=[]
      while(i<lines.length && /^\s*[-*]\s+/.test(lines[i])){ lis.push(inline(lines[i].replace(/^\s*[-*]\s+/,''))); i++ }
      html+=`<ul class="mt-4">${lis.map(t=>`<li>${t}</li>`).join('')}</ul>`; continue
    }
    if(/^\s*\d+\.\s+/.test(line)){
      let lis=[]
      while(i<lines.length && /^\s*\d+\.\s+/.test(lines[i])){ lis.push(inline(lines[i].replace(/^\s*\d+\.\s+/,''))); i++ }
      html+=`<ol class="mt-4 list-decimal pl-6 marker:text-[color:var(--accent)] marker:font-bold space-y-2 text-[18px]">${lis.map(t=>`<li>${t}</li>`).join('')}</ol>`; continue
    }
    if(/^\|.*\|/.test(line.trim())){
      let rows=[]
      while(i<lines.length && /^\|/.test(lines[i].trim())){ rows.push(lines[i].trim()); i++ }
      // parse table
      let tableHtml='<div class="mt-6 overflow-hidden rounded-xl border" style="border-color:var(--line)"><table class="w-full text-left text-[13px]"><thead><tr>'
      const header = rows[0].split('|').filter(Boolean).map(s=>s.trim())
      header.forEach(h=> tableHtml+=`<th class="px-4 py-3 font-semibold tracking-wide uppercase text-[11px] border-b" style="border-color:var(--line);background:color-mix(in srgb,var(--line) 50%, transparent);color:var(--ink2)">${esc(h)}</th>`)
      tableHtml+='</tr></thead><tbody>'
      rows.slice(1).forEach(r=>{
        if(/^\|\s*[:-]+\s*\|/.test(r)) return
        const cols=r.split('|').filter(Boolean).map(s=>s.trim())
        tableHtml+='<tr>'+cols.map(c=>`<td class="px-4 py-3 border-b" style="border-color:var(--line)">${inline(c)}</td>`).join('')+'</tr>'
      })
      tableHtml+='</tbody></table></div>'
      html+=tableHtml; continue
    }
    // paragraph group - collect until blank or block start, always progress
    let para=[]
    while(i<lines.length){
      const cur = lines[i]
      if(!cur.trim()) break
      if(para.length>0 && isBlockStart(cur)) break
      // if first line and it's a block start (should have been handled), break to avoid infinite loop
      if(para.length===0 && isBlockStart(cur) && !cur.trim().startsWith('```')){
        break
      }
      para.push(cur)
      i++
      // stop after one full line run if next is block start
      if(i<lines.length && isBlockStart(lines[i])) break
    }
    if(para.length){
      html+=`<p class="mt-4 max-w-[56ch]">${inline(para.join(' '))}</p>`
    } else {
      // safety: advance at least one to avoid infinite loop on unhandled lines like **bold**
      // treat the current line as a paragraph
      html+=`<p class="mt-4 max-w-[56ch]">${inline(line)}</p>`
      i++
    }
  }
  return html
}

function buildSlides(md){
  const raws = md.split(/\n\s*---\s*\n/).map(s=>s.trim()).filter(Boolean)
  const htmls = raws.map(parseParagraphs)
  return {raws, htmls}
}

function render(){
  const total = state.slidesHtml.length || 1
  const idx = Math.min(state.at, total-1)
  const html = state.slidesHtml[idx] || '<p class="opacity-40">Empty slide</p>'

  // detect centering: if slide is mostly headings/blockquote, center
  const shouldCenter = (state.slidesRaw[idx]||'').split('\n').filter(l=>l.trim()).length <=4 && !/[-*]\s+|\d+\.\s+|\|/.test(state.slidesRaw[idx]||'')
  el.content.innerHTML = html
  el.content.parentElement.classList.remove('fade-enter'); void el.content.parentElement.offsetWidth; el.content.parentElement.classList.add('fade-enter')
  if(shouldCenter){
    el.content.style.justifyContent='center'; el.content.style.textAlign='left'; // keep left but vertically centered
  } else {
    el.content.style.justifyContent='flex-start'
  }

  el.cur.textContent = String(idx+1).padStart(2,'0')
  el.tot.textContent = String(total).padStart(2,'0')
  el.footerPage.textContent = `${String(idx+1).padStart(2,'0')} — ${String(total).padStart(2,'0')}`
  el.progress.style.width = `${((idx+1)/total)*100}%`
  el.stats.textContent = `${total} SLIDES • LIVE`

  // dots
  el.dots.innerHTML = state.slidesHtml.map((_,i)=>`<button data-i="${i}" class="w-[22px] h-[5px] rounded-full transition" style="background:${i===idx?'var(--accent)':'var(--line)'}"></button>`).join('')
  el.dots.querySelectorAll('button').forEach(b=> b.onclick=()=>{ state.at=Number(b.dataset.i); render() })

  // thumbs
  el.thumbs.innerHTML = state.slidesHtml.map((h,i)=>{
    const txt = (state.slidesRaw[i]||'').split('\n').find(l=>l.trim())?.replace(/^[#\s]+/, '').slice(0,28) || `Slide ${i+1}`
    return `<button data-t="${i}" class="group shrink-0 w-[150px] h-[68px] rounded-[12px] border text-left px-3 py-2 flex flex-col justify-between transition ${i===idx?'ring-1':''}" style="border-color:${i===idx?'var(--accent)':'var(--line)'};background:${i===idx?'color-mix(in srgb,var(--accent) 10%, var(--panel))':'var(--panel)'};box-shadow:var(--tw-ring-color:var(--accent))">
      <div class="text-[10px] tracking-[0.12em] uppercase font-semibold flex items-center gap-1.5" style="color:${i===idx?'var(--accent)':'var(--ink2)'}"><span class="w-[16px] h-[1px] inline-block" style="background:currentColor"></span>${String(i+1).padStart(2,'0')}</div>
      <div class="text-[11px] leading-[1.2] truncate font-medium" style="color:var(--ink)">${esc(txt)}</div>
    </button>`
  }).join('')
  el.thumbs.querySelectorAll('button').forEach(b=> b.onclick=()=>{ state.at=Number(b.dataset.t); render() })

  // line numbers
  const lineCount = el.editor.value.split('\n').length
  el.lineNums.innerHTML = Array.from({length:lineCount},(_,k)=>`<div>${k+1}</div>`).join('')
}

function commitFromEditor(){
  const built = buildSlides(el.editor.value)
  state.slidesRaw = built.raws
  state.slidesHtml = built.htmls
  if(state.at >= built.htmls.length) state.at = built.htmls.length-1
  if(state.at <0) state.at=0
  render()
}

let debounce
el.editor.addEventListener('input',()=>{
  clearTimeout(debounce)
  debounce=setTimeout(commitFromEditor,140)
  try{ localStorage.setItem('md-slides-draft', el.editor.value) }catch(e){}
  const lc = el.editor.value.split('\n').length
  if(lc>80) el.lineNums.innerHTML = Array.from({length:lc},(_,k)=>`<div>${k+1}</div>`).join('')
})

function go(d){ state.at = Math.max(0, Math.min(state.slidesHtml.length-1, state.at+d)); render() }

document.getElementById('prevBtn').onclick=()=>go(-1)
document.getElementById('nextBtn').onclick=()=>go(1)
document.getElementById('stagePrev').onclick=()=>go(-1)
document.getElementById('stageNext').onclick=()=>go(1)
document.getElementById('fsBtn').onclick=()=> toggleFS()
document.getElementById('presentBtn').onclick=()=> toggleFS(true)
document.getElementById('sampleBtn').onclick=()=>{
  el.editor.value=SAMPLE
  state.at=0
  commitFromEditor()
}

function toggleFS(forceEnter){
  if(!document.fullscreenElement || forceEnter){
    el.root.requestFullscreen?.()
  } else {
    document.exitFullscreen?.()
  }
}

window.addEventListener('keydown',e=>{
  if(e.target.tagName==='TEXTAREA' && (e.key==='ArrowRight' || e.key==='ArrowLeft') && !e.metaKey) {
    // allow nav within textarea but with alt?
    if(e.altKey){ e.preventDefault(); go(e.key==='ArrowRight'?1:-1) }
    return
  }
  if(['ArrowRight','ArrowDown','PageDown',' '].includes(e.key)){ e.preventDefault(); go(1) }
  if(['ArrowLeft','ArrowUp','PageUp'].includes(e.key)){ e.preventDefault(); go(-1) }
  if(e.key==='Home'){ state.at=0; render() }
  if(e.key==='End'){ state.at=state.slidesHtml.length-1; render() }
  if(e.key.toLowerCase()==='f'){ toggleFS() }
  if(e.key==='Escape' && document.fullscreenElement){ document.exitFullscreen() }
})

document.getElementById('themeBtn').onclick=()=>{
  const isLight = document.documentElement.classList.contains('theme-light')
  document.documentElement.classList.toggle('theme-light', !isLight)
  document.documentElement.classList.toggle('theme-dark', isLight)
  document.getElementById('themeIcon').textContent = isLight?'◑':'◐'
}

// init
let saved=null
try{ saved = localStorage.getItem('md-slides-draft') }catch(e){}
el.editor.value = saved || SAMPLE
try{ commitFromEditor() }catch(e){ console.error(e); state.slidesRaw=[SAMPLE]; state.slidesHtml=[SAMPLE]; el.content.textContent=SAMPLE }

// resize handle for textarea sync scroll line nums
el.editor.addEventListener('scroll',()=>{ el.lineNums.scrollTop = el.editor.scrollTop })
</script>
</body>
</html>
