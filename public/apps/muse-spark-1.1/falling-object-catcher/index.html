<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Falling Fruit Catcher - Juicy Fun!</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Bangers&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;touch-action:none;-webkit-tap-highlight-color:transparent}
  body{
    font-family:'Fredoka', system-ui, sans-serif;
    background:#fdf6e3;
    overflow:hidden;
    height:100dvh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    user-select:none;
  }
  /* Playful background */
  #bg{
    position:fixed;inset:0;overflow:hidden;z-index:-2;
    background:
      radial-gradient(1200px 600px at 20% -10%, #aef0ff 0%, transparent 60%),
      radial-gradient(900px 500px at 85% 0%, #fff6a0 0%, #ffde7a 35%, transparent 70%),
      linear-gradient(180deg,#8de7ff 0%,#b3f0ff 22%,#ffe9a8 48%,#ffd6a3 70%,#c8f5c2 100%);
  }
  #bg .cloud{
    position:absolute;background:#fff;border-radius:999px;
    box-shadow: inset -12px -8px 0 rgba(0,0,0,0.06), 0 8px 24px rgba(0,0,0,0.06);
    opacity:0.95;
  }
  #bg .cloud:after, #bg .cloud:before{
    content:'';position:absolute;background:inherit;border-radius:inherit;box-shadow:inherit;
  }
  .c1{width:140px;height:48px;top:10%;left:8%;animation:drift 26s linear infinite}
  .c1:before{width:70px;height:64px;top:-24px;left:18px}
  .c1:after{width:84px;height:54px;top:-16px;left:56px}
  .c2{width:110px;height:38px;top:16%;left:68%;animation:drift 32s linear infinite reverse}
  .c2:before{width:56px;height:48px;top:-18px;left:14px}
  .c2:after{width:64px;height:40px;top:-12px;left:46px}
  .c3{width:170px;height:52px;top:7%;left:38%;opacity:0.7;animation:drift 40s linear infinite}
  .c3:before{width:90px;height:72px;top:-28px;left:22px}
  .c3:after{width:84px;height:58px;top:-20px;left:72px}
  @keyframes drift{0%{transform:translateX(0)}50%{transform:translateX(18px)}100%{transform:translateX(0)}}
  .sun{
    position:absolute; width:96px;height:96px;top:28px;right:6%;
    background: radial-gradient(circle at 35% 35%, #fff9bf 0%, #ffea66 22%, #ffb81e 62%);
    border-radius:50%; box-shadow:0 0 0 12px rgba(255,236,102,0.25),0 0 40px 8px rgba(255,184,30,0.5);
  }
  .sun-face{position:absolute;inset:18%;display:grid;place-items:center;font-size:28px;transform:rotate(-8deg)}
  .hill{
    position:absolute;bottom:-10%;left:-10%;right:-10%;height:38%;
    background: radial-gradient(ellipse at 50% 0%, #a8ec9e 0%, #7ddf77 30%, #60c96a 70%);
    border-radius:50% 50% 0 0;
  }
  .hill2{left:-30%;right:20%;height:30%;bottom:-12%;background:radial-gradient(ellipse at 60% 0%, #b8f0b0 0%, #8be68d 55%)}

  /* Layout */
  #app{
    width:min(520px,94vw);
    height:min(860px,92dvh);
    display:flex;flex-direction:column;
    position:relative;
  }
  header{
    display:flex;justify-content:space-between;align-items:center;
    padding:10px 14px;
    background:#fff;
    border-radius:22px 22px 0 0;
    border:4px solid #2b2b2b;
    border-bottom:none;
    box-shadow:0 6px 0 rgba(0,0,0,0.12);
    z-index:3;
    gap:8px;
  }
  .pill{
    display:flex;align-items:center;gap:8px;
    background:#2b2b2b;color:#fff;
    padding:8px 14px;border-radius:999px;
    font-weight:700; font-size:18px; letter-spacing:0.5px;
    box-shadow:inset 0 -3px 0 rgba(0,0,0,0.35);
  }
  .pill .ico{font-size:22px; filter:drop-shadow(0 1px 0 rgba(0,0,0,0.3))}
  #score{transition:transform 0.12s}
  #score.bump{transform:scale(1.18) rotate(-2deg)}
  #livesWrap{display:flex;gap:6px;align-items:center}
  .heart{
    width:34px;height:34px;
    display:grid;place-items:center;
    background:#fff;
    border:3px solid #2b2b2b;
    border-radius:50%;
    font-size:18px;
    box-shadow:0 3px 0 #2b2b2b;
    transition:transform 0.25s, filter 0.25s, opacity 0.25s;
  }
  .heart.lost{transform:scale(0) rotate(20deg);opacity:0}

  #gameWrap{
    flex:1;position:relative;
    background:#ffffffcc;
    backdrop-filter: blur(6px);
    border:4px solid #2b2b2b;
    border-radius:0 0 26px 26px;
    overflow:hidden;
    box-shadow:0 14px 0 rgba(0,0,0,0.12), 0 24px 40px rgba(0,0,0,0.14);
  }
  canvas{display:block;width:100%;height:100%;}
  #fx{position:absolute;inset:0;pointer-events:none}

  /* Overlays */
  .overlay{
    position:absolute;inset:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:24px;
    background: radial-gradient(800px 500px at 50% 0%, rgba(255,255,255,0.9) 0%, rgba(255,244,196,0.92) 45%, rgba(255,221,162,0.9) 100%);
    z-index:10;
    text-align:center;
    transition:opacity 0.35s, transform 0.35s;
  }
  .overlay.hidden{opacity:0;pointer-events:none;transform:scale(1.03)}
  h1{
    font-family:'Bangers', cursive;
    font-size: clamp(44px, 10vw, 66px);
    line-height:0.9;
    color:#2b2b2b;
    text-shadow: 4px 0 0 #fff, -4px 0 0 #fff, 0 4px 0 #fff, 0 -4px 0 #fff, 6px 6px 0 #2b2b2b;
    letter-spacing:2px;
    margin-bottom:8px;
  }
  h1 span{display:inline-block;transform-origin:center}
  h1 .w1{transform:rotate(-4deg)} h1 .w2{transform:rotate(2deg)} h1 .w3{transform:rotate(-2deg); color:#ff4d6a}
  .subtitle{font-size:19px;font-weight:600;color:#4a3a00;background:#fff;padding:6px 14px;border-radius:999px;border:3px solid #2b2b2b;box-shadow:0 4px 0 #2b2b2b;margin:8px 0 18px}
  .fruit-row{display:flex;gap:10px;margin:10px 0 18px}
  .fruit-row span{font-size:40px; width:56px;height:56px; display:grid;place-items:center;background:#fff;border:3px solid #2b2b2b;border-radius:16px;box-shadow:0 4px 0 #2b2b2b;animation:bob 1.6s ease-in-out infinite}
  .fruit-row span:nth-child(2){animation-delay:0.12s}
  .fruit-row span:nth-child(3){animation-delay:0.24s}
  .fruit-row span:nth-child(4){animation-delay:0.36s}
  .fruit-row span:nth-child(5){animation-delay:0.48s}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

  .btn{
    font-family:'Fredoka',sans-serif;
    font-weight:800; font-size:22px; letter-spacing:0.6px;
    padding:14px 28px;
    border-radius:999px;
    border:4px solid #2b2b2b;
    background: linear-gradient(180deg,#3af07a 0%, #19c95a 100%);
    color:#1a2e05;
    box-shadow:0 6px 0 #2b2b2b, 0 10px 20px rgba(0,0,0,0.15);
    cursor:pointer;
    transform:translateY(0);
    transition:transform 0.08s, box-shadow 0.08s, filter 0.15s;
  }
  .btn:active{transform:translateY(4px);box-shadow:0 2px 0 #2b2b2b}
  .btn:hover{filter:brightness(1.08)}
  .btn.yellow{background:linear-gradient(180deg,#ffe85c 0%, #ffb81e 100%)}
  .btn.pink{background:linear-gradient(180deg,#ff8fb5 0%, #ff4d85 100%);color:#fff}
  .controls{
    margin-top:18px;
    display:flex; gap:10px; flex-wrap:wrap; justify-content:center;
  }
  .k{
    font-size:13px; font-weight:700; background:#2b2b2b;color:#fff;padding:6px 10px;border-radius:999px;
    display:inline-flex;align-items:center;gap:6px
  }
  .k b{background:#fff;color:#2b2b2b;padding:2px 6px;border-radius:6px;font-size:12px}

  #combo{
    position:absolute;left:50%;top:28%;transform:translate(-50%,-50%) scale(0);
    font-family:'Bangers'; font-size:54px; color:#fff;
    text-shadow:3px 0 0 #2b2b2b,-3px 0 0 #2b2b2b,0 3px 0 #2b2b2b,0 -3px 0 #2b2b2b,5px 5px 0 #2b2b2b;
    pointer-events:none; z-index:5; opacity:0; transition:transform 0.22s cubic-bezier(.175,.885,.32,1.275), opacity 0.22s;
  }
  #combo.show{transform:translate(-50%,-50%) scale(1);opacity:1}

  .scorePop{
    position:absolute; font-weight:800; font-size:24px; color:#2b2b2b;
    background:#fff; border:3px solid #2b2b2b; padding:4px 10px; border-radius:999px;
    pointer-events:none; z-index:6; box-shadow:0 4px 0 #2b2b2b;
    animation:popUp 0.6s ease-out forwards;
  }
  @keyframes popUp{0%{transform:translate(-50%,0) scale(0.6);opacity:1}100%{transform:translate(-50%,-70px) scale(1);opacity:0}}

  #pauseBtn{
    position:absolute; right:10px; top:10px; z-index:4;
    width:42px;height:42px; border-radius:50%;
    border:3px solid #2b2b2b; background:#fff; font-size:18px;
    box-shadow:0 3px 0 #2b2b2b; cursor:pointer;
  }
  #progress{
    position:absolute; left:0; top:0; height:6px; width:0%;
    background: linear-gradient(90deg,#22e56a,#ffd93d,#ff6b6b);
    z-index:4; transition:width 0.2s linear;
  }
  .shake{animation:shake 0.28s}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(4px)}}

  #how{font-size:14px;color:#5a4a2a;margin-top:14px;line-height:1.4;max-width:300px}
  #how strong{color:#2b2b2b}
</style>
</head>
<body>
<div id="bg">
  <div class="sun"><div class="sun-face">☺</div></div>
  <div class="cloud c1"></div>
  <div class="cloud c2"></div>
  <div class="cloud c3"></div>
  <div class="hill hill2"></div>
  <div class="hill"></div>
</div>

<div id="app">
  <header>
    <div class="pill"><span class="ico">⭐</span><span id="score">0</span></div>
    <div id="livesWrap"></div>
    <div class="pill" style="background:#fff;color:#2b2b2b;border:3px solid #2b2b2b"><span class="ico">👑</span><span id="best">0</span></div>
  </header>

  <div id="gameWrap">
    <div id="progress"></div>
    <canvas id="game"></canvas>
    <div id="fx"></div>
    <div id="combo"></div>
    <button id="pauseBtn" title="Pause">⏸</button>

    <div id="start" class="overlay">
      <h1><span class="w1">FALLING</span><br><span class="w2">FRUIT</span> <span class="w3">CATCHER</span></h1>
      <div class="subtitle">Catch them all before they splat!</div>
      <div class="fruit-row">
        <span>🍎</span><span>🍊</span><span>🍌</span><span>🍓</span><span>🍉</span>
      </div>
      <button class="btn" id="playBtn">PLAY! 🧺</button>
      <div class="controls">
        <span class="k">🖱️ MOVE <b>Mouse / Touch</b></span>
        <span class="k">⌨️ MOVE <b>◀ ▶</b></span>
      </div>
      <div id="how">You're a super farmer! <strong>Catch 3 fruits to make combo!</strong> Don't let 3 fruits fall. Watch out for bombs 💣</div>
    </div>

    <div id="gameover" class="overlay hidden">
      <h1 style="font-size:54px"><span style="display:inline-block;transform:rotate(-3deg)">OH</span> <span style="display:inline-block;transform:rotate(2deg);color:#ff4d6a">NO!</span></h1>
      <div class="fruit-row" style="margin:6px 0 12px"><span>💦</span><span>😵</span><span>💦</span></div>
      <div class="subtitle" id="finalText">You caught 0 fruits!</div>
      <div style="display:flex;gap:12px;margin-top:8px">
        <button class="btn yellow" id="againBtn">AGAIN! 🔄</button>
        <button class="btn pink" id="homeBtn" style="font-size:18px;padding:12px 18px">MENU</button>
      </div>
      <div id="newBest" style="margin-top:14px;font-weight:800;color:#ff4d6a;font-size:18px;display:none">🎉 NEW BEST! 🎉</div>
    </div>

    <div id="pauseOverlay" class="overlay hidden" style="backdrop-filter:blur(2px)">
      <h1 style="font-size:48px">PAUSED</h1>
      <div class="subtitle">Take a juicy break</div>
      <button class="btn yellow" id="resumeBtn">RESUME ▶️</button>
    </div>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const fxLayer = document.getElementById('fx');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const livesWrap = document.getElementById('livesWrap');
  const comboEl = document.getElementById('combo');
  const progressEl = document.getElementById('progress');
  const gameWrap = document.getElementById('gameWrap');
  const pauseBtn = document.getElementById('pauseBtn');

  const startOverlay = document.getElementById('start');
  const gameoverOverlay = document.getElementById('gameover');
  const pauseOverlay = document.getElementById('pauseOverlay');
  const finalText = document.getElementById('finalText');
  const newBestEl = document.getElementById('newBest');

  let W, H, dpr;
  function resize(){
    dpr = Math.min(window.devicePixelRatio||1,2);
    const rect = canvas.getBoundingClientRect();
    W = rect.width; H = rect.height;
    canvas.width = W*dpr; canvas.height = H*dpr;
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }

  // --- Audio (tiny synth) ---
  let audioCtx;
  function beep(freq=440, dur=0.12, type='sine', vol=0.25, slide=0){
    try{
      if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = type; o.frequency.value = freq;
      if(slide){ o.frequency.exponentialRampToValueAtTime(freq*slide, audioCtx.currentTime+dur); }
      g.gain.value = vol;
      g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime+dur+0.05);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(); o.stop(audioCtx.currentTime+dur+0.06);
    }catch(e){}
  }
  const sounds = {
    catch: (combo)=>{ beep(500+combo*40,0.12,'sine',0.26,1.4); setTimeout(()=>beep(800+combo*60,0.18,'triangle',0.18),60); },
    miss: ()=>{ beep(180,0.28,'sawtooth',0.3,0.6); },
    bomb: ()=>{ beep(120,0.4,'sawtooth',0.35,0.4); beep(60,0.3,'square',0.25); },
    gameover: ()=>{ [0,1,2].forEach(i=>setTimeout(()=>beep(300-i*60,0.3,'triangle',0.3,0.9), i*180)); },
    start: ()=>{ [0,1,2].forEach(i=>setTimeout(()=>beep(400+i*120,0.14,'sine',0.22), i*90)); }
  };

  // --- Data ---
  const FRUITS = [
    {emoji:'🍎', color:'#ff4b4b', dark:'#c62828', points:10, size:1},
    {emoji:'🍊', color:'#ff9f1c', dark:'#e67e00', points:12, size:1.05},
    {emoji:'🍋', color:'#ffe44d', dark:'#e0b400', points:10, size:0.95},
    {emoji:'🍓', color:'#ff2e6b', dark:'#c2185b', points:15, size:0.9},
    {emoji:'🍌', color:'#ffeb3b', dark:'#f1bb08', points:14, size:1.15},
    {emoji:'🍇', color:'#9c5cdb', dark:'#6a3ba0', points:18, size:0.92},
    {emoji:'🍉', color:'#3ddc97', dark:'#209c66', points:20, size:1.22},
    {emoji:'🍐', color:'#a8e840', dark:'#6fa622', points:13, size:1.0},
  ];
  const GOLDEN = {emoji:'🌟', color:'#ffd700', dark:'#ff9a00', points:50, size:1.25, golden:true};
  const BOMB = {emoji:'💣', color:'#444', dark:'#111', points:-20, size:1.1, bomb:true};

  let state = 'idle'; // idle | playing | paused | over
  let score = 0, lives = 3, best = +(localStorage.getItem('ff_best')||0);
  let combo = 0, comboTimer = 0;
  let fruits = [], particles = [], scorePops = [];
  let basket = { x: 0, y: 0, w: 140, h: 52, targetX: 0, tilt:0, squish:0 };
  let spawnTimer = 0, spawnInterval = 860;
  let speedMul = 1;
  let totalCaught = 0;
  let time = 0;

  function initLives(){
    livesWrap.innerHTML='';
    for(let i=0;i<3;i++){
      const d=document.createElement('div'); d.className='heart';
      d.textContent='❤️'; d.id='heart-'+i;
      livesWrap.appendChild(d);
    }
  }
  function updateLivesDisplay(){
    for(let i=0;i<3;i++){
      const h = document.getElementById('heart-'+i);
      if(!h) continue;
      if(i < lives) h.classList.remove('lost'); else h.classList.add('lost');
    }
  }

  function resetGame(){
    score=0; lives=3; combo=0; comboTimer=0;
    fruits=[]; particles=[]; scorePops=[]; fxLayer.innerHTML='';
    spawnInterval=860; speedMul=1; totalCaught=0; time=0;
    basket.x = W/2; basket.targetX = W/2; basket.y = H - 56;
    basket.w = Math.max(120, Math.min(164, W*0.32));
    updateHUD();
    initLives();
    updateLivesDisplay();
    progressEl.style.width='0%';
  }

  function updateHUD(){
    scoreEl.textContent = score;
    bestEl.textContent = best;
    scoreEl.classList.remove('bump'); void scoreEl.offsetWidth; scoreEl.classList.add('bump');
  }

  // Basket input
  let pointerDown=false;
  function setTargetFromClient(clientX){
    const rect = canvas.getBoundingClientRect();
    basket.targetX = clientX - rect.left;
  }
  canvas.addEventListener('mousemove', e=>{ if(state==='playing') setTargetFromClient(e.clientX); });
  canvas.addEventListener('touchmove', e=>{
    if(e.touches[0]){ setTargetFromClient(e.touches[0].clientX); e.preventDefault(); }
  }, {passive:false});
  canvas.addEventListener('touchstart', e=>{
    pointerDown=true;
    if(e.touches[0]) setTargetFromClient(e.touches[0].clientX);
  }, {passive:false});
  canvas.addEventListener('mousedown', e=>{ pointerDown=true; setTargetFromClient(e.clientX); });

  window.addEventListener('keydown', e=>{
    if(state!=='playing' && e.code==='Space'){ e.preventDefault(); if(state==='idle') startGame(); return; }
    if(e.key==='p' || e.key==='P' || e.key==='Escape'){ togglePause(); }
    if(state!=='playing') return;
    if(e.key==='ArrowLeft' || e.key==='a' || e.key==='A'){ basket.targetX -= 48; }
    if(e.key==='ArrowRight' || e.key==='d' || e.key==='D'){ basket.targetX += 48; }
  });

  // Spawn logic
  function spawnFruit(){
    const isBomb = Math.random()<0.12 + Math.min(0.12, score/800);
    const isGolden = !isBomb && Math.random()<0.07;
    let def;
    if(isBomb) def = BOMB;
    else if(isGolden) def = GOLDEN;
    else def = FRUITS[Math.floor(Math.random()*FRUITS.length)];

    const sizeBase = 52; // big for kids
    const size = sizeBase * def.size * (0.92 + Math.random()*0.18);
    fruits.push({
      x: 32 + Math.random()*(W-64),
      y: -size-20,
      vx: (Math.random()-0.5)*0.9,
      vy: (2.2 + Math.random()*2.6 + Math.min(3, score/250)) * speedMul,
      rot: Math.random()*Math.PI*2,
      vr: (Math.random()-0.5)*0.14,
      size, def,
      wobble: Math.random()*Math.PI*2,
      hit:false
    });
  }

  function addScorePopup(x,y,txt,color='#2b2b2b'){
    const el=document.createElement('div');
    el.className='scorePop'; el.textContent=txt;
    el.style.left=x+'px'; el.style.top=y+'px';
    el.style.borderColor='#2b2b2b'; el.style.background=color;
    fxLayer.appendChild(el);
    setTimeout(()=>el.remove(),650);
  }

  function spawnCatchParticles(x,y,color,count=14){
    for(let i=0;i<count;i++){
      particles.push({
        x, y,
        vx:(Math.random()-0.5)*10,
        vy:(Math.random()-0.9)*9 -2,
        life:1,
        decay:0.02+Math.random()*0.03,
        r:3+Math.random()*5,
        color,
        type:'circle'
      });
    }
  }
  function spawnSplat(x,y,color){
    for(let i=0;i<18;i++){
      particles.push({
        x, y,
        vx:(Math.random()-0.5)*8,
        vy:Math.random()*4+1,
        life:1,
        decay:0.02+Math.random()*0.02,
        r:4+Math.random()*7,
        color,
        type:'splat',
        stretch:0.6+Math.random()*1.2
      });
    }
    const ring={x,y,r:6,life:1, decay:0.025, type:'ring', color};
    particles.push(ring);
  }

  // Main loop
  let last=0, rafId;
  function loop(t){
    if(!last) last=t;
    const dt = Math.min(34, t-last); // cap
    last=t;
    if(state==='playing'){
      time+=dt;
      update(dt);
    }
    render();
    rafId=requestAnimationFrame(loop);
  }

  function update(dt){
    // basket physics
    const dx = basket.targetX - basket.x;
    basket.x += dx * 0.18;
    basket.x = Math.max(basket.w/2+6, Math.min(W - basket.w/2 -6, basket.x));
    basket.tilt += (dx*0.0025 - basket.tilt)*0.16;
    basket.squish += (-basket.squish)*0.18;
    basket.y = H - 56 + Math.sin(time*0.003)*2;

    // combo timer
    if(comboTimer>0){
      comboTimer-=dt;
      const pct = Math.max(0, comboTimer/2000);
      progressEl.style.width = pct*100+'%';
      progressEl.style.background = combo>=3 ? `linear-gradient(90deg,#ffdf20,#ff5e8a)` : `linear-gradient(90deg,#22e56a,#ffd93d)`;
      if(comboTimer<=0){
        combo=0; comboEl.classList.remove('show');
        progressEl.style.width='0%';
      }
    }

    // spawn
    spawnTimer+=dt;
    const curInterval = Math.max(260, spawnInterval - score*1.1);
    if(spawnTimer>curInterval){
      spawnTimer=0; spawnFruit();
      if(Math.random()<0.18) spawnFruit(); // double spawn sometimes
    }

    // fruits
    for(let i=fruits.length-1;i>=0;i--){
      const f=fruits[i];
      f.x+=f.vx; f.y+=f.vy; f.rot+=f.vr; f.wobble+=0.06;
      f.vy+=0.04*speedMul;
      // wall bounce
      if(f.x < f.size*0.45 || f.x > W - f.size*0.45) f.vx*=-0.7;

      // catch?
      const bx = basket.x, by = basket.y;
      const bw = basket.w, bh = basket.h;
      const catchY = by - bh*0.2;
      if(f.y + f.size*0.3 > catchY && f.y < catchY + bh + 18){
        if(Math.abs(f.x - bx) < bw*0.46 + f.size*0.28){
          // caught
          if(f.def.bomb){
            // bomb hit
            lives--; totalCaught++;
            combo=0; comboTimer=0; comboEl.classList.remove('show');
            progressEl.style.width='0%';
            basket.squish=-0.35;
            gameWrap.classList.remove('shake'); void gameWrap.offsetWidth; gameWrap.classList.add('shake');
            spawnCatchParticles(f.x, catchY, '#333', 20);
            sounds.bomb();
            addScorePopup(f.x, catchY, 'BOOM! 💥', '#333'); // color
            updateLivesDisplay();
            fruits.splice(i,1);
            if(lives<=0) endGame();
            continue;
          }else{
            // fruit catch
            const pts = f.def.points + (combo>=2 ? combo*2 : 0);
            score+=pts; totalCaught++;
            combo++; comboTimer=2000;
            if(combo>=3){
              comboEl.textContent = combo + 'x COMBO! 🔥';
              comboEl.classList.add('show');
            }
            basket.squish=0.28;
            spawnCatchParticles(f.x, catchY, f.def.color, f.def.golden?28:16);
            addScorePopup(f.x, catchY, '+'+pts + (f.def.golden?' ⭐':''), f.def.golden?'#ffe85c':'#fff');
            sounds.catch(combo);
            updateHUD();
            speedMul = 1 + Math.min(0.85, totalCaught*0.018);
            fruits.splice(i,1);
            continue;
          }
        }
      }

      // miss
      if(f.y > H + f.size){
        if(!f.def.bomb){
          lives--;
          combo=0; comboTimer=0; comboEl.classList.remove('show');
          progressEl.style.width='0%';
          spawnSplat(f.x, H-8, f.def.color);
          gameWrap.classList.remove('shake'); void gameWrap.offsetWidth; gameWrap.classList.add('shake');
          sounds.miss();
          updateLivesDisplay();
          if(lives<=0){ fruits.splice(i,1); endGame(); break; }
        }
        fruits.splice(i,1);
      }
    }

    // particles
    for(let i=particles.length-1;i>=0;i--){
      const p=particles[i];
      if(p.type==='ring'){
        p.r+=3.2; p.life-=p.decay;
      }else{
        p.x+=p.vx; p.y+=p.vy; p.vy+=0.24; p.vx*=0.993; p.life-=p.decay;
      }
      if(p.life<=0) particles.splice(i,1);
    }
  }

  function roundRect(x,y,w,h,r,fill,stroke){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    if(fill){ ctx.fillStyle=fill; ctx.fill(); }
    if(stroke){ ctx.strokeStyle=stroke; ctx.lineWidth=3; ctx.stroke(); }
  }

  function drawBasket(){
    const x=basket.x, y=basket.y, w=basket.w, h=basket.h;
    const tilt=basket.tilt, squish=1+basket.squish;

    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(tilt);
    ctx.scale(1,squish);

    // shadow
    ctx.globalAlpha=0.18;
    ctx.fillStyle='#2b2b2b';
    ctx.beginPath(); ctx.ellipse(0, h*0.55, w*0.5, 12, 0,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;

    // body
    const topW=w*0.96, botW=w*0.74;
    // wicker
    ctx.fillStyle='#f7d394';
    ctx.strokeStyle='#2b2b2b'; ctx.lineWidth=4;
    ctx.beginPath();
    ctx.moveTo(-topW/2,-h*0.35);
    ctx.lineTo(-botW/2, h*0.55);
    ctx.lineTo(botW/2, h*0.55);
    ctx.lineTo(topW/2, -h*0.35);
    ctx.closePath();
    ctx.fill(); ctx.stroke();

    // texture lines
    ctx.strokeStyle='#eab86a'; ctx.lineWidth=2.2;
    for(let i=1;i<=4;i++){
      const ty = -h*0.3 + i*h*0.22;
      ctx.beginPath(); ctx.moveTo(-w*0.42 + i*2, ty); ctx.lineTo(w*0.42 - i*2, ty); ctx.stroke();
    }
    ctx.strokeStyle='#d59b4b'; ctx.lineWidth=1.5;
    for(let col=-3; col<=3; col++){
      ctx.beginPath();
      const ox=col*w*0.11;
      ctx.moveTo(ox - botW*0.04, h*0.5);
      ctx.lineTo(ox*0.7, -h*0.33);
      ctx.stroke();
    }

    // rim
    ctx.fillStyle='#fff1a8';
    ctx.strokeStyle='#2b2b2b'; ctx.lineWidth=4;
    ctx.beginPath();
    if(ctx.roundRect) ctx.roundRect(-topW/2-6, -h*0.5, topW+12, 18, 9);
    else roundRect(-topW/2-6, -h*0.5, topW+12, 18, 9);
    ctx.fill(); ctx.stroke();

    // inner shadow
    ctx.fillStyle='rgba(0,0,0,0.12)';
    ctx.beginPath();
    ctx.ellipse(0, -h*0.18, w*0.38, h*0.18, 0,0,Math.PI);
    ctx.fill();

    ctx.restore();
  }

  function drawFruit(f){
    ctx.save();
    ctx.translate(f.x, f.y + Math.sin(f.wobble)*2.4);
    ctx.rotate(f.rot);
    // shadow
    if(!f.def.bomb){
      ctx.globalAlpha=0.15; ctx.fillStyle='#000';
      ctx.beginPath(); ctx.ellipse(0, f.size*0.45, f.size*0.38, f.size*0.16, 0,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1;
    }

    // fruit body
    const s=f.size;
    // base shape
    if(f.def.bomb){
      // bomb
      ctx.fillStyle='#3a3a3a';
      ctx.strokeStyle='#1e1e1e'; ctx.lineWidth=4;
      ctx.beginPath(); ctx.arc(0,0,s*0.42,0,Math.PI*2); ctx.fill(); ctx.stroke();
      ctx.fillStyle='#2a2a2a'; ctx.beginPath(); ctx.arc(-s*0.12,-s*0.12,s*0.18,0,Math.PI*2); ctx.fill();
      // fuse
      ctx.strokeStyle='#8a5a20'; ctx.lineWidth=5; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(s*0.08,-s*0.38); ctx.quadraticCurveTo(s*0.24,-s*0.6, s*0.12,-s*0.72); ctx.stroke();
      // spark
      ctx.fillStyle='#ffdc2e'; 
      ctx.beginPath(); ctx.arc(s*0.12 + Math.sin(time*0.02)*2, -s*0.74, 6+Math.sin(time*0.05)*2,0,Math.PI*2); ctx.fill();
    }else{
      // colorful body
      ctx.fillStyle=f.def.color;
      ctx.strokeStyle=f.def.dark; ctx.lineWidth=4;
      // fat rounded shape with slight squash for each emoji type
      if(f.def.emoji==='🍌'){
        ctx.beginPath();
        ctx.ellipse(0,0,s*0.52,s*0.28, Math.sin(f.wobble)*0.12,0,Math.PI*2);
        ctx.fill(); ctx.stroke();
      }else{
        ctx.beginPath();
        ctx.arc(0,0,s*0.42,0,Math.PI*2);
        ctx.fill(); ctx.stroke();
      }
      // highlight
      ctx.fillStyle='rgba(255,255,255,0.55)';
      ctx.beginPath(); ctx.ellipse(-s*0.12,-s*0.14,s*0.18,s*0.12, -0.3,0,Math.PI*2); ctx.fill();

      // face (kid friendly)
      const faceScale = s/52;
      ctx.fillStyle='#2b2b2b';
      ctx.beginPath(); ctx.arc(-s*0.12, -s*0.04, 3.2*faceScale,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(s*0.12, -s*0.04, 3.2*faceScale,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='#2b2b2b'; ctx.lineWidth=2.5*faceScale; ctx.lineCap='round';
      ctx.beginPath(); ctx.arc(0, s*0.08, s*0.13*faceScale, 0.15, Math.PI-0.15); ctx.stroke();

      // emoji overlay for extra cuteness and size
      ctx.font = `${Math.round(s*0.62)}px Apple Color Emoji, Segoe UI Emoji, Noto Color Emoji`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(f.def.emoji, 0, s*0.02);
    }

    // golden glow
    if(f.def.golden){
      ctx.globalCompositeOperation='lighter';
      ctx.strokeStyle='rgba(255,235,80,0.9)'; ctx.lineWidth=3;
      ctx.beginPath(); ctx.arc(0,0,s*0.52+4,0,Math.PI*2); ctx.stroke();
      ctx.strokeStyle='rgba(255,255,255,0.8)'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.arc(0,0,s*0.58+6,0,Math.PI*2); ctx.stroke();
      ctx.globalCompositeOperation='source-over';
    }

    ctx.restore();
  }

  function render(){
    // clear
    ctx.clearRect(0,0,W,H);

    // ground hint
    const groundH=24;
    ctx.fillStyle='rgba(92, 199, 84, 0.18)';
    ctx.fillRect(0, H-groundH, W, groundH);
    ctx.fillStyle='rgba(43,43,43,0.08)';
    ctx.fillRect(0, H-groundH, W, 4);

    // fruits
    fruits.forEach(drawFruit);

    // basket
    drawBasket();

    // particles
    particles.forEach(p=>{
      ctx.save(); ctx.globalAlpha=Math.max(0,p.life);
      if(p.type==='ring'){
        ctx.strokeStyle=p.color; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.stroke();
      }else if(p.type==='splat'){
        ctx.fillStyle=p.color; ctx.beginPath(); ctx.ellipse(p.x,p.y,p.r,p.r*p.stretch,0,0,Math.PI*2); ctx.fill();
      }else{
        ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
      }
      ctx.restore();
    });
  }

  function startGame(){
    resetGame();
    state='playing';
    startOverlay.classList.add('hidden');
    gameoverOverlay.classList.add('hidden');
    pauseOverlay.classList.add('hidden');
    sounds.start();
    last=0;
  }
  function endGame(){
    state='over';
    const isNew = score>best;
    if(isNew){ best=score; localStorage.setItem('ff_best', best); }
    finalText.textContent = `You caught ${totalCaught} fruity friends! Score: ${score}`;
    newBestEl.style.display = isNew ? 'block' : 'none';
    gameoverOverlay.classList.remove('hidden');
    bestEl.textContent=best;
    sounds.gameover();
  }
  function togglePause(){
    if(state==='playing'){ state='paused'; pauseOverlay.classList.remove('hidden'); }
    else if(state==='paused'){ state='playing'; pauseOverlay.classList.add('hidden'); last=0; }
  }

  // Buttons
  document.getElementById('playBtn').addEventListener('click', startGame);
  document.getElementById('againBtn').addEventListener('click', startGame);
  document.getElementById('homeBtn').addEventListener('click', ()=>{
    state='idle';
    gameoverOverlay.classList.add('hidden');
    startOverlay.classList.remove('hidden');
  });
  pauseBtn.addEventListener('click', togglePause);
  document.getElementById('resumeBtn').addEventListener('click', togglePause);

  // init
  initLives(); bestEl.textContent=best;
  function boot(){
    resize();
    basket.x=W/2; basket.targetX=W/2; basket.y=H-56;
    basket.w=Math.max(120, Math.min(164, W*0.32));
    initLives();
    requestAnimationFrame(loop);
  }
  window.addEventListener('resize', ()=>{ resize(); basket.w=Math.max(120, Math.min(164, W*0.32)); });
  boot();

  // prevent scrolling
  document.body.addEventListener('touchmove', e=>{ e.preventDefault(); }, {passive:false});
})();
</script>
</body>
</html>
