<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Equation Solver Tool</title>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;0,8..60,700;1,8..60,400;1,8..60,500&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a1a;
    --ink-muted: #5c5c5c;
    --ink-faint: #8a8a8a;
    --paper: #faf9f7;
    --paper-elevated: #ffffff;
    --rule: #e4e1db;
    --rule-strong: #d0cbc2;
    --accent: #1e3a5f;
    --accent-soft: #e8eef5;
    --accent-hover: #152c48;
    --success: #1a4d3e;
    --success-bg: #eef6f3;
    --warn: #6b4c1e;
    --warn-bg: #faf6ee;
    --error: #6b2c2c;
    --error-bg: #faf0f0;
    --step-bg: #f5f3ef;
    --shadow-sm: 0 1px 2px rgba(26,26,26,0.04);
    --shadow-md: 0 2px 8px rgba(26,26,26,0.06), 0 1px 2px rgba(26,26,26,0.04);
    --shadow-lg: 0 8px 24px rgba(26,26,26,0.08), 0 2px 6px rgba(26,26,26,0.04);
    --radius: 6px;
    --font-serif: 'Source Serif 4', 'Georgia', 'Times New Roman', serif;
    --font-sans: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-mono: 'IBM Plex Mono', 'Menlo', 'Consolas', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { font-size: 16px; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

  body {
    font-family: var(--font-sans);
    background: var(--paper);
    color: var(--ink);
    line-height: 1.6;
    min-height: 100vh;
  }

  /* Header */
  header {
    border-bottom: 1px solid var(--rule);
    background: var(--paper-elevated);
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(8px);
    background: rgba(255,255,255,0.92);
  }

  .header-inner {
    max-width: 820px;
    margin: 0 auto;
    padding: 1.1rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .brand-mark {
    width: 32px;
    height: 32px;
    border: 1.5px solid var(--accent);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-serif);
    font-weight: 600;
    font-size: 1.1rem;
    color: var(--accent);
    font-style: italic;
  }

  .brand-text h1 {
    font-family: var(--font-serif);
    font-size: 1.15rem;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--ink);
    line-height: 1.2;
  }

  .brand-text p {
    font-size: 0.7rem;
    color: var(--ink-faint);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    font-weight: 500;
  }

  .header-actions {
    display: flex;
    gap: 0.5rem;
  }

  /* Main */
  main {
    max-width: 820px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem 4rem;
  }

  /* Intro */
  .intro {
    margin-bottom: 2rem;
    text-align: center;
  }

  .intro h2 {
    font-family: var(--font-serif);
    font-size: 1.75rem;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--ink);
    margin-bottom: 0.5rem;
  }

  .intro p {
    color: var(--ink-muted);
    font-size: 0.95rem;
    max-width: 480px;
    margin: 0 auto;
  }

  /* Input card */
  .input-card {
    background: var(--paper-elevated);
    border: 1px solid var(--rule);
    border-radius: 8px;
    box-shadow: var(--shadow-md);
    padding: 1.5rem;
    margin-bottom: 1.5rem;
  }

  .input-label {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.65rem;
  }

  .input-label span {
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    color: var(--ink-muted);
  }

  .input-hint {
    font-size: 0.75rem;
    color: var(--ink-faint);
    font-family: var(--font-mono);
  }

  .eq-input-wrap {
    position: relative;
  }

  #equation-input {
    width: 100%;
    font-family: var(--font-mono);
    font-size: 1.15rem;
    padding: 0.9rem 1rem;
    border: 1.5px solid var(--rule-strong);
    border-radius: var(--radius);
    background: var(--paper);
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
    letter-spacing: 0.01em;
  }

  #equation-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(30,58,95,0.1);
    background: var(--paper-elevated);
  }

  #equation-input::placeholder {
    color: var(--ink-faint);
    font-family: var(--font-mono);
  }

  .input-actions {
    display: flex;
    gap: 0.6rem;
    margin-top: 1rem;
    align-items: center;
  }

  .btn {
    font-family: var(--font-sans);
    font-size: 0.875rem;
    font-weight: 500;
    padding: 0.6rem 1.2rem;
    border-radius: var(--radius);
    border: none;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    line-height: 1.4;
  }

  .btn:active { transform: scale(0.98); }

  .btn-primary {
    background: var(--accent);
    color: #fff;
    box-shadow: var(--shadow-sm);
  }

  .btn-primary:hover { background: var(--accent-hover); }

  .btn-secondary {
    background: transparent;
    color: var(--ink-muted);
    border: 1px solid var(--rule-strong);
  }

  .btn-secondary:hover {
    background: var(--step-bg);
    color: var(--ink);
  }

  .btn-ghost {
    background: transparent;
    color: var(--ink-muted);
    padding: 0.5rem 0.75rem;
    font-size: 0.8rem;
  }

  .btn-ghost:hover { color: var(--ink); background: var(--step-bg); }

  .btn svg {
    width: 15px;
    height: 15px;
    flex-shrink: 0;
  }

  .solver-select {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .solver-select label {
    font-size: 0.75rem;
    color: var(--ink-faint);
    font-weight: 500;
  }

  .solver-select select {
    font-family: var(--font-sans);
    font-size: 0.8rem;
    padding: 0.4rem 0.6rem;
    border: 1px solid var(--rule-strong);
    border-radius: 4px;
    background: var(--paper);
    color: var(--ink);
    outline: none;
    cursor: pointer;
  }

  .solver-select select:focus {
    border-color: var(--accent);
  }

  /* Examples */
  .examples {
    margin-top: 1rem;
    padding-top: 1rem;
    border-top: 1px solid var(--rule);
  }

  .examples-label {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 0.5rem;
  }

  .example-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
  }

  .chip {
    font-family: var(--font-mono);
    font-size: 0.75rem;
    padding: 0.3rem 0.65rem;
    background: var(--step-bg);
    border: 1px solid var(--rule);
    border-radius: 100px;
    color: var(--ink-muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .chip:hover {
    background: var(--accent-soft);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Results */
  .results {
    display: none;
  }

  .results.visible {
    display: block;
    animation: fadeUp 0.35s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-card {
    background: var(--paper-elevated);
    border: 1px solid var(--rule);
    border-radius: 8px;
    box-shadow: var(--shadow-md);
    overflow: hidden;
    margin-bottom: 1.5rem;
  }

  .result-header {
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--rule);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--paper);
  }

  .result-header h3 {
    font-family: var(--font-serif);
    font-size: 1rem;
    font-weight: 600;
    color: var(--ink);
  }

  .result-meta {
    display: flex;
    gap: 0.5rem;
    align-items: center;
  }

  .badge {
    font-size: 0.7rem;
    font-weight: 600;
    padding: 0.2rem 0.55rem;
    border-radius: 100px;
    letter-spacing: 0.02em;
  }

  .badge-type {
    background: var(--accent-soft);
    color: var(--accent);
  }

  .badge-ok {
    background: var(--success-bg);
    color: var(--success);
  }

  .badge-warn {
    background: var(--warn-bg);
    color: var(--warn);
  }

  .badge-err {
    background: var(--error-bg);
    color: var(--error);
  }

  /* Equation display */
  .eq-display {
    padding: 1.5rem;
    text-align: center;
    border-bottom: 1px solid var(--rule);
    background: var(--paper);
  }

  .eq-display .mathjax-eq {
    font-size: 1.3rem;
  }

  /* Solution box */
  .solution-box {
    padding: 1.25rem 1.5rem;
    background: var(--success-bg);
    border-bottom: 1px solid var(--rule);
    display: flex;
    align-items: flex-start;
    gap: 1rem;
  }

  .solution-box.error {
    background: var(--error-bg);
  }

  .solution-icon {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--success);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .solution-box.error .solution-icon {
    background: var(--error);
  }

  .solution-icon svg { width: 14px; height: 14px; }

  .solution-content h4 {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--success);
    margin-bottom: 0.35rem;
  }

  .solution-box.error .solution-content h4 { color: var(--error); }

  .solution-value {
    font-family: var(--font-serif);
    font-size: 1.25rem;
    font-weight: 600;
    color: var(--ink);
  }

  .solution-value .alt-solutions {
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--ink-muted);
    margin-top: 0.3rem;
  }

  /* Steps */
  .steps-section {
    padding: 1.5rem;
  }

  .steps-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.25rem;
  }

  .steps-header h3 {
    font-family: var(--font-serif);
    font-size: 1.05rem;
    font-weight: 600;
  }

  .step {
    display: flex;
    gap: 1rem;
    margin-bottom: 0;
    position: relative;
  }

  .step:not(:last-child) {
    padding-bottom: 1.25rem;
  }

  .step:not(:last-child)::before {
    content: '';
    position: absolute;
    left: 13px;
    top: 28px;
    bottom: 0;
    width: 1.5px;
    background: var(--rule);
  }

  .step-num {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--accent-soft);
    color: var(--accent);
    font-size: 0.75rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }

  .step:last-child .step-num {
    background: var(--success);
    color: #fff;
  }

  .step-body {
    flex: 1;
    min-width: 0;
    padding-top: 2px;
  }

  .step-title {
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 0.35rem;
  }

  .step-desc {
    font-size: 0.85rem;
    color: var(--ink-muted);
    margin-bottom: 0.5rem;
    line-height: 1.55;
  }

  .step-math {
    background: var(--step-bg);
    border: 1px solid var(--rule);
    border-radius: var(--radius);
    padding: 0.75rem 1rem;
    font-size: 1.05rem;
    overflow-x: auto;
  }

  .step-math .MathJax { font-size: 1.05em !important; }

  /* Verification */
  .verify-section {
    padding: 1.25rem 1.5rem;
    border-top: 1px solid var(--rule);
    background: var(--paper);
  }

  .verify-section h4 {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 0.6rem;
  }

  .verify-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    font-size: 0.9rem;
  }

  .verify-check {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--success);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .verify-check svg { width: 11px; height: 11px; }

  .verify-check.fail { background: var(--error); }

  .verify-text { color: var(--ink-muted); }
  .verify-text strong { color: var(--ink); font-weight: 600; }

  /* Export bar */
  .export-bar {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    padding: 1rem 1.5rem;
    border-top: 1px solid var(--rule);
    background: var(--paper);
  }

  /* Empty / Error states */
  .empty-state {
    text-align: center;
    padding: 3rem 1.5rem;
    color: var(--ink-faint);
  }

  .empty-state svg {
    width: 40px;
    height: 40px;
    margin-bottom: 0.75rem;
    opacity: 0.4;
  }

  .empty-state p {
    font-size: 0.9rem;
  }

  /* History */
  .history-section {
    margin-top: 2rem;
  }

  .history-section h3 {
    font-family: var(--font-serif);
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 0.75rem;
    color: var(--ink);
  }

  .history-list {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }

  .history-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.65rem 1rem;
    background: var(--paper-elevated);
    border: 1px solid var(--rule);
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.15s;
  }

  .history-item:hover {
    border-color: var(--accent);
    background: var(--accent-soft);
  }

  .history-eq {
    font-family: var(--font-mono);
    font-size: 0.85rem;
    color: var(--ink);
  }

  .history-result {
    font-size: 0.8rem;
    color: var(--ink-muted);
    font-family: var(--font-serif);
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink);
    color: #fff;
    padding: 0.65rem 1.25rem;
    border-radius: 100px;
    font-size: 0.85rem;
    font-weight: 500;
    opacity: 0;
    transition: all 0.3s ease;
    z-index: 1000;
    pointer-events: none;
    box-shadow: var(--shadow-lg);
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Footer */
  footer {
    text-align: center;
    padding: 2rem 1.5rem;
    border-top: 1px solid var(--rule);
    color: var(--ink-faint);
    font-size: 0.75rem;
  }

  footer span {
    font-family: var(--font-serif);
    font-style: italic;
  }

  /* MathJax overrides */
  mjx-container { display: inline-block !important; }

  /* Print / export styles */
  @media print {
    header, .input-card, .export-bar, .history-section, footer, .examples { display: none !important; }
    body { background: #fff; }
    .result-card { box-shadow: none; border: 1px solid #ccc; }
    .results { display: block !important; }
  }

  /* Responsive */
  @media (max-width: 600px) {
    .intro h2 { font-size: 1.4rem; }
    .input-actions { flex-wrap: wrap; }
    .solver-select { margin-left: 0; width: 100%; }
    .header-inner { padding: 0.9rem 1rem; }
    main { padding: 1.5rem 1rem 3rem; }
    .eq-display { padding: 1rem; }
    #equation-input { font-size: 1rem; }
  }

  /* Keyboard shortcut hint */
  .kbd {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    background: var(--step-bg);
    border: 1px solid var(--rule-strong);
    border-radius: 3px;
    padding: 0.1rem 0.35rem;
    color: var(--ink-faint);
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="brand">
      <div class="brand-mark">∑</div>
      <div class="brand-text">
        <h1>Equation Solver</h1>
        <p>Mathematical Analysis Tool</p>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn btn-ghost" id="btn-clear-all" title="Clear all">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6h14z"/></svg>
        Clear
      </button>
    </div>
  </div>
</header>

<main>
  <div class="intro">
    <h2>Solve & Explain</h2>
    <p>Enter an algebraic equation to receive a rigorous step-by-step solution with verification.</p>
  </div>

  <div class="input-card">
    <div class="input-label">
      <span>Equation</span>
      <span class="input-hint">e.g. 2x + 5 = 13</span>
    </div>
    <div class="eq-input-wrap">
      <input
        type="text"
        id="equation-input"
        placeholder="Enter equation…"
        autocomplete="off"
        spellcheck="false"
        aria-label="Equation input"
      >
    </div>
    <div class="input-actions">
      <button class="btn btn-primary" id="btn-solve">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        Solve
        <span class="kbd" style="margin-left:4px;background:rgba(255,255,255,0.15);border-color:rgba(255,255,255,0.2);color:rgba(255,255,255,0.7)">↵</span>
      </button>
      <button class="btn btn-secondary" id="btn-clear-input">Clear</button>
      <div class="solver-select">
        <label for="var-select">Variable</label>
        <select id="var-select">
          <option value="auto">Auto</option>
          <option value="x">x</option>
          <option value="y">y</option>
          <option value="z">z</option>
          <option value="t">t</option>
          <option value="n">n</option>
          <option value="a">a</option>
        </select>
      </div>
    </div>
    <div class="examples">
      <div class="examples-label">Examples</div>
      <div class="example-chips">
        <button class="chip" data-eq="2x + 5 = 13">2x + 5 = 13</button>
        <button class="chip" data-eq="3(x - 2) = 15">3(x - 2) = 15</button>
        <button class="chip" data-eq="x^2 - 5x + 6 = 0">x² − 5x + 6 = 0</button>
        <button class="chip" data-eq="2x^2 + 3x - 2 = 0">2x² + 3x − 2 = 0</button>
        <button class="chip" data-eq="(x+1)/3 = 4"> (x+1)/3 = 4</button>
        <button class="chip" data-eq="5x - 2 = 3x + 8">5x − 2 = 3x + 8</button>
        <button class="chip" data-eq="x^2 = 49">x² = 49</button>
        <button class="chip" data-eq="|2x - 4| = 6">|2x − 4| = 6</button>
        <button class="chip" data-eq="1/x + 1/2 = 3">1/x + 1/2 = 3</button>
        <button class="chip" data-eq="sqrt(x + 3) = 5">√(x+3) = 5</button>
      </div>
    </div>
  </div>

  <div class="results" id="results">
    <div class="result-card" id="result-card">
      <!-- Populated by JS -->
    </div>
  </div>

  <div class="history-section" id="history-section" style="display:none">
    <h3>Recent Solutions</h3>
    <div class="history-list" id="history-list"></div>
  </div>
</main>

<footer>
  <span>Equation Solver Tool</span> — algebraic analysis for linear, quadratic & radical equations
</footer>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════
//  EQUATION SOLVER TOOL
//  Self-contained algebraic equation solver with steps
// ═══════════════════════════════════════════════════════════

const MathJaxConfig = {
  tex: { inlineMath: [['\\(','\\)']], displayMath: [['\\[','\\]']] },
  svg: { fontCache: 'global' }
};
window.MathJax = MathJaxConfig;

// ─── Helpers ───────────────────────────────────────────────

function toast(msg, duration = 2200) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), duration);
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function formatNum(n, places = 6) {
  if (typeof n !== 'number' || !isFinite(n)) return String(n);
  if (Number.isInteger(n)) return String(n);
  // Try rational approximation for nice fractions
  const frac = toFraction(n);
  if (frac && frac.den <= 64) {
    if (frac.num < 0) return `-\\frac{${Math.abs(frac.num)}}{${frac.den}}`;
    return `\\frac{${frac.num}}{${frac.den}}`;
  }
  const r = Math.round(n * 1e10) / 1e10;
  if (Number.isInteger(r)) return String(r);
  return parseFloat(n.toFixed(places)).toString();
}

function toFraction(x, tol = 1e-9) {
  if (!isFinite(x)) return null;
  const sign = x < 0 ? -1 : 1;
  x = Math.abs(x);
  let h1 = 1, h2 = 0, k1 = 0, k2 = 1, b = x;
  do {
    const a = Math.floor(b);
    let aux = h1; h1 = a * h1 + h2; h2 = aux;
    aux = k1; k1 = a * k1 + k2; k2 = aux;
    b = 1 / (b - a);
  } while (Math.abs(x - h1 / k1) > x * tol && k1 < 10000);
  if (k1 === 0 || k1 > 10000) return null;
  return { num: sign * h1, den: k1 };
}

function prettyNum(n) {
  // Return display-ready LaTeX number
  return formatNum(n);
}

function gcd(a, b) {
  a = Math.abs(a); b = Math.abs(b);
  while (b) { [a, b] = [b, a % b]; }
  return a;
}

function simplifyRadical(n) {
  // COEFF * sqrt(RAD) form
  if (n < 0) return null;
  if (n === 0) return { coeff: 0, rad: 1 };
  let coeff = 1;
  let rad = n;
  for (let i = Math.floor(Math.sqrt(n)); i >= 2; i--) {
    if (rad % (i * i) === 0) {
      coeff *= i;
      rad /= (i * i);
    }
  }
  return { coeff, rad };
}

function latexSqrt(n) {
  const s = simplifyRadical(Math.abs(n));
  if (!s) return prettyNum(n);
  if (s.rad === 1) return prettyNum(s.coeff * (n < 0 ? -1 : 1));
  if (s.coeff === 1) return (n < 0 ? '-' : '') + `\\sqrt{${s.rad}}`;
  return (n < 0 ? '-' : '') + `${s.coeff}\\sqrt{${s.rad}}`;
}

// ─── Tokenizer / Parser ────────────────────────────────────

function normalizeInput(str) {
  // Protect function names from implicit-multiplication rewrites
  const funcs = ['sqrt', 'abs', 'sin', 'cos', 'tan', 'log', 'ln', 'exp'];
  let s = str
    .replace(/×/g, '*')
    .replace(/÷/g, '/')
    .replace(/−/g, '-')
    .replace(/–/g, '-')
    .replace(/√\s*\(/g, 'sqrt(')
    .replace(/√\s*([a-zA-Z0-9.]+)/g, 'sqrt($1)')
    .replace(/\|([^|]+)\|/g, 'abs($1)')
    .replace(/\^/g, '**');

  // Insert implicit multiplication carefully
  // digit followed by letter or '('
  s = s.replace(/(\d)([a-zA-Z(])/g, '$1*$2');
  // letter or ')' followed by digit (x2 → x*2)
  s = s.replace(/([a-zA-Z)])(\d)/g, '$1*$2');
  // ')' followed by letter or '('
  s = s.replace(/\)([a-zA-Z(])/g, ')*$1');
  // letter followed by '(' only when NOT a known function
  s = s.replace(/([a-zA-Z]+)(\()/g, (match, name, paren) => {
    if (funcs.includes(name.toLowerCase())) return name + paren;
    return name + '*' + paren;
  });

  s = s.replace(/\s+/g, '');
  s = s.replace(/\*\*/g, '^'); // restore ^ for our parser
  return s;
}

function detectVariable(eq, preferred) {
  if (preferred && preferred !== 'auto') return preferred;
  const vars = eq.match(/[a-zA-Z]/g) || [];
  // Prefer common math vars
  const order = ['x', 'y', 'z', 't', 'n', 'a', 'b', 'c', 'w', 'u', 'v'];
  const found = [...new Set(vars.map(v => v.toLowerCase()).filter(v =>
    !['sqrt', 'abs', 'sin', 'cos', 'tan', 'log', 'ln', 'exp', 'pi'].some(f => f.includes(v) && eq.toLowerCase().includes(f))
  ))];
  // Filter out function names more carefully
  const cleaned = found.filter(v => !['s','q','r','t','a','b','e','p','i','l','n','c','o','g','x'].includes(v) || ['x','y','z','t','n','a','b','c'].includes(v));
  // Better approach: strip known functions then find letters
  let stripped = eq.toLowerCase()
    .replace(/sqrt/g, '')
    .replace(/abs/g, '')
    .replace(/sin/g, '')
    .replace(/cos/g, '')
    .replace(/tan/g, '')
    .replace(/log/g, '')
    .replace(/ln/g, '')
    .replace(/exp/g, '')
    .replace(/pi/g, '');
  const letters = stripped.match(/[a-z]/g) || [];
  const unique = [...new Set(letters)];
  for (const v of order) {
    if (unique.includes(v)) return v;
  }
  return unique[0] || 'x';
}

// ─── Expression evaluator (safe) ───────────────────────────

function compileExpr(expr, variable) {
  // Convert to JS-evaluable form
  let js = expr
    .replace(/\^/g, '**')
    .replace(/sqrt\(/g, 'Math.sqrt(')
    .replace(/abs\(/g, 'Math.abs(')
    .replace(/sin\(/g, 'Math.sin(')
    .replace(/cos\(/g, 'Math.cos(')
    .replace(/tan\(/g, 'Math.tan(')
    .replace(/log\(/g, 'Math.log10(')
    .replace(/ln\(/g, 'Math.log(')
    .replace(/exp\(/g, 'Math.exp(')
    .replace(/pi/gi, 'Math.PI');

  // Implicit multiplication already handled
  // Replace variable with a parameter
  const re = new RegExp('\\b' + variable + '\\b', 'g');
  js = js.replace(re, '_v');

  try {
    // eslint-disable-next-line no-new-func
    const fn = new Function('_v', `"use strict"; return (${js});`);
    // Test
    fn(0);
    return fn;
  } catch (e) {
    return null;
  }
}

function evalExpr(expr, variable, value) {
  const fn = compileExpr(expr, variable);
  if (!fn) return NaN;
  try { return fn(value); } catch { return NaN; }
}

// ─── Polynomial extraction ─────────────────────────────────

function extractPolynomial(expr, variable) {
  // Evaluate at enough points to get coefficients via finite differences / Lagrange
  // For degrees up to 4
  const fn = compileExpr(expr, variable);
  if (!fn) return null;

  // Test if polynomial by checking higher differences
  const pts = [-3, -2, -1, 0, 1, 2, 3, 4, 5];
  const vals = pts.map(p => {
    try { return fn(p); } catch { return NaN; }
  });
  if (vals.some(v => !isFinite(v))) return null;

  // Fit polynomial of degree ≤ 4 using normal equations (Vandermonde least squares)
  // Or use finite differences at 0 for Taylor
  // Simple approach: evaluate derivatives numerically at 0 for monomial coeffs
  // Better: Lagrange / direct Vandermonde solve for deg 0..4

  const maxDeg = 4;
  // Use points 0..maxDeg
  const n = maxDeg + 1;
  const xp = [];
  const yp = [];
  for (let i = 0; i < n; i++) {
    xp.push(i - 2);
    try { yp.push(fn(i - 2)); } catch { return null; }
  }
  if (yp.some(v => !isFinite(v))) return null;

  // Solve Vandermonde system for coeffs [c0, c1, ..., cD] where p(x)=c0+c1*x+...
  const A = [];
  for (let i = 0; i < n; i++) {
    const row = [];
    let p = 1;
    for (let j = 0; j < n; j++) {
      row.push(p);
      p *= xp[i];
    }
    A.push(row);
  }
  const coeffs = gaussianSolve(A, yp);
  if (!coeffs) return null;

  // Round near-integers
  const rounded = coeffs.map(c => {
    const r = Math.round(c);
    if (Math.abs(c - r) < 1e-8) return r;
    const r2 = Math.round(c * 1e6) / 1e6;
    return r2;
  });

  // Verify
  for (const p of pts) {
    let predicted = 0;
    let pw = 1;
    for (const c of rounded) {
      predicted += c * pw;
      pw *= p;
    }
    const actual = fn(p);
    if (Math.abs(predicted - actual) > 1e-6 * (1 + Math.abs(actual))) {
      // Not a clean polynomial (or high degree)
      return null;
    }
  }

  // Trim leading zeros
  while (rounded.length > 1 && Math.abs(rounded[rounded.length - 1]) < 1e-12) rounded.pop();
  return rounded; // [c0, c1, c2, ...]  p(x) = sum ci * x^i
}

function gaussianSolve(A, b) {
  const n = A.length;
  const M = A.map((row, i) => [...row, b[i]]);
  for (let col = 0; col < n; col++) {
    // Pivot
    let maxRow = col;
    for (let r = col + 1; r < n; r++) {
      if (Math.abs(M[r][col]) > Math.abs(M[maxRow][col])) maxRow = r;
    }
    [M[col], M[maxRow]] = [M[maxRow], M[col]];
    if (Math.abs(M[col][col]) < 1e-12) return null;
    for (let r = col + 1; r < n; r++) {
      const f = M[r][col] / M[col][col];
      for (let c = col; c <= n; c++) M[r][c] -= f * M[col][c];
    }
  }
  const x = new Array(n).fill(0);
  for (let i = n - 1; i >= 0; i--) {
    let s = M[i][n];
    for (let j = i + 1; j < n; j++) s -= M[i][j] * x[j];
    x[i] = s / M[i][i];
  }
  return x;
}

// ─── Equation classification & solvers ─────────────────────

function parseEquation(raw) {
  const eq = raw.trim();
  if (!eq) return { error: 'Please enter an equation.' };
  if (!eq.includes('=')) return { error: 'Equation must contain an equals sign (=).' };

  const parts = eq.split('=');
  if (parts.length !== 2) return { error: 'Equation must have exactly one equals sign.' };

  const left = parts[0].trim();
  const right = parts[1].trim();
  if (!left || !right) return { error: 'Both sides of the equation must be non-empty.' };

  return { left, right, raw: eq };
}

// Convert expression to readable LaTeX
function toLatex(expr) {
  let s = expr
    .replace(/\*\*/g, '^')
    .replace(/\*/g, '\\cdot ')
    .replace(/sqrt\(([^)]+)\)/g, '\\sqrt{$1}')
    .replace(/abs\(([^)]+)\)/g, '\\left|$1\\right|')
    .replace(/\^(\d+)/g, '^{$1}')
    .replace(/\^(\([^)]+\))/g, '^{$1}')
    .replace(/(\d+)\/(\d+)/g, '\\frac{$1}{$2}')
    .replace(/pi/gi, '\\pi');
  return s;
}

function polyToLatex(coeffs, variable) {
  // coeffs[i] is coeff of x^i
  const terms = [];
  for (let i = coeffs.length - 1; i >= 0; i--) {
    const c = coeffs[i];
    if (Math.abs(c) < 1e-12) continue;
    let t = '';
    const absC = Math.abs(c);
    const sign = c < 0 ? '-' : (terms.length ? '+' : '');
    if (i === 0) {
      t = prettyNum(absC);
    } else if (i === 1) {
      t = absC === 1 ? variable : `${prettyNum(absC)}${variable}`;
    } else {
      t = absC === 1 ? `${variable}^{${i}}` : `${prettyNum(absC)}${variable}^{${i}}`;
    }
    terms.push((sign ? sign + ' ' : '') + t);
  }
  if (!terms.length) return '0';
  return terms.join(' ');
}

// ─── Linear solver ─────────────────────────────────────────

function solveLinear(leftPoly, rightPoly, variable) {
  // Bring to left: (left - right) = 0
  const maxLen = Math.max(leftPoly.length, rightPoly.length);
  const diff = [];
  for (let i = 0; i < maxLen; i++) {
    const l = leftPoly[i] || 0;
    const r = rightPoly[i] || 0;
    diff.push(l - r);
  }
  // diff = [c0, c1] for linear  c1*x + c0 = 0
  const c0 = diff[0] || 0;
  const c1 = diff[1] || 0;

  const steps = [];

  steps.push({
    title: 'Write the equation in standard form',
    desc: `Move all terms to one side to obtain an equation equal to zero.`,
    math: `${polyToLatex(leftPoly, variable)} - \\left(${polyToLatex(rightPoly, variable)}\\right) = 0`
  });

  // Simplify
  steps.push({
    title: 'Combine like terms',
    desc: `Collect constant terms and coefficients of ${variable}.`,
    math: polyToLatex(diff, variable) + ' = 0'
  });

  if (Math.abs(c1) < 1e-12) {
    if (Math.abs(c0) < 1e-12) {
      return {
        type: 'Linear (Identity)',
        solutions: ['all real numbers'],
        steps: [...steps, {
          title: 'Identify identity',
          desc: 'The equation simplifies to 0 = 0, which is true for every real number.',
          math: '0 = 0'
        }],
        infinite: true
      };
    }
    return {
      type: 'Linear (Contradiction)',
      solutions: [],
      steps: [...steps, {
        title: 'Identify contradiction',
        desc: `The equation simplifies to a false statement: ${prettyNum(c0)} = 0.`,
        math: `${prettyNum(c0)} = 0`
      }],
      noSolution: true
    };
  }

  // Isolate variable term
  steps.push({
    title: `Isolate the ${variable}-term`,
    desc: `Subtract the constant term from both sides.`,
    math: `${prettyNum(c1)}${variable} = ${prettyNum(-c0)}`
  });

  const sol = -c0 / c1;

  steps.push({
    title: `Solve for ${variable}`,
    desc: `Divide both sides by the coefficient of ${variable}.`,
    math: `${variable} = \\dfrac{${prettyNum(-c0)}}{${prettyNum(c1)}} = ${prettyNum(sol)}`
  });

  return {
    type: 'Linear',
    solutions: [sol],
    steps,
    poly: diff
  };
}

// ─── Quadratic solver ──────────────────────────────────────

function solveQuadratic(leftPoly, rightPoly, variable) {
  const maxLen = Math.max(leftPoly.length, rightPoly.length, 3);
  const diff = [];
  for (let i = 0; i < maxLen; i++) {
    diff.push((leftPoly[i] || 0) - (rightPoly[i] || 0));
  }
  // ax² + bx + c = 0
  const c = diff[0] || 0;
  const b = diff[1] || 0;
  const a = diff[2] || 0;

  const steps = [];

  steps.push({
    title: 'Rearrange into standard form',
    desc: `Write the equation as \( ax^2 + bx + c = 0 \).`,
    math: `${polyToLatex(leftPoly, variable)} = ${polyToLatex(rightPoly, variable)}`
  });

  steps.push({
    title: 'Bring all terms to one side',
    desc: 'Subtract the right-hand side from the left-hand side.',
    math: `${polyToLatex(diff, variable)} = 0`
  });

  if (Math.abs(a) < 1e-12) {
    // Degenerate to linear
    return solveLinear([c, b], [0], variable);
  }

  steps.push({
    title: 'Identify coefficients',
    desc: `In the form \( a${variable}^2 + b${variable} + c = 0 \):`,
    math: `a = ${prettyNum(a)}, \\quad b = ${prettyNum(b)}, \\quad c = ${prettyNum(c)}`
  });

  const disc = b * b - 4 * a * c;

  steps.push({
    title: 'Compute the discriminant',
    desc: 'The discriminant \( \\Delta = b^2 - 4ac \) determines the number and nature of roots.',
    math: `\\Delta = (${prettyNum(b)})^2 - 4(${prettyNum(a)})(${prettyNum(c)}) = ${prettyNum(disc)}`
  });

  if (disc < -1e-12) {
    // Complex roots
    const real = -b / (2 * a);
    const imag = Math.sqrt(-disc) / (2 * a);
    steps.push({
      title: 'Discriminant is negative',
      desc: 'No real solutions. The equation has two complex conjugate roots.',
      math: `${variable} = \\dfrac{${prettyNum(-b)} \\pm \\sqrt{${prettyNum(disc)}}}{${prettyNum(2 * a)}}`
    });
    steps.push({
      title: 'Express complex roots',
      desc: 'Write in the form \( p \\pm qi \).',
      math: `${variable} = ${prettyNum(real)} \\pm ${prettyNum(Math.abs(imag))}i`
    });
    return {
      type: 'Quadratic (Complex roots)',
      solutions: [
        { re: real, im: imag },
        { re: real, im: -imag }
      ],
      complex: true,
      steps,
      poly: [c, b, a]
    };
  }

  if (Math.abs(disc) < 1e-12) {
    const sol = -b / (2 * a);
    steps.push({
      title: 'Discriminant is zero',
      desc: 'There is exactly one real solution (a repeated root).',
      math: `${variable} = \\dfrac{${prettyNum(-b)}}{2 \\cdot ${prettyNum(a)}} = ${prettyNum(sol)}`
    });
    return {
      type: 'Quadratic (Repeated root)',
      solutions: [sol],
      steps,
      poly: [c, b, a]
    };
  }

  // Two real roots
  const sqrtD = Math.sqrt(disc);
  const s1 = (-b + sqrtD) / (2 * a);
  const s2 = (-b - sqrtD) / (2 * a);

  // Try factoring first
  const factorAttempt = tryFactor(a, b, c, variable);
  if (factorAttempt) {
    steps.push({
      title: 'Factor the quadratic',
      desc: 'Express as a product of linear factors.',
      math: factorAttempt.latex + ' = 0'
    });
    steps.push({
      title: 'Apply the zero-product property',
      desc: 'Set each factor equal to zero and solve.',
      math: factorAttempt.zeroes
    });
  } else {
    steps.push({
      title: 'Apply the quadratic formula',
      desc: `\\[ ${variable} = \\frac{-b \\pm \\sqrt{b^2 - 4ac}}{2a} \\]`,
      math: `${variable} = \\dfrac{${prettyNum(-b)} \\pm \\sqrt{${prettyNum(disc)}}}{${prettyNum(2 * a)}}`
    });
  }

  // Simplify exact form
  let exact1, exact2;
  const sr = simplifyRadical(disc);
  if (sr && sr.rad !== disc) {
    // Can simplify
    const den = 2 * a;
    const g1 = gcd(gcd(Math.abs(-b + (sr.coeff)), Math.abs(den)), sr.coeff > 1 ? sr.coeff : 1);
    // just present nicely
    if (sr.rad === 1) {
      exact1 = prettyNum(s1);
      exact2 = prettyNum(s2);
    } else {
      const g = gcd(gcd(Math.abs(-b), Math.abs(den)), sr.coeff);
      if (g > 1) {
        exact1 = `\\dfrac{${(-b)/g} + ${sr.coeff/g}\\sqrt{${sr.rad}}}{${den/g}}`;
        exact2 = `\\dfrac{${(-b)/g} - ${sr.coeff/g}\\sqrt{${sr.rad}}}{${den/g}}`;
      } else {
        exact1 = `\\dfrac{${prettyNum(-b)} + ${sr.coeff === 1 ? '' : sr.coeff}\\sqrt{${sr.rad}}}{${prettyNum(den)}}`;
        exact2 = `\\dfrac{${prettyNum(-b)} - ${sr.coeff === 1 ? '' : sr.coeff}\\sqrt{${sr.rad}}}{${prettyNum(den)}}`;
      }
    }
  }

  steps.push({
    title: 'Evaluate both roots',
    desc: 'Compute the two real solutions.',
    math: exact1 && exact2 && exact1 !== prettyNum(s1)
      ? `${variable}_1 = ${exact1} \\approx ${prettyNum(s1)}, \\quad ${variable}_2 = ${exact2} \\approx ${prettyNum(s2)}`
      : `${variable}_1 = ${prettyNum(s1)}, \\quad ${variable}_2 = ${prettyNum(s2)}`
  });

  // Sort solutions
  const sols = [s1, s2].sort((a, b) => a - b);

  return {
    type: 'Quadratic',
    solutions: sols,
    steps,
    poly: [c, b, a],
    exact: exact1 ? [exact1, exact2] : null
  };
}

function tryFactor(a, b, c, variable) {
  // Try to find integer factors
  // For ax²+bx+c, seek (px+q)(rx+s) = pr x² + (ps+qr)x + qs
  if (!Number.isInteger(a) || !Number.isInteger(b) || !Number.isInteger(c)) return null;
  if (a === 0) return null;

  const factorsA = integerFactors(a);
  const factorsC = integerFactors(c === 0 ? 0 : c);

  for (const p of factorsA) {
    const r = a / p;
    if (c === 0) {
      // x(ax+b)=0 form
      return {
        latex: `${variable}\\left(${prettyNum(a)}${variable} ${b >= 0 ? '+' : '-'} ${prettyNum(Math.abs(b))}\\right)`,
        zeroes: `${variable} = 0 \\quad\\text{or}\\quad ${variable} = ${prettyNum(-b / a)}`
      };
    }
    for (const q of factorsC) {
      const s = c / q;
      if (p * s + q * r === b) {
        const f1 = formatLinearFactor(p, q, variable);
        const f2 = formatLinearFactor(r, s, variable);
        const z1 = -q / p;
        const z2 = -s / r;
        return {
          latex: `\\left(${f1}\\right)\\left(${f2}\\right)`,
          zeroes: `${f1} = 0 \;\\Rightarrow\; ${variable} = ${prettyNum(z1)} \\qquad ${f2} = 0 \;\\Rightarrow\; ${variable} = ${prettyNum(z2)}`
        };
      }
    }
  }
  return null;
}

function integerFactors(n) {
  if (n === 0) return [0];
  const res = [];
  const abs = Math.abs(n);
  for (let i = 1; i <= abs; i++) {
    if (abs % i === 0) {
      res.push(i, -i);
    }
  }
  return res;
}

function formatLinearFactor(p, q, v) {
  // px + q
  let s = '';
  if (p === 1) s = v;
  else if (p === -1) s = `-${v}`;
  else s = `${p}${v}`;
  if (q > 0) s += ` + ${q}`;
  else if (q < 0) s += ` - ${Math.abs(q)}`;
  return s;
}

// ─── Absolute value solver ─────────────────────────────────

function solveAbsolute(rawLeft, rawRight, variable) {
  // Pattern: |expr| = rhs  or abs(expr) = rhs
  const absMatch = rawLeft.match(/^abs\((.+)\)$/) || rawLeft.match(/^\|(.+)\|$/);
  if (!absMatch) return null;

  const inner = absMatch[1];
  const rhsFn = compileExpr(rawRight, variable);
  if (!rhsFn) return null;

  // RHS should be constant for simple cases
  let rhsVal;
  try { rhsVal = rhsFn(0); } catch { return null; }
  // Check constant
  try {
    if (Math.abs(rhsFn(1) - rhsVal) > 1e-9 || Math.abs(rhsFn(2) - rhsVal) > 1e-9) {
      return null; // non-constant RHS — too complex
    }
  } catch { return null; }

  const steps = [];
  steps.push({
    title: 'Identify absolute-value equation',
    desc: 'An equation of the form \( |f(x)| = k \).',
    math: `|${toLatex(inner)}| = ${prettyNum(rhsVal)}`
  });

  if (rhsVal < 0) {
    steps.push({
      title: 'Analyze the right-hand side',
      desc: 'Absolute value is always non-negative, so it cannot equal a negative number.',
      math: `|\\cdot| \\geq 0 \\neq ${prettyNum(rhsVal)}`
    });
    return { type: 'Absolute Value', solutions: [], steps, noSolution: true };
  }

  if (Math.abs(rhsVal) < 1e-12) {
    steps.push({
      title: 'Right-hand side is zero',
      desc: '\( |f(x)| = 0 \) if and only if \( f(x) = 0 \).',
      math: `${toLatex(inner)} = 0`
    });
    // Solve inner = 0
    const sub = solveGeneral(inner, '0', variable);
    if (sub && sub.steps) {
      steps.push(...sub.steps.map(s => ({ ...s, title: s.title + ' (inner equation)' })));
    }
    return {
      type: 'Absolute Value',
      solutions: sub ? sub.solutions : [],
      steps
    };
  }

  steps.push({
    title: 'Split into two cases',
    desc: `If \( |f| = k \) with \( k > 0 \), then \( f = k \) or \( f = -k \).`,
    math: `${toLatex(inner)} = ${prettyNum(rhsVal)} \\quad \\text{or} \\quad ${toLatex(inner)} = ${prettyNum(-rhsVal)}`
  });

  const case1 = solveGeneral(inner, String(rhsVal), variable);
  const case2 = solveGeneral(inner, String(-rhsVal), variable);

  const sols = [];
  if (case1 && case1.solutions) {
    steps.push({
      title: 'Case 1: positive branch',
      desc: `Solve ${toLatex(inner)} = ${prettyNum(rhsVal)}.`,
      math: case1.solutions.length
        ? case1.solutions.map(s => `${variable} = ${typeof s === 'number' ? prettyNum(s) : s}`).join(', ')
        : '\\text{no solution}'
    });
    sols.push(...case1.solutions.filter(s => typeof s === 'number'));
  }
  if (case2 && case2.solutions) {
    steps.push({
      title: 'Case 2: negative branch',
      desc: `Solve ${toLatex(inner)} = ${prettyNum(-rhsVal)}.`,
      math: case2.solutions.length
        ? case2.solutions.map(s => `${variable} = ${typeof s === 'number' ? prettyNum(s) : s}`).join(', ')
        : '\\text{no solution}'
    });
    sols.push(...case2.solutions.filter(s => typeof s === 'number'));
  }

  // Unique
  const unique = [...new Set(sols.map(s => Math.round(s * 1e10) / 1e10))].sort((a, b) => a - b);

  steps.push({
    title: 'Collect solutions',
    desc: 'Combine valid solutions from both cases.',
    math: unique.length
      ? unique.map(s => `${variable} = ${prettyNum(s)}`).join(', \\quad ')
      : '\\text{no solution}'
  });

  return { type: 'Absolute Value', solutions: unique, steps };
}

// ─── Square root / radical solver ──────────────────────────

function solveRadical(rawLeft, rawRight, variable) {
  // Pattern: sqrt(expr) = rhs
  const sqrtMatch = rawLeft.match(/^sqrt\((.+)\)$/);
  if (!sqrtMatch) return null;

  const inner = sqrtMatch[1];
  const steps = [];

  steps.push({
    title: 'Identify radical equation',
    desc: 'An equation of the form \( \\sqrt{f(x)} = g(x) \).',
    math: `\\sqrt{${toLatex(inner)}} = ${toLatex(rawRight)}`
  });

  steps.push({
    title: 'Note the domain',
    desc: 'The expression under the square root must be non-negative, and the right-hand side must be non-negative.',
    math: `${toLatex(inner)} \\geq 0, \\quad ${toLatex(rawRight)} \\geq 0`
  });

  steps.push({
    title: 'Square both sides',
    desc: 'Eliminate the radical by squaring. This may introduce extraneous solutions.',
    math: `${toLatex(inner)} = \\left(${toLatex(rawRight)}\\right)^{2}`
  });

  // RHS squared
  const rhsFn = compileExpr(rawRight, variable);
  let rhsConst = null;
  if (rhsFn) {
    try {
      const v0 = rhsFn(0), v1 = rhsFn(1), v2 = rhsFn(2);
      if (Math.abs(v0 - v1) < 1e-9 && Math.abs(v1 - v2) < 1e-9) rhsConst = v0;
    } catch {}
  }

  let squaredRight;
  if (rhsConst !== null) {
    if (rhsConst < 0) {
      steps.push({
        title: 'Right-hand side is negative',
        desc: 'A principal square root is never negative; the equation has no solution.',
        math: `\\sqrt{\\cdot} \\geq 0 \\neq ${prettyNum(rhsConst)}`
      });
      return { type: 'Radical', solutions: [], steps, noSolution: true };
    }
    squaredRight = String(rhsConst * rhsConst);
  } else {
    squaredRight = `(${rawRight})^2`;
  }

  const sub = solveGeneral(inner, squaredRight, variable);
  if (!sub) {
    steps.push({
      title: 'Unable to algebraically solve after squaring',
      desc: 'Falling back to numerical methods.',
      math: `${toLatex(inner)} = ${toLatex(squaredRight)}`
    });
    return null;
  }

  // Verify candidates
  const valid = [];
  const invalid = [];
  for (const s of (sub.solutions || [])) {
    if (typeof s !== 'number') continue;
    const leftVal = evalExpr(rawLeft, variable, s);
    const rightVal = evalExpr(rawRight, variable, s);
    if (isFinite(leftVal) && isFinite(rightVal) && Math.abs(leftVal - rightVal) < 1e-6) {
      valid.push(s);
    } else {
      invalid.push(s);
    }
  }

  if (sub.steps) {
    // Include simplified sub-steps
    steps.push({
      title: 'Solve the resulting equation',
      desc: 'After squaring we obtain a polynomial (or linear) equation.',
      math: sub.solutions.filter(s => typeof s === 'number').map(s => `${variable} = ${prettyNum(s)}`).join(', ') || '\\text{…}'
    });
  }

  if (invalid.length) {
    steps.push({
      title: 'Check for extraneous solutions',
      desc: 'Substitute each candidate back into the original equation. Squaring can introduce invalid roots.',
      math: invalid.map(s => `${variable} = ${prettyNum(s)} \;\\rightarrow\; \\text{extraneous}`).join(', \\quad ')
    });
  }

  steps.push({
    title: 'Verified solution(s)',
    desc: valid.length ? 'These values satisfy the original equation and domain constraints.' : 'No candidates survive verification.',
    math: valid.length
      ? valid.map(s => `${variable} = ${prettyNum(s)}`).join(', \\quad ')
      : '\\text{no solution}'
  });

  return { type: 'Radical', solutions: valid, steps };
}

// ─── Rational (1/x type) ───────────────────────────────────

function solveRational(rawLeft, rawRight, variable) {
  // Detect if either side has variable in denominator
  // Simple approach: multiply both sides by common denominators
  // We handle expressions that contain division

  if (!rawLeft.includes('/') && !rawRight.includes('/')) return null;

  // Check for division by expression involving variable
  const hasVarDenom = (expr) => {
    // crude: / something-with-var or /(something-with-var)
    const re = new RegExp('/\\s*(\\([^)]*' + variable + '[^)]*\\)|' + variable + ')');
    return re.test(expr) || new RegExp(variable).test(expr) && expr.includes('/');
  };

  if (!hasVarDenom(rawLeft) && !hasVarDenom(rawRight) &&
      !new RegExp(variable).test(rawLeft + rawRight)) return null;

  // For polynomial-ratio equations: f(x)/g(x) = h(x)/k(x)  → f*k - h*g = 0
  // We'll use a numerical approach augmented with algebraic multiply-through for simple cases

  const steps = [];
  steps.push({
    title: 'Identify rational equation',
    desc: 'The equation involves ratios of expressions. Domain restrictions: denominators ≠ 0.',
    math: `${toLatex(rawLeft)} = ${toLatex(rawRight)}`
  });

  // Try to handle simple form:  a/x + b = c   or   (ax+b)/(cx+d) = e  via clearing denominators numerically first
  // Multiply both sides conceptually: we'll just use numerical roots of LHS - RHS = 0 with excluded poles

  // Find poles (approximate): sample denominators
  // Parse simple fractions of form p/var or p/(q*var+r)

  // Clear denominators with algebraic substitution:
  // Reformulate as: left - right = 0 and multiply by product of all denoms using poly method when possible

  // Simpler robust approach for common classroom eqns: multiply both sides by x (or detected linear denoms)

  // Detect denominators that are linear in the variable
  function findDenoms(expr) {
    const dens = [];
    // match /x, /(ax+b), /ax+b  (rough)
    const re = /\/\(([^)]+)\)|\/([a-zA-Z0-9.^+\-*]+)/g;
    let m;
    while ((m = re.exec(expr)) !== null) {
      dens.push(m[1] || m[2]);
    }
    return dens;
  }

  const dens = [...findDenoms(rawLeft), ...findDenoms(rawRight)];
  const uniqueDens = [...new Set(dens)];

  if (uniqueDens.length) {
    steps.push({
      title: 'State domain restrictions',
      desc: 'Exclude values that make any denominator zero.',
      math: uniqueDens.map(d => `${toLatex(d)} \\neq 0`).join(', \\quad ')
    });
  }

  // Multiply both sides by product of denominators → clearer poly equation
  // Build: left * Π dens - right * Π dens = 0, cancelling each side's dens
  // Easier: numerical solve of f(x) = left(x) - right(x) = 0 outside poles

  const fLeft = compileExpr(rawLeft, variable);
  const fRight = compileExpr(rawRight, variable);
  if (!fLeft || !fRight) return null;

  const f = (x) => {
    try {
      const lv = fLeft(x);
      const rv = fRight(x);
      if (!isFinite(lv) || !isFinite(rv)) return NaN;
      return lv - rv;
    } catch { return NaN; }
  };

  // Find domain roughly: identify poles from uniqueDens
  const poles = [];
  for (const d of uniqueDens) {
    const poly = extractPolynomial(d, variable);
    if (poly && poly.length === 2) {
      // c0 + c1*x = 0 → x = -c0/c1
      if (Math.abs(poly[1]) > 1e-12) poles.push(-poly[0] / poly[1]);
    } else if (poly && poly.length === 1) {
      // constant denom - ok if non-zero
    } else {
      // try solving denom = 0 linearly/num
      const df = compileExpr(d, variable);
      if (df) {
        // quick linear check
        try {
          const d0 = df(0), d1 = df(1);
          if (isFinite(d0) && isFinite(d1) && Math.abs(d1 - d0) > 1e-12) {
            // assume linear
            poles.push(-d0 / (d1 - d0));
          }
        } catch {}
      }
    }
  }

  // Clear denominators algebraically if all dens are linear poly and nums are poly
  // Multiply: rewrite equation as poly = 0
  // left = N1/D1, right = N2/D2 → N1*D2 - N2*D1 = 0

  // For simplicity and reliability, numerical root finding:
  const candidates = numericalRoots(f, -50, 50, poles);

  steps.push({
    title: 'Clear denominators / rearrange',
    desc: 'Bring all terms to one side and multiply through by the common denominator to obtain a polynomial equation.',
    math: `${toLatex(rawLeft)} - \\left(${toLatex(rawRight)}\\right) = 0`
  });

  // Verify candidates
  const valid = [];
  for (const s of candidates) {
    // Check not near pole
    if (poles.some(p => Math.abs(s - p) < 1e-6)) continue;
    const lv = fLeft(s);
    const rv = fRight(s);
    if (isFinite(lv) && isFinite(rv) && Math.abs(lv - rv) < 1e-5) {
      valid.push(Math.round(s * 1e10) / 1e10);
    }
  }

  // Deduplicate
  const unique = [];
  for (const s of valid.sort((a, b) => a - b)) {
    if (!unique.length || Math.abs(s - unique[unique.length - 1]) > 1e-8) unique.push(s);
  }

  steps.push({
    title: 'Solve and verify',
    desc: 'Reject any roots that make a denominator zero (extraneous).',
    math: unique.length
      ? unique.map(s => `${variable} = ${prettyNum(s)}`).join(', \\quad ')
      : '\\text{no solution}'
  });

  if (poles.length) {
    steps.push({
      title: 'Excluded values',
      desc: 'These make a denominator vanish and are not in the domain.',
      math: poles.map(p => `${variable} \\neq ${prettyNum(p)}`).join(', \\quad ')
    });
  }

  return {
    type: 'Rational',
    solutions: unique,
    steps,
    noSolution: unique.length === 0
  };
}

function numericalRoots(f, lo, hi, poles = [], samples = 400) {
  const roots = [];
  const step = (hi - lo) / samples;
  let prevX = lo;
  let prevY = f(lo);

  for (let i = 1; i <= samples; i++) {
    const x = lo + i * step;
    // skip near poles
    if (poles.some(p => Math.abs(x - p) < step * 2)) {
      prevY = NaN;
      prevX = x;
      continue;
    }
    const y = f(x);
    if (!isFinite(prevY) || !isFinite(y)) {
      prevY = y;
      prevX = x;
      continue;
    }
    if (prevY === 0) {
      roots.push(prevX);
    } else if (prevY * y < 0) {
      // Bisection
      let a = prevX, b = x, fa = prevY;
      for (let k = 0; k < 60; k++) {
        const mid = (a + b) / 2;
        const fm = f(mid);
        if (!isFinite(fm)) break;
        if (Math.abs(fm) < 1e-12 || (b - a) / 2 < 1e-12) {
          roots.push(mid);
          break;
        }
        if (fa * fm <= 0) { b = mid; }
        else { a = mid; fa = fm; }
        if (k === 59) roots.push((a + b) / 2);
      }
    }
    prevY = y;
    prevX = x;
  }
  return roots;
}

// ─── General solver orchestration ──────────────────────────

function solveGeneral(leftRaw, rightRaw, variable) {
  const left = normalizeInput(leftRaw);
  const right = normalizeInput(rightRaw);

  // Absolute value on left
  if (/^abs\(/.test(left) || /^\|/.test(leftRaw.trim())) {
    const r = solveAbsolute(left, right, variable);
    if (r) return r;
  }

  // sqrt on left
  if (/^sqrt\(/.test(left)) {
    const r = solveRadical(left, right, variable);
    if (r) return r;
  }

  // Rational
  if (left.includes('/') || right.includes('/')) {
    const r = solveRational(left, right, variable);
    if (r) return r;
  }

  // Polynomial path
  const leftPoly = extractPolynomial(left, variable);
  const rightPoly = extractPolynomial(right, variable);

  if (leftPoly && rightPoly) {
    const maxDeg = Math.max(leftPoly.length, rightPoly.length) - 1;
    const diffDeg = (() => {
      let d = 0;
      const len = Math.max(leftPoly.length, rightPoly.length);
      for (let i = 0; i < len; i++) {
        const c = (leftPoly[i] || 0) - (rightPoly[i] || 0);
        if (Math.abs(c) > 1e-12) d = i;
      }
      return d;
    })();

    if (diffDeg <= 1) return solveLinear(leftPoly, rightPoly, variable);
    if (diffDeg === 2) return solveQuadratic(leftPoly, rightPoly, variable);

    // Higher degree: numerical with poly coeffs
    if (diffDeg <= 4) {
      return solveHigherPoly(leftPoly, rightPoly, variable, diffDeg);
    }
  }

  // Fallback numerical
  return solveNumeric(left, right, variable);
}

function solveHigherPoly(leftPoly, rightPoly, variable, deg) {
  const maxLen = Math.max(leftPoly.length, rightPoly.length);
  const diff = [];
  for (let i = 0; i < maxLen; i++) {
    diff.push((leftPoly[i] || 0) - (rightPoly[i] || 0));
  }

  const steps = [];
  steps.push({
    title: 'Rearrange into polynomial form',
    desc: `Obtain a degree-${deg} polynomial equation \( p(${variable}) = 0 \).`,
    math: `${polyToLatex(diff, variable)} = 0`
  });

  // Companion-matrix or numerical roots
  const f = (x) => {
    let s = 0, p = 1;
    for (const c of diff) { s += c * p; p *= x; }
    return s;
  };

  const roots = numericalRoots(f, -100, 100, [], 800);
  // Polish with Newton
  const polished = roots.map(r => newton(f, r)).filter(r => r !== null);
  const unique = [];
  for (const s of polished.sort((a, b) => a - b)) {
    if (!unique.length || Math.abs(s - unique[unique.length - 1]) > 1e-7) {
      unique.push(Math.round(s * 1e10) / 1e10);
    }
  }

  steps.push({
    title: `Find roots of the degree-${deg} polynomial`,
    desc: 'Real roots found by numerical methods (bracketed bisection + Newton refinement).',
    math: unique.length
      ? unique.map((s, i) => `${variable}_{${i + 1}} = ${prettyNum(s)}`).join(', \\quad ')
      : '\\text{no real roots found in search range}'
  });

  return {
    type: `Polynomial (degree ${deg})`,
    solutions: unique,
    steps
  };
}

function newton(f, x0, maxIter = 40) {
  let x = x0;
  for (let i = 0; i < maxIter; i++) {
    const h = 1e-8;
    const df = (f(x + h) - f(x - h)) / (2 * h);
    if (Math.abs(df) < 1e-14) return null;
    const x1 = x - f(x) / df;
    if (!isFinite(x1)) return null;
    if (Math.abs(x1 - x) < 1e-12) return x1;
    x = x1;
  }
  return x;
}

function solveNumeric(left, right, variable) {
  const fL = compileExpr(left, variable);
  const fR = compileExpr(right, variable);
  if (!fL || !fR) {
    return {
      type: 'Unknown',
      solutions: [],
      steps: [{
        title: 'Unable to parse expression',
        desc: 'The equation could not be interpreted. Check syntax: use ^ for powers, sqrt() for roots, abs() or | | for absolute value.',
        math: '\\text{parse error}'
      }],
      error: true
    };
  }

  const f = (x) => {
    try {
      const a = fL(x), b = fR(x);
      if (!isFinite(a) || !isFinite(b)) return NaN;
      return a - b;
    } catch { return NaN; }
  };

  const steps = [];
  steps.push({
    title: 'Numerical approach',
    desc: 'The equation does not match a closed-form algebraic pattern handled symbolically. Roots are located numerically.',
    math: `${toLatex(left)} - \\left(${toLatex(right)}\\right) = 0`
  });

  const roots = numericalRoots(f, -50, 50, [], 600);
  const polished = roots.map(r => newton(f, r)).filter(r => r !== null && isFinite(r));
  const unique = [];
  for (const s of polished.sort((a, b) => a - b)) {
    if (!unique.length || Math.abs(s - unique[unique.length - 1]) > 1e-7) {
      // Verify
      if (Math.abs(f(s)) < 1e-5) unique.push(Math.round(s * 1e10) / 1e10);
    }
  }

  steps.push({
    title: 'Locate real roots',
    desc: 'Scan the interval and refine candidate roots.',
    math: unique.length
      ? unique.map(s => `${variable} = ${prettyNum(s)}`).join(', \\quad ')
      : '\\text{no real roots found}'
  });

  return {
    type: 'Numerical',
    solutions: unique,
    steps,
    noSolution: unique.length === 0
  };
}

// ─── Full solve pipeline ───────────────────────────────────

function solve(rawInput, preferredVar) {
  const parsed = parseEquation(rawInput);
  if (parsed.error) return { error: parsed.error };

  const variable = detectVariable(rawInput, preferredVar);
  const left = parsed.left;
  const right = parsed.right;

  // Pre-normalize for display
  const nLeft = normalizeInput(left);
  const nRight = normalizeInput(right);

  const result = solveGeneral(left, right, variable);
  if (!result) {
    return { error: 'Could not solve this equation. Try rewriting it or check syntax.' };
  }

  // Verification step
  const verified = [];
  for (const s of result.solutions) {
    if (typeof s === 'number') {
      const lv = evalExpr(nLeft, variable, s);
      const rv = evalExpr(nRight, variable, s);
      const ok = isFinite(lv) && isFinite(rv) && Math.abs(lv - rv) < 1e-4;
      verified.push({ value: s, left: lv, right: rv, ok });
    } else if (s && typeof s === 'object' && 're' in s) {
      verified.push({ value: s, ok: true, complex: true });
    } else {
      verified.push({ value: s, ok: true, special: true });
    }
  }

  return {
    input: rawInput,
    left,
    right,
    variable,
    ...result,
    verified
  };
}

// ─── UI Rendering ──────────────────────────────────────────

const history = [];

function formatSolutionLatex(result) {
  const v = result.variable;
  if (result.infinite) return `${v} \\in \\mathbb{R}`;
  if (result.noSolution || !result.solutions.length) return '\\text{No solution}';
  if (result.complex) {
    return result.solutions.map(s => {
      if (typeof s === 'object') {
        const sign = s.im >= 0 ? '+' : '-';
        return `${prettyNum(s.re)} ${sign} ${prettyNum(Math.abs(s.im))}i`;
      }
      return prettyNum(s);
    }).map((s, i) => `${v}_{${i + 1}} = ${s}`).join(', \\quad ');
  }
  if (result.solutions.length === 1) {
    const s = result.solutions[0];
    if (typeof s === 'number') return `${v} = ${prettyNum(s)}`;
    return `${v} = ${s}`;
  }
  return result.solutions.map((s, i) => {
    const val = typeof s === 'number' ? prettyNum(s) : s;
    return `${v}_{${i + 1}} = ${val}`;
  }).join(', \\quad ');
}

function formatSolutionPlain(result) {
  const v = result.variable;
  if (result.infinite) return `${v} ∈ ℝ (all real numbers)`;
  if (result.noSolution || !result.solutions.length) return 'No solution';
  if (result.complex) {
    return result.solutions.map(s => {
      if (typeof s === 'object') {
        const sign = s.im >= 0 ? '+' : '-';
        return `${s.re} ${sign} ${Math.abs(s.im)}i`;
      }
      return String(s);
    }).join(', ');
  }
  return result.solutions.map(s => {
    if (typeof s === 'number') {
      const f = toFraction(s);
      if (f && f.den > 1 && f.den <= 64) return `${f.num}/${f.den}`;
      return String(parseFloat(s.toFixed(8)));
    }
    return String(s);
  }).map(s => `${v} = ${s}`).join(', ');
}

  let verifyHtml = '';

        ${result.verified.map(v => {
          if (v.special || v.complex) return '';
          const icon = v.ok
            ? `<div class="verify-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 12l5 5L20 7"/></svg></div>`
            : `<div class="verify-check fail"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 6L6 18M6 6l12 12"/></svg></div>`;
          const lv = isFinite(v.left) ? parseFloat(v.left.toFixed(6)) : 'undefined';
          const rv = isFinite(v.right) ? parseFloat(v.right.toFixed(6)) : 'undefined';
          return `
            <div class="verify-row" style="margin-bottom:0.4rem">
              ${icon}
              <div class="verify-text">
                For <strong>${result.variable} = ${typeof v.value === 'number' ? parseFloat(v.value.toFixed(8)) : v.value}</strong>:
                LHS = ${lv}, RHS = ${rv}
                ${v.ok ? ' — identity holds' : ' — does not satisfy'}
              </div>
            </div>
          `;
        }).join('')}
      </div>
    `;
  }

  const solIcon = result.noSolution
    ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>`
    : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12l5 5L20 7"/></svg>`;

  card.innerHTML = `
    <div class="result-header">
      <h3>Solution</h3>
      <div class="result-meta">
        <span class="badge badge-type">${escapeHtml(result.type || 'Equation')}</span>
        <span class="badge ${badgeClass}">${badgeText}</span>
      </div>
    </div>

    <div class="eq-display">
      <div class="mathjax-eq">\\[${toLatex(normalizeInput(result.left))} = ${toLatex(normalizeInput(result.right))}\\]</div>
    </div>

    <div class="solution-box ${result.noSolution ? 'error' : ''}">
      <div class="solution-icon">${solIcon}</div>
      <div class="solution-content">
        <h4>${result.noSolution ? 'Result' : 'Solution'}</h4>
        <div class="solution-value">\\(${solLatex}\\)</div>
      </div>
    </div>

    <div class="steps-section">
      <div class="steps-header">
        <h3>Step-by-step Breakdown</h3>
      </div>
      ${stepsHtml || '<div class="empty-state"><p>No steps available.</p></div>'}
    </div>

    ${verifyHtml}

    <div class="export-bar">
      <button class="btn btn-secondary" id="btn-copy">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        Copy Solution
      </button>
      <button class="btn btn-secondary" id="btn-export-txt">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
        Export TXT
      </button>
      <button class="btn btn-secondary" id="btn-export-md">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg>
        Export Markdown
      </button>
      <button class="btn btn-secondary" id="btn-print">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9V2h12v7M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        Print
      </button>
    </div>
  `;

  results.classList.add('visible');

  // Typeset math
  if (window.MathJax && window.MathJax.typesetPromise) {
    MathJax.typesetPromise([card]).catch(() => {});
  }

  // Export handlers
  document.getElementById('btn-copy').onclick = () => copySolution(result);
  document.getElementById('btn-export-txt').onclick = () => exportTxt(result);
  document.getElementById('btn-export-md').onclick = () => exportMd(result);
  document.getElementById('btn-print').onclick = () => window.print();

  // History
  addHistory(result);
}

function buildPlainText(result) {
  const lines = [];
  lines.push('EQUATION SOLVER TOOL');
  lines.push('═'.repeat(40));
  lines.push('');
  lines.push(`Equation:  ${result.input}`);
  lines.push(`Type:      ${result.type || 'Equation'}`);
  lines.push(`Variable:  ${result.variable}`);
  lines.push('');
  lines.push(`Solution:  ${formatSolutionPlain(result)}`);
  lines.push('');
  lines.push('STEP-BY-STEP BREAKDOWN');
  lines.push('─'.repeat(40));
  (result.steps || []).forEach((s, i) => {
    lines.push('');
    lines.push(`Step ${i + 1}: ${s.title}`);
    if (s.desc) lines.push(`  ${s.desc.replace(/\\\(.*?\\\)/g, '').replace(/\\\[.*?\\\]/g, '').replace(/\$[^$]+\$/g, '')}`);
    // Strip LaTeX for plain
    let math = s.math
      .replace(/\\dfrac\{([^}]+)\}\{([^}]+)\}/g, '($1)/($2)')
      .replace(/\\frac\{([^}]+)\}\{([^}]+)\}/g, '($1)/($2)')
      .replace(/\\sqrt\{([^}]+)\}/g, 'sqrt($1)')
      .replace(/\\cdot /g, '*')
      .replace(/\\left\|/g, '|')
      .replace(/\\right\|/g, '|')
      .replace(/\\left\(/g, '(')
      .replace(/\\right\)/g, ')')
      .replace(/\\pm/g, '±')
      .replace(/\\quad/g, '  ')
      .replace(/\\qquad/g, '   ')
      .replace(/\\Rightarrow/g, '=>')
      .replace(/\\neq/g, '≠')
      .replace(/\\geq/g, '≥')
      .replace(/\\leq/g, '≤')
      .replace(/\\in/g, '∈')
      .replace(/\\mathbb\{R\}/g, 'R')
      .replace(/\\text\{([^}]+)\}/g, '$1')
      .replace(/\\approx/g, '≈')
      .replace(/\^\{([^}]+)\}/g, '^$1')
      .replace(/\\,/g, ' ')
      .replace(/\;/g, ' ')
      .replace(/\\/g, '');
    lines.push(`  ${math}`);
  });
  if (result.verified && result.verified.length && !result.complex) {
    lines.push('');
    lines.push('VERIFICATION');
    lines.push('─'.repeat(40));
    result.verified.forEach(v => {
      if (v.special || v.complex) return;
      lines.push(`  ${result.variable} = ${v.value}: LHS=${v.left?.toFixed?.(6) ?? v.left}, RHS=${v.right?.toFixed?.(6) ?? v.right} ${v.ok ? '✓' : '✗'}`);
    });
  }
  lines.push('');
  lines.push('─'.repeat(40));
  lines.push('Generated by Equation Solver Tool');
  return lines.join('\n');
}

function buildMarkdown(result) {
  const lines = [];
  lines.push('# Equation Solution');
  lines.push('');
  lines.push(`**Equation:** \`${result.input}\``);
  lines.push('');
  lines.push(`**Type:** ${result.type || 'Equation'}  `);
  lines.push(`**Variable:** \$${result.variable}\$`);
  lines.push('');
  lines.push('## Solution');
  lines.push('');
  lines.push(`$$${formatSolutionLatex(result)}$$`);
  lines.push('');
  lines.push('## Step-by-step Breakdown');
  lines.push('');
  (result.steps || []).forEach((s, i) => {
    lines.push(`### Step ${i + 1}: ${s.title}`);
    lines.push('');
    if (s.desc) {
      // Keep LaTeX in desc
      lines.push(s.desc);
      lines.push('');
    }
    lines.push(`$$${s.math}$$`);
    lines.push('');
  });
  if (result.verified && result.verified.length && !result.complex) {
    lines.push('## Verification');
    lines.push('');
    result.verified.forEach(v => {
      if (v.special || v.complex) return;
      const status = v.ok ? '✓' : '✗';
      lines.push(`- ${status} For \$${result.variable} = ${v.value}\$: LHS = ${v.left?.toFixed?.(6) ?? v.left}, RHS = ${v.right?.toFixed?.(6) ?? v.right}`);
    });
    lines.push('');
  }
  lines.push('---');
  lines.push('*Generated by Equation Solver Tool*');
  return lines.join('\n');
}

function copySolution(result) {
  const text = buildPlainText(result);
  navigator.clipboard.writeText(text).then(() => {
    toast('Solution copied to clipboard');
  }).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    toast('Solution copied to clipboard');
  });
}

function downloadFile(filename, content, mime) {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function exportTxt(result) {
  const text = buildPlainText(result);
  const name = `equation-solution-${Date.now()}.txt`;
  downloadFile(name, text, 'text/plain');
  toast('Exported as TXT');
}

function exportMd(result) {
  const text = buildMarkdown(result);
  const name = `equation-solution-${Date.now()}.md`;
  downloadFile(name, text, 'text/markdown');
  toast('Exported as Markdown');
}

function addHistory(result) {
  if (result.error) return;
  history.unshift({
    input: result.input,
    solution: formatSolutionPlain(result),
    result
  });
  if (history.length > 8) history.pop();
  renderHistory();
}

function renderHistory() {
  const section = document.getElementById('history-section');
  const list = document.getElementById('history-list');
  if (!history.length) {
    section.style.display = 'none';
    return;
  }
  section.style.display = 'block';
  list.innerHTML = history.map((h, i) => `
    <div class="history-item" data-idx="${i}">
      <span class="history-eq">${escapeHtml(h.input)}</span>
      <span class="history-result">${escapeHtml(h.solution)}</span>
    </div>
  `).join('');

  list.querySelectorAll('.history-item').forEach(el => {
    el.addEventListener('click', () => {
      const idx = parseInt(el.dataset.idx, 10);
      const h = history[idx];
      document.getElementById('equation-input').value = h.input;
      renderResult(h.result);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  });
}

// ─── Event wiring ──────────────────────────────────────────

function doSolve() {
  const input = document.getElementById('equation-input').value.trim();
  if (!input) {
    toast('Enter an equation first');
    document.getElementById('equation-input').focus();
    return;
  }
  const preferred = document.getElementById('var-select').value;
  const result = solve(input, preferred);
  renderResult(result);
}

document.getElementById('btn-solve').addEventListener('click', doSolve);

document.getElementById('equation-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    doSolve();
  }
});

document.getElementById('btn-clear-input').addEventListener('click', () => {
  document.getElementById('equation-input').value = '';
  document.getElementById('equation-input').focus();
});

document.getElementById('btn-clear-all').addEventListener('click', () => {
  document.getElementById('equation-input').value = '';
  document.getElementById('results').classList.remove('visible');
  history.length = 0;
  renderHistory();
  toast('Cleared');
});

document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.getElementById('equation-input').value = chip.dataset.eq;
    doSolve();
  });
});

// Focus input on load
window.addEventListener('load', () => {
  document.getElementById('equation-input').focus();
});
</script>
