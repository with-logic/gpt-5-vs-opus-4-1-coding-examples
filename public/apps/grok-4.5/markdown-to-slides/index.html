<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Markdown → Slides</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" id="hljs-theme" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            serif: ['Playfair Display', 'Georgia', 'serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          colors: {
            ink: {
              50: '#f7f7f8',
              100: '#eeeef0',
              200: '#d9d9de',
              300: '#b8b8c1',
              400: '#91919f',
              500: '#737384',
              600: '#5d5d6c',
              700: '#4c4c58',
              800: '#41414b',
              900: '#393941',
              950: '#18181b',
            },
            accent: {
              50: '#eef7ff',
              100: '#d9ecff',
              200: '#bcdcff',
              300: '#8ec6ff',
              400: '#59a5ff',
              500: '#3381ff',
              600: '#1b5ff5',
              700: '#1449e1',
              800: '#173cb6',
              900: '#19368f',
              950: '#142257',
            }
          },
          boxShadow: {
            'slide': '0 25px 50px -12px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(0,0,0,0.05)',
            'slide-dark': '0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255,255,255,0.05)',
          }
        }
      }
    }
  </script>
  <style>
    :root {
      --editor-bg: #fafafa;
      --panel-border: #e5e5e7;
      --slide-bg: #ffffff;
      --slide-fg: #18181b;
      --slide-muted: #71717a;
      --slide-accent: #1b5ff5;
      --slide-code-bg: #f4f4f5;
      --toolbar-h: 56px;
    }

    .dark {
      --editor-bg: #0f0f12;
      --panel-border: #27272a;
      --slide-bg: #18181b;
      --slide-fg: #fafafa;
      --slide-muted: #a1a1aa;
      --slide-accent: #59a5ff;
      --slide-code-bg: #27272a;
    }

    * { box-sizing: border-box; }

    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: 'Inter', system-ui, sans-serif;
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb {
      background: #d4d4d8;
      border-radius: 4px;
    }
    .dark ::-webkit-scrollbar-thumb { background: #3f3f46; }
    ::-webkit-scrollbar-thumb:hover { background: #a1a1aa; }

    #editor {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      line-height: 1.7;
      tab-size: 2;
      resize: none;
      background: var(--editor-bg);
      color: var(--slide-fg);
    }

    #editor:focus { outline: none; }

    /* Slide card in preview */
    .slide-card {
      background: var(--slide-bg);
      color: var(--slide-fg);
      aspect-ratio: 16 / 9;
      width: 100%;
      max-width: 720px;
      border-radius: 8px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08), 0 0 0 1px rgba(0,0,0,0.04);
      overflow: hidden;
      position: relative;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      cursor: pointer;
    }
    .dark .slide-card {
      box-shadow: 0 4px 24px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.06);
    }
    .slide-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,0,0,0.06);
    }
    .dark .slide-card:hover {
      box-shadow: 0 12px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.1);
    }
    .slide-card.active {
      box-shadow: 0 0 0 2px var(--slide-accent), 0 12px 40px rgba(27,95,245,0.2);
    }

    .slide-inner {
      padding: 7% 8%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      overflow: hidden;
      font-size: clamp(10px, 1.4vw, 15px);
      line-height: 1.5;
    }

    /* Scale slide content based on container */
    .slide-inner h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 2.6em;
      font-weight: 700;
      line-height: 1.15;
      margin: 0 0 0.35em;
      letter-spacing: -0.02em;
      color: var(--slide-fg);
    }
    .slide-inner h2 {
      font-family: 'Inter', sans-serif;
      font-size: 1.85em;
      font-weight: 700;
      line-height: 1.2;
      margin: 0 0 0.4em;
      letter-spacing: -0.02em;
      color: var(--slide-fg);
    }
    .slide-inner h3 {
      font-size: 1.35em;
      font-weight: 600;
      margin: 0 0 0.4em;
      color: var(--slide-fg);
    }
    .slide-inner h4, .slide-inner h5, .slide-inner h6 {
      font-size: 1.1em;
      font-weight: 600;
      margin: 0 0 0.35em;
      color: var(--slide-muted);
    }
    .slide-inner p {
      margin: 0 0 0.65em;
      color: var(--slide-fg);
      opacity: 0.9;
    }
    .slide-inner ul, .slide-inner ol {
      margin: 0.3em 0 0.65em;
      padding-left: 1.35em;
    }
    .slide-inner li {
      margin-bottom: 0.3em;
      color: var(--slide-fg);
      opacity: 0.9;
    }
    .slide-inner li::marker {
      color: var(--slide-accent);
    }
    .slide-inner strong {
      font-weight: 600;
      color: var(--slide-fg);
    }
    .slide-inner em {
      font-style: italic;
      color: var(--slide-muted);
    }
    .slide-inner a {
      color: var(--slide-accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
    }
    .slide-inner a:hover { border-bottom-color: var(--slide-accent); }
    .slide-inner blockquote {
      border-left: 3px solid var(--slide-accent);
      margin: 0.5em 0;
      padding: 0.4em 0 0.4em 1em;
      color: var(--slide-muted);
      font-style: italic;
    }
    .slide-inner code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85em;
      background: var(--slide-code-bg);
      padding: 0.15em 0.4em;
      border-radius: 4px;
    }
    .slide-inner pre {
      background: var(--slide-code-bg);
      border-radius: 8px;
      padding: 0.9em 1.1em;
      overflow-x: auto;
      margin: 0.5em 0 0.75em;
      font-size: 0.8em;
      line-height: 1.55;
    }
    .slide-inner pre code {
      background: none;
      padding: 0;
      font-size: inherit;
    }
    .slide-inner hr {
      border: none;
      border-top: 1px solid var(--panel-border);
      margin: 0.8em 0;
    }
    .slide-inner table {
      width: 100%;
      border-collapse: collapse;
      margin: 0.5em 0;
      font-size: 0.9em;
    }
    .slide-inner th, .slide-inner td {
      text-align: left;
      padding: 0.45em 0.7em;
      border-bottom: 1px solid var(--panel-border);
    }
    .slide-inner th {
      font-weight: 600;
      color: var(--slide-muted);
      font-size: 0.85em;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .slide-inner img {
      max-width: 100%;
      max-height: 45%;
      border-radius: 6px;
      object-fit: contain;
    }

    /* Title slide styling */
    .slide-inner.title-slide {
      text-align: center;
      align-items: center;
    }
    .slide-inner.title-slide h1 {
      font-size: 3em;
      margin-bottom: 0.25em;
    }
    .slide-inner.title-slide p {
      font-size: 1.15em;
      color: var(--slide-muted);
    }

    /* Accent bar on slides */
    .slide-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--slide-accent), #8ec6ff);
      opacity: 0.85;
    }

    .slide-number {
      position: absolute;
      bottom: 12px;
      right: 18px;
      font-size: 11px;
      font-weight: 500;
      color: var(--slide-muted);
      opacity: 0.6;
      letter-spacing: 0.03em;
    }

    /* Presenter mode */
    #presenter {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: #0a0a0c;
      color: #fafafa;
    }
    #presenter.active { display: flex; flex-direction: column; }

    .presenter-slide {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 60px 80px;
      overflow: hidden;
    }

    .presenter-slide .ps-inner {
      width: min(92vw, calc(92vh * 16 / 9));
      aspect-ratio: 16 / 9;
      background: #ffffff;
      color: #18181b;
      border-radius: 4px;
      box-shadow: 0 40px 80px rgba(0,0,0,0.5);
      position: relative;
      overflow: hidden;
    }
    .dark .presenter-slide .ps-inner,
    body.theme-dark-slides .presenter-slide .ps-inner {
      background: #18181b;
      color: #fafafa;
    }

    .ps-inner .slide-inner {
      font-size: clamp(14px, 2.2vw, 28px);
      padding: 6% 7%;
    }
    .ps-inner::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, #1b5ff5, #8ec6ff);
    }

    .presenter-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      background: linear-gradient(transparent, rgba(0,0,0,0.6));
      opacity: 0;
      transition: opacity 0.3s;
    }
    #presenter:hover .presenter-bar,
    .presenter-bar:focus-within { opacity: 1; }

    .presenter-progress {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 3px;
      background: #3381ff;
      transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Toolbar buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 500;
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 0.15s ease;
      white-space: nowrap;
      background: transparent;
      color: #52525b;
    }
    .dark .btn { color: #a1a1aa; }
    .btn:hover {
      background: #f4f4f5;
      color: #18181b;
    }
    .dark .btn:hover {
      background: #27272a;
      color: #fafafa;
    }
    .btn-primary {
      background: #1b5ff5;
      color: white;
      border-color: #1b5ff5;
    }
    .btn-primary:hover {
      background: #1449e1;
      color: white;
      border-color: #1449e1;
    }
    .btn-ghost {
      border: 1px solid var(--panel-border);
    }
    .btn svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .icon-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border-radius: 7px;
      border: none;
      background: transparent;
      color: #71717a;
      cursor: pointer;
      transition: all 0.15s;
    }
    .icon-btn:hover {
      background: #f4f4f5;
      color: #18181b;
    }
    .dark .icon-btn:hover {
      background: #27272a;
      color: #fafafa;
    }
    .icon-btn svg { width: 18px; height: 18px; }

    /* Splitter */
    #splitter {
      width: 5px;
      cursor: col-resize;
      background: var(--panel-border);
      position: relative;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    #splitter:hover, #splitter.dragging {
      background: #3381ff;
    }
    #splitter::after {
      content: '';
      position: absolute;
      inset: 0 -4px;
    }

    /* Keyboard hint pills */
    .kbd {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 20px;
      height: 20px;
      padding: 0 5px;
      border-radius: 4px;
      font-size: 11px;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      background: #e4e4e7;
      color: #52525b;
      border: 1px solid #d4d4d8;
    }
    .dark .kbd {
      background: #3f3f46;
      color: #d4d4d8;
      border-color: #52525b;
    }

    /* Fade animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.3s ease forwards; }

    @keyframes slideIn {
      from { opacity: 0; transform: scale(0.97); }
      to { opacity: 1; transform: scale(1); }
    }
    .presenter-slide .ps-inner {
      animation: slideIn 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #18181b;
      color: white;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 200;
      pointer-events: none;
      box-shadow: 0 8px 30px rgba(0,0,0,0.2);
    }
    .dark #toast {
      background: #fafafa;
      color: #18181b;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Status bar in preview */
    .preview-status {
      font-size: 12px;
      color: #a1a1aa;
      font-weight: 500;
    }

    /* Logo mark */
    .logo-mark {
      width: 28px;
      height: 28px;
      border-radius: 7px;
      background: linear-gradient(135deg, #1b5ff5, #59a5ff);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 13px;
      flex-shrink: 0;
    }

    /* Empty state */
    .empty-preview {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #a1a1aa;
      gap: 12px;
    }

    /* Responsive */
    @media (max-width: 768px) {
      #main { flex-direction: column !important; }
      #editor-panel { width: 100% !important; height: 40% !important; }
      #preview-panel { width: 100% !important; height: 60% !important; }
      #splitter { width: 100% !important; height: 5px !important; cursor: row-resize; }
    }
  </style>
</head>
<body class="bg-white dark:bg-ink-950 text-ink-900 dark:text-ink-100">

  <!-- ═══ TOOLBAR ═══ -->
  <header id="toolbar" class="h-14 flex items-center justify-between px-4 border-b border-ink-200 dark:border-ink-800 bg-white/80 dark:bg-ink-950/80 backdrop-blur-md sticky top-0 z-50" style="height: var(--toolbar-h)">
    <div class="flex items-center gap-3">
      <div class="logo-mark">M</div>
      <div class="hidden sm:block">
        <div class="text-sm font-semibold tracking-tight leading-none">Markdown → Slides</div>
        <div class="text-[11px] text-ink-400 mt-0.5">Live presentation builder</div>
      </div>
    </div>

    <div class="flex items-center gap-1.5">
      <button class="btn btn-ghost" id="btn-sample" title="Load sample deck">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.75" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" /></svg>
        <span class="hidden md:inline">Sample</span>
      </button>

      <div class="w-px h-5 bg-ink-200 dark:bg-ink-700 mx-1"></div>

      <button class="icon-btn" id="btn-theme" title="Toggle theme">
        <svg id="icon-sun" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.75" stroke="currentColor" class="hidden dark:block"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" /></svg>
        <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.75" stroke="currentColor" class="dark:hidden"><path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" /></svg>
      </button>

      <button class="btn btn-primary ml-1" id="btn-present" title="Present (F or Ctrl+Enter)">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.75" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.347a1.125 1.125 0 0 1 0 1.972l-11.54 6.347a1.125 1.125 0 0 1-1.667-.986V5.653Z" /></svg>
        Present
      </button>
    </div>
  </header>

  <!-- ═══ MAIN ═══ -->
  <div id="main" class="flex" style="height: calc(100vh - var(--toolbar-h))">

    <!-- Editor Panel -->
    <div id="editor-panel" class="flex flex-col" style="width: 42%; min-width: 280px;">
      <div class="flex items-center justify-between px-4 py-2 border-b border-ink-100 dark:border-ink-800/60">
        <span class="text-xs font-semibold uppercase tracking-wider text-ink-400">Markdown</span>
        <span class="preview-status" id="slide-count">0 slides</span>
      </div>
      <textarea id="editor" class="flex-1 w-full p-4 border-0" spellcheck="false" placeholder="Write markdown… Use --- to separate slides."></textarea>
    </div>

    <!-- Splitter -->
    <div id="splitter"></div>

    <!-- Preview Panel -->
    <div id="preview-panel" class="flex flex-col flex-1 min-w-0" style="background: #f4f4f5;">
      <div class="flex items-center justify-between px-4 py-2 border-b border-ink-200 dark:border-ink-800 bg-white dark:bg-ink-950">
        <span class="text-xs font-semibold uppercase tracking-wider text-ink-400">Preview</span>
        <div class="flex items-center gap-3">
          <span class="preview-status flex items-center gap-1.5">
            <span class="kbd">←</span><span class="kbd">→</span>
            <span class="text-ink-400">navigate</span>
          </span>
        </div>
      </div>
      <div id="preview" class="flex-1 overflow-y-auto p-6 flex flex-col items-center gap-5 dark:bg-ink-950" style="background: #f0f0f2;"></div>
    </div>
  </div>

  <!-- ═══ PRESENTER ═══ -->
  <div id="presenter">
    <div class="presenter-slide">
      <div class="ps-inner" id="ps-content"></div>
    </div>
    <div class="presenter-bar">
      <div class="flex items-center gap-3">
        <button class="icon-btn text-white/70 hover:text-white hover:bg-white/10" id="btn-prev" title="Previous">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5" /></svg>
        </button>
        <span class="text-sm font-medium text-white/80 tabular-nums" id="presenter-counter">1 / 1</span>
        <button class="icon-btn text-white/70 hover:text-white hover:bg-white/10" id="btn-next" title="Next">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5" /></svg>
        </button>
      </div>
      <div class="flex items-center gap-2">
        <span class="text-xs text-white/40 hidden sm:inline">Esc to exit · ← → to navigate</span>
        <button class="btn text-white/80 hover:text-white hover:bg-white/10 border-white/10" id="btn-exit">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.75" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" /></svg>
          Exit
        </button>
      </div>
    </div>
    <div class="presenter-progress" id="presenter-progress" style="width: 0%"></div>
  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <script>
    // ═══════════════════════════════════════════
    // Configuration & Sample Deck
    // ═══════════════════════════════════════════
    const SAMPLE_DECK = `# Strategic Growth Plan

    // ═══════════════════════════════════════════
    // State
    // ═══════════════════════════════════════════
    let slides = [];
    let currentSlide = 0;
    let isPresenting = false;
    let renderTimer = null;

    // ═══════════════════════════════════════════
    // DOM refs
    // ═══════════════════════════════════════════
    const $editor = document.getElementById('editor');
    const $preview = document.getElementById('preview');
    const $slideCount = document.getElementById('slide-count');
    const $presenter = document.getElementById('presenter');
    const $psContent = document.getElementById('ps-content');
    const $presenterCounter = document.getElementById('presenter-counter');
    const $presenterProgress = document.getElementById('presenter-progress');
    const $toast = document.getElementById('toast');
    const $editorPanel = document.getElementById('editor-panel');
    const $splitter = document.getElementById('splitter');
    const $hljsTheme = document.getElementById('hljs-theme');

    // ═══════════════════════════════════════════
    // Markdown rendering
    // ═══════════════════════════════════════════
    marked.setOptions({
      gfm: true,
      breaks: false,
      highlight: function (code, lang) {
        if (lang && hljs.getLanguage(lang)) {
          try { return hljs.highlight(code, { language: lang }).value; } catch (e) {}
        }
        try { return hljs.highlightAuto(code).value; } catch (e) {}
        return code;
      }
    });

    function parseSlides(md) {
      // Split on lines that are exactly --- (or more dashes),
      // but preserve markdown hr that might be intentional within slides...
      // Spec says --- as slide breaks.
      const parts = md.split(/^\s*---\s*$/m);
      return parts
        .map(p => p.trim())
        .filter(p => p.length > 0);
    }

    function isTitleSlide(html, md) {
      // First slide, or slide that starts with single h1 and short content
      const lines = md.split('\n').filter(l => l.trim());
      return lines.length <= 4 && /^#\s/.test(lines[0] || '');
    }

    function renderSlideHTML(md, index, total) {
      const html = marked.parse(md);
      const titleClass = (index === 0 || isTitleSlide(html, md)) ? ' title-slide' : '';
      return `
        <div class="slide-inner${titleClass}">
          ${html}
        </div>
        <div class="slide-number">${index + 1} / ${total}</div>
      `;
    }

    function renderPreview() {
      const md = $editor.value;
      slides = parseSlides(md);
      $slideCount.textContent = slides.length === 1
        ? '1 slide'
        : `${slides.length} slides`;

      if (slides.length === 0) {
        $preview.innerHTML = `
          <div class="empty-preview">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.25" stroke="currentColor" class="w-12 h-12 opacity-30"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25H12" /></svg>
            <p class="text-sm">Write markdown to create slides</p>
            <p class="text-xs opacity-60">Separate slides with <code class="px-1 py-0.5 rounded bg-ink-200 dark:bg-ink-800">---</code></p>
          </div>
        `;
        return;
      }

      // Preserve scroll position
      const scrollTop = $preview.scrollTop;

      $preview.innerHTML = slides.map((s, i) => `
        <div class="slide-card fade-in${i === currentSlide ? ' active' : ''}" data-index="${i}" style="animation-delay: ${Math.min(i * 30, 200)}ms">
          ${renderSlideHTML(s, i, slides.length)}
        </div>
      `).join('');

      // Highlight code blocks
      $preview.querySelectorAll('pre code').forEach(block => {
        hljs.highlightElement(block);
      });

      // Click to select / present
      $preview.querySelectorAll('.slide-card').forEach(card => {
        card.addEventListener('click', () => {
          currentSlide = parseInt(card.dataset.index, 10);
          updateActiveCard();
        });
        card.addEventListener('dblclick', () => {
          currentSlide = parseInt(card.dataset.index, 10);
          enterPresenter();
        });
      });

      $preview.scrollTop = scrollTop;
    }

    function updateActiveCard() {
      $preview.querySelectorAll('.slide-card').forEach((card, i) => {
        card.classList.toggle('active', i === currentSlide);
      });
      // Scroll active into view
      const active = $preview.querySelector('.slide-card.active');
      if (active) {
        active.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
    }

    function scheduleRender() {
      clearTimeout(renderTimer);
      renderTimer = setTimeout(renderPreview, 120);
    }

    // ═══════════════════════════════════════════
    // Presenter mode
    // ═══════════════════════════════════════════
    function enterPresenter() {
      if (slides.length === 0) {
        showToast('No slides to present');
        return;
      }
      isPresenting = true;
      currentSlide = Math.min(currentSlide, slides.length - 1);
      $presenter.classList.add('active');
      renderPresenterSlide();
      // Sync dark slides with theme
      if (document.documentElement.classList.contains('dark')) {
        document.body.classList.add('theme-dark-slides');
      } else {
        document.body.classList.remove('theme-dark-slides');
      }
      try {
        if (document.documentElement.requestFullscreen) {
          document.documentElement.requestFullscreen().catch(() => {});
        }
      } catch (e) {}
    }

    function exitPresenter() {
      isPresenting = false;
      $presenter.classList.remove('active');
      updateActiveCard();
      try {
        if (document.fullscreenElement) {
          document.exitFullscreen().catch(() => {});
        }
      } catch (e) {}
    }

    function renderPresenterSlide() {
      if (currentSlide < 0) currentSlide = 0;
      if (currentSlide >= slides.length) currentSlide = slides.length - 1;

      // Force re-animation
      $psContent.style.animation = 'none';
      void $psContent.offsetWidth;
      $psContent.style.animation = '';

      $psContent.innerHTML = renderSlideHTML(slides[currentSlide], currentSlide, slides.length);
      $psContent.querySelectorAll('pre code').forEach(block => {
        hljs.highlightElement(block);
      });

      $presenterCounter.textContent = `${currentSlide + 1} / ${slides.length}`;
      $presenterProgress.style.width = `${((currentSlide + 1) / slides.length) * 100}%`;
    }

    function nextSlide() {
      if (currentSlide < slides.length - 1) {
        currentSlide++;
        if (isPresenting) renderPresenterSlide();
        else updateActiveCard();
      }
    }

    function prevSlide() {
      if (currentSlide > 0) {
        currentSlide--;
        if (isPresenting) renderPresenterSlide();
        else updateActiveCard();
      }
    }

    // ═══════════════════════════════════════════
    // Theme
    // ═══════════════════════════════════════════
    function setTheme(dark) {
      document.documentElement.classList.toggle('dark', dark);
      localStorage.setItem('mds-theme', dark ? 'dark' : 'light');
      // Swap highlight.js theme
      $hljsTheme.href = dark
        ? 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css'
        : 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css';
      // Re-render if presenting to sync slide colors
      if (isPresenting) {
        if (dark) document.body.classList.add('theme-dark-slides');
        else document.body.classList.remove('theme-dark-slides');
      }
      // Update preview bg
      const prev = document.getElementById('preview');
      if (dark) {
        prev.style.background = '#0f0f12';
        document.getElementById('preview-panel').style.background = '#0f0f12';
      } else {
        prev.style.background = '#f0f0f2';
        document.getElementById('preview-panel').style.background = '#f4f4f5';
      }
    }

    function toggleTheme() {
      const isDark = document.documentElement.classList.contains('dark');
      setTheme(!isDark);
    }

    // ═══════════════════════════════════════════
    // Toast
    // ═══════════════════════════════════════════
    let toastTimer;
    function showToast(msg) {
      $toast.textContent = msg;
      $toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => $toast.classList.remove('show'), 2200);
    }

    // ═══════════════════════════════════════════
    // Resizable splitter
    // ═══════════════════════════════════════════
    (function initSplitter() {
      let dragging = false;
      $splitter.addEventListener('mousedown', (e) => {
        dragging = true;
        $splitter.classList.add('dragging');
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
        e.preventDefault();
      });
      window.addEventListener('mousemove', (e) => {
        if (!dragging) return;
        const main = document.getElementById('main');
        const rect = main.getBoundingClientRect();
        let pct = ((e.clientX - rect.left) / rect.width) * 100;
        pct = Math.max(22, Math.min(70, pct));
        $editorPanel.style.width = pct + '%';
      });
      window.addEventListener('mouseup', () => {
        if (!dragging) return;
        dragging = false;
        $splitter.classList.remove('dragging');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
      });
    })();

    // ═══════════════════════════════════════════
    // Event bindings
    // ═══════════════════════════════════════════
    $editor.addEventListener('input', scheduleRender);

    // Tab key inserts spaces in editor
    $editor.addEventListener('keydown', (e) => {
      if (e.key === 'Tab') {
        e.preventDefault();
        const start = $editor.selectionStart;
        const end = $editor.selectionEnd;
        $editor.value = $editor.value.substring(0, start) + '  ' + $editor.value.substring(end);
        $editor.selectionStart = $editor.selectionEnd = start + 2;
        scheduleRender();
      }
    });

    document.getElementById('btn-sample').addEventListener('click', () => {
      $editor.value = SAMPLE_DECK;
      currentSlide = 0;
      renderPreview();
      showToast('Sample deck loaded');
    });

    document.getElementById('btn-theme').addEventListener('click', toggleTheme);
    document.getElementById('btn-present').addEventListener('click', enterPresenter);
    document.getElementById('btn-exit').addEventListener('click', exitPresenter);
    document.getElementById('btn-prev').addEventListener('click', prevSlide);
    document.getElementById('btn-next').addEventListener('click', nextSlide);

    // Global keyboard
    document.addEventListener('keydown', (e) => {
      // Don't intercept when typing in editor (unless presenting)
      const inEditor = document.activeElement === $editor;

      if (isPresenting) {
        if (e.key === 'Escape') { e.preventDefault(); exitPresenter(); }
        else if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ' || e.key === 'PageDown') {
          e.preventDefault(); nextSlide();
        }
        else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp' || e.key === 'PageUp') {
          e.preventDefault(); prevSlide();
        }
        else if (e.key === 'Home') { e.preventDefault(); currentSlide = 0; renderPresenterSlide(); }
        else if (e.key === 'End') { e.preventDefault(); currentSlide = slides.length - 1; renderPresenterSlide(); }
        return;
      }

      // Not presenting
      if (e.key === 'f' && !inEditor && !e.metaKey && !e.ctrlKey) {
        e.preventDefault();
        enterPresenter();
      }
      if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
        e.preventDefault();
        enterPresenter();
      }
      if (!inEditor && (e.key === 'ArrowRight' || e.key === 'ArrowDown')) {
        e.preventDefault(); nextSlide();
      }
      if (!inEditor && (e.key === 'ArrowLeft' || e.key === 'ArrowUp')) {
        e.preventDefault(); prevSlide();
      }
    });

    // Fullscreen exit sync
    document.addEventListener('fullscreenchange', () => {
      if (!document.fullscreenElement && isPresenting) {
        // User exited fullscreen via browser UI — stay in presenter or exit?
        // Keep presenter; they can Esc.
      }
    });

    // ═══════════════════════════════════════════
    // Init
    // ═══════════════════════════════════════════
    (function init() {
      // Theme from storage or system
      const saved = localStorage.getItem('mds-theme');
      const preferDark = saved
        ? saved === 'dark'
        : window.matchMedia('(prefers-color-scheme: dark)').matches;
      setTheme(preferDark);

      // Load sample by default
      $editor.value = SAMPLE_DECK;
      renderPreview();
    })();
  </script>
</body>
