<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Regex Lab — Pattern Playground</title>
  <style>
    :root, [data-theme="dark"] {
      --bg: #0d1117;
      --bg-elevated: #161b22;
      --bg-panel: #1c2128;
      --bg-input: #0d1117;
      --border: #30363d;
      --border-focus: #58a6ff;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --text-dim: #6e7681;
      --accent: #58a6ff;
      --accent-soft: rgba(88, 166, 255, 0.15);
      --green: #3fb950;
      --green-soft: rgba(63, 185, 80, 0.15);
      --red: #f85149;
      --red-soft: rgba(248, 81, 73, 0.15);
      --orange: #d29922;
      --orange-soft: rgba(210, 153, 34, 0.15);
      --purple: #bc8cff;
      --purple-soft: rgba(188, 140, 255, 0.15);
      --pink: #f778ba;
      --cyan: #39d2c0;
      --yellow: #e3b341;
      --titlebar: #21262d;
      --shadow: 0 8px 24px rgba(0,0,0,0.4);
      --match-1: #3fb950;
      --match-2: #58a6ff;
      --match-3: #bc8cff;
      --match-4: #f778ba;
      --match-5: #e3b341;
      --match-6: #39d2c0;
      --group-0: rgba(63, 185, 80, 0.35);
      --group-1: rgba(88, 166, 255, 0.35);
      --group-2: rgba(188, 140, 255, 0.35);
      --group-3: rgba(247, 120, 186, 0.35);
      --group-4: rgba(227, 179, 65, 0.35);
      --group-5: rgba(57, 210, 192, 0.35);
      --mono: "SF Mono", "Fira Code", "Cascadia Code", "JetBrains Mono", Menlo, Consolas, monospace;
      --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      --radius: 8px;
      --radius-sm: 4px;
    }

    [data-theme="light"] {
      --bg: #f6f8fa;
      --bg-elevated: #ffffff;
      --bg-panel: #ffffff;
      --bg-input: #f6f8fa;
      --border: #d0d7de;
      --border-focus: #0969da;
      --text: #1f2328;
      --text-muted: #656d76;
      --text-dim: #8c959f;
      --accent: #0969da;
      --accent-soft: rgba(9, 105, 218, 0.1);
      --green: #1a7f37;
      --green-soft: rgba(26, 127, 55, 0.12);
      --red: #cf222e;
      --red-soft: rgba(207, 34, 46, 0.1);
      --orange: #9a6700;
      --orange-soft: rgba(154, 103, 0, 0.12);
      --purple: #8250df;
      --purple-soft: rgba(130, 80, 223, 0.12);
      --pink: #bf3989;
      --cyan: #1b7c83;
      --yellow: #9a6700;
      --titlebar: #eaeef2;
      --shadow: 0 8px 24px rgba(140, 149, 159, 0.2);
      --match-1: #1a7f37;
      --match-2: #0969da;
      --match-3: #8250df;
      --match-4: #bf3989;
      --match-5: #9a6700;
      --match-6: #1b7c83;
      --group-0: rgba(26, 127, 55, 0.25);
      --group-1: rgba(9, 105, 218, 0.25);
      --group-2: rgba(130, 80, 223, 0.25);
      --group-3: rgba(191, 57, 137, 0.25);
      --group-4: rgba(154, 103, 0, 0.25);
      --group-5: rgba(27, 124, 131, 0.25);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { font-size: 15px; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* Header */
    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: var(--bg-elevated);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .brand-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--accent), var(--purple));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-weight: 700;
      font-size: 14px;
      color: white;
      box-shadow: 0 2px 8px rgba(88, 166, 255, 0.3);
    }

    .brand h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .brand span {
      color: var(--text-muted);
      font-size: 0.8rem;
      font-weight: 400;
      margin-left: 0.5rem;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.4rem 0.75rem;
      font-size: 0.8rem;
      font-weight: 500;
      font-family: var(--sans);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg-panel);
      color: var(--text);
      cursor: pointer;
      transition: all 0.15s ease;
      white-space: nowrap;
    }

    .btn:hover {
      background: var(--bg-elevated);
      border-color: var(--text-dim);
    }

    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .btn-primary:hover {
      background: #4a9aef;
      border-color: #4a9aef;
    }

    .btn-danger {
      color: var(--red);
      border-color: transparent;
      background: transparent;
    }

    .btn-danger:hover {
      background: var(--red-soft);
      border-color: var(--red);
    }

    .btn-icon {
      padding: 0.4rem;
      min-width: 32px;
      justify-content: center;
    }

    .btn-ghost {
      background: transparent;
      border-color: transparent;
      color: var(--text-muted);
    }

    .btn-ghost:hover {
      background: var(--accent-soft);
      color: var(--accent);
      border-color: transparent;
    }

    /* Layout */
    .app-body {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 0;
      max-width: 1600px;
      margin: 0 auto;
      min-height: calc(100vh - 57px);
    }

    .main-col {
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      border-right: 1px solid var(--border);
      overflow-y: auto;
    }

    .side-col {
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      overflow-y: auto;
      max-height: calc(100vh - 57px);
      position: sticky;
      top: 57px;
    }

    /* Terminal window chrome */
    .term {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .term-titlebar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 0.85rem;
      background: var(--titlebar);
      border-bottom: 1px solid var(--border);
      user-select: none;
    }

    .term-dots {
      display: flex;
      gap: 6px;
    }

    .term-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .term-dot.red { background: #ff5f57; }
    .term-dot.yellow { background: #febc2e; }
    .term-dot.green { background: #28c840; }

    .term-title {
      flex: 1;
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-muted);
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .term-actions {
      display: flex;
      gap: 0.25rem;
    }

    .term-body {
      padding: 0.85rem;
    }

    /* Pattern input */
    .pattern-row {
      display: flex;
      align-items: stretch;
      gap: 0;
      font-family: var(--mono);
      font-size: 1rem;
    }

    .pattern-delim {
      display: flex;
      align-items: center;
      padding: 0 0.6rem;
      background: var(--bg-input);
      border: 1px solid var(--border);
      color: var(--accent);
      font-weight: 600;
      font-size: 1.1rem;
      user-select: none;
    }

    .pattern-delim.left {
      border-right: none;
      border-radius: var(--radius-sm) 0 0 var(--radius-sm);
    }

    .pattern-delim.right {
      border-left: none;
      border-radius: 0;
    }

    .pattern-input {
      flex: 1;
      padding: 0.65rem 0.75rem;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-left: none;
      border-right: none;
      color: var(--text);
      font-family: var(--mono);
      font-size: 1rem;
      outline: none;
      min-width: 0;
    }

    .pattern-input:focus {
      /* focus handled by parent */
    }

    .pattern-row:focus-within .pattern-delim,
    .pattern-row:focus-within .pattern-input,
    .pattern-row:focus-within .flags-input {
      border-color: var(--border-focus);
    }

    .flags-input {
      width: 70px;
      padding: 0.65rem 0.5rem;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-left: none;
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      color: var(--green);
      font-family: var(--mono);
      font-size: 0.95rem;
      font-weight: 600;
      outline: none;
      letter-spacing: 0.05em;
    }

    .flag-toggles {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 0.75rem;
    }

    .flag-toggle {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.3rem 0.6rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg-input);
      color: var(--text-muted);
      font-family: var(--mono);
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.15s ease;
      user-select: none;
    }

    .flag-toggle:hover {
      border-color: var(--text-dim);
      color: var(--text);
    }

    .flag-toggle.active {
      background: var(--accent-soft);
      border-color: var(--accent);
      color: var(--accent);
    }

    .flag-toggle .flag-letter {
      font-weight: 700;
      font-size: 0.85rem;
    }

    .flag-toggle .flag-name {
      color: inherit;
      opacity: 0.7;
    }

    /* Error bar */
    .error-bar {
      display: none;
      align-items: flex-start;
      gap: 0.5rem;
      margin-top: 0.75rem;
      padding: 0.6rem 0.75rem;
      background: var(--red-soft);
      border: 1px solid var(--red);
      border-radius: var(--radius-sm);
      color: var(--red);
      font-size: 0.8rem;
      font-family: var(--mono);
    }

    .error-bar.visible { display: flex; }

    .error-bar .error-icon {
      flex-shrink: 0;
      margin-top: 1px;
    }

    .error-bar .error-msg { flex: 1; word-break: break-word; }

    .error-bar .error-caret {
      color: var(--text-muted);
      font-size: 0.75rem;
    }

    /* Text area */
    textarea, .highlight-view {
      width: 100%;
      min-height: 160px;
      padding: 0.75rem;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.9rem;
      line-height: 1.7;
      outline: none;
      resize: vertical;
      white-space: pre-wrap;
      word-wrap: break-word;
      tab-size: 2;
    }

    textarea:focus { border-color: var(--border-focus); }

    .text-stack {
      position: relative;
    }

    /* Highlighted matches */
    .highlight-view {
      min-height: 120px;
      max-height: 280px;
      overflow: auto;
    }

    .highlight-view .match {
      border-radius: 2px;
      padding: 1px 0;
      box-decoration-break: clone;
      -webkit-box-decoration-break: clone;
    }

    .highlight-view .match-0 { background: var(--group-0); outline: 1px solid var(--match-1); }
    .highlight-view .match-1 { background: var(--group-1); outline: 1px solid var(--match-2); }
    .highlight-view .match-2 { background: var(--group-2); outline: 1px solid var(--match-3); }
    .highlight-view .match-3 { background: var(--group-3); outline: 1px solid var(--match-4); }
    .highlight-view .match-4 { background: var(--group-4); outline: 1px solid var(--match-5); }
    .highlight-view .match-5 { background: var(--group-5); outline: 1px solid var(--match-6); }

    .highlight-view .group {
      border-radius: 2px;
      padding: 0 1px;
    }

    .highlight-view .g1 { background: var(--group-1); }
    .highlight-view .g2 { background: var(--group-2); }
    .highlight-view .g3 { background: var(--group-3); }
    .highlight-view .g4 { background: var(--group-4); }
    .highlight-view .g5 { background: var(--group-5); }
    .highlight-view .g6 { background: rgba(248, 81, 73, 0.3); }

    .match-count {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-family: var(--mono);
    }

    .match-count strong {
      color: var(--green);
      font-weight: 600;
    }

    /* Matches table */
    .matches-table-wrap {
      overflow: auto;
      max-height: 320px;
    }

    table.matches-table {
      width: 100%;
      border-collapse: collapse;
      font-family: var(--mono);
      font-size: 0.8rem;
    }

    table.matches-table th {
      text-align: left;
      padding: 0.5rem 0.65rem;
      background: var(--titlebar);
      color: var(--text-muted);
      font-weight: 600;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 1;
    }

    table.matches-table td {
      padding: 0.45rem 0.65rem;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    table.matches-table tr:hover td {
      background: var(--accent-soft);
    }

    table.matches-table .idx {
      color: var(--text-dim);
      width: 40px;
    }

    table.matches-table .match-val {
      color: var(--green);
      word-break: break-all;
    }

    table.matches-table .indices {
      color: var(--text-muted);
      white-space: nowrap;
    }

    table.matches-table .group-val {
      color: var(--purple);
      word-break: break-all;
    }

    table.matches-table .group-val.empty {
      color: var(--text-dim);
      font-style: italic;
    }

    .empty-state {
      padding: 1.5rem;
      text-align: center;
      color: var(--text-dim);
      font-size: 0.85rem;
    }

    /* Explanation */
    .explanation {
      font-family: var(--mono);
      font-size: 0.82rem;
      line-height: 1.8;
    }

    .explanation .token {
      display: inline-flex;
      align-items: baseline;
      gap: 0.35rem;
      flex-wrap: wrap;
      margin-bottom: 0.35rem;
      padding: 0.25rem 0;
    }

    .explanation .tok {
      background: var(--accent-soft);
      color: var(--accent);
      padding: 0.1rem 0.4rem;
      border-radius: 3px;
      font-weight: 600;
      white-space: pre;
      flex-shrink: 0;
    }

    .explanation .tok.meta { background: var(--purple-soft); color: var(--purple); }
    .explanation .tok.quant { background: var(--orange-soft); color: var(--orange); }
    .explanation .tok.anchor { background: var(--green-soft); color: var(--green); }
    .explanation .tok.charclass { background: var(--red-soft); color: var(--red); }
    .explanation .tok.group { background: var(--purple-soft); color: var(--purple); }
    .explanation .tok.escape { background: var(--orange-soft); color: var(--cyan); }
    .explanation .tok.literal { background: transparent; color: var(--text); border: 1px solid var(--border); }

    .explanation .desc {
      color: var(--text-muted);
    }

    .explanation .tree-indent {
      color: var(--border);
      margin-right: 0.15rem;
    }

    /* Cheatsheet / quick inserts */
    .cheatsheet h3, .section-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-dim);
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .token-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
    }

    .token-btn {
      display: inline-flex;
      flex-direction: column;
      align-items: flex-start;
      padding: 0.35rem 0.55rem;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.12s ease;
      font-family: var(--mono);
      min-width: 0;
    }

    .token-btn:hover {
      border-color: var(--accent);
      background: var(--accent-soft);
      transform: translateY(-1px);
    }

    .token-btn:active { transform: scale(0.97); }

    .token-btn .tok-code {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--accent);
    }

    .token-btn .tok-label {
      font-size: 0.65rem;
      color: var(--text-dim);
      font-family: var(--sans);
      margin-top: 1px;
    }

    .cheat-section {
      margin-bottom: 1rem;
    }

    .cheat-section:last-child { margin-bottom: 0; }

    /* Status bar */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      padding: 0.7rem 1.1rem;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      font-size: 0.85rem;
      color: var(--text);
      z-index: 1000;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.25s ease;
      pointer-events: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.success { border-color: var(--green); }
    .toast.success .toast-icon { color: var(--green); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

    /* Responsive */
    @media (max-width: 960px) {
      .app-body {
        grid-template-columns: 1fr;
      }
      .main-col { border-right: none; border-bottom: 1px solid var(--border); }
      .side-col {
        position: static;
        max-height: none;
      }
    }

    @media (max-width: 600px) {
      .app-header { padding: 0.6rem 1rem; }
      .brand span { display: none; }
      .main-col, .side-col { padding: 0.85rem; }
      .flag-toggle .flag-name { display: none; }
    }

    /* Legend for group colors */
    .group-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.7rem;
      color: var(--text-muted);
      font-family: var(--mono);
    }

    .legend-swatch {
      width: 12px;
      height: 12px;
      border-radius: 2px;
    }

    .legend-swatch.g0 { background: var(--group-0); outline: 1px solid var(--match-1); }
    .legend-swatch.g1 { background: var(--group-1); outline: 1px solid var(--match-2); }
    .legend-swatch.g2 { background: var(--group-2); outline: 1px solid var(--match-3); }
    .legend-swatch.g3 { background: var(--group-3); outline: 1px solid var(--match-4); }

    /* SVG icons */
    .icon { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* Placeholder styling */
    ::placeholder { color: var(--text-dim); opacity: 1; }

    /* Null-safe match zero-width */
    .highlight-view .zw {
      display: inline-block;
      width: 2px;
      height: 1.1em;
      background: var(--orange);
      vertical-align: text-bottom;
      border-radius: 1px;
      margin: 0 1px;
    }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <div class="brand-icon">/.*/</div>
      <h1>Regex Lab<span>pattern playground</span></h1>
    </div>
    <div class="header-actions">
      <button class="btn btn-ghost btn-icon" id="btn-theme" title="Toggle light/dark theme" aria-label="Toggle theme">
        <svg class="icon" id="icon-theme" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <button class="btn btn-ghost" id="btn-share" title="Copy shareable link">
        <svg class="icon" viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        Share
      </button>
      <button class="btn btn-danger" id="btn-clear" title="Clear all fields">

  <div class="app-body">

  <div class="toast" id="toast">
    <span class="toast-icon">
      <svg class="icon" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>

  </div>

  <script>
  (function () {
    'use strict';

    // ─── Elements ───────────────────────────────────────────────
    const $ = (sel) => document.querySelector(sel);
    const patternEl = $('#pattern');
    const flagsEl = $('#flags');
    const testTextEl = $('#test-text');
    const errorBar = $('#error-bar');
    const errorMsg = $('#error-msg');
    const errorCaret = $('#error-caret');
    const highlightView = $('#highlight-view');
    const matchesWrap = $('#matches-wrap');
    const matchCount = $('#match-count');
    const explanation = $('#explanation');
    const groupLegend = $('#group-legend');
    const toast = $('#toast');
    const toastMsg = $('#toast-msg');
    const flagToggles = document.querySelectorAll('.flag-toggle');
    const cheatsheet = $('#cheatsheet');

    // ─── Token Cheatsheet Data ──────────────────────────────────
    const CHEAT_SECTIONS = [
      {
        title: 'Character Classes',
        tokens: [
          { code: '\\d', label: 'digit' },
          { code: '\\D', label: 'non-digit' },
          { code: '\\w', label: 'word char' },
          { code: '\\W', label: 'non-word' },
          { code: '\\s', label: 'whitespace' },
          { code: '\\S', label: 'non-space' },
          { code: '.', label: 'any char' },
          { code: '\\n', label: 'newline' },
          { code: '\\t', label: 'tab' },
        ]
      },
      {
        title: 'Sets & Ranges',
        tokens: [
          { code: '[abc]', label: 'any of' },
          { code: '[^abc]', label: 'none of' },
          { code: '[A-Z]', label: 'uppercase' },
          { code: '[a-z]', label: 'lowercase' },
          { code: '[0-9]', label: 'digits' },
          { code: '[A-Za-z]', label: 'letters' },
        ]
      },
      {
        title: 'Anchors',
        tokens: [
          { code: '^', label: 'start' },
          { code: '$', label: 'end' },
          { code: '\\b', label: 'word boundary' },
          { code: '\\B', label: 'non-boundary' },
        ]
      },
      {
        title: 'Quantifiers',
        tokens: [
          { code: '*', label: '0 or more' },
          { code: '+', label: '1 or more' },
          { code: '?', label: '0 or 1' },
          { code: '{n}', label: 'exactly n' },
          { code: '{n,}', label: 'n or more' },
          { code: '{n,m}', label: 'n to m' },
          { code: '*?', label: 'lazy *' },
          { code: '+?', label: 'lazy +' },
        ]
      },
      {
        title: 'Groups & Lookaround',
        tokens: [
          { code: '(…)', label: 'capture' },
          { code: '(?:…)', label: 'non-capture' },
          { code: '(?<n>…)', label: 'named' },
          { code: '(?=…)', label: 'lookahead' },
          { code: '(?!…)', label: 'neg lookahead' },
          { code: '(?<=…)', label: 'lookbehind' },
          { code: '(?<!…)', label: 'neg lookbehind' },
          { code: '\\1', label: 'backref' },
        ]
      },
      {
        title: 'Alternation & Escapes',
        tokens: [
          { code: '|', label: 'or' },
          { code: '\\', label: 'escape' },
          { code: '\\xhh', label: 'hex char' },
          { code: '\\u{h}', label: 'unicode' },
        ]
      },
    ];

    // ─── Token Explanation Dictionary ──────────────────────────
    const TOKEN_DESCS = [
      // Order matters: longer/more specific first
      { re: /^\[\^([^\]]*)\]/, type: 'charclass', desc: (m) => `Negated set — match any char except: ${m[1] || '…'}` },
      { re: /^\[([^\]]*)\]/, type: 'charclass', desc: (m) => `Character set — match any of: ${m[1] || '…'}` },
      { re: /^\(\?\<([A-Za-z_][A-Za-z0-9_]*)\>/, type: 'group', desc: (m) => `Named capturing group "${m[1]}"` },
      { re: /^\(\?\=/, type: 'group', desc: () => 'Positive lookahead — match if followed by…' },
      { re: /^\(\?\!/, type: 'group', desc: () => 'Negative lookahead — match if NOT followed by…' },
      { re: /^\(\?\<\=/, type: 'group', desc: () => 'Positive lookbehind — match if preceded by…' },
      { re: /^\(\?\<\!/, type: 'group', desc: () => 'Negative lookbehind — match if NOT preceded by…' },
      { re: /^\(\?\:/, type: 'group', desc: () => 'Non-capturing group' },
      { re: /^\(\?\</, type: 'group', desc: () => 'Named group (opening)' },
      { re: /^\(/, type: 'group', desc: () => 'Capturing group (start)' },
      { re: /^\)/, type: 'group', desc: () => 'Group end' },
      { re: /^\|/, type: 'meta', desc: () => 'Alternation — match either side' },
      { re: /^\^/, type: 'anchor', desc: () => 'Start of string (or line with /m)' },
      { re: /^\$/, type: 'anchor', desc: () => 'End of string (or line with /m)' },
      { re: /^\./, type: 'meta', desc: () => 'Any character (except newline, unless /s)' },
      { re: /^\*\?/, type: 'quant', desc: () => 'Lazy star — 0 or more, as few as possible' },
      { re: /^\+\?/, type: 'quant', desc: () => 'Lazy plus — 1 or more, as few as possible' },
      { re: /^\?\?/, type: 'quant', desc: () => 'Lazy optional — 0 or 1, prefer 0' },
      { re: /^\*/, type: 'quant', desc: () => 'Zero or more (greedy)' },
      { re: /^\+/, type: 'quant', desc: () => 'One or more (greedy)' },
      { re: /^\?/, type: 'quant', desc: () => 'Optional — zero or one' },
      { re: /^\{(\d+),(\d+)\}\?/, type: 'quant', desc: (m) => `Lazy quantifier — ${m[1]} to ${m[2]} times` },
      { re: /^\{(\d+),\}\?/, type: 'quant', desc: (m) => `Lazy quantifier — at least ${m[1]} times` },
      { re: /^\{(\d+)\}\?/, type: 'quant', desc: (m) => `Exactly ${m[1]} times (lazy)` },
      { re: /^\{(\d+),(\d+)\}/, type: 'quant', desc: (m) => `Between ${m[1]} and ${m[2]} times` },
      { re: /^\{(\d+),\}/, type: 'quant', desc: (m) => `At least ${m[1]} times` },
      { re: /^\{(\d+)\}/, type: 'quant', desc: (m) => `Exactly ${m[1]} times` },
      { re: /^\\d/, type: 'escape', desc: () => 'Digit — [0-9]' },
      { re: /^\\D/, type: 'escape', desc: () => 'Non-digit — [^0-9]' },
      { re: /^\\w/, type: 'escape', desc: () => 'Word character — [A-Za-z0-9_]' },
      { re: /^\\W/, type: 'escape', desc: () => 'Non-word character' },
      { re: /^\\s/, type: 'escape', desc: () => 'Whitespace — space, tab, newline…' },
      { re: /^\\S/, type: 'escape', desc: () => 'Non-whitespace' },
      { re: /^\\b/, type: 'anchor', desc: () => 'Word boundary' },
      { re: /^\\B/, type: 'anchor', desc: () => 'Non-word-boundary' },
      { re: /^\\n/, type: 'escape', desc: () => 'Newline character' },
      { re: /^\\r/, type: 'escape', desc: () => 'Carriage return' },
      { re: /^\\t/, type: 'escape', desc: () => 'Tab character' },
      { re: /^\\f/, type: 'escape', desc: () => 'Form feed' },
      { re: /^\\v/, type: 'escape', desc: () => 'Vertical tab' },
      { re: /^\\0/, type: 'escape', desc: () => 'Null character' },
      { re: /^\\(\d+)/, type: 'escape', desc: (m) => `Backreference to group ${m[1]}` },
      { re: /^\\k\<([A-Za-z_][A-Za-z0-9_]*)\>/, type: 'escape', desc: (m) => `Backreference to named group "${m[1]}"` },
      { re: /^\\u\{([0-9a-fA-F]+)\}/, type: 'escape', desc: (m) => `Unicode code point U+${m[1].toUpperCase()}` },
      { re: /^\\u([0-9a-fA-F]{4})/, type: 'escape', desc: (m) => `Unicode character U+${m[1].toUpperCase()}` },
      { re: /^\\x([0-9a-fA-F]{2})/, type: 'escape', desc: (m) => `Hex character 0x${m[1].toUpperCase()}` },
      { re: /^\\c([A-Za-z])/, type: 'escape', desc: (m) => `Control character Ctrl+${m[1].toUpperCase()}` },
      { re: /^\\p\{([^}]+)\}/, type: 'escape', desc: (m) => `Unicode property: ${m[1]}` },
      { re: /^\\P\{([^}]+)\}/, type: 'escape', desc: (m) => `Negated Unicode property: ${m[1]}` },
      { re: /^\\(.)/, type: 'escape', desc: (m) => `Escaped literal: ${m[1]}` },
    ];

    // ─── Theme ──────────────────────────────────────────────────
    function initTheme() {
      const saved = localStorage.getItem('regexlab-theme');
      const theme = saved || 'dark';
      document.documentElement.setAttribute('data-theme', theme);
      updateThemeIcon(theme);
    }

    function updateThemeIcon(theme) {
      const icon = $('#icon-theme');
      if (theme === 'dark') {
        // show sun (to switch to light)
        icon.innerHTML = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
      } else {
        // show moon
        icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
      }
    }

    function toggleTheme() {
      const cur = document.documentElement.getAttribute('data-theme');
      const next = cur === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('regexlab-theme', next);
      updateThemeIcon(next);
    }

    // ─── Toast ──────────────────────────────────────────────────
    let toastTimer;
    function showToast(msg, type = 'success') {
      toastMsg.textContent = msg;
      toast.className = 'toast show ' + type;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
    }

    // ─── Flags ──────────────────────────────────────────────────
    const VALID_FLAGS = new Set(['g', 'i', 'm', 's', 'u', 'y', 'd']);

    function getFlags() {
      return flagsEl.value.split('').filter(c => VALID_FLAGS.has(c)).join('');
    }

    function setFlags(str) {
      const unique = [...new Set(str.split('').filter(c => VALID_FLAGS.has(c)))].join('');
      flagsEl.value = unique;
      syncFlagToggles();
    }

    function syncFlagToggles() {
      const flags = new Set(flagsEl.value.split(''));
      flagToggles.forEach(el => {
        const f = el.dataset.flag;
        el.classList.toggle('active', flags.has(f));
      });
    }

    function toggleFlag(flag) {
      const flags = new Set(flagsEl.value.split('').filter(c => VALID_FLAGS.has(c)));
      if (flags.has(flag)) flags.delete(flag);
      else flags.add(flag);
      flagsEl.value = [...flags].join('');
      syncFlagToggles();
      run();
      updateHash();
    }

    // ─── Escape HTML ────────────────────────────────────────────
    function escHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ─── Explain Pattern ────────────────────────────────────────
    function explainPattern(pattern) {
      if (!pattern) {
        explanation.innerHTML = '<div class="empty-state" style="padding:0.5rem 0">Your pattern breakdown appears here</div>';
        return;
      }

      const tokens = [];
      let i = 0;
      let depth = 0;

      while (i < pattern.length) {
        let matched = false;
        const rest = pattern.slice(i);

        for (const t of TOKEN_DESCS) {
          const m = rest.match(t.re);
          if (m) {
            const text = m[0];
            // Adjust depth for groups
            let thisDepth = depth;
            if (text === '(' || text.startsWith('(?')) {
              // already at current depth for open
            } else if (text === ')') {
              depth = Math.max(0, depth - 1);
              thisDepth = depth;
            }

            tokens.push({
              text,
              type: t.type,
              desc: t.desc(m),
              depth: thisDepth
            });

            if (text === '(' || (text.startsWith('(?') && !text.startsWith('(?=') && !text.startsWith('(?!') && !text.startsWith('(?<=') && !text.startsWith('(?<!'))) {
              // non-lookaround groups increase depth after
              if (text === '(' || text.startsWith('(?:') || text.startsWith('(?<')) {
                depth++;
              }
            } else if (text.startsWith('(?=') || text.startsWith('(?!') || text.startsWith('(?<=') || text.startsWith('(?<!')) {
              depth++;
            }

            i += text.length;
            matched = true;
            break;
          }
        }

        if (!matched) {
          // literal character (or sequence of literals)
          let lit = '';
          while (i < pattern.length) {
            const ch = pattern[i];
            // stop if special meta-ish
            if (/[\\^$.*+?()[\]{}|]/.test(ch)) break;
            lit += ch;
            i++;
          }
          if (lit) {
            tokens.push({
              text: lit,
              type: 'literal',
              desc: lit.length === 1
                ? `Literal character "${lit}"`
                : `Literal text "${lit}"`,
              depth
            });
          } else {
            // single unknown special — treat as literal
            tokens.push({
              text: pattern[i],
              type: 'literal',
              desc: `Character "${pattern[i]}"`,
              depth
            });
            i++;
          }
        }
      }

      if (tokens.length === 0) {
        explanation.innerHTML = '<div class="empty-state" style="padding:0.5rem 0">Empty pattern</div>';
        return;
      }

      explanation.innerHTML = tokens.map(t => {
        const indent = t.depth > 0
          ? '<span class="tree-indent">' + '│ '.repeat(t.depth) + '</span>'
          : '';
        return `<div class="token">${indent}<span class="tok ${t.type}">${escHtml(t.text)}</span> <span class="desc">${escHtml(t.desc)}</span></div>`;
      }).join('');
    }

    // ─── Run Regex ──────────────────────────────────────────────
    function run() {
      const pattern = patternEl.value;
      const text = testTextEl.value;
      const flags = getFlags();

      // Clear error
      errorBar.classList.remove('visible');
      errorMsg.textContent = '';
      errorCaret.textContent = '';

      explainPattern(pattern);

      if (!pattern) {
        highlightView.innerHTML = '<span class="empty-state" style="display:block;padding:1rem 0">Matches will highlight here</span>';
        matchesWrap.innerHTML = '<div class="empty-state">No matches yet — enter a pattern and test string</div>';
        matchCount.textContent = '';
        groupLegend.innerHTML = '';
        return;
      }

      let regex;
      try {
        regex = new RegExp(pattern, flags);
      } catch (e) {
        const msg = e.message || String(e);
        errorBar.classList.add('visible');
        errorMsg.textContent = msg;

        // Try to extract position
        const posMatch = msg.match(/position\s+(\d+)/i) || msg.match(/index\s+(\d+)/i) || msg.match(/column\s+(\d+)/i);
        if (posMatch) {
          const pos = parseInt(posMatch[1], 10);
          const caret = ' '.repeat(Math.min(pos, 60)) + '▲ position ' + pos;
          errorCaret.textContent = caret;
        } else {
          // Fallback: try to guess from common errors
          errorCaret.textContent = 'Check your pattern syntax';
        }

        highlightView.innerHTML = '<span class="empty-state" style="display:block;padding:1rem 0;color:var(--red)">Invalid regular expression</span>';
        matchesWrap.innerHTML = '<div class="empty-state" style="color:var(--red)">Fix the pattern error to see matches</div>';
        matchCount.textContent = '';
        groupLegend.innerHTML = '';
        return;
      }

      // Collect matches
      const matches = [];
      const maxMatches = 500; // safety cap

      if (flags.includes('g') || flags.includes('y')) {
        let m;
        regex.lastIndex = 0;
        while ((m = regex.exec(text)) !== null) {
          matches.push({
            match: m[0],
            index: m.index,
            groups: m.slice(1),
            named: m.groups || null
          });
          if (m[0].length === 0) {
            // avoid infinite loop on zero-width
            regex.lastIndex = m.index + 1;
          }
          if (matches.length >= maxMatches) break;
        }
      } else {
        const m = regex.exec(text);
        if (m) {
          matches.push({
            match: m[0],
            index: m.index,
            groups: m.slice(1),
            named: m.groups || null
          });
        }
      }

      // Update count
      if (matches.length === 0) {
        matchCount.innerHTML = '<strong>0</strong> matches';
      } else if (matches.length >= maxMatches) {
        matchCount.innerHTML = `<strong>${matches.length}+</strong> matches (capped)`;
      } else {
        matchCount.innerHTML = `<strong>${matches.length}</strong> match${matches.length === 1 ? '' : 'es'}`;
      }

      // Build highlight view
      renderHighlights(text, matches);
      renderTable(matches);
      renderLegend(matches);
    }

    function renderHighlights(text, matches) {
      if (!text) {
        highlightView.innerHTML = '<span class="empty-state" style="display:block;padding:1rem 0">Matches will highlight here</span>';
        return;
      }
      if (matches.length === 0) {
        highlightView.innerHTML = escHtml(text);
        return;
      }

      // Build segments with priority to earliest start then longest
      let html = '';
      let cursor = 0;

      // Sort by index
      const sorted = [...matches].sort((a, b) => a.index - b.index);
      let mi = 0;

      for (let i = 0; i < sorted.length; i++) {
        const m = sorted[i];
        if (m.index < cursor) continue; // overlapping, skip

        // text before match
        if (m.index > cursor) {
          html += escHtml(text.slice(cursor, m.index));
        }

        const colorIdx = mi % 6;
        const matchText = m.match;

        if (matchText.length === 0) {
          // zero-width match marker
          html += `<span class="zw" title="zero-width match #${mi + 1}"></span>`;
          cursor = m.index;
        } else {
          // nested group highlighting
          let inner = '';
          if (m.groups && m.groups.length > 0 && m.groups.some(g => g != null && g !== '')) {
            // Build group spans inside the match
            // Collect non-empty groups with positions
            const groupParts = [];
            let searchFrom = 0;
            for (let g = 0; g < m.groups.length; g++) {
              const gVal = m.groups[g];
              if (gVal == null || gVal === '') continue;
              const gStart = matchText.indexOf(gVal, searchFrom);
              if (gStart === -1) continue;
              groupParts.push({
                start: gStart,
                end: gStart + gVal.length,
                group: g + 1,
                value: gVal
              });
              searchFrom = gStart + gVal.length;
            }

            if (groupParts.length > 0) {
              groupParts.sort((a, b) => a.start - b.start || (b.end - b.start) - (a.end - a.start));
              // simple non-overlapping render within match
              let gc = 0;
              const used = [];
              for (const gp of groupParts) {
                if (used.some(u => !(gp.end <= u.start || gp.start >= u.end))) continue;
                used.push(gp);
              }
              used.sort((a, b) => a.start - b.start);
              for (const gp of used) {
                if (gp.start > gc) inner += escHtml(matchText.slice(gc, gp.start));
                const gColor = ((gp.group - 1) % 6) + 1;
                inner += `<span class="group g${gColor}" title="group ${gp.group}">${escHtml(gp.value)}</span>`;
                gc = gp.end;
              }
              if (gc < matchText.length) inner += escHtml(matchText.slice(gc));
            } else {
              inner = escHtml(matchText);
            }
          } else {
            inner = escHtml(matchText);
          }

          html += `<span class="match match-${colorIdx}" title="match #${mi + 1} [${m.index}–${m.index + matchText.length}]">${inner}</span>`;
          cursor = m.index + matchText.length;
        }
        mi++;
      }

      if (cursor < text.length) {
        html += escHtml(text.slice(cursor));
      }

      highlightView.innerHTML = html || '<span class="empty-state" style="display:block;padding:1rem 0">Matches will highlight here</span>';
    }

    function renderTable(matches) {
      if (matches.length === 0) {
        matchesWrap.innerHTML = '<div class="empty-state">No matches found</div>';
        return;
      }

      // Determine max group count
      let maxGroups = 0;
      let hasNamed = false;
      const namedKeys = new Set();
      matches.forEach(m => {
        maxGroups = Math.max(maxGroups, m.groups.length);
        if (m.named) {
          hasNamed = true;
          Object.keys(m.named).forEach(k => namedKeys.add(k));
        }
      });
      const namedList = [...namedKeys];

      let thead = '<th class="idx">#</th><th>Match</th><th>Index</th>';
      for (let g = 1; g <= maxGroups; g++) {
        thead += `<th>Group ${g}</th>`;
      }
      namedList.forEach(k => {
        thead += `<th title="named group">$${escHtml(k)}</th>`;
      });

      let rows = '';
      matches.forEach((m, i) => {
        const end = m.index + m.match.length;
        rows += `<tr>
          <td class="idx">${i + 1}</td>
          <td class="match-val" title="${escHtml(m.match)}">${m.match === '' ? '<span class="group-val empty">∅ zero-width</span>' : escHtml(m.match)}</td>
          <td class="indices">${m.index}–${end}</td>`;
        for (let g = 0; g < maxGroups; g++) {
          const val = m.groups[g];
          if (val == null) {
            rows += `<td class="group-val empty">—</td>`;
          } else if (val === '') {
            rows += `<td class="group-val empty">""</td>`;
          } else {
            rows += `<td class="group-val" title="${escHtml(val)}">${escHtml(val)}</td>`;
          }
        }
        namedList.forEach(k => {
          const val = m.named ? m.named[k] : undefined;
          if (val == null) {
            rows += `<td class="group-val empty">—</td>`;
          } else {
            rows += `<td class="group-val" title="${escHtml(val)}">${escHtml(val)}</td>`;
          }
        });
        rows += '</tr>';
      });

      matchesWrap.innerHTML = `<table class="matches-table"><thead><tr>${thead}</tr></thead><tbody>${rows}</tbody></table>`;
    }

    function renderLegend(matches) {
      if (matches.length === 0) {
        groupLegend.innerHTML = '';
        return;
      }
      let maxGroups = 0;
      matches.forEach(m => { maxGroups = Math.max(maxGroups, m.groups.length); });

      let html = '<span class="legend-item"><span class="legend-swatch g0"></span> full match</span>';
      for (let g = 1; g <= Math.min(maxGroups, 4); g++) {
        html += `<span class="legend-item"><span class="legend-swatch g${g}"></span> group ${g}</span>`;
      }
      if (maxGroups > 4) {
        html += `<span class="legend-item">… +${maxGroups - 4} more groups</span>`;
      }
      groupLegend.innerHTML = html;
    }

    // ─── Permalink / Hash ───────────────────────────────────────
    function updateHash() {
      const data = {
        p: patternEl.value,
        f: getFlags(),
        t: testTextEl.value
      };
      // Only write hash if there's content
      if (!data.p && !data.t) {
        if (location.hash) history.replaceState(null, '', location.pathname + location.search);
        return;
      }
      try {
        const json = JSON.stringify(data);
        // Prefer base64 for compactness & readability of special chars
        const encoded = btoa(unescape(encodeURIComponent(json)));
        const hash = '#r=' + encoded;
        if (location.hash !== hash) {
          history.replaceState(null, '', location.pathname + location.search + hash);
        }
      } catch (_) { /* ignore */ }
    }

    function loadFromHash() {
      const hash = location.hash;
      if (!hash || hash.length < 3) return false;

      try {
        let data = null;
        if (hash.startsWith('#r=')) {
          const raw = hash.slice(3);
          const json = decodeURIComponent(escape(atob(raw)));
          data = JSON.parse(json);
        } else if (hash.startsWith('#p=') || hash.includes('pattern=')) {
          // alternate formats
          const params = new URLSearchParams(hash.slice(1));
          data = {
            p: params.get('p') || params.get('pattern') || '',
            f: params.get('f') || params.get('flags') || '',
            t: params.get('t') || params.get('text') || ''
          };
        }

        if (data) {
          if (typeof data.p === 'string') patternEl.value = data.p;
          if (typeof data.f === 'string') setFlags(data.f);
          if (typeof data.t === 'string') testTextEl.value = data.t;
          return true;
        }
      } catch (_) { /* ignore bad hash */ }
      return false;
    }

    // ─── Share ──────────────────────────────────────────────────
    async function shareLink() {
      updateHash();
      const url = location.href;
      try {
        await navigator.clipboard.writeText(url);
        showToast('Permalink copied to clipboard');
      } catch (_) {
        // fallback
        const ta = document.createElement('textarea');
        ta.value = url;
        ta.style.cssText = 'position:fixed;left:-9999px';
        document.body.appendChild(ta);
        ta.select();
        try {
          document.execCommand('copy');
          showToast('Permalink copied to clipboard');
        } catch (e2) {
          showToast('Could not copy — copy the URL bar manually');
        }
        document.body.removeChild(ta);
      }
    }

    async function copyPattern() {
      const flags = getFlags();
      const text = `/${patternEl.value}/${flags}`;
      try {
        await navigator.clipboard.writeText(text);
        showToast('Pattern copied: ' + text);
      } catch (_) {
        showToast('Could not copy');
      }
    }

    // ─── Clear ──────────────────────────────────────────────────
    function clearAll() {
      patternEl.value = '';
      setFlags('');
      testTextEl.value = '';
      run();
      updateHash();
      patternEl.focus();
    }

    // ─── Quick Insert ───────────────────────────────────────────
    function buildCheatsheet() {
      cheatsheet.innerHTML = CHEAT_SECTIONS.map(sec => {
        const btns = sec.tokens.map(t =>
          `<button type="button" class="token-btn" data-insert="${escHtml(t.code)}" title="Insert ${escHtml(t.code)} — ${escHtml(t.label)}">
            <span class="tok-code">${escHtml(t.code)}</span>
            <span class="tok-label">${escHtml(t.label)}</span>
          </button>`
        ).join('');
        return `<div class="cheat-section"><div class="section-label">${escHtml(sec.title)}</div><div class="token-grid">${btns}</div></div>`;
      }).join('');

      cheatsheet.addEventListener('click', (e) => {
        const btn = e.target.closest('.token-btn');
        if (!btn) return;
        insertToken(btn.dataset.insert);
      });
    }

    function insertToken(token) {
      // Replace ellipsis placeholder focused selection
      const el = patternEl;
      const start = el.selectionStart ?? el.value.length;
      const end = el.selectionEnd ?? el.value.length;

      // If token contains …, place cursor there
      const ellipsisIdx = token.indexOf('…');
      let insertText = token;
      let cursorOffset = token.length;

      if (ellipsisIdx !== -1) {
        const selected = el.value.slice(start, end);
        if (selected) {
          insertText = token.slice(0, ellipsisIdx) + selected + token.slice(ellipsisIdx + 1);
          cursorOffset = insertText.length;
        } else {
          insertText = token.slice(0, ellipsisIdx) + token.slice(ellipsisIdx + 1);
          cursorOffset = ellipsisIdx;
        }
      }

      // Handle {n} placeholders — leave for user to fill
      el.value = el.value.slice(0, start) + insertText + el.value.slice(end);
      const newPos = start + cursorOffset;
      el.focus();
      el.setSelectionRange(newPos, newPos);
      run();
      updateHash();
    }

    // ─── Demo content (when no hash) ────────────────────────────
    function loadDemo() {
      patternEl.value = '([\\w.+-]+)@([\\w.-]+\\.\\w+)';
      setFlags('gi');
      testTextEl.value = `Contact our team:

Alice Johnson  — alice.j@example.com
Bob Smith    — bob@company.co.uk
Carol Lee    — carol_lee@test.org
Not an email: user@
Also call us at support@regex-lab.dev!

Invalid: @@oops.com or just text.`;
    }

    // ─── Events ─────────────────────────────────────────────────
    let debounceTimer;
    function scheduleRun() {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => {
        run();
        updateHash();
      }, 80);
    }

    patternEl.addEventListener('input', scheduleRun);
    flagsEl.addEventListener('input', () => {
      // sanitize flags
      const cleaned = flagsEl.value.split('').filter(c => VALID_FLAGS.has(c));
      const unique = [...new Set(cleaned)].join('');
      if (flagsEl.value !== unique) {
        const pos = flagsEl.selectionStart;
        flagsEl.value = unique;
        flagsEl.setSelectionRange(pos - 1, pos - 1);
      }
      syncFlagToggles();
      scheduleRun();
    });
    testTextEl.addEventListener('input', scheduleRun);

    flagToggles.forEach(el => {
      el.addEventListener('click', (e) => {
        e.preventDefault();
        toggleFlag(el.dataset.flag);
      });
    });

    $('#btn-theme').addEventListener('click', toggleTheme);
    $('#btn-share').addEventListener('click', shareLink);
    $('#btn-clear').addEventListener('click', clearAll);
    $('#btn-copy-pattern').addEventListener('click', copyPattern);

    window.addEventListener('hashchange', () => {
      if (loadFromHash()) run();
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
        e.preventDefault();
        clearAll();
      }
      if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
        e.preventDefault();
        shareLink();
      }
    });

    // ─── Init ───────────────────────────────────────────────────
    initTheme();
    buildCheatsheet();

    const fromHash = loadFromHash();
    if (!fromHash) {
      loadDemo();
    }
    syncFlagToggles();
    run();
    // Don't overwrite existing hash on first load of demo unless empty
    if (!fromHash) updateHash();
  })();
  </script>
</body>
</html>
