<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="description" content="Roman Empire themed Tic Tac Toe — SPQR Ludus Romanus" />
<title>SPQR · Tic Tac Toe</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
<style>
  :root {
    --gold: #c9a227;
    --gold-bright: #e8c547;
    --gold-dim: #8a7020;
    --marble-1: #f4efe6;
    --marble-2: #e8e0d0;
    --marble-3: #d4cbb8;
    --ink: #2a2418;
    --ink-soft: #5a5040;
    --vein: rgba(120, 100, 70, 0.075);
    --cell-bg: rgba(255, 252, 245, 0.74);
    --cell-border: rgba(160, 140, 90, 0.35);
    --cell-hover: rgba(201, 162, 39, 0.15);
    --cell-press: rgba(201, 162, 39, 0.28);
    --bar-bg: rgba(42, 36, 24, 0.94);
    --bar-text: #f4efe6;
    --dialog-bg: #f7f2e8;
    --dialog-scrim: rgba(30, 24, 14, 0.58);
    --banner-bg: linear-gradient(135deg, #c9a227 0%, #a88420 48%, #c9a227 100%);
    --banner-text: #1a150c;
    --shadow-soft: 0 4px 24px rgba(40, 30, 10, 0.12);
    --shadow-press: 0 1px 4px rgba(40, 30, 10, 0.18);
    --win-glow: rgba(201, 162, 39, 0.55);
    --status-bg: rgba(255, 252, 245, 0.8);
    --score-bg: rgba(255, 252, 245, 0.68);
    --x-color: #8b1a1a;
    --o-color: #1a3a6b;
    --radius: 12px;
    --radius-sm: 8px;
    --font-display: "Cinzel", "Palatino Linotype", Palatino, serif;
    --font-body: "Cormorant Garamond", Georgia, serif;
    --board-size: min(72vmin, 480px);
    --transition: 180ms ease;
  }

  [data-theme="night"] {
    --marble-1: #1a1c24;
    --marble-2: #12141a;
    --marble-3: #0c0e14;
    --ink: #e8e0d0;
    --ink-soft: #b0a890;
    --vein: rgba(201, 162, 39, 0.055);
    --cell-bg: rgba(28, 30, 40, 0.8);
    --cell-border: rgba(201, 162, 39, 0.28);
    --cell-hover: rgba(201, 162, 39, 0.16);
    --cell-press: rgba(201, 162, 39, 0.3);
    --bar-bg: rgba(10, 12, 18, 0.96);
    --bar-text: #e8dcc0;
    --dialog-bg: #1e2028;
    --dialog-scrim: rgba(0, 0, 0, 0.68);
    --status-bg: rgba(28, 30, 40, 0.85);
    --score-bg: rgba(28, 30, 40, 0.75);
    --x-color: #e07070;
    --o-color: #78a8e8;
    --shadow-soft: 0 4px 28px rgba(0, 0, 0, 0.45);
    --win-glow: rgba(232, 197, 71, 0.45);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: var(--font-body);
    color: var(--ink);
    background:
      radial-gradient(ellipse 120% 80% at 50% 0%, var(--marble-1) 0%, transparent 55%),
      radial-gradient(ellipse 80% 60% at 80% 100%, var(--marble-3) 0%, transparent 50%),
      radial-gradient(ellipse 70% 50% at 10% 90%, var(--marble-2) 0%, transparent 45%),
      linear-gradient(160deg, var(--marble-1), var(--marble-2) 45%, var(--marble-3));
    background-attachment: fixed;
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
    min-height: 100dvh;
    position: relative;
  }

  /* Marble veins */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    opacity: 0.55;
    background-image:
      repeating-linear-gradient(
        105deg,
        transparent 0px,
        transparent 40px,
        var(--vein) 40px,
        var(--vein) 41px,
        transparent 41px,
        transparent 90px,
        var(--vein) 90px,
        var(--vein) 92px
      ),
      repeating-linear-gradient(
        -25deg,
        transparent 0px,
        transparent 70px,
        var(--vein) 70px,
        var(--vein) 71px
      );
  }

  /* Colosseum arch silhouette along the base */
  body::after {
    content: "";
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    height: min(18vh, 140px);
    pointer-events: none;
    z-index: 0;
    opacity: 0.65;
    background:
      radial-gradient(ellipse 13% 100% at 8% 100%, transparent 54%, rgba(0,0,0,0.07) 55%, transparent 56%),
      radial-gradient(ellipse 13% 100% at 24% 100%, transparent 54%, rgba(0,0,0,0.07) 55%, transparent 56%),
      radial-gradient(ellipse 13% 100% at 40% 100%, transparent 54%, rgba(0,0,0,0.07) 55%, transparent 56%),
      radial-gradient(ellipse 13% 100% at 56% 100%, transparent 54%, rgba(0,0,0,0.07) 55%, transparent 56%),
      radial-gradient(ellipse 13% 100% at 72% 100%, transparent 54%, rgba(0,0,0,0.07) 55%, transparent 56%),
      radial-gradient(ellipse 13% 100% at 88% 100%, transparent 54%, rgba(0,0,0,0.07) 55%, transparent 56%);
  }

  [data-theme="night"]::after {
    opacity: 0.3;
  }

  /* ─── Top bar ─── */
  .topbar {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.75rem;
    padding: 0.65rem 1rem;
    padding-top: max(0.65rem, env(safe-area-inset-top));
    padding-left: max(1rem, env(safe-area-inset-left));
    padding-right: max(1rem, env(safe-area-inset-right));
    background: var(--bar-bg);
    color: var(--bar-text);
    box-shadow: 0 2px 16px rgba(0, 0, 0, 0.28);
    flex-shrink: 0;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 0.65rem;
    min-width: 0;
  }

  .crest {
    width: 38px;
    height: 38px;
    flex-shrink: 0;
    filter: drop-shadow(0 0 5px rgba(201, 162, 39, 0.55));
  }

  .brand-text {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: clamp(0.82rem, 2.4vw, 1.08rem);
    letter-spacing: 0.18em;
    color: var(--gold-bright);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .brand-sub {
    display: block;
    font-family: var(--font-body);
    font-weight: 400;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    color: var(--bar-text);
    opacity: 0.68;
    margin-top: 1px;
  }

  .topbar-actions {
    display: flex;
    gap: 0.45rem;
    flex-shrink: 0;
  }

  .btn {
    font-family: var(--font-display);
    font-size: clamp(0.62rem, 1.7vw, 0.76rem);
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    border: 1px solid var(--gold-dim);
    background: linear-gradient(180deg, rgba(201, 162, 39, 0.22), rgba(201, 162, 39, 0.08));
    color: var(--gold-bright);
    padding: 0.5rem 0.8rem;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition:
      background var(--transition),
      transform var(--transition),
      box-shadow var(--transition),
      border-color var(--transition);
    white-space: nowrap;
    touch-action: manipulation;
  }

  .btn:hover {
    background: linear-gradient(180deg, rgba(201, 162, 39, 0.4), rgba(201, 162, 39, 0.18));
    border-color: var(--gold);
    box-shadow: 0 0 12px rgba(201, 162, 39, 0.28);
  }

  .btn:active {
    transform: scale(0.97);
    box-shadow: var(--shadow-press);
  }

  .btn:focus-visible {
    outline: 2px solid var(--gold-bright);
    outline-offset: 2px;
  }

  .btn-primary {
    background: linear-gradient(180deg, var(--gold-bright), var(--gold));
    color: #1a150c;
    border-color: var(--gold-dim);
  }

  .btn-primary:hover {
    background: linear-gradient(180deg, #f0d060, var(--gold-bright));
    color: #1a150c;
  }

  /* ─── Main ─── */
  .main {
    position: relative;
    z-index: 1;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: clamp(0.55rem, 1.8vh, 1.15rem);
    padding: 0.75rem 1rem;
    padding-bottom: max(0.75rem, env(safe-area-inset-bottom));
    min-height: 0;
    overflow: auto;
  }

  /* Scoreboard */
  .scoreboard {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0.5rem;
    width: min(var(--board-size), 100%);
    font-family: var(--font-display);
  }

  .score-card {
    background: var(--score-bg);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid var(--cell-border);
    border-radius: var(--radius-sm);
    padding: 0.45rem 0.5rem;
    text-align: center;
    box-shadow: var(--shadow-soft);
  }

  .score-label {
    font-size: clamp(0.55rem, 1.5vw, 0.68rem);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 0.1rem;
  }

  .score-value {
    font-size: clamp(1.1rem, 3.5vw, 1.5rem);
    font-weight: 700;
    color: var(--gold);
    font-variant-numeric: tabular-nums;
  }

  .score-card.x .score-value { color: var(--x-color); }
  .score-card.o .score-value { color: var(--o-color); }

  /* Status */
  .status {
    font-family: var(--font-display);
    font-size: clamp(0.82rem, 2.3vw, 1.02rem);
    letter-spacing: 0.1em;
    text-align: center;
    padding: 0.5rem 1.25rem;
    background: var(--status-bg);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid var(--cell-border);
    border-radius: 999px;
    box-shadow: var(--shadow-soft);
    min-height: 2.4rem;
    display: flex;
    align-items: center;
    justify-content: center;
    max-width: min(var(--board-size), 100%);
    color: var(--ink);
  }

  .status .mark-x { color: var(--x-color); font-weight: 700; }
  .status .mark-o { color: var(--o-color); font-weight: 700; }

  /* Victory banner — sits under status, never overlaps header */
  .banner {
    display: none;
    width: min(var(--board-size), 100%);
    text-align: center;
    padding: 0.55rem 1rem;
    background: var(--banner-bg);
    color: var(--banner-text);
    font-family: var(--font-display);
    font-weight: 700;
    font-size: clamp(0.78rem, 2.1vw, 0.98rem);
    letter-spacing: 0.16em;
    text-transform: uppercase;
    border-radius: var(--radius-sm);
    box-shadow: 0 4px 16px rgba(201, 162, 39, 0.4);
    animation: bannerIn 340ms ease both;
  }

  .banner.visible { display: block; }

  @keyframes bannerIn {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Board */
  .board-wrap {
    position: relative;
    width: var(--board-size);
    height: var(--board-size);
    max-width: 100%;
    flex-shrink: 0;
  }

  .board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: clamp(6px, 1.5vmin, 12px);
    width: 100%;
    height: 100%;
    position: relative;
    z-index: 1;
  }

  .cell {
    position: relative;
    background: var(--cell-bg);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border: 1.5px solid var(--cell-border);
    border-radius: var(--radius);
    box-shadow: var(--shadow-soft), inset 0 1px 0 rgba(255, 255, 255, 0.22);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-display);
    font-weight: 700;
    font-size: clamp(2rem, 11.5vmin, 4.4rem);
    color: var(--ink);
    transition:
      background var(--transition),
      transform var(--transition),
      box-shadow var(--transition),
      border-color var(--transition);
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    outline: none;
  }

  .cell:hover:not(:disabled):not(.filled) {
    background: var(--cell-hover);
    border-color: var(--gold);
    box-shadow: 0 0 0 1px var(--gold), var(--shadow-soft);
  }

  .cell:active:not(:disabled):not(.filled) {
    background: var(--cell-press);
    transform: scale(0.97);
  }

  .cell:focus-visible {
    border-color: var(--gold-bright);
    box-shadow: 0 0 0 3px rgba(201, 162, 39, 0.45), var(--shadow-soft);
  }

  .cell:disabled { cursor: default; }

  .cell.x { color: var(--x-color); }
  .cell.o { color: var(--o-color); }

  .cell.win {
    background: var(--cell-hover);
    border-color: var(--gold-bright);
    box-shadow:
      0 0 20px var(--win-glow),
      0 0 0 2px var(--gold),
      inset 0 0 20px rgba(201, 162, 39, 0.15);
    animation: winPulse 1.2s ease-in-out infinite;
  }

  @keyframes winPulse {
    0%, 100% {
      box-shadow:
        0 0 16px var(--win-glow),
        0 0 0 2px var(--gold),
        inset 0 0 16px rgba(201, 162, 39, 0.12);
    }
    50% {
      box-shadow:
        0 0 28px var(--win-glow),
        0 0 0 3px var(--gold-bright),
        inset 0 0 24px rgba(201, 162, 39, 0.22);
    }
  }

  .cell .glyph {
    line-height: 1;
    display: block;
    animation: placeIn 220ms cubic-bezier(0.34, 1.4, 0.64, 1) both;
  }

  @keyframes placeIn {
    from { opacity: 0; transform: scale(0.45); }
    to   { opacity: 1; transform: scale(1); }
  }

  /* Decorative gold frame around the board */
  .board-frame {
    position: absolute;
    inset: -10px;
    border: 2px solid var(--gold-dim);
    border-radius: calc(var(--radius) + 6px);
    pointer-events: none;
    opacity: 0.42;
    box-shadow: inset 0 0 30px rgba(201, 162, 39, 0.08);
  }

  .board-frame::before,
  .board-frame::after {
    content: "◆";
    position: absolute;
    font-size: 0.55rem;
    color: var(--gold);
    opacity: 0.85;
  }
  .board-frame::before { top: -0.35em; left: 50%; transform: translateX(-50%); }
  .board-frame::after  { bottom: -0.35em; left: 50%; transform: translateX(-50%); }

  /* Confetti canvas — full viewport, no DOM particles */
  #confetti {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 50;
  }

  /* ─── Dialog ─── */
  .dialog-scrim {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: var(--dialog-scrim);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    opacity: 0;
    visibility: hidden;
    transition: opacity 200ms ease, visibility 200ms ease;
  }

  .dialog-scrim.open {
    opacity: 1;
    visibility: visible;
  }

  .dialog {
    background: var(--dialog-bg);
    color: var(--ink);
    border: 1px solid var(--gold-dim);
    border-radius: var(--radius);
    box-shadow: 0 16px 48px rgba(0, 0, 0, 0.36);
    width: min(420px, 100%);
    max-height: min(90dvh, 640px);
    overflow: auto;
    padding: 1.35rem 1.4rem 1.2rem;
    transform: translateY(10px) scale(0.98);
    transition: transform 200ms ease;
  }

  .dialog-scrim.open .dialog {
    transform: translateY(0) scale(1);
  }

  .dialog h2 {
    font-family: var(--font-display);
    font-size: 1.12rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 1.05rem;
    text-align: center;
    border-bottom: 1px solid var(--cell-border);
    padding-bottom: 0.7rem;
  }

  .field {
    margin-bottom: 1rem;
    border: none;
  }

  .field > label,
  .field-legend {
    display: block;
    font-family: var(--font-display);
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 0.45rem;
  }

  .options {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
  }

  .option {
    flex: 1 1 auto;
    min-width: fit-content;
  }

  .option input {
    position: absolute;
    opacity: 0;
    pointer-events: none;
  }

  .option span {
    display: block;
    text-align: center;
    font-family: var(--font-display);
    font-size: 0.72rem;
    letter-spacing: 0.06em;
    padding: 0.5rem 0.7rem;
    border: 1px solid var(--cell-border);
    border-radius: var(--radius-sm);
    background: var(--cell-bg);
    cursor: pointer;
    transition:
      background var(--transition),
      border-color var(--transition),
      color var(--transition),
      box-shadow var(--transition);
    white-space: nowrap;
  }

  .option input:checked + span {
    background: linear-gradient(180deg, rgba(201, 162, 39, 0.35), rgba(201, 162, 39, 0.15));
    border-color: var(--gold);
    box-shadow: 0 0 0 1px var(--gold);
    font-weight: 600;
  }

  .option input:focus-visible + span {
    outline: 2px solid var(--gold-bright);
    outline-offset: 2px;
  }

  .option:hover span {
    border-color: var(--gold-dim);
  }

  .dialog-actions {
    display: flex;
    gap: 0.5rem;
    justify-content: flex-end;
    margin-top: 1.15rem;
    padding-top: 0.9rem;
    border-top: 1px solid var(--cell-border);
  }

  .dialog .btn {
    color: var(--ink);
    border-color: var(--gold-dim);
    background: linear-gradient(180deg, rgba(201, 162, 39, 0.18), rgba(201, 162, 39, 0.06));
  }

  .dialog .btn:hover {
    background: linear-gradient(180deg, rgba(201, 162, 39, 0.32), rgba(201, 162, 39, 0.14));
  }

  .dialog .btn-primary {
    color: #1a150c;
    background: linear-gradient(180deg, var(--gold-bright), var(--gold));
  }

  .hint {
    font-size: 0.88rem;
    color: var(--ink-soft);
    font-style: italic;
    margin-top: 0.35rem;
    line-height: 1.35;
  }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce) {
    .banner { animation: none; }
    .cell.win { animation: none; }
    .cell .glyph { animation: none; }
    .dialog-scrim, .dialog { transition: none; }
    .btn, .cell, .option span { transition: none; }
  }

  /* Compact / mobile tweaks */
  @media (max-height: 640px) {
    :root { --board-size: min(56vmin, 340px); }
    .score-card { padding: 0.28rem 0.4rem; }
    .status { padding: 0.32rem 0.85rem; min-height: 1.9rem; }
    .main { gap: 0.4rem; }
  }

  @media (max-width: 400px) {
    .topbar { padding: 0.5rem 0.55rem; gap: 0.35rem; }
    .btn { padding: 0.42rem 0.48rem; letter-spacing: 0.03em; }
    .brand-sub { display: none; }
    .crest { width: 30px; height: 30px; }
  }
</style>
</head>
<body data-theme="day">

<canvas id="confetti" aria-hidden="true"></canvas>

<header class="topbar">
  <div class="brand">
    <svg class="crest" viewBox="0 0 64 64" role="img" aria-label="SPQR eagle crest">
      <defs>
        <linearGradient id="goldg" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#e8c547"/>
          <stop offset="50%" stop-color="#c9a227"/>
          <stop offset="100%" stop-color="#8a7020"/>
        </linearGradient>
      </defs>
      <circle cx="32" cy="32" r="30" fill="none" stroke="url(#goldg)" stroke-width="2.5"/>
      <circle cx="32" cy="32" r="26" fill="none" stroke="url(#goldg)" stroke-width="0.75" opacity="0.5"/>
      <!-- Stylized aquila -->
      <path d="M32 13 L36.5 22 L45 19.5 L40 28 L49 34.5 L37.5 34 L35.5 45 L32 38.5 L28.5 45 L26.5 34 L15 34.5 L24 28 L19 19.5 L27.5 22 Z"
            fill="url(#goldg)" opacity="0.95"/>
      <text x="32" y="57" text-anchor="middle" font-family="Cinzel, serif" font-size="6.5"
            font-weight="700" fill="url(#goldg)" letter-spacing="1.2">SPQR</text>
    </svg>
    <div>
      <div class="brand-text">TIC · TAC · TOE</div>
      <span class="brand-sub">Ludus Romanus</span>
    </div>
  </div>
  <div class="topbar-actions">
    <button type="button" class="btn" id="btnNewRound">New Round</button>
    <button type="button" class="btn" id="btnCustomize">Customize</button>
    <button type="button" class="btn" id="btnResetScores">Reset Scores</button>
  </div>
</header>

<main class="main">
  <div class="scoreboard" aria-label="Scoreboard">
    <div class="score-card x">
      <div class="score-label" id="labelX">X</div>
      <div class="score-value" id="scoreX" aria-label="X wins">0</div>
    </div>
    <div class="score-card draw">
      <div class="score-label">Draws</div>
      <div class="score-value" id="scoreDraw" aria-label="Draws">0</div>
    </div>
    <div class="score-card o">
      <div class="score-label" id="labelO">O</div>
      <div class="score-value" id="scoreO" aria-label="O wins">0</div>
    </div>
  </div>

  <div class="status" id="status" role="status" aria-live="polite" aria-atomic="true">
    Ave! X moves first
  </div>

  <div class="banner" id="banner" role="status" aria-live="assertive"></div>

  <div class="board-wrap">
    <div class="board-frame" aria-hidden="true"></div>
    <div
      class="board"
      id="board"
      role="grid"
      aria-label="Tic tac toe board"
      aria-rowcount="3"
      aria-colcount="3"
    ></div>
  </div>
</main>

<!-- Customize dialog -->
<div class="dialog-scrim" id="dialogScrim" role="presentation">
  <div
    class="dialog"
    role="dialog"
    aria-modal="true"
    aria-labelledby="dialogTitle"
    id="customizeDialog"
  >
    <h2 id="dialogTitle">Customize Arena</h2>

    <fieldset class="field">
      <legend class="field-legend">Theme</legend>
      <div class="options">
        <label class="option">
          <input type="radio" name="theme" value="day" checked />
          <span>Marble Day</span>
        </label>
        <label class="option">
          <input type="radio" name="theme" value="night" />
          <span>Night Legion</span>
        </label>
      </div>
    </fieldset>

    <fieldset class="field">
      <legend class="field-legend">Glyphs</legend>
      <div class="options">
        <label class="option">
          <input type="radio" name="glyphs" value="standard" checked />
          <span>Standard X / O</span>
        </label>
        <label class="option">
          <input type="radio" name="glyphs" value="roman" />
          <span>Gladius / Laurel</span>
        </label>
      </div>
    </fieldset>

    <fieldset class="field">
      <legend class="field-legend">Mode</legend>
      <div class="options">
        <label class="option">
          <input type="radio" name="mode" value="2p" checked />
          <span>2 Players</span>
        </label>
        <label class="option">
          <input type="radio" name="mode" value="ai" />
          <span>vs AI</span>
        </label>
      </div>
    </fieldset>

    <fieldset class="field">
      <legend class="field-legend">First Move</legend>
      <div class="options">
        <label class="option">
          <input type="radio" name="first" value="X" checked />
          <span id="firstXLabel">X</span>
        </label>
        <label class="option">
          <input type="radio" name="first" value="O" />
          <span id="firstOLabel">O</span>
        </label>
      </div>
    </fieldset>

    <fieldset class="field">
      <legend class="field-legend">AI Discipline</legend>
      <div class="options">
        <label class="option">
          <input type="radio" name="aiLevel" value="perfect" checked />
          <span>Perfect</span>
        </label>
        <label class="option">
          <input type="radio" name="aiLevel" value="pragmatic" />
          <span>Pragmatic</span>
        </label>
        <label class="option">
          <input type="radio" name="aiLevel" value="reckless" />
          <span>Reckless</span>
        </label>
      </div>
      <p class="hint">Perfect never errs · Pragmatic occasionally softens · Reckless invites chaos</p>
    </fieldset>

    <div class="dialog-actions">
      <button type="button" class="btn" id="btnCancel">Cancel</button>
      <button type="button" class="btn btn-primary" id="btnApply">Apply & New Round</button>
    </div>
  </div>
</div>

<script>
(function () {
  "use strict";

  // ─── Constants ────────────────────────────────────────────────
  const WINS = [
    [0, 1, 2], [3, 4, 5], [6, 7, 8],
    [0, 3, 6], [1, 4, 7], [2, 5, 8],
    [0, 4, 8], [2, 4, 6]
  ];

  // Gladius (swords) for X, Laurel wreath for O
  const GLYPHS = {
    standard: { X: "X",  O: "O",  xLabel: "X",       oLabel: "O" },
    roman:    { X: "⚔",  O: "⚜",  xLabel: "Gladius", oLabel: "Laurel" }
  };

  // ─── State ────────────────────────────────────────────────────
  const settings = {
    theme: "day",
    glyphs: "standard",
    mode: "2p",       // "2p" | "ai"
    first: "X",       // who opens the round
    aiLevel: "perfect" // "perfect" | "pragmatic" | "reckless"
  };

  // In AI mode the human always plays X and the legion (AI) plays O.
  // "First move" only chooses who opens the round.
  let board = Array(9).fill(null);
  let current = "X";
  let gameOver = false;
  let scores = { X: 0, O: 0, draw: 0 };
  let aiThinking = false;
  let roundId = 0; // invalidates in-flight AI timers
  let reduceMotion = matchMedia("(prefers-reduced-motion: reduce)").matches;

  matchMedia("(prefers-reduced-motion: reduce)").addEventListener("change", (e) => {
    reduceMotion = e.matches;
    if (reduceMotion) stopConfetti();
  });

  // ─── DOM ──────────────────────────────────────────────────────
  const boardEl = document.getElementById("board");
  const statusEl = document.getElementById("status");
  const bannerEl = document.getElementById("banner");
  const scoreXEl = document.getElementById("scoreX");
  const scoreOEl = document.getElementById("scoreO");
  const scoreDrawEl = document.getElementById("scoreDraw");
  const labelXEl = document.getElementById("labelX");
  const labelOEl = document.getElementById("labelO");
  const dialogScrim = document.getElementById("dialogScrim");
  const canvas = document.getElementById("confetti");
  const ctx = canvas.getContext("2d");

  // Build 9 cells
  const cells = [];
  for (let i = 0; i < 9; i++) {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "cell";
    btn.setAttribute("role", "gridcell");
    btn.setAttribute("aria-rowindex", String(Math.floor(i / 3) + 1));
    btn.setAttribute("aria-colindex", String((i % 3) + 1));
    btn.dataset.index = String(i);
    btn.addEventListener("click", () => onCellClick(i));
    btn.addEventListener("keydown", (e) => onCellKey(e, i));
    boardEl.appendChild(btn);
    cells.push(btn);
  }

  // ─── Helpers ──────────────────────────────────────────────────
  function glyphOf(p) {
    return GLYPHS[settings.glyphs][p];
  }
  function labelOf(p) {
    return GLYPHS[settings.glyphs][p === "X" ? "xLabel" : "oLabel"];
  }
  function markSpan(p) {
    return `<span class="mark-${p.toLowerCase()}">${glyphOf(p)}</span>`;
  }

  function updateLabels() {
    labelXEl.textContent = labelOf("X");
    labelOEl.textContent = labelOf("O");
    document.getElementById("firstXLabel").textContent = labelOf("X");
    document.getElementById("firstOLabel").textContent = labelOf("O");
  }

  function winnerOf(b) {
    for (const [a, c, d] of WINS) {
      if (b[a] && b[a] === b[c] && b[a] === b[d]) {
        return { player: b[a], line: [a, c, d] };
      }
    }
    return null;
  }

  function empties(b) {
    const out = [];
    for (let i = 0; i < 9; i++) if (!b[i]) out.push(i);
    return out;
  }

  function isFull(b) {
    return b.every(Boolean);
  }

  // ─── Minimax with alpha-beta ──────────────────────────────────
  function minimax(b, maximizing, ai, alpha, beta) {
    const w = winnerOf(b);
    if (w) return w.player === ai ? 10 : -10;
    if (isFull(b)) return 0;

    const human = ai === "X" ? "O" : "X";

    if (maximizing) {
      let best = -Infinity;
      for (const i of empties(b)) {
        b[i] = ai;
        const s = minimax(b, false, ai, alpha, beta);
        b[i] = null;
        if (s > best) best = s;
        if (best > alpha) alpha = best;
        if (beta <= alpha) break;
      }
      return best;
    }

    let best = Infinity;
    for (const i of empties(b)) {
      b[i] = human;
      const s = minimax(b, true, ai, alpha, beta);
      b[i] = null;
      if (s < best) best = s;
      if (best < beta) beta = best;
      if (beta <= alpha) break;
    }
    return best;
  }

  /** Ranked legal moves for the AI discipline handicaps. */
  function rankedMoves(b, ai) {
    const moves = [];
    for (const i of empties(b)) {
      b[i] = ai;
      const score = minimax(b, false, ai, -Infinity, Infinity);
      b[i] = null;
      moves.push({ i, score });
    }
    moves.sort((a, c) => c.score - a.score);
    return moves;
  }

  function pickAIMove(b, ai) {
    const moves = rankedMoves(b, ai);
    if (!moves.length) return null;
    const bestScore = moves[0].score;
    const top = moves.filter((m) => m.score === bestScore);
    const level = settings.aiLevel;

    if (level === "perfect") {
      return top[Math.floor(Math.random() * top.length)].i;
    }

    if (level === "pragmatic") {
      // ~70% optimal, otherwise from the better half
      if (Math.random() < 0.7) {
        return top[Math.floor(Math.random() * top.length)].i;
      }
      const half = moves.slice(0, Math.max(1, Math.ceil(moves.length / 2)));
      return half[Math.floor(Math.random() * half.length)].i;
    }

    // reckless
    const r = Math.random();
    if (r < 0.22) {
      return top[Math.floor(Math.random() * top.length)].i;
    }
    if (r < 0.55 && moves.length > 1) {
      const mid = moves.slice(Math.floor(moves.length / 3));
      return mid[Math.floor(Math.random() * mid.length)].i;
    }
    return moves[Math.floor(Math.random() * moves.length)].i;
  }

  // ─── Render ───────────────────────────────────────────────────
  function renderBoard() {
    for (let i = 0; i < 9; i++) {
      const cell = cells[i];
      const val = board[i];
      const row = Math.floor(i / 3) + 1;
      const col = (i % 3) + 1;

      cell.classList.remove("x", "o", "filled", "win");
      cell.disabled = gameOver || !!val || aiThinking;

      if (val) {
        cell.classList.add("filled", val.toLowerCase());
        cell.innerHTML = `<span class="glyph" aria-hidden="true">${glyphOf(val)}</span>`;
        cell.setAttribute("aria-label", `Row ${row}, column ${col}, ${labelOf(val)}`);
      } else {
        cell.innerHTML = "";
        cell.setAttribute("aria-label", `Row ${row}, column ${col}, empty`);
      }
    }
  }

  function setStatus(html) {
    statusEl.innerHTML = html;
  }

  function updateScoresUI() {
    scoreXEl.textContent = String(scores.X);
    scoreOEl.textContent = String(scores.O);
    scoreDrawEl.textContent = String(scores.draw);
  }

  function hideBanner() {
    bannerEl.classList.remove("visible");
    bannerEl.textContent = "";
  }

  function showBanner(text) {
    bannerEl.textContent = text;
    bannerEl.classList.add("visible");
  }

  // ─── Round flow ───────────────────────────────────────────────
  function startRound() {
    roundId++;
    board = Array(9).fill(null);
    current = settings.first;
    gameOver = false;
    aiThinking = false;
    hideBanner();
    stopConfetti();
    updateLabels();
    renderBoard();
    announceTurn();
    maybeAIMove();
  }

  function announceTurn() {
    if (gameOver) return;
    const aiTurn = settings.mode === "ai" && current === "O";
    if (aiTurn) {
      setStatus(`The legion deliberates… ${markSpan(current)}`);
    } else if (settings.mode === "ai") {
      setStatus(`Your move, Imperator — ${markSpan(current)} · ${labelOf(current)}`);
    } else {
      setStatus(`Your move — ${markSpan(current)} · ${labelOf(current)}`);
    }
  }

  function onCellClick(i) {
    if (gameOver || board[i] || aiThinking) return;
    // In AI mode humans only place as X
    if (settings.mode === "ai" && current === "O") return;
    playMove(i);
  }

  function onCellKey(e, i) {
    const row = Math.floor(i / 3);
    const col = i % 3;
    let next = null;
    switch (e.key) {
      case "ArrowRight": next = row * 3 + Math.min(2, col + 1); break;
      case "ArrowLeft":  next = row * 3 + Math.max(0, col - 1); break;
      case "ArrowDown":  next = Math.min(2, row + 1) * 3 + col; break;
      case "ArrowUp":    next = Math.max(0, row - 1) * 3 + col; break;
      case "Home":       next = row * 3; break;
      case "End":        next = row * 3 + 2; break;
      default: return;
    }
    if (next !== null && next !== i) {
      e.preventDefault();
      cells[next].focus();
    }
  }

  function playMove(i) {
    if (board[i] || gameOver) return;
    board[i] = current;
    renderBoard();

    const w = winnerOf(board);
    if (w) {
      finishWin(w);
      return;
    }
    if (isFull(board)) {
      finishDraw();
      return;
    }

    current = current === "X" ? "O" : "X";
    announceTurn();
    maybeAIMove();
  }

  function finishWin(w) {
    gameOver = true;
    scores[w.player]++;
    updateScoresUI();
    renderBoard();
    for (const idx of w.line) cells[idx].classList.add("win");
    cells.forEach((c) => { c.disabled = true; });

    const name = labelOf(w.player);
    setStatus(`Victory for ${markSpan(w.player)} · ${name}`);
    showBanner(`${name} conquers the arena`);
    launchConfetti(w.player);
  }

  function finishDraw() {
    gameOver = true;
    scores.draw++;
    updateScoresUI();
    renderBoard();
    cells.forEach((c) => { c.disabled = true; });
    setStatus("A draw — neither legion claims the field");
    showBanner("Stalemate · Gloria aequa");
  }

  function maybeAIMove() {
    if (settings.mode !== "ai" || gameOver || current !== "O") return;
    aiThinking = true;
    const thinkRound = roundId;
    renderBoard();
    announceTurn();

    const delay = reduceMotion ? 60 : 360 + Math.random() * 300;
    setTimeout(() => {
      // Discard stale AI callbacks after New Round / settings apply
      if (thinkRound !== roundId || gameOver) {
        if (thinkRound === roundId) aiThinking = false;
        return;
      }
      const move = pickAIMove(board.slice(), "O");
      aiThinking = false;
      if (move !== null) playMove(move);
    }, delay);
  }

  // ─── Canvas confetti ──────────────────────────────────────────
  let confettiParticles = [];
  let confettiRaf = null;
  let confettiActive = false;

  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    canvas.style.width = window.innerWidth + "px";
    canvas.style.height = window.innerHeight + "px";
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener("resize", resizeCanvas);
  resizeCanvas();

  function launchConfetti(player) {
    if (reduceMotion) return;
    stopConfetti();
    confettiActive = true;

    const colors = player === "X"
      ? ["#c9a227", "#e8c547", "#8b1a1a", "#d4a017", "#f0d060", "#a04040", "#fff8e0"]
      : ["#c9a227", "#e8c547", "#1a3a6b", "#d4a017", "#70a0e0", "#8a7020", "#fff8e0"];

    confettiParticles = [];
    const n = 120;
    for (let i = 0; i < n; i++) {
      confettiParticles.push({
        x: Math.random() * window.innerWidth,
        y: -20 - Math.random() * window.innerHeight * 0.45,
        w: 5 + Math.random() * 7,
        h: 7 + Math.random() * 10,
        vx: -2.2 + Math.random() * 4.4,
        vy: 2 + Math.random() * 3.6,
        rot: Math.random() * Math.PI * 2,
        vr: -0.16 + Math.random() * 0.32,
        color: colors[Math.floor(Math.random() * colors.length)],
        opacity: 0.85 + Math.random() * 0.15,
        shape: Math.random() < 0.4 ? "rect" : (Math.random() < 0.5 ? "diamond" : "circle")
      });
    }

    const start = performance.now();
    const duration = 3400;

    function frame(now) {
      if (!confettiActive) return;
      const elapsed = now - start;
      ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

      let alive = 0;
      for (const p of confettiParticles) {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.045;
        p.rot += p.vr;

        const fade = elapsed > duration - 900
          ? Math.max(0, 1 - (elapsed - (duration - 900)) / 900)
          : 1;

        if (fade <= 0 || p.y > window.innerHeight + 40) continue;
        alive++;

        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.globalAlpha = p.opacity * fade;
        ctx.fillStyle = p.color;

        if (p.shape === "rect") {
          ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        } else if (p.shape === "diamond") {
          ctx.beginPath();
          ctx.moveTo(0, -p.h / 2);
          ctx.lineTo(p.w / 2, 0);
          ctx.lineTo(0, p.h / 2);
          ctx.lineTo(-p.w / 2, 0);
          ctx.closePath();
          ctx.fill();
        } else {
          ctx.beginPath();
          ctx.arc(0, 0, p.w / 2, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }

      if (elapsed < duration && alive > 0) {
        confettiRaf = requestAnimationFrame(frame);
      } else {
        stopConfetti();
      }
    }

    confettiRaf = requestAnimationFrame(frame);
  }

  function stopConfetti() {
    confettiActive = false;
    if (confettiRaf) cancelAnimationFrame(confettiRaf);
    confettiRaf = null;
    confettiParticles = [];
    ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
  }

  // ─── Theme ────────────────────────────────────────────────────
  function applyTheme(theme) {
    document.body.setAttribute("data-theme", theme);
  }

  // ─── Dialog ───────────────────────────────────────────────────
  let lastFocus = null;

  function openDialog() {
    lastFocus = document.activeElement;
    document.querySelector(`input[name="theme"][value="${settings.theme}"]`).checked = true;
    document.querySelector(`input[name="glyphs"][value="${settings.glyphs}"]`).checked = true;
    document.querySelector(`input[name="mode"][value="${settings.mode}"]`).checked = true;
    document.querySelector(`input[name="first"][value="${settings.first}"]`).checked = true;
    document.querySelector(`input[name="aiLevel"][value="${settings.aiLevel}"]`).checked = true;
    updateLabels();
    dialogScrim.classList.add("open");
    const focusTarget =
      dialogScrim.querySelector('input[name="theme"]:checked') ||
      dialogScrim.querySelector("button");
    if (focusTarget) focusTarget.focus();
  }

  function closeDialog() {
    dialogScrim.classList.remove("open");
    if (lastFocus && typeof lastFocus.focus === "function") lastFocus.focus();
  }

  function applyDialog() {
    settings.theme = document.querySelector('input[name="theme"]:checked').value;
    settings.glyphs = document.querySelector('input[name="glyphs"]:checked').value;
    settings.mode = document.querySelector('input[name="mode"]:checked').value;
    settings.first = document.querySelector('input[name="first"]:checked').value;
    settings.aiLevel = document.querySelector('input[name="aiLevel"]:checked').value;
    applyTheme(settings.theme);
    closeDialog();
    startRound();
  }

  // Focus trap + Escape
  dialogScrim.addEventListener("keydown", (e) => {
    if (e.key === "Escape") {
      e.preventDefault();
      closeDialog();
      return;
    }
    if (e.key !== "Tab") return;

    const focusables = [...dialogScrim.querySelectorAll(
      'button, [href], input:not([type="hidden"]), select, textarea, [tabindex]:not([tabindex="-1"])'
    )].filter((el) => !el.disabled);

    if (!focusables.length) return;
    const first = focusables[0];
    const last = focusables[focusables.length - 1];

    if (e.shiftKey && document.activeElement === first) {
      e.preventDefault();
      last.focus();
    } else if (!e.shiftKey && document.activeElement === last) {
      e.preventDefault();
      first.focus();
    }
  });

  dialogScrim.addEventListener("click", (e) => {
    if (e.target === dialogScrim) closeDialog();
  });

  // ─── Buttons ──────────────────────────────────────────────────
  document.getElementById("btnNewRound").addEventListener("click", startRound);
  document.getElementById("btnCustomize").addEventListener("click", openDialog);
  document.getElementById("btnResetScores").addEventListener("click", () => {
    scores = { X: 0, O: 0, draw: 0 };
    updateScoresUI();
    startRound();
  });
  document.getElementById("btnCancel").addEventListener("click", closeDialog);
  document.getElementById("btnApply").addEventListener("click", applyDialog);

  // ─── Boot ─────────────────────────────────────────────────────
  applyTheme(settings.theme);
  updateLabels();
  updateScoresUI();
  startRound();
})();
</script>
</body>
</html>
