<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Webcam Filter Playground</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface-2: #1a1a26;
    --border: #2a2a3a;
    --text: #f0f0f5;
    --text-muted: #8888a0;
    --accent: #7c5cff;
    --accent-2: #ff5c8a;
    --accent-3: #5cffb0;
    --glow: rgba(124, 92, 255, 0.35);
    --radius: 14px;
    --radius-sm: 10px;
    --font: "Segoe UI", system-ui, -apple-system, sans-serif;
    --mono: "SF Mono", "Fira Code", ui-monospace, monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100dvh;
  }

  /* Ambient background */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 20% 10%, rgba(124, 92, 255, 0.12), transparent 55%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(255, 92, 138, 0.10), transparent 50%),
      radial-gradient(ellipse 50% 30% at 50% 50%, rgba(92, 255, 176, 0.05), transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* Header */
  header {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 22px;
    border-bottom: 1px solid var(--border);
    background: rgba(10, 10, 15, 0.75);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    display: grid;
    place-items: center;
    box-shadow: 0 0 24px var(--glow);
    font-size: 18px;
  }

  .brand h1 {
    font-size: 1.05rem;
    font-weight: 650;
    letter-spacing: -0.02em;
  }

  .brand span {
    display: block;
    font-size: 0.7rem;
    color: var(--text-muted);
    font-weight: 400;
    letter-spacing: 0.02em;
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 6px 12px;
    border-radius: 999px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    font-size: 0.75rem;
    color: var(--text-muted);
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #555;
    transition: background 0.3s, box-shadow 0.3s;
  }

  .status-dot.live {
    background: var(--accent-3);
    box-shadow: 0 0 10px rgba(92, 255, 176, 0.7);
    animation: pulse 1.6s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.55; }
  }

  /* Main layout */
  main {
    position: relative;
    z-index: 1;
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 300px;
    gap: 0;
    min-height: 0;
  }

  @media (max-width: 860px) {
    main {
      grid-template-columns: 1fr;
      grid-template-rows: 1fr auto;
    }
  }

  /* Stage */
  .stage {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    min-height: 0;
    position: relative;
  }

  .viewport-wrap {
    position: relative;
    width: min(100%, 920px);
    aspect-ratio: 4 / 3;
    max-height: calc(100dvh - 180px);
    border-radius: var(--radius);
    overflow: hidden;
    background: #000;
    border: 1px solid var(--border);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.03),
      0 24px 80px rgba(0,0,0,0.55),
      0 0 60px var(--glow);
    transition: box-shadow 0.4s ease;
  }

  .viewport-wrap.capturing {
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.03),
      0 24px 80px rgba(0,0,0,0.55),
      0 0 80px rgba(255, 92, 138, 0.5);
  }

  #video {
    position: absolute;
    width: 1px;
    height: 1px;
    opacity: 0;
    pointer-events: none;
  }

  #canvas {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
    background: #050508;
  }

  .placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    background: linear-gradient(160deg, #12121a, #0a0a0f);
    z-index: 2;
    transition: opacity 0.4s, visibility 0.4s;
  }

  .placeholder.hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  .placeholder-icon {
    width: 72px;
    height: 72px;
    border-radius: 20px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    display: grid;
    place-items: center;
    font-size: 32px;
  }

  .placeholder h2 {
    font-size: 1.15rem;
    font-weight: 600;
    letter-spacing: -0.02em;
  }

  .placeholder p {
    color: var(--text-muted);
    font-size: 0.9rem;
    max-width: 280px;
    text-align: center;
    line-height: 1.5;
  }

  .flash {
    position: absolute;
    inset: 0;
    background: white;
    opacity: 0;
    pointer-events: none;
    z-index: 5;
    transition: opacity 0.08s;
  }

  .flash.on { opacity: 0.85; }

  .effect-badge {
    position: absolute;
    top: 14px;
    left: 14px;
    z-index: 4;
    padding: 6px 12px;
    border-radius: 999px;
    background: rgba(10, 10, 15, 0.7);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.08);
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: var(--text);
    opacity: 0;
    transform: translateY(-4px);
    transition: opacity 0.3s, transform 0.3s;
  }

  .effect-badge.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .fps-badge {
    position: absolute;
    top: 14px;
    right: 14px;
    z-index: 4;
    padding: 5px 10px;
    border-radius: 8px;
    background: rgba(10, 10, 15, 0.65);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.06);
    font-family: var(--mono);
    font-size: 0.68rem;
    color: var(--text-muted);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .fps-badge.visible { opacity: 1; }

  /* Stage controls */
  .stage-controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-top: 18px;
    flex-wrap: wrap;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 11px 20px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--surface-2);
    color: var(--text);
    font-size: 0.875rem;
    font-weight: 550;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.1s, box-shadow 0.15s;
    user-select: none;
  }

  .btn:hover {
    background: #222233;
    border-color: #3a3a50;
  }

  .btn:active { transform: scale(0.97); }

  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #6a4aef);
    border-color: transparent;
    box-shadow: 0 4px 20px var(--glow);
  }

  .btn-primary:hover {
    background: linear-gradient(135deg, #8b6fff, #7c5cff);
    box-shadow: 0 6px 28px var(--glow);
  }

  .btn-snap {
    background: linear-gradient(135deg, var(--accent-2), #e04570);
    border-color: transparent;
    box-shadow: 0 4px 20px rgba(255, 92, 138, 0.3);
    padding: 12px 24px;
  }

  .btn-snap:hover {
    background: linear-gradient(135deg, #ff7098, var(--accent-2));
    box-shadow: 0 6px 28px rgba(255, 92, 138, 0.4);
  }

  .btn-icon {
    width: 42px;
    height: 42px;
    padding: 0;
    border-radius: 12px;
    font-size: 1.1rem;
  }

  .btn svg {
    width: 18px;
    height: 18px;
    fill: none;
    stroke: currentColor;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* Sidebar */
  aside {
    border-left: 1px solid var(--border);
    background: rgba(12, 12, 18, 0.9);
    backdrop-filter: blur(12px);
    display: flex;
    flex-direction: column;
    min-height: 0;
    overflow: hidden;
  }

  @media (max-width: 860px) {
    aside {
      border-left: none;
      border-top: 1px solid var(--border);
      max-height: 42vh;
    }
  }

  .sidebar-section {
    padding: 16px 16px 8px;
  }

  .sidebar-section h3 {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-bottom: 12px;
    font-weight: 600;
  }

  .filters-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    padding: 0 16px 12px;
    overflow-y: auto;
    flex: 1;
    align-content: start;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .filter-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 12px 8px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    cursor: pointer;
    font-family: inherit;
    font-size: 0.72rem;
    font-weight: 500;
    transition: all 0.15s ease;
    text-align: center;
  }

  .filter-btn:hover {
    background: var(--surface-2);
    color: var(--text);
    border-color: #3a3a50;
  }

  .filter-btn.active {
    background: rgba(124, 92, 255, 0.15);
    border-color: var(--accent);
    color: var(--text);
    box-shadow: 0 0 0 1px rgba(124, 92, 255, 0.3), inset 0 0 20px rgba(124, 92, 255, 0.08);
  }

  .filter-icon {
    font-size: 1.35rem;
    line-height: 1;
  }

  /* Intensity control */
  .slider-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 16px 16px;
  }

  .slider-row label {
    font-size: 0.75rem;
    color: var(--text-muted);
    min-width: 56px;
  }

  .slider-row output {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--accent);
    min-width: 36px;
    text-align: right;
  }

  input[type="range"] {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 4px;
    border-radius: 2px;
    background: var(--border);
    outline: none;
    cursor: pointer;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 10px var(--glow);
    cursor: pointer;
    border: 2px solid #fff;
  }

  input[type="range"]::-moz-range-thumb {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 10px var(--glow);
    cursor: pointer;
    border: 2px solid #fff;
  }

  /* Snapshots strip */
  .snapshots-section {
    border-top: 1px solid var(--border);
    padding: 12px 16px 16px;
    flex-shrink: 0;
  }

  .snapshots-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .snapshots-header h3 {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    font-weight: 600;
    margin: 0;
  }

  .btn-clear {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 0.72rem;
    cursor: pointer;
    font-family: inherit;
    padding: 2px 6px;
    border-radius: 4px;
  }

  .btn-clear:hover { color: var(--accent-2); background: rgba(255,92,138,0.1); }

  .snapshots-strip {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 4px;
    min-height: 72px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .snap-thumb {
    position: relative;
    flex-shrink: 0;
    width: 88px;
    height: 66px;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: border-color 0.15s, transform 0.15s;
  }

  .snap-thumb:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
  }

  .snap-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .snap-thumb .snap-dl {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.55);
    opacity: 0;
    transition: opacity 0.15s;
    color: #fff;
    font-size: 1.1rem;
  }

  .snap-thumb:hover .snap-dl { opacity: 1; }

  .snap-empty {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    color: var(--text-muted);
    font-size: 0.78rem;
  }

  /* Modal for full snapshot */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(8px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.25s, visibility 0.25s;
    padding: 24px;
  }

  .modal-overlay.open {
    opacity: 1;
    visibility: visible;
  }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    max-width: 90vw;
    max-height: 90vh;
    display: flex;
    flex-direction: column;
    gap: 14px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.6);
    transform: scale(0.95);
    transition: transform 0.25s;
  }

  .modal-overlay.open .modal { transform: scale(1); }

  .modal img {
    max-width: min(80vw, 800px);
    max-height: 70vh;
    border-radius: 8px;
    display: block;
  }

  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 20px;
    border-radius: 999px;
    font-size: 0.85rem;
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s, transform 0.3s;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Flip indicator */
  .mirrored-note {
    font-size: 0.68rem;
    color: var(--text-muted);
    opacity: 0.7;
  }
</style>
</head>
<body>
  <header>
    <div class="brand">
      <div class="logo">◇</div>
      <div>
        <h1>Webcam Filter Playground</h1>
        <span>Fun & surprising real-time effects</span>
      </div>
    </div>
    <div class="header-actions">
      <div class="status-pill">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Camera off</span>
      </div>
    </div>
  </header>

  <main>
    <section class="stage">
      <div class="viewport-wrap" id="viewport">
        <video id="video" playsinline muted autoplay></video>
        <canvas id="canvas"></canvas>
        <div class="flash" id="flash"></div>
        <div class="effect-badge" id="effectBadge">Normal</div>
        <div class="fps-badge" id="fpsBadge">— fps</div>
        <div class="placeholder" id="placeholder">
          <div class="placeholder-icon">📷</div>
          <h2>Start your webcam</h2>
          <p>Grant camera access to apply real-time filters and capture moments.</p>
          <button class="btn btn-primary" id="startBtn" type="button">
            <svg viewBox="0 0 24 24"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
            Enable Camera
          </button>
        </div>
      </div>

      <div class="stage-controls">
        <button class="btn btn-icon" id="mirrorBtn" type="button" title="Toggle mirror" disabled aria-label="Toggle mirror">
          <svg viewBox="0 0 24 24"><path d="M12 3v18M4 9l4-4 4 4M4 15l4 4 4-4M20 9l-4-4-4 4M20 15l-4 4-4-4"/></svg>
        </button>
        <button class="btn btn-snap" id="snapBtn" type="button" disabled>
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/></svg>
          Snapshot
        </button>
        <button class="btn" id="downloadLastBtn" type="button" disabled title="Download latest snapshot">
          <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Save
        </button>
        <button class="btn btn-icon" id="stopBtn" type="button" title="Stop camera" disabled aria-label="Stop camera">
          <svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
        </button>
      </div>
      <p class="mirrored-note" id="mirrorNote" style="margin-top:8px;display:none;">Preview is mirrored · captures save unmirrored</p>
    </section>

    <aside>
      <div class="sidebar-section">
        <h3>Filters</h3>
      </div>
      <div class="filters-grid" id="filtersGrid"></div>

      <div class="sidebar-section" style="padding-bottom:4px;padding-top:4px;">
        <h3>Intensity</h3>
      </div>
      <div class="slider-row">
        <label for="intensity">Amount</label>
        <input type="range" id="intensity" min="0" max="100" value="70" />
        <output id="intensityOut">70%</output>
      </div>

      <div class="snapshots-section">
        <div class="snapshots-header">
          <h3>Snapshots</h3>
          <button class="btn-clear" id="clearSnaps" type="button">Clear all</button>
        </div>
        <div class="snapshots-strip" id="snapStrip">
          <div class="snap-empty">No snaps yet — hit Snapshot!</div>
        </div>
      </div>
    </aside>
  </main>

  <div class="modal-overlay" id="modal">
    <div class="modal">
      <img id="modalImg" alt="Snapshot preview" />
      <div class="modal-actions">
        <button class="btn" id="modalClose" type="button">Close</button>
        <button class="btn btn-primary" id="modalDownload" type="button">
          <svg viewBox="0 0 24 24" width="16" height="16"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download
        </button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
(function () {
  "use strict";

  // ── DOM ──────────────────────────────────────────────
  const video = document.getElementById("video");
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d", { willReadFrequently: true });
  const placeholder = document.getElementById("placeholder");
  const statusDot = document.getElementById("statusDot");
  const statusText = document.getElementById("statusText");
  const startBtn = document.getElementById("startBtn");
  const snapBtn = document.getElementById("snapBtn");
  const stopBtn = document.getElementById("stopBtn");
  const mirrorBtn = document.getElementById("mirrorBtn");
  const downloadLastBtn = document.getElementById("downloadLastBtn");
  const filtersGrid = document.getElementById("filtersGrid");
  const intensitySlider = document.getElementById("intensity");
  const intensityOut = document.getElementById("intensityOut");
  const snapStrip = document.getElementById("snapStrip");
  const clearSnaps = document.getElementById("clearSnaps");
  const flash = document.getElementById("flash");
  const effectBadge = document.getElementById("effectBadge");
  const fpsBadge = document.getElementById("fpsBadge");
  const viewport = document.getElementById("viewport");
  const toast = document.getElementById("toast");
  const modal = document.getElementById("modal");
  const modalImg = document.getElementById("modalImg");
  const modalClose = document.getElementById("modalClose");
  const modalDownload = document.getElementById("modalDownload");
  const mirrorNote = document.getElementById("mirrorNote");

  // ── State ────────────────────────────────────────────
  let stream = null;
  let animId = null;
  let currentFilter = "normal";
  let intensity = 0.7;
  let mirrored = true;
  let snapshots = [];
  let lastDataUrl = null;
  let frameCount = 0;
  let fpsTime = performance.now();
  let fps = 0;
  let running = false;

  // Offscreen buffer for multi-pass effects
  let offCanvas = document.createElement("canvas");
  let offCtx = offCanvas.getContext("2d", { willReadFrequently: true });
  let offCanvas2 = document.createElement("canvas");
  let offCtx2 = offCanvas2.getContext("2d", { willReadFrequently: true });

  // Pixel buffer reuse
  let imgData = null;
  let w = 0, h = 0;

  // ── Filter definitions ───────────────────────────────
  const FILTERS = [
    { id: "normal",     name: "Normal",     icon: "○" },
    { id: "grayscale",  name: "Noir",       icon: "◐" },
    { id: "sepia",      name: "Sepia",      icon: "◑" },
    { id: "invert",     name: "Invert",     icon: "◈" },
    { id: "neon",       name: "Neon",       icon: "✦" },
    { id: "thermal",    name: "Thermal",    icon: "♨" },
    { id: "pixelate",   name: "Pixelate",   icon: "▦" },
    { id: "glitch",     name: "Glitch",     icon: "☂" },
    { id: "rgbSplit",   name: "RGB Split",  icon: "◐" },
    { id: "posterize",  name: "Posterize",  icon: "▣" },
    { id: "edge",       name: "Edge",       icon: "◈" },
    { id: "vignette",   name: "Vignette",   icon: "◉" },
    { id: "duotone",    name: "Duotone",    icon: "◒" },
    { id: "cartoon",    name: "Cartoon",    icon: "☺" },
    { id: "scanlines",  name: "CRT",        icon: "▬" },
    { id: "kaleidoscope", name: "Kaleido",  icon: "❖" },
    { id: "mirror",     name: "Kalei-Split",icon: "✂" },
    { id: "rainbow",    name: "Rainbow",    icon: "☁" },
    { id: "emboss",     name: "Emboss",     icon: "▤" },
    { id: "blur",       name: "Dream",      icon: "◎" },
  ];

  // Build filter buttons
  FILTERS.forEach((f) => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "filter-btn" + (f.id === "normal" ? " active" : "");
    btn.dataset.filter = f.id;
    btn.innerHTML = `<span class="filter-icon">${f.icon}</span>${f.name}`;
    btn.addEventListener("click", () => setFilter(f.id));
    filtersGrid.appendChild(btn);
  });

  function setFilter(id) {
    currentFilter = id;
    document.querySelectorAll(".filter-btn").forEach((b) => {
      b.classList.toggle("active", b.dataset.filter === id);
    });
    const f = FILTERS.find((x) => x.id === id);
    effectBadge.textContent = f ? f.name : id;
    effectBadge.classList.add("visible");
  }

  // ── Helpers ──────────────────────────────────────────
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add("show");
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => toast.classList.remove("show"), 2200);
  }

  function setLive(on) {
    running = on;
    statusDot.classList.toggle("live", on);
    statusText.textContent = on ? "Live" : "Camera off";
    snapBtn.disabled = !on;
    stopBtn.disabled = !on;
    mirrorBtn.disabled = !on;
    placeholder.classList.toggle("hidden", on);
    fpsBadge.classList.toggle("visible", on);
    effectBadge.classList.toggle("visible", on);
    mirrorNote.style.display = on && mirrored ? "block" : "none";
  }

  // ── Camera ───────────────────────────────────────────
  async function startCamera() {
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: {
          width: { ideal: 1280 },
          height: { ideal: 960 },
          facingMode: "user",
        },
        audio: false,
      });
      video.srcObject = stream;
      await video.play();

      // Size canvases to video
      const vw = video.videoWidth || 640;
      const vh = video.videoHeight || 480;
      canvas.width = vw;
      canvas.height = vh;
      offCanvas.width = vw;
      offCanvas.height = vh;
      offCanvas2.width = vw;
      offCanvas2.height = vh;
      w = vw;
      h = vh;

      setLive(true);
      showToast("Camera ready");
      loop();
    } catch (err) {
      console.error(err);
      let msg = "Could not access camera.";
      if (err.name === "NotAllowedError") msg = "Camera permission denied.";
      else if (err.name === "NotFoundError") msg = "No camera found.";
      showToast(msg);
      setLive(false);
    }
  }

  function stopCamera() {
    if (animId) {
      cancelAnimationFrame(animId);
      animId = null;
    }
    if (stream) {
      stream.getTracks().forEach((t) => t.stop());
      stream = null;
    }
    video.srcObject = null;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    setLive(false);
    showToast("Camera stopped");
  }

  // ── Render loop ──────────────────────────────────────
  function loop() {
    if (!running) return;
    applyFilter();
    frameCount++;
    const now = performance.now();
    if (now - fpsTime >= 1000) {
      fps = frameCount;
      frameCount = 0;
      fpsTime = now;
      fpsBadge.textContent = fps + " fps";
    }
    animId = requestAnimationFrame(loop);
  }

  // ── Pixel utilities ──────────────────────────────────
  function getPixels(sourceCtx, width, height) {
    return sourceCtx.getImageData(0, 0, width, height);
  }

  function clamp(v) {
    return v < 0 ? 0 : v > 255 ? 255 : v;
  }

  function lerp(a, b, t) {
    return a + (b - a) * t;
  }

  function mixIntensity(orig, filtered, t) {
    // Mix original pixel data with filtered based on intensity t
    if (t >= 0.995) return filtered;
    if (t <= 0.005) return orig;
    const od = orig.data;
    const fd = filtered.data;
    for (let i = 0; i < od.length; i += 4) {
      fd[i]     = od[i]     + (fd[i]     - od[i])     * t;
      fd[i + 1] = od[i + 1] + (fd[i + 1] - od[i + 1]) * t;
      fd[i + 2] = od[i + 2] + (fd[i + 2] - od[i + 2]) * t;
    }
    return filtered;
  }

  // Draw video mirror-aware into a context
  function drawVideo(c, cx, width, height) {
    cx.save();
    if (mirrored) {
      cx.translate(width, 0);
      cx.scale(-1, 1);
    }
    cx.drawImage(video, 0, 0, width, height);
    cx.restore();
  }

  // ── Filters ──────────────────────────────────────────
  function applyFilter() {
    if (video.readyState < 2) return;

    const filter = currentFilter;
    const t = intensity;

    // Always draw source first
    drawVideo(ctx, ctx, w, h);

    if (filter === "normal") return;

    // For canvas-CSS-filter effects (simple ones)
    if (filter === "blur") {
      // Pencil dream blur via iteration
      ctx.save();
      ctx.filter = `blur(${lerp(0, 8, t)}px) saturate(${lerp(1, 1.4, t)}) brightness(${lerp(1, 1.1, t)})`;
      drawVideo(ctx, ctx, w, h);
      ctx.restore();
      // Soft light overlay
      ctx.save();
      ctx.globalCompositeOperation = "soft-light";
      ctx.fillStyle = `rgba(180,160,255,${0.15 * t})`;
      ctx.fillRect(0, 0, w, h);
      ctx.restore();
      return;
    }

    if (filter === "vignette") {
      // Base slightly desaturated
      const data = getPixels(ctx, w, h);
      const orig = new ImageData(new Uint8ClampedArray(data.data), w, h);
      const d = data.data;
      const cx = w / 2, cy = h / 2;
      const maxR = Math.sqrt(cx * cx + cy * cy);
      const strength = 0.4 + t * 0.9;
      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          const i = (y * w + x) * 4;
          const dx = x - cx, dy = y - cy;
          const dist = Math.sqrt(dx * dx + dy * dy) / maxR;
          const v = 1 - Math.pow(dist, 1.6) * strength;
          // Subtle warmer tone
          d[i]     = clamp(d[i]     * v * 1.05);
          d[i + 1] = clamp(d[i + 1] * v * 0.98);
          d[i + 2] = clamp(d[i + 2] * v * 0.9);
        }
      }
      ctx.putImageData(mixIntensity(orig, data, t), 0, 0);
      return;
    }

    // Kaleidoscope — geometry based
    if (filter === "kaleidoscope") {
      const segments = 6 + Math.round(t * 6);
      offCtx.clearRect(0, 0, w, h);
      drawVideo(offCtx, offCtx, w, h);
      ctx.save();
      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, w, h);
      const cx = w / 2, cy = h / 2;
      const radius = Math.min(w, h) / 2;
      for (let i = 0; i < segments; i++) {
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate((Math.PI * 2 * i) / segments);
        if (i % 2 === 1) ctx.scale(1, -1);
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.arc(0, 0, radius, 0, Math.PI / segments);
        ctx.closePath();
        ctx.clip();
        ctx.drawImage(offCanvas, -cx, -cy);
        ctx.restore();
      }
      // Mix with normal based on intensity by zooming mid content
      if (t < 0.99) {
        ctx.globalAlpha = 1 - t;
        drawVideo(ctx, ctx, w, h);
        ctx.globalAlpha = 1;
      }
      ctx.restore();
      return;
    }

    // Horizontal flip split (mirror kaleidoscope-lite)
    if (filter === "mirror") {
      offCtx.clearRect(0, 0, w, h);
      drawVideo(offCtx, offCtx, w, h);
      const half = Math.floor(w / 2);
      // Keep left, mirror onto right
      ctx.drawImage(offCanvas, 0, 0, half, h, 0, 0, half, h);
      ctx.save();
      ctx.translate(w, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(offCanvas, 0, 0, half, h, 0, 0, half, h);
      ctx.restore();
      if (t < 0.99) {
        ctx.globalAlpha = 1 - t;
        ctx.drawImage(offCanvas, 0, 0);
        ctx.globalAlpha = 1;
      }
      return;
    }

    // RGB Split (chromatic aberration)
    if (filter === "rgbSplit") {
      const offset = Math.round(lerp(2, 18, t));
      offCtx.clearRect(0, 0, w, h);
      drawVideo(offCtx, offCtx, w, h);
      const src = getPixels(offCtx, w, h);
      const out = ctx.createImageData(w, h);
      const s = src.data, o = out.data;
      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          const i = (y * w + x) * 4;
          // R from left, G center, B from right
          const xr = Math.min(w - 1, x + offset);
          const xb = Math.max(0, x - offset);
          o[i]     = s[(y * w + xr) * 4];
          o[i + 1] = s[i + 1];
          o[i + 2] = s[(y * w + xb) * 4 + 2];
          o[i + 3] = 255;
        }
      }
      ctx.putImageData(out, 0, 0);
      return;
    }

    // Pixelate
    if (filter === "pixelate") {
      const block = Math.max(2, Math.round(lerp(4, 28, t)));
      offCtx.imageSmoothingEnabled = false;
      const sw = Math.ceil(w / block);
      const sh = Math.ceil(h / block);
      offCtx.clearRect(0, 0, w, h);
      // draw scaled down
      offCtx.drawImage(canvas, 0, 0, w, h, 0, 0, sw, sh);
      ctx.imageSmoothingEnabled = false;
      ctx.clearRect(0, 0, w, h);
      ctx.drawImage(offCanvas, 0, 0, sw, sh, 0, 0, w, h);
      ctx.imageSmoothingEnabled = true;
      return;
    }

    // Glitch
    if (filter === "glitch") {
      offCtx.clearRect(0, 0, w, h);
      drawVideo(offCtx, offCtx, w, h);
      ctx.drawImage(offCanvas, 0, 0);
      const slices = Math.round(lerp(4, 18, t));
      const maxShift = Math.round(lerp(8, 50, t));
      for (let i = 0; i < slices; i++) {
        const sy = Math.floor(Math.random() * h);
        const sh = Math.floor(Math.random() * (h / slices)) + 4;
        const sx = Math.floor((Math.random() - 0.5) * maxShift * 2);
        ctx.drawImage(offCanvas, 0, sy, w, sh, sx, sy, w, sh);
      }
      // Color channel tear
      if (Math.random() < 0.6) {
        ctx.globalCompositeOperation = "lighter";
        ctx.globalAlpha = 0.15 * t;
        ctx.drawImage(offCanvas, Math.random() * 10 - 5, 0);
        ctx.globalAlpha = 1;
        ctx.globalCompositeOperation = "source-over";
      }
      return;
    }

    // Scanlines / CRT
    if (filter === "scanlines") {
      const data = getPixels(ctx, w, h);
      const orig = new ImageData(new Uint8ClampedArray(data.data), w, h);
      const d = data.data;
      // CRT curvature-ish color boost + scanlines
      for (let y = 0; y < h; y++) {
        const scan = (y % 3 === 0) ? (1 - 0.35 * t) : 1;
        const flicker = 0.96 + Math.random() * 0.08 * t;
        for (let x = 0; x < w; x++) {
          const i = (y * w + x) * 4;
          // phosphor glow tint
          d[i]     = clamp(d[i]     * scan * flicker * 1.05);
          d[i + 1] = clamp(d[i + 1] * scan * flicker * 1.1);
          d[i + 2] = clamp(d[i + 2] * scan * flicker * 0.95);
        }
      }
      ctx.putImageData(mixIntensity(orig, data, t), 0, 0);
      // Scanline overlay
      ctx.save();
      ctx.strokeStyle = `rgba(0,0,0,${0.25 * t})`;
      ctx.lineWidth = 1;
      for (let y = 0; y < h; y += 3) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(w, y);
        ctx.stroke();
      }
      // Subtle vignette for CRT feel
      const grd = ctx.createRadialGradient(w/2, h/2, h*0.2, w/2, h/2, h*0.75);
      grd.addColorStop(0, "rgba(0,0,0,0)");
      grd.addColorStop(1, `rgba(0,0,0,${0.45 * t})`);
      ctx.fillStyle = grd;
      ctx.fillRect(0, 0, w, h);
      ctx.restore();
      return;
    }

    // All remaining filters work on ImageData
    const data = getPixels(ctx, w, h);
    const orig = new ImageData(new Uint8ClampedArray(data.data), w, h);
    const d = data.data;
    const len = d.length;

    switch (filter) {
      case "grayscale": {
        for (let i = 0; i < len; i += 4) {
          const g = 0.299 * d[i] + 0.587 * d[i + 1] + 0.114 * d[i + 2];
          // Slight contrast boost
          const c = clamp((g - 128) * (1 + t * 0.4) + 128);
          d[i] = d[i + 1] = d[i + 2] = c;
        }
        break;
      }
      case "sepia": {
        for (let i = 0; i < len; i += 4) {
          const r = d[i], g = d[i + 1], b = d[i + 2];
          d[i]     = clamp(0.393 * r + 0.769 * g + 0.189 * b);
          d[i + 1] = clamp(0.349 * r + 0.686 * g + 0.168 * b);
          d[i + 2] = clamp(0.272 * r + 0.534 * g + 0.131 * b);
        }
        break;
      }
      case "invert": {
        for (let i = 0; i < len; i += 4) {
          d[i] = 255 - d[i];
          d[i + 1] = 255 - d[i + 1];
          d[i + 2] = 255 - d[i + 2];
        }
        break;
      }
      case "neon": {
        // High saturation + pushed colors + slight edge glow via contrast
        for (let i = 0; i < len; i += 4) {
          let r = d[i], g = d[i + 1], b = d[i + 2];
          // Mainstream to neon
          const max = Math.max(r, g, b);
          const min = Math.min(r, g, b);
          const mid = (max + min) / 2;
          const satBoost = 1 + t * 2.2;
          r = mid + (r - mid) * satBoost;
          g = mid + (g - mid) * satBoost;
          b = mid + (b - mid) * satBoost;
          // Boost brightness in highlights
          const l = 0.299 * r + 0.587 * g + 0.114 * b;
          if (l > 100) {
            const k = 1 + ((l - 100) / 155) * t * 0.6;
            r *= k; g *= k; b *= k;
          }
          // Color push
          d[i]     = clamp(r);
          d[i + 1] = clamp(g * 0.95);
          d[i + 2] = clamp(b * 1.15);
        }
        ctx.putImageData(mixIntensity(orig, data, 1), 0, 0);
        // Additive glow pass
        ctx.save();
        ctx.globalCompositeOperation = "screen";
        ctx.globalAlpha = 0.25 * t;
        ctx.filter = `blur(${4 + t * 6}px)`;
        ctx.drawImage(canvas, 0, 0);
        ctx.restore();
        return;
      }
      case "thermal": {
        for (let i = 0; i < len; i += 4) {
          const g = (0.299 * d[i] + 0.587 * d[i + 1] + 0.114 * d[i + 2]) / 255;
          // Heatmap: blue -> cyan -> green -> yellow -> red
          let r, gr, b;
          if (g < 0.25) {
            const u = g / 0.25;
            r = 0; gr = 0; b = lerp(80, 255, u);
          } else if (g < 0.5) {
            const u = (g - 0.25) / 0.25;
            r = 0; gr = lerp(0, 255, u); b = lerp(255, 0, u);
          } else if (g < 0.75) {
            const u = (g - 0.5) / 0.25;
            r = lerp(0, 255, u); gr = 255; b = 0;
          } else {
            const u = (g - 0.75) / 0.25;
            r = 255; gr = lerp(255, 0, u); b = 0;
          }
          d[i] = r; d[i + 1] = gr; d[i + 2] = b;
        }
        break;
      }
      case "posterize": {
        const levels = Math.max(2, Math.round(lerp(8, 3, t)));
        const step = 255 / (levels - 1);
        for (let i = 0; i < len; i += 4) {
          d[i]     = Math.round(d[i]     / step) * step;
          d[i + 1] = Math.round(d[i + 1] / step) * step;
          d[i + 2] = Math.round(d[i + 2] / step) * step;
        }
        break;
      }
      case "edge": {
        // Sobel edge detection
        const src = new Uint8ClampedArray(d);
        const gray = new Float32Array(w * h);
        for (let i = 0, p = 0; i < len; i += 4, p++) {
          gray[p] = 0.299 * src[i] + 0.587 * src[i + 1] + 0.114 * src[i + 2];
        }
        const threshold = lerp(40, 10, t);
        for (let y = 1; y < h - 1; y++) {
          for (let x = 1; x < w - 1; x++) {
            const tl = gray[(y - 1) * w + (x - 1)];
            const tm = gray[(y - 1) * w + x];
            const tr = gray[(y - 1) * w + (x + 1)];
            const ml = gray[y * w + (x - 1)];
            const mr = gray[y * w + (x + 1)];
            const bl = gray[(y + 1) * w + (x - 1)];
            const bm = gray[(y + 1) * w + x];
            const br = gray[(y + 1) * w + (x + 1)];
            const gx = -tl + tr - 2 * ml + 2 * mr - bl + br;
            const gy = -tl - 2 * tm - tr + bl + 2 * bm + br;
            const mag = Math.sqrt(gx * gx + gy * gy);
            const v = mag > threshold ? clamp(mag * (0.8 + t)) : 0;
            const idx = (y * w + x) * 4;
            // Neon edge on dark bg
            d[idx] = v;
            d[idx + 1] = clamp(v * 1.4);
            d[idx + 2] = clamp(v * 2);
          }
        }
        break;
      }
      case "duotone": {
        // Purple-cyan duotone
        const c1 = [40, 10, 80];   // deep purple shadows
        const c2 = [0, 255, 200];  // cyan highlights
        for (let i = 0; i < len; i += 4) {
          const g = (0.299 * d[i] + 0.587 * d[i + 1] + 0.114 * d[i + 2]) / 255;
          // Contrast stretch
          const u = Math.pow(g, 0.9);
          d[i]     = lerp(c1[0], c2[0], u);
          d[i + 1] = lerp(c1[1], c2[1], u);
          d[i + 2] = lerp(c1[2], c2[2], u);
        }
        break;
      }
      case "cartoon": {
        // Posterize + edge darkening
        const levels = 5;
        const step = 255 / (levels - 1);
        const src = new Uint8ClampedArray(d);
        const gray = new Float32Array(w * h);
        for (let i = 0, p = 0; i < len; i += 4, p++) {
          gray[p] = 0.299 * src[i] + 0.587 * src[i + 1] + 0.114 * src[i + 2];
          d[i]     = Math.round(src[i] / step) * step;
          d[i + 1] = Math.round(src[i + 1] / step) * step;
          d[i + 2] = Math.round(src[i + 2] / step) * step;
          // Saturation boost
          const mid = (d[i] + d[i + 1] + d[i + 2]) / 3;
          const sat = 1 + t * 0.8;
          d[i]     = clamp(mid + (d[i] - mid) * sat);
          d[i + 1] = clamp(mid + (d[i + 1] - mid) * sat);
          d[i + 2] = clamp(mid + (d[i + 2] - mid) * sat);
        }
        // Dark edges
        for (let y = 1; y < h - 1; y++) {
          for (let x = 1; x < w - 1; x++) {
            const gx =
              -gray[(y - 1) * w + x - 1] + gray[(y - 1) * w + x + 1] +
              -2 * gray[y * w + x - 1] + 2 * gray[y * w + x + 1] +
              -gray[(y + 1) * w + x - 1] + gray[(y + 1) * w + x + 1];
            const gy =
              -gray[(y - 1) * w + x - 1] - 2 * gray[(y - 1) * w + x] - gray[(y - 1) * w + x + 1] +
               gray[(y + 1) * w + x - 1] + 2 * gray[(y + 1) * w + x] + gray[(y + 1) * w + x + 1];
            const mag = Math.sqrt(gx * gx + gy * gy);
            if (mag > lerp(80, 30, t)) {
              const idx = (y * w + x) * 4;
              d[idx] = d[idx + 1] = d[idx + 2] = 20;
            }
          }
        }
        break;
      }
      case "rainbow": {
        // Hue cycle based on luminance + time
        const time = performance.now() / 1000;
        for (let i = 0; i < len; i += 4) {
          const g = (0.299 * d[i] + 0.587 * d[i + 1] + 0.114 * d[i + 2]) / 255;
          const hue = ((g + time * 0.15) % 1) * 360;
          // HSV to RGB with fixed S/V from luminance
          const s = 0.55 + 0.4 * t;
          const v = 0.4 + g * 0.6;
          const c = v * s;
          const x = c * (1 - Math.abs(((hue / 60) % 2) - 1));
          const m = v - c;
          let r1 = 0, g1 = 0, b1 = 0;
          if (hue < 60) { r1 = c; g1 = x; }
          else if (hue < 120) { r1 = x; g1 = c; }
          else if (hue < 180) { g1 = c; b1 = x; }
          else if (hue < 240) { g1 = x; b1 = c; }
          else if (hue < 300) { r1 = x; b1 = c; }
          else { r1 = c; b1 = x; }
          d[i] = clamp((r1 + m) * 255);
          d[i + 1] = clamp((g1 + m) * 255);
          d[i + 2] = clamp((b1 + m) * 255);
        }
        break;
      }
      case "emboss": {
        const src = new Uint8ClampedArray(d);
        for (let y = 1; y < h - 1; y++) {
          for (let x = 1; x < w - 1; x++) {
            const i = (y * w + x) * 4;
            const iTL = ((y - 1) * w + (x - 1)) * 4;
            const iBR = ((y + 1) * w + (x + 1)) * 4;
            const v =
              (0.299 * src[iTL] + 0.587 * src[iTL + 1] + 0.114 * src[iTL + 2]) -
              (0.299 * src[iBR] + 0.587 * src[iBR + 1] + 0.114 * src[iBR + 2]);
            const e = clamp(128 + v * (1 + t * 2));
            d[i] = d[i + 1] = d[i + 2] = e;
          }
        }
        break;
      }
      default:
        break;
    }

    ctx.putImageData(mixIntensity(orig, data, t), 0, 0);
  }

  // ── Snapshot ─────────────────────────────────────────
  function takeSnapshot() {
    if (!running) return;
    // Flash
    flash.classList.add("on");
    viewport.classList.add("capturing");
    setTimeout(() => {
      flash.classList.remove("on");
      viewport.classList.remove("capturing");
    }, 120);

    // Capture current canvas (as displayed). If mirrored, we also save a non-mirrored
    // version preference: save what user sees.
    const dataUrl = canvas.toDataURL("image/png");
    lastDataUrl = dataUrl;
    const id = Date.now();
    snapshots.unshift({ id, dataUrl });
    if (snapshots.length > 24) snapshots.pop();
    downloadLastBtn.disabled = false;
    renderSnapshots();
    showToast("Snapshot captured");
  }

  function renderSnapshots() {
    snapStrip.innerHTML = "";
    if (!snapshots.length) {
      snapStrip.innerHTML = '<div class="snap-empty">No snaps yet — hit Snapshot!</div>';
      return;
    }
    snapshots.forEach((s) => {
      const el = document.createElement("div");
      el.className = "snap-thumb";
      el.title = "Click to view / download";
      el.innerHTML = `<img src="${s.dataUrl}" alt="Snapshot" /><div class="snap-dl">⬇</div>`;
      el.addEventListener("click", () => openModal(s.dataUrl));
      snapStrip.appendChild(el);
    });
  }

  function downloadDataUrl(dataUrl, name) {
    const a = document.createElement("a");
    a.href = dataUrl;
    a.download = name || `webcam-filter-${Date.now()}.png`;
    document.body.appendChild(a);
    a.click();
    a.remove();
  }

  function openModal(dataUrl) {
    modalImg.src = dataUrl;
    modal.dataset.url = dataUrl;
    modal.classList.add("open");
  }

  function closeModal() {
    modal.classList.remove("open");
  }

  // ── Events ───────────────────────────────────────────
  startBtn.addEventListener("click", startCamera);
  stopBtn.addEventListener("click", stopCamera);
  snapBtn.addEventListener("click", takeSnapshot);

  downloadLastBtn.addEventListener("click", () => {
    if (lastDataUrl) {
      downloadDataUrl(lastDataUrl);
      showToast("Image saved");
    }
  });

  mirrorBtn.addEventListener("click", () => {
    mirrored = !mirrored;
    mirrorNote.style.display = running && mirrored ? "block" : "none";
    showToast(mirrored ? "Mirror on" : "Mirror off");
  });

  intensitySlider.addEventListener("input", () => {
    intensity = intensitySlider.value / 100;
    intensityOut.textContent = intensitySlider.value + "%";
  });

  clearSnaps.addEventListener("click", () => {
    snapshots = [];
    lastDataUrl = null;
    downloadLastBtn.disabled = true;
    renderSnapshots();
    showToast("Snapshots cleared");
  });

  modalClose.addEventListener("click", closeModal);
  modal.addEventListener("click", (e) => {
    if (e.target === modal) closeModal();
  });
  modalDownload.addEventListener("click", () => {
    if (modal.dataset.url) {
      downloadDataUrl(modal.dataset.url);
      showToast("Image saved");
    }
  });

  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") closeModal();
    if (e.key === " " && running && document.activeElement.tagName !== "INPUT") {
      e.preventDefault();
      takeSnapshot();
    }
    if ((e.key === "s" || e.key === "S") && (e.metaKey || e.ctrlKey) && lastDataUrl) {
      e.preventDefault();
      downloadDataUrl(lastDataUrl);
      showToast("Image saved");
    }
  });

  // Cleanup
  window.addEventListener("beforeunload", () => {
    if (stream) stream.getTracks().forEach((t) => t.stop());
  });

  // Initialize badge
  setFilter("normal");
})();
</script>
</body>
</html>
