<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fun Game — Hop Hero!</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sky-top: #5B8DEE;
    --sky-mid: #87CEEB;
    --sky-bot: #FFD4A3;
    --ground: #5DBB63;
    --ground-dark: #3D8B43;
    --accent: #FF6B6B;
    --accent2: #FFE66D;
    --ui-bg: rgba(0,0,0,0.55);
    --shadow: 0 4px 20px rgba(0,0,0,0.25);
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #1a1a2e;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }

  #game-wrap {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at center, #2a2a4a 0%, #1a1a2e 100%);
  }

  canvas {
    display: block;
    border-radius: 12px;
    box-shadow: 0 0 0 4px #fff, 0 0 0 8px #FF6B6B, var(--shadow);
    max-width: 100%;
    max-height: 100%;
    cursor: pointer;
  }

  /* ── Overlays ── */
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(20, 20, 40, 0.72);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    z-index: 10;
    transition: opacity 0.35s ease;
  }
  .overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .overlay h1 {
    font-size: clamp(2.5rem, 8vw, 4.5rem);
    font-weight: 900;
    color: #fff;
    text-shadow:
      0 0 20px #FF6B6B,
      3px 3px 0 #FF6B6B,
      6px 6px 0 #FF8E53,
      0 8px 30px rgba(0,0,0,0.4);
    letter-spacing: 2px;
    animation: bounce-title 1.2s ease-in-out infinite;
  }

  @keyframes bounce-title {
    0%, 100% { transform: translateY(0) rotate(-1deg); }
    50% { transform: translateY(-10px) rotate(1deg); }
  }

  .overlay p {
    color: #e0e0ff;
    font-size: clamp(0.95rem, 2.5vw, 1.2rem);
    margin: 12px 0 28px;
    text-align: center;
    max-width: 360px;
    line-height: 1.5;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 14px 40px;
    font-size: 1.25rem;
    font-weight: 800;
    color: #fff;
    background: linear-gradient(135deg, #FF6B6B, #FF8E53);
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 6px 0 #c44, 0 8px 20px rgba(255,107,107,0.4);
    transition: transform 0.1s, box-shadow 0.1s;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 0 #c44, 0 12px 25px rgba(255,107,107,0.5); }
  .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #c44, 0 4px 10px rgba(255,107,107,0.3); }

  .btn-secondary {
    background: linear-gradient(135deg, #6C63FF, #48C9B0);
    box-shadow: 0 6px 0 #3a3a9a, 0 8px 20px rgba(108,99,255,0.4);
  }
  .btn-secondary:hover { box-shadow: 0 8px 0 #3a3a9a, 0 12px 25px rgba(108,99,255,0.5); }
  .btn-secondary:active { box-shadow: 0 2px 0 #3a3a9a, 0 4px 10px rgba(108,99,255,0.3); }

  .score-line {
    color: #FFE66D;
    font-size: 1.4rem;
    font-weight: 700;
    margin-bottom: 8px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }

  .high-line {
    color: #aaaaff;
    font-size: 1.05rem;
    margin-bottom: 24px;
  }

  /* ── HUD ── */
  #hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    pointer-events: none;
    z-index: 5;
  }

  .hud-box {
    background: var(--ui-bg);
    color: #fff;
    padding: 8px 18px;
    border-radius: 12px;
    font-weight: 700;
    font-size: 1.1rem;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    box-shadow: var(--shadow);
    letter-spacing: 0.5px;
  }

  .hud-box span { color: #FFE66D; }

  #speed-meter {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  #speed-bar {
    width: 60px;
    height: 10px;
    background: rgba(255,255,255,0.2);
    border-radius: 5px;
    overflow: hidden;
  }
  #speed-fill {
    height: 100%;
    width: 10%;
    background: linear-gradient(90deg, #48C9B0, #FFE66D, #FF6B6B);
    border-radius: 5px;
    transition: width 0.3s;
  }

  /* mute button */
  #mute-btn {
    pointer-events: auto;
    background: var(--ui-bg);
    border: none;
    color: #fff;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    font-size: 1.2rem;
    cursor: pointer;
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: var(--shadow);
    transition: transform 0.15s;
  }
  #mute-btn:hover { transform: scale(1.1); }

  /* instructions hint */
  #hint {
    position: absolute;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.7);
    font-size: 0.9rem;
    background: var(--ui-bg);
    padding: 6px 18px;
    border-radius: 20px;
    pointer-events: none;
    z-index: 5;
    transition: opacity 0.5s;
  }
  #hint.fade { opacity: 0; }

  /* particle burst styling handled in canvas */

  .character-preview {
    font-size: 4rem;
    margin-bottom: 8px;
    animation: hop-preview 0.6s ease-in-out infinite;
  }
  @keyframes hop-preview {
    0%, 100% { transform: translateY(0); }
    40% { transform: translateY(-22px); }
    60% { transform: translateY(-18px); }
  }

  .flex-btns {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }

  footer-tag, .footer-tag {
    position: absolute;
    bottom: 8px;
    right: 12px;
    color: rgba(255,255,255,0.25);
    font-size: 0.7rem;
    z-index: 6;
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="game-wrap">
  <canvas id="c"></canvas>

  <!-- HUD -->
  <div id="hud" style="display:none">
    <div>
      <div class="hud-box">Score: <span id="score-el">0</span></div>
      <div class="hud-box" style="margin-top:6px;font-size:0.9rem">Best: <span id="best-el">0</span></div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
      <button id="mute-btn" title="Toggle sound">🔊</button>
      <div class="hud-box" id="speed-meter">
        ⚡
        <div id="speed-bar"><div id="speed-fill"></div></div>
      </div>
    </div>
  </div>

  <div id="hint" class="hidden" style="display:none">Tap / Space / Click to jump!</div>

  <!-- Start Screen -->
  <div class="overlay" id="start-screen">
    <div class="character-preview">🐸</div>
    <h1>FUN GAME</h1>
    <p>Hop over obstacles, collect stars, and survive as long as you can!<br>How far can you go?</p>
    <button class="btn" id="start-btn">▶  Play!</button>
  </div>

  <!-- Game Over Screen -->
  <div class="overlay hidden" id="gameover-screen">
    <div class="character-preview" style="animation:none;font-size:3.5rem">💥</div>
    <h1 style="font-size:clamp(2rem,6vw,3.2rem);animation:none">Game Over!</h1>
    <div class="score-line" id="final-score">Score: 0</div>
    <div class="high-line" id="final-best">Best: 0</div>
    <div class="flex-btns">
      <button class="btn" id="retry-btn">🔄  Retry</button>
    </div>
  </div>

  <div class="footer-tag">Fun Game · Hop Hero</div>
</div>

<script>
/* ============================================================
   FUN GAME — Hop Hero
   A polished endless-runner, fully self-contained.
   ============================================================ */

(() => {
  'use strict';

  // ─── Canvas setup ───────────────────────────────────────────
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const W = 900, H = 500;
  canvas.width = W;
  canvas.height = H;

  // Fit canvas to viewport while keeping aspect
  function resize() {
    const maxW = window.innerWidth - 24;
    const maxH = window.innerHeight - 24;
    const scale = Math.min(maxW / W, maxH / H, 1.2);
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }
  window.addEventListener('resize', resize);
  resize();

  // ─── DOM refs ───────────────────────────────────────────────
  const startScreen   = document.getElementById('start-screen');
  const gameoverScreen= document.getElementById('gameover-screen');
  const startBtn      = document.getElementById('start-btn');
  const retryBtn      = document.getElementById('retry-btn');
  const scoreEl       = document.getElementById('score-el');
  const bestEl        = document.getElementById('best-el');
  const finalScore    = document.getElementById('final-score');
  const finalBest     = document.getElementById('final-best');
  const hud           = document.getElementById('hud');
  const hint          = document.getElementById('hint');
  const muteBtn       = document.getElementById('mute-btn');
  const speedFill     = document.getElementById('speed-fill');

  // ─── High score ─────────────────────────────────────────────
  let highScore = 0;
  try { highScore = parseInt(localStorage.getItem('funGameHS') || '0', 10); } catch(e) {}
  bestEl.textContent = highScore;

  // ─── Audio (Web Audio API – generated, no files) ────────────
  let audioCtx = null;
  let muted = false;

  function ensureAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }

  function beep(freq, dur, type = 'square', vol = 0.15, slide = 0) {
    if (muted || !audioCtx) return;
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t);
    if (slide) osc.frequency.linearRampToValueAtTime(freq + slide, t + dur);
    gain.gain.setValueAtTime(vol, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + dur);
  }

  function noiseBurst(dur = 0.15, vol = 0.12) {
    if (muted || !audioCtx) return;
    const t = audioCtx.currentTime;
    const bufferSize = audioCtx.sampleRate * dur;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
    const src = audioCtx.createBufferSource();
    src.buffer = buffer;
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(vol, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 800;
    src.connect(filter);
    filter.connect(gain);
    gain.connect(audioCtx.destination);
    src.start(t);
  }

  const SFX = {
    jump()  { beep(380, 0.12, 'square', 0.12, 220); beep(520, 0.08, 'sine', 0.06); },
    land()  { beep(120, 0.06, 'triangle', 0.1); noiseBurst(0.06, 0.06); },
    score() { beep(660, 0.07, 'sine', 0.1); setTimeout(() => beep(880, 0.1, 'sine', 0.1), 70); },
    star()  {
      beep(880, 0.06, 'sine', 0.1);
      setTimeout(() => beep(1100, 0.06, 'sine', 0.1), 50);
      setTimeout(() => beep(1320, 0.1, 'sine', 0.1), 100);
    },
    crash() {
      noiseBurst(0.3, 0.2);
      beep(150, 0.25, 'sawtooth', 0.15, -80);
      setTimeout(() => beep(90, 0.35, 'sawtooth', 0.12, -40), 80);
    },
    start() {
      [440, 550, 660, 880].forEach((f, i) => setTimeout(() => beep(f, 0.12, 'square', 0.1), i * 80));
    },
    tick()  { beep(200, 0.03, 'square', 0.04); }
  };

  muteBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    muted = !muted;
    muteBtn.textContent = muted ? '🔇' : '🔊';
    if (!muted) ensureAudio();
  });

  // ─── Game constants ─────────────────────────────────────────
  const GROUND_Y = 400;
  const GRAVITY = 0.72;
  const JUMP_V = -13.5;
  const BASE_SPEED = 5.2;
  const MAX_SPEED = 16;
  const SPEED_RAMP = 0.00055; // per frame

  // ─── State ──────────────────────────────────────────────────
  let state = 'menu'; // menu | playing | dead
  let score = 0;
  let distance = 0;
  let speed = BASE_SPEED;
  let frame = 0;
  let obstacles = [];
  let stars = [];
  let particles = [];
  let clouds = [];
  let hills = [];
  let trees = [];
  let floatingTexts = [];
  let shakeTime = 0;
  let dayPhase = 0; // 0..1 loops for sky colour shift
  let doubleJumpAvail = false;
  let tippingHint = true;

  // ─── Player ─────────────────────────────────────────────────
  const player = {
    x: 120,
    y: GROUND_Y,
    w: 48,
    h: 52,
    vy: 0,
    onGround: true,
    squish: 1,      // vertical scale for squash/stretch
    stretch: 1,
    runFrame: 0,
    blinkTimer: 0,
    eyeClosed: false,
    invuln: 0,
    rotation: 0,
  };

  // ─── Background init ────────────────────────────────────────
  function initBackground() {
    clouds = [];
    for (let i = 0; i < 7; i++) {
      clouds.push({
        x: Math.random() * W * 1.5,
        y: 30 + Math.random() * 120,
        w: 60 + Math.random() * 80,
        h: 25 + Math.random() * 20,
        speed: 0.15 + Math.random() * 0.25,
        opacity: 0.5 + Math.random() * 0.4
      });
    }
    hills = [];
    for (let i = 0; i < 5; i++) {
      hills.push({
        x: i * 280 - 50,
        w: 260 + Math.random() * 100,
        h: 80 + Math.random() * 70,
        color: i % 2 === 0 ? '#7EC850' : '#6ABF40',
        speed: 0.35
      });
    }
    trees = [];
    for (let i = 0; i < 8; i++) {
      trees.push({
        x: i * 160 + Math.random() * 60,
        h: 40 + Math.random() * 50,
        type: Math.floor(Math.random() * 3),
        speed: 0.7
      });
    }
  }
  initBackground();

  // ─── Obstacle types ─────────────────────────────────────────
  const OB_TYPES = [
    { kind: 'spike',  w: 34, h: 38, color: '#E74C3C' },
    { kind: 'box',    w: 40, h: 40, color: '#E67E22' },
    { kind: 'cactus', w: 30, h: 52, color: '#27AE60' },
    { kind: 'rock',   w: 44, h: 30, color: '#7F8C8D' },
    { kind: 'tall',   w: 28, h: 64, color: '#8E44AD' },
  ];

  function spawnObstacle() {
    const t = OB_TYPES[Math.floor(Math.random() * OB_TYPES.length)];
    // occasional double
    const pair = Math.random() < 0.18 && speed > 7;
    obstacles.push({
      x: W + 20,
      y: GROUND_Y - t.h,
      w: t.w,
      h: t.h,
      kind: t.kind,
      color: t.color,
      passed: false,
      bob: Math.random() * Math.PI * 2
    });
    if (pair) {
      const t2 = OB_TYPES[Math.floor(Math.random() * OB_TYPES.length)];
      obstacles.push({
        x: W + 20 + t.w + 14,
        y: GROUND_Y - t2.h,
        w: t2.w,
        h: t2.h,
        kind: t2.kind,
        color: t2.color,
        passed: false,
        bob: Math.random() * Math.PI * 2
      });
    }
  }

  function spawnStar() {
    stars.push({
      x: W + 30,
      y: GROUND_Y - 80 - Math.random() * 100,
      r: 12,
      spin: 0,
      collected: false
    });
  }

  // ─── Particles ──────────────────────────────────────────────
  function emitParticles(x, y, color, n = 10, speedMul = 1) {
    for (let i = 0; i < n; i++) {
      const angle = Math.random() * Math.PI * 2;
      const sp = (1.5 + Math.random() * 4) * speedMul;
      particles.push({
        x, y,
        vx: Math.cos(angle) * sp,
        vy: Math.sin(angle) * sp - 2,
        life: 30 + Math.random() * 25,
        maxLife: 40,
        size: 3 + Math.random() * 5,
        color,
        gravity: 0.15
      });
    }
  }

  function emitDust(x, y) {
    for (let i = 0; i < 5; i++) {
      particles.push({
        x: x + (Math.random() - 0.5) * 20,
        y: y,
        vx: (Math.random() - 0.5) * 2 - 1,
        vy: -Math.random() * 2,
        life: 15 + Math.random() * 10,
        maxLife: 20,
        size: 3 + Math.random() * 4,
        color: 'rgba(180,150,100,0.6)',
        gravity: 0.05
      });
    }
  }

  // ─── Floating score text ────────────────────────────────────
  function floatText(x, y, text, color = '#FFE66D') {
    floatingTexts.push({ x, y, text, color, life: 50, vy: -1.2 });
  }

  // ─── Input ──────────────────────────────────────────────────
  let jumpQueued = false;

  function doJump() {
    if (state !== 'playing') return;
    if (player.onGround) {
      player.vy = JUMP_V;
      player.onGround = false;
      player.stretch = 1.35;
      player.squish = 0.75;
      doubleJumpAvail = true;
      SFX.jump();
      emitDust(player.x + player.w / 2, GROUND_Y);
    } else if (doubleJumpAvail) {
      player.vy = JUMP_V * 0.85;
      doubleJumpAvail = false;
      player.stretch = 1.25;
      player.squish = 0.8;
      SFX.jump();
      emitParticles(player.x + player.w / 2, player.y + player.h / 2, '#7FDBFF', 8, 0.8);
    }
  }

  function onInput(e) {
    if (e.type === 'keydown' && e.code !== 'Space' && e.code !== 'ArrowUp' && e.code !== 'KeyW') return;
    if (e.type === 'keydown') e.preventDefault();
    if (state === 'playing') doJump();
  }

  window.addEventListener('keydown', onInput);
  canvas.addEventListener('pointerdown', onInput);
  // also allow jump via overlay areas when not on button
  document.addEventListener('keydown', (e) => {
    if ((e.code === 'Space' || e.code === 'Enter') && state === 'menu') startGame();
    if ((e.code === 'Space' || e.code === 'Enter') && state === 'dead') startGame();
  });

  startBtn.addEventListener('click', (e) => { e.stopPropagation(); startGame(); });
  retryBtn.addEventListener('click', (e) => { e.stopPropagation(); startGame(); });

  // ─── Game lifecycle ─────────────────────────────────────────
  function startGame() {
    ensureAudio();
    SFX.start();
    state = 'playing';
    score = 0;
    distance = 0;
    speed = BASE_SPEED;
    frame = 0;
    obstacles = [];
    stars = [];
    particles = [];
    floatingTexts = [];
    shakeTime = 0;
    dayPhase = 0;
    tippingHint = true;

    player.x = 120;
    player.y = GROUND_Y - player.h;
    player.vy = 0;
    player.onGround = true;
    player.squish = 1;
    player.stretch = 1;
    player.runFrame = 0;
    player.rotation = 0;
    player.invuln = 0;
    doubleJumpAvail = false;

    scoreEl.textContent = '0';
    speedFill.style.width = '10%';

    startScreen.classList.add('hidden');
    gameoverScreen.classList.add('hidden');
    hud.style.display = 'flex';
    hint.style.display = 'block';
    hint.classList.remove('fade');
    setTimeout(() => { hint.classList.add('fade'); }, 2800);

    initBackground();
  }

  function gameOver() {
    state = 'dead';
    SFX.crash();
    shakeTime = 20;
    emitParticles(player.x + player.w / 2, player.y + player.h / 2, '#FF6B6B', 25, 1.5);
    emitParticles(player.x + player.w / 2, player.y + player.h / 2, '#FFE66D', 12, 1.2);

    if (score > highScore) {
      highScore = score;
      try { localStorage.setItem('funGameHS', String(highScore)); } catch(e) {}
    }
    bestEl.textContent = highScore;
    finalScore.textContent = 'Score: ' + score;
    finalBest.textContent = (score >= highScore && score > 0)
      ? '🏆 New High Score!'
      : 'Best: ' + highScore;

    setTimeout(() => {
      gameoverScreen.classList.remove('hidden');
    }, 500);
  }

  // ─── Drawing helpers ────────────────────────────────────────
  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function lerpColor(a, b, t) {
    // a,b as [r,g,b]
    return [
      a[0] + (b[0] - a[0]) * t,
      a[1] + (b[1] - a[1]) * t,
      a[2] + (b[2] - a[2]) * t
    ];
  }

  // ─── Draw sky ───────────────────────────────────────────────
  function drawSky() {
    // gentle day-night oscillation based on distance
    dayPhase = (distance / 8000) % 1;
    const phase = Math.sin(dayPhase * Math.PI * 2) * 0.5 + 0.5; // 0..1

    const topDay   = [91, 141, 238];
    const topEve   = [255, 120, 80];
    const midDay   = [135, 206, 235];
    const midEve   = [255, 180, 100];
    const botDay   = [255, 212, 163];
    const botEve   = [255, 100, 120];

    const top = lerpColor(topDay, topEve, phase * 0.5);
    const mid = lerpColor(midDay, midEve, phase * 0.5);
    const bot = lerpColor(botDay, botEve, phase * 0.4);

    const grad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
    grad.addColorStop(0, `rgb(${top.map(v=>v|0).join(',')})`);
    grad.addColorStop(0.55, `rgb(${mid.map(v=>v|0).join(',')})`);
    grad.addColorStop(1, `rgb(${bot.map(v=>v|0).join(',')})`);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // sun / moon
    const sunX = W * 0.78;
    const sunY = 70 + phase * 40;
    const sunR = 36;
    // glow
    const glow = ctx.createRadialGradient(sunX, sunY, sunR * 0.3, sunX, sunY, sunR * 2.2);
    glow.addColorStop(0, `rgba(255,240,150,${0.55 - phase * 0.2})`);
    glow.addColorStop(1, 'rgba(255,200,80,0)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(sunX, sunY, sunR * 2.2, 0, Math.PI * 2);
    ctx.fill();
    // body
    ctx.fillStyle = phase > 0.6 ? '#FFF8DC' : '#FFE66D';
    ctx.beginPath();
    ctx.arc(sunX, sunY, sunR, 0, Math.PI * 2);
    ctx.fill();
    if (phase > 0.55) {
      // light moon craters
      ctx.fillStyle = 'rgba(200,200,220,0.25)';
      ctx.beginPath(); ctx.arc(sunX - 8, sunY - 6, 7, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(sunX + 10, sunY + 8, 5, 0, Math.PI * 2); ctx.fill();
    }
  }

  // ─── Draw clouds ────────────────────────────────────────────
  function drawClouds() {
    for (const c of clouds) {
      c.x -= c.speed * (speed / BASE_SPEED) * 0.5;
      if (c.x + c.w < -20) { c.x = W + 20 + Math.random() * 100; c.y = 30 + Math.random() * 120; }
      ctx.globalAlpha = c.opacity;
      ctx.fillStyle = '#fff';
      // fluffy cloud made of circles
      const cy = c.y;
      ctx.beginPath();
      ctx.ellipse(c.x, cy, c.w * 0.5, c.h * 0.55, 0, 0, Math.PI * 2);
      ctx.ellipse(c.x - c.w * 0.28, cy + 4, c.w * 0.3, c.h * 0.4, 0, 0, Math.PI * 2);
      ctx.ellipse(c.x + c.w * 0.28, cy + 4, c.w * 0.32, c.h * 0.42, 0, 0, Math.PI * 2);
      ctx.ellipse(c.x - c.w * 0.1, cy - c.h * 0.25, c.w * 0.28, c.h * 0.35, 0, 0, Math.PI * 2);
      ctx.ellipse(c.x + c.w * 0.12, cy - c.h * 0.22, c.w * 0.25, c.h * 0.32, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // ─── Draw hills (mid parallax) ──────────────────────────────
  function drawHills() {
    for (const h of hills) {
      h.x -= h.speed * (speed / BASE_SPEED);
      if (h.x + h.w < 0) { h.x = W + Math.random() * 80; h.h = 80 + Math.random() * 70; }
      ctx.fillStyle = h.color;
      ctx.beginPath();
      ctx.moveTo(h.x, GROUND_Y);
      ctx.quadraticCurveTo(h.x + h.w * 0.5, GROUND_Y - h.h, h.x + h.w, GROUND_Y);
      ctx.closePath();
      ctx.fill();
      // lighter ridge
      ctx.fillStyle = 'rgba(255,255,255,0.12)';
      ctx.beginPath();
      ctx.moveTo(h.x + h.w * 0.15, GROUND_Y);
      ctx.quadraticCurveTo(h.x + h.w * 0.5, GROUND_Y - h.h * 0.85, h.x + h.w * 0.55, GROUND_Y);
      ctx.closePath();
      ctx.fill();
    }
  }

  // ─── Draw trees (near parallax) ─────────────────────────────
  function drawTrees() {
    for (const t of trees) {
      t.x -= t.speed * (speed / BASE_SPEED);
      if (t.x < -40) { t.x = W + Math.random() * 60; t.h = 40 + Math.random() * 50; t.type = Math.floor(Math.random() * 3); }
      const baseY = GROUND_Y;
      // trunk
      ctx.fillStyle = '#8B5A2B';
      ctx.fillRect(t.x + 6, baseY - t.h * 0.4, 8, t.h * 0.4);
      // foliage
      if (t.type === 0) {
        // pine
        ctx.fillStyle = '#2D8B4E';
        for (let i = 0; i < 3; i++) {
          const ly = baseY - t.h * 0.3 - i * t.h * 0.25;
          const lw = t.h * 0.45 - i * 6;
          ctx.beginPath();
          ctx.moveTo(t.x + 10, ly - t.h * 0.28);
          ctx.lineTo(t.x + 10 - lw, ly + 4);
          ctx.lineTo(t.x + 10 + lw, ly + 4);
          ctx.closePath();
          ctx.fill();
        }
      } else if (t.type === 1) {
        // round tree
        ctx.fillStyle = '#3CB371';
        ctx.beginPath();
        ctx.arc(t.x + 10, baseY - t.h * 0.55, t.h * 0.38, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#2E8B57';
        ctx.beginPath();
        ctx.arc(t.x + 4, baseY - t.h * 0.5, t.h * 0.22, 0, Math.PI * 2);
        ctx.fill();
      } else {
        // bushy
        ctx.fillStyle = '#228B22';
        ctx.beginPath();
        ctx.ellipse(t.x + 10, baseY - t.h * 0.5, t.h * 0.35, t.h * 0.4, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#32CD32';
        ctx.beginPath();
        ctx.ellipse(t.x + 16, baseY - t.h * 0.55, t.h * 0.25, t.h * 0.3, 0, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  // ─── Draw ground ────────────────────────────────────────────
  let groundOffset = 0;
  function drawGround() {
    groundOffset = (groundOffset + speed) % 48;

    // dirt base
    ctx.fillStyle = '#C4A35A';
    ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);

    // grass top strip
    const grassGrad = ctx.createLinearGradient(0, GROUND_Y, 0, GROUND_Y + 22);
    grassGrad.addColorStop(0, '#5DBB63');
    grassGrad.addColorStop(1, '#3D8B43');
    ctx.fillStyle = grassGrad;
    ctx.fillRect(0, GROUND_Y, W, 22);

    // grass blades
    ctx.strokeStyle = '#4CAF50';
    ctx.lineWidth = 2;
    for (let x = -groundOffset; x < W + 20; x += 12) {
      const hBlade = 6 + ((x * 7) % 5);
      ctx.beginPath();
      ctx.moveTo(x, GROUND_Y + 2);
      ctx.quadraticCurveTo(x + 3, GROUND_Y - hBlade, x + 5, GROUND_Y + 1);
      ctx.stroke();
    }

    // ground dashes / texture
    ctx.fillStyle = 'rgba(139,110,50,0.35)';
    for (let x = -groundOffset * 1.2; x < W; x += 48) {
      ctx.fillRect(x, GROUND_Y + 30, 28, 4);
      ctx.fillRect(x + 10, GROUND_Y + 50, 18, 3);
      ctx.fillRect(x + 5, GROUND_Y + 70, 22, 3);
    }

    // stones in dirt
    ctx.fillStyle = 'rgba(120,100,70,0.4)';
    for (let x = -groundOffset * 0.8; x < W; x += 70) {
      ctx.beginPath();
      ctx.ellipse(x + 20, GROUND_Y + 42, 6, 4, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // ─── Draw player (cartoon frog / blob hero) ─────────────────
  function drawPlayer() {
    const p = player;
    const cx = p.x + p.w / 2;
    const cy = p.y + p.h / 2;

    ctx.save();
    ctx.translate(cx, cy);
    // squash & stretch
    ctx.scale(p.stretch, p.squish);
    // slight rotation in air
    if (!p.onGround) {
      p.rotation = Math.max(-0.35, Math.min(0.35, p.vy * 0.02));
    } else {
      p.rotation *= 0.7;
    }
    ctx.rotate(p.rotation);

    const bw = p.w;
    const bh = p.h;

    // legs (behind) — running animation
    const legSwing = p.onGround ? Math.sin(p.runFrame) * 10 : 4;
    ctx.fillStyle = '#2E8B57';
    // left leg
    ctx.save();
    ctx.translate(-10, bh / 2 - 8);
    ctx.rotate((legSwing * Math.PI) / 180);
    roundRect(-5, 0, 10, 16, 4);
    ctx.fill();
    // foot
    ctx.fillStyle = '#FF6B6B';
    roundRect(-7, 12, 14, 7, 3);
    ctx.fill();
    ctx.restore();

    // right leg
    ctx.fillStyle = '#2E8B57';
    ctx.save();
    ctx.translate(10, bh / 2 - 8);
    ctx.rotate((-legSwing * Math.PI) / 180);
    roundRect(-5, 0, 10, 16, 4);
    ctx.fill();
    ctx.fillStyle = '#FF6B6B';
    roundRect(-7, 12, 14, 7, 3);
    ctx.fill();
    ctx.restore();

    // body shadow
    ctx.fillStyle = 'rgba(0,0,0,0.12)';
    ctx.beginPath();
    ctx.ellipse(2, 4, bw * 0.42, bh * 0.4, 0, 0, Math.PI * 2);
    ctx.fill();

    // main body
    const bodyGrad = ctx.createRadialGradient(-6, -8, 4, 0, 0, bw * 0.55);
    bodyGrad.addColorStop(0, '#7CFC98');
    bodyGrad.addColorStop(0.6, '#3CB371');
    bodyGrad.addColorStop(1, '#2E8B57');
    ctx.fillStyle = bodyGrad;
    ctx.beginPath();
    ctx.ellipse(0, -2, bw * 0.45, bh * 0.42, 0, 0, Math.PI * 2);
    ctx.fill();

    // belly
    ctx.fillStyle = '#C8FACC';
    ctx.beginPath();
    ctx.ellipse(0, 4, bw * 0.28, bh * 0.25, 0, 0, Math.PI * 2);
    ctx.fill();

    // spots
    ctx.fillStyle = 'rgba(46,139,87,0.35)';
    ctx.beginPath(); ctx.arc(-12, -8, 5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(14, -4, 4, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(-8, 10, 3.5, 0, Math.PI * 2); ctx.fill();

    // eyes (white)
    const eyeY = -14;
    const blink = p.eyeClosed ? 0.15 : 1;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(-11, eyeY, 9, 9 * blink, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(11, eyeY, 9, 9 * blink, 0, 0, Math.PI * 2);
    ctx.fill();

    // pupils
    if (!p.eyeClosed) {
      const lookY = p.onGround ? 0 : Math.min(3, -p.vy * 0.2);
      ctx.fillStyle = '#1a1a2e';
      ctx.beginPath();
      ctx.arc(-10 + 2, eyeY + lookY, 4.2, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(12 + 2, eyeY + lookY, 4.2, 0, Math.PI * 2);
      ctx.fill();
      // eye shine
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(-12, eyeY - 2, 1.8, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(10, eyeY - 2, 1.8, 0, Math.PI * 2); ctx.fill();
    }

    // smile
    ctx.strokeStyle = '#1a1a2e';
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    ctx.beginPath();
    if (state === 'dead') {
      // sad face
      ctx.arc(0, 8, 8, Math.PI * 0.15, Math.PI * 0.85, true);
    } else {
      ctx.arc(0, 2, 8, 0.15, Math.PI - 0.15);
    }
    ctx.stroke();

    // cheeks
    ctx.fillStyle = 'rgba(255,107,107,0.35)';
    ctx.beginPath(); ctx.ellipse(-18, -4, 5, 3.5, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(18, -4, 5, 3.5, 0, 0, Math.PI * 2); ctx.fill();

    // arms
    const armSwing = p.onGround ? Math.sin(p.runFrame + Math.PI) * 14 : -20;
    ctx.fillStyle = '#3CB371';
    // left arm
    ctx.save();
    ctx.translate(-bw * 0.38, 0);
    ctx.rotate((armSwing * Math.PI) / 180);
    roundRect(-4, 0, 8, 16, 4);
    ctx.fill();
    ctx.restore();
    // right arm
    ctx.save();
    ctx.translate(bw * 0.38, 0);
    ctx.rotate((-armSwing * Math.PI) / 180);
    roundRect(-4, 0, 8, 16, 4);
    ctx.fill();
    ctx.restore();

    // double jump sparkle indicator
    if (!p.onGround && doubleJumpAvail) {
      ctx.fillStyle = 'rgba(127,219,255,0.7)';
      const spark = 1 + Math.sin(frame * 0.3) * 0.3;
      ctx.beginPath();
      ctx.arc(0, -bh * 0.55, 3 * spark, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();

    // ground shadow
    if (p.onGround || true) {
      const shScale = p.onGround ? 1 : Math.max(0.3, 1 - (GROUND_Y - p.y - p.h) / 180);
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      ctx.beginPath();
      ctx.ellipse(p.x + p.w / 2, GROUND_Y + 4, p.w * 0.35 * shScale, 6 * shScale, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // ─── Draw obstacles ─────────────────────────────────────────
  function drawObstacle(o) {
    const bobY = Math.sin(frame * 0.08 + o.bob) * 1.5;
    ctx.save();
    ctx.translate(o.x + o.w / 2, o.y + o.h / 2 + bobY);

    if (o.kind === 'spike') {
      // cartoon spikes
      ctx.fillStyle = o.color;
      ctx.strokeStyle = '#922';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(-o.w / 2, o.h / 2);
      ctx.lineTo(-o.w / 4, -o.h / 2);
      ctx.lineTo(0, o.h / 2 - 8);
      ctx.lineTo(o.w / 4, -o.h / 2);
      ctx.lineTo(o.w / 2, o.h / 2);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      // highlight
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.beginPath();
      ctx.moveTo(-o.w / 4 + 2, -o.h / 2 + 6);
      ctx.lineTo(-o.w / 2 + 6, o.h / 2 - 2);
      ctx.lineTo(-o.w / 6, o.h / 2 - 6);
      ctx.closePath();
      ctx.fill();
    } else if (o.kind === 'box') {
      // wooden crate
      ctx.fillStyle = '#D2691E';
      roundRect(-o.w / 2, -o.h / 2, o.w, o.h, 4);
      ctx.fill();
      ctx.strokeStyle = '#8B4513';
      ctx.lineWidth = 2.5;
      ctx.stroke();
      // planks
      ctx.beginPath();
      ctx.moveTo(-o.w / 2 + 4, 0);
      ctx.lineTo(o.w / 2 - 4, 0);
      ctx.moveTo(0, -o.h / 2 + 4);
      ctx.lineTo(0, o.h / 2 - 4);
      ctx.stroke();
      // X
      ctx.strokeStyle = '#A0522D';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(-o.w / 2 + 8, -o.h / 2 + 8);
      ctx.lineTo(o.w / 2 - 8, o.h / 2 - 8);
      ctx.moveTo(o.w / 2 - 8, -o.h / 2 + 8);
      ctx.lineTo(-o.w / 2 + 8, o.h / 2 - 8);
      ctx.stroke();
    } else if (o.kind === 'cactus') {
      ctx.fillStyle = '#27AE60';
      // main
      roundRect(-8, -o.h / 2, 16, o.h, 6);
      ctx.fill();
      // arms
      roundRect(-20, -o.h / 4, 14, 10, 4);
      ctx.fill();
      roundRect(-20, -o.h / 4, 10, 22, 4);
      ctx.fill();
      roundRect(6, -o.h / 6, 14, 10, 4);
      ctx.fill();
      roundRect(10, -o.h / 6, 10, 18, 4);
      ctx.fill();
      // spikes dots
      ctx.fillStyle = '#1E8449';
      for (let i = 0; i < 5; i++) {
        ctx.beginPath();
        ctx.arc(-4 + (i % 2) * 8, -o.h / 2 + 10 + i * 8, 1.5, 0, Math.PI * 2);
        ctx.fill();
      }
    } else if (o.kind === 'rock') {
      ctx.fillStyle = '#95A5A6';
      ctx.beginPath();
      ctx.moveTo(-o.w / 2, o.h / 2);
      ctx.quadraticCurveTo(-o.w / 2 - 2, -o.h / 4, -o.w / 4, -o.h / 2);
      ctx.quadraticCurveTo(0, -o.h / 2 - 4, o.w / 3, -o.h / 3);
      ctx.quadraticCurveTo(o.w / 2 + 2, 0, o.w / 2, o.h / 2);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#7F8C8D';
      ctx.beginPath();
      ctx.ellipse(-6, 2, 8, 5, -0.3, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.beginPath();
      ctx.ellipse(-8, -8, 6, 4, -0.4, 0, Math.PI * 2);
      ctx.fill();
    } else if (o.kind === 'tall') {
      // wizard tower / slim hazard
      ctx.fillStyle = '#8E44AD';
      roundRect(-o.w / 2, -o.h / 2, o.w, o.h, 3);
      ctx.fill();
      // stripes
      ctx.fillStyle = '#9B59B6';
      for (let i = 0; i < 4; i++) {
        ctx.fillRect(-o.w / 2, -o.h / 2 + 8 + i * 16, o.w, 6);
      }
      // top gem
      ctx.fillStyle = '#E74C3C';
      ctx.beginPath();
      ctx.moveTo(0, -o.h / 2 - 10);
      ctx.lineTo(-8, -o.h / 2);
      ctx.lineTo(8, -o.h / 2);
      ctx.closePath();
      ctx.fill();
      // eye
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(0, -o.h / 4, 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#1a1a2e';
      ctx.beginPath();
      ctx.arc(1, -o.h / 4, 3, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();
  }

  // ─── Draw stars ─────────────────────────────────────────────
  function drawStar(s) {
    s.spin += 0.08;
    ctx.save();
    ctx.translate(s.x, s.y);
    ctx.rotate(s.spin);
    const r = s.r;
    // glow
    const glow = ctx.createRadialGradient(0, 0, 1, 0, 0, r * 2);
    glow.addColorStop(0, 'rgba(255,230,100,0.5)');
    glow.addColorStop(1, 'rgba(255,230,100,0)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(0, 0, r * 2, 0, Math.PI * 2);
    ctx.fill();

    // 5-point star
    ctx.fillStyle = '#FFE66D';
    ctx.strokeStyle = '#FFA500';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const a = (i * 4 * Math.PI) / 5 - Math.PI / 2;
      const a2 = a + (2 * Math.PI) / 10;
      const x1 = Math.cos(a) * r;
      const y1 = Math.sin(a) * r;
      const x2 = Math.cos(a2) * (r * 0.45);
      const y2 = Math.sin(a2) * (r * 0.45);
      if (i === 0) ctx.moveTo(x1, y1);
      else ctx.lineTo(x1, y1);
      ctx.lineTo(x2, y2);
    }
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    ctx.restore();
  }

  // ─── Draw particles ─────────────────────────────────────────
  function drawParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += p.gravity;
      p.life--;
      if (p.life <= 0) { particles.splice(i, 1); continue; }
      const alpha = p.life / p.maxLife;
      ctx.globalAlpha = alpha;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // ─── Draw floating texts ────────────────────────────────────
  function drawFloatingTexts() {
    for (let i = floatingTexts.length - 1; i >= 0; i--) {
      const t = floatingTexts[i];
      t.y += t.vy;
      t.life--;
      if (t.life <= 0) { floatingTexts.splice(i, 1); continue; }
      ctx.globalAlpha = Math.min(1, t.life / 20);
      ctx.font = 'bold 18px system-ui, sans-serif';
      ctx.fillStyle = t.color;
      ctx.strokeStyle = 'rgba(0,0,0,0.4)';
      ctx.lineWidth = 3;
      ctx.textAlign = 'center';
      ctx.strokeText(t.text, t.x, t.y);
      ctx.fillText(t.text, t.x, t.y);
    }
    ctx.globalAlpha = 1;
    ctx.textAlign = 'left';
  }

  // ─── Collision ──────────────────────────────────────────────
  function aabb(ax, ay, aw, ah, bx, by, bw, bh) {
    // shrink hitboxes a bit for fairness (cartoon feel)
    const pad = 6;
    return ax + pad < bx + bw &&
           ax + aw - pad > bx &&
           ay + pad < by + bh &&
           ay + ah - pad > by;
  }

  // ─── Update ─────────────────────────────────────────────────
  let nextObDist = 0;
  let nextStarDist = 0;

  function update() {
    if (state !== 'playing') return;
    frame++;
    distance += speed;
    speed = Math.min(MAX_SPEED, BASE_SPEED + distance * SPEED_RAMP);

    // speed meter UI
    const speedPct = ((speed - BASE_SPEED) / (MAX_SPEED - BASE_SPEED)) * 100;
    speedFill.style.width = Math.max(10, speedPct) + '%';

    // score from distance
    const newScore = Math.floor(distance / 10);
    if (newScore > score) {
      score = newScore;
      scoreEl.textContent = score;
      if (score % 100 === 0 && score > 0) {
        SFX.score();
        floatText(player.x + player.w / 2, player.y - 20, '+' + score + '!', '#FF6B6B');
        emitParticles(player.x + player.w / 2, player.y, '#FFE66D', 12);
      }
    }

    // spawn obstacles
    nextObDist -= speed;
    if (nextObDist <= 0) {
      spawnObstacle();
      // gap shrinks slightly with speed
      const minGap = Math.max(140, 280 - speed * 8);
      const maxGap = minGap + 160;
      nextObDist = minGap + Math.random() * (maxGap - minGap);
    }

    // spawn stars
    nextStarDist -= speed;
    if (nextStarDist <= 0) {
      spawnStar();
      nextStarDist = 250 + Math.random() * 400;
    }

    // player physics
    player.vy += GRAVITY;
    player.y += player.vy;

    if (player.y + player.h >= GROUND_Y) {
      if (!player.onGround) {
        SFX.land();
        emitDust(player.x + player.w / 2, GROUND_Y);
        player.squish = 0.7;
        player.stretch = 1.3;
      }
      player.y = GROUND_Y - player.h;
      player.vy = 0;
      player.onGround = true;
      doubleJumpAvail = false;
    }

    // squash recovery
    player.squish += (1 - player.squish) * 0.15;
    player.stretch += (1 - player.stretch) * 0.15;

    // run animation
    if (player.onGround) player.runFrame += 0.35 * (speed / BASE_SPEED);

    // blink
    player.blinkTimer--;
    if (player.blinkTimer <= 0) {
      if (player.eyeClosed) {
        player.eyeClosed = false;
        player.blinkTimer = 60 + Math.random() * 180;
      } else {
        player.eyeClosed = true;
        player.blinkTimer = 6;
      }
    }

    // obstacles update
    for (let i = obstacles.length - 1; i >= 0; i--) {
      const o = obstacles[i];
      o.x -= speed;

      // scoring pass-under
      if (!o.passed && o.x + o.w < player.x) {
        o.passed = true;
        score += 5;
        scoreEl.textContent = score;
        floatText(o.x + o.w / 2, o.y, '+5', '#48C9B0');
        SFX.tick();
      }

      // collision
      if (aabb(player.x, player.y, player.w, player.h, o.x, o.y, o.w, o.h)) {
        gameOver();
        return;
      }

      if (o.x + o.w < -40) obstacles.splice(i, 1);
    }

    // stars update
    for (let i = stars.length - 1; i >= 0; i--) {
      const s = stars[i];
      s.x -= speed;
      s.y += Math.sin(frame * 0.08 + s.x * 0.01) * 0.4;

      // collect
      const dx = (player.x + player.w / 2) - s.x;
      const dy = (player.y + player.h / 2) - s.y;
      if (dx * dx + dy * dy < (s.r + 22) * (s.r + 22)) {
        score += 25;
        scoreEl.textContent = score;
        floatText(s.x, s.y, '+25 ⭐', '#FFE66D');
        SFX.star();
        emitParticles(s.x, s.y, '#FFE66D', 14, 1.2);
        emitParticles(s.x, s.y, '#FFA500', 6, 0.9);
        stars.splice(i, 1);
        continue;
      }
      if (s.x < -30) stars.splice(i, 1);
    }
  }

  // ─── Render ─────────────────────────────────────────────────
  function render() {
    ctx.save();
    // screen shake
    if (shakeTime > 0) {
      ctx.translate((Math.random() - 0.5) * shakeTime * 1.5, (Math.random() - 0.5) * shakeTime * 1.5);
      shakeTime--;
    }

    drawSky();
    drawClouds();
    drawHills();
    drawTrees();
    drawGround();

    // stars
    for (const s of stars) drawStar(s);

    // obstacles
    for (const o of obstacles) drawObstacle(o);

    // player
    if (state !== 'menu') drawPlayer();
    else {
      // idle preview pose
      player.y = GROUND_Y - player.h;
      player.runFrame += 0.15;
      drawPlayer();
    }

    drawParticles();
    drawFloatingTexts();

    // vignette
    const vig = ctx.createRadialGradient(W / 2, H / 2, H * 0.35, W / 2, H / 2, H * 0.75);
    vig.addColorStop(0, 'rgba(0,0,0,0)');
    vig.addColorStop(1, 'rgba(0,0,0,0.18)');
    ctx.fillStyle = vig;
    ctx.fillRect(0, 0, W, H);

    ctx.restore();
  }

  // ─── Main loop ──────────────────────────────────────────────
  let lastTime = 0;
  function loop(ts) {
    // clamp dt so tab-switching doesn't break physics
    const dt = Math.min(50, ts - lastTime);
    lastTime = ts;

    // run update roughly at 60fps steps
    update();
    render();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  // Idle hop on menu
  setInterval(() => {
    if (state === 'menu' && player.onGround) {
      player.vy = -8;
      player.onGround = false;
      player.stretch = 1.2;
      player.squish = 0.85;
    }
    if (state === 'menu') {
      player.vy += GRAVITY * 0.8;
      player.y += player.vy;
      if (player.y + player.h >= GROUND_Y) {
        player.y = GROUND_Y - player.h;
        player.vy = 0;
        player.onGround = true;
        player.squish = 0.8;
        player.stretch = 1.15;
      }
      player.squish += (1 - player.squish) * 0.12;
      player.stretch += (1 - player.stretch) * 0.12;
    }
  }, 1000 / 60);

})();
</script>
