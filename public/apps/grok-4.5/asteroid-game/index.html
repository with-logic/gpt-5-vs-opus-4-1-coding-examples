<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASTEROID COMMAND — Deep Space Combat</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    font-family: 'Rajdhani', sans-serif;
    color: #e0f0ff;
    user-select: none;
  }

  #gameCanvas {
    display: block;
    width: 100%; height: 100%;
    cursor: crosshair;
    background: #000;
  }

  #ui {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 10;
  }

  /* HUD corners */
  .hud-corner {
    position: absolute;
    width: 60px; height: 60px;
    border-color: rgba(0, 200, 255, 0.35);
    border-style: solid;
  }
  .hud-corner.tl { top: 12px; left: 12px; border-width: 2px 0 0 2px; }
  .hud-corner.tr { top: 12px; right: 12px; border-width: 2px 2px 0 0; }
  .hud-corner.bl { bottom: 12px; left: 12px; border-width: 0 0 2px 2px; }
  .hud-corner.br { bottom: 12px; right: 12px; border-width: 0 2px 2px 0; }

  /* Top bar */
  #topBar {
    position: absolute;
    top: 20px; left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 40px;
    align-items: center;
  }

  .stat {
    text-align: center;
    min-width: 90px;
  }
  .stat-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 9px;
    letter-spacing: 3px;
    color: rgba(0, 200, 255, 0.6);
    text-transform: uppercase;
  }
  .stat-value {
    font-family: 'Orbitron', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: #00e5ff;
    text-shadow: 0 0 12px rgba(0, 229, 255, 0.7);
    line-height: 1.2;
  }

  /* Health bar */
  #healthWrap {
    position: absolute;
    bottom: 28px; left: 50%;
    transform: translateX(-50%);
    width: 280px;
  }
  #healthLabel {
    font-family: 'Orbitron', sans-serif;
    font-size: 9px;
    letter-spacing: 3px;
    color: rgba(0, 200, 255, 0.6);
    text-align: center;
    margin-bottom: 5px;
  }
  #healthBar {
    height: 8px;
    background: rgba(0, 40, 60, 0.8);
    border: 1px solid rgba(0, 200, 255, 0.3);
    border-radius: 2px;
    overflow: hidden;
    position: relative;
  }
  #healthFill {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, #00c8ff, #00ffaa);
    box-shadow: 0 0 10px rgba(0, 255, 170, 0.6);
    transition: width 0.15s ease, background 0.3s;
    border-radius: 1px;
  }
  #shieldBar {
    height: 4px;
    background: rgba(0, 40, 60, 0.6);
    border: 1px solid rgba(100, 150, 255, 0.25);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 3px;
  }
  #shieldFill {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, #4488ff, #88ccff);
    box-shadow: 0 0 8px rgba(68, 136, 255, 0.5);
    transition: width 0.2s ease;
  }

  /* Radar */
  #radar {
    position: absolute;
    bottom: 24px; right: 24px;
    width: 120px; height: 120px;
    border: 1px solid rgba(0, 200, 255, 0.3);
    border-radius: 50%;
    background: rgba(0, 10, 20, 0.7);
    overflow: hidden;
  }
  #radarCanvas {
    width: 100%; height: 100%;
  }
  #radarLabel {
    position: absolute;
    top: -16px; left: 0; right: 0;
    text-align: center;
    font-family: 'Orbitron', sans-serif;
    font-size: 8px;
    letter-spacing: 2px;
    color: rgba(0, 200, 255, 0.5);
  }

  /* Weapon indicator */
  #weaponInfo {
    position: absolute;
    bottom: 28px; left: 24px;
    font-family: 'Orbitron', sans-serif;
  }
  #weaponName {
    font-size: 13px;
    font-weight: 700;
    color: #00e5ff;
    letter-spacing: 2px;
    text-shadow: 0 0 8px rgba(0, 229, 255, 0.5);
  }
  #weaponAmmo {
    font-size: 11px;
    color: rgba(0, 200, 255, 0.5);
    letter-spacing: 1px;
    margin-top: 2px;
  }

  /* Screens */
  .screen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 20;
    background: radial-gradient(ellipse at center, rgba(0,20,40,0.92) 0%, rgba(0,0,0,0.97) 100%);
    pointer-events: all;
    transition: opacity 0.4s;
  }
  .screen.hidden { opacity: 0; pointer-events: none; }

  .logo {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(28px, 6vw, 56px);
    letter-spacing: 8px;
    color: #00e5ff;
    text-shadow:
      0 0 20px rgba(0, 229, 255, 0.8),
      0 0 60px rgba(0, 150, 255, 0.4),
      0 0 100px rgba(0, 100, 255, 0.2);
    margin-bottom: 6px;
    text-align: center;
  }
  .tagline {
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    letter-spacing: 6px;
    color: rgba(0, 200, 255, 0.5);
    margin-bottom: 48px;
    text-align: center;
  }

  .btn {
    font-family: 'Orbitron', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 4px;
    padding: 14px 48px;
    border: 1px solid rgba(0, 229, 255, 0.5);
    background: rgba(0, 100, 150, 0.15);
    color: #00e5ff;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    margin: 8px;
    position: relative;
    overflow: hidden;
  }
  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(0,229,255,0.1), transparent);
    transform: translateX(-100%);
    transition: transform 0.4s;
  }
  .btn:hover {
    background: rgba(0, 150, 200, 0.3);
    border-color: #00e5ff;
    box-shadow: 0 0 30px rgba(0, 229, 255, 0.3);
    text-shadow: 0 0 10px rgba(0, 229, 255, 0.8);
  }
  .btn:hover::before { transform: translateX(100%); }
  .btn:active { transform: scale(0.97); }

  .controls-info {
    margin-top: 40px;
    text-align: center;
    font-size: 13px;
    color: rgba(180, 220, 255, 0.45);
    line-height: 1.9;
    letter-spacing: 1px;
  }
  .controls-info kbd {
    display: inline-block;
    padding: 2px 8px;
    border: 1px solid rgba(0, 200, 255, 0.3);
    border-radius: 3px;
    background: rgba(0, 50, 80, 0.4);
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    color: #00c8ff;
    margin: 0 2px;
  }

  .result-title {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(32px, 7vw, 64px);
    letter-spacing: 6px;
    margin-bottom: 12px;
    text-align: center;
  }
  .result-title.win {
    color: #00ffaa;
    text-shadow: 0 0 30px rgba(0, 255, 170, 0.7), 0 0 80px rgba(0, 200, 100, 0.3);
  }
  .result-title.lose {
    color: #ff4466;
    text-shadow: 0 0 30px rgba(255, 68, 102, 0.7), 0 0 80px rgba(200, 50, 50, 0.3);
  }
  .result-stats {
    display: flex;
    gap: 40px;
    margin: 30px 0 40px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .result-stat {
    text-align: center;
  }
  .result-stat .val {
    font-family: 'Orbitron', sans-serif;
    font-size: 28px;
    font-weight: 700;
    color: #00e5ff;
    text-shadow: 0 0 12px rgba(0, 229, 255, 0.5);
  }
  .result-stat .lbl {
    font-size: 10px;
    letter-spacing: 2px;
    color: rgba(0, 200, 255, 0.45);
    font-family: 'Orbitron', sans-serif;
    margin-top: 4px;
  }

  /* Wave announcement */
  #waveAnnounce {
    position: absolute;
    top: 40%; left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(24px, 5vw, 42px);
    letter-spacing: 8px;
    color: #00e5ff;
    text-shadow: 0 0 30px rgba(0, 229, 255, 0.8);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    text-align: center;
    white-space: nowrap;
  }
  #waveAnnounce.show { opacity: 1; }
  #waveSub {
    font-size: 12px;
    letter-spacing: 4px;
    color: rgba(0, 200, 255, 0.6);
    font-weight: 400;
    margin-top: 8px;
  }

  /* Damage vignette */
  #damageVignette {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 5;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(255,0,40,0.35) 100%);
    opacity: 0;
    transition: opacity 0.1s;
  }

  /* Kill feed */
  #killFeed {
    position: absolute;
    top: 80px; right: 24px;
    text-align: right;
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    color: rgba(200, 230, 255, 0.7);
    line-height: 1.8;
  }
  #killFeed .kill {
    opacity: 0;
    animation: killIn 3s forwards;
  }
  @keyframes killIn {
    0% { opacity: 0; transform: translateX(20px); }
    15% { opacity: 1; transform: translateX(0); }
    80% { opacity: 1; }
    100% { opacity: 0; }
  }
  #killFeed .ace { color: #ffaa00; text-shadow: 0 0 8px rgba(255,170,0,0.5); }

  /* Low health pulse */
  @keyframes lowHealth {
    0%, 100% { box-shadow: 0 0 10px rgba(255,50,50,0.4); }
    50% { box-shadow: 0 0 20px rgba(255,50,50,0.8); }
  }
  #healthFill.critical {
    background: linear-gradient(90deg, #ff2244, #ff6644) !important;
    animation: lowHealth 0.6s infinite;
  }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="damageVignette"></div>

<div id="ui">
  <div class="hud-corner tl"></div>
  <div class="hud-corner tr"></div>
  <div class="hud-corner bl"></div>
  <div class="hud-corner br"></div>

  <div id="topBar">
    <div class="stat">
      <div class="stat-label">Score</div>
      <div class="stat-value" id="scoreVal">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Wave</div>
      <div class="stat-value" id="waveVal">1</div>
    </div>
    <div class="stat">
      <div class="stat-label">Kills</div>
      <div class="stat-value" id="killsVal">0</div>
    </div>
  </div>

  <div id="healthWrap">
    <div id="healthLabel">HULL INTEGRITY</div>
    <div id="healthBar"><div id="healthFill"></div></div>
    <div id="shieldBar"><div id="shieldFill"></div></div>
  </div>

  <div id="weaponInfo">
    <div id="weaponName">PULSE LASER</div>
    <div id="weaponAmmo">∞ READY</div>
  </div>

  <div id="radar">
    <div id="radarLabel">RADAR</div>
    <canvas id="radarCanvas" width="120" height="120"></canvas>
  </div>

  <div id="killFeed"></div>
  <div id="waveAnnounce"><div id="waveText">WAVE 1</div><div id="waveSub">INCOMING</div></div>
</div>

<!-- Title Screen -->
<div id="titleScreen" class="screen">
  <div class="logo">ASTEROID<br>COMMAND</div>
  <div class="tagline">DEEP SPACE COMBAT SYSTEM</div>
  <button class="btn" id="startBtn">ENGAGE</button>
  <div class="controls-info">
    <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> or <kbd>↑</kbd><kbd>←</kbd><kbd>↓</kbd><kbd>→</kbd> &nbsp; Move &nbsp;&nbsp;
    <kbd>MOUSE</kbd> Aim &nbsp;&nbsp;
    <kbd>CLICK</kbd> / <kbd>SPACE</kbd> Fire<br>
    <kbd>SHIFT</kbd> Boost &nbsp;&nbsp;
    <kbd>1</kbd><kbd>2</kbd><kbd>3</kbd> Switch Weapons &nbsp;&nbsp;
    <kbd>R</kbd> Shield Recharge
  </div>
</div>

<!-- Game Over Screen -->
<div id="gameOverScreen" class="screen hidden">
  <div class="result-title lose" id="resultTitle">DESTROYED</div>
  <div class="result-stats">
    <div class="result-stat"><div class="val" id="finalScore">0</div><div class="lbl">SCORE</div></div>
    <div class="result-stat"><div class="val" id="finalWave">1</div><div class="lbl">WAVE</div></div>
    <div class="result-stat"><div class="val" id="finalKills">0</div><div class="lbl">KILLS</div></div>
    <div class="result-stat"><div class="val" id="finalAsteroids">0</div><div class="lbl">ASTEROIDS</div></div>
  </div>
  <button class="btn" id="restartBtn">RELAUNCH</button>
</div>

<script>
(() => {
  'use strict';

  // ═══════════════════════════════════════════
  //  CONSTANTS & SETUP
  // ═══════════════════════════════════════════
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const radarCanvas = document.getElementById('radarCanvas');
  const rctx = radarCanvas.getContext('2d');

  let W, H, CX, CY;
  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    CX = W / 2; CY = H / 2;
  }
  resize();
  window.addEventListener('resize', resize);

  // ═══════════════════════════════════════════
  //  AUDIO ENGINE (Web Audio API, no files)
  // ═══════════════════════════════════════════
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  let actx = null;
  function ensureAudio() {
    if (!actx) actx = new AudioCtx();
    if (actx.state === 'suspended') actx.resume();
  }

  function playTone(freq, type, dur, vol, slideTo) {
    if (!actx) return;
    const t = actx.currentTime;
    const o = actx.createOscillator();
    const g = actx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, t);
    if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, t + dur);
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.connect(g); g.connect(actx.destination);
    o.start(t); o.stop(t + dur);
  }

  function playNoise(dur, vol, filterFreq) {
    if (!actx) return;
    const t = actx.currentTime;
    const bufSize = actx.sampleRate * dur;
    const buf = actx.createBuffer(1, bufSize, actx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufSize, 1.5);
    const src = actx.createBufferSource();
    src.buffer = buf;
    const filt = actx.createBiquadFilter();
    filt.type = 'lowpass';
    filt.frequency.value = filterFreq || 1000;
    const g = actx.createGain();
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    src.connect(filt); filt.connect(g); g.connect(actx.destination);
    src.start(t);
  }

  const SFX = {
    laser: () => playTone(880, 'square', 0.08, 0.06, 200),
    plasma: () => { playTone(220, 'sawtooth', 0.15, 0.07, 80); playTone(440, 'sine', 0.12, 0.04, 100); },
    missile: () => playTone(150, 'sawtooth', 0.25, 0.08, 40),
    hit: () => playNoise(0.12, 0.12, 800),
    explosion: () => { playNoise(0.4, 0.25, 600); playTone(80, 'sawtooth', 0.35, 0.1, 20); },
    bigExplosion: () => { playNoise(0.7, 0.35, 400); playTone(60, 'sawtooth', 0.6, 0.15, 15); playTone(100, 'square', 0.3, 0.08, 30); },
    pickup: () => { playTone(600, 'sine', 0.1, 0.08); setTimeout(() => playTone(900, 'sine', 0.12, 0.08), 80); },
    shield: () => playTone(400, 'sine', 0.2, 0.06, 800),
    thruster: () => {}, // continuous handled separately
    wave: () => { playTone(300, 'sine', 0.3, 0.08, 600); setTimeout(() => playTone(500, 'sine', 0.3, 0.06, 800), 200); },
    boost: () => { playTone(100, 'sawtooth', 0.3, 0.05, 300); playNoise(0.2, 0.08, 1500); },
    empty: () => playTone(100, 'square', 0.05, 0.04),
  };

  // ═══════════════════════════════════════════
  //  UTILITY
  // ═══════════════════════════════════════════
  const TAU = Math.PI * 2;
  const rand = (a, b) => a + Math.random() * (b - a);
  const randInt = (a, b) => Math.floor(rand(a, b + 1));
  const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
  const lerp = (a, b, t) => a + (b - a) * t;
  const dist = (ax, ay, bx, by) => Math.hypot(bx - ax, by - ay);
  const angleTo = (ax, ay, bx, by) => Math.atan2(by - ay, bx - ax);
  const normAngle = (a) => { while (a > Math.PI) a -= TAU; while (a < -Math.PI) a += TAU; return a; };
  const choose = (arr) => arr[Math.floor(Math.random() * arr.length)];

  // ═══════════════════════════════════════════
  //  INPUT
  // ═══════════════════════════════════════════
  const keys = {};
  let mouseX = 0, mouseY = 0, mouseDown = false;

  window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) e.preventDefault();
  });
  window.addEventListener('keyup', e => { keys[e.code] = false; });
  canvas.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
  canvas.addEventListener('mousedown', e => { if (e.button === 0) mouseDown = true; ensureAudio(); });
  canvas.addEventListener('mouseup', e => { if (e.button === 0) mouseDown = false; });
  canvas.addEventListener('contextmenu', e => e.preventDefault());

  // ═══════════════════════════════════════════
  //  STARFIELD
  // ═══════════════════════════════════════════
  const stars = [];
  function initStars() {
    stars.length = 0;
    for (let i = 0; i < 300; i++) {
      stars.push({
        x: Math.random() * 4000 - 2000,
        y: Math.random() * 4000 - 2000,
        z: rand(0.2, 1.5),
        size: rand(0.5, 2.2),
        brightness: rand(0.3, 1),
        twinkle: Math.random() * TAU,
        twinkleSpeed: rand(0.5, 2),
      });
    }
  }
  initStars();

  // ═══════════════════════════════════════════
  //  PARTICLES
  // ═══════════════════════════════════════════
  const particles = [];

  function spawnParticles(x, y, count, opts = {}) {
    for (let i = 0; i < count; i++) {
      const angle = opts.angle !== undefined ? opts.angle + rand(-opts.spread || 0, opts.spread || TAU) : rand(0, TAU);
      const speed = rand(opts.minSpeed || 0.5, opts.maxSpeed || 4);
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed + (opts.vx || 0),
        vy: Math.sin(angle) * speed + (opts.vy || 0),
        life: rand(opts.minLife || 0.3, opts.maxLife || 1.2),
        maxLife: 0,
        size: rand(opts.minSize || 1, opts.maxSize || 4),
        color: opts.color || `hsl(${rand(opts.hueMin || 20, opts.hueMax || 50)},100%,${rand(50, 70)}%)`,
        glow: opts.glow !== false,
        drag: opts.drag || 0.98,
        type: opts.type || 'circle',
      });
      particles[particles.length - 1].maxLife = particles[particles.length - 1].life;
    }
  }

  function spawnExplosion(x, y, size = 1, hue = 30) {
    spawnParticles(x, y, Math.floor(20 * size), {
      minSpeed: 1, maxSpeed: 6 * size, minLife: 0.3, maxLife: 1.0,
      minSize: 2, maxSize: 5 * size, hueMin: hue - 10, hueMax: hue + 20, drag: 0.96,
    });
    spawnParticles(x, y, Math.floor(12 * size), {
      minSpeed: 0.5, maxSpeed: 3 * size, minLife: 0.4, maxLife: 1.5,
      minSize: 1, maxSize: 3, color: `hsl(${hue},80%,80%)`, drag: 0.97,
    });
    // smoke
    spawnParticles(x, y, Math.floor(8 * size), {
      minSpeed: 0.3, maxSpeed: 1.5, minLife: 0.6, maxLife: 1.8,
      minSize: 4, maxSize: 10 * size,
      color: `rgba(80,80,90,0.5)`, drag: 0.99, glow: false,
    });
  }

  function updateParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vx *= p.drag;
      p.vy *= p.drag;
      p.life -= dt;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  function drawParticles(cam) {
    for (const p of particles) {
      const sx = p.x - cam.x + CX;
      const sy = p.y - cam.y + CY;
      if (sx < -20 || sx > W + 20 || sy < -20 || sy > H + 20) continue;
      const alpha = p.life / p.maxLife;
      const size = p.size * alpha;
      ctx.globalAlpha = alpha;
      if (p.glow) {
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 8;
      }
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(sx, sy, size, 0, TAU);
      ctx.fill();
      ctx.shadowBlur = 0;
    }
    ctx.globalAlpha = 1;
  }

  // ═══════════════════════════════════════════
  //  BULLETS
  // ═══════════════════════════════════════════
  const bullets = [];

  const WEAPONS = {
    laser: {
      name: 'PULSE LASER',
      damage: 12,
      speed: 14,
      cooldown: 0.12,
      spread: 0.04,
      color: '#00e5ff',
      size: 2.5,
      life: 1.2,
      ammo: Infinity,
      sounds: 'laser',
      pierce: false,
    },
    plasma: {
      name: 'PLASMA CANNON',
      damage: 35,
      speed: 9,
      cooldown: 0.35,
      spread: 0.02,
      color: '#aa44ff',
      size: 5,
      life: 1.5,
      ammo: 30,
      maxAmmo: 30,
      sounds: 'plasma',
      pierce: false,
      splash: 40,
    },
    missile: {
      name: 'SEEKER MISSILES',
      damage: 55,
      speed: 5,
      cooldown: 0.6,
      spread: 0.15,
      color: '#ff6644',
      size: 3.5,
      life: 3.0,
      ammo: 12,
      maxAmmo: 12,
      sounds: 'missile',
      pierce: false,
      homing: true,
      turnRate: 0.06,
      splash: 50,
    },
  };

  function fireBullet(owner, weaponKey, aimAngle) {
    const w = WEAPONS[weaponKey];
    if (w.ammo !== undefined && w.ammo <= 0) { SFX.empty(); return false; }
    if (w.ammo !== undefined && w.ammo !== Infinity) w.ammo--;

    const angle = aimAngle + rand(-w.spread, w.spread);
    const speed = w.speed + (owner.boosting ? 2 : 0);
    bullets.push({
      x: owner.x + Math.cos(angle) * (owner.radius + 4),
      y: owner.y + Math.sin(angle) * (owner.radius + 4),
      vx: Math.cos(angle) * speed + owner.vx * 0.3,
      vy: Math.sin(angle) * speed + owner.vy * 0.3,
      angle,
      damage: w.damage,
      life: w.life,
      color: w.color,
      size: w.size,
      ownerId: owner.id,
      weapon: weaponKey,
      pierce: w.pierce,
      homing: w.homing || false,
      turnRate: w.turnRate || 0,
      splash: w.splash || 0,
      hit: false,
    });
    SFX[w.sounds]();
    // muzzle flash
    spawnParticles(
      owner.x + Math.cos(angle) * (owner.radius + 6),
      owner.y + Math.sin(angle) * (owner.radius + 6),
      4, { angle, spread: 0.3, minSpeed: 1, maxSpeed: 3, minLife: 0.05, maxLife: 0.15, minSize: 1, maxSize: 3, color: w.color }
    );
    return true;
  }

  function updateBullets(dt) {
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];

      // Homing
      if (b.homing && !b.hit) {
        let bestDist = 500, bestTarget = null;
        // Check enemies
        for (const e of enemies) {
          if (e.dead) continue;
          const d = dist(b.x, b.y, e.x, e.y);
          if (d < bestDist) { bestDist = d; bestTarget = e; }
        }
        // Check asteroids for missiles too
        if (!bestTarget || bestDist > 300) {
          for (const a of asteroids) {
            const d = dist(b.x, b.y, a.x, a.y);
            if (d < bestDist) { bestDist = d; bestTarget = a; }
          }
        }
        if (bestTarget) {
          const desired = angleTo(b.x, b.y, bestTarget.x, bestTarget.y);
          let diff = normAngle(desired - b.angle);
          b.angle += clamp(diff, -b.turnRate, b.turnRate);
          const spd = Math.hypot(b.vx, b.vy);
          b.vx = Math.cos(b.angle) * spd;
          b.vy = Math.sin(b.angle) * spd;
        }
        // Missile trail
        if (Math.random() < 0.6) {
          spawnParticles(b.x, b.y, 1, {
            minSpeed: 0.1, maxSpeed: 0.5, minLife: 0.2, maxLife: 0.5,
            minSize: 1.5, maxSize: 3, color: `hsla(${rand(10, 40)},100%,${rand(50, 70)}%,0.7)`, drag: 0.95,
          });
        }
      }

      b.x += b.vx;
      b.y += b.vy;
      b.life -= dt;

      if (b.life <= 0 || b.hit) {
        if (b.hit && b.splash > 0) {
          spawnExplosion(b.x, b.y, 0.8, b.weapon === 'missile' ? 20 : 280);
        }
        bullets.splice(i, 1);
      }
    }
  }

  function drawBullets(cam) {
    for (const b of bullets) {
      const sx = b.x - cam.x + CX;
      const sy = b.y - cam.y + CY;
      if (sx < -30 || sx > W + 30 || sy < -30 || sy > H + 30) continue;

      ctx.save();
      ctx.translate(sx, sy);
      ctx.rotate(b.angle);
      ctx.shadowColor = b.color;
      ctx.shadowBlur = 12;
      ctx.fillStyle = b.color;

      if (b.weapon === 'laser') {
        ctx.fillRect(-8, -b.size / 2, 16, b.size);
        ctx.fillStyle = '#fff';
        ctx.fillRect(-4, -b.size / 4, 10, b.size / 2);
      } else if (b.weapon === 'plasma') {
        ctx.beginPath();
        ctx.arc(0, 0, b.size, 0, TAU);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(0, 0, b.size * 0.4, 0, TAU);
        ctx.fill();
      } else if (b.weapon === 'missile') {
        // Missile body
        ctx.fillStyle = '#cc5533';
        ctx.beginPath();
        ctx.moveTo(8, 0);
        ctx.lineTo(-6, -3);
        ctx.lineTo(-6, 3);
        ctx.closePath();
        ctx.fill();
        // Flame
        ctx.fillStyle = `hsl(${rand(15, 40)},100%,60%)`;
        ctx.beginPath();
        ctx.moveTo(-6, 0);
        ctx.lineTo(-12 - Math.random() * 4, -2);
        ctx.lineTo(-10, 0);
        ctx.lineTo(-12 - Math.random() * 4, 2);
        ctx.closePath();
        ctx.fill();
      }

      ctx.shadowBlur = 0;
      ctx.restore();
    }
  }

  // ═══════════════════════════════════════════
  //  ASTEROIDS
  // ═══════════════════════════════════════════
  const asteroids = [];
  let asteroidIdCounter = 0;

  function makeAsteroid(x, y, radius, vx, vy) {
    // Generate jagged polygon shape
    const verts = [];
    const n = randInt(7, 12);
    for (let i = 0; i < n; i++) {
      const a = (i / n) * TAU;
      const r = radius * rand(0.7, 1.1);
      verts.push({ x: Math.cos(a) * r, y: Math.sin(a) * r });
    }
    // Generate surface details
    const craters = [];
    const craterCount = randInt(1, 3);
    for (let i = 0; i < craterCount; i++) {
      craters.push({
        x: rand(-radius * 0.4, radius * 0.4),
        y: rand(-radius * 0.4, radius * 0.4),
        r: rand(radius * 0.1, radius * 0.25),
      });
    }
    const hue = rand(20, 40);
    return {
      id: ++asteroidIdCounter,
      x, y,
      vx: vx !== undefined ? vx : rand(-1.2, 1.2),
      vy: vy !== undefined ? vy : rand(-1.2, 1.2),
      radius,
      rotation: rand(0, TAU),
      rotSpeed: rand(-0.02, 0.02),
      verts,
      craters,
      health: radius * 1.2,
      maxHealth: radius * 1.2,
      hue,
      color: `hsl(${hue}, 25%, ${rand(30, 45)}%)`,
      edgeColor: `hsl(${hue}, 30%, ${rand(50, 65)}%)`,
    };
  }

  function spawnAsteroidField(cx, cy, count, minR, maxR, spread) {
    for (let i = 0; i < count; i++) {
      const a = rand(0, TAU);
      const d = rand(100, spread);
      asteroids.push(makeAsteroid(
        cx + Math.cos(a) * d,
        cy + Math.sin(a) * d,
        rand(minR, maxR)
      ));
    }
  }

  function splitAsteroid(a) {
    const score = Math.floor(a.radius * 2);
    game.score += score;
    game.asteroidsDestroyed++;

    if (a.radius > 18) {
      const n = a.radius > 40 ? 3 : 2;
      for (let i = 0; i < n; i++) {
        const angle = rand(0, TAU);
        const speed = rand(0.8, 2.5);
        asteroids.push(makeAsteroid(
          a.x + Math.cos(angle) * a.radius * 0.3,
          a.y + Math.sin(angle) * a.radius * 0.3,
          a.radius * rand(0.35, 0.55),
          Math.cos(angle) * speed + a.vx * 0.5,
          Math.sin(angle) * speed + a.vy * 0.5
        ));
      }
    }
    spawnExplosion(a.x, a.y, a.radius / 30, a.hue);
    SFX.explosion();
  }

  function updateAsteroids(dt) {
    for (const a of asteroids) {
      a.x += a.vx;
      a.y += a.vy;
      a.rotation += a.rotSpeed;

      // Soft boundary - pull back toward origin if too far
      const d = Math.hypot(a.x, a.y);
      if (d > 2500) {
        a.vx -= (a.x / d) * 0.01;
        a.vy -= (a.y / d) * 0.01;
      }
    }
  }

  function drawAsteroids(cam) {
    for (const a of asteroids) {
      const sx = a.x - cam.x + CX;
      const sy = a.y - cam.y + CY;
      if (sx < -a.radius - 20 || sx > W + a.radius + 20 ||
          sy < -a.radius - 20 || sy > H + a.radius + 20) continue;

      ctx.save();
      ctx.translate(sx, sy);
      ctx.rotate(a.rotation);

      // Fill
      ctx.beginPath();
      ctx.moveTo(a.verts[0].x, a.verts[0].y);
      for (let i = 1; i < a.verts.length; i++) ctx.lineTo(a.verts[i].x, a.verts[i].y);
      ctx.closePath();

      // Gradient
      const grad = ctx.createRadialGradient(-a.radius * 0.3, -a.radius * 0.3, 0, 0, 0, a.radius);
      grad.addColorStop(0, `hsl(${a.hue}, 20%, 50%)`);
      grad.addColorStop(1, a.color);
      ctx.fillStyle = grad;
      ctx.fill();

      // Edge
      ctx.strokeStyle = a.edgeColor;
      ctx.lineWidth = 1.5;
      ctx.stroke();

      // Craters
      for (const c of a.craters) {
        ctx.beginPath();
        ctx.arc(c.x, c.y, c.r, 0, TAU);
        ctx.fillStyle = `hsla(${a.hue}, 20%, 20%, 0.5)`;
        ctx.fill();
        ctx.strokeStyle = `hsla(${a.hue}, 25%, 35%, 0.6)`;
        ctx.lineWidth = 1;
        ctx.stroke();
      }

      // Health crack if damaged
      if (a.health < a.maxHealth * 0.5) {
        ctx.strokeStyle = `rgba(255,100,50,0.4)`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(-a.radius * 0.3, -a.radius * 0.2);
        ctx.lineTo(a.radius * 0.1, a.radius * 0.15);
        ctx.lineTo(a.radius * 0.3, -a.radius * 0.1);
        ctx.stroke();
      }

      ctx.restore();
    }
  }

  // ═══════════════════════════════════════════
  //  POWERUPS
  // ═══════════════════════════════════════════
  const powerups = [];

  function spawnPowerup(x, y) {
    const types = ['health', 'shield', 'plasma', 'missile', 'score'];
    const type = choose(types);
    const colors = {
      health: '#00ff88', shield: '#4488ff', plasma: '#aa44ff',
      missile: '#ff6644', score: '#ffcc00',
    };
    powerups.push({
      x, y, type,
      color: colors[type],
      radius: 12,
      life: 15,
      pulse: 0,
      vy: rand(-0.3, 0.3),
      vx: rand(-0.3, 0.3),
    });
  }

  function updatePowerups(dt) {
    for (let i = powerups.length - 1; i >= 0; i--) {
      const p = powerups[i];
      p.x += p.vx;
      p.y += p.vy;
      p.life -= dt;
      p.pulse += dt * 4;
      if (p.life <= 0) powerups.splice(i, 1);
    }
  }

  function drawPowerups(cam) {
    for (const p of powerups) {
      const sx = p.x - cam.x + CX;
      const sy = p.y - cam.y + CY;
      if (sx < -30 || sx > W + 30 || sy < -30 || sy > H + 30) continue;

      const pulse = 1 + Math.sin(p.pulse) * 0.15;
      const alpha = p.life < 3 ? (Math.sin(p.life * 8) * 0.3 + 0.7) : 1;

      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.translate(sx, sy);

      // Outer glow
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 15;
      ctx.strokeStyle = p.color;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0, 0, p.radius * pulse, 0, TAU);
      ctx.stroke();

      // Inner
      ctx.fillStyle = p.color;
      ctx.globalAlpha = alpha * 0.3;
      ctx.beginPath();
      ctx.arc(0, 0, p.radius * 0.7 * pulse, 0, TAU);
      ctx.fill();

      // Icon
      ctx.globalAlpha = alpha;
      ctx.fillStyle = p.color;
      ctx.font = 'bold 12px Orbitron';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const icons = { health: '+', shield: 'S', plasma: 'P', missile: 'M', score: '$' };
      ctx.fillText(icons[p.type] || '?', 0, 1);

      ctx.shadowBlur = 0;
      ctx.restore();
    }
  }

  // ═══════════════════════════════════════════
  //  SHIP DESIGNS
  // ═══════════════════════════════════════════
  // Ship drawing functions — creative unique designs

  function drawPlayerShip(ctx, ship) {
    const r = ship.radius;
    ctx.save();

    // Engine glow
    if (ship.thrusting || ship.boosting) {
      const boost = ship.boosting ? 1.6 : 1;
      ctx.shadowColor = '#00aaff';
      ctx.shadowBlur = 15 * boost;
      const flameLen = (10 + Math.random() * 8) * boost;
      const grad = ctx.createLinearGradient(-r, 0, -r - flameLen, 0);
      grad.addColorStop(0, 'rgba(0,200,255,0.9)');
      grad.addColorStop(0.5, 'rgba(0,150,255,0.5)');
      grad.addColorStop(1, 'rgba(0,100,255,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.moveTo(-r * 0.6, -4);
      ctx.lineTo(-r - flameLen, 0);
      ctx.lineTo(-r * 0.6, 4);
      ctx.closePath();
      ctx.fill();
      // Side thrusters
      ctx.beginPath();
      ctx.moveTo(-r * 0.4, -r * 0.55);
      ctx.lineTo(-r * 0.7 - Math.random() * 4 * boost, -r * 0.55);
      ctx.lineTo(-r * 0.4, -r * 0.35);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(-r * 0.4, r * 0.55);
      ctx.lineTo(-r * 0.7 - Math.random() * 4 * boost, r * 0.55);
      ctx.lineTo(-r * 0.4, r * 0.35);
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    // Shield visual
    if (ship.shield > 0) {
      const sp = ship.shield / ship.maxShield;
      ctx.strokeStyle = `rgba(68,136,255,${0.2 + sp * 0.3})`;
      ctx.lineWidth = 1.5;
      ctx.shadowColor = '#4488ff';
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.arc(0, 0, r + 6 + Math.sin(performance.now() / 200) * 1.5, 0, TAU);
      ctx.stroke();
      ctx.shadowBlur = 0;
    }

    // Main hull — sleek arrowhead interceptor
    ctx.shadowColor = '#00e5ff';
    ctx.shadowBlur = 8;

    // Wings
    ctx.fillStyle = '#0a3050';
    ctx.strokeStyle = '#00c8ff';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(-r * 0.2, 0);
    ctx.lineTo(-r * 0.5, -r * 0.9);
    ctx.lineTo(r * 0.1, -r * 0.35);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(-r * 0.2, 0);
    ctx.lineTo(-r * 0.5, r * 0.9);
    ctx.lineTo(r * 0.1, r * 0.35);
    ctx.closePath();
    ctx.fill(); ctx.stroke();

    // Wing accents
    ctx.strokeStyle = '#00e5ff';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-r * 0.15, -r * 0.3);
    ctx.lineTo(-r * 0.35, -r * 0.7);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(-r * 0.15, r * 0.3);
    ctx.lineTo(-r * 0.35, r * 0.7);
    ctx.stroke();

    // Main body
    const bodyGrad = ctx.createLinearGradient(-r, 0, r, 0);
    bodyGrad.addColorStop(0, '#0a2540');
    bodyGrad.addColorStop(0.5, '#0d3a5c');
    bodyGrad.addColorStop(1, '#0a4a70');
    ctx.fillStyle = bodyGrad;
    ctx.strokeStyle = '#00e5ff';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(r, 0);           // nose
    ctx.lineTo(r * 0.2, -r * 0.4);
    ctx.lineTo(-r * 0.7, -r * 0.3);
    ctx.lineTo(-r * 0.85, 0);    // rear
    ctx.lineTo(-r * 0.7, r * 0.3);
    ctx.lineTo(r * 0.2, r * 0.4);
    ctx.closePath();
    ctx.fill(); ctx.stroke();

    // Cockpit
    ctx.fillStyle = '#00eeff';
    ctx.shadowColor = '#00eeff';
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.ellipse(r * 0.25, 0, r * 0.25, r * 0.15, 0, 0, TAU);
    ctx.fill();

    // Nose stripe
    ctx.shadowBlur = 0;
    ctx.strokeStyle = '#00ffcc';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(r * 0.5, 0);
    ctx.lineTo(r * 0.9, 0);
    ctx.stroke();

    // Engine ports
    ctx.fillStyle = '#0088cc';
    ctx.beginPath();
    ctx.arc(-r * 0.75, -r * 0.12, 3, 0, TAU);
    ctx.arc(-r * 0.75, r * 0.12, 3, 0, TAU);
    ctx.fill();

    ctx.shadowBlur = 0;
    ctx.restore();
  }

  function drawEnemyInterceptor(ctx, ship) {
    const r = ship.radius;
    // Aggressive angular fighter — red/orange theme
    // Engine
    if (ship.thrusting) {
      ctx.shadowColor = '#ff4400';
      ctx.shadowBlur = 12;
      const fl = 8 + Math.random() * 6;
      ctx.fillStyle = 'rgba(255,80,0,0.8)';
      ctx.beginPath();
      ctx.moveTo(-r * 0.5, -3);
      ctx.lineTo(-r - fl, 0);
      ctx.lineTo(-r * 0.5, 3);
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    // Twin forward prongs
    ctx.fillStyle = '#4a1010';
    ctx.strokeStyle = '#ff4422';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(r * 1.1, -r * 0.25);
    ctx.lineTo(r * 0.3, -r * 0.4);
    ctx.lineTo(r * 0.3, -r * 0.1);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(r * 1.1, r * 0.25);
    ctx.lineTo(r * 0.3, r * 0.4);
    ctx.lineTo(r * 0.3, r * 0.1);
    ctx.closePath();
    ctx.fill(); ctx.stroke();

    // Main body - diamond-ish
    const bodyGrad = ctx.createLinearGradient(-r, 0, r, 0);
    bodyGrad.addColorStop(0, '#3a0a0a');
    bodyGrad.addColorStop(1, '#5a1515');
    ctx.fillStyle = bodyGrad;
    ctx.beginPath();
    ctx.moveTo(r * 0.5, 0);
    ctx.lineTo(r * 0.1, -r * 0.55);
    ctx.lineTo(-r * 0.6, -r * 0.3);
    ctx.lineTo(-r * 0.8, 0);
    ctx.lineTo(-r * 0.6, r * 0.3);
    ctx.lineTo(r * 0.1, r * 0.55);
    ctx.closePath();
    ctx.fill(); ctx.stroke();

    // Crossbar wing
    ctx.fillStyle = '#3a1010';
    ctx.fillRect(-r * 0.15, -r * 0.85, r * 0.25, r * 1.7);
    ctx.strokeRect(-r * 0.15, -r * 0.85, r * 0.25, r * 1.7);

    // Cockpit
    ctx.fillStyle = '#ff6644';
    ctx.shadowColor = '#ff4400';
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(r * 0.05, 0, r * 0.15, 0, TAU);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Danger stripes
    ctx.strokeStyle = '#ffaa00';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-r * 0.3, -r * 0.15);
    ctx.lineTo(-r * 0.5, -r * 0.15);
    ctx.moveTo(-r * 0.3, r * 0.15);
    ctx.lineTo(-r * 0.5, r * 0.15);
    ctx.stroke();
  }

  function drawEnemyDestroyer(ctx, ship) {
    const r = ship.radius;
    // Heavy bulky destroyer — purple/magenta
    if (ship.thrusting) {
      ctx.shadowColor = '#aa00ff';
      ctx.shadowBlur = 10;
      ctx.fillStyle = 'rgba(170,0,255,0.7)';
      const fl = 6 + Math.random() * 5;
      for (let i = -1; i <= 1; i++) {
        ctx.beginPath();
        ctx.moveTo(-r * 0.7, i * 5);
        ctx.lineTo(-r - fl, i * 5);
        ctx.lineTo(-r * 0.7, i * 5 + 3);
        ctx.fill();
      }
      ctx.shadowBlur = 0;
    }

    // Hull pieces
    ctx.fillStyle = '#1a0a2e';
    ctx.strokeStyle = '#cc44ff';
    ctx.lineWidth = 1.5;

    // Core body
    ctx.beginPath();
    ctx.moveTo(r * 0.9, 0);
    ctx.lineTo(r * 0.4, -r * 0.5);
    ctx.lineTo(-r * 0.5, -r * 0.55);
    ctx.lineTo(-r * 0.9, -r * 0.25);
    ctx.lineTo(-r * 0.9, r * 0.25);
    ctx.lineTo(-r * 0.5, r * 0.55);
    ctx.lineTo(r * 0.4, r * 0.5);
    ctx.closePath();
    ctx.fill(); ctx.stroke();

    // Side armor panels
    ctx.fillStyle = '#2a1050';
    ctx.beginPath();
    ctx.moveTo(0, -r * 0.5);
    ctx.lineTo(-r * 0.2, -r * 0.9);
    ctx.lineTo(-r * 0.6, -r * 0.7);
    ctx.lineTo(-r * 0.4, -r * 0.5);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0, r * 0.5);
    ctx.lineTo(-r * 0.2, r * 0.9);
    ctx.lineTo(-r * 0.6, r * 0.7);
    ctx.lineTo(-r * 0.4, r * 0.5);
    ctx.closePath();
    ctx.fill(); ctx.stroke();

    // Turret indicators
    ctx.fillStyle = '#dd66ff';
    ctx.shadowColor = '#aa00ff';
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(r * 0.3, -r * 0.25, 3, 0, TAU);
    ctx.arc(r * 0.3, r * 0.25, 3, 0, TAU);
    ctx.fill();

    // Bridge
    ctx.fillStyle = '#ee88ff';
    ctx.beginPath();
    ctx.ellipse(r * 0.15, 0, r * 0.2, r * 0.12, 0, 0, TAU);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  function drawEnemyScout(ctx, ship) {
    const r = ship.radius;
    // Small fast scout — green/lime, insectoid
    if (ship.thrusting) {
      ctx.shadowColor = '#44ff00';
      ctx.shadowBlur = 10;
      const fl = 10 + Math.random() * 8;
      ctx.fillStyle = 'rgba(100,255,0,0.7)';
      ctx.beginPath();
      ctx.moveTo(-r * 0.4, -2);
      ctx.lineTo(-r - fl, 0);
      ctx.lineTo(-r * 0.4, 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    ctx.fillStyle = '#0a2a0a';
    ctx.strokeStyle = '#44ff44';
    ctx.lineWidth = 1.2;

    // Thin elongated body
    ctx.beginPath();
    ctx.moveTo(r, 0);
    ctx.lineTo(r * 0.3, -r * 0.3);
    ctx.lineTo(-r * 0.6, -r * 0.2);
    ctx.lineTo(-r * 0.7, 0);
    ctx.lineTo(-r * 0.6, r * 0.2);
    ctx.lineTo(r * 0.3, r * 0.3);
    ctx.closePath();
    ctx.fill(); ctx.stroke();

    // Thin swept wings
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(-r * 0.3, -r * 0.8);
    ctx.lineTo(-r * 0.1, -r * 0.15);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(-r * 0.3, r * 0.8);
    ctx.lineTo(-r * 0.1, r * 0.15);
    ctx.closePath();
    ctx.fill(); ctx.stroke();

    // Sensor eye
    ctx.fillStyle = '#88ff44';
    ctx.shadowColor = '#44ff00';
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(r * 0.4, 0, r * 0.12, 0, TAU);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  // ═══════════════════════════════════════════
  //  ENTITIES: Player & Enemies
  // ═══════════════════════════════════════════
  let entityId = 0;

  function createPlayer() {
    return {
      id: ++entityId,
      x: 0, y: 0,
      vx: 0, vy: 0,
      angle: 0,
      radius: 16,
      health: 100,
      maxHealth: 100,
      shield: 50,
      maxShield: 50,
      shieldRegen: 5,
      shieldRegenDelay: 0,
      speed: 0.18,
      maxSpeed: 5.5,
      friction: 0.985,
      turnSpeed: 0.08,
      thrusting: false,
      boosting: false,
      boostFuel: 100,
      maxBoostFuel: 100,
      cooldown: 0,
      weapon: 'laser',
      invincible: 0,
      dead: false,
      killCount: 0,
      type: 'player',
    };
  }

  const ENEMY_TYPES = {
    interceptor: {
      radius: 14, health: 50, speed: 0.12, maxSpeed: 4.2,
      friction: 0.98, turnSpeed: 0.05, score: 200,
      weapon: 'laser', fireRate: 0.8, rangeRange: 450,
      color: '#ff4422', draw: drawEnemyInterceptor,
      ai: 'aggressive',
    },
    destroyer: {
      radius: 20, health: 120, speed: 0.07, maxSpeed: 2.8,
      friction: 0.99, turnSpeed: 0.03, score: 400,
      weapon: 'plasma', fireRate: 1.4, rangeRange: 500,
      color: '#cc44ff', draw: drawEnemyDestroyer,
      ai: 'tank',
    },
    scout: {
      radius: 11, health: 25, speed: 0.2, maxSpeed: 5.5,
      friction: 0.97, turnSpeed: 0.08, score: 150,
      weapon: 'laser', fireRate: 0.5, rangeRange: 350,
      color: '#44ff44', draw: drawEnemyScout,
      ai: 'hitandrun',
    },
  };

  const enemies = [];

  function spawnEnemy(type, x, y) {
    const t = ENEMY_TYPES[type];
    enemies.push({
      id: ++entityId,
      x, y,
      vx: 0, vy: 0,
      angle: rand(0, TAU),
      radius: t.radius,
      health: t.health,
      maxHealth: t.health,
      speed: t.speed,
      maxSpeed: t.maxSpeed,
      friction: t.friction,
      turnSpeed: t.turnSpeed,
      thrusting: false,
      cooldown: rand(0.5, 1.5),
      weapon: t.weapon,
      type,
      ai: t.ai,
      color: t.color,
      draw: t.draw,
      score: t.score,
      fireRate: t.fireRate,
      range: t.range,
      dead: false,
      // AI state
      state: 'approach',
      stateTimer: 0,
      strafeDir: choose([-1, 1]),
      targetAngle: 0,
      evadeTimer: 0,
    });
  }

  // ═══════════════════════════════════════════
  //  AI
  // ═══════════════════════════════════════════
  function updateEnemyAI(e, dt) {
    if (e.dead || player.dead) return;
    const d = dist(e.x, e.y, player.x, player.y);
    const toPlayer = angleTo(e.x, e.y, player.x, player.y);
    e.stateTimer -= dt;
    e.evadeTimer -= dt;

    // Check if need to evade bullets
    for (const b of bullets) {
      if (b.ownerId === e.id) continue;
      const bd = dist(b.x, b.y, e.x, e.y);
      if (bd < 120) {
        const bulletAngle = Math.atan2(b.vy, b.vx);
        const toEnemy = angleTo(b.x, b.y, e.x, e.y);
        if (Math.abs(normAngle(bulletAngle - toEnemy)) < 0.5) {
          e.evadeTimer = 0.4;
          e.targetAngle = toPlayer + e.strafeDir * Math.PI / 2;
          break;
        }
      }
    }

    // Avoid asteroids
    for (const a of asteroids) {
      const ad = dist(e.x, e.y, a.x, a.y);
      if (ad < a.radius + e.radius + 40) {
        const away = angleTo(a.x, a.y, e.x, e.y);
        e.targetAngle = away;
        e.evadeTimer = 0.3;
        break;
      }
    }

    if (e.evadeTimer > 0) {
      // Evading
      let diff = normAngle(e.targetAngle - e.angle);
      e.angle += clamp(diff, -e.turnSpeed * 1.5, e.turnSpeed * 1.5);
      e.vx += Math.cos(e.angle) * e.speed * 1.3;
      e.vy += Math.sin(e.angle) * e.speed * 1.3;
      e.thrusting = true;
    } else if (e.ai === 'aggressive') {
      // Interceptor: charge and shoot
      if (d > e.range * 0.7) {
        // Approach
        let diff = normAngle(toPlayer - e.angle);
        e.angle += clamp(diff, -e.turnSpeed, e.turnSpeed);
        e.vx += Math.cos(e.angle) * e.speed;
        e.vy += Math.sin(e.angle) * e.speed;
        e.thrusting = true;
      } else if (d < 100) {
        // Too close, bank away
        let diff = normAngle(toPlayer + Math.PI * 0.7 * e.strafeDir - e.angle);
        e.angle += clamp(diff, -e.turnSpeed, e.turnSpeed);
        e.vx += Math.cos(e.angle) * e.speed;
        e.vy += Math.sin(e.angle) * e.speed;
        e.thrusting = true;
      } else {
        // Orbit and fire
        let desired = toPlayer + e.strafeDir * 0.4;
        let diff = normAngle(desired - e.angle);
        e.angle += clamp(diff, -e.turnSpeed, e.turnSpeed);
        e.vx += Math.cos(e.angle) * e.speed * 0.7;
        e.vy += Math.sin(e.angle) * e.speed * 0.7;
        e.thrusting = true;

        // Fire at player with lead
        if (e.cooldown <= 0 && Math.abs(normAngle(toPlayer - e.angle)) < 0.3) {
          // Lead target
          const leadTime = d / (WEAPONS[e.weapon].speed);
          const aimX = player.x + player.vx * leadTime;
          const aimY = player.y + player.vy * leadTime;
          const aimAngle = angleTo(e.x, e.y, aimX, aimY);
          fireBullet(e, e.weapon, aimAngle);
          e.cooldown = e.fireRate * rand(0.8, 1.2);
        }
      }
      if (e.stateTimer <= 0) {
        e.strafeDir = choose([-1, 1]);
        e.stateTimer = rand(1.5, 3);
      }
    } else if (e.ai === 'tank') {
      // Destroyer: slow approach, heavy fire
      if (d > e.range * 0.6) {
        let diff = normAngle(toPlayer - e.angle);
        e.angle += clamp(diff, -e.turnSpeed, e.turnSpeed);
        e.vx += Math.cos(e.angle) * e.speed;
        e.vy += Math.sin(e.angle) * e.speed;
        e.thrusting = true;
      } else {
        // Face player and fire
        let diff = normAngle(toPlayer - e.angle);
        e.angle += clamp(diff, -e.turnSpeed, e.turnSpeed);
        // Slowly strafe
        e.vx += Math.cos(e.angle + Math.PI / 2 * e.strafeDir) * e.speed * 0.4;
        e.vy += Math.sin(e.angle + Math.PI / 2 * e.strafeDir) * e.speed * 0.4;
        e.thrusting = Math.random() > 0.5;

        if (e.cooldown <= 0 && Math.abs(normAngle(toPlayer - e.angle)) < 0.25) {
          const leadTime = d / (WEAPONS[e.weapon].speed);
          fireBullet(e, e.weapon, angleTo(e.x, e.y, player.x + player.vx * leadTime, player.y + player.vy * leadTime));
          e.cooldown = e.fireRate * rand(0.9, 1.1);
        }
      }
      if (e.stateTimer <= 0) {
        e.strafeDir *= -1;
        e.stateTimer = rand(2, 4);
      }
    } else if (e.ai === 'hitandrun') {
      // Scout: dash in, shoot, flee
      if (e.state === 'approach' || !e.state) {
        let diff = normAngle(toPlayer - e.angle);
        e.angle += clamp(diff, -e.turnSpeed, e.turnSpeed);
        e.vx += Math.cos(e.angle) * e.speed * 1.2;
        e.vy += Math.sin(e.angle) * e.speed * 1.2;
        e.thrusting = true;
        if (d < 250) {
          e.state = 'attack';
          e.stateTimer = 1.0;
          // Fire a burst
          if (e.cooldown <= 0) {
            fireBullet(e, e.weapon, toPlayer);
            e.cooldown = 0.15;
          }
        }
      } else if (e.state === 'attack') {
        let diff = normAngle(toPlayer - e.angle);
        e.angle += clamp(diff, -e.turnSpeed, e.turnSpeed);
        if (e.cooldown <= 0) {
          fireBullet(e, e.weapon, toPlayer + rand(-0.05, 0.05));
          e.cooldown = 0.2;
        }
        if (e.stateTimer <= 0 || d < 80) {
          e.state = 'flee';
          e.stateTimer = rand(1.5, 2.5);
        }
      } else if (e.state === 'flee') {
        const away = toPlayer + Math.PI + e.strafeDir * 0.5;
        let diff = normAngle(away - e.angle);
        e.angle += clamp(diff, -e.turnSpeed, e.turnSpeed);
        e.vx += Math.cos(e.angle) * e.speed * 1.3;
        e.vy += Math.sin(e.angle) * e.speed * 1.3;
        e.thrusting = true;
        if (e.stateTimer <= 0) {
          e.state = 'approach';
          e.strafeDir = choose([-1, 1]);
        }
      }
    }

    // Cap speed
    const spd = Math.hypot(e.vx, e.vy);
    if (spd > e.maxSpeed) {
      e.vx = (e.vx / spd) * e.maxSpeed;
      e.vy = (e.vy / spd) * e.maxSpeed;
    }

    e.vx *= e.friction;
    e.vy *= e.friction;
    e.x += e.vx;
    e.y += e.vy;
    e.cooldown -= dt;
  }

  // ═══════════════════════════════════════════
  //  COLLISION
  // ═══════════════════════════════════════════
  function handleCollisions() {
    // Bullets vs Asteroids
    for (const b of bullets) {
      if (b.hit) continue;
      for (let i = asteroids.length - 1; i >= 0; i--) {
        const a = asteroids[i];
        if (dist(b.x, b.y, a.x, a.y) < a.radius + b.size) {
          a.health -= b.damage;
          b.hit = true;
          spawnParticles(b.x, b.y, 5, {
            minSpeed: 0.5, maxSpeed: 2, minLife: 0.1, maxLife: 0.4,
            minSize: 1, maxSize: 3, color: b.color,
          });
          // Splash damage
          if (b.splash) {
            for (const a2 of asteroids) {
              if (a2 === a) continue;
              const sd = dist(b.x, b.y, a2.x, a2.y);
              if (sd < b.splash) a2.health -= b.damage * (1 - sd / b.splash) * 0.5;
            }
          }
          if (a.health <= 0) {
            // Chance for powerup
            if (a.radius > 25 && Math.random() < 0.25) spawnPowerup(a.x, a.y);
            else if (Math.random() < 0.08) spawnPowerup(a.x, a.y);
            splitAsteroid(a);
            asteroids.splice(i, 1);
          } else {
            // Knockback
            const kick = angleTo(b.x, b.y, a.x, a.y);
            a.vx += Math.cos(kick) * 0.5;
            a.vy += Math.sin(kick) * 0.5;
            SFX.hit();
          }
          if (!b.pierce) break;
        }
      }
    }

    // Bullets vs Ships
    for (const b of bullets) {
      if (b.hit) continue;

      // Vs Player
      if (b.ownerId !== player.id && !player.dead && player.invincible <= 0) {
        if (dist(b.x, b.y, player.x, player.y) < player.radius + b.size) {
          damageEntity(player, b.damage);
          b.hit = true;
          spawnParticles(b.x, b.y, 6, {
            minSpeed: 1, maxSpeed: 3, minLife: 0.1, maxLife: 0.3,
            minSize: 1, maxSize: 3, color: b.color,
          });
          if (b.splash) {
            // splash already applied via hit
          }
        }
      }

      // Vs Enemies
      for (const e of enemies) {
        if (e.dead || b.ownerId === e.id) continue;
        // Friendly fire off for AI-AI, allow player bullets
        if (b.ownerId !== player.id) continue;
        if (dist(b.x, b.y, e.x, e.y) < e.radius + b.size) {
          damageEntity(e, b.damage);
          b.hit = true;
          spawnParticles(b.x, b.y, 6, {
            minSpeed: 1, maxSpeed: 3, minLife: 0.1, maxLife: 0.3,
            minSize: 1, maxSize: 3, color: b.color,
          });
          if (b.splash) {
            for (const e2 of enemies) {
              if (e2 === e || e2.dead) continue;
              const sd = dist(b.x, b.y, e2.x, e2.y);
              if (sd < b.splash) damageEntity(e2, b.damage * (1 - sd / b.splash) * 0.4);
            }
          }
          break;
        }
      }
    }

    // Player vs Asteroids
    if (!player.dead && player.invincible <= 0) {
      for (const a of asteroids) {
        const d = dist(player.x, player.y, a.x, a.y);
        if (d < player.radius + a.radius * 0.85) {
          const dmg = clamp(a.radius * 0.3, 5, 25);
          damageEntity(player, dmg);
          // Bounce
          const angle = angleTo(a.x, a.y, player.x, player.y);
          player.vx += Math.cos(angle) * 3;
          player.vy += Math.sin(angle) * 3;
          a.vx -= Math.cos(angle) * 1.5;
          a.vy -= Math.sin(angle) * 1.5;
          player.invincible = 0.5;
          spawnParticles(player.x, player.y, 8, {
            minSpeed: 1, maxSpeed: 3, minLife: 0.2, maxLife: 0.5,
            minSize: 1, maxSize: 3, hueMin: 0, hueMax: 30,
          });
        }
      }
    }

    // Enemies vs Asteroids
    for (const e of enemies) {
      if (e.dead) continue;
      for (const a of asteroids) {
        const d = dist(e.x, e.y, a.x, a.y);
        if (d < e.radius + a.radius * 0.85) {
          damageEntity(e, clamp(a.radius * 0.2, 3, 15));
          const angle = angleTo(a.x, a.y, e.x, e.y);
          e.vx += Math.cos(angle) * 2;
          e.vy += Math.sin(angle) * 2;
          a.vx -= Math.cos(angle) * 1;
          a.vy -= Math.sin(angle) * 1;
        }
      }
    }

    // Player vs Enemies (ramming)
    if (!player.dead && player.invincible <= 0) {
      for (const e of enemies) {
        if (e.dead) continue;
        const d = dist(player.x, player.y, e.x, e.y);
        if (d < player.radius + e.radius) {
          damageEntity(player, 15);
          damageEntity(e, 20);
          const angle = angleTo(e.x, e.y, player.x, player.y);
          player.vx += Math.cos(angle) * 4;
          player.vy += Math.sin(angle) * 4;
          e.vx -= Math.cos(angle) * 3;
          e.vy -= Math.sin(angle) * 3;
          player.invincible = 0.6;
          spawnExplosion((player.x + e.x) / 2, (player.y + e.y) / 2, 0.5, 20);
        }
      }
    }

    // Player vs Powerups
    for (let i = powerups.length - 1; i >= 0; i--) {
      const p = powerups[i];
      if (dist(player.x, player.y, p.x, p.y) < player.radius + p.radius + 5) {
        applyPowerup(p.type);
        powerups.splice(i, 1);
        SFX.pickup();
        spawnParticles(p.x, p.y, 12, {
          minSpeed: 1, maxSpeed: 3, minLife: 0.2, maxLife: 0.6,
          minSize: 1, maxSize: 3, color: p.color,
        });
      }
    }
  }

  function damageEntity(ent, amount) {
    if (ent.dead) return;

    if (ent === player && ent.shield > 0) {
      const absorbed = Math.min(ent.shield, amount);
      ent.shield -= absorbed;
      amount -= absorbed;
      ent.shieldRegenDelay = 3;
      if (amount <= 0) {
        SFX.shield();
        // Shield hit particles
        spawnParticles(ent.x, ent.y, 6, {
          minSpeed: 1, maxSpeed: 3, minLife: 0.15, maxLife: 0.4,
          minSize: 1, maxSize: 3, color: '#4488ff',
        });
        return;
      }
    }

    ent.health -= amount;
    SFX.hit();

    if (ent === player) {
      // Damage flash
      document.getElementById('damageVignette').style.opacity = '1';
      setTimeout(() => { document.getElementById('damageVignette').style.opacity = '0'; }, 150);
    }

    if (ent.health <= 0) {
      ent.health = 0;
      ent.dead = true;
      spawnExplosion(ent.x, ent.y, ent.radius / 10, ent === player ? 200 : 10);
      SFX.bigExplosion();

      if (ent !== player) {
        game.score += ent.score;
        game.kills++;
        player.killCount++;
        // Powerup chance
        if (Math.random() < 0.4) spawnPowerup(ent.x, ent.y);
        // Kill feed
        addKillFeed(ent.type);
      }
    }
  }

  function applyPowerup(type) {
    switch (type) {
      case 'health':
        player.health = Math.min(player.maxHealth, player.health + 30);
        break;
      case 'shield':
        player.shield = Math.min(player.maxShield, player.shield + 40);
        player.shieldRegenDelay = 0;
        break;
      case 'plasma':
        WEAPONS.plasma.ammo = Math.min(WEAPONS.plasma.maxAmmo, (WEAPONS.plasma.ammo || 0) + 15);
        break;
      case 'missile':
        WEAPONS.missile.ammo = Math.min(WEAPONS.missile.maxAmmo, (WEAPONS.missile.ammo || 0) + 6);
        break;
      case 'score':
        game.score += 500;
        break;
    }
  }

  function addKillFeed(type) {
    const feed = document.getElementById('killFeed');
    const el = document.createElement('div');
    el.className = 'kill' + (player.killCount % 5 === 0 ? ' ace' : '');
    const names = { interceptor: 'Interceptor', destroyer: 'Destroyer', scout: 'Scout' };
    el.textContent = player.killCount % 5 === 0
      ? `★ ACE — ${names[type] || type} destroyed`
      : `${names[type] || type} destroyed`;
    feed.prepend(el);
    setTimeout(() => el.remove(), 3000);
    // Keep max 5
    while (feed.children.length > 5) feed.lastChild.remove();
  }

  // ═══════════════════════════════════════════
  //  GAME STATE
  // ═══════════════════════════════════════════
  let player = createPlayer();
  let camera = { x: 0, y: 0 };
  let game = {
    state: 'title', // title, playing, gameover
    score: 0,
    wave: 0,
    kills: 0,
    asteroidsDestroyed: 0,
    waveTimer: 0,
    waveClearing: false,
    elapsed: 0,
  };

  function startGame() {
    ensureAudio();
    player = createPlayer();
    enemies.length = 0;
    asteroids.length = 0;
    bullets.length = 0;
    particles.length = 0;
    powerups.length = 0;
    entityId = 0;
    player.id = ++entityId;

    // Reset weapons
    WEAPONS.laser.ammo = Infinity;
    WEAPONS.plasma.ammo = 20;
    WEAPONS.missile.ammo = 8;

    game.score = 0;
    game.wave = 0;
    game.kills = 0;
    game.asteroidsDestroyed = 0;
    game.waveTimer = 0;
    game.waveClearing = false;
    game.elapsed = 0;
    game.state = 'playing';

    camera.x = 0; camera.y = 0;

    // Initial asteroids
    spawnAsteroidField(0, 0, 15, 20, 55, 900);

    document.getElementById('titleScreen').classList.add('hidden');
    document.getElementById('gameOverScreen').classList.add('hidden');
    document.getElementById('killFeed').innerHTML = '';

    nextWave();
  }

  function nextWave() {
    game.wave++;
    game.waveClearing = false;
    game.waveTimer = 0;

    // Announce
    const ann = document.getElementById('waveAnnounce');
    document.getElementById('waveText').textContent = `WAVE ${game.wave}`;
    const suffixes = ['INCOMING', 'HOSTILES DETECTED', 'ENGAGE', 'COMBAT ZONE', 'THREAT LEVEL RISING'];
    document.getElementById('waveSub').textContent = choose(suffixes);
    ann.classList.add('show');
    setTimeout(() => ann.classList.remove('show'), 2500);
    SFX.wave();

    // Spawn enemies based on wave
    const enemyCount = Math.min(2 + Math.floor(game.wave * 1.2), 12);
    for (let i = 0; i < enemyCount; i++) {
      setTimeout(() => {
        if (game.state !== 'playing') return;
        const angle = rand(0, TAU);
        const d = rand(500, 800);
        let type;
        if (game.wave <= 2) {
          type = Math.random() < 0.7 ? 'scout' : 'interceptor';
        } else if (game.wave <= 5) {
          type = choose(['scout', 'interceptor', 'interceptor', 'destroyer']);
        } else {
          type = choose(['scout', 'scout', 'interceptor', 'interceptor', 'destroyer', 'destroyer']);
        }
        // Scale health with waves
        const e = spawnEnemy(type, player.x + Math.cos(angle) * d, player.y + Math.sin(angle) * d);
        // Buff later enemies
        if (enemies.length > 0) {
          const last = enemies[enemies.length - 1];
          last.health *= 1 + (game.wave - 1) * 0.1;
          last.maxHealth = last.health;
          last.score = Math.floor(last.score * (1 + (game.wave - 1) * 0.15));
        }
      }, i * 600);
    }

    // Extra asteroids each wave
    if (game.wave > 1) {
      spawnAsteroidField(player.x, player.y, 3 + Math.floor(game.wave / 2), 20, 50, 1000);
    }
  }

  function gameOver() {
    game.state = 'gameover';
    document.getElementById('finalScore').textContent = game.score.toLocaleString();
    document.getElementById('finalWave').textContent = game.wave;
    document.getElementById('finalKills').textContent = game.kills;
    document.getElementById('finalAsteroids').textContent = game.asteroidsDestroyed;

    const title = document.getElementById('resultTitle');
    if (game.wave >= 10) {
      title.textContent = 'LEGENDARY';
      title.className = 'result-title win';
    } else if (game.wave >= 5) {
      title.textContent = 'MISSION FAILED';
      title.className = 'result-title lose';
    } else {
      title.textContent = 'DESTROYED';
      title.className = 'result-title lose';
    }

    setTimeout(() => {
      document.getElementById('gameOverScreen').classList.remove('hidden');
    }, 1500);
  }

  // ═══════════════════════════════════════════
  //  PLAYER UPDATE
  // ═══════════════════════════════════════════
  function updatePlayer(dt) {
    if (player.dead) return;

    // Aim at mouse (world coords)
    const worldMX = mouseX - CX + camera.x;
    const worldMY = mouseY - CY + camera.y;
    const targetAngle = angleTo(player.x, player.y, worldMX, worldMY);
    // Smooth rotate
    let diff = normAngle(targetAngle - player.angle);
    player.angle += diff * Math.min(1, player.turnSpeed * 12 * dt * 60); // responsive aiming

    // Movement
    let ix = 0, iy = 0;
    if (keys['KeyW'] || keys['ArrowUp']) iy -= 1;
    if (keys['KeyS'] || keys['ArrowDown']) iy += 1;
    if (keys['KeyA'] || keys['ArrowLeft']) ix -= 1;
    if (keys['KeyD'] || keys['ArrowRight']) ix += 1;

    player.thrusting = ix !== 0 || iy !== 0;
    player.boosting = false;

    if (player.thrusting) {
      // Move in input direction (screen-relative for WASD feel, or reduce to thrust-forward?)
      // Using camera-independent world directions for WASD
      const len = Math.hypot(ix, iy) || 1;
      let accel = player.speed;

      // Boost
      if ((keys['ShiftLeft'] || keys['ShiftRight']) && player.boostFuel > 0) {
        accel *= 2.2;
        player.boosting = true;
        player.boostFuel = Math.max(0, player.boostFuel - 30 * dt);
        // Boost particles
        if (Math.random() < 0.5) {
          spawnParticles(
            player.x - Math.cos(player.angle) * player.radius,
            player.y - Math.sin(player.angle) * player.radius,
            2, { angle: player.angle + Math.PI, spread: 0.4, minSpeed: 1, maxSpeed: 3,
              minLife: 0.1, maxLife: 0.3, minSize: 1, maxSize: 3, color: '#00aaff' }
          );
        }
      }

      player.vx += (ix / len) * accel;
      player.vy += (iy / len) * accel;
    }

    // Boost regen
    if (!player.boosting) {
      player.boostFuel = Math.min(player.maxBoostFuel, player.boostFuel + 12 * dt);
    }

    // Cap speed
    const maxSpd = player.boosting ? player.maxSpeed * 1.5 : player.maxSpeed;
    const spd = Math.hypot(player.vx, player.vy);
    if (spd > maxSpd) {
      player.vx = (player.vx / spd) * maxSpd;
      player.vy = (player.vy / spd) * maxSpd;
    }

    player.vx *= player.friction;
    player.vy *= player.friction;
    player.x += player.vx;
    player.y += player.vy;

    // Weapon switch
    if (keys['Digit1']) player.weapon = 'laser';
    if (keys['Digit2']) player.weapon = 'plasma';
    if (keys['Digit3']) player.weapon = 'missile';

    // Manual shield recharge (R)
    if (keys['KeyR'] && player.shield < player.maxShield) {
      player.shield = Math.min(player.maxShield, player.shield + 15 * dt);
      player.shieldRegenDelay = 1;
    }

    // Firing
    player.cooldown -= dt;
    const firing = mouseDown || keys['Space'];
    if (firing && player.cooldown <= 0) {
      const w = WEAPONS[player.weapon];
      if (w.ammo === Infinity || w.ammo > 0) {
        fireBullet(player, player.weapon, player.angle);
        player.cooldown = w.cooldown;
      } else {
        // Auto-switch to laser if empty
        player.weapon = 'laser';
        if (player.cooldown <= 0) {
          fireBullet(player, 'laser', player.angle);
          player.cooldown = WEAPONS.laser.cooldown;
        }
      }
    }

    // Shield regen
    if (player.shieldRegenDelay > 0) {
      player.shieldRegenDelay -= dt;
    } else if (player.shield < player.maxShield) {
      player.shield = Math.min(player.maxShield, player.shield + player.shieldRegen * dt);
    }

    // Invincibility
    if (player.invincible > 0) player.invincible -= dt;

    // Engine particles
    if (player.thrusting && Math.random() < 0.4) {
      const angle = Math.atan2(player.vy, player.vx) + Math.PI;
      spawnParticles(
        player.x - Math.cos(player.angle) * 10,
        player.y - Math.sin(player.angle) * 10,
        1, {
          angle: angle, spread: 0.5, minSpeed: 0.5, maxSpeed: 1.5,
          minLife: 0.15, maxLife: 0.4, minSize: 1, maxSize: 2.5,
          color: player.boosting ? '#00ccff' : '#0088cc',
        }
      );
    }
  }

  // ═══════════════════════════════════════════
  //  CAMERA
  // ═══════════════════════════════════════════
  function updateCamera(dt) {
    // Smooth follow with look-ahead
    const lookAhead = 60;
    const tx = player.x + player.vx * 8 + Math.cos(player.angle) * lookAhead * 0.3;
    const ty = player.y + player.vy * 8 + Math.sin(player.angle) * lookAhead * 0.3;
    camera.x = lerp(camera.x, tx, 1 - Math.pow(0.01, dt));
    camera.y = lerp(camera.y, ty, 1 - Math.pow(0.01, dt));
  }

  // ═══════════════════════════════════════════
  //  RENDERING
  // ═══════════════════════════════════════════
  function drawStars(cam) {
    for (const s of stars) {
      // Parallax
      const sx = ((s.x - cam.x * s.z * 0.3) % (W + 100) + W + 100) % (W + 100) - 50;
      const sy = ((s.y - cam.y * s.z * 0.3) % (H + 100) + H + 100) % (H + 100) - 50;
      const twinkle = 0.6 + 0.4 * Math.sin(s.twinkle + game.elapsed * s.twinkleSpeed);
      ctx.globalAlpha = s.brightness * twinkle * 0.8;
      ctx.fillStyle = '#aaddff';
      ctx.beginPath();
      ctx.arc(sx, sy, s.size * s.z * 0.6, 0, TAU);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function drawNebula(cam) {
    // Soft ambient nebula blobs (static world-space)
    const blobs = [
      { x: 400, y: -300, r: 350, c: 'rgba(20,0,60,0.15)' },
      { x: -600, y: 500, r: 400, c: 'rgba(0,30,60,0.12)' },
      { x: 200, y: 700, r: 300, c: 'rgba(40,0,40,0.1)' },
      { x: -400, y: -600, r: 380, c: 'rgba(0,40,50,0.1)' },
      { x: 800, y: 200, r: 250, c: 'rgba(30,10,0,0.08)' },
    ];
    for (const b of blobs) {
      const sx = b.x - cam.x * 0.15 + CX;
      const sy = b.y - cam.y * 0.15 + CY;
      if (sx < -b.r || sx > W + b.r || sy < -b.r || sy > H + b.r) continue;
      const grad = ctx.createRadialGradient(sx, sy, 0, sx, sy, b.r);
      grad.addColorStop(0, b.c);
      grad.addColorStop(1, 'transparent');
      ctx.fillStyle = grad;
      ctx.fillRect(sx - b.r, sy - b.r, b.r * 2, b.r * 2);
    }
  }

  function drawShip(ent, cam) {
    const sx = ent.x - cam.x + CX;
    const sy = ent.y - cam.y + CY;
    if (sx < -50 || sx > W + 50 || sy < -50 || sy > H + 50) return;

    ctx.save();
    ctx.translate(sx, sy);
    ctx.rotate(ent.angle);

    // Invincibility flash
    if (ent.invincible > 0 && Math.floor(ent.invincible * 10) % 2 === 0) {
      ctx.globalAlpha = 0.4;
    }

    if (ent === player) {
      drawPlayerShip(ctx, ent);
    } else if (ent.draw) {
      ent.draw(ctx, ent);
    }

    ctx.restore();

    // Health bar for enemies
    if (ent !== player && !ent.dead && ent.health < ent.maxHealth) {
      const bw = ent.radius * 2;
      const bh = 3;
      const px = sx - bw / 2;
      const py = sy - ent.radius - 12;
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(px, py, bw, bh);
      const pct = ent.health / ent.maxHealth;
      ctx.fillStyle = pct > 0.5 ? '#44ff88' : pct > 0.25 ? '#ffaa00' : '#ff3344';
      ctx.fillRect(px, py, bw * pct, bh);
    }
  }

  function drawCrosshair() {
    const x = mouseX, y = mouseY;
    ctx.strokeStyle = 'rgba(0, 229, 255, 0.6)';
    ctx.lineWidth = 1.5;
    const s = 12;
    ctx.beginPath();
    // Four corner brackets
    ctx.moveTo(x - s, y - s + 4); ctx.lineTo(x - s, y - s); ctx.lineTo(x - s + 4, y - s);
    ctx.moveTo(x + s, y - s + 4); ctx.lineTo(x + s, y - s); ctx.lineTo(x + s - 4, y - s);
    ctx.moveTo(x - s, y + s - 4); ctx.lineTo(x - s, y + s); ctx.lineTo(x - s + 4, y + s);
    ctx.moveTo(x + s, y + s - 4); ctx.lineTo(x + s, y + s); ctx.lineTo(x + s - 4, y + s);
    ctx.stroke();
    // Center dot
    ctx.fillStyle = 'rgba(0, 229, 255, 0.8)';
    ctx.beginPath();
    ctx.arc(x, y, 1.5, 0, TAU);
    ctx.fill();
  }

  function drawRadar() {
    const rw = 120, rh = 120;
    rctx.clearRect(0, 0, rw, rh);

    // Background
    rctx.fillStyle = 'rgba(0,15,30,0.5)';
    rctx.beginPath();
    rctx.arc(60, 60, 58, 0, TAU);
    rctx.fill();

    // Grid rings
    rctx.strokeStyle = 'rgba(0,200,255,0.12)';
    rctx.lineWidth = 0.5;
    for (let r = 15; r < 60; r += 15) {
      rctx.beginPath();
      rctx.arc(60, 60, r, 0, TAU);
      rctx.stroke();
    }
    // Cross
    rctx.beginPath();
    rctx.moveTo(60, 2); rctx.lineTo(60, 118);
    rctx.moveTo(2, 60); rctx.lineTo(118, 60);
    rctx.stroke();

    // Sweep line
    const sweepAngle = game.elapsed * 1.5;
    rctx.strokeStyle = 'rgba(0,229,255,0.15)';
    rctx.beginPath();
    rctx.moveTo(60, 60);
    rctx.lineTo(60 + Math.cos(sweepAngle) * 58, 60 + Math.sin(sweepAngle) * 58);
    rctx.stroke();

    const scale = 0.06; // world units to radar
    const maxR = 55;

    // Asteroids
    rctx.fillStyle = 'rgba(180,160,120,0.5)';
    for (const a of asteroids) {
      const dx = (a.x - player.x) * scale;
      const dy = (a.y - player.y) * scale;
      if (Math.hypot(dx, dy) < maxR) {
        rctx.beginPath();
        rctx.arc(60 + dx, 60 + dy, Math.max(1, a.radius * scale * 0.5), 0, TAU);
        rctx.fill();
      }
    }

    // Enemies
    for (const e of enemies) {
      if (e.dead) continue;
      const dx = (e.x - player.x) * scale;
      const dy = (e.y - player.y) * scale;
      if (Math.hypot(dx, dy) < maxR) {
        rctx.fillStyle = e.color;
        rctx.shadowColor = e.color;
        rctx.shadowBlur = 4;
        rctx.beginPath();
        rctx.arc(60 + dx, 60 + dy, 2.5, 0, TAU);
        rctx.fill();
        rctx.shadowBlur = 0;
      }
    }

    // Powerups
    rctx.fillStyle = '#ffcc00';
    for (const p of powerups) {
      const dx = (p.x - player.x) * scale;
      const dy = (p.y - player.y) * scale;
      if (Math.hypot(dx, dy) < maxR) {
        rctx.beginPath();
        rctx.arc(60 + dx, 60 + dy, 1.5, 0, TAU);
        rctx.fill();
      }
    }

    // Player (center)
    rctx.fillStyle = '#00e5ff';
    rctx.shadowColor = '#00e5ff';
    rctx.shadowBlur = 6;
    rctx.beginPath();
    rctx.arc(60, 60, 2.5, 0, TAU);
    rctx.fill();
    // Direction indicator
    rctx.strokeStyle = '#00e5ff';
    rctx.lineWidth = 1;
    rctx.beginPath();
    rctx.moveTo(60, 60);
    rctx.lineTo(60 + Math.cos(player.angle) * 8, 60 + Math.sin(player.angle) * 8);
    rctx.stroke();
    rctx.shadowBlur = 0;

    // Border
    rctx.strokeStyle = 'rgba(0,200,255,0.3)';
    rctx.lineWidth = 1;
    rctx.beginPath();
    rctx.arc(60, 60, 58, 0, TAU);
    rctx.stroke();
  }

  function updateHUD() {
    document.getElementById('scoreVal').textContent = game.score.toLocaleString();
    document.getElementById('waveVal').textContent = game.wave;
    document.getElementById('killsVal').textContent = game.kills;

    const hpPct = (player.health / player.maxHealth) * 100;
    const healthFill = document.getElementById('healthFill');
    healthFill.style.width = hpPct + '%';
    if (hpPct < 30) healthFill.classList.add('critical');
    else healthFill.classList.remove('critical');

    document.getElementById('shieldFill').style.width = (player.shield / player.maxShield) * 100 + '%';

    const w = WEAPONS[player.weapon];
    document.getElementById('weaponName').textContent = w.name;
    if (w.ammo === Infinity) {
      document.getElementById('weaponAmmo').textContent = '∞ READY';
    } else {
      document.getElementById('weaponAmmo').textContent = `${w.ammo} / ${w.maxAmmo}`;
    }
  }

  // ═══════════════════════════════════════════
  //  MAIN LOOP
  // ═══════════════════════════════════════════
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05);
    lastTime = now;

    // Clear
    ctx.fillStyle = '#030810';
    ctx.fillRect(0, 0, W, H);

    if (game.state === 'title') {
      // Animated title background
      game.elapsed += dt;
      drawStars({ x: Math.sin(game.elapsed * 0.1) * 100, y: Math.cos(game.elapsed * 0.08) * 80 });
      drawNebula({ x: 0, y: 0 });
      // Floating asteroids for ambiance
      if (asteroids.length === 0) spawnAsteroidField(0, 0, 8, 20, 50, 600);
      for (const a of asteroids) {
        a.x += a.vx * 0.3;
        a.y += a.vy * 0.3;
        a.rotation += a.rotSpeed;
      }
      drawAsteroids({ x: Math.sin(game.elapsed * 0.05) * 50, y: 0 });
      requestAnimationFrame(gameLoop);
      return;
    }

    if (game.state === 'playing' || game.state === 'gameover') {
      game.elapsed += dt;

      if (game.state === 'playing') {
        updatePlayer(dt);
        for (const e of enemies) updateEnemyAI(e, dt);
        updateAsteroids(dt);
        updateBullets(dt);
        updateParticles(dt);
        updatePowerups(dt);
        handleCollisions();
        updateCamera(dt);

        // Remove dead enemies
        for (let i = enemies.length - 1; i >= 0; i--) {
          if (enemies[i].dead) {
            // Already exploded on death
            enemies.splice(i, 1);
          }
        }

        // Wave management
        const livingEnemies = enemies.filter(e => !e.dead).length;
        if (livingEnemies === 0 && !game.waveClearing) {
          game.waveClearing = true;
          game.waveTimer = 3; // 3 second delay
          // Bonus score
          game.score += game.wave * 100;
        }
        if (game.waveClearing) {
          game.waveTimer -= dt;
          if (game.waveTimer <= 0) nextWave();
        }

        // Player death
        if (player.dead) {
          gameOver();
        }

        updateHUD();
        drawRadar();
      } else {
        // Still update particles and such for death animation
        updateParticles(dt);
        updateBullets(dt);
        updateAsteroids(dt);
      }

      // Draw world
      drawStars(camera);
      drawNebula(camera);
      drawAsteroids(camera);
      drawPowerups(camera);
      drawParticles(camera);
      drawBullets(camera);

      // Draw enemies
      for (const e of enemies) {
        if (!e.dead) drawShip(e, camera);
      }

      // Draw player
      if (!player.dead) {
        drawShip(player, camera);
      } else {
        // Death wreckage particles continue
      }

      // Crosshair (only when playing)
      if (game.state === 'playing') {
        drawCrosshair();
      }

      // Soft vignette
      const vig = ctx.createRadialGradient(CX, CY, H * 0.3, CX, CY, H * 0.75);
      vig.addColorStop(0, 'transparent');
      vig.addColorStop(1, 'rgba(0,0,5,0.4)');
      ctx.fillStyle = vig;
      ctx.fillRect(0, 0, W, H);
    }

    requestAnimationFrame(gameLoop);
  }

  // ═══════════════════════════════════════════
  //  EVENT BINDINGS
  // ═══════════════════════════════════════════
  document.getElementById('startBtn').addEventListener('click', () => {
    ensureAudio();
    startGame();
  });
  document.getElementById('restartBtn').addEventListener('click', () => {
    ensureAudio();
    startGame();
  });

  // Start loop
  requestAnimationFrame(gameLoop);
})();
</script>
</body>
