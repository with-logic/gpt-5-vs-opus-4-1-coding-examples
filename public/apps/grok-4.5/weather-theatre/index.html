<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Theatre</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.26.5/babel.min.js" crossorigin="anonymous"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --stage-bg: #0a0a12;
      --gold: #d4a853;
      --gold-dim: #8a6d35;
      --velvet: #2a1520;
      --cream: #f5e6c8;
      --muted: #9a8f7a;
      --panel: rgba(18, 14, 22, 0.92);
      --border: rgba(212, 168, 83, 0.25);
      --glow: rgba(212, 168, 83, 0.4);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body, #root {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #050508;
      color: var(--cream);
      font-family: 'Inter', system-ui, sans-serif;
    }

    body {
      background:
        radial-gradient(ellipse 120% 80% at 50% -20%, #1a1220 0%, transparent 50%),
        radial-gradient(ellipse 60% 40% at 50% 100%, #1a0a10 0%, transparent 40%),
        #050508;
    }

    .app {
      display: grid;
      grid-template-columns: 1fr 320px;
      grid-template-rows: auto 1fr auto;
      height: 100%;
      max-width: 1400px;
      margin: 0 auto;
      gap: 0;
      padding: 16px 20px 20px;
    }

    /* ── Header ── */
    header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 4px 16px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-mark {
      width: 42px;
      height: 42px;
      border: 1.5px solid var(--gold);
      border-radius: 50%;
      display: grid;
      place-items: center;
      position: relative;
      box-shadow: 0 0 20px var(--glow);
    }

    .logo-mark::before {
      content: '◈';
      font-size: 18px;
      color: var(--gold);
    }

    .logo h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.45rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--cream);
    }

    .logo h1 span {
      color: var(--gold);
      font-style: italic;
      font-weight: 400;
    }

    .logo .tagline {
      font-size: 0.7rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 2px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .showtime {
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      color: var(--gold-dim);
      letter-spacing: 0.08em;
    }

    /* ── Mode toggle ── */
    .mode-toggle {
      display: flex;
      background: rgba(0,0,0,0.45);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 3px;
      position: relative;
    }

    .mode-toggle button {
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 7px 16px;
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      z-index: 1;
    }

    .mode-toggle button.active {
      color: #0a0a12;
      background: var(--gold);
      box-shadow: 0 0 16px var(--glow);
    }

    /* ── Stage ── */
    .stage-wrap {
      position: relative;
      border-radius: 4px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px var(--border),
        0 0 40px rgba(0,0,0,0.6),
        inset 0 0 80px rgba(0,0,0,0.3);
      background: #0a0a12;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .proscenium {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 20;
      border: 10px solid transparent;
      border-image: linear-gradient(180deg, #3a2818 0%, #1a1008 40%, #2a1810 100%) 1;
      box-shadow:
        inset 0 30px 40px -20px rgba(0,0,0,0.8),
        inset 0 -20px 30px -15px rgba(0,0,0,0.6);
    }

    .proscenium::before,
    .proscenium::after {
      content: '';
      position: absolute;
      top: -2px;
      width: 28px;
      height: calc(100% + 4px);
      background: linear-gradient(90deg, #2a1810, #1a1008);
      z-index: 21;
    }
    .proscenium::before { left: -2px; }
    .proscenium::after { right: -2px; background: linear-gradient(-90deg, #2a1810, #1a1008); }

    .stage-canvas {
      display: block;
      width: 100%;
      height: 100%;
      flex: 1;
      min-height: 280px;
    }

    .curtain {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 51%;
      z-index: 25;
      pointer-events: none;
      transition: transform 1.8s cubic-bezier(0.45, 0.05, 0.25, 1);
      background:
        repeating-linear-gradient(
          90deg,
          #4a1525 0px,
          #5c1a30 4px,
          #3d1020 8px,
          #6a2040 10px,
          #4a1525 14px
        );
      box-shadow: inset 0 0 60px rgba(0,0,0,0.5);
    }

    .curtain.left {
      left: 0;
      transform-origin: left center;
      border-right: 2px solid #2a0a12;
    }
    .curtain.right {
      right: 0;
      transform-origin: right center;
      border-left: 2px solid #2a0a12;
    }
    .curtain.open.left { transform: translateX(-96%); }
    .curtain.open.right { transform: translateX(96%); }

    .curtain-top {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 48px;
      z-index: 26;
      background:
        radial-gradient(ellipse 40% 100% at 50% 0%, #7a2840 0%, transparent 70%),
        linear-gradient(180deg, #5c1a30 0%, #3d1020 70%, transparent 100%);
      pointer-events: none;
      transition: opacity 1.5s ease 0.3s;
    }
    .curtain-top.open { opacity: 0.35; }

    .valance {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 36px;
      z-index: 27;
      display: flex;
      justify-content: space-around;
      pointer-events: none;
      overflow: hidden;
    }
    .valance span {
      display: block;
      width: 40px;
      height: 50px;
      background: radial-gradient(ellipse at 50% 0%, #6a2040 30%, #3d1020 100%);
      border-radius: 0 0 50% 50%;
      margin: 0 -6px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.4);
      transition: transform 1.6s cubic-bezier(0.45, 0.05, 0.25, 1);
    }
    .valance.open span { transform: translateY(-70%); }

    .subtitle-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 18;
      padding: 28px 32px 22px;
      background: linear-gradient(0deg, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.4) 60%, transparent 100%);
      pointer-events: none;
    }

    .subtitle-text {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      font-style: italic;
      color: var(--cream);
      text-shadow: 0 2px 12px rgba(0,0,0,0.8);
      min-height: 1.6em;
      letter-spacing: 0.02em;
      line-height: 1.5;
    }

    .subtitle-text .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--gold);
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 0.9s step-end infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    .scene-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 8px;
      opacity: 0.9;
    }

    .scene-badge::before {
      content: '';
      width: 18px;
      height: 1px;
      background: var(--gold);
    }

    /* ── Control Panel ── */
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      margin-left: 16px;
      padding: 20px 18px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      overflow-y: auto;
      min-height: 0;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .panel-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      color: var(--gold);
      letter-spacing: 0.04em;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    .panel-section { display: flex; flex-direction: column; gap: 10px; }

    .section-label {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 500;
    }

    /* Forecast card */
    .forecast-card {
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(212,168,83,0.15);
      border-radius: 6px;
      padding: 14px;
    }

    .forecast-city {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      margin-bottom: 2px;
    }

    .forecast-meta {
      font-size: 0.72rem;
      color: var(--muted);
      margin-bottom: 12px;
      letter-spacing: 0.04em;
    }

    .forecast-main {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 12px;
    }

    .forecast-temp {
      font-family: 'Space Mono', monospace;
      font-size: 2.4rem;
      font-weight: 700;
      color: var(--cream);
      line-height: 1;
    }

    .forecast-temp span {
      font-size: 1rem;
      color: var(--gold-dim);
      vertical-align: super;
    }

    .forecast-cond {
      font-size: 0.85rem;
      color: var(--gold);
      font-weight: 500;
    }

    .forecast-detail {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .forecast-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .stat {
      background: rgba(255,255,255,0.03);
      border-radius: 4px;
      padding: 8px 10px;
    }

    .stat-label {
      font-size: 0.6rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2px;
    }

    .stat-value {
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      color: var(--cream);
    }

    /* Mood sliders */
    .mood-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .mood-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .mood-name {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--cream);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .mood-icon {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 11px;
      border: 1px solid;
    }

    .mood-icon.cosy { border-color: #e8a060; background: rgba(232,160,96,0.15); color: #e8a060; }
    .mood-icon.eerie { border-color: #7eb8a0; background: rgba(126,184,160,0.12); color: #7eb8a0; }
    .mood-icon.heroic { border-color: #c070e0; background: rgba(192,112,224,0.12); color: #c070e0; }

    .mood-val {
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      color: var(--gold-dim);
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: rgba(255,255,255,0.08);
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--gold);
      border: 2px solid #1a1208;
      box-shadow: 0 0 10px var(--glow);
      cursor: grab;
      transition: transform 0.15s ease;
    }
    input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.15); }
    input[type="range"]::-webkit-slider-thumb:active { cursor: grabbing; }

    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--gold);
      border: 2px solid #1a1208;
      box-shadow: 0 0 10px var(--glow);
      cursor: grab;
    }

    input[type="range"].cosy { background: linear-gradient(90deg, rgba(232,160,96,0.15), rgba(232,160,96,0.5)); }
    input[type="range"].eerie { background: linear-gradient(90deg, rgba(126,184,160,0.1), rgba(126,184,160,0.45)); }
    input[type="range"].heroic { background: linear-gradient(90deg, rgba(192,112,224,0.1), rgba(192,112,224,0.45)); }

    /* Mood blend meter */
    .blend-meter {
      display: flex;
      height: 8px;
      border-radius: 4px;
      overflow: hidden;
      background: rgba(0,0,0,0.4);
      margin-top: 4px;
    }
    .blend-seg { transition: flex 0.4s ease; min-width: 2px; }
    .blend-seg.cosy { background: linear-gradient(90deg, #c87840, #e8a060); }
    .blend-seg.eerie { background: linear-gradient(90deg, #4a8870, #7eb8a0); }
    .blend-seg.heroic { background: linear-gradient(90deg, #8040a0, #c070e0); }

    /* Scene description */
    .scene-card {
      background: rgba(0,0,0,0.3);
      border-left: 2px solid var(--gold-dim);
      padding: 12px 14px;
      border-radius: 0 4px 4px 0;
    }

    .scene-card h3 {
      font-family: 'Playfair Display', serif;
      font-size: 0.95rem;
      color: var(--gold);
      margin-bottom: 6px;
      font-style: italic;
    }

    .scene-card p {
      font-size: 0.78rem;
      line-height: 1.55;
      color: var(--muted);
    }

    /* Action buttons */
    .actions {
      display: flex;
      gap: 8px;
      margin-top: auto;
      padding-top: 8px;
    }

    .btn {
      flex: 1;
      border: 1px solid var(--border);
      background: rgba(212,168,83,0.08);
      color: var(--gold);
      font-family: 'Inter', sans-serif;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 10px 8px;
      border-radius: 3px;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .btn:hover {
      background: rgba(212,168,83,0.2);
      box-shadow: 0 0 16px rgba(212,168,83,0.2);
    }

    .btn.primary {
      background: var(--gold);
      color: #0a0a12;
      border-color: var(--gold);
      font-weight: 600;
    }
    .btn.primary:hover {
      background: #e0b860;
      box-shadow: 0 0 20px var(--glow);
    }

    /* Footer */
    footer {
      grid-column: 1 / -1;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 12px;
      margin-top: 12px;
      border-top: 1px solid rgba(212,168,83,0.12);
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    footer .lights {
      display: flex;
      gap: 6px;
    }
    footer .lights i {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--gold-dim);
      opacity: 0.5;
      animation: lightPulse 2.4s ease-in-out infinite;
    }
    footer .lights i:nth-child(2) { animation-delay: 0.4s; }
    footer .lights i:nth-child(3) { animation-delay: 0.8s; }
    footer .lights i:nth-child(4) { animation-delay: 1.2s; }
    footer .lights i:nth-child(5) { animation-delay: 1.6s; }

    @keyframes lightPulse {
      0%, 100% { opacity: 0.3; box-shadow: none; }
      50% { opacity: 1; box-shadow: 0 0 8px var(--gold); background: var(--gold); }
    }

    /* Responsive */
    @media (max-width: 900px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr auto auto;
        padding: 10px;
        overflow-y: auto;
        height: auto;
        min-height: 100%;
      }
      html, body, #root { overflow: auto; height: auto; min-height: 100%; }
      .stage-wrap { min-height: 320px; height: 45vh; }
      .panel { margin-left: 0; margin-top: 12px; max-height: none; }
      header { flex-wrap: wrap; gap: 10px; }
      .logo h1 { font-size: 1.2rem; }
    }

    /* Entrance */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .panel { animation: fadeUp 0.6s ease 0.2s both; }
    header { animation: fadeUp 0.5s ease both; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo, useCallback } = React;

    // ── Mock forecast data ──────────────────────────────────────────
    const FORECAST = {
      city: 'Harborough',
      region: 'North Coastal District',
      date: 'Thursday, July 8',
      temp: 14,
      condition: 'Partly Cloudy',
      conditionKey: 'partly',
      high: 17,
      low: 9,
      humidity: 72,
      wind: 18,
      windDir: 'NW',
      pressure: 1012,
      visibility: 8,
      precip: 30,
      sunrise: '05:42',
      sunset: '21:18',
    };

    // ── Scene content by dominant mood ──────────────────────────────
    const SCENES = {
      cosy: {
        title: 'Hearthlight Overture',
        subtitles: [
          'Soft rain drums the stained glass of the conservatory…',
          'Steam curls from porcelain cups; the kettle sings its quiet aria.',
          'Amber lamps bloom against the fog-pressed windows.',
          'A wool-shawl wind humming through the boardwalk eaves…',
          'Somewhere, bread rises. The day keeps its gentle promises.',
        ],
        palette: {
          skyTop: [45, 35, 55],
          skyBot: [180, 120, 90],
          sun: [255, 190, 120],
          cloud: [220, 180, 150],
          ground: [60, 40, 35],
          accent: [255, 160, 80],
          fog: [200, 160, 130],
          water: [80, 70, 90],
        },
        particles: 'embers',
        lighting: 'warm',
      },
      eerie: {
        title: 'Fogbound Nocturne',
        subtitles: [
          'The lamp posts wear ruffs of sea-mist; nothing moves that should.',
          'A weather-vane turns without wind—once, twice, thrice.',
          'Something pale is listening between the breakers.',
          'The forecast says rain. The town says otherwise.',
          'Low pressure. Lower voices. Do not walk the pier alone.',
        ],
        palette: {
          skyTop: [10, 20, 28],
          skyBot: [30, 50, 55],
          sun: [140, 180, 170],
          cloud: [60, 80, 85],
          ground: [25, 35, 38],
          accent: [100, 200, 170],
          fog: [70, 100, 105],
          water: [20, 40, 50],
        },
        particles: 'mist',
        lighting: 'cool',
      },
      heroic: {
        title: 'Stormcrest Symphony',
        subtitles: [
          'Thunder writes its signature across a cathedral of cloud.',
          'Wind lifts every banner; the harbour holds its breath—then roars.',
          'Lightning frames the lighthouse like a haloed sentinel.',
          'Fourteen degrees, and every degree a challenge accepted.',
          'The weather is not against us. It is the stage. Ascend.',
        ],
        palette: {
          skyTop: [25, 15, 50],
          skyBot: [90, 50, 120],
          sun: [255, 220, 100],
          cloud: [90, 70, 140],
          ground: [40, 30, 55],
          accent: [200, 120, 255],
          fog: [80, 50, 120],
          water: [40, 30, 80],
        },
        particles: 'sparks',
        lighting: 'dramatic',
      },
    };

    const BLEND_SUBTITLES = [
      'Three acts in one sky—the theatre refuses a single mood.',
      'Cosiness, eeriness, and heroism share the same barometer.',
      'The forecast bends to the conductor\'s baton—yours.',
      'A remixed tempest: warm light, cold fog, electric purpose.',
    ];

    // ── Utility ─────────────────────────────────────────────────────
    function lerp(a, b, t) { return a + (b - a) * t; }
    function lerpColor(c1, c2, t) {
      return [
        Math.round(lerp(c1[0], c2[0], t)),
        Math.round(lerp(c1[1], c2[1], t)),
        Math.round(lerp(c1[2], c2[2], t)),
      ];
    }
    function rgb(c, a = 1) {
      return a < 1 ? `rgba(${c[0]},${c[1]},${c[2]},${a})` : `rgb(${c[0]},${c[1]},${c[2]})`;
    }
    function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

    function blendPalettes(cosy, eerie, heroic) {
      const total = cosy + eerie + heroic || 1;
      const wc = cosy / total, we = eerie / total, wh = heroic / total;
      const keys = Object.keys(SCENES.cosy.palette);
      const out = {};
      for (const k of keys) {
        const a = SCENES.cosy.palette[k];
        const b = SCENES.eerie.palette[k];
        const c = SCENES.heroic.palette[k];
        out[k] = [
          Math.round(a[0]*wc + b[0]*we + c[0]*wh),
          Math.round(a[1]*wc + b[1]*we + c[1]*wh),
          Math.round(a[2]*wc + b[2]*we + c[2]*wh),
        ];
      }
      return out;
    }

    function dominantMood(cosy, eerie, heroic) {
      if (cosy >= eerie && cosy >= heroic) return 'cosy';
      if (eerie >= cosy && eerie >= heroic) return 'eerie';
      return 'heroic';
    }

    // ── Canvas Stage Engine ─────────────────────────────────────────
    function StageCanvas({ cosy, eerie, heroic, night, open }) {
      const canvasRef = useRef(null);
      const propsRef = useRef({ cosy, eerie, heroic, night, open });
      propsRef.current = { cosy, eerie, heroic, night, open };
      const stateRef = useRef({
        t: 0,
        stars: [],
        clouds: [],
        particles: [],
        birds: [],
        waves: [],
        lightning: 0,
        spotlightA: 0,
        spotlightB: Math.PI,
        buildings: [],
        mouse: { x: 0.5, y: 0.5 },
        lastW: 0,
        lastH: 0,
      });

      // Init generative scenery once dimensions known
      const initScene = useCallback((w, h) => {
        const s = stateRef.current;
        if (s.lastW === w && s.lastH === h && s.buildings.length) return;
        s.lastW = w; s.lastH = h;

        // Stars
        s.stars = Array.from({ length: 120 }, () => ({
          x: Math.random() * w,
          y: Math.random() * h * 0.55,
          r: Math.random() * 1.4 + 0.3,
          tw: Math.random() * Math.PI * 2,
          sp: 0.5 + Math.random() * 2,
        }));

        // Clouds (multiple layers)
        s.clouds = Array.from({ length: 14 }, (_, i) => ({
          x: Math.random() * w * 1.4 - w * 0.2,
          y: h * (0.08 + Math.random() * 0.38),
          w: 80 + Math.random() * 160,
          h: 24 + Math.random() * 40,
          speed: 0.08 + Math.random() * 0.25 + (i % 3) * 0.05,
          layer: i % 3,
          fluff: 3 + Math.floor(Math.random() * 4),
        }));

        // Buildings skyline (parallax midground)
        let bx = -20;
        s.buildings = [];
        while (bx < w + 40) {
          const bw = 28 + Math.random() * 55;
          const bh = 40 + Math.random() * h * 0.28;
          s.buildings.push({
            x: bx, w: bw, h: bh,
            windows: Array.from({ length: Math.floor(bh / 18) * Math.floor(bw / 14) }, () => Math.random() > 0.45),
            tower: Math.random() > 0.82,
          });
          bx += bw + 4 + Math.random() * 12;
        }

        // Particles pool
        s.particles = Array.from({ length: 80 }, () => ({
          x: Math.random() * w,
          y: Math.random() * h,
          vx: (Math.random() - 0.5) * 0.6,
          vy: -0.2 - Math.random() * 0.8,
          r: 1 + Math.random() * 2.5,
          life: Math.random(),
          phase: Math.random() * Math.PI * 2,
        }));

        // Birds
        s.birds = Array.from({ length: 6 }, () => ({
          x: Math.random() * w,
          y: h * (0.15 + Math.random() * 0.25),
          speed: 0.4 + Math.random() * 0.8,
          wing: Math.random() * Math.PI * 2,
          amp: 4 + Math.random() * 6,
        }));

        // Wave points
        s.waves = Array.from({ length: 3 }, (_, i) => ({
          amp: 6 + i * 4,
          freq: 0.008 + i * 0.003,
          speed: 0.6 + i * 0.3,
          yOff: i * 10,
          phase: i * 1.2,
        }));
      }, []);

      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        let raf;
        let running = true;

        const resize = () => {
          const parent = canvas.parentElement;
          const dpr = Math.min(window.devicePixelRatio || 1, 2);
          const w = parent.clientWidth;
          const h = parent.clientHeight;
          canvas.width = w * dpr;
          canvas.height = h * dpr;
          canvas.style.width = w + 'px';
          canvas.style.height = h + 'px';
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          initScene(w, h);
        };

        resize();
        window.addEventListener('resize', resize);

        const onMove = (e) => {
          const rect = canvas.getBoundingClientRect();
          stateRef.current.mouse.x = (e.clientX - rect.left) / rect.width;
          stateRef.current.mouse.y = (e.clientY - rect.top) / rect.height;
        };
        canvas.addEventListener('pointermove', onMove);

        const frame = () => {
          if (!running) return;
          const w = canvas.clientWidth;
          const h = canvas.clientHeight;
          if (w < 10 || h < 10) { raf = requestAnimationFrame(frame); return; }

          const s = stateRef.current;
          s.t += 0.016;
          const t = s.t;
          const { cosy, eerie, heroic, night, open } = propsRef.current;

          // Mood weights
          const total = cosy + eerie + heroic || 1;
          const wc = cosy / total, we = eerie / total, wh = heroic / total;
          const pal = blendPalettes(cosy, eerie, heroic);
          const nightMul = night ? 1 : 0;

          // Night palette adjust
          let skyTop = pal.skyTop.slice();
          let skyBot = pal.skyBot.slice();
          if (night) {
            skyTop = lerpColor(skyTop, [8, 10, 28], 0.7);
            skyBot = lerpColor(skyBot, [20, 25, 50], 0.55);
          } else {
            skyTop = lerpColor(skyTop, [120, 160, 200], 0.25 * (1 - nightMul));
            skyBot = lerpColor(skyBot, [200, 180, 150], 0.2);
          }

          // ── Sky ──
          const grad = ctx.createLinearGradient(0, 0, 0, h);
          grad.addColorStop(0, rgb(skyTop));
          grad.addColorStop(0.55, rgb(lerpColor(skyTop, skyBot, 0.5)));
          grad.addColorStop(1, rgb(skyBot));
          ctx.fillStyle = grad;
          ctx.fillRect(0, 0, w, h);

          // Horizon glow
          const hg = ctx.createRadialGradient(w * 0.5, h * 0.55, 0, w * 0.5, h * 0.55, w * 0.55);
          hg.addColorStop(0, rgb(pal.sun, night ? 0.12 : 0.28));
          hg.addColorStop(1, 'rgba(0,0,0,0)');
          ctx.fillStyle = hg;
          ctx.fillRect(0, 0, w, h);

          // Stars (night / eerie)
          if (night || we > 0.3) {
            const starAlpha = night ? 0.9 : we * 0.5;
            for (const st of s.stars) {
              const tw = 0.4 + 0.6 * Math.sin(t * st.sp + st.tw);
              ctx.beginPath();
              ctx.fillStyle = `rgba(220,230,255,${starAlpha * tw})`;
              ctx.arc(st.x, st.y, st.r, 0, Math.PI * 2);
              ctx.fill();
            }
          }

          // Moon / Sun
          const orbX = w * (0.72 + 0.04 * Math.sin(t * 0.1));
          const orbY = h * (night ? 0.18 : 0.22);
          const orbR = night ? 28 : 36;
          const orbCol = night
            ? lerpColor([200, 210, 230], pal.sun, we * 0.3)
            : pal.sun;

          // Glow
          const og = ctx.createRadialGradient(orbX, orbY, 0, orbX, orbY, orbR * 4);
          og.addColorStop(0, rgb(orbCol, night ? 0.25 : 0.45));
          og.addColorStop(0.4, rgb(orbCol, 0.08));
          og.addColorStop(1, 'rgba(0,0,0,0)');
          ctx.fillStyle = og;
          ctx.beginPath();
          ctx.arc(orbX, orbY, orbR * 4, 0, Math.PI * 2);
          ctx.fill();

          ctx.beginPath();
          ctx.fillStyle = rgb(orbCol, night ? 0.95 : 1);
          ctx.arc(orbX, orbY, orbR, 0, Math.PI * 2);
          ctx.fill();

          // Moon crater hints
          if (night) {
            ctx.fillStyle = 'rgba(180,190,210,0.15)';
            ctx.beginPath(); ctx.arc(orbX - 8, orbY - 4, 6, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(orbX + 6, orbY + 8, 4, 0, Math.PI * 2); ctx.fill();
          }

          // Parallax factor from mouse
          const px = (s.mouse.x - 0.5) * 30;
          const py = (s.mouse.y - 0.5) * 12;

          // Clouds
          for (const c of s.clouds) {
            c.x += c.speed * (0.6 + wh * 0.8 + we * 0.3);
            if (c.x > w + c.w) c.x = -c.w - 40;

            const layerPar = (c.layer + 1) * 0.35;
            const cx = c.x + px * layerPar;
            const cy = c.y + py * layerPar * 0.5;
            const alpha = night ? 0.25 + we * 0.15 : 0.45 + 0.2 * (1 - c.layer * 0.2);
            const col = night ? lerpColor(pal.cloud, [40, 50, 70], 0.5) : pal.cloud;

            ctx.fillStyle = rgb(col, alpha * (0.55 + c.layer * 0.15));
            // Fluffy cloud as overlapping ellipses
            for (let i = 0; i < c.fluff; i++) {
              const fx = cx + (i / c.fluff) * c.w * 0.7;
              const fy = cy + Math.sin(i * 1.7 + t * 0.3) * 3;
              const fr = c.h * (0.5 + (i % 3) * 0.2);
              ctx.beginPath();
              ctx.ellipse(fx, fy, c.w / c.fluff * 1.1, fr, 0, 0, Math.PI * 2);
              ctx.fill();
            }
          }

          // Distant fog band
          const fogY = h * 0.48;
          const fg = ctx.createLinearGradient(0, fogY - 40, 0, fogY + 60);
          fg.addColorStop(0, 'rgba(0,0,0,0)');
          fg.addColorStop(0.4, rgb(pal.fog, night ? 0.15 : 0.2 + we * 0.25));
          fg.addColorStop(1, 'rgba(0,0,0,0)');
          ctx.fillStyle = fg;
          ctx.fillRect(0, fogY - 40, w, 120);

          // Lighthouse (heroic cue)
          if (wh > 0.15) {
            const lx = w * 0.18 + px * 0.6;
            const ly = h * 0.52;
            const lh = h * 0.28;
            // Shaft
            ctx.fillStyle = rgb(lerpColor([80, 70, 90], pal.accent, 0.3), 0.85);
            ctx.fillRect(lx - 8, ly - lh, 16, lh);
            // Top
            ctx.fillStyle = rgb(pal.accent, 0.9);
            ctx.beginPath();
            ctx.moveTo(lx - 14, ly - lh);
            ctx.lineTo(lx + 14, ly - lh);
            ctx.lineTo(lx + 10, ly - lh - 16);
            ctx.lineTo(lx - 10, ly - lh - 16);
            ctx.closePath();
            ctx.fill();
            // Beacon sweep
            const beamAngle = t * 0.7 + wh;
            const beamLen = h * 0.55 * wh;
            ctx.save();
            ctx.translate(lx, ly - lh - 8);
            ctx.rotate(Math.sin(beamAngle) * 0.9);
            const bg = ctx.createLinearGradient(0, 0, beamLen, 0);
            bg.addColorStop(0, rgb(pal.sun, 0.35 * wh));
            bg.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = bg;
            ctx.beginPath();
            ctx.moveTo(0, -3);
            ctx.lineTo(beamLen, -40);
            ctx.lineTo(beamLen, 40);
            ctx.lineTo(0, 3);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
            // Lamp glow
            ctx.beginPath();
            ctx.fillStyle = rgb(pal.sun, 0.6 * wh);
            ctx.arc(lx, ly - lh - 8, 6, 0, Math.PI * 2);
            ctx.fill();
          }

          // Buildings (parallax mid)
          const groundY = h * 0.62;
          for (const b of s.buildings) {
            const bx = b.x + px * 0.4;
            const by = groundY - b.h + py * 0.15;
            const bcol = lerpColor(pal.ground, skyTop, 0.15);
            ctx.fillStyle = rgb(bcol, night ? 0.75 : 0.65);
            ctx.fillRect(bx, by, b.w, b.h + 4);

            // Windows
            let wi = 0;
            for (let wy = by + 8; wy < by + b.h - 8; wy += 16) {
              for (let wx = bx + 5; wx < bx + b.w - 6; wx += 12) {
                const on = b.windows[wi++ % b.windows.length];
                if (!on) {
                  if (!night) {
                    ctx.fillStyle = 'rgba(40,35,50,0.22)';
                    ctx.fillRect(wx, wy, 5, 7);
                  }
                  continue;
                }
                // Soft deterministic flicker at night
                const flicker = !night || Math.sin(t * 1.4 + wx * 0.13 + wy * 0.07) > -0.55;
                if (night && flicker) {
                  ctx.fillStyle = rgb(pal.sun, 0.55 + 0.25 * Math.sin(t * 0.8 + wi));
                  ctx.fillRect(wx, wy, 5, 7);
                } else if (!night) {
                  ctx.fillStyle = 'rgba(40,35,50,0.28)';
                  ctx.fillRect(wx, wy, 5, 7);
                }
              }
            }
            if (b.tower) {
              ctx.fillStyle = rgb(bcol, 0.8);
              ctx.fillRect(bx + b.w * 0.35, by - 18, b.w * 0.15, 18);
            }
          }

          // Theatre house silhouette (right)
          ctx.fillStyle = rgb(lerpColor(pal.ground, [10, 8, 15], 0.5), 0.85);
          const thX = w * 0.55 + px * 0.25;
          ctx.beginPath();
          ctx.moveTo(thX, groundY);
          ctx.lineTo(thX, groundY - h * 0.22);
          ctx.lineTo(thX + 30, groundY - h * 0.32);
          ctx.lineTo(thX + 60, groundY - h * 0.22);
          ctx.lineTo(thX + w * 0.35, groundY - h * 0.2);
          ctx.lineTo(thX + w * 0.38, groundY);
          ctx.closePath();
          ctx.fill();
          // Marquee lights
          for (let i = 0; i < 10; i++) {
            const mx = thX + 8 + i * 14;
            const on = Math.sin(t * 3 + i) > 0;
            ctx.beginPath();
            ctx.fillStyle = on ? rgb(pal.sun, 0.85) : rgb(pal.sun, 0.15);
            ctx.arc(mx, groundY - h * 0.21, 2.5, 0, Math.PI * 2);
            ctx.fill();
          }

          // Pier / boardwalk
          ctx.strokeStyle = rgb(pal.ground, 0.5);
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(0, groundY + 2);
          ctx.lineTo(w, groundY + 2);
          ctx.stroke();
          for (let i = 0; i < w; i += 28) {
            ctx.beginPath();
            ctx.moveTo(i + px * 0.15, groundY);
            ctx.lineTo(i + px * 0.15, groundY + 18);
            ctx.stroke();
          }

          // Water / waves
          const waterTop = groundY + 8;
          const wg = ctx.createLinearGradient(0, waterTop, 0, h);
          wg.addColorStop(0, rgb(pal.water, night ? 0.7 : 0.55));
          wg.addColorStop(1, rgb(lerpColor(pal.water, skyTop, 0.3), 0.9));
          ctx.fillStyle = wg;
          ctx.fillRect(0, waterTop, w, h - waterTop);

          // Animated wave lines
          for (const wave of s.waves) {
            ctx.beginPath();
            ctx.strokeStyle = rgb(pal.accent, 0.12 + we * 0.1 + wh * 0.08);
            ctx.lineWidth = 1.5;
            for (let x = 0; x <= w; x += 4) {
              const y = waterTop + 12 + wave.yOff
                + Math.sin(x * wave.freq + t * wave.speed + wave.phase) * wave.amp
                + Math.sin(x * wave.freq * 2.3 + t * 1.1) * wave.amp * 0.3;
              if (x === 0) ctx.moveTo(x, y);
              else ctx.lineTo(x, y);
            }
            ctx.stroke();
          }

          // Sparkle on water
          for (let i = 0; i < 12; i++) {
            const sx = ((t * 30 + i * 97) % (w + 40)) - 20;
            const sy = waterTop + 20 + (i * 37 % (h - waterTop - 30));
            const sa = 0.2 + 0.3 * Math.sin(t * 4 + i);
            ctx.fillStyle = rgb(pal.sun, sa * (night ? 0.5 : 0.7));
            ctx.fillRect(sx, sy, 3, 1);
          }

          // Birds (day, cosy)
          if (!night && wc > 0.2) {
            for (const bird of s.birds) {
              bird.x += bird.speed;
              if (bird.x > w + 20) {
                bird.x = -20;
                bird.y = h * (0.12 + Math.random() * 0.3);
              }
              bird.wing += 0.25;
              const by = bird.y + Math.sin(bird.wing) * bird.amp * 0.3;
              ctx.strokeStyle = rgb([30, 25, 35], 0.5 * wc);
              ctx.lineWidth = 1.5;
              ctx.beginPath();
              const flap = Math.sin(bird.wing) * 6;
              ctx.moveTo(bird.x - 7, by + flap);
              ctx.quadraticCurveTo(bird.x, by - 2, bird.x + 7, by + flap);
              ctx.stroke();
            }
          }

          // Particles
          const pMode = wh > we && wh > wc ? 'sparks'
            : we > wc ? 'mist' : 'embers';

          for (const p of s.particles) {
            if (pMode === 'embers') {
              p.x += p.vx + Math.sin(t + p.phase) * 0.3;
              p.y += p.vy * (0.5 + wc);
              p.life -= 0.004;
              if (p.life <= 0 || p.y < 0) {
                p.x = Math.random() * w;
                p.y = h * (0.5 + Math.random() * 0.4);
                p.life = 1;
              }
              ctx.beginPath();
              ctx.fillStyle = rgb(pal.accent, p.life * 0.6 * (0.4 + wc));
              ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
              ctx.fill();
            } else if (pMode === 'mist') {
              p.x += p.vx * 0.5 + 0.15;
              p.y += Math.sin(t + p.phase) * 0.15;
              if (p.x > w) p.x = 0;
              ctx.beginPath();
              ctx.fillStyle = rgb(pal.fog, 0.06 + we * 0.08);
              ctx.ellipse(p.x, p.y, p.r * 12, p.r * 5, 0, 0, Math.PI * 2);
              ctx.fill();
            } else {
              // sparks
              p.x += p.vx * 2 + (Math.random() - 0.5) * 0.5;
              p.y += p.vy * 1.5 * (0.5 + wh);
              p.life -= 0.008;
              if (p.life <= 0 || p.y < 0) {
                p.x = w * (0.3 + Math.random() * 0.4);
                p.y = h * 0.5 + Math.random() * h * 0.3;
                p.life = 1;
                p.vy = -1 - Math.random();
              }
              ctx.beginPath();
              ctx.fillStyle = rgb(pal.sun, p.life * 0.8 * wh);
              ctx.arc(p.x, p.y, p.r * 0.8, 0, Math.PI * 2);
              ctx.fill();
              // trail
              ctx.strokeStyle = rgb(pal.accent, p.life * 0.3 * wh);
              ctx.lineWidth = 1;
              ctx.beginPath();
              ctx.moveTo(p.x, p.y);
              ctx.lineTo(p.x - p.vx * 4, p.y - p.vy * 4);
              ctx.stroke();
            }
          }

          // Lightning flashes (heroic + stormy)
          if (wh > 0.4 && Math.random() < 0.003 + wh * 0.004) {
            s.lightning = 1;
          }
          if (s.lightning > 0) {
            ctx.fillStyle = `rgba(220,230,255,${s.lightning * 0.35 * wh})`;
            ctx.fillRect(0, 0, w, h);
            // Bolt
            if (s.lightning > 0.7) {
              let bx = w * (0.3 + Math.random() * 0.4);
              let by = 0;
              ctx.strokeStyle = `rgba(230,240,255,${s.lightning})`;
              ctx.lineWidth = 2;
              ctx.shadowColor = rgb(pal.accent);
              ctx.shadowBlur = 20;
              ctx.beginPath();
              ctx.moveTo(bx, by);
              while (by < h * 0.55) {
                bx += (Math.random() - 0.5) * 40;
                by += 15 + Math.random() * 30;
                ctx.lineTo(bx, by);
              }
              ctx.stroke();
              ctx.shadowBlur = 0;
            }
            s.lightning *= 0.88;
            if (s.lightning < 0.02) s.lightning = 0;
          }

          // Spotlights (theatre)
          s.spotlightA += 0.008 + wh * 0.006;
          s.spotlightB -= 0.006 + wc * 0.004;

          const drawSpotlight = (angle, intensity, col) => {
            const originX = w * 0.5 + Math.cos(angle) * w * 0.35;
            const originY = -20;
            const targetX = w * 0.5 + Math.sin(angle * 0.7) * w * 0.3;
            const targetY = h * 0.7;
            const spread = 60 + intensity * 40;

            const sg = ctx.createLinearGradient(originX, originY, targetX, targetY);
            sg.addColorStop(0, rgb(col, 0.01));
            sg.addColorStop(0.3, rgb(col, 0.06 * intensity));
            sg.addColorStop(1, rgb(col, 0));

            ctx.fillStyle = sg;
            ctx.beginPath();
            ctx.moveTo(originX - 10, originY);
            ctx.lineTo(targetX - spread, targetY);
            ctx.lineTo(targetX + spread, targetY);
            ctx.lineTo(originX + 10, originY);
            ctx.closePath();
            ctx.fill();

            // Floor pool
            const pool = ctx.createRadialGradient(targetX, targetY, 0, targetX, targetY, spread * 1.2);
            pool.addColorStop(0, rgb(col, 0.1 * intensity));
            pool.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = pool;
            ctx.beginPath();
            ctx.ellipse(targetX, targetY, spread * 1.2, spread * 0.35, 0, 0, Math.PI * 2);
            ctx.fill();
          };

          if (open) {
            drawSpotlight(s.spotlightA, 0.6 + wc * 0.4, pal.sun);
            drawSpotlight(s.spotlightB, 0.4 + wh * 0.5, pal.accent);
          }

          // Rain (eerie / weather)
          if (we > 0.25 || FORECAST.precip > 20) {
            const rainAmt = Math.floor(30 + we * 60 + FORECAST.precip * 0.5);
            ctx.strokeStyle = rgb(lerpColor(pal.fog, [180, 200, 220], 0.5), night ? 0.15 : 0.2);
            ctx.lineWidth = 1;
            for (let i = 0; i < rainAmt; i++) {
              const rx = (i * 97 + t * (120 + we * 80)) % (w + 20) - 10;
              const ry = (i * 53 + t * 400) % (h + 20) - 10;
              ctx.beginPath();
              ctx.moveTo(rx, ry);
              ctx.lineTo(rx - 2, ry + 10 + we * 6);
              ctx.stroke();
            }
          }

          // Vignette
          const vig = ctx.createRadialGradient(w/2, h/2, h * 0.3, w/2, h/2, h * 0.75);
          vig.addColorStop(0, 'rgba(0,0,0,0)');
          vig.addColorStop(1, `rgba(0,0,0,${night ? 0.55 : 0.4})`);
          ctx.fillStyle = vig;
          ctx.fillRect(0, 0, w, h);

          // Film grain (subtle)
          if (Math.floor(t * 24) % 2 === 0) {
            ctx.fillStyle = 'rgba(255,255,255,0.015)';
            for (let i = 0; i < 40; i++) {
              ctx.fillRect(Math.random() * w, Math.random() * h, 2, 2);
            }
          }

          // Soft stage edge darken
          const edge = ctx.createLinearGradient(0, 0, 0, h);
          edge.addColorStop(0, 'rgba(0,0,0,0.35)');
          edge.addColorStop(0.12, 'rgba(0,0,0,0)');
          edge.addColorStop(0.75, 'rgba(0,0,0,0)');
          edge.addColorStop(1, 'rgba(0,0,0,0.5)');
          ctx.fillStyle = edge;
          ctx.fillRect(0, 0, w, h);

          raf = requestAnimationFrame(frame);
        };

        raf = requestAnimationFrame(frame);

        return () => {
          running = false;
          cancelAnimationFrame(raf);
          window.removeEventListener('resize', resize);
          canvas.removeEventListener('pointermove', onMove);
        };
      }, [initScene]);

      return <canvas ref={canvasRef} className="stage-canvas" />;
    }

    // ── Typewriter ──────────────────────────────────────────────────
    function Typewriter({ text, speed = 28 }) {
      const [displayed, setDisplayed] = useState('');
      const [done, setDone] = useState(false);

      useEffect(() => {
        setDisplayed('');
        setDone(false);
        let i = 0;
        const id = setInterval(() => {
          i++;
          setDisplayed(text.slice(0, i));
          if (i >= text.length) {
            clearInterval(id);
            setDone(true);
          }
        }, speed);
        return () => clearInterval(id);
      }, [text, speed]);

      return (
        <span>
          {displayed}
          {!done && <span className="cursor" />}
        </span>
      );
    }

    // ── Main App ────────────────────────────────────────────────────
    function App() {
      const [cosy, setCosy] = useState(55);
      const [eerie, setEerie] = useState(30);
      const [heroic, setHeroic] = useState(40);
      const [night, setNight] = useState(false);
      const [curtainOpen, setCurtainOpen] = useState(false);
      const [subIdx, setSubIdx] = useState(0);
      const [showtime, setShowtime] = useState('');

      useEffect(() => {
        // Open curtain after short thatrical delay
        const t = setTimeout(() => setCurtainOpen(true), 600);
        return () => clearTimeout(t);
      }, []);

      useEffect(() => {
        const tick = () => {
          const now = new Date();
          setShowtime(
            now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' })
          );
        };
        tick();
        const id = setInterval(tick, 1000);
        return () => clearInterval(id);
      }, []);

      // Cycle subtitles
      useEffect(() => {
        const id = setInterval(() => setSubIdx((i) => i + 1), 7000);
        return () => clearInterval(id);
      }, []);

      const mood = dominantMood(cosy, eerie, heroic);
      const scene = SCENES[mood];
      const total = cosy + eerie + heroic || 1;
      const isBalanced = Math.max(cosy, eerie, heroic) / total < 0.45;

      const subtitle = useMemo(() => {
        if (isBalanced) {
          return BLEND_SUBTITLES[subIdx % BLEND_SUBTITLES.length];
        }
        return scene.subtitles[subIdx % scene.subtitles.length];
      }, [scene, subIdx, isBalanced]);

      const sceneTitle = isBalanced ? 'A Remixed Tempest' : scene.title;

      // Remix: reshuffle moods
      const remix = () => {
        setCosy(20 + Math.floor(Math.random() * 75));
        setEerie(20 + Math.floor(Math.random() * 75));
        setHeroic(20 + Math.floor(Math.random() * 75));
        setSubIdx((i) => i + 1);
        // Quick curtain dip for drama
        setCurtainOpen(false);
        setTimeout(() => setCurtainOpen(true), 900);
      };

      const encore = () => {
        setSubIdx((i) => i + 1);
        setCurtainOpen(false);
        setTimeout(() => setCurtainOpen(true), 1100);
      };

      // Valance elements
      const valanceCount = 18;

      return (
        <div className="app">
          <header>
            <div className="logo">
              <div className="logo-mark" />
              <div>
                <h1>Weather <span>Theatre</span></h1>
                <div className="tagline">Forecast as Performance</div>
              </div>
            </div>
            <div className="header-right">
              <div className="showtime">SHOWTIME {showtime}</div>
              <div className="mode-toggle" role="group" aria-label="Matinée or Night">
                <button
                  className={!night ? 'active' : ''}
                  onClick={() => setNight(false)}
                  type="button"
                >
                  Matinée
                </button>
                <button
                  className={night ? 'active' : ''}
                  onClick={() => setNight(true)}
                  type="button"
                >
                  Night
                </button>
              </div>
            </div>
          </header>

          <div className="stage-wrap">
            <StageCanvas
              cosy={cosy}
              eerie={eerie}
              heroic={heroic}
              night={night}
              open={curtainOpen}
            />

            <div className={`curtain left ${curtainOpen ? 'open' : ''}`} />
            <div className={`curtain right ${curtainOpen ? 'open' : ''}`} />
            <div className={`curtain-top ${curtainOpen ? 'open' : ''}`} />
            <div className={`valance ${curtainOpen ? 'open' : ''}`}>
              {Array.from({ length: valanceCount }, (_, i) => (
                <span key={i} style={{ transitionDelay: `${i * 0.04}s` }} />
              ))}
            </div>
            <div className="proscenium" />

            <div className="subtitle-bar">
              <div className="scene-badge">Act · {sceneTitle}</div>
              <div className="subtitle-text">
                <Typewriter text={subtitle} key={subtitle} />
              </div>
            </div>
          </div>

          <aside className="panel">
            <div className="panel-title">Director's Desk</div>

            <div className="panel-section">
              <div className="section-label">Tonight's Forecast</div>
              <div className="forecast-card">
                <div className="forecast-city">{FORECAST.city}</div>
                <div className="forecast-meta">{FORECAST.region} · {FORECAST.date}</div>
                <div className="forecast-main">
                  <div className="forecast-temp">{FORECAST.temp}<span>°C</span></div>
                  <div>
                    <div className="forecast-cond">{FORECAST.condition}</div>
                    <div className="forecast-detail">H {FORECAST.high}° · L {FORECAST.low}°</div>
                    <div className="forecast-detail">Precip {FORECAST.precip}%</div>
                  </div>
                </div>
                <div className="forecast-stats">
                  <div className="stat">
                    <div className="stat-label">Wind</div>
                    <div className="stat-value">{FORECAST.wind} {FORECAST.windDir}</div>
                  </div>
                  <div className="stat">
                    <div className="stat-label">Humidity</div>
                    <div className="stat-value">{FORECAST.humidity}%</div>
                  </div>
                  <div className="stat">
                    <div className="stat-label">Pressure</div>
                    <div className="stat-value">{FORECAST.pressure}</div>
                  </div>
                  <div className="stat">
                    <div className="stat-label">Visibility</div>
                    <div className="stat-value">{FORECAST.visibility} km</div>
                  </div>
                </div>
              </div>
            </div>

            <div className="panel-section">
              <div className="section-label">Mood Faders</div>

              <div className="mood-row">
                <div className="mood-header">
                  <span className="mood-name">
                    <span className="mood-icon cosy">♨</span> Cosy
                  </span>
                  <span className="mood-val">{cosy}</span>
                </div>
                <input
                  type="range" min="0" max="100" value={cosy}
                  className="cosy"
                  onChange={(e) => setCosy(+e.target.value)}
                  aria-label="Cosy mood"
                />
              </div>

              <div className="mood-row">
                <div className="mood-header">
                  <span className="mood-name">
                    <span className="mood-icon eerie">☽</span> Eerie
                  </span>
                  <span className="mood-val">{eerie}</span>
                </div>
                <input
                  type="range" min="0" max="100" value={eerie}
                  className="eerie"
                  onChange={(e) => setEerie(+e.target.value)}
                  aria-label="Eerie mood"
                />
              </div>

              <div className="mood-row">
                <div className="mood-header">
                  <span className="mood-name">
                    <span className="mood-icon heroic">⚡</span> Heroic
                  </span>
                  <span className="mood-val">{heroic}</span>
                </div>
                <input
                  type="range" min="0" max="100" value={heroic}
                  className="heroic"
                  onChange={(e) => setHeroic(+e.target.value)}
                  aria-label="Heroic mood"
                />
              </div>

              <div className="blend-meter" title="Mood blend">
                <div className="blend-seg cosy" style={{ flex: cosy || 0.01 }} />
                <div className="blend-seg eerie" style={{ flex: eerie || 0.01 }} />
                <div className="blend-seg heroic" style={{ flex: heroic || 0.01 }} />
              </div>
            </div>

            <div className="panel-section">
              <div className="section-label">Stage Reading</div>
              <div className="scene-card">
                <h3>{sceneTitle}</h3>
                <p>
                  {mood === 'cosy' && !isBalanced &&
                    `The ${FORECAST.temp}° air softens into amber. ${FORECAST.condition} becomes a hearth story—lamplight, wool, and rain on the conservatory roof.`}
                  {mood === 'eerie' && !isBalanced &&
                    `Visibility ${FORECAST.visibility} km is more suggestion than fact. ${FORECAST.humidity}% humidity hangs like a held breath over Harborough's piers.`}
                  {mood === 'heroic' && !isBalanced &&
                    `Wind ${FORECAST.wind} ${FORECAST.windDir} sets the flags alight with purpose. Pressure ${FORECAST.pressure} drops—and the symphony rises.`}
                  {isBalanced &&
                    `A balanced bill: cosy (${Math.round(cosy/total*100)}%), eerie (${Math.round(eerie/total*100)}%), heroic (${Math.round(heroic/total*100)}%). The same ${FORECAST.temp}° forecast plays three roles at once.`}
                </p>
              </div>
            </div>

            <div className="actions">
              <button className="btn" type="button" onClick={encore}>Encore</button>
              <button className="btn primary" type="button" onClick={remix}>Remix</button>
            </div>
          </aside>

          <footer>
            <span>Weather Theatre · Mock Forecast · No Intermission</span>
            <div className="lights">
              <i /><i /><i /><i /><i />
            </div>
            <span>Cosy · Eerie · Heroic</span>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
