<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tiny Kanban</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --surface-2: #243044;
      --surface-3: #2d3d56;
      --border: #3a4d68;
      --text: #e8eef6;
      --text-muted: #8b9cb3;
      --accent: #4f8cff;
      --accent-hover: #6ba0ff;
      --danger: #ff5c5c;
      --danger-hover: #ff7878;
      --todo: #5b8def;
      --doing: #f0a500;
      --done: #3ecf8e;
      --priority-high: #ff5c5c;
      --priority-med: #f0a500;
      --priority-low: #5b8def;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      --radius: 12px;
      --radius-sm: 8px;
      --font: "Segoe UI", system-ui, -apple-system, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.45;
      font-size: 16px;
    }

    /* Header */
    header {
      background: linear-gradient(180deg, var(--surface) 0%, rgba(26, 35, 50, 0.95) 100%);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.75rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      flex-shrink: 0;
    }

    .brand-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--accent), #7c5cff);
      border-radius: 10px;
      display: grid;
      place-items: center;
      font-size: 1.25rem;
      box-shadow: 0 4px 12px rgba(79, 140, 255, 0.35);
    }

    .brand h1 {
      font-size: 1.45rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      white-space: nowrap;
    }

    .brand h1 span {
      color: var(--text-muted);
      font-weight: 500;
      font-size: 0.9rem;
      margin-left: 0.4rem;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex: 1;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .search-wrap {
      position: relative;
      flex: 1;
      max-width: 320px;
      min-width: 180px;
    }

    .search-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      color: var(--text-muted);
      pointer-events: none;
    }

    .search-wrap input {
      width: 100%;
      padding: 0.65rem 0.85rem 0.65rem 2.4rem;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .search-wrap input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79, 140, 255, 0.2);
    }

    .search-wrap input::placeholder {
      color: var(--text-muted);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.65rem 1.1rem;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      font-family: inherit;
      white-space: nowrap;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 2px 8px rgba(79, 140, 255, 0.3);
    }

    .btn-primary:hover {
      background: var(--accent-hover);
    }

    .btn-ghost {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover {
      background: var(--surface-3);
    }

    .btn-danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid transparent;
      padding: 0.35rem 0.5rem;
    }

    .btn-danger:hover {
      background: rgba(255, 92, 92, 0.15);
      border-color: rgba(255, 92, 92, 0.3);
    }

    .btn-sm {
      padding: 0.4rem 0.75rem;
      font-size: 0.85rem;
    }

    /* Board */
    main {
      padding: 1.5rem;
      max-width: 1600px;
      margin: 0 auto;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.25rem;
      align-items: start;
      min-height: calc(100vh - 120px);
    }

    @media (max-width: 900px) {
      .board {
        grid-template-columns: 1fr;
      }
    }

    /* Column */
    .column {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      max-height: calc(100vh - 140px);
      box-shadow: var(--shadow);
    }

    .column-header {
      padding: 1rem 1.15rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      flex-shrink: 0;
      border-radius: var(--radius) var(--radius) 0 0;
    }

    .column-title {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .column-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .column[data-col="todo"] .column-dot { background: var(--todo); box-shadow: 0 0 8px var(--todo); }
    .column[data-col="doing"] .column-dot { background: var(--doing); box-shadow: 0 0 8px var(--doing); }
    .column[data-col="done"] .column-dot { background: var(--done); box-shadow: 0 0 8px var(--done); }

    .column-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .count-badge {
      background: var(--surface-2);
      color: var(--text-muted);
      font-size: 0.85rem;
      font-weight: 700;
      padding: 0.2rem 0.55rem;
      border-radius: 999px;
      min-width: 1.75rem;
      text-align: center;
    }

    .wip-badge {
      font-size: 0.8rem;
      font-weight: 600;
      padding: 0.2rem 0.55rem;
      border-radius: 999px;
      background: rgba(240, 165, 0, 0.15);
      color: var(--doing);
      border: 1px solid rgba(240, 165, 0, 0.3);
      cursor: pointer;
      transition: background 0.15s;
    }

    .wip-badge:hover {
      background: rgba(240, 165, 0, 0.25);
    }

    .wip-badge.over {
      background: rgba(255, 92, 92, 0.2);
      color: var(--danger);
      border-color: rgba(255, 92, 92, 0.4);
      animation: pulse-wip 1.5s ease-in-out infinite;
    }

    @keyframes pulse-wip {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .cards {
      padding: 0.85rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      overflow-y: auto;
      flex: 1;
      min-height: 120px;
    }

    .cards.drag-over {
      background: rgba(79, 140, 255, 0.06);
    }

    .cards::-webkit-scrollbar {
      width: 6px;
    }

    .cards::-webkit-scrollbar-track {
      background: transparent;
    }

    .cards::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    /* Card */
    .card {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0.9rem 1rem;
      cursor: grab;
      transition: box-shadow 0.15s, border-color 0.15s, transform 0.15s, opacity 0.15s;
      position: relative;
      border-left: 4px solid var(--priority-med);
      user-select: none;
    }

    .card:hover {
      border-color: var(--surface-3);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
      transform: translateY(-1px);
    }

    .card.dragging {
      opacity: 0.45;
      cursor: grabbing;
      transform: rotate(1.5deg) scale(1.02);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.5);
    }

    .card.priority-high { border-left-color: var(--priority-high); }
    .card.priority-medium { border-left-color: var(--priority-med); }
    .card.priority-low { border-left-color: var(--priority-low); }

    .card.hidden {
      display: none;
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 0.5rem;
      margin-bottom: 0.45rem;
    }

    .card-title {
      font-size: 1.05rem;
      font-weight: 600;
      line-height: 1.35;
      word-break: break-word;
      flex: 1;
    }

    .card-actions {
      display: flex;
      gap: 0.15rem;
      opacity: 0;
      transition: opacity 0.15s;
      flex-shrink: 0;
    }

    .card:hover .card-actions {
      opacity: 1;
    }

    .card-actions button {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0.2rem;
      border-radius: 4px;
      display: grid;
      place-items: center;
      transition: color 0.15s, background 0.15s;
    }

    .card-actions button:hover {
      color: var(--text);
      background: var(--surface-3);
    }

    .card-actions button.delete:hover {
      color: var(--danger);
      background: rgba(255, 92, 92, 0.15);
    }

    .card-desc {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 0.65rem;
      line-height: 1.4;
      word-break: break-word;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .priority-tag {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 0.15rem 0.45rem;
      border-radius: 4px;
    }

    .priority-tag.high {
      background: rgba(255, 92, 92, 0.18);
      color: var(--priority-high);
    }

    .priority-tag.medium {
      background: rgba(240, 165, 0, 0.18);
      color: var(--priority-med);
    }

    .priority-tag.low {
      background: rgba(91, 141, 239, 0.18);
      color: var(--priority-low);
    }

    .assignee {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .avatar {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 0.7rem;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
      letter-spacing: -0.02em;
    }

    .empty-state {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .empty-state .icon {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      opacity: 0.5;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 1rem;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.2s, visibility 0.2s;
      backdrop-filter: blur(4px);
    }

    .modal-overlay.open {
      opacity: 1;
      visibility: visible;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 100%;
      max-width: 480px;
      box-shadow: var(--shadow);
      transform: translateY(12px) scale(0.98);
      transition: transform 0.2s;
    }

    .modal-overlay.open .modal {
      transform: translateY(0) scale(1);
    }

    .modal-header {
      padding: 1.15rem 1.35rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-header h2 {
      font-size: 1.2rem;
      font-weight: 700;
    }

    .modal-close {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1.4rem;
      line-height: 1;
      padding: 0.25rem;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
    }

    .modal-close:hover {
      color: var(--text);
      background: var(--surface-2);
    }

    .modal-body {
      padding: 1.35rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .form-group label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      padding: 0.7rem 0.85rem;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79, 140, 255, 0.2);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 72px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.85rem;
    }

    .modal-footer {
      padding: 1rem 1.35rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 0.6rem;
    }

    /* People management */
    .people-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 0.25rem;
    }

    .person-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.3rem 0.55rem 0.3rem 0.35rem;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 0.85rem;
    }

    .person-chip .remove-person {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.9rem;
      line-height: 1;
      padding: 0 0.1rem;
      border-radius: 50%;
    }

    .person-chip .remove-person:hover {
      color: var(--danger);
    }

    .add-person-row {
      display: flex;
      gap: 0.5rem;
    }

    .add-person-row input {
      flex: 1;
    }

    /* Toast */
    .toast-container {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      z-index: 2000;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .toast {
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.75rem 1.15rem;
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow);
      font-size: 0.95rem;
      font-weight: 500;
      animation: toast-in 0.3s ease;
      max-width: 320px;
    }

    .toast.error {
      border-color: rgba(255, 92, 92, 0.4);
      background: #2a1a1a;
    }

    .toast.success {
      border-color: rgba(62, 207, 142, 0.4);
      background: #1a2a22;
    }

    @keyframes toast-in {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Stats bar for standups */
    .stats-bar {
      display: flex;
      gap: 1.25rem;
      padding: 0.35rem 0;
      font-size: 0.9rem;
      color: var(--text-muted);
      flex-wrap: wrap;
    }

    .stats-bar strong {
      color: var(--text);
      font-weight: 700;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }

    .stat-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    /* Confirm dialog */
    .confirm-msg {
      font-size: 1.05rem;
      color: var(--text-muted);
      line-height: 1.5;
    }

    /* Focus visible for accessibility */
    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    /* Drop indicator */
    .cards.drag-over .card {
      pointer-events: none;
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <div class="brand-icon">📋</div>
      <h1>Tiny Kanban <span>standup board</span></h1>
    </div>
    <div class="stats-bar" id="statsBar"></div>
    <div class="toolbar">
      <div class="search-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z" />
        </svg>
        <input type="search" id="searchInput" placeholder="Filter cards…" autocomplete="off" />
      </div>
      <button class="btn btn-ghost" id="peopleBtn" title="Manage team">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Team
      </button>
      <button class="btn btn-primary" id="addCardBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
        Add Card
      </button>
    </div>
  </header>

  <main>
    <div class="board" id="board">
      <!-- Columns rendered by JS -->
    </div>
  </main>

  <!-- Card Modal -->
  <div class="modal-overlay" id="cardModal">
    <div class="modal" role="dialog" aria-labelledby="cardModalTitle">
      <div class="modal-header">
        <h2 id="cardModalTitle">Add Card</h2>
        <button class="modal-close" id="cardModalClose" aria-label="Close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="cardTitle">Title</label>
          <input type="text" id="cardTitle" placeholder="What needs to be done?" maxlength="120" />
        </div>
        <div class="form-group">
          <label for="cardDesc">Description</label>
          <textarea id="cardDesc" placeholder="Optional details…" maxlength="500"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="cardPriority">Priority</label>
            <select id="cardPriority">
              <option value="high">High</option>
              <option value="medium" selected>Medium</option>
              <option value="low">Low</option>
            </select>
          </div>
          <div class="form-group">
            <label for="cardAssignee">Assignee</label>
            <select id="cardAssignee">
              <option value="">Unassigned</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label for="cardColumn">Column</label>
          <select id="cardColumn">
            <option value="todo">Todo</option>
            <option value="doing">Doing</option>
            <option value="done">Done</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="cardModalCancel">Cancel</button>
        <button class="btn btn-primary" id="cardModalSave">Save Card</button>
      </div>
    </div>
  </div>

  <!-- People Modal -->
  <div class="modal-overlay" id="peopleModal">
    <div class="modal" role="dialog" aria-labelledby="peopleModalTitle">
      <div class="modal-header">
        <h2 id="peopleModalTitle">Team Members</h2>
        <button class="modal-close" id="peopleModalClose" aria-label="Close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>People on this board</label>
          <div class="people-chips" id="peopleChips"></div>
        </div>
        <div class="form-group">
          <label for="newPersonName">Add person</label>
          <div class="add-person-row">
            <input type="text" id="newPersonName" placeholder="Name" maxlength="30" />
            <button class="btn btn-primary btn-sm" id="addPersonBtn">Add</button>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="peopleModalDone">Done</button>
      </div>
    </div>
  </div>

  <!-- WIP Modal -->
  <div class="modal-overlay" id="wipModal">
    <div class="modal" role="dialog" aria-labelledby="wipModalTitle" style="max-width: 360px;">
      <div class="modal-header">
        <h2 id="wipModalTitle">WIP Limit</h2>
        <button class="modal-close" id="wipModalClose" aria-label="Close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="wipValue">Max cards in this column</label>
          <input type="number" id="wipValue" min="0" max="99" placeholder="0 = unlimited" />
          <span style="font-size: 0.8rem; color: var(--text-muted); margin-top: 0.25rem;">Set to 0 for no limit</span>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="wipModalCancel">Cancel</button>
        <button class="btn btn-primary" id="wipModalSave">Save</button>
      </div>
    </div>
  </div>

  <!-- Confirm Modal -->
  <div class="modal-overlay" id="confirmModal">
    <div class="modal" role="dialog" aria-labelledby="confirmModalTitle" style="max-width: 380px;">
      <div class="modal-header">
        <h2 id="confirmModalTitle">Confirm</h2>
        <button class="modal-close" id="confirmModalClose" aria-label="Close">&times;</button>
      </div>
      <div class="modal-body">
        <p class="confirm-msg" id="confirmMessage"></p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="confirmCancel">Cancel</button>
        <button class="btn btn-primary" id="confirmOk" style="background: var(--danger);">Delete</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toasts"></div>

  <script>
    // ── Avatar color palette ──────────────────────────────────
    const AVATAR_COLORS = [
      '#4f8cff', '#7c5cff', '#e85d9a', '#f0a500',
      '#3ecf8e', '#00c4cc', '#ff6b35', '#a855f7',
      '#22c55e', '#ef4444',
    ];

    const COLUMNS = [
      { id: 'todo',  label: 'Todo',  emoji: '📥' },
      { id: 'doing', label: 'Doing', emoji: '⚡' },
      { id: 'done',  label: 'Done',  emoji: '✅' },
    ];

    // ── State ─────────────────────────────────────────────────
    const defaultState = () => ({
      cards: [
        { id: uid(), title: 'Review sprint goals', description: 'Align on priorities for the week', priority: 'high', assignee: 'Alex', column: 'todo', createdAt: Date.now() - 86400000 },
        { id: uid(), title: 'Update board filters', description: 'Search + assignee chips', priority: 'medium', assignee: 'Sam', column: 'doing', createdAt: Date.now() - 43200000 },
        { id: uid(), title: 'Ship landing page', description: '', priority: 'high', assignee: 'Jordan', column: 'doing', createdAt: Date.now() - 7200000 },
        { id: uid(), title: 'Write standup notes', description: 'Yesterday / today / blockers', priority: 'low', assignee: 'Alex', column: 'done', createdAt: Date.now() - 3600000 },
        { id: uid(), title: 'Pair on auth bug', description: 'Session timeout edge case', priority: 'medium', assignee: 'Sam', column: 'done', createdAt: Date.now() - 1800000 },
      ],
      people: ['Alex', 'Sam', 'Jordan', 'Taylor'],
      wip: { todo: 0, doing: 3, done: 0 },
    });

    let state = loadState();
    let editingCardId = null;
    let wipEditColumn = null;
    let confirmCallback = null;
    let dragCardId = null;

    function uid() {
      return 'c_' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
    }

    function loadState() {
      try {
        const raw = localStorage.getItem('tiny-kanban');
        if (raw) {
          const parsed = JSON.parse(raw);
          if (parsed && Array.isArray(parsed.cards)) return parsed;
        }
      } catch (_) {}
      return defaultState();
    }

    function saveState() {
      try {
        localStorage.setItem('tiny-kanban', JSON.stringify(state));
      } catch (_) {}
    }

    function avatarColor(name) {
      let hash = 0;
      for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
      return AVATAR_COLORS[Math.abs(hash) % AVATAR_COLORS.length];
    }

    function initials(name) {
      return name.split(/\s+/).map(w => w[0]).join('').slice(0, 2).toUpperCase();
    }

    // ── Toast ─────────────────────────────────────────────────
    function toast(msg, type = '') {
      const el = document.createElement('div');
      el.className = 'toast' + (type ? ' ' + type : '');
      el.textContent = msg;
      document.getElementById('toasts').appendChild(el);
      setTimeout(() => {
        el.style.opacity = '0';
        el.style.transition = 'opacity 0.3s';
        setTimeout(() => el.remove(), 300);
      }, 2600);
    }

    // ── Render ────────────────────────────────────────────────
    function render() {
      renderBoard();
      renderStats();
      saveState();
    }

    function renderStats() {
      const counts = { todo: 0, doing: 0, done: 0 };
      state.cards.forEach(c => { if (counts[c.column] !== undefined) counts[c.column]++; });
      const bar = document.getElementById('statsBar');
      bar.innerHTML = `
        <div class="stat-item"><span class="stat-dot" style="background:var(--todo)"></span> Todo <strong>${counts.todo}</strong></div>
        <div class="stat-item"><span class="stat-dot" style="background:var(--doing)"></span> Doing <strong>${counts.doing}</strong></div>
        <div class="stat-item"><span class="stat-dot" style="background:var(--done)"></span> Done <strong>${counts.done}</strong></div>
        <div class="stat-item">People <strong>${state.people.length}</strong></div>
      `;
    }

    function renderBoard() {
      const board = document.getElementById('board');
      const query = (document.getElementById('searchInput').value || '').trim().toLowerCase();

      board.innerHTML = COLUMNS.map(col => {
        const cards = state.cards
          .filter(c => c.column === col.id)
          .sort((a, b) => {
            const p = { high: 0, medium: 1, low: 2 };
            return (p[a.priority] ?? 1) - (p[b.priority] ?? 1) || b.createdAt - a.createdAt;
          });

        const wip = state.wip[col.id] || 0;
        const over = wip > 0 && cards.length > wip;
        const filtered = cards.map(c => {
          const match = !query ||
            c.title.toLowerCase().includes(query) ||
            (c.description || '').toLowerCase().includes(query) ||
            (c.assignee || '').toLowerCase().includes(query);
          return { card: c, match };
        });

        const visibleCount = filtered.filter(f => f.match).length;

        return `
          <div class="column" data-col="${col.id}">
            <div class="column-header">
              <div class="column-title">
                <span class="column-dot"></span>
                ${col.label}
              </div>
              <div class="column-meta">
                ${wip > 0
                  ? `<button class="wip-badge ${over ? 'over' : ''}" data-wip-col="${col.id}" title="Edit WIP limit">WIP ${cards.length}/${wip}</button>`
                  : `<button class="wip-badge" data-wip-col="${col.id}" title="Set WIP limit" style="opacity:0.6">WIP ∞</button>`
                }
                <span class="count-badge">${cards.length}</span>
              </div>
            </div>
            <div class="cards" data-col="${col.id}">
              ${filtered.length === 0
                ? `<div class="empty-state"><div class="icon">${col.emoji}</div>No cards yet</div>`
                : filtered.map(({ card, match }) => renderCard(card, !match)).join('')
              }
              ${filtered.length > 0 && visibleCount === 0
                ? `<div class="empty-state"><div class="icon">🔍</div>No matches</div>`
                : ''
              }
            </div>
          </div>
        `;
      }).join('');

      bindBoardEvents();
    }

    function renderCard(card, hidden) {
      const priLabel = card.priority.charAt(0).toUpperCase() + card.priority.slice(1);
      const assigneeHtml = card.assignee
        ? `<div class="assignee">
             <span class="avatar" style="background:${avatarColor(card.assignee)}">${initials(card.assignee)}</span>
             ${escapeHtml(card.assignee)}
           </div>`
        : `<div class="assignee" style="opacity:0.5">Unassigned</div>`;

      return `
        <div class="card priority-${card.priority} ${hidden ? 'hidden' : ''}"
             draggable="true"
             data-id="${card.id}">
          <div class="card-top">
            <div class="card-title">${escapeHtml(card.title)}</div>
            <div class="card-actions">
              <button class="edit" data-edit="${card.id}" title="Edit" aria-label="Edit">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              </button>
              <button class="delete" data-delete="${card.id}" title="Delete" aria-label="Delete">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
              </button>
            </div>
          </div>
          ${card.description ? `<div class="card-desc">${escapeHtml(card.description)}</div>` : ''}
          <div class="card-footer">
            <span class="priority-tag ${card.priority}">${priLabel}</span>
            ${assigneeHtml}
          </div>
        </div>
      `;
    }

    function escapeHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    // ── Board events ──────────────────────────────────────────
    function bindBoardEvents() {
      // Drag
      document.querySelectorAll('.card').forEach(el => {
        el.addEventListener('dragstart', onDragStart);
        el.addEventListener('dragend', onDragEnd);
      });

      document.querySelectorAll('.cards').forEach(el => {
        el.addEventListener('dragover', onDragOver);
        el.addEventListener('dragleave', onDragLeave);
        el.addEventListener('drop', onDrop);
      });

      // Edit / Delete
      document.querySelectorAll('[data-edit]').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          openCardModal(btn.dataset.edit);
        });
      });

      document.querySelectorAll('[data-delete]').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          confirmDelete(btn.dataset.delete);
        });
      });

      // Double-click to edit
      document.querySelectorAll('.card').forEach(el => {
        el.addEventListener('dblclick', () => openCardModal(el.dataset.id));
      });

      // WIP badges
      document.querySelectorAll('[data-wip-col]').forEach(btn => {
        btn.addEventListener('click', () => openWipModal(btn.dataset.wipCol));
      });
    }

    function onDragStart(e) {
      dragCardId = e.currentTarget.dataset.id;
      e.currentTarget.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', dragCardId);
      // slight delay so the ghost doesn't look half-opaque
      requestAnimationFrame(() => e.currentTarget.classList.add('dragging'));
    }

    function onDragEnd(e) {
      e.currentTarget.classList.remove('dragging');
      document.querySelectorAll('.cards').forEach(c => c.classList.remove('drag-over'));
      dragCardId = null;
    }

    function onDragOver(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      e.currentTarget.classList.add('drag-over');
    }

    function onDragLeave(e) {
      if (!e.currentTarget.contains(e.relatedTarget)) {
        e.currentTarget.classList.remove('drag-over');
      }
    }

    function onDrop(e) {
      e.preventDefault();
      e.currentTarget.classList.remove('drag-over');
      const cardId = e.dataTransfer.getData('text/plain') || dragCardId;
      const targetCol = e.currentTarget.dataset.col;
      if (!cardId || !targetCol) return;

      const card = state.cards.find(c => c.id === cardId);
      if (!card || card.column === targetCol) return;

      // WIP check
      const wip = state.wip[targetCol] || 0;
      const count = state.cards.filter(c => c.column === targetCol).length;
      if (wip > 0 && count >= wip) {
        toast(`WIP limit reached for ${COLUMNS.find(c => c.id === targetCol).label} (${wip})`, 'error');
        return;
      }

      card.column = targetCol;
      render();
      toast(`Moved to ${COLUMNS.find(c => c.id === targetCol).label}`, 'success');
    }

    // ── Card modal ────────────────────────────────────────────
    function populateAssigneeSelect(selected) {
      const sel = document.getElementById('cardAssignee');
      sel.innerHTML = '<option value="">Unassigned</option>' +
        state.people.map(p =>
          `<option value="${escapeHtml(p)}" ${p === selected ? 'selected' : ''}>${escapeHtml(p)}</option>`
        ).join('');
    }

    function openCardModal(id) {
      editingCardId = id || null;
      const modal = document.getElementById('cardModal');
      const title = document.getElementById('cardModalTitle');

      if (id) {
        const card = state.cards.find(c => c.id === id);
        if (!card) return;
        title.textContent = 'Edit Card';
        document.getElementById('cardTitle').value = card.title;
        document.getElementById('cardDesc').value = card.description || '';
        document.getElementById('cardPriority').value = card.priority;
        document.getElementById('cardColumn').value = card.column;
        populateAssigneeSelect(card.assignee);
      } else {
        title.textContent = 'Add Card';
        document.getElementById('cardTitle').value = '';
        document.getElementById('cardDesc').value = '';
        document.getElementById('cardPriority').value = 'medium';
        document.getElementById('cardColumn').value = 'todo';
        populateAssigneeSelect('');
      }

      modal.classList.add('open');
      setTimeout(() => document.getElementById('cardTitle').focus(), 50);
    }

    function closeCardModal() {
      document.getElementById('cardModal').classList.remove('open');
      editingCardId = null;
    }

    function saveCard() {
      const title = document.getElementById('cardTitle').value.trim();
      if (!title) {
        toast('Title is required', 'error');
        document.getElementById('cardTitle').focus();
        return;
      }

      const desc = document.getElementById('cardDesc').value.trim();
      const priority = document.getElementById('cardPriority').value;
      const assignee = document.getElementById('cardAssignee').value;
      const column = document.getElementById('cardColumn').value;

      if (editingCardId) {
        const card = state.cards.find(c => c.id === editingCardId);
        if (card) {
          // WIP check if changing column
          if (card.column !== column) {
            const wip = state.wip[column] || 0;
            const count = state.cards.filter(c => c.column === column).length;
            if (wip > 0 && count >= wip) {
              toast(`WIP limit reached for ${COLUMNS.find(c => c.id === column).label}`, 'error');
              return;
            }
          }
          Object.assign(card, { title, description: desc, priority, assignee, column });
          toast('Card updated', 'success');
        }
      } else {
        const wip = state.wip[column] || 0;
        const count = state.cards.filter(c => c.column === column).length;
        if (wip > 0 && count >= wip) {
          toast(`WIP limit reached for ${COLUMNS.find(c => c.id === column).label}`, 'error');
          return;
        }
        state.cards.push({
          id: uid(),
          title,
          description: desc,
          priority,
          assignee,
          column,
          createdAt: Date.now(),
        });
        toast('Card added', 'success');
      }

      closeCardModal();
      render();
    }

    // ── Delete ────────────────────────────────────────────────
    function confirmDelete(id) {
      const card = state.cards.find(c => c.id === id);
      if (!card) return;
      document.getElementById('confirmMessage').textContent =
        `Delete "${card.title}"? This cannot be undone.`;
      confirmCallback = () => {
        state.cards = state.cards.filter(c => c.id !== id);
        render();
        toast('Card deleted', 'success');
      };
      document.getElementById('confirmModal').classList.add('open');
    }

    // ── WIP modal ─────────────────────────────────────────────
    function openWipModal(colId) {
      wipEditColumn = colId;
      const col = COLUMNS.find(c => c.id === colId);
      document.getElementById('wipModalTitle').textContent = `WIP Limit — ${col.label}`;
      document.getElementById('wipValue').value = state.wip[colId] || 0;
      document.getElementById('wipModal').classList.add('open');
      setTimeout(() => document.getElementById('wipValue').focus(), 50);
    }

    function closeWipModal() {
      document.getElementById('wipModal').classList.remove('open');
      wipEditColumn = null;
    }

    function saveWip() {
      if (!wipEditColumn) return;
      let v = parseInt(document.getElementById('wipValue').value, 10);
      if (isNaN(v) || v < 0) v = 0;
      if (v > 99) v = 99;
      state.wip[wipEditColumn] = v;
      closeWipModal();
      render();
      toast(v === 0 ? 'WIP limit removed' : `WIP set to ${v}`, 'success');
    }

    // ── People modal ──────────────────────────────────────────
    function openPeopleModal() {
      renderPeopleChips();
      document.getElementById('newPersonName').value = '';
      document.getElementById('peopleModal').classList.add('open');
      setTimeout(() => document.getElementById('newPersonName').focus(), 50);
    }

    function closePeopleModal() {
      document.getElementById('peopleModal').classList.remove('open');
    }

    function renderPeopleChips() {
      const wrap = document.getElementById('peopleChips');
      if (state.people.length === 0) {
        wrap.innerHTML = '<span style="color:var(--text-muted);font-size:0.9rem;">No team members yet</span>';
        return;
      }
      wrap.innerHTML = state.people.map(p => `
        <span class="person-chip">
          <span class="avatar" style="background:${avatarColor(p)};width:22px;height:22px;font-size:0.65rem;">${initials(p)}</span>
          ${escapeHtml(p)}
          <button class="remove-person" data-remove="${escapeHtml(p)}" title="Remove">&times;</button>
        </span>
      `).join('');

      wrap.querySelectorAll('[data-remove]').forEach(btn => {
        btn.addEventListener('click', () => {
          const name = btn.dataset.remove;
          state.people = state.people.filter(p => p !== name);
          // Unassign cards
          state.cards.forEach(c => { if (c.assignee === name) c.assignee = ''; });
          renderPeopleChips();
          render();
          toast(`${name} removed`, 'success');
        });
      });
    }

    function addPerson() {
      const input = document.getElementById('newPersonName');
      const name = input.value.trim();
      if (!name) {
        toast('Enter a name', 'error');
        return;
      }
      if (state.people.some(p => p.toLowerCase() === name.toLowerCase())) {
        toast('Already on the team', 'error');
        return;
      }
      state.people.push(name);
      input.value = '';
      renderPeopleChips();
      render();
      toast(`${name} added`, 'success');
      input.focus();
    }

    // ── Confirm modal helpers ─────────────────────────────────
    function closeConfirm() {
      document.getElementById('confirmModal').classList.remove('open');
      confirmCallback = null;
    }

    // ── Wire up UI ────────────────────────────────────────────
    document.getElementById('addCardBtn').addEventListener('click', () => openCardModal());
    document.getElementById('cardModalClose').addEventListener('click', closeCardModal);
    document.getElementById('cardModalCancel').addEventListener('click', closeCardModal);
    document.getElementById('cardModalSave').addEventListener('click', saveCard);

    document.getElementById('peopleBtn').addEventListener('click', openPeopleModal);
    document.getElementById('peopleModalClose').addEventListener('click', closePeopleModal);
    document.getElementById('peopleModalDone').addEventListener('click', closePeopleModal);
    document.getElementById('addPersonBtn').addEventListener('click', addPerson);

    document.getElementById('wipModalClose').addEventListener('click', closeWipModal);
    document.getElementById('wipModalCancel').addEventListener('click', closeWipModal);
    document.getElementById('wipModalSave').addEventListener('click', saveWip);

    document.getElementById('confirmModalClose').addEventListener('click', closeConfirm);
    document.getElementById('confirmCancel').addEventListener('click', closeConfirm);
    document.getElementById('confirmOk').addEventListener('click', () => {
      if (confirmCallback) confirmCallback();
      closeConfirm();
    });

    document.getElementById('searchInput').addEventListener('input', renderBoard);

    // Keyboard: Enter in forms
    document.getElementById('cardTitle').addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); saveCard(); }
    });
    document.getElementById('newPersonName').addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); addPerson(); }
    });
    document.getElementById('wipValue').addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); saveWip(); }
    });

    // Escape closes topmost modal
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        if (document.getElementById('confirmModal').classList.contains('open')) closeConfirm();
        else if (document.getElementById('wipModal').classList.contains('open')) closeWipModal();
        else if (document.getElementById('peopleModal').classList.contains('open')) closePeopleModal();
        else if (document.getElementById('cardModal').classList.contains('open')) closeCardModal();
      }
    });

    // Click overlay to close
    ['cardModal', 'peopleModal', 'wipModal', 'confirmModal'].forEach(id => {
      document.getElementById(id).addEventListener('click', e => {
        if (e.target === e.currentTarget) {
          if (id === 'cardModal') closeCardModal();
          else if (id === 'peopleModal') closePeopleModal();
          else if (id === 'wipModal') closeWipModal();
          else closeConfirm();
        }
      });
    });

    // Shortcut: N to add card (when no modal open and not typing)
    document.addEventListener('keydown', e => {
      if (e.key === 'n' || e.key === 'N') {
        const tag = (e.target.tagName || '').toLowerCase();
        if (tag === 'input' || tag === 'textarea' || tag === 'select') return;
        if (document.querySelector('.modal-overlay.open')) return;
        e.preventDefault();
        openCardModal();
      }
    });

    // Initial paint
    render();
  </script>
</body>
</html>
