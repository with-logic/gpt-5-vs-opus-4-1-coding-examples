<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Online Poll Board</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f0f4ff;
      --bg-accent: #e8eeff;
      --surface: #ffffff;
      --surface-2: #f8faff;
      --text: #1a1f36;
      --text-muted: #6b7294;
      --primary: #5b6cff;
      --primary-dark: #4451e0;
      --primary-soft: #eef0ff;
      --accent: #ff6b9d;
      --accent-soft: #ffe8f0;
      --success: #22c55e;
      --success-soft: #e8f9ef;
      --warning: #f59e0b;
      --border: #e4e8f5;
      --shadow: 0 4px 24px rgba(91, 108, 255, 0.08);
      --shadow-lg: 0 12px 40px rgba(91, 108, 255, 0.14);
      --radius: 16px;
      --radius-sm: 10px;
      --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
      overflow-x: hidden;
    }

    /* Decorative background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 10% 20%, rgba(91, 108, 255, 0.12) 0%, transparent 50%),
        radial-gradient(ellipse 60% 50% at 90% 10%, rgba(255, 107, 157, 0.1) 0%, transparent 45%),
        radial-gradient(ellipse 70% 50% at 70% 90%, rgba(91, 108, 255, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse 50% 40% at 20% 80%, rgba(255, 193, 7, 0.08) 0%, transparent 40%);
      pointer-events: none;
      z-index: 0;
    }

    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
      animation: float 12s ease-in-out infinite;
    }

    .blob-1 {
      width: 300px;
      height: 300px;
      background: #a5b4fc;
      top: -50px;
      right: -80px;
      animation-delay: 0s;
    }

    .blob-2 {
      width: 250px;
      height: 250px;
      background: #fbcfe8;
      bottom: 10%;
      left: -60px;
      animation-delay: -4s;
    }

    .blob-3 {
      width: 200px;
      height: 200px;
      background: #c7d2fe;
      top: 50%;
      right: 5%;
      animation-delay: -7s;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(20px, -30px) scale(1.05); }
      66% { transform: translate(-15px, 15px) scale(0.95); }
    }

    .app {
      position: relative;
      z-index: 1;
      max-width: 920px;
      margin: 0 auto;
      padding: 32px 20px 80px;
    }

    /* Header */
    header {
      text-align: center;
      margin-bottom: 40px;
      animation: fadeDown 0.6s ease-out;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--primary), #8b5cf6);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 20px rgba(91, 108, 255, 0.35);
      font-size: 24px;
    }

    h1 {
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: clamp(1.8rem, 5vw, 2.4rem);
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, var(--text) 0%, var(--primary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 1.05rem;
      margin-top: 6px;
      max-width: 420px;
      margin-left: auto;
      margin-right: auto;
    }

    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-top: 24px;
      flex-wrap: wrap;
    }

    .stat-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 8px 18px;
      font-size: 0.9rem;
      font-weight: 500;
      box-shadow: var(--shadow);
      color: var(--text-muted);
    }

    .stat-pill strong {
      color: var(--primary);
      font-weight: 700;
      font-family: 'Outfit', sans-serif;
    }

    /* Filters */
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      animation: fadeDown 0.6s ease-out 0.1s both;
    }

    .filter-tabs {
      display: flex;
      gap: 6px;
      background: var(--surface);
      padding: 5px;
      border-radius: 12px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    .filter-tab {
      border: none;
      background: transparent;
      padding: 8px 16px;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      transition: var(--transition);
    }

    .filter-tab:hover {
      color: var(--text);
      background: var(--bg-accent);
    }

    .filter-tab.active {
      background: var(--primary);
      color: white;
      box-shadow: 0 4px 12px rgba(91, 108, 255, 0.3);
    }

    .btn-new {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), #7c5cfc);
      color: white;
      border: none;
      padding: 11px 20px;
      border-radius: 12px;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(91, 108, 255, 0.35);
      transition: var(--transition);
    }

    .btn-new:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(91, 108, 255, 0.4);
    }

    .btn-new:active {
      transform: translateY(0);
    }

    /* Poll grid */
    .polls {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .poll-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
      transition: var(--transition);
      animation: cardIn 0.5s ease-out both;
      position: relative;
      overflow: hidden;
    }

    .poll-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      opacity: 0;
      transition: var(--transition);
    }

    .poll-card:hover {
      box-shadow: var(--shadow-lg);
      transform: translateY(-2px);
      border-color: #d0d7f5;
    }

    .poll-card:hover::before {
      opacity: 1;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .poll-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 18px;
    }

    .poll-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .category-tag {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 3px 10px;
      border-radius: 100px;
      background: var(--primary-soft);
      color: var(--primary);
    }

    .category-tag.fun { background: var(--accent-soft); color: var(--accent); }
    .category-tag.tech { background: #e0f2fe; color: #0284c7; }
    .category-tag.food { background: #fef3c7; color: #d97706; }
    .category-tag.life { background: #d1fae5; color: #059669; }
    .category-tag.opinion { background: #ede9fe; color: #7c3aed; }

    .poll-time {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .poll-title {
      font-family: 'Outfit', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.35;
      color: var(--text);
    }

    .vote-badge {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 14px;
      min-width: 72px;
      flex-shrink: 0;
    }

    .vote-badge .count {
      font-family: 'Outfit', sans-serif;
      font-size: 1.35rem;
      font-weight: 800;
      color: var(--primary);
      line-height: 1;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .vote-badge .count.pop {
      animation: countPop 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes countPop {
      0% { transform: scale(1); }
      40% { transform: scale(1.35); color: var(--accent); }
      100% { transform: scale(1); }
    }

    .vote-badge .label {
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* Options */
    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .option {
      position: relative;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface-2);
      cursor: pointer;
      transition: var(--transition);
      overflow: hidden;
      user-select: none;
    }

    .option:hover:not(.disabled):not(.selected) {
      border-color: #b8c2f0;
      background: #f4f6ff;
      transform: translateX(3px);
    }

    .option.selected {
      border-color: var(--primary);
      background: var(--primary-soft);
    }

    .option.disabled {
      cursor: default;
    }

    .option.winner {
      border-color: var(--success);
    }

    .option-fill {
      position: absolute;
      inset: 0;
      width: 0%;
      background: linear-gradient(90deg, rgba(91, 108, 255, 0.12), rgba(91, 108, 255, 0.06));
      transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
      border-radius: inherit;
      z-index: 0;
    }

    .option.selected .option-fill {
      background: linear-gradient(90deg, rgba(91, 108, 255, 0.22), rgba(91, 108, 255, 0.1));
    }

    .option.winner .option-fill {
      background: linear-gradient(90deg, rgba(34, 197, 94, 0.18), rgba(34, 197, 94, 0.06));
    }

    .option-inner {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
    }

    .option-left {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
      flex: 1;
    }

    .option-radio {
      width: 20px;
      height: 20px;
      border: 2px solid #c5cce8;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
      background: white;
    }

    .option.selected .option-radio {
      border-color: var(--primary);
      background: var(--primary);
    }

    .option-radio::after {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: white;
      transform: scale(0);
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .option.selected .option-radio::after {
      transform: scale(1);
    }

    .option.disabled .option-radio {
      display: none;
    }

    .option-emoji {
      font-size: 1.2rem;
      line-height: 1;
      flex-shrink: 0;
    }

    .option-text {
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--text);
    }

    .option-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .option-pct {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--primary);
      opacity: 0;
      transform: translateX(8px);
      transition: 0.4s cubic-bezier(0.22, 1, 0.36, 1) 0.15s;
      min-width: 42px;
      text-align: right;
    }

    .option.show-results .option-pct {
      opacity: 1;
      transform: translateX(0);
    }

    .option.winner .option-pct {
      color: var(--success);
    }

    .option-votes {
      font-size: 0.75rem;
      color: var(--text-muted);
      opacity: 0;
      transition: 0.3s ease 0.25s;
      white-space: nowrap;
    }

    .option.show-results .option-votes {
      opacity: 1;
    }

    .winner-crown {
      font-size: 0.9rem;
      opacity: 0;
      transform: scale(0) rotate(-20deg);
      transition: 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) 0.5s;
    }

    .option.winner .winner-crown {
      opacity: 1;
      transform: scale(1) rotate(0deg);
    }

    /* Vote particle */
    .particle {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      font-size: 1.1rem;
      animation: particleUp 0.9s ease-out forwards;
    }

    @keyframes particleUp {
      0% { opacity: 1; transform: translate(0, 0) scale(1) rotate(0deg); }
      100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0.4) rotate(var(--rot)); }
    }

    /* Voted state */
    .voted-banner {
      display: none;
      align-items: center;
      gap: 8px;
      margin-top: 16px;
      padding: 10px 14px;
      background: var(--success-soft);
      border-radius: 10px;
      color: #15803d;
      font-size: 0.875rem;
      font-weight: 600;
      animation: fadeIn 0.4s ease;
    }

    .voted-banner.show {
      display: flex;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .poll-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }

    .change-vote {
      background: none;
      border: none;
      color: var(--primary);
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      padding: 4px 0;
      opacity: 0;
      pointer-events: none;
      transition: var(--transition);
    }

    .change-vote.show {
      opacity: 1;
      pointer-events: auto;
    }

    .change-vote:hover {
      color: var(--primary-dark);
      text-decoration: underline;
    }

    .share-hint {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(26, 31, 54, 0.45);
      backdrop-filter: blur(6px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      visibility: hidden;
      transition: 0.3s ease;
    }

    .modal-overlay.open {
      opacity: 1;
      visibility: visible;
    }

    .modal {
      background: var(--surface);
      border-radius: 20px;
      padding: 28px;
      width: 100%;
      max-width: 480px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 24px 60px rgba(26, 31, 54, 0.25);
      transform: scale(0.92) translateY(16px);
      transition: 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .modal-overlay.open .modal {
      transform: scale(1) translateY(0);
    }

    .modal h2 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.35rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .modal-sub {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 22px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid var(--border);
      border-radius: 10px;
      font-family: inherit;
      font-size: 0.95rem;
      color: var(--text);
      background: var(--surface-2);
      transition: var(--transition);
      outline: none;
    }

    .form-group input:focus,
    .form-group select:focus {
      border-color: var(--primary);
      background: white;
      box-shadow: 0 0 0 4px rgba(91, 108, 255, 0.12);
    }

    .options-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .option-input-row {
      display: flex;
      gap: 8px;
    }

    .option-input-row input {
      flex: 1;
    }

    .btn-icon {
      width: 44px;
      height: 44px;
      border: 2px solid var(--border);
      border-radius: 10px;
      background: var(--surface-2);
      cursor: pointer;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
      flex-shrink: 0;
      color: var(--text-muted);
    }

    .btn-icon:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-soft);
    }

    .btn-add-option {
      background: none;
      border: 2px dashed var(--border);
      border-radius: 10px;
      padding: 10px;
      width: 100%;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      transition: var(--transition);
      margin-top: 4px;
    }

    .btn-add-option:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: var(--primary-soft);
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 24px;
      justify-content: flex-end;
    }

    .btn-cancel {
      padding: 11px 20px;
      border: 2px solid var(--border);
      border-radius: 10px;
      background: white;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      transition: var(--transition);
    }

    .btn-cancel:hover {
      border-color: #c5cce8;
      color: var(--text);
    }

    .btn-submit {
      padding: 11px 24px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--primary), #7c5cfc);
      color: white;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 6px 16px rgba(91, 108, 255, 0.3);
      transition: var(--transition);
    }

    .btn-submit:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(91, 108, 255, 0.4);
    }

    .btn-submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .empty-state .emoji {
      font-size: 3rem;
      margin-bottom: 12px;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--text);
      color: white;
      padding: 12px 24px;
      border-radius: 100px;
      font-size: 0.9rem;
      font-weight: 600;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
      z-index: 2000;
      transition: 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      opacity: 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* Confetti canvas */
    #confetti-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9998;
    }

    /* Responsive */
    @media (max-width: 560px) {
      .app { padding: 20px 14px 60px; }
      .poll-card { padding: 18px; }
      .poll-title { font-size: 1.05rem; }
      .toolbar { flex-direction: column; align-items: stretch; }
      .filter-tabs { overflow-x: auto; }
      .btn-new { justify-content: center; }
      .stats-bar { gap: 10px; }
      .stat-pill { padding: 6px 12px; font-size: 0.82rem; }
    }

    /* Focus visible */
    button:focus-visible,
    .option:focus-visible {
      outline: 3px solid rgba(91, 108, 255, 0.4);
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <canvas id="confetti-canvas"></canvas>

  <div class="app">
    <header>
      <div class="logo">
        <div class="logo-icon">📊</div>
        <h1>Online Poll Board</h1>
      </div>
      <p class="subtitle">Vote on fun topics, see live results, and share your opinion with the crowd.</p>
      <div class="stats-bar">
        <div class="stat-pill">🗳️ <strong id="stat-polls">0</strong>&nbsp;polls</div>
        <div class="stat-pill">✦ <strong id="stat-votes">0</strong>&nbsp;total votes</div>
        <div class="stat-pill">🔥 <strong id="stat-hot">—</strong></div>
      </div>
    </header>

    <div class="toolbar">
      <div class="filter-tabs" role="tablist">
        <button class="filter-tab active" data-filter="all" role="tab">All</button>
        <button class="filter-tab" data-filter="fun" role="tab">Fun</button>
        <button class="filter-tab" data-filter="tech" role="tab">Tech</button>
        <button class="filter-tab" data-filter="food" role="tab">Food</button>
        <button class="filter-tab" data-filter="life" role="tab">Life</button>
        <button class="filter-tab" data-filter="opinion" role="tab">Opinion</button>
      </div>
      <button class="btn-new" id="btn-new-poll">
        <span>+</span> New Poll
      </button>
    </div>

    <div class="polls" id="polls-container"></div>
  </div>

  <!-- New Poll Modal -->
  <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal">
      <h2 id="modal-title">Create a Poll</h2>
      <p class="modal-sub">Add a question and options for others to vote on.</p>
      <form id="poll-form">
        <div class="form-group">
          <label for="poll-question">Question</label>
          <input type="text" id="poll-question" placeholder="e.g. What's your favorite season?" maxlength="120" required />
        </div>
        <div class="form-group">
          <label for="poll-category">Category</label>
          <select id="poll-category">
            <option value="opinion">Opinion</option>
            <option value="fun">Fun</option>
            <option value="tech">Tech</option>
            <option value="food">Food</option>
            <option value="life">Life</option>
          </select>
        </div>
        <div class="form-group">
          <label>Options</label>
          <div class="options-list" id="form-options">
            <div class="option-input-row">
              <input type="text" placeholder="Option 1" maxlength="60" required class="opt-input" />
            </div>
            <div class="option-input-row">
              <input type="text" placeholder="Option 2" maxlength="60" required class="opt-input" />
            </div>
          </div>
          <button type="button" class="btn-add-option" id="btn-add-option">+ Add option</button>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-cancel" id="btn-cancel">Cancel</button>
          <button type="submit" class="btn-submit">Create Poll</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ─── Data ───────────────────────────────────────────────
    const EMOJIS = {
      fun: ['🎮', '🎬', '🎵', '🎨', '🕹️', '🎪'],
      tech: ['💻', '📱', '🤖', '⚡', '🛰️', '🔧'],
      food: ['🍕', '🍣', '🌮', '🍔', '🍩', '☕'],
      life: ['✈️', '🏠', '💡', '🌱', '🧘', '📚'],
      opinion: ['💬', '🤔', '✨', '🗳️', '🔥', '💯'],
    };

    const OPTION_EMOJIS = ['🅰️', '🅱️', ' entr', '🅾️', '1️⃣', '2️⃣', '3️⃣', '4️⃣', '5️⃣', '6️⃣'];

    let polls = [
      {
        id: 1,
        question: 'Which programming language is the best for beginners?',
        category: 'tech',
        createdAt: Date.now() - 3600000 * 5,
        options: [
          { id: 'a', text: 'Python', votes: 142, emoji: '🐍' },
          { id: 'b', text: 'JavaScript', votes: 98, emoji: '⚡' },
          { id: 'c', text: 'Scratch', votes: 45, emoji: '😺' },
          { id: 'd', text: 'Java', votes: 37, emoji: '☕' },
        ],
        votedOptionId: null,
      },
      {
        id: 2,
        question: 'Pineapple on pizza — yay or nay?',
        category: 'food',
        createdAt: Date.now() - 3600000 * 12,
        options: [
          { id: 'a', text: 'Yay! Perfect combo', votes: 89, emoji: '🍍' },
          { id: 'b', text: 'Nay, culinary crime', votes: 134, emoji: '🚫' },
          { id: 'c', text: "I'll try anything once", votes: 56, emoji: '🤷' },
        ],
        votedOptionId: null,
      },
      {
        id: 3,
        question: 'Best way to spend a free weekend?',
        category: 'life',
        createdAt: Date.now() - 3600000 * 2,
        options: [
          { id: 'a', text: 'Hiking outdoors', votes: 72, emoji: '🥾' },
          { id: 'b', text: 'Binge-watching shows', votes: 91, emoji: '📺' },
          { id: 'c', text: 'Reading a good book', votes: 58, emoji: '📖' },
          { id: 'd', text: 'Meeting friends', votes: 80, emoji: '🎉' },
        ],
        votedOptionId: null,
      },
      {
        id: 4,
        question: 'Cats or dogs?',
        category: 'fun',
        createdAt: Date.now() - 3600000 * 28,
        options: [
          { id: 'a', text: 'Dogs forever', votes: 167, emoji: '🐶' },
          { id: 'b', text: 'Cats all the way', votes: 154, emoji: '🐱' },
          { id: 'c', text: 'Both are great!', votes: 201, emoji: '💕' },
        ],
        votedOptionId: null,
      },
      {
        id: 5,
        question: 'Remote work vs. office — which do you prefer?',
        category: 'opinion',
        createdAt: Date.now() - 3600000 * 8,
        options: [
          { id: 'a', text: 'Fully remote', votes: 188, emoji: '🏡' },
          { id: 'b', text: 'Hybrid (best of both)', votes: 145, emoji: '🔀' },
          { id: 'c', text: 'In-office every day', votes: 42, emoji: '🏢' },
        ],
        votedOptionId: null,
      },
      {
        id: 6,
        question: 'Morning person or night owl?',
        category: 'fun',
        createdAt: Date.now() - 3600000 * 48,
        options: [
          { id: 'a', text: 'Early bird 🌅', votes: 76, emoji: '🐦' },
          { id: 'b', text: 'Night owl 🦉', votes: 119, emoji: '🌙' },
          { id: 'c', text: 'Depends on the day', votes: 63, emoji: '🔄' },
        ],
        votedOptionId: null,
      },
    ];

    let currentFilter = 'all';
    let nextId = 7;

    // Load from localStorage if available
    try {
      const saved = localStorage.getItem('poll-board-data');
      if (saved) {
        const parsed = JSON.parse(saved);
        if (Array.isArray(parsed.polls) && parsed.polls.length) {
          polls = parsed.polls;
          nextId = parsed.nextId || polls.length + 1;
        }
      }
    } catch (e) { /* ignore */ }

    function save() {
      try {
        localStorage.setItem('poll-board-data', JSON.stringify({ polls, nextId }));
      } catch (e) { /* ignore */ }
    }

    // ─── Helpers ────────────────────────────────────────────
    function totalVotes(poll) {
      return poll.options.reduce((s, o) => s + o.votes, 0);
    }

    function timeAgo(ts) {
      const sec = Math.floor((Date.now() - ts) / 1000);
      if (sec < 60) return 'just now';
      const min = Math.floor(sec / 60);
      if (min < 60) return `${min}m ago`;
      const hr = Math.floor(min / 60);
      if (hr < 24) return `${hr}h ago`;
      const d = Math.floor(hr / 24);
      return `${d}d ago`;
    }

    function pct(votes, total) {
      if (total === 0) return 0;
      return Math.round((votes / total) * 100);
    }

    function animateCount(el, from, to, duration = 600) {
      const start = performance.now();
      function frame(now) {
        const t = Math.min((now - start) / duration, 1);
        const ease = 1 - Math.pow(1 - t, 3);
        el.textContent = Math.round(from + (to - from) * ease);
        if (t < 1) requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
    }

    // ─── Confetti ───────────────────────────────────────────
    const confettiCanvas = document.getElementById('confetti-canvas');
    const confettiCtx = confettiCanvas.getContext('2d');
    let confettiPieces = [];
    let confettiAnimId = null;

    function resizeCanvas() {
      confettiCanvas.width = window.innerWidth;
      confettiCanvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function spawnConfetti(x, y, count = 40) {
      const colors = ['#5b6cff', '#ff6b9d', '#22c55e', '#f59e0b', '#8b5cf6', '#06b6d4'];
      for (let i = 0; i < count; i++) {
        confettiPieces.push({
          x, y,
          vx: (Math.random() - 0.5) * 12,
          vy: (Math.random() - 0.8) * 10 - 2,
          w: 6 + Math.random() * 6,
          h: 4 + Math.random() * 4,
          color: colors[Math.floor(Math.random() * colors.length)],
          rot: Math.random() * Math.PI * 2,
          vr: (Math.random() - 0.5) * 0.3,
          life: 1,
          decay: 0.012 + Math.random() * 0.01,
        });
      }
      if (!confettiAnimId) tickConfetti();
    }

    function tickConfetti() {
      confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
      confettiPieces = confettiPieces.filter(p => p.life > 0);
      for (const p of confettiPieces) {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.2;
        p.vx *= 0.99;
        p.rot += p.vr;
        p.life -= p.decay;
        confettiCtx.save();
        confettiCtx.translate(p.x, p.y);
        confettiCtx.rotate(p.rot);
        confettiCtx.globalAlpha = Math.max(0, p.life);
        confettiCtx.fillStyle = p.color;
        confettiCtx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        confettiCtx.restore();
      }
      if (confettiPieces.length) {
        confettiAnimId = requestAnimationFrame(tickConfetti);
      } else {
        confettiAnimId = null;
        confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
      }
    }

    // ─── Particles ──────────────────────────────────────────
    function spawnParticles(x, y) {
      const emojis = ['✨', '⭐', '💫', '🎉', '💖', '🔥'];
      for (let i = 0; i < 8; i++) {
        const el = document.createElement('span');
        el.className = 'particle';
        el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        const dx = (Math.random() - 0.5) * 100;
        const dy = -40 - Math.random() * 80;
        const rot = (Math.random() - 0.5) * 180 + 'deg';
        el.style.left = x + 'px';
        el.style.top = y + 'px';
        el.style.setProperty('--dx', dx + 'px');
        el.style.setProperty('--dy', dy + 'px');
        el.style.setProperty('--rot', rot);
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 900);
      }
    }

    // ─── Toast ──────────────────────────────────────────────
    let toastTimer;
    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.innerHTML = msg;
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 2600);
    }

    // ─── Stats ──────────────────────────────────────────────
    function updateStats() {
      const totalPolls = polls.length;
      const totalV = polls.reduce((s, p) => s + totalVotes(p), 0);
      let hottest = '—';
      let maxV = 0;
      for (const p of polls) {
        const v = totalVotes(p);
        if (v > maxV) { maxV = v; hottest = p.question.slice(0, 22) + (p.question.length > 22 ? '…' : ''); }
      }
      document.getElementById('stat-polls').textContent = totalPolls;
      document.getElementById('stat-votes').textContent = totalV.toLocaleString();
      document.getElementById('stat-hot').textContent = hottest || '—';
    }

    // ─── Render ─────────────────────────────────────────────
    function renderPolls() {
      const container = document.getElementById('polls-container');
      const filtered = currentFilter === 'all'
        ? polls
        : polls.filter(p => p.category === currentFilter);

      if (!filtered.length) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="emoji">🗳️</div>
            <p>No polls in this category yet.<br>Create one to get started!</p>
          </div>`;
        updateStats();
        return;
      }

      // Sort: most recent first
      const sorted = [...filtered].sort((a, b) => b.createdAt - a.createdAt);

      container.innerHTML = sorted.map((poll, idx) => renderPollCard(poll, idx)).join('');
      updateStats();

      // Attach event listeners
      container.querySelectorAll('.option').forEach(el => {
        el.addEventListener('click', onOptionClick);
        el.addEventListener('keydown', e => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            onOptionClick(e);
          }
        });
      });
      container.querySelectorAll('.change-vote').forEach(el => {
        el.addEventListener('click', onChangeVote);
      });
    }

    function renderPollCard(poll, idx) {
      const total = totalVotes(poll);
      const hasVoted = poll.votedOptionId !== null;
      const maxVotes = Math.max(...poll.options.map(o => o.votes), 0);

      const optionsHtml = poll.options.map(opt => {
        const percentage = pct(opt.votes, total);
        const isSelected = poll.votedOptionId === opt.id;
        const isWinner = hasVoted && opt.votes === maxVotes && maxVotes > 0;
        const classes = [
          'option',
          hasVoted ? 'disabled show-results' : '',
          isSelected ? 'selected' : '',
          isWinner ? 'winner' : '',
        ].filter(Boolean).join(' ');

        return `
          <div class="${classes}"
               data-poll-id="${poll.id}"
               data-option-id="${opt.id}"
               role="button"
               tabindex="${hasVoted ? -1 : 0}"
               aria-pressed="${isSelected}">
            <div class="option-fill" style="width: ${hasVoted ? percentage : 0}%"></div>
            <div class="option-inner">
              <div class="option-left">
                <div class="option-radio"></div>
                <span class="option-emoji">${opt.emoji || '•'}</span>
                <span class="option-text">${escapeHtml(opt.text)}</span>
              </div>
              <div class="option-right">
                <span class="winner-crown">👑</span>
                <span class="option-votes">${opt.votes} vote${opt.votes !== 1 ? 's' : ''}</span>
                <span class="option-pct">${percentage}%</span>
              </div>
            </div>
          </div>`;
      }).join('');

      return `
        <article class="poll-card" data-poll-id="${poll.id}" style="animation-delay: ${idx * 0.06}s">
          <div class="poll-header">
            <div>
              <div class="poll-meta">
                <span class="category-tag ${poll.category}">${poll.category}</span>
                <span class="poll-time">${timeAgo(poll.createdAt)}</span>
              </div>
              <h3 class="poll-title">${escapeHtml(poll.question)}</h3>
            </div>
            <div class="vote-badge">
              <span class="count" data-count="${total}">${total}</span>
              <span class="label">votes</span>
            </div>
          </div>
          <div class="options">${optionsHtml}</div>
          <div class="voted-banner ${hasVoted ? 'show' : ''}">
            ✅ Thanks for voting! Results are live below.
          </div>
          <div class="poll-footer">
            <button class="change-vote ${hasVoted ? 'show' : ''}" data-poll-id="${poll.id}">Change my vote</button>
            <span class="share-hint">${hasVoted ? total + ' people have shared their take' : 'Tap an option to cast your vote'}</span>
          </div>
        </article>`;
    }

    function escapeHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    // ─── Voting ─────────────────────────────────────────────
    function onOptionClick(e) {
      const el = e.currentTarget;
      if (el.classList.contains('disabled')) return;

      const pollId = +el.dataset.pollId;
      const optionId = el.dataset.optionId;
      const poll = polls.find(p => p.id === pollId);
      if (!poll || poll.votedOptionId !== null) return;

      // Record vote
      const opt = poll.options.find(o => o.id === optionId);
      if (!opt) return;
      opt.votes += 1;
      poll.votedOptionId = optionId;
      save();

      // Particles at click
      const rect = el.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      spawnParticles(cx, cy);
      spawnConfetti(cx, cy, 30);

      // Animate vote badge
      const card = document.querySelector(`.poll-card[data-poll-id="${pollId}"]`);
      if (card) {
        const countEl = card.querySelector('.vote-badge .count');
        const prev = totalVotes(poll) - 1;
        countEl.classList.add('pop');
        animateCount(countEl, prev, prev + 1);
        setTimeout(() => countEl.classList.remove('pop'), 500);
      }

      // Re-render this card with results
      animateResults(pollId);
      showToast('🎉 Vote counted! Thanks for sharing.');
      updateStats();
    }

    function animateResults(pollId) {
      const poll = polls.find(p => p.id === pollId);
      if (!poll) return;
      const card = document.querySelector(`.poll-card[data-poll-id="${pollId}"]`);
      if (!card) return;

      const total = totalVotes(poll);
      const maxVotes = Math.max(...poll.options.map(o => o.votes), 0);

      const options = card.querySelectorAll('.option');
      options.forEach(optEl => {
        const oid = optEl.dataset.optionId;
        const opt = poll.options.find(o => o.id === oid);
        if (!opt) return;
        const percentage = pct(opt.votes, total);
        const isSelected = poll.votedOptionId === oid;
        const isWinner = opt.votes === maxVotes && maxVotes > 0;

        optEl.classList.add('disabled', 'show-results');
        if (isSelected) optEl.classList.add('selected');
        if (isWinner) optEl.classList.add('winner');
        optEl.setAttribute('tabindex', '-1');
        optEl.setAttribute('aria-pressed', String(isSelected));

        // Animate fill
        const fill = optEl.querySelector('.option-fill');
        // Force reflow then animate
        fill.style.width = '0%';
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            fill.style.width = percentage + '%';
          });
        });

        const pctEl = optEl.querySelector('.option-pct');
        pctEl.textContent = percentage + '%';
        const votesEl = optEl.querySelector('.option-votes');
        votesEl.textContent = `${opt.votes} vote${opt.votes !== 1 ? 's' : ''}`;
      });

      card.querySelector('.voted-banner').classList.add('show');
      card.querySelector('.change-vote').classList.add('show');
      card.querySelector('.share-hint').textContent = total + ' people have shared their take';
      card.querySelector('.vote-badge .count').textContent = total;
    }

    function onChangeVote(e) {
      const pollId = +e.currentTarget.dataset.pollId;
      const poll = polls.find(p => p.id === pollId);
      if (!poll || poll.votedOptionId === null) return;

      // Remove previous vote
      const prev = poll.options.find(o => o.id === poll.votedOptionId);
      if (prev && prev.votes > 0) prev.votes -= 1;
      poll.votedOptionId = null;
      save();

      // Full re-render keeps things clean
      renderPolls();
      showToast('✏️ Vote cleared — pick again!');
    }

    // ─── Filters ────────────────────────────────────────────
    document.querySelectorAll('.filter-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentFilter = tab.dataset.filter;
        renderPolls();
      });
    });

    // ─── Modal / New Poll ───────────────────────────────────
    const overlay = document.getElementById('modal-overlay');
    const form = document.getElementById('poll-form');
    const formOptions = document.getElementById('form-options');

    document.getElementById('btn-new-poll').addEventListener('click', openModal);
    document.getElementById('btn-cancel').addEventListener('click', closeModal);
    overlay.addEventListener('click', e => {
      if (e.target === overlay) closeModal();
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && overlay.classList.contains('open')) closeModal();
    });

    function openModal() {
      overlay.classList.add('open');
      document.getElementById('poll-question').focus();
    }

    function closeModal() {
      overlay.classList.remove('open');
      form.reset();
      // Reset options to 2
      formOptions.innerHTML = `
        <div class="option-input-row">
          <input type="text" placeholder="Option 1" maxlength="60" required class="opt-input" />
        </div>
        <div class="option-input-row">
          <input type="text" placeholder="Option 2" maxlength="60" required class="opt-input" />
        </div>`;
    }

    document.getElementById('btn-add-option').addEventListener('click', () => {
      const count = formOptions.querySelectorAll('.option-input-row').length;
      if (count >= 6) {
        showToast('Maximum 6 options');
        return;
      }
      const row = document.createElement('div');
      row.className = 'option-input-row';
      row.innerHTML = `
        <input type="text" placeholder="Option ${count + 1}" maxlength="60" required class="opt-input" />
        <button type="button" class="btn-icon" aria-label="Remove option">✕</button>`;
      row.querySelector('.btn-icon').addEventListener('click', () => {
        if (formOptions.querySelectorAll('.option-input-row').length > 2) {
          row.remove();
        } else {
          showToast('Need at least 2 options');
        }
      });
      formOptions.appendChild(row);
      row.querySelector('input').focus();
    });

    form.addEventListener('submit', e => {
      e.preventDefault();
      const question = document.getElementById('poll-question').value.trim();
      const category = document.getElementById('poll-category').value;
      const inputs = formOptions.querySelectorAll('.opt-input');
      const texts = [...inputs].map(i => i.value.trim()).filter(Boolean);

      if (!question || texts.length < 2) {
        showToast('Please fill in the question and at least 2 options');
        return;
      }

      const catEmojis = EMOJIS[category] || EMOJIS.opinion;
      const newPoll = {
        id: nextId++,
        question,
        category,
        createdAt: Date.now(),
        options: texts.map((text, i) => ({
          id: String.fromCharCode(97 + i),
          text,
          votes: 0,
          emoji: catEmojis[i % catEmojis.length],
        })),
        votedOptionId: null,
      };

      polls.unshift(newPoll);
      save();
      closeModal();

      // Switch filter if needed
      if (currentFilter !== 'all' && currentFilter !== category) {
        currentFilter = 'all';
        document.querySelectorAll('.filter-tab').forEach(t => {
          t.classList.toggle('active', t.dataset.filter === 'all');
        });
      }

      renderPolls();
      showToast('🚀 Poll created! Share it with friends.');
      spawnConfetti(window.innerWidth / 2, window.innerHeight / 3, 50);

      // Scroll to top
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    // ─── Boot ───────────────────────────────────────────────
    renderPolls();
  </script>
</body>
</html>
