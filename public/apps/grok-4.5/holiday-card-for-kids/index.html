<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎄 Magical Holiday Card for Kids</title>
  <style>
    :root {
      --bg1: #0a1628;
      --bg2: #1a3a5c;
      --card: #0e2439;
      --gold: #ffd86b;
      --red: #e74c3c;
      --green: #2ecc71;
      --pink: #ff8fab;
      --ice: #a8e6ff;
      --panel: rgba(255, 255, 255, 0.08);
      --shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: "Segoe UI", "Comic Sans MS", "Chalkboard SE", "Nunito", system-ui, sans-serif;
      background: radial-gradient(ellipse at 50% 0%, #1e4a7a 0%, #0a1628 70%);
      color: #fff;
    }

    body {
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* ========== SNOW CANVAS ========== */
    #snow-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 50;
    }

    /* ========== SPARKLES ========== */
    #sparkle-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 60;
      overflow: hidden;
    }

    .sparkle {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: white;
      box-shadow: 0 0 8px 2px #fff, 0 0 16px 4px #ffd86b;
      animation: sparkle-pop 0.9s ease-out forwards;
      pointer-events: none;
    }

    @keyframes sparkle-pop {
      0% { transform: scale(0) translate(0, 0); opacity: 1; }
      60% { opacity: 1; }
      100% { transform: scale(1.4) translate(var(--sx), var(--sy)); opacity: 0; }
    }

    /* ========== HEADER ========== */
    header {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 14px 16px 8px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: clamp(1.4rem, 4vw, 2.2rem);
      font-weight: 800;
      letter-spacing: 0.5px;
      background: linear-gradient(90deg, #ff8fab, #ffd86b, #7bed9f, #70a1ff, #ff8fab);
      background-size: 300% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: gradient-shift 6s linear infinite, bounce-title 3s ease-in-out infinite;
      text-shadow: none;
      filter: drop-shadow(0 2px 8px rgba(255, 216, 107, 0.35));
    }

    @keyframes gradient-shift {
      0% { background-position: 0% 50%; }
      100% { background-position: 300% 50%; }
    }

    @keyframes bounce-title {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }

    header p {
      margin-top: 4px;
      font-size: clamp(0.8rem, 2vw, 1rem);
      color: #a8e6ff;
      opacity: 0.9;
    }

    /* ========== LAYOUT ========== */
    .app {
      flex: 1;
      display: grid;
      grid-template-columns: 120px 1fr 140px;
      grid-template-rows: 1fr auto;
      gap: 10px;
      padding: 8px 12px 12px;
      min-height: 0;
      position: relative;
      z-index: 5;
    }

    @media (max-width: 720px) {
      .app {
        grid-template-columns: 90px 1fr 100px;
        gap: 6px;
        padding: 4px 6px 8px;
      }
    }

    @media (max-width: 520px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr auto auto;
      }
      .tray-left, .tray-right {
        flex-direction: row !important;
        overflow-x: auto;
        overflow-y: hidden;
        max-height: none;
        max-width: 100%;
      }
      .tray-left { order: 2; }
      .scene-wrap { order: 1; min-height: 48vh; }
      .tray-right { order: 3; }
      .controls { order: 4; }
    }

    /* ========== TRAYS ========== */
    .tray {
      background: var(--panel);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 18px;
      padding: 10px 8px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
      overflow-y: auto;
      box-shadow: var(--shadow);
      min-height: 0;
    }

    .tray-title {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--gold);
      text-align: center;
      line-height: 1.2;
      flex-shrink: 0;
    }

    .sticker-btn {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      border: 2px solid rgba(255, 255, 255, 0.15);
      background: linear-gradient(145deg, rgba(255,255,255,0.12), rgba(255,255,255,0.04));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      cursor: grab;
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s;
      position: relative;
      flex-shrink: 0;
      touch-action: none;
    }

    .sticker-btn:hover {
      transform: scale(1.12) rotate(-4deg);
      border-color: var(--gold);
      box-shadow: 0 0 18px rgba(255, 216, 107, 0.45);
    }

    .sticker-btn:active {
      cursor: grabbing;
      transform: scale(0.95);
    }

    .sticker-btn.used {
      opacity: 0.35;
    }

    .sticker-btn .badge {
      position: absolute;
      top: -4px;
      right: -4px;
      background: var(--red);
      color: white;
      font-size: 0.6rem;
      font-weight: 800;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }

    /* ========== SCENE ========== */
    .scene-wrap {
      position: relative;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: var(--shadow), 0 0 0 3px rgba(255, 216, 107, 0.25);
      min-height: 0;
      background: linear-gradient(180deg,
        #1a4a7a 0%,
        #2a5a8a 25%,
        #3d6a4a 55%,
        #2d5a3a 70%,
        #1a3a2a 100%);
    }

    #scene {
      position: absolute;
      inset: 0;
      overflow: hidden;
      cursor: crosshair;
    }

    /* Sky stars */
    .star {
      position: absolute;
      width: 3px;
      height: 3px;
      background: white;
      border-radius: 50%;
      box-shadow: 0 0 4px 1px rgba(255,255,255,0.8);
      animation: twinkle var(--dur) ease-in-out infinite alternate;
    }

    @keyframes twinkle {
      from { opacity: 0.3; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1.3); }
    }

    /* Moon */
    .moon {
      position: absolute;
      top: 8%;
      right: 12%;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fff9e0, #ffe08a 60%, #f0c040);
      box-shadow:
        0 0 30px 10px rgba(255, 224, 130, 0.4),
        0 0 60px 20px rgba(255, 200, 80, 0.15),
        inset -8px -6px 0 rgba(0,0,0,0.05);
      z-index: 1;
      animation: moon-glow 4s ease-in-out infinite alternate;
    }

    @keyframes moon-glow {
      from { box-shadow: 0 0 30px 10px rgba(255, 224, 130, 0.35), 0 0 60px 20px rgba(255, 200, 80, 0.12); }
      to { box-shadow: 0 0 45px 18px rgba(255, 224, 130, 0.55), 0 0 80px 30px rgba(255, 200, 80, 0.22); }
    }

    .moon::before {
      content: "😊";
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      opacity: 0.7;
    }

    /* Ground snow */
    .ground {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 22%;
      background: linear-gradient(180deg, #e8f4ff 0%, #ffffff 40%, #f0f8ff 100%);
      border-radius: 50% 50% 0 0 / 40% 40% 0 0;
      z-index: 2;
      box-shadow: 0 -8px 30px rgba(255, 255, 255, 0.3);
    }

    .ground::before,
    .ground::after {
      content: "";
      position: absolute;
      background: #fff;
      border-radius: 50%;
    }

    .ground::before {
      width: 40%;
      height: 80%;
      left: -5%;
      bottom: 20%;
    }

    .ground::after {
      width: 35%;
      height: 70%;
      right: -3%;
      bottom: 15%;
    }

    /* Mountains / trees silhouettes */
    .hills {
      position: absolute;
      bottom: 18%;
      left: 0;
      right: 0;
      height: 25%;
      z-index: 1;
      pointer-events: none;
    }

    .hill {
      position: absolute;
      bottom: 0;
      border-radius: 50% 50% 0 0;
      background: linear-gradient(180deg, #1e4a3a, #16352a);
    }

    /* Fixed scene decorations (trees etc as HTML visuals) */
    .scene-tree {
      position: absolute;
      z-index: 3;
      bottom: 16%;
      font-size: 4.5rem;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
      animation: tree-sway 5s ease-in-out infinite;
      transform-origin: bottom center;
      pointer-events: none;
      line-height: 1;
    }

    @keyframes tree-sway {
      0%, 100% { transform: rotate(-2deg); }
      50% { transform: rotate(2deg); }
    }

    .scene-tree.small {
      font-size: 2.8rem;
      animation-duration: 4s;
      animation-delay: -1s;
    }

    .scene-tree.tiny {
      font-size: 1.8rem;
      animation-duration: 6s;
      animation-delay: -2s;
    }

    /* Cabin */
    .cabin {
      position: absolute;
      z-index: 3;
      bottom: 17%;
      left: 12%;
      font-size: 3rem;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.35));
      animation: cabin-glow 3s ease-in-out infinite alternate;
      pointer-events: none;
    }

    @keyframes cabin-glow {
      from { filter: drop-shadow(0 4px 8px rgba(0,0,0,0.35)) drop-shadow(0 0 4px rgba(255,180,50,0.2)); }
      to { filter: drop-shadow(0 4px 8px rgba(0,0,0,0.35)) drop-shadow(0 0 14px rgba(255,180,50,0.55)); }
    }

    /* Card message */
    .card-message {
      position: absolute;
      top: 12%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 4;
      text-align: center;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(8px);
      border: 2px solid rgba(255, 216, 107, 0.5);
      border-radius: 20px;
      padding: 10px 22px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.2);
      animation: float-msg 4s ease-in-out infinite;
      max-width: 80%;
      pointer-events: none;
    }

    @keyframes float-msg {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(-8px); }
    }

    .card-message h2 {
      font-size: clamp(1.1rem, 3.5vw, 1.7rem);
      font-weight: 800;
      background: linear-gradient(90deg, #ffd86b, #fff, #ff8fab);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      line-height: 1.2;
    }

    .card-message p {
      font-size: clamp(0.7rem, 2vw, 0.95rem);
      color: #d0efff;
      margin-top: 4px;
    }

    /* Draggable decorations on scene */
    .deco {
      position: absolute;
      font-size: 2.4rem;
      cursor: grab;
      z-index: 10;
      touch-action: none;
      filter: drop-shadow(0 3px 5px rgba(0,0,0,0.35));
      transition: filter 0.15s;
      line-height: 1;
      will-change: left, top;
    }

    .deco:hover {
      filter: drop-shadow(0 3px 5px rgba(0,0,0,0.35)) drop-shadow(0 0 10px rgba(255,216,107,0.7));
      z-index: 20;
    }

    .deco.dragging {
      cursor: grabbing;
      z-index: 100;
      filter: drop-shadow(0 8px 16px rgba(0,0,0,0.5)) drop-shadow(0 0 14px rgba(255,216,107,0.8));
      transform: scale(1.25) !important;
      transition: none;
    }

    .deco.spawn {
      animation: deco-spawn 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes deco-spawn {
      0% { transform: scale(0) rotate(-20deg); opacity: 0; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    .deco.wiggle {
      animation: deco-wiggle 0.5s ease;
    }

    @keyframes deco-wiggle {
      0%, 100% { transform: rotate(0deg) scale(1); }
      25% { transform: rotate(-12deg) scale(1.15); }
      75% { transform: rotate(12deg) scale(1.15); }
    }

    /* Bouncing deer / animals */
    .deco.bounce-idle {
      animation: bounce-idle 2.2s ease-in-out infinite;
    }

    @keyframes bounce-idle {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    /* Gift pop */
    .deco.pulse {
      animation: pulse-gift 1.8s ease-in-out infinite;
    }

    @keyframes pulse-gift {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    /* Delete zone */
    .delete-zone {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(231, 76, 60, 0.85);
      color: white;
      padding: 8px 20px;
      border-radius: 24px;
      font-size: 0.85rem;
      font-weight: 700;
      z-index: 30;
      opacity: 0;
      transition: all 0.25s ease;
      pointer-events: none;
      white-space: nowrap;
      box-shadow: 0 4px 16px rgba(231, 76, 60, 0.4);
    }

    .delete-zone.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .delete-zone.hot {
      background: #c0392b;
      transform: translateX(-50%) translateY(0) scale(1.1);
      box-shadow: 0 0 24px rgba(231, 76, 60, 0.7);
    }

    /* Ambient lights on tree (CSS dots) */
    .tree-lights {
      position: absolute;
      z-index: 4;
      pointer-events: none;
    }

    .light-dot {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      animation: blink-light var(--blink) ease-in-out infinite alternate;
    }

    @keyframes blink-light {
      from { opacity: 0.4; box-shadow: 0 0 4px currentColor; }
      to { opacity: 1; box-shadow: 0 0 12px 3px currentColor; }
    }

    /* ========== CONTROLS ========== */
    .controls {
      grid-column: 1 / -1;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      align-items: center;
      padding: 4px 0 0;
    }

    .btn {
      border: none;
      border-radius: 999px;
      padding: 10px 18px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
      color: #0a1628;
      box-shadow: 0 4px 14px rgba(0,0,0,0.25);
      font-family: inherit;
    }

    .btn:hover {
      transform: translateY(-2px) scale(1.04);
      box-shadow: 0 6px 20px rgba(0,0,0,0.35);
    }

    .btn:active {
      transform: translateY(0) scale(0.97);
    }

    .btn-primary {
      background: linear-gradient(135deg, #ffd86b, #ffb347);
    }

    .btn-music {
      background: linear-gradient(135deg, #a29bfe, #6c5ce7);
      color: white;
    }

    .btn-music.playing {
      background: linear-gradient(135deg, #fd79a8, #e84393);
      animation: music-pulse 1s ease-in-out infinite;
    }

    @keyframes music-pulse {
      0%, 100% { box-shadow: 0 4px 14px rgba(232, 67, 147, 0.4); }
      50% { box-shadow: 0 4px 24px rgba(232, 67, 147, 0.8); }
    }

    .btn-snow {
      background: linear-gradient(135deg, #74b9ff, #0984e3);
      color: white;
    }

    .btn-clear {
      background: linear-gradient(135deg, #fab1a0, #e17055);
      color: white;
    }

    .btn-surprise {
      background: linear-gradient(135deg, #55efc4, #00b894);
    }

    .btn-shake {
      background: linear-gradient(135deg, #ffeaa7, #fdcb6e);
    }

    /* Toast */
    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(-100px);
      background: rgba(20, 40, 60, 0.95);
      border: 2px solid var(--gold);
      color: white;
      padding: 12px 28px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 1rem;
      z-index: 200;
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
      pointer-events: none;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    /* Confetti particle */
    .confetti {
      position: fixed;
      width: 10px;
      height: 10px;
      z-index: 150;
      pointer-events: none;
      border-radius: 2px;
      animation: confetti-fall 2.5s ease-out forwards;
    }

    @keyframes confetti-fall {
      0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg) scale(0.3); opacity: 0; }
    }

    /* Magical flash */
    .flash {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle, rgba(255,255,255,0.5), transparent 60%);
      z-index: 140;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .flash.on {
      opacity: 1;
    }

    /* Instructions overlay first visit */
    .hint {
      position: absolute;
      bottom: 28%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 25;
      background: rgba(0,0,0,0.55);
      color: #fff;
      padding: 8px 16px;
      border-radius: 12px;
      font-size: 0.85rem;
      animation: hint-pulse 2s ease-in-out infinite;
      pointer-events: none;
      white-space: nowrap;
    }

    @keyframes hint-pulse {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }

    .hint.hidden {
      display: none;
    }

    /* Scrollbar */
    .tray::-webkit-scrollbar { width: 4px; height: 4px; }
    .tray::-webkit-scrollbar-thumb { background: rgba(255,216,107,0.4); border-radius: 4px; }

    /* Bust a few utility */
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <canvas id="snow-canvas"></canvas>
  <div id="sparkle-layer"></div>
  <div class="flash" id="flash"></div>
  <div class="toast" id="toast">🎄 Happy Holidays!</div>

  <header>
    <h1>✨ Magical Holiday Card ✨</h1>
    <p>Drag stickers · Tap animals · Make it snow · Have fun! 🎁</p>
  </header>

  <div class="app">
    <!-- LEFT TRAY -->
    <div class="tray tray-left" id="tray-left">
      <div class="tray-title">🎄 Decor</div>
    </div>

    <!-- SCENE -->
    <div class="scene-wrap">
      <div id="scene">
        <!-- stars injected by JS -->
        <div class="moon" id="moon" title="Click the moon!"></div>
        <div class="hills" id="hills"></div>
        <div class="ground"></div>

        <!-- fixed trees -->
        <div class="scene-tree" style="left: 58%; bottom: 15%; animation-delay: 0s;">🌲</div>
        <div class="scene-tree small" style="left: 72%; bottom: 16%;">🎄</div>
        <div class="scene-tree tiny" style="left: 48%; bottom: 17%;">🌲</div>
        <div class="scene-tree tiny" style="left: 82%; bottom: 15.5%;">🌳</div>
        <div class="cabin" style="left: 8%;">🏠</div>
        <div class="scene-tree small" style="left: 28%; bottom: 14%; font-size: 2.2rem;">🌲</div>

        <div class="card-message" id="card-msg">
          <h2>🎄 Happy Holidays! 🎄</h2>
          <p>You make the world sparkle ✨</p>
        </div>

        <div class="hint" id="hint">👆 Drag stickers onto the card!</div>
        <div class="delete-zone" id="delete-zone">🗑️ Drop here to remove</div>
      </div>
    </div>

    <!-- RIGHT TRAY -->
    <div class="tray tray-right" id="tray-right">
      <div class="tray-title">🧸 Fun</div>
    </div>

    <!-- CONTROLS -->
    <div class="controls">
      <button class="btn btn-music" id="btn-music" type="button">🎵 Music</button>
      <button class="btn btn-snow" id="btn-snow" type="button">❄️ Snow</button>
      <button class="btn btn-surprise" id="btn-surprise" type="button">🎉 Surprise!</button>
      <button class="btn btn-shake" id="btn-shake" type="button">🔔 Jingle</button>
      <button class="btn btn-primary" id="btn-random" type="button">🎲 Random</button>
      <button class="btn btn-clear" id="btn-clear" type="button">🧹 Clear</button>
    </div>
  </div>

  <script>
  (() => {
    "use strict";

    // ========== AUDIO ENGINE (Web Audio API – no external files) ==========
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let actx = null;
    let musicNodes = null;
    let musicOn = false;
    let masterGain = null;

    function ensureAudio() {
      if (!actx) {
        actx = new AudioCtx();
        masterGain = actx.createGain();
        masterGain.gain.value = 0.35;
        masterGain.connect(actx.destination);
      }
      if (actx.state === "suspended") actx.resume();
      return actx;
    }

    function playTone(freq, dur, type = "sine", vol = 0.3, delay = 0) {
      const ctx = ensureAudio();
      const t0 = ctx.currentTime + delay;
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, t0);
      g.gain.setValueAtTime(0.0001, t0);
      g.gain.exponentialRampToValueAtTime(vol, t0 + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
      osc.connect(g);
      g.connect(masterGain);
      osc.start(t0);
      osc.stop(t0 + dur + 0.05);

    function scheduleNextNote() {
      if (!musicOn) return;
      const note = MELODY[musicIdx % MELODY.length];
      musicIdx++;

    function resizeSnow() {
      W = canvas.width = window.innerWidth;

    function makeFlake() {
      return {
        x: Math.random() * W,
        y: Math.random() * H - H,
        r: Math.random() * 3.5 + 1,
        sp: Math.random() * 1.2 + 0.4,
        wind: Math.random() * 0.6 - 0.3,
        wobble: Math.random() * Math.PI * 2,
        wobbleSp: Math.random() * 0.03 + 0.01,
        opacity: Math.random() * 0.5 + 0.4,
      };
    }

    function initSnow(count = 120) {
      flakes = Array.from({ length: count }, makeFlake);
    }

    function drawSnow() {
      cctx.clearRect(0, 0, W, H);
      if (!snowOn) {
        requestAnimationFrame(drawSnow);
        return;
      }
      for (const f of flakes) {
        f.wobble += f.wobbleSp;
        f.x += Math.sin(f.wobble) * 0.5 + f.wind * snowIntensity;
        f.y += f.sp * snowIntensity;
        if (f.y > H + 5) {
          f.y = -5;
          f.x = Math.random() * W;
        }
        if (f.x > W + 5) f.x = -5;
        if (f.x < -5) f.x = W + 5;

        cctx.beginPath();
        cctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
        cctx.fillStyle = `rgba(255,255,255,${f.opacity})`;
        cctx.fill();
      }
      requestAnimationFrame(drawSnow);
    }

    function buildTray(container, items, unlimited = true) {

    function getSceneRect() {
      return scene.getBoundingClientRect();
    }

    function pxToPct(x, y) {
      const r = getSceneRect();
      return {
        x: ((x - r.left) / r.width) * 100,
        y: ((y - r.top) / r.height) * 100,
      };
    }

    function clampPct(v) {
      return Math.max(2, Math.min(95, v));
    }

    function createDeco(emoji, xPct, yPct, anim = "", spawn = true) {
      const el = document.createElement("div");
      el.className = "deco" + (spawn ? " spawn" : "") + (anim ? " " + anim : "");
      el.textContent = emoji;
      el.dataset.id = ++decoIdCounter;
      el.dataset.emoji = emoji;
      el.dataset.anim = anim;
      el.style.left = clampPct(xPct) + "%";
      el.style.top = clampPct(yPct) + "%";
      el.style.fontSize = (1.8 + Math.random() * 1.4) + "rem";

      // Pointer drag on deco
      el.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        e.stopPropagation();
        ensureAudio();
        sfxPickup();
        startDragExisting(el, e);
      });

      // Click animal for fun sound + wiggle
      el.addEventListener("click", (e) => {
        if (el._wasDragged) {
          el._wasDragged = false;
          return;
        }
        ensureAudio();
        sfxClickAnimal();
        el.classList.remove("wiggle");
        void el.offsetWidth;
        el.classList.add("wiggle");
        spawnSparkles(e.clientX, e.clientY, 6);
        // Occasionally change message
        if (Math.random() < 0.3) randomizeMessage();
      });

      scene.appendChild(el);
      return el;
    }

    function startDragExisting(el, e) {
      dragging = el;
      el.classList.add("dragging");
      el.classList.remove("bounce-idle", "pulse", "spawn");
      el.setPointerCapture(e.pointerId);
      const r = el.getBoundingClientRect();
      dragOffsetX = e.clientX - r.left - r.width / 2;
      dragOffsetY = e.clientY - r.top - r.height / 2;
      deleteZone.classList.add("visible");
      el._wasDragged = false;
      el._startX = e.clientX;
      el._startY = e.clientY;
    }

    function spawnAndDrag(emoji, anim, e) {
      const rect = getSceneRect();
      // Place initially under pointer if over scene, else center
      let xPct, yPct;
      if (
        e.clientX >= rect.left && e.clientX <= rect.right &&
        e.clientY >= rect.top && e.clientY <= rect.bottom
      ) {
        const p = pxToPct(e.clientX, e.clientY);
        xPct = p.x;
        yPct = p.y;
      } else {
        xPct = 40 + Math.random() * 30;
        yPct = 40 + Math.random() * 30;
      }
      const el = createDeco(emoji, xPct, yPct, anim, true);
      // Begin drag immediately
      dragging = el;
      el.classList.add("dragging");
      el.classList.remove("spawn", "bounce-idle", "pulse");
      try { el.setPointerCapture(e.pointerId); } catch (_) {}
      dragOffsetX = 0;
      dragOffsetY = 0;
      deleteZone.classList.add("visible");
      el._wasDragged = false;
      el._startX = e.clientX;
      el._startY = e.clientY;
      el._fromTray = true;
      el._trayAnim = anim;

      // Move under cursor right away
      moveDrag(e.clientX, e.clientY);
    }

    function moveDrag(clientX, clientY) {
      if (!dragging) return;
      const p = pxToPct(clientX - dragOffsetX, clientY - dragOffsetY);
      dragging.style.left = clampPct(p.x) + "%";
      dragging.style.top = clampPct(p.y) + "%";

      // Check delete zone
      const dz = deleteZone.getBoundingClientRect();
      const over =
        clientX >= dz.left && clientX <= dz.right &&
        clientY >= dz.top && clientY <= dz.bottom;
      deleteZone.classList.toggle("hot", over);
      dragging._overDelete = over;

      if (
        Math.abs(clientX - dragging._startX) > 5 ||
        Math.abs(clientY - dragging._startY) > 5
      ) {
        dragging._wasDragged = true;
      }
    }

    function endDrag() {
      if (!dragging) return;
      const el = dragging;
      el.classList.remove("dragging");
      deleteZone.classList.remove("visible", "hot");

      if (el._overDelete) {
        sfxDelete();
        el.style.transition = "transform 0.3s, opacity 0.3s";
        el.style.transform = "scale(0)";
        el.style.opacity = "0";
        setTimeout(() => el.remove(), 300);
        showToast("Removed! 🗑️");
      } else {
        // Restore idle anim if any
        const anim = el.dataset.anim || el._trayAnim || "";
        if (anim) el.classList.add(anim);
        // Check if officially over the scene
        const p = {
          x: parseFloat(el.style.left),
          y: parseFloat(el.style.top),
        };
        // Snap into place sound only if moved
        if (el._wasDragged || el._fromTray) {
          sfxPlace();
          const r = el.getBoundingClientRect();
          spawnSparkles(r.left + r.width / 2, r.top + r.height / 2, 8);
        }
      }
      dragging = null;
    }

    window.addEventListener("pointermove", (e) => {
      if (dragging) {
        e.preventDefault();
        moveDrag(e.clientX, e.clientY);
      }
    });

      const r = el.getBoundingClientRect();
      spawnSparkles(r.left + r.width / 2, r.top + r.height / 2, 8);
      showToast("Added " + item.emoji + " " + item.label + "!");
      hideHint();
    });

    document.getElementById("btn-clear").addEventListener("click", () => {
      ensureAudio();
      sfxDelete();
      const decos = scene.querySelectorAll(".deco");
      decos.forEach((el, i) => {
        setTimeout(() => {
          el.style.transition = "transform 0.3s, opacity 0.3s";
          el.style.transform = "scale(0) rotate(20deg)";
          el.style.opacity = "0";
          setTimeout(() => el.remove(), 300);
        }, i * 30);
      });
      showToast("All clear! Start fresh 🧹");
    });

    // Moon click
    document.getElementById("moon").addEventListener("click", (e) => {
      ensureAudio();
      sfxMoon();
      spawnSparkles(e.clientX, e.clientY, 12);
      // Resize moon slightly as feedback
      const moon = e.currentTarget;
      moon.style.transition = "transform 0.3s";
      moon.style.transform = "scale(1.2)";
      setTimeout(() => { moon.style.transform = "scale(1)"; }, 300);
      // Extra snow momentarily
      snowIntensity = 2;
      setTimeout(() => { snowIntensity = 1; }, 2000);
      showToast("🌙 Magical moonbeam!");
      // Shooting stars
      for (let i = 0; i < 5; i++) {
        setTimeout(() => {
          const sx = 100 + Math.random() * (window.innerWidth - 200);
          const sy = 50 + Math.random() * 150;
          spawnSparkles(sx, sy, 4);
        }, i * 200);
      }
    });

    // Click empty area of scene to place a random sparkle / snowflake
    scene.addEventListener("click", (e) => {
      if (e.target !== scene && e.target !== document.querySelector(".ground") &&
          !e.target.classList.contains("hill") && e.target.id !== "hills") {
        // only pure scene bg roughly
      }
      if (e.target === scene || e.target.classList.contains("ground") || e.target.classList.contains("hill") || e.target.id === "hills") {
        ensureAudio();
        playTone(1000 + Math.random() * 500, 0.1, "sine", 0.08);
        spawnSparkles(e.clientX, e.clientY, 5);
      }
    });

    // Double-click tray items to place at random (backup interaction)
    document.querySelectorAll(".tray").forEach((tray) => {
      tray.addEventListener("dblclick", (e) => {
        const btn = e.target.closest(".sticker-btn");
        if (!btn) return;
        ensureAudio();
        const el = createDeco(
          btn.dataset.emoji,
          15 + Math.random() * 70,
          30 + Math.random() * 50,
          btn.dataset.anim || "",
          true
        );
        sfxPlace();
        const r = el.getBoundingClientRect();
        spawnSparkles(r.left + r.width / 2, r.top + r.height / 2, 6);
        hideHint();
      });
    });

    // Keyboard fun
    window.addEventListener("keydown", (e) => {
      if (e.key === "s" || e.key === "S") {
        document.getElementById("btn-snow").click();
      } else if (e.key === "m" || e.key === "M") {
        document.getElementById("btn-music").click();
      } else if (e.key === " " || e.key === "Enter") {
        // space = random
        if (e.target === document.body || e.target === document.documentElement) {
          e.preventDefault();
          document.getElementById("btn-random").click();
        }
      }
    });

    // ========== INIT ==========
    function init() {
      resizeSnow();
      initSnow(140);
      drawSnow();
      createStars();
      createHills();

      buildTray(document.getElementById("tray-left"), DECOR_STICKERS);
      buildTray(document.getElementById("tray-right"), FUN_STICKERS);

      // Place defaults
      DEFAULT_DECOS.forEach((d, i) => {
        setTimeout(() => {
          createDeco(d.emoji, d.x * 100, d.y * 100, d.anim || "", true);
        }, 200 + i * 90);
      });

      // Welcome toast
      setTimeout(() => showToast("🎄 Welcome! Drag stickers to decorate!"), 600);

      // Hide hint after 10s
      setTimeout(hideHint, 12000);
    }

    window.addEventListener("resize", () => {
      resizeSnow();
    });

    // Boot
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", init);
    } else {
      init();
    }
  })();
  </script>
</body>
</html>
